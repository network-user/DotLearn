packages:
  - apps/*
  - packages/*

# pnpm 11+ reads overrides here (package.json "pnpm" field is ignored).
overrides:
  esbuild: '>=0.28.1'
  multer: '>=2.2.0'
  lodash: '>=4.18.1'
  qs: '>=6.15.2'
  undici: '^7.28.0'
  '@opentelemetry/core': '>=2.8.0'
  '@nestjs/swagger>js-yaml': '^4.2.0'
  'test-exclude>glob': '10.5.0'

# pnpm 11 blocks postinstall scripts unless approved (ERR_PNPM_IGNORED_BUILDS).
allowBuilds:
  esbuild: true
  '@scarf/scarf': true
