server {
  listen 8080;
  server_name _;
  server_tokens off;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain application/javascript application/json text/css image/svg+xml;
  gzip_min_length 1024;

  include /etc/nginx/security-headers.conf;

  location /api/ {
    # /api/sync accepts gzip snapshot blobs (base64-inflated); the api's own
    # body-parser limit already caps this, this just keeps nginx from 413ing first.
    client_max_body_size 2m;
    # Резолвим api через docker DNS в рантайме (переменная в proxy_pass), а не при
    # старте: иначе nginx падает с "host not found in upstream" пока api ещё
    # поднимается или недоступен. 127.0.0.11 - встроенный DNS docker-сети.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $dotlearn_api api;
    proxy_pass http://$dotlearn_api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    # Append (не replace): цепочка до api = <client>, <этот nginx>. При
    # TRUSTED_PROXY_HOPS=2 (за общим фронт-Caddy) троттлер ключуется по реальному
    # IP клиента, а не по этому прокси. Доверенный край обязан санитизировать XFF.
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Аналитика Umami (self-hosted): трекер отдаётся first-party, чтобы не ослаблять
  # CSP (script-src/connect-src остаются 'self') и реже попадать под ad-block.
  # Проксируем ТОЛЬКО две ручки на контейнер umami в общей сети dotsound; дашборд
  # Umami наружу не выставляем (он на своём поддомене за фронт-Caddy). resolver +
  # переменная в proxy_pass - как в /api/, чтобы nginx не падал, пока umami ещё не
  # поднят. rewrite снимает префикс /stats: umami отдаёт трекер на /script.js и
  # принимает события на /api/send. Каждый location переинклюдит security-headers.
  location = /stats/script.js {
    include /etc/nginx/security-headers.conf;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $umami_upstream umami;
    rewrite ^ /script.js break;
    proxy_pass http://$umami_upstream:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /stats/api/send {
    include /etc/nginx/security-headers.conf;
    client_max_body_size 2m;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $umami_upstream umami;
    rewrite ^ /api/send break;
    proxy_pass http://$umami_upstream:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    # Re-included here (see security-headers.conf's own comment): this location
    # now declares its own add_header, which stops nginx inheriting the
    # server-level include above. Every prerendered page (topics/*, en/*,
    # flashcards, glossary, interview, tracks, map, sandbox, ...) is served from
    # here via the $uri/ branch, so no-store belongs on the location as a whole
    # rather than on a per-path list that would need to stay in sync.
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-store" always;
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    include /etc/nginx/security-headers.conf;
    expires 1y;
    add_header Cache-Control "public, immutable" always;
  }

  location = /index.html {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-store" always;
  }

  # Markdown mirrors (e.g. /topics/git.md, /en/topics/git.md) - short, public cache
  # since content only changes on deploy; default_type covers the Content-Type
  # since .md has no builtin mapping in nginx's mime.types.
  location ~* \.md$ {
    include /etc/nginx/security-headers.conf;
    default_type "text/markdown; charset=utf-8";
    add_header Cache-Control "public, max-age=3600" always;
    try_files $uri =404;
  }

  # GEO/crawler artifacts at the site root.
  location ~* ^/(llms\.txt|llms-full\.txt|sitemap\.xml|robots\.txt)$ {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "public, max-age=3600" always;
  }
}
