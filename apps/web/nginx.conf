server {
  listen 8080;
  server_name _;
  server_tokens off;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain application/javascript application/json text/css image/svg+xml;
  gzip_min_length 1024;

  include /etc/nginx/security-headers.conf;

  location /api/ {
    # Резолвим api через docker DNS в рантайме (переменная в proxy_pass), а не при
    # старте: иначе nginx падает с "host not found in upstream" пока api ещё
    # поднимается или недоступен. 127.0.0.11 - встроенный DNS docker-сети.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $dotlearn_api api;
    proxy_pass http://$dotlearn_api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    include /etc/nginx/security-headers.conf;
    expires 1y;
    add_header Cache-Control "public, immutable" always;
  }

  location = /index.html {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-store" always;
  }
}
