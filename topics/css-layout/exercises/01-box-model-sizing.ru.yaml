exercises:
  - id: bms-sizing-basics-001
    concept: box-model-sizing
    type: theory-quiz
    difficulty: 1
    prompt: 'При box-sizing: content-box (значение по умолчанию) какой слой коробки получает значение свойства width?'
    choices:
      - id: a
        text: 'Только слой content; padding и border прибавляются снаружи.'
      - id: b
        text: 'Вся коробка вместе с padding и border.'
      - id: c
        text: 'Слой content вместе с padding, но без border.'
      - id: d
        text: 'Слой margin.'
    correct: [a]
    explanation: 'При content-box width задаёт ширину только слоя content, а padding и border добавляются поверх и увеличивают итоговую видимую ширину коробки.'
    hints:
      - 'Вспомните, почему блок с width и padding оказывается шире заданного числа.'
    variants:
      - prompt: 'При box-sizing: border-box что означает значение свойства width?'
        choices:
          - id: a
            text: 'Итоговую ширину коробки вместе с padding и border.'
          - id: b
            text: 'Ширину только слоя content, без padding и border.'
          - id: c
            text: 'Ширину слоя margin.'
          - id: d
            text: 'Максимальную ширину, которую коробка не превысит.'
        correct: [a]
        explanation: 'border-box меняет смысл width на итоговую ширину коробки: браузер сам ужимает content, чтобы padding и border уместились внутрь заданного числа.'
      - prompt: 'Какие слои коробки красятся фоном элемента?'
        choices:
          - id: a
            text: 'content, padding и border; margin остаётся прозрачным.'
          - id: b
            text: 'Только content.'
          - id: c
            text: 'Все четыре слоя, включая margin.'
          - id: d
            text: 'Только margin и border.'
        correct: [a]
        explanation: 'Фон элемента заходит на content, padding и border. margin - это прозрачный воздух между коробками, фон на него не распространяется.'

  - id: bms-contentbox-width-002
    concept: box-model-sizing
    type: predict-output
    difficulty: 2
    prompt: 'Задан блок с box-sizing по умолчанию (content-box). Чему равна его итоговая видимая ширина в пикселях? Введите число без единиц.'
    snippet: |
      .box {
        width: 200px;
        padding: 24px;
        border: 2px solid gray;
      }
    expected:
      kind: scalar
      value: 252
    explanation: 'При content-box итоговая ширина = width + padding слева и справа + border слева и справа = 200 + 24 + 24 + 2 + 2 = 252 пикселя.'
    hints:
      - 'width - это только слой content. Что прибавляется к нему снаружи?'
    variants:
      - snippet: |
          .box {
            width: 300px;
            padding: 10px;
            border: 5px solid gray;
          }
        expected:
          kind: scalar
          value: 330
      - snippet: |
          .box {
            width: 150px;
            padding: 20px;
            border: 0;
          }
        expected:
          kind: scalar
          value: 190

  - id: bms-borderbox-content-003
    concept: box-model-sizing
    type: predict-output
    difficulty: 3
    prompt: 'Блок использует box-sizing: border-box. Сколько пикселей остаётся под слой content (область содержимого)? Введите число без единиц.'
    snippet: |
      .box {
        box-sizing: border-box;
        width: 400px;
        padding: 30px;
        border: 10px solid gray;
      }
    expected:
      kind: scalar
      value: 320
    explanation: 'При border-box заданные 400px - это вся коробка. Под content остаётся 400 - 30 - 30 (padding) - 10 - 10 (border) = 320 пикселей.'
    hints:
      - 'При border-box width - это итог всей коробки, а не content. Что нужно вычесть, чтобы получить внутреннюю область?'
      - 'Отнимите padding с обеих сторон и border с обеих сторон от заданной ширины.'

  - id: bms-minmax-resolve-004
    concept: box-model-sizing
    type: predict-output
    difficulty: 4
    prompt: 'Значения width, max-width и min-width конфликтуют. Чему равна итоговая ширина блока в пикселях? Введите число без единиц.'
    snippet: |
      .box {
        width: 100px;
        max-width: 300px;
        min-width: 400px;
      }
    expected:
      kind: scalar
      value: 400
    explanation: 'Браузер берёт width (100), зажимает сверху max-width (min(300, 100) = 100), затем поднимает до min-width (max(400, 100) = 400). При конфликте min-width всегда сильнее max-width, поэтому итог 400.'
    hints:
      - 'Итоговая ширина - это width, зажатая в коридоре между min-width и max-width. В каком порядке применяются границы?'
      - 'Сначала действует верхняя граница max-width, затем нижняя min-width. Когда они противоречат друг другу, кто побеждает?'
