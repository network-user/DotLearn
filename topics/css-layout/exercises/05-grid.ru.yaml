exercises:
  - id: grid-basics-001
    concept: grid
    type: theory-quiz
    difficulty: 1
    prompt: 'Что делает единица fr в grid-template-columns?'
    choices:
      - id: a
        text: 'Делит место, оставшееся после фиксированных треков'
      - id: b
        text: 'Задаёт трек ровно в один пиксель.'
      - id: c
        text: 'Означает фиксированную ширину в 1 сантиметр.'
      - id: d
        text: 'Отключает промежутки между треками.'
    correct: [a]
    explanation: 'fr (fraction) делит остаток ширины после фиксированных треков пропорционально долям - по той же логике, что и flex-grow.'
    hints:
      - 'fr работает с тем местом, что осталось после пикселей и процентов. Как оно распределяется?'
    variants:
      - prompt: 'Какое свойство объявляет колонки-треки в CSS Grid?'
        choices:
          - id: a
            text: 'grid-template-columns'
          - id: b
            text: 'Значение flex-direction, выбранное как полный ответ'
          - id: c
            text: 'Значение column-count, выбранное как полный ответ'
          - id: d
            text: 'Значение grid-area, выбранное как полный ответ'
        correct: [a]
        explanation: 'grid-template-columns перечисляет треки-колонки: число значений задаёт число колонок, а каждое значение - ширину трека.'
      - prompt: 'Что задаёт свойство gap в grid-контейнере?'
        choices:
          - id: a
            text: 'Промежутки между треками сетки.'
          - id: b
            text: 'Внешние отступы всей сетки от соседей.'
          - id: c
            text: 'Ширину первого трека.'
          - id: d
            text: 'Количество колонок.'
        correct: [a]
        explanation: 'gap задаёт промежутки сразу между всеми треками сетки - и по колонкам, и по строкам, без margin на отдельных элементах.'

  - id: grid-blanks-002
    concept: grid
    type: fill-in-blanks
    difficulty: 2
    prompt: 'Галерея карточек должна сама менять число колонок под ширину: трек не уже 200px, но растягивается на долю. Впишите функцию, задающую диапазон размера трека.'
    template: |
      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, {{value}}(200px, 1fr));
      }
    blanks:
      value:
        accept: ['minmax']
    explanation: 'minmax(200px, 1fr) означает «трек не уже 200px, но готов растянуться на долю fr». Вместе с repeat(auto-fit, ...) это даёт адаптивную сетку без медиазапросов.'
    hints:
      - 'Нужна функция, задающая нижнюю и верхнюю границу размера трека.'
    variants:
      - prompt: 'Баннер должен растянуться на две колонки сетки от текущего места. Впишите число треков после ключевого слова span.'
        template: |
          .banner {
            grid-column: span {{value}};
          }
        blanks:
          value:
            accept: ['2']
      - prompt: 'Нужны три колонки одинаковой доли. Впишите значение трека внутри repeat.'
        template: |
          .layout {
            display: grid;
            grid-template-columns: repeat(3, {{value}});
          }
        blanks:
          value:
            accept: ['1fr']

  - id: grid-fr-width-003
    concept: grid
    type: predict-output
    difficulty: 3
    prompt: 'Сетка шириной 800px без промежутков. Сколько пикселей займёт средняя колонка (2fr)? Введите число без единиц.'
    snippet: |
      .layout {
        display: grid;
        width: 800px;
        grid-template-columns: 1fr 2fr 1fr;
      }
    expected:
      kind: scalar
      value: 400
    explanation: 'Фиксированных треков нет, поэтому все 800px делятся на fr. Сумма долей 1 + 2 + 1 = 4, одна доля = 200px. Средняя колонка - 2fr, то есть 2 × 200 = 400.'
    hints:
      - 'Сложите все доли fr и найдите размер одной доли от ширины контейнера.'
      - 'Умножьте размер одной доли на число долей у средней колонки.'

  - id: grid-autofit-autofill-004
    concept: grid
    type: theory-quiz
    difficulty: 4
    prompt: 'В сетке repeat(auto-fit, minmax(200px, 1fr)) лежат всего две карточки в широком контейнере. Они растянулись на всю ширину строки. Как получить, чтобы вместо этого остались пустые треки справа, а карточки не растягивались?'
    choices:
      - id: a
        text: 'Заменить auto-fit на auto-fill.'
      - id: b
        text: 'Заменить 1fr на 200px.'
      - id: c
        text: 'Убрать minmax.'
      - id: d
        text: 'Добавить grid-auto-flow: column.'
    correct: [a]
    explanation: 'auto-fit схлопывает пустые треки в ноль, поэтому имеющиеся карточки заполняют всю строку. auto-fill сохраняет пустые треки, и карточки остаются своего минимального размера, оставив место справа.'
    hints:
      - 'Разница между двумя ключевыми словами проявляется именно тогда, когда карточек мало.'
      - 'Одно из них схлопывает пустые треки, другое их сохраняет. Какое сохраняет?'

  - id: grid-autofit-count-005
    concept: grid
    type: predict-output
    difficulty: 5
    prompt: 'Сетка шириной 850px с gap: 10px. Сколько колонок разместится в одном ряду? Введите число.'
    snippet: |
      .gallery {
        display: grid;
        width: 850px;
        gap: 10px;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      }
    expected:
      kind: scalar
      value: 4
    explanation: 'Каждая колонка не уже 200px, между N колонками N−1 промежутков по 10px. Для 4 колонок нужно 4 × 200 + 3 × 10 = 830px - помещается в 850. Для 5: 5 × 200 + 4 × 10 = 1040px - не помещается. Значит, колонок 4 (затем они растянутся, поделив свободное место).'
    hints:
      - 'Каждая колонка требует минимум 200px. Не забудьте, что между колонками есть промежутки gap.'
      - 'Для N колонок место = N × 200 + (N−1) × 10. Найдите наибольшее N, при котором это не превышает 850.'
