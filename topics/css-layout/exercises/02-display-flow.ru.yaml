exercises:
  - id: df-flow-basics-001
    concept: display-flow
    type: theory-quiz
    difficulty: 1
    prompt: 'Как в нормальном потоке ведут себя блочные элементы (display: block)?'
    choices:
      - id: a
        text: 'Укладываются друг под другом сверху вниз, каждый занимает всю доступную ширину.'
      - id: b
        text: 'Текут слева направо внутри строки, как слова.'
      - id: c
        text: 'Накладываются друг на друга в одной точке.'
      - id: d
        text: 'Располагаются по осям, как во flexbox.'
    correct: [a]
    explanation: 'Блочные элементы в нормальном потоке встают колонкой сверху вниз и по умолчанию растягиваются на всю ширину родителя. Именно поэтому заголовки и абзацы идут друг под другом без всякого CSS.'
    hints:
      - 'Вспомните, как без единой строки CSS выстраиваются абзацы и заголовки.'
    variants:
      - prompt: 'Как в нормальном потоке ведут себя строчные элементы (display: inline)?'
        choices:
          - id: a
            text: 'Текут слева направо внутри строки и переносятся по её краю.'
          - id: b
            text: 'Встают друг под другом, каждый с новой строки.'
          - id: c
            text: 'Занимают всю ширину родителя.'
          - id: d
            text: 'Выпадают из потока и позиционируются вручную.'
        correct: [a]
        explanation: 'Строчные элементы (a, span, strong) текут в строке слева направо, как слова в предложении, и переносятся только когда строка заканчивается.'
      - prompt: 'Что произойдёт с элементом, которому задали display: none?'
        choices:
          - id: a
            text: 'Он полностью исчезнет из потока и не займёт места, будто его нет в разметке.'
          - id: b
            text: 'Он станет невидимым, но сохранит своё место в потоке.'
          - id: c
            text: 'Он превратится в строчный элемент.'
          - id: d
            text: 'Он растянется на всю ширину родителя.'
        correct: [a]
        explanation: 'display: none убирает элемент из потока целиком - места он не занимает. Этим он отличается от visibility: hidden, при котором элемент невидим, но своё место сохраняет.'

  - id: df-inline-block-blanks-002
    concept: display-flow
    type: fill-in-blanks
    difficulty: 2
    prompt: 'Бейджу нужно стоять в ряд рядом с текстом, но при этом принимать заданные width и height. Впишите значение display.'
    template: |
      .badge {
        display: {{value}};
        width: 64px;
        height: 24px;
      }
    blanks:
      value:
        accept: ['inline-block']
    explanation: 'inline-block течёт в строке, как строчный элемент, но уважает width, height и все margin, как блочный - ровно то, что нужно кнопкам и бейджам.'
    hints:
      - 'Нужен гибрид: поведение строчного элемента в строке плюс способность блочного принимать размеры.'
    variants:
      - prompt: 'Элемент нужно полностью убрать из потока, чтобы он не занимал места. Впишите значение display.'
        template: |
          .hidden-block {
            display: {{value}};
          }
        blanks:
          value:
            accept: ['none']
      - prompt: 'Контейнеру нужно создать блочный контекст форматирования (BFC), чтобы обнять плавающих детей, не прибегая к overflow. Впишите значение display.'
        template: |
          .container {
            display: {{value}};
          }
        blanks:
          value:
            accept: ['flow-root']

  - id: df-bfc-collapse-003
    concept: display-flow
    type: theory-quiz
    difficulty: 3
    prompt: 'Контейнер с плавающими (float) детьми схлопнулся в нулевую высоту и не обнимает их. Какое изменение вернёт ему высоту, создав контекст блочного форматирования?'
    choices:
      - id: a
        text: 'Задать контейнеру display: flow-root.'
      - id: b
        text: 'Задать плавающим детям display: inline.'
      - id: c
        text: 'Задать контейнеру display: none.'
      - id: d
        text: 'Убрать у детей все отступы.'
    correct: [a]
    explanation: 'Плавающие дети выпадают из нормального потока, поэтому родитель их «не видит» и схлопывается. display: flow-root создаёт у контейнера BFC, внутри которого float снова учитывается, и контейнер обнимает детей. Тот же эффект даёт overflow, отличный от visible.'
    hints:
      - 'Проблема в том, что float выпал из потока родителя. Что заставляет родителя снова его учитывать?'
      - 'Нужен механизм, создающий изолированную область форматирования (BFC) прямо на контейнере.'
