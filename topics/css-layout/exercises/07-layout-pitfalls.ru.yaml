exercises:
  - id: pit-recognize-001
    concept: layout-pitfalls
    type: theory-quiz
    difficulty: 1
    prompt: 'Блок с длинным неразрывным текстом внутри flex-контейнера вылезает за его край и растягивает всю строку. Какое свойство по умолчанию мешает ему сжаться?'
    choices:
      - id: a
        text: 'min-width: auto у flex-элементов не даёт им сжиматься уже содержимого.'
      - id: b
        text: 'flex-grow: 1, из-за которого элемент растёт.'
      - id: c
        text: 'overflow: hidden на контейнере.'
      - id: d
        text: 'position: absolute у элемента.'
    correct: [a]
    explanation: 'У flex- и grid-элементов по умолчанию min-width: auto - «не сжимайся уже содержимого». Длинный текст задаёт большой минимум, и flex-shrink не может опустить элемент ниже него. Лечение - min-width: 0.'
    hints:
      - 'Почему flex-shrink не срабатывает? Что-то держит нижнюю границу ширины элемента.'
    variants:
      - prompt: 'Между заголовком (margin-bottom: 40px) и абзацем (margin-top: 20px) в нормальном потоке оказалось 40px, а не 60px. Как это называется?'
        choices:
          - id: a
            text: 'Схлопывание margin: вертикальные отступы соседних блоков сливаются в больший из двух.'
          - id: b
            text: 'Переполнение (overflow).'
          - id: c
            text: 'Ошибка округления браузера.'
          - id: d
            text: 'Схлопывание padding.'
        correct: [a]
        explanation: 'Вертикальные margin соседних блоков в потоке не складываются, а схлопываются в один, равный большему значению. Padding так себя не ведёт, и во flex/grid схлопывания нет.'
      - prompt: 'position: sticky с top: 0 не прилипает. Какая из причин - типичная?'
        choices:
          - id: a
            text: 'У одного из предков стоит overflow: hidden или auto, обрезающий область прокрутки.'
          - id: b
            text: 'Элементу не хватает flex-grow.'
          - id: c
            text: 'sticky не существует в CSS.'
          - id: d
            text: 'Нужно добавить float: left.'
        correct: [a]
        explanation: 'overflow на предке обрезает область прокрутки, внутри которой живёт sticky, и прилипать становится не к чему. Это самая скрытая причина «неработающего» sticky.'

  - id: pit-fix-blanks-002
    concept: layout-pitfalls
    type: fill-in-blanks
    difficulty: 2
    prompt: 'flex-элемент с длинным содержимым вылезает за контейнер. Впишите значение min-width, которое разрешит ему сжиматься.'
    template: |
      .feed-item {
        min-width: {{value}};
        overflow: hidden;
      }
    blanks:
      value:
        accept: ['0']
    explanation: 'min-width: 0 снимает защиту min-width: auto, и flex-элемент снова может сжиматься, отдавая переполнение внутреннему overflow.'
    hints:
      - 'Нужно опустить минимальную ширину до значения, которое ничего не защищает.'
    variants:
      - prompt: 'В колоночном flex-контейнере элемент не сжимается по высоте и вылезает вниз. Впишите значение min-height, снимающее защиту.'
        template: |
          .column-item {
            min-height: {{value}};
          }
        blanks:
          value:
            accept: ['0']
      - prompt: 'Один элемент нужно отцентрировать по обеим осям внутри grid-контейнера. Впишите значение place-items.'
        template: |
          .center {
            display: grid;
            place-items: {{value}};
          }
        blanks:
          value:
            accept: ['center']

  - id: pit-sticky-overflow-003
    concept: layout-pitfalls
    type: theory-quiz
    difficulty: 3
    prompt: 'sticky-заголовок с корректным top: 0 не липнет. В инспекторе видно, что у контейнера-обёртки стоит overflow: hidden (его добавили, чтобы обрезать тень). Что здесь происходит?'
    choices:
      - id: a
        text: 'overflow: hidden создал у обёртки обрезанную область прокрутки, и sticky прилипает уже относительно неё, а не всей страницы.'
      - id: b
        text: 'overflow: hidden полностью отключает свойство position.'
      - id: c
        text: 'sticky требует, чтобы у всех предков был overflow: visible, иначе он превращается в fixed.'
      - id: d
        text: 'Дело в z-index заголовка.'
    correct: [a]
    explanation: 'sticky прилипает внутри области прокрутки ближайшего предка с overflow не visible. overflow: hidden на обёртке создал такую область, и заголовок теперь «прилипает» в её пределах - визуально это выглядит как будто он не липнет вовсе. Убрать лишний overflow или сместить его - решение.'
    hints:
      - 'sticky всегда привязан к какой-то области прокрутки. Что overflow: hidden сделал с этой областью?'
      - 'Прилипание не исчезло - оно теперь происходит внутри обрезанной обёртки, а не всей страницы.'

  - id: pit-zindex-modal-004
    concept: layout-pitfalls
    type: theory-quiz
    difficulty: 4
    prompt: 'У модального окна z-index: 9999, но оно оказывается под элементом с z-index: 5. Модалка лежит внутри блока с transform: translateY(0). Наращивание z-index не помогает. Как починить правильно?'
    choices:
      - id: a
        text: 'Вынести модалку из-под родителя с transform (например, в конец body), чтобы она не была заперта в его контексте наложения.'
      - id: b
        text: 'Поднять z-index модалки до 999999.'
      - id: c
        text: 'Добавить модалке position: static.'
      - id: d
        text: 'Задать элементу с z-index: 5 значение overflow: hidden.'
    correct: [a]
    explanation: 'transform на родителе создаёт новый контекст наложения, и z-index модалки соревнуется только внутри него; наружу «просвечивает» лишь z-index самого родителя. Число наращивать бесполезно - нужно вынести модалку из-под этого родителя, обычно в конец body.'
    hints:
      - 'Проблема не в величине z-index, а в том, в каком контексте наложения заперта модалка.'
      - 'Какое свойство родителя создало новый контекст наложения, и как убрать модалку из-под него?'
