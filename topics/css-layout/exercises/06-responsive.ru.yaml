exercises:
  - id: resp-mobile-first-001
    concept: responsive
    type: theory-quiz
    difficulty: 1
    prompt: 'В чём идея подхода mobile-first?'
    choices:
      - id: a
        text: 'Базовые стили пишут под узкий экран, а медиазапросы добавляют усложнения для широких.'
      - id: b
        text: 'Сначала верстают под десктоп, затем убирают лишнее для мобильных.'
      - id: c
        text: 'Делают две отдельные версии сайта: одну для телефонов, другую для мониторов.'
      - id: d
        text: 'Полностью отказываются от медиазапросов.'
    correct: [a]
    explanation: 'Mobile-first начинает с самого узкого экрана: базовые стили без условий - под телефон, а медиазапросы min-width добавляют колонки и усложнения на широких экранах. Это даёт меньше переопределений, чем обратный порядок.'
    hints:
      - 'Название подхода подсказывает, с какого экрана начинают.'
    variants:
      - prompt: 'Когда сработают правила внутри @media (min-width: 768px)?'
        choices:
          - id: a
            text: 'Когда ширина вьюпорта не меньше 768px.'
          - id: b
            text: 'Когда ширина вьюпорта строго меньше 768px.'
          - id: c
            text: 'Только на экранах ровно 768px шириной.'
          - id: d
            text: 'Всегда, независимо от ширины.'
        correct: [a]
        explanation: 'min-width задаёт нижнюю границу: правила включаются от 768px и шире. До этого порога действуют базовые стили.'
      - prompt: 'Что означает единица vw?'
        choices:
          - id: a
            text: 'Один процент ширины вьюпорта.'
          - id: b
            text: 'Один пиксель.'
          - id: c
            text: 'Один процент высоты вьюпорта.'
          - id: d
            text: 'Ширину одного символа шрифта.'
        correct: [a]
        explanation: '1vw - это 1% ширины вьюпорта. При окне 600px значение 5vw равно 30px. Процент высоты вьюпорта - это отдельная единица vh.'

  - id: resp-blanks-002
    concept: responsive
    type: fill-in-blanks
    difficulty: 2
    prompt: 'Сетка карточек должна становиться трёхколоночной начиная с ширины 768px. Впишите пороговое значение медиазапроса.'
    template: |
      @media (min-width: {{value}}) {
        .cards {
          grid-template-columns: repeat(3, 1fr);
        }
      }
    blanks:
      value:
        accept: ['768px']
    explanation: 'Порог 768px включает трёхколоночную раскладку на экранах шириной от 768px и выше; до него действует базовая одноколоночная сетка.'
    hints:
      - 'Впишите значение точки перелома целиком, вместе с единицей.'
    variants:
      - prompt: 'Размер шрифта должен плавно расти с шириной экрана, но оставаться между 24px и 48px. Впишите название функции.'
        template: |
          .title {
            font-size: {{value}}(24px, 5vw, 48px);
          }
        blanks:
          value:
            accept: ['clamp']
      - prompt: 'Чтобы компонент реагировал на ширину своего контейнера, контейнеру нужно разрешить замер размера. Впишите значение container-type.'
        template: |
          .sidebar {
            container-type: {{value}};
          }
        blanks:
          value:
            accept: ['inline-size']

  - id: resp-clamp-value-003
    concept: responsive
    type: predict-output
    difficulty: 3
    prompt: 'Ширина вьюпорта - 600px. Чему равен вычисленный font-size заголовка в пикселях? Введите число без единиц.'
    snippet: |
      .title {
        font-size: clamp(24px, 5vw, 48px);
      }
    expected:
      kind: scalar
      value: 30
    explanation: '5vw при ширине 600px равно 5% от 600 = 30px. Значение 30 лежит внутри коридора [24, 48], поэтому границы не срабатывают, и итоговый размер - 30px.'
    hints:
      - 'Сначала вычислите идеальное значение: сколько пикселей даёт 5vw при ширине вьюпорта 600px?'
      - 'Проверьте, попадает ли результат в коридор между min (24px) и max (48px). Если да - он и есть ответ.'

  - id: resp-container-query-004
    concept: responsive
    type: theory-quiz
    difficulty: 4
    prompt: 'Одна и та же карточка должна быть горизонтальной в широкой основной колонке и вертикальной в узкой боковой - при этом экран один и тот же. Какой инструмент решает задачу правильно?'
    choices:
      - id: a
        text: 'Container queries: карточка реагирует на'
      - id: b
        text: 'Обычный @media по ширине вьюпорта.'
      - id: c
        text: 'Свойство order у карточки.'
      - id: d
        text: 'Увеличение z-index карточки.'
    correct: [a]
    explanation: 'Медиазапрос смотрит на ширину всего экрана, а он одинаков для обеих колонок. Container queries замеряют размер конкретного контейнера, поэтому карточка перестраивается под доступное ей место - независимо от размера экрана.'
    hints:
      - 'Проблема в том, что экран один, а места вокруг карточки - разное. На что должен смотреть запрос?'
      - 'Нужен запрос не к вьюпорту, а к контейнеру компонента.'
