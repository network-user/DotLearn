exercises:
  - id: flex-axes-001
    concept: flexbox
    type: theory-quiz
    difficulty: 1
    prompt: 'Контейнер: display: flex; flex-direction: row. Какое свойство распределяет элементы вдоль главной (горизонтальной) оси?'
    choices:
      - id: a
        text: 'justify-content'
      - id: b
        text: 'align-items'
      - id: c
        text: 'align-content'
      - id: d
        text: 'flex-wrap'
    correct: [a]
    explanation: 'justify-content всегда работает вдоль главной оси, align-items - поперёк неё. При flex-direction: row главная ось горизонтальна, значит распределяет именно justify-content.'
    hints:
      - 'Одно свойство про главную ось, другое - про поперечную. Какая ось сейчас главная?'
    variants:
      - prompt: 'Контейнер: display: flex; flex-direction: row. Какое свойство выравнивает элементы поперёк главной оси (по вертикали)?'
        choices:
          - id: a
            text: 'align-items'
          - id: b
            text: 'justify-content'
          - id: c
            text: 'flex-direction'
          - id: d
            text: 'order'
        correct: [a]
        explanation: 'align-items выравнивает элементы вдоль поперечной оси. При row поперечная ось вертикальна, поэтому вертикальное выравнивание - это align-items.'
      - prompt: 'У контейнера align-items: flex-start. Один элемент нужно выровнять иначе, не трогая контейнер. Какое свойство поставить этому элементу?'
        choices:
          - id: a
            text: 'align-self'
          - id: b
            text: 'justify-self'
          - id: c
            text: 'align-content'
          - id: d
            text: 'order'
        correct: [a]
        explanation: 'align-self переопределяет align-items контейнера только для одного конкретного элемента, не затрагивая остальных.'

  - id: flex-blanks-002
    concept: flexbox
    type: fill-in-blanks
    difficulty: 2
    prompt: 'Ряд карточек на узком экране сжимается до нечитаемой ширины. Впишите значение, разрешающее перенос карточек на новую строку.'
    template: |
      .cards {
        display: flex;
        flex-wrap: {{value}};
      }
    blanks:
      value:
        accept: ['wrap']
    explanation: 'flex-wrap: wrap разрешает перенос элементов на новую строку, когда места вдоль главной оси не хватает, вместо сжатия до микроскопической ширины.'
    hints:
      - 'По умолчанию контейнер втискивает всё в одну строку. Нужно значение, разрешающее многострочность.'
    variants:
      - prompt: 'Между карточками нужно расстояние 16px без margin на каждой. Впишите название свойства.'
        template: |
          .cards {
            display: flex;
            {{property}}: 16px;
          }
        blanks:
          property:
            accept: ['gap']
      - prompt: 'Элементы контейнера должны выстроиться в колонку сверху вниз вместо ряда. Впишите значение flex-direction.'
        template: |
          .stack {
            display: flex;
            flex-direction: {{value}};
          }
        blanks:
          value:
            accept: ['column']

  - id: flex-grow-two-003
    concept: flexbox
    type: predict-output
    difficulty: 3
    prompt: 'Flex-контейнер шириной 800px содержит два элемента с нулевой базой. Сколько пикселей займёт .b? Введите число без единиц.'
    snippet: |
      .row { display: flex; width: 800px; }
      .a { flex: 1 1 0; }
      .b { flex: 3 1 0; }
    expected:
      kind: scalar
      value: 600
    explanation: 'Базы нулевые, свободного места - все 800px. Сумма grow-долей 1 + 3 = 4, одна доля = 200px. .b получает три доли: 3 × 200 = 600.'
    hints:
      - 'При нулевой базе всё место контейнера - свободное. Как оно делится между элементами?'
      - 'Сложите доли flex-grow, найдите размер одной доли, умножьте на долю нужного элемента.'

  - id: flex-grow-fixed-004
    concept: flexbox
    type: predict-output
    difficulty: 4
    prompt: 'Контейнер 900px содержит фиксированную панель и две растущие колонки. Сколько пикселей займёт .b? Введите число без единиц.'
    snippet: |
      .row { display: flex; width: 900px; }
      .panel { flex: 0 0 300px; }
      .b { flex: 2 1 0; }
      .c { flex: 1 1 0; }
    expected:
      kind: scalar
      value: 400
    explanation: '.panel не растёт и не сжимается - фиксирован на 300px. Остаток 900 − 300 = 600px делится между .b и .c пропорционально grow 2:1. Одна доля = 600 / 3 = 200; .b получает две доли: 400.'
    hints:
      - 'Сначала вычтите фиксированную ширину панели из ширины контейнера.'
      - 'Оставшееся место разделите между растущими колонками пропорционально их flex-grow.'

  - id: flex-shrink-weighted-005
    concept: flexbox
    type: predict-output
    difficulty: 5
    prompt: 'Элементы не помещаются и сжимаются. Сколько пикселей займёт .b после сжатия? Введите число без единиц.'
    snippet: |
      .row { display: flex; width: 300px; }
      .a { flex-shrink: 1; flex-basis: 400px; }
      .b { flex-shrink: 2; flex-basis: 200px; }
    expected:
      kind: scalar
      value: 50
    explanation: 'Суммарная база 400 + 200 = 600px, переполнение 600 − 300 = 300px. Доля сжатия взвешивается на flex-shrink × flex-basis: у .a это 1 × 400 = 400, у .b это 2 × 200 = 400 - веса равны. Переполнение 300 делится поровну: каждый ужимается на 150. .b = 200 − 150 = 50.'
    hints:
      - 'При сжатии доля определяется не только flex-shrink, но и flex-basis. Найдите переполнение контейнера.'
      - 'Вес сжатия каждого элемента - это произведение flex-shrink на flex-basis. Сравните веса .a и .b, затем распределите переполнение.'
