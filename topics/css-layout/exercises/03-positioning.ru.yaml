exercises:
  - id: pos-basics-001
    concept: positioning
    type: theory-quiz
    difficulty: 1
    prompt: 'Что делает position: relative с элементом?'
    choices:
      - id: a
        text: 'Смещает его от места в потоке на top/left, но исходное место остаётся'
      - id: b
        text: 'Полностью вынимает элемент из потока, и соседи смыкаются.'
      - id: c
        text: 'Привязывает элемент к вьюпорту при прокрутке.'
      - id: d
        text: 'Ничего: top и left на relative не действуют.'
    correct: [a]
    explanation: 'relative сдвигает элемент относительно его собственного места в потоке, но место при этом сохраняется - соседи не сдвигаются. Из потока элемент не выпадает.'
    hints:
      - 'Ключевое отличие relative от absolute: сохраняется ли исходное место элемента.'
    variants:
      - prompt: 'Что делает position: absolute с элементом?'
        choices:
          - id: a
            text: 'Вынимает его из потока и позиционирует относительно ближайшего'
          - id: b
            text: 'Оставляет в потоке, лишь смещая на top/left.'
          - id: c
            text: 'Всегда позиционирует строго относительно прямого родителя.'
          - id: d
            text: 'Привязывает элемент к вьюпорту.'
        correct: [a]
        explanation: 'absolute убирает элемент из потока (место освобождается) и отсчитывает координаты от ближайшего предка с position не static; если такого нет - от корневого блока.'
      - prompt: 'Что делает position: fixed с элементом?'
        choices:
          - id: a
            text: 'Привязывает его к вьюпорту'
          - id: b
            text: 'Прилипает к порогу только после прокрутки до него.'
          - id: c
            text: 'Оставляет элемент в потоке без изменений.'
          - id: d
            text: 'Позиционирует относительно прямого родителя.'
        correct: [a]
        explanation: 'fixed привязывает элемент к вьюпорту, поэтому он не двигается при прокрутке - так делают шапки, кнопки «наверх» и модальные окна.'

  - id: pos-containing-blanks-002
    concept: positioning
    type: fill-in-blanks
    difficulty: 2
    prompt: 'Крестик закрытия (position: absolute) должен отсчитывать координаты от карточки, а не от всей страницы. Впишите значение position для карточки-контейнера.'
    template: |
      .card {
        position: {{value}};
      }
      .card__close {
        position: absolute;
        top: 8px;
        right: 8px;
      }
    blanks:
      value:
        accept: ['relative']
    explanation: 'position: relative делает карточку containing block для абсолютного потомка, ничего не сдвигая. Без него крестик отсчитывал бы координаты от корневого блока и уехал бы в угол экрана.'
    hints:
      - 'Нужно значение, которое делает элемент точкой отсчёта для absolute-потомка, но не двигает его самого.'
    variants:
      - prompt: 'Заголовок секции должен прилипать к верху экрана при прокрутке. Впишите значение position (порог top: 0 уже задан).'
        template: |
          .section-title {
            position: {{value}};
            top: 0;
          }
        blanks:
          value:
            accept: ['sticky']
      - prompt: 'Шапка должна быть постоянно привязана к верху вьюпорта и не двигаться при прокрутке. Впишите значение position.'
        template: |
          .header {
            position: {{value}};
            top: 0;
          }
        blanks:
          value:
            accept: ['fixed']

  - id: pos-sticky-broken-003
    concept: positioning
    type: theory-quiz
    difficulty: 3
    prompt: 'Элементу задали position: sticky и top: 0, но он не прилипает при прокрутке. Что из перечисленного - самая вероятная причина?'
    choices:
      - id: a
        text: 'У одного из предков стоит overflow'
      - id: b
        text: 'Элементу не хватает z-index.'
      - id: c
        text: 'sticky работает только вместе с float.'
      - id: d
        text: 'Нужно заменить top на margin-top.'
    correct: [a]
    explanation: 'sticky живёт внутри области прокрутки ближайшего предка. Если у какого-то предка overflow не visible, эта область обрезается, и прилипать становится не к чему. Порог top задан, значит дело не в нём.'
    hints:
      - 'sticky прилипает относительно области прокрутки. Что могло эту область «обрезать» у одного из предков?'
      - 'Проверьте свойство overflow вверх по дереву предков.'

  - id: pos-zindex-context-004
    concept: positioning
    type: theory-quiz
    difficulty: 4
    prompt: 'Элемент A с z-index: 1000 лежит внутри блока с opacity: 0.9. Рядом с этим блоком - элемент B с z-index: 10. A всё равно оказывается ниже B. Почему увеличение z-index у A не помогает?'
    choices:
      - id: a
        text: 'opacity меньше единицы создаёт у блока новый контекст наложения, и'
      - id: b
        text: 'z-index: 1000 превышает максимум и обнуляется.'
      - id: c
        text: 'z-index не работает на элементах с position: relative.'
      - id: d
        text: 'B рисуется позже по времени, поэтому он всегда выше.'
    correct: [a]
    explanation: 'opacity меньше единицы (как и transform, filter) создаёт новый контекст наложения. Внутри него z-index элемента A сравнивается только с соседями внутри блока; относительно B решает уже z-index самого блока. Поэтому наращивать число у A бесполезно - нужно менять иерархию контекстов.'
    hints:
      - 'Дело не в величине z-index, а в том, в каком контексте наложения заперт элемент A.'
      - 'Какое свойство родителя (кроме position с z-index) могло создать новый контекст наложения?'
