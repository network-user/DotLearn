exercises:
  - id: drf-pagination-filtering-style-001
    concept: drf-pagination-filtering
    type: theory-quiz
    difficulty: 1
    prompt: "You need pagination for a large, frequently-changing feed that's resilient to inserts; jumping to an arbitrary page isn't required. What do you pick?"
    choices:
      - id: a
        text: "CursorPagination - stable against inserts and fast at any depth."
      - id: b
        text: "PageNumberPagination - page numbers drift when items are inserted."
      - id: c
        text: "LimitOffsetPagination - a deep offset is expensive for the database."
      - id: d
        text: "No pagination - return the whole feed at once."
    correct: [a]
    explanation: "CursorPagination remembers a threshold on the sort field, so inserts higher up in the list don't cause duplicates or gaps, and depth doesn't slow the query down. The cost is no jumping to an arbitrary page."
    variants:
      - prompt: "Which pagination style gives a familiar paged UI with page numbers via `?page=`?"
        choices:
          - id: a
            text: "PageNumberPagination - pages by number."
          - id: b
            text: "CursorPagination - only forward/back, no numbers."
          - id: c
            text: "LimitOffsetPagination - a window by limit and offset."
          - id: d
            text: "None - DRF doesn't support page numbers."
        correct: [a]
        explanation: "PageNumberPagination thinks in page numbers (?page=3), which fits a paged UI. CursorPagination has no numbers."
      - prompt: "The client needs arbitrary slices with an explicit window size via `?limit=&offset=`. What fits?"
        choices:
          - id: a
            text: "LimitOffsetPagination - the window is set by limit and offset."
          - id: b
            text: "PageNumberPagination - only whole pages by number."
          - id: c
            text: "CursorPagination - you can't set a window size."
          - id: d
            text: "SearchFilter - it controls the size of the result."
        correct: [a]
        explanation: "LimitOffsetPagination gives the client control over the window size (limit) and the offset (offset) - that's about arbitrary slices."

  - id: drf-pagination-filtering-backends-002
    concept: drf-pagination-filtering
    type: theory-quiz
    difficulty: 2
    prompt: "A client sends `?search=book`. Which backend handles this and how?"
    choices:
      - id: a
        text: "SearchFilter - looks for a substring match across fields listed in search_fields."
      - id: b
        text: "DjangoFilterBackend - requires exact equality on a field."
      - id: c
        text: "OrderingFilter - sets the row order."
      - id: d
        text: "The paginator - cuts a page based on the word."
    correct: [a]
    explanation: "?search=... is handled by SearchFilter: a substring match across several fields listed in search_fields at once. Exact equality is DjangoFilterBackend on a specific field."
    variants:
      - prompt: "How does `?status=paid` (filterset_fields) differ from `?search=paid` (search_fields)?"
        choices:
          - id: a
            text: "The first is an exact field match, the second is a substring match across several fields."
          - id: b
            text: "They're the same thing, the parameters are interchangeable."
          - id: c
            text: "The first sorts, the second filters."
          - id: d
            text: "The first is about pagination, the second about throttling."
        correct: [a]
        explanation: "filterset_fields gives exact equality on a field, SearchFilter gives a fuzzy substring match on text. Different operations, different query parameters."
      - prompt: "What does throttling handle in DRF?"
        choices:
          - id: a
            text: "It limits request rate; exceeding it returns 429."
          - id: b
            text: "It limits response size by trimming rows."
          - id: c
            text: "It sorts output by a field."
          - id: d
            text: "It picks the API version for the request."
        correct: [a]
        explanation: "Throttling is about rate - how often you can call it, 429 when exceeded. Response size is trimmed by pagination - a different axis."

  - id: drf-pagination-filtering-fill-paginator-003
    concept: drf-pagination-filtering
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete a ViewSet that searches by text and sorts by allowed fields."
    template: |
      class ItemViewSet(viewsets.ModelViewSet):
          queryset = Item.objects.all()
          serializer_class = ItemSerializer
          filter_backends = [SearchFilter, OrderingFilter]
          {{search}} = ["title", "description"]
          {{ordering}} = ["created", "price"]
    blanks:
      search:
        accept: ["search_fields"]
      ordering:
        accept: ["ordering_fields"]
    variants:
      - prompt: "Complete exact filtering by fields using django-filter."
        template: |
          class ItemViewSet(viewsets.ModelViewSet):
              queryset = Item.objects.all()
              serializer_class = ItemSerializer
              filter_backends = [DjangoFilterBackend]
              {{fields}} = ["status", "category"]
        blanks:
          fields:
            accept: ["filterset_fields"]
      - prompt: "Complete rate limiting per user."
        template: |
          from rest_framework.throttling import UserRateThrottle

          class ItemViewSet(viewsets.ModelViewSet):
              queryset = Item.objects.all()
              serializer_class = ItemSerializer
              {{attr}} = [UserRateThrottle]
        blanks:
          attr:
            accept: ["throttle_classes"]

  - id: drf-pagination-filtering-predict-offset-004
    concept: drf-pagination-filtering
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? It repeats PageNumberPagination's formula: offset = (page - 1) * page_size."
    snippet: |
      def offset(page, page_size):
          return (page - 1) * page_size

      print(offset(1, 20))
      print(offset(3, 20))
      print(offset(5, 10))
    expected:
      kind: stdout
      value: |-
        0
        40
        40
    hints:
      - "Pages are numbered from one, offset from zero. How many rows do you need to skip to reach the start of page page?"
      - "offset = (page - 1) * page_size. For page one there's nothing to skip (0). For page=3, size=20 that's 2*20."
    variants:
      - snippet: |
          def offset(page, page_size):
              return (page - 1) * page_size

          print(offset(2, 25))
          print(offset(4, 25))
          print(offset(1, 100))
        expected:
          kind: stdout
          value: |-
            25
            75
            0
      - snippet: |
          def offset(page, page_size):
              return (page - 1) * page_size

          print(offset(10, 10))
          print(offset(1, 50))
          print(offset(3, 15))
        expected:
          kind: stdout
          value: |-
            90
            0
            30

  - id: drf-pagination-filtering-predict-pages-005
    concept: drf-pagination-filtering
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It computes the page count as ceil(total / page_size) using integer arithmetic."
    snippet: |
      def page_count(total, page_size):
          return (total + page_size - 1) // page_size

      print(page_count(100, 20))
      print(page_count(101, 20))
      print(page_count(0, 20))
    expected:
      kind: stdout
      value: |-
        5
        6
        0
    hints:
      - "The page count rounds up: even one extra row needs a whole new page. How is ceil expressed without fractions?"
      - "Formula (total + page_size - 1) // page_size. 100/20 is exactly 5; 101 needs a sixth page for one row; 0 rows means 0 pages."
    variants:
      - snippet: |
          def page_count(total, page_size):
              return (total + page_size - 1) // page_size

          print(page_count(50, 25))
          print(page_count(51, 25))
          print(page_count(10, 25))
        expected:
          kind: stdout
          value: |-
            2
            3
            1
      - snippet: |
          def page_count(total, page_size):
              return (total + page_size - 1) // page_size

          print(page_count(99, 10))
          print(page_count(100, 10))
          print(page_count(1, 10))
        expected:
          kind: stdout
          value: |-
            10
            10
            1

  - id: drf-pagination-filtering-predict-window-006
    concept: drf-pagination-filtering
    type: predict-output
    difficulty: 4
    prompt: "What does the program print? It models LimitOffsetPagination over a list of 6 items: it prints how many items fell in the window [offset:offset+limit], and whether there's a next page (next or last)."
    snippet: |
      total = 6

      def page(offset, limit):
          start = min(offset, total)
          end = min(offset + limit, total)
          size = end - start
          flag = "next" if offset + limit < total else "last"
          print(size, flag)

      page(0, 2)
      page(2, 2)
      page(4, 2)
    expected:
      kind: stdout
      value: |-
        2 next
        2 next
        2 last
    hints:
      - "The window is clamped by the list's bounds: it can't go past the end. There's a next page only if items remain past the end of the window."
      - "The window size is end minus start after clamping to total. The flag compares offset+limit to total: reaching the end means last."
      - "For offset=4, limit=2: end = min(6,6) = 6, size = 6-4 = 2, and offset+limit = 6, which isn't less than 6, so last."
    variants:
      - snippet: |
          total = 6

          def page(offset, limit):
              start = min(offset, total)
              end = min(offset + limit, total)
              size = end - start
              flag = "next" if offset + limit < total else "last"
              print(size, flag)

          page(0, 3)
          page(3, 3)
          page(5, 3)
        expected:
          kind: stdout
          value: |-
            3 next
            3 last
            1 last
      - snippet: |
          total = 6

          def page(offset, limit):
              start = min(offset, total)
              end = min(offset + limit, total)
              size = end - start
              flag = "next" if offset + limit < total else "last"
              print(size, flag)

          page(1, 2)
          page(0, 6)
          page(4, 5)
        expected:
          kind: stdout
          value: |-
            2 next
            6 last
            2 last
