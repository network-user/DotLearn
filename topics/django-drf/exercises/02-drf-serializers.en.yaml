exercises:
  - id: drf-serializers-direction-001
    concept: drf-serializers
    type: theory-quiz
    difficulty: 1
    prompt: "What do you need to call after `serializer = OrderSerializer(data=request.data)`, before reading `validated_data`?"
    choices:
      - id: a
        text: "serializer.is_valid() - there simply is no cleaned data before the check."
      - id: b
        text: "serializer.data - it will fill validated_data by itself."
      - id: c
        text: "serializer.save() right away, validation runs inside save."
      - id: d
        text: "Nothing, validated_data is available right after creation."
    correct: [a]
    explanation: "validated_data only appears after a successful is_valid(); accessing it earlier raises AssertionError. Check first, then access the cleaned data."
    variants:
      - prompt: "How do you get a dict of primitives for a response from an `order` object?"
        choices:
          - id: a
            text: "OrderSerializer(order).data"
          - id: b
            text: "OrderSerializer(data=order).validated_data"
          - id: c
            text: "OrderSerializer(order).is_valid()"
          - id: d
            text: "OrderSerializer(order).save()"
        correct: [a]
        explanation: "Serialization is passing the object into the constructor (without data=) and reading .data. That's how you get a dict ready to go into a Response."
      - prompt: "What does `serializer.data` return for an already-saved object?"
        choices:
          - id: a
            text: "A dict of primitives (id, fields), ready to send as JSON."
          - id: b
            text: "The model object itself, unchanged."
          - id: c
            text: "A list of validation errors."
          - id: d
            text: "The SQL query the object was loaded with."
        correct: [a]
        explanation: ".data is the result of serialization: the object turned into a dict of primitives. That's what goes into the Response, not the input request.data."

  - id: drf-serializers-validation-002
    concept: drf-serializers
    type: theory-quiz
    difficulty: 2
    prompt: "Where should you put a check like discount can't exceed amount, if it relies on two fields at once?"
    choices:
      - id: a
        text: "In validate(self, attrs) - it receives all the fields together."
      - id: b
        text: "In validate_discount(self, value) - it only sees one field."
      - id: c
        text: "In Meta.fields, comma-separated."
      - id: d
        text: "In create(), after the object is already saved."
    correct: [a]
    explanation: "Cross-field checks that need several fields live in validate(attrs): it receives a dict of all the fields that already passed. validate_<field> only sees its own field."
    variants:
      - prompt: "What does `read_only=True` do on a serializer field?"
        choices:
          - id: a
            text: "The field goes out in .data, but is ignored on input when writing."
          - id: b
            text: "The field is accepted on write, but doesn't appear in the response."
          - id: c
            text: "The field becomes required both for reading and writing."
          - id: d
            text: "The field disappears from the serializer entirely."
        correct: [a]
        explanation: "read_only is outbound only: typical for id and server-set dates. The opposite is write_only, which accepts input but doesn't return it (e.g. password)."
      - prompt: "What's the `source` argument on a serializer field for?"
        choices:
          - id: a
            text: "Decouples the JSON key name from the object's attribute name, e.g. source=\"owner.username\"."
          - id: b
            text: "Specifies which database to read the value from."
          - id: c
            text: "Sets a default value for the field."
          - id: d
            text: "Makes the field required on input."
        correct: [a]
        explanation: "source sets which object attribute to read the value from; the JSON key can be named differently from the model field."

  - id: drf-serializers-fill-flow-003
    concept: drf-serializers
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete the deserialization: validate the data and save the object."
    template: |
      serializer = OrderSerializer(data=request.data)
      serializer.{{check}}(raise_exception=True)
      order = serializer.{{persist}}()
    blanks:
      check:
        accept: ["is_valid"]
      persist:
        accept: ["save"]
    variants:
      - prompt: "Complete the ModelSerializer: specify the model and the list of fields."
        template: |
          class OrderSerializer(serializers.ModelSerializer):
              class Meta:
                  {{attr}} = Order
                  fields = ["id", "title", "{{amount}}"]
        blanks:
          attr:
            accept: ["model"]
          amount:
            accept: ["amount"]
      - prompt: "Complete a field that's accepted on write but not returned in the response."
        template: |
          class UserSerializer(serializers.ModelSerializer):
              password = serializers.CharField({{flag}}=True)

              class Meta:
                  model = User
                  fields = ["id", "username", "password"]
        blanks:
          flag:
            accept: ["write_only"]

  - id: drf-serializers-fill-validate-004
    concept: drf-serializers
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete a single-field check: the amount must be positive. The method must return the value."
    template: |
      def validate_amount(self, value):
          if value <= 0:
              raise serializers.{{error}}("amount must be positive")
          {{ret}} value
    blanks:
      error:
        accept: ["ValidationError"]
      ret:
        accept: ["return"]
    variants:
      - prompt: "Complete a cross-field check: the method name and the returned dict of fields."
        template: |
          def {{method}}(self, attrs):
              if attrs["discount"] > attrs["amount"]:
                  raise serializers.ValidationError("discount is greater than amount")
              return {{value}}
        blanks:
          method:
            accept: ["validate"]
          value:
            accept: ["attrs"]
      - prompt: "Complete a read-only nested serializer for line items inside an order."
        template: |
          class OrderSerializer(serializers.ModelSerializer):
              items = ItemSerializer(many=True, {{flag}}=True)

              class Meta:
                  model = Order
                  fields = ["id", "title", "items"]
        blanks:
          flag:
            accept: ["read_only"]

  - id: drf-serializers-predict-coerce-005
    concept: drf-serializers
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? It repeats the type coercion done by serializer fields: IntegerField coerces the input to int, CharField to a string."
    snippet: |
      def integer_field(value):
          return int(value)

      def char_field(value):
          return str(value)

      print(integer_field("540"))
      print(char_field(42))
    expected:
      kind: stdout
      value: |-
        540
        42
    hints:
      - "IntegerField coerces input to an integer, CharField to a string. What do int(\"540\") and str(42) produce?"
      - "int(\"540\") gives the number 540, str(42) gives the string \"42\"; print prints them line by line without quotes."
    variants:
      - snippet: |
          def integer_field(value):
              return int(value)

          def char_field(value):
              return str(value)

          print(integer_field("17"))
          print(char_field(100))
        expected:
          kind: stdout
          value: |-
            17
            100
      - snippet: |
          def boolean_field(value):
              return value in ("true", "1", True)

          print(boolean_field("true"))
          print(boolean_field("0"))
        expected:
          kind: stdout
          value: |-
            True
            False

  - id: drf-serializers-predict-validate-006
    concept: drf-serializers
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It models the validation order: field validator first, then cross-field validate(attrs). The first error stops the check."
    snippet: |
      def validate_amount(value):
          if value <= 0:
              return "field-error"
          return None

      def validate(attrs):
          if attrs["discount"] > attrs["amount"]:
              return "object-error"
          return None

      def run(attrs):
          field_error = validate_amount(attrs["amount"])
          if field_error:
              return field_error
          return validate(attrs)

      print(run({"amount": 100, "discount": 30}))
      print(run({"amount": 0, "discount": 30}))
      print(run({"amount": 100, "discount": 150}))
    expected:
      kind: stdout
      value: |-
        None
        field-error
        object-error
    hints:
      - "The field validator runs first. If it returns an error, the cross-field validate(attrs) check never runs."
      - "The first set is valid - None. The second fails validate_amount (amount=0), so field-error comes first. The third passes the field check but fails validate."
    variants:
      - snippet: |
          def validate_amount(value):
              if value <= 0:
                  return "field-error"
              return None

          def validate(attrs):
              if attrs["discount"] > attrs["amount"]:
                  return "object-error"
              return None

          def run(attrs):
              field_error = validate_amount(attrs["amount"])
              if field_error:
                  return field_error
              return validate(attrs)

          print(run({"amount": -5, "discount": 0}))
          print(run({"amount": 200, "discount": 200}))
          print(run({"amount": 50, "discount": 80}))
        expected:
          kind: stdout
          value: |-
            field-error
            None
            object-error
      - snippet: |
          def validate_amount(value):
              if value <= 0:
                  return "field-error"
              return None

          def validate(attrs):
              if attrs["discount"] > attrs["amount"]:
                  return "object-error"
              return None

          def run(attrs):
              field_error = validate_amount(attrs["amount"])
              if field_error:
                  return field_error
              return validate(attrs)

          print(run({"amount": 0, "discount": 0}))
          print(run({"amount": 10, "discount": 999}))
          print(run({"amount": 10, "discount": 10}))
        expected:
          kind: stdout
          value: |-
            field-error
            object-error
            None

  - id: drf-serializers-predict-save-007
    concept: drf-serializers
    type: predict-output
    difficulty: 4
    prompt: "What does the program print? It models how save() picks its path: no instance calls create, an instance calls update."
    snippet: |
      def save(instance, validated_data):
          if instance is None:
              return "create:" + validated_data["title"]
          return "update:" + str(instance)

      print(save(None, {"title": "new"}))
      print(save(7, {"title": "edit"}))
      print(save(None, {"title": "again"}))
    expected:
      kind: stdout
      value: |-
        create:new
        update:7
        create:again
    hints:
      - "save() looks at instance: its absence means create, its presence means update. Which argument is passed first in each call?"
      - "The first and third calls pass instance=None, so they create and take title from the data. The second passes instance=7, so it updates and prints the object itself."
    variants:
      - snippet: |
          def save(instance, validated_data):
              if instance is None:
                  return "create:" + validated_data["title"]
              return "update:" + str(instance)

          print(save(3, {"title": "x"}))
          print(save(None, {"title": "fresh"}))
          print(save(99, {"title": "y"}))
        expected:
          kind: stdout
          value: |-
            update:3
            create:fresh
            update:99
      - snippet: |
          def save(instance, validated_data):
              if instance is None:
                  return "create:" + validated_data["title"]
              return "update:" + str(instance)

          print(save(None, {"title": "a"}))
          print(save(None, {"title": "b"}))
          print(save(1, {"title": "c"}))
        expected:
          kind: stdout
          value: |-
            create:a
            create:b
            update:1
