exercises:
  - id: drf-serializers-direction-001
    concept: drf-serializers
    type: theory-quiz
    difficulty: 1
    prompt: "Что нужно вызвать после `serializer = OrderSerializer(data=request.data)`, прежде чем читать `validated_data`?"
    choices:
      - id: a
        text: "serializer.is_valid() - до проверки очищенных данных просто нет."
      - id: b
        text: "serializer.data - оно само заполнит validated_data."
      - id: c
        text: "serializer.save() сразу, валидация запустится внутри save."
      - id: d
        text: "Ничего, validated_data доступен сразу после создания."
    correct: [a]
    explanation: "validated_data появляется только после успешного is_valid(); обращение к нему раньше бросает AssertionError. Сначала проверка, потом доступ к очищенным данным."
    variants:
      - prompt: "Как из объекта `order` получить словарь примитивов для ответа?"
        choices:
          - id: a
            text: "OrderSerializer(order).data"
          - id: b
            text: "OrderSerializer(data=order).validated_data"
          - id: c
            text: "OrderSerializer(order).is_valid()"
          - id: d
            text: "OrderSerializer(order).save()"
        correct: [a]
        explanation: "Сериализация - это объект на вход конструктора (без data=) и чтение .data. Так получается словарь, готовый уехать в Response."
      - prompt: "Что отдаёт `serializer.data` для уже сохранённого объекта?"
        choices:
          - id: a
            text: "Словарь примитивов, готовый к отправке в"
          - id: b
            text: "Сам объект модели без изменений."
          - id: c
            text: "Список ошибок валидации."
          - id: d
            text: "SQL-запрос, которым объект был загружен."
        correct: [a]
        explanation: ".data - это результат сериализации: объект превращён в словарь примитивов. Именно его кладут в Response, а не входной request.data."

  - id: drf-serializers-validation-002
    concept: drf-serializers
    type: theory-quiz
    difficulty: 2
    prompt: "Где разместить проверку «скидка не больше суммы», если она опирается сразу на два поля?"
    choices:
      - id: a
        text: "В методе validate(self, attrs) - он получает все поля сразу."
      - id: b
        text: "В методе validate_discount(self, value) - он видит только одно поле."
      - id: c
        text: "В Meta.fields через запятую."
      - id: d
        text: "В create(), уже после сохранения."
    correct: [a]
    explanation: "Перекрёстные проверки, которым нужно несколько полей, живут в validate(attrs): туда приходит словарь всех прошедших поля значений. validate_<field> видит лишь своё поле."
    variants:
      - prompt: "Что делает `read_only=True` у поля сериализатора?"
        choices:
          - id: a
            text: "Поле уходит наружу в .data, но игнорируется на входе при записи."
          - id: b
            text: "Поле принимается на запись, но не попадает в ответ."
          - id: c
            text: "Поле становится обязательным и при чтении, и при записи."
          - id: d
            text: "Поле полностью исчезает из сериализатора."
        correct: [a]
        explanation: "read_only - только наружу: типично для id и серверных дат. Противоположность - write_only, которое принимает на запись, но не возвращает (например, password)."
      - prompt: "Зачем полю сериализатора аргумент `source`?"
        choices:
          - id: a
            text: "Связать ключ JSON с другим атрибутом, например source=\"owner.username\"."
          - id: b
            text: "Указать, из какой базы данных нужно читать значение поля."
          - id: c
            text: "Задать значение по умолчанию, если поле на входе отсутствует."
          - id: d
            text: "Сделать поле обязательным, чтобы клиент всегда его присылал."
        correct: [a]
        explanation: "source задаёт, из какого атрибута объекта читать значение; ключ в JSON может называться иначе, чем поле модели."

  - id: drf-serializers-fill-flow-003
    concept: drf-serializers
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите десериализацию: проверьте данные и сохраните объект."
    template: |
      serializer = OrderSerializer(data=request.data)
      serializer.{{check}}(raise_exception=True)
      order = serializer.{{persist}}()
    blanks:
      check:
        accept: ["is_valid"]
      persist:
        accept: ["save"]
    variants:
      - prompt: "Допишите ModelSerializer: укажите модель и список полей."
        template: |
          class OrderSerializer(serializers.ModelSerializer):
              class Meta:
                  {{attr}} = Order
                  fields = ["id", "title", "{{amount}}"]
        blanks:
          attr:
            accept: ["model"]
          amount:
            accept: ["amount"]
      - prompt: "Допишите поле, которое принимается на запись, но не возвращается в ответе."
        template: |
          class UserSerializer(serializers.ModelSerializer):
              password = serializers.CharField({{flag}}=True)

              class Meta:
                  model = User
                  fields = ["id", "username", "password"]
        blanks:
          flag:
            accept: ["write_only"]

  - id: drf-serializers-fill-validate-004
    concept: drf-serializers
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите проверку одного поля: сумма должна быть положительной. Метод обязан вернуть значение."
    template: |
      def validate_amount(self, value):
          if value <= 0:
              raise serializers.{{error}}("сумма должна быть положительной")
          {{ret}} value
    blanks:
      error:
        accept: ["ValidationError"]
      ret:
        accept: ["return"]
    variants:
      - prompt: "Допишите перекрёстную проверку: имя метода и возвращаемый словарь полей."
        template: |
          def {{method}}(self, attrs):
              if attrs["discount"] > attrs["amount"]:
                  raise serializers.ValidationError("скидка больше суммы")
              return {{value}}
        blanks:
          method:
            accept: ["validate"]
          value:
            accept: ["attrs"]
      - prompt: "Допишите вложенный сериализатор позиций на чтение внутри заказа."
        template: |
          class OrderSerializer(serializers.ModelSerializer):
              items = ItemSerializer(many=True, {{flag}}=True)

              class Meta:
                  model = Order
                  fields = ["id", "title", "items"]
        blanks:
          flag:
            accept: ["read_only"]

  - id: drf-serializers-predict-coerce-005
    concept: drf-serializers
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Она повторяет приведение типов полями сериализатора: IntegerField приводит вход к int, CharField - к строке."
    snippet: |
      def integer_field(value):
          return int(value)

      def char_field(value):
          return str(value)

      print(integer_field("540"))
      print(char_field(42))
    expected:
      kind: stdout
      value: |-
        540
        42
    hints:
      - "IntegerField приводит вход к целому, CharField - к строке. Что делают int(\"540\") и str(42)?"
      - "int(\"540\") даёт число 540, str(42) даёт строку \"42\"; print печатает их по строкам без кавычек."
    variants:
      - snippet: |
          def integer_field(value):
              return int(value)

          def char_field(value):
              return str(value)

          print(integer_field("17"))
          print(char_field(100))
        expected:
          kind: stdout
          value: |-
            17
            100
      - snippet: |
          def boolean_field(value):
              return value in ("true", "1", True)

          print(boolean_field("true"))
          print(boolean_field("0"))
        expected:
          kind: stdout
          value: |-
            True
            False

  - id: drf-serializers-predict-validate-006
    concept: drf-serializers
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она моделирует порядок валидации: сначала поле-валидатор, потом перекрёстный validate(attrs). Первая ошибка прерывает проверку."
    snippet: |
      def validate_amount(value):
          if value <= 0:
              return "field-error"
          return None

      def validate(attrs):
          if attrs["discount"] > attrs["amount"]:
              return "object-error"
          return None

      def run(attrs):
          field_error = validate_amount(attrs["amount"])
          if field_error:
              return field_error
          return validate(attrs)

      print(run({"amount": 100, "discount": 30}))
      print(run({"amount": 0, "discount": 30}))
      print(run({"amount": 100, "discount": 150}))
    expected:
      kind: stdout
      value: |-
        None
        field-error
        object-error
    hints:
      - "Поле-валидатор отрабатывает первым. Если он вернул ошибку, до перекрёстной проверки validate(attrs) дело не дойдёт."
      - "Первый набор валиден - None. Второй валит validate_amount (amount=0), поэтому field-error раньше всего. Третий проходит поле, но валит validate."
    variants:
      - snippet: |
          def validate_amount(value):
              if value <= 0:
                  return "field-error"
              return None

          def validate(attrs):
              if attrs["discount"] > attrs["amount"]:
                  return "object-error"
              return None

          def run(attrs):
              field_error = validate_amount(attrs["amount"])
              if field_error:
                  return field_error
              return validate(attrs)

          print(run({"amount": -5, "discount": 0}))
          print(run({"amount": 200, "discount": 200}))
          print(run({"amount": 50, "discount": 80}))
        expected:
          kind: stdout
          value: |-
            field-error
            None
            object-error
      - snippet: |
          def validate_amount(value):
              if value <= 0:
                  return "field-error"
              return None

          def validate(attrs):
              if attrs["discount"] > attrs["amount"]:
                  return "object-error"
              return None

          def run(attrs):
              field_error = validate_amount(attrs["amount"])
              if field_error:
                  return field_error
              return validate(attrs)

          print(run({"amount": 0, "discount": 0}))
          print(run({"amount": 10, "discount": 999}))
          print(run({"amount": 10, "discount": 10}))
        expected:
          kind: stdout
          value: |-
            field-error
            object-error
            None

  - id: drf-serializers-predict-save-007
    concept: drf-serializers
    type: predict-output
    difficulty: 4
    prompt: "Что выведет программа? Она моделирует выбор save(): без instance вызывается create, с instance - update."
    snippet: |
      def save(instance, validated_data):
          if instance is None:
              return "create:" + validated_data["title"]
          return "update:" + str(instance)

      print(save(None, {"title": "new"}))
      print(save(7, {"title": "edit"}))
      print(save(None, {"title": "again"}))
    expected:
      kind: stdout
      value: |-
        create:new
        update:7
        create:again
    hints:
      - "save() смотрит на instance: его отсутствие означает создание, наличие - обновление. Какой аргумент передан первым в каждом вызове?"
      - "Первый и третий вызовы идут с instance=None, поэтому create и берут title из данных. Второй передаёт instance=7, поэтому update и печатает сам объект."
    variants:
      - snippet: |
          def save(instance, validated_data):
              if instance is None:
                  return "create:" + validated_data["title"]
              return "update:" + str(instance)

          print(save(3, {"title": "x"}))
          print(save(None, {"title": "fresh"}))
          print(save(99, {"title": "y"}))
        expected:
          kind: stdout
          value: |-
            update:3
            create:fresh
            update:99
      - snippet: |
          def save(instance, validated_data):
              if instance is None:
                  return "create:" + validated_data["title"]
              return "update:" + str(instance)

          print(save(None, {"title": "a"}))
          print(save(None, {"title": "b"}))
          print(save(1, {"title": "c"}))
        expected:
          kind: stdout
          value: |-
            create:a
            create:b
            update:1
