exercises:
  - id: drf-viewsets-routers-mapping-001
    concept: drf-viewsets-routers
    type: theory-quiz
    difficulty: 1
    prompt: "Запрос `GET /items/42/` пришёл в ViewSet, подключённый через router. Какое действие вызовется?"
    choices:
      - id: a
        text: "retrieve - GET по URL с pk означает «получить один объект»."
      - id: b
        text: "list - GET всегда возвращает список."
      - id: c
        text: "update - в URL есть номер объекта."
      - id: d
        text: "create - любой запрос с телом создаёт объект."
    correct: [a]
    explanation: "GET на /items/{pk}/ router сопоставляет с retrieve. list - это GET на коллекции /items/ без pk; update - это PUT, а не GET."
    variants:
      - prompt: "Какое действие вызовет `POST /items/` в ViewSet через router?"
        choices:
          - id: a
            text: "create - POST на коллекции создаёт новый объект."
          - id: b
            text: "list - POST просто возвращает список."
          - id: c
            text: "update - POST обновляет объект."
          - id: d
            text: "retrieve - POST читает один объект."
        correct: [a]
        explanation: "POST на коллекции /items/ - это create. На коллекции живут только list (GET) и create (POST), конкретного объекта там нет."
      - prompt: "Какое действие вызовет `DELETE /items/42/` через router?"
        choices:
          - id: a
            text: "destroy - DELETE по URL с pk удаляет объект."
          - id: b
            text: "list - удаляет все объекты сразу."
          - id: c
            text: "partial_update - DELETE правит часть полей."
          - id: d
            text: "create - DELETE отменяет создание."
        correct: [a]
        explanation: "DELETE на /items/{pk}/ router сопоставляет с destroy. Это действие уровня объекта, поэтому требует pk в URL."

  - id: drf-viewsets-routers-ladder-002
    concept: drf-viewsets-routers
    type: theory-quiz
    difficulty: 2
    prompt: "Нужен полный CRUD по модели Item с минимумом кода. Что выбрать?"
    choices:
      - id: a
        text: "ModelViewSet с queryset и serializer_class, подключённый через router."
      - id: b
        text: "Голый APIView с ручными get/post/put/delete для каждого случая."
      - id: c
        text: "Пять отдельных APIView, по одному на действие."
      - id: d
        text: "Чистый ViewSet без миксинов - он сам реализует CRUD."
    correct: [a]
    explanation: "ModelViewSet реализует все пять действий поверх queryset и serializer, а router строит URL. Голый ViewSet (вариант г) даёт лишь каркас без готовых действий."
    variants:
      - prompt: "Нужны только список и создание на /articles/, без получения по id и удаления. Какой concrete generic подходит?"
        choices:
          - id: a
            text: "ListCreateAPIView - GET (список) и POST (создание) на коллекции."
          - id: b
            text: "RetrieveUpdateDestroyAPIView - работа с одним объектом."
          - id: c
            text: "ModelViewSet - он даёт все пять действий, лишние не нужны."
          - id: d
            text: "RetrieveAPIView - только получение одного объекта."
        correct: [a]
        explanation: "ListCreateAPIView - это ровно GET-список плюс POST-создание на коллекции. RetrieveUpdateDestroyAPIView работает с одним объектом, а не с коллекцией."
      - prompt: "Нужен ресурс только для чтения: список и один объект, без записи. Что взять?"
        choices:
          - id: a
            text: "ReadOnlyModelViewSet - только list и retrieve."
          - id: b
            text: "ModelViewSet - просто не вызывать запись."
          - id: c
            text: "CreateAPIView - он умеет читать."
          - id: d
            text: "DestroyAPIView - только удаление."
        correct: [a]
        explanation: "ReadOnlyModelViewSet даёт ровно list и retrieve и не открывает запись. ModelViewSet открыл бы и create/update/destroy, что здесь лишнее."

  - id: drf-viewsets-routers-fill-viewset-003
    concept: drf-viewsets-routers
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите ViewSet с полным CRUD по модели Item."
    template: |
      from rest_framework import viewsets

      class ItemViewSet(viewsets.{{base}}):
          queryset = Item.objects.all()
          {{serializer}} = ItemSerializer
    blanks:
      base:
        accept: ["ModelViewSet"]
      serializer:
        accept: ["serializer_class"]
    variants:
      - prompt: "Допишите регистрацию ViewSet в роутере под префиксом items."
        template: |
          from rest_framework.routers import DefaultRouter

          router = DefaultRouter()
          router.{{method}}("items", ItemViewSet, basename="item")
          urlpatterns = router.{{urls}}
        blanks:
          method:
            accept: ["register"]
          urls:
            accept: ["urls"]
      - prompt: "Допишите concrete generic для списка и создания на коллекции."
        template: |
          from rest_framework import generics

          class ItemList(generics.{{cls}}):
              queryset = Item.objects.all()
              serializer_class = ItemSerializer
        blanks:
          cls:
            accept: ["ListCreateAPIView"]

  - id: drf-viewsets-routers-fill-mixin-004
    concept: drf-viewsets-routers
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите GenericAPIView с миксинами: список через GET, создание через POST."
    template: |
      from rest_framework import generics, mixins

      class ItemList(mixins.ListModelMixin,
                     mixins.CreateModelMixin,
                     generics.GenericAPIView):
          queryset = Item.objects.all()
          serializer_class = ItemSerializer

          def get(self, request):
              return self.{{list}}(request)

          def post(self, request):
              return self.{{create}}(request)
    blanks:
      list:
        accept: ["list"]
      create:
        accept: ["create"]
    variants:
      - prompt: "Допишите concrete generic для одного объекта: получить, заменить, удалить."
        template: |
          from rest_framework import generics

          class ItemDetail(generics.{{cls}}):
              queryset = Item.objects.all()
              serializer_class = ItemSerializer
        blanks:
          cls:
            accept: ["RetrieveUpdateDestroyAPIView"]
      - prompt: "Допишите ReadOnly-ViewSet (только чтение) по модели Item."
        template: |
          from rest_framework import viewsets

          class ItemViewSet(viewsets.{{base}}):
              queryset = Item.objects.all()
              serializer_class = ItemSerializer
        blanks:
          base:
            accept: ["ReadOnlyModelViewSet"]

  - id: drf-viewsets-routers-predict-action-005
    concept: drf-viewsets-routers
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она моделирует маппинг router'а: по HTTP-методу и наличию pk выбирается действие ViewSet'а."
    snippet: |
      def action_for(method, has_pk):
          if not has_pk:
              return "list" if method == "GET" else "create"
          table = {"GET": "retrieve", "PUT": "update",
                   "PATCH": "partial_update", "DELETE": "destroy"}
          return table[method]

      print(action_for("GET", False))
      print(action_for("GET", True))
      print(action_for("DELETE", True))
    expected:
      kind: stdout
      value: |-
        list
        retrieve
        destroy
    hints:
      - "Сначала смотрят, есть ли pk в URL: без pk это коллекция (list/create), с pk - один объект. Какой запрос идёт без pk?"
      - "Первый вызов без pk и GET → list. Второй с pk и GET → retrieve. Третий с pk и DELETE → destroy через таблицу."
    variants:
      - snippet: |
          def action_for(method, has_pk):
              if not has_pk:
                  return "list" if method == "GET" else "create"
              table = {"GET": "retrieve", "PUT": "update",
                       "PATCH": "partial_update", "DELETE": "destroy"}
              return table[method]

          print(action_for("POST", False))
          print(action_for("PUT", True))
          print(action_for("PATCH", True))
        expected:
          kind: stdout
          value: |-
            create
            update
            partial_update
      - snippet: |
          def action_for(method, has_pk):
              if not has_pk:
                  return "list" if method == "GET" else "create"
              table = {"GET": "retrieve", "PUT": "update",
                       "PATCH": "partial_update", "DELETE": "destroy"}
              return table[method]

          print(action_for("GET", True))
          print(action_for("POST", False))
          print(action_for("DELETE", True))
        expected:
          kind: stdout
          value: |-
            retrieve
            create
            destroy

  - id: drf-viewsets-routers-predict-urls-006
    concept: drf-viewsets-routers
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Она моделирует router: одна регистрация порождает два URL-шаблона - коллекцию и элемент."
    snippet: |
      def routes_for(prefix):
          return [prefix + "/", prefix + "/{pk}/"]

      for route in routes_for("items"):
          print(route)
    expected:
      kind: stdout
      value: |-
        items/
        items/{pk}/
    hints:
      - "Router из одного register строит ровно две строки: коллекцию без pk и элемент с pk. Что добавляется к префиксу в каждой?"
      - "Коллекция - это префикс плюс слеш, элемент - префикс плюс /{pk}/. Цикл печатает обе по порядку."
    variants:
      - snippet: |
          def routes_for(prefix):
              return [prefix + "/", prefix + "/{pk}/"]

          for route in routes_for("orders"):
              print(route)
        expected:
          kind: stdout
          value: |-
            orders/
            orders/{pk}/
      - snippet: |
          def routes_for(prefix):
              return [prefix + "/", prefix + "/{pk}/"]

          for route in routes_for("users"):
              print(route)
        expected:
          kind: stdout
          value: |-
            users/
            users/{pk}/
