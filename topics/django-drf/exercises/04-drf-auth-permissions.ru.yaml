exercises:
  - id: drf-auth-permissions-order-001
    concept: drf-auth-permissions
    type: theory-quiz
    difficulty: 1
    prompt: "Что в DRF происходит раньше для входящего запроса?"
    choices:
      - id: a
        text: "Аутентификация устанавливает request.user, потом права судят этого user."
      - id: b
        text: "Права отказывают или пускают, а уже потом выясняется, кто отправитель."
      - id: c
        text: "View выполняется первой, проверки идут после ответа."
      - id: d
        text: "Throttling считает запросы до того, как известна личность отправителя."
    correct: [a]
    explanation: "Сначала аутентификация ставит request.user, затем права судят его. Иначе правам было бы нечего судить - личность ещё не установлена."
    variants:
      - prompt: "Что делает класс аутентификации, например TokenAuthentication?"
        choices:
          - id: a
            text: "Опознаёт отправителя и устанавливает request.user."
          - id: b
            text: "Решает, можно ли пользователю выполнить действие."
          - id: c
            text: "Ограничивает частоту запросов с одного IP."
          - id: d
            text: "Выбирает формат ответа по заголовку Accept."
        correct: [a]
        explanation: "Класс аутентификации читает запрос (заголовок, cookie) и устанавливает request.user. Решение о доступе - это уже работа классов прав."
      - prompt: "Что делает класс прав, например IsAuthenticated?"
        choices:
          - id: a
            text: "Смотрит на установленный request.user и решает, пускать ли запрос."
          - id: b
            text: "Опознаёт отправителя и заполняет request.user."
          - id: c
            text: "Создаёт токен для пользователя."
          - id: d
            text: "Сериализует объект в JSON."
        correct: [a]
        explanation: "Класс прав судит уже установленную аутентификацией личность и возвращает True/False. Установка request.user - не его работа."

  - id: drf-auth-permissions-codes-002
    concept: drf-auth-permissions
    type: theory-quiz
    difficulty: 2
    prompt: "Анонимный запрос пришёл на endpoint с `permission_classes = [IsAuthenticated]`. Какой код честнее вернуть?"
    choices:
      - id: a
        text: "401 - личность не установлена, смысл «представьтесь»."
      - id: b
        text: "403 - личность установлена, но доступа нет."
      - id: c
        text: "200 - аноним всё равно получает данные."
      - id: d
        text: "500 - отсутствие токена это ошибка сервера."
    correct: [a]
    explanation: "Аноним не опознан, поэтому правильный сигнал - 401 «представьтесь». 403 означало бы «ты опознан, но тебе нельзя», что про другой случай."
    variants:
      - prompt: "Залогиненный обычный пользователь стучится на endpoint с правами IsAdminUser. Какой код?"
        choices:
          - id: a
            text: "403 - личность установлена, но прав не хватает."
          - id: b
            text: "401 - нужно представиться заново."
          - id: c
            text: "200 - раз залогинен, доступ есть."
          - id: d
            text: "404 - endpoint скрыт от неадминов."
        correct: [a]
        explanation: "Пользователь опознан, но прав нет - это 403. Логин он уже прошёл, поэтому 401 «представьтесь» здесь не к месту."
      - prompt: "Чем по смыслу 401 отличается от 403?"
        choices:
          - id: a
            text: "401 - кто ты неизвестно (исправит логин); 403 - кто ты известно, но доступа нет (логин не поможет)."
          - id: b
            text: "401 и 403 - синонимы, выбор случаен."
          - id: c
            text: "401 - ошибка клиента, 403 - ошибка сервера."
          - id: d
            text: "401 про чтение, 403 про запись."
        correct: [a]
        explanation: "401 - незакрытый вопрос личности, чинится входом. 403 - личность известна, но прав нет, повторный логин ничего не даст."

  - id: drf-auth-permissions-fill-perm-003
    concept: drf-auth-permissions
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите endpoint, доступный только аутентифицированным пользователям."
    template: |
      from rest_framework.permissions import IsAuthenticated

      class Profile(APIView):
          {{attr}} = [IsAuthenticated]

          def get(self, request):
              return Response({"user": request.{{user}}.username})
    blanks:
      attr:
        accept: ["permission_classes"]
      user:
        accept: ["user"]
    variants:
      - prompt: "Допишите подключение аутентификации по токену к endpoint'у."
        template: |
          from rest_framework.authentication import TokenAuthentication

          class Profile(APIView):
              {{attr}} = [TokenAuthentication]

              def get(self, request):
                  return Response({"ok": True})
        blanks:
          attr:
            accept: ["authentication_classes"]
      - prompt: "Допишите кастомное право: пускать только владельца объекта."
        template: |
          from rest_framework.permissions import BasePermission

          class IsOwner(BasePermission):
              def {{method}}(self, request, view, obj):
                  return obj.owner_id == request.user.id
        blanks:
          method:
            accept: ["has_object_permission"]

  - id: drf-auth-permissions-fill-method-004
    concept: drf-auth-permissions
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите право уровня endpoint'а: пускать только пользователей с ролью staff."
    template: |
      from rest_framework.permissions import BasePermission

      class IsStaff(BasePermission):
          def {{method}}(self, request, view):
              return request.user.{{flag}}
    blanks:
      method:
        accept: ["has_permission"]
      flag:
        accept: ["is_staff"]
    variants:
      - prompt: "Допишите объектное право: на запись пускать только владельца, на чтение - всех."
        template: |
          from rest_framework.permissions import BasePermission, SAFE_METHODS

          class IsOwnerOrReadOnly(BasePermission):
              def has_object_permission(self, request, view, obj):
                  if request.method in {{safe}}:
                      return True
                  return obj.owner_id == request.{{user}}.id
        blanks:
          safe:
            accept: ["SAFE_METHODS"]
          user:
            accept: ["user"]
      - prompt: "Допишите фильтрацию queryset'а: пользователь видит только свои заказы."
        template: |
          class OrderViewSet(viewsets.ModelViewSet):
              serializer_class = OrderSerializer

              def {{method}}(self):
                  return Order.objects.filter(owner=self.request.{{user}})
        blanks:
          method:
            accept: ["get_queryset"]
          user:
            accept: ["user"]

  - id: drf-auth-permissions-predict-pipeline-005
    concept: drf-auth-permissions
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она моделирует выбор кода: аноним → 401, опознан без прав → 403, опознан с правами → 200."
    snippet: |
      def respond(authenticated, allowed):
          if not authenticated:
              return 401
          if not allowed:
              return 403
          return 200

      print(respond(False, False))
      print(respond(True, False))
      print(respond(True, True))
    expected:
      kind: stdout
      value: |-
        401
        403
        200
    hints:
      - "Сначала смотрят на личность: не опознан - дальше дело не идёт. Какой флаг проверяется первым?"
      - "Первый вызов не аутентифицирован → 401 сразу. Второй опознан, но не разрешён → 403. Третий проходит оба условия → 200."
    variants:
      - snippet: |
          def respond(authenticated, allowed):
              if not authenticated:
                  return 401
              if not allowed:
                  return 403
              return 200

          print(respond(True, True))
          print(respond(False, True))
          print(respond(True, False))
        expected:
          kind: stdout
          value: |-
            200
            401
            403
      - snippet: |
          def respond(authenticated, allowed):
              if not authenticated:
                  return 401
              if not allowed:
                  return 403
              return 200

          print(respond(False, False))
          print(respond(True, True))
          print(respond(False, True))
        expected:
          kind: stdout
          value: |-
            401
            200
            401

  - id: drf-auth-permissions-predict-access-006
    concept: drf-auth-permissions
    type: predict-output
    difficulty: 5
    prompt: "Что выведет программа? Она моделирует полный конвейер доступа: аутентификация ставит user, has_permission проверяет логин, has_object_permission - владение. Возвращается итог для каждого запроса."
    snippet: |
      def pipeline(token_user, owner_id):
          user = token_user if token_user is not None else "anon"
          if user == "anon":
              return "401"
          if owner_id is None:
              return "200-list"
          return "200-object" if owner_id == user else "403"

      print(pipeline(None, None))
      print(pipeline(7, None))
      print(pipeline(7, 7))
      print(pipeline(7, 3))
    expected:
      kind: stdout
      value: |-
        401
        200-list
        200-object
        403
    hints:
      - "Идите по постам конвейера сверху вниз: сначала кто отправитель (аноним отсекается), потом есть ли объект, и только для объекта - владение."
      - "Аноним (token_user=None) даёт 401. Опознанный без объекта (owner_id=None) - это список, 200-list. С объектом сравнивается владелец с user."
      - "В последней проверке 200-object получается, только когда owner_id равен user; иначе 403. Сравните пары (7,7) и (7,3)."
    variants:
      - snippet: |
          def pipeline(token_user, owner_id):
              user = token_user if token_user is not None else "anon"
              if user == "anon":
                  return "401"
              if owner_id is None:
                  return "200-list"
              return "200-object" if owner_id == user else "403"

          print(pipeline(2, 2))
          print(pipeline(None, 2))
          print(pipeline(5, None))
          print(pipeline(5, 9))
        expected:
          kind: stdout
          value: |-
            200-object
            401
            200-list
            403
      - snippet: |
          def pipeline(token_user, owner_id):
              user = token_user if token_user is not None else "anon"
              if user == "anon":
                  return "401"
              if owner_id is None:
                  return "200-list"
              return "200-object" if owner_id == user else "403"

          print(pipeline(3, 8))
          print(pipeline(3, 3))
          print(pipeline(None, None))
          print(pipeline(8, None))
        expected:
          kind: stdout
          value: |-
            403
            200-object
            401
            200-list
