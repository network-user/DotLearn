exercises:
  - id: drf-overview-why-001
    concept: drf-overview
    type: theory-quiz
    difficulty: 1
    prompt: "Что из перечисленного `APIView` берёт на себя по сравнению с обычной Django-view?"
    choices:
      - id: a
        text: "Оборачивает запрос в Request DRF, даёт единый request.data и принимает Response с выбором формата."
      - id: b
        text: "Сам валидирует тело запроса и отклоняет лишние поля без сериализатора."
      - id: c
        text: "Подключается к базе и выполняет SQL-запросы вместо ORM."
      - id: d
        text: "Заменяет Django целиком и не использует его маршрутизацию."
    correct: [a]
    explanation: "APIView добавляет слой Request/Response поверх Django: единый разбор тела в request.data и отложенный выбор формата ответа. Валидацию делает сериализатор, а не сама view."
    variants:
      - prompt: "Что такое `request.data` в обработчике `APIView`?"
        choices:
          - id: a
            text: "Разобранное тело запроса, единообразное для JSON и для форм."
          - id: b
            text: "Только query string, часть URL после знака вопроса."
          - id: c
            text: "Сырые байты тела, которые нужно вручную передать в json.loads."
          - id: d
            text: "Список заголовков HTTP-запроса."
        correct: [a]
        explanation: "request.data - это уже разобранное parser'ом тело запроса; оно одинаково для JSON-тела и для данных формы. Query string живёт отдельно в request.query_params."
      - prompt: "Зачем нужен модуль `rest_framework.status`?"
        choices:
          - id: a
            text: "Даёт именованные константы кодов ответа, например HTTP_201_CREATED, чтобы не писать голые числа."
          - id: b
            text: "Хранит текущий статус подключения к базе данных."
          - id: c
            text: "Проверяет, авторизован ли пользователь в запросе."
          - id: d
            text: "Логирует все запросы и ответы сервера."
        correct: [a]
        explanation: "status - это набор именованных констант HTTP-кодов; HTTP_201_CREATED читается лучше и страхует от опечатки сильнее, чем число 201."

  - id: drf-overview-response-002
    concept: drf-overview
    type: theory-quiz
    difficulty: 2
    prompt: "Клиент шлёт `GET` из браузера с заголовком `Accept: text/html`. Как `Response({\"pong\": True})` это обработает?"
    choices:
      - id: a
        text: "Content negotiation выберет browsable-рендерер и вернёт HTML-страницу с этим ответом."
      - id: b
        text: "Вернёт JSON-строку: Response всегда отдаёт только JSON."
      - id: c
        text: "Бросит ошибку: Response не умеет работать с HTML."
      - id: d
        text: "Проигнорирует заголовок Accept и вернёт пустое тело."
    correct: [a]
    explanation: "Response хранит данные несериализованными и выбирает рендерер по заголовку Accept. При text/html сработает browsable-рендерер - та самая отлаживаемая HTML-страница DRF."
    variants:
      - prompt: "Что вернёт `Response({\"pong\": True})`, если клиент прислал `Accept: application/json`?"
        choices:
          - id: a
            text: "JSON-тело {\"pong\": true}, отрендеренное JSON-рендерером."
          - id: b
            text: "HTML-страницу browsable API."
          - id: c
            text: "Питоновский словарь как есть, без преобразования."
          - id: d
            text: "Ошибку 406, потому что JSON не поддерживается."
        correct: [a]
        explanation: "При Accept: application/json content negotiation выбирает JSON-рендерер, и тот же Response отдаётся как JSON."
      - prompt: "Какой код вернёт `Response(data)` без явного аргумента `status`?"
        choices:
          - id: a
            text: "200 OK - это статус по умолчанию."
          - id: b
            text: "201 Created, раз данные не пустые."
          - id: c
            text: "204 No Content всегда."
          - id: d
            text: "Случайный код в диапазоне 2xx."
        correct: [a]
        explanation: "Без явного status Response отдаёт 200. Для созданного ресурса нужно осознанно указать status.HTTP_201_CREATED, иначе код соврёт."

  - id: drf-overview-fill-apiview-003
    concept: drf-overview
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите обработчик `APIView`, который отвечает на GET и возвращает данные через Response."
    template: |
      from rest_framework.views import APIView
      from rest_framework.response import Response

      class Ping(APIView):
          def {{method}}(self, request):
              return {{wrapper}}({"pong": True})
    blanks:
      method:
        accept: ["get"]
      wrapper:
        accept: ["Response"]
    variants:
      - prompt: "Допишите обработчик создания ресурса: он читает поле из тела и возвращает 201."
        template: |
          from rest_framework.views import APIView
          from rest_framework.response import Response
          from rest_framework import status

          class CreateItem(APIView):
              def post(self, request):
                  name = request.{{source}}["name"]
                  return Response({"created": name}, status=status.{{code}})
        blanks:
          source:
            accept: ["data"]
          code:
            accept: ["HTTP_201_CREATED"]
      - prompt: "Допишите чтение необязательного query-параметра `limit` из запроса DRF."
        template: |
          from rest_framework.views import APIView
          from rest_framework.response import Response

          class ItemList(APIView):
              def get(self, request):
                  limit = request.{{source}}.get("limit", 10)
                  return Response({"limit": limit})
        blanks:
          source:
            accept: ["query_params"]

  - id: drf-overview-predict-source-004
    concept: drf-overview
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Она повторяет правило DRF: тело и query живут в разных местах запроса."
    snippet: |
      request = {"data": {"name": "шапка"}, "query_params": {"limit": "5"}}

      name = request["data"]["name"]
      limit = request["query_params"].get("limit", "10")
      print(name, limit)
    expected:
      kind: stdout
      value: "шапка 5"
    hints:
      - "request.data - это разобранное тело, а query-параметры лежат отдельно. Откуда берётся name, а откуда limit?"
      - "name читается из data, limit - из query_params. Значение по умолчанию 10 не используется, потому что ключ limit в query есть."
    variants:
      - snippet: |
          request = {"data": {"name": "плед"}, "query_params": {}}

          name = request["data"]["name"]
          limit = request["query_params"].get("limit", "10")
          print(name, limit)
        expected:
          kind: stdout
          value: "плед 10"
      - snippet: |
          request = {"data": {"city": "Казань"}, "query_params": {"page": "3"}}

          city = request["data"]["city"]
          page = request["query_params"].get("page", "1")
          print(city, page)
        expected:
          kind: stdout
          value: "Казань 3"

  - id: drf-overview-predict-negotiate-005
    concept: drf-overview
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она моделирует content negotiation: рендерер выбирается по заголовку Accept."
    snippet: |
      renderers = {"application/json": "json", "text/html": "browsable"}

      def negotiate(accept):
          return renderers.get(accept, "json")

      print(negotiate("text/html"))
      print(negotiate("application/xml"))
    expected:
      kind: stdout
      value: |-
        browsable
        json
    hints:
      - "Content negotiation сопоставляет заголовок Accept со списком известных рендереров. Что происходит, когда подходящего рендерера в списке нет?"
      - "text/html находит browsable. Для application/xml совпадения нет, поэтому срабатывает значение по умолчанию из get."
    variants:
      - snippet: |
          renderers = {"application/json": "json", "text/html": "browsable"}

          def negotiate(accept):
              return renderers.get(accept, "json")

          print(negotiate("application/json"))
          print(negotiate("text/plain"))
        expected:
          kind: stdout
          value: |-
            json
            json
      - snippet: |
          renderers = {"application/json": "json", "text/csv": "csv"}

          def negotiate(accept):
              return renderers.get(accept, "json")

          print(negotiate("text/csv"))
          print(negotiate("text/html"))
        expected:
          kind: stdout
          value: |-
            csv
            json

  - id: drf-overview-predict-status-006
    concept: drf-overview
    type: predict-output
    difficulty: 4
    prompt: "Что выведет программа? Она моделирует выбор кода ответа: при создании ресурса нужен 201, при пустом теле - 204, иначе 200."
    snippet: |
      STATUS = {"created": 201, "empty": 204, "ok": 200}

      def status_for(data, created):
          if created:
              return STATUS["created"]
          if not data:
              return STATUS["empty"]
          return STATUS["ok"]

      print(status_for({"id": 1}, True))
      print(status_for({}, False))
      print(status_for({"id": 2}, False))
    expected:
      kind: stdout
      value: |-
        201
        204
        200
    hints:
      - "Проверки идут сверху вниз, и первая истинная определяет результат. Какой флаг проверяется раньше остальных?"
      - "Сначала смотрится created: для первого вызова он True, поэтому возвращается 201 сразу. Дальше работают created=False и проверка пустоты data."
    variants:
      - snippet: |
          STATUS = {"created": 201, "empty": 204, "ok": 200}

          def status_for(data, created):
              if created:
                  return STATUS["created"]
              if not data:
                  return STATUS["empty"]
              return STATUS["ok"]

          print(status_for({}, True))
          print(status_for({"name": "x"}, False))
          print(status_for({}, False))
        expected:
          kind: stdout
          value: |-
            201
            200
            204
      - snippet: |
          STATUS = {"created": 201, "empty": 204, "ok": 200}

          def status_for(data, created):
              if created:
                  return STATUS["created"]
              if not data:
                  return STATUS["empty"]
              return STATUS["ok"]

          print(status_for({"id": 7}, False))
          print(status_for({"id": 7}, True))
          print(status_for([], False))
        expected:
          kind: stdout
          value: |-
            200
            201
            204
