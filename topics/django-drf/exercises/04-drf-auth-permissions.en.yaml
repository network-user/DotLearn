exercises:
  - id: drf-auth-permissions-order-001
    concept: drf-auth-permissions
    type: theory-quiz
    difficulty: 1
    prompt: "For an incoming request in DRF, which happens first?"
    choices:
      - id: a
        text: "Authentication sets request.user, then permissions judge that user."
      - id: b
        text: "Permissions deny or allow first, and only afterward is the sender's identity worked out."
      - id: c
        text: "The view runs first, checks happen after the response."
      - id: d
        text: "Throttling counts requests before the sender's identity is known."
    correct: [a]
    explanation: "Authentication sets request.user first, then permissions judge it. Otherwise permissions would have nothing to judge - the identity isn't established yet."
    variants:
      - prompt: "What does an authentication class, e.g. TokenAuthentication, do?"
        choices:
          - id: a
            text: "Identifies the sender and sets request.user."
          - id: b
            text: "Decides whether the user is allowed to perform the action."
          - id: c
            text: "Limits how often requests come from one IP."
          - id: d
            text: "Picks the response format based on the Accept header."
        correct: [a]
        explanation: "An authentication class reads the request (header, cookie) and sets request.user. Deciding on access is already the permission classes' job."
      - prompt: "What does a permission class, e.g. IsAuthenticated, do?"
        choices:
          - id: a
            text: "Looks at the already-set request.user and decides whether to let the request through."
          - id: b
            text: "Identifies the sender and fills in request.user."
          - id: c
            text: "Creates a token for the user."
          - id: d
            text: "Serializes an object to JSON."
        correct: [a]
        explanation: "A permission class judges the identity already set by authentication and returns True/False. Setting request.user isn't its job."

  - id: drf-auth-permissions-codes-002
    concept: drf-auth-permissions
    type: theory-quiz
    difficulty: 2
    prompt: "An anonymous request hits an endpoint with `permission_classes = [IsAuthenticated]`. What's the more honest code to return?"
    choices:
      - id: a
        text: "401 - identity isn't established, meaning identify yourself."
      - id: b
        text: "403 - identity is established, but there's no access."
      - id: c
        text: "200 - the anonymous user gets the data anyway."
      - id: d
        text: "500 - a missing token is a server error."
    correct: [a]
    explanation: "The anonymous user isn't identified, so the right signal is 401, identify yourself. 403 would mean you're identified but not allowed, which is a different case."
    variants:
      - prompt: "A logged-in regular user hits an endpoint with IsAdminUser permissions. What's the code?"
        choices:
          - id: a
            text: "403 - identity is established, but there's not enough permission."
          - id: b
            text: "401 - you need to identify yourself again."
          - id: c
            text: "200 - since they're logged in, they have access."
          - id: d
            text: "404 - the endpoint is hidden from non-admins."
        correct: [a]
        explanation: "The user is identified but lacks permission - that's 403. They already logged in, so 401 identify yourself doesn't fit here."
      - prompt: "How does 401 differ from 403 in meaning?"
        choices:
          - id: a
            text: "401 - who you are is unknown (fixed by logging in); 403 - who you are is known, but there's no access (logging in won't help)."
          - id: b
            text: "401 and 403 are synonyms, the choice is arbitrary."
          - id: c
            text: "401 is a client error, 403 is a server error."
          - id: d
            text: "401 is about reading, 403 is about writing."
        correct: [a]
        explanation: "401 is an unresolved identity question, fixed by logging in. 403 means identity is known but permission is missing, logging in again won't change anything."

  - id: drf-auth-permissions-fill-perm-003
    concept: drf-auth-permissions
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete an endpoint available only to authenticated users."
    template: |
      from rest_framework.permissions import IsAuthenticated

      class Profile(APIView):
          {{attr}} = [IsAuthenticated]

          def get(self, request):
              return Response({"user": request.{{user}}.username})
    blanks:
      attr:
        accept: ["permission_classes"]
      user:
        accept: ["user"]
    variants:
      - prompt: "Complete wiring up token authentication for an endpoint."
        template: |
          from rest_framework.authentication import TokenAuthentication

          class Profile(APIView):
              {{attr}} = [TokenAuthentication]

              def get(self, request):
                  return Response({"ok": True})
        blanks:
          attr:
            accept: ["authentication_classes"]
      - prompt: "Complete a custom permission: allow only the object's owner."
        template: |
          from rest_framework.permissions import BasePermission

          class IsOwner(BasePermission):
              def {{method}}(self, request, view, obj):
                  return obj.owner_id == request.user.id
        blanks:
          method:
            accept: ["has_object_permission"]

  - id: drf-auth-permissions-fill-method-004
    concept: drf-auth-permissions
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete an endpoint-level permission: allow only users with the staff role."
    template: |
      from rest_framework.permissions import BasePermission

      class IsStaff(BasePermission):
          def {{method}}(self, request, view):
              return request.user.{{flag}}
    blanks:
      method:
        accept: ["has_permission"]
      flag:
        accept: ["is_staff"]
    variants:
      - prompt: "Complete an object-level permission: allow writes only for the owner, reads for everyone."
        template: |
          from rest_framework.permissions import BasePermission, SAFE_METHODS

          class IsOwnerOrReadOnly(BasePermission):
              def has_object_permission(self, request, view, obj):
                  if request.method in {{safe}}:
                      return True
                  return obj.owner_id == request.{{user}}.id
        blanks:
          safe:
            accept: ["SAFE_METHODS"]
          user:
            accept: ["user"]
      - prompt: "Complete filtering the queryset: a user only sees their own orders."
        template: |
          class OrderViewSet(viewsets.ModelViewSet):
              serializer_class = OrderSerializer

              def {{method}}(self):
                  return Order.objects.filter(owner=self.request.{{user}})
        blanks:
          method:
            accept: ["get_queryset"]
          user:
            accept: ["user"]

  - id: drf-auth-permissions-predict-pipeline-005
    concept: drf-auth-permissions
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It models the code choice: anonymous -> 401, identified without permission -> 403, identified with permission -> 200."
    snippet: |
      def respond(authenticated, allowed):
          if not authenticated:
              return 401
          if not allowed:
              return 403
          return 200

      print(respond(False, False))
      print(respond(True, False))
      print(respond(True, True))
    expected:
      kind: stdout
      value: |-
        401
        403
        200
    hints:
      - "Identity is checked first: not identified means it stops right there. Which flag is checked first?"
      - "The first call isn't authenticated -> 401 right away. The second is identified but not allowed -> 403. The third passes both conditions -> 200."
    variants:
      - snippet: |
          def respond(authenticated, allowed):
              if not authenticated:
                  return 401
              if not allowed:
                  return 403
              return 200

          print(respond(True, True))
          print(respond(False, True))
          print(respond(True, False))
        expected:
          kind: stdout
          value: |-
            200
            401
            403
      - snippet: |
          def respond(authenticated, allowed):
              if not authenticated:
                  return 401
              if not allowed:
                  return 403
              return 200

          print(respond(False, False))
          print(respond(True, True))
          print(respond(False, True))
        expected:
          kind: stdout
          value: |-
            401
            200
            401

  - id: drf-auth-permissions-predict-access-006
    concept: drf-auth-permissions
    type: predict-output
    difficulty: 5
    prompt: "What does the program print? It models the full access pipeline: authentication sets the user, has_permission checks login, has_object_permission checks ownership. It returns an outcome for each request."
    snippet: |
      def pipeline(token_user, owner_id):
          user = token_user if token_user is not None else "anon"
          if user == "anon":
              return "401"
          if owner_id is None:
              return "200-list"
          return "200-object" if owner_id == user else "403"

      print(pipeline(None, None))
      print(pipeline(7, None))
      print(pipeline(7, 7))
      print(pipeline(7, 3))
    expected:
      kind: stdout
      value: |-
        401
        200-list
        200-object
        403
    hints:
      - "Go through the pipeline stages top to bottom: first who's the sender (anonymous gets cut off), then whether there's an object, and only for an object does ownership matter."
      - "Anonymous (token_user=None) gives 401. Identified with no object (owner_id=None) is a list, 200-list. With an object, the owner is compared to user."
      - "In the last check, 200-object only happens when owner_id equals user; otherwise 403. Compare the pairs (7,7) and (7,3)."
    variants:
      - snippet: |
          def pipeline(token_user, owner_id):
              user = token_user if token_user is not None else "anon"
              if user == "anon":
                  return "401"
              if owner_id is None:
                  return "200-list"
              return "200-object" if owner_id == user else "403"

          print(pipeline(2, 2))
          print(pipeline(None, 2))
          print(pipeline(5, None))
          print(pipeline(5, 9))
        expected:
          kind: stdout
          value: |-
            200-object
            401
            200-list
            403
      - snippet: |
          def pipeline(token_user, owner_id):
              user = token_user if token_user is not None else "anon"
              if user == "anon":
                  return "401"
              if owner_id is None:
                  return "200-list"
              return "200-object" if owner_id == user else "403"

          print(pipeline(3, 8))
          print(pipeline(3, 3))
          print(pipeline(None, None))
          print(pipeline(8, None))
        expected:
          kind: stdout
          value: |-
            403
            200-object
            401
            200-list
