exercises:
  - id: drf-viewsets-routers-mapping-001
    concept: drf-viewsets-routers
    type: theory-quiz
    difficulty: 1
    prompt: "Request `GET /items/42/` arrives at a ViewSet wired up through a router. Which action gets called?"
    choices:
      - id: a
        text: "retrieve - GET on a URL with a pk means get one object."
      - id: b
        text: "list - GET always returns a list."
      - id: c
        text: "update - there's an object number in the URL."
      - id: d
        text: "create - any request with a body creates an object."
    correct: [a]
    explanation: "GET on /items/{pk}/ is mapped by the router to retrieve. list is GET on the collection /items/ without a pk; update is PUT, not GET."
    variants:
      - prompt: "Which action does `POST /items/` call on a ViewSet through a router?"
        choices:
          - id: a
            text: "create - POST on the collection creates a new"
          - id: b
            text: "list - POST just returns a list."
          - id: c
            text: "update - POST updates the object."
          - id: d
            text: "retrieve - POST reads a single object."
        correct: [a]
        explanation: "POST on the collection /items/ is create. The collection only has list (GET) and create (POST) - there's no specific object there."
      - prompt: "Which action does `DELETE /items/42/` call through a router?"
        choices:
          - id: a
            text: "destroy - DELETE on a URL with a pk deletes the object."
          - id: b
            text: "list - it deletes every object at once."
          - id: c
            text: "partial_update - DELETE edits part of the fields."
          - id: d
            text: "create - DELETE cancels a creation."
        correct: [a]
        explanation: "DELETE on /items/{pk}/ is mapped by the router to destroy. It's an object-level action, so it requires a pk in the URL."

  - id: drf-viewsets-routers-ladder-002
    concept: drf-viewsets-routers
    type: theory-quiz
    difficulty: 2
    prompt: "You need full CRUD on the Item model with minimal code. What do you pick?"
    choices:
      - id: a
        text: "ModelViewSet with queryset and serializer_class, wired up through a router."
      - id: b
        text: "A bare APIView with hand-written get/post/put/delete for every case."
      - id: c
        text: "Five separate APIViews, one per action."
      - id: d
        text: "A plain ViewSet with no mixins - it implements CRUD by itself."
    correct: [a]
    explanation: "ModelViewSet implements all five actions on top of a queryset and serializer, and the router builds the URLs. A plain ViewSet (option d) only gives you scaffolding, no ready-made actions."
    variants:
      - prompt: "You only need list and create on /articles/, no retrieve-by-id and no delete. Which concrete generic fits?"
        choices:
          - id: a
            text: "ListCreateAPIView - GET (list) and POST (create) on the collection."
          - id: b
            text: "RetrieveUpdateDestroyAPIView - works with a single object."
          - id: c
            text: "ModelViewSet - it gives all five actions, the extra ones aren't needed."
          - id: d
            text: "RetrieveAPIView - only fetches a single object."
        correct: [a]
        explanation: "ListCreateAPIView is exactly GET-list plus POST-create on the collection. RetrieveUpdateDestroyAPIView works with a single object, not the collection."
      - prompt: "You need a read-only resource: list and one object, no writes. What do you use?"
        choices:
          - id: a
            text: "ReadOnlyModelViewSet - only list and retrieve."
          - id: b
            text: "ModelViewSet - just don't call the write actions."
          - id: c
            text: "CreateAPIView - it can also read."
          - id: d
            text: "DestroyAPIView - only deletion."
        correct: [a]
        explanation: "ReadOnlyModelViewSet gives you exactly list and retrieve and never exposes writes. ModelViewSet would also expose create/update/destroy, which is more than needed here."

  - id: drf-viewsets-routers-fill-viewset-003
    concept: drf-viewsets-routers
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete a ViewSet with full CRUD on the Item model."
    template: |
      from rest_framework import viewsets

      class ItemViewSet(viewsets.{{base}}):
          queryset = Item.objects.all()
          {{serializer}} = ItemSerializer
    blanks:
      base:
        accept: ["ModelViewSet"]
      serializer:
        accept: ["serializer_class"]
    variants:
      - prompt: "Complete registering a ViewSet in a router under the items prefix."
        template: |
          from rest_framework.routers import DefaultRouter

          router = DefaultRouter()
          router.{{method}}("items", ItemViewSet, basename="item")
          urlpatterns = router.{{urls}}
        blanks:
          method:
            accept: ["register"]
          urls:
            accept: ["urls"]
      - prompt: "Complete a concrete generic for listing and creating on the collection."
        template: |
          from rest_framework import generics

          class ItemList(generics.{{cls}}):
              queryset = Item.objects.all()
              serializer_class = ItemSerializer
        blanks:
          cls:
            accept: ["ListCreateAPIView"]

  - id: drf-viewsets-routers-fill-mixin-004
    concept: drf-viewsets-routers
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete a GenericAPIView with mixins: list via GET, create via POST."
    template: |
      from rest_framework import generics, mixins

      class ItemList(mixins.ListModelMixin,
                     mixins.CreateModelMixin,
                     generics.GenericAPIView):
          queryset = Item.objects.all()
          serializer_class = ItemSerializer

          def get(self, request):
              return self.{{list}}(request)

          def post(self, request):
              return self.{{create}}(request)
    blanks:
      list:
        accept: ["list"]
      create:
        accept: ["create"]
    variants:
      - prompt: "Complete a concrete generic for a single object: retrieve, replace, delete."
        template: |
          from rest_framework import generics

          class ItemDetail(generics.{{cls}}):
              queryset = Item.objects.all()
              serializer_class = ItemSerializer
        blanks:
          cls:
            accept: ["RetrieveUpdateDestroyAPIView"]
      - prompt: "Complete a read-only ViewSet (read-only) for the Item model."
        template: |
          from rest_framework import viewsets

          class ItemViewSet(viewsets.{{base}}):
              queryset = Item.objects.all()
              serializer_class = ItemSerializer
        blanks:
          base:
            accept: ["ReadOnlyModelViewSet"]

  - id: drf-viewsets-routers-predict-action-005
    concept: drf-viewsets-routers
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It models a router's mapping: the ViewSet action is picked by HTTP method and whether a pk is present."
    snippet: |
      def action_for(method, has_pk):
          if not has_pk:
              return "list" if method == "GET" else "create"
          table = {"GET": "retrieve", "PUT": "update",
                   "PATCH": "partial_update", "DELETE": "destroy"}
          return table[method]

      print(action_for("GET", False))
      print(action_for("GET", True))
      print(action_for("DELETE", True))
    expected:
      kind: stdout
      value: |-
        list
        retrieve
        destroy
    hints:
      - "First it checks whether there's a pk in the URL: no pk means the collection (list/create), a pk means a single object. Which request has no pk?"
      - "First call, no pk and GET -> list. Second, pk present and GET -> retrieve. Third, pk present and DELETE -> destroy via the table."
    variants:
      - snippet: |
          def action_for(method, has_pk):
              if not has_pk:
                  return "list" if method == "GET" else "create"
              table = {"GET": "retrieve", "PUT": "update",
                       "PATCH": "partial_update", "DELETE": "destroy"}
              return table[method]

          print(action_for("POST", False))
          print(action_for("PUT", True))
          print(action_for("PATCH", True))
        expected:
          kind: stdout
          value: |-
            create
            update
            partial_update
      - snippet: |
          def action_for(method, has_pk):
              if not has_pk:
                  return "list" if method == "GET" else "create"
              table = {"GET": "retrieve", "PUT": "update",
                       "PATCH": "partial_update", "DELETE": "destroy"}
              return table[method]

          print(action_for("GET", True))
          print(action_for("POST", False))
          print(action_for("DELETE", True))
        expected:
          kind: stdout
          value: |-
            retrieve
            create
            destroy

  - id: drf-viewsets-routers-predict-urls-006
    concept: drf-viewsets-routers
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? It models a router: one registration produces two URL patterns - the collection and the item."
    snippet: |
      def routes_for(prefix):
          return [prefix + "/", prefix + "/{pk}/"]

      for route in routes_for("items"):
          print(route)
    expected:
      kind: stdout
      value: |-
        items/
        items/{pk}/
    hints:
      - "A router built from one register call produces exactly two strings: the collection with no pk, and the item with a pk. What gets appended to the prefix in each?"
      - "The collection is the prefix plus a slash, the item is the prefix plus /{pk}/. The loop prints both in order."
    variants:
      - snippet: |
          def routes_for(prefix):
              return [prefix + "/", prefix + "/{pk}/"]

          for route in routes_for("orders"):
              print(route)
        expected:
          kind: stdout
          value: |-
            orders/
            orders/{pk}/
      - snippet: |
          def routes_for(prefix):
              return [prefix + "/", prefix + "/{pk}/"]

          for route in routes_for("users"):
              print(route)
        expected:
          kind: stdout
          value: |-
            users/
            users/{pk}/
