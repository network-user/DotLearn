exercises:
  - id: drf-pagination-filtering-style-001
    concept: drf-pagination-filtering
    type: theory-quiz
    difficulty: 1
    prompt: "Нужна устойчивая к вставкам пагинация большой, часто меняющейся ленты, переход на произвольную страницу не требуется. Что выбрать?"
    choices:
      - id: a
        text: "CursorPagination - стабильна к вставкам и быстра на любой глубине."
      - id: b
        text: "PageNumberPagination - номера страниц плывут при вставках."
      - id: c
        text: "LimitOffsetPagination - глубокий offset дорог для базы."
      - id: d
        text: "Без пагинации - вернуть всю ленту сразу."
    correct: [a]
    explanation: "CursorPagination запоминает порог по полю сортировки, поэтому вставки выше по списку не дают дублей и пропусков, а глубина не замедляет запрос. Цена - нет прыжка на произвольную страницу."
    variants:
      - prompt: "Какой стиль пагинации даёт привычный листаемый UI с номерами страниц через `?page=`?"
        choices:
          - id: a
            text: "PageNumberPagination - страницы по номеру."
          - id: b
            text: "CursorPagination - только вперёд/назад без номеров."
          - id: c
            text: "LimitOffsetPagination - окно по limit и offset."
          - id: d
            text: "Никакой - номера страниц DRF не поддерживает."
        correct: [a]
        explanation: "PageNumberPagination мыслит номерами страниц (?page=3) - это про листаемый UI. CursorPagination номеров не имеет."
      - prompt: "Клиенту нужны произвольные срезы с явным размером окна через `?limit=&offset=`. Что подходит?"
        choices:
          - id: a
            text: "LimitOffsetPagination - окно задаётся limit и offset."
          - id: b
            text: "PageNumberPagination - только целые страницы по номеру."
          - id: c
            text: "CursorPagination - размер окна задать нельзя."
          - id: d
            text: "SearchFilter - он отвечает за размер выдачи."
        correct: [a]
        explanation: "LimitOffsetPagination даёт клиенту контроль над размером окна (limit) и сдвигом (offset) - это про произвольные срезы."

  - id: drf-pagination-filtering-backends-002
    concept: drf-pagination-filtering
    type: theory-quiz
    difficulty: 2
    prompt: "Клиент шлёт `?search=книга`. Какой backend это обрабатывает и как?"
    choices:
      - id: a
        text: "SearchFilter - ищет вхождение по полям из search_fields."
      - id: b
        text: "DjangoFilterBackend - требует точного равенства поля."
      - id: c
        text: "OrderingFilter - задаёт порядок строк."
      - id: d
        text: "Пагинатор - отрезает страницу по слову."
    correct: [a]
    explanation: "?search=... обслуживает SearchFilter: вхождение подстроки сразу по нескольким полям из search_fields. Точное равенство - это DjangoFilterBackend по конкретному полю."
    variants:
      - prompt: "Чем отличается `?status=paid` (filterset_fields) от `?search=paid` (search_fields)?"
        choices:
          - id: a
            text: "Первое - точное равенство поля, второе"
          - id: b
            text: "Это одно и то же, параметры взаимозаменяемы."
          - id: c
            text: "Первое сортирует, второе фильтрует."
          - id: d
            text: "Первое про пагинацию, второе про throttling."
        correct: [a]
        explanation: "filterset_fields даёт точное равенство по полю, SearchFilter - нечёткое вхождение по тексту. Разные операции и разные query-параметры."
      - prompt: "За что в DRF отвечает throttling?"
        choices:
          - id: a
            text: "Ограничивает частоту запросов; превышение даёт"
          - id: b
            text: "Ограничивает размер ответа, отрезая строки."
          - id: c
            text: "Сортирует выдачу по полю."
          - id: d
            text: "Выбирает версию API для запроса."
        correct: [a]
        explanation: "Throttling - про частоту: «как часто можно дёргать», 429 при превышении. Размер ответа режут пагинацией - это другая ось."

  - id: drf-pagination-filtering-fill-paginator-003
    concept: drf-pagination-filtering
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите ViewSet, который ищет по тексту и сортирует по разрешённым полям."
    template: |
      class ItemViewSet(viewsets.ModelViewSet):
          queryset = Item.objects.all()
          serializer_class = ItemSerializer
          filter_backends = [SearchFilter, OrderingFilter]
          {{search}} = ["title", "description"]
          {{ordering}} = ["created", "price"]
    blanks:
      search:
        accept: ["search_fields"]
      ordering:
        accept: ["ordering_fields"]
    variants:
      - prompt: "Допишите точную фильтрацию по полям через django-filter."
        template: |
          class ItemViewSet(viewsets.ModelViewSet):
              queryset = Item.objects.all()
              serializer_class = ItemSerializer
              filter_backends = [DjangoFilterBackend]
              {{fields}} = ["status", "category"]
        blanks:
          fields:
            accept: ["filterset_fields"]
      - prompt: "Допишите ограничение частоты запросов на пользователя."
        template: |
          from rest_framework.throttling import UserRateThrottle

          class ItemViewSet(viewsets.ModelViewSet):
              queryset = Item.objects.all()
              serializer_class = ItemSerializer
              {{attr}} = [UserRateThrottle]
        blanks:
          attr:
            accept: ["throttle_classes"]

  - id: drf-pagination-filtering-predict-offset-004
    concept: drf-pagination-filtering
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Она повторяет формулу PageNumberPagination: offset = (page - 1) * page_size."
    snippet: |
      def offset(page, page_size):
          return (page - 1) * page_size

      print(offset(1, 20))
      print(offset(3, 20))
      print(offset(5, 10))
    expected:
      kind: stdout
      value: |-
        0
        40
        40
    hints:
      - "Страница нумеруется с единицы, а смещение - с нуля. Сколько строк пропустить, чтобы добраться до начала страницы page?"
      - "offset = (page - 1) * page_size. Для первой страницы пропускать нечего (0). Для page=3, size=20 это 2*20."
    variants:
      - snippet: |
          def offset(page, page_size):
              return (page - 1) * page_size

          print(offset(2, 25))
          print(offset(4, 25))
          print(offset(1, 100))
        expected:
          kind: stdout
          value: |-
            25
            75
            0
      - snippet: |
          def offset(page, page_size):
              return (page - 1) * page_size

          print(offset(10, 10))
          print(offset(1, 50))
          print(offset(3, 15))
        expected:
          kind: stdout
          value: |-
            90
            0
            30

  - id: drf-pagination-filtering-predict-pages-005
    concept: drf-pagination-filtering
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она считает число страниц как ceil(total / page_size) через целочисленную арифметику."
    snippet: |
      def page_count(total, page_size):
          return (total + page_size - 1) // page_size

      print(page_count(100, 20))
      print(page_count(101, 20))
      print(page_count(0, 20))
    expected:
      kind: stdout
      value: |-
        5
        6
        0
    hints:
      - "Число страниц округляется вверх: даже одна лишняя строка требует целой новой страницы. Как ceil выражается без дробей?"
      - "Формула (total + page_size - 1) // page_size. 100/20 = ровно 5; 101 требует шестую страницу для одной строки; 0 строк - это 0 страниц."
    variants:
      - snippet: |
          def page_count(total, page_size):
              return (total + page_size - 1) // page_size

          print(page_count(50, 25))
          print(page_count(51, 25))
          print(page_count(10, 25))
        expected:
          kind: stdout
          value: |-
            2
            3
            1
      - snippet: |
          def page_count(total, page_size):
              return (total + page_size - 1) // page_size

          print(page_count(99, 10))
          print(page_count(100, 10))
          print(page_count(1, 10))
        expected:
          kind: stdout
          value: |-
            10
            10
            1

  - id: drf-pagination-filtering-predict-window-006
    concept: drf-pagination-filtering
    type: predict-output
    difficulty: 4
    prompt: "Что выведет программа? Она моделирует LimitOffsetPagination над списком из 6 элементов: печатает, сколько элементов попало в окно [offset:offset+limit], и есть ли следующая страница (next или last)."
    snippet: |
      total = 6

      def page(offset, limit):
          start = min(offset, total)
          end = min(offset + limit, total)
          size = end - start
          flag = "next" if offset + limit < total else "last"
          print(size, flag)

      page(0, 2)
      page(2, 2)
      page(4, 2)
    expected:
      kind: stdout
      value: |-
        2 next
        2 next
        2 last
    hints:
      - "Окно обрезается границами списка: оно не может выйти за его конец. Следующая страница есть, только если за концом окна остались элементы."
      - "Размер окна - это end минус start после обрезки по total. Флаг сравнивает offset+limit с total: дошли до конца - last."
      - "Для offset=4, limit=2: end = min(6,6) = 6, size = 6-4 = 2, а offset+limit = 6, что не меньше 6, поэтому last."
    variants:
      - snippet: |
          total = 6

          def page(offset, limit):
              start = min(offset, total)
              end = min(offset + limit, total)
              size = end - start
              flag = "next" if offset + limit < total else "last"
              print(size, flag)

          page(0, 3)
          page(3, 3)
          page(5, 3)
        expected:
          kind: stdout
          value: |-
            3 next
            3 last
            1 last
      - snippet: |
          total = 6

          def page(offset, limit):
              start = min(offset, total)
              end = min(offset + limit, total)
              size = end - start
              flag = "next" if offset + limit < total else "last"
              print(size, flag)

          page(1, 2)
          page(0, 6)
          page(4, 5)
        expected:
          kind: stdout
          value: |-
            2 next
            6 last
            2 last
