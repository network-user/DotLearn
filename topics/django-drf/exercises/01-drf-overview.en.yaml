exercises:
  - id: drf-overview-why-001
    concept: drf-overview
    type: theory-quiz
    difficulty: 1
    prompt: "Which of the following does `APIView` take care of, compared to a plain Django view?"
    choices:
      - id: a
        text: "Wraps the request in a DRF Request, gives you a uniform request.data, and accepts a Response with format negotiation."
      - id: b
        text: "Validates the request body itself and rejects extra fields without a serializer."
      - id: c
        text: "Connects to the database and runs SQL queries instead of the ORM."
      - id: d
        text: "Replaces Django entirely and doesn't use its routing."
    correct: [a]
    explanation: "APIView adds a Request/Response layer on top of Django: one unified body parse into request.data and deferred response-format selection. Validation is the serializer's job, not the view's."
    variants:
      - prompt: "What is `request.data` in an `APIView` handler?"
        choices:
          - id: a
            text: "The parsed request body, uniform for both JSON and form data."
          - id: b
            text: "Just the query string, the part of the URL after the question mark."
          - id: c
            text: "The raw body bytes, which you have to pass to json.loads yourself."
          - id: d
            text: "A list of the HTTP request headers."
        correct: [a]
        explanation: "request.data is the body already parsed by a parser; it's the same for a JSON body and for form data. The query string lives separately, in request.query_params."
      - prompt: "What is the `rest_framework.status` module for?"
        choices:
          - id: a
            text: "Gives you named constants for response codes, e.g. HTTP_201_CREATED, so you don't write bare numbers."
          - id: b
            text: "Stores the current database connection status."
          - id: c
            text: "Checks whether the user is authorized for the request."
          - id: d
            text: "Logs every request and response the server handles."
        correct: [a]
        explanation: "status is a set of named HTTP status code constants; HTTP_201_CREATED reads better and guards against typos far more than the raw number 201."

  - id: drf-overview-response-002
    concept: drf-overview
    type: theory-quiz
    difficulty: 2
    prompt: "A browser sends `GET` with header `Accept: text/html`. How does `Response({\"pong\": True})` handle this?"
    choices:
      - id: a
        text: "Content negotiation picks the browsable renderer and returns an HTML page for this response."
      - id: b
        text: "Returns a JSON string: Response only ever returns JSON."
      - id: c
        text: "Raises an error: Response can't work with HTML."
      - id: d
        text: "Ignores the Accept header and returns an empty body."
    correct: [a]
    explanation: "Response holds unserialized data and picks a renderer based on the Accept header. With text/html the browsable renderer kicks in - that's DRF's debug-friendly HTML page."
    variants:
      - prompt: "What does `Response({\"pong\": True})` return if the client sent `Accept: application/json`?"
        choices:
          - id: a
            text: "A JSON body {\"pong\": true}, rendered by the JSON renderer."
          - id: b
            text: "The browsable API's HTML page."
          - id: c
            text: "The Python dict as-is, with no conversion."
          - id: d
            text: "A 406 error, because JSON isn't supported."
        correct: [a]
        explanation: "With Accept: application/json, content negotiation picks the JSON renderer, and the same Response gets returned as JSON."
      - prompt: "What status code does `Response(data)` return without an explicit `status` argument?"
        choices:
          - id: a
            text: "200 OK - that's the default status."
          - id: b
            text: "201 Created, since the data isn't empty."
          - id: c
            text: "204 No Content, always."
          - id: d
            text: "A random code somewhere in the 2xx range."
        correct: [a]
        explanation: "Without an explicit status, Response returns 200. For a created resource you have to deliberately pass status.HTTP_201_CREATED, otherwise the code is misleading."

  - id: drf-overview-fill-apiview-003
    concept: drf-overview
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete the `APIView` handler that answers GET and returns data via Response."
    template: |
      from rest_framework.views import APIView
      from rest_framework.response import Response

      class Ping(APIView):
          def {{method}}(self, request):
              return {{wrapper}}({"pong": True})
    blanks:
      method:
        accept: ["get"]
      wrapper:
        accept: ["Response"]
    variants:
      - prompt: "Complete the resource-creation handler: it reads a field from the body and returns 201."
        template: |
          from rest_framework.views import APIView
          from rest_framework.response import Response
          from rest_framework import status

          class CreateItem(APIView):
              def post(self, request):
                  name = request.{{source}}["name"]
                  return Response({"created": name}, status=status.{{code}})
        blanks:
          source:
            accept: ["data"]
          code:
            accept: ["HTTP_201_CREATED"]
      - prompt: "Complete reading an optional `limit` query parameter from a DRF request."
        template: |
          from rest_framework.views import APIView
          from rest_framework.response import Response

          class ItemList(APIView):
              def get(self, request):
                  limit = request.{{source}}.get("limit", 10)
                  return Response({"limit": limit})
        blanks:
          source:
            accept: ["query_params"]

  - id: drf-overview-predict-source-004
    concept: drf-overview
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? It repeats a DRF rule: the body and the query string live in different places on the request."
    snippet: |
      request = {"data": {"name": "hat"}, "query_params": {"limit": "5"}}

      name = request["data"]["name"]
      limit = request["query_params"].get("limit", "10")
      print(name, limit)
    expected:
      kind: stdout
      value: "hat 5"
    hints:
      - "request.data is the parsed body, and query parameters live separately. Where does name come from, and where does limit come from?"
      - "name is read from data, limit from query_params. The default 10 isn't used because the limit key is present in query."
    variants:
      - snippet: |
          request = {"data": {"name": "blanket"}, "query_params": {}}

          name = request["data"]["name"]
          limit = request["query_params"].get("limit", "10")
          print(name, limit)
        expected:
          kind: stdout
          value: "blanket 10"
      - snippet: |
          request = {"data": {"city": "Kazan"}, "query_params": {"page": "3"}}

          city = request["data"]["city"]
          page = request["query_params"].get("page", "1")
          print(city, page)
        expected:
          kind: stdout
          value: "Kazan 3"

  - id: drf-overview-predict-negotiate-005
    concept: drf-overview
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It models content negotiation: the renderer is picked by the Accept header."
    snippet: |
      renderers = {"application/json": "json", "text/html": "browsable"}

      def negotiate(accept):
          return renderers.get(accept, "json")

      print(negotiate("text/html"))
      print(negotiate("application/xml"))
    expected:
      kind: stdout
      value: |-
        browsable
        json
    hints:
      - "Content negotiation maps the Accept header against a list of known renderers. What happens when there's no matching renderer in the list?"
      - "text/html finds browsable. There's no match for application/xml, so the default value from get kicks in."
    variants:
      - snippet: |
          renderers = {"application/json": "json", "text/html": "browsable"}

          def negotiate(accept):
              return renderers.get(accept, "json")

          print(negotiate("application/json"))
          print(negotiate("text/plain"))
        expected:
          kind: stdout
          value: |-
            json
            json
      - snippet: |
          renderers = {"application/json": "json", "text/csv": "csv"}

          def negotiate(accept):
              return renderers.get(accept, "json")

          print(negotiate("text/csv"))
          print(negotiate("text/html"))
        expected:
          kind: stdout
          value: |-
            csv
            json

  - id: drf-overview-predict-status-006
    concept: drf-overview
    type: predict-output
    difficulty: 4
    prompt: "What does the program print? It models picking a response code: creating a resource needs 201, an empty body needs 204, otherwise 200."
    snippet: |
      STATUS = {"created": 201, "empty": 204, "ok": 200}

      def status_for(data, created):
          if created:
              return STATUS["created"]
          if not data:
              return STATUS["empty"]
          return STATUS["ok"]

      print(status_for({"id": 1}, True))
      print(status_for({}, False))
      print(status_for({"id": 2}, False))
    expected:
      kind: stdout
      value: |-
        201
        204
        200
    hints:
      - "The checks run top to bottom, and the first true one decides the result. Which flag gets checked first?"
      - "created is checked first: for the first call it's True, so 201 comes back immediately. After that created=False and the emptiness check for data matter."
    variants:
      - snippet: |
          STATUS = {"created": 201, "empty": 204, "ok": 200}

          def status_for(data, created):
              if created:
                  return STATUS["created"]
              if not data:
                  return STATUS["empty"]
              return STATUS["ok"]

          print(status_for({}, True))
          print(status_for({"name": "x"}, False))
          print(status_for({}, False))
        expected:
          kind: stdout
          value: |-
            201
            200
            204
      - snippet: |
          STATUS = {"created": 201, "empty": 204, "ok": 200}

          def status_for(data, created):
              if created:
                  return STATUS["created"]
              if not data:
                  return STATUS["empty"]
              return STATUS["ok"]

          print(status_for({"id": 7}, False))
          print(status_for({"id": 7}, True))
          print(status_for([], False))
        expected:
          kind: stdout
          value: |-
            200
            201
            204
