conceptId: drf-auth-permissions
cards:
  - id: drf-auth-permissions-01
    front: "Два вопроса, на которые сервер отвечает перед выдачей данных, и их порядок"
    back: "Сначала «кто это?» - аутентификация устанавливает личность отправителя в request.user. Потом «а этому можно?» - права судят уже установленную личность. Порядок authentication → permission фиксирован."
    tags: [drf]
  - id: drf-auth-permissions-02
    front: "Что делает слой аутентификации и что кладёт в запрос?"
    back: "Читает что-то из запроса (заголовок, cookie) и устанавливает request.user и request.auth. Он не решает про доступ - только устанавливает личность. Анонима пропускает с бейджем AnonymousUser."
    tags: [drf]
  - id: drf-auth-permissions-03
    front: "Как DRF выбирает класс аутентификации из списка?"
    back: "Пробует классы по очереди; первый, кто опознал отправителя, побеждает. Если не опознал никто, request.user становится AnonymousUser - это нормальное состояние, а не ошибка."
    tags: [drf]
  - id: drf-auth-permissions-04
    front: "Три встроенных класса аутентификации и на чём каждый держится"
    back: "SessionAuthentication - на сессионной cookie Django (фронт и API на одном домене). TokenAuthentication - на статичном токене в Authorization: Token. JWT через SimpleJWT - на самоподтверждаемом access-токене (Bearer) со сроком жизни внутри."
    tags: [drf]
  - id: drf-auth-permissions-05
    front: "Что делает слой прав (permissions)?"
    back: "Получает request с уже установленным request.user и возвращает True/False - пропустить запрос или отказать. Права не устанавливают личность, они только судят уже установленную."
    tags: [drf]
  - id: drf-auth-permissions-06
    front: "Чем has_permission отличается от has_object_permission?"
    back: "has_permission(request, view) проверяет доступ на уровне всего endpoint'а, до выбора объекта, для любого запроса. has_object_permission(request, view, obj) проверяет конкретный объект и вызывается, когда view достаёт его через get_object()."
    tags: [drf]
  - id: drf-auth-permissions-07
    front: "Назовите частые встроенные классы прав."
    back: "AllowAny (пускать всех), IsAuthenticated (только опознанных), IsAdminUser (только is_staff), IsAuthenticatedOrReadOnly (читать всем, писать опознанным). Кастомный класс наследует BasePermission."
    tags: [drf]
  - id: drf-auth-permissions-08
    front: "Почему аутентификация всегда раньше прав?"
    back: "Права судят request.user, а его сначала надо установить. Если бы права шли первыми, им было бы нечего судить. Порядок не настраиваемый и не случайный."
    tags: [drf]
  - id: drf-auth-permissions-09
    front: "Чем 401 отличается от 403?"
    back: "401 - личность не установлена (токена нет, просрочен, неверен), смысл «представьтесь», лечится логином. 403 - личность установлена, но прав не хватает, смысл «опознан, но сюда нельзя», логин не поможет."
    tags: [drf]
  - id: drf-auth-permissions-10
    front: "Как DRF выбирает между 401 и 403?"
    back: "Если запрос анонимный и есть схема аутентификации с заголовком WWW-Authenticate, отдаёт 401 («попробуй представиться»). Если пользователь уже опознан, но права сказали False, отдаёт 403 («представляться поздно»)."
    tags: [drf]
  - id: drf-auth-permissions-11
    front: "Что означает пустой permission_classes?"
    back: "Не «запретить всем», а «никаких проверок прав» - то есть пускать всех, как AllowAny. Чтобы закрыть endpoint, нужен явный IsAuthenticated. Молчание здесь читается как «разрешено»."
    tags: [drf]
  - id: drf-auth-permissions-12
    front: "Почему has_object_permission не годится для фильтрации списков?"
    back: "Он вызывается только при get_object() за одной записью; в list объектов много, и DRF не зовёт объектную проверку для каждого. Чужие записи прячут через get_queryset(), отдавая только request.user-овские."
    tags: [drf]
  - id: drf-auth-permissions-13
    front: "Почему IsAuthenticated не защищает чужие объекты?"
    back: "Он проверяет лишь факт логина, а не владение, и пускает любого опознанного - и владельца, и постороннего. «Только свой объект» - это has_object_permission или фильтрация queryset. Аутентифицирован не значит уполномочен на этот объект."
    tags: [drf]
  - id: drf-auth-permissions-14
    front: "Как случайно обойти объектные права?"
    back: "Достать запись вручную, минуя get_object(): если во view написать Order.objects.get(pk=pk) напрямую, has_object_permission не вызовется - его дёргает именно get_object(). Объектные права работают только при штатном получении объекта."
    tags: [drf]
  - id: drf-auth-permissions-15
    front: "Какой безопасный дефолт прав рекомендуется и почему?"
    back: "Глобальный IsAuthenticated в DEFAULT_PERMISSION_CLASSES и точечное ослабление через AllowAny на публичных endpoint'ах: дефолт «закрыто», исключения «открыто». Тогда забытый endpoint остаётся закрытым. Список на view полностью заменяет глобальный, а не дополняет."
    tags: [drf]
