conceptId: drf-pagination-filtering
cards:
  - id: drf-pagination-filtering-01
    front: "Why does naive return everything (Item.objects.all()) break down over time?"
    back: "The code didn't break - the data grew. At two hundred thousand rows, the endpoint pulls everything from the database and ships it over the network; the mobile app chokes on megabytes, the server burns memory serializing what the user will never scroll through."
    tags: [drf]
  - id: drf-pagination-filtering-02
    front: "Four mechanisms of a mature list endpoint, and what each handles"
    back: "Pagination - how much at once, filtering - what's in the result, throttling - how often you can ask, versioning - under which rules. These are orthogonal axes; mixing them up is a common source of messy APIs."
    tags: [drf]
  - id: drf-pagination-filtering-03
    front: "What's the order of the funnel over a queryset?"
    back: "First a filter drops irrelevant rows (?status=paid), then sorting orders what's left (?ordering=-created), then pagination cuts a single page. Throttling happens even earlier, at the entrance."
    tags: [drf]
  - id: drf-pagination-filtering-04
    front: "What is PageNumberPagination and where is it weak?"
    back: "Pages by number: ?page=3, the client thinks page three of twenty. Simple and familiar, but the page number drifts if rows are inserted or removed between requests."
    tags: [drf]
  - id: drf-pagination-filtering-05
    front: "What is LimitOffsetPagination and what's its downside?"
    back: "An offset-based window: ?limit=20&offset=40, the client sets its own size and shift. Flexible for arbitrary slices, but a large offset forces the database to skip rows - expensive on deep pages."
    tags: [drf]
  - id: drf-pagination-filtering-06
    front: "What is CursorPagination and what do you pay for choosing it?"
    back: "A cursor on a sorted field: ?cursor=<opaque>, the next page after this record. Resilient to inserts and deletes, fast at any depth, but it can't jump to an arbitrary page - only forward/back."
    tags: [drf]
  - id: drf-pagination-filtering-07
    front: "The rule for picking a pagination style for the task"
    back: "A paged UI with numbers -> PageNumberPagination. Arbitrary slices and load more with size control -> LimitOffsetPagination. Large, frequently-changing feeds where stability and depth matter -> CursorPagination."
    tags: [drf]
  - id: drf-pagination-filtering-08
    front: "Three filtering/search/sorting backends and their query parameters"
    back: "DjangoFilterBackend - exact field equality (?status=paid), via filterset_fields. SearchFilter - substring match across several text fields (?search=...), via search_fields. OrderingFilter - order (?ordering=-created), via ordering_fields."
    tags: [drf]
  - id: drf-pagination-filtering-09
    front: "How does filterset_fields differ from search_fields?"
    back: "A filter on title (?title=Book) looks for exact equality; search_fields=[\"title\"] (?search=book) looks for a substring match. Exact equals and fuzzy contains are different operations, and the client uses different parameters for them."
    tags: [drf]
  - id: drf-pagination-filtering-10
    front: "Do filtering backends stack with each other?"
    back: "Yes. A request like ?status=paid&search=book&ordering=-price first filters by status, then narrows with the search, then sorts. Each backend touches its own set of query parameters and doesn't interfere with the others."
    tags: [drf]
  - id: drf-pagination-filtering-11
    front: "What's throttling for, and what's returned when the limit is exceeded?"
    back: "Protection against abuse and hammering, not business logic; it runs before the view's main work. Rate is set as a string of number/period (\"100/hour\"). Exceeding it returns 429 Too Many Requests with a Retry-After header."
    tags: [drf]
  - id: drf-pagination-filtering-12
    front: "Three throttle classes and who each is aimed at"
    back: "AnonRateThrottle - for anonymous users, UserRateThrottle - per user, ScopedRateThrottle - its own limit for a group of endpoints. Rates are configured in DEFAULT_THROTTLE_RATES."
    tags: [drf]
  - id: drf-pagination-filtering-13
    front: "Why is API versioning needed, and where is the selected version available?"
    back: "Breaking changes (a renamed field, a different format) are split across versions so old clients don't break. The version (URL, Accept header, ?version=2) is available as request.version, and the code picks a serializer or behavior based on it."
    tags: [drf]
  - id: drf-pagination-filtering-14
    front: "What does a list return with no pagination set?"
    back: "The whole queryset - the exact problem this section started with. Pagination is turned on globally via DEFAULT_PAGINATION_CLASS, otherwise it gets forgotten until the first production incident."
    tags: [drf]
  - id: drf-pagination-filtering-15
    front: "Does a small limit protect you from a deep offset?"
    back: "No. ?limit=20&offset=100000 still forces the database to walk through and discard a hundred thousand rows before returning twenty. CursorPagination exists for deep feeds."
    tags: [drf]
  - id: drf-pagination-filtering-16
    front: "What happens if you filter or sort by a field not in the whitelist?"
    back: "ordering_fields and filterset_fields are whitelists. A field not on the list gets silently ignored rather than sorting or filtering. It's a safeguard: otherwise the client could sort by any field, including unindexed or private ones."
    tags: [drf]
