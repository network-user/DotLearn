conceptId: drf-query-optimization
cards:
  - id: drf-query-optimization-01
    front: "What is the N+1 query problem?"
    back: "One query fetches a list of objects, and then a separate query runs for each of the N rows to get related data. That's 1 + N queries total; response time grows linearly with the number of rows."
    tags: [drf]
  - id: drf-query-optimization-02
    front: "Why is N+1 especially easy to trigger in DRF?"
    back: "The serializer reads an object's relations (order.customer, order.items) for every row, and the lazy QuerySet obligingly loads them with point queries. The field looks innocent, but the cost is hidden in its implementation."
    tags: [drf]
  - id: drf-query-optimization-03
    front: "What does select_related do, and for which relations?"
    back: "Fetches related objects with a single SQL JOIN. Good for to-one relations: ForeignKey and OneToOneField on the side holding the key. The related object arrives in the same result row."
    tags: [drf]
  - id: drf-query-optimization-04
    front: "What does prefetch_related do, and for which relations?"
    back: "Runs a separate second query and stitches the result together in Python by key. Good for to-many relations: reverse ForeignKey and ManyToManyField. A JOIN would multiply the rows there, so Django takes a second query instead."
    tags: [drf]
  - id: drf-query-optimization-05
    front: "How do you choose between select_related and prefetch_related?"
    back: "Ask how many objects are on the other end of the relation. One object means select_related (a cheap JOIN). Many objects mean prefetch_related (a second query with stitching). They can be combined in one chain."
    tags: [drf]
  - id: drf-query-optimization-06
    front: "Where should relation preloading be specified?"
    back: "On the queryset or the ViewSet's get_queryset() method, where the query is built. It doesn't belong in the serializer: it works with objects that are already loaded and doesn't affect the number of queries."
    tags: [drf]
  - id: drf-query-optimization-07
    front: "Which serializer fields most often hide N+1?"
    back: "A nested serializer (many=True), a SerializerMethodField touching a relation (obj.items.count()), and also StringRelatedField and PrimaryKeyRelatedField when walking related objects."
    tags: [drf]
  - id: drf-query-optimization-08
    front: "Why doesn't pagination remove N+1?"
    back: "It only trims the query down to one page, but on that page each row still pulls the relation with a separate query. Twenty rows produce twenty point queries; preloading fixes it, not LIMIT."
    tags: [drf]
  - id: drf-query-optimization-09
    front: "What are the Prefetch class and the to_attr parameter for?"
    back: "Prefetch accepts a ready-made queryset, so it lets you preload a filtered or sorted slice of a relation. to_attr stores the result in a separate attribute on the object, e.g. order.expensive_items."
    tags: [drf]
  - id: drf-query-optimization-10
    front: "Why does obj.items.filter(...) in a serializer method bring N+1 back?"
    back: "Preloading caches exactly the set that was requested. Any new .filter() or .order_by() on the relation bypasses the cache and runs a fresh query for every row. Set the filter up front via Prefetch instead."
    tags: [drf]
  - id: drf-query-optimization-11
    front: "How do you count related objects without a query per row?"
    back: "With an annotation: annotate(item_count=Count(\"items\")) counts everything in one query along with the list. Then item_count arrives as a plain field, and obj.items.count() in a SerializerMethodField isn't needed."
    tags: [drf]
  - id: drf-query-optimization-12
    front: "How do you spot N+1 in practice?"
    back: "Measure the number of queries: assertNumQueries(n) in tests locks in the expected count and catches regressions, connection.queries lists them when DEBUG=True, and django-silk and Django Debug Toolbar highlight duplicates in the browser."
    tags: [drf]
