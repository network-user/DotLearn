conceptId: drf-pagination-filtering
cards:
  - id: drf-pagination-filtering-01
    front: "Почему наивное «вернуть всё» (Item.objects.all()) ломается со временем?"
    back: "Код не ломали - выросли данные. На двухстах тысячах строк endpoint тянет из базы и шлёт по сети всё, мобильное приложение давится мегабайтами, сервер выгребает память на сериализацию того, что пользователь не пролистает."
    tags: [drf]
  - id: drf-pagination-filtering-02
    front: "Четыре механизма зрелого list-endpoint и за что каждый отвечает"
    back: "Пагинация - сколько за раз, фильтрация - что в выдаче, throttling - как часто можно спрашивать, версионирование - по каким правилам. Это ортогональные оси, путать их - частый источник кривых API."
    tags: [drf]
  - id: drf-pagination-filtering-03
    front: "Каков порядок воронки над queryset?"
    back: "Сначала фильтр отбрасывает нерелевантные строки (?status=paid), затем сортировка упорядочивает оставшиеся (?ordering=-created), затем пагинация отрезает одну страницу. Throttling стоит ещё раньше, на входе."
    tags: [drf]
  - id: drf-pagination-filtering-04
    front: "Что такое PageNumberPagination и где у неё слабое место?"
    back: "Страницы по номеру: ?page=3, клиент думает «третья страница по 20». Просто и привычно, но номер страницы плывёт, если между запросами строки добавляются или удаляются."
    tags: [drf]
  - id: drf-pagination-filtering-05
    front: "Что такое LimitOffsetPagination и в чём её минус?"
    back: "Окно по смещению: ?limit=20&offset=40, клиент сам задаёт размер и сдвиг. Гибко для произвольных срезов, но большой offset заставляет базу пропускать строки - на глубоких страницах это дорого."
    tags: [drf]
  - id: drf-pagination-filtering-06
    front: "Что такое CursorPagination и за что платят при её выборе?"
    back: "Курсор на отсортированном поле: ?cursor=<opaque>, «следующая страница после этой записи». Устойчива к вставкам и удалениям, быстра на любой глубине, но не умеет прыгать на произвольную страницу - только вперёд/назад."
    tags: [drf]
  - id: drf-pagination-filtering-07
    front: "Правило выбора стиля пагинации под задачу"
    back: "Листаемый UI с номерами - PageNumberPagination. Произвольные срезы и «подгрузить ещё» с контролем размера - LimitOffsetPagination. Большие, часто меняющиеся ленты, где важна стабильность и глубина - CursorPagination."
    tags: [drf]
  - id: drf-pagination-filtering-08
    front: "Три backend'а фильтрации/поиска/сортировки и их query-параметры"
    back: "DjangoFilterBackend - точное равенство по полям (?status=paid), через filterset_fields. SearchFilter - вхождение по нескольким текстовым полям (?search=...), через search_fields. OrderingFilter - порядок (?ordering=-created), через ordering_fields."
    tags: [drf]
  - id: drf-pagination-filtering-09
    front: "Чем filterset_fields отличается от search_fields?"
    back: "Фильтр по title (?title=Книга) ищет точное равенство; search_fields=[\"title\"] (?search=книга) ищет вхождение подстроки. Точное «равно» и нечёткое «содержит» - разные операции, клиент дёргает их разными параметрами."
    tags: [drf]
  - id: drf-pagination-filtering-10
    front: "Складываются ли backend'ы фильтрации между собой?"
    back: "Да. Запрос ?status=paid&search=книга&ordering=-price сначала отфильтрует по status, потом сузит поиском, потом отсортирует. Каждый backend трогает свой набор query-параметров и не мешает соседям."
    tags: [drf]
  - id: drf-pagination-filtering-11
    front: "Зачем нужен throttling и что возвращается при превышении?"
    back: "Защита от перебора и абуза, а не бизнес-логика; стоит до основной работы view. Скорость задают строкой «число/период» (\"100/hour\"). Превышение даёт 429 Too Many Requests с заголовком Retry-After."
    tags: [drf]
  - id: drf-pagination-filtering-12
    front: "Три класса throttling и на кого каждый рассчитан"
    back: "AnonRateThrottle - для анонимов, UserRateThrottle - на пользователя, ScopedRateThrottle - свой лимит на группу endpoint'ов. Скорость настраивается в DEFAULT_THROTTLE_RATES."
    tags: [drf]
  - id: drf-pagination-filtering-13
    front: "Зачем нужно версионирование API и где доступна выбранная версия?"
    back: "Несовместимые изменения (переименовали поле, другой формат) разводят по версиям, чтобы старые клиенты не сломались. Версия (URL, заголовок Accept, ?version=2) доступна как request.version, по ней код выбирает сериализатор или поведение."
    tags: [drf]
  - id: drf-pagination-filtering-14
    front: "Что вернёт список без заданной пагинации?"
    back: "Весь queryset - ту самую проблему, с которой раздел начинался. Пагинацию включают глобально в DEFAULT_PAGINATION_CLASS, иначе про неё забывают до первого инцидента на проде."
    tags: [drf]
  - id: drf-pagination-filtering-15
    front: "Спасает ли маленький limit от глубокого offset?"
    back: "Нет. ?limit=20&offset=100000 всё равно заставит базу пройти и отбросить сто тысяч строк, прежде чем отдать двадцать. Для глубоких лент существует CursorPagination."
    tags: [drf]
  - id: drf-pagination-filtering-16
    front: "Что будет, если фильтровать или сортировать по полю не из белого списка?"
    back: "ordering_fields и filterset_fields - белый список. Поле не в списке - параметр молча проигнорируется, а не отсортирует/отфильтрует. Это защита: иначе клиент сортировал бы по любому полю, в том числе неиндексированному или приватному."
    tags: [drf]
