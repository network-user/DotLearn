conceptId: drf-auth-permissions
cards:
  - id: drf-auth-permissions-01
    front: "The two questions the server answers before handing out data, and their order"
    back: "First, who is this? - authentication sets the sender's identity in request.user. Then, are they allowed? - permissions judge the already-established identity. The order authentication -> permission is fixed."
    tags: [drf]
  - id: drf-auth-permissions-02
    front: "What does the authentication layer do, and what does it put on the request?"
    back: "It reads something from the request (header, cookie) and sets request.user and request.auth. It doesn't decide about access - it only establishes identity. It lets an anonymous user through tagged as AnonymousUser."
    tags: [drf]
  - id: drf-auth-permissions-03
    front: "How does DRF pick an authentication class from the list?"
    back: "It tries the classes in order; the first one that identifies the sender wins. If none does, request.user becomes AnonymousUser - that's a normal state, not an error."
    tags: [drf]
  - id: drf-auth-permissions-04
    front: "Three built-in authentication classes and what each relies on"
    back: "SessionAuthentication relies on Django's session cookie (frontend and API on the same domain). TokenAuthentication relies on a static token in Authorization: Token. JWT via SimpleJWT relies on a self-verifying access token (Bearer) with an expiry baked in."
    tags: [drf]
  - id: drf-auth-permissions-05
    front: "What does the permissions layer do?"
    back: "It receives a request with request.user already set and returns True/False - let the request through or deny it. Permissions don't set identity, they only judge one that's already established."
    tags: [drf]
  - id: drf-auth-permissions-06
    front: "How does has_permission differ from has_object_permission?"
    back: "has_permission(request, view) checks access at the whole-endpoint level, before any object is picked, for every request. has_object_permission(request, view, obj) checks a specific object and only runs when the view fetches it via get_object()."
    tags: [drf]
  - id: drf-auth-permissions-07
    front: "Name common built-in permission classes."
    back: "AllowAny (let everyone through), IsAuthenticated (identified users only), IsAdminUser (is_staff only), IsAuthenticatedOrReadOnly (anyone can read, only identified users can write). A custom class subclasses BasePermission."
    tags: [drf]
  - id: drf-auth-permissions-08
    front: "Why does authentication always come before permissions?"
    back: "Permissions judge request.user, and it has to be set first. If permissions ran first, they'd have nothing to judge. The order isn't configurable and isn't arbitrary."
    tags: [drf]
  - id: drf-auth-permissions-09
    front: "How does 401 differ from 403?"
    back: "401 - identity isn't established (no token, expired, invalid), meaning identify yourself, fixed by logging in. 403 - identity is established but there isn't enough permission, meaning identified but not allowed here, logging in won't help."
    tags: [drf]
  - id: drf-auth-permissions-10
    front: "How does DRF choose between 401 and 403?"
    back: "If the request is anonymous and there's an authentication scheme with a WWW-Authenticate header, it returns 401 (try identifying yourself). If the user is already identified but permissions said False, it returns 403 (too late to identify yourself)."
    tags: [drf]
  - id: drf-auth-permissions-11
    front: "What does an empty permission_classes mean?"
    back: "Not deny everyone, but no permission checks at all - meaning let everyone through, like AllowAny. Closing an endpoint requires an explicit IsAuthenticated. Silence here reads as allowed."
    tags: [drf]
  - id: drf-auth-permissions-12
    front: "Why doesn't has_object_permission work for filtering lists?"
    back: "It only runs on get_object() for a single record; a list has many objects, and DRF doesn't call the object-level check for each one. Other people's records are hidden via get_queryset(), returning only the ones belonging to request.user."
    tags: [drf]
  - id: drf-auth-permissions-13
    front: "Why doesn't IsAuthenticated protect other people's objects?"
    back: "It only checks the fact of being logged in, not ownership, and lets any identified user through - owner or stranger alike. Only my own object needs has_object_permission or queryset filtering. Authenticated doesn't mean authorized for this particular object."
    tags: [drf]
  - id: drf-auth-permissions-14
    front: "How can object-level permissions be accidentally bypassed?"
    back: "By fetching the record by hand, skipping get_object(): if a view writes Order.objects.get(pk=pk) directly, has_object_permission never runs - it's specifically triggered by get_object(). Object-level permissions only work through the normal object-fetch path."
    tags: [drf]
  - id: drf-auth-permissions-15
    front: "What's the recommended safe default for permissions, and why?"
    back: "A global IsAuthenticated in DEFAULT_PERMISSION_CLASSES, with targeted loosening via AllowAny on public endpoints: default closed, exceptions open. That way a forgotten endpoint stays closed. A view's own list fully replaces the global one rather than adding to it."
    tags: [drf]
