conceptId: drf-viewsets-routers
cards:
  - id: drf-viewsets-routers-01
    front: "Какие пять типовых endpoint'ов повторяются в каждом REST-ресурсе?"
    back: "Список (GET /items/), создание (POST /items/), один объект (GET /items/42/), замена (PUT /items/42/), удаление (DELETE /items/42/). Меняются имена и поля, но форма повторяется в каждом ресурсе."
    tags: [drf]
  - id: drf-viewsets-routers-02
    front: "Опишите лестницу абстракций DRF снизу вверх."
    back: "APIView (всё руками), GenericAPIView + миксины (действия из готовых кусков), concrete generics (частые наборы миксинов в одном классе), ModelViewSet + router (все пять действий, URL строит router). Чем выше, тем меньше кода и свободы."
    tags: [drf]
  - id: drf-viewsets-routers-03
    front: "Что даёт GenericAPIView сам по себе?"
    back: "Два ключевых атрибута - queryset и serializer_class - и два опирающихся на них метода: get_queryset() и get_serializer(). Сам по себе он почти пуст; действия приносят миксины."
    tags: [drf]
  - id: drf-viewsets-routers-04
    front: "Какие пять миксинов покрывают пять действий и что даёт каждый?"
    back: "ListModelMixin даёт .list(), CreateModelMixin - .create(), RetrieveModelMixin - .retrieve(), UpdateModelMixin - .update(), DestroyModelMixin - .destroy(). HTTP-метод с методом миксина при этом связываете вручную."
    tags: [drf]
  - id: drf-viewsets-routers-05
    front: "Что такое concrete generics и какие два класса покрывают полный CRUD?"
    back: "Готовые классы из частых сочетаний миксинов, без ручного связывания. ListCreateAPIView - GET/POST на коллекции, RetrieveUpdateDestroyAPIView - GET/PUT/PATCH/DELETE на одном объекте. Имя класса называет его действия."
    tags: [drf]
  - id: drf-viewsets-routers-06
    front: "Чем ViewSet отличается от APIView по устройству?"
    back: "ViewSet не привязан к HTTP-методам: вместо get/post у него действия с именами list, retrieve, create, update, destroy. Кто свяжет действие с методом и URL, решает router."
    tags: [drf]
  - id: drf-viewsets-routers-07
    front: "Что реализует ModelViewSet и чем от него отличается ReadOnlyModelViewSet?"
    back: "ModelViewSet реализует все пять действий поверх queryset и serializer - три строки тела дают весь CRUD. ReadOnlyModelViewSet даёт только list и retrieve (чтение)."
    tags: [drf]
  - id: drf-viewsets-routers-08
    front: "Что делает router.register для одного ViewSet?"
    back: "Порождает два URL-шаблона: items/ (коллекция) и items/{pk}/ (объект), и сам сопоставляет HTTP-метод с действием ViewSet'а. Одна строка register заменяет ручное перечисление path для пяти действий."
    tags: [drf]
  - id: drf-viewsets-routers-09
    front: "Как router сопоставляет метод и URL с action на коллекции и на объекте?"
    back: "На коллекции /items/ (без pk): GET → list, POST → create. На объекте /items/{pk}/: GET → retrieve, PUT → update, PATCH → partial_update, DELETE → destroy."
    tags: [drf]
  - id: drf-viewsets-routers-10
    front: "Чем PUT отличается от PATCH в ViewSet?"
    back: "PUT (update) ожидает полное представление и заменяет объект целиком; пропущенное обязательное поле - ошибка валидации. PATCH (partial_update) трогает только присланное (сериализатор с partial=True). Это разные действия, не синонимы."
    tags: [drf]
  - id: drf-viewsets-routers-11
    front: "Когда basename обязателен при register?"
    back: "Когда у ViewSet нет queryset как атрибута (задан только через get_queryset()). Router выводит имена маршрутов из queryset модели; без него он не угадает имя и потребует явный basename, иначе ошибка при старте."
    tags: [drf]
  - id: drf-viewsets-routers-12
    front: "Чем DefaultRouter отличается от SimpleRouter?"
    back: "DefaultRouter добавляет корневой API-root (GET /) со списком ресурсов и поддержку суффикса формата (/items.json). SimpleRouter делает то же без API-root - его берут, когда корневая страница не нужна."
    tags: [drf]
  - id: drf-viewsets-routers-13
    front: "Почему голый viewsets.ViewSet не подходит для стандартного CRUD?"
    back: "viewsets.ViewSet не реализует действия - только даёт каркас. Для стандартного CRUD нужен ModelViewSet, иначе list/create придётся писать руками, и смысл подъёма по лестнице теряется."
    tags: [drf]
  - id: drf-viewsets-routers-14
    front: "Что произойдёт, если задать ViewSet без serializer_class?"
    back: "Он упадёт: serializer_class отвечает за то, какие поля отдавать, а queryset - за то, какие объекты. Без сериализатора ViewSet не знает форму данных. Регистрировать префикс надо без ведущего слеша: register(\"items\", ...)."
    tags: [drf]
