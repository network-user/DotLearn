conceptId: drf-overview
cards:
  - id: drf-overview-01
    front: "Какую проблему голого Django решает DRF?"
    back: "JSON-API повторяет одни и те же шаги на каждом endpoint: разбор тела, валидация, сериализация объектов в примитивы, выбор формата и статуса ответа. DRF выносит это повторение в переиспользуемые слои."
    tags: [drf]
  - id: drf-overview-02
    front: "Какие три переиспользуемых слоя DRF добавляет к Django?"
    back: "Parser разбирает тело запроса в request.data, serializer проверяет и преобразует данные, renderer выбирает формат ответа. Ваш код работает с питоновскими объектами, а не с байтами."
    tags: [drf]
  - id: drf-overview-03
    front: "Что такое APIView и как называются его методы?"
    back: "APIView - наследник джанговской View, который оборачивает запрос в Request DRF и ждёт на выходе Response. Методы называются по HTTP-глаголу: get, post, put, patch, delete."
    tags: [drf]
  - id: drf-overview-04
    front: "Чем request.data удобнее ручного разбора тела в голом Django?"
    back: "request.data единообразно отдаёт разобранное тело и для JSON, и для формы - один словарь независимо от формата. В голом Django JSON читают через json.loads(request.body), а форму через request.POST: два разных места."
    tags: [drf]
  - id: drf-overview-05
    front: "Что такое request.query_params?"
    back: "Это аккуратное имя DRF для query string. В Django это был request.GET, что путало: query string приходит и в POST-запросах, а не только в GET."
    tags: [drf]
  - id: drf-overview-06
    front: "Как Response выбирает формат ответа?"
    back: "Response принимает питоновские данные и откладывает выбор формата до конца обработки. Content negotiation по заголовку Accept решает, отдать JSON или browsable HTML; вызывать json.dumps вручную не нужно."
    tags: [drf]
  - id: drf-overview-07
    front: "Что такое browsable API и где его обычно отключают?"
    back: "Это человекочитаемая HTML-страница ответа с формой и ссылками, которую отдаёт browsable-рендерер при Accept: text/html. Удобен для отладки руками, но на проде его обычно отключают: лишняя поверхность и лишний рендеринг."
    tags: [drf]
  - id: drf-overview-08
    front: "Зачем нужен модуль rest_framework.status?"
    back: "Он хранит именованные константы кодов: status.HTTP_201_CREATED, status.HTTP_404_NOT_FOUND. Они читаются лучше голых чисел и страхуют от опечатки - 201 легко перепутать с 200."
    tags: [drf]
  - id: drf-overview-09
    front: "Какой статус вернёт Response без явного аргумента status?"
    back: "Всегда 200. Если создаёте ресурс через POST и забыли status=status.HTTP_201_CREATED, клиент получит 200 OK вместо 201 Created - семантическое враньё. Статус задают осознанно, это часть контракта."
    tags: [drf]
  - id: drf-overview-10
    front: "Валидирует ли APIView входные данные сам?"
    back: "Нет. request.data[\"name\"] бросит KeyError, если поля нет. Проверка данных - работа сериализатора, а не view; APIView лишь даёт удобный вход и выход."
    tags: [drf]
  - id: drf-overview-11
    front: "Почему нельзя смешивать request.data и request.body в одной view?"
    back: "DRF разбирает тело один раз и кэширует результат, поэтому request.data читают многократно. Но поток тела уже прочитан, так что обратиться к request.body после этого поздно. Выберите один уровень."
    tags: [drf]
  - id: drf-overview-12
    front: "Почему возврат JsonResponse из APIView - ошибка?"
    back: "С JsonResponse не сработают content negotiation и browsable API: Вы вернётесь к ручному рендерингу, ради ухода от которого и взяли DRF. Внутри DRF-view возвращают Response."
    tags: [drf]
