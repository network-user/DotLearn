conceptId: drf-serializers
cards:
  - id: drf-serializers-01
    front: "Что такое serializer в DRF одной фразой?"
    back: "Двунаправленный переводчик между питоновским объектом и JSON: наружу он превращает объект в словарь примитивов, внутрь - входной словарь в проверенный, готовый к сохранению набор данных."
    tags: [drf]
  - id: drf-serializers-02
    front: "Какие две дороги проходит один и тот же serializer?"
    back: "Сериализация: объект через поля превращается в .data (словарь примитивов). Десериализация: входной словарь проходит is_valid(), даёт validated_data и сохраняется через save(). Один набор полей обслуживает обе."
    tags: [drf]
  - id: drf-serializers-03
    front: "Чем ModelSerializer отличается от голого Serializer?"
    back: "Голый Serializer описывают полем за полем и create пишут сами. ModelSerializer выводит поля и create/update из модели, как ModelForm относительно Form. Голый нужен, когда вход не равен одной таблице."
    tags: [drf]
  - id: drf-serializers-04
    front: "Как сериализовать список объектов?"
    back: "Добавить many=True: OrderSerializer(orders, many=True).data вернёт список словарей. На дороге сериализации валидация не запускается - объект из базы считается уже корректным."
    tags: [drf]
  - id: drf-serializers-05
    front: "Какие четыре шага у десериализации и почему порядок строгий?"
    back: "Создать serializer с data=request.data, вызвать is_valid(), прочитать validated_data, сохранить через save(). Сначала проверка, потом доступ к очищенным данным: до is_valid() validated_data просто нет."
    tags: [drf]
  - id: drf-serializers-06
    front: "Как save() выбирает между create и update?"
    back: "По наличию исходного instance. Без объекта (data=...) save() зовёт create(validated_data); с объектом (OrderSerializer(order, data=...)) - update(order, validated_data). instance - переключатель «создать/обновить»."
    tags: [drf]
  - id: drf-serializers-07
    front: "Три уровня валидации в сериализаторе и их порядок"
    back: "Сначала поля и валидаторы (тип, длина, формат). Затем validate_<field> по одному полю. Затем validate(attrs) для перекрёстных проверок нескольких полей сразу. Поле-валидаторы отрабатывают раньше общего validate."
    tags: [drf]
  - id: drf-serializers-08
    front: "Что значат read_only, write_only и source у поля?"
    back: "read_only - только наружу (попадёт в .data, на входе игнорируется): id, серверные даты. write_only - только внутрь (примут, но не вернут): password. source отвязывает имя в JSON от атрибута объекта."
    tags: [drf]
  - id: drf-serializers-09
    front: "Почему вложенный serializer по умолчанию помечают read_only=True?"
    back: "Запись вложенных объектов из коробки не работает: DRF не знает, как создать заказ вместе с позициями за один save(). Вложенное на чтение бесплатно, на запись требует явного create()/update()."
    tags: [drf]
  - id: drf-serializers-10
    front: "Что делает флаг partial=True и зачем он PATCH?"
    back: "С partial=True отсутствующие поля не считаются ошибкой, обновляется лишь присланное. PATCH создаёт сериализатор с этим флагом. Без него PATCH потребует все обязательные поля, как PUT, и частичное обновление сломается."
    tags: [drf]
  - id: drf-serializers-11
    front: "Что происходит с лишними полями во входных данных?"
    back: "Они молча отбрасываются: если клиент прислал is_admin: true, а в fields такого поля нет, в validated_data оно не попадёт. Это и защита, и ловушка - опечатка в имени поля не вызовет ошибку, значение просто исчезнет."
    tags: [drf]
  - id: drf-serializers-12
    front: "Когда validate_<field> не вызывается?"
    back: "Если поле не прошло встроенную проверку или вовсе отсутствует во входе. Рассчитывать на безусловный вызов validate_email нельзя; проверки, которые должны срабатывать всегда, выносят в validate(attrs) с проверкой наличия ключа."
    tags: [drf]
  - id: drf-serializers-13
    front: "Почему в ответ отдают serializer.data, а не request.data?"
    back: "Только serializer.data отражает реальное сохранённое состояние, включая серверные поля вроде id. request.data - это входной словарь без них; возврат его в ответе скрывает то, что на самом деле записано."
    tags: [drf]
  - id: drf-serializers-14
    front: "Чем грозит забытый return в validate_<field> или validate?"
    back: "Метод обязан вернуть значение (поле или attrs). Без return поле станет None, и проверка тихо испортит данные - вместо защиты получите тихую порчу."
    tags: [drf]
