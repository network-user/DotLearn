conceptId: drf-viewsets-routers
cards:
  - id: drf-viewsets-routers-01
    front: "Which five typical endpoints repeat in every REST resource?"
    back: "List (GET /items/), create (POST /items/), single object (GET /items/42/), replace (PUT /items/42/), delete (DELETE /items/42/). Names and fields change, but the shape repeats in every resource."
    tags: [drf]
  - id: drf-viewsets-routers-02
    front: "Describe DRF's ladder of abstractions from bottom to top."
    back: "APIView (everything by hand), GenericAPIView + mixins (actions from ready-made pieces), concrete generics (common mixin combos in one class), ModelViewSet + router (all five actions, router builds the URLs). The higher up, the less code and freedom."
    tags: [drf]
  - id: drf-viewsets-routers-03
    front: "What does GenericAPIView provide by itself?"
    back: "Two key attributes - queryset and serializer_class - and two methods built on them: get_queryset() and get_serializer(). By itself it's nearly empty; mixins bring the actions."
    tags: [drf]
  - id: drf-viewsets-routers-04
    front: "Which five mixins cover the five actions, and what does each give you?"
    back: "ListModelMixin gives .list(), CreateModelMixin gives .create(), RetrieveModelMixin gives .retrieve(), UpdateModelMixin gives .update(), DestroyModelMixin gives .destroy(). You still wire the HTTP method to the mixin method by hand."
    tags: [drf]
  - id: drf-viewsets-routers-05
    front: "What are concrete generics, and which two classes cover full CRUD?"
    back: "Ready-made classes for common mixin combinations, with no manual wiring. ListCreateAPIView is GET/POST on the collection, RetrieveUpdateDestroyAPIView is GET/PUT/PATCH/DELETE on a single object. The class name states its actions."
    tags: [drf]
  - id: drf-viewsets-routers-06
    front: "How does ViewSet differ from APIView structurally?"
    back: "A ViewSet isn't tied to HTTP methods: instead of get/post it has actions named list, retrieve, create, update, destroy. It's the router that decides which action maps to which method and URL."
    tags: [drf]
  - id: drf-viewsets-routers-07
    front: "What does ModelViewSet implement, and how does ReadOnlyModelViewSet differ from it?"
    back: "ModelViewSet implements all five actions on top of a queryset and serializer - three lines of body give you the whole CRUD. ReadOnlyModelViewSet only gives list and retrieve (reads)."
    tags: [drf]
  - id: drf-viewsets-routers-08
    front: "What does router.register do for one ViewSet?"
    back: "It produces two URL patterns: items/ (collection) and items/{pk}/ (object), and maps HTTP methods to the ViewSet's actions itself. One register line replaces manually listing paths for five actions."
    tags: [drf]
  - id: drf-viewsets-routers-09
    front: "How does a router map method and URL to an action on the collection versus the object?"
    back: "On the collection /items/ (no pk): GET -> list, POST -> create. On the object /items/{pk}/: GET -> retrieve, PUT -> update, PATCH -> partial_update, DELETE -> destroy."
    tags: [drf]
  - id: drf-viewsets-routers-10
    front: "How does PUT differ from PATCH on a ViewSet?"
    back: "PUT (update) expects the full representation and replaces the object entirely; a missing required field is a validation error. PATCH (partial_update) only touches what was sent (serializer with partial=True). They're different actions, not synonyms."
    tags: [drf]
  - id: drf-viewsets-routers-11
    front: "When is basename required on register?"
    back: "When the ViewSet has no queryset attribute (it's only set via get_queryset()). The router derives route names from the model's queryset; without one it can't guess the name and requires an explicit basename, or it fails at startup."
    tags: [drf]
  - id: drf-viewsets-routers-12
    front: "How does DefaultRouter differ from SimpleRouter?"
    back: "DefaultRouter adds a root API-root (GET /) listing resources, plus support for a format suffix (/items.json). SimpleRouter does the same without the API-root - used when the root page isn't needed."
    tags: [drf]
  - id: drf-viewsets-routers-13
    front: "Why doesn't a bare viewsets.ViewSet fit standard CRUD?"
    back: "viewsets.ViewSet implements no actions - it only gives scaffolding. Standard CRUD needs ModelViewSet, otherwise list/create have to be written by hand, and the point of climbing the ladder is lost."
    tags: [drf]
  - id: drf-viewsets-routers-14
    front: "What happens if you set up a ViewSet without serializer_class?"
    back: "It fails: serializer_class controls which fields are returned, while queryset controls which objects. Without a serializer the ViewSet doesn't know the shape of the data. Register the prefix without a leading slash: register(\"items\", ...)."
    tags: [drf]
