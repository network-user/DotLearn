conceptId: drf-overview
cards:
  - id: drf-overview-01
    front: "What problem does DRF solve on top of plain Django?"
    back: "Every JSON API endpoint repeats the same steps: parse the body, validate, serialize objects into primitives, pick a response format and status. DRF moves that repetition into reusable layers."
    tags: [drf]
  - id: drf-overview-02
    front: "What three reusable layers does DRF add to Django?"
    back: "Parser parses the request body into request.data, serializer validates and converts data, renderer picks the response format. Your code works with Python objects, not bytes."
    tags: [drf]
  - id: drf-overview-03
    front: "What is APIView and what are its methods called?"
    back: "APIView is a subclass of Django's View that wraps the request in a DRF Request and expects a Response back. Its methods are named after the HTTP verb: get, post, put, patch, delete."
    tags: [drf]
  - id: drf-overview-04
    front: "How is request.data more convenient than parsing the body by hand in plain Django?"
    back: "request.data uniformly returns the parsed body for both JSON and forms - one dict regardless of format. In plain Django you read JSON via json.loads(request.body) and forms via request.POST: two different places."
    tags: [drf]
  - id: drf-overview-05
    front: "What is request.query_params?"
    back: "It's DRF's cleaner name for the query string. In Django this was request.GET, which was confusing: the query string can also show up on POST requests, not only GET."
    tags: [drf]
  - id: drf-overview-06
    front: "How does Response pick the response format?"
    back: "Response accepts Python data and defers the format choice until the end of processing. Content negotiation on the Accept header decides between JSON or browsable HTML; you never call json.dumps by hand."
    tags: [drf]
  - id: drf-overview-07
    front: "What is the browsable API, and where is it usually disabled?"
    back: "It's a human-readable HTML page for the response, with a form and links, served by the browsable renderer when Accept: text/html. Handy for manual debugging, but it's usually turned off in production: extra surface, extra rendering."
    tags: [drf]
  - id: drf-overview-08
    front: "What is the rest_framework.status module for?"
    back: "It holds named status code constants: status.HTTP_201_CREATED, status.HTTP_404_NOT_FOUND. They read better than bare numbers and guard against typos - 201 is easy to confuse with 200."
    tags: [drf]
  - id: drf-overview-09
    front: "What status does Response return without an explicit status argument?"
    back: "Always 200. If you create a resource via POST and forget status=status.HTTP_201_CREATED, the client gets 200 OK instead of 201 Created - a semantic lie. Status is set deliberately, it's part of the contract."
    tags: [drf]
  - id: drf-overview-10
    front: "Does APIView validate input data by itself?"
    back: "No. request.data[\"name\"] raises KeyError if the field is missing. Validating data is the serializer's job, not the view's; APIView just gives you a convenient input and output."
    tags: [drf]
  - id: drf-overview-11
    front: "Why can't you mix request.data and request.body in the same view?"
    back: "DRF parses the body once and caches the result, so request.data can be read many times. But the body stream has already been consumed, so reaching for request.body afterward is too late. Pick one level."
    tags: [drf]
  - id: drf-overview-12
    front: "Why is returning a JsonResponse from APIView a mistake?"
    back: "With JsonResponse, content negotiation and the browsable API stop working: you're back to manual rendering, the thing DRF was supposed to save you from. Inside a DRF view you return a Response."
    tags: [drf]
