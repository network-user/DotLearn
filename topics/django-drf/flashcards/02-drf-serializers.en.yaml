conceptId: drf-serializers
cards:
  - id: drf-serializers-01
    front: "What is a serializer in DRF, in one phrase?"
    back: "A two-way translator between a Python object and JSON: outbound it turns an object into a dict of primitives, inbound it turns an input dict into a validated set of data ready to be saved."
    tags: [drf]
  - id: drf-serializers-02
    front: "What two paths does the same serializer go through?"
    back: "Serialization: an object goes through the fields into .data (a dict of primitives). Deserialization: an input dict goes through is_valid(), produces validated_data, and gets saved via save(). One set of fields serves both."
    tags: [drf]
  - id: drf-serializers-03
    front: "How does ModelSerializer differ from a plain Serializer?"
    back: "A plain Serializer is described field by field, and you write create() yourself. ModelSerializer derives the fields and create/update from the model, like ModelForm relates to Form. You need the plain one when the input doesn't map to one table."
    tags: [drf]
  - id: drf-serializers-04
    front: "How do you serialize a list of objects?"
    back: "Add many=True: OrderSerializer(orders, many=True).data returns a list of dicts. Validation doesn't run on the serialization path - an object from the database is already considered valid."
    tags: [drf]
  - id: drf-serializers-05
    front: "What are the four steps of deserialization, and why is the order strict?"
    back: "Create a serializer with data=request.data, call is_valid(), read validated_data, save via save(). Validate first, then access the cleaned data: validated_data simply doesn't exist before is_valid()."
    tags: [drf]
  - id: drf-serializers-06
    front: "How does save() choose between create and update?"
    back: "By whether an instance was passed in. Without an object (data=...) save() calls create(validated_data); with an object (OrderSerializer(order, data=...)) it calls update(order, validated_data). instance is the create/update switch."
    tags: [drf]
  - id: drf-serializers-07
    front: "The three validation levels in a serializer, in order"
    back: "First the fields and their validators (type, length, format). Then validate_<field> for a single field. Then validate(attrs) for cross-field checks across several fields at once. Field validators run before the overall validate."
    tags: [drf]
  - id: drf-serializers-08
    front: "What do read_only, write_only, and source mean on a field?"
    back: "read_only is outbound only (shows up in .data, ignored on input): id, server-set dates. write_only is inbound only (accepted but not returned): password. source decouples the JSON key name from the object's attribute."
    tags: [drf]
  - id: drf-serializers-09
    front: "Why is a nested serializer marked read_only=True by default?"
    back: "Writing nested objects doesn't work out of the box: DRF doesn't know how to create an order together with its items in one save(). Nested reads are free, nested writes need an explicit create()/update()."
    tags: [drf]
  - id: drf-serializers-10
    front: "What does the partial=True flag do, and why does PATCH need it?"
    back: "With partial=True missing fields aren't treated as errors, only what was sent gets updated. PATCH creates the serializer with this flag. Without it, PATCH would demand every required field like PUT, and partial updates would break."
    tags: [drf]
  - id: drf-serializers-11
    front: "What happens to extra fields in the input data?"
    back: "They're silently dropped: if the client sends is_admin: true and there's no such field in fields, it never makes it into validated_data. That's both a protection and a trap - a typo in a field name won't raise an error, the value just vanishes."
    tags: [drf]
  - id: drf-serializers-12
    front: "When doesn't validate_<field> get called?"
    back: "If the field fails its built-in check, or is missing from the input entirely. You can't count on validate_email always running; checks that must always fire belong in validate(attrs) with an explicit key-presence check."
    tags: [drf]
  - id: drf-serializers-13
    front: "Why return serializer.data in the response instead of request.data?"
    back: "Only serializer.data reflects the actual saved state, including server-set fields like id. request.data is the input dict without them; returning it in the response hides what was actually written."
    tags: [drf]
  - id: drf-serializers-14
    front: "What goes wrong if you forget return in validate_<field> or validate?"
    back: "The method must return a value (the field or attrs). Without return, the field becomes None, and the check silently corrupts the data - instead of protection you get silent damage."
    tags: [drf]
