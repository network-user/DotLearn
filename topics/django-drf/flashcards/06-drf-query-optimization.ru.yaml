conceptId: drf-query-optimization
cards:
  - id: drf-query-optimization-01
    front: "Что такое проблема N+1 запросов?"
    back: "Один запрос забирает список объектов, а затем для каждой из N строк выполняется отдельный запрос за связанными данными. Итого 1 + N запросов; время ответа растёт линейно с числом строк."
    tags: [drf]
  - id: drf-query-optimization-02
    front: "Почему N+1 особенно легко возникает в DRF?"
    back: "Сериализатор читает связи объекта (order.customer, order.items) для каждой строки, и ленивый QuerySet послушно подгружает их точечными запросами. Поле выглядит невинно, а цена спрятана в его реализации."
    tags: [drf]
  - id: drf-query-optimization-03
    front: "Что делает select_related и для каких связей?"
    back: "Забирает связанные объекты одним SQL-запросом с JOIN. Годится для связей «к одному»: ForeignKey и OneToOneField со стороны, где лежит ключ. Связанный объект приезжает в той же строке результата."
    tags: [drf]
  - id: drf-query-optimization-04
    front: "Что делает prefetch_related и для каких связей?"
    back: "Делает отдельный второй запрос и склеивает результат в Python по ключам. Годится для связей «ко многим»: обратный ForeignKey и ManyToManyField. JOIN тут размножил бы строки, поэтому Django идёт вторым запросом."
    tags: [drf]
  - id: drf-query-optimization-05
    front: "Как выбрать между select_related и prefetch_related?"
    back: "Спросите, сколько объектов на другом конце связи. Один объект означает select_related (дешёвый JOIN). Много объектов означает prefetch_related (второй запрос со склейкой). Их можно комбинировать в одной цепочке."
    tags: [drf]
  - id: drf-query-optimization-06
    front: "Где задавать предзагрузку связей?"
    back: "В queryset или методе get_queryset() у ViewSet, там, где рождается выборка. В сериализаторе этого делать не нужно: он работает с уже загруженными объектами и на число запросов не влияет."
    tags: [drf]
  - id: drf-query-optimization-07
    front: "Какие поля сериализатора чаще всего прячут N+1?"
    back: "Вложенный сериализатор (many=True), SerializerMethodField с обращением к связи (obj.items.count()), а также StringRelatedField и PrimaryKeyRelatedField при обходе связанных объектов."
    tags: [drf]
  - id: drf-query-optimization-08
    front: "Почему пагинация не убирает N+1?"
    back: "Она лишь режет выборку до одной страницы, но на этой странице каждая строка всё равно тянет связь отдельным запросом. Двадцать строк дадут двадцать точечных запросов; спасает предзагрузка, а не LIMIT."
    tags: [drf]
  - id: drf-query-optimization-09
    front: "Зачем нужны класс Prefetch и параметр to_attr?"
    back: "Prefetch принимает готовый queryset, поэтому позволяет предзагрузить отфильтрованный или отсортированный срез связи. to_attr складывает результат в отдельный атрибут объекта, например order.expensive_items."
    tags: [drf]
  - id: drf-query-optimization-10
    front: "Почему obj.items.filter(...) в методе сериализатора воскрешает N+1?"
    back: "Предзагрузка кэширует ровно тот набор, который просили. Любой новый .filter() или .order_by() по связи идёт мимо кэша и выполняет свежий запрос на каждую строку. Фильтр задают заранее через Prefetch."
    tags: [drf]
  - id: drf-query-optimization-11
    front: "Как посчитать связанные объекты без запроса на каждую строку?"
    back: "Аннотацией: annotate(item_count=Count(\"items\")) считает всё одним запросом вместе со списком. Тогда item_count приедет как обычное поле, и obj.items.count() в SerializerMethodField не понадобится."
    tags: [drf]
  - id: drf-query-optimization-12
    front: "Как обнаружить N+1 на практике?"
    back: "Измерять число запросов: assertNumQueries(n) в тестах фиксирует ожидаемое число и ловит регресс, connection.queries показывает список при DEBUG=True, django-silk и Django Debug Toolbar подсвечивают дубли в браузере."
    tags: [drf]
