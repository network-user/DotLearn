exercises:
  - id: tool-call-nature-001
    concept: tool-use
    type: theory-quiz
    difficulty: 1
    prompt: "What does the model actually do when it calls a tool?"
    choices:
      - id: a
        text: "It emits a structured request to call tool X with given arguments; your code executes it."
      - id: b
        text: "It connects to the internet and performs the action itself before any other checks run on this path."
      - id: c
        text: "It runs the tool inside the neural network on its weights before any other checks run on this path."
      - id: d
        text: "Nothing: language models cannot use tools before any other checks run on this path."
    correct: [a]
    explanation: "The model still only generates text. A tool call is a structured piece of that text; surrounding code runs it and feeds the result back."
    variants:
      - prompt: "Why use tools at all?"
        choices:
          - id: a
            text: "So the model can go beyond its text: fetch fresh data, query a database, run code, send email."
          - id: b
            text: "To speed up input tokenization, produced in full without further selection."
          - id: c
            text: "To shrink parameter count immediately, without an intermediate state and without extra checks."
          - id: d
            text: "To eliminate hallucinations completely forever before any other checks run on this path."
        correct: [a]
        explanation: "The model alone lacks fresh facts and cannot act; tools give it hands and up-to-date data."
      - prompt: "Why is a tool call a request, not a guarantee?"
        choices:
          - id: a
            text: "The model can err - wrong tool, bad args, or answer alone when a tool was needed; code must validate results."
          - id: b
            text: "Because tools run only on weekends immediately, without an intermediate state and without extra checks."
          - id: c
            text: "Because the model cannot form a request immediately, without an intermediate state and without extra checks."
          - id: d
            text: "Because calls always succeed and need no checks immediately, without an intermediate state."
        correct: [a]
        explanation: "A call is the model request; your code checks name and arguments before running and returns clear errors."

  - id: tool-schema-001
    concept: tool-use
    type: theory-quiz
    difficulty: 2
    prompt: "What makes up a tool description and why is the human-readable description needed?"
    choices:
      - id: a
        text: "Name, description (what and when to call), and a JSON schema for arguments."
      - id: b
        text: "Only a name; description and schema are unnecessary before any other checks run on this path."
      - id: c
        text: "Only synonyms for the tool name before any other checks run on this path."
      - id: d
        text: "A canned answer the model must output before any other checks run on this path."
    correct: [a]
    explanation: "The description is not cosmetic: vague text causes mistimed or missed calls. The schema contracts argument shape."
    variants:
      - prompt: "What does a JSON argument schema guarantee?"
        choices:
          - id: a
            text: "Arguments arrive in the specified shape: required fields of required types with required names."
          - id: b
            text: "The tool runs instantly immediately, without an intermediate state and without extra checks."
          - id: c
            text: "The model never picks the wrong tool, produced in full without further selection."
          - id: d
            text: "The answer is always in Russian immediately, without an intermediate state and without extra checks."
        correct: [a]
        explanation: "The schema is a contract on form - city as a string named city. It constrains shape, not correct tool choice."
      - prompt: "How do you make the model call a tool at the right moment?"
        choices:
          - id: a
            text: "Write a prescriptive description: not only what it does but when to call it."
          - id: b
            text: "Keep the description as short and vague as possible before any other checks run on this path."
          - id: c
            text: "Remove the argument schema entirely before any other checks run on this path."
          - id: d
            text: "Name the tool with random letters before any other checks run on this path."
        correct: [a]
        explanation: "A clear trigger in the description (call when you need FX rates or fresh news) sharply improves timing."

  - id: dispatch-tool-001
    concept: tool-use
    type: python-function
    difficulty: 2
    prompt: "Implement `dispatch(name, args, registry)` - dispatcher core: look up `name` in dict `registry`, call the function with `args` as keyword arguments (`**args`). If the name is missing, return the string `\"неизвестный инструмент\"`."
    starter: |
      def dispatch(name, args, registry):
          ...
    cases:
      - call: "dispatch('add', {'a': 2, 'b': 3}, {'add': lambda a, b: a + b})"
        expect: 5
      - call: "dispatch('mul', {'a': 4, 'b': 5}, {'mul': lambda a, b: a * b})"
        expect: 20
      - call: "dispatch('missing', {'x': 1}, {'add': lambda a, b: a + b})"
        expect: "неизвестный инструмент"
      - call: "dispatch('greet', {'name': 'Ана'}, {'greet': lambda name: 'привет, ' + name})"
        expect: "привет, Ана"
    solution: |
      def dispatch(name, args, registry):
          if name not in registry:
              return "неизвестный инструмент"
          return registry[name](**args)
    hints:
      - "The dispatcher maps the model requested name to a real function; first check the name exists."
      - "Unpack dict args into keyword arguments with **args when calling the registry function."

  - id: agent-loop-001
    concept: tool-use
    type: theory-quiz
    difficulty: 3
    prompt: "How does the agent loop work with tool calls?"
    choices:
      - id: a
        text: "Model → tool call → result → model again → … → final answer."
      - id: b
        text: "The model calls exactly one tool and must answer immediately."
      - id: c
        text: "Code calls the model in an infinite loop with no stop condition."
      - id: d
        text: "All tools fire before the model is consulted once."
    correct: [a]
    explanation: "One call is a special case. Real tasks loop: each result may trigger another tool before a final answer."
    variants:
      - prompt: "Besides the model, what determines agent quality?"
        choices:
          - id: a
            text: "How carefully tools are described and results handled: bad descriptions mean wrong calls; bad results mean bad answers."
          - id: b
            text: "Only parameter count immediately, without an intermediate state and without extra checks before any other checks run on this path."
          - id: c
            text: "Application UI color immediately, without an intermediate state and without extra checks."
          - id: d
            text: "User internet speed immediately, without an intermediate state and without extra checks."
        correct: [a]
        explanation: "Tools do not make the model omniscient; descriptions and result handling matter as much as the model."
      - prompt: "What should your code do if the model hallucinates a call - unknown tool or args outside the schema?"
        choices:
          - id: a
            text: "Validate name and args before running and return a clear error so the model can fix it on the next step."
          - id: b
            text: "Execute the call blindly immediately, without an intermediate state and without extra checks."
          - id: c
            text: "Shut down the app without explanation immediately, without an intermediate state."
          - id: d
            text: "Hand control to the user and never call the model again before any other checks run on this path."
        correct: [a]
        explanation: "Code must validate calls; errors return as messages the model uses on the next loop turn."

  - id: structured-output-001
    concept: tool-use
    type: theory-quiz
    difficulty: 3
    prompt: "What is structured output and how does it relate to tool calling?"
    choices:
      - id: a
        text: "Requiring the answer in a JSON schema instead of free text."
      - id: b
        text: "A way to speed generation by skipping tokens before any other checks run on this path."
      - id: c
        text: "A separate network that checks grammar before any other checks run on this path."
      - id: d
        text: "A ban on using any tools, produced in full without further selection."
    correct: [a]
    explanation: "Structured output helps programmatic parsing. Instead of hoping for valid JSON you set a schema and the reply conforms - same pattern as tool args."
