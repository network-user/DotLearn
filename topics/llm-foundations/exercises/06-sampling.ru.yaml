exercises:
  - id: greedy-vs-sampling-001
    concept: sampling
    type: theory-quiz
    difficulty: 1
    prompt: "Чем жадный выбор (greedy) отличается от случайного сэмплинга?"
    choices:
      - id: a
        text: "Greedy всегда берёт самый вероятный токен (детерминированно); сэмплинг тянет токен случайно, пропорционально вероятности."
      - id: b
        text: "Greedy выбирает случайный токен, а сэмплинг - самый вероятный."
      - id: c
        text: "Это два названия одного и того же алгоритма."
      - id: d
        text: "Greedy работает только для коротких ответов."
    correct: [a]
    explanation: "Greedy детерминирован и склонен к повторам; сэмплинг вносит разнообразие, выбирая токен с вероятностью, равной его доле в распределении."
    variants:
      - prompt: "Сэмплинг - это часть нейросети?"
        choices:
          - id: a
            text: "Нет: модель считает вероятности, а способ выбора токена задаётся параметрами запроса."
          - id: b
            text: "Да, сэмплинг - это последний слой нейросети."
          - id: c
            text: "Да, без сэмплинга модель не может посчитать softmax."
          - id: d
            text: "Нет, сэмплинг выполняется при обучении, а не при генерации."
        correct: [a]
        explanation: "Декодирование - отдельный шаг после модели; один и тот же набор вероятностей при разных настройках даёт разные ответы."
      - prompt: "Почему greedy decoding склонен к скучным и повторяющимся ответам?"
        choices:
          - id: a
            text: "Он всегда берёт локальный максимум и не вносит разнообразия, легко зацикливаясь."
          - id: b
            text: "Он специально повторяет последнее предложение."
          - id: c
            text: "Он игнорирует распределение вероятностей."
          - id: d
            text: "Он выбирает наименее вероятный токен."
        correct: [a]
        explanation: "Жадный выбор детерминирован: при одинаковом контексте он всегда даёт один и тот же токен, отсюда повторы и зацикливание."

  - id: temperature-effect-001
    concept: sampling
    type: theory-quiz
    difficulty: 2
    prompt: "Что делает с распределением температура T < 1?"
    choices:
      - id: a
        text: "Делает распределение острее: разрыв между фаворитом и остальными растёт, выбор почти детерминированный."
      - id: b
        text: "Делает распределение ровнее, повышая шанс редких токенов."
      - id: c
        text: "Меняет порядок токенов по вероятности."
      - id: d
        text: "Обнуляет все токены, кроме первого по индексу."
    correct: [a]
    explanation: "Температура делит логиты перед softmax. При T<1 распределение острее, при T>1 ровнее; порядок токенов температура не меняет."
    variants:
      - prompt: "Что на практике означает «температура 0»?"
        choices:
          - id: a
            text: "По соглашению - жадный выбор: всегда берётся самый вероятный токен."
          - id: b
            text: "Буквальное деление логитов на ноль внутри softmax."
          - id: c
            text: "Равномерное распределение по всем токенам."
          - id: d
            text: "Отключение модели."
        correct: [a]
        explanation: "T=0 - это деление на ноль в формуле, поэтому его трактуют как greedy: соглашение, а не подстановка в softmax."
      - prompt: "Что делает температура T > 1?"
        choices:
          - id: a
            text: "Выравнивает распределение: у редких токенов появляется шанс, текст разнообразнее и рискованнее."
          - id: b
            text: "Делает распределение острее."
          - id: c
            text: "Гарантирует фактическую точность ответа."
          - id: d
            text: "Сортирует токены по алфавиту."
        correct: [a]
        explanation: "T>1 сглаживает разрывы между вероятностями; разнообразие растёт, но растёт и риск бессвязности."

  - id: greedy-index-001
    concept: sampling
    type: python-function
    difficulty: 1
    prompt: "Реализуйте `greedy(logits)` - индекс токена, который выберет жадное декодирование (наибольший логит). При равенстве верните наименьший индекс."
    starter: |
      def greedy(logits):
          ...
    cases:
      - call: "greedy([0.2, 0.9, 0.5])"
        expect: 1
      - call: "greedy([3.0, 2.0])"
        expect: 0
      - call: "greedy([1.0, 1.0, 5.0])"
        expect: 2
    solution: |
      def greedy(logits):
          best = 0
          for i in range(1, len(logits)):
              if logits[i] > logits[best]:
                  best = i
          return best
    hints:
      - "Жадный выбор берёт токен с максимальной оценкой; softmax-преобразование тут не нужно - порядок оно не меняет."
      - "Пройдитесь по логитам, запоминая индекс максимума; строгое сравнение оставит первый из равных."
    variants:
      - prompt: "Реализуйте `greedy(logits)` - индекс самого вероятного токена при жадном декодировании. При равенстве - наименьший индекс."
        cases:
          - call: "greedy([5.0, 1.0, 1.0])"
            expect: 0
          - call: "greedy([0.0, 0.0, 0.0, 7.0])"
            expect: 3
          - call: "greedy([2.5, 9.1])"
            expect: 1
        solution: |
          def greedy(logits):
              best = 0
              for i in range(1, len(logits)):
                  if logits[i] > logits[best]:
                      best = i
              return best
      - prompt: "Реализуйте `greedy(logits)` - индекс токена с наибольшим логитом. При равенстве верните наименьший индекс."
        cases:
          - call: "greedy([-1.0, -0.2, -3.0])"
            expect: 1
          - call: "greedy([4.0, 4.0])"
            expect: 0
          - call: "greedy([0.1, 0.2, 0.3, 0.25])"
            expect: 2
        solution: |
          def greedy(logits):
              best = 0
              for i in range(1, len(logits)):
                  if logits[i] > logits[best]:
                      best = i
              return best

  - id: top-k-indices-001
    concept: sampling
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `top_k_indices(logits, k)` - отсортированные по возрастанию индексы `k` токенов с наибольшими логитами (top-k оставляет именно их). При равных логитах предпочитайте меньший индекс."
    starter: |
      def top_k_indices(logits, k):
          ...
    cases:
      - call: "top_k_indices([3.0, 1.0, 2.0, 0.5], 2)"
        expect: [0, 2]
      - call: "top_k_indices([0.1, 0.9, 0.5], 1)"
        expect: [1]
      - call: "top_k_indices([5.0, 4.0, 3.0], 3)"
        expect: [0, 1, 2]
      - call: "top_k_indices([1.0, 2.0, 2.0, 1.0], 2)"
        expect: [1, 2]
    solution: |
      def top_k_indices(logits, k):
          order = sorted(range(len(logits)), key=lambda i: (-logits[i], i))
          return sorted(order[:k])
    hints:
      - "top-k оставляет k самых вероятных токенов, а logits монотонно связаны с вероятностями - сортировать по logits достаточно."
      - "Отсортируйте индексы по убыванию логита (при равенстве - по возрастанию индекса), возьмите первые k и затем верните их по возрастанию."
      - "Сортировку по убыванию логита удобно задать ключом -logits[i], а тай-брейк - вторым элементом ключа i."

  - id: temperature-prob-001
    concept: sampling
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `temperature_prob(logits, temp, i)` - вероятность токена с индексом `i` после деления логитов на температуру `temp` и softmax. Верните одно число."
    starter: |
      import math

      def temperature_prob(logits, temp, i):
          ...
    cases:
      - call: "temperature_prob([2.0, 1.0, 0.0], 1.0, 0)"
        expect_approx: 0.6652410
      - call: "temperature_prob([2.0, 1.0, 0.0], 0.5, 0)"
        expect_approx: 0.8668133
      - call: "temperature_prob([1.0, 1.0], 1.0, 0)"
        expect_approx: 0.5
      - call: "temperature_prob([2.0, 1.0, 0.0], 2.0, 0)"
        expect_approx: 0.5064804
    solution: |
      import math

      def temperature_prob(logits, temp, i):
          scaled = [x / temp for x in logits]
          m = max(scaled)
          exps = [math.exp(s - m) for s in scaled]
          total = sum(exps)
          return exps[i] / total
    hints:
      - "Температура действует до softmax: сначала каждый логит делится на temp, потом считается обычный softmax."
      - "При temp < 1 распределение становится острее, при temp > 1 - ровнее; проверьте это на крайних случаях в голове."
      - "Вычтите максимум масштабированных логитов перед exp для устойчивости, затем верните долю индекса i."
