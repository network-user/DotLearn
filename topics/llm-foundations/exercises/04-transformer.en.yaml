exercises:
  - id: block-parts-001
    concept: transformer
    type: theory-quiz
    difficulty: 1
    prompt: "What are the two main operations inside one transformer block, in order?"
    choices:
      - id: a
        text: "Self-attention and MLP (feed-forward)."
      - id: b
        text: "Tokenization and embedding."
      - id: c
        text: "Convolution and pooling."
      - id: d
        text: "Sampling and probability normalization."
    correct: [a]
    explanation: "A block is self-attention (tokens exchange information) plus MLP (each position processed independently), wrapped in residual connections and normalization."
    variants:
      - prompt: "Where inside a transformer block do tokens exchange information?"
        choices:
          - id: a
            text: "Only in self-attention."
          - id: b
            text: "Only in the MLP."
          - id: c
            text: "In layer normalization."
          - id: d
            text: "Nowhere - tokens are fully isolated."
        correct: [a]
        explanation: "The MLP works on each position independently; all cross-token communication happens in attention."
      - prompt: "Why stack many blocks instead of one powerful block?"
        choices:
          - id: a
            text: "Lower layers capture local patterns, upper layers abstract ones; depth builds richer representations."
          - id: b
            text: "So the request is processed strictly one token at a time before any other checks run on this path."
          - id: c
            text: "To reduce parameter count immediately, without an intermediate state and without extra checks."
          - id: d
            text: "Because one large block cannot be trained before any other checks run on this path."
        correct: [a]
        explanation: "Blocks share the same layout but different weights, so layers learn different things; the power is in repetition."

  - id: residual-purpose-001
    concept: transformer
    type: theory-quiz
    difficulty: 2
    prompt: "Why is a residual connection of the form y = x + f(x) needed?"
    choices:
      - id: a
        text: "It gives gradients a direct path through layers; without it a deep stack barely trains."
      - id: b
        text: "It removes the input x, leaving only f(x) before any other checks run on this path."
      - id: c
        text: "It randomly shuffles tokens, produced in full without further selection."
      - id: d
        text: "It replaces layer normalization, produced in full without further selection."
    correct: [a]
    explanation: "Without residuals gradients vanish across dozens of layers. The shortcut x + f(x) lets you stack very deep towers."
    variants:
      - prompt: "What does the residual stream metaphor describe?"
        choices:
          - id: a
            text: "A wide data bus through all blocks: each block adds a correction instead of replacing the stream."
          - id: b
            text: "The token stream at the tokenizer input, produced in full without further selection."
          - id: c
            text: "The request queue on the model server, produced in full without further selection."
          - id: d
            text: "The gradient flow that must be zeroed between blocks before any other checks run on this path."
        correct: [a]
        explanation: "Attention and MLP read from the stream and add updates; they do not rewrite it wholesale."
      - prompt: "Why is layer normalization needed in a block?"
        choices:
          - id: a
            text: "To keep activation scale stable as values pass through many layers."
          - id: b
            text: "To turn logits into probabilities before any other checks run on this path."
          - id: c
            text: "To enlarge the token vocabulary, produced in full without further selection."
          - id: d
            text: "To pick the next token, produced in full without further selection."
        correct: [a]
        explanation: "Activations drift in scale across layers; normalization stabilizes them. Modern models often use pre-norm."

  - id: residual-output-001
    concept: transformer
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? One block adds its update to the stream (residual connection)."
    snippet: |
      def block(x):
          return [v * 0.5 for v in x]

      x = [4.0, -2.0]
      x = [a + b for a, b in zip(x, block(x))]
      print([round(v, 2) for v in x])
    expected:
      kind: stdout
      value: "[6.0, -3.0]"
    hints:
      - "A residual connection is x + f(x): add the block update element-wise to x."
      - "Compute block(x) per element, then add it to the original x."

  - id: residual-fn-001
    concept: transformer
    type: python-function
    difficulty: 3
    prompt: "Implement `residual(x, update)` - a residual connection: return the element-wise sum of vector `x` and update `update` (lists of equal length)."
    starter: |
      def residual(x, update):
          ...
    cases:
      - call: "residual([1.0, 2.0, 3.0], [0.5, 0.5, 0.5])"
        expect: [1.5, 2.5, 3.5]
      - call: "residual([0.0, 0.0], [1.0, -1.0])"
        expect: [1.0, -1.0]
      - call: "residual([2.0], [0.0])"
        expect: [2.0]
      - call: "residual([-1.0, 4.0, 0.0], [1.0, 1.0, 1.0])"
        expect: [0.0, 5.0, 1.0]
    solution: |
      def residual(x, update):
          return [a + b for a, b in zip(x, update)]
    hints:
      - "A residual does not replace the stream; it adds the block update to the input."
      - "Add corresponding elements of the two lists and return a new list."

  - id: causal-attention-001
    concept: transformer
    type: theory-quiz
    difficulty: 3
    prompt: "Why do generative LLMs use a decoder-only architecture with causal attention?"
    choices:
      - id: a
        text: "So when predicting the next token the model cannot peek at future tokens"
      - id: b
        text: "So tokens are processed strictly one by one like an RNN."
      - id: c
        text: "Because the decoder is faster by dropping attention."
      - id: d
        text: "So the model can read text right to left."
    correct: [a]
    explanation: "Causal attention forbids looking right at not-yet-generated tokens. That is exactly what honest next-token prediction requires."
