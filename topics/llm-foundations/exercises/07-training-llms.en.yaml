exercises:
  - id: pretraining-task-001
    concept: training-llms
    type: theory-quiz
    difficulty: 1
    prompt: "What task does LLM pretraining solve?"
    choices:
      - id: a
        text: "Given the start of text, predict the next token on a huge corpus."
      - id: b
        text: "Memorize human-labeled question-answer pairs."
      - id: c
        text: "Compress a text corpus into an archive."
      - id: d
        text: "Translate the entire internet into English."
    correct: [a]
    explanation: "Pretraining is self-supervised next-token prediction; the label is simply the next token in the text, so manual annotation is unnecessary."
    variants:
      - prompt: "Why is pretraining called self-supervised?"
        choices:
          - id: a
            text: "The correct answer is just the next token already in the text; nothing needs labeling."
          - id: b
            text: "The model invents its own questions and answers from thin air."
          - id: c
            text: "Humans label every token by hand."
          - id: d
            text: "Training runs without a loss function."
        correct: [a]
        explanation: "The target is embedded in the data - the next token - so the corpus scales to all available text."
      - prompt: "What can a pretrained model do right after pretraining, before fine-tuning?"
        choices:
          - id: a
            text: "Only continue text; it is not yet a cooperative assistant."
          - id: b
            text: "Perfectly follow instructions and refuse harmful requests."
          - id: c
            text: "Call tools and browse the internet."
          - id: d
            text: "Nothing - its weights are still random."
        correct: [a]
        explanation: "After pretraining the model continues text; becoming an assistant requires fine-tuning and alignment."

  - id: data-quality-001
    concept: training-llms
    type: theory-quiz
    difficulty: 2
    prompt: "Why do training data quality and composition matter so much?"
    choices:
      - id: a
        text: "The model cannot know what was not in the data and inherits its biases; knowledge is a snapshot of the corpus."
      - id: b
        text: "Data affects only training speed, not answer quality."
      - id: c
        text: "Data quality affects only vocabulary size."
      - id: d
        text: "Data is only for evaluation, not training."
    correct: [a]
    explanation: "Noisy, one-sided data hurts the model; clean, diverse data helps. Heavy work goes into deduplication, filtering, and domain balance."
    variants:
      - prompt: "What is a knowledge cutoff?"
        choices:
          - id: a
            text: "The point after which no new text entered the training corpus, so the model does not know later events."
          - id: b
            text: "The maximum context window length."
          - id: c
            text: "The date after which the model stops working."
          - id: d
            text: "The parameter count limit."
        correct: [a]
        explanation: "Without external tools the model does not know events after the cutoff and may confidently err about recent facts."
      - prompt: "What new 2026 problem comes from abundant model-generated text in corpora?"
        choices:
          - id: a
            text: "Corpus pollution and the risk of training on model echo instead of fresh human text."
          - id: b
            text: "The complete disappearance of text on the internet."
          - id: c
            text: "The inability to tokenize generated text."
          - id: d
            text: "Generated text always improves the model."
        correct: [a]
        explanation: "As corpora fill with machine text, models risk amplifying their own artifacts instead of learning from people."

  - id: training-flops-001
    concept: training-llms
    type: python-function
    difficulty: 2
    prompt: "Implement `training_flops(params, tokens)` - a rough pretraining compute estimate using 6 * parameters * tokens. Return an integer."
    starter: |
      def training_flops(params, tokens):
          ...
    cases:
      - call: "training_flops(1000, 2000)"
        expect: 12000000
      - call: "training_flops(10, 10)"
        expect: 600
      - call: "training_flops(0, 500)"
        expect: 0
      - call: "training_flops(1000000, 1000000)"
        expect: 6000000000000
    solution: |
      def training_flops(params, tokens):
          return 6 * params * tokens
    hints:
      - "Cost grows with both parameter count and training token count."
      - "The rule uses the constant 6 (forward plus backward); multiply it by both values."

  - id: chinchilla-tokens-001
    concept: training-llms
    type: python-function
    difficulty: 3
    prompt: "Implement `recommended_tokens(params)` - recommended training tokens by the rough Chinchilla rule (~20 tokens per parameter). Return an integer."
    starter: |
      def recommended_tokens(params):
          ...
    cases:
      - call: "recommended_tokens(1000)"
        expect: 20000
      - call: "recommended_tokens(7_000_000_000)"
        expect: 140000000000
      - call: "recommended_tokens(0)"
        expect: 0
      - call: "recommended_tokens(50)"
        expect: 1000
    solution: |
      def recommended_tokens(params):
          return 20 * params
    hints:
      - "Chinchilla showed many models were underfed data for their size."
      - "The rough rule is about 20 training tokens per model parameter."

  - id: scaling-laws-001
    concept: training-llms
    type: theory-quiz
    difficulty: 3
    prompt: "What do scaling laws claim?"
    choices:
      - id: a
        text: "Quality improves predictably and smoothly with more parameters, data, and compute, but with diminishing returns."
      - id: b
        text: "Quality jumps only when parameter count doubles."
      - id: c
        text: "Only parameter count matters; the rest does not."
      - id: d
        text: "Quality does not depend on data volume."
    correct: [a]
    explanation: "The relationship is close to power-law: to noticeably cut loss you must grow all three axes substantially. Chinchilla stressed balancing parameters and data."
