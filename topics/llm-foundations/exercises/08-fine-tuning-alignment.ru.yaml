exercises:
  - id: sft-purpose-001
    concept: fine-tuning-alignment
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает supervised fine-tuning (SFT), он же instruction tuning?"
    choices:
      - id: a
        text: "Показывает модели примеры «инструкция → хороший ответ», чтобы она отвечала как помощник, а не продолжала текст."
      - id: b
        text: "Заново обучает модель с нуля на всём интернете сразу, без промежуточного состояния и без дополнительных проверок."
      - id: c
        text: "Сжимает модель, удаляя лишние параметры сразу, без промежуточного состояния и без дополнительных проверок."
      - id: d
        text: "Переводит модель на другой язык сразу, без промежуточного состояния и без дополнительных проверок."
    correct: [a]
    explanation: "SFT - первый этап выравнивания: на парах инструкция → образцовый ответ модель учится формату полезного ассистента."
    variants:
      - prompt: "Почему предобученной модели недостаточно, чтобы быть ассистентом?"
        choices:
          - id: a
            text: "Она умеет лишь продолжать текст и может выдать на вопрос список похожих вопросов, как веб-форум."
          - id: b
            text: "У неё слишком маленькое контекстное окно ещё до любых других проверок на этом пути."
          - id: c
            text: "Она не умеет токенизировать ввод не входит в сравнение и не влияет на результат."
          - id: d
            text: "Её веса ещё случайны сразу, без промежуточного состояния и без дополнительных проверок."
        correct: [a]
        explanation: "После предобучения модель продолжает текст; формат «полезного ассистента» задаёт уже SFT."
      - prompt: "Что задаёт этап SFT, а что - последующее обучение на предпочтениях?"
        choices:
          - id: a
            text: "SFT задаёт формат ответа, обучение на предпочтениях шлифует, какой из ответов человек предпочтёт."
          - id: b
            text: "SFT выбирает архитектуру, предпочтения - размер словаря сразу, без промежуточного состояния."
          - id: c
            text: "SFT отвечает за токенизацию, предпочтения - за внимание сразу, без промежуточного состояния."
          - id: d
            text: "Это два названия одного и того же шага сразу, без промежуточного состояния."
        correct: [a]
        explanation: "SFT учит формату на образцовых ответах; предпочтения уточняют то, что трудно задать одним примером."

  - id: rlhf-dpo-001
    concept: fine-tuning-alignment
    type: theory-quiz
    difficulty: 2
    prompt: "Чем DPO отличается от классического RLHF при той же цели - обучении на человеческих предпочтениях?"
    choices:
      - id: a
        text: "DPO обходится без отдельной модели-награды и обучения с подкреплением, напрямую сдвигая модель к предпочтённым ответам."
      - id: b
        text: "DPO не использует человеческие предпочтения вообще сразу, без промежуточного состояния и без дополнительных проверок."
      - id: c
        text: "DPO обучает модель с нуля, а RLHF - дообучает сразу, без промежуточного состояния и без дополнительных проверок."
      - id: d
        text: "DPO работает только для перевода сразу, без промежуточного состояния и без дополнительных проверок."
    correct: [a]
    explanation: "Цель у обоих одна. RLHF строит reward-модель и применяет RL; DPO достигает того же проще и стабильнее, без reward-модели и RL."
    variants:
      - prompt: "Почему обучение на предпочтениях полагается на сравнение двух ответов, а не на эталонный ответ?"
        choices:
          - id: a
            text: "Качества вроде вежливости и осторожности трудно задать примером, но людям легко сравнить два ответа и выбрать лучший."
          - id: b
            text: "Сравнивать дешевле, потому что не нужны люди сразу, без промежуточного состояния и без дополнительных проверок."
          - id: c
            text: "Эталонные ответы запрещены лицензией сразу, без промежуточного состояния и без дополнительных проверок."
          - id: d
            text: "Модель не умеет читать одиночные ответы сразу, без промежуточного состояния и без дополнительных проверок."
        correct: [a]
        explanation: "Выбор «лучшего из двух хороших» формализовать примером сложно, а парное сравнение людям даётся легко - на этом и строят предпочтения."
      - prompt: "В чём компромисс выравнивания?"
        choices:
          - id: a
            text: "Слишком слабое - модель груба и небезопасна; слишком жёсткое - уклончива и бесполезна; нужен баланс полезного, честного, безвредного."
          - id: b
            text: "Выравнивание всегда только улучшает модель без побочных эффектов сразу, без промежуточного состояния и без дополнительных проверок."
          - id: c
            text: "Выравнивание влияет лишь на скорость генерации сразу, без промежуточного состояния и без дополнительных проверок."
          - id: d
            text: "Выравнивание делает модель полностью детерминированной сразу, без промежуточного состояния и без дополнительных проверок."
        correct: [a]
        explanation: "Пережатое выравнивание ломает полезность (лишние отказы), недожатое - безопасность; хорошее выравнивание балансирует три свойства."

  - id: rag-best-doc-001
    concept: fine-tuning-alignment
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `best_doc(query, docs)` - индекс документа из `docs`, ближайшего к `query` по косинусной близости (ядро ретривера в RAG). При равенстве предпочтите меньший индекс. Векторы непустые и ненулевые."
    starter: |
      import math

      def best_doc(query, docs):
          ...
    cases:
      - call: "best_doc([1, 0], [[0, 1], [1, 0], [1, 1]])"
        expect: 1
      - call: "best_doc([1, 1], [[1, 0], [0, 1], [1, 1]])"
        expect: 2
      - call: "best_doc([0, 1], [[1, 0], [0, 2]])"
        expect: 1
      - call: "best_doc([2, 0, 0], [[0, 1, 0], [1, 0, 0], [0, 0, 1]])"
        expect: 1
    solution: |
      import math

      def cosine(a, b):
          dot = sum(x * y for x, y in zip(a, b))
          na = math.sqrt(sum(x * x for x in a))
          nb = math.sqrt(sum(y * y for y in b))
          return dot / (na * nb)

      def best_doc(query, docs):
          best = 0
          for i in range(1, len(docs)):
              if cosine(query, docs[i]) > cosine(query, docs[best]):
                  best = i
          return best
    hints:
      - "RAG подкладывает в контекст самый близкий по смыслу фрагмент; близость измеряют косинусом запроса и документа."
      - "Посчитайте косинусную близость запроса с каждым документом и запомните индекс наибольшей."
      - "Строгое сравнение `>` при обновлении максимума оставит меньший индекс при равной близости."

  - id: rag-vs-finetune-001
    concept: fine-tuning-alignment
    type: theory-quiz
    difficulty: 3
    prompt: "Почему для свежих или приватных знаний обычно выбирают RAG, а не дообучение?"
    choices:
      - id: a
        text: "Дообучение меняет поведение и стиль, но плохо заливает новые факты."
      - id: b
        text: "RAG переобучает все веса модели на новых данных сразу, без промежуточного состояния."
      - id: c
        text: "Дообучение невозможно технически сразу, без промежуточного состояния."
      - id: d
        text: "RAG не использует контекстное окно сразу, без промежуточного состояния."
    correct: [a]
    explanation: "Дообучить большой объём фактов дорого и ненадёжно, знания быстро устаревают. RAG не трогает веса: документы кодируют в эмбеддинги и подают ближайшие фрагменты в промпт."
    variants:
      - prompt: "Что ограничивает качество ответа в RAG-системе помимо самой модели?"
        choices:
          - id: a
            text: "Качество поиска: если нужный фрагмент не нашёлся и не попал в контекст, даже сильная модель ответит плохо."
          - id: b
            text: "Размер словаря токенов сразу, без промежуточного состояния и без дополнительных проверок."
          - id: c
            text: "Температура сэмплинга сразу, без промежуточного состояния и без дополнительных проверок."
          - id: d
            text: "Число голов внимания сразу, без промежуточного состояния и без дополнительных проверок."
        correct: [a]
        explanation: "RAG не делает модель всеведущей: плохой ретривер - плохой ответ. Качество системы во многом определяется качеством поиска."
      - prompt: "Что такое LoRA в контексте дообучения?"
        choices:
          - id: a
            text: "Метод экономного дообучения: обучают маленькую добавку к весам вместо всей модели."
          - id: b
            text: "Алгоритм токенизации не входит в сравнение и не влияет на результат."
          - id: c
            text: "Способ сэмплинга токенов сразу, без промежуточного состояния."
          - id: d
            text: "Протокол подключения инструментов сразу, без промежуточного состояния."
        correct: [a]
        explanation: "LoRA дообучает небольшую добавку к весам, что резко удешевляет дообучение по сравнению с правкой всей модели."
