exercises:
  - id: embedding-meaning-001
    concept: embeddings-context
    type: theory-quiz
    difficulty: 1
    prompt: "Что такое эмбеддинг токена?"
    choices:
      - id: a
        text: "Текстовое определение слова, записанное рядом с токеном."
      - id: b
        text: "Вектор фиксированной длины - координаты токена в пространстве смыслов; близкие по смыслу токены лежат рядом."
      - id: c
        text: "Случайное число, уникальное для каждого токена."
      - id: d
        text: "Номер позиции токена в предложении."
    correct: [b]
    explanation: "Эмбеддинг - это вектор; смысл рождается из взаимного расположения векторов, а не из одного вектора в отдельности."
    variants:
      - prompt: "Откуда берётся то, что похожие по смыслу слова оказываются рядом в пространстве эмбеддингов?"
        choices:
          - id: a
            text: "Это возникает само в ходе обучения: похожие слова встречаются в похожем окружении."
          - id: b
            text: "Разработчики вручную расставляют слова по кластерам."
          - id: c
            text: "Слова сортируются по алфавиту."
          - id: d
            text: "Близость задаётся длиной слова в символах."
        correct: [a]
        explanation: "Расположение не задаётся вручную: обучение сдвигает слова из похожих контекстов в близкие точки."
      - prompt: "Зачем к эмбеддингу токена добавляют позиционную информацию?"
        choices:
          - id: a
            text: "Чтобы модель различала порядок токенов, иначе внимание видит лишь «мешок токенов»."
          - id: b
            text: "Чтобы ускорить токенизацию."
          - id: c
            text: "Чтобы уменьшить размер словаря."
          - id: d
            text: "Чтобы перевести токен в другой язык."
        correct: [a]
        explanation: "Само внимание не различает порядок; позиционное кодирование возвращает информацию о месте токена."

  - id: cosine-output-001
    concept: embeddings-context
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Это косинусная близость двух перпендикулярных векторов."
    snippet: |
      import math

      def cosine(a, b):
          dot = sum(x * y for x, y in zip(a, b))
          na = math.sqrt(sum(x * x for x in a))
          nb = math.sqrt(sum(y * y for y in b))
          return dot / (na * nb)

      print(round(cosine([3, 0], [0, 5]), 1))
    expected:
      kind: stdout
      value: "0.0"
    hints:
      - "Косинус измеряет угол между векторами; что он равен для перпендикулярных направлений?"
      - "Скалярное произведение перпендикулярных векторов равно нулю, а делитель - нет."

  - id: cosine-similarity-001
    concept: embeddings-context
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `cosine(a, b)` - косинусную близость двух векторов одинаковой длины (списки чисел). Верните одно число."
    starter: |
      import math

      def cosine(a, b):
          ...
    cases:
      - call: "cosine([1, 0], [1, 0])"
        expect_approx: 1.0
      - call: "cosine([1, 0], [0, 1])"
        expect_approx: 0.0
      - call: "cosine([1, 0], [-1, 0])"
        expect_approx: -1.0
      - call: "cosine([1, 2, 3], [4, 5, 6])"
        expect_approx: 0.9746318
      - call: "cosine([1, 1, 0], [1, 0, 1])"
        expect_approx: 0.5
    solution: |
      import math

      def cosine(a, b):
          dot = sum(x * y for x, y in zip(a, b))
          na = math.sqrt(sum(x * x for x in a))
          nb = math.sqrt(sum(y * y for y in b))
          return dot / (na * nb)
    hints:
      - "Косинус - это мера направления, а не длины: сонаправленные векторы дают 1, перпендикулярные - 0, противоположные - -1."
      - "В числителе - скалярное произведение, в знаменателе - произведение длин (норм) каждого вектора."
      - "Длину вектора считайте как корень из суммы квадратов его координат."

  - id: fit-context-001
    concept: embeddings-context
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `fit_context(tokens, limit)`: если токенов не больше `limit`, верните их без изменений; иначе верните последние `limit` токенов (как новый список). Модель удерживает самые свежие токены."
    starter: |
      def fit_context(tokens, limit):
          ...
    cases:
      - call: "fit_context([1, 2, 3, 4, 5], 3)"
        expect: [3, 4, 5]
      - call: "fit_context([1, 2], 5)"
        expect: [1, 2]
      - call: "fit_context([1, 2, 3, 4], 4)"
        expect: [1, 2, 3, 4]
      - call: "fit_context([10, 20, 30, 40, 50, 60], 2)"
        expect: [50, 60]
    solution: |
      def fit_context(tokens, limit):
          if len(tokens) <= limit:
              return list(tokens)
          return tokens[len(tokens) - limit:]
    hints:
      - "Контекстное окно вытесняет самые старые токены; какие токены должны выжить - в начале или в конце списка?"
      - "Если всё и так помещается, ничего не вытесняется; иначе оставьте хвост нужной длины."
      - "Срез последних N элементов списка - это tokens[len(tokens) - N:]."

  - id: tokens-dropped-001
    concept: embeddings-context
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `tokens_dropped(total, limit)` - сколько токенов вытеснится из контекстного окна, если всего токенов `total`, а окно вмещает `limit`. Верните целое неотрицательное число."
    starter: |
      def tokens_dropped(total, limit):
          ...
    cases:
      - call: "tokens_dropped(10, 4)"
        expect: 6
      - call: "tokens_dropped(3, 5)"
        expect: 0
      - call: "tokens_dropped(8, 8)"
        expect: 0
      - call: "tokens_dropped(1000, 256)"
        expect: 744
    solution: |
      def tokens_dropped(total, limit):
          dropped = total - limit
          if dropped < 0:
              return 0
          return dropped
    hints:
      - "Вытесняется ровно то, что не влезло в окно; если всё влезло, не вытесняется ничего."
      - "Разница total - limit может быть отрицательной - в этом случае ответ ноль, а не отрицательное число."

  - id: context-window-001
    concept: embeddings-context
    type: theory-quiz
    difficulty: 3
    prompt: "Модель с большим контекстным окном - значит ли это, что она одинаково хорошо использует весь контекст?"
    choices:
      - id: a
        text: "Да, большое окно гарантирует равномерное внимание ко всем токенам."
      - id: b
        text: "Нет: модели нередко хуже используют середину длинного контекста (lost in the middle), а длинный контекст ещё и дороже."
      - id: c
        text: "Да, но только если текст на английском."
      - id: d
        text: "Нет, потому что большое окно вообще отключает внимание к старым токенам."
    correct: [b]
    explanation: "Размер окна задаёт предел, но не равномерность: важную инструкцию лучше держать ближе к началу или концу, а не в середине длинного документа."
