exercises:
  - id: qkv-roles-001
    concept: attention
    type: theory-quiz
    difficulty: 1
    prompt: "Что такое query, key и value в механизме внимания?"
    choices:
      - id: a
        text: "Три разных токена в предложении."
      - id: b
        text: "Три разных вектора одного и того же токена, полученные умножением его эмбеддинга на три обучаемые матрицы."
      - id: c
        text: "Три слоя нейронной сети."
      - id: d
        text: "Три значения температуры для сэмплинга."
    correct: [b]
    explanation: "Query - что ищет токен, key - чем токен себя «рекламирует», value - что он отдаёт. Все три - векторы одного токена из трёх матриц."
    variants:
      - prompt: "С чем токен сравнивает свой query, чтобы решить, на кого обратить внимание?"
        choices:
          - id: a
            text: "С key каждого другого токена."
          - id: b
            text: "С value каждого токена."
          - id: c
            text: "С эмбеддингом всего предложения."
          - id: d
            text: "С позиционным кодированием."
        correct: [a]
        explanation: "Совпадение query с key определяет вес внимания; затем по этим весам берётся взвешенная сумма value."
      - prompt: "Что становится результатом внимания для токена?"
        choices:
          - id: a
            text: "Взвешенная сумма value всех токенов, где веса - это распределение внимания."
          - id: b
            text: "Один токен с наибольшим key."
          - id: c
            text: "Среднее всех query."
          - id: d
            text: "Сырая оценка совместимости без нормировки."
        correct: [a]
        explanation: "Каждый вес говорит, какую долю value токена забрать; результат - сумма value с этими весами."

  - id: attention-scores-001
    concept: attention
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `attention_scores(q, keys)` - список сырых оценок совместимости query `q` с каждым ключом из `keys` (скалярное произведение). Без масштабирования и softmax."
    starter: |
      def attention_scores(q, keys):
          ...
    cases:
      - call: "attention_scores([1, 0], [[1, 0], [0, 1], [1, 1]])"
        expect: [1, 0, 1]
      - call: "attention_scores([2, 1], [[1, 1], [0, 2], [3, 0]])"
        expect: [3, 2, 6]
      - call: "attention_scores([1, 2, 3], [[1, 0, 0], [0, 0, 1]])"
        expect: [1, 3]
    solution: |
      def attention_scores(q, keys):
          return [sum(a * b for a, b in zip(q, k)) for k in keys]
    hints:
      - "Оценка совместимости query и key - это их скалярное произведение: чем сонаправленнее, тем больше."
      - "Для каждого ключа из keys посчитайте скалярное произверие с q и соберите результаты в список."

  - id: scaled-score-001
    concept: attention
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `scaled_score(q, k)` - скалярное произведение `q` и `k`, делённое на корень из размерности (длины вектора `q`). Верните одно число."
    starter: |
      import math

      def scaled_score(q, k):
          ...
    cases:
      - call: "scaled_score([1, 0, 0, 0], [4, 0, 0, 0])"
        expect_approx: 2.0
      - call: "scaled_score([1, 1], [2, 2])"
        expect_approx: 2.8284271
      - call: "scaled_score([3, 0], [0, 5])"
        expect_approx: 0.0
    solution: |
      import math

      def scaled_score(q, k):
          dot = sum(a * b for a, b in zip(q, k))
          return dot / math.sqrt(len(q))
    hints:
      - "Сначала обычная оценка совместимости - скалярное произведение q и k."
      - "Затем делим её на корень из размерности, чтобы при большой размерности softmax не насыщался."
      - "Размерность - это длина вектора q (она же длина k)."

  - id: attention-weight-001
    concept: attention
    type: python-function
    difficulty: 4
    prompt: "Реализуйте `attention_weight(q, keys, i)` - вес внимания на ключе с индексом `i`. Посчитайте scaled dot-product оценки query со всеми ключами (деление на корень из размерности q) и примените softmax. Верните одно число."
    starter: |
      import math

      def attention_weight(q, keys, i):
          ...
    cases:
      - call: "attention_weight([1, 0], [[1, 0], [0, 1]], 0)"
        expect_approx: 0.6697615
      - call: "attention_weight([1, 0], [[1, 0], [0, 1]], 1)"
        expect_approx: 0.3302385
      - call: "attention_weight([0, 0], [[5, 5], [9, 9], [1, 1]], 0)"
        expect_approx: 0.3333333
      - call: "attention_weight([2, 0], [[1, 0], [1, 0]], 0)"
        expect_approx: 0.5
    solution: |
      import math

      def attention_weight(q, keys, i):
          d = math.sqrt(len(q))
          scores = [sum(a * b for a, b in zip(q, k)) / d for k in keys]
          m = max(scores)
          exps = [math.exp(s - m) for s in scores]
          total = sum(exps)
          return exps[i] / total
    hints:
      - "Это три шага подряд: оценки совместимости со всеми ключами, масштабирование делением на корень из размерности, затем softmax."
      - "Когда все оценки равны (например, нулевой query), softmax даёт равные веса - проверьте этот случай в голове."
      - "Softmax по всем ключам считайте один раз, затем верните долю, приходящуюся на индекс i."

  - id: scaling-purpose-001
    concept: attention
    type: theory-quiz
    difficulty: 3
    prompt: "Зачем в scaled dot-product attention оценки делят на корень из размерности?"
    choices:
      - id: a
        text: "При большой размерности скалярные произведения становятся большими по модулю, и softmax насыщается в один токен; деление возвращает оценкам стабильный масштаб."
      - id: b
        text: "Чтобы оценки стали целыми числами."
      - id: c
        text: "Чтобы ускорить вычисление скалярного произведения."
      - id: d
        text: "Чтобы веса внимания перестали суммироваться в единицу."
    correct: [a]
    explanation: "Без масштабирования softmax почти всегда даёт «одна единица, остальные нули», распределение становится резким, а градиенты затухают. Деление на корень из размерности это лечит."
