exercises:
  - id: qkv-roles-001
    concept: attention
    type: theory-quiz
    difficulty: 1
    prompt: "What are query, key, and value in attention?"
    choices:
      - id: a
        text: "Three different tokens in the sentence."
      - id: b
        text: "Three different vectors of the same token, from three learned matrices applied to its embedding."
      - id: c
        text: "Three neural network layers."
      - id: d
        text: "Three temperature settings for sampling."
    correct: [b]
    explanation: "Query is what the token seeks, key is how it advertises itself, value is what it contributes. All three are vectors of one token from three matrices."
    variants:
      - prompt: "What does a token compare its query against to decide where to attend?"
        choices:
          - id: a
            text: "The key of every other token."
          - id: b
            text: "The value of every token."
          - id: c
            text: "The embedding of the whole sentence."
          - id: d
            text: "Positional encoding."
        correct: [a]
        explanation: "Query-key match sets attention weights; then values are mixed with those weights."
      - prompt: "What is the attention output for a token?"
        choices:
          - id: a
            text: "A weighted sum of all token values, where weights are the attention distribution."
          - id: b
            text: "The single token with the largest key."
          - id: c
            text: "The average of all queries."
          - id: d
            text: "A raw compatibility score without normalization."
        correct: [a]
        explanation: "Each weight says how much of that token value to take; the result is the weighted sum of values."

  - id: attention-scores-001
    concept: attention
    type: python-function
    difficulty: 2
    prompt: "Implement `attention_scores(q, keys)` - a list of raw compatibility scores between query `q` and each key in `keys` (dot product). No scaling or softmax."
    starter: |
      def attention_scores(q, keys):
          ...
    cases:
      - call: "attention_scores([1, 0], [[1, 0], [0, 1], [1, 1]])"
        expect: [1, 0, 1]
      - call: "attention_scores([2, 1], [[1, 1], [0, 2], [3, 0]])"
        expect: [3, 2, 6]
      - call: "attention_scores([1, 2, 3], [[1, 0, 0], [0, 0, 1]])"
        expect: [1, 3]
    solution: |
      def attention_scores(q, keys):
          return [sum(a * b for a, b in zip(q, k)) for k in keys]
    hints:
      - "Compatibility between query and key is their dot product: the more aligned, the larger."
      - "For each key in keys, dot it with q and collect the results in a list."

  - id: scaled-score-001
    concept: attention
    type: python-function
    difficulty: 3
    prompt: "Implement `scaled_score(q, k)` - the dot product of `q` and `k`, divided by the square root of the dimension (length of `q`). Return a single number."
    starter: |
      import math

      def scaled_score(q, k):
          ...
    cases:
      - call: "scaled_score([1, 0, 0, 0], [4, 0, 0, 0])"
        expect_approx: 2.0
      - call: "scaled_score([1, 1], [2, 2])"
        expect_approx: 2.8284271
      - call: "scaled_score([3, 0], [0, 5])"
        expect_approx: 0.0
    solution: |
      import math

      def scaled_score(q, k):
          dot = sum(a * b for a, b in zip(q, k))
          return dot / math.sqrt(len(q))
    hints:
      - "Start with the usual dot-product compatibility score for q and k."
      - "Then divide by the square root of the dimension so softmax does not saturate at large sizes."
      - "Dimension is len(q) (same as len(k))."

  - id: attention-weight-001
    concept: attention
    type: python-function
    difficulty: 4
    prompt: "Implement `attention_weight(q, keys, i)` - the attention weight on the key at index `i`. Compute scaled dot-product scores for query against all keys (divide by sqrt(dim of q)) and apply softmax. Return a single number."
    starter: |
      import math

      def attention_weight(q, keys, i):
          ...
    cases:
      - call: "attention_weight([1, 0], [[1, 0], [0, 1]], 0)"
        expect_approx: 0.6697615
      - call: "attention_weight([1, 0], [[1, 0], [0, 1]], 1)"
        expect_approx: 0.3302385
      - call: "attention_weight([0, 0], [[5, 5], [9, 9], [1, 1]], 0)"
        expect_approx: 0.3333333
      - call: "attention_weight([2, 0], [[1, 0], [1, 0]], 0)"
        expect_approx: 0.5
    solution: |
      import math

      def attention_weight(q, keys, i):
          d = math.sqrt(len(q))
          scores = [sum(a * b for a, b in zip(q, k)) / d for k in keys]
          m = max(scores)
          exps = [math.exp(s - m) for s in scores]
          total = sum(exps)
          return exps[i] / total
    hints:
      - "Three steps in order: scores against all keys, scale by sqrt(dimension), then softmax."
      - "When all scores are equal (e.g. zero query), softmax gives equal weights - sanity-check that case."
      - "Compute softmax over all keys once, then return the share at index i."

  - id: scaling-purpose-001
    concept: attention
    type: theory-quiz
    difficulty: 3
    prompt: "Why are scores divided by the square root of the dimension in scaled dot-product attention?"
    choices:
      - id: a
        text: "At large dimension dot products grow large and softmax saturates on one token; scaling keeps scores in a stable range."
      - id: b
        text: "So scores become integers."
      - id: c
        text: "To speed up the dot product."
      - id: d
        text: "So attention weights no longer sum to one."
    correct: [a]
    explanation: "Without scaling softmax often becomes one-hot, the distribution too sharp, and gradients vanish. Dividing by sqrt(dimension) fixes that."
