exercises:
  - id: sft-purpose-001
    concept: fine-tuning-alignment
    type: theory-quiz
    difficulty: 1
    prompt: "What does supervised fine-tuning (SFT), also called instruction tuning, do?"
    choices:
      - id: a
        text: "Shows the model instruction → good answer examples so it responds like an assistant instead of continuing text."
      - id: b
        text: "Retrains the model from scratch on the whole internet."
      - id: c
        text: "Compresses the model by removing parameters."
      - id: d
        text: "Translates the model to another language."
    correct: [a]
    explanation: "SFT is the first alignment stage: on instruction → exemplar answer pairs the model learns the useful-assistant format."
    variants:
      - prompt: "Why is a pretrained model not enough to be an assistant?"
        choices:
          - id: a
            text: "It only continues text and may answer a question with a list of similar questions, like a web forum."
          - id: b
            text: "Its context window is too small."
          - id: c
            text: "It cannot tokenize input."
          - id: d
            text: "Its weights are still random."
        correct: [a]
        explanation: "After pretraining the model continues text; the helpful-assistant format comes from SFT."
      - prompt: "What does SFT set, and what does preference training refine?"
        choices:
          - id: a
            text: "SFT sets answer format; preference training polishes which of two answers humans prefer."
          - id: b
            text: "SFT picks architecture; preferences pick vocabulary size."
          - id: c
            text: "SFT handles tokenization; preferences handle attention."
          - id: d
            text: "They are two names for the same step."
        correct: [a]
        explanation: "SFT teaches format on exemplars; preferences tune what is hard to specify with a single example."

  - id: rlhf-dpo-001
    concept: fine-tuning-alignment
    type: theory-quiz
    difficulty: 2
    prompt: "How does DPO differ from classic RLHF for the same goal - learning from human preferences?"
    choices:
      - id: a
        text: "DPO skips a separate reward model and reinforcement learning, shifting the model directly toward preferred answers."
      - id: b
        text: "DPO does not use human preferences at all."
      - id: c
        text: "DPO trains from scratch; RLHF only fine-tunes."
      - id: d
        text: "DPO works only for translation."
    correct: [a]
    explanation: "Both share the goal. RLHF builds a reward model and runs RL; DPO reaches the same end more simply and stably without reward model or RL."
    variants:
      - prompt: "Why does preference training rely on comparing two answers instead of a gold answer?"
        choices:
          - id: a
            text: "Qualities like politeness and caution are hard to exemplify, but people easily pick the better of two answers."
          - id: b
            text: "Comparisons are cheaper because no humans are needed."
          - id: c
            text: "Gold answers are forbidden by license."
          - id: d
            text: "The model cannot read a single answer."
        correct: [a]
        explanation: "Choosing the better of two good answers is easy for people but hard to capture in one demonstration."
      - prompt: "What is the alignment trade-off?"
        choices:
          - id: a
            text: "Too weak - rude and unsafe; too strong - evasive and useless; balance helpful, honest, harmless."
          - id: b
            text: "Alignment always improves the model with no downsides."
          - id: c
            text: "Alignment affects only generation speed."
          - id: d
            text: "Alignment makes the model fully deterministic."
        correct: [a]
        explanation: "Over-tight alignment hurts usefulness (excess refusals); under-tight hurts safety; good alignment balances three traits."

  - id: rag-best-doc-001
    concept: fine-tuning-alignment
    type: python-function
    difficulty: 3
    prompt: "Implement `best_doc(query, docs)` - index of the document in `docs` closest to `query` by cosine similarity (the retriever core in RAG). On a tie, prefer the smaller index. Vectors are nonempty and nonzero."
    starter: |
      import math

      def best_doc(query, docs):
          ...
    cases:
      - call: "best_doc([1, 0], [[0, 1], [1, 0], [1, 1]])"
        expect: 1
      - call: "best_doc([1, 1], [[1, 0], [0, 1], [1, 1]])"
        expect: 2
      - call: "best_doc([0, 1], [[1, 0], [0, 2]])"
        expect: 1
      - call: "best_doc([2, 0, 0], [[0, 1, 0], [1, 0, 0], [0, 0, 1]])"
        expect: 1
    solution: |
      import math

      def cosine(a, b):
          dot = sum(x * y for x, y in zip(a, b))
          na = math.sqrt(sum(x * x for x in a))
          nb = math.sqrt(sum(y * y for y in b))
          return dot / (na * nb)

      def best_doc(query, docs):
          best = 0
          for i in range(1, len(docs)):
              if cosine(query, docs[i]) > cosine(query, docs[best]):
                  best = i
          return best
    hints:
      - "RAG puts the semantically closest chunk in context; closeness is cosine between query and document."
      - "Compute cosine similarity for each document and remember the largest index."
      - "Strict `>` when updating the max keeps the smaller index on a tie."

  - id: rag-vs-finetune-001
    concept: fine-tuning-alignment
    type: theory-quiz
    difficulty: 3
    prompt: "Why is RAG usually chosen over fine-tuning for fresh or private knowledge?"
    choices:
      - id: a
        text: "Fine-tuning changes behavior and style but poorly injects new facts; RAG puts knowledge in context with freshness, verifiability, and updates without retraining."
      - id: b
        text: "RAG retrains all model weights on new data."
      - id: c
        text: "Fine-tuning is technically impossible."
      - id: d
        text: "RAG does not use the context window."
    correct: [a]
    explanation: "Stuffing many facts via fine-tuning is costly, unreliable, and goes stale. RAG leaves weights alone: embed documents and inject the nearest chunks into the prompt."
    variants:
      - prompt: "Besides the model itself, what limits RAG answer quality?"
        choices:
          - id: a
            text: "Retrieval quality: if the right chunk is not found and placed in context, even a strong model answers poorly."
          - id: b
            text: "Vocabulary size."
          - id: c
            text: "Sampling temperature."
          - id: d
            text: "Number of attention heads."
        correct: [a]
        explanation: "RAG is not omniscience: a bad retriever means a bad answer. System quality depends heavily on search."
      - prompt: "What is LoRA in fine-tuning?"
        choices:
          - id: a
            text: "An efficient fine-tuning method: train a small weight adapter instead of the full model."
          - id: b
            text: "A tokenization algorithm."
          - id: c
            text: "A token sampling method."
          - id: d
            text: "A tool-connection protocol."
        correct: [a]
        explanation: "LoRA trains a small adapter on top of weights, which sharply cuts fine-tuning cost versus updating the whole model."
