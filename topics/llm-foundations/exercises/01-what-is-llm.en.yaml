exercises:
  - id: llm-output-001
    concept: what-is-llm
    type: theory-quiz
    difficulty: 1
    prompt: "What does a large language model output on a single generation step?"
    choices:
      - id: a
        text: "A complete coherent answer all at once, produced in full without further selection."
      - id: b
        text: "A probability distribution over the next token across the entire vocabulary."
      - id: c
        text: "A link to a fact from a built-in knowledge base before any other checks run on this path."
      - id: d
        text: "One token and nothing else, with no scores for alternatives before any other checks run on this path."
    correct: [b]
    explanation: "The model is a function from context to a probability distribution over the next token. Sampling then draws one token from that distribution."
    variants:
      - prompt: "What sits at the model output before a specific token is chosen?"
        choices:
          - id: a
            text: "A number from 0 to 1 - confidence that the answer is correct."
          - id: b
            text: "A list of tens of thousands of probabilities, one per vocabulary token."
          - id: c
            text: "The answer text, ready to display, completely skipping vocabulary."
          - id: d
            text: "A single embedding vector for the whole request, completely skipping vocabulary."
        correct: [b]
        explanation: "The output is a probability for every vocabulary token; after normalization they sum to one."
      - prompt: "Why do people say an LLM has no built-in fact database?"
        choices:
          - id: a
            text: "Knowledge is encoded in weights and shows up only as shifts in token probabilities."
          - id: b
            text: "Facts are fetched from the internet on every step before any other checks run on this path."
          - id: c
            text: "The model stores facts in a separate table next to the weights before any other checks run on this path."
          - id: d
            text: "The model truly has no facts and answers at random before any other checks run on this path."
        correct: [a]
        explanation: "There is no fact table inside: training embeds patterns in billions of weights, and they affect only token probabilities."

  - id: autoregression-001
    concept: what-is-llm
    type: theory-quiz
    difficulty: 2
    prompt: "What does it mean that LLM generation is autoregressive?"
    choices:
      - id: a
        text: "The model plans the whole answer upfront, then prints it at once."
      - id: b
        text: "Each predicted token is appended to the input, and the next step sees the lengthened context."
      - id: c
        text: "The model regresses to the mean and outputs the most frequent token in the language."
      - id: d
        text: "Tokens are predicted in parallel and independently."
    correct: [b]
    explanation: "Autoregression means the model conditions on its own prior output: token by token the context grows, and each new step sees everything already written."
    variants:
      - prompt: "Why does a long model answer appear gradually, word by word, not instantly?"
        choices:
          - id: a
            text: "Each token is a separate forward pass through the network, and there are as many passes as tokens in the answer."
          - id: b
            text: "The server deliberately slows output for aesthetics before any other checks run on this path."
          - id: c
            text: "The model waits for user confirmation after every word before any other checks run on this path."
          - id: d
            text: "Text is encrypted and decrypted one character at a time before any other checks run on this path."
        correct: [a]
        explanation: "Generation is autoregressive: one step, one distribution, one token, so time grows with answer length."
      - prompt: "What serves as input when predicting the next token on a generation step?"
        choices:
          - id: a
            text: "Only the last generated token, produced in full without further selection."
          - id: b
            text: "The full current context: the original prompt plus all tokens generated so far."
          - id: c
            text: "A random slice of training data, produced in full without further selection."
          - id: d
            text: "Only the system prompt, without the model reply before any other checks run on this path."
        correct: [b]
        explanation: "On every step the model receives the entire context; that is why the answer stays coherent."

  - id: pick-token-output-001
    concept: what-is-llm
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? It picks the token with the highest logit."
    snippet: |
      vocab = ["кофе", "чай", "сок"]
      logits = [1.5, 3.0, 0.8]
      best = max(range(len(vocab)), key=lambda i: logits[i])
      print(vocab[best])
    expected:
      kind: stdout
      value: "чай"
    hints:
      - "Greedy selection takes the token with the highest score - find which index has the largest logit."
      - "Compare the three logits; the winning index determines the printed word."

  - id: argmax-token-001
    concept: what-is-llm
    type: python-function
    difficulty: 2
    prompt: "Implement `next_token_index(logits)` returning the index of the token with the highest logit (greedy choice). On a tie, return the smallest index."
    starter: |
      def next_token_index(logits):
          ...
    cases:
      - call: "next_token_index([3.0, 2.0, 1.0, 0.5])"
        expect: 0
      - call: "next_token_index([0.2, 0.9, 0.5])"
        expect: 1
      - call: "next_token_index([1.0, 1.0, 2.0, 0.0])"
        expect: 2
      - call: "next_token_index([-1.0, -0.5, -2.0])"
        expect: 1
    solution: |
      def next_token_index(logits):
          best = 0
          for i in range(1, len(logits)):
              if logits[i] > logits[best]:
                  best = i
          return best
    hints:
      - "Softmax is monotonic: the token with the largest logit gets the largest probability, so you do not need softmax here."
      - "Walk the list, remembering the current maximum index; strict `>` keeps the first among ties."

  - id: softmax-prob-001
    concept: what-is-llm
    type: python-function
    difficulty: 3
    prompt: "Implement `softmax_prob(logits, i)` - the probability of the token at index `i` after softmax over the full logit list. Return a single number."
    starter: |
      import math

      def softmax_prob(logits, i):
          ...
    cases:
      - call: "softmax_prob([2.0, 1.0, 0.0], 0)"
        expect_approx: 0.6652410
      - call: "softmax_prob([1.0, 1.0], 0)"
        expect_approx: 0.5
      - call: "softmax_prob([0.0, 0.0, 0.0, 0.0], 2)"
        expect_approx: 0.25
    solution: |
      import math

      def softmax_prob(logits, i):
          m = max(logits)
          exps = [math.exp(x - m) for x in logits]
          total = sum(exps)
          return exps[i] / total
    hints:
      - "A token probability is its share of the total exponential mass: exp(logit) divided by the sum of exp over all logits."
      - "To avoid overflow, subtract the maximum logit before exp - the final share is unchanged."
      - "Compute the sum of exp once, then return the share for index i."
