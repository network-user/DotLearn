exercises:
  - id: token-vs-word-001
    concept: tokenization
    type: theory-quiz
    difficulty: 1
    prompt: "Чем токен отличается от слова в современной subword-токенизации?"
    choices:
      - id: a
        text: "Токен - это всегда ровно одно слово."
      - id: b
        text: "Токен - частый кусок текста: частые слова целиком, редкие - несколько кусков; пробел тоже часть токена."
      - id: c
        text: "Токен - это всегда один символ."
      - id: d
        text: "Токен и слово - синонимы, разницы нет."
    correct: [b]
    explanation: "Subword-токенизация дробит редкие слова на куски, а частые оставляет целиком; токен часто несёт ведущий пробел, поэтому «мир» и « мир» различаются."
    variants:
      - prompt: "Почему у BPE-токенизатора не бывает «неизвестных слов»?"
        choices:
          - id: a
            text: "Любое слово в крайнем случае распадается на отдельные символы, которые всегда есть в словаре."
          - id: b
            text: "Токенизатор дообучается на каждом новом слове на лету."
          - id: c
            text: "Незнакомые слова заменяются на специальный токен UNK и теряются."
          - id: d
            text: "Словарь содержит все слова всех языков."
        correct: [a]
        explanation: "BPE собирает любое слово из известных кусков вплоть до отдельных символов, поэтому токен UNK не нужен."
      - prompt: "Почему русский текст обычно занимает больше токенов, чем равный по смыслу английский?"
        choices:
          - id: a
            text: "Токенизаторы обучены преимущественно на английском, поэтому английские слова чаще попадают в словарь целиком."
          - id: b
            text: "Русские буквы занимают больше байтов и потому считаются дважды."
          - id: c
            text: "Модель специально штрафует неанглийские языки."
          - id: d
            text: "В русском просто больше слов в любом предложении."
        correct: [a]
        explanation: "Частоты кусков в обучающем корпусе токенизатора смещены к английскому, поэтому другие языки дробятся мельче."

  - id: bpe-merge-output-001
    concept: tokenization
    type: predict-output
    difficulty: 2
    prompt: "Что выведет один шаг слияния BPE? Склеивается пара ('a', 't')."
    snippet: |
      def apply_merge(tokens, a, b):
          out, i, glued = [], 0, a + b
          while i < len(tokens):
              if i < len(tokens) - 1 and tokens[i] == a and tokens[i + 1] == b:
                  out.append(glued)
                  i += 2
              else:
                  out.append(tokens[i])
                  i += 1
          return out

      print(apply_merge(["c", "a", "t", "s"], "a", "t"))
    expected:
      kind: stdout
      value: "['c', 'at', 's']"
    hints:
      - "Слияние заменяет каждую соседнюю пару a, b на склеенный токен a+b, остальные токены остаются как есть."
      - "Найдите в списке соседство 'a' и 't' и мысленно склейте только его."

  - id: pair-count-001
    concept: tokenization
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `pair_count(tokens, a, b)` - сколько раз пара соседних токенов (a, b) встречается в списке `tokens`. Верните целое число."
    starter: |
      def pair_count(tokens, a, b):
          ...
    cases:
      - call: "pair_count(['l', 'o', 'w', 'e', 'r'], 'e', 'r')"
        expect: 1
      - call: "pair_count(['a', 'b', 'a', 'b', 'a', 'b'], 'a', 'b')"
        expect: 3
      - call: "pair_count(['x', 'y', 'z'], 'a', 'b')"
        expect: 0
      - call: "pair_count(['n', 'e', 'w', 'e', 's', 't'], 'e', 's')"
        expect: 1
    solution: |
      def pair_count(tokens, a, b):
          count = 0
          for left, right in zip(tokens, tokens[1:]):
              if left == a and right == b:
                  count += 1
          return count
    hints:
      - "Пара - это два соседних токена; на BPE-шаге чаще всего сливают именно самую частую пару, поэтому её нужно уметь считать."
      - "Пройдитесь по всем соседним парам списка и считайте совпадения с (a, b)."
      - "Соседние пары удобно получить, сопоставив список с самим собой, сдвинутым на один элемент."

  - id: apply-merge-001
    concept: tokenization
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `apply_merge(tokens, a, b)`: верните новый список, где каждая соседняя пара (a, b) склеена в один токен a+b, остальные токены без изменений. Идите слева направо без перекрытий."
    starter: |
      def apply_merge(tokens, a, b):
          ...
    cases:
      - call: "apply_merge(['l', 'o', 'w', 'e', 'r'], 'e', 'r')"
        expect: ["l", "o", "w", "er"]
      - call: "apply_merge(['n', 'e', 'w', 'e', 's', 't'], 'e', 's')"
        expect: ["n", "e", "w", "es", "t"]
      - call: "apply_merge(['a', 'b', 'a', 'b'], 'a', 'b')"
        expect: ["ab", "ab"]
      - call: "apply_merge(['c', 'a', 't', 's'], 'a', 't')"
        expect: ["c", "at", "s"]
    solution: |
      def apply_merge(tokens, a, b):
          out = []
          i = 0
          glued = a + b
          while i < len(tokens):
              if i < len(tokens) - 1 and tokens[i] == a and tokens[i + 1] == b:
                  out.append(glued)
                  i += 2
              else:
                  out.append(tokens[i])
                  i += 1
          return out
    hints:
      - "Слияние заменяет совпавшую пару одним новым токеном; это ровно то, что делает BPE на каждом шаге построения словаря."
      - "Идите по списку индексом: при совпадении пары добавьте склеенный токен и перепрыгните оба элемента; иначе добавьте текущий и сдвиньтесь на один."
      - "Перепрыгивание на два элемента после слияния не даёт паре перекрыться саму с собой."

  - id: count-tokens-after-merge-001
    concept: tokenization
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `length_after_merge(tokens, a, b)` - длину списка токенов после одного слияния пары (a, b). Верните целое число, сам список собирать не обязательно."
    starter: |
      def length_after_merge(tokens, a, b):
          ...
    cases:
      - call: "length_after_merge(['l', 'o', 'w', 'e', 'r'], 'e', 'r')"
        expect: 4
      - call: "length_after_merge(['a', 'b', 'a', 'b', 'a', 'b'], 'a', 'b')"
        expect: 3
      - call: "length_after_merge(['x', 'y', 'z'], 'a', 'b')"
        expect: 3
      - call: "length_after_merge(['n', 'e', 'w', 'e', 's', 't'], 'e', 's')"
        expect: 5
    solution: |
      def length_after_merge(tokens, a, b):
          merges = 0
          i = 0
          while i < len(tokens):
              if i < len(tokens) - 1 and tokens[i] == a and tokens[i + 1] == b:
                  merges += 1
                  i += 2
              else:
                  i += 1
          return len(tokens) - merges
    hints:
      - "Каждое слияние превращает два токена в один, то есть укорачивает список ровно на единицу."
      - "Значит, итоговая длина - это исходная длина минус число выполненных слияний."
      - "Слияния считайте так же, как применяли бы их: слева направо, перепрыгивая склеенную пару."
