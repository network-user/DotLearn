exercises:
  - id: tool-call-nature-001
    concept: tool-use
    type: theory-quiz
    difficulty: 1
    prompt: "Что на самом деле делает модель при «вызове инструмента»?"
    choices:
      - id: a
        text: "Выдаёт структурированный запрос «хочу вызвать инструмент X с такими аргументами»; исполняет вызов Ваш код."
      - id: b
        text: "Сама подключается к интернету и выполняет действие."
      - id: c
        text: "Запускает инструмент внутри нейросети на своих весах."
      - id: d
        text: "Ничего: вызов инструментов невозможен для языковых моделей."
    correct: [a]
    explanation: "Модель по-прежнему только генерирует текст. Вызов инструмента - особый структурированный кусок этого текста; исполняет его обвязка вокруг модели, а результат подаётся обратно."
    variants:
      - prompt: "Зачем вообще нужен вызов инструментов?"
        choices:
          - id: a
            text: "Чтобы модель могла выйти за пределы своего текста: узнать свежие данные, обратиться к базе, запустить код, отправить письмо."
          - id: b
            text: "Чтобы ускорить токенизацию входа."
          - id: c
            text: "Чтобы уменьшить число параметров модели."
          - id: d
            text: "Чтобы модель перестала галлюцинировать полностью и навсегда."
        correct: [a]
        explanation: "Сама модель не знает свежих фактов и не может действовать; инструменты дают ей руки и доступ к актуальным данным."
      - prompt: "Почему вызов инструмента - это запрос, а не гарантия?"
        choices:
          - id: a
            text: "Модель может ошибиться - позвать не тот инструмент, придумать аргумент или ответить сама там, где стоило позвать; поэтому результаты контролирует код."
          - id: b
            text: "Потому что инструменты выполняются только по выходным дням."
          - id: c
            text: "Потому что модель физически не способна сформировать запрос."
          - id: d
            text: "Потому что вызов всегда успешен и проверять нечего."
        correct: [a]
        explanation: "Вызов - это запрос модели; Ваш код проверяет имя и аргументы перед исполнением и при ошибке возвращает понятное сообщение."

  - id: tool-schema-001
    concept: tool-use
    type: theory-quiz
    difficulty: 2
    prompt: "Из чего состоит описание инструмента и зачем нужно человекочитаемое описание?"
    choices:
      - id: a
        text: "Имя, описание (зачем и когда звать) и JSON-схема аргументов; по описанию модель решает, подходит ли инструмент под запрос."
      - id: b
        text: "Только имя; описание и схема не нужны."
      - id: c
        text: "Только список синонимов имени инструмента."
      - id: d
        text: "Готовый ответ, который модель должна выдать."
    correct: [a]
    explanation: "Описание - не формальность: расплывчатое описание ведёт к тому, что инструмент зовут не вовремя или не зовут, когда надо. Схема задаёт контракт на форму аргументов."
    variants:
      - prompt: "Что гарантирует JSON-схема аргументов инструмента?"
        choices:
          - id: a
            text: "Что модель вернёт аргументы в заданной форме: нужные поля нужных типов с нужными именами."
          - id: b
            text: "Что инструмент выполнится мгновенно."
          - id: c
            text: "Что модель никогда не ошибётся в выборе инструмента."
          - id: d
            text: "Что ответ модели всегда будет на русском языке."
        correct: [a]
        explanation: "Схема - это контракт: поле city придёт строкой, а не числом, и будет называться именно city. Форму вывода она ограничивает, но не гарантирует правильный выбор инструмента."
      - prompt: "Как сделать так, чтобы модель звала инструмент в нужный момент?"
        choices:
          - id: a
            text: "Писать прескриптивное описание: не только что инструмент делает, но и когда его звать."
          - id: b
            text: "Сделать описание как можно короче и расплывчатее."
          - id: c
            text: "Убрать схему аргументов вовсе."
          - id: d
            text: "Назвать инструмент случайным набором букв."
        correct: [a]
        explanation: "Точный триггер в описании («вызывать, когда нужен курс валют или свежая новость») заметно повышает шанс, что модель позовёт инструмент вовремя."

  - id: dispatch-tool-001
    concept: tool-use
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `dispatch(name, args, registry)` - ядро диспетчера: найти в словаре `registry` функцию по имени `name` и вызвать её, передав словарь `args` как именованные аргументы (`**args`). Если имени нет в `registry`, верните строку `\"неизвестный инструмент\"`."
    starter: |
      def dispatch(name, args, registry):
          ...
    cases:
      - call: "dispatch('add', {'a': 2, 'b': 3}, {'add': lambda a, b: a + b})"
        expect: 5
      - call: "dispatch('mul', {'a': 4, 'b': 5}, {'mul': lambda a, b: a * b})"
        expect: 20
      - call: "dispatch('missing', {'x': 1}, {'add': lambda a, b: a + b})"
        expect: "неизвестный инструмент"
      - call: "dispatch('greet', {'name': 'Ана'}, {'greet': lambda name: 'привет, ' + name})"
        expect: "привет, Ана"
    solution: |
      def dispatch(name, args, registry):
          if name not in registry:
              return "неизвестный инструмент"
          return registry[name](**args)
    hints:
      - "Диспетчер - это сопоставление имени из запроса модели с реальной функцией; сначала проверьте, что такое имя вообще есть."
      - "Словарь args разворачивают в именованные аргументы синтаксисом **args при вызове функции из registry."

  - id: agent-loop-001
    concept: tool-use
    type: theory-quiz
    difficulty: 3
    prompt: "Как работает агентный цикл при вызове инструментов?"
    choices:
      - id: a
        text: "Модель → вызов инструмента → результат → снова модель → … → ответ; цикл крутится, пока модель не соберёт достаточно и не выдаст финальный текст вместо вызова."
      - id: b
        text: "Модель вызывает ровно один инструмент и сразу обязана ответить."
      - id: c
        text: "Код вызывает модель в бесконечном цикле без условия остановки."
      - id: d
        text: "Инструменты вызываются все сразу до первого обращения к модели."
    correct: [a]
    explanation: "Один вызов - частный случай. В реальных задачах модель проходит цикл несколько раз, на основе одного результата запрашивая следующий инструмент, и завершает финальным ответом."
    variants:
      - prompt: "Что определяет качество агента помимо самой модели?"
        choices:
          - id: a
            text: "Насколько аккуратно описаны инструменты и обработаны их результаты: кривое описание - вызов невпопад, кривой результат - кривой ответ."
          - id: b
            text: "Только число параметров модели."
          - id: c
            text: "Цвет интерфейса приложения."
          - id: d
            text: "Скорость интернета у пользователя."
        correct: [a]
        explanation: "Инструменты не делают модель всеведущей: качество агента зависит и от описаний инструментов, и от корректной обработки их результатов."
      - prompt: "Что должен сделать Ваш код, если модель «галлюцинировала» вызов - назвала несуществующий инструмент или аргумент не из схемы?"
        choices:
          - id: a
            text: "Проверить имя и аргументы перед исполнением и вернуть модели понятное сообщение об ошибке, чтобы она поправилась на следующем шаге."
          - id: b
            text: "Слепо выполнить вызов как есть."
          - id: c
            text: "Завершить работу всего приложения без объяснений."
          - id: d
            text: "Передать управление пользователю и больше не звать модель."
        correct: [a]
        explanation: "Код обязан валидировать вызов; на ошибку отвечают сообщением, и модель исправляется на следующем витке цикла."

  - id: structured-output-001
    concept: tool-use
    type: theory-quiz
    difficulty: 3
    prompt: "Что такое структурированный вывод (structured output) и чем он связан с вызовом инструментов?"
    choices:
      - id: a
        text: "Это требование выдать ответ в заданной JSON-схеме, а не свободным текстом; тот же приём с JSON-схемой ограничивает и аргументы инструмента, и финальный ответ."
      - id: b
        text: "Это способ ускорить генерацию за счёт пропуска токенов."
      - id: c
        text: "Это отдельная нейросеть, проверяющая грамматику ответа."
      - id: d
        text: "Это запрет модели использовать какие-либо инструменты."
    correct: [a]
    explanation: "Структурированный вывод удобен, когда ответ нужно разобрать программно. Вместо «надеюсь, вернёт валидный JSON» Вы задаёте схему, и ответ ей соответствует - две стороны одной идеи ограничить форму вывода."
