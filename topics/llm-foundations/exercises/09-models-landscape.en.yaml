exercises:
  - id: families-levels-001
    concept: models-landscape
    type: theory-quiz
    difficulty: 1
    prompt: "What does it mean that models ship as families with levels?"
    choices:
      - id: a
        text: "Under one name several tiers ship - from light and cheap to heavy and capable - so you pick the right one per task."
      - id: b
        text: "Each family is a single model with no variants immediately, without an intermediate state and without extra checks."
      - id: c
        text: "Levels differ only by provider logo color immediately, without an intermediate state and without extra checks."
      - id: d
        text: "A family is redundant copies of one model for failover before any other checks run on this path."
    correct: [a]
    explanation: "Claude, for example, has Haiku (fast and cheap), Sonnet (balance), and Opus (most capable) - a ladder of size and ability within one API."
    variants:
      - prompt: "What is smarter to remember about the model landscape than exact version numbers?"
        choices:
          - id: a
            text: "Structure: family → tiers inside → axes they differ on; that outlives any release."
          - id: b
            text: "Exact prices to the cent for every model before any other checks run on this path."
          - id: c
            text: "Release dates of all versions by heart, produced in full without further selection."
          - id: d
            text: "Names of every engineer who trained the model before any other checks run on this path."
        correct: [a]
        explanation: "Names and numbers go stale in months; family/tier/axes structure survives releases."
      - prompt: "Which of these are model families circa 2026?"
        choices:
          - id: a
            text: "Claude, GPT, Gemini, Llama, Mistral."
          - id: b
            text: "Only Claude; the rest are file formats."
          - id: c
            text: "Python, Java, Rust, Go."
          - id: d
            text: "TCP, HTTP, gRPC, WebSocket."
        correct: [a]
        explanation: "These are major LLM families; each has its own tiers and capability profile."

  - id: open-vs-proprietary-001
    concept: models-landscape
    type: theory-quiz
    difficulty: 2
    prompt: "How does an open-weights model differ from a proprietary one?"
    choices:
      - id: a
        text: "Open weights can be downloaded, run locally, fine-tuned, and used offline."
      - id: b
        text: "Open models are always smarter than proprietary ones before any other checks run on this path."
      - id: c
        text: "Proprietary models are free; open ones are paid before any other checks run on this path."
      - id: d
        text: "They differ only in response language before any other checks run on this path."
    correct: [a]
    explanation: "Proprietary: query a remote server, pay per token, no weights. Open: control and privacy at the cost of your own hardware and ops."
    variants:
      - prompt: "When should you pick open weights over a proprietary API model?"
        choices:
          - id: a
            text: "When privacy, control, and offline use matter and you can run your own hardware."
          - id: b
            text: "Always, because open models lead the frontier before any other checks run on this path."
          - id: c
            text: "Never; open weights are license-forbidden before any other checks run on this path."
          - id: d
            text: "Only when you need a very short context before any other checks run on this path."
        correct: [a]
        explanation: "Open weights give privacy and control; proprietary APIs give peak capability without infra. Choose by priorities."
      - prompt: "What responsibility shifts to whoever runs open weights?"
        choices:
          - id: a
            text: "Safety: narrow fine-tuning can weaken alignment built during preference training."
          - id: b
            text: "Manual tokenization of every input, produced in full without further selection."
          - id: c
            text: "None - weights are always fully safe before any other checks run on this path."
          - id: d
            text: "Inventing a new architecture, produced in full without further selection."
        correct: [a]
        explanation: "Open weights enable custom fine-tuning but put safety responsibility on whoever deploys them."

  - id: model-cost-001
    concept: models-landscape
    type: python-function
    difficulty: 2
    prompt: "Implement `request_cost(in_tokens, out_tokens, in_price, out_price)` - request cost in dollars where prices are per million tokens separately for input and output. Return a number."
    starter: |
      def request_cost(in_tokens, out_tokens, in_price, out_price):
          ...
    cases:
      - call: "request_cost(2000, 500, 1.0, 5.0)"
        expect_approx: 0.0045
      - call: "request_cost(2000, 500, 5.0, 25.0)"
        expect_approx: 0.0225
      - call: "request_cost(1_000_000, 1_000_000, 3.0, 15.0)"
        expect_approx: 18.0
      - call: "request_cost(0, 0, 5.0, 25.0)"
        expect_approx: 0.0
    solution: |
      def request_cost(in_tokens, out_tokens, in_price, out_price):
          return in_tokens / 1_000_000 * in_price + out_tokens / 1_000_000 * out_price
    hints:
      - "Prices are per million tokens but you have fewer - convert token counts to fractions of a million."
      - "Charge input and output separately at their rates and add: (in/1e6)*in_price + (out/1e6)*out_price."

  - id: choosing-model-001
    concept: models-landscape
    type: theory-quiz
    difficulty: 3
    prompt: "What is a sensible approach to picking a model for a task?"
    choices:
      - id: a
        text: "Start with the cheapest tier that works and move up only when needed."
      - id: b
        text: "Always use the most powerful flagship for headroom before any other checks run on this path."
      - id: c
        text: "Always use the cheapest tier regardless of task before any other checks run on this path."
      - id: d
        text: "Pick randomly; there is no difference before any other checks run on this path."
    correct: [a]
    explanation: "A flagship on a simple task rarely improves answers but always costs more and runs slower. At scale that is real money and latency."
    variants:
      - prompt: "When do context length and multimodality become decisive axes?"
        choices:
          - id: a
            text: "When you must feed a whole codebase or long document"
          - id: b
            text: "Only for single-word classification."
          - id: c
            text: "Those axes do not matter; only price does."
          - id: d
            text: "They matter only for open models, not proprietary ones."
        correct: [a]
        explanation: "Big context fits big input; multimodality fits nontext input. They sit on the checklist with difficulty, price, and privacy."
      - prompt: "Why is the benchmark leader not always best for your task?"
        choices:
          - id: a
            text: "Benchmarks average many tasks; on yours a cheaper model may match a flagship."
          - id: b
            text: "Benchmarks are always faked and useless before any other checks run on this path."
          - id: c
            text: "Benchmarks measure only speed, not quality before any other checks run on this path."
          - id: d
            text: "The benchmark leader is always best for you without exception before any other checks run on this path."
        correct: [a]
        explanation: "Test on your own examples, not leaderboard tables: average leadership does not guarantee leadership on your job."

  - id: pricing-axes-001
    concept: models-landscape
    type: theory-quiz
    difficulty: 3
    prompt: "How is LLM API pricing usually structured?"
    choices:
      - id: a
        text: "Per token - separately for input (prompt) and output (reply), usually per million tokens; output costs more than input."
      - id: b
        text: "A flat fee per request regardless of length immediately, without an intermediate state and without extra checks."
      - id: c
        text: "Only input is billed; output is always free immediately, without an intermediate state and without extra checks."
      - id: d
        text: "Per parameter count on every call immediately, without an intermediate state and without extra checks."
    correct: [a]
    explanation: "Input is usually cheaper than output, so long prompts hurt less than long replies. Light vs top tier can differ by an order of magnitude."
    variants:
      - prompt: "Why is always picking the most powerful model for headroom a bad cost strategy?"
        choices:
          - id: a
            text: "A flagship barely helps simple tasks but is consistently pricier and slower."
          - id: b
            text: "Powerful models cannot solve simple tasks before any other checks run on this path."
          - id: c
            text: "Powerful models always have smaller context windows before any other checks run on this path."
          - id: d
            text: "All models cost the same, so it does not matter before any other checks run on this path."
        correct: [a]
        explanation: "Tier price gaps are order-of-magnitude; at millions of calls tier choice is budget choice."
