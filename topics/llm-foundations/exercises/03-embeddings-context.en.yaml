exercises:
  - id: embedding-meaning-001
    concept: embeddings-context
    type: theory-quiz
    difficulty: 1
    prompt: "What is a token embedding?"
    choices:
      - id: a
        text: "A textual definition of the word stored next to the token."
      - id: b
        text: "A fixed-length vector - coordinates of the token in meaning space; semantically close tokens lie nearby."
      - id: c
        text: "A random number unique to each token."
      - id: d
        text: "The token position number in the sentence."
    correct: [b]
    explanation: "An embedding is a vector; meaning comes from relative placement of vectors, not from any single vector alone."
    variants:
      - prompt: "Why do similar words end up near each other in embedding space?"
        choices:
          - id: a
            text: "It emerges during training: words that appear in similar contexts are pushed together."
          - id: b
            text: "Developers manually cluster words."
          - id: c
            text: "Words are sorted alphabetically."
          - id: d
            text: "Closeness is set by word length in characters."
        correct: [a]
        explanation: "Placement is not hand-designed: training moves words from similar contexts into nearby points."
      - prompt: "Why add positional information to a token embedding?"
        choices:
          - id: a
            text: "So the model can tell token order; otherwise attention sees only a bag of tokens."
          - id: b
            text: "To speed up tokenization."
          - id: c
            text: "To shrink the vocabulary."
          - id: d
            text: "To translate the token into another language."
        correct: [a]
        explanation: "Attention alone does not distinguish order; positional encoding restores where each token sits."

  - id: cosine-output-001
    concept: embeddings-context
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? This is cosine similarity of two perpendicular vectors."
    snippet: |
      import math

      def cosine(a, b):
          dot = sum(x * y for x, y in zip(a, b))
          na = math.sqrt(sum(x * x for x in a))
          nb = math.sqrt(sum(y * y for y in b))
          return dot / (na * nb)

      print(round(cosine([3, 0], [0, 5]), 1))
    expected:
      kind: stdout
      value: "0.0"
    hints:
      - "Cosine measures the angle between vectors; what is it for perpendicular directions?"
      - "The dot product of perpendicular vectors is zero; the denominator is not."

  - id: cosine-similarity-001
    concept: embeddings-context
    type: python-function
    difficulty: 3
    prompt: "Implement `cosine(a, b)` - cosine similarity of two equal-length vectors (lists of numbers). Return a single number."
    starter: |
      import math

      def cosine(a, b):
          ...
    cases:
      - call: "cosine([1, 0], [1, 0])"
        expect_approx: 1.0
      - call: "cosine([1, 0], [0, 1])"
        expect_approx: 0.0
      - call: "cosine([1, 0], [-1, 0])"
        expect_approx: -1.0
      - call: "cosine([1, 2, 3], [4, 5, 6])"
        expect_approx: 0.9746318
      - call: "cosine([1, 1, 0], [1, 0, 1])"
        expect_approx: 0.5
    solution: |
      import math

      def cosine(a, b):
          dot = sum(x * y for x, y in zip(a, b))
          na = math.sqrt(sum(x * x for x in a))
          nb = math.sqrt(sum(y * y for y in b))
          return dot / (na * nb)
    hints:
      - "Cosine measures direction, not length: aligned vectors give 1, perpendicular 0, opposite -1."
      - "Numerator is the dot product; denominator is the product of each vector norm."
      - "Norm is the square root of the sum of squared coordinates."

  - id: fit-context-001
    concept: embeddings-context
    type: python-function
    difficulty: 2
    prompt: "Implement `fit_context(tokens, limit)`: if there are at most `limit` tokens, return them unchanged; otherwise return the last `limit` tokens (as a new list). The model keeps the freshest tokens."
    starter: |
      def fit_context(tokens, limit):
          ...
    cases:
      - call: "fit_context([1, 2, 3, 4, 5], 3)"
        expect: [3, 4, 5]
      - call: "fit_context([1, 2], 5)"
        expect: [1, 2]
      - call: "fit_context([1, 2, 3, 4], 4)"
        expect: [1, 2, 3, 4]
      - call: "fit_context([10, 20, 30, 40, 50, 60], 2)"
        expect: [50, 60]
    solution: |
      def fit_context(tokens, limit):
          if len(tokens) <= limit:
              return list(tokens)
          return tokens[len(tokens) - limit:]
    hints:
      - "The context window evicts the oldest tokens; which end of the list should survive?"
      - "If everything already fits, nothing is evicted; otherwise keep a tail of the required length."
      - "The last N elements are tokens[len(tokens) - N:]."

  - id: tokens-dropped-001
    concept: embeddings-context
    type: python-function
    difficulty: 2
    prompt: "Implement `tokens_dropped(total, limit)` - how many tokens are evicted from the context window when there are `total` tokens and the window holds `limit`. Return a non-negative integer."
    starter: |
      def tokens_dropped(total, limit):
          ...
    cases:
      - call: "tokens_dropped(10, 4)"
        expect: 6
      - call: "tokens_dropped(3, 5)"
        expect: 0
      - call: "tokens_dropped(8, 8)"
        expect: 0
      - call: "tokens_dropped(1000, 256)"
        expect: 744
    solution: |
      def tokens_dropped(total, limit):
          dropped = total - limit
          if dropped < 0:
              return 0
          return dropped
    hints:
      - "Exactly what does not fit is evicted; if everything fits, nothing is evicted."
      - "total - limit can be negative - in that case the answer is zero, not a negative number."

  - id: context-window-001
    concept: embeddings-context
    type: theory-quiz
    difficulty: 3
    prompt: "Does a large context window mean the model uses all of that context equally well?"
    choices:
      - id: a
        text: "Yes, a large window guarantees uniform attention to every token."
      - id: b
        text: "No: models often use the middle of long context worse (lost in the middle), and long context is also more expensive."
      - id: c
        text: "Yes, but only if the text is in English."
      - id: d
        text: "No, because a large window disables attention to old tokens entirely."
    correct: [b]
    explanation: "Window size sets a limit, not uniformity: keep important instructions near the start or end, not buried in the middle of a long document."
