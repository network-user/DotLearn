exercises:
  - id: greedy-vs-sampling-001
    concept: sampling
    type: theory-quiz
    difficulty: 1
    prompt: "How does greedy decoding differ from random sampling?"
    choices:
      - id: a
        text: "Greedy always takes the most probable token (deterministic); sampling draws a token randomly proportional to its probability."
      - id: b
        text: "Greedy picks a random token; sampling takes the most probable one."
      - id: c
        text: "They are two names for the same algorithm."
      - id: d
        text: "Greedy works only for short answers."
    correct: [a]
    explanation: "Greedy is deterministic and prone to repetition; sampling adds variety by drawing with probability equal to each token share."
    variants:
      - prompt: "Is sampling part of the neural network?"
        choices:
          - id: a
            text: "No: the model outputs probabilities; how you pick a token is a request setting."
          - id: b
            text: "Yes, sampling is the final network layer."
          - id: c
            text: "Yes, without sampling the model cannot compute softmax."
          - id: d
            text: "No, sampling runs only during training, not generation."
        correct: [a]
        explanation: "Decoding is separate from the model; the same probabilities yield different answers under different settings."
      - prompt: "Why is greedy decoding prone to dull, repetitive answers?"
        choices:
          - id: a
            text: "It always takes the local maximum and adds no variety, so it loops easily."
          - id: b
            text: "It deliberately repeats the last sentence."
          - id: c
            text: "It ignores the probability distribution."
          - id: d
            text: "It picks the least probable token."
        correct: [a]
        explanation: "Greedy is deterministic: the same context always yields the same token, which leads to repeats."

  - id: temperature-effect-001
    concept: sampling
    type: theory-quiz
    difficulty: 2
    prompt: "What does temperature T < 1 do to the distribution?"
    choices:
      - id: a
        text: "Makes it sharper: the gap between the favorite and the rest grows, so choice is almost deterministic."
      - id: b
        text: "Makes it flatter, raising the chance of rare tokens."
      - id: c
        text: "Changes the rank order of tokens by probability."
      - id: d
        text: "Zeros every token except the first by index."
    correct: [a]
    explanation: "Temperature divides logits before softmax. T<1 sharpens, T>1 flattens; token order is unchanged."
    variants:
      - prompt: "What does temperature 0 mean in practice?"
        choices:
          - id: a
            text: "By convention, greedy decoding: always take the most probable token."
          - id: b
            text: "Literal division by zero inside softmax."
          - id: c
            text: "A uniform distribution over all tokens."
          - id: d
            text: "The model is turned off."
        correct: [a]
        explanation: "T=0 would divide by zero in the formula, so it is treated as greedy by convention."
      - prompt: "What does temperature T > 1 do?"
        choices:
          - id: a
            text: "Flattens the distribution: rare tokens gain chance; text is more varied and riskier."
          - id: b
            text: "Makes the distribution sharper."
          - id: c
            text: "Guarantees factual accuracy."
          - id: d
            text: "Sorts tokens alphabetically."
        correct: [a]
        explanation: "T>1 smooths probability gaps; variety rises but so does the risk of incoherence."

  - id: greedy-index-001
    concept: sampling
    type: python-function
    difficulty: 1
    prompt: "Implement `greedy(logits)` - the index of the token greedy decoding would pick (highest logit). On a tie, return the smallest index."
    starter: |
      def greedy(logits):
          ...
    cases:
      - call: "greedy([0.2, 0.9, 0.5])"
        expect: 1
      - call: "greedy([3.0, 2.0])"
        expect: 0
      - call: "greedy([1.0, 1.0, 5.0])"
        expect: 2
    solution: |
      def greedy(logits):
          best = 0
          for i in range(1, len(logits)):
              if logits[i] > logits[best]:
                  best = i
          return best
    hints:
      - "Greedy takes the highest score; softmax is unnecessary because it preserves order."
      - "Walk the logits, tracking the max index; strict comparison keeps the first tie."
    variants:
      - prompt: "Implement `greedy(logits)` - index of the most probable token under greedy decoding. On a tie, smallest index."
        cases:
          - call: "greedy([5.0, 1.0, 1.0])"
            expect: 0
          - call: "greedy([0.0, 0.0, 0.0, 7.0])"
            expect: 3
          - call: "greedy([2.5, 9.1])"
            expect: 1
        solution: |
          def greedy(logits):
              best = 0
              for i in range(1, len(logits)):
                  if logits[i] > logits[best]:
                      best = i
              return best
      - prompt: "Implement `greedy(logits)` - index of the token with the largest logit. On a tie, return the smallest index."
        cases:
          - call: "greedy([-1.0, -0.2, -3.0])"
            expect: 1
          - call: "greedy([4.0, 4.0])"
            expect: 0
          - call: "greedy([0.1, 0.2, 0.3, 0.25])"
            expect: 2
        solution: |
          def greedy(logits):
              best = 0
              for i in range(1, len(logits)):
                  if logits[i] > logits[best]:
                      best = i
              return best

  - id: top-k-indices-001
    concept: sampling
    type: python-function
    difficulty: 3
    prompt: "Implement `top_k_indices(logits, k)` - sorted ascending indices of the `k` tokens with the largest logits (top-k keeps exactly those). On equal logits, prefer the smaller index."
    starter: |
      def top_k_indices(logits, k):
          ...
    cases:
      - call: "top_k_indices([3.0, 1.0, 2.0, 0.5], 2)"
        expect: [0, 2]
      - call: "top_k_indices([0.1, 0.9, 0.5], 1)"
        expect: [1]
      - call: "top_k_indices([5.0, 4.0, 3.0], 3)"
        expect: [0, 1, 2]
      - call: "top_k_indices([1.0, 2.0, 2.0, 1.0], 2)"
        expect: [1, 2]
    solution: |
      def top_k_indices(logits, k):
          order = sorted(range(len(logits)), key=lambda i: (-logits[i], i))
          return sorted(order[:k])
    hints:
      - "top-k keeps the k most likely tokens; logits rank the same way as probabilities, so sorting logits is enough."
      - "Sort indices by descending logit (ties by ascending index), take the first k, then return them sorted ascending."
      - "A sort key of (-logits[i], i) handles both ordering and tie-breaking."

  - id: temperature-prob-001
    concept: sampling
    type: python-function
    difficulty: 3
    prompt: "Implement `temperature_prob(logits, temp, i)` - probability of token index `i` after dividing logits by temperature `temp` and applying softmax. Return a single number."
    starter: |
      import math

      def temperature_prob(logits, temp, i):
          ...
    cases:
      - call: "temperature_prob([2.0, 1.0, 0.0], 1.0, 0)"
        expect_approx: 0.6652410
      - call: "temperature_prob([2.0, 1.0, 0.0], 0.5, 0)"
        expect_approx: 0.8668133
      - call: "temperature_prob([1.0, 1.0], 1.0, 0)"
        expect_approx: 0.5
      - call: "temperature_prob([2.0, 1.0, 0.0], 2.0, 0)"
        expect_approx: 0.5064804
    solution: |
      import math

      def temperature_prob(logits, temp, i):
          scaled = [x / temp for x in logits]
          m = max(scaled)
          exps = [math.exp(s - m) for s in scaled]
          total = sum(exps)
          return exps[i] / total
    hints:
      - "Temperature acts before softmax: divide each logit by temp, then run ordinary softmax."
      - "temp < 1 sharpens the distribution, temp > 1 flattens it; sanity-check extremes mentally."
      - "Subtract the max scaled logit before exp for stability, then return the share at index i."
