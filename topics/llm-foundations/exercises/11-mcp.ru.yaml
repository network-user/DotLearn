exercises:
  - id: mcp-purpose-001
    concept: mcp
    type: theory-quiz
    difficulty: 1
    prompt: "Что такое Model Context Protocol (MCP) и зачем он нужен?"
    choices:
      - id: a
        text: "Стандарт, по которому любой клиент общается с любым сервером, превращая N×M самодельных интеграций в N+M."
      - id: b
        text: "Новая архитектура нейросети, заменяющая трансформер."
      - id: c
        text: "Способ обучать модель на меньшем числе данных."
      - id: d
        text: "Формат хранения весов модели на диске."
    correct: [a]
    explanation: "До стандарта каждая связка «приложение - сервис» писалась вручную. MCP - единый разъём: написал сервер один раз, и к нему подключается любой MCP-совместимый клиент. Как USB или HTTP."
    variants:
      - prompt: "Какую проблему решает стандартизация подключений в MCP?"
        choices:
          - id: a
            text: "Комбинаторику интеграций: без стандарта N приложений на M сервисов дают N×M связок, с MCP - N+M."
          - id: b
            text: "Слишком медленную токенизацию входа."
          - id: c
            text: "Нехватку параметров у модели."
          - id: d
            text: "Высокую температуру сэмплинга."
        correct: [a]
        explanation: "Написал MCP-сервер для сервиса один раз - и к нему может подключиться любой совместимый клиент, не повторяя интеграцию под каждое приложение."
      - prompt: "На какую известную технологию похож MCP по идее?"
        choices:
          - id: a
            text: "На USB или HTTP: договорились о разъёме - и всё, что его поддерживает, сразу совместимо."
          - id: b
            text: "На алгоритм сортировки массива."
          - id: c
            text: "На формат сжатия изображений."
          - id: d
            text: "На язык программирования Python."
        correct: [a]
        explanation: "Ценность стандарта - в совместимости: единый протокол вместо сотни самодельных переходников."

  - id: mcp-roles-001
    concept: mcp
    type: theory-quiz
    difficulty: 2
    prompt: "Как распределены роли хоста, клиента и сервера в MCP?"
    choices:
      - id: a
        text: "Хост - приложение с моделью; внутри него MCP-клиент говорит на протоколе; на другом конце MCP-сервер предоставляет конкретные возможности."
      - id: b
        text: "Сервер содержит модель, а хост - это просто кабель между ними."
      - id: c
        text: "Клиент и сервер - это два названия одной и той же программы."
      - id: d
        text: "Хост обучает модель, а сервер её сэмплирует."
    correct: [a]
    explanation: "Хост (чат-клиент, IDE, агент) связывает модель и пользователя; MCP-клиент внутри хоста общается по протоколу с MCP-серверами, каждый из которых даёт доступ к своему сервису."
    variants:
      - prompt: "Может ли один хост подключаться к нескольким MCP-серверам?"
        choices:
          - id: a
            text: "Да: хост держит связь сразу с несколькими серверами и собирает их возможности в общий набор для модели."
          - id: b
            text: "Нет: один хост работает строго с одним сервером."
          - id: c
            text: "Да, но только если все серверы написаны на одном языке."
          - id: d
            text: "Нет: серверы вообще не подключаются к хостам."
        correct: [a]
        explanation: "Сервер при подключении объявляет свои возможности, клиент их обнаруживает; список не зашит в приложение жёстко."
      - prompt: "Содержит ли MCP-сервер саму модель?"
        choices:
          - id: a
            text: "Нет: сервер предоставляет возможности (tools/resources/prompts); модель живёт в хосте, на другом конце протокола."
          - id: b
            text: "Да, каждый сервер - это отдельная копия модели."
          - id: c
            text: "Да, сервер дообучает модель при каждом запросе."
          - id: d
            text: "Нет, сервер - это и есть пользователь."
        correct: [a]
        explanation: "Сервер - отдельная программа с доступом к сервису (файлы, GitHub, база); модель к нему обращается через хост и клиент."

  - id: mcp-capabilities-001
    concept: mcp
    type: theory-quiz
    difficulty: 2
    prompt: "Что предоставляет MCP-сервер и чем tools отличаются от resources?"
    choices:
      - id: a
        text: "Tools (действия, которые зовёт модель), resources (данные для чтения в контекст) и prompts (шаблоны сценариев); инструмент «делает», ресурс «даёт прочитать»."
      - id: b
        text: "Только tools; resources и prompts в MCP не существуют."
      - id: c
        text: "Только веса модели и больше ничего."
      - id: d
        text: "Tools и resources - это одно и то же под разными именами."
    correct: [a]
    explanation: "Инструмент совершает действие (создать issue, записать файл) и его выбирает модель; ресурс предоставляет данные для чтения (файл, запись в базе); промпты - готовые заготовки взаимодействия."
    variants:
      - prompt: "Что такое resources в MCP?"
        choices:
          - id: a
            text: "Данные, которые можно прочитать и подложить в контекст: файл, запись в базе, страница документации; ресурс не «делает», а «даёт прочитать»."
          - id: b
            text: "Действия, которые модель вызывает для изменения внешнего мира."
          - id: c
            text: "Память видеокарты, на которой работает модель."
          - id: d
            text: "Готовые ответы, которые сервер навязывает модели."
        correct: [a]
        explanation: "Ресурсы обычно подключает пользователь или хост заранее («вот этот документ - в контекст»), в отличие от инструментов, которые активно выбирает модель."
      - prompt: "Что такое prompts как возможность MCP-сервера?"
        choices:
          - id: a
            text: "Готовые шаблоны взаимодействия, которые сервер предлагает пользователю - например, «сделай code review этого файла» с выстроенной структурой запроса."
          - id: b
            text: "Системные логи сервера."
          - id: c
            text: "Пароли для доступа к серверу."
          - id: d
            text: "Список параметров модели."
        correct: [a]
        explanation: "Промпты - переиспользуемые сценарии, которые пользователь запускает осознанно; третья категория наряду с tools и resources."

  - id: mcp-describe-001
    concept: mcp
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `describe(server)` - по словарю сервера с ключами `name` и `capabilities` (список из строк среди `tools`/`resources`/`prompts`) вернуть строку вида `\"<name>: <слова>\"`, где каждую возможность переводят: tools→`действия`, resources→`данные`, prompts→`шаблоны`, через запятую с пробелом, в исходном порядке."
    starter: |
      def describe(server):
          ...
    cases:
      - call: "describe({'name': 'GitHub', 'capabilities': ['tools']})"
        expect: "GitHub: действия"
      - call: "describe({'name': 'Файлы', 'capabilities': ['resources', 'tools']})"
        expect: "Файлы: данные, действия"
      - call: "describe({'name': 'База', 'capabilities': ['resources', 'prompts']})"
        expect: "База: данные, шаблоны"
      - call: "describe({'name': 'Всё', 'capabilities': ['tools', 'resources', 'prompts']})"
        expect: "Всё: действия, данные, шаблоны"
    solution: |
      def describe(server):
          kinds = {"tools": "действия", "resources": "данные", "prompts": "шаблоны"}
          parts = [kinds[c] for c in server["capabilities"]]
          return server["name"] + ": " + ", ".join(parts)
    hints:
      - "Это упрощённая модель того, как клиент обнаруживает возможности сервера при подключении: перевести коды возможностей в человекочитаемые слова."
      - "Заведите словарь перевод кодов, соберите список переведённых слов в исходном порядке и склейте через «, » после имени и двоеточия."

  - id: mcp-vs-function-calling-001
    concept: mcp
    type: theory-quiz
    difficulty: 3
    prompt: "Чем MCP отличается от обычного function calling?"
    choices:
      - id: a
        text: "Function calling - механизм внутри одного API-вызова (как модель просит вызов); MCP - стандарт подключения внешних источников инструментов и данных, переносимый между приложениями."
      - id: b
        text: "Это конкуренты: MCP полностью заменяет function calling."
      - id: c
        text: "MCP - это разновидность сэмплинга, а function calling - токенизации."
      - id: d
        text: "Разницы нет, это два названия одного и того же."
    correct: [a]
    explanation: "Они работают вместе и на разных слоях: MCP-сервер объявляет инструмент, хост передаёт его модели, модель вызывает обычным function calling. MCP стандартизирует доставку возможностей, function calling - их использование."
    variants:
      - prompt: "Как MCP и function calling работают вместе?"
        choices:
          - id: a
            text: "MCP-сервер предоставляет инструмент, хост передаёт его модели, модель вызывает привычным function calling, результат возвращается через тот же протокол."
          - id: b
            text: "MCP отключает function calling и заменяет его прямым доступом к весам."
          - id: c
            text: "Они не могут работать вместе и взаимоисключают друг друга."
          - id: d
            text: "Function calling запускает MCP-сервер заново на каждый токен."
        correct: [a]
        explanation: "MCP не заменяет вызов функций - он стандартизирует, откуда эти функции берутся; использует их модель тем же механизмом."
      - prompt: "Делает ли подключение MCP-сервера интеграцию безопасной автоматически?"
        choices:
          - id: a
            text: "Нет: сервер получает доступ к Вашим данным и действиям; стандарт унифицирует подключение, но доверие к серверу - отдельный вопрос."
          - id: b
            text: "Да: любой MCP-сервер гарантированно безопасен по протоколу."
          - id: c
            text: "Да: MCP шифрует все данные и исключает любые риски."
          - id: d
            text: "Нет, потому что MCP вообще не передаёт данные."
        correct: [a]
        explanation: "Подключив непроверенный сервер, Вы пускаете его в свой контекст; проверять сервер надо самому, протокол это за Вас не решает."
