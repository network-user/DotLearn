exercises:
  - id: families-levels-001
    concept: models-landscape
    type: theory-quiz
    difficulty: 1
    prompt: "Что значит, что модели выходят «семействами» с уровнями?"
    choices:
      - id: a
        text: "Под общим именем выпускают несколько уровней - от лёгкого и дешёвого до тяжёлого и умного - чтобы под каждую задачу взять подходящий."
      - id: b
        text: "Каждое семейство - это одна-единственная модель без вариантов."
      - id: c
        text: "Уровни различаются только цветом логотипа провайдера."
      - id: d
        text: "Семейство - это набор копий одной и той же модели для отказоустойчивости."
    correct: [a]
    explanation: "Например, у Claude уровни Haiku (быстрый и дешёвый), Sonnet (баланс) и Opus (самый способный). Это лесенка по размеру и способностям внутри одного API."
    variants:
      - prompt: "Что разумнее запоминать про ландшафт моделей, а не конкретные номера версий?"
        choices:
          - id: a
            text: "Структуру: семейство → уровни внутри → оси, по которым уровни различаются; она живёт дольше любого релиза."
          - id: b
            text: "Точные цены до цента на каждую модель."
          - id: c
            text: "Даты выхода всех версий наизусть."
          - id: d
            text: "Имена всех инженеров, обучавших модель."
        correct: [a]
        explanation: "Названия и номера устаревают за месяцы; структура семейство/уровни/оси переживает любой релиз."
      - prompt: "Какие из перечисленных - семейства моделей 2026 года?"
        choices:
          - id: a
            text: "Claude, GPT, Gemini, Llama, Mistral."
          - id: b
            text: "Только Claude, остальные - это форматы файлов."
          - id: c
            text: "Python, Java, Rust, Go."
          - id: d
            text: "TCP, HTTP, gRPC, WebSocket."
        correct: [a]
        explanation: "Это основные семейства больших языковых моделей; внутри каждого свои уровни и профиль возможностей."

  - id: open-vs-proprietary-001
    concept: models-landscape
    type: theory-quiz
    difficulty: 2
    prompt: "Чем открытая модель (open-weights) отличается от проприетарной?"
    choices:
      - id: a
        text: "Веса открытой модели можно скачать, запустить локально, дообучить и работать офлайн; проприетарная живёт только за API провайдера."
      - id: b
        text: "Открытая модель всегда умнее проприетарной."
      - id: c
        text: "Проприетарная модель бесплатна, а открытая платная."
      - id: d
        text: "Разница только в языке, на котором они отвечают."
    correct: [a]
    explanation: "Проприетарная: запрос на чужой сервер, платите за токены, веса не Ваши. Открытая: контроль, приватность и независимость ценой собственного железа и поддержки."
    variants:
      - prompt: "Когда стоит выбрать открытые веса, а не проприетарную модель за API?"
        choices:
          - id: a
            text: "Когда критичны приватность, контроль и работа офлайн - и Вы готовы держать своё железо."
          - id: b
            text: "Всегда, потому что открытые модели мощнее на фронтире."
          - id: c
            text: "Никогда: открытые веса запрещены лицензией."
          - id: d
            text: "Только если нужен очень короткий контекст."
        correct: [a]
        explanation: "Открытые веса дают приватность и контроль; проприетарные за API - максимум возможностей без забот об инфраструктуре. Выбор по приоритетам, а не по «что лучше вообще»."
      - prompt: "Какую ответственность перекладывают открытые веса на того, кто их запускает?"
        choices:
          - id: a
            text: "Ответственность за безопасность: дообучение на узких данных может ослабить выравнивание."
          - id: b
            text: "Ответственность за токенизацию входа вручную."
          - id: c
            text: "Никакую - веса всегда полностью безопасны."
          - id: d
            text: "Ответственность за изобретение новой архитектуры."
        correct: [a]
        explanation: "Открытые веса дают свободу дообучения, но и перекладывают ответственность за безопасность на того, кто дообучает и разворачивает модель."

  - id: model-cost-001
    concept: models-landscape
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `request_cost(in_tokens, out_tokens, in_price, out_price)` - стоимость запроса в долларах, где тарифы заданы за миллион токенов отдельно для входа и выхода. Верните число."
    starter: |
      def request_cost(in_tokens, out_tokens, in_price, out_price):
          ...
    cases:
      - call: "request_cost(2000, 500, 1.0, 5.0)"
        expect_approx: 0.0045
      - call: "request_cost(2000, 500, 5.0, 25.0)"
        expect_approx: 0.0225
      - call: "request_cost(1_000_000, 1_000_000, 3.0, 15.0)"
        expect_approx: 18.0
      - call: "request_cost(0, 0, 5.0, 25.0)"
        expect_approx: 0.0
    solution: |
      def request_cost(in_tokens, out_tokens, in_price, out_price):
          return in_tokens / 1_000_000 * in_price + out_tokens / 1_000_000 * out_price
    hints:
      - "Тариф задан за миллион токенов, а у Вас токенов меньше - переведите число токенов в доли миллиона."
      - "Посчитайте вход и выход отдельно по своим тарифам и сложите: (in/1e6)*in_price + (out/1e6)*out_price."

  - id: choosing-model-001
    concept: models-landscape
    type: theory-quiz
    difficulty: 3
    prompt: "Какой подход к выбору модели под задачу разумнее?"
    choices:
      - id: a
        text: "Начать с самого дешёвого уровня, который справляется, и подниматься выше только при необходимости."
      - id: b
        text: "Всегда брать самый мощный флагман - пусть будет с запасом."
      - id: c
        text: "Всегда брать самый дешёвый уровень независимо от задачи."
      - id: d
        text: "Выбирать модель случайно: разницы всё равно нет."
    correct: [a]
    explanation: "Флагман на простой задаче не делает ответ заметно лучше, зато стабильно дороже и медленнее. На объёме это реальные деньги и задержки без выигрыша в качестве."
    variants:
      - prompt: "Когда оси «длина контекста» и «мультимодальность» становятся решающими при выборе?"
        choices:
          - id: a
            text: "Когда нужно подать целую кодовую базу или длинный документ - большое окно; когда на входе картинки, аудио или видео - мультимодальная модель."
          - id: b
            text: "Только когда задача - классификация одного слова."
          - id: c
            text: "Эти оси не влияют на выбор, важна только цена."
          - id: d
            text: "Они важны лишь для открытых моделей, для проприетарных нет."
        correct: [a]
        explanation: "Большое окно нужно под большой вход; мультимодальность - под нетекстовые входы. Это часть чек-листа выбора наряду со сложностью, ценой и приватностью."
      - prompt: "Почему «лучшая по бенчмаркам» модель не обязательно лучшая для Вашей задачи?"
        choices:
          - id: a
            text: "Бенчмарки усредняют по широкому набору задач; на конкретной задаче более дешёвая модель может работать не хуже флагмана."
          - id: b
            text: "Бенчмарки всегда подделаны и им нельзя верить вообще."
          - id: c
            text: "Бенчмарки измеряют только скорость, но не качество."
          - id: d
            text: "Лучшая по бенчмаркам модель всегда лучшая и для Вас, без исключений."
        correct: [a]
        explanation: "Проверять стоит на своих примерах, а не на чужих таблицах лидеров: усреднённое первенство не гарантирует первенства на Вашей конкретной задаче."

  - id: pricing-axes-001
    concept: models-landscape
    type: theory-quiz
    difficulty: 3
    prompt: "Как обычно устроено ценообразование больших языковых моделей за API?"
    choices:
      - id: a
        text: "Платят за токены - отдельно за вход (промпт) и за выход (ответ), обычно за миллион токенов; выход дороже входа."
      - id: b
        text: "Платят фиксированную сумму за запрос независимо от длины."
      - id: c
        text: "Платят только за вход, выход всегда бесплатен."
      - id: d
        text: "Платят за число параметров модели при каждом вызове."
    correct: [a]
    explanation: "Вход обычно дешевле выхода, поэтому длинные промпты бьют по кошельку меньше, чем длинные ответы. Разница в цене между лёгким и топовым уровнем - порядок величины."
    variants:
      - prompt: "Почему всегда брать самую мощную модель «с запасом» - плохая стратегия по цене?"
        choices:
          - id: a
            text: "Флагман на простой задаче не улучшает ответ заметно, но стабильно дороже и медленнее; на объёме вызовов это реальные деньги без выигрыша."
          - id: b
            text: "Мощные модели физически не способны решать простые задачи."
          - id: c
            text: "У мощных моделей всегда меньше контекстное окно."
          - id: d
            text: "Цена всех моделей одинаковая, так что разницы нет."
        correct: [a]
        explanation: "Разница уровней в цене - порядок величины; на миллионах вызовов выбор уровня превращается в выбор бюджета."
