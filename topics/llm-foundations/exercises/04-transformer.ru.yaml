exercises:
  - id: block-parts-001
    concept: transformer
    type: theory-quiz
    difficulty: 1
    prompt: "Какие две главные операции идут друг за другом внутри одного блока трансформера?"
    choices:
      - id: a
        text: "Self-attention и MLP (feed-forward)."
      - id: b
        text: "Токенизация и эмбеддинг."
      - id: c
        text: "Свёртка и пулинг."
      - id: d
        text: "Сэмплинг и нормировка вероятностей."
    correct: [a]
    explanation: "Блок = self-attention (токены обмениваются информацией) + MLP (обработка каждой позиции независимо), обёрнутые остаточной связью и нормализацией."
    variants:
      - prompt: "Где внутри блока трансформера токены обмениваются информацией друг с другом?"
        choices:
          - id: a
            text: "Только в self-attention."
          - id: b
            text: "Только в MLP."
          - id: c
            text: "В нормализации слоёв."
          - id: d
            text: "Нигде - токены обрабатываются полностью изолированно."
        correct: [a]
        explanation: "MLP работает с каждой позицией независимо; всё «общение» между токенами происходит во внимании."
      - prompt: "Почему блоки складывают в высокую стопку, а не делают один мощный блок?"
        choices:
          - id: a
            text: "Нижние слои улавливают локальные закономерности, верхние - абстрактные."
          - id: b
            text: "Чтобы запрос обрабатывался строго по одному токену за раз сразу, без промежуточного состояния."
          - id: c
            text: "Чтобы уменьшить число параметров сразу, без промежуточного состояния."
          - id: d
            text: "Один большой блок физически невозможно обучить сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Устройство блоков одинаковое, но веса разные, поэтому разные слои учатся разному; сила трансформера - в повторении."

  - id: residual-purpose-001
    concept: transformer
    type: theory-quiz
    difficulty: 2
    prompt: "Зачем нужна остаточная связь (residual connection) вида y = x + f(x)?"
    choices:
      - id: a
        text: "Она даёт градиенту прямой путь сквозь слои, без неё глубокая стопка блоков почти не обучается."
      - id: b
        text: "Она удаляет вход x, оставляя только результат f(x) сразу, без промежуточного состояния."
      - id: c
        text: "Она нужна, чтобы случайно перемешать токены сразу, без промежуточного состояния."
      - id: d
        text: "Она заменяет нормализацию слоёв не входит в сравнение и не влияет на результат."
    correct: [a]
    explanation: "Без residual градиент затухает, проходя десятки слоёв. Прямой путь x + f(x) позволяет складывать блоки в очень глубокую стопку."
    variants:
      - prompt: "Что описывает метафора «остаточного потока» (residual stream)?"
        choices:
          - id: a
            text: "Широкую шину данных сквозь все блоки: каждый блок не заменяет её, а дописывает свою поправку."
          - id: b
            text: "Поток токенов на входе токенизатора сразу, без промежуточного состояния."
          - id: c
            text: "Очередь запросов к модели на сервере сразу, без промежуточного состояния."
          - id: d
            text: "Поток градиентов, который надо обнулять между блоками сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Внимание и MLP читают из потока и дописывают поправку, а не переписывают его содержимое целиком."
      - prompt: "Зачем в блоке нужна нормализация слоёв (layer normalization)?"
        choices:
          - id: a
            text: "Чтобы удерживать масштаб активаций стабильным при проходе через много слоёв."
          - id: b
            text: "Чтобы перевести логиты в вероятности сразу, без промежуточного состояния."
          - id: c
            text: "Чтобы увеличить размер словаря токенов сразу, без промежуточного состояния."
          - id: d
            text: "Чтобы выбрать следующий токен сразу, без промежуточного состояния."
        correct: [a]
        explanation: "При проходе через слои активации склонны разъезжаться; нормализация приводит их к стабильному масштабу. Часто её ставят перед операцией (pre-norm)."

  - id: residual-output-001
    concept: transformer
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Один блок прибавляет к потоку свою поправку (остаточная связь)."
    snippet: |
      def block(x):
          return [v * 0.5 for v in x]

      x = [4.0, -2.0]
      x = [a + b for a, b in zip(x, block(x))]
      print([round(v, 2) for v in x])
    expected:
      kind: stdout
      value: "[6.0, -3.0]"
    hints:
      - "Остаточная связь - это x + f(x): к каждому элементу прибавляется поправка от блока."
      - "Посчитайте поправку block(x) поэлементно, затем сложите её с исходным x."

  - id: residual-fn-001
    concept: transformer
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `residual(x, update)` - остаточную связь: верните поэлементную сумму вектора `x` и поправки `update` (списки одинаковой длины)."
    starter: |
      def residual(x, update):
          ...
    cases:
      - call: "residual([1.0, 2.0, 3.0], [0.5, 0.5, 0.5])"
        expect: [1.5, 2.5, 3.5]
      - call: "residual([0.0, 0.0], [1.0, -1.0])"
        expect: [1.0, -1.0]
      - call: "residual([2.0], [0.0])"
        expect: [2.0]
      - call: "residual([-1.0, 4.0, 0.0], [1.0, 1.0, 1.0])"
        expect: [0.0, 5.0, 1.0]
    solution: |
      def residual(x, update):
          return [a + b for a, b in zip(x, update)]
    hints:
      - "Остаточная связь не заменяет поток, а добавляет к нему: результат - это вход плюс поправка блока."
      - "Сложите соответствующие элементы двух списков и верните новый список."

  - id: causal-attention-001
    concept: transformer
    type: theory-quiz
    difficulty: 3
    prompt: "Почему генеративные LLM используют decoder-only архитектуру с причинно-следственным (causal) вниманием?"
    choices:
      - id: a
        text: "Чтобы при предсказании следующего токена модель не подсматривала будущие токены"
      - id: b
        text: "Чтобы обрабатывать токены строго по одному, как в рекуррентной сети."
      - id: c
        text: "Потому что decoder работает быстрее за счёт отказа от внимания."
      - id: d
        text: "Чтобы модель могла читать текст справа налево."
    correct: [a]
    explanation: "Causal-внимание запрещает токену смотреть вправо, на ещё не сгенерированное. Это ровно то, что нужно для честного предсказания следующего токена."
