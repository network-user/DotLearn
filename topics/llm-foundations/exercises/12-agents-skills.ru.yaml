exercises:
  - id: what-is-agent-001
    concept: agents-skills
    type: theory-quiz
    difficulty: 1
    prompt: "Что превращает языковую модель в агента?"
    choices:
      - id: a
        text: "Цикл вокруг модели: она получает цель, планирует шаги, вызывает инструменты, наблюдает результат и повторяет, удерживая цель много шагов."
      - id: b
        text: "Особая архитектура нейросети, отличная от трансформера сразу, без промежуточного состояния и без дополнительных проверок."
      - id: c
        text: "Увеличение числа параметров в десять раз сразу, без промежуточного состояния и без дополнительных проверок."
      - id: d
        text: "Отключение токенизации входа сразу, без промежуточного состояния и без дополнительных проверок."
    correct: [a]
    explanation: "Агент - это не новая модель, а та же языковая модель в цикле с целью, инструментами и памятью. Магии в самой модели не прибавляется."
    variants:
      - prompt: "Чем работа агента отличается от простого ответа на один запрос?"
        choices:
          - id: a
            text: "Цель задаётся один раз и держится много шагов, модель сама планирует последовательность действий и использует инструменты, чтобы менять мир и собирать сведения."
          - id: b
            text: "Агент отвечает быстрее, потому что пропускает softmax сразу, без промежуточного состояния и без дополнительных проверок ещё до любых других проверок на этом пути."
          - id: c
            text: "Агент работает без контекстного окна вообще сразу, без промежуточного состояния и без дополнительных проверок."
          - id: d
            text: "Никак не отличается - это синонимы сразу, без промежуточного состояния и без дополнительных проверок."
        correct: [a]
        explanation: "Отличие в трёх вещах: удержание цели через шаги, самостоятельное планирование и использование инструментов для действий и сбора сведений."
      - prompt: "«Агент - это особая модель». Верно ли это?"
        choices:
          - id: a
            text: "Нет: это обычная языковая модель, помещённая в цикл с целью, инструментами и памятью."
          - id: b
            text: "Да: агента обучают по совершенно другому алгоритму сразу, без промежуточного состояния."
          - id: c
            text: "Да: агент - это модель без весов ещё до любых других проверок на этом пути."
          - id: d
            text: "Нет: агент - это просто длинный системный промпт без цикла сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Агентность даёт обвязка вокруг модели - цикл, инструменты, память, цель, - а не сама нейросеть."

  - id: skills-vs-tools-001
    concept: agents-skills
    type: theory-quiz
    difficulty: 2
    prompt: "Что такое навык (skill) и чем он отличается от инструмента?"
    choices:
      - id: a
        text: "Навык - переиспользуемая инструкция/процедура («как делать»), подгружаемая по необходимости."
      - id: b
        text: "Навык и инструмент - это одно и то же под разными именами сразу, без промежуточного состояния."
      - id: c
        text: "Навык - это вес модели, а инструмент - её слой сразу, без промежуточного состояния."
      - id: d
        text: "Навык отключает инструменты, чтобы модель отвечала только текстом сразу, без промежуточного состояния."
    correct: [a]
    explanation: "Инструмент даёт новое действие; навык даёт переиспользуемую процедуру. Часто навык как раз описывает, как грамотно пользоваться набором инструментов под конкретную задачу."
    variants:
      - prompt: "В чём идея прогрессивного раскрытия навыков?"
        choices:
          - id: a
            text: "В контексте всегда висит лишь короткое описание навыка, а полную инструкцию модель читает только когда задача этого требует."
          - id: b
            text: "Все навыки целиком загружаются в системный промпт сразу при старте сразу, без промежуточного состояния."
          - id: c
            text: "Навыки раскрываются по таймеру раз в минуту сразу, без промежуточного состояния и без дополнительных проверок."
          - id: d
            text: "Навыки нельзя переиспользовать между задачами сразу, без промежуточного состояния и без дополнительных проверок."
        correct: [a]
        explanation: "Так специализированные знания не засоряют базовый контекст, но остаются под рукой - короткое описание в контексте, полная инструкция по требованию."
      - prompt: "Почему не стоит запихивать все специфические инструкции в системный промпт?"
        choices:
          - id: a
            text: "Он раздувается, и большая часть инструкций к текущей задаче не относится; навыки подгружают нужное по делу."
          - id: b
            text: "Системный промпт вообще не влияет на поведение модели сразу, без промежуточного состояния."
          - id: c
            text: "Длинный промпт ускоряет ответ, но это вредно сразу, без промежуточного состояния и без дополнительных проверок."
          - id: d
            text: "Инструкции в промпте модель игнорирует всегда ещё до любых других проверок на этом пути."
        correct: [a]
        explanation: "Раздутый промпт расточителен: большая часть инструкций нерелевантна. Навыки с прогрессивным раскрытием держат базовый контекст компактным."

  - id: agent-memory-001
    concept: agents-skills
    type: python-function
    difficulty: 2
    prompt: "Реализуйте класс `Memory` - упрощённую долговременную память агента. Метод `save(key, value)` сохраняет факт по ключу; метод `recall(key)` возвращает сохранённое значение или строку `\"не помню\"`, если ключа нет."
    starter: |
      class Memory:
          def __init__(self):
              ...

          def save(self, key, value):
              ...

          def recall(self, key):
              ...
    cases:
      - call: "(lambda m: (m.save('город', 'Париж'), m.recall('город'))[1])(Memory())"
        expect: "Париж"
      - call: "Memory().recall('погода')"
        expect: "не помню"
      - call: "(lambda m: (m.save('x', 1), m.save('x', 2), m.recall('x'))[2])(Memory())"
        expect: 2
      - call: "(lambda m: (m.save('a', 'один'), m.recall('b'))[1])(Memory())"
        expect: "не помню"
    solution: |
      class Memory:
          def __init__(self):
              self.store = {}

          def save(self, key, value):
              self.store[key] = value

          def recall(self, key):
              return self.store.get(key, "не помню")
    hints:
      - "Долговременная память - это хранилище «ключ → значение», переживающее шаги; начните с пустого словаря в конструкторе."
      - "save кладёт значение по ключу; recall достаёт по ключу со значением по умолчанию «не помню», если ключа нет (метод get словаря)."

  - id: memory-types-001
    concept: agents-skills
    type: theory-quiz
    difficulty: 3
    prompt: "Чем краткосрочная память агента отличается от долговременной?"
    choices:
      - id: a
        text: "Краткосрочная - это контекстное окно (быстрая, конечная, эфемерная)"
      - id: b
        text: "Это два названия одного и того же контекстного окна."
      - id: c
        text: "Краткосрочная хранится на диске, долговременная - в весах модели."
      - id: d
        text: "Разница только в скорости, объём у них одинаковый и бесконечный."
    correct: [a]
    explanation: "Контекст быстрый, но конечный и исчезает с сессией; внешняя память не ограничена окном и переживает сессии, но агент сам решает, что сохранить и что достать - часто через поиск по эмбеддингам."
    variants:
      - prompt: "Что значит, что хорошая память агента - это не «помнить всё»?"
        choices:
          - id: a
            text: "Это умение решать, что сохранить во внешнюю память и что достать обратно в контекст в нужный момент."
          - id: b
            text: "Это требование держать всю историю в контекстном окне любой ценой сразу, без промежуточного состояния."
          - id: c
            text: "Это запрет на использование внешнего хранилища сразу, без промежуточного состояния."
          - id: d
            text: "Это значит никогда ничего не сохранять сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Контекст дефицитен; мастерство - подтянуть нужный кусок из внешней памяти, когда он понадобится, а не хранить всё подряд в окне."
      - prompt: "Почему долговременную память часто строят на поиске по эмбеддингам?"
        choices:
          - id: a
            text: "Чтобы доставать сохранённое по смысловой близости запроса, а не по точному совпадению ключа"
          - id: b
            text: "Потому что эмбеддинги ускоряют запись на диск сразу, без промежуточного состояния."
          - id: c
            text: "Потому что без эмбеддингов словарь не работает сразу, без промежуточного состояния."
          - id: d
            text: "Чтобы зашифровать память от самой модели сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Ключом служит смысловая близость, а не строка; это тот же механизм извлечения по эмбеддингам, что и в RAG из раздела про дообучение."

  - id: multiagent-risks-001
    concept: agents-skills
    type: theory-quiz
    difficulty: 3
    prompt: "В чём выигрыш и плата мультиагентных систем?"
    choices:
      - id: a
        text: "Выигрыш - специализация и параллелизм узких агентов; плата - сложность, стоимость (каждый агент тратит токены) и риск накопления ошибок по цепочке."
      - id: b
        text: "Выигрыш есть всегда и бесплатно; недостатков у мультиагентности нет сразу, без промежуточного состояния и без дополнительных проверок."
      - id: c
        text: "Мультиагентность только замедляет и ничего не даёт сразу, без промежуточного состояния и без дополнительных проверок."
      - id: d
        text: "Несколько агентов всегда дешевле одного сразу, без промежуточного состояния и без дополнительных проверок."
    correct: [a]
    explanation: "Узкие агенты с фокусной инструкцией часто справляются лучше «универсала», а независимые подзадачи идут параллельно. Но больше частей - выше стоимость, труднее отладка, легче накопить ошибку. Оправдано, когда задача реально дробится."
    variants:
      - prompt: "Почему риски модели усиливаются, когда она работает в агентном цикле?"
        choices:
          - id: a
            text: "Ошибка на раннем шаге попадает в наблюдения, влияет на следующее решение и может увести весь ход в сторону; чем длиннее цикл, тем выше риск."
          - id: b
            text: "В цикле модель теряет все веса сразу, без промежуточного состояния и без дополнительных проверок."
          - id: c
            text: "Цикл отключает контекстное окно, и модель забывает цель сразу, без промежуточного состояния и без дополнительных проверок."
          - id: d
            text: "Никаких дополнительных рисков цикл не создаёт сразу, без промежуточного состояния и без дополнительных проверок."
        correct: [a]
        explanation: "Ошибка не остаётся локальной - она распространяется по цепочке решений. Поэтому нужны лимиты шагов, подтверждение опасных действий и проверки результата."
      - prompt: "Почему автономность агента нужно закладывать в бюджет?"
        choices:
          - id: a
            text: "Каждый виток цикла, под-агент и обращение к памяти"
          - id: b
            text: "Автономность всегда бесплатна, бюджет ни при чём."
          - id: c
            text: "Агент тратит токены только на первый шаг."
          - id: d
            text: "Стоимость зависит лишь от длины первого промпта."
        correct: [a]
        explanation: "Автономность стоит дороже одного ответа: бодро крутящийся цикл накапливает токены на каждом витке - это нужно закладывать заранее."
