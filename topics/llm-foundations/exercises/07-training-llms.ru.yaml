exercises:
  - id: pretraining-task-001
    concept: training-llms
    type: theory-quiz
    difficulty: 1
    prompt: "Какую задачу решает предобучение (pretraining) LLM?"
    choices:
      - id: a
        text: "По началу текста предсказать следующий токен на огромном корпусе."
      - id: b
        text: "Запомнить пары «вопрос - ответ», размеченные людьми сразу, без промежуточного состояния."
      - id: c
        text: "Сжать корпус текста в архив сразу, без промежуточного состояния."
      - id: d
        text: "Перевести весь интернет на английский сразу, без промежуточного состояния."
    correct: [a]
    explanation: "Предобучение - это self-supervised предсказание следующего токена; правильный ответ - сам следующий токен в тексте, ручная разметка не нужна."
    variants:
      - prompt: "Почему предобучение называют self-supervised (без ручной разметки)?"
        choices:
          - id: a
            text: "Правильный ответ - просто следующий токен, который уже есть в тексте; размечать ничего не надо."
          - id: b
            text: "Модель сама придумывает себе вопросы и ответы из воздуха сразу, без промежуточного состояния."
          - id: c
            text: "Люди размечают каждый токен вручную сразу, без промежуточного состояния."
          - id: d
            text: "Обучение идёт без функции потерь сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Цель уже содержится в данных - это следующий токен, поэтому корпус не требует разметки и масштабируется до размеров всего текста."
      - prompt: "Что умеет предобученная модель сразу после предобучения, до дообучения?"
        choices:
          - id: a
            text: "Лишь продолжать текст; послушным ассистентом она ещё не является."
          - id: b
            text: "Идеально следовать инструкциям и отказываться от вредных запросов."
          - id: c
            text: "Вызывать инструменты и ходить в интернет."
          - id: d
            text: "Ничего - её веса ещё случайны."
        correct: [a]
        explanation: "После предобучения модель умеет продолжать текст; чтобы стать ассистентом, нужен этап дообучения и выравнивания."

  - id: data-quality-001
    concept: training-llms
    type: theory-quiz
    difficulty: 2
    prompt: "Почему качество и состав обучающих данных так важны?"
    choices:
      - id: a
        text: "Модель не может знать того, чего не было в данных, и наследует их перекосы; знания"
      - id: b
        text: "От данных зависит только скорость обучения, но не качество ответов."
      - id: c
        text: "Качество данных влияет лишь на размер словаря токенов."
      - id: d
        text: "Данные нужны только для проверки, а не для обучения."
    correct: [a]
    explanation: "Мусорные и однобокие данные ухудшают модель; чистые и разнообразные - улучшают. Большие усилия идут на дедупликацию, фильтрацию и балансировку доменов."
    variants:
      - prompt: "Что такое дата отсечки данных (knowledge cutoff)?"
        choices:
          - id: a
            text: "Момент, после которого новых текстов в обучающем корпусе нет, поэтому о более поздних событиях модель не знает."
          - id: b
            text: "Максимальная длина контекстного окна сразу, без промежуточного состояния и без дополнительных проверок."
          - id: c
            text: "Дата, после которой модель перестаёт работать сразу, без промежуточного состояния и без дополнительных проверок."
          - id: d
            text: "Предел числа параметров модели сразу, без промежуточного состояния и без дополнительных проверок."
        correct: [a]
        explanation: "Без доступа к внешним источникам модель не знает событий после cutoff и может уверенно ошибаться о «недавнем»."
      - prompt: "Какую новую проблему 2026 года создаёт обилие текста, сгенерированного моделями?"
        choices:
          - id: a
            text: "Загрязнение корпусов и риск «обучения на собственном эхе» вместо живых человеческих данных."
          - id: b
            text: "Полное исчезновение текста в интернете сразу, без промежуточного состояния."
          - id: c
            text: "Невозможность токенизировать сгенерированный текст сразу, без промежуточного состояния."
          - id: d
            text: "Сгенерированный текст всегда улучшает модель сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Когда корпус всё больше состоит из машинного текста, модель рискует усиливать собственные артефакты, а не учиться у людей."

  - id: training-flops-001
    concept: training-llms
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `training_flops(params, tokens)` - грубую оценку числа операций на предобучение по правилу 6 * параметры * токены. Верните целое число."
    starter: |
      def training_flops(params, tokens):
          ...
    cases:
      - call: "training_flops(1000, 2000)"
        expect: 12000000
      - call: "training_flops(10, 10)"
        expect: 600
      - call: "training_flops(0, 500)"
        expect: 0
      - call: "training_flops(1000000, 1000000)"
        expect: 6000000000000
    solution: |
      def training_flops(params, tokens):
          return 6 * params * tokens
    hints:
      - "Стоимость растёт с обоими множителями: и с числом параметров, и с числом обучающих токенов."
      - "Константа в правиле - 6 (forward плюс backward проход); умножьте её на оба значения."

  - id: chinchilla-tokens-001
    concept: training-llms
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `recommended_tokens(params)` - рекомендованное число обучающих токенов по грубому правилу Chinchilla (примерно 20 токенов на параметр). Верните целое число."
    starter: |
      def recommended_tokens(params):
          ...
    cases:
      - call: "recommended_tokens(1000)"
        expect: 20000
      - call: "recommended_tokens(7_000_000_000)"
        expect: 140000000000
      - call: "recommended_tokens(0)"
        expect: 0
      - call: "recommended_tokens(50)"
        expect: 1000
    solution: |
      def recommended_tokens(params):
          return 20 * params
    hints:
      - "Chinchilla показала, что многие модели были «недокормлены» данными при своём размере."
      - "Грубое правило - около 20 токенов обучающих данных на каждый параметр модели."

  - id: scaling-laws-001
    concept: training-llms
    type: theory-quiz
    difficulty: 3
    prompt: "Что утверждают законы масштабирования (scaling laws)?"
    choices:
      - id: a
        text: "Качество улучшается предсказуемо и плавно с ростом параметров, данных и вычислений, но с замедляющейся отдачей."
      - id: b
        text: "Качество растёт скачками только при удвоении числа параметров сразу, без промежуточного состояния."
      - id: c
        text: "Достаточно увеличивать одно лишь число параметров, остальное не важно сразу, без промежуточного состояния."
      - id: d
        text: "Качество не зависит от объёма данных сразу, без промежуточного состояния и без дополнительных проверок."
    correct: [a]
    explanation: "Зависимость близка к степенной: чтобы заметно снизить потери, каждую из трёх величин надо увеличивать кратно. Chinchilla подчеркнула важность баланса параметров и данных."
