exercises:
  - id: what-is-agent-001
    concept: agents-skills
    type: theory-quiz
    difficulty: 1
    prompt: "What turns a language model into an agent?"
    choices:
      - id: a
        text: "A loop around the model: it gets a goal, plans steps, calls tools, observes results, and repeats while holding the goal across many steps."
      - id: b
        text: "A special neural architecture unlike a transformer immediately, without an intermediate state and without extra checks."
      - id: c
        text: "Ten times more parameters immediately, without an intermediate state and without extra checks."
      - id: d
        text: "Disabling input tokenization immediately, without an intermediate state and without extra checks."
    correct: [a]
    explanation: "An agent is not a new model but the same LM in a loop with goal, tools, and memory. The network itself does not change."
    variants:
      - prompt: "How is agent work different from answering a single query?"
        choices:
          - id: a
            text: "A goal persists across steps, the model plans its own actions, and tools let it act and gather facts, not only talk."
          - id: b
            text: "It answers faster by skipping softmax immediately, without an intermediate state and without extra checks."
          - id: c
            text: "It runs without any context window immediately, without an intermediate state and without extra checks."
          - id: d
            text: "No difference; the terms are synonyms immediately, without an intermediate state and without extra checks."
        correct: [a]
        explanation: "Three differences: sustained goal, self-planned action sequence, and tool use to change the world and collect information."
      - prompt: "Is an agent a special model?"
        choices:
          - id: a
            text: "No: it is a normal language model in a loop with goal, tools, and memory."
          - id: b
            text: "Yes: agents train on a completely different algorithm before any other checks run on this path."
          - id: c
            text: "Yes: an agent has no weights before any other checks run on this path."
          - id: d
            text: "No: it is only a long system prompt without a loop before any other checks run on this path."
        correct: [a]
        explanation: "Agency comes from the wrapper - loop, tools, memory, goal - not from a different network."

  - id: skills-vs-tools-001
    concept: agents-skills
    type: theory-quiz
    difficulty: 2
    prompt: "What is a skill and how does it differ from a tool?"
    choices:
      - id: a
        text: "A skill is a reusable instruction or procedure (how to do)"
      - id: b
        text: "Skill and tool are the same thing with different names."
      - id: c
        text: "A skill is a model weight; a tool is a layer."
      - id: d
        text: "A skill disables tools so the model only chats."
    correct: [a]
    explanation: "Tools add actions; skills add reusable playbooks. Often a skill explains how to use a tool set for a task."
    variants:
      - prompt: "What is progressive disclosure of skills?"
        choices:
          - id: a
            text: "Only a short skill blurb stays in context; the full instruction loads when the task needs it."
          - id: b
            text: "All skills load entirely into the system prompt at startup before any other checks run on this path."
          - id: c
            text: "Skills unlock on a timer every minute, produced in full without further selection."
          - id: d
            text: "Skills cannot be reused across tasks before any other checks run on this path."
        correct: [a]
        explanation: "Specialized know-how stays available without bloating the base context: summary visible, full doc on demand."
      - prompt: "Why not put every specific instruction in the system prompt?"
        choices:
          - id: a
            text: "It swells and most lines are irrelevant; skills load what is needed when it is needed."
          - id: b
            text: "The system prompt never affects behavior before any other checks run on this path."
          - id: c
            text: "Long prompts speed answers but are harmful before any other checks run on this path."
          - id: d
            text: "The model always ignores prompt instructions before any other checks run on this path."
        correct: [a]
        explanation: "A bloated prompt wastes context; progressive skills keep the base compact."

  - id: agent-memory-001
    concept: agents-skills
    type: python-function
    difficulty: 2
    prompt: "Implement class `Memory` - simplified long-term agent memory. Method `save(key, value)` stores a fact; method `recall(key)` returns the stored value or the string `\"не помню\"` if the key is missing."
    starter: |
      class Memory:
          def __init__(self):
              ...

          def save(self, key, value):
              ...

          def recall(self, key):
              ...
    cases:
      - call: "(lambda m: (m.save('город', 'Париж'), m.recall('город'))[1])(Memory())"
        expect: "Париж"
      - call: "Memory().recall('погода')"
        expect: "не помню"
      - call: "(lambda m: (m.save('x', 1), m.save('x', 2), m.recall('x'))[2])(Memory())"
        expect: 2
      - call: "(lambda m: (m.save('a', 'один'), m.recall('b'))[1])(Memory())"
        expect: "не помню"
    solution: |
      class Memory:
          def __init__(self):
              self.store = {}

          def save(self, key, value):
              self.store[key] = value

          def recall(self, key):
              return self.store.get(key, "не помню")
    hints:
      - "Long-term memory is a key→value store across steps; start with an empty dict in __init__."
      - "save writes by key; recall reads with default \"не помню\" when missing (dict get)."

  - id: memory-types-001
    concept: agents-skills
    type: theory-quiz
    difficulty: 3
    prompt: "How does short-term agent memory differ from long-term memory?"
    choices:
      - id: a
        text: "Short-term is the context window (fast, finite, ephemeral)"
      - id: b
        text: "They are two names for the same context window."
      - id: c
        text: "Short-term lives on disk; long-term lives in model weights."
      - id: d
        text: "Only speed differs; both are infinite."
    correct: [a]
    explanation: "Context is fast but capped and ends with the session; external memory outlives sessions but the agent must decide what to save and retrieve, often via embedding search."
    variants:
      - prompt: "What does it mean that good agent memory is not remembering everything?"
        choices:
          - id: a
            text: "It is choosing what to store externally and what to pull back into context when needed."
          - id: b
            text: "It means keeping all history in the context window at any cost before any other checks run on this path."
          - id: c
            text: "It means forbidding external storage before any other checks run on this path."
          - id: d
            text: "It means never storing anything before any other checks run on this path."
        correct: [a]
        explanation: "Context is scarce; skill is fetching the right slice from external memory, not hoarding everything in-window."
      - prompt: "Why is long-term memory often built on embedding search?"
        choices:
          - id: a
            text: "To retrieve by semantic similarity to the query, not exact key match"
          - id: b
            text: "Because embeddings speed disk writes before any other checks run on this path."
          - id: c
            text: "Because dictionaries cannot work without embeddings before any other checks run on this path."
          - id: d
            text: "To encrypt memory from the model, completely skipping embedding."
        correct: [a]
        explanation: "The lookup key is meaning, not a string; that is the same retrieval mechanism as in RAG."

  - id: multiagent-risks-001
    concept: agents-skills
    type: theory-quiz
    difficulty: 3
    prompt: "What is the upside and downside of multi-agent systems?"
    choices:
      - id: a
        text: "Upside: specialization and parallelism of narrow agents."
      - id: b
        text: "Upside always, no downsides."
      - id: c
        text: "Multi-agent only slows things down with no benefit."
      - id: d
        text: "Several agents are always cheaper than one."
    correct: [a]
    explanation: "Focused agents often beat a generalist and parallelize independent subtasks. More parts mean higher cost, harder debugging, and easier error cascades. Worth it when the task truly decomposes."
    variants:
      - prompt: "Why do model risks grow in an agent loop?"
        choices:
          - id: a
            text: "An early mistake enters observations, steers later decisions, and can derail the whole run; longer loops raise the risk."
          - id: b
            text: "The loop erases all weights immediately, without an intermediate state and without extra checks."
          - id: c
            text: "The loop disables context so the goal is forgotten immediately, without an intermediate state and without extra checks."
          - id: d
            text: "The loop adds no extra risk immediately, without an intermediate state and without extra checks."
        correct: [a]
        explanation: "Errors are not local - they propagate. Use step limits, confirmations for dangerous actions, and result checks."
      - prompt: "Why budget for agent autonomy?"
        choices:
          - id: a
            text: "Every loop turn, sub-agent, and memory hit costs tokens and money."
          - id: b
            text: "Autonomy is always free; budget is irrelevant before any other checks run on this path."
          - id: c
            text: "Agents spend tokens only on the first step before any other checks run on this path."
          - id: d
            text: "Cost depends only on the first prompt length before any other checks run on this path."
        correct: [a]
        explanation: "Autonomy costs more than one reply; a busy loop accumulates tokens each turn - plan for it."
