exercises:
  - id: mcp-purpose-001
    concept: mcp
    type: theory-quiz
    difficulty: 1
    prompt: "What is Model Context Protocol (MCP) and why does it exist?"
    choices:
      - id: a
        text: "A standard so any client talks to any server, turning N×M bespoke integrations into N+M."
      - id: b
        text: "A new neural architecture replacing the transformer, completely skipping client."
      - id: c
        text: "A way to train models on less data without any step that involves client."
      - id: d
        text: "An on-disk weight storage format, produced in full without further selection."
    correct: [a]
    explanation: "Before the standard every app-service pair was custom. MCP is one plug: write a server once and any compatible client can attach. Like USB or HTTP."
    variants:
      - prompt: "What combinatorics problem does MCP standardization solve?"
        choices:
          - id: a
            text: "Integration explosion: without a standard N apps times M services is N×M links; with MCP it is N+M."
          - id: b
            text: "Slow input tokenization immediately, without an intermediate state and without extra checks."
          - id: c
            text: "Too few model parameters immediately, without an intermediate state and without extra checks."
          - id: d
            text: "High sampling temperature immediately, without an intermediate state and without extra checks."
        correct: [a]
        explanation: "Build an MCP server once and every compatible client can use it without redoing the integration per app."
      - prompt: "What familiar technology is MCP analogous to?"
        choices:
          - id: a
            text: "USB or HTTP: agree on a plug and everything supporting it interoperates."
          - id: b
            text: "A sorting algorithm for arrays, produced in full without further selection."
          - id: c
            text: "An image compression format, produced in full without further selection."
          - id: d
            text: "The Python language, produced in full without further selection."
        correct: [a]
        explanation: "The value is compatibility: one protocol instead of hundreds of adapters."

  - id: mcp-roles-001
    concept: mcp
    type: theory-quiz
    difficulty: 2
    prompt: "How are host, client, and server roles split in MCP?"
    choices:
      - id: a
        text: "Host is the app with the model; its MCP client speaks the protocol; MCP servers on the other end expose concrete capabilities."
      - id: b
        text: "The server hosts the model; the host is just a cable between them without any step that involves client."
      - id: c
        text: "Client and server are two names for the same program immediately, without an intermediate state and without extra checks."
      - id: d
        text: "The host trains the model; the server samples it immediately, without an intermediate state and without extra checks."
    correct: [a]
    explanation: "The host (chat client, IDE, agent) links model and user; the MCP client inside talks to MCP servers that front each service."
    variants:
      - prompt: "Can one host connect to multiple MCP servers?"
        choices:
          - id: a
            text: "Yes: a host can link several servers and merge their capabilities for the model."
          - id: b
            text: "No: strictly one server per host before any other checks run on this path."
          - id: c
            text: "Yes, but only if all servers share one language before any other checks run on this path."
          - id: d
            text: "No: servers never connect to hosts before any other checks run on this path."
        correct: [a]
        explanation: "Each server announces capabilities on connect; the client discovers them instead of hardcoding a list."
      - prompt: "Does an MCP server contain the model?"
        choices:
          - id: a
            text: "No: the server exposes capabilities; the model lives in the host on the other side of the protocol."
          - id: b
            text: "Yes, each server is its own model copy immediately, without an intermediate state."
          - id: c
            text: "Yes, the server fine-tunes the model every request before any other checks run on this path."
          - id: d
            text: "No, the server is the end user immediately, without an intermediate state and without extra checks."
        correct: [a]
        explanation: "A server is a separate program with access to a service (files, GitHub, database); the model reaches it through host and client."

  - id: mcp-capabilities-001
    concept: mcp
    type: theory-quiz
    difficulty: 2
    prompt: "What does an MCP server expose and how do tools differ from resources?"
    choices:
      - id: a
        text: "Tools (actions the model calls), resources (data to read into context), and prompts (scenario templates)"
      - id: b
        text: "Only tools; resources and prompts do not exist in MCP before any other checks run on this path."
      - id: c
        text: "Only model weights immediately, without an intermediate state and without extra checks."
      - id: d
        text: "Tools and resources are identical under different names before any other checks run on this path."
    correct: [a]
    explanation: "A tool performs an action (create issue, write file) and the model chooses it; a resource offers readable data (file, DB row); prompts are reusable interaction templates."
    variants:
      - prompt: "What are resources in MCP?"
        choices:
          - id: a
            text: "Data you can read into context: a file, DB record, doc page."
          - id: b
            text: "Actions the model invokes to change the world before any other checks run on this path."
          - id: c
            text: "GPU memory where the model runs before any other checks run on this path."
          - id: d
            text: "Canned answers the server forces on the model before any other checks run on this path."
        correct: [a]
        explanation: "Resources are usually attached by user or host upfront, unlike tools the model actively selects."
      - prompt: "What are prompts as an MCP server capability?"
        choices:
          - id: a
            text: "Reusable interaction templates the server offers the user, e.g. run a code review on this file with a preset structure."
          - id: b
            text: "Server system logs immediately, without an intermediate state and without extra checks."
          - id: c
            text: "Passwords for server access immediately, without an intermediate state and without extra checks."
          - id: d
            text: "A list of model hyperparameters immediately, without an intermediate state and without extra checks."
        correct: [a]
        explanation: "Prompts are reusable scenarios the user launches deliberately - a third category beside tools and resources."

  - id: mcp-describe-001
    concept: mcp
    type: python-function
    difficulty: 2
    prompt: "Implement `describe(server)` - given a server dict with keys `name` and `capabilities` (a list of strings among `tools`/`resources`/`prompts`), return a string `\"<name>: <words>\"` where each capability maps tools→`действия`, resources→`данные`, prompts→`шаблоны`, comma-separated with a space, in original order."
    starter: |
      def describe(server):
          ...
    cases:
      - call: "describe({'name': 'GitHub', 'capabilities': ['tools']})"
        expect: "GitHub: действия"
      - call: "describe({'name': 'Файлы', 'capabilities': ['resources', 'tools']})"
        expect: "Файлы: данные, действия"
      - call: "describe({'name': 'База', 'capabilities': ['resources', 'prompts']})"
        expect: "База: данные, шаблоны"
      - call: "describe({'name': 'Всё', 'capabilities': ['tools', 'resources', 'prompts']})"
        expect: "Всё: действия, данные, шаблоны"
    solution: |
      def describe(server):
          kinds = {"tools": "действия", "resources": "данные", "prompts": "шаблоны"}
          parts = [kinds[c] for c in server["capabilities"]]
          return server["name"] + ": " + ", ".join(parts)
    hints:
      - "This models how a client discovers server capabilities: map capability codes to human-readable words."
      - "Build a translation dict, map capabilities in order, join with \", \" after the name and colon."

  - id: mcp-vs-function-calling-001
    concept: mcp
    type: theory-quiz
    difficulty: 3
    prompt: "How does MCP differ from ordinary function calling?"
    choices:
      - id: a
        text: "Function calling is the in-API mechanism for how the model requests a call."
      - id: b
        text: "They compete; MCP fully replaces function calling before any other checks run on this path."
      - id: c
        text: "MCP is a sampling variant; function calling is tokenization before any other checks run on this path."
      - id: d
        text: "No difference; they are the same thing before any other checks run on this path."
    correct: [a]
    explanation: "They work together on different layers: an MCP server declares tools, the host exposes them, the model invokes via function calling. MCP standardizes delivery; function calling is usage."
    variants:
      - prompt: "How do MCP and function calling work together?"
        choices:
          - id: a
            text: "MCP server declares a tool, host passes it to the model, model calls via function calling, result returns through the protocol."
          - id: b
            text: "MCP disables function calling and replaces it with direct weight access before any other checks run on this path."
          - id: c
            text: "They are mutually exclusive immediately, without an intermediate state and without extra checks."
          - id: d
            text: "Function calling restarts the MCP server on every token immediately, without an intermediate state and without extra checks."
        correct: [a]
        explanation: "MCP does not replace function calls - it standardizes where functions come from; the model still uses the same mechanism."
      - prompt: "Does connecting an MCP server make integration automatically safe?"
        choices:
          - id: a
            text: "No: a server gets access to your data and actions; the standard unifies wiring but trust is your problem."
          - id: b
            text: "Yes: any MCP server is safe by protocol definition before any other checks run on this path."
          - id: c
            text: "Yes: MCP encrypts everything and removes all risk before any other checks run on this path."
          - id: d
            text: "No, because MCP never transfers data immediately, without an intermediate state and without extra checks."
        correct: [a]
        explanation: "An unvetted server enters your context; you must vet it - the protocol does not do that for you."
