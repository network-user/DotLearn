exercises:
  - id: llm-output-001
    concept: what-is-llm
    type: theory-quiz
    difficulty: 1
    prompt: "Что выдаёт большая языковая модель на одном шаге генерации?"
    choices:
      - id: a
        text: "Готовый связный ответ целиком."
      - id: b
        text: "Распределение вероятностей следующего токена по всему словарю."
      - id: c
        text: "Ссылку на факт из встроенной базы знаний."
      - id: d
        text: "Один токен и больше ничего, без оценок альтернатив."
    correct: [b]
    explanation: "Модель - это функция «контекст → распределение вероятностей следующего токена». Один токен из этого распределения уже вытягивает шаг сэмплинга."
    variants:
      - prompt: "Что лежит на выходе модели до того, как выбран конкретный токен?"
        choices:
          - id: a
            text: "Число от 0 до 1 - уверенность в правильности ответа."
          - id: b
            text: "Список из десятков тысяч вероятностей, по одной на каждый токен словаря."
          - id: c
            text: "Текст ответа, который остаётся только показать."
          - id: d
            text: "Эмбеддинг всего запроса одним вектором."
        correct: [b]
        explanation: "На выходе - вероятность для каждого токена словаря; в сумме после нормировки они дают единицу."
      - prompt: "Почему говорят, что у LLM «нет встроенной базы фактов»?"
        choices:
          - id: a
            text: "Знания закодированы в весах и проявляются только как сдвиг вероятностей токенов."
          - id: b
            text: "Факты подгружаются из интернета на каждом шаге."
          - id: c
            text: "Модель хранит факты в отдельной таблице рядом с весами."
          - id: d
            text: "Фактов у модели действительно нет, она отвечает случайно."
        correct: [a]
        explanation: "Никакой таблицы фактов внутри нет: обучение зашивает закономерности в миллиарды весов, и они влияют лишь на вероятности токенов."

  - id: autoregression-001
    concept: what-is-llm
    type: theory-quiz
    difficulty: 2
    prompt: "Что означает, что генерация в LLM авторегрессивна?"
    choices:
      - id: a
        text: "Модель планирует весь ответ заранее, а потом печатает его разом."
      - id: b
        text: "Каждый предсказанный токен дописывается во вход, и следующий шаг видит уже удлинённый контекст."
      - id: c
        text: "Модель регрессирует к среднему и выдаёт самый частый токен языка."
      - id: d
        text: "Токены предсказываются параллельно и независимо друг от друга."
    correct: [b]
    explanation: "Авторегрессия = модель опирается на собственный предыдущий вывод: токен за токеном контекст растёт, и каждый новый шаг учитывает всё уже написанное."
    variants:
      - prompt: "Почему длинный ответ модели появляется постепенно, «по словам», а не мгновенно?"
        choices:
          - id: a
            text: "Каждый токен - это отдельный проход через сеть, и проходов столько, сколько токенов в ответе."
          - id: b
            text: "Сервер специально замедляет вывод для красоты."
          - id: c
            text: "Модель ждёт подтверждения пользователя после каждого слова."
          - id: d
            text: "Текст шифруется и расшифровывается по одному символу."
        correct: [a]
        explanation: "Генерация авторегрессивна: один шаг - одно распределение - один токен, поэтому время растёт с длиной ответа."
      - prompt: "Что на шаге генерации служит входом для предсказания очередного токена?"
        choices:
          - id: a
            text: "Только последний сгенерированный токен."
          - id: b
            text: "Весь текущий контекст: исходный промпт плюс все уже сгенерированные токены."
          - id: c
            text: "Случайный фрагмент обучающих данных."
          - id: d
            text: "Только системный промпт, без ответа модели."
        correct: [b]
        explanation: "На каждом шаге в модель подаётся весь контекст целиком; именно поэтому ответ остаётся связным."

  - id: pick-token-output-001
    concept: what-is-llm
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Она выбирает токен с наибольшим логитом."
    snippet: |
      vocab = ["кофе", "чай", "сок"]
      logits = [1.5, 3.0, 0.8]
      best = max(range(len(vocab)), key=lambda i: logits[i])
      print(vocab[best])
    expected:
      kind: stdout
      value: "чай"
    hints:
      - "Greedy-выбор берёт токен с максимальной оценкой - найдите, у какого индекса логит самый большой."
      - "Сравните три логита между собой; индекс победителя и определит выводимое слово."

  - id: argmax-token-001
    concept: what-is-llm
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `next_token_index(logits)`, возвращающую индекс токена с наибольшим логитом (greedy-выбор). При равенстве верните наименьший индекс."
    starter: |
      def next_token_index(logits):
          ...
    cases:
      - call: "next_token_index([3.0, 2.0, 1.0, 0.5])"
        expect: 0
      - call: "next_token_index([0.2, 0.9, 0.5])"
        expect: 1
      - call: "next_token_index([1.0, 1.0, 2.0, 0.0])"
        expect: 2
      - call: "next_token_index([-1.0, -0.5, -2.0])"
        expect: 1
    solution: |
      def next_token_index(logits):
          best = 0
          for i in range(1, len(logits)):
              if logits[i] > logits[best]:
                  best = i
          return best
    hints:
      - "Softmax монотонен: токен с наибольшим логитом получит и наибольшую вероятность, так что искать softmax не нужно."
      - "Пройдите по списку, запоминая индекс текущего максимума; строгое сравнение `>` оставит первый из равных."

  - id: softmax-prob-001
    concept: what-is-llm
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `softmax_prob(logits, i)` - вероятность токена с индексом `i` после softmax по всему списку логитов. Верните одно число."
    starter: |
      import math

      def softmax_prob(logits, i):
          ...
    cases:
      - call: "softmax_prob([2.0, 1.0, 0.0], 0)"
        expect_approx: 0.6652410
      - call: "softmax_prob([1.0, 1.0], 0)"
        expect_approx: 0.5
      - call: "softmax_prob([0.0, 0.0, 0.0, 0.0], 2)"
        expect_approx: 0.25
    solution: |
      import math

      def softmax_prob(logits, i):
          m = max(logits)
          exps = [math.exp(x - m) for x in logits]
          total = sum(exps)
          return exps[i] / total
    hints:
      - "Вероятность токена - это его доля в общей экспоненциальной массе: exp(логита) делёное на сумму exp по всем логитам."
      - "Чтобы избежать переполнения, вычтите максимум логита из каждого перед exp - на итоговую долю это не влияет."
      - "Сумму exp по всем токенам считайте один раз, затем верните долю нужного индекса."
