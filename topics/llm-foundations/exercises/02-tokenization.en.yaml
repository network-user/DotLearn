exercises:
  - id: token-vs-word-001
    concept: tokenization
    type: theory-quiz
    difficulty: 1
    prompt: "How does a token differ from a word in modern subword tokenization?"
    choices:
      - id: a
        text: "A token is always exactly one word."
      - id: b
        text: "A token is a frequent text chunk: common words stay whole, rare words split into pieces; a leading space is often part of the token."
      - id: c
        text: "A token is always one character."
      - id: d
        text: "Token and word are synonyms; there is no difference."
    correct: [b]
    explanation: "Subword tokenization splits rare words into chunks and keeps frequent ones whole; a token often carries a leading space, so «мир» and « мир» differ."
    variants:
      - prompt: "Why does a BPE tokenizer never have unknown words?"
        choices:
          - id: a
            text: "Any word can fall back to individual characters, which are always in the vocabulary."
          - id: b
            text: "The tokenizer retrains on every new word at runtime."
          - id: c
            text: "Unknown words become a special UNK token and are dropped."
          - id: d
            text: "The vocabulary contains every word in every language."
        correct: [a]
        explanation: "BPE builds any word from known pieces down to single characters, so a UNK token is unnecessary."
      - prompt: "Why does Russian text usually cost more tokens than equivalent English?"
        choices:
          - id: a
            text: "Tokenizers are trained mostly on English, so English words more often map to whole vocabulary entries."
          - id: b
            text: "Cyrillic letters use more bytes and are counted twice."
          - id: c
            text: "The model deliberately penalizes non-English languages."
          - id: d
            text: "Russian simply has more words in any sentence."
        correct: [a]
        explanation: "Merge statistics in the tokenizer training corpus favor English, so other languages are split finer."

  - id: bpe-merge-output-001
    concept: tokenization
    type: predict-output
    difficulty: 2
    prompt: "What does one BPE merge step print? The pair ('a', 't') is merged."
    snippet: |
      def apply_merge(tokens, a, b):
          out, i, glued = [], 0, a + b
          while i < len(tokens):
              if i < len(tokens) - 1 and tokens[i] == a and tokens[i + 1] == b:
                  out.append(glued)
                  i += 2
              else:
                  out.append(tokens[i])
                  i += 1
          return out

      print(apply_merge(["c", "a", "t", "s"], "a", "t"))
    expected:
      kind: stdout
      value: "['c', 'at', 's']"
    hints:
      - "A merge replaces each adjacent pair a, b with the glued token a+b; other tokens stay as they are."
      - "Find the neighboring 'a' and 't' in the list and glue only that pair."

  - id: pair-count-001
    concept: tokenization
    type: python-function
    difficulty: 2
    prompt: "Implement `pair_count(tokens, a, b)` - how many times the adjacent token pair (a, b) appears in `tokens`. Return an integer."
    starter: |
      def pair_count(tokens, a, b):
          ...
    cases:
      - call: "pair_count(['l', 'o', 'w', 'e', 'r'], 'e', 'r')"
        expect: 1
      - call: "pair_count(['a', 'b', 'a', 'b', 'a', 'b'], 'a', 'b')"
        expect: 3
      - call: "pair_count(['x', 'y', 'z'], 'a', 'b')"
        expect: 0
      - call: "pair_count(['n', 'e', 'w', 'e', 's', 't'], 'e', 's')"
        expect: 1
    solution: |
      def pair_count(tokens, a, b):
          count = 0
          for left, right in zip(tokens, tokens[1:]):
              if left == a and right == b:
                  count += 1
          return count
    hints:
      - "A pair is two neighboring tokens; on a BPE step you usually merge the most frequent pair, so you need to count it."
      - "Walk all neighboring pairs in the list and count matches with (a, b)."
      - "Neighboring pairs are easy to get by zipping the list with itself shifted by one."

  - id: apply-merge-001
    concept: tokenization
    type: python-function
    difficulty: 3
    prompt: "Implement `apply_merge(tokens, a, b)`: return a new list where each adjacent pair (a, b) is glued into one token a+b; leave other tokens unchanged. Scan left to right without overlaps."
    starter: |
      def apply_merge(tokens, a, b):
          ...
    cases:
      - call: "apply_merge(['l', 'o', 'w', 'e', 'r'], 'e', 'r')"
        expect: ["l", "o", "w", "er"]
      - call: "apply_merge(['n', 'e', 'w', 'e', 's', 't'], 'e', 's')"
        expect: ["n", "e", "w", "es", "t"]
      - call: "apply_merge(['a', 'b', 'a', 'b'], 'a', 'b')"
        expect: ["ab", "ab"]
      - call: "apply_merge(['c', 'a', 't', 's'], 'a', 't')"
        expect: ["c", "at", "s"]
    solution: |
      def apply_merge(tokens, a, b):
          out = []
          i = 0
          glued = a + b
          while i < len(tokens):
              if i < len(tokens) - 1 and tokens[i] == a and tokens[i + 1] == b:
                  out.append(glued)
                  i += 2
              else:
                  out.append(tokens[i])
                  i += 1
          return out
    hints:
      - "A merge replaces a matched pair with one new token; that is exactly what BPE does on each vocabulary-building step."
      - "Walk with an index: on a match append the glued token and skip both elements; otherwise append the current token and advance by one."
      - "Skipping two elements after a merge prevents the pair from overlapping itself."

  - id: count-tokens-after-merge-001
    concept: tokenization
    type: python-function
    difficulty: 3
    prompt: "Implement `length_after_merge(tokens, a, b)` - the token list length after one merge of pair (a, b). Return an integer; you do not need to build the list."
    starter: |
      def length_after_merge(tokens, a, b):
          ...
    cases:
      - call: "length_after_merge(['l', 'o', 'w', 'e', 'r'], 'e', 'r')"
        expect: 4
      - call: "length_after_merge(['a', 'b', 'a', 'b', 'a', 'b'], 'a', 'b')"
        expect: 3
      - call: "length_after_merge(['x', 'y', 'z'], 'a', 'b')"
        expect: 3
      - call: "length_after_merge(['n', 'e', 'w', 'e', 's', 't'], 'e', 's')"
        expect: 5
    solution: |
      def length_after_merge(tokens, a, b):
          merges = 0
          i = 0
          while i < len(tokens):
              if i < len(tokens) - 1 and tokens[i] == a and tokens[i + 1] == b:
                  merges += 1
                  i += 2
              else:
                  i += 1
          return len(tokens) - merges
    hints:
      - "Each merge turns two tokens into one, shortening the list by exactly one."
      - "So final length is original length minus the number of merges performed."
      - "Count merges the same way you would apply them: left to right, skipping the glued pair."
