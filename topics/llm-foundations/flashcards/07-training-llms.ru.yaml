conceptId: training-llms
cards:
  - id: training-llms-01
    front: "Что такое предобучение (pretraining)?"
    back: "Самый дорогой этап обучения: по началу текста предсказывать следующий токен на огромном корпусе. Из этой простой задачи, повторённой триллионы раз, выкристаллизовываются грамматика, факты, стиль и зачатки рассуждения."
    tags: [pretraining]
  - id: training-llms-02
    front: "Почему предобучение называют self-supervised?"
    back: "Правильный ответ - просто следующий токен, который уже есть в тексте, поэтому ручная разметка не нужна. Данных столько, сколько есть текста, - это и есть ключ к масштабу."
    tags: [pretraining]
  - id: training-llms-03
    front: "Почему качество и состав данных так важны?"
    back: "Модель не может знать того, чего не было в данных, и наследует их перекосы. «Знания» модели - слепок обучающих данных, а не объективная истина. Усилия идут на дедупликацию, фильтрацию и балансировку доменов."
    tags: [data]
  - id: training-llms-04
    front: "Что такое законы масштабирования (scaling laws)?"
    back: "Качество (функция потерь) улучшается предсказуемо и плавно с ростом числа параметров, объёма данных и вычислительного бюджета. Зависимость близка к степенной, отдача замедляется, но остаётся предсказуемой - это позволяет планировать обучение."
    tags: [scaling]
  - id: training-llms-05
    front: "Что показала работа Chinchilla?"
    back: "Многие ранние модели были «недокормлены» данными при своём размере: им стоило дать меньше параметров, но больше токенов. Грубое правило - около 20 токенов обучающих данных на каждый параметр модели."
    tags: [chinchilla]
  - id: training-llms-06
    front: "Как грубо оценить вычисления на предобучение?"
    back: "Примерно 6 * N * D операций, где N - число параметров, D - число обучающих токенов. Множитель 6 покрывает forward и backward проход. Именно произведение миллиардов на миллиарды делает обучение очень дорогим."
    tags: [compute]
  - id: training-llms-07
    front: "Достаточно ли просто увеличить число параметров?"
    back: "Нет. Scaling laws говорят о балансе: модель, перекормленная параметрами и недокормленная данными, тратит бюджет впустую. Оптимум - согласованно расти по всем трём осям, а не раздувать одну."
    tags: [balance]
  - id: training-llms-08
    front: "Что умеет модель сразу после предобучения?"
    back: "Только продолжать текст. На вопрос она может выдать продолжение в виде похожих вопросов, как веб-форум. Чтобы стать послушным ассистентом, нужен следующий этап - дообучение и выравнивание."
    tags: [pretraining]
  - id: training-llms-09
    front: "Что такое knowledge cutoff?"
    back: "Дата отсечки данных - момент, после которого новых текстов в корпусе нет. Без внешних инструментов модель не знает событий после этой даты и может уверенно ошибаться о «недавнем»."
    tags: [cutoff]
  - id: training-llms-10
    front: "Чему модель действительно «научилась», если её учили лишь предсказывать токен?"
    back: "Способность отвечать на вопросы, переводить, писать код - побочный продукт предсказания следующего токена, а не явно запрограммированная цель. Эти способности потом дошлифовывают дообучением."
    tags: [pretraining]
