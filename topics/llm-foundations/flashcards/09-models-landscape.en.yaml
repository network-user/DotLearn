conceptId: models-landscape
cards:
  - id: models-landscape-01
    front: "Why is asking for the single best model usually wrong?"
    back: "Models trade off intelligence vs price, context vs speed. The right question is which model fits this task and budget. Best is always task-specific."
    tags: [choice]
  - id: models-landscape-02
    front: "What does shipping models as families mean?"
    back: "Several tiers under one name - light/cheap to heavy/capable. Claude: Haiku (fast), Sonnet (balance), Opus (most capable); by 2026 an even stronger tier sits above."
    tags: [families]
  - id: models-landscape-03
    front: "Name major model families circa 2026."
    back: "Claude (Anthropic), GPT (OpenAI), Gemini (Google - multimodal and long context), Llama (Meta - open-weights flagship), Mistral (efficient open models)."
    tags: [families]
  - id: models-landscape-04
    front: "How do open weights differ from proprietary models?"
    back: "Download, run locally, fine-tune, offline - control and privacy at the cost of your hardware. Proprietary is API-only: peak capability, but weights are not yours and data leaves your perimeter."
    tags: [open-weights]
  - id: models-landscape-05
    front: "When pick open weights?"
    back: "When privacy, data control, and offline matter and you can operate hardware. Often slightly behind closed frontier leaders but enough for many jobs."
    tags: [open-weights]
  - id: models-landscape-06
    front: "What axes compare models?"
    back: "Size (parameters - smarts and price), context length (how much fits, up to ~1M top-tier), multimodality (text/images/audio/video), price and latency."
    tags: [axes]
  - id: models-landscape-07
    front: "How is API pricing structured?"
    back: "Per token - input (prompt) and output (reply), usually per million. Output costs more; light vs top tier can differ by an order of magnitude."
    tags: [pricing]
  - id: models-landscape-08
    front: "What is context length and how did it change by 2026?"
    back: "Tokens held per request. Top models reach hundreds of thousands to a million - whole codebases or thick documents fit. Light tiers usually offer less."
    tags: [context]
  - id: models-landscape-09
    front: "How pick a model for a task?"
    back: "Start with the cheapest tier that works, escalate only if needed. Weigh task difficulty, context needs, multimodal inputs, price/latency at your volume, and privacy."
    tags: [choice]
  - id: models-landscape-10
    front: "Why is benchmark leadership not always best for you?"
    back: "Benchmarks average many tasks; on yours a cheaper model may match a flagship. Test your own examples, not leaderboard tables."
    tags: [choice]
  - id: models-landscape-11
    front: "Why is bigger context not always better?"
    back: "Large windows cost more without making the model smarter. If the doc fits a small window, paying for a million tokens is waste."
    tags: [context]
  - id: models-landscape-12
    front: "Why do providers offer multiple tiers instead of one model?"
    back: "Tasks differ in intelligence, speed, and price needs. A tier ladder lets everyone pick a point on the quality-cost curve; smart systems mix tiers for easy vs hard work."
    tags: [families]
