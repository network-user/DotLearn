conceptId: fine-tuning-alignment
cards:
  - id: fine-tuning-alignment-01
    front: "Что такое выравнивание (alignment)?"
    back: "Превращение сырой предобученной модели в полезного и безопасного ассистента, который следует инструкциям, держит тон и отказывается от вредного. Это надстройка из нескольких этапов поверх предобучения, а не один шаг."
    tags: [alignment]
  - id: fine-tuning-alignment-02
    front: "Что делает SFT (supervised fine-tuning), он же instruction tuning?"
    back: "Показывает модели примеры «инструкция → хороший ответ» и слегка подправляет веса, чтобы она воспроизводила формат полезного ассистента. После SFT модель отвечает как помощник, а не продолжает текст как веб-форум."
    tags: [sft]
  - id: fine-tuning-alignment-03
    front: "Зачем нужно обучение на человеческих предпочтениях?"
    back: "Вежливость, осторожность, отказ от вредного, выбор «лучшего из двух хороших» ответов трудно задать образцовым примером. Зато людям легко сравнить два ответа и сказать, какой лучше - на этом и строят предпочтения."
    tags: [preferences]
  - id: fine-tuning-alignment-04
    front: "Чем DPO отличается от RLHF при той же цели?"
    back: "RLHF обучает отдельную модель-награду по парам сравнений и подталкивает основную модель методом обучения с подкреплением. DPO обходится без reward-модели и RL, напрямую сдвигая модель к предпочтённым ответам и от отвергнутых - проще и стабильнее."
    tags: [rlhf, dpo]
  - id: fine-tuning-alignment-05
    front: "Чем дообучение отличается от предобучения?"
    back: "Дообучение сильно дешевле: оно лишь слегка подправляет уже обученные веса на небольшом наборе данных. Часто его делают экономно методами вроде LoRA - обучают маленькую добавку к весам вместо всей модели."
    tags: [fine-tuning, lora]
  - id: fine-tuning-alignment-06
    front: "Почему дообучение плохо подходит для «дать модели новые знания»?"
    back: "Оно меняет поведение и стиль, а не заливает большой объём фактов. Пытаться «дообучить знание» базы документов дорого, ненадёжно и быстро устаревает; для свежих фактов почти всегда лучше RAG."
    tags: [fine-tuning]
  - id: fine-tuning-alignment-07
    front: "Что такое RAG (retrieval-augmented generation)?"
    back: "Не зашивать знания в веса, а подкладывать нужные куски прямо в контекст запроса. Документы режут на фрагменты и кодируют в эмбеддинги; на запрос находят ближайшие по смыслу и вставляют в промпт - модель отвечает, опираясь на поданный контекст."
    tags: [rag]
  - id: fine-tuning-alignment-08
    front: "В чём преимущества RAG перед дообучением для знаний?"
    back: "Свежесть и проверяемость (можно показать источник), обновление простой заменой документов в базе, без переобучения весов. Знания не устаревают вместе с моделью."
    tags: [rag]
  - id: fine-tuning-alignment-09
    front: "Что ограничивает качество RAG-системы помимо самой модели?"
    back: "Качество поиска. Модель ответит хорошо только если нужный фрагмент действительно нашёлся и попал в контекст. Плохой ретривер - плохой ответ даже у сильной модели."
    tags: [rag]
  - id: fine-tuning-alignment-10
    front: "В чём компромисс выравнивания?"
    back: "Слишком слабое - модель груба и небезопасна; слишком жёсткое - она уклончива, отказывает там, где не надо, и теряет полезность. Хорошее выравнивание балансирует «полезный», «честный» и «безвредный»."
    tags: [alignment]
  - id: fine-tuning-alignment-11
    front: "Можно ли «сбить» выравнивание?"
    back: "Да. Дообучение на узких или вредных данных способно ослабить защиту, построенную на этапе предпочтений. Выравнивание снижает риск, но не устраняет его абсолютно, и его можно обойти хитрым запросом."
    tags: [alignment, safety]
  - id: fine-tuning-alignment-12
    front: "Что такое Constitutional AI?"
    back: "Подход, где модель критикует и переписывает собственные ответы по набору письменных принципов («конституции»), а предпочтения частично генерируются ИИ, а не людьми (RLAIF). Это масштабирует выравнивание и делает принципы явными и проверяемыми."
    tags: [constitutional-ai]
