conceptId: training-llms
cards:
  - id: training-llms-01
    front: "What is pretraining?"
    back: "The most expensive training stage: predict the next token on a huge corpus. Repeated trillions of times, grammar, facts, style, and rudimentary reasoning crystallize from this simple game."
    tags: [pretraining]
  - id: training-llms-02
    front: "Why is pretraining called self-supervised?"
    back: "The label is the next token already in the text, so no manual annotation. Data scales to all available text - that scale is the point."
    tags: [pretraining]
  - id: training-llms-03
    front: "Why do data quality and mix matter?"
    back: "The model cannot know what was not in the data and inherits its biases. Model knowledge is a snapshot of the corpus, not objective truth. Heavy dedup, filtering, and balancing follow."
    tags: [data]
  - id: training-llms-04
    front: "What are scaling laws?"
    back: "Loss improves predictably and smoothly with more parameters, data, and compute. Near power-law: returns slow but stay forecastable, enabling training plans before launch."
    tags: [scaling]
  - id: training-llms-05
    front: "What did Chinchilla show?"
    back: "Many early models were underfed data for their size: fewer parameters with more tokens would have been better. Rule of thumb: ~20 training tokens per parameter."
    tags: [chinchilla]
  - id: training-llms-06
    front: "How do you roughly estimate pretraining compute?"
    back: "About 6 * N * D operations, N parameters, D training tokens. The factor 6 covers forward and backward. Billions times billions is why training costs millions."
    tags: [compute]
  - id: training-llms-07
    front: "Is simply growing parameter count enough?"
    back: "No. Scaling laws demand balance: over-parameterized, under-data models waste budget. Grow parameters, data, and compute together, not one axis alone."
    tags: [balance]
  - id: training-llms-08
    front: "What can a model do right after pretraining?"
    back: "Only continue text. A question may get a list of similar questions like a forum thread. Becoming a helpful assistant needs fine-tuning and alignment."
    tags: [pretraining]
  - id: training-llms-09
    front: "What is a knowledge cutoff?"
    back: "The date after which no new text entered the training corpus. Without external tools the model does not know later events and may confidently err about recent facts."
    tags: [cutoff]
  - id: training-llms-10
    front: "What did the model actually learn if training was only next-token prediction?"
    back: "QA, translation, coding - side effects of next-token prediction, not explicitly programmed goals. Fine-tuning later polishes these into assistant behavior."
    tags: [pretraining]
