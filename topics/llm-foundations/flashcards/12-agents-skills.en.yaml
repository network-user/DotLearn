conceptId: agents-skills
cards:
  - id: agents-skills-01
    front: "What is an agent?"
    back: "A normal language model in a loop with goal, tools, and memory. Each turn it plans, calls tools, observes, and repeats while holding a goal across steps. Not a new architecture."
    tags: [agent]
  - id: agents-skills-02
    front: "How is agent work unlike a single reply?"
    back: "A goal persists across steps, the model plans its own actions, and tools let it change the world and gather facts instead of only talking."
    tags: [agent]
  - id: agents-skills-03
    front: "What are skills?"
    back: "Reusable instruction packs loaded only when needed. Progressive disclosure: a short blurb stays in context; full instructions load on demand."
    tags: [skills]
  - id: agents-skills-04
    front: "How does a skill differ from a tool?"
    back: "Tools add actions (what to call via function calling). Skills add reusable procedures (how to do). Skills often explain using a tool set for a task."
    tags: [skills]
  - id: agents-skills-05
    front: "Why progressive skill disclosure?"
    back: "Dumping all instructions into the system prompt bloats context with irrelevant text. Short summary visible, full playbook on demand keeps the base compact."
    tags: [skills]
  - id: agents-skills-06
    front: "What two memory kinds does an agent have?"
    back: "Short-term - context window: fast, finite, dies with the session. Long-term - external store (files, DB, vector index): survives sessions, fetched on request."
    tags: [memory]
  - id: agents-skills-07
    front: "How do short- and long-term memory differ?"
    back: "Context is fast but capped and ephemeral; evicted tokens are gone. External memory outlives sessions but the agent must choose what to save and retrieve."
    tags: [memory]
  - id: agents-skills-08
    front: "Why is good memory not remembering everything?"
    back: "It is deciding what to store externally and what to pull into context when needed. Context is scarce; skill is fetching the right slice, not hoarding all history in-window."
    tags: [memory]
  - id: agents-skills-09
    front: "What is a multi-agent system?"
    back: "Split work across role-specialized agents: a coordinator assigns subtasks (search, code, review) and merges results. Each sub-agent has its own context and tool/skill set."
    tags: [multiagent]
  - id: agents-skills-10
    front: "Upside and downside of multi-agent setups?"
    back: "Upside: focus and parallelism - narrow agents often beat a generalist. Downside: complexity, cost (each agent burns tokens), and error chains. Worth it when the task truly decomposes."
    tags: [multiagent]
  - id: agents-skills-11
    front: "Why do risks grow in an agent loop?"
    back: "Early mistakes enter observations and steer later steps; long autonomous runs drift. Use step limits, confirmations for dangerous actions, and result checks."
    tags: [risks]
  - id: agents-skills-12
    front: "Why budget for agent autonomy?"
    back: "Every loop turn, sub-agent, and memory access costs tokens. A busy agent can burn budget quietly. Autonomy costs more than one-shot answers."
    tags: [risks]
