conceptId: what-is-llm
cards:
  - id: what-is-llm-01
    front: "Что по своей сути делает LLM на одном шаге?"
    back: "Принимает последовательность токенов и выдаёт распределение вероятностей следующего токена - по числу на каждый токен словаря, в сумме после нормировки равное единице. Один токен из этого распределения уже вытягивает сэмплинг."
    tags: [basics]
  - id: what-is-llm-02
    front: "Что такое авторегрессивная генерация?"
    back: "Способ собрать длинный ответ: предсказали токен, дописали его во вход, подали всё заново в ту же модель, получили следующий токен. Модель опирается на собственный предыдущий вывод, поэтому текст течёт по одному токену за шаг."
    tags: [autoregression]
  - id: what-is-llm-03
    front: "Почему один и тот же вопрос даёт разные ответы?"
    back: "Из-за случайности сэмплинга: на выходе распределение, и токен вытягивается из него вероятностно. Жадный выбор (greedy) берёт максимум и детерминирован, но часто беднее и склонен к зацикливанию."
    tags: [sampling]
  - id: what-is-llm-04
    front: "Зачем нужен softmax при генерации?"
    back: "Логиты - произвольные числа (могут быть отрицательными), вероятность из них напрямую не прочитать. Softmax возводит exp и нормирует, превращая логиты в распределение, суммирующееся в единицу."
    tags: [softmax]
  - id: what-is-llm-05
    front: "Зачем перед softmax вычитают максимум логита?"
    back: "Для численной устойчивости: exp от больших чисел переполняется. Вычитание максимума делает все аргументы exp неположительными и не меняет итоговые вероятности."
    tags: [softmax]
  - id: what-is-llm-06
    front: "Есть ли внутри LLM база фактов?"
    back: "Нет. Знания закодированы в миллиардах весов, полученных при обучении, и проявляются только как сдвиг вероятностей токенов. Поэтому модель может уверенно продолжить и выдуманный, но правдоподобный факт."
    tags: [knowledge]
  - id: what-is-llm-07
    front: "Что такое галлюцинация модели и почему она возникает?"
    back: "Уверенно звучащий, но неверный текст. Это не сбой: механизм исправно предсказывает правдоподобное продолжение, а правдоподобное не всегда соответствует истине."
    tags: [hallucination]
  - id: what-is-llm-08
    front: "Что считается одним шагом генерации?"
    back: "Один полный проход (forward pass) сети по текущему контексту, дающий одно распределение и один новый токен. На практике проходы ускоряют KV-кэшем, чтобы не пересчитывать уже обработанные токены."
    tags: [internals]
  - id: what-is-llm-09
    front: "Greedy-выбор делает модель уверенной в ответе?"
    back: "Нет. Greedy просто берёт максимум распределения. Модель может быть почти не уверена (например, два кандидата по 0.34 и 0.33), но наружу всё равно выйдет один токен."
    tags: [sampling]
  - id: what-is-llm-10
    front: "Связаны ли размер модели и её ум напрямую?"
    back: "Размер помогает, но не решает всё. Качество данных, процедура обучения и дообучение (SFT, RLHF/DPO) влияют не меньше, поэтому меньшая, но лучше обученная модель может превосходить большую."
    tags: [scaling]
