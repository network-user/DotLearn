conceptId: tokenization
cards:
  - id: tokenization-01
    front: "Что такое токен?"
    back: "Частый кусок текста где-то между буквой и словом. Частые слова становятся одним токеном, редкие распадаются на несколько кусков. Модель видит последовательность числовых id токенов, а не сам текст."
    tags: [basics]
  - id: tokenization-02
    front: "Зачем нужна subword-токенизация, а не разбиение по словам или по буквам?"
    back: "По словам - бесконечный словарь и проблема незнакомых слов. По буквам - слишком длинные последовательности. Subword - компромисс: осмысленные крупные куски, из которых собирается любое слово."
    tags: [basics]
  - id: tokenization-03
    front: "Как работает алгоритм BPE при построении словаря?"
    back: "Разбить слова на символы, многократно находить самую частую соседнюю пару токенов и склеивать её в новый токен (правило merge), пока словарь не достигнет нужного размера."
    tags: [bpe]
  - id: tokenization-04
    front: "Что делает одно слияние BPE со списком токенов?"
    back: "Заменяет каждую соседнюю пару (a, b) на один склеенный токен a+b, остальные токены оставляет без изменений. Каждое слияние укорачивает список ровно на единицу."
    tags: [bpe]
  - id: tokenization-05
    front: "Почему счёт идёт в токенах, а не в символах или словах?"
    back: "От числа токенов зависят стоимость запроса (тарификация почти всегда потокенная) и то, поместится ли текст в контекстное окно. «Много текста» и «много токенов» - не одно и то же."
    tags: [counting]
  - id: tokenization-06
    front: "Почему русский текст обычно «дороже» английского по токенам?"
    back: "Токенизаторы обучены преимущественно на английском, поэтому английские слова чаще попадают в словарь целиком, а русский дробится мельче - нередко в полтора-два раза больше токенов на тот же смысл."
    tags: [languages]
  - id: tokenization-07
    front: "Почему модели плохо даётся арифметика и счёт букв в слове?"
    back: "Числа могут разбиваться на странные куски (1234 → 12, 34), а буквы внутри токена модель не видит по отдельности. Она оперирует токенами, поэтому задачи на отдельные символы для неё неестественны."
    tags: [pitfalls]
  - id: tokenization-08
    front: "Влияют ли пробелы и регистр на токенизацию?"
    back: "Да. «привет», «Привет» и « привет» нередко дают разные токены, потому что токен обычно несёт ведущий пробел, а регистр меняет последовательность символов. Формат запроса может неожиданно влиять на поведение."
    tags: [pitfalls]
  - id: tokenization-09
    front: "Учится ли токенизация во время работы модели?"
    back: "Нет. Словарь и правила слияний строят один раз на корпусе, а при работе модели токенизатор просто применяет готовые правила к новому тексту - в обе стороны, текст ↔ id."
    tags: [bpe]
  - id: tokenization-10
    front: "Чем BPE отличается от WordPiece и Unigram?"
    back: "BPE сливает самую частую пару. WordPiece выбирает пару по приросту правдоподобия корпуса. Unigram стартует с большого словаря и выкидывает наименее полезные токены. Все три дают похожий subword-словарь."
    tags: [variants]
