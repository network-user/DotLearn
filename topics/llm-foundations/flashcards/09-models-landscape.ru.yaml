conceptId: models-landscape
cards:
  - id: models-landscape-01
    front: "Почему вопрос «какая модель самая лучшая» обычно неверный?"
    back: "Есть набор компромиссов: интеллект против цены, контекст против скорости. Правильный вопрос - «какая модель лучше для этой задачи и этого бюджета». «Лучшая» всегда привязана к задаче."
    tags: [choice]
  - id: models-landscape-02
    front: "Что значит, что модели выходят семействами?"
    back: "Под общим именем выпускают несколько уровней - от лёгкого и дешёвого до тяжёлого и умного. У Claude это Haiku (быстрый), Sonnet (баланс), Opus (самый способный); к 2026 над ними появился ещё более мощный уровень."
    tags: [families]
  - id: models-landscape-03
    front: "Назовите основные семейства моделей 2026 года."
    back: "Claude (Anthropic), GPT (OpenAI), Gemini (Google, упор на мультимодальность и длинный контекст), Llama (Meta, флагман открытых весов), Mistral (эффективные открытые модели)."
    tags: [families]
  - id: models-landscape-04
    front: "Чем открытые веса отличаются от проприетарной модели?"
    back: "Открытую модель можно скачать, запустить локально, дообучить и работать офлайн - контроль и приватность ценой своего железа. Проприетарная живёт за API: максимум возможностей, но веса не Ваши и данные уходят наружу."
    tags: [open-weights]
  - id: models-landscape-05
    front: "Когда выбирать открытые веса?"
    back: "Когда критичны приватность, контроль над данными и работа офлайн, и Вы готовы держать своё железо. Они часто чуть позади топовых закрытых на фронтире, но для многих задач их с лихвой хватает."
    tags: [open-weights]
  - id: models-landscape-06
    front: "По каким осям различаются модели?"
    back: "Размер (число параметров - интеллект и цена), длина контекста (сколько влезает за раз, до ~1M у топовых), мультимодальность (текст/картинки/аудио/видео), цена и латентность (сколько стоит и как быстро отвечает)."
    tags: [axes]
  - id: models-landscape-07
    front: "Как устроено ценообразование за API?"
    back: "Платят за токены - отдельно за вход (промпт) и за выход (ответ), обычно за миллион токенов. Выход дороже входа, а разница между лёгким и топовым уровнем - порядок величины."
    tags: [pricing]
  - id: models-landscape-08
    front: "Что такое длина контекста и как она изменилась к 2026?"
    back: "Сколько токенов модель удерживает за один запрос. У топовых моделей это сотни тысяч и до миллиона токенов - в окно влезает целая кодовая база или толстый документ. У лёгких уровней окно обычно меньше."
    tags: [context]
  - id: models-landscape-09
    front: "Как выбирать модель под задачу?"
    back: "Начните с самого дешёвого уровня, который справляется, и поднимайтесь только при необходимости. Учтите сложность задачи, требования к контексту, входы (картинки/аудио), цену и латентность под объём, приватность."
    tags: [choice]
  - id: models-landscape-10
    front: "Почему «лучшая по бенчмаркам» не значит «лучшая для Вас»?"
    back: "Бенчмарки усредняют по широкому набору задач; на Вашей конкретной задаче более дешёвая модель может работать не хуже флагмана. Проверять стоит на своих примерах, а не на чужих таблицах лидеров."
    tags: [choice]
  - id: models-landscape-11
    front: "Почему «больше контекста - всегда лучше» - заблуждение?"
    back: "Большое окно стоит дороже и не делает модель умнее. Если документ влезает в маленькое окно, платить за миллион токенов незачем."
    tags: [context]
  - id: models-landscape-12
    front: "Зачем провайдеры держат несколько уровней, а не одну модель?"
    back: "Разные задачи предъявляют разные требования к интеллекту, скорости и цене. Лесенка уровней даёт выбрать точку на кривой «качество против цены» под каждую задачу; грамотная архитектура часто смешивает уровни."
    tags: [families]
