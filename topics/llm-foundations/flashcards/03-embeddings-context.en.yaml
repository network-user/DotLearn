conceptId: embeddings-context
cards:
  - id: embeddings-context-01
    front: "What is a token embedding?"
    back: "A fixed-length vector - coordinates in meaning space. One vector alone means little; meaning comes from relative placement: semantically close tokens sit nearby."
    tags: [embeddings]
  - id: embeddings-context-02
    front: "Why do similar words cluster in embedding space?"
    back: "Training pushes words that appear in similar contexts together. Geometric nearness starts to mirror semantic nearness, hence arithmetic like king - man + woman ≈ queen."
    tags: [embeddings]
  - id: embeddings-context-03
    front: "Why add positional encoding?"
    back: "Attention alone does not see order - only a bag of tokens. Position added to the embedding tells the model where each token sits and turns the bag into a sequence."
    tags: [position]
  - id: embeddings-context-04
    front: "What is RoPE?"
    back: "Rotary positional embeddings encode position by rotation instead of vector addition. Helps generalize to context lengths not seen in training. Common in modern models."
    tags: [position]
  - id: embeddings-context-05
    front: "What does cosine similarity measure and what is its scale?"
    back: "The cosine of the angle between vectors: 1 aligned, 0 perpendicular, -1 opposite. Vector length does not matter, only direction."
    tags: [cosine]
  - id: embeddings-context-06
    front: "How is cosine similarity computed?"
    back: "Dot product divided by the product of vector norms. Norm is sqrt of sum of squared coordinates. The numerator grows when vectors align; dividing by lengths removes scale."
    tags: [cosine]
  - id: embeddings-context-07
    front: "What is the context window?"
    back: "A hard cap on simultaneous tokens. Anything outside is evicted and ceases to exist for the model. In 2026 windows reach hundreds of thousands or millions of tokens, but there is always a limit."
    tags: [context]
  - id: embeddings-context-08
    front: "What happens when text exceeds the context window?"
    back: "Oldest tokens are mechanically truncated from the edge without semantic judgment. In a long chat the start may be forgotten not from failure but because it left the window."
    tags: [context]
  - id: embeddings-context-09
    front: "What is lost in the middle?"
    back: "Models often use the start and end of long context better than the middle. Keep important instructions near the beginning or end, not buried mid-document."
    tags: [context]
  - id: embeddings-context-10
    front: "Why cosine similarity instead of Euclidean distance?"
    back: "Euclidean distance is sensitive to vector length; meaning often lives in direction, not norm. Cosine uses only the angle and is a stabler semantic similarity measure."
    tags: [cosine]
