conceptId: fine-tuning-alignment
cards:
  - id: fine-tuning-alignment-01
    front: "What is alignment?"
    back: "Turning a raw pretrained model into a useful, safe assistant that follows instructions, keeps tone, and refuses harm. Several stages on top of pretraining, not one switch."
    tags: [alignment]
  - id: fine-tuning-alignment-02
    front: "What does SFT (instruction tuning) do?"
    back: "Shows instruction → good answer pairs and nudges weights so the model mimics a helpful assistant. After SFT it answers like a helper, not a forum continuer."
    tags: [sft]
  - id: fine-tuning-alignment-03
    front: "Why train on human preferences?"
    back: "Politeness, caution, refusals, and picking the better of two good answers are hard to demo with one example. People easily compare two replies - preferences build on that."
    tags: [preferences]
  - id: fine-tuning-alignment-04
    front: "How does DPO differ from RLHF for the same goal?"
    back: "RLHF trains a reward model from comparisons then RL-tunes the main model. DPO skips reward model and RL, shifting directly toward preferred and away from rejected answers - simpler and stabler."
    tags: [rlhf, dpo]
  - id: fine-tuning-alignment-05
    front: "How is fine-tuning unlike pretraining?"
    back: "Fine-tuning is far cheaper: small nudges to trained weights on a modest dataset. Often via LoRA - train a small adapter instead of the full model."
    tags: [fine-tuning, lora]
  - id: fine-tuning-alignment-06
    front: "Why is fine-tuning poor for injecting new knowledge?"
    back: "It shifts behavior and style, not bulk facts. Stuffing a document base via fine-tune is costly, unreliable, and stale fast; fresh facts usually want RAG."
    tags: [fine-tuning]
  - id: fine-tuning-alignment-07
    front: "What is RAG?"
    back: "Do not bake knowledge into weights; inject relevant chunks into the prompt. Documents are chunked and embedded; nearest pieces to the query go into context and the model answers from them."
    tags: [rag]
  - id: fine-tuning-alignment-08
    front: "Why RAG over fine-tuning for knowledge?"
    back: "Freshness and citeability (show the source), update by swapping documents without retraining weights. Knowledge does not age inside frozen weights."
    tags: [rag]
  - id: fine-tuning-alignment-09
    front: "What limits RAG besides the model?"
    back: "Retrieval. Good answers need the right chunk in context. A weak retriever means a weak answer even from a strong model."
    tags: [rag]
  - id: fine-tuning-alignment-10
    front: "What is the alignment trade-off?"
    back: "Too weak - rude and unsafe; too strong - evasive and useless. Good alignment balances helpful, honest, and harmless."
    tags: [alignment]
  - id: fine-tuning-alignment-11
    front: "Can alignment be undone?"
    back: "Yes. Fine-tuning on narrow or harmful data can weaken preference-stage guardrails. Alignment lowers risk but does not remove it; jailbreaks remain possible."
    tags: [alignment, safety]
  - id: fine-tuning-alignment-12
    front: "What is Constitutional AI?"
    back: "The model critiques and rewrites its answers against written principles (a constitution); preferences partly come from AI not humans (RLAIF). Scales alignment and makes principles explicit and auditable."
    tags: [constitutional-ai]
