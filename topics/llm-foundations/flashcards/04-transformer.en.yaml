conceptId: transformer
cards:
  - id: transformer-01
    front: "What is a transformer in one sentence?"
    back: "A stack of identical blocks where tokens exchange information through attention instead of a recurrent chain. The basis of modern LLMs (Attention Is All You Need, 2017)."
    tags: [basics]
  - id: transformer-02
    front: "What two operations make up one transformer block?"
    back: "Self-attention - tokens gather information from each other; and MLP (feed-forward) - a small network processing each position independently. Both wrapped in residual connections and normalization."
    tags: [block]
  - id: transformer-03
    front: "Where in a block do tokens exchange information?"
    back: "Only in self-attention. The MLP works per position in isolation and does not look at neighbors - it only transforms what attention already collected."
    tags: [block]
  - id: transformer-04
    front: "What is a residual connection and why is it needed?"
    back: "A shortcut adding the operation input to its output: y = x + f(x). It gives gradients a direct path; without it deep stacks barely train as gradients vanish."
    tags: [residual]
  - id: transformer-05
    front: "What is the residual stream metaphor?"
    back: "A wide data bus through all blocks. Each block reads it and adds an update instead of replacing the stream. Attention and MLP are amendments, not rewrites."
    tags: [residual]
  - id: transformer-06
    front: "Why layer normalization in a block?"
    back: "It stabilizes activation scale as values pass through many layers. Modern models often use pre-norm (normalize before the sublayer) for stabler training."
    tags: [norm]
  - id: transformer-07
    front: "Why stack many blocks?"
    back: "One block does little. Lower layers catch local patterns, upper layers abstract and long-range ones. Depth builds richer text representations. Each block has its own weights."
    tags: [depth]
  - id: transformer-08
    front: "Are tokens processed sequentially inside a block?"
    back: "No. Attention processes all context tokens in parallel - that made training huge models practical. Only autoregressive generation steps are sequential, not in-step context processing."
    tags: [parallelism]
  - id: transformer-09
    front: "Is the MLP a minor detail?"
    back: "No. MLP holds a large share of parameters and compute; much knowledge likely lives there. Attention gathers; MLP transforms."
    tags: [mlp]
  - id: transformer-10
    front: "Why are generative LLMs decoder-only with causal attention?"
    back: "Causal attention forbids looking at future tokens to the right. That is required for honest next-token prediction: the model must not peek at the answer."
    tags: [decoder]
