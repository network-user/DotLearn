conceptId: sampling
cards:
  - id: sampling-01
    front: "What is decoding (sampling) and is it part of the network?"
    back: "How a probability distribution becomes one token. It is not inside the network: the model outputs probabilities; request settings choose the token. Same probabilities, different settings, different answers."
    tags: [basics]
  - id: sampling-02
    front: "How does greedy decoding differ from random sampling?"
    back: "Greedy always takes the top token - deterministic but repetitive. Sampling draws proportional to probability: more variety, more risk."
    tags: [greedy]
  - id: sampling-03
    front: "What does temperature do to a distribution?"
    back: "Divides logits by T before softmax. T<1 sharpens (almost deterministic), T>1 flattens (rare tokens gain chance). Token rank order is unchanged."
    tags: [temperature]
  - id: sampling-04
    front: "What does temperature 0 mean in practice?"
    back: "Formally division by zero, so by convention T=0 means greedy - always the most probable token. Convention, not literal softmax substitution."
    tags: [temperature]
  - id: sampling-05
    front: "How does top-k work?"
    back: "Keep only the k most probable tokens, zero the rest, renormalize survivors to sum to one, then sample among them. Smaller k is safer and duller."
    tags: [topk]
  - id: sampling-06
    front: "How does top-p (nucleus sampling) work?"
    back: "Sort tokens by probability and keep the smallest set whose total mass reaches threshold p (e.g. 0.9). Nucleus size adapts to model confidence."
    tags: [topp]
  - id: sampling-07
    front: "How do top-k and top-p differ?"
    back: "top-k keeps a fixed count regardless of distribution shape. top-p keeps a variable count tuned to confidence: sharp distribution - one or two tokens; flat - more."
    tags: [topk, topp]
  - id: sampling-08
    front: "Does low temperature make answers more correct?"
    back: "No, more predictable. Useful for facts, but for ideation hard determinism breeds repeats and clichés. No universal best temperature - task dependent."
    tags: [pitfalls]
  - id: sampling-09
    front: "Why change sampling parameters one at a time?"
    back: "High temperature, large top-k, and high top-p compound into incoherence. Changing one knob at a time clarifies what moved the output."
    tags: [pitfalls]
  - id: sampling-10
    front: "Why do chat models usually sample instead of greedy or beam search?"
    back: "Greedy is myopic and loops; beam search for open generation is repetitive and bland. Temperature plus nucleus yields livelier text, so it is the chat default."
    tags: [beam]
