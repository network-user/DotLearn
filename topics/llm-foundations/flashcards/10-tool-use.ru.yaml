conceptId: tool-use
cards:
  - id: tool-use-01
    front: "Что такое вызов инструментов (tool use, function calling)?"
    back: "Механизм, превращающий «продолжатель текста» в систему, способную действовать: модель не выполняет инструмент сама, а выдаёт структурированный запрос «хочу вызвать инструмент X с такими аргументами». Исполняет вызов Ваш код."
    tags: [tool-use]
  - id: tool-use-02
    front: "Зачем модели вообще инструменты, если она «всё знает»?"
    back: "Она знает только то, что было в данных до даты отсечки, и сама ничего не выполняет: не видит свежей погоды, не читает Вашу базу, не отправляет письма. Инструменты дают ей доступ к актуальным данным и возможность действовать."
    tags: [tool-use]
  - id: tool-use-03
    front: "Из чего состоит описание инструмента?"
    back: "Имя, человекочитаемое описание (зачем он и когда его звать) и JSON-схема аргументов - какие параметры, каких типов, какие обязательны. По описанию модель решает, подходит ли инструмент под запрос."
    tags: [schema]
  - id: tool-use-04
    front: "Почему описание инструмента так важно?"
    back: "Именно по нему модель решает, звать ли инструмент. Расплывчатое описание - главная причина вызовов невпопад. Будьте прескриптивны: пишите не только что инструмент делает, но и когда его звать."
    tags: [schema]
  - id: tool-use-05
    front: "Что гарантирует JSON-схема аргументов?"
    back: "Контракт на форму: модель вернёт аргументы в заданном виде - нужные поля нужных типов с нужными именами (city придёт строкой, а не числом). Форму вывода она ограничивает, но правильный выбор инструмента не гарантирует."
    tags: [schema]
  - id: tool-use-06
    front: "Как модель решает, вызвать инструмент или ответить сама?"
    back: "По смыслу запроса и по описаниям инструментов. «Сколько 2+2» - ответит сама; «какая погода в Париже» при наличии get_weather - запросит вызов, потому что погода ей неизвестна."
    tags: [decision]
  - id: tool-use-07
    front: "Что такое структурированный вывод (structured output)?"
    back: "Требование выдать ответ в заданной JSON-схеме, а не свободным текстом. Удобно, когда ответ нужно разобрать программно. Тот же приём с JSON-схемой работает и для аргументов инструмента, и для финального ответа."
    tags: [structured-output]
  - id: tool-use-08
    front: "Как работает агентный цикл?"
    back: "Модель → вызов инструмента → результат → снова модель → … → ответ. Цикл крутится, пока модель не соберёт достаточно и не выдаст финальный текст вместо очередного вызова. Так из «продолжателя токенов» вырастает система многошаговых действий."
    tags: [agent-loop]
  - id: tool-use-09
    front: "Кто исполняет вызов инструмента и возвращает результат?"
    back: "Ваш код (или платформа), а не модель. Модель выдаёт запрос вызова, код сопоставляет имя с реальной функцией, подставляет аргументы, исполняет и подаёт результат модели обратно как «наблюдение»."
    tags: [dispatch]
  - id: tool-use-10
    front: "Почему вызов инструмента - это запрос, а не гарантия?"
    back: "Модель может ошибиться: позвать не тот инструмент, придумать аргумент или ответить сама там, где стоило позвать. Поэтому имя и аргументы проверяет Ваш код, а на ошибку отвечает понятным сообщением, чтобы модель поправилась."
    tags: [reliability]
  - id: tool-use-11
    front: "Что определяет качество агента помимо самой модели?"
    back: "Насколько аккуратно описаны инструменты и обработаны их результаты. Кривое описание - вызов невпопад; кривой результат инструмента - кривой ответ. Инструменты не делают модель всеведущей."
    tags: [reliability]
  - id: tool-use-12
    front: "Что значит, что модель может «галлюцинировать» вызов?"
    back: "Придумать имя инструмента, которого нет, или аргумент не из схемы. Поэтому код обязан валидировать имя и аргументы перед исполнением, а при ошибке вернуть модели понятное сообщение для исправления."
    tags: [reliability]
