conceptId: attention
cards:
  - id: attention-01
    front: "What does attention do?"
    back: "Lets each token decide which other tokens to look at and how strongly, then gather information from them. Links are learned, not hand-written."
    tags: [basics]
  - id: attention-02
    front: "What are query, key, and value?"
    back: "Three vectors of the same token from three learned matrices. Query is what it seeks, key is how it advertises itself, value is what it contributes if selected."
    tags: [qkv]
  - id: attention-03
    front: "How is query-key compatibility scored?"
    back: "Dot product. More aligned query and key yield a higher score. One query against many keys gives raw scores, not yet probabilities."
    tags: [score]
  - id: attention-04
    front: "Why divide scores by sqrt(dimension)?"
    back: "At large dimension dot products grow and softmax saturates on one token while gradients vanish. Scaling restores a stable score range - scaled dot-product attention."
    tags: [scaling]
  - id: attention-05
    front: "What does softmax do in attention?"
    back: "Turns scaled scores into attention weights - nonnegative numbers summing to one. Each weight says how much of that token value to take."
    tags: [softmax]
  - id: attention-06
    front: "What is the attention output for a token?"
    back: "A weighted sum of all values where weights are the post-softmax attention distribution. Tokens with matching keys contribute more."
    tags: [output]
  - id: attention-07
    front: "What is multi-head attention?"
    back: "Several attention heads in one block with different Q/K/V matrices running in parallel. One head may track syntax, another long-range links. Results are combined."
    tags: [multihead]
  - id: attention-08
    front: "Why does attention make long context expensive?"
    back: "Every token compares to every token, so compute grows roughly with the square of context length. That drives cost and latency of very long prompts."
    tags: [cost]
  - id: attention-09
    front: "Can attention weights explain model decisions?"
    back: "Carefully. Weights show where information was gathered but are not a full or always honest why. Literal interpretation is risky."
    tags: [interpretation]
  - id: attention-10
    front: "What is causal attention?"
    back: "Attention where a token may look only left, not at future tokens. Needed for honest next-token prediction. The upper-right of the heatmap stays empty."
    tags: [causal]
