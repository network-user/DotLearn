conceptId: tokenization
cards:
  - id: tokenization-01
    front: "What is a token?"
    back: "A frequent chunk of text between a letter and a word. Common words become one token; rare ones split into pieces. The model sees numeric token ids, not raw text."
    tags: [basics]
  - id: tokenization-02
    front: "Why subword tokenization instead of words or characters?"
    back: "Words imply an infinite vocabulary and unknown words. Characters make sequences too long. Subword splits the difference: meaningful chunks that compose any word."
    tags: [basics]
  - id: tokenization-03
    front: "How does BPE build a vocabulary?"
    back: "Split words into characters, repeatedly find the most frequent adjacent token pair and merge it into a new token (a merge rule) until the vocabulary reaches target size."
    tags: [bpe]
  - id: tokenization-04
    front: "What does one BPE merge do to a token list?"
    back: "Replace each adjacent pair (a, b) with glued token a+b; leave other tokens unchanged. Each merge shortens the list by exactly one."
    tags: [bpe]
  - id: tokenization-05
    front: "Why count tokens instead of characters or words?"
    back: "Token count drives request cost (billing is almost always per token) and whether text fits the context window. Lots of text is not the same as lots of tokens."
    tags: [counting]
  - id: tokenization-06
    front: "Why is Russian often more expensive in tokens than English?"
    back: "Tokenizers train mostly on English, so English words more often map whole; Russian splits finer - often 1.5-2× more tokens for the same meaning."
    tags: [languages]
  - id: tokenization-07
    front: "Why do models struggle with arithmetic and letter counting?"
    back: "Numbers may split oddly (1234 → 12, 34) and letters inside a token are invisible. The model works on tokens, so per-character tasks are unnatural."
    tags: [pitfalls]
  - id: tokenization-08
    front: "Do spaces and case affect tokenization?"
    back: "Yes. hello, Hello, and leading-space variants often tokenize differently because tokens often include a leading space and case changes the character sequence. Format can surprise you."
    tags: [pitfalls]
  - id: tokenization-09
    front: "Does tokenization learn at inference time?"
    back: "No. Vocabulary and merge rules are built once on a corpus; at runtime the tokenizer only applies fixed rules both ways: text ↔ ids."
    tags: [bpe]
  - id: tokenization-10
    front: "How do BPE, WordPiece, and Unigram differ?"
    back: "BPE merges the most frequent pair. WordPiece picks the pair that most improves corpus likelihood. Unigram starts large and prunes weak tokens. All yield similar subword vocabularies."
    tags: [variants]
