conceptId: what-is-llm
cards:
  - id: what-is-llm-01
    front: "What does an LLM do on a single step?"
    back: "It takes a token sequence and outputs a probability distribution over the next token - one number per vocabulary token, summing to one after normalization. Sampling then draws one token from that distribution."
    tags: [basics]
  - id: what-is-llm-02
    front: "What is autoregressive generation?"
    back: "How a long answer is built: predict a token, append it to the input, feed everything back into the same model, get the next token. The model conditions on its own prior output, so text flows one token per step."
    tags: [autoregression]
  - id: what-is-llm-03
    front: "Why does the same question get different answers?"
    back: "Sampling randomness: the output is a distribution and tokens are drawn probabilistically. Greedy decoding takes the max and is deterministic but often duller and prone to loops."
    tags: [sampling]
  - id: what-is-llm-04
    front: "Why use softmax during generation?"
    back: "Logits are arbitrary numbers (even negative); you cannot read probabilities from them directly. Softmax exponentiates and normalizes logits into a distribution that sums to one."
    tags: [softmax]
  - id: what-is-llm-05
    front: "Why subtract the max logit before softmax?"
    back: "Numerical stability: exp of large values overflows. Subtracting the max makes all exp arguments non-positive without changing the final probabilities."
    tags: [softmax]
  - id: what-is-llm-06
    front: "Is there a fact database inside an LLM?"
    back: "No. Knowledge lives in billions of weights from training and appears only as shifts in token probabilities. The model can confidently continue a plausible but false fact."
    tags: [knowledge]
  - id: what-is-llm-07
    front: "What is a model hallucination and why does it happen?"
    back: "Confident-sounding but wrong text. It is not a bug: the mechanism predicts plausible continuations, and plausible is not always true."
    tags: [hallucination]
  - id: what-is-llm-08
    front: "What counts as one generation step?"
    back: "One full forward pass over the current context yielding one distribution and one new token. In practice KV caching avoids recomputing already-seen tokens."
    tags: [internals]
  - id: what-is-llm-09
    front: "Does greedy decoding mean the model is confident?"
    back: "No. Greedy only takes the distribution maximum. The model can be nearly tied (e.g. 0.34 vs 0.33) yet output a single token."
    tags: [sampling]
  - id: what-is-llm-10
    front: "Are bigger models always smarter?"
    back: "Size helps but does not decide everything. Data quality, training, and fine-tuning (SFT, RLHF/DPO) matter as much, so a smaller but better-trained model can beat a larger one."
    tags: [scaling]
