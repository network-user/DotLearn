conceptId: tool-use
cards:
  - id: tool-use-01
    front: "What is tool use (function calling)?"
    back: "Turning a text continuer into a system that can act: the model emits a structured request to call tool X with args; your code executes it."
    tags: [tool-use]
  - id: tool-use-02
    front: "Why tools if the model knows everything?"
    back: "It only knows pre-cutoff training data and cannot act: no live weather, your DB, or email. Tools supply fresh data and hands."
    tags: [tool-use]
  - id: tool-use-03
    front: "What defines a tool?"
    back: "Name, human description (what and when to call), and JSON schema for arguments (types, required fields). The model uses the description to decide fit."
    tags: [schema]
  - id: tool-use-04
    front: "Why does the tool description matter?"
    back: "The model decides whether to call from the description. Vague text causes wrong-time or missed calls. Be prescriptive about when to invoke."
    tags: [schema]
  - id: tool-use-05
    front: "What does the argument JSON schema guarantee?"
    back: "Shape contract: required fields of required types with required names (city as string named city). It bounds form, not correct tool choice."
    tags: [schema]
  - id: tool-use-06
    front: "How does the model choose tool vs plain answer?"
    back: "From query meaning and tool descriptions. 2+2 it answers; Paris weather with get_weather it requests a call because weather is unknown."
    tags: [decision]
  - id: tool-use-07
    front: "What is structured output?"
    back: "Force the reply into a JSON schema instead of free text. Useful for programmatic parsing. Same schema pattern as tool arguments and final answers."
    tags: [structured-output]
  - id: tool-use-08
    front: "How does the agent loop work?"
    back: "Model → tool call → result → model → … → answer. Loops until enough context is gathered and the model outputs text instead of another call."
    tags: [agent-loop]
  - id: tool-use-09
    front: "Who runs the tool and returns results?"
    back: "Your code or platform, not the model. The model requests; code maps name to function, runs args, feeds back an observation."
    tags: [dispatch]
  - id: tool-use-10
    front: "Why is a tool call a request, not a guarantee?"
    back: "The model can pick the wrong tool, bad args, or skip a needed call. Code validates name and args and returns clear errors for correction."
    tags: [reliability]
  - id: tool-use-11
    front: "What affects agent quality besides the model?"
    back: "Tool descriptions and result handling. Bad descriptions → wrong calls; bad tool output → bad answers. Tools do not make the model omniscient."
    tags: [reliability]
  - id: tool-use-12
    front: "What is a hallucinated tool call?"
    back: "Inventing a tool name or args outside the schema. Code must validate before execution and return an error message the model can fix on the next turn."
    tags: [reliability]
