conceptId: mcp
cards:
  - id: mcp-01
    front: "What is Model Context Protocol (MCP)?"
    back: "A standard so any client talks to any server, turning N×M bespoke integrations into N+M. One plug instead of hundreds of adapters - like USB or HTTP for model capabilities."
    tags: [mcp]
  - id: mcp-02
    front: "Why a standard like MCP?"
    back: "Before it every app-service pair was custom auth, format, and errors. Write an MCP server once and any compatible client attaches without redoing the integration."
    tags: [mcp]
  - id: mcp-03
    front: "What are the three MCP roles?"
    back: "Host - app with the model (chat, IDE, agent). MCP client - protocol speaker inside the host. MCP server - separate program exposing concrete capabilities (files, GitHub, DB)."
    tags: [roles]
  - id: mcp-04
    front: "What does an MCP server expose?"
    back: "Tools (actions the model calls), resources (data to read into context), prompts (reusable scenario templates). Any combination of the three."
    tags: [capabilities]
  - id: mcp-05
    front: "How do MCP tools differ from resources?"
    back: "Tools act (create issue, write file) and the model chooses them. Resources supply readable data (file, DB row) and are usually attached by user or host. Tools do; resources let you read."
    tags: [capabilities]
  - id: mcp-06
    front: "What are MCP prompts?"
    back: "Reusable interaction templates the server offers the user, e.g. run a structured code review on a file. Scenarios the user launches deliberately."
    tags: [capabilities]
  - id: mcp-07
    front: "What transport does MCP use?"
    back: "JSON-RPC over stdio (local process via stdin/stdout) or HTTP (remote service). Same logic, different pipe."
    tags: [transport]
  - id: mcp-08
    front: "What is JSON-RPC in MCP?"
    back: "Request with method name and params → response. Example: tools/call with tool name and args; server replies with the same id."
    tags: [transport]
  - id: mcp-09
    front: "How does MCP differ from function calling?"
    back: "Function calling is the in-API how the model requests a call. MCP is the portable standard for plugging in external tool and data sources. Different layers, not competitors."
    tags: [vs-function-calling]
  - id: mcp-10
    front: "How do MCP and function calling work together?"
    back: "MCP server declares tools, host exposes them, model invokes via function calling, results return through the protocol. MCP sources capabilities; function calling consumes them."
    tags: [vs-function-calling]
  - id: mcp-11
    front: "Does MCP make integration automatically safe?"
    back: "No. A server gets access to your data and actions; an unvetted server enters your context. The standard unifies wiring; trust is yours to verify."
    tags: [safety]
  - id: mcp-12
    front: "Does an MCP server teach the model new skills?"
    back: "No. It only exposes capabilities; the model still decides whether to call tools and how to use resources, with all the usual call-reliability caveats."
    tags: [safety]
