conceptId: mcp
cards:
  - id: mcp-01
    front: "Что такое Model Context Protocol (MCP)?"
    back: "Стандарт, по которому любой клиент общается с любым сервером, превращая N×M самодельных интеграций в N+M. Один разъём вместо сотни переходников - как USB или HTTP для возможностей модели."
    tags: [mcp]
  - id: mcp-02
    front: "Зачем нужен стандарт вроде MCP?"
    back: "До стандарта каждая связка «приложение - сервис» писалась вручную: своя авторизация, формат, обработка ошибок. Написал MCP-сервер один раз - и к нему подключается любой совместимый клиент без повтора интеграции."
    tags: [mcp]
  - id: mcp-03
    front: "Какие три роли есть в MCP?"
    back: "Хост - приложение с моделью (чат-клиент, IDE, агент). MCP-клиент - часть хоста, говорящая на протоколе. MCP-сервер - отдельная программа, предоставляющая конкретные возможности (файлы, GitHub, база)."
    tags: [roles]
  - id: mcp-04
    front: "Что выставляет наружу MCP-сервер?"
    back: "Tools (действия, которые вызывает модель), resources (данные для чтения в контекст) и prompts (готовые шаблоны сценариев). Сервер может предоставлять любую комбинацию этих трёх."
    tags: [capabilities]
  - id: mcp-05
    front: "Чем tools отличаются от resources в MCP?"
    back: "Инструмент совершает действие (создать issue, записать файл) и его выбирает модель. Ресурс предоставляет данные для чтения (файл, запись в базе) и его обычно подключает пользователь или хост. Инструмент «делает», ресурс «даёт прочитать»."
    tags: [capabilities]
  - id: mcp-06
    front: "Что такое prompts как возможность MCP-сервера?"
    back: "Готовые шаблоны взаимодействия, которые сервер предлагает пользователю - например, «сделай code review этого файла» с уже выстроенной структурой запроса. Переиспользуемые сценарии, запускаемые осознанно."
    tags: [capabilities]
  - id: mcp-07
    front: "На каком транспорте работает MCP?"
    back: "Сообщения идут в формате JSON-RPC поверх stdio (сервер - локальный процесс, общение через стандартный ввод/вывод) или HTTP (сервер - удалённый сетевой сервис). Логика одна, меняется лишь «труба»."
    tags: [transport]
  - id: mcp-08
    front: "Что такое JSON-RPC в контексте MCP?"
    back: "Простой протокол «запрос с именем метода и параметрами → ответ». Например, метод tools/call с именем инструмента и аргументами; сервер исполняет вызов и возвращает ответ с тем же id."
    tags: [transport]
  - id: mcp-09
    front: "Чем MCP отличается от function calling?"
    back: "Function calling - механизм внутри одного API-вызова (как модель просит вызов). MCP - стандарт подключения внешних источников инструментов и данных, переносимый между приложениями. Разные слои, а не конкуренты."
    tags: [vs-function-calling]
  - id: mcp-10
    front: "Как MCP и function calling работают вместе?"
    back: "MCP-сервер объявляет инструмент, хост передаёт его модели, модель вызывает обычным function calling, результат возвращается через тот же протокол. MCP стандартизирует, откуда берутся функции; использует их модель привычным механизмом."
    tags: [vs-function-calling]
  - id: mcp-11
    front: "Делает ли MCP интеграцию безопасной автоматически?"
    back: "Нет. MCP-сервер - это код с доступом к Вашим данным и действиям; подключив непроверенный сервер, Вы пускаете его в свой контекст. Стандарт унифицирует подключение, но доверие к серверу - отдельный вопрос."
    tags: [safety]
  - id: mcp-12
    front: "Учит ли MCP-сервер модель чему-то новому?"
    back: "Нет. Сервер лишь предоставляет возможности; решает, звать ли инструмент и как распорядиться ресурсом, по-прежнему модель - со всеми оговорками про ошибочные и галлюцинированные вызовы."
    tags: [safety]
