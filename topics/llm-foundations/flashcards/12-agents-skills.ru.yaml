conceptId: agents-skills
cards:
  - id: agents-skills-01
    front: "Что такое агент?"
    back: "Обычная языковая модель, помещённая в цикл с целью, инструментами и памятью. На каждом витке она планирует шаг, вызывает инструмент, наблюдает результат и повторяет, удерживая цель много шагов. Это не новая модель и не новая архитектура."
    tags: [agent]
  - id: agents-skills-02
    front: "Чем работа агента отличается от простого ответа?"
    back: "Цель задаётся один раз и держится много шагов, модель сама планирует последовательность действий, и она использует инструменты, чтобы менять мир и собирать сведения, а не только говорить."
    tags: [agent]
  - id: agents-skills-03
    front: "Что такое навыки (skills)?"
    back: "Переиспользуемые пакеты инструкций и умений, которые модель подгружает только когда они нужны. Прогрессивное раскрытие: в контексте висит короткое описание, а полную инструкцию модель читает по необходимости."
    tags: [skills]
  - id: agents-skills-04
    front: "Чем навык отличается от инструмента?"
    back: "Инструмент даёт новое действие («что вызвать», function calling). Навык даёт переиспользуемую инструкцию или процедуру («как делать»). Часто навык описывает, как грамотно пользоваться набором инструментов под задачу."
    tags: [skills]
  - id: agents-skills-05
    front: "Зачем нужно прогрессивное раскрытие навыков?"
    back: "Запихнуть все инструкции в системный промпт расточительно: он раздувается, и большая часть нерелевантна текущей задаче. Короткое описание в контексте плюс полная инструкция по требованию держат базовый контекст компактным."
    tags: [skills]
  - id: agents-skills-06
    front: "Какие два вида памяти у агента?"
    back: "Краткосрочная - контекстное окно: что модель видит сейчас, быстрая, но конечная и эфемерная. Долговременная - внешнее хранилище (файлы, база, векторный индекс): переживает сессии и достаётся по запросу."
    tags: [memory]
  - id: agents-skills-07
    front: "Чем краткосрочная память принципиально отличается от долговременной?"
    back: "Контекст быстрый, но конечный и исчезает с сессией: вытесненное из окна для модели пропало. Внешняя память не ограничена окном и переживает сессии, но агент сам решает, что сохранить и что достать."
    tags: [memory]
  - id: agents-skills-08
    front: "Что значит «хорошая память агента - не помнить всё»?"
    back: "Это умение решать, что сохранить во внешнюю память и что достать обратно в контекст в нужный момент. Контекст дефицитен; мастерство - подтянуть нужный кусок, а не хранить всё подряд в окне."
    tags: [memory]
  - id: agents-skills-09
    front: "Как устроена мультиагентная система?"
    back: "Задачу делят между несколькими агентами с ролями: координатор дробит задачу и раздаёт подзадачи специализированным агентам (поиск, код, проверка), затем собирает результаты. Каждый под-агент работает в своём контексте."
    tags: [multiagent]
  - id: agents-skills-10
    front: "В чём выигрыш и плата мультиагентности?"
    back: "Выигрыш - специализация и параллелизм: узкие агенты часто лучше «универсала», независимые подзадачи идут одновременно. Плата - сложность, стоимость (каждый агент тратит токены) и риск накопления ошибок по цепочке."
    tags: [multiagent]
  - id: agents-skills-11
    front: "Почему риски усиливаются в агентном цикле?"
    back: "Ошибка на раннем шаге попадает в наблюдения, влияет на следующее решение и может увести весь ход в сторону. Чем длиннее автономный цикл, тем выше риск. Нужны лимиты шагов, подтверждение опасных действий, проверки результата."
    tags: [risks]
  - id: agents-skills-12
    front: "Почему автономность агента дорого стоит?"
    back: "Каждый виток цикла, каждый под-агент и каждое обращение к памяти - это токены и деньги. Агент, бодро крутящий цикл, способен сжечь бюджет незаметно. Автономность стоит дороже одного ответа - это нужно закладывать."
    tags: [risks]
