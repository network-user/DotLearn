conceptId: embeddings-context
cards:
  - id: embeddings-context-01
    front: "Что такое эмбеддинг токена?"
    back: "Вектор фиксированной длины - координаты токена в пространстве смыслов. Сам по себе один вектор ничего не значит; смысл рождается из взаимного расположения: близкие по смыслу токены лежат рядом."
    tags: [embeddings]
  - id: embeddings-context-02
    front: "Почему похожие слова оказываются рядом в пространстве эмбеддингов?"
    back: "Это возникает само при обучении: слова, встречающиеся в похожем окружении, сдвигаются в близкие точки. Геометрическая близость начинает отражать смысловую, отсюда и арифметика вида «король - мужчина + женщина ≈ королева»."
    tags: [embeddings]
  - id: embeddings-context-03
    front: "Зачем нужно позиционное кодирование?"
    back: "Само внимание не различает порядок токенов - для него это «мешок токенов». Позиционная информация, добавленная к эмбеддингу, говорит модели, на каком месте стоит токен, и превращает мешок в последовательность."
    tags: [position]
  - id: embeddings-context-04
    front: "Что такое RoPE?"
    back: "Rotary positional embeddings - способ кодировать позицию не прибавлением вектора, а поворотом. Помогает модели лучше обобщаться на длины контекста, которых не было в обучении. Распространён в современных моделях."
    tags: [position]
  - id: embeddings-context-05
    front: "Что измеряет косинусная близость и какова её шкала?"
    back: "Косинус угла между двумя векторами: 1 для сонаправленных, 0 для перпендикулярных, -1 для противоположных. Длина векторов не важна, важно только направление."
    tags: [cosine]
  - id: embeddings-context-06
    front: "Как считается косинусная близость?"
    back: "Скалярное произведение векторов делить на произведение их длин (норм). Норма вектора - корень из суммы квадратов координат. Числитель растёт при сонаправленности, деление на длины убирает влияние масштаба."
    tags: [cosine]
  - id: embeddings-context-07
    front: "Что такое контекстное окно?"
    back: "Жёсткий предел числа токенов, которые модель удерживает одновременно. Всё, что не влезло, вытесняется и для модели перестаёт существовать. В 2026 окна доходят до сотен тысяч и миллионов токенов, но предел есть всегда."
    tags: [context]
  - id: embeddings-context-08
    front: "Что происходит, когда текст не помещается в контекстное окно?"
    back: "Самые старые токены механически вытесняются (truncation) - по токенам с края окна, без понимания смысла. В диалоге это значит, что начало очень длинного разговора может «забыться» не из-за поломки, а физически."
    tags: [context]
  - id: embeddings-context-09
    front: "Что такое «потеря в середине» (lost in the middle)?"
    back: "Модели нередко лучше используют начало и конец длинного контекста и хуже - середину. Поэтому важную инструкцию разумнее держать ближе к началу или концу, а не закапывать в центр длинного документа."
    tags: [context]
  - id: embeddings-context-10
    front: "Почему близость эмбеддингов считают косинусом, а не евклидовым расстоянием?"
    back: "Евклидово расстояние чувствительно к длине векторов, а смысл чаще несёт направление, а не норма. Косинус смотрит только на угол и потому устойчивее как мера смысловой близости."
    tags: [cosine]
