conceptId: sampling
cards:
  - id: sampling-01
    front: "Что такое декодирование (сэмплинг) и часть ли это нейросети?"
    back: "Способ превратить распределение вероятностей в один конкретный токен. Это не часть нейросети: модель считает вероятности, а способ выбора задаётся параметрами запроса. Один набор вероятностей при разных настройках даёт разные ответы."
    tags: [basics]
  - id: sampling-02
    front: "Чем greedy decoding отличается от случайного сэмплинга?"
    back: "Greedy всегда берёт самый вероятный токен - детерминированно, но склонно к повторам и зацикливанию. Сэмплинг тянет токен случайно, пропорционально вероятности: разнообразнее, но рискованнее."
    tags: [greedy]
  - id: sampling-03
    front: "Что делает температура с распределением?"
    back: "Делит логиты на T перед softmax. T<1 делает распределение острее (выбор почти детерминированный), T>1 - ровнее (редкие токены получают шанс). Порядок токенов по вероятности температура не меняет."
    tags: [temperature]
  - id: sampling-04
    front: "Что на практике означает температура 0?"
    back: "Формально это деление на ноль, поэтому по соглашению T=0 трактуют как жадный выбор - всегда берётся самый вероятный токен. Это соглашение, а не подстановка в softmax."
    tags: [temperature]
  - id: sampling-05
    front: "Как работает top-k?"
    back: "Оставляет только k самых вероятных токенов, обнуляет остальные и перенормирует выживших, чтобы они снова давали в сумме единицу. Сэмплинг идёт уже только среди оставшихся. Меньше k - безопаснее и однообразнее."
    tags: [topk]
  - id: sampling-06
    front: "Как работает top-p (nucleus sampling)?"
    back: "Сортирует токены по убыванию вероятности и оставляет наименьший набор, чей суммарный вес достигает порога p (например, 0.9). Размер «ядра» подстраивается под уверенность модели сам."
    tags: [topp]
  - id: sampling-07
    front: "В чём разница между top-k и top-p?"
    back: "top-k держит фиксированное число токенов независимо от формы распределения. top-p держит переменное число, подстроенное под уверенность: при остром распределении - один-два токена, при ровном - больше."
    tags: [topk, topp]
  - id: sampling-08
    front: "Делает ли низкая температура ответ «правильнее»?"
    back: "Нет, она делает его более предсказуемым. Для фактических вопросов это часто полезно, но для генерации идей жёсткая детерминированность ведёт к повторам и клише. «Лучшей» температуры в вакууме нет - она зависит от задачи."
    tags: [pitfalls]
  - id: sampling-09
    front: "Почему параметры сэмплинга стоит менять по одному?"
    back: "Высокая температура, большой top-k и высокий top-p усиливают разнообразие совместно, и легко получить бессвязный текст. Меняя по одному параметру, проще понять, что именно повлияло на результат."
    tags: [pitfalls]
  - id: sampling-10
    front: "Почему для чат-моделей обычно используют сэмплинг, а не greedy или beam search?"
    back: "Greedy близорук и зацикливается, а beam search для открытой генерации склонен к повторам и блёклости. Сэмплинг с температурой и nucleus даёт более живой и разнообразный текст, поэтому он по умолчанию в чат-моделях."
    tags: [beam]
