conceptId: transformer
cards:
  - id: transformer-01
    front: "Что такое трансформер в одном предложении?"
    back: "Стопка одинаковых по устройству блоков, где токены обмениваются информацией через механизм внимания, а не обрабатываются рекуррентно по цепочке. Основа всех современных LLM (статья «Attention Is All You Need», 2017)."
    tags: [basics]
  - id: transformer-02
    front: "Из каких двух операций состоит один блок трансформера?"
    back: "Self-attention - токены собирают информацию друг с друга; и MLP (feed-forward) - небольшая полносвязная сеть, обрабатывающая каждую позицию независимо. Обе обёрнуты остаточной связью и нормализацией."
    tags: [block]
  - id: transformer-03
    front: "Где в блоке токены обмениваются информацией?"
    back: "Только в self-attention. MLP работает с каждой позицией изолированно и не смотрит на соседей - он лишь преобразует то, что внимание уже собрало."
    tags: [block]
  - id: transformer-04
    front: "Что такое остаточная связь (residual) и зачем она?"
    back: "Короткая дорога, прибавляющая вход операции к её выходу: y = x + f(x). Даёт градиенту прямой путь сквозь слои; без неё глубокая стопка блоков почти не обучается из-за затухания градиента."
    tags: [residual]
  - id: transformer-05
    front: "Что описывает метафора «остаточного потока» (residual stream)?"
    back: "Широкую шину данных, идущую сквозь все блоки. Каждый блок не заменяет её содержимое, а читает из неё и дописывает свою поправку. Внимание и MLP - дополнения к потоку, а не его замена."
    tags: [residual]
  - id: transformer-06
    front: "Зачем в блоке нормализация слоёв (layer normalization)?"
    back: "Удерживает масштаб активаций стабильным: при проходе через много слоёв значения склонны расти или схлопываться. В современных моделях нормализацию чаще ставят перед операцией (pre-norm) - так обучение устойчивее."
    tags: [norm]
  - id: transformer-07
    front: "Почему блоки складывают в высокую стопку?"
    back: "Один блок умеет немного. Нижние блоки улавливают локальные, поверхностные закономерности, верхние - абстрактные и далёкие. Глубина даёт всё более богатое представление текста. Веса у каждого блока свои."
    tags: [depth]
  - id: transformer-08
    front: "Обрабатываются ли токены внутри блока по очереди?"
    back: "Нет. Внимание обрабатывает все токены контекста параллельно - именно это сделало обучение огромных моделей практичным. По очереди идут только шаги авторегрессивной генерации, а не обработка контекста внутри шага."
    tags: [parallelism]
  - id: transformer-09
    front: "MLP в блоке - второстепенная деталь?"
    back: "Нет. На MLP-часть приходится большая доля параметров и вычислений; по многим данным именно там хранится значительная часть «знаний» модели. Внимание собирает информацию, MLP её преобразует."
    tags: [mlp]
  - id: transformer-10
    front: "Почему генеративные LLM - это decoder-only с causal-вниманием?"
    back: "Causal-внимание запрещает токену смотреть на токены справа (будущие). Это ровно то, что нужно для честного предсказания следующего токена: модель не должна подсматривать ответ."
    tags: [decoder]
