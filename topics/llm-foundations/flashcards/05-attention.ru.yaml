conceptId: attention
cards:
  - id: attention-01
    front: "Что делает механизм внимания?"
    back: "Позволяет каждому токену самому решить, на какие другие токены посмотреть и насколько сильно, а затем собрать с них информацию. Связи не задаются вручную - модель учится им сама."
    tags: [basics]
  - id: attention-02
    front: "Что такое query, key и value?"
    back: "Три разных вектора одного токена из трёх обучаемых матриц. Query - что токен ищет, key - чем токен себя «рекламирует», value - что он отдаёт, если его выберут."
    tags: [qkv]
  - id: attention-03
    front: "Как считается оценка совместимости query и key?"
    back: "Скалярным произведением. Чем более сонаправлены query и key, тем больше произведение, тем выше оценка. Для одного query и набора ключей получается по числу на каждый ключ; это сырые оценки, ещё не вероятности."
    tags: [score]
  - id: attention-04
    front: "Зачем оценки делят на корень из размерности?"
    back: "При большой размерности скалярные произведения велики по модулю, и softmax насыщается в один токен, а градиенты затухают. Деление на корень из размерности возвращает оценкам стабильный масштаб. Отсюда название scaled dot-product."
    tags: [scaling]
  - id: attention-05
    front: "Что делает softmax в механизме внимания?"
    back: "Превращает масштабированные оценки в веса внимания - неотрицательные числа, суммирующиеся в единицу. Каждый вес говорит, какую долю value соответствующего токена забрать."
    tags: [softmax]
  - id: attention-06
    front: "Что такое результат внимания для токена?"
    back: "Взвешенная сумма всех value, где веса - это распределение внимания после softmax. Токен забирает больше от тех, с чьим key сильнее совпал его query."
    tags: [output]
  - id: attention-07
    front: "Что такое multi-head attention?"
    back: "Несколько голов внимания в одном блоке, работающих параллельно с разными матрицами query/key/value. Одна голова может следить за синтаксисом, другая - за дальними связями. Их результаты объединяются."
    tags: [multihead]
  - id: attention-08
    front: "Почему внимание делает длинный контекст дорогим?"
    back: "Каждый токен сравнивается с каждым, поэтому объём вычислений растёт примерно как квадрат длины контекста. Отсюда дороговизна и медленность очень длинных запросов."
    tags: [cost]
  - id: attention-09
    front: "Можно ли читать веса внимания как объяснение решения модели?"
    back: "С осторожностью. Веса показывают, откуда токен собрал информацию, но это не полное и не всегда честное объяснение того, почему модель ответила именно так. Интерпретировать их буквально опасно."
    tags: [interpretation]
  - id: attention-10
    front: "Что такое causal (причинно-следственное) внимание?"
    back: "Внимание, в котором токен может смотреть только на токены слева от себя, не на будущие. Нужно для честного предсказания следующего токена: модель не должна подсматривать ответ. В тепловой карте правый верхний угол при этом пуст."
    tags: [causal]
