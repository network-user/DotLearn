exercises:
  - id: lhf-roles-quiz-001
    concept: loggers-handlers-formatters
    type: theory-quiz
    difficulty: 1
    prompt: "Which of the three pipeline objects decides WHERE a record goes (console, file, network)?"
    choices:
      - id: a
        text: "Logger - the entry point decides the destination."
      - id: b
        text: "Handler - it determines the destination stream or file."
      - id: c
        text: "Formatter - it routes the record to the right place."
      - id: d
        text: "LogRecord - the record itself picks where to go."
    correct: [b]
    explanation: "Logger decides whether to admit by level; Handler decides where it goes; Formatter decides how it looks. Destination is the handler's job."
    variants:
      - prompt: "Which pipeline object turns a record into a formatted string by template?"
        choices:
          - id: a
            text: "Formatter - it formats the record with a template like %s"
          - id: b
            text: "Logger - it assembles the string on entry."
          - id: c
            text: "Handler - it formats text itself."
          - id: d
            text: "basicConfig - it formats all records centrally."
        correct: [a]
        explanation: "Formatter lives on the handler and turns the record object into a string by template. So the same record can look different in console and file."
      - prompt: "Which pipeline object decides whether to admit a record by level?"
        choices:
          - id: a
            text: "Logger - the entry point filters by level first."
          - id: b
            text: "Formatter - it drops low-level records."
          - id: c
            text: "LogRecord - the record checks its own level."
          - id: d
            text: "Stream - the stream drops excess on output."
        correct: [a]
        explanation: "Logger is the entry point: it first decides whether to admit the record by its level, then hands it to handlers."

  - id: lhf-getlogger-002
    concept: loggers-handlers-formatters
    type: predict-output
    difficulty: 1
    prompt: "What does this program print?"
    snippet: |
      import logging

      a = logging.getLogger("shop.orders")
      b = logging.getLogger("shop.orders")
      print(a is b)
    expected:
      kind: stdout
      value: "True"
    variants:
      - snippet: |
          import logging

          a = logging.getLogger("shop.pay")
          b = logging.getLogger("shop.orders")
          print(a is b)
        expected:
          kind: stdout
          value: "False"
      - snippet: |
          import logging

          logger = logging.getLogger("svc.db")
          print(logger.name)
        expected:
          kind: stdout
          value: "svc.db"

  - id: lhf-formatter-003
    concept: loggers-handlers-formatters
    type: predict-output
    difficulty: 2
    prompt: "What does this program print?"
    snippet: |
      import logging
      import sys

      logger = logging.getLogger("shop.pay")
      logger.setLevel(logging.INFO)
      logger.handlers.clear()
      handler = logging.StreamHandler(sys.stdout)
      handler.setFormatter(logging.Formatter("%(levelname)s [%(name)s] %(message)s"))
      logger.addHandler(handler)

      logger.info("payment accepted")
    expected:
      kind: stdout
      value: "INFO [shop.pay] payment accepted"
    hints:
      - "Formatter substitutes record fields into %(...)s placeholders. Which three fields are named and in what order?"
      - "%(levelname)s is the level word, %(name)s is the logger name, %(message)s is the text. Substitute them literally into the template."
    variants:
      - snippet: |
          import logging
          import sys

          logger = logging.getLogger("api")
          logger.setLevel(logging.INFO)
          logger.handlers.clear()
          handler = logging.StreamHandler(sys.stdout)
          handler.setFormatter(logging.Formatter("%(name)s: %(message)s"))
          logger.addHandler(handler)

          logger.warning("slow response")
        expected:
          kind: stdout
          value: "api: slow response"
      - snippet: |
          import logging
          import sys

          logger = logging.getLogger("worker")
          logger.setLevel(logging.INFO)
          logger.handlers.clear()
          handler = logging.StreamHandler(sys.stdout)
          handler.setFormatter(logging.Formatter("[%(levelname)s] %(message)s"))
          logger.addHandler(handler)

          logger.error("task failed")
        expected:
          kind: stdout
          value: "[ERROR] task failed"

  - id: lhf-duplicate-004
    concept: loggers-handlers-formatters
    type: predict-output
    difficulty: 3
    prompt: "What does this program print?"
    snippet: |
      import logging
      import sys

      logger = logging.getLogger("dup")
      logger.setLevel(logging.INFO)
      logger.handlers.clear()
      logger.propagate = False
      logger.addHandler(logging.StreamHandler(sys.stdout))
      logger.addHandler(logging.StreamHandler(sys.stdout))

      logger.info("hello")
    expected:
      kind: stdout
      value: |-
        hello
        hello
    hints:
      - "addHandler accumulates rather than replaces. How many handlers point at the same stream?"
      - "Each of the two handlers receives the record independently and writes its line. propagate = False disabled ancestor copies here."
    variants:
      - snippet: |
          import logging
          import sys

          logger = logging.getLogger("dup3")
          logger.setLevel(logging.INFO)
          logger.handlers.clear()
          logger.propagate = False
          for _ in range(3):
              logger.addHandler(logging.StreamHandler(sys.stdout))

          logger.info("x")
        expected:
          kind: stdout
          value: |-
            x
            x
            x
      - snippet: |
          import logging
          import sys

          logger = logging.getLogger("once")
          logger.setLevel(logging.INFO)
          logger.handlers.clear()
          logger.propagate = False
          logger.addHandler(logging.StreamHandler(sys.stdout))

          logger.info("one")
        expected:
          kind: stdout
          value: |-
            one

  - id: lhf-build-pipeline-005
    concept: loggers-handlers-formatters
    type: python-function
    difficulty: 3
    prompt: "Implement `build_logger(name, stream)`: create a logger with the given name, level INFO, propagation off, clear its handlers, attach one StreamHandler on the passed stream with format '%(levelname)s:%(message)s', and return the logger. Tests write to the stream and read the result."
    starter: |
      import logging

      def build_logger(name, stream):
          ...
    cases:
      - call: "(lambda: (lambda io: (build_logger('t1', io).info('hi'), io.getvalue().strip())[1])(__import__('io').StringIO()))()"
        expect: "INFO:hi"
      - call: "(lambda: (lambda io: (build_logger('t2', io).warning('boom'), io.getvalue().strip())[1])(__import__('io').StringIO()))()"
        expect: "WARNING:boom"
      - call: "(lambda: (lambda io: (build_logger('t3', io).debug('quiet'), io.getvalue().strip())[1])(__import__('io').StringIO()))()"
        expect: ""
    hints:
      - "Build the pipeline from three parts: logger as entry, handler as destination, formatter as presentation. In what order do you wire them?"
      - "Clear logger.handlers before adding, or repeat calls duplicate output. DEBUG is below INFO and should not appear."
      - "Set the formatter template via handler.setFormatter(logging.Formatter(...)). Set logger.propagate = False so the record does not duplicate via root."
    solution: |
      import logging

      def build_logger(name, stream):
          logger = logging.getLogger(name)
          logger.setLevel(logging.INFO)
          logger.propagate = False
          logger.handlers.clear()
          handler = logging.StreamHandler(stream)
          handler.setFormatter(logging.Formatter("%(levelname)s:%(message)s"))
          logger.addHandler(handler)
          return logger
