exercises:
  - id: levels-prop-quiz-001
    concept: levels-propagation
    type: theory-quiz
    difficulty: 1
    prompt: "What does a dot in a logger name mean, for example in shop.pay?"
    choices:
      - id: a
        text: "Tree parentage: shop.pay is a child of shop, and shop is a child"
      - id: b
        text: "Nothing special, just part of the name string with no effect."
      - id: c
        text: "Severity: more dots mean a higher level."
      - id: d
        text: "The filename this logger will write to."
    correct: [a]
    explanation: "The dot declares hierarchy. shop.pay inherits from shop, shop from root. That parentage controls effective level and propagation to ancestor handlers."
    variants:
      - prompt: "How is the effective level found for a logger whose own level is unset (NOTSET)?"
        choices:
          - id: a
            text: "Walk up the tree to the nearest ancestor with a set level."
          - id: b
            text: "Always use DEBUG as the default."
          - id: c
            text: "Take the level of the noisiest child logger."
          - id: d
            text: "Drop the record until a level is set explicitly."
        correct: [a]
        explanation: "With NOTSET the logger climbs to the first ancestor with a set level and inherits it. One setLevel on a parent covers the whole subtree."
      - prompt: "What does a record that passed the level filter do by default?"
        choices:
          - id: a
            text: "Goes to this logger's handlers and propagates to ancestor"
          - id: b
            text: "Goes only to this logger's handlers and nowhere else."
          - id: c
            text: "Writes straight to a file, bypassing handlers."
          - id: d
            text: "Returns to child loggers."
        correct: [a]
        explanation: "Propagation is on by default: the record is handed to this logger's handlers, then climbs to ancestors. One handler on the root can serve the whole tree."

  - id: levels-prop-effective-002
    concept: levels-propagation
    type: predict-output
    difficulty: 2
    prompt: "What does this program print?"
    snippet: |
      import logging

      logging.getLogger("shop").setLevel(logging.WARNING)
      child = logging.getLogger("shop.pay")

      print(child.level)
      print(logging.getLevelName(child.getEffectiveLevel()))
    expected:
      kind: stdout
      value: |-
        0
        WARNING
    hints:
      - "Nobody set child's own level. What numeric value is NOTSET and where does the effective level come from then?"
      - "child.level is the own level (NOTSET = 0). Effective climbs to shop where WARNING is set."
    variants:
      - snippet: |
          import logging

          logging.getLogger("svc").setLevel(logging.ERROR)
          child = logging.getLogger("svc.db")

          print(child.level)
          print(logging.getLevelName(child.getEffectiveLevel()))
        expected:
          kind: stdout
          value: |-
            0
            ERROR
      - snippet: |
          import logging

          parent = logging.getLogger("app")
          parent.setLevel(logging.INFO)
          child = logging.getLogger("app.worker")
          child.setLevel(logging.DEBUG)

          print(logging.getLevelName(child.getEffectiveLevel()))
        expected:
          kind: stdout
          value: "DEBUG"

  - id: levels-prop-propagate-003
    concept: levels-propagation
    type: predict-output
    difficulty: 2
    prompt: "What does this program print?"
    snippet: |
      import logging
      import sys

      parent = logging.getLogger("svc")
      parent.setLevel(logging.INFO)
      parent.handlers.clear()
      parent.propagate = False
      parent.addHandler(logging.StreamHandler(sys.stdout))

      child = logging.getLogger("svc.db")
      child.handlers.clear()
      child.info("child without its own handler")
    expected:
      kind: stdout
      value: "child without its own handler"
    hints:
      - "child has no handler. Through whose handler does its record exit and why?"
      - "child's record passes the filter and propagates to svc where the only handler sits."
    variants:
      - snippet: |
          import logging
          import sys

          root = logging.getLogger()
          root.handlers.clear()
          root.addHandler(logging.StreamHandler(sys.stdout))

          quiet = logging.getLogger("quiet")
          quiet.setLevel(logging.INFO)
          quiet.handlers.clear()
          quiet.propagate = False

          quiet.info("I will not climb to root")
        expected:
          kind: stdout
          value: ""
      - snippet: |
          import logging
          import sys

          parent = logging.getLogger("net")
          parent.setLevel(logging.INFO)
          parent.handlers.clear()
          parent.propagate = False
          parent.addHandler(logging.StreamHandler(sys.stdout))

          child = logging.getLogger("net.http")
          child.handlers.clear()
          child.debug("too quiet for INFO")
        expected:
          kind: stdout
          value: ""

  - id: levels-prop-two-filters-004
    concept: levels-propagation
    type: predict-output
    difficulty: 3
    prompt: "What does this program print?"
    snippet: |
      import logging
      import sys

      logger = logging.getLogger("two.filters")
      logger.setLevel(logging.DEBUG)
      logger.handlers.clear()
      logger.propagate = False
      handler = logging.StreamHandler(sys.stdout)
      handler.setLevel(logging.WARNING)
      logger.addHandler(handler)

      logger.debug("passed logger, not handler")
      logger.warning("passed both filters")
    expected:
      kind: stdout
      value: "passed both filters"
    hints:
      - "There are two filters: logger level and handler level. The record must pass both. Which call hits the handler at WARNING?"
      - "logger admits DEBUG and above, but the handler admits only WARNING and above. debug passes the first barrier and stops at the second."
    variants:
      - snippet: |
          import logging
          import sys

          logger = logging.getLogger("two.b")
          logger.setLevel(logging.DEBUG)
          logger.handlers.clear()
          logger.propagate = False
          handler = logging.StreamHandler(sys.stdout)
          handler.setLevel(logging.ERROR)
          logger.addHandler(handler)

          logger.warning("will not pass handler")
          logger.error("passes both")
        expected:
          kind: stdout
          value: "passes both"
      - snippet: |
          import logging
          import sys

          logger = logging.getLogger("two.c")
          logger.setLevel(logging.WARNING)
          logger.handlers.clear()
          logger.propagate = False
          handler = logging.StreamHandler(sys.stdout)
          handler.setLevel(logging.DEBUG)
          logger.addHandler(handler)

          logger.info("blocked at logger")
          logger.warning("passes both")
        expected:
          kind: stdout
          value: "passes both"

  - id: levels-prop-effective-fn-005
    concept: levels-propagation
    type: python-function
    difficulty: 3
    prompt: "Implement `effective_level(levels, name)`: levels maps logger name to its set numeric level (loggers missing from the dict are NOTSET). Names are hierarchical via dots; root is ''. Return the effective level for name: its own level if set, otherwise the nearest ancestor up the tree with a set level."
    starter: |
      def effective_level(levels, name):
          ...
    cases:
      - call: "effective_level({'shop': 30}, 'shop.pay')"
        expect: 30
      - call: "effective_level({'shop.pay': 10, 'shop': 30}, 'shop.pay')"
        expect: 10
      - call: "effective_level({'': 20}, 'a.b.c')"
        expect: 20
      - call: "effective_level({'a': 40}, 'a.b.c')"
        expect: 40
      - call: "effective_level({}, 'x.y')"
        expect: 0
    hints:
      - "Effective level is searched bottom-up: this logger, then parent, then grandparent until one has a level. How do you get ancestors from 'a.b.c'?"
      - "Strip at the last dot: 'a.b.c' -> 'a.b' -> 'a' -> '' (root). Check levels at each step; if nothing through root inclusive, return 0 (NOTSET)."
    solution: |
      def effective_level(levels, name):
          current = name
          while True:
              if current in levels:
                  return levels[current]
              if current == "":
                  return 0
              if "." in current:
                  current = current.rsplit(".", 1)[0]
              else:
                  current = ""

  - id: levels-prop-challenge-006
    concept: levels-propagation
    type: python-function
    difficulty: 4
    prompt: "Implement `count_outputs(has_handler, propagate, name)`: model how many times a record from logger name prints. has_handler is dict name->bool (whether the logger has its own handler), propagate is dict name->bool (whether the record climbs to the parent; missing key means True). Names are hierarchical via dots; root is ''. The record starts at name; at each tree level add 1 output if the current logger has a handler, then climb to the parent only if propagate for the current logger is True. Return total outputs."
    starter: |
      def count_outputs(has_handler, propagate, name):
          ...
    cases:
      - call: "count_outputs({'svc': True}, {}, 'svc.db')"
        expect: 1
      - call: "count_outputs({'svc.db': True, 'svc': True}, {}, 'svc.db')"
        expect: 2
      - call: "count_outputs({'svc.db': True, 'svc': True}, {'svc.db': False}, 'svc.db')"
        expect: 1
      - call: "count_outputs({}, {}, 'a.b')"
        expect: 0
      - call: "count_outputs({'': True, 'a': True}, {}, 'a.b')"
        expect: 2
    hints:
      - "The record follows the same ancestor chain as level lookup. At each node ask: is there a handler and is climb allowed?"
      - "Move up by stripping at the last dot until ''. Count the current node's handler, then stop if propagate is False (default True). Root '' is the last possible node."
    solution: |
      def count_outputs(has_handler, propagate, name):
          current = name
          total = 0
          while True:
              if has_handler.get(current, False):
                  total += 1
              if not propagate.get(current, True):
                  break
              if current == "":
                  break
              if "." in current:
                  current = current.rsplit(".", 1)[0]
              else:
                  current = ""
          return total
