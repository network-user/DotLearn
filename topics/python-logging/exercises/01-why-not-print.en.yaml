exercises:
  - id: why-not-print-quiz-001
    concept: why-not-print
    type: theory-quiz
    difficulty: 1
    prompt: "How is logging fundamentally different from print for diagnostic output?"
    choices:
      - id: a
        text: "Logging formats the string more cleverly, but is otherwise the same as print."
      - id: b
        text: "Logging has message severity, a managed route to destinations, and a visibility threshold without code changes."
      - id: c
        text: "Logging always writes to a file while print only writes to the console."
      - id: d
        text: "Logging is faster because it does not evaluate arguments."
    correct: [b]
    explanation: "print puts a string in one stream with no notion of importance or off switch. logging adds level, routing to a destination, and a threshold that controls visibility with one setting."
    variants:
      - prompt: "Why does a print trail often fail to help debug production a week later?"
        choices:
          - id: a
            text: "print writes now to one stream; after a process restart that output is gone."
          - id: b
            text: "print automatically deletes old messages after a day."
          - id: c
            text: "print writes only to a file cleared on startup."
          - id: d
            text: "print encrypts output so it cannot be read later."
        correct: [a]
        explanation: "print speaks \"now\": the string goes to standard output and does not outlive the process. A log leaves a trail that answers \"what happened\" after the fact."
      - prompt: "What does a level threshold give logging that print lacks?"
        choices:
          - id: a
            text: "A switch: debug lines stay in code while visibility changes with one setting."
          - id: b
            text: "Automatic translation of messages to another language."
          - id: c
            text: "A guarantee the message is delivered exactly once."
          - id: d
            text: "Compression of message text to save space."
        correct: [a]
        explanation: "Messages below the threshold never reach output. To remove debug from print you must delete lines; with a log you raise the threshold."

  - id: why-not-print-default-002
    concept: why-not-print
    type: predict-output
    difficulty: 1
    prompt: "What does this program print? (basicConfig without level - default threshold)"
    snippet: |
      import logging
      import sys

      logging.basicConfig(stream=sys.stdout, force=True)

      logging.warning("important warning")
      logging.info("normal event")
    expected:
      kind: stdout
      value: "WARNING:root:important warning"
    variants:
      - snippet: |
          import logging
          import sys

          logging.basicConfig(stream=sys.stdout, force=True)

          logging.error("connection failed")
          logging.debug("tiny debug")
        expected:
          kind: stdout
          value: "ERROR:root:connection failed"
      - snippet: |
          import logging
          import sys

          logging.basicConfig(stream=sys.stdout, force=True)

          logging.critical("system down")
          logging.info("just an event")
        expected:
          kind: stdout
          value: "CRITICAL:root:system down"

  - id: why-not-print-threshold-003
    concept: why-not-print
    type: predict-output
    difficulty: 2
    prompt: "What does this program print?"
    snippet: |
      import logging
      import sys

      logging.basicConfig(
          level=logging.INFO,
          format="%(levelname)s %(message)s",
          stream=sys.stdout,
          force=True,
      )

      logging.debug("debug")
      logging.info("service started")
    expected:
      kind: stdout
      value: |-
        INFO service started
    hints:
      - "The level threshold is a switch: messages below it never reach output. Which of DEBUG or INFO is below INFO?"
      - "The format template prints only level and text, without root or colons. Only the line that passed the threshold remains."
    variants:
      - snippet: |
          import logging
          import sys

          logging.basicConfig(
              level=logging.WARNING,
              format="%(levelname)s %(message)s",
              stream=sys.stdout,
              force=True,
          )

          logging.info("normal")
          logging.warning("warning")
          logging.error("error")
        expected:
          kind: stdout
          value: |-
            WARNING warning
            ERROR error
      - snippet: |
          import logging
          import sys

          logging.basicConfig(
              level=logging.ERROR,
              format="%(levelname)s %(message)s",
              stream=sys.stdout,
              force=True,
          )

          logging.warning("warning")
          logging.info("event")
          logging.error("error")
        expected:
          kind: stdout
          value: |-
            ERROR error

  - id: why-not-print-blanks-004
    concept: why-not-print
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the setup so INFO and above are visible and the template prints level and text."
    template: |
      import logging

      logging.basicConfig(
          level=logging.{{level}},
          format="%({{field}})s %(message)s",
      )
      logging.info("ready")
    blanks:
      level:
        accept: ["INFO"]
      field:
        accept: ["levelname"]
    hints:
      - "The threshold must pass INFO and everything more severe. The level name is the attribute of the logging constant."
      - "The level field in a formatter template prints words like INFO or WARNING - recall its name from theory."
    variants:
      - prompt: "Complete the call to log a warning using parameterized (lazy) substitution."
        template: |
          import logging

          logging.{{method}}("valuex=%s", {{value}})
        blanks:
          method:
            accept: ["warning"]
          value:
            accept: ["7", "value", "42"]
      - prompt: "Complete the level function so inside except you log the error with full traceback."
        template: |
          import logging

          try:
              risky()
          except Exception:
              logging.{{method}}("processing failed")
        blanks:
          method:
            accept: ["exception", "error"]

  - id: why-not-print-lazy-005
    concept: why-not-print
    type: python-function
    difficulty: 3
    prompt: "Implement `lazy_or_eager(threshold, record_level)`: return 'skip' if record_level (int) is below threshold (the message is dropped and the expensive argument need not be computed), otherwise 'compute'. This models why logging.debug's parameterized form defers formatting."
    starter: |
      def lazy_or_eager(threshold, record_level):
          ...
    cases:
      - call: "lazy_or_eager(20, 10)"
        expect: "skip"
      - call: "lazy_or_eager(20, 20)"
        expect: "compute"
      - call: "lazy_or_eager(30, 40)"
        expect: "compute"
      - call: "lazy_or_eager(40, 20)"
        expect: "skip"
    hints:
      - "A record reaches output only if its level is not below the threshold. When should expensive substitution be skipped?"
      - "The boundary is inclusive: a level equal to the threshold passes. Compare record_level to threshold and return one of two labels."
    solution: |
      def lazy_or_eager(threshold, record_level):
          if record_level < threshold:
              return "skip"
          return "compute"

  - id: why-not-print-challenge-006
    concept: why-not-print
    type: python-function
    difficulty: 4
    prompt: "Implement `visible_messages(threshold, messages)`: messages is a list of (level, text) pairs where level is an int (DEBUG=10, INFO=20, WARNING=30, ERROR=40, CRITICAL=50). Return the list of texts for messages whose level is not below threshold, preserving order."
    starter: |
      def visible_messages(threshold, messages):
          ...
    cases:
      - call: "visible_messages(30, [(10, 'a'), (30, 'b'), (40, 'c')])"
        expect: ["b", "c"]
      - call: "visible_messages(20, [(10, 'low'), (20, 'mid'), (50, 'top')])"
        expect: ["mid", "top"]
      - call: "visible_messages(50, [(40, 'err'), (30, 'warn')])"
        expect: []
      - call: "visible_messages(10, [(10, 'x'), (20, 'y')])"
        expect: ["x", "y"]
    hints:
      - "The threshold is a switch: messages with level not below threshold pass. Which pairs to keep?"
      - "The boundary is inclusive (level == threshold passes). Walk the list in order and collect passing texts."
    solution: |
      def visible_messages(threshold, messages):
          return [text for level, text in messages if level >= threshold]
