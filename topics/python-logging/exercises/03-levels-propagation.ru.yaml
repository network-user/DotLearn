exercises:
  - id: levels-prop-quiz-001
    concept: levels-propagation
    type: theory-quiz
    difficulty: 1
    prompt: "Что задаёт точка в имени logger-а, например в shop.pay?"
    choices:
      - id: a
        text: "Родство в дереве: shop.pay - ребёнок shop, а shop - ребёнок корневого logger-а."
      - id: b
        text: "Ничего особенного, это просто часть строки-имени без последствий."
      - id: c
        text: "Уровень важности: чем больше точек, тем выше уровень."
      - id: d
        text: "Имя файла, в который будет писать этот logger."
    correct: [a]
    explanation: "Точка объявляет иерархию. shop.pay наследует от shop, shop - от root. Это родство управляет эффективным уровнем и подъёмом записи к handler-ам предков."
    variants:
      - prompt: "Как ищется эффективный уровень logger-а, у которого собственный уровень не задан (NOTSET)?"
        choices:
          - id: a
            text: "Вверх по дереву берётся уровень ближайшего предка, у которого"
          - id: b
            text: "Всегда используется DEBUG как значение по умолчанию."
          - id: c
            text: "Берётся уровень самого шумного дочернего logger-а."
          - id: d
            text: "Запись отбрасывается, пока уровень не задан явно."
        correct: [a]
        explanation: "При NOTSET logger поднимается по дереву до первого предка с заданным уровнем и берёт его. Поэтому один setLevel на верхнем logger-е накрывает всё поддерево."
      - prompt: "Что делает запись logger-а, прошедшая фильтр уровня, по умолчанию?"
        choices:
          - id: a
            text: "Идёт в handler-ы своего logger-а и поднимается к handler-ам"
          - id: b
            text: "Идёт только в handler-ы своего logger-а и никуда больше."
          - id: c
            text: "Сразу пишется в файл, минуя handler-ы."
          - id: d
            text: "Возвращается обратно дочерним logger-ам."
        correct: [a]
        explanation: "По умолчанию propagation включён: запись отдаётся handler-ам своего logger-а, затем поднимается к предкам. Так один handler на корне обслуживает всё дерево."

  - id: levels-prop-effective-002
    concept: levels-propagation
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      import logging

      logging.getLogger("shop").setLevel(logging.WARNING)
      child = logging.getLogger("shop.pay")

      print(child.level)
      print(logging.getLevelName(child.getEffectiveLevel()))
    expected:
      kind: stdout
      value: |-
        0
        WARNING
    hints:
      - "Собственный уровень child никто не задавал. Какое числовое значение у NOTSET и откуда тогда берётся эффективный уровень?"
      - "child.level - это собственный уровень (NOTSET = 0). Эффективный поднимается вверх по дереву до shop, где задан WARNING."
    variants:
      - snippet: |
          import logging

          logging.getLogger("svc").setLevel(logging.ERROR)
          child = logging.getLogger("svc.db")

          print(child.level)
          print(logging.getLevelName(child.getEffectiveLevel()))
        expected:
          kind: stdout
          value: |-
            0
            ERROR
      - snippet: |
          import logging

          parent = logging.getLogger("app")
          parent.setLevel(logging.INFO)
          child = logging.getLogger("app.worker")
          child.setLevel(logging.DEBUG)

          print(logging.getLevelName(child.getEffectiveLevel()))
        expected:
          kind: stdout
          value: "DEBUG"

  - id: levels-prop-propagate-003
    concept: levels-propagation
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      import logging
      import sys

      parent = logging.getLogger("svc")
      parent.setLevel(logging.INFO)
      parent.handlers.clear()
      parent.propagate = False
      parent.addHandler(logging.StreamHandler(sys.stdout))

      child = logging.getLogger("svc.db")
      child.handlers.clear()
      child.info("ребёнок без своего handler-а")
    expected:
      kind: stdout
      value: "ребёнок без своего handler-а"
    hints:
      - "У child нет своего handler-а. Через чей handler тогда выходит его запись и почему?"
      - "Запись child проходит фильтр и поднимается к svc, где стоит единственный handler. Подъём по дереву и доставляет её туда."
    variants:
      - snippet: |
          import logging
          import sys

          root = logging.getLogger()
          root.handlers.clear()
          root.addHandler(logging.StreamHandler(sys.stdout))

          quiet = logging.getLogger("quiet")
          quiet.setLevel(logging.INFO)
          quiet.handlers.clear()
          quiet.propagate = False

          quiet.info("к корню я не поднимусь")
        expected:
          kind: stdout
          value: ""
      - snippet: |
          import logging
          import sys

          parent = logging.getLogger("net")
          parent.setLevel(logging.INFO)
          parent.handlers.clear()
          parent.propagate = False
          parent.addHandler(logging.StreamHandler(sys.stdout))

          child = logging.getLogger("net.http")
          child.handlers.clear()
          child.debug("слишком тихо для INFO")
        expected:
          kind: stdout
          value: ""

  - id: levels-prop-two-filters-004
    concept: levels-propagation
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      import logging
      import sys

      logger = logging.getLogger("two.filters")
      logger.setLevel(logging.DEBUG)
      logger.handlers.clear()
      logger.propagate = False
      handler = logging.StreamHandler(sys.stdout)
      handler.setLevel(logging.WARNING)
      logger.addHandler(handler)

      logger.debug("прошёл logger, но не handler")
      logger.warning("прошёл оба фильтра")
    expected:
      kind: stdout
      value: "прошёл оба фильтра"
    hints:
      - "Фильтров два: уровень logger-а и уровень handler-а. Запись должна пройти оба. Какой из двух вызовов упрётся в handler с уровнем WARNING?"
      - "logger пропускает DEBUG и выше, но handler пропускает только WARNING и выше. debug проходит первый барьер и застревает на втором."
    variants:
      - snippet: |
          import logging
          import sys

          logger = logging.getLogger("two.b")
          logger.setLevel(logging.DEBUG)
          logger.handlers.clear()
          logger.propagate = False
          handler = logging.StreamHandler(sys.stdout)
          handler.setLevel(logging.ERROR)
          logger.addHandler(handler)

          logger.warning("не пройдёт handler")
          logger.error("пройдёт оба")
        expected:
          kind: stdout
          value: "пройдёт оба"
      - snippet: |
          import logging
          import sys

          logger = logging.getLogger("two.c")
          logger.setLevel(logging.WARNING)
          logger.handlers.clear()
          logger.propagate = False
          handler = logging.StreamHandler(sys.stdout)
          handler.setLevel(logging.DEBUG)
          logger.addHandler(handler)

          logger.info("упрётся в logger")
          logger.warning("пройдёт оба")
        expected:
          kind: stdout
          value: "пройдёт оба"

  - id: levels-prop-effective-fn-005
    concept: levels-propagation
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `effective_level(levels, name)`: levels - dict, отображающий имя logger-а в его заданный числовой уровень (логгеры без записи в dict считаются NOTSET). Имена иерархичны через точку, корень обозначен пустой строкой ''. Верните эффективный уровень logger-а name: его собственный уровень, если задан, иначе ближайшего предка вверх по дереву, у которого уровень есть."
    starter: |
      def effective_level(levels, name):
          ...
    cases:
      - call: "effective_level({'shop': 30}, 'shop.pay')"
        expect: 30
      - call: "effective_level({'shop.pay': 10, 'shop': 30}, 'shop.pay')"
        expect: 10
      - call: "effective_level({'': 20}, 'a.b.c')"
        expect: 20
      - call: "effective_level({'a': 40}, 'a.b.c')"
        expect: 40
      - call: "effective_level({}, 'x.y')"
        expect: 0
    hints:
      - "Эффективный уровень ищется снизу вверх: сам logger, затем его родитель, затем родитель родителя - до первого, у кого уровень задан. Как из 'a.b.c' получить цепочку предков?"
      - "Отрезайте по последней точке: 'a.b.c' -> 'a.b' -> 'a' -> '' (корень). На каждом шаге проверяйте levels; если ничего не нашли до корня включительно, верните 0 (NOTSET)."
    solution: |
      def effective_level(levels, name):
          current = name
          while True:
              if current in levels:
                  return levels[current]
              if current == "":
                  return 0
              if "." in current:
                  current = current.rsplit(".", 1)[0]
              else:
                  current = ""

  - id: levels-prop-challenge-006
    concept: levels-propagation
    type: python-function
    difficulty: 4
    prompt: "Реализуйте `count_outputs(has_handler, propagate, name)`: смоделируйте, сколько раз запись из logger-а name напечатается. has_handler - dict имя->bool (есть ли у logger-а собственный handler), propagate - dict имя->bool (поднимается ли запись к предку; отсутствие ключа считать True). Имена иерархичны через точку, корень ''. Запись стартует в name, на каждом уровне дерева добавляет 1 вывод, если у текущего logger-а есть handler, затем поднимается к родителю, только если propagate текущего logger-а True. Верните суммарное число выводов."
    starter: |
      def count_outputs(has_handler, propagate, name):
          ...
    cases:
      - call: "count_outputs({'svc': True}, {}, 'svc.db')"
        expect: 1
      - call: "count_outputs({'svc.db': True, 'svc': True}, {}, 'svc.db')"
        expect: 2
      - call: "count_outputs({'svc.db': True, 'svc': True}, {'svc.db': False}, 'svc.db')"
        expect: 1
      - call: "count_outputs({}, {}, 'a.b')"
        expect: 0
      - call: "count_outputs({'': True, 'a': True}, {}, 'a.b')"
        expect: 2
    hints:
      - "Запись идёт по той же цепочке предков, что и поиск уровня: сам logger, родитель, и так до корня. На каждом узле спросите два вопроса: есть ли handler и разрешён ли подъём дальше."
      - "Двигайтесь вверх обрезанием по последней точке до ''. Считайте handler текущего узла, затем останавливайтесь, если propagate текущего узла False (по умолчанию True). Корень '' - последний возможный узел."
    solution: |
      def count_outputs(has_handler, propagate, name):
          current = name
          total = 0
          while True:
              if has_handler.get(current, False):
                  total += 1
              if not propagate.get(current, True):
                  break
              if current == "":
                  break
              if "." in current:
                  current = current.rsplit(".", 1)[0]
              else:
                  current = ""
          return total
