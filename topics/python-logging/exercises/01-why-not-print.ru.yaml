exercises:
  - id: why-not-print-quiz-001
    concept: why-not-print
    type: theory-quiz
    difficulty: 1
    prompt: "Чем логирование принципиально отличается от print при выводе диагностики?"
    choices:
      - id: a
        text: "Логирование умнее форматирует строку, но в остальном это тот же print."
      - id: b
        text: "У логирования есть уровень важности сообщения, управляемый маршрут до места назначения и"
      - id: c
        text: "Логирование всегда пишет в файл, а print - только в консоль."
      - id: d
        text: "Логирование работает быстрее, потому что не вычисляет аргументы."
    correct: [b]
    explanation: "print кладёт строку в один поток без понятия важности и без выключателя. logging добавляет уровень сообщения, маршрут до адресата и порог, которым видимость управляется одной настройкой."
    variants:
      - prompt: "Почему след от print часто не помогает разобраться в проде через неделю?"
        choices:
          - id: a
            text: "print выводит сообщение сейчас и в один поток; после перезапуска"
          - id: b
            text: "print автоматически удаляет старые сообщения через сутки."
          - id: c
            text: "print пишет только в файл, который очищается при старте."
          - id: d
            text: "print шифрует вывод, и его нельзя прочитать позже."
        correct: [a]
        explanation: "print говорит «сейчас»: строка уходит в стандартный поток и не переживает запуск программы. Лог же оставляет след, который отвечает на вопрос «что происходило» уже после события."
      - prompt: "Что даёт логированию порог уровня, чего нет у print?"
        choices:
          - id: a
            text: "Выключатель: отладочные строки остаются в коде, а их"
          - id: b
            text: "Автоматический перевод сообщений на другой язык."
          - id: c
            text: "Гарантию, что сообщение дойдёт ровно один раз."
          - id: d
            text: "Сжатие текста сообщения для экономии места."
        correct: [a]
        explanation: "Сообщения ниже порога просто не доходят до вывода. Чтобы убрать отладку у print, строки приходится физически стирать; у лога достаточно поднять порог."

  - id: why-not-print-default-002
    concept: why-not-print
    type: predict-output
    difficulty: 1
    prompt: "Что выведет эта программа? (basicConfig без аргумента level - порог по умолчанию)"
    snippet: |
      import logging
      import sys

      logging.basicConfig(stream=sys.stdout, force=True)

      logging.warning("важное предупреждение")
      logging.info("обычное событие")
    expected:
      kind: stdout
      value: "WARNING:root:важное предупреждение"
    variants:
      - snippet: |
          import logging
          import sys

          logging.basicConfig(stream=sys.stdout, force=True)

          logging.error("сбой подключения")
          logging.debug("мелкая отладка")
        expected:
          kind: stdout
          value: "ERROR:root:сбой подключения"
      - snippet: |
          import logging
          import sys

          logging.basicConfig(stream=sys.stdout, force=True)

          logging.critical("система падает")
          logging.info("просто событие")
        expected:
          kind: stdout
          value: "CRITICAL:root:система падает"

  - id: why-not-print-threshold-003
    concept: why-not-print
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      import logging
      import sys

      logging.basicConfig(
          level=logging.INFO,
          format="%(levelname)s %(message)s",
          stream=sys.stdout,
          force=True,
      )

      logging.debug("отладка")
      logging.info("сервис запущен")
    expected:
      kind: stdout
      value: |-
        INFO сервис запущен
    hints:
      - "Порог level - это выключатель: сообщения ниже него до вывода не доходят. Какой из двух уровней, DEBUG или INFO, ниже порога INFO?"
      - "Шаблон format печатает только уровень и текст, без root и без двоеточий. Останется ровно та строка, что прошла порог."
    variants:
      - snippet: |
          import logging
          import sys

          logging.basicConfig(
              level=logging.WARNING,
              format="%(levelname)s %(message)s",
              stream=sys.stdout,
              force=True,
          )

          logging.info("обычное")
          logging.warning("предупреждение")
          logging.error("ошибка")
        expected:
          kind: stdout
          value: |-
            WARNING предупреждение
            ERROR ошибка
      - snippet: |
          import logging
          import sys

          logging.basicConfig(
              level=logging.ERROR,
              format="%(levelname)s %(message)s",
              stream=sys.stdout,
              force=True,
          )

          logging.warning("предупреждение")
          logging.info("событие")
          logging.error("ошибка")
        expected:
          kind: stdout
          value: |-
            ERROR ошибка

  - id: why-not-print-blanks-004
    concept: why-not-print
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите настройку так, чтобы видны были сообщения уровня INFO и выше, а шаблон печатал уровень и текст."
    template: |
      import logging

      logging.basicConfig(
          level=logging.{{level}},
          format="%({{field}})s %(message)s",
      )
      logging.info("готово")
    blanks:
      level:
        accept: ["INFO"]
      field:
        accept: ["levelname"]
    hints:
      - "Порог должен пропустить INFO и всё, что важнее. Имя уровня - это атрибут константы logging."
      - "Поле уровня в шаблоне formatter-а печатает слово вроде INFO или WARNING - вспомните его имя из теории."
    variants:
      - prompt: "Допишите вызов так, чтобы записать предупреждение и одновременно использовать параметрическую (ленивую) форму подстановки."
        template: |
          import logging

          logging.{{method}}("значениеx=%s", {{value}})
        blanks:
          method:
            accept: ["warning"]
          value:
            accept: ["7", "value", "42"]
      - prompt: "Допишите функцию уровня и аргумент так, чтобы внутри except записать ошибку вместе с полной трассировкой."
        template: |
          import logging

          try:
              risky()
          except Exception:
              logging.{{method}}("сбой при обработке")
        blanks:
          method:
            accept: ["exception", "error"]

  - id: why-not-print-lazy-005
    concept: why-not-print
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `lazy_or_eager(threshold, record_level)`: верните строку 'skip', если record_level (число) меньше threshold (сообщение отброшено и дорогой аргумент считать не нужно), иначе 'compute'. Это моделирует, почему параметрическая форма logging.debug откладывает форматирование."
    starter: |
      def lazy_or_eager(threshold, record_level):
          ...
    cases:
      - call: "lazy_or_eager(20, 10)"
        expect: "skip"
      - call: "lazy_or_eager(20, 20)"
        expect: "compute"
      - call: "lazy_or_eager(30, 40)"
        expect: "compute"
      - call: "lazy_or_eager(40, 20)"
        expect: "skip"
    hints:
      - "Запись доходит до вывода, только если её уровень не ниже порога. При каком соотношении record_level и threshold дорогую подстановку можно не делать?"
      - "Граница включающая: уровень, равный порогу, проходит. Сравните record_level с threshold и верните одну из двух меток."
    solution: |
      def lazy_or_eager(threshold, record_level):
          if record_level < threshold:
              return "skip"
          return "compute"

  - id: why-not-print-challenge-006
    concept: why-not-print
    type: python-function
    difficulty: 4
    prompt: "Реализуйте `visible_messages(threshold, messages)`: messages - список пар (level, text), где level это число (DEBUG=10, INFO=20, WARNING=30, ERROR=40, CRITICAL=50). Верните список текстов тех сообщений, чей уровень не ниже threshold, сохранив исходный порядок."
    starter: |
      def visible_messages(threshold, messages):
          ...
    cases:
      - call: "visible_messages(30, [(10, 'a'), (30, 'b'), (40, 'c')])"
        expect: ["b", "c"]
      - call: "visible_messages(20, [(10, 'low'), (20, 'mid'), (50, 'top')])"
        expect: ["mid", "top"]
      - call: "visible_messages(50, [(40, 'err'), (30, 'warn')])"
        expect: []
      - call: "visible_messages(10, [(10, 'x'), (20, 'y')])"
        expect: ["x", "y"]
    hints:
      - "Порог работает как выключатель: проходят сообщения с уровнем не ниже threshold. Какие пары нужно оставить, а какие выбросить?"
      - "Граница включающая (level == threshold проходит). Пройдите по списку в исходном порядке и соберите тексты прошедших."
    solution: |
      def visible_messages(threshold, messages):
          return [text for level, text in messages if level >= threshold]
