exercises:
  - id: lhf-roles-quiz-001
    concept: loggers-handlers-formatters
    type: theory-quiz
    difficulty: 1
    prompt: "Кто из трёх объектов конвейера отвечает за то, КУДА уйдёт запись (консоль, файл, сеть)?"
    choices:
      - id: a
        text: "Logger - точка входа решает место назначения."
      - id: b
        text: "Handler - именно он определяет поток или файл назначения."
      - id: c
        text: "Formatter - он направляет запись в нужное место."
      - id: d
        text: "LogRecord - запись сама выбирает, куда ей уйти."
    correct: [b]
    explanation: "Logger решает, пускать ли запись по уровню; Handler решает, куда она уйдёт; Formatter решает, как она будет выглядеть. Место назначения - зона ответственности handler-а."
    variants:
      - prompt: "Кто из трёх объектов конвейера превращает запись в готовую строку по шаблону?"
        choices:
          - id: a
            text: "Formatter - он оформляет запись по шаблону вроде %s %s."
          - id: b
            text: "Logger - он собирает строку при входе."
          - id: c
            text: "Handler - он сам форматирует текст."
          - id: d
            text: "basicConfig - он форматирует все записи централизованно."
        correct: [a]
        explanation: "Formatter живёт на handler-е и превращает объект записи в строку по шаблону. Поэтому одна запись в консоли и в файле может выглядеть по-разному."
      - prompt: "Кто из трёх объектов конвейера решает, пускать ли запись дальше по уровню?"
        choices:
          - id: a
            text: "Logger - точка входа, он фильтрует запись по уровню первым."
          - id: b
            text: "Formatter - он отбрасывает записи с низким уровнем."
          - id: c
            text: "LogRecord - запись сама проверяет свой уровень."
          - id: d
            text: "Stream - поток отбрасывает лишнее на выходе."
        correct: [a]
        explanation: "Logger - точка входа: он первым решает, пускать ли запись дальше по своему уровню, и только потом раздаёт её handler-ам."

  - id: lhf-getlogger-002
    concept: loggers-handlers-formatters
    type: predict-output
    difficulty: 1
    prompt: "Что выведет эта программа?"
    snippet: |
      import logging

      a = logging.getLogger("shop.orders")
      b = logging.getLogger("shop.orders")
      print(a is b)
    expected:
      kind: stdout
      value: "True"
    variants:
      - snippet: |
          import logging

          a = logging.getLogger("shop.pay")
          b = logging.getLogger("shop.orders")
          print(a is b)
        expected:
          kind: stdout
          value: "False"
      - snippet: |
          import logging

          logger = logging.getLogger("svc.db")
          print(logger.name)
        expected:
          kind: stdout
          value: "svc.db"

  - id: lhf-formatter-003
    concept: loggers-handlers-formatters
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      import logging
      import sys

      logger = logging.getLogger("shop.pay")
      logger.setLevel(logging.INFO)
      logger.handlers.clear()
      handler = logging.StreamHandler(sys.stdout)
      handler.setFormatter(logging.Formatter("%(levelname)s [%(name)s] %(message)s"))
      logger.addHandler(handler)

      logger.info("платёж принят")
    expected:
      kind: stdout
      value: "INFO [shop.pay] платёж принят"
    hints:
      - "Formatter подставляет поля записи на места %(...)s в шаблоне. Какие три поля упомянуты и в каком порядке?"
      - "%(levelname)s - это уровень словом, %(name)s - имя logger-а, %(message)s - текст. Подставьте их в шаблон буквально."
    variants:
      - snippet: |
          import logging
          import sys

          logger = logging.getLogger("api")
          logger.setLevel(logging.INFO)
          logger.handlers.clear()
          handler = logging.StreamHandler(sys.stdout)
          handler.setFormatter(logging.Formatter("%(name)s: %(message)s"))
          logger.addHandler(handler)

          logger.warning("медленный ответ")
        expected:
          kind: stdout
          value: "api: медленный ответ"
      - snippet: |
          import logging
          import sys

          logger = logging.getLogger("worker")
          logger.setLevel(logging.INFO)
          logger.handlers.clear()
          handler = logging.StreamHandler(sys.stdout)
          handler.setFormatter(logging.Formatter("[%(levelname)s] %(message)s"))
          logger.addHandler(handler)

          logger.error("задача упала")
        expected:
          kind: stdout
          value: "[ERROR] задача упала"

  - id: lhf-duplicate-004
    concept: loggers-handlers-formatters
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      import logging
      import sys

      logger = logging.getLogger("dup")
      logger.setLevel(logging.INFO)
      logger.handlers.clear()
      logger.propagate = False
      logger.addHandler(logging.StreamHandler(sys.stdout))
      logger.addHandler(logging.StreamHandler(sys.stdout))

      logger.info("привет")
    expected:
      kind: stdout
      value: |-
        привет
        привет
    hints:
      - "addHandler не заменяет, а накапливает. Сколько handler-ов в итоге смотрят на один и тот же поток?"
      - "Каждый из двух handler-ов получает запись независимо и пишет свою строку. Здесь propagate = False отключил подъём, так что лишних копий от предков нет."
    variants:
      - snippet: |
          import logging
          import sys

          logger = logging.getLogger("dup3")
          logger.setLevel(logging.INFO)
          logger.handlers.clear()
          logger.propagate = False
          for _ in range(3):
              logger.addHandler(logging.StreamHandler(sys.stdout))

          logger.info("x")
        expected:
          kind: stdout
          value: |-
            x
            x
            x
      - snippet: |
          import logging
          import sys

          logger = logging.getLogger("once")
          logger.setLevel(logging.INFO)
          logger.handlers.clear()
          logger.propagate = False
          logger.addHandler(logging.StreamHandler(sys.stdout))

          logger.info("один")
        expected:
          kind: stdout
          value: |-
            один

  - id: lhf-build-pipeline-005
    concept: loggers-handlers-formatters
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `build_logger(name, stream)`: создайте logger с данным именем, уровнем INFO, без propagation, очистите его handlers, прицепите один StreamHandler на переданный stream с формат-шаблоном '%(levelname)s:%(message)s' и верните logger. Проверка пишет в stream и читает результат."
    starter: |
      import logging

      def build_logger(name, stream):
          ...
    cases:
      - call: "(lambda: (lambda io: (build_logger('t1', io).info('hi'), io.getvalue().strip())[1])(__import__('io').StringIO()))()"
        expect: "INFO:hi"
      - call: "(lambda: (lambda io: (build_logger('t2', io).warning('boom'), io.getvalue().strip())[1])(__import__('io').StringIO()))()"
        expect: "WARNING:boom"
      - call: "(lambda: (lambda io: (build_logger('t3', io).debug('quiet'), io.getvalue().strip())[1])(__import__('io').StringIO()))()"
        expect: ""
    hints:
      - "Соберите конвейер из трёх частей: logger как точка входа, handler как место назначения, formatter как оформитель. В каком порядке их связывают?"
      - "Очистите logger.handlers перед добавлением, иначе повторные вызовы дадут дубли. Уровень DEBUG-сообщения ниже INFO - оно не должно появиться."
      - "Шаблон formatter-а ставится через handler.setFormatter(logging.Formatter(...)). Не забудьте logger.propagate = False, чтобы запись не задвоилась через корень."
    solution: |
      import logging

      def build_logger(name, stream):
          logger = logging.getLogger(name)
          logger.setLevel(logging.INFO)
          logger.propagate = False
          logger.handlers.clear()
          handler = logging.StreamHandler(stream)
          handler.setFormatter(logging.Formatter("%(levelname)s:%(message)s"))
          logger.addHandler(handler)
          return logger
