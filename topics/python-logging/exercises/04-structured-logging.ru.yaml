exercises:
  - id: struct-quiz-001
    concept: structured-logging
    type: theory-quiz
    difficulty: 1
    prompt: "В чём главное отличие структурного лога от свободного текста?"
    choices:
      - id: a
        text: "Структурный лог держит сообщение и контекст раздельно: message"
      - id: b
        text: "Структурный лог всегда короче и быстрее пишется."
      - id: c
        text: "Структурный лог пишется только в файл, а свободный - в консоль."
      - id: d
        text: "Структурный лог автоматически переводит сообщения на английский."
    correct: [a]
    explanation: "Свободный текст прячет контекст внутри строки, и числа приходится выколупывать regexp. Структурный лог хранит поля отдельно, и система сбора индексирует каждое как есть."
    variants:
      - prompt: "Зачем системе сбора логов на проде структурные поля вместо свободного текста?"
        choices:
          - id: a
            text: "Чтобы фильтровать и индексировать по полю без разбора строки"
          - id: b
            text: "Чтобы экономить место за счёт сжатия текста."
          - id: c
            text: "Чтобы сообщения нельзя было прочитать человеку."
          - id: d
            text: "Чтобы логи писались быстрее в десятки раз."
        correct: [a]
        explanation: "Когда поля отдельны, запрос «найди по user_id» тривиален. Из свободной строки то же значение пришлось бы доставать разбором регулярными выражениями."
      - prompt: "Каким аргументом logging-вызова прикрепляют к записи произвольные поля?"
        choices:
          - id: a
            text: "extra={...} - его ключи становятся атрибутами записи и"
          - id: b
            text: "fields={...} - специальный аргумент для структурных полей."
          - id: c
            text: "context={...} - словарь контекста записи."
          - id: d
            text: "meta={...} - метаданные сообщения."
        correct: [a]
        explanation: "Поля добавляют через extra - словарь, чьи ключи становятся атрибутами LogRecord и подставляются в шаблон formatter-а через %(имя)s."

  - id: struct-extra-002
    concept: structured-logging
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      import logging
      import sys

      logger = logging.getLogger("api")
      logger.setLevel(logging.INFO)
      logger.handlers.clear()
      logger.propagate = False
      handler = logging.StreamHandler(sys.stdout)
      handler.setFormatter(logging.Formatter("%(message)s user=%(user_id)s"))
      logger.addHandler(handler)

      logger.info("запрос обработан", extra={"user_id": 42})
    expected:
      kind: stdout
      value: "запрос обработан user=42"
    hints:
      - "Ключи из extra становятся полями записи. Какое поле подставится на место %(user_id)s в шаблоне?"
      - "Шаблон печатает текст сообщения, затем литерал ' user=', затем значение поля user_id из extra."
    variants:
      - snippet: |
          import logging
          import sys

          logger = logging.getLogger("svc")
          logger.setLevel(logging.INFO)
          logger.handlers.clear()
          logger.propagate = False
          handler = logging.StreamHandler(sys.stdout)
          handler.setFormatter(logging.Formatter("%(message)s [req=%(request_id)s]"))
          logger.addHandler(handler)

          logger.info("ok", extra={"request_id": "abc-7"})
        expected:
          kind: stdout
          value: "ok [req=abc-7]"
      - snippet: |
          import logging
          import sys

          logger = logging.getLogger("perf")
          logger.setLevel(logging.INFO)
          logger.handlers.clear()
          logger.propagate = False
          handler = logging.StreamHandler(sys.stdout)
          handler.setFormatter(logging.Formatter("%(message)s dur=%(duration_ms)sms"))
          logger.addHandler(handler)

          logger.info("готово", extra={"duration_ms": 1300})
        expected:
          kind: stdout
          value: "готово dur=1300ms"

  - id: struct-json-003
    concept: structured-logging
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      import logging
      import sys
      import json

      class JsonFormatter(logging.Formatter):
          def format(self, record):
              return json.dumps({
                  "level": record.levelname,
                  "msg": record.getMessage(),
                  "user_id": getattr(record, "user_id", None),
              })

      logger = logging.getLogger("api.json")
      logger.setLevel(logging.INFO)
      logger.handlers.clear()
      logger.propagate = False
      h = logging.StreamHandler(sys.stdout)
      h.setFormatter(JsonFormatter())
      logger.addHandler(h)
      logger.info("ok", extra={"user_id": 7})
    expected:
      kind: stdout
      value: '{"level": "INFO", "msg": "ok", "user_id": 7}'
    hints:
      - "Свой format возвращает строку json.dumps по словарю. Какие три ключа кладутся и какие у них значения для этого вызова?"
      - "level берётся из levelname (INFO), msg - из getMessage() ('ok'), user_id - из extra (7). json.dumps ставит пробел после двоеточия и запятой."
    variants:
      - snippet: |
          import logging
          import sys
          import json

          class JsonFormatter(logging.Formatter):
              def format(self, record):
                  return json.dumps({
                      "level": record.levelname,
                      "msg": record.getMessage(),
                      "user_id": getattr(record, "user_id", None),
                  })

          logger = logging.getLogger("api.json2")
          logger.setLevel(logging.INFO)
          logger.handlers.clear()
          logger.propagate = False
          h = logging.StreamHandler(sys.stdout)
          h.setFormatter(JsonFormatter())
          logger.addHandler(h)
          logger.warning("slow")
        expected:
          kind: stdout
          value: '{"level": "WARNING", "msg": "slow", "user_id": null}'
      - snippet: |
          import logging
          import sys
          import json

          class JsonFormatter(logging.Formatter):
              def format(self, record):
                  return json.dumps({
                      "level": record.levelname,
                      "msg": record.getMessage(),
                  })

          logger = logging.getLogger("api.json3")
          logger.setLevel(logging.INFO)
          logger.handlers.clear()
          logger.propagate = False
          h = logging.StreamHandler(sys.stdout)
          h.setFormatter(JsonFormatter())
          logger.addHandler(h)
          logger.error("down")
        expected:
          kind: stdout
          value: '{"level": "ERROR", "msg": "down"}'

  - id: struct-blanks-004
    concept: structured-logging
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите вызов и шаблон так, чтобы к записи прицепилось поле user_id и оно вывелось formatter-ом."
    template: |
      import logging
      import sys

      logger = logging.getLogger("api")
      handler = logging.StreamHandler(sys.stdout)
      handler.setFormatter(logging.Formatter("%(message)s user=%({{field}})s"))
      logger.addHandler(handler)

      logger.info("готово", {{arg}}={"user_id": 42})
    blanks:
      field:
        accept: ["user_id"]
      arg:
        accept: ["extra"]
    hints:
      - "Имя поля в шаблоне %(...)s должно совпасть с ключом словаря, который вы передаёте вызову."
      - "Произвольные поля прикрепляют через именованный аргумент, чьи ключи становятся атрибутами записи."
    variants:
      - prompt: "Допишите словарь dictConfig: обязательный ключ версии схемы и поле, перечисляющее handler-ы корня."
        template: |
          from logging.config import dictConfig

          dictConfig({
              "{{vkey}}": 1,
              "handlers": {"console": {"class": "logging.StreamHandler"}},
              "root": {"level": "INFO", "{{rkey}}": ["console"]},
          })
        blanks:
          vkey:
            accept: ["version"]
          rkey:
            accept: ["handlers"]
      - prompt: "Допишите безопасное чтение поля user_id из записи внутри своего formatter-а (вернуть None, если поля нет)."
        template: |
          import logging

          class JsonFormatter(logging.Formatter):
              def format(self, record):
                  uid = {{func}}(record, "user_id", {{default}})
                  return str(uid)
        blanks:
          func:
            accept: ["getattr"]
          default:
            accept: ["None"]

  - id: struct-dictconfig-005
    concept: structured-logging
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      import logging
      import sys
      from logging.config import dictConfig

      dictConfig({
          "version": 1,
          "disable_existing_loggers": False,
          "formatters": {"plain": {"format": "%(levelname)s %(message)s"}},
          "handlers": {"console": {"class": "logging.StreamHandler",
                                   "formatter": "plain", "stream": sys.stdout}},
          "root": {"level": "INFO", "handlers": ["console"]},
      })
      logging.getLogger("app").info("настроено словарём")
    expected:
      kind: stdout
      value: "INFO настроено словарём"
    hints:
      - "dictConfig собирает весь конвейер декларативно: formatter 'plain', один handler на root, уровень INFO. Что в итоге увидит logger 'app'?"
      - "У 'app' нет своих handler-ов, запись поднимается к root, где стоит console с шаблоном '%(levelname)s %(message)s'. Подставьте уровень и текст."
    variants:
      - snippet: |
          import logging
          import sys
          from logging.config import dictConfig

          dictConfig({
              "version": 1,
              "disable_existing_loggers": False,
              "formatters": {"plain": {"format": "%(name)s/%(levelname)s: %(message)s"}},
              "handlers": {"console": {"class": "logging.StreamHandler",
                                       "formatter": "plain", "stream": sys.stdout}},
              "root": {"level": "INFO", "handlers": ["console"]},
          })
          logging.getLogger("svc").warning("осторожно")
        expected:
          kind: stdout
          value: "svc/WARNING: осторожно"
      - snippet: |
          import logging
          import sys
          from logging.config import dictConfig

          dictConfig({
              "version": 1,
              "disable_existing_loggers": False,
              "formatters": {"plain": {"format": "%(levelname)s %(message)s"}},
              "handlers": {"console": {"class": "logging.StreamHandler",
                                       "formatter": "plain", "stream": sys.stdout}},
              "root": {"level": "WARNING", "handlers": ["console"]},
          })
          logging.getLogger("app").info("это не пройдёт порог")
        expected:
          kind: stdout
          value: ""

  - id: struct-challenge-006
    concept: structured-logging
    type: python-function
    difficulty: 4
    prompt: "Реализуйте `to_json_line(level, msg, extra)`: соберите все поля level, msg и ключи словаря extra на верхнем уровне и верните JSON-строку через json.dumps с sort_keys=True. Но extra не должен затирать служебные имена: если в extra есть ключ 'level' или 'msg', верните строку 'ERROR: reserved key' и ничего не сериализуйте. Это моделирует защиту LogRecord от зарезервированных имён."
    starter: |
      import json

      def to_json_line(level, msg, extra):
          ...
    cases:
      - call: "to_json_line('INFO', 'ok', {'user_id': 7})"
        expect: '{"level": "INFO", "msg": "ok", "user_id": 7}'
      - call: "to_json_line('ERROR', 'down', {})"
        expect: '{"level": "ERROR", "msg": "down"}'
      - call: "to_json_line('WARNING', 'slow', {'duration_ms': 1300, 'path': '/pay'})"
        expect: '{"duration_ms": 1300, "level": "WARNING", "msg": "slow", "path": "/pay"}'
      - call: "to_json_line('INFO', 'x', {'msg': 'boom'})"
        expect: "ERROR: reserved key"
      - call: "to_json_line('INFO', 'x', {'level': 'boom', 'user_id': 1})"
        expect: "ERROR: reserved key"
    hints:
      - "Сначала проверьте конфликт имён: какие два ключа в extra недопустимы, потому что вы уже используете их сами под фиксированные значения?"
      - "Если конфликта нет, соберите один словарь из level, msg и всех полей extra, затем сериализуйте json.dumps с sort_keys=True - именно поэтому в ожиданиях ключи идут в алфавитном порядке."
    solution: |
      import json

      def to_json_line(level, msg, extra):
          reserved = {"level", "msg"}
          if reserved & set(extra):
              return "ERROR: reserved key"
          payload = {"level": level, "msg": msg}
          payload.update(extra)
          return json.dumps(payload, sort_keys=True)
