exercises:
  - id: struct-quiz-001
    concept: structured-logging
    type: theory-quiz
    difficulty: 1
    prompt: "What is the main difference between a structured log and free text?"
    choices:
      - id: a
        text: "A structured log keeps message and context separate"
      - id: b
        text: "A structured log is always shorter and faster to write."
      - id: c
        text: "A structured log writes only to a file while free text writes to the console."
      - id: d
        text: "A structured log automatically translates messages to English."
    correct: [a]
    explanation: "Free text hides context inside the string and forces regexp extraction. A structured log stores fields separately and a collection system indexes each as-is."
    variants:
      - prompt: "Why do production log collection systems want structured fields instead of free text?"
        choices:
          - id: a
            text: "To filter and index by field without parsing"
          - id: b
            text: "To save space by compressing text."
          - id: c
            text: "So messages cannot be read by humans."
          - id: d
            text: "So logs write ten times faster."
        correct: [a]
        explanation: "When fields are separate, a query like find by user_id is trivial. From free text you would extract the same value with regexp."
      - prompt: "Which logging call argument attaches arbitrary fields to a record?"
        choices:
          - id: a
            text: "extra={...} - its keys become record attributes available"
          - id: b
            text: "fields={...} - a special argument for structured fields."
          - id: c
            text: "context={...} - the record context dict."
          - id: d
            text: "meta={...} - message metadata."
        correct: [a]
        explanation: "Fields are added via extra - a dict whose keys become LogRecord attributes and substitute into the formatter template via %(name)s."

  - id: struct-extra-002
    concept: structured-logging
    type: predict-output
    difficulty: 2
    prompt: "What does this program print?"
    snippet: |
      import logging
      import sys

      logger = logging.getLogger("api")
      logger.setLevel(logging.INFO)
      logger.handlers.clear()
      logger.propagate = False
      handler = logging.StreamHandler(sys.stdout)
      handler.setFormatter(logging.Formatter("%(message)s user=%(user_id)s"))
      logger.addHandler(handler)

      logger.info("request handled", extra={"user_id": 42})
    expected:
      kind: stdout
      value: "request handled user=42"
    hints:
      - "Keys from extra become record fields. Which field substitutes into %(user_id)s in the template?"
      - "The template prints message text, then literal ' user=', then the user_id value from extra."
    variants:
      - snippet: |
          import logging
          import sys

          logger = logging.getLogger("svc")
          logger.setLevel(logging.INFO)
          logger.handlers.clear()
          logger.propagate = False
          handler = logging.StreamHandler(sys.stdout)
          handler.setFormatter(logging.Formatter("%(message)s [req=%(request_id)s]"))
          logger.addHandler(handler)

          logger.info("ok", extra={"request_id": "abc-7"})
        expected:
          kind: stdout
          value: "ok [req=abc-7]"
      - snippet: |
          import logging
          import sys

          logger = logging.getLogger("perf")
          logger.setLevel(logging.INFO)
          logger.handlers.clear()
          logger.propagate = False
          handler = logging.StreamHandler(sys.stdout)
          handler.setFormatter(logging.Formatter("%(message)s dur=%(duration_ms)sms"))
          logger.addHandler(handler)

          logger.info("done", extra={"duration_ms": 1300})
        expected:
          kind: stdout
          value: "done dur=1300ms"

  - id: struct-json-003
    concept: structured-logging
    type: predict-output
    difficulty: 3
    prompt: "What does this program print?"
    snippet: |
      import logging
      import sys
      import json

      class JsonFormatter(logging.Formatter):
          def format(self, record):
              return json.dumps({
                  "level": record.levelname,
                  "msg": record.getMessage(),
                  "user_id": getattr(record, "user_id", None),
              })

      logger = logging.getLogger("api.json")
      logger.setLevel(logging.INFO)
      logger.handlers.clear()
      logger.propagate = False
      h = logging.StreamHandler(sys.stdout)
      h.setFormatter(JsonFormatter())
      logger.addHandler(h)
      logger.info("ok", extra={"user_id": 7})
    expected:
      kind: stdout
      value: '{"level": "INFO", "msg": "ok", "user_id": 7}'
    hints:
      - "Custom format returns a json.dumps string from a dict. Which three keys are set and what are their values for this call?"
      - "level from levelname (INFO), msg from getMessage() ('ok'), user_id from extra (7). json.dumps adds spaces after colons and commas."
    variants:
      - snippet: |
          import logging
          import sys
          import json

          class JsonFormatter(logging.Formatter):
              def format(self, record):
                  return json.dumps({
                      "level": record.levelname,
                      "msg": record.getMessage(),
                      "user_id": getattr(record, "user_id", None),
                  })

          logger = logging.getLogger("api.json2")
          logger.setLevel(logging.INFO)
          logger.handlers.clear()
          logger.propagate = False
          h = logging.StreamHandler(sys.stdout)
          h.setFormatter(JsonFormatter())
          logger.addHandler(h)
          logger.warning("slow")
        expected:
          kind: stdout
          value: '{"level": "WARNING", "msg": "slow", "user_id": null}'
      - snippet: |
          import logging
          import sys
          import json

          class JsonFormatter(logging.Formatter):
              def format(self, record):
                  return json.dumps({
                      "level": record.levelname,
                      "msg": record.getMessage(),
                  })

          logger = logging.getLogger("api.json3")
          logger.setLevel(logging.INFO)
          logger.handlers.clear()
          logger.propagate = False
          h = logging.StreamHandler(sys.stdout)
          h.setFormatter(JsonFormatter())
          logger.addHandler(h)
          logger.error("down")
        expected:
          kind: stdout
          value: '{"level": "ERROR", "msg": "down"}'

  - id: struct-blanks-004
    concept: structured-logging
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the call and template so user_id is attached to the record and printed by the formatter."
    template: |
      import logging
      import sys

      logger = logging.getLogger("api")
      handler = logging.StreamHandler(sys.stdout)
      handler.setFormatter(logging.Formatter("%(message)s user=%({{field}})s"))
      logger.addHandler(handler)

      logger.info("ready", {{arg}}={"user_id": 42})
    blanks:
      field:
        accept: ["user_id"]
      arg:
        accept: ["extra"]
    hints:
      - "The field name in %(...)s must match the dict key you pass to the call."
      - "Arbitrary fields attach via the named argument whose keys become record attributes."
    variants:
      - prompt: "Complete the dictConfig dict: required schema version key and the field listing root handlers."
        template: |
          from logging.config import dictConfig

          dictConfig({
              "{{vkey}}": 1,
              "handlers": {"console": {"class": "logging.StreamHandler"}},
              "root": {"level": "INFO", "{{rkey}}": ["console"]},
          })
        blanks:
          vkey:
            accept: ["version"]
          rkey:
            accept: ["handlers"]
      - prompt: "Complete safe reading of user_id from the record inside a custom formatter (return None if missing)."
        template: |
          import logging

          class JsonFormatter(logging.Formatter):
              def format(self, record):
                  uid = {{func}}(record, "user_id", {{default}})
                  return str(uid)
        blanks:
          func:
            accept: ["getattr"]
          default:
            accept: ["None"]

  - id: struct-dictconfig-005
    concept: structured-logging
    type: predict-output
    difficulty: 3
    prompt: "What does this program print?"
    snippet: |
      import logging
      import sys
      from logging.config import dictConfig

      dictConfig({
          "version": 1,
          "disable_existing_loggers": False,
          "formatters": {"plain": {"format": "%(levelname)s %(message)s"}},
          "handlers": {"console": {"class": "logging.StreamHandler",
                                   "formatter": "plain", "stream": sys.stdout}},
          "root": {"level": "INFO", "handlers": ["console"]},
      })
      logging.getLogger("app").info("configured by dict")
    expected:
      kind: stdout
      value: "INFO configured by dict"
    hints:
      - "dictConfig builds the whole pipeline declaratively: formatter 'plain', one handler on root, level INFO. What does logger 'app' show?"
      - "'app' has no own handlers; the record propagates to root where console uses '%(levelname)s %(message)s'. Substitute level and text."
    variants:
      - snippet: |
          import logging
          import sys
          from logging.config import dictConfig

          dictConfig({
              "version": 1,
              "disable_existing_loggers": False,
              "formatters": {"plain": {"format": "%(name)s/%(levelname)s: %(message)s"}},
              "handlers": {"console": {"class": "logging.StreamHandler",
                                       "formatter": "plain", "stream": sys.stdout}},
              "root": {"level": "INFO", "handlers": ["console"]},
          })
          logging.getLogger("svc").warning("careful")
        expected:
          kind: stdout
          value: "svc/WARNING: careful"
      - snippet: |
          import logging
          import sys
          from logging.config import dictConfig

          dictConfig({
              "version": 1,
              "disable_existing_loggers": False,
              "formatters": {"plain": {"format": "%(levelname)s %(message)s"}},
              "handlers": {"console": {"class": "logging.StreamHandler",
                                       "formatter": "plain", "stream": sys.stdout}},
              "root": {"level": "WARNING", "handlers": ["console"]},
          })
          logging.getLogger("app").info("will not pass threshold")
        expected:
          kind: stdout
          value: ""

  - id: struct-challenge-006
    concept: structured-logging
    type: python-function
    difficulty: 4
    prompt: "Implement `to_json_line(level, msg, extra)`: assemble level, msg, and all keys from extra at the top level and return a JSON string via json.dumps with sort_keys=True. But extra must not overwrite reserved names: if extra contains key 'level' or 'msg', return 'ERROR: reserved key' and serialize nothing. This models LogRecord protection from reserved names."
    starter: |
      import json

      def to_json_line(level, msg, extra):
          ...
    cases:
      - call: "to_json_line('INFO', 'ok', {'user_id': 7})"
        expect: '{"level": "INFO", "msg": "ok", "user_id": 7}'
      - call: "to_json_line('ERROR', 'down', {})"
        expect: '{"level": "ERROR", "msg": "down"}'
      - call: "to_json_line('WARNING', 'slow', {'duration_ms': 1300, 'path': '/pay'})"
        expect: '{"duration_ms": 1300, "level": "WARNING", "msg": "slow", "path": "/pay"}'
      - call: "to_json_line('INFO', 'x', {'msg': 'boom'})"
        expect: "ERROR: reserved key"
      - call: "to_json_line('INFO', 'x', {'level': 'boom', 'user_id': 1})"
        expect: "ERROR: reserved key"
    hints:
      - "First check name conflicts: which two keys in extra are forbidden because you already use them for fixed values?"
      - "If no conflict, build one dict from level, msg, and all extra fields, then json.dumps with sort_keys=True - that is why expected keys are alphabetical."
    solution: |
      import json

      def to_json_line(level, msg, extra):
          reserved = {"level", "msg"}
          if reserved & set(extra):
              return "ERROR: reserved key"
          payload = {"level": level, "msg": msg}
          payload.update(extra)
          return json.dumps(payload, sort_keys=True)
