conceptId: logging-in-production
cards:
  - id: logging-in-production-01
    front: Какие четыре секции описывает словарь dictConfig?
    back: >-
      formatters задают вид строки, handlers определяют место назначения и
      форматтер, loggers расставляют пороги по подсистемам, root ловит всё
      остальное. Секции ссылаются друг на друга по имени.
    tags: [dictconfig, config]
  - id: logging-in-production-02
    front: Что означает ключ "version" 1 в dictConfig?
    back: >-
      Это версия формата схемы конфигурации, а не версия приложения. Она
      зафиксирована единицей, и без неё вызов dictConfig падает.
    tags: [dictconfig]
  - id: logging-in-production-03
    front: Почему логгер молчит после вызова dictConfig?
    back: >-
      По умолчанию disable_existing_loggers равен True, и логгеры, созданные до
      dictConfig (например, getLogger(__name__) при импорте) и не упомянутые в
      словаре, отключаются. На проде обычно ставят False.
    tags: [dictconfig, gotcha]
  - id: logging-in-production-04
    front: Чем logger.exception отличается от logger.error?
    back: >-
      logger.exception работает внутри except, пишет на ERROR и сам прикладывает
      traceback текущего исключения. Это то же самое, что logger.error(...,
      exc_info=True).
    tags: [exceptions]
  - id: logging-in-production-05
    front: Зачем нужен флаг stack_info=True?
    back: >-
      Он добавляет к записи стек вызовов до точки лога, даже когда исключения
      нет. Помогает понять, кто и откуда позвал функцию.
    tags: [exceptions]
  - id: logging-in-production-06
    front: Экономит ли параметрическая форма logger.debug("%s", build()) сам вызов build() на горячем пути?
    back: >-
      Нет. Аргумент build() вычисляется до входа в debug в любом случае, ведь
      Python считает аргументы заранее. Параметрическая форма откладывает только
      подстановку строки.
    tags: [performance]
  - id: logging-in-production-07
    front: Что даёт logger.isEnabledFor(level)?
    back: >-
      Возвращает, пройдёт ли запись данного уровня фильтр логгера. Проверкой
      оборачивают дорогую сборку сообщения, чтобы не считать аргумент, когда
      уровень выключен.
    tags: [performance]
  - id: logging-in-production-08
    front: Как протащить request_id во все записи одного запроса?
    back: >-
      Держат его в ContextVar со значением по умолчанию и ставят current.set(id)
      на входе в запрос. Фильтр кладёт current.get() в record.request_id и
      возвращает True. Тот же приём заворачивают в LoggerAdapter.
    tags: [context, contextvars]
  - id: logging-in-production-09
    front: Как безопасно писать лог в один файл из нескольких процессов?
    back: >-
      Воркеры кладут запись в общую очередь через QueueHandler, а один
      QueueListener в отдельном потоке владеет файловым хендлером и ротацией. Так
      исчезает конфликт за файл.
    tags: [multiprocessing, queue]
  - id: logging-in-production-10
    front: Чем управляют maxBytes и backupCount у RotatingFileHandler?
    back: >-
      maxBytes задаёт порог размера, после которого файл крутится; backupCount
      задаёт число хранимых старых копий (app.log.1, app.log.2 и так далее).
      Сверх backupCount самый старый файл удаляется.
    tags: [rotation]
