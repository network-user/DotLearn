conceptId: levels-propagation
cards:
  - id: levels-propagation-01
    front: Что означает точка в имени логгера, например shop.pay?
    back: >-
      Точка задаёт родство в дереве: shop.pay - ребёнок shop, а shop - ребёнок
      корневого logger-а. Это родство управляет наследованием уровня и подъёмом
      записи к handler-ам предков.
    tags: [hierarchy]
  - id: levels-propagation-02
    front: Какие два независимых барьера проходит запись на пути к выводу?
    back: >-
      Сначала фильтр по уровню (logger пропускает запись, если её уровень не ниже
      эффективного), затем propagation - подъём по дереву к handler-ам предков.
      Это не «или-или», а «сначала фильтр, потом подъём».
    tags: [levels, propagation]
  - id: levels-propagation-03
    front: Как вычисляется эффективный уровень логгера?
    back: >-
      Если у logger-а уровень не задан (NOTSET, значение 0), он ищется вверх по
      дереву до первого предка с заданным уровнем. Найденный уровень и становится
      эффективным.
    tags: [levels, effective-level]
  - id: levels-propagation-04
    front: Что делает propagation по умолчанию с прошедшей фильтр записью?
    back: >-
      Отдаёт её handler-ам своего logger-а, затем поднимает к родителю и отдаёт
      его handler-ам, и так до корня. Поэтому один handler на корне обслуживает
      всё дерево logger-ов.
    tags: [propagation]
  - id: levels-propagation-05
    front: Что делает propagate = False у логгера?
    back: >-
      Обрывает подъём по дереву: запись обслужат только собственные handler-ы
      этого logger-а, к предкам она не пойдёт. Используется, чтобы отделить
      шумную подсистему.
    tags: [propagation]
  - id: levels-propagation-06
    front: Почему частая причина задвоения логов - это работающий propagation?
    back: >-
      Если handler стоит и на ребёнке, и на родителе, запись напечатается дважды:
      сначала handler-ом ребёнка, затем handler-ом родителя после подъёма. Лечат
      удалением одного handler-а или propagate = False на ребёнке.
    tags: [propagation, duplicates]
  - id: levels-propagation-07
    front: Почему logger.setLevel(DEBUG) может не показать отладку?
    back: >-
      У handler-а свой уровень - это второй, отдельный фильтр после уровня
      logger-а. Если handler настроен на WARNING, DEBUG до него не дойдёт. Запись
      должна пройти и уровень logger-а, и уровень каждого handler-а.
    tags: [levels, handler]
  - id: levels-propagation-08
    front: Что нельзя забыть, выставляя propagate = False у логгера?
    back: >-
      Дать logger-у собственный handler. Иначе записи теряются: к предкам они не
      идут из-за оборванного подъёма, а своего выхода нет.
    tags: [propagation, handler]
  - id: levels-propagation-09
    front: Почему отброшенная по уровню запись никуда не поднимается по дереву?
    back: >-
      Фильтр уровня срабатывает на logger-е ещё до handler-ов. Если запись не
      прошла фильтр, подниматься уже нечему - стадия propagation для неё не
      наступает.
    tags: [levels, propagation]
