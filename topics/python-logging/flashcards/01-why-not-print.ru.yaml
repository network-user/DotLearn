conceptId: why-not-print
cards:
  - id: why-not-print-01
    front: Чем логирование принципиально отличается от print?
    back: >-
      Лог переживает сам запуск программы и отвечает на вопрос «что тут
      происходило». print выводит строку сейчас и без разбора, не оставляя следа,
      который можно восстановить позже.
    tags: [logging, print]
  - id: why-not-print-02
    front: Какие три вещи добавляет логирование поверх print?
    back: >-
      Уровень важности сообщения, маршрут до места назначения и управление тем,
      что показывать. У print нет ни понятия важности, ни адресата, ни
      выключателя.
    tags: [logging]
  - id: why-not-print-03
    front: Перечислите пять стандартных уровней логирования по возрастанию важности.
    back: DEBUG, INFO, WARNING, ERROR, CRITICAL.
    tags: [levels]
  - id: why-not-print-04
    front: Что делает порог уровня (level) при настройке логирования?
    back: >-
      Работает как выключатель: сообщения ниже порога не доходят до вывода.
      Строки логов остаются в коде, а видимость управляется одной настройкой, без
      удаления кода.
    tags: [levels]
  - id: why-not-print-05
    front: Что произойдёт при вызове logging.warning() без предварительного basicConfig?
    back: >-
      Сообщение всё равно выведется. Модуль молча включает аварийный обработчик
      lastResort, который показывает WARNING и выше, чтобы важные записи не
      потерялись из-за забытой настройки.
    tags: [lastresort, basicconfig]
  - id: why-not-print-06
    front: Сколько раз срабатывает logging.basicConfig за время жизни программы?
    back: >-
      Один раз: первая настройка побеждает, повторный вызов по умолчанию ничего
      не меняет. Это частый источник «почему мой level не применился».
    tags: [basicconfig]
  - id: why-not-print-07
    front: >-
      Почему logging.debug("x=%s", value) лучше, чем
      logging.debug(f"x={value}")?
    back: >-
      Аргументы f-string вычисляются и склеиваются всегда, даже когда уровень
      DEBUG выключен и запись будет отброшена. Параметрическая форма откладывает
      подстановку %s до того момента, когда запись реально проходит фильтр.
    tags: [performance, debug]
  - id: why-not-print-08
    front: Чем logging.exception() в блоке except лучше, чем print ошибки?
    back: >-
      logging.exception("сбой") сам приложит полный traceback и пометит запись
      уровнем ERROR. print("ошибка:", e) теряет трассировку и тонет в общем
      потоке.
    tags: [exception, error]
  - id: why-not-print-09
    front: Как заставить лог автоматически дописывать время и уровень к сообщению?
    back: >-
      Задать шаблон через параметр format, например
      format="%(asctime)s %(levelname)s %(message)s". Эти поля подставляются
      автоматически, руками собирать их не нужно.
    tags: [format]
