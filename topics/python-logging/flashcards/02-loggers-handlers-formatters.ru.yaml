conceptId: loggers-handlers-formatters
cards:
  - id: loggers-handlers-formatters-01
    front: За что отвечают Logger, Handler и Formatter по отдельности?
    back: >-
      Logger решает, пускать ли запись (по уровню), и раздаёт её handler-ам.
      Handler решает, куда уйдёт запись (консоль, файл, сеть). Formatter решает,
      как запись выглядит - превращает её в строку по шаблону.
    tags: [logger, handler, formatter]
  - id: loggers-handlers-formatters-02
    front: Что возвращает logging.getLogger("shop.orders") при повторном вызове с тем же именем?
    back: >-
      Тот же самый объект. Logger-ы это глобальный реестр по имени, а не новые
      объекты на каждый вызов, поэтому настроить logger в одном месте и получить
      его настроенным в другом - норма.
    tags: [logger, getlogger]
  - id: loggers-handlers-formatters-03
    front: Что выведет именованный logger, у которого нет ни одного handler-а?
    back: >-
      Ничего (кроме аварийного lastResort для WARNING и выше). Голому logger-у
      некуда писать: вывод определяет handler, который нужно прицепить через
      addHandler.
    tags: [handler]
  - id: loggers-handlers-formatters-04
    front: Куда по умолчанию пишет StreamHandler?
    back: >-
      В поток stderr по умолчанию. Можно явно указать другой поток, например
      logging.StreamHandler(sys.stdout).
    tags: [handler, streamhandler]
  - id: loggers-handlers-formatters-05
    front: На каком объекте живёт Formatter - на logger-е или на handler-е?
    back: >-
      На handler-е. У logger-а нет метода setFormatter. Поэтому один logger может
      писать одну и ту же запись в разные места в разных форматах.
    tags: [formatter, handler]
  - id: loggers-handlers-formatters-06
    front: Что произойдёт, если дважды вызвать addHandler с одинаковым handler-ом?
    back: >-
      Запись напечатается дважды. addHandler не заменяет, а накапливает: logger
      хранит handler-ы списком и не проверяет дубли. Настройку делают один раз
      при старте.
    tags: [handler, duplicates]
  - id: loggers-handlers-formatters-07
    front: Как formatter ссылается на поля записи в шаблоне?
    back: >-
      Через синтаксис %(имя)s, например %(levelname)s, %(name)s, %(message)s,
      %(asctime)s, %(funcName)s, %(lineno)d.
    tags: [formatter, format]
  - id: loggers-handlers-formatters-08
    front: Зачем нужна идиома logging.getLogger(__name__)?
    back: >-
      Она даёт logger с именем текущего модуля и встраивает его в иерархию
      logger-ов, чтобы вывод собирался настройкой на верхнем уровне дерева.
    tags: [logger, getlogger]
  - id: loggers-handlers-formatters-09
    front: Зачем разделять Logger, Handler и Formatter на три объекта?
    back: >-
      Чтобы получить независимые оси настройки: уровень фильтрации по
      подсистемам (logger), место назначения по окружению (handler) и внешний вид
      по адресату (formatter). Их можно менять и переиспользовать раздельно.
    tags: [design]
