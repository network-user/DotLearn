conceptId: logging-in-production
cards:
  - id: logging-in-production-01
    front: Which four sections does a dictConfig dict describe?
    back: >-
      formatters set how a line looks, handlers decide the destination and
      formatter, loggers place thresholds per subsystem, root catches the rest.
      Sections reference each other by name.
    tags: [dictconfig, config]
  - id: logging-in-production-02
    front: 'What does the "version" 1 key mean in dictConfig?'
    back: >-
      It is the configuration schema format version, not your application
      version. It is fixed at 1, and the dictConfig call fails without it.
    tags: [dictconfig]
  - id: logging-in-production-03
    front: Why is a logger silent after a dictConfig call?
    back: >-
      By default disable_existing_loggers is True, so loggers created before
      dictConfig (for example getLogger(__name__) at import) and not named in the
      dict are disabled. Production usually sets it False.
    tags: [dictconfig, gotcha]
  - id: logging-in-production-04
    front: How is logger.exception different from logger.error?
    back: >-
      logger.exception works inside except, writes at ERROR, and attaches the
      current exception traceback by itself. It is the same as logger.error(...,
      exc_info=True).
    tags: [exceptions]
  - id: logging-in-production-05
    front: What is the stack_info=True flag for?
    back: >-
      It adds the call stack up to the log point even when there is no exception.
      It helps you see who called a function and from where.
    tags: [exceptions]
  - id: logging-in-production-06
    front: Does the parametric form logger.debug("%s", build()) save the build() call itself on the hot path?
    back: >-
      No. build() is evaluated before entering debug either way, because Python
      computes arguments first. The parametric form defers only the string
      substitution.
    tags: [performance]
  - id: logging-in-production-07
    front: What does logger.isEnabledFor(level) give you?
    back: >-
      It returns whether a record at that level would pass the logger filter. You
      wrap an expensive message build in it to avoid computing the argument when
      the level is off.
    tags: [performance]
  - id: logging-in-production-08
    front: How do you thread request_id into every record of one request?
    back: >-
      Keep it in a ContextVar with a default and call current.set(id) at request
      entry. A filter puts current.get() into record.request_id and returns True.
      The same trick wraps into a LoggerAdapter.
    tags: [context, contextvars]
  - id: logging-in-production-09
    front: How do you safely log to one file from several processes?
    back: >-
      Workers put records onto a shared queue via QueueHandler, and one
      QueueListener on a separate thread owns the file handler and rotation.
      Contention for the file is gone.
    tags: [multiprocessing, queue]
  - id: logging-in-production-10
    front: What do maxBytes and backupCount control on RotatingFileHandler?
    back: >-
      maxBytes sets the size threshold after which the file rolls; backupCount
      sets how many old copies are kept (app.log.1, app.log.2, and so on). Beyond
      backupCount the oldest file is deleted.
    tags: [rotation]
