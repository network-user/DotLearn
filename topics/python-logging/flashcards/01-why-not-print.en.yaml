conceptId: why-not-print
cards:
  - id: why-not-print-01
    front: How is logging fundamentally different from print?
    back: >-
      A log outlives the process and answers "what happened here". print writes a
      string now without leaving a trail you can recover later.
    tags: [logging, print]
  - id: why-not-print-02
    front: What three things does logging add on top of print?
    back: >-
      Message severity level, routing to a destination, and control over what is
      shown. print has no notion of importance, destination, or an off switch.
    tags: [logging]
  - id: why-not-print-03
    front: List the five standard logging levels in order of increasing severity.
    back: DEBUG, INFO, WARNING, ERROR, CRITICAL.
    tags: [levels]
  - id: why-not-print-04
    front: What does the level threshold do when configuring logging?
    back: >-
      It acts as a switch: messages below the threshold never reach output. Log
      lines stay in code while visibility is controlled by one setting, without
      deleting code.
    tags: [levels]
  - id: why-not-print-05
    front: What happens if you call logging.warning() without prior basicConfig?
    back: >-
      The message still appears. The module silently enables the lastResort
      emergency handler that shows WARNING and above so important records are not
      lost because setup was forgotten.
    tags: [lastresort, basicconfig]
  - id: why-not-print-06
    front: How many times does logging.basicConfig take effect per process lifetime?
    back: >-
      Once: the first configuration wins; a repeat call changes nothing by
      default. A common source of "why did my level not apply".
    tags: [basicconfig]
  - id: why-not-print-07
    front: >-
      Why is logging.debug("x=%s", value) better than
      logging.debug(f"x={value}")?
    back: >-
      f-string arguments are evaluated and concatenated always, even when DEBUG is
      off and the record will be dropped. The parameterized form defers %s
      substitution until the record actually passes the filter.
    tags: [performance, debug]
  - id: why-not-print-08
    front: Why is logging.exception() in an except block better than printing the error?
    back: >-
      logging.exception("failure") attaches the full traceback and marks the
      record ERROR. print("error:", e) loses the traceback and drowns in the
      general stream.
    tags: [exception, error]
  - id: why-not-print-09
    front: How do you make the log automatically append time and level to a message?
    back: >-
      Set a template via format, for example
      format="%(asctime)s %(levelname)s %(message)s". Those fields are substituted
      automatically; you do not assemble them by hand.
    tags: [format]
