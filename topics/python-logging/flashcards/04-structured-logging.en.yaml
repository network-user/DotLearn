conceptId: structured-logging
cards:
  - id: structured-logging-01
    front: How is a structured log different from free text?
    back: >-
      A structured log keeps message and context separate: message is the phrase,
      and indexed fields like user_id and duration_ms sit beside it. In free text
      you must extract those values with regular expressions.
    tags: [structured]
  - id: structured-logging-02
    front: What is the extra argument for in a logging call?
    back: >-
      extra is a dict whose keys become record attributes and are available in
      the formatter template via %(name)s. Context travels with the record
      separately from message text.
    tags: [extra]
  - id: structured-logging-03
    front: What happens if the formatter references %(user_id)s but extra has no user_id key?
    back: >-
      Formatting raises KeyError. So extra keys are either guaranteed on every
      call or supplied via a filter with a default value.
    tags: [extra, errors]
  - id: structured-logging-04
    front: How do you emit machine-readable JSON logs?
    back: >-
      Subclass logging.Formatter and override format to return json.dumps with a
      dict of fields. A log collection system can parse that string without
      regular expressions.
    tags: [json, formatter]
  - id: structured-logging-05
    front: What does logging.config.dictConfig do?
    back: >-
      Accepts one dict describing formatters, handlers, and loggers entirely and
      builds the whole pipeline declaratively in one call instead of scattered
      addHandler and setLevel calls.
    tags: [dictconfig, config]
  - id: structured-logging-06
    front: 'Why is "version" 1 required in a dictConfig dict?'
    back: >-
      It is the configuration schema format version, not your application version.
      It is fixed at 1, and dictConfig fails without it.
    tags: [dictconfig]
  - id: structured-logging-07
    front: Which extra key names are forbidden?
    back: >-
      Reserved record attribute names: message, args, levelname, asctime, and
      others. Overwriting them raises KeyError. Use your own names like user_id
      or request_id.
    tags: [extra, reserved]
  - id: structured-logging-08
    front: Why is putting variables in message text instead of extra a mistake?
    back: >-
      logger.info(f"user {uid} ok") hides data in the string and forces regexp
      parsing. logger.info("ok", extra={"user_id": uid}) delivers a field ready
      for indexing.
    tags: [structured, extra]
  - id: structured-logging-09
    front: When to use basicConfig versus dictConfig?
    back: >-
      basicConfig for scripts and prototypes: one line, one root handler.
      dictConfig for apps heading to production with multiple environments:
      several formatters and handlers, per-subsystem levels, all in one dict.
    tags: [config, dictconfig, basicconfig]
  - id: structured-logging-10
    front: Why does a repeat basicConfig after startup change nothing?
    back: >-
      basicConfig runs once; a repeat call without force=True is ignored. To
      reconfigure on the fly use force=True or dictConfig.
    tags: [basicconfig, config]
