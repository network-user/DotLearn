conceptId: levels-propagation
cards:
  - id: levels-propagation-01
    front: What does a dot in a logger name mean, for example shop.pay?
    back: >-
      The dot declares tree parentage: shop.pay is a child of shop, and shop is a
      child of the root logger. That parentage controls level inheritance and
      record propagation to ancestor handlers.
    tags: [hierarchy]
  - id: levels-propagation-02
    front: What two independent barriers does a record pass on the way to output?
    back: >-
      First the level filter (the logger admits the record if its level is not
      below the effective level), then propagation - climbing the tree to
      ancestor handlers. Not either-or, but filter first, then climb.
    tags: [levels, propagation]
  - id: levels-propagation-03
    front: How is a logger's effective level computed?
    back: >-
      If the logger's own level is unset (NOTSET, value 0), walk up the tree to
      the first ancestor with a set level. That level becomes the effective one.
    tags: [levels, effective-level]
  - id: levels-propagation-04
    front: What does propagation do by default with a record that passed the level filter?
    back: >-
      Hands it to this logger's handlers, then climbs to the parent and hands it
      to the parent's handlers, and so on to the root. One handler on the root can
      serve the whole tree.
    tags: [propagation]
  - id: levels-propagation-05
    front: What does propagate = False on a logger do?
    back: >-
      Stops climbing the tree: only this logger's own handlers serve the record;
      it does not go to ancestors. Used to isolate a noisy subsystem.
    tags: [propagation]
  - id: levels-propagation-06
    front: Why is working propagation a common cause of duplicate logs?
    back: >-
      If a handler sits on both child and parent, the record prints twice: first
      the child's handler, then the parent's after propagation. Fix by removing
      one handler or setting propagate = False on the child.
    tags: [propagation, duplicates]
  - id: levels-propagation-07
    front: Why might logger.setLevel(DEBUG) still hide debug output?
    back: >-
      A handler has its own level - a second filter after the logger's level. If
      the handler is set to WARNING, DEBUG never reaches it. The record must pass
      both the logger level and every handler level on the path.
    tags: [levels, handler]
  - id: levels-propagation-08
    front: What must you not forget when setting propagate = False on a logger?
    back: >-
      Give the logger its own handler. Otherwise records are lost: they cannot
      climb to ancestors and have no local outlet.
    tags: [propagation, handler]
  - id: levels-propagation-09
    front: Why does a record dropped by level never propagate up the tree?
    back: >-
      The level filter runs on the logger before handlers. If the record fails
      the filter, there is nothing to propagate - the propagation stage never
      happens.
    tags: [levels, propagation]
