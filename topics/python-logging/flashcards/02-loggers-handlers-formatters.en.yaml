conceptId: loggers-handlers-formatters
cards:
  - id: loggers-handlers-formatters-01
    front: What does each of Logger, Handler, and Formatter do?
    back: >-
      Logger decides whether to admit a record (by level) and hands it to
      handlers. Handler decides where the record goes (console, file, network).
      Formatter decides how it looks - turning the record into a string by
      template.
    tags: [logger, handler, formatter]
  - id: loggers-handlers-formatters-02
    front: What does logging.getLogger("shop.orders") return on a repeat call with the same name?
    back: >-
      The same object. Loggers are a global registry by name, not new objects on
      every call, so configuring a logger in one place and getting it configured
      elsewhere is normal.
    tags: [logger, getlogger]
  - id: loggers-handlers-formatters-03
    front: What does a named logger with no handlers print?
    back: >-
      Nothing (except lastResort emergency output for WARNING and above). A bare
      logger has nowhere to write: output is determined by a handler attached via
      addHandler.
    tags: [handler]
  - id: loggers-handlers-formatters-04
    front: Where does StreamHandler write by default?
    back: >-
      To stderr by default. You can pass another stream explicitly, for example
      logging.StreamHandler(sys.stdout).
    tags: [handler, streamhandler]
  - id: loggers-handlers-formatters-05
    front: Which object owns the Formatter - logger or handler?
    back: >-
      The handler. A logger has no setFormatter method. So one logger can write
      the same record to different places in different formats.
    tags: [formatter, handler]
  - id: loggers-handlers-formatters-06
    front: What happens if you call addHandler twice with the same handler?
    back: >-
      The record prints twice. addHandler accumulates rather than replaces: the
      logger keeps handlers in a list without deduplication. Configure once at
      startup.
    tags: [handler, duplicates]
  - id: loggers-handlers-formatters-07
    front: How does a formatter reference record fields in a template?
    back: >-
      With %(name)s syntax, for example %(levelname)s, %(name)s, %(message)s,
      %(asctime)s, %(funcName)s, %(lineno)d.
    tags: [formatter, format]
  - id: loggers-handlers-formatters-08
    front: Why use the logging.getLogger(__name__) idiom?
    back: >-
      It gives a logger named after the current module and places it in the logger
      hierarchy so output is collected by configuration at the top of the tree.
    tags: [logger, getlogger]
  - id: loggers-handlers-formatters-09
    front: Why split Logger, Handler, and Formatter into three objects?
    back: >-
      To get independent configuration axes: filtering level by subsystem
      (logger), destination by environment (handler), and appearance by target
      (formatter). They can be changed and reused separately.
    tags: [design]
