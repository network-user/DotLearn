conceptId: structured-logging
cards:
  - id: structured-logging-01
    front: Чем структурный лог отличается от свободного текста?
    back: >-
      Структурный лог держит сообщение и контекст раздельно: message - фраза, а
      рядом отдельные индексируемые поля вроде user_id и duration_ms. В свободной
      строке те же значения приходится выколупывать регулярными выражениями.
    tags: [structured]
  - id: structured-logging-02
    front: Для чего нужен аргумент extra в вызове логгера?
    back: >-
      extra - словарь, ключи которого становятся атрибутами записи и доступны в
      шаблоне formatter-а через %(имя)s. Так контекст путешествует с записью
      отдельно от текста сообщения.
    tags: [extra]
  - id: structured-logging-03
    front: Что произойдёт, если formatter ссылается на %(user_id)s, а ключа нет в extra?
    back: >-
      Форматирование упадёт с KeyError. Поэтому ключи extra либо гарантируют на
      каждый вызов, либо проставляют через фильтр со значением по умолчанию.
    tags: [extra, errors]
  - id: structured-logging-04
    front: Как отдать лог в машиночитаемом JSON?
    back: >-
      Унаследоваться от logging.Formatter и переопределить метод format, вернув
      json.dumps со словарём полей. Система сбора разберёт такую строку без
      регулярных выражений.
    tags: [json, formatter]
  - id: structured-logging-05
    front: Что делает logging.config.dictConfig?
    back: >-
      Принимает один словарь, описывающий formatter-ы, handler-ы и logger-ы
      целиком, и собирает весь конвейер декларативно за один вызов вместо россыпи
      addHandler и setLevel.
    tags: [dictconfig, config]
  - id: structured-logging-06
    front: Зачем в словаре dictConfig обязателен ключ "version" 1?
    back: >-
      Это версия формата схемы конфигурации, а не версия приложения. Она
      зафиксирована единицей, и без неё вызов dictConfig падает.
    tags: [dictconfig]
  - id: structured-logging-07
    front: Какие имена ключей нельзя класть в extra?
    back: >-
      Зарезервированные служебные имена записи: message, args, levelname,
      asctime и другие. Попытка их перезаписать поднимает KeyError. Давайте полям
      собственные имена вроде user_id или request_id.
    tags: [extra, reserved]
  - id: structured-logging-08
    front: Почему класть переменные в текст сообщения вместо extra - ошибка?
    back: >-
      logger.info(f"user {uid} ok") снова прячет данные в строку, и системе сбора
      придётся разбирать её regexp-ом. logger.info("ok", extra={"user_id": uid})
      отдаёт поле, готовое к индексации.
    tags: [structured, extra]
  - id: structured-logging-09
    front: Когда брать basicConfig, а когда dictConfig?
    back: >-
      basicConfig - для скриптов и прототипов: одна строка, один handler на
      корне. dictConfig - для приложений, которые поедут на прод с разными
      окружениями: несколько formatter-ов и handler-ов, точечные уровни, всё
      одним словарём.
    tags: [config, dictconfig, basicconfig]
  - id: structured-logging-10
    front: Почему повторный basicConfig после старта ничего не меняет?
    back: >-
      basicConfig срабатывает один раз; повторный вызов без force=True
      игнорируется. Для смены настроек на ходу используйте force=True или
      dictConfig.
    tags: [basicconfig, config]
