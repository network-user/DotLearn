exercises:
  - id: event-listeners-quiz-basics-001
    concept: event-listeners
    type: theory-quiz
    difficulty: 1
    prompt: 'Что делает event.preventDefault() в обработчике submit формы?'
    choices:
      - id: a
        text: 'Останавливает всплытие события к предкам.'
      - id: b
        text: 'Отменяет стандартное действие браузера'
      - id: c
        text: 'Удаляет обработчик после первого вызова.'
      - id: d
        text: 'Очищает поля формы.'
    correct: [b]
    explanation: 'preventDefault отменяет встроенное поведение элемента. Для submit это перезагрузка страницы. Всплытие при этом продолжается - его останавливает другой метод, stopPropagation.'
    hints:
      - 'Речь про стандартное поведение браузера, а не про маршрут события по дереву. Что делает браузер по умолчанию, когда форму отправляют?'
    variants:
      - prompt: 'Обработчик подписан анонимной стрелкой: el.addEventListener("click", () => f()). Почему его нельзя снять через removeEventListener?'
        choices:
          - id: a
            text: 'removeEventListener работает только с событием click.'
          - id: b
            text: 'У removeEventListener нет ссылки на ту же функцию: новая стрелка'
          - id: c
            text: 'Анонимные обработчики снимаются автоматически.'
          - id: d
            text: 'Нужно сначала вызвать preventDefault.'
        correct: [b]
        explanation: 'removeEventListener снимает подписку только по той же ссылке на функцию. Анонимная стрелка нигде не сохранена, а новая такая же - это уже другой объект, поэтому совпадения не будет.'
      - prompt: 'Что делает опция { once: true } третьим аргументом addEventListener?'
        choices:
          - id: a
            text: 'Обработчик срабатывает один раз и сам отписывается.'
          - id: b
            text: 'Обработчик срабатывает только на фазе погружения.'
          - id: c
            text: 'Разрешает не более одного обработчика на элемент.'
          - id: d
            text: 'Отменяет стандартное действие браузера.'
        correct: [a]
        explanation: 'С опцией once браузер вызовет обработчик ровно один раз и затем сам снимет подписку - удобно, когда реакция нужна только при первом событии.'

  - id: event-listeners-describe-click-001
    concept: event-listeners
    type: predict-output
    difficulty: 2
    prompt: 'describeClick по event.button возвращает название кнопки мыши. Что напечатает код? Введите вывод построчно.'
    snippet: |
      const describeClick = (event) => {
        if (event.button === 0) return 'левая';
        if (event.button === 1) return 'средняя';
        if (event.button === 2) return 'правая';
        return 'неизвестная';
      };
      console.log(describeClick({ type: 'click', button: 0 }));
      console.log(describeClick({ type: 'click', button: 2 }));
      console.log(describeClick({ type: 'click', button: 1 }));
    expected:
      kind: stdout
      value: |-
        левая
        правая
        средняя
    explanation: 'Функция сопоставляет код кнопки с названием: 0 это левая, 2 правая, 1 средняя. Любой другой код дал бы «неизвестная».'
    hints:
      - 'Три известных кода 0, 1 и 2 дают свои названия, всё прочее запасной ответ.'
    variants:
      - snippet: |
          const describeClick = (event) => {
            if (event.button === 0) return 'левая';
            if (event.button === 1) return 'средняя';
            if (event.button === 2) return 'правая';
            return 'неизвестная';
          };
          console.log(describeClick({ type: 'click', button: 2 }));
          console.log(describeClick({ type: 'click', button: 0 }));
          console.log(describeClick({ type: 'click', button: 5 }));
        expected:
          kind: stdout
          value: |-
            правая
            левая
            неизвестная

  - id: event-listeners-predict-current-001
    concept: event-listeners
    type: predict-output
    difficulty: 2
    prompt: 'Клик был по кнопке, а обработчик висит на списке ul. Что напечатает код, читающий два поля события?'
    snippet: |
      const event = { target: 'button', currentTarget: 'ul' };
      console.log('target: ' + event.target);
      console.log('currentTarget: ' + event.currentTarget);
    expected:
      kind: stdout
      value: |-
        target: button
        currentTarget: ul
    explanation: 'target - где событие случилось (кнопка), currentTarget - где висит обработчик, поймавший всплывшее событие (список ul). Когда обработчик на предке, эти поля разные.'
    hints:
      - 'Одно поле про то, по чему кликнули, другое - про то, кто сейчас обрабатывает. Значения уже лежат в объекте, прочитайте их по именам.'
    variants:
      - snippet: |
          const event = { target: 'a', currentTarget: 'nav' };
          console.log('target: ' + event.target);
          console.log('currentTarget: ' + event.currentTarget);
        expected:
          kind: stdout
          value: |-
            target: a
            currentTarget: nav
      - snippet: |
          const event = { target: 'span', currentTarget: 'div' };
          console.log('target: ' + event.target);
          console.log('currentTarget: ' + event.currentTarget);
        expected:
          kind: stdout
          value: |-
            target: span
            currentTarget: div

  - id: event-listeners-guard-submit-001
    concept: event-listeners
    type: predict-output
    difficulty: 3
    prompt: 'shouldPreventSubmit возвращает true, если хотя бы одно обязательное поле пустое (значение из одних пробелов тоже пустое). Что напечатает код? Введите вывод построчно.'
    snippet: |
      const shouldPreventSubmit = (fields) => {
        return fields.some((f) => f.required && f.value.trim() === '');
      };
      console.log(shouldPreventSubmit([{ required: true, value: '' }, { required: false, value: '' }]));
      console.log(shouldPreventSubmit([{ required: true, value: 'Анна' }]));
      console.log(shouldPreventSubmit([{ required: true, value: '   ' }]));
      console.log(shouldPreventSubmit([]));
    expected:
      kind: stdout
      value: |-
        true
        false
        true
        false
    explanation: 'some ищет обязательное поле с пустым после trim значением. В первом наборе такое есть, во втором поле заполнено, в третьем пробелы после trim пусты, в пустом наборе искать нечего.'
    hints:
      - 'Достаточно одного проблемного обязательного поля, чтобы вернуть true.'
      - 'Пустое значение это value, у которого trim даёт пустую строку.'
