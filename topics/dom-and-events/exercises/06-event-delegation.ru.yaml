exercises:
  - id: delegation-quiz-idea-001
    concept: event-delegation
    type: theory-quiz
    difficulty: 1
    prompt: 'Зачем в делегировании вешают один обработчик на контейнер вместо обработчика на каждый элемент?'
    choices:
      - id: a
        text: 'Так события начинают всплывать, а иначе не всплывали бы.'
      - id: b
        text: 'Одна подписка обслуживает все элементы, включая добавленные позже.'
      - id: c
        text: 'Это единственный способ узнать координаты клика.'
      - id: d
        text: 'Обработчик на контейнере отменяет стандартное действие браузера.'
    correct: [b]
    explanation: 'Клики потомков всплывают к общему предку, поэтому одна подписка на контейнере обслуживает все элементы. И новые элементы, добавленные после подписки, работают сразу - их события всплывают к тому же обработчику.'
    hints:
      - 'Подумайте, что происходит, когда в список добавляют новые элементы уже после того, как обработчики расставлены.'
    variants:
      - prompt: 'Что делает event.target.closest(".card")?'
        choices:
          - id: a
            text: 'Возвращает ближайший к target предок (включая сам target) с классом card, или null.'
          - id: b
            text: 'Возвращает всех детей target с классом card.'
          - id: c
            text: 'Проверяет, есть ли класс card ровно на target.'
          - id: d
            text: 'Спускается от target вниз к первому потомку с классом card.'
        correct: [a]
        explanation: 'closest идёт от самого target вверх по предкам и возвращает первый подходящий под селектор элемент, либо null. Начинает он с самого target, поэтому клик по вложенному узлу всё равно находит нужную карточку.'
      - prompt: 'Кликнули по картинке img внутри карточки. Чему равен event.target?'
        choices:
          - id: a
            text: 'Самой карточке .card - клик всегда относится к контейнеру.'
          - id: b
            text: 'Элементу img: target - это самый глубокий элемент, где случилось событие.'
          - id: c
            text: 'Списку ul, на котором висит обработчик.'
          - id: d
            text: 'null, потому что по картинке кликать нельзя.'
        correct: [b]
        explanation: 'target - это самый глубокий элемент под курсором, то есть img. Чтобы добраться от него до карточки, и применяют closest.'

  - id: delegation-closest-001
    concept: event-delegation
    type: javascript-function
    difficulty: 2
    prompt: 'Реализуйте closestByClass(chain, cls) - модель closest: chain - цепочка узлов от target вверх к корню, каждый узел это { tag, classes }. Верните tag первого узла, чей classes содержит cls, или null.'
    starter: |
      const closestByClass = (chain, cls) => {

      };
    cases:
      - call: "closestByClass([{tag:'span',classes:[]},{tag:'button',classes:['card']}], 'card')"
        expect: 'button'
      - call: "closestByClass([{tag:'b',classes:['card']},{tag:'div',classes:[]}], 'card')"
        expect: 'b'
      - call: "closestByClass([{tag:'span',classes:[]},{tag:'div',classes:[]}], 'card')"
        expect: null
    hints:
      - 'closest проверяет узлы по порядку от target вверх и останавливается на первом подходящем. Как только нашли - дальше искать не нужно.'
      - 'Пройдите цепочку циклом; если classes текущего узла содержит cls, верните его tag; дошли до конца без находки - верните null.'
    solution: |
      const closestByClass = (chain, cls) => {
        for (const node of chain) {
          if (node.classes.includes(cls)) {
            return node.tag;
          }
        }
        return null;
      };
    variants:
      - prompt: 'Реализуйте closestByClass(chain, cls) - модель closest: верните tag первого узла цепочки с классом cls, или null.'
        cases:
          - call: "closestByClass([{tag:'i',classes:['icon']},{tag:'a',classes:['link','nav-item']}], 'nav-item')"
            expect: 'a'
          - call: "closestByClass([{tag:'a',classes:['nav-item']}], 'nav-item')"
            expect: 'a'
          - call: "closestByClass([{tag:'p',classes:[]}], 'nav-item')"
            expect: null
        solution: |
          const closestByClass = (chain, cls) => {
            for (const node of chain) {
              if (node.classes.includes(cls)) {
                return node.tag;
              }
            }
            return null;
          };
      - prompt: 'Реализуйте closestByClass(chain, cls) - модель closest: верните tag первого узла цепочки с классом cls, или null.'
        cases:
          - call: "closestByClass([{tag:'span',classes:[]},{tag:'li',classes:['row']},{tag:'ul',classes:['list']}], 'list')"
            expect: 'ul'
          - call: "closestByClass([{tag:'li',classes:['row']},{tag:'ul',classes:['list']}], 'row')"
            expect: 'li'
          - call: "closestByClass([{tag:'div',classes:['x']}], 'y')"
            expect: null
        solution: |
          const closestByClass = (chain, cls) => {
            for (const node of chain) {
              if (node.classes.includes(cls)) {
                return node.tag;
              }
            }
            return null;
          };

  - id: delegation-predict-dataset-001
    concept: event-delegation
    type: predict-output
    difficulty: 2
    prompt: 'Один делегированный обработчик читает id товара из dataset найденной карточки. Что напечатает код для двух кликов?'
    snippet: |
      const handle = (target) => 'клик по товару ' + target.dataset.id;
      console.log(handle({ dataset: { id: '42' } }));
      console.log(handle({ dataset: { id: '7' } }));
    expected:
      kind: stdout
      value: |-
        клик по товару 42
        клик по товару 7
    explanation: 'Обработчик один, а различаются карточки только своим data-id. Он читает target.dataset.id и подставляет в строку - так одна функция обслуживает любое число карточек.'
    hints:
      - 'Функция берёт id из dataset переданного объекта и склеивает со строкой. Подставьте по очереди оба значения id.'
    variants:
      - snippet: |
          const handle = (target) => 'клик по товару ' + target.dataset.id;
          console.log(handle({ dataset: { id: '15' } }));
          console.log(handle({ dataset: { id: '3' } }));
        expected:
          kind: stdout
          value: |-
            клик по товару 15
            клик по товару 3
      - snippet: |
          const handle = (target) => 'клик по товару ' + target.dataset.id;
          console.log(handle({ dataset: { id: '100' } }));
          console.log(handle({ dataset: { id: '200' } }));
        expected:
          kind: stdout
          value: |-
            клик по товару 100
            клик по товару 200

  - id: delegation-resolve-action-001
    concept: event-delegation
    type: javascript-function
    difficulty: 4
    prompt: 'Реализуйте resolveAction(chain) для делегированного обработчика. chain - цепочка узлов от target вверх, каждый узел { classes }. Верните "delete", если в цепочке встречается класс delete-btn; иначе "select", если встречается card; иначе "none". Внутри карточки кнопка удаления должна выигрывать у выбора карточки.'
    starter: |
      const resolveAction = (chain) => {

      };
    cases:
      - call: "resolveAction([{classes:['icon']},{classes:['delete-btn']},{classes:['card']},{classes:['list']}])"
        expect: 'delete'
      - call: "resolveAction([{classes:['title']},{classes:['card']},{classes:['list']}])"
        expect: 'select'
      - call: "resolveAction([{classes:['delete-btn']},{classes:['card']},{classes:['list']}])"
        expect: 'delete'
      - call: "resolveAction([{classes:['footer']},{classes:['list']}])"
        expect: 'none'
    hints:
      - 'closest идёт снизу вверх, поэтому более глубокое и частное действие встречается раньше общего. Кнопка удаления лежит внутри карточки - значит, в цепочке от target она попадётся до самой карточки.'
      - 'Идите по цепочке одним проходом: на каждом узле сперва проверяйте delete-btn, потом card. Первое совпадение - ответ; дошли до конца без совпадений - "none".'
    solution: |
      const resolveAction = (chain) => {
        for (const node of chain) {
          if (node.classes.includes('delete-btn')) {
            return 'delete';
          }
          if (node.classes.includes('card')) {
            return 'select';
          }
        }
        return 'none';
      };
