exercises:
  - id: event-patterns-quiz-choose-001
    concept: event-patterns
    type: theory-quiz
    difficulty: 1
    prompt: 'Поле поиска шлёт запрос по мере ввода. Нужен один запрос после того, как пользователь допечатал. Какой приём подходит?'
    choices:
      - id: a
        text: 'throttle - он ограничивает частоту запросов.'
      - id: b
        text: 'debounce - он ждёт паузу и срабатывает один раз в конце серии.'
      - id: c
        text: 'stopPropagation - он останавливает лишние события.'
      - id: d
        text: 'preventDefault - он отменяет отправку.'
    correct: [b]
    explanation: 'debounce откладывает реакцию до паузы в потоке: пока пользователь печатает, таймер сбрасывается, а сработает только после остановки. Ровно один запрос по готовой строке.'
    hints:
      - 'Важен только финал серии или регулярные отметки по ходу? От этого зависит выбор между двумя приёмами.'
    variants:
      - prompt: 'Индикатор позиции надо обновлять во время прокрутки, но не чаще раза в 100 мс. Какой приём подходит?'
        choices:
          - id: a
            text: 'throttle - срабатывает регулярно, не чаще раза в интервал.'
          - id: b
            text: 'debounce - дождётся, пока прокрутка остановится.'
          - id: c
            text: 'once - сработает один раз и отпишется.'
          - id: d
            text: 'capture - перехватит событие на погружении.'
        correct: [a]
        explanation: 'throttle пропускает события не чаще одного в интервал и срабатывает регулярно прямо во время потока - индикатор обновляется по ходу прокрутки. debounce молчал бы, пока идёт скролл.'
      - prompt: 'Что заставляет браузер выполнить reflow немедленно, посреди работы обработчика?'
        choices:
          - id: a
            text: 'Чтение геометрии при накопленных'
          - id: b
            text: 'Любой вызов console.log.'
          - id: c
            text: 'Подписка через addEventListener.'
          - id: d
            text: 'Чтение значения data-атрибута.'
        correct: [a]
        explanation: 'Чтобы вернуть точную геометрию, браузер обязан учесть несделанные изменения и провести reflow сразу. В цикле чередование записи и такого чтения даёт layout thrashing.'

  - id: event-patterns-predict-custom-001
    concept: event-patterns
    type: predict-output
    difficulty: 2
    prompt: 'Кастомное событие несёт данные в поле detail. Слушатель читает detail.count. Что напечатает код для двух событий?'
    snippet: |
      const onCartAdd = (detail) => 'получено: ' + detail.count;
      console.log(onCartAdd({ count: 3 }));
      console.log(onCartAdd({ count: 8 }));
    expected:
      kind: stdout
      value: |-
        получено: 3
        получено: 8
    explanation: 'CustomEvent передаёт полезные данные через detail, а слушатель читает нужное поле - здесь detail.count. Значение подставляется в строку сообщения.'
    hints:
      - 'Функция берёт поле count из переданного объекта detail и склеивает со строкой. Подставьте оба значения по очереди.'
    variants:
      - snippet: |
          const onCartAdd = (detail) => 'получено: ' + detail.count;
          console.log(onCartAdd({ count: 1 }));
          console.log(onCartAdd({ count: 12 }));
        expected:
          kind: stdout
          value: |-
            получено: 1
            получено: 12
      - snippet: |
          const onCartAdd = (detail) => 'получено: ' + detail.count;
          console.log(onCartAdd({ count: 5 }));
          console.log(onCartAdd({ count: 20 }));
        expected:
          kind: stdout
          value: |-
            получено: 5
            получено: 20

  - id: event-patterns-throttle-001
    concept: event-patterns
    type: predict-output
    difficulty: 3
    prompt: 'throttleFires моделирует throttle с передним фронтом: первое событие срабатывает всегда, следующее только если с прошлого срабатывания прошло не меньше interval. Код печатает результаты через JSON.stringify. Что он напечатает? Введите вывод построчно.'
    snippet: |
      const throttleFires = (times, interval) => {
        if (times.length === 0) {
          return [];
        }
        const fires = [times[0]];
        let last = times[0];
        for (let i = 1; i < times.length; i += 1) {
          if (times[i] - last >= interval) {
            fires.push(times[i]);
            last = times[i];
          }
        }
        return fires;
      };
      console.log(JSON.stringify(throttleFires([0, 10, 20, 120, 130], 100)));
      console.log(JSON.stringify(throttleFires([0, 50, 100, 150], 100)));
      console.log(JSON.stringify(throttleFires([5], 100)));
      console.log(JSON.stringify(throttleFires([], 100)));
    expected:
      kind: stdout
      value: |-
        [0,120]
        [0,100]
        [5]
        []
    explanation: 'Первое событие срабатывает всегда и становится точкой отсчёта. Следующее проходит, только если оторвалось от неё на interval: 120 отстоит от 0 на 120, а 10 и 20 слишком близко. Единственное событие проходит, пустой поток даёт пустой результат.'
    hints:
      - 'Помните время последнего срабатывания и пропускайте событие, если разрыв меньше interval.'
      - 'Сработавшее событие само становится новой точкой отсчёта.'

  - id: event-patterns-debounce-001
    concept: event-patterns
    type: predict-output
    difficulty: 4
    prompt: 'debounceFires моделирует debounce: событие срабатывает, только если после него пауза не меньше wait (следующего события нет или оно позже, чем через wait). Код печатает результаты через JSON.stringify. Что он напечатает? Введите вывод построчно.'
    snippet: |
      const debounceFires = (times, wait) => {
        const fires = [];
        for (let i = 0; i < times.length; i += 1) {
          const isLast = i === times.length - 1;
          if (isLast || times[i + 1] - times[i] > wait) {
            fires.push(times[i]);
          }
        }
        return fires;
      };
      console.log(JSON.stringify(debounceFires([0, 10, 20, 300], 100)));
      console.log(JSON.stringify(debounceFires([0, 50, 100], 30)));
      console.log(JSON.stringify(debounceFires([0, 5, 10], 100)));
      console.log(JSON.stringify(debounceFires([42], 100)));
    expected:
      kind: stdout
      value: |-
        [20,300]
        [0,50,100]
        [10]
        [42]
    explanation: 'Событие выживает, если после него тишина не меньше wait. В первом ряду после 20 разрыв до 300 велик, а после 0 и 10 нет; во втором каждый разрыв больше 30; в третьем только у последнего 10 нет соседа; одиночное событие срабатывает всегда.'
    hints:
      - 'Событие срабатывает, если оно последнее или разрыв до следующего больше wait.'
      - 'Смотрите на каждое событие и его следующего соседа.'
