exercises:
  - id: attrs-quiz-string-001
    concept: attributes-and-properties
    type: theory-quiz
    difficulty: 1
    prompt: 'Что вернёт input.getAttribute("tabindex"), если в HTML стоит tabindex="3"?'
    choices:
      - id: a
        text: 'Число 3.'
      - id: b
        text: 'Строку "3": атрибуты всегда строки.'
      - id: c
        text: 'true, потому что атрибут присутствует.'
      - id: d
        text: 'null, getAttribute работает только со свойствами.'
    correct: [b]
    explanation: 'getAttribute всегда возвращает строку, ведь HTML - это текст. Число 3 вернуло бы типизированное свойство element.tabIndex. Перед арифметикой строку превращают в число через Number.'
    hints:
      - 'HTML - это текст. Какого типа может быть значение, прочитанное прямо из разметки?'
    variants:
      - prompt: 'Пользователь стёр имя в поле и ввёл новое. Откуда прочитать то, что в поле СЕЙЧАС?'
        choices:
          - id: a
            text: 'input.getAttribute("value") - атрибут всегда актуален.'
          - id: b
            text: 'input.value - свойство отражает текущее состояние поля.'
          - id: c
            text: 'Оба вернут одно и то же.'
          - id: d
            text: 'input.dataset.value'
        correct: [b]
        explanation: 'Атрибут value хранит начальное значение из HTML и не меняется при вводе. Актуальный текст поля - в свойстве input.value.'
      - prompt: 'Кнопка отключена атрибутом disabled. Что сделает button.setAttribute("disabled", "false")?'
        choices:
          - id: a
            text: 'Включит кнопку: значение "false".'
          - id: b
            text: 'Оставит кнопку отключённой: у булевых атрибутов важно наличие.'
          - id: c
            text: 'Удалит атрибут disabled.'
          - id: d
            text: 'Выбросит ошибку.'
        correct: [b]
        explanation: 'disabled - булев атрибут: кнопку отключает сам факт его присутствия, а не значение. setAttribute добавляет атрибут, поэтому кнопка останется выключенной. Включают через button.disabled = false или removeAttribute.'

  - id: attrs-dataset-key-001
    concept: attributes-and-properties
    type: javascript-function
    difficulty: 2
    prompt: 'Реализуйте datasetKey(attr): по имени data-атрибута верните ключ, под которым он лежит в dataset. Отбросьте префикс data- и переведите kebab-case в camelCase.'
    starter: |
      const datasetKey = (attr) => {

      };
    cases:
      - call: "datasetKey('data-user-id')"
        expect: 'userId'
      - call: "datasetKey('data-price')"
        expect: 'price'
      - call: "datasetKey('data-max-item-count')"
        expect: 'maxItemCount'
    hints:
      - 'Сначала уберите приставку data-, затем разбейте остаток на слова по дефисам - дальше вопрос только в регистре первых букв.'
      - 'Первое слово оставляйте как есть, у каждого следующего поднимайте первую букву в верхний регистр, потом склейте всё без разделителей.'
    solution: |
      const datasetKey = (attr) => {
        const parts = attr.replace('data-', '').split('-');
        return parts
          .map((p, i) => (i === 0 ? p : p[0].toUpperCase() + p.slice(1)))
          .join('');
      };
    variants:
      - prompt: 'Реализуйте datasetKey(attr): переведите имя data-атрибута в ключ dataset (camelCase без data-).'
        cases:
          - call: "datasetKey('data-order-id')"
            expect: 'orderId'
          - call: "datasetKey('data-count')"
            expect: 'count'
          - call: "datasetKey('data-is-active-now')"
            expect: 'isActiveNow'
        solution: |
          const datasetKey = (attr) => {
            const parts = attr.replace('data-', '').split('-');
            return parts
              .map((p, i) => (i === 0 ? p : p[0].toUpperCase() + p.slice(1)))
              .join('');
          };
      - prompt: 'Реализуйте datasetKey(attr): переведите имя data-атрибута в ключ dataset (camelCase без data-).'
        cases:
          - call: "datasetKey('data-city')"
            expect: 'city'
          - call: "datasetKey('data-user-name')"
            expect: 'userName'
          - call: "datasetKey('data-full-address-line')"
            expect: 'fullAddressLine'
        solution: |
          const datasetKey = (attr) => {
            const parts = attr.replace('data-', '').split('-');
            return parts
              .map((p, i) => (i === 0 ? p : p[0].toUpperCase() + p.slice(1)))
              .join('');
          };

  - id: attrs-predict-types-001
    concept: attributes-and-properties
    type: predict-output
    difficulty: 2
    prompt: 'Что напечатает этот код? Первая строка читает значение как атрибут (строку), вторая - как свойство (число).'
    snippet: |
      const attrs = { tabindex: 3 };
      const asAttribute = String(attrs.tabindex);
      console.log(asAttribute + asAttribute);
      console.log(attrs.tabindex + attrs.tabindex);
    expected:
      kind: stdout
      value: |-
        33
        6
    explanation: 'asAttribute - строка "3", поэтому "3" + "3" склеивается в "33". attrs.tabindex - число 3, поэтому 3 + 3 = 6. Ровно так расходятся атрибут-строка и свойство-число.'
    hints:
      - 'Плюс со строками склеивает, а с числами складывает. Определите тип каждого операнда до того, как считать результат.'
    variants:
      - snippet: |
          const attrs = { count: 5 };
          const asAttribute = String(attrs.count);
          console.log(asAttribute + '0');
          console.log(attrs.count + 0);
        expected:
          kind: stdout
          value: |-
            50
            5
      - snippet: |
          const price = 100;
          const asAttribute = String(price);
          console.log(asAttribute + asAttribute);
          console.log(price + price);
        expected:
          kind: stdout
          value: |-
            100100
            200

  - id: attrs-has-class-001
    concept: attributes-and-properties
    type: javascript-function
    difficulty: 3
    prompt: 'Реализуйте hasClass(classAttr, name) - модель classList.contains: по строке атрибута class верните, есть ли в ней класс name как отдельное слово. Классы разделены пробелами; подстрока внутри другого класса не считается.'
    starter: |
      const hasClass = (classAttr, name) => {

      };
    cases:
      - call: "hasClass('card active', 'active')"
        expect: true
      - call: "hasClass('card-active', 'active')"
        expect: false
      - call: "hasClass('card big promo', 'big')"
        expect: true
      - call: "hasClass('', 'active')"
        expect: false
    hints:
      - 'Класс - это отдельное слово, а не любая подстрока. Поэтому сравнивать надо не строку целиком, а её слова по отдельности.'
      - 'Разбейте строку по пробелам в массив слов и отбросьте пустые, затем проверьте includes по точному совпадению.'
    solution: |
      const hasClass = (classAttr, name) => {
        return classAttr
          .split(' ')
          .filter((c) => c.length > 0)
          .includes(name);
      };
