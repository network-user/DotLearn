exercises:
  - id: dom-tree-quiz-select-001
    concept: dom-tree
    type: theory-quiz
    difficulty: 1
    prompt: 'На странице три элемента с классом card. Что вернёт document.querySelector(".card")?'
    choices:
      - id: a
        text: 'Массив из трёх элементов.'
      - id: b
        text: 'Первый подходящий элемент в порядке обхода дерева.'
      - id: c
        text: 'NodeList со всеми тремя элементами.'
      - id: d
        text: 'null, потому что подходящих несколько.'
    correct: [b]
    explanation: 'querySelector всегда возвращает ровно один узел - первый подходящий под селектор в порядке обхода дерева, либо null, если не нашёл никого. Все подходящие сразу возвращает querySelectorAll.'
    hints:
      - 'Разведите два метода: один отдаёт одну находку, другой - все. Какой из них querySelector?'
    variants:
      - prompt: 'Что вернёт document.querySelector(".missing"), если ни один элемент не подходит под селектор?'
        choices:
          - id: a
            text: 'null'
          - id: b
            text: 'Пустой массив []'
          - id: c
            text: 'undefined'
          - id: d
            text: 'Выбросит исключение'
        correct: [a]
        explanation: 'Когда подходящего элемента нет, querySelector возвращает null. Именно поэтому результат стоит проверять перед обращением к его свойствам.'
      - prompt: 'Что возвращает document.querySelectorAll("li")?'
        choices:
          - id: a
            text: 'Первый элемент li'
          - id: b
            text: 'NodeList со всеми подходящими элементами'
          - id: c
            text: 'Обычный массив со всеми li'
          - id: d
            text: 'Число найденных элементов'
        correct: [b]
        explanation: 'querySelectorAll возвращает NodeList - список всех подходящих узлов. Это не массив: чтобы применить map или filter, его прогоняют через Array.from.'

  - id: dom-tree-selector-blanks-001
    concept: dom-tree
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Найдите ПЕРВЫЙ элемент с классом card. Впишите метод и селектор.'
    template: |
      const one = document.{{method}}('{{sel}}');
    blanks:
      method:
        accept: ['querySelector']
      sel:
        accept: ['.card']
    explanation: 'Первый подходящий элемент возвращает querySelector. В CSS-селекторе класс записывается через точку, поэтому селектор класса card - это ".card".'
    hints:
      - 'Нужен один элемент, а не все: какой из двух методов querySelector-семейства отдаёт первую находку?'
    variants:
      - prompt: 'Найдите ВСЕ элементы с классом card. Впишите метод и селектор.'
        template: |
          const all = document.{{method}}('{{sel}}');
        blanks:
          method:
            accept: ['querySelectorAll']
          sel:
            accept: ['.card']
      - prompt: 'Найдите элемент с id равным header. Впишите метод и селектор.'
        template: |
          const el = document.{{method}}('{{sel}}');
        blanks:
          method:
            accept: ['querySelector']
          sel:
            accept: ['#header']

  - id: dom-tree-count-tags-001
    concept: dom-tree
    type: javascript-function
    difficulty: 2
    prompt: 'Реализуйте countTags(node, tag): посчитайте, сколько узлов в поддереве (включая сам node) имеют node.tag, равный tag. Узел - это объект вида { tag, children }.'
    starter: |
      const countTags = (node, tag) => {

      };
    cases:
      - call: "countTags({tag:'ul',children:[{tag:'li',children:[]},{tag:'li',children:[]}]}, 'li')"
        expect: 2
      - call: "countTags({tag:'ul',children:[{tag:'li',children:[]},{tag:'li',children:[]}]}, 'ul')"
        expect: 1
      - call: "countTags({tag:'div',children:[]}, 'li')"
        expect: 0
    hints:
      - 'Дерево обходят рекурсией: ответ для узла - это он сам плюс ответы для каждого его ребёнка.'
      - 'Сначала посчитайте вклад самого узла (1, если tag совпал, иначе 0), потом прибавьте countTags каждого элемента children.'
    solution: |
      const countTags = (node, tag) => {
        let count = node.tag === tag ? 1 : 0;
        for (const child of node.children) {
          count += countTags(child, tag);
        }
        return count;
      };
    variants:
      - prompt: 'Реализуйте countTags(node, tag): посчитайте узлы с нужным тегом в поддереве. Проверьте на дереве с абзацами p.'
        cases:
          - call: "countTags({tag:'section',children:[{tag:'p',children:[]},{tag:'p',children:[{tag:'p',children:[]}]}]}, 'p')"
            expect: 3
          - call: "countTags({tag:'section',children:[{tag:'p',children:[]},{tag:'p',children:[{tag:'p',children:[]}]}]}, 'section')"
            expect: 1
          - call: "countTags({tag:'p',children:[]}, 'p')"
            expect: 1
        solution: |
          const countTags = (node, tag) => {
            let count = node.tag === tag ? 1 : 0;
            for (const child of node.children) {
              count += countTags(child, tag);
            }
            return count;
          };
      - prompt: 'Реализуйте countTags(node, tag): посчитайте узлы с нужным тегом. Проверьте на дереве меню со ссылками a.'
        cases:
          - call: "countTags({tag:'nav',children:[{tag:'a',children:[]},{tag:'span',children:[{tag:'a',children:[]}]}]}, 'a')"
            expect: 2
          - call: "countTags({tag:'nav',children:[{tag:'a',children:[]},{tag:'span',children:[{tag:'a',children:[]}]}]}, 'span')"
            expect: 1
          - call: "countTags({tag:'a',children:[]}, 'div')"
            expect: 0
        solution: |
          const countTags = (node, tag) => {
            let count = node.tag === tag ? 1 : 0;
            for (const child of node.children) {
              count += countTags(child, tag);
            }
            return count;
          };

  - id: dom-tree-collect-text-001
    concept: dom-tree
    type: javascript-function
    difficulty: 3
    prompt: 'Реализуйте collectText(node) - аналог textContent: верните склейку всех текстов поддерева в порядке обхода. У узла есть node.text (может отсутствовать) и node.children.'
    starter: |
      const collectText = (node) => {

      };
    cases:
      - call: "collectText({tag:'p',text:'Привет, ',children:[{tag:'b',text:'Анна',children:[]},{tag:'span',text:'!',children:[]}]})"
        expect: 'Привет, Анна!'
      - call: "collectText({tag:'div',children:[{tag:'span',text:'Итого: ',children:[]},{tag:'b',text:'900 ₽',children:[]}]})"
        expect: 'Итого: 900 ₽'
      - call: "collectText({tag:'span',text:'Один узел',children:[]})"
        expect: 'Один узел'
    hints:
      - 'textContent собирает текст сверху вниз: сначала текст самого узла, потом тексты детей по порядку. Это снова рекурсия.'
      - 'Если node.text отсутствует, считайте его пустой строкой; затем в цикле прибавляйте collectText каждого ребёнка.'
    solution: |
      const collectText = (node) => {
        let result = node.text || '';
        for (const child of node.children) {
          result += collectText(child);
        }
        return result;
      };
