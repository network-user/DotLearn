exercises:
  - id: dom-tree-quiz-select-001
    concept: dom-tree
    type: theory-quiz
    difficulty: 1
    prompt: 'На странице три элемента с классом card. Что вернёт document.querySelector(".card")?'
    choices:
      - id: a
        text: 'Массив из трёх элементов.'
      - id: b
        text: 'Первый подходящий элемент в порядке обхода'
      - id: c
        text: 'NodeList со всеми тремя элементами.'
      - id: d
        text: 'null, потому что подходящих несколько.'
    correct: [b]
    explanation: 'querySelector всегда возвращает ровно один узел - первый подходящий под селектор в порядке обхода дерева, либо null, если не нашёл никого. Все подходящие сразу возвращает querySelectorAll.'
    hints:
      - 'Разведите два метода: один отдаёт одну находку, другой - все. Какой из них querySelector?'
    variants:
      - prompt: 'Что вернёт document.querySelector(".missing"), если ни один элемент не подходит под селектор?'
        choices:
          - id: a
            text: 'null'
          - id: b
            text: 'Пустой массив []'
          - id: c
            text: 'undefined'
          - id: d
            text: 'Выбросит исключение'
        correct: [a]
        explanation: 'Когда подходящего элемента нет, querySelector возвращает null. Именно поэтому результат стоит проверять перед обращением к его свойствам.'
      - prompt: 'Что возвращает document.querySelectorAll("li")?'
        choices:
          - id: a
            text: 'Первый элемент li'
          - id: b
            text: 'NodeList со всеми подходящими'
          - id: c
            text: 'Обычный массив со всеми li'
          - id: d
            text: 'Число найденных элементов'
        correct: [b]
        explanation: 'querySelectorAll возвращает NodeList - список всех подходящих узлов. Это не массив: чтобы применить map или filter, его прогоняют через Array.from.'

  - id: dom-tree-selector-blanks-001
    concept: dom-tree
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Найдите ПЕРВЫЙ элемент с классом card. Впишите метод и селектор.'
    template: |
      const one = document.{{method}}('{{sel}}');
    blanks:
      method:
        accept: ['querySelector']
      sel:
        accept: ['.card']
    explanation: 'Первый подходящий элемент возвращает querySelector. В CSS-селекторе класс записывается через точку, поэтому селектор класса card - это ".card".'
    hints:
      - 'Нужен один элемент, а не все: какой из двух методов querySelector-семейства отдаёт первую находку?'
    variants:
      - prompt: 'Найдите ВСЕ элементы с классом card. Впишите метод и селектор.'
        template: |
          const all = document.{{method}}('{{sel}}');
        blanks:
          method:
            accept: ['querySelectorAll']
          sel:
            accept: ['.card']
      - prompt: 'Найдите элемент с id равным header. Впишите метод и селектор.'
        template: |
          const el = document.{{method}}('{{sel}}');
        blanks:
          method:
            accept: ['querySelector']
          sel:
            accept: ['#header']

  - id: dom-tree-count-tags-001
    concept: dom-tree
    type: predict-output
    difficulty: 2
    prompt: 'countTags рекурсивно считает узлы поддерева с нужным тегом. Что напечатает код? Введите вывод построчно.'
    snippet: |
      const countTags = (node, tag) => {
        let count = node.tag === tag ? 1 : 0;
        for (const child of node.children) {
          count += countTags(child, tag);
        }
        return count;
      };
      const ul = { tag: 'ul', children: [{ tag: 'li', children: [] }, { tag: 'li', children: [] }] };
      console.log(countTags(ul, 'li'));
      console.log(countTags(ul, 'ul'));
      console.log(countTags({ tag: 'div', children: [] }, 'li'));
    expected:
      kind: stdout
      value: |-
        2
        1
        0
    explanation: 'Ответ для узла это он сам (1, если тег совпал) плюс ответы детей. В дереве ul два узла li, поэтому по тегу li выходит 2, по ul один корень, а в отдельном div узлов li нет и выходит 0.'
    hints:
      - 'Ответ для узла складывается из него самого и ответов всех его детей.'
    variants:
      - snippet: |
          const countTags = (node, tag) => {
            let count = node.tag === tag ? 1 : 0;
            for (const child of node.children) {
              count += countTags(child, tag);
            }
            return count;
          };
          const tree = { tag: 'section', children: [{ tag: 'p', children: [] }, { tag: 'p', children: [{ tag: 'p', children: [] }] }] };
          console.log(countTags(tree, 'p'));
          console.log(countTags(tree, 'section'));
          console.log(countTags({ tag: 'p', children: [] }, 'p'));
        expected:
          kind: stdout
          value: |-
            3
            1
            1

  - id: dom-tree-collect-text-001
    concept: dom-tree
    type: predict-output
    difficulty: 3
    prompt: 'collectText это аналог textContent: он склеивает текст поддерева сверху вниз. Что напечатает код? Введите вывод построчно.'
    snippet: |
      const collectText = (node) => {
        let result = node.text || '';
        for (const child of node.children) {
          result += collectText(child);
        }
        return result;
      };
      console.log(collectText({ tag: 'p', text: 'Привет, ', children: [{ tag: 'b', text: 'Анна', children: [] }, { tag: 'span', text: '!', children: [] }] }));
      console.log(collectText({ tag: 'div', children: [{ tag: 'span', text: 'Итого: ', children: [] }, { tag: 'b', text: '900 ₽', children: [] }] }));
      console.log(collectText({ tag: 'span', text: 'Один узел', children: [] }));
    expected:
      kind: stdout
      value: |-
        Привет, Анна!
        Итого: 900 ₽
        Один узел
    explanation: 'collectText берёт текст самого узла, а затем по порядку прибавляет текст каждого ребёнка. Так «Привет, » склеивается с «Анна» и «!», а «Итого: » с «900 ₽».'
    hints:
      - 'Сначала текст самого узла, затем по порядку тексты детей, и так рекурсивно вглубь.'
      - 'Если у узла нет text, считайте его пустой строкой.'
