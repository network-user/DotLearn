exercises:
  - id: event-flow-quiz-phase-001
    concept: event-flow
    type: theory-quiz
    difficulty: 1
    prompt: 'В каком порядке событие проходит три фазы своего маршрута по дереву?'
    choices:
      - id: a
        text: 'Цель, всплытие, погружение.'
      - id: b
        text: 'Погружение (вниз к цели), цель, всплытие (вверх к document).'
      - id: c
        text: 'Всплытие, цель, погружение.'
      - id: d
        text: 'Фаз нет: обработчик срабатывает мгновенно на цели.'
    correct: [b]
    explanation: 'Событие сначала спускается от document к цели (погружение), затем срабатывает на самой цели, затем поднимается обратно к document (всплытие).'
    hints:
      - 'Маршрут начинается у корня, доходит до самого глубокого элемента и возвращается. С чего он начинается?'
    variants:
      - prompt: 'На какой фазе срабатывает обычный обработчик, добавленный через addEventListener без дополнительных флагов?'
        choices:
          - id: a
            text: 'На фазе погружения.'
          - id: b
            text: 'На фазе всплытия.'
          - id: c
            text: 'На всех трёх сразу.'
          - id: d
            text: 'Ни на какой, пока не указать фазу явно.'
        correct: [b]
        explanation: 'По умолчанию обработчик слушает фазу всплытия. Погружение включают отдельным флагом capture и нужно оно редко.'
      - prompt: 'Кликнули по button внутри div.card. Сработает ли обработчик click, висящий на div.card?'
        choices:
          - id: a
            text: 'Да: клик всплывает через div.card, и его обработчик услышит событие.'
          - id: b
            text: 'Нет: обработчик на div.card слышит только клики прямо по самому div.'
          - id: c
            text: 'Только если явно включить погружение.'
          - id: d
            text: 'Нет: клик касается лишь самой кнопки.'
        correct: [a]
        explanation: 'Событие всплывает от цели вверх через всех предков. div.card - предок кнопки, поэтому его обработчик сработает. На этом и держится делегирование.'

  - id: event-flow-bubble-order-001
    concept: event-flow
    type: javascript-function
    difficulty: 2
    prompt: 'Дан путь события от корня к цели (root -> target) как массив id. Реализуйте bubbleOrder(path): верните порядок узлов на фазе всплытия - от цели вверх к корню.'
    starter: |
      const bubbleOrder = (path) => {

      };
    cases:
      - call: "bubbleOrder(['document','body','div','button'])"
        expect: ['button', 'div', 'body', 'document']
      - call: "bubbleOrder(['document','main','a'])"
        expect: ['a', 'main', 'document']
      - call: "bubbleOrder(['button'])"
        expect: ['button']
    hints:
      - 'Всплытие идёт в обратную сторону от погружения: от цели к корню. Как связан этот порядок с исходным путём root -> target?'
      - 'Это тот же массив, только в обратном порядке. Разверните его, не портя исходный.'
    solution: |
      const bubbleOrder = (path) => {
        return [...path].reverse();
      };
    variants:
      - prompt: 'Реализуйте bubbleOrder(path): по пути root -> target верните порядок всплытия (target -> root).'
        cases:
          - call: "bubbleOrder(['html','body','ul','li'])"
            expect: ['li', 'ul', 'body', 'html']
          - call: "bubbleOrder(['section','p'])"
            expect: ['p', 'section']
          - call: "bubbleOrder(['document'])"
            expect: ['document']
        solution: |
          const bubbleOrder = (path) => {
            return [...path].reverse();
          };
      - prompt: 'Реализуйте bubbleOrder(path): по пути root -> target верните порядок всплытия (target -> root).'
        cases:
          - call: "bubbleOrder(['document','body','form','input'])"
            expect: ['input', 'form', 'body', 'document']
          - call: "bubbleOrder(['nav','ul','li','a'])"
            expect: ['a', 'li', 'ul', 'nav']
          - call: "bubbleOrder(['div','span'])"
            expect: ['span', 'div']
        solution: |
          const bubbleOrder = (path) => {
            return [...path].reverse();
          };

  - id: event-flow-predict-bubble-001
    concept: event-flow
    type: predict-output
    difficulty: 2
    prompt: 'Обработчики click висят на button, div и body. Клик по button всплывает. Что напечатает код, моделирующий порядок их срабатывания?'
    snippet: |
      const log = [];
      const path = ['button', 'div', 'body'];
      for (const node of path) {
        log.push('click: ' + node);
      }
      console.log(log.join('\n'));
    expected:
      kind: stdout
      value: |-
        click: button
        click: div
        click: body
    explanation: 'При всплытии событие идёт от цели вверх: сначала button (цель), затем предки div и body. Массив path уже задан в этом порядке, поэтому строки печатаются сверху вниз.'
    hints:
      - 'Всплытие начинается с самого глубокого элемента. Кто из троих ближе всего к клику?'
    variants:
      - snippet: |
          const log = [];
          const path = ['a', 'li', 'ul'];
          for (const node of path) {
            log.push('click: ' + node);
          }
          console.log(log.join('\n'));
        expected:
          kind: stdout
          value: |-
            click: a
            click: li
            click: ul
      - snippet: |
          const log = [];
          const path = ['input', 'form'];
          for (const node of path) {
            log.push('click: ' + node);
          }
          console.log(log.join('\n'));
        expected:
          kind: stdout
          value: |-
            click: input
            click: form

  - id: event-flow-stop-at-001
    concept: event-flow
    type: javascript-function
    difficulty: 3
    prompt: 'Дан порядок всплытия (target -> root) как массив id. На узле stopId висит обработчик со stopPropagation. Реализуйте stopAt(order, stopId): верните узлы, которые ещё получат событие, включая stopId; всё, что выше него, событие не увидит. Если stopId в пути нет, событие проходит весь путь.'
    starter: |
      const stopAt = (order, stopId) => {

      };
    cases:
      - call: "stopAt(['button','div','body','document'], 'div')"
        expect: ['button', 'div']
      - call: "stopAt(['button','div','body','document'], 'button')"
        expect: ['button']
      - call: "stopAt(['button','div','body','document'], 'document')"
        expect: ['button', 'div', 'body', 'document']
      - call: "stopAt(['button','div','body','document'], 'missing')"
        expect: ['button', 'div', 'body', 'document']
    hints:
      - 'stopPropagation обрывает всплытие: обработчик, вызвавший его, доработает, а дальше вверх событие не идёт. Значит, вам нужен кусок пути до узла со стопом включительно.'
      - 'Идите по порядку и складывайте узлы в результат; как только положили stopId, прекращайте цикл.'
    solution: |
      const stopAt = (order, stopId) => {
        const result = [];
        for (const node of order) {
          result.push(node);
          if (node === stopId) {
            break;
          }
        }
        return result;
      };
