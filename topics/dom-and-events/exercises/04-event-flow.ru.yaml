exercises:
  - id: event-flow-quiz-phase-001
    concept: event-flow
    type: theory-quiz
    difficulty: 1
    prompt: 'В каком порядке событие проходит три фазы своего маршрута по дереву?'
    choices:
      - id: a
        text: 'Цель, всплытие, погружение.'
      - id: b
        text: 'Погружение (вниз к цели), цель, всплытие (вверх к document).'
      - id: c
        text: 'Всплытие, цель, погружение.'
      - id: d
        text: 'Фаз нет: обработчик срабатывает мгновенно на цели.'
    correct: [b]
    explanation: 'Событие сначала спускается от document к цели (погружение), затем срабатывает на самой цели, затем поднимается обратно к document (всплытие).'
    hints:
      - 'Маршрут начинается у корня, доходит до самого глубокого элемента и возвращается. С чего он начинается?'
    variants:
      - prompt: 'На какой фазе срабатывает обычный обработчик, добавленный через addEventListener без дополнительных флагов?'
        choices:
          - id: a
            text: 'На фазе погружения.'
          - id: b
            text: 'На фазе всплытия.'
          - id: c
            text: 'На всех трёх сразу.'
          - id: d
            text: 'Ни на какой, пока не указать фазу явно.'
        correct: [b]
        explanation: 'По умолчанию обработчик слушает фазу всплытия. Погружение включают отдельным флагом capture и нужно оно редко.'
      - prompt: 'Кликнули по button внутри div.card. Сработает ли обработчик click, висящий на div.card?'
        choices:
          - id: a
            text: 'Да: клик всплывает через div.card, и его обработчик услышит событие.'
          - id: b
            text: 'Нет: обработчик на div.card слышит только клики прямо по самому div.'
          - id: c
            text: 'Только если явно включить погружение.'
          - id: d
            text: 'Нет: клик касается лишь самой кнопки.'
        correct: [a]
        explanation: 'Событие всплывает от цели вверх через всех предков. div.card - предок кнопки, поэтому его обработчик сработает. На этом и держится делегирование.'

  - id: event-flow-bubble-order-001
    concept: event-flow
    type: predict-output
    difficulty: 2
    prompt: 'bubbleOrder по пути root -> target возвращает порядок всплытия (target -> root). Код печатает результаты через JSON.stringify. Что он напечатает? Введите вывод построчно.'
    snippet: |
      const bubbleOrder = (path) => {
        return [...path].reverse();
      };
      console.log(JSON.stringify(bubbleOrder(['document', 'body', 'div', 'button'])));
      console.log(JSON.stringify(bubbleOrder(['document', 'main', 'a'])));
      console.log(JSON.stringify(bubbleOrder(['button'])));
    expected:
      kind: stdout
      value: |-
        ["button","div","body","document"]
        ["a","main","document"]
        ["button"]
    explanation: 'Всплытие идёт от цели к корню, то есть в обратную сторону от пути погружения. Поэтому результат это исходный массив, развёрнутый reverse.'
    hints:
      - 'Всплытие это путь погружения, пройденный в обратном порядке.'
    variants:
      - snippet: |
          const bubbleOrder = (path) => {
            return [...path].reverse();
          };
          console.log(JSON.stringify(bubbleOrder(['html', 'body', 'ul', 'li'])));
          console.log(JSON.stringify(bubbleOrder(['section', 'p'])));
          console.log(JSON.stringify(bubbleOrder(['document'])));
        expected:
          kind: stdout
          value: |-
            ["li","ul","body","html"]
            ["p","section"]
            ["document"]

  - id: event-flow-predict-bubble-001
    concept: event-flow
    type: predict-output
    difficulty: 2
    prompt: 'Обработчики click висят на button, div и body. Клик по button всплывает. Что напечатает код, моделирующий порядок их срабатывания?'
    snippet: |
      const log = [];
      const path = ['button', 'div', 'body'];
      for (const node of path) {
        log.push('click: ' + node);
      }
      console.log(log.join('\n'));
    expected:
      kind: stdout
      value: |-
        click: button
        click: div
        click: body
    explanation: 'При всплытии событие идёт от цели вверх: сначала button (цель), затем предки div и body. Массив path уже задан в этом порядке, поэтому строки печатаются сверху вниз.'
    hints:
      - 'Всплытие начинается с самого глубокого элемента. Кто из троих ближе всего к клику?'
    variants:
      - snippet: |
          const log = [];
          const path = ['a', 'li', 'ul'];
          for (const node of path) {
            log.push('click: ' + node);
          }
          console.log(log.join('\n'));
        expected:
          kind: stdout
          value: |-
            click: a
            click: li
            click: ul
      - snippet: |
          const log = [];
          const path = ['input', 'form'];
          for (const node of path) {
            log.push('click: ' + node);
          }
          console.log(log.join('\n'));
        expected:
          kind: stdout
          value: |-
            click: input
            click: form

  - id: event-flow-stop-at-001
    concept: event-flow
    type: predict-output
    difficulty: 3
    prompt: 'stopAt по порядку всплытия возвращает узлы до stopId включительно, дальше stopPropagation обрывает путь. Код печатает результаты через JSON.stringify. Что он напечатает? Введите вывод построчно.'
    snippet: |
      const stopAt = (order, stopId) => {
        const result = [];
        for (const node of order) {
          result.push(node);
          if (node === stopId) {
            break;
          }
        }
        return result;
      };
      const order = ['button', 'div', 'body', 'document'];
      console.log(JSON.stringify(stopAt(order, 'div')));
      console.log(JSON.stringify(stopAt(order, 'button')));
      console.log(JSON.stringify(stopAt(order, 'document')));
      console.log(JSON.stringify(stopAt(order, 'missing')));
    expected:
      kind: stdout
      value: |-
        ["button","div"]
        ["button"]
        ["button","div","body","document"]
        ["button","div","body","document"]
    explanation: 'Проход складывает узлы и обрывается сразу после stopId. Стоп на div даёт button и div; стоп на самой цели button обрывает после первого; стоп на последнем или несуществующем узле пропускает весь путь.'
    hints:
      - 'stopPropagation обрывает всплытие: узел со стопом ещё обрабатывается, а всё выше него нет.'
      - 'Идите по порядку и прекращайте, как только положили stopId в результат.'
