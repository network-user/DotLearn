exercises:
  - id: modifying-dom-quiz-text-001
    concept: modifying-dom
    type: theory-quiz
    difficulty: 1
    prompt: 'В поле отзыва пользователь ввёл строку с тегами. Через какое свойство её безопасно показать на странице как текст?'
    choices:
      - id: a
        text: 'innerHTML - оно само разберёт теги.'
      - id: b
        text: 'textContent - строка попадёт на страницу буквально, теги не оживут.'
      - id: c
        text: 'Разницы нет, оба вставляют текст одинаково.'
      - id: d
        text: 'className - оно отвечает за содержимое узла.'
    correct: [b]
    explanation: 'textContent вставляет строку как текст: угловые скобки и теги показываются буквально. innerHTML разобрал бы их как HTML и мог бы выполнить чужой код - это XSS. Для пользовательского ввода только textContent.'
    hints:
      - 'Одно свойство показывает строку буквально, другое исполняет её как разметку. Какое из них безопасно для чужих данных?'
    variants:
      - prompt: 'Что делает li.classList.toggle("active"), если класса active на элементе ещё нет?'
        choices:
          - id: a
            text: 'Добавляет класс active.'
          - id: b
            text: 'Убирает класс active.'
          - id: c
            text: 'Ничего не делает, раз класса нет.'
          - id: d
            text: 'Выбрасывает ошибку.'
        correct: [a]
        explanation: 'toggle переключает класс: нет - добавит, есть - уберёт. Поэтому одно и то же нажатие то показывает, то прячет элемент, а состояние выяснять вручную не нужно.'
      - prompt: 'Вы вызвали document.createElement("li") и задали текст, но append не написали. Что на странице?'
        choices:
          - id: a
            text: 'Элемент появился в конце списка.'
          - id: b
            text: 'Ничего: узел создан в памяти, но не вставлен в дерево.'
          - id: c
            text: 'Элемент появился в начале страницы.'
          - id: d
            text: 'Браузер вставит его автоматически при следующем клике.'
        correct: [b]
        explanation: 'createElement создаёт узел в памяти без родителя. Пока его явно не вставят в дерево через append или родню, на экране его нет.'

  - id: modifying-dom-create-blanks-001
    concept: modifying-dom
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Соберите пункт списка с текстом «Кофе» и вставьте его в конец list. Заполните пропуски.'
    template: |
      const li = document.{{create}}('li');
      li.{{content}} = 'Кофе';
      list.{{insert}}(li);
    blanks:
      create:
        accept: ['createElement']
      content:
        accept: ['textContent']
      insert:
        accept: ['append', 'appendChild']
    explanation: 'createElement создаёт узел, textContent безопасно кладёт в него текст, append (или appendChild) вставляет узел последним ребёнком list.'
    hints:
      - 'Три шага: создать узел, положить в него текст, прицепить к родителю. Каждому шагу - свой метод или свойство.'
    variants:
      - prompt: 'Соберите заголовок h2 с текстом «Каталог» и вставьте его в конец box. Заполните пропуски.'
        template: |
          const title = document.{{create}}('h2');
          title.{{content}} = 'Каталог';
          box.{{insert}}(title);
        blanks:
          create:
            accept: ['createElement']
          content:
            accept: ['textContent']
          insert:
            accept: ['append', 'appendChild']
      - prompt: 'Соберите кнопку с текстом «Купить» и вставьте её в конец card. Заполните пропуски.'
        template: |
          const btn = document.{{create}}('button');
          btn.{{content}} = 'Купить';
          card.{{insert}}(btn);
        blanks:
          create:
            accept: ['createElement']
          content:
            accept: ['textContent']
          insert:
            accept: ['append', 'appendChild']

  - id: modifying-dom-toggle-001
    concept: modifying-dom
    type: javascript-function
    difficulty: 2
    prompt: 'Реализуйте classListToggle(classes, name) - модель classList.toggle: если name есть в массиве classes, верните массив без него, иначе - массив с добавленным name в конце.'
    starter: |
      const classListToggle = (classes, name) => {

      };
    cases:
      - call: "classListToggle(['card','active'], 'active')"
        expect: ['card']
      - call: "classListToggle(['card'], 'active')"
        expect: ['card', 'active']
      - call: "classListToggle([], 'open')"
        expect: ['open']
    hints:
      - 'toggle зависит от того, есть ли уже такой класс. Сначала проверьте наличие, потом решайте: убрать или добавить.'
      - 'Наличие проверяет includes; убрать элемент помогает filter, добавить в конец - расширение массива через spread.'
    solution: |
      const classListToggle = (classes, name) => {
        if (classes.includes(name)) {
          return classes.filter((c) => c !== name);
        }
        return [...classes, name];
      };
    variants:
      - prompt: 'Реализуйте classListToggle(classes, name) - модель classList.toggle. Проверьте на классах кнопки.'
        cases:
          - call: "classListToggle(['btn','btn-primary'], 'btn-primary')"
            expect: ['btn']
          - call: "classListToggle(['btn'], 'disabled')"
            expect: ['btn', 'disabled']
          - call: "classListToggle(['a','b'], 'a')"
            expect: ['b']
        solution: |
          const classListToggle = (classes, name) => {
            if (classes.includes(name)) {
              return classes.filter((c) => c !== name);
            }
            return [...classes, name];
          };
      - prompt: 'Реализуйте classListToggle(classes, name) - модель classList.toggle. Проверьте на состоянии меню.'
        cases:
          - call: "classListToggle(['open'], 'open')"
            expect: []
          - call: "classListToggle(['menu'], 'open')"
            expect: ['menu', 'open']
          - call: "classListToggle(['x','y','z'], 'y')"
            expect: ['x', 'z']
        solution: |
          const classListToggle = (classes, name) => {
            if (classes.includes(name)) {
              return classes.filter((c) => c !== name);
            }
            return [...classes, name];
          };

  - id: modifying-dom-insert-after-001
    concept: modifying-dom
    type: javascript-function
    difficulty: 3
    prompt: 'Реализуйте insertAfter(items, target, value) - модель метода after: верните новый массив, где value стоит сразу после каждого элемента, равного target. Если target не найден, верните копию без изменений.'
    starter: |
      const insertAfter = (items, target, value) => {

      };
    cases:
      - call: "insertAfter(['a','b','c'], 'a', 'x')"
        expect: ['a', 'x', 'b', 'c']
      - call: "insertAfter(['a','b','c'], 'c', 'x')"
        expect: ['a', 'b', 'c', 'x']
      - call: "insertAfter(['a','b','c'], 'z', 'x')"
        expect: ['a', 'b', 'c']
    hints:
      - 'Метод after вставляет узел рядом с целевым, а не пересобирает список. Пройдите элементы по порядку и решайте на каждом, нужно ли после него добавить value.'
      - 'Идите циклом: сначала кладите текущий элемент в результат, а сразу за ним - value, если текущий равен target.'
    solution: |
      const insertAfter = (items, target, value) => {
        const result = [];
        for (const item of items) {
          result.push(item);
          if (item === target) {
            result.push(value);
          }
        }
        return result;
      };
