exercises:
  - id: cwv-metrics-001
    concept: core-web-vitals
    type: theory-quiz
    difficulty: 1
    prompt: "Какая метрика Core Web Vitals измеряет визуальную стабильность - неожиданные сдвиги контента во время загрузки?"
    choices:
      - id: a
        text: "CLS (Cumulative Layout Shift)."
      - id: b
        text: "LCP (Largest Contentful Paint)."
      - id: c
        text: "INP (Interaction to Next Paint)."
      - id: d
        text: "TTFB (Time To First Byte)."
    correct: [a]
    explanation: "CLS суммирует неожиданные сдвиги макета: когда картинка без размеров или поздний баннер толкают уже прочитанный контент. LCP - про загрузку, INP - про отзывчивость."
    hints:
      - "Ищите метрику про «прыгающий» интерфейс, а не про скорость появления или отклик на клик."
    variants:
      - prompt: "Какая метрика Core Web Vitals измеряет загрузку - момент отрисовки самого крупного видимого элемента?"
        choices:
          - id: a
            text: "LCP (Largest Contentful Paint)."
          - id: b
            text: "CLS (Cumulative Layout Shift)."
          - id: c
            text: "INP (Interaction to Next Paint)."
          - id: d
            text: "FID (First Input Delay)."
        correct: [a]
        explanation: "LCP отмечает, когда отрисован крупнейший блок в первом экране - обычно герой-картинка или заголовок. Это ощущаемый пользователем момент «страница загрузилась»."
      - prompt: "Какая метрика Core Web Vitals измеряет отзывчивость - задержку между действием пользователя и следующей отрисовкой?"
        choices:
          - id: a
            text: "INP (Interaction to Next Paint)."
          - id: b
            text: "LCP (Largest Contentful Paint)."
          - id: c
            text: "CLS (Cumulative Layout Shift)."
          - id: d
            text: "TTFB (Time To First Byte)."
        correct: [a]
        explanation: "INP смотрит на самое медленное взаимодействие за сессию: сколько прошло от клика или нажатия клавиши до видимого отклика. С 2024 года он заменил FID как метрика отзывчивости."

  - id: cwv-cls-001
    concept: core-web-vitals
    type: predict-output
    difficulty: 2
    prompt: "score одного сдвига макета = impact fraction × distance fraction. Чему равен score этого сдвига? Введите число."
    snippet: |
      impact_fraction = 0.5
      distance_fraction = 0.2
    expected:
      kind: scalar
      value: 0.1
    explanation: "0.5 × 0.2 = 0.1. impact fraction - доля вьюпорта, задетая движущимися элементами; distance fraction - на какую долю экрана они уехали. Их произведение и есть вклад сдвига в CLS."
    hints:
      - "Просто перемножьте две дроби из сниппета."
    variants:
      - prompt: "score одного сдвига макета = impact fraction × distance fraction. Чему равен score этого сдвига? Введите число."
        snippet: |
          impact_fraction = 0.8
          distance_fraction = 0.25
        expected:
          kind: scalar
          value: 0.2
        explanation: "0.8 × 0.25 = 0.2. Крупный блок задел 80% экрана и сместил контент на четверть высоты - заметный скачок, вдвое выше порога «хорошо» 0.1."
      - prompt: "CLS страницы = сумма score всех неожиданных сдвигов за сессию. На странице случились два сдвига. Чему равен CLS? Введите число."
        snippet: |
          shift_1 = 0.05
          shift_2 = 0.03
        expected:
          kind: scalar
          value: 0.08
        explanation: "CLS накапливается: 0.05 + 0.03 = 0.08. Это ещё в пределах «хорошо» (≤ 0.1), но третий такой сдвиг уже выбьет страницу из зелёной зоны."

  - id: cwv-threshold-001
    concept: core-web-vitals
    type: predict-output
    difficulty: 2
    prompt: "Порог «хорошо» для INP - 200 мс. На сколько миллисекунд нужно снизить текущий p75, чтобы попасть ровно на границу? Введите число."
    snippet: |
      threshold_ms = 200
      p75_ms = 240
    expected:
      kind: scalar
      value: 40
    explanation: "240 − 200 = 40. Метрика считается пройденной, когда 75-й перцентиль реальных пользователей не превышает порога, поэтому смотрят именно на p75, а не на среднее."
    hints:
      - "Найдите разницу между текущим p75 и порогом."
    variants:
      - prompt: "Порог «хорошо» для LCP - 2500 мс. На сколько миллисекунд нужно снизить текущий p75, чтобы попасть ровно на границу? Введите число."
        snippet: |
          threshold_ms = 2500
          p75_ms = 3200
        expected:
          kind: scalar
          value: 700
        explanation: "3200 − 2500 = 700. LCP «хорошо» - это 2.5 с; при p75 = 3.2 с страница в зоне «требует улучшения», и до зелёной границы не хватает 700 мс."
      - prompt: "Порог «хорошо» для CLS - 0.1. На сколько нужно снизить текущий p75, чтобы попасть ровно на границу? Введите число."
        snippet: |
          threshold = 0.1
          p75 = 0.25
        expected:
          kind: scalar
          value: 0.15
        explanation: "0.25 − 0.1 = 0.15. CLS безразмерен: p75 = 0.25 - это «плохо» (порог «плохо» - 0.25), и до зелёной зоны нужно убрать 0.15 накопленного сдвига."

  - id: cwv-lab-field-004
    concept: core-web-vitals
    type: theory-quiz
    difficulty: 4
    prompt: "Lighthouse на вашей машине показывает 100 из 100, но Core Web Vitals в Search Console по этой странице красные. Как это возможно?"
    choices:
      - id: a
        text: "Lighthouse - лабораторный прогон на быстром устройстве и сети без реальных кликов; INP виден только на настоящих взаимодействиях, CLS"
      - id: b
        text: "Search Console просто ошибается: балл Lighthouse - источник истины, красное можно игнорировать."
      - id: c
        text: "Балл 100 в Lighthouse означает идеальные Core Web Vitals по определению, значит данные Search Console устарели."
      - id: d
        text: "Красный цвет в Search Console относится к SEO-тексту, а не к производительности."
    correct: [a]
    explanation: "Лаборатория и поле измеряют разное. Lighthouse гоняет один прогон в тепличных условиях и не может измерить INP (нет реальных кликов) или поздний CLS от контента, который догружается при скролле. Search Console показывает 75-й перцентиль реальных пользователей на их телефонах и сетях. Зелёная лаборатория при красном поле - типичная картина, и верить нужно полю."
    hints:
      - "Спросите: что из трёх метрик вообще нельзя измерить без живого пользователя, который кликает и прокручивает?"
      - "Один прогон на мощном ноутбуке и агрегат по тысячам реальных телефонов - это разные распределения. Какое из них видит поисковик?"
