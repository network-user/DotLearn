exercises:
  - id: cache-hashed-001
    concept: caching-cdn
    type: theory-quiz
    difficulty: 1
    prompt: "Файл styles.a3f5c9.css содержит хеш содержимого в имени и при изменении получит новое имя. Какой Cache-Control ему подходит?"
    choices:
      - id: a
        text: "public, max-age=31536000, immutable"
      - id: b
        text: "no-store"
      - id: c
        text: "no-cache"
      - id: d
        text: "private, max-age=0"
    correct: [a]
    explanation: "Файл с хешем в имени можно кешировать хоть на год и с immutable: если содержимое изменится, изменится и имя файла, а HTML сошлётся уже на новый URL. Валидация не нужна вовсе."
    hints:
      - "Раз при любом изменении меняется само имя файла, как долго можно доверять старому имени?"
    variants:
      - prompt: "Что делает CDN для производительности?"
        choices:
          - id: a
            text: "Раздаёт статику с географически близких к пользователю edge-узлов, снижая задержку (RTT)."
          - id: b
            text: "Сжимает исходный код приложения на сервере."
          - id: c
            text: "Заменяет базу данных быстрым кешем в памяти."
          - id: d
            text: "Автоматически переписывает JavaScript в более быстрый."
        correct: [a]
        explanation: "CDN держит копии статики на узлах по всему миру. Пользователь качает с ближайшего edge, а не с далёкого origin - меньше путь, меньше задержка на каждый round trip."
      - prompt: "Какому ресурсу НЕ стоит ставить годовой immutable-кеш?"
        choices:
          - id: a
            text: "index.html - он меняется при каждом деплое и ссылается на остальные файлы."
          - id: b
            text: "app.9f2c.js с хешем в имени."
          - id: c
            text: "logo.4b1a.svg с хешем в имени."
          - id: d
            text: "font.woff2 с хешем в имени."
        correct: [a]
        explanation: "HTML - точка входа: он ссылается на ассеты и обновляется каждым деплоем. Вечный кеш на нём прибьёт пользователя к старой версии со ссылками на старые файлы. HTML кешируют коротко или с no-cache."

  - id: cache-latency-001
    concept: caching-cdn
    type: predict-output
    difficulty: 2
    prompt: "Без CDN сервер находится в 100 мс round trip от пользователя, edge-узел CDN - в 10 мс. Сколько миллисекунд экономит один round trip через CDN? Введите число."
    snippet: |
      origin_rtt_ms = 100
      edge_rtt_ms = 10
    expected:
      kind: scalar
      value: 90
    explanation: "100 − 10 = 90 мс на каждый round trip. При загрузке страницы round trip'ов много (соединение, запросы ресурсов), поэтому близкий edge экономит время многократно."
    hints:
      - "Найдите разницу между дальним и близким временем round trip."
    variants:
      - prompt: "Без CDN сервер в 150 мс round trip от пользователя, edge-узел - в 20 мс. Сколько миллисекунд экономит один round trip через CDN? Введите число."
        snippet: |
          origin_rtt_ms = 150
          edge_rtt_ms = 20
        expected:
          kind: scalar
          value: 130
        explanation: "150 − 20 = 130 мс на round trip. Чем дальше origin от пользователя, тем весомее выигрыш от раздачи с ближайшего узла."
      - prompt: "Ассет отдан с Cache-Control: max-age=3600. Сколько это минут свежести? Введите число."
        snippet: |
          Cache-Control: max-age=3600
        expected:
          kind: scalar
          value: 60
        explanation: "max-age задаётся в секундах: 3600 / 60 = 60 минут. Целый час копия отдаётся из кеша без единого обращения к серверу."

  - id: cache-headers-001
    concept: caching-cdn
    type: fill-in-blanks
    difficulty: 2
    prompt: "Ассет с хешем в имени не изменится никогда. Впишите срок на год в секундах и директиву «даже не проверяй»."
    template: |
      Cache-Control: public, max-age={{seconds}}, {{directive}}
    blanks:
      seconds:
        accept: ['31536000']
      directive:
        accept: ['immutable', 'Immutable']
    explanation: "Год - это 31536000 секунд, а immutable избавляет даже от условных запросов на валидацию. Безопасно именно потому, что при изменении содержимого поменяется имя файла."
    hints:
      - "Секунд в году: 365 × 24 × 60 × 60."
      - "Вторая директива обещает кешу, что ресурс не изменится, и отменяет валидацию."
    variants:
      - prompt: "HTML нужно кешировать, но проверять актуальность у сервера перед каждым использованием. Впишите директиву."
        template: |
          Cache-Control: {{directive}}
        blanks:
          directive:
            accept: ['no-cache']
        explanation: "no-cache разрешает хранить копию, но требует валидации у сервера перед каждым использованием. Так HTML остаётся свежим при деплое, не теряя выгоды 304-ответов."
      - prompt: "Персональную страницу можно хранить только в браузере пользователя и всегда перепроверять. Впишите директиву перед max-age=0."
        template: |
          Cache-Control: {{directive}}, max-age=0
        blanks:
          directive:
            accept: ['private']
        explanation: "private запрещает хранить ответ общим кешам (CDN, прокси) - только браузеру владельца. max-age=0 заставляет перепроверять при каждом использовании, чтобы чужой пользователь не увидел персональные данные."

  - id: cache-deploy-004
    concept: caching-cdn
    type: theory-quiz
    difficulty: 4
    prompt: "После деплоя часть пользователей видит старый JavaScript. Ассеты отдавались с Cache-Control: max-age=31536000, но имена файлов при сборке не меняются (app.js). Что не так и как правильно?"
    choices:
      - id: a
        text: "Вечный кеш на файле с постоянным именем прибивает старую версию: браузер даже не спрашивает сервер. Правильно - хеш содержимого в имени (app.9f2c.js) плюс immutable для ассетов, а HTML отдавать коротко или с no-cache."
      - id: b
        text: "Нужно поставить no-store на все ответы: тогда кеш никогда не помешает деплою."
      - id: c
        text: "Проблема в CDN: браузерный кеш не умеет хранить JavaScript."
      - id: d
        text: "Достаточно попросить пользователей нажать Ctrl+F5 после каждого релиза."
    correct: [a]
    explanation: "Пока max-age не истёк, браузер отдаёт app.js из кеша без запроса к серверу - и получает прошлогодний код под тем же именем. Рабочий шаблон разделяет судьбы: ассеты получают хеш содержимого в имени и годовой immutable (новую версию скачает сама смена имени), а HTML валидируется часто. no-store убил бы производительность, а «попросить пользователей» не масштабируется."
    hints:
      - "Пока срок свежести не истёк, кеш не делает даже условных запросов. Что это значит для файла, имя которого не меняется между релизами?"
      - "Что должно поменяться при новом содержимом, чтобы браузер гарантированно скачал новый файл?"
