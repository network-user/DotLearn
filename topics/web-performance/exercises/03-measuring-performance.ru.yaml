exercises:
  - id: measure-lab-field-001
    concept: measuring-performance
    type: theory-quiz
    difficulty: 1
    prompt: "Lighthouse в DevTools прогоняет страницу в фиксированных условиях на вашей машине. Как называется такой тип данных о производительности?"
    choices:
      - id: a
        text: "Лабораторные (lab): один прогон в контролируемой среде."
      - id: b
        text: "Полевые (field, RUM): агрегат по реальным пользователям."
      - id: c
        text: "Историческими: усреднение за прошлый год."
      - id: d
        text: "Прогнозными: предсказание модели."
    correct: [a]
    explanation: "Прогон в заданных условиях на одном устройстве - это лабораторные данные. Они воспроизводимы и удобны для отладки, но не отражают разброс реальных телефонов и сетей."
    hints:
      - "Один прогон в тепличных условиях против сбора с тысяч реальных браузеров - как называется первое?"
    variants:
      - prompt: "Chrome UX Report (CrUX) и отчёты Search Console собраны с браузеров реальных пользователей Chrome. Как называется такой тип данных?"
        choices:
          - id: a
            text: "Полевые (field, RUM): агрегат по реальным пользователям."
          - id: b
            text: "Лабораторные (lab): один прогон в контролируемой среде."
          - id: c
            text: "Синтетические: сгенерированные без пользователей."
          - id: d
            text: "Кешированные: сохранённые с прошлого визита."
        correct: [a]
        explanation: "Данные, собранные на устройствах живых пользователей, - это полевые данные (Real User Monitoring). Именно по ним поисковик оценивает Core Web Vitals."
      - prompt: "Какой источник даёт полевые (field) данные о Core Web Vitals?"
        choices:
          - id: a
            text: "Chrome UX Report (CrUX)."
          - id: b
            text: "Локальный прогон Lighthouse."
          - id: c
            text: "Вкладка Performance в DevTools."
          - id: d
            text: "Одиночный тест в WebPageTest."
        correct: [a]
        explanation: "CrUX агрегирует метрики реальных пользователей Chrome - это поле. Lighthouse, Performance-панель и одиночный WebPageTest-прогон дают лабораторные данные."

  - id: measure-score-001
    concept: measuring-performance
    type: predict-output
    difficulty: 2
    prompt: "Итоговый балл Lighthouse Performance - взвешенная сумма баллов метрик, каждый балл от 0 до 100. Посчитайте итоговый балл. Введите число."
    snippet: |
      FCP  score=100  weight=0.10
      SI   score=100  weight=0.10
      LCP  score=100  weight=0.25
      TBT  score=50   weight=0.30
      CLS  score=100  weight=0.25
    expected:
      kind: scalar
      value: 85
    explanation: "100·0.10 + 100·0.10 + 100·0.25 + 50·0.30 + 100·0.25 = 10 + 10 + 25 + 15 + 25 = 85. Самый тяжёлый вес у TBT (0.30), поэтому просадка именно по нему бьёт по баллу сильнее всего."
    hints:
      - "Умножьте каждый балл на его вес и сложите пять произведений."
    variants:
      - prompt: "Итоговый балл Lighthouse Performance - взвешенная сумма баллов метрик. Посчитайте итоговый балл. Введите число."
        snippet: |
          FCP  score=100  weight=0.10
          SI   score=100  weight=0.10
          LCP  score=100  weight=0.25
          TBT  score=0    weight=0.30
          CLS  score=100  weight=0.25
        expected:
          kind: scalar
          value: 70
        explanation: "10 + 10 + 25 + 0 + 25 = 70. Нулевой балл по TBT (самый тяжёлый вес 0.30) утягивает результат сразу на 30 пунктов - это цена долгих задач в главном потоке."
      - prompt: "Итоговый балл Lighthouse Performance - взвешенная сумма баллов метрик. Посчитайте итоговый балл. Введите число."
        snippet: |
          FCP  score=100  weight=0.10
          SI   score=100  weight=0.10
          LCP  score=100  weight=0.25
          TBT  score=100  weight=0.30
          CLS  score=60   weight=0.25
        expected:
          kind: scalar
          value: 90
        explanation: "10 + 10 + 25 + 30 + 15 = 90. Просадка CLS до 60 стоит 0.25·40 = 10 пунктов - визуальная нестабильность тоже весит четверть балла."

  - id: measure-perfapi-001
    concept: measuring-performance
    type: fill-in-blanks
    difficulty: 2
    prompt: "Замерьте время участка кода через User Timing API: поставьте две отметки и измерьте интервал между ними."
    template: |
      performance.{{markStart}}('start');
      doWork();
      performance.{{markEnd}}('end');
      performance.{{measure}}('work', 'start', 'end');
    blanks:
      markStart:
        accept: ['mark']
      markEnd:
        accept: ['mark']
      measure:
        accept: ['measure']
    explanation: "performance.mark ставит именованную временную метку, performance.measure считает интервал между двумя метками. Результат виден во вкладке Performance и доступен через getEntriesByName."
    hints:
      - "Одна функция ставит точки во времени, другая измеряет расстояние между двумя точками."
    variants:
      - prompt: "Достаньте навигационную запись, чтобы вычислить TTFB. Впишите тип записи."
        template: |
          const nav = performance.getEntriesByType('{{type}}')[0];
          const ttfb = nav.responseStart - nav.requestStart;
        blanks:
          type:
            accept: ['navigation']
        explanation: "Запись типа navigation содержит тайминги загрузки документа: requestStart, responseStart, domContentLoadedEventEnd и другие. TTFB - это responseStart минус requestStart."
      - prompt: "Получите записи о моментах отрисовки (first-paint, first-contentful-paint). Впишите тип записи."
        template: |
          const paints = performance.getEntriesByType('{{type}}');
        blanks:
          type:
            accept: ['paint']
        explanation: "Тип paint отдаёт записи first-paint и first-contentful-paint с их временем от начала навигации. Это лабораторно измеримые вехи отрисовки."

  - id: measure-discrepancy-004
    concept: measuring-performance
    type: theory-quiz
    difficulty: 4
    prompt: "Lighthouse-балл 98, а пользователи жалуются на медленную загрузку. Какая проверка ближе всего к причине расхождения?"
    choices:
      - id: a
        text: "Лаборатория гоняет быстрый CPU, быструю сеть и часто прогретый кеш; нужно посмотреть полевые данные и повторить прогон с"
      - id: b
        text: "Балл 98 - это ошибка Lighthouse; достаточно перезапустить прогон, и он покажет реальную картину."
      - id: c
        text: "Пользователи используют старые браузеры, а Lighthouse - новый, поэтому цифры несравнимы в принципе."
      - id: d
        text: "Нужно повысить балл до 100: только идеальный балл гарантирует быструю загрузку у всех."
    correct: [a]
    explanation: "Расхождение почти всегда про условия. Дефолтный прогон льстит: мощная машина, быстрый канал, иногда кеш от прошлого визита. Реальные пользователи сидят на средних телефонах, мобильных сетях и приходят с холодным кешем. Смотрите поле (CrUX, свой RUM) и воспроизводите проблему троттлингом CPU и сети - только тогда лабораторный прогон начнёт совпадать с жалобами."
    hints:
      - "Чем отличается ваш ноутбук с оптоволокном от среднего телефона в метро? Каждое из этих отличий - гипотеза."
      - "Балл - это одно число из одного прогона. Где взять распределение по реальным устройствам?"
