exercises:
  - id: rl-async-defer-001
    concept: resource-loading
    type: theory-quiz
    difficulty: 1
    prompt: "Скрипт с атрибутом defer скачивается параллельно с разбором HTML. Когда он выполнится?"
    choices:
      - id: a
        text: "После построения DOM, перед событием DOMContentLoaded, в порядке подключения."
      - id: b
        text: "Немедленно по мере скачивания, прерывая разбор HTML."
      - id: c
        text: "Только после полной загрузки всех картинок (событие load)."
      - id: d
        text: "Никогда: defer отключает скрипт."
    correct: [a]
    explanation: "defer откладывает выполнение до готового DOM и сохраняет порядок тегов. Это безопасный вариант для скриптов, которые зависят от разметки или друг от друга."
    hints:
      - "defer означает «отложить до готовой разметки, но не потерять порядок». Куда это ставит момент выполнения?"
    variants:
      - prompt: "Скрипт с атрибутом async скачивается в фоне. Когда он выполнится?"
        choices:
          - id: a
            text: "Сразу как только скачается, прерывая разбор, без гарантии порядка."
          - id: b
            text: "Строго после всех остальных скриптов страницы."
          - id: c
            text: "После построения DOM, в порядке подключения."
          - id: d
            text: "Только по явному вызову из другого скрипта."
        correct: [a]
        explanation: "async запускает скрипт по готовности загрузки, вклиниваясь в разбор. Порядок между async-скриптами не гарантирован - поэтому он для независимых вещей вроде аналитики."
      - prompt: "Есть три скрипта, которые должны выполниться строго по порядку и могут подождать готовности DOM. Какой атрибут выбрать?"
        choices:
          - id: a
            text: "defer на всех трёх."
          - id: b
            text: "async на всех трёх."
          - id: c
            text: "Никаких атрибутов - оставить синхронными в <head>."
          - id: d
            text: "async на первом, defer на остальных."
        correct: [a]
        explanation: "defer и не блокирует разбор, и сохраняет порядок. async порядок не гарантирует, а синхронные скрипты в <head> задержали бы первую отрисовку."

  - id: rl-hints-001
    concept: resource-loading
    type: fill-in-blanks
    difficulty: 2
    prompt: "LCP-картинка обнаруживается поздно, потому что её путь спрятан в JS. Подскажите браузеру скачать её заранее с высоким приоритетом через preload."
    template: |
      <link rel="{{rel}}" href="/hero.avif" as="{{as}}">
    blanks:
      rel:
        accept: ['preload']
      as:
        accept: ['image']
    explanation: "rel=preload заставляет браузер скачать ресурс рано и с высоким приоритетом; атрибут as задаёт тип (image), чтобы приоритет и заголовки Accept были правильными."
    hints:
      - "Нужен resource hint, который поднимает приоритет и качает ресурс до того, как парсер до него дойдёт."
    variants:
      - prompt: "Шрифты и картинки лежат на стороннем домене. Заранее установите к нему соединение (DNS + TCP + TLS), чтобы не платить за это в момент запроса."
        template: |
          <link rel="{{rel}}" href="https://cdn.example.com">
        blanks:
          rel:
            accept: ['preconnect']
        explanation: "preconnect заранее выполняет DNS-резолв, TCP-рукопожатие и TLS до стороннего origin. Когда ресурс с него понадобится, соединение уже готово."
      - prompt: "Герой-картинка важнее прочих. Явно поднимите её приоритет загрузки через Priority Hints. Впишите атрибут."
        template: |
          <img src="/hero.avif" {{attr}}="high">
        blanks:
          attr:
            accept: ['fetchpriority']
        explanation: "fetchpriority=high повышает приоритет конкретного ресурса в очереди загрузки. Так LCP-картинка обгоняет менее важные запросы, не трогая остальные теги."

  - id: rl-chain-001
    concept: resource-loading
    type: predict-output
    difficulty: 3
    prompt: "Картинка обнаруживается только после того, как скачается CSS, где на неё ссылаются. Через сколько миллисекунд от t0 будет готова hero.avif? Введите число."
    snippet: |
      t0: HTML уже загружен
      app.css    download 40 мс, найден в HTML
      hero.avif  download 60 мс, найден внутри app.css
    expected:
      kind: scalar
      value: 100
    explanation: "Это последовательная цепочка: сначала 40 мс на CSS, и только потом, узнав про картинку, браузер тратит ещё 60 мс. 40 + 60 = 100. Каждый уровень вложенности добавляет round trip к критическому пути."
    hints:
      - "Картинка не может начать грузиться, пока браузер не узнает о ней. А узнаёт он о ней откуда?"
      - "Сложите время двух шагов, которые идут строго один за другим."
    variants:
      - prompt: "Теперь hero.avif указана в <link rel=preload> прямо в HTML и грузится параллельно с CSS, начиная с t0. Через сколько миллисекунд она будет готова? Введите число."
        snippet: |
          t0: HTML уже загружен
          app.css    download 40 мс, найден в HTML
          hero.avif  download 60 мс, начата по preload с t0
        expected:
          kind: scalar
          value: 60
        explanation: "preload разрывает цепочку: картинка стартует сразу с t0 параллельно с CSS. Готова та, что дольше грузится: max(40, 60) = 60. Preload убрал 40 мс ожидания CSS."
      - prompt: "Шрифт обнаруживается только после загрузки CSS, где объявлен @font-face. Через сколько миллисекунд от t0 будет готов font.woff2? Введите число."
        snippet: |
          t0: HTML уже загружен
          app.css     download 30 мс, найден в HTML
          font.woff2  download 50 мс, найден внутри app.css
        expected:
          kind: scalar
          value: 80
        explanation: "Снова последовательная цепочка: 30 мс на CSS, затем 50 мс на шрифт. 30 + 50 = 80. Именно поэтому критичные шрифты часто preload'ят - чтобы не ждать CSS."

  - id: rl-preload-abuse-004
    concept: resource-loading
    type: theory-quiz
    difficulty: 4
    prompt: "Вы добавили <link rel=preload> на десяток ресурсов, чтобы «ускорить всё», но LCP стал хуже. Почему?"
    choices:
      - id: a
        text: "preload не расширяет канал, а перераспределяет приоритеты: заpreload'ив всё, вы столкнули второстепенное с действительно критичной LCP-картинкой за полосу и очередь, и она пришла позже."
      - id: b
        text: "preload повреждает кеш, поэтому каждый ресурс скачивается дважды."
      - id: c
        text: "Слишком много тегов <link> замедляют парсинг HTML настолько, что это видно в LCP."
      - id: d
        text: "preload работает только для одного ресурса на страницу, остальные вызывают ошибку."
    correct: [a]
    explanation: "preload - это не «сделать быстрее», а «сделать раньше и важнее». Полоса и число параллельных соединений ограничены. Когда всё помечено как срочное, ничего не срочно: критичная герой-картинка теряет своё преимущество, конкурируя с десятком второстепенных запросов. Preload'ить стоит точечно то, что и критично, и поздно обнаруживается парсером."
    hints:
      - "preload меняет очередь загрузки, но не ширину трубы. Что происходит с очередью, если всё пометить как «вне очереди»?"
      - "Подумайте, за что конкурируют десять «срочных» ресурсов и один по-настоящему критичный."
