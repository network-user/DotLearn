exercises:
  - id: fonts-display-001
    concept: fonts
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает font-display: swap, пока веб-шрифт ещё скачивается?"
    choices:
      - id: a
        text: "Сразу показывает текст системным шрифтом, а по загрузке подменяет на веб-шрифт."
      - id: b
        text: "Прячет текст до полной загрузки веб-шрифта."
      - id: c
        text: "Отменяет загрузку веб-шрифта и остаётся на системном."
      - id: d
        text: "Загружает веб-шрифт синхронно, блокируя отрисовку."
    correct: [a]
    explanation: "swap показывает fallback-шрифт немедленно и меняет его на веб-шрифт, когда тот придёт. Текст читаем сразу - это поведение против «невидимого текста» (FOIT)."
    hints:
      - "«Swap» - подмена: показать что-то читаемое сразу, а красивый шрифт подставить потом. Что показывают в начале?"
    variants:
      - prompt: "К чему приводит font-display: block, пока веб-шрифт скачивается?"
        choices:
          - id: a
            text: "Невидимый текст (FOIT) на время блокировки, примерно до 3 секунд."
          - id: b
            text: "Мгновенный показ системным шрифтом без подмены."
          - id: c
            text: "Показ текста с заниженной насыщенностью."
          - id: d
            text: "Дублирование текста двумя шрифтами."
        correct: [a]
        explanation: "block держит короткий период блокировки, когда текст невидим (Flash of Invisible Text). Если шрифт не пришёл вовремя, текст всё же покажут fallback-ом, но пользователь уже увидел пустоту."
      - prompt: "Какое значение font-display гарантированно избавляет от невидимого текста при загрузке шрифта?"
        choices:
          - id: a
            text: "swap"
          - id: b
            text: "block"
          - id: c
            text: "auto"
          - id: d
            text: "fallback"
        correct: [a]
        explanation: "swap показывает fallback сразу и не прячет текст ни на мгновение. block прячет текст на период блокировки, а auto и fallback ведут себя близко к block по видимости первого кадра."

  - id: fonts-face-001
    concept: fonts
    type: fill-in-blanks
    difficulty: 2
    prompt: "Объявите шрифт так, чтобы текст был читаем сразу, а веб-шрифт подменился по загрузке. Впишите значение."
    template: |
      @font-face {
        font-family: 'Inter';
        src: url('/inter.woff2') format('woff2');
        font-display: {{value}};
      }
    blanks:
      value:
        accept: ['swap']
    explanation: "font-display: swap показывает fallback немедленно и меняет на веб-шрифт по готовности - самый частый выбор для читаемости с первого кадра."
    hints:
      - "Нужно значение, при котором текст виден сразу, а веб-шрифт подставляется позже."
    variants:
      - prompt: "Preload'ните критичный шрифт, чтобы он не ждал загрузки CSS. Впишите два атрибута."
        template: |
          <link rel="{{rel}}" href="/inter.woff2" as="{{as}}" type="font/woff2" crossorigin>
        blanks:
          rel:
            accept: ['preload']
          as:
            accept: ['font']
        explanation: "rel=preload с as=font качает шрифт рано и с высоким приоритетом, разрывая цепочку HTML → CSS → шрифт. Атрибут crossorigin обязателен: шрифты грузятся в анонимном режиме CORS."
      - prompt: "Укажите современный формат файла шрифта, чтобы браузер взял самый компактный вариант. Впишите формат."
        template: |
          @font-face {
            font-family: 'Inter';
            src: url('/inter.woff2') format('{{fmt}}');
          }
        blanks:
          fmt:
            accept: ['woff2']
        explanation: "woff2 - сжатый формат веб-шрифтов, поддерживаемый всеми актуальными браузерами. Он заметно легче woff и ttf, поэтому это формат по умолчанию для веба."

  - id: fonts-subset-001
    concept: fonts
    type: predict-output
    difficulty: 2
    prompt: "Полный файл шрифта Roboto весит 300 КБ (кириллица, латиница и десятки других письменностей). Subset только под кириллицу и латиницу оставляет 40% размера. Сколько килобайт весит subset? Введите число."
    snippet: |
      full_kb = 300
      subset_ratio = 0.40
    expected:
      kind: scalar
      value: 120
    explanation: "300 × 0.40 = 120 КБ. Subsetting выбрасывает глифы, которых на сайте нет: если у вас только русский и английский, платить за тайский и деванагари незачем."
    hints:
      - "Subset оставляет 40% исходного веса - просто возьмите эту долю от полного файла."
    variants:
      - prompt: "Полный шрифт весит 250 КБ. Subset оставляет 30% размера. Сколько килобайт весит subset? Введите число."
        snippet: |
          full_kb = 250
          subset_ratio = 0.30
        expected:
          kind: scalar
          value: 75
        explanation: "250 × 0.30 = 75 КБ. Чем больше письменностей в исходном шрифте, тем сильнее выигрыш от subsetting под реальный язык сайта."
      - prompt: "Шрифт в старом формате woff весит 100 КБ. Перевод в woff2 экономит 30%. Сколько килобайт весит woff2-версия? Введите число."
        snippet: |
          woff_kb = 100
          woff2_saving = 0.30
        expected:
          kind: scalar
          value: 70
        explanation: "Остаётся 70%: 100 × 0.70 = 70 КБ. Только смена формата на woff2, без изменения набора глифов, уже облегчает файл - это бесплатная оптимизация на сборке."

  - id: fonts-swap-cls-004
    concept: fonts
    type: theory-quiz
    difficulty: 4
    prompt: "font-display: swap убрал невидимый текст, но теперь при загрузке шрифта появляется другой дефект. Какой и как его смягчить?"
    choices:
      - id: a
        text: "При подмене fallback на веб-шрифт меняются метрики (ширина глифов, высота строки), текст перекомпоновывается и сдвигается - это вклад в CLS. Смягчается подбором fallback с близкими метриками через size-adjust / ascent-override или preload'ом шрифта."
      - id: b
        text: "swap повреждает кодировку, поэтому появляются кракозябры; лечится сменой charset."
      - id: c
        text: "swap загружает шрифт дважды; лечится атрибутом crossorigin."
      - id: d
        text: "swap отключает сглаживание; лечится свойством font-smooth."
    correct: [a]
    explanation: "Момент подмени шрифта заметен: у fallback и веб-шрифта разная ширина букв и метрики строк, поэтому текст «дёргается» и толкает соседний контент - растёт CLS. Смягчают это, подгоняя метрики fallback под веб-шрифт (size-adjust, ascent-override, descent-override) или ускоряя приход шрифта через preload, чтобы swap случился до того, как пользователь начал читать."
    hints:
      - "Fallback и веб-шрифт занимают разное место на строке. Что происходит с версткой в момент, когда один сменяет другой?"
      - "Дефект - это одна из метрик Core Web Vitals. Смягчить его - значит либо сделать fallback похожим по размеру, либо ускорить приход настоящего шрифта."
