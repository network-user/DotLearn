exercises:
  - id: img-lazy-001
    concept: images
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает атрибут loading=\"lazy\" на картинке ниже первого экрана?"
    choices:
      - id: a
        text: "Откладывает загрузку картинки, пока она не приблизится к вьюпорту при прокрутке."
      - id: b
        text: "Сжимает картинку на лету до меньшего размера."
      - id: c
        text: "Загружает картинку в низком качестве, а потом заменяет полной."
      - id: d
        text: "Полностью отключает картинку на мобильных."
    correct: [a]
    explanation: "loading=lazy откладывает запрос картинки до приближения к экрану. Так браузер не тратит полосу на то, что пользователь может и не прокрутить."
    hints:
      - "«Lazy» - ленивый: делать работу не заранее, а в последний разумный момент. Какой это момент для картинки?"
    variants:
      - prompt: "Какой формат обычно даёт самый маленький файл для фотографий при сравнимом качестве?"
        choices:
          - id: a
            text: "AVIF."
          - id: b
            text: "JPEG."
          - id: c
            text: "PNG."
          - id: d
            text: "BMP."
        correct: [a]
        explanation: "AVIF при том же визуальном качестве обычно легче WebP и заметно легче JPEG. PNG хорош для графики без потерь, BMP почти не сжат."
      - prompt: "Чего НЕЛЬЗЯ делать с loading=\"lazy\"?"
        choices:
          - id: a
            text: "Ставить его на LCP-картинку в первом экране."
          - id: b
            text: "Ставить его на картинки глубоко внизу длинной страницы."
          - id: c
            text: "Ставить его на изображения в подвале сайта."
          - id: d
            text: "Ставить его на картинки в скрытых вкладках."
        correct: [a]
        explanation: "Ленивая загрузка на LCP-картинке откладывает её запрос и ухудшает LCP: главный элемент экрана должен грузиться как можно раньше, а не лениво."

  - id: img-savings-001
    concept: images
    type: predict-output
    difficulty: 2
    prompt: "JPEG-версия картинки весит 300 КБ. AVIF даёт экономию 60%. Сколько килобайт весит AVIF-версия? Введите число."
    snippet: |
      jpeg_kb = 300
      avif_saving = 0.60
    expected:
      kind: scalar
      value: 120
    explanation: "Экономия 60% оставляет 40% размера: 300 × 0.40 = 120 КБ. Замена формата - часто самая дешёвая крупная оптимизация: правится сборкой, без переписывания кода."
    hints:
      - "Экономия 60% означает, что остаётся 40% исходного веса."
    variants:
      - prompt: "JPEG-версия весит 300 КБ. WebP даёт экономию 30%. Сколько килобайт весит WebP-версия? Введите число."
        snippet: |
          jpeg_kb = 300
          webp_saving = 0.30
        expected:
          kind: scalar
          value: 210
        explanation: "Остаётся 70%: 300 × 0.70 = 210 КБ. WebP экономит скромнее AVIF, но поддерживается почти везде - разумный компромисс совместимости и веса."
      - prompt: "Герой-картинка в JPEG весит 500 КБ. AVIF даёт экономию 70%. Сколько килобайт весит AVIF-версия? Введите число."
        snippet: |
          jpeg_kb = 500
          avif_saving = 0.70
        expected:
          kind: scalar
          value: 150
        explanation: "Остаётся 30%: 500 × 0.30 = 150 КБ. На тяжёлой герой-картинке такая экономия напрямую ускоряет LCP - меньше байтов до отрисовки главного элемента."

  - id: img-responsive-001
    concept: images
    type: fill-in-blanks
    difficulty: 2
    prompt: "Отдайте картинку в нескольких размерах и подскажите браузеру ширину слота, чтобы он выбрал подходящий файл. Впишите два атрибута."
    template: |
      <img
        src="hero-960.jpg"
        {{srcset}}="hero-480.jpg 480w, hero-960.jpg 960w"
        {{sizes}}="(max-width: 600px) 480px, 960px"
        alt="">
    blanks:
      srcset:
        accept: ['srcset']
      sizes:
        accept: ['sizes']
    explanation: "srcset перечисляет варианты с их реальной шириной в пикселях (w), а sizes сообщает, какой ширины слот займёт картинка на разных экранах. По этим двум данным браузер сам выбирает оптимальный файл."
    hints:
      - "Один атрибут перечисляет доступные файлы с их шириной, другой описывает, сколько места картинка займёт на экране."
    variants:
      - prompt: "Отдайте современный формат с запасным вариантом через <picture>. Впишите атрибут источника."
        template: |
          <picture>
            <source {{attr}}="hero.avif" type="image/avif">
            <img src="hero.jpg" alt="">
          </picture>
        blanks:
          attr:
            accept: ['srcset']
        explanation: "Внутри <picture> тег <source> тоже задаёт файл через srcset. Браузер берёт первый <source>, чей формат он поддерживает, иначе откатывается на <img> с JPEG."
      - prompt: "Зарезервируйте место под картинку заранее, чтобы её загрузка не сдвинула контент (защита от CLS). Впишите два атрибута размеров."
        template: |
          <img src="photo.jpg" {{width}}="800" {{height}}="600" alt="">
        blanks:
          width:
            accept: ['width']
          height:
            accept: ['height']
        explanation: "Явные width и height дают браузеру соотношение сторон заранее, и он резервирует место до загрузки файла. Без них картинка «раздвигает» текст при появлении - это классический источник сдвигов CLS."

  - id: img-srcset-pick-003
    concept: images
    type: predict-output
    difficulty: 3
    prompt: "Браузеру нужен источник шириной не меньше DPR × slot_css_px реальных пикселей; он берёт наименьший подходящий из srcset. Какую ширину (число w) он выберет? Введите число."
    snippet: |
      srcset = [480w, 800w, 1200w]
      DPR = 2
      slot_css_px = 400
    expected:
      kind: scalar
      value: 800
    explanation: "Нужно не меньше 2 × 400 = 800 реальных пикселей. Наименьший подходящий вариант - ровно 800w. Меньший (480w) выглядел бы размытым на экране с DPR 2."
    hints:
      - "Сначала посчитайте, сколько реальных пикселей нужно: плотность пикселей умножьте на ширину слота."
      - "Из вариантов возьмите самый маленький, который не меньше этого числа."
    variants:
      - prompt: "Браузеру нужен источник не меньше DPR × slot_css_px реальных пикселей; он берёт наименьший подходящий. Какую ширину (число w) он выберет? Введите число."
        snippet: |
          srcset = [480w, 800w, 1200w]
          DPR = 3
          slot_css_px = 400
        expected:
          kind: scalar
          value: 1200
        explanation: "Нужно 3 × 400 = 1200 реальных пикселей. Ровно 1200w подходит и является наименьшим достаточным. На плотных экранах картинке нужен файл побольше."
      - prompt: "Браузеру нужен источник не меньше DPR × slot_css_px реальных пикселей; он берёт наименьший подходящий. Какую ширину (число w) он выберет? Введите число."
        snippet: |
          srcset = [480w, 800w, 1200w]
          DPR = 1
          slot_css_px = 300
        expected:
          kind: scalar
          value: 480
        explanation: "Нужно 1 × 300 = 300 реальных пикселей. Самый маленький вариант не меньше 300 - это 480w. Отдавать 1200w сюда было бы расточительством трафика."
