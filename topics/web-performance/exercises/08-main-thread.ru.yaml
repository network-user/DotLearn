exercises:
  - id: mt-splitting-001
    concept: main-thread
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает code-splitting с бандлом JavaScript?"
    choices:
      - id: a
        text: "Разбивает бандл на части и грузит только нужное для текущего"
      - id: b
        text: "Сжимает весь бандл в один минифицированный файл."
      - id: c
        text: "Переписывает код на более быстрый язык при сборке."
      - id: d
        text: "Дублирует бандл на несколько CDN-узлов."
    correct: [a]
    explanation: "Code-splitting делит код на чанки: стартовый экран получает только свою часть, а редко нужные экраны подгружаются лениво. Меньше JS на старте - меньше работы главному потоку."
    hints:
      - "«Splitting» - разделение. Зачем грузить код настроек, если пользователь на главной?"
    variants:
      - prompt: "Что делает tree-shaking?"
        choices:
          - id: a
            text: "Удаляет из бандла неиспользуемый экспортируемый код на этапе"
          - id: b
            text: "Откладывает выполнение скриптов до простоя браузера."
          - id: c
            text: "Кеширует бандл в памяти между переходами."
          - id: d
            text: "Разбивает бандл по маршрутам приложения."
        correct: [a]
        explanation: "Tree-shaking «отряхивает» мёртвые ветки: если вы импортировали одну функцию из библиотеки, сборщик выкинет остальные неиспользуемые экспорты. Работает только при статических import/export."
      - prompt: "Что сильнее всего уменьшит стартовый JavaScript в большом одностраничном приложении?"
        choices:
          - id: a
            text: "Code-splitting по маршрутам"
          - id: b
            text: "Переименование переменных в более короткие."
          - id: c
            text: "Замена двойных кавычек на одинарные."
          - id: d
            text: "Удаление отступов из исходников."
        correct: [a]
        explanation: "Маршрутный code-splitting убирает со старта весь код экранов, куда пользователь ещё не зашёл. Косметика вроде имён переменных и отступов исчезает при минификации и на размер почти не влияет."

  - id: mt-bundle-001
    concept: main-thread
    type: predict-output
    difficulty: 2
    prompt: "Code-splitting выносит часть бандла в ленивый чанк, грузимый по требованию. Сколько килобайт JavaScript грузится на первом экране? Введите число."
    snippet: |
      bundle_kb = 800
      lazy_kb = 500
    expected:
      kind: scalar
      value: 300
    explanation: "800 − 500 = 300 КБ на старте. Оставшиеся 500 КБ подгрузятся, только когда пользователь дойдёт до соответствующего экрана - а может, и не дойдёт вовсе."
    hints:
      - "Из полного бандла вычтите то, что уехало в ленивую часть."
    variants:
      - prompt: "Code-splitting выносит часть бандла в ленивый чанк. Сколько килобайт грузится на первом экране? Введите число."
        snippet: |
          bundle_kb = 1200
          lazy_kb = 800
        expected:
          kind: scalar
          value: 400
        explanation: "1200 − 800 = 400 КБ на старте. Две трети кода отложены до момента, когда они реально понадобятся."
      - prompt: "Tree-shaking удалил 25% бандла как неиспользуемый код. Сколько килобайт осталось? Введите число."
        snippet: |
          bundle_kb = 800
          treeshake_removed = 0.25
        expected:
          kind: scalar
          value: 600
        explanation: "Осталось 75%: 800 × 0.75 = 600 КБ. Мёртвый код - частый балласт: одна тяжёлая библиотека, из которой используется пара функций, легко даёт такие проценты."

  - id: mt-longtask-001
    concept: main-thread
    type: predict-output
    difficulty: 3
    prompt: "Пока задача выполняется в главном потоке, браузер не может обработать клик. Пользователь кликнул в момент click_at_ms от начала задачи. Через сколько миллисекунд клик начнёт обрабатываться (когда задача закончится)? Введите число."
    snippet: |
      task_ms = 250
      long_task_threshold_ms = 50
      click_at_ms = 100
    expected:
      kind: scalar
      value: 150
    explanation: "Задача занимает поток целиком 250 мс. Клик пришёл на 100-й мс, значит ждать до конца: 250 − 100 = 150 мс. Задача длиннее 50 мс считается «длинной» и напрямую бьёт по INP."
    hints:
      - "Клик не обработается, пока поток занят. Сколько задаче осталось работать после момента клика?"
      - "Вычтите момент клика из полной длительности задачи."
    variants:
      - prompt: "Пользователь кликнул в момент click_at_ms от начала задачи. Через сколько миллисекунд клик начнёт обрабатываться? Введите число."
        snippet: |
          task_ms = 300
          long_task_threshold_ms = 50
          click_at_ms = 50
        expected:
          kind: scalar
          value: 250
        explanation: "300 − 50 = 250 мс задержки отклика. Одна длинная задача способна в одиночку испортить INP: пользователь ждёт четверть секунды до любой реакции."
      - prompt: "Та же работа разбита на чанки по 50 мс с уступанием потока между ними (yield). Пользователь кликнул через 10 мс после начала текущего чанка. Через сколько миллисекунд клик начнёт обрабатываться (конец чанка)? Введите число."
        snippet: |
          chunk_ms = 50
          click_at_ms = 10
        expected:
          kind: scalar
          value: 40
        explanation: "50 − 10 = 40 мс. Разбив длинную задачу на короткие чанки и уступая поток между ними, вы даёте браузеру окна для обработки ввода - задержка падает с сотен миллисекунд до десятков."

  - id: mt-layout-thrash-005
    concept: main-thread
    type: theory-quiz
    difficulty: 5
    prompt: "Цикл по 100 элементам на каждой итерации читает el.offsetHeight и тут же присваивает el.style.height. Страница подтормаживает. Почему и как чинить?"
    choices:
      - id: a
        text: "Чтение offsetHeight форсирует синхронный пересчёт layout, а запись style.height его инвалидирует"
      - id: b
        text: "offsetHeight медленно вычисляется сам по себе; достаточно кешировать его в переменную один раз."
      - id: c
        text: "Проблема в количестве элементов; цикл на 100 итераций всегда тормозит, нужно уменьшить их число."
      - id: d
        text: "style.height нельзя менять из JavaScript; нужно использовать CSS-классы, и тормоза уйдут."
    correct: [a]
    explanation: "Это layout thrashing. Запись в style.height помечает layout как «грязный». Следующее чтение offsetHeight требует актуальных размеров, поэтому браузер вынужден тут же пересчитать layout синхронно - и так 100 раз за цикл. Лекарство - разделить фазы: сначала прочитать все offsetHeight в массив, затем в отдельном проходе записать все height. Один пересчёт вместо ста. Ещё надёжнее - выполнять запись в requestAnimationFrame."
    hints:
      - "Что делает браузер, когда вы спрашиваете актуальный размер элемента сразу после того, как изменили размеры? Может ли он ответить старым значением?"
      - "Проблема - в чередовании двух видов операций. Что если сгруппировать все операции одного вида, а потом другого?"
