exercises:
  - id: crp-blocking-001
    concept: critical-rendering-path
    type: theory-quiz
    difficulty: 1
    prompt: "Какой ресурс по умолчанию блокирует первую отрисовку страницы, пока не скачается и не обработается?"
    choices:
      - id: a
        text: "Внешний CSS, подключённый в"
      - id: b
        text: "Картинка <img> в теле страницы."
      - id: c
        text: "Фоновое видео."
      - id: d
        text: "Иконка favicon."
    correct: [a]
    explanation: "CSS блокирует отрисовку: пока браузер не построит CSSOM, он не рискует показать неоформленную страницу. Картинки, видео и favicon грузятся, не задерживая первый кадр."
    hints:
      - "Спросите себя: без чего браузер откажется показывать хоть один пиксель, чтобы не мигнуть неоформленным текстом?"
    variants:
      - prompt: "Обычный <script src> без атрибутов встречен парсером в середине <body>. Что делает браузер?"
        choices:
          - id: a
            text: "Приостанавливает разбор HTML, пока скрипт скачается и выполнится."
          - id: b
            text: "Скачивает скрипт в фоне и продолжает строить страницу без пауз."
          - id: c
            text: "Откладывает скрипт до события load."
          - id: d
            text: "Игнорирует скрипт, раз он не в <head>."
        correct: [a]
        explanation: "Синхронный скрипт - parser-blocking: браузер останавливает построение DOM, потому что скрипт может дописать разметку через document.write или изменить уже разобранное."
      - prompt: "Какой из этих ресурсов НЕ задерживает первую отрисовку?"
        choices:
          - id: a
            text: "Картинка <img> в первом экране."
          - id: b
            text: "Внешний CSS в <head>."
          - id: c
            text: "Синхронный <script> в <head>."
          - id: d
            text: "Инлайновый <style> с большим набором правил."
        correct: [a]
        explanation: "Картинка не блокирует рендеринг: браузер отрисует макет, а изображение дорисует, когда оно придёт. CSS и синхронные скрипты первую отрисовку задерживают."

  - id: crp-count-001
    concept: critical-rendering-path
    type: predict-output
    difficulty: 2
    prompt: "Сколько из перечисленных ресурсов блокируют разбор HTML или первую отрисовку (render-blocking)? Введите число."
    snippet: |
      <link rel="stylesheet" href="/main.css">
      <script src="/app.js"></script>
      <img src="/hero.jpg">
      <link rel="stylesheet" href="/print.css" media="print">
    expected:
      kind: scalar
      value: 2
    explanation: "Блокируют main.css (обычный CSS) и синхронный app.js. print.css с media=print не блокирует отрисовку экрана, а картинка грузится в фоне. Итого 2."
    hints:
      - "Разделите список на три сорта: CSS для экрана, синхронные скрипты и всё остальное. Первые два блокируют, остальное - нет."
    variants:
      - prompt: "Сколько из перечисленных ресурсов блокируют разбор HTML или первую отрисовку? Введите число."
        snippet: |
          <link rel="stylesheet" href="/a.css">
          <script src="/b.js"></script>
          <link rel="stylesheet" href="/c.css">
          <script src="/d.js" defer></script>
        expected:
          kind: scalar
          value: 3
        explanation: "Блокируют a.css, синхронный b.js и c.css. Скрипт d.js с defer не блокирует: он подождёт построения DOM. Итого 3."
      - prompt: "Сколько из перечисленных ресурсов блокируют разбор HTML или первую отрисовку? Введите число."
        snippet: |
          <script src="/x.js" defer></script>
          <link rel="stylesheet" href="/y.css" media="print">
          <link rel="stylesheet" href="/z.css">
          <img src="/p.png" loading="lazy">
        expected:
          kind: scalar
          value: 1
        explanation: "Блокирует только z.css. defer-скрипт ждёт DOM, print-стили не нужны для экрана, ленивая картинка грузится позже. Итого 1."

  - id: crp-attr-001
    concept: critical-rendering-path
    type: fill-in-blanks
    difficulty: 2
    prompt: "Скрипт должен скачаться параллельно с разбором HTML, но выполниться после построения DOM и строго в порядке подключения. Впишите нужный атрибут."
    template: |
      <script src="/app.js" {{attr}}></script>
    blanks:
      attr:
        accept: ['defer', 'Defer']
    explanation: "defer снимает блокировку разбора и гарантирует выполнение после готового DOM в порядке тегов. async тоже не блокирует, но порядок не сохраняет и выполняется сразу по готовности."
    hints:
      - "Нужен атрибут, который откладывает выполнение до готового DOM и сохраняет порядок скриптов."
    variants:
      - prompt: "Скрипт независим от других и должен выполниться сразу, как только скачается, без гарантии порядка. Впишите нужный атрибут."
        template: |
          <script src="/analytics.js" {{attr}}></script>
        blanks:
          attr:
            accept: ['async', 'Async']
        explanation: "async скачивает скрипт в фоне и запускает сразу по готовности, прерывая разбор. Порядок относительно других async-скриптов не гарантирован - подходит для независимой аналитики."
      - prompt: "Стили нужны только для печати и не должны задерживать отрисовку экрана. Впишите атрибут, который это выражает."
        template: |
          <link rel="stylesheet" href="/print.css" {{attr}}="print">
        blanks:
          attr:
            accept: ['media']
        explanation: "media=print говорит браузеру, что стили применяются только при печати. Такой CSS скачивается с низким приоритетом и не блокирует первую отрисовку экрана."

  - id: crp-css-blocks-js-004
    concept: critical-rendering-path
    type: theory-quiz
    difficulty: 4
    prompt: "Синхронный <script> стоит в HTML сразу после тяжёлого внешнего CSS. Скрипт крошечный, но страница всё равно долго не отрисовывается. Почему?"
    choices:
      - id: a
        text: "Браузер не выполнит скрипт, пока не построит CSSOM"
      - id: b
        text: "Маленькие скрипты выполняются медленнее больших из-за накладных расходов на парсинг."
      - id: c
        text: "CSS всегда выполняется после JavaScript, поэтому скрипт ждёт в очереди."
      - id: d
        text: "Браузер повторно скачивает CSS для каждого скрипта на странице."
    correct: [a]
    explanation: "Скрытая зависимость: синхронный скрипт вправе спросить getComputedStyle, поэтому браузер откладывает его выполнение до готового CSSOM. Тяжёлый CSS перед скриптом задерживает и скрипт, и всё, что за ним следует в разборе. Отсюда правило: критичный CSS - в начало, скрипты - defer или в конец."
    hints:
      - "Скрипт может обратиться к вычисленным стилям элемента. Что должно быть готово, прежде чем такой вопрос имеет смысл?"
      - "Синхронный JS и построение CSSOM конкурируют за один поток. Кто кого ждёт, если скрипт стоит сразу за большим CSS?"
