exercises:
  - id: s3-key-namespace-001
    concept: s3-object-model
    type: theory-quiz
    difficulty: 1
    prompt: "Что на самом деле представляет собой слэш в ключе объекта `users/42/avatar.png`?"
    choices:
      - id: a
        text: "Обычный символ внутри строкового ключа; никаких каталогов в S3 нет, дерево рисует только консоль."
      - id: b
        text: "Разделитель реальных каталогов: `users` и `42` - это вложенные папки в файловой системе bucket."
      - id: c
        text: "Служебный символ, который S3 запрещает в ключах и заменяет на дефис."
      - id: d
        text: "Граница между bucket и key: всё до первого слэша - имя bucket."
    correct: [a]
    explanation: "Пространство имён S3 плоское. `users/42/avatar.png` - это один ключ, где слэши входят в имя как обычные символы. Веб-консоль разрезает ключи по слэшам и рисует дерево, но в хранилище ни каталогов, ни вложенности нет."
    variants:
      - prompt: "Чем адресуется объект в S3?"
        choices:
          - id: a
            text: "Парой «bucket + key»: имя контейнера плюс полное строковое имя объекта внутри него."
          - id: b
            text: "Абсолютным путём в дереве каталогов, как файл в файловой системе."
          - id: c
            text: "Числовым inode, который выдаёт хранилище при записи."
          - id: d
            text: "Только именем bucket; key хранится отдельно и для чтения не нужен."
        correct: [a]
        explanation: "Адрес любого объекта - это пара «bucket + key». Bucket - именованный контейнер, key - полное строковое имя объекта внутри него. Больше для адресации ничего не нужно."
      - prompt: "Можно ли изменить часть уже загруженного объекта, дозаписав байты в его середину?"
        choices:
          - id: a
            text: "Нет: объект пишется и читается целиком, чтобы изменить его, нужно перезалить весь объект под тем же ключом."
          - id: b
            text: "Да, S3 поддерживает частичную запись по смещению, как обычный файл как полное описание этого поведения."
          - id: c
            text: "Да, но только если объект меньше 5 ГБ, во всех сценариях без дополнительной настройки."
          - id: d
            text: "Именно да, через специальную операцию append-object без ограничений и ничего сверх этого набора."
        correct: [a]
        explanation: "Объектное хранилище пишет и читает объект целиком. Частичной записи в середину нет: чтобы изменить содержимое, объект перезаливают полностью под тем же ключом."

  - id: s3-durability-availability-001
    concept: s3-object-model
    type: theory-quiz
    difficulty: 2
    prompt: "Чем durability отличается от availability в S3?"
    choices:
      - id: a
        text: "Durability - вероятность, что объект не потеряется навсегда; availability - вероятность, что его можно прочитать прямо сейчас."
      - id: b
        text: "Это синонимы: обе цифры означают вероятность успешного чтения объекта, во всех сценариях без дополнительной настройки."
      - id: c
        text: "Именно durability - это скорость чтения, availability - скорость записи и ничего сверх этого набора."
      - id: d
        text: "Durability относится к метаданным, availability - к телу объекта, независимо от входных данных и окружения."
    correct: [a]
    explanation: "Это разные оси. Durability («11 девяток») - сохранность: объект не пропадёт из-за отказа железа. Availability (~99.99%) - доступность: сервис может на короткое время не отвечать на чтение, но данные при этом целы."
    variants:
      - prompt: "Что на практике означает заявленная durability S3 в «11 девяток» (99.999999999%)?"
        choices:
          - id: a
            text: "Объект крайне маловероятно потерять из-за отказа оборудования провайдера; от ваших собственных удалений и перезаписей это не защищает."
          - id: b
            text: "Объект гарантированно доступен на чтение 99.999999999% времени в году, независимо от входных данных и окружения."
          - id: c
            text: "S3 хранит ровно 11 копий каждого объекта в 11 разных странах; другого корректного поведения система не допускает."
          - id: d
            text: "Любой объект автоматически восстановится, даже если вы удалили его сами как полное описание этого поведения."
        correct: [a]
        explanation: "«Девятки» durability защищают от потери данных из-за отказа железа за счёт многократного копирования по зонам. От ваших собственных ошибок - удаления или перезаписи объекта - они не спасают; для этого нужно версионирование."
      - prompt: "Объект в S3 цел, но сервис на пару минут не отвечает на запросы чтения. Какая характеристика просела?"
        choices:
          - id: a
            text: "Availability: данные сохранны, но временно недоступны на чтение."
          - id: b
            text: "Durability: раз объект не читается, значит он потерян."
          - id: c
            text: "Обе сразу и в одинаковой степени."
          - id: d
            text: "Ни та, ни другая: недоступность чтения не относится к этим метрикам."
        correct: [a]
        explanation: "Объект жив - durability не пострадала. Просела именно availability: способность ответить на запрос прямо сейчас. Объект может быть сохранным, но временно недоступным - это две независимые оси."

  - id: s3-build-key-001
    concept: s3-object-model
    type: predict-output
    difficulty: 1
    prompt: "Что выведет программа? Она собирает ключ объекта из префикса и имени файла - так строят key перед загрузкой."
    snippet: |
      prefix = "users"
      user_id = 42
      filename = "avatar.png"
      key = "/".join([prefix, str(user_id), filename])
      print(key)
    expected:
      kind: stdout
      value: "users/42/avatar.png"
    hints:
      - "Слэши в ключе - обычные символы; программа просто склеивает три куска строкового имени через разделитель."
      - "`\"/\".join([a, b, c])` ставит слэш между элементами. Подставьте значения и соберите строку."
    variants:
      - snippet: |
          parts = ["logs", "2026", "06", "app.log"]
          key = "/".join(parts)
          print(key)
        expected:
          kind: stdout
          value: "logs/2026/06/app.log"
      - snippet: |
          bucket = "ozon-media"
          key = "photos/cat.jpg"
          print(f"{bucket}/{key}")
        expected:
          kind: stdout
          value: "ozon-media/photos/cat.jpg"

  - id: s3-prefix-count-001
    concept: s3-object-model
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она моделирует листинг по префиксу: в плоском списке ключей отбираются те, что начинаются на `users/`."
    snippet: |
      keys = [
          "users/1/avatar.png",
          "users/2/avatar.png",
          "logs/app.log",
          "users/2/cover.png",
      ]
      prefix = "users/"
      matched = [k for k in keys if k.startswith(prefix)]
      print(len(matched))
    expected:
      kind: stdout
      value: "3"
    hints:
      - "«Папки» в S3 - это иллюзия: листинг по префиксу - просто отбор ключей, у которых имя начинается на заданную строку. Сколько ключей начинаются на `users/`?"
      - "Пройдите по списку и отметьте каждый ключ, начинающийся на `users/`. Ключ `logs/app.log` под этот префикс не попадает."
    variants:
      - snippet: |
          keys = [
              "2026/06/a.log",
              "2026/06/b.log",
              "2026/05/c.log",
          ]
          prefix = "2026/06/"
          matched = [k for k in keys if k.startswith(prefix)]
          print(len(matched))
        expected:
          kind: stdout
          value: "2"
      - snippet: |
          keys = ["a.txt", "img/1.png", "img/2.png", "img/sub/3.png"]
          prefix = "img/"
          matched = [k for k in keys if k.startswith(prefix)]
          print(len(matched))
        expected:
          kind: stdout
          value: "3"

  - id: s3-rename-prefix-001
    concept: s3-object-model
    type: theory-quiz
    difficulty: 3
    prompt: "Почему «переименование папки» `users/` в `clients/` в S3 - дорогая и небыстрая операция, а не мгновенный сдвиг?"
    choices:
      - id: a
        text: "Каталога `users/` нет; для каждого объекта нужен copy + delete с новым ключом."
      - id: b
        text: "S3 перешифровывает все объекты при смене префикса, и это долго."
      - id: c
        text: "Переименование блокирует bucket целиком до завершения, поэтому медленное."
      - id: d
        text: "S3 запрещает слэши в новых ключах, и каждый объект пересоздают вручную."
    correct: [a]
    explanation: "Ключ - неизменяемая часть адреса, а каталога как сущности нет. Сменить ключ можно только через copy + delete. «Переименовать папку» с тысячей объектов - это тысяча копий и тысяча удалений, тогда как в файловой системе это правка одной записи в дереве."
    hints:
      - "Вспомните, что префикс `users/` не является настоящим каталогом. Если каталога-узла нет, что физически нужно сделать с каждым объектом, чтобы у него стал другой ключ?"
      - "Операции «сдвинуть объект» в S3 нет вообще. Сменить ключ можно только одним способом из двух базовых операций - какие это две?"

  - id: s3-consistency-001
    concept: s3-object-model
    type: theory-quiz
    difficulty: 4
    prompt: "Сервис записал объект через PUT и сразу же читает его тем же ключом. Что гарантирует современный AWS S3 и о чём стоит помнить с S3-совместимыми хранилищами?"
    choices:
      - id: a
        text: "AWS S3 даёт strong read-after-write: после успешного PUT любой GET видит новые данные; у MinIO и аналогов уровень задаёт их реализация."
      - id: b
        text: "S3 всегда eventually consistent: после PUT нужно ждать секунды и перечитывать, иначе вернётся старая версия."
      - id: c
        text: "Консистентность зависит от региона: в одних регионах strong, в других её нет - так устроен AWS."
      - id: d
        text: "Чтение сразу после записи в S3 всегда даёт 404, пока копии не синхронизируются между зонами."
    correct: [a]
    explanation: "С декабря 2020 года AWS S3 даёт strong read-after-write consistency: записали - и тут же читаете именно записанное, без задержки распространения. Старые советы про «eventual consistency и повторные чтения» устарели для AWS. Но S3-совместимые хранилища реализуют протокол сами, и их уровень консистентности не обязан совпадать с AWS - его проверяют по документации провайдера."
    hints:
      - "Различайте поведение самого AWS S3 после 2020 года и поведение сторонних хранилищ, которые лишь повторяют его API."
      - "Подумайте, что значит «strong read-after-write» и почему старые статьи про задержку распространения чтения уже не описывают современный AWS."
