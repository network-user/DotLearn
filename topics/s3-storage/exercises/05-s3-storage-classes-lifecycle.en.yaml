exercises:
  - id: s3-storage-classes-lifecycle-tradeoff-001
    concept: s3-storage-classes-lifecycle
    type: theory-quiz
    difficulty: 1
    prompt: "What's the core trade-off between S3 storage classes (Standard, Standard-IA, Glacier)?"
    choices:
      - id: a
        text: "The cheaper it is to keep a gigabyte per month, the more expensive and slower it is to retrieve: colder classes carry a retrieval fee and access latency."
      - id: b
        text: "Colder classes are cheaper across the board - storage, retrieval, and access speed are all better."
      - id: c
        text: "Classes only differ in write speed; reads and cost are the same."
      - id: d
        text: "The colder the class, the higher the durability and the faster the access."
    correct: [a]
    explanation: "Storage classes are a trade-off axis. Standard costs more to store, but access is instant with no read fee. The colder the class (Standard-IA, Glacier, Deep Archive), the cheaper the gigabyte-month, but the higher the retrieval fee and the longer the access takes. Cheaper to store means more expensive and slower to retrieve."
    variants:
      - prompt: "Why do Standard-IA and Glacier have a minimum storage duration (30/90/180 days)?"
        choices:
          - id: a
            text: "It's a penalty for early deletion: the object is billed as if it stayed the full minimum period, even if you deleted or overwrote it earlier."
          - id: b
            text: "The minimum duration forbids reading the object until it has sat for the required time."
          - id: c
            text: "The object is automatically deleted once the period expires."
          - id: d
            text: "The duration sets when S3 starts storing the object for free."
        correct: [a]
        explanation: "A minimum storage duration means the cold class charges for at least that period regardless. Delete an object from Standard-IA after a day, and you still pay for 30 days. That's why fresh, fast-churning data is a bad fit for a cold class: it never lives long enough to reach the minimum."
      - prompt: "Which storage class fits data that's read every day?"
        choices:
          - id: a
            text: "Standard: instant access and no retrieval fee - for hot, frequently read data."
          - id: b
            text: "Glacier Deep Archive: it's the cheapest per gigabyte, so it's good for any data."
          - id: c
            text: "Glacier Flexible Retrieval: an hours-long retrieval delay is no obstacle for daily reads."
          - id: d
            text: "One Zone-IA: the data is read often, and a single zone isn't a concern."
        correct: [a]
        explanation: "The class is chosen by read frequency. Frequently read data stays in Standard: no retrieval fee and instant access. Cold classes add a fee for every gigabyte read, so on daily reads they end up more expensive than Standard."

  - id: s3-storage-classes-lifecycle-versioning-001
    concept: s3-storage-classes-lifecycle
    type: theory-quiz
    difficulty: 2
    prompt: "How does enabling bucket versioning affect the storage bill if you don't set up any rules?"
    choices:
      - id: a
        text: "The bill creeps up unnoticed: every overwrite keeps the previous version as a separate billed object, and a delete only adds a delete marker - the versions underneath it keep being stored and billed."
      - id: b
        text: "No effect: versions are stored for free until you request a restore."
      - id: c
        text: "The bill drops: versioning compresses old versions, saving space."
      - id: d
        text: "Deleting an object with versioning on immediately frees the space of all its versions."
    correct: [a]
    explanation: "Every version is a full-fledged object, and you pay to store it. Overwrite an object a hundred times, and there are a hundred billed versions in the bucket. Deleting with versioning enabled doesn't free space: it places a delete marker on top of the object, and every version underneath keeps being billed. Without a lifecycle rule cleaning up old versions, the bill grows on its own."
    variants:
      - prompt: "What happens when you delete an object in a bucket with versioning enabled?"
        choices:
          - id: a
            text: "A delete marker is placed on top of the object; all previous versions are kept and keep being billed, and space isn't freed."
          - id: b
            text: "The object and all its versions are erased immediately and permanently."
          - id: c
            text: "Only the latest version is deleted; the rest become free."
          - id: d
            text: "Deletion is forbidden while versioning is enabled."
        correct: [a]
        explanation: "With versioning, \"deletion\" is non-destructive: S3 places a delete marker, and the object stops being returned by default, but the previous versions remain under the marker - alive and billed. To actually free space, versions are deleted explicitly or via a lifecycle rule targeting noncurrent versions."
      - prompt: "Why enable versioning at all, given the bill increase?"
        choices:
          - id: a
            text: "It's insurance against your own mistakes: durability doesn't save you from overwriting or deleting an object yourself, and the previous version stays recoverable."
          - id: b
            text: "To speed up reads: versions are cached and served faster."
          - id: c
            text: "To automatically encrypt every new version of an object."
          - id: d
            text: "So objects take up no space - old versions get deleted right away."
        correct: [a]
        explanation: "\"11 nines\" of durability protect against hardware failure, but not against your own mistakes - overwriting with garbage or an accidental delete. Versioning closes exactly that gap: the previous version is kept and can be restored. The cost of that insurance (storing versions) is kept in check with lifecycle rules."

  - id: s3-storage-classes-lifecycle-cost-001
    concept: s3-storage-classes-lifecycle
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? It computes the monthly storage bill: size in gigabytes times the price per gigabyte-month, rounded to cents."
    snippet: |
      price_per_gb = 0.023
      size_gb = 500
      cost = round(size_gb * price_per_gb, 2)
      print(cost)
    expected:
      kind: stdout
      value: "11.5"
    hints:
      - "Storage cost is linear: gigabytes multiplied by the price per gigabyte. What do you get, and how does it round to two decimal places?"
      - "500 * 0.023 = 11.5. round(11.5, 2) leaves 11.5 - there are no extra decimal digits beyond two here."
    variants:
      - snippet: |
          price_per_gb = 0.0125
          size_gb = 200
          cost = round(size_gb * price_per_gb, 2)
          print(cost)
        expected:
          kind: stdout
          value: "2.5"
      - snippet: |
          price_per_gb = 0.004
          size_gb = 1000
          cost = round(size_gb * price_per_gb, 2)
          print(cost)
        expected:
          kind: stdout
          value: "4.0"

  - id: s3-storage-classes-lifecycle-rule-001
    concept: s3-storage-classes-lifecycle
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the lifecycle rule: objects under the `logs/` prefix move to a warm class after 30 days and are deleted after a year. The rule must be enabled."
    template: |
      {
        "Status": "{{status}}",
        "Filter": { "Prefix": "logs/" },
        "Transitions": [
          { "Days": 30, "StorageClass": "{{storageclass}}" }
        ],
        "Expiration": { "Days": {{expire}} }
      }
    blanks:
      status:
        accept: ["Enabled"]
      storageclass:
        accept: ["STANDARD_IA", "Standard-IA", "STANDARD-IA"]
        accept_regex: '^"?STANDARD[_-]?IA"?$'
      expire:
        accept: ["365"]
    variants:
      - prompt: "Complete the lifecycle rule that aborts and deletes incomplete multipart uploads older than 7 days."
        template: |
          {
            "Status": "Enabled",
            "Filter": { "Prefix": "" },
            "AbortIncompleteMultipartUpload": { "DaysAfterInitiation": {{days}} }
          }
        blanks:
          days:
            accept: ["7"]
      - prompt: "Complete the lifecycle rule that deletes noncurrent object versions older than 30 days."
        template: |
          {
            "Status": "Enabled",
            "Filter": { "Prefix": "" },
            "{{action}}": { "NoncurrentDays": {{days}} }
          }
        blanks:
          action:
            accept: ["NoncurrentVersionExpiration"]
          days:
            accept: ["30"]

  - id: s3-storage-classes-lifecycle-transition-001
    concept: s3-storage-classes-lifecycle
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It models a lifecycle transition by object age: under 30 days - Standard, from 30 - Standard-IA, from 90 - Glacier."
    snippet: |
      def storage_class(age_days):
          if age_days >= 90:
              return "Glacier"
          if age_days >= 30:
              return "Standard-IA"
          return "Standard"

      print(storage_class(10))
      print(storage_class(45))
      print(storage_class(120))
    expected:
      kind: stdout
      value: "Standard\nStandard-IA\nGlacier"
    hints:
      - "Thresholds are checked top-down: coldest first (90), then warm (30), otherwise it stays hot. Which class does each age fall into?"
      - "10 days - younger than 30, so Standard; 45 - between 30 and 90, so Standard-IA; 120 - older than 90, so Glacier."
    variants:
      - snippet: |
          def storage_class(age_days):
              if age_days >= 90:
                  return "Glacier"
              if age_days >= 30:
                  return "Standard-IA"
              return "Standard"

          print(storage_class(30))
          print(storage_class(89))
        expected:
          kind: stdout
          value: "Standard-IA\nStandard-IA"
      - snippet: |
          def storage_class(age_days):
              if age_days >= 90:
                  return "Glacier"
              if age_days >= 30:
                  return "Standard-IA"
              return "Standard"

          ages = [0, 90, 365]
          print([storage_class(a) for a in ages])
        expected:
          kind: stdout
          value: "['Standard', 'Glacier', 'Glacier']"

  - id: s3-storage-classes-lifecycle-hot-cost-001
    concept: s3-storage-classes-lifecycle
    type: predict-output
    difficulty: 4
    prompt: "What does the program print? It computes a monthly bill = storage + retrieval for two classes: Standard has a zero retrieval fee, the cold class has one. Compare 100 GB read 30 times in a month, in Standard versus a cold class."
    snippet: |
      def monthly_cost(size_gb, store_price, reads, retrieval_price):
          storage = size_gb * store_price
          retrieval = size_gb * reads * retrieval_price
          return round(storage + retrieval, 2)

      print(monthly_cost(100, 0.023, 30, 0.0))
      print(monthly_cost(100, 0.004, 30, 0.01))
    expected:
      kind: stdout
      value: "2.3\n30.4"
    hints:
      - "The bill has two parts: storage (size × price) and retrieval (size × reads × retrieval price). Standard's retrieval price is zero - so what does reading add to its bill?"
      - "Standard: 100 × 0.023 = 2.3, retrieval 100 × 30 × 0.0 = 0, total 2.3. Cold: storage 100 × 0.004 = 0.4, but retrieval 100 × 30 × 0.01 = 30.0, total 30.4."
      - "Add both lines for each class and round. Notice how the cold class's cheap storage gets wiped out by the fee for frequent reads."
    variants:
      - snippet: |
          def monthly_cost(size_gb, store_price, reads, retrieval_price):
              storage = size_gb * store_price
              retrieval = size_gb * reads * retrieval_price
              return round(storage + retrieval, 2)

          print(monthly_cost(100, 0.023, 1, 0.0))
          print(monthly_cost(100, 0.004, 1, 0.01))
        expected:
          kind: stdout
          value: "2.3\n1.4"
      - snippet: |
          def monthly_cost(size_gb, store_price, reads, retrieval_price):
              storage = size_gb * store_price
              retrieval = size_gb * reads * retrieval_price
              return round(storage + retrieval, 2)

          std = monthly_cost(200, 0.023, 10, 0.0)
          cold = monthly_cost(200, 0.004, 10, 0.01)
          print(std)
          print(cold)
        expected:
          kind: stdout
          value: "4.6\n20.8"

  - id: s3-storage-classes-lifecycle-pick-class-001
    concept: s3-storage-classes-lifecycle
    type: theory-quiz
    difficulty: 4
    prompt: "Database backups are written once a day, kept for 7 years for compliance, and read only in a major outage - i.e. almost never; restoration can tolerate a wait of a few hours. Which storage class and lifecycle action fit best here?"
    choices:
      - id: a
        text: "Glacier Flexible Retrieval or Deep Archive: the data is cold, read extremely rarely, an hours-long retrieval delay is acceptable, and the low storage price pays off over years; a lifecycle rule sets expiration at 7 years."
      - id: b
        text: "Standard: backups are critical, so they should sit in the most expensive class with instant access, and never be deleted."
      - id: c
        text: "One Zone-IA: backups can live in a single zone, since they're easy to recreate from the source database."
      - id: d
        text: "Standard-IA with no lifecycle at all: the data is read occasionally, and 7 years of retention is easier to control manually."
    correct: [a]
    explanation: "The data profile is a cold archive: written once a day, read almost never, an hours-long delay is acceptable. That's exactly the case for Glacier Flexible Retrieval or Deep Archive, where storage is cheapest and slow, rare retrieval isn't a problem. The retention period (7 years) is set with a lifecycle rule on expiration, so old backups delete automatically. Standard would overpay for instant access that isn't needed here; One Zone-IA risks losing the backup if the zone goes down (and a backup is the last line of defense - duplicating across zones matters most there); manual tracking of a 7-year period is unreliable compared to lifecycle."
    hints:
      - "Reduce the data profile to two numbers: how often it's read and how urgently it's needed. Which rung of the class ladder was built for that profile?"
      - "Since reads are almost never and an hours-long delay is fine, paying extra for instant access isn't needed. And which of the three lifecycle actions makes the 7-year retention enforce itself?"
