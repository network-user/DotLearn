exercises:
  - id: s3-presigned-what-001
    concept: s3-presigned-urls
    type: theory-quiz
    difficulty: 1
    prompt: "What is a presigned URL for S3?"
    choices:
      - id: a
        text: "An object address with a cryptographic signature granting temporary access to a single operation"
      - id: b
        text: "A command that makes an object publicly accessible forever for every request path in the app."
      - id: c
        text: "A link with your access key and secret embedded in plain text for every request path in the app."
      - id: d
        text: "An internal object identifier that S3 uses to store it on disk for every request path in the app."
    correct: [a]
    explanation: "A presigned URL is just a regular HTTPS object address plus signed query parameters, where the signature is computed from your keys, the bucket name, the key, the operation, and the expiration. A client hits S3 directly through it, but only within what's permitted. The secret is never embedded in the link - only the signature is. The access keys themselves never end up in the link."
    variants:
      - prompt: "Who signs a presigned URL, and who uses it?"
        choices:
          - id: a
            text: "The backend, which holds the access keys, signs it; the client, which has no keys, uses the link."
          - id: b
            text: "The client signs it with its own keys, and the backend only forwards the result."
          - id: c
            text: "S3 does both the signing and the usage without the backend's involvement."
          - id: d
            text: "The user's browser signs it based on the session cookie."
        correct: [a]
        explanation: "The signature is computed by whoever holds the secret key - the backend. The client receives the ready-made link and simply hits S3 with it. If the client had to sign it, the secret would leak to the client - that would be the wrong scheme."
      - prompt: "Does a presigned URL work if the bucket is private and Block Public Access is on?"
        choices:
          - id: a
            text: "Yes: access comes from the signature on a specific operation and key, not from the bucket being open"
          - id: b
            text: "No: a presigned URL requires the bucket to be public; the system does not allow any other correct behavior."
          - id: c
            text: "No: Block Public Access disables every form of object access; the system does not allow any other correct behavior."
          - id: d
            text: "Yes, but only if the object is additionally marked public-read; the system does not allow any other correct behavior."
        correct: [a]
        explanation: "A presigned URL doesn't make the object public. Access is granted by a signature for one operation and one key, so it works with a private bucket and with Block Public Access enabled. For everyone without the signed link, the object stays inaccessible. The object stays private to everyone without the link."

  - id: s3-presigned-purpose-001
    concept: s3-presigned-urls
    type: theory-quiz
    difficulty: 2
    prompt: "Why hand the client a presigned URL instead of proxying the file through the backend?"
    choices:
      - id: a
        text: "To remove the backend from the data path: the server cheaply signs the link, while S3 takes on the heavy download/upload traffic."
      - id: b
        text: "To encrypt the object - a presigned URL encrypts the content in transit for any payload and any deploy target."
      - id: c
        text: "To speed up S3 itself: it processes signed requests faster than regular ones as a complete account of that behavior."
      - id: d
        text: "To make the object permanently accessible without ever hitting the backend as a complete account of that behavior."
    correct: [a]
    explanation: "Without a presigned URL, the server relays every byte of the file through itself, spending bandwidth on data it never processes. With a presigned URL it only does the cheap signing (no file body), and traffic flows directly between client and S3. On large files this removes the server's bandwidth as the bottleneck."
    variants:
      - prompt: "What's the advantage of `generate_presigned_post` with a `content-length-range` condition over a presigned PUT for uploading from a browser form?"
        choices:
          - id: a
            text: "The condition lets you cap the uploaded file's size in advance; S3 rejects a request that's out of range on its own side."
          - id: b
            text: "presigned POST encrypts the file, presigned PUT doesn't; the system does not allow any other correct behavior."
          - id: c
            text: "presigned POST has no expiration, which makes it more convenient as a complete account of that behavior."
          - id: d
            text: "presigned POST lets the client pick any object key it wants, - that is how the API contract should be read."
        correct: [a]
        explanation: "`generate_presigned_post` returns a URL and fields for an HTML form and accepts `Conditions`. The `content-length-range` condition limits the body size: the client physically can't upload a file outside the range, and S3 rejects a non-matching request. A presigned PUT has no way to limit size like that."

  - id: s3-presigned-expiry-001
    concept: s3-presigned-urls
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? It models checking a presigned URL's expiration: the link is created at moment 0 with a 300 s lifetime, and access is checked at moments 100 and 400."
    snippet: |
      created = 0
      expires_in = 300
      deadline = created + expires_in

      def is_valid(now):
          return now < deadline

      print(is_valid(100))
      print(is_valid(400))
    expected:
      kind: stdout
      value: "True\nFalse"
    hints:
      - "The link is valid as long as the current moment hasn't reached the deadline (creation plus lifetime). Up to what moment is it valid?"
      - "The deadline is 0 + 300 = 300. At moment 100 the link is still valid; at moment 400 the lifetime has already expired."
    variants:
      - snippet: |
          created = 1000
          expires_in = 600
          deadline = created + expires_in

          def is_valid(now):
              return now < deadline

          print(is_valid(1500))
          print(is_valid(1700))
        expected:
          kind: stdout
          value: "True\nFalse"
      - snippet: |
          created = 0
          expires_in = 60
          deadline = created + expires_in

          def is_valid(now):
              return now < deadline

          print(is_valid(60))
        expected:
          kind: stdout
          value: "False"

  - id: s3-presigned-fill-001
    concept: s3-presigned-urls
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the call that issues a temporary download link for an object, valid for 5 minutes."
    template: |
      url = client.generate_presigned_url(
          "{{operation}}",
          Params={"Bucket": "ozon-media", "Key": "receipts/42.pdf"},
          {{expires}}=300,
      )
    blanks:
      operation:
        accept: ["get_object"]
      expires:
        accept: ["ExpiresIn"]
    variants:
      - prompt: "Complete the call that issues a link for the client to upload an object directly."
        template: |
          url = client.generate_presigned_url(
              "{{operation}}",
              Params={"Bucket": "ozon-media", "Key": "uploads/42/avatar.png"},
              ExpiresIn=600,
          )
        blanks:
          operation:
            accept: ["put_object"]
      - prompt: "Complete the call that returns a URL and fields for uploading from an HTML form."
        template: |
          data = client.{{method}}(
              Bucket="ozon-media",
              Key="uploads/42/avatar.png",
              ExpiresIn=600,
          )
          form_url = data["url"]
          form_fields = data["{{fieldskey}}"]
        blanks:
          method:
            accept: ["generate_presigned_post"]
          fieldskey:
            accept: ["fields"]

  - id: s3-presigned-conditions-001
    concept: s3-presigned-urls
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It checks a presigned POST `content-length-range` condition: the body size must fall between 0 and 5,000,000 bytes."
    snippet: |
      lo, hi = 0, 5_000_000

      def accepted(size):
          return lo <= size <= hi

      print(accepted(1_048_576))
      print(accepted(6_000_000))
      print(accepted(0))
    expected:
      kind: stdout
      value: "True\nFalse\nTrue"
    hints:
      - "The condition defines an allowed size range. Which of the three values fall inside it, and which one exceeds the upper bound?"
      - "1 MB (1_048_576) is inside the range; 6_000_000 exceeds the upper bound of 5_000_000; 0 equals the lower bound and is also allowed."
    variants:
      - snippet: |
          lo, hi = 1024, 10_000_000

          def accepted(size):
              return lo <= size <= hi

          print(accepted(512))
          print(accepted(2048))
        expected:
          kind: stdout
          value: "False\nTrue"
      - snippet: |
          lo, hi = 0, 5_000_000

          def accepted(size):
              return lo <= size <= hi

          print(accepted(5_000_000))
          print(accepted(5_000_001))
        expected:
          kind: stdout
          value: "True\nFalse"

  - id: s3-presigned-leak-001
    concept: s3-presigned-urls
    type: theory-quiz
    difficulty: 4
    prompt: "A download presigned URL leaked into a proxy's access logs 30 seconds after it was issued. The link's lifetime is 1 hour. Why is this dangerous, and why can't you revoke just that one link?"
    choices:
      - id: a
        text: "Until the hour is up, anyone can download via the leaked link: the link is self-contained and checking it requires no registration, so you can't kill a single link"
      - id: b
        text: "There's no danger: S3 binds the link to the IP it was issued to, and nobody else can use it; the system does not allow any other correct behavior."
      - id: c
        text: "The link stops working right after the first download, so a leak is harmless; the system does not allow any other correct behavior. No other reading is required."
      - id: d
        text: "Just click \"revoke\" on that specific link in the S3 console and access is closed; the system does not allow any other correct behavior. No other reading is required."
    correct: [a]
    explanation: "A presigned URL carries everything needed for access, and S3 checks the signature statelessly - without a database lookup and without any prior registration of the link. That's why you can't revoke a single link: until it expires, whoever has it can use it. The only way to kill all of them at once is rotating or disabling the key that signed them. Hence the rule: keep the lifetime as short as sufficient, since it's the attack window itself. Only rotating the key, which breaks every signature."
    hints:
      - "Think about what S3 needs to verify a presigned URL: does it look something up about the link's state, or does it compute everything straight from the request?"
      - "Since verification requires no link registration, there's no \"list of issued links\" to revoke from. So what can you actually do to kill access, and at what cost?"

  - id: s3-presigned-expiry-window-001
    concept: s3-presigned-urls
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It compares the danger window of two links: how many seconds each stays valid after leaking at moment 30 from creation."
    snippet: |
      def remaining(expires_in, leaked_at):
          left = expires_in - leaked_at
          return left if left > 0 else 0

      print(remaining(60, 30))
      print(remaining(3600, 30))
    expected:
      kind: stdout
      value: "30\n3570"
    hints:
      - "After a leak, a link is dangerous for exactly as long as it has left to live. How do you get the remainder from the lifetime and the leak moment?"
      - "A short link (60 s) leaked at second 30 is dangerous for another 30 s; an hour-long one (3600 s) for another 3570 s. A long lifetime inflates the attack window."
    variants:
      - snippet: |
          def remaining(expires_in, leaked_at):
              left = expires_in - leaked_at
              return left if left > 0 else 0

          print(remaining(300, 100))
          print(remaining(300, 500))
        expected:
          kind: stdout
          value: "200\n0"
      - snippet: |
          def remaining(expires_in, leaked_at):
              left = expires_in - leaked_at
              return left if left > 0 else 0

          print(remaining(86400, 30))
        expected:
          kind: stdout
          value: "86370"
