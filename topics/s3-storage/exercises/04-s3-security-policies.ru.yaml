exercises:
  - id: s3-deny-wins-001
    concept: s3-security-policies
    type: theory-quiz
    difficulty: 1
    prompt: "На один и тот же запрос одна политика даёт явный Allow, другая - явный Deny. Что произойдёт?"
    choices:
      - id: a
        text: "Запрос будет отклонён: явный Deny перевешивает любые разрешения."
      - id: b
        text: "Запрос пройдёт: Allow и Deny взаимно гасятся, остаётся доступ по умолчанию."
      - id: c
        text: "Сработает то правило, которое создано позже по времени."
      - id: d
        text: "Запрос пройдёт: Allow всегда сильнее Deny."
    correct: [a]
    explanation: "В логике вычисления доступа явный Deny - это вето: если хоть одно правило явно запрещает операцию, она отклоняется независимо от числа разрешений. Разрешение лишь снимает запрет по умолчанию, но не перебивает явный запрет."
    variants:
      - prompt: "Каков доступ к объекту по умолчанию, если ни одно правило его явно не разрешает и не запрещает?"
        choices:
          - id: a
            text: "Доступа нет: по умолчанию всё неявно запрещено, нужно хотя бы одно явное разрешение."
          - id: b
            text: "Доступ есть: пока нет явного Deny, объект доступен всем как полное описание этого поведения."
          - id: c
            text: "Доступ есть только для чтения, запись запрещена по умолчанию."
          - id: d
            text: "Поведение случайно и зависит от региона как полное описание этого поведения."
        correct: [a]
        explanation: "S3 исходит из «запрещено по умолчанию»: без хотя бы одного явного Allow запрос отклоняется. Поэтому новый bucket приватен - разрешения на нём ещё никто не выдал."
      - prompt: "Чем различаются IAM-политика и bucket policy по тому, к чему они привязаны?"
        choices:
          - id: a
            text: "IAM-политика привязана к субъекту (пользователь, роль) и говорит, что ему можно; bucket policy привязана к самому bucket и говорит, кому можно его трогать."
          - id: b
            text: "IAM-политика привязана к объекту, а bucket policy - к отдельному ключу, во всех сценариях без дополнительной настройки."
          - id: c
            text: "IAM-политика работает только на чтение, bucket policy - только на запись, независимо от входных данных и окружения."
          - id: d
            text: "Это два названия одного и того же документа; другого корректного поведения система не допускает. Иной интерпретации не требуется."
        correct: [a]
        explanation: "IAM-политика (identity-based) висит на личности и перечисляет, что субъекту разрешено над ресурсами. Bucket policy (resource-based) висит на ресурсе и говорит, кому можно его трогать; она же умеет адресовать чужие аккаунты и ставить условия вроде IP и TLS."

  - id: s3-acl-legacy-001
    concept: s3-security-policies
    type: theory-quiz
    difficulty: 2
    prompt: "Почему современная практика советует отключать ACL и управлять доступом политиками?"
    choices:
      - id: a
        text: "ACL умеет мало, плохо масштабируется и легко создаёт случайную публичность; на новых bucket по умолчанию владелец"
      - id: b
        text: "ACL шифрует данные слабее, чем политики, поэтому небезопасен, независимо от входных данных и окружения."
      - id: c
        text: "ACL медленнее политик и замедляет каждый запрос к объекту как полное описание этого поведения."
      - id: d
        text: "ACL запрещён законом и больше не поддерживается ни одним провайдером как полное описание этого поведения."
    correct: [a]
    explanation: "ACL - исторически первый механизм с несколькими фиксированными уровнями доступа; он плохо масштабируется и стоял за громкими утечками из случайно открытых bucket. AWS рекомендует управлять доступом политиками; новые bucket по умолчанию используют Bucket owner enforced, при котором ACL не действуют. Встретили `acl=\"public-read\"` - гайд устарел. Владелец bucket, а ACL не действуют."
    variants:
      - prompt: "Что делает Block Public Access?"
        choices:
          - id: a
            text: "Перекрывает любую попытку анонимного публичного доступа к объектам, даже если политика или ACL это разрешает; presigned URL и авторизованным субъектам он не мешает."
          - id: b
            text: "Шифрует все объекты bucket случайным ключом; другого корректного поведения система не допускает. Иной интерпретации не требуется."
          - id: c
            text: "Блокирует доступ к bucket вообще для всех, включая владельца; другого корректного поведения система не допускает."
          - id: d
            text: "Удаляет публичные объекты из bucket раз в сутки; другого корректного поведения система не допускает. Иной интерпретации не требуется."
        correct: [a]
        explanation: "Block Public Access - предохранитель поверх всех механизмов: он отсекает именно анонимный публичный доступ, ловя ошибку конфигурации до того, как она станет утечкой. При этом presigned URL и доступ авторизованных субъектов продолжают работать, поэтому его держат включённым почти всегда."
      - prompt: "Сервису нужно лишь класть чеки в префикс `receipts/`. Какая политика соответствует принципу наименьших привилегий?"
        choices:
          - id: a
            text: "Allow s3:PutObject на ресурс `receipts/*` - ровно нужное действие на нужный префикс."
          - id: b
            text: "Allow s3:* на весь bucket - чтобы не возвращаться к настройке."
          - id: c
            text: "Набор allow на все bucket аккаунта, ведь сервис доверенный считают исчерпывающим ответом."
          - id: d
            text: "Deny s3:PutObject на `receipts/*`, остальное по умолчанию как полное описание этого поведения."
        correct: [a]
        explanation: "Наименьшие привилегии - выдать ровно то, что нужно задаче: `s3:PutObject` на `receipts/*`. Широкое `s3:*` на весь bucket превратило бы утечку ключа из мелкой в катастрофу. Вариант с Deny вообще запретил бы нужную операцию."

  - id: s3-policy-eval-001
    concept: s3-security-policies
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она реализует логику вычисления доступа S3: явный Deny - вето, иначе нужен хотя бы один Allow, иначе запрет по умолчанию."
    snippet: |
      def evaluate(allow, deny):
          if deny:
              return "deny"
          if allow:
              return "allow"
          return "deny"

      print(evaluate(True, True))
      print(evaluate(True, False))
      print(evaluate(False, False))
    expected:
      kind: stdout
      value: "deny\nallow\ndeny"
    hints:
      - "Порядок важен: сначала проверяется явный запрет, потом разрешение, потом срабатывает запрет по умолчанию. Какая ветка отработает для каждой пары?"
      - "(Allow + Deny) -> Deny побеждает. (Allow без Deny) -> allow. (ни того, ни другого) -> запрет по умолчанию."
    variants:
      - snippet: |
          def evaluate(allow, deny):
              if deny:
                  return "deny"
              if allow:
                  return "allow"
              return "deny"

          print(evaluate(False, True))
          print(evaluate(True, False))
        expected:
          kind: stdout
          value: "deny\nallow"
      - snippet: |
          def evaluate(allow, deny):
              if deny:
                  return "deny"
              if allow:
                  return "allow"
              return "deny"

          rules = [(True, False), (True, True), (False, False)]
          print([evaluate(a, d) for a, d in rules])
        expected:
          kind: stdout
          value: "['allow', 'deny', 'deny']"

  - id: s3-secure-transport-001
    concept: s3-security-policies
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите bucket policy, которая запрещает любой запрос не по TLS. Эффект и условие - ключевые."
    template: |
      {
        "Effect": "{{effect}}",
        "Action": "s3:*",
        "Resource": "arn:aws:s3:::ozon-media/*",
        "Condition": {
          "Bool": { "aws:SecureTransport": "{{flag}}" }
        }
      }
    blanks:
      effect:
        accept: ["Deny"]
      flag:
        accept: ['"false"', "false", "'false'"]
        accept_regex: '^"?false"?$'
    variants:
      - prompt: "Допишите statement, разрешающий только загрузку объектов в префикс `receipts/` (наименьшие привилегии)."
        template: |
          {
            "Effect": "Allow",
            "Action": ["{{action}}"],
            "Resource": "arn:aws:s3:::ozon-media/{{resource}}"
          }
        blanks:
          action:
            accept: ["s3:PutObject"]
          resource:
            accept: ["receipts/*"]
      - prompt: "Допишите statement, который явным запретом перекрывает удаление объектов всем."
        template: |
          {
            "Effect": "{{effect}}",
            "Action": ["s3:{{action}}"],
            "Resource": "arn:aws:s3:::ozon-media/*"
          }
        blanks:
          effect:
            accept: ["Deny"]
          action:
            accept: ["DeleteObject"]

  - id: s3-encryption-axes-001
    concept: s3-security-policies
    type: theory-quiz
    difficulty: 3
    prompt: "Чем шифрование в покое (SSE) отличается от шифрования в транзите (TLS) и заменяет ли любое из них контроль доступа?"
    choices:
      - id: a
        text: "SSE шифрует данные на дисках S3, TLS - соединение в пути; это разные оси, и ни одна не отвечает на вопрос «кому можно читать» - доступ всё равно раздают политики."
      - id: b
        text: "Это синонимы: TLS и есть способ шифрования объектов в покое; другого корректного поведения система не допускает."
      - id: c
        text: "SSE заменяет политики: зашифрованный объект автоматически доступен только владельцу ключа и больше никому, если смотреть только на самый верхний слой."
      - id: d
        text: "TLS шифрует объект на диске, а SSE - сетевое соединение; другого корректного поведения система не допускает."
    correct: [a]
    explanation: "Шифрование в покое (SSE-S3/KMS/C) защищает байты на дисках провайдера; шифрование в транзите (TLS) - байты в пути по сети. Это независимые гарантии, и обе не отвечают на вопрос доступа: расшифровку S3 делает прозрачно для любого, кому доступ разрешён. Кто вообще может читать - решают политики, это третья, отдельная ось."
    hints:
      - "Разведите три вопроса: в каком виде данные лежат, в каком виде едут по сети, и кому вообще позволено к ним обращаться. За какой из них отвечает SSE, за какой TLS?"
      - "Если объект зашифрован в покое, но субъекту разрешён GetObject, S3 расшифрует его прозрачно. Значит, шифрование решает другую задачу, чем контроль доступа."

  - id: s3-eval-multi-001
    concept: s3-security-policies
    type: predict-output
    difficulty: 4
    prompt: "Что выведет программа? Она объединяет несколько источников правил: доступ разрешён, только если есть хотя бы один Allow и ни одного Deny."
    snippet: |
      def decide(statements):
          if any(s == "Deny" for s in statements):
              return "deny"
          if any(s == "Allow" for s in statements):
              return "allow"
          return "deny"

      print(decide(["Allow", "Allow"]))
      print(decide(["Allow", "Deny", "Allow"]))
      print(decide([]))
    expected:
      kind: stdout
      value: "allow\ndeny\ndeny"
    hints:
      - "«Разрешено» набирается из любого источника, «запрещено» - это вето одного. Сначала проверяется наличие любого Deny во всём наборе, потом наличие любого Allow."
      - "Первый набор: только Allow -> allow. Второй: среди разрешений есть Deny -> вето, deny. Третий: пустой набор -> нечему разрешать, запрет по умолчанию."
      - "any(..) истинно, если хоть один элемент подходит. Примените это сначала к Deny, затем к Allow, затем верните дефолтный запрет."
    variants:
      - snippet: |
          def decide(statements):
              if any(s == "Deny" for s in statements):
                  return "deny"
              if any(s == "Allow" for s in statements):
                  return "allow"
              return "deny"

          print(decide(["Allow"]))
          print(decide(["Deny"]))
        expected:
          kind: stdout
          value: "allow\ndeny"
      - snippet: |
          def decide(statements):
              if any(s == "Deny" for s in statements):
                  return "deny"
              if any(s == "Allow" for s in statements):
                  return "allow"
              return "deny"

          sets = [["Allow", "Allow", "Allow"], ["Allow", "Deny"]]
          print([decide(s) for s in sets])
        expected:
          kind: stdout
          value: "['allow', 'deny']"
