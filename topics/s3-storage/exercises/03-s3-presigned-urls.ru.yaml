exercises:
  - id: s3-presigned-what-001
    concept: s3-presigned-urls
    type: theory-quiz
    difficulty: 1
    prompt: "Что такое presigned URL для S3?"
    choices:
      - id: a
        text: "Адрес объекта с криптографической подписью, дающий временный доступ к одной операции; сами ключи доступа в ссылку не попадают."
      - id: b
        text: "Команда, которая делает объект публичным для всех навсегда - полный набор ролей в этой архитектуре."
      - id: c
        text: "Ссылка, в которую встроены ваш ключ и секрет доступа в открытом виде как три обязательные части системы."
      - id: d
        text: "Именно внутренний идентификатор объекта, по которому S3 хранит его на диске и ничего сверх этого набора."
    correct: [a]
    explanation: "Presigned URL - это обычный HTTPS-адрес объекта плюс параметры с подписью, вычисленной из ваших ключей, имени bucket, ключа, операции и срока. По нему клиент обращается к S3 напрямую, но только в рамках разрешённого. Секрет в ссылку не кладётся - в ней лежит лишь подпись."
    variants:
      - prompt: "Кто подписывает presigned URL и кто по нему ходит?"
        choices:
          - id: a
            text: "Подписывает бэкенд, у которого есть ключи доступа; ходит по ссылке клиент, у которого ключей нет."
          - id: b
            text: "Подписывает клиент своими ключами, а бэкенд только пересылает результат как полное описание этого поведения."
          - id: c
            text: "И подпись, и использование выполняет S3 без участия бэкенда как полное описание этого поведения."
          - id: d
            text: "Подписывает браузер пользователя на основе cookie сессии как полное описание этого поведения."
        correct: [a]
        explanation: "Подпись вычисляет та сторона, у которой есть секретный ключ, - бэкенд. Клиент получает готовую ссылку и просто обращается по ней к S3. Если бы подписывать пришлось клиенту, секрет утёк бы на клиент - это была бы неверная схема."
      - prompt: "Работает ли presigned URL, если bucket приватный и включён Block Public Access?"
        choices:
          - id: a
            text: "Да: доступ даёт подпись на конкретную операцию и ключ, а не открытость bucket; объект остаётся приватным для всех без ссылки."
          - id: b
            text: "Именно нет: presigned URL требует, чтобы bucket был публичным и ничего сверх этого набора как полное описание этого поведения."
          - id: c
            text: "Нет: Block Public Access отключает любые формы доступа к объектам, независимо от входных данных и окружения."
          - id: d
            text: "Да, но только если объект дополнительно помечен как public-read; другого корректного поведения система не допускает."
        correct: [a]
        explanation: "Presigned URL не публикует объект. Доступ предоставляет подпись на одну операцию и один ключ, поэтому он работает с приватным bucket и при включённом Block Public Access. Для всех, у кого подписанной ссылки нет, объект остаётся недоступным."

  - id: s3-presigned-purpose-001
    concept: s3-presigned-urls
    type: theory-quiz
    difficulty: 2
    prompt: "Зачем выдавать клиенту presigned URL вместо того, чтобы проксировать файл через бэкенд?"
    choices:
      - id: a
        text: "Чтобы убрать бэкенд из пути данных: сервер дёшево подписывает ссылку, а тяжёлый трафик скачивания/загрузки берёт на себя S3."
      - id: b
        text: "Чтобы зашифровать объект - presigned URL шифрует содержимое при передаче, независимо от входных данных и окружения."
      - id: c
        text: "Чтобы ускорить сам S3: подписанные запросы он обрабатывает быстрее обычных как полное описание этого поведения."
      - id: d
        text: "Чтобы навсегда сделать объект доступным без обращения к бэкенду как полное описание этого поведения."
    correct: [a]
    explanation: "Без presigned URL сервер перекачивает через себя каждый байт файла, тратя канал на данные, которые не обрабатывает. С presigned URL он выполняет лишь дешёвую подпись (без тела файла), а трафик идёт напрямую между клиентом и S3. На больших файлах это снимает узкое место с канала сервера."
    variants:
      - prompt: "В чём преимущество `generate_presigned_post` с условием `content-length-range` над presigned PUT для загрузки из браузерной формы?"
        choices:
          - id: a
            text: "Условие позволяет заранее ограничить размер загружаемого файла; S3 отвергнет запрос, не уложившийся в диапазон, ещё на своей стороне."
          - id: b
            text: "presigned POST шифрует файл, а presigned PUT - нет; другого корректного поведения система не допускает."
          - id: c
            text: "presigned POST не имеет срока жизни, поэтому удобнее при буквальном чтении этого вызова."
          - id: d
            text: "presigned POST позволяет клиенту самому выбрать любой ключ объекта при буквальном чтении этого вызова."
        correct: [a]
        explanation: "`generate_presigned_post` возвращает URL и поля для HTML-формы и принимает `Conditions`. Условие `content-length-range` ограничивает размер тела: клиент физически не сможет залить файл вне диапазона, S3 отклонит несоответствующий запрос. presigned PUT так ограничить размер не умеет."

  - id: s3-presigned-expiry-001
    concept: s3-presigned-urls
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Она моделирует проверку срока presigned URL: ссылка создана в момент 0 со сроком 300 с, проверяем доступ в моменты 100 и 400."
    snippet: |
      created = 0
      expires_in = 300
      deadline = created + expires_in

      def is_valid(now):
          return now < deadline

      print(is_valid(100))
      print(is_valid(400))
    expected:
      kind: stdout
      value: "True\nFalse"
    hints:
      - "Ссылка действует, пока текущий момент не достиг дедлайна (создание плюс срок). До какого момента она валидна?"
      - "Дедлайн равен 0 + 300 = 300. В момент 100 ссылка ещё валидна, в момент 400 - срок уже вышел."
    variants:
      - snippet: |
          created = 1000
          expires_in = 600
          deadline = created + expires_in

          def is_valid(now):
              return now < deadline

          print(is_valid(1500))
          print(is_valid(1700))
        expected:
          kind: stdout
          value: "True\nFalse"
      - snippet: |
          created = 0
          expires_in = 60
          deadline = created + expires_in

          def is_valid(now):
              return now < deadline

          print(is_valid(60))
        expected:
          kind: stdout
          value: "False"

  - id: s3-presigned-fill-001
    concept: s3-presigned-urls
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите вызов, выдающий временную ссылку на скачивание объекта сроком на 5 минут."
    template: |
      url = client.generate_presigned_url(
          "{{operation}}",
          Params={"Bucket": "ozon-media", "Key": "receipts/42.pdf"},
          {{expires}}=300,
      )
    blanks:
      operation:
        accept: ["get_object"]
      expires:
        accept: ["ExpiresIn"]
    variants:
      - prompt: "Допишите вызов, выдающий ссылку на прямую загрузку объекта клиентом."
        template: |
          url = client.generate_presigned_url(
              "{{operation}}",
              Params={"Bucket": "ozon-media", "Key": "uploads/42/avatar.png"},
              ExpiresIn=600,
          )
        blanks:
          operation:
            accept: ["put_object"]
      - prompt: "Допишите вызов, возвращающий URL и поля для загрузки из HTML-формы."
        template: |
          data = client.{{method}}(
              Bucket="ozon-media",
              Key="uploads/42/avatar.png",
              ExpiresIn=600,
          )
          form_url = data["url"]
          form_fields = data["{{fieldskey}}"]
        blanks:
          method:
            accept: ["generate_presigned_post"]
          fieldskey:
            accept: ["fields"]

  - id: s3-presigned-conditions-001
    concept: s3-presigned-urls
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она проверяет условие presigned POST `content-length-range`: размер тела должен попасть в диапазон от 0 до 5_000_000 байт."
    snippet: |
      lo, hi = 0, 5_000_000

      def accepted(size):
          return lo <= size <= hi

      print(accepted(1_048_576))
      print(accepted(6_000_000))
      print(accepted(0))
    expected:
      kind: stdout
      value: "True\nFalse\nTrue"
    hints:
      - "Условие задаёт допустимый диапазон размера тела. Какие из трёх значений в него попадают, а какое выходит за верхнюю границу?"
      - "1 МБ (1_048_576) внутри диапазона; 6_000_000 больше верхней границы 5_000_000; 0 равен нижней границе и тоже допустим."
    variants:
      - snippet: |
          lo, hi = 1024, 10_000_000

          def accepted(size):
              return lo <= size <= hi

          print(accepted(512))
          print(accepted(2048))
        expected:
          kind: stdout
          value: "False\nTrue"
      - snippet: |
          lo, hi = 0, 5_000_000

          def accepted(size):
              return lo <= size <= hi

          print(accepted(5_000_000))
          print(accepted(5_000_001))
        expected:
          kind: stdout
          value: "True\nFalse"

  - id: s3-presigned-leak-001
    concept: s3-presigned-urls
    type: theory-quiz
    difficulty: 4
    prompt: "Presigned URL на скачивание утёк в access-логи прокси через 30 секунд после выдачи. Срок ссылки - 1 час. Чем это опасно и почему отозвать одну ссылку нельзя?"
    choices:
      - id: a
        text: "До конца часа по утёкшей ссылке может качать кто угодно: ссылка самодостаточна, её проверка не требует регистрации, поэтому погасить одну ссылку нельзя"
      - id: b
        text: "Опасности нет: S3 привязывает ссылку к IP того, кому она выдана, и чужой её не использует; другого корректного поведения система не допускает."
      - id: c
        text: "Ссылка перестаёт работать сразу после первого скачивания, поэтому утечка безвредна; другого корректного поведения система не допускает."
      - id: d
        text: "Достаточно нажать «отозвать» у этой конкретной ссылки в консоли S3, и доступ закроется; другого корректного поведения система не допускает."
    correct: [a]
    explanation: "Presigned URL несёт в себе всё для доступа, и S3 проверяет подпись без состояния - без обращения к базе и без предварительной регистрации ссылки. Поэтому отозвать одну ссылку нельзя: пока не вышел срок, по ней работает любой, кому она попала. Разом погасить можно лишь сменой/отключением ключа, которым подписаны все ссылки. Отсюда правило: срок держат минимально достаточным, ведь он и есть окно атаки. Только сменить ключ, что обрушит все подписи."
    hints:
      - "Подумайте, что нужно S3, чтобы проверить presigned URL: обращается ли он куда-то за состоянием ссылки или считает всё прямо из запроса?"
      - "Раз проверка не требует регистрации ссылки, то и «списка выданных ссылок» для отзыва не существует. Что тогда вообще можно сделать, чтобы погасить доступ, и какой ценой?"

  - id: s3-presigned-expiry-window-001
    concept: s3-presigned-urls
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она сравнивает окно опасности двух ссылок: насчитывает, сколько секунд каждая остаётся валидной после утечки в момент 30 от создания."
    snippet: |
      def remaining(expires_in, leaked_at):
          left = expires_in - leaked_at
          return left if left > 0 else 0

      print(remaining(60, 30))
      print(remaining(3600, 30))
    expected:
      kind: stdout
      value: "30\n3570"
    hints:
      - "После утечки ссылка опасна ровно столько, сколько ей осталось жить. Как из срока жизни и момента утечки получить остаток?"
      - "Короткая ссылка (60 с) после утечки на 30-й секунде опасна ещё 30 с; часовая (3600 с) - ещё 3570 с. Длинный срок раздувает окно атаки."
    variants:
      - snippet: |
          def remaining(expires_in, leaked_at):
              left = expires_in - leaked_at
              return left if left > 0 else 0

          print(remaining(300, 100))
          print(remaining(300, 500))
        expected:
          kind: stdout
          value: "200\n0"
      - snippet: |
          def remaining(expires_in, leaked_at):
              left = expires_in - leaked_at
              return left if left > 0 else 0

          print(remaining(86400, 30))
        expected:
          kind: stdout
          value: "86370"
