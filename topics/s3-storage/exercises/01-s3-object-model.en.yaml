exercises:
  - id: s3-key-namespace-001
    concept: s3-object-model
    type: theory-quiz
    difficulty: 1
    prompt: "What does the slash in the object key `users/42/avatar.png` actually represent?"
    choices:
      - id: a
        text: "Just an ordinary character inside the string key; S3 has no real directories - the console only draws a tree."
      - id: b
        text: "A separator for real directories: `users` and `42` are nested folders in the bucket's file system."
      - id: c
        text: "A reserved character that S3 forbids in keys and replaces with a hyphen."
      - id: d
        text: "The boundary between bucket and key: everything before the first slash is the bucket name."
    correct: [a]
    explanation: "S3's namespace is flat. `users/42/avatar.png` is a single key where slashes are just ordinary characters in the name. The web console splits keys on slashes to draw a tree, but the storage itself has no directories or nesting."
    variants:
      - prompt: "How is an object addressed in S3?"
        choices:
          - id: a
            text: "By the pair \"bucket + key\": the container name plus the object's full string name inside it."
          - id: b
            text: "By an absolute path in a directory tree, like a file in a file system."
          - id: c
            text: "By a numeric inode assigned by storage on write."
          - id: d
            text: "By the bucket name alone; the key is stored separately and isn't needed to read."
        correct: [a]
        explanation: "Any object's address is the pair \"bucket + key\". The bucket is a named container, the key is the object's full string name inside it. Nothing else is needed for addressing."
      - prompt: "Can you change part of an already-uploaded object by writing bytes into the middle of it?"
        choices:
          - id: a
            text: "No: an object is written and read as a whole; to change it you must re-upload the entire object under the same key."
          - id: b
            text: "Yes, S3 supports partial writes by offset, like a regular file."
          - id: c
            text: "Yes, but only if the object is smaller than 5 GB."
          - id: d
            text: "Yes, via a dedicated append-object operation with no limits."
        correct: [a]
        explanation: "Object storage writes and reads an object as a whole. There is no partial write into the middle: to change the contents, the object is re-uploaded in full under the same key."

  - id: s3-durability-availability-001
    concept: s3-object-model
    type: theory-quiz
    difficulty: 2
    prompt: "How does durability differ from availability in S3?"
    choices:
      - id: a
        text: "Durability is the probability an object is never permanently lost; availability is the probability it can be read right now."
      - id: b
        text: "They're synonyms: both figures mean the probability of a successful read."
      - id: c
        text: "Durability is read speed, availability is write speed."
      - id: d
        text: "Durability applies to metadata, availability to the object body."
    correct: [a]
    explanation: "These are different axes. Durability (\"11 nines\") is about preservation: the object won't disappear due to hardware failure. Availability (~99.99%) is about accessibility: the service may briefly fail to answer reads even though the data is intact."
    variants:
      - prompt: "What does S3's stated durability of \"11 nines\" (99.999999999%) mean in practice?"
        choices:
          - id: a
            text: "It is extremely unlikely to lose an object to the provider's hardware failure; it does not protect against your own deletions or overwrites."
          - id: b
            text: "An object is guaranteed readable 99.999999999% of the time each year."
          - id: c
            text: "S3 keeps exactly 11 copies of every object in 11 different countries."
          - id: d
            text: "Any object automatically recovers, even if you deleted it yourself."
        correct: [a]
        explanation: "Durability \"nines\" protect against data loss from the provider's hardware failure through repeated copying across zones. They don't save you from your own mistakes - deleting or overwriting an object - versioning is needed for that."
      - prompt: "An object in S3 is intact, but the service doesn't respond to read requests for a couple of minutes. Which property dropped?"
        choices:
          - id: a
            text: "Availability: the data is safe but temporarily unreadable."
          - id: b
            text: "Durability: if the object can't be read, it must be lost."
          - id: c
            text: "Both, equally."
          - id: d
            text: "Neither: read unavailability isn't covered by these metrics."
        correct: [a]
        explanation: "The object is alive - durability wasn't affected. Availability dropped: the ability to answer a request right now. An object can be safe yet temporarily unavailable - these are two independent axes."

  - id: s3-build-key-001
    concept: s3-object-model
    type: predict-output
    difficulty: 1
    prompt: "What does the program print? It builds an object key from a prefix and a filename - this is how a key is constructed before upload."
    snippet: |
      prefix = "users"
      user_id = 42
      filename = "avatar.png"
      key = "/".join([prefix, str(user_id), filename])
      print(key)
    expected:
      kind: stdout
      value: "users/42/avatar.png"
    hints:
      - "Slashes in the key are ordinary characters; the program just joins three pieces of the string name with a separator."
      - "`\"/\".join([a, b, c])` puts a slash between elements. Substitute the values and build the string."
    variants:
      - snippet: |
          parts = ["logs", "2026", "06", "app.log"]
          key = "/".join(parts)
          print(key)
        expected:
          kind: stdout
          value: "logs/2026/06/app.log"
      - snippet: |
          bucket = "ozon-media"
          key = "photos/cat.jpg"
          print(f"{bucket}/{key}")
        expected:
          kind: stdout
          value: "ozon-media/photos/cat.jpg"

  - id: s3-prefix-count-001
    concept: s3-object-model
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It models listing by prefix: from a flat list of keys, it selects the ones starting with `users/`."
    snippet: |
      keys = [
          "users/1/avatar.png",
          "users/2/avatar.png",
          "logs/app.log",
          "users/2/cover.png",
      ]
      prefix = "users/"
      matched = [k for k in keys if k.startswith(prefix)]
      print(len(matched))
    expected:
      kind: stdout
      value: "3"
    hints:
      - "\"Folders\" in S3 are an illusion: listing by prefix is just picking keys whose name starts with a given string. How many keys start with `users/`?"
      - "Walk through the list and mark each key starting with `users/`. The key `logs/app.log` doesn't match this prefix."
    variants:
      - snippet: |
          keys = [
              "2026/06/a.log",
              "2026/06/b.log",
              "2026/05/c.log",
          ]
          prefix = "2026/06/"
          matched = [k for k in keys if k.startswith(prefix)]
          print(len(matched))
        expected:
          kind: stdout
          value: "2"
      - snippet: |
          keys = ["a.txt", "img/1.png", "img/2.png", "img/sub/3.png"]
          prefix = "img/"
          matched = [k for k in keys if k.startswith(prefix)]
          print(len(matched))
        expected:
          kind: stdout
          value: "3"

  - id: s3-rename-prefix-001
    concept: s3-object-model
    type: theory-quiz
    difficulty: 3
    prompt: "Why is \"renaming a folder\" `users/` to `clients/` in S3 an expensive, slow operation rather than an instant move?"
    choices:
      - id: a
        text: "There is no `users/` directory; for every object under that prefix you must create a copy with the new key and delete the old one - a copy + delete per object."
      - id: b
        text: "S3 re-encrypts every object when the prefix changes, and that takes time."
      - id: c
        text: "A rename locks the whole bucket until it completes, which is why it's considered slow."
      - id: d
        text: "S3 forbids slashes in new keys, so every object has to be recreated manually."
    correct: [a]
    explanation: "The key is an immutable part of the address, and there's no such thing as a directory entity. The only way to change a key is copy + delete. \"Renaming a folder\" with a thousand objects means a thousand copies and a thousand deletes, whereas in a file system it's a single tree-entry edit."
    hints:
      - "Remember that the prefix `users/` isn't a real directory. If there's no directory node, what physically has to happen to each object for it to get a different key?"
      - "There is no \"move object\" operation in S3 at all. A key can only be changed through one combination of the two basic operations - which two?"

  - id: s3-consistency-001
    concept: s3-object-model
    type: theory-quiz
    difficulty: 4
    prompt: "A service writes an object via PUT and immediately reads it back by the same key. What does modern AWS S3 guarantee, and what should you keep in mind with S3-compatible storage?"
    choices:
      - id: a
        text: "AWS S3 gives strong read-after-write: right after a successful PUT, any GET sees the new data; for MinIO, Yandex Object Storage and others, the consistency level depends on their implementation and must be checked separately."
      - id: b
        text: "S3 is always eventually consistent: after a PUT you need to wait a few seconds and re-read, or you'll get the old version."
      - id: c
        text: "Consistency depends on the region: some regions are strong, others aren't, and that's AWS's intended behavior."
      - id: d
        text: "A read right after a write in S3 always returns 404 until copies sync across zones."
    correct: [a]
    explanation: "Since December 2020, AWS S3 provides strong read-after-write consistency: you write, and the very next read returns exactly what was written, with no propagation delay. Old advice about \"eventual consistency and repeated reads\" is outdated for AWS. But S3-compatible storage implements the protocol on its own, and its consistency level doesn't have to match AWS - check the provider's documentation."
    hints:
      - "Distinguish between AWS S3's own behavior since 2020 and the behavior of third-party storage that merely mimics its API."
      - "Think about what \"strong read-after-write\" means and why old articles about read propagation delay no longer describe modern AWS."
