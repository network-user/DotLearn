exercises:
  - id: s3-storage-classes-lifecycle-tradeoff-001
    concept: s3-storage-classes-lifecycle
    type: theory-quiz
    difficulty: 1
    prompt: "В чём состоит основной компромисс между классами хранения S3 (Standard, Standard-IA, Glacier)?"
    choices:
      - id: a
        text: "Чем дешевле держать гигабайт в месяц, тем дороже и дольше его доставать: у холодных классов есть плата за извлечение и задержка доступа."
      - id: b
        text: "Холодные классы дешевле во всём сразу - и хранение, и извлечение, и скорость доступа у них лучше."
      - id: c
        text: "Классы различаются только скоростью записи; читаются и стоят одинаково."
      - id: d
        text: "Чем холоднее класс, тем выше durability и тем быстрее доступ к данным."
    correct: [a]
    explanation: "Классы хранения - это ось компромисса. Standard дороже за хранение, но доступ мгновенный и без платы за чтение. Чем холоднее класс (Standard-IA, Glacier, Deep Archive), тем дешевле гигабайт-месяц, но тем выше плата за извлечение и дольше доступ. Дешевле хранить - дороже и дольше доставать."
    variants:
      - prompt: "Зачем у Standard-IA и Glacier есть минимальный срок хранения (30/90/180 дней)?"
        choices:
          - id: a
            text: "Это плата за раннее удаление: объект тарифицируется как пролежавший весь минимальный срок, даже если вы удалили или перезаписали его раньше."
          - id: b
            text: "Минимальный срок запрещает читать объект, пока он не пролежит положенное время."
          - id: c
            text: "По истечении срока объект автоматически удаляется из bucket."
          - id: d
            text: "Срок задаёт, через сколько дней S3 начнёт хранить объект бесплатно."
        correct: [a]
        explanation: "Минимальный срок хранения означает, что холодный класс берёт плату как минимум за этот период. Удалили объект из Standard-IA через день - заплатите всё равно за 30 дней. Поэтому свежие, быстро сменяемые данные в холодном классе невыгодны: они не доживают до минимального срока."
      - prompt: "Какой класс хранения уместен для данных, которые читают каждый день?"
        choices:
          - id: a
            text: "Standard: мгновенный доступ и никакой платы за извлечение - для горячих, часто читаемых данных."
          - id: b
            text: "Glacier Deep Archive: он дешевле всех за гигабайт, значит выгоден для любых данных."
          - id: c
            text: "Glacier Flexible Retrieval: задержка извлечения в часы для ежедневного чтения не помеха."
          - id: d
            text: "One Zone-IA: данные читают часто, а одна зона не страшна."
        correct: [a]
        explanation: "Класс выбирают по частоте чтения. Часто читаемое держат в Standard: у него нет платы за извлечение, и доступ мгновенный. Холодные классы добавляют плату за каждый прочитанный гигабайт, поэтому на ежедневном чтении они выходят дороже Standard."

  - id: s3-storage-classes-lifecycle-versioning-001
    concept: s3-storage-classes-lifecycle
    type: theory-quiz
    difficulty: 2
    prompt: "Как включённое версионирование bucket влияет на счёт за хранение, если не настроить никаких правил?"
    choices:
      - id: a
        text: "Счёт растёт незаметно: каждая перезапись сохраняет прежнюю версию как отдельный платный объект, а удаление лишь ставит delete marker - версии под ним продолжают храниться и тарифицироваться."
      - id: b
        text: "Никак: версии хранятся бесплатно, пока вы не запросите их восстановление."
      - id: c
        text: "Счёт падает: версионирование сжимает старые версии, экономя место."
      - id: d
        text: "Удаление объекта при версионировании сразу освобождает место от всех его версий."
    correct: [a]
    explanation: "Каждая версия - полноценный объект, и за её хранение платят. Перезаписали объект сто раз - в bucket сто платных версий. Удаление при версионировании не освобождает место: оно ставит delete marker поверх объекта, а все версии под ним продолжают тарифицироваться. Без lifecycle-правила, чистящего старые версии, счёт растёт сам по себе."
    variants:
      - prompt: "Что происходит при удалении объекта в bucket с включённым версионированием?"
        choices:
          - id: a
            text: "Поверх объекта ставится delete marker; все прежние версии сохраняются и продолжают тарифицироваться, место не освобождается."
          - id: b
            text: "Объект и все его версии стираются немедленно и навсегда."
          - id: c
            text: "Удаляется только последняя версия, остальные становятся бесплатными."
          - id: d
            text: "Удаление запрещено, пока версионирование включено."
        correct: [a]
        explanation: "При версионировании «удаление» неразрушающее: S3 кладёт delete marker, и объект перестаёт отдаваться по умолчанию, но прежние версии остаются под маркером - живые и платные. Чтобы реально освободить место, версии удаляют явно или через lifecycle-правило на неактуальные версии."
      - prompt: "Зачем вообще включают версионирование, несмотря на рост счёта?"
        choices:
          - id: a
            text: "Это страховка от собственных ошибок: durability не спасает от того, что вы сами перезаписали или удалили объект, а прежняя версия остаётся доступной."
          - id: b
            text: "Чтобы ускорить чтение: версии кэшируются и отдаются быстрее."
          - id: c
            text: "Чтобы автоматически шифровать каждую новую версию объекта."
          - id: d
            text: "Чтобы объекты не занимали место - старые версии удаляются сразу."
        correct: [a]
        explanation: "«11 девяток» durability защищают от отказа железа, но не от ваших ошибок - перезаписи мусором или случайного удаления. Версионирование закрывает именно эту брешь: прежняя версия сохраняется и её можно восстановить. Цену этой страховки (хранение версий) держат под контролем lifecycle-правилами."

  - id: s3-storage-classes-lifecycle-cost-001
    concept: s3-storage-classes-lifecycle
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Она считает месячную плату за хранение: размер в гигабайтах умножается на цену за гигабайт-месяц и округляется до копеек."
    snippet: |
      price_per_gb = 0.023
      size_gb = 500
      cost = round(size_gb * price_per_gb, 2)
      print(cost)
    expected:
      kind: stdout
      value: "11.5"
    hints:
      - "Плата за хранение линейна: гигабайты умножаются на цену гигабайта. Сколько получится и как это округлится до двух знаков?"
      - "500 * 0.023 = 11.5. round(11.5, 2) оставляет 11.5 - дробных знаков сверх двух тут нет."
    variants:
      - snippet: |
          price_per_gb = 0.0125
          size_gb = 200
          cost = round(size_gb * price_per_gb, 2)
          print(cost)
        expected:
          kind: stdout
          value: "2.5"
      - snippet: |
          price_per_gb = 0.004
          size_gb = 1000
          cost = round(size_gb * price_per_gb, 2)
          print(cost)
        expected:
          kind: stdout
          value: "4.0"

  - id: s3-storage-classes-lifecycle-rule-001
    concept: s3-storage-classes-lifecycle
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите lifecycle-правило: объекты под префиксом `logs/` через 30 дней переходят в тёплый класс, а через год удаляются. Правило должно быть включено."
    template: |
      {
        "Status": "{{status}}",
        "Filter": { "Prefix": "logs/" },
        "Transitions": [
          { "Days": 30, "StorageClass": "{{storageclass}}" }
        ],
        "Expiration": { "Days": {{expire}} }
      }
    blanks:
      status:
        accept: ["Enabled"]
      storageclass:
        accept: ["STANDARD_IA", "Standard-IA", "STANDARD-IA"]
        accept_regex: '^"?STANDARD[_-]?IA"?$'
      expire:
        accept: ["365"]
    variants:
      - prompt: "Допишите lifecycle-правило, которое прерывает и удаляет незавершённые multipart-загрузки старше 7 дней."
        template: |
          {
            "Status": "Enabled",
            "Filter": { "Prefix": "" },
            "AbortIncompleteMultipartUpload": { "DaysAfterInitiation": {{days}} }
          }
        blanks:
          days:
            accept: ["7"]
      - prompt: "Допишите lifecycle-правило, которое удаляет неактуальные версии объектов старше 30 дней."
        template: |
          {
            "Status": "Enabled",
            "Filter": { "Prefix": "" },
            "{{action}}": { "NoncurrentDays": {{days}} }
          }
        blanks:
          action:
            accept: ["NoncurrentVersionExpiration"]
          days:
            accept: ["30"]

  - id: s3-storage-classes-lifecycle-transition-001
    concept: s3-storage-classes-lifecycle
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она моделирует lifecycle-переход по возрасту объекта: до 30 дней - Standard, с 30 - Standard-IA, с 90 - Glacier."
    snippet: |
      def storage_class(age_days):
          if age_days >= 90:
              return "Glacier"
          if age_days >= 30:
              return "Standard-IA"
          return "Standard"

      print(storage_class(10))
      print(storage_class(45))
      print(storage_class(120))
    expected:
      kind: stdout
      value: "Standard\nStandard-IA\nGlacier"
    hints:
      - "Пороги проверяются сверху вниз: сперва самый холодный (90), затем тёплый (30), иначе остаётся горячий. В какой класс попадёт объект каждого возраста?"
      - "10 дней - моложе 30, значит Standard; 45 - между 30 и 90, значит Standard-IA; 120 - старше 90, значит Glacier."
    variants:
      - snippet: |
          def storage_class(age_days):
              if age_days >= 90:
                  return "Glacier"
              if age_days >= 30:
                  return "Standard-IA"
              return "Standard"

          print(storage_class(30))
          print(storage_class(89))
        expected:
          kind: stdout
          value: "Standard-IA\nStandard-IA"
      - snippet: |
          def storage_class(age_days):
              if age_days >= 90:
                  return "Glacier"
              if age_days >= 30:
                  return "Standard-IA"
              return "Standard"

          ages = [0, 90, 365]
          print([storage_class(a) for a in ages])
        expected:
          kind: stdout
          value: "['Standard', 'Glacier', 'Glacier']"

  - id: s3-storage-classes-lifecycle-hot-cost-001
    concept: s3-storage-classes-lifecycle
    type: predict-output
    difficulty: 4
    prompt: "Что выведет программа? Она считает месячный счёт = хранение + извлечение для двух классов: у Standard плата за извлечение нулевая, у холодного - есть. Сравните 100 ГБ, прочитанных 30 раз за месяц, в Standard и в холодном классе."
    snippet: |
      def monthly_cost(size_gb, store_price, reads, retrieval_price):
          storage = size_gb * store_price
          retrieval = size_gb * reads * retrieval_price
          return round(storage + retrieval, 2)

      print(monthly_cost(100, 0.023, 30, 0.0))
      print(monthly_cost(100, 0.004, 30, 0.01))
    expected:
      kind: stdout
      value: "2.3\n30.4"
    hints:
      - "Счёт складывается из двух частей: хранение (размер × цена) и извлечение (размер × число чтений × цена извлечения). У Standard цена извлечения нулевая - что тогда добавит к его счёту чтение?"
      - "Standard: 100 × 0.023 = 2.3, извлечение 100 × 30 × 0.0 = 0, итого 2.3. Холодный: хранение 100 × 0.004 = 0.4, но извлечение 100 × 30 × 0.01 = 30.0, итого 30.4."
      - "Сложите обе строки для каждого класса и округлите. Обратите внимание, как дешёвое хранение холодного класса перечёркивается платой за частые чтения."
    variants:
      - snippet: |
          def monthly_cost(size_gb, store_price, reads, retrieval_price):
              storage = size_gb * store_price
              retrieval = size_gb * reads * retrieval_price
              return round(storage + retrieval, 2)

          print(monthly_cost(100, 0.023, 1, 0.0))
          print(monthly_cost(100, 0.004, 1, 0.01))
        expected:
          kind: stdout
          value: "2.3\n1.4"
      - snippet: |
          def monthly_cost(size_gb, store_price, reads, retrieval_price):
              storage = size_gb * store_price
              retrieval = size_gb * reads * retrieval_price
              return round(storage + retrieval, 2)

          std = monthly_cost(200, 0.023, 10, 0.0)
          cold = monthly_cost(200, 0.004, 10, 0.01)
          print(std)
          print(cold)
        expected:
          kind: stdout
          value: "4.6\n20.8"

  - id: s3-storage-classes-lifecycle-pick-class-001
    concept: s3-storage-classes-lifecycle
    type: theory-quiz
    difficulty: 4
    prompt: "Бэкапы базы данных пишут раз в сутки, держат 7 лет ради регуляторики и читают разве что при крупной аварии - то есть почти никогда; восстановление допустимо ждать несколько часов. Какой класс хранения и какое lifecycle-действие тут уместнее всего?"
    choices:
      - id: a
        text: "Glacier Flexible Retrieval или Deep Archive: данные холодные, читаются крайне редко, задержка извлечения в часы допустима, а низкая цена хранения окупается за годы; lifecycle-правилом задают expiration через 7 лет."
      - id: b
        text: "Standard: бэкапы критичны, значит должны лежать в самом дорогом классе с мгновенным доступом, а удалять их нельзя никогда."
      - id: c
        text: "One Zone-IA: бэкапы можно хранить в одной зоне, ведь их легко пересоздать из исходной базы."
      - id: d
        text: "Standard-IA без всякого lifecycle: данные читают изредка, а 7 лет хранения проще контролировать вручную."
    correct: [a]
    explanation: "Профиль данных - холодный архив: пишут раз в сутки, читают почти никогда, задержка в часы приемлема. Это ровно случай Glacier Flexible Retrieval или Deep Archive, где хранение дешевле всего, а редкое медленное извлечение не мешает. Срок хранения (7 лет) задают lifecycle-правилом на expiration, чтобы старые бэкапы удалялись автоматически. Standard переплачивал бы за мгновенный доступ, который тут не нужен; One Zone-IA рискует потерей бэкапа при падении зоны (а бэкап - последняя линия обороны, дублировать зоны как раз важно); ручной контроль 7 лет ненадёжен против lifecycle."
    hints:
      - "Сведите профиль данных к двум числам: как часто их читают и насколько срочно они нужны. Под такой профиль какая ступень лестницы классов создана?"
      - "Раз чтение почти никогда и задержка в часы допустима, переплата за мгновенный доступ не нужна. А чтобы 7-летний срок соблюдался сам, какое из трёх lifecycle-действий это делает?"
