exercises:
  - id: s3-deny-wins-001
    concept: s3-security-policies
    type: theory-quiz
    difficulty: 1
    prompt: "For the same request, one policy gives an explicit Allow, another gives an explicit Deny. What happens?"
    choices:
      - id: a
        text: "The request is denied: an explicit Deny overrides any grants."
      - id: b
        text: "The request goes through: Allow and Deny cancel each other out, leaving default access."
      - id: c
        text: "Whichever rule was created later wins."
      - id: d
        text: "The request goes through: Allow always beats Deny."
    correct: [a]
    explanation: "In the access-evaluation logic, an explicit Deny is a veto: if even one rule explicitly forbids the operation, it's denied regardless of how many grants exist. A grant only lifts the default denial, but it never overrides an explicit deny."
    variants:
      - prompt: "What's the default access to an object if no rule explicitly allows or denies it?"
        choices:
          - id: a
            text: "No access: everything is implicitly denied by default; at least one explicit allow is required."
          - id: b
            text: "Access is granted: as long as there's no explicit Deny, the object is open to everyone."
          - id: c
            text: "Read-only access; writes are denied by default."
          - id: d
            text: "Behavior is random and depends on the region."
        correct: [a]
        explanation: "S3 defaults to \"denied unless allowed\": without at least one explicit Allow, the request is rejected. That's why a new bucket is private - no one has granted any permissions on it yet."
      - prompt: "How do an IAM policy and a bucket policy differ in what they attach to?"
        choices:
          - id: a
            text: "An IAM policy attaches to a subject (user, role) and says what they can do; a bucket policy attaches to the bucket itself and says who can touch it."
          - id: b
            text: "An IAM policy attaches to the object, and a bucket policy attaches to an individual key."
          - id: c
            text: "An IAM policy only works for reads, a bucket policy only for writes."
          - id: d
            text: "They're two names for the same document."
        correct: [a]
        explanation: "An IAM policy (identity-based) hangs off an identity and lists what that subject may do to resources. A bucket policy (resource-based) hangs off the resource and says who may touch it; it can also target other accounts and set conditions like IP and TLS."

  - id: s3-acl-legacy-001
    concept: s3-security-policies
    type: theory-quiz
    difficulty: 2
    prompt: "Why does modern practice recommend disabling ACLs and managing access through policies?"
    choices:
      - id: a
        text: "ACLs can do little, scale poorly, and easily create accidental public exposure; on new buckets the owner is the bucket owner by default, and ACLs have no effect."
      - id: b
        text: "ACLs encrypt data more weakly than policies, making them insecure."
      - id: c
        text: "ACLs are slower than policies and slow down every request to an object."
      - id: d
        text: "ACLs are outlawed and no longer supported by any provider."
    correct: [a]
    explanation: "ACLs are the historically first mechanism, with a few fixed access levels; they scale poorly and were behind several high-profile leaks from accidentally opened buckets. AWS recommends managing access with policies; new buckets default to Bucket owner enforced, under which ACLs have no effect. Seeing `acl=\"public-read\"` in a guide is a sign the guide is outdated."
    variants:
      - prompt: "What does Block Public Access do?"
        choices:
          - id: a
            text: "It blocks any attempt at anonymous public access to objects, even if a policy or ACL would allow it; it doesn't interfere with presigned URLs or authorized subjects."
          - id: b
            text: "It encrypts every object in the bucket with a random key."
          - id: c
            text: "It blocks access to the bucket entirely, including for the owner."
          - id: d
            text: "It deletes public objects from the bucket once a day."
        correct: [a]
        explanation: "Block Public Access is a safety switch layered over all the other mechanisms: it specifically cuts off anonymous public access, catching a misconfiguration before it becomes a leak. Presigned URLs and access for authorized subjects keep working, which is why it's kept enabled almost always."
      - prompt: "A service only needs to put receipts into the `receipts/` prefix. Which policy fits the principle of least privilege?"
        choices:
          - id: a
            text: "Allow s3:PutObject on the resource `receipts/*` - exactly the needed action on the needed prefix."
          - id: b
            text: "Allow s3:* on the whole bucket - so you don't have to revisit the config."
          - id: c
            text: "Allow on every bucket in the account, since the service is trusted."
          - id: d
            text: "Deny s3:PutObject on `receipts/*`, everything else by default."
        correct: [a]
        explanation: "Least privilege means granting exactly what the task needs: `s3:PutObject` on `receipts/*`. A broad `s3:*` on the whole bucket would turn a leaked key from a minor incident into a catastrophe. The Deny option would forbid the very operation that's needed."

  - id: s3-policy-eval-001
    concept: s3-security-policies
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It implements S3's access-evaluation logic: an explicit Deny is a veto, otherwise at least one Allow is required, otherwise it's denied by default."
    snippet: |
      def evaluate(allow, deny):
          if deny:
              return "deny"
          if allow:
              return "allow"
          return "deny"

      print(evaluate(True, True))
      print(evaluate(True, False))
      print(evaluate(False, False))
    expected:
      kind: stdout
      value: "deny\nallow\ndeny"
    hints:
      - "Order matters: first the explicit deny is checked, then the allow, then the default denial kicks in. Which branch fires for each pair?"
      - "(Allow + Deny) -> Deny wins. (Allow without Deny) -> allow. (neither) -> default denial."
    variants:
      - snippet: |
          def evaluate(allow, deny):
              if deny:
                  return "deny"
              if allow:
                  return "allow"
              return "deny"

          print(evaluate(False, True))
          print(evaluate(True, False))
        expected:
          kind: stdout
          value: "deny\nallow"
      - snippet: |
          def evaluate(allow, deny):
              if deny:
                  return "deny"
              if allow:
                  return "allow"
              return "deny"

          rules = [(True, False), (True, True), (False, False)]
          print([evaluate(a, d) for a, d in rules])
        expected:
          kind: stdout
          value: "['allow', 'deny', 'deny']"

  - id: s3-secure-transport-001
    concept: s3-security-policies
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the bucket policy that denies any request not over TLS. The effect and condition are key."
    template: |
      {
        "Effect": "{{effect}}",
        "Action": "s3:*",
        "Resource": "arn:aws:s3:::ozon-media/*",
        "Condition": {
          "Bool": { "aws:SecureTransport": "{{flag}}" }
        }
      }
    blanks:
      effect:
        accept: ["Deny"]
      flag:
        accept: ['"false"', "false", "'false'"]
        accept_regex: '^"?false"?$'
    variants:
      - prompt: "Complete the statement that allows only uploading objects into the `receipts/` prefix (least privilege)."
        template: |
          {
            "Effect": "Allow",
            "Action": ["{{action}}"],
            "Resource": "arn:aws:s3:::ozon-media/{{resource}}"
          }
        blanks:
          action:
            accept: ["s3:PutObject"]
          resource:
            accept: ["receipts/*"]
      - prompt: "Complete the statement that explicitly denies deleting objects for everyone."
        template: |
          {
            "Effect": "{{effect}}",
            "Action": ["s3:{{action}}"],
            "Resource": "arn:aws:s3:::ozon-media/*"
          }
        blanks:
          effect:
            accept: ["Deny"]
          action:
            accept: ["DeleteObject"]

  - id: s3-encryption-axes-001
    concept: s3-security-policies
    type: theory-quiz
    difficulty: 3
    prompt: "How does encryption at rest (SSE) differ from encryption in transit (TLS), and does either one replace access control?"
    choices:
      - id: a
        text: "SSE encrypts data on S3's disks, TLS encrypts the connection in flight; these are different axes, and neither answers \"who's allowed to read\" - access is still granted by policies."
      - id: b
        text: "They're synonyms: TLS is just the way objects are encrypted at rest."
      - id: c
        text: "SSE replaces policies: an encrypted object automatically becomes accessible only to the key's owner and no one else."
      - id: d
        text: "TLS encrypts the object on disk, and SSE encrypts the network connection."
    correct: [a]
    explanation: "Encryption at rest (SSE-S3/KMS/C) protects the bytes on the provider's disks; encryption in transit (TLS) protects the bytes on the wire. These are independent guarantees, and neither answers the access question: S3 decrypts transparently for anyone who's allowed access. Who's allowed to read at all is decided by policies - a third, separate axis."
    hints:
      - "Separate three questions: what form the data is stored in, what form it travels over the network in, and who's allowed to touch it at all. Which one does SSE cover, and which does TLS cover?"
      - "If an object is encrypted at rest but a subject is granted GetObject, S3 decrypts it transparently. So encryption solves a different problem than access control."

  - id: s3-eval-multi-001
    concept: s3-security-policies
    type: predict-output
    difficulty: 4
    prompt: "What does the program print? It combines rules from several sources: access is allowed only if there's at least one Allow and no Deny."
    snippet: |
      def decide(statements):
          if any(s == "Deny" for s in statements):
              return "deny"
          if any(s == "Allow" for s in statements):
              return "allow"
          return "deny"

      print(decide(["Allow", "Allow"]))
      print(decide(["Allow", "Deny", "Allow"]))
      print(decide([]))
    expected:
      kind: stdout
      value: "allow\ndeny\ndeny"
    hints:
      - "\"Allowed\" is built up from any source, \"denied\" is a veto from just one. First it checks whether any Deny exists anywhere in the set, then whether any Allow exists."
      - "First set: only Allow -> allow. Second: there's a Deny among the grants -> veto, deny. Third: empty set -> nothing to allow, default denial."
      - "any(...) is true if at least one element matches. Apply it first to Deny, then to Allow, then return the default denial."
    variants:
      - snippet: |
          def decide(statements):
              if any(s == "Deny" for s in statements):
                  return "deny"
              if any(s == "Allow" for s in statements):
                  return "allow"
              return "deny"

          print(decide(["Allow"]))
          print(decide(["Deny"]))
        expected:
          kind: stdout
          value: "allow\ndeny"
      - snippet: |
          def decide(statements):
              if any(s == "Deny" for s in statements):
                  return "deny"
              if any(s == "Allow" for s in statements):
                  return "allow"
              return "deny"

          sets = [["Allow", "Allow", "Allow"], ["Allow", "Deny"]]
          print([decide(s) for s in sets])
        expected:
          kind: stdout
          value: "['allow', 'deny']"
