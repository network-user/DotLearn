conceptId: s3-security-policies
cards:
  - id: s3-security-policies-01
    front: "По какому алгоритму S3 выносит вердикт о доступе к объекту?"
    back: "По умолчанию доступа нет (всё неявно запрещено). Сначала проверяется явный Deny: если он есть в любом механизме, запрос отклоняется. Иначе ищется явный Allow; без него - запрет по умолчанию. Deny - это вето."
    tags: [s3]
  - id: s3-security-policies-02
    front: "Почему разрешающее IAM-право может проиграть запрещающему правилу, которое его не упоминает?"
    back: "Явный Deny стоит раньше в порядке вычисления и перечёркивает любые Allow независимо от них. Resource-based правило «запретить всё не из корпоративной сети» добавляет Deny, который перевешивает IAM-право для внешнего трафика."
    tags: [s3]
  - id: s3-security-policies-03
    front: "Чем IAM-политика (identity-based) отличается от bucket policy (resource-based)?"
    back: "IAM-политика привязана к субъекту (пользователь, роль, группа) и отвечает «что ему можно». Bucket policy привязана к ресурсу и отвечает «кому можно его трогать»; она может пускать чужие аккаунты и задавать условия по запросу (IP, TLS)."
    tags: [s3]
  - id: s3-security-policies-04
    front: "Что такое ACL в S3 и почему его сегодня сторонятся?"
    back: "ACL (access control list) - исторически первый механизм, список «кому что можно» прямо на bucket или объекте. Он умеет мало, плохо масштабируется и легко создаёт случайную публичность - именно ACL стоял за громкими утечками."
    tags: [s3]
  - id: s3-security-policies-05
    front: "Как современный S3 относится к ACL на новых bucket?"
    back: "Рекомендация однозначна: управлять доступом политиками, а ACL отключить. На новых bucket по умолчанию включён Object Ownership = Bucket owner enforced, при котором ACL не действуют. acl='public-read' в гайде - сигнал, что гайд устарел."
    tags: [s3]
  - id: s3-security-policies-06
    front: "Что делает Block Public Access и мешает ли он presigned URL?"
    back: "Это предохранитель поверх всех механизмов: он перекрывает любую попытку сделать объекты публичными, даже если политика или ACL это разрешает. Анонимный публичный доступ он блокирует, а presigned URL и доступ авторизованных субъектов - нет."
    tags: [s3]
  - id: s3-security-policies-07
    front: "В чём суть принципа наименьших привилегий применительно к S3?"
    back: "Выдавать ровно столько, сколько нужно для задачи, и ни каплей больше. Сервису, кладущему чеки в один префикс, нужен s3:PutObject на receipts/*, а не s3:* на весь bucket. Узкая политика ограничивает ущерб от утёкшего ключа."
    tags: [s3]
  - id: s3-security-policies-08
    front: "Какие три способа управления ключами есть у шифрования в покое (SSE)?"
    back: "SSE-S3: ключами целиком управляет S3 (включено по умолчанию). SSE-KMS: ключ в отдельном сервисе KMS - журнал доступа и тонкий контроль ценой обращения к KMS. SSE-C: ключ приносит клиент в каждом запросе, S3 его не хранит."
    tags: [s3]
  - id: s3-security-policies-09
    front: "Чем шифрование в покое отличается от шифрования в транзите?"
    back: "В покое (at rest, SSE) - объект хранится на дисках S3 зашифрованным. В транзите (in transit, TLS) - соединение между клиентом и S3 защищено по https. Это разные оси: SSE не спасает от перехвата трафика, а TLS - от доступа к самому объекту."
    tags: [s3]
  - id: s3-security-policies-10
    front: "Как сделать обязательным доступ к bucket только по TLS?"
    back: "Bucket policy с условием aws:SecureTransport: false и эффектом Deny отклонит любой запрос не по TLS. Шифрование в транзите не «включают» на стороне хранилища - клиент просто обращается по https, а политика делает требование жёстким."
    tags: [s3]
  - id: s3-security-policies-11
    front: "Если новый bucket приватен по умолчанию, откуда берутся публичные утечки S3?"
    back: "Дефолт безопасен - небезопасны последующие правки руками ради удобства: acl='public-read' для шеринга, bucket policy с Principal: '*', отключённый «на минутку» Block Public Access. Block Public Access и существует как страховка от таких правок."
    tags: [s3]
  - id: s3-security-policies-12
    front: "Почему SSE не заменяет контроль доступа?"
    back: "Шифрование в покое не отвечает на вопрос «кому можно читать»: расшифровку S3 делает прозрачно для любого, кому разрешён доступ. «В каком виде лежат байты» и «кому можно» - независимые вопросы; раздавать доступ должны политики."
    tags: [s3]
