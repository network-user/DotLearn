conceptId: s3-security-policies
cards:
  - id: s3-security-policies-01
    front: "What algorithm does S3 use to decide access to an object?"
    back: "No access by default (everything implicitly denied). First an explicit Deny is checked: if it exists in any mechanism, the request is rejected. Otherwise it looks for an explicit Allow; without one, default denial applies. Deny is a veto."
    tags: [s3]
  - id: s3-security-policies-02
    front: "Why can a permissive IAM right lose to a denying rule that doesn't even mention it?"
    back: "An explicit Deny is evaluated earlier and overrides any Allow regardless of them. A resource-based rule like \"deny everything outside the corporate network\" adds a Deny that outweighs the IAM right for external traffic."
    tags: [s3]
  - id: s3-security-policies-03
    front: "How does an IAM policy (identity-based) differ from a bucket policy (resource-based)?"
    back: "An IAM policy attaches to a subject (user, role, group) and answers \"what can they do\". A bucket policy attaches to the resource and answers \"who can touch it\"; it can allow other accounts and set request conditions (IP, TLS)."
    tags: [s3]
  - id: s3-security-policies-04
    front: "What is an ACL in S3, and why is it avoided today?"
    back: "ACL (access control list) is the historically first mechanism - a list of \"who can do what\" right on the bucket or object. It can do little, scales poorly, and easily creates accidental public exposure - ACLs were behind several high-profile leaks."
    tags: [s3]
  - id: s3-security-policies-05
    front: "How does modern S3 treat ACLs on new buckets?"
    back: "The recommendation is clear: manage access with policies and disable ACLs. New buckets default to Object Ownership = Bucket owner enforced, under which ACLs have no effect. Seeing acl='public-read' in a guide is a sign it's outdated."
    tags: [s3]
  - id: s3-security-policies-06
    front: "What does Block Public Access do, and does it interfere with presigned URLs?"
    back: "It's a safety switch over all other mechanisms: it blocks any attempt to make objects public, even if a policy or ACL would allow it. It blocks anonymous public access, but not presigned URLs or authorized subjects' access."
    tags: [s3]
  - id: s3-security-policies-07
    front: "What's the essence of least privilege applied to S3?"
    back: "Grant exactly what's needed for the task, and not a bit more. A service putting receipts into one prefix needs s3:PutObject on receipts/*, not s3:* on the whole bucket. A narrow policy limits the damage from a leaked key."
    tags: [s3]
  - id: s3-security-policies-08
    front: "What are the three key-management options for encryption at rest (SSE)?"
    back: "SSE-S3: S3 manages the keys entirely (enabled by default). SSE-KMS: the key lives in a separate KMS service - access logging and fine control at the cost of a KMS call. SSE-C: the client brings the key with every request; S3 never stores it."
    tags: [s3]
  - id: s3-security-policies-09
    front: "How does encryption at rest differ from encryption in transit?"
    back: "At rest (SSE) means the object is stored encrypted on S3's disks. In transit (TLS) means the connection between client and S3 is protected over https. These are different axes: SSE doesn't protect against traffic interception, and TLS doesn't protect against access to the stored object."
    tags: [s3]
  - id: s3-security-policies-10
    front: "How do you make TLS mandatory for bucket access?"
    back: "A bucket policy with condition aws:SecureTransport: false and effect Deny rejects any non-TLS request. Encryption in transit isn't \"enabled\" on the storage side - the client just connects over https, while the policy makes it mandatory."
    tags: [s3]
  - id: s3-security-policies-11
    front: "If a new bucket is private by default, where do S3's public leaks come from?"
    back: "The default is safe - it's the later manual tweaks for convenience that aren't: acl='public-read' for sharing, a bucket policy with Principal: '*', Block Public Access disabled \"just for a minute\". Block Public Access exists precisely as insurance against such tweaks."
    tags: [s3]
  - id: s3-security-policies-12
    front: "Why doesn't SSE replace access control?"
    back: "Encryption at rest doesn't answer \"who can read it\": S3 decrypts transparently for anyone granted access. \"What form the bytes are stored in\" and \"who's allowed\" are independent questions; granting access is the policies' job."
    tags: [s3]
