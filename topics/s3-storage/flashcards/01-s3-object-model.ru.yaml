conceptId: s3-object-model
cards:
  - id: s3-object-model-01
    front: "Какая ментальная модель точнее всего описывает объектное хранилище S3?"
    back: "Гигантский словарь «ключ → байты», размазанный по дата-центру. Ключ - строковое имя объекта, значение - его содержимое плюс метаданные. Никаких inode, блоков или дерева каталогов."
    tags: [s3]
  - id: s3-object-model-02
    front: "Что такое bucket, object и key в S3?"
    back: "Bucket - именованный контейнер верхнего уровня, его имя глобально уникально у провайдера. Object - сами данные плюс метаданные. Key - полное строковое имя объекта внутри bucket. Адрес любого объекта - пара «bucket + key»."
    tags: [s3]
  - id: s3-object-model-03
    front: "Если в S3 нет папок, почему консоль показывает дерево каталогов?"
    back: "Папок физически нет: есть один объект с ключом вроде users/42/avatar.png, где слэши - обычные символы имени. Консоль рисует иллюзию дерева, разрезая ключи по слэшам, но в хранилище нет ни узлов-каталогов, ни вложенности."
    tags: [s3]
  - id: s3-object-model-04
    front: "Чем объектное хранилище отличается от файловой системы по способу записи?"
    back: "Объект пишется и читается целиком: его нельзя открыть на дозапись в середину и нельзя смонтировать как диск. Чтобы изменить объект, его перезаливают целиком под тем же ключом."
    tags: [s3]
  - id: s3-object-model-05
    front: "Ради чего объектное хранилище жертвует вложенностью и частичной записью?"
    back: "Ради масштаба и долговечности. Плоский список ключей раскладывается по тысячам серверов, а каждый объект хранится в нескольких копиях в разных местах. Поэтому S3 держит триллионы объектов, а сетевой диск - нет."
    tags: [s3]
  - id: s3-object-model-06
    front: "Что задаёт регион bucket и почему его выбирают осознанно?"
    back: "Регион - географическая зона дата-центров, где физически лежат байты. Его выбирают по задержке (ближе к пользователям - быстрее) и по требованиям к хранению данных (персональные данные часто обязаны не покидать страну)."
    tags: [s3]
  - id: s3-object-model-07
    front: "Чем durability отличается от availability в S3?"
    back: "Durability (сохранность) - вероятность, что объект не потеряется навсегда. Availability (доступность) - вероятность, что прямо сейчас его можно прочитать. Объект может быть жив, но временно недоступен: это разные оси."
    tags: [s3]
  - id: s3-object-model-08
    front: "Что на самом деле означают «11 девяток» durability у S3 Standard?"
    back: "99.999999999% в год: храня десять миллионов объектов, вы рискуете потерять примерно один раз в десять тысяч лет. Это защита от отказа железа провайдера, а не от ваших ошибок - удаления или перезаписи объекта."
    tags: [s3]
  - id: s3-object-model-09
    front: "Зачем нужен HEAD-запрос по ключу объекта?"
    back: "HEAD возвращает только метаданные (размер, Content-Type, ETag, дата), не скачивая тело. Так узнают размер и тип файла или сам факт существования, не платя за передачу гигабайтов."
    tags: [s3]
  - id: s3-object-model-10
    front: "Почему «переименовать папку» в S3 - это дорогая операция?"
    back: "Каталога нет, есть лишь объекты с ключами под общим префиксом. Чтобы «переименовать папку», хранилище для каждого объекта создаёт копию с новым ключом и удаляет старый. Тысяча объектов - тысяча копирований и тысяча удалений."
    tags: [s3]
  - id: s3-object-model-11
    front: "Можно ли сменить ключ объекта в S3 на месте?"
    back: "Нет, операции «сдвинуть» не существует. Ключ - неизменяемая часть адреса; сменить его можно только через copy + delete. Поэтому массовые переименования медленны и стоят денег за запросы."
    tags: [s3]
  - id: s3-object-model-12
    front: "Какую модель консистентности даёт современный AWS S3 после записи?"
    back: "Strong read-after-write consistency (с декабря 2020): сразу после успешного PUT любой GET или LIST гарантированно видит новые данные. У S3-совместимых хранилищ (MinIO, Яндекс) уровень консистентности нужно проверять отдельно."
    tags: [s3]
