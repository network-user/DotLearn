conceptId: s3-presigned-urls
cards:
  - id: s3-presigned-urls-01
    front: "Что такое presigned URL и что в нём зашито?"
    back: "Обычный HTTPS-адрес объекта с добавленной криптоподписью в query-параметрах. Подпись вычисляется из ключей доступа, имени bucket, ключа объекта, разрешённой операции и времени истечения. Сами ключи в ссылку не попадают."
    tags: [s3]
  - id: s3-presigned-urls-02
    front: "Зачем вообще нужны presigned URL?"
    back: "Чтобы убрать бэкенд из пути данных: клиент скачивает или загружает файл напрямую из S3, минуя сервер. Сервер делает лишь дешёвую операцию подписи (без тела файла), а тяжёлый трафик берёт на себя S3."
    tags: [s3]
  - id: s3-presigned-urls-03
    front: "Что делает presigned GET и остаётся ли объект приватным?"
    back: "generate_presigned_url с get_object даёт временную ссылку на скачивание приватного объекта без авторизации. Объект остаётся приватным: доступ даёт подпись на конкретную операцию и ключ, а не открытость bucket. Работает даже при Block Public Access."
    tags: [s3]
  - id: s3-presigned-urls-04
    front: "Чем presigned PUT отличается от presigned GET по задаче?"
    back: "presigned PUT решает обратную задачу - приём файла от клиента. Ссылка для put_object разрешает клиенту записать объект напрямую в S3 по HTTP-PUT. Бэкенд задаёт ключ заранее, так что клиент пишет ровно туда, куда разрешила подпись."
    tags: [s3]
  - id: s3-presigned-urls-05
    front: "Что возвращает generate_presigned_post и в чём его преимущество?"
    back: "Не строку, а пару «URL формы + набор скрытых полей» для HTML-формы с multipart/form-data. Преимущество - условия (Conditions): подпись может разрешить загрузку только в заданных рамках, например ограничить размер тела."
    tags: [s3]
  - id: s3-presigned-urls-06
    front: "Зачем задают параметр ExpiresIn и в чём его смысл для безопасности?"
    back: "ExpiresIn задаёт срок жизни ссылки в секундах и служит главной защитой: чем короче срок, тем меньше окно, в которое утёкшая ссылка опасна. Бесконечных presigned URL не бывает (для ключей IAM-пользователя предел - до 7 суток)."
    tags: [s3]
  - id: s3-presigned-urls-07
    front: "Почему утёкший presigned URL опасен и можно ли его отозвать?"
    back: "Ссылка самодостаточна: всё нужное для доступа лежит прямо в ней, поэтому любой её владелец имеет доступ до истечения срока. Отозвать одну ссылку нельзя - подпись живёт сама по себе. Поэтому срок держат коротким."
    tags: [s3]
  - id: s3-presigned-urls-08
    front: "Как разом погасить все выданные presigned URL и какова цена?"
    back: "Единственный способ - сменить или отключить ключ доступа, которым они подписаны. Но это обрушит и все остальные подписи на этом ключе. Поштучный отзыв невозможен, потому что S3 проверяет подпись без состояния."
    tags: [s3]
  - id: s3-presigned-urls-09
    front: "Распространённая ошибка: считать presigned URL «публикацией объекта». Почему это неверно?"
    back: "Доступ привязан к одной операции, одному ключу и сроку - это точечная выдача. Открывать bucket целиком, чтобы «раздать ссылки», значит выдать куда больше, чем presigned URL умеет точечно."
    tags: [s3]
  - id: s3-presigned-urls-10
    front: "Кто подписывает presigned URL, а кто по нему ходит?"
    back: "Подписывает бэкенд - тот, у кого есть ключи доступа. Ходит по ссылке клиент, у которого ключей нет. Если клиенту приходится «подписывать» что-то самому, схема построена неверно: секрет утёк бы на клиент."
    tags: [s3]
  - id: s3-presigned-urls-11
    front: "Где нельзя оставлять presigned URL и почему?"
    back: "Там, где они оседают надолго: в URL, попадающих в access-логи прокси, в истории браузера, в пересланных сообщениях, в скриншотах. До конца срока по утёкшей ссылке можно качать или писать объект, не будучи тем, кому её выдали."
    tags: [s3]
