conceptId: s3-storage-classes-lifecycle
cards:
  - id: s3-storage-classes-lifecycle-01
    front: "Какой компромисс задают классы хранения S3?"
    back: "Это не «лучше/хуже», а ось компромисса: чем дешевле держать гигабайт в месяц (Standard → IA → Glacier → Deep Archive), тем дороже и дольше его доставать. Холодные классы окупаются только на редко читаемых данных."
    tags: [s3]
  - id: s3-storage-classes-lifecycle-02
    front: "Для каких данных предназначены Standard, Standard-IA и Glacier?"
    back: "Standard - горячий класс по умолчанию, доступ мгновенный, хранение дорогое. Standard-IA - тёплый: дешевле хранить, но плата за каждое извлечение, для редко нужных данных. Glacier - архивные классы, дешевле всего за хранение."
    tags: [s3]
  - id: s3-storage-classes-lifecycle-03
    front: "Чем One Zone-IA отличается от Standard-IA и для чего годится?"
    back: "Копии лежат в одной зоне доступности, а не в нескольких: ещё дешевле, но падение зоны теряет данные. Подходит для того, что легко пересоздать."
    tags: [s3]
  - id: s3-storage-classes-lifecycle-04
    front: "Чем различаются классы Glacier по скорости извлечения?"
    back: "Glacier Instant Retrieval достаёт мгновенно (за плату). Glacier Flexible Retrieval и Deep Archive дешевле всего за хранение, но извлечение не мгновенное: его нужно запросить и ждать (минуты-часы у Flexible, часы у Deep Archive)."
    tags: [s3]
  - id: s3-storage-classes-lifecycle-05
    front: "Какие две скрытые платы есть у холодных классов и которых нет у Standard?"
    back: "Плата за извлечение (retrieval fee) - каждый прочитанный гигабайт стоит денег сверх трафика. И минимальный срок хранения: Standard-IA - 30 дней, Glacier Flexible - 90, Deep Archive - 180, даже если удалить раньше."
    tags: [s3]
  - id: s3-storage-classes-lifecycle-06
    front: "По какому критерию выбирают класс хранения?"
    back: "По частоте чтения данных, а не по цене хранения. Часто читаемое - Standard. Лежит месяцами и читается изредка - IA. Архив, к которому почти не обращаются и который не удалят раньше срока, - Glacier."
    tags: [s3]
  - id: s3-storage-classes-lifecycle-07
    front: "Что делает версионирование bucket и от чего оно защищает?"
    back: "При каждой перезаписи или удалении оно не затирает старое содержимое, а сохраняет предыдущую версию под тем же ключом. Это страховка от собственных ошибок: «11 девяток» durability не спасают от перезаписи мусором, а версионирование спасает."
    tags: [s3]
  - id: s3-storage-classes-lifecycle-08
    front: "Почему версионирование тихо растит счёт за хранение?"
    back: "Каждая версия - полноценный платный объект. Перезаписали сто раз - лежат сто версий, счёт вырос стократно. А удаление лишь ставит delete marker: версии под ним продолжают храниться и тарифицироваться, место не освобождается."
    tags: [s3]
  - id: s3-storage-classes-lifecycle-09
    front: "Что такое lifecycle-правила и какие три типа действий они описывают?"
    back: "Условия «по возрасту объекта сделать с ним то-то», которые S3 применяет сам. Transition - перевод в более холодный класс; expiration - удаление старых объектов и неактуальных версий; чистка незавершённых multipart-загрузок."
    tags: [s3]
  - id: s3-storage-classes-lifecycle-10
    front: "Из каких трёх частей складывается счёт за S3?"
    back: "Хранение (за гигабайт-месяц по тарифу класса), запросы (за количество операций PUT/GET/LIST плюс плата за извлечение из IA и Glacier) и исходящий трафик egress (за гигабайты, утекающие из облака в интернет)."
    tags: [s3]
  - id: s3-storage-classes-lifecycle-11
    front: "Почему egress - самая коварная строка счёта и как её снижают?"
    back: "Загрузка в S3 обычно бесплатна, а выгрузка в интернет стоит за каждый гигабайт и на раздаче популярного контента перевешивает хранение. Перед S3 ставят CDN: он кэширует объекты ближе к пользователям, и egress из S3 падает."
    tags: [s3]
  - id: s3-storage-classes-lifecycle-12
    front: "Почему перевод горячих данных в дешёвый класс «ради экономии» выходит дороже?"
    back: "К дешёвому хранению добавляются плата за извлечение каждого прочитанного гигабайта, дорогие запросы холодного класса и плата за раннее удаление, если объект не дожил до минимального срока. «В 23 раза дешевле» превращается в «в несколько раз дороже»."
    tags: [s3]
