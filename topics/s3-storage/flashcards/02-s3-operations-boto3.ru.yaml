conceptId: s3-operations-boto3
cards:
  - id: s3-operations-boto3-01
    front: "Чем различаются client и resource в boto3 для работы с S3?"
    back: "client - низкоуровневый: каждый метод соответствует одному HTTP-запросу S3 (put_object → PUT). resource - ООП-обёртка, прячущая детали. Новый код обычно пишут на client: он предсказуем и даёт доступ ко всем параметрам."
    tags: [s3]
  - id: s3-operations-boto3-02
    front: "Что возвращает get_object под ключом Body и в чём подвох?"
    back: "Не сами байты, а StreamingBody - потоковый объект. Тело не загружается в память в момент вызова. Данные появляются только после .read() (или .iter_chunks() для чтения по частям); распечатка resp['Body'] покажет сам объект потока."
    tags: [s3]
  - id: s3-operations-boto3-03
    front: "Сколько ключей за один вызов отдаёт list_objects_v2?"
    back: "Не больше 1000 - это жёсткий лимит S3. Если объектов больше, ответ обрезается, а S3 помечает это флагом IsTruncated: True и прикладывает NextContinuationToken для следующей страницы."
    tags: [s3]
  - id: s3-operations-boto3-04
    front: "Как дочитать весь листинг S3 до конца?"
    back: "Крутить вызов в цикле, передавая ContinuationToken предыдущей страницы, пока IsTruncated не станет ложным. Проще взять встроенный paginator: client.get_paginator('list_objects_v2') сам прокручивает страницы и не теряет ключи."
    tags: [s3]
  - id: s3-operations-boto3-05
    front: "Что делают параметры MaxKeys, Prefix и Delimiter в листинге?"
    back: "MaxKeys задаёт размер страницы (по умолчанию и максимум 1000, увеличить сверх нельзя). Prefix фильтрует ключи по началу строки. Delimiter='/' группирует общие префиксы в CommonPrefixes - так консоль рисует «папки»."
    tags: [s3]
  - id: s3-operations-boto3-06
    front: "Почему результат листинга читают через resp.get('Contents', []), а не resp['Contents']?"
    back: "Пустой bucket или префикс без объектов не вернёт ключ Contents вовсе. Прямое обращение resp['Contents'] упадёт с KeyError на пустом результате. Это вторая по частоте ошибка после игнорирования IsTruncated."
    tags: [s3]
  - id: s3-operations-boto3-07
    front: "Зачем нужен head_object?"
    back: "Он возвращает только метаданные объекта (ContentLength, ContentType) без тела - дёшево и быстро даже для огромного объекта. Им же проверяют существование: если объекта нет, head_object бросит исключение с кодом 404."
    tags: [s3]
  - id: s3-operations-boto3-08
    front: "Чем delete_objects выгоднее, чем много вызовов delete_object?"
    back: "delete_objects удаляет список ключей (до 1000) за один запрос, экономя сетевые хопы: тысяча delete_object - тысяча запросов, один delete_objects - один. Удаление несуществующего ключа при этом не считается ошибкой."
    tags: [s3]
  - id: s3-operations-boto3-09
    front: "В чём главное достоинство upload_file и download_file?"
    back: "Не краткость, а то, что они сами включают multipart для крупных файлов: режут файл на части, грузят параллельно и повторяют упавшие. Вам не нужно вручную решать, резать файл или нет - библиотека делает это по порогу размера."
    tags: [s3]
  - id: s3-operations-boto3-10
    front: "До какого размера объект можно залить одним put_object и что делать дальше?"
    back: "До 5 ГБ - это верхний предел одной загрузки. Для больших объектов используют multipart upload: файл режут на части (минимум 5 МБ, кроме последней), грузят по отдельности, затем CompleteMultipartUpload собирает их в один объект."
    tags: [s3]
  - id: s3-operations-boto3-11
    front: "Зачем нужен multipart upload помимо обхода лимита в 5 ГБ?"
    back: "Докачка (повторяют только упавшую часть, а не весь файл), параллелизм (части грузят одновременно, утилизируя канал) и устойчивость к обрывам сети на гигабайтных загрузках. Цена - сложность."
    tags: [s3]
  - id: s3-operations-boto3-12
    front: "Что происходит с брошенной незавершённой multipart-загрузкой?"
    back: "Залитые части не исчезают сами: они лежат как незавершённая загрузка, не видны в обычном листинге, но занимают место и тарифицируются как хранение. Чистят их lifecycle-правилом и явным abort_multipart_upload."
    tags: [s3]
