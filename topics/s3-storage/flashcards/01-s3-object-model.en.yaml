conceptId: s3-object-model
cards:
  - id: s3-object-model-01
    front: "What mental model most accurately describes S3 object storage?"
    back: "A giant \"key -> bytes\" dictionary spread across a data center. The key is the object's string name, the value is its content plus metadata. No inodes, blocks, or directory tree."
    tags: [s3]
  - id: s3-object-model-02
    front: "What are bucket, object, and key in S3?"
    back: "Bucket is a named top-level container whose name is globally unique for the provider. Object is the data itself plus metadata. Key is the object's full string name inside the bucket. Any object's address is the pair \"bucket + key\"."
    tags: [s3]
  - id: s3-object-model-03
    front: "If S3 has no folders, why does the console show a directory tree?"
    back: "Folders don't physically exist: there's just one object with a key like users/42/avatar.png, where the slashes are ordinary characters in the name. The console draws the illusion of a tree by splitting keys on slashes, but the storage has no directory nodes or nesting at all."
    tags: [s3]
  - id: s3-object-model-04
    front: "How does object storage differ from a file system in how it writes?"
    back: "An object is written and read as a whole: you can't open it for a mid-file write and can't mount it as a disk. To change an object, it's re-uploaded in full under the same key."
    tags: [s3]
  - id: s3-object-model-05
    front: "What does object storage trade away for scale, and what does it gain?"
    back: "It sacrifices nesting and partial writes for scale and durability. A flat list of keys spreads across thousands of servers, and every object is stored in multiple copies in different places. That's why S3 holds trillions of objects while a network drive can't."
    tags: [s3]
  - id: s3-object-model-06
    front: "What does a bucket's region determine, and why is it chosen deliberately?"
    back: "The region is the geographic zone of data centers where the bytes physically live. It's chosen based on latency (closer to users is faster) and on data-residency requirements (personal data often must not leave the country)."
    tags: [s3]
  - id: s3-object-model-07
    front: "How does durability differ from availability in S3?"
    back: "Durability (preservation) is the probability an object is never permanently lost. Availability (accessibility) is the probability it can be read right now. An object can be alive but temporarily unreachable - these are different axes."
    tags: [s3]
  - id: s3-object-model-08
    front: "What do S3 Standard's \"11 nines\" of durability actually mean?"
    back: "99.999999999% a year: storing ten million objects, you'd expect to lose roughly one about once every ten thousand years. It protects against the provider's hardware failure, not against your own mistakes - deleting or overwriting an object."
    tags: [s3]
  - id: s3-object-model-09
    front: "Why do a HEAD request on an object key?"
    back: "HEAD returns only metadata (size, Content-Type, ETag, date) without downloading the body. It's used to check the size and type of a file, or simply whether it exists, without paying to transfer gigabytes."
    tags: [s3]
  - id: s3-object-model-10
    front: "Why is \"renaming a folder\" in S3 an expensive operation?"
    back: "There's no directory - just objects whose keys share a common prefix. To \"rename a folder\", storage has to create a copy with a new key for every object and delete the old one. A thousand objects means a thousand copies and a thousand deletes."
    tags: [s3]
  - id: s3-object-model-11
    front: "Can you change an object's key in place in S3?"
    back: "No, there's no \"move\" operation. The key is an immutable part of the address; it can only be changed via copy + delete. That's why bulk renames are slow and cost money in requests."
    tags: [s3]
  - id: s3-object-model-12
    front: "What consistency model does modern AWS S3 give after a write?"
    back: "Strong read-after-write consistency (since December 2020): right after a successful PUT, any GET or LIST is guaranteed to see the new data. For S3-compatible storage (MinIO, Yandex), the consistency level needs to be checked separately."
    tags: [s3]
