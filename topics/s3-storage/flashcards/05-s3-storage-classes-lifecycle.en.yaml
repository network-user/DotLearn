conceptId: s3-storage-classes-lifecycle
cards:
  - id: s3-storage-classes-lifecycle-01
    front: "What trade-off do S3 storage classes represent?"
    back: "It's not \"better/worse\" but a trade-off axis: the cheaper it is to keep a gigabyte per month (Standard -> IA -> Glacier -> Deep Archive), the more expensive and slower it is to retrieve. Cold classes only pay off for rarely read data."
    tags: [s3]
  - id: s3-storage-classes-lifecycle-02
    front: "What kind of data are Standard, Standard-IA, and Glacier meant for?"
    back: "Standard is the default hot class - instant access, expensive storage. Standard-IA is warm: cheaper to store, but a fee per retrieval, for infrequently needed data. Glacier is the archive tier - cheapest of all to store."
    tags: [s3]
  - id: s3-storage-classes-lifecycle-03
    front: "How does One Zone-IA differ from Standard-IA, and what is it good for?"
    back: "Copies live in a single availability zone instead of several: even cheaper, but a zone outage loses the data. Suited to things that are easy to recreate."
    tags: [s3]
  - id: s3-storage-classes-lifecycle-04
    front: "How do the Glacier classes differ in retrieval speed?"
    back: "Glacier Instant Retrieval fetches data immediately (for a fee). Glacier Flexible Retrieval and Deep Archive are the cheapest to store, but retrieval isn't instant: it has to be requested and waited for (minutes to hours for Flexible, hours for Deep Archive)."
    tags: [s3]
  - id: s3-storage-classes-lifecycle-05
    front: "What two hidden fees do cold classes have that Standard doesn't?"
    back: "A retrieval fee - every gigabyte read costs money on top of transfer. And a minimum storage duration: Standard-IA is 30 days, Glacier Flexible is 90, Deep Archive is 180, even if you delete earlier."
    tags: [s3]
  - id: s3-storage-classes-lifecycle-06
    front: "What criterion should you use to pick a storage class?"
    back: "Read frequency, not storage price. Frequently read data goes in Standard. Data that sits for months and is read occasionally goes in IA. An archive that's rarely touched and won't be deleted early goes in Glacier."
    tags: [s3]
  - id: s3-storage-classes-lifecycle-07
    front: "What does bucket versioning do, and what does it protect against?"
    back: "On every overwrite or delete, it doesn't erase the old content but keeps the previous version under the same key. It's insurance against your own mistakes: \"11 nines\" of durability don't save you from overwriting with garbage, but versioning does."
    tags: [s3]
  - id: s3-storage-classes-lifecycle-08
    front: "Why does versioning quietly grow the storage bill?"
    back: "Every version is a full billed object. Overwrite something a hundred times, and a hundred versions sit there, growing the bill a hundredfold. And deletion only adds a delete marker: the versions underneath keep being stored and billed, freeing no space."
    tags: [s3]
  - id: s3-storage-classes-lifecycle-09
    front: "What are lifecycle rules, and what three types of actions do they describe?"
    back: "Conditions of the form \"do this to the object once it reaches this age\", applied automatically by S3. Transition moves it to a colder class; expiration deletes old objects and noncurrent versions; and there's cleanup of incomplete multipart uploads."
    tags: [s3]
  - id: s3-storage-classes-lifecycle-10
    front: "What three parts make up an S3 bill?"
    back: "Storage (per gigabyte-month at the class's rate), requests (per number of PUT/GET/LIST operations plus retrieval fees from IA and Glacier), and outbound egress traffic (per gigabyte leaving the cloud to the internet)."
    tags: [s3]
  - id: s3-storage-classes-lifecycle-11
    front: "Why is egress the sneakiest line on the bill, and how is it reduced?"
    back: "Uploading into S3 is usually free, but sending data out to the internet costs per gigabyte and, for popular content, outweighs storage. A CDN is placed in front of S3: it caches objects closer to users, and egress from S3 drops."
    tags: [s3]
  - id: s3-storage-classes-lifecycle-12
    front: "Why does moving hot data to a cheap class \"to save money\" end up costing more?"
    back: "Cheap storage comes bundled with a fee for every gigabyte retrieved, pricier requests on the cold class, and an early-deletion charge if the object doesn't live to the minimum duration. \"23 times cheaper\" turns into \"several times more expensive\"."
    tags: [s3]
