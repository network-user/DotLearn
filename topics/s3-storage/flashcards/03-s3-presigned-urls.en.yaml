conceptId: s3-presigned-urls
cards:
  - id: s3-presigned-urls-01
    front: "What is a presigned URL, and what's embedded in it?"
    back: "A regular HTTPS object address with an added cryptographic signature in the query parameters. The signature is computed from the access keys, bucket name, object key, allowed operation, and expiration time. The keys themselves never end up in the link."
    tags: [s3]
  - id: s3-presigned-urls-02
    front: "Why do presigned URLs exist at all?"
    back: "To remove the backend from the data path: the client downloads or uploads a file straight from S3, bypassing the server. The server only does the cheap signing operation (no file body), while S3 takes on the heavy traffic."
    tags: [s3]
  - id: s3-presigned-urls-03
    front: "What does a presigned GET do, and does the object stay private?"
    back: "generate_presigned_url with get_object hands out a temporary download link for a private object with no authorization needed. The object stays private: access comes from a signature for a specific operation and key, not from the bucket being open. Works even with Block Public Access on."
    tags: [s3]
  - id: s3-presigned-urls-04
    front: "How does a presigned PUT differ from a presigned GET in purpose?"
    back: "presigned PUT solves the reverse task - receiving a file from the client. A put_object link lets the client write an object directly to S3 over HTTP PUT. The backend sets the key in advance, so the client writes exactly where the signature allows."
    tags: [s3]
  - id: s3-presigned-urls-05
    front: "What does generate_presigned_post return, and what's its advantage?"
    back: "Not a string, but a pair of \"form URL + a set of hidden fields\" for an HTML multipart/form-data form. The advantage is conditions (Conditions): the signature can restrict the upload to given bounds, e.g. limit the body size."
    tags: [s3]
  - id: s3-presigned-urls-06
    front: "Why set the ExpiresIn parameter, and what's its security role?"
    back: "ExpiresIn sets the link's lifetime in seconds and is the main safeguard: the shorter the lifetime, the smaller the window in which a leaked link is dangerous. There's no such thing as an infinite presigned URL (for IAM user keys the cap is up to 7 days)."
    tags: [s3]
  - id: s3-presigned-urls-07
    front: "Why is a leaked presigned URL dangerous, and can it be revoked?"
    back: "The link is self-contained: everything needed for access lives in it, so whoever holds it has access until it expires. A single link can't be revoked - the signature exists on its own. That's why the lifetime is kept short."
    tags: [s3]
  - id: s3-presigned-urls-08
    front: "How do you kill every issued presigned URL at once, and at what cost?"
    back: "The only way is to rotate or disable the access key that signed them. But that breaks every other signature made with that key too. Revoking one at a time is impossible because S3 checks the signature statelessly."
    tags: [s3]
  - id: s3-presigned-urls-09
    front: "Common mistake: treating a presigned URL as \"publishing the object\". Why is that wrong?"
    back: "Access is bound to one operation, one key, and an expiration - it's a narrow, targeted grant. Opening the whole bucket to \"hand out links\" grants far more than what a presigned URL actually provides."
    tags: [s3]
  - id: s3-presigned-urls-10
    front: "Who signs a presigned URL, and who uses it?"
    back: "The backend signs it - whoever holds the access keys. The client, which has no keys, uses the link. If the client had to \"sign\" anything itself, the scheme would be built wrong: the secret would leak to the client."
    tags: [s3]
  - id: s3-presigned-urls-11
    front: "Where should you never leave a presigned URL, and why?"
    back: "Anywhere it lingers: in URLs that end up in proxy access logs, browser history, forwarded messages, or screenshots. Until it expires, anyone with the leaked link can download or write the object without being the one it was issued to."
    tags: [s3]
