conceptId: s3-operations-boto3
cards:
  - id: s3-operations-boto3-01
    front: "How do client and resource differ in boto3 for working with S3?"
    back: "client is low-level: each method maps to one S3 HTTP request (put_object -> PUT). resource is an OOP wrapper hiding the details. New code is usually written against client: it's predictable and exposes every parameter."
    tags: [s3]
  - id: s3-operations-boto3-02
    front: "What does get_object return under the Body key, and what's the catch?"
    back: "Not the raw bytes but a StreamingBody - a streaming object. The body isn't loaded into memory at call time. Data appears only after .read() (or .iter_chunks() to read in pieces); printing resp['Body'] just shows the stream object itself."
    tags: [s3]
  - id: s3-operations-boto3-03
    front: "How many keys does list_objects_v2 return per call?"
    back: "At most 1000 - a hard S3 limit. If there are more objects, the response is truncated, and S3 flags it with IsTruncated: True plus a NextContinuationToken for the next page."
    tags: [s3]
  - id: s3-operations-boto3-04
    front: "How do you read an entire S3 listing to the end?"
    back: "Loop the call, passing the previous page's ContinuationToken, until IsTruncated is false. Simpler: use the built-in paginator - client.get_paginator('list_objects_v2') scrolls through pages itself without dropping keys."
    tags: [s3]
  - id: s3-operations-boto3-05
    front: "What do the MaxKeys, Prefix, and Delimiter parameters do in a listing?"
    back: "MaxKeys sets the page size (default and max 1000, can't be raised). Prefix filters keys by the start of the string. Delimiter='/' groups shared prefixes into CommonPrefixes - that's how the console draws \"folders\"."
    tags: [s3]
  - id: s3-operations-boto3-06
    front: "Why read a listing result via resp.get('Contents', []) instead of resp['Contents']?"
    back: "An empty bucket or prefix with no objects won't return a Contents key at all. Direct resp['Contents'] would raise KeyError on an empty result. This is the second most common mistake after ignoring IsTruncated."
    tags: [s3]
  - id: s3-operations-boto3-07
    front: "Why is head_object needed?"
    back: "It returns only the object's metadata (ContentLength, ContentType) without the body - cheap and fast even for a huge object. It's also used to check existence: a missing object makes head_object raise a 404 exception."
    tags: [s3]
  - id: s3-operations-boto3-08
    front: "Why is delete_objects better than many delete_object calls?"
    back: "delete_objects deletes a list of keys (up to 1000) in one request, saving network round trips: a thousand delete_object calls means a thousand requests, one delete_objects means one. Deleting a nonexistent key isn't treated as an error."
    tags: [s3]
  - id: s3-operations-boto3-09
    front: "What's the main benefit of upload_file and download_file?"
    back: "Not brevity, but that they automatically handle multipart for large files: they split the file into parts, upload in parallel, and retry failed parts. You don't have to manually decide whether to chunk the file - the library does it based on a size threshold."
    tags: [s3]
  - id: s3-operations-boto3-10
    front: "Up to what size can an object be uploaded with a single put_object, and what then?"
    back: "Up to 5 GB - the upper limit for a single upload. For larger objects, multipart upload is used: the file is split into parts (minimum 5 MB except the last), uploaded separately, then CompleteMultipartUpload assembles them into one object."
    tags: [s3]
  - id: s3-operations-boto3-11
    front: "Why use multipart upload beyond getting around the 5 GB limit?"
    back: "Resumability (retrying only the failed part, not the whole file), parallelism (parts upload simultaneously, using the full bandwidth), and resilience to network drops on gigabyte-sized uploads. The cost is complexity."
    tags: [s3]
  - id: s3-operations-boto3-12
    front: "What happens to an abandoned incomplete multipart upload?"
    back: "The uploaded parts don't vanish on their own: they sit as an incomplete upload, invisible in a normal listing but taking up space and billed as storage. They're cleaned up via a lifecycle rule and an explicit abort_multipart_upload."
    tags: [s3]
