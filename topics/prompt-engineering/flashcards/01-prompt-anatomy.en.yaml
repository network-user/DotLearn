conceptId: prompt-anatomy
cards:
  - id: prompt-anatomy-01
    front: "What six layers make up a prompt?"
    back: "Role/system, instruction, context, examples, constraints, output format. Each layer controls its own aspect of the answer independently of the rest."
    tags: [basics]
  - id: prompt-anatomy-02
    front: "How do you diagnose a bad model answer using the layer model?"
    back: "Ask which layer is empty or contradictory: role missing, no context, no length limit, etc. Add the missing layer instead of blindly rewriting the whole string."
    tags: [debug]
  - id: prompt-anatomy-03
    front: "How does the system layer differ from the user message?"
    back: "System sets a stable behavior frame for the whole dialogue and usually has priority over the user message. For Claude it is passed in the separate system field, not inside the messages array."
    tags: [system]
  - id: prompt-anatomy-04
    front: "Why write instructions affirmatively rather than as prohibitions?"
    back: "The model follows what to do (\"answer as a list of three bullet points\") better than what to avoid (\"do not write plain prose\"). Prohibitions belong in the constraints layer."
    tags: [instruction]
  - id: prompt-anatomy-05
    front: "Why separate context from instruction with delimiters?"
    back: "So the model does not confuse data with commands. Without tags or triple quotes a chunk of source text may be read as an instruction."
    tags: [context]
  - id: prompt-anatomy-06
    front: "What happens if you ask to \"summarize the article\" but never attach the article?"
    back: "The model will not error; it will plausibly invent a summary of a nonexistent text. Missing context is treated as silent permission to invent."
    tags: [context]
  - id: prompt-anatomy-07
    front: "Why does \"you are a world-class expert\" barely change the answer?"
    back: "Role works through specifics (task, tone, boundaries), not praise. \"Technical editor, short sentences, no jargon\" beats abstract flattery."
    tags: [role]
  - id: prompt-anatomy-08
    front: "What is wrong with \"analyze the review and improve it and translate\"?"
    back: "Three different tasks in one verb; the model will mix them and do each worse. Split into steps or list subtasks explicitly."
    tags: [instruction]
  - id: prompt-anatomy-09
    front: "What does the format layer control?"
    back: "The answer shell: plain text, bullet list, JSON by schema. It does not change content, only the shape in which it is returned."
    tags: [format]
  - id: prompt-anatomy-10
    front: "Does every prompt need all six layers?"
    back: "No. A simple request like \"translate to English: hello\" needs only instruction and context. Add layers as the answer starts to drift."
    tags: [basics]
