conceptId: roles-context-rag
cards:
  - id: roles-context-rag-01
    front: "What is grounding?"
    back: "The answer rests on data embedded in the request, not static model memory. Memory stops at the training cutoff and does not know your private documents; context in the prompt is fresh and yours."
    tags: [basics]
  - id: roles-context-rag-02
    front: "How resolve conflict between model memory and supplied context?"
    back: "Explicitly tell the model to trust context: \"answer only based on documents.\" Without that, when memory says 500 and the document says 700, the model may blend both."
    tags: [grounding]
  - id: roles-context-rag-03
    front: "Why allow the model to say \"the documents do not contain an answer\"?"
    back: "To remove pressure to invent. Without a safe exit, when it finds nothing it will make something up rather than admit ignorance."
    tags: [grounding]
  - id: roles-context-rag-04
    front: "What does role set besides tone?"
    back: "Boundaries: which topics the model agrees to answer and how to handle out-of-scope requests. Role is a boundary on acceptable answers, not decoration."
    tags: [role]
  - id: roles-context-rag-05
    front: "What are the three steps of RAG?"
    back: "Search relevant fragments in the knowledge base, assemble them into the prompt with the question, generate an answer from what was found. Model weights do not change."
    tags: [rag]
  - id: roles-context-rag-06
    front: "How does the retrieval step in RAG usually work?"
    back: "Documents and the question become embedding vectors; closest vectors pick the best chunks, in a semantic search that catches meaning, not exact words."
    tags: [rag]
  - id: roles-context-rag-07
    front: "What is the lost-in-the-middle effect?"
    back: "On long context the model uses fragments in the middle worse than at the start and end. Put important chunks near the edges, not buried in the center."
    tags: [context]
  - id: roles-context-rag-08
    front: "Why is more context not always better?"
    back: "Twenty weak fragments dilute attention and raise the chance of latching onto irrelevant text. Three precise fragments beat them: retrieval quality beats quantity."
    tags: [context]
  - id: roles-context-rag-09
    front: "Why can RAG answer quality not exceed retrieval quality?"
    back: "If search returns off-topic fragments, the model faithfully answers from them: confident nonsense grounded on wrong data. The answer is limited by what search found."
    tags: [rag]
  - id: roles-context-rag-10
    front: "RAG, long context, or fine-tuning: which fits frequently changing facts?"
    back: "RAG: index a new document and it is available immediately without retraining or bloating every request. Fine-tuning is for behavior and style, not fresh facts."
    tags: [tradeoffs]
