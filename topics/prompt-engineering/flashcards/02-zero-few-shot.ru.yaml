conceptId: zero-few-shot
cards:
  - id: zero-few-shot-01
    front: "Что такое zero-shot и few-shot?"
    back: "Zero-shot - задача задана только словами, без образцов. Few-shot - к инструкции добавлены несколько решённых пар «вход → выход», и модель продолжает их шаблон."
    tags: [basics]
  - id: zero-few-shot-02
    front: "Почему примеры в few-shot вообще работают?"
    back: "Модель - машина продолжения текста. Несколько единообразных пар «вход → выход» делают самым вероятным продолжением ответ в той же форме. Это обучение в контексте, веса не меняются."
    tags: [mechanism]
  - id: zero-few-shot-03
    front: "Что делают примеры с ответом модели: делают её умнее или меняют форму?"
    back: "Меняют форму. Примеры фиксируют формат и словарь ответа, делая его стабильным и машиночитаемым, но не повышают саму способность модели рассуждать."
    tags: [mechanism]
  - id: zero-few-shot-04
    front: "Что важнее в few-shot: количество примеров или их единообразие?"
    back: "Единообразие. Разнобой в регистре, словаре и структуре строк учит модель отвечать вразнобой. Два-три безупречно согласованных примера дают почти весь прирост стабильности."
    tags: [quality]
  - id: zero-few-shot-05
    front: "Зачем включать в few-shot пограничные случаи?"
    back: "Если все примеры - яркие лёгкие классы, модель не знает, куда относить спорное вроде «нормально, но дорого». Один пример на трудный класс ценнее трёх однотипных лёгких."
    tags: [quality]
  - id: zero-few-shot-06
    front: "Что произойдёт, если в наборе примеров перевесит один класс?"
    back: "Модель переймёт этот перекос как смещение и будет чаще выдавать перевешивающий класс. Состав примеров нужно балансировать так же, как обучающую выборку."
    tags: [quality]
  - id: zero-few-shot-07
    front: "Когда few-shot примеры скорее вредят?"
    back: "Когда задача и так надёжна в zero-shot (перевод, простая суммаризация); когда нужны рассуждения, а не форма; когда строгий формат лучше задать схемой структурного вывода. Примеры стоят токенов и задержки."
    tags: [tradeoffs]
  - id: zero-few-shot-08
    front: "Почему «больше примеров» не всегда лучше?"
    back: "Каждый пример - токены в каждом запросе: дороже, медленнее, на длинном контексте размывает внимание. Польза от числа примеров быстро выходит на плато."
    tags: [tradeoffs]
  - id: zero-few-shot-09
    front: "Чем опасны примеры, слишком похожие на текущий запрос?"
    back: "Модель скопирует выход ближайшего примера вместо того, чтобы решать задачу заново. Признак - ответы стали одинаковыми независимо от входа."
    tags: [pitfalls]
  - id: zero-few-shot-10
    front: "Что такое обучение в контексте (in-context learning)?"
    back: "Способность модели подхватить шаблон прямо из примеров в промпте без изменения весов. Несколько примеров резко сдвигают распределение следующего токена в сторону их формы."
    tags: [mechanism]
