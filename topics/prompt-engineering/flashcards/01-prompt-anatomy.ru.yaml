conceptId: prompt-anatomy
cards:
  - id: prompt-anatomy-01
    front: "Из каких шести слоёв состоит промпт?"
    back: "Роль/система, инструкция, контекст, примеры, ограничения, формат вывода. Каждый слой управляет своим аспектом ответа независимо от остальных."
    tags: [basics]
  - id: prompt-anatomy-02
    front: "Как диагностировать неудачный ответ модели через модель слоёв?"
    back: "Спросить, какой слой пуст или противоречив: не задана роль, нет контекста, нет ограничения на длину и т.д. Добавляют недостающий слой вместо переписывания всей строки вслепую."
    tags: [debug]
  - id: prompt-anatomy-03
    front: "Чем системный слой отличается от сообщения пользователя?"
    back: "Системный слой задаёт устойчивую рамку поведения на весь диалог и обычно имеет приоритет над пользовательским сообщением. У Claude он передаётся в отдельном поле system, а не внутри массива messages."
    tags: [system]
  - id: prompt-anatomy-04
    front: "Почему инструкции лучше писать утвердительно, а не через запрет?"
    back: "Модель надёжнее следует тому, что делать («отвечай списком из трёх пунктов»), чем тому, чего избегать («не пиши сплошным текстом»). Запреты тоже нужны, но их место - в слое ограничений."
    tags: [instruction]
  - id: prompt-anatomy-05
    front: "Зачем отделять контекст от инструкции разделителями?"
    back: "Чтобы модель не спутала данные с командой. Без тегов или тройных кавычек кусок исходного текста может быть прочитан как инструкция."
    tags: [context]
  - id: prompt-anatomy-06
    front: "Что произойдёт, если попросить «суммируй статью», но саму статью не приложить?"
    back: "Модель не выдаст ошибку, а правдоподобно выдумает резюме несуществующего текста. Отсутствие контекста она трактует как молчаливое разрешение придумать."
    tags: [context]
  - id: prompt-anatomy-07
    front: "Почему фраза «ты эксперт мирового уровня» почти не меняет ответ?"
    back: "Роль работает за счёт конкретики (какая задача, тон, границы), а не похвалы. «Технический редактор, короткие предложения, без жаргона» полезнее абстрактного восхваления."
    tags: [role]
  - id: prompt-anatomy-08
    front: "Что не так с инструкцией «проанализируй отзыв и улучши его и переведи»?"
    back: "Это три разные задачи в одном глаголе; модель выполнит их вперемешку и хуже каждую. Нужно разбить на шаги или честно перечислить подзадачи по пунктам."
    tags: [instruction]
  - id: prompt-anatomy-09
    front: "За что отвечает слой формата?"
    back: "За оболочку ответа: сплошной текст, маркированный список, JSON по схеме. Он не меняет содержание, а задаёт форму, в которой его вернуть."
    tags: [format]
  - id: prompt-anatomy-10
    front: "Нужны ли в каждом промпте все шесть слоёв?"
    back: "Нет. Простой запрос вроде «переведи на английский: привет» обходится инструкцией и контекстом. Слои добавляют по мере того, как ответ начинает «уплывать»."
    tags: [basics]
