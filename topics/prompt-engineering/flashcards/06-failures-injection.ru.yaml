conceptId: failures-injection
cards:
  - id: failures-injection-01
    front: "Какие три класса провалов LLM различают и почему их не путают?"
    back: "Галлюцинация (ложь как факт), ложный отказ (боится безобидного), prompt injection (команда из данных). У них разные причины и разные лекарства - защита от одного не помогает против другого."
    tags: [basics]
  - id: failures-injection-02
    front: "Что такое галлюцинация и почему она возникает?"
    back: "Правдоподобный, но ложный ответ с уверенностью верного. Модель оптимизирована продолжать текст правдоподобно, а не сверяться с истиной; при нехватке фактов «правдоподобно» и «выдумано» для неё неразличимы."
    tags: [hallucination]
  - id: failures-injection-03
    front: "Чем лечат галлюцинации?"
    back: "В основном заземлением (данные в запросе + ответ только по ним). Дополнительно: разрешить «не знаю», просить цитаты из контекста, предпочитать свежий контекст памяти модели."
    tags: [hallucination]
  - id: failures-injection-04
    front: "Почему уверенный тон ответа - не признак его верности?"
    back: "Галлюцинация звучит так же убедительно, как верный ответ; модели не присуща интонация сомнения. «Звучит уверенно» нельзя использовать как сигнал «значит, верно»."
    tags: [hallucination]
  - id: failures-injection-05
    front: "Как обычно снимают ложный отказ на безобидную задачу?"
    back: "Контекстом законного намерения и роли («я преподаватель, нужен учебный пример уязвимости») и точной профессиональной формулировкой. Давление работает хуже контекста."
    tags: [refusal]
  - id: failures-injection-06
    front: "Что такое prompt injection?"
    back: "Вредная инструкция приходит внутри данных, которые модель должна была лишь обработать, и перехватывает её поведение. Модель видит весь промпт как один поток и не имеет жёсткой границы «инструкция или данные»."
    tags: [injection]
  - id: failures-injection-07
    front: "Когда prompt injection особенно опасна?"
    back: "Когда модель не просто отвечает текстом, а вызывает инструменты (шлёт письма, читает файлы, ходит в API). Тогда инъекция превращается из странного ответа в реальное действие."
    tags: [injection]
  - id: failures-injection-08
    front: "Что такое непрямая (indirect) prompt injection?"
    back: "Вредная инструкция лежит не в запросе пользователя, а в стороннем источнике - на веб-странице, в письме, в подгруженном через RAG документе - и срабатывает, когда агент это содержимое читает."
    tags: [injection]
  - id: failures-injection-09
    front: "Почему prompt injection нельзя устранить одним промптом?"
    back: "Модель читает инструкции и данные одним потоком токенов; роли дают лишь мягкий приоритет, а не изоляцию как процессы в ОС. Достаточно хитрая формулировка пробьёт текстовую защиту."
    tags: [defense]
  - id: failures-injection-10
    front: "Какими слоями защищаются от prompt injection?"
    back: "Разделители + запрет выполнять команды из данных (слабый первый слой); минимум прав агенту; подтверждение человеком на необратимые действия; проверка вывода до запуска. Безопасность даёт архитектура, а не идеальный промпт."
    tags: [defense]
