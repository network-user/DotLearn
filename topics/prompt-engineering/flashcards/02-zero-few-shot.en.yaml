conceptId: zero-few-shot
cards:
  - id: zero-few-shot-01
    front: "What are zero-shot and few-shot?"
    back: "Zero-shot states the task in words only, with no samples. Few-shot adds several solved \"input → output\" pairs and the model continues their template."
    tags: [basics]
  - id: zero-few-shot-02
    front: "Why do few-shot examples work at all?"
    back: "The model is a text continuation machine. Several uniform \"input → output\" pairs make the most likely continuation an answer in the same form. That is in-context learning; weights do not change."
    tags: [mechanism]
  - id: zero-few-shot-03
    front: "Do examples make the model smarter or change answer form?"
    back: "They change form. Examples fix format and vocabulary, making answers stable and machine-readable, but do not raise reasoning ability itself."
    tags: [mechanism]
  - id: zero-few-shot-04
    front: "In few-shot, what matters more: count or consistency?"
    back: "Consistency. Mixed case, vocabulary, and line structure teach inconsistent answers. Two or three perfectly aligned examples deliver most of the stability gain."
    tags: [quality]
  - id: zero-few-shot-05
    front: "Why include borderline cases in few-shot?"
    back: "If all examples are easy bright classes, the model will not know where to put ambiguous items like \"fine, but expensive.\" One hard-class example beats three easy identical ones."
    tags: [quality]
  - id: zero-few-shot-06
    front: "What happens if one class dominates the example set?"
    back: "The model inherits that skew and labels the overweight class more often. Balance example composition like a training set."
    tags: [quality]
  - id: zero-few-shot-07
    front: "When do few-shot examples more likely hurt?"
    back: "When zero-shot already works (translation, simple summarization); when you need reasoning, not form; when strict format is better set by structured output schema. Examples cost tokens and latency."
    tags: [tradeoffs]
  - id: zero-few-shot-08
    front: "Why is \"more examples\" not always better?"
    back: "Each example is tokens in every request: higher cost, slower, and on long context it dilutes attention. Benefit vs. count flattens quickly."
    tags: [tradeoffs]
  - id: zero-few-shot-09
    front: "What is risky about examples too similar to the current query?"
    back: "The model copies the nearest example's output instead of solving anew. Sign: answers become identical regardless of input."
    tags: [pitfalls]
  - id: zero-few-shot-10
    front: "What is in-context learning?"
    back: "The model's ability to pick up a template straight from prompt examples without changing weights. A few examples sharply shift the next-token distribution toward their form."
    tags: [mechanism]
