conceptId: advanced-patterns
cards:
  - id: advanced-patterns-01
    front: "Что такое ReAct?"
    back: "Reasoning + acting: модель крутит цикл «думает → вызывает инструмент → наблюдает результат → думает дальше», пока не готова ответить. Это основа агентов; данные приходят из инструментов, а не из памяти."
    tags: [react]
  - id: advanced-patterns-02
    front: "Как качество ReAct-агента связано с инструментами?"
    back: "Полезность растёт с качеством инструментов и с тем, насколько чётко в промпте описано, когда какой звать. Но больше инструментов и прав - серьёзнее последствия перехваченной инструкции."
    tags: [react]
  - id: advanced-patterns-03
    front: "Что такое self-consistency?"
    back: "Запуск одной задачи несколько раз с ненулевой температурой, сбор независимых цепочек и выбор ответа большинства. Разные пути чаще сходятся к верному ответу, чем к одному неверному."
    tags: [self-consistency]
  - id: advanced-patterns-04
    front: "Почему self-consistency требует ненулевой температуры?"
    back: "Без случайности все прогоны одинаковы и голосовать не за что. Разнообразие цепочек даёт ненулевая температура."
    tags: [self-consistency]
  - id: advanced-patterns-05
    front: "Какова цена self-consistency и когда он оправдан?"
    back: "Стоит в N раз больше запросов. Приберегают для задач, где ошибка дорога, а не включают по умолчанию."
    tags: [self-consistency]
  - id: advanced-patterns-06
    front: "Что такое цепочка промптов (prompt chaining)?"
    back: "Разбиение задачи на этапы, где выход одного запроса - вход следующего (разбор → план → черновик → правка). Каждый шаг проще и качественнее, цепочку можно отлаживать по звеньям."
    tags: [chaining]
  - id: advanced-patterns-07
    front: "В чём риск длинной цепочки промптов?"
    back: "Каждое звено - не только точка контроля, но и место накопления ошибки: искажение раннего запроса протекает дальше. Чем длиннее цепочка, тем важнее валидировать выход каждого звена."
    tags: [chaining]
  - id: advanced-patterns-08
    front: "Что такое мета-промптинг?"
    back: "«Промпт, пишущий промпт»: модель улучшает или генерирует инструкцию для другой задачи. Ускоряет итерацию, но сгенерированный промпт нужно испытать на реальных данных."
    tags: [meta]
  - id: advanced-patterns-09
    front: "Что такое оценщик (LLM-as-judge) и что ему нужно?"
    back: "Отдельный вызов модели, оценивающий ответ по критериям (связность, наличие выдумок, какой из двух лучше). Нужна чёткая рубрика и примеры, иначе оценки расплываются."
    tags: [judge]
  - id: advanced-patterns-10
    front: "Каких слабостей оценщика нельзя забывать?"
    back: "Он наследует смещения модели (склонность к более длинному или первому ответу) и сам ошибается. Это дешёвый масштабируемый сигнал, но не замена выборочной проверке человеком на ответственных решениях."
    tags: [judge]
  - id: advanced-patterns-11
    front: "Главное правило при выборе продвинутого паттерна?"
    back: "Паттерны складывают стоимость (десятки вызовов на задачу). Начинать с простейшего, что решает задачу, и усложнять, лишь упёршись в реальный потолок."
    tags: [tradeoffs]
  - id: advanced-patterns-12
    front: "Где проходит граница между «промптом» и «системой» на LLM?"
    back: "Простой промпт - текстовая строка. ReAct, self-consistency, цепочки и оценщики переносят инженерию наружу: рантайм инструментов, оркестрация запросов, управление состоянием, оценочный пайплайн. Продакшен - это система, а не один промпт."
    tags: [systems]
