conceptId: structured-output
cards:
  - id: structured-output-01
    front: "When is structured output needed?"
    back: "When the model's answer becomes input to other code: database, frontend, next pipeline step. Shape must be predictable to the character or the parser fails."
    tags: [basics]
  - id: structured-output-02
    front: "What two techniques give baseline parsing reliability without a special API?"
    back: "Delimiters (wrap data and output in tags so the model knows what to process vs. return) and a direct ban on wrappers (\"JSON only, no markdown or explanation\")."
    tags: [techniques]
  - id: structured-output-03
    front: "What does prefilling the answer with { do?"
    back: "Forces continuation from an open brace, making preambles like \"Sure, here is the data:\" impossible. With Claude, this works via assistant role prefill."
    tags: [techniques]
  - id: structured-output-04
    front: "Why is schema more reliable than \"return JSON with fields...\"?"
    back: "Instruction rests on goodwill, so extra fields or wrong types are possible. Structured output with JSON Schema gives a provider guarantee: valid JSON of the required shape."
    tags: [schema]
  - id: structured-output-05
    front: "What does and does not JSON Schema in structured outputs guarantee?"
    back: "Guarantees form: valid JSON, required keys, correct types, no extra keys via additionalProperties: false. Does not guarantee truth of values."
    tags: [schema]
  - id: structured-output-06
    front: "How does Anthropic get a guaranteed typed object?"
    back: "Declare a tool with input_schema and force the model to call it. Call arguments are the typed object in the required shape."
    tags: [api]
  - id: structured-output-07
    front: "How distinguish \"no data\" from zero in a schema?"
    back: "Allow explicit emptiness: optional field or null, and ask for null when the value is missing. Otherwise the model invents a number."
    tags: [pitfalls]
  - id: structured-output-08
    front: "Why keep number and unit in separate fields?"
    back: "One string field returns \"1480 RUB\" and you parse units manually. Separate amount: number and currency: string avoid that."
    tags: [design]
  - id: structured-output-09
    front: "What happens with very large deeply nested schemas?"
    back: "The model follows them worse and slower. Split extraction into several requests with simple schemas rather than one giant object."
    tags: [design]
  - id: structured-output-10
    front: "Why is structured output guarantee not \"the model tried hard\"?"
    back: "Generation is constrained (constrained decoding): only tokens leading to a schema-valid result are allowed. Other tokens cannot be generated."
    tags: [internals]
