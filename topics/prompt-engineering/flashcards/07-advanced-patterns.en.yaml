conceptId: advanced-patterns
cards:
  - id: advanced-patterns-01
    front: "What is ReAct?"
    back: "Reasoning + acting: the model loops think → call tool → observe result → think again until ready to answer. Basis of agents; data comes from tools, not memory."
    tags: [react]
  - id: advanced-patterns-02
    front: "How is ReAct agent quality tied to tools?"
    back: "Usefulness grows with tool quality and clear prompt rules for when to call which. But more tools and rights mean worse consequences if an instruction is hijacked."
    tags: [react]
  - id: advanced-patterns-03
    front: "What is self-consistency?"
    back: "Run the same task several times at non-zero temperature, collect independent chains, take the majority answer. Different paths often converge on the correct answer."
    tags: [self-consistency]
  - id: advanced-patterns-04
    front: "Why does self-consistency need non-zero temperature?"
    back: "Without randomness all runs are identical — nothing to vote on. Non-zero temperature provides chain diversity."
    tags: [self-consistency]
  - id: advanced-patterns-05
    front: "What does self-consistency cost and when is it justified?"
    back: "N times more requests. Saved for tasks where error is expensive, not enabled by default."
    tags: [self-consistency]
  - id: advanced-patterns-06
    front: "What is a prompt chain?"
    back: "Split a task into stages where one request's output is the next input (parse → plan → draft → edit). Each step is simpler and higher quality; debug link by link."
    tags: [chaining]
  - id: advanced-patterns-07
    front: "What is the risk of a long prompt chain?"
    back: "Each link is a checkpoint but also where error accumulates: distortion in an early request flows downstream. Validate each link's output."
    tags: [chaining]
  - id: advanced-patterns-08
    front: "What is meta-prompting?"
    back: "A prompt that writes a prompt: the model improves or generates an instruction for another task. Speeds iteration but generated prompts must be tested on real data."
    tags: [meta]
  - id: advanced-patterns-09
    front: "What is an evaluator (LLM-as-judge) and what does it need?"
    back: "A separate model call scoring an answer by criteria (coherence, hallucinations, which of two is better). Needs a clear rubric and examples or scores drift."
    tags: [judge]
  - id: advanced-patterns-10
    front: "What evaluator weaknesses must you remember?"
    back: "Inherits model bias (preferring longer or first answers) and makes its own errors. Cheap scalable signal, not a replacement for human spot checks on high-stakes decisions."
    tags: [judge]
  - id: advanced-patterns-11
    front: "Main rule when choosing an advanced pattern?"
    back: "Patterns stack cost (dozens of calls per task). Start with the simplest solution and add complexity only when you hit a real ceiling."
    tags: [tradeoffs]
  - id: advanced-patterns-12
    front: "Where is the line between \"prompt\" and \"system\" on LLMs?"
    back: "A simple prompt is one string. ReAct, self-consistency, chains, and evaluators move engineering outside: tool runtime, orchestration, state, scoring pipelines. Production is a system, not one prompt."
    tags: [systems]
