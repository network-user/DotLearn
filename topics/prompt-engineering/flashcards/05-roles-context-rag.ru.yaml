conceptId: roles-context-rag
cards:
  - id: roles-context-rag-01
    front: "Что такое заземление (grounding)?"
    back: "Опора ответа на данные, вложенные в запрос, а не на статичную память модели. Память обрывается на дате обучения и не знает ваших приватных документов; контекст в промпте свежий и ваш."
    tags: [basics]
  - id: roles-context-rag-02
    front: "Как разрешить конфликт между памятью модели и поданным контекстом?"
    back: "Явно велеть верить контексту: «отвечай только на основе документов». Без этого при расхождении (тариф 500 в памяти, 700 в документе) модель может смешать оба числа."
    tags: [grounding]
  - id: roles-context-rag-03
    front: "Зачем разрешать модели сказать «ответа в документах нет»?"
    back: "Чтобы снять давление обязательно что-то придумать. Без безопасного выхода модель, не найдя ответа, скорее выдумает, чем признает незнание."
    tags: [grounding]
  - id: roles-context-rag-04
    front: "Что роль задаёт помимо тона?"
    back: "Границы: на какие темы модель вообще соглашается отвечать и что делать с запросами вне области. Роль - это не украшение, а граница допустимого ответа."
    tags: [role]
  - id: roles-context-rag-05
    front: "Из каких трёх шагов состоит RAG?"
    back: "Поиск релевантных фрагментов по базе, сборка их в промпт вместе с вопросом, генерация ответа по найденному. Веса модели при этом не меняются."
    tags: [rag]
  - id: roles-context-rag-06
    front: "Как обычно работает шаг поиска (retrieval) в RAG?"
    back: "Документы и вопрос превращают в векторы-эмбеддинги и по близости векторов находят самые подходящие куски - семантический поиск, ловящий смысл, а не точные слова."
    tags: [rag]
  - id: roles-context-rag-07
    front: "Что такое эффект «потерянного в середине» (lost in the middle)?"
    back: "На длинном контексте модели хуже используют фрагменты в середине, чем у начала и конца. Важные куски ставят ближе к краям, а не закапывают в центр."
    tags: [context]
  - id: roles-context-rag-08
    front: "Почему больше фрагментов в контексте - не всегда лучше?"
    back: "Двадцать слабо релевантных кусков размывают внимание и повышают шанс уцепиться за нерелевантное. Три точных фрагмента лучше: качество поиска важнее количества."
    tags: [context]
  - id: roles-context-rag-09
    front: "Почему качество ответа RAG не выше качества поиска?"
    back: "Если retrieval вернул фрагменты не по теме, модель добросовестно ответит по ним и выдаст уверенную чушь, заземлённую на неправильных данных. Ответ ограничен тем, что нашёл поиск."
    tags: [rag]
  - id: roles-context-rag-10
    front: "RAG, длинный контекст или дообучение - что для часто меняющихся фактов?"
    back: "RAG: индексируешь новый документ - он доступен сразу, без переобучения и без раздувания каждого запроса. Дообучение приберегают для изменения поведения и стиля, а не для свежих фактов."
    tags: [tradeoffs]
