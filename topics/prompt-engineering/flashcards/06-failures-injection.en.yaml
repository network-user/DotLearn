conceptId: failures-injection
cards:
  - id: failures-injection-01
    front: "What three LLM failure classes exist and why not conflate them?"
    back: "Hallucination (falsehood as fact), false refusal (fears harmless task), prompt injection (command from data). Different causes and fixes — defense against one does not help against another."
    tags: [basics]
  - id: failures-injection-02
    front: "What is hallucination and why does it happen?"
    back: "A plausible but false answer with the confidence of a correct one. The model continues text plausibly, not truthfully; when facts are missing, plausible and invented are indistinguishable to it."
    tags: [hallucination]
  - id: failures-injection-03
    front: "How are hallucinations treated?"
    back: "Mainly grounding (data in the request + answer only from it). Also: allow \"I don't know,\" require quotes from context, prefer fresh context over model memory."
    tags: [hallucination]
  - id: failures-injection-04
    front: "Why is confident tone not a sign of correctness?"
    back: "Hallucination sounds as convincing as truth; models have no tone of doubt. \"Sounds confident\" cannot mean \"must be true.\""
    tags: [hallucination]
  - id: failures-injection-05
    front: "How is false refusal on a harmless task usually lifted?"
    back: "Context of legitimate intent and role (\"I am an instructor, need a teaching vulnerability example\") and precise professional wording. Pressure works worse than context."
    tags: [refusal]
  - id: failures-injection-06
    front: "What is prompt injection?"
    back: "A harmful instruction arrives inside data the model was only supposed to process and hijacks its behavior. The model sees one stream and has no hard boundary between instruction and data."
    tags: [injection]
  - id: failures-injection-07
    front: "When is prompt injection especially dangerous?"
    back: "When the model calls tools (sends email, reads files, hits APIs). Injection turns from a weird answer into real action."
    tags: [injection]
  - id: failures-injection-08
    front: "What is indirect prompt injection?"
    back: "The harmful instruction is not in the user query but in a third-party source — web page, email, RAG document — and fires when the agent reads that content."
    tags: [injection]
  - id: failures-injection-09
    front: "Why can prompt injection not be removed with one prompt?"
    back: "Instructions and data share one token stream; roles give soft priority, not OS-like isolation. A clever enough phrasing breaks textual defense."
    tags: [defense]
  - id: failures-injection-10
    front: "What layers defend against prompt injection?"
    back: "Delimiters + forbid executing commands from data (weak first layer); minimum agent privileges; human confirmation on irreversible actions; validate output before acting. Safety is architecture, not a perfect prompt."
    tags: [defense]
