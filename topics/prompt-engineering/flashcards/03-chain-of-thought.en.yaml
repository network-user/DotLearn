conceptId: chain-of-thought
cards:
  - id: chain-of-thought-01
    front: "What is chain of thought?"
    back: "A technique where the model writes intermediate solution steps first and gives the final answer at the end. Steps enter context and the answer rests on what was already computed."
    tags: [basics]
  - id: chain-of-thought-02
    front: "Why does step-by-step reasoning improve accuracy?"
    back: "The model generates tokens left to right and does not calculate in its head. Demanding the final answer immediately forces guessing before the path is walked; CoT unfolds intermediate values."
    tags: [mechanism]
  - id: chain-of-thought-03
    front: "How invoke reasoning without examples?"
    back: "A phrase like \"solve step by step\" or \"reason first, then give the final answer\" is enough. That is zero-shot chain of thought — only the signal to unfold reasoning is needed."
    tags: [howto]
  - id: chain-of-thought-04
    front: "Why put the answer at the end, not the beginning?"
    back: "For the model token order is thinking order. \"Give the answer, then explain\" outputs the answer first, before reasoning, and nullifies the chain."
    tags: [howto]
  - id: chain-of-thought-05
    front: "What is decomposition and how does it relate to CoT?"
    back: "Splitting a complex task into subtasks solved in sequence. CoT is the reasoning special case. Explicit numbered steps make reasoning manageable."
    tags: [decomposition]
  - id: chain-of-thought-06
    front: "When does chain of thought hurt?"
    back: "On simple one-step tasks (burns tokens), with strict machine-readable output (thoughts break the parser), and when a smooth chain is mistaken for proof of correctness."
    tags: [tradeoffs]
  - id: chain-of-thought-07
    front: "Does a detailed chain guarantee a correct answer?"
    back: "No. Plausible but false chains happen: convincing reasoning can lead to a wrong answer. Check the result, not the explanation."
    tags: [pitfalls]
  - id: chain-of-thought-08
    front: "How do reasoning models differ regarding CoT?"
    back: "They run the chain automatically in an internal channel and return mostly the conclusion. An explicit \"think step by step\" is often redundant for them."
    tags: [reasoning]
  - id: chain-of-thought-09
    front: "Why is raw internal reasoning not shown as proof?"
    back: "It is long and not needed by users, and internal reasoning is not guaranteed to honestly reflect how the model decided. It is working scratch paper, not verified proof."
    tags: [reasoning]
  - id: chain-of-thought-10
    front: "What if a long chain drifts to a wrong answer?"
    back: "More reasoning is not the fix — recheck. E.g. self-consistency: run several independent chains and take the majority answer."
    tags: [pitfalls]
