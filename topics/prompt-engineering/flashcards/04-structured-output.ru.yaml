conceptId: structured-output
cards:
  - id: structured-output-01
    front: "Когда нужен структурный вывод?"
    back: "Когда ответ модели становится входом другого кода - базы, фронтенда, следующего шага пайплайна. Тогда форма должна быть предсказуемой до символа, иначе парсер падает."
    tags: [basics]
  - id: structured-output-02
    front: "Какие две техники дают базовую надёжность парсинга без специального API?"
    back: "Разделители (обернуть данные и вывод в теги, чтобы модель не спутала, что обрабатывать и что возвращать) и прямой запрет на обёртку («только JSON, без markdown и пояснений»)."
    tags: [techniques]
  - id: structured-output-03
    front: "Что делает префилл начала ответа символом { ?"
    back: "Заставляет модель продолжать с открытой скобки, делая вступительную болтовню вроде «Конечно, вот данные:» невозможной. У Claude - через предзаполнение роли assistant."
    tags: [techniques]
  - id: structured-output-04
    front: "Чем схема надёжнее инструкции «верни JSON с полями...»?"
    back: "Инструкция держится на доброй воле модели - она может добавить поле или сменить тип. Режим структурного вывода с JSON Schema даёт гарантию провайдера: валидный JSON нужной формы."
    tags: [schema]
  - id: structured-output-05
    front: "Что гарантирует, а что не гарантирует JSON Schema в structured outputs?"
    back: "Гарантирует форму: валидный JSON, нужные ключи, правильные типы, запрет лишних полей через additionalProperties: false. Не гарантирует правдивость значений."
    tags: [schema]
  - id: structured-output-06
    front: "Как у Anthropic получают гарантированно типизированный объект?"
    back: "Объявляют инструмент (tool) со схемой input_schema и заставляют модель его вызвать. Аргументы вызова и есть типизированный объект нужной формы."
    tags: [api]
  - id: structured-output-07
    front: "Как в схеме отличить «нет данных» от «ноль»?"
    back: "Заложить явную пустоту: сделать поле необязательным или допустить null и попросить ставить null при отсутствии значения. Иначе модель выдумает число."
    tags: [pitfalls]
  - id: structured-output-08
    front: "Почему число и единицу измерения держат в разных полях?"
    back: "Если поле одно строковое, модель вернёт «1480 руб.», и единицу придётся разбирать вручную. Раздельные amount: number и currency: string избавляют от этого."
    tags: [design]
  - id: structured-output-09
    front: "Что происходит с очень большими и глубоко вложенными схемами?"
    back: "Модель соблюдает их хуже и медленнее. Надёжнее разбить извлечение на несколько запросов с простыми схемами, чем требовать один гигантский объект."
    tags: [design]
  - id: structured-output-10
    front: "Почему гарантия формы в structured outputs - не «модель постаралась»?"
    back: "Под капотом ограничивается генерация (constrained decoding): на каждом шаге допускаются только токены, ведущие к валидному по схеме результату. Другие токены физически не генерируются."
    tags: [internals]
