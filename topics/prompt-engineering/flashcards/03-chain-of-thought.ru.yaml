conceptId: chain-of-thought
cards:
  - id: chain-of-thought-01
    front: "Что такое chain of thought (цепочка рассуждений)?"
    back: "Приём, при котором модель сначала пишет промежуточные шаги решения, а финальный ответ даёт в конце. Шаги попадают в контекст, и ответ опирается на уже посчитанное."
    tags: [basics]
  - id: chain-of-thought-02
    front: "Почему пошаговое рассуждение повышает точность?"
    back: "Модель генерирует токены слева направо и не считает в уме. Требуя сразу финал, Вы заставляете её угадать ответ до пути к нему; CoT даёт развернуть промежуточные величины."
    tags: [mechanism]
  - id: chain-of-thought-03
    front: "Как вызвать рассуждение без примеров?"
    back: "Достаточно фразы вроде «решай по шагам» или «сначала рассуждай, потом дай итог». Это zero-shot chain of thought - нужен сам сигнал развернуть рассуждение."
    tags: [howto]
  - id: chain-of-thought-04
    front: "Почему ответ ставят в конце, а не в начале?"
    back: "Для модели порядок токенов и есть порядок мышления. Промпт «дай ответ, потом объясни» выдаёт ответ первым токеном, до рассуждения, и обнуляет пользу цепочки."
    tags: [howto]
  - id: chain-of-thought-05
    front: "Что такое декомпозиция и как она связана с CoT?"
    back: "Декомпозиция - разбиение сложной задачи на под-задачи, решаемые по очереди. CoT - её частный случай для рассуждений. Явная нумерация шагов делает рассуждение управляемым."
    tags: [decomposition]
  - id: chain-of-thought-06
    front: "Когда chain of thought вредит?"
    back: "На простых одношаговых задачах (жжёт токены), при строгом машиночитаемом выводе (абзац мыслей ломает парсер) и когда гладкое рассуждение принимают за доказательство правоты."
    tags: [tradeoffs]
  - id: chain-of-thought-07
    front: "Гарантирует ли подробная цепочка рассуждений верный ответ?"
    back: "Нет. Бывают правдоподобные, но ложные цепочки: убедительное рассуждение ведёт к неверному ответу. Проверяют результат, а не любуются объяснением."
    tags: [pitfalls]
  - id: chain-of-thought-08
    front: "Чем reasoning-модель отличается в плане CoT?"
    back: "Она проводит цепочку автоматически во внутреннем канале и возвращает преимущественно итог. Явная просьба «думай по шагам» для неё часто избыточна."
    tags: [reasoning]
  - id: chain-of-thought-09
    front: "Почему сырую внутреннюю цепочку reasoning-модели не показывают как доказательство?"
    back: "Она длинная и не нужна пользователю, а главное - внутреннее рассуждение не обязано честно отражать, как модель на самом деле решила. Это рабочий черновик, не верифицированное доказательство."
    tags: [reasoning]
  - id: chain-of-thought-10
    front: "Что делать, если длинная цепочка уехала в неверный ответ?"
    back: "Помогает не «ещё больше рассуждать», а перепроверка - например, self-consistency: прогнать несколько независимых цепочек и взять ответ большинства."
    tags: [pitfalls]
