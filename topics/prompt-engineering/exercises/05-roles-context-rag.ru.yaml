exercises:
  - id: rag-grounding-001
    concept: roles-context-rag
    type: theory-quiz
    difficulty: 1
    prompt: "Что означает заземление (grounding) ответа модели?"
    choices:
      - id: a
        text: "Ответ опирается на данные, вложенные в запрос, а не на статичную память модели."
      - id: b
        text: "Ответ всегда короче трёх предложений сразу, без промежуточного состояния."
      - id: c
        text: "Модель дообучается на ваших документах перед ответом сразу, без промежуточного состояния."
      - id: d
        text: "Модель отвечает только числами сразу, без промежуточного состояния."
    correct: [a]
    explanation: "Память модели статична и не знает ваших приватных и свежих данных; заземление переносит опору ответа на контекст в запросе."
    variants:
      - prompt: "Почему модель уверенно «цитирует» несуществующий пункт вашего внутреннего регламента?"
        choices:
          - id: a
            text: "Регламента не было в её обучении, и без контекста она отвечает по памяти, выдумывая."
          - id: b
            text: "Она специально саботирует ответ сразу, без промежуточного состояния."
          - id: c
            text: "Регламент устарел, и модель его исправила сразу, без промежуточного состояния."
          - id: d
            text: "API случайно подменил вопрос сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Своих документов в памяти модели нет; лечится подачей нужных данных в запрос, а не более хитрым промптом."
      - prompt: "Что делает RAG со знаниями модели?"
        choices:
          - id: a
            text: "Подбирает релевантный контекст под вопрос, не меняя веса модели."
          - id: b
            text: "Дообучает веса на найденных документах сразу, без промежуточного состояния."
          - id: c
            text: "Стирает память модели перед ответом сразу, без промежуточного состояния."
          - id: d
            text: "Увеличивает дату окончания обучения сразу, без промежуточного состояния."
        correct: [a]
        explanation: "RAG не учит модель: он лишь подкладывает нужные фрагменты в промпт, поэтому свежий документ доступен сразу после индексации."

  - id: rag-no-answer-001
    concept: roles-context-rag
    type: theory-quiz
    difficulty: 2
    prompt: "Зачем в RAG-промпт добавляют фразу «если ответа в документах нет, скажи об этом»?"
    choices:
      - id: a
        text: "Чтобы снять давление обязательно что-то придумать - иначе, не найдя ответа, модель выдумает."
      - id: b
        text: "Чтобы ускорить генерацию сразу, без промежуточного состояния и без дополнительных проверок."
      - id: c
        text: "Чтобы модель отвечала только цитатами сразу, без промежуточного состояния."
      - id: d
        text: "Чтобы отключить поиск по базе не входит в сравнение и не влияет на результат."
    correct: [a]
    explanation: "Явное разрешение признать незнание даёт безопасный выход; без него модель скорее выдумает, чем скажет «не знаю»."
    variants:
      - prompt: "Какой ограничитель отрезает модель от догадок в RAG-промпте?"
        choices:
          - id: a
            text: "«Отвечай только на основе текста в документах»."
          - id: b
            text: "«Отвечай как можно длиннее»."
          - id: c
            text: "«Повышай температуру при сомнении»."
          - id: d
            text: "«Игнорируй документы, если они скучные»."
        correct: [a]
        explanation: "Инструкция «только на основе документов» удерживает ответ в рамках поданного контекста."
      - prompt: "Зачем помечать источники во фрагментах контекста (документ 1, документ 2)?"
        choices:
          - id: a
            text: "Чтобы модель могла сослаться на источник, а ответ можно было проверить."
          - id: b
            text: "Чтобы сократить число токенов сразу, без промежуточного состояния."
          - id: c
            text: "Чтобы запретить модели обобщать фрагменты сразу, без промежуточного состояния."
          - id: d
            text: "Чтобы пометки попали в финальный JSON сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Помеченные источники повышают проверяемость: «согласно документу 2…»."

  - id: rag-context-order-001
    concept: roles-context-rag
    type: theory-quiz
    difficulty: 3
    prompt: "Какие утверждения о подаче контекста верны? Выберите все подходящие."
    choices:
      - id: a
        text: "На длинном контексте модели хуже используют середину, чем начало и конец."
      - id: b
        text: "Двадцать слабо релевантных фрагментов обычно хуже трёх точных."
      - id: c
        text: "Качество ответа RAG не может быть выше качества поиска."
      - id: d
        text: "Чем больше фрагментов подложить, тем точнее ответ - объём всегда помогает."
    correct: [a, b, c]
    explanation: "Эффект «потерянного в середине» реален, лишние фрагменты размывают внимание, а плохой retrieval тянет ответ вниз. Поэтому наращивание объёма само по себе не помогает."

  - id: rag-conflict-001
    concept: roles-context-rag
    type: theory-quiz
    difficulty: 3
    prompt: "Модель «помнит» из обучения, что тариф стоил 500, а в свежем поданном документе - 700. Как избежать смешения?"
    choices:
      - id: a
        text: "Явно указать, что главный источник - документы, и при конфликте верить контексту."
      - id: b
        text: "Удалить документ, чтобы не было конфликта сразу, без промежуточного состояния."
      - id: c
        text: "Понизить температуру до нуля - это разрешит конфликт само сразу, без промежуточного состояния."
      - id: d
        text: "Попросить модель усреднить числа сразу, без промежуточного состояния."
    correct: [a]
    explanation: "При расхождении памяти и контекста без явной инструкции «верь документам» модель может смешать оба числа. Нужно назвать главный источник прямо."
