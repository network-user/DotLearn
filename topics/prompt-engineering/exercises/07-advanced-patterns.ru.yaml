exercises:
  - id: advanced-react-001
    concept: advanced-patterns
    type: theory-quiz
    difficulty: 1
    prompt: "Что описывает паттерн ReAct?"
    choices:
      - id: a
        text: "Цикл «думает → вызывает инструмент → наблюдает результат → повторяет», пока не готов ответить."
      - id: b
        text: "Запуск одного и того же промпта пять раз и выбор ответа большинства."
      - id: c
        text: "Промпт, который генерирует другой промпт."
      - id: d
        text: "Оценку ответа модели по рубрике от 1 до 5."
    correct: [a]
    explanation: "ReAct соединяет рассуждение с действиями через инструменты: модель чередует мысль и вызов инструмента, пока не соберёт данные для ответа."
    variants:
      - prompt: "Зачем ReAct-агенту вызывать инструменты, а не отвечать из памяти?"
        choices:
          - id: a
            text: "Чтобы получить данные за пределами памяти модели: курс валют, содержимое файла, ответ сервиса."
          - id: b
            text: "Чтобы ответ всегда был в формате JSON."
          - id: c
            text: "Чтобы понизить температуру до нуля."
          - id: d
            text: "Чтобы запретить модели рассуждать."
        correct: [a]
        explanation: "Инструменты приносят свежие и внешние данные, которые модель иначе выдумала бы."
      - prompt: "Как связаны количество инструментов у ReAct-агента и риск prompt injection?"
        choices:
          - id: a
            text: "Чем больше инструментов и прав, тем серьёзнее последствия перехваченной инструкции."
          - id: b
            text: "Число инструментов на риск инъекции не влияет."
          - id: c
            text: "Больше инструментов всегда снижает риск инъекции."
          - id: d
            text: "Инъекция возможна только без инструментов."
        correct: [a]
        explanation: "Цикл «думает-действует» послушно исполнит и вредную команду из observation, а права определяют масштаб ущерба."

  - id: advanced-self-consistency-001
    concept: advanced-patterns
    type: theory-quiz
    difficulty: 2
    prompt: "Как работает self-consistency и какова его цена?"
    choices:
      - id: a
        text: "Запускает несколько независимых цепочек при ненулевой температуре и берёт ответ большинства; стоит в N раз дороже."
      - id: b
        text: "Запускает одну цепочку при нулевой температуре; стоит как обычный запрос."
      - id: c
        text: "Заставляет модель вызвать инструмент проверки; стоит один лишний вызов."
      - id: d
        text: "Генерирует улучшенный промпт; цена - один мета-запрос."
    correct: [a]
    explanation: "Разные пути рассуждения чаще сходятся к верному ответу; голосование вытягивает точность ценой N-кратной стоимости."
    variants:
      - prompt: "Почему self-consistency нельзя запускать при нулевой температуре?"
        choices:
          - id: a
            text: "Без случайности все прогоны одинаковы, и голосовать не за что."
          - id: b
            text: "Нулевая температура запрещена в API."
          - id: c
            text: "При нуле модель отказывается рассуждать."
          - id: d
            text: "Нулевая температура удваивает стоимость."
        correct: [a]
        explanation: "Для голосования нужны разные цепочки; разнообразие даёт ненулевая температура."
      - prompt: "В каком случае self-consistency оправдан?"
        choices:
          - id: a
            text: "Когда ошибка дорога и стоит платить за несколько прогонов ради надёжности."
          - id: b
            text: "Для любой задачи по умолчанию - он всегда выгоден."
          - id: c
            text: "Только для перевода коротких фраз."
          - id: d
            text: "Когда нужен строгий JSON по схеме."
        correct: [a]
        explanation: "Паттерн дорог (N запросов), поэтому его приберегают для задач с дорогой ошибкой, а не включают всегда."

  - id: advanced-chaining-001
    concept: advanced-patterns
    type: theory-quiz
    difficulty: 3
    prompt: "В чём преимущества цепочки промптов перед одним перегруженным запросом? Выберите все подходящие."
    choices:
      - id: a
        text: "Каждый шаг проще, поэтому выполняется качественнее."
      - id: b
        text: "Цепочку можно отлаживать по звеньям: видно, где всё пошло не так."
      - id: c
        text: "Ошибка раннего звена не может повлиять на последующие."
      - id: d
        text: "Цепочка всегда дешевле по числу токенов, чем один запрос."
    correct: [a, b]
    explanation: "Простые шаги качественнее и отлаживаются по отдельности. Но ошибка раннего звена как раз протекает дальше (поэтому звенья валидируют), а несколько запросов обычно не дешевле одного."

  - id: advanced-judge-001
    concept: advanced-patterns
    type: theory-quiz
    difficulty: 3
    prompt: "Что верно про оценщика (LLM-as-judge)? Выберите все подходящие."
    choices:
      - id: a
        text: "Это отдельный вызов модели, оценивающий ответ по заданным критериям."
      - id: b
        text: "Ему нужна чёткая рубрика, иначе оценки расплываются."
      - id: c
        text: "Он подвержен смещениям (например, к более длинному или первому ответу)."
      - id: d
        text: "Он полностью заменяет выборочную проверку человеком на ответственных решениях."
    correct: [a, b, c]
    explanation: "Судья оценивает по рубрике и масштабируется дёшево, но наследует смещения и ошибки модели, поэтому не заменяет человека на ответственных решениях."

  - id: advanced-complexity-001
    concept: advanced-patterns
    type: theory-quiz
    difficulty: 4
    prompt: "Команда сразу собрала ReAct-агента с self-consistency и оценщиком на каждом шаге для задачи, которую решает один аккуратный промпт. Что здесь не так?"
    choices:
      - id: a
        text: "Преждевременное усложнение: паттерны складывают стоимость, начинать надо с простейшего решения и усложнять, лишь упёршись в потолок."
      - id: b
        text: "Ничего: чем больше паттернов, тем всегда лучше результат."
      - id: c
        text: "Проблема только в порядке паттернов, а не в их количестве."
      - id: d
        text: "Self-consistency и оценщик несовместимы технически."
    correct: [a]
    explanation: "Комбинация паттернов - это десятки вызовов модели на задачу. Если одиночный промпт справляется, остальное лишь жжёт деньги и время."
