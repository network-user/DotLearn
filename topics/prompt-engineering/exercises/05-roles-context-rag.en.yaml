exercises:
  - id: rag-grounding-001
    concept: roles-context-rag
    type: theory-quiz
    difficulty: 1
    prompt: "What does grounding a model's answer mean?"
    choices:
      - id: a
        text: "The answer rests on data embedded in the request, not the model's static memory."
      - id: b
        text: "The answer is always under three sentences."
      - id: c
        text: "The model is fine-tuned on your documents before answering."
      - id: d
        text: "The model answers only with numbers."
    correct: [a]
    explanation: "Model memory is static and does not know your private or fresh data; grounding shifts reliance to context in the request."
    variants:
      - prompt: "Why does the model confidently \"quote\" a nonexistent clause of your internal policy?"
        choices:
          - id: a
            text: "The policy was not in its training; without context it answers from memory and invents."
          - id: b
            text: "It is deliberately sabotaging the answer."
          - id: c
            text: "The policy is outdated and the model corrected it."
          - id: d
            text: "The API accidentally swapped the question."
        correct: [a]
        explanation: "Your documents are not in model memory; fix by supplying needed data in the request, not a cleverer prompt."
      - prompt: "What does RAG do to the model's knowledge?"
        choices:
          - id: a
            text: "Selects relevant context per question without changing model weights."
          - id: b
            text: "Fine-tunes weights on retrieved documents."
          - id: c
            text: "Erases model memory before answering."
          - id: d
            text: "Extends the training cutoff date."
        correct: [a]
        explanation: "RAG does not teach the model: it supplies needed fragments in the prompt, so a fresh document is available right after indexing."

  - id: rag-no-answer-001
    concept: roles-context-rag
    type: theory-quiz
    difficulty: 2
    prompt: "Why add \"if the answer is not in the documents, say so\" to a RAG prompt?"
    choices:
      - id: a
        text: "To remove pressure to invent something, since otherwise when it finds nothing, the model makes things up."
      - id: b
        text: "To speed up generation."
      - id: c
        text: "So the model answers only with quotes."
      - id: d
        text: "To disable search over the knowledge base."
    correct: [a]
    explanation: "Explicit permission to admit ignorance gives a safe exit; without it the model invents rather than saying it does not know."
    variants:
      - prompt: "Which limiter cuts the model off from guessing in a RAG prompt?"
        choices:
          - id: a
            text: "\"Answer only based on the text in the documents.\""
          - id: b
            text: "\"Answer as long as possible.\""
          - id: c
            text: "\"Raise temperature when uncertain.\""
          - id: d
            text: "\"Ignore documents if they are boring.\""
        correct: [a]
        explanation: "\"Only based on documents\" keeps the answer within supplied context."
      - prompt: "Why label sources in context fragments (document 1, document 2)?"
        choices:
          - id: a
            text: "So the model can cite a source and the answer can be verified."
          - id: b
            text: "To reduce token count."
          - id: c
            text: "To forbid the model from synthesizing fragments."
          - id: d
            text: "So labels appear in the final JSON."
        correct: [a]
        explanation: "Labeled sources improve verifiability: \"according to document 2…\"."

  - id: rag-context-order-001
    concept: roles-context-rag
    type: theory-quiz
    difficulty: 3
    prompt: "Which statements about supplying context are true? Select all that apply."
    choices:
      - id: a
        text: "On long context the model uses the middle worse than the start and end."
      - id: b
        text: "Twenty weakly relevant fragments are usually worse than three precise ones."
      - id: c
        text: "RAG answer quality cannot exceed retrieval quality."
      - id: d
        text: "More fragments always improve accuracy: volume always helps."
    correct: [a, b, c]
    explanation: "Lost-in-the-middle is real, extra fragments dilute attention, and poor retrieval drags answers down. More volume alone does not help."

  - id: rag-conflict-001
    concept: roles-context-rag
    type: theory-quiz
    difficulty: 3
    prompt: "The model \"remembers\" from training that a plan cost 500, but the fresh supplied document says 700. How do you avoid blending?"
    choices:
      - id: a
        text: "Explicitly state documents are the primary source and on conflict trust context."
      - id: b
        text: "Remove the document to avoid conflict."
      - id: c
        text: "Set temperature to zero; that resolves conflict on its own."
      - id: d
        text: "Ask the model to average the numbers."
    correct: [a]
    explanation: "When memory and context disagree without \"trust documents\" the model may mix both numbers. Name the winning source explicitly."
