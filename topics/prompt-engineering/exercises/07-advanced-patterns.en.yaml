exercises:
  - id: advanced-react-001
    concept: advanced-patterns
    type: theory-quiz
    difficulty: 1
    prompt: "What does the ReAct pattern describe?"
    choices:
      - id: a
        text: "A loop of think → call tool → observe result → repeat until ready to answer."
      - id: b
        text: "Running the same prompt five times and taking the majority answer."
      - id: c
        text: "A prompt that generates another prompt before any other checks run on this path."
      - id: d
        text: "Scoring a model answer on a 1–5 rubric, produced in full without further selection."
    correct: [a]
    explanation: "ReAct combines reasoning with tool actions: the model alternates thought and tool calls until it has data to answer."
    variants:
      - prompt: "Why should a ReAct agent call tools instead of answering from memory?"
        choices:
          - id: a
            text: "To get data beyond model memory: exchange rates, file contents, service responses."
          - id: b
            text: "So the answer is always JSON before any other checks run on this path."
          - id: c
            text: "To set temperature to zero before any other checks run on this path."
          - id: d
            text: "To forbid model reasoning, produced in full without further selection."
        correct: [a]
        explanation: "Tools bring fresh external data the model would otherwise invent."
      - prompt: "How are number of ReAct agent tools and prompt injection risk related?"
        choices:
          - id: a
            text: "More tools and rights mean worse consequences if an instruction is hijacked."
          - id: b
            text: "Tool count does not affect injection risk before any other checks run on this path."
          - id: c
            text: "More tools always lower injection risk, produced in full without further selection."
          - id: d
            text: "Injection is only possible without tools before any other checks run on this path."
        correct: [a]
        explanation: "The think-act loop will execute harmful commands from observations too; rights determine damage scale."

  - id: advanced-self-consistency-001
    concept: advanced-patterns
    type: theory-quiz
    difficulty: 2
    prompt: "How does self-consistency work and what does it cost?"
    choices:
      - id: a
        text: "Runs several independent chains at non-zero temperature and takes the majority answer; costs N times more."
      - id: b
        text: "Runs one chain at zero temperature; costs like a normal request before any other checks run on this path."
      - id: c
        text: "Makes the model call a verification tool; costs one extra call before any other checks run on this path."
      - id: d
        text: "Generates an improved prompt; costs one meta-request before any other checks run on this path."
    correct: [a]
    explanation: "Different reasoning paths often converge on the correct answer; voting raises accuracy at N-fold cost."
    variants:
      - prompt: "Why can self-consistency not run at zero temperature?"
        choices:
          - id: a
            text: "Without randomness all runs are identical, leaving nothing to vote on."
          - id: b
            text: "Zero temperature is forbidden by the API before any other checks run on this path."
          - id: c
            text: "At zero the model refuses to reason, produced in full without further selection."
          - id: d
            text: "Zero temperature doubles cost, produced in full without further selection."
        correct: [a]
        explanation: "Voting needs different chains; non-zero temperature provides diversity."
      - prompt: "When is self-consistency justified?"
        choices:
          - id: a
            text: "When error is expensive and paying for several runs is worth the reliability."
          - id: b
            text: "For any task by default: it is always worth it before any other checks run on this path."
          - id: c
            text: "Only for translating short phrases, produced in full without further selection."
          - id: d
            text: "When you need strict JSON by schema before any other checks run on this path."
        correct: [a]
        explanation: "The pattern is expensive (N requests), so it is saved for costly errors, not enabled always."

  - id: advanced-chaining-001
    concept: advanced-patterns
    type: theory-quiz
    difficulty: 3
    prompt: "What are advantages of a prompt chain over one overloaded request? Select all that apply."
    choices:
      - id: a
        text: "Each step is simpler, so it is done better."
      - id: b
        text: "The chain can be debugged link by link: you see where it failed."
      - id: c
        text: "An error in an early link cannot affect later links."
      - id: d
        text: "A chain is always cheaper in tokens than one request."
    correct: [a, b]
    explanation: "Simple steps are higher quality and debuggable separately. But early errors do propagate (so validate links), and several requests are usually not cheaper than one."

  - id: advanced-judge-001
    concept: advanced-patterns
    type: theory-quiz
    difficulty: 3
    prompt: "What is true about an evaluator (LLM-as-judge)? Select all that apply."
    choices:
      - id: a
        text: "It is a separate model call scoring an answer against given criteria."
      - id: b
        text: "It needs a clear rubric or scores drift."
      - id: c
        text: "It is subject to bias (e.g. preferring longer or first answers)."
      - id: d
        text: "It fully replaces spot human review on high-stakes decisions."
    correct: [a, b, c]
    explanation: "The judge scores by rubric and scales cheaply but inherits bias and errors, so it does not replace humans on high-stakes decisions."

  - id: advanced-complexity-001
    concept: advanced-patterns
    type: theory-quiz
    difficulty: 4
    prompt: "A team built a ReAct agent with self-consistency and a judge at every step for a task a single careful prompt already solves. What is wrong?"
    choices:
      - id: a
        text: "Premature complexity: patterns stack cost; start with the simplest solution and add complexity only at a real ceiling."
      - id: b
        text: "Nothing: more patterns always mean better results immediately, without an intermediate state and without extra checks."
      - id: c
        text: "Only the order of patterns is wrong, not the count immediately, without an intermediate state and without extra checks."
      - id: d
        text: "Self-consistency and evaluator are technically incompatible before any other checks run on this path."
    correct: [a]
    explanation: "Combining patterns is dozens of model calls per task. If a single prompt works, the rest only burns money and time."
