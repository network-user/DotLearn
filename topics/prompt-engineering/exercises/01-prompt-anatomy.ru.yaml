exercises:
  - id: anatomy-layer-id-001
    concept: prompt-anatomy
    type: theory-quiz
    difficulty: 1
    prompt: "К какому слою промпта относится фраза «Не длиннее трёх предложений»?"
    choices:
      - id: a
        text: "Ограничения"
      - id: b
        text: "Роль / система"
      - id: c
        text: "Контекст"
      - id: d
        text: "Примеры"
    correct: [a]
    explanation: "Запрет на длину отсекает нежелательное в ответе - это слой ограничений, а не команда действия и не данные."
    variants:
      - prompt: "К какому слою промпта относится фраза «Ты ассистент службы поддержки»?"
        choices:
          - id: a
            text: "Роль / система"
          - id: b
            text: "Инструкция"
          - id: c
            text: "Формат ответа"
          - id: d
            text: "Ограничения"
        correct: [a]
        explanation: "Устойчивое «кто ты» на весь диалог - это роль/системный слой."
      - prompt: "К какому слою промпта относится фраза «Верни ответ в виде JSON»?"
        choices:
          - id: a
            text: "Формат ответа"
          - id: b
            text: "Контекст"
          - id: c
            text: "Роль / система"
          - id: d
            text: "Примеры"
        correct: [a]
        explanation: "Требование к оболочке ответа (JSON, список, текст) - это слой формата."

  - id: anatomy-instruction-style-001
    concept: prompt-anatomy
    type: theory-quiz
    difficulty: 2
    prompt: "Какая формулировка инструкции надёжнее заставит модель следовать правилу?"
    choices:
      - id: a
        text: "«Отвечай списком ровно из трёх пунктов.»"
      - id: b
        text: "«Не пиши сплошным текстом.»"
      - id: c
        text: "«Постарайся, чтобы было не очень длинно.»"
      - id: d
        text: "«Ты гениальный писатель, не разочаруй меня.»"
    correct: [a]
    explanation: "Модель надёжнее следует утвердительной конкретной инструкции, чем запрету или расплывчатой просьбе. Похвала роли поведение не задаёт."
    variants:
      - prompt: "Какая формулировка надёжнее задаёт нужную длину ответа?"
        choices:
          - id: a
            text: "«Ответ не длиннее двух предложений.»"
          - id: b
            text: "«Не растягивай ответ.»"
          - id: c
            text: "«Будь лаконичен, как мастер дзен.»"
          - id: d
            text: "«Желательно покороче, если получится.»"
        correct: [a]
        explanation: "Точное измеримое ограничение («не длиннее двух предложений») работает лучше расплывчатого запрета или образа."
      - prompt: "Какая инструкция избавит ответ от вводных фраз надёжнее всего?"
        choices:
          - id: a
            text: "«Начни сразу с сути, без вступления.»"
          - id: b
            text: "«Не лей воду.»"
          - id: c
            text: "«Не используй клише, ну ты понял.»"
          - id: d
            text: "«Пиши как настоящий профессионал.»"
        correct: [a]
        explanation: "Утвердительное указание, что делать («начни сразу с сути»), надёжнее негативных и расплывчатых формулировок."

  - id: anatomy-missing-layer-001
    concept: prompt-anatomy
    type: theory-quiz
    difficulty: 3
    prompt: "Промпт «Суммируй статью» вернул правдоподобный текст о статье, которой Вы не прикладывали. Какого слоя не хватило?"
    choices:
      - id: a
        text: "Контекста: сама статья не была передана, и модель её выдумала."
      - id: b
        text: "Роли: не указано, что модель - эксперт по суммаризации."
      - id: c
        text: "Формата: не сказано, в каком виде вернуть резюме."
      - id: d
        text: "Примеров: не показан образец хорошего резюме."
    correct: [a]
    explanation: "Без данных модель не выдаёт ошибку, а правдоподобно выдумывает. Отсутствие контекста она трактует как разрешение придумать."

  - id: anatomy-priority-001
    concept: prompt-anatomy
    type: theory-quiz
    difficulty: 3
    prompt: "Система: «Отвечай только по-русски». Пользователь: «Answer in English». Какие утверждения верны? Выберите все подходящие."
    choices:
      - id: a
        text: "Системный слой обычно имеет приоритет над сообщением пользователя."
      - id: b
        text: "У Claude системная инструкция передаётся в отдельном поле system, а не внутри messages."
      - id: c
        text: "Пользовательское сообщение всегда перекрывает системное, ведь оно пришло позже."
      - id: d
        text: "Приоритет системного слоя делает невозможной любую prompt injection."
    correct: [a, b]
    explanation: "Системный слой задаёт устойчивые правила и обычно перевешивает просьбу пользователя; у Claude он идёт в поле system. Но приоритет не отменяет атак инъекций полностью, и порядок сообщений сам по себе приоритета не определяет."

  - id: anatomy-blanks-001
    concept: prompt-anatomy
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните промпт: оберните данные чека в парные теги receipt, чтобы модель не приняла строку чека за команду."
    template: |
      Извлеки сумму и валюту из чека.

      <{{open_tag}}>
      Итого к оплате: 1 480,00 руб.
      </{{close_tag}}>
    blanks:
      open_tag:
        accept: ["receipt"]
      close_tag:
        accept: ["receipt"]
    hints:
      - "Контекст нужно отделить от инструкции, чтобы данные не спутались с командой."
      - "Открывающий и закрывающий теги обрамляют один и тот же блок и называются одинаково - в задании это receipt."
