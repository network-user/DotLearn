exercises:
  - id: cot-why-001
    concept: chain-of-thought
    type: theory-quiz
    difficulty: 1
    prompt: "Почему просьба «рассуждай по шагам» повышает точность на многошаговых задачах?"
    choices:
      - id: a
        text: "Модель пишет промежуточные шаги, и финальный ответ опирается на уже посчитанное."
      - id: b
        text: "Просьба переключает модель в режим калькулятора с точной арифметикой."
      - id: c
        text: "Просьба дообучает модель прямо во время ответа."
      - id: d
        text: "Просьба заставляет модель обращаться к интернету за решением."
    correct: [a]
    explanation: "Модель генерирует токены слева направо; развёрнутые шаги попадают в контекст, и к моменту ответа промежуточные величины уже посчитаны."
    variants:
      - prompt: "Что даёт модели цепочка рассуждений (chain of thought)?"
        choices:
          - id: a
            text: "Место развернуть промежуточные шаги до финального ответа."
          - id: b
            text: "Новые знания, которых не было при обучении."
          - id: c
            text: "Доступ к внешнему калькулятору."
          - id: d
            text: "Гарантию, что ответ всегда верный."
        correct: [a]
        explanation: "CoT не добавляет знаний и не гарантирует правоту - он даёт пространство применить то, что модель и так умеет."
      - prompt: "Почему без CoT модель чаще промахивается на задаче из нескольких шагов?"
        choices:
          - id: a
            text: "Она обязана выдать ответ первым токеном, не развернув промежуточные величины."
          - id: b
            text: "Она специально занижает точность без приписки."
          - id: c
            text: "Многошаговые задачи API запрещает решать без CoT."
          - id: d
            text: "Без CoT модель отвечает на другом языке."
        correct: [a]
        explanation: "Требуя сразу финал, Вы заставляете модель угадать ответ до того, как она прошла путь к нему."

  - id: cot-answer-position-001
    concept: chain-of-thought
    type: theory-quiz
    difficulty: 2
    prompt: "Почему промпт «дай число, потом объясни» обнуляет пользу цепочки рассуждений?"
    choices:
      - id: a
        text: "Ответ выходит первым токеном - до рассуждения, так что шаги уже ни на что не влияют."
      - id: b
        text: "Объяснение после ответа модель пишет на другом языке."
      - id: c
        text: "Модель отказывается объяснять то, что уже сказала."
      - id: d
        text: "Парсер не умеет читать ответ перед объяснением."
    correct: [a]
    explanation: "Для модели порядок токенов и есть порядок мышления. Ответ обязан стоять в конце, после шагов."
    variants:
      - prompt: "Как правильно расположить части ответа при chain of thought?"
        choices:
          - id: a
            text: "Сначала промежуточные шаги, итоговый ответ - в конце."
          - id: b
            text: "Сначала итоговый ответ, затем шаги для проверки."
          - id: c
            text: "Шаги и ответ вперемешку - порядок не важен."
          - id: d
            text: "Только итоговый ответ, шаги модель держит в уме."
        correct: [a]
        explanation: "Каждый шаг должен попасть в контекст до ответа, поэтому ответ ставят последним."
      - prompt: "Что такое zero-shot chain of thought?"
        choices:
          - id: a
            text: "Вызов рассуждения одной фразой «решай по шагам», без примеров."
          - id: b
            text: "Цепочка, для которой обязательно нужны три примера."
          - id: c
            text: "Рассуждение, скрытое от пользователя в reasoning-модели."
          - id: d
            text: "Запрет на любые промежуточные шаги."
        correct: [a]
        explanation: "Достаточно сигнала «разверни рассуждение» - примеры не требуются."

  - id: cot-when-harmful-001
    concept: chain-of-thought
    type: theory-quiz
    difficulty: 3
    prompt: "В каких случаях chain of thought скорее вредит? Выберите все подходящие."
    choices:
      - id: a
        text: "Задача решается в один шаг (перевод слова, извлечение даты)."
      - id: b
        text: "Код парсит строгий JSON, а абзац рассуждения встаёт перед ним."
      - id: c
        text: "Многошаговая арифметика, где легко ошибиться без промежуточных вычислений."
      - id: d
        text: "Нужно сравнить два договора по нескольким критериям."
    correct: [a, b]
    explanation: "На одношаговых задачах CoT жжёт токены, а перед строгим JSON ломает парсер. Многошаговые арифметика и сравнение - как раз случаи, где цепочка помогает."

  - id: cot-plausible-wrong-001
    concept: chain-of-thought
    type: theory-quiz
    difficulty: 4
    prompt: "Модель выдала длинную, гладкую и убедительную цепочку рассуждений, но финальный ответ неверен. Какой вывод корректен? Выберите все подходящие."
    choices:
      - id: a
        text: "Гладкая цепочка не гарантирует правоту - бывают правдоподобные, но ложные рассуждения."
      - id: b
        text: "Длинную цепочку можно перепроверить, прогнав несколько независимых рассуждений и взяв ответ большинства (self-consistency)."
      - id: c
        text: "Раз рассуждение подробное, ответ заведомо верен, и проверять не нужно."
      - id: d
        text: "Видимая цепочка reasoning-модели - это верифицированное доказательство её решения."
    correct: [a, b]
    explanation: "Развёрнутое объяснение выглядит надёжнее, чем есть; верность проверяют результатом или голосованием нескольких цепочек, а не красотой объяснения. Внутреннее рассуждение модели не обязано быть честным отражением решения."
