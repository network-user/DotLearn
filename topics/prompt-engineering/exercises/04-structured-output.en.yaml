exercises:
  - id: structured-why-001
    concept: structured-output
    type: theory-quiz
    difficulty: 1
    prompt: "Why is structured output (e.g. JSON by schema) needed?"
    choices:
      - id: a
        text: "So the model's answer can be parsed reliably by a machine as input to other code."
      - id: b
        text: "So the model answers faster thanks to short fields."
      - id: c
        text: "To hide the answer from the user."
      - id: d
        text: "To forbid the model from reasoning."
    correct: [a]
    explanation: "Once the answer becomes input to a database, frontend, or next step, its shape must be predictable to the character."
    variants:
      - prompt: "What does JSON Schema in structured output mode guarantee?"
        choices:
          - id: a
            text: "The answer is valid JSON with required keys and correct types."
          - id: b
            text: "Field values are always factually correct."
          - id: c
            text: "The model will not reason before answering."
          - id: d
            text: "The answer is always under 100 characters."
        correct: [a]
        explanation: "Schema covers form (keys and types), not truth of values."
      - prompt: "Why is free text a poor input for a program?"
        choices:
          - id: a
            text: "Its shape is unpredictable, and parsers break on preambles, wrappers, and units inside numbers."
          - id: b
            text: "Free text is always longer than JSON."
          - id: c
            text: "The model cannot generate free text."
          - id: d
            text: "Free text cannot be stored in a database."
        correct: [a]
        explanation: "Programs need shape predictable to the character; free text does not provide it."

  - id: structured-no-wrapper-001
    concept: structured-output
    type: theory-quiz
    difficulty: 2
    prompt: "JSON.parse fails because the model prefixes the answer with \"Sure, here is the data:\" and wraps it in a markdown block. What fixes this most reliably?"
    choices:
      - id: a
        text: "Explicitly forbid markdown and explanations and/or prefill the answer starting with {."
      - id: b
        text: "Ask the model to answer longer so JSON definitely fits."
      - id: c
        text: "Raise temperature so answers diversify."
      - id: d
        text: "Add five more examples of polite preambles to the prompt."
    correct: [a]
    explanation: "The most common parsing failure is wrapper and preamble. Remove them with a direct ban and prefilling the opening brace."
    variants:
      - prompt: "Why wrap input data and desired output in tags like <email> and <json>?"
        choices:
          - id: a
            text: "So the model does not confuse what to process with what to return."
          - id: b
            text: "So the answer uses fewer tokens."
          - id: c
            text: "To disable model reasoning."
          - id: d
            text: "So tags appear as fields in the final JSON."
        correct: [a]
        explanation: "Delimiters separate data and output, lowering the risk that input is treated as a command or included in the answer."
      - prompt: "What does prefilling the answer with { do?"
        choices:
          - id: a
            text: "Forces the model to continue from an open brace, making introductory chatter impossible."
          - id: b
            text: "Doubles answer length."
          - id: c
            text: "Switches the model into reasoning mode."
          - id: d
            text: "Forbids strings in JSON."
        correct: [a]
        explanation: "If the first characters are {, the model must write an object immediately, without a polite preamble."

  - id: structured-schema-blanks-001
    concept: structured-output
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the JSON Schema: amount is a number, currency a string, both required, no extra fields."
    template: |
      {
        "type": "object",
        "properties": {
          "amount": { "type": "{{amount_type}}" },
          "currency": { "type": "{{currency_type}}" }
        },
        "required": ["amount", "{{required_second}}"],
        "{{no_extra_key}}": false
      }
    blanks:
      amount_type:
        accept: ["number", "integer"]
      currency_type:
        accept: ["string"]
      required_second:
        accept: ["currency"]
      no_extra_key:
        accept: ["additionalProperties"]
    hints:
      - "Types use standard JSON Schema names; amount is numeric, currency is text."
      - "Forbidding extra fields in JSON Schema uses one key set to false."

  - id: structured-no-data-001
    concept: structured-output
    type: theory-quiz
    difficulty: 3
    prompt: "The schema requires field amount of type number. The email has no amount. What happens and how do you design for it?"
    choices:
      - id: a
        text: "The model still returns a number (invented or zero); to distinguish \"no data\" allow null/optional and ask for null when missing."
      - id: b
        text: "The model returns a validation error and the request fails, as intended."
      - id: c
        text: "The model leaves an empty string and the parser understands."
      - id: d
        text: "The schema inserts null automatically; no extra steps needed."
    correct: [a]
    explanation: "Schema guarantees form, not meaning: number must be a number. To tell \"zero\" from \"no data,\" explicitly allow null or optional field."

  - id: structured-units-001
    concept: structured-output
    type: theory-quiz
    difficulty: 3
    prompt: "Which statements about schema design for amount \"1480 RUB\" are true? Select all that apply."
    choices:
      - id: a
        text: "Keep number and unit in separate fields (amount: number, currency: string)."
      - id: b
        text: "If the field is one string, the model returns \"1480 RUB\" and you parse units manually."
      - id: c
        text: "Very large deeply nested schemas are followed as reliably as simple ones."
      - id: d
        text: "Structured output guarantees the amount in the field is factually correct."
    correct: [a, b]
    explanation: "Split magnitude and unit or the number arrives as a string with units. Large schemas are followed worse; schema guarantees form, not factual correctness of values."
