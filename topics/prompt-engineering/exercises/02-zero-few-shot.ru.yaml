exercises:
  - id: fewshot-define-001
    concept: zero-few-shot
    type: theory-quiz
    difficulty: 1
    prompt: "Чем few-shot отличается от zero-shot?"
    choices:
      - id: a
        text: "Few-shot добавляет к инструкции несколько решённых примеров «вход → выход»."
      - id: b
        text: "Few-shot дообучает веса модели на Ваших данных."
      - id: c
        text: "Few-shot - это запрос без единого примера, только инструкция."
      - id: d
        text: "Few-shot работает только с картинками, а zero-shot - с текстом."
    correct: [a]
    explanation: "Zero-shot - задача только словами; few-shot добавляет несколько образцов «вход → выход». Веса при этом не меняются."
    variants:
      - prompt: "Что такое zero-shot промпт?"
        choices:
          - id: a
            text: "Запрос, где задача задана только словами, без примеров ответа."
          - id: b
            text: "Запрос с тремя и более примерами перед задачей."
          - id: c
            text: "Запрос, после которого модель дообучается."
          - id: d
            text: "Запрос, где модели запрещено отвечать."
        correct: [a]
        explanation: "Zero-shot объясняет задачу словами и не содержит решённых образцов."
      - prompt: "За счёт чего few-shot делает ответ модели единообразным?"
        choices:
          - id: a
            text: "Модель продолжает шаблон, заданный примерами «вход → выход»."
          - id: b
            text: "Примеры физически меняют параметры модели."
          - id: c
            text: "Примеры включают режим строгой типизации в API."
          - id: d
            text: "Примеры запрещают модели использовать редкие слова."
        correct: [a]
        explanation: "Модель - машина продолжения текста: самое вероятное продолжение единообразных пар - ответ в той же форме."

  - id: fewshot-consistency-001
    concept: zero-few-shot
    type: theory-quiz
    difficulty: 2
    prompt: "Что важнее всего для качества few-shot набора примеров?"
    choices:
      - id: a
        text: "Единообразие формата: один регистр, один словарь меток, одинаковая структура строк."
      - id: b
        text: "Максимальное число примеров - чем больше, тем лучше."
      - id: c
        text: "Чтобы примеры были как можно ближе к текущему запросу."
      - id: d
        text: "Чтобы все примеры относились к одному классу."
    correct: [a]
    explanation: "Решает согласованность формы, а не количество. Разнобой учит модель отвечать вразнобой, перекос классов переносится в ответ, а слишком близкие примеры провоцируют копирование."
    variants:
      - prompt: "Почему набор «всё супер → Позитив», «ужасно → негативный», «ну такое → Нейтральная оценка» плох?"
        choices:
          - id: a
            text: "У примеров нет единой формы для продолжения - разные регистр, словарь и структура."
          - id: b
            text: "Примеров слишком мало - нужно минимум десять."
          - id: c
            text: "Метки слишком короткие, модели нужны абзацы."
          - id: d
            text: "Примеры противоречат фактам о товарах."
        correct: [a]
        explanation: "Разнобой формы учит модель, что разнобой допустим; единый регистр, словарь и структура важнее количества."
      - prompt: "Почему стоит добавлять в few-shot пограничные случаи, а не только яркие примеры?"
        choices:
          - id: a
            text: "Иначе модель не поймёт, как размечать спорное вроде «нормально, но дорого»."
          - id: b
            text: "Пограничные случаи сокращают число токенов в запросе."
          - id: c
            text: "Яркие примеры запрещены правилами API."
          - id: d
            text: "Без них модель откажется отвечать."
        correct: [a]
        explanation: "Один пример на трудный класс ценнее трёх однотипных лёгких: он показывает, куда относить спорное."

  - id: fewshot-when-skip-001
    concept: zero-few-shot
    type: theory-quiz
    difficulty: 3
    prompt: "В каком случае добавлять few-shot примеры скорее вредно? Выберите все подходящие."
    choices:
      - id: a
        text: "Задача (перевод, простая суммаризация) и так надёжно решается в zero-shot."
      - id: b
        text: "Нужны пошаговые рассуждения для арифметики, а не готовая форма ответа."
      - id: c
        text: "Нужен строгий JSON, который модель умеет выдавать по схеме структурного вывода."
      - id: d
        text: "Модель путает словарь меток и отвечает то «позитив», то «положительный»."
    correct: [a, b, c]
    explanation: "Примеры жгут токены без пользы там, где zero-shot уже надёжен; для рассуждений нужен chain-of-thought, а не пары «задача → ответ»; для строгого JSON надёжнее схема. А вот разнобой меток (d) - как раз случай, где few-shot помогает."

  - id: fewshot-imbalance-001
    concept: zero-few-shot
    type: theory-quiz
    difficulty: 4
    prompt: "Классификатор тональности на few-shot стал чаще ставить «негатив», хотя реальная доля негатива не выросла. В наборе примеров пять «негатив» и один «позитив». Что наиболее вероятно и как это чинить?"
    choices:
      - id: a
        text: "Модель переняла перекос классов из примеров; нужно сбалансировать состав набора по классам."
      - id: b
        text: "Модель сломалась и требует дообучения на новых данных."
      - id: c
        text: "Виноват порядок слов в инструкции; примеры на смещение не влияют."
      - id: d
        text: "Нужно увеличить число «негатив»-примеров, чтобы перекрыть шум."
    correct: [a]
    explanation: "Дисбаланс примеров переносится в ответ как смещение: модель перенимает частоту классов из контекста. Лечится балансировкой набора, а не дообучением и не усилением перекоса."
