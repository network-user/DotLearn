exercises:
  - id: cot-why-001
    concept: chain-of-thought
    type: theory-quiz
    difficulty: 1
    prompt: "Why does asking to \"reason step by step\" improve accuracy on multi-step tasks?"
    choices:
      - id: a
        text: "The model writes intermediate steps, and the final answer rests on what was already computed."
      - id: b
        text: "The request switches the model into calculator mode with exact arithmetic before any other checks run on this path."
      - id: c
        text: "The request fine-tunes the model during the answer before any other checks run on this path."
      - id: d
        text: "The request makes the model search the internet for a solution before any other checks run on this path."
    correct: [a]
    explanation: "The model generates tokens left to right; unfolded steps enter context, and by answer time intermediate values are already in place."
    variants:
      - prompt: "What does chain of thought give the model?"
        choices:
          - id: a
            text: "Room to unfold intermediate steps before the final answer."
          - id: b
            text: "New knowledge not present in training, produced in full without further selection."
          - id: c
            text: "Access to an external calculator, produced in full without further selection."
          - id: d
            text: "A guarantee the answer is always correct before any other checks run on this path."
        correct: [a]
        explanation: "CoT does not add knowledge or guarantee correctness; it gives space to apply what the model already can."
      - prompt: "Why does the model miss more often on multi-step tasks without CoT?"
        choices:
          - id: a
            text: "It must output the answer as the first token without unfolding intermediate values."
          - id: b
            text: "It deliberately lowers accuracy without the addendum before any other checks run on this path."
          - id: c
            text: "Multi-step tasks are forbidden by the API without CoT before any other checks run on this path."
          - id: d
            text: "Without CoT the model answers in another language before any other checks run on this path."
        correct: [a]
        explanation: "Demanding the final answer immediately forces guessing before walking the path."

  - id: cot-answer-position-001
    concept: chain-of-thought
    type: theory-quiz
    difficulty: 2
    prompt: "Why does the prompt \"give the number, then explain\" nullify chain of thought?"
    choices:
      - id: a
        text: "The answer comes first, before reasoning, so steps no longer influence it."
      - id: b
        text: "Explanation after the answer is written in another language."
      - id: c
        text: "The model refuses to explain what it already said."
      - id: d
        text: "The parser cannot read an answer before explanation."
    correct: [a]
    explanation: "For the model token order is thinking order. The answer must come at the end, after steps."
    variants:
      - prompt: "How should answer parts be ordered with chain of thought?"
        choices:
          - id: a
            text: "Intermediate steps first, final answer at the end."
          - id: b
            text: "Final answer first, then steps for verification."
          - id: c
            text: "Steps and answer interleaved: order does not matter."
          - id: d
            text: "Only the final answer; steps stay in the model's head."
        correct: [a]
        explanation: "Each step must enter context before the answer, so the answer goes last."
      - prompt: "What is zero-shot chain of thought?"
        choices:
          - id: a
            text: "Invoking reasoning with one phrase like \"solve step by step,\" without examples."
          - id: b
            text: "A chain that requires three examples before any other checks run on this path."
          - id: c
            text: "Reasoning hidden from the user in a reasoning model before any other checks run on this path."
          - id: d
            text: "A ban on any intermediate steps, produced in full without further selection."
        correct: [a]
        explanation: "A signal to unfold reasoning is enough; examples are not required."

  - id: cot-when-harmful-001
    concept: chain-of-thought
    type: theory-quiz
    difficulty: 3
    prompt: "In which cases does chain of thought more likely hurt? Select all that apply."
    choices:
      - id: a
        text: "The task is one step (translate a word, extract a date)."
      - id: b
        text: "Code parses strict JSON and a reasoning paragraph sits before it."
      - id: c
        text: "Multi-step arithmetic where errors are likely without intermediate computation."
      - id: d
        text: "Comparing two contracts on several criteria."
    correct: [a, b]
    explanation: "On one-step tasks CoT burns tokens; before strict JSON it breaks the parser. Multi-step arithmetic and comparison are cases where the chain helps."

  - id: cot-plausible-wrong-001
    concept: chain-of-thought
    type: theory-quiz
    difficulty: 4
    prompt: "The model produced a long, smooth, convincing chain of thought but the final answer is wrong. Which conclusions are correct? Select all that apply."
    choices:
      - id: a
        text: "A smooth chain does not guarantee correctness, since plausible but false reasoning happens."
      - id: b
        text: "You can recheck by running several independent chains and taking the majority answer (self-consistency)."
      - id: c
        text: "Because the reasoning is detailed, the answer must be correct and needs no check."
      - id: d
        text: "A visible reasoning-model chain is verified proof of how it decided."
    correct: [a, b]
    explanation: "Expanded explanation looks more reliable than it is; verify the result or vote across chains, not the beauty of the explanation. Internal reasoning is not guaranteed to be an honest trace of the decision."
