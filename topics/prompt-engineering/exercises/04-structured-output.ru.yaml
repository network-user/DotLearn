exercises:
  - id: structured-why-001
    concept: structured-output
    type: theory-quiz
    difficulty: 1
    prompt: "Зачем нужен структурный вывод (например, JSON по схеме)?"
    choices:
      - id: a
        text: "Чтобы ответ модели можно было надёжно разобрать машиной как вход другого кода."
      - id: b
        text: "Чтобы модель отвечала быстрее за счёт коротких полей сразу, без промежуточного состояния."
      - id: c
        text: "Чтобы скрыть ответ от пользователя сразу, без промежуточного состояния."
      - id: d
        text: "Чтобы запретить модели рассуждать сразу, без промежуточного состояния."
    correct: [a]
    explanation: "Как только ответ становится входом базы, фронтенда или следующего шага, его форма должна быть предсказуемой до символа."
    variants:
      - prompt: "Что гарантирует JSON Schema в режиме структурного вывода?"
        choices:
          - id: a
            text: "Что ответ - валидный JSON с нужными ключами и правильными типами."
          - id: b
            text: "Что значения в полях всегда фактически верны сразу, без промежуточного состояния."
          - id: c
            text: "Что модель не будет рассуждать перед ответом сразу, без промежуточного состояния."
          - id: d
            text: "Что ответ всегда короче 100 символов сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Схема отвечает за форму (ключи и типы), но не за правдивость значений."
      - prompt: "Почему свободный текст плохо подходит как вход для программы?"
        choices:
          - id: a
            text: "Его форма непредсказуема, и парсер ломается на вступлениях, обёртках и единицах в числах."
          - id: b
            text: "Свободный текст всегда длиннее JSON сразу, без промежуточного состояния."
          - id: c
            text: "Модель не умеет генерировать свободный текст сразу, без промежуточного состояния."
          - id: d
            text: "Свободный текст нельзя сохранить в базу сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Программе нужна форма, предсказуемая до символа; свободный текст её не даёт."

  - id: structured-no-wrapper-001
    concept: structured-output
    type: theory-quiz
    difficulty: 2
    prompt: "JSON.parse падает, потому что модель предваряет ответ фразой «Конечно, вот данные:» и заворачивает его в markdown-блок. Что надёжнее всего это устранит?"
    choices:
      - id: a
        text: "Явно запретить markdown и пояснения и/или префиллом начать ответ с символа {."
      - id: b
        text: "Попросить модель отвечать длиннее, чтобы JSON точно поместился."
      - id: c
        text: "Повысить температуру, чтобы ответы стали разнообразнее."
      - id: d
        text: "Добавить в промпт ещё пять примеров вежливых вступлений."
    correct: [a]
    explanation: "Самый частый источник ошибок парсинга - обёртка и вступление. Их убирают прямым запретом и префиллом начала ответа с открывающей скобки."
    variants:
      - prompt: "Зачем оборачивать входные данные и желаемый вывод в теги вроде <письмо> и <json>?"
        choices:
          - id: a
            text: "Чтобы модель не спутала, что обрабатывать, а что возвращать."
          - id: b
            text: "Чтобы ответ занимал меньше токенов сразу, без промежуточного состояния."
          - id: c
            text: "Чтобы отключить у модели рассуждение сразу, без промежуточного состояния."
          - id: d
            text: "Чтобы теги попали в финальный JSON как поля сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Разделители разводят данные и вывод, снижая риск, что кусок входа примут за команду или включат в ответ."
      - prompt: "Что делает префилл начала ответа символом { ?"
        choices:
          - id: a
            text: "Заставляет модель продолжать с открытой скобки, делая вступительную болтовню невозможной."
          - id: b
            text: "Удваивает длину ответа сразу, без промежуточного состояния и без дополнительных проверок."
          - id: c
            text: "Переводит модель в режим reasoning сразу, без промежуточного состояния."
          - id: d
            text: "Запрещает модели использовать строки в JSON сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Если первые символы ответа заданы как {, модель вынуждена сразу писать объект, без вежливого вступления."

  - id: structured-schema-blanks-001
    concept: structured-output
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните JSON Schema: amount - число, currency - строка, оба обязательны, лишних полей быть не должно."
    template: |
      {
        "type": "object",
        "properties": {
          "amount": { "type": "{{amount_type}}" },
          "currency": { "type": "{{currency_type}}" }
        },
        "required": ["amount", "{{required_second}}"],
        "{{no_extra_key}}": false
      }
    blanks:
      amount_type:
        accept: ["number", "integer"]
      currency_type:
        accept: ["string"]
      required_second:
        accept: ["currency"]
      no_extra_key:
        accept: ["additionalProperties"]
    hints:
      - "Тип задаётся стандартными именами JSON Schema; сумма - числовая величина, валюта - текст."
      - "Запрет лишних полей в JSON Schema выражается одним ключом со значением false."

  - id: structured-no-data-001
    concept: structured-output
    type: theory-quiz
    difficulty: 3
    prompt: "Схема требует поле amount типа number. В письме суммы нет. Что произойдёт и как это спроектировать правильно?"
    choices:
      - id: a
        text: "Модель всё равно вернёт число (выдумает или поставит 0)"
      - id: b
        text: "Модель вернёт ошибку валидации, и запрос упадёт - так и задумано."
      - id: c
        text: "Модель оставит поле пустой строкой, и парсер это поймёт сам."
      - id: d
        text: "Схема сама подставит null, дополнительных действий не нужно."
    correct: [a]
    explanation: "Схема гарантирует форму, но не смысл: number обязан быть числом. Чтобы различать «ноль» и «нет данных», явно закладывают null или необязательное поле."

  - id: structured-units-001
    concept: structured-output
    type: theory-quiz
    difficulty: 3
    prompt: "Какие утверждения о проектировании схемы для суммы «1480 руб.» верны? Выберите все подходящие."
    choices:
      - id: a
        text: "Число и единицу измерения лучше держать в разных полях (amount: number, currency: string)."
      - id: b
        text: "Если поле одно и строковое, модель вернёт «1480 руб.», и единицы придётся разбирать вручную."
      - id: c
        text: "Очень большие и глубоко вложенные схемы модель соблюдает так же надёжно, как простые."
      - id: d
        text: "Структурный вывод гарантирует, что сумма в поле фактически верна."
    correct: [a, b]
    explanation: "Величину и единицу разводят по полям, иначе число придёт строкой с единицей. Большие схемы соблюдаются хуже, а правдивость значений схема не гарантирует - только форму."
