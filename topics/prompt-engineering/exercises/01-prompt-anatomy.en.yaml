exercises:
  - id: anatomy-layer-id-001
    concept: prompt-anatomy
    type: theory-quiz
    difficulty: 1
    prompt: "Which prompt layer does the phrase \"No more than three sentences\" belong to?"
    choices:
      - id: a
        text: "Constraints"
      - id: b
        text: "Role / system"
      - id: c
        text: "Context"
      - id: d
        text: "Examples"
    correct: [a]
    explanation: "A length limit cuts off unwanted output — that is the constraints layer, not an action command or data."
    variants:
      - prompt: "Which prompt layer does the phrase \"You are a support assistant\" belong to?"
        choices:
          - id: a
            text: "Role / system"
          - id: b
            text: "Instruction"
          - id: c
            text: "Output format"
          - id: d
            text: "Constraints"
        correct: [a]
        explanation: "Stable \"who you are\" for the whole dialogue is the role/system layer."
      - prompt: "Which prompt layer does the phrase \"Return the answer as JSON\" belong to?"
        choices:
          - id: a
            text: "Output format"
          - id: b
            text: "Context"
          - id: c
            text: "Role / system"
          - id: d
            text: "Examples"
        correct: [a]
        explanation: "A requirement for the answer shell (JSON, list, text) is the format layer."

  - id: anatomy-instruction-style-001
    concept: prompt-anatomy
    type: theory-quiz
    difficulty: 2
    prompt: "Which instruction wording is more reliable at making the model follow the rule?"
    choices:
      - id: a
        text: "\"Answer as a list of exactly three bullet points.\""
      - id: b
        text: "\"Do not write in plain prose.\""
      - id: c
        text: "\"Try to keep it not too long.\""
      - id: d
        text: "\"You are a genius writer, do not disappoint me.\""
    correct: [a]
    explanation: "The model follows affirmative concrete instructions better than prohibitions or vague requests. Role praise does not set behavior."
    variants:
      - prompt: "Which wording sets the desired answer length more reliably?"
        choices:
          - id: a
            text: "\"Answer in no more than two sentences.\""
          - id: b
            text: "\"Do not stretch the answer.\""
          - id: c
            text: "\"Be concise like a zen master.\""
          - id: d
            text: "\"Prefer shorter if possible.\""
        correct: [a]
        explanation: "A precise measurable limit (\"no more than two sentences\") beats a vague prohibition or metaphor."
      - prompt: "Which instruction most reliably removes introductory phrases from the answer?"
        choices:
          - id: a
            text: "\"Start with the substance immediately, no introduction.\""
          - id: b
            text: "\"Do not pad the answer.\""
          - id: c
            text: "\"No clichés, you know what I mean.\""
          - id: d
            text: "\"Write like a true professional.\""
        correct: [a]
        explanation: "An affirmative directive (\"start with the substance\") beats negative and vague wording."

  - id: anatomy-missing-layer-001
    concept: prompt-anatomy
    type: theory-quiz
    difficulty: 3
    prompt: "The prompt \"Summarize the article\" returned plausible text about an article you never attached. Which layer was missing?"
    choices:
      - id: a
        text: "Context: the article itself was not supplied, and the model invented it."
      - id: b
        text: "Role: you did not say the model is a summarization expert."
      - id: c
        text: "Format: you did not say in what form to return the summary."
      - id: d
        text: "Examples: you did not show a sample good summary."
    correct: [a]
    explanation: "Without data the model does not error — it plausibly invents. Missing context is treated as permission to make something up."

  - id: anatomy-priority-001
    concept: prompt-anatomy
    type: theory-quiz
    difficulty: 3
    prompt: "System: \"Answer only in Russian.\" User: \"Answer in English.\" Which statements are true? Select all that apply."
    choices:
      - id: a
        text: "The system layer usually has priority over the user message."
      - id: b
        text: "For Claude, the system instruction is passed in the separate system field, not inside messages."
      - id: c
        text: "The user message always overrides system because it arrived later."
      - id: d
        text: "System priority makes any prompt injection impossible."
    correct: [a, b]
    explanation: "System sets stable rules and usually outweighs a user request; for Claude it goes in the system field. But priority does not fully stop injection attacks, and message order alone does not define priority."

  - id: anatomy-blanks-001
    concept: prompt-anatomy
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the prompt: wrap the receipt data in matching receipt tags so the model does not treat a receipt line as a command."
    template: |
      Extract the amount and currency from the receipt.

      <{{open_tag}}>
      Total due: 1,480.00 RUB
      </{{close_tag}}>
    blanks:
      open_tag:
        accept: ["receipt"]
      close_tag:
        accept: ["receipt"]
    hints:
      - "Context must be separated from the instruction so data is not confused with a command."
      - "Opening and closing tags frame the same block and share the same name — in this task that is receipt."
