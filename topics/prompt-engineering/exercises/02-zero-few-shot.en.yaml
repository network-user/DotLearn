exercises:
  - id: fewshot-define-001
    concept: zero-few-shot
    type: theory-quiz
    difficulty: 1
    prompt: "How does few-shot differ from zero-shot?"
    choices:
      - id: a
        text: "Few-shot adds several solved \"input → output\" examples to the instruction."
      - id: b
        text: "Few-shot fine-tunes the model's weights on your data."
      - id: c
        text: "Few-shot is a request with no examples, instruction only."
      - id: d
        text: "Few-shot works only on images, zero-shot on text."
    correct: [a]
    explanation: "Zero-shot is task in words only; few-shot adds several \"input → output\" samples. Weights do not change."
    variants:
      - prompt: "What is a zero-shot prompt?"
        choices:
          - id: a
            text: "A request where the task is stated in words only, with no answer examples."
          - id: b
            text: "A request with three or more examples before the task before any other checks run on this path."
          - id: c
            text: "A request after which the model is fine-tuned before any other checks run on this path."
          - id: d
            text: "A request where the model is forbidden to answer before any other checks run on this path."
        correct: [a]
        explanation: "Zero-shot explains the task in words and contains no solved samples."
      - prompt: "How does few-shot make the model's answer uniform?"
        choices:
          - id: a
            text: "The model continues the template set by \"input → output\" examples."
          - id: b
            text: "Examples physically change the model's parameters, completely skipping few-shot."
          - id: c
            text: "Examples enable strict typing mode in the API, completely skipping few-shot."
          - id: d
            text: "Examples forbid the model from using rare words, completely skipping few-shot."
        correct: [a]
        explanation: "The model is a text continuation machine: the most likely continuation of uniform pairs is an answer in the same form."

  - id: fewshot-consistency-001
    concept: zero-few-shot
    type: theory-quiz
    difficulty: 2
    prompt: "What matters most for few-shot example quality?"
    choices:
      - id: a
        text: "Format consistency: one case, one label vocabulary, same line structure."
      - id: b
        text: "Maximum number of examples: the more the better."
      - id: c
        text: "Examples should be as close as possible to the current query."
      - id: d
        text: "All examples should belong to one class."
    correct: [a]
    explanation: "Consistent form decides, not count. Inconsistency teaches inconsistent answers; class skew carries over; overly similar examples provoke copying."
    variants:
      - prompt: "Why is the set \"all great → Positive\", \"awful → negative tone\", \"so-so → Neutral rating\" bad?"
        choices:
          - id: a
            text: "Examples have no single form to continue, with different case, vocabulary, and structure."
          - id: b
            text: "Too few examples; need at least ten before any other checks run on this path."
          - id: c
            text: "Labels are too short; the model needs paragraphs, completely skipping vocabulary."
          - id: d
            text: "Examples contradict facts about products, completely skipping vocabulary."
        correct: [a]
        explanation: "Format inconsistency teaches that inconsistency is acceptable; unified case, vocabulary, and structure beat quantity."
      - prompt: "Why include borderline cases in few-shot, not only bright examples?"
        choices:
          - id: a
            text: "Otherwise the model will not know how to label ambiguous items like \"fine, but expensive.\""
          - id: b
            text: "Borderline cases reduce tokens in the request, completely skipping few-shot."
          - id: c
            text: "Bright examples are forbidden by API rules without any step that involves few-shot."
          - id: d
            text: "Without them the model refuses to answer without any step that involves few-shot."
        correct: [a]
        explanation: "One example per hard class beats three easy identical ones: it shows where to put ambiguous items."

  - id: fewshot-when-skip-001
    concept: zero-few-shot
    type: theory-quiz
    difficulty: 3
    prompt: "In which cases is adding few-shot examples more likely to hurt? Select all that apply."
    choices:
      - id: a
        text: "The task (translation, simple summarization) already works reliably in zero-shot."
      - id: b
        text: "You need step-by-step reasoning for arithmetic, not a ready answer form."
      - id: c
        text: "You need strict JSON that the model can emit via structured output schema."
      - id: d
        text: "The model mixes label vocabulary, answering \"positive\" then \"favorable.\""
    correct: [a, b, c]
    explanation: "Examples burn tokens without benefit where zero-shot already works; for reasoning you need chain-of-thought, not \"problem → answer\" pairs; for strict JSON schema beats examples. Label inconsistency (d) is exactly where few-shot helps."

  - id: fewshot-imbalance-001
    concept: zero-few-shot
    type: theory-quiz
    difficulty: 4
    prompt: "A sentiment classifier on few-shot labels \"negative\" more often though real negative share did not rise. The example set has five \"negative\" and one \"positive.\" What is most likely and how do you fix it?"
    choices:
      - id: a
        text: "The model inherited class skew from examples; balance the set across classes."
      - id: b
        text: "The model broke and needs fine-tuning on new data."
      - id: c
        text: "Word order in the instruction is to blame; examples do not affect bias."
      - id: d
        text: "Add more \"negative\" examples to overpower noise."
    correct: [a]
    explanation: "Example imbalance becomes answer skew: the model picks up class frequency from context. Fix by balancing the set, not fine-tuning or amplifying skew."
