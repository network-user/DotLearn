exercises:
  - id: typing-what-is-001
    concept: typing-basics
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает аннотация типа `age: int` во время выполнения программы?"
    choices:
      - id: a
        text: "Ничего не проверяет: интерпретатор её не исполняет, она лишь объявляет намерение для статического анализатора."
      - id: b
        text: "Запрещает присвоить переменной `age` что-либо, кроме целого числа."
      - id: c
        text: "Приводит присваиваемое значение к `int`, как это сделал бы `int(...)`."
      - id: d
        text: "Останавливает программу с ошибкой, если передан неверный тип."
    correct: [a]
    explanation: "Аннотация - это контракт для type checker (mypy, pyright), а не проверка времени выполнения. Интерпретатор хранит её в `__annotations__`, но никак не валидирует значения."
    variants:
      - prompt: "Кто на самом деле проверяет соответствие кода аннотациям типов?"
        choices:
          - id: a
            text: "Отдельный статический анализатор (mypy, pyright, проверка в IDE), читающий код без запуска."
          - id: b
            text: "Интерпретатор Python при каждом присваивании."
          - id: c
            text: "Сборщик мусора при освобождении объекта."
          - id: d
            text: "Никто: аннотации - чистая декорация без читателей."
        correct: [a]
        explanation: "Проверку выполняет внешний type checker, который сверяет фактическое использование с объявленным контрактом до запуска. Без него аннотации остаются только документацией."
      - prompt: "Что означает аннотация возврата `-> None` у функции?"
        choices:
          - id: a
            text: "Явный контракт «функция ничего полезного не возвращает»."
          - id: b
            text: "То же самое, что отсутствие стрелки: тип не указан."
          - id: c
            text: "Функцию нельзя вызывать - она помечена как заглушка."
          - id: d
            text: "Функция всегда падает с ошибкой."
        correct: [a]
        explanation: "`-> None` явно говорит «ничего полезного не возвращаю». Это не то же самое, что отсутствие аннотации, которое означает «тип не указан»."

  - id: typing-container-blanks-001
    concept: typing-basics
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите аннотации: `scores` - список целых, `ages` - словарь со строковыми ключами и целыми значениями."
    template: |
      scores: {{score_type}} = [10, 20, 30]
      ages: {{ages_type}} = {"Ана": 34, "Борис": 29}
    blanks:
      score_type:
        accept: ["list[int]"]
        accept_regex: '^list\[\s*int\s*\]$'
      ages_type:
        accept: ["dict[str, int]", "dict[str,int]"]
        accept_regex: '^dict\[\s*str\s*,\s*int\s*\]$'
    variants:
      - prompt: "Допишите аннотации: `names` - список строк, `prices` - словарь со строковыми ключами и значениями-числами с плавающей точкой."
        template: |
          names: {{names_type}} = ["Ана", "Борис"]
          prices: {{prices_type}} = {"кофе": 2.5}
        blanks:
          names_type:
            accept: ["list[str]"]
            accept_regex: '^list\[\s*str\s*\]$'
          prices_type:
            accept: ["dict[str, float]", "dict[str,float]"]
            accept_regex: '^dict\[\s*str\s*,\s*float\s*\]$'
      - prompt: "Допишите аннотации: `pair` - кортеж из целого и строки, `flags` - список булевых значений."
        template: |
          pair: {{pair_type}} = (1, "x")
          flags: {{flags_type}} = [True, False]
        blanks:
          pair_type:
            accept: ["tuple[int, str]", "tuple[int,str]"]
            accept_regex: '^tuple\[\s*int\s*,\s*str\s*\]$'
          flags_type:
            accept: ["list[bool]"]
            accept_regex: '^list\[\s*bool\s*\]$'

  - id: typing-annotations-runtime-001
    concept: typing-basics
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      def greet(person: str, times: int) -> str:
          return f"Привет, {person}! " * times

      print(greet.__annotations__)
    expected:
      kind: stdout
      value: "{'person': <class 'str'>, 'times': <class 'int'>, 'return': <class 'str'>}"
    hints:
      - "Интерпретатор не выбрасывает аннотации - он складывает их в один словарь у функции. Что становится ключами, а что значениями?"
      - "Ключи - имена параметров плюс особый ключ `return`; значения - сами объекты типов, печатающиеся как `<class '...'>`."
    variants:
      - snippet: |
          def total(values: list[int]) -> int:
              return sum(values)

          print(total.__annotations__)
        expected:
          kind: stdout
          value: "{'values': list[int], 'return': <class 'int'>}"
      - snippet: |
          def log(message: str) -> None:
              print(message)

          print(log.__annotations__)
        expected:
          kind: stdout
          value: "{'message': <class 'str'>, 'return': None}"

  - id: typing-no-coercion-001
    concept: typing-basics
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      x: int = "5"
      print(type(x).__name__)
      print(x + "0")
    expected:
      kind: stdout
      value: "str\n50"
    hints:
      - "Аннотация - это обещание, а не каст. Конвертирует ли присваивание с аннотацией строку в число?"
      - "В `x` осталась строка `\"5\"`, поэтому `type(x).__name__` - это `str`, а `+` со строкой `\"0\"` работает как конкатенация."
    variants:
      - snippet: |
          n: int = "3"
          print(type(n).__name__)
          print(n * 2)
        expected:
          kind: stdout
          value: "str\n33"
      - snippet: |
          value: float = "1"
          print(type(value).__name__)
          print(value + "0")
        expected:
          kind: stdout
          value: "str\n10"

  - id: typing-optional-001
    concept: typing-basics
    type: theory-quiz
    difficulty: 3
    prompt: "Функция возвращает `dict.get(key)`, который при отсутствии ключа отдаёт `None`. Как честно аннотировать её возврат?"
    choices:
      - id: a
        text: "`-> str | None`: значение либо строка, либо `None`, и анализатор потребует проверки на `None`."
      - id: b
        text: "`-> str`: `None` можно игнорировать, он встречается редко."
      - id: c
        text: "`-> None`: раз бывает `None`, то весь тип и есть `None`."
      - id: d
        text: "Возврат лучше вообще не аннотировать, чтобы анализатор не придирался."
    correct: [a]
    explanation: "`dict.get` возвращает `None`, если ключа нет, поэтому честный тип - `str | None`. После этого анализатор не даст вызвать строковый метод у результата, пока вы не отсеете случай `None`."
    hints:
      - "Подумайте, какие реальные значения может вернуть функция при разном входе - все ли они одного типа?"
      - "Если хотя бы при одном входе возвращается `None`, тип-объединение должен это отражать, чтобы анализатор требовал проверку."

  - id: typing-find-user-002
    concept: typing-basics
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      def find_user(user_id: int) -> str | None:
          table = {1: "Ана", 2: "Борис"}
          return table.get(user_id)

      print(find_user(2))
      print(find_user(9))
    expected:
      kind: stdout
      value: "Борис\nNone"
    hints:
      - "`dict.get` отдаёт значение по ключу, а если ключа нет - значение по умолчанию. Какое оно без второго аргумента?"
      - "Ключ `2` есть в словаре, ключа `9` нет; `get` без второго аргумента возвращает `None` для отсутствующего ключа."
