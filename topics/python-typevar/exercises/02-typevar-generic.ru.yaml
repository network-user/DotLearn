exercises:
  - id: typevar-what-is-001
    concept: typevar-generic
    type: theory-quiz
    difficulty: 1
    prompt: "Зачем нужен `TypeVar`, если можно объявить аргумент как `object`?"
    choices:
      - id: a
        text: "`TypeVar` связывает позиции в сигнатуре одним типом и переносит его на выход, тогда как `object` стирает тип результата."
      - id: b
        text: "`TypeVar` быстрее работает в рантайме, чем `object`."
      - id: c
        text: "`TypeVar` запрещает передавать в функцию что-либо, кроме встроенных типов."
      - id: d
        text: "Разницы нет, `TypeVar` - это просто псевдоним для `object`."
    correct: [a]
    explanation: "`object` делает функцию универсальной, но «забывает» конкретный тип: результат становится `object`. `TypeVar` запоминает тип входа и обещает тот же тип на выходе - `first(['a'])` даёт `str`, а не `object`."
    variants:
      - prompt: "Что означает использование одного и того же `T` в типе аргумента и в типе возврата функции?"
        choices:
          - id: a
            text: "Анализатор обещает, что тип результата совпадёт с типом, подставленным вместо `T` на месте вызова."
          - id: b
            text: "Аргумент и результат обязаны быть одним и тем же объектом в памяти."
          - id: c
            text: "Функцию можно вызвать только один раз за всю программу."
          - id: d
            text: "`T` всегда равен `object` независимо от вызова."
        correct: [a]
        explanation: "`T` - заполнитель, который подставляется конкретным типом на месте вызова. Если он стоит и в аргументе, и в возврате, анализатор гарантирует одинаковый тип в обеих позициях."
      - prompt: "От какого класса наследуют, чтобы написать собственный обобщённый контейнер с параметром типа `T`?"
        choices:
          - id: a
            text: "От `Generic[T]`."
          - id: b
            text: "От `TypeVar[T]`."
          - id: c
            text: "От `object[T]`."
          - id: d
            text: "Ни от чего: достаточно просто использовать `T` в методах."
        correct: [a]
        explanation: "Класс наследуют от `Generic[T]`, чтобы он стал параметризуемым - тогда `Box[int]` и `Box[str]` различает анализатор, как у встроенного `list[int]`."

  - id: typevar-first-blanks-001
    concept: typevar-generic
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите обобщённую функцию `first`, чтобы тип результата совпадал с типом элементов списка."
    template: |
      from typing import TypeVar

      T = TypeVar({{tv_name}})

      def first(items: list[{{arg}}]) -> {{ret}}:
          return items[0]
    blanks:
      tv_name:
        accept: ['"T"', "'T'"]
        accept_regex: "^['\"]T['\"]$"
      arg:
        accept: ["T"]
        accept_regex: '^T$'
      ret:
        accept: ["T"]
        accept_regex: '^T$'
    hints:
      - "Имя в `TypeVar(...)` - это строка, которая должна совпадать с именем переменной слева. А чтобы вход и выход были одним типом, в обеих позициях стоит одна и та же буква."
      - "Аргумент - это список из `T`, поэтому внутри скобок `list[...]` стоит `T`; возврат - тот же `T`."
    variants:
      - prompt: "Допишите функцию `pick`: оба аргумента одного типа `T`, результат тоже `T`."
        template: |
          from typing import TypeVar

          T = TypeVar({{tv_name}})

          def pick(a: {{a_type}}, b: {{b_type}}, use_first: bool) -> {{ret}}:
              return a if use_first else b
        blanks:
          tv_name:
            accept: ['"T"', "'T'"]
            accept_regex: "^['\"]T['\"]$"
          a_type:
            accept: ["T"]
            accept_regex: '^T$'
          b_type:
            accept: ["T"]
            accept_regex: '^T$'
          ret:
            accept: ["T"]
            accept_regex: '^T$'
      - prompt: "Допишите функцию `repeat`: принимает значение типа `T` и число, возвращает список из `T`."
        template: |
          from typing import TypeVar

          T = TypeVar({{tv_name}})

          def repeat(value: {{val_type}}, n: int) -> list[{{ret}}]:
              return [value] * n
        blanks:
          tv_name:
            accept: ['"T"', "'T'"]
            accept_regex: "^['\"]T['\"]$"
          val_type:
            accept: ["T"]
            accept_regex: '^T$'
          ret:
            accept: ["T"]
            accept_regex: '^T$'

  - id: typevar-erasure-001
    concept: typevar-generic
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      from typing import Generic, TypeVar

      T = TypeVar("T")

      class Box(Generic[T]):
          def __init__(self, item):
              self._item = item
          def get(self):
              return self._item

      number_box = Box(42)
      text_box = Box("привет")
      print(number_box.get(), text_box.get())
      print(type(number_box) is type(text_box))
    expected:
      kind: stdout
      value: "42 привет\nTrue"
    hints:
      - "Параметр типа существует только для анализатора. Что видит интерпретатор, когда сравнивает классы двух коробок с разным содержимым?"
      - "Типы стираются: `Box(42)` и `Box(\"привет\")` - объекты одного и того же класса `Box`, поэтому сравнение классов даёт `True`."
    variants:
      - snippet: |
          from typing import Generic, TypeVar

          T = TypeVar("T")

          class Box(Generic[T]):
              def __init__(self, item):
                  self._item = item
              def get(self):
                  return self._item

          a = Box([1, 2])
          b = Box(3.5)
          print(type(a).__name__, type(b).__name__)
        expected:
          kind: stdout
          value: "Box Box"
      - snippet: |
          from typing import Generic, TypeVar

          T = TypeVar("T")

          class Pair(Generic[T]):
              def __init__(self, left, right):
                  self.left = left
                  self.right = right

          p = Pair("a", "b")
          print(p.left, p.right)
          print(isinstance(p, Pair))
        expected:
          kind: stdout
          value: "a b\nTrue"

  - id: typevar-first-fn-001
    concept: typevar-generic
    type: python-function
    difficulty: 2
    prompt: "Реализуйте обобщённую функцию `first(items)`: верните первый элемент переданного списка. Объявите `TypeVar` и аннотируйте так, чтобы тип результата совпадал с типом элементов."
    starter: |
      from typing import TypeVar

      T = TypeVar("T")

      def first(items: list[T]) -> T:
          ...
    cases:
      - call: "first([1, 2, 3])"
        expect: 1
      - call: "first(['a', 'b'])"
        expect: "a"
      - call: "first([True, False])"
        expect: true
    hints:
      - "Тип здесь только для документации - тело функции делает ровно то, что обещает её сигнатура. Какой элемент списка вы должны вернуть?"
      - "Первый элемент любой непустой последовательности доступен по индексу `0`."
    solution: |
      from typing import TypeVar

      T = TypeVar("T")

      def first(items: list[T]) -> T:
          return items[0]

  - id: typevar-box-fn-001
    concept: typevar-generic
    type: python-function
    difficulty: 3
    prompt: "Реализуйте обобщённый контейнер `class Box(Generic[T])` с методом `get()`, возвращающим хранимое значение, и методом `replace(item)`, который кладёт новое значение и возвращает его."
    starter: |
      from typing import Generic, TypeVar

      T = TypeVar("T")

      class Box(Generic[T]):
          def __init__(self, item: T) -> None:
              ...
          def get(self) -> T:
              ...
          def replace(self, item: T) -> T:
              ...
    cases:
      - call: "Box(42).get()"
        expect: 42
      - call: "Box('x').replace('y')"
        expect: "y"
      - call: "(lambda b: (b.replace(9), b.get())[1])(Box(1))"
        expect: 9
    hints:
      - "Контейнер должен помнить переданное значение между вызовами методов. Где живёт это состояние у экземпляра?"
      - "Сохраните значение в атрибуте экземпляра в `__init__`; `get` его читает, `replace` перезаписывает и возвращает."
      - "`replace` должен и обновить атрибут, и вернуть новое значение - это два действия в теле метода."
    solution: |
      from typing import Generic, TypeVar

      T = TypeVar("T")

      class Box(Generic[T]):
          def __init__(self, item: T) -> None:
              self._item = item
          def get(self) -> T:
              return self._item
          def replace(self, item: T) -> T:
              self._item = item
              return self._item

  - id: typevar-shared-001
    concept: typevar-generic
    type: theory-quiz
    difficulty: 3
    prompt: "Один объект `T = TypeVar(\"T\")` используется в двух разных функциях. Что это значит для анализатора?"
    choices:
      - id: a
        text: "Ничего не связывает функции: `T` решается заново для каждого вызова, связь возникает только внутри одной сигнатуры."
      - id: b
        text: "Обе функции обязаны вызываться с одним и тем же типом в пределах программы."
      - id: c
        text: "Вторая функция переопределяет `T`, и первая перестаёт работать."
      - id: d
        text: "`T` становится глобально равен типу из первого вызова первой функции."
    correct: [a]
    explanation: "Общий `T` спокойно используют в десятках функций: каждая получает свою подстановку. Связь между позициями `T` существует только в пределах одной сигнатуры, а не между разными функциями."
    hints:
      - "Подумайте, на каком уровне `TypeVar` «решает», чему он равен - на уровне всей программы или отдельного вызова?"
      - "Если бы общий `T` связывал функции, нельзя было бы переиспользовать одно имя - но на практике один `T` живёт во множестве несвязанных сигнатур."
