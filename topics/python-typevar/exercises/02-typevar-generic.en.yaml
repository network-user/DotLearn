exercises:
  - id: typevar-what-is-001
    concept: typevar-generic
    type: theory-quiz
    difficulty: 1
    prompt: "Why use `TypeVar` when you could declare an argument as `object`?"
    choices:
      - id: a
        text: "`TypeVar` links positions in a signature with one type and carries it to the output, while `object` erases the result type."
      - id: b
        text: "`TypeVar` runs faster at run time than `object`."
      - id: c
        text: "`TypeVar` forbids passing anything except built-in types to the function."
      - id: d
        text: "There is no difference; `TypeVar` is just an alias for `object`."
    correct: [a]
    explanation: "`object` makes a function universal but \"forgets\" the concrete type: the result becomes `object`. `TypeVar` remembers the input type and promises the same type on output; `first(['a'])` gives `str`, not `object`."
    variants:
      - prompt: "What does using the same `T` in both the argument type and the return type of a function mean?"
        choices:
          - id: a
            text: "The analyzer promises the result type matches the type substituted for `T` at the call site."
          - id: b
            text: "The argument and result must be the same object in memory."
          - id: c
            text: "The function can be called only once in the whole program."
          - id: d
            text: "`T` is always equal to `object` regardless of the call."
        correct: [a]
        explanation: "`T` is a placeholder substituted by a concrete type at the call site. If it appears in both argument and return, the analyzer guarantees the same type in both positions."
      - prompt: "Which class do you inherit from to write your own generic container with type parameter `T`?"
        choices:
          - id: a
            text: "`Generic[T]`."
          - id: b
            text: "`TypeVar[T]`."
          - id: c
            text: "`object[T]`."
          - id: d
            text: "Nothing: using `T` in methods is enough."
        correct: [a]
        explanation: "Inherit from `Generic[T]` to make the class parameterizable; then the analyzer distinguishes `Box[int]` and `Box[str]`, like built-in `list[int]`."

  - id: typevar-first-blanks-001
    concept: typevar-generic
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the generic function `first` so the result type matches the element type of the list."
    template: |
      from typing import TypeVar

      T = TypeVar({{tv_name}})

      def first(items: list[{{arg}}]) -> {{ret}}:
          return items[0]
    blanks:
      tv_name:
        accept: ['"T"', "'T'"]
        accept_regex: "^['\"]T['\"]$"
      arg:
        accept: ["T"]
        accept_regex: '^T$'
      ret:
        accept: ["T"]
        accept_regex: '^T$'
    hints:
      - "The name in `TypeVar(...)` is a string that must match the variable name on the left. For input and output to share one type, both positions use the same letter."
      - "The argument is a list of `T`, so inside `list[...]` you write `T`; the return is the same `T`."
    variants:
      - prompt: "Complete `pick`: both arguments have type `T`, and the result is also `T`."
        template: |
          from typing import TypeVar

          T = TypeVar({{tv_name}})

          def pick(a: {{a_type}}, b: {{b_type}}, use_first: bool) -> {{ret}}:
              return a if use_first else b
        blanks:
          tv_name:
            accept: ['"T"', "'T'"]
            accept_regex: "^['\"]T['\"]$"
          a_type:
            accept: ["T"]
            accept_regex: '^T$'
          b_type:
            accept: ["T"]
            accept_regex: '^T$'
          ret:
            accept: ["T"]
            accept_regex: '^T$'
      - prompt: "Complete `repeat`: it takes a value of type `T` and a number, and returns a list of `T`."
        template: |
          from typing import TypeVar

          T = TypeVar({{tv_name}})

          def repeat(value: {{val_type}}, n: int) -> list[{{ret}}]:
              return [value] * n
        blanks:
          tv_name:
            accept: ['"T"', "'T'"]
            accept_regex: "^['\"]T['\"]$"
          val_type:
            accept: ["T"]
            accept_regex: '^T$'
          ret:
            accept: ["T"]
            accept_regex: '^T$'

  - id: typevar-erasure-001
    concept: typevar-generic
    type: predict-output
    difficulty: 2
    prompt: "What will this program print?"
    snippet: |
      from typing import Generic, TypeVar

      T = TypeVar("T")

      class Box(Generic[T]):
          def __init__(self, item):
              self._item = item
          def get(self):
              return self._item

      number_box = Box(42)
      text_box = Box("hello")
      print(number_box.get(), text_box.get())
      print(type(number_box) is type(text_box))
    expected:
      kind: stdout
      value: "42 hello\nTrue"
    hints:
      - "The type parameter exists only for the analyzer. What does the interpreter see when comparing the classes of two boxes with different contents?"
      - "Types are erased: `Box(42)` and `Box(\"hello\")` are objects of the same class `Box`, so comparing classes gives `True`."
    variants:
      - snippet: |
          from typing import Generic, TypeVar

          T = TypeVar("T")

          class Box(Generic[T]):
              def __init__(self, item):
                  self._item = item
              def get(self):
                  return self._item

          a = Box([1, 2])
          b = Box(3.5)
          print(type(a).__name__, type(b).__name__)
        expected:
          kind: stdout
          value: "Box Box"
      - snippet: |
          from typing import Generic, TypeVar

          T = TypeVar("T")

          class Pair(Generic[T]):
              def __init__(self, left, right):
                  self.left = left
                  self.right = right

          p = Pair("a", "b")
          print(p.left, p.right)
          print(isinstance(p, Pair))
        expected:
          kind: stdout
          value: "a b\nTrue"

  - id: typevar-first-fn-001
    concept: typevar-generic
    type: python-function
    difficulty: 2
    prompt: "Implement the generic function `first(items)`: return the first element of the passed list. Declare `TypeVar` and annotate so the result type matches the element type."
    starter: |
      from typing import TypeVar

      T = TypeVar("T")

      def first(items: list[T]) -> T:
          ...
    cases:
      - call: "first([1, 2, 3])"
        expect: 1
      - call: "first(['a', 'b'])"
        expect: "a"
      - call: "first([True, False])"
        expect: true
    hints:
      - "The type is for documentation. The function body does exactly what the signature promises. Which list element should you return?"
      - "The first element of any non-empty sequence is at index `0`."
    solution: |
      from typing import TypeVar

      T = TypeVar("T")

      def first(items: list[T]) -> T:
          return items[0]

  - id: typevar-box-fn-001
    concept: typevar-generic
    type: python-function
    difficulty: 3
    prompt: "Implement the generic container `class Box(Generic[T])` with method `get()` returning the stored value, and method `replace(item)` that stores a new value and returns it."
    starter: |
      from typing import Generic, TypeVar

      T = TypeVar("T")

      class Box(Generic[T]):
          def __init__(self, item: T) -> None:
              ...
          def get(self) -> T:
              ...
          def replace(self, item: T) -> T:
              ...
    cases:
      - call: "Box(42).get()"
        expect: 42
      - call: "Box('x').replace('y')"
        expect: "y"
      - call: "(lambda b: (b.replace(9), b.get())[1])(Box(1))"
        expect: 9
    hints:
      - "The container must remember the passed value between method calls. Where does that state live on the instance?"
      - "Store the value in an instance attribute in `__init__`; `get` reads it, `replace` overwrites and returns it."
      - "`replace` must both update the attribute and return the new value (two actions in the method body)."
    solution: |
      from typing import Generic, TypeVar

      T = TypeVar("T")

      class Box(Generic[T]):
          def __init__(self, item: T) -> None:
              self._item = item
          def get(self) -> T:
              return self._item
          def replace(self, item: T) -> T:
              self._item = item
              return self._item

  - id: typevar-shared-001
    concept: typevar-generic
    type: theory-quiz
    difficulty: 3
    prompt: "One object `T = TypeVar(\"T\")` is used in two different functions. What does that mean for the analyzer?"
    choices:
      - id: a
        text: "It links nothing between functions: `T` is resolved fresh for each call; the link exists only inside one signature."
      - id: b
        text: "Both functions must be called with the same type throughout the program."
      - id: c
        text: "The second function overrides `T`, and the first stops working."
      - id: d
        text: "`T` becomes globally equal to the type from the first call of the first function."
    correct: [a]
    explanation: "A shared `T` is fine across dozens of functions: each gets its own substitution. The link between `T` positions exists only within one signature, not across different functions."
    hints:
      - "Consider whether `TypeVar` \"decides\" what `T` equals for the whole program or just for a single call."
      - "If a shared `T` linked functions, you could not reuse one name, but in practice one `T` lives in many unrelated signatures."
