exercises:
  - id: protocol-what-is-001
    concept: protocols-variance
    type: theory-quiz
    difficulty: 1
    prompt: "Как класс соответствует `Protocol`?"
    choices:
      - id: a
        text: "Автоматически, как только у него есть все методы и атрибуты, перечисленные в протоколе - наследование не нужно."
      - id: b
        text: "Только если он явно наследует от этого протокола."
      - id: c
        text: "Только если он зарегистрирован вызовом `protocol.register(cls)`."
      - id: d
        text: "Только если он помечен декоратором `@implements`."
    correct: [a]
    explanation: "`Protocol` описывает тип по форме - по набору методов. Класс соответствует ему структурно, как только содержит всё перечисленное, без всякого наследования. Это и есть структурная типизация."
    variants:
      - prompt: "Как называется типизация, при которой соответствие определяется наличием методов, а не родословной класса?"
        choices:
          - id: a
            text: "Структурная типизация."
          - id: b
            text: "Номинальная типизация."
          - id: c
            text: "Динамическая типизация."
          - id: d
            text: "Слабая типизация."
        correct: [a]
        explanation: "Структурная типизация смотрит на форму (набор методов), в противоположность номинальной, где важна родословная - кто от кого наследует. Protocol реализует именно структурный подход."
      - prompt: "Как объявляется протокол `Readable` с методом `read() -> str`?"
        choices:
          - id: a
            text: "Класс, унаследованный от `Protocol`, с методом без тела: `def read(self) -> str: ...`"
          - id: b
            text: "Обычный класс с полной реализацией метода `read`."
          - id: c
            text: "Функция, помеченная декоратором `@protocol`."
          - id: d
            text: "Словарь вида `{\"read\": str}`."
        correct: [a]
        explanation: "Протокол - это класс, наследующий `Protocol`, в котором методы оставлены без тела (`...`). Он задаёт форму, а не реализацию."

  - id: variance-list-001
    concept: protocols-variance
    type: theory-quiz
    difficulty: 2
    prompt: "Почему `list[Cat]` нельзя подставить туда, где ждут `list[Animal]` (при `Cat` - подтипе `Animal`)?"
    choices:
      - id: a
        text: "В `list[Animal]` можно дописать `Dog`, и тогда в списке котов окажется собака; изменяемый список инвариантен."
      - id: b
        text: "Потому что `Cat` не является подтипом `Animal`."
      - id: c
        text: "Потому что `list` вообще нельзя передавать в функции."
      - id: d
        text: "Потому что `Cat` и `Animal` хранятся в разных областях памяти."
    correct: [a]
    explanation: "Изменяемый контейнер, в который можно и читать, и писать, инвариантен. Если бы `list[Cat]` сошёл за `list[Animal]`, функция могла бы дописать в него `Dog`, нарушив обещание про список котов."
    hints:
      - "Подумайте, что плохого может сделать функция, получив список под видом `list[Animal]`, - какую операцию над списком она вправе выполнить?"
      - "Опасность именно в записи: если в «список животных» дописать `Dog`, держатель `list[Cat]` потом наткнётся на собаку."

  - id: variance-sequence-001
    concept: protocols-variance
    type: theory-quiz
    difficulty: 3
    prompt: "Функция только читает элементы коллекции и ничего в неё не пишет. Как лучше аннотировать параметр, чтобы принять больше корректных аргументов?"
    choices:
      - id: a
        text: "`Sequence[...]` или `Iterable[...]` - они ковариантны, поэтому примут и коллекцию подтипа."
      - id: b
        text: "`list[...]` - это самый универсальный тип для любых коллекций."
      - id: c
        text: "`object` - чтобы точно принять что угодно."
      - id: d
        text: "Не аннотировать вовсе - так анализатор не будет придираться."
    correct: [a]
    explanation: "Контейнеры только для чтения (`Sequence`, `Iterable`) ковариантны: `Sequence[Cat]` подходит вместо `Sequence[Animal]`. `list` инвариантен и примет лишь точное совпадение, поэтому для читающей функции он сужает множество допустимых аргументов."
    hints:
      - "Инвариантность `list` берётся из того, что в него можно писать. Если функция гарантированно не пишет, нужен ли вообще изменяемый тип?"
      - "Существуют типы «только для чтения», которые ковариантны - вспомните, какими интерфейсами из `typing` аннотируют коллекцию, когда нужно лишь пройтись по ней."

  - id: protocol-runtime-checkable-001
    concept: protocols-variance
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      from typing import Protocol, runtime_checkable

      @runtime_checkable
      class Readable(Protocol):
          def read(self) -> str: ...

      class Report:
          def read(self) -> str:
              return "x"

      print(isinstance(Report(), Readable))
    expected:
      kind: stdout
      value: "True"
    hints:
      - "Без `@runtime_checkable` `isinstance` с протоколом бросил бы ошибку. Декоратор здесь стоит - что он включает и по какому признаку проверяет?"
      - "`runtime_checkable` разрешает `isinstance` и проверяет лишь наличие метода `read`; у `Report` он есть, поэтому результат истинный."
    variants:
      - snippet: |
          from typing import Protocol, runtime_checkable

          @runtime_checkable
          class Readable(Protocol):
              def read(self) -> str: ...

          class Empty:
              pass

          print(isinstance(Empty(), Readable))
        expected:
          kind: stdout
          value: "False"
      - snippet: |
          from typing import Protocol, runtime_checkable

          @runtime_checkable
          class Sized(Protocol):
              def __len__(self) -> int: ...

          print(isinstance([1, 2, 3], Sized))
        expected:
          kind: stdout
          value: "True"

  - id: protocol-load-fn-001
    concept: protocols-variance
    type: python-function
    difficulty: 2
    prompt: "Реализуйте функцию `load(source)`: верните длину строки, которую отдаёт метод `source.read()`. Параметр аннотируйте протоколом `Readable`."
    starter: |
      from typing import Protocol

      class Readable(Protocol):
          def read(self) -> str: ...

      def load(source: Readable) -> int:
          ...
    cases:
      - call: "load(type('R', (), {'read': lambda self: 'данные'})())"
        expect: 6
      - call: "load(type('R', (), {'read': lambda self: ''})())"
        expect: 0
      - call: "load(type('R', (), {'read': lambda self: 'abcde'})())"
        expect: 5
    hints:
      - "Протокол гарантирует только наличие метода `read`, возвращающего строку. Что нужно сделать с этой строкой, чтобы получить число?"
      - "Сначала вызовите `source.read()`, затем посчитайте длину полученной строки встроенной функцией."
    solution: |
      from typing import Protocol

      class Readable(Protocol):
          def read(self) -> str: ...

      def load(source: Readable) -> int:
          return len(source.read())

  - id: protocol-total-area-001
    concept: protocols-variance
    type: python-function
    difficulty: 5
    prompt: "Реализуйте функцию `total_area(shapes)`: примите последовательность объектов, у каждого из которых есть метод `area() -> float`, и верните сумму их площадей. Параметр объявите как `Sequence[HasArea]`, где `HasArea` - протокол; не требуйте наследования от него."
    starter: |
      from typing import Protocol, Sequence

      class HasArea(Protocol):
          def area(self) -> float: ...

      def total_area(shapes: Sequence[HasArea]) -> float:
          ...
    cases:
      - call: "total_area([type('S', (), {'area': lambda self: 2.0})(), type('S', (), {'area': lambda self: 3.0})()])"
        expect_approx: 5.0
      - call: "total_area([])"
        expect_approx: 0.0
      - call: "total_area([type('S', (), {'area': lambda self: 1.5})()])"
        expect_approx: 1.5
    hints:
      - "Объекты роднит только форма - метод `area`. Наследования между ними нет, и оно не нужно: что общего вы вызываете у каждого?"
      - "Пройдитесь по последовательности, у каждого элемента вызовите `area()` и накапливайте сумму; для пустой последовательности сумма равна нулю."
      - "Аккуратнее с типом: сумма площадей должна быть числом с плавающей точкой, начните накопитель с `0.0`."
    solution: |
      from typing import Protocol, Sequence

      class HasArea(Protocol):
          def area(self) -> float: ...

      def total_area(shapes: Sequence[HasArea]) -> float:
          result = 0.0
          for shape in shapes:
              result += shape.area()
          return result
