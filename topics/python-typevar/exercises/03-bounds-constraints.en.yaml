exercises:
  - id: bounds-what-is-001
    concept: bounds-constraints
    type: theory-quiz
    difficulty: 1
    prompt: "What does `T = TypeVar(\"T\", bound=Comparable)` mean?"
    choices:
      - id: a
        text: "`T` is `Comparable` or any of its subtypes; inside the function you"
      - id: b
        text: "`T` is exactly `Comparable`; subtypes are forbidden."
      - id: c
        text: "`T` is any type except `Comparable`."
      - id: d
        text: "`T` must inherit from every protocol in the program at once."
    correct: [a]
    explanation: "`bound=Base` sets an upper bound: `T` is `Base` or any subtype. That opens the set downward through the hierarchy and unlocks using `Base` methods inside the function."
    variants:
      - prompt: "What does `T = TypeVar(\"T\", int, str)` (TypeVar with constraints) mean?"
        choices:
          - id: a
            text: "`T` equals exactly `int` or exactly `str`: a closed list without subtypes."
          - id: b
            text: "`T` is `int` or `str` and any of their subtypes."
          - id: c
            text: "`T` is the intersection of `int` and `str`, a type that is both number and string."
          - id: d
            text: "`T` is any type as long as it is not `int` or `str`."
        correct: [a]
        explanation: "Constraints define a closed enumeration: `T` equals exactly one listed type. Subtypes are not in the list: a `str` subclass would be \"promoted\" to `str`."
      - prompt: "How many types must appear at minimum in a TypeVar constraint list?"
        choices:
          - id: a
            text: "At least two: a list of"
          - id: b
            text: "Exactly one."
          - id: c
            text: "At least three."
          - id: d
            text: "No limit; zero is allowed."
        correct: [a]
        explanation: "`TypeVar(\"T\", int)` is an error: a constraint list requires at least two types. If one type with subtypes is allowed, use `bound=int`, not a list."

  - id: bounds-vs-constraints-001
    concept: bounds-constraints
    type: theory-quiz
    difficulty: 2
    prompt: "How do `bound` and constraints differ in type inference for a subclass of a listed/bound type?"
    choices:
      - id: a
        text: "`bound` preserves the concrete subtype in inference"
      - id: b
        text: "Both always infer `object`."
      - id: c
        text: "`bound` loses the subtype; constraints preserve it."
      - id: d
        text: "There is no inference difference; only syntax differs."
    correct: [a]
    explanation: "With `bound=str` subtype `MyStr` is preserved in the result. With constraints `(str, bytes)` the same `MyStr` is inferred as `str`: constraints \"promote\" the argument to the listed type. That is why you choose `bound` when you must not lose a subclass."
    hints:
      - "Imagine subclass `class MyStr(str)`. What does the analyzer infer for the result with `bound=str` vs constraints `(str, bytes)`?"
      - "One option preserves `MyStr`, the other collapses it to base `str`, so remember which one uses a closed list."

  - id: bounds-larger-fn-001
    concept: bounds-constraints
    type: python-function
    difficulty: 2
    prompt: "Implement `larger(a, b)`: return the larger of two arguments (the one that is not less than the other). Use `TypeVar` with `bound` on a comparison protocol."
    starter: |
      from typing import TypeVar, Protocol

      class Comparable(Protocol):
          def __lt__(self, other: object) -> bool: ...

      C = TypeVar("C", bound=Comparable)

      def larger(a: C, b: C) -> C:
          ...
    cases:
      - call: "larger(3, 7)"
        expect: 7
      - call: "larger('b', 'a')"
        expect: "b"
      - call: "larger([1], [1, 2])"
        expect: [1, 2]
    hints:
      - "`bound=Comparable` guarantees both arguments support comparison via `<`. How do you pick the larger using only `<`?"
      - "Compare `a` and `b` with the operator and return the one that is not smaller; be careful which to return on equality."
    solution: |
      from typing import TypeVar, Protocol

      class Comparable(Protocol):
          def __lt__(self, other: object) -> bool: ...

      C = TypeVar("C", bound=Comparable)

      def larger(a: C, b: C) -> C:
          return a if b < a else b

  - id: bounds-concat-001
    concept: bounds-constraints
    type: predict-output
    difficulty: 2
    prompt: "What will this program print?"
    snippet: |
      from typing import TypeVar

      AnyStr = TypeVar("AnyStr", str, bytes)

      def concat(a: AnyStr, b: AnyStr) -> AnyStr:
          return a + b

      print(concat("foo", "bar"))
      print(concat(b"foo", b"bar"))
    expected:
      kind: stdout
      value: "foobar\nb'foobar'"
    hints:
      - "Annotations are ignored at run time: the function simply adds arguments with `+`. What does `+` give for two strings and for two bytes?"
      - "String concatenation prints as-is; bytes concatenation prints with the `b'...'` prefix."
    variants:
      - snippet: |
          from typing import TypeVar

          AnyStr = TypeVar("AnyStr", str, bytes)

          def concat(a: AnyStr, b: AnyStr) -> AnyStr:
              return a + b

          print(concat("one", "two"))
        expected:
          kind: stdout
          value: "onetwo"
      - snippet: |
          from typing import TypeVar

          AnyStr = TypeVar("AnyStr", str, bytes)

          def twice(value: AnyStr) -> AnyStr:
              return value + value

          print(twice(b"ab"))
        expected:
          kind: stdout
          value: "b'abab'"

  - id: bounds-constraints-subtype-001
    concept: bounds-constraints
    type: predict-output
    difficulty: 3
    prompt: "What will this program print? (Hint: reason about run time, not analyzer inference.)"
    snippet: |
      from typing import TypeVar

      S = TypeVar("S", str, bytes)

      class MyStr(str):
          pass

      def echo(value: S) -> S:
          return value

      result = echo(MyStr("x"))
      print(result)
      print(type(result).__name__)
    expected:
      kind: stdout
      value: "x\nMyStr"
    hints:
      - "The analyzer with constraints would infer the result as `str`, but at run time annotations do nothing. What object does the function actually return?"
      - "Function `echo` simply returns the passed object unchanged: its real class does not change, even though the analyzer would \"promote\" the type to `str`."

  - id: bounds-min-of-fn-001
    concept: bounds-constraints
    type: python-function
    difficulty: 4
    prompt: "Implement `min_of(items)`: return the smallest element of a non-empty list without using built-in `min`. Rely only on comparison `<` (as required by `bound=Comparable`)."
    starter: |
      from typing import TypeVar, Protocol

      class Comparable(Protocol):
          def __lt__(self, other: object) -> bool: ...

      C = TypeVar("C", bound=Comparable)

      def min_of(items: list[C]) -> C:
          ...
    cases:
      - call: "min_of([3, 1, 2])"
        expect: 1
      - call: "min_of(['banana', 'apple', 'cherry'])"
        expect: "apple"
      - call: "min_of([5])"
        expect: 5
    hints:
      - "`bound=Comparable` gives you only the `<` operator: no `min`, no sorting. How do you find the minimum in one pass?"
      - "Keep a \"current best\", start with the first element, and for each next one compare it to the best via `<`."
      - "If the current item is less than the best, it becomes the new best; at the end the best is the minimum."
    solution: |
      from typing import TypeVar, Protocol

      class Comparable(Protocol):
          def __lt__(self, other: object) -> bool: ...

      C = TypeVar("C", bound=Comparable)

      def min_of(items: list[C]) -> C:
          best = items[0]
          for item in items[1:]:
              if item < best:
                  best = item
          return best
