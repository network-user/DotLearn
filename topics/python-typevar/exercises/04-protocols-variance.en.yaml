exercises:
  - id: protocol-what-is-001
    concept: protocols-variance
    type: theory-quiz
    difficulty: 1
    prompt: "How does a class conform to a `Protocol`?"
    choices:
      - id: a
        text: "Automatically, as soon as it has all methods and attributes listed in the protocol: no inheritance required."
      - id: b
        text: "Only if it explicitly inherits from that protocol."
      - id: c
        text: "Only if it is registered with `protocol.register(cls)`."
      - id: d
        text: "Only if it is decorated with `@implements`."
    correct: [a]
    explanation: "`Protocol` describes a type by shape: by its set of methods. A class conforms structurally as soon as it has everything listed, without any inheritance. That is structural typing."
    variants:
      - prompt: "What is the name for typing where conformance is determined by having methods, not by class lineage?"
        choices:
          - id: a
            text: "Structural typing."
          - id: b
            text: "Nominal typing."
          - id: c
            text: "Dynamic typing."
          - id: d
            text: "Weak typing."
        correct: [a]
        explanation: "Structural typing looks at shape (set of methods), as opposed to nominal typing where lineage matters: who inherits from whom. Protocol implements the structural approach."
      - prompt: "How do you declare a `Readable` protocol with method `read() -> str`?"
        choices:
          - id: a
            text: "A class inheriting from `Protocol` with a bodyless method: `def read(self) -> str: ...`"
          - id: b
            text: "An ordinary class with a full implementation of `read`."
          - id: c
            text: "A function decorated with `@protocol`."
          - id: d
            text: "A dict like `{\"read\": str}`."
        correct: [a]
        explanation: "A protocol is a class inheriting `Protocol` with methods left bodyless (`...`). It defines shape, not implementation."

  - id: variance-list-001
    concept: protocols-variance
    type: theory-quiz
    difficulty: 2
    prompt: "Why can `list[Cat]` not be substituted where `list[Animal]` is expected (when `Cat` is a subtype of `Animal`)?"
    choices:
      - id: a
        text: "`list[Animal]` allows appending a `Dog`, and then a dog would appear in a list of cats; a mutable list is invariant."
      - id: b
        text: "Because `Cat` is not a subtype of `Animal`."
      - id: c
        text: "Because `list` cannot be passed to functions at all."
      - id: d
        text: "Because `Cat` and `Animal` live in different memory regions."
    correct: [a]
    explanation: "A mutable container you can both read from and write to is invariant. If `list[Cat]` were accepted as `list[Animal]`, a function could append a `Dog`, breaking the promise of a list of cats."
    hints:
      - "Think what a function could do badly if it received a list disguised as `list[Animal]`: what operation on the list is it allowed to perform?"
      - "The danger is writing: if a \"list of animals\" gets a `Dog` appended, the holder of `list[Cat]` would later hit a dog."

  - id: variance-sequence-001
    concept: protocols-variance
    type: theory-quiz
    difficulty: 3
    prompt: "A function only reads elements from a collection and never writes to it. How should you annotate the parameter to accept more correct arguments?"
    choices:
      - id: a
        text: "`Sequence[...]` or `Iterable[...]`: they are covariant, so they accept a collection of a subtype too."
      - id: b
        text: "`list[...]`: the most universal type for any collection."
      - id: c
        text: "`object`: to accept absolutely anything."
      - id: d
        text: "Do not annotate: then the analyzer will not complain."
    correct: [a]
    explanation: "Read-only containers (`Sequence`, `Iterable`) are covariant: `Sequence[Cat]` fits where `Sequence[Animal]` is expected. `list` is invariant and accepts only an exact match, so for a read-only function it narrows acceptable arguments."
    hints:
      - "Invariance of `list` comes from being able to write into it. If the function guaranteed never writes, do you need a mutable type at all?"
      - "There are read-only types that are covariant. Recall which interfaces from `typing` annotate a collection when you only need to iterate."

  - id: protocol-runtime-checkable-001
    concept: protocols-variance
    type: predict-output
    difficulty: 3
    prompt: "What will this program print?"
    snippet: |
      from typing import Protocol, runtime_checkable

      @runtime_checkable
      class Readable(Protocol):
          def read(self) -> str: ...

      class Report:
          def read(self) -> str:
              return "x"

      print(isinstance(Report(), Readable))
    expected:
      kind: stdout
      value: "True"
    hints:
      - "Without `@runtime_checkable`, `isinstance` with a protocol would raise an error. The decorator is present here: what does it enable and what does it check?"
      - "`runtime_checkable` allows `isinstance` and checks only for method `read`; `Report` has it, so the result is true."
    variants:
      - snippet: |
          from typing import Protocol, runtime_checkable

          @runtime_checkable
          class Readable(Protocol):
              def read(self) -> str: ...

          class Empty:
              pass

          print(isinstance(Empty(), Readable))
        expected:
          kind: stdout
          value: "False"
      - snippet: |
          from typing import Protocol, runtime_checkable

          @runtime_checkable
          class Sized(Protocol):
              def __len__(self) -> int: ...

          print(isinstance([1, 2, 3], Sized))
        expected:
          kind: stdout
          value: "True"

  - id: protocol-load-fn-001
    concept: protocols-variance
    type: python-function
    difficulty: 2
    prompt: "Implement `load(source)`: return the length of the string returned by `source.read()`. Annotate the parameter with the `Readable` protocol."
    starter: |
      from typing import Protocol

      class Readable(Protocol):
          def read(self) -> str: ...

      def load(source: Readable) -> int:
          ...
    cases:
      - call: "load(type('R', (), {'read': lambda self: 'data'})())"
        expect: 4
      - call: "load(type('R', (), {'read': lambda self: ''})())"
        expect: 0
      - call: "load(type('R', (), {'read': lambda self: 'abcde'})())"
        expect: 5
    hints:
      - "The protocol guarantees only a `read` method returning a string. What do you do with that string to get a number?"
      - "Call `source.read()` first, then get the length of the resulting string with the built-in function."
    solution: |
      from typing import Protocol

      class Readable(Protocol):
          def read(self) -> str: ...

      def load(source: Readable) -> int:
          return len(source.read())

  - id: protocol-total-area-001
    concept: protocols-variance
    type: python-function
    difficulty: 5
    prompt: "Implement `total_area(shapes)`: accept a sequence of objects each with method `area() -> float`, and return the sum of their areas. Declare the parameter as `Sequence[HasArea]` where `HasArea` is a protocol; do not require inheritance from it."
    starter: |
      from typing import Protocol, Sequence

      class HasArea(Protocol):
          def area(self) -> float: ...

      def total_area(shapes: Sequence[HasArea]) -> float:
          ...
    cases:
      - call: "total_area([type('S', (), {'area': lambda self: 2.0})(), type('S', (), {'area': lambda self: 3.0})()])"
        expect_approx: 5.0
      - call: "total_area([])"
        expect_approx: 0.0
      - call: "total_area([type('S', (), {'area': lambda self: 1.5})()])"
        expect_approx: 1.5
    hints:
      - "Objects are linked only by shape: method `area`. There is no inheritance between them, and none is needed: what do you call on each?"
      - "Iterate the sequence, call `area()` on each element, and accumulate the sum; for an empty sequence the sum is zero."
      - "Watch the type: the sum of areas should be a float, so start the accumulator at `0.0`."
    solution: |
      from typing import Protocol, Sequence

      class HasArea(Protocol):
          def area(self) -> float: ...

      def total_area(shapes: Sequence[HasArea]) -> float:
          result = 0.0
          for shape in shapes:
              result += shape.area()
          return result
