exercises:
  - id: bounds-what-is-001
    concept: bounds-constraints
    type: theory-quiz
    difficulty: 1
    prompt: "Что означает `T = TypeVar(\"T\", bound=Comparable)`?"
    choices:
      - id: a
        text: "`T` - это `Comparable` или любой его подтип; внутри функции можно"
      - id: b
        text: "`T` - это ровно `Comparable`, подтипы запрещены."
      - id: c
        text: "`T` - любой тип, кроме `Comparable`."
      - id: d
        text: "`T` обязан наследовать сразу от всех протоколов в программе."
    correct: [a]
    explanation: "`bound=Base` задаёт верхнюю границу: `T` - это `Base` или любой его подтип. Это открывает множество вниз по иерархии и разблокирует использование методов `Base` внутри функции."
    variants:
      - prompt: "Что означает `T = TypeVar(\"T\", int, str)` (TypeVar с constraints)?"
        choices:
          - id: a
            text: "`T` равен ровно `int` или ровно `str` - закрытый список без подтипов."
          - id: b
            text: "`T` - это `int` или `str` и любые их подтипы."
          - id: c
            text: "`T` - это пересечение `int` и `str`, то есть тип, который одновременно и число, и строка."
          - id: d
            text: "`T` - любой тип, лишь бы не `int` и не `str`."
        correct: [a]
        explanation: "Constraints задают закрытый перечень: `T` равен ровно одному из перечисленных типов. Подтипы в список не входят - наследник `str` будет «поднят» до `str`."
      - prompt: "Сколько типов как минимум должно быть в списке constraints у `TypeVar`?"
        choices:
          - id: a
            text: "Минимум два - список из"
          - id: b
            text: "Ровно один."
          - id: c
            text: "Минимум три."
          - id: d
            text: "Ограничений нет, можно ноль."
        correct: [a]
        explanation: "`TypeVar(\"T\", int)` - ошибка: список constraints требует минимум двух типов. Если допустим один тип вместе с его подтипами, это `bound=int`, а не список."

  - id: bounds-vs-constraints-001
    concept: bounds-constraints
    type: theory-quiz
    difficulty: 2
    prompt: "Чем `bound` отличается от constraints в выводе типа для подкласса перечисленного/граничного типа?"
    choices:
      - id: a
        text: "`bound` сохраняет конкретный подтип в выводе; constraints"
      - id: b
        text: "Оба всегда выводят `object`."
      - id: c
        text: "`bound` теряет подтип, а constraints его сохраняют."
      - id: d
        text: "Разницы в выводе нет, отличается только синтаксис."
    correct: [a]
    explanation: "С `bound=str` подтип `MyStr` сохранится в результате. С constraints `(str, bytes)` тот же `MyStr` будет выведен как `str` - constraints «поднимают» аргумент до перечисленного типа. Это причина выбирать `bound`, когда важно не терять подкласс."
    hints:
      - "Представьте подкласс `class MyStr(str)`. Что выведет анализатор для результата при `bound=str` и при constraints `(str, bytes)`?"
      - "Один из вариантов сохраняет `MyStr`, другой схлопывает его до базового `str` - вспомните, какой именно перечисляет типы закрытым списком."

  - id: bounds-larger-fn-001
    concept: bounds-constraints
    type: python-function
    difficulty: 2
    prompt: "Реализуйте функцию `larger(a, b)`: верните больший из двух аргументов (тот, что не меньше другого). Используйте `TypeVar` с `bound` по протоколу со сравнением."
    starter: |
      from typing import TypeVar, Protocol

      class Comparable(Protocol):
          def __lt__(self, other: object) -> bool: ...

      C = TypeVar("C", bound=Comparable)

      def larger(a: C, b: C) -> C:
          ...
    cases:
      - call: "larger(3, 7)"
        expect: 7
      - call: "larger('b', 'a')"
        expect: "b"
      - call: "larger([1], [1, 2])"
        expect: [1, 2]
    hints:
      - "`bound=Comparable` гарантирует, что у обоих аргументов есть сравнение через `<`. Как, имея только `<`, выбрать больший?"
      - "Сравните `a` и `b` оператором и верните тот, что оказался не меньше; будьте внимательны, какой вернуть при равенстве."
    solution: |
      from typing import TypeVar, Protocol

      class Comparable(Protocol):
          def __lt__(self, other: object) -> bool: ...

      C = TypeVar("C", bound=Comparable)

      def larger(a: C, b: C) -> C:
          return a if b < a else b

  - id: bounds-concat-001
    concept: bounds-constraints
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      from typing import TypeVar

      AnyStr = TypeVar("AnyStr", str, bytes)

      def concat(a: AnyStr, b: AnyStr) -> AnyStr:
          return a + b

      print(concat("foo", "bar"))
      print(concat(b"foo", b"bar"))
    expected:
      kind: stdout
      value: "foobar\nb'foobar'"
    hints:
      - "Аннотации в рантайме игнорируются - функция просто складывает аргументы оператором `+`. Что даёт `+` для двух строк и для двух bytes?"
      - "Конкатенация строк печатается как есть, а конкатенация bytes печатается с префиксом `b'...'`."
    variants:
      - snippet: |
          from typing import TypeVar

          AnyStr = TypeVar("AnyStr", str, bytes)

          def concat(a: AnyStr, b: AnyStr) -> AnyStr:
              return a + b

          print(concat("раз", "два"))
        expected:
          kind: stdout
          value: "раздва"
      - snippet: |
          from typing import TypeVar

          AnyStr = TypeVar("AnyStr", str, bytes)

          def twice(value: AnyStr) -> AnyStr:
              return value + value

          print(twice(b"ab"))
        expected:
          kind: stdout
          value: "b'abab'"

  - id: bounds-constraints-subtype-001
    concept: bounds-constraints
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа? (Подсказка: рассуждайте про рантайм, а не про вывод анализатора.)"
    snippet: |
      from typing import TypeVar

      S = TypeVar("S", str, bytes)

      class MyStr(str):
          pass

      def echo(value: S) -> S:
          return value

      result = echo(MyStr("x"))
      print(result)
      print(type(result).__name__)
    expected:
      kind: stdout
      value: "x\nMyStr"
    hints:
      - "Анализатор с constraints вывел бы тип результата как `str`, но в рантайме аннотации ничего не делают. Какой объект функция реально вернёт?"
      - "Функция `echo` просто возвращает переданный объект без изменений - его реальный класс не меняется, хотя анализатор «поднял» бы тип до `str`."

  - id: bounds-min-of-fn-001
    concept: bounds-constraints
    type: python-function
    difficulty: 4
    prompt: "Реализуйте функцию `min_of(items)`: верните наименьший элемент непустого списка, не используя встроенный `min`. Опирайтесь только на сравнение `<` (как требует `bound=Comparable`)."
    starter: |
      from typing import TypeVar, Protocol

      class Comparable(Protocol):
          def __lt__(self, other: object) -> bool: ...

      C = TypeVar("C", bound=Comparable)

      def min_of(items: list[C]) -> C:
          ...
    cases:
      - call: "min_of([3, 1, 2])"
        expect: 1
      - call: "min_of(['banana', 'apple', 'cherry'])"
        expect: "apple"
      - call: "min_of([5])"
        expect: 5
    hints:
      - "`bound=Comparable` даёт вам только оператор `<` - ни `min`, ни сортировки. Как найти минимум, проходя список один раз?"
      - "Заведите «текущий лучший», начните им первый элемент, и для каждого следующего сравните его с лучшим через `<`."
      - "Если очередной элемент меньше текущего лучшего, он становится новым лучшим; в конце лучший и есть минимум."
    solution: |
      from typing import TypeVar, Protocol

      class Comparable(Protocol):
          def __lt__(self, other: object) -> bool: ...

      C = TypeVar("C", bound=Comparable)

      def min_of(items: list[C]) -> C:
          best = items[0]
          for item in items[1:]:
              if item < best:
                  best = item
          return best
