exercises:
  - id: typing-what-is-001
    concept: typing-basics
    type: theory-quiz
    difficulty: 1
    prompt: "What does the type annotation `age: int` do at run time?"
    choices:
      - id: a
        text: "Nothing is checked"
      - id: b
        text: "It forbids assigning anything to `age` except an integer."
      - id: c
        text: "It coerces the assigned value to `int`, like `int(...)` would."
      - id: d
        text: "It stops the program with an error if the wrong type is passed."
    correct: [a]
    explanation: "An annotation is a contract for the type checker (mypy, pyright), not a run-time check. The interpreter stores it in `__annotations__` but does not validate values."
    variants:
      - prompt: "Who actually checks that code matches type annotations?"
        choices:
          - id: a
            text: "A separate static analyzer that reads code without running it."
          - id: b
            text: "The Python interpreter on every assignment."
          - id: c
            text: "The garbage collector when an object is freed."
          - id: d
            text: "Nobody: annotations are pure decoration with no readers."
        correct: [a]
        explanation: "Checking is done by an external type checker that compares actual usage to the declared contract before run time. Without it, annotations remain documentation only."
      - prompt: "What does the return annotation `-> None` on a function mean?"
        choices:
          - id: a
            text: "An explicit contract that the function returns nothing useful."
          - id: b
            text: "The same as omitting the arrow: type not specified."
          - id: c
            text: "The function must not be called: it is marked as a stub."
          - id: d
            text: "The function always raises an error."
        correct: [a]
        explanation: "`-> None` explicitly says \"returns nothing useful.\" That is not the same as a missing annotation, which means \"type not specified.\""

  - id: typing-container-blanks-001
    concept: typing-basics
    type: fill-in-blanks
    difficulty: 1
    prompt: "Fill in the annotations: `scores` is a list of ints, `ages` is a dict with string keys and int values."
    template: |
      scores: {{score_type}} = [10, 20, 30]
      ages: {{ages_type}} = {"Anna": 34, "Boris": 29}
    blanks:
      score_type:
        accept: ["list[int]"]
        accept_regex: '^list\[\s*int\s*\]$'
      ages_type:
        accept: ["dict[str, int]", "dict[str,int]"]
        accept_regex: '^dict\[\s*str\s*,\s*int\s*\]$'
    variants:
      - prompt: "Fill in the annotations: `names` is a list of strings, `prices` is a dict with string keys and float values."
        template: |
          names: {{names_type}} = ["Anna", "Boris"]
          prices: {{prices_type}} = {"coffee": 2.5}
        blanks:
          names_type:
            accept: ["list[str]"]
            accept_regex: '^list\[\s*str\s*\]$'
          prices_type:
            accept: ["dict[str, float]", "dict[str,float]"]
            accept_regex: '^dict\[\s*str\s*,\s*float\s*\]$'
      - prompt: "Fill in the annotations: `pair` is a tuple of int and string, `flags` is a list of booleans."
        template: |
          pair: {{pair_type}} = (1, "x")
          flags: {{flags_type}} = [True, False]
        blanks:
          pair_type:
            accept: ["tuple[int, str]", "tuple[int,str]"]
            accept_regex: '^tuple\[\s*int\s*,\s*str\s*\]$'
          flags_type:
            accept: ["list[bool]"]
            accept_regex: '^list\[\s*bool\s*\]$'

  - id: typing-annotations-runtime-001
    concept: typing-basics
    type: predict-output
    difficulty: 2
    prompt: "What will this program print?"
    snippet: |
      def greet(person: str, times: int) -> str:
          return f"Hello, {person}! " * times

      print(greet.__annotations__)
    expected:
      kind: stdout
      value: "{'person': <class 'str'>, 'times': <class 'int'>, 'return': <class 'str'>}"
    hints:
      - "The interpreter does not discard annotations. It stores them in one dict on the function. What becomes keys and what becomes values?"
      - "Keys are parameter names plus the special key `return`; values are the type objects themselves, printed as `<class '...'>`."
    variants:
      - snippet: |
          def total(values: list[int]) -> int:
              return sum(values)

          print(total.__annotations__)
        expected:
          kind: stdout
          value: "{'values': list[int], 'return': <class 'int'>}"
      - snippet: |
          def log(message: str) -> None:
              print(message)

          print(log.__annotations__)
        expected:
          kind: stdout
          value: "{'message': <class 'str'>, 'return': None}"

  - id: typing-no-coercion-001
    concept: typing-basics
    type: predict-output
    difficulty: 3
    prompt: "What will this program print?"
    snippet: |
      x: int = "5"
      print(type(x).__name__)
      print(x + "0")
    expected:
      kind: stdout
      value: "str\n50"
    hints:
      - "An annotation is a promise, not a cast. Does assignment with an annotation convert a string to a number?"
      - "`x` still holds the string `\"5\"`, so `type(x).__name__` is `str`, and `+` with string `\"0\"` works as concatenation."
    variants:
      - snippet: |
          n: int = "3"
          print(type(n).__name__)
          print(n * 2)
        expected:
          kind: stdout
          value: "str\n33"
      - snippet: |
          value: float = "1"
          print(type(value).__name__)
          print(value + "0")
        expected:
          kind: stdout
          value: "str\n10"

  - id: typing-optional-001
    concept: typing-basics
    type: theory-quiz
    difficulty: 3
    prompt: "A function returns `dict.get(key)`, which yields `None` when the key is missing. How should you honestly annotate its return type?"
    choices:
      - id: a
        text: "`-> str | None`: the value is either a string or `None`, and the analyzer will"
      - id: b
        text: "`-> str`: you can ignore `None`, it is rare."
      - id: c
        text: "`-> None`: if `None` happens, the whole type is `None`."
      - id: d
        text: "Better not annotate the return at all so the analyzer does not complain."
    correct: [a]
    explanation: "`dict.get` returns `None` when the key is missing, so the honest type is `str | None`. After that the analyzer will not let you call a string method on the result until you rule out `None`."
    hints:
      - "Think about what values the function can actually return for different inputs, then decide whether they are all the same type."
      - "If at least one input returns `None`, the union type must reflect that so the analyzer requires a check."

  - id: typing-find-user-002
    concept: typing-basics
    type: predict-output
    difficulty: 2
    prompt: "What will this program print?"
    snippet: |
      def find_user(user_id: int) -> str | None:
          table = {1: "Anna", 2: "Boris"}
          return table.get(user_id)

      print(find_user(2))
      print(find_user(9))
    expected:
      kind: stdout
      value: "Boris\nNone"
    hints:
      - "`dict.get` returns the value for a key, or a default when the key is missing. What is the default without a second argument?"
      - "Key `2` is in the dict, key `9` is not; `get` without a second argument returns `None` for a missing key."
