conceptId: typevar-generic
cards:
  - id: typevar-generic-01
    front: "What is `TypeVar` in plain terms?"
    back: "A variable for a type. An ordinary variable holds a value; `TypeVar` holds a type that becomes known at the call site and links positions in a signature to the same type."
    tags: [typevar, model]
  - id: typevar-generic-02
    front: "Why is `TypeVar` better than `object` for a \"first list element\" function?"
    back: "`object` erases the type forever — the result is `object` with no useful methods. `TypeVar` remembers the input type and carries it to the output: `first([\"a\"])` returns `str`, not `object`."
    tags: [typevar, object]
  - id: typevar-generic-03
    front: "How do you declare and use a simple `TypeVar`?"
    back: "`T = TypeVar(\"T\")` from `typing`, then use `T` in the signature: `def first(items: list[T]) -> T`. The name `T` is convention; any name works."
    tags: [typevar, syntax]
  - id: typevar-generic-04
    front: "What does the analyzer report for `pick(1, \"x\", True)` when both arguments are typed with one `T`?"
    back: "An error. Both arguments share one `T`, so they must be the same type. `T` cannot be both `int` and `str`."
    tags: [typevar, pitfall]
  - id: typevar-generic-05
    front: "How do you make your own generic container class?"
    back: "Inherit the class from `Generic[T]` and use `T` in methods. Then `Box[int]` fixes the parameter at construction, like built-in `list[int]`."
    tags: [generic, class]
  - id: typevar-generic-06
    front: "Are two uses of the same name `T` in different functions linked to each other?"
    back: "No. The link exists only inside one signature between its `T` positions. One `T` can be used in dozens of functions — each gets its own substitution."
    tags: [typevar, scope]
  - id: typevar-generic-07
    front: "What is type erasure in Python generics?"
    back: "At run time `Box[int]` and `Box[str]` are the same class `Box`; the type parameter is erased. `T` is stored nowhere, so comparing classes gives `True`."
    tags: [type-erasure, runtime]
  - id: typevar-generic-08
    front: "Can you write `if T is int` inside a method to branch on type?"
    back: "No. At run time `T` does not exist because of type erasure. If behavior depends on type, pass it as an ordinary value argument (a factory or the class itself)."
    tags: [type-erasure, pitfall]
  - id: typevar-generic-09
    front: "What is required for a class to use `T` as a type parameter?"
    back: "Inherit from `Generic[T]`. Without that the analyzer will not understand the class is parameterized, and `Box[int]` will be an error."
    tags: [generic, pitfall]
  - id: typevar-generic-10
    front: "What does PEP 695 syntax in Python 3.12 provide for generics?"
    back: "You can write `def first[T](items: list[T]) -> T` and `class Box[T]` without an explicit `TypeVar`. Under the hood it is the same mechanism; the older style works everywhere."
    tags: [pep695, syntax]
