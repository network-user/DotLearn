conceptId: typing-basics
cards:
  - id: typing-basics-01
    front: "Does the Python interpreter check type annotations at run time?"
    back: "No. The interpreter does not execute annotations: `age: int` only declares intent. A separate static analyzer (mypy, pyright) checks before run time."
    tags: [annotations, runtime]
  - id: typing-basics-02
    front: "How are function arguments and return values annotated?"
    back: "Arguments use `name: type` inside parentheses; return type goes after the arrow `->`. Example: `def greet(person: str, times: int) -> str`."
    tags: [syntax]
  - id: typing-basics-03
    front: "How does `-> None` differ from omitting the arrow on a function?"
    back: "`-> None` is an explicit contract \"returns nothing useful.\" A missing annotation means \"type not specified.\" For procedures, write `-> None` explicitly."
    tags: [none, syntax]
  - id: typing-basics-04
    front: "How do you annotate a list of ints and a dict with string keys and int values?"
    back: "`list[int]` and `dict[str, int]`. Since Python 3.9 built-in collections are parameterized directly with square brackets."
    tags: [containers]
  - id: typing-basics-05
    front: "What is wrong with bare `list` instead of `list[int]`?"
    back: "Bare `list` means \"list of anything,\" and the analyzer will not catch putting strings in instead of numbers. Specify the container parameter when you know it."
    tags: [containers, pitfall]
  - id: typing-basics-06
    front: "How do you denote a value that may be a string or absent?"
    back: "`str | None` (or `Optional[str]` in the older style). After that the analyzer requires ruling out `None` before using string methods."
    tags: [optional]
  - id: typing-basics-07
    front: "What happens with `x: int = \"5\"`?"
    back: "No type coercion: `x` stays a string. An annotation is a promise, not a cast. `type(x)` gives `str`, and adding a string gives concatenation."
    tags: [edge-case, cast]
  - id: typing-basics-08
    front: "Where does the interpreter store function annotations at run time?"
    back: "In the `__annotations__` attribute. They are available at run time as a dict, but are not checked by the interpreter."
    tags: [annotations, runtime]
  - id: typing-basics-09
    front: "What is gradual typing in Python?"
    back: "You can annotate nothing, part of the code, or everything. Unannotated code is treated as dynamic and the analyzer does not complain, so you can add types file by file."
    tags: [gradual-typing]
  - id: typing-basics-10
    front: "Why are annotations almost useless for guarantees without a type checker?"
    back: "Without mypy, pyright, or IDE checking, annotations are documentation only. Nobody enforces the contract, so run the analyzer in CI."
    tags: [tooling, pitfall]
