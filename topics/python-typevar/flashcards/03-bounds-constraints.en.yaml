conceptId: bounds-constraints
cards:
  - id: bounds-constraints-01
    front: "Why can you do almost nothing with `T` inside a function with an unrestricted `TypeVar`?"
    back: "A plain `TypeVar` guarantees nothing about `T` â€” it could be anything. So comparison or method calls are rejected: the analyzer does not know `T` has those operations."
    tags: [typevar, model]
  - id: bounds-constraints-02
    front: "What does `bound=Base` on a `TypeVar` mean?"
    back: "`T` is `Base` or any subtype. The set is open downward through the hierarchy, and all methods declared on `Base` are available inside the function."
    tags: [bound]
  - id: bounds-constraints-03
    front: "What do constraints like `TypeVar(\"T\", int, str)` specify?"
    back: "A closed list: `T` equals exactly `int` or exactly `str`, without their subtypes. No third option, and you cannot mix listed types in one call."
    tags: [constraints]
  - id: bounds-constraints-04
    front: "What is the main protection constraints provide?"
    back: "They forbid mixing listed types in one call. `concat(\"foo\", b\"bar\")` with `AnyStr` is an error: in one call `T` must collapse to one listed type."
    tags: [constraints, protection]
  - id: bounds-constraints-05
    front: "How do `bound` and constraints treat subtypes differently in inference?"
    back: "`bound` preserves the concrete subtype: with `bound=str`, result for subclass `MyStr` stays `MyStr`. Constraints promote the argument to the nearest listed type, so `MyStr` becomes `str`."
    tags: [bound, constraints, subtype]
  - id: bounds-constraints-06
    front: "What is `AnyStr` from the `typing` module?"
    back: "A real `TypeVar` defined as `TypeVar(\"AnyStr\", str, bytes)`. The standard library uses it in functions that work the same with strings and bytes."
    tags: [anystr, constraints]
  - id: bounds-constraints-07
    front: "What is the minimum number of types in a constraint list?"
    back: "At least two. `TypeVar(\"T\", int)` is an error. If one type with subtypes is allowed, use `bound=int`, not a list."
    tags: [constraints, pitfall]
  - id: bounds-constraints-08
    front: "Why is a protocol bound more convenient than a concrete class bound?"
    back: "`bound=SomeProtocol` is structural: any type with the required methods fits, without inheritance. `bound=SomeClass` is nominal: only literal subclasses of the class qualify."
    tags: [bound, protocol]
  - id: bounds-constraints-09
    front: "What is the short rule for choosing between `bound` and constraints?"
    back: "If you know a closed list of types and must forbid mixing them â€” constraints. If it is enough that the type can do certain methods â€” `bound`. When in doubt, start with `bound`: loosening later is easier."
    tags: [bound, constraints, decision]
  - id: bounds-constraints-10
    front: "Why is `bound` called the default tool?"
    back: "It is open to extension (a new comparable type is accepted without changes), preserves subtypes, and expresses requirements through behavior, not type enumeration."
    tags: [bound]
