conceptId: protocols-variance
cards:
  - id: protocols-variance-01
    front: "Что описывает `Protocol` и чем это отличается от номинальной типизации?"
    back: "Протокол описывает тип по форме - по набору методов и атрибутов - без наследования. Это структурная типизация, в противоположность номинальной, где важна родословная (кто от кого наследует)."
    tags: [protocol, structural]
  - id: protocols-variance-02
    front: "Как объявить протокол `Readable` с методом `read`?"
    back: "Унаследовать класс от `Protocol` и оставить методы без тела (троеточие вместо реализации). Протокол задаёт форму, а не реализацию."
    tags: [protocol, syntax]
  - id: protocols-variance-03
    front: "Должен ли класс наследоваться от протокола, чтобы ему соответствовать?"
    back: "Нет. Класс соответствует протоколу автоматически, как только у него есть все нужные методы. Наследование от протокола допустимо для самопроверки, но не требуется."
    tags: [protocol, structural]
  - id: protocols-variance-04
    front: "Что такое инвариантность изменяемого списка?"
    back: "`list[Cat]` нельзя подставить вместо `list[Animal]` ни в одну сторону. Иначе функция вроде `add_dog` дописала бы `Dog` в список котов, и держатель `list[Cat]` наткнулся бы на собаку."
    tags: [variance, invariant]
  - id: protocols-variance-05
    front: "Почему `Sequence[Cat]` подходит вместо `Sequence[Animal]`, а `list[Cat]` - нет?"
    back: "`Sequence` доступен только для чтения, поэтому ковариантен: добавить чужой объект нельзя, а любой кот - животное. Изменяемый `list` инвариантен, так как в него можно и читать, и писать."
    tags: [variance, covariant]
  - id: protocols-variance-06
    front: "Как аннотировать параметр, если функция только читает коллекцию?"
    back: "Брать `Sequence[...]` или `Iterable[...]`, а не `list[...]`. Они ковариантны и примут больше корректных аргументов, включая контейнеры подтипа."
    tags: [variance, best-practice]
  - id: protocols-variance-07
    front: "Можно ли по умолчанию вызвать `isinstance(obj, SomeProtocol)`?"
    back: "Нет, будет `TypeError`. Протоколы - инструмент статической проверки. Чтобы разрешить рантайм-проверку, протокол помечают декоратором `@runtime_checkable`."
    tags: [isinstance, runtime-checkable]
  - id: protocols-variance-08
    front: "Что именно проверяет `isinstance` с `@runtime_checkable` протоколом?"
    back: "Только наличие методов по именам, а не их сигнатуры. Он подтвердит соответствие, даже если метод принимает не те аргументы или возвращает не тот тип."
    tags: [runtime-checkable, pitfall]
  - id: protocols-variance-09
    front: "Чем ковариантная позиция отличается от контравариантной?"
    back: "Откуда значение только читают (выход функции, элементы `Sequence`) - ковариантно, туда можно подставить подтип. Куда только пишут (вход-приёмник) - контравариантно, туда можно подставить надтип."
    tags: [variance, position]
  - id: protocols-variance-10
    front: "Почему `Callable[[Animal], Cat]` ковариантен по результату и контравариантен по аргументу?"
    back: "Функция, возвращающая `Cat`, годится там, где ждут возврат `Animal` (подтип на выходе). Функция, принимающая `Animal`, годится там, где ждут приём `Cat` - она справится и с котом."
    tags: [variance, callable]
