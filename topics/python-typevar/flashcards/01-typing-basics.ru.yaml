conceptId: typing-basics
cards:
  - id: typing-basics-01
    front: "Проверяет ли интерпретатор Python аннотации типов во время выполнения?"
    back: "Нет. Интерпретатор аннотации не исполняет: запись `age: int` лишь объявляет намерение. Проверку делает отдельный статический анализатор (mypy, pyright) до запуска."
    tags: [annotations, runtime]
  - id: typing-basics-02
    front: "Как аннотируются аргументы и возвращаемое значение функции?"
    back: "Аргумент - `имя: тип` внутри скобок, тип возврата - после стрелки `->`. Например `def greet(person: str, times: int) -> str`."
    tags: [syntax]
  - id: typing-basics-03
    front: "Чем `-> None` отличается от отсутствия стрелки у функции?"
    back: "`-> None` - явный контракт «ничего полезного не возвращаю». Отсутствие аннотации означает «тип не указан». Для процедур пишут `-> None` явно."
    tags: [none, syntax]
  - id: typing-basics-04
    front: "Как аннотировать список целых и словарь со строковыми ключами и целыми значениями?"
    back: "`list[int]` и `dict[str, int]`. С Python 3.9 встроенные коллекции параметризуются напрямую квадратными скобками."
    tags: [containers]
  - id: typing-basics-05
    front: "Чем плохо голое `list` вместо `list[int]`?"
    back: "Голое `list` означает «список чего угодно», и анализатор не поймает, что в него кладут строки вместо чисел. Параметр контейнера нужно указывать, когда он известен."
    tags: [containers, pitfall]
  - id: typing-basics-06
    front: "Как обозначить значение, которое может быть строкой или отсутствовать?"
    back: "`str | None` (или `Optional[str]` в старом стиле). Анализатор после этого потребует отсеять `None` перед использованием строковых методов."
    tags: [optional]
  - id: typing-basics-07
    front: "Что произойдёт при `x: int = \"5\"`?"
    back: "Никакого приведения типа: в `x` останется строка. Аннотация - обещание, а не каст. `type(x)` даст `str`, а сложение со строкой даст конкатенацию."
    tags: [edge-case, cast]
  - id: typing-basics-08
    front: "Где интерпретатор хранит аннотации функции во время выполнения?"
    back: "В атрибуте `__annotations__`. Они доступны в рантайме как словарь, но интерпретатором не проверяются."
    tags: [annotations, runtime]
  - id: typing-basics-09
    front: "Что такое постепенная типизация (gradual typing) в Python?"
    back: "Можно не аннотировать ничего, часть кода или всё. Непроаннотированный код анализатор считает динамическим и не предъявляет претензий, что позволяет добавлять типы файл за файлом."
    tags: [gradual-typing]
  - id: typing-basics-10
    front: "Почему аннотации без подключённого type checker почти бесполезны для гарантий?"
    back: "Без mypy, pyright или проверки в IDE аннотации - только документация. Соблюдать контракт некому, поэтому анализатор запускают в CI."
    tags: [tooling, pitfall]
