conceptId: protocols-variance
cards:
  - id: protocols-variance-01
    front: "What does `Protocol` describe, and how does that differ from nominal typing?"
    back: "A protocol describes a type by shape — by its set of methods and attributes — without inheritance. That is structural typing, as opposed to nominal typing where lineage (who inherits from whom) matters."
    tags: [protocol, structural]
  - id: protocols-variance-02
    front: "How do you declare a `Readable` protocol with a `read` method?"
    back: "Inherit a class from `Protocol` and leave methods bodyless (ellipsis instead of implementation). The protocol defines shape, not implementation."
    tags: [protocol, syntax]
  - id: protocols-variance-03
    front: "Must a class inherit from a protocol to conform to it?"
    back: "No. A class conforms automatically as soon as it has all required methods. Inheriting from a protocol is allowed for self-checking but not required."
    tags: [protocol, structural]
  - id: protocols-variance-04
    front: "What is invariance of a mutable list?"
    back: "`list[Cat]` cannot substitute for `list[Animal]` in either direction. Otherwise a function like `add_dog` could append a `Dog` to a list of cats, and the holder of `list[Cat]` would hit a dog."
    tags: [variance, invariant]
  - id: protocols-variance-05
    front: "Why does `Sequence[Cat]` fit where `Sequence[Animal]` is expected, but `list[Cat]` does not?"
    back: "`Sequence` is read-only, so it is covariant: you cannot add a foreign object, and every cat is an animal. Mutable `list` is invariant because you can both read and write."
    tags: [variance, covariant]
  - id: protocols-variance-06
    front: "How should you annotate a parameter if the function only reads a collection?"
    back: "Use `Sequence[...]` or `Iterable[...]`, not `list[...]`. They are covariant and accept more correct arguments, including containers of a subtype."
    tags: [variance, best-practice]
  - id: protocols-variance-07
    front: "Can you call `isinstance(obj, SomeProtocol)` by default?"
    back: "No — that raises `TypeError`. Protocols are for static checking. To allow run-time checking, mark the protocol with `@runtime_checkable`."
    tags: [isinstance, runtime-checkable]
  - id: protocols-variance-08
    front: "What does `isinstance` check with a `@runtime_checkable` protocol?"
    back: "Only method names, not signatures. It will confirm conformance even if a method takes wrong arguments or returns the wrong type."
    tags: [runtime-checkable, pitfall]
  - id: protocols-variance-09
    front: "How does a covariant position differ from a contravariant one?"
    back: "Where a value is only read (function output, elements of `Sequence`) — covariant; you can substitute a subtype. Where a value is only written (input sink) — contravariant; you can substitute a supertype."
    tags: [variance, position]
  - id: protocols-variance-10
    front: "Why is `Callable[[Animal], Cat]` covariant in the result and contravariant in the argument?"
    back: "A function returning `Cat` fits where a return of `Animal` is expected (subtype on output). A function accepting `Animal` fits where acceptance of `Cat` is expected — it can handle a cat too."
    tags: [variance, callable]
