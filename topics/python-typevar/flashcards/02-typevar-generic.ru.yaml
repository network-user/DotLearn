conceptId: typevar-generic
cards:
  - id: typevar-generic-01
    front: "Что такое `TypeVar` своими словами?"
    back: "Переменная для типа. Обычная переменная держит значение, `TypeVar` держит тип, который станет известен на месте вызова, и связывает позиции в сигнатуре в один и тот же тип."
    tags: [typevar, model]
  - id: typevar-generic-02
    front: "Чем `TypeVar` лучше `object` для функции «первый элемент списка»?"
    back: "`object` стирает тип навсегда - результат будет `object` без нужных методов. `TypeVar` запоминает тип входа и переносит на выход: `first([\"a\"])` вернёт `str`, а не `object`."
    tags: [typevar, object]
  - id: typevar-generic-03
    front: "Как объявить и применить простой `TypeVar`?"
    back: "`T = TypeVar(\"T\")` из модуля `typing`, затем использовать `T` в сигнатуре: `def first(items: list[T]) -> T`. Имя `T` - соглашение, годится любое."
    tags: [typevar, syntax]
  - id: typevar-generic-04
    front: "Что выведет анализатор для `pick(1, \"x\", True)`, если оба аргумента типизированы одним `T`?"
    back: "Ошибку. Оба аргумента типизированы одним `T`, поэтому должны быть одного типа. `T` не может быть одновременно `int` и `str`."
    tags: [typevar, pitfall]
  - id: typevar-generic-05
    front: "Как сделать собственный обобщённый класс-контейнер?"
    back: "Унаследовать класс от `Generic[T]` и использовать `T` в методах. Тогда `Box[int]` фиксирует параметр при создании, как встроенный `list[int]`."
    tags: [generic, class]
  - id: typevar-generic-06
    front: "Связаны ли между собой два разных использования одного имени `T` в разных функциях?"
    back: "Нет. Связь возникает только внутри одной сигнатуры между её позициями `T`. Один `T` можно использовать в десятках функций - каждая получает свою подстановку."
    tags: [typevar, scope]
  - id: typevar-generic-07
    front: "Что такое стирание типов (type erasure) в дженериках Python?"
    back: "В рантайме `Box[int]` и `Box[str]` - один и тот же класс `Box`, параметр типа стёрт. `T` нигде не хранится, поэтому проверка тождества классов даёт `True`."
    tags: [type-erasure, runtime]
  - id: typevar-generic-08
    front: "Можно ли внутри метода написать `if T is int` для ветвления по типу?"
    back: "Нет. В рантайме переменной `T` не существует из-за стирания типов. Если поведение зависит от типа, его передают обычным аргументом-значением (фабрику или сам класс)."
    tags: [type-erasure, pitfall]
  - id: typevar-generic-09
    front: "Что нужно, чтобы класс использовал `T` как параметр типа?"
    back: "Унаследовать его от `Generic[T]`. Без этого анализатор не поймёт, что класс параметризуется, и `Box[int]` окажется ошибкой."
    tags: [generic, pitfall]
  - id: typevar-generic-10
    front: "Что даёт синтаксис PEP 695 в Python 3.12 для дженериков?"
    back: "Можно писать `def first[T](items: list[T]) -> T` и `class Box[T]` без явного `TypeVar`. Под капотом тот же механизм; старый стиль работает везде."
    tags: [pep695, syntax]
