conceptId: bounds-constraints
cards:
  - id: bounds-constraints-01
    front: "Почему внутри функции с неограниченным `TypeVar` почти ничего нельзя сделать с `T`?"
    back: "Чистый `TypeVar` не даёт никаких гарантий про `T` - им может оказаться что угодно. Поэтому сравнение или вызов метода анализатор не пропустит: про `T` не известно, что у него этот метод есть."
    tags: [typevar, model]
  - id: bounds-constraints-02
    front: "Что означает `bound=Base` у `TypeVar`?"
    back: "`T` - это `Base` или любой его подтип. Множество открыто вниз по иерархии, и внутри функции доступны все методы, объявленные в `Base`."
    tags: [bound]
  - id: bounds-constraints-03
    front: "Что задают constraints вида `TypeVar(\"T\", int, str)`?"
    back: "Закрытый список: `T` равен ровно `int` или ровно `str`, без их подтипов. Третьего варианта нет, и смешивать перечисленные типы в одном вызове нельзя."
    tags: [constraints]
  - id: bounds-constraints-04
    front: "В чём главная защита constraints?"
    back: "Они не дают смешать перечисленные типы в одном вызове. `concat(\"foo\", b\"bar\")` с `AnyStr` - ошибка: в вызове `T` обязан схлопнуться к одному типу из списка."
    tags: [constraints, protection]
  - id: bounds-constraints-05
    front: "Как `bound` и constraints по-разному обходятся с подтипами в выводе?"
    back: "`bound` сохраняет конкретный подтип: с `bound=str` результат для подкласса `MyStr` останется `MyStr`. Constraints поднимают аргумент до ближайшего перечисленного типа, и `MyStr` станет `str`."
    tags: [bound, constraints, subtype]
  - id: bounds-constraints-06
    front: "Что такое `AnyStr` из модуля `typing`?"
    back: "Реальный `TypeVar`, определённый как `TypeVar(\"AnyStr\", str, bytes)`. Стандартная библиотека использует его в функциях, одинаково работающих со строками и байтами."
    tags: [anystr, constraints]
  - id: bounds-constraints-07
    front: "Сколько типов минимум должно быть в списке constraints?"
    back: "Минимум два. `TypeVar(\"T\", int)` - ошибка. Если допустим один тип с подтипами, нужен `bound=int`, а не список."
    tags: [constraints, pitfall]
  - id: bounds-constraints-08
    front: "Почему `bound` по протоколу удобнее `bound` по конкретному классу?"
    back: "`bound=SomeProtocol` - структурная типизация: подойдёт любой тип с нужными методами, без наследования. `bound=SomeClass` - номинальная: только буквальные наследники класса."
    tags: [bound, protocol]
  - id: bounds-constraints-09
    front: "Какое короткое правило выбора между `bound` и constraints?"
    back: "Если знаете закрытый список типов и нужно запретить их смешение - constraints. Если достаточно, чтобы тип умел некоторые методы - `bound`. В сомнениях начинайте с `bound`: ослабить требование позже проще."
    tags: [bound, constraints, decision]
  - id: bounds-constraints-10
    front: "Почему `bound` называют инструментом по умолчанию?"
    back: "Он открыт для расширения (новый сравнимый тип примется без правок), сохраняет подтипы и выражает требование через поведение, а не через перечисление типов."
    tags: [bound]
