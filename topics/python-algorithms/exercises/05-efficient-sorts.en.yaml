exercises:
  - id: efficient-sorts-barrier-001
    concept: efficient-sorts
    type: theory-quiz
    difficulty: 1
    prompt: "Bubble sort does about n²/2 comparisons, while merge sort does about n log n. Why is this a fundamental rather than a cosmetic difference on large data?"
    choices:
      - id: a
        text: "They are different growth classes: as n grows, the ratio n²/(n log n) = n/log n grows without bound, so the gap becomes arbitrarily large."
      - id: b
        text: "Merge sort simply runs on a faster processor."
      - id: c
        text: "The difference is only the constant 1/2 and is unnoticeable in practice."
      - id: d
        text: "Bubble compares elements one by one, while merge sort compares them in pairs, so it is twice as fast."
    correct: [a]
    explanation: "Big-O describes the growth class. n²/2 and n log n differ by a factor of n/log n, which itself grows with n, so on large input the quadratic sort falls behind by any factor, not by a constant."
    variants:
      - prompt: "Is there a comparison sort guaranteed to run in O(n) in the worst case on arbitrary data?"
        choices:
          - id: a
            text: "No: to tell apart n! possible orders you need at least log2(n!) ≈ n log n comparisons. That is the lower bound."
          - id: b
            text: "Yes, quicksort runs in O(n) in the worst case."
          - id: c
            text: "Yes, if you use recursion instead of loops."
          - id: d
            text: "No, because the minimum for any sort is O(n²)."
        correct: [a]
        explanation: "A decision tree with n! leaves has height at least log2(n!) ≈ n log n, and the height is the number of comparisons in the worst case. You can beat the bound only by giving up comparisons (counting, radix)."
      - prompt: "What common idea unites merge sort and quicksort and sets them apart from bubble sort?"
        choices:
          - id: a
            text: "Divide and conquer: the list is split into smaller parts, each is solved, and the results are combined, reducing the task to smaller ones."
          - id: b
            text: "Both compare only adjacent elements, like bubble sort."
          - id: c
            text: "Both require the data to be sorted in advance."
          - id: d
            text: "Both work only with integers."
        correct: [a]
        explanation: "Both merge and quick split the task into subtasks (halves of the list) and combine the result. It is the recursive splitting that gives depth log n and the O(n log n) class."

  - id: efficient-sorts-properties-001
    concept: efficient-sorts
    type: theory-quiz
    difficulty: 2
    prompt: "Which pair of properties is true for merge sort?"
    choices:
      - id: a
        text: "Stable and requires O(n) extra memory for the merge."
      - id: b
        text: "Not stable, but sorts strictly in place with O(1) memory."
      - id: c
        text: "Stable and sorts in place with O(1) extra memory."
      - id: d
        text: "Not stable and requires O(n log n) extra memory."
    correct: [a]
    explanation: "The merge builds a new list, so the extra memory cost is O(n). On equal elements it takes the element from the left half, which preserves their relative order, that is, stability."
    variants:
      - prompt: "On what input does a naive quicksort with the pivot equal to the last element degrade to O(n²)?"
        choices:
          - id: a
            text: "On already sorted or reverse sorted input: the pivot is the extreme every time, and partition peels off just one element."
          - id: b
            text: "On randomly shuffled input with unique numbers."
          - id: c
            text: "On input where exactly half the elements are equal to each other."
          - id: d
            text: "A naive quicksort never gives O(n²)."
        correct: [a]
        explanation: "If the pivot is almost the minimum or maximum every time, partition splits the list into an empty and an almost full part. The recursion depth becomes n and the total work O(n²). Sorted input causes this with a pivot equal to the extreme element."
      - prompt: "How do you remove quicksort's guaranteed worst case on sorted data while keeping the sort in place?"
        choices:
          - id: a
            text: "Choose the pivot at random or as the median of three, so a bad input cannot be crafted in advance."
          - id: b
            text: "Replace partition with merging two halves."
          - id: c
            text: "Always take the pivot equal to the first element."
          - id: d
            text: "Make the comparison in partition non-strict (a[j] <= pivot)."
        correct: [a]
        explanation: "A random pivot or median of three removes the deterministic bad input: there is no longer crafted data for O(n²). Merging would break the in-place property, and taking the extreme element is precisely the source of the problem."

  - id: efficient-sorts-merge-trace-001
    concept: efficient-sorts
    type: predict-output
    difficulty: 2
    prompt: "What will the program output? The function merges two sorted lists into one."
    snippet: |
      def merge(left, right):
          result = []
          i = j = 0
          while i < len(left) and j < len(right):
              if left[i] <= right[j]:
                  result.append(left[i])
                  i += 1
              else:
                  result.append(right[j])
                  j += 1
          result.extend(left[i:])
          result.extend(right[j:])
          return result

      print(merge([1, 4, 7], [2, 3, 8]))
    expected:
      kind: stdout
      value: '[1, 2, 3, 4, 7, 8]'
    hints:
      - "At each step the front elements of the two lists are compared, and the smaller one goes into the result. Track which pointer moves."
      - "When one list runs out, the rest of the other is appended whole, with no comparisons."
    variants:
      - snippet: |
