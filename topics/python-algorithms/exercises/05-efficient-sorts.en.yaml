  - id: efficient-sorts-partition-trace-001
    concept: efficient-sorts
    type: predict-output
    difficulty: 3
    prompt: "What will the program output? The Lomuto partition takes the pivot equal to the last element and returns its final index."
    snippet: |
      def partition(a, lo, hi):
          pivot = a[hi]
          i = lo
          for j in range(lo, hi):
              if a[j] <= pivot:
                  a[i], a[j] = a[j], a[i]
                  i += 1
          a[i], a[hi] = a[hi], a[i]
          return i

      data = [7, 2, 9, 1, 5]
      p = partition(data, 0, len(data) - 1)
      print(p)
      print(data)
    expected:
      kind: stdout
      value: |-
        2
        [2, 1, 5, 7, 9]
    hints:
      - "The pivot is 5 (the last element). The pointer i marks the boundary of the zone of elements no greater than the pivot. Walk i step by step: it moves only when the current a[j] <= pivot."
      - "After the loop the pivot is swapped with position i and lands in its final place; that same index i is returned. To its left every element is no greater than 5, to its right greater."

  - id: efficient-sorts-merge-implement-001
    concept: efficient-sorts
    type: python-function
    difficulty: 3
    prompt: "Implement `merge(left, right)`: merge two lists sorted in ascending order into one sorted list. Keep it stable (on equal elements take the element from `left`). Do not use `sorted` or `.sort`."
    starter: |
      def merge(left, right):
          ...
    cases:
      - call: "merge([1, 3, 5], [2, 4, 6])"
        expect: [1, 2, 3, 4, 5, 6]
      - call: "merge([], [1, 2])"
        expect: [1, 2]
      - call: "merge([1, 2], [])"
        expect: [1, 2]
      - call: "merge([1, 4], [1, 4])"
        expect: [1, 1, 4, 4]
      - call: "merge([2], [1, 3])"
        expect: [1, 2, 3]
    solution: |
      def merge(left, right):
          result = []
          i = j = 0
          while i < len(left) and j < len(right):
              if left[i] <= right[j]:
                  result.append(left[i])
                  i += 1
              else:
                  result.append(right[j])
                  j += 1
          result.extend(left[i:])
          result.extend(right[j:])
          return result
    hints:
      - "Keep a pointer at the start of each list. At every step the smaller of the two front elements goes into the result."
      - "The loop runs while neither list is empty. As soon as one runs out, the rest of the other is appended whole, since it is already sorted."
      - "Stability comes from the non-strict comparison `left[i] <= right[j]`: on equal elements the element from left goes first."

  - id: efficient-sorts-quicksort-implement-001
    concept: efficient-sorts
    type: python-function
    difficulty: 4
    prompt: "Implement `quicksort(xs)`: return a new list sorted in ascending order using partition around a pivot. Work in place on a copy of the input, do not use `sorted` or `.sort`."
    starter: |
      def quicksort(xs):
          ...
    cases:
      - call: "quicksort([5, 1, 4, 2, 8])"
        expect: [1, 2, 4, 5, 8]
      - call: "quicksort([3, 2, 1])"
        expect: [1, 2, 3]
      - call: "quicksort([])"
        expect: []
      - call: "quicksort([7])"
        expect: [7]
      - call: "quicksort([2, 2, 1, 1])"
        expect: [1, 1, 2, 2]
      - call: "quicksort([1, 2, 3, 4])"
        expect: [1, 2, 3, 4]
    solution: |
      def quicksort(xs):
          a = list(xs)

          def sort(lo, hi):
              if lo >= hi:
                  return
              pivot = a[hi]
              i = lo
              for j in range(lo, hi):
                  if a[j] <= pivot:
                      a[i], a[j] = a[j], a[i]
                      i += 1
              a[i], a[hi] = a[hi], a[i]
              sort(lo, i - 1)
              sort(i + 1, hi)

          sort(0, len(a) - 1)
          return a
    hints:
      - "Copy the input so as not to spoil the argument. Then sort the copy in place with a recursive procedure over a range [lo, hi]."
      - "partition takes a pivot (for example a[hi]), in one pass puts smaller elements on the left and larger on the right, and returns the pivot's final index. Then recursively sort the ranges to its left and right."
      - "Recursion base: if lo >= hi, the range has zero or one element and there is nothing to sort. An empty list and a single element pass this case immediately."
