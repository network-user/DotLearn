exercises:
- id: complexity-class-001
  concept: complexity-basics
  type: theory-quiz
  difficulty: 1
  prompt: What is the time complexity of finding the maximum in an unsorted list of `n` numbers in one pass?
  choices:
  - id: a
    text: O(1) - just look at one element.
  - id: b
    text: O(n) - you need to look at each element exactly once.
  - id: c
    text: O(log n) - half is discarded at each step.
  - id: d
    text: O(n^2) - for each element we go through all the others.
  correct:
  - b
  explanation: To find the maximum in unsorted data, you need to see each element at least once - the missing one could be
    the largest. This is one pass, that is O(n).
  variants:
  - prompt: What is the time complexity of accessing a list element by index - `xs[5]`?
    choices:
    - id: a
      text: O(1) - access by index does not depend on the size of the list.
    - id: b
      text: O(n) - you need to go through the list up to the fifth element.
    - id: c
      text: O(log n) - the index is found by dividing in half.
    - id: d
      text: O(n^2) - depends on the nested search.
    correct:
    - a
    explanation: A list in Python stores elements in a row, so the address `xs[5]` is calculated by arithmetic in constant
      time, regardless of the length of the list.
  - prompt: What is the complexity of a nested loop where for each of the `n` elements you loop through all `n` elements?
    choices:
    - id: a
      text: O(n^2) - n repetitions of the outer loop are multiplied by n repetitions of the inner one.
    - id: b
      text: O(n) - there are only two cycles.
    - id: c
      text: O(1) - cycles do not affect growth class.
    - id: d
      text: O(log n) - nesting reduces the work by half.
    correct:
    - a
    explanation: 'Nested loops are multiplied: the body of the inner loop will be executed n × n times, which gives O(n^2).'
- id: log-steps-001
  concept: complexity-basics
  type: theory-quiz
  difficulty: 2
  prompt: The algorithm discards half of the remaining data at each step. Approximately how many steps will it take on 1000
    elements?
  choices:
  - id: a
    text: About 1000 - one step per element.
  - id: b
    text: About 10 is the number of times 1000 can be divided by 2.
  - id: c
    text: About 500 - half the elements.
  - id: d
    text: About 1,000,000 is a square size.
  correct:
  - b
  explanation: Dividing in half is O(log n). log2(1000) ≈ 10, so about ten steps are enough to get from a thousand to one
    element.
- id: count-operations-001
  concept: complexity-basics
  type: predict-output
  difficulty: 2
  prompt: What will the program output? It counts the number of times the body of each loop is executed.
  snippet: "n = 4\n\nlinear = 0\nfor i in range(n):\n    linear += 1\n\nquadratic = 0\nfor i in range(n):\n    for j in range(n):\n\
    \        quadratic += 1\n\nprint(linear, quadratic)\n"
  expected:
    kind: stdout
    value: 4 16
  hints:
  - A linear loop executes the body once for each of n elements. How many times will the body of the inner loop be executed
    with two nested loops of n each?
  - The outer loop spins n times, and at each iteration the inner loop spins n times - multiply.
  variants:
  - snippet: "n = 5\n\nlinear = 0\nfor i in range(n):\n    linear += 1\n\nquadratic = 0\nfor i in range(n):\n    for j in\
      \ range(n):\n        quadratic += 1\n\nprint(linear, quadratic)\n"
    expected:
      kind: stdout
      value: 5 25
  - snippet: "n = 3\n\nlinear = 0\nfor i in range(n):\n    linear += 1\n\nquadratic = 0\nfor i in range(n):\n    for j in\
      \ range(n):\n        quadratic += 1\n\nprint(linear, quadratic)\n"
    expected:
      kind: stdout
      value: 3 9
- id: triangular-count-001
  concept: complexity-basics
  type: predict-output
  difficulty: 3
  prompt: What will the program output? The inner cycle does not start from scratch.
  snippet: "n = 4\ncount = 0\nfor i in range(n):\n    for j in range(i + 1, n):\n        count += 1\nprint(count)\n"
  expected:
    kind: stdout
    value: '6'
  hints:
  - This is a search of all pairs without repetitions. At each i, the inner loop takes fewer steps than at the previous one.
  - 'Write down the number of iterations of the inner loop for i = 0, 1, 2, 3 and add: 3 + 2 + 1 + 0.'
  variants:
  - snippet: "n = 5\ncount = 0\nfor i in range(n):\n    for j in range(i + 1, n):\n        count += 1\nprint(count)\n"
    expected:
      kind: stdout
      value: '10'
  - snippet: "n = 3\ncount = 0\nfor i in range(n):\n    for j in range(i + 1, n):\n        count += 1\nprint(count)\n"
    expected:
      kind: stdout
      value: '3'
- id: count-pairs-001
  concept: complexity-basics
  type: python-function
  difficulty: 4
  prompt: 'Implement `count_pairs(n)` that returns the number of unordered pairs of distinct indices in the range 0..n-1.
    This is the body of the double loop `for i: for j in range(i+1, n)`. Don''t use a formula - count in a loop, as a nested
    enumeration would count.'
  starter: "def count_pairs(n):\n    ...\n"
  cases:
  - call: count_pairs(4)
    expect: 6
  - call: count_pairs(5)
    expect: 10
  - call: count_pairs(1)
    expect: 0
  - call: count_pairs(0)
    expect: 0
  solution: "def count_pairs(n):\n    count = 0\n    for i in range(n):\n        for j in range(i + 1, n):\n            count\
    \ += 1\n    return count\n"
  hints:
  - Each pair (i, j) with i < j is counted once - this is exactly the work that the nested loop of the quadratic algorithm
    does.
  - Start a counter, run the outer loop through i, and the inner loop through j from i+1 to n, increasing the counter in the
    body.
  - For n = 0 and n = 1 there are no pairs, and both loops simply will not execute the body - the counter will remain zero.
