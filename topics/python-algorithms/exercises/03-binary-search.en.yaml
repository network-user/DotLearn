exercises:
- id: bsearch-precondition-001
  concept: binary-search
  type: theory-quiz
  difficulty: 1
  prompt: What condition is required for binary search to work correctly?
  choices:
  - id: a
    text: The list must be sorted.
  - id: b
    text: The list should not contain duplicate elements.
  - id: c
    text: The length of the list must be a power of two.
  - id: d
    text: The list must consist of numbers only.
  correct:
  - a
  explanation: The entire logic of binary search is based on the conclusion “if the middle is less than the desired one, then
    there is no desired one on the left.” This is only true for sorted data. On an unordered list, the algorithm returns the
    wrong result, rather than just being slower.
  variants:
  - prompt: What will binary search return if applied to an unsorted list?
    choices:
    - id: a
      text: There may be an incorrect result.
    - id: b
      text: "Always the correct index of the target, only slower than linear."
    - id: c
      text: "A ValueError exception is raised immediately on unsorted input."
    - id: d
      text: "Index of the first element is always returned as a fallback."
    correct:
    - a
    explanation: Without sorting, the inference about the halves breaks down, and the search may skip the existing element.
      The sorting precondition is mandatory, not optional.
  - prompt: Why is binary search faster than linear search on big data?
    choices:
    - id: a
      text: It discards half of the remaining elements at each step.
    - id: b
      text: "It remembers the positions of all elements in advance in a map."
    - id: c
      text: "It uses multiple threads to compare many midpoints at once."
    - id: d
      text: "It compares all elements at once in a single vectorized step."
    correct:
    - a
    explanation: Each step divides the search area in half, so the number of steps grows as log₂ n. For a million elements,
      this is about 20 comparisons versus a million for linear enumeration.
- id: bsearch-index-predict-001
  concept: binary-search
  type: predict-output
  difficulty: 2
  prompt: What will the program output? Trace the boundaries of lo and hi at each step.
  snippet: "def binary_search(a, target):\n    lo, hi = 0, len(a) - 1\n    while lo <= hi:\n        mid = (lo + hi) // 2\n\
    \        if a[mid] == target:\n            return mid\n        elif a[mid] < target:\n            lo = mid + 1\n     \
    \   else:\n            hi = mid - 1\n    return -1\n\ndata = [1, 3, 5, 7, 9, 11]\nprint(binary_search(data, 9))\nprint(binary_search(data,\
    \ 1))\nprint(binary_search(data, 2))\n"
  expected:
    kind: stdout
    value: '4

      0

      -1'
  hints:
  - For each call, write mid = (lo + hi) // 2 and compare a[mid] with the desired one, moving the border that cuts off the
    obviously inappropriate half.
  - 9 is at index 4; 1 - at index 0; the number 2 is not in the list, so the zone collapses and returns -1.
  variants:
  - snippet: "def binary_search(a, target):\n    lo, hi = 0, len(a) - 1\n    while lo <= hi:\n        mid = (lo + hi) // 2\n\
      \        if a[mid] == target:\n            return mid\n        elif a[mid] < target:\n            lo = mid + 1\n   \
      \     else:\n            hi = mid - 1\n    return -1\n\ndata = [2, 4, 6, 8, 10]\nprint(binary_search(data, 10))\nprint(binary_search(data,\
      \ 2))\nprint(binary_search(data, 5))\n"
    expected:
      kind: stdout
      value: '4

        0

        -1'
- id: bsearch-blanks-001
  concept: binary-search
  type: fill-in-blanks
  difficulty: 2
  prompt: Fill in the blanks in the boundary update. The just checked mid should not remain in the search area.
  template: "def binary_search(a, target):\n    lo, hi = 0, len(a) - 1\n    while lo <= hi:\n        mid = (lo + hi) // 2\n\
    \        if a[mid] == target:\n            return mid\n        elif a[mid] < target:\n            lo = {{lo_update}}\n\
    \        else:\n            hi = {{hi_update}}\n    return -1\n"
  blanks:
    lo_update:
      accept:
      - mid + 1
      accept_regex: ^mid\s*\+\s*1$
    hi_update:
      accept:
      - mid - 1
      accept_regex: ^mid\s*-\s*1$
  hints:
  - mid has already been checked and did not work. If you leave it in the zone (lo = mid or hi = mid), the zone will stop
    narrowing and the cycle will cycle.
  - If a[mid] is less than the desired one, everything up to mid inclusive is cut off - the new left border goes immediately
    beyond mid. Symmetrical for the right.
- id: bsearch-steps-predict-001
  concept: binary-search
  type: predict-output
  difficulty: 3
  prompt: What will the program output? The function counts how many iterations of the loop it took to get the answer.
  snippet: "def steps(a, target):\n    lo, hi = 0, len(a) - 1\n    count = 0\n    while lo <= hi:\n        count += 1\n  \
    \      mid = (lo + hi) // 2\n        if a[mid] == target:\n            return count\n        elif a[mid] < target:\n \
    \           lo = mid + 1\n        else:\n            hi = mid - 1\n    return count\n\ndata = list(range(1, 16))\nprint(steps(data,\
    \ 1))\n"
  expected:
    kind: stdout
    value: '4'
  hints:
  - 'data is [1, 2, ..., 15], indices 0..14. Each step takes the middle of the current zone: 7, then 3, then 1, then 0.'
  - 'The required 1 is at the very beginning, so the search goes to the left each time, and the zone is divided in half: 15
    → 7 → 3 → 1 element.'
  variants:
  - snippet: "def steps(a, target):\n    lo, hi = 0, len(a) - 1\n    count = 0\n    while lo <= hi:\n        count += 1\n\
      \        mid = (lo + hi) // 2\n        if a[mid] == target:\n            return count\n        elif a[mid] < target:\n\
      \            lo = mid + 1\n        else:\n            hi = mid - 1\n    return count\n\ndata = list(range(1, 16))\n\
      print(steps(data, 8))\n"
    expected:
      kind: stdout
      value: '1'
  - snippet: "def steps(a, target):\n    lo, hi = 0, len(a) - 1\n    count = 0\n    while lo <= hi:\n        count += 1\n\
      \        mid = (lo + hi) // 2\n        if a[mid] == target:\n            return count\n        elif a[mid] < target:\n\
      \            lo = mid + 1\n        else:\n            hi = mid - 1\n    return count\n\ndata = list(range(1, 16))\n\
      print(steps(data, 15))\n"
    expected:
      kind: stdout
      value: '4'
- id: bsearch-first-index-001
  concept: binary-search
  type: python-function
  difficulty: 4
  prompt: 'Implement `first_index(a, target)`: return the index of the **first** (leftmost) occurrence of target in the sorted
    list with possible duplicates, or -1 if there is no element. Use binary search in O(log n) rather than linear pass.'
  starter: "def first_index(a, target):\n    ...\n"
  cases:
  - call: first_index([1, 2, 2, 2, 3], 2)
    expect: 1
  - call: first_index([5, 5, 5], 5)
    expect: 0
  - call: first_index([1, 2, 3], 4)
    expect: -1
  - call: first_index([], 1)
    expect: -1
  - call: first_index([1, 2, 3], 1)
    expect: 0
  hints:
  - A regular binary search stops at any match. To find the one to the left, if there is a match, you don’t need to immediately
    return - you should continue looking further to the left.
  - Save the found index into the result variable and shift hi = mid - 1 to check if there is the same value further to the
    left.
  - When the zone collapses, result will contain the leftmost index encountered with target, or -1 if there were no matches.
  solution: "def first_index(a, target):\n    lo, hi = 0, len(a) - 1\n    result = -1\n    while lo <= hi:\n        mid =\
    \ (lo + hi) // 2\n        if a[mid] == target:\n            result = mid\n            hi = mid - 1\n        elif a[mid]\
    \ < target:\n            lo = mid + 1\n        else:\n            hi = mid - 1\n    return result\n"
