  - id: efficient-sorts-partition-trace-001
    concept: efficient-sorts
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? partition по схеме Ломуто берёт pivot равным последнему элементу и возвращает его финальный индекс."
    snippet: |
      def partition(a, lo, hi):
          pivot = a[hi]
          i = lo
          for j in range(lo, hi):
              if a[j] <= pivot:
                  a[i], a[j] = a[j], a[i]
                  i += 1
          a[i], a[hi] = a[hi], a[i]
          return i

      data = [7, 2, 9, 1, 5]
      p = partition(data, 0, len(data) - 1)
      print(p)
      print(data)
    expected:
      kind: stdout
      value: |-
        2
        [2, 1, 5, 7, 9]
    hints:
      - "pivot равен 5 (последний элемент). Указатель i отмечает границу зоны элементов не больше pivot. Ведите i по шагам: он двигается только когда очередной a[j] <= pivot."
      - "После цикла pivot обменивается с позицией i и встаёт на финальное место; возвращается именно этот индекс i. Слева от него все элементы не больше 5, справа больше."

  - id: efficient-sorts-merge-implement-001
    concept: efficient-sorts
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `merge(left, right)`: слейте два отсортированных по возрастанию списка в один отсортированный. Сохраните устойчивость (при равных элементах берите элемент из `left`). Не используйте `sorted` и `.sort`."
    starter: |
      def merge(left, right):
          ...
    cases:
      - call: "merge([1, 3, 5], [2, 4, 6])"
        expect: [1, 2, 3, 4, 5, 6]
      - call: "merge([], [1, 2])"
        expect: [1, 2]
      - call: "merge([1, 2], [])"
        expect: [1, 2]
      - call: "merge([1, 4], [1, 4])"
        expect: [1, 1, 4, 4]
      - call: "merge([2], [1, 3])"
        expect: [1, 2, 3]
    solution: |
      def merge(left, right):
          result = []
          i = j = 0
          while i < len(left) and j < len(right):
              if left[i] <= right[j]:
                  result.append(left[i])
                  i += 1
              else:
                  result.append(right[j])
                  j += 1
          result.extend(left[i:])
          result.extend(right[j:])
          return result
    hints:
      - "Держите по указателю на начало каждого списка. На каждом шаге в результат уходит меньший из двух передних элементов."
      - "Цикл идёт, пока не кончился ни один из списков. Как только один опустел, остаток второго дописывается целиком, ведь он уже отсортирован."
      - "Устойчивость даёт нестрогое сравнение `left[i] <= right[j]`: при равных элементах вперёд идёт элемент из left."

  - id: efficient-sorts-quicksort-implement-001
    concept: efficient-sorts
    type: python-function
    difficulty: 4
    prompt: "Реализуйте `quicksort(xs)`: верните новый отсортированный по возрастанию список, используя разбиение вокруг pivot (partition). Работайте на месте по копии входа, не используйте `sorted` и `.sort`."
    starter: |
      def quicksort(xs):
          ...
    cases:
      - call: "quicksort([5, 1, 4, 2, 8])"
        expect: [1, 2, 4, 5, 8]
      - call: "quicksort([3, 2, 1])"
        expect: [1, 2, 3]
      - call: "quicksort([])"
        expect: []
      - call: "quicksort([7])"
        expect: [7]
      - call: "quicksort([2, 2, 1, 1])"
        expect: [1, 1, 2, 2]
      - call: "quicksort([1, 2, 3, 4])"
        expect: [1, 2, 3, 4]
    solution: |
      def quicksort(xs):
          a = list(xs)

          def sort(lo, hi):
              if lo >= hi:
                  return
              pivot = a[hi]
              i = lo
              for j in range(lo, hi):
                  if a[j] <= pivot:
                      a[i], a[j] = a[j], a[i]
                      i += 1
              a[i], a[hi] = a[hi], a[i]
              sort(lo, i - 1)
              sort(i + 1, hi)

          sort(0, len(a) - 1)
          return a
    hints:
      - "Скопируйте вход, чтобы не портить аргумент. Дальше сортируйте копию на месте рекурсивной процедурой над отрезком [lo, hi]."
      - "partition берёт pivot (например, a[hi]), одним проходом ставит меньшие слева, большие справа и возвращает финальный индекс pivot. После этого рекурсивно сортируйте отрезки слева и справа от него."
      - "База рекурсии: если lo >= hi, в отрезке ноль или один элемент, сортировать нечего. Пустой список и один элемент проходят этот случай сразу."
