exercises:
  - id: efficient-sorts-barrier-001
    concept: efficient-sorts
    type: theory-quiz
    difficulty: 1
    prompt: "Пузырьковая сортировка делает порядка n²/2 сравнений, а merge sort порядка n log n. Почему на больших данных это принципиальная, а не косметическая разница?"
    choices:
      - id: a
        text: "Это разные классы роста: с ростом n отношение n²/(n log n) = n/log n растёт неограниченно, поэтому разрыв становится сколь угодно большим."
      - id: b
        text: "Merge sort просто запускается на более быстром процессоре."
      - id: c
        text: "Разница только в константе 1/2 и на практике незаметна."
      - id: d
        text: "Пузырёк сравнивает элементы по одному, а merge sort сразу парами, поэтому вдвое быстрее."
    correct: [a]
    explanation: "Big-O описывает класс роста. n²/2 и n log n отличаются множителем n/log n, который сам растёт с n, поэтому на большом входе квадратичная сортировка отстаёт в любое число раз, а не на константу."
    variants:
      - prompt: "Существует ли сортировка сравнениями, гарантированно работающая за O(n) в худшем случае на произвольных данных?"
        choices:
          - id: a
            text: "Нет: чтобы различить n! возможных порядков, нужно хотя бы log2(n!) ≈ n log n сравнений. Это нижняя граница."
          - id: b
            text: "Да, quicksort в худшем случае работает за O(n)."
          - id: c
            text: "Да, если применить рекурсию вместо циклов."
          - id: d
            text: "Нет, потому что минимум для любой сортировки это O(n²)."
        correct: [a]
        explanation: "Дерево решений с n! листьями имеет высоту не меньше log2(n!) ≈ n log n, а высота это число сравнений в худшем случае. Обойти границу можно, только отказавшись от сравнений (подсчётом, поразрядно)."
      - prompt: "Какая общая идея объединяет merge sort и quicksort и отличает их от пузырька?"
        choices:
          - id: a
            text: "Разделяй и властвуй: список разбивают на части поменьше, решают каждую и объединяют, сводя задачу к более мелким."
          - id: b
            text: "Оба сравнивают только соседние элементы, как пузырёк."
          - id: c
            text: "Оба требуют, чтобы данные были заранее отсортированы."
          - id: d
            text: "Оба работают только с целыми числами."
        correct: [a]
        explanation: "И merge, и quick разбивают задачу на подзадачи (половины списка) и комбинируют результат. Именно рекурсивное дробление даёт глубину log n и класс O(n log n)."

  - id: efficient-sorts-properties-001
    concept: efficient-sorts
    type: theory-quiz
    difficulty: 2
    prompt: "Какая пара свойств верна для merge sort?"
    choices:
      - id: a
        text: "Устойчив и требует O(n) дополнительной памяти на слияние."
      - id: b
        text: "Неустойчив, зато сортирует строго на месте с O(1) памяти."
      - id: c
        text: "Устойчив и сортирует на месте с O(1) дополнительной памяти."
      - id: d
        text: "Неустойчив и требует O(n log n) дополнительной памяти."
    correct: [a]
    explanation: "Слияние собирает новый список, поэтому расход дополнительной памяти O(n). При равных элементах оно берёт элемент из левой половины, что сохраняет их относительный порядок, то есть устойчивость."
    variants:
      - prompt: "На каком входе наивный quicksort с pivot равным последнему элементу деградирует до O(n²)?"
        choices:
          - id: a
            text: "На уже отсортированном или обратно отсортированном входе: pivot каждый раз крайний, и partition отрезает лишь один элемент."
          - id: b
            text: "На случайно перемешанном входе с уникальными числами."
          - id: c
            text: "На входе, где ровно половина элементов равны между собой."
          - id: d
            text: "Наивный quicksort никогда не даёт O(n²)."
        correct: [a]
        explanation: "Если pivot всегда почти минимум или максимум, partition делит список на пустую и почти полную части. Глубина рекурсии становится n, суммарная работа O(n²). Отсортированный вход даёт это с pivot равным крайнему элементу."
      - prompt: "Как убрать гарантированный худший случай quicksort на отсортированных данных, сохранив сортировку на месте?"
        choices:
          - id: a
            text: "Выбирать pivot случайно или как медиану трёх, чтобы плохой вход нельзя было подобрать заранее."
          - id: b
            text: "Заменить partition на слияние двух половин."
          - id: c
            text: "Всегда брать pivot равным первому элементу."
          - id: d
            text: "Сделать сравнение в partition нестрогим (a[j] <= pivot)."
        correct: [a]
        explanation: "Случайный pivot или медиана трёх убирают детерминированный плохой вход: специально подобранных данных для O(n²) больше нет. Слияние сломало бы работу на месте, а выбор крайнего элемента как раз и есть источник проблемы."

  - id: efficient-sorts-merge-trace-001
    concept: efficient-sorts
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Функция сливает два отсортированных списка в один."
    snippet: |
      def merge(left, right):
          result = []
          i = j = 0
          while i < len(left) and j < len(right):
              if left[i] <= right[j]:
                  result.append(left[i])
                  i += 1
              else:
                  result.append(right[j])
                  j += 1
          result.extend(left[i:])
          result.extend(right[j:])
          return result

      print(merge([1, 4, 7], [2, 3, 8]))
    expected:
      kind: stdout
      value: '[1, 2, 3, 4, 7, 8]'
    hints:
      - "На каждом шаге сравниваются передние элементы двух списков, и меньший уходит в результат. Проследите, какой указатель двигается."
      - "Когда один список кончается, остаток второго дописывается целиком без сравнений."
    variants:
