exercises:
  - id: bsearch-precondition-001
    concept: binary-search
    type: theory-quiz
    difficulty: 1
    prompt: "Какое условие обязательно для корректной работы бинарного поиска?"
    choices:
      - id: a
        text: "Список должен быть отсортирован."
      - id: b
        text: "В списке не должно быть повторяющихся элементов."
      - id: c
        text: "Длина списка должна быть степенью двойки."
      - id: d
        text: "Список должен состоять только из чисел."
    correct: [a]
    explanation: "Вся логика бинарного поиска опирается на вывод «если середина меньше искомого, то слева искомого нет». Это верно лишь для отсортированных данных. На неупорядоченном списке алгоритм возвращает неверный результат, а не просто работает медленнее."
    variants:
      - prompt: "Что вернёт бинарный поиск, если применить его к неотсортированному списку?"
        choices:
          - id: a
            text: "Возможно неверный результат - например."
          - id: b
            text: "Всегда правильный индекс, просто медленнее."
          - id: c
            text: "Исключение ValueError."
          - id: d
            text: "Индекс первого элемента."
        correct: [a]
        explanation: "Без сортировки умозаключение про половины ломается, и поиск может пройти мимо существующего элемента. Предусловие сортировки - обязательное, а не желательное."
      - prompt: "Почему бинарный поиск быстрее линейного на больших данных?"
        choices:
          - id: a
            text: "Он отбрасывает половину оставшихся элементов на каждом шаге."
          - id: b
            text: "Он заранее запоминает позиции всех элементов в словаре."
          - id: c
            text: "Он использует несколько потоков для параллельного сравнения."
          - id: d
            text: "Он сравнивает сразу все элементы за один векторный шаг."
        correct: [a]
        explanation: "Каждый шаг делит зону поиска пополам, поэтому число шагов растёт как log₂ n. Для миллиона элементов это около 20 сравнений против миллиона у линейного перебора."

  - id: bsearch-index-predict-001
    concept: binary-search
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Проследите границы lo и hi на каждом шаге."
    snippet: |
      def binary_search(a, target):
          lo, hi = 0, len(a) - 1
          while lo <= hi:
              mid = (lo + hi) // 2
              if a[mid] == target:
                  return mid
              elif a[mid] < target:
                  lo = mid + 1
              else:
                  hi = mid - 1
          return -1

      data = [1, 3, 5, 7, 9, 11]
      print(binary_search(data, 9))
      print(binary_search(data, 1))
      print(binary_search(data, 2))
    expected:
      kind: stdout
      value: |-
        4
        0
        -1
    hints:
      - "Для каждого вызова выпишите mid = (lo + hi) // 2 и сравните a[mid] с искомым, двигая ту границу, которая отсекает заведомо неподходящую половину."
      - "9 стоит на индексе 4; 1 - на индексе 0; число 2 в списке отсутствует, поэтому зона схлопывается и возвращается -1."
    variants:
      - snippet: |
          def binary_search(a, target):
              lo, hi = 0, len(a) - 1
              while lo <= hi:
                  mid = (lo + hi) // 2
                  if a[mid] == target:
                      return mid
                  elif a[mid] < target:
                      lo = mid + 1
                  else:
                      hi = mid - 1
              return -1

          data = [2, 4, 6, 8, 10]
          print(binary_search(data, 10))
          print(binary_search(data, 2))
          print(binary_search(data, 5))
        expected:
          kind: stdout
          value: |-
            4
            0
            -1

  - id: bsearch-blanks-001
    concept: binary-search
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски в обновлении границ. Только что проверенный mid не должен остаться в зоне поиска."
    template: |
      def binary_search(a, target):
          lo, hi = 0, len(a) - 1
          while lo <= hi:
              mid = (lo + hi) // 2
              if a[mid] == target:
                  return mid
              elif a[mid] < target:
                  lo = {{lo_update}}
              else:
                  hi = {{hi_update}}
          return -1
    blanks:
      lo_update:
        accept: ["mid + 1"]
        accept_regex: '^mid\s*\+\s*1$'
      hi_update:
        accept: ["mid - 1"]
        accept_regex: '^mid\s*-\s*1$'
    hints:
      - "mid уже проверен и не подошёл. Если оставить его в зоне (lo = mid или hi = mid), зона перестанет сужаться и цикл зациклится."
      - "Если a[mid] меньше искомого, всё до mid включительно отсекается - новая левая граница идёт сразу за mid. Симметрично для правой."

  - id: bsearch-steps-predict-001
    concept: binary-search
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Функция считает, сколько итераций цикла понадобилось до ответа."
    snippet: |
      def steps(a, target):
          lo, hi = 0, len(a) - 1
          count = 0
          while lo <= hi:
              count += 1
              mid = (lo + hi) // 2
              if a[mid] == target:
                  return count
              elif a[mid] < target:
                  lo = mid + 1
              else:
                  hi = mid - 1
          return count

      data = list(range(1, 16))
      print(steps(data, 1))
    expected:
      kind: stdout
      value: "4"
    hints:
      - "data - это [1, 2, ..., 15], индексы 0..14. Каждый шаг берёт середину текущей зоны: 7, потом 3, потом 1, потом 0."
      - "Искомое 1 стоит в самом начале, поэтому поиск каждый раз уходит влево, а зона делится пополам: 15 → 7 → 3 → 1 элемент."
    variants:
      - snippet: |
          def steps(a, target):
              lo, hi = 0, len(a) - 1
              count = 0
              while lo <= hi:
                  count += 1
                  mid = (lo + hi) // 2
                  if a[mid] == target:
                      return count
                  elif a[mid] < target:
                      lo = mid + 1
                  else:
                      hi = mid - 1
              return count

          data = list(range(1, 16))
          print(steps(data, 8))
        expected:
          kind: stdout
          value: "1"
      - snippet: |
          def steps(a, target):
              lo, hi = 0, len(a) - 1
              count = 0
              while lo <= hi:
                  count += 1
                  mid = (lo + hi) // 2
                  if a[mid] == target:
                      return count
                  elif a[mid] < target:
                      lo = mid + 1
                  else:
                      hi = mid - 1
              return count

          data = list(range(1, 16))
          print(steps(data, 15))
        expected:
          kind: stdout
          value: "4"

  - id: bsearch-first-index-001
    concept: binary-search
    type: python-function
    difficulty: 4
    prompt: "Реализуйте `first_index(a, target)`: верните индекс **первого** (самого левого) вхождения target в отсортированном списке с возможными дубликатами, или -1, если элемента нет. Используйте бинарный поиск за O(log n), а не линейный проход."
    starter: |
      def first_index(a, target):
          ...
    cases:
      - call: "first_index([1, 2, 2, 2, 3], 2)"
        expect: 1
      - call: "first_index([5, 5, 5], 5)"
        expect: 0
      - call: "first_index([1, 2, 3], 4)"
        expect: -1
      - call: "first_index([], 1)"
        expect: -1
      - call: "first_index([1, 2, 3], 1)"
        expect: 0
    hints:
      - "Обычный бинарный поиск останавливается на любом совпадении. Чтобы найти самое левое, при совпадении не нужно сразу возвращаться - стоит продолжить искать левее."
      - "Запомните найденный индекс в переменную result и сдвиньте hi = mid - 1, чтобы проверить, нет ли такого же значения ещё левее."
      - "Когда зона схлопнется, в result останется самый левый из встреченных индексов с target, либо -1, если совпадений не было."
    solution: |
      def first_index(a, target):
          lo, hi = 0, len(a) - 1
          result = -1
          while lo <= hi:
              mid = (lo + hi) // 2
              if a[mid] == target:
                  result = mid
                  hi = mid - 1
              elif a[mid] < target:
                  lo = mid + 1
              else:
                  hi = mid - 1
          return result
