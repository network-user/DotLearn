exercises:
- id: bubble-idea-001
  concept: bubble-sort
  type: theory-quiz
  difficulty: 1
  prompt: What is guaranteed to happen in one full pass of bubble sort from left to right?
  choices:
  - id: a
    text: "The entire list becomes sorted - mixing time asymptotics with memory asymptotics"
  - id: b
    text: The largest of the not yet ordered elements ends up at the end of the passage zone.
  - id: c
    text: "The smallest element goes to the beginning of the list"
  - id: d
    text: "The list is turned backwards - mixing different delivery guarantees and ordering"
  correct:
  - b
  explanation: In each comparison, the larger of the pair is shifted to the right, so per pass the largest element “floats”
    to the end. One pass doesn't sort the entire list, but it does put one element into place.
  variants:
  - prompt: In the inner loop, why does the `range(n - 1 - i)` bound decrease with each pass?
    choices:
    - id: a
      text: "The tail is already sorted after previous passes."
    - id: b
      text: To avoid accidentally going beyond the beginning of the list.
    - id: c
      text: This speeds up the best case to O(log n).
    - id: d
      text: Without reduction, sorting would produce incorrect results.
    correct:
    - a
    explanation: After i passes, the last i elements are already in the final places, so the comparison area can be reduced
      by i - the result is the same, but there is less work.
  - prompt: Why is the exchange done only with strict `a[j] > a[j + 1]`, and not with `>=`?
    choices:
    - id: a
      text: 'To maintain stability: equal elements are not rearranged.'
    - id: b
      text: Otherwise an IndexError will be raised.
    - id: c
      text: With `>=` the list is sorted in reverse order.
    - id: d
      text: There is no difference, it's a matter of taste.
    correct:
    - a
    explanation: With `>`, equal neighbors remain in place, and the relative order of equal keys is preserved - this is stability.
      With `>=` the equals would be rearranged unnecessarily.
- id: bubble-pass-output-001
  concept: bubble-sort
  type: predict-output
  difficulty: 2
  prompt: What will the program output? It prints the list after each pass of the outer loop.
  snippet: "def bubble_sort_traced(xs):\n    a = list(xs)\n    n = len(a)\n    for i in range(n - 1):\n        for j in range(n\
    \ - 1 - i):\n            if a[j] > a[j + 1]:\n                a[j], a[j + 1] = a[j + 1], a[j]\n        print(a)\n\nbubble_sort_traced([3,\
    \ 2, 1])\n"
  expected:
    kind: stdout
    value: '[2, 1, 3]

      [1, 2, 3]'
  hints:
  - The outer loop makes n-1 = 2 passes. Observe the neighbor exchanges in each pass and print the list exactly after the
    inner loop.
  - Pass 0 compares the pairs (0,1) and (1,2); pass 1 - only pair (0,1), because the tail is already in place.
  variants:
  - snippet: "def bubble_sort_traced(xs):\n    a = list(xs)\n    n = len(a)\n    for i in range(n - 1):\n        for j in\
      \ range(n - 1 - i):\n            if a[j] > a[j + 1]:\n                a[j], a[j + 1] = a[j + 1], a[j]\n        print(a)\n\
      \nbubble_sort_traced([4, 1, 3, 2])\n"
    expected:
      kind: stdout
      value: '[1, 3, 2, 4]

        [1, 2, 3, 4]

        [1, 2, 3, 4]'
  - snippet: "def bubble_sort_traced(xs):\n    a = list(xs)\n    n = len(a)\n    for i in range(n - 1):\n        for j in\
      \ range(n - 1 - i):\n            if a[j] > a[j + 1]:\n                a[j], a[j + 1] = a[j + 1], a[j]\n        print(a)\n\
      \nbubble_sort_traced([2, 3, 1])\n"
    expected:
      kind: stdout
      value: '[2, 1, 3]

        [1, 2, 3]'
- id: bubble-early-exit-001
  concept: bubble-sort
  type: predict-output
  difficulty: 3
  prompt: What will the program output? The version with the early exit flag prints the number of passes completed.
  snippet: "def bubble_sort_passes(xs):\n    a = list(xs)\n    n = len(a)\n    passes = 0\n    for i in range(n - 1):\n  \
    \      passes += 1\n        swapped = False\n        for j in range(n - 1 - i):\n            if a[j] > a[j + 1]:\n   \
    \             a[j], a[j + 1] = a[j + 1], a[j]\n                swapped = True\n        if not swapped:\n            break\n\
    \    print(passes)\n\nbubble_sort_passes([1, 2, 3, 4])\n"
  expected:
    kind: stdout
    value: '1'
  hints:
  - The input is already sorted. What happens to the `swapped` flag on the first pass if no swap happens?
  - If after the `swapped` pass the value remains False, `break` is triggered - and `passes` records the number of actually
    executed passes.
  variants:
  - snippet: "def bubble_sort_passes(xs):\n    a = list(xs)\n    n = len(a)\n    passes = 0\n    for i in range(n - 1):\n\
      \        passes += 1\n        swapped = False\n        for j in range(n - 1 - i):\n            if a[j] > a[j + 1]:\n\
      \                a[j], a[j + 1] = a[j + 1], a[j]\n                swapped = True\n        if not swapped:\n        \
      \    break\n    print(passes)\n\nbubble_sort_passes([1, 3, 2, 4])\n"
    expected:
      kind: stdout
      value: '2'
  - snippet: "def bubble_sort_passes(xs):\n    a = list(xs)\n    n = len(a)\n    passes = 0\n    for i in range(n - 1):\n\
      \        passes += 1\n        swapped = False\n        for j in range(n - 1 - i):\n            if a[j] > a[j + 1]:\n\
      \                a[j], a[j + 1] = a[j + 1], a[j]\n                swapped = True\n        if not swapped:\n        \
      \    break\n    print(passes)\n\nbubble_sort_passes([4, 3, 2, 1])\n"
    expected:
      kind: stdout
      value: '3'
- id: bubble-implement-001
  concept: bubble-sort
  type: python-function
  difficulty: 3
  prompt: Implement `bubble_sort(xs)` that returns a new list sorted in ascending order. Don't change the original list or
    use the `sorted`/`.sort` builtins.
  starter: "def bubble_sort(xs):\n    ...\n"
  cases:
  - call: bubble_sort([5, 1, 4, 2, 8])
    expect:
    - 1
    - 2
    - 4
    - 5
    - 8
  - call: bubble_sort([3, 2, 1])
    expect:
    - 1
    - 2
    - 3
  - call: bubble_sort([])
    expect: []
  - call: bubble_sort([7])
    expect:
    - 7
  - call: bubble_sort([2, 2, 1, 1])
    expect:
    - 1
    - 1
    - 2
    - 2
  solution: "def bubble_sort(xs):\n    a = list(xs)\n    n = len(a)\n    for i in range(n - 1):\n        for j in range(n\
    \ - 1 - i):\n            if a[j] > a[j + 1]:\n                a[j], a[j + 1] = a[j + 1], a[j]\n    return a\n"
  hints:
  - Copy the entry to a new list so as not to spoil the argument, and then sort the copy in place.
  - 'Two nested loops: the outer one counts the passes, the inner one compares the neighbors `a[j]` and `a[j + 1]` and changes
    them when `a[j] > a[j + 1]`.'
  - An empty list and a list with one element are already sorted - loops with a boundary of `n - 1` simply will not execute
    the body.
- id: bubble-early-implement-001
  concept: bubble-sort
  type: python-function
  difficulty: 4
  prompt: 'Implement `bubble_sort_count(xs)` that returns the tuple `(sorted_list, number_of_passes)`. Use an early flag exit:
    passing without a single exchange ends the job.'
  starter: "def bubble_sort_count(xs):\n    ...\n"
  cases:
  - call: bubble_sort_count([1, 2, 3, 4])
    expect:
    - - 1
      - 2
      - 3
      - 4
    - 1
  - call: bubble_sort_count([4, 3, 2, 1])
    expect:
    - - 1
      - 2
      - 3
      - 4
    - 3
  - call: bubble_sort_count([1, 3, 2, 4])
    expect:
    - - 1
      - 2
      - 3
      - 4
    - 2
  - call: bubble_sort_count([5])
    expect:
    - - 5
    - 0
  solution: "def bubble_sort_count(xs):\n    a = list(xs)\n    n = len(a)\n    passes = 0\n    for i in range(n - 1):\n  \
    \      passes += 1\n        swapped = False\n        for j in range(n - 1 - i):\n            if a[j] > a[j + 1]:\n   \
    \             a[j], a[j + 1] = a[j + 1], a[j]\n                swapped = True\n        if not swapped:\n            break\n\
    \    return (a, passes)\n"
  hints:
  - Have a pass counter and a `swapped` flag, which is reset at the beginning of each pass and raised with any exchange.
  - 'After the inner loop, check the flag: if there were no exchanges, `break` - the list is already sorted.'
  - On an input of one element or empty, the outer loop `range(n - 1)` will not be executed even once, so there will be 0
    passes.
