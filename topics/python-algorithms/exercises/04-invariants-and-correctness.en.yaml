exercises:
- id: invariant-what-001
  concept: invariants-and-correctness
  type: theory-quiz
  difficulty: 1
  prompt: What is a loop invariant?
  choices:
  - id: a
    text: A statement that remains true before each iteration of the loop.
  - id: b
    text: A variable whose value never changes.
  - id: c
    text: Condition for exiting the loop.
  - id: d
    text: The number of iterations is known in advance.
  correct:
  - a
  explanation: An invariant is a property that is true before the first iteration and remains true after each iteration. Together
    with the exit condition, it proves the correctness of the algorithm for all inputs, not just the tested examples.
  variants:
  - prompt: What three steps does a proof of correctness through an invariant consist of?
    choices:
    - id: a
      text: Start (true before the loop), save (remains true after the iteration), completion (together with exit gives the
        result).
    - id: b
      text: Compiling, running, checking output.
    - id: c
      text: Declaration, initialization, release.
    - id: d
      text: Best case, average case, worst case.
    correct:
    - a
    explanation: 'The proof is inductive: the invariant is true at the start, is preserved at each iteration, and at the exit,
      together with the loop condition, guarantees the desired result.'
  - prompt: What is the invariant of the outer loop of bubble sort after i passes?
    choices:
    - id: a
      text: The last i elements are already in the final places and are the largest.
    - id: b
      text: The first i elements are sorted.
    - id: c
      text: The entire list has been sorted.
    - id: d
      text: Exactly i exchanges have been made.
    correct:
    - a
    explanation: Each pass pushes the next maximum to the end, so after i passes a sorted tail of length i is guaranteed.
      After n-1 passes the entire list is in place.
- id: linear-count-predict-001
  concept: invariants-and-correctness
  type: predict-output
  difficulty: 2
  prompt: What will the program output? The function counts the number of comparisons before finding an element using a linear
    search.
  snippet: "def linear_count(a, target):\n    comparisons = 0\n    for x in a:\n        comparisons += 1\n        if x ==\
    \ target:\n            return comparisons\n    return comparisons\n\nprint(linear_count([4, 8, 15, 16, 23], 15))\n"
  expected:
    kind: stdout
    value: '3'
  hints:
  - Linear search goes from left to right and counts each element examined. On what element will he find what he is looking
    for?
  - 'Search: 4 (1), 8 (2), 15 (3) - match, return 3.'
  variants:
  - snippet: "def linear_count(a, target):\n    comparisons = 0\n    for x in a:\n        comparisons += 1\n        if x ==\
      \ target:\n            return comparisons\n    return comparisons\n\nprint(linear_count([4, 8, 15, 16, 23], 4))\n"
    expected:
      kind: stdout
      value: '1'
  - snippet: "def linear_count(a, target):\n    comparisons = 0\n    for x in a:\n        comparisons += 1\n        if x ==\
      \ target:\n            return comparisons\n    return comparisons\n\nprint(linear_count([4, 8, 15, 16, 23], 99))\n"
    expected:
      kind: stdout
      value: '5'
- id: choose-search-001
  concept: invariants-and-correctness
  type: theory-quiz
  difficulty: 2
  prompt: You have an unsorted list, and you need to find an element in it once. Which search should I choose?
  choices:
  - id: a
    text: 'Linear: it works on any data, and sorting for the sake of one search is more expensive than the search itself.'
  - id: b
    text: 'Binary: it''s always faster.'
  - id: c
    text: Sort first, then binary - this is always optimal.
  - id: d
    text: Any - it makes no difference.
  correct:
  - a
  explanation: Sorting costs O(n log n), and linear search alone costs O(n). Sorting for the sake of a single binary search
    is not profitable. Linear search is both simpler and cheaper here.
  variants:
  - prompt: When is it appropriate to sort a list before searching?
    choices:
    - id: a
      text: 'When one list needs to be searched multiple times: one-time sorting O(n log n) pays off with cheap O(log n) searches.'
    - id: b
      text: When the list is short.
    - id: c
      text: When there are duplicates in the list.
    - id: d
      text: You never need to sort before searching.
    correct:
    - a
    explanation: Once sorted in O(n log n), then each of many searches costs O(log n). With a large number of searches, this
      is many times more profitable than linear search every time.
- id: sort-cost-quiz-001
  concept: invariants-and-correctness
  type: theory-quiz
  difficulty: 3
  prompt: You need to perform 1000 searches on a list of 1000 elements. Which strategy is more effective in terms of the number
    of operations?
  choices:
  - id: a
    text: Sort once (~n log n) and do 1000 binary searches (~1000 log n) - the total is much less.
  - id: b
    text: 1000 linear searches with ~n operations each is about a million operations.
  - id: c
    text: Both strategies are equal in cost.
  - id: d
    text: Sort again before each search.
  correct:
  - a
  explanation: 1000 linear searches are about 1000·1000 = 10^6 operations. Sorting ~10^4 plus 1000 binary searches for ~10
    operations ~10^4 - in total about 2·10^4, that is, tens of times cheaper. A one-time sorting pays off in many cheap searches.
  variants:
  - prompt: Why is a "nearly sorted" list not good for binary search?
    choices:
    - id: a
      text: Even one violation of the order can lead the search to the wrong half and miss an existing element.
    - id: b
      text: The "almost sorted" list works, just slower.
    - id: c
      text: Binary search requires exactly powers of two elements.
    - id: d
      text: The only problem is duplicates.
    correct:
    - a
    explanation: 'The correctness of binary search is based on a strict order: smallest on the left, largest on the right.
      One violation makes the conclusion “what we are looking for is not in this half” false. We need a fully sorted list.'
- id: is-sorted-impl-001
  concept: invariants-and-correctness
  type: python-function
  difficulty: 3
  prompt: Implement `is_sorted(a)` - a binary search precondition check. Return True if the list is sorted in non-descending
    order (equal neighbors are allowed), False otherwise. An empty list and a list with one element are considered sorted.
  starter: "def is_sorted(a):\n    ...\n"
  cases:
  - call: is_sorted([1, 2, 3])
    expect: true
  - call: is_sorted([1, 3, 2])
    expect: false
  - call: is_sorted([])
    expect: true
  - call: is_sorted([5])
    expect: true
  - call: is_sorted([2, 2, 3])
    expect: true
  - call: is_sorted([3, 2, 1])
    expect: false
  hints:
  - A list is sorted if and only if each pair of neighbors is in the correct order. It is enough to check all neighboring
    pairs.
  - Go through indices from 0 to len(a) - 2 and compare a[i] with a[i + 1]. The first violation a[i] > a[i + 1] means that
    the list is not sorted.
  - If no pairs are out of order (including the empty and singleton list cases where there are no pairs), return True.
  solution: "def is_sorted(a):\n    for i in range(len(a) - 1):\n        if a[i] > a[i + 1]:\n            return False\n \
    \   return True\n"
