exercises:
  - id: complexity-class-001
    concept: complexity-basics
    type: theory-quiz
    difficulty: 1
    prompt: "Какова временная сложность поиска максимума в неотсортированном списке из `n` чисел одним проходом?"
    choices:
      - id: a
        text: "O(1) - достаточно посмотреть на один элемент."
      - id: b
        text: "O(n) - нужно посмотреть на каждый элемент ровно один раз."
      - id: c
        text: "O(log n) - на каждом шаге отбрасывается половина."
      - id: d
        text: "O(n^2) - для каждого элемента проходим по всем остальным."
    correct: [b]
    explanation: "Чтобы найти максимум в неотсортированных данных, нужно увидеть каждый элемент хотя бы раз - пропущенный мог оказаться наибольшим. Это один проход, то есть O(n)."
    variants:
      - prompt: "Какова временная сложность обращения к элементу списка по индексу - `xs[5]`?"
        choices:
          - id: a
            text: "O(1) - доступ по индексу не зависит от размера списка."
          - id: b
            text: "O(n) - нужно пройти список до пятого элемента."
          - id: c
            text: "O(log n) - индекс ищется делением пополам."
          - id: d
            text: "O(n^2) - зависит от вложенного перебора."
        correct: [a]
        explanation: "Список в Python хранит элементы подряд, поэтому адрес `xs[5]` вычисляется арифметикой за константное время независимо от длины списка."
      - prompt: "Какова сложность вложенного цикла, где для каждого из `n` элементов вы проходите по всем `n` элементам?"
        choices:
          - id: a
            text: "O(n^2) - n повторений внешнего цикла умножаются на n повторений внутреннего."
          - id: b
            text: "O(n) - циклов всего два; смешивая оценку по времени с оценкой по памяти"
          - id: c
            text: "O(1) - циклы не влияют на класс роста; смешивая оценку по времени с оценкой по памяти"
          - id: d
            text: "O(log n) - вложенность уменьшает работу вдвое; смешивая оценку по времени с оценкой по памяти"
        correct: [a]
        explanation: "Вложенные циклы перемножаются: тело внутреннего цикла выполнится n × n раз, что даёт O(n^2)."

  - id: log-steps-001
    concept: complexity-basics
    type: theory-quiz
    difficulty: 2
    prompt: "Алгоритм на каждом шаге отбрасывает половину оставшихся данных. Примерно сколько шагов он сделает на 1000 элементах?"
    choices:
      - id: a
        text: "Около 1000 - по шагу на элемент при полном линейном проходе."
      - id: b
        text: "Около 10 - столько раз 1000 можно поделить на 2."
      - id: c
        text: "Около 500 - обработать половину элементов один раз и стоп."
      - id: d
        text: "Около 1 000 000 - взять квадрат размера n как число шагов."
    correct: [b]
    explanation: "Деление пополам - это O(log n). log2(1000) ≈ 10, поэтому хватит примерно десяти шагов, чтобы от тысячи дойти до одного элемента."

  - id: count-operations-001
    concept: complexity-basics
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Она считает число выполнений тела каждого цикла."
    snippet: |
      n = 4

      linear = 0
      for i in range(n):
          linear += 1

      quadratic = 0
      for i in range(n):
          for j in range(n):
              quadratic += 1

      print(linear, quadratic)
    expected:
      kind: stdout
      value: "4 16"
    hints:
      - "Линейный цикл выполняет тело по разу на каждый из n элементов. Сколько раз тело внутреннего цикла выполнится при двух вложенных циклах по n?"
      - "Внешний цикл крутится n раз, и на каждой итерации внутренний крутится n раз - перемножьте."
    variants:
      - snippet: |
          n = 5

          linear = 0
          for i in range(n):
              linear += 1

          quadratic = 0
          for i in range(n):
              for j in range(n):
                  quadratic += 1

          print(linear, quadratic)
        expected:
          kind: stdout
          value: "5 25"
      - snippet: |
          n = 3

          linear = 0
          for i in range(n):
              linear += 1

          quadratic = 0
          for i in range(n):
              for j in range(n):
                  quadratic += 1

          print(linear, quadratic)
        expected:
          kind: stdout
          value: "3 9"

  - id: triangular-count-001
    concept: complexity-basics
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Внутренний цикл начинается не с нуля."
    snippet: |
      n = 4
      count = 0
      for i in range(n):
          for j in range(i + 1, n):
              count += 1
      print(count)
    expected:
      kind: stdout
      value: "6"
    hints:
      - "Это перебор всех пар без повторов. На каждом i внутренний цикл делает меньше шагов, чем на предыдущем."
      - "Выпишите число итераций внутреннего цикла для i = 0, 1, 2, 3 и сложите: 3 + 2 + 1 + 0."
    variants:
      - snippet: |
          n = 5
          count = 0
          for i in range(n):
              for j in range(i + 1, n):
                  count += 1
          print(count)
        expected:
          kind: stdout
          value: "10"
      - snippet: |
          n = 3
          count = 0
          for i in range(n):
              for j in range(i + 1, n):
                  count += 1
          print(count)
        expected:
          kind: stdout
          value: "3"

  - id: count-pairs-001
    concept: complexity-basics
    type: python-function
    difficulty: 4
    prompt: "Реализуйте `count_pairs(n)`, возвращающую число неупорядоченных пар различных индексов из диапазона 0..n-1. Это тело двойного цикла `for i: for j in range(i+1, n)`. Не используйте формулу - посчитайте циклом, как считал бы вложенный перебор."
    starter: |
      def count_pairs(n):
          ...
    cases:
      - call: "count_pairs(4)"
        expect: 6
      - call: "count_pairs(5)"
        expect: 10
      - call: "count_pairs(1)"
        expect: 0
      - call: "count_pairs(0)"
        expect: 0
    solution: |
      def count_pairs(n):
          count = 0
          for i in range(n):
              for j in range(i + 1, n):
                  count += 1
          return count
    hints:
      - "Каждая пара (i, j) с i < j считается один раз - это ровно та работа, которую делает вложенный цикл квадратичного алгоритма."
      - "Заведите счётчик, прогоните внешний цикл по i, а внутренний по j от i+1 до n, увеличивая счётчик в теле."
      - "Для n = 0 и n = 1 пар нет, и оба цикла просто не выполнят тело - счётчик останется нулём."
