exercises:
  - id: bubble-idea-001
    concept: bubble-sort
    type: theory-quiz
    difficulty: 1
    prompt: "Что гарантированно происходит за один полный проход пузырьковой сортировки слева направо?"
    choices:
      - id: a
        text: "Весь список становится отсортированным - смешивая оценку по времени с оценкой по памяти"
      - id: b
        text: "Наибольший из ещё не упорядоченных элементов оказывается в конце зоны прохода."
      - id: c
        text: "Наименьший элемент встаёт в начало списка"
      - id: d
        text: "Список переворачивается задом наперёд"
    correct: [b]
    explanation: "В каждом сравнении больший из пары сдвигается вправо, поэтому за проход самый большой элемент «всплывает» в конец. Один проход не сортирует весь список, но один элемент ставит на место."
    variants:
      - prompt: "Зачем во внутреннем цикле граница `range(n - 1 - i)` уменьшается с каждым проходом?"
        choices:
          - id: a
            text: "Хвост уже отсортирован после прошлых проходов."
          - id: b
            text: "Чтобы случайно не выйти за начало списка."
          - id: c
            text: "Это ускоряет лучший случай до O(log n)."
          - id: d
            text: "Без уменьшения сортировка дала бы неверный результат."
        correct: [a]
        explanation: "После i проходов последние i элементов уже на финальных местах, поэтому зону сравнений можно сократить на i - результат тот же, а работы меньше."
      - prompt: "Почему обмен делают только при строгом `a[j] > a[j + 1]`, а не при `>=`?"
        choices:
          - id: a
            text: "Чтобы сохранить устойчивость."
          - id: b
            text: "Иначе возникнет IndexError."
          - id: c
            text: "С `>=` список отсортируется в обратном порядке."
          - id: d
            text: "Разницы нет, это дело вкуса."
        correct: [a]
        explanation: "При `>` равные соседи остаются на месте, и относительный порядок равных ключей сохраняется - это и есть устойчивость. С `>=` равные переставлялись бы без нужды."

  - id: bubble-pass-output-001
    concept: bubble-sort
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Она печатает список после каждого прохода внешнего цикла."
    snippet: |
      def bubble_sort_traced(xs):
          a = list(xs)
          n = len(a)
          for i in range(n - 1):
              for j in range(n - 1 - i):
                  if a[j] > a[j + 1]:
                      a[j], a[j + 1] = a[j + 1], a[j]
              print(a)

      bubble_sort_traced([3, 2, 1])
    expected:
      kind: stdout
      value: |-
        [2, 1, 3]
        [1, 2, 3]
    hints:
      - "Внешний цикл делает n-1 = 2 прохода. Проследите обмены соседей в каждом проходе и распечатайте список ровно после внутреннего цикла."
      - "Проход 0 сравнивает пары (0,1) и (1,2); проход 1 - только пару (0,1), потому что хвост уже на месте."
    variants:
      - snippet: |
          def bubble_sort_traced(xs):
              a = list(xs)
              n = len(a)
              for i in range(n - 1):
                  for j in range(n - 1 - i):
                      if a[j] > a[j + 1]:
                          a[j], a[j + 1] = a[j + 1], a[j]
                  print(a)

          bubble_sort_traced([4, 1, 3, 2])
        expected:
          kind: stdout
          value: |-
            [1, 3, 2, 4]
            [1, 2, 3, 4]
            [1, 2, 3, 4]
      - snippet: |
          def bubble_sort_traced(xs):
              a = list(xs)
              n = len(a)
              for i in range(n - 1):
                  for j in range(n - 1 - i):
                      if a[j] > a[j + 1]:
                          a[j], a[j + 1] = a[j + 1], a[j]
                  print(a)

          bubble_sort_traced([2, 3, 1])
        expected:
          kind: stdout
          value: |-
            [2, 1, 3]
            [1, 2, 3]

  - id: bubble-early-exit-001
    concept: bubble-sort
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Версия с флагом раннего выхода печатает число выполненных проходов."
    snippet: |
      def bubble_sort_passes(xs):
          a = list(xs)
          n = len(a)
          passes = 0
          for i in range(n - 1):
              passes += 1
              swapped = False
              for j in range(n - 1 - i):
                  if a[j] > a[j + 1]:
                      a[j], a[j + 1] = a[j + 1], a[j]
                      swapped = True
              if not swapped:
                  break
          print(passes)

      bubble_sort_passes([1, 2, 3, 4])
    expected:
      kind: stdout
      value: "1"
    hints:
      - "Вход уже отсортирован. Что произойдёт с флагом `swapped` за первый проход, если ни один обмен не случится?"
      - "Если после прохода `swapped` остался False, срабатывает `break` - и `passes` фиксирует число реально выполненных проходов."
    variants:
      - snippet: |
          def bubble_sort_passes(xs):
              a = list(xs)
              n = len(a)
              passes = 0
              for i in range(n - 1):
                  passes += 1
                  swapped = False
                  for j in range(n - 1 - i):
                      if a[j] > a[j + 1]:
                          a[j], a[j + 1] = a[j + 1], a[j]
                          swapped = True
                  if not swapped:
                      break
              print(passes)

          bubble_sort_passes([1, 3, 2, 4])
        expected:
          kind: stdout
          value: "2"
      - snippet: |
          def bubble_sort_passes(xs):
              a = list(xs)
              n = len(a)
              passes = 0
              for i in range(n - 1):
                  passes += 1
                  swapped = False
                  for j in range(n - 1 - i):
                      if a[j] > a[j + 1]:
                          a[j], a[j + 1] = a[j + 1], a[j]
                          swapped = True
                  if not swapped:
                      break
              print(passes)

          bubble_sort_passes([4, 3, 2, 1])
        expected:
          kind: stdout
          value: "3"

  - id: bubble-implement-001
    concept: bubble-sort
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `bubble_sort(xs)`, возвращающую новый отсортированный по возрастанию список. Не меняйте исходный список и не используйте встроенные `sorted`/`.sort`."
    starter: |
      def bubble_sort(xs):
          ...
    cases:
      - call: "bubble_sort([5, 1, 4, 2, 8])"
        expect: [1, 2, 4, 5, 8]
      - call: "bubble_sort([3, 2, 1])"
        expect: [1, 2, 3]
      - call: "bubble_sort([])"
        expect: []
      - call: "bubble_sort([7])"
        expect: [7]
      - call: "bubble_sort([2, 2, 1, 1])"
        expect: [1, 1, 2, 2]
    solution: |
      def bubble_sort(xs):
          a = list(xs)
          n = len(a)
          for i in range(n - 1):
              for j in range(n - 1 - i):
                  if a[j] > a[j + 1]:
                      a[j], a[j + 1] = a[j + 1], a[j]
          return a
    hints:
      - "Скопируйте вход в новый список, чтобы не портить аргумент, а потом сортируйте копию на месте."
      - "Два вложенных цикла: внешний считает проходы, внутренний сравнивает соседей `a[j]` и `a[j + 1]` и меняет их при `a[j] > a[j + 1]`."
      - "Пустой список и список из одного элемента уже отсортированы - циклы с границей `n - 1` просто не выполнят тело."

  - id: bubble-early-implement-001
    concept: bubble-sort
    type: python-function
    difficulty: 4
    prompt: "Реализуйте `bubble_sort_count(xs)`, возвращающую кортеж `(отсортированный_список, число_проходов)`. Используйте ранний выход по флагу: проход без единого обмена завершает работу."
    starter: |
      def bubble_sort_count(xs):
          ...
    cases:
      - call: "bubble_sort_count([1, 2, 3, 4])"
        expect: [[1, 2, 3, 4], 1]
      - call: "bubble_sort_count([4, 3, 2, 1])"
        expect: [[1, 2, 3, 4], 3]
      - call: "bubble_sort_count([1, 3, 2, 4])"
        expect: [[1, 2, 3, 4], 2]
      - call: "bubble_sort_count([5])"
        expect: [[5], 0]
    solution: |
      def bubble_sort_count(xs):
          a = list(xs)
          n = len(a)
          passes = 0
          for i in range(n - 1):
              passes += 1
              swapped = False
              for j in range(n - 1 - i):
                  if a[j] > a[j + 1]:
                      a[j], a[j + 1] = a[j + 1], a[j]
                      swapped = True
              if not swapped:
                  break
          return (a, passes)
    hints:
      - "Заведите счётчик проходов и флаг `swapped`, который сбрасывается в начале каждого прохода и поднимается при любом обмене."
      - "После внутреннего цикла проверьте флаг: если обменов не было, `break` - список уже отсортирован."
      - "На входе из одного элемента или пустом внешний цикл `range(n - 1)` не выполнится ни разу, поэтому проходов будет 0."
