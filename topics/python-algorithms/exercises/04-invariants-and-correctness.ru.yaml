exercises:
  - id: invariant-what-001
    concept: invariants-and-correctness
    type: theory-quiz
    difficulty: 1
    prompt: "Что такое инвариант цикла?"
    choices:
      - id: a
        text: "Утверждение, которое остаётся истинным перед каждой итерацией цикла."
      - id: b
        text: "Переменная, значение которой никогда не меняется во всей программе."
      - id: c
        text: "Условие выхода из цикла, проверяемое один раз в самом конце."
      - id: d
        text: "Количество итераций, известное заранее до входа в цикл."
    correct: [a]
    explanation: "Инвариант - свойство, истинное перед первой итерацией и сохраняющееся после каждой. Вместе с условием выхода он доказывает корректность алгоритма для всех входов, а не только для проверенных примеров."
    variants:
      - prompt: "Из каких трёх шагов состоит доказательство корректности через инвариант?"
        choices:
          - id: a
            text: "Старт, сохранение, завершение."
          - id: b
            text: "Компиляция, запуск, проверка вывода."
          - id: c
            text: "Объявление, инициализация, освобождение."
          - id: d
            text: "Лучший случай, средний случай, худший случай."
        correct: [a]
        explanation: "Доказательство индуктивно: инвариант верен на старте, сохраняется каждой итерацией, а на выходе вместе с условием цикла гарантирует нужный результат."
      - prompt: "Каков инвариант внешнего цикла пузырьковой сортировки после i проходов?"
        choices:
          - id: a
            text: "Последние i элементов уже стоят на финальных местах и являются наибольшими."
          - id: b
            text: "Первые i элементов отсортированы - смешивая оценку по времени с оценкой по памяти"
          - id: c
            text: "Весь список отсортирован - смешивая оценку по времени с оценкой по памяти"
          - id: d
            text: "Сделано ровно i обменов"
        correct: [a]
        explanation: "Каждый проход выталкивает очередной максимум в конец, поэтому после i проходов отсортированный хвост длиной i гарантирован. Через n-1 проходов на месте оказывается весь список."

  - id: linear-count-predict-001
    concept: invariants-and-correctness
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Функция считает число сравнений до нахождения элемента линейным перебором."
    snippet: |
      def linear_count(a, target):
          comparisons = 0
          for x in a:
              comparisons += 1
              if x == target:
                  return comparisons
          return comparisons

      print(linear_count([4, 8, 15, 16, 23], 15))
    expected:
      kind: stdout
      value: "3"
    hints:
      - "Линейный поиск идёт слева направо и считает каждый осмотренный элемент. На каком по счёту элементе он встретит искомое?"
      - "Перебор: 4 (1), 8 (2), 15 (3) - совпадение, возврат 3."
    variants:
      - snippet: |
          def linear_count(a, target):
              comparisons = 0
              for x in a:
                  comparisons += 1
                  if x == target:
                      return comparisons
              return comparisons

          print(linear_count([4, 8, 15, 16, 23], 4))
        expected:
          kind: stdout
          value: "1"
      - snippet: |
          def linear_count(a, target):
              comparisons = 0
              for x in a:
                  comparisons += 1
                  if x == target:
                      return comparisons
              return comparisons

          print(linear_count([4, 8, 15, 16, 23], 99))
        expected:
          kind: stdout
          value: "5"

  - id: choose-search-001
    concept: invariants-and-correctness
    type: theory-quiz
    difficulty: 2
    prompt: "У вас неотсортированный список, и нужно один раз найти в нём элемент. Какой поиск выбрать?"
    choices:
      - id: a
        text: "Линейный: он работает на любых данных, а сортировать ради одного поиска дороже самого поиска."
      - id: b
        text: "Бинарный: он всегда быстрее"
      - id: c
        text: "Сначала отсортировать, потом бинарный - это всегда оптимально; смешивая оценку по времени с оценкой по памяти"
      - id: d
        text: "Любой - разницы нет"
    correct: [a]
    explanation: "Сортировка стоит O(n log n), а один линейный поиск - O(n). Сортировать ради единственного бинарного поиска невыгодно. Линейный поиск здесь и проще, и дешевле."
    variants:
      - prompt: "Когда оправдано отсортировать список перед поисками?"
        choices:
          - id: a
            text: "Когда по одному списку нужно искать многократно."
          - id: b
            text: "Когда список короткий"
          - id: c
            text: "Когда в списке есть дубликаты"
          - id: d
            text: "Сортировать перед поиском не нужно никогда - смешивая оценку по времени с оценкой по памяти"
        correct: [a]
        explanation: "Один раз отсортировали за O(n log n), дальше каждый из многих поисков стоит O(log n). При большом числе поисков это многократно выгоднее, чем линейный перебор каждый раз."

  - id: sort-cost-quiz-001
    concept: invariants-and-correctness
    type: theory-quiz
    difficulty: 3
    prompt: "Нужно выполнить 1000 поисков по списку из 1000 элементов. Какая стратегия эффективнее по числу операций?"
    choices:
      - id: a
        text: "Отсортировать один раз (~n log n)."
      - id: b
        text: "1000 линейных поисков по ~n операций каждый - это около миллиона операций."
      - id: c
        text: "Обе стратегии равны по стоимости."
      - id: d
        text: "Сортировать перед каждым поиском заново."
    correct: [a]
    explanation: "1000 линейных поисков - это порядка 1000·1000 = 10^6 операций. Сортировка ~10^4 плюс 1000 бинарных поисков по ~10 операций ~10^4 - в сумме около 2·10^4, то есть в десятки раз дешевле. Разовая сортировка окупается за счёт многих дешёвых поисков."
    variants:
      - prompt: "Почему «почти отсортированный» список не годится для бинарного поиска?"
        choices:
          - id: a
            text: "Даже одно нарушение порядка может увести поиск не в ту половину."
          - id: b
            text: "«Почти отсортированный» список работает, просто медленнее."
          - id: c
            text: "Бинарный поиск требует ровно степени двойки элементов."
          - id: d
            text: "Проблема только в дубликатах."
        correct: [a]
        explanation: "Корректность бинарного поиска опирается на строгий порядок: слева меньшие, справа большие. Одно нарушение делает вывод «искомого нет в этой половине» ложным. Нужен полностью отсортированный список."

  - id: is-sorted-impl-001
    concept: invariants-and-correctness
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `is_sorted(a)` - проверку предусловия бинарного поиска. Верните True, если список отсортирован по неубыванию (равные соседи допустимы), иначе False. Пустой список и список из одного элемента считаются отсортированными."
    starter: |
      def is_sorted(a):
          ...
    cases:
      - call: "is_sorted([1, 2, 3])"
        expect: true
      - call: "is_sorted([1, 3, 2])"
        expect: false
      - call: "is_sorted([])"
        expect: true
      - call: "is_sorted([5])"
        expect: true
      - call: "is_sorted([2, 2, 3])"
        expect: true
      - call: "is_sorted([3, 2, 1])"
        expect: false
    hints:
      - "Список отсортирован тогда и только тогда, когда каждая пара соседей стоит в правильном порядке. Достаточно проверить все соседние пары."
      - "Пройдите индексы от 0 до len(a) - 2 и сравните a[i] с a[i + 1]. Первое же нарушение a[i] > a[i + 1] означает, что список не отсортирован."
      - "Если ни одна пара не нарушила порядок (включая случаи пустого и одноэлементного списка, где пар нет), верните True."
    solution: |
      def is_sorted(a):
          for i in range(len(a) - 1):
              if a[i] > a[i + 1]:
                  return False
          return True
