conceptId: complexity-basics
cards:
  - id: complexity-basics-01
    front: "Почему алгоритмы сравнивают по числу операций, а не по секундам?"
    back: "Секунды зависят от процессора, языка и нагрузки на машину и ничего не говорят об алгоритме. Число элементарных операций (сравнений, присваиваний, обращений к ячейке) в зависимости от размера входа n не зависит от железа и позволяет осмысленно сравнивать."
    tags: [basics]
  - id: complexity-basics-02
    front: "Что означает запись O(f(n))?"
    back: "Что при больших n число операций растёт не быстрее, чем f(n), с точностью до постоянного множителя. Зависимость огрубляют до главного слагаемого и отбрасывают константы."
    tags: [big-o]
  - id: complexity-basics-03
    front: "Почему 3n + 7 и 100n - оба O(n)?"
    back: "Big-O смотрит на класс роста, а не на множитель. При росте n линейная форма побеждает любые константы, поэтому константный множитель и младшие слагаемые отбрасывают - остаётся O(n)."
    tags: [big-o]
  - id: complexity-basics-04
    front: "Назовите четыре частых класса сложности от дешёвого к дорогому."
    back: "O(1) - константа, время не зависит от n; O(log n) - каждый шаг отбрасывает половину данных; O(n) - линейный проход по входу; O(n²) - вложенный цикл по тем же данным."
    tags: [classes]
  - id: complexity-basics-05
    front: "Что такое O(1) и приведите пример."
    back: "Константное время: число операций не зависит от n. Обращение к элементу списка по индексу, проверка len(xs), чтение первого элемента - всё O(1), хоть десять элементов, хоть миллион."
    tags: [classes]
  - id: complexity-basics-06
    front: "Чем пространственная сложность отличается от временной?"
    back: "Пространственная - это дополнительная память сверх самого входа. Она независима от времени: бывает быстро, но прожорливо по памяти, и наоборот. Пузырьковая сортировка на месте - O(1) дополнительной памяти."
    tags: [space]
  - id: complexity-basics-07
    front: "Что такое худший, средний и лучший случай?"
    back: "Одна функция работает по-разному на разных входах. Линейный поиск найдёт элемент на первом шаге (лучший, O(1)) или пройдёт весь список, если его нет (худший, O(n)). По умолчанию под сложностью понимают худший случай."
    tags: [cases]
  - id: complexity-basics-08
    front: "Как складываются последовательные и вложенные циклы?"
    back: "Два последовательных цикла по n дают O(n) + O(n) = O(n) - константный множитель отбрасывают. Вложенные циклы перемножаются: цикл по n внутри цикла по n даёт O(n²)."
    tags: [counting, pitfalls]
  - id: complexity-basics-09
    front: "Когда оценка big-O может ввести в заблуждение?"
    back: "Big-O игнорирует константы. На малых, реальных данных алгоритм O(n) с огромной константой может проигрывать алгоритму O(n²) с крошечной. Класс роста начинает играть роль только когда n велик."
    tags: [pitfalls]
  - id: complexity-basics-10
    front: "Почему логарифм в O(log n) пишут без основания?"
    back: "Когда каждый шаг делит данные пополам, число шагов - это сколько раз n делится на 2 до единицы, то есть log₂ n. Смена основания логарифма - умножение на константу, а константы big-O отбрасывает, поэтому пишут просто O(log n)."
    tags: [logarithm]
