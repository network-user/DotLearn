conceptId: invariants-and-correctness
cards:
- id: invariants-and-correctness-01
  front: What is a loop invariant?
  back: 'Property true before every iteration: it is true before the first iteration and remains true after each iteration.
    If after exit the invariant together with the exit condition gives the desired result, the algorithm is correct.'
  tags:
  - invariant
- id: invariants-and-correctness-02
  front: What are the three parts of checking an invariant?
  back: Start - the invariant is true before the first iteration; saving - each iteration saves it; completion - after exit,
    the invariant together with the exit condition gives the desired result.
  tags:
  - invariant
- id: invariants-and-correctness-03
  front: State an invariant of the outer loop of bubble sort.
  back: After i passes, the last i elements of the list are in their final places and are the largest. After n-1 passes, everything
    is in place except the first one, which means that the list is sorted.
  tags:
  - invariant
  - bubble-sort
- id: invariants-and-correctness-04
  front: What is the invariant of binary search?
  back: If the element you are looking for is in the list at all, then it is in the current zone [lo, hi]. Each step discards
    only the half where the element is known to be absent, so the invariant is preserved.
  tags:
  - invariant
  - binary-search
- id: invariants-and-correctness-05
  front: Why does the binary search invariant require moving the boundary by mid ± 1?
  back: The checked mid is definitely not the one you are looking for. Leaving it in the zone means violating “we discard
    only what the element does not have.” Therefore, the border must cross mid.
  tags:
  - invariant
  - binary-search
- id: invariants-and-correctness-06
  front: When to choose linear search and when to choose binary search?
  back: No data in order or searching once - linear (O(n), works on any list). The list is sorted and there are many searches
    - binary (O(log n), requires sorting, pays off with many searches).
  tags:
  - choice
- id: invariants-and-correctness-07
  front: Why doesn't the correctness of an algorithm make it the right choice?
  back: Correctness answers only the question “whether the algorithm gives the correct answer”, but not “whether it is suitable
    for the data.” Linear search is correct on any list, but on a huge sorted array with many queries it loses to binary search.
    The choice takes into account both correctness and complexity suitability.
  tags:
  - choice
  - correctness
- id: invariants-and-correctness-08
  front: Is it possible to apply binary search to "almost sorted" data?
  back: 'No. “Almost” is not enough: one violation of order can lead the search to the wrong half. Either the list is completely
    sorted, or binary search is not applicable to it.'
  tags:
  - pitfalls
- id: invariants-and-correctness-09
  front: How is correctness different from completeness?
  back: 'Correctness - if the loop completes, the result is correct (proved by an invariant). Completeness - that the cycle
    will stop altogether (proved by a “variant”: a decreasing non-negative value).'
  tags:
  - correctness
- id: invariants-and-correctness-10
  front: What serves as an "option" in binary search and why is lo = mid dangerous?
  back: 'An option is the size of the zone hi - lo: it strictly decreases at each step and cannot remain non-negative indefinitely.
    The error lo = mid instead of lo = mid + 1 breaks not correctness, but completeness: the zone stops decreasing and the
    cycle goes in cycles.'
  tags:
  - correctness
  - pitfalls
