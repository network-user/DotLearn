conceptId: bubble-sort
cards:
  - id: bubble-sort-01
    front: "В чём основная идея пузырьковой сортировки?"
    back: "Идти по списку слева направо и сравнивать каждую пару соседей. Если левый больше правого, они стоят неверно - менять их местами. Большие элементы постепенно «всплывают» к концу списка."
    tags: [idea]
  - id: bubble-sort-02
    front: "Что гарантированно происходит за один проход слева направо?"
    back: "Наибольший из ещё не упорядоченных элементов «всплывает» в конец: он побеждает в каждом сравнении и доезжает до правого края. Один проход не сортирует весь список целиком."
    tags: [idea]
  - id: bubble-sort-03
    front: "Сколько проходов нужно для полной сортировки и почему граница внутреннего цикла - range(n - 1 - i)?"
    back: "До n - 1 проходов. После каждого прохода отсортированный хвост растёт на один элемент, поэтому зона сравнений сокращается: на проходе i последние i элементов уже на местах, и доходить до них незачем."
    tags: [mechanics]
  - id: bubble-sort-04
    front: "Как обменять два соседних элемента без временной переменной?"
    back: "Через распаковку кортежа: a[j], a[j + 1] = a[j + 1], a[j]. Python вычисляет правую часть целиком, затем присваивает - временная переменная не нужна."
    tags: [mechanics]
  - id: bubble-sort-05
    front: "Зачем нужен флаг swapped и где его проверять?"
    back: "Он даёт ранний выход: если за целый проход не было ни одного обмена, список уже отсортирован. Флаг сбрасывается в начале каждого прохода, поднимается при любом обмене, а проверка if not swapped стоит после внутреннего цикла."
    tags: [optimization]
  - id: bubble-sort-06
    front: "Почему сложность пузырьковой сортировки O(n²)?"
    back: "В худшем случае (список отсортирован наоборот) внутренний цикл делает n-1, потом n-2, и так до 1 сравнения - сумма примерно n²/2. Отбрасывая константу 1/2, получаем O(n²) по времени."
    tags: [complexity]
  - id: bubble-sort-07
    front: "Сколько дополнительной памяти требует пузырьковая сортировка?"
    back: "O(1): она переставляет элементы на месте и заводит лишь пару переменных. Копирование входа в новый список ради сохранности аргумента - это O(n), но сама сортировка добавочной памяти не требует."
    tags: [complexity]
  - id: bubble-sort-08
    front: "Что значит, что сортировка устойчива, и почему пузырьковая устойчива?"
    back: "Устойчивая сортировка сохраняет относительный порядок элементов с равными ключами. Пузырьковая меняет соседей только при строгом >, поэтому равные элементы (a[j] == a[j+1]) условие не проходят и остаются в исходном порядке."
    tags: [stability]
  - id: bubble-sort-09
    front: "Почему сравнение >= вместо > ломает алгоритм?"
    back: "С >= равные соседи переставляются без нужды: теряется устойчивость, а алгоритм делает лишнюю работу. Менять местами нужно только при строгом >."
    tags: [pitfalls]
  - id: bubble-sort-10
    front: "Улучшает ли ранний выход худший случай?"
    back: "Нет. Ранний выход улучшает лучший и средний случай (на отсортированных данных лучший случай становится O(n)). На обратно отсортированных данных обмен есть в каждой паре каждого прохода, флаг всегда поднят - O(n²) остаётся."
    tags: [pitfalls]
