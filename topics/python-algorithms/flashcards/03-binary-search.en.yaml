conceptId: binary-search
cards:
- id: binary-search-01
  front: What is the required precondition for binary search?
  back: The list must be sorted. All logic rests on the conclusion “if the middle element is less than the desired one, then
    the desired one is not on the left,” and it is true only when there are smaller values ​​on the left and larger ones on
    the right.
  tags:
  - precondition
- id: binary-search-02
  front: What happens if you run a binary search on an unsorted list?
  back: It doesn't "run slower" - it works incorrectly, silently returning "not found" for existing elements. Sorting here
    is not an optimization, but a mandatory precondition.
  tags:
  - precondition
  - pitfalls
- id: binary-search-03
  front: How is the search zone set and how is the middle taken?
  back: 'Two indices: lo (left border) and hi (right). At the beginning, lo = 0, hi = len(a) - 1. At each step, mid = (lo
    + hi) // 2 is taken and compared with the desired one.'
  tags:
  - mechanics
- id: binary-search-04
  front: How do the boundaries shift after comparing a[mid] with the desired one?
  back: If a[mid] == target - found, return mid. If a[mid] < target is the desired one to the right, lo = mid + 1. If a[mid]
    > target is the desired one to the left, hi = mid - 1.
  tags:
  - mechanics
- id: binary-search-05
  front: Why is the complexity of binary search O(log n)?
  back: 'Each step discards half of the remaining elements: out of n, n/2, n/4, and so on until one remains. The number of
    n halvings to one is log₂ n. For a million elements this is about 20 steps.'
  tags:
  - complexity
- id: binary-search-06
  front: Why is the loop condition while lo <= hi, and not lo < hi?
  back: With strict <, the single zone lo == hi is not checked, and the element in it is lost (for example, the largest one
    in the last step). The condition lo <= hi guarantees checking a zone consisting of one element.
  tags:
  - pitfalls
- id: binary-search-07
  front: Why is the border updated as lo = mid + 1 rather than lo = mid?
  back: The checked mid is no longer suitable, it cannot be left in the zone. If you move the border to mid, rather than mid
    + 1, the zone stops narrowing and the cycle begins to cycle.
  tags:
  - pitfalls
- id: binary-search-08
  front: What will a binary search return on an empty list and why is it correct?
  back: If the list is empty hi = -1, the condition lo <= hi (0 <= -1) is false immediately, the loop is not executed even
    once, returning -1. The edge case is processed without additional checking.
  tags:
  - edge-cases
- id: binary-search-09
  front: What index will a basic binary search return for duplicates?
  back: The index of one of the equal elements, not necessarily the first. Finding the leftmost occurrence is a separate task;
    bisect.bisect_left from the standard library solves it.
  tags:
  - edge-cases
- id: binary-search-10
  front: Does sorting for a single binary search pay off?
  back: No. Sorting costs O(n log n) - more expensive than linear search alone at O(n). Binary search is useful when one sorted
    list is searched many times.
  tags:
  - tradeoffs
