conceptId: bubble-sort
cards:
- id: bubble-sort-01
  front: What is the main idea of ​​bubble sort?
  back: Go through the list from left to right and compare each pair of neighbors. If the left one is larger than the right
    one, they are positioned incorrectly - swap them. Large items gradually “float” to the end of the list.
  tags:
  - idea
- id: bubble-sort-02
  front: What is guaranteed to happen in one pass from left to right?
  back: 'The largest of the not yet ordered elements “floats” to the end: it wins in each comparison and reaches the right
    edge. One pass does not sort the entire list.'
  tags:
  - idea
- id: bubble-sort-03
  front: How many passes are needed for a complete sort and why is the inner loop bound at range(n - 1 - i)?
  back: 'Up to n - 1 passes. After each pass, the sorted tail grows by one element, so the comparison area is reduced: on
    pass i, the last i elements are already in place, and there is no need to reach them.'
  tags:
  - mechanics
- id: bubble-sort-04
  front: How to exchange two adjacent elements without a temporary variable?
  back: 'Through tuple unpacking: a[j], a[j + 1] = a[j + 1], a[j]. Python evaluates the entire right-hand side, then assigns
    - no temporary variable needed.'
  tags:
  - mechanics
- id: bubble-sort-05
  front: Why is the swapped flag needed and where to check it?
  back: 'It gives an early exit: if there has not been a single exchange in the entire pass, the list is already sorted. The
    flag is reset at the beginning of each pass, raised during any exchange, and the if not swapped check is placed after
    the inner loop.'
  tags:
  - optimization
- id: bubble-sort-06
  front: Why is the complexity of bubble sort O(n²)?
  back: In the worst case (the list is sorted in reverse), the inner loop does n-1, then n-2, and so on until 1 comparison
    - the sum is approximately n²/2. Discarding the constant 1/2, we get O(n²) in time.
  tags:
  - complexity
- id: bubble-sort-07
  front: How much additional memory does bubble sort require?
  back: 'O(1): it rearranges the elements in place and only introduces a couple of variables. Copying an entry to a new list
    to preserve the argument is O(n), but the sorting itself does not require any additional memory.'
  tags:
  - complexity
- id: bubble-sort-08
  front: What does it mean that sorting is stable, and why is bubble sorting stable?
  back: Robust sort preserves the relative order of elements with equal keys. Bubble changes neighbors only under strict >,
    so equal elements (a[j] == a[j+1]) do not pass the condition and remain in the original order.
  tags:
  - stability
- id: bubble-sort-09
  front: Why does comparing >= instead of > break the algorithm?
  back: 'With >= equal neighbors are rearranged unnecessarily: stability is lost, and the algorithm does unnecessary work.
    It is necessary to change places only under strict >.'
  tags:
  - pitfalls
- id: bubble-sort-10
  front: Does exiting early improve the worst case?
  back: No. Exiting early improves the best and average cases (on sorted data, the best case becomes O(n)). On reverse sorted
    data, there is an exchange in each pair of each pass, the flag is always raised - O(n²) remains.
  tags:
  - pitfalls
