conceptId: binary-search
cards:
  - id: binary-search-01
    front: "Каково обязательное предусловие бинарного поиска?"
    back: "Список должен быть отсортирован. Вся логика держится на выводе «если средний элемент меньше искомого, то слева искомого нет», а он верен лишь когда слева лежат меньшие значения, а справа - большие."
    tags: [precondition]
  - id: binary-search-02
    front: "Что произойдёт, если запустить бинарный поиск на неотсортированном списке?"
    back: "Он не «работает медленнее» - он работает неправильно, молча возвращая «не найдено» для существующих элементов. Сортировка здесь не оптимизация, а обязательное предусловие."
    tags: [precondition, pitfalls]
  - id: binary-search-03
    front: "Как задаётся зона поиска и как берётся середина?"
    back: "Двумя индексами: lo (левая граница) и hi (правая). В начале lo = 0, hi = len(a) - 1. На каждом шаге берётся mid = (lo + hi) // 2 и сравнивается с искомым."
    tags: [mechanics]
  - id: binary-search-04
    front: "Как сдвигаются границы после сравнения a[mid] с искомым?"
    back: "Если a[mid] == target - нашли, возвращаем mid. Если a[mid] < target - искомое правее, lo = mid + 1. Если a[mid] > target - искомое левее, hi = mid - 1."
    tags: [mechanics]
  - id: binary-search-05
    front: "Почему сложность бинарного поиска O(log n)?"
    back: "Каждый шаг отбрасывает половину оставшихся элементов: из n остаётся n/2, n/4 и так до одного. Число делений n пополам до единицы - это log₂ n. Для миллиона элементов это около 20 шагов."
    tags: [complexity]
  - id: binary-search-06
    front: "Почему условие цикла - while lo <= hi, а не lo < hi?"
    back: "Со строгим < одиночная зона lo == hi не проверяется, и элемент в ней теряется (например, наибольший на последнем шаге). Условие lo <= hi гарантирует проверку зоны из одного элемента."
    tags: [pitfalls]
  - id: binary-search-07
    front: "Почему границу обновляют как lo = mid + 1, а не lo = mid?"
    back: "Проверенный mid уже не подошёл, оставлять его в зоне нельзя. Если двигать границу на mid, а не на mid + 1, зона перестаёт сужаться и цикл зацикливается."
    tags: [pitfalls]
  - id: binary-search-08
    front: "Что вернёт бинарный поиск на пустом списке и почему это корректно?"
    back: "При пустом списке hi = -1, условие lo <= hi (0 <= -1) ложно сразу, цикл не выполняется ни разу, возвращается -1. Граничный случай обрабатывается без дополнительной проверки."
    tags: [edge-cases]
  - id: binary-search-09
    front: "Какой индекс вернёт базовый бинарный поиск при дубликатах?"
    back: "Индекс какого-то из равных элементов, не обязательно первого. Поиск самого левого вхождения - отдельная задача; её решает bisect.bisect_left из стандартной библиотеки."
    tags: [edge-cases]
  - id: binary-search-10
    front: "Окупается ли сортировка ради единственного бинарного поиска?"
    back: "Нет. Сортировка стоит O(n log n) - дороже одного линейного поиска за O(n). Бинарный поиск выгоден, когда по одному отсортированному списку ищут много раз."
    tags: [tradeoffs]
