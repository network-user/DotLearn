conceptId: complexity-basics
cards:
- id: complexity-basics-01
  front: Why are algorithms compared by the number of operations and not by seconds?
  back: Seconds depend on the processor, language and load on the machine and do not say anything about the algorithm. The
    number of elementary operations (comparisons, assignments, cell accesses) depending on the input size n does not depend
    on the hardware and allows meaningful comparison.
  tags:
  - basics
- id: complexity-basics-02
  front: What does O(f(n)) mean?
  back: That for large n the number of operations grows no faster than f(n), up to a constant factor. The dependence is coarsened
    to the main term and the constants are discarded.
  tags:
  - big-o
- id: complexity-basics-03
  front: Why are 3n + 7 and 100n both O(n)?
  back: Big-O looks at the growth class, not the multiplier. As n grows, the linear form defeats any constants, so the constant
    factor and low-order terms are discarded - O(n) remains.
  tags:
  - big-o
- id: complexity-basics-04
  front: Name four common difficulty classes from cheap to expensive.
  back: O(1) - constant, time does not depend on n; O(log n) - each step discards half of the data; O(n) - linear pass through
    the input; O(n²) - nested loop on the same data.
  tags:
  - classes
- id: complexity-basics-05
  front: What is O(1) and give an example.
  back: 'Constant time: the number of operations does not depend on n. Accessing a list element by index, checking len(xs),
    reading the first element - everything is O(1), even ten elements, even a million.'
  tags:
  - classes
- id: complexity-basics-06
  front: How is spatial complexity different from time complexity?
  back: 'Spatial is additional memory beyond the input itself. It is independent of time: it can be fast, but voracious in
    memory, and vice versa. Bubble sort in place - O(1) extra memory.'
  tags:
  - space
- id: complexity-basics-07
  front: What is the worst, average and best case?
  back: One function works differently on different inputs. Linear search will find the element in the first step (best, O(1))
    or go through the entire list if it doesn't exist (worst, O(n)). By default, complexity is understood as the worst case.
  tags:
  - cases
- id: complexity-basics-08
  front: How do sequential and nested loops stack up?
  back: 'Two consecutive cycles of n give O(n) + O(n) = O(n) - the constant factor is discarded. Nested loops are multiplied:
    a loop through n inside a loop through n gives O(n²).'
  tags:
  - counting
  - pitfalls
- id: complexity-basics-09
  front: When can big-O estimation be misleading?
  back: Big-O ignores constants. On small, real data, an O(n) algorithm with a huge constant can lose to an O(n²) algorithm
    with a tiny one. Growth class only comes into play when n is large.
  tags:
  - pitfalls
- id: complexity-basics-10
  front: Why is the logarithm in O(log n) written without a base?
  back: When each step divides the data in half, the number of steps is the number of times n is divided by 2 to unity, that
    is, log₂ n. Changing the base of the logarithm is multiplying by a constant, and big-O discards constants, so they simply
    write O(log n).
  tags:
  - logarithm
