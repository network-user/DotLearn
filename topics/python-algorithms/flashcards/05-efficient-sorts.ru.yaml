conceptId: efficient-sorts
cards:
  - id: efficient-sorts-01
    front: "Почему ни одна сортировка сравнениями не быстрее O(n log n) в худшем случае?"
    back: "Чтобы различить все n! возможных порядков n элементов, дереву решений нужно не меньше n! листьев, а его высота (число сравнений в худшем случае) не меньше log2(n!) ≈ n log n. Это нижняя граница Ω(n log n). Обойти её можно, только отказавшись от сравнений: подсчётом или поразрядно за O(n)."
    tags: [complexity, lower-bound]
  - id: efficient-sorts-02
    front: "В чём идея «разделяй и властвуй» в быстрых сортировках?"
    back: "Разбить список на части поменьше, отсортировать каждую, затем собрать ответ. Список из одного элемента уже отсортирован, поэтому дробление доходит до одиночных элементов. Глубина дробления даёт log n уровней, на каждом уровне работы порядка n, отсюда O(n log n)."
    tags: [divide-and-conquer]
  - id: efficient-sorts-03
    front: "Как слить (merge) два уже отсортированных списка в один?"
    back: "Держать по указателю на начало каждого списка и на каждом шаге забирать меньший из двух передних элементов, сдвигая его указатель. Когда один список кончился, остаток второго дописывается целиком, ведь он и так отсортирован. Один проход, порядка n сравнений."
    tags: [merge-sort, merge]
  - id: efficient-sorts-04
    front: "Почему merge sort устойчив и при чём тут нестрогое сравнение в слиянии?"
    back: "Устойчивость сохраняет относительный порядок равных ключей. При равных элементах условие left[i] <= right[j] предпочитает элемент из левой (более ранней) половины, поэтому равные ключи не переставляются. Строгое < сломало бы устойчивость."
    tags: [merge-sort, stability]
  - id: efficient-sorts-05
    front: "Сколько дополнительной памяти требует merge sort и почему?"
    back: "O(n): слияние собирает новый список result, а не переставляет элементы на месте. Это плата за простоту и устойчивость и главный проигрыш merge sort рядом с quicksort, который работает на месте."
    tags: [merge-sort, memory]
  - id: efficient-sorts-06
    front: "Что делает шаг partition в quicksort?"
    back: "Выбирает опорный элемент (pivot) и одним проходом раскидывает список: слева от pivot элементы не больше него, справа не меньше. После этого pivot стоит на финальном месте, а две половины сортируются той же процедурой независимо. Схема Ломуто делает это в одном цикле, ведя границу зоны «не больше pivot»."
    tags: [quicksort, partition]
  - id: efficient-sorts-07
    front: "На каком входе наивный quicksort вырождается в O(n²) и почему?"
    back: "Если pivot каждый раз почти минимум или максимум, partition отрезает не половину, а один элемент. Глубина рекурсии становится n, суммарная работа O(n²). Наивный pivot равный последнему элементу даёт это ровно на уже отсортированном входе, где последний элемент всегда максимум."
    tags: [quicksort, pitfalls]
  - id: efficient-sorts-08
    front: "Как убрать гарантированный худший случай quicksort на отсортированных данных?"
    back: "Брать pivot случайно или как медиану трёх (первый, средний, последний). Тогда заранее подобранного «плохого» входа не существует, и O(n²) остаётся редкой невезучей случайностью, а не гарантией. Сам худший случай не исчезает совсем, но становится крайне маловероятным."
    tags: [quicksort, pivot]
  - id: efficient-sorts-09
    front: "Каковы устойчивость и память quicksort?"
    back: "Quicksort неустойчив: обмены через весь список легко перекидывают равные элементы друг через друга. Зато он работает на месте, дополнительная память уходит только на стек рекурсии, порядка O(log n) при удачных разбиениях."
    tags: [quicksort, memory]
  - id: efficient-sorts-10
    front: "Что такое Timsort и почему CPython использует именно его?"
    back: "Это гибрид сортировки слиянием и вставками, стоящий за list.sort и sorted. Он находит естественные упорядоченные участки (runs), короткие достраивает вставками, затем сливает runs между собой; при слиянии сильно разных по длине runs включает galloping, перепрыгивая длинные участки бинарным поиском. В итоге сохраняет устойчивость и гарантию O(n log n), а на почти упорядоченных данных ускоряется до O(n). Quicksort не подошёл бы: он неустойчив и имеет вход на O(n²)."
    tags: [timsort]
  - id: efficient-sorts-11
    front: "Когда простые пузырёк и вставки уместнее merge и quick?"
    back: "На маленьких списках (порядка десяти элементов) низкая константа вставок побеждает накладные расходы рекурсии и выделения памяти. На почти отсортированных данных вставки делают всего порядка n работы, ведь каждый элемент уже почти на месте. Именно поэтому Timsort достраивает короткие runs вставками, а не рекурсией."
    tags: [insertion-sort, tradeoffs]
