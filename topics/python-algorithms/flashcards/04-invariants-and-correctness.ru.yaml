conceptId: invariants-and-correctness
cards:
  - id: invariants-and-correctness-01
    front: "Что такое инвариант цикла?"
    back: "Свойство, истинное перед каждой итерацией: оно верно перед первой итерацией и сохраняется после каждой. Если после выхода инвариант вместе с условием выхода даёт нужный результат - алгоритм корректен."
    tags: [invariant]
  - id: invariants-and-correctness-02
    front: "Из каких трёх частей состоит проверка инварианта?"
    back: "Старт - инвариант верен перед первой итерацией; сохранение - каждая итерация его сохраняет; завершение - после выхода инвариант вместе с условием выхода даёт нужный результат."
    tags: [invariant]
  - id: invariants-and-correctness-03
    front: "Сформулируйте инвариант внешнего цикла пузырьковой сортировки."
    back: "После i проходов последние i элементов списка стоят на своих финальных местах и являются наибольшими. После n-1 проходов на местах все, кроме первого, а значит и он - список отсортирован."
    tags: [invariant, bubble-sort]
  - id: invariants-and-correctness-04
    front: "Каков инвариант бинарного поиска?"
    back: "Если искомый элемент вообще есть в списке, то он находится в текущей зоне [lo, hi]. Каждый шаг отбрасывает только ту половину, где элемента заведомо нет, поэтому инвариант сохраняется."
    tags: [invariant, binary-search]
  - id: invariants-and-correctness-05
    front: "Почему инвариант бинарного поиска требует двигать границу на mid ± 1?"
    back: "Проверенный mid точно не искомый. Оставить его в зоне - значит нарушить «отбрасываем только то, где элемента нет». Поэтому граница обязана перешагнуть mid."
    tags: [invariant, binary-search]
  - id: invariants-and-correctness-06
    front: "Когда выбирать линейный поиск, а когда бинарный?"
    back: "Нет данных в порядке или ищете один раз - линейный (O(n), работает на любом списке). Список отсортирован и поисков много - бинарный (O(log n), требует сортировки, окупается при многих поисках)."
    tags: [choice]
  - id: invariants-and-correctness-07
    front: "Почему корректность алгоритма ещё не делает его правильным выбором?"
    back: "Корректность отвечает лишь на вопрос «даёт ли алгоритм верный ответ», но не «подходит ли он для этих данных». Линейный поиск корректен на любом списке, однако на огромном отсортированном массиве с многими запросами он проигрывает бинарному. Выбор учитывает и корректность, и пригодность по сложности."
    tags: [choice, correctness]
  - id: invariants-and-correctness-08
    front: "Можно ли применять бинарный поиск к «почти отсортированным» данным?"
    back: "Нет. «Почти» недостаточно: одно нарушение порядка может увести поиск не в ту половину. Либо список отсортирован полностью, либо бинарный поиск к нему неприменим."
    tags: [pitfalls]
  - id: invariants-and-correctness-09
    front: "Чем корректность отличается от завершимости?"
    back: "Корректность - если цикл завершится, результат правильный (доказывается инвариантом). Завершимость - что цикл вообще остановится (доказывается «вариантом»: убывающей неотрицательной величиной)."
    tags: [correctness]
  - id: invariants-and-correctness-10
    front: "Что служит «вариантом» в бинарном поиске и почему lo = mid опасно?"
    back: "Вариант - размер зоны hi - lo: он строго убывает на каждом шаге и не может бесконечно оставаться неотрицательным. Ошибка lo = mid вместо lo = mid + 1 ломает не корректность, а завершимость: зона перестаёт уменьшаться и цикл зацикливается."
    tags: [correctness, pitfalls]
