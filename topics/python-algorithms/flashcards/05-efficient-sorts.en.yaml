conceptId: efficient-sorts
cards:
  - id: efficient-sorts-01
    front: "Why is no comparison sort faster than O(n log n) in the worst case?"
    back: "To tell apart all n! possible orders of n elements, a decision tree needs at least n! leaves, and its height (the number of comparisons in the worst case) is at least log2(n!) ≈ n log n. That is the Ω(n log n) lower bound. You can beat it only by giving up comparisons: counting or radix sort run in O(n)."
    tags: [complexity, lower-bound]
  - id: efficient-sorts-02
    front: "What is the divide-and-conquer idea behind the fast sorts?"
    back: "Split the list into smaller parts, sort each, then assemble the answer. A one-element list is already sorted, so the splitting reaches single elements. The splitting gives log n levels, each doing about n work, hence O(n log n)."
    tags: [divide-and-conquer]
  - id: efficient-sorts-03
    front: "How do you merge two already sorted lists into one?"
    back: "Keep a pointer at the start of each list and, at every step, take the smaller of the two front elements, advancing its pointer. When one list runs out, the rest of the other is appended whole, since it is already sorted. One pass, about n comparisons."
    tags: [merge-sort, merge]
  - id: efficient-sorts-04
    front: "Why is merge sort stable, and how does the non-strict comparison relate?"
    back: "Stability preserves the relative order of equal keys. On equal elements the condition left[i] <= right[j] prefers the element from the left (earlier) half, so equal keys are never reordered. A strict < would break stability."
    tags: [merge-sort, stability]
  - id: efficient-sorts-05
    front: "How much extra memory does merge sort need, and why?"
    back: "O(n): the merge builds a new result list instead of rearranging elements in place. This is the price of simplicity and stability, and merge sort's main disadvantage next to quicksort, which works in place."
    tags: [merge-sort, memory]
  - id: efficient-sorts-06
    front: "What does the partition step do in quicksort?"
    back: "It picks a pivot and, in one pass, scatters the list so that elements to the left of the pivot are no greater than it and elements to the right are no smaller. After that the pivot sits in its final place, and the two halves are sorted by the same procedure independently. The Lomuto scheme does this in one loop, carrying the boundary of the 'no greater than pivot' zone."
    tags: [quicksort, partition]
  - id: efficient-sorts-07
    front: "On what input does a naive quicksort degrade to O(n²), and why?"
    back: "If the pivot is almost the minimum or maximum every time, partition peels off one element instead of half. The recursion depth becomes n and the total work O(n²). A naive pivot equal to the last element causes this on exactly the already sorted input, where the last element is always the maximum."
    tags: [quicksort, pitfalls]
  - id: efficient-sorts-08
    front: "How do you remove quicksort's guaranteed worst case on sorted data?"
    back: "Pick the pivot at random or as the median of three (first, middle, last). Then no crafted 'bad' input exists in advance, and O(n²) stays a rare stroke of bad luck rather than a guarantee. The worst case does not vanish entirely, but becomes extremely unlikely."
    tags: [quicksort, pivot]
  - id: efficient-sorts-09
    front: "What are quicksort's stability and memory?"
    back: "Quicksort is not stable: swaps across the whole list easily leap equal elements past each other. But it works in place, and the extra memory goes only to the recursion stack, about O(log n) on good splits."
    tags: [quicksort, memory]
  - id: efficient-sorts-10
    front: "What is Timsort, and why does CPython use it?"
    back: "It is a hybrid of merge sort and insertion sort behind list.sort and sorted. It finds natural ordered stretches (runs), extends short ones with insertion, then merges runs together; when merging runs of very different lengths it switches on galloping, jumping over long stretches with binary search. It keeps stability and the O(n log n) guarantee, and speeds up to O(n) on nearly ordered data. Quicksort would not fit: it is unstable and has an input that gives O(n²)."
    tags: [timsort]
  - id: efficient-sorts-11
    front: "When are plain bubble and insertion sort a better fit than merge and quick?"
    back: "On small lists (about ten elements) insertion's low constant beats the overhead of recursion and memory allocation. On nearly sorted data insertion does only about n work, since each element is already almost in place. That is exactly why Timsort extends short runs with insertion, not recursion."
    tags: [insertion-sort, tradeoffs]
