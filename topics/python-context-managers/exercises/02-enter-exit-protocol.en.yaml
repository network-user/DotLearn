exercises:
  - id: protocol-two-methods-001
    concept: enter-exit-protocol
    type: theory-quiz
    difficulty: 1
    prompt: "Which two methods turn an ordinary object into a context manager?"
    choices:
      - id: a
        text: "`__enter__` and `__exit__`."
      - id: b
        text: "`__init__` and `__del__`."
      - id: c
        text: "`__open__` and `__close__`."
      - id: d
        text: "`__acquire__` and `__release__`."
    correct: [a]
    explanation: "The context manager protocol is the pair `__enter__` (entry) and `__exit__` (exit). Those are what the `with` statement calls."
    variants:
      - prompt: "What lands in the variable after `as` in `with cm as x`?"
        choices:
          - id: a
            text: "Whatever `cm.__enter__()` returned."
          - id: b
            text: "The object `cm` itself, always regardless of implementation."
          - id: c
            text: "The result of `cm.__exit__()`."
          - id: d
            text: "Always `None`."
        correct: [a]
        explanation: "After `as` lies the return value of `__enter__`. For a file that is the file itself, but in general the class author decides what to return."
      - prompt: "How many arguments does `__exit__` always receive (besides self)?"
        choices:
          - id: a
            text: "Three: exception type, exception object, and traceback."
          - id: b
            text: "One: a boolean whether an error occurred."
          - id: c
            text: "None - it is called without arguments."
          - id: d
            text: "Two: resource name and return code."
        correct: [a]
        explanation: "`__exit__` always receives `(exc_type, exc, tb)`. On normal completion all three are `None`."

  - id: protocol-as-value-001
    concept: enter-exit-protocol
    type: predict-output
    difficulty: 2
    prompt: "What does this program print?"
    snippet: |
      class Greeter:
          def __enter__(self):
              print("enter")
              return "hello"

          def __exit__(self, exc_type, exc, tb):
              print("exit")
              return False

      with Greeter() as value:
          print(value)
    expected:
      kind: stdout
      value: "enter\nhello\nexit"
    hints:
      - "`value` is not the Greeter object but what `__enter__` returned. What did it return?"
      - "Order: `__enter__`, block body, `__exit__`. Printing follows that order."
    variants:
      - snippet: |
          class Greeter:
              def __enter__(self):
                  return self

              def __exit__(self, exc_type, exc, tb):
                  return False

          with Greeter() as value:
              print(value is None)
        expected:
          kind: stdout
          value: "False"
      - snippet: |
          class Silent:
              def __enter__(self):
                  pass

              def __exit__(self, exc_type, exc, tb):
                  return False

          with Silent() as value:
              print(value)
        expected:
          kind: stdout
          value: "None"

  - id: protocol-exit-args-001
    concept: enter-exit-protocol
    type: predict-output
    difficulty: 3
    prompt: "What does this program print?"
    snippet: |
      class Watcher:
          def __enter__(self):
              return self

          def __exit__(self, exc_type, exc, tb):
              if exc_type is None:
                  print("success")
              else:
                  print("error:", exc_type.__name__)
              return False

      with Watcher():
          pass

      try:
          with Watcher():
              raise KeyError("k")
      except KeyError:
          print("outside")
    expected:
      kind: stdout
      value: "success\nerror: KeyError\noutside"
    hints:
      - "On normal completion `exc_type` is `None`; on exception it holds the error class. Which `if` branch runs in each block?"
      - "In the second block `__exit__` runs before the exception reaches the outer `except`."

  - id: protocol-blanks-001
    concept: enter-exit-protocol
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete a minimal context manager that returns itself on entry and does not suppress exceptions on exit."
    template: |
      class Resource:
          def __enter__(self):
              return {{ret}}

          def __exit__(self, exc_type, exc, tb):
              return {{suppress}}
    blanks:
      ret:
        accept: ["self"]
      suppress:
        accept: ["False"]
    variants:
      - prompt: "Complete the three `__exit__` argument names in the order Python passes them (type, exception object, traceback)."
        template: |
          class Resource:
              def __enter__(self):
                  return self

              def __exit__(self, {{a1}}, {{a2}}, {{a3}}):
                  return False
        blanks:
          a1:
            accept: ["exc_type", "extype", "et"]
            accept_regex: '^[A-Za-z_][A-Za-z0-9_]*$'
          a2:
            accept: ["exc", "exc_value", "value", "ev"]
            accept_regex: '^[A-Za-z_][A-Za-z0-9_]*$'
          a3:
            accept: ["tb", "traceback", "exc_tb"]
            accept_regex: '^[A-Za-z_][A-Za-z0-9_]*$'
      - prompt: "Complete the check: if there was no exception, what is `exc_type`?"
        template: |
          class Resource:
              def __enter__(self):
                  return self

              def __exit__(self, exc_type, exc, tb):
                  if exc_type is {{none}}:
                      print("success")
                  return False
        blanks:
          none:
            accept: ["None"]

  - id: protocol-suppress-return-001
    concept: enter-exit-protocol
    type: predict-output
    difficulty: 3
    prompt: "What does this program print?"
    snippet: |
      class Swallow:
          def __enter__(self):
              return self

          def __exit__(self, exc_type, exc, tb):
              return True

      with Swallow():
          raise ValueError("vanish")
      print("continuing")
    expected:
      kind: stdout
      value: "continuing"
    hints:
      - "The exception's fate is decided by what `__exit__` returns. A true value means handled."
      - "`return True` suppresses the exception: the block ends quietly and execution reaches the line after `with`."

  - id: protocol-suppress-cm-001
    concept: enter-exit-protocol
    type: python-function
    difficulty: 4
    prompt: "Complete context manager `Ignore` that suppresses exactly one exception type (passed to the constructor) and lets others through. Function `safe(exc_type, raised)` enters `with Ignore(exc_type)`, raises an exception of class `raised` inside the block, and returns \"ok\" if execution completes, otherwise re-raises."
    starter: |
      class Ignore:
          def __init__(self, exc_type):
              ...
          def __enter__(self):
              ...
          def __exit__(self, exc_type, exc, tb):
              ...

      def safe(exc_type, raised):
          with Ignore(exc_type):
              raise raised("boom")
          return "ok"
    cases:
      - call: "safe(ValueError, ValueError)"
        expect: "ok"
      - call: "safe(KeyError, KeyError)"
        expect: "ok"
    hints:
      - "Suppressing an exception is a true return from `__exit__`. But suppress only the given type, not any exception."
      - "In `__exit__` compare `exc_type` to the type saved in the constructor. Remember exception inheritance."
      - "Save the target type in `__init__`. In `__exit__` use `issubclass`, and handle `exc_type is None` when there was no exception."
    solution: |
      class Ignore:
          def __init__(self, exc_type):
              self.target = exc_type
          def __enter__(self):
              return self
          def __exit__(self, exc_type, exc, tb):
              return exc_type is not None and issubclass(exc_type, self.target)

      def safe(exc_type, raised):
          with Ignore(exc_type):
              raise raised("boom")
          return "ok"
