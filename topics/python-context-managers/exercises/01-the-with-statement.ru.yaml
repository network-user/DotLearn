exercises:
  - id: with-why-001
    concept: the-with-statement
    type: theory-quiz
    difficulty: 1
    prompt: "Какую гарантию даёт оператор `with`?"
    choices:
      - id: a
        text: "Что освобождение ресурса произойдёт при любом выходе из блока"
      - id: b
        text: "Что внутри блока не возникнет ни одного исключения."
      - id: c
        text: "Что любое исключение внутри блока будет автоматически подавлено."
      - id: d
        text: "Что ресурс будет захвачен заново при каждой итерации цикла."
    correct: [a]
    explanation: "`with` привязывает освобождение к выходу из блока и выполняет его при любом исходе. Он не предотвращает исключения и по умолчанию не подавляет их."
    variants:
      - prompt: "Чему эквивалентен `with` по своей сути?"
        choices:
          - id: a
            text: "Встроенному в язык `try/finally`, где освобождение лежит в `finally`."
          - id: b
            text: "Циклу, который повторяет тело блока, пока ресурс открыт."
          - id: c
            text: "Конструкции `try/except`, которая ловит и гасит ошибки."
          - id: d
            text: "Обычному вызову функции без какой-либо обработки выхода."
        correct: [a]
        explanation: "`with` - это синтаксический эквивалент `try/finally`: язык сам пишет `finally`, поэтому забыть про освобождение невозможно."
      - prompt: "Что произойдёт с файлом, если внутри `with open(...) as f:` возникнет исключение?"
        choices:
          - id: a
            text: "Файл будет закрыт, а исключение полетит дальше нетронутым."
          - id: b
            text: "Файл останется открытым до конца работы программы."
          - id: c
            text: "Исключение будет проглочено, а файл закрыт."
          - id: d
            text: "Файл будет закрыт, а исключение заменено на `ValueError`."
        correct: [a]
        explanation: "`with` освобождает ресурс при любом исходе, но не подавляет исключение: оно пробрасывается дальше, как обычно."

  - id: with-vs-tryfinally-001
    concept: the-with-statement
    type: fill-in-blanks
    difficulty: 1
    prompt: "Перепишите ручное управление файлом через оператор `with`."
    template: |
      {{open}} open("data.txt") as f:
          content = f.read()
    blanks:
      open:
        accept: ["with"]
    variants:
      - prompt: "Допишите эквивалент `with` через try/finally: чем гарантируется закрытие файла?"
        template: |
          f = open("data.txt")
          try:
              content = f.read()
          {{block}}:
              f.close()
        blanks:
          block:
            accept: ["finally"]
      - prompt: "Откройте два файла в одном `with`: исходный для чтения и целевой для записи."
        template: |
          with open("in.txt") as src{{sep}} open("out.txt", "w") as dst:
              dst.write(src.read())
        blanks:
          sep:
            accept: [","]

  - id: with-resource-after-block-001
    concept: the-with-statement
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      class Tracker:
          def __enter__(self):
              print("захват")
              return self

          def __exit__(self, exc_type, exc, tb):
              print("освобождение")
              return False

      with Tracker():
          print("тело")
      print("после блока")
    expected:
      kind: stdout
      value: "захват\nтело\nосвобождение\nпосле блока"
    hints:
      - "Вход в блок выполняет захват, выход - освобождение. Тело идёт между ними. Где напечатается «освобождение» относительно строки «после блока»?"
      - "`__exit__` срабатывает на выходе из блока, до того как управление пойдёт дальше по программе."
    variants:
      - snippet: |
          class Tracker:
              def __enter__(self):
                  print("захват")
                  return self

              def __exit__(self, exc_type, exc, tb):
                  print("освобождение")
                  return False

          try:
              with Tracker():
                  print("тело")
                  raise ValueError("сбой")
          except ValueError:
              print("поймали снаружи")
        expected:
          kind: stdout
          value: "захват\nтело\nосвобождение\nпоймали снаружи"
      - snippet: |
          class Tracker:
              def __enter__(self):
                  print("захват")
                  return self

              def __exit__(self, exc_type, exc, tb):
                  print("освобождение")
                  return False

          with Tracker(), Tracker():
              print("тело")
        expected:
          kind: stdout
          value: "захват\nзахват\nтело\nосвобождение\nосвобождение"

  - id: with-exception-not-swallowed-001
    concept: the-with-statement
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      class Resource:
          def __enter__(self):
              return self

          def __exit__(self, exc_type, exc, tb):
              print("закрыли")
              return False

      try:
          with Resource():
              raise RuntimeError("оп")
          print("сюда не дойдёт")
      except RuntimeError as e:
          print("снаружи:", e)
    expected:
      kind: stdout
      value: "закрыли\nснаружи: оп"
    hints:
      - "`with` по умолчанию не подавляет исключение: ресурс освобождается, но ошибка летит дальше. Что из этого происходит раньше?"
      - "Строка `print(\"сюда не дойдёт\")` стоит после `raise` внутри блока - дойдёт ли до неё управление, если исключение уже возбуждено?"

  - id: with-multiple-order-001
    concept: the-with-statement
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      class R:
          def __init__(self, name):
              self.name = name

          def __enter__(self):
              print("захват", self.name)
              return self

          def __exit__(self, exc_type, exc, tb):
              print("освобождение", self.name)
              return False

      with R("A") as a, R("B") as b:
          print("работаем")
    expected:
      kind: stdout
      value: "захват A\nзахват B\nработаем\nосвобождение B\nосвобождение A"
    hints:
      - "Ресурсы захватываются слева направо. А в каком порядке они освобождаются - как стопка тарелок?"
      - "Освобождение идёт в порядке, обратном захвату: последний захваченный закрывается первым."

  - id: with-tracelog-001
    concept: the-with-statement
    type: python-function
    difficulty: 4
    prompt: "Допишите класс `TraceCM`: на входе он добавляет в список `log` строку `\"enter\"`, на выходе - `\"exit\"`. Функция `run(log)` использует его в блоке `with` и возвращает тот же список. Список `log` передаётся в конструктор."
    starter: |
      class TraceCM:
          def __init__(self, log):
              ...
          def __enter__(self):
              ...
          def __exit__(self, exc_type, exc, tb):
              ...

      def run(log):
          with TraceCM(log):
              log.append("body")
          return log
    cases:
      - call: "run([])"
        expect: ["enter", "body", "exit"]
      - call: "run(['start'])"
        expect: ["start", "enter", "body", "exit"]
    hints:
      - "Контекст-менеджер должен хранить ссылку на список, чтобы дописывать в него и на входе, и на выходе. Где её удобно сохранить?"
      - "`__enter__` вызывается до тела блока, `__exit__` - после. Порядок записей в списке повторяет порядок вызовов."
      - "Сохраните список в `self` в конструкторе; в `__enter__` и `__exit__` дописывайте в него через `append`. `__exit__` пусть вернёт `False`."
    solution: |
      class TraceCM:
          def __init__(self, log):
              self.log = log
          def __enter__(self):
              self.log.append("enter")
              return self
          def __exit__(self, exc_type, exc, tb):
              self.log.append("exit")
              return False

      def run(log):
          with TraceCM(log):
              log.append("body")
          return log
