exercises:
  - id: with-why-001
    concept: the-with-statement
    type: theory-quiz
    difficulty: 1
    prompt: "What guarantee does the `with` statement give?"
    choices:
      - id: a
        text: "Resource release happens on any exit from the block"
      - id: b
        text: "No exception can occur inside the block."
      - id: c
        text: "Any exception inside the block is automatically suppressed."
      - id: d
        text: "The resource is re-acquired on every loop iteration."
    correct: [a]
    explanation: "`with` ties release to leaving the block and runs it for any outcome. It does not prevent exceptions and does not suppress them by default."
    variants:
      - prompt: "What is `with` essentially equivalent to?"
        choices:
          - id: a
            text: "Language-built-in try/finally where release lives in finally."
          - id: b
            text: "A loop that repeats the block while the resource is open."
          - id: c
            text: "try/except that catches and silences errors."
          - id: d
            text: "An ordinary function call with no exit handling."
        correct: [a]
        explanation: "`with` is syntactic try/finally: the language writes finally for you, so you cannot forget release."
      - prompt: "What happens to a file if an exception fires inside `with open(...) as f:`?"
        choices:
          - id: a
            text: "The file is closed and the exception propagates unchanged."
          - id: b
            text: "The file stays open until program exit."
          - id: c
            text: "The exception is swallowed and the file is closed."
          - id: d
            text: "The file is closed and the exception becomes ValueError."
        correct: [a]
        explanation: "`with` releases the resource for any outcome but does not suppress the exception: it propagates as usual."

  - id: with-vs-tryfinally-001
    concept: the-with-statement
    type: fill-in-blanks
    difficulty: 1
    prompt: "Rewrite manual file handling using the `with` statement."
    template: |
      {{open}} open("data.txt") as f:
          content = f.read()
    blanks:
      open:
        accept: ["with"]
    variants:
      - prompt: "Complete the try/finally equivalent of `with`: what block guarantees the file is closed?"
        template: |
          f = open("data.txt")
          try:
              content = f.read()
          {{block}}:
              f.close()
        blanks:
          block:
            accept: ["finally"]
      - prompt: "Open two files in one `with`: source for reading and destination for writing."
        template: |
          with open("in.txt") as src{{sep}} open("out.txt", "w") as dst:
              dst.write(src.read())
        blanks:
          sep:
            accept: [","]

  - id: with-resource-after-block-001
    concept: the-with-statement
    type: predict-output
    difficulty: 2
    prompt: "What does this program print?"
    snippet: |
      class Tracker:
          def __enter__(self):
              print("acquire")
              return self

          def __exit__(self, exc_type, exc, tb):
              print("release")
              return False

      with Tracker():
          print("body")
      print("after block")
    expected:
      kind: stdout
      value: "acquire\nbody\nrelease\nafter block"
    hints:
      - "Block entry runs acquire, exit runs release. Body sits between them. Where does release print relative to after block?"
      - "`__exit__` runs on block exit, before control continues in the program."
    variants:
      - snippet: |
          class Tracker:
              def __enter__(self):
                  print("acquire")
                  return self

              def __exit__(self, exc_type, exc, tb):
                  print("release")
                  return False

          try:
              with Tracker():
                  print("body")
                  raise ValueError("fail")
          except ValueError:
              print("caught outside")
        expected:
          kind: stdout
          value: "acquire\nbody\nrelease\ncaught outside"
      - snippet: |
          class Tracker:
              def __enter__(self):
                  print("acquire")
                  return self

              def __exit__(self, exc_type, exc, tb):
                  print("release")
                  return False

          with Tracker(), Tracker():
              print("body")
        expected:
          kind: stdout
          value: "acquire\nacquire\nbody\nrelease\nrelease"

  - id: with-exception-not-swallowed-001
    concept: the-with-statement
    type: predict-output
    difficulty: 3
    prompt: "What does this program print?"
    snippet: |
      class Resource:
          def __enter__(self):
              return self

          def __exit__(self, exc_type, exc, tb):
              print("closed")
              return False

      try:
          with Resource():
              raise RuntimeError("oops")
          print("never reached")
      except RuntimeError as e:
          print("outside:", e)
    expected:
      kind: stdout
      value: "closed\noutside: oops"
    hints:
      - "By default `with` does not suppress exceptions: the resource is released but the error propagates. Which happens first?"
      - "Line `print(\"never reached\")` sits after `raise` inside the block - does control reach it if an exception was raised?"

  - id: with-multiple-order-001
    concept: the-with-statement
    type: predict-output
    difficulty: 3
    prompt: "What does this program print?"
    snippet: |
      class R:
          def __init__(self, name):
              self.name = name

          def __enter__(self):
              print("acquire", self.name)
              return self

          def __exit__(self, exc_type, exc, tb):
              print("release", self.name)
              return False

      with R("A") as a, R("B") as b:
          print("working")
    expected:
      kind: stdout
      value: "acquire A\nacquire B\nworking\nrelease B\nrelease A"
    hints:
      - "Resources are acquired left to right. In what order are they released - like a stack of plates?"
      - "Release is reverse of acquisition: the last acquired closes first."

  - id: with-tracelog-001
    concept: the-with-statement
    type: python-function
    difficulty: 4
    prompt: "Complete class `TraceCM`: on entry it appends \"enter\" to list `log`, on exit \"exit\". Function `run(log)` uses it in a `with` block and returns the same list. List `log` is passed to the constructor."
    starter: |
      class TraceCM:
          def __init__(self, log):
              ...
          def __enter__(self):
              ...
          def __exit__(self, exc_type, exc, tb):
              ...

      def run(log):
          with TraceCM(log):
              log.append("body")
          return log
    cases:
      - call: "run([])"
        expect: ["enter", "body", "exit"]
      - call: "run(['start'])"
        expect: ["start", "enter", "body", "exit"]
    hints:
      - "The context manager should store a reference to the list to append on entry and exit. Where is convenient to save it?"
      - "`__enter__` runs before the block body, `__exit__` after. List order mirrors call order."
      - "Save the list on self in __init__; append in __enter__ and __exit__. Have __exit__ return False."
    solution: |
      class TraceCM:
          def __init__(self, log):
              self.log = log
          def __enter__(self):
              self.log.append("enter")
              return self
          def __exit__(self, exc_type, exc, tb):
              self.log.append("exit")
              return False

      def run(log):
          with TraceCM(log):
              log.append("body")
          return log
