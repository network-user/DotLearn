exercises:
  - id: contextlib-yield-split-001
    concept: contextlib
    type: theory-quiz
    difficulty: 1
    prompt: "How does `@contextmanager` split a generator function into entry and exit?"
    choices:
      - id: a
        text: "Code before `yield` plays the role of `__enter__`, code after `yield` the role of `__exit__`."
      - id: b
        text: "Code before `yield` is exit, code after is entry."
      - id: c
        text: "The whole function runs as `__enter__` and `__exit__` is empty."
      - id: d
        text: "`yield` splits the function into two separate context managers."
    correct: [a]
    explanation: "One `yield` cuts the function: everything before is acquire (`__enter__`), everything after is release (`__exit__`). The value from `yield` goes to the variable after `as`."
    variants:
      - prompt: "Where does the value passed to `yield` inside a `@contextmanager` function go?"
        choices:
          - id: a
            text: "To the variable after `as` in the `with` block."
          - id: b
            text: "To the `exc_type` argument of `__exit__`."
          - id: c
            text: "To the return value of the entire `with` block."
          - id: d
            text: "Nowhere: `yield` in such a generator cannot send a value out."
        correct: [a]
        explanation: "`yield value` sends `value` outward - it becomes what the variable after `as` receives, like a return from `__enter__`."
      - prompt: "Why wrap code after `yield` in `try/finally` in `@contextmanager`?"
        choices:
          - id: a
            text: "So release happens even when an exception fires in the block body."
          - id: b
            text: "So the context manager can be reused."
          - id: c
            text: "So the value from `yield` is not lost."
          - id: d
            text: "It is syntax requirement: without `try/finally` the decorator will not apply."
        correct: [a]
        explanation: "An exception in the `with` body flies back to the `yield` point. Without `finally`, release code after `yield` is skipped and the resource leaks."

  - id: contextlib-timer-001
    concept: contextlib
    type: predict-output
    difficulty: 2
    prompt: "What does this program print?"
    snippet: |
      from contextlib import contextmanager

      @contextmanager
      def section(label):
          print(f"enter {label}")
          yield
          print(f"exit {label}")

      with section("A"):
          print("body")
    expected:
      kind: stdout
      value: "enter A\nbody\nexit A"
    hints:
      - "Code before `yield` is entry, after `yield` is exit. The block body runs while the generator is paused at `yield`."
      - "Print order: before `yield`, `with` body, after `yield`."
    variants:
      - snippet: |
          from contextlib import contextmanager

          @contextmanager
          def tag(name):
              print(f"<{name}>")
              yield
              print(f"</{name}>")

          with tag("b"):
              print("text")
        expected:
          kind: stdout
          value: "<b>\ntext\n</b>"
      - snippet: |
          from contextlib import contextmanager

          @contextmanager
          def handle():
              print("opened")
              yield "resource"
              print("closed")

          with handle() as r:
              print(r)
        expected:
          kind: stdout
          value: "opened\nresource\nclosed"

  - id: contextlib-suppress-001
    concept: contextlib
    type: predict-output
    difficulty: 2
    prompt: "What does this program print?"
    snippet: |
      from contextlib import suppress

      data = {"a": 1}

      with suppress(KeyError):
          print(data["a"])
          print(data["b"])
          print("will not run")

      print("after block")
    expected:
      kind: stdout
      value: "1\nafter block"
    hints:
      - "`suppress(KeyError)` silences `KeyError` on block exit. What happens to the rest of the block once the exception is raised?"
      - "After the error the remainder of the block is skipped entirely - `suppress` does not resume from the failure point."
    variants:
      - snippet: |
          from contextlib import suppress

          values = [10, 20]

          with suppress(IndexError):
              print(values[0])
              print(values[5])
              print("skipped")

          print("next")
        expected:
          kind: stdout
          value: "10\nnext"
      - snippet: |
          from contextlib import suppress

          with suppress(ZeroDivisionError):
              print(8 // 2)
              print(1 // 0)

          print("end")
        expected:
          kind: stdout
          value: "4\nend"

  - id: contextlib-suppress-wrong-type-001
    concept: contextlib
    type: predict-output
    difficulty: 3
    prompt: "What does this program print?"
    snippet: |
      from contextlib import suppress

      data = {"a": 1}

      try:
          with suppress(IndexError):
              print(data["missing"])
      except KeyError:
          print("KeyError not suppressed")
    expected:
      kind: stdout
      value: "KeyError not suppressed"
    hints:
      - "`suppress` silences only listed types. What exception type does dict access to a missing key raise?"
      - "The error type (`KeyError`) does not match what `suppress` names (`IndexError`), so the exception escapes the block."

  - id: contextlib-blanks-001
    concept: contextlib
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete a generator-based context manager that releases the resource on any block outcome."
    template: |
      from contextlib import {{decorator}}

      @{{decorator}}
      def opened(path):
          f = open(path)
          try:
              {{kw}} f
          finally:
              f.close()
    blanks:
      decorator:
        accept: ["contextmanager"]
      kw:
        accept: ["yield"]
    variants:
      - prompt: "Complete the call that suppresses FileNotFoundError when deleting a file."
        template: |
          from contextlib import suppress
          import os

          with {{call}}(FileNotFoundError):
              os.remove("temp.txt")
        blanks:
          call:
            accept: ["suppress"]
      - prompt: "Complete registering an opened file on ExitStack so it closes on exit."
        template: |
          from contextlib import ExitStack

          with ExitStack() as stack:
              f = stack.{{method}}(open("a.txt"))
        blanks:
          method:
            accept: ["enter_context"]

  - id: contextlib-exitstack-001
    concept: contextlib
    type: python-function
    difficulty: 4
    prompt: "Complete function `collect(items)`: for each element in `items` enter context manager `Slot(item, log)` through one `ExitStack`, where `Slot.__enter__` appends `f\"open {item}\"` to `log` and `__exit__` appends `f\"close {item}\"`. Return `log` after leaving `with`. Items open in order and close in reverse."
    starter: |
      from contextlib import ExitStack

      class Slot:
          def __init__(self, name, log):
              ...
          def __enter__(self):
              ...
          def __exit__(self, exc_type, exc, tb):
              ...

      def collect(items):
          log = []
          with ExitStack() as stack:
              for item in items:
                  stack.enter_context(Slot(item, log))
          return log
    cases:
      - call: "collect(['a', 'b'])"
        expect: ["open a", "open b", "close b", "close a"]
      - call: "collect(['x'])"
        expect: ["open x", "close x"]
      - call: "collect([])"
        expect: []
    hints:
      - "`ExitStack` closes registered contexts in reverse acquisition order. Where does `close` order in the log come from?"
      - "`Slot` must remember its name and the shared list to append on entry and exit."
      - "Save `name` and `log` in `__init__`; in `__enter__` append `f\"open {self.name}\"`, in `__exit__` append `f\"close {self.name}\"` and return `False`."
    solution: |
      from contextlib import ExitStack

      class Slot:
          def __init__(self, name, log):
              self.name = name
              self.log = log
          def __enter__(self):
              self.log.append(f"open {self.name}")
              return self
          def __exit__(self, exc_type, exc, tb):
              self.log.append(f"close {self.name}")
              return False

      def collect(items):
          log = []
          with ExitStack() as stack:
              for item in items:
                  stack.enter_context(Slot(item, log))
          return log
