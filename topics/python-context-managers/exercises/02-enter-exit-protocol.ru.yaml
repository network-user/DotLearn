exercises:
  - id: protocol-two-methods-001
    concept: enter-exit-protocol
    type: theory-quiz
    difficulty: 1
    prompt: "Какие два метода превращают обычный объект в контекст-менеджер?"
    choices:
      - id: a
        text: "`__enter__` и `__exit__`."
      - id: b
        text: "`__init__` и `__del__`."
      - id: c
        text: "`__open__` и `__close__`."
      - id: d
        text: "`__acquire__` и `__release__`."
    correct: [a]
    explanation: "Протокол контекст-менеджера - это пара `__enter__` (вход) и `__exit__` (выход). Именно их вызывает оператор `with`."
    variants:
      - prompt: "Что попадает в переменную после `as` в выражении `with cm as x`?"
        choices:
          - id: a
            text: "То, что вернул `cm.__enter__()`."
          - id: b
            text: "Сам объект `cm`, всегда и независимо от реализации."
          - id: c
            text: "Результат `cm.__exit__()`."
          - id: d
            text: "Всегда `None`."
        correct: [a]
        explanation: "После `as` лежит возвращённое значение `__enter__`. Для файла это сам файл, но в общем случае автор класса решает, что вернуть."
      - prompt: "Сколько аргументов всегда получает метод `__exit__` (помимо `self`)?"
        choices:
          - id: a
            text: "Три: тип исключения, само исключение и traceback."
          - id: b
            text: "Один: булево «была ли ошибка»."
          - id: c
            text: "Ни одного - он вызывается без аргументов."
          - id: d
            text: "Два: имя ресурса и код возврата."
        correct: [a]
        explanation: "`__exit__` всегда получает тройку `(exc_type, exc, tb)`. При нормальном завершении все три равны `None`."

  - id: protocol-as-value-001
    concept: enter-exit-protocol
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      class Greeter:
          def __enter__(self):
              print("вход")
              return "привет"

          def __exit__(self, exc_type, exc, tb):
              print("выход")
              return False

      with Greeter() as value:
          print(value)
    expected:
      kind: stdout
      value: "вход\nпривет\nвыход"
    hints:
      - "В `value` попадает не сам объект `Greeter`, а то, что вернул `__enter__`. Что он вернул?"
      - "Порядок: сначала `__enter__`, потом тело блока, потом `__exit__`. Печать идёт в этом же порядке."
    variants:
      - snippet: |
          class Greeter:
              def __enter__(self):
                  return self

              def __exit__(self, exc_type, exc, tb):
                  return False

          with Greeter() as value:
              print(value is None)
        expected:
          kind: stdout
          value: "False"
      - snippet: |
          class Silent:
              def __enter__(self):
                  pass

              def __exit__(self, exc_type, exc, tb):
                  return False

          with Silent() as value:
              print(value)
        expected:
          kind: stdout
          value: "None"

  - id: protocol-exit-args-001
    concept: enter-exit-protocol
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      class Watcher:
          def __enter__(self):
              return self

          def __exit__(self, exc_type, exc, tb):
              if exc_type is None:
                  print("успех")
              else:
                  print("ошибка:", exc_type.__name__)
              return False

      with Watcher():
          pass

      try:
          with Watcher():
              raise KeyError("k")
      except KeyError:
          print("снаружи")
    expected:
      kind: stdout
      value: "успех\nошибка: KeyError\nснаружи"
    hints:
      - "При нормальном завершении `exc_type` равен `None`; при исключении в нём оказывается класс ошибки. Какая ветка `if` сработает в каждом из двух блоков?"
      - "Во втором блоке `__exit__` отрабатывает раньше, чем исключение долетит до внешнего `except`."

  - id: protocol-blanks-001
    concept: enter-exit-protocol
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите минимальный контекст-менеджер, который возвращает себя на входе и не подавляет исключения на выходе."
    template: |
      class Resource:
          def __enter__(self):
              return {{ret}}

          def __exit__(self, exc_type, exc, tb):
              return {{suppress}}
    blanks:
      ret:
        accept: ["self"]
      suppress:
        accept: ["False"]
    variants:
      - prompt: "Допишите имена трёх аргументов `__exit__` в порядке, в каком их передаёт Python (тип, объект-исключение, traceback)."
        template: |
          class Resource:
              def __enter__(self):
                  return self

              def __exit__(self, {{a1}}, {{a2}}, {{a3}}):
                  return False
        blanks:
          a1:
            accept: ["exc_type", "extype", "et"]
            accept_regex: '^[A-Za-z_][A-Za-z0-9_]*$'
          a2:
            accept: ["exc", "exc_value", "value", "ev"]
            accept_regex: '^[A-Za-z_][A-Za-z0-9_]*$'
          a3:
            accept: ["tb", "traceback", "exc_tb"]
            accept_regex: '^[A-Za-z_][A-Za-z0-9_]*$'
      - prompt: "Допишите проверку: если исключения не было, какому значению равен `exc_type`?"
        template: |
          class Resource:
              def __enter__(self):
                  return self

              def __exit__(self, exc_type, exc, tb):
                  if exc_type is {{none}}:
                      print("успех")
                  return False
        blanks:
          none:
            accept: ["None"]

  - id: protocol-suppress-return-001
    concept: enter-exit-protocol
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      class Swallow:
          def __enter__(self):
              return self

          def __exit__(self, exc_type, exc, tb):
              return True

      with Swallow():
          raise ValueError("исчезну")
      print("продолжаем")
    expected:
      kind: stdout
      value: "продолжаем"
    hints:
      - "Судьбу исключения решает значение, которое вернул `__exit__`. Истинное значение означает «обработано»."
      - "`return True` подавляет исключение: блок завершится тихо, и программа дойдёт до строки после `with`."

  - id: protocol-suppress-cm-001
    concept: enter-exit-protocol
    type: python-function
    difficulty: 4
    prompt: "Допишите контекст-менеджер `Ignore`, который подавляет ровно один тип исключения (передаётся в конструктор) и пропускает остальные. Функция `safe(exc_type, raised)` входит в `with Ignore(exc_type)`, внутри блока возбуждает исключение класса `raised`, и возвращает строку `\"ok\"`, если до конца дошли, иначе пробрасывает исключение наружу."
    starter: |
      class Ignore:
          def __init__(self, exc_type):
              ...
          def __enter__(self):
              ...
          def __exit__(self, exc_type, exc, tb):
              ...

      def safe(exc_type, raised):
          with Ignore(exc_type):
              raise raised("boom")
          return "ok"
    cases:
      - call: "safe(ValueError, ValueError)"
        expect: "ok"
      - call: "safe(KeyError, KeyError)"
        expect: "ok"
    hints:
      - "Подавление исключения - это истинное значение из `__exit__`. Но подавить нужно не любое исключение, а только заданный тип."
      - "В `__exit__` сравните `exc_type` с тем типом, который вы сохранили в конструкторе. Учтите наследование типов исключений."
      - "Целевой тип сохраните в `__init__`. В `__exit__` проверка наследования делается через `issubclass`, и не забудьте про случай, когда исключения не было (`exc_type` равен `None`)."
    solution: |
      class Ignore:
          def __init__(self, exc_type):
              self.target = exc_type
          def __enter__(self):
              return self
          def __exit__(self, exc_type, exc, tb):
              return exc_type is not None and issubclass(exc_type, self.target)

      def safe(exc_type, raised):
          with Ignore(exc_type):
              raise raised("boom")
          return "ok"
