exercises:
  - id: contextlib-yield-split-001
    concept: contextlib
    type: theory-quiz
    difficulty: 1
    prompt: "Как `@contextmanager` делит функцию-генератор на вход и выход?"
    choices:
      - id: a
        text: "Код до `yield` играет роль `__enter__`, код после `yield` - роль `__exit__`."
      - id: b
        text: "Код до `yield` - это выход, код после - вход."
      - id: c
        text: "Вся функция целиком выполняется как `__enter__`, а `__exit__` пустой."
      - id: d
        text: "`yield` разбивает функцию на два отдельных контекст-менеджера."
    correct: [a]
    explanation: "Одна точка `yield` разрезает функцию: всё до неё - захват (`__enter__`), всё после - освобождение (`__exit__`). Значение из `yield` уходит в переменную после `as`."
    variants:
      - prompt: "Куда попадает значение, переданное в `yield` внутри функции с `@contextmanager`?"
        choices:
          - id: a
            text: "В переменную после `as` в блоке `with`."
          - id: b
            text: "В аргумент `exc_type` метода `__exit__`."
          - id: c
            text: "В возвращаемое значение всего блока `with`."
          - id: d
            text: "Никуда: `yield` в таком генераторе не может отдавать значение."
        correct: [a]
        explanation: "`yield value` отдаёт `value` наружу - оно становится тем, что получит переменная после `as`, ровно как возврат из `__enter__`."
      - prompt: "Зачем код после `yield` в `@contextmanager` оборачивают в `try/finally`?"
        choices:
          - id: a
            text: "Чтобы освобождение случилось даже при исключении в теле блока."
          - id: b
            text: "Чтобы контекст-менеджер можно было использовать повторно."
          - id: c
            text: "Чтобы значение из `yield` не потерялось."
          - id: d
            text: "Это требование синтаксиса: без `try/finally` декоратор не применится."
        correct: [a]
        explanation: "Исключение в теле `with` прилетает обратно в точку `yield`. Без `finally` код освобождения после `yield` будет пропущен, и ресурс утечёт."

  - id: contextlib-timer-001
    concept: contextlib
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      from contextlib import contextmanager

      @contextmanager
      def section(label):
          print(f"вход {label}")
          yield
          print(f"выход {label}")

      with section("A"):
          print("тело")
    expected:
      kind: stdout
      value: "вход A\nтело\nвыход A"
    hints:
      - "Код до `yield` - это вход, код после `yield` - выход. Тело блока выполняется в момент, когда генератор «замер» на `yield`."
      - "Печать идёт в порядке: до `yield`, тело `with`, после `yield`."
    variants:
      - snippet: |
          from contextlib import contextmanager

          @contextmanager
          def tag(name):
              print(f"<{name}>")
              yield
              print(f"</{name}>")

          with tag("b"):
              print("текст")
        expected:
          kind: stdout
          value: "<b>\nтекст\n</b>"
      - snippet: |
          from contextlib import contextmanager

          @contextmanager
          def handle():
              print("открыли")
              yield "ресурс"
              print("закрыли")

          with handle() as r:
              print(r)
        expected:
          kind: stdout
          value: "открыли\nресурс\nзакрыли"

  - id: contextlib-suppress-001
    concept: contextlib
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      from contextlib import suppress

      data = {"a": 1}

      with suppress(KeyError):
          print(data["a"])
          print(data["b"])
          print("не выполнится")

      print("после блока")
    expected:
      kind: stdout
      value: "1\nпосле блока"
    hints:
      - "`suppress(KeyError)` гасит `KeyError` на выходе из блока. Но что происходит с остальными строками блока, как только исключение возбуждено?"
      - "После ошибки оставшаяся часть блока пропускается целиком - `suppress` не возобновляет выполнение с места ошибки."
    variants:
      - snippet: |
          from contextlib import suppress

          values = [10, 20]

          with suppress(IndexError):
              print(values[0])
              print(values[5])
              print("пропущено")

          print("дальше")
        expected:
          kind: stdout
          value: "10\nдальше"
      - snippet: |
          from contextlib import suppress

          with suppress(ZeroDivisionError):
              print(8 // 2)
              print(1 // 0)

          print("конец")
        expected:
          kind: stdout
          value: "4\nконец"

  - id: contextlib-suppress-wrong-type-001
    concept: contextlib
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      from contextlib import suppress

      data = {"a": 1}

      try:
          with suppress(IndexError):
              print(data["missing"])
      except KeyError:
          print("KeyError не подавлен")
    expected:
      kind: stdout
      value: "KeyError не подавлен"
    hints:
      - "`suppress` гасит только перечисленные типы. Какой тип исключения возбуждает обращение к несуществующему ключу словаря?"
      - "Тип ошибки (`KeyError`) не совпадает с тем, что назван в `suppress` (`IndexError`), поэтому исключение проходит сквозь блок наружу."

  - id: contextlib-blanks-001
    concept: contextlib
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите контекст-менеджер на основе генератора, который освобождает ресурс при любом исходе блока."
    template: |
      from contextlib import {{decorator}}

      @{{decorator}}
      def opened(path):
          f = open(path)
          try:
              {{kw}} f
          finally:
              f.close()
    blanks:
      decorator:
        accept: ["contextmanager"]
      kw:
        accept: ["yield"]
    variants:
      - prompt: "Допишите вызов, который подавит `FileNotFoundError` при удалении файла."
        template: |
          from contextlib import suppress
          import os

          with {{call}}(FileNotFoundError):
              os.remove("temp.txt")
        blanks:
          call:
            accept: ["suppress"]
      - prompt: "Допишите регистрацию открытого файла в `ExitStack`, чтобы он закрылся на выходе."
        template: |
          from contextlib import ExitStack

          with ExitStack() as stack:
              f = stack.{{method}}(open("a.txt"))
        blanks:
          method:
            accept: ["enter_context"]

  - id: contextlib-exitstack-001
    concept: contextlib
    type: python-function
    difficulty: 4
    prompt: "Допишите функцию `collect(items)`: для каждого элемента `items` войдите в контекст-менеджер `Slot(item, log)` через один `ExitStack`, где `Slot.__enter__` дописывает в `log` строку `f\"open {item}\"`, а `__exit__` - `f\"close {item}\"`. Верните список `log` после выхода из `with`. Элементы открываются по порядку и закрываются в обратном."
    starter: |
      from contextlib import ExitStack

      class Slot:
          def __init__(self, name, log):
              ...
          def __enter__(self):
              ...
          def __exit__(self, exc_type, exc, tb):
              ...

      def collect(items):
          log = []
          with ExitStack() as stack:
              for item in items:
                  stack.enter_context(Slot(item, log))
          return log
    cases:
      - call: "collect(['a', 'b'])"
        expect: ["open a", "open b", "close b", "close a"]
      - call: "collect(['x'])"
        expect: ["open x", "close x"]
      - call: "collect([])"
        expect: []
    hints:
      - "`ExitStack` закрывает зарегистрированные контексты в обратном порядке захвата. Откуда возьмётся порядок `close` в логе?"
      - "`Slot` должен помнить своё имя и общий список, чтобы дописывать в него на входе и выходе."
      - "В `__init__` сохраните `name` и `log`; в `__enter__` допишите `f\"open {self.name}\"`, в `__exit__` - `f\"close {self.name}\"` и верните `False`."
    solution: |
      from contextlib import ExitStack

      class Slot:
          def __init__(self, name, log):
              self.name = name
              self.log = log
          def __enter__(self):
              self.log.append(f"open {self.name}")
              return self
          def __exit__(self, exc_type, exc, tb):
              self.log.append(f"close {self.name}")
              return False

      def collect(items):
          log = []
          with ExitStack() as stack:
              for item in items:
                  stack.enter_context(Slot(item, log))
          return log
