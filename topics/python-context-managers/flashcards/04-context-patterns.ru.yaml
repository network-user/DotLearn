conceptId: context-patterns
cards:
  - id: context-patterns-01
    front: "Какая общая форма объединяет паттерны блокировки, транзакции и подмены состояния?"
    back: "Симметрия захвата и отката: вход выполняет прямое действие, выход - парное обратное (release, commit/rollback, restore). Обратное действие нельзя пропустить, оно привязано к выходу из блока."
    tags: [patterns]
  - id: context-patterns-02
    front: "Почему with lock безопаснее ручного acquire/release?"
    back: "Между acquire и release может вылететь исключение, и release не выполнится - поток зависнет навсегда на захваченном lock. with lock гарантированно вызывает release() на выходе."
    tags: [lock, pitfalls]
  - id: context-patterns-03
    front: "Чем опасен захваченный и не отпущенный lock?"
    back: "Программа не падает, а тихо зависает: другой поток вечно ждёт освобождения. Это один из худших классов багов, и with его устраняет."
    tags: [lock]
  - id: context-patterns-04
    front: "Как __exit__ транзакции решает между commit и rollback?"
    back: "По аргументу exc_type. Если он None - блок отработал без ошибок, делаем commit. Если не None - внутри было исключение, делаем rollback к состоянию до begin()."
    tags: [transaction, exit]
  - id: context-patterns-05
    front: "Почему __exit__ транзакции возвращает False?"
    back: "Чтобы после отката исключение всё равно полетело дальше и причина ошибки дошла до вызывающего кода. Откатить транзакцию и спрятать причину - разные задачи."
    tags: [transaction, exceptions]
  - id: context-patterns-06
    front: "Как пишут временную подмену состояния с гарантированным восстановлением?"
    back: "Через @contextmanager: до yield запоминают старое значение и ставят новое, а в finally после yield возвращают сохранённое - при любом исходе блока, даже при исключении."
    tags: [patterns, contextmanager]
  - id: context-patterns-07
    front: "Какие готовые подмены состояния есть в стандартной библиотеке?"
    back: "contextlib.chdir временно меняет рабочую директорию, contextlib.redirect_stdout перенаправляет вывод, unittest.mock.patch подменяет атрибут на время теста. Изобретать их с нуля обычно не нужно."
    tags: [patterns]
  - id: context-patterns-08
    front: "Почему опасно захватывать ресурс в __init__, а не в __enter__?"
    back: "__exit__ срабатывает только на выходе из with. Если между созданием объекта и входом в блок произойдёт исключение, ресурс из __init__ останется открытым, а __exit__ его не вызовет."
    tags: [patterns, pitfalls]
  - id: context-patterns-09
    front: "В каком порядке освобождаются вложенные контексты, например with lock, Transaction(db)?"
    back: "В обратном порядке захвата: сначала завершится транзакция (commit или rollback), и только потом отпустится lock. Транзакцию нужно завершить, пока ресурс ещё защищён блокировкой."
    tags: [patterns]
  - id: context-patterns-10
    front: "Где должно жить восстановление состояния при временной подмене?"
    back: "В finally (или в __exit__). Без finally исключение в блоке оставит подменённое значение навсегда - восстановление обязано выполниться при любом исходе."
    tags: [patterns, pitfalls]
