conceptId: contextlib
cards:
  - id: contextlib-01
    front: "Что делает декоратор @contextmanager?"
    back: "Превращает функцию-генератор в контекст-менеджер. Код до yield играет роль __enter__ (захват), код после yield - роль __exit__ (освобождение)."
    tags: [contextmanager]
  - id: contextlib-02
    front: "Куда попадает значение, переданное в yield внутри @contextmanager?"
    back: "В переменную после as. Если yield идёт без значения, снаружи нечего получать, и as обычно опускают - важен сам эффект блока."
    tags: [contextmanager, yield]
  - id: contextlib-03
    front: "Зачем оборачивать yield в try/finally в @contextmanager?"
    back: "Чтобы освобождение случилось при любом исходе. Исключение из тела with прилетает обратно в точку yield, и без finally код после yield не выполнится - ресурс утечёт."
    tags: [contextmanager, pitfalls]
  - id: contextlib-04
    front: "Что делает contextlib.suppress?"
    back: "Подавляет только перечисленные типы исключений одной строкой. Любое другое исключение проходит сквозь suppress нетронутым - в отличие от голого except pass."
    tags: [suppress, exceptions]
  - id: contextlib-05
    front: "Продолжит ли suppress выполнение блока с места возникновения исключения?"
    back: "Нет. Как только возникло названное исключение, оставшаяся часть блока пропускается целиком; suppress просто гасит исключение на выходе из блока."
    tags: [suppress]
  - id: contextlib-06
    front: "Для чего нужен ExitStack?"
    back: "Для управления заранее неизвестным числом ресурсов. В него складывают контекст-менеджеры по одному через enter_context, и на выходе он закрывает их все в обратном порядке."
    tags: [exitstack, resources]
  - id: contextlib-07
    front: "Что делает stack.enter_context(cm)?"
    back: "Входит в контекст-менеджер cm, возвращает результат его __enter__ и регистрирует cm для гарантированного закрытия на выходе из ExitStack."
    tags: [exitstack]
  - id: contextlib-08
    front: "Можно ли повторно войти в объект, созданный @contextmanager?"
    back: "Нет, он одноразовый: это генератор, который отыгрывается до yield и доигрывает после. Повторный with на том же объекте упадёт - вызывайте функцию заново на каждый with."
    tags: [contextmanager, pitfalls]
  - id: contextlib-09
    front: "Зачем нужен contextlib.closing?"
    back: "Чтобы сделать контекст-менеджер из объекта, у которого есть только метод .close() и который сам не является контекст-менеджером. Это мост для библиотек, написанных до распространения протокола."
    tags: [closing, resources]
  - id: contextlib-10
    front: "Когда лучше обычный with a, b, а когда ExitStack?"
    back: "Если число ресурсов известно и невелико - читабельнее обычный with с запятыми. ExitStack нужен для динамического или условного набора ресурсов, выясняемого в рантайме."
    tags: [exitstack, pitfalls]
