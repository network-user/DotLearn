conceptId: the-with-statement
cards:
  - id: the-with-statement-01
    front: "Зачем нужен оператор with?"
    back: "Чтобы привязать освобождение ресурса к выходу из блока и гарантировать его при любом исходе - нормальном, через return или через исключение. Так ресурс не утечёт, даже если внутри блока упало исключение."
    tags: [with, resources]
  - id: the-with-statement-02
    front: "Каким конструкциям эквивалентен with под капотом?"
    back: "try/finally, встроенному в синтаксис языка. Захват выполняется на входе, освобождение - в аналоге finally, поэтому забыть finally физически невозможно."
    tags: [with]
  - id: the-with-statement-03
    front: "Что лежит в переменной после as в with X as f?"
    back: "Значение, которое вернул захват ресурса. Для файла это сам открытый файловый объект, но в общем случае захват может вернуть и другой объект, и None."
    tags: [with]
  - id: the-with-statement-04
    front: "В каком порядке освобождаются несколько ресурсов в одном with?"
    back: "В порядке, обратном захвату. Если захвачены src, затем dst, то на выходе сначала освобождается dst, потом src - как стопка тарелок."
    tags: [with, resources]
  - id: the-with-statement-05
    front: "Подавляет ли with исключения по умолчанию?"
    back: "Нет. По умолчанию with освобождает ресурс и пропускает исключение дальше нетронутым. Подавлять умеет только специально написанный контекст-менеджер."
    tags: [with, exceptions]
  - id: the-with-statement-06
    front: "Что произойдёт при обращении к файлу после выхода из его блока with?"
    back: "Возникнет ValueError: I/O operation on closed file, потому что после выхода из with файл уже закрыт. Всё нужное от ресурса делают внутри блока."
    tags: [with, pitfalls]
  - id: the-with-statement-07
    front: "Почему with надёжнее ручного close() в конце функции?"
    back: "Ручной close() пропускается при исключении между open и close, при раннем return и при break или continue в цикле. with закрывает все эти дыры, потому что освобождение пишет за вас язык."
    tags: [with, pitfalls]
  - id: the-with-statement-08
    front: "Только ли файлами управляет with?"
    back: "Нет. Файл - витринный пример. with управляет любым ресурсом с парой «захватить/освободить»: блокировками, соединениями, транзакциями БД, временными настройками."
    tags: [with, resources]
  - id: the-with-statement-09
    front: "Как перенести длинный список ресурсов в with на несколько строк?"
    back: "С Python 3.10 всё после with оборачивают в круглые скобки. До этого приходилось использовать обратный слеш или вложенные with."
    tags: [with]
