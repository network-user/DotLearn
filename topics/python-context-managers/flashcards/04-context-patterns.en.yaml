conceptId: context-patterns
cards:
  - id: context-patterns-01
    front: "What common shape unites lock, transaction, and state substitution patterns?"
    back: "Symmetry of acquire and rollback: entry does the forward action, exit the paired reverse (release, commit/rollback, restore). The reverse cannot be skipped because it is tied to leaving the block."
    tags: [patterns]
  - id: context-patterns-02
    front: "Why is with lock safer than manual acquire/release?"
    back: "An exception between acquire and release skips release and the thread hangs forever on a held lock. with lock guaranteed-calls release() on exit."
    tags: [lock, pitfalls]
  - id: context-patterns-03
    front: "Why is a lock that is acquired and never released dangerous?"
    back: "The program does not crash but hangs quietly while another thread waits forever. One of the worst bug classes, and with removes it."
    tags: [lock]
  - id: context-patterns-04
    front: "How does transaction __exit__ choose between commit and rollback?"
    back: "By exc_type. If it is None the block succeeded - commit. If not None there was an exception inside - rollback to the state before begin()."
    tags: [transaction, exit]
  - id: context-patterns-05
    front: "Why does transaction __exit__ return False?"
    back: "So after rollback the exception still propagates and the caller learns the error cause. Rolling back and hiding the cause are different tasks."
    tags: [transaction, exceptions]
  - id: context-patterns-06
    front: "How do you write temporary state substitution with guaranteed restoration?"
    back: "Via @contextmanager: before yield save the old value and set the new one; in finally after yield restore the saved value - on any block outcome, even on exception."
    tags: [patterns, contextmanager]
  - id: context-patterns-07
    front: "What ready-made state substitutions exist in the standard library?"
    back: "contextlib.chdir temporarily changes working directory, contextlib.redirect_stdout redirects output, unittest.mock.patch substitutes an attribute for tests. Reinventing them is usually unnecessary."
    tags: [patterns]
  - id: context-patterns-08
    front: "Why is acquiring a resource in __init__ instead of __enter__ dangerous?"
    back: "__exit__ runs only on leaving with. If an exception occurs between object creation and entering the block, the resource from __init__ stays open and __exit__ never runs."
    tags: [patterns, pitfalls]
  - id: context-patterns-09
    front: "In what order do nested contexts release, e.g. with lock, Transaction(db)?"
    back: "Reverse of acquisition: the transaction finishes first (commit or rollback), then the lock is released. Finish the transaction while the resource is still protected by the lock."
    tags: [patterns]
  - id: context-patterns-10
    front: "Where must state restoration live for temporary substitution?"
    back: "In finally (or __exit__). Without finally an exception in the block leaves the substituted value forever - restoration must run on any outcome."
    tags: [patterns, pitfalls]
