conceptId: enter-exit-protocol
cards:
  - id: enter-exit-protocol-01
    front: "What makes an object a context manager?"
    back: "Two methods with the right names - __enter__ and __exit__. The with statement calls __enter__ on block entry and __exit__ on exit."
    tags: [protocol]
  - id: enter-exit-protocol-02
    front: "What does __enter__ return and where does that value go?"
    back: "__enter__ performs acquire and returns the value that lands in the variable after as. With no return, as gets None."
    tags: [protocol, enter]
  - id: enter-exit-protocol-03
    front: "Is the context manager itself always stored after as?"
    back: "No. After as lies the result of __enter__, not the manager object. For files __enter__ returns the file, so it looks like as gives the same object, but that is the file implementation's choice."
    tags: [protocol, enter]
  - id: enter-exit-protocol-04
    front: "What three arguments does __exit__ receive?"
    back: "The triple (exc_type, exc, tb): exception type, exception object, and traceback. On normal completion all three are None."
    tags: [protocol, exit]
  - id: enter-exit-protocol-05
    front: "How does the value returned from __exit__ affect an exception?"
    back: "A true value (True) makes Python treat the exception as handled and suppress it - the block ends quietly. A false value (False, None, nothing) lets the exception propagate."
    tags: [protocol, exit, exceptions]
  - id: enter-exit-protocol-06
    front: "Why is returning True from __exit__ just in case dangerous?"
    back: "It suppresses all exceptions in the block, including unexpected ones, turning the manager into a black hole that silently eats errors. Default to False and suppress only a specific type deliberately."
    tags: [protocol, exit, pitfalls]
  - id: enter-exit-protocol-07
    front: "Where do acquire and release happen?"
    back: "Acquire in __enter__, release in __exit__. Swap them and the resource closes before you use it."
    tags: [protocol]
  - id: enter-exit-protocol-08
    front: "What happens with with cm as x if __enter__ does not return self?"
    back: "as gets None and x.do() inside the block raises AttributeError. If the object is needed in the body, return it explicitly from __enter__."
    tags: [protocol, pitfalls]
  - id: enter-exit-protocol-09
    front: "Where does the __exit__ argument triple come from?"
    back: "Exactly what sys.exc_info() returns: (exc_type, exc, tb). Python's exception system is structured that way and __exit__ receives it in the same form."
    tags: [protocol, exit]
  - id: enter-exit-protocol-10
    front: "What if __exit__ itself raises an exception?"
    back: "The new exception replaces the original and you lose the original error. Release code must be as reliable as possible and not fail itself."
    tags: [protocol, exit, pitfalls]
