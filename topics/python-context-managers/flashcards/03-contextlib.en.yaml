conceptId: contextlib
cards:
  - id: contextlib-01
    front: "What does the @contextmanager decorator do?"
    back: "Turns a generator function into a context manager. Code before yield is __enter__ (acquire), code after yield is __exit__ (release)."
    tags: [contextmanager]
  - id: contextlib-02
    front: "Where does the value passed to yield inside @contextmanager go?"
    back: "To the variable after as. If yield has no value, nothing useful is returned outside and as is usually omitted - the block effect matters."
    tags: [contextmanager, yield]
  - id: contextlib-03
    front: "Why wrap yield in try/finally in @contextmanager?"
    back: "So release happens on any outcome. An exception from the with body flies back to the yield point; without finally code after yield is skipped and the resource leaks."
    tags: [contextmanager, pitfalls]
  - id: contextlib-04
    front: "What does contextlib.suppress do?"
    back: "Suppresses only the listed exception types in one line. Any other exception passes through suppress untouched - unlike bare except pass."
    tags: [suppress, exceptions]
  - id: contextlib-05
    front: "Does suppress resume the block from where the exception occurred?"
    back: "No. Once the named exception fires, the rest of the block is skipped entirely; suppress only silences the exception on block exit."
    tags: [suppress]
  - id: contextlib-06
    front: "What is ExitStack for?"
    back: "Managing an unknown number of resources. Push context managers one at a time with enter_context; on exit it closes them all in reverse order."
    tags: [exitstack, resources]
  - id: contextlib-07
    front: "What does stack.enter_context(cm) do?"
    back: "Enters context manager cm, returns the result of its __enter__, and registers cm for guaranteed closing when ExitStack exits."
    tags: [exitstack]
  - id: contextlib-08
    front: "Can you enter an object created by @contextmanager more than once?"
    back: "No, it is one-shot: a generator that plays to yield and after. A second with on the same object fails - call the function fresh for each with."
    tags: [contextmanager, pitfalls]
  - id: contextlib-09
    front: "Why use contextlib.closing?"
    back: "To make a context manager from an object that only has .close() and is not itself a context manager. A bridge for libraries written before the protocol spread."
    tags: [closing, resources]
  - id: contextlib-10
    front: "When is plain with a, b better than ExitStack?"
    back: "When the resource count is known and small, comma with reads better. ExitStack is for dynamic or conditional sets discovered at runtime."
    tags: [exitstack, pitfalls]
