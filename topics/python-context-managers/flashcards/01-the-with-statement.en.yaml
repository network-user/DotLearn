conceptId: the-with-statement
cards:
  - id: the-with-statement-01
    front: "Why does the with statement exist?"
    back: "To tie resource release to leaving a block and guarantee it for any outcome - normal, return, or exception. The resource cannot leak even if an exception fires inside the block."
    tags: [with, resources]
  - id: the-with-statement-02
    front: "What is with equivalent to under the hood?"
    back: "try/finally built into the language syntax. Acquire on entry, release in the finally analogue, so you cannot forget finally."
    tags: [with]
  - id: the-with-statement-03
    front: "What is stored in the variable after as in with X as f?"
    back: "Whatever the resource acquire step returned. For a file that is the open file object, but in general acquire may return another object or None."
    tags: [with]
  - id: the-with-statement-04
    front: "In what order are several resources released in one with?"
    back: "Reverse of acquisition. If src is acquired then dst, on exit dst is released first, then src - like a stack of plates."
    tags: [with, resources]
  - id: the-with-statement-05
    front: "Does with suppress exceptions by default?"
    back: "No. By default with releases the resource and propagates the exception unchanged. Only a specially written context manager can suppress."
    tags: [with, exceptions]
  - id: the-with-statement-06
    front: "What happens if you use a file after its with block?"
    back: "ValueError: I/O operation on closed file, because after leaving with the file is closed. Do everything you need with the resource inside the block."
    tags: [with, pitfalls]
  - id: the-with-statement-07
    front: "Why is with more reliable than manual close() at the end of a function?"
    back: "Manual close() is skipped on exceptions between open and close, early return, and break or continue in a loop. with closes those holes because the language writes release for you."
    tags: [with, pitfalls]
  - id: the-with-statement-08
    front: "Does with manage only files?"
    back: "No. A file is the showcase example. with manages any resource with an acquire/release pair: locks, connections, DB transactions, temporary settings."
    tags: [with, resources]
  - id: the-with-statement-09
    front: "How do you wrap a long resource list in with across several lines?"
    back: "From Python 3.10 wrap everything after with in parentheses. Before that you used a backslash or nested with statements."
    tags: [with]
