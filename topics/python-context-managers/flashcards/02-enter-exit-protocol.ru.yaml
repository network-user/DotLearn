conceptId: enter-exit-protocol
cards:
  - id: enter-exit-protocol-01
    front: "Что делает объект контекст-менеджером?"
    back: "Наличие двух методов с правильными именами - __enter__ и __exit__. Их вызывает оператор with: __enter__ на входе в блок, __exit__ на выходе."
    tags: [protocol]
  - id: enter-exit-protocol-02
    front: "Что возвращает __enter__ и куда попадает это значение?"
    back: "__enter__ выполняет захват и возвращает значение, которое попадёт в переменную после as. Если return нет, после as окажется None."
    tags: [protocol, enter]
  - id: enter-exit-protocol-03
    front: "Лежит ли после as всегда сам контекст-менеджер?"
    back: "Нет. После as лежит результат __enter__, а не сам объект. У файла __enter__ возвращает сам файл, поэтому там кажется, что as даёт тот же объект, но это частное решение реализации файла."
    tags: [protocol, enter]
  - id: enter-exit-protocol-04
    front: "Какие три аргумента получает __exit__?"
    back: "Тройку (exc_type, exc, tb): тип исключения, сам объект-исключение и traceback. При нормальном завершении блока все три равны None."
    tags: [protocol, exit]
  - id: enter-exit-protocol-05
    front: "Как значение, возвращённое из __exit__, влияет на исключение?"
    back: "Истинное значение (True) заставляет Python считать исключение обработанным и подавить его - блок завершается тихо. Ложное значение (False, None, ничего) пропускает исключение дальше."
    tags: [protocol, exit, exceptions]
  - id: enter-exit-protocol-06
    front: "Почему опасно возвращать True из __exit__ на всякий случай?"
    back: "Это подавляет все исключения в блоке, включая неожиданные, превращая контекст-менеджер в чёрную дыру, молча съедающую ошибки. По умолчанию возвращайте False и подавляйте лишь конкретный тип осознанно."
    tags: [protocol, exit, pitfalls]
  - id: enter-exit-protocol-07
    front: "Где выполняется захват, а где освобождение ресурса?"
    back: "Захват - в __enter__, освобождение - в __exit__. Если перепутать, ресурс закроется до того, как вы им воспользуетесь."
    tags: [protocol]
  - id: enter-exit-protocol-08
    front: "Что будет с with cm as x, если __enter__ не содержит return self?"
    back: "После as окажется None, и вызов x.do() внутри блока упадёт с AttributeError. Если объект нужен в теле, возвращайте его из __enter__ явно."
    tags: [protocol, pitfalls]
  - id: enter-exit-protocol-09
    front: "Откуда берётся тройка аргументов __exit__ и почему именно она?"
    back: "Это ровно то, что возвращает sys.exc_info(): (exc_type, exc, tb). Так исторически устроена система исключений в Python, и __exit__ получает её в том же виде."
    tags: [protocol, exit]
  - id: enter-exit-protocol-10
    front: "Что произойдёт, если __exit__ сам возбудит исключение?"
    back: "Новое исключение заменит исходное, и про исходную ошибку вы не узнаете. Поэтому код освобождения должен быть максимально надёжным и сам не падать."
    tags: [protocol, exit, pitfalls]
