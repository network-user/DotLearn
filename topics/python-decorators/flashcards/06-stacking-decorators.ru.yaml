conceptId: stacking-decorators
cards:
  - id: stacking-decorators-01
    front: "В каком порядке применяются несколько декораторов над одной функцией?"
    back: "Снизу вверх: ближайший к def применяется первым. @outer над @inner означает func = outer(inner(func))."
    tags: [order]
  - id: stacking-decorators-02
    front: "Какой декоратор становится самым внешним слоем?"
    back: "Самый верхний. @outer над @inner: outer снаружи, inner ближе к функции, исходная функция в сердцевине - получается луковица обёрток."
    tags: [order]
  - id: stacking-decorators-03
    front: "В каком порядке выполняется код декораторов при вызове?"
    back: "Снаружи внутрь: вход идёт через самый внешний слой и проваливается к функции, затем результат всплывает обратно - как стек вызовов (LIFO)."
    tags: [execution]
  - id: stacking-decorators-04
    front: "Почему вывод стека симметричен: 'до' сверху вниз, 'после' снизу вверх?"
    back: "Код 'до' выполняется на спуске к функции (внешний слой первым), код 'после' - на подъёме обратно (внутренний слой первым). Это LIFO-разворачивание стека."
    tags: [execution]
  - id: stacking-decorators-05
    front: "Что напечатает @bold над @italic для функции, возвращающей 'привет'?"
    back: "<b><i>привет</i></b>. Верхний @bold - внешний слой, его теги снаружи; @italic ближе к функции, его теги внутри."
    tags: [example]
  - id: stacking-decorators-06
    front: "Почему порядок @log и @cache меняет логику, а не только вид?"
    back: "Если cache снаружи, попадание в кэш вернёт результат досрочно, и log не увидит обслуженные вызовы. log над cache логирует все обращения."
    tags: [semantics]
  - id: stacking-decorators-07
    front: "Куда в стеке ставить сквозные декораторы (лог, метрики, права)?"
    back: "Выше обрывающих (кэш, фильтр), которые могут вернуть результат досрочно. Тогда сквозной декоратор увидит каждый вызов."
    tags: [semantics]
  - id: stacking-decorators-08
    front: "Когда выполняется код самих декораторов (вне обёрток)?"
    back: "В момент определения функции, снизу вверх. Если decorator что-то печатает при навешивании, это видно при импорте, ещё до первого вызова, в порядке снизу вверх."
    tags: [timing]
  - id: stacking-decorators-09
    front: "Верхний декоратор выполняется первым или последним при вызове?"
    back: "Применяется последним (становится внешним слоем), но при вызове выполняется первым - вход идёт снаружи внутрь. Эти два направления легко спутать."
    tags: [pitfalls]
  - id: stacking-decorators-10
    front: "Почему functools.wraps особенно важен в стеке декораторов?"
    back: "Без него все кадры в трейсбэке называются 'wrapper', и понять, чей это слой, нельзя. wraps сохраняет имена, делая вложенные обёртки читаемыми в трейсбэке."
    tags: [wraps]
