conceptId: closures
cards:
  - id: closures-01
    front: "What is a closure?"
    back: "An inner function together with captured variables from the outer scope. It remembers where it was created and keeps seeing those variables after the outer function returns."
    tags: [basics]
  - id: closures-02
    front: "What is a free variable?"
    back: "A variable the inner function uses but does not declare locally - it comes from an enclosing scope. Free variable names live in func.__code__.co_freevars."
    tags: [basics]
  - id: closures-03
    front: "Does a closure capture a variable or its value?"
    back: "The variable (a reference to the cell), not a snapshot of its value. The name is resolved at call time (late binding), so the closure sees the current value even if it changed after the closure was created."
    tags: [late-binding]
  - id: closures-04
    front: "Why does [lambda: i for i in range(3)] give [2, 2, 2]?"
    back: "All three lambdas capture the same loop variable i. By call time the loop finished and i equals 2. That is late binding."
    tags: [pitfalls]
  - id: closures-05
    front: "How do you fix capturing a loop variable?"
    back: "Take a snapshot with a default parameter: lambda i=i: i. Default argument values are computed when the function is created, so the current i is fixed in the parameter."
    tags: [pitfalls]
  - id: closures-06
    front: "Why is the nonlocal statement needed?"
    back: "To assign to a free variable from the outer function instead of creating a new local. Without nonlocal, count += 1 makes count local and fails with UnboundLocalError."
    tags: [nonlocal]
  - id: closures-07
    front: "When is nonlocal not needed?"
    back: "When the inner function only reads the free variable and does not assign to it. For read-only use (as in make_adder), nonlocal is unnecessary."
    tags: [nonlocal]
  - id: closures-08
    front: "Do two closures from the same factory share state?"
    back: "No. Each factory call creates a new function with its own captured cell. make_counter() and make_counter() are two independent counters."
    tags: [state]
  - id: closures-09
    front: "Why is a closure better than global for storing state?"
    back: "The captured cell is tied to a specific function and is not accessible by name from outside. Two closures do not conflict, and outside code cannot reset their state, unlike a global variable."
    tags: [concept]
  - id: closures-10
    front: "How are closures related to decorators?"
    back: "The wrapping function holds the wrapped function (or accumulated state - cache, call count) in a free variable and changes it via nonlocal. A decorator is a closure over the wrapped function."
    tags: [decorators]
