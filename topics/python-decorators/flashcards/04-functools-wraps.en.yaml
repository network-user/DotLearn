conceptId: functools-wraps
cards:
  - id: functools-wraps-01
    front: "What happens to a function's __name__ after naive decoration?"
    back: "The name points at wrapper, so __name__ becomes 'wrapper' and __doc__ becomes None. The original metadata is hidden under the wrapper."
    tags: [problem]
  - id: functools-wraps-02
    front: "Why is losing __name__ not just cosmetic?"
    back: "Logs that print func.__name__ will write 'wrapper' for every decorated function; help() shows an empty wrapper; frameworks that rely on the name break on duplicate wrappers."
    tags: [problem]
  - id: functools-wraps-03
    front: "What does functools.wraps do?"
    back: "Copies __name__, __doc__, __module__, __qualname__, annotations from the original onto the wrapper, updates __dict__, and sets __wrapped__. From outside the function looks like the original again."
    tags: [solution]
  - id: functools-wraps-04
    front: "Which function gets @functools.wraps(func)?"
    back: "The wrapper; func (the original) is passed as the metadata source. Swap them and you copy metadata the wrong way."
    tags: [usage]
  - id: functools-wraps-05
    front: "Why write wraps(func) with parentheses, not just @functools.wraps?"
    back: "wraps(func) returns a decorator that is then applied to wrapper. It is a decorator factory: it needs the wrapped function, so (func) is required."
    tags: [usage]
  - id: functools-wraps-06
    front: "What is the __wrapped__ attribute?"
    back: "A link to the original function under the wrapper, set by functools.wraps. Through add.__wrapped__ you can fetch and call the original, bypassing the decorator."
    tags: [wrapped]
  - id: functools-wraps-07
    front: "Why does inspect.signature after wraps show real parameters, not (*args, **kwargs)?"
    back: "inspect.signature follows __wrapped__ to the original by default. wraps set __wrapped__, so signature sees the real function parameters."
    tags: [introspection]
  - id: functools-wraps-08
    front: "How does functools.wraps differ from functools.update_wrapper?"
    back: "wraps(func) is a convenient decorator wrapper over update_wrapper(wrapper, func). wraps is used as @ inside another decorator; update_wrapper is called directly if the wrapper is not built with def."
    tags: [internals]
  - id: functools-wraps-09
    front: "Which attributes does wraps copy by default?"
    back: "Those listed in functools.WRAPPER_ASSIGNMENTS: __module__, __name__, __qualname__, __annotations__, __doc__. It also updates __dict__ and sets __wrapped__."
    tags: [internals]
  - id: functools-wraps-10
    front: "Where do you add wraps in a decorator?"
    back: "Directly above the inner wrapper definition: @functools.wraps(func) before def wrapper(...). Then copying runs when the wrapper is created."
    tags: [usage]
