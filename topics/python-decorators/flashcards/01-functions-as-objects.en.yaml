conceptId: functions-as-objects
cards:
  - id: functions-as-objects-01
    front: "What does def do at the object level?"
    back: "It creates a function object in memory and binds the name after def to it. The name is a label on the object, like x = 5, except the object type is function."
    tags: [basics]
  - id: functions-as-objects-02
    front: "How does greet differ from greet()?"
    back: "greet is the function object itself - you can assign it, pass it, or return it. greet() is a command to run the object and substitute its result. Confusing them is a common source of bugs."
    tags: [basics]
  - id: functions-as-objects-03
    front: "What does f = greet do?"
    back: "It does not call or copy the function - it attaches a second label to the same object. f() does the same as greet(), and greet is f is true."
    tags: [identity]
  - id: functions-as-objects-04
    front: "Where do a function's __name__ and __doc__ live?"
    back: "On the function object itself. So after f = area, f.__name__ stays 'area': the label changed, not the object."
    tags: [attributes]
  - id: functions-as-objects-05
    front: "Why is the function passed without parentheses in map(shout, words)?"
    back: "map needs the function object itself so it can call it for each element. shout() would call the function immediately and pass its result, not the rule."
    tags: [higher-order]
  - id: functions-as-objects-06
    front: "How do you replace an if/elif ladder with function selection?"
    back: "Store functions in a dictionary under string keys (a dispatcher) and fetch the right one: operations[op](a, b). Selection becomes a dictionary lookup."
    tags: [dispatch]
  - id: functions-as-objects-07
    front: "How do you return a function from another function?"
    back: "Define an inner function with def in the outer body and return it by name without parentheses: return inner. return inner() would return the result, not the object."
    tags: [returning]
  - id: functions-as-objects-08
    front: "What ends up in the list after [greet()] instead of [greet]?"
    back: "The result of calling greet, not the function itself. The parentheses ran the function on the spot. Later handlers[0]() raises TypeError if the result is not callable."
    tags: [pitfalls]
  - id: functions-as-objects-09
    front: "What does it mean that functions are first-class objects?"
    back: "A function can be assigned to a name, passed as an argument, returned from a function, and stored in data structures - the same rights as numbers and strings."
    tags: [concept]
  - id: functions-as-objects-10
    front: "What does callable(x) check?"
    back: "Whether x can be called with parentheses. callable(print) is True, callable(42) is False. Functions, lambdas, methods, and classes are callable."
    tags: [callable]
