conceptId: functions-as-objects
cards:
  - id: functions-as-objects-01
    front: "Что делает инструкция def на уровне объектов?"
    back: "Создаёт объект-функцию в памяти и привязывает к нему имя после def. Имя - это ярлык на объект, как при x = 5, только тип объекта - функция."
    tags: [basics]
  - id: functions-as-objects-02
    front: "Чем отличается greet от greet()?"
    back: "greet - сам объект-функция, его можно присвоить, передать, вернуть. greet() - команда выполнить объект и подставить результат. Перепутать их - частый источник ошибок."
    tags: [basics]
  - id: functions-as-objects-03
    front: "Что делает f = greet?"
    back: "Не вызывает и не копирует функцию, а вешает на тот же объект второй ярлык. f() делает то же, что greet(), и greet is f истинно."
    tags: [identity]
  - id: functions-as-objects-04
    front: "Где хранятся __name__ и __doc__ функции?"
    back: "На самом объекте-функции. Поэтому после f = area атрибут f.__name__ остаётся 'area': сменился ярлык, а не объект."
    tags: [attributes]
  - id: functions-as-objects-05
    front: "Почему в map(shout, words) функция передаётся без скобок?"
    back: "map должен получить сам объект-функцию, чтобы вызвать её для каждого элемента. shout() вызвало бы функцию сразу и передало бы её результат, а не правило."
    tags: [higher-order]
  - id: functions-as-objects-06
    front: "Как заменить лестницу if/elif выбором функции?"
    back: "Сложить функции в словарь под строковыми ключами (диспетчер) и доставать нужную по ключу: operations[op](a, b). Выбор сводится к поиску по словарю."
    tags: [dispatch]
  - id: functions-as-objects-07
    front: "Как вернуть функцию из функции?"
    back: "Определить внутреннюю функцию через def в теле внешней и вернуть её по имени без скобок: return inner. return inner() вернул бы результат, а не объект."
    tags: [returning]
  - id: functions-as-objects-08
    front: "Что окажется в списке после [greet()] вместо [greet]?"
    back: "Результат вызова greet, а не сама функция. Скобки выполнили функцию на месте. Потом handlers[0]() упадёт с TypeError, если результат - не вызываемый объект."
    tags: [pitfalls]
  - id: functions-as-objects-09
    front: "Что означает «функции - объекты первого класса»?"
    back: "Функцию можно присвоить имени, передать аргументом, вернуть из функции и хранить в структурах данных - те же права, что у чисел и строк."
    tags: [concept]
  - id: functions-as-objects-10
    front: "Что проверяет callable(x)?"
    back: "Можно ли вызвать x со скобками. callable(print) - True, callable(42) - False. Функции, лямбды, методы и классы вызываемы."
    tags: [callable]
