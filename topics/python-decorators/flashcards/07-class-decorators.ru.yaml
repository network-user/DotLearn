conceptId: class-decorators
cards:
  - id: class-decorators-01
    front: "Что означает @register над class User: ...?"
    back: "User = register(User). @ над классом работает как над функцией: декоратор получает объект-класс, может его дополнить и должен вернуть класс (обычно тот же)."
    tags: [class-as-target]
  - id: class-decorators-02
    front: "Что обычно делает декоратор класса с полученным cls?"
    back: "Чаще всего мутирует исходный класс - добавляет метод, пишет его в реестр, читает аннотации - и возвращает тот же класс, а не оборачивает в другой объект."
    tags: [class-as-target]
  - id: class-decorators-03
    front: "Как собрать реестр классов одной строкой?"
    back: "Декоратор @plugin записывает класс в общий словарь: PLUGINS[cls.__name__] = cls; return cls. Каждый класс регистрируется сам в момент определения, без ручного списка."
    tags: [registry]
  - id: class-decorators-04
    front: "Что нужно классу, чтобы быть декоратором?"
    back: "Метод __init__(self, func), сохраняющий функцию, и метод __call__, делающий экземпляр вызываемым и работающий как обёртка. @C означает name = C(func)."
    tags: [class-as-decorator]
  - id: class-decorators-05
    front: "Где класс-декоратор хранит состояние?"
    back: "В полях экземпляра (self.count, self.cache), а не в замыкании. Бонус: состояние доступно снаружи как атрибут, например hello.count."
    tags: [state]
  - id: class-decorators-06
    front: "Когда удобнее класс-декоратор, а когда функция?"
    back: "Функция - для простых обёрток (состояние в замыкании, скрыто). Класс - когда состояния много, оно сложное или должно быть наблюдаемо снаружи; легко добавить методы вроде reset."
    tags: [choice]
  - id: class-decorators-07
    front: "Как устроен класс-декоратор с аргументами, например @Repeat(3)?"
    back: "Repeat(3) создаёт экземпляр, и уже он применяется к функции. Роли смещаются: __call__(self, func) принимает функцию (средний уровень), а обёртку возвращает __call__."
    tags: [class-factory]
  - id: class-decorators-08
    front: "Что будет, если декоратор класса не вернёт cls?"
    back: "Имя класса станет None - функция без return возвращает None. Декоратор класса, который дополняет cls, обязан сделать return cls."
    tags: [pitfalls]
  - id: class-decorators-09
    front: "Что теряется, когда функцию декорируют классом (@CountCalls)?"
    back: "Имя заменяется экземпляром, у которого нет __name__ исходной функции. Если метаданные важны, копируйте их через functools.update_wrapper(self, func) в __init__."
    tags: [pitfalls]
  - id: class-decorators-10
    front: "Почему @dataclass - пример декоратора класса?"
    back: "Он получает класс, читает аннотации полей, генерирует __init__, __repr__, __eq__ и возвращает тот же класс. Декоратор класса может сгенерировать целый набор методов из объявленного в теле."
    tags: [dataclass]
