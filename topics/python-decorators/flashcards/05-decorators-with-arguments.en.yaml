conceptId: decorators-with-arguments
cards:
  - id: decorators-with-arguments-01
    front: "What is @repeat(3) above a function equivalent to?"
    back: "func = repeat(3)(func). The factory repeat(3) is called first and returns a decorator, then that decorator is applied to the function."
    tags: [syntax]
  - id: decorators-with-arguments-02
    front: "How many def levels does a parameterized decorator have, and what does each accept?"
    back: "Three. The factory accepts the decorator argument, the middle function (decorator) accepts the wrapped function, the inner one (wrapper) accepts call arguments."
    tags: [structure]
  - id: decorators-with-arguments-03
    front: "Where does the inner wrapper get the decorator argument and the function from?"
    back: "From closures: the argument is captured by the outer factory, the function by the middle level. The inner wrapper sees both free variables."
    tags: [closure]
  - id: decorators-with-arguments-04
    front: "What does each level of a decorator factory return?"
    back: "The factory returns decorator, decorator returns wrapper, wrapper returns the result of calling func. Returning from the wrong level breaks the unfolding."
    tags: [structure]
  - id: decorators-with-arguments-05
    front: "Do you call a decorator factory with or without parentheses?"
    back: "Always with parentheses: @repeat(2), even when the argument is empty in meaning. Parentheses call the factory and produce the real decorator."
    tags: [syntax]
  - id: decorators-with-arguments-06
    front: "What happens if you apply a factory without parentheses: @repeat instead of @repeat(3)?"
    back: "repeat receives the function itself as parameter n and returns a decorator expecting a function. Usually this fails with TypeError deeper in the code. Always call the factory with parentheses."
    tags: [pitfalls]
  - id: decorators-with-arguments-07
    front: "When is the factory argument captured?"
    back: "Once, at @repeat(3) - when the function is defined. Later changes to the source variable do not affect the decorator: the value is already fixed in the cell."
    tags: [capture]
  - id: decorators-with-arguments-08
    front: "Where do you put functools.wraps in a decorator with arguments?"
    back: "On the innermost wrapper. There are more levels, but there is still only one wrapper, and it is the one that loses metadata."
    tags: [wraps]
  - id: decorators-with-arguments-09
    front: "Why exactly three levels, not two?"
    back: "The number of levels equals the number of argument batches plus one for the call. A plain decorator: function + call = two. With decorator args: decorator arg + function + call = three."
    tags: [concept]
  - id: decorators-with-arguments-10
    front: "How does @log differ from @retry(3) in form?"
    back: "@log is a plain decorator, written without parentheses (func = log(func)). @retry(3) is a factory call with parentheses (func = retry(3)(func)). Confusing the forms is a common mistake."
    tags: [syntax]
