conceptId: stacking-decorators
cards:
  - id: stacking-decorators-01
    front: "In what order are multiple decorators above one function applied?"
    back: "Bottom to top: the one closest to def is applied first. @outer above @inner means func = outer(inner(func))."
    tags: [order]
  - id: stacking-decorators-02
    front: "Which decorator becomes the outermost layer?"
    back: "The top one. @outer above @inner: outer is outside, inner is closer to the function, the original function is in the core - an onion of wrappers."
    tags: [order]
  - id: stacking-decorators-03
    front: "In what order do decorators run when the function is called?"
    back: "Outside in: entry goes through the outermost layer and sinks toward the function, then the result bubbles back - like a call stack (LIFO)."
    tags: [execution]
  - id: stacking-decorators-04
    front: "Why is stack output symmetric: before top to bottom, after bottom to top?"
    back: "Before code runs on the way down to the function (outer layer first); after code runs on the way back up (inner layer first). That is LIFO stack unwinding."
    tags: [execution]
  - id: stacking-decorators-05
    front: "What does @bold above @italic print for a function returning 'привет'?"
    back: "<b><i>привет</i></b>. Top @bold is the outer layer, its tags outside; @italic is closer to the function, its tags inside."
    tags: [example]
  - id: stacking-decorators-06
    front: "Why does the order of @log and @cache change logic, not just appearance?"
    back: "If cache is outside, a cache hit returns early and log never sees those calls. log above cache logs every access."
    tags: [semantics]
  - id: stacking-decorators-07
    front: "Where do you put cross-cutting decorators (log, metrics, auth) in the stack?"
    back: "Above short-circuiting ones (cache, filter) that may return early. Then the cross-cutting decorator sees every call."
    tags: [semantics]
  - id: stacking-decorators-08
    front: "When does decorator code itself run (outside the wrappers)?"
    back: "At function definition time, bottom to top. If decorator prints while attaching, that shows on import, before the first call, in bottom-to-top order."
    tags: [timing]
  - id: stacking-decorators-09
    front: "Does the top decorator run first or last on a call?"
    back: "It is applied last (becomes the outer layer) but runs first on a call - entry goes outside in. Those two directions are easy to confuse."
    tags: [pitfalls]
  - id: stacking-decorators-10
    front: "Why is functools.wraps especially important in a decorator stack?"
    back: "Without it every traceback frame is named 'wrapper' and you cannot tell which layer failed. wraps preserves names and makes nested wrappers readable in tracebacks."
    tags: [wraps]
