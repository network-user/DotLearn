conceptId: functools-wraps
cards:
  - id: functools-wraps-01
    front: "Что происходит с __name__ функции после наивного декорирования?"
    back: "Имя функции указывает на wrapper, поэтому __name__ становится 'wrapper', а __doc__ - None. Метаданные оригинала спрятаны под обёрткой."
    tags: [problem]
  - id: functools-wraps-02
    front: "Почему потеря __name__ - не косметика?"
    back: "Логи, печатающие func.__name__, начнут писать 'wrapper' для всех декорированных функций; help() покажет пустую обёртку; фреймворки, опирающиеся на имя, ломаются на дублях wrapper."
    tags: [problem]
  - id: functools-wraps-03
    front: "Что делает functools.wraps?"
    back: "Копирует с оригинала на обёртку __name__, __doc__, __module__, __qualname__, аннотации и обновляет __dict__, а также проставляет __wrapped__. Снаружи функция снова выглядит как оригинал."
    tags: [solution]
  - id: functools-wraps-04
    front: "На какую функцию навешивают @functools.wraps(func)?"
    back: "На обёртку (wrapper), а аргументом передают оригинал (func) - источник метаданных. Перепутать местами - скопировать не в ту сторону."
    tags: [usage]
  - id: functools-wraps-05
    front: "Почему пишут wraps(func) со скобками, а не просто @functools.wraps?"
    back: "wraps(func) возвращает декоратор, который затем применяется к wrapper. Это декоратор-фабрика: ему нужна оборачиваемая функция, поэтому (func) обязателен."
    tags: [usage]
  - id: functools-wraps-06
    front: "Что такое атрибут __wrapped__?"
    back: "Ссылка на исходную функцию под обёрткой, которую проставляет functools.wraps. Через add.__wrapped__ можно достать и вызвать оригинал в обход декоратора."
    tags: [wrapped]
  - id: functools-wraps-07
    front: "Почему inspect.signature после wraps показывает настоящие параметры, а не (*args, **kwargs)?"
    back: "inspect.signature по умолчанию идёт по цепочке __wrapped__ к оригиналу. wraps проставил __wrapped__, поэтому signature видит реальную сигнатуру функции."
    tags: [introspection]
  - id: functools-wraps-08
    front: "Чем functools.wraps отличается от functools.update_wrapper?"
    back: "wraps(func) - удобная обёртка-декоратор над update_wrapper(wrapper, func). wraps ставят как @ внутри декоратора, update_wrapper вызывают напрямую, если обёртку строят не через def."
    tags: [internals]
  - id: functools-wraps-09
    front: "Какие атрибуты копирует wraps по умолчанию?"
    back: "Перечисленные в functools.WRAPPER_ASSIGNMENTS: __module__, __name__, __qualname__, __annotations__, __doc__. Плюс обновляет __dict__ и ставит __wrapped__."
    tags: [internals]
  - id: functools-wraps-10
    front: "Куда добавить wraps в декораторе?"
    back: "Прямо над определением вложенной обёртки: @functools.wraps(func) перед def wrapper(...). Тогда копирование сработает в момент создания обёртки."
    tags: [usage]
