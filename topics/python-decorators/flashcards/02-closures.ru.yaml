conceptId: closures
cards:
  - id: closures-01
    front: "Что такое замыкание (closure)?"
    back: "Внутренняя функция вместе с захваченными переменными внешней области. Она помнит, где родилась, и продолжает видеть эти переменные после выхода из внешней функции."
    tags: [basics]
  - id: closures-02
    front: "Что такое свободная переменная (free variable)?"
    back: "Переменная, которую внутренняя функция использует, но не объявляет у себя - она приходит из объемлющей области. Имена свободных переменных лежат в func.__code__.co_freevars."
    tags: [basics]
  - id: closures-03
    front: "Замыкание захватывает переменную или её значение?"
    back: "Переменную (ссылку на ячейку), а не снимок значения. Имя разрешается в момент вызова (позднее связывание), поэтому видно текущее значение, даже если оно изменилось после создания замыкания."
    tags: [late-binding]
  - id: closures-04
    front: "Почему [lambda: i for i in range(3)] даёт [2, 2, 2]?"
    back: "Все три лямбды захватывают одну и ту же переменную цикла i. К моменту вызова цикл закончился и i равно 2. Это позднее связывание."
    tags: [pitfalls]
  - id: closures-05
    front: "Как починить захват переменной цикла?"
    back: "Снять снимок через параметр со значением по умолчанию: lambda i=i: i. Значение аргумента по умолчанию вычисляется при создании функции, поэтому фиксируется текущее i."
    tags: [pitfalls]
  - id: closures-06
    front: "Зачем нужна инструкция nonlocal?"
    back: "Чтобы присваивать свободной переменной из внешней функции, а не создавать новую локальную. Без nonlocal count += 1 сделало бы count локальной и упало бы с UnboundLocalError."
    tags: [nonlocal]
  - id: closures-07
    front: "Когда nonlocal не нужен?"
    back: "Когда внутренняя функция только читает свободную переменную, а не присваивает ей. Для чтения (как в make_adder) nonlocal избыточен."
    tags: [nonlocal]
  - id: closures-08
    front: "Делят ли два замыкания из одной фабрики состояние?"
    back: "Нет. Каждый вызов фабрики создаёт новую функцию со своей ячейкой захваченной переменной. make_counter() и make_counter() - два независимых счётчика."
    tags: [state]
  - id: closures-09
    front: "Чем замыкание лучше global для хранения состояния?"
    back: "Захваченная ячейка привязана к конкретной функции и недоступна по имени снаружи. Два замыкания не конфликтуют, и посторонний код не может сбросить их состояние, в отличие от глобальной переменной."
    tags: [concept]
  - id: closures-10
    front: "Как замыкания связаны с декораторами?"
    back: "Оборачивающая функция держит обёрнутую функцию (или накопленное состояние - кэш, счётчик вызовов) в свободной переменной и меняет её через nonlocal. Декоратор - это замыкание над оборачиваемой функцией."
    tags: [decorators]
