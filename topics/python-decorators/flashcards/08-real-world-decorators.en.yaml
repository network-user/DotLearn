conceptId: real-world-decorators
cards:
  - id: real-world-decorators-01
    front: "What does a memoize decorator do?"
    back: "Caches a function's result by its arguments in a closure dictionary. The first call with given arguments computes and stores; later calls reuse the value. Good for pure expensive functions."
    tags: [memoize]
  - id: real-world-decorators-02
    front: "Why is the cache key in memoize a tuple of args?"
    back: "Tuples are hashable and valid dict keys. So function arguments must be hashable: a list or dict in arguments raises TypeError: unhashable type."
    tags: [memoize]
  - id: real-world-decorators-03
    front: "What to use instead of hand-written memoize in production?"
    back: "functools.lru_cache (or functools.cache in 3.9+): same memoization with size limit, thread safety, and cache_info() statistics. Hand-written memoize is for understanding."
    tags: [stdlib]
  - id: real-world-decorators-04
    front: "How is retry(times) structured?"
    back: "A decorator with an argument (three levels). The wrapper loops up to times attempts: success returns the result, an exception is remembered. After the loop, if there was no success, the last error is re-raised."
    tags: [retry]
  - id: real-world-decorators-05
    front: "Why must retry re-raise the last error instead of returning None?"
    back: "Otherwise failure goes unnoticed: the call silently returns None. raise tells the caller all attempts failed."
    tags: [retry]
  - id: real-world-decorators-06
    front: "Why does timed use time.perf_counter, not time.time?"
    back: "perf_counter is a monotonic clock for intervals. time.time follows system clock and can jump when time is synchronized, distorting the measurement."
    tags: [timing]
  - id: real-world-decorators-07
    front: "Why does timed need functools.wraps?"
    back: "So func.__name__ in output shows the real function name. Without wraps every measurement would print 'wrapper'."
    tags: [timing]
  - id: real-world-decorators-08
    front: "How does a register/command decorator build a handler registry?"
    back: "command(name) is a factory: it captures the name, returns a decorator that stores the function in a shared dict under that name and returns the function unchanged. That is how command routers and web routes are built."
    tags: [registry]
  - id: real-world-decorators-09
    front: "What does functools already provide instead of hand-written decorators?"
    back: "lru_cache/cache (memoization), cached_property (lazy property), total_ordering (comparison operators), singledispatch (type dispatch), partial (partial application)."
    tags: [stdlib]
  - id: real-world-decorators-10
    front: "Why does caching by nature require a hashable key?"
    back: "The cache stores results in a dict keyed by call arguments. Keys must be hashable and immutable to compare and find entries, so memoize and lru_cache fail on lists and dicts in arguments."
    tags: [concept]
