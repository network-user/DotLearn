conceptId: class-decorators
cards:
  - id: class-decorators-01
    front: "What does @register above class User: ... mean?"
    back: "User = register(User). @ on a class works like on a function: the decorator gets the class object, may extend it, and must return a class (usually the same one)."
    tags: [class-as-target]
  - id: class-decorators-02
    front: "What does a class decorator usually do with cls?"
    back: "Most often it mutates the original class - adds a method, writes to a registry, reads annotations - and returns the same class, rather than wrapping it in another object."
    tags: [class-as-target]
  - id: class-decorators-03
    front: "How do you build a class registry in one line?"
    back: "A @plugin decorator writes the class to a shared dict: PLUGINS[cls.__name__] = cls; return cls. Each class registers itself at definition time without a manual list."
    tags: [registry]
  - id: class-decorators-04
    front: "What does a class need to act as a decorator?"
    back: "__init__(self, func) that stores the function, and __call__ that makes the instance callable and acts as the wrapper. @C means name = C(func)."
    tags: [class-as-decorator]
  - id: class-decorators-05
    front: "Where does a class decorator store state?"
    back: "In instance fields (self.count, self.cache), not in a closure. Bonus: state is visible outside as an attribute, e.g. hello.count."
    tags: [state]
  - id: class-decorators-06
    front: "When is a class decorator better than a function?"
    back: "A function for simple wrappers (state in a closure, hidden). A class when state is rich, complex, or should be observable from outside; easy to add methods like reset."
    tags: [choice]
  - id: class-decorators-07
    front: "How is a class decorator with arguments structured, e.g. @Repeat(3)?"
    back: "Repeat(3) creates an instance, and that instance is applied to the function. Roles shift: __call__(self, func) accepts the function (middle level), and __call__ returns the wrapper."
    tags: [class-factory]
  - id: class-decorators-08
    front: "What happens if a class decorator does not return cls?"
    back: "The class name becomes None - a function without return returns None. A class decorator that extends cls must return cls."
    tags: [pitfalls]
  - id: class-decorators-09
    front: "What is lost when a function is decorated with a class (@CountCalls)?"
    back: "The name is replaced by an instance that lacks the original function's __name__. If metadata matters, copy it with functools.update_wrapper(self, func) in __init__."
    tags: [pitfalls]
  - id: class-decorators-10
    front: "Why is @dataclass an example of a class decorator?"
    back: "It receives a class, reads field annotations, generates __init__, __repr__, __eq__, and returns the same class. A class decorator can generate a whole method set from what is declared in the body."
    tags: [dataclass]
