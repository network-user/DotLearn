conceptId: decorators-with-arguments
cards:
  - id: decorators-with-arguments-01
    front: "Чему эквивалентна запись @repeat(3) над функцией?"
    back: "func = repeat(3)(func). Сначала вызывается фабрика repeat(3) и возвращает декоратор, затем этот декоратор применяется к функции."
    tags: [syntax]
  - id: decorators-with-arguments-02
    front: "Сколько уровней def у настраиваемого декоратора и что принимает каждый?"
    back: "Три. Фабрика принимает аргумент декоратора, средняя функция (decorator) - оборачиваемую функцию, внутренняя (wrapper) - аргументы вызова."
    tags: [structure]
  - id: decorators-with-arguments-03
    front: "Откуда внутренняя обёртка берёт аргумент декоратора и саму функцию?"
    back: "Из замыканий: аргумент захвачен внешней фабрикой, функция - средним уровнем. Внутренняя обёртка видит обе свободные переменные."
    tags: [closure]
  - id: decorators-with-arguments-04
    front: "Что возвращает каждый уровень фабрики декораторов?"
    back: "Фабрика возвращает decorator, decorator возвращает wrapper, wrapper возвращает результат вызова func. Возврат не с того уровня ломает разворачивание."
    tags: [structure]
  - id: decorators-with-arguments-05
    front: "Со скобками или без вызывают фабрику декораторов?"
    back: "Всегда со скобками: @repeat(2), даже при пустом по смыслу аргументе. Скобки вызывают фабрику и порождают настоящий декоратор."
    tags: [syntax]
  - id: decorators-with-arguments-06
    front: "Что случится, если применить фабрику без скобок: @repeat вместо @repeat(3)?"
    back: "repeat получит саму функцию в параметр n и вернёт decorator, ожидающий функцию. Обычно это падает с TypeError глубже по коду. Фабрику зовут со скобками всегда."
    tags: [pitfalls]
  - id: decorators-with-arguments-07
    front: "Когда захватывается аргумент фабрики?"
    back: "Один раз, в момент @repeat(3) - при определении функции. Позднейшее изменение исходной переменной декоратор не затрагивает: значение уже зафиксировано в ячейке."
    tags: [capture]
  - id: decorators-with-arguments-08
    front: "Куда ставить functools.wraps в декораторе с аргументами?"
    back: "На самую внутреннюю обёртку (wrapper). Уровней стало больше, но обёртка по-прежнему одна, и метаданные теряет именно она."
    tags: [wraps]
  - id: decorators-with-arguments-09
    front: "Почему именно три уровня, а не два?"
    back: "Число уровней - это число порций аргументов плюс один на вызов. Обычный декоратор: функция + вызов = два. С аргументами: аргумент декоратора + функция + вызов = три."
    tags: [concept]
  - id: decorators-with-arguments-10
    front: "Чем @log отличается от @retry(3) по форме записи?"
    back: "@log - обычный декоратор, пишется без скобок (func = log(func)). @retry(3) - вызов фабрики со скобками (func = retry(3)(func)). Перепутать формы - частая ошибка."
    tags: [syntax]
