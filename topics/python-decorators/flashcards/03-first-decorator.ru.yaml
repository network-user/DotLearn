conceptId: first-decorator
cards:
  - id: first-decorator-01
    front: "Что такое декоратор в одном предложении?"
    back: "Функция, которая принимает функцию и возвращает новую функцию (обёртку), обычно вызывающую исходную с дополнительным кодом до и/или после."
    tags: [basics]
  - id: first-decorator-02
    front: "Чему эквивалентна запись @log над def greet(): ...?"
    back: "greet = log(greet). Python создаёт функцию greet, передаёт её в log и переприсваивает имя greet результату. @ - это сахар для повторного присваивания."
    tags: [syntax]
  - id: first-decorator-03
    front: "Когда применяется декоратор - при определении функции или при каждом вызове?"
    back: "Один раз, в момент определения функции (когда выполняется def). После этого имя указывает на обёртку, и вызываться будет уже она."
    tags: [syntax]
  - id: first-decorator-04
    front: "Как обёртка помнит, какую функцию она оборачивает?"
    back: "Через замыкание: исходная func - свободная переменная, захваченная wrapper. Даже после возврата из декоратора wrapper видит func."
    tags: [closure]
  - id: first-decorator-05
    front: "Зачем обёртке сигнатура wrapper(*args, **kwargs)?"
    back: "Чтобы подходить к функции с любой сигнатурой. *args/**kwargs собирают любые аргументы, а func(*args, **kwargs) распаковывает их обратно в исходную функцию."
    tags: [args]
  - id: first-decorator-06
    front: "Что произойдёт, если обёртка не вернёт результат func?"
    back: "Декорированный вызов вернёт None. Функция без return возвращает None, поэтому настоящий результат потеряется. Обёртка обязана делать return func(*args, **kwargs)."
    tags: [pitfalls]
  - id: first-decorator-07
    front: "Почему декоратор возвращает wrapper, а не wrapper()?"
    back: "Декоратор должен отдать саму обёртку как новую функцию. return wrapper() вызвал бы обёртку прямо при декорировании и подставил её результат вместо функции."
    tags: [pitfalls]
  - id: first-decorator-08
    front: "Можно ли применить декоратор без синтаксиса @?"
    back: "Да: декоратор - обычная функция. greet = log(greet) делает ровно то же, что @log над определением greet."
    tags: [syntax]
  - id: first-decorator-09
    front: "Что будет, если обёртка объявлена как wrapper() без *args, а декорируется add(a, b)?"
    back: "TypeError при вызове: wrapper() takes 0 positional arguments. Обёртка без *args, **kwargs подходит только к функциям без параметров."
    tags: [pitfalls]
  - id: first-decorator-10
    front: "Где живут «код до» и «код после» вызова в декораторе?"
    back: "Внутри обёртки, вокруг строки result = func(*args, **kwargs). Код до - перед вызовом, код после - между вызовом и return."
    tags: [structure]
