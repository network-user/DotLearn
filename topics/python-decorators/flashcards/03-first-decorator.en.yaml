conceptId: first-decorator
cards:
  - id: first-decorator-01
    front: "What is a decorator in one sentence?"
    back: "A function that takes a function and returns a new function (a wrapper), usually calling the original with extra code before and/or after."
    tags: [basics]
  - id: first-decorator-02
    front: "What is @log above def greet(): ... equivalent to?"
    back: "greet = log(greet). Python creates greet, passes it to log, and rebinds the name greet to the result. @ is sugar for reassignment."
    tags: [syntax]
  - id: first-decorator-03
    front: "When is a decorator applied - at definition time or on every call?"
    back: "Once, when the function is defined (when def runs). After that the name points at the wrapper, and that is what gets called."
    tags: [syntax]
  - id: first-decorator-04
    front: "How does the wrapper remember which function it wraps?"
    back: "Through a closure: the original func is a free variable captured by wrapper. Even after the decorator returns, wrapper still sees func."
    tags: [closure]
  - id: first-decorator-05
    front: "Why does the wrapper use wrapper(*args, **kwargs)?"
    back: "So it fits any function signature. *args/**kwargs collect any arguments, and func(*args, **kwargs) unpacks them back into the original function."
    tags: [args]
  - id: first-decorator-06
    front: "What happens if the wrapper does not return func's result?"
    back: "The decorated call returns None. A function without return returns None, so the real result is lost. The wrapper must do return func(*args, **kwargs)."
    tags: [pitfalls]
  - id: first-decorator-07
    front: "Why does a decorator return wrapper, not wrapper()?"
    back: "The decorator must hand back the wrapper as the new function. return wrapper() would call the wrapper during decoration and substitute its result for the function."
    tags: [pitfalls]
  - id: first-decorator-08
    front: "Can you apply a decorator without @ syntax?"
    back: "Yes: a decorator is an ordinary function. greet = log(greet) does exactly what @log above def greet does."
    tags: [syntax]
  - id: first-decorator-09
    front: "What happens if the wrapper is def wrapper() without *args and you decorate add(a, b)?"
    back: "TypeError on call: wrapper() takes 0 positional arguments. A wrapper without *args, **kwargs only works for zero-argument functions."
    tags: [pitfalls]
  - id: first-decorator-10
    front: "Where do the before and after code live in a decorator?"
    back: "Inside the wrapper, around result = func(*args, **kwargs). Code before runs before the call; code after runs between the call and return."
    tags: [structure]
