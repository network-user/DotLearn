conceptId: real-world-decorators
cards:
  - id: real-world-decorators-01
    front: "Что делает декоратор memoize?"
    back: "Кэширует результат функции по её аргументам в словаре из замыкания. Первый вызов с данными аргументами считает и сохраняет, последующие берут готовое. Подходит для чистых дорогих функций."
    tags: [memoize]
  - id: real-world-decorators-02
    front: "Почему ключом кэша в memoize служит кортеж args?"
    back: "Кортежи хешируемы и потому годятся в ключи словаря. Поэтому аргументы функции должны быть хешируемыми: список или словарь в аргументах вызовут TypeError: unhashable type."
    tags: [memoize]
  - id: real-world-decorators-03
    front: "Что использовать вместо самописного memoize в реальном коде?"
    back: "functools.lru_cache (или functools.cache в 3.9+): та же мемоизация с ограничением размера, потокобезопасностью и статистикой через cache_info(). Самописный вариант - для понимания."
    tags: [stdlib]
  - id: real-world-decorators-04
    front: "Как устроен декоратор retry(times)?"
    back: "Декоратор с аргументом (три уровня). В обёртке цикл на times попыток: успех возвращает результат, исключение запоминается. После цикла, если успеха не было, перевыбрасывается последняя ошибка."
    tags: [retry]
  - id: real-world-decorators-05
    front: "Почему retry должен перевыбрасывать последнюю ошибку, а не возвращать None?"
    back: "Иначе сбой останется незамеченным: вызов молча вернёт None. Перевыброс через raise сообщает вызывающему коду, что все попытки провалились."
    tags: [retry]
  - id: real-world-decorators-06
    front: "Почему timed использует time.perf_counter, а не time.time?"
    back: "perf_counter - монотонные часы для измерения интервалов. time.time привязан к системным часам и может скакнуть при синхронизации времени, исказив замер."
    tags: [timing]
  - id: real-world-decorators-07
    front: "Зачем timed нужен functools.wraps?"
    back: "Чтобы func.__name__ в выводе показывал настоящее имя функции. Без wraps во всех замерах печаталось бы 'wrapper'."
    tags: [timing]
  - id: real-world-decorators-08
    front: "Как декоратор register/command собирает обработчики в реестр?"
    back: "command(name) - фабрика: захватывает имя, возвращает декоратор, который кладёт функцию в общий словарь под этим именем и возвращает её нетронутой. Так строят маршрутизаторы команд и веб-роуты."
    tags: [registry]
  - id: real-world-decorators-09
    front: "Что из functools уже готово вместо самописных декораторов?"
    back: "lru_cache/cache (мемоизация), cached_property (ленивое свойство), total_ordering (операторы сравнения), singledispatch (диспетч по типу), partial (частичное применение)."
    tags: [stdlib]
  - id: real-world-decorators-10
    front: "Почему кэширование по природе требует хешируемого ключа?"
    back: "Кэш хранит результаты в словаре, ключ которого - аргументы вызова. Сравнить и найти ключ можно только если он хешируемый и неизменяемый, поэтому memoize и lru_cache не работают со списками и словарями в аргументах."
    tags: [concept]
