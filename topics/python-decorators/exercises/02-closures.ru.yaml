exercises:
  - id: closure-basics-quiz-001
    concept: closures
    type: theory-quiz
    difficulty: 1
    prompt: "Что такое замыкание (closure)?"
    choices:
      - id: a
        text: "Любая функция, объявленная внутри класса."
      - id: b
        text: "Внутренняя функция вместе с захваченными переменными внешней области, которые она продолжает видеть после выхода из внешней функции."
      - id: c
        text: "Функция без параметров."
      - id: d
        text: "Глобальная переменная, доступная всем функциям модуля."
    correct: [b]
    explanation: "Замыкание - связка «функция плюс захваченные свободные переменные». Внутренняя функция помнит область, где родилась, даже после того, как внешняя завершилась."
    variants:
      - prompt: "Зачем нужна инструкция `nonlocal count` внутри вложенной функции?"
        choices:
          - id: a
            text: "Чтобы объявить совершенно новую глобальную переменную."
          - id: b
            text: "Чтобы присваивать переменной из внешней функции, а не создавать новую локальную."
          - id: c
            text: "Чтобы ускорить доступ к переменной."
          - id: d
            text: "Чтобы запретить чтение переменной снаружи."
        correct: [b]
        explanation: "Без nonlocal присваивание count += 1 создало бы локальную count, и чтение справа упало бы с UnboundLocalError. nonlocal направляет присваивание во внешнюю ячейку."
      - prompt: "Замыкание захватывает переменную или её значение в момент создания?"
        choices:
          - id: a
            text: "Значение - снимок на момент определения внутренней функции."
          - id: b
            text: "Переменную - имя разрешается в момент вызова (позднее связывание), поэтому видно её текущее значение."
          - id: c
            text: "Копию всей внешней функции целиком."
          - id: d
            text: "Ничего не захватывает - читает только глобальные."
        correct: [b]
        explanation: "Позднее связывание: замыкание держит ссылку на переменную, а не на её значение. Если значение изменится после создания замыкания, замыкание увидит новое."

  - id: late-binding-predict-001
    concept: closures
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      def make():
          value = 1
          def show():
              return value
          value = 99
          return show

      print(make()())
    expected:
      kind: stdout
      value: "99"
    hints:
      - "Замыкание захватывает переменную, а не её значение в момент создания show. Когда `show` действительно вызывают?"
      - "К моменту вызова `show` присваивание value = 99 уже выполнилось. Какое значение лежит в ячейке value сейчас?"
    variants:
      - snippet: |
          funcs = []
          for i in range(3):
              funcs.append(lambda: i)
          print([f() for f in funcs])
        expected:
          kind: stdout
          value: "[2, 2, 2]"
      - snippet: |
          funcs = []
          for i in range(3):
              funcs.append(lambda i=i: i)
          print([f() for f in funcs])
        expected:
          kind: stdout
          value: "[0, 1, 2]"

  - id: counter-state-predict-001
    concept: closures
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      def make_counter():
          count = 0
          def tick():
              nonlocal count
              count += 1
              return count
          return tick

      a = make_counter()
      b = make_counter()
      print(a(), a(), b())
    expected:
      kind: stdout
      value: "1 2 1"
    hints:
      - "Каждый вызов фабрики создаёт новое замыкание со своей ячейкой count. Сколько независимых счётчиков здесь?"
      - "`a` и `b` не делят состояние: проследите count отдельно для каждого."

  - id: make-multiplier-001
    concept: closures
    type: python-function
    difficulty: 2
    prompt: "Реализуйте фабрику `make_multiplier(factor)`, которая возвращает функцию одного аргумента `x`, умножающую его на `factor`. Верните саму функцию, не вызывайте её."
    starter: |
      def make_multiplier(factor):
          ...
    cases:
      - call: "make_multiplier(3)(10)"
        expect: 30
      - call: "make_multiplier(0)(5)"
        expect: 0
      - call: "make_multiplier(2)(7)"
        expect: 14
      - call: "[make_multiplier(2)(x) for x in [1, 2, 3]]"
        expect: [2, 4, 6]
    hints:
      - "Внутри фабрики `factor` - свободная переменная: вложенная функция её увидит без всяких объявлений, ведь она только читает."
      - "Определите внутреннюю функцию через `def`, верните её по имени без скобок."
    solution: |
      def make_multiplier(factor):
          def multiply(x):
              return x * factor
          return multiply
    variants:
      - prompt: "Реализуйте фабрику `make_power(exp)`, которая возвращает функцию одного аргумента `base`, возводящую его в степень `exp`."
        cases:
          - call: "make_power(2)(5)"
            expect: 25
          - call: "make_power(3)(2)"
            expect: 8
          - call: "make_power(0)(7)"
            expect: 1
          - call: "make_power(1)(42)"
            expect: 42
        solution: |
          def make_power(exp):
              def power(base):
                  return base ** exp
              return power
      - prompt: "Реализуйте фабрику `make_prefixer(prefix)`, которая возвращает функцию одного аргумента `text`, добавляющую `prefix` перед `text`."
        cases:
          - call: "make_prefixer('>>> ')('hi')"
            expect: ">>> hi"
          - call: "make_prefixer('[INFO] ')('ok')"
            expect: "[INFO] ok"
          - call: "make_prefixer('')('x')"
            expect: "x"
        solution: |
          def make_prefixer(prefix):
              def prefixer(text):
                  return prefix + text
              return prefixer

  - id: make-accumulator-001
    concept: closures
    type: python-function
    difficulty: 4
    prompt: "Реализуйте `make_accumulator()`: она возвращает функцию `add(n)`, которая прибавляет `n` к скрытой сумме (изначально 0) и возвращает новую сумму. Состояние храните в замыкании через `nonlocal`, не в глобальной переменной."
    starter: |
      def make_accumulator():
          ...
    cases:
      - call: "make_accumulator()(10)"
        expect: 10
      - call: "(lambda acc: [acc(10), acc(5), acc(3)])(make_accumulator())"
        expect: [10, 15, 18]
      - call: "(lambda a, b: [a(1), b(100), a(1)])(make_accumulator(), make_accumulator())"
        expect: [1, 100, 2]
    hints:
      - "Заведите во внешней функции переменную `total = 0`. Вложенная функция должна её менять, а не только читать - какое объявление для этого нужно?"
      - "Внутри `add` объявите `nonlocal total`, прибавьте `n`, верните `total`. Верните `add` по имени."
      - "Два разных вызова `make_accumulator()` дают независимые суммы - это и проверяет последний случай."
    solution: |
      def make_accumulator():
          total = 0
          def add(n):
              nonlocal total
              total += n
              return total
          return add
