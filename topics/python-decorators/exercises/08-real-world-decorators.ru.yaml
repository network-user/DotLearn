exercises:
  - id: memoize-quiz-001
    concept: real-world-decorators
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает декоратор memoize?"
    choices:
      - id: a
        text: "Запоминает результат функции по её аргументам и при повторном вызове с теми же аргументами отдаёт сохранённый результат, не пересчитывая."
      - id: b
        text: "Повторяет вызов функции при ошибке."
      - id: c
        text: "Замеряет время выполнения функции."
      - id: d
        text: "Удаляет функцию из памяти после первого вызова."
    correct: [a]
    explanation: "memoize держит словарь-кэш в замыкании: первый вызов с данными аргументами считает и сохраняет, последующие берут готовое. Подходит для чистых дорогих функций."
    variants:
      - prompt: "Что лучше использовать в реальном коде вместо самописного memoize?"
        choices:
          - id: a
            text: "functools.lru_cache (или functools.cache) - тот же приём с лимитом размера, потокобезопасностью и статистикой."
          - id: b
            text: "Глобальную переменную с результатом."
          - id: c
            text: "time.perf_counter."
          - id: d
            text: "Ничего - кэширование всегда пишут вручную."
        correct: [a]
        explanation: "Стандартный functools.lru_cache реализует мемоизацию надёжно. Самописный вариант полезен, чтобы понять механизм."
      - prompt: "Почему memoize и lru_cache падают, если в аргументах список или словарь?"
        choices:
          - id: a
            text: "Списки и словари нехешируемы, а кэшу нужен хешируемый ключ для словаря-кэша."
          - id: b
            text: "Списки слишком большие для кэша."
          - id: c
            text: "Это ограничение синтаксиса @."
          - id: d
            text: "Они падают только в Python 2."
        correct: [a]
        explanation: "Ключом кэша служит кортеж аргументов, который должен быть хешируемым. Список и словарь хешировать нельзя, поэтому возникает TypeError: unhashable type."

  - id: memoize-predict-001
    concept: real-world-decorators
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      import functools

      def memoize(func):
          cache = {}
          @functools.wraps(func)
          def wrapper(*args):
              if args not in cache:
                  print("считаю", args)
                  cache[args] = func(*args)
              return cache[args]
          return wrapper

      @memoize
      def square(n):
          return n * n

      print(square(4))
      print(square(4))
      print(square(5))
    expected:
      kind: stdout
      value: |-
        считаю (4,)
        16
        16
        считаю (5,)
        25
    hints:
      - "'считаю' печатается только когда аргументов ещё нет в кэше. Для каких вызовов кэш промахнётся?"
      - "Первый square(4) считает и кэширует; второй square(4) берёт готовое (без 'считаю'); square(5) - новый ключ."

  - id: write-memoize-001
    concept: real-world-decorators
    type: python-function
    difficulty: 3
    prompt: "Напишите декоратор `memoize`, кэширующий результат по позиционным аргументам в словаре из замыкания. Повторный вызов с теми же аргументами не должен пересчитывать функцию. Сохраните метаданные через functools.wraps."
    starter: |
      import functools

      def memoize(func):
          ...

      @memoize
      def fib(n):
          return n if n < 2 else fib(n - 1) + fib(n - 2)
    cases:
      - call: "fib(10)"
        expect: 55
      - call: "fib(20)"
        expect: 6765
      - call: "memoize(lambda x: x * x)(6)"
        expect: 36
      - call: "fib.__name__"
        expect: "fib"
    hints:
      - "Заведите словарь cache в теле декоратора - он будет жить в замыкании, один на функцию."
      - "В обёртке проверьте, есть ли args в cache; если нет - посчитайте func(*args) и сохраните; верните cache[args]."
      - "Ключом служит кортеж args; не забудьте @functools.wraps(func) над обёрткой."
    solution: |
      import functools

      def memoize(func):
          cache = {}
          @functools.wraps(func)
          def wrapper(*args):
              if args not in cache:
                  cache[args] = func(*args)
              return cache[args]
          return wrapper

      @memoize
      def fib(n):
          return n if n < 2 else fib(n - 1) + fib(n - 2)

  - id: write-retry-001
    concept: real-world-decorators
    type: python-function
    difficulty: 4
    prompt: "Напишите декоратор-фабрику `retry(times)`: обёрнутая функция повторяется до `times` раз; при успехе возвращается результат, при исчерпании всех попыток перевыбрасывается последнее исключение (а не возвращается None)."
    starter: |
      import functools

      def retry(times):
          ...
    cases:
      - call: "retry(3)(lambda: 42)()"
        expect: 42
      - call: "(lambda box: retry(3)(lambda: (box.append(1), 1/0)[1] if len(box) < 2 else 'ok')())([])"
        expect: "ok"
      - call: "retry(2)(lambda: 7)()"
        expect: 7
    hints:
      - "Это три уровня: retry(times) -> decorator(func) -> wrapper. В обёртке нужен цикл попыток."
      - "В цикле на range(times) пробуйте return func(*args, **kwargs) в try; в except запомните ошибку и идите дальше."
      - "После цикла, если успеха не было, поднимите сохранённую последнюю ошибку через raise."
    solution: |
      import functools

      def retry(times):
          def decorator(func):
              @functools.wraps(func)
              def wrapper(*args, **kwargs):
                  last_error = None
                  for _ in range(times):
                      try:
                          return func(*args, **kwargs)
                      except Exception as error:
                          last_error = error
                  raise last_error
              return wrapper
          return decorator

  - id: write-command-registry-001
    concept: real-world-decorators
    type: python-function
    difficulty: 4
    prompt: "Реализуйте `make_registry()`, которая возвращает пару `(command, registry)`: `command(name)` - декоратор-фабрика, регистрирующая функцию в словаре `registry` под ключом `name` и возвращающая её без изменений; `registry` - сам словарь. Разные вызовы `make_registry()` дают независимые реестры."
    starter: |
      def make_registry():
          ...
    cases:
      - call: "(lambda cr: (cr[0]('hi')(lambda: 1), sorted(cr[1])))(make_registry())[1]"
        expect: ["hi"]
      - call: "(lambda cr: (cr[0]('a')(lambda: 1), cr[0]('b')(lambda: 2), cr[1]['b']()))(make_registry())[2]"
        expect: 2
      - call: "(lambda cr: cr[0]('x')(lambda: 99) is not None)(make_registry())"
        expect: true
      - call: "(lambda a, b: (a[0]('k')(lambda: 1), len(b[1]))) (make_registry(), make_registry())[1]"
        expect: 0
    hints:
      - "Заведите словарь registry. command(name) - фабрика: захватывает name и возвращает декоратор, который кладёт func в registry[name] и возвращает func."
      - "Верните кортеж (command, registry), чтобы вызывающий код видел и регистратор, и сам реестр."
      - "Последний случай проверяет изоляцию: реестр второго make_registry() остаётся пустым, когда регистрируют в первый."
    solution: |
      def make_registry():
          registry = {}
          def command(name):
              def decorator(func):
                  registry[name] = func
                  return func
              return decorator
          return command, registry

  - id: write-once-001
    concept: real-world-decorators
    type: python-function
    difficulty: 5
    prompt: "Напишите декоратор `once`: обёрнутая функция выполняется только при первом вызове, её результат кэшируется, и все последующие вызовы возвращают тот же результат, не вызывая функцию повторно. Сохраните метаданные через functools.wraps."
    starter: |
      import functools

      def once(func):
          ...

      @once
      def init():
          return object()
    cases:
      - call: "init() is init()"
        expect: true
      - call: "(lambda box: (lambda f: [f(), f(), f()])(once(lambda: (box.append(1), len(box))[1])))([])"
        expect: [1, 1, 1]
      - call: "once(lambda: 7)()"
        expect: 7
      - call: "init.__name__"
        expect: "init"
    hints:
      - "Нужно запомнить, вызывали ли функцию уже, и её результат. Где хранить этот флаг и значение между вызовами?"
      - "Заведите в замыкании переменные called=False и result=None; меняйте их через nonlocal в обёртке."
      - "В обёртке: если ещё не вызывали - вызовите, сохраните результат, поднимите флаг; затем всегда возвращайте сохранённый результат."
    solution: |
      import functools

      def once(func):
          called = False
          result = None
          @functools.wraps(func)
          def wrapper(*args, **kwargs):
              nonlocal called, result
              if not called:
                  result = func(*args, **kwargs)
                  called = True
              return result
          return wrapper

      @once
      def init():
          return object()
