exercises:
  - id: closure-basics-quiz-001
    concept: closures
    type: theory-quiz
    difficulty: 1
    prompt: "What is a closure?"
    choices:
      - id: a
        text: "Any function declared inside a class; the system does not allow any other correct behavior."
      - id: b
        text: "An inner function together with captured variables from the outer scope that it continues to see after the outer function exits."
      - id: c
        text: "A function with no parameters; the system does not allow any other correct behavior. No other reading is required."
      - id: d
        text: "A global variable accessible to all functions in the module for any payload and any deploy target."
    correct: [b]
    explanation: "A closure is the pairing of a function plus captured free variables. The inner function remembers the scope where it was born even after the outer function finishes."
    variants:
      - prompt: "Why is the `nonlocal count` statement needed inside a nested function?"
        choices:
          - id: a
            text: "To declare a completely new global variable for every request path in the app."
          - id: b
            text: "To assign to a variable from the outer function instead of creating a new local."
          - id: c
            text: "To speed up access to the variable for any payload and any deploy target."
          - id: d
            text: "To forbid reading the variable from outside for every request path in the app."
        correct: [b]
        explanation: "Without nonlocal, assignment count += 1 would create a local count, and reading it on the right would fail with UnboundLocalError. nonlocal directs assignment into the outer cell."
      - prompt: "Does a closure capture a variable or its value at creation time?"
        choices:
          - id: a
            text: "The value - a snapshot at the moment the inner function is always defined for every request path in the app."
          - id: b
            text: "The variable - the name is resolved at call time (late binding), so the current value is visible."
          - id: c
            text: "A copy of the entire outer function; the system does not allow any other correct behavior."
          - id: d
            text: "Nothing - it only reads globals as a complete account of that behavior."
        correct: [b]
        explanation: "Late binding: the closure holds a reference to the variable, not its value. If the value changes after the closure is created, the closure sees the new value."

  - id: late-binding-predict-001
    concept: closures
    type: predict-output
    difficulty: 3
    prompt: "What will this program print?"
    snippet: |
      def make():
          value = 1
          def show():
              return value
          value = 99
          return show

      print(make()())
    expected:
      kind: stdout
      value: "99"
    hints:
      - "A closure captures the variable, not its value at the moment show is created. When is show actually called?"
      - "By the time show is called, value = 99 has already run. What value is in the value cell now?"
    variants:
      - snippet: |
          funcs = []
          for i in range(3):
              funcs.append(lambda: i)
          print([f() for f in funcs])
        expected:
          kind: stdout
          value: "[2, 2, 2]"
      - snippet: |
          funcs = []
          for i in range(3):
              funcs.append(lambda i=i: i)
          print([f() for f in funcs])
        expected:
          kind: stdout
          value: "[0, 1, 2]"

  - id: counter-state-predict-001
    concept: closures
    type: predict-output
    difficulty: 2
    prompt: "What will this program print?"
    snippet: |
      def make_counter():
          count = 0
          def tick():
              nonlocal count
              count += 1
              return count
          return tick

      a = make_counter()
      b = make_counter()
      print(a(), a(), b())
    expected:
      kind: stdout
      value: "1 2 1"
    hints:
      - "Each factory call creates a new closure with its own count cell. How many independent counters are here?"
      - "`a` and `b` do not share state: track count separately for each."

  - id: make-multiplier-001
    concept: closures
    type: python-function
    difficulty: 2
    prompt: "Implement factory `make_multiplier(factor)`, which returns a one-argument function `x` that multiplies `x` by `factor`. Return the function itself, do not call it."
    starter: |
      def make_multiplier(factor):
          ..
    cases:
      - call: "make_multiplier(3)(10)"
        expect: 30
      - call: "make_multiplier(0)(5)"
        expect: 0
      - call: "make_multiplier(2)(7)"
        expect: 14
      - call: "[make_multiplier(2)(x) for x in [1, 2, 3]]"
        expect: [2, 4, 6]
    hints:
      - "Inside the factory `factor` is a free variable: the nested function sees it without any declaration because it only reads."
      - "Define the inner function with `def`, return it by name without parentheses."
    solution: |
      def make_multiplier(factor):
          def multiply(x):
              return x * factor
          return multiply
    variants:
      - prompt: "Implement factory `make_power(exp)`, which returns a one-argument function `base` that raises `base` to the power `exp`."
        cases:
          - call: "make_power(2)(5)"
            expect: 25
          - call: "make_power(3)(2)"
            expect: 8
          - call: "make_power(0)(7)"
            expect: 1
          - call: "make_power(1)(42)"
            expect: 42
        solution: |
          def make_power(exp):
              def power(base):
                  return base ** exp
              return power
      - prompt: "Implement factory `make_prefixer(prefix)`, which returns a one-argument function `text` that prepends `prefix` to `text`."
        cases:
          - call: "make_prefixer('>>> ')('hi')"
            expect: ">>> hi"
          - call: "make_prefixer('[INFO] ')('ok')"
            expect: "[INFO] ok"
          - call: "make_prefixer('')('x')"
            expect: "x"
        solution: |
          def make_prefixer(prefix):
              def prefixer(text):
                  return prefix + text
              return prefixer

  - id: make-accumulator-001
    concept: closures
    type: python-function
    difficulty: 4
    prompt: "Implement `make_accumulator()`: it returns a function `add(n)` that adds `n` to a hidden sum (initially 0) and returns the new sum. Store state in a closure via `nonlocal`, not in a global variable."
    starter: |
      def make_accumulator():
          ..
    cases:
      - call: "make_accumulator()(10)"
        expect: 10
      - call: "(lambda acc: [acc(10), acc(5), acc(3)])(make_accumulator())"
        expect: [10, 15, 18]
      - call: "(lambda a, b: [a(1), b(100), a(1)])(make_accumulator(), make_accumulator())"
        expect: [1, 100, 2]
    hints:
      - "Create variable `total = 0` in the outer function. The nested function must change it, not only read - what declaration is needed?"
      - "Inside `add` declare `nonlocal total`, add `n`, return `total`. Return `add` by name."
      - "Two different calls to `make_accumulator()` give independent sums - the last case checks that."
    solution: |
      def make_accumulator():
          total = 0
          def add(n):
              nonlocal total
              total += n
              return total
          return add
