exercises:
  - id: factory-levels-quiz-001
    concept: decorators-with-arguments
    type: theory-quiz
    difficulty: 1
    prompt: "Чему эквивалентна запись `@repeat(3)` над определением функции?"
    choices:
      - id: a
        text: "func = repeat(3), на любом пути обработки запроса или оговорок как полное описание этого поведения."
      - id: b
        text: "func = repeat(3)(func) - сначала вызывается фабрика, её результат-декоратор применяется к функции."
      - id: c
        text: "func = repeat(func)(3), во всех сценариях без дополнительной настройки как полное описание этого поведения"
      - id: d
        text: "func = 3(repeat(func)); другого корректного поведения система не допускает как полное описание этого поведения"
    correct: [b]
    explanation: "repeat(3) - вызов фабрики, возвращающий декоратор. Этот декоратор затем применяется к функции: func = repeat(3)(func). Поэтому фабрике нужен дополнительный уровень вложенности."
    variants:
      - prompt: "Сколько уровней вложенных функций у настраиваемого декоратора и что принимает каждый?"
        choices:
          - id: a
            text: "Два: функция и аргументы вызова, во всех сценариях без дополнительной настройки."
          - id: b
            text: "Три: фабрика принимает аргумент декоратора, средняя - оборачиваемую функцию, внутренняя - аргументы вызова."
          - id: c
            text: "Один: всё в одной функции; другого корректного поведения система не допускает."
          - id: d
            text: "Четыре: по уровню на каждый аргумент; другого корректного поведения система не допускает."
        correct: [b]
        explanation: "Фабрика(аргумент) -> decorator(func) -> wrapper(*args, **kwargs). Внутренняя обёртка видит и аргумент декоратора, и саму функцию по правилам замыкания."
      - prompt: "Со скобками или без вызывают декоратор-фабрику вроде `repeat`?"
        choices:
          - id: a
            text: "Набор без скобок: @repeat - так же, как обычный декоратор считают исчерпывающим ответом."
          - id: b
            text: "Со скобками: @repeat(2), потому что декоратором служит результат вызова фабрики."
          - id: c
            text: "Любым способом - разницы нет как полное описание этого поведения."
          - id: d
            text: "Только через repeat = repeat() заранее как полное описание этого поведения."
        correct: [b]
        explanation: "Скобки вызывают фабрику и порождают настоящий декоратор. @repeat без скобок передал бы функцию вместо аргумента и сломался бы."

  - id: factory-unwrap-predict-001
    concept: decorators-with-arguments
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      def repeat(n):
          def decorator(func):
              def wrapper(*args, **kwargs):
                  result = None
                  for _ in range(n):
                      result = func(*args, **kwargs)
                  return result
              return wrapper
          return decorator

      @repeat(3)
      def announce():
          print("привет")
          return 1

      print(announce())
    expected:
      kind: stdout
      value: |-
        привет
        привет
        привет
        1
    hints:
      - "@repeat(3) разворачивается в announce = repeat(3)(announce). Сколько раз wrapper вызовет исходную функцию?"
      - "Внутренний цикл крутится n раз, печатая 'привет' каждый раз, и возвращает результат последнего вызова, который потом печатает внешний print."

  - id: captured-arg-predict-001
    concept: decorators-with-arguments
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      factor = 2

      def multiply_by(k):
          def decorator(func):
              def wrapper(*args, **kwargs):
                  return func(*args, **kwargs) * k
              return wrapper
          return decorator

      @multiply_by(factor)
      def value():
          return 10

      factor = 100
      print(value())
    expected:
      kind: stdout
      value: "20"
    hints:
      - "Аргумент фабрики захватывается в момент @multiply_by(factor) - при определении функции. Каким было factor тогда?"
      - "Дальнейшее присваивание factor = 100 не трогает уже захваченную ячейку k. Декоратор применился один раз."

  - id: write-repeat-decorator-001
    concept: decorators-with-arguments
    type: python-function
    difficulty: 3
    prompt: "Напишите декоратор-фабрику `repeat(n)`: обёрнутая функция вызывается `n` раз подряд с теми же аргументами, наружу возвращается результат последнего вызова. Применяется как `@repeat(n)`."
    starter: |
      def repeat(n):
          ..

      @repeat(3)
      def step():
          return 7
    cases:
      - call: "step()"
        expect: 7
      - call: "repeat(1)(lambda x: x + 1)(10)"
        expect: 11
      - call: "repeat(5)(lambda: 'a')()"
        expect: "a"
      - call: "callable(repeat(2))"
        expect: true
    hints:
      - "Нужно три уровня: repeat(n) возвращает decorator, decorator(func) возвращает wrapper. Где здесь захватывается n, а где func?"
      - "В wrapper заведите цикл на range(n), каждый раз присваивая result = func(*args, **kwargs), и верните result после цикла."
    solution: |
      def repeat(n):
          def decorator(func):
              def wrapper(*args, **kwargs):
                  result = None
                  for _ in range(n):
                      result = func(*args, **kwargs)
                  return result
              return wrapper
          return decorator

      @repeat(3)
      def step():
          return 7

  - id: write-tag-decorator-001
    concept: decorators-with-arguments
    type: python-function
    difficulty: 3
    prompt: "Напишите декоратор-фабрику `prefix(label)`: результат обёрнутой функции (строка) возвращается с приставкой `'[label] '` спереди. Применяется как `@prefix('INFO')`."
    starter: |
      def prefix(label):
          ..

      @prefix("INFO")
      def status():
          return "ok"
    cases:
      - call: "status()"
        expect: "[INFO] ok"
      - call: "prefix('WARN')(lambda: 'low disk')()"
        expect: "[WARN] low disk"
      - call: "prefix('')(lambda s: s)('x')"
        expect: "[] x"
    hints:
      - "Три уровня: prefix(label) -> decorator(func) -> wrapper. label захватывается на верхнем уровне и виден в обёртке."
      - "В wrapper верните f'[{label}] ' + func(*args, **kwargs)."
    solution: |
      def prefix(label):
          def decorator(func):
              def wrapper(*args, **kwargs):
                  return f"[{label}] " + func(*args, **kwargs)
              return wrapper
          return decorator

      @prefix("INFO")
      def status():
          return "ok"

  - id: write-clamp-decorator-001
    concept: decorators-with-arguments
    type: python-function
    difficulty: 4
    prompt: "Напишите декоратор-фабрику `clamp(low, high)`: числовой результат обёрнутой функции ограничивается отрезком [low, high] (значения ниже low поднимаются до low, выше high - опускаются до high). Применяется как `@clamp(0, 100)`."
    starter: |
      def clamp(low, high):
          ..

      @clamp(0, 100)
      def raw(x):
          return x
    cases:
      - call: "raw(50)"
        expect: 50
      - call: "raw(-20)"
        expect: 0
      - call: "raw(250)"
        expect: 100
      - call: "clamp(1, 10)(lambda a, b: a + b)(3, 4)"
        expect: 7
      - call: "clamp(1, 10)(lambda: 100)()"
        expect: 10
    hints:
      - "Фабрика clamp(low, high) захватывает обе границы; внутренняя обёртка ими пользуется. Сколько уровней def нужно?"
      - "Посчитайте результат func(*args, **kwargs), затем прижмите его к границам: не ниже low и не выше high."
      - "Удобно: max(low, min(high, result)) - сначала ограничиваете сверху, потом снизу."
    solution: |
      def clamp(low, high):
          def decorator(func):
              def wrapper(*args, **kwargs):
                  result = func(*args, **kwargs)
                  return max(low, min(high, result))
              return wrapper
          return decorator

      @clamp(0, 100)
      def raw(x):
          return x
