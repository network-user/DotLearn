exercises:
  - id: first-decorator-quiz-001
    concept: first-decorator
    type: theory-quiz
    difficulty: 1
    prompt: "What is `@log` above `def greet(): ..` equivalent to?"
    choices:
      - id: a
        text: "greet = log"
      - id: b
        text: "greet = log(greet)"
      - id: c
        text: "log = greet(log)"
      - id: d
        text: "greet() = log()"
    correct: [b]
    explanation: "@log is sugar: Python creates function greet, passes it to log, and reassigns the name greet to the result. The decorator applies once, at definition time."
    variants:
      - prompt: "Why does a decorator wrapper usually accept `*args, **kwargs`?"
        choices:
          - id: a
            text: "So the wrapper fits any function signature and forwards all arguments to the original function."
          - id: b
            text: "To speed up the call, without special-case setup for this flow."
          - id: c
            text: "To forbid passing keyword arguments, without special-case setup for this flow."
          - id: d
            text: "It is a requirement of @ syntax - without them the decorator will not apply."
        correct: [a]
        explanation: "*args/**kwargs in the signature collect any arguments, and func(*args, **kwargs) unpacks them back. One wrapper thus serves functions with different parameters."
      - prompt: "What does a decorated call return if the wrapper forgot `return func(..)`?"
        choices:
          - id: a
            text: "The original function's result - return is always implied."
          - id: b
            text: "None - the wrapper called the function but did not return its result."
          - id: c
            text: "TypeError on call for any payload and any deploy target."
          - id: d
            text: "The wrapper function itself under any load volume and data size."
        correct: [b]
        explanation: "A function without return returns None. If wrapper called func but did not write return, None goes outward and the real result is lost."

  - id: manual-decorate-predict-001
    concept: first-decorator
    type: predict-output
    difficulty: 2
    prompt: "What will this program print?"
    snippet: |
      def announce(func):
          def wrapper(*args, **kwargs):
              print("before")
              result = func(*args, **kwargs)
              print("after")
              return result
          return wrapper

      @announce
      def add(a, b):
          return a + b

      print(add(2, 3))
    expected:
      kind: stdout
      value: |-
        before
        after
        5
    hints:
      - "Calling add(2, 3) actually runs wrapper. In what order are 'before', 'after', and the result printed?"
      - "wrapper prints 'before', calls the original function, prints 'after', returns the result. print outputs that result from outside."

  - id: lost-result-predict-001
    concept: first-decorator
    type: predict-output
    difficulty: 2
    prompt: "What will this program print?"
    snippet: |
      def silent(func):
          def wrapper(*args, **kwargs):
              func(*args, **kwargs)
          return wrapper

      @silent
      def square(x):
          return x * x

      print(square(5))
    expected:
      kind: stdout
      value: "None"
    hints:
      - "square(5) runs wrapper. Is there a return statement in wrapper?"
      - "A function without return returns None. wrapper called square but did not return the result - what goes outward?"

  - id: write-twice-decorator-001
    concept: first-decorator
    type: python-function
    difficulty: 3
    prompt: "Write decorator `twice`: the wrapped function is called twice in a row with the same arguments, and the result of the second call is returned. The wrapper must fit any signature."
    starter: |
      def twice(func):
          ..

      @twice
      def shout(text):
          return text + "!"
    cases:
      - call: "shout('a')"
        expect: "a!"
      - call: "twice(lambda: 7)()"
        expect: 7
      - call: "twice(lambda x, y: x + y)(2, 3)"
        expect: 5
    hints:
      - "The decorator takes func and returns a wrapper. The wrapper must call func twice - what to return outward?"
      - "Signature wrapper(*args, **kwargs); inside call func(*args, **kwargs) twice and return the result of the second call."
    solution: |
      def twice(func):
          def wrapper(*args, **kwargs):
              func(*args, **kwargs)
              return func(*args, **kwargs)
          return wrapper

      @twice
      def shout(text):
          return text + "!"

  - id: write-default-on-error-001
    concept: first-decorator
    type: python-function
    difficulty: 4
    prompt: "Write decorator factory `safe(default)`: it returns a decorator that wraps a function so that on an exception inside the function it returns `default` instead of re-raising. On success it returns the normal result."
    starter: |
      def safe(default):
          ..

      @safe(0)
      def divide(a, b):
          return a // b
    cases:
      - call: "divide(10, 2)"
        expect: 5
      - call: "divide(10, 0)"
        expect: 0
      - call: "safe(-1)(lambda x: int(x))('not a number')"
        expect: -1
      - call: "safe('err')(lambda: [][0])()"
        expect: "err"
    hints:
      - "Three levels here: safe(default) returns a decorator, the decorator returns a wrapper, the wrapper calls the function. default is a free variable visible in the wrapper."
      - "In the wrapper wrap func(*args, **kwargs) in try/except and in the except branch return default."
      - "except Exception catches runtime errors from the function; do not catch BaseException too broadly."
    solution: |
      def safe(default):
          def decorator(func):
              def wrapper(*args, **kwargs):
                  try:
                      return func(*args, **kwargs)
                  except Exception:
                      return default
              return wrapper
          return decorator

      @safe(0)
      def divide(a, b):
          return a // b
