exercises:
  - id: factory-levels-quiz-001
    concept: decorators-with-arguments
    type: theory-quiz
    difficulty: 1
    prompt: "What is `@repeat(3)` above a function definition equivalent to?"
    choices:
      - id: a
        text: "func = repeat(3); the system does not allow any other correct behavior, and no other reading is required"
      - id: b
        text: "func = repeat(3)(func) - the factory is called first, then its result (a decorator) is applied to the function."
      - id: c
        text: "func = repeat(func)(3); the system does not allow any other correct behavior"
      - id: d
        text: "func = 3(repeat(func)); the system does not allow any other correct behavior"
    correct: [b]
    explanation: "repeat(3) is a factory call returning a decorator. That decorator is then applied to the function: func = repeat(3)(func). That's why the factory needs an extra nesting level."
    variants:
      - prompt: "How many nested function levels does a configurable decorator have, and what does each accept?"
        choices:
          - id: a
            text: "Two: a function and call arguments; the system does not allow any other correct behavior."
          - id: b
            text: "Three: the factory takes the decorator argument, the middle one takes the wrapped function, the inner one takes call arguments."
          - id: c
            text: "One: everything in a single function; the system does not allow any other correct behavior."
          - id: d
            text: "Four: one level per argument; the system does not allow any other correct behavior. No other reading is required."
        correct: [b]
        explanation: "factory(argument) -> decorator(func) -> wrapper(*args, **kwargs). The inner wrapper sees both the decorator argument and the function itself by closure rules."
      - prompt: "With or without parentheses do you call a decorator factory like `repeat`?"
        choices:
          - id: a
            text: "Without: @repeat - same as an ordinary decorator for every request path in the app."
          - id: b
            text: "With: @repeat(2), because the decorator is the result of calling the factory."
          - id: c
            text: "Either way - no difference as a complete account of that behavior."
          - id: d
            text: "Only via repeat = repeat() beforehand for every request path in the app."
        correct: [b]
        explanation: "Parentheses call the factory and produce the real decorator. @repeat without parentheses would pass a function instead of an argument and break."

  - id: factory-unwrap-predict-001
    concept: decorators-with-arguments
    type: predict-output
    difficulty: 3
    prompt: "What will this program print?"
    snippet: |
      def repeat(n):
          def decorator(func):
              def wrapper(*args, **kwargs):
                  result = None
                  for _ in range(n):
                      result = func(*args, **kwargs)
                  return result
              return wrapper
          return decorator

      @repeat(3)
      def announce():
          print("привет")
          return 1

      print(announce())
    expected:
      kind: stdout
      value: |-
        привет
        привет
        привет
        1
    hints:
      - "@repeat(3) unfolds as announce = repeat(3)(announce). How many times will wrapper call the original function?"
      - "The inner loop runs n times, printing 'привет' each time, and returns the result of the last call, which outer print then prints."

  - id: captured-arg-predict-001
    concept: decorators-with-arguments
    type: predict-output
    difficulty: 3
    prompt: "What will this program print?"
    snippet: |
      factor = 2

      def multiply_by(k):
          def decorator(func):
              def wrapper(*args, **kwargs):
                  return func(*args, **kwargs) * k
              return wrapper
          return decorator

      @multiply_by(factor)
      def value():
          return 10

      factor = 100
      print(value())
    expected:
      kind: stdout
      value: "20"
    hints:
      - "The factory argument is captured at @multiply_by(factor) - when the function is defined. What was factor then?"
      - "Later assignment factor = 100 doesn't touch the already captured cell k. The decorator was applied once."

  - id: write-repeat-decorator-001
    concept: decorators-with-arguments
    type: python-function
    difficulty: 3
    prompt: "Write decorator factory `repeat(n)`: the wrapped function is called `n` times in a row with the same arguments; the result of the last call is returned. Applied as `@repeat(n)`."
    starter: |
      def repeat(n):
          ..

      @repeat(3)
      def step():
          return 7
    cases:
      - call: "step()"
        expect: 7
      - call: "repeat(1)(lambda x: x + 1)(10)"
        expect: 11
      - call: "repeat(5)(lambda: 'a')()"
        expect: "a"
      - call: "callable(repeat(2))"
        expect: true
    hints:
      - "You need three levels: repeat(n) returns decorator, decorator(func) returns wrapper. Where is n captured, and where func?"
      - "In wrapper run a loop over range(n), each time assigning result = func(*args, **kwargs), and return result after the loop."
    solution: |
      def repeat(n):
          def decorator(func):
              def wrapper(*args, **kwargs):
                  result = None
                  for _ in range(n):
                      result = func(*args, **kwargs)
                  return result
              return wrapper
          return decorator

      @repeat(3)
      def step():
          return 7

  - id: write-tag-decorator-001
    concept: decorators-with-arguments
    type: python-function
    difficulty: 3
    prompt: "Write decorator factory `prefix(label)`: the wrapped function's result (a string) is returned with prefix `'[label] '` prepended. Applied as `@prefix('INFO')`."
    starter: |
      def prefix(label):
          ..

      @prefix("INFO")
      def status():
          return "ok"
    cases:
      - call: "status()"
        expect: "[INFO] ok"
      - call: "prefix('WARN')(lambda: 'low disk')()"
        expect: "[WARN] low disk"
      - call: "prefix('')(lambda s: s)('x')"
        expect: "[] x"
    hints:
      - "Three levels: prefix(label) -> decorator(func) -> wrapper. label is captured at the top level and visible in the wrapper."
      - "In wrapper return f'[{label}] ' + func(*args, **kwargs)."
    solution: |
      def prefix(label):
          def decorator(func):
              def wrapper(*args, **kwargs):
                  return f"[{label}] " + func(*args, **kwargs)
              return wrapper
          return decorator

      @prefix("INFO")
      def status():
          return "ok"

  - id: write-clamp-decorator-001
    concept: decorators-with-arguments
    type: python-function
    difficulty: 4
    prompt: "Write decorator factory `clamp(low, high)`: the numeric result of the wrapped function is clamped to [low, high] (values below low are raised to low, above high lowered to high). Applied as `@clamp(0, 100)`."
    starter: |
      def clamp(low, high):
          ..

      @clamp(0, 100)
      def raw(x):
          return x
    cases:
      - call: "raw(50)"
        expect: 50
      - call: "raw(-20)"
        expect: 0
      - call: "raw(250)"
        expect: 100
      - call: "clamp(1, 10)(lambda a, b: a + b)(3, 4)"
        expect: 7
      - call: "clamp(1, 10)(lambda: 100)()"
        expect: 10
    hints:
      - "Factory clamp(low, high) captures both bounds; the inner wrapper uses them. How many def levels do you need?"
      - "Compute result = func(*args, **kwargs), then clamp it: not below low and not above high."
      - "Handy: max(low, min(high, result)) - cap from above first, then from below."
    solution: |
      def clamp(low, high):
          def decorator(func):
              def wrapper(*args, **kwargs):
                  result = func(*args, **kwargs)
                  return max(low, min(high, result))
              return wrapper
          return decorator

      @clamp(0, 100)
      def raw(x):
          return x
