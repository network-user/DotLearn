exercises:
  - id: stack-order-quiz-001
    concept: stacking-decorators
    type: theory-quiz
    difficulty: 1
    prompt: "Чему эквивалентна запись `@outer` над `@inner` над `def func(): ...`?"
    choices:
      - id: a
        text: "func = inner(outer(func))"
      - id: b
        text: "func = outer(inner(func)) - применяются снизу вверх, верхний становится внешним слоем."
      - id: c
        text: "func = outer(func) + inner(func)"
      - id: d
        text: "func = func(outer, inner)"
    correct: [b]
    explanation: "Декораторы применяются снизу вверх: сначала @inner оборачивает функцию, затем @outer оборачивает результат. Верхний декоратор - самый внешний слой."
    variants:
      - prompt: "В каком порядке выполняется код «до вызова» в стеке @outer над @inner?"
        choices:
          - id: a
            text: "Снизу вверх: сначала inner, потом outer."
          - id: b
            text: "Сверху вниз: сначала outer, потом inner - вход идёт снаружи внутрь."
          - id: c
            text: "Одновременно."
          - id: d
            text: "Только верхний выполняется, нижний игнорируется."
        correct: [b]
        explanation: "Применяются декораторы снизу вверх, но выполняются снаружи внутрь: вызов входит в самый внешний слой (outer) первым и проваливается к функции."
      - prompt: "Почему важно класть @log выше @cache, а не наоборот?"
        choices:
          - id: a
            text: "Иначе программа не запустится."
          - id: b
            text: "Если cache снаружи, попадание в кэш вернёт результат досрочно, и log не увидит обслуженные кэшем вызовы."
          - id: c
            text: "log всегда должен быть нижним по правилам Python."
          - id: d
            text: "Разницы нет, это вопрос стиля."
        correct: [b]
        explanation: "Обрывающий декоратор (cache) может вернуть ответ сам, не дойдя до внутренних слоёв. Сквозной log ставят выше, чтобы он видел каждый вызов."

  - id: stack-tags-predict-001
    concept: stacking-decorators
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      def bold(func):
          def wrapper(*args, **kwargs):
              return "<b>" + func(*args, **kwargs) + "</b>"
          return wrapper

      def italic(func):
          def wrapper(*args, **kwargs):
              return "<i>" + func(*args, **kwargs) + "</i>"
          return wrapper

      @bold
      @italic
      def text():
          return "привет"

      print(text())
    expected:
      kind: stdout
      value: "<b><i>привет</i></b>"
    hints:
      - "Верхний декоратор - внешний слой. Чьи теги окажутся снаружи: bold или italic?"
      - "bold оборачивает результат italic, а italic оборачивает 'привет'. Соберите строку слоями изнутри наружу."

  - id: stack-trace-predict-001
    concept: stacking-decorators
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      def outer(func):
          def wrapper(*args, **kwargs):
              print("outer до")
              result = func(*args, **kwargs)
              print("outer после")
              return result
          return wrapper

      def inner(func):
          def wrapper(*args, **kwargs):
              print("inner до")
              result = func(*args, **kwargs)
              print("inner после")
              return result
          return wrapper

      @outer
      @inner
      def task():
          print("тело")

      task()
    expected:
      kind: stdout
      value: |-
        outer до
        inner до
        тело
        inner после
        outer после
    hints:
      - "Вход идёт снаружи внутрь: какой слой внешний - outer или inner? Код 'до' печатается на спуске, код 'после' - на подъёме."
      - "Симметрия стека: 'до' сверху вниз, тело на дне, 'после' снизу вверх в обратном порядке."

  - id: apply-order-predict-001
    concept: stacking-decorators
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа в момент определения функции?"
    snippet: |
      def announce(name):
          def decorator(func):
              print("навешиваю", name)
              return func
          return decorator

      @announce("верхний")
      @announce("нижний")
      def f():
          pass
    expected:
      kind: stdout
      value: |-
        навешиваю нижний
        навешиваю верхний
    hints:
      - "Декораторы применяются снизу вверх - какой из двух @announce сработает первым?"
      - "Здесь печать стоит в самом decorator, то есть выполняется в момент навешивания, а не при вызове f. Ближний к def применяется раньше."

  - id: write-stacked-wrap-001
    concept: stacking-decorators
    type: python-function
    difficulty: 3
    prompt: "Даны два декоратора-обёртки тегов. Реализуйте `brackets(func)` и `parens(func)` так, чтобы `brackets` оборачивал результат в `[...]`, а `parens` - в `(...)`. Проверка применит их стеком."
    starter: |
      def brackets(func):
          ...

      def parens(func):
          ...

      @brackets
      @parens
      def word():
          return "hi"
    cases:
      - call: "word()"
        expect: "[(hi)]"
      - call: "brackets(lambda: 'x')()"
        expect: "[x]"
      - call: "parens(lambda s: s)('y')"
        expect: "(y)"
    hints:
      - "Каждый декоратор - обычная обёртка: оборачивает результат func в свои символы. Верхний @brackets станет внешним слоем."
      - "В brackets верните '[' + func(...) + ']', в parens - '(' + func(...) + ')'. Стек соберёт [(...)] сам."
    solution: |
      def brackets(func):
          def wrapper(*args, **kwargs):
              return "[" + func(*args, **kwargs) + "]"
          return wrapper

      def parens(func):
          def wrapper(*args, **kwargs):
              return "(" + func(*args, **kwargs) + ")"
          return wrapper

      @brackets
      @parens
      def word():
          return "hi"

  - id: write-order-log-001
    concept: stacking-decorators
    type: python-function
    difficulty: 4
    prompt: "Реализуйте декоратор `trace(events)`-фабрику: при вызове обёрнутой функции она дописывает в список `events` строку `'enter'` до вызова и `'exit'` после. Список передаётся фабрике, чтобы можно было наблюдать порядок при стеке. Возвращайте результат функции без изменений."
    starter: |
      def trace(events):
          ...
    cases:
      - call: "(lambda log: [trace(log)(lambda: 1)(), log])([])[1]"
        expect: ["enter", "exit"]
      - call: "trace([])(lambda x: x * 2)(21)"
        expect: 42
      - call: "(lambda log: [trace(log)(trace(log)(lambda: 0))(), log])([])[1]"
        expect: ["enter", "enter", "exit", "exit"]
    hints:
      - "Три уровня: trace(events) -> decorator(func) -> wrapper. events захвачен фабрикой и виден в обёртке."
      - "В wrapper сначала events.append('enter'), затем result = func(...), затем events.append('exit'), верните result."
      - "При стеке внешний слой добавит 'enter' первым и 'exit' последним - проверьте на вложенном случае."
    solution: |
      def trace(events):
          def decorator(func):
              def wrapper(*args, **kwargs):
                  events.append("enter")
                  result = func(*args, **kwargs)
                  events.append("exit")
                  return result
              return wrapper
          return decorator
