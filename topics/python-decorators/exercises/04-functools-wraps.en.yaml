exercises:
  - id: wraps-why-quiz-001
    concept: functools-wraps
    type: theory-quiz
    difficulty: 1
    prompt: "Why does a decorator need `functools.wraps`?"
    choices:
      - id: a
        text: "To speed up the wrapped function."
      - id: b
        text: "To copy metadata (__name__, __doc__, etc.) from the original function onto the wrapper; otherwise it is lost."
      - id: c
        text: "To let the decorator accept arguments."
      - id: d
        text: "To forbid decorating a function twice."
    correct: [b]
    explanation: "Without wraps the function name points at wrapper, so __name__ becomes 'wrapper' and __doc__ becomes None. functools.wraps transfers the original's metadata onto the wrapper."
    variants:
      - prompt: "Which function do you put `@functools.wraps(func)` on, and what do you pass as the argument?"
        choices:
          - id: a
            text: "On the wrapper; pass the original (func) as the argument."
          - id: b
            text: "On the original (func); pass the wrapper as the argument."
          - id: c
            text: "On the whole decorator; no argument needed."
          - id: d
            text: "On either one - order does not matter."
        correct: [a]
        explanation: "wraps(func) is a decorator for the wrapper: put it above wrapper, and pass func (the original) as the source of metadata to copy."
      - prompt: "Which attribute does functools.wraps add so you can reach the original from under the wrapper?"
        choices:
          - id: a
            text: "__origin__"
          - id: b
            text: "__inner__"
          - id: c
            text: "__wrapped__"
          - id: d
            text: "__source__"
        correct: [c]
        explanation: "wraps sets __wrapped__ on the wrapper pointing at the original function. inspect.signature also follows it to the real parameters."

  - id: lost-name-predict-001
    concept: functools-wraps
    type: predict-output
    difficulty: 2
    prompt: "What will this program print?"
    snippet: |
      def log_call(func):
          def wrapper(*args, **kwargs):
              return func(*args, **kwargs)
          return wrapper

      @log_call
      def add(a, b):
          "Складывает."
          return a + b

      print(add.__name__)
    expected:
      kind: stdout
      value: "wrapper"
    hints:
      - "After decoration the name add points at the object the decorator returned. Which object is that?"
      - "The decorator returned wrapper, and __name__ reads that object's name. wraps is not applied here."

  - id: wraps-restores-predict-001
    concept: functools-wraps
    type: predict-output
    difficulty: 2
    prompt: "What will this program print?"
    snippet: |
      import functools

      def log_call(func):
          @functools.wraps(func)
          def wrapper(*args, **kwargs):
              return func(*args, **kwargs)
          return wrapper

      @log_call
      def add(a, b):
          "Складывает."
          return a + b

      print(add.__name__, add.__doc__)
    expected:
      kind: stdout
      value: "add Складывает."
    hints:
      - "@functools.wraps(func) above the wrapper copies the original's metadata. What do __name__ and __doc__ return now?"
      - "wraps transfers __name__ and __doc__ from the original onto wrapper, so from the outside add looks like the original again."

  - id: wraps-blanks-001
    concept: functools-wraps
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the decorator so the decorated function keeps its name and docstring."
    template: |
      import functools

      def log_call(func):
          @functools.{{wraps_call}}
          def wrapper(*args, **kwargs):
              return func(*args, **kwargs)
          return wrapper
    blanks:
      wraps_call:
        accept: ["wraps(func)"]
        accept_regex: '^wraps\(func\)$'
    hints:
      - "Metadata is lost because wrapper faces outward. Which functools tool transfers it onto the wrapper?"
      - "It needs the original function as the source: functools.wraps takes func."
    variants:
      - prompt: "Complete the decorator: add the missing import and call that preserves metadata."
        template: |
          import {{module}}

          def timed(func):
              @functools.wraps(func)
              def wrapper(*args, **kwargs):
                  return func(*args, **kwargs)
              return wrapper
        blanks:
          module:
            accept: ["functools"]
            accept_regex: '^functools$'
      - prompt: "Complete: which object should receive the original so metadata is copied onto the wrapper?"
        template: |
          import functools

          def cached(func):
              @functools.wraps({{original}})
              def wrapper(*args, **kwargs):
                  return func(*args, **kwargs)
              return wrapper
        blanks:
          original:
            accept: ["func"]
            accept_regex: '^func$'

  - id: write-preserving-decorator-001
    concept: functools-wraps
    type: python-function
    difficulty: 3
    prompt: "Write decorator `noop` that changes nothing in the function's behavior (just forwards the call) but preserves its `__name__` and `__doc__` via functools.wraps. Hint: import functools inside your solution."
    starter: |
      import functools

      def noop(func):
          ...

      @noop
      def greet(name):
          "Здоровается."
          return "привет, " + name
    cases:
      - call: "greet('Аня')"
        expect: "привет, Аня"
      - call: "greet.__name__"
        expect: "greet"
      - call: "greet.__doc__"
        expect: "Здоровается."
      - call: "greet.__wrapped__('Боб')"
        expect: "привет, Боб"
    hints:
      - "Usual structure: decorator takes func, returns wrapper, wrapper forwards the call. What do you add so metadata isn't lost?"
      - "Put @functools.wraps(func) on wrapper; that's what transfers __name__, __doc__, and sets __wrapped__."
    solution: |
      import functools

      def noop(func):
          @functools.wraps(func)
          def wrapper(*args, **kwargs):
              return func(*args, **kwargs)
          return wrapper

      @noop
      def greet(name):
          "Здоровается."
          return "привет, " + name
