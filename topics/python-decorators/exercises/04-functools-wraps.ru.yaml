exercises:
  - id: wraps-why-quiz-001
    concept: functools-wraps
    type: theory-quiz
    difficulty: 1
    prompt: "Зачем декоратору нужен `functools.wraps`?"
    choices:
      - id: a
        text: "Чтобы ускорить обёрнутую функцию."
      - id: b
        text: "Чтобы скопировать метаданные (__name__, __doc__ и др.) с исходной функции на обёртку, иначе они теряются."
      - id: c
        text: "Чтобы разрешить декоратору принимать аргументы."
      - id: d
        text: "Чтобы запретить повторное декорирование функции."
    correct: [b]
    explanation: "Без wraps имя функции указывает на wrapper, поэтому __name__ становится 'wrapper', а __doc__ - None. functools.wraps переносит метаданные оригинала на обёртку."
    variants:
      - prompt: "На какую функцию навешивают `@functools.wraps(func)` и что передают ему аргументом?"
        choices:
          - id: a
            text: "На обёртку (wrapper); аргументом передают оригинал (func)."
          - id: b
            text: "На оригинал (func); аргументом передают обёртку."
          - id: c
            text: "На декоратор целиком; аргумент не нужен."
          - id: d
            text: "На любую из двух - порядок не важен."
        correct: [a]
        explanation: "wraps(func) - декоратор обёртки: его ставят над wrapper, а func (оригинал) передают как источник метаданных для копирования."
      - prompt: "Какой атрибут добавляет functools.wraps, чтобы добраться до оригинала из-под обёртки?"
        choices:
          - id: a
            text: "__origin__"
          - id: b
            text: "__inner__"
          - id: c
            text: "__wrapped__"
          - id: d
            text: "__source__"
        correct: [c]
        explanation: "wraps кладёт на обёртку __wrapped__, указывающий на исходную функцию. По нему же inspect.signature поднимается к настоящим параметрам."

  - id: lost-name-predict-001
    concept: functools-wraps
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      def log_call(func):
          def wrapper(*args, **kwargs):
              return func(*args, **kwargs)
          return wrapper

      @log_call
      def add(a, b):
          "Складывает."
          return a + b

      print(add.__name__)
    expected:
      kind: stdout
      value: "wrapper"
    hints:
      - "После декорирования имя add указывает на объект, который вернул декоратор. Какой это объект?"
      - "Декоратор вернул wrapper, и __name__ читает имя именно этого объекта. wraps здесь не применён."

  - id: wraps-restores-predict-001
    concept: functools-wraps
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      import functools

      def log_call(func):
          @functools.wraps(func)
          def wrapper(*args, **kwargs):
              return func(*args, **kwargs)
          return wrapper

      @log_call
      def add(a, b):
          "Складывает."
          return a + b

      print(add.__name__, add.__doc__)
    expected:
      kind: stdout
      value: "add Складывает."
    hints:
      - "@functools.wraps(func) над обёрткой копирует метаданные оригинала. Что теперь вернут __name__ и __doc__?"
      - "wraps переносит __name__ и __doc__ с исходной функции на wrapper, поэтому снаружи add снова выглядит как оригинал."

  - id: wraps-blanks-001
    concept: functools-wraps
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните декоратор так, чтобы декорированная функция сохраняла своё имя и документацию."
    template: |
      import functools

      def log_call(func):
          @functools.{{wraps_call}}
          def wrapper(*args, **kwargs):
              return func(*args, **kwargs)
          return wrapper
    blanks:
      wraps_call:
        accept: ["wraps(func)"]
        accept_regex: '^wraps\(func\)$'
    hints:
      - "Метаданные теряются, потому что наружу смотрит wrapper. Какой инструмент из functools переносит их на обёртку?"
      - "Ему нужно передать оригинальную функцию как источник: functools.wraps принимает func."
    variants:
      - prompt: "Дополните декоратор: добавьте недостающий импорт и вызов, сохраняющий метаданные."
        template: |
          import {{module}}

          def timed(func):
              @functools.wraps(func)
              def wrapper(*args, **kwargs):
                  return func(*args, **kwargs)
              return wrapper
        blanks:
          module:
            accept: ["functools"]
            accept_regex: '^functools$'
      - prompt: "Дополните: какому объекту передать оригинал, чтобы скопировать метаданные на обёртку?"
        template: |
          import functools

          def cached(func):
              @functools.wraps({{original}})
              def wrapper(*args, **kwargs):
                  return func(*args, **kwargs)
              return wrapper
        blanks:
          original:
            accept: ["func"]
            accept_regex: '^func$'

  - id: write-preserving-decorator-001
    concept: functools-wraps
    type: python-function
    difficulty: 3
    prompt: "Напишите декоратор `noop`, который ничего не меняет в поведении функции (просто прокидывает вызов), но сохраняет её `__name__` и `__doc__` через functools.wraps. Подсказка: импортируйте functools внутри решения."
    starter: |
      import functools

      def noop(func):
          ...

      @noop
      def greet(name):
          "Здоровается."
          return "привет, " + name
    cases:
      - call: "greet('Аня')"
        expect: "привет, Аня"
      - call: "greet.__name__"
        expect: "greet"
      - call: "greet.__doc__"
        expect: "Здоровается."
      - call: "greet.__wrapped__('Боб')"
        expect: "привет, Боб"
    hints:
      - "Структура обычная: декоратор принимает func, возвращает wrapper, wrapper прокидывает вызов. Что добавить, чтобы метаданные не потерялись?"
      - "Навесьте @functools.wraps(func) на wrapper; именно он перенесёт __name__, __doc__ и проставит __wrapped__."
    solution: |
      import functools

      def noop(func):
          @functools.wraps(func)
          def wrapper(*args, **kwargs):
              return func(*args, **kwargs)
          return wrapper

      @noop
      def greet(name):
          "Здоровается."
          return "привет, " + name
