exercises:
  - id: stack-order-quiz-001
    concept: stacking-decorators
    type: theory-quiz
    difficulty: 1
    prompt: "What is `@outer` above `@inner` above `def func(): ...` equivalent to?"
    choices:
      - id: a
        text: "func = inner(outer(func))"
      - id: b
        text: "func = outer(inner(func)) - applied bottom to top, the top one becomes the outer layer."
      - id: c
        text: "func = outer(func) + inner(func)"
      - id: d
        text: "func = func(outer, inner)"
    correct: [b]
    explanation: "Decorators are applied bottom to top: first @inner wraps the function, then @outer wraps the result. The top decorator is the outermost layer."
    variants:
      - prompt: "In what order does 'before call' code run in a stack of @outer above @inner?"
        choices:
          - id: a
            text: "Bottom to top: inner first, then outer."
          - id: b
            text: "Top to bottom: outer first, then inner - entry goes outside in."
          - id: c
            text: "Simultaneously."
          - id: d
            text: "Only the top one runs; the lower one is ignored."
        correct: [b]
        explanation: "Decorators are applied bottom to top, but execute outside in: the call enters the outermost layer (outer) first and sinks toward the function."
      - prompt: "Why is it important to put @log above @cache, not the other way around?"
        choices:
          - id: a
            text: "Otherwise the program won't start."
          - id: b
            text: "If cache is outside, a cache hit returns early and log won't see cache-served calls."
          - id: c
            text: "log must always be the lower decorator by Python rules."
          - id: d
            text: "No difference - it's a style question."
        correct: [b]
        explanation: "A short-circuiting decorator (cache) can return on its own without reaching inner layers. Put cross-cutting log above so it sees every call."

  - id: stack-tags-predict-001
    concept: stacking-decorators
    type: predict-output
    difficulty: 2
    prompt: "What will this program print?"
    snippet: |
      def bold(func):
          def wrapper(*args, **kwargs):
              return "<b>" + func(*args, **kwargs) + "</b>"
          return wrapper

      def italic(func):
          def wrapper(*args, **kwargs):
              return "<i>" + func(*args, **kwargs) + "</i>"
          return wrapper

      @bold
      @italic
      def text():
          return "привет"

      print(text())
    expected:
      kind: stdout
      value: "<b><i>привет</i></b>"
    hints:
      - "The top decorator is the outer layer. Whose tags end up outside: bold or italic?"
      - "bold wraps italic's result, and italic wraps 'привет'. Build the string layer by layer from inside out."

  - id: stack-trace-predict-001
    concept: stacking-decorators
    type: predict-output
    difficulty: 3
    prompt: "What will this program print?"
    snippet: |
      def outer(func):
          def wrapper(*args, **kwargs):
              print("outer до")
              result = func(*args, **kwargs)
              print("outer после")
              return result
          return wrapper

      def inner(func):
          def wrapper(*args, **kwargs):
              print("inner до")
              result = func(*args, **kwargs)
              print("inner после")
              return result
          return wrapper

      @outer
      @inner
      def task():
          print("тело")

      task()
    expected:
      kind: stdout
      value: |-
        outer до
        inner до
        тело
        inner после
        outer после
    hints:
      - "Entry goes outside in: which layer is outer - outer or inner? 'before' code prints on the way down, 'after' on the way up."
      - "Stack symmetry: 'before' top to bottom, body at the bottom, 'after' bottom to top in reverse order."

  - id: apply-order-predict-001
    concept: stacking-decorators
    type: predict-output
    difficulty: 3
    prompt: "What will this program print when the function is defined?"
    snippet: |
      def announce(name):
          def decorator(func):
              print("навешиваю", name)
              return func
          return decorator

      @announce("верхний")
      @announce("нижний")
      def f():
          pass
    expected:
      kind: stdout
      value: |-
        навешиваю нижний
        навешиваю верхний
    hints:
      - "Decorators are applied bottom to top - which of the two @announce runs first?"
      - "The print is in decorator itself, so it runs at hang time, not when f is called. The one closer to def applies first."

  - id: write-stacked-wrap-001
    concept: stacking-decorators
    type: python-function
    difficulty: 3
    prompt: "Given two tag wrapper decorators, implement `brackets(func)` and `parens(func)` so `brackets` wraps the result in `[...]` and `parens` in `(...)`. Tests will apply them as a stack."
    starter: |
      def brackets(func):
          ...

      def parens(func):
          ...

      @brackets
      @parens
      def word():
          return "hi"
    cases:
      - call: "word()"
        expect: "[(hi)]"
      - call: "brackets(lambda: 'x')()"
        expect: "[x]"
      - call: "parens(lambda s: s)('y')"
        expect: "(y)"
    hints:
      - "Each decorator is an ordinary wrapper: wrap func's result in its symbols. Top @brackets becomes the outer layer."
      - "In brackets return '[' + func(...) + ']'; in parens '(' + func(...) + ')'. The stack assembles [(...)] itself."
    solution: |
      def brackets(func):
          def wrapper(*args, **kwargs):
              return "[" + func(*args, **kwargs) + "]"
          return wrapper

      def parens(func):
          def wrapper(*args, **kwargs):
              return "(" + func(*args, **kwargs) + ")"
          return wrapper

      @brackets
      @parens
      def word():
          return "hi"

  - id: write-order-log-001
    concept: stacking-decorators
    type: python-function
    difficulty: 4
    prompt: "Implement decorator factory `trace(events)`: on each call of the wrapped function it appends `'enter'` to list `events` before the call and `'exit'` after. The list is passed to the factory so you can observe order in a stack. Return the function result unchanged."
    starter: |
      def trace(events):
          ...
    cases:
      - call: "(lambda log: [trace(log)(lambda: 1)(), log])([])[1]"
        expect: ["enter", "exit"]
      - call: "trace([])(lambda x: x * 2)(21)"
        expect: 42
      - call: "(lambda log: [trace(log)(trace(log)(lambda: 0))(), log])([])[1]"
        expect: ["enter", "enter", "exit", "exit"]
    hints:
      - "Three levels: trace(events) -> decorator(func) -> wrapper. events is captured by the factory and visible in the wrapper."
      - "In wrapper: events.append('enter'), then result = func(...), then events.append('exit'), return result."
      - "In a stack the outer layer adds 'enter' first and 'exit' last - check the nested case."
    solution: |
      def trace(events):
          def decorator(func):
              def wrapper(*args, **kwargs):
                  events.append("enter")
                  result = func(*args, **kwargs)
                  events.append("exit")
                  return result
              return wrapper
          return decorator
