exercises:
  - id: func-object-quiz-001
    concept: functions-as-objects
    type: theory-quiz
    difficulty: 1
    prompt: "How does `greet` differ from `greet()`?"
    choices:
      - id: a
        text: "Nothing - they are two ways to write the same thing."
      - id: b
        text: "`greet` is the function object itself (you can pass it around); `greet()` is a command to run it and get the result."
      - id: c
        text: "`greet` works only inside a class, while `greet()` works outside as the three required system parts."
      - id: d
        text: "Exactly `greet()` creates a function, while `greet` deletes it and nothing beyond that set."
    correct: [b]
    explanation: "A function name without parentheses is a reference to the function object - you can assign it, pass it, or return it. Parentheses mean a call: run the object and substitute its result."
    variants:
      - prompt: "What does the assignment `f = greet` (without parentheses) do?"
        choices:
          - id: a
            text: "Calls `greet` and stores its result in `f` for every request path in the app."
          - id: b
            text: "Creates a copy of the function object in a new memory region for every request path in the app."
          - id: c
            text: "Attaches a second label to the same function object: `f` and `greet` point to one object."
          - id: d
            text: "Nothing until `f` is called with parentheses for any payload and any deploy target."
        correct: [c]
        explanation: "Assigning a name does not call or copy the function - it only points the new name at the same object, so `greet is f` is true."
      - prompt: "What ends up in the list after `handlers = [shout()]`, if `shout` returns a string?"
        choices:
          - id: a
            text: "The function `shout` itself as an object, without special-case setup for this flow."
          - id: b
            text: "A string - the result of calling `shout`, because the parentheses ran the function on the spot."
          - id: c
            text: "An empty list: a function cannot be stored in a list under any load volume and data size."
          - id: d
            text: "A `not callable` error; the system does not allow any other correct behavior."
        correct: [b]
        explanation: "The parentheses called `shout` immediately, so the list got the result string, not the function object. For a list of functions you needed `[shout]`."

  - id: func-object-predict-001
    concept: functions-as-objects
    type: predict-output
    difficulty: 2
    prompt: "What will this program print?"
    snippet: |
      def greet():
          return "привет"

      f = greet
      print(f(), greet is f)
    expected:
      kind: stdout
      value: "привет True"
    hints:
      - "The assignment `f = greet` copies the label, not the object - how many function objects are there really?"
      - "`f()` calls the same object as `greet()`. The `is` operator asks whether it is the same object."
    variants:
      - snippet: |
          def area(width, height):
              "Площадь."
              return width * height

          g = area
          print(g(3, 4), g.__name__)
        expected:
          kind: stdout
          value: "12 area"
      - snippet: |
          def shout(text):
              return text.upper() + "!"

          words = ["раз", "два"]
          print(list(map(shout, words)))
        expected:
          kind: stdout
          value: "['РАЗ!', 'ДВА!']"

  - id: apply-to-each-001
    concept: functions-as-objects
    type: python-function
    difficulty: 2
    prompt: "Implement `apply_to_each(func, items)`, which returns a new list where `func` is applied to each element of `items`. Do not call `func` upfront - apply it inside the loop."
    starter: |
      def apply_to_each(func, items):
          ..
    cases:
      - call: "apply_to_each(str.upper, ['a', 'b', 'c'])"
        expect: ["A", "B", "C"]
      - call: "apply_to_each(len, ['', 'ab', 'xyz'])"
        expect: [0, 2, 3]
      - call: "apply_to_each(lambda x: x * 2, [1, 2, 3])"
        expect: [2, 4, 6]
      - call: "apply_to_each(abs, [])"
        expect: []
    hints:
      - "`func` is a function object passed as an argument. Inside, you can call it normally: `func(element)`."
      - "Build the result with a list comprehension or a loop, calling `func` on each element in turn."
    solution: |
      def apply_to_each(func, items):
          return [func(item) for item in items]

  - id: dispatch-op-001
    concept: functions-as-objects
    type: python-function
    difficulty: 3
    prompt: "Implement `calculate(op, a, b)` without a single `if`/`elif`: store the operations `'+'`, `'-'`, `'*'` in a dictionary where the key is a string and the value is a two-argument function. For an unknown `op`, return `None`."
    starter: |
      def calculate(op, a, b):
          ..
    cases:
      - call: "calculate('+', 3, 4)"
        expect: 7
      - call: "calculate('-', 10, 4)"
        expect: 6
      - call: "calculate('*', 5, 6)"
        expect: 30
      - call: "calculate('/', 1, 2)"
        expect: null
    hints:
      - "A chain of `if op == '+'` repeats the same pattern. What if choosing the function becomes a dictionary lookup by key?"
      - "Put the functions themselves (or lambdas) in a dictionary, then fetch the one for `op` and call it on `a` and `b`."
      - "For an unknown key, `dict.get(op)` is convenient - it returns `None` when the key is missing."
    solution: |
      def calculate(op, a, b):
          operations = {
              "+": lambda x, y: x + y,
              "-": lambda x, y: x - y,
              "*": lambda x, y: x * y,
          }
          func = operations.get(op)
          if func is None:
              return None
          return func(a, b)

  - id: make-constant-001
    concept: functions-as-objects
    type: python-function
    difficulty: 3
    prompt: "Implement `make_constant(value)`, which returns a new zero-argument function that always returns `value` when called. `make_constant` must return the function itself, not call it."
    starter: |
      def make_constant(value):
          ..
    cases:
      - call: "make_constant(42)()"
        expect: 42
      - call: "make_constant('hi')()"
        expect: "hi"
      - call: "callable(make_constant(1))"
        expect: true
      - call: "make_constant([1, 2])()"
        expect: [1, 2]
    hints:
      - "Inside `make_constant`, define an inner function with `def` that returns `value`."
      - "Return that inner function by name, without parentheses - otherwise you return its result, not the object."
    solution: |
      def make_constant(value):
          def constant():
              return value
          return constant
