exercises:
  - id: class-decorator-quiz-001
    concept: class-decorators
    type: theory-quiz
    difficulty: 1
    prompt: "What does `@register` above `class User: ...` mean?"
    choices:
      - id: a
        text: "User = register(User) - the decorator gets a class and returns a class (usually the same one)."
      - id: b
        text: "register = User(register)"
      - id: c
        text: "Creates a new User instance."
      - id: d
        text: "Forbids inheriting from User."
    correct: [a]
    explanation: "@ above a class follows the same rule as above a function. A class decorator gets a class object, can augment it, and must return a class."
    variants:
      - prompt: "What is needed so a class instance can be used as a decorator wrapper?"
        choices:
          - id: a
            text: "__init__ that takes the function, and __call__ that plays the wrapper role."
          - id: b
            text: "Only a __repr__ method."
          - id: c
            text: "Inheritance from a Decorator class."
          - id: d
            text: "Nothing special - any class is already callable."
        correct: [a]
        explanation: "A class can be a decorator: __init__ takes the wrapped function, __call__ makes the instance callable and works as the wrapper. State lives in instance fields."
      - prompt: "Where does a class-decorator store state (for example, a call counter)?"
        choices:
          - id: a
            text: "In a closure via nonlocal."
          - id: b
            text: "In instance fields (self.count), reachable from outside as an attribute."
          - id: c
            text: "In a global variable."
          - id: d
            text: "State cannot be stored."
        correct: [b]
        explanation: "Unlike a function-decorator, a class-decorator keeps state in self. Bonus: it's reachable outside, e.g. hello.count."

  - id: class-decorator-predict-001
    concept: class-decorators
    type: predict-output
    difficulty: 2
    prompt: "What will this program print?"
    snippet: |
      class CountCalls:
          def __init__(self, func):
              self.func = func
              self.count = 0

          def __call__(self, *args, **kwargs):
              self.count += 1
              return self.func(*args, **kwargs)

      @CountCalls
      def hello():
          return "привет"

      hello()
      hello()
      print(hello.count)
    expected:
      kind: stdout
      value: "2"
    hints:
      - "@CountCalls means hello = CountCalls(hello). What is the name hello now - a function or an instance?"
      - "Each hello() runs __call__, which increments self.count. How many calls were there?"

  - id: registry-predict-001
    concept: class-decorators
    type: predict-output
    difficulty: 2
    prompt: "What will this program print?"
    snippet: |
      PLUGINS = {}

      def plugin(cls):
          PLUGINS[cls.__name__] = cls
          return cls

      @plugin
      class Exporter:
          pass

      @plugin
      class Importer:
          pass

      print(sorted(PLUGINS))
    expected:
      kind: stdout
      value: "['Exporter', 'Importer']"
    hints:
      - "Each @plugin at class definition adds it to the dict by name. Which classes registered?"
      - "sorted on a dict gives a sorted list of its keys - class names."

  - id: write-add-method-001
    concept: class-decorators
    type: python-function
    difficulty: 3
    prompt: "Write class decorator `with_double` that adds method `double(self)` to the class, returning `self.value * 2`. The decorator must return the same class."
    starter: |
      def with_double(cls):
          ...

      @with_double
      class Box:
          def __init__(self, value):
              self.value = value
    cases:
      - call: "Box(5).double()"
        expect: 10
      - call: "Box(0).double()"
        expect: 0
      - call: "Box(-3).double()"
        expect: -6
      - call: "with_double(Box) is Box"
        expect: true
    hints:
      - "A class decorator gets cls. Define function double(self) and bind it to the class as an attribute."
      - "cls.double = double adds the method; don't forget to return cls, or the class name becomes None."
    solution: |
      def with_double(cls):
          def double(self):
              return self.value * 2
          cls.double = double
          return cls

      @with_double
      class Box:
          def __init__(self, value):
              self.value = value

  - id: write-count-calls-class-001
    concept: class-decorators
    type: python-function
    difficulty: 3
    prompt: "Write class-decorator `CountCalls`: it wraps a function, counts calls in field `count` (initially 0), and forwards calls with any arguments. After decoration `count` must be reachable as an attribute."
    starter: |
      class CountCalls:
          ...

      @CountCalls
      def ping():
          return "pong"
    cases:
      - call: "ping()"
        expect: "pong"
      - call: "(lambda: [ping(), ping(), ping(), ping.count])()[3]"
        expect: 3
      - call: "CountCalls(lambda x: x + 1).count"
        expect: 0
      - call: "CountCalls(lambda x: x + 1)(41)"
        expect: 42
    hints:
      - "__init__ takes func, stores it in self.func and sets self.count = 0. What makes the instance callable?"
      - "Method __call__(self, *args, **kwargs) increments self.count, calls self.func, and returns the result."
    solution: |
      class CountCalls:
          def __init__(self, func):
              self.func = func
              self.count = 0

          def __call__(self, *args, **kwargs):
              self.count += 1
              return self.func(*args, **kwargs)

      @CountCalls
      def ping():
          return "pong"

  - id: write-singleton-001
    concept: class-decorators
    type: python-function
    difficulty: 4
    prompt: "Write class decorator `singleton`: it guarantees at most one instance of the class - repeated calls return the same object. Return a wrapper function that creates an instance on first call and caches it."
    starter: |
      def singleton(cls):
          ...

      @singleton
      class Config:
          def __init__(self):
              self.value = 0
    cases:
      - call: "Config() is Config()"
        expect: true
      - call: "(lambda: [setattr(Config(), 'value', 9), Config().value])()[1]"
        expect: 9
      - call: "isinstance(Config(), object)"
        expect: true
    hints:
      - "Idea: store the created instance and on later calls return the same one. Where is it convenient to keep that single instance?"
      - "Create a variable in the closure (e.g. instance=None), return function get() that creates cls() only if there's no instance yet."
      - "You'll need nonlocal so the wrapper can assign the closure variable on first creation."
    solution: |
      def singleton(cls):
          instance = None
          def get(*args, **kwargs):
              nonlocal instance
              if instance is None:
                  instance = cls(*args, **kwargs)
              return instance
          return get

      @singleton
      class Config:
          def __init__(self):
              self.value = 0
