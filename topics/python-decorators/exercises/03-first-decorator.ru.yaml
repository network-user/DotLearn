exercises:
  - id: first-decorator-quiz-001
    concept: first-decorator
    type: theory-quiz
    difficulty: 1
    prompt: "Чему эквивалентна запись `@log` над `def greet(): ..`?"
    choices:
      - id: a
        text: "greet = log"
      - id: b
        text: "greet = log(greet)"
      - id: c
        text: "log = greet(log)"
      - id: d
        text: "greet() = log()"
    correct: [b]
    explanation: "@log - сахар: Python создаёт функцию greet, передаёт её в log и переприсваивает имя greet результату. Декоратор применяется один раз, в момент определения."
    variants:
      - prompt: "Зачем декоратор-обёртка обычно принимает `*args, **kwargs`?"
        choices:
          - id: a
            text: "Чтобы обёртка подходила к функции с любой сигнатурой и прокидывала все аргументы в исходную функцию."
          - id: b
            text: "Чтобы ускорить вызов; другого корректного поведения система не допускает."
          - id: c
            text: "Чтобы запретить передачу именованных аргументов, независимо от входных данных и окружения."
          - id: d
            text: "Это требование синтаксиса @ - без них декоратор не применится как полное описание этого поведения."
        correct: [a]
        explanation: "*args/**kwargs в сигнатуре собирают любые аргументы, а в вызове func(*args, **kwargs) распаковывают их обратно. Так одна обёртка обслуживает функции с разными параметрами."
      - prompt: "Что вернёт декорированный вызов, если обёртка забыла `return func(..)`?"
        choices:
          - id: a
            text: "Результат исходной функции - return подразумевается."
          - id: b
            text: "None - обёртка вызвала функцию, но не вернула её результат."
          - id: c
            text: "TypeError при вызове как полное описание этого поведения."
          - id: d
            text: "Саму функцию-обёртку как полное описание этого поведения."
        correct: [b]
        explanation: "Функция без return возвращает None. Если wrapper вызвал func, но не написал return, наружу уйдёт None, а настоящий результат потеряется."

  - id: manual-decorate-predict-001
    concept: first-decorator
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      def announce(func):
          def wrapper(*args, **kwargs):
              print("до")
              result = func(*args, **kwargs)
              print("после")
              return result
          return wrapper

      @announce
      def add(a, b):
          return a + b

      print(add(2, 3))
    expected:
      kind: stdout
      value: |-
        до
        после
        5
    hints:
      - "Вызов add(2, 3) на самом деле запускает wrapper. В каком порядке печатаются 'до', 'после' и результат?"
      - "wrapper печатает 'до', зовёт исходную функцию, печатает 'после', возвращает результат. print выводит этот результат уже снаружи."

  - id: lost-result-predict-001
    concept: first-decorator
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      def silent(func):
          def wrapper(*args, **kwargs):
              func(*args, **kwargs)
          return wrapper

      @silent
      def square(x):
          return x * x

      print(square(5))
    expected:
      kind: stdout
      value: "None"
    hints:
      - "square(5) запускает wrapper. Есть ли в wrapper инструкция return?"
      - "Функция без return возвращает None. wrapper вызвал square, но результат не вернул - что уйдёт наружу?"

  - id: write-twice-decorator-001
    concept: first-decorator
    type: python-function
    difficulty: 3
    prompt: "Напишите декоратор `twice`: обёрнутая функция вызывается дважды подряд с теми же аргументами, а наружу возвращается результат второго вызова. Обёртка должна подходить к любой сигнатуре."
    starter: |
      def twice(func):
          ..

      @twice
      def shout(text):
          return text + "!"
    cases:
      - call: "shout('a')"
        expect: "a!"
      - call: "twice(lambda: 7)()"
        expect: 7
      - call: "twice(lambda x, y: x + y)(2, 3)"
        expect: 5
    hints:
      - "Декоратор принимает func и возвращает обёртку. Обёртка должна вызвать func дважды - что вернуть наружу?"
      - "Сигнатура wrapper(*args, **kwargs); внутри вызовите func(*args, **kwargs) два раза и верните результат второго вызова."
    solution: |
      def twice(func):
          def wrapper(*args, **kwargs):
              func(*args, **kwargs)
              return func(*args, **kwargs)
          return wrapper

      @twice
      def shout(text):
          return text + "!"

  - id: write-default-on-error-001
    concept: first-decorator
    type: python-function
    difficulty: 4
    prompt: "Напишите декоратор-фабрику `safe(default)`: она возвращает декоратор, который оборачивает функцию так, что при исключении внутри функции вместо проброса ошибки возвращается `default`. При успешном вызове возвращается обычный результат."
    starter: |
      def safe(default):
          ..

      @safe(0)
      def divide(a, b):
          return a // b
    cases:
      - call: "divide(10, 2)"
        expect: 5
      - call: "divide(10, 0)"
        expect: 0
      - call: "safe(-1)(lambda x: int(x))('not a number')"
        expect: -1
      - call: "safe('err')(lambda: [][0])()"
        expect: "err"
    hints:
      - "Здесь три уровня: safe(default) возвращает декоратор, декоратор возвращает обёртку, обёртка вызывает функцию. default - свободная переменная, видимая в обёртке."
      - "В обёртке оберните вызов func(*args, **kwargs) в try/except и в ветке except верните default."
      - "except Exception ловит ошибки выполнения функции; не ловите слишком широкий BaseException."
    solution: |
      def safe(default):
          def decorator(func):
              def wrapper(*args, **kwargs):
                  try:
                      return func(*args, **kwargs)
                  except Exception:
                      return default
              return wrapper
          return decorator

      @safe(0)
      def divide(a, b):
          return a // b
