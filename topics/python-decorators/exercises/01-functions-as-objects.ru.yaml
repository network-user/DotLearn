exercises:
  - id: func-object-quiz-001
    concept: functions-as-objects
    type: theory-quiz
    difficulty: 1
    prompt: "Чем `greet` отличается от `greet()`?"
    choices:
      - id: a
        text: "Ничем - это два способа записать одно и то же на любом пути обработки запроса."
      - id: b
        text: "`greet` - сам объект-функция (можно передать дальше), `greet()` - команда выполнить его и получить результат."
      - id: c
        text: "`greet` работает только внутри класса, а `greet()` - снаружи как три обязательные части системы."
      - id: d
        text: "Именно `greet()` создаёт функцию, а `greet` её удаляет и ничего сверх этого набора как полное описание этого поведения."
    correct: [b]
    explanation: "Имя функции без скобок - это ссылка на объект-функцию, её можно присвоить, передать, вернуть. Скобки означают вызов: выполнить объект и подставить результат."
    variants:
      - prompt: "Что делает присваивание `f = greet` (без скобок)?"
        choices:
          - id: a
            text: "Вызывает `greet` и кладёт её результат в `f` как полное описание этого поведения."
          - id: b
            text: "Создаёт копию объекта-функции в новой области памяти."
          - id: c
            text: "Вешает на тот же объект-функцию второй ярлык: `f` и `greet` указывают на одно."
          - id: d
            text: "Набор ничего, пока к `f` не обратятся со скобками считают исчерпывающим ответом."
        correct: [c]
        explanation: "Присваивание имени не вызывает и не копирует функцию - оно лишь направляет новое имя на тот же объект, поэтому `greet is f` истинно."
      - prompt: "Что окажется в списке после `handlers = [shout()]`, если `shout` возвращает строку?"
        choices:
          - id: a
            text: "Сама функция `shout` как объект, независимо от входных данных и окружения."
          - id: b
            text: "Строка - результат вызова `shout`, потому что скобки выполнили функцию на месте."
          - id: c
            text: "Пустой список: функцию нельзя положить в список как полное описание этого поведения."
          - id: d
            text: "Ошибка `not callable` как полное описание этого поведения."
        correct: [b]
        explanation: "Скобки вызвали `shout` сразу, и в список попал результат-строка, а не объект-функция. Для списка функций нужно было `[shout]`."

  - id: func-object-predict-001
    concept: functions-as-objects
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      def greet():
          return "привет"

      f = greet
      print(f(), greet is f)
    expected:
      kind: stdout
      value: "привет True"
    hints:
      - "Присваивание `f = greet` копирует ярлык, а не объект - сколько на самом деле объектов-функций?"
      - "`f()` вызывает тот же объект, что и `greet()`. Оператор `is` спрашивает, один ли это объект."
    variants:
      - snippet: |
          def area(width, height):
              "Площадь."
              return width * height

          g = area
          print(g(3, 4), g.__name__)
        expected:
          kind: stdout
          value: "12 area"
      - snippet: |
          def shout(text):
              return text.upper() + "!"

          words = ["раз", "два"]
          print(list(map(shout, words)))
        expected:
          kind: stdout
          value: "['РАЗ!', 'ДВА!']"

  - id: apply-to-each-001
    concept: functions-as-objects
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `apply_to_each(func, items)`, которая возвращает новый список, где `func` применена к каждому элементу `items`. Саму функцию `func` не вызывайте заранее - применяйте её внутри."
    starter: |
      def apply_to_each(func, items):
          ..
    cases:
      - call: "apply_to_each(str.upper, ['a', 'b', 'c'])"
        expect: ["A", "B", "C"]
      - call: "apply_to_each(len, ['', 'ab', 'xyz'])"
        expect: [0, 2, 3]
      - call: "apply_to_each(lambda x: x * 2, [1, 2, 3])"
        expect: [2, 4, 6]
      - call: "apply_to_each(abs, [])"
        expect: []
    hints:
      - "`func` - это объект-функция, переданный аргументом. Внутри его можно вызвать как обычно: `func(элемент)`."
      - "Соберите результат генератором списка или циклом, вызывая `func` на каждом элементе по очереди."
    solution: |
      def apply_to_each(func, items):
          return [func(item) for item in items]

  - id: dispatch-op-001
    concept: functions-as-objects
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `calculate(op, a, b)` без единого `if`/`elif`: храните операции `'+'`, `'-'`, `'*'` в словаре, где ключ - строка, а значение - функция двух аргументов. Для неизвестного `op` верните `None`."
    starter: |
      def calculate(op, a, b):
          ..
    cases:
      - call: "calculate('+', 3, 4)"
        expect: 7
      - call: "calculate('-', 10, 4)"
        expect: 6
      - call: "calculate('*', 5, 6)"
        expect: 30
      - call: "calculate('/', 1, 2)"
        expect: null
    hints:
      - "Цепочка `if op == '+'` повторяет одно и то же. Что если выбор функции свести к поиску по ключу в словаре?"
      - "Сложите в словарь сами функции (или лямбды), а потом достаньте нужную по ключу `op` и вызовите её на `a` и `b`."
      - "Для неизвестного ключа удобен `dict.get(op)`, который вернёт `None`, если ключа нет."
    solution: |
      def calculate(op, a, b):
          operations = {
              "+": lambda x, y: x + y,
              "-": lambda x, y: x - y,
              "*": lambda x, y: x * y,
          }
          func = operations.get(op)
          if func is None:
              return None
          return func(a, b)

  - id: make-constant-001
    concept: functions-as-objects
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `make_constant(value)`, которая возвращает новую функцию без аргументов; при вызове эта функция всегда возвращает `value`. `make_constant` должна вернуть саму функцию, а не вызвать её."
    starter: |
      def make_constant(value):
          ..
    cases:
      - call: "make_constant(42)()"
        expect: 42
      - call: "make_constant('hi')()"
        expect: "hi"
      - call: "callable(make_constant(1))"
        expect: true
      - call: "make_constant([1, 2])()"
        expect: [1, 2]
    hints:
      - "Внутри `make_constant` определите вложенную функцию через `def`, которая возвращает `value`."
      - "Верните эту вложенную функцию по имени, без скобок - иначе вернётся её результат, а не объект."
    solution: |
      def make_constant(value):
          def constant():
              return value
          return constant
