exercises:
  - id: class-decorator-quiz-001
    concept: class-decorators
    type: theory-quiz
    difficulty: 1
    prompt: "Что означает `@register` над `class User: ...`?"
    choices:
      - id: a
        text: "User = register(User) - декоратор получает класс и возвращает класс (обычно тот же)."
      - id: b
        text: "register = User(register)"
      - id: c
        text: "Создаёт новый экземпляр User."
      - id: d
        text: "Запрещает наследоваться от User."
    correct: [a]
    explanation: "@ над классом работает по тому же правилу, что над функцией. Декоратор класса получает объект-класс, может его дополнить и должен вернуть класс."
    variants:
      - prompt: "Что нужно, чтобы экземпляр класса можно было использовать как декоратор-обёртку?"
        choices:
          - id: a
            text: "Метод __init__, принимающий функцию, и метод __call__, играющий роль обёртки."
          - id: b
            text: "Только метод __repr__."
          - id: c
            text: "Наследование от класса Decorator."
          - id: d
            text: "Ничего особенного - любой класс уже вызываем."
        correct: [a]
        explanation: "Декоратором может быть класс: __init__ принимает оборачиваемую функцию, а __call__ делает экземпляр вызываемым и работает как обёртка. Состояние живёт в полях экземпляра."
      - prompt: "Где класс-декоратор хранит состояние (например, счётчик вызовов)?"
        choices:
          - id: a
            text: "В замыкании через nonlocal."
          - id: b
            text: "В полях экземпляра (self.count), и оно доступно снаружи как атрибут."
          - id: c
            text: "В глобальной переменной."
          - id: d
            text: "Состояние хранить нельзя."
        correct: [b]
        explanation: "В отличие от функции-декоратора, класс-декоратор держит состояние в self. Бонус: оно доступно снаружи, например hello.count."

  - id: class-decorator-predict-001
    concept: class-decorators
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      class CountCalls:
          def __init__(self, func):
              self.func = func
              self.count = 0

          def __call__(self, *args, **kwargs):
              self.count += 1
              return self.func(*args, **kwargs)

      @CountCalls
      def hello():
          return "привет"

      hello()
      hello()
      print(hello.count)
    expected:
      kind: stdout
      value: "2"
    hints:
      - "@CountCalls означает hello = CountCalls(hello). Чем теперь является имя hello - функцией или экземпляром?"
      - "Каждый вызов hello() запускает __call__, который увеличивает self.count. Сколько было вызовов?"

  - id: registry-predict-001
    concept: class-decorators
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      PLUGINS = {}

      def plugin(cls):
          PLUGINS[cls.__name__] = cls
          return cls

      @plugin
      class Exporter:
          pass

      @plugin
      class Importer:
          pass

      print(sorted(PLUGINS))
    expected:
      kind: stdout
      value: "['Exporter', 'Importer']"
    hints:
      - "Каждый @plugin при определении класса добавляет его в словарь по имени. Какие классы зарегистрировались?"
      - "sorted по словарю даёт отсортированный список его ключей - имён классов."

  - id: write-add-method-001
    concept: class-decorators
    type: python-function
    difficulty: 3
    prompt: "Напишите декоратор класса `with_double`, который добавляет классу метод `double(self)`, возвращающий `self.value * 2`. Декоратор должен вернуть тот же класс."
    starter: |
      def with_double(cls):
          ...

      @with_double
      class Box:
          def __init__(self, value):
              self.value = value
    cases:
      - call: "Box(5).double()"
        expect: 10
      - call: "Box(0).double()"
        expect: 0
      - call: "Box(-3).double()"
        expect: -6
      - call: "with_double(Box) is Box"
        expect: true
    hints:
      - "Декоратор класса получает cls. Определите функцию double(self) и привяжите её к классу как атрибут."
      - "cls.double = double добавит метод; не забудьте вернуть cls, иначе имя класса станет None."
    solution: |
      def with_double(cls):
          def double(self):
              return self.value * 2
          cls.double = double
          return cls

      @with_double
      class Box:
          def __init__(self, value):
              self.value = value

  - id: write-count-calls-class-001
    concept: class-decorators
    type: python-function
    difficulty: 3
    prompt: "Напишите класс-декоратор `CountCalls`: он оборачивает функцию, считает число вызовов в поле `count` (изначально 0) и прокидывает вызов с любыми аргументами. После декорирования `count` должен быть доступен как атрибут."
    starter: |
      class CountCalls:
          ...

      @CountCalls
      def ping():
          return "pong"
    cases:
      - call: "ping()"
        expect: "pong"
      - call: "(lambda: [ping(), ping(), ping(), ping.count])()[3]"
        expect: 3
      - call: "CountCalls(lambda x: x + 1).count"
        expect: 0
      - call: "CountCalls(lambda x: x + 1)(41)"
        expect: 42
    hints:
      - "__init__ принимает func, сохраняет её в self.func и заводит self.count = 0. Что делает экземпляр вызываемым?"
      - "Метод __call__(self, *args, **kwargs) увеличивает self.count, вызывает self.func и возвращает результат."
    solution: |
      class CountCalls:
          def __init__(self, func):
              self.func = func
              self.count = 0

          def __call__(self, *args, **kwargs):
              self.count += 1
              return self.func(*args, **kwargs)

      @CountCalls
      def ping():
          return "pong"

  - id: write-singleton-001
    concept: class-decorators
    type: python-function
    difficulty: 4
    prompt: "Напишите декоратор класса `singleton`: он гарантирует, что у класса будет не более одного экземпляра - повторные вызовы возвращают тот же объект. Возвращайте функцию-обёртку, которая создаёт экземпляр при первом вызове и кэширует его."
    starter: |
      def singleton(cls):
          ...

      @singleton
      class Config:
          def __init__(self):
              self.value = 0
    cases:
      - call: "Config() is Config()"
        expect: true
      - call: "(lambda: [setattr(Config(), 'value', 9), Config().value])()[1]"
        expect: 9
      - call: "isinstance(Config(), object)"
        expect: true
    hints:
      - "Идея: хранить уже созданный экземпляр и при следующих вызовах отдавать его же. Где удобно держать этот единственный экземпляр?"
      - "Заведите переменную в замыкании (например instance=None), верните функцию get(), которая создаёт cls() только если экземпляра ещё нет."
      - "Понадобится nonlocal, чтобы из обёртки присвоить переменную замыкания при первом создании."
    solution: |
      def singleton(cls):
          instance = None
          def get(*args, **kwargs):
              nonlocal instance
              if instance is None:
                  instance = cls(*args, **kwargs)
              return instance
          return get

      @singleton
      class Config:
          def __init__(self):
              self.value = 0
