conceptId: flags
cards:
  - id: flags-01
    front: "Что делает re.IGNORECASE (re.I)?"
    back: "Делает сравнение букв нечувствительным к регистру на протяжении всего паттерна — работает и для кириллицы, и для латиницы."
    tags: [flags, syntax]
  - id: flags-02
    front: "Что делает re.MULTILINE (re.M)?"
    back: "Переключает ^ и $ на начало и конец каждой строки текста (сразу после/перед каждым \\n), а не только всего текста целиком."
    tags: [flags, syntax]
  - id: flags-03
    front: "Ловушка: меняет ли re.MULTILINE поведение \\A и \\Z?"
    back: "Нет, никогда. \\A и \\Z всегда означают начало и конец всего текста, независимо от флагов — построчный режим есть только у ^ и $."
    tags: [flags, pitfalls]
  - id: flags-04
    front: "Что делает re.DOTALL (re.S)?"
    back: "Разрешает точке . совпадать в том числе с переводом строки \\n — без флага . берёт любой символ, кроме \\n."
    tags: [flags, syntax]
  - id: flags-05
    front: "Почему re.DOTALL опасен вместе с жадным .*?"
    back: "На многострочном тексте жадный .* под DOTALL способен захватить всё между первым открывающим и последним закрывающим маркером во всём тексте. Нежадный .*? почти всегда безопаснее."
    tags: [flags, pitfalls]
  - id: flags-06
    front: "Что делает re.VERBOSE (re.X)?"
    back: "Разрешает внутри паттерна пробелы, переводы строк и #-комментарии для читаемости — движок их игнорирует, если они не экранированы и не стоят в классе символов."
    tags: [flags, syntax]
  - id: flags-07
    front: "Ловушка: как записать литеральный пробел внутри re.VERBOSE?"
    back: "Экранировать (\\ ) или взять в класс символов ([ ]) — иначе пробел молча пропадёт, потому что VERBOSE считает его просто отступом форматирования."
    tags: [flags, pitfalls]
  - id: flags-08
    front: "Как объединить несколько флагов в одном вызове?"
    back: "Побитовым «или»: re.IGNORECASE | re.MULTILINE. Каждый флаг — число со своим битом, и | включает сразу оба режима в одном аргументе."
    tags: [flags, syntax]
  - id: flags-09
    front: "Где обязан стоять глобальный inline-флаг вида (?im)?"
    back: "В самом начале паттерна — re.compile(r\"abc(?i)def\") бросает ошибку. Для локального включения флага в середине паттерна есть форма с двоеточием: (?i:def)."
    tags: [flags, pitfalls]
  - id: flags-10
    front: "Что делает re.ASCII (re.A)?"
    back: "Сужает \\w, \\d, \\s обратно до ASCII, выключая понимание Юникода — полезно для строгого разбора машинных форматов вроде HTTP-заголовков."
    tags: [flags, syntax]
