conceptId: literals-and-classes
cards:
  - id: literals-and-classes-01
    front: "Какие символы в регулярном выражении служебные?"
    back: ". ^ $ * + ? { } [ ] \\ | ( ). Всё остальное литералы: совпадают сами с собой, включая кириллицу и пробелы."
    tags: [metachars]
  - id: literals-and-classes-02
    front: "Со сколькими символами совпадает класс [абв]?"
    back: "Ровно с одним: «а», «б» или «в». Класс никогда не совпадает с последовательностью, для неё нужен квантификатор или несколько классов подряд."
    tags: [classes]
  - id: literals-and-classes-03
    front: "Как записать «любая цифра» двумя способами?"
    back: "[0-9] и \\d. В Python-режиме Юникода \\d чуть шире: включает цифры других письменностей."
    tags: [classes]
  - id: literals-and-classes-04
    front: "Что означает [^0-9]?"
    back: "Один любой символ, не являющийся цифрой: буквы, пробелы, знаки препинания, переводы строк. ^ первым символом класса инвертирует набор."
    tags: [classes]
  - id: literals-and-classes-05
    front: "Что входит в \\w в Python?"
    back: "Буквы (по Юникоду, включая кириллицу), цифры и подчёркивание. \\W означает противоположность."
    tags: [classes, unicode]
  - id: literals-and-classes-06
    front: "Ловушка: что не так с диапазоном [а-я] для русских слов?"
    back: "В нём нет буквы «ё» (а в [А-Я] нет «Ё»): в Юникоде она живёт отдельно. Пишите [а-яё] или используйте \\w."
    tags: [pitfalls, unicode]
  - id: literals-and-classes-07
    front: "С чем совпадает неэкранированная точка?"
    back: "С одним любым символом, кроме перевода строки. Паттерн 3.12 найдёт и «3-12». Буквальная точка пишется как \\. или [.]."
    tags: [metachars, pitfalls]
  - id: literals-and-classes-08
    front: "Нужно ли экранировать метасимволы внутри класса?"
    back: "Почти никогда: [.+*] означает точку, плюс или звёздочку. Особый смысл внутри класса сохраняют только ], ^ в первой позиции, - между символами и \\."
    tags: [classes]
  - id: literals-and-classes-09
    front: "Как включить дефис в класс символов?"
    back: "Поставить его первым или последним ([-а-я0-9]) либо экранировать. Между двумя символами дефис задаёт диапазон."
    tags: [classes]
  - id: literals-and-classes-10
    front: "Что означают \\s и \\S?"
    back: "\\s любой пробельный символ: пробел, табуляция, перевод строки. \\S любой непробельный."
    tags: [classes]
