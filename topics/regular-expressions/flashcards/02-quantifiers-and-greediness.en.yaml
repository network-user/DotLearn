conceptId: quantifiers-and-greediness
cards:
  - id: quantifiers-and-greediness-01
    front: "List the basic quantifiers and what they mean."
    back: "* zero or more, + one or more, ? zero or one, {n} exactly n, {n,m} from n to m, {n,} n or more."
    tags: [quantifiers]
  - id: quantifiers-and-greediness-02
    front: "What does the quantifier apply to in the pattern cat+?"
    back: "Only to the last element, the letter 't': it matches 'cat', 'catt', 'cattt'. Repeating the whole word needs a group: (?:cat)+."
    tags: [quantifiers]
  - id: quantifiers-and-greediness-03
    front: "What is quantifier greediness?"
    back: "It grabs as many characters as possible, and backtracks one at a time if the rest of the pattern doesn't fit. Net result: the longest possible match from that position."
    tags: [greediness]
  - id: quantifiers-and-greediness-04
    front: "How do you make a quantifier lazy, and what changes?"
    back: "Add ? right after it: *?, +?, {n,m}?. A lazy quantifier starts from the minimum and expands only if the pattern wouldn't otherwise match."
    tags: [greediness]
  - id: quantifiers-and-greediness-05
    front: 'Why does ".*" find one long match instead of two short ones?'
    back: 'Greedy .* stretches all the way to the last closing quote in the string. Fixed with lazy ".*?" or the class "[^"]*".'
    tags: [greediness, pitfalls]
  - id: quantifiers-and-greediness-06
    front: 'Why is the class [^"]* better than a lazy .*? between quotes?'
    back: "It's unambiguous and faster: the class physically can't cross a closing quote, so the engine never has to try backtracking options."
    tags: [greediness, performance]
  - id: quantifiers-and-greediness-07
    front: "Gotcha: what does a* find in the string 'ba'?"
    back: "Three matches: an empty one before 'b', 'a' itself, and an empty one at the end. * accepts zero repetitions; for non-empty matches only, use +."
    tags: [pitfalls]
  - id: quantifiers-and-greediness-08
    front: "Gotcha: what does a space do inside {2, 4}?"
    back: "It breaks the quantifier: the notation stops being recognized and is searched for as the literal characters '{2, 4}'. No error is raised - the search just silently becomes wrong."
    tags: [pitfalls]
  - id: quantifiers-and-greediness-09
    front: "What is catastrophic backtracking?"
    back: "An exponential blow-up of backtracking caused by nested quantifiers, e.g. (a+)+ on an almost-matching string. It's the basis of ReDoS attacks; fixed with precise classes and by avoiding nested repetition."
    tags: [performance, security]
  - id: quantifiers-and-greediness-10
    front: "How do you write 'an optional minus sign before a number'?"
    back: "-?\\d+ : the ? quantifier makes the preceding element optional."
    tags: [quantifiers]
