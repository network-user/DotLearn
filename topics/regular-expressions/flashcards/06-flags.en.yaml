conceptId: flags
cards:
  - id: flags-01
    front: "What does re.IGNORECASE (re.I) do?"
    back: "Makes letter comparison case-insensitive across the whole pattern - it works for Cyrillic as well as Latin letters."
    tags: [flags, syntax]
  - id: flags-02
    front: "What does re.MULTILINE (re.M) do?"
    back: "Switches ^ and $ to the start and end of every line of text (right after/before each \\n), not just the whole text."
    tags: [flags, syntax]
  - id: flags-03
    front: "Gotcha: does re.MULTILINE change how \\A and \\Z behave?"
    back: "No, never. \\A and \\Z always mean the start and end of the whole text, no matter which flags are set - only ^ and $ get the per-line mode."
    tags: [flags, pitfalls]
  - id: flags-04
    front: "What does re.DOTALL (re.S) do?"
    back: "Lets the dot . also match a line break \\n - without the flag, . matches any character except \\n."
    tags: [flags, syntax]
  - id: flags-05
    front: "Why is re.DOTALL dangerous combined with a greedy .*?"
    back: "On multiline text, a greedy .* under DOTALL can grab everything between the first opening marker and the very last closing marker in the whole text. A lazy .*? is almost always safer."
    tags: [flags, pitfalls]
  - id: flags-06
    front: "What does re.VERBOSE (re.X) do?"
    back: "Allows whitespace, line breaks, and #-comments inside the pattern for readability - the engine ignores them unless they're escaped or placed inside a character class."
    tags: [flags, syntax]
  - id: flags-07
    front: "Gotcha: how do you write a literal space inside re.VERBOSE?"
    back: "Escape it (\\ ) or put it in a character class ([ ]) - otherwise it silently disappears, because VERBOSE treats it as mere formatting indentation."
    tags: [flags, pitfalls]
  - id: flags-08
    front: "How do you combine several flags in one call?"
    back: "With a bitwise OR: re.IGNORECASE | re.MULTILINE. Each flag is a number with its own bit, and | turns on both modes with a single argument."
    tags: [flags, syntax]
  - id: flags-09
    front: "Where does a global inline flag like (?im) have to go?"
    back: "Right at the very start of the pattern - re.compile(r\"abc(?i)def\") raises an error. To turn a flag on locally, in the middle of a pattern, there's the colon form: (?i:def)."
    tags: [flags, pitfalls]
  - id: flags-10
    front: "What does re.ASCII (re.A) do?"
    back: "Narrows \\w, \\d, \\s back down to ASCII, turning off Unicode awareness - useful for strictly parsing machine formats like HTTP headers."
    tags: [flags, syntax]
