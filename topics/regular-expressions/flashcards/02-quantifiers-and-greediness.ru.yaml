conceptId: quantifiers-and-greediness
cards:
  - id: quantifiers-and-greediness-01
    front: "Перечислите базовые квантификаторы и их смысл."
    back: "* ноль и более, + один и более, ? ноль или один, {n} ровно n, {n,m} от n до m, {n,} от n и больше."
    tags: [quantifiers]
  - id: quantifiers-and-greediness-02
    front: "К чему относится квантификатор в паттерне кот+?"
    back: "Только к последнему элементу, букве «т»: найдутся «кот», «котт», «коттт». Повторение всего слова требует группы: (?:кот)+."
    tags: [quantifiers]
  - id: quantifiers-and-greediness-03
    front: "Что такое жадность квантификатора?"
    back: "Он захватывает максимум символов, а если остаток паттерна не сходится, откатывается назад по одному. Итог: самое длинное совпадение из возможных с данной позиции."
    tags: [greediness]
  - id: quantifiers-and-greediness-04
    front: "Как сделать квантификатор ленивым и что изменится?"
    back: "Добавить ? после него: *?, +?, {n,m}?. Ленивый начинает с минимума и расширяется, только если иначе паттерн не совпадает."
    tags: [greediness]
  - id: quantifiers-and-greediness-05
    front: "Почему \".*\" находит одно длинное совпадение вместо двух коротких?"
    back: "Жадный .* тянется до последней закрывающей кавычки в строке. Лечится ленивым \".*?\" или классом \"[^\"]*\"."
    tags: [greediness, pitfalls]
  - id: quantifiers-and-greediness-06
    front: "Чем класс [^\"]* лучше ленивого .*? между кавычками?"
    back: "Он однозначен и быстрее: класс физически не может перешагнуть закрывающую кавычку, движку не нужно перебирать варианты отката."
    tags: [greediness, performance]
  - id: quantifiers-and-greediness-07
    front: "Ловушка: что найдёт а* в строке «ба»?"
    back: "Три совпадения: пустое перед «б», «а», пустое в конце. * согласен на ноль повторений; для непустых совпадений нужен +."
    tags: [pitfalls]
  - id: quantifiers-and-greediness-08
    front: "Ловушка: что делает пробел в {2, 4}?"
    back: "Отключает квантификатор: запись перестаёт распознаваться и ищется как буквальные символы «{2, 4}». Ошибки не будет, поиск станет молча неверным."
    tags: [pitfalls]
  - id: quantifiers-and-greediness-09
    front: "Что такое катастрофический бэктрекинг?"
    back: "Экспоненциальный перебор вариантов отката из-за вложенных квантификаторов, например (а+)+ на почти подходящей строке. Основа атак ReDoS; лечится точными классами и отказом от вложенных повторов."
    tags: [performance, security]
  - id: quantifiers-and-greediness-10
    front: "Как записать «необязательный минус перед числом»?"
    back: "-?\\d+ : квантификатор ? делает предыдущий элемент необязательным."
    tags: [quantifiers]
