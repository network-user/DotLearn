conceptId: re-in-python
cards:
  - id: re-in-python-01
    front: "В чём разница между re.search и re.match?"
    back: "search ищет совпадение в любом месте строки, match — только с самого начала. Для проверки строки целиком есть re.fullmatch."
    tags: [re-in-python, syntax]
  - id: re-in-python-02
    front: "Что возвращают re.search/re.match, если совпадения нет?"
    back: "None. Поэтому результат сначала проверяют (if m:), и только потом зовут m.group() — иначе AttributeError на None."
    tags: [re-in-python, pitfalls]
  - id: re-in-python-03
    front: "Что возвращает re.findall, когда в паттерне есть группы?"
    back: "Не полные совпадения, а список содержимого групп: при одной группе — список строк, при нескольких — список кортежей. Нужны полные совпадения — уберите группы, сделайте их незахватывающими (?:...) или возьмите finditer."
    tags: [re-in-python, pitfalls]
  - id: re-in-python-04
    front: "Чем re.finditer удобнее re.findall?"
    back: "Он лениво отдаёт Match-объекты, у которых есть .group(), .start(), .end() и .span() — то есть не только текст, но и позиции совпадений."
    tags: [re-in-python, syntax]
  - id: re-in-python-05
    front: "Как работает re.sub и что умеет его аргумент repl?"
    back: "re.sub(pattern, repl, text) заменяет все совпадения. repl может быть строкой со ссылками \\1 и \\g<имя> на группы или функцией, принимающей Match и возвращающей замену."
    tags: [re-in-python, syntax]
  - id: re-in-python-06
    front: "Ловушка: почему в строке-замене re.sub опасен голый обратный слеш?"
    back: "Строка repl имеет собственный синтаксис: \\1 — ссылка на группу, а неизвестная escape-последовательность даст ошибку. Литеральную замену с бэкслешами безопаснее прогонять через re.escape или передавать repl-функцию."
    tags: [re-in-python, pitfalls]
  - id: re-in-python-07
    front: "Зачем нужен re.escape?"
    back: "Экранирует в строке все спецсимволы регулярок. Обязателен, когда в паттерн подставляется пользовательский ввод: иначе точки, скобки и звёздочки в нём сработают как синтаксис."
    tags: [re-in-python, pitfalls]
  - id: re-in-python-08
    front: "Когда стоит использовать re.compile?"
    back: "Когда паттерн применяется многократно (в цикле, в горячем коде): компиляция выполняется один раз, а у объекта есть те же методы search/match/findall/sub. Для одноразовых вызовов модульные функции равнозначны — они кешируют паттерны."
    tags: [re-in-python, syntax]
  - id: re-in-python-09
    front: "Что делает re.split и чем он отличается от str.split?"
    back: "Режет строку по совпадениям регулярки, а не по фиксированной подстроке: re.split(r\"[,;]\\s*\", text) обрабатывает сразу несколько разделителей. Захватывающие группы в паттерне попадают в результат."
    tags: [re-in-python, syntax]
  - id: re-in-python-10
    front: "Ловушка: почему r-строки почти обязательны для паттернов?"
    back: "Без префикса r бэкслеши сначала интерпретирует сам Python: \"\\b\" превратится в backspace, а не границу слова. Сырая строка r\"\\b\" доносит паттерн до движка без искажений."
    tags: [re-in-python, pitfalls]
