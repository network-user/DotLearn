conceptId: lookaround
cards:
  - id: lookaround-01
    front: "Что общего у lookahead и lookbehind с якорями `^` и `$`?"
    back: "Все они утверждения нулевой ширины: проверяют позицию или контекст вокруг неё и ничего не потребляют."
    tags: [lookaround]
  - id: lookaround-02
    front: "Как записать позитивный lookahead и что он проверяет?"
    back: "(?=...) — проверяет, что дальше идёт указанный текст, но не включает его в совпадение."
    tags: [lookaround, syntax]
  - id: lookaround-03
    front: "Как записать негативный lookahead?"
    back: "(?!...) — проверяет, что дальше НЕ идёт указанный текст. Проваливает совпадение, если текст найден."
    tags: [lookaround, syntax]
  - id: lookaround-04
    front: "Чем lookbehind (?<=...) отличается от lookahead (?=...)?"
    back: "Направлением проверки: lookbehind смотрит назад от текущей позиции, lookahead вперёд. Оба ничего не потребляют."
    tags: [lookaround, syntax]
  - id: lookaround-05
    front: "Главное ограничение lookbehind в модуле re?"
    back: "Обязан иметь фиксированную длину: (?<=\\d+) не скомпилируется, ошибка «look-behind requires fixed-width pattern». Разрешены точный квантификатор {3} или альтернативы одной длины."
    tags: [lookaround, pitfalls]
  - id: lookaround-06
    front: "Как проверить пароль на «есть цифра И есть буква», не заботясь о порядке?"
    back: "Два lookahead подряд в начале паттерна: (?=.*\\d)(?=.*[a-zA-Zа-яё]).{8,} — каждый стартует от той же позиции 0."
    tags: [lookaround, use-case]
  - id: lookaround-07
    front: "Ловушка: почему `\\d+(?!\\.\\d)` на «12.5» находит «1» и «5» вместо ожидаемого поведения?"
    back: "Жадный \\d+ сначала берёт «12», проверка проваливается, движок откатывает квантификатор до «1» — и там проверка неожиданно проходит. Лечится границей: \\d+\\b(?!\\.\\d)."
    tags: [lookaround, pitfalls]
  - id: lookaround-08
    front: "Как вытащить число сразу после знака «$», не включая сам знак в результат?"
    back: "(?<=\\$)\\d+ — позитивный lookbehind проверяет символ слева, но не потребляет его."
    tags: [lookaround, use-case]
