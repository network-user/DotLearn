conceptId: anchors-and-boundaries
cards:
  - id: anchors-and-boundaries-01
    front: "Чем якорь отличается от обычного элемента паттерна?"
    back: "Якорь совпадает с позицией, а не с символом: у него нулевая ширина, он ничего не потребляет. Примеры: ^, $, \\A, \\Z, \\b."
    tags: [anchors]
  - id: anchors-and-boundaries-02
    front: "Как проверить, что строка целиком состоит из шести цифр?"
    back: "Запереть паттерн с двух сторон: \\A\\d{6}\\Z (или ^\\d{6}$ с оговоркой про хвостовой перевод строки), либо re.fullmatch(r\"\\d{6}\", s)."
    tags: [anchors, validation]
  - id: anchors-and-boundaries-03
    front: "Ловушка: почему «101000\\n» проходит ^\\d{6}$ ?"
    back: "$ совпадает не только в конце строки, но и перед завершающим переводом строки. Для строгой валидации берите \\Z или re.fullmatch."
    tags: [anchors, pitfalls]
  - id: anchors-and-boundaries-04
    front: "Чем \\A и \\Z отличаются от ^ и $?"
    back: "\\A и \\Z совпадают только с началом и концом всего текста: их не переучивает многострочный режим и \\Z не пускает хвостовой перевод строки."
    tags: [anchors]
  - id: anchors-and-boundaries-05
    front: "Что такое \\b формально?"
    back: "Позиция, где ровно с одной стороны стоит символ \\w: начало текста перед \\w, конец после \\w или стык \\w с не-\\w."
    tags: [boundaries]
  - id: anchors-and-boundaries-06
    front: "Как найти слово «кот», но не «котлета» и не «скот»?"
    back: "\\bкот\\b: границы слова с обеих сторон отсекают вхождения внутри других слов."
    tags: [boundaries]
  - id: anchors-and-boundaries-07
    front: "Что означает \\B?"
    back: "Позицию, которая НЕ является границей слова: \\Bкот найдёт «кот» только внутри слова, например в «скот»."
    tags: [boundaries]
  - id: anchors-and-boundaries-08
    front: "Два смысла символа ^ ?"
    back: "Вне класса якорь начала строки. Первым символом внутри класса отрицание набора: [^0-9]. Похожая запись, противоположные эффекты."
    tags: [anchors, pitfalls]
  - id: anchors-and-boundaries-09
    front: "Почему валидация одним якорем дырявая?"
    back: "^\\d{6} проверяет только начало: «101000abc» пройдёт. search находит совпадение где угодно, поэтому без второго якоря хвост не проверяется."
    tags: [validation, pitfalls]
