conceptId: groups-and-alternation
cards:
  - id: groups-and-alternation-01
    front: "Что делают круглые скобки в паттерне?"
    back: "Две вещи сразу: группируют кусок паттерна в один элемент и захватывают совпавший текст. Номера захватов идут по открывающим скобкам слева направо с единицы."
    tags: [groups]
  - id: groups-and-alternation-02
    front: "Что возвращает m.group(0)?"
    back: "Всё совпадение целиком. Захваты групп начинаются с group(1)."
    tags: [groups]
  - id: groups-and-alternation-03
    front: "Как записать именованную группу и обратиться к ней?"
    back: "(?P<name>...) в паттерне, m.group(\"name\") после поиска, m.groupdict() собирает все именованные захваты в словарь."
    tags: [groups, named]
  - id: groups-and-alternation-04
    front: "Чем (?:...) отличается от (...)?"
    back: "Группирует без захвата: не получает номера, не попадает в groups() и не меняет форму результата findall. Берите её, когда скобки нужны только для приоритета."
    tags: [groups]
  - id: groups-and-alternation-05
    front: "Какой приоритет у альтернативы | ?"
    back: "Самый низкий: варианты тянутся до границ паттерна или объемлющей группы. ^а|б$ значит «а в начале» или «б в конце», а не «а или б целиком»."
    tags: [alternation, pitfalls]
  - id: groups-and-alternation-06
    front: "Какой вариант выбирает альтернатива при перекрытии?"
    back: "Первый успешный слева, а не самый длинный: кош|кошка на «кошка» найдёт «кош». Перекрывающиеся варианты ставьте от длинного к короткому."
    tags: [alternation, pitfalls]
  - id: groups-and-alternation-07
    front: "Ловушка: как группы меняют результат findall?"
    back: "Без групп список полных совпадений, с одной группой список её захватов, с двумя и более список кортежей. Лишние скобки молча меняют форму данных."
    tags: [pitfalls, findall]
  - id: groups-and-alternation-08
    front: "Что захватывает группа под квантификатором, например (ха)+?"
    back: "Только последний повтор. Нужно всё совпадение, оборачивайте во внешнюю группу: ((?:ха)+)."
    tags: [pitfalls, groups]
  - id: groups-and-alternation-09
    front: "Что требует обратная ссылка \\1?"
    back: "Точное повторение захваченного текста, а не паттерна: (\\d\\d)-\\1 совпадёт с «12-12», но не с «12-13». Для именованных групп есть (?P=name)."
    tags: [backreferences]
  - id: groups-and-alternation-10
    front: "Как посчитать номер вложенной группы?"
    back: "Идти слева направо и считать только открывающие захватывающие скобки; (?: и прочие конструкции с ? номеров не получают."
    tags: [groups]
