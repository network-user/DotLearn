conceptId: literals-and-classes
cards:
  - id: literals-and-classes-01
    front: "Which characters in a regex are special (metacharacters)?"
    back: ". ^ $ * + ? { } [ ] \\ | ( ). Everything else is a literal: it matches itself, including non-Latin letters (e.g. Cyrillic) and spaces."
    tags: [metachars]
  - id: literals-and-classes-02
    front: "How many characters does the class [abc] match?"
    back: "Exactly one: 'a', 'b', or 'c'. A class never matches a sequence - that needs a quantifier or several classes in a row."
    tags: [classes]
  - id: literals-and-classes-03
    front: "Two ways to write 'any digit'?"
    back: "[0-9] and \\d. In Python's Unicode mode \\d is slightly broader: it also covers digits from other scripts."
    tags: [classes]
  - id: literals-and-classes-04
    front: "What does [^0-9] mean?"
    back: "Any single character that is not a digit: letters, spaces, punctuation, line breaks. A ^ as the first character of a class negates the set."
    tags: [classes]
  - id: literals-and-classes-05
    front: "What does \\w include in Python?"
    back: "Letters (Unicode-aware, including Cyrillic), digits, and underscore. \\W means the opposite."
    tags: [classes, unicode]
  - id: literals-and-classes-06
    front: "Gotcha: what's wrong with the range [а-я] for Russian words?"
    back: "It doesn't include the letter «ё» (and [А-Я] doesn't include «Ё»): in Unicode it sits outside that range. Write [а-яё] or use \\w instead."
    tags: [pitfalls, unicode]
  - id: literals-and-classes-07
    front: "What does an unescaped dot match?"
    back: "Any single character except a line break. The pattern 3.12 will also match '3-12'. A literal dot is written as \\. or [.]."
    tags: [metachars, pitfalls]
  - id: literals-and-classes-08
    front: "Do metacharacters need escaping inside a class?"
    back: "Almost never: [.+*] means a dot, a plus, or an asterisk. Special meaning inside a class survives only for ], ^ in the first position, - between characters, and \\."
    tags: [classes]
  - id: literals-and-classes-09
    front: "How do you include a hyphen in a character class?"
    back: "Put it first or last ([-a-z0-9]) or escape it. Between two characters, a hyphen defines a range."
    tags: [classes]
  - id: literals-and-classes-10
    front: "What do \\s and \\S mean?"
    back: "\\s any whitespace character: space, tab, line break. \\S any non-whitespace character."
    tags: [classes]
