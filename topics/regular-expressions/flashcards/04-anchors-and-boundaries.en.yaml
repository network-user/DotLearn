conceptId: anchors-and-boundaries
cards:
  - id: anchors-and-boundaries-01
    front: "How does an anchor differ from a regular pattern element?"
    back: "An anchor matches a position, not a character: it has zero width and consumes nothing. Examples: ^, $, \\A, \\Z, \\b."
    tags: [anchors]
  - id: anchors-and-boundaries-02
    front: "How do you check that a string is entirely six digits?"
    back: 'Lock the pattern on both sides: \A\d{6}\Z (or ^\d{6}$ with the caveat about a trailing newline), or re.fullmatch(r"\d{6}", s).'
    tags: [anchors, validation]
  - id: anchors-and-boundaries-03
    front: 'Gotcha: why does "101000\n" pass ^\d{6}$ ?'
    back: "$ matches not only at the end of the string but also right before a trailing newline. For strict validation use \\Z or re.fullmatch."
    tags: [anchors, pitfalls]
  - id: anchors-and-boundaries-04
    front: "How do \\A and \\Z differ from ^ and $?"
    back: "\\A and \\Z only ever match the start and end of the whole text: multiline mode doesn't retrain them, and \\Z doesn't allow a trailing newline."
    tags: [anchors]
  - id: anchors-and-boundaries-05
    front: "What is \\b, formally?"
    back: "A position where exactly one side has a \\w character: the start of the text before \\w, the end right after \\w, or the junction between \\w and non-\\w."
    tags: [boundaries]
  - id: anchors-and-boundaries-06
    front: "How do you find the word 'cat' but not 'catalog' or 'scat'?"
    back: "\\bcat\\b: word boundaries on both sides cut off occurrences that are just part of another word."
    tags: [boundaries]
  - id: anchors-and-boundaries-07
    front: "What does \\B mean?"
    back: "A position that is NOT a word boundary: \\Bcat matches 'cat' only inside a word, e.g. in 'scat'."
    tags: [boundaries]
  - id: anchors-and-boundaries-08
    front: "Two meanings of the ^ character?"
    back: "Outside a class it's the start-of-string anchor. As the first character inside a class, it negates the set: [^0-9]. Similar notation, opposite effects."
    tags: [anchors, pitfalls]
  - id: anchors-and-boundaries-09
    front: "Why is validating with a single anchor leaky?"
    back: '^\d{6} only checks the start: "101000abc" would pass. search finds a match anywhere, so without a second anchor the tail is never checked.'
    tags: [validation, pitfalls]
