conceptId: lookaround
cards:
  - id: lookaround-01
    front: "What do lookahead and lookbehind have in common with the `^` and `$` anchors?"
    back: "All of them are zero-width assertions: they check a position or the context around it and consume nothing."
    tags: [lookaround]
  - id: lookaround-02
    front: "How do you write a positive lookahead, and what does it check?"
    back: "(?=...) - checks that the given text follows, but doesn't include it in the match."
    tags: [lookaround, syntax]
  - id: lookaround-03
    front: "How do you write a negative lookahead?"
    back: "(?!...) - checks that the given text does NOT follow. Fails the match if the text is found."
    tags: [lookaround, syntax]
  - id: lookaround-04
    front: "How does lookbehind (?<=...) differ from lookahead (?=...)?"
    back: "Direction of the check: lookbehind looks backward from the current position, lookahead looks forward. Neither one consumes anything."
    tags: [lookaround, syntax]
  - id: lookaround-05
    front: "The main limitation of lookbehind in the re module?"
    back: "It must have a fixed length: (?<=\\d+) won't compile - \"look-behind requires fixed-width pattern\". An exact quantifier like {3} or same-length alternatives are allowed."
    tags: [lookaround, pitfalls]
  - id: lookaround-06
    front: "How do you check a password for 'has a digit AND has a letter', regardless of order?"
    back: "Two lookaheads in a row at the start of the pattern: (?=.*\\d)(?=.*[a-zA-Z]).{8,} - each one starts checking from that same position 0."
    tags: [lookaround, use-case]
  - id: lookaround-07
    front: 'Gotcha: why does `\d+(?!\.\d)` on "12.5" find "1" and "5" instead of the expected behavior?'
    back: 'Greedy \d+ first grabs "12", the check fails, the engine backtracks the quantifier down to "1" - and there the check unexpectedly passes. Fixed with a boundary: \d+\b(?!\.\d).'
    tags: [lookaround, pitfalls]
  - id: lookaround-08
    front: 'How do you pull out the number right after a "$" sign, without including the sign itself?'
    back: "(?<=\\$)\\d+ - a positive lookbehind checks the character on the left but doesn't consume it."
    tags: [lookaround, use-case]
