conceptId: re-in-python
cards:
  - id: re-in-python-01
    front: "What's the difference between re.search and re.match?"
    back: "search looks for a match anywhere in the string, match only from the very start. To validate the whole string there's re.fullmatch."
    tags: [re-in-python, syntax]
  - id: re-in-python-02
    front: "What do re.search/re.match return when there's no match?"
    back: "None. So the result is checked first (if m:), and only then is m.group() called - otherwise you get an AttributeError on None."
    tags: [re-in-python, pitfalls]
  - id: re-in-python-03
    front: "What does re.findall return when the pattern has groups?"
    back: "Not full matches, but a list of the groups' contents: one group gives a list of strings, several groups give a list of tuples. Need full matches instead - drop the groups, make them non-capturing (?:...), or use finditer."
    tags: [re-in-python, pitfalls]
  - id: re-in-python-04
    front: "How is re.finditer more convenient than re.findall?"
    back: "It lazily yields Match objects, which have .group(), .start(), .end(), and .span() - so you get not just the text but also the position of each match."
    tags: [re-in-python, syntax]
  - id: re-in-python-05
    front: "How does re.sub work, and what can its repl argument be?"
    back: "re.sub(pattern, repl, text) replaces every match. repl can be a string with \\1 and \\g<name> references to groups, or a function that receives a Match and returns the replacement."
    tags: [re-in-python, syntax]
  - id: re-in-python-06
    front: "Gotcha: why is a bare backslash dangerous in re.sub's replacement string?"
    back: "The repl string has its own syntax: \\1 is a group reference, and an unrecognized escape sequence raises an error. For a literal replacement containing backslashes, it's safer to run it through re.escape or pass a repl function."
    tags: [re-in-python, pitfalls]
  - id: re-in-python-07
    front: "Why do you need re.escape?"
    back: "It escapes every regex special character in a string. Required whenever user input is substituted into a pattern - otherwise dots, parentheses, and asterisks in it act as syntax."
    tags: [re-in-python, pitfalls]
  - id: re-in-python-08
    front: "When is it worth using re.compile?"
    back: "When a pattern is applied many times (in a loop, in hot code): compilation happens once, and the resulting object has the same search/match/findall/sub methods. For one-off calls the module-level functions are just as good - they cache patterns too."
    tags: [re-in-python, syntax]
  - id: re-in-python-09
    front: "What does re.split do, and how does it differ from str.split?"
    back: "It cuts the string on regex matches rather than a fixed substring: re.split(r\"[,;]\\s*\", text) handles several separators at once. Capturing groups in the pattern end up in the result too."
    tags: [re-in-python, syntax]
  - id: re-in-python-10
    front: "Gotcha: why are raw strings pretty much mandatory for patterns?"
    back: "Without the r prefix, Python interprets backslashes itself first: \"\\b\" turns into a backspace, not a word boundary. A raw string r\"\\b\" delivers the pattern to the engine unchanged."
    tags: [re-in-python, pitfalls]
