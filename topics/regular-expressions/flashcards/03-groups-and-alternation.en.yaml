conceptId: groups-and-alternation
cards:
  - id: groups-and-alternation-01
    front: "What do parentheses do in a pattern?"
    back: "Two things at once: they group a chunk of the pattern into a single element, and they capture the matched text. Capture numbers follow the opening parentheses left to right, starting at 1."
    tags: [groups]
  - id: groups-and-alternation-02
    front: "What does m.group(0) return?"
    back: "The entire match. Group captures start at group(1)."
    tags: [groups]
  - id: groups-and-alternation-03
    front: "How do you write a named group and access it?"
    back: '(?P<name>...) in the pattern, m.group("name") after the search, m.groupdict() collects all named captures into a dict.'
    tags: [groups, named]
  - id: groups-and-alternation-04
    front: "How does (?:...) differ from (...)?"
    back: "It groups without capturing: it gets no number, doesn't show up in groups(), and doesn't change the shape of findall's result. Use it when the parentheses are only there for precedence."
    tags: [groups]
  - id: groups-and-alternation-05
    front: "What is the precedence of the alternation | ?"
    back: "The lowest of all: alternatives stretch to the edges of the pattern or the enclosing group. ^a|b$ means 'a at the start' or 'b at the end', not '(a or b) taken as a whole'."
    tags: [alternation, pitfalls]
  - id: groups-and-alternation-06
    front: "Which alternative does | pick when they overlap?"
    back: "The first one that succeeds, left to right - not the longest one: cat|category on 'category' matches 'cat'. Put overlapping alternatives from longest to shortest."
    tags: [alternation, pitfalls]
  - id: groups-and-alternation-07
    front: "Gotcha: how do groups change findall's result?"
    back: "Without groups: a list of full matches. With one group: a list of its captures. With two or more: a list of tuples. Extra parentheses silently change the shape of the data."
    tags: [pitfalls, findall]
  - id: groups-and-alternation-08
    front: "What does a group under a quantifier capture, e.g. (ha)+?"
    back: "Only the last repetition. If you need the whole match, wrap it in an outer group: ((?:ha)+)."
    tags: [pitfalls, groups]
  - id: groups-and-alternation-09
    front: "What does the backreference \\1 require?"
    back: 'The exact same captured text, not the same rule: (\d\d)-\1 matches "12-12" but not "12-13". Named groups have (?P=name).'
    tags: [backreferences]
  - id: groups-and-alternation-10
    front: "How do you figure out the number of a nested group?"
    back: "Go left to right and count only capturing opening parentheses; (?: and other ?-prefixed constructs never get a number."
    tags: [groups]
