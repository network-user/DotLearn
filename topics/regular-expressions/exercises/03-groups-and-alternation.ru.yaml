exercises:
  - id: groups-quiz-001
    concept: groups-and-alternation
    type: theory-quiz
    difficulty: 1
    prompt: "Зачем нужна группа `(?:...)`, если есть обычные скобки `(...)`?"
    choices:
      - id: a
        text: "Она группирует, но не захватывает"
      - id: b
        text: "Она работает быстрее за счёт кеширования захвата."
      - id: c
        text: "Она делает содержимое необязательным."
      - id: d
        text: "Она запрещает бэктрекинг внутри себя."
    correct: [a]
    explanation: "(?:...) объединяет кусок паттерна в один элемент для квантификатора или альтернативы, но не создаёт захвата. Номера остальных групп не сдвигаются, а findall не переключается на кортежи."
    variants:
      - prompt: "Что найдёт паттерн `до свидания|встречи`?"
        choices:
          - id: a
            text: "Либо «до свидания», либо «встречи»"
          - id: b
            text: "Либо «до свидания», либо «до встречи»."
          - id: c
            text: "Только «до свидания встречи»."
          - id: d
            text: "Слово «до», за которым идёт любой из двух вариантов."
        correct: [a]
        explanation: "У | самый низкий приоритет: варианты тянутся до границ паттерна или объемлющей группы. Чтобы «до» относилось к обоим вариантам, нужна группа: до (?:свидания|встречи)."
      - prompt: "Что означает `\\1` внутри паттерна?"
        choices:
          - id: a
            text: "Здесь должен повториться точно тот текст, который захватила группа 1."
          - id: b
            text: "Здесь должен повториться паттерн группы 1 с любым новым текстом."
          - id: c
            text: "Совпадение должно начинаться с цифры 1."
          - id: d
            text: "Первая группа становится необязательной."
        correct: [a]
        explanation: "Обратная ссылка требует тот же захваченный текст, а не то же правило: (\\d\\d)-\\1 совпадёт с «12-12», но не с «12-13»."

  - id: groups-predict-001
    concept: groups-and-alternation
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает этот код? Обратите внимание на количество групп в паттерне."
    snippet: |
      import re
      text = "Иванов Иван, Петрова Анна"
      print(re.findall(r"(\w+) (\w+)", text))
    expected:
      kind: stdout
      value: |-
        [('Иванов', 'Иван'), ('Петрова', 'Анна')]
    explanation: "Когда в паттерне две и более групп, findall возвращает список кортежей с захватами, а не полные совпадения."
    hints:
      - "В паттерне две захватывающие группы. Как это меняет форму результата findall?"
      - "Каждое совпадение превратится в кортеж из двух захватов."
    variants:
      - snippet: |
          import re
          print(re.findall(r"кош|кошка", "кошка"))
        expected:
          kind: stdout
          value: |-
            ['кош']
        explanation: "Альтернатива выбирает первый успешный вариант, а не самый длинный: «кош» стоит раньше и уже совпал. Хотите «кошка» целиком, ставьте длинный вариант первым."
      - snippet: |
          import re
          print(re.findall(r"(ха)+", "хахаха хо ха"))
        expected:
          kind: stdout
          value: |-
            ['ха', 'ха']
        explanation: "Группа под квантификатором хранит последний повтор, а findall с одной группой возвращает именно захваты: от «хахаха» остаётся одна «ха»."

  - id: groups-blanks-001
    concept: groups-and-alternation
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните паттерн группой без захвата с альтернативой, чтобы он находил и «до свидания», и «до встречи»."
    template: |
      import re
      hits = re.findall(r"до {{alt}}", "до свидания и до встречи")
    blanks:
      alt:
        accept: ['(?:свидания|встречи)', '(?:встречи|свидания)']
    hints:
      - "Альтернатива без скобок утащит «до» в первый вариант. Какая конструкция ограничит её, не создавая захвата?"
      - "Группа без захвата начинается с (?: и содержит оба слова через вертикальную черту."
    variants:
      - prompt: "Дополните паттерн обратной ссылкой на первую группу, чтобы найти задвоенное слово."
        template: |
          import re
          doubled = re.findall(r"(\w+) {{ref}}", "это было было давно")
        blanks:
          ref:
            accept: ['\1']
      - prompt: "Дайте группе имя price, чтобы вызов group заработал."
        template: |
          import re
          m = re.search(r"(?P<{{name}}>\d+) руб", "кофе 250 руб")
          value = m.group("price")
        blanks:
          name:
            accept: ['price']

  - id: split-full-name-001
    concept: groups-and-alternation
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `split_full_name(full_name)`: для строки вида «Фамилия Имя Отчество» верните словарь с ключами surname, name, patronymic. Если строка не состоит ровно из трёх слов через одиночные пробелы, верните пустой словарь."
    starter: |
      import re

      def split_full_name(full_name):
          ...
    cases:
      - call: 'split_full_name("Иванов Иван Иванович")'
        expect: { surname: "Иванов", name: "Иван", patronymic: "Иванович" }
      - call: 'split_full_name("Пушкин Александр Сергеевич")'
        expect: { surname: "Пушкин", name: "Александр", patronymic: "Сергеевич" }
      - call: 'split_full_name("Мадонна")'
        expect: {}
      - call: 'split_full_name("Иванов  Иван  Иванович")'
        expect: {}
    hints:
      - "Три части одной формы, каждую нужно захватить и назвать. Какая конструкция даёт захват с именем?"
      - "Паттерн должен покрыть строку целиком, иначе «Мадонна» пройдёт как часть. Подумайте про re.fullmatch."
      - "У объекта совпадения есть метод, который собирает все именованные группы в словарь."
    solution: |
      import re

      def split_full_name(full_name):
          m = re.fullmatch(r"(?P<surname>\w+) (?P<name>\w+) (?P<patronymic>\w+)", full_name)
          return m.groupdict() if m else {}
