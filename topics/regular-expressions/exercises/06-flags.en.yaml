exercises:
  - id: flags-quiz-001
    concept: flags
    type: theory-quiz
    difficulty: 1
    prompt: "What does the flag `re.IGNORECASE` (`re.I`) do?"
    choices:
      - id: a
        text: "Makes the engine compare letters case-insensitively across the whole"
      - id: b
        text: "Switches `^` and `$` to the start and end of every line of text."
      - id: c
        text: "Lets the dot `.` match a line break."
      - id: d
        text: "Turns off Unicode support in the classes `\\w`, `\\d`, `\\s`."
    correct: [a]
    explanation: "re.IGNORECASE makes character comparison case-insensitive for the entire pattern, including Cyrillic letters - it's a separate engine-mode switch, not a change to the pattern's own syntax."
    variants:
      - prompt: "What does the flag `re.MULTILINE` (`re.M`) do?"
        choices:
          - id: a
            text: "Switches `^` and `$` to the start and end of every line of"
          - id: b
            text: "Makes the dot `.` match a line break."
          - id: c
            text: "Makes character comparison case-insensitive."
          - id: d
            text: "Allows whitespace and comments inside the pattern."
        correct: [a]
        explanation: "re.MULTILINE changes the behavior of the anchors ^ and $ specifically: they start matching right after every \\n and right before every \\n. It doesn't affect \\A and \\Z at all."
      - prompt: "What does the flag `re.DOTALL` (`re.S`) do?"
        choices:
          - id: a
            text: "Lets the dot `.` also match a line break character."
          - id: b
            text: "Switches the anchors to per-line mode."
          - id: c
            text: "Allows whitespace and #-comments inside the pattern's text."
          - id: d
            text: "Restricts `\\w`, `\\d`, `\\s` to ASCII characters only."
        correct: [a]
        explanation: "By default . matches any character except \\n. re.DOTALL removes that one exception, which is especially dangerous combined with a greedy .* over multiline text."

  - id: flags-predict-001
    concept: flags
    type: predict-output
    difficulty: 2
    prompt: "What does this code print? Pay attention to the difference between the two calls."
    snippet: |
      import re

      log = "Start\nError: disk\nStop"
      print(re.findall(r"^\S+", log))
      print(re.findall(r"^\S+", log, re.MULTILINE))
    expected:
      kind: stdout
      value: |-
        ['Start']
        ['Start', 'Error:', 'Stop']
    explanation: "Without the flag, ^ only sees the start of the entire text, so a single fragment is found. With re.MULTILINE, ^ also matches right after every \\n, so \\S+ starts fresh on every line."
    hints:
      - "^ by default means 'the very start of the text', not 'the start of a line' - those are the same thing only for the first line."
      - "Count separately how many times \\S+ can start from a position where ^ is allowed to match, in each of the two modes."
    variants:
      - snippet: |
          import re

          text = "one\ntwo\nthree"
          print(re.findall(r"\A\w+", text, re.MULTILINE))
          print(re.findall(r"^\w+", text, re.MULTILINE))
        expected:
          kind: stdout
          value: |-
            ['one']
            ['one', 'two', 'three']
        explanation: "re.MULTILINE changes how ^ behaves, but has no effect at all on \\A: \\A always means 'the start of the whole text', no matter how many flags are set. So the first call finds only the first word, and the second finds a word at the start of every line."
      - snippet: |
          import re

          text = "log:\nline1\nline2\nend"
          print(re.search(r"log:(.*)end", text))
          print(re.search(r"log:(.*)end", text, re.DOTALL).group(1).strip())
        expected:
          kind: stdout
          value: |-
            None
            line1
            line2
        explanation: "Without re.DOTALL, the dot doesn't cross \\n, so .* stops right after 'log:' and never reaches 'end': no match. With re.DOTALL the dot also matches \\n, the group captures all the text between the two markers, and .strip() removes the leading and trailing line breaks."

  - id: flags-blanks-001
    concept: flags
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the call so it finds every log line starting with 'warn' in any case - one match per line of text."
    template: |
      import re

      log = "warn: disk\nINFO: start\nWarn: network"
      warnings = re.findall(r"^warn:.*$", log, {{flags}})
    blanks:
      flags:
        accept: ['re.IGNORECASE | re.MULTILINE', 're.MULTILINE | re.IGNORECASE', 're.I | re.M', 're.M | re.I']
    hints:
      - "You need two independent engine modes at once: case doesn't matter, and the anchors have to work per line."
      - "Flags are combined with a bitwise OR - one argument joined with |, not two separate arguments."
    variants:
      - prompt: "Fill in the call so the dot inside the pattern also matches a line break - you need to pull out the content of a multiline block in one piece."
        template: |
          import re

          text = "start\nblock\nend"
          found = re.search(r"start(.*)end", text, {{flag}})
        blanks:
          flag:
            accept: ['re.DOTALL', 're.S']
      - prompt: "Fill in the call so the compiler allows whitespace, line breaks, and #-comments inside the pattern's text."
        template: |
          import re

          CODE_RE = re.compile(r"""
              \d{3}   # code
              -
              \d{4}   # number
          """, {{flag}})
        blanks:
          flag:
            accept: ['re.VERBOSE', 're.X']

  - id: find-error-lines-001
    concept: flags
    type: python-function
    difficulty: 2
    prompt: "Implement `find_error_lines(log)`: return a list of log lines (the full line text, unchanged) that contain the word 'error' in any case. Each line is checked independently."
    starter: |
      import re

      def find_error_lines(log):
          ...
    cases:
      - call: 'find_error_lines("start\nERROR: disk full\ninfo\nerror network\nend")'
        expect: ["ERROR: disk full", "error network"]
      - call: 'find_error_lines("start\ninfo\nend")'
        expect: []
      - call: 'find_error_lines("line 1\nError: overheating\nline 3")'
        expect: ["Error: overheating"]
      - call: 'find_error_lines("")'
        expect: []
    hints:
      - "This is about lines of text separated by line breaks - so the ^ and $ anchors need per-line mode, not the 'whole text at once' mode."
      - "The case of the word 'error' in the text isn't fixed - you'll need a second flag, combined with the first via |."
    solution: |
      import re

      def find_error_lines(log):
          return re.findall(r"^.*error.*$", log, re.IGNORECASE | re.MULTILINE)

  - id: extract-notes-001
    concept: flags
    type: python-function
    difficulty: 3
    prompt: "Implement `extract_notes(text)`: return a list of the contents of every `/* ... */` block (without the markers themselves, without leading or trailing whitespace or line breaks). A block can span multiple lines."
    starter: |
      import re

      def extract_notes(text):
          ...
    cases:
      - call: 'extract_notes("code\n/* TODO:\nfix it */\nend")'
        expect: ["TODO:\nfix it"]
      - call: 'extract_notes("/* first */ x /* second\nline */")'
        expect: ["first", "second\nline"]
      - call: 'extract_notes("just text")'
        expect: []
      - call: 'extract_notes("/**/")'
        expect: [""]
    hints:
      - "A block can stretch over several lines - and the dot doesn't take a line break by default. Which flag changes that?"
      - "The quantifier inside the block needs to be non-greedy: a greedy .* under this flag would grab from the very first /* to the very last */ in the whole text, merging different notes into one."
      - "After re.findall, don't forget to .strip() each found chunk - the markers themselves don't need dropping, they're already excluded from the group."
    solution: |
      import re

      def extract_notes(text):
          return [note.strip() for note in re.findall(r"/\*(.*?)\*/", text, re.DOTALL)]

  - id: is-valid-passport-001
    concept: flags
    type: python-function
    difficulty: 3
    prompt: "Implement `is_valid_passport(s)`: return True if the string consists entirely of a series (4 digits), one space, and a number (6 digits) - for example '4509 123456'. Build the pattern with `re.compile` and the `re.VERBOSE` flag with per-line comments."
    starter: |
      import re

      def is_valid_passport(s):
          ...
    cases:
      - call: 'is_valid_passport("4509 123456")'
        expect: true
      - call: 'is_valid_passport("4509123456")'
        expect: false
      - call: 'is_valid_passport("450 9123456")'
        expect: false
      - call: 'is_valid_passport("4509  123456")'
        expect: false
      - call: 'is_valid_passport("abcd 123456")'
        expect: false
    hints:
      - "re.VERBOSE ignores formatting indentation and line breaks, but not just any space - a literal space that has to be part of the match must be written explicitly."
      - "Checking 'the whole string, no junk around it' isn't re.search or re.match - it's the third function in the re module."
      - "\\s inside the pattern is still an ordinary character class and requires exactly one whitespace character unless you add a quantifier to it."
    solution: |
      import re

      PASSPORT_RE = re.compile(r"""
          \d{4}   # 4-digit series
          \s      # space between series and number
          \d{6}   # 6-digit number
      """, re.VERBOSE)

      def is_valid_passport(s):
          return bool(PASSPORT_RE.fullmatch(s))
