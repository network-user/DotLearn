exercises:
  - id: flags-quiz-001
    concept: flags
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает флаг `re.IGNORECASE` (`re.I`)?"
    choices:
      - id: a
        text: "Заставляет движок сравнивать буквы без учёта регистра на протяжении всего"
      - id: b
        text: "Переключает `^` и `$` на начало и конец каждой строки текста."
      - id: c
        text: "Разрешает точке `.` совпадать с переводом строки."
      - id: d
        text: "Отключает поддержку Юникода в классах `\\w`, `\\d`, `\\s`."
    correct: [a]
    explanation: "re.IGNORECASE делает сравнение символов регистронезависимым для всего паттерна целиком, включая кириллицу - это отдельный переключатель режима движка, а не изменение синтаксиса самого паттерна."
    variants:
      - prompt: "Что делает флаг `re.MULTILINE` (`re.M`)?"
        choices:
          - id: a
            text: "Переключает `^` и `$` на начало и конец каждой строки текста, а не"
          - id: b
            text: "Заставляет точку `.` совпадать с переводом строки."
          - id: c
            text: "Делает сравнение символов нечувствительным к регистру."
          - id: d
            text: "Разрешает пробелы и комментарии внутри паттерна."
        correct: [a]
        explanation: "re.MULTILINE меняет поведение именно якорей ^ и $: они начинают совпадать после каждого \\n и перед каждым \\n. На \\A и \\Z этот флаг не влияет вовсе."
      - prompt: "Что делает флаг `re.DOTALL` (`re.S`)?"
        choices:
          - id: a
            text: "Разрешает точке `.` совпадать в том числе с символом перевода строки."
          - id: b
            text: "Переключает якоря на построчный режим."
          - id: c
            text: "Разрешает пробелы и `#`-комментарии внутри текста паттерна."
          - id: d
            text: "Ограничивает `\\w`, `\\d`, `\\s` только ASCII-символами."
        correct: [a]
        explanation: "По умолчанию . совпадает с любым символом, кроме \\n. re.DOTALL снимает это единственное исключение, что особенно опасно вместе с жадным .* на многострочном тексте."

  - id: flags-predict-001
    concept: flags
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает этот код? Обратите внимание на разницу между двумя вызовами."
    snippet: |
      import re

      log = "Пуск\nОшибка: диск\nСтоп"
      print(re.findall(r"^\S+", log))
      print(re.findall(r"^\S+", log, re.MULTILINE))
    expected:
      kind: stdout
      value: |-
        ['Пуск']
        ['Пуск', 'Ошибка:', 'Стоп']
    explanation: "Без флага ^ видит только начало всего текста, поэтому находится один фрагмент. С re.MULTILINE ^ совпадает ещё и сразу после каждого \\n, поэтому \\S+ стартует заново на каждой строке."
    hints:
      - "^ по умолчанию значит «самое начало текста», а не «начало строки» - это одно и то же только для первой строки."
      - "Посчитайте отдельно, сколько раз \\S+ может стартовать с позиции, где ^ разрешено совпадать, в каждом из двух режимов."
    variants:
      - snippet: |
          import re

          text = "один\nдва\nтри"
          print(re.findall(r"\A\w+", text, re.MULTILINE))
          print(re.findall(r"^\w+", text, re.MULTILINE))
        expected:
          kind: stdout
          value: |-
            ['один']
            ['один', 'два', 'три']
        explanation: "re.MULTILINE меняет поведение ^, но никак не касается \\A: \\A всегда означает «начало всего текста», сколько бы флагов ни было включено. Поэтому первый вызов находит только первое слово, а второй - слово в начале каждой строки."
      - snippet: |
          import re

          text = "лог:\nстрока1\nстрока2\nконец"
          print(re.search(r"лог:(.*)конец", text))
          print(re.search(r"лог:(.*)конец", text, re.DOTALL).group(1).strip())
        expected:
          kind: stdout
          value: |-
            None
            строка1
            строка2
        explanation: "Без re.DOTALL точка не пересекает \\n, поэтому .* обрывается на первой же строке и до «конец» не дотягивается - совпадения нет. С re.DOTALL точка принимает и \\n, группа захватывает весь текст между маркерами, а .strip() убирает крайние переводы строк."

  - id: flags-blanks-001
    concept: flags
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните вызов так, чтобы найти все строки лога, начинающиеся с «warn» в любом регистре - по одному совпадению на каждую строку текста."
    template: |
      import re

      log = "warn: диск\nINFO: старт\nWarn: сеть"
      warnings = re.findall(r"^warn:.*$", log, {{flags}})
    blanks:
      flags:
        accept: ['re.IGNORECASE | re.MULTILINE', 're.MULTILINE | re.IGNORECASE', 're.I | re.M', 're.M | re.I']
    hints:
      - "Нужны сразу два независимых режима движка: регистр не важен, и якоря должны работать по каждой строке отдельно."
      - "Флаги объединяются побитовым «или» - одним аргументом через |, а не двумя отдельными аргументами."
    variants:
      - prompt: "Дополните вызов так, чтобы точка внутри паттерна совпадала и с переводом строки - нужно вытащить содержимое многострочного блока целиком."
        template: |
          import re

          text = "старт\nблок\nконец"
          found = re.search(r"старт(.*)конец", text, {{flag}})
        blanks:
          flag:
            accept: ['re.DOTALL', 're.S']
      - prompt: "Дополните вызов так, чтобы компилятор разрешил пробелы, переводы строк и #-комментарии внутри текста паттерна."
        template: |
          import re

          CODE_RE = re.compile(r"""
              \d{3}   # код
              -
              \d{4}   # номер
          """, {{flag}})
        blanks:
          flag:
            accept: ['re.VERBOSE', 're.X']

  - id: find-error-lines-001
    concept: flags
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `find_error_lines(log)`: верните список строк лога (полный текст строки, без изменений), в которых встречается слово «ошибка» в любом регистре. Каждая строка проверяется независимо."
    starter: |
      import re

      def find_error_lines(log):
          ...
    cases:
      - call: 'find_error_lines("старт\nОШИБКА: диск полон\nинфо\nошибка сети\nконец")'
        expect: ["ОШИБКА: диск полон", "ошибка сети"]
      - call: 'find_error_lines("старт\nинфо\nконец")'
        expect: []
      - call: 'find_error_lines("линия 1\nОшибка: перегрев\nлиния 3")'
        expect: ["Ошибка: перегрев"]
      - call: 'find_error_lines("")'
        expect: []
    hints:
      - "Задача про строки текста, разделённые переводами строк - значит якорям ^ и $ нужен построчный режим, а не режим «весь текст целиком»."
      - "Регистр слова «ошибка» в тексте не фиксирован - понадобится второй флаг, объединённый с первым через |."
    solution: |
      import re

      def find_error_lines(log):
          return re.findall(r"^.*ошибка.*$", log, re.IGNORECASE | re.MULTILINE)

  - id: extract-notes-001
    concept: flags
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `extract_notes(text)`: верните список содержимого всех блоков `/* ... */` (без самих маркеров, без крайних пробелов и переводов строк). Блок может занимать несколько строк."
    starter: |
      import re

      def extract_notes(text):
          ...
    cases:
      - call: 'extract_notes("код\n/* TODO:\nпочинить */\nконец")'
        expect: ["TODO:\nпочинить"]
      - call: 'extract_notes("/* первая */ x /* вторая\nстрока */")'
        expect: ["первая", "вторая\nстрока"]
      - call: 'extract_notes("просто текст")'
        expect: []
      - call: 'extract_notes("/**/")'
        expect: [""]
    hints:
      - "Блок может растягиваться на несколько строк - а точка по умолчанию перевод строки не берёт. Какой флаг это меняет?"
      - "Квантификатор внутри блока должен быть нежадным: жадный .* под этим флагом захватит от первого /* до самого последнего */ во всём тексте, склеив разные заметки в одну."
      - "После re.findall не забудьте .strip() у каждого найденного куска - сами маркеры отбрасывать не нужно, они и так не входят в группу."
    solution: |
      import re

      def extract_notes(text):
          return [note.strip() for note in re.findall(r"/\*(.*?)\*/", text, re.DOTALL)]

  - id: is-valid-passport-001
    concept: flags
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `is_valid_passport(s)`: верните True, если строка целиком состоит из серии (4 цифры), одного пробела и номера (6 цифр) - например «4509 123456». Соберите паттерн через `re.compile` с флагом `re.VERBOSE` и построчными комментариями."
    starter: |
      import re

      def is_valid_passport(s):
          ...
    cases:
      - call: 'is_valid_passport("4509 123456")'
        expect: true
      - call: 'is_valid_passport("4509123456")'
        expect: false
      - call: 'is_valid_passport("450 9123456")'
        expect: false
      - call: 'is_valid_passport("4509  123456")'
        expect: false
      - call: 'is_valid_passport("abcd 123456")'
        expect: false
    hints:
      - "re.VERBOSE игнорирует отступы и переводы строк форматирования, но не любой пробел - литеральный пробел, который должен войти в совпадение, придётся записать явно."
      - "Проверка «строка целиком, без мусора по краям» - это не re.search и не re.match, а третья функция модуля re."
      - "\\s внутри паттерна остаётся обычным символьным классом и требует ровно один пробельный символ, если не добавить к нему квантификатор."
    solution: |
      import re

      PASSPORT_RE = re.compile(r"""
          \d{4}   # серия из 4 цифр
          \s      # пробел между серией и номером
          \d{6}   # номер из 6 цифр
      """, re.VERBOSE)

      def is_valid_passport(s):
          return bool(PASSPORT_RE.fullmatch(s))
