exercises:
  - id: lookaround-quiz-001
    concept: lookaround
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает позитивный lookahead `(?=...)`?"
    choices:
      - id: a
        text: "Проверяет, что дальше идёт указанный текст, но не потребляет его и не включает в совпадение."
      - id: b
        text: "Требует, чтобы указанный текст шёл сразу дальше, и добавляет его в совпадение."
      - id: c
        text: "Делает предыдущий элемент паттерна необязательным."
      - id: d
        text: "Ищет указанный текст в любом месте строки, независимо от позиции."
    correct: [a]
    explanation: "Lookahead - это утверждение нулевой ширины: он проверяет контекст впереди текущей позиции и ничего не потребляет, поэтому текст под (?=...) никогда не попадает в group()."
    variants:
      - prompt: "Что делает `(?<!...)`?"
        choices:
          - id: a
            text: "Негативный lookbehind: проверяет, что непосредственно перед текущей позицией НЕТ указанного текста."
          - id: b
            text: "Негативный lookahead: проверяет, что дальше НЕТ указанного текста."
          - id: c
            text: "Требует, чтобы позиция была в начале строки."
          - id: d
            text: "Экранирует предыдущую группу."
        correct: [a]
        explanation: "Знак < означает «смотрим назад», ! означает отрицание. (?<!...) проваливается, если прямо перед позицией стоит запрещённый текст, и ничего не потребляет."
      - prompt: "Почему `(?<=\\d+)` не скомпилируется в модуле re?"
        choices:
          - id: a
            text: "Потому что lookbehind в re обязан иметь фиксированную длину, а \\d+ её не гарантирует."
          - id: b
            text: "Потому что \\d нельзя использовать внутри lookbehind."
          - id: c
            text: "Потому что lookbehind не поддерживает классы символов."
          - id: d
            text: "Синтаксис верный, ошибка возникает только при выполнении, не при компиляции."
        correct: [a]
        explanation: "Движку нужно заранее знать, на сколько символов назад заглядывать. Разрешены точные квантификаторы вроде {3} и альтернативы одной длины, но не + или *."

  - id: lookaround-predict-001
    concept: lookaround
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает этот код? Обе проверки стоят в начале паттерна."
    snippet: |
      import re
      pattern = r"(?=.*\d)(?=.*[a-zA-Zа-яёА-ЯЁ]).{8,}"
      print(bool(re.fullmatch(pattern, "password1")))
      print(bool(re.fullmatch(pattern, "12345678")))
    expected:
      kind: stdout
      value: |-
        True
        False
    explanation: "У «password1» есть и цифра, и буква, длина от 8 символов - обе проверки нулевой ширины проходят от позиции 0. У «12345678» цифры есть, буквы нет - второй lookahead проваливается, несмотря на подходящую длину."
    hints:
      - "Оба (?=...) стоят у самого начала и не сдвигают позицию поиска - они проверяют всю оставшуюся строку целиком, а не следующий символ."
      - "Посчитайте отдельно: есть ли цифра, есть ли буква, хватает ли длины у каждой строки."
    variants:
      - snippet: |
          import re
          text = "Сотрудники: Иванов (уволен), Петров, Иванов, Сидоров (уволен)"
          print(re.findall(r"Иванов(?! \(уволен\))", text))
        expected:
          kind: stdout
          value: |-
            ['Иванов']
        explanation: "Первое «Иванов» помечено «(уволен)», негативный lookahead запрещает эту пометку и отбрасывает совпадение целиком. Второе «Иванов» без пометки, проходит."
      - snippet: |
          import re
          text = "цена 100, скидка 12.5, вес 42"
          print(re.findall(r"\d+(?!\.\d)", text))
        expected:
          kind: stdout
          value: |-
            ['100', '1', '5', '42']
        explanation: "У «12.5» жадный \\d+ сначала берёт «12», проверка проваливается, движок откатывает квантификатор до «1» - и тут проверка неожиданно проходит, потому что сразу после «1» стоит «2», а не точка. Получается кривое совпадение «1», а следом отдельно находится «5»."

  - id: lookaround-blanks-001
    concept: lookaround
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните паттерн так, чтобы он находил число, только если сразу за ним (через необязательный пробел) идёт «руб», не включая эти буквы в совпадение."
    template: |
      import re
      amounts = re.findall(r"\d+{{la}}", "1500 руб, 300 кг")
    blanks:
      la:
        accept: ['(?=\s?руб)', '(?=\s*руб)']
    hints:
      - "Нужна проверка контекста впереди, которая ничего не потребляет - иначе «руб» попадёт в результат вместе с числом."
      - "Такая проверка начинается с (?= и закрывается обычной скобкой."
    variants:
      - prompt: "Дополните паттерн, чтобы найти «кот» только там, где перед ним нет буквы «с»."
        template: |
          import re
          hits = re.findall(r"{{lb}}кот", "кот и скот")
        blanks:
          lb:
            accept: ['(?<!с)']
      - prompt: "Дополните паттерн, чтобы вытащить число сразу после знака доллара, не включая сам знак."
        template: |
          import re
          amounts = re.findall(r"{{lb}}\d+", "Итого: $100")
        blanks:
          lb:
            accept: ['(?<=\$)']

  - id: extract-ruble-amounts-001
    concept: lookaround
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `extract_ruble_amounts(text)`: верните список целых чисел (int) - сумм в рублях. Числом в рублях считается последовательность цифр, сразу за которой (с необязательным пробелом) идёт «руб». Само слово «руб» в результат не включайте."
    starter: |
      import re

      def extract_ruble_amounts(text):
          ...
    cases:
      - call: 'extract_ruble_amounts("Итого 1500 руб")'
        expect: [1500]
      - call: 'extract_ruble_amounts("Товар 300руб, доставка 150 руб")'
        expect: [300, 150]
      - call: 'extract_ruble_amounts("Вес 1500 г, цена 1500руб")'
        expect: [1500]
      - call: 'extract_ruble_amounts("Бесплатно")'
        expect: []
    hints:
      - "Как выделить число, но не забрать «руб» в совпадение? Позицию после числа нужно проверить, а не потребить."
      - "Позитивный lookahead (?=...) проверяет, что дальше идёт нужный текст, не включая его в найденный фрагмент."
      - "Пробел перед «руб» бывает, а бывает и нет - сделайте его необязательным через ?, и не забудьте привести найденные строки к int."
    solution: |
      import re

      def extract_ruble_amounts(text):
          return [int(x) for x in re.findall(r"\d+(?=\s?руб)", text)]

  - id: is-strong-password-001
    concept: lookaround
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `is_strong_password(s)`: верните True, если строка состоит минимум из 8 символов и содержит хотя бы одну цифру и хотя бы одну букву (латинскую или кириллическую), в любом порядке."
    starter: |
      import re

      def is_strong_password(s):
          ...
    cases:
      - call: 'is_strong_password("password1")'
        expect: true
      - call: 'is_strong_password("12345678")'
        expect: false
      - call: 'is_strong_password("password")'
        expect: false
      - call: 'is_strong_password("pass1")'
        expect: false
      - call: 'is_strong_password("Пароль12")'
        expect: true
    hints:
      - "Здесь нужно проверить несколько независимых условий от одной и той же позиции, не потребляя текст под них по отдельности."
      - "Lookahead в начале паттерна (?=.*цифра) проверяет «где-то впереди есть цифра» и не двигает позицию - так можно поставить подряд несколько условий."
      - "После всех проверок остаётся описать общую длину и допустимые символы одной конструкцией, например .{8,}, и свериться через re.fullmatch."
    solution: |
      import re

      def is_strong_password(s):
          pattern = r"(?=.*\d)(?=.*[a-zA-Zа-яёА-ЯЁ]).{8,}"
          return bool(re.fullmatch(pattern, s))

  - id: extract-plain-numbers-001
    concept: lookaround
    type: python-function
    difficulty: 4
    prompt: "Реализуйте `extract_plain_numbers(text)`: верните список целых чисел (int) для всех последовательностей цифр в тексте, КРОМЕ тех, что идут сразу после «-» (отрицательные суммы) и КРОМЕ тех, за которыми сразу следует «%» (проценты)."
    starter: |
      import re

      def extract_plain_numbers(text):
          ...
    cases:
      - call: 'extract_plain_numbers("Цена 1500, скидка -200, налог 5%, итого 1300")'
        expect: [1500, 1300]
      - call: 'extract_plain_numbers("100%")'
        expect: []
      - call: 'extract_plain_numbers("-50 руб")'
        expect: []
      - call: 'extract_plain_numbers("42")'
        expect: [42]
    hints:
      - "Здесь нужно исключить числа, у которых слева стоит знак минус или справа знак процента, не трогая сами цифры совпадения."
      - "Негативный lookbehind (?<!...) проверяет символ перед началом совпадения, негативный lookahead (?!...) - символ после конца."
      - "Добавьте границу \\b и перед, и после \\d+: без неё движок сможет откатить квантификатор на более короткое число и всё равно найти совпадение под запрещённым знаком."
    solution: |
      import re

      def extract_plain_numbers(text):
          return [int(x) for x in re.findall(r"(?<!-)\b\d+\b(?!%)", text)]
