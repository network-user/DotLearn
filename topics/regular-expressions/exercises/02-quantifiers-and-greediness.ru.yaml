exercises:
  - id: quant-quiz-001
    concept: quantifiers-and-greediness
    type: theory-quiz
    difficulty: 1
    prompt: "Что означает квантификатор `{2,4}` в паттерне `а{2,4}`?"
    choices:
      - id: a
        text: "От двух до четырёх букв «а» подряд."
      - id: b
        text: "Букву «а», затем число от 2 до 4."
      - id: c
        text: "Два или четыре повторения, но не три."
      - id: d
        text: "Повторение всего паттерна от двух до четырёх раз."
    correct: [a]
    explanation: "Фигурные скобки задают диапазон повторений предыдущего элемента, границы включительно: подойдут «аа», «ааа» и «аааа». Квантификатор управляет только последним элементом, а не всем паттерном."
    variants:
      - prompt: "Чем `*` отличается от `+`?"
        choices:
          - id: a
            text: "`*` допускает ноль повторений, `+` требует"
          - id: b
            text: "`*` повторяет весь паттерн, `+` только один символ."
          - id: c
            text: "`+` жадный, а `*` ленивый."
          - id: d
            text: "Ничем, это синонимы."
        correct: [a]
        explanation: "Оба жадные и оба повторяют предыдущий элемент. Разница только в нижней границе: * это {0,}, а + это {1,}. Поэтому а* совпадает даже с пустотой, а а+ требует хотя бы одну «а»."
      - prompt: "Что означает `?` сразу после литерала, например в `нет?`?"
        choices:
          - id: a
            text: "Буква «т» необязательна: совпадут и «не», и «нет»."
          - id: b
            text: "Паттерн задаёт вопрос движку и возвращает булево значение."
          - id: c
            text: "Любой один символ после «нет»."
          - id: d
            text: "Ленивое повторение буквы «т»."
        correct: [a]
        explanation: "После элемента ? означает «ноль или одно повторение», то есть необязательность. Ленивым ? делает не элемент, а другой квантификатор: *?, +?, {2,4}?."

  - id: greedy-predict-001
    concept: quantifiers-and-greediness
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает этот код? Вспомните, как жадный квантификатор выбирает границы совпадения."
    snippet: |
      import re
      text = 'Он сказал "привет" и "пока" всем'
      print(re.findall(r'".*"', text))
    expected:
      kind: stdout
      value: |-
        ['"привет" и "пока"']
    explanation: "Жадный .* захватывает максимум и отдаёт назад ровно столько, чтобы нашлась закрывающая кавычка. Поэтому совпадение тянется от первой кавычки до последней, одно на всю строку."
    hints:
      - "Жадный квантификатор сначала съедает всё до конца строки, а потом откатывается. До какой кавычки он откатится?"
      - "Совпадение получится одно, от первой кавычки до последней, вместе с текстом между ними."
    variants:
      - snippet: |
          import re
          text = 'Он сказал "привет" и "пока" всем'
          print(re.findall(r'".*?"', text))
        expected:
          kind: stdout
          value: |-
            ['"привет"', '"пока"']
        explanation: "Ленивый .*? расширяется по одному символу и останавливается на ближайшей закрывающей кавычке, поэтому пары кавычек находятся по отдельности."
      - snippet: |
          import re
          print(re.findall(r"го+л", "гол гоол гооооол гл"))
        expected:
          kind: stdout
          value: |-
            ['гол', 'гоол', 'гооооол']
        explanation: "о+ означает «одна и более букв о», поэтому «гл» без единой «о» не совпадает, а остальные слова находятся целиком."

  - id: quant-blanks-001
    concept: quantifiers-and-greediness
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните паттерн квантификатором так, чтобы он находил и «не», и «нет»: буква «т» должна быть необязательной."
    template: |
      import re
      hits = re.findall(r"нет{{opt}}", "не или нет")
    blanks:
      opt:
        accept: ['?']
    hints:
      - "Нужен квантификатор со смыслом «ноль или одно повторение» для последней буквы."
      - "Тот же знак, который в regex делает элемент необязательным."
    variants:
      - prompt: "Дополните квантификатор «ровно шесть повторений», чтобы найти шестизначный почтовый индекс."
        template: |
          import re
          codes = re.findall(r"[0-9]{{rep}}", "индекс 101000")
        blanks:
          rep:
            accept: ['{6}', '{6,6}']
      - prompt: "Дополните квантификатор так, чтобы каждый тег нашёлся отдельно: `['<b>', '</b>', '<i>', '</i>']`."
        template: |
          import re
          tags = re.findall(r"<.{{lazy}}>", "<b>жирный</b> и <i>курсив</i>")
        blanks:
          lazy:
            accept: ['*?']

  - id: extract-numbers-001
    concept: quantifiers-and-greediness
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `extract_numbers(text)`: верните список всех целых чисел из текста как значения int, в порядке появления. Числом считается непрерывная последовательность цифр."
    starter: |
      import re

      def extract_numbers(text):
          ...
    cases:
      - call: 'extract_numbers("Купил 2 кофе по 250 рублей, итого 500")'
        expect: [2, 250, 500]
      - call: 'extract_numbers("телефон 8 900 123 45 67")'
        expect: [8, 900, 123, 45, 67]
      - call: 'extract_numbers("без чисел")'
        expect: []
    hints:
      - "Задача разбивается на два шага: найти все островки цифр, затем превратить каждую строку в число."
      - "Какой класс описывает цифру и какой квантификатор склеит цифры, идущие подряд, в одно совпадение?"
      - "findall вернёт список строк, пройдитесь по нему с int()."
    solution: |
      import re

      def extract_numbers(text):
          return [int(number) for number in re.findall(r"\d+", text)]
