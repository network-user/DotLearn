exercises:
  - id: groups-quiz-001
    concept: groups-and-alternation
    type: theory-quiz
    difficulty: 1
    prompt: "Why do you need a group `(?:...)`, if there are ordinary parentheses `(...)`?"
    choices:
      - id: a
        text: "It groups without capturing: it gets no number and doesn't change findall's result."
      - id: b
        text: "It runs faster thanks to capture caching."
      - id: c
        text: "It makes the contents optional."
      - id: d
        text: "It disables backtracking inside itself."
    correct: [a]
    explanation: "(?:...) bundles a chunk of the pattern into a single element for a quantifier or an alternative, but doesn't create a capture. Other groups' numbers don't shift, and findall doesn't switch to returning tuples."
    variants:
      - prompt: "What does the pattern `the cat|dog` match?"
        choices:
          - id: a
            text: "Either 'the cat' or 'dog': the alternation splits the entire pattern."
          - id: b
            text: "Either 'the cat' or 'the dog'."
          - id: c
            text: "Only 'the catdog'."
          - id: d
            text: "The word 'the', followed by either of the two options."
        correct: [a]
        explanation: "| has the lowest precedence: alternatives stretch to the edges of the pattern or the enclosing group. For 'the' to apply to both options, you need a group: the (?:cat|dog)."
      - prompt: "What does `\\1` mean inside a pattern?"
        choices:
          - id: a
            text: "The exact text captured by group 1 must repeat here."
          - id: b
            text: "The pattern of group 1 must repeat here, with any new text."
          - id: c
            text: "The match must start with the digit 1."
          - id: d
            text: "The first group becomes optional."
        correct: [a]
        explanation: "A backreference requires the same captured text, not the same rule: (\\d\\d)-\\1 matches '12-12' but not '12-13'."

  - id: groups-predict-001
    concept: groups-and-alternation
    type: predict-output
    difficulty: 2
    prompt: "What does this code print? Pay attention to how many groups the pattern has."
    snippet: |
      import re
      text = "Smith John, Johnson Anna"
      print(re.findall(r"(\w+) (\w+)", text))
    expected:
      kind: stdout
      value: |-
        [('Smith', 'John'), ('Johnson', 'Anna')]
    explanation: "When a pattern has two or more groups, findall returns a list of tuples of captures, not full matches."
    hints:
      - "The pattern has two capturing groups. How does that change the shape of findall's result?"
      - "Each match turns into a tuple of two captures."
    variants:
      - snippet: |
          import re
          print(re.findall(r"cat|category", "category"))
        expected:
          kind: stdout
          value: |-
            ['cat']
        explanation: "Alternation picks the first option that succeeds, not the longest one: 'cat' comes first and already matches. If you want the full word 'category', put the longer option first."
      - snippet: |
          import re
          print(re.findall(r"(ha)+", "hahaha ho ha"))
        expected:
          kind: stdout
          value: |-
            ['ha', 'ha']
        explanation: "A group under a quantifier stores only the last repetition, and findall with a single group returns exactly the captures: 'hahaha' leaves behind a single 'ha'."

  - id: groups-blanks-001
    concept: groups-and-alternation
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in a non-capturing group with alternation so it matches both 'good morning' and 'good night'."
    template: |
      import re
      hits = re.findall(r"good {{alt}}", "good morning and good night")
    blanks:
      alt:
        accept: ['(?:morning|night)', '(?:night|morning)']
    hints:
      - "Alternation without parentheses would drag 'good' into the first option. Which construct limits it without creating a capture?"
      - "A non-capturing group starts with (?: and holds both words separated by a vertical bar."
    variants:
      - prompt: "Fill in a backreference to the first group so it finds a doubled word."
        template: |
          import re
          doubled = re.findall(r"(\w+) {{ref}}", "this is is a test")
        blanks:
          ref:
            accept: ['\1']
      - prompt: "Give the group the name price so the group call works."
        template: |
          import re
          m = re.search(r"(?P<{{name}}>\d+) usd", "coffee costs 250 usd")
          value = m.group("price")
        blanks:
          name:
            accept: ['price']

  - id: split-full-name-001
    concept: groups-and-alternation
    type: python-function
    difficulty: 3
    prompt: "Implement `split_full_name(full_name)`: for a string of the form 'Surname Name Patronymic', return a dict with keys surname, name, patronymic. If the string does not consist of exactly three words separated by single spaces, return an empty dict."
    starter: |
      import re

      def split_full_name(full_name):
          ...
    cases:
      - call: 'split_full_name("Иванов Иван Иванович")'
        expect: { surname: "Иванов", name: "Иван", patronymic: "Иванович" }
      - call: 'split_full_name("Пушкин Александр Сергеевич")'
        expect: { surname: "Пушкин", name: "Александр", patronymic: "Сергеевич" }
      - call: 'split_full_name("Мадонна")'
        expect: {}
      - call: 'split_full_name("Иванов  Иван  Иванович")'
        expect: {}
    hints:
      - "Three parts of one shape, each needs to be captured and named. Which construct gives a named capture?"
      - "The pattern must cover the whole string, otherwise 'Мадонна' would pass as one part of it. Think about re.fullmatch."
      - "The match object has a method that collects all named groups into a dict."
    solution: |
      import re

      def split_full_name(full_name):
          m = re.fullmatch(r"(?P<surname>\w+) (?P<name>\w+) (?P<patronymic>\w+)", full_name)
          return m.groupdict() if m else {}
