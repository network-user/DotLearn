exercises:
  - id: metachar-quiz-001
    concept: literals-and-classes
    type: theory-quiz
    difficulty: 1
    prompt: "Какой элемент паттерна означает «ровно один любой символ, кроме перевода строки»?"
    choices:
      - id: a
        text: "Точка: `.`"
      - id: b
        text: "Звёздочка: `*`"
      - id: c
        text: "Плюс: `+`"
      - id: d
        text: "Подчёркивание: `_`"
    correct: [a]
    explanation: "Точка совпадает с одним любым символом, кроме перевода строки. Звёздочка и плюс сами по себе ничего не находят: это квантификаторы, они повторяют предыдущий элемент. Подчёркивание обычный литерал."
    variants:
      - prompt: "Что находит класс символов `[абв]`?"
        choices:
          - id: a
            text: "Один символ: либо «а», либо «б», либо «в»."
          - id: b
            text: "Последовательность «абв» целиком."
          - id: c
            text: "Любое слово, составленное из букв а, б и в."
          - id: d
            text: "Строку, которая начинается с «а» и заканчивается на «в»."
        correct: [a]
        explanation: "Класс символов всегда описывает ровно один символ из набора. Чтобы найти последовательность «абв», нужен литерал абв без скобок, а для слов из этих букв понадобился бы квантификатор: [абв]+."
      - prompt: "Что находит класс `[^а-я]`?"
        choices:
          - id: a
            text: "Один любой символ, кроме строчных русских букв от «а» до «я»."
          - id: b
            text: "Начало строки, за которым идут строчные буквы."
          - id: c
            text: "Только заглавные русские буквы."
          - id: d
            text: "Строку, в которой вообще нет строчных русских букв."
        correct: [a]
        explanation: "Символ ^ первым внутри класса инвертирует набор, и совпадает по-прежнему ровно один символ. Заглавные буквы лишь часть дополнения: под [^а-я] подходят также цифры, пробелы, знаки препинания и даже «ё», которой нет в диапазоне а-я."

  - id: classes-predict-001
    concept: literals-and-classes
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает этот код? Ответ запишите в точности как вывод Python, включая скобки и кавычки."
    snippet: |
      import re
      text = "Заказ 42, стол 7, счёт 1050 рублей"
      print(re.findall(r"\d+", text))
    expected:
      kind: stdout
      value: |-
        ['42', '7', '1050']
    explanation: "Класс \\d совпадает с одной цифрой, квантификатор + склеивает цифры, идущие подряд, в одно совпадение. findall возвращает список строк, а не чисел."
    hints:
      - "\\d+ означает «одна или больше цифр подряд». Сколько таких непрерывных островков цифр в строке?"
      - "findall возвращает строки в порядке появления. Числами они не становятся: кавычки в ответе обязательны."
    variants:
      - snippet: |
          import re
          text = "кот, кит, кут, к-т"
          print(re.findall(r"к[ои]т", text))
        expected:
          kind: stdout
          value: |-
            ['кот', 'кит']
        explanation: "Класс [ои] допускает в средней позиции только «о» или «и». «кут» и «к-т» не проходят."
      - snippet: |
          import re
          text = "версия 3.12, файл v3-12.txt"
          print(re.findall(r"3.12", text))
        expected:
          kind: stdout
          value: |-
            ['3.12', '3-12']
        explanation: "Точка в паттерне не экранирована, поэтому означает «любой символ»: под неё подходит и настоящая точка, и дефис. Для буквальной точки нужен паттерн 3\\.12."

  - id: classes-blanks-001
    concept: literals-and-classes
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните паттерн классом символов так, чтобы он находил «кот» и «кит», но не «кут»."
    template: |
      import re
      words = re.findall(r"к{{cls}}т", "кот, кит, кут")
    blanks:
      cls:
        accept: ['[ои]', '[ио]']
    hints:
      - "Меняется только средняя буква. Какая конструкция описывает «ровно один символ из набора»?"
      - "Перечислите допустимые средние буквы внутри квадратных скобок."
    variants:
      - prompt: "Дополните класс символом отрицания так, чтобы паттерн находил всё, что НЕ является цифрой."
        template: |
          import re
          rest = re.findall(r"[{{neg}}0-9]", "a1 b2 c3")
        blanks:
          neg:
            accept: ['^']
      - prompt: "Дополните паттерн так, чтобы он находил только «3.12», но не «3-12»: точка должна быть литеральной."
        template: |
          import re
          versions = re.findall(r"3{{dot}}12", "версии 3.12 и 3-12")
        blanks:
          dot:
            accept: ['\.', '[.]']

  - id: invalid-chars-001
    concept: literals-and-classes
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `find_invalid_chars(login)`: верните отсортированный список уникальных символов логина, которые запрещены. Разрешены только строчные латинские буквы, цифры и подчёркивание."
    starter: |
      import re

      def find_invalid_chars(login):
          ...
    cases:
      - call: 'find_invalid_chars("ivan_petrov99")'
        expect: []
      - call: 'find_invalid_chars("Ivan")'
        expect: ["I"]
      - call: 'find_invalid_chars("иван-petrov")'
        expect: ["-", "а", "в", "и", "н"]
      - call: 'find_invalid_chars("")'
        expect: []
    hints:
      - "Не проверяйте разрешённые символы, ищите запрещённые: инвертированный класс опишет «всё, что не входит в белый список»."
      - "Соберите все плохие символы через findall, уберите дубли множеством и отсортируйте результат."
      - "Класс разрешённого: строчная латиница, цифры, подчёркивание. Его отрицание пишется одним классом с ^."
    solution: |
      import re

      def find_invalid_chars(login):
          return sorted(set(re.findall(r"[^a-z0-9_]", login)))
