exercises:
  - id: anchors-quiz-001
    concept: anchors-and-boundaries
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает `^` вне класса символов?"
    choices:
      - id: a
        text: "Совпадает с позицией начала строки, не потребляя ни одного символа."
      - id: b
        text: "Инвертирует весь паттерн."
      - id: c
        text: "Совпадает с первым символом строки и потребляет его."
      - id: d
        text: "Экранирует следующий символ."
    correct: [a]
    explanation: "Вне класса ^ это якорь: позиция нулевой ширины в начале строки. Отрицанием он становится только первым символом внутри класса: [^0-9]."
    variants:
      - prompt: "Что такое `\\b` в паттерне?"
        choices:
          - id: a
            text: "Граница слова: позиция нулевой ширины на стыке \\w и не-\\w."
          - id: b
            text: "Любой пробельный символ между словами."
          - id: c
            text: "Первый символ слова, который потребляется совпадением."
          - id: d
            text: "Синоним пробела."
        correct: [a]
        explanation: "\\b не потребляет символов: это позиция, где символ слова встречается с чем-то, что символом слова не является, или с краем строки. Поэтому \\bкот\\b находит слово, а не подстроку."
      - prompt: "Чем паттерн `оплачен$` отличается от `оплачен`?"
        choices:
          - id: a
            text: "С $ совпадение возможно только в конце строки."
          - id: b
            text: "С $ слово должно стоять в начале строки."
          - id: c
            text: "Ничем, $ игнорируется после литералов."
          - id: d
            text: "С $ движок ищет символ доллара после слова."
        correct: [a]
        explanation: "$ это якорь конца строки. Без него «оплачен» найдётся в любом месте текста, с ним только у правого края (или перед хвостовым переводом строки)."

  - id: boundary-predict-001
    concept: anchors-and-boundaries
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает этот код? Подумайте, где именно у слов есть границы."
    snippet: |
      import re
      text = "кот, котлета, скот"
      print(re.findall(r"\bкот\b", text))
    expected:
      kind: stdout
      value: |-
        ['кот']
    explanation: "В «котлета» после «кот» стоит буква, правой границы нет. В «скот» перед «кот» стоит буква, нет левой границы. Проходит только отдельное слово «кот»."
    hints:
      - "\\b требует, чтобы рядом с совпадением не было других символов слова. Проверьте каждое из трёх слов."
      - "«котлета» проваливает правую границу, «скот» левую."
    variants:
      - snippet: |
          import re
          text = "кот, котлета, скот"
          print(re.findall(r"кот", text))
        expected:
          kind: stdout
          value: |-
            ['кот', 'кот', 'кот']
        explanation: "Без границ движок ищет подстроку: она есть в каждом из трёх слов."
      - snippet: |
          import re
          lines = ["заказ оплачен", "оплачен заказ"]
          print([bool(re.search(r"оплачен$", s)) for s in lines])
        expected:
          kind: stdout
          value: |-
            [True, False]
        explanation: "Якорь $ пускает совпадение только в конец строки: в первой строке «оплачен» стоит в конце, во второй в начале."

  - id: anchors-blanks-001
    concept: anchors-and-boundaries
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните якоря так, чтобы паттерн совпадал только когда вся строка состоит из шести цифр, надёжно даже при хвостовом переводе строки."
    template: |
      import re
      ok = bool(re.search(r"{{start}}[0-9]{6}{{end}}", "101000"))
    blanks:
      start:
        accept: ['\A']
      end:
        accept: ['\Z']
    hints:
      - "Паттерн нужно запереть с двух сторон: позиция начала строки слева, позиция конца справа."
      - "Классические ^ и $ здесь дырявые: $ пускает совпадение и перед хвостовым переводом строки. Нужны строгие версии якорей."
    variants:
      - prompt: "Дополните границы слова, чтобы нашлось только отдельное слово «мир»."
        template: |
          import re
          words = re.findall(r"{{left}}мир{{right}}", "мир мирный всемирный")
        blanks:
          left:
            accept: ['\b']
          right:
            accept: ['\b']
      - prompt: "Дополните якорь, чтобы в списке остались только домены, оканчивающиеся на «.ru»."
        template: |
          import re
          hosts = ["mail.ru", "ru.wikipedia.org"]
          ru_hosts = [h for h in hosts if re.search(r"\.ru{{end}}", h)]
        blanks:
          end:
            accept: ['$', '\Z']

  - id: is-integer-string-001
    concept: anchors-and-boundaries
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `is_integer_string(s)`: верните True, если строка ЦЕЛИКОМ является целым числом с необязательным знаком + или -. Строка с хвостовым переводом строки не считается числом."
    starter: |
      import re

      def is_integer_string(s):
          ...
    cases:
      - call: 'is_integer_string("42")'
        expect: true
      - call: 'is_integer_string("-7")'
        expect: true
      - call: 'is_integer_string("+100")'
        expect: true
      - call: 'is_integer_string("4 2")'
        expect: false
      - call: 'is_integer_string("надо 42")'
        expect: false
      - call: 'is_integer_string("12\n")'
        expect: false
      - call: 'is_integer_string("")'
        expect: false
    hints:
      - "Валидация значит «строка целиком»: паттерн нужно запереть якорями с обеих сторон."
      - "Обычный $ пропустит «12» с переводом строки на конце. Какие якоря проверяют именно край текста?"
      - "Знак перед числом это один необязательный символ из набора двух."
    solution: |
      import re

      def is_integer_string(s):
          return bool(re.search(r"\A[+-]?\d+\Z", s))
