exercises:
  - id: quant-quiz-001
    concept: quantifiers-and-greediness
    type: theory-quiz
    difficulty: 1
    prompt: "What does the quantifier `{2,4}` mean in the pattern `a{2,4}`?"
    choices:
      - id: a
        text: "From two to four letters 'a' in a row."
      - id: b
        text: "The letter 'a', followed by a number from 2 to 4."
      - id: c
        text: "Two or four repetitions, but not three."
      - id: d
        text: "Repeats the whole pattern from two to four times."
    correct: [a]
    explanation: "Curly braces set a repetition range for the preceding element, bounds inclusive: 'aa', 'aaa', and 'aaaa' all qualify. The quantifier only controls the last element, not the whole pattern."
    variants:
      - prompt: "How does `*` differ from `+`?"
        choices:
          - id: a
            text: "`*` allows zero repetitions, `+` requires at least one."
          - id: b
            text: "`*` repeats the whole pattern, `+` only a single character."
          - id: c
            text: "`+` is greedy, `*` is lazy."
          - id: d
            text: "No difference, they're synonyms."
        correct: [a]
        explanation: "Both are greedy and both repeat the preceding element. The only difference is the lower bound: `*` is `{0,}` and `+` is `{1,}`. So `a*` matches even an empty string, while `a+` requires at least one 'a'."
      - prompt: "What does `?` mean right after a literal, e.g. in `colou?r`?"
        choices:
          - id: a
            text: "The letter 'u' is optional: both 'color' and 'colour' match."
          - id: b
            text: "The pattern asks the engine a question and returns a boolean."
          - id: c
            text: "Any single character after 'colo'."
          - id: d
            text: "A lazy repetition of the letter 'u'."
        correct: [a]
        explanation: "After an element, ? means 'zero or one repetition', i.e. optional. Laziness isn't produced by ? on its own: it comes from other quantifiers combined with ?: *?, +?, {2,4}?."

  - id: greedy-predict-001
    concept: quantifiers-and-greediness
    type: predict-output
    difficulty: 2
    prompt: "What does this code print? Remember how a greedy quantifier picks the boundaries of a match."
    snippet: |
      import re
      text = 'He said "hi" and "bye" to everyone'
      print(re.findall(r'".*"', text))
    expected:
      kind: stdout
      value: |-
        ['"hi" and "bye"']
    explanation: "The greedy .* grabs the maximum it can and gives back only as much as needed for a closing quote to be found. So the match stretches from the first quote to the last, one match for the whole line."
    hints:
      - "A greedy quantifier first eats everything to the end of the string, then backtracks. Which quote will it back off to?"
      - "There will be a single match, from the first quote to the last, including the text in between."
    variants:
      - snippet: |
          import re
          text = 'He said "hi" and "bye" to everyone'
          print(re.findall(r'".*?"', text))
        expected:
          kind: stdout
          value: |-
            ['"hi"', '"bye"']
        explanation: "The lazy .*? expands one character at a time and stops at the nearest closing quote, so each pair of quotes is found separately."
      - snippet: |
          import re
          print(re.findall(r"co+l", "col cool coooool cl"))
        expected:
          kind: stdout
          value: |-
            ['col', 'cool', 'coooool']
        explanation: "o+ means 'one or more letters o', so 'cl' without a single 'o' doesn't match, while the other words are matched in full."

  - id: quant-blanks-001
    concept: quantifiers-and-greediness
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in a quantifier so the pattern matches both 'color' and 'colour': the letter 'u' must be optional."
    template: |
      import re
      hits = re.findall(r"colou{{opt}}r", "color or colour")
    blanks:
      opt:
        accept: ['?']
    hints:
      - "You need a quantifier meaning 'zero or one repetition' for the last optional letter."
      - "The same symbol that makes an element optional in regex."
    variants:
      - prompt: "Fill in the quantifier for 'exactly six repetitions' to match a six-digit postal code."
        template: |
          import re
          codes = re.findall(r"[0-9]{{rep}}", "postal code 101000")
        blanks:
          rep:
            accept: ['{6}', '{6,6}']
      - prompt: "Fill in the quantifier so each tag is found separately: `['<b>', '</b>', '<i>', '</i>']`."
        template: |
          import re
          tags = re.findall(r"<.{{lazy}}>", "<b>bold</b> and <i>italic</i>")
        blanks:
          lazy:
            accept: ['*?']

  - id: extract-numbers-001
    concept: quantifiers-and-greediness
    type: python-function
    difficulty: 3
    prompt: "Implement `extract_numbers(text)`: return a list of all integers in the text as int values, in order of appearance. A number is a contiguous sequence of digits."
    starter: |
      import re

      def extract_numbers(text):
          ...
    cases:
      - call: 'extract_numbers("Bought 2 coffees at 250 dollars each, total 500")'
        expect: [2, 250, 500]
      - call: 'extract_numbers("phone 8 900 123 45 67")'
        expect: [8, 900, 123, 45, 67]
      - call: 'extract_numbers("no numbers here")'
        expect: []
    hints:
      - "The task splits into two steps: find all islands of digits, then turn each string into a number."
      - "Which class describes a digit, and which quantifier glues consecutive digits into one match?"
      - "findall returns a list of strings; loop over it with int()."
    solution: |
      import re

      def extract_numbers(text):
          return [int(number) for number in re.findall(r"\d+", text)]
