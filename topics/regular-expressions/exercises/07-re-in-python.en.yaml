exercises:
  - id: re-in-python-quiz-001
    concept: re-in-python
    type: theory-quiz
    difficulty: 1
    prompt: "How does `re.fullmatch(pattern, s)` differ from `re.match(pattern, s)`?"
    choices:
      - id: a
        text: "fullmatch requires the pattern to match the entire string, while match only requires the match to start at the very beginning, without caring about the rest of the string."
      - id: b
        text: "fullmatch searches for a match anywhere in the string, while match only checks the very beginning."
      - id: c
        text: "fullmatch and match always return the same result; they're just two names for one function."
      - id: d
        text: "match requires matching the entire string, while fullmatch only requires matching its beginning."
    correct: [a]
    explanation: "match is anchored at position 0, but doesn't check that the match reaches the end of the string - the tail after it can be anything. fullmatch requires a match from the first character to the last, which is why it's the right choice for validating an entire string's format."
    variants:
      - prompt: "How does `re.finditer` differ from `re.findall`?"
        choices:
          - id: a
            text: "finditer always returns an iterator of Match objects with access to .start(), .end(), .span(), while findall returns a list whose shape (strings or tuples) depends on the number of groups in the pattern."
          - id: b
            text: "finditer returns a list of tuples, while findall returns an iterator of Match objects."
          - id: c
            text: "finditer only finds the first match in the string, while findall finds all of them."
          - id: d
            text: "There's no difference, they're two names for the same function in the re module."
        correct: [a]
        explanation: "findall changes the shape of its result depending on the number of groups in the pattern and doesn't give you match positions. finditer always yields Match objects, which have access to the text, the position, and named groups - regardless of whether the pattern has groups at all."
      - prompt: "Why does the pattern `\"\\bcat\\b\"`, written WITHOUT the `r` prefix, fail to find the word 'cat' in 'the house cat sleeps'?"
        choices:
          - id: a
            text: "Because `\\b` inside a regular string is interpreted as a backspace character before the string ever reaches re, so the engine ends up searching for a completely different sequence of characters."
          - id: b
            text: "Because `\\b` is deprecated syntax that the re module no longer supports."
          - id: c
            text: "Because `\\b` only works inside f-strings."
          - id: d
            text: "Because without the r prefix, Python silently strips every backslash out of the string before it reaches re."
        correct: [a]
        explanation: "\\b is one of Python's standard escape sequences (like \\n or \\t), so inside a regular string it turns into the backspace control character before re is ever called. A raw string r\"...\" disables that interpretation and delivers exactly two characters to the engine: a backslash and the letter b."

  - id: re-in-python-predict-001
    concept: re-in-python
    type: predict-output
    difficulty: 2
    prompt: "What does this code print?"
    snippet: |
      import re

      pattern_bad = "\bcat\b"
      pattern_good = r"\bcat\b"
      print(re.findall(pattern_bad, "the house cat sleeps"))
      print(re.findall(pattern_good, "the house cat sleeps"))
    expected:
      kind: stdout
      value: |-
        []
        ['cat']
    explanation: "pattern_bad is built from a regular Python string: \\b in it isn't a 'word boundary' for re, it's the backspace control character, so that sequence doesn't occur in the text. pattern_good is a raw string, \\b reaches the engine as-is and finds the word 'cat' at its boundaries."
    hints:
      - "First figure out what pattern_bad actually is as a sequence of characters, before it ever reaches re."
      - "\\b, \\n, \\t - all of them mean something to Python itself inside a regular string, before regular expressions even enter the picture."
    variants:
      - snippet: |
          import re

          text = "A1 B22 C333"
          print(re.findall(r"[A-Z](\d+)", text))
          print([m.group() for m in re.finditer(r"[A-Z](\d+)", text)])
        expected:
          kind: stdout
          value: |-
            ['1', '22', '333']
            ['A1', 'B22', 'C333']
        explanation: "The pattern has one group, so findall returns a list of its captures - just the digits. finditer returns Match objects; .group() with no arguments on each one gives the full match, letter included."
      - snippet: |
          import re

          text = "bread:milk;cheese"
          print(re.split(r"[:;]", text))
          print(re.split(r"([:;])", text))
        expected:
          kind: stdout
          value: |-
            ['bread', 'milk', 'cheese']
            ['bread', ':', 'milk', ';', 'cheese']
        explanation: "Without a group, re.split just cuts the string at the separators and discards them. Wrap the class in a capturing group, and the separators themselves land in the resulting list between the pieces of text."

  - id: re-in-python-blanks-001
    concept: re-in-python
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the function so it returns True only if the ENTIRE string `s` consists of digits - junk before or after the digits must fail the check."
    template: |
      import re

      def is_all_digits(s):
          return bool(re.{{func}}(r"\d+", s))
    blanks:
      func:
        accept: ['fullmatch']
    hints:
      - "The task isn't 'are there digits somewhere', it's 'does the WHOLE string consist of digits' - that's a full-format check."
      - "Among search, match, and fullmatch, only one function requires a match from the first character of the string to the last."
    variants:
      - prompt: "Fill in the function so it returns True only if the string STARTS with a digit - what comes after doesn't matter."
        template: |
          import re

          def starts_with_digit(s):
              return bool(re.{{func}}(r"\d", s))
        blanks:
          func:
            accept: ['match']
      - prompt: "Fill in the replacement string in re.sub so a '0' follows right after the captured group's number, without the engine mistaking '10' for group number 10."
        template: |
          import re

          result = re.sub(r"(\d)", r"{{repl}}0", "price 5")
        blanks:
          repl:
            accept: ['\g<1>']

  - id: is-valid-username-001
    concept: re-in-python
    type: python-function
    difficulty: 2
    prompt: "Implement `is_valid_username(s)`: return True if the string `s` entirely (no extra characters before or after) consists of 3 to 20 letters (Latin or Cyrillic), digits, and underscores."
    starter: |
      import re

      def is_valid_username(s):
          ...
    cases:
      - call: 'is_valid_username("user_1")'
        expect: true
      - call: 'is_valid_username("us")'
        expect: false
      - call: 'is_valid_username("user_1!")'
        expect: false
      - call: 'is_valid_username("Пользователь_99")'
        expect: true
      - call: 'is_valid_username("")'
        expect: false
    hints:
      - "'Entirely, no extra characters before or after' means this isn't a search somewhere inside the string, it's validating the whole string's format."
      - "re.match doesn't fit here: it only checks the start and would miss a forbidden character in the tail, like in 'user_1!'."
    solution: |
      import re

      def is_valid_username(s):
          return bool(re.fullmatch(r"[a-zA-Zа-яА-ЯёЁ0-9_]{3,20}", s))

  - id: to-iso-dates-001
    concept: re-in-python
    type: python-function
    difficulty: 3
    prompt: "Implement `to_iso_dates(text)`: replace every date in the format 'DD.MM.YYYY' in the text with the format 'YYYY-MM-DD', leaving the rest of the text untouched. There can be several dates in the string."
    starter: |
      import re

      def to_iso_dates(text):
          ...
    cases:
      - call: 'to_iso_dates("Victory: 09.05.1945")'
        expect: "Victory: 1945-05-09"
      - call: 'to_iso_dates("Dates: 01.01.2000 and 31.12.1999")'
        expect: "Dates: 2000-01-01 and 1999-12-31"
      - call: 'to_iso_dates("no dates")'
        expect: "no dates"
      - call: 'to_iso_dates("12.06.1990-start, 25.08.2020-finish")'
        expect: "1990-06-12-start, 2020-08-25-finish"
    hints:
      - "This isn't a one-off replacement - you need a function that finds and rearranges every date in the text, not a single manual string build."
      - "Capture day, month, and year as separate groups, then reorder them in the replacement string using group numbers."
      - "The short form \\3 is unsafe if a digit could immediately follow it in the replacement string - use \\g<3> and so on for all three groups."
    solution: |
      import re

      def to_iso_dates(text):
          return re.sub(r"(\d{2})\.(\d{2})\.(\d{4})", r"\g<3>-\g<2>-\g<1>", text)

  - id: find-phone-spans-001
    concept: re-in-python
    type: python-function
    difficulty: 3
    prompt: "Implement `find_phone_spans(text)`: return a list of tuples `(number, start, end)` for every sequence of 11 digits in the text, where `start` and `end` are character positions in the string (like a match object's `.start()`/`.end()`)."
    starter: |
      import re

      def find_phone_spans(text):
          ...
    cases:
      - call: 'find_phone_spans("Ivanov I.I.: 89261234567, Petrova A.S.: 84951234567")'
        expect: [["89261234567", 13, 24], ["84951234567", 40, 51]]
      - call: 'find_phone_spans("no numbers here")'
        expect: []
      - call: 'find_phone_spans("89261234567")'
        expect: [["89261234567", 0, 11]]
      - call: 'find_phone_spans("code 123, number 89261234567.")'
        expect: [["89261234567", 17, 28]]
    hints:
      - "You need more than just the matched text - you also need each one's position. Which function in the re module returns Match objects instead of plain strings?"
      - "A Match object has .group(), .start(), and .end() methods - build a tuple out of them for each phone number found."
    solution: |
      import re

      PHONE_RE = re.compile(r"\d{11}")

      def find_phone_spans(text):
          return [(m.group(), m.start(), m.end()) for m in PHONE_RE.finditer(text)]

  - id: redact-cards-001
    concept: re-in-python
    type: python-function
    difficulty: 4
    prompt: "Implement `redact_cards(text)`: replace every card number of the form 'XXXX XXXX XXXX XXXX' (four groups of 4 digits separated by spaces) in the text with the first and last group of digits, and the two middle groups replaced with '****' each, keeping the separating spaces. Leave the rest of the text untouched."
    starter: |
      import re

      def redact_cards(text):
          ...
    cases:
      - call: 'redact_cards("card 4276 1234 5678 1234, hi")'
        expect: "card 4276 **** **** 1234, hi"
      - call: 'redact_cards("no card")'
        expect: "no card"
      - call: 'redact_cards("A: 1111 2222 3333 4444, B: 5555 6666 7777 8888")'
        expect: "A: 1111 **** **** 4444, B: 5555 **** **** 8888"
    hints:
      - "The replacement depends on the content of each particular match (you need its first and last 4 digits), not on a fixed string - a replacement string with \\g<N> is awkward here for building '****' instead of real digits."
      - "re.sub accepts not just a replacement string but also a function: it receives the Match object and must return the finished replacement string."
      - "Inside the replacement function you have m.group() - the whole match; take only its first 4 and last 4 characters from it, and replace the rest with \\*\\*\\*\\* \\*\\*\\*\\*."
    solution: |
      import re

      def redact_cards(text):
          def mask(m):
              digits = m.group()
              return digits[:4] + " **** **** " + digits[-4:]
          return re.sub(r"\d{4} \d{4} \d{4} \d{4}", mask, text)
