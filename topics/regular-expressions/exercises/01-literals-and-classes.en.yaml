exercises:
  - id: metachar-quiz-001
    concept: literals-and-classes
    type: theory-quiz
    difficulty: 1
    prompt: "Which pattern element means 'exactly one of any character except a line break'?"
    choices:
      - id: a
        text: "A dot: `.`"
      - id: b
        text: "An asterisk: `*`"
      - id: c
        text: "A plus: `+`"
      - id: d
        text: "An underscore: `_`"
    correct: [a]
    explanation: "A dot matches any single character except a line break. An asterisk and a plus don't match anything on their own: they're quantifiers, they repeat the preceding element. An underscore is just an ordinary literal."
    variants:
      - prompt: "What does the character class `[abc]` match?"
        choices:
          - id: a
            text: "One character: either 'a', 'b', or 'c'."
          - id: b
            text: "The whole sequence 'abc'."
          - id: c
            text: "Any word made up only of the letters a, b, and c."
          - id: d
            text: "A string that starts with 'a' and ends with 'c'."
        correct: [a]
        explanation: "A character class always describes exactly one character from the set. To match the sequence 'abc' you need the literal abc without brackets, and to match words made of these letters you'd need a quantifier: [abc]+."
      - prompt: "What does the class `[^а-я]` match?"
        choices:
          - id: a
            text: "Any single character except lowercase Russian letters from «а» to"
          - id: b
            text: "The start of a string followed by lowercase letters."
          - id: c
            text: "Only uppercase Russian letters."
          - id: d
            text: "A string that has no lowercase Russian letters in it at all."
        correct: [a]
        explanation: "A ^ as the first character inside a class negates the set, and it still matches exactly one character. Uppercase letters are only part of the complement: [^а-я] also matches digits, spaces, punctuation, and even «ё», which isn't inside the а-я range."

  - id: classes-predict-001
    concept: literals-and-classes
    type: predict-output
    difficulty: 2
    prompt: "What does this code print? Write the answer exactly as Python would print it, including brackets and quotes."
    snippet: |
      import re
      text = "Order 42, table 7, bill 1050 dollars"
      print(re.findall(r"\d+", text))
    expected:
      kind: stdout
      value: |-
        ['42', '7', '1050']
    explanation: "The class \\d matches a single digit, and the + quantifier glues consecutive digits into one match. findall returns a list of strings, not numbers."
    hints:
      - "\\d+ means 'one or more digits in a row'. How many separate islands of digits are there in the string?"
      - "findall returns strings in order of appearance. They don't become numbers: the quotes in the answer are required."
    variants:
      - snippet: |
          import re
          text = "cat, cot, cut, c-t"
          print(re.findall(r"c[ao]t", text))
        expected:
          kind: stdout
          value: |-
            ['cat', 'cot']
        explanation: "The class [ao] only allows 'a' or 'o' in the middle position. 'cut' and 'c-t' don't qualify."
      - snippet: |
          import re
          text = "col cool coooool cl"
          print(re.findall(r"co+l", text))
        expected:
          kind: stdout
          value: |-
            ['col', 'cool', 'coooool']
        explanation: "o+ means 'one or more letters o', so 'cl' with zero o's doesn't match, while the other three words match in full."

  - id: classes-blanks-001
    concept: literals-and-classes
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the character class so the pattern matches 'cat' and 'cot' but not 'cut'."
    template: |
      import re
      words = re.findall(r"c{{cls}}t", "cat, cot, cut")
    blanks:
      cls:
        accept: ['[ao]', '[oa]']
    hints:
      - "Only the middle letter changes. Which construct describes 'exactly one character from a set'?"
      - "List the allowed middle letters inside square brackets."
    variants:
      - prompt: "Fill in the negation symbol so the pattern matches everything that is NOT a digit."
        template: |
          import re
          rest = re.findall(r"[{{neg}}0-9]", "a1 b2 c3")
        blanks:
          neg:
            accept: ['^']
      - prompt: "Fill in the pattern so it matches only '3.12', not '3-12': the dot must be a literal one."
        template: |
          import re
          versions = re.findall(r"3{{dot}}12", "versions 3.12 and 3-12")
        blanks:
          dot:
            accept: ['\.', '[.]']

  - id: invalid-chars-001
    concept: literals-and-classes
    type: python-function
    difficulty: 3
    prompt: "Implement `find_invalid_chars(login)`: return a sorted list of unique characters in the login that are not allowed. Only lowercase Latin letters, digits, and underscore are allowed."
    starter: |
      import re

      def find_invalid_chars(login):
          ...
    cases:
      - call: 'find_invalid_chars("ivan_petrov99")'
        expect: []
      - call: 'find_invalid_chars("Ivan")'
        expect: ["I"]
      - call: 'find_invalid_chars("иван-petrov")'
        expect: ["-", "а", "в", "и", "н"]
      - call: 'find_invalid_chars("")'
        expect: []
    hints:
      - "Don't check for allowed characters, search for forbidden ones: a negated class describes 'everything not on the allow-list'."
      - "Collect all bad characters with findall, drop duplicates with a set, and sort the result."
      - "The allowed class is: lowercase Latin, digits, underscore. Its negation is one class starting with ^."
    solution: |
      import re

      def find_invalid_chars(login):
          return sorted(set(re.findall(r"[^a-z0-9_]", login)))
