exercises:
  - id: re-in-python-quiz-001
    concept: re-in-python
    type: theory-quiz
    difficulty: 1
    prompt: "Чем `re.fullmatch(pattern, s)` отличается от `re.match(pattern, s)`?"
    choices:
      - id: a
        text: "fullmatch требует, чтобы паттерну соответствовала вся строка целиком, а match - только чтобы совпадение начиналось у самого начала, не заботясь об остатке строки."
      - id: b
        text: "fullmatch ищет совпадение в любом месте строки, а match - только у самого начала."
      - id: c
        text: "fullmatch и match всегда возвращают одинаковый результат, это просто два имени одной функции."
      - id: d
        text: "match требует совпадения со всей строкой, а fullmatch - только с её началом."
    correct: [a]
    explanation: "match закрепляется у позиции 0, но не проверяет, что совпадение доходит до конца строки - хвост после него может быть любым. fullmatch требует совпадения от первого символа до последнего, поэтому именно он годится для проверки формата всей строки."
    variants:
      - prompt: "Чем `re.finditer` отличается от `re.findall`?"
        choices:
          - id: a
            text: "finditer всегда возвращает итератор объектов Match с доступом к .start(), .end(), .span(), а findall - список, форма которого (строки или кортежи) зависит от числа групп в паттерне."
          - id: b
            text: "finditer возвращает список кортежей, а findall - итератор объектов Match."
          - id: c
            text: "finditer находит только первое совпадение в строке, а findall - все."
          - id: d
            text: "Разницы нет, это два имени одной и той же функции модуля re."
        correct: [a]
        explanation: "findall меняет форму результата в зависимости от количества групп в паттерне и не даёт позиции совпадений. finditer всегда отдаёт объекты Match, у которых есть доступ и к тексту, и к позиции, и к именованным группам - независимо от того, есть группы в паттерне или нет."
      - prompt: "Почему паттерн `\"\\bкот\\b\"`, записанный БЕЗ префикса `r`, не находит слово «кот» в тексте «домашний кот спит»?"
        choices:
          - id: a
            text: "Потому что `\\b` внутри обычной строки Python интерпретируется как символ backspace ещё до того, как строка попадает в re, и движок ищет совсем другую последовательность символов."
          - id: b
            text: "Потому что `\\b` - устаревший синтаксис, который модуль re больше не поддерживает."
          - id: c
            text: "Потому что `\\b` работает только внутри f-строк."
          - id: d
            text: "Потому что без префикса r Python автоматически включает re.ASCII, а слово «кот» написано кириллицей."
        correct: [a]
        explanation: "\\b входит в стандартные escape-последовательности Python (как \\n или \\t), поэтому в обычной строке она превращается в управляющий символ backspace ещё до вызова re. Raw-строка r\"...\" отключает эту интерпретацию и передаёт движку ровно два символа: обратный слеш и «b»."

  - id: re-in-python-predict-001
    concept: re-in-python
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает этот код?"
    snippet: |
      import re

      pattern_bad = "\bкот\b"
      pattern_good = r"\bкот\b"
      print(re.findall(pattern_bad, "домашний кот спит"))
      print(re.findall(pattern_good, "домашний кот спит"))
    expected:
      kind: stdout
      value: |-
        []
        ['кот']
    explanation: "pattern_bad собран из обычной строки Python: \\b в ней это не «граница слова» для re, а управляющий символ backspace, поэтому такой последовательности в тексте нет. pattern_good - raw-строка, \\b доходит до движка как есть и находит слово «кот» на границах."
    hints:
      - "Сначала разберитесь, что вообще из себя представляет строка pattern_bad как последовательность символов, ещё до того, как она попадёт в re."
      - "\\b, \\n, \\t - все они значат что-то для самого Python внутри обычной строки, ещё до регулярных выражений."
    variants:
      - snippet: |
          import re

          text = "A1 B22 C333"
          print(re.findall(r"[A-Z](\d+)", text))
          print([m.group() for m in re.finditer(r"[A-Z](\d+)", text)])
        expected:
          kind: stdout
          value: |-
            ['1', '22', '333']
            ['A1', 'B22', 'C333']
        explanation: "В паттерне есть одна группа, поэтому findall возвращает список её захватов - только цифры. finditer возвращает объекты Match; .group() без аргументов у каждого из них отдаёт полное совпадение целиком, включая букву."
      - snippet: |
          import re

          text = "хлеб:молоко;сыр"
          print(re.split(r"[:;]", text))
          print(re.split(r"([:;])", text))
        expected:
          kind: stdout
          value: |-
            ['хлеб', 'молоко', 'сыр']
            ['хлеб', ':', 'молоко', ';', 'сыр']
        explanation: "Без группы re.split просто режет строку по разделителям и выбрасывает их. Стоит взять класс в захватывающую группу - и сами разделители попадают в результирующий список между кусками текста."

  - id: re-in-python-blanks-001
    concept: re-in-python
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните функцию так, чтобы она возвращала True только если ВСЯ строка `s` состоит из цифр - мусор до или после цифр обязан провалить проверку."
    template: |
      import re

      def is_all_digits(s):
          return bool(re.{{func}}(r"\d+", s))
    blanks:
      func:
        accept: ['fullmatch']
    hints:
      - "Задача не «есть ли где-то цифры», а «состоит ли ВСЯ строка из цифр» - это проверка формата целиком."
      - "Среди search, match и fullmatch только одна функция требует совпадения от первого символа строки до последнего."
    variants:
      - prompt: "Дополните функцию так, чтобы она возвращала True, только если строка НАЧИНАЕТСЯ с цифры - что идёт дальше, не важно."
        template: |
          import re

          def starts_with_digit(s):
              return bool(re.{{func}}(r"\d", s))
        blanks:
          func:
            accept: ['match']
      - prompt: "Дополните строку замены в re.sub так, чтобы после номера захваченной группы сразу шла цифра «0», а движок не принял «10» за номер группы 10."
        template: |
          import re

          result = re.sub(r"(\d)", r"{{repl}}0", "цена 5")
        blanks:
          repl:
            accept: ['\g<1>']

  - id: is-valid-username-001
    concept: re-in-python
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `is_valid_username(s)`: верните True, если строка `s` целиком (без лишних символов до или после) состоит из 3-20 букв (латиница или кириллица), цифр и знака подчёркивания."
    starter: |
      import re

      def is_valid_username(s):
          ...
    cases:
      - call: 'is_valid_username("user_1")'
        expect: true
      - call: 'is_valid_username("us")'
        expect: false
      - call: 'is_valid_username("user_1!")'
        expect: false
      - call: 'is_valid_username("Пользователь_99")'
        expect: true
      - call: 'is_valid_username("")'
        expect: false
    hints:
      - "«Целиком, без лишних символов до или после» - это не поиск совпадения где-то в строке, а проверка формата всей строки."
      - "re.match здесь не подходит: он проверит только начало и не заметит запрещённый символ в хвосте строки вроде «user_1!»."
    solution: |
      import re

      def is_valid_username(s):
          return bool(re.fullmatch(r"[a-zA-Zа-яА-ЯёЁ0-9_]{3,20}", s))

  - id: to-iso-dates-001
    concept: re-in-python
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `to_iso_dates(text)`: замените в тексте каждую дату в формате «ДД.ММ.ГГГГ» на формат «ГГГГ-ММ-ДД», не трогая остальной текст. Дат в строке может быть несколько."
    starter: |
      import re

      def to_iso_dates(text):
          ...
    cases:
      - call: 'to_iso_dates("Победа: 09.05.1945")'
        expect: "Победа: 1945-05-09"
      - call: 'to_iso_dates("Даты: 01.01.2000 и 31.12.1999")'
        expect: "Даты: 2000-01-01 и 1999-12-31"
      - call: 'to_iso_dates("без дат")'
        expect: "без дат"
      - call: 'to_iso_dates("12.06.1990-старт, 25.08.2020-финиш")'
        expect: "1990-06-12-старт, 2020-08-25-финиш"
    hints:
      - "Замена не разовая - нужна функция, которая находит и переставляет каждую дату в тексте, а не одна ручная сборка строки."
      - "Захватите день, месяц и год отдельными группами, а в строке замены переставьте их местами через номера групп."
      - "Короткая форма \\3 небезопасна, если сразу после неё в строке замены могла бы идти цифра - используйте \\g<3> и так далее для всех трёх групп."
    solution: |
      import re

      def to_iso_dates(text):
          return re.sub(r"(\d{2})\.(\d{2})\.(\d{4})", r"\g<3>-\g<2>-\g<1>", text)

  - id: find-phone-spans-001
    concept: re-in-python
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `find_phone_spans(text)`: верните список кортежей `(номер, начало, конец)` для каждой последовательности из 11 цифр в тексте, где `начало` и `конец` - позиции символов в строке (как у `.start()`/`.end()` объекта совпадения)."
    starter: |
      import re

      def find_phone_spans(text):
          ...
    cases:
      - call: 'find_phone_spans("Иванов И.И.: 89261234567, Петрова А.С.: 84951234567")'
        expect: [["89261234567", 13, 24], ["84951234567", 40, 51]]
      - call: 'find_phone_spans("нет номеров")'
        expect: []
      - call: 'find_phone_spans("89261234567")'
        expect: [["89261234567", 0, 11]]
      - call: 'find_phone_spans("код 123, номер 89261234567.")'
        expect: [["89261234567", 15, 26]]
    hints:
      - "Нужен не просто текст совпадений, а ещё и позиция каждого - вспомните, какая функция модуля re отдаёт объекты Match вместо голых строк."
      - "У объекта Match есть методы .group(), .start() и .end() - соберите из них кортеж для каждого найденного номера."
    solution: |
      import re

      PHONE_RE = re.compile(r"\d{11}")

      def find_phone_spans(text):
          return [(m.group(), m.start(), m.end()) for m in PHONE_RE.finditer(text)]

  - id: redact-cards-001
    concept: re-in-python
    type: python-function
    difficulty: 4
    prompt: "Реализуйте `redact_cards(text)`: замените в тексте каждый номер карты вида «XXXX XXXX XXXX XXXX» (четыре группы по 4 цифры через пробел) на первую и последнюю группу цифр, а две средние группы - на «****» каждая, сохранив разделяющие пробелы. Остальной текст не трогайте."
    starter: |
      import re

      def redact_cards(text):
          ...
    cases:
      - call: 'redact_cards("карта 4276 1234 5678 1234, привет")'
        expect: "карта 4276 **** **** 1234, привет"
      - call: 'redact_cards("нет карты")'
        expect: "нет карты"
      - call: 'redact_cards("A: 1111 2222 3333 4444, B: 5555 6666 7777 8888")'
        expect: "A: 1111 **** **** 4444, B: 5555 **** **** 8888"
    hints:
      - "Замена зависит от содержимого каждого конкретного совпадения (нужны его первые и последние 4 цифры), а не от фиксированной строки - строка замены с \\g<N> здесь неудобна для сборки «****» вместо реальных цифр."
      - "re.sub принимает не только строку замены, но и функцию: она получает объект Match и должна вернуть готовую строку для подстановки."
      - "Внутри функции-замены у вас есть m.group() - вся найденная последовательность целиком; из неё нужно взять только первые 4 и последние 4 символа, остальное заменить на \\*\\*\\*\\* \\*\\*\\*\\*."
    solution: |
      import re

      def redact_cards(text):
          def mask(m):
              digits = m.group()
              return digits[:4] + " **** **** " + digits[-4:]
          return re.sub(r"\d{4} \d{4} \d{4} \d{4}", mask, text)
