exercises:
  - id: lookaround-quiz-001
    concept: lookaround
    type: theory-quiz
    difficulty: 1
    prompt: "What does a positive lookahead `(?=...)` do?"
    choices:
      - id: a
        text: "Checks that the given text follows, but doesn't consume it and doesn't include it in the"
      - id: b
        text: "Requires the given text to follow immediately, and adds it to the match."
      - id: c
        text: "Makes the preceding pattern element optional."
      - id: d
        text: "Searches for the given text anywhere in the string, regardless of position."
    correct: [a]
    explanation: "Lookahead is a zero-width assertion: it checks the context ahead of the current position and consumes nothing, so text under (?=...) never ends up in group()."
    variants:
      - prompt: "What does `(?<!...)` do?"
        choices:
          - id: a
            text: "Negative lookbehind"
          - id: b
            text: "Negative lookahead: checks that the given text does NOT follow."
          - id: c
            text: "Requires the position to be at the start of the string."
          - id: d
            text: "Escapes the preceding group."
        correct: [a]
        explanation: "The < means 'look backward', the ! means negation. (?<!...) fails if the forbidden text sits right before the position, and it consumes nothing."
      - prompt: "Why won't `(?<=\\d+)` compile in the re module?"
        choices:
          - id: a
            text: "Because lookbehind in re must have a fixed length, and \\d+ doesn't guarantee one."
          - id: b
            text: "Because \\d can't be used inside a lookbehind."
          - id: c
            text: "Because lookbehind doesn't support character classes."
          - id: d
            text: "The syntax is valid; the error only happens at match time, not at compile time."
        correct: [a]
        explanation: "The engine needs to know in advance how many characters to look back. Exact quantifiers like {3} and same-length alternatives are allowed, but not + or *."

  - id: lookaround-predict-001
    concept: lookaround
    type: predict-output
    difficulty: 2
    prompt: "What does this code print? Both checks sit at the start of the pattern."
    snippet: |
      import re
      pattern = r"(?=.*\d)(?=.*[a-zA-Zа-яёА-ЯЁ]).{8,}"
      print(bool(re.fullmatch(pattern, "password1")))
      print(bool(re.fullmatch(pattern, "12345678")))
    expected:
      kind: stdout
      value: |-
        True
        False
    explanation: "'password1' has both a digit and a letter, and is at least 8 characters long, so both zero-width checks pass from position 0. '12345678' has digits but no letter, so the second lookahead fails despite the right length."
    hints:
      - "Both (?=...) sit right at the start and don't move the search position: they check the entire remaining string, not just the next character."
      - "Count separately for each string: is there a digit, is there a letter, is it long enough?"
    variants:
      - snippet: |
          import re
          text = "Employees: Smith (fired), Johnson, Smith, Williams (fired)"
          print(re.findall(r"Smith(?! \(fired\))", text))
        expected:
          kind: stdout
          value: |-
            ['Smith']
        explanation: "The first 'Smith' is marked '(fired)'; the negative lookahead forbids that marker and drops the whole match. The second 'Smith' has no marker, so it passes."
      - snippet: |
          import re
          text = "price 100, discount 12.5, weight 42"
          print(re.findall(r"\d+(?!\.\d)", text))
        expected:
          kind: stdout
          value: |-
            ['100', '1', '5', '42']
        explanation: "For '12.5', the greedy \\d+ first grabs '12', the check fails, and the engine backtracks the quantifier down to '1' - where the check unexpectedly passes, because right after '1' comes '2', not a dot. That produces a broken match '1', followed separately by '5'."

  - id: lookaround-blanks-001
    concept: lookaround
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the pattern so it finds a number only if it's immediately followed (with an optional space) by 'usd', without including those letters in the match."
    template: |
      import re
      amounts = re.findall(r"\d+{{la}}", "1500 usd, 300 kg")
    blanks:
      la:
        accept: ['(?=\s?usd)', '(?=\s*usd)']
    hints:
      - "You need a check of the context ahead that consumes nothing - otherwise 'usd' would end up in the result along with the number."
      - "Such a check starts with (?= and closes with an ordinary parenthesis."
    variants:
      - prompt: "Fill in the pattern to find 'cat' only where it isn't preceded by the letter 's'."
        template: |
          import re
          hits = re.findall(r"{{lb}}cat", "cat and scat")
        blanks:
          lb:
            accept: ['(?<!s)']
      - prompt: "Fill in the pattern to pull out the number right after a dollar sign, without including the sign itself."
        template: |
          import re
          amounts = re.findall(r"{{lb}}\d+", "Total: $100")
        blanks:
          lb:
            accept: ['(?<=\$)']

  - id: extract-ruble-amounts-001
    concept: lookaround
    type: python-function
    difficulty: 3
    prompt: "Implement `extract_ruble_amounts(text)`: return a list of integers (int), the ruble amounts. An amount in rubles is a sequence of digits immediately followed (with an optional space) by 'руб'. Don't include the word 'руб' itself in the result."
    starter: |
      import re

      def extract_ruble_amounts(text):
          ...
    cases:
      - call: 'extract_ruble_amounts("Итого 1500 руб")'
        expect: [1500]
      - call: 'extract_ruble_amounts("Товар 300руб, доставка 150 руб")'
        expect: [300, 150]
      - call: 'extract_ruble_amounts("Вес 1500 г, цена 1500руб")'
        expect: [1500]
      - call: 'extract_ruble_amounts("Бесплатно")'
        expect: []
    hints:
      - "How do you pull out a number but not grab 'руб' into the match? The position right after the number needs to be checked, not consumed."
      - "A positive lookahead (?=...) checks that the required text follows, without including it in the found fragment."
      - "The space before 'руб' is sometimes there and sometimes not: make it optional with ?, and don't forget to convert the found strings to int."
    solution: |
      import re

      def extract_ruble_amounts(text):
          return [int(x) for x in re.findall(r"\d+(?=\s?руб)", text)]

  - id: is-strong-password-001
    concept: lookaround
    type: python-function
    difficulty: 3
    prompt: "Implement `is_strong_password(s)`: return True if the string is at least 8 characters long and contains at least one digit and at least one letter (Latin or Cyrillic), in any order."
    starter: |
      import re

      def is_strong_password(s):
          ...
    cases:
      - call: 'is_strong_password("password1")'
        expect: true
      - call: 'is_strong_password("12345678")'
        expect: false
      - call: 'is_strong_password("password")'
        expect: false
      - call: 'is_strong_password("pass1")'
        expect: false
      - call: 'is_strong_password("Пароль12")'
        expect: true
    hints:
      - "Here you need to check several independent conditions from the same position, without consuming the text under them one by one."
      - "A lookahead at the start of the pattern (?=.*digit) checks 'there's a digit somewhere ahead' and doesn't move the position - that lets you stack several conditions in a row."
      - "After all the checks, describe the overall length and allowed characters with a single construct, like .{8,}, and verify with re.fullmatch."
    solution: |
      import re

      def is_strong_password(s):
          pattern = r"(?=.*\d)(?=.*[a-zA-Zа-яёА-ЯЁ]).{8,}"
          return bool(re.fullmatch(pattern, s))

  - id: extract-plain-numbers-001
    concept: lookaround
    type: python-function
    difficulty: 4
    prompt: "Implement `extract_plain_numbers(text)`: return a list of integers (int) for every sequence of digits in the text, EXCEPT those immediately preceded by '-' (negative amounts) and EXCEPT those immediately followed by '%' (percentages)."
    starter: |
      import re

      def extract_plain_numbers(text):
          ...
    cases:
      - call: 'extract_plain_numbers("Price 1500, discount -200, tax 5%, total 1300")'
        expect: [1500, 1300]
      - call: 'extract_plain_numbers("100%")'
        expect: []
      - call: 'extract_plain_numbers("-50 rub")'
        expect: []
      - call: 'extract_plain_numbers("42")'
        expect: [42]
    hints:
      - "You need to exclude numbers with a minus sign to the left or a percent sign to the right, without touching the digits of the match itself."
      - "A negative lookbehind (?<!...) checks the character before the start of the match, a negative lookahead (?!...) checks the character after the end."
      - "Add a \\b boundary both before and after \\d+: without it, the engine could backtrack the quantifier to a shorter number and still find a match right under a forbidden sign."
    solution: |
      import re

      def extract_plain_numbers(text):
          return [int(x) for x in re.findall(r"(?<!-)\b\d+\b(?!%)", text)]
