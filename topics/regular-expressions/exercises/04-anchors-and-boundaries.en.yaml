exercises:
  - id: anchors-quiz-001
    concept: anchors-and-boundaries
    type: theory-quiz
    difficulty: 1
    prompt: "What does `^` do outside a character class?"
    choices:
      - id: a
        text: "Matches the position at the start of the string"
      - id: b
        text: "Inverts the whole pattern."
      - id: c
        text: "Matches the first character of the string and consumes it."
      - id: d
        text: "Escapes the next character."
    correct: [a]
    explanation: "Outside a class, ^ is an anchor: a zero-width position at the start of the string. It only becomes a negation when it's the first character inside a class: [^0-9]."
    variants:
      - prompt: "What is `\\b` in a pattern?"
        choices:
          - id: a
            text: "A word boundary: zero-width spot between \\w and non-\\w."
          - id: b
            text: "Any whitespace character that separates two neighboring words."
          - id: c
            text: "The first character of a word, and the match consumes that character."
          - id: d
            text: "A synonym for a space character inside the regular expression."
        correct: [a]
        explanation: "\\b consumes no characters: it's a position where a word character meets something that isn't a word character, or the edge of the string. That's why \\bcat\\b finds a word, not a substring."
      - prompt: "How does the pattern `paid$` differ from `paid`?"
        choices:
          - id: a
            text: "With $, a match is only possible at the end of the string."
          - id: b
            text: "With $, the word has to be at the start of the string."
          - id: c
            text: "No difference, $ is ignored after literals."
          - id: d
            text: "With $, the engine looks for a literal dollar sign after the word."
        correct: [a]
        explanation: "$ is the end-of-string anchor. Without it, 'paid' matches anywhere in the text; with it, only at the right edge (or right before a trailing newline)."

  - id: boundary-predict-001
    concept: anchors-and-boundaries
    type: predict-output
    difficulty: 2
    prompt: "What does this code print? Think about exactly where each word has boundaries."
    snippet: |
      import re
      text = "cat, catalog, scat"
      print(re.findall(r"\bcat\b", text))
    expected:
      kind: stdout
      value: |-
        ['cat']
    explanation: "In 'catalog', a letter follows 'cat', so there's no right boundary. In 'scat', a letter precedes 'cat', so there's no left boundary. Only the standalone word 'cat' passes."
    hints:
      - "\\b requires that no other word character sits next to the match. Check each of the three words."
      - "'catalog' fails the right boundary, 'scat' fails the left boundary."
    variants:
      - snippet: |
          import re
          text = "cat, catalog, scat"
          print(re.findall(r"cat", text))
        expected:
          kind: stdout
          value: |-
            ['cat', 'cat', 'cat']
        explanation: "Without boundaries, the engine just searches for a substring: it's present in each of the three words."
      - snippet: |
          import re
          lines = ["order paid", "paid order"]
          print([bool(re.search(r"paid$", s)) for s in lines])
        expected:
          kind: stdout
          value: |-
            [True, False]
        explanation: "The $ anchor only lets a match happen at the end of the string: in the first line 'paid' is at the end, in the second it's at the start."

  - id: anchors-blanks-001
    concept: anchors-and-boundaries
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the anchors so the pattern matches only when the whole string is six digits, reliably even with a trailing newline."
    template: |
      import re
      ok = bool(re.search(r"{{start}}[0-9]{6}{{end}}", "101000"))
    blanks:
      start:
        accept: ['\A']
      end:
        accept: ['\Z']
    hints:
      - "The pattern needs to be locked on both sides: the start-of-string position on the left, the end-of-string position on the right."
      - "Classic ^ and $ are leaky here: $ also allows a match right before a trailing newline. You need the strict versions of the anchors."
    variants:
      - prompt: "Fill in word boundaries so only the standalone word 'art' is found."
        template: |
          import re
          words = re.findall(r"{{left}}art{{right}}", "art, artist, smart")
        blanks:
          left:
            accept: ['\b']
          right:
            accept: ['\b']
      - prompt: "Fill in the anchor so only domains ending in '.ru' remain in the list."
        template: |
          import re
          hosts = ["mail.ru", "ru.wikipedia.org"]
          ru_hosts = [h for h in hosts if re.search(r"\.ru{{end}}", h)]
        blanks:
          end:
            accept: ['$', '\Z']

  - id: is-integer-string-001
    concept: anchors-and-boundaries
    type: python-function
    difficulty: 3
    prompt: "Implement `is_integer_string(s)`: return True if the string is ENTIRELY an integer with an optional + or - sign. A string with a trailing newline does not count as a number."
    starter: |
      import re

      def is_integer_string(s):
          ...
    cases:
      - call: 'is_integer_string("42")'
        expect: true
      - call: 'is_integer_string("-7")'
        expect: true
      - call: 'is_integer_string("+100")'
        expect: true
      - call: 'is_integer_string("4 2")'
        expect: false
      - call: 'is_integer_string("need 42")'
        expect: false
      - call: 'is_integer_string("12\n")'
        expect: false
      - call: 'is_integer_string("")'
        expect: false
    hints:
      - "Validation means 'the whole string': the pattern needs to be locked with anchors on both sides."
      - "A plain $ would let '12' with a trailing newline slip through. Which anchors check the actual edge of the text?"
      - "A sign before the number is one optional character from a set of two."
    solution: |
      import re

      def is_integer_string(s):
          return bool(re.search(r"\A[+-]?\d+\Z", s))
