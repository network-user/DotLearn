conceptId: key-value
cards:
  - id: key-value-01
    front: "What is a key-value store?"
    back: "A giant dictionary living as its own server and surviving an application restart. You put a value under a key (SET) and fetch it by the same key (GET). No tables, schemas, links, or query language."
    tags: [key-value]
  - id: key-value-02
    front: "What is the complexity of key access and why?"
    back: "O(1). The key runs through a hash function that yields a bucket number, and the value is found in one hop. A million keys or a hundred, the hit cost is roughly the same."
    tags: [key-value]
  - id: key-value-03
    front: "What does values are opaque to the database mean?"
    back: "The database stores and returns a value by key but never looks inside. A query give all values where age > 30 is impossible: the database does not know the value even has an age field. One entry leads to the value: the key."
    tags: [opaque]
  - id: key-value-04
    front: "Why give keys names like user:1001 and session:ab12?"
    back: "Since there is no query language, structure comes from a naming convention. The colon is not database syntax but a habit of making keys readable and groupable by prefix."
    tags: [key-value]
  - id: key-value-05
    front: "What is TTL and why is it handy?"
    back: "A key's lifetime: after a set time the key is deleted automatically. Ideal for cache and sessions, stale data goes away on its own without background cleanup. A relational database usually has no such timed self-destruct out of the box."
    tags: [ttl]
  - id: key-value-06
    front: "Three scenarios where key-value shines?"
    back: "Cache (a heavy query's result under a key with TTL), sessions (token as key, data as value), counters and leaderboards (atomic increment by key). In all of them the key is known upfront and the value is read whole."
    tags: [cache]
  - id: key-value-07
    front: "What does the simplicity of key-value take away?"
    back: "Flexibility. No JOIN, no filter by field, no sort by value, no content search. If you need to find data by anything other than the primary key, plain key-value does not fit."
    tags: [opaque]
  - id: key-value-08
    front: "Why is Redis called a data structure server, not just a database?"
    back: "The value there can be not only a string but a list, set, hash, sorted set, and each type has its own operations. The model stays key-value (everything addressed by key), but the expressiveness is far richer than bare GET/SET."
    tags: [redis]
  - id: key-value-09
    front: "What is the risk of a cache without TTL and without an eviction policy?"
    back: "Many key-value databases keep data in RAM. Without TTL and eviction, keys pile up until memory runs out. A cache with no expiry turns into a timed memory leak."
    tags: [ttl, cache]
  - id: key-value-10
    front: "Why do keys need consistent hashing when distributed across nodes?"
    back: "The naive node number = hash(key) % N is bad: add a node, N changes, and almost all keys move. Consistent hashing lays nodes and keys on one ring, and adding a node relocates only a small fraction of keys."
    tags: [hashing]
