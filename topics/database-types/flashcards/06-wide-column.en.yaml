conceptId: wide-column
cards:
  - id: wide-column-01
    front: "How does column storage differ from row storage?"
    back: "Row-store lays data out row by row: all fields of the first record, then the second. Column-store lays it out column by column: all values of the first column in sequence, then the second."
    tags: [column-store]
  - id: wide-column-02
    front: "Why does column storage win at analytics?"
    back: "A query AVG(price) over 50 million rows reads one column of ten. In row storage its cells are scattered, the engine drags whole rows and up to 90% extra. In column storage that column sits as one block and exactly it is read."
    tags: [column-store]
  - id: wide-column-03
    front: "Why does a column compress better than a row?"
    back: "A column holds same-type, often similar values: thousands of identical cities, a narrow price range. Such data compresses far better than a mixed row of number, text, and date. Fewer bytes, less reading, faster query."
    tags: [compression]
  - id: wide-column-04
    front: "How does OLTP differ from OLAP?"
    back: "OLTP covers short operations on individual records (create order, update profile); a whole row is needed, row storage wins. OLAP covers heavy aggregates over huge volumes (revenue by region); few columns whole are needed, column storage wins."
    tags: [oltp-olap]
  - id: wide-column-05
    front: "Why not put a column analytic database under OLTP?"
    back: "Inserting one row touches every column block at once, which is expensive. Point updates are also hard. So a column database sits beside an OLTP database, periodically pulling data from it for analytics."
    tags: [oltp-olap]
  - id: wide-column-06
    front: "What is a wide-column store and what is it for?"
    back: "Cassandra, HBase, Bigtable. They think in columns not for analytics but for horizontal scale and a huge write stream on a cluster of many machines. Data is grouped into column families and split across nodes by a partition key."
    tags: [wide-column]
  - id: wide-column-07
    front: "How does Cassandra relate to CAP and which tree does it use?"
    back: "By default it picks the AP corner: during a partition nodes keep answering, and consistency is eventual and tunable per query. Writes are optimized for throughput and land in an LSM-tree, friendly to bulk inserts."
    tags: [wide-column, lsm]
  - id: wide-column-08
    front: "How do you design schema in Cassandra?"
    back: "From queries. First write down which reads the system will do, and lay out data for each, deliberately denormalizing and duplicating. This inverts the relational habit of normalized schema first, then any query."
    tags: [wide-column]
  - id: wide-column-09
    front: "Two different families under the columnar label?"
    back: "Column-analytic databases (ClickHouse, Vertica, Parquet) speed reads and compression for OLAP. Wide-column stores (Cassandra) use columns for scale and write throughput. The shared word column hides different jobs."
    tags: [column-store, wide-column]
  - id: wide-column-10
    front: "Why does an LSM-tree like writes while a B-tree does not?"
    back: "A B-tree writes each record to its place in a sorted structure (random write). An LSM-tree accumulates writes in memory and flushes them to disk in large sequential batches, merging periodically. Sequential writing is far faster than random, so LSM holds a huge insert stream."
    tags: [lsm]
