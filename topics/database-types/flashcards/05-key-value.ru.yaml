conceptId: key-value
cards:
  - id: key-value-01
    front: "Что такое хранилище ключ-значение?"
    back: "Гигантский словарь, живущий отдельным сервером и переживающий перезапуск приложения. Вы кладёте значение под ключом (SET) и достаёте по тому же ключу (GET). Никаких таблиц, схем, связей и языка запросов."
    tags: [key-value]
  - id: key-value-02
    front: "Какова сложность доступа по ключу и почему?"
    back: "O(1). Ключ прогоняется через хеш-функцию, та выдаёт номер корзины, и значение находится за одно обращение. Миллион ключей или сто, стоимость попадания примерно одинакова."
    tags: [key-value]
  - id: key-value-03
    front: "Что значит «значение непрозрачно для базы»?"
    back: "База хранит и отдаёт значение по ключу, но не заглядывает внутрь. Запрос «дай все значения, где age > 30» невозможен: база не знает, что внутри значения вообще есть age. Единственный вход к значению - ключ."
    tags: [opaque]
  - id: key-value-04
    front: "Зачем ключам дают имена вроде user:1001 и session:ab12?"
    back: "Раз языка запросов нет, структуру наводят соглашением об именах. Двоеточие - не синтаксис базы, а привычка делать ключи читаемыми и группируемыми по префиксу."
    tags: [key-value]
  - id: key-value-05
    front: "Что такое TTL и чем он удобен?"
    back: "Срок жизни ключа: через заданное время ключ автоматически удаляется. Для кэша и сессий идеально, устаревшее убирается само, без фоновой уборки. В реляционной базе такого самоуничтожения по таймеру из коробки обычно нет."
    tags: [ttl]
  - id: key-value-06
    front: "Три сценария, где ключ-значение выстреливает?"
    back: "Кэш (результат тяжёлого запроса под ключом с TTL), сессии (токен ключом, данные значением), счётчики и рейтинги (атомарный инкремент по ключу). Всюду ключ известен заранее, а значение читается целиком."
    tags: [cache]
  - id: key-value-07
    front: "Что отнимает простота ключ-значения?"
    back: "Гибкость. Нет JOIN, нет фильтра по полю, нет сортировки по значению, нет поиска по содержимому. Если искать данные нужно не по первичному ключу, чистое ключ-значение не подходит."
    tags: [opaque]
  - id: key-value-08
    front: "Почему Redis называют «сервером структур данных», а не просто базой?"
    back: "Значением там бывает не только строка, но и список, множество, хеш, отсортированное множество, и для каждого типа есть свои операции. Модель остаётся ключ-значением (всё адресуется ключом), но выразительность куда богаче голого GET/SET."
    tags: [redis]
  - id: key-value-09
    front: "Чем грозит кэш без TTL и без политики вытеснения?"
    back: "Многие ключ-значение базы держат данные в оперативной памяти. Без TTL и eviction ключи копятся, пока память не кончится. Кэш без срока жизни превращается в утечку памяти на таймере."
    tags: [ttl, cache]
  - id: key-value-10
    front: "Зачем ключам консистентное хеширование при распределении по узлам?"
    back: "Наивный «номер узла = hash(key) % N» плох: добавили узел, сменилось N, и почти все ключи переехали. Консистентное хеширование раскладывает узлы и ключи на одном кольце, и добавление узла перемещает лишь малую долю ключей."
    tags: [hashing]
