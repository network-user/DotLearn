conceptId: data-models
cards:
  - id: data-models-01
    front: "Что такое модель данных?"
    back: "Форма, которую база навязывает данным, плюс набор операций, которые она делает дешёвыми. Эти две части неразделимы. Ни одна модель не дешева для всего: выбирая её, вы решаете, какие операции у вас будут самыми частыми и дешёвыми."
    tags: [model, basics]
  - id: data-models-02
    front: "Почему говорят, что ни одна модель данных не дешева для всего?"
    back: "Каждая модель удешевляет одни операции ценой того, что другие дорожают. Реляционная дёшево соединяет по ключу, документная дёшево отдаёт агрегат целиком, графовая дёшево ходит по связям вглубь. Выбор модели сводится к тому, какие операции у вас самые частые."
    tags: [model, tradeoffs]
  - id: data-models-03
    front: "Назовите пять осей, по которым сравнивают базы данных."
    back: "Схема (жёсткая или гибкая), связи (ключом, вложенностью или ребром), масштабирование (вертикальное или горизонтальное), консистентность (строгая или итоговая) и модель запросов (декларативная, по ключу или обход)."
    tags: [model, axes]
  - id: data-models-04
    front: "Чем schema-on-write отличается от schema-on-read?"
    back: "Schema-on-write проверяет форму данных в момент записи: текст не положить в числовую колонку, ошибки ловятся рано. Schema-on-read разрешает записать почти что угодно, а структуру разбирает код приложения при чтении. Первое строже, второе гибче."
    tags: [schema]
  - id: data-models-05
    front: "Что утверждает CAP-теорема?"
    back: "Распределённая база при разрыве сети между узлами держит только две гарантии из трёх: согласованность, доступность, устойчивость к разрывам. Во время разрыва устойчивость обязательна, поэтому реальный выбор идёт между CP (отказать, но не соврать) и AP (ответить, рискнув устаревшими данными)."
    tags: [cap]
  - id: data-models-06
    front: "Почему чистого CA не бывает в распределённой системе?"
    back: "Пока узел один, разрывов сети между узлами нет, и можно держать и согласованность, и доступность. Как только узлов несколько, сеть между ними рано или поздно разорвётся, устойчивость к разрывам становится обязательной, и выбор сужается до CP против AP."
    tags: [cap]
  - id: data-models-07
    front: "Как правильно расшифровывается NoSQL?"
    back: "Not only SQL, а не «no SQL». Это не отказ от SQL, а признание, что у реляционной модели есть границы. Многие NoSQL-базы сегодня даже принимают SQL-подобные запросы."
    tags: [nosql]
  - id: data-models-08
    front: "Правда ли, что бывают базы «без схемы»?"
    back: "Нет. Схемы нет только на стороне базы, но данные всё равно читаются в код, который ждёт поле email строкой, а не числом. Схема не исчезает, а переезжает в приложение и становится неявной. Честнее называть это schema-on-read."
    tags: [schema, nosql]
  - id: data-models-09
    front: "Чем логическая модель данных отличается от движка хранения?"
    back: "Логическая модель - это то, как вы думаете о данных (таблицы, документы, узлы). Движок хранения - это то, как байты лежат на диске (B-дерево, LSM-дерево). PostgreSQL реляционный, но умеет хранить JSON. «Быстрее на запись» обычно говорят про движок, а не про модель."
    tags: [engine]
  - id: data-models-10
    front: "Почему «NoSQL быстрее» без указания запроса это маркетинг?"
    back: "Скорость - не свойство модели, а следствие паттерна доступа. Ключ-значение отдаёт значение по ключу быстро, но и реляционная база по первичному ключу попадает в строку так же быстро. Стоит запросу усложниться, и преимущество может перевернуться."
    tags: [tradeoffs, nosql]
