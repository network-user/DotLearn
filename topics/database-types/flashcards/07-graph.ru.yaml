conceptId: graph
cards:
  - id: graph-01
    front: "Из чего состоит графовая модель?"
    back: "Из узлов (сущностей вроде человека, счёта, товара), рёбер (именованных направленных связей между ними) и свойств на тех и других. Связь здесь - первоклассный объект, а не просто внешний ключ."
    tags: [graph]
  - id: graph-02
    front: "Что такое index-free adjacency и что оно даёт?"
    back: "Каждый узел физически хранит ссылки на своих соседей. Перейти к соседу стоит примерно один шаг, и эта цена не зависит от того, миллион узлов в графе или миллиард. В реляционной базе тот же переход выражается через JOIN, чья стоимость растёт с размером таблиц."
    tags: [index-free]
  - id: graph-03
    front: "Почему «друзья друзей друзей» дороги в реляционной базе?"
    back: "Каждый шаг по связи превращается в JOIN, а глубина N означает N соединений таблиц. Чем глубже обход, тем больше таблиц склеивается и тем быстрее запрос превращается в неподъёмный."
    tags: [traversal]
  - id: graph-04
    front: "Где графовая база блистает?"
    back: "Социальные сети (рекомендации друзей, степени знакомства), рекомендательные системы, выявление мошеннических колец по цепочкам переводов, графы знаний, анализ зависимостей. Везде, где сама связь - предмет исследования, а не просто внешний ключ."
    tags: [graph, traversal]
  - id: graph-05
    front: "Где графовая база слаба?"
    back: "Массовая аналитика-агрегат («сумма по всем заказам») даётся ей хуже, чем колоночной базе. Горизонтальное масштабирование сложно: разрезать сильно связанный граф между узлами так, чтобы обходы не бегали по сети, трудно. Граф силён в глубине связей, а не в объёме."
    tags: [graph, limits]
  - id: graph-06
    front: "Когда графовая база это «из пушки по воробьям»?"
    back: "Когда связи неглубокие. Один-два JOIN по индексированным ключам реляционная база делает быстро. Графовая база окупается, когда обход уходит вглубь на много уровней или когда сами пути - предмет запроса. Ради связи «у заказа есть пользователь» её тащить не стоит."
    tags: [traversal, choosing]
  - id: graph-07
    front: "Какой главный принцип выбора модели данных?"
    back: "Выбирайте по паттерну доступа, а не по хайпу. Сначала ответьте, какие операции в системе самые частые, и только потом смотрите на модель, которая делает их дешёвыми."
    tags: [choosing]
  - id: graph-08
    front: "Как грубая карта выбора связывает главное в данных с моделью?"
    back: "Связи вглубь берут граф. Целостный агрегат по ключу берут документ или ключ-значение. Аналитика по колонкам берёт колоночную базу. Сложные запросы с транзакциями берут реляционную. Карта задаёт первый вопрос, а не окончательный вердикт."
    tags: [choosing]
  - id: graph-09
    front: "Что такое polyglot persistence?"
    back: "Комбинация нескольких баз, где каждое семейство закрывает то, в чём сильно: реляционная для заказов и платежей, Redis для кэша и сессий, колоночная для аналитики, графовая для рекомендаций. Это не избыточность, а специализация под паттерны доступа."
    tags: [polyglot]
  - id: graph-10
    front: "Какова цена polyglot persistence?"
    back: "Несколько баз - это несколько систем, которые надо разворачивать, мониторить, бэкапить и держать в согласии (данные в базе и в кэше не должны расходиться). Полиглот оправдан, когда выгода от специализации перевешивает операционную сложность. Маленькому проекту одной реляционной базы часто достаточно."
    tags: [polyglot, choosing]
