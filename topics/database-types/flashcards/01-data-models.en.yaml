conceptId: data-models
cards:
  - id: data-models-01
    front: "What is a data model?"
    back: "The shape a database imposes on data, plus the set of operations it makes cheap. The two parts are inseparable. No model is cheap for everything: choosing one decides which operations will be your most frequent and cheapest."
    tags: [model, basics]
  - id: data-models-02
    front: "Why is it said that no data model is cheap for everything?"
    back: "Each model makes some operations cheap at the cost of others getting expensive. Relational joins by key cheaply, document returns a whole aggregate cheaply, graph walks links deep cheaply. Choosing a model comes down to which operations are most frequent."
    tags: [model, tradeoffs]
  - id: data-models-03
    front: "Name the five axes for comparing databases."
    back: "Schema (rigid or flexible), relationships (by key, by nesting, or by edge), scaling (vertical or horizontal), consistency (strong or eventual), and query model (declarative, by key, or traversal)."
    tags: [model, axes]
  - id: data-models-04
    front: "How does schema-on-write differ from schema-on-read?"
    back: "Schema-on-write checks data shape at write time: text cannot go into a numeric column, errors are caught early. Schema-on-read lets you write almost anything, and application code sorts out structure at read time. The first is stricter, the second more flexible."
    tags: [schema]
  - id: data-models-05
    front: "What does the CAP theorem state?"
    back: "A distributed database during a network partition holds only two guarantees of three: consistency, availability, partition tolerance. During a partition tolerance is mandatory, so the real choice is between CP (refuse rather than lie) and AP (answer, risking stale data)."
    tags: [cap]
  - id: data-models-06
    front: "Why is pure CA impossible in a distributed system?"
    back: "With one node there are no partitions between nodes, so you can hold both consistency and availability. Once there are several nodes, the network between them will eventually break, partition tolerance becomes mandatory, and the choice narrows to CP versus AP."
    tags: [cap]
  - id: data-models-07
    front: "What does NoSQL correctly stand for?"
    back: "Not only SQL, not no SQL. It is not a rejection of SQL but an admission that the relational model has limits. Many NoSQL databases today even accept SQL-like queries."
    tags: [nosql]
  - id: data-models-08
    front: "Is it true that some databases have no schema?"
    back: "No. The schema is absent only on the database side, but data is still read into code that expects an email field as a string, not a number. The schema does not vanish, it moves into the application and becomes implicit. Schema-on-read is the honest name."
    tags: [schema, nosql]
  - id: data-models-09
    front: "How does the logical data model differ from the storage engine?"
    back: "The logical model describes how you think about data (tables, documents, nodes). The storage engine describes how bytes lie on disk (B-tree, LSM-tree). PostgreSQL is relational yet can store JSON. Faster on writes usually refers to the engine, not the model."
    tags: [engine]
  - id: data-models-10
    front: "Why is NoSQL is faster without naming a query just marketing?"
    back: "Speed is not a property of the model but a consequence of the access pattern. Key-value returns a value by key fast, but relational hits a row by primary key just as fast. Once the query gets complex, the advantage can flip."
    tags: [tradeoffs, nosql]
