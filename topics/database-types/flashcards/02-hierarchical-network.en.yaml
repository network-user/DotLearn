conceptId: hierarchical-network
cards:
  - id: hierarchical-network-01
    front: "What does a navigational database mean?"
    back: "A query there comes down to manual traversal: the programmer places a cursor on a record and commands go to child, move to sibling, walking the data by hand, record by record. There is no declarative describe what you want here."
    tags: [navigational]
  - id: hierarchical-network-02
    front: "How is the hierarchical model structured?"
    back: "Data forms a tree: records are linked by a parent-child relationship, and each record has exactly one parent. The path to any record from the root is unique. Access is navigational: up to parent, down to child, sideways to sibling."
    tags: [tree]
  - id: hierarchical-network-03
    front: "What is the strength of the hierarchical model?"
    back: "It expresses one-to-many perfectly: a company has many departments, a department has many employees, the tree lays this out naturally. Reading along a path from the root is fast, following pointers."
    tags: [tree]
  - id: hierarchical-network-04
    front: "Where does the hierarchical model break?"
    back: "On many-to-many. A record in a tree has only one parent, so one part needed in several products must be duplicated under each product."
    tags: [tree, anomaly]
  - id: hierarchical-network-05
    front: "What is an update anomaly?"
    back: "A situation where, because of duplication, one logical change requires editing several copies, and any missed edit makes the data contradict itself. The screw price changed, not all copies were fixed, and the part now has two different prices."
    tags: [anomaly]
  - id: hierarchical-network-06
    front: "What did the network model (CODASYL) add?"
    back: "It let a record belong to several sets, that is, have several owners. Data became a graph rather than a tree. Many-to-many is expressed without duplication: the part exists in a single copy linked to several products at once."
    tags: [network]
  - id: hierarchical-network-07
    front: "What did the network model pay for its flexibility?"
    back: "Code complexity. Queries stayed navigational, links were baked into physical pointers, and application code grew attached to how data was laid out on disk. Changing the database structure meant rewriting queries."
    tags: [network, navigational]
  - id: hierarchical-network-08
    front: "Why did the relational model displace the navigational ones?"
    back: "It decoupled the logical query from physical storage: you write what you want, and the engine decides how to fetch it. That decoupling, not speed, buried navigational databases as the mainstream."
    tags: [history]
  - id: hierarchical-network-09
    front: "Where does the hierarchical (tree) model live today?"
    back: "Filesystem directories, DNS domain names, the HTML page DOM, JSON structure, LDAP and Active Directory catalogs. All are one-parent-many-children trees."
    tags: [tree, today]
  - id: hierarchical-network-10
    front: "Are the network model and a graph database the same thing?"
    back: "The idea is shared: data forms a graph. But the implementation is opposite. CODASYL required manual navigational traversal and a rigid set schema; a modern graph database offers a declarative query language over links. There is kinship, not identity."
    tags: [network, history]
