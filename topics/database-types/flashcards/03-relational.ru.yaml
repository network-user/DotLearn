conceptId: relational
cards:
  - id: relational-01
    front: "Что лежит в основе реляционной модели?"
    back: "Отношение, которое на практике выглядит как таблица: фиксированный набор колонок с типами и сколько угодно строк. Схема жёсткая (schema-on-write): объявили age целым числом, и текст туда уже не вставить."
    tags: [tables]
  - id: relational-02
    front: "Где в реляционной модели хранится связь между сущностями?"
    back: "Не внутри строки. Заказ не вложен в пользователя, он живёт в отдельной таблице и ссылается на пользователя по значению ключа (user_id). Соединяются они при чтении, оператором JOIN."
    tags: [join]
  - id: relational-03
    front: "Что такое нормализация и зачем она нужна?"
    back: "Раскладывание данных по таблицам так, чтобы каждый факт хранился ровно один раз. Это прямое лекарство от аномалий обновления: сменилось имя пользователя, вы правите одну строку, и все заказы автоматически видят новое значение."
    tags: [normalization]
  - id: relational-04
    front: "Что гарантирует ACID (кратко по буквам)?"
    back: "Atomicity: всё или ничего. Consistency: переход между корректными состояниями без нарушения правил. Isolation: параллельные транзакции не видят промежуточных состояний друг друга. Durability: подтверждённая запись переживёт отключение питания."
    tags: [acid]
  - id: relational-05
    front: "За что отвечает атомарность на примере перевода денег?"
    back: "За то, что не случится «списали, но не зачислили». Перевод состоит из двух действий: списать и зачислить. Если второе сорвалось, первое откатывается целиком, и потерянных денег не будет."
    tags: [acid]
  - id: relational-06
    front: "Как связь «многие-ко-многим» выражается в реляционной модели?"
    back: "Через третью таблицу-связку с двумя внешними ключами. Никакого дублирования, в отличие от иерархической модели, где та же связь ломала дерево."
    tags: [join]
  - id: relational-07
    front: "Чем отличается буква C в ACID от буквы C в CAP?"
    back: "Consistency в ACID отвечает за соблюдение правил схемы и ограничений внутри одной транзакции. Consistency в CAP отвечает за то, видят ли узлы распределённой системы одинаковые данные. Разные свойства с одинаковым именем."
    tags: [acid, cap]
  - id: relational-08
    front: "Где у реляционной модели пределы?"
    back: "Нормализация раскладывает данные по многим таблицам, и на больших объёмах JOIN дорожают, особенно через сеть между шардами. Горизонтальное масштабирование даётся трудно. Плюс impedance mismatch: объект в коде и плоские таблицы - разные формы, и между ними нужен перевод."
    tags: [limits]
  - id: relational-09
    front: "Почему «медленный SQL» почти всегда не вина модели?"
    back: "Обычно причина в отсутствии индекса или в кривом запросе, который делает JOIN пяти таблиц по неиндексированным колонкам. По первичному ключу реляционная база попадает в строку так же быстро, как хранилище ключ-значение."
    tags: [limits, index]
  - id: relational-10
    front: "Как индекс на B-дереве ускоряет поиск?"
    back: "Данные в B-дереве отсортированы, а высота растёт логарифмически, поэтому поиск по индексированной колонке стоит около log(N) шагов: на миллионе строк примерно двадцать сравнений вместо миллиона. Платите местом на диске и небольшим замедлением записи."
    tags: [index]
