conceptId: document
cards:
  - id: document-01
    front: "Что такое документ в документной базе?"
    back: "По сути JSON: набор пар «ключ-значение», где значением бывает число, строка, массив или вложенный объект. Документ самодостаточен: всё для одной сущности лежит внутри него, а не раскидано по другим коллекциям."
    tags: [document]
  - id: document-02
    front: "Что такое агрегат?"
    back: "Кластер данных, который имеет смысл читать и менять как целое: заказ с его позициями, статья с тегами, профиль с настройками. Документная модель буквально хранит один агрегат одним документом."
    tags: [aggregate]
  - id: document-03
    front: "Чем документная модель экономит на чтении?"
    back: "Пользователь со всеми заказами лежит одним документом, поэтому читается одним обращением по идентификатору, без JOIN. Реляционной базе для того же нужен JOIN двух таблиц. Если приложение почти всегда показывает пользователя вместе с заказами, документ экономит работу."
    tags: [aggregate]
  - id: document-04
    front: "Гибкая схема в документной модели: благо и капкан?"
    back: "Благо: форму данных меняешь без миграций, новое поле добавляешь на лету. Капкан: без дисциплины в коллекции копится несколько поколений формата, и каждый читатель обязан держать в голове все варианты. Схема не исчезла, она стала неявной."
    tags: [schema]
  - id: document-05
    front: "Когда данные стоит вкладывать (embed)?"
    back: "Когда они читаются вместе с родителем, принадлежат только ему и не растут безгранично: позиции заказа, теги статьи, адрес в профиле. Вложение ускоряет чтение ценой дублирования."
    tags: [embed]
  - id: document-06
    front: "Когда данные стоит выносить и ссылаться (reference)?"
    back: "Когда они разделяются многими (один товар в тысяче заказов), живут своей жизнью или растут без предела. Ссылка - это поле с чужим _id, но собирать связанные документы по ней приходится в коде приложения."
    tags: [reference]
  - id: document-07
    front: "Почему опасно вкладывать безграничный массив?"
    back: "Комментарии к популярному посту или лог операций растут без конца. Вложенный массивом, такой документ распухнет до сотен мегабайт, упрётся в лимит размера и будет целиком переписываться при добавлении одного элемента. Растущее без предела выносят в отдельную коллекцию."
    tags: [embed, pitfall]
  - id: document-08
    front: "Почему денормализация возвращает старую боль?"
    back: "Вкладывая данные в документ, вы их дублируете. Если имя товара лежит в каждом заказе, а товар переименовали, вы снова обязаны обойти все документы и поправить копии. Это ровно та аномалия обновления, которую реляционная нормализация когда-то убрала."
    tags: [reference, pitfall]
  - id: document-09
    front: "Какой сигнал говорит, что документная модель неуместна?"
    back: "Сильно связанные данные. Если в схеме всё ссылается на всё и вы постоянно собираете документы по ссылкам в коде, вы написали медленную реляционную базу руками. Тогда нужна реляционная или графовая модель."
    tags: [pitfall]
  - id: document-10
    front: "Почему документная модель дружит с DDD?"
    back: "В предметно-ориентированном проектировании агрегат - это граница согласованности: кластер объектов, который меняется как целое и имеет один корень. Документная модель ложится на это один в один: один агрегат, один документ."
    tags: [aggregate, ddd]
