conceptId: document
cards:
  - id: document-01
    front: "What is a document in a document database?"
    back: "Essentially JSON: a set of key-value pairs where the value can be a number, string, array, or nested object. A document is self-contained: everything for one entity lives inside it, not scattered across other collections."
    tags: [document]
  - id: document-02
    front: "What is an aggregate?"
    back: "A cluster of data that makes sense to read and change as a whole: an order with its line items, an article with tags, a profile with settings. The document model literally stores one aggregate as one document."
    tags: [aggregate]
  - id: document-03
    front: "How does the document model save on reads?"
    back: "A user with all their orders sits as one document, so it is read in one call by identifier, without JOIN. A relational database needs a JOIN of two tables for the same. If the app almost always shows the user with their orders, the document saves work."
    tags: [aggregate]
  - id: document-04
    front: "Flexible schema in the document model: blessing and trap?"
    back: "Blessing: you change data shape without migrations and add a field on the fly. Trap: without discipline a collection accumulates several format generations, and every reader must hold all variants in mind. The schema did not vanish, it became implicit."
    tags: [schema]
  - id: document-05
    front: "When should data be embedded?"
    back: "When it is read with the parent, belongs only to it, and does not grow without bound: order line items, article tags, an address in a profile. Embedding speeds reads at the cost of duplication."
    tags: [embed]
  - id: document-06
    front: "When should data be split out and referenced?"
    back: "When it is shared by many (one product in a thousand orders), has its own lifecycle, or grows without bound. A reference is a field with another _id, but assembling linked documents by it falls to application code."
    tags: [reference]
  - id: document-07
    front: "Why is embedding an unbounded array dangerous?"
    back: "Comments on a popular post or an operations log grow endlessly. Embedded as an array, such a document swells to hundreds of megabytes, hits a size limit, and is rewritten whole when one element is added. What grows without bound goes in a separate collection."
    tags: [embed, pitfall]
  - id: document-08
    front: "Why does denormalization bring back old pain?"
    back: "Embedding data into a document duplicates it. If a product name sits in every order and the product is renamed, you must again walk all documents and fix the copies. This is exactly the update anomaly that relational normalization once removed."
    tags: [reference, pitfall]
  - id: document-09
    front: "What signals that the document model is a poor fit?"
    back: "Heavily connected data. If everything in the schema references everything and you constantly assemble documents by references in code, you have written a slow relational database by hand. Then you need a relational or graph model."
    tags: [pitfall]
  - id: document-10
    front: "Why does the document model fit DDD well?"
    back: "In domain-driven design an aggregate sets a consistency boundary: a cluster of objects that changes as a whole and has one root. The document model maps onto this one to one: one aggregate, one document."
    tags: [aggregate, ddd]
