conceptId: relational
cards:
  - id: relational-01
    front: "What lies at the base of the relational model?"
    back: "A relation, which in practice looks like a table: a fixed set of typed columns and any number of rows. The schema is rigid (schema-on-write): declare age an integer, and text can no longer go in."
    tags: [tables]
  - id: relational-02
    front: "Where is the link between entities stored in the relational model?"
    back: "Not inside the row. An order is not nested in the user, it lives in its own table and references the user by key value (user_id). They are combined at read time with the JOIN operator."
    tags: [join]
  - id: relational-03
    front: "What is normalization and why is it needed?"
    back: "Laying out data across tables so each fact is stored exactly once. It is the direct cure for update anomalies: the user changed their name, you edit one row, and all orders automatically see the new value."
    tags: [normalization]
  - id: relational-04
    front: "What does ACID guarantee, letter by letter?"
    back: "Atomicity: all or nothing. Consistency: moving between valid states without breaking rules. Isolation: concurrent transactions do not see each other's half-done states. Durability: a confirmed write survives a power loss."
    tags: [acid]
  - id: relational-05
    front: "What does atomicity ensure in a money transfer?"
    back: "That debited but not credited will not happen. A transfer consists of two actions: debit and credit. If the second fails, the first rolls back entirely, and no money is lost."
    tags: [acid]
  - id: relational-06
    front: "How is many-to-many expressed in the relational model?"
    back: "Through a third link table with two foreign keys. No duplication, unlike the hierarchical model where the same link broke the tree."
    tags: [join]
  - id: relational-07
    front: "How does C in ACID differ from C in CAP?"
    back: "Consistency in ACID is about obeying schema rules and constraints inside one transaction. Consistency in CAP is about whether the nodes of a distributed system see the same data. Different properties with the same name."
    tags: [acid, cap]
  - id: relational-08
    front: "Where are the limits of the relational model?"
    back: "Normalization spreads data across many tables, and at large scale JOINs get expensive, especially across the network between shards. Horizontal scaling is hard. Plus impedance mismatch: an object in code and flat tables have different shapes and need translation."
    tags: [limits]
  - id: relational-09
    front: "Why is slow SQL almost never the model's fault?"
    back: "The cause is usually a missing index or a crooked query that JOINs five tables on unindexed columns. By primary key a relational database hits a row as fast as a key-value store."
    tags: [limits, index]
  - id: relational-10
    front: "How does a B-tree index speed up search?"
    back: "Data in a B-tree is sorted and its height grows logarithmically, so a search on an indexed column costs about log(N) steps: on a million rows roughly twenty comparisons instead of a million. You pay in disk space and a small write slowdown."
    tags: [index]
