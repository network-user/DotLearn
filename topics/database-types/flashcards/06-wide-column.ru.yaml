conceptId: wide-column
cards:
  - id: wide-column-01
    front: "Чем поколоночное хранение отличается от построчного?"
    back: "Построчное (row-store) кладёт данные строка за строкой: все поля первой записи, потом второй. Поколоночное (column-store) кладёт колонка за колонкой: все значения первой колонки подряд, потом второй."
    tags: [column-store]
  - id: wide-column-02
    front: "Почему поколоночное хранение выигрывает на аналитике?"
    back: "Запрос AVG(price) по 50 млн строк читает одну колонку из десяти. В построчном хранении её ячейки разбросаны, движок тащит строки целиком и до 90% лишнего. В поколоночном та же колонка лежит одним блоком, читается ровно она."
    tags: [column-store]
  - id: wide-column-03
    front: "Почему колонка сжимается лучше строки?"
    back: "В колонке лежат значения одного типа и часто похожие: тысячи одинаковых городов, узкий диапазон цен. Такие данные сжимаются в разы лучше, чем пёстрая строка из числа, текста и даты вперемешку. Меньше байт, меньше чтения, быстрее запрос."
    tags: [compression]
  - id: wide-column-04
    front: "Чем OLTP отличается от OLAP?"
    back: "OLTP - это короткие операции над отдельными записями (создать заказ, обновить профиль); нужна целая строка, выигрывает построчное хранение. OLAP - это тяжёлые агрегаты по огромным объёмам (выручка по регионам); нужны немногие колонки целиком, выигрывает поколоночное."
    tags: [oltp-olap]
  - id: wide-column-05
    front: "Почему колоночную аналитическую базу не ставят под OLTP?"
    back: "Вставка одной строки трогает все колоночные блоки сразу, это дорого. Точечные обновления тоже даются тяжело. Поэтому колоночную базу держат рядом с OLTP-базой, периодически забирая из неё данные для аналитики."
    tags: [oltp-olap]
  - id: wide-column-06
    front: "Что такое wide-column хранилище и зачем оно?"
    back: "Cassandra, HBase, Bigtable. Они мыслят колонками ради не аналитики, а горизонтального масштаба и огромного потока записи на кластере из многих машин. Данные группируются в семейства колонок и разбиваются по узлам ключом партиции."
    tags: [wide-column]
  - id: wide-column-07
    front: "Как Cassandra относится к CAP и на каком дереве стоит?"
    back: "По умолчанию выбирает AP-угол: при разрыве сети узлы продолжают отвечать, а согласованность итоговая и настраиваемая под запрос. Запись оптимизирована под поток и ложится в LSM-дерево, дружелюбное к массовым вставкам."
    tags: [wide-column, lsm]
  - id: wide-column-08
    front: "Как проектируют схему в Cassandra?"
    back: "От запросов. Сначала выписывают, какие чтения будут в системе, и под каждое раскладывают данные, осознанно денормализуя и дублируя. Это переворачивает реляционную привычку «сначала нормализованная схема, потом любые запросы»."
    tags: [wide-column]
  - id: wide-column-09
    front: "Два разных семейства под ярлыком «колоночные»?"
    back: "Колоночно-аналитические базы (ClickHouse, Vertica, Parquet) ускоряют чтение и сжатие ради OLAP. Wide-column хранилища (Cassandra) используют колонки ради масштаба и потока записи. Общее слово «колонка» скрывает разные задачи."
    tags: [column-store, wide-column]
  - id: wide-column-10
    front: "Почему LSM-дерево любит запись, а B-дерево нет?"
    back: "B-дерево пишет каждую запись на своё место в отсортированной структуре (случайная запись). LSM-дерево копит записи в памяти и сбрасывает их на диск большими последовательными порциями, периодически сливая. Последовательная запись гораздо быстрее случайной, поэтому LSM держит огромный поток вставок."
    tags: [lsm]
