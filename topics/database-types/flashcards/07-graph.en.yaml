conceptId: graph
cards:
  - id: graph-01
    front: "What does the graph model consist of?"
    back: "Nodes (entities like a person, account, product), edges (named directed links between them), and properties on both. Here a link is a first-class object, not just a foreign key."
    tags: [graph]
  - id: graph-02
    front: "What is index-free adjacency and what does it give?"
    back: "Each node physically stores pointers to its neighbors. Moving to a neighbor costs about one step, and that cost does not depend on whether the graph has a million nodes or a billion. In a relational database the same move is a JOIN whose cost grows with table size."
    tags: [index-free]
  - id: graph-03
    front: "Why is friends of friends of friends expensive in a relational database?"
    back: "Each link step becomes a JOIN, and depth N means N table joins. The deeper the traversal, the more tables are glued together and the faster the query becomes unbearable."
    tags: [traversal]
  - id: graph-04
    front: "Where does a graph database shine?"
    back: "Social networks (friend recommendations, degrees of separation), recommender systems, detecting fraud rings by transfer chains, knowledge graphs, dependency analysis. Everywhere the link itself is the subject of study, not just a foreign key."
    tags: [graph, traversal]
  - id: graph-05
    front: "Where is a graph database weak?"
    back: "Mass aggregate analytics (sum over all orders) suits it worse than a column database. Horizontal scaling is hard: cutting a heavily connected graph across nodes so traversals do not run over the network is difficult. Graphs are strong in link depth, not volume."
    tags: [graph, limits]
  - id: graph-06
    front: "When is a graph database overkill?"
    back: "When links are shallow. One or two JOINs on indexed keys are fast in a relational database. A graph database pays off when traversal goes deep across many levels or when the paths themselves are the query. For an order has a user, it is not worth adopting."
    tags: [traversal, choosing]
  - id: graph-07
    front: "What is the main principle of choosing a data model?"
    back: "Choose by access pattern, not by hype. First answer which operations in the system are most frequent, and only then look at the model that makes them cheap."
    tags: [choosing]
  - id: graph-08
    front: "How does the rough choice map link the main thing in data to a model?"
    back: "Deep links take a graph. A whole aggregate by key takes a document or key-value. Analytics by columns takes a column database. Complex queries with transactions take a relational one. The map asks the first question, not the final verdict."
    tags: [choosing]
  - id: graph-09
    front: "What is polyglot persistence?"
    back: "A combination of several databases where each family covers what it is strong at: relational for orders and payments, Redis for cache and sessions, columnar for analytics, graph for recommendations. Not redundancy but specialization by access pattern."
    tags: [polyglot]
  - id: graph-10
    front: "What is the cost of polyglot persistence?"
    back: "Several databases mean several systems to deploy, monitor, back up, and keep in agreement (data in the database and in the cache must not diverge). Polyglot pays when the specialization benefit outweighs operational complexity. A small project often needs just one relational database."
    tags: [polyglot, choosing]
