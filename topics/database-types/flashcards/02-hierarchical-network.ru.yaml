conceptId: hierarchical-network
cards:
  - id: hierarchical-network-01
    front: "Что значит «навигационная» база данных?"
    back: "Запрос в ней сводится к ручному обходу: программист ставит курсор на запись и командует «спустись к потомку», «перейди к соседу», идя по данным вручную, запись за записью. Декларативного «опиши, что хочешь» здесь нет."
    tags: [navigational]
  - id: hierarchical-network-02
    front: "Как устроена иерархическая модель?"
    back: "Данные - это дерево: записи связаны отношением «родитель-потомок», и у каждой записи ровно один родитель. Путь к любой записи от корня единственный. Доступ навигационный: вверх к родителю, вниз к потомку, вбок к соседу."
    tags: [tree]
  - id: hierarchical-network-03
    front: "В чём сила иерархической модели?"
    back: "Отношение «один-ко-многим» она выражает идеально: у компании много отделов, у отдела много сотрудников, дерево укладывает это естественно. Чтение по пути от корня быстрое, идёт по указателям."
    tags: [tree]
  - id: hierarchical-network-04
    front: "Где ломается иерархическая модель?"
    back: "На отношении «многие-ко-многим». У записи в дереве только один родитель, поэтому одну деталь, нужную в нескольких изделиях, приходится дублировать под каждым изделием."
    tags: [tree, anomaly]
  - id: hierarchical-network-05
    front: "Что такое аномалия обновления?"
    back: "Ситуация, когда из-за дублирования одно логическое изменение требует править несколько копий, и любая пропущенная правка делает данные противоречивыми. Изменилась цена винта, а поправили не все копии, и у детали оказались две разные цены."
    tags: [anomaly]
  - id: hierarchical-network-06
    front: "Что добавила сетевая модель (CODASYL)?"
    back: "Она разрешила записи входить в несколько наборов, то есть иметь несколько владельцев. Данные стали графом, а не деревом. «Многие-ко-многим» выражается без дублирования: деталь существует в одном экземпляре и связана сразу с несколькими изделиями."
    tags: [network]
  - id: hierarchical-network-07
    front: "Чем сетевая модель заплатила за гибкость?"
    back: "Сложностью кода. Запросы остались навигационными, связи были зашиты в физические указатели, и код приложения прирастал к тому, как данные разложены на диске. Поменять структуру базы значило переписать запросы."
    tags: [network, navigational]
  - id: hierarchical-network-08
    front: "Почему реляционная модель вытеснила навигационные?"
    back: "Она оторвала логический запрос от физического хранения: вы пишете, что хотите получить, а движок решает, как достать. Именно эта развязка, а не скорость, похоронила навигационные базы как мейнстрим."
    tags: [history]
  - id: hierarchical-network-09
    front: "Где сегодня живёт иерархическая (древовидная) модель?"
    back: "Каталоги файловой системы, доменные имена DNS, DOM HTML-страницы, структура JSON, каталоги LDAP и Active Directory. Всё это деревья «один родитель, много потомков»."
    tags: [tree, today]
  - id: hierarchical-network-10
    front: "Сетевая модель и графовая база это одно и то же?"
    back: "Идея общая: данные - граф. Но реализация противоположная. CODASYL требовал ручного навигационного обхода и жёсткой схемы наборов; современная графовая база предлагает декларативный язык запросов по связям. Родство есть, тождества нет."
    tags: [network, history]
