exercises:
  - id: hier-net-parent-001
    concept: hierarchical-network
    type: theory-quiz
    difficulty: 1
    prompt: "Сколько родителей может быть у записи в иерархической модели?"
    choices:
      - id: a
        text: "Ровно один."
      - id: b
        text: "Сколько угодно."
      - id: c
        text: "Ни одного - родителей в этой модели нет."
      - id: d
        text: "Не больше двух."
    correct: [a]
    explanation: "Иерархическая модель - это дерево: у каждой записи ровно один родитель, и путь к ней от корня единственный."
    variants:
      - prompt: "Какую форму имеют данные в иерархической модели?"
        choices:
          - id: a
            text: "Дерево."
          - id: b
            text: "Таблицу."
          - id: c
            text: "Плоский список без связей."
          - id: d
            text: "Хеш-таблицу."
        correct: [a]
        explanation: "Иерархическая модель укладывает данные в дерево с отношением «родитель-потомок»."
      - prompt: "Что значит «навигационный» доступ к данным?"
        choices:
          - id: a
            text: "Программист вручную идёт по записям и связям, запись за записью."
          - id: b
            text: "База сама подбирает оптимальный план по декларативному запросу."
          - id: c
            text: "Данные доступны только через веб-навигацию."
          - id: d
            text: "Доступ к записи возможен только по её координатам на диске GPS."
        correct: [a]
        explanation: "Навигационный доступ - это ручной обход по указателям: поставить курсор и двигаться к родителю, потомку или соседу. Декларативного «опиши результат» в этих моделях нет."

  - id: hier-net-m2m-001
    concept: hierarchical-network
    type: theory-quiz
    difficulty: 2
    prompt: "Одна деталь используется в нескольких изделиях. Что произойдёт в чистой иерархической модели?"
    choices:
      - id: a
        text: "Деталь придётся дублировать - своя копия под каждым изделием."
      - id: b
        text: "Деталь свяжется со всеми изделиями одним ребром."
      - id: c
        text: "Модель автоматически создаст таблицу-связку."
      - id: d
        text: "База откажется хранить такие данные вовсе."
    correct: [a]
    explanation: "У записи в дереве только один родитель, поэтому «многие-ко-многим» выражается лишь дублированием. Это ведёт к аномалиям обновления: цену детали приходится править во всех копиях."
    variants:
      - prompt: "Чем опасно дублирование данных в иерархической модели?"
        choices:
          - id: a
            text: "Аномалиями обновления: правку нужно повторить во всех копиях, иначе данные противоречат сами себе."
          - id: b
            text: "Только лишним местом на диске, на корректность это не влияет сразу, без промежуточного состояния."
          - id: c
            text: "Дублирование ускоряет запись, проблем нет ещё до любых других проверок на этом пути."
          - id: d
            text: "База перестаёт принимать запросы на чтение ещё до любых других проверок на этом пути."
        correct: [a]
        explanation: "Главная беда дублирования - не место, а согласованность: пропустишь одну копию при обновлении, и у одной детали окажутся две разные цены."
      - prompt: "Отношение «один-ко-многим» (у отдела много сотрудников) в иерархической модели..."
        choices:
          - id: a
            text: "выражается естественно - это и есть ветвь дерева."
          - id: b
            text: "невозможно без таблицы-связки."
          - id: c
            text: "требует дублирования сотрудников."
          - id: d
            text: "поддерживается только в сетевой модели."
        correct: [a]
        explanation: "«Один-ко-многим» - родная для дерева форма: один родитель, много потомков. Проблемы начинаются только на «многие-ко-многим»."

  - id: hier-net-codasyl-001
    concept: hierarchical-network
    type: theory-quiz
    difficulty: 3
    prompt: "Что добавила сетевая модель (CODASYL) по сравнению с иерархической?"
    choices:
      - id: a
        text: "Запись может входить в несколько наборов, то есть иметь несколько владельцев"
      - id: b
        text: "Декларативный язык запросов вместо ручного обхода сразу, без промежуточного состояния."
      - id: c
        text: "Полную независимость запросов от физического хранения сразу, без промежуточного состояния."
      - id: d
        text: "Гарантии ACID и транзакции сразу, без промежуточного состояния."
    correct: [a]
    explanation: "Сетевая модель разрешила записи несколько родителей-владельцев и убрала дублирование. Но запросы остались навигационными, а развязку логики и хранения принесла уже реляционная модель."

  - id: hier-net-today-001
    concept: hierarchical-network
    type: theory-quiz
    difficulty: 3
    prompt: "Где сегодня живёт иерархическая (древовидная) модель? Отметьте все верные варианты."
    choices:
      - id: a
        text: "Каталоги файловой системы."
      - id: b
        text: "Структура JSON-документа и DOM HTML-страницы."
      - id: c
        text: "Каталоги LDAP и Active Directory."
      - id: d
        text: "Плоский CSV-файл без вложенности сразу, без промежуточного состояния."
    correct: [a, b, c]
    explanation: "Файловые системы, JSON, DOM, DNS, LDAP - всё это деревья «один родитель, много потомков». Плоский CSV - это таблица без иерархии, поэтому он сюда не относится."

  - id: hier-net-model-blanks-001
    concept: hierarchical-network
    type: fill-in-blanks
    difficulty: 2
    prompt: "Определите модель или поведение по описанию структуры данных. Впишите пропущенное слово."
    template: |
      У каждой записи ровно один родитель, и данные образуют дерево. Это {{model}} модель.
    blanks:
      model:
        accept: ["иерархическая", "Иерархическая", "иерархическую", "hierarchical"]
        accept_regex: '^\s*([Ии]ерархическ[а-яё]*|hierarchical)\s*$'
    explanation: "Дерево с одним родителем у каждой записи и единственным путём от корня - это иерархическая модель. «Многие-ко-многим» она выражает только дублированием."
    variants:
      - template: |
          Запись может входить в несколько наборов и иметь несколько владельцев, поэтому данные образуют граф. Это {{model}} модель.
        blanks:
          model:
            accept: ["сетевая", "Сетевая", "сетевую", "network"]
            accept_regex: '^\s*([Сс]етев[а-яё]*|network)\s*$'
      - template: |
          Одна деталь нужна в нескольких изделиях, но дерево не даёт записи двух родителей. Чтобы это выразить, деталь приходится {{action}}.
        blanks:
          action:
            accept: ["дублировать", "продублировать", "duplicate"]
            accept_regex: '^\s*([Дд]ублир[а-яё]*|[Пп]родублир[а-яё]*|duplicate)\s*$'
