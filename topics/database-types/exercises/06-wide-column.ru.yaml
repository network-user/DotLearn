exercises:
  - id: wc-layout-001
    concept: wide-column
    type: theory-quiz
    difficulty: 1
    prompt: "Как поколоночное хранение (column-store) кладёт данные на диск?"
    choices:
      - id: a
        text: "Колонка за колонкой: все значения первой колонки подряд, потом второй."
      - id: b
        text: "Строка за строкой: все поля первой записи, потом второй сразу, без промежуточного состояния."
      - id: c
        text: "Случайным образом для равномерной нагрузки сразу, без промежуточного состояния."
      - id: d
        text: "В виде дерева указателей сразу, без промежуточного состояния."
    correct: [a]
    explanation: "Column-store хранит каждую колонку непрерывным блоком. Поэтому аналитический запрос по одной колонке читает ровно её, а не все поля каждой строки."
    variants:
      - prompt: "Почему колонка из однотипных значений хорошо сжимается?"
        choices:
          - id: a
            text: "Значения одного типа и часто похожи между собой - такие данные сжимаются в разы лучше пёстрой строки."
          - id: b
            text: "Сжатие работает только с числами, а в колонках всегда числа сразу, без промежуточного состояния."
          - id: c
            text: "Колонки сжимаются хуже строк, это миф сразу, без промежуточного состояния и без дополнительных проверок."
          - id: d
            text: "Потому что колонки короче строк сразу, без промежуточного состояния и без дополнительных проверок."
        correct: [a]
        explanation: "В колонке лежат однотипные и похожие значения (тысячи одинаковых городов, узкий диапазон цен) - они сжимаются гораздо лучше, чем строка из числа, текста и даты вперемешку."
      - prompt: "Запрос AVG(price) по 50 млн строк. Почему построчное хранение для него расточительно?"
        choices:
          - id: a
            text: "Оно тащит с диска все колонки каждой строки, хотя нужна одна."
          - id: b
            text: "Оно не умеет считать среднее сразу, без промежуточного состояния."
          - id: c
            text: "Оно сжимает данные слишком сильно сразу, без промежуточного состояния."
          - id: d
            text: "Оно хранит price в зашифрованном виде сразу, без промежуточного состояния."
        correct: [a]
        explanation: "В построчном хранении ячейки нужной колонки разбросаны между остальными полями, поэтому движок читает строки целиком и тащит до 90% лишних данных."

  - id: wc-oltp-olap-001
    concept: wide-column
    type: theory-quiz
    difficulty: 2
    prompt: "Какая нагрузка естественна для построчного хранения?"
    choices:
      - id: a
        text: "OLTP - короткие операции над отдельными записями (создать заказ, обновить профиль)."
      - id: b
        text: "OLAP - тяжёлые агрегаты по миллиардам строк сразу, без промежуточного состояния."
      - id: c
        text: "Только полнотекстовый поиск сразу, без промежуточного состояния."
      - id: d
        text: "Только хранение бинарных файлов сразу, без промежуточного состояния."
    correct: [a]
    explanation: "OLTP работает с целой строкой за раз, поэтому построчное хранение естественно. OLAP читает немногие колонки целиком - там выигрывает поколоночное."
    variants:
      - prompt: "Для какой нагрузки выигрывает поколоночное хранение?"
        choices:
          - id: a
            text: "OLAP - агрегаты (выручка по регионам, средний чек) по огромным объёмам."
          - id: b
            text: "OLTP - точечные вставки и обновления записей сразу, без промежуточного состояния."
          - id: c
            text: "Хранение пользовательских сессий сразу, без промежуточного состояния."
          - id: d
            text: "Очереди сообщений сразу, без промежуточного состояния."
        correct: [a]
        explanation: "OLAP читает немногие колонки целиком по миллиардам строк - идеальный случай для column-store с его экономией чтения и сжатием."
      - prompt: "Почему колоночную аналитическую базу не ставят под транзакционную нагрузку?"
        choices:
          - id: a
            text: "Вставка одной строки трогает все колоночные блоки сразу - это дорого."
          - id: b
            text: "Она не умеет хранить числа сразу, без промежуточного состояния."
          - id: c
            text: "Она работает только в оперативной памяти сразу, без промежуточного состояния."
          - id: d
            text: "Транзакции в ней запрещены законом сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Точечная запись и обновления тяжелы для column-store: одна строка размазана по многим колоночным блокам. Поэтому колоночную базу держат рядом с OLTP-базой для отчётов."

  - id: wc-cassandra-001
    concept: wide-column
    type: theory-quiz
    difficulty: 3
    prompt: "Как в wide-column хранилище (Cassandra) принято проектировать схему?"
    choices:
      - id: a
        text: "От запросов: выписать нужные чтения и под каждое разложить данные, осознанно денормализуя."
      - id: b
        text: "Сначала максимально нормализованная схема, потом любые произвольные запросы."
      - id: c
        text: "Схему проектировать не нужно - база подберёт её сама сразу, без промежуточного состояния."
      - id: d
        text: "Через диаграмму классов ООП не входит в сравнение и не влияет на результат."
    correct: [a]
    explanation: "В Cassandra нет произвольных JOIN и дешёвых запросов по неключевым колонкам. Схему проектируют от запросов, денормализуя данные под каждое чтение - это противоположность реляционной привычке."

  - id: wc-two-families-001
    concept: wide-column
    type: theory-quiz
    difficulty: 4
    prompt: "Под ярлыком «колоночные» прячутся два разных семейства. Какие утверждения верно их различают? Отметьте все."
    choices:
      - id: a
        text: "Колоночно-аналитические базы (ClickHouse) оптимизируют чтение и сжатие ради OLAP."
      - id: b
        text: "Wide-column хранилища (Cassandra) используют колонки ради горизонтального масштаба и потока записи."
      - id: c
        text: "Cassandra по умолчанию выбирает AP-угол CAP и пишет в LSM-дерево."
      - id: d
        text: "Это два названия одной и той же технологии ещё до любых других проверок на этом пути."
    correct: [a, b, c]
    explanation: "a, b, c верно различают семейства: одно ускоряет аналитику, другое масштабирует запись на кластере. d - заблуждение: общее слово «колонка» скрывает разные задачи и архитектуры."

  - id: wc-workload-blanks-001
    concept: wide-column
    type: fill-in-blanks
    difficulty: 2
    prompt: "Подберите раскладку хранения или тип нагрузки под задачу. Впишите пропущенный термин."
    template: |
      Запрос AVG(price) по 50 млн строк читает одну колонку из десяти. Чтобы не тащить лишнее, данные выгодно хранить на диске {{layout}}.
    blanks:
      layout:
        accept: ["поколоночно", "поколоночное", "колоночно", "column-store", "columnar"]
        accept_regex: '^\s*([Пп]околоночн[а-яё]*|[Кк]олоночн[а-яё]*|column[-\s]?store|columnar)\s*$'
    explanation: "Аналитический запрос по одной колонке выигрывает от поколоночного хранения: колонка лежит одним блоком и читается целиком без лишних полей."
    variants:
      - template: |
          Создать заказ, обновить профиль, списать товар: короткие операции над отдельными записями. Такую нагрузку называют {{load}}.
        blanks:
          load:
            accept: ["OLTP", "oltp", "олтп"]
            accept_regex: '^\s*(OLTP|oltp|олтп)\s*$'
      - template: |
          Выручка по регионам за год, средний чек по сегментам: тяжёлые агрегаты по огромным объёмам. Такую нагрузку называют {{load}}.
        blanks:
          load:
            accept: ["OLAP", "olap", "олап"]
            accept_regex: '^\s*(OLAP|olap|олап)\s*$'
