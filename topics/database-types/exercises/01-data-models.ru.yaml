exercises:
  - id: data-models-meaning-001
    concept: data-models
    type: theory-quiz
    difficulty: 1
    prompt: "Что точнее всего описывает «модель данных»?"
    choices:
      - id: a
        text: "Форма, которую база навязывает данным, и набор операций, которые она делает дешёвыми."
      - id: b
        text: "Язык программирования, на котором написана база сразу, без промежуточного состояния."
      - id: c
        text: "Физический формат файлов базы на диске сразу, без промежуточного состояния."
      - id: d
        text: "Графический редактор для рисования таблиц сразу, без промежуточного состояния."
    correct: [a]
    explanation: "Модель данных - это логическая форма данных плюс операции, которые становятся дешёвыми. Физический формат на диске - это уже движок хранения, отдельный слой."
    variants:
      - prompt: "Как корректно расшифровывается NoSQL?"
        choices:
          - id: a
            text: "Not only SQL - не отказ от SQL, а признание границ реляционной модели."
          - id: b
            text: "No SQL - полный запрет языка SQL сразу, без промежуточного состояния."
          - id: c
            text: "New SQL - новый стандарт языка запросов сразу, без промежуточного состояния."
          - id: d
            text: "Network SQL - SQL поверх сети сразу, без промежуточного состояния."
        correct: [a]
        explanation: "NoSQL читают как «not only SQL». Многие такие базы сегодня даже принимают SQL-подобные запросы."
      - prompt: "Почему говорят, что ни одна модель данных не дешева для всего?"
        choices:
          - id: a
            text: "Каждая модель делает дешёвыми одни операции ценой того, что другие становятся дорогими."
          - id: b
            text: "Потому что все базы данных платные сразу, без промежуточного состояния."
          - id: c
            text: "Потому что любая база со временем замедляется сразу, без промежуточного состояния."
          - id: d
            text: "Потому что модель данных нельзя поменять после запуска сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Дешевизна одних операций оплачивается дороговизной других. Выбор модели - это выбор того, какие операции у вас самые частые."

  - id: data-models-schema-001
    concept: data-models
    type: theory-quiz
    difficulty: 2
    prompt: "Что означает schema-on-read («гибкая схема»)?"
    choices:
      - id: a
        text: "Структуру данных проверяет не база при записи, а код приложения при чтении."
      - id: b
        text: "База запрещает любую запись без заранее объявленной схемы."
      - id: c
        text: "Схемы не существует вообще нигде, и о структуре никто не заботится."
      - id: d
        text: "Схема хранится в отдельном read-only файле."
    correct: [a]
    explanation: "Schema-on-read не отменяет схему - он переносит её проверку из базы в приложение и на момент чтения. Схема становится неявной, а не исчезает."
    variants:
      - prompt: "Чем горизонтальное масштабирование отличается от вертикального?"
        choices:
          - id: a
            text: "Горизонтальное размазывает данные по многим машинам, вертикальное ставит одну машину помощнее."
          - id: b
            text: "Горизонтальное ускоряет диск, вертикальное - сеть сразу, без промежуточного состояния."
          - id: c
            text: "Это два названия одного и того же приёма ещё до любых других проверок на этом пути."
          - id: d
            text: "Горизонтальное работает только для реляционных баз сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Вертикальное - мощнее одна машина (упирается в потолок). Горизонтальное - шардинг и репликация по многим машинам (дёшево по железу, но порождает CAP)."
      - prompt: "Что такое schema-on-write («жёсткая схема»)?"
        choices:
          - id: a
            text: "База проверяет структуру в момент записи и отвергает данные неверной формы."
          - id: b
            text: "Схему можно менять только во время записи новых строк сразу, без промежуточного состояния."
          - id: c
            text: "Запись разрешена кому угодно без проверки сразу, без промежуточного состояния."
          - id: d
            text: "Схема пишется в лог при каждом запросе на чтение сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Жёсткая схема ловит ошибки рано: реляционная база не даст положить текст в числовую колонку. Цена - менять форму данных сложнее (нужны миграции)."

  - id: data-models-cap-001
    concept: data-models
    type: theory-quiz
    difficulty: 3
    prompt: "Распределённая база, и сеть между узлами разорвалась. Между чем реально идёт выбор?"
    choices:
      - id: a
        text: "Между согласованностью (CP) и доступностью (AP)."
      - id: b
        text: "Между скоростью и объёмом хранения сразу, без промежуточного состояния."
      - id: c
        text: "Между SQL и NoSQL сразу, без промежуточного состояния."
      - id: d
        text: "Можно сохранить все три гарантии CAP сразу."
    correct: [a]
    explanation: "Во время разрыва устойчивость к разделению (P) обязательна, поэтому выбор сужается до CP (отказать, но не соврать) против AP (ответить, рискуя устаревшими данными). Чистый CA живёт только на одном узле."

  - id: data-models-misconceptions-001
    concept: data-models
    type: theory-quiz
    difficulty: 3
    prompt: "Какие из утверждений - распространённые заблуждения о базах данных? Отметьте все."
    choices:
      - id: a
        text: "«NoSQL по своей природе быстрее реляционных баз»."
      - id: b
        text: "«Бывают базы вообще без какой-либо схемы»."
      - id: c
        text: "«Логическая модель данных и движок хранения - разные слои»."
      - id: d
        text: "«Распределённость по узлам не бесплатна»."
    correct: [a, b]
    explanation: "a и b - заблуждения: скорость зависит от паттерна доступа, а «schemaless» - это schema-on-read. c и d - верные утверждения: модель и движок действительно разные слои, а распределённость действительно платит за себя через CAP."

  - id: data-models-axis-blanks-001
    concept: data-models
    type: fill-in-blanks
    difficulty: 2
    prompt: "Определите ось сравнения баз данных по описанию сценария. Впишите пропущенный термин."
    template: |
      Сеть между узлами распределённой базы разорвалась, и приходится выбирать: ответить, рискнув устаревшими данными, или отказать ради честности. Этот выбор описывает теорема {{law}}.
    blanks:
      law:
        accept: ["CAP", "cap", "КАП", "кап"]
        accept_regex: '^\s*(CAP|cap|КАП|кап)\s*$'
    explanation: "Разрыв сети заставляет распределённую базу выбирать между согласованностью и доступностью. Это и есть выбор из CAP-теоремы: держать можно только две гарантии из трёх."
    variants:
      - template: |
          База проверяет структуру строки в момент записи и не даёт положить текст в числовую колонку. Такой подход к схеме называют {{approach}}.
        blanks:
          approach:
            accept: ["schema-on-write", "schema on write"]
            accept_regex: '^\s*schema[-\s]?on[-\s]?write\s*$'
      - template: |
          Данные размазывают по многим машинам вместо покупки одной мощной. Такое масштабирование называют {{direction}}.
        blanks:
          direction:
            accept: ["горизонтальным", "горизонтальное", "horizontal"]
            accept_regex: '^\s*([Гг]оризонтальн[а-яё]*|horizontal)\s*$'
