exercises:
  - id: graph-basics-001
    concept: graph
    type: theory-quiz
    difficulty: 1
    prompt: "What does a graph data model consist of?"
    choices:
      - id: a
        text: "Nodes (entities), edges (links between them), and properties on both."
      - id: b
        text: "Tables with rows and columns, produced in full without further selection."
      - id: c
        text: "Keys and opaque values, produced in full without further selection."
      - id: d
        text: "One large JSON document, produced in full without further selection."
    correct: [a]
    explanation: "A graph has nodes (people, accounts, products), edges (named links between them), and properties. Here a link is first-class, not just a foreign key."
    variants:
      - prompt: "What is index-free adjacency in a graph database?"
        choices:
          - id: a
            text: "Each node physically stores pointers to neighbors, so an edge step costs ~O(1)."
          - id: b
            text: "Graph databases have no indexes at all before any other checks run on this path."
          - id: c
            text: "Links are stored in a separate relational table, completely skipping index."
          - id: d
            text: "Neighbors must be found by full scan every time, completely skipping index."
        correct: [a]
        explanation: "Index-free adjacency means a node points directly to neighbors. Moving to a neighbor does not depend on graph size - that is why deep traversals are fast."
      - prompt: "What does an edge model in a graph database?"
        choices:
          - id: a
            text: "A named directed link between two nodes (friends with, transferred money)."
          - id: b
            text: "A table column, produced in full without further selection."
          - id: c
            text: "A node lifetime, produced in full without further selection."
          - id: d
            text: "A primary key index, produced in full without further selection."
        correct: [a]
        explanation: "An edge is a link between entities, usually named and directed. Traversal walks along edges."

  - id: graph-traversal-001
    concept: graph
    type: theory-quiz
    difficulty: 2
    prompt: "Why is friends of friends of friends expensive in a relational database but cheap in a graph database?"
    choices:
      - id: a
        text: "In relational each link step is a JOIN, depth N means N joins; in graph an edge step costs ~O(1)."
      - id: b
        text: "Relational databases cannot store links at all before any other checks run on this path."
      - id: c
        text: "Graph databases precompute all friends of all users before any other checks run on this path."
      - id: d
        text: "Graph queries run on the GPU immediately, without an intermediate state and without extra checks."
    correct: [a]
    explanation: "Traversal depth in relational becomes a cascade of JOINs whose cost grows with table size. Graph databases follow direct node-to-neighbor pointers and depth stays cheap."
    variants:
      - prompt: "Where is a graph database weaker than a column store?"
        choices:
          - id: a
            text: "Mass analytic aggregates over huge numbers of uniform rows."
          - id: b
            text: "Deep link traversal, produced in full without further selection."
          - id: c
            text: "Shortest path search, produced in full without further selection."
          - id: d
            text: "Link-based recommendations, produced in full without further selection."
        correct: [a]
        explanation: "Graphs are strong in link depth, not row volume. Summing billions of uniform rows suits column stores better; graphs are also hard to scale horizontally."
      - prompt: "When is adopting a graph database overkill?"
        choices:
          - id: a
            text: "When links are shallow - one or two indexed JOINs in relational are fine."
          - id: b
            text: "When detecting fraud rings by transfer chains before any other checks run on this path."
          - id: c
            text: "When building a link-based recommender system before any other checks run on this path."
          - id: d
            text: "When analyzing degrees of separation in a social network before any other checks run on this path."
        correct: [a]
        explanation: "Graph databases pay off on deep traversals. For an order has a user, a relational foreign key is enough."

  - id: graph-when-001
    concept: graph
    type: theory-quiz
    difficulty: 3
    prompt: "For which tasks is the graph model especially well suited? Select all that apply."
    choices:
      - id: a
        text: "Recommendations for products bought together."
      - id: b
        text: "Detecting fraud rings through transfer chains."
      - id: c
        text: "Degrees of separation and shortest paths in social networks."
      - id: d
        text: "Computing total revenue across all orders for a year."
    correct: [a, b, c]
    explanation: "a, b, and c are about deep link traversal - graph territory. d is mass aggregation where column stores are better."

  - id: choosing-mapping-001
    concept: graph
    type: theory-quiz
    difficulty: 4
    prompt: "Store backend: orders and payments (need transactions), cache and sessions (speed by key), sales analytics (aggregates over millions of rows), recommendations via deep links. Which model mappings are correct? Select all that apply."
    choices:
      - id: a
        text: "Orders and payments → relational database (ACID, transactions)."
      - id: b
        text: "Cache and sessions → key-value (O(1) by key, TTL)."
      - id: c
        text: "Sales analytics → column store (OLAP, column aggregates)."
      - id: d
        text: "Deep-link recommendations → key-value, produced in full without further selection."
    correct: [a, b, c]
    explanation: "a, b, and c are correct - that is polyglot persistence. d is wrong: deep links and traversals belong to graph databases, not key-value."

  - id: choosing-judgment-001
    concept: graph
    type: theory-quiz
    difficulty: 5
    prompt: "A three-developer startup builds an MVP: users, posts, likes, feed. The team wants five specialized databases right away, like the big players. What is more reasonable and why?"
    choices:
      - id: a
        text: "Start with one relational database and add specialized storage only when a concrete access pattern hits a wall."
      - id: b
        text: "Deploy five databases immediately - mature systems do that, so the MVP should too before any other checks run on this path."
      - id: c
        text: "Use one graph database for everything since there are likes and follows before any other checks run on this path."
      - id: d
        text: "Use only key-value - it is fastest, and speed decides everything before any other checks run on this path."
    correct: [a]
    explanation: "Polyglot pays when specialization benefit beats operational complexity; five databases on three developers is five pain sources. Choose by access pattern, not hype or big-company mimicry. b and d are hype or one mythical criterion; c stretches one model over all patterns. A small project often needs only one relational database."

  - id: graph-polyglot-blanks-001
    concept: graph
    type: fill-in-blanks
    difficulty: 3
    prompt: "Designing an online store backend. Fill in the database family for each subsystem (relational, key-value, or graph)."
    template: |
      orders and payments, needing transactions and strict integrity: {{payments}}
      cache and sessions accessed by a known key with auto-expiry: {{cache}}
      recommendations along acquaintance chains deep across many levels: {{recs}}
    blanks:
      payments:
        accept: ["relational", "Relational", "SQL"]
        accept_regex: '^\s*([Rr]elational|SQL)\s*$'
      cache:
        accept: ["key-value", "Key-value", "key value", "KV", "kv"]
        accept_regex: '^\s*([Kk]ey[-\s]?[Vv]alue|KV|kv)\s*$'
      recs:
        accept: ["graph", "Graph"]
        accept_regex: '^\s*[Gg]raph\s*$'
    explanation: "This is polyglot persistence: each access pattern gets its own family. Transactions and integrity are served by a relational database, key access with TTL suits key-value, and deep link traversal needs a graph database."
    hints:
      - "For each line ask which operation the subsystem does most: strict transactions with integrity, instant access by a known identifier, or traversal of links across many levels deep."
      - "Payments care most about integrity and all-or-nothing rollback. The cache needs constant-time access by identifier with auto-expiry. Recommendations need cheap movement along links where each step is independent of data volume."
