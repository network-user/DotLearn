exercises:
  - id: doc-aggregate-001
    concept: document
    type: theory-quiz
    difficulty: 1
    prompt: "Что такое документ в документной базе данных?"
    choices:
      - id: a
        text: "Самодостаточная структура (по сути JSON) со вложенными полями, массивами и объектами."
      - id: b
        text: "Строка фиксированной таблицы со строго заданными колонками сразу, без промежуточного состояния."
      - id: c
        text: "Текстовый файл формата .doc на диске сразу, без промежуточного состояния."
      - id: d
        text: "Указатель на запись в другой базе сразу, без промежуточного состояния."
    correct: [a]
    explanation: "Документ - это вложенная структура вроде JSON. Всё, что нужно для одной сущности, лежит внутри неё; документы складываются в коллекции без жёсткой схемы."
    variants:
      - prompt: "Сколько JOIN нужно документной базе, чтобы прочитать пользователя со вложенными в него заказами?"
        choices:
          - id: a
            text: "Ни одного - документ читается целиком по идентификатору."
          - id: b
            text: "Один JOIN таблиц users и orders сразу, без промежуточного состояния."
          - id: c
            text: "По одному JOIN на каждый заказ сразу, без промежуточного состояния."
          - id: d
            text: "Два JOIN: сначала по ключу, потом по значению."
        correct: [a]
        explanation: "Заказы вложены прямо в документ пользователя, поэтому он читается одним обращением по _id, без всяких JOIN."
      - prompt: "Как называется кластер данных, который имеет смысл читать и менять как целое?"
        choices:
          - id: a
            text: "Агрегат."
          - id: b
            text: "Индекс."
          - id: c
            text: "Шард."
          - id: d
            text: "Транзакция."
        correct: [a]
        explanation: "Агрегат - самодостаточная единица данных (заказ с позициями, статья с тегами). Документная модель хранит один агрегат одним документом."

  - id: doc-embed-ref-001
    concept: document
    type: theory-quiz
    difficulty: 2
    prompt: "Позиции заказа читаются только вместе с самим заказом и принадлежат лишь ему. Как их моделировать?"
    choices:
      - id: a
        text: "Вкладывать (embed) прямо в документ заказа."
      - id: b
        text: "Выносить в отдельную коллекцию и связывать ссылкой."
      - id: c
        text: "Хранить в отдельной реляционной базе."
      - id: d
        text: "Дублировать в каждый документ пользователя."
    correct: [a]
    explanation: "Данные, которые читаются вместе с родителем, принадлежат только ему и не растут безгранично, выгодно вкладывать: чтение идёт одним куском."
    variants:
      - prompt: "Каталог товаров используется тысячами заказов и живёт своей жизнью. Как его моделировать в документной базе?"
        choices:
          - id: a
            text: "Вынести в отдельную коллекцию и ссылаться по _id."
          - id: b
            text: "Вложить полную копию товара в каждый заказ."
          - id: c
            text: "Вложить все заказы внутрь каждого товара."
          - id: d
            text: "Хранить товары только в коде приложения."
        correct: [a]
        explanation: "Данные, которые разделяются многими сущностями и живут своей жизнью, лучше выносить в отдельную коллекцию и ссылаться - иначе придётся обновлять тысячи копий."
      - prompt: "Что значит «ссылаться» (reference) в документной модели на практике?"
        choices:
          - id: a
            text: "Хранить поле с чужим _id, а связанные документы собирать в коде приложения."
          - id: b
            text: "База автоматически выполняет JOIN, как в реляционной сразу, без промежуточного состояния."
          - id: c
            text: "Копировать связанный документ целиком сразу, без промежуточного состояния."
          - id: d
            text: "Запрещать любые связи между коллекциями сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Ссылка - это поле с чужим идентификатором. Автоматического JOIN по умолчанию нет, поэтому сборку связанных документов делает код приложения."

  - id: doc-unbounded-001
    concept: document
    type: theory-quiz
    difficulty: 3
    prompt: "Комментарии к популярному посту растут без предела. Почему их опасно вкладывать массивом прямо в документ поста?"
    choices:
      - id: a
        text: "Документ распухнет, упрётся в лимит размера и будет целиком переписываться при каждом новом комментарии."
      - id: b
        text: "Массивы в документах запрещены сразу, без промежуточного состояния и без дополнительных проверок."
      - id: c
        text: "Комментарии нельзя хранить в базе вообще сразу, без промежуточного состояния и без дополнительных проверок."
      - id: d
        text: "Вложенный массив автоматически удаляется через сутки сразу, без промежуточного состояния."
    correct: [a]
    explanation: "Безграничный массив - классическая ловушка. Растущие без предела данные выносят в отдельную коллекцию со ссылкой, а не вкладывают."

  - id: doc-pitfalls-001
    concept: document
    type: theory-quiz
    difficulty: 3
    prompt: "Какие утверждения о документной модели верны? Отметьте все."
    choices:
      - id: a
        text: "Вложение данных дублирует их и возвращает аномалии обновления."
      - id: b
        text: "Гибкая схема не отменяет схему, а переносит заботу о ней в код приложения."
      - id: c
        text: "Сильно связанные данные - сигнал, что документная модель неуместна."
      - id: d
        text: "Документная база по умолчанию делает JOIN по ссылкам так же, как реляционная."
    correct: [a, b, c]
    explanation: "a, b, c верны. d - заблуждение: автоматического JOIN по ссылкам в документной модели по умолчанию нет, сборку делает приложение."

  - id: doc-decision-blanks-001
    concept: document
    type: fill-in-blanks
    difficulty: 2
    prompt: "Подберите проектное решение документной схемы под сценарий. Впишите пропущенное слово."
    template: |
      Позиции заказа читаются только вместе с заказом, принадлежат лишь ему и не растут без предела. В документной модели их выгодно {{decision}} прямо в документ.
    blanks:
      decision:
        accept: ["вкладывать", "вложить", "embed"]
        accept_regex: '^\s*([Вв]клад[а-яё]*|[Вв]лож[а-яё]*|embed)\s*$'
    explanation: "Данные, которые читаются с родителем, принадлежат ему и ограничены по размеру, выгодно вкладывать: документ читается одним куском."
    variants:
      - template: |
          Каталог товаров используют тысячи заказов, и он живёт своей жизнью. Такие данные лучше вынести в отдельную коллекцию и на них {{decision}}.
        blanks:
          decision:
            accept: ["ссылаться", "сослаться", "reference"]
            accept_regex: '^\s*([Сс]сыл[а-яё]*|[Сс]осл[а-яё]*|reference)\s*$'
      - template: |
          Комментарии к посту растут без предела. Вкладывать их массивом в документ опасно: он упрётся в {{limit}} размера и будет переписываться целиком.
        blanks:
          limit:
            accept: ["лимит", "предел", "ограничение", "limit"]
            accept_regex: '^\s*(лимит|предел|ограничени[ея]|limit)\s*$'
