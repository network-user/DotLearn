exercises:
  - id: data-models-meaning-001
    concept: data-models
    type: theory-quiz
    difficulty: 1
    prompt: "Which best describes a data model?"
    choices:
      - id: a
        text: "The shape a database imposes on data, and the set of operations it makes cheap."
      - id: b
        text: "The programming language the database is written in before any other checks run on this path."
      - id: c
        text: "The physical file format of the database on disk before any other checks run on this path."
      - id: d
        text: "A graphical editor for drawing tables, produced in full without further selection."
    correct: [a]
    explanation: "A data model is logical data shape plus operations that become cheap. Physical format on disk is the storage engine, a separate layer."
    variants:
      - prompt: "What does NoSQL correctly stand for?"
        choices:
          - id: a
            text: "Not only SQL - not a rejection of SQL, but an admission of relational model limits."
          - id: b
            text: "No SQL - a complete ban on the SQL language before any other checks run on this path."
          - id: c
            text: "New SQL - a new query language standard, produced in full without further selection."
          - id: d
            text: "Network SQL - SQL over the network, produced in full without further selection."
        correct: [a]
        explanation: "NoSQL is read as not only SQL. Many such databases today even accept SQL-like queries."
      - prompt: "Why is it said that no data model is cheap for everything?"
        choices:
          - id: a
            text: "Each model makes some operations cheap at the cost of others becoming expensive."
          - id: b
            text: "Because all databases are paid before any other checks run on this path."
          - id: c
            text: "Because any database slows down over time before any other checks run on this path."
          - id: d
            text: "Because you cannot change a data model after launch before any other checks run on this path."
        correct: [a]
        explanation: "Cheap operations are paid for by expensive ones. Choosing a model is choosing which operations are most frequent in your system."

  - id: data-models-schema-001
    concept: data-models
    type: theory-quiz
    difficulty: 2
    prompt: "What does schema-on-read (flexible schema) mean?"
    choices:
      - id: a
        text: "Structure is checked not by the database on write, but by application code on read."
      - id: b
        text: "The database forbids any write without a predeclared schema before any other checks run on this path."
      - id: c
        text: "No schema exists anywhere, and nobody cares about structure before any other checks run on this path."
      - id: d
        text: "The schema is stored in a separate read-only file before any other checks run on this path."
    correct: [a]
    explanation: "Schema-on-read does not remove schema - it moves validation from the database to the application at read time. The schema becomes implicit, not gone."
    variants:
      - prompt: "How does horizontal scaling differ from vertical scaling?"
        choices:
          - id: a
            text: "Horizontal spreads data across many machines; vertical makes one machine more powerful."
          - id: b
            text: "Horizontal speeds up the disk; vertical speeds up the network before any other checks run on this path."
          - id: c
            text: "These are two names for the same technique before any other checks run on this path."
          - id: d
            text: "Horizontal scaling works only for relational databases before any other checks run on this path."
        correct: [a]
        explanation: "Vertical is a bigger single machine (hits a ceiling). Horizontal is sharding and replication across many machines (cheaper hardware, but brings CAP)."
      - prompt: "What is schema-on-write (rigid schema)?"
        choices:
          - id: a
            text: "The database checks structure at write time and rejects wrongly shaped data."
          - id: b
            text: "The schema can be changed only while writing new rows before any other checks run on this path."
          - id: c
            text: "Anyone can write without validation before any other checks run on this path."
          - id: d
            text: "The schema is written to a log on every read request before any other checks run on this path."
        correct: [a]
        explanation: "Rigid schema catches errors early: a relational database will not put text in a numeric column. The price is harder shape changes (migrations)."

  - id: data-models-cap-001
    concept: data-models
    type: theory-quiz
    difficulty: 3
    prompt: "A distributed database, and the network between nodes is partitioned. What is the real tradeoff?"
    choices:
      - id: a
        text: "Between consistency (CP) and availability (AP)."
      - id: b
        text: "Between speed and storage volume."
      - id: c
        text: "Between SQL and NoSQL."
      - id: d
        text: "You can keep all three CAP guarantees at once."
    correct: [a]
    explanation: "During a partition, partition tolerance (P) is mandatory, so the choice narrows to CP (refuse to answer rather than lie) versus AP (answer, risking stale data). Pure CA exists only on one node."

  - id: data-models-misconceptions-001
    concept: data-models
    type: theory-quiz
    difficulty: 3
    prompt: "Which statements are common misconceptions about databases? Select all that apply."
    choices:
      - id: a
        text: "NoSQL is inherently faster than relational databases."
      - id: b
        text: "Databases exist with no schema at all."
      - id: c
        text: "Logical data model and storage engine are different layers."
      - id: d
        text: "Distribution across nodes is not free."
    correct: [a, b]
    explanation: "a and b are misconceptions: speed depends on access pattern, and schemaless means schema-on-read. c and d are correct: model and engine are different layers, and distribution pays through CAP."

  - id: data-models-axis-blanks-001
    concept: data-models
    type: fill-in-blanks
    difficulty: 2
    prompt: "Identify the database comparison axis from the scenario. Fill in the missing term."
    template: |
      The network between nodes of a distributed database has partitioned, and you must choose: answer at the risk of stale data, or refuse for the sake of honesty. This choice is described by the {{law}} theorem.
    blanks:
      law:
        accept: ["CAP", "cap"]
        accept_regex: '^\s*(CAP|cap)\s*$'
    explanation: "A partition forces a distributed database to choose between consistency and availability. That is the CAP theorem choice: you can hold only two guarantees of three."
    variants:
      - template: |
          The database checks a row structure at write time and will not put text into a numeric column. This approach to schema is called {{approach}}.
        blanks:
          approach:
            accept: ["schema-on-write", "schema on write"]
            accept_regex: '^\s*schema[-\s]?on[-\s]?write\s*$'
      - template: |
          Data is spread across many machines instead of buying one powerful one. This scaling is called {{direction}}.
        blanks:
          direction:
            accept: ["horizontal", "horizontal scaling"]
            accept_regex: '^\s*horizontal(\s+scaling)?\s*$'
