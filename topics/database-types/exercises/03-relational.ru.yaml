exercises:
  - id: rel-relationships-001
    concept: relational
    type: theory-quiz
    difficulty: 1
    prompt: "Где в реляционной модели хранится связь между заказом и пользователем?"
    choices:
      - id: a
        text: "В совпадающих значениях ключей: заказ ссылается на пользователя через user_id."
      - id: b
        text: "Заказ вложен прямо внутрь строки пользователя."
      - id: c
        text: "В отдельном графе указателей на диске."
      - id: d
        text: "Связи в реляционной модели вообще невозможны."
    correct: [a]
    explanation: "Связи не лежат внутри строк. Заказ живёт в своей таблице и ссылается на пользователя по значению внешнего ключа; собираются они оператором JOIN при чтении."
    variants:
      - prompt: "Что гарантирует PRIMARY KEY у таблицы?"
        choices:
          - id: a
            text: "У каждой строки есть уникальный идентификатор."
          - id: b
            text: "Таблица отсортирована по алфавиту."
          - id: c
            text: "В таблицу нельзя добавить новые строки."
          - id: d
            text: "Все колонки таблицы становятся обязательными."
        correct: [a]
        explanation: "PRIMARY KEY задаёт уникальный идентификатор строки. На него обычно ссылаются внешние ключи других таблиц."
      - prompt: "Каким оператором реляционная база собирает данные из двух таблиц по общему ключу?"
        choices:
          - id: a
            text: "JOIN"
          - id: b
            text: "MERGE-FILE"
          - id: c
            text: "LINK"
          - id: d
            text: "NAVIGATE"
        correct: [a]
        explanation: "JOIN соединяет строки таблиц по условию совпадения ключей. Это и есть реляционный способ выразить связь."

  - id: rel-normalization-001
    concept: relational
    type: theory-quiz
    difficulty: 2
    prompt: "Какую проблему решает нормализация?"
    choices:
      - id: a
        text: "Хранит каждый факт ровно один раз и тем убирает аномалии обновления."
      - id: b
        text: "Ускоряет любой запрос за счёт дублирования данных."
      - id: c
        text: "Шифрует данные на диске."
      - id: d
        text: "Автоматически создаёт индексы для всех колонок."
    correct: [a]
    explanation: "Нормализация раскладывает данные так, чтобы каждый факт жил в одном месте. Тогда обновление - это правка одной строки, и противоречивых копий не возникает."
    variants:
      - prompt: "Имя пользователя хранится в одном месте, заказы ссылаются на него по user_id. Пользователь сменил имя. Что нужно сделать?"
        choices:
          - id: a
            text: "Поправить одну строку в таблице users - все заказы увидят новое имя автоматически."
          - id: b
            text: "Обновить имя в каждом заказе вручную."
          - id: c
            text: "Пересоздать таблицу заказов."
          - id: d
            text: "Ничего: имя в нормализованной схеме менять нельзя."
        correct: [a]
        explanation: "В нормализованной схеме имя не продублировано: оно лежит в users один раз, а заказы просто ссылаются на него по ключу."
      - prompt: "Что такое контролируемая денормализация?"
        choices:
          - id: a
            text: "Намеренное дублирование данных ради скорости чтения - осознанный размен."
          - id: b
            text: "Случайная потеря данных при сбое."
          - id: c
            text: "Полный отказ от таблиц в пользу графа."
          - id: d
            text: "Ошибка проектирования, которую всегда нужно исправлять."
        correct: [a]
        explanation: "Иногда дублирование вводят сознательно, чтобы не склеивать десяток таблиц на каждый экран. Это размен места и риска рассогласования на скорость чтения, а не лень."

  - id: rel-acid-atomicity-001
    concept: relational
    type: theory-quiz
    difficulty: 3
    prompt: "Перевод денег списывает сумму с одного счёта и зачисляет на другой. После списания сервер упал. Какая буква ACID отвечает за то, чтобы списание откатилось?"
    choices:
      - id: a
        text: "Atomicity - всё или ничего."
      - id: b
        text: "Durability - долговечность."
      - id: c
        text: "Isolation - изоляция."
      - id: d
        text: "Consistency - согласованность."
    correct: [a]
    explanation: "Атомарность гарантирует, что транзакция выполнится целиком или не выполнится вовсе. Раз зачисление не произошло, списание откатывается, и «потерянных» денег не будет."

  - id: rel-acid-vs-cap-001
    concept: relational
    type: theory-quiz
    difficulty: 4
    prompt: "Чем буква C в ACID отличается от буквы C в CAP?"
    choices:
      - id: a
        text: "C в ACID - соблюдение правил схемы внутри транзакции; C в CAP - видят ли узлы распределённой системы одинаковые данные."
      - id: b
        text: "Это одно и то же свойство под двумя названиями."
      - id: c
        text: "C в ACID про скорость, C в CAP про объём хранения."
      - id: d
        text: "C в ACID применима только к NoSQL, C в CAP - только к SQL."
    correct: [a]
    explanation: "Совпадает только буква. Consistency в ACID - про корректность состояния относительно ограничений внутри одной транзакции. Consistency в CAP - про согласованность копий между узлами распределённой системы. Разные свойства с одинаковым именем."

  - id: rel-limits-001
    concept: relational
    type: theory-quiz
    difficulty: 3
    prompt: "Какие из утверждений о пределах реляционной модели верны? Отметьте все."
    choices:
      - id: a
        text: "JOIN дорожают на больших объёмах и особенно при соединении через сеть между шардами."
      - id: b
        text: "Объект в коде и плоские таблицы - разные формы, между ними нужен перевод (impedance mismatch)."
      - id: c
        text: "Реляционная база по своей природе всегда медленнее любого NoSQL."
      - id: d
        text: "Горизонтальное масштабирование реляционной базы сложнее, чем у многих NoSQL."
    correct: [a, b, d]
    explanation: "a, b и d - реальные пределы модели. c - заблуждение: по первичному ключу реляционная база не уступает ключ-значению, а скорость зависит от запроса, индексов и схемы, а не от ярлыка SQL/NoSQL."

  - id: rel-behavior-blanks-001
    concept: relational
    type: fill-in-blanks
    difficulty: 2
    prompt: "Подберите свойство или операцию реляционной модели под задачу. Впишите пропущенный термин."
    template: |
      Перевод денег списывает с одного счёта и зачисляет на другой как единое целое: либо оба действия, либо ни одного. За это отвечает свойство {{prop}} из ACID.
    blanks:
      prop:
        accept: ["атомарность", "Атомарность", "атомарности", "atomicity"]
        accept_regex: '^\s*([Аа]томарност[ьи]|atomicity)\s*$'
    explanation: "«Всё или ничего» при переводе денег обеспечивает атомарность: если зачисление сорвалось, списание откатывается целиком."
    variants:
      - template: |
          Имя пользователя хранят ровно в одном месте, а заказы ссылаются на него по ключу. Такой приём против аномалий обновления называют {{term}}.
        blanks:
          term:
            accept: ["нормализация", "Нормализация", "нормализацией", "normalization"]
            accept_regex: '^\s*([Нн]ормализаци[а-яё]*|normalization)\s*$'
      - template: |
          Заказ и пользователь лежат в разных таблицах и связаны совпадением ключей. Собрать их вместе при чтении можно оператором {{op}}.
        blanks:
          op:
            accept: ["JOIN", "join", "джойн"]
            accept_regex: '^\s*(JOIN|join|джойн)\s*$'
