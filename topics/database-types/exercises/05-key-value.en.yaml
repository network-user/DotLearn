exercises:
  - id: kv-access-001
    concept: key-value
    type: theory-quiz
    difficulty: 1
    prompt: "How do you fetch data from a key-value store?"
    choices:
      - id: a
        text: "By key - GET returns the value in roughly one step (O(1))."
      - id: b
        text: "With a SQL query and WHERE filter, produced in full without further selection."
      - id: c
        text: "By scanning all values until one matches before any other checks run on this path."
      - id: d
        text: "By JOINing two collections, produced in full without further selection."
    correct: [a]
    explanation: "Key-value is a dictionary: fetch by key in O(1). No SQL, JOIN, or value scan here."
    variants:
      - prompt: "What is the asymptotic complexity of key access in a key-value store?"
        choices:
          - id: a
            text: "O(1) - roughly constant time regardless of key count."
          - id: b
            text: "O(n) - time grows linearly with key count before any other checks run on this path."
          - id: c
            text: "O(log n) - like B-tree search, produced in full without further selection."
          - id: d
            text: "O(n^2) - quadratic, produced in full without further selection."
        correct: [a]
        explanation: "The key runs through a hash to a bucket and the value is found in one hop. A million keys or a hundred - hit cost is roughly the same."
      - prompt: "Why give keys names like user:1001 and session:ab12?"
        choices:
          - id: a
            text: "To structure the keyspace by naming convention - there is no query language."
          - id: b
            text: "The colon is mandatory syntax for all key-value databases before any other checks run on this path."
          - id: c
            text: "It automatically creates user and session tables before any other checks run on this path."
          - id: d
            text: "That is how the database encrypts keys before any other checks run on this path."
        correct: [a]
        explanation: "With no query language, structure comes from naming. The colon is a habit for readable, prefix-grouped keys, not database syntax."

  - id: kv-opaque-001
    concept: key-value
    type: theory-quiz
    difficulty: 2
    prompt: "Why can you not run give all values where age > 30 in a key-value store?"
    choices:
      - id: a
        text: "Values are opaque to the database - it does not know there is an age field inside."
      - id: b
        text: "Such a query is too slow but possible out of the box before any other checks run on this path."
      - id: c
        text: "The > operator is forbidden in key-value databases before any other checks run on this path."
      - id: d
        text: "You must first create an index on the key before any other checks run on this path."
    correct: [a]
    explanation: "For the database a value is a black box: store and return by key, never look inside. Content query is impossible; the only entry is the key."
    variants:
      - prompt: "What must the application know to read from key-value storage?"
        choices:
          - id: a
            text: "The exact key - there is no other way to the value."
          - id: b
            text: "Any field inside the value, produced in full without further selection."
          - id: c
            text: "The table schema, produced in full without further selection."
          - id: d
            text: "The row number in a table, produced in full without further selection."
        correct: [a]
        explanation: "The only way to get a value is to know its key. Plain key-value has no content search."
      - prompt: "What is TTL on a key?"
        choices:
          - id: a
            text: "Time to live: after a set duration the key deletes itself."
          - id: b
            text: "The value data type, produced in full without further selection."
          - id: c
            text: "A counter of key accesses, produced in full without further selection."
          - id: d
            text: "The value size in bytes, produced in full without further selection."
        correct: [a]
        explanation: "TTL (time to live) is when the key expires on its own. Ideal for cache and sessions: stale data goes away without cleanup."

  - id: kv-usecase-001
    concept: key-value
    type: theory-quiz
    difficulty: 3
    prompt: "For which scenarios is a key-value store an ideal fit? Select all that apply."
    choices:
      - id: a
        text: "Caching results of heavy queries."
      - id: b
        text: "Storing user sessions with TTL."
      - id: c
        text: "Counters and leaderboards (atomic increment by key)."
      - id: d
        text: "Report all orders over 1000 for the month with field filtering."
    correct: [a, b, c]
    explanation: "a, b, and c are native scenarios: key known upfront, value read whole. d needs content filtering and analytics - not key-value territory."

  - id: kv-pitfall-001
    concept: key-value
    type: theory-quiz
    difficulty: 3
    prompt: "A Redis cache runs without TTL and without an eviction policy. What is the risk?"
    choices:
      - id: a
        text: "Keys accumulate in memory until it runs out - a timed memory leak."
      - id: b
        text: "Nothing: without TTL the cache simply runs faster before any other checks run on this path."
      - id: c
        text: "The database auto-deletes all keys after an hour before any other checks run on this path."
      - id: d
        text: "Values become searchable by content, produced in full without further selection."
    correct: [a]
    explanation: "Many key-value databases keep data in RAM. Without TTL and eviction, keys pile up until memory is gone. Cache without expiry is a memory leak."

  - id: kv-behavior-blanks-001
    concept: key-value
    type: fill-in-blanks
    difficulty: 2
    prompt: "Pick the key-value store behavior or property for the task. Fill in the missing term."
    template: |
      A session token is used as the key, session data as the value, and to make the session vanish on its own after an hour, the key is given a {{feature}}.
    blanks:
      feature:
        accept: ["TTL", "ttl"]
        accept_regex: '^\s*(TTL|ttl)\s*$'
    explanation: "Automatic key expiry after a set time is provided by TTL. For sessions and cache it removes stale data without background cleanup."
    variants:
      - template: |
          You need to fetch a known value at a known address in roughly constant time. The complexity of such key access is {{complexity}}.
        blanks:
          complexity:
            accept: ["O(1)", "o(1)"]
            accept_regex: '^\s*[Oo]\(1\)\s*$'
      - template: |
          A query give all values where age > 30 is impossible in plain key-value because to the database the value itself is {{property}}.
        blanks:
          property:
            accept: ["opaque", "Opaque"]
            accept_regex: '^\s*[Oo]paque\s*$'
