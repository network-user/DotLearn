exercises:
  - id: graph-basics-001
    concept: graph
    type: theory-quiz
    difficulty: 1
    prompt: "Из чего состоит графовая модель данных?"
    choices:
      - id: a
        text: "Из узлов (сущностей), рёбер (связей между ними) и свойств на тех и других."
      - id: b
        text: "Из таблиц со строками и колонками."
      - id: c
        text: "Из ключей и непрозрачных значений."
      - id: d
        text: "Из одного большого JSON-документа."
    correct: [a]
    explanation: "Граф - это узлы (люди, счета, товары), рёбра (именованные связи между ними) и свойства. Связь здесь - первоклассный объект, а не просто внешний ключ."
    variants:
      - prompt: "Что такое index-free adjacency в графовой базе?"
        choices:
          - id: a
            text: "Каждый узел физически хранит ссылки на соседей, поэтому шаг по ребру стоит ~O(1)."
          - id: b
            text: "В графовой базе вообще нет индексов."
          - id: c
            text: "Связи хранятся в отдельной реляционной таблице."
          - id: d
            text: "Соседей каждый раз приходится искать полным перебором."
        correct: [a]
        explanation: "Index-free adjacency значит, что узел прямо ссылается на своих соседей. Переход к соседу не зависит от размера графа - в этом скорость глубоких обходов."
      - prompt: "Что моделирует ребро в графовой базе?"
        choices:
          - id: a
            text: "Именованную направленную связь между двумя узлами («дружит с», «перевёл деньги»)."
          - id: b
            text: "Колонку таблицы."
          - id: c
            text: "Срок жизни узла."
          - id: d
            text: "Индекс на первичном ключе."
        correct: [a]
        explanation: "Ребро - это связь между сущностями, обычно именованная и направленная. По рёбрам и идёт обход графа."

  - id: graph-traversal-001
    concept: graph
    type: theory-quiz
    difficulty: 2
    prompt: "Почему запрос «друзья друзей друзей» дорог в реляционной базе, но дёшев в графовой?"
    choices:
      - id: a
        text: "В реляционной каждый шаг по связи - это JOIN, и глубина N означает N соединений; в графовой шаг по ребру стоит ~O(1)."
      - id: b
        text: "Реляционная база вообще не умеет хранить связи."
      - id: c
        text: "Графовая база заранее вычисляет всех друзей всех пользователей."
      - id: d
        text: "В графовой базе запросы выполняются на видеокарте."
    correct: [a]
    explanation: "Глубина обхода в реляционной модели превращается в каскад JOIN, чья цена растёт с размером таблиц. Графовая база идёт по прямым ссылкам узла на соседей, и глубина остаётся дешёвой."
    variants:
      - prompt: "В чём графовая база, наоборот, слабее колоночной?"
        choices:
          - id: a
            text: "В массовой аналитике-агрегате по огромному числу однотипных строк."
          - id: b
            text: "В обходе связей вглубь."
          - id: c
            text: "В поиске кратчайшего пути."
          - id: d
            text: "В рекомендациях по связям."
        correct: [a]
        explanation: "Граф силён в глубине связей, а не в объёме. Суммировать миллиарды одинаковых строк лучше колоночной базе; ещё граф трудно масштабировать горизонтально."
      - prompt: "Когда тащить графовую базу - это «из пушки по воробьям»?"
        choices:
          - id: a
            text: "Когда связи неглубокие - один-два JOIN по индексам реляционная база делает отлично."
          - id: b
            text: "Когда нужно искать мошеннические кольца по цепочкам переводов."
          - id: c
            text: "Когда строится рекомендательная система по связям."
          - id: d
            text: "Когда анализируются степени знакомства в соцсети."
        correct: [a]
        explanation: "Графовая база окупается на глубоких обходах. Ради связи «у заказа есть пользователь» хватит обычного внешнего ключа в реляционной базе."

  - id: graph-when-001
    concept: graph
    type: theory-quiz
    difficulty: 3
    prompt: "Для каких задач графовая модель подходит особенно хорошо? Отметьте все."
    choices:
      - id: a
        text: "Рекомендации «с этим товаром покупают»."
      - id: b
        text: "Выявление мошеннических колец по цепочкам переводов."
      - id: c
        text: "Степени знакомства и кратчайшие пути в соцсети."
      - id: d
        text: "Подсчёт суммарной выручки по всем заказам за год."
    correct: [a, b, c]
    explanation: "a, b, c - про обход связей вглубь, родная стихия графа. d - массовая агрегация, где лучше колоночная база."

  - id: choosing-mapping-001
    concept: graph
    type: theory-quiz
    difficulty: 4
    prompt: "Бэкенд магазина: заказы и платежи (нужны транзакции), кэш и сессии (скорость по ключу), аналитика продаж (агрегаты по миллионам строк), рекомендации по глубоким связям. Какие сопоставления модели верны? Отметьте все."
    choices:
      - id: a
        text: "Заказы и платежи → реляционная база (ACID, транзакции)."
      - id: b
        text: "Кэш и сессии → ключ-значение (O(1) по ключу, TTL)."
      - id: c
        text: "Аналитика продаж → колоночная база (OLAP, агрегаты по колонкам)."
      - id: d
        text: "Рекомендации по глубоким связям → ключ-значение."
    correct: [a, b, c]
    explanation: "a, b, c сопоставлены верно - это и есть polyglot persistence. d ошибочно: глубокие связи и обходы - территория графовой базы, а не ключ-значения."

  - id: choosing-judgment-001
    concept: graph
    type: theory-quiz
    difficulty: 5
    prompt: "Стартап из трёх разработчиков делает MVP: пользователи, посты, лайки, лента. Команда хочет сразу развернуть пять специализированных баз, «как у больших». Что разумнее и почему?"
    choices:
      - id: a
        text: "Начать с одной реляционной базы и добавлять специализированное хранилище, лишь когда конкретный паттерн доступа упрётся в стену."
      - id: b
        text: "Сразу развернуть пять баз - зрелые системы делают именно так, значит и MVP должен."
      - id: c
        text: "Взять одну графовую базу для всего, раз есть лайки и подписки."
      - id: d
        text: "Взять только ключ-значение - оно самое быстрое, а скорость решает всё."
    correct: [a]
    explanation: "Полиглот оправдан, когда выгода от специализации перевешивает операционную сложность; пять баз на трёх разработчиков - это пять источников боли. Выбор идёт по паттерну доступа, а не по хайпу и не по тому, «как у больших». b и d - выбор по хайпу и по одному мифическому критерию; c натягивает одну модель на все паттерны. Маленькому проекту одной реляционной базы обычно достаточно."
