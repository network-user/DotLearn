exercises:
  - id: doc-aggregate-001
    concept: document
    type: theory-quiz
    difficulty: 1
    prompt: "What is a document in a document database?"
    choices:
      - id: a
        text: "A self-contained structure (essentially JSON) with nested fields, arrays, and objects."
      - id: b
        text: "A fixed table row with strictly defined columns before any other checks run on this path."
      - id: c
        text: "A .doc text file on disk, produced in full without further selection."
      - id: d
        text: "A pointer to a record in another database before any other checks run on this path."
    correct: [a]
    explanation: "A document is a nested structure like JSON. Everything for one entity lives inside it; documents go into collections without a rigid schema."
    variants:
      - prompt: "How many JOINs does a document database need to read a user with orders embedded inside?"
        choices:
          - id: a
            text: "None - the document is read whole by identifier."
          - id: b
            text: "One JOIN of users and orders tables, produced in full without further selection."
          - id: c
            text: "One JOIN per order, produced in full without further selection."
          - id: d
            text: "Two JOINs: first by key, then by value before any other checks run on this path."
        correct: [a]
        explanation: "Orders are nested in the user document, so one read by _id suffices - no JOIN."
      - prompt: "What is a cluster of data that makes sense to read and change as a whole called?"
        choices:
          - id: a
            text: "An aggregate."
          - id: b
            text: "An index."
          - id: c
            text: "A shard."
          - id: d
            text: "A transaction."
        correct: [a]
        explanation: "An aggregate is a self-contained unit (order with line items, article with tags). The document model stores one aggregate as one document."

  - id: doc-embed-ref-001
    concept: document
    type: theory-quiz
    difficulty: 2
    prompt: "Order line items are read only with the order and belong only to it. How should you model them?"
    choices:
      - id: a
        text: "Embed them directly in the order document."
      - id: b
        text: "Move them to a separate collection and link by reference."
      - id: c
        text: "Store them in a separate relational database."
      - id: d
        text: "Duplicate them in every user document."
    correct: [a]
    explanation: "Data read with the parent, belonging only to it, and not growing without bound is best embedded: one read gets everything."
    variants:
      - prompt: "A product catalog is used by thousands of orders and has its own lifecycle. How should you model it in a document database?"
        choices:
          - id: a
            text: "Put it in a separate collection and reference by _id."
          - id: b
            text: "Embed a full product copy in every order."
          - id: c
            text: "Embed all orders inside each product."
          - id: d
            text: "Store products only in application code."
        correct: [a]
        explanation: "Data shared by many entities with its own lifecycle belongs in a separate collection with references - otherwise you update thousands of copies."
      - prompt: "What does reference mean in the document model in practice?"
        choices:
          - id: a
            text: "Store a field with another _id; assemble linked documents in application code."
          - id: b
            text: "The database automatically JOINs like relational before any other checks run on this path."
          - id: c
            text: "Copy the linked document whole, produced in full without further selection."
          - id: d
            text: "Forbid any links between collections, produced in full without further selection."
        correct: [a]
        explanation: "A reference is a field with another identifier. There is no automatic JOIN by default, so the app assembles linked documents."

  - id: doc-unbounded-001
    concept: document
    type: theory-quiz
    difficulty: 3
    prompt: "Comments on a popular post grow without bound. Why is it dangerous to embed them as an array in the post document?"
    choices:
      - id: a
        text: "The document swells, hits a size limit, and is rewritten whole on every new comment."
      - id: b
        text: "Arrays in documents are forbidden before any other checks run on this path."
      - id: c
        text: "Comments cannot be stored in a database at all before any other checks run on this path."
      - id: d
        text: "A nested array auto-deletes after a day before any other checks run on this path."
    correct: [a]
    explanation: "An unbounded array is a classic trap. Data that grows forever goes in a separate collection with a reference, not embedded."

  - id: doc-pitfalls-001
    concept: document
    type: theory-quiz
    difficulty: 3
    prompt: "Which statements about the document model are true? Select all that apply."
    choices:
      - id: a
        text: "Embedding duplicates data and brings back update anomalies."
      - id: b
        text: "Flexible schema does not remove schema; it moves schema work into application code."
      - id: c
        text: "Heavily connected data is a signal the document model is a poor fit."
      - id: d
        text: "Document databases JOIN by reference by default like relational databases."
    correct: [a, b, c]
    explanation: "a, b, and c are true. d is wrong: there is no automatic JOIN by reference in document models by default; the app assembles links."

  - id: doc-decision-blanks-001
    concept: document
    type: fill-in-blanks
    difficulty: 2
    prompt: "Pick the document schema design decision for the scenario. Fill in the missing word."
    template: |
      Order line items are read only with the order, belong only to it, and do not grow without bound. In the document model it pays to {{decision}} them right in the document.
    blanks:
      decision:
        accept: ["embed"]
        accept_regex: '^\s*embed\s*$'
    explanation: "Data read with the parent, owned by it, and bounded in size is best embedded: the document is read in one piece."
    variants:
      - template: |
          A product catalog is used by thousands of orders and has its own lifecycle. Such data is better moved to a separate collection and {{decision}}.
        blanks:
          decision:
            accept: ["referenced", "reference"]
            accept_regex: '^\s*referenc(ed|e)\s*$'
      - template: |
          Comments on a post grow without bound. Embedding them as an array in the document is dangerous: it will hit a size {{limit}} and be rewritten whole.
        blanks:
          limit:
            accept: ["limit", "bound"]
            accept_regex: '^\s*(limit|bound)\s*$'
