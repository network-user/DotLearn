exercises:
  - id: hier-net-parent-001
    concept: hierarchical-network
    type: theory-quiz
    difficulty: 1
    prompt: "How many parents can a record have in the hierarchical model?"
    choices:
      - id: a
        text: "Exactly one."
      - id: b
        text: "As many as you want."
      - id: c
        text: "None - this model has no parents."
      - id: d
        text: "No more than two."
    correct: [a]
    explanation: "The hierarchical model is a tree: each record has exactly one parent, and the path to it from the root is unique."
    variants:
      - prompt: "What shape do data take in the hierarchical model?"
        choices:
          - id: a
            text: "A tree."
          - id: b
            text: "A table."
          - id: c
            text: "A flat list with no links."
          - id: d
            text: "A hash table."
        correct: [a]
        explanation: "The hierarchical model lays data out as a tree with parent-child relationships."
      - prompt: "What does navigational data access mean?"
        choices:
          - id: a
            text: "The programmer manually walks records and links, one record at a time."
          - id: b
            text: "The database picks an optimal plan from a declarative query."
          - id: c
            text: "Data is available only through web navigation."
          - id: d
            text: "A record is reachable only by its GPS coordinates on disk."
        correct: [a]
        explanation: "Navigational access is manual traversal by pointers: place a cursor and move to parent, child, or sibling. There is no declarative describe-the-result in these models."

  - id: hier-net-m2m-001
    concept: hierarchical-network
    type: theory-quiz
    difficulty: 2
    prompt: "One part is used in several products. What happens in a pure hierarchical model?"
    choices:
      - id: a
        text: "The part must be duplicated - one copy under each product."
      - id: b
        text: "The part links to all products with one edge."
      - id: c
        text: "The model automatically creates a link table."
      - id: d
        text: "The database refuses to store such data."
    correct: [a]
    explanation: "A record in a tree has only one parent, so many-to-many is expressed only by duplication. That leads to update anomalies: you must fix the part price in every copy."
    variants:
      - prompt: "Why is data duplication dangerous in the hierarchical model?"
        choices:
          - id: a
            text: "Update anomalies: you must repeat the edit in every copy or data contradicts itself."
          - id: b
            text: "Only extra disk space; correctness is unaffected."
          - id: c
            text: "Duplication speeds writes; no problems."
          - id: d
            text: "The database stops accepting read requests."
        correct: [a]
        explanation: "The main trouble with duplication is not space but consistency: miss one copy on update and the same part has two different prices."
      - prompt: "One-to-many (a department has many employees) in the hierarchical model..."
        choices:
          - id: a
            text: "fits naturally - it is a branch of the tree."
          - id: b
            text: "is impossible without a link table."
          - id: c
            text: "requires duplicating employees."
          - id: d
            text: "is supported only in the network model."
        correct: [a]
        explanation: "One-to-many is native to a tree: one parent, many children. Problems start only with many-to-many."

  - id: hier-net-codasyl-001
    concept: hierarchical-network
    type: theory-quiz
    difficulty: 3
    prompt: "What did the network model (CODASYL) add compared to the hierarchical model?"
    choices:
      - id: a
        text: "A record can belong to several sets, several owners - many-to-many without duplication."
      - id: b
        text: "A declarative query language instead of manual traversal."
      - id: c
        text: "Full independence of queries from physical storage."
      - id: d
        text: "ACID guarantees and transactions."
    correct: [a]
    explanation: "The network model allowed several owner-parents and removed duplication. Queries stayed navigational; decoupling logic from storage came with the relational model."

  - id: hier-net-today-001
    concept: hierarchical-network
    type: theory-quiz
    difficulty: 3
    prompt: "Where does the hierarchical (tree) model live today? Select all that apply."
    choices:
      - id: a
        text: "Filesystem directories."
      - id: b
        text: "JSON document structure and HTML page DOM."
      - id: c
        text: "LDAP and Active Directory catalogs."
      - id: d
        text: "A flat CSV file with no nesting."
    correct: [a, b, c]
    explanation: "Filesystems, JSON, DOM, DNS, LDAP - all are one-parent-many-children trees. Flat CSV is a table without hierarchy, so it does not belong here."
