exercises:
  - id: rel-relationships-001
    concept: relational
    type: theory-quiz
    difficulty: 1
    prompt: "Where is the link between an order and a user stored in the relational model?"
    choices:
      - id: a
        text: "In matching key values: the order references the user through user_id."
      - id: b
        text: "The order is nested inside the user row."
      - id: c
        text: "In a separate graph of pointers on disk."
      - id: d
        text: "Relationships are impossible in the relational model."
    correct: [a]
    explanation: "Links do not live inside rows. An order sits in its own table and references the user by foreign key; they are joined with JOIN at read time."
    variants:
      - prompt: "What does PRIMARY KEY guarantee for a table?"
        choices:
          - id: a
            text: "Each row has a unique identifier."
          - id: b
            text: "The table is sorted alphabetically."
          - id: c
            text: "No new rows can be added."
          - id: d
            text: "All columns become required."
        correct: [a]
        explanation: "PRIMARY KEY defines a unique row identifier. Other tables usually reference it with foreign keys."
      - prompt: "Which operator joins data from two tables on a shared key in a relational database?"
        choices:
          - id: a
            text: "JOIN"
          - id: b
            text: "MERGE-FILE"
          - id: c
            text: "LINK"
          - id: d
            text: "NAVIGATE"
        correct: [a]
        explanation: "JOIN combines table rows on a key match condition. That is the relational way to express a link."

  - id: rel-normalization-001
    concept: relational
    type: theory-quiz
    difficulty: 2
    prompt: "What problem does normalization solve?"
    choices:
      - id: a
        text: "Stores each fact exactly once and removes update anomalies."
      - id: b
        text: "Speeds every query by duplicating data."
      - id: c
        text: "Encrypts data on disk."
      - id: d
        text: "Automatically creates indexes on all columns."
    correct: [a]
    explanation: "Normalization lays out data so each fact lives in one place. Then an update is one row edit and contradictory copies do not appear."
    variants:
      - prompt: "A user name is stored once; orders reference it by user_id. The user changes their name. What do you do?"
        choices:
          - id: a
            text: "Edit one row in users - all orders see the new name automatically."
          - id: b
            text: "Update the name in every order manually."
          - id: c
            text: "Recreate the orders table."
          - id: d
            text: "Nothing: names cannot change in a normalized schema."
        correct: [a]
        explanation: "In a normalized schema the name is not duplicated: it lives once in users, and orders reference it by key."
      - prompt: "What is controlled denormalization?"
        choices:
          - id: a
            text: "Intentional data duplication for read speed - a conscious tradeoff."
          - id: b
            text: "Accidental data loss during failure."
          - id: c
            text: "Complete rejection of tables in favor of a graph."
          - id: d
            text: "A design mistake that must always be fixed."
        correct: [a]
        explanation: "Sometimes you duplicate deliberately to avoid joining a dozen tables for one screen. That trades space and inconsistency risk for read speed, not laziness."

  - id: rel-acid-atomicity-001
    concept: relational
    type: theory-quiz
    difficulty: 3
    prompt: "A money transfer debits one account and credits another. After the debit the server crashes. Which ACID letter ensures the debit rolls back?"
    choices:
      - id: a
        text: "Atomicity - all or nothing."
      - id: b
        text: "Durability."
      - id: c
        text: "Isolation."
      - id: d
        text: "Consistency."
    correct: [a]
    explanation: "Atomicity guarantees the transaction completes whole or not at all. Since the credit did not happen, the debit rolls back and no money vanishes."

  - id: rel-acid-vs-cap-001
    concept: relational
    type: theory-quiz
    difficulty: 4
    prompt: "How does C in ACID differ from C in CAP?"
    choices:
      - id: a
        text: "C in ACID is obeying schema rules inside a transaction; C in CAP is whether distributed nodes see the same data."
      - id: b
        text: "They are the same property under two names."
      - id: c
        text: "C in ACID is about speed; C in CAP is about storage volume."
      - id: d
        text: "C in ACID applies only to NoSQL; C in CAP only to SQL."
    correct: [a]
    explanation: "Only the letter matches. Consistency in ACID is valid state relative to constraints inside one transaction. Consistency in CAP is copy agreement between nodes in a distributed system. Same name, different properties."

  - id: rel-limits-001
    concept: relational
    type: theory-quiz
    difficulty: 3
    prompt: "Which statements about relational model limits are true? Select all that apply."
    choices:
      - id: a
        text: "JOINs get expensive at large scale, especially across the network between shards."
      - id: b
        text: "Objects in code and flat tables are different shapes - translation is needed (impedance mismatch)."
      - id: c
        text: "Relational databases are inherently always slower than any NoSQL."
      - id: d
        text: "Horizontal scaling of relational databases is harder than for many NoSQL systems."
    correct: [a, b, d]
    explanation: "a, b, and d are real limits. c is a misconception: by primary key relational is not slower than key-value; speed depends on query, indexes, and schema, not the SQL/NoSQL label."

  - id: rel-behavior-blanks-001
    concept: relational
    type: fill-in-blanks
    difficulty: 2
    prompt: "Pick the relational model property or operation for the task. Fill in the missing term."
    template: |
      A money transfer debits one account and credits another as a single whole: either both actions or neither. This is ensured by the {{prop}} property of ACID.
    blanks:
      prop:
        accept: ["atomicity", "Atomicity"]
        accept_regex: '^\s*[Aa]tomicity\s*$'
    explanation: "All or nothing in a money transfer is ensured by atomicity: if the credit fails, the debit rolls back entirely."
    variants:
      - template: |
          A user name is stored in exactly one place, and orders reference it by key. This technique against update anomalies is called {{term}}.
        blanks:
          term:
            accept: ["normalization", "Normalization"]
            accept_regex: '^\s*[Nn]ormalization\s*$'
      - template: |
          An order and a user live in different tables linked by matching keys. To combine them at read time you use the {{op}} operator.
        blanks:
          op:
            accept: ["JOIN", "join"]
            accept_regex: '^\s*(JOIN|join)\s*$'
