exercises:
  - id: wc-layout-001
    concept: wide-column
    type: theory-quiz
    difficulty: 1
    prompt: "How does column storage (column-store) lay data on disk?"
    choices:
      - id: a
        text: "Column by column: all values of the first column in sequence, then the second."
      - id: b
        text: "Row by row: all fields of the first record, then the second."
      - id: c
        text: "Randomly for even load."
      - id: d
        text: "As a tree of pointers."
    correct: [a]
    explanation: "Column-store keeps each column as one contiguous block. An analytic query on one column reads exactly that, not every field of every row."
    variants:
      - prompt: "Why does a column of uniform values compress well?"
        choices:
          - id: a
            text: "Values of one type are often similar - they compress far better than a mixed row."
          - id: b
            text: "Compression works only on numbers, and columns always hold numbers."
          - id: c
            text: "Columns compress worse than rows; that is a myth."
          - id: d
            text: "Because columns are shorter than rows."
        correct: [a]
        explanation: "A column holds similar, same-type values (thousands of identical cities, a narrow price range) - they compress much better than a row mixing number, text, and date."
      - prompt: "Query AVG(price) over 50 million rows. Why is row storage wasteful for it?"
        choices:
          - id: a
            text: "It pulls all columns of every row from disk though only one is needed."
          - id: b
            text: "It cannot compute an average."
          - id: c
            text: "It compresses data too aggressively."
          - id: d
            text: "It stores price encrypted."
        correct: [a]
        explanation: "In row storage the needed column cells are scattered among other fields, so the engine reads whole rows and drags up to 90% extra data."

  - id: wc-oltp-olap-001
    concept: wide-column
    type: theory-quiz
    difficulty: 2
    prompt: "Which workload is natural for row storage?"
    choices:
      - id: a
        text: "OLTP - short operations on individual records (create order, update profile)."
      - id: b
        text: "OLAP - heavy aggregates over billions of rows."
      - id: c
        text: "Full-text search only."
      - id: d
        text: "Binary file storage only."
    correct: [a]
    explanation: "OLTP works on a whole row at a time, so row storage fits. OLAP reads few columns whole - column storage wins there."
    variants:
      - prompt: "Which workload favors column storage?"
        choices:
          - id: a
            text: "OLAP - aggregates (revenue by region, average ticket) over huge volumes."
          - id: b
            text: "OLTP - point inserts and row updates."
          - id: c
            text: "User session storage."
          - id: d
            text: "Message queues."
        correct: [a]
        explanation: "OLAP reads few columns whole across billions of rows - the ideal case for column-store with read savings and compression."
      - prompt: "Why not put a column analytic database under transactional load?"
        choices:
          - id: a
            text: "Inserting one row touches every column block at once - expensive."
          - id: b
            text: "It cannot store numbers."
          - id: c
            text: "It works only in RAM."
          - id: d
            text: "Transactions are forbidden by law."
        correct: [a]
        explanation: "Point writes and updates are hard for column-store: one row is spread across many column blocks. Keep column storage beside OLTP for reports."

  - id: wc-cassandra-001
    concept: wide-column
    type: theory-quiz
    difficulty: 3
    prompt: "How do you typically design schema in a wide-column store (Cassandra)?"
    choices:
      - id: a
        text: "From queries: list needed reads and lay out data for each, deliberately denormalizing."
      - id: b
        text: "Maximally normalized schema first, then any ad hoc query."
      - id: c
        text: "No schema design needed - the database picks it."
      - id: d
        text: "Through an OOP class diagram."
    correct: [a]
    explanation: "Cassandra has no arbitrary JOIN and no cheap non-key column queries. Design from queries, denormalizing for each read - opposite of relational habit."

  - id: wc-two-families-001
    concept: wide-column
    type: theory-quiz
    difficulty: 4
    prompt: "Under the label columnar hide two different families. Which statements correctly distinguish them? Select all that apply."
    choices:
      - id: a
        text: "Column analytic databases (ClickHouse) optimize read and compression for OLAP."
      - id: b
        text: "Wide-column stores (Cassandra) use columns for horizontal scale and write throughput."
      - id: c
        text: "Cassandra defaults to the AP corner of CAP and writes to an LSM-tree."
      - id: d
        text: "These are two names for the same technology."
    correct: [a, b, c]
    explanation: "a, b, and c correctly distinguish the families: one speeds analytics, the other scales writes on a cluster. d is wrong: shared word column hides different jobs and architectures."

  - id: wc-workload-blanks-001
    concept: wide-column
    type: fill-in-blanks
    difficulty: 2
    prompt: "Pick the storage layout or workload type for the task. Fill in the missing term."
    template: |
      A query AVG(price) over 50 million rows reads one column of ten. To avoid dragging extra data, it pays to store data on disk {{layout}}.
    blanks:
      layout:
        accept: ["by column", "column by column", "column-store", "columnar"]
        accept_regex: '^\s*(by column|column by column|column[-\s]?store|columnar)\s*$'
    explanation: "An analytic query over one column benefits from column storage: the column sits as one block and is read whole without extra fields."
    variants:
      - template: |
          Create an order, update a profile, deduct stock: short operations on individual records. This workload is called {{load}}.
        blanks:
          load:
            accept: ["OLTP", "oltp"]
            accept_regex: '^\s*(OLTP|oltp)\s*$'
      - template: |
          Revenue by region for a year, average ticket by segment: heavy aggregates over huge volumes. This workload is called {{load}}.
        blanks:
          load:
            accept: ["OLAP", "olap"]
            accept_regex: '^\s*(OLAP|olap)\s*$'
