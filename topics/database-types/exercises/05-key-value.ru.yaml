exercises:
  - id: kv-access-001
    concept: key-value
    type: theory-quiz
    difficulty: 1
    prompt: "Как достать данные из хранилища ключ-значение?"
    choices:
      - id: a
        text: "По ключу - GET возвращает значение почти за один шаг (O(1))."
      - id: b
        text: "Запросом на языке SQL с фильтром WHERE."
      - id: c
        text: "Перебором всех значений до совпадения."
      - id: d
        text: "Соединением двух коллекций через JOIN."
    correct: [a]
    explanation: "Ключ-значение - это словарь: значение достаётся по ключу за O(1). Ни SQL, ни JOIN, ни перебора по значению здесь нет."
    variants:
      - prompt: "Какая асимптотическая сложность у доступа по ключу в хранилище ключ-значение?"
        choices:
          - id: a
            text: "O(1) - примерно постоянное время независимо от числа ключей."
          - id: b
            text: "O(n) - время растёт линейно с числом ключей."
          - id: c
            text: "O(log n) - как поиск в B-дереве."
          - id: d
            text: "O(n^2) - квадратично."
        correct: [a]
        explanation: "Ключ прогоняется через хеш-функцию в номер корзины, и значение находится за одно обращение. Миллион ключей или сто - стоимость попадания примерно одинакова."
      - prompt: "Зачем ключам дают имена вроде user:1001 и session:ab12?"
        choices:
          - id: a
            text: "Чтобы структурировать keyspace соглашением об именах - языка запросов-то нет."
          - id: b
            text: "Двоеточие - обязательный синтаксис всех ключ-значение баз."
          - id: c
            text: "Это автоматически создаёт таблицы user и session."
          - id: d
            text: "Так база шифрует ключи."
        correct: [a]
        explanation: "Раз языка запросов нет, структуру наводят соглашением об именах. Двоеточие - привычка делать ключи читаемыми и группируемыми по префиксу, а не синтаксис базы."

  - id: kv-opaque-001
    concept: key-value
    type: theory-quiz
    difficulty: 2
    prompt: "Почему в хранилище ключ-значение нельзя выполнить запрос «дай все значения, где age > 30»?"
    choices:
      - id: a
        text: "Значение для базы непрозрачно - она не знает, что внутри есть поле age."
      - id: b
        text: "Такой запрос слишком медленный, но в принципе возможен из коробки."
      - id: c
        text: "Оператор > запрещён в ключ-значение базах."
      - id: d
        text: "Нужно сначала создать индекс на ключе."
    correct: [a]
    explanation: "Для базы значение - чёрный ящик: она хранит и отдаёт его по ключу, но не заглядывает внутрь. Запрос по содержимому невозможен, единственный вход - ключ."
    variants:
      - prompt: "Что приложение должно знать, чтобы прочитать данные из ключ-значения?"
        choices:
          - id: a
            text: "Точный ключ - другого входа к значению нет."
          - id: b
            text: "Любое поле внутри значения."
          - id: c
            text: "Схему таблицы."
          - id: d
            text: "Номер строки в таблице."
        correct: [a]
        explanation: "Единственный способ достать значение - знать его ключ. Поиска по содержимому в чистой модели нет."
      - prompt: "Что такое TTL у ключа?"
        choices:
          - id: a
            text: "Срок жизни: через заданное время ключ автоматически удаляется."
          - id: b
            text: "Тип данных значения."
          - id: c
            text: "Счётчик обращений к ключу."
          - id: d
            text: "Размер значения в байтах."
        correct: [a]
        explanation: "TTL (time to live) - срок, через который ключ сам исчезает. Это идеально для кэша и сессий: устаревшее убирается без фоновой уборки."

  - id: kv-usecase-001
    concept: key-value
    type: theory-quiz
    difficulty: 3
    prompt: "Для каких сценариев хранилище ключ-значение подходит идеально? Отметьте все."
    choices:
      - id: a
        text: "Кэш результатов тяжёлых запросов."
      - id: b
        text: "Хранение пользовательских сессий с TTL."
      - id: c
        text: "Счётчики и лидерборды (атомарный инкремент по ключу)."
      - id: d
        text: "Отчёт «все заказы дороже 1000 рублей за месяц» с фильтрацией по полям."
    correct: [a, b, c]
    explanation: "a, b, c - родные сценарии: ключ известен заранее, значение читается целиком. d требует фильтрации по содержимому и аналитики - это не территория ключ-значения."

  - id: kv-pitfall-001
    concept: key-value
    type: theory-quiz
    difficulty: 3
    prompt: "Кэш на Redis работает без TTL и без политики вытеснения. Чем это грозит?"
    choices:
      - id: a
        text: "Ключи копятся в памяти, пока она не кончится - это утечка памяти на таймере."
      - id: b
        text: "Ничем: без TTL кэш просто работает быстрее."
      - id: c
        text: "База автоматически удалит все ключи через час."
      - id: d
        text: "Значения станут доступны для поиска по содержимому."
    correct: [a]
    explanation: "Многие ключ-значение базы держат данные в оперативной памяти. Без TTL и eviction ключи накапливаются до исчерпания памяти. Кэш без срока жизни - это утечка памяти."

  - id: kv-behavior-blanks-001
    concept: key-value
    type: fill-in-blanks
    difficulty: 2
    prompt: "Подберите поведение или свойство хранилища ключ-значение под задачу. Впишите пропущенный термин."
    template: |
      Токен сессии берут ключом, данные сессии значением, а чтобы сессия сама исчезла через час, ключу задают {{feature}}.
    blanks:
      feature:
        accept: ["TTL", "ttl", "ттл"]
        accept_regex: '^\s*(TTL|ttl|ттл)\s*$'
    explanation: "Автоматическое истечение ключа через заданное время обеспечивает TTL. Для сессий и кэша это убирает устаревшее без фоновой уборки."
    variants:
      - template: |
          Нужно достать заранее известное значение по известному адресу за примерно постоянное время. Сложность такого доступа по ключу равна {{complexity}}.
        blanks:
          complexity:
            accept: ["O(1)", "o(1)", "О(1)"]
            accept_regex: '^\s*[OoОо]\(1\)\s*$'
      - template: |
          Запрос «дай все значения, где age > 30» в чистом ключ-значении невозможен, потому что для базы само значение {{property}}.
        blanks:
          property:
            accept: ["непрозрачно", "непрозрачное", "opaque"]
            accept_regex: '^\s*([Нн]епрозрачн[а-яё]*|opaque)\s*$'
