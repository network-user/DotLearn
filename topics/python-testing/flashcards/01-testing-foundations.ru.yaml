conceptId: testing-foundations
cards:
  - id: testing-foundations-01
    front: "Что такое автоматический тест по сути?"
    back: "Маленькая программа, которая запускает ваш код с конкретным входом и проверяет, что результат именно такой, как задумано. Тысяча таких проверок выполняется за доли секунды."
    tags: [testing]
  - id: testing-foundations-02
    front: "Три причины, по которым тесты окупаются"
    back: "Быстрая обратная связь (узнать «работает ли» за секунды), защита от регрессий (падают, как только новая правка ломает старое поведение) и исполняемая спецификация (хорошо названный тест описывает, что код обязан делать)."
    tags: [testing]
  - id: testing-foundations-03
    front: "Что такое регрессия?"
    back: "Это когда новая правка ломает то, что раньше работало. Тест на старое поведение падает в ту же секунду, как вы его случайно нарушили, и показывает где. Без тестов регрессию находит пользователь."
    tags: [testing]
  - id: testing-foundations-04
    front: "Как устроена пирамида тестирования и какой смысл в её пропорциях?"
    back: "В основании много быстрых изолированных unit-тестов, в середине меньше интеграционных, наверху совсем мало медленных e2e. Чем выше тест, тем он дороже в поддержке и дольше выполняется, поэтому опираются на дешёвое быстрое основание."
    tags: [testing]
  - id: testing-foundations-05
    front: "Чем unit-тест отличается от интеграционного и e2e?"
    back: "Unit проверяет одну единицу (функцию, метод, класс) в изоляции. Интеграционный проверяет, что несколько частей работают вместе (код и реальная БД). E2e прогоняет весь сценарий через настоящий интерфейс, как живой пользователь."
    tags: [testing]
  - id: testing-foundations-06
    front: "Из каких трёх шагов состоит любой осмысленный тест (схема AAA)?"
    back: "Arrange (подготовь данные и окружение), Act (выполни ровно одно действие, которое тестируешь), Assert (сверь результат с ожиданием). В поведенческом стиле это Given-When-Then."
    tags: [testing]
  - id: testing-foundations-07
    front: "Что делает оператор assert в Python?"
    back: "«Утверждаю, что условие истинно»: если условие истинно, ничего не происходит; если ложно, возбуждается AssertionError и тест считается проваленным. Весь механизм проверки строится на нём."
    tags: [testing]
  - id: testing-foundations-08
    front: "Какими четырьмя свойствами обладает хороший unit-тест?"
    back: "Быстрый (миллисекунды), изолированный (не зависит от других тестов и порядка запуска), детерминированный (один и тот же вердикт на одном коде) и с одной причиной падения (проверяет одну вещь)."
    tags: [testing]
  - id: testing-foundations-09
    front: "Что такое flaky-тест и почему он бесполезен?"
    back: "Это «мигающий» тест: на одном и том же коде он иногда зелёный, иногда красный без изменений. Ему перестают верить, поэтому он не выполняет свою работу."
    tags: [testing]
  - id: testing-foundations-10
    front: "Почему тест без assert опасен?"
    back: "Строка вроде «cart.shipping_cost() == 0» вычисляет True или False и тут же его выбрасывает, падать нечему. Тест всегда зелёный, даже если код вернёт неверное значение, и создаёт ложное чувство защищённости."
    tags: [testing]
  - id: testing-foundations-11
    front: "Как убедиться, что тесту можно верить?"
    back: "Проверьте, что он умеет краснеть: временно сломайте код и убедитесь, что тест поймал поломку. Тест, который не падал ни разу, подозрителен: возможно, он ничего не проверяет."
    tags: [testing]
  - id: testing-foundations-12
    front: "Почему проверять реализацию вместо поведения плохо?"
    back: "Тест, который заглядывает в приватные поля и считает вызовы внутренних методов, ломается при любом рефакторинге, даже если поведение не изменилось. Проверяйте наблюдаемый результат, а не то, как он получен."
    tags: [testing]
  - id: testing-foundations-13
    front: "В чём идея TDD и цикла red-green-refactor?"
    back: "Тест пишется до реализации. Сначала падающий тест на ещё не существующее поведение (red), затем минимум кода, чтобы он позеленел (green), затем улучшение кода под защитой зелёного теста (refactor). Тест в фазе red заведомо умеет падать."
    tags: [testing]
