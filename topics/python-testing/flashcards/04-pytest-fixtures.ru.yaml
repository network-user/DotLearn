conceptId: pytest-fixtures
cards:
  - id: pytest-fixtures-01
    front: "Что такое фикстура pytest?"
    back: "Именованная заготовка окружения с декоратором @pytest.fixture. Тест запрашивает её, указав имя в своих аргументах; pytest готовит заготовку, передаёт результат и убирает за собой, когда тест закончился."
    tags: [testing, pytest]
  - id: pytest-fixtures-02
    front: "Как тест получает фикстуру и почему это инъекция зависимостей?"
    back: "Тест добавляет аргумент с именем фикстуры, pytest сопоставляет имя, выполняет фикстуру и подставляет возвращённое значение. Тест не создаёт объект сам и не знает, как тот собран, он лишь объявляет, что ему нужно."
    tags: [testing, pytest]
  - id: pytest-fixtures-03
    front: "Платит ли тест за фикстуру, которая ему не нужна?"
    back: "Нет. Тест, которому, например, корзина не нужна, просто не упоминает её в аргументах и не платит за её подготовку. В этом и преимущество перед setUp, который один на класс."
    tags: [testing, pytest]
  - id: pytest-fixtures-04
    front: "Как устроена yield-фикстура?"
    back: "Всё до yield это setup, отданное через yield значение получает тест, а всё после yield это teardown, который pytest выполнит, когда тест отработает. Это аккуратнее setUp/tearDown: setup и teardown ресурса лежат рядом."
    tags: [testing, pytest]
  - id: pytest-fixtures-05
    front: "Какие бывают значения scope у фикстуры?"
    back: "function (по умолчанию, новый экземпляр на каждый тест), class (один на класс), module (один на файл), session (один на весь прогон pytest). Scope задаёт, как часто фикстура готовится и как долго живёт."
    tags: [testing, pytest]
  - id: pytest-fixtures-06
    front: "Какой компромисс у широкого scope?"
    back: "Чем шире scope, тем реже отрабатывает setup (экономия времени), но тем больше тесты делят общий объект, а значит выше риск, что один тест испортит состояние для другого и вернётся зависимость от порядка."
    tags: [testing, pytest]
  - id: pytest-fixtures-07
    front: "Для каких ресурсов можно расширять scope, а для каких нет?"
    back: "Дорогие и только читаемые ресурсы (соединение, конфиг) можно расширять. Изменяемые объекты лучше держать на function, чтобы каждый тест получал чистую копию и не видел чужих мутаций."
    tags: [testing, pytest]
  - id: pytest-fixtures-08
    front: "Зачем нужен conftest.py?"
    back: "Фикстуру, нужную многим файлам, кладут в conftest.py, и pytest делает её доступной всем тестам в этом каталоге и вложенных автоматически, без import. Так команды делятся общим тестовым окружением."
    tags: [testing, pytest]
  - id: pytest-fixtures-09
    front: "Что такое фикстура-фабрика?"
    back: "Фикстура, которая возвращает функцию. Тест получает её и вызывает сам сколько нужно и с какими угодно аргументами, создавая объекты с разными параметрами прямо внутри теста. Фикстура лишь даёт инструмент."
    tags: [testing, pytest]
  - id: pytest-fixtures-10
    front: "Чем параметризованная фикстура (params=[...]) отличается от parametrize?"
    back: "Указав params=[...], вы заставляете pytest прогнать каждый тест, который её просит, по разу на каждое значение (доступ через request.param). Она размножает ВСЕ тесты, что её используют, а не один помеченный."
    tags: [testing, pytest]
  - id: pytest-fixtures-11
    front: "Что дают встроенные фикстуры tmp_path, monkeypatch и capsys?"
    back: "tmp_path даёт уникальный временный каталог (Path), который pytest сам создаст и удалит. monkeypatch временно подменяет атрибуты, переменные окружения и элементы словарей. capsys перехватывает stdout/stderr."
    tags: [testing, pytest]
  - id: pytest-fixtures-12
    front: "Что произойдёт, если фикстура упадёт на этапе setup (до yield)?"
    back: "Тест помечается не как failure, а как error: проверять было нечего, окружение не собралось. Teardown-часть этой фикстуры (код после yield) не выполнится, ведь ресурс не создан, закрывать нечего."
    tags: [testing, pytest]
  - id: pytest-fixtures-13
    front: "Что произойдёт при ошибке «fixture not found»?"
    back: "Имя аргумента в тесте не совпало с именем фикстуры (например, фикстура «cart», а в тесте «card»). Имя аргумента обязано в точности совпадать с именем фикстуры, иначе pytest её не найдёт."
    tags: [testing, pytest]
  - id: pytest-fixtures-14
    front: "Может ли фикстура зависеть от другой фикстуры и каков порядок teardown?"
    back: "Да: фикстура просит другую, указав её в своих аргументах, pytest строит граф зависимостей. Порядок teardown обратный порядку setup (как стек): что создано последним, закрывается первым."
    tags: [testing, pytest]
