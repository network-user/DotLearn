conceptId: pytest-basics
cards:
  - id: pytest-basics-01
    front: "What is assert introspection in pytest?"
    back: "On import, pytest rewrites the test's bytecode, embedding collection of intermediate values into every assert. So on failure, 'assert x == y' prints what the operands equaled, like assertEqual."
    tags: [testing, pytest]
  - id: pytest-basics-02
    front: "What does a test look like in pytest?"
    back: "It's just a function whose name starts with 'test_', with a plain assert statement inside. No class, inheritance, or self.assert. For example: 'def test_x(): assert shipping_cost(3500) == 0'."
    tags: [testing, pytest]
  - id: pytest-basics-03
    front: "What is a node id, and how do you run one specific test?"
    back: "A node id is a path shaped like 'file::function', e.g. 'tests/test_cart.py::test_total'. It runs exactly that one test. Discovery in pytest finds test_*.py files and test_* functions itself."
    tags: [testing, pytest]
  - id: pytest-basics-04
    front: "What do the -k and -m flags do when running pytest?"
    back: "-k takes a boolean expression over substrings of the name (and, or, not), e.g. 'total and not refund'. -m selects tests with a given marker, e.g. 'pytest -m slow'. -k is not a regex."
    tags: [testing, pytest]
  - id: pytest-basics-05
    front: "What does @pytest.mark.parametrize do?"
    back: "It multiplies a single test: you list argument sets, and pytest spawns a separate independent test case for each one. It is the main tool against duplication in tests."
    tags: [testing, pytest]
  - id: pytest-basics-06
    front: "Is a parametrized test a single test with a loop inside?"
    back: "No, it is N independent test cases. If one set fails, the rest still run and show up in the report. You immediately see which specific input broke, not just 'failed somewhere inside'."
    tags: [testing, pytest]
  - id: pytest-basics-07
    front: "What is a marker in pytest?"
    back: "A tag on a test via the @pytest.mark.<name> decorator. Some markers are built in and change behavior (skip, xfail), others you define yourself for grouping (slow) and filter runs with -m."
    tags: [testing, pytest]
  - id: pytest-basics-08
    front: "How does skip differ from skipif?"
    back: "@pytest.mark.skip(reason=...) unconditionally skips the test. @pytest.mark.skipif(condition, reason=...) skips only when the condition is true, e.g. on an unsupported Python version or OS."
    tags: [testing, pytest]
  - id: pytest-basics-09
    front: "What does @pytest.mark.xfail do, and what is xpass?"
    back: "xfail marks a test as expected to fail: its failure does not turn the run red (it shows as xfail). But if the test unexpectedly passes, pytest flags it xpass, hinting the bug may be fixed and the marker should be removed."
    tags: [testing, pytest]
  - id: pytest-basics-10
    front: "How do you check an exception and its message in pytest?"
    back: "With the context manager 'with pytest.raises(ValueError)': the block inside must raise the exception. The match argument takes a regex against the message, and 'as' gives access to the exception itself."
    tags: [testing, pytest]
  - id: pytest-basics-11
    front: "Why is it risky to pass one shared mutable object into parametrize?"
    back: "Parametrize does not copy objects; it passes exactly what is written in the list. The cases share one reference: the first changes the object, the second gets it already changed and fails. Use fresh literals instead."
    tags: [testing, pytest]
  - id: pytest-basics-12
    front: "How does pytest pick up a class with tests, and what is the common mistake?"
    back: "pytest picks up a class only if its name starts with 'Test' and it has no __init__. Otherwise the tests inside silently never run. Either name the class TestCart, or write functions without a class."
    tags: [testing, pytest]
  - id: pytest-basics-13
    front: "Why is xfail better than skip for a known bug?"
    back: "A forgotten @pytest.mark.skip after a fix leaves the check silently disabled for months. xfail reminds you itself: once the bug is fixed, the test becomes xpass and draws attention."
    tags: [testing, pytest]
