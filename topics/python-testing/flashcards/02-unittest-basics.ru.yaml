conceptId: unittest-basics
cards:
  - id: unittest-basics-01
    front: "Что особенного у модуля unittest по доступности?"
    back: "Он входит в стандартную библиотеку Python, его не нужно устанавливать. Это первый тест-фреймворк, который вы встретите в любом проекте, потому что он есть всегда. Родом из семейства xUnit."
    tags: [testing]
  - id: unittest-basics-02
    front: "Как unittest определяет, что метод является тестом?"
    back: "Тесты группируются в класс-наследник unittest.TestCase. Каждый метод, чьё имя начинается с «test», фреймворк считает отдельным тестом и запускает изолированно. Методы с другими именами тестами не считаются."
    tags: [testing]
  - id: unittest-basics-03
    front: "Почему в unittest проверяют через self.assertEqual, а не голым assert?"
    back: "Ради информативной обратной связи: при провале assertEqual(a, b) покажет оба значения (что получили и что ожидали), а простой assert a == b скажет лишь «ложь». Ради этого xUnit завёл десятки assert-методов."
    tags: [testing]
  - id: unittest-basics-04
    front: "Что проверяют assertEqual, assertTrue/assertFalse, assertIn?"
    back: "assertEqual(a, b) проверяет равенство и печатает оба операнда. assertTrue(x)/assertFalse(x) проверяют истинность значения. assertIn(item, container) проверяет вхождение, удобно для списков, строк и словарей."
    tags: [testing]
  - id: unittest-basics-05
    front: "Зачем нужен assertAlmostEqual и почему нельзя сравнивать float через assertEqual?"
    back: "Число с плавающей точкой хранится приближённо, поэтому 0.1 + 0.2 не равно 0.3. assertAlmostEqual сравнивает не на строгое равенство, а с округлением (по умолчанию до 7 знаков после запятой)."
    tags: [testing]
  - id: unittest-basics-06
    front: "Как проверить, что код возбуждает нужное исключение?"
    back: "Через assertRaises как контекстный менеджер: блок внутри «with self.assertRaises(ValueError)» обязан возбудить указанный класс ошибки, иначе тест падает. Чище ручного try/except с флажком."
    tags: [testing]
  - id: unittest-basics-07
    front: "Что делают setUp и tearDown?"
    back: "Фреймворк вызывает setUp перед каждым test-методом (подготовка), а tearDown после каждого (уборка). setUp отрабатывает заново для каждого теста, поэтому объекты в нём свежие, что даёт изоляцию."
    tags: [testing]
  - id: unittest-basics-08
    front: "Чем setUpClass/tearDownClass отличаются от setUp/tearDown?"
    back: "Они выполняются один раз на весь класс (до первого теста и после последнего), а не вокруг каждого. Их берут для дорогой подготовки (поднять соединение, загрузить большой файл) и помечают @classmethod."
    tags: [testing]
  - id: unittest-basics-09
    front: "Что такое discovery в unittest и как его запустить?"
    back: "Команда «python -m unittest» сама обходит каталог, находит файлы вида test_*.py, в них классы-наследники TestCase, а в них методы test_*, и запускает всё это. Запуск можно сузить путём через точку."
    tags: [testing]
  - id: unittest-basics-10
    front: "Чем отличаются failure (F) и error (E) в отчёте unittest?"
    back: "Failure означает, что код работает, но не так, как ожидает тест (не сошёлся assert). Error означает, что код вообще сломался по пути (упало неожиданное исключение). Точка в отчёте это пройденный тест."
    tags: [testing]
  - id: unittest-basics-11
    front: "Как правильно временно отключить тест и почему не стоит его комментировать?"
    back: "Закомментированный тест молча исчезает из отчёта. Вместо этого его помечают @unittest.skip(\"причина\"), тогда он виден как пропущенный (s) и причина известна. Есть условный @unittest.skipIf(условие, \"причина\")."
    tags: [testing]
  - id: unittest-basics-12
    front: "Вызывается ли tearDown, если тест упал? А если упал setUp?"
    back: "Если test-метод упал на assert или выбросил исключение, tearDown всё равно вызывается, чтобы убрать мусор. Но если упал сам setUp, test-метод не запускается и tearDown не вызывается: готовить было нечего."
    tags: [testing]
  - id: unittest-basics-13
    front: "Почему подготовку данных нельзя класть в __init__ вместо setUp?"
    back: "unittest создаёт отдельный экземпляр под каждый тест и не гарантирует поведение, на которое вы рассчитываете в конструкторе. Вся подготовка должна жить в setUp, а уборка в tearDown."
    tags: [testing]
