conceptId: mocking-and-isolation
cards:
  - id: mocking-and-isolation-01
    front: "Зачем нужна изоляция внешних зависимостей в unit-тесте?"
    back: "Чтобы тест был быстрым, детерминированным и проверял только вашу логику. Реальные сеть, БД и часы делают тест медленным, зависящим от времени и мигающим по чужой вине вместо проверки одной функции."
    tags: [testing]
  - id: mocking-and-isolation-02
    front: "В чём ментальная модель подмены зависимости?"
    back: "Код общается с внешним миром через границу (вызов функции, метод). Вы перехватываете этот вызов и подсовываете управляемую подделку. Код зовёт то же имя, получает «правильный» ответ и не замечает разницы."
    tags: [testing]
  - id: mocking-and-isolation-03
    front: "Что такое Mock и как он себя ведёт?"
    back: "Объект из unittest.mock, который покорно соглашается на любое обращение: вызов вернёт новый Mock, обращение к любому атрибуту вернёт Mock. Он не возбуждает ошибок на незнакомые методы, поэтому им удобно подменять что угодно."
    tags: [testing]
  - id: mocking-and-isolation-04
    front: "Чем MagicMock отличается от Mock?"
    back: "MagicMock это тот же Mock, но дополнительно поддерживает «магические» dunder-методы (__len__, __iter__, __getitem__). Поэтому его можно использовать там, где код ждёт список, итератор или контекстный менеджер. patch по умолчанию подставляет MagicMock."
    tags: [testing]
  - id: mocking-and-isolation-05
    front: "Что делает return_value у мока?"
    back: "Задаёт конкретный ответ, который мок отдаёт на вызов. Например service.get_price.return_value = 500, и тогда get_price с любыми аргументами вернёт 500. Без него голый мок возвращает на вызов новый мок."
    tags: [testing]
  - id: mocking-and-isolation-06
    front: "Какие три режима у side_effect мока?"
    back: "Список (или итератор) отдаёт значения по очереди при каждом вызове. Класс исключения или его экземпляр возбуждается при вызове (имитация сбоя). Функция вызывается с теми же аргументами, и мок возвращает её результат."
    tags: [testing]
  - id: mocking-and-isolation-07
    front: "Когда брать side_effect-список вместо return_value?"
    back: "Когда повторные вызовы должны вернуть разное, например при опросе статуса: сначала «pending», потом «done». return_value отдаёт одно и то же на каждый вызов, поэтому для серии разных ответов он не подходит."
    tags: [testing]
  - id: mocking-and-isolation-08
    front: "Что проверяет assert_called_once_with?"
    back: "Утверждает, что мок вызвали ровно один раз и именно с этими аргументами. Это проверка взаимодействия: вас интересует не возвращённое значение, а факт, что код правильно дёрнул зависимость."
    tags: [testing]
  - id: mocking-and-isolation-09
    front: "Чем assert_called_once_with отличается от assert_called_with и assert_not_called?"
    back: "assert_called_once_with требует ровно одного вызова с заданными аргументами. assert_called_with проверяет, что таким был последний вызов. assert_not_called проверяет, что мок не вызывали вовсе. Число вызовов лежит в call_count."
    tags: [testing]
  - id: mocking-and-isolation-10
    front: "Главное правило patch: где патчить имя?"
    back: "«Patch where it's looked up, not where it's defined»: патчить нужно там, где имя ИЩУТ (в модуле-потребителе), а не там, где оно определено. Это причина номер один, почему «мок не срабатывает»."
    tags: [testing]
  - id: mocking-and-isolation-11
    front: "Почему «from services import get_time» меняет, что именно патчить?"
    back: "После этого импорта модуль report завёл собственную ссылку report.get_time. Патч services.get_time пройдёт мимо: report.get_time останется смотреть на оригинал. Патчить надо report.get_time."
    tags: [testing]
  - id: mocking-and-isolation-12
    front: "Что такое фикстура monkeypatch и чем она удобна?"
    back: "Встроенная фикстура pytest, делающая то же, что patch, но откатывающая изменения автоматически после теста, без with. У неё setattr, setenv/delenv и setitem. Правило «где ищут» действует и здесь."
    tags: [testing, pytest]
  - id: mocking-and-isolation-13
    front: "Чем различаются mock, stub и fake?"
    back: "Stub просто возвращает заранее заданный ответ и кормит им код. Mock дополнительно запоминает вызовы, и тест проверяет взаимодействие. Fake это упрощённая рабочая реализация (репозиторий на dict вместо БД), реально хранящая данные."
    tags: [testing]
  - id: mocking-and-isolation-14
    front: "Как сделать тест с datetime.now() повторяемым?"
    back: "Заморозить время. Простой способ: подменить функцию-источник через monkeypatch (помня про «где ищут»). Для сложных случаев берут библиотеку freezegun с @freeze_time(\"2026-01-01\"), которая подменяет весь datetime целиком."
    tags: [testing]
  - id: mocking-and-isolation-15
    front: "Почему опечатка в имени метода мока не всплывает и чем помогает autospec?"
    back: "Голый мок подыгрывает любому обращению, поэтому sender.sedn(...) вернёт мок и тест позеленеет, а в продакшене будет AttributeError. autospec создаёт мок по реальному интерфейсу, и обращение к несуществующему методу сразу падает."
    tags: [testing]
