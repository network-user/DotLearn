conceptId: unittest-basics
cards:
  - id: unittest-basics-01
    front: "What is special about the unittest module's availability?"
    back: "It is part of the Python standard library, so nothing needs to be installed. It is the first test framework you will meet in any project, because it is always there. It comes from the xUnit family."
    tags: [testing]
  - id: unittest-basics-02
    front: "How does unittest decide a method is a test?"
    back: "Tests are grouped into a class inheriting from unittest.TestCase. Every method whose name starts with 'test' is treated as a separate test and run in isolation. Methods with other names do not count as tests."
    tags: [testing]
  - id: unittest-basics-03
    front: "Why does unittest use self.assertEqual instead of a plain assert?"
    back: "For informative feedback: on failure, assertEqual(a, b) shows both values (what you got and what you expected), while a plain assert a == b only says 'false'. That is why xUnit grew dozens of assert methods."
    tags: [testing]
  - id: unittest-basics-04
    front: "What do assertEqual, assertTrue/assertFalse, and assertIn check?"
    back: "assertEqual(a, b) checks equality and prints both operands. assertTrue(x)/assertFalse(x) check truthiness. assertIn(item, container) checks membership, handy for lists, strings, and dicts."
    tags: [testing]
  - id: unittest-basics-05
    front: "Why do you need assertAlmostEqual, and why can't you compare floats with assertEqual?"
    back: "A floating-point number is stored approximately, so 0.1 + 0.2 does not equal 0.3. assertAlmostEqual does not compare for strict equality but with rounding (7 decimal places by default)."
    tags: [testing]
  - id: unittest-basics-06
    front: "How do you check that code raises the right exception?"
    back: "Via assertRaises as a context manager: the block inside 'with self.assertRaises(ValueError)' must raise the given error class, or the test fails. Cleaner than a manual try/except with a flag."
    tags: [testing]
  - id: unittest-basics-07
    front: "What do setUp and tearDown do?"
    back: "The framework calls setUp before every test method (preparation) and tearDown after every one (cleanup). setUp runs anew for each test, so its objects are fresh - that is what gives isolation."
    tags: [testing]
  - id: unittest-basics-08
    front: "How do setUpClass/tearDownClass differ from setUp/tearDown?"
    back: "They run once for the whole class (before the first test and after the last), not around every test. They are used for expensive setup (opening a connection, loading a big file) and are marked @classmethod."
    tags: [testing]
  - id: unittest-basics-09
    front: "What is discovery in unittest, and how do you run it?"
    back: "The command 'python -m unittest' walks the directory itself, finds files shaped test_*.py, TestCase-subclass classes inside them, and test_* methods within those, and runs all of it. You can narrow the run via a dotted path."
    tags: [testing]
  - id: unittest-basics-10
    front: "How do failure (F) and error (E) differ in a unittest report?"
    back: "Failure means the code ran but not as the test expected (an assert did not hold). Error means the code broke along the way (an unexpected exception was raised). A dot in the report means a passing test."
    tags: [testing]
  - id: unittest-basics-11
    front: "How do you properly disable a test temporarily, and why not just comment it out?"
    back: "A commented-out test silently disappears from the report. Instead, mark it @unittest.skip(\"reason\"), so it shows up as skipped (s) with a known reason. There is also a conditional @unittest.skipIf(condition, \"reason\")."
    tags: [testing]
  - id: unittest-basics-12
    front: "Is tearDown called if a test fails? What if setUp fails?"
    back: "If a test method fails on an assert or raises an exception, tearDown is still called to clean up. But if setUp itself fails, the test method does not run and tearDown is not called: there was nothing to clean up."
    tags: [testing]
  - id: unittest-basics-13
    front: "Why can't you put data setup in __init__ instead of setUp?"
    back: "unittest creates a separate instance for each test and does not guarantee the behavior you might expect from a constructor. All setup must live in setUp, and cleanup in tearDown."
    tags: [testing]
