conceptId: pytest-basics
cards:
  - id: pytest-basics-01
    front: "Что такое assert introspection (интроспекция assert) в pytest?"
    back: "pytest на этапе импорта переписывает байт-код тестов, встраивая в каждый assert сбор промежуточных значений. Поэтому при провале «assert x == y» он печатает, чему равнялись операнды, как assertEqual."
    tags: [testing, pytest]
  - id: pytest-basics-02
    front: "Как выглядит тест в pytest?"
    back: "Это просто функция, имя которой начинается с «test_», с обычным оператором assert внутри. Никакого класса, наследования или self.assert. Например: «def test_x(): assert shipping_cost(3500) == 0»."
    tags: [testing, pytest]
  - id: pytest-basics-03
    front: "Что такое node id и как запустить один конкретный тест?"
    back: "Node id это путь вида «файл::функция», например «tests/test_cart.py::test_total». По нему запускают ровно один тест. Discovery в pytest сам находит файлы test_*.py и функции test_*."
    tags: [testing, pytest]
  - id: pytest-basics-04
    front: "Что делают флаги -k и -m при запуске pytest?"
    back: "-k принимает булево выражение по подстроке имени (and, or, not), например «total and not refund». -m выбирает тесты с заданным маркером, например «pytest -m slow». -k это не регулярка."
    tags: [testing, pytest]
  - id: pytest-basics-05
    front: "Что делает @pytest.mark.parametrize?"
    back: "Размножает один тест: вы перечисляете наборы аргументов, и pytest порождает по отдельному независимому тест-кейсу на каждый. Это главный приём против дублирования в тестах."
    tags: [testing, pytest]
  - id: pytest-basics-06
    front: "Параметризованный тест это один тест с циклом внутри?"
    back: "Нет, это N независимых тест-кейсов. Если один набор упадёт, остальные всё равно отработают и попадут в отчёт. Вы сразу видите, какой именно вход сломался, а не «упало где-то внутри»."
    tags: [testing, pytest]
  - id: pytest-basics-07
    front: "Что такое маркер в pytest?"
    back: "Ярлык на тесте через декоратор @pytest.mark.<имя>. Часть маркеров встроена и меняет поведение (skip, xfail), часть вы заводите сами для группировки (slow) и фильтруете ими запуск через -m."
    tags: [testing, pytest]
  - id: pytest-basics-08
    front: "Чем skip отличается от skipif?"
    back: "@pytest.mark.skip(reason=...) безусловно пропускает тест. @pytest.mark.skipif(условие, reason=...) пропускает только когда условие истинно, например на неподходящей версии Python или ОС."
    tags: [testing, pytest]
  - id: pytest-basics-09
    front: "Что делает @pytest.mark.xfail и что такое xpass?"
    back: "xfail помечает тест как ожидаемо падающий: его падение не красит прогон в красный (в отчёте xfail). Но если тест внезапно пройдёт, pytest отметит xpass, намекая, что баг починен и метку пора снять."
    tags: [testing, pytest]
  - id: pytest-basics-10
    front: "Как проверить исключение и его текст в pytest?"
    back: "Контекстным менеджером «with pytest.raises(ValueError)»: блок внутри обязан возбудить исключение. Аргумент match задаёт регулярку по сообщению, а «as» даёт доступ к самому исключению."
    tags: [testing, pytest]
  - id: pytest-basics-11
    front: "Почему опасно передавать в параметризацию один общий изменяемый объект?"
    back: "Параметризация не копирует объекты, а передаёт ровно то, что вписано в список. Кейсы будут делить одну ссылку: первый изменит объект, второй получит его уже изменённым и упадёт. Кладите свежие литералы."
    tags: [testing, pytest]
  - id: pytest-basics-12
    front: "Как pytest подбирает класс с тестами и в чём частая ошибка?"
    back: "pytest подберёт класс, только если его имя начинается с «Test» и у него нет __init__. Иначе тесты внутри молча не запустятся. Либо назовите класс TestCart, либо пишите функции без класса."
    tags: [testing, pytest]
  - id: pytest-basics-13
    front: "Почему для известного бага лучше xfail, чем skip?"
    back: "Забытый @pytest.mark.skip после фикса оставит проверку молча выключенной на месяцы. xfail сам напомнит: когда баг починят, тест станет xpass и обратит на себя внимание."
    tags: [testing, pytest]
