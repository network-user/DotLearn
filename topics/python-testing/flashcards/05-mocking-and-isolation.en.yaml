conceptId: mocking-and-isolation
cards:
  - id: mocking-and-isolation-01
    front: "Why do you need to isolate external dependencies in a unit test?"
    back: "So the test is fast, deterministic, and checks only your logic. Real networks, databases, and clocks make a test slow, time-dependent, and flaky through no fault of the function you're actually testing."
    tags: [testing]
  - id: mocking-and-isolation-02
    front: "What is the mental model for replacing a dependency?"
    back: "Code talks to the outside world through a boundary (a function call, a method). You intercept that call and hand it a controlled fake instead. The code calls the same name, gets the 'right' answer, and does not notice the difference."
    tags: [testing]
  - id: mocking-and-isolation-03
    front: "What is a Mock, and how does it behave?"
    back: "An object from unittest.mock that obligingly goes along with any interaction: calling it returns a new Mock, accessing any attribute returns a Mock. It never raises errors on unknown methods, which makes it convenient for replacing almost anything."
    tags: [testing]
  - id: mocking-and-isolation-04
    front: "How does MagicMock differ from Mock?"
    back: "MagicMock is the same as Mock but additionally supports 'magic' dunder methods (__len__, __iter__, __getitem__). So it can be used wherever code expects a list, an iterator, or a context manager. patch uses MagicMock by default."
    tags: [testing]
  - id: mocking-and-isolation-05
    front: "What does return_value do on a mock?"
    back: "It sets a specific answer the mock returns on a call. For example, service.get_price.return_value = 500, so get_price returns 500 for any arguments. Without it, a plain mock returns a new mock on each call."
    tags: [testing]
  - id: mocking-and-isolation-06
    front: "What are the three modes of a mock's side_effect?"
    back: "A list (or iterator) returns values one by one on each call. An exception class or instance is raised on call (simulating a failure). A function is called with the same arguments, and the mock returns its result."
    tags: [testing]
  - id: mocking-and-isolation-07
    front: "When do you use a side_effect list instead of return_value?"
    back: "When repeated calls need to return different things, e.g. when polling status: first 'pending', then 'done'. return_value returns the same thing every call, so it does not fit a series of different answers."
    tags: [testing]
  - id: mocking-and-isolation-08
    front: "What does assert_called_once_with check?"
    back: "It asserts the mock was called exactly once, and with exactly these arguments. This checks interaction: you care not about the returned value but about the fact that the code correctly invoked the dependency."
    tags: [testing]
  - id: mocking-and-isolation-09
    front: "How does assert_called_once_with differ from assert_called_with and assert_not_called?"
    back: "assert_called_once_with requires exactly one call with the given arguments. assert_called_with checks that the last call matched. assert_not_called checks the mock was never called at all. The call count lives in call_count."
    tags: [testing]
  - id: mocking-and-isolation-10
    front: "What is patch's main rule: where do you patch the name?"
    back: "'Patch where it's looked up, not where it's defined': you must patch where the name is LOOKED UP (in the consuming module), not where it is defined. This is reason number one for 'the mock isn't working'."
    tags: [testing]
  - id: mocking-and-isolation-11
    front: "Why does 'from services import get_time' change what you should patch?"
    back: "After that import, the report module has its own reference report.get_time. Patching services.get_time misses the mark: report.get_time still points at the original. You need to patch report.get_time."
    tags: [testing]
  - id: mocking-and-isolation-12
    front: "What is the monkeypatch fixture, and why is it convenient?"
    back: "A built-in pytest fixture that does the same thing as patch, but automatically undoes changes after the test, with no with block. It has setattr, setenv/delenv, and setitem. The 'where it's looked up' rule applies here too."
    tags: [testing, pytest]
  - id: mocking-and-isolation-13
    front: "How do mock, stub, and fake differ?"
    back: "A stub simply returns a preset answer and feeds it to the code. A mock additionally records calls, and the test checks the interaction. A fake is a simplified working implementation (a dict-backed repository instead of a database) that actually stores data."
    tags: [testing]
  - id: mocking-and-isolation-14
    front: "How do you make a test with datetime.now() repeatable?"
    back: "Freeze time. A simple way: replace the source function via monkeypatch (remembering 'where it's looked up'). For harder cases, use the freezegun library with @freeze_time(\"2026-01-01\"), which replaces datetime entirely."
    tags: [testing]
  - id: mocking-and-isolation-15
    front: "Why doesn't a typo in a mock's method name surface, and how does autospec help?"
    back: "A plain mock goes along with any interaction, so sender.sedn(...) returns a mock and the test goes green, while production throws an AttributeError. autospec builds a mock from the real interface, so accessing a nonexistent method fails right away."
    tags: [testing]
