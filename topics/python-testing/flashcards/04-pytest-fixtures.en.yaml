conceptId: pytest-fixtures
cards:
  - id: pytest-fixtures-01
    front: "What is a pytest fixture?"
    back: "A named piece of prepared environment with the @pytest.fixture decorator. A test requests it by naming it in its arguments; pytest builds it, passes the result in, and cleans up after the test finishes."
    tags: [testing, pytest]
  - id: pytest-fixtures-02
    front: "How does a test get a fixture, and why is this dependency injection?"
    back: "The test adds an argument named after the fixture, pytest matches the name, runs the fixture, and injects the returned value. The test does not build the object itself and does not know how it is assembled - it just declares what it needs."
    tags: [testing, pytest]
  - id: pytest-fixtures-03
    front: "Does a test pay for a fixture it does not need?"
    back: "No. A test that, say, does not need a cart simply does not mention it in its arguments and does not pay for its setup. That is the advantage over setUp, which is one per class."
    tags: [testing, pytest]
  - id: pytest-fixtures-04
    front: "How is a yield fixture structured?"
    back: "Everything before yield is setup, the value yielded goes to the test, and everything after yield is teardown, which pytest runs once the test finishes. This is neater than setUp/tearDown: a resource's setup and teardown sit side by side."
    tags: [testing, pytest]
  - id: pytest-fixtures-05
    front: "What scope values can a fixture have?"
    back: "function (default, a new instance per test), class (one per class), module (one per file), session (one for the whole pytest run). Scope sets how often the fixture is built and how long it lives."
    tags: [testing, pytest]
  - id: pytest-fixtures-06
    front: "What is the tradeoff of a wide scope?"
    back: "The wider the scope, the less often setup runs (saving time), but the more tests share the same object, raising the risk that one test corrupts state for another, bringing back dependence on run order."
    tags: [testing, pytest]
  - id: pytest-fixtures-07
    front: "Which resources can have their scope widened, and which cannot?"
    back: "Expensive, read-only resources (a connection, a config) can be widened. Mutable objects are better kept at function scope, so every test gets a clean copy and does not see another test's mutations."
    tags: [testing, pytest]
  - id: pytest-fixtures-08
    front: "Why do you need conftest.py?"
    back: "A fixture needed by many files is put in conftest.py, and pytest makes it available to every test in that directory and below automatically, with no import. This is how a team shares a common test environment."
    tags: [testing, pytest]
  - id: pytest-fixtures-09
    front: "What is a factory fixture?"
    back: "A fixture that returns a function. The test receives it and calls it itself as many times and with whatever arguments it needs, creating objects with different parameters right inside the test. The fixture just hands over the tool."
    tags: [testing, pytest]
  - id: pytest-fixtures-10
    front: "How does a parametrized fixture (params=[...]) differ from parametrize?"
    back: "Setting params=[...] makes pytest run every test that requests it once per value (accessed via request.param). It multiplies ALL tests that use it, not just one marked test."
    tags: [testing, pytest]
  - id: pytest-fixtures-11
    front: "What do the built-in fixtures tmp_path, monkeypatch, and capsys give you?"
    back: "tmp_path gives a unique temporary directory (Path) that pytest creates and removes itself. monkeypatch temporarily swaps attributes, environment variables, and dict items. capsys captures stdout/stderr."
    tags: [testing, pytest]
  - id: pytest-fixtures-12
    front: "What happens if a fixture fails during setup (before yield)?"
    back: "The test is marked not as a failure but as an error: there was nothing to check, the environment never got built. The teardown part of that fixture (code after yield) does not run, since the resource was never created, so there is nothing to close."
    tags: [testing, pytest]
  - id: pytest-fixtures-13
    front: "What happens with a 'fixture not found' error?"
    back: "The argument name in the test did not match the fixture's name (for example, the fixture is 'cart' but the test has 'card'). The argument name must exactly match the fixture's name, or pytest will not find it."
    tags: [testing, pytest]
  - id: pytest-fixtures-14
    front: "Can a fixture depend on another fixture, and what is the teardown order?"
    back: "Yes: a fixture requests another by naming it in its own arguments, and pytest builds a dependency graph. Teardown order is the reverse of setup order (like a stack): whatever was created last is closed first."
    tags: [testing, pytest]
