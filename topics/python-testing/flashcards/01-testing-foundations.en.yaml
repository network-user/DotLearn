conceptId: testing-foundations
cards:
  - id: testing-foundations-01
    front: "What is an automated test, at its core?"
    back: "A small program that runs your code with a specific input and checks that the result is exactly what was intended. A thousand such checks run in a fraction of a second."
    tags: [testing]
  - id: testing-foundations-02
    front: "Three reasons why tests pay off"
    back: "Fast feedback (learn whether it works in seconds), protection from regressions (fail as soon as a new change breaks old behavior), and executable specification (a well-named test describes what the code must do)."
    tags: [testing]
  - id: testing-foundations-03
    front: "What is a regression?"
    back: "It is when a new change breaks something that used to work. A test on the old behavior fails the very second you accidentally break it, and shows where. Without tests, the user finds the regression."
    tags: [testing]
  - id: testing-foundations-04
    front: "How is the testing pyramid shaped, and what is the point of its proportions?"
    back: "At the base, many fast isolated unit tests; in the middle, fewer integration tests; at the top, very few slow e2e tests. The higher a test sits, the more expensive to maintain and slower it is, so you rely on a cheap, fast base."
    tags: [testing]
  - id: testing-foundations-05
    front: "How does a unit test differ from an integration test and an e2e test?"
    back: "Unit checks one unit (a function, a method, a class) in isolation. Integration checks that several parts work together (code and a real database). E2e drives the whole scenario through the real interface, like a live user."
    tags: [testing]
  - id: testing-foundations-06
    front: "What three steps make up any meaningful test (the AAA pattern)?"
    back: "Arrange (prepare data and environment), Act (perform exactly one action under test), Assert (compare the result with the expectation). In the behavioral style this is Given-When-Then."
    tags: [testing]
  - id: testing-foundations-07
    front: "What does the assert statement do in Python?"
    back: "'I assert this condition is true': if the condition is true, nothing happens; if false, an AssertionError is raised and the test is considered failed. The whole checking mechanism is built on it."
    tags: [testing]
  - id: testing-foundations-08
    front: "What four properties does a good unit test have?"
    back: "Fast (milliseconds), isolated (does not depend on other tests or run order), deterministic (same verdict on the same code), and single-cause-of-failure (checks one thing)."
    tags: [testing]
  - id: testing-foundations-09
    front: "What is a flaky test, and why is it useless?"
    back: "A 'flickering' test: on the same code it is sometimes green, sometimes red, with no changes. People stop trusting it, so it stops doing its job."
    tags: [testing]
  - id: testing-foundations-10
    front: "Why is a test with no assert dangerous?"
    back: "A line like 'cart.shipping_cost() == 0' computes True or False and immediately discards it - there is nothing to fail. The test is always green even if the code returns the wrong value, creating a false sense of safety."
    tags: [testing]
  - id: testing-foundations-11
    front: "How do you make sure a test can be trusted?"
    back: "Check that it can go red: temporarily break the code and confirm the test catches the break. A test that has never failed is suspicious - it may not be checking anything."
    tags: [testing]
  - id: testing-foundations-12
    front: "Why is testing the implementation instead of the behavior bad?"
    back: "A test that peeks into private fields and counts calls to internal methods breaks on any refactor, even if behavior did not change. Check the observable result, not how it was produced."
    tags: [testing]
  - id: testing-foundations-13
    front: "What is the idea behind TDD and the red-green-refactor cycle?"
    back: "The test is written before the implementation. First a failing test for behavior that does not exist yet (red), then the minimum code to make it pass (green), then improve the code under the protection of a green test (refactor). In the red phase, the test is proven able to fail."
    tags: [testing]
