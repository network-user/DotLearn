exercises:
  - id: unittest-basics-assert-method-001
    concept: unittest-basics
    type: theory-quiz
    difficulty: 1
    prompt: "Нужно проверить, что вызов `withdraw(-100)` возбуждает `ValueError`. Какой инструмент unittest для этого предназначен?"
    choices:
      - id: a
        text: "`with self.assertRaises(ValueError):` и вызов внутри блока - тест пройдёт, только если возникнет именно это исключение."
      - id: b
        text: "`self.assertEqual(withdraw(-100), ValueError)` - сравнить результат с классом исключения."
      - id: c
        text: "`self.assertTrue(withdraw(-100))` - проверить, что вызов истинный."
      - id: d
        text: "Обычный `try/except` без assert-методов, и больше ничего не нужно."
    correct: [a]
    explanation: "`assertRaises` используют как контекстный менеджер: блок внутри `with` обязан возбудить указанный класс исключения, иначе тест падает. `assertEqual` тут бесполезен - до сравнения дело не дойдёт, исключение прервёт вызов."
    variants:
      - prompt: "Нужно сравнить дробный результат `0.1 + 0.2` с `0.3`. Какой assert-метод корректен?"
        choices:
          - id: a
            text: "`assertAlmostEqual` - он сравнивает float с округлением (по умолчанию до 7 знаков), обходя погрешность двоичного представления."
          - id: b
            text: "`assertEqual` - дробные числа сравниваются точно так же, как целые."
          - id: c
            text: "`assertIn` - проверить, что одно число входит в другое."
          - id: d
            text: "`assertTrue` - проверить, что сумма вообще не ноль."
        correct: [a]
        explanation: "`0.1 + 0.2` хранится приближённо и не равно `0.3` побитово, поэтому `assertEqual` упадёт. `assertAlmostEqual` сравнивает с округлением и проходит."
      - prompt: "Нужно проверить, что строка «Анна» присутствует в списке имён. Какой assert-метод самый уместный?"
        choices:
          - id: a
            text: "`assertIn(\"Анна\", names)` - он проверяет вхождение элемента в контейнер."
          - id: b
            text: "`assertEqual(\"Анна\", names)` - сравнить строку со всем списком целиком."
          - id: c
            text: "`assertRaises(\"Анна\")` - возбудить имя как исключение."
          - id: d
            text: "`assertAlmostEqual(\"Анна\", names)` - сравнить с округлением."
        correct: [a]
        explanation: "`assertIn(item, container)` проверяет вхождение и при провале покажет и искомый элемент, и контейнер. `assertEqual` сравнил бы строку со всем списком и всегда был бы ложным."

  - id: unittest-basics-lifecycle-quiz-001
    concept: unittest-basics
    type: theory-quiz
    difficulty: 2
    prompt: "Чем `setUp` отличается от `setUpClass` по числу вызовов?"
    choices:
      - id: a
        text: "`setUp` вызывается перед каждым test-методом, а `setUpClass` - один раз на весь класс, до первого теста."
      - id: b
        text: "`setUp` вызывается один раз на класс, а `setUpClass` - перед каждым тестом."
      - id: c
        text: "Оба вызываются перед каждым тестом и ничем не отличаются."
      - id: d
        text: "Оба вызываются ровно один раз за весь прогон всех тестов проекта."
    correct: [a]
    explanation: "`setUp`/`tearDown` отрабатывают вокруг каждого test-метода и дают свежее окружение под каждый тест - это и есть изоляция. `setUpClass`/`tearDownClass` выполняются один раз на класс и нужны для дорогой подготовки, которую расточительно повторять."
    variants:
      - prompt: "Тест упал на assert внутри test-метода. Будет ли вызван `tearDown`?"
        choices:
          - id: a
            text: "Да: `tearDown` вызывается после каждого теста независимо от исхода, чтобы уборка прошла даже после падения."
          - id: b
            text: "Нет: при падении теста `tearDown` пропускается, чтобы не затереть следы ошибки."
          - id: c
            text: "Только если в тесте был `try/except` вокруг assert."
          - id: d
            text: "`tearDown` вызывается лишь после самого последнего теста класса."
        correct: [a]
        explanation: "`tearDown` срабатывает даже после провалившегося теста - иначе мусор (открытый файл, незакрытая транзакция) утёк бы в следующий тест. Не вызывается он только если упал сам `setUp`."
      - prompt: "Почему метод с именем `check_total` внутри `TestCase` не запускается как тест?"
        choices:
          - id: a
            text: "Раннер считает тестами только методы с префиксом `test`; всё остальное - вспомогательный код."
          - id: b
            text: "Потому что метод не принимает аргумент `self`."
          - id: c
            text: "Потому что в нём нет ни одного assert-метода."
          - id: d
            text: "Методы запускаются только если перечислить их в `__init__`."
        correct: [a]
        explanation: "`unittest` собирает в тесты лишь методы, чьё имя начинается с `test`. Метод без префикса молча игнорируется - и зелёный прогон создаёт ложное спокойствие, ведь проверка фактически не выполнялась."

  - id: unittest-basics-almost-equal-001
    concept: unittest-basics
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Она моделирует логику `assertAlmostEqual`: сравнение float не напрямую, а после округления до 7 знаков. Печатается результат сравнения."
    snippet: |
      a = 0.1 + 0.2
      b = 0.3
      print(a == b, round(a, 7) == round(b, 7))
    expected:
      kind: stdout
      value: "False True"
    hints:
      - "`0.1 + 0.2` хранится приближённо, поэтому прямое сравнение с `0.3` неверно. Что меняет округление до 7 знаков?"
      - "Первое сравнение - это то, что сделал бы `assertEqual`; второе - то, что делает `assertAlmostEqual`. Округление стирает крошечную погрешность."
    variants:
      - snippet: |
          a = 0.1 + 0.2
          print(round(a, 7))
        expected:
          kind: stdout
          value: "0.3"
      - snippet: |
          a = 0.1 + 0.2
          b = 0.3
          print(round(a - b, 7))
        expected:
          kind: stdout
          value: "0.0"

  - id: unittest-basics-setup-order-001
    concept: unittest-basics
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она моделирует, как unittest зовёт setUp перед каждым тестом: каждый тест начинает с пустого списка, который setUp создаёт заново. Печатаются длины после двух тестов."
    snippet: |
      def setup():
          return ["base"]

      def test_one(items):
          items.append("one")
          return len(items)

      def test_two(items):
          items.append("two")
          return len(items)

      first = test_one(setup())
      second = test_two(setup())
      print(first, second)
    expected:
      kind: stdout
      value: "2 2"
    hints:
      - "`setUp` отрабатывает заново перед каждым тестом, поэтому второй тест не видит изменений первого. С какого состояния стартует каждый из них?"
      - "Каждый вызов `setup()` создаёт новый список из одного элемента. Тест добавляет к нему ещё один - значит, в каждом окажется по два."
    variants:
      - snippet: |
          shared = ["base"]

          def test_one(items):
              items.append("one")
              return len(items)

          def test_two(items):
              items.append("two")
              return len(items)

          first = test_one(shared)
          second = test_two(shared)
          print(first, second)
        expected:
          kind: stdout
          value: "2 3"
      - snippet: |
          def setup():
              return []

          def run(items, name):
              items.append(name)
              return len(items)

          print(run(setup(), "a"), run(setup(), "b"), run(setup(), "c"))
        expected:
          kind: stdout
          value: "1 1 1"

  - id: unittest-basics-collection-challenge-001
    concept: unittest-basics
    type: predict-output
    difficulty: 4
    prompt: "Что выведет программа? Она моделирует discovery: раннер берёт у класса только методы с префиксом `test`. Печатается, сколько имён из списка были бы собраны как тесты."
    snippet: |
      names = [
          "test_total",
          "setUp",
          "test_empty",
          "helper_total",
          "tearDown",
          "test_refund",
          "checkTest",
      ]

      collected = [n for n in names if n.startswith("test")]
      print(len(collected))
    expected:
      kind: stdout
      value: "3"
    hints:
      - "Тестом считается только метод, чьё имя начинается с `test`. Какие из имён в списке пройдут этот фильтр?"
      - "`setUp`, `tearDown`, `helper_total` и `checkTest` не начинаются с `test` - они отсеиваются. Считайте лишь оставшиеся."
      - "`startswith(\"test\")` истинно ровно для трёх имён: `test_total`, `test_empty`, `test_refund`."
