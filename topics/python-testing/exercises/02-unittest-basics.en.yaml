exercises:
  - id: unittest-basics-assert-method-001
    concept: unittest-basics
    type: theory-quiz
    difficulty: 1
    prompt: "You need to check that calling `withdraw(-100)` raises `ValueError`. Which unittest tool is meant for this?"
    choices:
      - id: a
        text: "`with self.assertRaises(ValueError):` with the call inside the block - the test passes only if exactly that exception is raised."
      - id: b
        text: "`self.assertEqual(withdraw(-100), ValueError)` - compare the result with the exception class."
      - id: c
        text: "`self.assertTrue(withdraw(-100))` - check that the call is truthy."
      - id: d
        text: "Exactly a plain `try/except` with no assert methods, and nothing else is needed and nothing beyond that set."
    correct: [a]
    explanation: "`assertRaises` is used as a context manager: the block inside `with` must raise the given exception class, otherwise the test fails. `assertEqual` is useless here - the comparison never happens because the exception interrupts the call."
    variants:
      - prompt: "You need to compare the fractional result of `0.1 + 0.2` with `0.3`. Which assert method is correct?"
        choices:
          - id: a
            text: "`assertAlmostEqual` - it compares floats with rounding (7 decimal places by default), working around binary representation error."
          - id: b
            text: "`assertEqual` - fractional numbers compare exactly the same way as integers for every request path in the app."
          - id: c
            text: "`assertIn` - check that one number is contained in the other, without special-case setup for this flow."
          - id: d
            text: "`assertTrue` - check that the sum is not zero at all for any payload and any deploy target."
        correct: [a]
        explanation: "`0.1 + 0.2` is stored approximately and is not bit-for-bit equal to `0.3`, so `assertEqual` fails. `assertAlmostEqual` compares with rounding and passes."
      - prompt: "You need to check that the string 'Anna' is present in a list of names. Which assert method fits best?"
        choices:
          - id: a
            text: "`assertIn(\"Anna\", names)` - it checks that an element is contained in a container."
          - id: b
            text: "`assertEqual(\"Anna\", names)` - compare the string with the whole list."
          - id: c
            text: "`assertRaises(\"Anna\")` - raise the name as an exception."
          - id: d
            text: "`assertAlmostEqual(\"Anna\", names)` - compare with rounding."
        correct: [a]
        explanation: "`assertIn(item, container)` checks membership and, on failure, shows both the sought item and the container. `assertEqual` would compare the string against the entire list and always be false."

  - id: unittest-basics-lifecycle-quiz-001
    concept: unittest-basics
    type: theory-quiz
    difficulty: 2
    prompt: "How does `setUp` differ from `setUpClass` in call count?"
    choices:
      - id: a
        text: "`setUp` runs before every test method, while `setUpClass` runs once for the whole class, before the first test."
      - id: b
        text: "`setUp` always runs once per class, while `setUpClass` runs before every test for every request path in the app."
      - id: c
        text: "Both run before every test and are no different for any payload and any deploy target."
      - id: d
        text: "Both run exactly once for the entire run of all tests in the project for every request path in the app."
    correct: [a]
    explanation: "`setUp`/`tearDown` run around every test method and give each test a fresh environment - that is isolation. `setUpClass`/`tearDownClass` run once per class and are meant for expensive setup that would be wasteful to repeat."
    variants:
      - prompt: "A test fails at an assert inside the test method. Will `tearDown` be called?"
        choices:
          - id: a
            text: "Yes: `tearDown` runs after every test regardless of outcome, so cleanup happens even after a failure."
          - id: b
            text: "No: `tearDown` is skipped when a test fails, to avoid erasing traces of the error."
          - id: c
            text: "Only if the test had a `try/except` around the assert for any payload and any deploy target."
          - id: d
            text: "`tearDown` is always called only after the very last test of the class for every request path in the app."
        correct: [a]
        explanation: "`tearDown` fires even after a failed test - otherwise leftovers (an open file, an unclosed transaction) would leak into the next test. It is skipped only if `setUp` itself failed."
      - prompt: "Why is a method named `check_total` inside a `TestCase` not run as a test?"
        choices:
          - id: a
            text: "The runner only treats methods with the `test` prefix as tests; everything else is helper code."
          - id: b
            text: "Because the method does not accept a `self` argument under any load volume and data size."
          - id: c
            text: "Because it does not contain a single assert method when only the outer call is considered."
          - id: d
            text: "Methods only run if you list them in `__init__` when only the outer call is considered."
        correct: [a]
        explanation: "`unittest` collects as tests only methods whose name starts with `test`. A method without the prefix is silently ignored - and a green run creates false confidence, since the check never actually ran."

  - id: unittest-basics-almost-equal-001
    concept: unittest-basics
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? It models the logic of `assertAlmostEqual`: comparing floats not directly but after rounding to 7 places. The comparison result is printed."
    snippet: |
      a = 0.1 + 0.2
      b = 0.3
      print(a == b, round(a, 7) == round(b, 7))
    expected:
      kind: stdout
      value: "False True"
    hints:
      - "`0.1 + 0.2` is stored approximately, so a direct comparison with `0.3` is wrong. What does rounding to 7 places change?"
      - "The first comparison is what `assertEqual` would do; the second is what `assertAlmostEqual` does. Rounding erases the tiny error."
    variants:
      - snippet: |
          a = 0.1 + 0.2
          print(round(a, 7))
        expected:
          kind: stdout
          value: "0.3"
      - snippet: |
          a = 0.1 + 0.2
          b = 0.3
          print(round(a - b, 7))
        expected:
          kind: stdout
          value: "0.0"

  - id: unittest-basics-setup-order-001
    concept: unittest-basics
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It models how unittest calls setUp before every test: each test starts from an empty list that setUp creates anew. The lengths after two tests are printed."
    snippet: |
      def setup():
          return ["base"]

      def test_one(items):
          items.append("one")
          return len(items)

      def test_two(items):
          items.append("two")
          return len(items)

      first = test_one(setup())
      second = test_two(setup())
      print(first, second)
    expected:
      kind: stdout
      value: "2 2"
    hints:
      - "`setUp` runs anew before every test, so the second test does not see the first one's changes. What state does each of them start from?"
      - "Each call to `setup()` creates a new one-item list. The test adds one more to it - so each ends up with two."
    variants:
      - snippet: |
          shared = ["base"]

          def test_one(items):
              items.append("one")
              return len(items)

          def test_two(items):
              items.append("two")
              return len(items)

          first = test_one(shared)
          second = test_two(shared)
          print(first, second)
        expected:
          kind: stdout
          value: "2 3"
      - snippet: |
          def setup():
              return []

          def run(items, name):
              items.append(name)
              return len(items)

          print(run(setup(), "a"), run(setup(), "b"), run(setup(), "c"))
        expected:
          kind: stdout
          value: "1 1 1"

  - id: unittest-basics-collection-challenge-001
    concept: unittest-basics
    type: predict-output
    difficulty: 4
    prompt: "What does the program print? It models discovery: the runner only picks up a class's methods with the `test` prefix. The count of names from the list that would be collected as tests is printed."
    snippet: |
      names = [
          "test_total",
          "setUp",
          "test_empty",
          "helper_total",
          "tearDown",
          "test_refund",
          "checkTest",
      ]

      collected = [n for n in names if n.startswith("test")]
      print(len(collected))
    expected:
      kind: stdout
      value: "3"
    hints:
      - "Only a method whose name starts with `test` counts as a test. Which of the names in the list pass this filter?"
      - "`setUp`, `tearDown`, `helper_total`, and `checkTest` do not start with `test` - they are filtered out. Count only what remains."
      - "`startswith(\"test\")` is true for exactly three names: `test_total`, `test_empty`, `test_refund`."
