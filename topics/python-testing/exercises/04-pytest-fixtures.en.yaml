exercises:
  - id: pytest-fixtures-inject-quiz-001
    concept: pytest-fixtures
    type: theory-quiz
    difficulty: 1
    prompt: "A fixture `@pytest.fixture def cart(): ..` is declared. How does a test get its value?"
    choices:
      - id: a
        text: "By adding an argument with the same name: `def test_total(cart): .` - pytest matches the name and injects the fixture's result."
      - id: b
        text: "By calling `cart()` directly inside the test as a regular function for every request path in the app."
      - id: c
        text: "By importing `cart` from the fixtures module at the top of the file, without special-case setup for this flow."
      - id: d
        text: "By creating the object itself in the test body; the fixture is always only for documentation for every request path in the app."
    correct: [a]
    explanation: "A test requests a fixture by declaring an argument with its name. pytest sees the match, runs the fixture, and injects the returned value - this is dependency injection by name. There is no need to call the fixture manually or import it."
    variants:
      - prompt: "In a yield fixture, where does the teardown (cleanup) code live?"
        choices:
          - id: a
            text: "After `yield`: everything before `yield` is setup, the yielded value goes to the test, and the lines after `yield` run once the test is done."
          - id: b
            text: "Before `yield`: cleanup must happen before the test gets the value, without special-case setup for this flow."
          - id: c
            text: "In a separate fixture named with a `_teardown` suffix; the system does not allow any other correct behavior."
          - id: d
            text: "Yield fixtures always do not support teardown at all; the system does not allow any other correct behavior."
        correct: [a]
        explanation: "In a yield fixture, setup is everything before `yield`, the value for the test is what is yielded, and teardown is the code after `yield`, which pytest runs once the test finishes. Setup and cleanup of one resource sit side by side."
      - prompt: "Why do you need a `conftest.py` file?"
        choices:
          - id: a
            text: "To share common fixtures with all tests in a directory and its subdirectories, without importing."
          - id: b
            text: "To list the files that pytest should run for any payload and any deploy target."
          - id: c
            text: "To store expected test results as constants as a complete account of that behavior."
          - id: d
            text: "To manually set the order in which tests run as a complete account of that behavior."
        correct: [a]
        explanation: "Fixtures from `conftest.py` are automatically available to every test in that directory and below, without an `import`. This is how a team shares a common environment - database, client, or test-data fixtures."

  - id: pytest-fixtures-scope-quiz-001
    concept: pytest-fixtures
    type: theory-quiz
    difficulty: 2
    prompt: "What is the risk of a `scope=\"session\"` fixture if tests mutate the object it returns?"
    choices:
      - id: a
        text: "The object is built once for the whole run and shared across tests, so one test's changes are visible to another - isolation breaks."
      - id: b
        text: "No risk: session scope is always safer than function scope; the system does not allow any other correct behavior."
      - id: c
        text: "The fixture will not run at all unless you set `autouse=True` as a complete account of that behavior."
      - id: d
        text: "pytest automatically copies the object before every test, so there is no risk when only the outer call is considered."
    correct: [a]
    explanation: "With `scope=\"session\"`, setup runs once and every test gets the same object. If they mutate it, you get dependence on test order. Widening scope is safe only for read-only resources; mutable ones stay at `function` scope."
    variants:
      - prompt: "How often does a fixture with the default scope (`function`) run?"
        choices:
          - id: a
            text: "Fresh, for every test that requests it - full isolation."
          - id: b
            text: "Once per file, regardless of the number of tests."
          - id: c
            text: "Once for the entire pytest run."
          - id: d
            text: "Only if the test is marked `@pytest.mark.fixture`."
        correct: [a]
        explanation: "The default scope is `function`: the fixture runs again before every test that requests it. This is safe but costly for heavy resources, which is why they are sometimes widened to module/session scope."
      - prompt: "What does the built-in `tmp_path` fixture do?"
        choices:
          - id: a
            text: "Provides a unique temporary directory (Path) for the test; pytest creates and removes it itself."
          - id: b
            text: "Measures the test's execution time in milliseconds when only the outer call is considered."
          - id: c
            text: "Captures what the test printed to stdout, - that is how the API contract should be read."
          - id: d
            text: "Swaps environment variables for the duration of the test for every request path in the app."
        correct: [a]
        explanation: "`tmp_path` is a built-in fixture with a temporary directory scoped to a specific test; you do not need to clean it up manually. Capturing stdout is `capsys`, swapping environment variables is `monkeypatch`."

  - id: pytest-fixtures-scope-runs-001
    concept: pytest-fixtures
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? It compares function scope (a fresh list per test) with module scope (one shared list): with function scope, each of three tests starts empty. The lengths for three tests under function scope are printed."
    snippet: |
      def function_scope_fixture():
          return []

      lengths = []
      for _ in range(3):
          items = function_scope_fixture()
          items.append("x")
          lengths.append(len(items))

      print(lengths)
    expected:
      kind: stdout
      value: "[1, 1, 1]"
    hints:
      - "Function scope means the fixture runs again before every test, yielding a fresh object. What length does each of the three start from?"
      - "Each iteration calls the fixture again and gets a new empty list, then appends one item - so each ends up with one."
    variants:
      - snippet: |
          module_list = []

          def append_and_measure():
              module_list.append("x")
              return len(module_list)

          lengths = [append_and_measure() for _ in range(3)]
          print(lengths)
        expected:
          kind: stdout
          value: "[1, 2, 3]"
      - snippet: |
          def fresh():
              return []

          a = fresh()
          a.append("x")
          a.append("y")
          b = fresh()
          b.append("z")
          print(len(a), len(b))
        expected:
          kind: stdout
          value: "2 1"

  - id: pytest-fixtures-yield-teardown-001
    concept: pytest-fixtures
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It models the order of a yield fixture: the code before yield (setup), the test body, and the code after yield (teardown). Each step appends a label to a log. The log is printed."
    snippet: |
      log = []

      def fixture_run():
          log.append("setup")
          value = "db"
          test_body(value)
          log.append("teardown")

      def test_body(value):
          log.append("test:" + value)

      fixture_run()
      print(log)
    expected:
      kind: stdout
      value: "['setup', 'test:db', 'teardown']"
    hints:
      - "In a yield fixture, setup runs before yield, then the test body runs, and only then teardown runs after yield. In what order do the labels land in the log?"
      - "First the fixture writes 'setup', then it hands the value to the test (which writes 'test:db'), and only after the test returns is 'teardown' added."
    variants:
      - snippet: |
          log = []

          def outer():
              log.append("setup-A")
              inner()
              log.append("teardown-A")

          def inner():
              log.append("setup-B")
              log.append("test")
              log.append("teardown-B")

          outer()
          print(log)
        expected:
          kind: stdout
          value: "['setup-A', 'setup-B', 'test', 'teardown-B', 'teardown-A']"
      - snippet: |
          log = []

          def fixture_run():
              log.append("setup")
              raise_in_test()

          def raise_in_test():
              log.append("test-failed")

          fixture_run()
          log.append("teardown")
          print(log)
        expected:
          kind: stdout
          value: "['setup', 'test-failed', 'teardown']"

  - id: pytest-fixtures-factory-001
    concept: pytest-fixtures
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It models a factory fixture: the fixture returns a function, and the test calls it several times with different arguments. The count of created objects is printed."
    snippet: |
      def make_user_factory():
          created = []

          def _make(name):
              created.append(name)
              return name

          return _make, created

      make_user, created = make_user_factory()
      make_user("Anna")
      make_user("Boris")
      make_user("Vera")
      print(len(created))
    expected:
      kind: stdout
      value: "3"
    hints:
      - "The factory returns a function-tool; the test itself creates objects by calling it. How many times did the test call the factory?"
      - "Every call to `make_user(..)` appends a name to the shared `created` list. The test called it three times."
    variants:
      - snippet: |
          def make_factory():
              calls = []

              def _make(x):
                  calls.append(x * 2)
                  return x * 2

              return _make, calls

          build, calls = make_factory()
          build(5)
          build(10)
          print(calls)
        expected:
          kind: stdout
          value: "[10, 20]"
      - snippet: |
          def make_factory():
              created = []

              def _make(name, age=30):
                  created.append((name, age))
                  return created[-1]

              return _make, created

          make, created = make_factory()
          make("Anna", age=25)
          make("Boris")
          print(created[1][1])
        expected:
          kind: stdout
          value: "30"

  - id: pytest-fixtures-param-challenge-001
    concept: pytest-fixtures
    type: predict-output
    difficulty: 4
    prompt: "What does the program print? It models a parametrized fixture (`params=[..]`): a fixture with three values multiplies EVERY test that requests it by the number of values. The total run count for two tests is printed."
    snippet: |
      fixture_params = ["sqlite", "postgres", "mysql"]

      def collect_runs(tests, params):
          runs = []
          for test in tests:
              for param in params:
                  runs.append((test, param))
          return runs

      tests = ["test_insert", "test_query"]
      runs = collect_runs(tests, fixture_params)
      print(len(runs))
    expected:
      kind: stdout
      value: "6"
    hints:
      - "A parametrized fixture multiplies not one marked test but every test that requests it - once per value in params. How many test x value pairs result in total?"
      - "Two tests, three fixture values. Each test runs once per fixture value."
      - "It is a product: 2 tests x 3 parameter values."
