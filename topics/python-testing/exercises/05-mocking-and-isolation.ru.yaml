exercises:
  - id: mocking-and-isolation-why-quiz-001
    concept: mocking-and-isolation
    type: theory-quiz
    difficulty: 1
    prompt: "Зачем в unit-тесте подменять моком обращение функции к внешнему сервису по сети?"
    choices:
      - id: a
        text: "Чтобы тест был быстрым и детерминированным: подделка отвечает мгновенно и одинаково, не завися от доступности сети."
      - id: b
        text: "Чтобы тест заодно проверял, что сам сетевой сервис работает корректно как три обязательные части системы."
      - id: c
        text: "Чтобы тест выполнялся медленнее и тщательнее прогонял весь стек."
      - id: d
        text: "Именно подменять зависимости в тестах не нужно никогда, это всегда вредно и ничего сверх этого набора."
    correct: [a]
    explanation: "Реальный вызов по сети медленный и ненадёжный (сервис может лежать), а результат зависит от внешнего мира. Мок отвечает мгновенно и предсказуемо, поэтому тест проверяет ровно вашу логику, оставаясь быстрым и детерминированным."
    variants:
      - prompt: "Зачем в тесте «замораживают» время вместо чтения настоящего `datetime.now()`?"
        choices:
          - id: a
            text: "Чтобы тест давал один и тот же результат в любой день: иначе проверка, завязанная на дату, поведёт себя завтра иначе."
          - id: b
            text: "Чтобы ускорить системные часы во время прогона тестов на любом пути обработки запроса."
          - id: c
            text: "Чтобы тест проверял корректность работы операционной системы со временем как полное описание этого поведения."
          - id: d
            text: "Замораживать время бессмысленно, `datetime.now()` и так детерминирован как полное описание этого поведения."
        correct: [a]
        explanation: "Код, читающий `datetime.now()`, недетерминирован: тест на «срок истёк» завтра ведёт себя иначе. Заморозка времени (monkeypatch источника или freezegun) делает такие тесты повторяемыми."
      - prompt: "В чём разница между mock и stub?"
        choices:
          - id: a
            text: "Stub просто возвращает заданный ответ; mock дополнительно запоминает вызовы, и тест проверяет, как его звали."
          - id: b
            text: "Именно mock возвращает ответ, а stub возбуждает исключение и ничего сверх этого набора."
          - id: c
            text: "Это два названия одного и того же объекта, во всех сценариях без дополнительной настройки."
          - id: d
            text: "Stub работает только в pytest, а mock - только в unittest, независимо от входных данных и окружения."
        correct: [a]
        explanation: "Stub кормит код заранее заданными данными и больше ничего. Mock запоминает вызовы, и тест проверяет взаимодействие (был ли вызов и с какими аргументами) - это проверка поведения, а не результата."

  - id: mocking-and-isolation-side-effect-quiz-001
    concept: mocking-and-isolation
    type: theory-quiz
    difficulty: 2
    prompt: "Коду нужно при трёх последовательных вызовах мока получить разные ответы: «pending», «pending», «done». Как настроить мок?"
    choices:
      - id: a
        text: "Задать `side_effect = [\"pending\", \"pending\", \"done\"]` - мок отдаёт элементы списка по очереди при каждом вызове."
      - id: b
        text: "Задать `return_value = [\"pending\", \"pending\", \"done\"]` - мок будет возвращать разные элементы автоматически."
      - id: c
        text: "Вызвать мок один раз - он сам угадает нужную последовательность."
      - id: d
        text: "Это невозможно: мок всегда возвращает одно и то же значение."
    correct: [a]
    explanation: "`side_effect`-список отдаёт значения по очереди: первый вызов вернёт первый элемент, и так далее. `return_value` вернул бы один и тот же список целиком на каждый вызов, а не его элементы поштучно."
    variants:
      - prompt: "Что произойдёт при вызове мока, у которого `side_effect = ValueError(\"нет связи\")`?"
        choices:
          - id: a
            text: "Мок возбудит это исключение - так имитируют сбой зависимости."
          - id: b
            text: "Мок вернёт строку «нет связи» как обычное значение."
          - id: c
            text: "Мок проигнорирует side_effect и вернёт новый мок."
          - id: d
            text: "Мок запишет исключение в `return_value` и продолжит работу."
        correct: [a]
        explanation: "Если `side_effect` - класс исключения или его экземпляр, мок при вызове его возбуждает. Это удобно, чтобы проверить, как код обрабатывает падение зависимости (сеть недоступна, база отвалилась)."
      - prompt: "Что проверяет `sender.send.assert_called_once_with(to=\"anna@example.com\")`?"
        choices:
          - id: a
            text: "Что `send` вызвали ровно один раз и именно с аргументом `to=\"anna@example.com\"`."
          - id: b
            text: "Что `send` вернул значение `anna@example.com` как полное описание этого поведения."
          - id: c
            text: "Что метод `send` вообще существует у настоящего объекта."
          - id: d
            text: "Что `send` вызвали хотя бы один раз, число вызовов не важно."
        correct: [a]
        explanation: "`assert_called_once_with(..)` утверждает ровно один вызов и точное совпадение аргументов - это проверка взаимодействия. «Хотя бы раз» проверял бы `assert_called`, а просто число вызовов лежит в `call_count`."

  - id: mocking-and-isolation-side-effect-list-001
    concept: mocking-and-isolation
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Она моделирует `side_effect`-список мока через обычный итератор: каждый вызов отдаёт следующий элемент. Печатаются три полученных подряд значения."
    snippet: |
      side_effect = ["pending", "pending", "done"]
      responses = iter(side_effect)
      print(next(responses), next(responses), next(responses))
    expected:
      kind: stdout
      value: "pending pending done"
    hints:
      - "`side_effect`-список отдаёт значения строго по очереди. Что вернут три последовательных обращения к итератору этого списка?"
      - "`iter(..)` превращает список в поток; каждый `next(..)` берёт следующий элемент - в том порядке, в каком они записаны."
    variants:
      - snippet: |
          side_effect = [10, 20, 30]
          it = iter(side_effect)
          print(next(it) + next(it))
        expected:
          kind: stdout
          value: "30"
      - snippet: |
          side_effect = ["a", "b", "c", "d"]
          it = iter(side_effect)
          next(it)
          next(it)
          print(next(it))
        expected:
          kind: stdout
          value: "c"

  - id: mocking-and-isolation-return-value-001
    concept: mocking-and-isolation
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Она моделирует мок с `return_value`: на любой вызов и любые аргументы он отдаёт одно и то же. Печатаются два вызова с разными аргументами."
    snippet: |
      class FakeMock:
          def __init__(self, return_value):
              self.return_value = return_value

          def __call__(self, *args, **kwargs):
              return self.return_value

      get_price = FakeMock(return_value=500)
      print(get_price("книга"), get_price("ручка"))
    expected:
      kind: stdout
      value: "500 500"
    hints:
      - "`return_value` задаёт постоянный ответ, не зависящий от аргументов. Что вернут оба вызова, как бы их ни звали?"
      - "Аргументы вообще не влияют: `__call__` всегда отдаёт `self.return_value`."
    variants:
      - snippet: |
          class FakeMock:
              def __init__(self, return_value):
                  self.return_value = return_value
                  self.call_count = 0

              def __call__(self, *args, **kwargs):
                  self.call_count += 1
                  return self.return_value

          m = FakeMock(return_value="ok")
          m()
          m()
          m()
          print(m.call_count)
        expected:
          kind: stdout
          value: "3"
      - snippet: |
          class FakeMock:
              def __init__(self, return_value):
                  self.return_value = return_value

              def __call__(self, *args, **kwargs):
                  return self.return_value

          is_active = FakeMock(return_value=True)
          print(is_active(1), is_active(999))
        expected:
          kind: stdout
          value: "True True"

  - id: mocking-and-isolation-assert-called-001
    concept: mocking-and-isolation
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она моделирует, как мок запоминает вызовы для последующей проверки `assert_called_once_with`: каждый вызов сохраняется. Печатается число вызовов и значение аргумента `to` из единственного вызова."
    snippet: |
      class RecordingMock:
          def __init__(self):
              self.calls = []

          def __call__(self, *args, **kwargs):
              self.calls.append((args, kwargs))

      send = RecordingMock()
      send(to="anna@example.com", text="готово")
      print(len(send.calls), send.calls[0][1]["to"])
    expected:
      kind: stdout
      value: "1 anna@example.com"
    hints:
      - "Мок запоминает каждый вызов, чтобы тест мог сверить факт и аргументы. Сколько раз позвали `send` и с каким `to`?"
      - "`calls` пополняется одним кортежем за вызов; `calls[0]` - первый вызов, его `[1]` - словарь kwargs, в нём ключ `to`."
    variants:
      - snippet: |
          class RecordingMock:
              def __init__(self):
                  self.calls = []

              def __call__(self, *args, **kwargs):
                  self.calls.append((args, kwargs))

          notify = RecordingMock()
          notify(1)
          notify(2)
          notify(3)
          print(len(notify.calls), notify.calls[-1][0][0])
        expected:
          kind: stdout
          value: "3 3"
      - snippet: |
          class RecordingMock:
              def __init__(self):
                  self.calls = []

              def __call__(self, *args, **kwargs):
                  self.calls.append((args, kwargs))

          save = RecordingMock()
          save("отчёт", retries=2)
          print(save.calls[0][0][0], save.calls[0][1]["retries"])
        expected:
          kind: stdout
          value: "отчёт 2"

  - id: mocking-and-isolation-where-to-patch-challenge-001
    concept: mocking-and-isolation
    type: predict-output
    difficulty: 5
    prompt: "Что выведет программа? Она моделирует правило «патчить там, где имя ИЩУТ». Модуль-потребитель `report` при импорте завёл свою ссылку на функцию. Тест патчит МЕСТО ОПРЕДЕЛЕНИЯ (`services`), а потом смотрит, что увидит `report`. Печатается значение, которое получит потребитель."
    snippet: |
      services = {"get_time": "real-time"}

      report = {"get_time": services["get_time"]}

      services["get_time"] = "patched-time"

      print(report["get_time"])
    expected:
      kind: stdout
      value: "real-time"
    hints:
      - "При `from services import get_time` потребитель копирует ССЫЛКУ к себе. Подмена в исходном модуле не трогает уже сделанную локальную ссылку - что тогда увидит потребитель?"
      - "`report` связал своё имя со значением в момент импорта - тогда это было «real-time». Переприсваивание в `services` создаёт новую связь только в `services`, а связь в `report` осталась прежней."
      - "Именно поэтому патчат `report.get_time`, а не `services.get_time`: имя ищут в модуле-потребителе. Здесь запатчили не то место, и подмена прошла мимо."
    variants:
      - snippet: |
          services = {"get_time": "real-time"}
          report = {"get_time": services["get_time"]}

          report["get_time"] = "patched-time"

          print(report["get_time"])
        expected:
          kind: stdout
          value: "patched-time"
      - snippet: |
          services = {"now": "real"}
          billing = {"now": services["now"]}
          report = {"now": services["now"]}

          services["now"] = "patched"

          print(billing["now"], report["now"])
        expected:
          kind: stdout
          value: "real real"
