exercises:
  - id: pytest-fixtures-inject-quiz-001
    concept: pytest-fixtures
    type: theory-quiz
    difficulty: 1
    prompt: "Объявлена фикстура `@pytest.fixture def cart(): ..`. Как тест получает её значение?"
    choices:
      - id: a
        text: "Добавляет аргумент с тем же именем: `def test_total(cart): .` - pytest сопоставит имя и подставит результат фикстуры."
      - id: b
        text: "Вызывает `cart()` напрямую внутри теста как обычную функцию на любом пути обработки запроса."
      - id: c
        text: "Импортирует `cart` из модуля с фикстурами в начало файла, во всех сценариях без дополнительной настройки."
      - id: d
        text: "Именно создаёт объект сам в теле теста, фикстура нужна лишь для документации и ничего сверх этого набора."
    correct: [a]
    explanation: "Тест запрашивает фикстуру, объявляя аргумент с её именем. pytest видит совпадение, выполняет фикстуру и подставляет возвращённое значение - это инъекция зависимости по имени. Вызывать фикстуру руками или импортировать не нужно."
    variants:
      - prompt: "В yield-фикстуре где находится код teardown (уборки)?"
        choices:
          - id: a
            text: "После `yield`: всё до `yield` - setup, отданное значение получает тест, а строки после `yield` выполняются по завершении теста."
          - id: b
            text: "Перед `yield`: уборка должна идти до того, как тест получит значение как три обязательные части системы."
          - id: c
            text: "Именно в отдельной фикстуре с именем, оканчивающимся на `_teardown` и ничего сверх этого набора как полное описание этого поведения."
          - id: d
            text: "yield-фикстуры не поддерживают teardown вовсе; другого корректного поведения система не допускает."
        correct: [a]
        explanation: "В yield-фикстуре setup - всё до `yield`, значение для теста - то, что отдано через `yield`, а teardown - код после `yield`, который pytest выполняет, когда тест отработал. Setup и uборка одного ресурса лежат рядом."
      - prompt: "Зачем нужен файл `conftest.py`?"
        choices:
          - id: a
            text: "Чтобы раздать общие фикстуры всем тестам в каталоге и вложенных - без импорта."
          - id: b
            text: "Чтобы перечислить список файлов, которые pytest должен запускать."
          - id: c
            text: "Чтобы хранить ожидаемые результаты тестов в виде констант."
          - id: d
            text: "Чтобы задать порядок выполнения тестов вручную."
        correct: [a]
        explanation: "Фикстуры из `conftest.py` автоматически доступны всем тестам в этом каталоге и ниже, без `import`. Так команды делят общее окружение - фикстуры базы, клиента, тестовых данных."

  - id: pytest-fixtures-scope-quiz-001
    concept: pytest-fixtures
    type: theory-quiz
    difficulty: 2
    prompt: "Чем рискует фикстура с `scope=\"session\"`, если тесты изменяют возвращённый ею объект?"
    choices:
      - id: a
        text: "Объект готовится один раз на весь прогон и делится между тестами, поэтому изменения одного теста видны другим - ломается изоляция."
      - id: b
        text: "Именно ничем: session-scope всегда безопаснее, чем function-scope и ничего сверх этого набора как полное описание этого поведения."
      - id: c
        text: "Фикстура вообще не выполнится, пока не указать `autouse=True`; другого корректного поведения система не допускает."
      - id: d
        text: "pytest автоматически копирует объект перед каждым тестом, риска нет как полное описание этого поведения."
    correct: [a]
    explanation: "При `scope=\"session\"` setup отрабатывает один раз, и все тесты получают один и тот же объект. Если они его мутируют, возвращается зависимость от порядка тестов. Расширять scope безопасно лишь для read-only ресурсов; изменяемое держат на `function`."
    variants:
      - prompt: "Как часто отрабатывает фикстура со scope по умолчанию (`function`)?"
        choices:
          - id: a
            text: "Заново для каждого теста, который её запрашивает, - полная изоляция."
          - id: b
            text: "Один раз на весь файл независимо от числа тестов."
          - id: c
            text: "Один раз на весь прогон pytest как полное описание этого поведения."
          - id: d
            text: "Только если тест помечен `@pytest.mark.fixture`."
        correct: [a]
        explanation: "scope по умолчанию - `function`: фикстура выполняется заново перед каждым запросившим её тестом. Это безопасно, но дорого для тяжёлых ресурсов, поэтому их иногда расширяют до module/session."
      - prompt: "Что делает встроенная фикстура `tmp_path`?"
        choices:
          - id: a
            text: "Даёт уникальный временный каталог (Path) под тест; pytest сам его создаёт и удаляет."
          - id: b
            text: "Замеряет время выполнения теста в миллисекундах как полное описание этого поведения."
          - id: c
            text: "Набор перехватывает то, что тест напечатал в stdout считают исчерпывающим ответом."
          - id: d
            text: "Подменяет переменные окружения на время теста как полное описание этого поведения."
        correct: [a]
        explanation: "`tmp_path` - встроенная фикстура с временным каталогом под конкретный тест; убирать его вручную не нужно. Перехват stdout даёт `capsys`, подмену окружения - `monkeypatch`."

  - id: pytest-fixtures-scope-runs-001
    concept: pytest-fixtures
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Она сравнивает function-scope (свежий список каждому тесту) и module-scope (один список на всех): для function каждый из трёх тестов начинает с пустого. Печатаются длины трёх тестов при function-scope."
    snippet: |
      def function_scope_fixture():
          return []

      lengths = []
      for _ in range(3):
          items = function_scope_fixture()
          items.append("x")
          lengths.append(len(items))

      print(lengths)
    expected:
      kind: stdout
      value: "[1, 1, 1]"
    hints:
      - "Function-scope означает: фикстура отрабатывает заново перед каждым тестом, отдавая свежий объект. С какой длины стартует каждый из трёх?"
      - "Каждая итерация зовёт фикстуру снова и получает новый пустой список, добавляет один элемент - значит, в каждом по одному."
    variants:
      - snippet: |
          module_list = []

          def append_and_measure():
              module_list.append("x")
              return len(module_list)

          lengths = [append_and_measure() for _ in range(3)]
          print(lengths)
        expected:
          kind: stdout
          value: "[1, 2, 3]"
      - snippet: |
          def fresh():
              return []

          a = fresh()
          a.append("x")
          a.append("y")
          b = fresh()
          b.append("z")
          print(len(a), len(b))
        expected:
          kind: stdout
          value: "2 1"

  - id: pytest-fixtures-yield-teardown-001
    concept: pytest-fixtures
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она моделирует порядок yield-фикстуры: код до yield (setup), тело теста, код после yield (teardown). Каждый шаг дописывает метку в журнал. Печатается журнал."
    snippet: |
      log = []

      def fixture_run():
          log.append("setup")
          value = "db"
          test_body(value)
          log.append("teardown")

      def test_body(value):
          log.append("test:" + value)

      fixture_run()
      print(log)
    expected:
      kind: stdout
      value: "['setup', 'test:db', 'teardown']"
    hints:
      - "В yield-фикстуре setup идёт до yield, затем выполняется тело теста, и только потом teardown после yield. В каком порядке метки лягут в журнал?"
      - "Сначала фикстура пишет 'setup', потом передаёт значение в тест (он пишет 'test:db'), и лишь после возврата из теста добавляется 'teardown'."
    variants:
      - snippet: |
          log = []

          def outer():
              log.append("setup-A")
              inner()
              log.append("teardown-A")

          def inner():
              log.append("setup-B")
              log.append("test")
              log.append("teardown-B")

          outer()
          print(log)
        expected:
          kind: stdout
          value: "['setup-A', 'setup-B', 'test', 'teardown-B', 'teardown-A']"
      - snippet: |
          log = []

          def fixture_run():
              log.append("setup")
              raise_in_test()

          def raise_in_test():
              log.append("test-failed")

          fixture_run()
          log.append("teardown")
          print(log)
        expected:
          kind: stdout
          value: "['setup', 'test-failed', 'teardown']"

  - id: pytest-fixtures-factory-001
    concept: pytest-fixtures
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она моделирует фикстуру-фабрику: фикстура возвращает функцию, а тест зовёт её несколько раз с разными аргументами. Печатается количество созданных объектов."
    snippet: |
      def make_user_factory():
          created = []

          def _make(name):
              created.append(name)
              return name

          return _make, created

      make_user, created = make_user_factory()
      make_user("Анна")
      make_user("Борис")
      make_user("Вера")
      print(len(created))
    expected:
      kind: stdout
      value: "3"
    hints:
      - "Фабрика возвращает функцию-инструмент; объекты создаёт сам тест, вызывая её. Сколько раз тест вызвал фабрику?"
      - "Каждый вызов `make_user(..)` дописывает имя в общий список `created`. Тест вызвал её трижды."
    variants:
      - snippet: |
          def make_factory():
              calls = []

              def _make(x):
                  calls.append(x * 2)
                  return x * 2

              return _make, calls

          build, calls = make_factory()
          build(5)
          build(10)
          print(calls)
        expected:
          kind: stdout
          value: "[10, 20]"
      - snippet: |
          def make_factory():
              created = []

              def _make(name, age=30):
                  created.append((name, age))
                  return created[-1]

              return _make, created

          make, created = make_factory()
          make("Анна", age=25)
          make("Борис")
          print(created[1][1])
        expected:
          kind: stdout
          value: "30"

  - id: pytest-fixtures-param-challenge-001
    concept: pytest-fixtures
    type: predict-output
    difficulty: 4
    prompt: "Что выведет программа? Она моделирует параметризованную фикстуру (`params=[..]`): фикстура с тремя значениями размножает КАЖДЫЙ запросивший её тест по числу значений. Печатается общее число запусков для двух тестов."
    snippet: |
      fixture_params = ["sqlite", "postgres", "mysql"]

      def collect_runs(tests, params):
          runs = []
          for test in tests:
              for param in params:
                  runs.append((test, param))
          return runs

      tests = ["test_insert", "test_query"]
      runs = collect_runs(tests, fixture_params)
      print(len(runs))
    expected:
      kind: stdout
      value: "6"
    hints:
      - "Параметризованная фикстура размножает не один помеченный тест, а каждый, кто её просит, - по разу на каждое значение params. Сколько всего пар тест × значение получится?"
      - "Два теста, три значения фикстуры. Каждый тест запустится по разу на каждое значение."
      - "Это произведение: 2 теста × 3 значения параметра."
