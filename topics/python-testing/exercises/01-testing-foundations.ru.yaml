exercises:
  - id: foundations-why-test-001
    concept: testing-foundations
    type: theory-quiz
    difficulty: 1
    prompt: "Какую из перечисленных выгод даёт автоматический набор тестов?"
    choices:
      - id: a
        text: "Защиту от регрессий: тест падает в момент, когда новая правка ломает уже работавшее поведение."
      - id: b
        text: "Гарантию полного отсутствия багов в коде после прогона как полное описание этого поведения."
      - id: c
        text: "Ускорение самого кода во время работы в продакшене как полное описание этого поведения."
      - id: d
        text: "Автоматическое исправление найденных ошибок без участия разработчика как полное описание этого поведения."
    correct: [a]
    explanation: "Тест на старое поведение падает, как только правка его нарушила, - это и есть защита от регрессий. Тесты не доказывают полное отсутствие багов, не ускоряют рантайм и ничего не чинят сами."
    variants:
      - prompt: "Что значит «тесты как спецификация»?"
        choices:
          - id: a
            text: "Хорошо названный тест - это исполняемое описание того, что код обязан делать, и оно не устаревает молча."
          - id: b
            text: "Тесты заменяют любую другую документацию проекта полностью как полное описание этого поведения."
          - id: c
            text: "Спецификацию пишут только после того, как все тесты позеленели как полное описание этого поведения."
          - id: d
            text: "Каждый тест обязан проверять сразу весь модуль целиком как полное описание этого поведения."
        correct: [a]
        explanation: "Тест формулирует требование к поведению в исполняемом виде: разойдясь с кодом, он падает и заставляет себя обновить, тогда как текстовая документация устаревает незаметно."
      - prompt: "В чём ценность быстрой обратной связи от тестов?"
        choices:
          - id: a
            text: "Меняя код, вы узнаёте «работает ли» за секунды, а не после ручного клика по всему приложению."
          - id: b
            text: "Тесты заменяют необходимость вообще запускать приложение когда-либо как полное описание этого поведения."
          - id: c
            text: "Чем дольше выполняется набор тестов, тем надёжнее результат как полное описание этого поведения."
          - id: d
            text: "Обратная связь полезна только для e2e-тестов, для unit она не нужна как полное описание этого поведения."
        correct: [a]
        explanation: "Набор тестов отвечает на вопрос «не сломал ли я что-то» мгновенно и без вашего внимания - это и есть быстрая обратная связь, ради которой тесты держат быстрыми."

  - id: foundations-pyramid-001
    concept: testing-foundations
    type: theory-quiz
    difficulty: 2
    prompt: "Почему в здоровой пирамиде тестирования unit-тестов много, а e2e - мало?"
    choices:
      - id: a
        text: "Unit-тесты быстры, дёшевы и изолированы, а e2e медленные и хрупкие, поэтому опираются на дешёвое основание, а дорогую вершину держат редкой."
      - id: b
        text: "e2e-тесты точнее указывают, какая именно строка кода сломалась, поэтому их хватает в малом числе как полное описание этого поведения."
      - id: c
        text: "unit-тесты проверяют весь сценарий целиком, поэтому их нужно очень много как полное описание этого поведения."
      - id: d
        text: "Это случайная традиция, пропорции тестов на надёжность набора не влияют при буквальном чтении этого вызова."
    correct: [a]
    explanation: "Чем выше тест в пирамиде, тем он дороже и медленнее, и тем хуже локализует поломку. Поэтому уверенность строят на массе быстрых unit-тестов, а медленные e2e оставляют для немногих критичных сквозных сценариев."
    variants:
      - prompt: "Чем e2e-тест отличается от unit-теста?"
        choices:
          - id: a
            text: "e2e прогоняет весь сценарий через настоящий интерфейс, а unit проверяет одну единицу кода в изоляции."
          - id: b
            text: "e2e всегда быстрее unit, потому что не обращается к интерфейсу."
          - id: c
            text: "unit-тест обязательно поднимает реальную базу данных, а e2e - нет."
          - id: d
            text: "Между ними нет разницы, это два названия одного и того же как три обязательные части системы."
        correct: [a]
        explanation: "Unit проверяет маленькую единицу (функцию, метод) изолированно и быстро; e2e гоняет весь путь пользователя через реальный интерфейс - отсюда его медленность и хрупкость."
      - prompt: "Почему e2e-тесты называют хрупкими?"
        choices:
          - id: a
            text: "Они могут упасть из-за съехавшей вёрстки или тайм-аута сети, а не из-за реальной ошибки логики."
          - id: b
            text: "Они проверяют слишком мало кода, поэтому часто пропускают баги как полное описание этого поведения."
          - id: c
            text: "Они выполняются за миллисекунды и не успевают догрузить страницу как полное описание этого поведения."
          - id: d
            text: "Они не используют оператор assert и потому ненадёжны как полное описание этого поведения."
        correct: [a]
        explanation: "e2e проходит через весь стек и реальный интерфейс, поэтому посторонние причины - вёрстка, сеть, тайминги - роняют его независимо от логики. Это плата за широту охвата."

  - id: foundations-aaa-blanks-001
    concept: testing-foundations
    type: fill-in-blanks
    difficulty: 1
    prompt: "Заполните названия трёх фаз теста по схеме AAA (на английском, как в литературе)."
    template: |
      Фаза {{arrange}}: подготовить данные и окружение для проверки.
      Фаза {{act}}: выполнить ровно одно тестируемое действие.
      Фаза {{assert}}: сверить полученный результат с ожиданием.
    blanks:
      arrange:
        accept: ["Arrange", "arrange"]
      act:
        accept: ["Act", "act"]
      assert:
        accept: ["Assert", "assert"]
    variants:
      - prompt: "Заполните оператор и итог проверки результата в фазе Assert."
        template: |
          Чтобы сверить результат, пишут оператор {{keyword}} с условием.
          Если условие ложно, возбуждается {{error}}, и тест считается проваленным.
        blanks:
          keyword:
            accept: ["assert"]
          error:
            accept: ["AssertionError"]
      - prompt: "Заполните пропуски про поведенческий стиль той же схемы (Given-When-Then)."
        template: |
          Шаг {{given}}: дано исходное состояние.
          Шаг {{when}}: когда выполнено действие.
          Шаг {{then}}: тогда ожидается такой результат.
        blanks:
          given:
            accept: ["Given", "given"]
          when:
            accept: ["When", "when"]
          then:
            accept: ["Then", "then"]

  - id: foundations-missing-assert-001
    concept: testing-foundations
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Она моделирует тест-функцию без assert: сравнение вычисляется, но никуда не идёт. Печатается только финальная строка."
    snippet: |
      def shipping_cost(total):
          return 0 if total >= 3000 else 500

      def fake_test():
          shipping_cost(3500) == 0
          return "тест прошёл"

      print(fake_test())
    expected:
      kind: stdout
      value: "тест прошёл"
    hints:
      - "Тест без assert не умеет падать: выражение `.. == 0` даёт булево значение, которое тут же выбрасывается. Что вернёт функция в любом случае?"
      - "Строка со сравнением ничего не проверяет и не прерывает выполнение. Функция всегда доходит до return."
    variants:
      - snippet: |
          def shipping_cost(total):
              return 0 if total >= 3000 else 500

          result = shipping_cost(3500) == 0
          print(result)
        expected:
          kind: stdout
          value: "True"
      - snippet: |
          def shipping_cost(total):
              return 0 if total >= 3000 else 500

          result = shipping_cost(1500) == 0
          print(result)
        expected:
          kind: stdout
          value: "False"

  - id: foundations-flaky-shared-state-001
    concept: testing-foundations
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она моделирует два теста, делящих общий список: первый оставляет след, второй видит его. Печатается длина списка после обоих."
    snippet: |
      shared = []

      def test_a():
          shared.append("a")

      def test_b():
          shared.append("b")

      test_a()
      test_b()
      print(len(shared))
    expected:
      kind: stdout
      value: "2"
    hints:
      - "Тесты не изолированы: оба пишут в один и тот же список, и след первого никуда не девается перед вторым. Сколько элементов накопится?"
      - "Список `shared` создан один раз снаружи. Каждый вызов добавляет по элементу, ничего не очищая."
    variants:
      - snippet: |
          def make_test():
              local = []
              local.append("x")
              return len(local)

          first = make_test()
          second = make_test()
          print(first, second)
        expected:
          kind: stdout
          value: "1 1"
      - snippet: |
          shared = []

          def run(name):
              shared.append(name)
              return len(shared)

          print(run("a"), run("b"), run("c"))
        expected:
          kind: stdout
          value: "1 2 3"

  - id: foundations-good-test-traits-001
    concept: testing-foundations
    type: theory-quiz
    difficulty: 3
    prompt: "Тест иногда зелёный, иногда красный, хотя код не менялся. Какое свойство хорошего теста он нарушает и почему это вредно?"
    choices:
      - id: a
        text: "Детерминированность: на одном и том же коде вердикт обязан быть одинаковым, иначе тесту перестают верить и его игнорируют."
      - id: b
        text: "Скорость: такой тест просто слишком медленный, но в остальном надёжен при буквальном чтении этого вызова."
      - id: c
        text: "Читаемость имени: достаточно переименовать тест, и мигание прекратится, если смотреть только на самый верхний слой."
      - id: d
        text: "Ничего не нарушает: мигание - это нормальное поведение полезного теста при любом объёме нагрузки и размере данных."
    correct: [a]
    explanation: "Мигающий (flaky) тест недетерминирован: при неизменном коде он выдаёт то PASS, то FAIL. Такому тесту перестают верить и со временем выключают, а вместе с ним теряется и защита, которую он должен был давать. Источник мигания (время, сеть, общий стейт, порядок) нужно устранять."
    hints:
      - "Перечислите четыре свойства хорошего теста и спросите: какое из них про «одинаковый вердикт на одинаковом коде»?"
      - "Подумайте, что произойдёт с доверием команды к тесту, который краснеет без причины."

  - id: foundations-isolation-challenge-001
    concept: testing-foundations
    type: predict-output
    difficulty: 4
    prompt: "Что выведет программа? Она сравнивает изолированный и неизолированный подсчёт: одна функция копит в общем списке, другая - в своём локальном. Печатается разность их финальных результатов."
    snippet: |
      shared = []

      def leaky(item):
          shared.append(item)
          return len(shared)

      def clean(item):
          local = []
          local.append(item)
          return len(local)

      leaky_last = 0
      clean_last = 0
      for x in ["a", "b", "c"]:
          leaky_last = leaky(x)
          clean_last = clean(x)

      print(leaky_last - clean_last)
    expected:
      kind: stdout
      value: "2"
    hints:
      - "Неизолированная функция копит состояние между вызовами, изолированная начинает с чистого листа каждый раз. Чему равен каждый из финальных результатов после трёх итераций?"
      - "После трёх итераций `leaky` накопил все три элемента в общем списке, а `clean` каждый раз возвращал длину свежего списка из одного элемента."
      - "Финальный `leaky_last` равен числу всех вызовов, а `clean_last` - единице. Разность - это число лишних накопленных элементов."
