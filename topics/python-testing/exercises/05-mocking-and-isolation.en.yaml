exercises:
  - id: mocking-and-isolation-why-quiz-001
    concept: mocking-and-isolation
    type: theory-quiz
    difficulty: 1
    prompt: "Why replace a function's call to an external network service with a mock in a unit test?"
    choices:
      - id: a
        text: "So the test is fast and deterministic: the fake responds instantly and consistently, without depending on network availability."
      - id: b
        text: "So the test also verifies that the network service itself works correctly."
      - id: c
        text: "So the test runs slower and exercises the whole stack more thoroughly."
      - id: d
        text: "You should never replace dependencies in tests; it is always harmful."
    correct: [a]
    explanation: "A real network call is slow and unreliable (the service may be down), and the result depends on the outside world. A mock responds instantly and predictably, so the test checks exactly your logic while staying fast and deterministic."
    variants:
      - prompt: "Why does a test 'freeze' time instead of reading the real `datetime.now()`?"
        choices:
          - id: a
            text: "So the test gives the same result on any day: otherwise a check tied to the date would behave differently tomorrow."
          - id: b
            text: "To speed up the system clock during the test run."
          - id: c
            text: "So the test verifies that the operating system's clock works correctly."
          - id: d
            text: "Freezing time is pointless; `datetime.now()` is already deterministic."
        correct: [a]
        explanation: "Code that reads `datetime.now()` is nondeterministic: a test about 'has expired' behaves differently tomorrow. Freezing time (monkeypatching the source, or freezegun) makes such tests repeatable."
      - prompt: "What is the difference between a mock and a stub?"
        choices:
          - id: a
            text: "A stub simply returns a preset answer; a mock also records calls, and the test checks how it was called."
          - id: b
            text: "A mock returns a value, a stub raises an exception."
          - id: c
            text: "They are two names for the same object."
          - id: d
            text: "A stub only works in pytest, a mock only in unittest."
        correct: [a]
        explanation: "A stub feeds code preset data and does nothing else. A mock records calls, and the test checks the interaction (was it called, and with what arguments) - that is checking behavior, not the result."

  - id: mocking-and-isolation-side-effect-quiz-001
    concept: mocking-and-isolation
    type: theory-quiz
    difficulty: 2
    prompt: "Code needs three consecutive calls to a mock to get different answers: 'pending', 'pending', 'done'. How do you configure the mock?"
    choices:
      - id: a
        text: "Set `side_effect = [\"pending\", \"pending\", \"done\"]` - the mock returns the list's items one by one, one per call."
      - id: b
        text: "Set `return_value = [\"pending\", \"pending\", \"done\"]` - the mock will automatically return different items."
      - id: c
        text: "Call the mock once - it will guess the needed sequence by itself."
      - id: d
        text: "This is impossible: a mock always returns the same value."
    correct: [a]
    explanation: "A `side_effect` list returns values one at a time: the first call returns the first item, and so on. `return_value` would return the same whole list on every call, not its items one by one."
    variants:
      - prompt: "What happens when you call a mock whose `side_effect = ValueError(\"no connection\")`?"
        choices:
          - id: a
            text: "The mock raises that exception - this is how you simulate a dependency failure."
          - id: b
            text: "The mock returns the string 'no connection' as a regular value."
          - id: c
            text: "The mock ignores side_effect and returns a new mock."
          - id: d
            text: "The mock stores the exception in `return_value` and keeps working."
        correct: [a]
        explanation: "If `side_effect` is an exception class or instance, calling the mock raises it. This is handy for checking how code handles a dependency failure (network down, database dropped)."
      - prompt: "What does `sender.send.assert_called_once_with(to=\"anna@example.com\")` check?"
        choices:
          - id: a
            text: "That `send` was called exactly once, and specifically with the argument `to=\"anna@example.com\"`."
          - id: b
            text: "That `send` returned the value `anna@example.com`."
          - id: c
            text: "That the `send` method exists at all on the real object."
          - id: d
            text: "That `send` was called at least once; the call count does not matter."
        correct: [a]
        explanation: "`assert_called_once_with(...)` asserts exactly one call with an exact argument match - this checks interaction. 'At least once' would be `assert_called`, and the plain call count lives in `call_count`."

  - id: mocking-and-isolation-side-effect-list-001
    concept: mocking-and-isolation
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? It models a mock's `side_effect` list through a plain iterator: each call returns the next item. Three values obtained in a row are printed."
    snippet: |
      side_effect = ["pending", "pending", "done"]
      responses = iter(side_effect)
      print(next(responses), next(responses), next(responses))
    expected:
      kind: stdout
      value: "pending pending done"
    hints:
      - "A `side_effect` list returns values strictly in order. What do three consecutive calls to this list's iterator return?"
      - "`iter(...)` turns the list into a stream; each `next(...)` takes the next item, in the order they were written."
    variants:
      - snippet: |
          side_effect = [10, 20, 30]
          it = iter(side_effect)
          print(next(it) + next(it))
        expected:
          kind: stdout
          value: "30"
      - snippet: |
          side_effect = ["a", "b", "c", "d"]
          it = iter(side_effect)
          next(it)
          next(it)
          print(next(it))
        expected:
          kind: stdout
          value: "c"

  - id: mocking-and-isolation-return-value-001
    concept: mocking-and-isolation
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? It models a mock with `return_value`: on any call and any arguments it returns the same thing. Two calls with different arguments are printed."
    snippet: |
      class FakeMock:
          def __init__(self, return_value):
              self.return_value = return_value

          def __call__(self, *args, **kwargs):
              return self.return_value

      get_price = FakeMock(return_value=500)
      print(get_price("book"), get_price("pen"))
    expected:
      kind: stdout
      value: "500 500"
    hints:
      - "`return_value` sets a constant answer that does not depend on arguments. What do both calls return, no matter what they are named?"
      - "Arguments have no effect at all: `__call__` always returns `self.return_value`."
    variants:
      - snippet: |
          class FakeMock:
              def __init__(self, return_value):
                  self.return_value = return_value
                  self.call_count = 0

              def __call__(self, *args, **kwargs):
                  self.call_count += 1
                  return self.return_value

          m = FakeMock(return_value="ok")
          m()
          m()
          m()
          print(m.call_count)
        expected:
          kind: stdout
          value: "3"
      - snippet: |
          class FakeMock:
              def __init__(self, return_value):
                  self.return_value = return_value

              def __call__(self, *args, **kwargs):
                  return self.return_value

          is_active = FakeMock(return_value=True)
          print(is_active(1), is_active(999))
        expected:
          kind: stdout
          value: "True True"

  - id: mocking-and-isolation-assert-called-001
    concept: mocking-and-isolation
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It models how a mock records calls for a later `assert_called_once_with` check: each call is stored. The call count and the value of the `to` argument from the single call are printed."
    snippet: |
      class RecordingMock:
          def __init__(self):
              self.calls = []

          def __call__(self, *args, **kwargs):
              self.calls.append((args, kwargs))

      send = RecordingMock()
      send(to="anna@example.com", text="done")
      print(len(send.calls), send.calls[0][1]["to"])
    expected:
      kind: stdout
      value: "1 anna@example.com"
    hints:
      - "A mock records every call so the test can verify the fact and the arguments. How many times was `send` called, and with what `to`?"
      - "`calls` grows by one tuple per call; `calls[0]` is the first call, and its `[1]` is the kwargs dict, which holds the key `to`."
    variants:
      - snippet: |
          class RecordingMock:
              def __init__(self):
                  self.calls = []

              def __call__(self, *args, **kwargs):
                  self.calls.append((args, kwargs))

          notify = RecordingMock()
          notify(1)
          notify(2)
          notify(3)
          print(len(notify.calls), notify.calls[-1][0][0])
        expected:
          kind: stdout
          value: "3 3"
      - snippet: |
          class RecordingMock:
              def __init__(self):
                  self.calls = []

              def __call__(self, *args, **kwargs):
                  self.calls.append((args, kwargs))

          save = RecordingMock()
          save("report", retries=2)
          print(save.calls[0][0][0], save.calls[0][1]["retries"])
        expected:
          kind: stdout
          value: "report 2"

  - id: mocking-and-isolation-where-to-patch-challenge-001
    concept: mocking-and-isolation
    type: predict-output
    difficulty: 5
    prompt: "What does the program print? It models the rule 'patch where the name is looked up'. The consuming module `report` grabbed its own reference to the function on import. The test patches the DEFINITION SITE (`services`), then checks what `report` sees. The value the consumer gets is printed."
    snippet: |
      services = {"get_time": "real-time"}

      report = {"get_time": services["get_time"]}

      services["get_time"] = "patched-time"

      print(report["get_time"])
    expected:
      kind: stdout
      value: "real-time"
    hints:
      - "With `from services import get_time` the consumer copies a REFERENCE to itself. Replacing it in the source module does not touch the local reference already made - so what does the consumer see?"
      - "`report` bound its name to a value at import time - back then that was 'real-time'. Reassigning `services` creates a new binding only in `services`; the binding in `report` stays as it was."
      - "This is exactly why you patch `report.get_time`, not `services.get_time`: the name is looked up in the consuming module. Here the wrong place was patched, and the replacement missed."
    variants:
      - snippet: |
          services = {"get_time": "real-time"}
          report = {"get_time": services["get_time"]}

          report["get_time"] = "patched-time"

          print(report["get_time"])
        expected:
          kind: stdout
          value: "patched-time"
      - snippet: |
          services = {"now": "real"}
          billing = {"now": services["now"]}
          report = {"now": services["now"]}

          services["now"] = "patched"

          print(billing["now"], report["now"])
        expected:
          kind: stdout
          value: "real real"
