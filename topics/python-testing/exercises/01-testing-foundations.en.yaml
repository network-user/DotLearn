exercises:
  - id: foundations-why-test-001
    concept: testing-foundations
    type: theory-quiz
    difficulty: 1
    prompt: "Which of these benefits does an automated test suite give you?"
    choices:
      - id: a
        text: "Protection from regressions: a test fails the moment a new change breaks behavior that used to work."
      - id: b
        text: "A guarantee of zero bugs in the code after the run for every request path in the app."
      - id: c
        text: "Faster code at runtime in production, without special-case setup for this flow."
      - id: d
        text: "Automatic fixing of found bugs without a developer for any payload and any deploy target."
    correct: [a]
    explanation: "A test on old behavior fails as soon as a change breaks it - that is protection from regressions. Tests do not prove the absence of bugs, do not speed up runtime, and fix nothing themselves."
    variants:
      - prompt: "What does 'tests as specification' mean?"
        choices:
          - id: a
            text: "A well-named test is an executable description of what the code must do, and it does not go stale silently."
          - id: b
            text: "Tests fully replace any other project documentation, without special-case setup for this flow."
          - id: c
            text: "A spec is only written after all tests turn green for any payload and any deploy target."
          - id: d
            text: "Every test must check the whole module at once as a complete account of that behavior."
        correct: [a]
        explanation: "A test states a behavior requirement in executable form: once it diverges from the code, it fails and forces an update, while text documentation goes stale unnoticed."
      - prompt: "What is the value of fast feedback from tests?"
        choices:
          - id: a
            text: "Changing code, you learn whether it works in seconds, not after manually clicking through the whole app."
          - id: b
            text: "Tests remove the need to ever run the application at all."
          - id: c
            text: "The longer a test suite takes to run, the more reliable the result as the three required system parts."
          - id: d
            text: "Feedback is useful only for e2e tests, not for unit tests."
        correct: [a]
        explanation: "The test suite answers 'did I break anything' instantly and without your attention - that is the fast feedback tests are kept fast for."

  - id: foundations-pyramid-001
    concept: testing-foundations
    type: theory-quiz
    difficulty: 2
    prompt: "Why does a healthy testing pyramid have many unit tests and few e2e tests?"
    choices:
      - id: a
        text: "Unit tests are fast, cheap, and isolated, while e2e tests are slow and brittle, so confidence rests on a cheap base and the expensive top stays rare."
      - id: b
        text: "e2e tests pinpoint the exact broken line more precisely, so few are enough for any payload and any deploy target."
      - id: c
        text: "Unit tests exercise the whole scenario end to end, so you need a lot of them; the system does not allow any other correct behavior."
      - id: d
        text: "It is just a random tradition; the ratio does not affect suite reliability as a complete account of that behavior."
    correct: [a]
    explanation: "The higher a test sits in the pyramid, the more expensive and slower it is, and the worse it localizes a break. So confidence is built on a mass of fast unit tests, while slow e2e tests are kept for a few critical end-to-end scenarios."
    variants:
      - prompt: "How does an e2e test differ from a unit test?"
        choices:
          - id: a
            text: "e2e runs the whole scenario through the real interface, while unit checks one unit of code in isolation."
          - id: b
            text: "e2e is always always faster than unit because it does not touch the interface."
          - id: c
            text: "A unit test must spin up a real database, an e2e test does not as the three required system parts."
          - id: d
            text: "There is no difference; they are two names for the same thing."
        correct: [a]
        explanation: "Unit checks a small unit (a function, a method) in isolation, quickly; e2e drives the whole user path through the real interface - hence its slowness and brittleness."
      - prompt: "Why are e2e tests called brittle?"
        choices:
          - id: a
            text: "They can fail because of shifted markup or a network timeout rather than an actual logic bug."
          - id: b
            text: "They check too little code, so they often miss bugs as the three required system parts."
          - id: c
            text: "They run in milliseconds and always do not have time to load the page."
          - id: d
            text: "They always do not use the assert statement and so are unreliable."
        correct: [a]
        explanation: "e2e goes through the whole stack and the real interface, so unrelated causes - markup, network, timing - break it regardless of logic. That is the price of its breadth of coverage."

  - id: foundations-aaa-blanks-001
    concept: testing-foundations
    type: fill-in-blanks
    difficulty: 1
    prompt: "Fill in the names of the three test phases in the AAA pattern (in English, as in the literature)."
    template: |
      Phase {{arrange}}: prepare data and environment for the check.
      Phase {{act}}: perform exactly one action under test.
      Phase {{assert}}: compare the result you got with the expectation.
    blanks:
      arrange:
        accept: ["Arrange", "arrange"]
      act:
        accept: ["Act", "act"]
      assert:
        accept: ["Assert", "assert"]
    variants:
      - prompt: "Fill in the statement and the outcome of checking the result in the Assert phase."
        template: |
          To compare the result, you write an {{keyword}} statement with a condition.
          If the condition is false, an {{error}} is raised and the test is considered failed.
        blanks:
          keyword:
            accept: ["assert"]
          error:
            accept: ["AssertionError"]
      - prompt: "Fill in the blanks for the behavioral-style version of the same pattern (Given-When-Then)."
        template: |
          Step {{given}}: given the initial state.
          Step {{when}}: when the action is performed.
          Step {{then}}: then this result is expected.
        blanks:
          given:
            accept: ["Given", "given"]
          when:
            accept: ["When", "when"]
          then:
            accept: ["Then", "then"]

  - id: foundations-missing-assert-001
    concept: testing-foundations
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? It models a test function with no assert: the comparison is computed but goes nowhere. Only the final line is printed."
    snippet: |
      def shipping_cost(total):
          return 0 if total >= 3000 else 500

      def fake_test():
          shipping_cost(3500) == 0
          return "test passed"

      print(fake_test())
    expected:
      kind: stdout
      value: "test passed"
    hints:
      - "A test without assert cannot fail: the expression `.. == 0` produces a boolean value that is immediately discarded. What does the function return no matter what?"
      - "The comparison line checks nothing and does not stop execution. The function always reaches return."
    variants:
      - snippet: |
          def shipping_cost(total):
              return 0 if total >= 3000 else 500

          result = shipping_cost(3500) == 0
          print(result)
        expected:
          kind: stdout
          value: "True"
      - snippet: |
          def shipping_cost(total):
              return 0 if total >= 3000 else 500

          result = shipping_cost(1500) == 0
          print(result)
        expected:
          kind: stdout
          value: "False"

  - id: foundations-flaky-shared-state-001
    concept: testing-foundations
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It models two tests sharing a list: the first leaves a trace, the second sees it. The length of the list after both is printed."
    snippet: |
      shared = []

      def test_a():
          shared.append("a")

      def test_b():
          shared.append("b")

      test_a()
      test_b()
      print(len(shared))
    expected:
      kind: stdout
      value: "2"
    hints:
      - "The tests are not isolated: both write to the same list, and the first one's trace does not vanish before the second runs. How many items build up?"
      - "The `shared` list is created once, outside. Each call appends an item, clearing nothing."
    variants:
      - snippet: |
          def make_test():
              local = []
              local.append("x")
              return len(local)

          first = make_test()
          second = make_test()
          print(first, second)
        expected:
          kind: stdout
          value: "1 1"
      - snippet: |
          shared = []

          def run(name):
              shared.append(name)
              return len(shared)

          print(run("a"), run("b"), run("c"))
        expected:
          kind: stdout
          value: "1 2 3"

  - id: foundations-good-test-traits-001
    concept: testing-foundations
    type: theory-quiz
    difficulty: 3
    prompt: "A test is sometimes green, sometimes red, even though the code has not changed. Which property of a good test does it break, and why is that harmful?"
    choices:
      - id: a
        text: "Determinism: the verdict must be the same on the same code, otherwise people stop trusting the test and it gets ignored."
      - id: b
        text: "Speed: such a test is simply too slow but otherwise reliable as a complete account of that behavior."
      - id: c
        text: "Name readability: just rename the test and the flakiness stops as a complete account of that behavior."
      - id: d
        text: "It breaks nothing: flakiness is normal behavior for a useful test - that is how the API contract should be read."
    correct: [a]
    explanation: "A flaky test is nondeterministic: with unchanged code it sometimes reports PASS, sometimes FAIL. People stop trusting such a test and eventually disable it, losing the protection it was supposed to provide. The source of flakiness (timing, network, shared state, order) needs to be eliminated."
    hints:
      - "List the four properties of a good test and ask which one is about 'same verdict on the same code'."
      - "Think about what happens to the team's trust in a test that goes red for no reason."

  - id: foundations-isolation-challenge-001
    concept: testing-foundations
    type: predict-output
    difficulty: 4
    prompt: "What does the program print? It compares isolated and non-isolated counting: one function accumulates in a shared list, the other in its own local one. The difference of their final results is printed."
    snippet: |
      shared = []

      def leaky(item):
          shared.append(item)
          return len(shared)

      def clean(item):
          local = []
          local.append(item)
          return len(local)

      leaky_last = 0
      clean_last = 0
      for x in ["a", "b", "c"]:
          leaky_last = leaky(x)
          clean_last = clean(x)

      print(leaky_last - clean_last)
    expected:
      kind: stdout
      value: "2"
    hints:
      - "The non-isolated function accumulates state across calls, the isolated one starts from a clean slate each time. What is each final result after three iterations?"
      - "After three iterations `leaky` has accumulated all three items in the shared list, while `clean` each time returned the length of a fresh single-item list."
      - "The final `leaky_last` equals the total number of calls, and `clean_last` equals one. The difference is the count of extra accumulated items."
