exercises:
  - id: pytest-basics-assert-intro-001
    concept: pytest-basics
    type: theory-quiz
    difficulty: 1
    prompt: "Почему в pytest можно писать обычный `assert x == y` вместо `self.assertEqual(x, y)` и при провале всё равно видеть оба значения?"
    choices:
      - id: a
        text: "pytest при импорте переписывает assert (интроспекция) и встраивает сбор промежуточных значений, поэтому печатает, чему равнялись операнды."
      - id: b
        text: "Встроенный оператор `assert` в Python сам по себе печатает оба операнда при провале на любом пути обработки запроса."
      - id: c
        text: "pytest запрещает обычный assert и требует всегда использовать assertEqual, во всех сценариях без дополнительной настройки."
      - id: d
        text: "Значения видны только если обернуть assert в `try/except`, независимо от входных данных и окружения."
    correct: [a]
    explanation: "Стандартный `assert` при провале даёт лишь `AssertionError` без подробностей. pytest на этапе импорта тестового модуля переписывает каждый assert, добавляя сбор подвыражений - отсюда подробное сообщение без единого assert-метода."
    variants:
      - prompt: "Что такое node id в pytest?"
        choices:
          - id: a
            text: "Адрес одного теста вида `файл::функция`, по которому его запускают точечно."
          - id: b
            text: "Случайный числовой идентификатор, который pytest присваивает каждому прогону."
          - id: c
            text: "Имя маркера, навешенного на тест."
          - id: d
            text: "Хеш содержимого тестовой функции для кеширования."
        correct: [a]
        explanation: "Node id - это путь к конкретному тесту, например `tests/test_cart.py::test_total`. По нему запускают ровно один тест, не гоняя весь набор."
      - prompt: "Что делает флаг `-k` при запуске pytest?"
        choices:
          - id: a
            text: "Отбирает тесты по булеву выражению над подстроками их имён (можно and/or/not)."
          - id: b
            text: "Задаёт количество параллельных процессов для прогона."
          - id: c
            text: "Включает подробный вывод по каждому тесту как полное описание этого поведения."
          - id: d
            text: "Запускает только тесты, помеченные определённым маркером."
        correct: [a]
        explanation: "`-k` принимает выражение по подстроке имени: `-k \"total and not refund\"` запустит тесты, в имени которых есть total, но нет refund. Это не регулярка, а булева логика по именам. По маркеру отбирает `-m`."

  - id: pytest-basics-parametrize-quiz-001
    concept: pytest-basics
    type: theory-quiz
    difficulty: 2
    prompt: "Тест помечен `@pytest.mark.parametrize` с четырьмя наборами данных. Один набор приводит к падению. Что произойдёт с остальными?"
    choices:
      - id: a
        text: "Это четыре независимых тест-кейса: упавший падает, остальные три отрабатывают и попадают в отчёт как пройденные."
      - id: b
        text: "Весь тест считается одним: первое падение прерывает прогон, остальные наборы не проверяются."
      - id: c
        text: "Параметризация просто крутит цикл внутри одного теста, поэтому в отчёте всегда один результат."
      - id: d
        text: "После падения pytest перезапускает все наборы с начала до первого успеха."
    correct: [a]
    explanation: "`parametrize` разворачивает тест в N независимых кейсов - по одному на набор. Падение одного не мешает остальным, и по отчёту сразу видно, какой именно вход сломался."
    variants:
      - prompt: "Зачем используют `@pytest.mark.parametrize`?"
        choices:
          - id: a
            text: "Чтобы прогнать один тест на многих наборах данных без копирования функции."
          - id: b
            text: "Чтобы запускать тесты в случайном порядке и ловить гонки."
          - id: c
            text: "Чтобы пометить тест как ожидаемо падающий до починки бага."
          - id: d
            text: "Чтобы тест всегда выполнялся в отдельном процессе ОС."
        correct: [a]
        explanation: "Параметризация - главный приём против дублирования: вместо пяти почти одинаковых функций одна с пятью наборами. Новый случай = одна строка в списке."
      - prompt: "Чем `@pytest.mark.xfail` отличается от `@pytest.mark.skip`?"
        choices:
          - id: a
            text: "skip не запускает тест; xfail запускает и ждёт падения, успех - xpass."
          - id: b
            text: "Это два имени одного и того же маркера с разным синтаксисом."
          - id: c
            text: "xfail не запускает тест, а skip запускает и ждёт падения."
          - id: d
            text: "skip применим только к классам, xfail - только к функциям."
        correct: [a]
        explanation: "`skip` полностью пропускает тест. `xfail` помечает ожидаемо падающий: его падение - это `xfail` и прогон остаётся зелёным, а если тест вдруг прошёл - `xpass`, и pytest подсказывает, что баг, возможно, починили и метку пора снять."

  - id: pytest-basics-parametrize-fanout-001
    concept: pytest-basics
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Она моделирует fan-out параметризации: каждый набор `(total, expected)` прогоняется через проверку, результаты собираются в список. Печатается, сколько кейсов прошло."
    snippet: |
      def shipping_cost(total):
          return 0 if total >= 3000 else 500

      cases = [(3500, 0), (3000, 0), (1500, 500), (0, 500)]
      results = [shipping_cost(total) == expected for total, expected in cases]
      print(results.count(True))
    expected:
      kind: stdout
      value: "4"
    hints:
      - "Каждый кортеж - отдельный кейс параметризации. Проверьте, сходится ли фактическая стоимость с ожидаемой в каждом из четырёх наборов."
      - "При `total >= 3000` стоимость 0, иначе 500. Сверьте это с ожидаемым значением в каждом кортеже и посчитайте, сколько совпало."
    variants:
      - snippet: |
          def shipping_cost(total):
              return 0 if total >= 3000 else 500

          cases = [(3500, 0), (1500, 0), (0, 0)]
          results = [shipping_cost(total) == expected for total, expected in cases]
          print(results.count(True))
        expected:
          kind: stdout
          value: "1"
      - snippet: |
          def shipping_cost(total):
              return 0 if total >= 3000 else 500

          cases = [(3500, 0), (2999, 500), (5000, 0)]
          results = [shipping_cost(total) == expected for total, expected in cases]
          print(results.count(False))
        expected:
          kind: stdout
          value: "0"

  - id: pytest-basics-k-select-001
    concept: pytest-basics
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она моделирует выбор тестов флагом `-k \"total and not refund\"`: из имён остаются те, где есть 'total', но нет 'refund'. Печатается число отобранных тестов."
    snippet: |
      tests = [
          "test_total",
          "test_total_refund",
          "test_cart_total",
          "test_refund",
          "test_count",
      ]

      selected = [t for t in tests if "total" in t and "refund" not in t]
      print(len(selected))
    expected:
      kind: stdout
      value: "2"
    hints:
      - "Выражение `-k` - это булева логика по подстрокам имени, не регулярка. Какие имена содержат 'total' и при этом не содержат 'refund'?"
      - "`test_total` и `test_cart_total` подходят; `test_total_refund` отсеивается из-за 'refund', а `test_refund` и `test_count` - из-за отсутствия 'total'."
    variants:
      - snippet: |
          tests = [
              "test_total",
              "test_total_refund",
              "test_cart_total",
              "test_refund",
              "test_count",
          ]

          selected = [t for t in tests if "total" in t or "count" in t]
          print(len(selected))
        expected:
          kind: stdout
          value: "4"
      - snippet: |
          tests = [
              "test_login",
              "test_logout",
              "test_log_format",
              "test_count",
          ]

          selected = [t for t in tests if "log" in t and "out" not in t]
          print(len(selected))
        expected:
          kind: stdout
          value: "2"

  - id: pytest-basics-shared-param-challenge-001
    concept: pytest-basics
    type: predict-output
    difficulty: 4
    prompt: "Что выведет программа? Она показывает ловушку параметризации общим изменяемым объектом: два набора ссылаются на ОДИН список, тест каждого добавляет элемент. Печатаются длины, увиденные первым и вторым кейсом."
    snippet: |
      shared = []

      def run_case(data):
          data.append(1)
          return len(data)

      params = [shared, shared]
      seen = [run_case(d) for d in params]
      print(seen)
    expected:
      kind: stdout
      value: "[1, 2]"
    hints:
      - "Параметризация не копирует объекты: оба набора - это одна и та же ссылка `shared`. Что накопится в списке после двух append?"
      - "Первый кейс увидит длину 1, но список не обнуляется перед вторым - это тот же объект. Второй кейс добавит ещё элемент к уже непустому списку."
      - "После первого вызова список = [1] (длина 1). Второй вызов работает с тем же списком и делает его [1, 1] - длина 2."
