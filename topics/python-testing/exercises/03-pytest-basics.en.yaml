exercises:
  - id: pytest-basics-assert-intro-001
    concept: pytest-basics
    type: theory-quiz
    difficulty: 1
    prompt: "Why can you write a plain `assert x == y` in pytest instead of `self.assertEqual(x, y)` and still see both values on failure?"
    choices:
      - id: a
        text: "pytest rewrites assert on import (introspection) and embeds collection of intermediate values, so it prints what the operands equaled."
      - id: b
        text: "Python's built-in `assert` statement prints both operands on failure by itself."
      - id: c
        text: "pytest forbids plain assert and always requires assertEqual."
      - id: d
        text: "The values are visible only if you wrap assert in `try/except`."
    correct: [a]
    explanation: "A plain `assert` on failure gives only `AssertionError` with no detail. pytest rewrites every assert when it imports a test module, adding collection of subexpressions - hence the detailed message without a single assert method."
    variants:
      - prompt: "What is a node id in pytest?"
        choices:
          - id: a
            text: "The address of a single test, shaped like `file::function`, used to run it individually."
          - id: b
            text: "A random numeric id pytest assigns to each run."
          - id: c
            text: "The name of a marker attached to a test."
          - id: d
            text: "A hash of the test function's content used for caching."
        correct: [a]
        explanation: "A node id is the path to a specific test, e.g. `tests/test_cart.py::test_total`. It runs exactly that one test without running the whole suite."
      - prompt: "What does the `-k` flag do when running pytest?"
        choices:
          - id: a
            text: "Selects tests by a boolean expression over substrings of their names (and/or/not allowed)."
          - id: b
            text: "Sets the number of parallel processes for the run."
          - id: c
            text: "Turns on verbose output for each test."
          - id: d
            text: "Runs only tests marked with a specific marker."
        correct: [a]
        explanation: "`-k` takes a substring-based name expression: `-k \"total and not refund\"` runs tests whose name contains total but not refund. It is boolean logic on names, not a regex. Selecting by marker is `-m`."

  - id: pytest-basics-parametrize-quiz-001
    concept: pytest-basics
    type: theory-quiz
    difficulty: 2
    prompt: "A test is marked with `@pytest.mark.parametrize` and four data sets. One set causes a failure. What happens to the rest?"
    choices:
      - id: a
        text: "These are four independent test cases: the failing one fails, the other three run and are reported as passed."
      - id: b
        text: "The whole test counts as one: the first failure stops the run and the remaining sets are not checked."
      - id: c
        text: "Parametrize just loops inside a single test, so the report always shows one result."
      - id: d
        text: "After a failure pytest reruns all sets from the start until the first success."
    correct: [a]
    explanation: "`parametrize` expands a test into N independent cases - one per set. One failing does not block the rest, and the report immediately shows which input broke."
    variants:
      - prompt: "Why do you use `@pytest.mark.parametrize`?"
        choices:
          - id: a
            text: "To run the same test against many data sets without copying the function - one test expands into N cases."
          - id: b
            text: "To run tests in a random order."
          - id: c
            text: "To mark a test as expected to fail."
          - id: d
            text: "To run a test in a separate process."
        correct: [a]
        explanation: "Parametrization is the main tool against duplication: instead of five near-identical functions, one function with five data sets. A new case is one extra line in the list."
      - prompt: "How does `@pytest.mark.xfail` differ from `@pytest.mark.skip`?"
        choices:
          - id: a
            text: "skip does not run the test at all; xfail runs it, expects a failure (which does not turn the run red), and a surprise pass is flagged as xpass."
          - id: b
            text: "They are two names for the same marker."
          - id: c
            text: "xfail does not run the test, and skip runs it and expects failure."
          - id: d
            text: "skip only applies to classes, xfail only to functions."
        correct: [a]
        explanation: "`skip` fully skips the test. `xfail` marks it as expected to fail: its failure counts as `xfail` and the run stays green, while an unexpected pass is `xpass`, hinting the bug may be fixed and the marker should be removed."

  - id: pytest-basics-parametrize-fanout-001
    concept: pytest-basics
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? It models the fan-out of parametrization: each `(total, expected)` set is run through a check and the results are collected into a list. The count of passing cases is printed."
    snippet: |
      def shipping_cost(total):
          return 0 if total >= 3000 else 500

      cases = [(3500, 0), (3000, 0), (1500, 500), (0, 500)]
      results = [shipping_cost(total) == expected for total, expected in cases]
      print(results.count(True))
    expected:
      kind: stdout
      value: "4"
    hints:
      - "Each tuple is a separate parametrization case. Check whether the actual cost matches the expected value in each of the four sets."
      - "When `total >= 3000` the cost is 0, otherwise 500. Compare that with the expected value in each tuple and count the matches."
    variants:
      - snippet: |
          def shipping_cost(total):
              return 0 if total >= 3000 else 500

          cases = [(3500, 0), (1500, 0), (0, 0)]
          results = [shipping_cost(total) == expected for total, expected in cases]
          print(results.count(True))
        expected:
          kind: stdout
          value: "1"
      - snippet: |
          def shipping_cost(total):
              return 0 if total >= 3000 else 500

          cases = [(3500, 0), (2999, 500), (5000, 0)]
          results = [shipping_cost(total) == expected for total, expected in cases]
          print(results.count(False))
        expected:
          kind: stdout
          value: "0"

  - id: pytest-basics-k-select-001
    concept: pytest-basics
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It models selecting tests with the flag `-k \"total and not refund\"`: names remain that contain 'total' but not 'refund'. The count of selected tests is printed."
    snippet: |
      tests = [
          "test_total",
          "test_total_refund",
          "test_cart_total",
          "test_refund",
          "test_count",
      ]

      selected = [t for t in tests if "total" in t and "refund" not in t]
      print(len(selected))
    expected:
      kind: stdout
      value: "2"
    hints:
      - "The `-k` expression is boolean logic on substrings of names, not a regex. Which names contain 'total' and do not contain 'refund'?"
      - "`test_total` and `test_cart_total` qualify; `test_total_refund` is dropped because of 'refund', and `test_refund` and `test_count` are dropped for missing 'total'."
    variants:
      - snippet: |
          tests = [
              "test_total",
              "test_total_refund",
              "test_cart_total",
              "test_refund",
              "test_count",
          ]

          selected = [t for t in tests if "total" in t or "count" in t]
          print(len(selected))
        expected:
          kind: stdout
          value: "4"
      - snippet: |
          tests = [
              "test_login",
              "test_logout",
              "test_log_format",
              "test_count",
          ]

          selected = [t for t in tests if "log" in t and "out" not in t]
          print(len(selected))
        expected:
          kind: stdout
          value: "2"

  - id: pytest-basics-shared-param-challenge-001
    concept: pytest-basics
    type: predict-output
    difficulty: 4
    prompt: "What does the program print? It shows the pitfall of parametrizing with a shared mutable object: two sets reference the SAME list, and each case's test appends an item. The lengths seen by the first and second case are printed."
    snippet: |
      shared = []

      def run_case(data):
          data.append(1)
          return len(data)

      params = [shared, shared]
      seen = [run_case(d) for d in params]
      print(seen)
    expected:
      kind: stdout
      value: "[1, 2]"
    hints:
      - "Parametrization does not copy objects: both entries are the same reference `shared`. What builds up in the list after two appends?"
      - "The first case sees length 1, but the list is not reset before the second - it is the same object. The second case appends to an already non-empty list."
      - "After the first call the list is [1] (length 1). The second call works on the same list and makes it [1, 1] - length 2."
