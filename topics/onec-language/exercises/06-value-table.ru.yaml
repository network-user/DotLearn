exercises:
  - id: vt-what-quiz-001
    concept: value-table
    type: theory-quiz
    difficulty: 1
    prompt: "Что такое ТаблицаЗначений во встроенном языке?"
    choices:
      - id: a
        text: "Универсальная коллекция в виде таблицы: набор именованных колонок и произвольное число строк, живущая в памяти."
      - id: b
        text: "Таблица в базе данных, к которой обращаются напрямую."
      - id: c
        text: "Способ хранить одно число с описанием."
      - id: d
        text: "Другое название массива."
    correct: [a]
    explanation: "Таблица значений это табличная коллекция в оперативной памяти: именованные колонки и любое число строк, с поиском, итогами и группировкой. Табличные части документов устроены так же."
    variants:
      - prompt: "Что делает метод Итог(\"Сумма\") у таблицы значений?"
        choices:
          - id: a
            text: "Возвращает сумму значений числовой колонки Сумма по всем строкам."
          - id: b
            text: "Добавляет новую строку в конец таблицы."
          - id: c
            text: "Сортирует таблицу по колонке Сумма."
          - id: d
            text: "Удаляет колонку Сумма."
        correct: [a]
        explanation: "Итог складывает значения указанной числовой колонки по всем строкам таблицы и возвращает результат."
      - prompt: "Что делает метод Свернуть?"
        choices:
          - id: a
            text: "Группирует строки по указанным колонкам и суммирует числовые колонки внутри групп."
          - id: b
            text: "Удаляет из таблицы все строки."
          - id: c
            text: "Меняет местами строки и колонки."
          - id: d
            text: "Сохраняет таблицу в файл."
        correct: [a]
        explanation: "Свернуть работает как GROUP BY: строки с одинаковыми значениями колонок группировки схлопываются в одну, а числовые колонки суммируются. При этом метод меняет саму таблицу."

  - id: vt-build-blanks-001
    concept: value-table
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите создание таблицы: добавление колонки и добавление строки."
    template: |
      Товары = Новый ТаблицаЗначений;
      Товары.{{cols}}.Добавить("Наименование");
      Строка = Товары.{{add}}();
      Строка.Наименование = "Хлеб";
    blanks:
      cols:
        accept: ["Колонки", "колонки"]
        accept_regex: '^\s*[Кк]олонки\s*$'
      add:
        accept: ["Добавить", "добавить"]
        accept_regex: '^\s*[Дд]обавить\s*$'
    variants:
      - prompt: "Допишите вызов, который вернёт сумму по числовой колонке «Сумма»."
        template: |
          Всего = Товары.{{method}}("Сумма");
        blanks:
          method:
            accept: ["Итог", "итог"]
            accept_regex: '^\s*[Ии]тог\s*$'
      - prompt: "Допишите поиск всех строк, у которых Наименование равно «Хлеб»."
        template: |
          Найденные = Товары.{{method}}(Новый Структура("Наименование", "Хлеб"));
        blanks:
          method:
            accept: ["НайтиСтроки", "найтистроки"]
            accept_regex: '^\s*[Нн]айти[Сс]троки\s*$'

  - id: vt-count-predict-001
    concept: value-table
    type: predict-output
    difficulty: 2
    prompt: "Что выведет Сообщить? Запишите результат в точности."
    snippet: |
      Товары = Новый ТаблицаЗначений;
      Товары.Колонки.Добавить("Наименование");
      Товары.Колонки.Добавить("Сумма");

      Строка = Товары.Добавить();
      Строка.Наименование = "Хлеб";
      Строка.Сумма = 50;

      Строка = Товары.Добавить();
      Строка.Наименование = "Сыр";
      Строка.Сумма = 120;

      Сообщить(Товары.Количество());
    expected:
      kind: stdout
      value: "2"
    hints:
      - "Количество() возвращает число строк. Посчитайте, сколько раз вызвали Товары.Добавить()."
    variants:
      - prompt: "Что выведет Сообщить? Итог складывает числовую колонку по всем строкам."
        snippet: |
          Товары = Новый ТаблицаЗначений;
          Товары.Колонки.Добавить("Наименование");
          Товары.Колонки.Добавить("Сумма");

          Строка = Товары.Добавить();
          Строка.Наименование = "Хлеб";
          Строка.Сумма = 50;

          Строка = Товары.Добавить();
          Строка.Наименование = "Сыр";
          Строка.Сумма = 120;

          Сообщить(Товары.Итог("Сумма"));
        expected:
          kind: stdout
          value: "170"
      - prompt: "Что выведет Сообщить? Обратите внимание на индекс строки."
        snippet: |
          Товары = Новый ТаблицаЗначений;
          Товары.Колонки.Добавить("Наименование");

          Строка = Товары.Добавить();
          Строка.Наименование = "Хлеб";

          Строка = Товары.Добавить();
          Строка.Наименование = "Сыр";

          Сообщить(Товары[0].Наименование);
        expected:
          kind: stdout
          value: "Хлеб"

  - id: vt-filter-sum-predict-001
    concept: value-table
    type: predict-output
    difficulty: 3
    prompt: "Код суммирует продажи только по строкам, где сумма не меньше 80. Что выведет Сообщить?"
    snippet: |
      Продажи = Новый ТаблицаЗначений;
      Продажи.Колонки.Добавить("Товар");
      Продажи.Колонки.Добавить("Сумма");

      Строка = Продажи.Добавить();
      Строка.Товар = "Хлеб";
      Строка.Сумма = 50;

      Строка = Продажи.Добавить();
      Строка.Товар = "Молоко";
      Строка.Сумма = 80;

      Строка = Продажи.Добавить();
      Строка.Товар = "Сыр";
      Строка.Сумма = 120;

      Итог = 0;
      Для Каждого СтрокаТаблицы Из Продажи Цикл
          Если СтрокаТаблицы.Сумма >= 80 Тогда
              Итог = Итог + СтрокаТаблицы.Сумма;
          КонецЕсли;
      КонецЦикла;
      Сообщить(Итог);
    expected:
      kind: stdout
      value: "200"
    hints:
      - "Условие отбирает строки перед прибавлением. Решите, какие строки проходят проверку Сумма >= 80, а какие нет."
      - "Порог «не меньше 80» пропускает строки с суммами 80 и 120, но отбрасывает 50. Сложите прошедшие."
