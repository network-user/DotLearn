exercises:
  - id: prim-types-quiz-001
    concept: primitive-types
    type: theory-quiz
    difficulty: 1
    prompt: "Какие из перечисленных относятся к примитивным типам встроенного языка? Отметьте все верные."
    choices:
      - id: a
        text: "Строка"
      - id: b
        text: "Число"
      - id: c
        text: "Массив"
      - id: d
        text: "Дата"
    correct: [a, b, d]
    explanation: "Строка, Число и Дата это примитивные типы (к ним относится ещё Булево). Массив это коллекция, а не примитив: он хранит набор значений."
    variants:
      - prompt: "Что вернёт вызов ТипЗнач(\"Москва\")?"
        choices:
          - id: a
            text: "Значение типа Тип для строки, то есть Тип(\"Строка\")."
          - id: b
            text: "Число 6 - длину строки Москва в символах."
          - id: c
            text: "Саму исходную строку Москва без преобразования."
          - id: d
            text: "Логическое значение Истина, потому что строка не пустая."
        correct: [a]
        explanation: "ТипЗнач возвращает тип значения как объект Тип. Для строки это Тип(\"Строка\"), и именно с ним сравнивают в условиях."
      - prompt: "Что означает значение Неопределено?"
        choices:
          - id: a
            text: "Отсутствие значения"
          - id: b
            text: "Число ноль."
          - id: c
            text: "Пустую строку."
          - id: d
            text: "Ошибку выполнения."
        correct: [a]
        explanation: "Неопределено это «значения ещё нет». Его отличают от NULL, который приходит из базы как отсутствующее значение в результате запроса."

  - id: prim-string-blanks-001
    concept: primitive-types
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите вызовы строковых функций: длина строки и перевод в верхний регистр."
    template: |
      Длина = {{f1}}("Москва");
      Верхний = {{f2}}("москва");
    blanks:
      f1:
        accept: ["СтрДлина", "стрдлина"]
        accept_regex: '^\s*[Сс]тр[Дд]лина\s*$'
      f2:
        accept: ["ВРег", "врег"]
        accept_regex: '^\s*[Вв]рег\s*$'
    variants:
      - prompt: "Допишите вызов функции, которая заменит все дефисы на точки."
        template: |
          Результат = {{fn}}("2024-01-15", "-", ".");
        blanks:
          fn:
            accept: ["СтрЗаменить", "стрзаменить"]
            accept_regex: '^\s*[Сс]тр[Зз]аменить\s*$'
      - prompt: "Допишите: остаток от деления через оператор и отбрасывание дробной части функцией."
        template: |
          Остаток = 10 {{op}} 3;
          Целая = {{fn}}(7.9);
        blanks:
          op:
            accept: ["%"]
          fn:
            accept: ["Цел", "цел"]
            accept_regex: '^\s*[Цц]ел\s*$'

  - id: prim-string-predict-001
    concept: primitive-types
    type: predict-output
    difficulty: 2
    prompt: "Что выведет Сообщить? Запишите результат в точности."
    snippet: |
      Сообщить(СтрДлина("Казань"));
    expected:
      kind: stdout
      value: "6"
    hints:
      - "СтрДлина считает число символов в строке. Просто пересчитайте буквы в слове."
    variants:
      - prompt: "Что выведет Сообщить? ВРег переводит строку в верхний регистр."
        snippet: |
          Сообщить(ВРег("привет"));
        expected:
          kind: stdout
          value: "ПРИВЕТ"
      - prompt: "Что выведет Сообщить? Оператор % даёт остаток от деления."
        snippet: |
          Сообщить(10 % 3);
        expected:
          kind: stdout
          value: "1"

  - id: prim-substring-predict-001
    concept: primitive-types
    type: predict-output
    difficulty: 3
    prompt: "Код выделяет фамилию из строки «Фамилия Имя». Что выведет Сообщить?"
    snippet: |
      ФИО = "Иванов Иван";
      Позиция = СтрНайти(ФИО, " ");
      Фамилия = Лев(ФИО, Позиция - 1);
      Сообщить(Фамилия);
    expected:
      kind: stdout
      value: "Иванов"
    hints:
      - "Строковые функции 1-индексные: первый символ это позиция 1. Сначала найдите, на какой позиции стоит пробел."
      - "Пробел в «Иванов Иван» стоит на позиции 7. Лев берёт первые N символов, а Позиция минус один это как раз число символов до пробела."
