exercises:
  - id: syntax-equality-quiz-001
    concept: syntax-basics
    type: theory-quiz
    difficulty: 1
    prompt: "Как во встроенном языке 1С проверить два значения на равенство внутри условия Если?"
    choices:
      - id: a
        text: "Знаком =, тем же, что и в"
      - id: b
        text: "Знаком ==, как в Си-подобных языках."
      - id: c
        text: "Словом РАВНО."
      - id: d
        text: "Знаком :=."
    correct: [a]
    explanation: "Во встроенном языке знак = один и работает в двух ролях: слева от имени переменной это присваивание, внутри условия это сравнение. Отдельного == в языке нет."
    variants:
      - prompt: "Какое слово обязательно закрывает блок условия Если?"
        choices:
          - id: a
            text: "КонецЕсли"
          - id: b
            text: "КонецУсловия"
          - id: c
            text: "ЗавершитьЕсли"
          - id: d
            text: "Конец"
        correct: [a]
        explanation: "Границы блока во встроенном языке задают ключевые слова, а не скобки. Условие открывается словом Если и закрывается словом КонецЕсли с точкой с запятой."
      - prompt: "Как во встроенном языке записывается операция «не равно»?"
        choices:
          - id: a
            text: "<>"
          - id: b
            text: "!="
          - id: c
            text: "НЕ="
          - id: d
            text: "=/="
        correct: [a]
        explanation: "«Не равно» записывается только как <>. Оператора != во встроенном языке не существует."

  - id: syntax-blocks-blanks-001
    concept: syntax-basics
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите лесенку условий, которая назначает скидку по сумме заказа."
    template: |
      Если Сумма {{op}} 100000 Тогда
          Скидка = 0.1;
      {{kw}} Сумма >= 30000 Тогда
          Скидка = 0.05;
      Иначе
          Скидка = 0;
      {{end}};
    blanks:
      op:
        accept: [">="]
      kw:
        accept: ["ИначеЕсли", "иначеесли"]
        accept_regex: '^\s*[Ии]наче[Ее]сли\s*$'
      end:
        accept: ["КонецЕсли", "конецесли"]
        accept_regex: '^\s*[Кк]онец[Ее]сли\s*$'
    variants:
      - prompt: "Допишите цикл со счётчиком, который складывает числа от 1 до 5."
        template: |
          Итог = 0;
          {{kw_for}} Счётчик = 1 {{kw_po}} 5 Цикл
              Итог = Итог + Счётчик;
          {{end}};
        blanks:
          kw_for:
            accept: ["Для", "для"]
          kw_po:
            accept: ["По", "по"]
          end:
            accept: ["КонецЦикла", "конеццикла"]
            accept_regex: '^\s*[Кк]онец[Цц]икла\s*$'
      - prompt: "Допишите цикл, который перебирает все элементы коллекции СписокТоваров."
        template: |
          {{kw}} Товар {{kw_iz}} СписокТоваров Цикл
              Сообщить(Товар);
          КонецЦикла;
        blanks:
          kw:
            accept: ["Для Каждого", "Для каждого", "для каждого"]
            accept_regex: '^\s*[Дд]ля\s+[Кк]аждого\s*$'
          kw_iz:
            accept: ["Из", "из"]

  - id: syntax-loop-sum-predict-001
    concept: syntax-basics
    type: predict-output
    difficulty: 2
    prompt: "Что выведет Сообщить в конце? Запишите результат в точности."
    snippet: |
      Итог = 0;
      Для Счётчик = 1 По 4 Цикл
          Итог = Итог + Счётчик;
      КонецЦикла;
      Сообщить(Итог);
    expected:
      kind: stdout
      value: "10"
    hints:
      - "Граница По 4 включается в диапазон, поэтому Счётчик по очереди примет значения 1, 2, 3 и 4. Накопитель Итог стартует с нуля и растёт на каждом витке."
    variants:
      - prompt: "Что выведет Сообщить в конце? Запишите результат в точности."
        snippet: |
          Итог = 0;
          Для Счётчик = 1 По 5 Цикл
              Итог = Итог + Счётчик;
          КонецЦикла;
          Сообщить(Итог);
        expected:
          kind: stdout
          value: "15"
      - prompt: "Что выведет Сообщить в конце? Считайте, сколько раз выполнилось тело цикла."
        snippet: |
          Остаток = 10;
          Шагов = 0;
          Пока Остаток > 0 Цикл
              Остаток = Остаток - 3;
              Шагов = Шагов + 1;
          КонецЦикла;
          Сообщить(Шагов);
        expected:
          kind: stdout
          value: "4"

  - id: syntax-continue-predict-001
    concept: syntax-basics
    type: predict-output
    difficulty: 3
    prompt: "Оператор Продолжить пропускает остаток тела и переходит к следующему витку. Что выведет Сообщить?"
    snippet: |
      Итог = 0;
      Для Счётчик = 1 По 5 Цикл
          Если Счётчик = 3 Тогда
              Продолжить;
          КонецЕсли;
          Итог = Итог + Счётчик;
      КонецЦикла;
      Сообщить(Итог);
    expected:
      kind: stdout
      value: "12"
    hints:
      - "Продолжить не выходит из цикла целиком, а лишь пропускает оставшуюся часть текущего витка. Спросите себя: на каком значении Счётчика прибавление к Итогу не произойдёт?"
      - "Виток со Счётчик = 3 доходит до Продолжить и пропускает строку с прибавлением. Значит в сумму войдут все числа от 1 до 5, кроме тройки."
