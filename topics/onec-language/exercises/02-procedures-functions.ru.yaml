exercises:
  - id: proc-export-quiz-001
    concept: procedures-functions
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает ключевое слово Экспорт в заголовке процедуры или функции?"
    choices:
      - id: a
        text: "Делает метод доступным для вызова из других модулей."
      - id: b
        text: "Выгружает результат метода в файл на диск."
      - id: c
        text: "Ускоряет выполнение метода."
      - id: d
        text: "Запрещает изменять параметры внутри метода."
    correct: [a]
    explanation: "Экспорт открывает метод наружу. Без него метод виден только внутри своего модуля; набор экспортных методов образует программный интерфейс модуля."
    variants:
      - prompt: "Чем функция принципиально отличается от процедуры?"
        choices:
          - id: a
            text: "Функция возвращает значение оператором Возврат, а процедура нет."
          - id: b
            text: "Процедура всегда работает быстрее функции."
          - id: c
            text: "Функция не может принимать параметры."
          - id: d
            text: "Процедуру нельзя объявить экспортной."
        correct: [a]
        explanation: "Смысловая разница именно в результате: функция вычисляет и возвращает значение, а процедура выполняет действие. Поэтому результат функции подставляют в выражение, а процедуру вызывают отдельным оператором."
      - prompt: "Что вернёт функция, если выполнение дойдёт до КонецФункции, так и не встретив Возврат со значением?"
        choices:
          - id: a
            text: "Неопределено."
          - id: b
            text: "Ноль."
          - id: c
            text: "Пустую строку."
          - id: d
            text: "Вызовет синтаксическую ошибку при компиляции."
        correct: [a]
        explanation: "Функция без явного Возврата со значением возвращает Неопределено. Ошибки не будет, но вызывающий код получит не то, что ждал, поэтому такую ситуацию считают признаком дефекта логики."

  - id: proc-declare-blanks-001
    concept: procedures-functions
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите функцию, которая возвращает площадь прямоугольника."
    template: |
      Функция ПлощадьПрямоугольника(Ширина, Высота)
          {{ret}} Ширина * Высота;
      {{end}}
    blanks:
      ret:
        accept: ["Возврат", "возврат"]
        accept_regex: '^\s*[Вв]озврат\s*$'
      end:
        accept: ["КонецФункции", "конецфункции"]
        accept_regex: '^\s*[Кк]онец[Фф]ункции\s*$'
    variants:
      - prompt: "Допишите экспортную процедуру, которую можно вызвать из другого модуля."
        template: |
          {{kw}} ПоказатьСообщение(Текст) {{exp}}
              Сообщить(Текст);
          {{end}}
        blanks:
          kw:
            accept: ["Процедура", "процедура"]
            accept_regex: '^\s*[Пп]роцедура\s*$'
          exp:
            accept: ["Экспорт", "экспорт"]
            accept_regex: '^\s*[Ээ]кспорт\s*$'
          end:
            accept: ["КонецПроцедуры", "конецпроцедуры"]
            accept_regex: '^\s*[Кк]онец[Пп]роцедуры\s*$'
      - prompt: "Допишите функцию: у параметра Ставка должно быть значение по умолчанию 20, а результат нужно вернуть."
        template: |
          Функция СуммаСНалогом(Сумма, Ставка {{eq}} 20)
              {{ret}} Сумма + Сумма * Ставка / 100;
          КонецФункции
        blanks:
          eq:
            accept: ["="]
          ret:
            accept: ["Возврат", "возврат"]
            accept_regex: '^\s*[Вв]озврат\s*$'

  - id: proc-default-predict-001
    concept: procedures-functions
    type: predict-output
    difficulty: 2
    prompt: "У параметра Ставка есть значение по умолчанию. Что выведет Сообщить?"
    snippet: |
      Функция Налог(Сумма, Ставка = 20)
          Возврат Сумма * Ставка / 100;
      КонецФункции

      Сообщить(Налог(1000));
    expected:
      kind: stdout
      value: "200"
    hints:
      - "При вызове второй аргумент опущен, значит Ставка берёт своё значение по умолчанию. Подставьте его в формулу и посчитайте."
    variants:
      - prompt: "Что выведет Сообщить теперь, когда ставка передана явно?"
        snippet: |
          Функция Налог(Сумма, Ставка = 20)
              Возврат Сумма * Ставка / 100;
          КонецФункции

          Сообщить(Налог(1000, 10));
        expected:
          kind: stdout
          value: "100"
      - prompt: "Что выведет Сообщить? Второй аргумент снова опущен."
        snippet: |
          Функция Налог(Сумма, Ставка = 20)
              Возврат Сумма * Ставка / 100;
          КонецФункции

          Сообщить(Налог(2000));
        expected:
          kind: stdout
          value: "400"

  - id: proc-by-reference-predict-001
    concept: procedures-functions
    type: predict-output
    difficulty: 3
    prompt: "Параметр Число объявлен без слова Знач. Что выведет Сообщить после вызова процедуры?"
    snippet: |
      Процедура Удвоить(Число)
          Число = Число * 2;
      КонецПроцедуры

      Значение = 5;
      Удвоить(Значение);
      Сообщить(Значение);
    expected:
      kind: stdout
      value: "10"
    hints:
      - "По умолчанию параметры передаются по ссылке. Подумайте, на что указывает Число внутри процедуры и что происходит с исходной переменной при присваивании."
      - "Раз слова Знач нет, Число это та же переменная Значение. Присваивание Число = Число * 2 меняет её саму, поэтому после вызова снаружи видно уже удвоенное число."
