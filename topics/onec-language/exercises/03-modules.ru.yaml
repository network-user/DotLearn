exercises:
  - id: mod-placement-quiz-001
    concept: modules
    type: theory-quiz
    difficulty: 1
    prompt: "Где по правилам следует разместить расчёт скидки, если он нужен и в документе «Заказ», и в фоновом задании?"
    choices:
      - id: a
        text: "В общем модуле: логика переиспользуется и не привязана к одному объекту."
      - id: b
        text: "В модуле формы заказа."
      - id: c
        text: "Скопировать в модуль объекта каждого документа, где он нужен."
      - id: d
        text: "В модуле объекта заказа, а фоновое задание пусть обращается к форме."
    correct: [a]
    explanation: "Переиспользуемая логика, не относящаяся к одному объекту, живёт в общем модуле. Оттуда её можно вызвать и из модуля объекта, и из фонового задания, не копируя код."
    variants:
      - prompt: "Где размещают обработчик события ПередЗаписью конкретного справочника?"
        choices:
          - id: a
            text: "В модуле объекта этого справочника."
          - id: b
            text: "В общем модуле."
          - id: c
            text: "В модуле формы списка."
          - id: d
            text: "В глобальном модуле приложения."
        correct: [a]
        explanation: "События конкретного объекта (ПередЗаписью, ОбработкаПроведения) обрабатываются в модуле объекта: там код имеет прямой доступ к реквизитам объекта."
      - prompt: "Где живёт обработчик события ЦенаПриИзменении поля ввода на форме документа?"
        choices:
          - id: a
            text: "В модуле формы."
          - id: b
            text: "В модуле объекта."
          - id: c
            text: "В модуле менеджера."
          - id: d
            text: "В общем серверном модуле."
        correct: [a]
        explanation: "Реакция на действия пользователя с элементами конкретной формы это ответственность модуля формы. Обработчики событий полей объявляют именно там."

  - id: mod-call-blanks-001
    concept: modules
    type: fill-in-blanks
    difficulty: 2
    prompt: "Экспортная функция ОкруглитьСумму объявлена в общем модуле РаботаСДеньгами. Допишите её вызов из другого модуля."
    template: |
      Итог = {{module}}.{{method}}(Сумма);
    blanks:
      module:
        accept: ["РаботаСДеньгами", "работасденьгами"]
        accept_regex: '^\s*[Рр]абота[Сс][Дд]еньгами\s*$'
      method:
        accept: ["ОкруглитьСумму", "округлитьсумму"]
        accept_regex: '^\s*[Оо]круглить[Сс]умму\s*$'
    variants:
      - prompt: "В модуле объекта нужно обратиться к собственному реквизиту Наименование через служебное слово. Допишите его."
        template: |
          Если {{ctx}}.Наименование = "" Тогда
              Отказ = Истина;
          КонецЕсли;
        blanks:
          ctx:
            accept: ["ЭтотОбъект", "этотобъект"]
            accept_regex: '^\s*[Ээ]тот[Оо]бъект\s*$'
      - prompt: "Экспортная процедура ЗаписатьСобытие объявлена в общем модуле Логирование. Допишите вызов."
        template: |
          {{module}}.{{method}}("Старт обработки");
        blanks:
          module:
            accept: ["Логирование", "логирование"]
            accept_regex: '^\s*[Лл]огирование\s*$'
          method:
            accept: ["ЗаписатьСобытие", "записатьсобытие"]
            accept_regex: '^\s*[Зз]аписать[Сс]обытие\s*$'

  - id: mod-manager-quiz-001
    concept: modules
    type: theory-quiz
    difficulty: 2
    prompt: "Чем модуль менеджера справочника отличается от модуля объекта?"
    choices:
      - id: a
        text: "Модуль объекта работает с конкретным экземпляром записи, а модуль менеджера с типом объекта в целом."
      - id: b
        text: "Модуль менеджера выполняется на клиенте, а модуль объекта на сервере."
      - id: c
        text: "Это два названия одного и того же модуля."
      - id: d
        text: "Модуль менеджера нужен только для отчётов."
    correct: [a]
    explanation: "Модуль объекта оперирует одним экземпляром (одной записью) и его реквизитами. Модуль менеджера работает с типом в целом, и туда удобно класть методы вроде «найти по коду» или «создать по шаблону», которым готовый объект не нужен."
    variants:
      - prompt: "Что делает флаг «Повторное использование возвращаемых значений» у общего модуля?"
        choices:
          - id: a
            text: "Кэширует результат экспортной функции для конкретного набора параметров."
          - id: b
            text: "Запрещает вызывать методы модуля дважды."
          - id: c
            text: "Ускоряет запись данных в базу."
          - id: d
            text: "Делает все методы модуля экспортными автоматически."
        correct: [a]
        explanation: "Флаг включает кэш: платформа запоминает результат функции для набора аргументов и на повторный вызов с теми же параметрами отдаёт готовое значение. Для часто меняющихся данных это опасно, потому что вернётся устаревший результат."
      - prompt: "Чем особенный глобальный общий модуль?"
        choices:
          - id: a
            text: "Его экспортные методы доступны без префикса имени модуля."
          - id: b
            text: "Он выполняется только на клиенте."
          - id: c
            text: "В нём нельзя объявлять функции, только процедуры."
          - id: d
            text: "Его методы недоступны из модулей объектов."
        correct: [a]
        explanation: "У глобального общего модуля экспортные методы вызываются напрямую по имени, как встроенные функции языка, без префикса ИмяМодуля."

  - id: mod-context-quiz-001
    concept: modules
    type: theory-quiz
    difficulty: 3
    prompt: "Клиентская процедура формы должна прочитать данные из базы. Как это правильно организовать?"
    choices:
      - id: a
        text: "Передать управление на сервер: в серверную процедуру формы или в серверный общий модуль с флагом «Вызов сервера»."
      - id: b
        text: "Прочитать базу прямо из клиентской процедуры."
      - id: c
        text: "Вынести чтение в глобальный клиентский модуль."
      - id: d
        text: "Обращение к базе с клиента невозможно ни при каких условиях."
    correct: [a]
    explanation: "Чтение и запись данных доступны на сервере. Клиентский код должен передать управление серверному контексту: серверной процедуре формы или серверному общему модулю с «Вызовом сервера». Платформа сама организует переход."
    hints:
      - "Вопрос не про синтаксис, а про то, где физически доступны данные. Вспомните, какой контекст (клиент или сервер) имеет право обращаться к базе."
      - "Работа с базой это серверная операция. Значит нужен способ перейти из клиентского контекста в серверный, а не пытаться читать базу на клиенте."
