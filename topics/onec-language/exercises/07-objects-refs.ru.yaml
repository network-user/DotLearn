exercises:
  - id: obj-ref-vs-object-quiz-001
    concept: objects-refs
    type: theory-quiz
    difficulty: 1
    prompt: "Чем ссылка на элемент справочника отличается от объекта?"
    choices:
      - id: a
        text: "Ссылка это лёгкий указатель на запись для чтения, а объект это «толстая» изменяемая версия"
      - id: b
        text: "Ссылка и объект это два названия одного и того же."
      - id: c
        text: "Ссылку можно менять и записывать, а объект только читать."
      - id: d
        text: "Объект нельзя хранить в реквизитах, а ссылку можно, потому что это разные виды данных."
    correct: [a]
    explanation: "Ссылка предназначена для чтения и удобна для хранения и передачи. Объект тяжелее, содержит все данные записи и допускает изменение и запись. Менять реквизит через ссылку нельзя."
    variants:
      - prompt: "Как из ссылки получить объект, который можно изменить и записать?"
        choices:
          - id: a
            text: "Вызвать метод Ссылка.ПолучитьОбъект()."
          - id: b
            text: "Написать Ссылка.Изменить()."
          - id: c
            text: "Просто присвоить реквизиту ссылки новое значение."
          - id: d
            text: "Объект из ссылки получить невозможно."
        correct: [a]
        explanation: "ПолучитьОбъект возвращает изменяемый объект записи. После правки реквизитов его сохраняют вызовом Записать."
      - prompt: "Что вернёт метод менеджера ПустаяСсылка()?"
        choices:
          - id: a
            text: "Незаполненную ссылку соответствующего"
          - id: b
            text: "Ошибку выполнения."
          - id: c
            text: "Число ноль."
          - id: d
            text: "Последний созданный элемент справочника."
        correct: [a]
        explanation: "ПустаяСсылка() даёт пустое значение ссылочного типа. Его удобно использовать для сравнения и как значение по умолчанию; заполненность проверяют функцией ЗначениеЗаполнено."

  - id: obj-modify-blanks-001
    concept: objects-refs
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите изменение элемента справочника: получить объект из ссылки и записать его после правки."
    template: |
      Объект = СсылкаКонтрагента.{{get}}();
      Объект.Наименование = "ООО Ромашка плюс";
      Объект.{{write}}();
    blanks:
      get:
        accept: ["ПолучитьОбъект", "получитьобъект"]
        accept_regex: '^\s*[Пп]олучить[Оо]бъект\s*$'
      write:
        accept: ["Записать", "записать"]
        accept_regex: '^\s*[Зз]аписать\s*$'
    variants:
      - prompt: "Допишите создание нового элемента справочника через менеджер."
        template: |
          НовыйКонтрагент = Справочники.Контрагенты.{{method}}();
          НовыйКонтрагент.Наименование = "ООО Ромашка";
          НовыйКонтрагент.Записать();
        blanks:
          method:
            accept: ["СоздатьЭлемент", "создатьэлемент"]
            accept_regex: '^\s*[Сс]оздать[Ээ]лемент\s*$'
      - prompt: "Допишите проверку заполненности реквизита-ссылки перед обращением к нему."
        template: |
          Если {{fn}}(Заказ.Контрагент) Тогда
              Сообщить(Заказ.Контрагент.Наименование);
          КонецЕсли;
        blanks:
          fn:
            accept: ["ЗначениеЗаполнено", "значениезаполнено"]
            accept_regex: '^\s*[Зз]начение[Зз]аполнено\s*$'

  - id: obj-shared-ref-predict-001
    concept: objects-refs
    type: predict-output
    difficulty: 3
    prompt: "Структуры присваиваются по ссылке. Что выведет Сообщить?"
    snippet: |
      А = Новый Структура("Счётчик", 0);
      Б = А;
      Б.Счётчик = 5;
      Сообщить(А.Счётчик);
    expected:
      kind: stdout
      value: "5"
    hints:
      - "Присваивание Б = А для составного значения не копирует данные. Подумайте, на один объект в памяти указывают А и Б или на два разных."
      - "А и Б это два имени одной и той же структуры. Изменение поля через Б это то же самое, что изменение через А, поэтому снаружи видно новое значение."

  - id: obj-dot-in-loop-quiz-001
    concept: objects-refs
    type: theory-quiz
    difficulty: 4
    prompt: "В цикле по 10000 строк для каждой строки читается СсылкаТовара.Наименование. Почему это узкое место и как сделать правильно?"
    choices:
      - id: a
        text: "Каждое обращение к реквизиту через ссылку читает базу, поэтому 10000 итераций"
      - id: b
        text: "Проблемы нет: платформа кэширует все реквизиты автоматически."
      - id: c
        text: "Виноват сам цикл Для Каждого, его нужно заменить на Пока."
      - id: d
        text: "Достаточно пометить переменную цикла словом Знач."
    correct: [a]
    explanation: "Данные реквизита лежат в базе, а не в ссылке, поэтому Ссылка.Реквизит это обращение к базе. Внутри цикла оно повторяется на каждой итерации. Массовое чтение выносят из цикла: получают все нужные данные одним запросом, а в цикле уже работают с готовым результатом."
    hints:
      - "Вспомните, где физически лежат данные реквизита, когда вы обращаетесь к ним через ссылку."
      - "Обращение к реквизиту через ссылку это чтение базы. В цикле оно умножается на число итераций, поэтому чтение выносят из цикла в один запрос."
