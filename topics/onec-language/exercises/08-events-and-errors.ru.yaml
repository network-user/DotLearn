exercises:
  - id: evt-try-purpose-quiz-001
    concept: events-and-errors
    type: theory-quiz
    difficulty: 1
    prompt: "Для чего нужна конструкция Попытка ... Исключение ... КонецПопытки?"
    choices:
      - id: a
        text: "Перехватить ошибку выполнения и обработать её, не прерывая программу аварийно."
      - id: b
        text: "Ускорить выполнение рискованного кода."
      - id: c
        text: "Объявить переменную с обработчиком."
      - id: d
        text: "Организовать цикл с повтором."
    correct: [a]
    explanation: "Если код в блоке Попытка падает, управление сразу уходит в блок Исключение, где ошибку можно обработать. Без этого ошибка прервала бы выполнение и показала системное сообщение."
    variants:
      - prompt: "Что означает установка Отказ = Истина в обработчике события ПередЗаписью?"
        choices:
          - id: a
            text: "Штатно отменить операцию: запись не будет выполнена."
          - id: b
            text: "Записать объект дважды."
          - id: c
            text: "Породить аварийное исключение."
          - id: d
            text: "Ничего не изменить, это просто пометка."
        correct: [a]
        explanation: "Параметр Отказ передаётся по ссылке. Присваивание Отказ = Истина это мягкая, штатная отмена операции по бизнес-правилу, а не авария."
      - prompt: "Что задаёт директива &НаСервере перед процедурой модуля формы?"
        choices:
          - id: a
            text: "Процедура выполняется на сервере и имеет доступ к базе данных."
          - id: b
            text: "Процедура выполняется в приложении пользователя (на клиенте)."
          - id: c
            text: "Процедуру запрещено вызывать из других процедур."
          - id: d
            text: "Процедура автоматически становится экспортной."
        correct: [a]
        explanation: "&НаСервере помечает процедуру как серверную: она выполняется на сервере, где есть доступ к данным и к контексту формы. Клиентский код к базе напрямую не обращается."

  - id: evt-try-blanks-001
    concept: events-and-errors
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите конструкцию перехвата ошибки: при сбое деления присвоить нулю."
    template: |
      {{try}}
          Результат = 10 / Делитель;
      {{catch}}
          Результат = 0;
      {{end}}
    blanks:
      try:
        accept: ["Попытка", "попытка"]
        accept_regex: '^\s*[Пп]опытка\s*$'
      catch:
        accept: ["Исключение", "исключение"]
        accept_regex: '^\s*[Ии]сключение\s*$'
      end:
        accept: ["КонецПопытки", "конецпопытки"]
        accept_regex: '^\s*[Кк]онец[Пп]опытки\s*$'
    variants:
      - prompt: "Допишите оператор, который порождает собственное исключение с текстом."
        template: |
          Если Остаток < 0 Тогда
              {{kw}} "Остаток не может быть отрицательным";
          КонецЕсли;
        blanks:
          kw:
            accept: ["ВызватьИсключение", "вызватьисключение"]
            accept_regex: '^\s*[Вв]ызвать[Ии]сключение\s*$'
      - prompt: "Допишите директиву, которая пометит процедуру формы как серверную."
        template: |
          &{{dir}}
          Процедура ПересчитатьИтог()
              Итог = Товары.Итог("Сумма");
          КонецПроцедуры
        blanks:
          dir:
            accept: ["НаСервере", "насервере"]
            accept_regex: '^\s*[Нн]а[Сс]ервере\s*$'

  - id: evt-catch-predict-001
    concept: events-and-errors
    type: predict-output
    difficulty: 2
    prompt: "Деление на ноль порождает исключение. Что выведет Сообщить?"
    snippet: |
      Результат = 0;
      Попытка
          Результат = 10 / 0;
      Исключение
          Результат = -1;
      КонецПопытки;
      Сообщить(Результат);
    expected:
      kind: stdout
      value: "-1"
    hints:
      - "Деление на ноль срывает выполнение строки в блоке Попытка. Проследите, куда уходит управление после сбоя и какое значение получит Результат."
    variants:
      - prompt: "Что выведет Сообщить? Ошибки здесь не происходит."
        snippet: |
          Результат = 0;
          Попытка
              Результат = 10 / 2;
          Исключение
              Результат = -1;
          КонецПопытки;
          Сообщить(Результат);
        expected:
          kind: stdout
          value: "5"
      - prompt: "Что выведет Сообщить? Строка «120» корректно приводится к числу."
        snippet: |
          Итог = 0;
          Попытка
              Итог = Число("120");
          Исключение
              Итог = -1;
          КонецПопытки;
          Сообщить(Итог);
        expected:
          kind: stdout
          value: "120"

  - id: evt-raise-predict-001
    concept: events-and-errors
    type: predict-output
    difficulty: 3
    prompt: "ВызватьИсключение обрывает нормальный поток. Что выведет Сообщить?"
    snippet: |
      Сообщение = "";
      Попытка
          ВызватьИсключение "Недостаточно средств";
          Сообщение = "Успех";
      Исключение
          Сообщение = "Ошибка перехвачена";
      КонецПопытки;
      Сообщить(Сообщение);
    expected:
      kind: stdout
      value: "Ошибка перехвачена"
    hints:
      - "После ВызватьИсключение управление немедленно уходит в блок Исключение. Спросите себя: успеет ли выполниться строка сразу за ним?"
      - "Строка с присваиванием «Успех» стоит после ВызватьИсключение в том же блоке, поэтому она не выполнится. Значение задаёт только блок Исключение."
