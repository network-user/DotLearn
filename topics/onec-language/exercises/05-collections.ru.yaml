exercises:
  - id: coll-index-quiz-001
    concept: collections
    type: theory-quiz
    difficulty: 1
    prompt: "С какого индекса начинается нумерация элементов массива во встроенном языке?"
    choices:
      - id: a
        text: "С нуля: первый элемент это Массив[0]."
      - id: b
        text: "С единицы: первый элемент это Массив[1]."
      - id: c
        text: "С -1."
      - id: d
        text: "Зависит от типа элементов массива."
    correct: [a]
    explanation: "Индексация коллекций начинается с нуля. Поэтому при обходе по индексу верхняя граница это Количество() минус один: у массива из двух элементов индексы 0 и 1."
    variants:
      - prompt: "Чем структура принципиально отличается от соответствия?"
        choices:
          - id: a
            text: "У структуры ключи это строковые идентификаторы, а у соответствия ключом может быть значение любого типа."
          - id: b
            text: "Структура не умеет хранить значения, только ключи."
          - id: c
            text: "Соответствие нельзя перебрать циклом Для Каждого."
          - id: d
            text: "Это два названия одной и той же коллекции."
        correct: [a]
        explanation: "Структура рассчитана на фиксированный набор именованных полей (ключ это идентификатор), а соответствие это словарь с произвольными ключами любого типа."
      - prompt: "Что вернёт Соответствие.Получить(Ключ), если такого ключа в соответствии нет?"
        choices:
          - id: a
            text: "Неопределено."
          - id: b
            text: "Ноль."
          - id: c
            text: "Пустую строку."
          - id: d
            text: "Прервёт выполнение с ошибкой."
        correct: [a]
        explanation: "Метод Получить для отсутствующего ключа возвращает Неопределено, а не прерывает код. Поэтому его берут, когда ключ может отсутствовать."

  - id: coll-create-blanks-001
    concept: collections
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите создание массива и добавление в него элемента."
    template: |
      Список = Новый {{type}};
      Список.{{method}}("Хлеб");
    blanks:
      type:
        accept: ["Массив", "массив"]
        accept_regex: '^\s*[Мм]ассив\s*$'
      method:
        accept: ["Добавить", "добавить"]
        accept_regex: '^\s*[Дд]обавить\s*$'
    variants:
      - prompt: "Допишите создание структуры и добавление в неё поля Наименование."
        template: |
          Контрагент = Новый {{type}};
          Контрагент.{{method}}("Наименование", "ООО Ромашка");
        blanks:
          type:
            accept: ["Структура", "структура"]
            accept_regex: '^\s*[Сс]труктура\s*$'
          method:
            accept: ["Вставить", "вставить"]
            accept_regex: '^\s*[Вв]ставить\s*$'
      - prompt: "Допишите безопасное получение значения из соответствия по ключу «Хлеб»."
        template: |
          Цены = Новый Соответствие;
          Цены.Вставить("Хлеб", 50);
          Цена = Цены.{{method}}("Хлеб");
        blanks:
          method:
            accept: ["Получить", "получить"]
            accept_regex: '^\s*[Пп]олучить\s*$'

  - id: coll-count-predict-001
    concept: collections
    type: predict-output
    difficulty: 2
    prompt: "Что выведет Сообщить? Запишите результат в точности."
    snippet: |
      Список = Новый Массив;
      Список.Добавить("Хлеб");
      Список.Добавить("Молоко");
      Список.Добавить("Сыр");
      Сообщить(Список.Количество());
    expected:
      kind: stdout
      value: "3"
    hints:
      - "Количество() возвращает число элементов в массиве. Просто посчитайте, сколько раз вызвали Добавить."
    variants:
      - prompt: "Что выведет Сообщить? Помните, с какого индекса начинается массив."
        snippet: |
          Список = Новый Массив;
          Список.Добавить("Хлеб");
          Список.Добавить("Молоко");
          Сообщить(Список[0]);
        expected:
          kind: stdout
          value: "Хлеб"
      - prompt: "Что выведет Сообщить? Обратите внимание на индекс."
        snippet: |
          Числа = Новый Массив;
          Числа.Добавить(10);
          Числа.Добавить(20);
          Числа.Добавить(30);
          Сообщить(Числа[1]);
        expected:
          kind: stdout
          value: "20"

  - id: coll-map-sum-predict-001
    concept: collections
    type: predict-output
    difficulty: 3
    prompt: "Код суммирует все значения соответствия. Что выведет Сообщить?"
    snippet: |
      Цены = Новый Соответствие;
      Цены.Вставить("Хлеб", 50);
      Цены.Вставить("Молоко", 80);
      Цены.Вставить("Сыр", 120);

      Итог = 0;
      Для Каждого КлючЗначение Из Цены Цикл
          Итог = Итог + КлючЗначение.Значение;
      КонецЦикла;
      Сообщить(Итог);
    expected:
      kind: stdout
      value: "250"
    hints:
      - "Перебор соответствия идёт парами. У каждой пары есть Ключ и Значение; суммируется здесь именно Значение."
      - "Сложите все цены: 50, 80 и 120. Ключи (наименования) в сумму не входят, их роль только в адресации."
