exercises:
  - id: loop-quiz-001
    concept: loops
    type: theory-quiz
    difficulty: 1
    prompt: "Какая структура правильно перебирает список значений в bash?"
    choices:
      - id: a
        text: "for x in список; do ...; done"
      - id: b
        text: "for (x in список) { ... }"
      - id: c
        text: "foreach x in список: ...; end"
      - id: d
        text: "loop x in список ... endloop"
    correct: [a]
    explanation: "bash перебирает список словом for, вводит текущее значение через in и закрывает тело цикла словом done. Остальные формы синтаксиса bash не использует."
    hints:
      - "Вспомните, каким словом bash закрывает тело любого цикла."
    variants:
      - prompt: "Чем while отличается от for по своей логике?"
        choices:
          - id: a
            text: "while повторяет тело, пока условие истинно, а не перебирает готовый"
          - id: b
            text: "while умеет читать файлы, а for нет"
          - id: c
            text: "while работает только с числами, а for только со строками"
          - id: d
            text: "while и for делают одно и то же, отличается только название"
        correct: [a]
        explanation: "for перебирает уже готовый список значений один за другим. while ничего не перебирает: он проверяет условие перед каждым повторением и останавливается, как только условие становится ложным."
      - prompt: "Какое слово закрывает тело цикла for в bash?"
        choices:
          - id: a
            text: "done"
          - id: b
            text: "fi"
          - id: c
            text: "end"
          - id: d
            text: "endfor"
        correct: [a]
        explanation: "Тело любого цикла в bash, будь то for, while или until, закрывается словом done. fi закрывает if, а end и endfor bash не использует."

  - id: loop-blanks-001
    concept: loops
    type: fill-in-blanks
    difficulty: 1
    prompt: "Дополните цикл так, чтобы он перебрал три города по очереди."
    template: |
      for city {{kw}} Москва Казань Тверь; do echo "$city"; done
    blanks:
      kw:
        accept: ['in']
    explanation: "for city in список вводит переменную city и перебирает список Москва Казань Тверь по одному значению за раз."
    hints:
      - "Между именем переменной и списком значений в for стоит ровно одно служебное слово."
    variants:
      - prompt: "Дополните цикл так, чтобы он повторял тело, пока i меньше или равно 3."
        template: |
          {{kw}} [ "$i" -le 3 ]; do echo "$i"; i=$((i+1)); done
        blanks:
          kw:
            accept: ['while']
        explanation: "while [ условие ]; do ...; done повторяет тело, пока условие в квадратных скобках остаётся истинным."
      - prompt: "Дополните цикл так, чтобы он корректно закрывал своё тело."
        template: |
          for n in 1 2 3; do echo "$n"; {{end}}
        blanks:
          end:
            accept: ['done']
        explanation: "done закрывает тело любого цикла в bash: без него интерпретатор ждёт продолжения и не может завершить разбор скрипта."

  - id: loop-predict-001
    concept: loops
    type: predict-output
    difficulty: 2
    prompt: "Выполняется команда, показанная в snippet. Что она напечатает? Введите вывод построчно."
    snippet: |
      for n in 1 2 3; do echo "шаг $n"; done
    expected:
      kind: stdout
      value: |
        шаг 1
        шаг 2
        шаг 3
    explanation: "for перебирает числа 1, 2 и 3 по очереди, подставляя каждое в n, и на каждой итерации echo печатает отдельную строку."
    hints:
      - "Посчитайте, сколько значений в списке после in, и выполните тело для каждого по отдельности."
    variants:
      - prompt: "Выполняется другая команда. Что она напечатает? Введите вывод построчно."
        snippet: |
          for c in Москва Казань; do echo "город: $c"; done
        expected:
          kind: stdout
          value: |
            город: Москва
            город: Казань
        explanation: "Список после in состоит из двух слов, поэтому тело цикла выполняется дважды, каждый раз со своим значением c."

  - id: loop-quiz-002
    concept: loops
    type: theory-quiz
    difficulty: 3
    prompt: "Почему для чтения файла построчно предпочитают while read -r line; do ...; done < file, а не for line in $(cat file)?"
    choices:
      - id: a
        text: "for line in $ делит содержимое на слова по пробелам и переносам строк"
      - id: b
        text: "for в принципе не умеет работать с результатом команд"
      - id: c
        text: "while read работает быстрее только на файлах меньше 1 КБ"
      - id: d
        text: "$(cat file) читает файл в обратном порядке"
    correct: [a]
    explanation: "$(cat file) сначала подставляет всё содержимое файла как один текст, а затем for раскладывает его на слова по правилам словоделения IFS: по пробелам, табуляциям и переносам строк. Строка с пробелом развалится на несколько итераций, а пустые строки вовсе исчезнут. while read -r line читает файл ровно по строкам, независимо от того, что внутри них."
    hints:
      - "Подумайте, что произойдёт, если внутри одной строки файла есть пробел."
      - "for обрабатывает не строки файла, а слова, оставшиеся после словоделения над результатом cat."

  - id: loop-predict-002
    concept: loops
    type: predict-output
    difficulty: 3
    prompt: "Выполняется команда, показанная в snippet. Что она напечатает? Введите вывод построчно."
    snippet: |
      i=1
      while [ "$i" -le 3 ]; do
        echo "$i"
        i=$((i+1))
      done
    expected:
      kind: stdout
      value: |
        1
        2
        3
    explanation: "Цикл печатает i и увеличивает его на единицу, пока i остаётся меньше или равно 3. Значения 1, 2 и 3 проходят проверку, а на i=4 условие становится ложным и цикл останавливается."
    hints:
      - "Проследите значение i на каждом шаге: печать, потом увеличение, потом снова проверка условия."
      - "Цикл остановится, как только i перестанет быть меньше или равно 3."
    variants:
      - prompt: "Выполняется другая команда, которая суммирует числа от 1 до 4. Что она напечатает? Введите одно число."
        snippet: |
          sum=0
          i=1
          while [ "$i" -le 4 ]; do
            sum=$((sum+i))
            i=$((i+1))
          done
          echo "$sum"
        expected:
          kind: scalar
          value: 10
        explanation: "Цикл складывает i в sum на каждом шаге для i от 1 до 4: 1+2+3+4 равно 10. После этого условие -le 4 становится ложным для i=5, и echo печатает накопленную сумму 10."

  - id: loop-predict-003
    concept: loops
    type: predict-output
    difficulty: 4
    prompt: "Файл names.txt содержит три строки, показанные в fixture. Скрипт считает количество прочитанных строк. Сколько он напечатает? Введите одно число."
    fixture: |
      файл names.txt:
      Анна
      Борис
      Вера
    snippet: |
      count=0
      while read -r line; do
        count=$((count+1))
      done < names.txt
      echo "$count"
    expected:
      kind: scalar
      value: 3
    explanation: "while read -r line читает файл ровно по строкам: на каждой итерации из names.txt забирается одна строка, а count увеличивается на единицу. В файле три строки, поэтому цикл выполнится три раза и echo напечатает 3."
    hints:
      - "Каждая итерация while read забирает из файла ровно одну строку, независимо от того, что в ней написано."
      - "Посчитайте строки в fixture: столько раз выполнится тело цикла."
    variants:
      - prompt: "Тот же скрипт, но names.txt содержит четыре строки, показанные в fixture. Сколько он напечатает? Введите одно число."
        fixture: |
          файл names.txt:
          Анна
          Борис
          Вера
          Григорий
        snippet: |
          count=0
          while read -r line; do
            count=$((count+1))
          done < names.txt
          echo "$count"
        expected:
          kind: scalar
          value: 4
        explanation: "Файл теперь содержит четыре строки, значит while read выполнит тело цикла четыре раза, и count дойдёт до 4."
