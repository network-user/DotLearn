exercises:
  - id: bp-quiz-001
    concept: best-practices
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает конструкция set -e в начале bash-скрипта?"
    choices:
      - id: a
        text: "Останавливает выполнение скрипта, как только любая команда завершается с"
      - id: b
        text: "Выводит все выполняемые команды в терминал перед их запуском"
      - id: c
        text: "Разрешает скрипту читать переменные окружения"
      - id: d
        text: "Ускоряет выполнение скрипта за счёт отключения проверок синтаксиса"
    correct: [a]
    explanation: "-e (errexit) останавливает скрипт на первой же команде с ненулевым кодом возврата. Вывод команд перед запуском делает другая опция (set -x), переменные окружения доступны и без set -e, а на скорость выполнения эта опция не влияет."
    hints:
      - "Вспомните разницу между командой, которая упала молча, и командой, которая упала и сразу остановила весь скрипт."
    variants:
      - prompt: "Что делает опция set -u в начале bash-скрипта?"
        choices:
          - id: a
            text: "Останавливает скрипт с ошибкой"
          - id: b
            text: "Устанавливает бит исполнения для скрипта"
          - id: c
            text: "Отключает подстановку переменных окружения"
          - id: d
            text: "Выводит предупреждение, но продолжает выполнение как обычно"
        correct: [a]
        explanation: "-u (nounset) превращает обращение к необъявленной переменной в ошибку, останавливающую скрипт, а не в тихую подстановку пустой строки и не в простое предупреждение."
      - prompt: "Что делает опция set -o pipefail в bash?"
        choices:
          - id: a
            text: "Код возврата всего пайпа становится кодом первой упавшей команды в цепочке, а не только"
          - id: b
            text: "Полностью отключает пайпы и запрещает использовать |"
          - id: c
            text: "Автоматически перезапускает упавшую команду в пайпе до трёх раз"
          - id: d
            text: "Делает так, что пайп всегда возвращает 0, даже если все команды в нём упали"
        correct: [a]
        explanation: "Без pipefail код возврата пайпа берётся только из последней команды. pipefail меняет это: итоговый код становится кодом первой упавшей команды в цепочке."

  - id: bp-blanks-001
    concept: best-practices
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите строку так, чтобы скрипт останавливался при ошибке команды, при обращении к необъявленной переменной и при падении любой команды внутри пайпа."
    template: |
      set -euo {{opt}}
    blanks:
      opt:
        accept: ['pipefail']
    explanation: "-e ловит команды с ненулевым кодом возврата, -u ловит необъявленные переменные, а третья опция, pipefail, делает код пайпа равным коду упавшей в нём команды."
    hints:
      - "Третья опция относится к тому, как считается код возврата у пайпа из нескольких команд, соединённых |."
    variants:
      - prompt: "Скрипт пока должен останавливаться только на первой команде, завершившейся с ошибкой. Допишите нужную опцию."
        template: |
          set {{flag}}
        blanks:
          flag:
            accept: ['-e']
            accept_regex: '^-e$'
        explanation: "-e включает errexit: скрипт останавливается сразу же, как только любая команда вернёт ненулевой код."
      - prompt: "Допишите команду так, чтобы имя файла из переменной file было закавычено и не ломалось из-за пробелов в имени."
        template: |
          cp "{{src}}" backup/
        blanks:
          src:
            accept: ['$file', '${file}']
        explanation: "Закавыченная переменная передаётся cp одним целым аргументом, даже если внутри есть пробелы. Без кавычек значение разбилось бы на несколько отдельных слов."

  - id: bp-predict-001
    concept: best-practices
    type: predict-output
    difficulty: 2
    prompt: "Содержимое check.sh показано в fixture. Что напечатает команда? Введите вывод построчно."
    fixture: |
      файл check.sh:
      #!/usr/bin/env bash
      set -e
      echo "старт"
      false
      echo "конец"
    snippet: |
      bash check.sh
    expected:
      kind: stdout
      value: |
        старт
    explanation: "set -e останавливает скрипт сразу после команды false, которая возвращает ненулевой код. Строка «конец» из-за этого никогда не печатается."
    hints:
      - "Команда false ничего не печатает и всегда возвращает ненулевой код."
      - "Подумайте, что делает set -e, как только видит команду с ненулевым кодом возврата."
    variants:
      - prompt: "Содержимое check.sh изменилось, как показано в fixture. Что напечатает команда? Введите вывод построчно."
        fixture: |
          файл check.sh:
          #!/usr/bin/env bash
          set -e
          echo "старт"
          true
          echo "конец"
        snippet: |
          bash check.sh
        expected:
          kind: stdout
          value: |
            старт
            конец
        explanation: "true всегда возвращает 0, поэтому set -e ни на чём не срабатывает, и обе команды echo выполняются по порядку."

  - id: bp-quiz-002
    concept: best-practices
    type: theory-quiz
    difficulty: 3
    prompt: "Скрипт содержит команду cp $file backup/ без кавычек вокруг переменной. Значение file - это отчёт январь.txt, с пробелом внутри имени. Что произойдёт при запуске?"
    choices:
      - id: a
        text: "cp получит два отдельных аргумента, «отчёт» и «январь.txt», и завершится ошибкой"
      - id: b
        text: "cp правильно скопирует файл с пробелом в имени, потому что shell сам разберётся с пробелом при подстановке"
      - id: c
        text: "Команда завершится ошибкой синтаксиса ещё до того, как cp вообще запустится"
      - id: d
        text: "Пробел в имени файла будет автоматически заменён на подчёркивание"
    correct: [a]
    explanation: "Без кавычек значение переменной проходит словоделение: bash разбивает «отчёт январь.txt» на два отдельных слова по пробелу и передаёт cp два аргумента вместо одного. Ни один файл с именем «отчёт» или «январь.txt» не существует, поэтому cp завершится ошибкой. С кавычками, cp \"$file\" backup/, значение передалось бы одним целым аргументом."
    hints:
      - "Подумайте, что делает bash с содержимым переменной без кавычек, если внутри есть пробел."
      - "Сравните с примером ls $dir из этой темы: раскрытие переменной без кавычек проходит через словоделение по пробелам."

  - id: bp-predict-002
    concept: best-practices
    type: predict-output
    difficulty: 3
    prompt: "Содержимое check.sh показано в fixture. Что напечатает команда? Введите вывод построчно."
    fixture: |
      файл check.sh:
      #!/usr/bin/env bash
      set -u
      name="Анна"
      echo "$name"
      echo "$nam"
      echo "конец"
    snippet: |
      bash check.sh
    expected:
      kind: stdout
      value: |
        Анна
    explanation: "nam - это опечатка, такой переменной никто не объявлял. Под set -u обращение к ней это ошибка: скрипт успевает напечатать «Анна», а на попытке раскрыть $nam завершается, так и не дойдя до строки «конец». Сообщение об ошибке уходит в stderr, а не в stdout."
    hints:
      - "$name и $nam - это две разные переменные, и вторая нигде не была объявлена."
      - "Вспомните, что делает set -u при обращении к необъявленной переменной, и в какой поток уходит её сообщение об ошибке."
    variants:
      - prompt: "Тот же скрипт, но без set -u, как показано в fixture. Что напечатает команда? Введите вывод построчно."
        fixture: |
          файл check.sh:
          #!/usr/bin/env bash
          name="Анна"
          echo "$name"
          echo "$nam"
          echo "конец"
        snippet: |
          bash check.sh
        expected:
          kind: stdout
          value: |
            Анна

            конец
        explanation: "Без set -u необъявленная переменная $nam молча раскрывается в пустую строку. echo \"$nam\" печатает пустую строку, поэтому в выводе три строки: «Анна», пустая строка и «конец»."

  - id: bp-predict-003
    concept: best-practices
    type: predict-output
    difficulty: 5
    prompt: "Содержимое check.sh показано в fixture. Что напечатает команда echo $?? Введите одно число."
    fixture: |
      файл check.sh:
      #!/usr/bin/env bash
      false | true
      echo $?
    snippet: |
      bash check.sh
    expected:
      kind: scalar
      value: 0
    explanation: "По умолчанию код возврата пайпа берётся только из последней команды в цепочке. true в конце вернула 0, поэтому echo $? печатает 0, хотя false перед ней завершилась с ошибкой."
    hints:
      - "У пайпа из нескольких команд есть только один итоговый код возврата, и без pipefail он берётся не от всех команд сразу."
      - "Посмотрите, какая команда стоит последней в цепочке false | true, и каким кодом она обычно завершается."
    variants:
      - prompt: "Содержимое check.sh изменилось, как показано в fixture. Что напечатает команда echo $?? Введите одно число."
        fixture: |
          файл check.sh:
          #!/usr/bin/env bash
          set -o pipefail
          false | true
          echo $?
        snippet: |
          bash check.sh
        expected:
          kind: scalar
          value: 1
        explanation: "pipefail меняет правило: код пайпа теперь берётся из первой упавшей команды в цепочке, если такая есть. false вернула 1, true вернула 0, поэтому итоговый код пайпа становится 1, даже несмотря на то что последняя команда завершилась успешно."
