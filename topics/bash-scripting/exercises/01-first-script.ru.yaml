exercises:
  - id: fs-quiz-001
    concept: first-script
    type: theory-quiz
    difficulty: 1
    prompt: "Что из перечисленного обязательно, чтобы запускать файл командой ./script.sh?"
    choices:
      - id: a
        text: "Строка shebang в начале файла и"
      - id: b
        text: "Только расширение .sh в имени файла"
      - id: c
        text: "Право на запись в файл"
      - id: d
        text: "Пустая первая строка перед командами"
    correct: [a]
    explanation: "Запуск через ./script.sh требует двух вещей: строки shebang, по которой ядро выбирает интерпретатор, и бита исполнения в правах файла. Расширение и право на запись здесь ни при чём."
    hints:
      - "Вспомните два независимых механизма: как система понимает, кем исполнять файл, и что вообще разрешает его запуск."
    variants:
      - prompt: "Что делает команда chmod +x script.sh?"
        choices:
          - id: a
            text: "Добавляет файлу бит исполнения"
          - id: b
            text: "Запускает скрипт на выполнение"
          - id: c
            text: "Создаёт строку shebang в начале файла"
          - id: d
            text: "Переименовывает файл в исполняемый формат"
        correct: [a]
        explanation: "chmod +x ставит бит исполнения, после чего файл можно запустить как ./script.sh. Сам по себе chmod ничего не выполняет."
      - prompt: "Для чего нужна строка shebang (#!/usr/bin/env bash) в начале скрипта?"
        choices:
          - id: a
            text: "Сообщает ядру, каким интерпретатором читать остальные строки файла"
          - id: b
            text: "Задаёт имя, под которым скрипт появится в PATH"
          - id: c
            text: "Это обычный комментарий для человека, система его игнорирует"
          - id: d
            text: "Включает подсветку синтаксиса в редакторе"
        correct: [a]
        explanation: "Ядро читает первую строку, видит #! и путь к интерпретатору и передаёт файл именно ему. Для bash script.sh эта строка, наоборот, роли не играет."

  - id: fs-blanks-001
    concept: first-script
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите строку shebang так, чтобы скрипт исполнялся интерпретатором bash, найденным по PATH."
    template: |
      #!/usr/bin/env {{interp}}
      echo "привет"
    blanks:
      interp:
        accept: ['bash']
    explanation: "Форма #!/usr/bin/env bash просит утилиту env найти bash по PATH, поэтому переносится между машинами лучше жёсткого пути."
    hints:
      - "После env указывают имя интерпретатора, который должен исполнить файл."
    variants:
      - prompt: "Скрипт deploy.sh не запускается через ./deploy.sh: Permission denied. Допишите команду, которая добавит файлу право на исполнение."
        template: |
          chmod {{flag}} deploy.sh
        blanks:
          flag:
            accept: ['+x']
        explanation: "chmod +x ставит бит исполнения; после этого ./deploy.sh перестаёт упираться в Permission denied."
      - prompt: "Файл backup.sh лежит в текущем каталоге и уже исполняемый. Допишите запуск так, чтобы шелл искал файл именно в текущем каталоге, а не в PATH."
        template: |
          {{prefix}}backup.sh
        blanks:
          prefix:
            accept: ['./']
        explanation: "Префикс ./ указывает на текущий каталог. Без него шелл ищет команду только в каталогах из PATH и отвечает command not found."

  - id: fs-predict-001
    concept: first-script
    type: predict-output
    difficulty: 2
    prompt: "Содержимое файла report.sh показано в fixture. Что напечатает команда? Введите вывод построчно."
    fixture: |
      файл report.sh:
      #!/usr/bin/env bash
      echo "старт"
      echo "готово"
    snippet: |
      bash report.sh
    expected:
      kind: stdout
      value: |
        старт
        готово
    explanation: "bash читает файл сверху вниз. Строка shebang это комментарий и не печатается, а два echo выводят свои строки по порядку."
    hints:
      - "Строка, начинающаяся с #, не выполняется как команда."
      - "Каждый echo печатает свой текст на отдельной строке, в порядке следования."
    variants:
      - prompt: "Содержимое файла build.sh показано в fixture. Что напечатает команда? Введите вывод построчно."
        fixture: |
          файл build.sh:
          #!/usr/bin/env bash
          echo "сборка"
          echo "тесты"
          echo "деплой"
        snippet: |
          bash build.sh
        expected:
          kind: stdout
          value: |
            сборка
            тесты
            деплой
        explanation: "Три echo выполняются по очереди сверху вниз и печатают три строки; shebang по-прежнему не выводится."

  - id: fs-quiz-002
    concept: first-script
    type: theory-quiz
    difficulty: 3
    prompt: "Скрипт plot.sh начинается со строки #!/usr/bin/env python3. Что произойдёт при запуске командой bash plot.sh?"
    choices:
      - id: a
        text: "bash проигнорирует shebang и попытается выполнить содержимое файла как"
      - id: b
        text: "Запустится Python 3, потому что так указано в shebang"
      - id: c
        text: "Команда завершится ошибкой bad interpreter"
      - id: d
        text: "bash автоматически передаст файл интерпретатору из shebang"
    correct: [a]
    explanation: "Когда интерпретатор задан явно (bash plot.sh), строка shebang не читается вовсе. bash сам исполняет файл, и код на Python приведёт к синтаксическим ошибкам bash. Shebang сработал бы только при запуске ./plot.sh."
    hints:
      - "Подумайте, кто в этой команде уже назначен интерпретатором ещё до чтения первой строки файла."
      - "Строка shebang важна лишь для одного из двух способов запуска."
    variants:
      - prompt: "Файл deploy.sh имеет корректный shebang, но бит исполнения не установлен. Какая команда запустит его прямо сейчас, не меняя прав?"
        choices:
          - id: a
            text: "bash deploy.sh"
          - id: b
            text: "./deploy.sh"
          - id: c
            text: "deploy.sh"
          - id: d
            text: "chmod deploy.sh"
        correct: [a]
        explanation: "Явный запуск через интерпретатор не требует бита исполнения: bash сам откроет и прочитает файл. ./deploy.sh упрётся в Permission denied, deploy.sh не найдётся в PATH, а chmod без +x прав не поменяет."

  - id: fs-predict-002
    concept: first-script
    type: predict-output
    difficulty: 3
    prompt: "Файл whoami.sh печатает своё имя через $0. Что выведет команда? Введите одну строку."
    fixture: |
      файл whoami.sh:
      #!/usr/bin/env bash
      echo "$0"
    snippet: |
      bash whoami.sh
    expected:
      kind: stdout
      value: |
        whoami.sh
    explanation: "Переменная $0 хранит имя, под которым запущен скрипт. При запуске bash whoami.sh это ровно тот путь, что вы передали bash, то есть whoami.sh."
    hints:
      - "$0 это не первый аргумент, а само имя запущенного скрипта."
      - "Сравните, какой именно текст вы написали после слова bash в команде."
    variants:
      - prompt: "Тот же файл whoami.sh, но он уже исполняемый и запущен иначе. Что выведет команда? Введите одну строку."
        snippet: |
          ./whoami.sh
        fixture: |
          файл whoami.sh:
          #!/usr/bin/env bash
          echo "$0"
        expected:
          kind: stdout
          value: |
            ./whoami.sh
        explanation: "При запуске ./whoami.sh шеллу передан путь ./whoami.sh, и именно эту строку хранит $0. Способ запуска буквально виден в значении $0."
