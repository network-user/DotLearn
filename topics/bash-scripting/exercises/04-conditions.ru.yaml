exercises:
  - id: cond-quiz-001
    concept: conditions
    type: theory-quiz
    difficulty: 1
    prompt: "Какая структура правильно записывает условную конструкцию в bash?"
    choices:
      - id: a
        text: "if команда; then ...; fi"
      - id: b
        text: "if (условие) { ... }"
      - id: c
        text: "if команда: ...; end"
      - id: d
        text: "when команда then ... done"
    correct: [a]
    explanation: "bash закрывает if словом fi, а между then и fi располагается тело ветки. Фигурные скобки, двоеточие и слово done в этой роли в bash не используются."
    hints:
      - "Вспомните, как заканчивается блок if в примерах из теории: одно конкретное слово в конце."
    variants:
      - prompt: "Что означает проверка -f \"$path\" внутри if?"
        choices:
          - id: a
            text: "Путь существует и это обычный файл"
          - id: b
            text: "Путь существует и это каталог"
          - id: c
            text: "Переменная path не пустая"
          - id: d
            text: "Файл доступен для записи"
        correct: [a]
        explanation: "-f истинно, когда путь существует и указывает на обычный файл. За каталоги отвечает -d, а за пустоту строки -z и -n."
      - prompt: "На что смотрит if, решая, какую ветку выполнить?"
        choices:
          - id: a
            text: "На код возврата команды после if: ноль значит истина"
          - id: b
            text: "На то, вывела ли команда что-нибудь в терминал"
          - id: c
            text: "На значение последней переменной, использованной в скрипте"
          - id: d
            text: "На то, сколько времени команда выполнялась"
        correct: [a]
        explanation: "if запускает команду и проверяет только её код возврата: ноль означает успех и ведёт в then, любое другое значение уводит к else."

  - id: cond-blanks-001
    concept: conditions
    type: fill-in-blanks
    difficulty: 1
    prompt: "Дополните проверку так, чтобы доступ разрешался только совершеннолетним."
    template: |
      if [ "$age" {{op}} 18 ]; then echo "можно"; fi
    blanks:
      op:
        accept: ['-ge']
        accept_regex: '^-ge$'
    explanation: "-ge сравнивает числа и возвращает истину, когда левое значение больше или равно правому. Совершеннолетие начинается с 18 лет включительно, поэтому нужен именно -ge, а не -gt."
    hints:
      - "Подумайте, входит ли в разрешённый возраст само число 18, или считать нужно строго больше."
    variants:
      - prompt: "Дополните проверку так, чтобы сообщение печаталось только тогда, когда путь ведёт к обычному файлу."
        template: |
          if [ {{flag}} "$path" ]; then echo "есть"; fi
        blanks:
          flag:
            accept: ['-f']
            accept_regex: '^-f$'
        explanation: "-f истинно, когда путь существует и указывает на обычный файл. Для каталога понадобился бы -d, а для любого существующего пути -e."
      - prompt: "Дополните проверку так, чтобы сообщение печаталось только для роли admin."
        template: |
          if [ "$role" {{op}} "admin" ]; then echo "да"; fi
        blanks:
          op:
            accept: ['=']
            accept_regex: '^=$'
        explanation: "role это строка, поэтому сравнивать её нужно строковым оператором =, а не числовым -eq. Строки сравниваются посимвольно."

  - id: cond-predict-001
    concept: conditions
    type: predict-output
    difficulty: 2
    prompt: "Содержимое файла check.sh показано в fixture. Что напечатает команда? Введите одну строку."
    fixture: |
      файл check.sh:
      #!/usr/bin/env bash
      a=5
      if [ "$a" -gt 3 ]; then
        echo "больше"
      else
        echo "меньше"
      fi
    snippet: |
      bash check.sh
    expected:
      kind: stdout
      value: |
        больше
    explanation: "a равно 5, а 5 больше 3, поэтому условие -gt истинно и выполняется ветка then, которая печатает «больше»."
    hints:
      - "Сравните значение a с числом 3 и решите, какая ветка сработает."
    variants:
      - prompt: "Тот же файл check.sh, но со значением a=2. Что напечатает команда? Введите одну строку."
        fixture: |
          файл check.sh:
          #!/usr/bin/env bash
          a=2
          if [ "$a" -gt 3 ]; then
            echo "больше"
          else
            echo "меньше"
          fi
        snippet: |
          bash check.sh
        expected:
          kind: stdout
          value: |
            меньше
        explanation: "2 не больше 3, условие -gt ложно, поэтому выполняется ветка else и печатается «меньше»."

  - id: cond-quiz-002
    concept: conditions
    type: theory-quiz
    difficulty: 3
    prompt: "Чем [[ ]] безопаснее [ ] при работе с переменными?"
    choices:
      - id: a
        text: "[[ ]] не ломается на пустой или незакавыченной переменной и понимает && и ||"
      - id: b
        text: "[[ ]] быстрее выполняется, потому что не читает диск"
      - id: c
        text: "[[ ]] работает в любой POSIX-оболочке, а [ ] только в bash"
      - id: d
        text: "[[ ]] автоматически расставляет кавычки вокруг всех переменных"
    correct: [a]
    explanation: "Если переменная в [ $x = 1 ] окажется пустой и не взята в кавычки, конструкция разваливается на синтаксическую ошибку. [[ ]] такого сюрприза не создаёт, а вдобавок умеет && и || прямо внутри себя. Переносимость и скорость тут ни при чём: наоборот, [ ] переносимее, а не [[ ]]."
    hints:
      - "Подумайте, что случится с записью [ $x = 1 ], если переменная x окажется пустой строкой."
      - "Вспомните из фигуры сравнения, какие операторы работают внутри [[ ]], но не внутри [ ]."

  - id: cond-predict-002
    concept: conditions
    type: predict-output
    difficulty: 3
    prompt: "Содержимое файла grade.sh показано в fixture. Что напечатает команда? Введите одну строку."
    fixture: |
      файл grade.sh:
      #!/usr/bin/env bash
      score=75
      if [ "$score" -ge 90 ]; then
        echo "отлично"
      elif [ "$score" -ge 60 ]; then
        echo "хорошо"
      else
        echo "плохо"
      fi
    snippet: |
      bash grade.sh
    expected:
      kind: stdout
      value: |
        хорошо
    explanation: "score равно 75. Первая проверка -ge 90 ложна, поэтому bash переходит к elif: 75 -ge 60 истинно, и печатается «хорошо». До else дело не доходит."
    hints:
      - "Проверяйте условия по порядку сверху вниз и останавливайтесь на первом истинном."
      - "75 не дотягивает до 90, но точно не меньше 60."
    variants:
      - prompt: "Тот же файл grade.sh, но со значением score=45. Что напечатает команда? Введите одну строку."
        fixture: |
          файл grade.sh:
          #!/usr/bin/env bash
          score=45
          if [ "$score" -ge 90 ]; then
            echo "отлично"
          elif [ "$score" -ge 60 ]; then
            echo "хорошо"
          else
            echo "плохо"
          fi
        snippet: |
          bash grade.sh
        expected:
          kind: stdout
          value: |
            плохо
        explanation: "45 не проходит ни -ge 90, ни -ge 60, поэтому обе проверки ложны и управление уходит в else, который печатает «плохо»."

  - id: cond-predict-003
    concept: conditions
    type: predict-output
    difficulty: 4
    prompt: "Содержимое файла cmp.sh показано в fixture. Что напечатает команда? Введите вывод построчно."
    fixture: |
      файл cmp.sh:
      #!/usr/bin/env bash
      x="05"
      if [ "$x" -eq 5 ]; then
        echo "равно как число"
      fi
      if [ "$x" = "5" ]; then
        echo "равно как строка"
      fi
    snippet: |
      bash cmp.sh
    expected:
      kind: stdout
      value: |
        равно как число
    explanation: "-eq сравнивает обе стороны как числа, а числа 05 и 5 равны, поэтому первая проверка истинна и печатает «равно как число». Оператор = сравнивает строки посимвольно: «05» и «5» разной длины и не совпадают, поэтому вторая проверка ложна и ничего не печатает."
    hints:
      - "Числовой оператор -eq и строковый оператор = сравнивают x с 5 по-разному."
      - "Приведите «05» к числу для первой проверки и оставьте его строкой для второй, отдельно сравните оба варианта с 5."
