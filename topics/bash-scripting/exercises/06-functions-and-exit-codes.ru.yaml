exercises:
  - id: func-quiz-001
    concept: functions-and-exit-codes
    type: theory-quiz
    difficulty: 1
    prompt: "Как в bash объявляют функцию с именем backup?"
    choices:
      - id: a
        text: "backup() { ... }"
      - id: b
        text: "def backup(): ..."
      - id: c
        text: "function backup => { ... }"
      - id: d
        text: "sub backup { ... }"
    correct: [a]
    explanation: "Функцию в bash объявляют как имя со скобками и телом в фигурных скобках: backup() { ... }. Синтаксис def, sub и стрелок bash не использует."
    hints:
      - "Вспомните, во что bash заключает тело функции."
    variants:
      - prompt: "Как вызвать уже объявленную функцию backup без аргументов?"
        choices:
          - id: a
            text: "backup"
          - id: b
            text: "call backup"
          - id: c
            text: "backup()"
          - id: d
            text: "run backup"
        correct: [a]
        explanation: "Функцию вызывают, просто написав её имя как обычную команду. Скобки при вызове не нужны, а call и run bash не использует."
      - prompt: "Что содержит переменная $? сразу после выполнения команды?"
        choices:
          - id: a
            text: "код возврата последней выполненной команды"
          - id: b
            text: "количество аргументов скрипта"
          - id: c
            text: "имя последней команды"
          - id: d
            text: "идентификатор процесса скрипта"
        correct: [a]
        explanation: "$? хранит код возврата последней завершившейся команды: 0 при успехе и ненулевое значение при ошибке. Количество аргументов даёт $#, а идентификатор процесса $$."

  - id: func-blanks-001
    concept: functions-and-exit-codes
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите объявление функции greet, закрыв её тело."
    template: |
      greet() {
        echo "Привет, $1"
      {{close}}
    blanks:
      close:
        accept: ['}']
    explanation: "Тело функции заключено в фигурные скобки: открывающая стоит после greet(), а закрывающая } завершает объявление."
    hints:
      - "Чем открылось тело функции, тем оно и закрывается."
    variants:
      - prompt: "Допишите функцию так, чтобы она завершилась с кодом успеха."
        template: |
          ok() {
            {{ret}} 0
          }
        blanks:
          ret:
            accept: ['return']
        explanation: "return 0 завершает функцию с кодом возврата 0, что означает успех."
      - prompt: "Внутри функции обратитесь к её первому аргументу."
        template: |
          greet() {
            echo "Привет, {{arg}}"
          }
        blanks:
          arg:
            accept: ['$1']
        explanation: "Внутри функции $1 это её собственный первый аргумент, переданный при вызове."

  - id: func-predict-001
    concept: functions-and-exit-codes
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает скрипт? Введите вывод построчно."
    snippet: |
      greet() {
        echo "Привет, $1"
      }
      greet Анна
      greet Борис
    expected:
      kind: stdout
      value: |
        Привет, Анна
        Привет, Борис
    explanation: "Функция greet печатает приветствие своему первому аргументу. Её вызывают дважды, с Анна и Борис, поэтому получаются две строки."
    hints:
      - "Тело функции выполняется заново при каждом вызове со своим значением $1."
    variants:
      - prompt: "Что напечатает скрипт? Введите одну строку."
        snippet: |
          greet() {
            echo "Привет, $1"
          }
          msg=$(greet Вера)
          echo "$msg!"
        expected:
          kind: stdout
          value: |
            Привет, Вера!
        explanation: "$(greet Вера) захватывает то, что печатает функция, в переменную msg, а затем echo добавляет к ней восклицательный знак."

  - id: func-quiz-002
    concept: functions-and-exit-codes
    type: theory-quiz
    difficulty: 3
    prompt: "Функция должна отдать в вызывающий код строку с именем файла. Как это правильно сделать в bash?"
    choices:
      - id: a
        text: "напечатать строку через echo и захватить вызов в $( ... )"
      - id: b
        text: "передать строку в return, а потом прочитать её из $?"
      - id: c
        text: "записать строку в $1 внутри функции"
      - id: d
        text: "return сам возвращает последнее вычисленное значение"
    correct: [a]
    explanation: "return в bash задаёт только числовой код возврата от 0 до 255, а не произвольное значение. Чтобы отдать строку, функция печатает её в стандартный вывод, а вызывающий код захватывает этот вывод подстановкой команды $( ... )."
    hints:
      - "return умеет передавать только небольшое число статуса, а не текст."
      - "Вспомните, как захватывают вывод любой команды в переменную."

  - id: func-predict-002
    concept: functions-and-exit-codes
    type: predict-output
    difficulty: 3
    prompt: "Что напечатает скрипт? Введите вывод построчно."
    snippet: |
      is_positive() {
        [ "$1" -gt 0 ]
      }
      is_positive 5
      echo $?
      is_positive -3
      echo $?
    expected:
      kind: stdout
      value: |
        0
        1
    explanation: "Функция без return получает код возврата от своей последней команды, проверки [ \"$1\" -gt 0 ]. Для 5 условие истинно, код 0. Для -3 условие ложно, код 1. Каждый echo $? печатает код предыдущего вызова."
    hints:
      - "У функции без return код возврата равен коду её последней команды."
      - "Скобки [ ... ] дают код 0, когда условие истинно, и 1, когда ложно."
    variants:
      - prompt: "Что напечатает скрипт? Введите вывод построчно."
        snippet: |
          is_even() {
            [ $(( $1 % 2 )) -eq 0 ]
          }
          is_even 4
          echo $?
          is_even 7
          echo $?
        expected:
          kind: stdout
          value: |
            0
            1
        explanation: "4 по модулю 2 равно 0, условие -eq 0 истинно, код 0. 7 по модулю 2 равно 1, условие ложно, код 1."

  - id: func-predict-003
    concept: functions-and-exit-codes
    type: predict-output
    difficulty: 4
    prompt: "Что напечатает скрипт? Введите вывод построчно."
    snippet: |
      can_vote() {
        if [ "$1" -ge 18 ]; then
          return 0
        else
          return 1
        fi
      }
      for age in 20 16 18; do
        if can_vote "$age"; then
          echo "$age: можно"
        else
          echo "$age: нельзя"
        fi
      done
    expected:
      kind: stdout
      value: |
        20: можно
        16: нельзя
        18: можно
    explanation: "can_vote возвращает код 0 для возраста 18 и старше и код 1 иначе. if смотрит именно на код возврата функции: 20 и 18 проходят порог, 16 нет."
    hints:
      - "if проверяет код возврата команды или функции, а не текст."
      - "return 0 это успех, поэтому для него срабатывает ветка then."
      - "Пройдите список 20, 16, 18 по одному значению."
    variants:
      - prompt: "Что напечатает скрипт? Введите вывод построчно."
        snippet: |
          can_vote() {
            if [ "$1" -ge 18 ]; then
              return 0
            else
              return 1
            fi
          }
          for age in 30 17; do
            if can_vote "$age"; then
              echo "$age: можно"
            else
              echo "$age: нельзя"
            fi
          done
        expected:
          kind: stdout
          value: |
            30: можно
            17: нельзя
        explanation: "30 не меньше 18, функция возвращает 0 и печатается «можно». 17 меньше 18, функция возвращает 1 и печатается «нельзя»."
