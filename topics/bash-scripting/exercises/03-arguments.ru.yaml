exercises:
  - id: arg-quiz-001
    concept: arguments
    type: theory-quiz
    difficulty: 1
    prompt: "Скрипт запущен командой bash greet.sh Анна Борис. Что содержится в $1?"
    choices:
      - id: a
        text: "Анна"
      - id: b
        text: "Борис"
      - id: c
        text: "greet.sh"
      - id: d
        text: "2"
    correct: [a]
    explanation: "$1 хранит первое слово, написанное после имени скрипта при запуске. В команде bash greet.sh Анна Борис первым таким словом идёт Анна."
    hints:
      - "Считайте слова после имени скрипта по порядку: первое слово попадает в переменную с номером один."
    variants:
      - prompt: "Тот же вызов bash greet.sh Анна Борис. Что содержится в $#?"
        choices:
          - id: a
            text: "2"
          - id: b
            text: "Анна"
          - id: c
            text: "greet.sh"
          - id: d
            text: "0"
        correct: [a]
        explanation: "$# хранит количество переданных позиционных параметров, без учёта $0. Здесь передано два слова, Анна и Борис, поэтому $# равно 2."
      - prompt: "Тот же вызов bash greet.sh Анна Борис. Что содержится в $0?"
        choices:
          - id: a
            text: "greet.sh"
          - id: b
            text: "Анна"
          - id: c
            text: "Борис"
          - id: d
            text: "bash"
        correct: [a]
        explanation: "$0 хранит имя, под которым запущен сам скрипт, то есть то, что написано сразу после слова bash. В этой команде это greet.sh, а не первый переданный аргумент."

  - id: arg-blanks-001
    concept: arguments
    type: fill-in-blanks
    difficulty: 1
    prompt: "Дополните строку так, чтобы она печатала количество аргументов, переданных скрипту."
    template: |
      echo "число аргументов: {{count}}"
    blanks:
      count:
        accept: ['$#']
    explanation: "$# хранит количество позиционных параметров, переданных скрипту при запуске, без учёта имени самого скрипта."
    hints:
      - "Нужна переменная-счётчик, а не имя конкретного аргумента."
    variants:
      - prompt: "Дополните строку так, чтобы она печатала первый аргумент, переданный скрипту."
        template: |
          echo "первый: {{first}}"
        blanks:
          first:
            accept: ['$1']
        explanation: "Первое слово, написанное после имени скрипта при запуске, попадает в переменную $1."
      - prompt: "Дополните строку так, чтобы она печатала сразу все аргументы, переданные скрипту."
        template: |
          echo "все аргументы: {{all}}"
        blanks:
          all:
            accept: ['$@', '$*']
        explanation: "И $@, и $* разворачиваются во все переданные аргументы сразу; разница между ними проявляется только внутри двойных кавычек в цикле."

  - id: arg-predict-001
    concept: arguments
    type: predict-output
    difficulty: 2
    prompt: "Содержимое файла greet.sh показано в fixture. Что напечатает команда? Введите вывод построчно."
    fixture: |
      файл greet.sh:
      #!/usr/bin/env bash
      echo "Привет, $1 и $2"
      echo "аргументов: $#"
    snippet: |
      bash greet.sh Анна Борис
    expected:
      kind: stdout
      value: |
        Привет, Анна и Борис
        аргументов: 2
    explanation: "$1 получает первое слово после имени скрипта, Анна, а $2 второе, Борис. $# считает переданные аргументы, их два."
    hints:
      - "Сопоставьте порядок слов после имени скрипта с номерами переменных $1 и $2."
      - "$# считает сами аргументы, а не буквы или символы в них."
    variants:
      - prompt: "Тот же файл greet.sh, но вызов передаёт три имени. Что напечатает команда? Введите вывод построчно."
        fixture: |
          файл greet.sh:
          #!/usr/bin/env bash
          echo "Привет, $1 и $2"
          echo "аргументов: $#"
        snippet: |
          bash greet.sh Анна Борис Вера
        expected:
          kind: stdout
          value: |
            Привет, Анна и Борис
            аргументов: 3
        explanation: "Скрипт по-прежнему читает только $1 и $2, поэтому третье имя, Вера, никак не влияет на первую строку вывода. Но $# считает все переданные аргументы, включая непрочитанные, поэтому вторая строка печатает 3."

  - id: arg-quiz-002
    concept: arguments
    type: theory-quiz
    difficulty: 3
    prompt: "Что делает команда shift внутри скрипта, вызванного с несколькими аргументами?"
    choices:
      - id: a
        text: "Сдвигает все позиционные параметры на один влево: бывший $2 становится $1, а $# уменьшается на единицу"
      - id: b
        text: "Удаляет последний аргумент, не трогая остальные"
      - id: c
        text: "Меняет местами $1 и $2, не влияя на $#"
      - id: d
        text: "Добавляет новый аргумент в конец списка"
    correct: [a]
    explanation: "shift сдвигает нумерацию позиционных параметров на один влево: значение, лежавшее в $2, оказывается в $1, значение из $3 переходит в $2, и так далее, а счётчик $# уменьшается на единицу."
    hints:
      - "Подумайте, что происходит с номерами переменных, а не с самими значениями: они переезжают, а не исчезают и не появляются."
      - "После shift скрипт снова может читать текущий первый аргумент как $1, даже если исходно это был второй или третий аргумент вызова."

  - id: arg-predict-002
    concept: arguments
    type: predict-output
    difficulty: 3
    prompt: "Содержимое файла s.sh показано в fixture. Что напечатает команда? Введите вывод построчно."
    fixture: |
      файл s.sh:
      #!/usr/bin/env bash
      echo "$1"
      shift
      echo "$1"
      echo "$#"
    snippet: |
      bash s.sh a b c
    expected:
      kind: stdout
      value: |
        a
        b
        2
    explanation: "Первый echo печатает $1, то есть a. Затем shift сдвигает параметры на один влево: b становится новым $1, c становится $2, а $# уменьшается с 3 до 2. Второй echo печатает новый $1, то есть b, третий печатает $#, то есть 2."
    hints:
      - "Проследите за каждой переменной шаг за шагом: сначала запишите исходные $1, $2, $3 и $#, потом примените shift и обновите их."
      - "shift меняет то, что лежит в $1, но не запускает саму команду повторно: echo видит уже новое значение."
    variants:
      - prompt: "Файл s.sh изменили: теперь shift вызывается два раза подряд перед вторым echo. Что напечатает команда bash s.sh a b c d? Введите вывод построчно."
        fixture: |
          файл s.sh:
          #!/usr/bin/env bash
          echo "$1"
          shift
          shift
          echo "$1"
          echo "$#"
        snippet: |
          bash s.sh a b c d
        expected:
          kind: stdout
          value: |
            a
            c
            2
        explanation: "Первый echo печатает исходный $1, то есть a. Первый shift делает b новым $1, c новым $2, d новым $3, счётчик $# становится 3. Второй shift сдвигает ещё раз: c становится $1, d становится $2, $# становится 2. Второй echo печатает текущий $1, то есть c, третий печатает $#, то есть 2."
