exercises:
  - id: vq-quiz-001
    concept: variables-and-quoting
    type: theory-quiz
    difficulty: 1
    prompt: "Переменной name присвоено значение. Как правильно получить это значение в bash?"
    choices:
      - id: a
        text: "$name"
      - id: b
        text: "name"
      - id: c
        text: "%name%"
      - id: d
        text: "&name"
    correct: [a]
    explanation: "Знак доллара перед именем говорит bash подставить текущее значение переменной. Без $ имя name это просто слово, а не обращение к переменной."
    hints:
      - "Вспомните символ, который в bash запускает подстановку значения переменной."
    variants:
      - prompt: "В переменной name лежит значение Борис. Что напечатает команда echo '$name' с одинарными кавычками?"
        choices:
          - id: a
            text: "$name"
          - id: b
            text: "Борис"
          - id: c
            text: "name"
          - id: d
            text: "Ошибку: переменная не определена"
        correct: [a]
        explanation: "Одинарные кавычки объявляют содержимое буквальным текстом: подстановка внутри них не запускается вовсе, поэтому echo печатает ровно то, что написано, включая символ доллара."
      - prompt: "Зачем в записи ${name} нужны фигурные скобки, если можно было бы написать просто $name?"
        choices:
          - id: a
            text: "Чтобы явно отделить имя переменной от текста, который идёт сразу следом"
          - id: b
            text: "Фигурные скобки ускоряют выполнение команды"
          - id: c
            text: "Без них bash вообще не подставит значение переменной"
          - id: d
            text: "Скобки нужны только для переменных с числовыми именами"
        correct: [a]
        explanation: "Bash забирает после $ все символы, похожие на имя переменной. Фигурные скобки явно закрывают это имя, поэтому текст сразу после скобки не сливается с ним в одно имя."

  - id: vq-blanks-001
    concept: variables-and-quoting
    type: fill-in-blanks
    difficulty: 1
    prompt: "Дополните присваивание так, чтобы переменной city досталось значение Москва, без пробелов вокруг знака равенства."
    template: |
      city{{eq}}"Москва"
      echo "$city"
    blanks:
      eq:
        accept: ['=']
    explanation: "Присваивание в bash пишется слитно: имя, знак равенства и значение без единого пробела вокруг =. Пробел с любой стороны превратит строку в попытку запустить команду city."
    hints:
      - "В bash присваивание не использует ключевых слов вроде let или var, только один символ между именем и значением."
    variants:
      - prompt: "Переменная user уже определена и хранит имя текущего пользователя. Дополните команду так, чтобы напечатать приветствие с этим именем."
        template: |
          echo "Пользователь: {{ref}}"
        blanks:
          ref:
            accept: ['$user', '${user}']
        explanation: "Обратиться к значению переменной внутри двойных кавычек можно как через $user, так и через ${user}: оба варианта подставят текущее значение переменной user."
      - prompt: "Переменная dir хранит путь к каталогу. Дополните команду так, чтобы напечатать значение переменной с приклеенным без пробела суффиксом _backup."
        template: |
          echo "{{ref}}_backup"
        blanks:
          ref:
            accept: ['${dir}']
        explanation: "Без фигурных скобок запись $dir_backup bash прочитал бы как обращение к переменной с именем dir_backup целиком, а не как значение dir с текстом _backup после него. ${dir} явно закрывает имя переменной, и суффикс остаётся обычным текстом."

  - id: vq-predict-001
    concept: variables-and-quoting
    type: predict-output
    difficulty: 2
    prompt: "Содержимое файла hello.sh показано в fixture. Что напечатает команда? Введите одну строку."
    fixture: |
      файл hello.sh:
      #!/usr/bin/env bash
      name="Анна"
      echo "Привет, $name!"
    snippet: |
      bash hello.sh
    expected:
      kind: stdout
      value: |
        Привет, Анна!
    explanation: "Переменная name получает значение Анна, а echo в двойных кавычках подставляет его на место $name, приклеивая восклицательный знак сразу после значения без лишнего пробела."
    hints:
      - "Сначала выполнится присваивание, потом echo подставит текущее значение переменной."
      - "Двойные кавычки вокруг строки не мешают подстановке $name, они лишь сохраняют результат одним значением."
    variants:
      - prompt: "Файл hello.sh изменили: теперь переменная называется city и хранит Казань. Что напечатает команда? Введите одну строку."
        fixture: |
          файл hello.sh:
          #!/usr/bin/env bash
          city="Казань"
          echo "Город: $city"
        snippet: |
          bash hello.sh
        expected:
          kind: stdout
          value: |
            Город: Казань
        explanation: "Та же логика: city получает значение Казань, а echo в двойных кавычках подставляет его на место $city, печатая одну строку целиком."

  - id: vq-quiz-002
    concept: variables-and-quoting
    type: theory-quiz
    difficulty: 3
    prompt: "Переменной file присвоено значение report. Почему echo \"$file_backup\" печатает пустую строку, а echo \"${file}_backup\" печатает report_backup?"
    choices:
      - id: a
        text: "Bash считает file_backup отдельным, неопределённым именем переменной; фигурные скобки явно отделяют имя file от текста _backup"
      - id: b
        text: "Символ подчёркивания в bash запрещён внутри имён переменных"
      - id: c
        text: "Кавычки вокруг $file_backup ломают подстановку, а вокруг ${file}_backup нет"
      - id: d
        text: "Переменная file теряет значение после первого использования"
    correct: [a]
    explanation: "После $ bash забирает все буквы, цифры и подчёркивания подряд как одно имя переменной, поэтому $file_backup читается как обращение к переменной file_backup целиком, а не к file. Такой переменной не существует, отсюда пустая строка. Фигурные скобки в ${file} явно закрывают имя, и _backup остаётся обычным текстом после подставленного значения."
    hints:
      - "Подумайте, где именно бash проводит границу имени переменной, когда фигурных скобок нет."
      - "Сравните, какое именно имя переменной bash пытается найти в каждой из двух записей."

  - id: vq-predict-002
    concept: variables-and-quoting
    type: predict-output
    difficulty: 4
    prompt: "Файл names.sh присваивает переменной name значение с двумя пробелами подряд внутри имени, как показано в fixture. Что напечатает первая команда конвейера скрипта? Введите одну строку."
    fixture: |
      файл names.sh:
      #!/usr/bin/env bash
      name="Анна    Иванова"
      echo $name
    snippet: |
      bash names.sh
    expected:
      kind: stdout
      value: |
        Анна Иванова
    explanation: "Без кавычек bash сначала подставляет значение переменной, а затем проводит словоделение: несколько пробелов подряд схлопываются в один разделитель между словами. echo получает два отдельных аргумента и печатает их через ровно один пробел, поэтому из четырёх исходных пробелов остаётся только один."
    hints:
      - "$name здесь написан без кавычек: подумайте, что bash делает с результатом подстановки перед тем, как передать его команде echo."
      - "Словоделение режет текст по пробелам и склеивает несколько подряд идущих разделителей в один."
    variants:
      - prompt: "Тот же файл names.sh, но echo вызван с кавычками вокруг переменной. Что напечатает команда? Введите одну строку."
        fixture: |
          файл names.sh:
          #!/usr/bin/env bash
          name="Анна    Иванова"
          echo "$name"
        snippet: |
          bash names.sh
        expected:
          kind: stdout
          value: |
            Анна    Иванова
        explanation: "Двойные кавычки вокруг $name сохраняют результат подстановки одним значением, и словоделение не запускается: echo получает исходную строку целиком, вместе со всеми четырьмя пробелами внутри."
