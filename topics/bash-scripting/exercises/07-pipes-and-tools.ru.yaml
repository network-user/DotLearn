exercises:
  - id: pipe-quiz-001
    concept: pipes-and-tools
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает символ | между двумя командами?"
    choices:
      - id: a
        text: "передаёт стандартный вывод левой команды на"
      - id: b
        text: "запускает обе команды одновременно и независимо"
      - id: c
        text: "сравнивает вывод двух команд"
      - id: d
        text: "перенаправляет вывод в файл"
    correct: [a]
    explanation: "Пайп | соединяет команды в конвейер: то, что левая печатает в стандартный вывод, становится стандартным входом правой. В файл вывод уводит >, а не |."
    hints:
      - "Подумайте, откуда правая команда берёт данные для обработки."
    variants:
      - prompt: "Чем > отличается от >> при перенаправлении в файл?"
        choices:
          - id: a
            text: "> перезаписывает файл целиком, >>"
          - id: b
            text: "> дописывает, а >> перезаписывает"
          - id: c
            text: "они делают одно и то же"
          - id: d
            text: "> работает только с новыми файлами"
        correct: [a]
        explanation: "> создаёт файл заново, стирая прежнее содержимое. >> добавляет вывод в конец, сохраняя то, что уже было."
      - prompt: "Что делает подстановка команд $( ... )?"
        choices:
          - id: a
            text: "подставляет вывод команды как текст на"
          - id: b
            text: "запускает команду в фоне"
          - id: c
            text: "сравнивает команду с файлом"
          - id: d
            text: "экранирует специальные символы"
        correct: [a]
        explanation: "$( ... ) выполняет команду внутри скобок и подставляет её стандартный вывод как строку туда, где написана подстановка. Часто результат кладут в переменную."

  - id: pipe-blanks-001
    concept: pipes-and-tools
    type: fill-in-blanks
    difficulty: 1
    prompt: "Соедините команды в конвейер: посчитайте число строк в выводе ls."
    template: |
      ls {{pipe}} wc -l
    blanks:
      pipe:
        accept: ['|']
    explanation: "Пайп | направляет вывод ls на вход wc -l, и wc считает, сколько строк ему пришло."
    hints:
      - "Нужен один символ, соединяющий вывод одной команды со входом другой."
    variants:
      - prompt: "Перенаправьте вывод echo в файл, стерев прежнее содержимое."
        template: |
          echo "лог" {{redir}} out.txt
        blanks:
          redir:
            accept: ['>']
        explanation: "> записывает вывод в файл, полностью заменяя его прежнее содержимое."
      - prompt: "Допишите подстановку так, чтобы today содержала вывод команды date."
        template: |
          today={{sub}}date)
        blanks:
          sub:
            accept: ['$(']
        explanation: "$(date) выполняет команду date и подставляет её вывод в переменную today."

  - id: pipe-predict-001
    concept: pipes-and-tools
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает команда? Введите одно число."
    snippet: |
      echo "Москва Казань Тверь" | wc -w
    expected:
      kind: scalar
      value: 3
    explanation: "echo печатает строку из трёх слов, а wc -w считает слова в своём входе. Слов три, поэтому результат 3."
    hints:
      - "wc -w считает слова, разделённые пробелами."
    variants:
      - prompt: "Что напечатает команда? Введите одно число."
        snippet: |
          printf "яблоко\nбанан\nвишня\n" | wc -l
        expected:
          kind: scalar
          value: 3
        explanation: "printf печатает три строки, каждая завершается переносом \\n. wc -l считает переносы строк, поэтому результат 3."

  - id: pipe-quiz-002
    concept: pipes-and-tools
    type: theory-quiz
    difficulty: 3
    prompt: "Команда cmd > out.txt 2>&1 кладёт в out.txt и вывод, и ошибки. Что изменит перестановка cmd 2>&1 > out.txt?"
    choices:
      - id: a
        text: "ошибки уйдут на экран, а в файл попадёт только"
      - id: b
        text: "порядок не важен, оба варианта одинаковы"
      - id: c
        text: "в файл попадут только ошибки"
      - id: d
        text: "команда завершится с ошибкой синтаксиса"
    correct: [a]
    explanation: "2>&1 означает «направь ошибки туда, куда сейчас указывает стандартный вывод». В cmd > out.txt 2>&1 вывод уже перенаправлен в файл, поэтому туда же идут ошибки. В cmd 2>&1 > out.txt ошибки привязываются к экрану до того, как вывод ушёл в файл, поэтому в файл попадёт только обычный вывод."
    hints:
      - "2>&1 копирует текущее назначение стандартного вывода на тот момент, когда shell его встречает."
      - "Смотрите, куда указывает стандартный вывод в тот момент, когда shell читает 2>&1."

  - id: pipe-predict-002
    concept: pipes-and-tools
    type: predict-output
    difficulty: 3
    prompt: "Что напечатает конвейер? Введите одно число."
    snippet: |
      printf "яблоко\nбанан\nяблоко\nвишня\nбанан\n" | sort | uniq | wc -l
    expected:
      kind: scalar
      value: 3
    explanation: "sort упорядочивает пять строк и ставит одинаковые рядом. uniq схлопывает соседние повторы, оставляя яблоко, банан и вишня. wc -l считает три оставшиеся строки."
    hints:
      - "uniq убирает только соседние одинаковые строки, поэтому перед ним ставят sort."
      - "Выпишите уникальные значения: сколько их осталось после sort и uniq?"
    variants:
      - prompt: "Что напечатает конвейер? Введите одно число."
        snippet: |
          printf "3\n1\n2\n1\n3\n3\n" | sort | uniq | wc -l
        expected:
          kind: scalar
          value: 3
        explanation: "После sort одинаковые числа встают рядом, uniq оставляет по одному: 1, 2 и 3. wc -l считает три строки."
