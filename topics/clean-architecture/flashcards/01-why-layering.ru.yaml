conceptId: why-layering
cards:
  - id: why-layering-01
    front: "Что такое слой в смысле слоистой архитектуры?"
    back: "Это уровень ответственности, а не папка или модуль. Правила предметной области, сценарии приложения и технические детали - три разных уровня, меняющихся по разным причинам."
    tags: [layering, mental-model]
  - id: why-layering-02
    front: "Что такое связанность (coupling)?"
    back: "Мера того, насколько один модуль зависит от устройства другого. Высокая связанность означает, что правка A тянет за собой правки в B, C и D; низкая - что модуль можно переписать целиком, сохранив контракт."
    tags: [coupling]
  - id: why-layering-03
    front: "Что такое зацепление (cohesion) и каким оно должно быть?"
    back: "Насколько элементы внутри модуля посвящены одной задаче. Цель - высокое зацепление, когда модуль делает что-то одно целиком. Высокое зацепление и низкая связанность идут вместе."
    tags: [cohesion]
  - id: why-layering-04
    front: "Почему тестируемость - честный индикатор разделения на слои?"
    back: "Если, чтобы проверить бизнес-правило, нужен живой PostgreSQL, сеть или фреймворк, значит правило недостаточно отделено от деталей. Чистая функция вроде «discounted_total» проверяется без всякой инфраструктуры."
    tags: [testability]
  - id: why-layering-05
    front: "Почему функция с SQL-запросом, расчётом скидки и отправкой письма внутри - плохо связана?"
    back: "Бизнес-правило (формула скидки) намертво вплетено в psycopg2 и smtp. Поменять порог скидки без живой базы и почтового сервера невозможно, потому что правило не существует отдельно от инфраструктуры."
    tags: [coupling, example]
  - id: why-layering-06
    front: "Почему наличие папок controllers, services, repositories ещё не означает наличие слоёв?"
    back: "Слои существуют там, где проходят границы знаний, а не там, где лежат файлы. Если service знает, что репозиторий хранит данные в SQL, граница фиктивна, и смена базы всё равно потащит правки в сервис."
    tags: [pitfall]
  - id: why-layering-07
    front: "Хорошая эвристика на ревью для проверки разделения слоёв?"
    back: "Спросить «что нужно поднять, чтобы протестировать эту функцию?». Если ответ - база, сеть или фреймворк, а функция вроде бы про бизнес-правило, слои перепутаны."
    tags: [heuristic, review]
  - id: why-layering-08
    front: "Почему разбиение кода на много файлов само по себе не архитектура?"
    back: "Десять файлов, свободно импортирующих друг друга в любую сторону, связаны не меньше одного большого файла. Важны направления зависимостей, а не количество файлов."
    tags: [pitfall]
  - id: why-layering-09
    front: "Как правильно передавать данные в бизнес-правило?"
    back: "Передавать готовые данные, а не способ их добыть. Если тащить запрос к базе прямо в правило ради удобства, оно снова окажется прибито к SQL."
    tags: [pitfall]
