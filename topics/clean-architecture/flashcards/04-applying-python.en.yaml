conceptId: applying-python
cards:
  - id: applying-python-01
    front: "How do Clean Architecture rings map to a Python project structure?"
    back: "To packages: domain (entities), application (use cases and ports), infrastructure (adapters), interface (controllers, CLI), main.py (composition root). Inner packages do not import outer ones."
    tags: [packages, structure]
  - id: applying-python-02
    front: "Which imports are allowed between domain, application, infrastructure, and interface?"
    back: "domain imports nothing from the project. application imports domain but not infrastructure. infrastructure and interface import application and domain but not each other. main.py imports everything and wires it."
    tags: [packages, imports]
  - id: applying-python-03
    front: "Why is typing.Protocol convenient for a port in Python vs ABC?"
    back: "Protocol defines a structural contract: any class with matching methods counts without explicit inheritance. That removes coupling even at the inheritance level, and infrastructure does not depend on the port name."
    tags: [protocol, ports]
  - id: applying-python-04
    front: "When is abc.ABC still appropriate instead of Protocol in Python?"
    back: "When inheritance must be mandatory, for example to get a runtime error if a method is missing. Both approaches are valid: Protocol for structural matching, ABC for an explicit contract."
    tags: [protocol, abc]
  - id: applying-python-05
    front: "What is a composition root?"
    back: "The single assembly point per application (usually main.py or a factory) where concrete classes are created and wired: repository into use case, use case into controller. Only here does code see both abstractions and implementations."
    tags: [composition-root]
  - id: applying-python-06
    front: "What sign shows dependency inversion is complete in a Python project?"
    back: "Concrete infrastructure class names (SqlOrderRepository, EmailNotifier) appear in exactly two places: where the class is defined and in the composition root. If they surface in use cases, inversion is incomplete."
    tags: [composition-root, heuristic]
  - id: applying-python-07
    front: "Why can layers be harmful luxury?"
    back: "Layers pay off only through change: non-trivial business logic and a real chance of technology switches or serious tests. For a one-day script, five rings and three interfaces are pure overhead with no benefit."
    tags: [pitfall, overhead]
  - id: applying-python-08
    front: "When should you add a layer — immediately or later?"
    back: "Later: start simple and add a layer exactly when mixing starts to hurt (tests need a database, a second delivery channel appears). Premature layering is as harmful as premature optimization."
    tags: [pragmatics]
  - id: applying-python-09
    front: "How do you check dependency direction between packages automatically?"
    back: "With import-linter in CI: describe contracts like package domain must not import application, infrastructure, interface. A violation becomes a failing test, not a review comment."
    tags: [import-linter, ci]
  - id: applying-python-10
    front: "What is scattered composition and why is it bad?"
    back: "When SqlOrderRepository() is created directly in several use cases, there is no single composition point and you cannot swap implementations centrally. Consolidate dependency creation in one composition root."
    tags: [pitfall, composition-root]
