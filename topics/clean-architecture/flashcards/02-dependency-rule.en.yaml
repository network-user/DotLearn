conceptId: dependency-rule
cards:
  - id: dependency-rule-01
    front: "What is the Clean Architecture dependency rule?"
    back: "Source code dependencies always point inward toward higher and more stable policies. Nothing in an inner circle knows anything about an outer one."
    tags: [dependency-rule]
  - id: dependency-rule-02
    front: "List the Clean Architecture rings from center outward."
    back: "Entities, Use Cases, Interface Adapters (controllers, presenters, gateways), Frameworks and Drivers (web, database, external services)."
    tags: [layers]
  - id: dependency-rule-03
    front: "What is the difference between dependency direction and data flow direction?"
    back: "Dependencies in code (import) always point inward toward the center. Runtime data flow moves both ways: a request arrives from outside, a response leaves outside. The rule limits only import."
    tags: [dependency-rule, data-flow]
  - id: dependency-rule-04
    front: "How does dependency inversion flip the arrow from database to domain?"
    back: "The use case declares an interface (for example OrderRepository) in the inner ring and depends only on it. Concrete SqlOrderRepo in infrastructure implements that interface, so it depends on the center, not the other way around."
    tags: [dependency-inversion]
  - id: dependency-rule-05
    front: "Who owns the repository interface — consumer or supplier?"
    back: "The consumer, the use case that calls it, not the implementation. So the interface file sits in the inner ring next to business logic, and SqlOrderRepo sits outside."
    tags: [dependency-inversion, ownership]
  - id: dependency-rule-06
    front: "What is a boundary and what may cross it?"
    back: "The line between rings. Only simple, framework-independent structures cross: primitives, dataclasses, plain structures. You cannot drag ORM models or framework HTTP request objects through."
    tags: [boundary, dto]
  - id: dependency-rule-07
    front: "Why is lazy ORM loading dangerous at a boundary?"
    back: "If an object passed inward hits the database when you access a field, the boundary is leaky and the business scenario unknowingly depends on the database. Pass dead data structures, not live ORM objects."
    tags: [boundary, pitfall]
  - id: dependency-rule-08
    front: "Why is this called inversion, not just abstraction?"
    back: "Just adding an interface is not inversion yet. Inversion means both high-level and low-level modules depend on an abstraction defined on the high-level side. The code dependency flips while control flow stays the same."
    tags: [dependency-inversion]
  - id: dependency-rule-09
    front: "What happens if you store the repository interface in the infrastructure layer?"
    back: "The use case imports it from the outer ring and the dependency arrow points outward again — a rule violation. The interface must be part of the inner layer; the implementation part of the outer."
    tags: [pitfall]
