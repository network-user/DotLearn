conceptId: applying-python
cards:
  - id: applying-python-01
    front: "Как кольца Clean Architecture отображаются на структуру Python-проекта?"
    back: "На пакеты: domain (сущности), application (use cases и порты), infrastructure (адаптеры), interface (контроллеры, CLI), main.py (composition root). Внутренние пакеты не импортируют внешние."
    tags: [packages, structure]
  - id: applying-python-02
    front: "Какие импорты разрешены между пакетами domain, application, infrastructure, interface?"
    back: "domain не импортирует ничего из проекта. application импортирует domain, но не infrastructure. infrastructure и interface импортируют application и domain, но не друг друга. main.py импортирует всё и связывает."
    tags: [packages, imports]
  - id: applying-python-03
    front: "Чем typing.Protocol удобнее ABC для задания порта в Python?"
    back: "Protocol задаёт структурный контракт: реализацией считается любой класс с подходящими методами, без явного наследования. Это убирает связанность даже на уровне наследования, и инфраструктура не зависит даже от имени порта."
    tags: [protocol, ports]
  - id: applying-python-04
    front: "Когда в Python всё же уместен abc.ABC вместо Protocol?"
    back: "Когда нужно сделать наследование обязательным, например чтобы получить ошибку при отсутствии метода в рантайме. Оба подхода уместны: Protocol для структурного соответствия, ABC для явного контракта."
    tags: [protocol, abc]
  - id: applying-python-05
    front: "Что такое composition root?"
    back: "Единственная точка композиции на приложение (обычно main.py или фабрика), где конкретные классы создаются и связываются: репозиторий передаётся в use case, use case в контроллер. Только здесь код видит и абстракции, и реализации."
    tags: [composition-root]
  - id: applying-python-06
    front: "Признак того, что инверсия зависимостей доведена до конца в Python-проекте?"
    back: "Конкретные имена инфраструктурных классов (SqlOrderRepository, EmailNotifier) встречаются ровно в двух местах: в файле, где класс определён, и в composition root. Если они всплывают в use cases, инверсия не доведена."
    tags: [composition-root, heuristic]
  - id: applying-python-07
    front: "Почему слои бывают вредной роскошью?"
    back: "Слои окупаются только изменениями: при нетривиальной бизнес-логике и реальной вероятности смены технологий или серьёзных тестов. Для скрипта-однодневки пять колец и три интерфейса - чистый оверхед без выгоды."
    tags: [pitfall, overhead]
  - id: applying-python-08
    front: "Когда стоит выделять слой - сразу или позже?"
    back: "Позже: начинать просто и выделять слой ровно тогда, когда смешение начало мешать (тест требует базы, замаячил второй способ доставки). Преждевременное расслоение так же вредно, как преждевременная оптимизация."
    tags: [pragmatics]
  - id: applying-python-09
    front: "Чем автоматически проверять направление зависимостей между пакетами?"
    back: "Инструментом import-linter в CI: он позволяет описать контракты вроде «пакет domain не должен импортировать application, infrastructure, interface». Нарушение становится падающим тестом, а не замечанием на ревью."
    tags: [import-linter, ci]
  - id: applying-python-10
    front: "Что такое размазанная композиция и чем она плоха?"
    back: "Когда SqlOrderRepository() создаётся прямо в нескольких use cases, единой точки композиции больше нет, и подменить реализацию централизованно нельзя. Создание зависимостей сводят в один composition root."
    tags: [pitfall, composition-root]
