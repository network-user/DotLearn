conceptId: why-layering
cards:
  - id: why-layering-01
    front: "What is a layer in layered architecture?"
    back: "It is a level of responsibility, not a folder or module. Domain rules, application scenarios, and technical details are three different levels that change for different reasons."
    tags: [layering, mental-model]
  - id: why-layering-02
    front: "What is coupling?"
    back: "A measure of how much one module depends on another's structure. High coupling means a change in A pulls changes in B, C, and D; low coupling means you can rewrite a module entirely while keeping the contract."
    tags: [coupling]
  - id: why-layering-03
    front: "What is cohesion and what should it be?"
    back: "How much elements inside a module are devoted to one task. The goal is high cohesion when a module does one thing completely. High cohesion and low coupling go together."
    tags: [cohesion]
  - id: why-layering-04
    front: "Why is testability an honest indicator of layer separation?"
    back: "If verifying a business rule needs live PostgreSQL, network, or a framework, the rule is not separated enough from details. A pure function like discounted_total is checked without any infrastructure."
    tags: [testability]
  - id: why-layering-05
    front: "Why is a function with SQL, discount calculation, and email inside poorly coupled?"
    back: "The business rule (discount formula) is woven into psycopg2 and smtp. You cannot change the discount threshold without a live database and mail server because the rule does not exist apart from infrastructure."
    tags: [coupling, example]
  - id: why-layering-06
    front: "Why do folders controllers, services, repositories not guarantee layers?"
    back: "Layers exist where knowledge boundaries run, not where files lie. If service knows the repository stores data in SQL, the boundary is fake and switching the database still drags edits into service."
    tags: [pitfall]
  - id: why-layering-07
    front: "A good review heuristic for checking layer separation?"
    back: "Ask what you need to bring up to test this function. If the answer is a database, network, or framework, but the function is supposedly about a business rule, the layers are confused."
    tags: [heuristic, review]
  - id: why-layering-08
    front: "Why is splitting code into many files not architecture by itself?"
    back: "Ten files that freely import each other in any direction are no less coupled than one big file. Dependency direction matters, not file count."
    tags: [pitfall]
  - id: why-layering-09
    front: "How should you pass data into a business rule?"
    back: "Pass ready data, not the way to fetch it. Pulling a database query into the rule for convenience nails it to SQL again."
    tags: [pitfall]
