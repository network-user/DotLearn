conceptId: onion-hexagonal
cards:
  - id: onion-hexagonal-01
    front: "Что общего у гексагональной, луковой и Clean Architecture?"
    back: "Все три сходятся к одной диаграмме зависимостей: домен в центре не зависит ни от чего внешнего, технологии оттеснены на края и зависят от центра. Различие - в словаре и акцентах, а не в направлении зависимостей."
    tags: [overview]
  - id: onion-hexagonal-02
    front: "Что такое порт и адаптер в гексагональной архитектуре?"
    back: "Порт - это интерфейс, объявленный приложением. Адаптер - конкретная реализация порта, привязанная к технологии. Сменить технологию значит написать новый адаптер, не трогая приложение."
    tags: [hexagonal, ports-adapters]
  - id: onion-hexagonal-03
    front: "Чем driving-порт отличается от driven-порта?"
    back: "Driving-порт (входной) - то, через что мир управляет приложением, например интерфейс use case, который дёргает HTTP-контроллер. Driven-порт (выходной) - то, чем приложение управляет миром, например интерфейс репозитория к PostgreSQL."
    tags: [hexagonal, ports-adapters]
  - id: onion-hexagonal-04
    front: "Почему в гексагональной архитектуре выбран шестиугольник, а не четырёхугольник?"
    back: "У шестиугольника нет «верха» и «низа», все стороны равноправны и ни один порт не привилегирован. Это убирает асимметрию входа сверху и базы снизу. Число сторон не означает число портов."
    tags: [hexagonal]
  - id: onion-hexagonal-05
    front: "Что такое доменный сервис в луковой архитектуре?"
    back: "Операция предметной области, естественно не принадлежащая ни одной сущности, например перевод денег между двумя счетами. Он оперирует доменными объектами и не знает ни про базу, ни про транзакции СУБД."
    tags: [onion, domain-service]
  - id: onion-hexagonal-06
    front: "Перечислите кольца луковой архитектуры от центра наружу."
    back: "Доменная модель (сущности, value-объекты), доменные сервисы, сервисы приложения (оркестрация use case), внешнее кольцо: UI, инфраструктура, тесты. Внешние кольца зависят от внутренних."
    tags: [onion, layers]
  - id: onion-hexagonal-07
    front: "На что делает акцент гексагональная архитектура, а на что луковая?"
    back: "Гексагональная - на симметрию входа и выхода и замену технологий на краях (порты и адаптеры). Луковая - на организацию бизнес-логики вокруг доменной модели (концентрические кольца, доменные сервисы)."
    tags: [comparison]
  - id: onion-hexagonal-08
    front: "Что произойдёт, если доменный сервис сам откроет транзакцию БД?"
    back: "Он перестанет быть доменным и съедет во внешнее кольцо, потому что транзакция - забота слоя приложения или инфраструктуры. Доменный сервис должен оперировать только доменными объектами."
    tags: [pitfall]
  - id: onion-hexagonal-09
    front: "Какие вопросы полезнее задавать вместо спора «у нас гексагональная или луковая»?"
    back: "Где границы, кто объявляет интерфейсы, что лежит в центре. Ответы у всех трёх архитектур совпадают, поэтому спор о названиях чаще про термины, чем про код."
    tags: [comparison, heuristic]
  - id: onion-hexagonal-10
    front: "Как луковая и гексагональная архитектуры соотносятся с DDD?"
    back: "Луковая исторически тесно связана с DDD (доменная модель, доменные сервисы, value-объекты). Гексагональная к DDD нейтральна, так как она про границы приложения. На практике их часто соединяют: порты задают границы, а центр организован по DDD."
    tags: [ddd]
