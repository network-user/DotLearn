conceptId: onion-hexagonal
cards:
  - id: onion-hexagonal-01
    front: "What do hexagonal, onion, and Clean Architecture have in common?"
    back: "All three converge on one dependency diagram: the domain in the center depends on nothing external; technology is pushed to the edges and depends on the center. The difference is vocabulary and emphasis, not dependency direction."
    tags: [overview]
  - id: onion-hexagonal-02
    front: "What is a port and an adapter in hexagonal architecture?"
    back: "A port is an interface declared by the application. An adapter is a concrete port implementation tied to a technology. Swapping technology means writing a new adapter without touching the application."
    tags: [hexagonal, ports-adapters]
  - id: onion-hexagonal-03
    front: "How does a driving port differ from a driven port?"
    back: "A driving port (inbound) is how the world drives the application, for example the use case interface an HTTP controller calls. A driven port (outbound) is how the application drives the world, for example a repository interface to PostgreSQL."
    tags: [hexagonal, ports-adapters]
  - id: onion-hexagonal-04
    front: "Why does hexagonal architecture use a hexagon instead of a rectangle?"
    back: "A hexagon has no top or bottom; all sides are equal and no port is privileged. It removes the asymmetry of input on top and database on bottom. The number of sides does not mean the number of ports."
    tags: [hexagonal]
  - id: onion-hexagonal-05
    front: "What is a domain service in onion architecture?"
    back: "A domain operation that naturally does not belong to any single entity, for example transferring money between two accounts. It works with domain objects and knows nothing about the database or DBMS transactions."
    tags: [onion, domain-service]
  - id: onion-hexagonal-06
    front: "List the onion architecture rings from center outward."
    back: "Domain model (entities, value objects), domain services, application services (use case orchestration), outer ring: UI, infrastructure, tests. Outer rings depend on inner ones."
    tags: [onion, layers]
  - id: onion-hexagonal-07
    front: "What does hexagonal emphasize vs onion?"
    back: "Hexagonal: symmetry of input and output and swapping technologies at the edges (ports and adapters). Onion: organizing business logic around the domain model (concentric rings, domain services)."
    tags: [comparison]
  - id: onion-hexagonal-08
    front: "What happens if a domain service opens a DB transaction itself?"
    back: "It stops being domain and moves to the outer ring because transactions are the application or infrastructure layer's job. A domain service should work only with domain objects."
    tags: [pitfall]
  - id: onion-hexagonal-09
    front: "What questions are more useful than arguing hexagonal vs onion?"
    back: "Where are the boundaries, who declares interfaces, what sits in the center. Answers match across all three architectures, so the name debate is usually about terms, not code."
    tags: [comparison, heuristic]
  - id: onion-hexagonal-10
    front: "How do onion and hexagonal relate to DDD?"
    back: "Onion is historically tied to DDD (domain model, domain services, value objects). Hexagonal is neutral to DDD because it is about application boundaries. In practice they are often combined: ports set boundaries, the center is organized by DDD."
    tags: [ddd]
