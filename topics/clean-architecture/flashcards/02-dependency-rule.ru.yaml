conceptId: dependency-rule
cards:
  - id: dependency-rule-01
    front: "Как звучит правило зависимостей Clean Architecture?"
    back: "Зависимости в исходном коде всегда указывают внутрь, к более высоким и стабильным политикам. Ничто во внутреннем круге не знает ничего о внешнем."
    tags: [dependency-rule]
  - id: dependency-rule-02
    front: "Перечислите кольца Clean Architecture от центра наружу."
    back: "Entities (сущности), Use Cases (сценарии использования), Interface Adapters (контроллеры, презентеры, шлюзы), Frameworks and Drivers (веб, база, внешние сервисы)."
    tags: [layers]
  - id: dependency-rule-03
    front: "В чём разница между направлением зависимостей и направлением потока данных?"
    back: "Зависимости в коде (import) всегда направлены внутрь, к центру. Поток данных во время выполнения ходит в обе стороны: запрос приходит снаружи, ответ уходит наружу. Правило ограничивает только import."
    tags: [dependency-rule, data-flow]
  - id: dependency-rule-04
    front: "Как инверсия зависимостей разворачивает стрелку от базы к домену?"
    back: "Use case объявляет интерфейс (например, OrderRepository) во внутреннем кольце и зависит только от него. Конкретный SqlOrderRepo в инфраструктуре реализует этот интерфейс, поэтому зависит от центра, а не наоборот."
    tags: [dependency-inversion]
  - id: dependency-rule-05
    front: "Кому принадлежит интерфейс репозитория - потребителю или поставщику?"
    back: "Потребителю, то есть use case, который его вызывает, а не реализации. Поэтому файл интерфейса лежит во внутреннем кольце рядом с бизнес-логикой, а класс SqlOrderRepo - снаружи."
    tags: [dependency-inversion, ownership]
  - id: dependency-rule-06
    front: "Что такое граница (boundary) и что через неё можно передавать?"
    back: "Линия между кольцами. Через неё проходят только простые, не зависящие от фреймворка структуры: примитивы, dataclass, обычные структуры. Нельзя протаскивать ORM-модели или объекты HTTP-запроса фреймворка."
    tags: [boundary, dto]
  - id: dependency-rule-07
    front: "Чем опасна ленивая загрузка ORM при пересечении границы?"
    back: "Если объект, переданный внутрь, при обращении к полю делает запрос в базу, граница дырявая, и бизнес-сценарий незаметно зависит от базы. Через границу передают «мёртвые» структуры данных, а не живые объекты ORM."
    tags: [boundary, pitfall]
  - id: dependency-rule-08
    front: "Почему механизм называется инверсией, а не просто абстракцией?"
    back: "«Просто завести интерфейс» - ещё не инверсия. Инверсия в том, что и высокоуровневый, и низкоуровневый модуль зависят от абстракции, определённой на стороне высокого уровня. Разворачивается зависимость в коде, а поток управления остаётся прежним."
    tags: [dependency-inversion]
  - id: dependency-rule-09
    front: "Чем грозит хранение интерфейса репозитория в слое инфраструктуры?"
    back: "Use case будет импортировать его из внешнего кольца, и стрелка зависимости снова смотрит наружу - это нарушение правила. Интерфейс должен быть частью внутреннего слоя, а реализация - внешнего."
    tags: [pitfall]
