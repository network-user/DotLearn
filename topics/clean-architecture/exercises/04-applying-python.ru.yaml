exercises:
  - id: apply-import-rule-001
    concept: applying-python
    type: theory-quiz
    difficulty: 1
    prompt: "Как правило зависимостей выражается через структуру пакетов `domain`, `application`, `infrastructure`, `interface`?"
    choices:
      - id: a
        text: "Внутренние пакеты не импортируют внешние: `application` импортирует `domain`, но не `infrastructure`."
      - id: b
        text: "Все пакеты могут свободно импортировать друг друга, лишь бы файлов было много."
      - id: c
        text: "`domain` импортирует `infrastructure`, чтобы знать, как хранятся данные."
      - id: d
        text: "`infrastructure` и `interface` обязаны импортировать друг друга."
    correct: [a]
    explanation: "Дисциплина импортов и есть архитектура. `domain` не импортирует ничего из проекта; `application` импортирует `domain`, но не `infrastructure`; `infrastructure` и `interface` импортируют центр, но не друг друга. Любая стрелка наружу - нарушение правила."
    variants:
      - prompt: "Какой пакет в предложенной раскладке не импортирует ничего из проекта?"
        choices:
          - id: a
            text: "domain - сущности и value-объекты в самом центре."
          - id: b
            text: "infrastructure - адаптеры к SQL и API."
          - id: c
            text: "interface - контроллеры FastAPI и CLI."
          - id: d
            text: "main.py - composition root."
        correct: [a]
        explanation: "`domain` лежит в центре и не импортирует ничего из проекта. `main.py`, наоборот, импортирует всё и связывает; `infrastructure` и `interface` импортируют центр."
      - prompt: "Где в предложенной раскладке живут use cases и порты (интерфейсы)?"
        choices:
          - id: a
            text: "В пакете application."
          - id: b
            text: "В пакете infrastructure, рядом с реализациями."
          - id: c
            text: "В пакете interface, рядом с контроллерами."
          - id: d
            text: "В main.py - composition root."
        correct: [a]
        explanation: "Use cases и порты лежат в `application`. Реализации портов - в `infrastructure`, контроллеры - в `interface`, а сборка зависимостей - в `main.py`."

  - id: apply-protocol-001
    concept: applying-python
    type: theory-quiz
    difficulty: 2
    prompt: "Чем `typing.Protocol` удобен для порта в Python по сравнению с `abc.ABC`?"
    choices:
      - id: a
        text: "Реализация соответствует структурно (по методам), без явного наследования и упоминания имени порта."
      - id: b
        text: "Protocol запрещает любое наследование, поэтому код становится быстрее."
      - id: c
        text: "Protocol автоматически создаёт SQL-таблицу для каждого метода."
      - id: d
        text: "Protocol требует, чтобы реализация наследовалась от него явно, в отличие от ABC."
    correct: [a]
    explanation: "`Protocol` задаёт структурный контракт: реализацией считается любой класс с подходящими методами. `SqlOrderRepository` нигде не упоминает `OrderRepository`, но mypy признаёт его подходящим. Это убирает связанность даже на уровне наследования. Когда нужно обязательное наследование и проверка в рантайме - берут `abc.ABC`."
    variants:
      - prompt: "В каком случае раздел советует предпочесть `abc.ABC`, а не `typing.Protocol`, для порта?"
        choices:
          - id: a
            text: "Когда наследование должно быть обязательным - например, чтобы получить ошибку при отсутствии метода в рантайме."
          - id: b
            text: "Всегда: Protocol не годится для портов в реальных проектах на любом пути обработки запроса."
          - id: c
            text: "Когда порт объявлен в пакете infrastructure, во всех сценариях без дополнительной настройки."
          - id: d
            text: "Только когда у порта ровно один метод, независимо от входных данных и окружения."
        correct: [a]
        explanation: "Оба подхода уместны. `abc.ABC` берут, когда нужно обязательное явное наследование и ошибка в рантайме при отсутствии метода. `Protocol` - когда достаточно структурного соответствия и хочется убрать связанность даже на уровне наследования."
      - prompt: "Что верно про реализацию `SqlOrderRepository`, если порт `OrderRepository` задан через `typing.Protocol`?"
        choices:
          - id: a
            text: "Она нигде не упоминает `OrderRepository`, но структурно ему соответствует, и mypy признаёт её подходящей."
          - id: b
            text: "Она обязана явно наследовать `OrderRepository`, иначе mypy выдаст ошибку как полное описание этого поведения."
          - id: c
            text: "Именно она должна лежать в том же файле, что и порт и ничего сверх этого набора как полное описание этого поведения."
          - id: d
            text: "Она автоматически получает реализации методов из протокола как полное описание этого поведения."
        correct: [a]
        explanation: "При `Protocol` соответствие структурное: достаточно иметь методы `save` и `by_id` с совместимыми сигнатурами. `SqlOrderRepository` не наследует порт и не упоминает его имя - связанность минимальна, инфраструктура не зависит даже от имени порта."

  - id: apply-composition-root-001
    concept: applying-python
    type: theory-quiz
    difficulty: 3
    prompt: "Что такое composition root и по какому признаку видно, что инверсия доведена до конца?"
    choices:
      - id: a
        text: "Единственная точка, где конкретные классы создаются и связываются"
      - id: b
        text: "Корневой класс домена, от которого наследуются все сущности."
      - id: c
        text: "Папка с тестами, куда сводятся все заглушки приложения."
      - id: d
        text: "Главный SQL-запрос, с которого начинается работа приложения."
    correct: [a]
    explanation: "Composition root - точка композиции, обычно в `main.py` или фабрике, где создают репозиторий, передают его в use case, а use case - в контроллер. Признак здоровой архитектуры: конкретные инфраструктурные имена встречаются ровно в двух местах - в файле определения и в composition root. Если они всплывают в use cases, инверсия не доведена до конца. Имена вроде SqlOrderRepository встречаются только там и в файле определения."
    hints:
      - "Раздел даёт точную метрику: в скольких местах проекта должно встречаться имя `SqlOrderRepository`, чтобы инверсия была доведена до конца?"
      - "Внутри use case, домена и контроллера никаких `SqlOrderRepository(..)` быть не должно - они получают готовые зависимости через конструктор. Создание собрано в одном месте."

  - id: apply-overhead-001
    concept: applying-python
    type: theory-quiz
    difficulty: 3
    prompt: "Когда раздел называет полное расслоение на кольца вредной роскошью?"
    choices:
      - id: a
        text: "Когда нет нетривиальной бизнес-логики и реальной вероятности смены технологий"
      - id: b
        text: "Всегда: слои - это устаревший подход, от которого надо отказаться."
      - id: c
        text: "Только в проектах на языках без статической типизации."
      - id: d
        text: "Когда в команде меньше пяти разработчиков."
    correct: [a]
    explanation: "Архитектура - инвестиция, окупаемая изменениями. Для скрипта-однодневки, который читает один CSV и пишет в другой, три интерфейса и composition root - чистый оверхед: больше кода, медленнее чтение, ноль выгоды. Здравый подход: выделять слой тогда, когда смешение действительно начало мешать. Тогда слои дают только лишний код и ноль выгоды."
    hints:
      - "Раздел проводит параллель с преждевременной оптимизацией. За счёт чего вообще окупается расслоение?"
      - "Если менять нечего и тестов с базой не предвидится, инвестиция в слои не окупается. Что это значит для скрипта на двести строк?"

  - id: apply-protocol-predict-001
    concept: applying-python
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Реализация структурно соответствует протоколу, не наследуя его."
    snippet: |
      from typing import Protocol

      class Notifier(Protocol):
          def notify(self, msg): ..

      class EmailNotifier:
          def notify(self, msg):
              return f"email: {msg}"

      def announce(n: Notifier, msg):
          return n.notify(msg)

      print(announce(EmailNotifier(), "hi"))
    expected:
      kind: stdout
      value: "email: hi"
    hints:
      - "`EmailNotifier` не наследует `Notifier`, но имеет метод `notify` с подходящей сигнатурой. Достаточно ли этого для структурного протокола во время выполнения?"
      - "Protocol не мешает вызову: Python просто зовёт `notify`. Результат - f-строка с префиксом и переданным сообщением."
    variants:
      - snippet: |
          from typing import Protocol

          class Repo(Protocol):
              def by_id(self, x): ..

          class MemoryRepo:
              def __init__(self):
                  self.data = {"1": "Ann"}
              def by_id(self, x):
                  return self.data.get(x)

          def fetch(repo: Repo, key):
              return repo.by_id(key)

          print(fetch(MemoryRepo(), "1"), fetch(MemoryRepo(), "2"))
        expected:
          kind: stdout
          value: "Ann None"
      - snippet: |
          class PlaceOrder:
              def __init__(self, repo):
                  self._repo = repo
              def execute(self, order):
                  return self._repo.save(order)

          class FakeRepo:
              def save(self, order):
                  return f"saved {order} in memory"

          def build():
              return PlaceOrder(repo=FakeRepo())

          print(build().execute("A-1"))
        expected:
          kind: stdout
          value: "saved A-1 in memory"

  - id: apply-composition-root-blanks-001
    concept: applying-python
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите composition root: создайте конкретные адаптеры и передайте их в use case через конструктор."
    template: |
      def build_place_order(session) -> PlaceOrderUseCase:
          repo = SqlOrderRepository(session)
          notifier = EmailNotifier(smtp_config)
          return PlaceOrderUseCase({{kw_repo}}=repo, {{kw_notifier}}=notifier)
    blanks:
      kw_repo:
        accept: ["repo"]
        accept_regex: '^repo$'
      kw_notifier:
        accept: ["notifier"]
        accept_regex: '^notifier$'
    explanation: "В composition root конкретные классы создаются и передаются в use case по именам его конструктора (`repo`, `notifier`). Сам use case получает готовые зависимости и не создаёт `SqlOrderRepository` внутри себя."
    hints:
      - "Use case принимает зависимости через конструктор по именам параметров. Под какими именами он ждёт репозиторий и нотификатор?"
      - "Имена аргументов должны совпасть с параметрами `PlaceOrderUseCase(repo=.., notifier=..)` из раздела."
    variants:
      - template: |
          def build_place_order(session) -> PlaceOrderUseCase:
              repo = {{repo_cls}}(session)
              notifier = EmailNotifier(smtp_config)
              return PlaceOrderUseCase(repo=repo, notifier=notifier)
        blanks:
          repo_cls:
            accept: ["SqlOrderRepository"]
            accept_regex: '^SqlOrderRepository$'
      - template: |
          class OrderRepository({{proto}}):
              def save(self, order: Order) -> None: ..
              def by_id(self, order_id: str) -> Order | None: ..
        blanks:
          proto:
            accept: ["Protocol"]
            accept_regex: '^Protocol$'

  - id: apply-import-violation-blanks-001
    concept: applying-python
    type: fill-in-blanks
    difficulty: 1
    prompt: "Какой пакет НЕЛЬЗЯ импортировать внутри `application/use_cases.py`, чтобы не нарушить правило зависимостей? Впишите имя пакета."
    template: |
      # внутри application/use_cases.py
      from {{forbidden}} import SqlOrderRepository
    blanks:
      forbidden:
        accept: ["infrastructure"]
        accept_regex: '^infrastructure$'
    explanation: "Самое частое нарушение - `from infrastructure import ..` внутри `application`. `application` лежит во внутреннем кольце и не должен импортировать внешний пакет `infrastructure`; стрелка указала бы наружу. Такие импорты ловят линтером (import-linter) в CI."
    hints:
      - "`application` - внутреннее кольцо. Импорт какого пакета развернул бы стрелку наружу, к технологиям?"
      - "Конкретный SQL-репозиторий живёт во внешнем пакете адаптеров. Его имя в подсказке (`SqlOrderRepository`) намекает, откуда его пытаются взять."
    variants:
      - prompt: "Какой пакет в раскладке проекта НЕ должен импортировать ничего из проекта? Впишите имя пакета."
        template: |
          # этот пакет лежит в центре и не импортирует остальные
          package = "{{center}}"
        blanks:
          center:
            accept: ["domain"]
            accept_regex: '^domain$'
      - prompt: "Какой инструмент из раздела позволяет проверять направление импортов между пакетами автоматически в CI? Впишите его имя."
        template: |
          # CI-проверка контрактов на импорты между пакетами
          tool = "{{linter}}"
        blanks:
          linter:
            accept: ["import-linter"]
            accept_regex: '^import-linter$'

  - id: apply-find-violation-challenge-001
    concept: applying-python
    type: theory-quiz
    difficulty: 4
    prompt: "Ниже фрагмент `application/use_cases.py`. Какая строка нарушает правило зависимостей Clean Architecture в Python-проекте?"
    choices:
      - id: a
        text: "`from infrastructure.sql_order_repo import SqlOrderRepository` и создание `repo = SqlOrderRepository()` прямо в use case."
      - id: b
        text: "`from application.ports import OrderRepository` - импорт порта из своего же кольца как полное описание этого поведения."
      - id: c
        text: "`def execute(self, dto: OrderDTO) -> None:` - приём простого DTO через границу как полное описание этого поведения."
      - id: d
        text: "`self._repo.save(order)` - вызов метода порта, полученного через конструктор как полное описание этого поведения."
    correct: [a]
    explanation: "Импорт `from infrastructure..` во внутреннем пакете `application` и создание конкретного `SqlOrderRepository()` внутри use case разворачивают стрелку наружу: use case начинает зависеть от внешнего кольца и от SQL. Импорт порта из своего кольца, приём DTO и вызов метода инъецированной зависимости правило не нарушают - конкретный класс должен приходить из composition root."
    hints:
      - "Правило ограничивает направление import: внутренний пакет не импортирует внешний. Какой из импортов идёт из внешнего кольца во внутреннее?"
      - "Ищите два симптома сразу: импорт из `infrastructure` и создание конкретного адаптера через конструктор внутри use case. Инъекция и DTO - наоборот, признаки здоровой границы."

  - id: apply-layers-worth-it-challenge-001
    concept: applying-python
    type: theory-quiz
    difficulty: 4
    prompt: "Для каких двух из перечисленных проектов расслоение на кольца, скорее всего, окупится, а не станет оверхедом?"
    choices:
      - id: a
        text: "Платёжный сервис со сложными бизнес-правилами, где база может смениться и нужны тесты без живой СУБД."
      - id: b
        text: "Скрипт на 200 строк, который читает один CSV и пишет в другой, без бизнес-логики как полное описание этого поведения."
      - id: c
        text: "Backend с нетривиальной доменной логикой и несколькими каналами доставки (email, Slack), которые могут меняться."
      - id: d
        text: "Разовая миграция данных, которую запустят один раз и выбросят как полное описание этого поведения."
    correct: [a, c]
    explanation: "Архитектура окупается изменениями. Платёжный сервис (сложные правила, вероятная смена базы, дорогие тесты) и backend с несколькими меняющимися каналами доставки - как раз те случаи, где слои защищают центр и удешевляют тесты. CSV-скрипт и разовая миграция менять нечего: для них кольца - чистый оверхед, как преждевременная оптимизация."
    hints:
      - "Спросите про каждый проект: есть ли нетривиальная бизнес-логика и реальная вероятность смены технологий или серьёзных тестов? Только тогда инвестиция окупается."
      - "Однодневки и проекты без бизнес-логики менять нечего - там слои не окупятся. Здесь правильных ответов больше одного."
