exercises:
  - id: layering-coupling-def-001
    concept: why-layering
    type: theory-quiz
    difficulty: 1
    prompt: "Что в этом разделе называется связанностью (coupling)?"
    choices:
      - id: a
        text: "Мера того, насколько один модуль зависит от внутреннего устройства другого: сколько ломается от одной правки."
      - id: b
        text: "Количество файлов, на которые разбит проект."
      - id: c
        text: "Насколько элементы внутри одного модуля посвящены одной задаче."
      - id: d
        text: "Скорость, с которой выполняется запрос к базе данных."
    correct: [a]
    explanation: "Связанность - это степень зависимости одного модуля от устройства другого. Высокая связанность означает, что правка в A тянет за собой правки в B, C и D. Вариант про «один модуль занят одним делом» описывает зацепление (cohesion), а не связанность."
    variants:
      - prompt: "Что в этом разделе называется зацеплением (cohesion)?"
        choices:
          - id: a
            text: "Насколько элементы внутри модуля посвящены одной задаче; высокое зацепление - модуль делает что-то одно целиком."
          - id: b
            text: "Насколько один модуль зависит от внутреннего устройства другого."
          - id: c
            text: "Число публичных методов в классе."
          - id: d
            text: "Глубина дерева наследования."
        correct: [a]
        explanation: "Зацепление - это про то, насколько модуль занят одним делом. Высокое зацепление - хорошо. Зависимость от устройства соседа - это связанность, обратная характеристика."
      - prompt: "Какая комбинация связанности и зацепления - цель слоистой архитектуры?"
        choices:
          - id: a
            text: "Низкая связанность между модулями и высокое зацепление внутри."
          - id: b
            text: "Высокая связанность и высокое зацепление."
          - id: c
            text: "Низкая связанность и низкое зацепление."
          - id: d
            text: "Высокая связанность и низкое зацепление."
        correct: [a]
        explanation: "Цель - низкая связанность между модулями (правка не расползается) и высокое зацепление внутри каждого (модуль занят одним делом). Эти две характеристики обычно достигаются вместе."

  - id: layering-what-is-layer-001
    concept: why-layering
    type: theory-quiz
    difficulty: 2
    prompt: "Что в разделе понимается под «слоем» в слоистой архитектуре?"
    choices:
      - id: a
        text: "Уровень ответственности (правила, сценарии, технические детали), а не папка или модуль сам по себе."
      - id: b
        text: "Папка в файловой системе: есть папка - есть слой."
      - id: c
        text: "Отдельный микросервис с собственной базой данных."
      - id: d
        text: "Класс, от которого наследуются все остальные."
    correct: [a]
    explanation: "Слой - это уровень ответственности. Папки `controllers/`, `services/`, `repositories/` сами по себе слой не создают: если `service` знает, что данные лежат именно в SQL, граница фиктивна. Слой задаётся тем, чего код намеренно не знает о соседях."
    variants:
      - prompt: "Три вида кода в типичном бэкенде меняются по разным причинам. Какая пара «вид кода - причина изменения» названа в разделе?"
        choices:
          - id: a
            text: "Формула скидки (бизнес-правило) меняется из-за бизнеса; драйвер базы (деталь) - из-за смены технологии."
          - id: b
            text: "Бизнес-правило и драйвер базы всегда меняются вместе и по одной причине."
          - id: c
            text: "Сценарий приложения меняется только при смене языка программирования."
          - id: d
            text: "Технические детали меняются реже всего, а бизнес-правила - чаще всего."
        correct: [a]
        explanation: "Правила меняются из-за бизнеса и редко, технические детали - из-за технологий и часто. Смешав их, вы связываете два независимых по природе события. Деталь (драйвер) меняется чаще правила, а не реже."
      - prompt: "Почему в разделе сказано, что папки `controllers/`, `services/`, `repositories/` сами по себе не гарантируют наличие слоёв?"
        choices:
          - id: a
            text: "Если в service просачивается знание о конкретной базе или ORM, граница фиктивна несмотря на папки."
          - id: b
            text: "Потому что в Python нельзя создавать вложенные папки."
          - id: c
            text: "Потому что слой обязан быть отдельным процессом, а не папкой."
          - id: d
            text: "Папки создают слои всегда - утверждение в вопросе неверно."
        correct: [a]
        explanation: "Папки - это форма. Если service знает, что репозиторий хранит данные именно в SQL, смена базы всё равно потащит правки в сервис: граница не настоящая. Слой задаётся тем, чего код о соседях не знает."

  - id: layering-testability-001
    concept: why-layering
    type: theory-quiz
    difficulty: 3
    prompt: "Почему тестируемость названа честным индикатором хорошего разделения на слои?"
    choices:
      - id: a
        text: "Если для проверки бизнес-правила нужно поднять базу и почту, правило недостаточно отделено от деталей."
      - id: b
        text: "Тесты всегда находят все ошибки, поэтому их количество - мера качества архитектуры."
      - id: c
        text: "Чем больше строк в тесте, тем лучше спроектирован код."
      - id: d
        text: "Тестируемость зависит только от выбранного фреймворка для тестов."
    correct: [a]
    explanation: "Лёгкость теста - прямое следствие низкой связанности. Чистая функция `discounted_total` проверяется за миллисекунды без инфраструктуры. Если же тест бизнес-правила требует живого PostgreSQL и SMTP, это сигнал, что слои перемешаны."
    hints:
      - "Вспомните вопрос-эвристику из раздела: «что нужно поднять, чтобы протестировать эту функцию?». Связан ли простой ответ с хорошим разделением?"
      - "Связь работает в одну сторону: низкая связанность делает тест дешёвым. Дорогой тест бизнес-правила - симптом, а не причина."

  - id: layering-coupled-predict-001
    concept: why-layering
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа? (Чистое бизнес-правило скидки, вынесенное из инфраструктуры.)"
    snippet: |
      def discounted_total(total):
          return round(total * 0.9 if total > 1000 else total, 2)

      print([discounted_total(t) for t in [500, 1000, 2000]])
    expected:
      kind: stdout
      value: "[500, 1000, 1800.0]"
    hints:
      - "Условие строгое: `> 1000`. Для каких из значений 500, 1000, 2000 оно истинно?"
      - "Скидка применяется только к 2000 (множитель 0.9). Остальные значения возвращаются как есть, без изменения типа."
    variants:
      - snippet: |
          def discounted_total(total):
              return round(total * 0.8 if total > 500 else total, 2)

          print([discounted_total(t) for t in [300, 500, 600]])
        expected:
          kind: stdout
          value: "[300, 500, 480.0]"
      - snippet: |
          def shipping_fee(weight):
              return 0 if weight > 10 else 5

          print(shipping_fee(10), shipping_fee(11))
        expected:
          kind: stdout
          value: "5 0"

  - id: layering-fake-folders-001
    concept: why-layering
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски: фраза из раздела о том, где реально проходят границы слоёв."
    template: |
      Слои существуют не там, где лежат {{place}},
      а там, где проходят границы {{boundary}}.
    blanks:
      place:
        accept: ["файлы", "папки", "модули"]
        accept_regex: '^(файлы|папки|модули)$'
      boundary:
        accept: ["знаний", "знания"]
        accept_regex: '^знани(й|я)$'
    hints:
      - "Команда может разложить код по папкам `controllers/`, `services/`, `repositories/` и всё равно остаться со связанным кодом. Значит, форма (расположение) не равна границе."
      - "Настоящий слой задаётся тем, чего код о соседях НЕ знает. Граница проходит по тому, что один слой знает или не знает о другом."
    variants:
      - template: |
          Самый честный индикатор хорошего разделения - сложность {{thing}}.
          Если проверка бизнес-правила требует базы и сети, слои {{state}}.
        blanks:
          thing:
            accept: ["теста", "тестов", "тестирования"]
            accept_regex: '^(теста|тестов|тестирования)$'
          state:
            accept: ["перемешаны", "перепутаны", "смешаны"]
            accept_regex: '^(перемешаны|перепутаны|смешаны)$'
      - template: |
          Связанность (coupling) - это мера того, насколько {{n}} модуль
          зависит от {{aspect}} другого.
        blanks:
          n:
            accept: ["один"]
            accept_regex: '^один$'
          aspect:
            accept: ["устройства", "внутреннего устройства", "реализации"]
            accept_regex: '^((внутреннего )?устройства|реализации)$'

  - id: layering-pure-rule-blanks-001
    concept: why-layering
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите чистое бизнес-правило скидки так, чтобы оно не зависело от базы и почты."
    template: |
      def discounted_total(total: float) -> float:
          return total * 0.9 if total {{op}} 1000 else total
    blanks:
      op:
        accept: [">"]
        accept_regex: '^>$'
    explanation: "Условие строгое (`> 1000`): при `total == 1000` скидка не применяется. Функция принимает число и возвращает число - ни базы, ни SMTP, поэтому её можно протестировать за миллисекунды."
    hints:
      - "В разделе граничный тест проверяет: `discounted_total(1000) == 1000`. Скидки при ровно 1000 быть не должно."
      - "Чтобы 1000 НЕ попадала под скидку, сравнение должно быть строгим, без равенства."
    variants:
      - template: |
          def discounted_total(total: float) -> float:
              return total {{mult}} 0.9 if total > 1000 else total
        blanks:
          mult:
            accept: ["*"]
            accept_regex: '^\*$'
      - template: |
          def discounted_total(total: float) -> float:
              return total * 0.9 if total > 1000 {{kw}} total
        blanks:
          kw:
            accept: ["else"]
            accept_regex: '^else$'
