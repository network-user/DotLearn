exercises:
  - id: deprule-direction-001
    concept: dependency-rule
    type: theory-quiz
    difficulty: 1
    prompt: "Куда, согласно правилу зависимостей Clean Architecture, всегда указывают зависимости в исходном коде?"
    choices:
      - id: a
        text: "Внутрь, к более стабильным бизнес-правилам; центр ничего не знает о внешних кольцах."
      - id: b
        text: "Наружу, от бизнес-правил к фреймворкам и базе данных."
      - id: c
        text: "В обе стороны симметрично - кольца знают друг о друге."
      - id: d
        text: "В направлении потока данных во время выполнения."
    correct: [a]
    explanation: "Зависимости в исходном коде (`import`) всегда направлены внутрь, к более высоким политикам. Use case импортирует сущность, но сущность не импортирует use case. Поток данных во время выполнения - отдельная вещь, он ходит в обе стороны."
    variants:
      - prompt: "Что именно ограничивает правило зависимостей?"
        choices:
          - id: a
            text: "Направление import в исходном коде - оно всегда внутрь."
          - id: b
            text: "Направление потока данных во время выполнения - он должен идти только внутрь."
          - id: c
            text: "Количество слоёв - их должно быть ровно четыре."
          - id: d
            text: "Имена классов - они должны начинаться с имени слоя."
        correct: [a]
        explanation: "Правило ограничивает зависимости в исходном коде (import), а не поток данных. Данные во время выполнения нормально текут наружу к ответу; ограничение только на направление import."
      - prompt: "Какое кольцо в Clean Architecture находится в самом центре?"
        choices:
          - id: a
            text: "Сущности (Entities) - самые стабильные бизнес-правила."
          - id: b
            text: "Frameworks & Drivers - веб, база, внешние сервисы."
          - id: c
            text: "Interface Adapters - контроллеры и презентеры."
          - id: d
            text: "Use Cases - сценарии использования."
        correct: [a]
        explanation: "В центре - сущности (самые стабильные правила), вокруг них use cases, дальше адаптеры интерфейсов, снаружи фреймворки и драйверы. Чем ближе к центру, тем стабильнее и тем меньше знаний о внешнем мире."

  - id: deprule-interface-owner-001
    concept: dependency-rule
    type: theory-quiz
    difficulty: 3
    prompt: "В Clean Architecture кому «принадлежит» интерфейс `OrderRepository` и где лежит его файл?"
    choices:
      - id: a
        text: "Потребителю (use case): интерфейс объявлен во внутреннем кольце рядом с бизнес-логикой, реализация - снаружи."
      - id: b
        text: "Поставщику (классу SqlOrderRepo): интерфейс - часть слоя данных, ведь он про хранение."
      - id: c
        text: "Фреймворку: интерфейс генерируется ORM автоматически."
      - id: d
        text: "Никому: интерфейсы в Clean Architecture не используются."
    correct: [a]
    explanation: "Владелец контракта - потребитель, а не поставщик. Интерфейс `OrderRepository` принадлежит use case, который его вызывает, и лежит во внутреннем кольце. `SqlOrderRepo` снаружи реализует его. Поэтому стрелка import идёт от реализации к интерфейсу, то есть внутрь - как требует правило."
    hints:
      - "Если положить интерфейс в слой инфраструктуры, use case будет импортировать его из внешнего кольца - и стрелка снова смотрит наружу. Что это говорит о том, где должен жить интерфейс?"
      - "Центр диктует, что ему нужно («умей сохранять заказ»), а инфраструктура обязана это предоставить. Кто формулирует требование, тот и владеет контрактом."

  - id: deprule-boundary-001
    concept: dependency-rule
    type: theory-quiz
    difficulty: 3
    prompt: "Что можно протаскивать через границу (boundary) между кольцами?"
    choices:
      - id: a
        text: "Простые структуры данных: примитивы, dataclass, не зависящие от фреймворка."
      - id: b
        text: "ORM-модель, которая при доступе к полю делает запрос в базу."
      - id: c
        text: "Объект HTTP-запроса фреймворка целиком."
      - id: d
        text: "Открытое соединение с базой данных."
    correct: [a]
    explanation: "Через границу проходят только «мёртвые» структуры данных, не тащащие знание о внешнем кольце. ORM-модель с ленивой загрузкой делает границу дырявой: бизнес-сценарий незаметно начинает зависеть от базы. Контроллер сам переводит HTTP-запрос в простой DTO до пересечения границы."
    hints:
      - "Проверьте каждый вариант на один вопрос: тащит ли этот объект за собой знание о внешнем кольце (база, HTTP, соединение)?"
      - "Если при обращении к полю объекта незаметно происходит запрос в базу, граница перестаёт защищать центр от инфраструктуры."

  - id: deprule-violation-predict-001
    concept: dependency-rule
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Use case получает репозиторий через конструктор (инъекция зависимости), в тесте подставлен фейк."
    snippet: |
      from abc import ABC, abstractmethod

      class OrderRepository(ABC):
          @abstractmethod
          def save(self, order): ...

      class FakeRepo(OrderRepository):
          def __init__(self):
              self.saved = []
          def save(self, order):
              self.saved.append(order)

      class PlaceOrder:
          def __init__(self, repo):
              self._repo = repo
          def execute(self, order):
              self._repo.save(order)

      repo = FakeRepo()
      PlaceOrder(repo).execute("order-1")
      print(repo.saved)
    expected:
      kind: stdout
      value: "['order-1']"
    hints:
      - "`PlaceOrder` не знает, какой именно репозиторий ему передали - он зовёт только `save`. Что делает `FakeRepo.save`?"
      - "`FakeRepo.save` добавляет аргумент в список `saved`. После одного `execute(\"order-1\")` в списке окажется ровно один элемент."
    variants:
      - snippet: |
          class PlaceOrder:
              def __init__(self, repo):
                  self._repo = repo
              def count(self):
                  return self._repo.total()

          class FakeRepo:
              def total(self):
                  return 3

          print(PlaceOrder(FakeRepo()).count())
        expected:
          kind: stdout
          value: "3"
      - snippet: |
          from abc import ABC, abstractmethod

          class Repo(ABC):
              @abstractmethod
              def label(self): ...

          class SqlRepo(Repo):
              def label(self):
                  return "sql"

          class MemoryRepo(Repo):
              def label(self):
                  return "memory"

          def describe(repo: Repo):
              return repo.label()

          print(describe(SqlRepo()), describe(MemoryRepo()))
        expected:
          kind: stdout
          value: "sql memory"

  - id: deprule-abstract-instantiate-001
    concept: dependency-rule
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Интерфейс репозитория объявлен абстрактным, и его пытаются создать напрямую."
    snippet: |
      from abc import ABC, abstractmethod

      class Repo(ABC):
          @abstractmethod
          def save(self, x): ...

      try:
          Repo()
      except TypeError as e:
          print("TypeError")
    expected:
      kind: stdout
      value: "TypeError"
    hints:
      - "Абстрактный класс - это контракт, а не реализация. Что Python делает, когда вы пытаетесь создать экземпляр класса с нереализованным abstractmethod?"
      - "Создать объект абстрактного класса нельзя: Python поднимает исключение. Какого оно типа - смотрите, какую ветку except оно перехватит."

  - id: deprule-inversion-blanks-001
    concept: dependency-rule
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите use case так, чтобы он зависел от абстракции, а не от конкретного SQL-репозитория."
    template: |
      class PlaceOrderUseCase:
          def __init__(self, repo: {{port}}):
              self._repo = repo

          def execute(self, order):
              self._repo.{{method}}(order)
    blanks:
      port:
        accept: ["OrderRepository"]
        accept_regex: '^OrderRepository$'
      method:
        accept: ["save"]
        accept_regex: '^save$'
    explanation: "Use case аннотирует зависимость интерфейсом `OrderRepository` (внутреннее кольцо) и зовёт его метод `save`. Конкретный `SqlOrderRepo` он не упоминает - так стрелка зависимости развёрнута внутрь."
    hints:
      - "Use case не должен знать про SQL. От какого типа он обязан зависеть, чтобы не упоминать конкретную реализацию?"
      - "Тип - это интерфейс из внутреннего кольца. Метод - тот единственный, который объявлен в этом интерфейсе для сохранения заказа."
    variants:
      - template: |
          from abc import ABC, abstractmethod

          class OrderRepository(ABC):
              @{{deco}}
              def save(self, order) -> None: ...
        blanks:
          deco:
            accept: ["abstractmethod"]
            accept_regex: '^abstractmethod$'
      - template: |
          class SqlOrderRepo({{base}}):
              def save(self, order) -> None:
                  ...
        blanks:
          base:
            accept: ["OrderRepository"]
            accept_regex: '^OrderRepository$'

  - id: deprule-dto-blanks-001
    concept: dependency-rule
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите простую структуру данных, которую можно безопасно протащить через границу слоя."
    template: |
      from dataclasses import dataclass

      @{{deco}}(frozen=True)
      class OrderDTO:
          id: str
          total: float
    blanks:
      deco:
        accept: ["dataclass"]
        accept_regex: '^dataclass$'
    explanation: "`@dataclass(frozen=True)` создаёт простую неизменяемую структуру без поведения и без знания о базе - именно такие объекты разрешено передавать через границу между кольцами."
    hints:
      - "Через границу проходят «мёртвые» структуры данных. В Python такую структуру удобно описать одним декоратором из модуля dataclasses."
      - "Декоратор называется так же, как и сам модуль - он превращает класс в структуру с полями."
    variants:
      - template: |
          from dataclasses import dataclass

          @dataclass({{flag}}=True)
          class OrderDTO:
              id: str
              total: float
        blanks:
          flag:
            accept: ["frozen"]
            accept_regex: '^frozen$'
      - template: |
          from {{mod}} import dataclass

          @dataclass(frozen=True)
          class OrderDTO:
              id: str
              total: float
        blanks:
          mod:
            accept: ["dataclasses"]
            accept_regex: '^dataclasses$'
