exercises:
  - id: deprule-direction-001
    concept: dependency-rule
    type: theory-quiz
    difficulty: 1
    prompt: "According to the Clean Architecture dependency rule, where do dependencies in source code always point?"
    choices:
      - id: a
        text: "Inward, toward more stable business rules; the center knows nothing about outer rings."
      - id: b
        text: "Outward, from business rules toward frameworks and databases as the three required system parts."
      - id: c
        text: "Symmetrically both ways: rings know about each other."
      - id: d
        text: "In the direction of runtime data flow."
    correct: [a]
    explanation: "Dependencies in source code (`import`) always point inward toward higher-level policies. A use case imports an entity, but an entity never imports a use case. Runtime data flow is a separate matter; it moves both ways."
    variants:
      - prompt: "What exactly does the dependency rule limit?"
        choices:
          - id: a
            text: "The direction of import in source code; it always points inward."
          - id: b
            text: "The direction of runtime data flow: it must go only inward."
          - id: c
            text: "The number of layers; there must be exactly four."
          - id: d
            text: "Class names: they must start with the layer name."
        correct: [a]
        explanation: "The rule limits dependencies in source code (import), not data flow. Data at runtime normally flows outward to the response; only import direction is restricted."
      - prompt: "Which ring in Clean Architecture sits at the very center?"
        choices:
          - id: a
            text: "Entities: the most stable business rules."
          - id: b
            text: "Frameworks & Drivers: web, database, external services."
          - id: c
            text: "Interface Adapters: controllers and presenters."
          - id: d
            text: "Use Cases: application scenarios."
        correct: [a]
        explanation: "At the center are entities (the most stable rules), around them use cases, then interface adapters, and on the outside frameworks and drivers. Closer to the center means more stable and less knowledge of the outside world."

  - id: deprule-interface-owner-001
    concept: dependency-rule
    type: theory-quiz
    difficulty: 3
    prompt: "In Clean Architecture, who owns the `OrderRepository` interface and where does its file live?"
    choices:
      - id: a
        text: "The consumer (use case): the interface is declared in the inner ring next to business logic; the implementation sits outside."
      - id: b
        text: "The supplier (SqlOrderRepo class): the interface is part of the data layer because it is about storage."
      - id: c
        text: "The framework: the interface is generated by the ORM automatically for every request path in the app."
      - id: d
        text: "Nobody: Clean Architecture does not use interfaces, without special-case setup for this flow."
    correct: [a]
    explanation: "The contract owner is the consumer, not the supplier. The `OrderRepository` interface belongs to the use case that calls it and lives in the inner ring. `SqlOrderRepo` outside implements it. So the import arrow runs from implementation to interface, inward, as the rule requires."
    hints:
      - "If you put the interface in the infrastructure layer, the use case imports it from the outer ring and the arrow points outward again. What does that say about where the interface should live?"
      - "The center dictates what it needs (be able to save an order), and infrastructure must provide it. Who formulates the requirement owns the contract."

  - id: deprule-boundary-001
    concept: dependency-rule
    type: theory-quiz
    difficulty: 3
    prompt: "What may cross the boundary between rings?"
    choices:
      - id: a
        text: "Simple data structures: primitives, dataclasses, framework-independent types."
      - id: b
        text: "An ORM model that hits the database when you access a field."
      - id: c
        text: "A framework HTTP request object whole for every request path in the app."
      - id: d
        text: "An open database connection as a complete account of that behavior."
    correct: [a]
    explanation: "Only dead data structures cross the boundary, not objects that carry knowledge of the outer ring. An ORM model with lazy loading makes the boundary leaky: the business scenario unknowingly depends on the database. The controller translates the HTTP request into a simple DTO before crossing the boundary."
    hints:
      - "Check each option with one question: does this object carry knowledge of the outer ring (database, HTTP, connection)?"
      - "If accessing a field quietly triggers a database query, the boundary stops protecting the center from infrastructure."

  - id: deprule-violation-predict-001
    concept: dependency-rule
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? The use case receives the repository through the constructor (dependency injection); a fake is substituted in the test."
    snippet: |
      from abc import ABC, abstractmethod

      class OrderRepository(ABC):
          @abstractmethod
          def save(self, order): ..

      class FakeRepo(OrderRepository):
          def __init__(self):
              self.saved = []
          def save(self, order):
              self.saved.append(order)

      class PlaceOrder:
          def __init__(self, repo):
              self._repo = repo
          def execute(self, order):
              self._repo.save(order)

      repo = FakeRepo()
      PlaceOrder(repo).execute("order-1")
      print(repo.saved)
    expected:
      kind: stdout
      value: "['order-1']"
    hints:
      - "`PlaceOrder` does not know which repository it received; it only calls `save`. What does `FakeRepo.save` do?"
      - "`FakeRepo.save` appends the argument to `saved`. After one `execute(\"order-1\")` the list has exactly one element."
    variants:
      - snippet: |
          class PlaceOrder:
              def __init__(self, repo):
                  self._repo = repo
              def count(self):
                  return self._repo.total()

          class FakeRepo:
              def total(self):
                  return 3

          print(PlaceOrder(FakeRepo()).count())
        expected:
          kind: stdout
          value: "3"
      - snippet: |
          from abc import ABC, abstractmethod

          class Repo(ABC):
              @abstractmethod
              def label(self): ..

          class SqlRepo(Repo):
              def label(self):
                  return "sql"

          class MemoryRepo(Repo):
              def label(self):
                  return "memory"

          def describe(repo: Repo):
              return repo.label()

          print(describe(SqlRepo()), describe(MemoryRepo()))
        expected:
          kind: stdout
          value: "sql memory"

  - id: deprule-abstract-instantiate-001
    concept: dependency-rule
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? The repository interface is abstract, and code tries to instantiate it directly."
    snippet: |
      from abc import ABC, abstractmethod

      class Repo(ABC):
          @abstractmethod
          def save(self, x): ..

      try:
          Repo()
      except TypeError as e:
          print("TypeError")
    expected:
      kind: stdout
      value: "TypeError"
    hints:
      - "An abstract class is a contract, not an implementation. What does Python do when you try to instantiate a class with an unimplemented abstractmethod?"
      - "You cannot create an instance of an abstract class: Python raises an exception. Which type? See which except branch catches it."

  - id: deprule-inversion-blanks-001
    concept: dependency-rule
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the use case so it depends on an abstraction, not a concrete SQL repository."
    template: |
      class PlaceOrderUseCase:
          def __init__(self, repo: {{port}}):
              self._repo = repo

          def execute(self, order):
              self._repo.{{method}}(order)
    blanks:
      port:
        accept: ["OrderRepository"]
        accept_regex: '^OrderRepository$'
      method:
        accept: ["save"]
        accept_regex: '^save$'
    explanation: "The use case annotates its dependency with the `OrderRepository` interface (inner ring) and calls its `save` method. It does not mention concrete `SqlOrderRepo`: that is how the dependency arrow is flipped inward."
    hints:
      - "The use case must not know about SQL. What type must it depend on so it does not mention a concrete implementation?"
      - "The type is the interface from the inner ring. The method is the one declared in that interface for saving an order."
    variants:
      - template: |
          from abc import ABC, abstractmethod

          class OrderRepository(ABC):
              @{{deco}}
              def save(self, order) -> None: ..
        blanks:
          deco:
            accept: ["abstractmethod"]
            accept_regex: '^abstractmethod$'
      - template: |
          class SqlOrderRepo({{base}}):
              def save(self, order) -> None:
                  ..
        blanks:
          base:
            accept: ["OrderRepository"]
            accept_regex: '^OrderRepository$'

  - id: deprule-dto-blanks-001
    concept: dependency-rule
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete the simple data structure that can safely cross a layer boundary."
    template: |
      from dataclasses import dataclass

      @{{deco}}(frozen=True)
      class OrderDTO:
          id: str
          total: float
    blanks:
      deco:
        accept: ["dataclass"]
        accept_regex: '^dataclass$'
    explanation: "`@dataclass(frozen=True)` creates a simple immutable structure with no behavior and no knowledge of the database, exactly the kind of object allowed to cross a boundary between rings."
    hints:
      - "Dead data structures cross the boundary. In Python you conveniently describe such a structure with one decorator from the dataclasses module."
      - "The decorator has the same name as the module; it turns a class into a structure with fields."
    variants:
      - template: |
          from dataclasses import dataclass

          @dataclass({{flag}}=True)
          class OrderDTO:
              id: str
              total: float
        blanks:
          flag:
            accept: ["frozen"]
            accept_regex: '^frozen$'
      - template: |
          from {{mod}} import dataclass

          @dataclass(frozen=True)
          class OrderDTO:
              id: str
              total: float
        blanks:
          mod:
            accept: ["dataclasses"]
            accept_regex: '^dataclasses$'
