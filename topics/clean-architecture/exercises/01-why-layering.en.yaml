exercises:
  - id: layering-coupling-def-001
    concept: why-layering
    type: theory-quiz
    difficulty: 1
    prompt: "What is coupling in this section?"
    choices:
      - id: a
        text: "A measure of how much one module depends on the internal structure of another: how much breaks from one edit."
      - id: b
        text: "The number of files the project is split into."
      - id: c
        text: "How much elements inside one module are devoted to one task."
      - id: d
        text: "The speed at which a database query runs."
    correct: [a]
    explanation: "Coupling is the degree to which one module depends on how another is built. High coupling means a change in A pulls changes in B, C, and D. The option about one module doing one job describes cohesion, not coupling."
    variants:
      - prompt: "What is cohesion in this section?"
        choices:
          - id: a
            text: "How much elements inside a module are devoted to one task; high cohesion means the module does one thing completely."
          - id: b
            text: "How much one module depends on the internal structure of another."
          - id: c
            text: "The number of public methods in a class."
          - id: d
            text: "The depth of the inheritance tree."
        correct: [a]
        explanation: "Cohesion is about how focused a module is on one job. High cohesion is good. Depending on a neighbor's internals is coupling, the opposite characteristic."
      - prompt: "Which coupling and cohesion combination is the goal of layered architecture?"
        choices:
          - id: a
            text: "Low coupling between modules and high cohesion inside."
          - id: b
            text: "High coupling and high cohesion."
          - id: c
            text: "Low coupling and low cohesion."
          - id: d
            text: "High coupling and low cohesion."
        correct: [a]
        explanation: "The goal is low coupling between modules (a change does not spread) and high cohesion inside each (the module does one job). These two characteristics are usually achieved together."

  - id: layering-what-is-layer-001
    concept: why-layering
    type: theory-quiz
    difficulty: 2
    prompt: "What does this section mean by a layer in layered architecture?"
    choices:
      - id: a
        text: "A level of responsibility (rules, scenarios, technical details), not a folder or module by itself."
      - id: b
        text: "A folder in the filesystem: if the folder exists, the layer exists."
      - id: c
        text: "A separate microservice with its own database."
      - id: d
        text: "A class that all others inherit from."
    correct: [a]
    explanation: "A layer is a level of responsibility. Folders like `controllers/`, `services/`, `repositories/` do not create a layer by themselves: if `service` knows data lives in SQL specifically, the boundary is fake. A layer is defined by what code deliberately does not know about neighbors."
    variants:
      - prompt: "Three kinds of code in a typical backend change for different reasons. Which pair of code kind and reason for change is named in the section?"
        choices:
          - id: a
            text: "A discount formula (business rule) changes because of the business; a database driver (detail) changes because of a technology switch."
          - id: b
            text: "A business rule and a database driver always change together for the same reason."
          - id: c
            text: "An application scenario changes only when the programming language changes."
          - id: d
            text: "Technical details change least often and business rules most often."
        correct: [a]
        explanation: "Rules change because of the business and rarely; technical details change because of technology and often. Mix them and you tie together two events that are independent by nature. A detail (driver) changes more often than a rule, not less."
      - prompt: "Why does the section say folders like `controllers/`, `services/`, `repositories/` do not guarantee layers by themselves?"
        choices:
          - id: a
            text: "If knowledge of a concrete database or ORM leaks into service, the boundary is fake despite the folders."
          - id: b
            text: "Because Python cannot create nested folders."
          - id: c
            text: "Because a layer must be a separate process, not a folder."
          - id: d
            text: "Folders always create layers: the claim in the question is wrong."
        correct: [a]
        explanation: "Folders are form. If service knows the repository stores data in SQL specifically, switching the database still drags edits into service: the boundary is not real. A layer is defined by what code does not know about neighbors."

  - id: layering-testability-001
    concept: why-layering
    type: theory-quiz
    difficulty: 3
    prompt: "Why is testability called an honest indicator of good layer separation?"
    choices:
      - id: a
        text: "If verifying a business rule requires bringing up a database and mail, the rule is not separated enough from details."
      - id: b
        text: "Tests always find every bug, so their count measures architecture quality."
      - id: c
        text: "The more lines in a test, the better the code is designed."
      - id: d
        text: "Testability depends only on the chosen test framework."
    correct: [a]
    explanation: "Easy tests are a direct consequence of low coupling. The pure function `discounted_total` is checked in milliseconds without infrastructure. If testing a business rule needs live PostgreSQL and SMTP, that signals mixed layers."
    hints:
      - "Recall the review heuristic from the section: what do you need to bring up to test this function? Is a simple answer tied to good separation?"
      - "The link works one way: low coupling makes tests cheap. An expensive business-rule test is a symptom, not a cause."

  - id: layering-coupled-predict-001
    concept: why-layering
    type: predict-output
    difficulty: 2
    prompt: "What does this program print? (Pure discount business rule pulled out of infrastructure.)"
    snippet: |
      def discounted_total(total):
          return round(total * 0.9 if total > 1000 else total, 2)

      print([discounted_total(t) for t in [500, 1000, 2000]])
    expected:
      kind: stdout
      value: "[500, 1000, 1800.0]"
    hints:
      - "The condition is strict: `> 1000`. For which of 500, 1000, 2000 is it true?"
      - "The discount applies only to 2000 (multiplier 0.9). Other values are returned as-is, without changing type."
    variants:
      - snippet: |
          def discounted_total(total):
              return round(total * 0.8 if total > 500 else total, 2)

          print([discounted_total(t) for t in [300, 500, 600]])
        expected:
          kind: stdout
          value: "[300, 500, 480.0]"
      - snippet: |
          def shipping_fee(weight):
              return 0 if weight > 10 else 5

          print(shipping_fee(10), shipping_fee(11))
        expected:
          kind: stdout
          value: "5 0"

  - id: layering-fake-folders-001
    concept: why-layering
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the blanks: a phrase from the section about where layer boundaries really run."
    template: |
      Layers exist not where {{place}} lie,
      but where {{boundary}} boundaries run.
    blanks:
      place:
        accept: ["files", "folders", "modules"]
        accept_regex: '^(files|folders|modules)$'
      boundary:
        accept: ["knowledge"]
        accept_regex: '^knowledge$'
    hints:
      - "A team can split code into `controllers/`, `services/`, `repositories/` and still have coupled code. So form (layout) is not the boundary."
      - "A real layer is defined by what code about neighbors does NOT know. The boundary runs along what one layer knows or does not know about another."
    variants:
      - template: |
          The most honest indicator of good separation is the difficulty of the {{thing}}.
          If verifying a business rule requires a database and network, the layers are {{state}}.
        blanks:
          thing:
            accept: ["test", "tests", "testing"]
            accept_regex: '^(test|tests|testing)$'
          state:
            accept: ["mixed", "scrambled", "tangled"]
            accept_regex: '^(mixed|scrambled|tangled)$'
      - template: |
          Coupling is a measure of how much one {{n}} module
          depends on another's {{aspect}}.
        blanks:
          n:
            accept: ["one"]
            accept_regex: '^one$'
          aspect:
            accept: ["structure", "internal structure", "implementation"]
            accept_regex: '^((internal )?structure|implementation)$'

  - id: layering-pure-rule-blanks-001
    concept: why-layering
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete the pure discount business rule so it does not depend on the database or mail."
    template: |
      def discounted_total(total: float) -> float:
          return total * 0.9 if total {{op}} 1000 else total
    blanks:
      op:
        accept: [">"]
        accept_regex: '^>$'
    explanation: "The condition is strict (`> 1000`): at `total == 1000` the discount does not apply. The function takes a number and returns a number (no database, no SMTP) so it can be tested in milliseconds."
    hints:
      - "The section's edge-case test checks: `discounted_total(1000) == 1000`. There should be no discount at exactly 1000."
      - "For 1000 NOT to get the discount, the comparison must be strict, without equality."
    variants:
      - template: |
          def discounted_total(total: float) -> float:
              return total {{mult}} 0.9 if total > 1000 else total
        blanks:
          mult:
            accept: ["*"]
            accept_regex: '^\*$'
      - template: |
          def discounted_total(total: float) -> float:
              return total * 0.9 if total > 1000 {{kw}} total
        blanks:
          kw:
            accept: ["else"]
            accept_regex: '^else$'
