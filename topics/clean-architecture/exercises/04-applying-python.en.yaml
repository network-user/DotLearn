exercises:
  - id: apply-import-rule-001
    concept: applying-python
    type: theory-quiz
    difficulty: 1
    prompt: "How does the dependency rule show up in the `domain`, `application`, `infrastructure`, and `interface` package layout?"
    choices:
      - id: a
        text: "Inner packages do not import outer ones: `application` imports `domain` but not `infrastructure`."
      - id: b
        text: "All packages may freely import each other as long as there are many files."
      - id: c
        text: "`domain` imports `infrastructure` to know how data is stored."
      - id: d
        text: "`infrastructure` and `interface` must import each other."
    correct: [a]
    explanation: "Import discipline is the architecture. `domain` imports nothing from the project; `application` imports `domain` but not `infrastructure`; `infrastructure` and `interface` import the center but not each other. Any arrow outward is a rule violation."
    variants:
      - prompt: "Which package in this layout imports nothing from the project?"
        choices:
          - id: a
            text: "domain: entities and value objects at the very center."
          - id: b
            text: "infrastructure: adapters to SQL and APIs."
          - id: c
            text: "interface: FastAPI controllers and CLI."
          - id: d
            text: "main.py: the composition root."
        correct: [a]
        explanation: "`domain` sits at the center and imports nothing from the project. `main.py`, by contrast, imports everything and wires it; `infrastructure` and `interface` import the center."
      - prompt: "Where do use cases and ports (interfaces) live in this layout?"
        choices:
          - id: a
            text: "In the application package."
          - id: b
            text: "In the infrastructure package, next to implementations."
          - id: c
            text: "In the interface package, next to controllers."
          - id: d
            text: "In main.py, the composition root."
        correct: [a]
        explanation: "Use cases and ports live in `application`. Port implementations are in `infrastructure`, controllers in `interface`, and dependency assembly in `main.py`."

  - id: apply-protocol-001
    concept: applying-python
    type: theory-quiz
    difficulty: 2
    prompt: "Why is `typing.Protocol` convenient for a port in Python compared to `abc.ABC`?"
    choices:
      - id: a
        text: "Implementations match structurally (by methods) without explicit inheritance or mentioning the port name."
      - id: b
        text: "Protocol forbids all inheritance, so code runs faster."
      - id: c
        text: "Protocol automatically creates an SQL table for each method."
      - id: d
        text: "Protocol requires implementations to inherit from it explicitly, unlike ABC."
    correct: [a]
    explanation: "`Protocol` defines a structural contract: any class with matching methods counts. `SqlOrderRepository` never mentions `OrderRepository`, but mypy accepts it. That removes coupling even at the inheritance level. When you need mandatory inheritance and runtime checks, use `abc.ABC`."
    variants:
      - prompt: "When does the section advise preferring `abc.ABC` over `typing.Protocol` for a port?"
        choices:
          - id: a
            text: "When inheritance must be mandatory (for example to get a runtime error if a method is missing)."
          - id: b
            text: "Always: Protocol is unsuitable for ports in real projects."
          - id: c
            text: "When the port is declared in the infrastructure package."
          - id: d
            text: "Only when the port has exactly one method."
        correct: [a]
        explanation: "Both approaches are valid. Use `abc.ABC` when you need explicit inheritance and a runtime error for a missing method. Use `Protocol` when structural matching is enough and you want to avoid coupling at the inheritance level."
      - prompt: "What is true about `SqlOrderRepository` if port `OrderRepository` is defined with `typing.Protocol`?"
        choices:
          - id: a
            text: "It never mentions `OrderRepository` but structurally matches it, and mypy accepts it."
          - id: b
            text: "It must explicitly inherit `OrderRepository` or mypy errors."
          - id: c
            text: "It must live in the same file as the port."
          - id: d
            text: "It automatically gets method implementations from the protocol."
        correct: [a]
        explanation: "With `Protocol`, matching is structural: having `save` and `by_id` with compatible signatures is enough. `SqlOrderRepository` does not inherit the port or mention its name: coupling is minimal; infrastructure does not even depend on the port name."

  - id: apply-composition-root-001
    concept: applying-python
    type: theory-quiz
    difficulty: 3
    prompt: "What is a composition root and what sign shows inversion is complete?"
    choices:
      - id: a
        text: "The single place where concrete classes are created and wired; names like SqlOrderRepository appear only there and in the definition file."
      - id: b
        text: "The root domain class that all entities inherit from."
      - id: c
        text: "The test folder where all application stubs live."
      - id: d
        text: "The main SQL query that starts the application."
    correct: [a]
    explanation: "The composition root is the assembly point, usually in `main.py` or a factory, where you create the repository, pass it to the use case, and the use case to the controller. A healthy sign: concrete infrastructure names appear in exactly two places (definition and composition root). If they surface in use cases, inversion is incomplete."
    hints:
      - "The section gives an exact metric: in how many places should `SqlOrderRepository` appear for inversion to be complete?"
      - "Inside use case, domain, and controller there should be no `SqlOrderRepository(...)`: they receive ready dependencies through the constructor. Creation is consolidated in one place."

  - id: apply-overhead-001
    concept: applying-python
    type: theory-quiz
    difficulty: 3
    prompt: "When does the section call full ring layering harmful luxury?"
    choices:
      - id: a
        text: "When there is no non-trivial business logic and no real chance of technology changes, layers add only extra code and zero benefit."
      - id: b
        text: "Always: layers are an outdated approach to abandon."
      - id: c
        text: "Only in projects on languages without static typing."
      - id: d
        text: "When the team has fewer than five developers."
    correct: [a]
    explanation: "Architecture is an investment that pays off through change. For a one-day script that reads one CSV and writes another, three interfaces and a composition root are pure overhead: more code, slower reading, zero benefit. A sane approach: add a layer when mixing actually starts to hurt."
    hints:
      - "The section draws a parallel with premature optimization. What makes layering pay off?"
      - "If there is nothing to change and no database tests ahead, the layer investment does not pay off. What does that mean for a two-hundred-line script?"

  - id: apply-protocol-predict-001
    concept: applying-python
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? The implementation structurally matches the protocol without inheriting it."
    snippet: |
      from typing import Protocol

      class Notifier(Protocol):
          def notify(self, msg): ...

      class EmailNotifier:
          def notify(self, msg):
              return f"email: {msg}"

      def announce(n: Notifier, msg):
          return n.notify(msg)

      print(announce(EmailNotifier(), "hi"))
    expected:
      kind: stdout
      value: "email: hi"
    hints:
      - "`EmailNotifier` does not inherit `Notifier` but has a `notify` method with a matching signature. Is that enough for a structural protocol at runtime?"
      - "Protocol does not block the call: Python just calls `notify`. The result is an f-string with a prefix and the passed message."
    variants:
      - snippet: |
          from typing import Protocol

          class Repo(Protocol):
              def by_id(self, x): ...

          class MemoryRepo:
              def __init__(self):
                  self.data = {"1": "Ann"}
              def by_id(self, x):
                  return self.data.get(x)

          def fetch(repo: Repo, key):
              return repo.by_id(key)

          print(fetch(MemoryRepo(), "1"), fetch(MemoryRepo(), "2"))
        expected:
          kind: stdout
          value: "Ann None"
      - snippet: |
          class PlaceOrder:
              def __init__(self, repo):
                  self._repo = repo
              def execute(self, order):
                  return self._repo.save(order)

          class FakeRepo:
              def save(self, order):
                  return f"saved {order} in memory"

          def build():
              return PlaceOrder(repo=FakeRepo())

          print(build().execute("A-1"))
        expected:
          kind: stdout
          value: "saved A-1 in memory"

  - id: apply-composition-root-blanks-001
    concept: applying-python
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the composition root: create concrete adapters and pass them to the use case through the constructor."
    template: |
      def build_place_order(session) -> PlaceOrderUseCase:
          repo = SqlOrderRepository(session)
          notifier = EmailNotifier(smtp_config)
          return PlaceOrderUseCase({{kw_repo}}=repo, {{kw_notifier}}=notifier)
    blanks:
      kw_repo:
        accept: ["repo"]
        accept_regex: '^repo$'
      kw_notifier:
        accept: ["notifier"]
        accept_regex: '^notifier$'
    explanation: "In the composition root concrete classes are created and passed to the use case by constructor parameter names (`repo`, `notifier`). The use case itself receives ready dependencies and does not create `SqlOrderRepository` inside."
    hints:
      - "The use case accepts dependencies through the constructor by parameter names. Under which names does it expect the repository and notifier?"
      - "Argument names must match `PlaceOrderUseCase(repo=..., notifier=...)` from the section."
    variants:
      - template: |
          def build_place_order(session) -> PlaceOrderUseCase:
              repo = {{repo_cls}}(session)
              notifier = EmailNotifier(smtp_config)
              return PlaceOrderUseCase(repo=repo, notifier=notifier)
        blanks:
          repo_cls:
            accept: ["SqlOrderRepository"]
            accept_regex: '^SqlOrderRepository$'
      - template: |
          class OrderRepository({{proto}}):
              def save(self, order: Order) -> None: ...
              def by_id(self, order_id: str) -> Order | None: ...
        blanks:
          proto:
            accept: ["Protocol"]
            accept_regex: '^Protocol$'

  - id: apply-import-violation-blanks-001
    concept: applying-python
    type: fill-in-blanks
    difficulty: 1
    prompt: "Which package must NOT be imported inside `application/use_cases.py` without violating the dependency rule? Enter the package name."
    template: |
      # inside application/use_cases.py
      from {{forbidden}} import SqlOrderRepository
    blanks:
      forbidden:
        accept: ["infrastructure"]
        accept_regex: '^infrastructure$'
    explanation: "The most common violation is `from infrastructure import ...` inside `application`. `application` is an inner ring and must not import outer package `infrastructure`; the arrow would point outward. Catch such imports with import-linter in CI."
    hints:
      - "`application` is an inner ring. Importing which package would flip the arrow outward toward technology?"
      - "The concrete SQL repository lives in the outer adapter package. The name in the hint (`SqlOrderRepository`) suggests where it is imported from."
    variants:
      - prompt: "Which package in this layout must NOT import anything from the project? Enter the package name."
        template: |
          # this package sits at the center and imports nothing else
          package = "{{center}}"
        blanks:
          center:
            accept: ["domain"]
            accept_regex: '^domain$'
      - prompt: "Which tool from the section checks import direction between packages automatically in CI? Enter its name."
        template: |
          # CI check for import contracts between packages
          tool = "{{linter}}"
        blanks:
          linter:
            accept: ["import-linter"]
            accept_regex: '^import-linter$'

  - id: apply-find-violation-challenge-001
    concept: applying-python
    type: theory-quiz
    difficulty: 4
    prompt: "Below is a fragment of `application/use_cases.py`. Which line violates the Clean Architecture dependency rule in a Python project?"
    choices:
      - id: a
        text: "`from infrastructure.sql_order_repo import SqlOrderRepository` and creating `repo = SqlOrderRepository()` directly in the use case."
      - id: b
        text: "`from application.ports import OrderRepository`: importing a port from the same ring."
      - id: c
        text: "`def execute(self, dto: OrderDTO) -> None:` accepts a simple DTO across the boundary."
      - id: d
        text: "`self._repo.save(order)` — calling a port method received through the constructor."
    correct: [a]
    explanation: "Importing `from infrastructure...` in inner package `application` and creating concrete `SqlOrderRepository()` inside the use case flips the arrow outward: the use case depends on the outer ring and SQL. Importing a port from the same ring, accepting a DTO, and calling an injected dependency do not violate the rule — the concrete class must come from the composition root."
    hints:
      - "The rule limits import direction: an inner package must not import an outer one. Which import runs from the outer ring into the inner?"
      - "Look for two symptoms at once: import from `infrastructure` and creating a concrete adapter via constructor inside the use case. Injection and DTOs are signs of a healthy boundary."

  - id: apply-layers-worth-it-challenge-001
    concept: applying-python
    type: theory-quiz
    difficulty: 4
    prompt: "For which two of these projects will ring layering likely pay off rather than become overhead?"
    choices:
      - id: a
        text: "A payment service with complex business rules where the database may change and tests are needed without a live DBMS."
      - id: b
        text: "A 200-line script that reads one CSV and writes another, with no business logic."
      - id: c
        text: "A backend with non-trivial domain logic and several delivery channels (email, Slack) that may change."
      - id: d
        text: "A one-off data migration to run once and discard."
    correct: [a, c]
    explanation: "Architecture pays off through change. A payment service (complex rules, likely database switch, expensive tests) and a backend with several changing delivery channels are exactly where layers protect the center and cheapen tests. A CSV script and a one-off migration have nothing to change: rings are pure overhead, like premature optimization."
    hints:
      - "Ask for each project: is there non-trivial business logic and a real chance of technology changes or serious tests? Only then does the investment pay off."
      - "One-day jobs and projects without business logic have nothing to change — layers will not pay off there. More than one answer is correct."
