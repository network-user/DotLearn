exercises:
  - id: onion-port-def-001
    concept: onion-hexagonal
    type: theory-quiz
    difficulty: 1
    prompt: "In hexagonal architecture, what is a port and what is an adapter?"
    choices:
      - id: a
        text: "A port is an interface declared by the application; an adapter is a concrete implementation of that interface for a technology."
      - id: b
        text: "A port is a concrete technology implementation; an adapter is an abstract interface."
      - id: c
        text: "A port is a network process number; an adapter is a network card."
      - id: d
        text: "Port and adapter are synonyms meaning the same thing."
    correct: [a]
    explanation: "A port is an interface declared by the application (for example `OrderNotifier`). An adapter is a concrete implementation tied to a technology (`EmailNotifier`). When you need Slack instead of email, you write a new adapter `SlackNotifier` without touching the application."
    variants:
      - prompt: "How does a driving port differ from a driven port in hexagonal architecture?"
        choices:
          - id: a
            text: "A driving port is how the world drives the application; a driven port is how the application drives the world."
          - id: b
            text: "A driving port is always faster than a driven port."
          - id: c
            text: "A driving port is implemented by the application, a driven port by the framework; otherwise they are the same."
          - id: d
            text: "A driving port is for reads, a driven port for writes to the database."
        correct: [a]
        explanation: "A driving port (inbound) is how the world drives the application, for example the use case interface an HTTP controller calls. A driven port (outbound) is how the application drives the world, for example the repository interface implemented by a PostgreSQL adapter."
      - prompt: "Why does hexagonal architecture use a hexagon instead of a rectangle?"
        choices:
          - id: a
            text: "A hexagon has no privileged top or bottom — all sides are equal and no port is favored."
          - id: b
            text: "Because a system always has exactly six ports."
          - id: c
            text: "Six sides mean six mandatory layers."
          - id: d
            text: "It is a requirement of diagramming tools."
        correct: [a]
        explanation: "The hexagon is chosen on purpose: the shape has no top or bottom, all sides are equal. It is a metaphor for no privileged side — removing the asymmetry of input on top and database on bottom. You can have as many ports as you need."

  - id: onion-domain-service-001
    concept: onion-hexagonal
    type: theory-quiz
    difficulty: 2
    prompt: "What does Palermo call a domain service in onion architecture?"
    choices:
      - id: a
        text: "A domain operation that naturally does not belong to any single entity (for example transferring money between accounts)."
      - id: b
        text: "A background operating-system process serving the site's domain."
      - id: c
        text: "A class that opens a database transaction."
      - id: d
        text: "An HTTP controller accepting requests from the outside world."
    correct: [a]
    explanation: "A domain service is business logic that does not fit in one entity. `TransferService.transfer` works with domain objects and lives in the domain ring. It knows nothing about the database or DBMS transactions — that is the outer rings' job."
    variants:
      - prompt: "Who first described onion architecture and when, and what is its emphasis?"
        choices:
          - id: a
            text: "Jeffrey Palermo in 2008; emphasis on concentric layers around the domain model and domain services."
          - id: b
            text: "Alistair Cockburn in 2005; emphasis on ports and adapters."
          - id: c
            text: "Robert Martin in 1972; emphasis on information hiding."
          - id: d
            text: "David Parnas in the 1990s; emphasis on three-tier architecture."
        correct: [a]
        explanation: "Jeffrey Palermo described onion architecture in 2008; its emphasis is layers around the domain and the domain service concept. Ports and adapters are Alistair Cockburn's hexagonal architecture (2005)."
      - prompt: "According to onion architecture, where should a DBMS transaction live when transferring money between accounts?"
        choices:
          - id: a
            text: "In the outer ring (application or infrastructure layer), not in the domain service."
          - id: b
            text: "Inside the domain service TransferService — it should open the transaction."
          - id: c
            text: "In the Account entity itself, next to withdraw and deposit."
          - id: d
            text: "Transactions are forbidden in onion architecture."
        correct: [a]
        explanation: "`TransferService` works with domain objects and does not know about DBMS transactions. If it opens a transaction itself, it stops being domain and moves to the outer ring. Transactions are the application or infrastructure layer's job."

  - id: onion-three-same-001
    concept: onion-hexagonal
    type: theory-quiz
    difficulty: 3
    prompt: "What is the main similarity and main difference between hexagonal, onion, and Clean Architecture?"
    choices:
      - id: a
        text: "Similarity — one dependency diagram (domain in the center, dependencies inward); difference — vocabulary and emphasis."
      - id: b
        text: "They are three incompatible architectures and you must pick one."
      - id: c
        text: "They differ in dependency direction: onion points outward, hexagonal inward."
      - id: d
        text: "The difference is the number of layers, fixed for each architecture."
    correct: [a]
    explanation: "At the dependency-diagram level all three are isomorphic: domain in the center, dependencies inward. They differ in vocabulary (ports/adapters vs concentric rings and domain services) and emphasis. We have hexagonal, not onion is more often a terminology debate than a code debate."
    hints:
      - "The section calls them three names, one idea. What do they share at the dependency-diagram level?"
      - "Useful questions instead of arguing names: where are the boundaries, who declares interfaces, what sits in the center. If answers match, the difference is not dependency direction."

  - id: onion-transfer-predict-001
    concept: onion-hexagonal
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? The domain service `TransferService` works with domain objects `Account` and knows nothing about the database."
    snippet: |
      class Account:
          def __init__(self, balance):
              self.balance = balance
          def withdraw(self, amount):
              self.balance -= amount
          def deposit(self, amount):
              self.balance += amount

      class TransferService:
          def transfer(self, source, target, amount):
              source.withdraw(amount)
              target.deposit(amount)

      a = Account(100)
      b = Account(50)
      TransferService().transfer(a, b, 30)
      print(a.balance, b.balance)
    expected:
      kind: stdout
      value: "70 80"
    hints:
      - "`transfer` removes amount from the source and adds it to the target. Which operations apply to a and b and in what order?"
      - "30 is removed from a (100 - 30), 30 is added to b (50 + 30). Two numbers are printed separated by a space."
    variants:
      - snippet: |
          class Account:
              def __init__(self, balance):
                  self.balance = balance
              def withdraw(self, amount):
                  self.balance -= amount
              def deposit(self, amount):
                  self.balance += amount

          class TransferService:
              def transfer(self, source, target, amount):
                  source.withdraw(amount)
                  target.deposit(amount)

          a = Account(200)
          b = Account(0)
          svc = TransferService()
          svc.transfer(a, b, 50)
          svc.transfer(b, a, 20)
          print(a.balance, b.balance)
        expected:
          kind: stdout
          value: "170 30"
      - snippet: |
          class SlackNotifier:
              def order_placed(self, order_id):
                  return f"slack:{order_id}"

          class EmailNotifier:
              def order_placed(self, order_id):
                  return f"email:{order_id}"

          def run(notifier):
              return notifier.order_placed("o7")

          print(run(SlackNotifier()), run(EmailNotifier()))
        expected:
          kind: stdout
          value: "slack:o7 email:o7"

  - id: onion-adapter-swap-001
    concept: onion-hexagonal
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the driven port and adapter: the application interface and its technology implementation."
    template: |
      from abc import ABC, abstractmethod

      class OrderNotifier(ABC):
          @abstractmethod
          def order_placed(self, order_id: str) -> None: ...

      class EmailNotifier({{base}}):
          def {{method}}(self, order_id: str) -> None:
              ...
    blanks:
      base:
        accept: ["OrderNotifier"]
        accept_regex: '^OrderNotifier$'
      method:
        accept: ["order_placed"]
        accept_regex: '^order_placed$'
    explanation: "`OrderNotifier` is a driven port (application interface). `EmailNotifier` is an adapter implementing `order_placed`. To send via Slack instead of email, add `SlackNotifier(OrderNotifier)` with the same method without touching the application."
    hints:
      - "An adapter is a concrete port implementation. Which interface must it inherit so the application can use it through the port?"
      - "The adapter must implement exactly the method declared in the port, or it does not fulfill the contract."
    variants:
      - template: |
          from abc import ABC, abstractmethod

          class OrderNotifier(ABC):
              @{{deco}}
              def order_placed(self, order_id: str) -> None: ...
        blanks:
          deco:
            accept: ["abstractmethod"]
            accept_regex: '^abstractmethod$'
      - template: |
          class SlackNotifier(OrderNotifier):
              def order_placed(self, order_id: str) -> None:
                  {{stmt}}
        blanks:
          stmt:
            accept: ["...", "pass"]
            accept_regex: '^(\.\.\.|pass)$'

  - id: onion-domain-service-pure-001
    concept: onion-hexagonal
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete the transfer domain service so it works only with domain objects."
    template: |
      class TransferService:
          def transfer(self, source, target, amount):
              source.{{op_out}}(amount)
              target.{{op_in}}(amount)
    blanks:
      op_out:
        accept: ["withdraw"]
        accept_regex: '^withdraw$'
      op_in:
        accept: ["deposit"]
        accept_regex: '^deposit$'
    explanation: "A transfer removes from the source account and credits the target. The service calls domain object methods and knows nothing about DBMS transactions — that is the outer ring's job."
    hints:
      - "Transferring money is two account operations: one loses, one gains. Which method does what?"
      - "Money is withdrawn from the source (withdraw) and deposited on the target (deposit). Neither operation should touch the database."
    variants:
      - template: |
          class TransferService:
              def transfer(self, source, target, amount):
                  source.withdraw({{arg}})
                  target.deposit({{arg}})
        blanks:
          arg:
            accept: ["amount"]
            accept_regex: '^amount$'
      - template: |
          class {{cls}}:
              def transfer(self, source, target, amount):
                  source.withdraw(amount)
                  target.deposit(amount)
        blanks:
          cls:
            accept: ["TransferService"]
            accept_regex: '^TransferService$'
