exercises:
  - id: onion-port-def-001
    concept: onion-hexagonal
    type: theory-quiz
    difficulty: 1
    prompt: "Что в гексагональной архитектуре называется портом, а что - адаптером?"
    choices:
      - id: a
        text: "Порт - интерфейс, объявленный приложением; адаптер - конкретная реализация этого интерфейса под технологию."
      - id: b
        text: "Порт - конкретная реализация под технологию; адаптер - абстрактный интерфейс."
      - id: c
        text: "Порт - сетевой номер процесса; адаптер - сетевая карта."
      - id: d
        text: "Порт и адаптер - синонимы, означающие одно и то же."
    correct: [a]
    explanation: "Порт - это интерфейс, объявленный приложением (например, `OrderNotifier`). Адаптер - конкретная реализация, привязанная к технологии (`EmailNotifier`). Когда вместо письма нужен Slack, вы пишете новый адаптер `SlackNotifier`, не трогая приложение."
    variants:
      - prompt: "Чем driving-порт отличается от driven-порта в гексагональной архитектуре?"
        choices:
          - id: a
            text: "Driving-порт - то, через что мир управляет приложением; driven-порт - то, чем приложение управляет миром."
          - id: b
            text: "Driving-порт всегда быстрее driven-порта."
          - id: c
            text: "Driving-порт реализуется приложением, driven-порт - фреймворком; в остальном они одинаковы."
          - id: d
            text: "Driving-порт - для чтения, driven-порт - для записи в базу."
        correct: [a]
        explanation: "Driving-порт (входной) - то, через что мир управляет приложением, например интерфейс use case, который дёргает HTTP-контроллер. Driven-порт (выходной) - то, чем приложение управляет миром, например интерфейс репозитория, реализуемый адаптером к PostgreSQL."
      - prompt: "Почему в гексагональной архитектуре выбрана фигура шестиугольника, а не прямоугольника?"
        choices:
          - id: a
            text: "У шестиугольника нет привилегированных «верха» и «низа» - все стороны равноправны, ни один порт не выделен."
          - id: b
            text: "Потому что в системе всегда ровно шесть портов."
          - id: c
            text: "Шесть сторон означают шесть обязательных слоёв."
          - id: d
            text: "Это требование инструмента рисования диаграмм."
        correct: [a]
        explanation: "Шестиугольник выбран намеренно: у фигуры нет «верха» и «низа», все стороны равноправны. Это метафора отсутствия привилегированной стороны - убирается асимметрия «вход сверху, база снизу». Портов при этом может быть сколько угодно."

  - id: onion-domain-service-001
    concept: onion-hexagonal
    type: theory-quiz
    difficulty: 2
    prompt: "Что Палермо в луковой архитектуре называет доменным сервисом?"
    choices:
      - id: a
        text: "Операцию предметной области, естественно не принадлежащую ни одной отдельной сущности (например, перевод денег между счетами)."
      - id: b
        text: "Фоновый процесс операционной системы, обслуживающий домен сайта."
      - id: c
        text: "Класс, который открывает транзакцию в базе данных."
      - id: d
        text: "HTTP-контроллер, принимающий запросы из внешнего мира."
    correct: [a]
    explanation: "Доменный сервис - это бизнес-логика, которая не помещается в одну сущность. `TransferService.transfer` оперирует доменными объектами и живёт в доменном кольце. Он не знает про базу и транзакции СУБД - это забота внешних колец."
    variants:
      - prompt: "Кто и когда впервые описал луковую архитектуру и в чём её акцент?"
        choices:
          - id: a
            text: "Джеффри Палермо в 2008 году; акцент - на концентрических слоях вокруг доменной модели и доменных сервисах."
          - id: b
            text: "Алистер Кокберн в 2005 году; акцент - на портах и адаптерах."
          - id: c
            text: "Роберт Мартин в 1972 году; акцент - на сокрытии информации."
          - id: d
            text: "Дэвид Парнас в 1990-е; акцент - на трёхзвенной архитектуре."
        correct: [a]
        explanation: "Луковую архитектуру описал Джеффри Палермо в 2008 году, её акцент - слои вокруг домена и понятие доменного сервиса. Порты и адаптеры - это гексагональная архитектура Кокберна (2005)."
      - prompt: "Где, по правилу луковой архитектуры, должна жить транзакция СУБД при переводе денег между счетами?"
        choices:
          - id: a
            text: "Во внешнем кольце (слой приложения или инфраструктура), а не в доменном сервисе."
          - id: b
            text: "Внутри доменного сервиса TransferService - он и должен открывать транзакцию."
          - id: c
            text: "В самой сущности Account, рядом с методами withdraw и deposit."
          - id: d
            text: "Транзакции в луковой архитектуре запрещены."
        correct: [a]
        explanation: "`TransferService` оперирует доменными объектами и не знает про транзакции СУБД. Если он сам открывает транзакцию, он перестаёт быть доменным и съезжает во внешнее кольцо. Транзакция - забота слоя приложения или инфраструктуры."

  - id: onion-three-same-001
    concept: onion-hexagonal
    type: theory-quiz
    difficulty: 3
    prompt: "В чём главное сходство и главное различие гексагональной, луковой и Clean Architecture?"
    choices:
      - id: a
        text: "Сходство - одна диаграмма зависимостей (домен в центре, зависимости внутрь); различие - словарь и акценты."
      - id: b
        text: "Это три несовместимые архитектуры, и нужно выбрать одну из них."
      - id: c
        text: "Они различаются направлением зависимостей: в луковой - наружу, в гексагональной - внутрь."
      - id: d
        text: "Различие в числе слоёв, которое жёстко задано каждой архитектурой."
    correct: [a]
    explanation: "На уровне диаграммы зависимостей все три изоморфны: домен в центре, зависимости внутрь. Различаются они словарём (порты/адаптеры против концентрических колец и доменных сервисов) и акцентами. «У нас гексагональная, а не луковая» - чаще спор о терминах, чем о коде."
    hints:
      - "Раздел прямо называет их «три названия, одна идея». Что именно у них общее на уровне диаграммы зависимостей?"
      - "Полезные вопросы вместо спора о названиях: где границы, кто объявляет интерфейсы, что лежит в центре. Если ответы совпадают, различие не в направлении зависимостей."

  - id: onion-transfer-predict-001
    concept: onion-hexagonal
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Доменный сервис `TransferService` оперирует доменными объектами `Account` и не знает про базу."
    snippet: |
      class Account:
          def __init__(self, balance):
              self.balance = balance
          def withdraw(self, amount):
              self.balance -= amount
          def deposit(self, amount):
              self.balance += amount

      class TransferService:
          def transfer(self, source, target, amount):
              source.withdraw(amount)
              target.deposit(amount)

      a = Account(100)
      b = Account(50)
      TransferService().transfer(a, b, 30)
      print(a.balance, b.balance)
    expected:
      kind: stdout
      value: "70 80"
    hints:
      - "`transfer` снимает amount с источника и кладёт на цель. Какие операции применяются к a и к b и в каком порядке?"
      - "С `a` снимается 30 (100 - 30), на `b` добавляется 30 (50 + 30). Выводятся два числа через пробел."
    variants:
      - snippet: |
          class Account:
              def __init__(self, balance):
                  self.balance = balance
              def withdraw(self, amount):
                  self.balance -= amount
              def deposit(self, amount):
                  self.balance += amount

          class TransferService:
              def transfer(self, source, target, amount):
                  source.withdraw(amount)
                  target.deposit(amount)

          a = Account(200)
          b = Account(0)
          svc = TransferService()
          svc.transfer(a, b, 50)
          svc.transfer(b, a, 20)
          print(a.balance, b.balance)
        expected:
          kind: stdout
          value: "170 30"
      - snippet: |
          class SlackNotifier:
              def order_placed(self, order_id):
                  return f"slack:{order_id}"

          class EmailNotifier:
              def order_placed(self, order_id):
                  return f"email:{order_id}"

          def run(notifier):
              return notifier.order_placed("o7")

          print(run(SlackNotifier()), run(EmailNotifier()))
        expected:
          kind: stdout
          value: "slack:o7 email:o7"

  - id: onion-adapter-swap-001
    concept: onion-hexagonal
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите driven-порт и адаптер: интерфейс приложения и его реализация под технологию."
    template: |
      from abc import ABC, abstractmethod

      class OrderNotifier(ABC):
          @abstractmethod
          def order_placed(self, order_id: str) -> None: ...

      class EmailNotifier({{base}}):
          def {{method}}(self, order_id: str) -> None:
              ...
    blanks:
      base:
        accept: ["OrderNotifier"]
        accept_regex: '^OrderNotifier$'
      method:
        accept: ["order_placed"]
        accept_regex: '^order_placed$'
    explanation: "`OrderNotifier` - driven-порт (интерфейс приложения). `EmailNotifier` - адаптер, реализующий метод `order_placed`. Чтобы отправлять в Slack вместо письма, вы добавляете `SlackNotifier(OrderNotifier)` с тем же методом и не трогаете приложение."
    hints:
      - "Адаптер - конкретная реализация порта. От какого интерфейса он должен наследоваться, чтобы приложение могло им пользоваться через порт?"
      - "Адаптер обязан реализовать ровно тот метод, который объявлен в порте, иначе он не выполнит контракт."
    variants:
      - template: |
          from abc import ABC, abstractmethod

          class OrderNotifier(ABC):
              @{{deco}}
              def order_placed(self, order_id: str) -> None: ...
        blanks:
          deco:
            accept: ["abstractmethod"]
            accept_regex: '^abstractmethod$'
      - template: |
          class SlackNotifier(OrderNotifier):
              def order_placed(self, order_id: str) -> None:
                  {{stmt}}
        blanks:
          stmt:
            accept: ["...", "pass"]
            accept_regex: '^(\.\.\.|pass)$'

  - id: onion-domain-service-pure-001
    concept: onion-hexagonal
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите доменный сервис перевода так, чтобы он работал только с доменными объектами."
    template: |
      class TransferService:
          def transfer(self, source, target, amount):
              source.{{op_out}}(amount)
              target.{{op_in}}(amount)
    blanks:
      op_out:
        accept: ["withdraw"]
        accept_regex: '^withdraw$'
      op_in:
        accept: ["deposit"]
        accept_regex: '^deposit$'
    explanation: "Перевод - это снятие со счёта-источника и зачисление на счёт-цель. Сервис зовёт методы доменных объектов и не знает про транзакции СУБД: это забота внешнего кольца."
    hints:
      - "Перевод денег - это две операции над счетами: с одного убывает, на другой прибывает. Какой метод что делает?"
      - "С источника деньги снимают (withdraw), на цель - зачисляют (deposit). Ни одна из операций не должна трогать базу."
    variants:
      - template: |
          class TransferService:
              def transfer(self, source, target, amount):
                  source.withdraw({{arg}})
                  target.deposit({{arg}})
        blanks:
          arg:
            accept: ["amount"]
            accept_regex: '^amount$'
      - template: |
          class {{cls}}:
              def transfer(self, source, target, amount):
                  source.withdraw(amount)
                  target.deposit(amount)
        blanks:
          cls:
            accept: ["TransferService"]
            accept_regex: '^TransferService$'
