exercises:
  - id: kafka-log-model-001
    concept: kafka-model
    type: theory-quiz
    difficulty: 1
    prompt: "What happens to a record in Kafka when a consumer reads it?"
    choices:
      - id: a
        text: "The record stays in the log and is available to other readers; the consumer only moves its bookmark (offset) forward."
      - id: b
        text: "The record is immediately deleted from the log, like in a normal queue."
      - id: c
        text: "The record is marked unacked and returned to the start of the log."
      - id: d
        text: "The record is copied to all other partitions of the topic."
    correct: [a]
    explanation: "Kafka is an append-only log: reading does not delete records, it only moves the consumer's offset. A read record stays in the log for retention and is available to the next reader. That fundamentally differs from a queue that empties on read."
    variants:
      - prompt: "What is offset in Kafka?"
        choices:
          - id: a
            text: "The sequential record number inside a partition and the consumer's bookmark - how far it has read."
          - id: b
            text: "A unique identifier of the whole topic."
          - id: c
            text: "The time after which a record will be deleted from the log."
          - id: d
            text: "The number of consumers that read the record."
        correct: [a]
        explanation: "Offset is position in a partition: records are numbered 0, 1, 2... The consumer keeps offset as bookmark \"I read up to here\" and moves it forward while reading."
      - prompt: "How is a Kafka topic structured at the lowest level?"
        choices:
          - id: a
            text: "A log split into partitions; new records are only appended at the end, nothing inserted in the middle."
          - id: b
            text: "One big queue from which messages disappear as they are read."
          - id: c
            text: "A relational table with arbitrary access by primary key."
          - id: d
            text: "A tree the broker searches on every request."
        correct: [a]
        explanation: "A topic is an append-only log of partitions. Each partition is an independent numbered sequence. Records are only appended at the end."

  - id: kafka-partition-order-001
    concept: kafka-model
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the statements about order and keys in Kafka."
    template: |
      Kafka guarantees record order only inside one {{partition}}.
      To keep all events of one entity ordered, give them a shared {{key}}.
      Partition is chosen as: hash(key) {{operator}} number of partitions.
    blanks:
      partition:
        accept: ["partition"]
      key:
        accept: ["key", "message key"]
      operator:
        accept: ["%", "mod", "modulo"]
    variants:
      - template: |
          If message key is not set (null), Kafka distributes records across partitions {{distribution}}, and order is not guaranteed.
          A key with one or two values piles almost all messages into one or two partitions - this is called {{skew}}.
          Between different partitions record order is {{guaranteed}}.
        blanks:
          distribution:
            accept: ["round-robin", "round robin"]
          skew:
            accept: ["skew", "partition skew"]
          guaranteed:
            accept: ["not guaranteed", "absent", "none", "no"]
      - template: |
          Inside a consumer group each partition is read by {{howmany}} consumer.
          So partition count is the group's {{ceiling}} on parallelism.
          If there are more consumers in the group than partitions, extras will {{idle}}.
        blanks:
          howmany:
            accept: ["exactly one", "one", "only one"]
          ceiling:
            accept: ["ceiling", "limit", "maximum", "upper bound"]
          idle:
            accept: ["idle", "sit idle", "be idle"]

  - id: kafka-consumer-group-001
    concept: kafka-model
    type: theory-quiz
    difficulty: 2
    prompt: "A topic has 3 partitions. A consumer group has 4 consumers. What happens?"
    choices:
      - id: a
        text: "Each partition is read by exactly one consumer; three get a partition each, the fourth idles."
      - id: b
        text: "Each consumer reads all three partitions entirely, producing four copies of the stream."
      - id: c
        text: "Kafka splits each partition to use all four."
      - id: d
        text: "Kafka refuses to add the fourth consumer with an error."
    correct: [a]
    explanation: "Inside a consumer group each partition is read by exactly one consumer. Partition count is the group's parallelism ceiling. Fewer consumers than partitions is OK (some read several); more is pointless - extras idle with no partition."

  - id: kafka-global-order-001
    concept: kafka-model
    type: theory-quiz
    difficulty: 3
    prompt: "Business logic requires events of one order to be processed strictly in order. Topic orders has 3 partitions. How do you ensure that?"
    choices:
      - id: a
        text: "Put all events of one order in one partition via a shared key (for example order_id) - order is guaranteed only inside a partition."
      - id: b
        text: "Rely on Kafka delivering the whole topic in global order anyway."
      - id: c
        text: "Use one consumer for the whole group - then order appears across partitions."
      - id: d
        text: "Disable partitioning on the consumer side via configuration."
    correct: [a]
    explanation: "Order in Kafka is a partition property, not a topic property. There is no global topic order. To order an entity's events, put them in one partition with a shared key: hash(order_id) % 3 always gives the same partition for one order, and records there are strictly ordered."
    hints:
      - "Order is guaranteed for a smaller unit, not the whole topic. Which one? And what decides which partition a record lands in?"
      - "If all events of one order must be ordered, they must end up in one place. What does the producer control to pick that place?"

  - id: kafka-skew-001
    concept: kafka-model
    type: theory-quiz
    difficulty: 3
    prompt: "An engineer chose message key is_premium (values true/false) for a topic with 12 partitions. What is wrong?"
    choices:
      - id: a
        text: "A key with two values puts all messages in at most two partitions - skew; the other 10 idle and parallelism collapses."
      - id: b
        text: "Nothing: two key values evenly use all 12 partitions."
      - id: c
        text: "Kafka forbids boolean keys and requires a string."
      - id: d
        text: "Order inside a partition stops working with such a key."
    correct: [a]
    explanation: "hash(key) % 12 from a two-value key yields at most two partitions out of twelve. That is partition skew: two partitions overloaded, ten empty, and parallel processing degrades to one or two overloaded consumers. A good key has many distinct values."
    hints:
      - "How many different partitions can hash(key) % 12 produce if the key has only two possible values?"
      - "Group parallelism is capped by partitions in use. What happens to the other ten with a two-value key?"

  - id: kafka-offset-predict-001
    concept: kafka-model
    type: predict-output
    difficulty: 2
    prompt: "What will this program print? It models log reading with offset movement by two independent groups."
    snippet: |
      log = ["e0", "e1", "e2"]
      offsets = {"billing": 0, "analytics": 0}

      def consume(group):
          o = offsets[group]
          if o < len(log):
              offsets[group] = o + 1
              return log[o]

      consume("billing")
      consume("billing")
      consume("analytics")
      print(offsets)
    expected:
      kind: stdout
      value: "{'billing': 2, 'analytics': 1}"
    hints:
      - "Different groups read one log independently, each with its own bookmark. Reading does not delete records, only moves that group's offset."
      - "Group billing called consume twice (offset 0 -> 2), analytics once (offset 0 -> 1). Log records themselves are untouched."
    variants:
      - snippet: |
          partitions = [0, 1, 2]
          consumers = ["C1", "C2", "C3", "C4"]
          assignment = {c: [] for c in consumers}

          for i, p in enumerate(partitions):
              assignment[consumers[i % len(consumers)]].append(p)

          idle = [c for c, ps in assignment.items() if not ps]
          print(idle)
        expected:
          kind: stdout
          value: "['C4']"
      - snippet: |
          log = ["a", "b", "c", "d", "e"]
          offset = 0

          def poll(n):
              global offset
              batch = log[offset:offset + n]
              offset += len(batch)
              return batch

          poll(2)
          poll(2)
          print(offset)
        expected:
          kind: stdout
          value: "4"

  - id: kafka-rebalance-predict-001
    concept: kafka-model
    type: predict-output
    difficulty: 4
    prompt: "What will this program print? It models even assignment of 6 partitions among 3 consumers in a group and prints partition count per consumer."
    snippet: |
      def assign(partitions, consumers):
          result = {c: [] for c in consumers}
          for i, p in enumerate(partitions):
              result[consumers[i % len(consumers)]].append(p)
          return result

      assignment = assign([0, 1, 2, 3, 4, 5], ["C1", "C2", "C3"])
      print([len(assignment[c]) for c in ["C1", "C2", "C3"]])
    expected:
      kind: stdout
      value: "[2, 2, 2]"
    hints:
      - "Partitions are handed round-robin: partition index modulo consumer count picks the owner. 6 partitions, 3 consumers."
      - "Walk indices 0..5 and for each compute i % 3 - that is the consumer number. When partition count is divisible by consumer count, distribution is even. What list length does the program print?"
