exercises:
  - id: rabbit-four-bricks-001
    concept: rabbitmq-model
    type: theory-quiz
    difficulty: 1
    prompt: "Where does a producer send a message in RabbitMQ?"
    choices:
      - id: a
        text: "To an exchange with a routing key;."
      - id: b
        text: "Directly to the target queue, whose name the producer must know in advance."
      - id: c
        text: "Straight to several consumers, bypassing the broker."
      - id: d
        text: "To a binding that forwards it to an exchange."
    correct: [a]
    explanation: "In the AMQP model the producer writes to an exchange with a routing key. It does not know which queues exist. The exchange-to-queue route is set by bindings configured in advance. This is the smart broker model: routing logic on the server, simple clients."
    variants:
      - prompt: "Where in RabbitMQ is a message actually stored while waiting for a consumer?"
        choices:
          - id: a
            text: "In a queue - the only storage place; an exchange only routes and stores nothing."
          - id: b
            text: "In an exchange - it holds messages until a consumer arrives."
          - id: c
            text: "In a binding - the link holds the message while the rule is active."
          - id: d
            text: "In the routing key - the label carries the message body."
        correct: [a]
        explanation: "A queue is a named buffer, the only place a message waits. An exchange is intake and routing; it stores nothing. A binding is a rule; routing key is a label on the message."
      - prompt: "What is a binding in RabbitMQ?"
        choices:
          - id: a
            text: "A rule: put from this exchange into this queue."
          - id: b
            text: "A network connection between producer and consumer."
          - id: c
            text: "A unique message identifier inside a queue."
          - id: d
            text: "A message body serialization type."
        correct: [a]
        explanation: "A binding links an exchange to a queue and sets the condition under which the exchange copies a message into that queue. The message routing key is matched against the binding condition."

  - id: rabbit-exchange-types-001
    concept: rabbitmq-model
    type: fill-in-blanks
    difficulty: 2
    prompt: "Match each exchange type to how it compares routing keys."
    template: |
      A {{direct}} exchange delivers when the routing key exactly equals the binding key.
      A {{topic}} exchange matches the key against a pattern where * is one word and # is any number of words.
      A {{fanout}} exchange ignores the routing key and puts a copy into every bound queue.
    blanks:
      direct:
        accept: ["direct"]
      topic:
        accept: ["topic"]
      fanout:
        accept: ["fanout"]
    variants:
      - template: |
          To broadcast a copy to every bound queue, choose a {{broadcast}} exchange.
          To route by a hierarchical key like order.eu.vip, choose a {{hierarchical}} exchange.
          To route by header key-value pairs instead of a string key, choose a {{byheaders}} exchange.
        blanks:
          broadcast:
            accept: ["fanout"]
          hierarchical:
            accept: ["topic"]
          byheaders:
            accept: ["headers"]
      - template: |
          In a topic exchange pattern, symbol {{onefld}} replaces exactly one word of the key.
          Symbol {{anyfld}} replaces any number of words, including zero.
          So key order.eu.vip matches pattern order.{{tail}} where after order comes this greedy symbol.
        blanks:
          onefld:
            accept: ["*", "asterisk"]
          anyfld:
            accept: ["#", "hash"]
          tail:
            accept: ["#", "hash"]

  - id: rabbit-no-binding-001
    concept: rabbitmq-model
    type: theory-quiz
    difficulty: 2
    prompt: "A producer published to an exchange, but no binding matched its routing key. What happens?"
    choices:
      - id: a
        text: "The message is silently dropped without error; the producer thinks send succeeded."
      - id: b
        text: "The producer gets an exception and publish is rolled back."
      - id: c
        text: "The message stays in the exchange forever until a matching binding appears."
      - id: d
        text: "RabbitMQ automatically creates a new queue for that key."
    correct: [a]
    explanation: "A message with no matching binding disappears quietly - a common cause of lost messages. The exchange stores nothing, and with no queue to copy into, there is nowhere to go. Before debugging the consumer, check that a binding exists and its condition matches the key."

  - id: rabbit-ack-001
    concept: rabbitmq-model
    type: theory-quiz
    difficulty: 3
    prompt: "A consumer uses manual ack. It received a message and crashed during processing without sending ack. What will RabbitMQ do?"
    choices:
      - id: a
        text: "Return the unacked message to the queue."
      - id: b
        text: "Delete the message as processed because it was delivered."
      - id: c
        text: "Block the queue until the crashed consumer returns on the same process."
      - id: d
        text: "Notify the producer of a processing error."
    correct: [a]
    explanation: "With manual ack the message stays unacked until the consumer explicitly confirms. If the connection closes without ack, RabbitMQ treats it as unprocessed and returns it to the queue for redelivery. Hence at-least-once: no loss, but possible retry."
    hints:
      - "Key question: when may the broker delete a message - on delivery or on confirmation? That determines what happens on crash."
      - "A message in unacked state is still in progress, not done. What should the broker do with work never confirmed?"

  - id: rabbit-autoack-danger-001
    concept: rabbitmq-model
    type: theory-quiz
    difficulty: 3
    prompt: "The team enabled autoack for speed. What risk did they accept?"
    choices:
      - id: a
        text: "The broker deletes the message on delivery, before processing; any consumer crash means."
      - id: b
        text: "Autoack slows the consumer because it requires two confirmations instead of one."
      - id: c
        text: "Autoack duplicates every message, doubling queue load."
      - id: d
        text: "Autoack disables exchange routing and writes straight to the queue."
    correct: [a]
    explanation: "Autoack deletes on delivery, before the consumer processes. Faster because there is no wait for confirmation, but any consumer crash means the message is already gone and lost. Autoack is only OK where losing one message is acceptable (for example metrics)."
    hints:
      - "Compare when deletion happens with autoack versus manual ack. Which comes first and what does that mean on failure?"
      - "Speed here was bought at a price. What happens to the message between delivery and processing if the broker already deleted it?"

  - id: rabbit-routing-predict-001
    concept: rabbitmq-model
    type: predict-output
    difficulty: 2
    prompt: "What will this program print? It models exact-key routing (like a direct exchange)."
    snippet: |
      bindings = {"order.eu": ["queue.eu"], "order.us": ["queue.us"]}

      def route(key):
          return bindings.get(key, [])

      print(route("order.eu"))
      print(route("payment.eu"))
    expected:
      kind: stdout
      value: "['queue.eu']\n[]"
    hints:
      - "A direct exchange delivers only on exact key match with binding key. Which of the two keys is in bindings and which is not?"
      - "For a key with no matching binding the result is an empty list: the message has nowhere to go, and in RabbitMQ it would quietly disappear."
    variants:
      - snippet: |
          queues = ["q1", "q2", "q3"]

          def fanout(message):
              return [(q, message) for q in queues]

          result = fanout("hello")
          print(len(result))
        expected:
          kind: stdout
          value: "3"
      - snippet: |
          queue = ["m1", "m2", "m3"]
          unacked = {}

          def deliver():
              msg = queue.pop(0)
              unacked[msg] = "unacked"
              return msg

          def ack(msg):
              del unacked[msg]

          first = deliver()
          ack(first)
          deliver()
          print(len(queue), len(unacked))
        expected:
          kind: stdout
          value: "1 1"

  - id: rabbit-topic-match-001
    concept: rabbitmq-model
    type: predict-output
    difficulty: 4
    prompt: "What will this program print? It implements simplified topic exchange pattern matching (* = one word, # = any number of words) for key order.eu.vip."
    snippet: |
      def matches(pattern, key):
          p = pattern.split(".")
          k = key.split(".")
          i = j = 0
          while i < len(p) and j < len(k):
              if p[i] == "#":
                  return True
              if p[i] == "*" or p[i] == k[j]:
                  i += 1
                  j += 1
              else:
                  return False
          return i == len(p) and j == len(k)

      key = "order.eu.vip"
      print(matches("order.#", key))
      print(matches("order.*.vip", key))
      print(matches("order.us.#", key))
    expected:
      kind: stdout
      value: "True\nTrue\nFalse"
    hints:
      - "Walk pattern and key word by word. # matches any remainder and immediately returns True; * matches exactly one word."
      - "For order.#: after order comes #, so any tail fits. For order.*.vip you need exactly one word between order and vip. For order.us.# the key's second word eu is not us."
      - "Run each pattern mentally to the exit point: early return True on #, return False on mismatch, or final length check."
