exercises:
  - id: rabbit-four-bricks-001
    concept: rabbitmq-model
    type: theory-quiz
    difficulty: 1
    prompt: "Куда producer в RabbitMQ отправляет сообщение?"
    choices:
      - id: a
        text: "В exchange с routing key."
      - id: b
        text: "Напрямую в нужную queue, имя которой producer обязан знать заранее."
      - id: c
        text: "Сразу нескольким consumer'ам, минуя брокер."
      - id: d
        text: "В binding, который сам пересылает его в exchange."
    correct: [a]
    explanation: "В модели AMQP producer пишет в exchange и прикладывает routing key. Сам он не знает, какие очереди существуют. Маршрут «exchange -> queue» определяют заранее настроенные bindings. Это модель «умного брокера»: логика маршрутизации на сервере, клиенты простые."
    variants:
      - prompt: "Где в RabbitMQ сообщение реально хранится в ожидании consumer'а?"
        choices:
          - id: a
            text: "В queue - это единственное место хранения; exchange только маршрутизирует."
          - id: b
            text: "В exchange - именно он держит сообщения до прихода consumer'а."
          - id: c
            text: "В binding - связка хранит сообщение, пока правило активно."
          - id: d
            text: "В routing key - ярлык несёт в себе тело сообщения."
        correct: [a]
        explanation: "Queue - именованный буфер, единственное место, где сообщение лежит и ждёт. Exchange - точка приёма и маршрутизации, он ничего не хранит. Binding - правило-связка, routing key - ярлык на сообщении."
      - prompt: "Что такое binding в RabbitMQ?"
        choices:
          - id: a
            text: "Правило «класть из этого exchange в эту queue при таком условии»."
          - id: b
            text: "Сетевое соединение между producer и consumer без exchange."
          - id: c
            text: "Уникальный идентификатор сообщения внутри конкретной очереди."
          - id: d
            text: "Тип сериализации тела сообщения (JSON, protobuf и т.п.)."
        correct: [a]
        explanation: "Binding связывает exchange с queue и задаёт условие, по которому exchange решает, копировать ли сообщение в эту очередь. Routing key сообщения сверяется с условием binding."

  - id: rabbit-exchange-types-001
    concept: rabbitmq-model
    type: fill-in-blanks
    difficulty: 2
    prompt: "Соотнесите тип exchange с тем, как он сверяет routing key."
    template: |
      Exchange типа {{direct}} доставляет, когда routing key точно равен binding key.
      Exchange типа {{topic}} сверяет ключ с шаблоном, где * - одно слово, а # - любое их число.
      Exchange типа {{fanout}} игнорирует routing key и кладёт копию во все привязанные очереди.
    blanks:
      direct:
        accept: ["direct", "директ", "директный"]
      topic:
        accept: ["topic", "топик", "топиковый"]
      fanout:
        accept: ["fanout", "фанаут", "фэнаут"]
    variants:
      - template: |
          Чтобы доставить копию каждой привязанной очереди broadcast'ом, выбирают exchange типа {{broadcast}}.
          Чтобы маршрутизировать по иерархическому ключу вроде order.eu.vip, выбирают exchange типа {{hierarchical}}.
          Чтобы маршрутизировать по парам ключ-значение в заголовках, а не по строке-ключу, выбирают exchange типа {{byheaders}}.
        blanks:
          broadcast:
            accept: ["fanout", "фанаут", "фэнаут"]
          hierarchical:
            accept: ["topic", "топик", "топиковый"]
          byheaders:
            accept: ["headers", "хедерс", "хедерный"]
      - template: |
          В шаблоне topic-exchange символ {{onefld}} заменяет ровно одно слово ключа.
          Символ {{anyfld}} заменяет любое число слов, включая ноль.
          Поэтому ключ order.eu.vip совпадёт с шаблоном order.{{tail}}, у которого после order стоит этот «жадный» символ.
        blanks:
          onefld:
            accept: ["*", "звёздочка", "звездочка", "asterisk"]
          anyfld:
            accept: ["#", "решётка", "решетка", "hash"]
          tail:
            accept: ["#", "решётка", "решетка", "hash"]

  - id: rabbit-no-binding-001
    concept: rabbitmq-model
    type: theory-quiz
    difficulty: 2
    prompt: "Producer опубликовал сообщение в exchange, но ни один binding не подошёл к его routing key. Что произойдёт?"
    choices:
      - id: a
        text: "Сообщение тихо отбрасывается без ошибки; producer считает, что отправил успешно."
      - id: b
        text: "Producer получит исключение, и публикация откатится."
      - id: c
        text: "Сообщение останется в exchange навсегда, пока не появится подходящий binding."
      - id: d
        text: "RabbitMQ создаст новую очередь под этот ключ автоматически."
    correct: [a]
    explanation: "Сообщение без совпавшего binding исчезает молча - это частая причина «потери» сообщений. Exchange ничего не хранит, а раз очереди для копии нет, копировать некуда. Прежде чем искать баг в consumer'е, проверяют, что binding вообще существует и его условие совпадает с ключом."

  - id: rabbit-ack-001
    concept: rabbitmq-model
    type: theory-quiz
    difficulty: 3
    prompt: "Consumer работает с manual ack. Он получил сообщение и упал во время обработки, не отправив ack. Что сделает RabbitMQ?"
    choices:
      - id: a
        text: "Вернёт неподтверждённое сообщение в очередь."
      - id: b
        text: "Удалит сообщение, считая его обработанным, потому что оно было доставлено."
      - id: c
        text: "Заблокирует очередь до тех пор, пока упавший consumer не вернётся именно на этот процесс."
      - id: d
        text: "Отправит producer'у уведомление об ошибке обработки."
    correct: [a]
    explanation: "При manual ack сообщение остаётся в состоянии unacked, пока consumer явно не подтвердит обработку. Если соединение закрылось без ack, RabbitMQ считает сообщение необработанным и возвращает в очередь для повторной доставки. Отсюда гарантия at-least-once: сообщение не теряется, но может прийти повторно."
    hints:
      - "Ключевой вопрос: в какой момент брокер имеет право стереть сообщение - при доставке или при подтверждении? От этого зависит, что случится при падении."
      - "Сообщение в состоянии unacked ещё считается «в работе», а не «обработанным». Что логично сделать брокеру с работой, которую так и не подтвердили?"

  - id: rabbit-autoack-danger-001
    concept: rabbitmq-model
    type: theory-quiz
    difficulty: 3
    prompt: "Команда включила autoack ради скорости. Какой риск они приняли?"
    choices:
      - id: a
        text: "Брокер удаляет сообщение в момент доставки, до обработки."
      - id: b
        text: "Autoack замедляет consumer'а, потому что требует двух подтверждений вместо одного."
      - id: c
        text: "Autoack дублирует каждое сообщение, удваивая нагрузку на очередь."
      - id: d
        text: "Autoack отключает маршрутизацию через exchange и пишет прямо в очередь."
    correct: [a]
    explanation: "Autoack удаляет сообщение в момент доставки, ещё до того, как consumer его обработал. Это быстрее, потому что нет ожидания подтверждения, но при любом падении consumer'а сообщение уже стёрто и потеряно. Autoack уместен только там, где потерять отдельное сообщение не страшно (например, метрики)."
    hints:
      - "Сравните момент удаления сообщения при autoack и при manual ack. Где он наступает раньше и что это значит при сбое?"
      - "Скорость здесь куплена ценой чего-то. Спросите: что именно происходит с сообщением между доставкой и обработкой, если брокер уже его стёр?"

  - id: rabbit-routing-predict-001
    concept: rabbitmq-model
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа? Она моделирует маршрутизацию по точному ключу (как direct-exchange)."
    snippet: |
      bindings = {"order.eu": ["queue.eu"], "order.us": ["queue.us"]}

      def route(key):
          return bindings.get(key, [])

      print(route("order.eu"))
      print(route("payment.eu"))
    expected:
      kind: stdout
      value: "['queue.eu']\n[]"
    hints:
      - "direct-exchange доставляет только при точном совпадении ключа с binding key. Какой из двух ключей есть в bindings, а какого нет?"
      - "Для ключа без совпавшего binding результат - пустой список: сообщению некуда идти, и в RabbitMQ оно бы тихо пропало."
    variants:
      - snippet: |
          queues = ["q1", "q2", "q3"]

          def fanout(message):
              return [(q, message) for q in queues]

          result = fanout("hello")
          print(len(result))
        expected:
          kind: stdout
          value: "3"
      - snippet: |
          queue = ["m1", "m2", "m3"]
          unacked = {}

          def deliver():
              msg = queue.pop(0)
              unacked[msg] = "unacked"
              return msg

          def ack(msg):
              del unacked[msg]

          first = deliver()
          ack(first)
          deliver()
          print(len(queue), len(unacked))
        expected:
          kind: stdout
          value: "1 1"

  - id: rabbit-topic-match-001
    concept: rabbitmq-model
    type: predict-output
    difficulty: 4
    prompt: "Что выведет эта программа? Она реализует упрощённое сопоставление шаблонов topic-exchange (* - одно слово, # - любое их число) для ключа order.eu.vip."
    snippet: |
      def matches(pattern, key):
          p = pattern.split(".")
          k = key.split(".")
          i = j = 0
          while i < len(p) and j < len(k):
              if p[i] == "#":
                  return True
              if p[i] == "*" or p[i] == k[j]:
                  i += 1
                  j += 1
              else:
                  return False
          return i == len(p) and j == len(k)

      key = "order.eu.vip"
      print(matches("order.#", key))
      print(matches("order.*.vip", key))
      print(matches("order.us.#", key))
    expected:
      kind: stdout
      value: "True\nTrue\nFalse"
    hints:
      - "Идите по шаблону и ключу слово за словом. # совпадает с любым остатком и сразу даёт True; * совпадает ровно с одним словом."
      - "Для order.#: после order стоит #, значит любой хвост подходит. Для order.*.vip нужно ровно одно слово между order и vip. Для order.us.# второе слово ключа eu не равно us."
      - "Прогоните мысленно каждый шаблон до точки выхода из цикла и определите, какая ветка вернёт результат: ранний return True на #, return False на несовпадении, или финальная проверка длин."
