exercises:
  - id: delivery-guarantees-modes-001
    concept: delivery-guarantees
    type: theory-quiz
    difficulty: 1
    prompt: "Что гарантирует режим доставки at-least-once?"
    choices:
      - id: a
        text: "Сообщение будет доставлено минимум один раз; дубли возможны, но потерь нет."
      - id: b
        text: "Сообщение будет доставлено ровно один раз без дублей и без потерь."
      - id: c
        text: "Сообщение будет доставлено не более одного раза; возможна потеря, дублей нет."
      - id: d
        text: "Сообщение будет доставлено ровно столько раз, сколько у него получателей."
    correct: [a]
    explanation: "at-least-once означает «минимум одна доставка»: брокер повторяет сообщение, пока не получит ack, поэтому потеря исключена, но при сбое между работой и ack сообщение придёт повторно. Любой consumer в этом режиме обязан быть готов к дублю."
    variants:
      - prompt: "Что гарантирует режим доставки at-most-once?"
        choices:
          - id: a
            text: "Сообщение будет доставлено не более одного раза; возможна потеря, дублей нет."
          - id: b
            text: "Сообщение будет доставлено минимум один раз; дубли возможны, потерь нет."
          - id: c
            text: "Сообщение будет доставлено ровно один раз при любых сбоях."
          - id: d
            text: "Сообщение будет доставлено столько раз, сколько было сбоев сети."
        correct: [a]
        explanation: "at-most-once - это «ноль или одна доставка»: ack ставится раньше работы, поэтому дубль невозможен, но сбой между ack и работой стирает невыполненную работу. Такой режим терпим для метрик и телеметрии, где потеря отдельной точки не критична."
      - prompt: "Какой порядок действий в consumer'е соответствует at-least-once?"
        choices:
          - id: a
            text: "Сначала выполнить работу, затем подтвердить (ack) - тогда сбой до ack приведёт к повтору."
          - id: b
            text: "Сначала подтвердить (ack), затем выполнить работу - тогда потеря исключена."
          - id: c
            text: "Подтвердить и выполнить работу одновременно одной сетевой операцией."
          - id: d
            text: "Никогда не подтверждать - брокер сам разберётся."
        correct: [a]
        explanation: "at-least-once получается, когда работа идёт раньше ack: если сбой случится между работой и подтверждением, брокер не дождётся ack и повторит сообщение. Потери нет, зато возможен дубль - его обезвреживают идемпотентностью."

  - id: delivery-idempotent-op-001
    concept: delivery-guarantees
    type: theory-quiz
    difficulty: 2
    prompt: "Какая из операций идемпотентна, то есть безопасна при повторной доставке сообщения?"
    choices:
      - id: a
        text: "order.status = \"paid\" - присвоение конкретного значения."
      - id: b
        text: "balance = balance + 100 - прибавление к текущему значению."
      - id: c
        text: "counter += 1 - инкремент счётчика."
      - id: d
        text: "history.append(event) - добавление в список."
    correct: [a]
    explanation: "Идемпотентная операция даёт один и тот же итог при любом числе повторов. Присвоение `status = \"paid\"` таково: сколько ни повторяй, статус остаётся paid. Прибавление, инкремент и append - накопительные: каждый повтор меняет результат, поэтому требуют защиты от дубля."
    variants:
      - prompt: "Какую операцию НЕЛЬЗЯ повторять безопасно без дополнительной защиты от дублей?"
        choices:
          - id: a
            text: "balance = balance + 100 - каждый повтор добавляет ещё сотню."
          - id: b
            text: "user.email = \"a@b.com\" - присвоение значения."
          - id: c
            text: "order.status = \"shipped\" - установка статуса."
          - id: d
            text: "cache[key] = value - повторная запись той же пары безопасна."
        correct: [a]
        explanation: "Накопительная операция `balance = balance + 100` не идемпотентна: повтор сообщения прибавит лишнюю сотню. Присвоения (email, status, запись по ключу) идемпотентны - итог не зависит от числа повторов. Накопление защищают дедупликацией по уникальному id сообщения."
      - prompt: "Что делает консьюмера идемпотентным при at-least-once доставке?"
        choices:
          - id: a
            text: "Хранение множества уже обработанных id."
          - id: b
            text: "Перевод брокера в режим exactly-once одной настройкой."
          - id: c
            text: "Увеличение числа партиций, чтобы дубли расходились по разным consumer'ам."
          - id: d
            text: "Отключение повторной доставки на стороне брокера."
        correct: [a]
        explanation: "Идемпотентность консьюмера строят на дедупликации: каждое сообщение несёт уникальный id, consumer запоминает обработанные id и при повторе пропускает работу. Так at-least-once превращается в «ровно один эффект» силами самого приёмника, без магии со стороны брокера."

  - id: delivery-ack-order-blanks-001
    concept: delivery-guarantees
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните утверждения о порядке ack и работы и связанных с ним гарантиях."
    template: |
      Если consumer ставит ack {{before}} работы, сбой между ними приводит к {{loss}} сообщения - это режим at-most-once.
      Если consumer выполняет работу раньше ack, сбой между ними приводит к {{dup}} сообщения - это режим at-least-once.
      Чтобы повтор был безопасен, операция должна быть {{idempotent}}.
    blanks:
      before:
        accept: ["раньше", "до", "перед", "before"]
      loss:
        accept: ["потере", "потеря", "утрате", "loss"]
      dup:
        accept: ["дублю", "дубль", "повтору", "дублированию", "duplicate"]
      idempotent:
        accept: ["идемпотентной", "идемпотентна", "idempotent"]
    variants:
      - template: |
          Честная exactly-once на уровне сетевой доставки {{achievable}}, потому что подтверждение может потеряться так же, как сообщение.
          Поэтому exactly-once делают на уровне {{level}}, а не на уровне доставки.
          Накопительную операцию превращают в безопасную с помощью {{dedup}} по уникальному id.
        blanks:
          achievable:
            accept: ["недостижима", "невозможна", "не достижима", "unachievable"]
          level:
            accept: ["эффекта", "эффект", "effect"]
          dedup:
            accept: ["дедупликации", "дедупликация", "deduplication", "дедуп"]
      - template: |
          В режиме at-most-once возможна {{atmost}}, но дублей не бывает.
          В режиме at-least-once возможны {{atleast}}, но потерь не бывает.
          Окно дедупликации должно перекрывать максимальную {{delay}} повтора, иначе остаётся дыра.
        blanks:
          atmost:
            accept: ["потеря", "потери", "утрата", "loss"]
          atleast:
            accept: ["дубли", "повторы", "дубликаты", "duplicates"]
          delay:
            accept: ["задержку", "задержка", "delay"]

  - id: delivery-balance-predict-001
    concept: delivery-guarantees
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Она моделирует идемпотентного consumer'а: сообщение m2 приходит дважды (имитация at-least-once)."
    snippet: |
      processed = set()
      balance = 0

      def handle(message_id, amount):
          global balance
          if message_id in processed:
              return balance
          balance += amount
          processed.add(message_id)
          return balance

      stream = [("m1", 100), ("m2", 50), ("m2", 50), ("m3", 30)]
      for mid, amt in stream:
          handle(mid, amt)
      print(balance)
    expected:
      kind: stdout
      value: "180"
    hints:
      - "Дубль обезвреживается множеством processed: второй раз тот же id уже внутри, и работа пропускается. Какие сообщения реально изменят баланс?"
      - "Учитываются m1 (100), m2 (50, один раз) и m3 (30); повтор m2 не трогает баланс."
    variants:
      - snippet: |
          balance = 0

          def handle(amount):
              global balance
              balance += amount
              return balance

          stream = [100, 50, 50, 30]
          for amt in stream:
              handle(amt)
          print(balance)
        expected:
          kind: stdout
          value: "230"
      - snippet: |
          processed = set()
          applied = 0
          deliveries = ["a", "b", "a", "c", "b", "a"]

          for d in deliveries:
              if d in processed:
                  continue
              processed.add(d)
              applied += 1

          print(applied)
        expected:
          kind: stdout
          value: "3"

  - id: delivery-exactly-once-myth-001
    concept: delivery-guarantees
    type: theory-quiz
    difficulty: 3
    prompt: "Почему честную exactly-once-доставку на уровне сети нельзя гарантировать, лишь добавляя подтверждения?"
    choices:
      - id: a
        text: "Подтверждение приёма само идёт по сети и может потеряться так же, как сообщение,."
      - id: b
        text: "Потому что брокеры пока не реализовали нужный протокол; в будущих версиях это исправят."
      - id: c
        text: "Потому что сеть всегда работает по принципу at-most-once и иначе не умеет."
      - id: d
        text: "Потому что exactly-once требует синхронных часов на всех узлах, а их нет."
    correct: [a]
    explanation: "Между «получил» и «подтвердил получение» всегда есть зазор, в который может вклиниться сбой. Если ack теряется в пути, producer не знает, дошло ли сообщение, и снова стоит перед выбором «повторить (риск дубля) или нет (риск потери)». Лишние подтверждения не спасают - они тоже могут потеряться. Поэтому exactly-once делают не на уровне доставки, а на уровне эффекта."
    hints:
      - "Что общего у самого сообщения и у ack, которым на него отвечают, с точки зрения сети?"
      - "Если ack может потеряться, какую неопределённость это создаёт у отправителя и поможет ли тут ещё одно подтверждение поверх?"

  - id: delivery-dedup-window-001
    concept: delivery-guarantees
    type: theory-quiz
    difficulty: 3
    prompt: "Consumer дедуплицирует сообщения по id, но хранит обработанные id только последние 10 минут. Брокер может повторить сообщение через час после сбоя. В чём проблема?"
    choices:
      - id: a
        text: "Окно дедупликации меньше максимальной задержки повтора."
      - id: b
        text: "Никакой: 10 минут хватит на любые повторы, час - это редкий случай"
      - id: c
        text: "Хранить id вообще нельзя, дедупликация по id всегда ошибочна"
      - id: d
        text: "Проблема только в памяти: за час id займут слишком много места"
    correct: [a]
    explanation: "Множество обработанных id нельзя хранить вечно, поэтому используют окно. Но окно должно перекрывать максимально возможную задержку повтора. Если брокер повторяет через час, а id живёт 10 минут, то опоздавший дубль уже не найдётся в окне и пройдёт как новый. Окно дедупликации обязано быть шире максимальной задержки повтора."
    hints:
      - "Дедупликация ловит дубль, только пока его id ещё помнится. Сравните, как долго помнится id и через сколько может прийти повтор."
      - "Если повтор приходит позже, чем живёт id в окне, что consumer о нём «знает» в момент получения?"

  - id: delivery-effects-predict-001
    concept: delivery-guarantees
    type: predict-output
    difficulty: 4
    prompt: "Что выведет программа? Она моделирует поток at-least-once с дублями и считает, сколько эффектов применит НЕидемпотентный consumer (без дедупликации)."
    snippet: |
      deliveries = ["m1", "m1", "m2", "m3", "m3", "m3"]

      def apply_naive(stream):
          effects = 0
          for _ in stream:
              effects += 1
          return effects

      def apply_idempotent(stream):
          seen = set()
          effects = 0
          for mid in stream:
              if mid in seen:
                  continue
              seen.add(mid)
              effects += 1
          return effects

      print(apply_naive(deliveries) - apply_idempotent(deliveries))
    expected:
      kind: stdout
      value: "3"
    hints:
      - "Наивный consumer применяет эффект на каждую доставку, идемпотентный - только на каждый уникальный id. Разность - это число лишних повторов."
      - "Посчитайте отдельно: сколько всего доставок в списке и сколько среди них уникальных id. Программа печатает разность этих двух чисел."
      - "Разность «всего доставок минус уникальных id» равна числу дублей. Найдите дубли среди m1, m1, m2, m3, m3, m3."
