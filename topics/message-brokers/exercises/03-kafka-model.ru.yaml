exercises:
  - id: kafka-log-model-001
    concept: kafka-model
    type: theory-quiz
    difficulty: 1
    prompt: "Что происходит с записью в Kafka, когда consumer её прочитал?"
    choices:
      - id: a
        text: "Запись остаётся в логе и доступна другим читателям."
      - id: b
        text: "Запись немедленно удаляется из лога, как в обычной очереди."
      - id: c
        text: "Запись помечается как unacked и возвращается в начало лога."
      - id: d
        text: "Запись копируется во все остальные партиции топика."
    correct: [a]
    explanation: "Kafka - это append-only лог: чтение не удаляет записи, оно лишь двигает offset consumer'а. Прочитанная запись остаётся в логе по времени удержания (retention) и доступна следующему читателю. Это принципиально отличает Kafka от очереди, которая пустеет при чтении."
    variants:
      - prompt: "Что такое offset в Kafka?"
        choices:
          - id: a
            text: "Порядковый номер записи внутри партиции."
          - id: b
            text: "Уникальный идентификатор всего топика."
          - id: c
            text: "Время, через которое запись будет удалена из лога."
          - id: d
            text: "Число consumer'ов, прочитавших запись."
        correct: [a]
        explanation: "Offset - позиция записи в партиции: записи нумеруются подряд 0, 1, 2... Consumer хранит свой offset как закладку «я дочитал до этого места» и двигает её вперёд по мере чтения."
      - prompt: "Как устроен топик в Kafka на нижнем уровне?"
        choices:
          - id: a
            text: "Это журнал (log), разбитый на партиции."
          - id: b
            text: "Это одна большая очередь, из которой сообщения исчезают по мере чтения."
          - id: c
            text: "Это таблица в реляционной базе с произвольным доступом по первичному ключу."
          - id: d
            text: "Это дерево, по которому брокер ищет сообщение при каждом запросе."
        correct: [a]
        explanation: "Топик - append-only журнал из партиций. Каждая партиция - независимая последовательность записей, пронумерованных подряд. Записи только дописываются в конец, в середину ничего не вставляется."

  - id: kafka-partition-order-001
    concept: kafka-model
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните утверждения о порядке и ключе в Kafka."
    template: |
      Kafka гарантирует порядок записей только внутри одной {{partition}}.
      Чтобы все события одной сущности попали туда и сохранили порядок, им задают общий {{key}}.
      Партиция выбирается так: hash(key) {{operator}} число партиций.
    blanks:
      partition:
        accept: ["партиции", "партиция", "partition", "партишена"]
      key:
        accept: ["ключ", "key", "ключ сообщения", "message key"]
      operator:
        accept: ["%", "mod", "по модулю", "modulo"]
    variants:
      - template: |
          Если ключ сообщения не задан (null), Kafka распределяет записи по партициям {{distribution}}, и порядок не гарантирован.
          Ключ с одним-двумя значениями сложит почти все сообщения в одну-две партиции - это называется {{skew}}.
          Между разными партициями порядок записей {{guaranteed}}.
        blanks:
          distribution:
            accept: ["round-robin", "round robin", "по кругу", "раунд-робин"]
          skew:
            accept: ["перекос", "skew", "partition skew", "перекосом"]
          guaranteed:
            accept: ["не гарантирован", "отсутствует", "не определён", "нет"]
      - template: |
          Внутри consumer group каждую партицию читает {{howmany}} consumer.
          Поэтому число партиций - это {{ceiling}} параллелизма группы.
          Если consumer'ов в группе больше, чем партиций, лишние будут {{idle}}.
        blanks:
          howmany:
            accept: ["ровно один", "один", "только один", "exactly one"]
          ceiling:
            accept: ["потолок", "предел", "максимум", "верхняя граница"]
          idle:
            accept: ["простаивать", "простаивают", "бездействовать", "idle"]

  - id: kafka-consumer-group-001
    concept: kafka-model
    type: theory-quiz
    difficulty: 2
    prompt: "В топике 3 партиции. В consumer group 4 consumer'а. Что произойдёт?"
    choices:
      - id: a
        text: "Каждую партицию читает ровно один consumer."
      - id: b
        text: "Каждый consumer прочитает все три партиции целиком, получится четыре копии потока."
      - id: c
        text: "Kafka разобьёт каждую партицию на части, чтобы занять всех четырёх."
      - id: d
        text: "Kafka откажется добавлять четвёртого consumer'а с ошибкой."
    correct: [a]
    explanation: "Внутри consumer group каждую партицию читает ровно один consumer. Число партиций - потолок параллелизма группы. Consumer'ов может быть меньше партиций (тогда кто-то читает несколько), но больше - бессмысленно: лишние простаивают без партиций."

  - id: kafka-global-order-001
    concept: kafka-model
    type: theory-quiz
    difficulty: 3
    prompt: "Бизнес-логике важно, чтобы события одного заказа обрабатывались строго по порядку. Топик «orders» имеет 3 партиции. Как это обеспечить?"
    choices:
      - id: a
        text: "Класть все события одного заказа в одну партицию через общий ключ (например, order_id)."
      - id: b
        text: "Положиться на то, что Kafka и так доставляет весь топик в глобальном порядке."
      - id: c
        text: "Свести топик к одному consumer'у на всю группу - тогда порядок появится между партициями."
      - id: d
        text: "Отключить партиционирование на стороне consumer'а через настройку."
    correct: [a]
    explanation: "Порядок в Kafka - свойство партиции, а не топика. Глобального порядка по топику нет. Чтобы события сущности шли по порядку, их кладут в одну партицию общим ключом: hash(order_id) % 3 всегда даёт одну и ту же партицию для одного заказа, и записи в ней строго упорядочены."
    hints:
      - "Порядок гарантирован не для топика целиком, а для меньшей единицы. Какой именно? И что определяет, в какую из них попадёт запись?"
      - "Если все события одного заказа должны быть упорядочены, они обязаны оказаться в одном месте. Чем producer управляет выбором этого места?"

  - id: kafka-skew-001
    concept: kafka-model
    type: theory-quiz
    difficulty: 3
    prompt: "Инженер выбрал ключом сообщения флаг is_premium (значения true/false) для топика с 12 партициями. Что не так?"
    choices:
      - id: a
        text: "Ключ с двумя значениями сложит все сообщения максимум в две партиции - перекос."
      - id: b
        text: "Ничего: два значения ключа равномерно займут все 12 партиций"
      - id: c
        text: "Kafka запретит булев ключ и потребует строку - смешивая разные гарантии доставки и порядок"
      - id: d
        text: "Порядок внутри партиции при таком ключе перестанет работать"
    correct: [a]
    explanation: "hash(key) % 12 от ключа с двумя значениями даст максимум два результата, то есть две задействованные партиции из двенадцати. Это перекос (partition skew): две партиции переполнены, десять пусты, и «параллельная» обработка деградирует до одного-двух перегруженных consumer'ов. Хороший ключ имеет много различных значений."
    hints:
      - "Сколько разных партиций может получиться из hash(key) % 12, если у ключа всего два возможных значения?"
      - "Параллелизм группы упирается в число задействованных партиций. Что станет с остальными десятью при ключе из двух значений?"

  - id: kafka-offset-predict-001
    concept: kafka-model
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа? Она моделирует чтение лога с движением offset двумя независимыми группами."
    snippet: |
      log = ["e0", "e1", "e2"]
      offsets = {"billing": 0, "analytics": 0}

      def consume(group):
          o = offsets[group]
          if o < len(log):
              offsets[group] = o + 1
              return log[o]

      consume("billing")
      consume("billing")
      consume("analytics")
      print(offsets)
    expected:
      kind: stdout
      value: "{'billing': 2, 'analytics': 1}"
    hints:
      - "Разные группы читают один лог независимо, каждая со своей закладкой. Чтение не удаляет запись, только сдвигает offset этой группы."
      - "Группа billing вызвала consume дважды (offset 0 -> 2), analytics один раз (offset 0 -> 1). Записи в логе при этом не тронуты."
    variants:
      - snippet: |
          partitions = [0, 1, 2]
          consumers = ["C1", "C2", "C3", "C4"]
          assignment = {c: [] for c in consumers}

          for i, p in enumerate(partitions):
              assignment[consumers[i % len(consumers)]].append(p)

          idle = [c for c, ps in assignment.items() if not ps]
          print(idle)
        expected:
          kind: stdout
          value: "['C4']"
      - snippet: |
          log = ["a", "b", "c", "d", "e"]
          offset = 0

          def poll(n):
              global offset
              batch = log[offset:offset + n]
              offset += len(batch)
              return batch

          poll(2)
          poll(2)
          print(offset)
        expected:
          kind: stdout
          value: "4"

  - id: kafka-rebalance-predict-001
    concept: kafka-model
    type: predict-output
    difficulty: 4
    prompt: "Что выведет эта программа? Она моделирует равномерное распределение 6 партиций между 3 consumer'ами в группе и печатает число партиций у каждого."
    snippet: |
      def assign(partitions, consumers):
          result = {c: [] for c in consumers}
          for i, p in enumerate(partitions):
              result[consumers[i % len(consumers)]].append(p)
          return result

      assignment = assign([0, 1, 2, 3, 4, 5], ["C1", "C2", "C3"])
      print([len(assignment[c]) for c in ["C1", "C2", "C3"]])
    expected:
      kind: stdout
      value: "[2, 2, 2]"
    hints:
      - "Партиции раздаются по кругу: индекс партиции по модулю числа consumer'ов выбирает, кому она достанется. 6 партиций, 3 consumer'а."
      - "Пройдите по индексам 0..5 и для каждого посчитайте i % 3 - это и есть номер consumer'а, которому достанется партиция."
      - "Каждую партицию читает ровно один consumer, и когда число партиций кратно числу consumer'ов, распределение получается ровным. Длину какого списка печатает программа?"
