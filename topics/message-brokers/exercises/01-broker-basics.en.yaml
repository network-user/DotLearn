exercises:
  - id: broker-why-001
    concept: broker-basics
    type: theory-quiz
    difficulty: 1
    prompt: "What main problem of direct calls between services does a message broker solve?"
    choices:
      - id: a
        text: "Tight coupling: the sender knows recipient addresses, waits for their responses."
      - id: b
        text: "Processing that is too fast: the broker artificially slows consumers to even out load."
      - id: c
        text: "Lack of memory on recipients: the broker compresses messages before delivery."
      - id: d
        text: "Missing encryption: the broker's main job is to protect traffic between services."
    correct: [a]
    explanation: "A broker breaks the tight link between producer and consumer. The producer puts a message and is immediately free; it does not know recipients and does not share their fate. Speed, memory, and encryption are not why you introduce a broker."
    variants:
      - prompt: "What does the decoupling a message broker provides mean?"
        choices:
          - id: a
            text: "The producer publishes a fact and does not list recipients;."
          - id: b
            text: "Producer and consumer must run strictly at the same time."
          - id: c
            text: "The broker automatically rewrites producer code when a new recipient is added."
          - id: d
            text: "Each message is guaranteed to reach exactly one recipient."
        correct: [a]
        explanation: "Decoupling means the producer does not know who reads, and the consumer does not know who writes. They are linked only by message format. You can add a new recipient without touching the producer."
      - prompt: "The order service publishes event order.created to a broker. What is true about this event?"
        choices:
          - id: a
            text: "The producer does not list recipients."
          - id: b
            text: "The order service must keep a list of all subscribers and call each in turn."
          - id: c
            text: "The event is delivered instantly and synchronously to all recipients before the user gets a response."
          - id: d
            text: "Without a broker such an event cannot be sent at all."
        correct: [a]
        explanation: "Publishing a fact means the recipient list is not baked into the sender. A new subscriber is added on its side, and the order service does not change a line."

  - id: broker-mental-model-001
    concept: broker-basics
    type: fill-in-blanks
    difficulty: 1
    prompt: "Fill in the roles in the basic message broker model."
    template: |
      The {{producer}} puts a message in the broker and is immediately free.
      The broker {{stores}} the message until someone takes it.
      The {{consumer}} takes the message at its own pace when ready.
    blanks:
      producer:
        accept: ["producer", "publisher", "sender"]
      stores:
        accept: ["stores", "buffers", "holds", "keeps", "saves"]
      consumer:
        accept: ["consumer", "recipient", "subscriber"]
    variants:
      - template: |
          The operation where a producer writes a message to the broker is called {{publish}}.
          The producer pays only for the broker to {{ack}} receipt, and is immediately free.
          This one-way model is called {{fireforget}}.
        blanks:
          publish:
            accept: ["publish", "publishing"]
          ack:
            accept: ["ack", "acknowledge", "confirm", "acknowledges"]
          fireforget:
            accept: ["fire-and-forget", "fire and forget"]
      - template: |
          The broker property where the producer does not know recipients and the consumer does not know senders is called {{decoupling}}.
          The property where the buffer absorbs a spike whole and gives the consumer only what it can handle is called {{smoothing}}.
          The property where producer and consumer need not be alive at the same time is called {{buffering}}.
        blanks:
          decoupling:
            accept: ["decoupling", "decoupling of services"]
          smoothing:
            accept: ["smoothing", "peak smoothing", "load smoothing"]
          buffering:
            accept: ["buffering", "buffering of load"]

  - id: broker-three-jobs-001
    concept: broker-basics
    type: theory-quiz
    difficulty: 2
    prompt: "A peak brings 5000 messages per second, but the consumer handles 1000 per second. What does the broker do?"
    choices:
      - id: a
        text: "Accepts all 5000 into a queue and gives the consumer 1000 per second."
      - id: b
        text: "Speeds the consumer up to 5000 per second so it keeps up with the peak."
      - id: c
        text: "Drops the extra 4000 messages, keeping only what the consumer can handle."
      - id: d
        text: "Returns overload error to the producer for 4000 messages."
    correct: [a]
    explanation: "This is peak smoothing: the broker is a buffer that absorbs the spike whole and gives the consumer only what it can process. The price is delay for messages from the peak, but nothing is lost. The broker does not speed up the consumer or drop messages on a temporary spike."

  - id: broker-not-faster-001
    concept: broker-basics
    type: theory-quiz
    difficulty: 3
    prompt: "A colleague says: \"Let's add a broker and every message will be processed faster.\" What are they wrong about?"
    choices:
      - id: a
        text: "A broker does not speed up processing of an individual message - it adds a network hop and latency."
      - id: b
        text: "A broker really does speed up every message; the colleague is right."
      - id: c
        text: "A broker speeds up only the first message and slows down the rest."
      - id: d
        text: "Processing speed depends only on the consumer's programming language; the broker is irrelevant."
    correct: [a]
    explanation: "A broker does not make processing faster - on the contrary, it adds an extra hop and delay on the message path. Its value is resilience: decoupling, peak smoothing, buffering when a recipient stops. That is about reliability and scale, not latency of one message."
    hints:
      - "Ask yourself: what physically gets added on the message path when it goes through an intermediary instead of directly?"
      - "The broker solves resilience and scale, not latency of one call. Compare \"will I process or crash\" with \"I'll process later, but everything\"."

  - id: broker-buffer-limit-001
    concept: broker-basics
    type: theory-quiz
    difficulty: 3
    prompt: "The broker queue has been growing for hours without shrinking. What does that indicate?"
    choices:
      - id: a
        text: "Average producer rate is steadily above consumer rate; the buffer does not fix chronic lag."
      - id: b
        text: "This is normal: a broker queue should always grow; that is by design."
      - id: c
        text: "The broker is broken because a healthy broker never accumulates messages."
      - id: d
        text: "The producer must be stopped forever - there is no other fix."
    correct: [a]
    explanation: "A broker amortizes a temporary spike but does not compensate for a permanently lagging consumer. If average ingress exceeds average processing, the queue grows without limit until it hits memory or disk. The fix is to speed up or scale consumers horizontally, not silently pile up."
    hints:
      - "Distinguish a temporary peak from permanent lag. The buffer survives a peak; what happens if ingress is always faster on average?"
      - "Think about which broker resource has a limit and what happens to a queue that only grows."

  - id: broker-publish-cost-001
    concept: broker-basics
    type: predict-output
    difficulty: 2
    prompt: "What will this program print? It compares the cost of a direct call versus publishing to a broker for the sender."
    snippet: |
      log = []

      def direct_call(receiver_latency_ms):
          cost = 5 + receiver_latency_ms
          log.append(("direct", cost))
          return cost

      def publish(broker_ack_ms):
          cost = broker_ack_ms
          log.append(("publish", cost))
          return cost

      direct_call(400)
      publish(3)
      print(log)
    expected:
      kind: stdout
      value: "[('direct', 405), ('publish', 3)]"
    hints:
      - "On a direct call the sender waits for the recipient, so its latency is included in cost. On publish - only broker receipt confirmation."
      - "Plug arguments into each function: direct_call adds fixed 5 and recipient delay, publish returns its argument as-is. The list accumulates both calls in order."
    variants:
      - snippet: |
          queue = 0
          incoming = [800, 1200, 5000, 4200]
          capacity = 1000

          for n in incoming:
              queue += n
              queue -= min(queue, capacity)

          print(queue)
        expected:
          kind: stdout
          value: "7400"
      - snippet: |
          queue = 0
          incoming = [500, 3000, 3000]
          capacity = 1000

          for n in incoming:
              queue += n
              queue -= min(queue, capacity)

          print(queue)
        expected:
          kind: stdout
          value: "4000"
