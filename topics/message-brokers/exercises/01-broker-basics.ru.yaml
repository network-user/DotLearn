exercises:
  - id: broker-why-001
    concept: broker-basics
    type: theory-quiz
    difficulty: 1
    prompt: "Какую главную проблему прямого вызова между сервисами решает брокер сообщений?"
    choices:
      - id: a
        text: "Жёсткую связанность: отправитель знает адреса получателей, ждёт их ответа и падает с самым медленным из них."
      - id: b
        text: "Слишком быструю обработку: брокер искусственно замедляет получателей, чтобы выровнять нагрузку."
      - id: c
        text: "Нехватку памяти у получателей: брокер сжимает сообщения перед доставкой."
      - id: d
        text: "Отсутствие шифрования: основная задача брокера - защитить трафик между сервисами."
    correct: [a]
    explanation: "Брокер разрывает жёсткую связь между producer и consumer. Producer кладёт сообщение и сразу свободен; он не знает получателей и не делит с ними судьбу. Скорость, память и шифрование - не тот тип задачи, ради которого вводят брокер."
    variants:
      - prompt: "Что означает «развязка» (decoupling), которую даёт брокер сообщений?"
        choices:
          - id: a
            text: "Producer публикует факт и не перечисляет получателей; кто подпишется - дело consumer'ов."
          - id: b
            text: "Producer и consumer обязаны быть запущены строго одновременно."
          - id: c
            text: "Брокер автоматически переписывает код producer'а при добавлении нового получателя."
          - id: d
            text: "Каждое сообщение гарантированно доходит ровно до одного получателя."
        correct: [a]
        explanation: "Развязка означает, что producer не знает, кто читает, а consumer не знает, кто пишет. Их связывает только формат сообщения. Добавить нового получателя можно, не трогая producer."
      - prompt: "Сервис заказов публикует событие «order.created» в брокер. Что про это событие верно?"
        choices:
          - id: a
            text: "Producer не перечисляет получателей: новый сервис может подписаться сам, не меняя сервис заказов."
          - id: b
            text: "Сервис заказов обязан хранить список всех подписчиков и вызывать каждого по очереди."
          - id: c
            text: "Событие доставится мгновенно и синхронно всем получателям до ответа пользователю."
          - id: d
            text: "Без брокера такое событие в принципе невозможно отправить."
        correct: [a]
        explanation: "Смысл публикации факта в том, что список получателей не зашит в отправителя. Новый подписчик добавляется на своей стороне, а сервис заказов не меняется ни на строчку."

  - id: broker-mental-model-001
    concept: broker-basics
    type: fill-in-blanks
    difficulty: 1
    prompt: "Заполните роли в базовой модели брокера сообщений."
    template: |
      {{producer}} кладёт сообщение в брокер и сразу свободен.
      Брокер {{stores}} сообщение, пока его не заберут.
      {{consumer}} забирает сообщение в своём темпе, когда готов.
    blanks:
      producer:
        accept: ["producer", "продюсер", "отправитель", "издатель", "publisher"]
      stores:
        accept: ["хранит", "буферизует", "накапливает", "держит", "сохраняет"]
      consumer:
        accept: ["consumer", "консьюмер", "получатель", "потребитель", "подписчик"]
    variants:
      - template: |
          Операция, при которой producer пишет сообщение в брокер, называется {{publish}}.
          Producer платит только за то, чтобы брокер {{ack}} приём, и сразу свободен.
          Эта модель однонаправленная: её называют {{fireforget}}.
        blanks:
          publish:
            accept: ["publish", "публикация", "публикацией", "опубликовать"]
          ack:
            accept: ["подтвердил", "подтвердить", "ack", "квитировал"]
          fireforget:
            accept: ["fire-and-forget", "fire and forget", "положил и забыл", "положить и забыть"]
      - template: |
          Свойство брокера, при котором producer не знает получателей, а consumer не знает отправителей, называется {{decoupling}}.
          Свойство, при котором буфер принимает всплеск целиком и отдаёт consumer'у ровно столько, сколько тот успевает, называется {{smoothing}}.
          Свойство, при котором producer и consumer не обязаны быть живыми одновременно, называется {{buffering}}.
        blanks:
          decoupling:
            accept: ["развязка", "развязкой", "decoupling", "развязка сервисов"]
          smoothing:
            accept: ["сглаживание", "сглаживанием", "сглаживание пиков", "сглаживание нагрузки"]
          buffering:
            accept: ["буферизация", "буферизацией", "buffering"]

  - id: broker-three-jobs-001
    concept: broker-basics
    type: theory-quiz
    difficulty: 2
    prompt: "В пике приходит 5000 сообщений в секунду, а consumer обрабатывает 1000 в секунду. Что делает брокер?"
    choices:
      - id: a
        text: "Принимает все 5000 в очередь и отдаёт consumer'у по 1000 в секунду."
      - id: b
        text: "Ускоряет consumer'а до 5000 в секунду, чтобы он успевал за пиком."
      - id: c
        text: "Отбрасывает лишние 4000 сообщений, оставляя только то, что consumer успевает."
      - id: d
        text: "Возвращает producer'у ошибку «перегрузка» на 4000 сообщений."
    correct: [a]
    explanation: "Это сглаживание пиков: брокер - буфер, который поглощает всплеск целиком и отдаёт consumer'у ровно столько, сколько тот успевает. Цена - задержка обработки сообщений из пика, но ничего не теряется. Брокер не ускоряет consumer'а и не выбрасывает сообщения при временном всплеске."

  - id: broker-not-faster-001
    concept: broker-basics
    type: theory-quiz
    difficulty: 3
    prompt: "Коллега говорит: «Добавим брокер - и каждое сообщение будет обрабатываться быстрее». В чём он ошибается?"
    choices:
      - id: a
        text: "Брокер не ускоряет обработку отдельного сообщения - он добавляет сетевой хоп и задержку."
      - id: b
        text: "Брокер действительно ускоряет каждое сообщение, коллега прав."
      - id: c
        text: "Брокер ускоряет только первое сообщение, а остальные замедляет."
      - id: d
        text: "Скорость обработки зависит только от языка программирования consumer'а, брокер ни при чём."
    correct: [a]
    explanation: "Брокер не делает обработку быстрее - наоборот, добавляет к пути сообщения лишний хоп и задержку. Его ценность в устойчивости: развязка, сглаживание пиков, буферизация при остановке получателя. Это про надёжность и масштаб, а не про скорость отдельного сообщения."
    hints:
      - "Спросите себя: что физически добавляется на пути сообщения, когда оно идёт не напрямую, а через посредника?"
      - "Брокер решает задачи про устойчивость и масштаб, а не про латентность одного вызова. Сравните «успею обработать или упаду» и «обработаю чуть позже, но всё»."

  - id: broker-buffer-limit-001
    concept: broker-basics
    type: theory-quiz
    difficulty: 3
    prompt: "Очередь в брокере растёт и не уменьшается уже несколько часов. О чём это говорит?"
    choices:
      - id: a
        text: "Средняя скорость producer'а стабильно выше скорости consumer'а."
      - id: b
        text: "Это нормально: брокерская очередь должна постоянно расти, так и задумано."
      - id: c
        text: "Брокер сломан, потому что исправный брокер никогда не накапливает сообщения."
      - id: d
        text: "Producer нужно остановить навсегда - других решений нет."
    correct: [a]
    explanation: "Брокер амортизирует временный всплеск, но не компенсирует постоянно отстающего consumer'а. Если средняя скорость поступления выше средней скорости обработки, очередь растёт без предела, пока не упрётся в лимит памяти или диска. Лечение - ускорить consumer или масштабировать его горизонтально, а не молча копить."
    hints:
      - "Различайте временный пик и постоянное отставание. Пик буфер переживёт, а что будет, если входной поток в среднем всегда быстрее выходного?"
      - "Подумайте, у какого ресурса в брокере есть предел и что произойдёт с очередью, которая только растёт."

  - id: broker-publish-cost-001
    concept: broker-basics
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа? Она сравнивает стоимость прямого вызова и публикации в брокер для отправителя."
    snippet: |
      log = []

      def direct_call(receiver_latency_ms):
          cost = 5 + receiver_latency_ms
          log.append(("direct", cost))
          return cost

      def publish(broker_ack_ms):
          cost = broker_ack_ms
          log.append(("publish", cost))
          return cost

      direct_call(400)
      publish(3)
      print(log)
    expected:
      kind: stdout
      value: "[('direct', 405), ('publish', 3)]"
    hints:
      - "При прямом вызове отправитель ждёт ответа получателя, поэтому в стоимость входит его задержка. При публикации - только подтверждение приёма брокером."
      - "Подставьте аргументы в тело каждой функции: direct_call складывает фиксированные 5 и задержку получателя, publish возвращает свой аргумент как есть. Список накапливает обе записи в порядке вызовов."
    variants:
      - snippet: |
          queue = 0
          incoming = [800, 1200, 5000, 4200]
          capacity = 1000

          for n in incoming:
              queue += n
              queue -= min(queue, capacity)

          print(queue)
        expected:
          kind: stdout
          value: "7400"
      - snippet: |
          queue = 0
          incoming = [500, 3000, 3000]
          capacity = 1000

          for n in incoming:
              queue += n
              queue -= min(queue, capacity)

          print(queue)
        expected:
          kind: stdout
          value: "4000"
