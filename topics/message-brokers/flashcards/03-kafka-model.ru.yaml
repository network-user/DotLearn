conceptId: kafka-model
cards:
  - id: kafka-model-01
    front: "Что такое топик в Kafka на уровне модели данных?"
    back: "Распределённый append-only журнал (log), разбитый на партиции. Новые записи только добавляются в конец, ничего не вставляется в середину и не удаляется при чтении."
    tags: [log, model]
  - id: kafka-model-02
    front: "Чем чтение в Kafka отличается от очереди RabbitMQ?"
    back: "Consumer не «забирает» сообщение - он читает журнал с того места, где остановился, и двигает свою закладку (offset). Прочитанная запись остаётся в логе и доступна другим читателям."
    tags: [offset, log]
  - id: kafka-model-03
    front: "Что такое offset?"
    back: "Порядковый номер записи внутри партиции (0, 1, 2, ...) и одновременно закладка consumer'а - позиция «я дочитал до этого места». Producer всегда дописывает запись с offset на единицу больше предыдущего."
    tags: [offset]
  - id: kafka-model-04
    front: "В каких пределах Kafka гарантирует порядок сообщений?"
    back: "Только внутри одной партиции. Между партициями порядка нет. Партиции - расплата за параллелизм: масштабируемся, но теряем глобальный порядок по топику."
    tags: [ordering, partition]
  - id: kafka-model-05
    front: "Как ключ сообщения определяет партицию?"
    back: "partition = hash(key) % partition_count. Одинаковый ключ всегда попадает в одну партицию, что даёт гарантированный порядок для этого ключа. key=null даёт round-robin без гарантии порядка."
    tags: [key, partition]
  - id: kafka-model-06
    front: "Что такое перекос партиций (partition skew)?"
    back: "Ключ с малым числом значений (флаг is_premium, популярная страна) складывает почти все сообщения в одну-две партиции. Параллельная обработка деградирует до одного перегруженного consumer'а."
    tags: [skew, pitfall]
  - id: kafka-model-07
    front: "Как consumer group распределяет партиции?"
    back: "Каждую партицию читает ровно один consumer в группе. Добавление consumer'а вызывает rebalance и перераспределение партиций. Число партиций - потолок параллелизма группы."
    tags: [consumer-group, parallelism]
  - id: kafka-model-08
    front: "Что будет, если consumer'ов в группе больше, чем партиций?"
    back: "Лишние consumer'ы простаивают - партиция достаётся ровно одному члену группы. Чтобы поднять пропускную способность сверх числа партиций, нужно увеличивать число партиций, а не consumer'ов."
    tags: [parallelism, pitfall]
  - id: kafka-model-09
    front: "Как одно сообщение читают несколько групп?"
    back: "Внутри группы партиция достаётся одному consumer'у (очередь без дублей), а между группами - полный broadcast: каждая группа читает весь топик со своей закладкой. Так Kafka совмещает очередь задач и шину событий."
    tags: [consumer-group, broadcast]
  - id: kafka-model-10
    front: "По какому правилу Kafka удаляет старые записи?"
    back: "По политике retention - по времени (например, 7 дней) или по размеру лога, а не по факту чтения. Пока запись в пределах retention, её можно перечитать, сдвинув offset назад."
    tags: [retention]
