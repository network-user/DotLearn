conceptId: delivery-guarantees
cards:
  - id: delivery-guarantees-01
    front: "What does message delivery guarantee depend on?"
    back: "Order of two actions: ack (confirm receipt) and work (process). There is always a gap between them where failure can occur."
    tags: [guarantees, ack]
  - id: delivery-guarantees-02
    front: "What does ack-before-work order risk?"
    back: "Loss: if failure happens between ack and work, the broker already deleted the message and work was not done. That is at-most-once mode."
    tags: [at-most-once]
  - id: delivery-guarantees-03
    front: "What does work-before-ack order risk?"
    back: "Duplicate: if failure happens between work and ack, the broker retries though work is already done. That is at-least-once mode."
    tags: [at-least-once]
  - id: delivery-guarantees-04
    front: "What do at-most-once, at-least-once, and exactly-once mean?"
    back: "at-most-once - 0 or 1 delivery, loss possible without duplicates. at-least-once - 1 or more deliveries, duplicates without loss. exactly-once - exactly one effect, needs extra mechanics."
    tags: [guarantees]
  - id: delivery-guarantees-05
    front: "Why is honest exactly-once at delivery level unreachable?"
    back: "Ack can be lost on the network like the message. The producer does not know if delivery succeeded and faces the same retry-or-not choice. Extra confirmations can be lost too."
    tags: [exactly-once]
  - id: delivery-guarantees-06
    front: "At what level is exactly-once actually achieved?"
    back: "At effect level, not delivery. You may deliver several times (at-least-once) but apply effect exactly once - via consumer idempotency or a transaction tying processing and offset commit."
    tags: [exactly-once, effect]
  - id: delivery-guarantees-07
    front: "What is an idempotent operation?"
    back: "An operation with the same outcome on any number of retries. Set order status to paid is idempotent (assignment); add 100 to balance is not (accumulation)."
    tags: [idempotency]
  - id: delivery-guarantees-08
    front: "How do you neutralize retry of a non-idempotent operation?"
    back: "Deduplication: each message carries a unique id, consumer keeps processed ids and skips work on retry. Check, work, and mark must be one atomic transaction."
    tags: [deduplication, idempotency]
  - id: delivery-guarantees-09
    front: "Why is id deduplication not forever?"
    back: "Processed ids grow without bound, so ids are kept in a window (time or count). The window must cover maximum possible retry delay or a late duplicate is processed again."
    tags: [deduplication, window]
  - id: delivery-guarantees-10
    front: "Why is at-least-once not safe as is?"
    back: "It guarantees no loss, not no duplicates. A consumer that credits, adds, or sends email without retry protection will do it twice sooner or later."
    tags: [at-least-once, pitfall]
