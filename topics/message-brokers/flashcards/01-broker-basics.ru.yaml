conceptId: broker-basics
cards:
  - id: broker-basics-01
    front: "Что такое брокер сообщений?"
    back: "Посредник между producer и consumer: producer кладёт сообщение в брокер и сразу свободен, а consumer забирает его в своём темпе. Producer и consumer больше не знают друг о друге."
    tags: [broker, basics]
  - id: broker-basics-02
    front: "Что такое развязка (decoupling) сервисов через брокер?"
    back: "Producer публикует факт, не перечисляя получателей, а consumer не знает отправителя. Их связывает только формат сообщения - это их контракт. Нового получателя можно добавить, не меняя producer."
    tags: [decoupling]
  - id: broker-basics-03
    front: "Как брокер сглаживает пики нагрузки?"
    back: "Брокер принимает весь всплеск целиком и отдаёт consumer'у ровно столько, сколько тот успевает обработать. Цена - задержка: сообщения из пика обработаются по мере разгребания очереди."
    tags: [throughput]
  - id: broker-basics-04
    front: "Что даёт буферизация в брокере?"
    back: "Producer и consumer не обязаны быть живыми одновременно. Consumer можно остановить на деплой - producer всё это время пишет в брокер, а накопленные сообщения дождутся обновлённого consumer'а."
    tags: [buffer]
  - id: broker-basics-05
    front: "Что означает подтверждение «брокер принял сообщение»?"
    back: "Только то, что сообщение лежит в брокере и не потеряется. Это не значит, что кто-то его обработал. Обработка случится потом и, возможно, в другом сервисе."
    tags: [ack]
  - id: broker-basics-06
    front: "Почему через брокер нельзя получить синхронный ответ?"
    back: "Модель брокера принципиально однонаправленная (fire-and-forget). Если ответ нужен, его придётся вернуть отдельным сообщением в обратном направлении, с другой задержкой и логикой."
    tags: [fire-and-forget]
  - id: broker-basics-07
    front: "Может ли брокер компенсировать постоянно отстающего consumer'а?"
    back: "Нет. Брокер амортизирует временный всплеск, но если средняя скорость producer'а выше средней скорости consumer'а, очередь растёт без предела. Нужно ускорять consumer или добавлять их параллельно."
    tags: [backpressure]
  - id: broker-basics-08
    front: "Делает ли брокер обработку каждого сообщения быстрее?"
    back: "Нет, наоборот - добавляет сетевой хоп и задержку. Брокер делает систему устойчивее к пикам и отказам, а не быстрее. Это другое свойство."
    tags: [pitfall]
  - id: broker-basics-09
    front: "Чем «очередь задач» отличается от «шины событий»?"
    back: "Очередь задач (task queue) - одно сообщение одному воркеру для фоновой работы. Шина событий (event bus) - одно событие многим независимым подписчикам. Брокер - общая инфраструктура, а роль задаёт топология."
    tags: [terminology]
