conceptId: kafka-model
cards:
  - id: kafka-model-01
    front: "What is a Kafka topic at the data model level?"
    back: "A distributed append-only log split into partitions. New records are only appended at the end; nothing is inserted in the middle or deleted on read."
    tags: [log, model]
  - id: kafka-model-02
    front: "How does reading in Kafka differ from a RabbitMQ queue?"
    back: "The consumer does not take a message - it reads the log from where it stopped and moves its bookmark (offset). A read record stays in the log and is available to other readers."
    tags: [offset, log]
  - id: kafka-model-03
    front: "What is offset?"
    back: "Sequential record number inside a partition (0, 1, 2, ...) and the consumer's bookmark - position \"I read up to here\". The producer always appends with offset one more than the previous."
    tags: [offset]
  - id: kafka-model-04
    front: "Within what bounds does Kafka guarantee message order?"
    back: "Only inside one partition. There is no order between partitions. Partitions are the price of parallelism: you scale but lose global topic order."
    tags: [ordering, partition]
  - id: kafka-model-05
    front: "How does message key pick the partition?"
    back: "partition = hash(key) % partition_count. Same key always lands in one partition, giving guaranteed order for that key. key=null gives round-robin without order guarantee."
    tags: [key, partition]
  - id: kafka-model-06
    front: "What is partition skew?"
    back: "A key with few values (flag is_premium, popular country) piles almost all messages into one or two partitions. Parallel processing degrades to one overloaded consumer."
    tags: [skew, pitfall]
  - id: kafka-model-07
    front: "How does a consumer group assign partitions?"
    back: "Each partition is read by exactly one consumer in the group. Adding a consumer triggers rebalance and redistribution. Partition count is the group's parallelism ceiling."
    tags: [consumer-group, parallelism]
  - id: kafka-model-08
    front: "What if there are more consumers in a group than partitions?"
    back: "Extra consumers idle - a partition goes to exactly one group member. To raise throughput beyond partition count, increase partitions, not consumers."
    tags: [parallelism, pitfall]
  - id: kafka-model-09
    front: "How can one message be read by several groups?"
    back: "Inside a group a partition goes to one consumer (queue without duplicates); between groups full broadcast - each group reads the whole topic with its own bookmark. Kafka combines task queue and event bus."
    tags: [consumer-group, broadcast]
  - id: kafka-model-10
    front: "By what rule does Kafka delete old records?"
    back: "By retention policy - time (for example 7 days) or log size, not on read. While a record is within retention, you can reread it by moving offset back."
    tags: [retention]
