conceptId: rabbitmq-model
cards:
  - id: rabbitmq-model-01
    front: "Where does a producer send a message in RabbitMQ?"
    back: "To an exchange with a routing key attached, not directly to a queue. The producer does not know which queues exist; bindings on the broker decide the route."
    tags: [exchange, routing]
  - id: rabbitmq-model-02
    front: "What four building blocks make up the AMQP model in RabbitMQ?"
    back: "Exchange - intake and routing point (stores nothing); queue - named buffer, the only storage; binding - rule linking exchange and queue; routing key - label on the message."
    tags: [amqp, model]
  - id: rabbitmq-model-03
    front: "What is the smart broker, dumb consumer model?"
    back: "Routing logic lives on the server (exchange and bindings decide which queues get a message), while clients stay simple and work only with their queues."
    tags: [model]
  - id: rabbitmq-model-04
    front: "How do the four exchange types differ?"
    back: "direct - routing key equals binding key exactly; topic - pattern match with * (one word) and # (any number of words); fanout - copy to every queue, key ignored; headers - route by message headers."
    tags: [exchange]
  - id: rabbitmq-model-05
    front: "What happens if no binding matches a message?"
    back: "By default the message is silently dropped without error, and the producer thinks send succeeded. A common cause of lost messages - first check that a binding exists."
    tags: [pitfall, binding]
  - id: rabbitmq-model-06
    front: "What is manual ack and why is it needed?"
    back: "The message stays in the queue unacked until the consumer explicitly sends ack. Only then does the broker delete it. That gives at-least-once: on crash before ack the message returns to the queue."
    tags: [ack, reliability]
  - id: rabbitmq-model-07
    front: "Why is autoack dangerous?"
    back: "The broker deletes on delivery, before processing. Faster, but any consumer crash loses the message. Reserve autoack for optional streams like metrics."
    tags: [ack, pitfall]
  - id: rabbitmq-model-08
    front: "What does prefetch do?"
    back: "Limits unacked messages per consumer at once. prefetch=1 gives fair distribution of long tasks; a modest value like 10-50 improves throughput for short messages."
    tags: [prefetch, throughput]
  - id: rabbitmq-model-09
    front: "What does sending to a queue directly mean in RabbitMQ clients?"
    back: "Sugar: the message goes to the nameless default exchange with routing key equal to the queue name. In pure AMQP the producer always writes to an exchange."
    tags: [exchange]
  - id: rabbitmq-model-10
    front: "Why use a dead-letter exchange (DLX)?"
    back: "Messages rejected without requeue, with expired TTL, or from an overflowed queue go to a DLX and quarantine queue instead of vanishing. Basis for retry with delay and manual error handling."
    tags: [dlx, reliability]
