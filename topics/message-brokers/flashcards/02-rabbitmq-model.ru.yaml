conceptId: rabbitmq-model
cards:
  - id: rabbitmq-model-01
    front: "Куда producer в RabbitMQ отправляет сообщение?"
    back: "В exchange с приложенным routing key, а не в очередь напрямую. Producer вообще не знает, какие очереди существуют; маршрут решают bindings на стороне брокера."
    tags: [exchange, routing]
  - id: rabbitmq-model-02
    front: "Какие четыре кирпича составляют модель AMQP в RabbitMQ?"
    back: "Exchange - точка приёма и маршрутизации (ничего не хранит); queue - именованный буфер, единственное место хранения; binding - правило-связка exchange и queue; routing key - ярлык на сообщении."
    tags: [amqp, model]
  - id: rabbitmq-model-03
    front: "Что такое модель «smart broker, dumb consumer»?"
    back: "Логику маршрутизации держит сервер (exchange и bindings сами решают, в какие очереди класть сообщение), а клиенты остаются простыми и работают только со своими очередями."
    tags: [model]
  - id: rabbitmq-model-04
    front: "Чем различаются четыре типа exchange?"
    back: "direct - точное совпадение routing key с binding key; topic - совпадение по шаблону с * (одно слово) и # (любое число слов); fanout - копия во все queue, ключ игнорируется; headers - маршрут по заголовкам сообщения."
    tags: [exchange]
  - id: rabbitmq-model-05
    front: "Что происходит с сообщением, если ни один binding не совпал?"
    back: "Сообщение по умолчанию тихо отбрасывается без ошибки, а producer считает отправку успешной. Это частая причина «потери» сообщений - первым делом проверяйте, что binding существует."
    tags: [pitfall, binding]
  - id: rabbitmq-model-06
    front: "Что такое manual ack и зачем он нужен?"
    back: "Сообщение остаётся в очереди в состоянии unacked, пока consumer явно не пришлёт ack. Только тогда брокер его удаляет. Это даёт at-least-once: при падении до ack сообщение вернётся в очередь."
    tags: [ack, reliability]
  - id: rabbitmq-model-07
    front: "Чем опасен autoack?"
    back: "Брокер удаляет сообщение в момент доставки, ещё до обработки. Быстрее, но любое падение consumer'а означает потерю сообщения. Оставляйте autoack только для необязательных потоков вроде метрик."
    tags: [ack, pitfall]
  - id: rabbitmq-model-08
    front: "Что делает настройка prefetch?"
    back: "Ограничивает число одновременно неподтверждённых (unacked) сообщений у одного consumer'а. prefetch=1 даёт честное распределение долгих задач; небольшое значение 10-50 повышает пропускную способность для коротких сообщений."
    tags: [prefetch, throughput]
  - id: rabbitmq-model-09
    front: "Что значит «отправить в очередь напрямую» в клиентах RabbitMQ?"
    back: "Это сахар: сообщение уходит в безымянный default-exchange с routing key, равным имени очереди. В чистом AMQP producer всегда пишет в exchange."
    tags: [exchange]
  - id: rabbitmq-model-10
    front: "Зачем нужен dead-letter exchange (DLX)?"
    back: "Сообщения, отвергнутые без requeue, с истёкшим TTL или из переполненной очереди, перенаправляются в DLX и карантинную очередь вместо исчезновения. Это основа retry с задержкой и ручного разбора ошибок."
    tags: [dlx, reliability]
