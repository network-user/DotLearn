conceptId: broker-basics
cards:
  - id: broker-basics-01
    front: "What is a message broker?"
    back: "An intermediary between producer and consumer: the producer puts a message in the broker and is immediately free, and the consumer takes it at its own pace. Producer and consumer no longer know about each other."
    tags: [broker, basics]
  - id: broker-basics-02
    front: "What is service decoupling through a broker?"
    back: "The producer publishes a fact without listing recipients, and the consumer does not know the sender. They are linked only by message format - their contract. You can add a new recipient without changing the producer."
    tags: [decoupling]
  - id: broker-basics-03
    front: "How does a broker smooth load peaks?"
    back: "The broker accepts the whole spike and gives the consumer only what it can process. The price is delay: messages from the peak are processed as the queue is drained."
    tags: [throughput]
  - id: broker-basics-04
    front: "What does buffering in a broker provide?"
    back: "Producer and consumer need not be alive at the same time. You can stop the consumer for a deploy - the producer keeps writing to the broker, and accumulated messages wait for the updated consumer."
    tags: [buffer]
  - id: broker-basics-05
    front: "What does confirmation that the broker accepted a message mean?"
    back: "Only that the message is in the broker and will not be lost. It does not mean someone processed it. Processing happens later and possibly in another service."
    tags: [ack]
  - id: broker-basics-06
    front: "Why can't you get a synchronous reply through a broker?"
    back: "The broker model is fundamentally one-way (fire-and-forget). If you need a reply, it must come back as a separate message the other way, with different delay and logic."
    tags: [fire-and-forget]
  - id: broker-basics-07
    front: "Can a broker compensate for a permanently lagging consumer?"
    back: "No. A broker amortizes a temporary spike, but if average producer rate exceeds average consumer rate, the queue grows without limit. You need faster consumers or more in parallel."
    tags: [backpressure]
  - id: broker-basics-08
    front: "Does a broker make each message process faster?"
    back: "No - on the contrary, it adds a network hop and latency. A broker makes the system more resilient to peaks and failures, not faster. That is a different property."
    tags: [pitfall]
  - id: broker-basics-09
    front: "How does a task queue differ from an event bus?"
    back: "A task queue sends one message to one worker for background work. An event bus sends one event to many independent subscribers. The broker is shared infrastructure; topology defines the role."
    tags: [terminology]
