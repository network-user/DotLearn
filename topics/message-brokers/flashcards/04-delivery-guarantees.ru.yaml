conceptId: delivery-guarantees
cards:
  - id: delivery-guarantees-01
    front: "От чего зависит гарантия доставки сообщения?"
    back: "От порядка двух действий: ack (подтвердить получение) и работа (выполнить обработку). Между ними всегда есть зазор, в который может вклиниться сбой."
    tags: [guarantees, ack]
  - id: delivery-guarantees-02
    front: "Чем грозит порядок «ack раньше работы»?"
    back: "Риском потери: если сбой случится между ack и работой, брокер уже стёр сообщение, а работа не выполнена. Это режим at-most-once."
    tags: [at-most-once]
  - id: delivery-guarantees-03
    front: "Чем грозит порядок «работа раньше ack»?"
    back: "Риском дубля: если сбой случится между работой и ack, брокер не дождётся ack и пришлёт сообщение повторно, а работа уже сделана. Это режим at-least-once."
    tags: [at-least-once]
  - id: delivery-guarantees-04
    front: "Что означают at-most-once, at-least-once и exactly-once?"
    back: "at-most-once - 0 или 1 доставка, возможна потеря без дублей. at-least-once - 1 или более доставок, дубли без потерь. exactly-once - ровно один эффект, требует дополнительной механики."
    tags: [guarantees]
  - id: delivery-guarantees-05
    front: "Почему честная exactly-once на уровне доставки недостижима?"
    back: "ack может потеряться в сети так же, как сообщение. Producer не знает, дошло ли, и его выбор тот же: повторить (риск дубля) или нет (риск потери). Лишние подтверждения тоже могут потеряться."
    tags: [exactly-once]
  - id: delivery-guarantees-06
    front: "На каком уровне реально достигается exactly-once?"
    back: "На уровне эффекта, а не доставки. Доставлять можно несколько раз (at-least-once), но эффект применить ровно один раз - через идемпотентность consumer'а или транзакцию, атомарно связывающую обработку и коммит offset'а."
    tags: [exactly-once, effect]
  - id: delivery-guarantees-07
    front: "Что такое идемпотентная операция?"
    back: "Операция, дающая одинаковый итог при любом числе повторов. «Установить статус заказа в paid» идемпотентна (присвоение); «прибавить к балансу 100» - нет (накопление)."
    tags: [idempotency]
  - id: delivery-guarantees-08
    front: "Как обезвредить повтор неидемпотентной операции?"
    back: "Дедупликацией: каждое сообщение несёт уникальный id, consumer хранит множество обработанных id и при повторе пропускает работу. Проверка id, работа и пометка должны быть одной атомарной транзакцией."
    tags: [deduplication, idempotency]
  - id: delivery-guarantees-09
    front: "Почему дедупликация по id не вечна?"
    back: "Множество обработанных id растёт бесконечно, поэтому id хранят с окном (по времени или числу). Окно дедупликации должно перекрывать максимально возможную задержку повтора, иначе поздний дубль обработается снова."
    tags: [deduplication, window]
  - id: delivery-guarantees-10
    front: "Почему at-least-once нельзя считать безопасным «как есть»?"
    back: "Он гарантирует отсутствие потерь, но не отсутствие дублей. Consumer, который начисляет, прибавляет или шлёт письмо без защиты от повтора, рано или поздно сделает это дважды."
    tags: [at-least-once, pitfall]
