exercises:
  - id: pe-quiz-001
    concept: ports-and-env
    type: theory-quiz
    difficulty: 1
    prompt: "Что означает флаг -p 8080:80 при запуске контейнера?"
    choices:
      - id: a
        text: "Трафик с порта 8080 хоста направляется в порт 80 контейнера."
      - id: b
        text: "Трафик с порта 80 хоста направляется в порт 8080 контейнера."
      - id: c
        text: "Контейнер будет слушать сразу оба порта, 8080 и 80."
      - id: d
        text: "Порт 8080 внутри контейнера закрывается."
    correct: [a]
    explanation: "В паре -p ХОСТ:КОНТЕЙНЕР слева всегда порт хоста, справа порт контейнера. Значит, обращение к localhost:8080 попадёт в порт 80 внутри контейнера."
    hints:
      - "Запомните порядок: слева то, что снаружи, справа то, что внутри."
    variants:
      - prompt: "Что делает инструкция EXPOSE 80 в Dockerfile?"
        choices:
          - id: a
            text: "Только документирует, что приложение слушает порт 80; сам порт"
          - id: b
            text: "Публикует порт 80 наружу, как флаг -p."
          - id: c
            text: "Закрывает порт 80 внутри контейнера."
          - id: d
            text: "Заставляет контейнер слушать порт 80 вместо любого другого."
        correct: [a]
        explanation: "EXPOSE это лишь пометка в образе о том, какой порт слушает приложение. Реально пробрасывает порт наружу только флаг -p при запуске."
      - prompt: "Как передать контейнеру переменную окружения APP_ENV со значением production при запуске?"
        choices:
          - id: a
            text: "docker run -e APP_ENV=production myapp"
          - id: b
            text: "docker run -p APP_ENV=production myapp"
          - id: c
            text: "docker run --name APP_ENV=production myapp"
          - id: d
            text: "docker run APP_ENV=production myapp"
        correct: [a]
        explanation: "Флаг -e ИМЯ=значение задаёт переменную окружения при запуске. Флаг -p публикует порты, --name задаёт имя контейнера."

  - id: pe-blanks-001
    concept: ports-and-env
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите пропущенное: опубликовать порт 80 контейнера на порт 8080 хоста."
    template: |
      docker run -d -p {{mapping}} nginx
    blanks:
      mapping:
        accept: ['8080:80']
        accept_regex: '^8080:80$'
    explanation: "В паре ХОСТ:КОНТЕЙНЕР порт хоста 8080 стоит слева, порт контейнера 80 справа. Обращаться к сервису нужно будет по localhost:8080."
    hints:
      - "Формат пары это два числа через двоеточие: сначала порт хоста, потом порт контейнера."
      - "Хостовый порт по условию 8080, внутренний порт nginx по условию 80."
    variants:
      - prompt: "Впишите пропущенное: передать переменную окружения DEBUG со значением 0 при запуске."
        template: |
          docker run {{flag}} DEBUG=0 myapp
        blanks:
          flag:
            accept: ['-e', '--env']
            accept_regex: '^(-e|--env)$'
        explanation: "Флаг -e (или --env) задаёт переменную окружения в формате ИМЯ=значение при запуске контейнера."
      - prompt: "Впишите пропущенное в Dockerfile: задать значение переменной окружения APP_ENV по умолчанию."
        template: |
          {{env}} APP_ENV=development
        blanks:
          env:
            accept: ['ENV']
            accept_regex: '^ENV$'
        explanation: "Инструкция ENV запекает значение переменной в образ как умолчание. При запуске его можно перекрыть флагом -e."

  - id: pe-predict-001
    concept: ports-and-env
    type: predict-output
    difficulty: 2
    prompt: "Образ собран из показанного Dockerfile. Что напечатает контейнер?"
    fixture: |
      Dockerfile:
        FROM alpine
        ENV GREETING=Привет
        CMD echo "$GREETING, мир"
      Образ собран: docker build -t app .
    snippet: |
      docker run app
    expected:
      kind: stdout
      value: "Привет, мир"
    explanation: "Переменная GREETING получила значение Привет из инструкции ENV. Флаг -e не задан, поэтому используется умолчание, и контейнер печатает «Привет, мир»."
    hints:
      - "Найдите, откуда переменная GREETING берёт значение, если -e при запуске не указан."
      - "ENV задаёт значение по умолчанию, а команда просто подставляет его в строку."
    variants:
      - prompt: "Что напечатает контейнер для того же образа app?"
        fixture: |
          Dockerfile:
            FROM alpine
            ENV GREETING=Привет
            CMD echo "$GREETING, мир"
          Образ собран: docker build -t app .
        snippet: |
          docker run -e GREETING=Здравствуй app
        expected:
          kind: stdout
          value: "Здравствуй, мир"
        explanation: "Флаг -e при запуске перекрывает значение из ENV. GREETING становится Здравствуй, поэтому контейнер печатает «Здравствуй, мир»."
      - prompt: "Что напечатает контейнер для того же образа app?"
        fixture: |
          Dockerfile:
            FROM alpine
            ENV GREETING=Привет
            CMD echo "$GREETING, мир"
          Образ собран: docker build -t app .
        snippet: |
          docker run -e GREETING=Хай app
        expected:
          kind: stdout
          value: "Хай, мир"
        explanation: "Значение из -e перекрывает ENV: GREETING становится Хай, и контейнер печатает «Хай, мир»."

  - id: pe-quiz-002
    concept: ports-and-env
    type: theory-quiz
    difficulty: 3
    prompt: "В Dockerfile есть строка EXPOSE 5000, приложение слушает порт 5000. Контейнер запущен как docker run -d myapp, но на localhost:5000 сервис недоступен. В чём причина и как починить?"
    choices:
      - id: a
        text: "EXPOSE только документирует порт; нужно опубликовать его при запуске"
      - id: b
        text: "Нужно добавить в Dockerfile вторую строку EXPOSE 5000."
      - id: c
        text: "Приложение слушает не тот порт, надо поменять его на 80."
      - id: d
        text: "Контейнер вообще не запустился, потому что порт не указан."
    correct: [a]
    explanation: "EXPOSE лишь помечает порт в образе и наружу его не открывает. Публикует порт только флаг -p при запуске. Поэтому нужно запустить контейнер с -p 5000:5000, и сервис станет доступен на localhost:5000."
    hints:
      - "Вспомните, что именно делает EXPOSE, а что делает флаг -p."
      - "Проверьте, есть ли при запуске публикация порта, а не только пометка в Dockerfile."
