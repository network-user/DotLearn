exercises:
  - id: img-quiz-001
    concept: images-and-containers
    type: theory-quiz
    difficulty: 1
    prompt: "Как соотносятся образ и контейнер?"
    choices:
      - id: a
        text: "Образ это неизменяемый шаблон, контейнер это его запущенный экземпляр."
      - id: b
        text: "Контейнер это шаблон, из которого собирают образы."
      - id: c
        text: "Образ и контейнер это два слова для одной и той же сущности."
      - id: d
        text: "Образ это работающий процесс, контейнер это файл на диске."
    correct: [a]
    explanation: "Образ это шаблон из слоёв только для чтения, он существует и без запуска. Контейнер это запущенный экземпляр образа со своим изменяемым состоянием. Один образ порождает много контейнеров."
    hints:
      - "Сравните с парой «класс и объект» или «рецепт и блюдо»: что из них шаблон, а что экземпляр."
    variants:
      - prompt: "Из одного образа nginx запустили три контейнера. Сколько образов и сколько контейнеров теперь на машине?"
        choices:
          - id: a
            text: "Один образ и три контейнера."
          - id: b
            text: "Три образа и три контейнера."
          - id: c
            text: "Один образ и один контейнер."
          - id: d
            text: "Три образа и один контейнер."
        correct: [a]
        explanation: "Образ один и общий, а каждый запуск создаёт отдельный контейнер со своим записываемым слоем. Отсюда один образ и три независимых контейнера."
      - prompt: "Какая команда покажет запущенные контейнеры, а не образы?"
        choices:
          - id: a
            text: "docker ps"
          - id: b
            text: "docker images"
          - id: c
            text: "docker build"
          - id: d
            text: "docker pull"
        correct: [a]
        explanation: "docker ps перечисляет запущенные контейнеры (процессы), docker images перечисляет образы (шаблоны). build собирает образ, pull его скачивает."

  - id: img-blanks-001
    concept: images-and-containers
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите команды для просмотра образов и контейнеров."
    template: |
      Список образов на машине: docker {{img}}
      Список запущенных контейнеров: docker {{ps}}
    blanks:
      img:
        accept: ['images', 'image ls']
        accept_regex: '^(images|image ls)$'
      ps:
        accept: ['ps']
        accept_regex: '^ps$'
    explanation: "docker images (или docker image ls) показывает шаблоны, docker ps показывает то, что сейчас запущено."
    hints:
      - "Одна команда про то, из чего запускаться, другая про то, что уже запущено."
      - "Имя одной команды буквально про образы, вторая про процессы (process status)."
    variants:
      - prompt: "Впишите команды удаления. Помните, что контейнер и образ удаляются разными командами."
        template: |
          Удалить остановленный контейнер: docker {{rmc}} web-1
          Удалить образ: docker {{rmi}} nginx
        blanks:
          rmc:
            accept: ['rm']
            accept_regex: '^rm$'
          rmi:
            accept: ['rmi', 'image rm']
            accept_regex: '^(rmi|image rm)$'
        explanation: "docker rm убирает контейнер, docker rmi (или docker image rm) убирает образ. Это операции над разными сущностями."
      - prompt: "Впишите пропущенное: скачать образ и показать все контейнеры, включая остановленные."
        template: |
          Скачать образ из реестра: docker {{pull}} nginx
          Показать все контейнеры, включая остановленные: docker ps {{all}}
        blanks:
          pull:
            accept: ['pull']
            accept_regex: '^pull$'
          all:
            accept: ['-a', '--all']
            accept_regex: '^(-a|--all)$'
        explanation: "docker pull забирает образ из реестра. Без флага docker ps показывает только работающие контейнеры, а ключ -a добавляет и остановленные."

  - id: img-predict-001
    concept: images-and-containers
    type: predict-output
    difficulty: 2
    prompt: "Каждая команда docker run создаёт новый контейнер из образа. Сколько отдельных записываемых слоёв создаст эта последовательность?"
    fixture: |
      На машине один образ nginx (слои только для чтения).
    snippet: |
      docker run -d nginx
      docker run -d nginx
      docker run -d nginx
    expected:
      kind: scalar
      value: 3
    explanation: "Слои образа общие и не меняются. Каждый docker run поднимает отдельный контейнер и заводит для него один записываемый слой. Три запуска дают три записываемых слоя."
    hints:
      - "Сколько раз вызван docker run, столько и создано контейнеров."
      - "У каждого контейнера ровно один свой записываемый слой поверх общих слоёв образа."
    variants:
      - prompt: "Сколько записываемых слоёв создаст эта последовательность?"
        fixture: |
          На машине один образ python:3.12.
        snippet: |
          docker run -d python:3.12
        expected:
          kind: scalar
          value: 1
        explanation: "Один docker run это один контейнер и один его записываемый слой."
      - prompt: "Сколько записываемых слоёв создаст эта последовательность?"
        fixture: |
          На машине один образ redis.
        snippet: |
          docker run -d redis
          docker run -d redis
          docker run -d redis
          docker run -d redis
          docker run -d redis
        expected:
          kind: scalar
          value: 5
        explanation: "Пять запусков это пять контейнеров, каждому заводится собственный записываемый слой, итого пять."

  - id: img-quiz-002
    concept: images-and-containers
    type: theory-quiz
    difficulty: 3
    prompt: "Разработчик зашёл в работающий контейнер, поправил конфиг, всё заработало. Через день контейнер пересоздали из того же образа, и правка пропала. Почему?"
    choices:
      - id: a
        text: "Правка легла в записываемый слой контейнера."
      - id: b
        text: "Docker откатил образ к предыдущей версии."
      - id: c
        text: "Правка сохранилась в образе, но новый контейнер её не подхватил."
      - id: d
        text: "Изменения в контейнере автоматически стираются раз в сутки."
    correct: [a]
    explanation: "Изменения внутри контейнера идут в его записываемый слой. Удалили контейнер, исчез и слой, а образ всё это время оставался неизменным. Чтобы правка попала в образ, её кладут в Dockerfile и пересобирают; чтобы пережила контейнер, выносят в том."
    hints:
      - "Куда именно попадают изменения, сделанные внутри работающего контейнера."
      - "Что происходит с записываемым слоем в момент удаления контейнера."
