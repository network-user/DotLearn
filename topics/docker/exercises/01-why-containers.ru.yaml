exercises:
  - id: why-quiz-001
    concept: why-containers
    type: theory-quiz
    difficulty: 1
    prompt: "Чем контейнер принципиально отличается от виртуальной машины?"
    choices:
      - id: a
        text: "Контейнер использует общее ядро хоста, а виртуальная машина несёт своё гостевое ядро."
      - id: b
        text: "Контейнер поднимает собственную операционную систему, а виртуальная машина нет."
      - id: c
        text: "Контейнер всегда медленнее стартует, чем виртуальная машина."
      - id: d
        text: "Между ними нет разницы, это два названия одного и того же."
    correct: [a]
    explanation: "Контейнер это изолированный процесс на ядре хоста, поэтому он лёгкий и стартует мгновенно. Виртуальная машина несёт полную гостевую ОС со своим ядром, отсюда её вес и медленный старт."
    hints:
      - "Вспомните рисунок со стопками: что лежит под приложением в каждом из двух случаев."
    variants:
      - prompt: "Почему контейнер стартует за доли секунды, а виртуальная машина за десятки?"
        choices:
          - id: a
            text: "Контейнер это процесс, ему не нужно загружать целую операционную систему."
          - id: b
            text: "Контейнер заранее держит свою ОС загруженной в памяти хоста."
          - id: c
            text: "Виртуальная машина специально замедлена ради безопасности."
          - id: d
            text: "Скорость старта у них одинаковая, разница только в весе."
        correct: [a]
        explanation: "Запустить процесс быстрее, чем поднять гостевую ОС с ядром, драйверами и службами. Именно поэтому контейнер готов почти мгновенно."
      - prompt: "В каком случае виртуальная машина предпочтительнее контейнера?"
        choices:
          - id: a
            text: "Когда на одном железе соседствуют взаимно недоверчивые арендаторы и нужна прочная граница изоляции."
          - id: b
            text: "Когда нужно запустить как можно больше экземпляров на одной машине."
          - id: c
            text: "Когда важен максимально быстрый старт."
          - id: d
            text: "Когда приложение должно весить как можно меньше."
        correct: [a]
        explanation: "У виртуальной машины своё ядро, поэтому граница между арендаторами прочнее. Скорость, плотность и лёгкость, наоборот, сильные стороны контейнера."

  - id: why-blanks-001
    concept: why-containers
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите механизмы ядра Linux, на которых держится изоляция контейнера."
    template: |
      Что процесс видит, ограничивает механизм {{visibility}}.
      Сколько ресурсов процесс потребляет, ограничивает механизм {{resources}}.
    blanks:
      visibility:
        accept: ['namespaces', 'namespace', 'неймспейсы']
        accept_regex: '^namespaces?$'
      resources:
        accept: ['cgroups', 'cgroup', 'control groups']
        accept_regex: '^cgroups?$'
    explanation: "Namespaces дают процессу урезанную картину мира (свои процессы, файловая система, сеть), а cgroups ограничивают потребление памяти и процессора. Вместе они и образуют контейнер."
    hints:
      - "Речь о двух разных задачах: одна про то, что процесс видит, другая про то, сколько он берёт."
      - "Оба слова пришли из ядра Linux и обычно пишутся по-английски."
    variants:
      - prompt: "Впишите пропущенные слова о том, что лежит под контейнером и виртуальной машиной."
        template: |
          Контейнер использует {{shared}} ядро хоста.
          Виртуальная машина несёт {{own}} гостевое ядро.
        blanks:
          shared:
            accept: ['общее', 'одно общее', 'разделяемое']
            accept_regex: '^(одно\s+)?общее$|^разделяемое$'
          own:
            accept: ['своё', 'собственное', 'своё собственное']
            accept_regex: '^(своё|собственное|своё собственное)$'
        explanation: "Ключевое различие: контейнеры делят одно ядро хоста, а каждая виртуальная машина поднимает собственное."
      - prompt: "Впишите пропущенные слова о жизненном цикле контейнера."
        template: |
          Контейнеры считаются {{disposable}}: их пересоздают часто.
          Данные, которые должны это пережить, выносят в {{storage}}.
        blanks:
          disposable:
            accept: ['одноразовыми', 'одноразовые', 'эфемерными']
            accept_regex: '^(одноразовыми|одноразовые|эфемерными)$'
          storage:
            accept: ['тома', 'том', 'тома (volumes)', 'volumes']
            accept_regex: '^(тома?|volumes?)( \(volumes\))?$'
        explanation: "Контейнер одноразовый: при удалении исчезает его записываемый слой. Всё ценное держат в томах, которые живут отдельно от контейнера."

  - id: why-quiz-002
    concept: why-containers
    type: theory-quiz
    difficulty: 3
    prompt: "Разработчик хочет запустить на своей рабочей станции сразу 50 экземпляров одного веб-сервиса для нагрузочного теста. Что здесь весомый аргумент в пользу контейнеров?"
    choices:
      - id: a
        text: "Контейнеры делят ядро хоста и весят мегабайты, поэтому 50 штук реально помещаются на одной машине."
      - id: b
        text: "Контейнеры дают более прочную изоляцию, чем виртуальные машины."
      - id: c
        text: "Каждый контейнер поднимет свою гостевую ОС и не будет мешать соседям."
      - id: d
        text: "Контейнеры автоматически сохраняют все свои данные при удалении."
    correct: [a]
    explanation: "Плотность и лёгкость это главный практический выигрыш контейнеров: без своей ОС на каждый экземпляр их помещается на порядки больше. Прочная изоляция, наоборот, конёк виртуальных машин, отдельной ОС у контейнера нет, а данные при удалении теряются."
    hints:
      - "Задача про количество экземпляров на одной машине, а не про безопасность."
      - "Подумайте, что несёт каждый экземпляр в случае VM и чего у контейнера нет."

  - id: why-quiz-003
    concept: why-containers
    type: theory-quiz
    difficulty: 3
    prompt: "На ноутбуке с macOS вы запускаете Linux-контейнер, и он работает. Как это возможно, если у контейнера нет своего ядра?"
    choices:
      - id: a
        text: "Docker незаметно поднимает лёгкую Linux-виртуалку и запускает контейнеры уже внутри неё."
      - id: b
        text: "Контейнер на macOS использует ядро macOS напрямую."
      - id: c
        text: "Docker переписывает Linux-приложение под ядро macOS при запуске."
      - id: d
        text: "Linux-контейнеры вообще не запускаются на macOS."
    correct: [a]
    explanation: "Контейнер делит ядро хоста, а Linux-приложению нужно именно ядро Linux. Поэтому на macOS и Windows Docker держит скрытую Linux-виртуалку и запускает контейнеры в ней. Ядро macOS для Linux-программ не подходит, а переписывания кода не происходит."
    hints:
      - "Раз контейнеру нужно ядро Linux, откуда оно берётся на машине без ядра Linux."
      - "Ответ связан с тем самым механизмом, у которого своё ядро есть."
