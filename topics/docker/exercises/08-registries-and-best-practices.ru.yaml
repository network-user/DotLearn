exercises:
  - id: rbp-quiz-001
    concept: registries-and-best-practices
    type: theory-quiz
    difficulty: 1
    prompt: "Что такое реестр образов (registry)?"
    choices:
      - id: a
        text: "Удалённый склад образов, откуда их забирают через pull и куда публикуют через push."
      - id: b
        text: "Локальный каталог с Dockerfile."
      - id: c
        text: "Список запущенных контейнеров на машине."
      - id: d
        text: "Файл настроек Docker на хосте."
    correct: [a]
    explanation: "Реестр это удалённое хранилище образов. docker pull забирает образ на машину, docker push отправляет ваш образ в реестр. Публичный реестр по умолчанию это Docker Hub."
    hints:
      - "Откуда берётся образ nginx, если вы его никогда не собирали."
    variants:
      - prompt: "Как читается полное имя образа nginx:1.27?"
        choices:
          - id: a
            text: "Репозиторий nginx с тегом версии 1.27."
          - id: b
            text: "Два разных образа: nginx и 1.27."
          - id: c
            text: "Контейнер по имени nginx на порту 1.27."
          - id: d
            text: "Образ nginx, собранный 1.27 раз."
        correct: [a]
        explanation: "Имя образа читается как репозиторий:тег. Здесь репозиторий nginx, а тег 1.27 это метка конкретной версии внутри репозитория."
      - prompt: "Какая команда забирает образ из реестра на локальную машину?"
        choices:
          - id: a
            text: "docker pull"
          - id: b
            text: "docker push"
          - id: c
            text: "docker build"
          - id: d
            text: "docker commit"
        correct: [a]
        explanation: "docker pull скачивает образ из реестра, docker push публикует ваш образ в реестр. build собирает образ локально из Dockerfile."

  - id: rbp-blanks-001
    concept: registries-and-best-practices
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите пропущенное в multi-stage сборке: скопировать готовый бинарник из стадии build."
    template: |
      FROM golang:1.22 AS build
      WORKDIR /src
      COPY . .
      RUN go build -o app

      FROM alpine:3.20
      COPY {{copyfrom}} /src/app /app
      CMD ["/app"]
    blanks:
      copyfrom:
        accept: ['--from=build']
        accept_regex: '^--from=build$'
    explanation: "COPY --from=build берёт файл из предыдущей стадии по её имени. Компилятор Go остаётся в стадии build и в финальный образ на базе alpine не попадает."
    hints:
      - "Нужно указать, из какой стадии брать файл, а стадия названа через AS."
      - "Флаг копирования из стадии пишется как --from= и имя стадии."
    variants:
      - prompt: "Впишите инструкцию: переключить контейнер на непривилегированного пользователя app."
        template: |
          FROM node:20-alpine
          WORKDIR /app
          COPY . .
          RUN adduser -D app
          {{user}} app
          CMD ["node", "server.js"]
        blanks:
          user:
            accept: ['USER']
            accept_regex: '^USER$'
        explanation: "Инструкция USER переключает последующие команды и запуск контейнера на указанного пользователя. Так приложение работает не от root, с минимальными правами."
      - prompt: "Впишите команды: дать образу тег версии и отправить его в реестр."
        template: |
          docker {{tag}} myapp myapp:1.0
          docker {{push}} myapp:1.0
        blanks:
          tag:
            accept: ['tag']
            accept_regex: '^tag$'
          push:
            accept: ['push']
            accept_regex: '^push$'
        explanation: "docker tag присваивает образу новую метку версии, docker push публикует именно этот тег в реестр. Каждый тег публикуется отдельно."

  - id: rbp-quiz-002
    concept: registries-and-best-practices
    type: theory-quiz
    difficulty: 2
    prompt: "Почему в бою не стоит полагаться на тег latest?"
    choices:
      - id: a
        text: "latest это просто имя тега по умолчанию, а не гарантия свежей версии; он может указывать на устаревший образ."
      - id: b
        text: "Тег latest всегда скачивает самую новую версию, и это опасно своей непредсказуемостью."
      - id: c
        text: "Docker запрещает использовать latest в реестрах."
      - id: d
        text: "latest работает только на Docker Hub и нигде больше."
    correct: [a]
    explanation: "latest это лишь тег по умолчанию, который Docker подставляет без явного тега. Он указывает на тот образ, которому эту метку присвоили, и вполне может быть устаревшим. Для предсказуемости фиксируют конкретный тег версии."
    hints:
      - "Что физически означает тег latest: гарантию свежести или просто имя по умолчанию."
      - "На какой образ указывает latest, если его давно не переназначали."
    variants:
      - prompt: "Почему минимальный базовый образ (slim или alpine) обычно предпочтительнее полного?"
        choices:
          - id: a
            text: "Он меньше по размеру, быстрее скачивается и содержит меньше уязвимостей."
          - id: b
            text: "Он всегда работает быстрее любого полного образа во время выполнения."
          - id: c
            text: "Полные образы вообще нельзя публиковать в реестр."
          - id: d
            text: "Минимальный образ автоматически запускает приложение не от root."
        correct: [a]
        explanation: "Минимальная база несёт меньше лишних системных инструментов: образ легче, быстрее качается и имеет меньшую поверхность атаки. На скорость самого приложения база напрямую не влияет."
      - prompt: "Зачем в проект добавляют файл .dockerignore?"
        choices:
          - id: a
            text: "Чтобы лишнее (node_modules, .git, .env) не уходило в контекст сборки и не попадало в образ."
          - id: b
            text: "Чтобы Docker игнорировал ошибки в Dockerfile."
          - id: c
            text: "Чтобы ускорить запуск уже собранного контейнера."
          - id: d
            text: "Чтобы задать переменные окружения контейнера."
        correct: [a]
        explanation: ".dockerignore исключает ненужные файлы из контекста сборки ещё до отправки демону. Это ускоряет сборку и не даёт мусору и секретам попасть в образ."

  - id: rbp-quiz-003
    concept: registries-and-best-practices
    type: theory-quiz
    difficulty: 3
    prompt: "Образ на Go весит почти гигабайт, хотя само приложение это один небольшой бинарник. Разработчик добавил в конец Dockerfile строку RUN rm -rf /usr/local/go, но образ не похудел. Как правильно уменьшить его?"
    choices:
      - id: a
        text: "Собрать через multi-stage: компилятор в стадии сборки, а в финальный образ на лёгкой базе скопировать только бинарник."
      - id: b
        text: "Добавить ещё несколько RUN rm в конце, чтобы удалить больше файлов."
      - id: c
        text: "Поменять тег образа на latest."
      - id: d
        text: "Опубликовать образ в приватный реестр, там он сожмётся."
    correct: [a]
    explanation: "Удаление в позднем слое не трогает более ранние, поэтому компилятор остаётся в истории образа и вес не падает. Multi-stage решает это в корне: тяжёлые инструменты живут в стадии сборки, а в финальный образ попадает только готовый бинарник."
    hints:
      - "Вспомните, уменьшает ли образ удаление файла в позднем слое."
      - "Как сделать так, чтобы компилятор вообще не попал в финальный образ, а не удалять его после."

  - id: rbp-predict-001
    concept: registries-and-best-practices
    type: predict-output
    difficulty: 3
    prompt: "В каталоге сборки лежат пять записей: src/, package.json, node_modules/, .git/ и .env. Показанный .dockerignore исключает часть из них. Сколько записей попадёт в контекст сборки?"
    fixture: |
      Каталог сборки содержит: src/, package.json, node_modules/, .git/, .env
    snippet: |
      node_modules/
      .git/
      .env
    expected:
      kind: scalar
      value: 2
    explanation: ".dockerignore исключает node_modules/, .git/ и .env, поэтому из пяти записей в контекст попадают только src/ и package.json, итого две."
    hints:
      - "Каждая строка .dockerignore это то, что НЕ попадёт в контекст."
      - "Вычтите исключённые записи из общего списка каталога."
    variants:
      - prompt: "Тот же каталог из пяти записей: src/, package.json, node_modules/, .git/, .env. Сколько записей попадёт в контекст сборки с этим .dockerignore?"
        fixture: |
          Каталог сборки содержит: src/, package.json, node_modules/, .git/, .env
        snippet: |
          .git/
        expected:
          kind: scalar
          value: 4
        explanation: "Исключён только .git/. Остальные четыре записи (src/, package.json, node_modules/, .env) попадают в контекст сборки."
      - prompt: "Тот же каталог из пяти записей. Сколько записей попадёт в контекст сборки с этим .dockerignore?"
        fixture: |
          Каталог сборки содержит: src/, package.json, node_modules/, .git/, .env
        snippet: |
          node_modules/
          .git/
          .env
          package.json
        expected:
          kind: scalar
          value: 1
        explanation: "Исключены четыре записи, поэтому в контекст попадает только src/, итого одна."
