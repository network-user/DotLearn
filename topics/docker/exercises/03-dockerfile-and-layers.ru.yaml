exercises:
  - id: df-quiz-001
    concept: dockerfile-and-layers
    type: theory-quiz
    difficulty: 1
    prompt: "Чем отличается инструкция RUN от инструкции CMD в Dockerfile?"
    choices:
      - id: a
        text: "RUN выполняется во время сборки образа, CMD задаёт команду."
      - id: b
        text: "RUN запускает контейнер, CMD собирает образ."
      - id: c
        text: "Это два названия одной и той же инструкции."
      - id: d
        text: "RUN и CMD обе выполняются только при старте контейнера."
    correct: [a]
    explanation: "RUN выполняет команду при сборке, и её результат запекается в слой образа. CMD ничего не делает при сборке, он лишь записывает команду запуска для будущего контейнера."
    hints:
      - "Одна инструкция срабатывает один раз при сборке, другая при каждом старте контейнера."
    variants:
      - prompt: "Какая инструкция Dockerfile задаёт базовый образ, с которого начинается сборка?"
        choices:
          - id: a
            text: "FROM"
          - id: b
            text: "BASE"
          - id: c
            text: "IMPORT"
          - id: d
            text: "WORKDIR"
        correct: [a]
        explanation: "FROM указывает базовый образ, фундамент вашего. WORKDIR лишь задаёт рабочий каталог, а инструкций BASE и IMPORT в Dockerfile нет."
      - prompt: "Что верно про слои образа?"
        choices:
          - id: a
            text: "Почти каждая инструкция Dockerfile добавляет новый слой поверх"
          - id: b
            text: "Весь образ это всегда ровно один слой."
          - id: c
            text: "Слои создаёт только инструкция FROM."
          - id: d
            text: "Слои появляются лишь при запуске контейнера, а не при сборке."
        correct: [a]
        explanation: "Docker выполняет инструкции сверху вниз, и почти каждая (FROM, COPY, RUN и другие) оставляет после себя слой файловой системы."

  - id: df-blanks-001
    concept: dockerfile-and-layers
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите инструкции так, чтобы установка зависимостей кэшировалась, а правка кода собиралась быстро."
    template: |
      FROM python:3.12-slim
      WORKDIR /app
      {{copy_reqs}} requirements.txt .
      {{run}} pip install -r requirements.txt
      COPY . .
      {{cmd}} ["python", "app.py"]
    blanks:
      copy_reqs:
        accept: ['COPY']
        accept_regex: '^COPY$'
      run:
        accept: ['RUN']
        accept_regex: '^RUN$'
      cmd:
        accept: ['CMD']
        accept_regex: '^CMD$'
    explanation: "Манифест зависимостей копируют и ставят рано (COPY requirements.txt, затем RUN pip install), чтобы этот тяжёлый слой брался из кэша. Установку выполняет RUN, а команду запуска задаёт CMD."
    hints:
      - "Копирование файла это одна инструкция, выполнение команды при сборке другая, команда запуска третья."
      - "Все три пишутся заглавными буквами: одна начинается на C, одна на R, одна снова на C."
    variants:
      - prompt: "Впишите инструкции: задать базовый образ, рабочий каталог и открыть порт, который слушает приложение."
        template: |
          {{from}} nginx:1.27
          {{workdir}} /usr/share/nginx/html
          {{expose}} 80
        blanks:
          from:
            accept: ['FROM']
            accept_regex: '^FROM$'
          workdir:
            accept: ['WORKDIR']
            accept_regex: '^WORKDIR$'
          expose:
            accept: ['EXPOSE']
            accept_regex: '^EXPOSE$'
        explanation: "FROM задаёт базовый образ, WORKDIR рабочий каталог, EXPOSE документирует порт, который слушает приложение внутри контейнера."
      - prompt: "Впишите пропущенное так, чтобы обновление списка пакетов и установка попали в один слой."
        template: |
          RUN apt-get update {{op}} apt-get install -y curl
        blanks:
          op:
            accept: ['&&']
            accept_regex: '^&&$'
        explanation: "Оператор && соединяет обновление списка и установку в одну инструкцию RUN, то есть в один слой. Иначе install может пойти по устаревшему списку из кэша."

  - id: df-predict-001
    concept: dockerfile-and-layers
    type: predict-output
    difficulty: 3
    prompt: "В этом Dockerfile изменили только файл server.js (исходный код). Сколько инструкций, создающих слой (WORKDIR, COPY, RUN), будут выполнены заново, а не взяты из кэша?"
    fixture: |
      Меняется только исходный код (server.js), который попадает в образ через COPY . .
    snippet: |
      FROM node:20-alpine
      WORKDIR /app
      COPY package.json .
      RUN npm install
      COPY . .
      CMD ["node", "server.js"]
    expected:
      kind: scalar
      value: 1
    explanation: "Первый изменившийся слой это COPY . ., потому что server.js попадает именно туда. Все слои выше (FROM, WORKDIR, COPY package.json, RUN npm install) не затронуты и берутся из кэша. Заново выполняется одна создающая слой инструкция: COPY . ."
    hints:
      - "Найдите первую инструкцию, на которую влияет изменившийся файл, и посмотрите, что идёт после неё."
      - "Изменение обесценивает только свой слой и все нижележащие; верхние остаются в кэше."

  - id: df-quiz-002
    concept: dockerfile-and-layers
    type: theory-quiz
    difficulty: 3
    prompt: "Почему COPY requirements.txt и установку зависимостей ставят до COPY . ., а не после?"
    choices:
      - id: a
        text: "Тогда частые правки кода не обесценивают слой установки пакетов, и"
      - id: b
        text: "Иначе Docker не сможет найти файл requirements.txt."
      - id: c
        text: "Порядок инструкций в Dockerfile ни на что не влияет."
      - id: d
        text: "Так образ получается меньше по размеру."
    correct: [a]
    explanation: "Изменение слоя обесценивает его и все нижележащие. Если код (COPY . .) стоит ниже установки пакетов, то правка кода не трогает слой RUN pip install, и он остаётся в кэше. Поставь код выше, и установка пересобиралась бы при каждой правке."
    hints:
      - "Что происходит с кэшем слоёв, которые стоят ниже изменившегося."
      - "Что меняется чаще: список зависимостей или исходный код."

  - id: df-predict-002
    concept: dockerfile-and-layers
    type: predict-output
    difficulty: 4
    prompt: "В этом Dockerfile изменили только файл package.json (добавили зависимость). Сколько инструкций, создающих слой (WORKDIR, COPY, RUN), будут выполнены заново, а не взяты из кэша?"
    fixture: |
      Меняется файл package.json, который копируется инструкцией COPY package.json .
    snippet: |
      FROM node:20-alpine
      WORKDIR /app
      COPY package.json .
      RUN npm install
      COPY . .
      CMD ["node", "server.js"]
    expected:
      kind: scalar
      value: 3
    explanation: "Первый затронутый слой это COPY package.json (его содержимое изменилось). Кэш сбрасывается на нём и на всех, что ниже: COPY package.json, RUN npm install и COPY . . выполняются заново, то есть три создающие слой инструкции. FROM и WORKDIR остаются в кэше."
    hints:
      - "Определите первую инструкцию, на которую влияет изменившийся файл package.json."
      - "Кэш сбрасывается на этом слое и на всех нижележащих: сосчитайте их до конца рецепта."
      - "Инструкция CMD не создаёт слой файловой системы, поэтому в счёт не идёт."
    variants:
      - prompt: "Теперь изменили только текст инструкции RUN (например, npm install заменили на npm ci). Сколько создающих слой инструкций выполнятся заново?"
        fixture: |
          Меняется сама инструкция RUN, файлы не трогали.
        snippet: |
          FROM node:20-alpine
          WORKDIR /app
          COPY package.json .
          RUN npm ci
          COPY . .
          CMD ["node", "server.js"]
        expected:
          kind: scalar
          value: 2
        explanation: "Первый изменившийся слой это RUN (его команда стала другой). Кэш сбрасывается на нём и на COPY . . ниже, итого две создающие слой инструкции. FROM, WORKDIR и COPY package.json остаются в кэше."
