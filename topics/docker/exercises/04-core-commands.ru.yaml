exercises:
  - id: cmd-quiz-001
    concept: core-commands
    type: theory-quiz
    difficulty: 1
    prompt: "Какая команда запускает контейнер из образа?"
    choices:
      - id: a
        text: "docker run"
      - id: b
        text: "docker build"
      - id: c
        text: "docker ps"
      - id: d
        text: "docker logs"
    correct: [a]
    explanation: "docker run создаёт контейнер из образа и стартует его главный процесс. build собирает образ, ps показывает список контейнеров, logs печатает вывод."
    hints:
      - "Одна команда собирает образ, другая из него запускает контейнер."
    variants:
      - prompt: "Какая команда соберёт образ из Dockerfile и даст ему имя hello?"
        choices:
          - id: a
            text: "docker build -t hello ."
          - id: b
            text: "docker run -t hello ."
          - id: c
            text: "docker images hello"
          - id: d
            text: "docker exec hello"
        correct: [a]
        explanation: "docker build собирает образ, флаг -t задаёт имя (тег), а точка указывает каталог сборки."
      - prompt: "Какая команда печатает то, что контейнер вывел в стандартный вывод?"
        choices:
          - id: a
            text: "docker logs"
          - id: b
            text: "docker exec"
          - id: c
            text: "docker ps"
          - id: d
            text: "docker stop"
        correct: [a]
        explanation: "docker logs показывает вывод главного процесса контейнера. docker exec запускает новую команду внутри, ps перечисляет контейнеры, stop останавливает."

  - id: cmd-blanks-001
    concept: core-commands
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите флаги: запустить nginx в фоне под именем web."
    template: |
      docker run {{detach}} {{name}} web nginx
    blanks:
      detach:
        accept: ['-d', '--detach']
        accept_regex: '^(-d|--detach)$'
      name:
        accept: ['--name']
        accept_regex: '^--name$'
    explanation: "Флаг -d (detached) отправляет контейнер в фон и возвращает терминал, а --name задаёт имя, по которому потом удобно обращаться к контейнеру."
    hints:
      - "Один флаг отвязывает контейнер от терминала, другой присваивает ему имя вместо случайного идентификатора."
      - "Короткий флаг фона состоит из одной буквы, флаг имени пишется словом через два дефиса."
    variants:
      - prompt: "Впишите пропущенное: открыть интерактивную оболочку sh внутри работающего контейнера web."
        template: |
          docker {{exec}} {{it}} web sh
        blanks:
          exec:
            accept: ['exec']
            accept_regex: '^exec$'
          it:
            accept: ['-it', '-i -t', '-ti']
            accept_regex: '^(-it|-ti|-i -t)$'
        explanation: "docker exec запускает команду внутри уже работающего контейнера, а флаги -it дают интерактивный терминал."
      - prompt: "Впишите пропущенное: остановить контейнер web, затем удалить его."
        template: |
          docker {{stop}} web
          docker {{rm}} web
        blanks:
          stop:
            accept: ['stop']
            accept_regex: '^stop$'
          rm:
            accept: ['rm']
            accept_regex: '^rm$'
        explanation: "docker stop переводит контейнер в состояние «остановлен», а docker rm убирает его с диска и освобождает имя."

  - id: cmd-predict-001
    concept: core-commands
    type: predict-output
    difficulty: 2
    prompt: "Образ собран из показанного Dockerfile. Что напечатает docker run hello?"
    fixture: |
      Dockerfile:
        FROM alpine
        CMD ["echo", "Привет из контейнера"]
      Образ собран: docker build -t hello .
    snippet: |
      docker run hello
    expected:
      kind: stdout
      value: "Привет из контейнера"
    explanation: "CMD задаёт команду запуска контейнера. Здесь это echo с фиксированной строкой, поэтому docker run печатает ровно её и контейнер завершается."
    hints:
      - "Что именно запустится, определяет инструкция CMD в Dockerfile."
      - "Команда echo печатает свой аргумент и завершается."
    variants:
      - prompt: "Что напечатает docker run app для этого образа?"
        fixture: |
          Dockerfile:
            FROM alpine
            CMD ["echo", "ready"]
          Образ собран: docker build -t app .
        snippet: |
          docker run app
        expected:
          kind: stdout
          value: "ready"
        explanation: "CMD запускает echo ready, поэтому контейнер печатает ready и завершается."
      - prompt: "Что напечатает docker run counter для этого образа?"
        fixture: |
          Dockerfile:
            FROM alpine
            CMD ["echo", "42"]
          Образ собран: docker build -t counter .
        snippet: |
          docker run counter
        expected:
          kind: stdout
          value: "42"
        explanation: "CMD запускает echo 42, поэтому контейнер печатает 42 и завершается."

  - id: cmd-predict-002
    concept: core-commands
    type: predict-output
    difficulty: 3
    prompt: "Команды выполняются по очереди. Сколько контейнеров покажет docker ps (без флага -a) в конце?"
    fixture: |
      Изначально запущенных контейнеров нет. Все три образа существуют.
    snippet: |
      docker run -d --name a nginx
      docker run -d --name b nginx
      docker run -d --name c nginx
      docker stop b
      docker ps
    expected:
      kind: scalar
      value: 2
    explanation: "Три docker run -d поднимают три работающих контейнера: a, b, c. docker stop b переводит b в состояние «остановлен». docker ps без -a показывает только работающие, то есть a и c, итого два."
    hints:
      - "Сначала посчитайте, сколько контейнеров работает после трёх запусков."
      - "Что делает docker stop с контейнером и показывает ли docker ps без -a остановленные."

  - id: cmd-quiz-002
    concept: core-commands
    type: theory-quiz
    difficulty: 3
    prompt: "Разработчик запустил docker run без флага -d, и терминал перестал отвечать на ввод. Что произошло?"
    choices:
      - id: a
        text: "Контейнер запущен на переднем плане и занял терминал своими потоками; -d отправил бы его в фон."
      - id: b
        text: "Контейнер завис из-за ошибки в образе."
      - id: c
        text: "Терминал сломался и требует перезагрузки машины."
      - id: d
        text: "Docker всегда блокирует терминал, вернуть его нельзя."
    correct: [a]
    explanation: "Без -d docker run держит контейнер на переднем плане и привязывает к нему терминал. Это не сбой: так и задумано для интерактивных запусков. Службы запускают с -d, чтобы контейнер ушёл в фон и вернул терминал."
    hints:
      - "Вспомните разницу между запуском на переднем плане и в фоне."
      - "Какой флаг отвязывает контейнер от терминала при запуске."
