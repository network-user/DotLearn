exercises:
  - id: comp-quiz-001
    concept: compose
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает docker compose?"
    choices:
      - id: a
        text: "Описывает всё приложение в одном файле и поднимает"
      - id: b
        text: "Собирает один образ из Dockerfile."
      - id: c
        text: "Публикует образ в реестр."
      - id: d
        text: "Показывает список запущенных контейнеров на машине."
    correct: [a]
    explanation: "Compose описывает многоконтейнерное приложение в файле compose.yaml и поднимает всё одной командой docker compose up, заменяя стопку ручных docker run с флагами."
    hints:
      - "Речь о запуске сразу нескольких связанных контейнеров, а не о сборке одного образа."
    variants:
      - prompt: "Какая команда поднимает всё приложение, описанное в compose.yaml, в фоне?"
        choices:
          - id: a
            text: "docker compose up -d"
          - id: b
            text: "docker build -d"
          - id: c
            text: "docker run compose"
          - id: d
            text: "docker compose ps"
        correct: [a]
        explanation: "docker compose up поднимает все сервисы, а флаг -d отправляет их в фон. docker compose ps лишь показывает статус, а build и run работают с одиночными образами и контейнерами."
      - prompt: "По какому имени сервис web обращается к базе, описанной в compose как сервис db?"
        choices:
          - id: a
            text: "По имени сервиса, то есть db."
          - id: b
            text: "По случайному IP-адресу, который надо узнавать вручную."
          - id: c
            text: "По имени образа postgres."
          - id: d
            text: "Обратиться к другому сервису из compose нельзя."
        correct: [a]
        explanation: "Compose создаёт общую сеть проекта, и сервисы видны друг другу по именам из файла. Поэтому web обращается к базе по адресу db, например db:5432."

  - id: comp-blanks-001
    concept: compose
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите ключи compose.yaml: собрать web из Dockerfile, а db взять готовым образом."
    template: |
      services:
        web:
          {{build}}: .
          ports:
            - "8080:80"
        db:
          {{image}}: postgres:16
    blanks:
      build:
        accept: ['build']
        accept_regex: '^build$'
      image:
        accept: ['image']
        accept_regex: '^image$'
    explanation: "Ключ build собирает образ сервиса из вашего Dockerfile, ключ image берёт готовый образ из реестра. Своё приложение собирают, базу берут готовой."
    hints:
      - "Один ключ означает «собрать здесь», другой «взять готовое из реестра»."
      - "Слово build про сборку, слово image про готовый образ."
    variants:
      - prompt: "Впишите команды compose: поднять приложение в фоне и затем остановить с удалением контейнеров и сети."
        template: |
          docker compose {{up}} -d
          docker compose {{down}}
        blanks:
          up:
            accept: ['up']
            accept_regex: '^up$'
          down:
            accept: ['down']
            accept_regex: '^down$'
        explanation: "docker compose up поднимает всё приложение, docker compose down останавливает и удаляет контейнеры проекта вместе с созданной сетью."
      - prompt: "Впишите ключ compose.yaml: смонтировать именованный том pgdata в каталог данных базы."
        template: |
          db:
            image: postgres:16
            {{volumes}}:
              - pgdata:/var/lib/postgresql/data
        blanks:
          volumes:
            accept: ['volumes']
            accept_regex: '^volumes$'
        explanation: "Ключ volumes перечисляет монтирования сервиса. Здесь именованный том pgdata смонтирован в каталог, где база хранит данные, чтобы они пережили пересоздание."

  - id: comp-predict-001
    concept: compose
    type: predict-output
    difficulty: 2
    prompt: "Сколько контейнеров поднимет docker compose up для этого файла?"
    fixture: |
      compose.yaml:
        services:
          web:
            build: .
          db:
            image: postgres:16
    snippet: |
      docker compose up -d
    expected:
      kind: scalar
      value: 2
    explanation: "Каждый сервис в compose поднимается как отдельный контейнер. В файле два сервиса, web и db, значит, поднимутся два контейнера."
    hints:
      - "Сосчитайте, сколько сервисов перечислено в разделе services."
      - "Каждый сервис это один контейнер."
    variants:
      - prompt: "Сколько контейнеров поднимет docker compose up для этого файла?"
        fixture: |
          compose.yaml:
            services:
              web:
                build: .
              db:
                image: postgres:16
              cache:
                image: redis:7
        snippet: |
          docker compose up -d
        expected:
          kind: scalar
          value: 3
        explanation: "В файле три сервиса: web, db и cache. Каждый поднимается отдельным контейнером, итого три."
      - prompt: "Сколько контейнеров поднимет docker compose up для этого файла?"
        fixture: |
          compose.yaml:
            services:
              web:
                build: .
        snippet: |
          docker compose up -d
        expected:
          kind: scalar
          value: 1
        explanation: "Сервис один, web, поэтому поднимется ровно один контейнер."

  - id: comp-quiz-002
    concept: compose
    type: theory-quiz
    difficulty: 3
    prompt: "В compose у сервиса web указано depends_on: db. Приложение всё равно иногда падает на старте с ошибкой подключения к базе. Почему?"
    choices:
      - id: a
        text: "depends_on задаёт порядок старта, но не ждёт готовности базы"
      - id: b
        text: "depends_on вообще не влияет на порядок запуска."
      - id: c
        text: "web и db оказались в разных сетях."
      - id: d
        text: "Базу нужно было взять через build, а не через image."
    correct: [a]
    explanation: "depends_on гарантирует лишь, что контейнер db стартует раньше web, но не проверяет, принял ли PostgreSQL подключения. Поэтому приложение должно повторять попытку подключения, а надёжную проверку задают через healthcheck и условие в depends_on."
    hints:
      - "Что именно гарантирует depends_on: порядок запуска или готовность сервиса."
      - "Контейнер базы может уже работать, а процесс внутри ещё инициализироваться."
