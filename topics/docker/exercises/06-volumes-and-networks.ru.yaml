exercises:
  - id: vn-quiz-001
    concept: volumes-and-networks
    type: theory-quiz
    difficulty: 1
    prompt: "Зачем контейнеру том (volume)?"
    choices:
      - id: a
        text: "Чтобы данные пережили пересоздание контейнера и не"
      - id: b
        text: "Чтобы контейнер стартовал быстрее."
      - id: c
        text: "Чтобы опубликовать порт контейнера наружу."
      - id: d
        text: "Чтобы уменьшить размер образа."
    correct: [a]
    explanation: "Записываемый слой умирает вместе с контейнером. Том это хранилище, которое живёт отдельно, поэтому смонтированные в него данные остаются даже после удаления контейнера."
    hints:
      - "Вспомните, что происходит с данными в записываемом слое при удалении контейнера."
    variants:
      - prompt: "База данных в контейнере потеряла все данные после пересоздания без тома. Почему?"
        choices:
          - id: a
            text: "Данные лежали в записываемом слое контейнера, а он исчезает при удалении."
          - id: b
            text: "Docker специально стирает базы данных при обновлении."
          - id: c
            text: "База сохранила данные в образе, но новый контейнер их не подхватил."
          - id: d
            text: "Данные утекли в сеть при пересоздании."
        correct: [a]
        explanation: "Без тома база пишет в записываемый слой контейнера. Удалили контейнер, исчез и слой вместе со всеми данными. Чтобы этого не случилось, каталог данных монтируют в том."
      - prompt: "Чем именованный том отличается от bind mount?"
        choices:
          - id: a
            text: "Именованный том ведёт сам Docker, bind mount привязывает"
          - id: b
            text: "Именованный том хранится в образе, bind mount в контейнере."
          - id: c
            text: "Между ними нет разницы."
          - id: d
            text: "Bind mount переживает контейнер, а именованный том нет."
        correct: [a]
        explanation: "Именованный том создаёт и хранит Docker в своей области, вы обращаетесь к нему по имени. Bind mount монтирует внутрь конкретный каталог с хоста, что удобно для разработки."

  - id: vn-blanks-001
    concept: volumes-and-networks
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите пропущенное: смонтировать именованный том pgdata в каталог данных PostgreSQL."
    template: |
      docker run -d {{flag}} pgdata:/var/lib/postgresql/data postgres
    blanks:
      flag:
        accept: ['-v', '--volume', '--mount']
        accept_regex: '^(-v|--volume)$'
    explanation: "Флаг -v монтирует хранилище в контейнер. Слева имя тома pgdata, справа путь внутри контейнера, куда база пишет данные."
    hints:
      - "Флаг монтирования томов состоит из одной буквы после дефиса."
      - "Он парный, как -p: слева хранилище, справа путь внутри контейнера."
    variants:
      - prompt: "Впишите пропущенное: создать пользовательскую сеть с именем appnet."
        template: |
          docker network {{sub}} appnet
        blanks:
          sub:
            accept: ['create']
            accept_regex: '^create$'
        explanation: "docker network create создаёт пользовательскую сеть, в которой контейнеры смогут находить друг друга по имени."
      - prompt: "Впишите пропущенное: запустить базу в сети appnet под именем db."
        template: |
          docker run -d {{net}} appnet {{name}} db postgres
        blanks:
          net:
            accept: ['--network', '--net']
            accept_regex: '^(--network|--net)$'
          name:
            accept: ['--name']
            accept_regex: '^--name$'
        explanation: "Флаг --network помещает контейнер в нужную сеть, а --name задаёт имя, по которому к нему обратятся соседи."

  - id: vn-quiz-002
    concept: volumes-and-networks
    type: theory-quiz
    difficulty: 2
    prompt: "Контейнеры web и db лежат в одной пользовательской сети. Как web обращается к базе?"
    choices:
      - id: a
        text: "По имени контейнера, например db:5432; Docker сам переведёт имя в"
      - id: b
        text: "Только по числовому IP-адресу, который нужно узнавать вручную."
      - id: c
        text: "Через опубликованный на хост порт с флагом -p."
      - id: d
        text: "Никак, контейнеры не могут общаться между собой."
    correct: [a]
    explanation: "В пользовательской сети Docker поднимает внутренний DNS, и контейнер доступен соседям по имени. web пишет db:5432, а Docker переводит имя db в текущий адрес контейнера базы."
    hints:
      - "Что удобнее использовать вместо меняющегося адреса: постоянное имя."
      - "Внутри общей сети публиковать порт базы наружу не требуется."
    variants:
      - prompt: "Почему обращаться к другому контейнеру по его IP-адресу это плохая идея?"
        choices:
          - id: a
            text: "Адрес назначается при запуске и меняется при пересоздании, а"
          - id: b
            text: "IP-адреса у контейнеров вообще не бывает."
          - id: c
            text: "Обращение по адресу работает только с флагом -p."
          - id: d
            text: "Docker запрещает контейнерам иметь адреса."
        correct: [a]
        explanation: "IP контейнера меняется при каждом пересоздании, поэтому зашитый адрес быстро устаревает. Имя же стабильно, и внутренний DNS сети всегда переведёт его в актуальный адрес."
      - prompt: "Контейнеры в стандартной сети bridge (без --network) не находят друг друга по имени. Почему?"
        choices:
          - id: a
            text: "В стандартной сети bridge нет разрешения имён; оно работает только в"
          - id: b
            text: "В стандартной сети bridge вообще нет связи между контейнерами."
          - id: c
            text: "Имена контейнеров работают только с флагом -p."
          - id: d
            text: "Разрешение имён требует отдельной установки DNS-сервера."
        correct: [a]
        explanation: "DNS по именам Docker включает в пользовательских сетях. В стандартной сети bridge его нет, поэтому связывать контейнеры принято через свою созданную сеть."

  - id: vn-quiz-003
    concept: volumes-and-networks
    type: theory-quiz
    difficulty: 3
    prompt: "Приложение web должно ходить в базу db, и обе живут в контейнерах на одной машине. Что нужно сделать, чтобы связь работала надёжно?"
    choices:
      - id: a
        text: "Создать пользовательскую сеть, запустить оба контейнера в ней с --network и обращаться"
      - id: b
        text: "Опубликовать порт базы на хост через -p и ходить в неё по localhost."
      - id: c
        text: "Зашить в приложение текущий IP контейнера базы."
      - id: d
        text: "Поместить оба процесса в один контейнер, чтобы им не нужна была сеть."
    correct: [a]
    explanation: "Надёжная связь между контейнерами это общая пользовательская сеть и обращение по имени. Публиковать порт базы наружу не нужно и небезопасно, зашитый IP устареет после пересоздания, а два процесса в одном контейнере нарушают принцип «один процесс на контейнер»."
    hints:
      - "Что даёт контейнерам пользовательская сеть по сравнению со стандартной."
      - "Нужно ли публиковать порт базы наружу, если приложение обращается к ней изнутри той же сети."

  - id: vn-predict-001
    concept: volumes-and-networks
    type: predict-output
    difficulty: 4
    prompt: "Контейнер s1 записал 10 строк в каталог /data и был удалён. Оба контейнера монтируют один именованный том logs в /data. Сколько строк увидит s2, который печатает число строк в /data?"
    fixture: |
      Том logs это именованный том Docker.
      Образ store при запуске печатает число строк в каталоге /data.
    snippet: |
      docker run -v logs:/data --name s1 store
      docker rm -f s1
      docker run -v logs:/data --name s2 store
    expected:
      kind: scalar
      value: 10
    explanation: "Данные лежат в именованном томе logs, а он живёт отдельно от контейнера. Удаление s1 не трогает том, поэтому s2, смонтировав тот же том, видит все 10 строк."
    hints:
      - "Куда попадают данные: в записываемый слой контейнера или в отдельный том."
      - "Что происходит с именованным томом, когда контейнер удаляют."
      - "s2 монтирует тот же самый том logs, что и s1."
    variants:
      - prompt: "То же самое, но контейнеры запущены без тома, поэтому данные s1 легли в его записываемый слой. Сколько строк увидит s2?"
        fixture: |
          Образ store при запуске печатает число строк в каталоге /data.
          s1 записал 10 строк в /data, том не монтировался.
        snippet: |
          docker run --name s1 store
          docker rm -f s1
          docker run --name s2 store
        expected:
          kind: scalar
          value: 0
        explanation: "Без тома данные s1 попали в его записываемый слой, который исчез вместе с контейнером при docker rm -f. s2 стартует с чистого слоя и видит ноль строк."
