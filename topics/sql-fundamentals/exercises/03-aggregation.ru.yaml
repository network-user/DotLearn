exercises:
  - id: aggregation-quiz-001
    concept: aggregation
    type: theory-quiz
    difficulty: 1
    prompt: "В таблице users 10 строк, в колонке email из них 3 значения NULL. Что вернёт SELECT COUNT(email) FROM users?"
    choices:
      - id: a
        text: "10"
      - id: b
        text: "7"
      - id: c
        text: "3"
      - id: d
        text: "NULL"
    correct: [b]
    explanation: "COUNT(колонка) считает только не-NULL значения: 10 строк минус 3 NULL дают 7. Строки целиком считает COUNT(*)."
    variants:
      - prompt: "В таблице orders три строки со значениями amount: 100, 200 и NULL. Что вернёт SELECT AVG(amount) FROM orders?"
        choices:
          - id: a
            text: "100"
          - id: b
            text: "150"
          - id: c
            text: "NULL"
          - id: d
            text: "300"
        correct: [b]
        explanation: "Агрегаты игнорируют NULL и в числителе, и в знаменателе: (100 + 200) / 2 = 150, а не (100 + 200 + 0) / 3."
      - prompt: "В таблице users 10 строк, в колонке email из них 3 значения NULL. Что вернёт SELECT COUNT(*) FROM users?"
        choices:
          - id: a
            text: "10"
          - id: b
            text: "7"
          - id: c
            text: "3"
          - id: d
            text: "Запрос завершится ошибкой"
        correct: [a]
        explanation: "COUNT(*) считает строки целиком, NULL в отдельных колонках на него не влияет: строк 10."

  - id: count-all-001
    concept: aggregation
    type: sql-query
    difficulty: 1
    prompt: "Посчитайте, сколько всего строк в таблице users."
    fixture: |
      CREATE TABLE users(id INTEGER PRIMARY KEY, name TEXT, city TEXT);
      INSERT INTO users(id, name, city) VALUES
        (1, 'Ana', 'Berlin'),
        (2, NULL, 'Minsk'),
        (3, 'Vera', 'Berlin'),
        (4, 'Boris', NULL);
    expected:
      kind: scalar
      value: 4
    hints:
      - "Вопрос «сколько строк» - это вопрос о строках целиком, а не о значениях какой-то колонки. Обратите внимание: в таблице есть NULL."
      - "COUNT(*) считает строки, COUNT(колонка) - только не-NULL значения. Что из них отвечает на вопрос задачи?"
    solution: |
      SELECT COUNT(*) FROM users;
    variants:
      - prompt: "Посчитайте, у скольких пользователей заполнено имя (name не NULL)."
        expected:
          kind: scalar
          value: 3
        solution: |
          SELECT COUNT(name) FROM users;
      - prompt: "Посчитайте, сколько разных городов встречается в колонке city."
        expected:
          kind: scalar
          value: 2
        solution: |
          SELECT COUNT(DISTINCT city) FROM users;

  - id: avg-amount-001
    concept: aggregation
    type: sql-query
    difficulty: 2
    prompt: "Найдите среднюю сумму заказа по таблице orders."
    fixture: |
      CREATE TABLE orders(id INTEGER PRIMARY KEY, city TEXT, amount INTEGER);
      INSERT INTO orders(id, city, amount) VALUES
        (1, 'Berlin', 100),
        (2, 'Minsk', 250),
        (3, 'Riga', 90),
        (4, 'Berlin', 110);
    expected:
      kind: scalar
      value: 137.5
    hints:
      - "Среднее - это свёртка всей колонки amount в одно число. Результат не обязан быть целым."
      - "Не собирайте среднее вручную из суммы и количества: деление целых в SQLite отбрасывает дробную часть. Есть готовая функция."
      - "Функция называется AVG."
    solution: |
      SELECT AVG(amount) FROM orders;
    variants:
      - prompt: "Найдите среднюю сумму заказа среди заказов дороже 100."
        expected:
          kind: scalar
          value: 180
        solution: |
          SELECT AVG(amount) FROM orders WHERE amount > 100;
      - prompt: "Найдите суммарную выручку по всем заказам."
        expected:
          kind: scalar
          value: 550
        solution: |
          SELECT SUM(amount) FROM orders;

  - id: avg-int-division-001
    concept: aggregation
    type: predict-output
    difficulty: 2
    prompt: "Что вернёт следующий запрос?"
    fixture: |
      CREATE TABLE orders(id INTEGER PRIMARY KEY, amount INTEGER);
      INSERT INTO orders(id, amount) VALUES (1, 7), (2, 7), (3, 2);
    snippet: |
      SELECT SUM(amount) / COUNT(*) FROM orders;
    expected:
      kind: scalar
      value: 5
    hints:
      - "Оба операнда деления - целые числа. Вспомните, как SQLite делит целое на целое."
      - "Сначала посчитайте SUM и COUNT по отдельности, затем примените деление с отбрасыванием дробной части."
    variants:
      - fixture: |
          CREATE TABLE orders(id INTEGER PRIMARY KEY, amount INTEGER);
          INSERT INTO orders(id, amount) VALUES (1, 10), (2, 25), (3, NULL);
        snippet: |
          SELECT COUNT(amount) FROM orders;
        expected:
          kind: scalar
          value: 2
      - fixture: |
          CREATE TABLE orders(id INTEGER PRIMARY KEY, amount INTEGER);
          INSERT INTO orders(id, amount) VALUES (1, 10), (2, 25), (3, NULL);
        snippet: |
          SELECT AVG(amount) FROM orders;
        expected:
          kind: scalar
          value: 17.5

  - id: group-having-001
    concept: aggregation
    type: sql-query
    difficulty: 3
    prompt: "Верните country и `users_count` для стран, где не меньше 2 пользователей, отсортировав по country по возрастанию."
    fixture: |
      CREATE TABLE users(id INTEGER PRIMARY KEY, country TEXT);
      INSERT INTO users(id, country) VALUES (1, 'PL'), (2, 'PL'), (3, 'US'), (4, 'PL'), (5, 'US');
    expected:
      kind: result-set
      ordered: true
      rows:
        - { country: 'PL', users_count: 3 }
        - { country: 'US', users_count: 2 }
    hints:
      - "Здесь свёртка нужна не по всей таблице, а по каждой стране отдельно, и фильтруете вы не строки, а целые группы."
      - "План: разбить строки на группы по country, посчитать размер каждой группы, отбросить маленькие группы, отсортировать то, что осталось."
      - "Условие на агрегат живёт в HAVING, а не в WHERE."
    solution: |
      SELECT country, COUNT(*) AS users_count
      FROM users
      GROUP BY country
      HAVING COUNT(*) >= 2
      ORDER BY country ASC;
