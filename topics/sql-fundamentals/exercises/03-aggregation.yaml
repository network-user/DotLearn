exercises:
  - id: aggregation-quiz-001
    concept: aggregation
    type: theory-quiz
    difficulty: 1
    prompt: "Which clause filters rows AFTER aggregation?"
    choices:
      - id: a
        text: "WHERE"
      - id: b
        text: "HAVING"
      - id: c
        text: "ORDER BY"
      - id: d
        text: "GROUP BY"
    correct: [b]
    explanation: "WHERE filters individual rows before grouping. HAVING filters aggregated groups."

  - id: count-all-001
    concept: aggregation
    type: sql-query
    difficulty: 1
    prompt: "Return a single column `total` with the number of rows in `users`."
    fixture: |
      CREATE TABLE users(id INTEGER PRIMARY KEY, name TEXT);
      INSERT INTO users(id, name) VALUES (1, 'a'), (2, 'b'), (3, 'c');
    expected:
      kind: result-set
      ordered: false
      rows:
        - { total: 3 }
    hints:
      - "COUNT(*)."
      - "Rename the column with AS total."
    solution: |
      SELECT COUNT(*) AS total FROM users;

  - id: avg-amount-001
    concept: aggregation
    type: sql-query
    difficulty: 2
    prompt: "Return a single column `avg_amount` with the average order amount."
    fixture: |
      CREATE TABLE orders(id INTEGER PRIMARY KEY, amount REAL);
      INSERT INTO orders(id, amount) VALUES (1, 10.0), (2, 20.0), (3, 30.0);
    expected:
      kind: result-set
      ordered: false
      rows:
        - { avg_amount: 20.0 }
    hints:
      - "AVG(amount)."
    solution: |
      SELECT AVG(amount) AS avg_amount FROM orders;

  - id: group-having-001
    concept: aggregation
    type: sql-query
    difficulty: 3
    prompt: "Return country and `users_count` for countries with at least 2 users, sorted by country ascending."
    fixture: |
      CREATE TABLE users(id INTEGER PRIMARY KEY, country TEXT);
      INSERT INTO users(id, country) VALUES (1, 'PL'), (2, 'PL'), (3, 'US'), (4, 'PL'), (5, 'US');
    expected:
      kind: result-set
      ordered: true
      rows:
        - { country: 'PL', users_count: 3 }
        - { country: 'US', users_count: 2 }
    hints:
      - "GROUP BY country."
      - "Filter with HAVING COUNT(*) >= 2."
      - "Sort the groups."
    solution: |
      SELECT country, COUNT(*) AS users_count
      FROM users
      GROUP BY country
      HAVING COUNT(*) >= 2
      ORDER BY country ASC;
