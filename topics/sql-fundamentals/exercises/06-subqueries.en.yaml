exercises:
  - id: subqueries-kinds-quiz
    concept: subqueries
    type: theory-quiz
    difficulty: 1
    prompt: |
      Which kind of subquery is a "scalar" subquery?
    choices:
      - id: a
        text: A subquery that returns exactly one row with exactly one column.
      - id: b
        text: A subquery used inside an IN clause.
      - id: c
        text: A subquery written above the main query using WITH.
      - id: d
        text: A subquery that joins with the outer table on a key.
    correct: [a]
    explanation: |
      A scalar subquery returns one value (one row, one column) and can be
      used wherever a single value would appear.

  - id: subqueries-above-average
    concept: subqueries
    type: sql-query
    difficulty: 2
    prompt: |
      Return books whose `pages` is greater than or equal to the average
      `pages` across the table. Order by pages ascending.
    fixture: |
      CREATE TABLE book (
        id INTEGER PRIMARY KEY,
        title TEXT NOT NULL,
        pages INTEGER NOT NULL
      );
      INSERT INTO book VALUES
        (1, 'A', 120),
        (2, 'B', 300),
        (3, 'C', 450),
        (4, 'D', 900);
    expected:
      kind: result-set
      ordered: true
      rows:
        - { title: "C", pages: 450 }
        - { title: "D", pages: 900 }
    solution: |
      SELECT title, pages
      FROM book
      WHERE pages >= (SELECT AVG(pages) FROM book)
      ORDER BY pages;

  - id: subqueries-bestselling-authors-cte
    concept: subqueries
    type: sql-query
    difficulty: 3
    prompt: |
      Using a CTE named `bestselling`, return the names of authors who have
      at least one sale with copies >= 5000. Order alphabetically.
    fixture: |
      CREATE TABLE author (
        id INTEGER PRIMARY KEY,
        name TEXT NOT NULL
      );
      INSERT INTO author VALUES (1, 'Ada'), (2, 'Linus'), (3, 'Grace');

      CREATE TABLE sale (
        book_id INTEGER NOT NULL,
        author_id INTEGER NOT NULL,
        copies INTEGER NOT NULL
      );
      INSERT INTO sale VALUES
        (1, 1, 12000),
        (2, 1, 800),
        (3, 2, 9500),
        (4, 3, 400);
    expected:
      kind: result-set
      ordered: true
      rows:
        - { name: "Ada" }
        - { name: "Linus" }
    solution: |
      WITH bestselling AS (
        SELECT DISTINCT author_id
        FROM sale
        WHERE copies >= 5000
      )
      SELECT a.name
      FROM author a
      JOIN bestselling b ON b.author_id = a.id
      ORDER BY a.name;
