exercises:
  - id: select-quiz-001
    concept: select
    type: theory-quiz
    difficulty: 1
    prompt: "Какое ключевое слово SQL фильтрует строки по условию?"
    choices:
      - id: a
        text: "FROM"
      - id: b
        text: "WHERE"
      - id: c
        text: "ORDER BY"
      - id: d
        text: "LIMIT"
    correct: [b]
    explanation: "WHERE оставляет только строки, удовлетворяющие предикату. FROM задаёт источник, ORDER BY сортирует, LIMIT ограничивает размер результата."

  - id: select-adults-001
    concept: select
    type: sql-query
    difficulty: 1
    prompt: "Верните все колонки для пользователей, чей возраст не меньше 18."
    fixture: |
      CREATE TABLE users(id INTEGER PRIMARY KEY, name TEXT, age INTEGER);
      INSERT INTO users(id, name, age) VALUES (1, 'Anna', 25), (2, 'Bob', 17), (3, 'Eva', 30), (4, 'Ian', 14);
    expected:
      kind: result-set
      ordered: false
      rows:
        - { id: 1, name: 'Anna', age: 25 }
        - { id: 3, name: 'Eva', age: 30 }
    hints:
      - "Используйте WHERE для фильтрации строк."
      - "Условие для совершеннолетних: age >= 18."
    solution: |
      SELECT * FROM users WHERE age >= 18;

  - id: select-names-only-001
    concept: select
    type: sql-query
    difficulty: 2
    prompt: "Верните только колонку `name` для пользователей, у которых country равен 'PL'."
    fixture: |
      CREATE TABLE users(id INTEGER PRIMARY KEY, name TEXT, country TEXT);
      INSERT INTO users(id, name, country) VALUES (1, 'Anna', 'PL'), (2, 'Bob', 'US'), (3, 'Ewa', 'PL');
    expected:
      kind: result-set
      ordered: false
      rows:
        - { name: 'Anna' }
        - { name: 'Ewa' }
    hints:
      - "Выбирайте только нужную колонку."
      - "Фильтруйте через WHERE country = 'PL'."
    solution: |
      SELECT name FROM users WHERE country = 'PL';

  - id: select-null-trap-001
    concept: select
    type: sql-query
    difficulty: 3
    prompt: "Верните `id` пользователей, у которых `email` отсутствует (NULL)."
    fixture: |
      CREATE TABLE users(id INTEGER PRIMARY KEY, email TEXT);
      INSERT INTO users(id, email) VALUES (1, 'a@x'), (2, NULL), (3, 'c@x'), (4, NULL);
    expected:
      kind: result-set
      ordered: false
      rows:
        - { id: 2 }
        - { id: 4 }
    hints:
      - "Сравнение с NULL через = не работает."
      - "Используйте IS NULL."
    solution: |
      SELECT id FROM users WHERE email IS NULL;
