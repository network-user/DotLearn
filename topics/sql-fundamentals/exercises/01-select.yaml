exercises:
  - id: select-quiz-001
    concept: select
    type: theory-quiz
    difficulty: 1
    prompt: "Which SQL keyword filters rows by a condition?"
    choices:
      - id: a
        text: "FROM"
      - id: b
        text: "WHERE"
      - id: c
        text: "ORDER BY"
      - id: d
        text: "LIMIT"
    correct: [b]
    explanation: "WHERE keeps only rows matching its predicate. FROM names the source, ORDER BY sorts, LIMIT caps the result size."

  - id: select-adults-001
    concept: select
    type: sql-query
    difficulty: 1
    prompt: "Return all columns for users whose age is at least 18."
    fixture: |
      CREATE TABLE users(id INTEGER PRIMARY KEY, name TEXT, age INTEGER);
      INSERT INTO users(id, name, age) VALUES (1, 'Anna', 25), (2, 'Bob', 17), (3, 'Eva', 30), (4, 'Ian', 14);
    expected:
      kind: result-set
      ordered: false
      rows:
        - { id: 1, name: 'Anna', age: 25 }
        - { id: 3, name: 'Eva', age: 30 }
    hints:
      - "Use WHERE to filter rows."
      - "The condition for adults is age >= 18."
    solution: |
      SELECT * FROM users WHERE age >= 18;

  - id: select-names-only-001
    concept: select
    type: sql-query
    difficulty: 2
    prompt: "Return only the `name` column for users whose country is 'PL'."
    fixture: |
      CREATE TABLE users(id INTEGER PRIMARY KEY, name TEXT, country TEXT);
      INSERT INTO users(id, name, country) VALUES (1, 'Anna', 'PL'), (2, 'Bob', 'US'), (3, 'Ewa', 'PL');
    expected:
      kind: result-set
      ordered: false
      rows:
        - { name: 'Anna' }
        - { name: 'Ewa' }
    hints:
      - "Project only the column you need."
      - "Filter with WHERE country = 'PL'."
    solution: |
      SELECT name FROM users WHERE country = 'PL';

  - id: select-null-trap-001
    concept: select
    type: sql-query
    difficulty: 3
    prompt: "Return the `id` of users whose `email` is missing (NULL)."
    fixture: |
      CREATE TABLE users(id INTEGER PRIMARY KEY, email TEXT);
      INSERT INTO users(id, email) VALUES (1, 'a@x'), (2, NULL), (3, 'c@x'), (4, NULL);
    expected:
      kind: result-set
      ordered: false
      rows:
        - { id: 2 }
        - { id: 4 }
    hints:
      - "NULL comparison with = does not work."
      - "Use IS NULL."
    solution: |
      SELECT id FROM users WHERE email IS NULL;
