exercises:
  - id: aggregation-quiz-001
    concept: aggregation
    type: theory-quiz
    difficulty: 1
    prompt: "The users table has 10 rows, and 3 values in the email column are NULL. What does SELECT COUNT(email) FROM users return?"
    choices:
      - id: a
        text: "10"
      - id: b
        text: "7"
      - id: c
        text: "3"
      - id: d
        text: "NULL"
    correct: [b]
    explanation: "COUNT(column) counts only non-NULL values: 10 rows minus 3 NULLs leaves 7. Whole rows are counted by COUNT(*)."
    variants:
      - prompt: "The orders table has three rows with amount values: 100, 200 and NULL. What does SELECT AVG(amount) FROM orders return?"
        choices:
          - id: a
            text: "100"
          - id: b
            text: "150"
          - id: c
            text: "NULL"
          - id: d
            text: "300"
        correct: [b]
        explanation: "Aggregates ignore NULL in both the numerator and the denominator: (100 + 200) / 2 = 150, not (100 + 200 + 0) / 3."
      - prompt: "The users table has 10 rows, and 3 values in the email column are NULL. What does SELECT COUNT(*) FROM users return?"
        choices:
          - id: a
            text: "10"
          - id: b
            text: "7"
          - id: c
            text: "3"
          - id: d
            text: "The query fails with an error"
        correct: [a]
        explanation: "COUNT(*) counts whole rows; NULLs in individual columns do not affect it: there are 10 rows."

  - id: count-all-001
    concept: aggregation
    type: sql-query
    difficulty: 1
    prompt: "Count how many rows there are in the users table."
    fixture: |
      CREATE TABLE users(id INTEGER PRIMARY KEY, name TEXT, city TEXT);
      INSERT INTO users(id, name, city) VALUES
        (1, 'Ana', 'Berlin'),
        (2, NULL, 'Minsk'),
        (3, 'Vera', 'Berlin'),
        (4, 'Boris', NULL);
    expected:
      kind: scalar
      value: 4
    hints:
      - "The question \"how many rows\" is about whole rows, not about the values of any particular column. Note that the table contains NULLs."
      - "COUNT(*) counts rows, COUNT(column) counts only non-NULL values. Which of those answers the question?"
    solution: |
      SELECT COUNT(*) FROM users;
    variants:
      - prompt: "Count how many users have a name filled in (name is not NULL)."
        expected:
          kind: scalar
          value: 3
        solution: |
          SELECT COUNT(name) FROM users;
      - prompt: "Count how many distinct cities appear in the city column."
        expected:
          kind: scalar
          value: 2
        solution: |
          SELECT COUNT(DISTINCT city) FROM users;

  - id: avg-amount-001
    concept: aggregation
    type: sql-query
    difficulty: 2
    prompt: "Find the average order amount in the orders table."
    fixture: |
      CREATE TABLE orders(id INTEGER PRIMARY KEY, city TEXT, amount INTEGER);
      INSERT INTO orders(id, city, amount) VALUES
        (1, 'Berlin', 100),
        (2, 'Minsk', 250),
        (3, 'Riga', 90),
        (4, 'Berlin', 110);
    expected:
      kind: scalar
      value: 137.5
    hints:
      - "The average is a fold of the whole amount column into one number. The result does not have to be an integer."
      - "Do not assemble the average by hand from a sum and a count: integer division in SQLite drops the fractional part. There is a ready-made function."
      - "The function is called AVG."
    solution: |
      SELECT AVG(amount) FROM orders;
    variants:
      - prompt: "Find the average amount among orders worth more than 100."
        expected:
          kind: scalar
          value: 180
        solution: |
          SELECT AVG(amount) FROM orders WHERE amount > 100;
      - prompt: "Find the total revenue across all orders."
        expected:
          kind: scalar
          value: 550
        solution: |
          SELECT SUM(amount) FROM orders;

  - id: avg-int-division-001
    concept: aggregation
    type: predict-output
    difficulty: 2
    prompt: "What does the following query return?"
    fixture: |
      CREATE TABLE orders(id INTEGER PRIMARY KEY, amount INTEGER);
      INSERT INTO orders(id, amount) VALUES (1, 7), (2, 7), (3, 2);
    snippet: |
      SELECT SUM(amount) / COUNT(*) FROM orders;
    expected:
      kind: scalar
      value: 5
    hints:
      - "Both operands of the division are integers. Recall how SQLite divides an integer by an integer."
      - "Compute SUM and COUNT separately first, then apply division that drops the fractional part."
    variants:
      - fixture: |
          CREATE TABLE orders(id INTEGER PRIMARY KEY, amount INTEGER);
          INSERT INTO orders(id, amount) VALUES (1, 10), (2, 25), (3, NULL);
        snippet: |
          SELECT COUNT(amount) FROM orders;
        expected:
          kind: scalar
          value: 2
      - fixture: |
          CREATE TABLE orders(id INTEGER PRIMARY KEY, amount INTEGER);
          INSERT INTO orders(id, amount) VALUES (1, 10), (2, 25), (3, NULL);
        snippet: |
          SELECT AVG(amount) FROM orders;
        expected:
          kind: scalar
          value: 17.5

  - id: group-having-001
    concept: aggregation
    type: sql-query
    difficulty: 3
    prompt: "Return country and `users_count` for countries with at least 2 users, sorted by country ascending."
    fixture: |
      CREATE TABLE users(id INTEGER PRIMARY KEY, country TEXT);
      INSERT INTO users(id, country) VALUES (1, 'PL'), (2, 'PL'), (3, 'US'), (4, 'PL'), (5, 'US');
    expected:
      kind: result-set
      ordered: true
      rows:
        - { country: 'PL', users_count: 3 }
        - { country: 'US', users_count: 2 }
    hints:
      - "Here the fold runs not over the whole table but over each country separately, and what you filter is not rows but whole groups."
      - "The plan: split rows into groups by country, measure the size of each group, discard the small groups, sort what remains."
      - "A condition on an aggregate lives in HAVING, not in WHERE."
    solution: |
      SELECT country, COUNT(*) AS users_count
      FROM users
      GROUP BY country
      HAVING COUNT(*) >= 2
      ORDER BY country ASC;
