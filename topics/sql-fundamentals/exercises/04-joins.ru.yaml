exercises:
  - id: joins-inner-vs-left-quiz
    concept: joins
    type: theory-quiz
    difficulty: 1
    prompt: |
      Какие утверждения об INNER JOIN и LEFT JOIN верны?
    choices:
      - id: a
        text: INNER JOIN оставляет только строки, у которых есть совпадения с обеих сторон.
      - id: b
        text: LEFT JOIN сохраняет каждую строку правой таблицы.
      - id: c
        text: LEFT JOIN заполняет отсутствующие колонки правой стороны значением NULL.
      - id: d
        text: INNER JOIN - единственный JOIN, использующий условие ON.
    correct: [a, c]
    explanation: |
      INNER отбрасывает несовпадения; LEFT сохраняет левую сторону и
      заполняет NULL справа. ON используют оба JOIN-а.

  - id: joins-list-each-authors-book
    concept: joins
    type: sql-query
    difficulty: 2
    prompt: |
      Верните по одной строке на автора с названием его книги. Включите
      авторов без книг (их `title` будет NULL). Отсортируйте по имени
      автора, затем по названию книги.
    fixture: |
      CREATE TABLE author (
        id INTEGER PRIMARY KEY,
        name TEXT NOT NULL
      );
      INSERT INTO author VALUES (1, 'Ada'), (2, 'Linus'), (3, 'Grace');

      CREATE TABLE book (
        id INTEGER PRIMARY KEY,
        title TEXT NOT NULL,
        author_id INTEGER REFERENCES author(id)
      );
      INSERT INTO book VALUES
        (1, 'Analytical engine', 1),
        (2, 'Kernel notes', 2),
        (3, 'Loose pages', NULL);
    expected:
      kind: result-set
      ordered: true
      rows:
        - { name: "Ada", title: "Analytical engine" }
        - { name: "Grace", title: null }
        - { name: "Linus", title: "Kernel notes" }
    solution: |
      SELECT a.name, b.title
      FROM author a
      LEFT JOIN book b ON b.author_id = a.id
      ORDER BY a.name, b.title;

  - id: joins-orphan-books
    concept: joins
    type: sql-query
    difficulty: 3
    prompt: |
      Верните названия книг, у которых нет автора (author_id равен NULL).
      Отсортируйте по названию.
    fixture: |
      CREATE TABLE author (
        id INTEGER PRIMARY KEY,
        name TEXT NOT NULL
      );
      INSERT INTO author VALUES (1, 'Ada'), (2, 'Linus'), (3, 'Grace');

      CREATE TABLE book (
        id INTEGER PRIMARY KEY,
        title TEXT NOT NULL,
        author_id INTEGER REFERENCES author(id)
      );
      INSERT INTO book VALUES
        (1, 'Analytical engine', 1),
        (2, 'Kernel notes', 2),
        (3, 'Loose pages', NULL),
        (4, 'Stray draft', NULL);
    expected:
      kind: result-set
      ordered: true
      rows:
        - { title: "Loose pages" }
        - { title: "Stray draft" }
    solution: |
      SELECT title
      FROM book
      WHERE author_id IS NULL
      ORDER BY title;
