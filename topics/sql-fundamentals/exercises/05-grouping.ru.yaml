exercises:
  - id: grouping-where-vs-having-quiz
    concept: grouping
    type: theory-quiz
    difficulty: 1
    prompt: |
      Когда следует использовать HAVING вместо WHERE?
    choices:
      - id: a
        text: Когда предикат содержит агрегат вроде SUM или COUNT.
      - id: b
        text: Когда фильтр должен сработать до группировки.
      - id: c
        text: Когда фильтр должен сработать после группировки.
      - id: d
        text: HAVING всегда быстрее, чем WHERE.
    correct: [a, c]
    explanation: |
      WHERE фильтрует строки до GROUP BY, HAVING фильтрует группы после.
      HAVING обязателен только тогда, когда предикат ссылается на агрегат.

  - id: grouping-books-per-author
    concept: grouping
    type: sql-query
    difficulty: 2
    prompt: |
      Верните по одной строке на автора с двумя колонками: `author` и
      `books` (количество книг). Отсортируйте по автору.
    fixture: |
      CREATE TABLE book (
        id INTEGER PRIMARY KEY,
        title TEXT NOT NULL,
        author TEXT NOT NULL,
        pages INTEGER NOT NULL
      );
      INSERT INTO book VALUES
        (1, 'Compilers', 'Ada', 620),
        (2, 'Algorithms', 'Ada', 480),
        (3, 'Operating systems', 'Linus', 700),
        (4, 'COBOL essentials', 'Grace', 220);
    expected:
      kind: result-set
      ordered: true
      rows:
        - { author: "Ada", books: 2 }
        - { author: "Grace", books: 1 }
        - { author: "Linus", books: 1 }
    solution: |
      SELECT author, COUNT(*) AS books
      FROM book
      GROUP BY author
      ORDER BY author;

  - id: grouping-prolific-authors
    concept: grouping
    type: sql-query
    difficulty: 3
    prompt: |
      Верните авторов, у которых в каталоге больше одной книги. Выведите
      `author` и `books` (количество). Отсортируйте по автору.
    fixture: |
      CREATE TABLE book (
        id INTEGER PRIMARY KEY,
        title TEXT NOT NULL,
        author TEXT NOT NULL,
        pages INTEGER NOT NULL
      );
      INSERT INTO book VALUES
        (1, 'Compilers', 'Ada', 620),
        (2, 'Algorithms', 'Ada', 480),
        (3, 'Notes on math', 'Ada', 90),
        (4, 'Operating systems', 'Linus', 700),
        (5, 'Kernel quickstart', 'Linus', 120),
        (6, 'COBOL essentials', 'Grace', 220);
    expected:
      kind: result-set
      ordered: true
      rows:
        - { author: "Ada", books: 3 }
        - { author: "Linus", books: 2 }
    solution: |
      SELECT author, COUNT(*) AS books
      FROM book
      GROUP BY author
      HAVING COUNT(*) > 1
      ORDER BY author;
