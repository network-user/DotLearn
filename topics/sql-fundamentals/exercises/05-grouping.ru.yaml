exercises:
  - id: grouping-where-vs-having-quiz
    concept: grouping
    type: theory-quiz
    difficulty: 1
    prompt: |
      Когда следует использовать HAVING вместо WHERE?
    choices:
      - id: a
        text: Когда предикат содержит агрегат вроде SUM или COUNT.
      - id: b
        text: Когда фильтр должен сработать до группировки.
      - id: c
        text: Когда фильтр должен сработать после группировки.
      - id: d
        text: HAVING всегда быстрее, чем WHERE.
    correct: [a, c]
    explanation: |
      WHERE фильтрует строки до GROUP BY, HAVING фильтрует группы после.
      HAVING обязателен только тогда, когда предикат ссылается на агрегат.
    variants:
      - prompt: |
          В каком порядке логически выполняются части запроса с группировкой?
        choices:
          - id: a
            text: SELECT, FROM, WHERE, GROUP BY, HAVING, ORDER BY
          - id: b
            text: FROM, WHERE, GROUP BY, HAVING, SELECT, ORDER BY
          - id: c
            text: FROM, GROUP BY, WHERE, HAVING, SELECT, ORDER BY
          - id: d
            text: FROM, HAVING, WHERE, GROUP BY, SELECT, ORDER BY
        correct: [b]
        explanation: |
          Запрос пишется начиная с SELECT, но выполняется по конвейеру:
          сначала FROM и WHERE над строками, затем GROUP BY и HAVING над
          группами, и только потом SELECT и ORDER BY.
      - prompt: |
          В таблице book шесть строк и три разных автора. Сколько строк
          вернёт запрос SELECT author, COUNT(*) FROM book GROUP BY author?
        choices:
          - id: a
            text: Шесть, по одной на каждую строку таблицы.
          - id: b
            text: Три, по одной на каждого автора.
          - id: c
            text: Одну, потому что COUNT сворачивает всё в одно число.
          - id: d
            text: Зависит от того, сколько агрегатов в SELECT.
        correct: [b]
        explanation: |
          GROUP BY создаёт по корзине на каждое уникальное значение author,
          а в результат уходит ровно одна строка на корзину. Число агрегатов
          в SELECT на число строк не влияет.

  - id: grouping-books-per-author
    concept: grouping
    type: sql-query
    difficulty: 2
    prompt: |
      Верните по одной строке на автора с двумя колонками: `author` и
      `books` (количество книг). Отсортируйте по автору.
    fixture: |
      CREATE TABLE book (
        id INTEGER PRIMARY KEY,
        title TEXT NOT NULL,
        author TEXT NOT NULL,
        pages INTEGER NOT NULL
      );
      INSERT INTO book VALUES
        (1, 'Compilers', 'Ada', 620),
        (2, 'Algorithms', 'Ada', 480),
        (3, 'Operating systems', 'Linus', 700),
        (4, 'COBOL essentials', 'Grace', 220);
    expected:
      kind: result-set
      ordered: true
      rows:
        - { author: "Ada", books: 2 }
        - { author: "Grace", books: 1 }
        - { author: "Linus", books: 1 }
    hints:
      - >-
        «По одной строке на автора» означает, что строки таблицы нужно
        свернуть в корзины по значению author - результат описывает
        корзины, а не отдельные книги.
      - >-
        Решите по шагам: по какой колонке раскладывать строки в корзины,
        какой агрегат считает содержимое каждой корзины, и каким должен
        быть порядок вывода.
      - >-
        Число строк внутри группы считает COUNT(*); имя выходной колонки
        задаётся через AS.
    solution: |
      SELECT author, COUNT(*) AS books
      FROM book
      GROUP BY author
      ORDER BY author;
    variants:
      - prompt: |
          Верните по одной строке на автора с колонками `author` и
          `total_pages` (суммарное число страниц). Отсортируйте по автору.
        expected:
          kind: result-set
          ordered: true
          rows:
            - { author: "Ada", total_pages: 1100 }
            - { author: "Grace", total_pages: 220 }
            - { author: "Linus", total_pages: 700 }
        solution: |
          SELECT author, SUM(pages) AS total_pages
          FROM book
          GROUP BY author
          ORDER BY author;
      - prompt: |
          Верните по одной строке на автора с колонками `author` и
          `longest` (объём самой большой книги автора). Отсортируйте по
          автору.
        expected:
          kind: result-set
          ordered: true
          rows:
            - { author: "Ada", longest: 620 }
            - { author: "Grace", longest: 220 }
            - { author: "Linus", longest: 700 }
        solution: |
          SELECT author, MAX(pages) AS longest
          FROM book
          GROUP BY author
          ORDER BY author;

  - id: grouping-null-team
    concept: grouping
    type: sql-query
    difficulty: 2
    prompt: |
      Посчитайте игроков в каждой команде, включая игроков без команды
      (NULL образует отдельную группу). Верните `team` и `members`,
      отсортируйте по team.
    fixture: |
      CREATE TABLE player (
        id INTEGER PRIMARY KEY,
        name TEXT NOT NULL,
        team TEXT
      );
      INSERT INTO player VALUES
        (1, 'Mira', 'red'),
        (2, 'Oleg', NULL),
        (3, 'Pavel', 'red'),
        (4, 'Rita', NULL),
        (5, 'Sana', 'blue');
    expected:
      kind: result-set
      ordered: true
      rows:
        - { team: null, members: 2 }
        - { team: "blue", members: 1 }
        - { team: "red", members: 2 }
    hints:
      - >-
        GROUP BY складывает все NULL в одну общую корзину - вопрос лишь в
        том, сколько карточек окажется в каждой из корзин.
      - >-
        Группировка по team даст три корзины: red, blue и корзину без
        команды. Останется посчитать строки в каждой и упорядочить вывод;
        при сортировке по возрастанию NULL встаёт первым.
    solution: |
      SELECT team, COUNT(*) AS members
      FROM player
      GROUP BY team
      ORDER BY team;
    variants:
      - prompt: |
          Посчитайте только игроков, состоящих в командах: верните `team`
          и `members` без NULL-группы. Отсортируйте по team.
        expected:
          kind: result-set
          ordered: true
          rows:
            - { team: "blue", members: 1 }
            - { team: "red", members: 2 }
        solution: |
          SELECT team, COUNT(*) AS members
          FROM player
          WHERE team IS NOT NULL
          GROUP BY team
          ORDER BY team;
      - prompt: |
          Верните группы (включая NULL-группу), в которых хотя бы два
          игрока. Колонки `team` и `members`, сортировка по team.
        expected:
          kind: result-set
          ordered: true
          rows:
            - { team: null, members: 2 }
            - { team: "red", members: 2 }
        solution: |
          SELECT team, COUNT(*) AS members
          FROM player
          GROUP BY team
          HAVING COUNT(*) >= 2
          ORDER BY team;

  - id: grouping-prolific-authors
    concept: grouping
    type: sql-query
    difficulty: 3
    prompt: |
      Верните авторов, у которых в каталоге больше одной книги. Выведите
      `author` и `books` (количество). Отсортируйте по автору.
    fixture: |
      CREATE TABLE book (
        id INTEGER PRIMARY KEY,
        title TEXT NOT NULL,
        author TEXT NOT NULL,
        pages INTEGER NOT NULL
      );
      INSERT INTO book VALUES
        (1, 'Compilers', 'Ada', 620),
        (2, 'Algorithms', 'Ada', 480),
        (3, 'Notes on math', 'Ada', 90),
        (4, 'Operating systems', 'Linus', 700),
        (5, 'Kernel quickstart', 'Linus', 120),
        (6, 'COBOL essentials', 'Grace', 220);
    expected:
      kind: result-set
      ordered: true
      rows:
        - { author: "Ada", books: 3 }
        - { author: "Linus", books: 2 }
    hints:
      - >-
        «Больше одной книги» - условие на готовую корзину, а не на
        отдельную строку: сначала строки раскладываются по авторам, и
        только потом отбираются корзины.
      - >-
        Постройте сводку «автор и число его книг», а затем оставьте в ней
        только строки, где счётчик больше единицы - фильтр по агрегату
        живёт после группировки.
    solution: |
      SELECT author, COUNT(*) AS books
      FROM book
      GROUP BY author
      HAVING COUNT(*) > 1
      ORDER BY author;

  - id: grouping-monthly-revenue
    concept: grouping
    type: sql-query
    difficulty: 4
    prompt: |
      Посчитайте выручку по месяцам: `month` - первые семь символов даты
      `paid_at` (вид `YYYY-MM`), `total` - сумма `amount`. Оставьте только
      месяцы с total не меньше 500 и отсортируйте по month.
    fixture: |
      CREATE TABLE payment (
        id INTEGER PRIMARY KEY,
        paid_at TEXT NOT NULL,
        amount INTEGER NOT NULL
      );
      INSERT INTO payment VALUES
        (1, '2024-01-05', 200),
        (2, '2024-01-19', 350),
        (3, '2024-01-30', 60),
        (4, '2024-02-02', 90),
        (5, '2024-02-27', 150),
        (6, '2024-03-08', 500),
        (7, '2024-03-21', 120);
    expected:
      kind: result-set
      ordered: true
      rows:
        - { month: "2024-01", total: 610 }
        - { month: "2024-03", total: 620 }
    hints:
      - >-
        Колонки «месяц» в таблице нет - корзина определяется значением,
        вычисленным из даты, и все платежи одного месяца должны попасть в
        одну корзину.
      - >-
        План: превратить каждую дату в метку месяца, сгруппировать по этой
        метке, просуммировать amount внутри корзины, а порог на сумму
        наложить уже на готовые группы.
      - >-
        Первые семь символов строки достаёт substr(paid_at, 1, 7); в
        GROUP BY можно повторить это выражение или сослаться на алиас.
    solution: |
      SELECT substr(paid_at, 1, 7) AS month, SUM(amount) AS total
      FROM payment
      GROUP BY substr(paid_at, 1, 7)
      HAVING SUM(amount) >= 500
      ORDER BY month;
