exercises:
  - id: grouping-where-vs-having-quiz
    concept: grouping
    type: theory-quiz
    difficulty: 1
    prompt: |
      When should you use HAVING instead of WHERE?
    choices:
      - id: a
        text: When the predicate involves an aggregate like SUM or COUNT.
      - id: b
        text: When you want the filter to run before grouping.
      - id: c
        text: When you want the filter to run after grouping.
      - id: d
        text: HAVING is always faster than WHERE.
    correct: [a, c]
    explanation: |
      WHERE filters rows before GROUP BY, HAVING filters groups after.
      HAVING is required only when the predicate references an aggregate.

  - id: grouping-books-per-author
    concept: grouping
    type: sql-query
    difficulty: 2
    prompt: |
      Return one row per author with two columns: `author` and `books`
      (the count of books). Order by author.
    fixture: |
      CREATE TABLE book (
        id INTEGER PRIMARY KEY,
        title TEXT NOT NULL,
        author TEXT NOT NULL,
        pages INTEGER NOT NULL
      );
      INSERT INTO book VALUES
        (1, 'Compilers', 'Ada', 620),
        (2, 'Algorithms', 'Ada', 480),
        (3, 'Operating systems', 'Linus', 700),
        (4, 'COBOL essentials', 'Grace', 220);
    expected:
      kind: result-set
      ordered: true
      rows:
        - { author: "Ada", books: 2 }
        - { author: "Grace", books: 1 }
        - { author: "Linus", books: 1 }
    solution: |
      SELECT author, COUNT(*) AS books
      FROM book
      GROUP BY author
      ORDER BY author;

  - id: grouping-prolific-authors
    concept: grouping
    type: sql-query
    difficulty: 3
    prompt: |
      Return authors who have more than one book in the catalog. Output
      `author` and `books` (the count). Order by author.
    fixture: |
      CREATE TABLE book (
        id INTEGER PRIMARY KEY,
        title TEXT NOT NULL,
        author TEXT NOT NULL,
        pages INTEGER NOT NULL
      );
      INSERT INTO book VALUES
        (1, 'Compilers', 'Ada', 620),
        (2, 'Algorithms', 'Ada', 480),
        (3, 'Notes on math', 'Ada', 90),
        (4, 'Operating systems', 'Linus', 700),
        (5, 'Kernel quickstart', 'Linus', 120),
        (6, 'COBOL essentials', 'Grace', 220);
    expected:
      kind: result-set
      ordered: true
      rows:
        - { author: "Ada", books: 3 }
        - { author: "Linus", books: 2 }
    solution: |
      SELECT author, COUNT(*) AS books
      FROM book
      GROUP BY author
      HAVING COUNT(*) > 1
      ORDER BY author;
