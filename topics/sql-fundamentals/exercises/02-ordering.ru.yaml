exercises:
  - id: order-quiz-unordered-001
    concept: ordering
    type: theory-quiz
    difficulty: 1
    prompt: "Запрос `SELECT * FROM users` без ORDER BY несколько недель возвращает строки в порядке их вставки. Какой вывод верен?"
    choices:
      - id: a
        text: "SQLite гарантирует порядок вставки, на него можно полагаться."
      - id: b
        text: "Порядок - деталь текущего плана выполнения; без ORDER BY он может измениться в любой момент."
      - id: c
        text: "Строки без ORDER BY всегда возвращаются по возрастанию первичного ключа."
    correct: [b]
    explanation: "Таблица - неупорядоченное множество строк. Стабильный порядок без ORDER BY - совпадение, которое ломается при смене плана запроса, индекса или версии движка."
    hints:
      - "Таблица - множество: у множества есть состав, но нет первого и последнего элемента."
    variants:
      - prompt: "Какой запрос гарантированно возвращает три самых дорогих товара?"
        choices:
          - id: a
            text: "SELECT * FROM products LIMIT 3;"
          - id: b
            text: "SELECT * FROM products ORDER BY price DESC LIMIT 3;"
          - id: c
            text: "SELECT * FROM products WHERE price > 100 LIMIT 3;"
        correct: [b]
        explanation: "LIMIT режет уже отсортированный результат. Без ORDER BY обрезаются три произвольные строки, а WHERE фильтрует, но не упорядочивает."
      - prompt: "В запросе с ORDER BY country ASC, age DESC когда учитывается ключ age?"
        choices:
          - id: a
            text: "Всегда: строки сначала сортируются по age, потом по country."
          - id: b
            text: "Только для строк с одинаковым значением country."
          - id: c
            text: "Никогда: работает только первый ключ списка."
        correct: [b]
        explanation: "Каждый следующий ключ сортировки срабатывает только там, где все предыдущие ключи совпали."

  - id: order-by-asc-001
    concept: ordering
    type: sql-query
    difficulty: 1
    prompt: "Верните id и name из `users`, отсортировав по `name` по возрастанию."
    fixture: |
      CREATE TABLE users(id INTEGER PRIMARY KEY, name TEXT);
      INSERT INTO users(id, name) VALUES (3, 'Carol'), (1, 'Alice'), (2, 'Bob');
    expected:
      kind: result-set
      ordered: true
      rows:
        - { id: 1, name: 'Alice' }
        - { id: 2, name: 'Bob' }
        - { id: 3, name: 'Carol' }
    hints:
      - "Порядок результата не существует, пока Вы его не объявили: какая колонка должна им управлять?"
      - "Нужен один ключ сортировки; направление по возрастанию действует по умолчанию."
    solution: |
      SELECT id, name FROM users ORDER BY name ASC;
    variants:
      - prompt: "Верните id и name из `users`, отсортировав по `name` по убыванию."
        expected:
          kind: result-set
          ordered: true
          rows:
            - { id: 3, name: 'Carol' }
            - { id: 2, name: 'Bob' }
            - { id: 1, name: 'Alice' }
        solution: |
          SELECT id, name FROM users ORDER BY name DESC;
      - prompt: "Верните id и name из `users`, отсортировав по `name` по возрастанию."
        fixture: |
          CREATE TABLE users(id INTEGER PRIMARY KEY, name TEXT);
          INSERT INTO users(id, name) VALUES (1, 'Maya'), (2, 'Ivan'), (3, 'Lena');
        expected:
          kind: result-set
          ordered: true
          rows:
            - { id: 2, name: 'Ivan' }
            - { id: 3, name: 'Lena' }
            - { id: 1, name: 'Maya' }
        solution: |
          SELECT id, name FROM users ORDER BY name ASC;

  - id: order-by-desc-limit-001
    concept: ordering
    type: sql-query
    difficulty: 2
    prompt: "Верните двух самых старших пользователей (id, name, age), начиная с самого старшего."
    fixture: |
      CREATE TABLE users(id INTEGER PRIMARY KEY, name TEXT, age INTEGER);
      INSERT INTO users(id, name, age) VALUES (1, 'Anna', 25), (2, 'Bob', 33), (3, 'Eva', 41), (4, 'Ian', 18);
    expected:
      kind: result-set
      ordered: true
      rows:
        - { id: 3, name: 'Eva', age: 41 }
        - { id: 2, name: 'Bob', age: 33 }
    hints:
      - "Сначала мысленно постройте полный список по возрасту и только потом думайте об обрезке - запрос делает то же самое."
      - "«Самые старшие первыми» - это убывание; срез готового списка задаётся отдельным словом после сортировки."
    solution: |
      SELECT id, name, age FROM users ORDER BY age DESC LIMIT 2;
    variants:
      - prompt: "Верните двух самых младших пользователей (id, name, age), начиная с самого младшего."
        expected:
          kind: result-set
          ordered: true
          rows:
            - { id: 4, name: 'Ian', age: 18 }
            - { id: 1, name: 'Anna', age: 25 }
        solution: |
          SELECT id, name, age FROM users ORDER BY age ASC LIMIT 2;
      - prompt: "Верните трёх самых старших пользователей (id, name, age), начиная с самого старшего."
        expected:
          kind: result-set
          ordered: true
          rows:
            - { id: 3, name: 'Eva', age: 41 }
            - { id: 2, name: 'Bob', age: 33 }
            - { id: 1, name: 'Anna', age: 25 }
        solution: |
          SELECT id, name, age FROM users ORDER BY age DESC LIMIT 3;

  - id: order-predict-first-row-001
    concept: ordering
    type: predict-output
    difficulty: 2
    prompt: "Какое значение name вернёт этот запрос?"
    snippet: |
      SELECT name FROM cities ORDER BY population DESC LIMIT 1 OFFSET 1;
    fixture: |
      CREATE TABLE cities(id INTEGER PRIMARY KEY, name TEXT, population INTEGER);
      INSERT INTO cities(id, name, population) VALUES
        (1, 'Praha', 1309000),
        (2, 'Brno', 379000),
        (3, 'Ostrava', 284000),
        (4, 'Plzen', 175000);
    expected:
      kind: scalar
      value: 'Brno'
    hints:
      - "Мысленно выполните шаги по порядку: полная сортировка, потом пропуск, потом срез."
      - "OFFSET пропускает строки уже отсортированного результата, LIMIT берёт следующие за ними."
    variants:
      - prompt: "Какое значение name вернёт этот запрос?"
        snippet: |
          SELECT name FROM cities ORDER BY name DESC LIMIT 1;
        expected:
          kind: scalar
          value: 'Praha'
      - prompt: "Какое значение name вернёт этот запрос?"
        snippet: |
          SELECT name FROM cities ORDER BY population ASC LIMIT 1 OFFSET 1;
        expected:
          kind: scalar
          value: 'Ostrava'

  - id: limit-offset-page-001
    concept: ordering
    type: sql-query
    difficulty: 2
    prompt: "Список книг отсортирован по `year` по возрастанию, размер страницы - 2. Верните вторую страницу (title, year)."
    fixture: |
      CREATE TABLE books(id INTEGER PRIMARY KEY, title TEXT, year INTEGER);
      INSERT INTO books(id, title, year) VALUES
        (1, 'Dune', 1965),
        (2, 'Neuromancer', 1984),
        (3, 'Hyperion', 1989),
        (4, 'Snow Crash', 1992),
        (5, 'Blindsight', 2006),
        (6, 'Exhalation', 2019);
    expected:
      kind: result-set
      ordered: true
      rows:
        - { title: 'Hyperion', year: 1989 }
        - { title: 'Snow Crash', year: 1992 }
    hints:
      - "Страница - это окно в отсортированном списке: сначала зафиксируйте порядок, потом посчитайте, сколько строк находится до окна."
      - "При размере страницы 2 вторая страница начинается после первых двух строк."
      - "LIMIT задаёт размер окна, OFFSET - сколько строк пропустить."
    solution: |
      SELECT title, year FROM books ORDER BY year ASC LIMIT 2 OFFSET 2;
    variants:
      - prompt: "Список книг отсортирован по `year` по возрастанию, размер страницы - 2. Верните третью страницу (title, year)."
        expected:
          kind: result-set
          ordered: true
          rows:
            - { title: 'Blindsight', year: 2006 }
            - { title: 'Exhalation', year: 2019 }
        solution: |
          SELECT title, year FROM books ORDER BY year ASC LIMIT 2 OFFSET 4;
      - prompt: "Список книг отсортирован по `year` по убыванию, размер страницы - 2. Верните вторую страницу (title, year)."
        expected:
          kind: result-set
          ordered: true
          rows:
            - { title: 'Snow Crash', year: 1992 }
            - { title: 'Hyperion', year: 1989 }
        solution: |
          SELECT title, year FROM books ORDER BY year DESC LIMIT 2 OFFSET 2;

  - id: order-by-two-keys-001
    concept: ordering
    type: sql-query
    difficulty: 3
    prompt: "Верните id, country и age из `users`, отсортировав по country по возрастанию, а внутри каждой страны - по age по убыванию."
    fixture: |
      CREATE TABLE users(id INTEGER PRIMARY KEY, country TEXT, age INTEGER);
      INSERT INTO users(id, country, age) VALUES (1, 'PL', 25), (2, 'US', 33), (3, 'PL', 41), (4, 'US', 18);
    expected:
      kind: result-set
      ordered: true
      rows:
        - { id: 3, country: 'PL', age: 41 }
        - { id: 1, country: 'PL', age: 25 }
        - { id: 2, country: 'US', age: 33 }
        - { id: 4, country: 'US', age: 18 }
    hints:
      - "Представьте результат сгруппированным по странам: сначала упорядочиваются сами страны, потом люди внутри каждой из них."
      - "Ключи перечисляются через запятую, и у каждого - своё направление; второй срабатывает только при равенстве первого."
    solution: |
      SELECT id, country, age FROM users ORDER BY country ASC, age DESC;
    variants:
      - prompt: "Верните id, country и age из `users`, отсортировав по country по убыванию, а внутри каждой страны - по age по возрастанию."
        expected:
          kind: result-set
          ordered: true
          rows:
            - { id: 4, country: 'US', age: 18 }
            - { id: 2, country: 'US', age: 33 }
            - { id: 1, country: 'PL', age: 25 }
            - { id: 3, country: 'PL', age: 41 }
        solution: |
          SELECT id, country, age FROM users ORDER BY country DESC, age ASC;

  - id: order-nulls-last-001
    concept: ordering
    type: sql-query
    difficulty: 4
    prompt: "Верните title и rating из `tracks`, отсортировав по rating по возрастанию так, чтобы строки с NULL оказались в конце; при равенстве rating сортируйте по title по возрастанию."
    fixture: |
      CREATE TABLE tracks(id INTEGER PRIMARY KEY, title TEXT, rating REAL);
      INSERT INTO tracks(id, title, rating) VALUES
        (1, 'Ember', 4.9),
        (2, 'Paper Planes', NULL),
        (3, 'Afterglow', 3.8),
        (4, 'Low Orbit', NULL),
        (5, 'Cold Static', 4.1);
    expected:
      kind: result-set
      ordered: true
      rows:
        - { title: 'Afterglow', rating: 3.8 }
        - { title: 'Cold Static', rating: 4.1 }
        - { title: 'Ember', rating: 4.9 }
        - { title: 'Low Orbit', rating: null }
        - { title: 'Paper Planes', rating: null }
    hints:
      - "SQLite считает NULL меньше любого значения, поэтому при сортировке по возрастанию неизвестные рейтинги всплывают первыми - это поведение нужно перебить."
      - "Место NULL и направление сортировки задаются независимо; для строк с одинаковым rating понадобится второй ключ."
      - "Ищите модификатор NULLS LAST (или NULLS FIRST), он ставится после направления ключа."
    solution: |
      SELECT title, rating FROM tracks ORDER BY rating ASC NULLS LAST, title ASC;
    variants:
      - prompt: "Верните title и rating из `tracks`, отсортировав по rating по убыванию так, чтобы строки с NULL оказались в начале; при равенстве rating сортируйте по title по возрастанию."
        expected:
          kind: result-set
          ordered: true
          rows:
            - { title: 'Low Orbit', rating: null }
            - { title: 'Paper Planes', rating: null }
            - { title: 'Ember', rating: 4.9 }
            - { title: 'Cold Static', rating: 4.1 }
            - { title: 'Afterglow', rating: 3.8 }
        solution: |
          SELECT title, rating FROM tracks ORDER BY rating DESC NULLS FIRST, title ASC;
