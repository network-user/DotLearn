exercises:
  - id: subqueries-kinds-quiz
    concept: subqueries
    type: theory-quiz
    difficulty: 1
    prompt: |
      Какой подзапрос называется «скалярным»?
    choices:
      - id: a
        text: Подзапрос, возвращающий ровно одну строку с ровно одной колонкой.
      - id: b
        text: Подзапрос, используемый внутри условия IN.
      - id: c
        text: Подзапрос, записанный над основным запросом через WITH.
      - id: d
        text: Подзапрос, соединяющийся с внешней таблицей по ключу.
    correct: [a]
    explanation: |
      Скалярный подзапрос возвращает одно значение (одна строка, одна
      колонка) и может стоять везде, где ожидается одиночное значение.

  - id: subqueries-above-average
    concept: subqueries
    type: sql-query
    difficulty: 2
    prompt: |
      Верните книги, у которых `pages` больше или равно среднему значению
      `pages` по таблице. Отсортируйте по pages по возрастанию.
    fixture: |
      CREATE TABLE book (
        id INTEGER PRIMARY KEY,
        title TEXT NOT NULL,
        pages INTEGER NOT NULL
      );
      INSERT INTO book VALUES
        (1, 'A', 120),
        (2, 'B', 300),
        (3, 'C', 450),
        (4, 'D', 900);
    expected:
      kind: result-set
      ordered: true
      rows:
        - { title: "C", pages: 450 }
        - { title: "D", pages: 900 }
    solution: |
      SELECT title, pages
      FROM book
      WHERE pages >= (SELECT AVG(pages) FROM book)
      ORDER BY pages;

  - id: subqueries-bestselling-authors-cte
    concept: subqueries
    type: sql-query
    difficulty: 3
    prompt: |
      Используя CTE с именем `bestselling`, верните имена авторов, у которых
      есть хотя бы одна продажа с copies >= 5000. Отсортируйте по алфавиту.
    fixture: |
      CREATE TABLE author (
        id INTEGER PRIMARY KEY,
        name TEXT NOT NULL
      );
      INSERT INTO author VALUES (1, 'Ada'), (2, 'Linus'), (3, 'Grace');

      CREATE TABLE sale (
        book_id INTEGER NOT NULL,
        author_id INTEGER NOT NULL,
        copies INTEGER NOT NULL
      );
      INSERT INTO sale VALUES
        (1, 1, 12000),
        (2, 1, 800),
        (3, 2, 9500),
        (4, 3, 400);
    expected:
      kind: result-set
      ordered: true
      rows:
        - { name: "Ada" }
        - { name: "Linus" }
    solution: |
      WITH bestselling AS (
        SELECT DISTINCT author_id
        FROM sale
        WHERE copies >= 5000
      )
      SELECT a.name
      FROM author a
      JOIN bestselling b ON b.author_id = a.id
      ORDER BY a.name;
