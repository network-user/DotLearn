conceptId: grouping
cards:
  - id: grouping-01
    front: "Что делает GROUP BY с точки зрения модели «корзин»?"
    back: "Раскладывает строки по корзинам - одна корзина на каждое уникальное значение ключа. Агрегат считается отдельно внутри каждой корзины, и в результат уходит ровно одна строка на корзину."
    tags: [basics]
  - id: grouping-02
    front: "Гласит правило одной колонки для GROUP BY?"
    back: "Каждая колонка в SELECT обязана либо входить в GROUP BY, либо быть обёрнута в агрегат (COUNT, SUM, AVG, MIN, MAX). Иначе движку неоткуда взять единственное значение на группу."
    tags: [basics]
  - id: grouping-03
    front: "Как SQLite обращается с «голой» колонкой вне GROUP BY?"
    back: "Не выдаёт ошибку, а молча берёт значение из произвольной строки группы. Запрос выглядит рабочим, но при смене порядка строк в хранилище начинает показывать другие значения - честный footgun."
    tags: [pitfalls]
  - id: grouping-04
    front: "Где в логическом конвейере стоят WHERE и HAVING?"
    back: "WHERE - до GROUP BY: фильтрует отдельные строки и не видит агрегатов. HAVING - после GROUP BY: фильтрует готовые корзины и свободно ссылается на COUNT, SUM и другие агрегаты."
    tags: [execution-order]
  - id: grouping-05
    front: "Почему WHERE COUNT(*) > 1 даёт ошибку, а HAVING - нет?"
    back: "На этапе WHERE групп ещё не существует, считать нечего - получаем misuse of aggregate. Фильтр по агрегату формулируется про готовую группу, поэтому ему место в HAVING."
    tags: [pitfalls]
  - id: grouping-06
    front: "Когда условие стоит писать в WHERE, а не в HAVING?"
    back: "Если предикат можно записать без агрегата (например, pages >= 400) - это работа для WHERE: он срабатывает раньше и оставляет группировке меньше строк. HAVING держите для предикатов с агрегатами."
    tags: [where-vs-having]
  - id: grouping-07
    front: "Обязателен ли агрегат в HAVING внутри SELECT?"
    back: "Нет. Агрегат в HAVING может не появляться в выводе. Например, HAVING AVG(pages) > 300 отфильтрует авторов, но саму среднюю величину в результат не включит."
    tags: [where-vs-having]
  - id: grouping-08
    front: "Что происходит со строками, где ключ группировки равен NULL?"
    back: "В отличие от WHERE, GROUP BY считает все NULL «одинаковыми» и складывает их в одну общую корзину. Чтобы исключить такие строки, отбросьте их до группировки через WHERE col IS NOT NULL."
    tags: [nulls]
  - id: grouping-09
    front: "Можно ли группировать по нескольким колонкам или по выражению?"
    back: "Да. По нескольким колонкам - корзина на каждую уникальную комбинацию значений. По выражению, например substr(paid_at, 1, 7), - корзина по вычисленному значению вроде 2024-01."
    tags: [expressions]
  - id: grouping-10
    front: "Что вернёт GROUP BY, если после WHERE не осталось строк?"
    back: "Ноль строк - нет карточек, нет и корзин. А тот же агрегатный запрос без GROUP BY вернул бы одну строку с COUNT(*) = 0."
    tags: [nulls]
