conceptId: subqueries
cards:
  - id: subqueries-01
    front: "В каком порядке выполняется запрос с подзапросом?"
    back: "Изнутри наружу: движок сначала целиком вычисляет внутренний SELECT, подставляет его результат на место скобок и только потом выполняет внешний запрос. Для внешнего подзапрос - просто заранее посчитанная константа."
    tags: [basics]
  - id: subqueries-02
    front: "Что такое скалярный подзапрос и где он применим?"
    back: "Подзапрос, возвращающий ровно одну строку и одну колонку - единственное значение. Его ставят туда, где синтаксис ждёт число: в правую часть сравнения, в SELECT, в выражение."
    tags: [scalar]
  - id: subqueries-03
    front: "Зачем подзапрос ставят справа от IN?"
    back: "Чтобы отобрать строки по списку из другого запроса: WHERE id IN (SELECT ...). Подзапрос возвращает колонку значений, повторы внутри роли не играют, проверяется лишь вхождение в множество."
    tags: [in]
  - id: subqueries-04
    front: "Что такое производная таблица и нужен ли ей алиас?"
    back: "Это подзапрос на месте таблицы во FROM; его результат - временная таблица, живущая только на время запроса. В большинстве движков (PostgreSQL, MySQL) ей обязателен алиас через AS, SQLite его не требует."
    tags: [derived-table]
  - id: subqueries-05
    front: "Чем коррелированный подзапрос отличается от обычного?"
    back: "Он ссылается на колонки внешнего запроса (например, e.department) и потому пересчитывается заново для каждой строки внешней таблицы. Это удобно для порога, зависящего от строки, но дороже обычного подзапроса."
    tags: [correlated]
  - id: subqueries-06
    front: "Почему NOT IN с единственным NULL в подзапросе возвращает пустоту?"
    back: "id NOT IN (1, 3, NULL) раскрывается в id <> 1 AND id <> 3 AND id <> NULL. Сравнение с NULL даёт UNKNOWN, а AND с UNKNOWN уже никогда не станет TRUE, поэтому ни одна строка не проходит."
    tags: [pitfalls, nulls]
  - id: subqueries-07
    front: "Как лечить ловушку NOT IN с NULL?"
    back: "Отсечь NULL прямо в подзапросе через WHERE col IS NOT NULL, либо переписать условие через NOT EXISTS, который к NULL равнодушен. С обычным IN (без NOT) NULL такой беды не делает."
    tags: [pitfalls]
  - id: subqueries-08
    front: "Что происходит, если скалярный подзапрос вдруг вернул несколько строк?"
    back: "Запрос упадёт или поведёт себя непредсказуемо: справа от = синтаксис ждёт одно значение, а данные дали список. Лекарство - сделать подзапрос скалярным (MAX, MIN, AVG, LIMIT 1) или сменить = на IN."
    tags: [pitfalls]
  - id: subqueries-09
    front: "Когда выбирать подзапрос с IN, а когда JOIN?"
    back: "Нужна только проверка наличия - берите IN или EXISTS: они выражают намерение прямее и не размножают строки. Нужны колонки из второй таблицы - берите JOIN (но без DISTINCT он размножит строку по числу совпадений)."
    tags: [join-vs-subquery]
  - id: subqueries-10
    front: "Совпадают ли форма запроса и фактический план выполнения?"
    back: "Нет. Современные планировщики нередко переписывают IN-подзапросы и даже коррелированные формы в semi-join с тем же планом, что у явного JOIN. Выбирайте по читаемости, а к плану обращайтесь через EXPLAIN QUERY PLAN при проблемах с производительностью."
    tags: [performance]
