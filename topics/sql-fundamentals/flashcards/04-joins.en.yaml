conceptId: joins
cards:
  - id: joins-01
    front: "Why is data cut into tables, and where does JOIN come in?"
    back: "Normalization stores each fact once: the author's name in author, while a book holds only an author_id reference. This prevents drift on updates, and JOIN reassembles the separated tables on read."
    tags: [basics]
  - id: joins-02
    front: "What is the mental model of how JOIN works?"
    back: "It is \"all pairs, then a filter\": the engine lays every left-table row next to every right-table row (the Cartesian product), and the ON condition keeps only the pairs where it is true."
    tags: [basics]
  - id: joins-03
    front: "How does INNER JOIN differ from LEFT JOIN?"
    back: "INNER JOIN keeps only matched pairs and silently drops unmatched rows. LEFT JOIN preserves every left-table row and, when there is no right match, fills the right columns with NULL."
    tags: [join-types]
  - id: joins-04
    front: "Which table goes on the left in a LEFT JOIN?"
    back: "The one whose rows must not be lost. \"All authors and their books\" makes author the left table; \"all books and their authors\" makes it book. RIGHT JOIN is rarely needed: just swap the tables to use LEFT."
    tags: [join-types]
  - id: joins-05
    front: "How many rows does a key occurring m times on the left and n on the right yield?"
    back: "m × n rows with that value: the left row repeats for every match on the right. This is treacherous near aggregates - a SUM \"doubles\" because rows multiplied."
    tags: [pitfalls]
  - id: joins-06
    front: "Why does a row with NULL in the join key never find a match?"
    back: "NULL equals nothing, not even another NULL, so b.author_id = a.id is not true for it against any row. Such a row attaches to no one."
    tags: [nulls]
  - id: joins-07
    front: "How does the anti-join find rows with no match?"
    back: "LEFT JOIN preserves all left rows, and unmatched ones have NULL on the right. A WHERE b.id IS NULL filter on the right table's primary key keeps exactly the rows with no match."
    tags: [anti-join]
  - id: joins-08
    front: "Why does a right-table filter in WHERE turn a LEFT JOIN into an INNER one?"
    back: "WHERE runs after the join. Unmatched rows have NULL in the right columns, and comparing NULL against a condition is not true, so WHERE discards them. Put right-table conditions in ON."
    tags: [pitfalls]
  - id: joins-09
    front: "What happens if you forget ON in a JOIN?"
    back: "SQLite silently performs a cross join and returns the Cartesian product - every pair of rows. On two million-row tables that is a trillion rows. The database does not warn you: formally you asked for it."
    tags: [pitfalls]
  - id: joins-10
    front: "Why are table aliases needed, and when are they mandatory?"
    back: "Aliases give short names and remove ambiguity (a.id, b.id instead of an \"ambiguous column name\" error). They are mandatory in a self-join, where one table appears twice as two independent copies."
    tags: [aliases]
