conceptId: ordering
cards:
  - id: ordering-01
    front: "Какой порядок строк гарантирует SELECT без ORDER BY?"
    back: "Никакой. Таблица - это множество, у неё нет «первой» и «последней» строки. Стабильный вывод без ORDER BY - побочный эффект текущего плана, который вправе измениться после VACUUM, нового индекса или апгрейда движка."
    tags: [basics]
  - id: ordering-02
    front: "На каком шаге конвейера выполняются ORDER BY и LIMIT?"
    back: "ORDER BY - последний содержательный шаг: он упорядочивает уже готовый результат после FROM, WHERE и SELECT. LIMIT режет ещё позже - отсекает верхушку уже отсортированного списка."
    tags: [execution-order]
  - id: ordering-03
    front: "Как задать направление сортировки и каково оно по умолчанию?"
    back: "По умолчанию сортировка по возрастанию (ASC). DESC после ключа переворачивает список. Направление задаётся отдельно для каждого ключа: ORDER BY artist ASC, plays DESC."
    tags: [basics]
  - id: ordering-04
    front: "Когда срабатывает второй ключ сортировки в ORDER BY a, b?"
    back: "Только там, где первый ключ не смог различить строки (значения равны). Каждый следующий ключ работает во всё более узкой зоне - только при равенстве всех предыдущих."
    tags: [multiple-keys]
  - id: ordering-05
    front: "Почему LIMIT без ORDER BY - подозрительный запрос?"
    back: "Он возвращает N произвольных строк: срез вырезается из неупорядоченного множества. На тестовой базе выглядит осмысленно, на проде - как повезёт. Почти всегда LIMIT должен идти вместе с ORDER BY."
    tags: [pitfalls]
  - id: ordering-06
    front: "Как устроена пагинация через LIMIT и OFFSET?"
    back: "LIMIT ограничивает число строк, OFFSET пропускает первые несколько. Для страницы N формула OFFSET (N - 1) * размер. Срез выполняется после сортировки, поэтому порядок должен быть зафиксирован."
    tags: [pagination]
  - id: ordering-07
    front: "Куда SQLite ставит NULL при сортировке и как это изменить?"
    back: "SQLite считает NULL меньше любого значения: при ASC они всплывают первыми, при DESC - уходят в конец. Модификатор NULLS LAST (или NULLS FIRST) меняет это для конкретного ключа."
    tags: [nulls]
  - id: ordering-08
    front: "Гарантирован ли взаимный порядок строк с равным ключом?"
    back: "Нет. Порядок строк-близнецов не определён, движок вправе выбрать любой. Выбор может месяцами выглядеть стабильным, пока не изменится план запроса."
    tags: [pitfalls]
  - id: ordering-09
    front: "Зачем добавлять уникальный хвостовой ключ вроде ORDER BY plays DESC, id?"
    back: "Он разрешает все ничьи и делает порядок детерминированным. Это критично при LIMIT/OFFSET: иначе строка на границе ничьи может попасть на две страницы подряд, а её соседка - никуда."
    tags: [pagination]
  - id: ordering-10
    front: "По чему можно сортировать, а по чему - не стоит?"
    back: "Можно по колонке, по выражению и по алиасу из SELECT (ORDER BY видит алиасы). Не стоит по номеру колонки (ORDER BY 2) - такая запись ломается при первом изменении списка SELECT."
    tags: [expressions]
