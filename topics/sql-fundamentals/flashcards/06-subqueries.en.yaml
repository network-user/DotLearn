conceptId: subqueries
cards:
  - id: subqueries-01
    front: "In what order does a query with a subquery execute?"
    back: "From the inside out: the engine first fully evaluates the inner SELECT, substitutes its result where the parentheses were, and only then runs the outer query. To the outer query the subquery is just a precomputed constant."
    tags: [basics]
  - id: subqueries-02
    front: "What is a scalar subquery and where can it be used?"
    back: "A subquery that returns exactly one row and one column - a single value. You put it wherever the syntax expects a number: the right side of a comparison, in SELECT, in an expression."
    tags: [scalar]
  - id: subqueries-03
    front: "Why put a subquery to the right of IN?"
    back: "To select rows by a list from another query: WHERE id IN (SELECT ...). The subquery returns a column of values; duplicates inside do not matter, only membership in the set is checked."
    tags: [in]
  - id: subqueries-04
    front: "What is a derived table and does it need an alias?"
    back: "It is a subquery in place of a table in FROM; its result is a temporary table that lives only for the query. Most engines (PostgreSQL, MySQL) require an alias via AS; SQLite does not."
    tags: [derived-table]
  - id: subqueries-05
    front: "How does a correlated subquery differ from an ordinary one?"
    back: "It references columns of the outer query (such as e.department) and so is recomputed for each row of the outer table. Handy for a row-dependent threshold, but more expensive than an ordinary subquery."
    tags: [correlated]
  - id: subqueries-06
    front: "Why does NOT IN with a single NULL in the subquery return nothing?"
    back: "id NOT IN (1, 3, NULL) expands into id <> 1 AND id <> 3 AND id <> NULL. The NULL comparison is UNKNOWN, and AND with UNKNOWN can never become TRUE, so no row passes."
    tags: [pitfalls, nulls]
  - id: subqueries-07
    front: "How do you cure the NOT IN with NULL trap?"
    back: "Cut off NULL inside the subquery with WHERE col IS NOT NULL, or rewrite the condition with NOT EXISTS, which is indifferent to NULL. A plain IN (without NOT) causes no such trouble."
    tags: [pitfalls]
  - id: subqueries-08
    front: "What happens if a scalar subquery suddenly returns several rows?"
    back: "The query fails or behaves unpredictably: the syntax to the right of = expects one value but the data gave a list. The cure is to make the subquery scalar (MAX, MIN, AVG, LIMIT 1) or change = to IN."
    tags: [pitfalls]
  - id: subqueries-09
    front: "When choose a subquery with IN, and when a JOIN?"
    back: "For a presence check only - take IN or EXISTS: they express the intent more directly and do not multiply rows. For columns from the second table - take JOIN (but without DISTINCT it multiplies a row per match)."
    tags: [join-vs-subquery]
  - id: subqueries-10
    front: "Are the query form and the actual execution plan the same thing?"
    back: "No. Modern planners often rewrite IN-subqueries and even correlated forms into a semi-join with the same plan as an explicit JOIN. Choose by readability and check the plan via EXPLAIN QUERY PLAN only on performance issues."
    tags: [performance]
