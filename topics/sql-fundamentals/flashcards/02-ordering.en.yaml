conceptId: ordering
cards:
  - id: ordering-01
    front: "What row order does a SELECT without ORDER BY guarantee?"
    back: "None. A table is a set, with no \"first\" or \"last\" row. Stable output without ORDER BY is a side effect of the current plan, which may change after VACUUM, a new index, or an engine upgrade."
    tags: [basics]
  - id: ordering-02
    front: "At which pipeline stage do ORDER BY and LIMIT run?"
    back: "ORDER BY is the last meaningful step: it arranges the finished result after FROM, WHERE, and SELECT. LIMIT cuts even later, slicing the top of the already-sorted list."
    tags: [execution-order]
  - id: ordering-03
    front: "How do you set sort direction, and what is the default?"
    back: "The default is ascending (ASC). DESC after a key flips the list. Direction is set per key: ORDER BY artist ASC, plays DESC."
    tags: [basics]
  - id: ordering-04
    front: "When does the second sort key in ORDER BY a, b take effect?"
    back: "Only where the first key failed to tell rows apart (values are equal). Each next key operates in an ever-narrower zone - only where all previous keys tied."
    tags: [multiple-keys]
  - id: ordering-05
    front: "Why is LIMIT without ORDER BY a suspicious query?"
    back: "It returns N arbitrary rows: the slice is cut from an unordered set. It looks meaningful on a test database and is pure luck in production. LIMIT should almost always come with an ORDER BY."
    tags: [pitfalls]
  - id: ordering-06
    front: "How does pagination with LIMIT and OFFSET work?"
    back: "LIMIT caps the number of rows, OFFSET skips the first few. The formula for page N is OFFSET (N - 1) * page size. The slice happens after sorting, so the order must be fixed."
    tags: [pagination]
  - id: ordering-07
    front: "Where does SQLite put NULL when sorting, and how do you change it?"
    back: "SQLite treats NULL as smaller than any value: under ASC they float to the top, under DESC they sink to the bottom. The NULLS LAST (or NULLS FIRST) modifier changes this for a specific key."
    tags: [nulls]
  - id: ordering-08
    front: "Is the mutual order of rows with an equal key guaranteed?"
    back: "No. The order of twin rows is unspecified and the engine may pick either. The choice can look stable for months until the query plan changes."
    tags: [pitfalls]
  - id: ordering-09
    front: "Why add a unique tail key like ORDER BY plays DESC, id?"
    back: "It resolves every tie and makes the order deterministic. This is critical with LIMIT/OFFSET: otherwise a row on a tie boundary can show on two consecutive pages while its neighbor appears nowhere."
    tags: [pagination]
  - id: ordering-10
    front: "What can you sort by, and what should you avoid?"
    back: "You can sort by a column, an expression, and a SELECT alias (ORDER BY sees aliases). Avoid sorting by column position (ORDER BY 2) - that notation breaks the moment the SELECT list changes."
    tags: [expressions]
