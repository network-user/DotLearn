conceptId: select
cards:
  - id: select-01
    front: "Чем селекция отличается от проекции в SELECT-запросе?"
    back: "Селекция - это отбор строк условием WHERE (горизонтальный разрез). Проекция - выбор колонок списком после SELECT (вертикальный разрез). Это две независимые операции."
    tags: [basics]
  - id: select-02
    front: "Каков логический порядок выполнения простого SELECT-запроса?"
    back: "Сначала FROM (источник), затем WHERE (фильтр строк) и только потом SELECT (проекция колонок). Поэтому WHERE срабатывает до проекции и не видит алиасов из SELECT."
    tags: [execution-order]
  - id: select-03
    front: "Почему в WHERE нельзя сослаться на алиас колонки из SELECT?"
    back: "WHERE выполняется раньше SELECT, и в момент фильтрации алиасов ещё не существует. Нужно повторить само выражение в WHERE или вынести его в подзапрос."
    tags: [pitfalls]
  - id: select-04
    front: "Что возвращает любое сравнение с NULL, например email = NULL?"
    back: "Оно возвращает NULL («неизвестно»), а не TRUE или FALSE. Даже NULL = NULL даёт NULL. WHERE пропускает строку только при TRUE, поэтому такая строка не пройдёт."
    tags: [nulls]
  - id: select-05
    front: "Как корректно отобрать строки, где значение отсутствует?"
    back: "Через операторы IS NULL и IS NOT NULL. Сравнение через = или <> с NULL всегда даёт NULL и молча не находит нужные строки."
    tags: [nulls]
  - id: select-06
    front: "Что делают спецсимволы % и _ в операторе LIKE?"
    back: "Символ `%` заменяет любую последовательность символов, включая пустую; `_` заменяет ровно один символ. Например, `'____@%'` ищет адреса, где до `@` ровно четыре символа."
    tags: [like]
  - id: select-07
    front: "К чему применяется DISTINCT - к колонке или ко всей строке результата?"
    back: "Ко всей строке результата. SELECT DISTINCT country, age уберёт только полностью совпадающие пары «страна + возраст», а не дубли по одной колонке."
    tags: [distinct]
  - id: select-08
    front: "Чем в SQLite отличается чувствительность к регистру у = и у LIKE?"
    back: "Оператор = чувствителен к регистру (`'anna' = 'Anna'` ложно), а LIKE для латиницы регистр игнорирует (`'Anna' LIKE 'anna'` истинно). В PostgreSQL поведение обратное, для регистронезависимого поиска есть ILIKE."
    tags: [pitfalls]
  - id: select-09
    front: "Какими кавычками отличают строковое значение от имени колонки?"
    back: "Одинарные кавычки - строковое значение: `'Anna'`. Двойные - имя таблицы или колонки: `\"name\"`. В строгой СУБД `name = \"Anna\"` упадёт с ошибкой «колонка Anna не существует»."
    tags: [pitfalls]
  - id: select-10
    front: "Пустой результат запроса - это ошибка?"
    back: "Нет. «Таких строк нет» - корректный ответ, запрос завершается успешно. Приложение обязано быть готово к пустому списку так же, как к непустому."
    tags: [nulls]
