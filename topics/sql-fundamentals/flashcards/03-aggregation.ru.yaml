conceptId: aggregation
cards:
  - id: aggregation-01
    front: "Что такое агрегатная функция как операция над таблицей?"
    back: "Это свёртка (fold): она принимает все строки сразу, прокатывает по ним накопитель (счётчик, сумму, минимум) и выдаёт одно значение. Много строк входит - один скаляр выходит."
    tags: [basics]
  - id: aggregation-02
    front: "Сколько строк вернёт запрос с агрегатом без GROUP BY?"
    back: "Ровно одну, всегда. Даже на пустой таблице будет одна строка результата. Не «сколько получится», а именно одна."
    tags: [basics]
  - id: aggregation-03
    front: "Чем различаются COUNT(*), COUNT(col) и COUNT(DISTINCT col)?"
    back: "COUNT(*) считает строки; COUNT(col) - не-NULL значения колонки; COUNT(DISTINCT col) - уникальные не-NULL значения. Это три разных вопроса с разными ответами."
    tags: [count]
  - id: aggregation-04
    front: "Как агрегаты обращаются с NULL?"
    back: "Все агрегаты, кроме COUNT(*), игнорируют NULL. У AVG это касается обеих частей дроби: среднее считается как сумма известных, делённая на COUNT(amount), а не на COUNT(*)."
    tags: [nulls]
  - id: aggregation-05
    front: "Почему COUNT(email) может молча соврать вместо числа строк?"
    back: "COUNT(col) считает только не-NULL значения. Если в колонке есть NULL, COUNT(email) вернёт меньше, чем строк в таблице, и отчёт занизит без ошибки и предупреждения. Для числа строк нужен COUNT(*)."
    tags: [pitfalls]
  - id: aggregation-06
    front: "Что вернут SUM, AVG, MIN, MAX над пустым множеством строк?"
    back: "Они вернут NULL, а COUNT вернёт 0. На пустой таблице SUM(amount) - это не ноль, а «не знаю». В SQLite функция TOTAL(amount) в этой ситуации даёт 0.0."
    tags: [nulls]
  - id: aggregation-07
    front: "Почему самодельное SUM(amount) / COUNT(*) над целыми врёт?"
    back: "В SQLite деление целого на целое - целочисленное, дробная часть отбрасывается, а COUNT(*) ещё и считает NULL-строки. AVG защищён - он всегда возвращает float. Для ручного деления приводите тип: SUM(amount) * 1.0 / COUNT(*)."
    tags: [pitfalls]
  - id: aggregation-08
    front: "Почему AVG может вводить в заблуждение на скошенных данных?"
    back: "Среднее чувствительно к выбросам: одно экстремальное значение перетягивает его. На зарплатах с одним руководителем AVG показывает число, которого нет ни у кого. Сверяйте AVG с MIN/MAX или медианой."
    tags: [pitfalls]
  - id: aggregation-09
    front: "Можно ли смешивать агрегат и сырую колонку без GROUP BY?"
    back: "Нет. SELECT city, COUNT(*) FROM orders просит невозможного: COUNT(*) - одно число, city - своё у каждой строки. Большинство СУБД дадут ошибку, SQLite молча подставит город из произвольной строки."
    tags: [pitfalls]
  - id: aggregation-10
    front: "Зачем агрегату давать псевдоним через AS?"
    back: "Без AS колонка результата называется буквально COUNT(*), что неудобно читать коду и людям. SELECT COUNT(*) AS orders_count даёт осмысленное имя."
    tags: [basics]
