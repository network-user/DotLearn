conceptId: joins
cards:
  - id: joins-01
    front: "Зачем данные разрезают по таблицам и при чём тут JOIN?"
    back: "Нормализация хранит каждый факт один раз: имя автора - в author, книга держит лишь ссылку author_id. Это защищает от рассогласования при изменениях, а JOIN собирает разрезанные таблицы обратно при чтении."
    tags: [basics]
  - id: joins-02
    front: "Какова мысленная модель работы JOIN?"
    back: "«Все пары, потом фильтр»: движок прикладывает каждую строку левой таблицы к каждой строке правой (декартово произведение), а условие ON оставляет только пары, где оно истинно."
    tags: [basics]
  - id: joins-03
    front: "Чем INNER JOIN отличается от LEFT JOIN?"
    back: "INNER JOIN оставляет только совпавшие пары и молча отбрасывает строки без пары. LEFT JOIN сохраняет каждую строку левой таблицы, а при отсутствии пары справа заполняет правые колонки NULL."
    tags: [join-types]
  - id: joins-04
    front: "Какую таблицу ставить слева в LEFT JOIN?"
    back: "Ту, строки которой нельзя терять. «Все авторы и их книги» делает левой author; «все книги и их авторы» - book. RIGHT JOIN на практике почти не нужен: проще переставить таблицы под LEFT."
    tags: [join-types]
  - id: joins-05
    front: "Сколько строк даёт ключ, встречающийся m раз слева и n раз справа?"
    back: "m × n строк с этим значением: строка левой таблицы повторяется для каждого совпадения справа. Это особенно коварно рядом с агрегатами - SUM «удвоится» из-за размножения строк."
    tags: [pitfalls]
  - id: joins-06
    front: "Почему строка с NULL в ключе соединения никогда не находит пару?"
    back: "NULL не равен ничему, даже другому NULL, поэтому условие b.author_id = a.id для неё не истинно ни с одной строкой. Такая строка не присоединится ни к кому."
    tags: [nulls]
  - id: joins-07
    front: "Как устроен анти-JOIN - поиск строк без пары?"
    back: "LEFT JOIN сохраняет все левые строки, а у несовпавших правая сторона - NULL. Фильтр WHERE b.id IS NULL по первичному ключу правой таблицы оставляет именно строки без пары."
    tags: [anti-join]
  - id: joins-08
    front: "Почему фильтр правой таблицы в WHERE превращает LEFT JOIN в INNER?"
    back: "WHERE выполняется после соединения. У несовпавших строк правые колонки - NULL, а сравнение NULL с условием не истинно, и WHERE их выбрасывает. Условие по правой таблице пишите в ON."
    tags: [pitfalls]
  - id: joins-09
    front: "Что произойдёт, если забыть ON в JOIN?"
    back: "SQLite молча выполнит перекрёстное соединение и вернёт декартово произведение - все пары строк. На двух таблицах по миллиону это триллион строк. База не предупредит: формально Вы попросили именно это."
    tags: [pitfalls]
  - id: joins-10
    front: "Зачем нужны алиасы таблиц и когда они обязательны?"
    back: "Алиасы дают короткие имена и снимают неоднозначность (a.id, b.id вместо падения «ambiguous column name»). Они обязательны в self-join, где одна таблица участвует дважды как две независимые копии."
    tags: [aliases]
