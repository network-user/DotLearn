conceptId: select
cards:
  - id: select-01
    front: "How does selection differ from projection in a SELECT query?"
    back: "Selection picks rows with a WHERE condition (horizontal cut). Projection picks columns with the list after SELECT (vertical cut). They are two independent operations."
    tags: [basics]
  - id: select-02
    front: "What is the logical execution order of a simple SELECT query?"
    back: "First FROM (the source), then WHERE (row filter), and only then SELECT (column projection). So WHERE fires before projection and cannot see SELECT aliases."
    tags: [execution-order]
  - id: select-03
    front: "Why can't WHERE reference a column alias defined in SELECT?"
    back: "WHERE runs before SELECT, so at the moment of filtering the aliases do not exist yet. Repeat the expression in WHERE or move it into a subquery."
    tags: [pitfalls]
  - id: select-04
    front: "What does any comparison with NULL return, such as email = NULL?"
    back: "It returns NULL (\"unknown\"), not TRUE or FALSE. Even NULL = NULL yields NULL. WHERE keeps a row only on TRUE, so such a row does not pass."
    tags: [nulls]
  - id: select-05
    front: "How do you correctly select rows where a value is missing?"
    back: "With the IS NULL and IS NOT NULL operators. Comparing with = or <> against NULL always yields NULL and silently fails to find the rows."
    tags: [nulls]
  - id: select-06
    front: "What do the wildcards % and _ do in the LIKE operator?"
    back: "The `%` symbol matches any sequence of characters, including the empty one; `_` matches exactly one character. For example, `'____@%'` finds addresses with exactly four characters before the `@`."
    tags: [like]
  - id: select-07
    front: "Does DISTINCT apply to a single column or to the whole result row?"
    back: "To the whole result row. SELECT DISTINCT country, age removes only fully matching \"country + age\" pairs, not duplicates of one column."
    tags: [distinct]
  - id: select-08
    front: "How does case sensitivity differ between = and LIKE in SQLite?"
    back: "The = operator is case-sensitive (`'anna' = 'Anna'` is false), while LIKE ignores case for Latin letters (`'Anna' LIKE 'anna'` is true). In PostgreSQL it is the reverse, and ILIKE does case-insensitive matching."
    tags: [pitfalls]
  - id: select-09
    front: "Which quotes distinguish a string value from a column name?"
    back: "Single quotes mark a string value: `'Anna'`. Double quotes mark a table or column name: `\"name\"`. In a strict engine `name = \"Anna\"` fails with \"column Anna does not exist\"."
    tags: [pitfalls]
  - id: select-10
    front: "Is an empty query result an error?"
    back: "No. \"There are no such rows\" is a valid answer and the query succeeds. The application must be ready for an empty list just as for a non-empty one."
    tags: [nulls]
