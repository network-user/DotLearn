conceptId: aggregation
cards:
  - id: aggregation-01
    front: "What is an aggregate function as an operation over a table?"
    back: "It is a fold: it takes all rows at once, runs an accumulator over them (a counter, a sum, a minimum) and emits one value. Many rows in, one scalar out."
    tags: [basics]
  - id: aggregation-02
    front: "How many rows does a query with an aggregate and no GROUP BY return?"
    back: "Exactly one, always. Even an empty table yields one result row. Not \"however many\" - precisely one."
    tags: [basics]
  - id: aggregation-03
    front: "How do COUNT(*), COUNT(col) and COUNT(DISTINCT col) differ?"
    back: "COUNT(*) counts rows; COUNT(col) counts non-NULL values of the column; COUNT(DISTINCT col) counts unique non-NULL values. Three different questions with different answers."
    tags: [count]
  - id: aggregation-04
    front: "How do aggregates treat NULL?"
    back: "Every aggregate except COUNT(*) ignores NULL. For AVG this affects both sides of the fraction: the average is the sum of known values divided by COUNT(amount), not COUNT(*)."
    tags: [nulls]
  - id: aggregation-05
    front: "Why can COUNT(email) silently lie instead of giving the row count?"
    back: "COUNT(col) counts only non-NULL values. If the column has NULLs, COUNT(email) returns fewer than the table's rows and the report undercounts with no error or warning. For the row count use COUNT(*)."
    tags: [pitfalls]
  - id: aggregation-06
    front: "What do SUM, AVG, MIN, MAX return over an empty set of rows?"
    back: "They return NULL, while COUNT returns 0. On an empty table SUM(amount) is not zero, it's \"I don't know\". SQLite's TOTAL(amount) returns 0.0 in this situation."
    tags: [nulls]
  - id: aggregation-07
    front: "Why does a hand-rolled SUM(amount) / COUNT(*) over integers lie?"
    back: "In SQLite integer-by-integer division truncates the fraction, and COUNT(*) also counts NULL rows. AVG is protected - it always returns a float. For manual division, cast: SUM(amount) * 1.0 / COUNT(*)."
    tags: [pitfalls]
  - id: aggregation-08
    front: "Why can AVG be misleading on skewed data?"
    back: "The mean is sensitive to outliers: a single extreme value drags it. On salaries with one manager, AVG shows a number nobody actually earns. Check AVG against MIN/MAX or the median."
    tags: [pitfalls]
  - id: aggregation-09
    front: "Can you mix an aggregate and a raw column without GROUP BY?"
    back: "No. SELECT city, COUNT(*) FROM orders asks the impossible: COUNT(*) is one number, city differs per row. Most engines error out; SQLite silently picks the city from an arbitrary row."
    tags: [pitfalls]
  - id: aggregation-10
    front: "Why give an aggregate an alias with AS?"
    back: "Without AS the result column is literally named COUNT(*), which is awkward for both code and humans. SELECT COUNT(*) AS orders_count gives it a meaningful name."
    tags: [basics]
