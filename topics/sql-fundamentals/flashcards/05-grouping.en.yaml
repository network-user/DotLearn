conceptId: grouping
cards:
  - id: grouping-01
    front: "What does GROUP BY do in terms of the \"buckets\" model?"
    back: "It deals rows into buckets - one bucket per unique key value. The aggregate is computed separately inside each bucket, and exactly one row per bucket goes into the result."
    tags: [basics]
  - id: grouping-02
    front: "What does the one-column rule for GROUP BY state?"
    back: "Every column in SELECT must either appear in GROUP BY or be wrapped in an aggregate (COUNT, SUM, AVG, MIN, MAX). Otherwise the engine has no single value to pick per group."
    tags: [basics]
  - id: grouping-03
    front: "How does SQLite treat a bare column outside GROUP BY?"
    back: "It raises no error and silently picks a value from an arbitrary row of the group. The query looks fine, but when storage row order changes it starts showing different values - an honest footgun."
    tags: [pitfalls]
  - id: grouping-04
    front: "Where do WHERE and HAVING sit in the logical pipeline?"
    back: "WHERE comes before GROUP BY: it filters individual rows and cannot see aggregates. HAVING comes after GROUP BY: it filters finished buckets and freely references COUNT, SUM and other aggregates."
    tags: [execution-order]
  - id: grouping-05
    front: "Why does WHERE COUNT(*) > 1 fail while HAVING does not?"
    back: "At the WHERE stage no groups exist yet and there is nothing to count - you get misuse of aggregate. A filter on an aggregate is phrased about a finished group, so it belongs in HAVING."
    tags: [pitfalls]
  - id: grouping-06
    front: "When should a condition go in WHERE rather than HAVING?"
    back: "If the predicate can be written without an aggregate (such as pages >= 400) it is a job for WHERE: it fires earlier and leaves fewer rows to group. Keep HAVING for predicates with aggregates."
    tags: [where-vs-having]
  - id: grouping-07
    front: "Must an aggregate in HAVING also appear in SELECT?"
    back: "No. An aggregate in HAVING need not appear in the output. For example, HAVING AVG(pages) > 300 filters authors but does not include the average itself in the result."
    tags: [where-vs-having]
  - id: grouping-08
    front: "What happens to rows where the grouping key is NULL?"
    back: "Unlike WHERE, GROUP BY treats all NULLs as \"equal\" and puts them in one shared bucket. To exclude such rows, drop them before grouping with WHERE col IS NOT NULL."
    tags: [nulls]
  - id: grouping-09
    front: "Can you group by several columns or by an expression?"
    back: "Yes. By several columns - one bucket per unique combination of values. By an expression such as substr(paid_at, 1, 7) - one bucket per computed value like 2024-01."
    tags: [expressions]
  - id: grouping-10
    front: "What does GROUP BY return if no rows survive WHERE?"
    back: "Zero rows - no cards, no buckets. The same aggregate query without GROUP BY would return a single row with COUNT(*) = 0."
    tags: [nulls]
