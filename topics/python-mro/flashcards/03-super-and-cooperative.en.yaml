conceptId: super-and-cooperative
cards:
  - id: super-and-cooperative-01
    front: What does super() actually do if it is not calling the parent?
    back: >-
      super() returns a proxy that continues search from the next class in the MRO
      of object self, not from the static hierarchy of the class where super() is
      written. With single inheritance the next class is the parent, so the myth is
      harmless.
    tags: [super, model]
  - id: super-and-cooperative-02
    front: Whose MRO determines where super() inside class X goes?
    back: >-
      The actual class of object self. Python finds X in that MRO and continues from
      the class immediately after X. After refers to self's list, not X's hierarchy.
    tags: [super, mro]
  - id: super-and-cooperative-03
    front: Where does super() from B go if self is an instance of D(B, C)?
    back: >-
      To C, although C is not a parent of B. In the MRO of D - [D, B, C, A,
      object] - C stands right after B, so super() passes control there (a sibling,
      not an ancestor).
    tags: [super, surprise]
  - id: super-and-cooperative-04
    front: What is cooperative multiple inheritance?
    back: >-
      Each class does its part and then calls super(). One call at the leaf walks
      all classes exactly once in MRO order; classes do not know about each other.
    tags: [super, cooperative]
  - id: super-and-cooperative-05
    front: What happens if one class in a cooperative chain skips super()?
    back: >-
      The baton breaks: all classes after it in MRO silently do not run. No error -
      just missing work (e.g. part of initialization never happens).
    tags: [super, pitfall]
  - id: super-and-cooperative-06
    front: How do you forward arguments in cooperative __init__?
    back: >-
      Each class takes its named arguments from **kwargs and passes the rest with
      super().__init__(**kwargs). By object.__init__, which expects no arguments,
      kwargs must be empty.
    tags: [super, kwargs]
  - id: super-and-cooperative-07
    front: What does super(B, d).m() print if d is an instance of D(B, C)?
    back: >-
      C. Two-argument super(B, d) searches the MRO of d - [D, B, C, A, object] -
      for the class after B, namely C. After refers to self's actual MRO, not B's
      hierarchy.
    tags: [super, explicit]
  - id: super-and-cooperative-08
    front: Why is hard-coding Base.__init__(self, ...) dangerous?
    back: >-
      It calls a specific class bypassing MRO. In a diamond that means double
      invocation of a common ancestor or skipping sibling classes. In cooperative
      hierarchies always use super().
    tags: [super, pitfall]
  - id: super-and-cooperative-09
    front: Why does bare super() work in Python 3?
    back: >-
      The compiler sees super in a method and passes the class (via __class__ cell)
      and self. So super() equals super(__class__, self) and survives renaming the
      class.
    tags: [super, internals]
  - id: super-and-cooperative-10
    front: Why cannot you call super() outside a method body?
    back: >-
      Bare super() relies on the __class__ cell and first positional argument that
      the compiler injects only inside a method. Outside a method that context does
      not exist.
    tags: [super, internals]
