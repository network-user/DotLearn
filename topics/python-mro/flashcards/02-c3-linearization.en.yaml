conceptId: c3-linearization
cards:
  - id: c3-linearization-01
    front: What three invariants does C3 linearization hold at once?
    back: >-
      Class before its ancestors; preserving parent order from the declaration
      (local precedence order); monotonicity - the class order is consistent with
      all ancestor orders.
    tags: [c3, invariants]
  - id: c3-linearization-02
    front: What formula computes linearization L[C]?
    back: >-
      L[C] = C + merge(L[B1], ..., L[Bn], [B1, ..., Bn]): the class itself, then
      merge of all parent linearizations plus the parent list. Base case: L[object]
      = [object].
    tags: [c3, formula]
  - id: c3-linearization-03
    front: What are head and tail in merge?
    back: >-
      Head is the first list element; tail is everything else. On each merge step
      the head of a list is considered as a candidate to append to the result.
    tags: [c3, merge]
  - id: c3-linearization-04
    front: When is a head a good candidate in merge?
    back: >-
      When it does not appear in the tail of any merged list. Being first (as head)
      in another list is not a conflict - only positions in the tail count.
    tags: [c3, merge]
  - id: c3-linearization-05
    front: What if the first list's head is a bad candidate?
    back: >-
      Try the next list's head. A bad head is not failure; merge tries each list's
      head in turn.
    tags: [c3, merge]
  - id: c3-linearization-06
    front: When does C3 declare linearization impossible?
    back: >-
      When lists are still non-empty but no head is a good candidate. Python then
      raises TypeError about inconsistent MRO.
    tags: [c3, error]
  - id: c3-linearization-07
    front: What MRO does diamond class D(B, C) give when B(A) and C(A)?
    back: >-
      [D, B, C, A, object]. A is delayed until both descendants B and C are in the
      list - the descendant-before-ancestor invariant.
    tags: [c3, diamond]
  - id: c3-linearization-08
    front: Why did naive depth-first search break the diamond?
    back: >-
      It put an ancestor before a descendant: for D(B, C) after deduping it gave
      [D, B, A, C, object] where A was before descendant C. That silently broke
      overrides in C.
    tags: [c3, dfs]
  - id: c3-linearization-09
    front: Common mistake - checking the candidate only in its own list. What is wrong?
    back: >-
      A good candidate must not be in the tail of ANY merged list, including the
      parent list [B1, ..., Bn]. Skip one list and you get the wrong order.
    tags: [c3, pitfall]
  - id: c3-linearization-10
    front: Where does the name C3 come from?
    back: >-
      Not a Python version - it is the algorithm name from a Dylan linearization
      paper. Three Cs match three properties it guarantees. Python adopted it for
      new-style classes from 2.3.
    tags: [c3, history]
