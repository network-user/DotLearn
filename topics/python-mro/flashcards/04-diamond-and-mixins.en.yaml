conceptId: diamond-and-mixins
cards:
  - id: diamond-and-mixins-01
    front: What makes up a diamond inheritance shape?
    back: >-
      A common ancestor on top, two independent classes on the sides, and a
      descendant inheriting both. C3 linearization was invented to traverse this
      figure correctly.
    tags: [diamond, basics]
  - id: diamond-and-mixins-02
    front: Why does the common ancestor run only once in a diamond?
    back: >-
      C3 invariant: ancestor after all descendants. Base has two descendants, so it
      is delayed to the end of the list and super() passes through it exactly once.
    tags: [diamond, c3]
  - id: diamond-and-mixins-03
    front: What is MRO of class Both(Left, Right) where Left and Right inherit Base?
    back: >-
      [Both, Left, Right, Base, object]. Calling Both() with cooperative super()
      prints both, left, right, base - each class once.
    tags: [diamond, mro]
  - id: diamond-and-mixins-04
    front: What would naive DFS do wrong on a diamond?
    back: >-
      Give [Both, Left, Base, Right, object]: Base before its descendant Right.
      That breaks descendant-before-ancestor and the cooperative chain - super()
      from Left goes straight to Base, skipping Right.
    tags: [diamond, dfs]
  - id: diamond-and-mixins-05
    front: What is a mixin?
    back: >-
      A class not meant for standalone use. It adds one narrow capability and slots
      into someone else's method chain via cooperative super().
    tags: [mixins, basics]
  - id: diamond-and-mixins-06
    front: Where do mixins go in the base list - left or right of the base?
    back: >-
      Left: class User(Mixin1, Mixin2, Base). Then mixins appear before the base in
      MRO, intercept the call, add behavior, and forward via super(). Right of the
      base, the mixin never runs.
    tags: [mixins, order]
  - id: diamond-and-mixins-07
    front: What happens if you put a mixin to the right of the base class?
    back: >-
      The base is earlier in MRO and intercepts first. If it does not call super()
      (bases usually need not), the chain breaks and the mixin silently never runs.
    tags: [mixins, pitfall]
  - id: diamond-and-mixins-08
    front: When does Python raise TypeError about MRO?
    back: >-
      When two bases impose incompatible order requirements and C3 finds no good
      candidate. The error happens at class declaration time, not at call time.
    tags: [diamond, error]
  - id: diamond-and-mixins-09
    front: Why does class X(A, B) fail when B inherits A?
    back: >-
      B must stand before A, but X(A, B) demands the opposite. Requirements
      conflict. Fix: class X(B, A).
    tags: [diamond, error]
  - id: diamond-and-mixins-10
    front: How do you localize an MRO problem without running the whole module?
    back: >-
      Create a class dynamically with type("X", (A, B), {}) in try/except
      TypeError. For an existing class the final order is always in Cls.__mro__.
    tags: [diamond, debugging]
