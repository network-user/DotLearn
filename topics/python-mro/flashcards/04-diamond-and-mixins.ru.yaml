conceptId: diamond-and-mixins
cards:
  - id: diamond-and-mixins-01
    front: Из чего состоит ромбовидное наследование (ромб)?
    back: >-
      Из общего предка наверху, двух независимых классов по бокам и потомка,
      наследующего обоим. Ради корректного прохода этой фигуры и придумали
      C3-линеаризацию.
    tags: [diamond, basics]
  - id: diamond-and-mixins-02
    front: Почему в ромбе общий предок выполняется только один раз?
    back: >-
      Из-за инварианта C3: предок стоит в MRO позже всех своих потомков. У Base два
      потомка, поэтому он откладывается до конца списка, и проход super() идёт через
      него ровно один раз.
    tags: [diamond, c3]
  - id: diamond-and-mixins-03
    front: Какой MRO у class Both(Left, Right), где Left и Right наследуют Base?
    back: >-
      [Both, Left, Right, Base, object]. Вызов Both() с кооперативным super()
      печатает both, left, right, base - каждый класс по разу.
    tags: [diamond, mro]
  - id: diamond-and-mixins-04
    front: Что плохого сделал бы наивный DFS с ромбом?
    back: >-
      Дал бы [Both, Left, Base, Right, object]: Base встал бы раньше своего потомка
      Right. Это и нарушение порядка «потомок перед предком», и обрыв кооперативной
      цепочки - super() из Left ушёл бы прямо в Base, минуя Right.
    tags: [diamond, dfs]
  - id: diamond-and-mixins-05
    front: Что такое миксин?
    back: >-
      Класс, не предназначенный для самостоятельного использования. Он добавляет
      одну узкую способность классу, к которому подмешан, и встраивается в чужую
      цепочку методов через кооперативный super().
    tags: [mixins, basics]
  - id: diamond-and-mixins-06
    front: Где в списке базовых классов ставить миксины - слева или справа от базы?
    back: >-
      Слева: class User(Mixin1, Mixin2, Base). Тогда в MRO миксины окажутся раньше
      базы, перехватят вызов, добавят своё поведение и через super() пробросят его в
      базу. Справа от базы миксин не сработает.
    tags: [mixins, order]
  - id: diamond-and-mixins-07
    front: Что будет, если поставить миксин справа от базового класса?
    back: >-
      База окажется в MRO раньше миксина и перехватит вызов первой. Если база не
      зовёт super() (а ей обычно незачем), цепочка оборвётся и миксин молча не
      выполнится.
    tags: [mixins, pitfall]
  - id: diamond-and-mixins-08
    front: Когда Python бросает TypeError про MRO?
    back: >-
      Когда требования двух базовых классов к порядку противоречат друг другу и C3
      не находит ни одного хорошего кандидата. Ошибка возникает в момент объявления
      класса (class ...:), а не при вызове.
    tags: [diamond, error]
  - id: diamond-and-mixins-09
    front: Почему class X(A, B), где B наследует A, падает с ошибкой MRO?
    back: >-
      B наследует A, значит B обязан стоять раньше A. Но в X(A, B) вы перечислили A
      раньше B, требуя обратного порядка. Требования несовместимы. Лечится
      перестановкой: class X(B, A).
    tags: [diamond, error]
  - id: diamond-and-mixins-10
    front: Как локализовать проблему MRO, не запуская весь модуль?
    back: >-
      Создать класс динамически через type("X", (A, B), {}) в try/except TypeError -
      так локализуется именно конфликт MRO. Для готового класса итоговый порядок
      всегда виден в Cls.__mro__.
    tags: [diamond, debugging]
