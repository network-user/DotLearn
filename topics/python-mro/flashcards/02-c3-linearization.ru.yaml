conceptId: c3-linearization
cards:
  - id: c3-linearization-01
    front: Какие три инварианта одновременно держит C3-линеаризация?
    back: >-
      Класс раньше своих предков; сохранение порядка родителей из объявления
      (local precedence order); монотонность - порядок класса согласован с
      порядками всех его предков.
    tags: [c3, invariants]
  - id: c3-linearization-02
    front: По какой формуле вычисляется линеаризация L[C]?
    back: >-
      L[C] = C + merge(L[B1], ..., L[Bn], [B1, ..., Bn]): сам класс, затем слияние
      линеаризаций всех родителей плюс список самих родителей. Базовый случай -
      L[object] = [object].
    tags: [c3, formula]
  - id: c3-linearization-03
    front: Что такое head и tail в операции merge?
    back: >-
      Head - это первый элемент списка, tail - всё остальное (хвост). На каждом шаге
      merge рассматривает head очередного списка как кандидата на добавление в
      результат.
    tags: [c3, merge]
  - id: c3-linearization-04
    front: Когда head считается «хорошим кандидатом» в merge?
    back: >-
      Когда он не появляется в хвосте (tail) ни одного из сливаемых списков.
      Присутствие первым (как head) другого списка конфликтом не считается - только
      позиция в хвосте.
    tags: [c3, merge]
  - id: c3-linearization-05
    front: Что делать, если head первого списка оказался плохим кандидатом?
    back: >-
      Перейти к head следующего списка и проверить его. Плохой head - не повод
      объявлять ошибку; merge пробует head каждого списка по очереди.
    tags: [c3, merge]
  - id: c3-linearization-06
    front: Когда C3 объявляет, что линеаризация невозможна?
    back: >-
      Когда списки ещё не пусты, но ни один head не оказался хорошим кандидатом.
      Тогда Python бросает TypeError про невозможность построить согласованный MRO.
    tags: [c3, error]
  - id: c3-linearization-07
    front: Какой MRO даёт ромб class D(B, C), где B(A) и C(A)?
    back: >-
      [D, B, C, A, object]. A откладывается до тех пор, пока в список не встанут оба
      его потомка B и C - в этом и состоит инвариант «класс раньше предков».
    tags: [c3, diamond]
  - id: c3-linearization-08
    front: Почему наивный обход в глубину (DFS) ломал ромб?
    back: >-
      Он ставил предка раньше потомка: для D(B, C) после удаления повторов давал
      [D, B, A, C, object], где A оказывался раньше своего потомка C. Это тихо
      ломало переопределения метода в C.
    tags: [c3, dfs]
  - id: c3-linearization-09
    front: Частая ошибка - проверять кандидата только в «своём» списке. В чём она?
    back: >-
      Хороший кандидат не должен быть в хвосте НИ ОДНОГО из сливаемых списков,
      включая список самих родителей [B1, ..., Bn]. Пропустить хотя бы один список -
      получить неверный порядок.
    tags: [c3, pitfall]
  - id: c3-linearization-10
    front: Откуда взялось название «C3»?
    back: >-
      Это не версия Python, а имя алгоритма из статьи о линеаризации в языке Dylan.
      Три «C» соответствуют трём свойствам, которые он гарантирует. Python
      заимствовал его для классов нового стиля с версии 2.3.
    tags: [c3, history]
