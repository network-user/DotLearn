conceptId: mro-basics
cards:
  - id: mro-basics-01
    front: Что такое MRO (method resolution order)?
    back: >-
      Это плоский упорядоченный список классов в Cls.__mro__, по которому Python
      ищет атрибуты. Он вычисляется один раз при создании класса, а не строится
      заново при каждом обращении.
    tags: [mro, basics]
  - id: mro-basics-02
    front: Как Python ищет атрибут obj.attr?
    back: >-
      Он проходит по __mro__ класса слева направо и останавливается на первом
      классе, в __dict__ которого есть attr. Это не обход дерева наследования, а
      проход по заранее вычисленному списку.
    tags: [mro, lookup]
  - id: mro-basics-03
    front: Чем отличаются Cls.__mro__ и Cls.mro()?
    back: >-
      Содержимое одинаковое: __mro__ - это кортеж только для чтения, а mro() -
      метод, возвращающий тот же порядок списком. Метод mro() можно переопределить
      в метаклассе, но в обычном коде это почти не нужно.
    tags: [mro, api]
  - id: mro-basics-04
    front: Чей метод выигрывает при конфликте имён в множественном наследовании?
    back: >-
      Тот класс, который стоит в __mro__ раньше. Никакого правила «базовый класс
      главнее» нет - решает только позиция в списке.
    tags: [mro, conflict]
  - id: mro-basics-05
    front: Как порядок базовых классов в скобках влияет на MRO?
    back: >-
      Левый родитель встаёт в MRO раньше правого. Для class Widget(Mixin, Base)
      MRO даёт [Widget, Mixin, Base, object], и role берётся из Mixin; перестановка
      на (Base, Mixin) отдаёт победу Base.
    tags: [mro, order]
  - id: mro-basics-06
    front: Почему производный класс всегда стоит в MRO раньше своих предков?
    back: >-
      Именно этот инвариант делает возможным переопределение: версия метода из
      потомка находится раньше версии предка. Важна позиция в списке, а не «уровень»
      в дереве.
    tags: [mro, override]
  - id: mro-basics-07
    front: Почему object всегда замыкает MRO?
    back: >-
      Чтобы любой ваш метод, определённый выше, гарантированно перекрыл реализацию
      по умолчанию из object. Если бы object мог оказаться в середине, его __init__
      или __eq__ иногда выигрывали бы у ваших.
    tags: [mro, object]
  - id: mro-basics-08
    front: Чем type(obj) отличается от MRO при поиске атрибута?
    back: >-
      type(obj) - это только класс экземпляра, первый элемент __mro__. Поиск
      атрибута видит весь список MRO, а не один класс, поэтому атрибут может найтись
      в любом из предков.
    tags: [mro, pitfall]
  - id: mro-basics-09
    front: Что напечатает C.x для class C(A, B), если x есть и в A, и в B?
    back: >-
      Версию из A, потому что A стоит в MRO раньше B. Поиск останавливается на
      первом совпадении и до B не доходит. Атрибут, который есть только в B, при
      этом всё равно находится.
    tags: [mro, lookup]
  - id: mro-basics-10
    front: Какой самый надёжный способ узнать порядок разрешения методов?
    back: >-
      Распечатать Cls.__mro__ и прочитать список слева направо - первое совпадение
      и есть ответ. Гадать по картинке дерева наследования ненадёжно, потому что C3
      переставляет классы.
    tags: [mro, debugging]
