conceptId: mro-basics
cards:
  - id: mro-basics-01
    front: What is MRO (method resolution order)?
    back: >-
      It is the flat ordered list of classes in Cls.__mro__ that Python uses to
      find attributes. It is computed once when the class is created, not rebuilt
      on every access.
    tags: [mro, basics]
  - id: mro-basics-02
    front: How does Python look up obj.attr?
    back: >-
      It walks the class __mro__ left to right and stops at the first class whose
      __dict__ contains attr. This is not a tree walk but a pass over a precomputed
      list.
    tags: [mro, lookup]
  - id: mro-basics-03
    front: How do Cls.__mro__ and Cls.mro() differ?
    back: >-
      Same contents: __mro__ is a read-only tuple; mro() is a method returning the
      same order as a list. mro() can be overridden in a metaclass, but that is rare
      in ordinary code.
    tags: [mro, api]
  - id: mro-basics-04
    front: Whose method wins on a name conflict under multiple inheritance?
    back: >-
      Whichever class appears earlier in __mro__. There is no rule that the base
      class wins - only position in the list matters.
    tags: [mro, conflict]
  - id: mro-basics-05
    front: How does base class order in parentheses affect MRO?
    back: >-
      The left parent appears earlier in MRO. For class Widget(Mixin, Base) MRO is
      [Widget, Mixin, Base, object] and role comes from Mixin; swapping to (Base,
      Mixin) gives Base the win.
    tags: [mro, order]
  - id: mro-basics-06
    front: Why does the derived class always come before its ancestors in MRO?
    back: >-
      That invariant makes overriding possible: the descendant's method is found
      before the ancestor's. Position in the list matters, not level in the tree.
    tags: [mro, override]
  - id: mro-basics-07
    front: Why does object always close MRO?
    back: >-
      So any method you define higher up always overrides the default from object.
      If object could land in the middle, its __init__ or __eq__ might sometimes
      beat yours.
    tags: [mro, object]
  - id: mro-basics-08
    front: How is type(obj) different from MRO during attribute lookup?
    back: >-
      type(obj) is only the instance's class, the first element of __mro__. Lookup
      sees the entire MRO list, so an attribute may be found in any ancestor.
    tags: [mro, pitfall]
  - id: mro-basics-09
    front: What does C.x print for class C(A, B) if x exists in both A and B?
    back: >-
      The version from A, because A is earlier in MRO. Search stops at the first
      match and never reaches B. An attribute only in B is still found when search
      gets there.
    tags: [mro, lookup]
  - id: mro-basics-10
    front: What is the most reliable way to learn method resolution order?
    back: >-
      Print Cls.__mro__ and read the list left to right - the first match is the
      answer. Guessing from a tree diagram is unreliable because C3 reorders
      classes.
    tags: [mro, debugging]
