conceptId: super-and-cooperative
cards:
  - id: super-and-cooperative-01
    front: Что на самом деле делает super(), если это не «вызов родителя»?
    back: >-
      super() возвращает прокси, который продолжает поиск со следующего класса в
      MRO объекта self, а не в статической иерархии класса, где написан super().
      Для одиночного наследования следующий и есть родитель, поэтому ложь
      безвредна.
    tags: [super, model]
  - id: super-and-cooperative-02
    front: От какого MRO зависит, куда уйдёт super() внутри класса X?
    back: >-
      От MRO настоящего класса объекта self. Python находит X в этом MRO и
      продолжает поиск с класса, идущего сразу после X. «После» относится к списку
      self, а не к иерархии X.
    tags: [super, mro]
  - id: super-and-cooperative-03
    front: Куда уйдёт super() из B, если self - экземпляр D(B, C)?
    back: >-
      В C, хотя C не родитель B. В MRO объекта D - [D, B, C, A, object] - C стоит
      сразу после B, поэтому super() передаёт управление именно туда (sibling, а не
      предку).
    tags: [super, surprise]
  - id: super-and-cooperative-04
    front: Что такое кооперативное множественное наследование?
    back: >-
      Схема, где каждый класс делает свою часть работы и затем зовёт super().
      Тогда один вызов на листе иерархии проходит через все классы ровно по одному
      разу в порядке MRO; классы не знают друг о друге.
    tags: [super, cooperative]
  - id: super-and-cooperative-05
    front: Что произойдёт, если один класс в кооперативной цепочке не вызовет super()?
    back: >-
      Эстафета оборвётся: все классы, стоящие после него по MRO, молча не
      выполнятся. Ошибки не будет - просто часть работы (например, инициализации)
      тихо не произойдёт.
    tags: [super, pitfall]
  - id: super-and-cooperative-06
    front: Как правильно пробрасывать аргументы в кооперативном __init__?
    back: >-
      Каждый класс забирает свои именованные аргументы из **kwargs, а остаток
      передаёт дальше через super().__init__(**kwargs). До object.__init__, который
      аргументов не ждёт, kwargs должен дойти пустым.
    tags: [super, kwargs]
  - id: super-and-cooperative-07
    front: Что напечатает super(B, d).m(), если d - экземпляр D(B, C)?
    back: >-
      C. Двухаргументная форма super(B, d) ищет в MRO объекта d - [D, B, C, A,
      object] - класс после B, то есть C. «После» относится к MRO настоящего класса
      self, а не к иерархии B.
    tags: [super, explicit]
  - id: super-and-cooperative-08
    front: Чем опасен жёсткий вызов Base.__init__(self, ...) вместо super()?
    back: >-
      Он вызывает конкретный класс в обход MRO. В ромбе это приводит к двойному
      вызову общего предка либо к пропуску sibling-классов. В кооперативной
      иерархии всегда используйте super().
    tags: [super, pitfall]
  - id: super-and-cooperative-09
    front: Почему super() без аргументов вообще работает в Python 3?
    back: >-
      Компилятор замечает обращение к super в методе и неявно прокидывает класс
      (через ячейку __class__) и self. Поэтому super() эквивалентен super(__class__,
      self) и не ломается при переименовании класса.
    tags: [super, internals]
  - id: super-and-cooperative-10
    front: Почему super() нельзя вызвать вне тела метода?
    back: >-
      Пустой super() опирается на ячейку __class__ и первый позиционный аргумент,
      которые компилятор подставляет только внутри метода. Вне тела метода нужного
      контекста нет.
    tags: [super, internals]
