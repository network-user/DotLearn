exercises:
  - id: c3-merge-rule-001
    concept: c3-linearization
    type: theory-quiz
    difficulty: 1
    prompt: "In the merge operation, a list's head is a good candidate and goes into the result if..."
    choices:
      - id: a
        text: "...it does not appear in the tail of any of the lists being merged."
      - id: b
        text: "...it is first in at least one list."
      - id: c
        text: "...it appears in all lists at once."
      - id: d
        text: "...it is the last remaining class."
    correct: [a]
    explanation: "A candidate is good if no list requires some class before it - that is, the head does not appear in any merged list's tail. Otherwise we would break someone's order."
    variants:
      - prompt: "What are head and tail of a list in merge?"
        choices:
          - id: a
            text: "head is the first element; tail is everything after it."
          - id: b
            text: "head is the last element; tail is the first."
          - id: c
            text: "head is the class itself; tail is its metaclass."
          - id: d
            text: "head and tail are two different parent lists."
        correct: [a]
        explanation: "head is the first element, tail is the rest. Candidates come from head; the check is against tails of other lists."
      - prompt: "When does C3 declare linearization impossible?"
        choices:
          - id: a
            text: "When lists are still non-empty but no head is a good candidate."
          - id: b
            text: "When the very first head is a bad candidate."
          - id: c
            text: "When a class has more than two parents."
          - id: d
            text: "When one list became empty before the others."
        correct: [a]
        explanation: "A bad head in the first list is not fatal: try the next list's head. Failure happens only when all heads are bad while lists remain."

  - id: c3-base-case-001
    concept: c3-linearization
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the blanks in the C3 linearization definition for class C with parents B1 and B2."
    template: |
      L[object] = [{{base}}]
      L[C] = C + merge(L[B1], L[B2], [{{parents}}])
    blanks:
      base:
        accept: ["object"]
      parents:
        accept: ["B1, B2"]
        accept_regex: '^B1\s*,\s*B2$'
    hints:
      - "The recursion base case is a class with no parents except itself; its linearization is a single element."
      - "The last merge argument is the list of direct parents in declaration order."
    variants:
      - prompt: "Fill in the blanks: linearization of class D with a single parent B."
        template: |
          L[D] = {{self_cls}} + merge(L[B], [{{parent}}])
        blanks:
          self_cls:
            accept: ["D"]
          parent:
            accept: ["B"]
      - prompt: "Fill in: what is the base case of C3 recursion?"
        template: |
          L[{{root}}] = [object]
        blanks:
          root:
            accept: ["object"]

  - id: c3-diamond-trace-001
    concept: c3-linearization
    type: predict-output
    difficulty: 3
    prompt: "What does this program print? Linearize D by hand with merge."
    snippet: |
      class A: pass
      class B(A): pass
      class C(A): pass
      class D(B, C): pass

      print([c.__name__ for c in D.__mro__])
    expected:
      kind: stdout
      value: "['D', 'B', 'C', 'A', 'object']"
    hints:
      - "merge combines [B, A, object], [C, A, object], [B, C]. On each step take a list's head if it is not in any other list's tail."
      - "A appears only after both its descendants B and C are in the list. That is why A is delayed."
    variants:
      - snippet: |
          class A: pass
          class B(A): pass
          class C(A): pass
          class D(C, B): pass

          print([c.__name__ for c in D.__mro__])
        expected:
          kind: stdout
          value: "['D', 'C', 'B', 'A', 'object']"
      - snippet: |
          class A: pass
          class B(A): pass
          class C(B): pass

          print([c.__name__ for c in C.__mro__])
        expected:
          kind: stdout
          value: "['C', 'B', 'A', 'object']"

  - id: c3-naive-vs-c3-001
    concept: c3-linearization
    type: theory-quiz
    difficulty: 3
    prompt: "For diamond `D(B, C)` where `B` and `C` inherit `A`, naive depth-first search would give `[D, B, A, C, object]`. Why is that bad?"
    choices:
      - id: a
        text: "`A` ends up before its descendant `C`, so overriding a method in `C` stops working."
      - id: b
        text: "`object` is not last, so `__init__` breaks."
      - id: c
        text: "`D` is first but should be last."
      - id: d
        text: "Nothing: this order is fully equivalent to C3."
    correct: [a]
    explanation: "Naive DFS puts ancestor `A` before descendant `C`. If both define the same method, the version from `A` runs, ignoring the more specialized one in `C`. C3 preserves 'descendant before ancestor' and fixes that."

  - id: c3-merge-impl-001
    concept: c3-linearization
    type: python-function
    difficulty: 5
    prompt: "Implement `c3_merge(seqs)`: accept a list of non-empty sequences (lists of names) and merge them by the C3 rule. Return the final list. If merge is impossible, return `None`."
    starter: |
      def c3_merge(seqs):
          ...
    cases:
      - call: "c3_merge([['B', 'A', 'object'], ['C', 'A', 'object'], ['B', 'C']])"
        expect: ["B", "C", "A", "object"]
      - call: "c3_merge([['A', 'object']])"
        expect: ["A", "object"]
      - call: "c3_merge([['X', 'Y'], ['Y', 'X']])"
        expect: null
    hints:
      - "Repeat while non-empty lists remain. On each iteration find one good head and remove it everywhere."
      - "A head is good if it is not in the tail (everything except the first element) of any sequence. Try candidates left to right."
      - "If a full pass finds no good head while non-empty lists remain, merge is impossible - return None."
    solution: |
      def c3_merge(seqs):
          seqs = [list(s) for s in seqs]
          result = []
          while True:
              seqs = [s for s in seqs if s]
              if not seqs:
                  return result
              candidate = None
              for seq in seqs:
                  head = seq[0]
                  if not any(head in s[1:] for s in seqs):
                      candidate = head
                      break
              if candidate is None:
                  return None
              result.append(candidate)
              for s in seqs:
                  if s and s[0] == candidate:
                      del s[0]
