exercises:
  - id: diamond-what-001
    concept: diamond-and-mixins
    type: theory-quiz
    difficulty: 1
    prompt: "Что отличает поведение ромбовидного наследования в Python от наивного обхода в глубину?"
    choices:
      - id: a
        text: "C3 ставит общего предка после обоих потомков, поэтому проход super() идёт через него один раз."
      - id: b
        text: "Python вообще запрещает ромбовидное наследование."
      - id: c
        text: "Общий предок вызывается дважды - по разу за каждый путь."
      - id: d
        text: "Порядок выполнения зависит от того, в каком файле объявлены классы."
    correct: [a]
    explanation: "Инвариант C3 - предок позже всех своих потомков. В ромбе у общего предка два потомка, поэтому он откладывается до конца и кооперативный super() проходит через него ровно один раз, а не дважды, как при наивном DFS."
    variants:
      - prompt: "Куда принято ставить миксин в списке базовых классов?"
        choices:
          - id: a
            text: "Слева от базового класса, чтобы он раньше перехватил вызов и пробросил его дальше через super()."
          - id: b
            text: "Справа от базового класса, чтобы база выполнилась первой."
          - id: c
            text: "Порядок не имеет значения."
          - id: d
            text: "Миксин нельзя комбинировать с обычным базовым классом."
        correct: [a]
        explanation: "Миксин должен оказаться в MRO раньше базы, иначе база перехватит вызов первой и (если не зовёт super) оборвёт цепочку. Поэтому миксины перечисляют слева: class User(Mixin, Base)."
      - prompt: "Что такое миксин?"
        choices:
          - id: a
            text: "Класс, добавляющий одну узкую способность и встраивающийся в чужую цепочку через super()."
          - id: b
            text: "Класс без методов, только с данными."
          - id: c
            text: "Класс, от которого нельзя наследоваться."
          - id: d
            text: "Синоним абстрактного базового класса."
        correct: [a]
        explanation: "Миксин не предназначен для самостоятельного использования: он подмешивает одну способность к классу и опирается на кооперативный super(), не зная заранее, к кому подмешан."

  - id: diamond-once-trace-001
    concept: diamond-and-mixins
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Проследите, сколько раз выполнится Base."
    snippet: |
      class Base:
          def __init__(self):
              print("base")

      class Left(Base):
          def __init__(self):
              print("left")
              super().__init__()

      class Right(Base):
          def __init__(self):
              print("right")
              super().__init__()

      class Both(Left, Right):
          def __init__(self):
              print("both")
              super().__init__()

      Both()
    expected:
      kind: stdout
      value: |
        both
        left
        right
        base
    hints:
      - "MRO у Both - это [Both, Left, Right, Base, object]. Каждый класс печатает себя и зовёт следующего по этому списку."
      - "super() из Left уходит не в Base, а в Right - следующий по MRO. Base стоит последним, поэтому печатается один раз."
    variants:
      - snippet: |
          class Base:
              def __init__(self):
                  print("base")

          class Left(Base):
              def __init__(self):
                  print("left")
                  super().__init__()

          class Right(Base):
              def __init__(self):
                  print("right")
                  super().__init__()

          class Both(Right, Left):
              def __init__(self):
                  print("both")
                  super().__init__()

          Both()
        expected:
          kind: stdout
          value: |
            both
            right
            left
            base

  - id: mixin-order-001
    concept: diamond-and-mixins
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Чей метод f перехватит вызов?"
    snippet: |
      class Mixin:
          def f(self):
              return "mixin"

      class Base:
          def f(self):
              return "base"

      class C(Mixin, Base):
          pass

      print(C().f())
    expected:
      kind: stdout
      value: "mixin"
    hints:
      - "MRO ищет метод слева направо по списку баз. Кто стоит раньше - Mixin или Base?"
      - "MRO у C - [C, Mixin, Base, object]. f находится в Mixin первым, поиск останавливается там."
    variants:
      - snippet: |
          class Mixin:
              def f(self):
                  return "mixin"

          class Base:
              def f(self):
                  return "base"

          class C(Base, Mixin):
              pass

          print(C().f())
        expected:
          kind: stdout
          value: "base"

  - id: mro-conflict-001
    concept: diamond-and-mixins
    type: theory-quiz
    difficulty: 3
    prompt: "Объявление `class X(A, B)`, где `class B(A)`, падает с `TypeError: Cannot create a consistent method resolution order`. Почему?"
    choices:
      - id: a
        text: "B наследует A, поэтому обязан стоять раньше A; но в X(A, B) указан обратный порядок - требования несовместимы."
      - id: b
        text: "У класса не может быть больше одного базового класса."
      - id: c
        text: "A и B определяют одинаковые методы, и Python не знает, какой выбрать."
      - id: d
        text: "object должен стоять первым, а здесь он последний."
    correct: [a]
    explanation: "B - потомок A, значит инвариант C3 требует B перед A в любом MRO. Но X(A, B) перечисляет A первым, требуя A перед B. Два требования противоречат друг другу, линеаризации нет - отсюда TypeError в момент объявления класса. Лечится перестановкой: class X(B, A)."

  - id: cooperative-mixin-impl-001
    concept: diamond-and-mixins
    type: python-function
    difficulty: 4
    prompt: "Реализуйте миксин-цепочку: `DoubleMixin` и `IncMixin` оборачивают метод `value()` базового класса `Box`. `DoubleMixin.value` удваивает результат следующего по MRO, `IncMixin.value` прибавляет 1. Класс `B(DoubleMixin, IncMixin, Box)` при `Box.value()==10` должен дать `(10 + 1) * 2 = 22`. Допишите тела методов value, опираясь на super()."
    starter: |
      class Box:
          def value(self):
              return 10

      class DoubleMixin:
          def value(self):
              ...

      class IncMixin:
          def value(self):
              ...

      class B(DoubleMixin, IncMixin, Box):
          pass
    cases:
      - call: "B().value()"
        expect: 22
      - call: "DoubleMixin in B.__mro__"
        expect: true
    hints:
      - "Каждый миксин не знает, кто стоит за ним. Он берёт результат super().value() и применяет к нему свою операцию."
      - "MRO у B - [B, DoubleMixin, IncMixin, Box, object]. value стартует в DoubleMixin, который должен сначала получить значение «снизу» через super(), а потом удвоить."
      - "DoubleMixin: верните 2 * super().value(). IncMixin: верните super().value() + 1. Порядок применения задаёт сам MRO."
    solution: |
      class Box:
          def value(self):
              return 10

      class DoubleMixin:
          def value(self):
              return 2 * super().value()

      class IncMixin:
          def value(self):
              return super().value() + 1

      class B(DoubleMixin, IncMixin, Box):
          pass
