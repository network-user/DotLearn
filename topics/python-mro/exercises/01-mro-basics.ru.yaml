exercises:
  - id: mro-what-is-001
    concept: mro-basics
    type: theory-quiz
    difficulty: 1
    prompt: "Что такое MRO (method resolution order) в Python?"
    choices:
      - id: a
        text: "Дерево наследования, которое Python обходит заново при каждом вызове метода."
      - id: b
        text: "Плоский упорядоченный список классов, по которому Python ищет атрибут слева направо."
      - id: c
        text: "Случайный порядок, в котором интерпретатор перебирает родителей."
      - id: d
        text: "Список только тех методов, которые класс переопределил."
    correct: [b]
    explanation: "MRO - это линейный список классов в `Cls.__mro__`, вычисляемый один раз при создании класса. Поиск атрибута идёт по нему слева направо до первого совпадения."
    variants:
      - prompt: "Где хранится порядок разрешения методов класса `Dog`?"
        choices:
          - id: a
            text: "В атрибуте `Dog.__mro__` (и его же возвращает `Dog.mro()`)."
          - id: b
            text: "В атрибуте `Dog.__bases__` - там полный порядок поиска."
          - id: c
            text: "Нигде не хранится: Python вычисляет его при каждом обращении к атрибуту."
          - id: d
            text: "В атрибуте `Dog.__dict__` под ключом `mro`."
        correct: [a]
        explanation: "`__mro__` - кортеж с полным порядком поиска. `__bases__` хранит только непосредственных родителей, а не всю линеаризацию."
      - prompt: "Каким классом всегда заканчивается MRO любого класса в Python 3?"
        choices:
          - id: a
            text: "`object` - неявный общий предок всех классов."
          - id: b
            text: "`type` - метакласс всех классов."
          - id: c
            text: "Первым из перечисленных базовых классов."
          - id: d
            text: "Ничем: список заканчивается самим классом."
        correct: [a]
        explanation: "Каждый класс неявно наследует `object`, поэтому `object` замыкает любой MRO. Его положение в конце гарантирует, что ваши методы перекрывают реализацию по умолчанию."

  - id: mro-read-list-001
    concept: mro-basics
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      class A: pass
      class B(A): pass
      class C(B): pass

      print([c.__name__ for c in C.__mro__])
    expected:
      kind: stdout
      value: "['C', 'B', 'A', 'object']"
    hints:
      - "При одиночном наследовании MRO - это та самая цепочка «вверх по родителям». С какого класса начинается список и чем он обязан заканчиваться?"
      - "Производный класс всегда стоит раньше своего предка; последним идёт неявный общий предок всех классов."
    variants:
      - snippet: |
          class Animal: pass
          class Dog(Animal): pass

          print([c.__name__ for c in Dog.__mro__])
        expected:
          kind: stdout
          value: "['Dog', 'Animal', 'object']"
      - snippet: |
          class Base: pass
          class Mid(Base): pass
          class Leaf(Mid): pass

          print(Leaf.__mro__[-1].__name__)
        expected:
          kind: stdout
          value: "object"

  - id: mro-name-conflict-001
    concept: mro-basics
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      class Base:
          def role(self):
              return "base"

      class Mixin:
          def role(self):
              return "mixin"

      class Widget(Mixin, Base):
          pass

      print(Widget().role())
    expected:
      kind: stdout
      value: "mixin"
    hints:
      - "При конфликте имён побеждает не «более базовый» класс, а тот, что стоит в MRO раньше. Какой класс перечислен в скобках первым?"
      - "Выпишите MRO как список: `[Widget, Mixin, Base, object]`. Идите слева направо до первого `role`."
    variants:
      - snippet: |
          class Base:
              def role(self):
                  return "base"

          class Mixin:
              def role(self):
                  return "mixin"

          class Widget(Base, Mixin):
              pass

          print(Widget().role())
        expected:
          kind: stdout
          value: "base"
      - snippet: |
          class A:
              x = "из A"

          class B:
              x = "из B"
              y = "только в B"

          class C(A, B):
              pass

          print(C.x, C.y)
        expected:
          kind: stdout
          value: "из A только в B"

  - id: mro-lookup-stops-001
    concept: mro-basics
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      class A:
          def __repr__(self):
              return "A-объект"

      class B(A):
          pass

      print(repr(B()), B.__mro__[-1].__name__)
    expected:
      kind: stdout
      value: "A-объект object"
    hints:
      - "`__repr__` есть в `object` всегда, но где `object` стоит в MRO класса `B`? Что найдётся раньше при поиске?"
      - "Поиск останавливается на первом совпадении: версия из `A` стоит раньше версии из `object`, поэтому она и выигрывает."

  - id: mro-cls-method-001
    concept: mro-basics
    type: python-function
    difficulty: 4
    prompt: "Допишите функцию `mro_names(cls)`: верните список имён классов из MRO переданного класса в порядке разрешения методов (как строки)."
    starter: |
      def mro_names(cls):
          ...
    cases:
      - call: "mro_names(int)"
        expect: ["int", "object"]
      - call: "mro_names(bool)"
        expect: ["bool", "int", "object"]
      - call: "mro_names(object)"
        expect: ["object"]
    hints:
      - "У каждого класса MRO уже вычислен и доступен как готовый список - вам не нужно обходить иерархию вручную."
      - "`cls.__mro__` - это последовательность классов. Из каждого класса нужно достать его имя."
      - "Имя класса лежит в атрибуте `__name__`. Соберите имена в список через генератор списка."
    solution: |
      def mro_names(cls):
          return [c.__name__ for c in cls.__mro__]
