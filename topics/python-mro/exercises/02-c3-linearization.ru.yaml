exercises:
  - id: c3-merge-rule-001
    concept: c3-linearization
    type: theory-quiz
    difficulty: 1
    prompt: "В операции merge head списка считается «хорошим кандидатом» и попадает в результат, если..."
    choices:
      - id: a
        text: "...он не встречается в хвосте (tail) ни одного из"
      - id: b
        text: "...он стоит первым хотя бы в одном списке."
      - id: c
        text: "...он встречается во всех списках сразу."
      - id: d
        text: "...это последний оставшийся класс."
    correct: [a]
    explanation: "Кандидат хорош, если ни один список не требует поставить какой-то класс перед ним, то есть head не появляется в хвосте ни одного из сливаемых списков. Иначе мы нарушили бы чей-то порядок."
    variants:
      - prompt: "Что такое head и tail списка в контексте операции merge?"
        choices:
          - id: a
            text: "head - первый элемент списка, tail"
          - id: b
            text: "head - последний элемент, tail - первый."
          - id: c
            text: "head - сам класс, tail - его метакласс."
          - id: d
            text: "head и tail - это два разных списка родителей."
        correct: [a]
        explanation: "head - первый элемент, tail - всё, что после него. Кандидат берётся из head, а проверяется на присутствие в хвостах остальных списков."
      - prompt: "Когда C3 объявляет, что линеаризация невозможна?"
        choices:
          - id: a
            text: "Когда списки ещё не пусты, но ни один head не является"
          - id: b
            text: "Когда первый же head оказался плохим кандидатом."
          - id: c
            text: "Когда у класса больше двух родителей."
          - id: d
            text: "Когда один из списков стал пустым раньше других."
        correct: [a]
        explanation: "Плохой head первого списка - не ошибка: пробуют head следующего. Ошибка возникает, только когда все head плохие, а списки ещё не опустели."

  - id: c3-base-case-001
    concept: c3-linearization
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски в определении C3-линеаризации класса C с родителями B1 и B2."
    template: |
      L[object] = [{{base}}]
      L[C] = C + merge(L[B1], L[B2], [{{parents}}])
    blanks:
      base:
        accept: ["object"]
      parents:
        accept: ["B1, B2"]
        accept_regex: '^B1\s*,\s*B2$'
    hints:
      - "Базовый случай рекурсии - класс без родителей, кроме самого себя; его линеаризация состоит из одного элемента."
      - "Последний аргумент merge - это список самих непосредственных родителей в том порядке, в каком они объявлены."
    variants:
      - prompt: "Заполните пропуски: линеаризация класса D с единственным родителем B."
        template: |
          L[D] = {{self_cls}} + merge(L[B], [{{parent}}])
        blanks:
          self_cls:
            accept: ["D"]
          parent:
            accept: ["B"]
      - prompt: "Заполните: что является базовым случаем рекурсии C3?"
        template: |
          L[{{root}}] = [object]
        blanks:
          root:
            accept: ["object"]

  - id: c3-diamond-trace-001
    concept: c3-linearization
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа? Линеаризуйте D вручную операцией merge."
    snippet: |
      class A: pass
      class B(A): pass
      class C(A): pass
      class D(B, C): pass

      print([c.__name__ for c in D.__mro__])
    expected:
      kind: stdout
      value: "['D', 'B', 'C', 'A', 'object']"
    hints:
      - "merge сливает [B, A, object], [C, A, object], [B, C]. На каждом шаге берите head первого списка, если его нет в хвостах остальных."
      - "A появится в результате только после того, как в список встанут оба его потомка - B и C. Поэтому A откладывается."
    variants:
      - snippet: |
          class A: pass
          class B(A): pass
          class C(A): pass
          class D(C, B): pass

          print([c.__name__ for c in D.__mro__])
        expected:
          kind: stdout
          value: "['D', 'C', 'B', 'A', 'object']"
      - snippet: |
          class A: pass
          class B(A): pass
          class C(B): pass

          print([c.__name__ for c in C.__mro__])
        expected:
          kind: stdout
          value: "['C', 'B', 'A', 'object']"

  - id: c3-naive-vs-c3-001
    concept: c3-linearization
    type: theory-quiz
    difficulty: 3
    prompt: "Для ромба `D(B, C)`, где `B` и `C` наследуют `A`, наивный обход в глубину дал бы порядок `[D, B, A, C, object]`. Чем это плохо?"
    choices:
      - id: a
        text: "`A` оказывается раньше своего потомка `C`, поэтому переопределение"
      - id: b
        text: "`object` стоит не последним, и поэтому ломается `__init__`."
      - id: c
        text: "`D` стоит первым, а должен стоять последним."
      - id: d
        text: "Ничем: этот порядок полностью эквивалентен C3."
    correct: [a]
    explanation: "Наивный DFS ставит предка `A` раньше потомка `C`. Если оба определяют один метод, вызовется версия из `A`, игнорируя более специализированную из `C`. C3 сохраняет инвариант «потомок раньше предка» и устраняет эту ошибку."

  - id: c3-merge-impl-001
    concept: c3-linearization
    type: python-function
    difficulty: 5
    prompt: "Реализуйте `c3_merge(seqs)`: примите список непустых последовательностей (списков имён) и слейте их по правилу C3. Верните итоговый список. Если слияние невозможно, верните `None`."
    starter: |
      def c3_merge(seqs):
          ...
    cases:
      - call: "c3_merge([['B', 'A', 'object'], ['C', 'A', 'object'], ['B', 'C']])"
        expect: ["B", "C", "A", "object"]
      - call: "c3_merge([['A', 'object']])"
        expect: ["A", "object"]
      - call: "c3_merge([['X', 'Y'], ['Y', 'X']])"
        expect: null
    hints:
      - "Повторяйте, пока остаются непустые списки. На каждой итерации нужно найти один хороший head и убрать его отовсюду."
      - "head хорош, если он не лежит в хвосте (всё, кроме первого элемента) ни одной из последовательностей. Переберите кандидатов слева направо."
      - "Если за полный проход по всем спискам не нашёлся ни один хороший head, а непустые списки ещё есть, - слияние невозможно, верните None."
    solution: |
      def c3_merge(seqs):
          seqs = [list(s) for s in seqs]
          result = []
          while True:
              seqs = [s for s in seqs if s]
              if not seqs:
                  return result
              candidate = None
              for seq in seqs:
                  head = seq[0]
                  if not any(head in s[1:] for s in seqs):
                      candidate = head
                      break
              if candidate is None:
                  return None
              result.append(candidate)
              for s in seqs:
                  if s and s[0] == candidate:
                      del s[0]
