exercises:
  - id: diamond-what-001
    concept: diamond-and-mixins
    type: theory-quiz
    difficulty: 1
    prompt: "What distinguishes diamond inheritance behavior in Python from naive depth-first traversal?"
    choices:
      - id: a
        text: "C3 places the common ancestor after both descendants, so super() passes"
      - id: b
        text: "Python forbids diamond inheritance entirely."
      - id: c
        text: "The common ancestor is called twice - once per path."
      - id: d
        text: "Execution order depends on which file declared the classes."
    correct: [a]
    explanation: "C3 invariant: ancestor after all descendants. In a diamond the common ancestor has two descendants, so it is delayed to the end and cooperative super() passes through it exactly once, unlike naive DFS."
    variants:
      - prompt: "Where should a mixin go in the base class list?"
        choices:
          - id: a
            text: "To the left of the base class so it intercepts first and"
          - id: b
            text: "To the right of the base class so the base runs first."
          - id: c
            text: "Order does not matter."
          - id: d
            text: "A mixin cannot be combined with an ordinary base class."
        correct: [a]
        explanation: "A mixin must appear in MRO before the base; otherwise the base intercepts first and (if it does not call super) breaks the chain. List mixins on the left: class User(Mixin, Base)."
      - prompt: "What is a mixin?"
        choices:
          - id: a
            text: "A class adding one narrow capability and"
          - id: b
            text: "A class with no methods, only data."
          - id: c
            text: "A class you cannot inherit from."
          - id: d
            text: "A synonym for abstract base class."
        correct: [a]
        explanation: "A mixin is not for standalone use: it mixes one capability into a class and relies on cooperative super(), without knowing in advance what it is mixed into."

  - id: diamond-once-trace-001
    concept: diamond-and-mixins
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? Trace how many times Base runs."
    snippet: |
      class Base:
          def __init__(self):
              print("base")

      class Left(Base):
          def __init__(self):
              print("left")
              super().__init__()

      class Right(Base):
          def __init__(self):
              print("right")
              super().__init__()

      class Both(Left, Right):
          def __init__(self):
              print("both")
              super().__init__()

      Both()
    expected:
      kind: stdout
      value: |
        both
        left
        right
        base
    hints:
      - "MRO of Both is [Both, Left, Right, Base, object]. Each class prints itself and calls the next along that list."
      - "super() from Left goes to Right, not Base - Right is next in MRO. Base is last, so it prints once."
    variants:
      - snippet: |
          class Base:
              def __init__(self):
                  print("base")

          class Left(Base):
              def __init__(self):
                  print("left")
                  super().__init__()

          class Right(Base):
              def __init__(self):
                  print("right")
                  super().__init__()

          class Both(Right, Left):
              def __init__(self):
                  print("both")
                  super().__init__()

          Both()
        expected:
          kind: stdout
          value: |
            both
            right
            left
            base

  - id: mixin-order-001
    concept: diamond-and-mixins
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? Whose method f intercepts the call?"
    snippet: |
      class Mixin:
          def f(self):
              return "mixin"

      class Base:
          def f(self):
              return "base"

      class C(Mixin, Base):
          pass

      print(C().f())
    expected:
      kind: stdout
      value: "mixin"
    hints:
      - "MRO searches methods left to right along the base list. Who comes first - Mixin or Base?"
      - "MRO of C is [C, Mixin, Base, object]. f is found in Mixin first; search stops there."
    variants:
      - snippet: |
          class Mixin:
              def f(self):
                  return "mixin"

          class Base:
              def f(self):
                  return "base"

          class C(Base, Mixin):
              pass

          print(C().f())
        expected:
          kind: stdout
          value: "base"

  - id: mro-conflict-001
    concept: diamond-and-mixins
    type: theory-quiz
    difficulty: 3
    prompt: "Declaration `class X(A, B)` where `class B(A)` fails with `TypeError: Cannot create a consistent method resolution order`. Why?"
    choices:
      - id: a
        text: "B inherits A, so B must stand before A; but X(A, B) lists the"
      - id: b
        text: "A class cannot have more than one base class."
      - id: c
        text: "A and B define the same methods and Python cannot choose."
      - id: d
        text: "object must be first, but here it is last."
    correct: [a]
    explanation: "B is a descendant of A, so C3 requires B before A in any MRO. But X(A, B) lists A first, requiring A before B. The requirements conflict; no linearization exists - hence TypeError at declaration time. Fix: class X(B, A)."

  - id: cooperative-mixin-impl-001
    concept: diamond-and-mixins
    type: python-function
    difficulty: 4
    prompt: "Implement a mixin chain: `DoubleMixin` and `IncMixin` wrap base class `Box`'s `value()` method. `DoubleMixin.value` doubles the next MRO result; `IncMixin.value` adds 1. Class `B(DoubleMixin, IncMixin, Box)` with `Box.value()==10` should yield `(10 + 1) * 2 = 22`. Complete the value methods using super()."
    starter: |
      class Box:
          def value(self):
              return 10

      class DoubleMixin:
          def value(self):
              ...

      class IncMixin:
          def value(self):
              ...

      class B(DoubleMixin, IncMixin, Box):
          pass
    cases:
      - call: "B().value()"
        expect: 22
      - call: "DoubleMixin in B.__mro__"
        expect: true
    hints:
      - "Each mixin does not know who follows it. It takes super().value() and applies its operation."
      - "MRO of B is [B, DoubleMixin, IncMixin, Box, object]. value starts in DoubleMixin, which must get the value from below via super(), then double."
      - "DoubleMixin: return 2 * super().value(). IncMixin: return super().value() + 1. MRO sets the application order."
    solution: |
      class Box:
          def value(self):
              return 10

      class DoubleMixin:
          def value(self):
              return 2 * super().value()

      class IncMixin:
          def value(self):
              return super().value() + 1

      class B(DoubleMixin, IncMixin, Box):
          pass
