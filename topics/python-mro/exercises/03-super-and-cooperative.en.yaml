exercises:
  - id: super-is-next-001
    concept: super-and-cooperative
    type: theory-quiz
    difficulty: 1
    prompt: "What does `super()` called inside a method of class X actually do?"
    choices:
      - id: a
        text: "Continues method search from the class after X in the MRO of object"
      - id: b
        text: "Always calls the method of X's direct parent."
      - id: c
        text: "Calls the method of the first base class in __bases__."
      - id: d
        text: "Calls the same-named method in all parents at once."
    correct: [a]
    explanation: "super() returns a proxy that searches starting from the next class in the MRO of object self. With single inheritance that matches the parent, which is why the myth 'super is the parent' persists - but under multiple inheritance the next in MRO may be a sibling, not an ancestor."
    variants:
      - prompt: "What determines which class runs when super() is called inside B?"
        choices:
          - id: a
            text: "The MRO of self's actual class, not B's"
          - id: b
            text: "Only whom B listed in its bases."
          - id: c
            text: "The order classes are defined in the file."
          - id: d
            text: "The method name."
        correct: [a]
        explanation: "'Next' refers to the MRO of object self. The same super() inside B goes to different classes depending on which class self is an instance of."
      - prompt: "Why does `super()` with no arguments know which class it is written in?"
        choices:
          - id: a
            text: "The compiler implicitly passes the __class__ cell and self."
          - id: b
            text: "super reads the class name from the call stack by line."
          - id: c
            text: "super always uses type(self) as the starting point."
          - id: d
            text: "This works only in Python 2 via super(Class, self)."
        correct: [a]
        explanation: "Bare super() is Python 3 sugar: the compiler sees super in a method and passes the __class__ cell (the class where the method is defined) and the first argument self. So super() ≡ super(__class__, self)."

  - id: super-cooperative-trace-001
    concept: super-and-cooperative
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? Walk the MRO of class Record."
    snippet: |
      class Save:
          def save(self):
              return ["base"]

      class Timestamped(Save):
          def save(self):
              return ["timestamp"] + super().save()

      class Audited(Save):
          def save(self):
              return ["audit"] + super().save()

      class Record(Timestamped, Audited):
          pass

      print(Record().save())
    expected:
      kind: stdout
      value: "['timestamp', 'audit', 'base']"
    hints:
      - "Record does not override save, so Timestamped's version starts. Next, super() does not go to parent Save but to the next in Record's MRO."
      - "Write MRO: [Record, Timestamped, Audited, Save, object]. super() from Timestamped lands in Audited, not Save."
    variants:
      - snippet: |
          class Save:
              def save(self):
                  return ["base"]

          class Timestamped(Save):
              def save(self):
                  return ["timestamp"] + super().save()

          class Audited(Save):
              def save(self):
                  return ["audit"] + super().save()

          class Record(Audited, Timestamped):
              pass

          print(Record().save())
        expected:
          kind: stdout
          value: "['audit', 'timestamp', 'base']"
      - snippet: |
          class Save:
              def save(self):
                  return ["base"]

          class Timestamped(Save):
              def save(self):
                  return ["timestamp"] + super().save()

          class Record(Timestamped):
              pass

          print(Record().save())
        expected:
          kind: stdout
          value: "['timestamp', 'base']"

  - id: super-kwargs-blanks-001
    concept: super-and-cooperative
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the blanks so cooperative __init__ correctly forwards extra keyword arguments along MRO."
    template: |
      class Named(Base):
          def __init__(self, name, {{rest}}):
              super().__init__({{forward}})
              self.name = name
    blanks:
      rest:
        accept: ["**kwargs"]
        accept_regex: '^\*\*\w+$'
      forward:
        accept: ["**kwargs"]
        accept_regex: '^\*\*\w+$'
    hints:
      - "Each class in a cooperative chain takes its arguments and must pass everything else untouched to the next class."
      - "To accept any extra keyword arguments and forward them, use the same container on receive and on send."
    variants:
      - prompt: "Fill in the blank: how must a cooperative __init__ chain end so object.__init__ does not fail?"
        template: |
          class Base:
              def __init__(self, **kwargs):
                  super().__init__({{tail}})
        blanks:
          tail:
            accept: ["", "**kwargs"]
            accept_regex: '^(\*\*\w+)?$'
      - prompt: "Fill in the blank: how should Named call the next __init__ along MRO?"
        template: |
          class Named(Base):
              def __init__(self, name, **kwargs):
                  {{call}}(**kwargs)
                  self.name = name
        blanks:
          call:
            accept: ["super().__init__"]

  - id: super-two-arg-001
    concept: super-and-cooperative
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? Think about whose MRO two-argument super(B, d) follows."
    snippet: |
      class A:
          def m(self):
              return "A"

      class B(A):
          def m(self):
              return "B"

      class C(A):
          def m(self):
              return "C"

      class D(B, C):
          pass

      d = D()
      print(super(B, d).m())
    expected:
      kind: stdout
      value: "C"
    hints:
      - "super(B, d) means 'continue after B'. But after B in which list - B's hierarchy or object d's MRO?"
      - "MRO of object d is [D, B, C, A, object]. The class right after B here is C, although C is not a parent of B."
    variants:
      - snippet: |
          class A:
              def m(self):
                  return "A"

          class B(A):
              def m(self):
                  return "B"

          class C(A):
              def m(self):
                  return "C"

          class D(B, C):
              pass

          d = D()
          print(super(C, d).m())
        expected:
          kind: stdout
          value: "A"
      - snippet: |
          class A:
              def m(self):
                  return "A"

          class B(A):
              def m(self):
                  return "B"

          class C(A):
              def m(self):
                  return "C"

          class D(C, B):
              pass

          d = D()
          print(super(C, d).m())
        expected:
          kind: stdout
          value: "B"
