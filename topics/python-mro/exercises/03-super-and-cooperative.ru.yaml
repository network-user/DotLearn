exercises:
  - id: super-is-next-001
    concept: super-and-cooperative
    type: theory-quiz
    difficulty: 1
    prompt: "Что на самом деле делает `super()`, вызванный внутри метода класса X?"
    choices:
      - id: a
        text: "Продолжает поиск метода со следующего за X класса в MRO объекта self."
      - id: b
        text: "Всегда вызывает метод непосредственного родителя класса X."
      - id: c
        text: "Вызывает метод самого первого базового класса из __bases__."
      - id: d
        text: "Вызывает одноимённый метод во всех родителях сразу."
    correct: [a]
    explanation: "super() возвращает прокси, который ищет метод начиная со следующего класса в MRO объекта self. В одиночном наследовании это совпадает с родителем, поэтому миф «super - это родитель» так живуч, но в множественном наследовании следующий по MRO может быть sibling-классом, а не предком."
    variants:
      - prompt: "От чего зависит, какой класс выполнится при вызове super() внутри B?"
        choices:
          - id: a
            text: "От MRO настоящего класса объекта self, а не от"
          - id: b
            text: "Только от того, кого B указал в своих базах."
          - id: c
            text: "От порядка, в котором классы определены в файле."
          - id: d
            text: "От имени метода."
        correct: [a]
        explanation: "Слово «следующий» относится к MRO объекта self. Один и тот же super() внутри B уйдёт в разные классы в зависимости от того, экземпляром какого класса является self."
      - prompt: "Почему `super()` без аргументов умеет находить класс, в котором написан?"
        choices:
          - id: a
            text: "Компилятор неявно прокидывает ячейку __class__ и self."
          - id: b
            text: "super читает имя класса из стека вызовов по строке."
          - id: c
            text: "super всегда берёт type(self) как точку отсчёта."
          - id: d
            text: "Это работает только в Python 2 через super(Class, self)."
        correct: [a]
        explanation: "Пустой super() - сахар Python 3: компилятор замечает обращение к super в методе и прокидывает ячейку __class__ (класс, где написан метод) и первый аргумент self. Поэтому super() ≡ super(__class__, self)."

  - id: super-cooperative-trace-001
    concept: super-and-cooperative
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Пройдите по MRO класса Record."
    snippet: |
      class Save:
          def save(self):
              return ["base"]

      class Timestamped(Save):
          def save(self):
              return ["timestamp"] + super().save()

      class Audited(Save):
          def save(self):
              return ["audit"] + super().save()

      class Record(Timestamped, Audited):
          pass

      print(Record().save())
    expected:
      kind: stdout
      value: "['timestamp', 'audit', 'base']"
    hints:
      - "Record не переопределяет save, поэтому стартует версия Timestamped. Дальше важно, что super() идёт не к родителю Save, а к следующему по MRO Record."
      - "Выпишите MRO: [Record, Timestamped, Audited, Save, object]. super() из Timestamped попадает в Audited, а не сразу в Save."
    variants:
      - snippet: |
          class Save:
              def save(self):
                  return ["base"]

          class Timestamped(Save):
              def save(self):
                  return ["timestamp"] + super().save()

          class Audited(Save):
              def save(self):
                  return ["audit"] + super().save()

          class Record(Audited, Timestamped):
              pass

          print(Record().save())
        expected:
          kind: stdout
          value: "['audit', 'timestamp', 'base']"
      - snippet: |
          class Save:
              def save(self):
                  return ["base"]

          class Timestamped(Save):
              def save(self):
                  return ["timestamp"] + super().save()

          class Record(Timestamped):
              pass

          print(Record().save())
        expected:
          kind: stdout
          value: "['timestamp', 'base']"

  - id: super-kwargs-blanks-001
    concept: super-and-cooperative
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски, чтобы кооперативный __init__ корректно пробрасывал лишние именованные аргументы дальше по MRO."
    template: |
      class Named(Base):
          def __init__(self, name, {{rest}}):
              super().__init__({{forward}})
              self.name = name
    blanks:
      rest:
        accept: ["**kwargs"]
        accept_regex: '^\*\*\w+$'
      forward:
        accept: ["**kwargs"]
        accept_regex: '^\*\*\w+$'
    hints:
      - "Каждый класс в кооперативной цепочке забирает свои аргументы, а всё остальное должен передать следующему классу нетронутым."
      - "Чтобы принять любые лишние именованные аргументы и отдать их дальше, используйте один и тот же контейнер на приём и на передачу."
    variants:
      - prompt: "Заполните пропуск: чем должна заканчиваться кооперативная цепочка __init__, чтобы object.__init__ не упал?"
        template: |
          class Base:
              def __init__(self, **kwargs):
                  super().__init__({{tail}})
        blanks:
          tail:
            accept: ["", "**kwargs"]
            accept_regex: '^(\*\*\w+)?$'
      - prompt: "Заполните пропуск: как Named должен вызвать следующий по MRO __init__?"
        template: |
          class Named(Base):
              def __init__(self, name, **kwargs):
                  {{call}}(**kwargs)
                  self.name = name
        blanks:
          call:
            accept: ["super().__init__"]

  - id: super-two-arg-001
    concept: super-and-cooperative
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Подумайте, по чьему MRO идёт двухаргументный super(B, d)."
    snippet: |
      class A:
          def m(self):
              return "A"

      class B(A):
          def m(self):
              return "B"

      class C(A):
          def m(self):
              return "C"

      class D(B, C):
          pass

      d = D()
      print(super(B, d).m())
    expected:
      kind: stdout
      value: "C"
    hints:
      - "super(B, d) означает «продолжи поиск после B». Но после B в каком списке - в иерархии B или в MRO объекта d?"
      - "MRO объекта d - это [D, B, C, A, object]. Класс сразу после B здесь - это C, хотя C не родитель B."
    variants:
      - snippet: |
          class A:
              def m(self):
                  return "A"

          class B(A):
              def m(self):
                  return "B"

          class C(A):
              def m(self):
                  return "C"

          class D(B, C):
              pass

          d = D()
          print(super(C, d).m())
        expected:
          kind: stdout
          value: "A"
      - snippet: |
          class A:
              def m(self):
                  return "A"

          class B(A):
              def m(self):
                  return "B"

          class C(A):
              def m(self):
                  return "C"

          class D(C, B):
              pass

          d = D()
          print(super(C, d).m())
        expected:
          kind: stdout
          value: "B"
