exercises:
  - id: mro-what-is-001
    concept: mro-basics
    type: theory-quiz
    difficulty: 1
    prompt: "What is MRO (method resolution order) in Python?"
    choices:
      - id: a
        text: "The inheritance tree Python re-walks on every method call."
      - id: b
        text: "A flat ordered list of classes Python searches left to right for attributes."
      - id: c
        text: "A random order in which the interpreter tries parents."
      - id: d
        text: "A list of only the methods the class overrode."
    correct: [b]
    explanation: "MRO is the linear list in `Cls.__mro__`, computed once when the class is created. Attribute lookup walks it left to right until the first match."
    variants:
      - prompt: "Where is the method resolution order of class `Dog` stored?"
        choices:
          - id: a
            text: "In attribute `Dog.__mro__` (and the same order is returned by `Dog.mro()`)."
          - id: b
            text: "In attribute `Dog.__bases__` - the full lookup order lives there."
          - id: c
            text: "Nowhere: Python recomputes it on every attribute access."
          - id: d
            text: "In attribute `Dog.__dict__` under key `mro`."
        correct: [a]
        explanation: "`__mro__` is a tuple with the full lookup order. `__bases__` stores only direct parents, not the full linearization."
      - prompt: "Which class always closes MRO of any class in Python 3?"
        choices:
          - id: a
            text: "`object` - the implicit common ancestor of all classes."
          - id: b
            text: "`type` - the metaclass of all classes."
          - id: c
            text: "The first base class listed in the declaration."
          - id: d
            text: "Nothing: the list ends at the class itself."
        correct: [a]
        explanation: "Every class implicitly inherits `object`, so `object` closes any MRO. Its position at the end ensures your methods override the defaults."

  - id: mro-read-list-001
    concept: mro-basics
    type: predict-output
    difficulty: 2
    prompt: "What does this program print?"
    snippet: |
      class A: pass
      class B(A): pass
      class C(B): pass

      print([c.__name__ for c in C.__mro__])
    expected:
      kind: stdout
      value: "['C', 'B', 'A', 'object']"
    hints:
      - "With single inheritance MRO is the chain up through parents. Which class starts the list and what must it end with?"
      - "The derived class always comes before its ancestor; the implicit common ancestor of all classes comes last."
    variants:
      - snippet: |
          class Animal: pass
          class Dog(Animal): pass

          print([c.__name__ for c in Dog.__mro__])
        expected:
          kind: stdout
          value: "['Dog', 'Animal', 'object']"
      - snippet: |
          class Base: pass
          class Mid(Base): pass
          class Leaf(Mid): pass

          print(Leaf.__mro__[-1].__name__)
        expected:
          kind: stdout
          value: "object"

  - id: mro-name-conflict-001
    concept: mro-basics
    type: predict-output
    difficulty: 3
    prompt: "What does this program print?"
    snippet: |
      class Base:
          def role(self):
              return "base"

      class Mixin:
          def role(self):
              return "mixin"

      class Widget(Mixin, Base):
          pass

      print(Widget().role())
    expected:
      kind: stdout
      value: "mixin"
    hints:
      - "On a name conflict the winner is not the more base class but whoever is earlier in MRO. Which class is listed first in the parentheses?"
      - "Write MRO as `[Widget, Mixin, Base, object]`. Walk left to right until you find `role`."
    variants:
      - snippet: |
          class Base:
              def role(self):
                  return "base"

          class Mixin:
              def role(self):
                  return "mixin"

          class Widget(Base, Mixin):
              pass

          print(Widget().role())
        expected:
          kind: stdout
          value: "base"
      - snippet: |
          class A:
              x = "from A"

          class B:
              x = "from B"
              y = "only in B"

          class C(A, B):
              pass

          print(C.x, C.y)
        expected:
          kind: stdout
          value: "from A only in B"

  - id: mro-lookup-stops-001
    concept: mro-basics
    type: predict-output
    difficulty: 3
    prompt: "What does this program print?"
    snippet: |
      class A:
          def __repr__(self):
              return "A-object"

      class B(A):
          pass

      print(repr(B()), B.__mro__[-1].__name__)
    expected:
      kind: stdout
      value: "A-object object"
    hints:
      - "`__repr__` always exists on `object`, but where does `object` stand in class `B`'s MRO? What is found first on lookup?"
      - "Lookup stops at the first match: the version from `A` is before `object`, so it wins."

  - id: mro-cls-method-001
    concept: mro-basics
    type: python-function
    difficulty: 4
    prompt: "Complete `mro_names(cls)`: return a list of class names from the passed class's MRO in resolution order (as strings)."
    starter: |
      def mro_names(cls):
          ...
    cases:
      - call: "mro_names(int)"
        expect: ["int", "object"]
      - call: "mro_names(bool)"
        expect: ["bool", "int", "object"]
      - call: "mro_names(object)"
        expect: ["object"]
    hints:
      - "Every class already has MRO computed and available as a ready-made list - you do not need to walk the hierarchy by hand."
      - "`cls.__mro__` is a sequence of classes. Take each class's name."
      - "The class name is in `__name__`. Collect names with a list comprehension."
    solution: |
      def mro_names(cls):
          return [c.__name__ for c in cls.__mro__]
