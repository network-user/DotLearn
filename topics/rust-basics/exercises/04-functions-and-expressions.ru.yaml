exercises:
  - id: fn-expr-quiz-001
    concept: functions-and-expressions
    type: theory-quiz
    difficulty: 1
    prompt: "Как функция в Rust обычно возвращает значение из последней строки?"
    choices:
      - id: a
        text: "Записывают выражение без точки с запятой"
      - id: b
        text: "Обязательно пишут return в конце, иначе не соберётся."
      - id: c
        text: "Кладут значение в глобальную переменную."
      - id: d
        text: "Функция не может вернуть значение без макроса."
    correct: [a]
    explanation: "Последнее выражение блока без точки с запятой - это значение функции. return нужен лишь для досрочного выхода."
    variants:
      - prompt: "В чём разница выражения и оператора в Rust?"
        choices:
          - id: a
            text: "Выражение вычисляется в значение, оператор - нет."
          - id: b
            text: "Это два названия одного и того же."
          - id: c
            text: "Оператор всегда возвращает число, выражение - строку."
          - id: d
            text: "Выражения запрещены внутри функций."
        correct: [a]
        explanation: "Выражение даёт значение (например 2 + 2 или if ...), а оператор выполняет действие без значения (например let x = 5;)."
      - prompt: "Чему равен блок { let a = 2; a + 1 }?"
        choices:
          - id: a
            text: "Значению последнего выражения"
          - id: b
            text: "2."
          - id: c
            text: "Ничему: блок не может быть значением."
          - id: d
            text: "Это ошибка компиляции."
        correct: [a]
        explanation: "Блок в фигурных скобках вычисляется в своё последнее выражение без точки с запятой. Здесь это a + 1 = 3."

  - id: fn-signature-blanks-001
    concept: functions-and-expressions
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите стрелку, объявляющую тип возвращаемого значения функции."
    template: |
      fn double(x: i32) {{arrow}} i32 {
          x * 2
      }
    blanks:
      arrow:
        accept: ["->"]
    explanation: "Тип возврата указывают после списка параметров через стрелку ->. Тело возвращает x * 2 последним выражением без точки с запятой."
    hints:
      - "Между списком параметров и типом результата ставят особый знак из двух символов."
    variants:
      - prompt: "Впишите оператор, чтобы функция складывала два числа."
        template: |
          fn add(a: i32, b: i32) -> i32 {
              a {{op}} b
          }
        blanks:
          op:
            accept: ["+"]
      - prompt: "Впишите ключевое слово для досрочного возврата значения a."
        template: |
          fn first_positive(a: i32) -> i32 {
              if a > 0 {
                  {{kw}} a;
              }
              0
          }
        blanks:
          kw:
            accept: ["return"]

  - id: fn-square-predict-001
    concept: functions-and-expressions
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает программа? Последнее выражение без точки с запятой - это возвращаемое значение."
    snippet: |
      fn square(x: i32) -> i32 {
          x * x
      }

      fn main() {
          println!("{}", square(6));
      }
    expected:
      kind: stdout
      value: |-
        36
    explanation: "Тело square - выражение x * x без точки с запятой, поэтому оно и есть результат. square(6) даёт 36."
    hints:
      - "Строка без точки с запятой в конце функции - это то, что она вернёт."
    variants:
      - prompt: "Что напечатает программа? Блок в фигурных скобках равен своему последнему выражению."
        snippet: |
          fn main() {
              let y = {
                  let a = 3;
                  a + 1
              };
              println!("{}", y);
          }
        expected:
          kind: stdout
          value: |-
            4
      - prompt: "Что напечатает программа? if в Rust - это выражение."
        snippet: |
          fn main() {
              let n = 7;
              let parity = if n % 2 == 0 { "even" } else { "odd" };
              println!("{}", parity);
          }
        expected:
          kind: stdout
          value: |-
            odd

  - id: fn-classify-predict-001
    concept: functions-and-expressions
    type: predict-output
    difficulty: 3
    prompt: "Что напечатает программа? Значением функции становится выбранная ветка if-выражения."
    snippet: |
      fn classify(n: i32) -> i32 {
          if n > 0 {
              1
          } else if n < 0 {
              -1
          } else {
              0
          }
      }

      fn main() {
          println!("{}", classify(-8));
      }
    expected:
      kind: stdout
      value: |-
        -1
    explanation: "Для n = -8 условие n > 0 ложно, n < 0 истинно, значит выбирается ветка со значением -1. Она без точки с запятой, поэтому становится результатом функции."
    hints:
      - "Проверьте условия по порядку для n = -8; остановитесь на первом истинном."
      - "Значение выбранной ветки и есть то, что вернёт функция."
