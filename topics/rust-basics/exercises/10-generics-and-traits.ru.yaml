exercises:
  - id: generics-basics-quiz-001
    concept: generics-and-traits
    type: theory-quiz
    difficulty: 1
    prompt: "Зачем нужны обобщённые типы (generics) в Rust?"
    choices:
      - id: a
        text: "Чтобы одна функция или тип работали с разными типами"
      - id: b
        text: "Чтобы отключить проверку типов."
      - id: c
        text: "Чтобы ускорить компиляцию за счёт удаления типов."
      - id: d
        text: "Чтобы объявлять глобальные переменные."
    correct: [a]
    explanation: "Обобщение вводит параметр-тип T, который подставляется при вызове. Так один и тот же код обслуживает много типов без копипасты."
    variants:
      - prompt: "Что такое трейт (trait) в Rust?"
        choices:
          - id: a
            text: "Набор методов-обещаний"
          - id: b
            text: "Другое название структуры."
          - id: c
            text: "Способ объявить изменяемую переменную."
          - id: d
            text: "Команда сборки проекта."
        correct: [a]
        explanation: "Трейт описывает поведение (набор методов), а разные типы реализуют его через impl Trait for Type. Это роль интерфейса в Rust."
      - prompt: "Что делает атрибут #[derive(Debug)] над структурой?"
        choices:
          - id: a
            text: "Автоматически реализует трейт Debug, чтобы"
          - id: b
            text: "Делает поля структуры изменяемыми."
          - id: c
            text: "Запрещает копировать структуру."
          - id: d
            text: "Превращает структуру в enum."
        correct: [a]
        explanation: "derive просит компилятор сгенерировать реализацию трейта. Debug даёт вывод структуры через форматтер {:?}."

  - id: generics-decl-blanks-001
    concept: generics-and-traits
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите имя параметра-типа, чтобы функция возвращала то же, что приняла."
    template: |
      fn identity<{{t}}>(value: T) -> T {
          value
      }
    blanks:
      t:
        accept: ["T"]
    explanation: "Параметр-тип объявляют в угловых скобках после имени функции. По соглашению его называют T, и затем используют в типах параметров и результата."
    hints:
      - "По соглашению обобщённый параметр-тип обозначают одной заглавной буквой."
    variants:
      - prompt: "Впишите ключевое слово, объявляющее трейт с одним методом."
        template: |
          {{kw}} Area {
              fn area(&self) -> f64;
          }
        blanks:
          kw:
            accept: ["trait"]
      - prompt: "Впишите ключевое слово, связывающее трейт Area с типом Circle."
        template: |
          impl Area {{kw}} Circle {
              fn area(&self) -> f64 {
                  3.14 * self.r * self.r
              }
          }
        blanks:
          kw:
            accept: ["for"]

  - id: generics-first-predict-001
    concept: generics-and-traits
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает программа? Обобщённая функция работает с любым типом T."
    snippet: |
      fn first<T: Copy>(pair: (T, T)) -> T {
          pair.0
      }

      fn main() {
          println!("{}", first((7, 8)));
      }
    expected:
      kind: stdout
      value: |-
        7
    explanation: "first возвращает первый элемент кортежа - pair.0. Для (7, 8) это 7. Параметр-тип T позволяет функции принимать пары любого копируемого типа."
    hints:
      - "Функция берёт кортеж и возвращает его нулевой элемент. Какой он у (7, 8)?"
    variants:
      - prompt: "Что напечатает программа?"
        snippet: |
          fn first<T: Copy>(pair: (T, T)) -> T {
              pair.0
          }

          fn main() {
              println!("{}", first((100, 1)));
          }
        expected:
          kind: stdout
          value: |-
            100
      - prompt: "Что напечатает программа? Тип реализует трейт и его метод."
        snippet: |
          trait Greet {
              fn hello(&self) -> String;
          }

          struct Dog;

          impl Greet for Dog {
              fn hello(&self) -> String {
                  String::from("gav")
              }
          }

          fn main() {
              let d = Dog;
              println!("{}", d.hello());
          }
        expected:
          kind: stdout
          value: |-
            gav

  - id: generics-derive-predict-001
    concept: generics-and-traits
    type: predict-output
    difficulty: 3
    prompt: "Что напечатает программа? derive(Debug) даёт готовый вывод через {:?}."
    snippet: |
      #[derive(Debug)]
      struct Point {
          x: i32,
          y: i32,
      }

      fn main() {
          let p = Point { x: 1, y: 2 };
          println!("{:?}", p);
      }
    expected:
      kind: stdout
      value: |-
        Point { x: 1, y: 2 }
    explanation: "#[derive(Debug)] автоматически реализует трейт Debug, и {:?} печатает структуру с именем типа и полями: Point { x: 1, y: 2 }."
    hints:
      - "Формат {:?} использует трейт Debug. Что печатает его стандартная реализация для структуры?"
      - "Вывод включает имя типа и пары «поле: значение» в фигурных скобках."
