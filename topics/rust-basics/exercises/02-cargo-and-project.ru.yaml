exercises:
  - id: cargo-what-quiz-001
    concept: cargo-and-project
    type: theory-quiz
    difficulty: 1
    prompt: "Что такое cargo в экосистеме Rust?"
    choices:
      - id: a
        text: "Сборщик и менеджер пакетов"
      - id: b
        text: "Сам компилятор Rust, превращающий исходник в машинный код."
      - id: c
        text: "Редактор кода для Rust."
      - id: d
        text: "Сборщик мусора времени выполнения."
    correct: [a]
    explanation: "cargo управляет проектом целиком: создаёт его, собирает, запускает и тянет зависимости. Компиляцию под капотом выполняет rustc, но вызывает его именно cargo."
    variants:
      - prompt: "Где в проекте Rust перечисляют зависимости?"
        choices:
          - id: a
            text: "В файле Cargo.toml, в секции"
          - id: b
            text: "Прямо в src/main.rs сверху файла."
          - id: c
            text: "Вручную в Cargo.lock."
          - id: d
            text: "В package.json."
        correct: [a]
        explanation: "Cargo.toml - манифест проекта. Зависимости указывают в секции [dependencies], а Cargo.lock фиксирует конкретные версии автоматически."
      - prompt: "Что делает команда cargo run?"
        choices:
          - id: a
            text: "Собирает проект и сразу запускает"
          - id: b
            text: "Только форматирует исходники."
          - id: c
            text: "Публикует крейт на crates.io."
          - id: d
            text: "Удаляет каталог target."
        correct: [a]
        explanation: "cargo run компилирует проект (если нужно) и запускает результат. Для чистой сборки без запуска есть cargo build."

  - id: cargo-commands-blanks-001
    concept: cargo-and-project
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите утилиту, которая создаёт новый проект."
    template: |
      {{cmd}} new hello
    blanks:
      cmd:
        accept: ["cargo"]
    explanation: "cargo new создаёт каталог проекта с Cargo.toml и src/main.rs. Дальше проект собирают и запускают той же утилитой."
    hints:
      - "Это единая утилита проекта Rust, а не сам компилятор."
    variants:
      - prompt: "Впишите подкоманду cargo, которая собирает проект, но не запускает его."
        template: |
          cargo {{cmd}}
        blanks:
          cmd:
            accept: ["build"]
      - prompt: "Впишите ключевое слово, которым объявляют модуль."
        template: |
          {{kw}} math;
        blanks:
          kw:
            accept: ["mod"]

  - id: cargo-module-predict-001
    concept: cargo-and-project
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает программа? Функция вызывается по пути через имя модуля."
    snippet: |
      mod math {
          pub fn square(x: i32) -> i32 {
              x * x
          }
      }

      fn main() {
          println!("{}", math::square(4));
      }
    expected:
      kind: stdout
      value: |-
        16
    explanation: "square возводит аргумент в квадрат: 4 * 4 = 16. К функции модуля обращаются по пути math::square, а pub делает её видимой снаружи модуля."
    hints:
      - "Найдите тело функции square и подставьте аргумент 4."
    variants:
      - prompt: "Что напечатает программа?"
        snippet: |
          mod math {
              pub fn double(x: i32) -> i32 {
                  x * 2
              }
          }

          fn main() {
              println!("{}", math::double(6));
          }
        expected:
          kind: stdout
          value: |-
            12
      - prompt: "Что напечатает программа?"
        snippet: |
          mod math {
              pub fn square(x: i32) -> i32 {
                  x * x
              }
          }

          fn main() {
              println!("{}", math::square(5));
          }
        expected:
          kind: stdout
          value: |-
            25

  - id: cargo-nested-module-predict-001
    concept: cargo-and-project
    type: predict-output
    difficulty: 3
    prompt: "Что напечатает программа? Модули вложены друг в друга."
    snippet: |
      mod geometry {
          pub mod shapes {
              pub fn rect(w: i32, h: i32) -> i32 {
                  w * h
              }
          }
      }

      fn main() {
          println!("{}", geometry::shapes::rect(3, 5));
      }
    expected:
      kind: stdout
      value: |-
        15
    explanation: "Путь geometry::shapes::rect спускается через вложенные модули к функции. rect возвращает произведение сторон: 3 * 5 = 15. Каждый уровень должен быть pub, чтобы путь был виден снаружи."
    hints:
      - "Пройдите путь по частям: внешний модуль, затем вложенный, затем функция."
      - "rect перемножает свои аргументы. Подставьте 3 и 5."
