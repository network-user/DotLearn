exercises:
  - id: option-basics-quiz-001
    concept: option-and-result
    type: theory-quiz
    difficulty: 1
    prompt: "Что выражает тип Option в Rust?"
    choices:
      - id: a
        text: "Значение либо есть (Some), либо отсутствует (None); это замена null."
      - id: b
        text: "Значение всегда присутствует и не может быть пустым."
      - id: c
        text: "Ошибку выполнения программы."
      - id: d
        text: "Список значений произвольной длины."
    correct: [a]
    explanation: "Option кодирует наличие или отсутствие значения через Some и None. Отдельного null в Rust нет, поэтому пропуск значения нельзя не заметить."
    variants:
      - prompt: "Что выражает тип Result в Rust?"
        choices:
          - id: a
            text: "Успех Ok со значением или ошибку Err - вместо исключений."
          - id: b
            text: "Только логическое значение true или false."
          - id: c
            text: "Отсутствие значения, как None."
          - id: d
            text: "Тип, который всегда паникует."
        correct: [a]
        explanation: "Result - это Ok(T) при успехе или Err(E) при ошибке. Ошибку возвращают как обычное значение, а не бросают исключением."
      - prompt: "Что делает оператор ? после выражения типа Result?"
        choices:
          - id: a
            text: "Достаёт значение из Ok, а при Err досрочно возвращает ошибку из функции."
          - id: b
            text: "Молча игнорирует любую ошибку."
          - id: c
            text: "Всегда вызывает панику."
          - id: d
            text: "Печатает ошибку и продолжает выполнение."
        correct: [a]
        explanation: "? разворачивает Ok в значение, а при Err немедленно возвращает эту ошибку из текущей функции. Поэтому функция должна сама возвращать совместимый Result."

  - id: option-build-blanks-001
    concept: option-and-result
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите вариант Option, который несёт присутствующее значение."
    template: |
      let found: Option<i32> = {{v}}(10);
      let missing: Option<i32> = None;
    blanks:
      v:
        accept: ["Some"]
    explanation: "Присутствующее значение оборачивают в Some(10); отсутствие - это None. Оба варианта имеют тип Option<i32>."
    hints:
      - "У Option два варианта: один для отсутствия, другой оборачивает реальное значение."
    variants:
      - prompt: "Впишите вариант Result, обозначающий успех со значением 42."
        template: |
          fn parse() -> Result<i32, String> {
              {{v}}(42)
          }
        blanks:
          v:
            accept: ["Ok"]
      - prompt: "Впишите оператор, который пробрасывает ошибку из parse дальше по функции."
        template: |
          fn doubled(text: &str) -> Result<i32, std::num::ParseIntError> {
              let n: i32 = text.parse(){{op}};
              Ok(n * 2)
          }
        blanks:
          op:
            accept: ["?"]

  - id: option-match-predict-001
    concept: option-and-result
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает программа? match разбирает Option на Some и None."
    snippet: |
      fn main() {
          let x: Option<i32> = Some(10);
          let y = match x {
              Some(n) => n + 1,
              None => 0,
          };
          println!("{}", y);
      }
    expected:
      kind: stdout
      value: |-
        11
    explanation: "x - это Some(10), поэтому ветка Some(n) связывает n = 10 и даёт n + 1 = 11. Ветка None сработала бы только для отсутствующего значения."
    hints:
      - "Какой из двух вариантов Option лежит в x? Что делает его ветка?"
    variants:
      - prompt: "Что напечатает программа?"
        snippet: |
          fn main() {
              let x: Option<i32> = None;
              let y = match x {
                  Some(n) => n + 1,
                  None => 0,
              };
              println!("{}", y);
          }
        expected:
          kind: stdout
          value: |-
            0
      - prompt: "Что напечатает программа? unwrap_or возвращает запасное значение для None."
        snippet: |
          fn main() {
              let x: Option<i32> = None;
              println!("{}", x.unwrap_or(42));
          }
        expected:
          kind: stdout
          value: |-
            42

  - id: option-div-predict-001
    concept: option-and-result
    type: predict-output
    difficulty: 3
    prompt: "Что напечатает программа? Функция возвращает Option, а вызывающий подставляет запасное значение."
    snippet: |
      fn checked_div(a: i32, b: i32) -> Option<i32> {
          if b == 0 {
              None
          } else {
              Some(a / b)
          }
      }

      fn main() {
          let r = checked_div(10, 2);
          println!("{}", r.unwrap_or(-1));
      }
    expected:
      kind: stdout
      value: |-
        5
    explanation: "b не равно нулю, поэтому checked_div возвращает Some(10 / 2) = Some(5). unwrap_or достаёт 5 из Some; запасное -1 понадобилось бы лишь при None."
    hints:
      - "Сначала определите, какую ветку выберет checked_div при b = 2."
      - "unwrap_or берёт значение из Some, а к запасному обращается только при None."
