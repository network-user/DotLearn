exercises:
  - id: vars-mut-quiz-001
    concept: variables-and-types
    type: theory-quiz
    difficulty: 1
    prompt: "Какими являются переменные в Rust по умолчанию?"
    choices:
      - id: a
        text: "Неизменяемыми: чтобы менять значение, нужно объявить переменную с mut."
      - id: b
        text: "Изменяемыми: любое значение можно переприсвоить в любой момент."
      - id: c
        text: "Константами, которые нельзя даже прочитать дважды."
      - id: d
        text: "Нетипизированными, пока им не присвоят значение."
    correct: [a]
    explanation: "В Rust let по умолчанию создаёт неизменяемую переменную. Изменяемость - осознанный выбор через let mut."
    variants:
      - prompt: "Что делает ключевое слово mut?"
        choices:
          - id: a
            text: "Разрешает изменять значение переменной после объявления."
          - id: b
            text: "Превращает переменную в константу."
          - id: c
            text: "Делает переменную видимой из других модулей."
          - id: d
            text: "Меняет тип переменной на строковый."
        correct: [a]
        explanation: "mut снимает неизменяемость по умолчанию: с ним переменной можно присвоить новое значение того же типа."
      - prompt: "Что такое затенение (shadowing) в Rust?"
        choices:
          - id: a
            text: "Повторное let с тем же именем создаёт новую переменную, можно даже сменить тип."
          - id: b
            text: "Изменение значения переменной на месте без mut."
          - id: c
            text: "Ошибка компиляции при повторном имени."
          - id: d
            text: "Автоматическое удаление старой переменной сборщиком."
        correct: [a]
        explanation: "Затенение - это новое связывание того же имени через let. Старое значение перекрывается новым, и тип при этом может измениться."

  - id: vars-decl-blanks-001
    concept: variables-and-types
    type: fill-in-blanks
    difficulty: 2
    prompt: "Сделайте переменную изменяемой, чтобы следующая строка была допустима."
    template: |
      let {{kw}} counter = 0;
      counter = counter + 1;
    blanks:
      kw:
        accept: ["mut"]
    explanation: "Присваивание counter = counter + 1 требует изменяемой переменной. Без mut Rust отклонит переприсваивание."
    hints:
      - "По умолчанию переменную менять нельзя. Какое слово это разрешает?"
    variants:
      - prompt: "Впишите тип, которым Rust по умолчанию считает дробный литерал 3.14."
        template: |
          let ratio: {{ty}} = 3.14;
        blanks:
          ty:
            accept: ["f64"]
      - prompt: "Впишите индекс, чтобы взять из кортежа второй элемент (значение 2)."
        template: |
          let pair = (1, 2);
          let second = pair.{{idx}};
        blanks:
          idx:
            accept: ["1"]

  - id: vars-shadow-predict-001
    concept: variables-and-types
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает программа? Каждое let заново связывает имя x."
    snippet: |
      fn main() {
          let x = 5;
          let x = x + 1;
          let x = x * 2;
          println!("{}", x);
      }
    expected:
      kind: stdout
      value: |-
        12
    explanation: "Затенение создаёт новую переменную с тем же именем: x = 5, затем 5 + 1 = 6, затем 6 * 2 = 12. Печатается последнее значение."
    hints:
      - "Идите по строкам сверху вниз, подставляя предыдущее значение x в следующее выражение."
    variants:
      - prompt: "Что напечатает программа?"
        snippet: |
          fn main() {
              let x = 2;
              let x = x * x;
              let x = x + 3;
              println!("{}", x);
          }
        expected:
          kind: stdout
          value: |-
            7
      - prompt: "Что напечатает программа? Обращение к элементам кортежа идёт через точку и индекс."
        snippet: |
          fn main() {
              let point = (3, 4);
              println!("{} {}", point.0, point.1);
          }
        expected:
          kind: stdout
          value: |-
            3 4

  - id: vars-scope-predict-001
    concept: variables-and-types
    type: predict-output
    difficulty: 3
    prompt: "Что напечатает программа? Затенение внутри блока действует только внутри блока."
    snippet: |
      fn main() {
          let x = 5;
          {
              let x = x * 10;
              println!("{}", x);
          }
          println!("{}", x);
      }
    expected:
      kind: stdout
      value: |-
        50
        5
    explanation: "Внутри вложенного блока x затенён значением 5 * 10 = 50 и печатается первым. После выхода из блока внутреннее связывание исчезает, и внешний x снова равен 5."
    hints:
      - "У вложенного блока своя область видимости. Что происходит с внутренним x на закрывающей скобке?"
      - "Первый println внутри блока, второй - снаружи, где x не менялся."
