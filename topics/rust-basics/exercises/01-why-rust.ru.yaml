exercises:
  - id: whyrust-value-quiz-001
    concept: why-rust
    type: theory-quiz
    difficulty: 1
    prompt: "В чём главное обещание Rust по сравнению с C и языками со сборщиком мусора?"
    choices:
      - id: a
        text: "Безопасность памяти без сборщика мусора и скорость уровня C за счёт"
      - id: b
        text: "Простой интерпретируемый язык, который легко выучить за вечер."
      - id: c
        text: "Автоматический сборщик мусора, как в Java, но быстрее."
      - id: d
        text: "Язык только для веб-фронтенда."
    correct: [a]
    explanation: "Rust переносит контроль над памятью на этап компиляции: гарантии безопасности без пауз сборщика мусора и без ручного free, а скорость остаётся близкой к C."
    variants:
      - prompt: "Когда Rust проверяет корректность работы с памятью?"
        choices:
          - id: a
            text: "На этапе компиляции, по правилам владения и заимствования."
          - id: b
            text: "Во время выполнения, специальным сторожем в рантайме."
          - id: c
            text: "Никогда: ответственность целиком на программисте."
          - id: d
            text: "Только в тестах, если их написать."
        correct: [a]
        explanation: "Проверки владения и заимствования выполняются компилятором до запуска. Поэтому целый класс ошибок памяти отсекается ещё до того, как программа стартует."
      - prompt: "Чем подход Rust к освобождению памяти отличается от C?"
        choices:
          - id: a
            text: "Освобождение вставляет компилятор по правилам владения, а не программист"
          - id: b
            text: "В Rust память вообще не освобождается до конца работы программы."
          - id: c
            text: "В Rust, как и в C, нужно вручную вызывать free."
          - id: d
            text: "Rust освобождает память случайным образом."
        correct: [a]
        explanation: "В C вы сами зовёте free и рискуете ошибиться. Rust по владению знает момент освобождения и вставляет его за вас, без ручного управления и без сборщика."

  - id: whyrust-hello-blanks-001
    concept: why-rust
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите минимальную программу: точку входа."
    template: |
      fn {{entry}}() {
          println!("Привет, Rust");
      }
    blanks:
      entry:
        accept: ["main"]
    explanation: "Выполнение программы на Rust начинается с функции main. println! - это макрос вывода, на что указывает восклицательный знак."
    hints:
      - "У точки входа во многих языках одно и то же зарезервированное имя."
    variants:
      - prompt: "Впишите имя макроса, который печатает строку с переводом строки."
        template: |
          fn main() {
              {{macro}}!("Привет");
          }
        blanks:
          macro:
            accept: ["println"]
      - prompt: "Впишите ключевое слово, которым объявляют переменную."
        template: |
          fn main() {
              {{kw}} name = "Rust";
              println!("{}", name);
          }
        blanks:
          kw:
            accept: ["let"]

  - id: whyrust-print-predict-001
    concept: why-rust
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает программа? В {} подставляется значение, идущее аргументом."
    snippet: |
      fn main() {
          println!("Rust {}", 2020 + 5);
      }
    expected:
      kind: stdout
      value: |-
        Rust 2025
    explanation: "println! вычисляет выражение 2020 + 5 и подставляет результат на место фигурных скобок. Получается «Rust 2025»."
    hints:
      - "Сначала вычислите выражение в аргументе, потом подставьте его вместо фигурных скобок."
    variants:
      - prompt: "Что напечатает программа? Аргументы подставляются по порядку."
        snippet: |
          fn main() {
              println!("{} {}", "hi", 42);
          }
        expected:
          kind: stdout
          value: |-
            hi 42
      - prompt: "Что напечатает программа?"
        snippet: |
          fn main() {
              println!("{}", 3 * 4);
          }
        expected:
          kind: stdout
          value: |-
            12

  - id: whyrust-guarantee-quiz-001
    concept: why-rust
    type: theory-quiz
    difficulty: 3
    prompt: "Как Rust добивается безопасности памяти без сборщика мусора?"
    choices:
      - id: a
        text: "Компилятор по правилам владения на этапе сборки знает время жизни каждого"
      - id: b
        text: "В фоне всё-таки работает сборщик мусора, просто его не видно."
      - id: c
        text: "Память не освобождается до конца работы программы."
      - id: d
        text: "Программист обязан вручную вызывать free, как в C."
    correct: [a]
    explanation: "Ключ - в моменте проверки. Правила владения и заимствования позволяют компилятору вычислить время жизни значений и вставить освобождение во время сборки, поэтому ни сборщик, ни ручной free не нужны."
    hints:
      - "Важно, когда принимается решение об освобождении: во время выполнения или во время компиляции?"
      - "Что даёт компилятору знание о единственном владельце значения и его области видимости?"
