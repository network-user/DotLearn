exercises:
  - id: borrow-ref-quiz-001
    concept: borrowing-and-slices
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает ссылка & в Rust?"
    choices:
      - id: a
        text: "Одалживает доступ к данным, не забирая владение"
      - id: b
        text: "Перемещает владение, как обычное присваивание."
      - id: c
        text: "Создаёт глубокую копию значения."
      - id: d
        text: "Освобождает память, на которую указывает."
    correct: [a]
    explanation: "Заимствование - это доступ без передачи владения. После того как ссылку использовали, исходная переменная жива и годна."
    variants:
      - prompt: "Сколько изменяемых ссылок &mut на одни данные допустимо в один момент времени?"
        choices:
          - id: a
            text: "Ровно одна, и при этом никаких"
          - id: b
            text: "Любое число, как и неизменяемых."
          - id: c
            text: "Не больше двух."
          - id: d
            text: "Ноль: &mut в Rust запрещены."
        correct: [a]
        explanation: "Правило заёма: либо много ссылок &, либо ровно одна &mut, но не вместе. Так исключается гонка данных между читателем и писателем."
      - prompt: "Что нужно, чтобы взять изменяемую ссылку &mut s?"
        choices:
          - id: a
            text: "Переменная s должна быть объявлена как mut."
          - id: b
            text: "Ничего особенного, &mut берётся с любой переменной."
          - id: c
            text: "s должна быть числом."
          - id: d
            text: "Нужно сначала клонировать s."
        correct: [a]
        explanation: "Изменяемую ссылку можно взять только с изменяемой переменной. Для let s = ... выражение &mut s не соберётся; нужно let mut s."

  - id: borrow-mut-blanks-001
    concept: borrowing-and-slices
    type: fill-in-blanks
    difficulty: 2
    prompt: "Функция должна изменить строку через ссылку. Впишите вид ссылки в сигнатуре и на месте вызова."
    template: |
      fn push_bang(s: &{{kw}} String) {
          s.push('!');
      }

      fn main() {
          let mut s = String::from("Rust");
          push_bang(&{{kw2}} s);
      }
    blanks:
      kw:
        accept: ["mut"]
      kw2:
        accept: ["mut"]
    explanation: "Чтобы менять данные через ссылку, и параметр, и аргумент берут как &mut. Сама переменная при этом объявлена mut."
    hints:
      - "Обычная ссылка даёт только чтение. Какое слово превращает её в ссылку с правом изменять?"
    variants:
      - prompt: "Функция только читает длину. Впишите вид ссылки, который не забирает владение и не требует mut."
        template: |
          fn length(s: &{{kw}}) -> usize {
              s.len()
          }
        blanks:
          kw:
            accept: ["String", "str"]
      - prompt: "Впишите оператор диапазона, чтобы взять срез первых трёх байт строки."
        template: |
          let s = String::from("abcdef");
          let head = &s[0{{op}}3];
        blanks:
          op:
            accept: [".."]

  - id: slice-predict-001
    concept: borrowing-and-slices
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает программа? Правая граница диапазона не включается."
    snippet: |
      fn main() {
          let nums = [10, 20, 30, 40, 50];
          let mid = &nums[1..4];
          println!("{:?}", mid);
      }
    expected:
      kind: stdout
      value: |-
        [20, 30, 40]
    explanation: "Диапазон 1..4 берёт элементы с индексами 1, 2 и 3; индекс 4 не входит. Отладочный формат {:?} печатает срез как [20, 30, 40]."
    hints:
      - "Начните с индекса левой границы. Какой индекс уже не попадает в срез?"
    variants:
      - prompt: "Что напечатает программа?"
        snippet: |
          fn main() {
              let s = String::from("hello world");
              let hello = &s[0..5];
              println!("{}", hello);
          }
        expected:
          kind: stdout
          value: |-
            hello
      - prompt: "Что напечатает программа?"
        snippet: |
          fn main() {
              let nums = [1, 2, 3, 4];
              let tail = &nums[2..4];
              println!("{:?}", tail);
          }
        expected:
          kind: stdout
          value: |-
            [3, 4]

  - id: borrow-mutate-predict-001
    concept: borrowing-and-slices
    type: predict-output
    difficulty: 3
    prompt: "Что напечатает программа? Функция получает изменяемую ссылку."
    snippet: |
      fn add_two(x: &mut i32) {
          *x += 2;
      }

      fn main() {
          let mut n = 5;
          add_two(&mut n);
          add_two(&mut n);
          println!("{}", n);
      }
    expected:
      kind: stdout
      value: |-
        9
    explanation: "Каждый вызов add_two разыменовывает ссылку (*x) и прибавляет 2 к оригиналу. Два вызова превращают 5 в 9. Изменяемая ссылка правит саму переменную n."
    hints:
      - "add_two меняет не копию, а сам оригинал через &mut. Проследите значение n после каждого вызова."
      - "Звёздочка *x - это разыменование: обращение к значению, на которое смотрит ссылка. 5, потом 7, потом 9."
