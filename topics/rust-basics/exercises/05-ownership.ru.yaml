exercises:
  - id: own-rules-quiz-001
    concept: ownership
    type: theory-quiz
    difficulty: 1
    prompt: "Сколько владельцев может быть у одного значения в Rust в один момент времени?"
    choices:
      - id: a
        text: "Ровно один."
      - id: b
        text: "Сколько угодно, как ссылок в Python."
      - id: c
        text: "Ноль или один, но не больше двух."
      - id: d
        text: "Столько, сколько потоков к нему обращается."
    correct: [a]
    explanation: "Первое правило владения: у каждого значения ровно один владелец. Именно поэтому память освобождается ровно один раз - в конце жизни этого владельца."
    variants:
      - prompt: "Что происходит со значением, когда его владелец выходит из области видимости?"
        choices:
          - id: a
            text: "Значение освобождается автоматически: Rust вызывает drop в конце блока."
          - id: b
            text: "Ничего: память освободит сборщик мусора позже."
          - id: c
            text: "Нужно вручную вызвать free, иначе будет утечка."
          - id: d
            text: "Значение копируется в родительскую область видимости."
        correct: [a]
        explanation: "Конец блока (закрывающая скобка) - это точка освобождения. Rust знает её из текста программы и вставляет drop сам, без сборщика мусора."
      - prompt: "Что делает присваивание let s2 = s1 для String?"
        choices:
          - id: a
            text: "Перемещает владение из s1 в s2; s1 становится недействительной."
          - id: b
            text: "Создаёт глубокую копию буфера, обе переменные годны."
          - id: c
            text: "Делает s1 и s2 двумя владельцами одного буфера."
          - id: d
            text: "Это ошибка компиляции."
        correct: [a]
        explanation: "String владеет буфером на куче, поэтому присваивание - это move. После него отвечает за данные только s2, а s1 использовать нельзя."

  - id: own-move-blanks-001
    concept: ownership
    type: fill-in-blanks
    difficulty: 2
    prompt: "Нужны две независимые копии данных на куче. Впишите вызов, который делает глубокую копию."
    template: |
      let s1 = String::from("Rust");
      let s2 = s1.{{call}};
      println!("{} {}", s1, s2);
    blanks:
      call:
        accept: ["clone()", "clone(  )"]
    explanation: "clone() выделяет новую память и копирует содержимое, поэтому обе переменные остаются годными. Без него простое присваивание переместило бы владение и s1 стала бы недействительной."
    hints:
      - "Rust не копирует данные кучи молча. Нужен явный метод, который просит глубокую копию."
    variants:
      - prompt: "Впишите тип, значения которого при присваивании перемещаются, а не копируются."
        template: |
          let a = {{ty}}::from("hi");
          let b = a;
        blanks:
          ty:
            accept: ["String"]
      - prompt: "Числа копируются. Впишите значение так, чтобы после присваивания x осталась годной, и код напечатал 7 7."
        template: |
          let x = {{val}};
          let y = x;
          println!("{} {}", x, y);
        blanks:
          val:
            accept: ["7"]

  - id: own-copy-predict-001
    concept: ownership
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает программа? Обратите внимание на тип значения."
    snippet: |
      fn main() {
          let x = 5;
          let y = x;
          println!("{} {}", x, y);
      }
    expected:
      kind: stdout
      value: |-
        5 5
    explanation: "i32 реализует Copy, поэтому let y = x создаёт копию, а x остаётся годной. Печатаются оба значения через пробел: 5 5."
    hints:
      - "Целые числа лежат целиком на стеке. Перемещается ли такое значение при присваивании или копируется?"
    variants:
      - prompt: "Что напечатает программа? Метод len() только читает строку."
        snippet: |
          fn main() {
              let s = String::from("Rust");
              let n = s.len();
              println!("{} {}", s, n);
          }
        expected:
          kind: stdout
          value: |-
            Rust 4
      - prompt: "Что напечатает программа?"
        snippet: |
          fn main() {
              let a = true;
              let b = a;
              println!("{} {}", a, b);
          }
        expected:
          kind: stdout
          value: |-
            true true

  - id: own-clone-chain-predict-001
    concept: ownership
    type: predict-output
    difficulty: 4
    prompt: "Что напечатает программа? Проследите, какие переменные остаются годными после каждой строки."
    snippet: |
      fn main() {
          let s1 = String::from("ab");
          let s2 = s1.clone();
          let s3 = s2;
          println!("{} {}", s1, s3);
      }
    expected:
      kind: stdout
      value: |-
        ab ab
    explanation: "s1.clone() делает независимую копию, поэтому s1 остаётся годной. Затем s2 перемещается в s3 (s2 становится недействительной, но её не используют). Печатаются s1 и s3: обе хранят «ab»."
    hints:
      - "clone() оставляет исходную переменную живой, обычное присваивание - нет. Отметьте для каждой строки, кто ещё владелец."
      - "s2 переезжает в s3, но в println его нет. А s1 клонировали, значит она годна."
