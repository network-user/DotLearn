exercises:
  - id: enum-basics-quiz-001
    concept: enums-and-match
    type: theory-quiz
    difficulty: 1
    prompt: "Что такое enum в Rust?"
    choices:
      - id: a
        text: "Тип, значение которого"
      - id: b
        text: "Просто набор целочисленных констант без данных."
      - id: c
        text: "Изменяемый список значений."
      - id: d
        text: "Синоним структуры struct."
    correct: [a]
    explanation: "enum задаёт тип-сумму: значение - один из вариантов, причём вариант может хранить данные, например Move(i32, i32)."
    variants:
      - prompt: "Почему компилятор требует, чтобы match покрывал все варианты enum?"
        choices:
          - id: a
            text: "Чтобы ни один возможный случай не остался"
          - id: b
            text: "Ради ускорения программы."
          - id: c
            text: "Это не требуется, match может быть неполным."
          - id: d
            text: "Из-за правил форматирования кода."
        correct: [a]
        explanation: "Исчерпывающий match гарантирует, что каждый вариант обработан. При добавлении нового варианта компилятор укажет все match, которые надо обновить."
      - prompt: "Что удобно использовать, когда из enum интересен лишь один вариант?"
        choices:
          - id: a
            text: "Конструкцию if let."
          - id: b
            text: "Цикл for всегда."
          - id: c
            text: "Цикл while всегда."
          - id: d
            text: "Оператор return."
        correct: [a]
        explanation: "if let разбирает один интересующий вариант без полного match. Остальные случаи при этом просто игнорируются."

  - id: enum-match-blanks-001
    concept: enums-and-match
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите ключевое слово, которое раскладывает значение по веткам-образцам."
    template: |
      enum Light {
          Red,
          Green,
      }

      fn go(l: Light) -> bool {
          {{kw}} l {
              Light::Red => false,
              Light::Green => true,
          }
      }
    blanks:
      kw:
        accept: ["match"]
    explanation: "match сопоставляет значение с образцами-ветками. Здесь Red даёт false, Green - true; ветки покрывают все варианты Light."
    hints:
      - "Эта конструкция выбирает ветку по варианту enum и обязана быть исчерпывающей."
    variants:
      - prompt: "Впишите ключевое слово, объявляющее перечисление."
        template: |
          {{kw}} Direction {
              North,
              South,
          }
        blanks:
          kw:
            accept: ["enum"]
      - prompt: "Впишите ключевое слово, чтобы разобрать один вариант через if let."
        template: |
          let x = Some(5);
          {{kw}} let Some(n) = x {
              println!("{}", n);
          }
        blanks:
          kw:
            accept: ["if"]

  - id: enum-coin-predict-001
    concept: enums-and-match
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает программа? match выбирает ветку по варианту enum."
    snippet: |
      enum Coin {
          Penny,
          Nickel,
          Dime,
      }

      fn value(c: Coin) -> i32 {
          match c {
              Coin::Penny => 1,
              Coin::Nickel => 5,
              Coin::Dime => 10,
          }
      }

      fn main() {
          println!("{}", value(Coin::Nickel));
      }
    expected:
      kind: stdout
      value: |-
        5
    explanation: "match сопоставляет Coin::Nickel с соответствующей веткой и возвращает 5. Каждый вариант обрабатывается своей стрелкой."
    hints:
      - "Найдите ветку match с тем же вариантом, что передали в value."
    variants:
      - prompt: "Что напечатает программа?"
        snippet: |
          enum Coin {
              Penny,
              Nickel,
              Dime,
          }

          fn value(c: Coin) -> i32 {
              match c {
                  Coin::Penny => 1,
                  Coin::Nickel => 5,
                  Coin::Dime => 10,
              }
          }

          fn main() {
              println!("{}", value(Coin::Dime));
          }
        expected:
          kind: stdout
          value: |-
            10
      - prompt: "Что напечатает программа?"
        snippet: |
          enum Coin {
              Penny,
              Nickel,
              Dime,
          }

          fn value(c: Coin) -> i32 {
              match c {
                  Coin::Penny => 1,
                  Coin::Nickel => 5,
                  Coin::Dime => 10,
              }
          }

          fn main() {
              println!("{}", value(Coin::Penny));
          }
        expected:
          kind: stdout
          value: |-
            1

  - id: enum-move-match-predict-001
    concept: enums-and-match
    type: predict-output
    difficulty: 3
    prompt: "Что напечатает программа? Ветка match может извлечь данные из варианта."
    snippet: |
      enum Msg {
          Quit,
          Move(i32, i32),
      }

      fn describe(m: Msg) -> i32 {
          match m {
              Msg::Quit => 0,
              Msg::Move(x, y) => x + y,
          }
      }

      fn main() {
          println!("{}", describe(Msg::Move(3, 4)));
      }
    expected:
      kind: stdout
      value: |-
        7
    explanation: "Вариант Move несёт два числа. Ветка Msg::Move(x, y) связывает их с x и y, и функция возвращает x + y = 7. Вариант Quit сюда не попадает."
    hints:
      - "Какой вариант передали в describe? Что делает его ветка с числами внутри?"
      - "x и y берутся прямо из Move(3, 4)."
