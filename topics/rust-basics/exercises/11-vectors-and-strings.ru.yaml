exercises:
  - id: vec-basics-quiz-001
    concept: vectors-and-strings
    type: theory-quiz
    difficulty: 1
    prompt: "Что такое Vec в Rust?"
    choices:
      - id: a
        text: "Растущий массив-владелец: хранит элементы одного типа и может менять длину."
      - id: b
        text: "Массив фиксированной длины, заданной при компиляции."
      - id: c
        text: "Неизменяемый срез чужих данных."
      - id: d
        text: "Тип для одного символа."
    correct: [a]
    explanation: "Vec<T> - это владеющий данными массив на куче, который умеет расти через push. Обычный массив [T; N], наоборот, имеет фиксированную длину."
    variants:
      - prompt: "Чем String отличается от &str?"
        choices:
          - id: a
            text: "String владеет буфером на куче и может расти, а &str - неизменяемый срез-окно в текст."
          - id: b
            text: "Это два имени одного и того же типа."
          - id: c
            text: "&str владеет текстом, а String только заимствует."
          - id: d
            text: "String хранит одно число, &str - строку."
        correct: [a]
        explanation: "String - владелец растущего UTF-8 буфера. &str - это заимствованный срез, часто указывающий в литерал или внутрь String."
      - prompt: "Что возвращает s.len() для строки?"
        choices:
          - id: a
            text: "Число байт в представлении UTF-8, а не число символов."
          - id: b
            text: "Всегда число символов."
          - id: c
            text: "Число слов в строке."
          - id: d
            text: "Ёмкость буфера в мегабайтах."
        correct: [a]
        explanation: "len() считает байты. Для латиницы байт равен символу, но для кириллицы один символ занимает два байта, поэтому len «Привет» равен 12."

  - id: vec-build-blanks-001
    concept: vectors-and-strings
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите макрос, создающий вектор из перечисленных элементов."
    template: |
      let mut v = {{macro}}![1, 2, 3];
      v.push(4);
    blanks:
      macro:
        accept: ["vec"]
    explanation: "Макрос vec! создаёт Vec с начальными элементами. push дописывает новый элемент в конец, поэтому переменная объявлена mut."
    hints:
      - "Короткий макрос со скобками [ ] создаёт вектор прямо из списка значений."
    variants:
      - prompt: "Впишите тип-владелец текста, который умеет расти."
        template: |
          let mut s = {{ty}}::from("Rust");
          s.push_str("!");
        blanks:
          ty:
            accept: ["String"]
      - prompt: "Впишите метод, который дописывает срез текста в конец строки."
        template: |
          let mut s = String::from("Rust");
          s.{{call}}(" rules");
        blanks:
          call:
            accept: ["push_str"]

  - id: vec-push-predict-001
    concept: vectors-and-strings
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает программа? push добавляет элемент в конец вектора."
    snippet: |
      fn main() {
          let mut v = vec![1, 2, 3];
          v.push(4);
          println!("{:?}", v);
      }
    expected:
      kind: stdout
      value: |-
        [1, 2, 3, 4]
    explanation: "vec![1, 2, 3] создаёт вектор из трёх элементов, push(4) дописывает четвёртый. Отладочный формат {:?} печатает [1, 2, 3, 4]."
    hints:
      - "push кладёт новый элемент в самый конец. Каким станет вектор?"
    variants:
      - prompt: "Что напечатает программа?"
        snippet: |
          fn main() {
              let mut v = vec![10, 20];
              v.push(30);
              println!("{:?}", v);
          }
        expected:
          kind: stdout
          value: |-
            [10, 20, 30]
      - prompt: "Что напечатает программа? sum складывает все элементы."
        snippet: |
          fn main() {
              let v = vec![1, 2, 3, 4];
              let total: i32 = v.iter().sum();
              println!("{}", total);
          }
        expected:
          kind: stdout
          value: |-
            10

  - id: string-join-predict-001
    concept: vectors-and-strings
    type: predict-output
    difficulty: 3
    prompt: "Что напечатает программа? join склеивает элементы через разделитель."
    snippet: |
      fn main() {
          let words = vec!["Rust", "is", "fast"];
          let joined = words.join(" ");
          println!("{}", joined);
      }
    expected:
      kind: stdout
      value: |-
        Rust is fast
    explanation: "join(\" \") соединяет строки вектора, вставляя пробел между ними: «Rust is fast». Разделитель не добавляется после последнего слова."
    hints:
      - "Между какими элементами и с каким разделителем join вставляет пробел?"
      - "Разделитель ставится только между словами, не после последнего."
