exercises:
  - id: struct-basics-quiz-001
    concept: structs-and-methods
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает struct в Rust?"
    choices:
      - id: a
        text: "Группирует несколько именованных полей в один"
      - id: b
        text: "Объявляет класс с наследованием и виртуальными методами."
      - id: c
        text: "Задаёт цикл по полям объекта."
      - id: d
        text: "Создаёт модуль внутри крейта."
    correct: [a]
    explanation: "struct собирает поля под одним именем типа. За поведение отвечают методы в блоке impl; наследования классов в Rust нет."
    variants:
      - prompt: "Где определяют методы структуры?"
        choices:
          - id: a
            text: "В блоке impl для этого типа."
          - id: b
            text: "Прямо внутри фигурных скобок struct."
          - id: c
            text: "Только внутри trait."
          - id: d
            text: "В отдельном модуле mod methods."
        correct: [a]
        explanation: "Методы и ассоциированные функции пишут в блоке impl Type { ... }. Сам struct описывает только поля-данные."
      - prompt: "Что означает &self в сигнатуре метода?"
        choices:
          - id: a
            text: "Метод заимствует структуру для чтения, не забирая"
          - id: b
            text: "Метод создаёт копию структуры при каждом вызове."
          - id: c
            text: "Метод удаляет структуру после вызова."
          - id: d
            text: "Метод не имеет доступа к полям."
        correct: [a]
        explanation: "&self - это заимствование экземпляра на чтение. Чтобы менять поля, берут &mut self; чтобы потребить структуру - self по значению."

  - id: struct-impl-blanks-001
    concept: structs-and-methods
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите ключевое слово, открывающее блок с методами типа Point."
    template: |
      struct Point {
          x: i32,
          y: i32,
      }

      {{kw}} Point {
          fn sum(&self) -> i32 {
              self.x + self.y
          }
      }
    blanks:
      kw:
        accept: ["impl"]
    explanation: "Методы типа объявляют в блоке impl Point { ... }. Внутри метод получает доступ к полям через self."
    hints:
      - "Данные описывает struct, а поведение - отдельный блок с особым ключевым словом."
    variants:
      - prompt: "Впишите приёмник, чтобы метод только читал структуру и не забирал владение."
        template: |
          impl Counter {
              fn value(&{{kw}}) -> i32 {
                  self.n
              }
          }
        blanks:
          kw:
            accept: ["self"]
      - prompt: "Метод должен менять поле. Впишите слово, дающее изменяемый доступ к структуре."
        template: |
          impl Counter {
              fn inc(&{{kw}} self) {
                  self.n += 1;
              }
          }
        blanks:
          kw:
            accept: ["mut"]

  - id: struct-sum-predict-001
    concept: structs-and-methods
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает программа? Метод читает поля через self."
    snippet: |
      struct Point {
          x: i32,
          y: i32,
      }

      impl Point {
          fn sum(&self) -> i32 {
              self.x + self.y
          }
      }

      fn main() {
          let p = Point { x: 3, y: 4 };
          println!("{}", p.sum());
      }
    expected:
      kind: stdout
      value: |-
        7
    explanation: "Метод sum складывает поля через &self: 3 + 4 = 7. Приёмник &self даёт доступ на чтение, не забирая владение структурой."
    hints:
      - "Подставьте значения полей x и y в тело метода sum."
    variants:
      - prompt: "Что напечатает программа? new - ассоциированная функция, её зовут через ::."
        snippet: |
          struct Counter {
              n: i32,
          }

          impl Counter {
              fn new() -> Counter {
                  Counter { n: 0 }
              }
              fn value(&self) -> i32 {
                  self.n
              }
          }

          fn main() {
              let c = Counter::new();
              println!("{}", c.value());
          }
        expected:
          kind: stdout
          value: |-
            0
      - prompt: "Что напечатает программа?"
        snippet: |
          struct Counter {
              n: i32,
          }

          impl Counter {
              fn inc(&mut self) {
                  self.n += 1;
              }
          }

          fn main() {
              let mut c = Counter { n: 5 };
              c.inc();
              c.inc();
              println!("{}", c.n);
          }
        expected:
          kind: stdout
          value: |-
            7

  - id: struct-account-predict-001
    concept: structs-and-methods
    type: predict-output
    difficulty: 3
    prompt: "Что напечатает программа? Метод с &mut self меняет поле оригинала."
    snippet: |
      struct Account {
          balance: i32,
      }

      impl Account {
          fn deposit(&mut self, amount: i32) {
              self.balance += amount;
          }
      }

      fn main() {
          let mut a = Account { balance: 100 };
          a.deposit(50);
          a.deposit(25);
          println!("{}", a.balance);
      }
    expected:
      kind: stdout
      value: |-
        175
    explanation: "deposit принимает &mut self и прибавляет сумму к полю balance оригинала: 100 + 50 + 25 = 175. С приёмником &self менять поле было бы нельзя."
    hints:
      - "Метод берёт &mut self, значит меняет саму a, а не копию. Проследите balance после каждого вызова."
      - "100, затем +50, затем +25."
