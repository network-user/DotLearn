exercises:
- id: cc-what-units-001
  concept: what-is-complexity
  type: theory-quiz
  difficulty: 1
  prompt: How is the computational complexity of an algorithm measured?
  choices:
  - id: a
    text: In the number of steps as a function of the input size n.
  - id: b
    text: In seconds of work on a specific machine.
  - id: c
    text: In the number of lines of source code.
  - id: d
    text: In megabytes of used RAM.
  correct:
  - a
  explanation: Complexity counts steps based on input size, rather than the time of a specific run. Seconds depend on hardware,
    load and cache and do not characterize the algorithm itself.
  variants:
  - prompt: Why are seconds a poor choice for comparing algorithms?
    choices:
    - id: a
      text: Because they depend on the hardware, load and cache, and not on the algorithm itself.
    - id: b
      text: Because seconds are too large a unit and milliseconds are needed.
    - id: c
      text: Because modern processors cannot measure time accurately.
    - id: d
      text: Because time cannot be expressed as a function of n.
    correct:
    - a
    explanation: The time for one start varies from machine to machine and from load to load. The law of growth of the number
      of steps is a property of the algorithm that does not depend on the hardware.
  - prompt: What does the letter n stand for in complexity analysis?
    choices:
    - id: a
      text: 'Input size: length of the list, number of characters in the line, etc.'
    - id: b
      text: The line number on which the innermost loop is located.
    - id: c
      text: The number of processor cores on the machine.
    - id: d
      text: The exact number of seconds the algorithm runs.
    correct:
    - a
    explanation: 'n is the size of the input. Complexity is expressed as a function of n: how the number of steps increases
      as the input increases.'
- id: cc-growth-law-001
  concept: what-is-complexity
  type: predict-output
  difficulty: 2
  prompt: What will this program output?
  snippet: "def quadratic_steps(n):\n    steps = 0\n    for _ in range(n):\n        for _ in range(n):\n            steps\
    \ += 1\n    return steps\n\nprint(quadratic_steps(8))\n"
  expected:
    kind: stdout
    value: '64'
  hints:
  - Nested loops multiply their lengths. How many times will the innermost line be executed if both loops go through range(n)?
  - The outer loop rotates n times, and at each iteration the inner loop takes n more steps. Multiply n by n for n = 8.
  variants:
  - snippet: "def quadratic_steps(n):\n    steps = 0\n    for _ in range(n):\n        for _ in range(n):\n            steps\
      \ += 1\n    return steps\n\nprint(quadratic_steps(5))\n"
    expected:
      kind: stdout
      value: '25'
  - snippet: "def linear_steps(n):\n    steps = 0\n    for _ in range(n):\n        steps += 1\n    return steps\n\nprint(linear_steps(12))\n"
    expected:
      kind: stdout
      value: '12'
- id: cc-log-steps-001
  concept: what-is-complexity
  type: predict-output
  difficulty: 2
  prompt: What will this program output?
  snippet: "def log_steps(n):\n    steps = 0\n    size = n\n    while size > 1:\n        size //= 2\n        steps += 1\n\
    \    return steps\n\nprint(log_steps(16))\n"
  expected:
    kind: stdout
    value: '4'
  hints:
  - At each step, the task is divided in half. How many times can you divide a number by 2 until you are left with one?
  - 'From 16 you get 8, then 4, 2, 1. Count the number of divisions: this is log to base 2.'
  variants:
  - snippet: "def log_steps(n):\n    steps = 0\n    size = n\n    while size > 1:\n        size //= 2\n        steps += 1\n\
      \    return steps\n\nprint(log_steps(8))\n"
    expected:
      kind: stdout
      value: '3'
  - snippet: "def log_steps(n):\n    steps = 0\n    size = n\n    while size > 1:\n        size //= 2\n        steps += 1\n\
      \    return steps\n\nprint(log_steps(32))\n"
    expected:
      kind: stdout
      value: '5'
- id: cc-best-worst-001
  concept: what-is-complexity
  type: fill-in-blanks
  difficulty: 2
  prompt: Complete the discussion about the best and worst case of linear search.
  template: 'In linear search, the best case occurs when the search item is {{position}}:

    the function will return after one operation. The worst case is when the element {{absence}}

    in the list: you have to look through all {{count}} elements. Under complexity usually

    understand exactly {{which}} case.

    '
  blanks:
    position:
      accept:
      - first
      - at the beginning
      - in first place
    absence:
      accept:
      - 'No'
      - doesn't exist
      - absent
    count:
      accept:
      - n
      - N
    which:
      accept:
      - worst
      - worst
  hints:
  - The best case is the most successful data layout, the worst is the most unfortunate. When does the search end instantly,
    and when does it last until the end?
  - A guarantee from above, independent of luck, refers to one of two extreme cases.
- id: cc-count-steps-001
  concept: what-is-complexity
  type: python-function
  difficulty: 3
  prompt: 'Add `nested_steps(n)`: return the number of times the innermost line is executed in a double loop `for i in range(n):
    for j in range(n)`. Count without running nested loops.'
  starter: "def nested_steps(n):\n    ...\n"
  cases:
  - call: nested_steps(0)
    expect: 0
  - call: nested_steps(1)
    expect: 1
  - call: nested_steps(5)
    expect: 25
  - call: nested_steps(10)
    expect: 100
  hints:
  - 'Nested loops multiply their lengths: each of the n iterations of the outer loop runs the entire inner loop.'
  - The innermost line will be executed n times for each of the n iterations of the outer loop.
  - This is n times n. Return the result without explicit loops.
  solution: "def nested_steps(n):\n    return n * n\n"
- id: cc-triangular-steps-001
  concept: what-is-complexity
  type: python-function
  difficulty: 4
  prompt: 'Add `pair_steps(n)`: return the number of iterations of the inner loop in `for i in range(n): for j in range(i
    + 1, n)` - that is, the number of unordered pairs of indices.'
  starter: "def pair_steps(n):\n    ...\n"
  cases:
  - call: pair_steps(0)
    expect: 0
  - call: pair_steps(1)
    expect: 0
  - call: pair_steps(2)
    expect: 1
  - call: pair_steps(5)
    expect: 10
  - call: pair_steps(10)
    expect: 45
  hints:
  - The inner loop takes n-1 steps on the first iteration, n-2 on the second, and so on until zero. This is a sum, not a product.
  - The sum (n-1) + (n-2) + ... + 1 + 0 is the number of ways to select a pair of n elements.
  - 'Closed formula for the sum of the first n-1 natural numbers: n*(n-1)/2. Don''t forget about the integer result.'
  solution: "def pair_steps(n):\n    return n * (n - 1) // 2\n"
