exercises:
  - id: cc-space-meaning-001
    concept: space-and-amortized
    type: theory-quiz
    difficulty: 1
    prompt: "Что считает пространственная сложность алгоритма?"
    choices:
      - id: a
        text: "Дополнительную память, которую алгоритм заводит сверх входных данных, как функцию от n."
      - id: b
        text: "Размер исходного кода в байтах."
      - id: c
        text: "Время работы, переведённое в мегабайты."
      - id: d
        text: "Только память, занятую самими входными данными."
    correct: [a]
    explanation: "Пространственная сложность - функция от n, измеряющая дополнительную память сверх входа: временные списки, словари, стек рекурсии. Сам вход уже лежит в памяти и не считается."
    variants:
      - prompt: "Функция складывает квадраты элементов в одну переменную total. Какова её пространственная сложность?"
        choices:
          - id: a
            text: "O(1) - total это одна ячейка, она не растёт с n."
          - id: b
            text: "O(n) - переменная зависит от входа."
          - id: c
            text: "O(n²) - там есть умножение."
          - id: d
            text: "O(log n) - аккумулятор растёт логарифмически."
        correct: [a]
        explanation: "Аккумулятор - единственная переменная, не растущая с n. Дополнительная память константна: O(1), даже если временная сложность O(n)."
      - prompt: "Функция строит и возвращает новый список из n квадратов входных чисел. Какова её пространственная сложность?"
        choices:
          - id: a
            text: "O(n) - результирующий список растёт вместе с входом."
          - id: b
            text: "O(1) - возврат списка не считается памятью."
          - id: c
            text: "O(n²) - на каждый элемент заводится список."
          - id: d
            text: "O(log n) - список растёт логарифмически."
        correct: [a]
        explanation: "Накопитель result хранит n элементов, его длина повторяет вход. Дополнительная память - O(n)."

  - id: cc-amortized-meaning-001
    concept: space-and-amortized
    type: theory-quiz
    difficulty: 2
    prompt: "Почему `list.append` называют амортизированно O(1), хотя иногда он копирует весь список за O(n)?"
    choices:
      - id: a
        text: "Список растёт с запасом, дорогие копирования случаются всё реже, и усреднённая по серии стоимость одной операции - константа."
      - id: b
        text: "Потому что append на самом деле никогда не копирует список."
      - id: c
        text: "Потому что копирование списка - это тоже O(1)."
      - id: d
        text: "Потому что Python выполняет append на отдельном ядре."
    correct: [a]
    explanation: "При расширении список выделяет место с запасом (рост в разы), поэтому копирования редеют. Размазанная по всем append стоимость копирований даёт константу на операцию - это и есть амортизированный O(1)."
    variants:
      - prompt: "Чем амортизированная сложность отличается от среднего случая?"
        choices:
          - id: a
            text: "Амортизация - гарантия на любую серию операций; средний случай зависит от распределения данных."
          - id: b
            text: "Это одно и то же, просто разные слова."
          - id: c
            text: "Амортизация считает память, а средний случай - время."
          - id: d
            text: "Средний случай всегда меньше амортизированного."
        correct: [a]
        explanation: "Амортизированная стоимость верна для любой последовательности операций и не опирается на вероятности. Средний случай - это ожидание по распределению входных данных."
      - prompt: "Какова сложность `list.insert(0, x)` - вставки в начало списка из n элементов?"
        choices:
          - id: a
            text: "O(n) каждый раз - сдвигаются все элементы."
          - id: b
            text: "Амортизированно O(1), как и append."
          - id: c
            text: "O(log n) - вставка использует двоичный поиск места."
          - id: d
            text: "O(1) всегда - вставка в начало мгновенна."
        correct: [a]
        explanation: "insert(0, x) сдвигает все существующие элементы на одну позицию, поэтому это честный O(n) каждый раз. Для дешёвой вставки в начало нужен collections.deque."

  - id: cc-recursion-space-001
    concept: space-and-amortized
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа? `max_depth` фиксирует максимальную глубину стека рекурсии."
    snippet: |
      max_depth = 0

      def rec_sum(numbers, i=0, depth=1):
          global max_depth
          max_depth = max(max_depth, depth)
          if i == len(numbers):
              return 0
          return numbers[i] + rec_sum(numbers, i + 1, depth + 1)

      rec_sum([10, 20, 30, 40])
      print(max_depth)
    expected:
      kind: stdout
      value: "5"
    hints:
      - "Каждый элемент списка добавляет один кадр на стек, плюс есть финальный вызов на пустом хвосте. Сколько всего вложенных вызовов?"
      - "Для списка из 4 элементов рекурсия уходит на глубину 4, и ещё один кадр - базовый случай при i == len."
    variants:
      - snippet: |
          max_depth = 0

          def rec_sum(numbers, i=0, depth=1):
              global max_depth
              max_depth = max(max_depth, depth)
              if i == len(numbers):
                  return 0
              return numbers[i] + rec_sum(numbers, i + 1, depth + 1)

          rec_sum([1, 2])
          print(max_depth)
        expected:
          kind: stdout
          value: "3"
      - snippet: |
          max_depth = 0

          def rec_sum(numbers, i=0, depth=1):
              global max_depth
              max_depth = max(max_depth, depth)
              if i == len(numbers):
                  return 0
              return numbers[i] + rec_sum(numbers, i + 1, depth + 1)

          rec_sum([5, 5, 5, 5, 5, 5])
          print(max_depth)
        expected:
          kind: stdout
          value: "7"

  - id: cc-time-space-tradeoff-001
    concept: space-and-amortized
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните рассуждение про размен времени и памяти при проверке общего элемента двух списков."
    template: |
      Наивный двойной цикл проверяет пары и стоит {{naive_time}} по времени,
      но почти не тратит памяти: {{naive_space}}. Если сложить один список в
      {{structure}}, проверка принадлежности станет O(1), и время упадёт до
      {{fast_time}}. Платим за это памятью: дополнительно {{fast_space}}.
    blanks:
      naive_time:
        accept: ["O(n^2)", "O(n²)", "O(nn)"]
      naive_space:
        accept: ["O(1)", "o(1)"]
      structure:
        accept: ["set", "множество", "set()", "dict", "словарь"]
      fast_time:
        accept: ["O(n)", "o(n)"]
      fast_space:
        accept: ["O(n)", "o(n)"]
    hints:
      - "Двойной цикл перемножает длины. Какая структура данных ищет элемент за O(1) благодаря хэшу?"
      - "Размен «время за память»: чтобы убрать квадрат, заводят хранилище размером с вход."

  - id: cc-append-cost-001
    concept: space-and-amortized
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа? Модель удвоения ёмкости: append стоит 1, а при заполнении ёмкости копирует всё за текущую длину."
    snippet: |
      def total_cost(n):
          cost = 0
          length = 0
          capacity = 1
          for _ in range(n):
              if length == capacity:
                  cost += length
                  capacity *= 2
              cost += 1
              length += 1
          return cost

      print(total_cost(8))
    expected:
      kind: stdout
      value: "15"
    hints:
      - "Прокрутите цикл по шагам: следите, когда length догоняет capacity и происходит копирование стоимостью length."
      - "Суммарная стоимость n операций остаётся порядка n - это и есть амортизированный O(1) на операцию."
    variants:
      - snippet: |
          def total_cost(n):
              cost = 0
              length = 0
              capacity = 1
              for _ in range(n):
                  if length == capacity:
                      cost += length
                      capacity *= 2
                  cost += 1
                  length += 1
              return cost

          print(total_cost(4))
        expected:
          kind: stdout
          value: "7"
      - snippet: |
          def total_cost(n):
              cost = 0
              length = 0
              capacity = 1
              for _ in range(n):
                  if length == capacity:
                      cost += length
                      capacity *= 2
                  cost += 1
                  length += 1
              return cost

          print(total_cost(16))
        expected:
          kind: stdout
          value: "31"

  - id: cc-space-fn-001
    concept: space-and-amortized
    type: python-function
    difficulty: 4
    prompt: "Допишите `dedup_keep_order(items)`: верните новый список без повторов, сохранив порядок первого появления каждого элемента. Решение должно делать один проход (O(n) времени) за счёт вспомогательного множества (O(n) памяти)."
    starter: |
      def dedup_keep_order(items):
          ...
    cases:
      - call: "dedup_keep_order([1, 1, 2, 3, 2, 1])"
        expect: [1, 2, 3]
      - call: "dedup_keep_order([])"
        expect: []
      - call: "dedup_keep_order(['a', 'b', 'a', 'c', 'b'])"
        expect: ["a", "b", "c"]
      - call: "dedup_keep_order([5, 4, 3, 2, 1])"
        expect: [5, 4, 3, 2, 1]
    hints:
      - "Чтобы за один проход узнавать, видели ли элемент раньше, нужна структура с проверкой принадлежности за O(1)."
      - "Заведите множество seen и список результата. Для каждого элемента: если его ещё нет в seen, добавьте в результат и в seen."
      - "Проверка `x in seen` и `seen.add(x)` - обе O(1) для множества, поэтому весь проход остаётся O(n)."
    solution: |
      def dedup_keep_order(items):
          seen = set()
          result = []
          for x in items:
              if x not in seen:
                  seen.add(x)
                  result.append(x)
          return result
