exercises:
- id: cc-space-meaning-001
  concept: space-and-amortized
  type: theory-quiz
  difficulty: 1
  prompt: What does the spatial complexity of the algorithm calculate?
  choices:
  - id: a
    text: Additional memory that the algorithm adds in addition
  - id: b
    text: Size of source code in bytes.
  - id: c
    text: Operating time converted to megabytes.
  - id: d
    text: Only the memory occupied by the input data itself.
  correct:
  - a
  explanation: 'Space complexity is a function of n that measures additional memory over and above the input: temporary lists,
    dictionaries, recursion stack. The input itself is already in memory and is not counted.'
  variants:
  - prompt: The function adds the squares of the elements into one variable total. What is its spatial complexity?
    choices:
    - id: a
      text: O(1) - total is one cell, it does not grow with n.
    - id: b
      text: O(n) - variable depends on input.
    - id: c
      text: O(n²) - there is multiplication there.
    - id: d
      text: O(log n) - the accumulator grows logarithmically.
    correct:
    - a
    explanation: 'The accumulator is the only variable that does not increase with n. The extra memory is constant: O(1),
      even if the time complexity is O(n).'
  - prompt: The function constructs and returns a new list of n squares of input numbers. What is its spatial complexity?
    choices:
    - id: a
      text: O(n) - the resulting list grows with the input.
    - id: b
      text: O(1) - returning a list does not count as memory.
    - id: c
      text: O(n²) - a list is created for each element.
    - id: d
      text: O(log n) - the list grows logarithmically.
    correct:
    - a
    explanation: The result accumulator stores n elements, its length is the same as the input. Additional memory - O(n).
- id: cc-amortized-meaning-001
  concept: space-and-amortized
  type: theory-quiz
  difficulty: 2
  prompt: Why is `list.append` called amortized O(1) even though it sometimes copies the entire list in O(n)?
  choices:
  - id: a
    text: "Growth with spare capacity"
  - id: b
    text: "Because list.append never copies the underlying array at all."
  - id: c
    text: "Because copying an entire list is somehow still O(1) work."
  - id: d
    text: "Because Python always runs append on a separate CPU core."
  correct:
  - a
  explanation: When expanding, the list allocates space with a reserve (growth by several times), so copying becomes thinner.
    The cost of copies spread over all appends gives a constant for the operation - this is amortized O(1).
  variants:
  - prompt: How is amortized complexity different from the average case?
    choices:
    - id: a
      text: "Amortized is a bound for any series; average case depends on input distribution."
    - id: b
      text: "They mean the same thing and only differ in wording."
    - id: c
      text: "Amortized counts memory use, while average case only counts time."
    - id: d
      text: "Average case is always strictly smaller than amortized cost."
    correct:
    - a
    explanation: Amortized cost is true for any sequence of transactions and is not based on probabilities. The average case
      is the expectation over the distribution of the input data.
  - prompt: What is the complexity of `list.insert(0, x)` - inserting at the beginning of a list of n elements?
    choices:
    - id: a
      text: O(n) each time - all elements are shifted.
    - id: b
      text: Amortized O(1), just like append.
    - id: c
      text: O(log n) - insertion uses binary search for space.
    - id: d
      text: O(1) always - insertion at the beginning is instantaneous.
    correct:
    - a
    explanation: insert(0, x) shifts all existing elements by one position, so it's fair O(n) every time. For cheap insertion
      at the beginning you need collections.deque.
- id: cc-recursion-space-001
  concept: space-and-amortized
  type: predict-output
  difficulty: 2
  prompt: What will this program output? `max_depth` fixes the maximum depth of the recursion stack.
  snippet: "max_depth = 0\n\ndef rec_sum(numbers, i=0, depth=1):\n    global max_depth\n    max_depth = max(max_depth, depth)\n\
    \    if i == len(numbers):\n        return 0\n    return numbers[i] + rec_sum(numbers, i + 1, depth + 1)\n\nrec_sum([10,\
    \ 20, 30, 40])\nprint(max_depth)\n"
  expected:
    kind: stdout
    value: '5'
  hints:
  - Each list element adds one frame to the stack, plus there is a final call on the empty tail. How many nested calls are
    there in total?
  - For a list of 4 elements, the recursion goes to a depth of 4, and one more frame is the base case with i == len.
  variants:
  - snippet: "max_depth = 0\n\ndef rec_sum(numbers, i=0, depth=1):\n    global max_depth\n    max_depth = max(max_depth, depth)\n\
      \    if i == len(numbers):\n        return 0\n    return numbers[i] + rec_sum(numbers, i + 1, depth + 1)\n\nrec_sum([1,\
      \ 2])\nprint(max_depth)\n"
    expected:
      kind: stdout
      value: '3'
  - snippet: "max_depth = 0\n\ndef rec_sum(numbers, i=0, depth=1):\n    global max_depth\n    max_depth = max(max_depth, depth)\n\
      \    if i == len(numbers):\n        return 0\n    return numbers[i] + rec_sum(numbers, i + 1, depth + 1)\n\nrec_sum([5,\
      \ 5, 5, 5, 5, 5])\nprint(max_depth)\n"
    expected:
      kind: stdout
      value: '7'
- id: cc-time-space-tradeoff-001
  concept: space-and-amortized
  type: fill-in-blanks
  difficulty: 2
  prompt: Complete the argument about the exchange of time and memory when checking a common element of two lists.
  template: 'The naive double loop checks pairs and costs {{naive_time}} in time,

    but wastes almost no memory: {{naive_space}}. If you add one list into

    {{structure}}, the membership check will become O(1), and the time will drop to

    {{fast_time}}. We pay for this with memory: additionally {{fast_space}}.

    '
  blanks:
    naive_time:
      accept:
      - O(n^2)
      - O(n²)
      - O(nn)
    naive_space:
      accept:
      - O(1)
      - o(1)
    structure:
      accept:
      - set
      - many
      - set()
      - dict
      - dictionary
    fast_time:
      accept:
      - O(n)
      - o(n)
    fast_space:
      accept:
      - O(n)
      - o(n)
  hints:
  - The double loop multiplies the lengths. What data structure looks up an element in O(1) thanks to a hash?
  - 'Trading “time for memory”: to remove the square, they create a storage room the size of the entrance.'
- id: cc-append-cost-001
  concept: space-and-amortized
  type: predict-output
  difficulty: 3
  prompt: 'What will this program output? Capacity doubling model: append costs 1, and when the capacity is full, it copies
    everything for the current length.'
  snippet: "def total_cost(n):\n    cost = 0\n    length = 0\n    capacity = 1\n    for _ in range(n):\n        if length\
    \ == capacity:\n            cost += length\n            capacity *= 2\n        cost += 1\n        length += 1\n    return\
    \ cost\n\nprint(total_cost(8))\n"
  expected:
    kind: stdout
    value: '15'
  hints:
  - 'Go through the loop step by step: watch when length catches up with capacity and a copy costing length occurs.'
  - The total cost of n operations remains of the order of n - this is the amortized O(1) per operation.
  variants:
  - snippet: "def total_cost(n):\n    cost = 0\n    length = 0\n    capacity = 1\n    for _ in range(n):\n        if length\
      \ == capacity:\n            cost += length\n            capacity *= 2\n        cost += 1\n        length += 1\n    return\
      \ cost\n\nprint(total_cost(4))\n"
    expected:
      kind: stdout
      value: '7'
  - snippet: "def total_cost(n):\n    cost = 0\n    length = 0\n    capacity = 1\n    for _ in range(n):\n        if length\
      \ == capacity:\n            cost += length\n            capacity *= 2\n        cost += 1\n        length += 1\n    return\
      \ cost\n\nprint(total_cost(16))\n"
    expected:
      kind: stdout
      value: '31'
- id: cc-space-fn-001
  concept: space-and-amortized
  type: python-function
  difficulty: 4
  prompt: 'Add `dedup_keep_order(items)`: return a new list without repetitions, preserving the order of the first appearance
    of each element. The solution must make one pass (O(n) time) at the expense of an auxiliary set (O(n) memory).'
  starter: "def dedup_keep_order(items):\n    ...\n"
  cases:
  - call: dedup_keep_order([1, 1, 2, 3, 2, 1])
    expect:
    - 1
    - 2
    - 3
  - call: dedup_keep_order([])
    expect: []
  - call: dedup_keep_order(['a', 'b', 'a', 'c', 'b'])
    expect:
    - a
    - b
    - c
  - call: dedup_keep_order([5, 4, 3, 2, 1])
    expect:
    - 5
    - 4
    - 3
    - 2
    - 1
  hints:
  - To find out in one pass whether an element has been seen before, you need a structure with membership checking in O(1).
  - 'Keep a set of seen and a list of results. For each element: if it is not already in seen, add it to the result and in
    seen.'
  - Checking `x in seen` and `seen.add(x)` are both O(1) for the set, so the whole pass remains O(n).
  solution: "def dedup_keep_order(items):\n    seen = set()\n    result = []\n    for x in items:\n        if x not in seen:\n\
    \            seen.add(x)\n            result.append(x)\n    return result\n"
