exercises:
- id: cc-bigo-meaning-001
  concept: asymptotic-notation
  type: theory-quiz
  difficulty: 1
  prompt: What does the notation `T(n) = O(f(n))` mean?
  choices:
  - id: a
    text: T(n) grows no faster than f(n) up to a constant factor
  - id: b
    text: T(n) grows exactly like f(n), without deviations.
  - id: c
    text: T(n) grows strictly slower than f(n).
  - id: d
    text: T(n) is equal to f(n) for all n.
  correct:
  - a
  explanation: 'O is the upper bound: there is a constant c and a threshold n₀ such that T(n) ≤ c f(n) on the entire tail.
    This is “no worse than”, not “exactly as much”.'
  variants:
  - prompt: Which notation gives the lower bound - “no slower than f(n)”?
    choices:
    - id: a
      text: Omega(f(n)).
    - id: b
      text: O(f(n)).
    - id: c
      text: Theta(f(n)).
    - id: d
      text: small o(f(n)).
    correct:
    - a
    explanation: 'Omega sets the lower bound: T(n) ≥ c f(n) on the tail. O - upper limit, Theta - clamp on both sides.'
  - prompt: What does Theta(f(n)) mean?
    choices:
    - id: a
      text: T(n) is sandwiched between c₁·f(n) below and c₂·f(n) above
    - id: b
      text: T(n) grows strictly slower than f(n).
    - id: c
      text: T(n) is just not faster than f(n), nothing is said about the bottom.
    - id: d
      text: T(n) is just not slower than f(n), nothing is said about the top.
    correct:
    - a
    explanation: 'Theta is the strongest of the three statements: the upper and lower bounds are the same in shape, and the
      algorithm grows exactly as f(n).'
- id: cc-simplify-001
  concept: asymptotic-notation
  type: theory-quiz
  difficulty: 2
  prompt: How is `3n² + 5n + 17` simplified in O notation?
  choices:
  - id: a
    text: O(n²)
  - id: b
    text: O(3n²)
  - id: c
    text: O(n² + n)
  - id: d
    text: O(n)
  correct:
  - a
  explanation: 'Simplifying to O is two rules: throw out the constant factors (3) and keep only the dominant term (n² beats
    5n and 17 for large n). That leaves O(n²).'
  variants:
  - prompt: How to simplify the sum `n + n²` in O-notation?
    choices:
    - id: a
      text: O(n²)
    - id: b
      text: O(n)
    - id: c
      text: O(n² + n)
    - id: d
      text: O(2n²)
    correct:
    - a
    explanation: For large n, the square dominates the linear term, leaving O(n²). The linear part does not affect the growth
      form.
  - prompt: What is the O value of the constant expression `100`?
    choices:
    - id: a
      text: O(1)
    - id: b
      text: O(100)
    - id: c
      text: O(n)
    - id: d
      text: O(log n)
    correct:
    - a
    explanation: Any constant that doesn't depend on n is O(1). The factor of 100 is thrown away just like any other constant.
- id: cc-bound-holds-001
  concept: asymptotic-notation
  type: predict-output
  difficulty: 2
  prompt: What will this program output?
  snippet: "def steps(n):\n    return 2 * n + 30\n\nc = 5\nfor n in [1, 10, 100]:\n    print(n, steps(n), c * n, c * n >=\
    \ steps(n))\n"
  expected:
    kind: stdout
    value: '1 32 5 False

      10 50 50 True

      100 230 500 True'
  hints:
  - 'Substitute each n into both formulas: steps(n) = 2n + 30 and bound c·n = 5n. Where is the border already overtaking?'
  - When n = 1, the limit of 5 is less than 32 - the estimate still does not hold. When n = 10 and more, 5n catches up and
    surpasses 2n + 30.
  variants:
  - snippet: "def steps(n):\n    return 2 * n + 30\n\nc = 2\nfor n in [1, 10, 100]:\n    print(n, steps(n), c * n, c * n >=\
      \ steps(n))\n"
    expected:
      kind: stdout
      value: '1 32 2 False

        10 50 20 False

        100 230 200 False'
  - snippet: "def steps(n):\n    return 3 * n + 10\n\nc = 4\nfor n in [1, 5, 20]:\n    print(n, steps(n), c * n, c * n >=\
      \ steps(n))\n"
    expected:
      kind: stdout
      value: '1 13 4 False

        5 25 20 False

        20 70 80 True'
- id: cc-classify-001
  concept: asymptotic-notation
  type: fill-in-blanks
  difficulty: 2
  prompt: 'Write the complexity class in O-notation for each description (notation format: O(...) without factors and lower
    terms).'
  template: 'Accessing a dictionary by key does not depend on its size: {{dict_access}}.

    One pass through a list of n elements: {{single_loop}}.

    Double nested loop through a list: {{double_loop}}.

    Binary search in a sorted list: {{binary}}.

    '
  blanks:
    dict_access:
      accept:
      - O(1)
      - 'O(1) '
      - o(1)
    single_loop:
      accept:
      - O(n)
      - o(n)
    double_loop:
      accept:
      - O(n^2)
      - O(n²)
      - O(nn)
      - o(n^2)
      - o(n²)
    binary:
      accept:
      - O(log n)
      - O(logn)
      - O(log2 n)
      - o(log n)
  hints:
  - 'Ask for each case: does the work increase with n? If not, it''s a constant.'
  - Nested loops are multiplied, and dividing the problem in half at each step gives a logarithm.
- id: cc-omega-quiz-001
  concept: asymptotic-notation
  type: theory-quiz
  difficulty: 3
  prompt: Why is the statement “quicksort runs in O(n²)” technically true, even though it is usually called O(n log n)?
  choices:
  - id: a
    text: 'Because O is “no worse than”'
  - id: b
    text: Because O(n²) and O(n log n) are the same set of functions.
  - id: c
    text: Because n² grows slower than n log n.
  - id: d
    text: Because quicksort is never faster than n².
  correct:
  - a
  explanation: O specifies an upper bound, not an exact value. In the worst case (failed pivot) quicksort is quadratic, so
    O(n²) is a valid ceiling. Typical behavior is O(n log n). Both statements about O are true at the same time.
  hints:
  - 'Remember what exactly O guarantees: an exact estimate or an upper bound?'
  - The linear algorithm is also formally O(n²) - it's just a uselessly weak estimate. For “exactly” there is Theta.
- id: cc-tighten-bound-001
  concept: asymptotic-notation
  type: python-function
  difficulty: 4
  prompt: 'Add `min_c(t_vals, f_vals)`: for parallel lists of values ​​T(n) and f(n) on the same set of points, return the
    minimum integer c >= 1 such that c*f(n) >= T(n) at all points. It is guaranteed that all f(n) > 0 and such c exists.'
  starter: "def min_c(t_vals, f_vals):\n    ...\n"
  cases:
  - call: min_c([32, 50, 230], [1, 10, 100])
    expect: 32
  - call: min_c([4, 8, 16], [2, 4, 8])
    expect: 2
  - call: min_c([10, 10, 10], [1, 5, 10])
    expect: 10
  - call: min_c([3, 3], [1, 3])
    expect: 3
  hints:
  - For each point, it is necessary that c be no less than the ratio T(n)/f(n). Which c is suitable for all points at once?
  - A suitable c should cover the hardest point - the one where the ratio T(n)/f(n) is maximum.
  - Take each pair ceil(t/f) and return the maximum of these values. Integer rounding up can be obtained as -(-t // f).
  solution: "def min_c(t_vals, f_vals):\n    return max(-(-t // f) for t, f in zip(t_vals, f_vals))\n"
