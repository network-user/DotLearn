exercises:
- id: cc-seq-vs-nested-001
  concept: analyzing-code
  type: theory-quiz
  difficulty: 1
  prompt: Two loops through a list of n elements are next to each other (not nested). What is the total difficulty?
  choices:
  - id: a
    text: 'O(n) - consecutive blocks are added: n + n = O(n).'
  - id: b
    text: O(n²) - any two cycles give a square.
  - id: c
    text: O(2n) - that’s how it’s written, two passes.
  - id: d
    text: O(1) - loops do not affect complexity class.
  correct:
  - a
  explanation: 'Consecutive blocks are added: n + n = 2n, the constant is thrown away, O(n) remains. Multiplication gives
    a square only when nested.'
  variants:
  - prompt: A cycle in n is nested inside another cycle in n. What is the difficulty?
    choices:
    - id: a
      text: 'O(n²) - nested loops multiply their lengths: n × n.'
    - id: b
      text: O(n) - nesting does not change anything.
    - id: c
      text: O(2n) - two cycles are added.
    - id: d
      text: O(log n) - nesting gives a logarithm.
    correct:
    - a
    explanation: 'Nested blocks are multiplied: each of the n iterations of the outer loop runs the entire inner loop, for
      a total of n × n = O(n²).'
  - prompt: Inside the loop through n there is a call `x in some_set`. What is the complexity of the entire cycle?
    choices:
    - id: a
      text: O(n) - checking for membership in a set is O(1), the loop gives n such
    - id: b
      text: O(n²) - any test inside the loop gives a square.
    - id: c
      text: O(1) - sets work instantly regardless of the number of checks.
    - id: d
      text: O(log n) - sets are searched using binary search.
    correct:
    - a
    explanation: x in set is O(1) thanks to the hash. n such checks in a loop give O(n). But x in list would be O(n) each,
      and the loop would become O(n²).
- id: cc-hidden-cost-001
  concept: analyzing-code
  type: theory-quiz
  difficulty: 2
  prompt: What is the complexity of the `has_dup` function where `items.count(x)` is called inside the `for x in items` loop?
  choices:
  - id: a
    text: O(n²) - count itself goes through the entire list, so n
  - id: b
    text: O(n) - only one for loop is visible.
  - id: c
    text: O(1) - count is a built-in function, meaning instantaneous.
  - id: d
    text: O(log n) - count uses binary search.
  correct:
  - a
  explanation: 'The apparent loop is n iterations, but items.count(x) is internally O(n): it goes through the entire list.
    Multiply: O(n²). The hidden linear cost turns one cycle into a square.'
  variants:
  - prompt: What is the complexity of checking `x in some_list` for a list of n elements?
    choices:
    - id: a
      text: O(n) - linear search iterates through elements one at a time.
    - id: b
      text: O(1) - the in operator is always instantaneous.
    - id: c
      text: O(log n) - lists are searched using binary search.
    - id: d
      text: O(n²) - membership check is quadratic.
    correct:
    - a
    explanation: For a list, in is a linear search, O(n). For set and dict, the same operator gives O(1), because the search
      is based on a hash.
  - prompt: How difficult is it to create an `items[1:]` slice on a list of n elements?
    choices:
    - id: a
      text: O(n) - the slice copies the elements into a new list.
    - id: b
      text: O(1) - the slice simply moves the pointer.
    - id: c
      text: O(log n) - a slice divides the list in half.
    - id: d
      text: O(n²) - the slice is nested by nature.
    correct:
    - a
    explanation: A slice builds a new list and copies the elements into it, this is O(n) in time and memory. A slice within
      a loop is a common source of a hidden square.
- id: cc-count-inner-001
  concept: analyzing-code
  type: predict-output
  difficulty: 2
  prompt: What will this program output?
  snippet: "def upper_triangle(items):\n    pairs = 0\n    for i in range(len(items)):\n        for j in range(i + 1, len(items)):\n\
    \            pairs += 1\n    return pairs\n\nprint(upper_triangle([10, 20, 30, 40, 50]))\n"
  expected:
    kind: stdout
    value: '10'
  hints:
  - The inner loop takes n-1 steps on the first iteration, n-2 on the second, and so on until zero. Add up these numbers.
  - For five elements, this is 4 + 3 + 2 + 1 + 0 - the number of unordered pairs.
  variants:
  - snippet: "def upper_triangle(items):\n    pairs = 0\n    for i in range(len(items)):\n        for j in range(i + 1, len(items)):\n\
      \            pairs += 1\n    return pairs\n\nprint(upper_triangle([1, 2, 3, 4]))\n"
    expected:
      kind: stdout
      value: '6'
  - snippet: "def upper_triangle(items):\n    pairs = 0\n    for i in range(len(items)):\n        for j in range(i + 1, len(items)):\n\
      \            pairs += 1\n    return pairs\n\nprint(upper_triangle([7, 8, 9]))\n"
    expected:
      kind: stdout
      value: '3'
- id: cc-recursion-fib-001
  concept: analyzing-code
  type: predict-output
  difficulty: 3
  prompt: What will this program output? `calls` counts the number of calls to a naive fib.
  snippet: "calls = 0\n\ndef fib(n):\n    global calls\n    calls += 1\n    if n < 2:\n        return n\n    return fib(n\
    \ - 1) + fib(n - 2)\n\nfib(5)\nprint(calls)\n"
  expected:
    kind: stdout
    value: '15'
  hints:
  - Each call to fib(n) for n >= 2 generates two more calls. Build a call tree for fib(5) and count the nodes.
  - 'The number of calls to naive fib grows exponentially. For small n it is easier to calculate it manually: fib(5) gives
    15 nodes.'
  variants:
  - snippet: "calls = 0\n\ndef fib(n):\n    global calls\n    calls += 1\n    if n < 2:\n        return n\n    return fib(n\
      \ - 1) + fib(n - 2)\n\nfib(4)\nprint(calls)\n"
    expected:
      kind: stdout
      value: '9'
  - snippet: "calls = 0\n\ndef fib(n):\n    global calls\n    calls += 1\n    if n < 2:\n        return n\n    return fib(n\
      \ - 1) + fib(n - 2)\n\nfib(6)\nprint(calls)\n"
    expected:
      kind: stdout
      value: '25'
- id: cc-classify-loops-001
  concept: analyzing-code
  type: fill-in-blanks
  difficulty: 3
  prompt: Write the complexity class in O-notation for each fragment (without factors and minor terms).
  template: 'One loop `for x in items`: {{single}}.

    The loop is `for x in items`, and inside `if x in items_list`: {{hidden}}.

    Loop `while n > 1: n //= 2`: {{halving}}.

    The loop is `while n > 1: n //= 2`, and inside it is a complete pass through the list of n: {{nlogn}}.

    '
  blanks:
    single:
      accept:
      - O(n)
      - o(n)
    hidden:
      accept:
      - O(n^2)
      - O(n²)
      - O(nn)
      - o(n^2)
      - o(n²)
    halving:
      accept:
      - O(log n)
      - O(logn)
      - O(log2 n)
      - o(log n)
    nlogn:
      accept:
      - O(n log n)
      - O(nlogn)
      - O(n logn)
      - o(n log n)
  hints:
  - x in items_list for the list is a hidden linear pass, it is multiplied with the outer loop.
  - Dividing in half gives log n iterations; a linear pass within each iteration multiplies them.
- id: cc-time-complexity-fn-001
  concept: analyzing-code
  type: python-function
  difficulty: 4
  prompt: 'Add `loop_iterations(n)`: return how many times the body of the loop `while x < n: x *= 2` will be executed, starting
    from `x = 1`. It is not necessary to count without simulating the entire cycle for huge n - n in tests is small.'
  starter: "def loop_iterations(n):\n    ...\n"
  cases:
  - call: loop_iterations(1)
    expect: 0
  - call: loop_iterations(2)
    expect: 1
  - call: loop_iterations(8)
    expect: 3
  - call: loop_iterations(10)
    expect: 4
  - call: loop_iterations(16)
    expect: 4
  hints:
  - The variable doubles at each step, rather than increasing by one. This is a sign of the logarithmic number of iterations.
  - 'The loop rotates until x < n: for n = 1 it will not be executed even once, for n = 2 exactly once.'
  - 'You can simply simulate a cycle: set up x = 1 and a counter, double x until x < n.'
  solution: "def loop_iterations(n):\n    x = 1\n    count = 0\n    while x < n:\n        x *= 2\n        count += 1\n   \
    \ return count\n"
