exercises:
  - id: cc-bigo-meaning-001
    concept: asymptotic-notation
    type: theory-quiz
    difficulty: 1
    prompt: "Что означает запись `T(n) = O(f(n))`?"
    choices:
      - id: a
        text: "T(n) растёт не быстрее f(n) с точностью до постоянного множителя, начиная с некоторого n."
      - id: b
        text: "T(n) растёт ровно как f(n), без отклонений."
      - id: c
        text: "T(n) растёт строго медленнее f(n)."
      - id: d
        text: "T(n) равно f(n) для всех n."
    correct: [a]
    explanation: "O - это верхняя граница: найдутся константа c и порог n₀, такие что T(n) ≤ c·f(n) на всём хвосте. Это «не хуже чем», а не «ровно столько»."
    variants:
      - prompt: "Какая из нотаций даёт нижнюю границу - «не быстрее, чем f(n)»?"
        choices:
          - id: a
            text: "Omega(f(n))."
          - id: b
            text: "O(f(n))."
          - id: c
            text: "Theta(f(n))."
          - id: d
            text: "малое o(f(n))."
        correct: [a]
        explanation: "Omega задаёт нижнюю границу: T(n) ≥ c·f(n) на хвосте. O - верхняя граница, Theta - зажим с обеих сторон."
      - prompt: "Что означает Theta(f(n))?"
        choices:
          - id: a
            text: "T(n) зажата между c₁·f(n) снизу и c₂·f(n) сверху - растёт ровно как f(n)."
          - id: b
            text: "T(n) растёт строго медленнее f(n)."
          - id: c
            text: "T(n) только не быстрее f(n), про низ ничего не сказано."
          - id: d
            text: "T(n) только не медленнее f(n), про верх ничего не сказано."
        correct: [a]
        explanation: "Theta - самое сильное из трёх утверждений: верхняя и нижняя границы совпадают по форме, и алгоритм растёт ровно как f(n)."

  - id: cc-simplify-001
    concept: asymptotic-notation
    type: theory-quiz
    difficulty: 2
    prompt: "Как упрощается `3n² + 5n + 17` в O-нотации?"
    choices:
      - id: a
        text: "O(n²)"
      - id: b
        text: "O(3n²)"
      - id: c
        text: "O(n² + n)"
      - id: d
        text: "O(n)"
    correct: [a]
    explanation: "Упрощение к O - это два правила: выбросить постоянные множители (3) и оставить только доминирующий член (n² побеждает 5n и 17 при больших n). Остаётся O(n²)."
    variants:
      - prompt: "Как упрощается сумма `n + n²` в O-нотации?"
        choices:
          - id: a
            text: "O(n²)"
          - id: b
            text: "O(n)"
          - id: c
            text: "O(n² + n)"
          - id: d
            text: "O(2n²)"
        correct: [a]
        explanation: "При больших n квадрат доминирует над линейным членом, поэтому остаётся O(n²). Линейная часть не влияет на форму роста."
      - prompt: "Чему равно O от константного выражения `100`?"
        choices:
          - id: a
            text: "O(1)"
          - id: b
            text: "O(100)"
          - id: c
            text: "O(n)"
          - id: d
            text: "O(log n)"
        correct: [a]
        explanation: "Любая константа, не зависящая от n, - это O(1). Множитель 100 выбрасывается так же, как любая другая константа."

  - id: cc-bound-holds-001
    concept: asymptotic-notation
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      def steps(n):
          return 2 * n + 30

      c = 5
      for n in [1, 10, 100]:
          print(n, steps(n), c * n, c * n >= steps(n))
    expected:
      kind: stdout
      value: |-
        1 32 5 False
        10 50 50 True
        100 230 500 True
    hints:
      - "Подставьте каждое n в обе формулы: steps(n) = 2n + 30 и граница c·n = 5n. Где граница уже обгоняет?"
      - "При n = 1 граница 5 меньше 32 - оценка ещё не держит. При n = 10 и больше 5n догоняет и перегоняет 2n + 30."
    variants:
      - snippet: |
          def steps(n):
              return 2 * n + 30

          c = 2
          for n in [1, 10, 100]:
              print(n, steps(n), c * n, c * n >= steps(n))
        expected:
          kind: stdout
          value: |-
            1 32 2 False
            10 50 20 False
            100 230 200 False
      - snippet: |
          def steps(n):
              return 3 * n + 10

          c = 4
          for n in [1, 5, 20]:
              print(n, steps(n), c * n, c * n >= steps(n))
        expected:
          kind: stdout
          value: |-
            1 13 4 False
            5 25 20 False
            20 70 80 True

  - id: cc-classify-001
    concept: asymptotic-notation
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите класс сложности в O-нотации для каждого описания (формат записи: O(...) без множителей и младших членов)."
    template: |
      Обращение по ключу к словарю не зависит от его размера: {{dict_access}}.
      Один проход по списку из n элементов: {{single_loop}}.
      Двойной вложенный цикл по списку: {{double_loop}}.
      Двоичный поиск в отсортированном списке: {{binary}}.
    blanks:
      dict_access:
        accept: ["O(1)", "O(1) ", "o(1)"]
      single_loop:
        accept: ["O(n)", "o(n)"]
      double_loop:
        accept: ["O(n^2)", "O(n²)", "O(nn)", "o(n^2)", "o(n²)"]
      binary:
        accept: ["O(log n)", "O(logn)", "O(log2 n)", "o(log n)"]
    hints:
      - "Спросите для каждого случая: растёт ли работа с n? Если нет - это константа."
      - "Вложенные циклы перемножаются, а деление задачи пополам на каждом шаге даёт логарифм."

  - id: cc-omega-quiz-001
    concept: asymptotic-notation
    type: theory-quiz
    difficulty: 3
    prompt: "Почему утверждение «быстрая сортировка работает за O(n²)» технически верно, хотя её обычно называют O(n log n)?"
    choices:
      - id: a
        text: "Потому что O - это «не хуже чем»: в худшем случае она действительно квадратична, и потолок n² её честно ограничивает."
      - id: b
        text: "Потому что O(n²) и O(n log n) - это одно и то же множество функций."
      - id: c
        text: "Потому что n² растёт медленнее, чем n log n."
      - id: d
        text: "Потому что быстрая сортировка никогда не бывает быстрее n²."
    correct: [a]
    explanation: "O задаёт верхнюю границу, а не точное значение. В худшем случае (неудачный опорный элемент) quicksort квадратична, поэтому O(n²) - корректный потолок. Типичное поведение - O(n log n). Оба утверждения про O истинны одновременно."
    hints:
      - "Вспомните, что именно гарантирует O: точную оценку или границу сверху?"
      - "Линейный алгоритм формально тоже O(n²) - просто это бесполезно слабая оценка. Для «ровно» есть Theta."

  - id: cc-tighten-bound-001
    concept: asymptotic-notation
    type: python-function
    difficulty: 4
    prompt: "Допишите `min_c(t_vals, f_vals)`: для параллельных списков значений T(n) и f(n) на одном наборе точек верните минимальное целое c >= 1, при котором c*f(n) >= T(n) во всех точках. Гарантируется, что все f(n) > 0 и такое c существует."
    starter: |
      def min_c(t_vals, f_vals):
          ...
    cases:
      - call: "min_c([32, 50, 230], [1, 10, 100])"
        expect: 32
      - call: "min_c([4, 8, 16], [2, 4, 8])"
        expect: 2
      - call: "min_c([10, 10, 10], [1, 5, 10])"
        expect: 10
      - call: "min_c([3, 3], [1, 3])"
        expect: 3
    hints:
      - "Для каждой точки нужно, чтобы c было не меньше отношения T(n)/f(n). Какое c подойдёт сразу для всех точек?"
      - "Подходящее c должно покрывать самую жёсткую точку - ту, где отношение T(n)/f(n) максимально."
      - "Возьмите по каждой паре ceil(t/f) и верните максимум этих значений. Целочисленное округление вверх можно получить как -(-t // f)."
    solution: |
      def min_c(t_vals, f_vals):
          return max(-(-t // f) for t, f in zip(t_vals, f_vals))
