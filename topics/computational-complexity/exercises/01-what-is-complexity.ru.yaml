exercises:
  - id: cc-what-units-001
    concept: what-is-complexity
    type: theory-quiz
    difficulty: 1
    prompt: "В чём измеряется вычислительная сложность алгоритма?"
    choices:
      - id: a
        text: "В количестве шагов как функции от размера входа n."
      - id: b
        text: "В секундах работы на конкретной машине."
      - id: c
        text: "В количестве строк исходного кода."
      - id: d
        text: "В мегабайтах занятой оперативной памяти."
    correct: [a]
    explanation: "Сложность считает шаги в зависимости от размера входа, а не время конкретного запуска. Секунды зависят от железа, нагрузки и кэша и не характеризуют сам алгоритм."
    variants:
      - prompt: "Почему секунды плохо подходят для сравнения алгоритмов?"
        choices:
          - id: a
            text: "Потому что они зависят от железа, нагрузки и кэша, а не от самого алгоритма."
          - id: b
            text: "Потому что секунды слишком крупная единица и нужны миллисекунды."
          - id: c
            text: "Потому что современные процессоры не умеют измерять время точно."
          - id: d
            text: "Потому что время нельзя выразить как функцию от n."
        correct: [a]
        explanation: "Время одного запуска плывёт от машины к машине и от нагрузки к нагрузке. Закон роста числа шагов - это свойство алгоритма, не зависящее от железа."
      - prompt: "Что обозначает буква n в анализе сложности?"
        choices:
          - id: a
            text: "Размер входных данных: длину списка, число символов строки и тому подобное."
          - id: b
            text: "Номер строки, на которой находится самый внутренний цикл."
          - id: c
            text: "Количество процессорных ядер на машине."
          - id: d
            text: "Точное число секунд работы алгоритма."
        correct: [a]
        explanation: "n - это размер входа. Сложность выражают как функцию от n: как растёт число шагов, когда вход увеличивается."

  - id: cc-growth-law-001
    concept: what-is-complexity
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      def quadratic_steps(n):
          steps = 0
          for _ in range(n):
              for _ in range(n):
                  steps += 1
          return steps

      print(quadratic_steps(8))
    expected:
      kind: stdout
      value: "64"
    hints:
      - "Вложенные циклы перемножают свои длины. Сколько раз выполнится самая внутренняя строка, если оба цикла идут по range(n)?"
      - "Внешний цикл крутится n раз, и на каждой итерации внутренний делает ещё n шагов. Перемножьте n на n при n = 8."
    variants:
      - snippet: |
          def quadratic_steps(n):
              steps = 0
              for _ in range(n):
                  for _ in range(n):
                      steps += 1
              return steps

          print(quadratic_steps(5))
        expected:
          kind: stdout
          value: "25"
      - snippet: |
          def linear_steps(n):
              steps = 0
              for _ in range(n):
                  steps += 1
              return steps

          print(linear_steps(12))
        expected:
          kind: stdout
          value: "12"

  - id: cc-log-steps-001
    concept: what-is-complexity
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      def log_steps(n):
          steps = 0
          size = n
          while size > 1:
              size //= 2
              steps += 1
          return steps

      print(log_steps(16))
    expected:
      kind: stdout
      value: "4"
    hints:
      - "На каждом шаге задача делится пополам. Сколько раз можно поделить число на 2, пока не останется единица?"
      - "Из 16 получается 8, потом 4, 2, 1. Посчитайте число делений: это log по основанию 2."
    variants:
      - snippet: |
          def log_steps(n):
              steps = 0
              size = n
              while size > 1:
                  size //= 2
                  steps += 1
              return steps

          print(log_steps(8))
        expected:
          kind: stdout
          value: "3"
      - snippet: |
          def log_steps(n):
              steps = 0
              size = n
              while size > 1:
                  size //= 2
                  steps += 1
              return steps

          print(log_steps(32))
        expected:
          kind: stdout
          value: "5"

  - id: cc-best-worst-001
    concept: what-is-complexity
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните рассуждение про лучший и худший случай линейного поиска."
    template: |
      В линейном поиске лучший случай наступает, когда искомое стоит {{position}}:
      функция вернётся после одной операции. Худший случай - когда элемента {{absence}}
      в списке: придётся просмотреть все {{count}} элементов. Под сложностью обычно
      понимают именно {{which}} случай.
    blanks:
      position:
        accept: ["первым", "в начале", "на первом месте"]
      absence:
        accept: ["нет", "не существует", "отсутствует"]
      count:
        accept: ["n", "N"]
      which:
        accept: ["худший", "наихудший"]
    hints:
      - "Лучший случай - это самая удачная раскладка данных, худший - самая неудачная. Когда поиск заканчивается мгновенно, а когда тянется до конца?"
      - "Гарантия сверху, не зависящая от удачи, относится к одному из двух крайних случаев."

  - id: cc-count-steps-001
    concept: what-is-complexity
    type: python-function
    difficulty: 3
    prompt: "Допишите `nested_steps(n)`: верните число выполнений самой внутренней строки в двойном цикле `for i in range(n): for j in range(n)`. Считать, не запуская вложенные циклы."
    starter: |
      def nested_steps(n):
          ...
    cases:
      - call: "nested_steps(0)"
        expect: 0
      - call: "nested_steps(1)"
        expect: 1
      - call: "nested_steps(5)"
        expect: 25
      - call: "nested_steps(10)"
        expect: 100
    hints:
      - "Вложенные циклы перемножают свои длины: каждая из n итераций внешнего цикла запускает внутренний целиком."
      - "Самая внутренняя строка выполнится n раз для каждой из n итераций внешнего цикла."
      - "Это n, умноженное на n. Верните результат без явных циклов."
    solution: |
      def nested_steps(n):
          return n * n

  - id: cc-triangular-steps-001
    concept: what-is-complexity
    type: python-function
    difficulty: 4
    prompt: "Допишите `pair_steps(n)`: верните число итераций внутреннего цикла в `for i in range(n): for j in range(i + 1, n)` - то есть число неупорядоченных пар индексов."
    starter: |
      def pair_steps(n):
          ...
    cases:
      - call: "pair_steps(0)"
        expect: 0
      - call: "pair_steps(1)"
        expect: 0
      - call: "pair_steps(2)"
        expect: 1
      - call: "pair_steps(5)"
        expect: 10
      - call: "pair_steps(10)"
        expect: 45
    hints:
      - "Внутренний цикл делает n-1 шаг на первой итерации, n-2 на второй и так до нуля. Это сумма, а не произведение."
      - "Сумма (n-1) + (n-2) + ... + 1 + 0 - это число способов выбрать пару из n элементов."
      - "Замкнутая формула суммы первых n-1 натуральных чисел: n*(n-1)/2. Не забудьте про целочисленный результат."
    solution: |
      def pair_steps(n):
          return n * (n - 1) // 2
