exercises:
  - id: cc-seq-vs-nested-001
    concept: analyzing-code
    type: theory-quiz
    difficulty: 1
    prompt: "Два цикла по списку из n элементов стоят друг за другом (не вложены). Какова суммарная сложность?"
    choices:
      - id: a
        text: "O(n) - последовательные блоки складываются: n + n = O(n)."
      - id: b
        text: "O(n²) - любые два цикла дают квадрат."
      - id: c
        text: "O(2n) - так и записывают, два прохода."
      - id: d
        text: "O(1) - циклы не влияют на класс сложности."
    correct: [a]
    explanation: "Последовательные блоки складываются: n + n = 2n, константа выбрасывается, остаётся O(n). Перемножение даёт квадрат только при вложенности."
    variants:
      - prompt: "Цикл по n вложен внутрь другого цикла по n. Какова сложность?"
        choices:
          - id: a
            text: "O(n²) - вложенные циклы перемножают свои длины: n × n."
          - id: b
            text: "O(n) - вложенность ничего не меняет."
          - id: c
            text: "O(2n) - два цикла складываются."
          - id: d
            text: "O(log n) - вложенность даёт логарифм."
        correct: [a]
        explanation: "Вложенные блоки перемножаются: каждая из n итераций внешнего цикла запускает внутренний целиком, итого n × n = O(n²)."
      - prompt: "Внутри цикла по n стоит обращение `x in some_set`. Какова сложность всего цикла?"
        choices:
          - id: a
            text: "O(n) - проверка принадлежности множеству это O(1), цикл даёт n таких проверок."
          - id: b
            text: "O(n²) - любая проверка внутри цикла даёт квадрат."
          - id: c
            text: "O(1) - множества работают мгновенно независимо от числа проверок."
          - id: d
            text: "O(log n) - множества ищут двоичным поиском."
        correct: [a]
        explanation: "x in set - это O(1) благодаря хэшу. n таких проверок в цикле дают O(n). А вот x in list было бы O(n) каждая, и цикл стал бы O(n²)."

  - id: cc-hidden-cost-001
    concept: analyzing-code
    type: theory-quiz
    difficulty: 2
    prompt: "Какова сложность функции `has_dup`, где внутри цикла `for x in items` вызывается `items.count(x)`?"
    choices:
      - id: a
        text: "O(n²) - count сам проходит весь список, поэтому n итераций × n = квадрат."
      - id: b
        text: "O(n) - виден только один цикл for."
      - id: c
        text: "O(1) - count это встроенная функция, значит мгновенная."
      - id: d
        text: "O(log n) - count использует двоичный поиск."
    correct: [a]
    explanation: "Видимый цикл - n итераций, но items.count(x) внутри сам O(n): он проходит весь список. Перемножаем: O(n²). Скрытая линейная стоимость превращает один цикл в квадрат."
    variants:
      - prompt: "Какова сложность проверки `x in some_list` для списка из n элементов?"
        choices:
          - id: a
            text: "O(n) - линейный поиск перебирает элементы по одному."
          - id: b
            text: "O(1) - оператор in всегда мгновенный."
          - id: c
            text: "O(log n) - списки ищут двоичным поиском."
          - id: d
            text: "O(n²) - проверка принадлежности квадратична."
        correct: [a]
        explanation: "Для списка in - это линейный перебор, O(n). Для set и dict тот же оператор даёт O(1), потому что поиск идёт по хэшу."
      - prompt: "Какова сложность создания среза `items[1:]` у списка из n элементов?"
        choices:
          - id: a
            text: "O(n) - срез копирует элементы в новый список."
          - id: b
            text: "O(1) - срез просто сдвигает указатель."
          - id: c
            text: "O(log n) - срез делит список пополам."
          - id: d
            text: "O(n²) - срез вложен по природе."
        correct: [a]
        explanation: "Срез строит новый список и копирует в него элементы, это O(n) по времени и памяти. Срез внутри цикла - частый источник скрытого квадрата."

  - id: cc-count-inner-001
    concept: analyzing-code
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      def upper_triangle(items):
          pairs = 0
          for i in range(len(items)):
              for j in range(i + 1, len(items)):
                  pairs += 1
          return pairs

      print(upper_triangle([10, 20, 30, 40, 50]))
    expected:
      kind: stdout
      value: "10"
    hints:
      - "Внутренний цикл делает n-1 шаг на первой итерации, n-2 на второй и так до нуля. Сложите эти числа."
      - "Для пяти элементов это 4 + 3 + 2 + 1 + 0 - число неупорядоченных пар."
    variants:
      - snippet: |
          def upper_triangle(items):
              pairs = 0
              for i in range(len(items)):
                  for j in range(i + 1, len(items)):
                      pairs += 1
              return pairs

          print(upper_triangle([1, 2, 3, 4]))
        expected:
          kind: stdout
          value: "6"
      - snippet: |
          def upper_triangle(items):
              pairs = 0
              for i in range(len(items)):
                  for j in range(i + 1, len(items)):
                      pairs += 1
              return pairs

          print(upper_triangle([7, 8, 9]))
        expected:
          kind: stdout
          value: "3"

  - id: cc-recursion-fib-001
    concept: analyzing-code
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа? `calls` считает число вызовов наивного fib."
    snippet: |
      calls = 0

      def fib(n):
          global calls
          calls += 1
          if n < 2:
              return n
          return fib(n - 1) + fib(n - 2)

      fib(5)
      print(calls)
    expected:
      kind: stdout
      value: "15"
    hints:
      - "Каждый вызов fib(n) при n >= 2 порождает ещё два вызова. Постройте дерево вызовов для fib(5) и сосчитайте узлы."
      - "Число вызовов наивного fib растёт экспоненциально. Для маленьких n его проще сосчитать вручную: fib(5) даёт 15 узлов."
    variants:
      - snippet: |
          calls = 0

          def fib(n):
              global calls
              calls += 1
              if n < 2:
                  return n
              return fib(n - 1) + fib(n - 2)

          fib(4)
          print(calls)
        expected:
          kind: stdout
          value: "9"
      - snippet: |
          calls = 0

          def fib(n):
              global calls
              calls += 1
              if n < 2:
                  return n
              return fib(n - 1) + fib(n - 2)

          fib(6)
          print(calls)
        expected:
          kind: stdout
          value: "25"

  - id: cc-classify-loops-001
    concept: analyzing-code
    type: fill-in-blanks
    difficulty: 3
    prompt: "Впишите класс сложности в O-нотации для каждого фрагмента (без множителей и младших членов)."
    template: |
      Один цикл `for x in items`: {{single}}.
      Цикл `for x in items`, а внутри `if x in items_list`: {{hidden}}.
      Цикл `while n > 1: n //= 2`: {{halving}}.
      Цикл `while n > 1: n //= 2`, а внутри полный проход по списку из n: {{nlogn}}.
    blanks:
      single:
        accept: ["O(n)", "o(n)"]
      hidden:
        accept: ["O(n^2)", "O(n²)", "O(nn)", "o(n^2)", "o(n²)"]
      halving:
        accept: ["O(log n)", "O(logn)", "O(log2 n)", "o(log n)"]
      nlogn:
        accept: ["O(n log n)", "O(nlogn)", "O(n logn)", "o(n log n)"]
    hints:
      - "x in items_list для списка - это скрытый линейный проход, он перемножается с внешним циклом."
      - "Деление пополам даёт log n итераций; линейный проход внутри каждой итерации перемножает их."

  - id: cc-time-complexity-fn-001
    concept: analyzing-code
    type: python-function
    difficulty: 4
    prompt: "Допишите `loop_iterations(n)`: верните, сколько раз выполнится тело цикла `while x < n: x *= 2`, стартуя с `x = 1`. Считать, не моделируя весь цикл при огромных n не требуется - n в тестах небольшое."
    starter: |
      def loop_iterations(n):
          ...
    cases:
      - call: "loop_iterations(1)"
        expect: 0
      - call: "loop_iterations(2)"
        expect: 1
      - call: "loop_iterations(8)"
        expect: 3
      - call: "loop_iterations(10)"
        expect: 4
      - call: "loop_iterations(16)"
        expect: 4
    hints:
      - "Переменная удваивается на каждом шаге, а не растёт на единицу. Это признак логарифмического числа итераций."
      - "Цикл крутится, пока x < n: для n = 1 он не выполнится ни разу, для n = 2 ровно один раз."
      - "Можно просто промоделировать цикл: завести x = 1 и счётчик, удваивать x пока x < n."
    solution: |
      def loop_iterations(n):
          x = 1
          count = 0
          while x < n:
              x *= 2
              count += 1
          return count
