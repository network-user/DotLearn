conceptId: asymptotic-notation
cards:
- id: asymptotic-notation-01
  front: What does T(n) = O(f(n)) formally mean?
  back: 'There is a constant c and a threshold n₀ such that T(n) ≤ c f(n) for all n ≥ n₀. It’s simpler: you can choose c·f(n),
    which will lie above T(n) along the entire tail of the graph. This is the upper limit of growth.'
  tags:
  - bigo
- id: asymptotic-notation-02
  front: Why is the threshold n₀ needed in the definition of O?
  back: O-notation describes behavior on large inputs. To the left of n₀, the function T(n) can behave in any way - the evaluation
    must only be performed starting from n₀. Therefore, constants and minor terms on the tail are lost.
  tags:
  - bigo
- id: asymptotic-notation-03
  front: What two rules simplify an expression to form O?
  back: 'The first is to throw out constant factors. The second is to leave only the fastest growing term. So n + n² turns
    into O(n²): the linear part ceases to influence the growth form.'
  tags:
  - simplify
- id: asymptotic-notation-04
  front: Do O(3n²), O(n² + n) and O(n²) mean the same thing?
  back: Yes, it's one set of functions. Writing factors and minor terms inside O is not a mistake, but it is unnecessary noise.
    The convention is to keep the minimum form, that is, O(n²).
  tags:
  - simplify
- id: asymptotic-notation-05
  front: How are O, Omega and Theta different?
  back: 'O - upper bound (increases no faster than f(n)). Omega is a lower bound (no faster than f(n), in the sense of “can’t
    do it faster”). Theta clamps on both sides: the algorithm grows exactly as f(n). Theta is the most accurate of the three.'
  tags:
  - notation
- id: asymptotic-notation-06
  front: Why isn't any algorithm that reads the entire input faster than Omega(n)?
  back: 'To look at each of n elements, you need at least n steps - less is not enough. This is the lower bound: T(n) ≥ c·n
    on the tail, a guarantee that it is impossible to cope faster than a certain limit.'
  tags:
  - notation
- id: asymptotic-notation-07
  front: Why is the phrase “quicksort runs in O(n²)” technically correct?
  back: O is “no worse than”, not “exactly as much”. In the worst case (sorted input, failed pivot) quicksort is truly quadratic,
    and the n² ceiling honestly limits it. Typically it is O(n log n).
  tags:
  - notation
- id: asymptotic-notation-08
  front: What does O(1) actually mean?
  back: “The number of steps does not depend on n” is a constant, even a large one. It is not “one step” or “instantaneous”.
    Accessing dictionary[key] is considered O(1) because its cost does not increase with the size of the dictionary.
  tags:
  - pitfalls
- id: asymptotic-notation-09
  front: Why is O(1) not synonymous with "fast"?
  back: 'Asymptotics is silent about constants: O(1) with a giant constant may in practice be inferior to O(n) with a tiny
    one on small inputs. O(1) is a promise about scaling, not about absolute speed here and now.'
  tags:
  - pitfalls
- id: asymptotic-notation-10
  front: How is small o different from big O?
  back: 'T(n) = o(f(n)) means strict superiority: T grows strictly slower than f, the limit is not reached even with a constant.
    For example, n = o(n²), but n² is not o(n²). Roughly: O is “≤”, o is “<”.'
  tags:
  - advanced
