conceptId: space-and-amortized
cards:
  - id: space-and-amortized-01
    front: "Что считает пространственная сложность?"
    back: "Дополнительную память, которую алгоритм заводит сверх входа: временные списки, словари, стек рекурсивных вызовов. Сам вход уже лежит в памяти - его не считают. Это функция от n, как и время."
    tags: [space]
  - id: space-and-amortized-02
    front: "Чем различается память у аккумулятора и у накопителя результата?"
    back: "Аккумулятор (одна переменная total) - O(1): не растёт с n. Накопитель (новый список result длины n) - O(n). При одинаковом времени O(n) память может отличаться на целый класс."
    tags: [space]
  - id: space-and-amortized-03
    front: "Почему рекурсия глубиной n стоит O(n) памяти, даже без созданных объектов?"
    back: "Каждый незавершённый вызов висит на стеке вызовов и занимает место, пока не вернётся. К моменту последнего вызова на стеке держатся все n кадров сразу. Итеративная версия обошлась бы O(1)."
    tags: [recursion]
  - id: space-and-amortized-04
    front: "Что такое размен «время за память» на примере общего элемента двух списков?"
    back: "Наивный двойной цикл - O(n²) времени, O(1) памяти. Если сложить один список в set, проверка станет O(1) на элемент: время падает до O(n), но память растёт до O(n). Место потрачено, чтобы заменить перебор."
    tags: [tradeoff]
  - id: space-and-amortized-05
    front: "Всегда ли выгоден размен времени на память?"
    back: "Чаще выгоден, но не бесплатен и не всегда. На огромных входах память может оказаться важнее: алгоритм укладывается в секунду, но требует гигабайт, которых нет. Память бывает узким местом наравне со временем."
    tags: [tradeoff]
  - id: space-and-amortized-06
    front: "Что означает амортизированная сложность?"
    back: "Усреднённую цену операции по длинной серии. list.append иногда O(1), иногда O(n) при копировании, но список растёт с запасом, дорогие копирования редеют, и на каждую операцию приходится константа - амортизированно O(1)."
    tags: [amortized]
  - id: space-and-amortized-07
    front: "Чем амортизированная сложность отличается от среднего случая?"
    back: "Амортизация - гарантия на любую серию операций, верная всегда, она зависит от структуры серии. Средний случай - вероятностное среднее, зависит от распределения входных данных. Это разные понятия."
    tags: [amortized]
  - id: space-and-amortized-08
    front: "Гарантирует ли амортизированный O(1), что каждый вызов быстрый?"
    back: "Нет. Он обещает хорошую суммарную стоимость, но молчит о пиках. Редкий append всё равно займёт O(n) в момент копирования - в системе реального времени такая пауза может нарушить дедлайн."
    tags: [pitfalls]
  - id: space-and-amortized-09
    front: "Почему list.insert(0, x) не амортизированно O(1)?"
    back: "Вставка в начало сдвигает все элементы, поэтому она честно O(n) каждый раз, в отличие от append. Имя метода ничего не гарантирует - цену надо знать для каждой операции. Для очереди с двух концов берут deque."
    tags: [pitfalls]
  - id: space-and-amortized-10
    front: "Почему геометрический рост списка даёт амортизированный O(1)?"
    back: "При росте в фиксированное число раз суммарная стоимость всех копирований образует геометрическую прогрессию, сходящуюся к O(n), а не к O(n²). Если бы список рос на постоянное число ячеек, append стал бы амортизированно O(n)."
    tags: [amortized]
