conceptId: space-and-amortized
cards:
- id: space-and-amortized-01
  front: What does spatial complexity count?
  back: 'Additional memory that the algorithm acquires in addition to the input: temporary lists, dictionaries, stack of recursive
    calls. The entrance itself is already in memory - it is not counted. It is a function of n, just like time.'
  tags:
  - space
- id: space-and-amortized-02
  front: What is the difference between the memory of an accumulator and a result storage device?
  back: 'Accumulator (one variable total) - O(1): does not grow with n. Accumulator (new result list of length n) - O(n).
    With the same O(n) time, the memory may differ by an entire class.'
  tags:
  - space
- id: space-and-amortized-03
  front: Why does a recursion of depth n cost O(n) memory, even without created objects?
  back: Each uncompleted call hangs on the call stack and takes up space until it returns. By the time of the last call, all
    n frames are held on the stack at once. The iterative version would cost O(1).
  tags:
  - recursion
- id: space-and-amortized-04
  front: What is the “time for memory” exchange using the example of a common element of two lists?
  back: 'Naive double loop - O(n²) time, O(1) memory. If you add one list into a set, the check becomes O(1) per element:
    time drops to O(n), but memory grows to O(n). Space wasted to replace bust.'
  tags:
  - tradeoff
- id: space-and-amortized-05
  front: Is trading time for memory always beneficial?
  back: 'Most often it is profitable, but not free and not always. On huge inputs, memory may be more important: the algorithm
    runs in a second, but requires gigabytes, which are not available. Memory can be a bottleneck along with time.'
  tags:
  - tradeoff
- id: space-and-amortized-06
  front: What does amortized complexity mean?
  back: Average cost of an operation over a long series. list.append is sometimes O(1), sometimes O(n) when copying, but the
    list grows with a margin, expensive copying thins out, and for each operation there is a constant - amortized O(1).
  tags:
  - amortized
- id: space-and-amortized-07
  front: How is amortized complexity different from the average case?
  back: Depreciation is a guarantee for any series of operations, always true, it depends on the structure of the series.
    The average case is a probabilistic average, depending on the distribution of the input data. These are different concepts.
  tags:
  - amortized
- id: space-and-amortized-08
  front: Does amortized O(1) guarantee that every call is fast?
  back: No. He promises a good total value, but is silent about the picks. A rare append will still take O(n) at the time
    of copying - in a real-time system, such a pause can violate the deadline.
  tags:
  - pitfalls
- id: space-and-amortized-09
  front: Why isn't list.insert(0, x) amortized O(1)?
  back: Inserting at the beginning shifts all the elements, so it's honestly O(n) every time, unlike append. The name of the
    method does not guarantee anything - the price must be known for each operation. For a queue, deque is taken from both
    ends.
  tags:
  - pitfalls
- id: space-and-amortized-10
  front: Why does geometric list growth produce amortized O(1)?
  back: When growing by a fixed number of times, the total cost of all copies forms a geometric progression, converging to
    O(n), and not to O(n²). If the list grew by a constant number of cells, append would become O(n) amortized.
  tags:
  - amortized
