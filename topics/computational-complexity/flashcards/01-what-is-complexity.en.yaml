conceptId: what-is-complexity
cards:
- id: what-is-complexity-01
  front: Why is difficulty measured in steps and not seconds?
  back: Seconds depend on hardware, load, cache state and interpreter version - they say almost nothing about the algorithm.
    The number of steps (elementary operations) does not depend on the machine, so meaningful comparisons can be made on it.
  tags:
  - basics
- id: what-is-complexity-02
  front: What is complexity as a function of input size n?
  back: 'This is a dependency, not a single number: how many steps the algorithm will take given an input of size n. For a
    list n is the length, for a string it is the number of characters, for a number it is sometimes the number of digits.
    It is important how work changes as n increases.'
  tags:
  - basics
- id: what-is-complexity-03
  front: How are blocks of code added and multiplied when counting steps?
  back: 'Consecutive blocks add up: a cycle next to a cycle is n + n. Nested ones are multiplied: a loop within a loop is
    n × n. This is where the square of the double cycle comes from.'
  tags:
  - counting
- id: what-is-complexity-04
  front: Why does binary search take log n steps rather than n even though it has a loop?
  back: 'At each step, it throws out half of the remaining candidates: out of 1000, 500, 250, 125, and so on remain. The number
    of halvings to one is log₂ n. Doubling the input adds just one step.'
  tags:
  - logarithm
- id: what-is-complexity-05
  front: What are the best, worst and average cases in linear search?
  back: 'Best - what you are looking for comes first, one step. Worst - no element, n comparisons. By “linear search complexity
    - linear” we mean the worst case: a guarantee from above that is true for any data.'
  tags:
  - cases
- id: what-is-complexity-06
  front: Why is it usually the worst case that is of interest?
  back: It provides a guarantee that is independent of luck and answers the question of “how bad can it get.” The average
    case is also useful, but requires knowledge of the distribution of the input data, which is usually not available.
  tags:
  - cases
- id: what-is-complexity-07
  front: Could an algorithm with more steps be faster in practice?
  back: Yes, at small entrances. For n = 50, the algorithm takes 2500 steps in n², and the “linear” 100×n algorithm takes
    5000. Complexity describes the behavior for large n in the limit and deliberately ignores constants and small inputs.
  tags:
  - pitfalls
- id: what-is-complexity-08
  front: Why does complexity theory discard constants and low-order terms?
  back: 'It is impossible to calculate the exact number of cycles: it varies from machine to machine. Therefore, only the
    dominant member is left. 3n² + 5n + 17 and n² behave identically for large n - the fate of the algorithm is decided by
    the square.'
  tags:
  - pitfalls
- id: what-is-complexity-09
  front: What is a common mistake associated with counting lines of code within a loop?
  back: Confusing the number of iterations with the number of lines. Ten lines inside a loop for n iterations is work of order
    n, not 10. Complexity counts repetitions, not the length of the program text.
  tags:
  - pitfalls
