conceptId: analyzing-code
cards:
- id: analyzing-code-01
  front: Which two rules cover almost all cases of code complexity analysis?
  back: 'Consecutive blocks are added: a loop for n, then another for n - this is O(n). Nested ones are multiplied: a loop
    on n inside a loop on n is O(n²). Next, constants and minor terms are thrown away.'
  tags:
  - basics
- id: analyzing-code-02
  front: Why does loop range(i+1, n) inside range(n) produce O(n²) and not O(n)?
  back: The inner loop takes (n-1)+(n-2)+...+1 = n(n-1)/2 ≈ n²/2 steps. The constant 1/2 is thrown away. The cycle only goes
    through half of the pairs, but half of the square is still a square.
  tags:
  - nesting
- id: analyzing-code-03
  front: How do you recognize a logarithm in code?
  back: 'The variable is divided several times (n //= 2, lo and hi converge, the index jumps to the middle), and not reduced
    by one. Dividing in half to one gives log₂ n steps: for a million, about twenty.'
  tags:
  - logarithm
- id: analyzing-code-04
  front: What is the difference between n -= 1 and n //= 2 in a loop?
  back: n -= 1 gives exactly n steps - linear growth. n //= 2 gives log n steps - logarithmic. The difference between "subtract"
    and "divide" is the gap between n and log n.
  tags:
  - logarithm
- id: analyzing-code-05
  front: Why does items.count(x) inside a for loop make the code O(n²)?
  back: The for loop takes n iterations, but count(x) itself goes through the entire list in O(n). The result is n × n = O(n²),
    although there is only one visible cycle. The expensive operation is hidden inside a single line.
  tags:
  - hidden-cost
- id: analyzing-code-06
  front: Which Python operations hide linear cost and which are O(1)?
  back: 'Linear: x in list, list.count(x), items[1:] slices (copying), string concatenation via += in a loop. And x in some_set
    and x in some_dict are O(1): the search is based on the hash.'
  tags:
  - hidden-cost
- id: analyzing-code-07
  front: Why is replacing list with set in the membership check not a micro-optimization?
  back: 'It changes the complexity class: checking from O(n) becomes O(1), and the outer loop from O(n²) to O(n). This often
    decides whether the code can handle the actual amount of data.'
  tags:
  - hidden-cost
- id: analyzing-code-08
  front: How is the complexity of recursion assessed?
  back: Like “number of all calls” × “work in one call”. A naive fib generates two calls each, the tree branches, the total
    number grows as 2ⁿ - an O(2ⁿ) exponent. Binary search - one call per level, log n levels, O(log n).
  tags:
  - recursion
- id: analyzing-code-09
  front: Why does the built-in sorted(items) immediately make the function O(n log n)?
  back: 'The cost is hidden inside the built-in function: sorting the entire input costs O(n log n) even without a single
    explicit for. Built-in ones (sorted, min, sum, in for a list) have their own complexity, it is taken into account along
    with loops.'
  tags:
  - pitfalls
- id: analyzing-code-10
  front: Why is append considered O(1) even though it sometimes copies the entire list?
  back: 'If there is not enough space, the list is re-allocated and copied in O(n), but such moments are rare: the list grows
    with a margin. The cost of copying, spread over all appends, gives a constant per operation - this is amortized O(1).'
  tags:
  - amortized
