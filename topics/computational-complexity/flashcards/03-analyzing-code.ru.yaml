conceptId: analyzing-code
cards:
  - id: analyzing-code-01
    front: "Какие два правила покрывают почти все случаи анализа сложности кода?"
    back: "Последовательные блоки складываются: цикл на n, потом другой на n - это O(n). Вложенные перемножаются: цикл на n внутри цикла на n - это O(n²). Дальше выбрасывают константы и младшие члены."
    tags: [basics]
  - id: analyzing-code-02
    front: "Почему цикл range(i+1, n) внутри range(n) даёт O(n²), а не O(n)?"
    back: "Внутренний цикл делает (n-1)+(n-2)+...+1 = n(n-1)/2 ≈ n²/2 шагов. Константа 1/2 выбрасывается. Цикл проходит лишь половину пар, но половина от квадрата - это всё равно квадрат."
    tags: [nesting]
  - id: analyzing-code-03
    front: "По какому признаку в коде узнают логарифм?"
    back: "Переменную делят в несколько раз (n //= 2, lo и hi сходятся, индекс прыгает в середину), а не уменьшают на единицу. Деление пополам до единицы даёт log₂ n шагов: для миллиона около двадцати."
    tags: [logarithm]
  - id: analyzing-code-04
    front: "В чём разница между n -= 1 и n //= 2 в цикле?"
    back: "n -= 1 даёт ровно n шагов - линейный рост. n //= 2 даёт log n шагов - логарифмический. Разница между «вычитаем» и «делим» - это пропасть между n и log n."
    tags: [logarithm]
  - id: analyzing-code-05
    front: "Почему items.count(x) внутри цикла for превращает код в O(n²)?"
    back: "Цикл for - это n итераций, но count(x) сам проходит весь список за O(n). Итог n × n = O(n²), хотя видимый цикл только один. Дорогая операция спрятана внутри одной строки."
    tags: [hidden-cost]
  - id: analyzing-code-06
    front: "Какие операции в Python скрывают линейную стоимость, а какие O(1)?"
    back: "Линейны: x in list, list.count(x), срезы items[1:] (копирование), склейка строк через += в цикле. А x in some_set и x in some_dict - это O(1): поиск идёт по хэшу."
    tags: [hidden-cost]
  - id: analyzing-code-07
    front: "Почему замена list на set в проверке принадлежности - не микрооптимизация?"
    back: "Она меняет класс сложности: проверка из O(n) становится O(1), а внешний цикл из O(n²) - в O(n). Это часто решает, выдержит ли код реальный объём данных."
    tags: [hidden-cost]
  - id: analyzing-code-08
    front: "Как оценивают сложность рекурсии?"
    back: "Как «число всех вызовов» × «работа в одном вызове». Наивный fib порождает по два вызова на каждый, дерево ветвится, общее число растёт как 2ⁿ - экспонента O(2ⁿ). Двоичный поиск - один вызов на уровень, log n уровней, O(log n)."
    tags: [recursion]
  - id: analyzing-code-09
    front: "Почему встроенный sorted(items) сразу делает функцию O(n log n)?"
    back: "Стоимость спрятана внутри встроенной функции: сортировка всего входа стоит O(n log n) даже без единого явного for. Встроенные (sorted, min, sum, in для списка) несут свою сложность, её учитывают наравне с циклами."
    tags: [pitfalls]
  - id: analyzing-code-10
    front: "Почему append считают O(1), хотя он иногда копирует весь список?"
    back: "При нехватке места список перевыделяется и копируется за O(n), но такие моменты редки: список растёт с запасом. Стоимость копирований, размазанная по всем append, даёт константу на операцию - это амортизированная O(1)."
    tags: [amortized]
