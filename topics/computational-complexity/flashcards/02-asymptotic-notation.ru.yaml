conceptId: asymptotic-notation
cards:
  - id: asymptotic-notation-01
    front: "Что формально означает T(n) = O(f(n))?"
    back: "Найдутся константа c и порог n₀, такие что T(n) ≤ c·f(n) для всех n ≥ n₀. Проще: можно подобрать c·f(n), которая ляжет выше T(n) на всём хвосте графика. Это верхняя граница роста."
    tags: [bigo]
  - id: asymptotic-notation-02
    front: "Зачем в определении O нужен порог n₀?"
    back: "O-нотация описывает поведение на больших входах. Слева от n₀ функция T(n) может вести себя как угодно - оценка обязана выполняться только начиная с n₀. Поэтому константы и младшие члены на хвосте теряются."
    tags: [bigo]
  - id: asymptotic-notation-03
    front: "Какие два правила упрощают выражение до формы O?"
    back: "Первое - выбросить постоянные множители. Второе - оставить только самое быстрорастущее слагаемое. Так n + n² превращается в O(n²): линейная часть перестаёт влиять на форму роста."
    tags: [simplify]
  - id: asymptotic-notation-04
    front: "Обозначают ли O(3n²), O(n² + n) и O(n²) одно и то же?"
    back: "Да, это одно множество функций. Писать множители и младшие члены внутри O не ошибка, но это лишний шум. Договорённость - оставлять минимальную форму, то есть O(n²)."
    tags: [simplify]
  - id: asymptotic-notation-05
    front: "Чем отличаются O, Omega и Theta?"
    back: "O - верхняя граница (растёт не быстрее f(n)). Omega - нижняя граница (не быстрее, чем f(n), в смысле «не справится быстрее»). Theta зажимает с двух сторон: алгоритм растёт ровно как f(n). Theta - самое точное из трёх."
    tags: [notation]
  - id: asymptotic-notation-06
    front: "Почему любой алгоритм, читающий весь вход, не быстрее Omega(n)?"
    back: "Чтобы посмотреть на каждый из n элементов, нужно хотя бы n шагов - меньше не хватит. Это нижняя граница: T(n) ≥ c·n на хвосте, гарантия, что быстрее определённого предела справиться нельзя."
    tags: [notation]
  - id: asymptotic-notation-07
    front: "Почему фраза «быстрая сортировка работает за O(n²)» технически верна?"
    back: "O - это «не хуже чем», а не «ровно столько». В худшем случае (отсортированный вход, неудачный опорный элемент) быстрая сортировка действительно квадратична, и потолок n² её честно ограничивает. Типично же она O(n log n)."
    tags: [notation]
  - id: asymptotic-notation-08
    front: "Что на самом деле означает O(1)?"
    back: "«Число шагов не зависит от n» - константа, пусть даже большая. Это не «один шаг» и не «мгновенно». Обращение словарь[ключ] считается O(1), потому что его стоимость не растёт с размером словаря."
    tags: [pitfalls]
  - id: asymptotic-notation-09
    front: "Почему O(1) не синоним «быстро»?"
    back: "Асимптотика молчит о константах: O(1) с гигантской константой может на практике уступать O(n) с крошечной на малых входах. O(1) - обещание про масштабирование, а не про абсолютную скорость здесь и сейчас."
    tags: [pitfalls]
  - id: asymptotic-notation-10
    front: "Чем малое o отличается от большого O?"
    back: "T(n) = o(f(n)) означает строгое превосходство: T растёт строго медленнее f, граница не достигается даже с константой. Например, n = o(n²), но n² не есть o(n²). Грубо: O это «≤», o это «<»."
    tags: [advanced]
