conceptId: what-is-complexity
cards:
  - id: what-is-complexity-01
    front: "Почему сложность измеряют в шагах, а не в секундах?"
    back: "Секунды зависят от железа, нагрузки, состояния кэша и версии интерпретатора - они почти ничего не говорят об алгоритме. Число шагов (элементарных операций) не зависит от машины, поэтому на нём можно строить осмысленные сравнения."
    tags: [basics]
  - id: what-is-complexity-02
    front: "Что такое сложность как функция от размера входа n?"
    back: "Это зависимость, а не одно число: сколько шагов выполнит алгоритм при входе размера n. Для списка n - длина, для строки - число символов, для числа - иногда количество цифр. Важно, как работа меняется при росте n."
    tags: [basics]
  - id: what-is-complexity-03
    front: "Как складываются и как перемножаются блоки кода при подсчёте шагов?"
    back: "Последовательные блоки складываются: цикл рядом с циклом - это n + n. Вложенные перемножаются: цикл внутри цикла - это n × n. Отсюда и берётся квадрат у двойного цикла."
    tags: [counting]
  - id: what-is-complexity-04
    front: "Почему двоичный поиск делает log n шагов, а не n, хотя в нём есть цикл?"
    back: "На каждом шаге он выбрасывает половину оставшихся кандидатов: из 1000 остаётся 500, 250, 125 и так далее. Число делений пополам до единицы - это log₂ n. Удвоение входа добавляет всего один шаг."
    tags: [logarithm]
  - id: what-is-complexity-05
    front: "Что такое лучший, худший и средний случай на примере линейного поиска?"
    back: "Лучший - искомое стоит первым, один шаг. Худший - элемента нет, n сравнений. Под «сложностью линейного поиска - линейная» понимают худший случай: гарантию сверху, верную для любых данных."
    tags: [cases]
  - id: what-is-complexity-06
    front: "Почему обычно интересен именно худший случай?"
    back: "Он даёт гарантию, не зависящую от удачи, и отвечает на вопрос «насколько плохо может стать». Средний случай тоже полезен, но требует знать распределение входных данных, которого обычно нет под рукой."
    tags: [cases]
  - id: what-is-complexity-07
    front: "Может ли алгоритм с большим числом шагов оказаться быстрее на практике?"
    back: "Да, на малых входах. При n = 50 алгоритм за n² делает 2500 шагов, а «линейный» 100×n - 5000. Сложность описывает поведение при больших n в пределе и намеренно игнорирует константы и малые входы."
    tags: [pitfalls]
  - id: what-is-complexity-08
    front: "Почему теория сложности отбрасывает константы и младшие слагаемые?"
    back: "Точное число тактов посчитать невозможно: оно меняется от машины к машине. Поэтому оставляют только доминирующий член. 3n² + 5n + 17 и n² ведут себя одинаково при больших n - судьбу алгоритма решает квадрат."
    tags: [pitfalls]
  - id: what-is-complexity-09
    front: "Какая частая ошибка связана с подсчётом строк кода внутри цикла?"
    back: "Путать число итераций с числом строк. Десять строк внутри цикла на n итераций - это работа порядка n, а не 10. Сложность считает повторения, а не длину текста программы."
    tags: [pitfalls]
