conceptId: inheritance
cards:
  - id: inheritance-01
    front: "Что на самом деле делает запись class Dog(Animal)?"
    back: "Она объявляет отношение is-a («Dog - это Animal») и запоминает ссылку на родителя. Методы Animal не копируются внутрь Dog; вся работа откладывается до момента обращения к атрибуту."
    tags: [basics]
  - id: inheritance-02
    front: "Как Python ищет метод по цепочке наследования?"
    back: "Обращение d.speak() запускает поиск по цепочке Dog → Animal → object и берёт первое совпадение. Если до конца цепочки имя не нашлось, бросается AttributeError."
    tags: [lookup]
  - id: inheritance-03
    front: "Что такое переопределение (override) и почему оно работает?"
    back: "Переопределение - это одноимённый метод в подклассе. Оно работает, потому что поиск начинается с класса экземпляра: версия подкласса находится первой, и до родительской очередь не доходит."
    tags: [override]
  - id: inheritance-04
    front: "Что делает super() и чем «расширить» отличается от «заменить»?"
    back: "super() продолжает поиск со следующего звена цепочки, а не с класса экземпляра. Метод-замена игнорирует родителя; метод-расширение вызывает super() и дополняет его результат."
    tags: [super]
  - id: inheritance-05
    front: "Почему после переопределения __init__ обязателен вызов super().__init__()?"
    back: "Как только подкласс определяет свой __init__, родительский перестаёт вызываться автоматически и его атрибуты не создаются. Без super().__init__(...) обращение к ним даст AttributeError - атрибут не сломался, он никогда не существовал."
    tags: [init]
  - id: inheritance-06
    front: "Почему пишут super().speak(), а не Dog.speak(self)?"
    back: "Жёсткое имя родителя в коде метода сломается при перестройке иерархии и не пройдёт по MRO при множественном наследовании. Современная форма - пустые скобки super(), он сам находит следующее звено цепочки."
    tags: [super]
  - id: inheritance-07
    front: "Чем отличаются isinstance и issubclass?"
    back: "isinstance(obj, Cls) проверяет, является ли объект экземпляром класса или любого его подкласса. issubclass(Sub, Base) проверяет, входит ли Base в цепочку наследования Sub. Оба учитывают всю цепочку is-a."
    tags: [isinstance]
  - id: inheritance-08
    front: "Почему предпочитают isinstance сравнению type(x) == Cls?"
    back: "Точное сравнение типов ломает подстановочность: экземпляр подкласса перестаёт считаться экземпляром родителя. isinstance сохраняет главное обещание наследования - подкласс можно подставить везде, где ждут родителя."
    tags: [isinstance]
  - id: inheritance-09
    front: "Почему родительский метод может вызвать переопределённый метод подкласса?"
    back: "Поиск всегда стартует с класса экземпляра, даже если вызов self.speak() написан внутри родителя. Если self - экземпляр Dog, найдётся версия Dog. Поэтому при переопределении нужно сохранять контракт метода."
    tags: [lookup]
  - id: inheritance-10
    front: "Когда вместо наследования стоит выбрать композицию?"
    back: "Когда отношение звучит как «у X есть Y», а не «X - это Y». «Заказ - это список товаров» неверно: у заказа есть список, адрес и статус. Признак ошибочной иерархии - подкласс глушит метод родителя через raise NotImplementedError."
    tags: [design]
