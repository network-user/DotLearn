conceptId: composition
cards:
  - id: composition-01
    front: "Чем отличаются отношения is-a и has-a?"
    back: "Наследование выражает is-a («Собака - это Животное»), композиция - has-a («у Автомобиля есть Мотор»). Это разная жёсткость связи: наследник привязан к родителю навсегда, а деталь можно подменить, не трогая хост."
    tags: [basics]
  - id: composition-02
    front: "Почему наследник видит больше, чем нужно?"
    back: "Наследник видит всё содержимое родителя и любой добавленный в базовый класс метод мгновенно появляется у всех потомков - иногда там, где он не нужен. Композиция держит детали на расстоянии вытянутой руки."
    tags: [coupling]
  - id: composition-03
    front: "Почему raise NotImplementedError в потомке - это запах?"
    back: "Базовый класс пообещал возможность, которую наследник вынужден отзывать. Значит, метод не относится ко всем потомкам и иерархия выбрана неверно - Вы растянули is-a слишком далеко, нарушив принцип подстановки."
    tags: [pitfalls]
  - id: composition-04
    front: "Что такое внедрение зависимости в контексте композиции?"
    back: "Хост не создаёт деталь сам, а получает готовую снаружи - обычно через конструктор, сохраняя на self. Поэтому в тесте можно подсунуть любой объект с нужным методом, даже заглушку, не меняя хост."
    tags: [di]
  - id: composition-05
    front: "Что такое утиная типизация в связке с композицией?"
    back: "Хост опирается не на конкретный тип детали, а на наличие у неё нужного метода (например start()). «Если крякает как утка - сгодится»: подойдёт любой объект с этим методом."
    tags: [duck-typing]
  - id: composition-06
    front: "Что такое делегирование?"
    back: "Это когда хост перенаправляет вызов своей детали. Пример - Стек на списке: он содержит список, но не является им, поэтому наружу торчат только push/pop/size, а не insert, sort и индексация."
    tags: [delegation]
  - id: composition-07
    front: "Почему Стек на композиции лучше Стека-наследника от list?"
    back: "При наследовании от list наружу утекли бы insert, sort и индексация, и инвариант «только с вершины» сломался бы. Композиция открывает ровно тот интерфейс, который Вы хотите поддерживать."
    tags: [delegation]
  - id: composition-08
    front: "Бывает ли делегирование «голым»?"
    back: "Почти никогда: хост обычно добавляет к перенаправленному вызову что-то своё. Плеер пересылает выбор трека в очередь, но попутно ведёт собственный счётчик прослушиваний - поведение, которого у очереди нет."
    tags: [delegation]
  - id: composition-09
    front: "Что такое «дотягивание сквозь деталь» и закон Деметры?"
    back: "Цепочка вроде car.привод.бак.уровень - это лишнее знание о внутренностях чужого объекта. Закон Деметры: разговаривайте с друзьями, а не с друзьями друзей. Пусть деталь сама отдаёт значение методом, а хост перенаправит вызов."
    tags: [pitfalls]
  - id: composition-10
    front: "Опасен ли __getattr__ для авто-делегирования?"
    back: "Да. Переслать любой неизвестный атрибут детали через __getattr__ соблазнительно, но Вы теряете контроль над открытым интерфейсом, ломаете автодополнение и можете пробросить методы, нарушающие инвариант. Для обычной композиции честнее явные перенаправители."
    tags: [advanced]
