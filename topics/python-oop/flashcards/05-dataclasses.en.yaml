conceptId: dataclasses
cards:
  - id: dataclasses-en-01
    front: "Which three methods does the @dataclass decorator generate?"
    back: "__init__ (spreads arguments across attributes), __repr__ (a string like Point(x=3, y=4) in declaration order), and __eq__ (comparison by value). All are synthesized from annotated fields."
    tags: [basics]
  - id: dataclasses-en-02
    front: "What turns a name into a dataclass field?"
    back: "A type annotation. x: float is a field, while count = 0 without an annotation is an ordinary class variable: dataclass ignores it and it appears in neither __init__ nor __repr__."
    tags: [fields]
  - id: dataclasses-en-03
    front: "Why can you not write items: list = [] in a dataclass?"
    back: "Dataclass raises a ValueError when the class is declared. A mutable default would be evaluated once and all instances would share one list. The fix is field(default_factory=list): the factory is called anew for each instance."
    tags: [pitfalls]
  - id: dataclasses-en-04
    front: "What does @dataclass(frozen=True) do?"
    back: "It forbids changing fields after creation (assignment raises FrozenInstanceError) and makes the instance hashable - you can put it in a set and use it as a dict key."
    tags: [frozen]
  - id: dataclasses-en-05
    front: "Why is frozen=True needed for hashability?"
    back: "A hash must stay constant while the object lives in a set or dict. An ordinary @dataclass is mutable and compared by value, so it sets __hash__ = None. frozen removes the contradiction: fields are immutable, so the hash is stable."
    tags: [frozen]
  - id: dataclasses-en-06
    front: "What does @dataclass(order=True) add?"
    back: "The comparison methods <, <=, >, >=. Comparison is lexicographic over the tuple of fields in declaration order, like comparing tuples. This gives sorting for free via sorted() without key=."
    tags: [order]
  - id: dataclasses-en-07
    front: "When is __post_init__ called and what is it for?"
    back: "The generated __init__ calls it at the very end, after spreading arguments across attributes. It is the right place to validate invariants or compute derived fields through self."
    tags: [post-init]
  - id: dataclasses-en-08
    front: "What do field(repr=False) and field(compare=False) do?"
    back: "repr=False drops the field from __repr__ (handy for long or secret values like a token). compare=False excludes the field from __eq__ and ordering (for example a cache or timestamp that does not define equality)."
    tags: [field]
  - id: dataclasses-en-09
    front: "Will a dataclass Point equal an ordinary class with the same x and y?"
    back: "No. The generated __eq__ first checks that the other object is the same class. Point(1, 2) == Pair(1, 2) is False, even if the fields match."
    tags: [equality]
  - id: dataclasses-en-10
    front: "When is a dataclass not a good fit?"
    back: "When the constructor has heavy invariants or complex assembly; when the class is primarily behavior with many methods; when you need full control over __init__ or a mutable object that must not be compared by value."
    tags: [design]
