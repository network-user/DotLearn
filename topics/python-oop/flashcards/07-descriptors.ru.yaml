conceptId: descriptors
cards:
  - id: descriptors-01
    front: "Что такое дескриптор?"
    back: "Объект, который лежит атрибутом класса и определяет хотя бы один из методов `__get__`, `__set__`, `__delete__`. Пока он отвечает за имя, каждое чтение и запись этого имени на экземпляре проходит через его методы."
    tags: [basics]
  - id: descriptors-02
    front: "Почему `user.age` это не просто чтение из `user.__dict__`?"
    back: "За точкой стоит вызов `type(user).__getattribute__(user, \"age\")`. Он сначала ищет дескриптор в классах по MRO и только потом заглядывает в словарь экземпляра, поэтому дескриптор может перехватить доступ."
    tags: [lookup]
  - id: descriptors-03
    front: "Зачем нужен `__set_name__`?"
    back: "При создании класса интерпретатор вызывает `__set_name__(self, owner, name)` для каждого дескриптора и сообщает имя атрибута. Дескриптор запоминает его и использует ключом в `obj.__dict__`, обходясь без захардкоженной строки."
    tags: [protocol]
  - id: descriptors-04
    front: "Чем data-дескриптор отличается от non-data?"
    back: "Data-дескриптор определяет `__set__` или `__delete__` и имеет приоритет над словарём экземпляра. Non-data определяет только `__get__` и уступает словарю - одноимённый ключ в `obj.__dict__` его перекроет."
    tags: [data-vs-nondata]
  - id: descriptors-05
    front: "Каков полный порядок поиска `obj.attr`?"
    back: "Сначала data-дескриптор из класса, затем словарь экземпляра `obj.__dict__`, затем non-data дескриптор или обычный атрибут класса. Эта иерархия объясняет поведение `property`, методов и кэшей."
    tags: [lookup]
  - id: descriptors-06
    front: "Почему `property` нельзя обойти записью в `obj.__dict__`?"
    back: "`property` реализует `__get__`, `__set__` и `__delete__`, то есть это data-дескриптор. Чтение всегда идёт через его `__get__`, поэтому значение в словаре экземпляра под тем же именем не перекроет сеттер."
    tags: [property]
  - id: descriptors-07
    front: "Как из функции рождается bound method?"
    back: "У типа `function` есть только `__get__` - это non-data дескриптор. `user.greet` вызывает `function.__get__(user, User)` и возвращает связанный метод с уже подставленным `self`. Через класс `User.greet` отдаёт голую функцию."
    tags: [methods]
  - id: descriptors-08
    front: "Почему `u.greet is u.greet` даёт False?"
    back: "Bound method создаётся заново на каждое обращение к атрибуту, поэтому два доступа дают разные объекты. При этом `u.greet.__func__` у них одна и та же функция из класса."
    tags: [methods]
  - id: descriptors-09
    front: "Как `cached_property` считает один раз?"
    back: "Это non-data дескриптор. Первый `__get__` вычисляет значение и кладёт в `obj.__dict__` под тем же именем. При следующем чтении словарь экземпляра побеждает non-data дескриптор, поэтому `__get__` не вызывается и значение берётся из словаря."
    tags: [cached-property]
  - id: descriptors-10
    front: "Почему нельзя хранить значение в самом дескрипторе?"
    back: "Дескриптор - один на весь класс. Если написать `self.value = value`, поле станет общим, и второй экземпляр затрёт значение первого. Данные кладут в `obj.__dict__[self.name]`, тогда у каждого экземпляра своё значение."
    tags: [pitfalls]
