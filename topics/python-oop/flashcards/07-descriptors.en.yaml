conceptId: descriptors
cards:
  - id: descriptors-en-01
    front: "What is a descriptor?"
    back: "An object that lives as a class attribute and defines at least one of `__get__`, `__set__`, `__delete__`. While it owns a name, every read and write of that name on an instance passes through its methods."
    tags: [basics]
  - id: descriptors-en-02
    front: "Why is `user.age` not just a read from `user.__dict__`?"
    back: "A call hides behind the dot: `type(user).__getattribute__(user, \"age\")`. It first looks for a descriptor in the classes along the MRO and only then in the instance dictionary, so a descriptor can intercept the access."
    tags: [lookup]
  - id: descriptors-en-03
    front: "What is `__set_name__` for?"
    back: "When the class is created the interpreter calls `__set_name__(self, owner, name)` for each descriptor and tells it the attribute name. The descriptor remembers it and uses it as the key in `obj.__dict__`, avoiding a hard-coded string."
    tags: [protocol]
  - id: descriptors-en-04
    front: "How does a data descriptor differ from a non-data one?"
    back: "A data descriptor defines `__set__` or `__delete__` and takes precedence over the instance dictionary. A non-data one defines only `__get__` and yields to the dictionary - a same-named key in `obj.__dict__` overrides it."
    tags: [data-vs-nondata]
  - id: descriptors-en-05
    front: "What is the full lookup order for `obj.attr`?"
    back: "First a class data descriptor, then the instance dictionary `obj.__dict__`, then a non-data descriptor or a plain class attribute. This hierarchy explains the behavior of `property`, methods, and caches."
    tags: [lookup]
  - id: descriptors-en-06
    front: "Why can't `property` be bypassed by writing to `obj.__dict__`?"
    back: "`property` implements `__get__`, `__set__`, and `__delete__`, which makes it a data descriptor. The read always goes through its `__get__`, so a value in the instance dictionary under the same name will not override the setter."
    tags: [property]
  - id: descriptors-en-07
    front: "How is a bound method born from a function?"
    back: "The `function` type has only `__get__`, so it is a non-data descriptor. `user.greet` calls `function.__get__(user, User)` and returns a bound method with `self` already filled in. Through the class, `User.greet` returns the bare function."
    tags: [methods]
  - id: descriptors-en-08
    front: "Why is `u.greet is u.greet` False?"
    back: "A bound method is created afresh on every attribute access, so two accesses give different objects. Yet `u.greet.__func__` is the same function from the class for both."
    tags: [methods]
  - id: descriptors-en-09
    front: "How does `cached_property` compute once?"
    back: "It is a non-data descriptor. The first `__get__` computes the value and stores it in `obj.__dict__` under the same name. On the next read the instance dictionary beats the non-data descriptor, so `__get__` is not called and the value comes from the dictionary."
    tags: [cached-property]
  - id: descriptors-en-10
    front: "Why can't you keep the value in the descriptor itself?"
    back: "The descriptor is one per class - writing `self.value = value` makes the field shared, and a second instance overwrites the first one's value. Put the data in `obj.__dict__[self.name]` so each instance has its own."
    tags: [pitfalls]
