conceptId: dunder-methods
cards:
  - id: dunder-methods-en-01
    front: "What does Python expand the expression a + b into?"
    back: "Into a call a.__add__(b). Operators and built-in functions are syntactic sugar over dunder methods: len(x) is x.__len__(), str(x) is x.__str__(). The protocol fixes the method name; you write the body."
    tags: [protocol]
  - id: dunder-methods-en-02
    front: "How do __repr__ and __str__ differ?"
    back: "__repr__ handles REPL output and repr(x); its goal is to be unambiguous for the developer, ideally a string you could paste back into code. __str__ handles str(x) and print(x); its goal is readability for the end user."
    tags: [display]
  - id: dunder-methods-en-03
    front: "Which display method is the fallback, and why does it matter?"
    back: "__repr__ is the fallback for str(): if you define only it, print and str pick it up automatically. But __str__ alone does not substitute for __repr__. So if you write one method, write __repr__."
    tags: [display]
  - id: dunder-methods-en-04
    front: "Why does __eq__ return NotImplemented for an unrelated type instead of False?"
    back: "NotImplemented means \"I do not know how to compare with this type\", and Python then gives the right side a chance via other.__eq__(self). Returning False deprives the right operand of a say and declares inequality on behalf of both."
    tags: [equality]
  - id: dunder-methods-en-05
    front: "How does NotImplemented differ from NotImplementedError?"
    back: "NotImplemented is a singleton value you return from comparison and arithmetic methods. NotImplementedError is an exception you raise in an abstract method. Returning NotImplementedError from __eq__ is a bug - it is truthy, so everything counts as equal."
    tags: [equality]
  - id: dunder-methods-en-06
    front: "What happens to __hash__ when you define __eq__?"
    back: "Python silently sets __hash__ = None, making the object unhashable - it cannot go in a set or be a dict key (TypeError). For an immutable type define __hash__ on the same fields; leave a mutable type unhashable."
    tags: [hash]
  - id: dunder-methods-en-07
    front: "How does Python determine an object's truthiness in if x:?"
    back: "Down a chain: first __bool__ and its result; if absent, __len__ (length 0 is falsy, nonzero is truthy); if neither exists, the object is always truthy. __len__ gives meaningful truthiness for free."
    tags: [truthiness]
  - id: dunder-methods-en-08
    front: "Why must __add__ return a new object rather than mutate self?"
    back: "a + b has no right to touch a or b - that is how built-in types behave (2 + 3 does not turn 2 into 5). Mutating self breaks immutability: total = a + a doubles a, and then total and a become the same object."
    tags: [arithmetic]
  - id: dunder-methods-en-09
    front: "What do Money(100) is Money(100) and Money(100) == Money(100) return?"
    back: "is is forever False - these are different objects in memory, and is cannot be overridden. == is True only after a custom __eq__ comparing by value; without it, == reduces to is."
    tags: [equality]
  - id: dunder-methods-en-10
    front: "What should __eq__ return?"
    back: "Only a bool (True/False) for its own type, or NotImplemented for an unrelated type. If it returns a list or number, a == b hands back that object and if a == b: tests its truthiness instead of equality."
    tags: [equality]
