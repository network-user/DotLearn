conceptId: encapsulation
cards:
  - id: encapsulation-01
    front: "Зачем нужна инкапсуляция?"
    back: "Чтобы инвариант класса (например, «баланс неотрицателен») проверялся в одном месте, а не во всех точках записи. Пока в атрибут пишет любая часть программы, проверку приходится дублировать везде, и однажды кто-то её забудет."
    tags: [basics]
  - id: encapsulation-02
    front: "Что означает одно ведущее подчёркивание в имени атрибута?"
    back: "Это договорённость для людей и инструментов: «внутреннее, не полагайтесь на меня». Язык доступ не запрещает - acc._balance читается как обычный атрибут. IDE и линтер подсветят обращение, import * пропустит такое имя."
    tags: [convention]
  - id: encapsulation-03
    front: "Что делает name mangling с именем __balance?"
    back: "В теле класса каждый идентификатор вида __name переписывается в _ClassName__name ещё при компиляции. Поэтому в объекте Account хранится _Account__balance, а атрибута __balance просто нет."
    tags: [mangling]
  - id: encapsulation-04
    front: "Почему два подчёркивания - это не защита, а переименование?"
    back: "acc.__balance снаружи падает с AttributeError не из-за проверки прав, а потому что атрибута с таким именем нет. Настоящее имя _Account__balance ничем не защищено: его можно прочитать и перезаписать."
    tags: [mangling]
  - id: encapsulation-05
    front: "Для чего на самом деле нужен name mangling?"
    back: "Для защиты от случайных коллизий имён при наследовании: Base и Child получают отдельные _Base__id и _Child__id, и метод родителя не прочитает поле потомка по ошибке. Это не безопасность данных."
    tags: [mangling]
  - id: encapsulation-06
    front: "Что делает property и как через него проходит __init__?"
    back: "property перехватывает чтение (геттер) и запись (сеттер): снаружи атрибут выглядит обычным. Если __init__ присваивает через публичное имя (self.balance = ...), он проходит тот же сеттер, и проверка срабатывает и при создании."
    tags: [property]
  - id: encapsulation-07
    front: "Что даёт property без сеттера?"
    back: "Атрибут только для чтения и удобный способ объявить вычисляемое значение. Попытка присвоить упадёт с AttributeError ... has no setter. Значение вычисляется при каждом чтении и не может разойтись с источником."
    tags: [property]
  - id: encapsulation-08
    front: "Почему в Python не пишут геттеры и сеттеры впрок?"
    back: "Переход от обычного атрибута к property не меняет вызывающий код: acc.balance выглядит одинаково для атрибута и для property. Шлюз с проверкой можно добавить в тот день, когда он понадобится."
    tags: [design]
  - id: encapsulation-09
    front: "Почему проверка только в __init__ не охраняет инвариант?"
    back: "Конструктор контролирует лишь момент создания. Присваивание acc.balance = -3400 строкой ниже молча запишет недопустимое значение. Валидация изменяемого состояния живёт в сеттере property, а __init__ присваивает через него."
    tags: [pitfalls]
  - id: encapsulation-10
    front: "Почему dunder-имена вроде __init__ не искажаются mangling?"
    back: "Механизм затрагивает только имена вида __name (без двух подчёркиваний на конце). Имена с двумя подчёркиваниями с обеих сторон (__init__, __repr__) не переименовываются и работают как обычно."
    tags: [mangling]
