conceptId: abc-interfaces
cards:
  - id: abc-interfaces-en-01
    front: "What does an abstract base class (ABC) describe?"
    back: "A contract: what a subclass must be able to do, while the base leaves the implementation empty. A method with `@abstractmethod` is a hole in the contract that a subclass must close."
    tags: [basics]
  - id: abc-interfaces-en-02
    front: "How do you declare an abstract contract in Python?"
    back: "Inherit the class from `abc.ABC` and mark required methods with the `@abstractmethod` decorator. For example, `class Notifier(ABC)` with `@abstractmethod def send(self, msg)`."
    tags: [syntax]
  - id: abc-interfaces-en-03
    front: "What happens when you create an instance with an unfilled `@abstractmethod`?"
    back: "Python raises `TypeError` right at instantiation and lists the unimplemented names. The error is caught at the boundary, not on the first method call in production."
    tags: [enforcement]
  - id: abc-interfaces-en-04
    front: "Why does a lone `@abstractmethod` without inheriting `ABC` forbid nothing?"
    back: "The ban is provided by the `ABCMeta` metaclass, supplied by inheriting from `ABC` (or `metaclass=ABCMeta`). The decorator on a plain class method does not stop you from creating an object."
    tags: [metaclass]
  - id: abc-interfaces-en-05
    front: "How do you make a property and a classmethod abstract?"
    back: "Stack the decorators with `@abstractmethod` closest to the function (at the bottom): `@property` over `@abstractmethod`, `@classmethod` over `@abstractmethod`. The wrong order silently breaks abstractness."
    tags: [abstract-members]
  - id: abc-interfaces-en-06
    front: "What does `ABC.register(Klass)` do?"
    back: "Declares `Klass` a virtual subclass - `isinstance` and `issubclass` return True without inheritance. But no methods are inherited and the contract is not checked, so the check can lie."
    tags: [register]
  - id: abc-interfaces-en-07
    front: "What does `register` trade away for flexibility?"
    back: "You get no mixins, and method presence is not checked: you can register even a class missing the needed methods, and `isinstance` still says True. This is how the stdlib teaches `list` and `dict` abstract interfaces."
    tags: [register, pitfalls]
  - id: abc-interfaces-en-08
    front: "Why inherit from `collections.abc.Mapping`?"
    back: "You implement three methods `__getitem__`, `__iter__`, `__len__`, and `keys`, `values`, `items`, `get`, `__contains__`, `__eq__` arrive ready as mixins. Plus `isinstance(x, Mapping)` becomes True."
    tags: [collections-abc]
  - id: abc-interfaces-en-09
    front: "How does an ABC differ from `typing.Protocol`?"
    back: "An ABC is nominal typing - a subtype must explicitly inherit the base or pass `register`. A Protocol is structural - any type of the right shape fits, without inheritance, and a static analyzer checks the shape."
    tags: [protocol]
  - id: abc-interfaces-en-10
    front: "When do you choose an ABC vs a Protocol?"
    back: "An ABC when you own the hierarchy and want shared mixin code plus a runtime ban on creating an incomplete implementation. A Protocol when you need to accept outside types by their shape without forcing them to inherit."
    tags: [choosing]
