conceptId: classes-and-instances
cards:
  - id: classes-and-instances-01
    front: "В чём разница между классом и экземпляром?"
    back: "Класс - это чертёж, описание данных и поведения; сам по себе он ничего не хранит. Экземпляр - конкретный объект, построенный по чертежу и хранящий собственное состояние. Из одного класса можно сделать сколько угодно независимых экземпляров."
    tags: [basics]
  - id: classes-and-instances-02
    front: "Что такое self и почему его не передают при вызове метода?"
    back: "self - это сам экземпляр, переданный методу явно первым аргументом. Запись c.tick() Python разворачивает в Counter.tick(c), поэтому подставлять self вручную не нужно - это делает интерпретатор."
    tags: [self]
  - id: classes-and-instances-03
    front: "Когда выполняется __init__ и зачем он нужен?"
    back: "__init__ - конструктор: он выполняется один раз в момент создания экземпляра (при вызове класса со скобками) и раздаёт объекту стартовые атрибуты через self.x = ...."
    tags: [init]
  - id: classes-and-instances-04
    front: "Чем отличается атрибут экземпляра от атрибута класса?"
    back: "Атрибут экземпляра задаётся через self.x = ... и свой у каждого объекта. Атрибут класса объявлен в теле класса и один на всех; он виден через любой экземпляр, потому что поиск поднимается с объекта на класс."
    tags: [attributes]
  - id: classes-and-instances-05
    front: "Что делает присваивание d = c для объектов?"
    back: "Оно не создаёт копию, а вешает на тот же объект второй ярлык. d и c смотрят на одну вещь: изменение через d видно через c, и c is d даёт True."
    tags: [identity]
  - id: classes-and-instances-06
    front: "Чем отличаются операторы is и ==?"
    back: "is проверяет тождество - буквально один и тот же объект в памяти. == проверяет равенство значений. Без собственного __eq__ оператор == сводится к is, поэтому Counter(5) == Counter(5) даёт False."
    tags: [identity]
  - id: classes-and-instances-07
    front: "Почему изменяемый атрибут класса (items = []) - почти всегда баг?"
    back: "Список создаётся один раз на уровне класса и делится всеми экземплярами. self.items.append(...) меняет тот самый общий список, и правка через один объект видна всем. Изменяемое состояние заводите в __init__."
    tags: [pitfalls]
  - id: classes-and-instances-08
    front: "Что случится, если забыть self в сигнатуре метода?"
    back: "При вызове c.tick() Python всё равно подставит экземпляр первым аргументом, и метод без self упадёт с TypeError: takes 0 positional arguments but 1 was given. Первый параметр метода экземпляра - всегда self."
    tags: [pitfalls]
  - id: classes-and-instances-09
    front: "В чём опасность изменяемого аргумента по умолчанию def __init__(self, items=[])?"
    back: "Список создаётся один раз при определении функции и становится общим для всех вызовов с опущенным аргументом. Пишите items=None, а внутри self.items = items or []."
    tags: [pitfalls]
  - id: classes-and-instances-10
    front: "Где физически хранятся атрибуты объекта?"
    back: "В словаре __dict__ экземпляра лежат только атрибуты, присвоенные через self.x = .... Методы и атрибуты класса хранятся в __dict__ класса; при обращении Python поднимается с экземпляра на класс."
    tags: [internals]
