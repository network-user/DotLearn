conceptId: dataclasses
cards:
  - id: dataclasses-01
    front: "Какие три метода генерирует декоратор @dataclass?"
    back: "__init__ (раскладывает аргументы по атрибутам), __repr__ (строка вида Point(x=3, y=4) в порядке объявления полей) и __eq__ (сравнение по значению). Всё это синтезируется из аннотированных полей."
    tags: [basics]
  - id: dataclasses-02
    front: "Что превращает имя в поле dataclass?"
    back: "Аннотация типа. x: float - это поле, а count = 0 без аннотации - обычная переменная класса: dataclass её проигнорирует, в __init__ и __repr__ её не будет."
    tags: [fields]
  - id: dataclasses-03
    front: "Почему нельзя написать items: list = [] в dataclass?"
    back: "Dataclass бросит ValueError при объявлении класса. Изменяемое умолчание вычислялось бы один раз, и все экземпляры делили бы один список. Решение - field(default_factory=list): фабрика вызывается заново для каждого экземпляра."
    tags: [pitfalls]
  - id: dataclasses-04
    front: "Что делает @dataclass(frozen=True)?"
    back: "Запрещает менять поля после создания (присваивание бросает FrozenInstanceError) и делает экземпляр хэшируемым - его можно класть в set и использовать ключом dict."
    tags: [frozen]
  - id: dataclasses-05
    front: "Почему frozen=True нужен для хэшируемости?"
    back: "Хэш должен быть постоянным, пока объект живёт в множестве или словаре. Обычный @dataclass изменяем и сравнивается по значению, поэтому выставляет __hash__ = None. frozen снимает противоречие: поля неизменны, хэш стабилен."
    tags: [frozen]
  - id: dataclasses-06
    front: "Что добавляет @dataclass(order=True)?"
    back: "Методы сравнения <, <=, >, >=. Сравнение идёт лексикографически по кортежу полей в порядке объявления, как сравнение кортежей. Это сразу даёт сортировку через sorted() без key=."
    tags: [order]
  - id: dataclasses-07
    front: "Когда вызывается __post_init__ и зачем он нужен?"
    back: "Сгенерированный __init__ вызывает его в самом конце, уже разложив аргументы по атрибутам. Это правильное место для валидации инвариантов или вычисления производных полей через self."
    tags: [post-init]
  - id: dataclasses-08
    front: "Что делают field(repr=False) и field(compare=False)?"
    back: "repr=False убирает поле из __repr__ (удобно для длинных или секретных значений вроде токена). compare=False исключает поле из __eq__ и сравнения (например кэш или временную метку, не определяющие равенство)."
    tags: [field]
  - id: dataclasses-09
    front: "Будет ли dataclass Point равен обычному классу с теми же x и y?"
    back: "Нет. Сгенерированный __eq__ сначала проверяет, что у второго объекта тот же класс. Point(1, 2) == Pair(1, 2) даёт False, даже если поля совпадают."
    tags: [equality]
  - id: dataclasses-10
    front: "Когда dataclass не подходит?"
    back: "Когда в конструкторе тяжёлые инварианты или сложная сборка; когда класс - это в первую очередь поведение с множеством методов; когда нужен полный контроль над __init__ или изменяемый объект, который нельзя сравнивать по значению."
    tags: [design]
