conceptId: dunder-methods
cards:
  - id: dunder-methods-01
    front: "Во что разворачивает Python запись a + b?"
    back: "В вызов a.__add__(b). Операторы и встроенные функции - синтаксический сахар над dunder-методами: len(x) это x.__len__(), str(x) это x.__str__(). Имя метода фиксировано протоколом, тело пишете Вы."
    tags: [protocol]
  - id: dunder-methods-02
    front: "Чем отличаются __repr__ и __str__?"
    back: "__repr__ отвечает за вывод в REPL и repr(x); цель - однозначность для разработчика, в идеале строку можно вернуть в код. __str__ отвечает за str(x) и print(x); цель - читаемость для пользователя."
    tags: [display]
  - id: dunder-methods-03
    front: "Какой из методов отображения запасной и почему это важно?"
    back: "__repr__ запасной для str(): если определить только его, print и str подхватят его автоматически. А только __str__ не заменяет __repr__. Поэтому если пишете один метод - пишите __repr__."
    tags: [display]
  - id: dunder-methods-04
    front: "Зачем __eq__ возвращает NotImplemented для чужого типа, а не False?"
    back: "NotImplemented означает «я не знаю, как сравниться с этим типом», и тогда Python даёт шанс правой стороне через other.__eq__(self). Возврат False лишает правый операнд права голоса и объявляет неравенство от имени обоих."
    tags: [equality]
  - id: dunder-methods-05
    front: "Чем NotImplemented отличается от NotImplementedError?"
    back: "NotImplemented - это значение-синглтон, его return из методов сравнения и арифметики. NotImplementedError - это исключение, его raise в абстрактном методе. Вернуть NotImplementedError из __eq__ - баг: он истинный, и всё будет «равно»."
    tags: [equality]
  - id: dunder-methods-06
    front: "Что происходит с __hash__, если определить __eq__?"
    back: "Python молча выставляет __hash__ = None, и объект становится нехэшируемым - его нельзя класть в set или ключом dict (TypeError). Для неизменяемого типа задайте __hash__ по тем же полям; изменяемый оставьте нехэшируемым."
    tags: [hash]
  - id: dunder-methods-07
    front: "Как Python определяет истинность объекта в if x:?"
    back: "По цепочке: сначала __bool__ и его результат; если его нет - __len__ (длина 0 - ложь, ненулевая - истина); если нет ни того, ни другого - объект всегда истинный. __len__ бесплатно даёт осмысленную истинность."
    tags: [truthiness]
  - id: dunder-methods-08
    front: "Почему __add__ должен возвращать новый объект, а не менять self?"
    back: "a + b не имеет права трогать ни a, ни b - так ведут себя встроенные типы (2 + 3 не превращает 2 в 5). Мутация self ломает неизменяемость: total = a + a удвоит a, а потом total и a окажутся одним объектом."
    tags: [arithmetic]
  - id: dunder-methods-09
    front: "Что вернёт Money(100) is Money(100) и Money(100) == Money(100)?"
    back: "is навсегда даёт False - это разные объекты в памяти, и is переопределить нельзя. == даст True только после собственного __eq__, сравнивающего по значению; без него == сводится к is."
    tags: [equality]
  - id: dunder-methods-10
    front: "Каким должен быть результат __eq__?"
    back: "Только bool (True/False) для своего типа или NotImplemented для чужого. Если вернуть список или число, выражение a == b отдаст этот объект, и if a == b: проверит его истинность, а не равенство."
    tags: [equality]
