conceptId: composition
cards:
  - id: composition-en-01
    front: "How do the is-a and has-a relationships differ?"
    back: "Inheritance expresses is-a (\"a Dog is an Animal\"), composition expresses has-a (\"a Car has an Engine\"). They are different degrees of coupling: a subclass is bound to its parent forever, while a part can be swapped without touching the host."
    tags: [basics]
  - id: composition-en-02
    front: "Why does a subclass see more than it needs?"
    back: "A subclass sees everything in its parent, and any method added to the base class instantly appears on every descendant - sometimes where it does not belong. Composition keeps parts at arm's length."
    tags: [coupling]
  - id: composition-en-03
    front: "Why is raise NotImplementedError in a subclass a smell?"
    back: "The base class promised a capability the subclass has to revoke. That means the method does not belong to every descendant and the hierarchy is wrong - you stretched is-a too far, breaking the substitution principle."
    tags: [pitfalls]
  - id: composition-en-04
    front: "What is dependency injection in the context of composition?"
    back: "The host does not create the part itself but receives a ready one from outside - usually through the constructor, stored on self. That lets a test hand in any object with the needed method, even a stub, without changing the host."
    tags: [di]
  - id: composition-en-05
    front: "What is duck typing combined with composition?"
    back: "The host relies not on a concrete part type but on the part having the needed method (for example start()). \"If it quacks like a duck, it will do\": any object with that method fits."
    tags: [duck-typing]
  - id: composition-en-06
    front: "What is delegation?"
    back: "It is when the host forwards a call to its part. The textbook example is a Stack built on a list: it has a list but is not one, so only push/pop/size are exposed, not insert, sort, or indexing."
    tags: [delegation]
  - id: composition-en-07
    front: "Why is a Stack built by composition better than one inheriting from list?"
    back: "Inheriting from list would leak out insert, sort, and indexing, breaking the \"top only\" invariant. Composition exposes exactly the interface you intend to support."
    tags: [delegation]
  - id: composition-en-08
    front: "Is delegation ever \"bare\"?"
    back: "Almost never: the host usually adds something of its own to the forwarded call. A Player forwards the choice of the next track to a queue but keeps its own play counter - behavior the queue itself does not have."
    tags: [delegation]
  - id: composition-en-09
    front: "What is \"reaching through a part\" and the Law of Demeter?"
    back: "A chain like car.propulsion.tank.level is extra knowledge about another object's internals. The Law of Demeter: talk to your friends, not friends of friends. Let the part expose the value via a method and have the host forward the call."
    tags: [pitfalls]
  - id: composition-en-10
    front: "Is __getattr__ dangerous for auto-delegation?"
    back: "Yes. Forwarding any unknown attribute to a part via __getattr__ is tempting, but you lose control over the exposed interface, break autocomplete, and may forward methods that violate an invariant. For ordinary composition explicit forwarding methods are more honest."
    tags: [advanced]
