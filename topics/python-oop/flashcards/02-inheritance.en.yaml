conceptId: inheritance
cards:
  - id: inheritance-en-01
    front: "What does class Dog(Animal) actually do?"
    back: "It declares an is-a relationship (\"a Dog is an Animal\") and records a reference to the parent. Animal's methods are not copied into Dog; all work is deferred until an attribute is accessed."
    tags: [basics]
  - id: inheritance-en-02
    front: "How does Python look up a method along the inheritance chain?"
    back: "An access like d.speak() walks the chain Dog → Animal → object and takes the first match. If the name is not found by the end of the chain, it raises AttributeError."
    tags: [lookup]
  - id: inheritance-en-03
    front: "What is overriding and why does it work?"
    back: "Overriding is a same-named method in a subclass. It works because lookup starts at the instance's class: the subclass version is found first, and the parent's turn never comes."
    tags: [override]
  - id: inheritance-en-04
    front: "What does super() do, and how does \"extend\" differ from \"replace\"?"
    back: "super() continues lookup from the next link of the chain, not from the instance's class. A replacing method ignores the parent; an extending method calls super() and builds on its result."
    tags: [super]
  - id: inheritance-en-05
    front: "Why is super().__init__() required after overriding __init__?"
    back: "Once a subclass defines its own __init__, the parent's stops being called automatically and its attributes are never created. Without super().__init__(...), accessing them raises AttributeError - the attribute never existed."
    tags: [init]
  - id: inheritance-en-06
    front: "Why write super().speak() instead of Dog.speak(self)?"
    back: "Hardcoding the parent's name breaks when the hierarchy is restructured and does not follow the MRO under multiple inheritance. The modern form is the empty-parens super(), which finds the next link itself."
    tags: [super]
  - id: inheritance-en-07
    front: "How do isinstance and issubclass differ?"
    back: "isinstance(obj, Cls) checks whether an object is an instance of a class or any of its subclasses. issubclass(Sub, Base) checks whether Base is in Sub's inheritance chain. Both consider the whole is-a chain."
    tags: [isinstance]
  - id: inheritance-en-08
    front: "Why prefer isinstance to comparing type(x) == Cls?"
    back: "Exact type comparison breaks substitutability: a subclass instance stops counting as an instance of the parent. isinstance preserves inheritance's central promise - a subclass can stand in anywhere the parent is expected."
    tags: [isinstance]
  - id: inheritance-en-09
    front: "Why can a parent method call a subclass's overridden method?"
    back: "Lookup always starts at the instance's class, even if self.speak() is written inside the parent. If self is a Dog instance, the Dog version is found. That is why an override must preserve the method's contract."
    tags: [lookup]
  - id: inheritance-en-10
    front: "When should you choose composition over inheritance?"
    back: "When the relationship sounds like \"X has a Y\" rather than \"X is a Y\". \"An order is a list of items\" is wrong: an order has a list, an address, and a status. A sign of a broken hierarchy is a subclass stubbing a parent method with raise NotImplementedError."
    tags: [design]
