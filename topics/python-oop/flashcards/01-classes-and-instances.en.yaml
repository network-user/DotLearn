conceptId: classes-and-instances
cards:
  - id: classes-and-instances-en-01
    front: "What is the difference between a class and an instance?"
    back: "A class is a blueprint - a description of data and behavior; by itself it stores nothing. An instance is a concrete object built from the blueprint, holding its own state. One class can produce any number of independent instances."
    tags: [basics]
  - id: classes-and-instances-en-02
    front: "What is self and why is it not passed at the call site?"
    back: "self is the instance itself, passed explicitly as the first argument. Python expands c.tick() into Counter.tick(c), so you do not supply self by hand - the interpreter does."
    tags: [self]
  - id: classes-and-instances-en-03
    front: "When does __init__ run and what is it for?"
    back: "__init__ is the constructor; it runs once at the moment an instance is created (when you call the class with parentheses) and hands the object its starting attributes via self.x = ...."
    tags: [init]
  - id: classes-and-instances-en-04
    front: "How does an instance attribute differ from a class attribute?"
    back: "An instance attribute is set via self.x = ... and is unique per object. A class attribute is declared in the class body and shared by all; it is visible through any instance because lookup climbs from object to class."
    tags: [attributes]
  - id: classes-and-instances-en-05
    front: "What does the assignment d = c do for objects?"
    back: "It does not copy; it hangs a second label on the same object. d and c look at one thing: a change through d is visible through c, and c is d is True."
    tags: [identity]
  - id: classes-and-instances-en-06
    front: "How do the is and == operators differ?"
    back: "is checks identity - literally the same object in memory. == checks value equality. Without a custom __eq__, == reduces to is, so Counter(5) == Counter(5) is False."
    tags: [identity]
  - id: classes-and-instances-en-07
    front: "Why is a mutable class attribute (items = []) almost always a bug?"
    back: "The list is created once at the class level and shared by all instances. self.items.append(...) mutates that shared list, so a change through one object is visible to all. Declare mutable state in __init__."
    tags: [pitfalls]
  - id: classes-and-instances-en-08
    front: "What happens if you forget self in a method signature?"
    back: "Calling c.tick() still substitutes the instance as the first argument, so a method without self crashes with TypeError - takes 0 positional arguments but 1 was given. The first parameter of an instance method is always self."
    tags: [pitfalls]
  - id: classes-and-instances-en-09
    front: "Why is a mutable default argument def __init__(self, items=[]) dangerous?"
    back: "The list is created once when the function is defined and becomes shared across all calls where the argument is omitted. Write items=None and inside self.items = items or []."
    tags: [pitfalls]
  - id: classes-and-instances-en-10
    front: "Where are an object's attributes physically stored?"
    back: "An instance's __dict__ holds only attributes assigned via self.x = .... Methods and class attributes live in the class __dict__; on access Python climbs from instance to class."
    tags: [internals]
