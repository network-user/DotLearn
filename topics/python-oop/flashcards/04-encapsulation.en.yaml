conceptId: encapsulation
cards:
  - id: encapsulation-en-01
    front: "Why is encapsulation needed?"
    back: "So a class invariant (for example \"balance is non-negative\") is checked in one place rather than at every write site. As long as any part of the program can write to an attribute, the check has to be duplicated everywhere, and one day someone forgets it."
    tags: [basics]
  - id: encapsulation-en-02
    front: "What does a single leading underscore in an attribute name mean?"
    back: "It is an agreement for humans and tools: \"internal, do not rely on me.\" The language does not forbid access - acc._balance reads like an ordinary attribute. IDEs and linters flag the access, and import * skips the name."
    tags: [convention]
  - id: encapsulation-en-03
    front: "What does name mangling do to the name __balance?"
    back: "In a class body, every identifier of the form __name is rewritten to _ClassName__name at compile time. So an Account object stores _Account__balance, and there is simply no __balance attribute."
    tags: [mangling]
  - id: encapsulation-en-04
    front: "Why are two underscores a rename, not protection?"
    back: "acc.__balance fails from outside with AttributeError not because of an access check, but because no attribute with that name exists. The real name _Account__balance is unprotected: you can read it and overwrite it."
    tags: [mangling]
  - id: encapsulation-en-05
    front: "What is name mangling actually for?"
    back: "To guard against accidental name collisions under inheritance: Base and Child get separate _Base__id and _Child__id, so a parent method cannot read a child's field by mistake. It is not data security."
    tags: [mangling]
  - id: encapsulation-en-06
    front: "What does property do, and how does __init__ pass through it?"
    back: "property intercepts reads (getter) and writes (setter); from outside the attribute looks ordinary. If __init__ assigns through the public name (self.balance = ...), it goes through the same setter, so the check fires at creation too."
    tags: [property]
  - id: encapsulation-en-07
    front: "What does a property without a setter give you?"
    back: "A read-only attribute and a convenient way to declare a computed value. An attempt to assign fails with AttributeError ... has no setter. The value is computed on every read and can never drift out of sync with its source."
    tags: [property]
  - id: encapsulation-en-08
    front: "Why do Python programmers not write getters and setters up front?"
    back: "Switching from a plain attribute to a property does not change calling code: acc.balance looks the same for an attribute and a property. You can add the validating gate on the day you need it."
    tags: [design]
  - id: encapsulation-en-09
    front: "Why does a check only in __init__ fail to guard the invariant?"
    back: "The constructor controls only the moment of creation. An assignment acc.balance = -3400 one line later silently writes the invalid value. Validation of mutable state lives in a property setter, and __init__ assigns through it."
    tags: [pitfalls]
  - id: encapsulation-en-10
    front: "Why are dunder names like __init__ not mangled?"
    back: "The mechanism only touches names of the form __name (without two trailing underscores). Names with two underscores on both sides (__init__, __repr__) are not renamed and work as usual."
    tags: [mangling]
