conceptId: abc-interfaces
cards:
  - id: abc-interfaces-01
    front: "Что описывает абстрактный базовый класс (ABC)?"
    back: "Контракт: что подкласс обязан уметь, при пустой реализации в самой базе. Метод с `@abstractmethod` - это дыра в контракте, которую подкласс должен закрыть."
    tags: [basics]
  - id: abc-interfaces-02
    front: "Как объявить абстрактный контракт в Python?"
    back: "Унаследовать класс от `abc.ABC` и пометить обязательные методы декоратором `@abstractmethod`. Например, `class Notifier(ABC)` с `@abstractmethod def send(self, msg)`."
    tags: [syntax]
  - id: abc-interfaces-03
    front: "Что будет при создании экземпляра с незакрытым `@abstractmethod`?"
    back: "Python поднимет `TypeError` прямо при инстанцировании и перечислит нереализованные имена. Ошибка ловится на границе, а не при первом вызове метода в проде."
    tags: [enforcement]
  - id: abc-interfaces-04
    front: "Почему один `@abstractmethod` без наследования от `ABC` ничего не запрещает?"
    back: "Запрет обеспечивает метакласс `ABCMeta`, а его подключает наследование от `ABC` (или `metaclass=ABCMeta`). Декоратор на методе обычного класса не мешает создать объект."
    tags: [metaclass]
  - id: abc-interfaces-05
    front: "Как сделать абстрактными property и classmethod?"
    back: "Сложить декораторы стопкой, поставив `@abstractmethod` ближе всего к функции (снизу): `@property` над `@abstractmethod`, `@classmethod` над `@abstractmethod`. Перепутанный порядок тихо ломает абстрактность."
    tags: [abstract-members]
  - id: abc-interfaces-06
    front: "Что делает `ABC.register(Klass)`?"
    back: "Объявляет `Klass` виртуальным подклассом: `isinstance` и `issubclass` дают True без наследования. Но методы не наследуются и контракт не проверяется, поэтому проверка может соврать."
    tags: [register]
  - id: abc-interfaces-07
    front: "Чем `register` расплачивается за гибкость?"
    back: "Миксинов вы не получаете, и наличие методов не проверяется: зарегистрировать можно даже класс без нужных методов, а `isinstance` всё равно скажет True. Так стандартная библиотека приучает `list` и `dict` к абстрактным интерфейсам."
    tags: [register, pitfalls]
  - id: abc-interfaces-08
    front: "Зачем наследоваться от `collections.abc.Mapping`?"
    back: "Реализуете три метода `__getitem__`, `__iter__`, `__len__`, а `keys`, `values`, `items`, `get`, `__contains__`, `__eq__` приходят готовыми миксинами. Плюс `isinstance(x, Mapping)` становится True."
    tags: [collections-abc]
  - id: abc-interfaces-09
    front: "Чем ABC отличается от `typing.Protocol`?"
    back: "ABC - это номинальная типизация: подтип обязан явно наследовать базу или пройти `register`. Protocol - это структурная: подходит любой тип нужной формы, без наследования, а проверяет форму статический анализатор."
    tags: [protocol]
  - id: abc-interfaces-10
    front: "Когда выбирать ABC, а когда Protocol?"
    back: "ABC когда владеете иерархией и хотите общий код-миксины плюс запрет на создание неполной реализации в рантайме. Protocol когда нужно принять посторонние типы по их форме, не заставляя их наследоваться."
    tags: [choosing]
