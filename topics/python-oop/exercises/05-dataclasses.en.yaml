exercises:
  - id: dataclasses-generated-methods-quiz
    concept: dataclasses
    type: theory-quiz
    difficulty: 1
    prompt: |
      Which methods does `@dataclass` generate by default?
    choices:
      - id: a
        text: "__init__"
      - id: b
        text: "__repr__"
      - id: c
        text: "__eq__"
      - id: d
        text: "__hash__"
    correct: [a, b, c]
    explanation: |
      `@dataclass` synthesizes `__init__`, `__repr__`, and `__eq__`.
      `__hash__` is only added when `frozen=True` (or when you opt in
      via `eq=False`), since hashable + mutable is dangerous.

  - id: dataclasses-point-fill
    concept: dataclasses
    type: fill-in-blanks
    difficulty: 1
    prompt: |
      Fill in the decorator and field annotation to define a 2D point.
    template: |
      from dataclasses import dataclass

      {{decorator}}
      class Point:
          x: {{type}}
          y: {{type}}
    blanks:
      decorator:
        accept: ["@dataclass"]
      type:
        accept: ["float", "int"]

  - id: dataclasses-frozen-set
    concept: dataclasses
    type: predict-output
    difficulty: 3
    prompt: |
      What is printed?
    snippet: |
      from dataclasses import dataclass

      @dataclass(frozen=True)
      class Tag:
          name: str

      bag = {Tag("a"), Tag("a"), Tag("b")}
      print(len(bag))
    expected:
      kind: stdout
      value: |
        2
