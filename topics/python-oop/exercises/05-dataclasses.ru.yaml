exercises:
  - id: dataclasses-generated-methods-quiz
    concept: dataclasses
    type: theory-quiz
    difficulty: 1
    prompt: |
      Какие методы `@dataclass` генерирует по умолчанию?
    choices:
      - id: a
        text: "__init__"
      - id: b
        text: "__repr__"
      - id: c
        text: "__eq__"
      - id: d
        text: "__hash__"
    correct: [a, b, c]
    explanation: |
      `@dataclass` синтезирует `__init__`, `__repr__` и `__eq__`.
      `__hash__` добавляется только при `frozen=True` (или если включить
      его через `eq=False`), потому что хэшируемый и при этом изменяемый
      объект опасен.

  - id: dataclasses-point-fill
    concept: dataclasses
    type: fill-in-blanks
    difficulty: 1
    prompt: |
      Впишите декоратор и аннотацию полей, чтобы определить двумерную точку.
    template: |
      from dataclasses import dataclass

      {{decorator}}
      class Point:
          x: {{type}}
          y: {{type}}
    blanks:
      decorator:
        accept: ["@dataclass"]
      type:
        accept: ["float", "int"]

  - id: dataclasses-frozen-set
    concept: dataclasses
    type: predict-output
    difficulty: 3
    prompt: |
      Что будет выведено?
    snippet: |
      from dataclasses import dataclass

      @dataclass(frozen=True)
      class Tag:
          name: str

      bag = {Tag("a"), Tag("a"), Tag("b")}
      print(len(bag))
    expected:
      kind: stdout
      value: |
        2
