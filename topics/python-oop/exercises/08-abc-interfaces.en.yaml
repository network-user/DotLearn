exercises:
  - id: abc-instantiation-quiz
    concept: abc-interfaces
    type: theory-quiz
    difficulty: 1
    prompt: "What happens if you instantiate a class with an unimplemented `@abstractmethod`?"
    choices:
      - id: a
        text: "Python raises `TypeError` right at instantiation."
      - id: b
        text: "The instance is created; the error comes on the first call to the method."
      - id: c
        text: "The class is not defined at all."
      - id: d
        text: "The method silently becomes an empty stub."
    correct: [a]
    explanation: "As long as even one abstract obligation is open, the class cannot be instantiated: `TypeError` fires at the moment the object is created, not when the method is called."
    variants:
      - prompt: "How does an ABC differ from `typing.Protocol`?"
        choices:
          - id: a
            text: "ABC is nominal typing, Protocol is structural."
          - id: b
            text: "Protocol requires explicit inheritance, an ABC does not."
          - id: c
            text: "They are completely equivalent."
          - id: d
            text: "Protocol cannot be checked statically."
        correct: [a]
        explanation: "An ABC declares kinship by name (inheritance or `register`), while Protocol checks a type's shape with a static analyzer, without inheritance."
      - prompt: "What does `ABC.register(Klass)` do?"
        choices:
          - id: a
            text: "Makes `Klass` a virtual subclass"
          - id: b
            text: "Copies the abstract methods into `Klass`."
          - id: c
            text: "Forces `Klass` to implement all abstract methods."
          - id: d
            text: "Forbids creating instances of `Klass`."
        correct: [a]
        explanation: "`register` merely adds a type to the list of virtual subclasses. Type checks pass, but you get neither mixins nor any control that the methods exist."

  - id: abc-instantiation-predict
    concept: abc-interfaces
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? Remember that an abstract base class cannot be created directly."
    snippet: |
      from abc import ABC, abstractmethod

      class Notifier(ABC):
          @abstractmethod
          def send(self, msg):
              ...

      class Email(Notifier):
          def send(self, msg):
              return "sent:" + msg

      try:
          Notifier()
          made = "made"
      except TypeError:
          made = "abstract"
      print(made, Email().send("hi"))
    expected:
      kind: stdout
      value: "abstract sent:hi"
    hints:
      - "`Notifier` holds an open abstract obligation `send`, so instantiating it fails with `TypeError`."
      - "`Email` implements `send`, so it is created and works normally."
    variants:
      - snippet: |
          from abc import ABC, abstractmethod

          class Notifier(ABC):
              @abstractmethod
              def send(self, msg):
                  ...

          class Broken(Notifier):
              pass

          try:
              Broken()
              print("made")
          except TypeError:
              print("abstract")
        expected:
          kind: stdout
          value: "abstract"
      - snippet: |
          from abc import ABC, abstractmethod

          class Notifier(ABC):
              @abstractmethod
              def send(self, msg):
                  ...

          class Sms:
              def send(self, msg):
                  return msg

          Notifier.register(Sms)
          print(isinstance(Sms(), Notifier), issubclass(Sms, Notifier))
        expected:
          kind: stdout
          value: "True True"

  - id: abc-concrete-repo
    concept: abc-interfaces
    type: python-function
    difficulty: 3
    prompt: |
      Define an abstract base class `Repo` with an abstract method `get(self, key)`
      and a concrete `DictRepo` that takes a dictionary in its constructor and, in
      `get`, returns the value by key. A bare `Repo` must be impossible to create.
    hints:
      - "`Repo` describes a contract - inherit it from `ABC` and mark `get` with `@abstractmethod`, so `Repo` itself cannot be created."
      - "`DictRepo` inherits `Repo` and implements `get`; store the given dictionary on `self` and return the value by key."
    starter: |
      from abc import ABC, abstractmethod

      class Repo(ABC):
          ...

      class DictRepo(Repo):
          ...
    cases:
      - call: |
          DictRepo({"a": 1}).get("a")
        expect: 1
      - call: |
          try:
              Repo()
              outcome = "made"
          except TypeError:
              outcome = "abstract"
          outcome
        expect: "abstract"
      - call: |
          DictRepo({"x": 10, "y": 20}).get("y")
        expect: 20
    solution: |
      from abc import ABC, abstractmethod

      class Repo(ABC):
          @abstractmethod
          def get(self, key):
              ...

      class DictRepo(Repo):
          def __init__(self, data):
              self._data = data

          def get(self, key):
              return self._data[key]

  - id: abc-free-mixins-mapping
    concept: abc-interfaces
    type: python-function
    difficulty: 4
    prompt: |
      Implement `FrozenDict`, inheriting from `collections.abc.Mapping`. Define only
      the three abstract methods: `__getitem__`, `__iter__`, `__len__` (keep the data
      in a plain dictionary). The `get`, `keys`, and `__contains__` methods must come
      ready as mixins from `Mapping`; do not write them yourself.
    hints:
      - "Inherit from `collections.abc.Mapping` and implement the three abstract methods: `__getitem__`, `__iter__`, `__len__`. The rest (`get`, `keys`, `items`, `__contains__`) arrive as mixins."
      - "Keep a plain `dict` on `self`: `__getitem__` reads by key, `__iter__` returns `iter(self._data)`, `__len__` its length."
    starter: |
      from collections.abc import Mapping

      class FrozenDict(Mapping):
          def __init__(self, data):
              ...

          def __getitem__(self, key):
              ...

          def __iter__(self):
              ...

          def __len__(self):
              ...
    cases:
      - call: |
          FrozenDict({"a": 1, "b": 2}).get("z", -1)
        expect: -1
      - call: |
          FrozenDict({"a": 1, "b": 2}).get("a")
        expect: 1
      - call: |
          len(FrozenDict({"a": 1, "b": 2, "c": 3}))
        expect: 3
      - call: |
          sorted(FrozenDict({"a": 1, "b": 2}).keys())
        expect: ["a", "b"]
    solution: |
      from collections.abc import Mapping

      class FrozenDict(Mapping):
          def __init__(self, data):
              self._data = dict(data)

          def __getitem__(self, key):
              return self._data[key]

          def __iter__(self):
              return iter(self._data)

          def __len__(self):
              return len(self._data)
