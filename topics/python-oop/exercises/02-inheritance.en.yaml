exercises:
  - id: super-purpose-001
    concept: inheritance
    type: theory-quiz
    difficulty: 1
    prompt: "Why call `super().__init__(...)` inside a subclass constructor?"
    choices:
      - id: a
        text: "It's required for the program to compile."
      - id: b
        text: "It runs the parent class's setup so inherited attributes get initialized."
      - id: c
        text: "It deletes the parent class's attributes to start fresh."
      - id: d
        text: "It is purely for documentation; it has no runtime effect."
    correct: [b]
    explanation: "When a subclass overrides `__init__`, the parent's `__init__` no longer runs automatically. `super().__init__(...)` forwards arguments to the parent so that attributes set there (like `self.name`) actually get created."
    variants:
      - prompt: "Class `Dog` inherits from `Animal`. What happens when you call `d.speak()` on a `Dog` instance?"
        choices:
          - id: a
            text: "Python copied `Animal`'s methods into `Dog` at class creation and calls the copy."
          - id: b
            text: "Python looks up `speak` first in `Dog`, then in `Animal`, then in `object`, and calls the first match."
          - id: c
            text: "Python always calls the `Animal` version, because the base class takes precedence."
          - id: d
            text: "Python calls both versions in turn: first `Dog`'s, then `Animal`'s."
        correct: [b]
        explanation: "Inheritance copies no methods. Every call is a lookup along the class chain from the instance's class up to `object`; the first definition found is the one that runs."
      - prompt: "Class `Dog` inherits from `Animal`. What does `isinstance(Dog(\"Rex\"), Animal)` return?"
        choices:
          - id: a
            text: "`True` - an instance of a subclass also counts as an instance of the base class."
          - id: b
            text: "`False` - `isinstance` compares only the object's exact class."
          - id: c
            text: "`TypeError` - `isinstance` does not accept base classes."
          - id: d
            text: "`True`, but only if `Dog` overrides no methods."
        correct: [a]
        explanation: "`isinstance` honors the whole inheritance chain: since a `Dog` is an `Animal`, a `Dog` instance is an instance of `Animal` regardless of any overrides."

  - id: subclass-blanks-001
    concept: inheritance
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete `Cat` so it inherits from `Animal` and reuses the parent constructor."
    template: |
      class Animal:
          def __init__(self, name):
              self.name = name

      class Cat({{base}}):
          def __init__(self, name, indoor=True):
              {{super_call}}.__init__(name)
              self.indoor = indoor
    blanks:
      base:
        accept: ["Animal"]
      super_call:
        accept: ["super()"]
        accept_regex: "^super\\(\\)$"
    hints:
      - "The `class` line itself creates the lookup chain: the parent goes in parentheses after the subclass name."
      - "`super()` returns a proxy to the next class in the chain - it is how you call the parent's version of a method, `__init__` included."
    variants:
      - prompt: "Complete `LoudDog` so it extends the parent's `speak()` instead of replacing it."
        template: |
          class Dog:
              def speak(self):
                  return "woof"

          class LoudDog({{base}}):
              def speak(self):
                  return {{parent_proxy}}.speak().upper()
        blanks:
          base:
            accept: ["Dog"]
          parent_proxy:
            accept: ["super()"]
            accept_regex: "^super\\(\\)$"
      - prompt: "Complete `Bird`: the parent constructor must run, and the bird's own attribute must appear."
        template: |
          class Animal:
              def __init__(self, name):
                  self.name = name

          class Bird(Animal):
              def __init__(self, name, can_fly=True):
                  super().{{init_method}}(name)
                  self.{{attr_name}} = can_fly
        blanks:
          init_method:
            accept: ["__init__"]
          attr_name:
            accept: ["can_fly"]

  - id: missing-super-attrs-001
    concept: inheritance
    type: predict-output
    difficulty: 2
    prompt: "What does this program print?"
    snippet: |
      class Animal:
          def __init__(self, name):
              self.name = name

      class Robot(Animal):
          def __init__(self, serial):
              self.serial = serial

      r = Robot("R2")
      print(hasattr(r, "serial"), hasattr(r, "name"))
    expected:
      kind: stdout
      value: "True False"
    hints:
      - "`__init__` is an ordinary method: Python looks it up along the chain from the instance's class upward and runs only the first match. Whose `__init__` runs here?"
      - "List the `self.x = ...` assignments that actually executed before the `print` - an attribute exists only after such an assignment."
    variants:
      - snippet: |
          class Animal:
              def __init__(self, name):
                  self.name = name

          class Robot(Animal):
              def __init__(self, name, serial):
                  super().__init__(name)
                  self.serial = serial

          r = Robot("Bender", "B1")
          print(r.name, r.serial)
        expected:
          kind: stdout
          value: "Bender B1"
      - snippet: |
          class Animal:
              def __init__(self, name):
                  self.name = name

          class Dog(Animal):
              pass

          d = Dog("Rex")
          print(hasattr(d, "name"), d.name)
        expected:
          kind: stdout
          value: "True Rex"

  - id: loud-dog-output-001
    concept: inheritance
    type: predict-output
    difficulty: 3
    prompt: "What does this program print?"
    snippet: |
      class Animal:
          def __init__(self, name):
              self.name = name

          def speak(self):
              return f"{self.name} makes a sound"

      class Dog(Animal):
          def speak(self):
              return f"{self.name} barks"

      class LoudDog(Dog):
          def speak(self):
              return super().speak().upper()

      print(LoudDog("Rex").speak())
    expected:
      kind: stdout
      value: "REX BARKS"
    hints:
      - "`super().speak()` starts the lookup not at `LoudDog` but at the next class in the chain. Who is the first one on the way up to define `speak`?"
      - "First get the string the found `speak` returns, and only then apply `.upper()` to it."
    variants:
      - snippet: |
          class Animal:
              def __init__(self, name):
                  self.name = name

              def speak(self):
                  return f"{self.name} makes a sound"

          class Dog(Animal):
              pass

          class LoudDog(Dog):
              def speak(self):
                  return super().speak().upper()

          print(LoudDog("Rex").speak())
        expected:
          kind: stdout
          value: "REX MAKES A SOUND"

  - id: dated-report-001
    concept: inheritance
    type: python-function
    difficulty: 4
    prompt: "Finish `DatedReport`: the constructor takes `title` and `date`, and `header()` returns the parent header, then ` / `, then the date. Do not override `render()` - it must pick up your `header()` on its own."
    starter: |
      class Report:
          def __init__(self, title):
              self.title = title

          def header(self):
              return self.title

          def render(self):
              return f"[{self.header()}]"

      class DatedReport(Report):
          def __init__(self, title, date):
              ...

          def header(self):
              ...
    cases:
      - call: 'Report("Sales").render()'
        expect: "[Sales]"
      - call: 'DatedReport("Sales", "2026-01").render()'
        expect: "[Sales / 2026-01]"
      - call: 'DatedReport("Q1", "2026-03-31").header()'
        expect: "Q1 / 2026-03-31"
      - call: 'isinstance(DatedReport("A", "B"), Report)'
        expect: true
    hints:
      - "`render()` already does everything needed: it calls `self.header()`, and the lookup of `self.header()` always starts at the instance's class. For a `DatedReport` it will find your version by itself."
      - "In `__init__`, hand `title` to the parent first, then store `date`. In `header()`, take the parent's part of the string via `super()` and append the date."
      - "`super()` is not just for `__init__` - it is also how you call the parent's `header()`."
    solution: |
      class Report:
          def __init__(self, title):
              self.title = title

          def header(self):
              return self.title

          def render(self):
              return f"[{self.header()}]"

      class DatedReport(Report):
          def __init__(self, title, date):
              super().__init__(title)
              self.date = date

          def header(self):
              return f"{super().header()} / {self.date}"
