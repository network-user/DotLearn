exercises:
  - id: composition-smell-quiz
    concept: composition
    type: theory-quiz
    difficulty: 2
    prompt: |
      Which of these is a strong signal that inheritance is the wrong tool?
    choices:
      - id: a
        text: A subclass raises NotImplementedError to disable a parent method.
      - id: b
        text: The hierarchy is more than three levels deep.
      - id: c
        text: Subclasses occasionally override a method to customize behaviour.
      - id: d
        text: The base class is abstract.
    correct: [a, b]
    explanation: |
      Subclasses disabling parent capability and very deep hierarchies are
      classic smells. Overriding to customize behaviour is normal, and
      abstract base classes are a valid pattern.

  - id: composition-swap-engine
    concept: composition
    type: python-function
    difficulty: 2
    prompt: |
      Implement a `Vehicle` class composed with any `propulsion` part that has a
      `start()` method. `Vehicle.drive()` should return the string
      `"vehicle: <whatever start returns>"`.
    hints:
      - "Take `propulsion` as a constructor argument and store it on self."
      - "drive() returns an f-string of the form 'vehicle: ' followed by self.propulsion.start()."
    starter: |
      class Vehicle:
          def __init__(self, propulsion):
              ...

          def drive(self):
              ...
    cases:
      - call: |
          class _Mock:
              def start(self):
                  return "vroom"
          Vehicle(_Mock()).drive()
        expect: "vehicle: vroom"
      - call: |
          class _Mock:
              def start(self):
                  return "whirr"
          Vehicle(_Mock()).drive()
        expect: "vehicle: whirr"
      - call: |
          class _Mock:
              def start(self):
                  return "click"
          Vehicle(_Mock()).drive()
        expect: "vehicle: click"
    solution: |
      class Vehicle:
          def __init__(self, propulsion):
              self.propulsion = propulsion

          def drive(self):
              return f"vehicle: {self.propulsion.start()}"
