exercises:
  - id: composition-has-a-quiz
    concept: composition
    type: theory-quiz
    difficulty: 1
    prompt: |
      Which relationship is most naturally expressed with composition (has-a)?
    choices:
      - id: a
        text: A car has an engine.
      - id: b
        text: A dog is an animal.
      - id: c
        text: A manager is an employee.
      - id: d
        text: A square is a shape.
    correct: [a]
    explanation: |
      "X has a Y" is has-a, i.e. composition. The other three are is-a
      relationships, usually modeled with inheritance.
    variants:
      - prompt: |
          Which relationship is most naturally expressed with inheritance (is-a)?
        choices:
          - id: a
            text: A player has a playback queue.
          - id: b
            text: A cat is an animal.
          - id: c
            text: A house has a door.
          - id: d
            text: An order has a list of items.
        correct: [b]
        explanation: |
          "A cat is an animal" is a genuine is-a. The other options are has-a.
      - prompt: |
          Which of these is better assembled with composition than inheritance?
        choices:
          - id: a
            text: A report that has a swappable
          - id: b
            text: A student that is a person.
          - id: c
            text: A penguin that is a bird.
          - id: d
            text: A circle that is a shape.
        correct: [a]
        explanation: |
          A swappable formatter is a part (has-a) that is easy to replace. The other
          three are is-a.

  - id: composition-smell-quiz
    concept: composition
    type: theory-quiz
    difficulty: 2
    prompt: |
      Which of the following is a strong sign that inheritance was chosen wrongly?
    choices:
      - id: a
        text: A subclass raises NotImplementedError to disable a parent
      - id: b
        text: The hierarchy is deeper than three levels.
      - id: c
        text: Subclasses occasionally override a method to tune behavior.
      - id: d
        text: The base class is abstract.
    correct: [a, b]
    explanation: |
      Subclasses that disable parent capabilities and very deep hierarchies are
      classic smells. Overriding to tune behavior is fine, and abstract base
      classes are an acceptable pattern.
    variants:
      - prompt: |
          When is inheritance a better fit than composition?
        choices:
          - id: a
            text: When the relationship is a genuine is-a and the parent's
          - id: b
            text: When you need exactly one method of another class.
          - id: c
            text: When a subclass has to disable some parent methods.
          - id: d
            text: When the hierarchy grows deeper than three levels.
        correct: [a]
        explanation: |
          Inheritance is short and clear precisely when is-a holds and the whole
          parent interface suits the child. The other cases call for composition.
      - prompt: |
          What is dependency injection in the context of composition?
        choices:
          - id: a
            text: The host receives a ready part from outside instead
          - id: b
            text: A subclass overrides a parent method.
          - id: c
            text: A class inherits from two parents at once.
          - id: d
            text: A method raises NotImplementedError.
        correct: [a]
        explanation: |
          The part is passed into the host from outside, so it is easy to swap and
          to test in isolation. That is dependency injection.

  - id: composition-swap-engine
    concept: composition
    type: python-function
    difficulty: 2
    prompt: |
      Implement a class `Vehicle` composed with any `propulsion` part that has a
      `start()` method. `Vehicle.drive()` must return the string
      `"vehicle: <whatever start returned>"`.
    hints:
      - "The host should not know the part's concrete type - only that it has start()."
      - "Take propulsion in the constructor, store it on self, and return an f-string from drive()."
    starter: |
      class Vehicle:
          def __init__(self, propulsion):
              ...

          def drive(self):
              ...
    cases:
      - call: |
          class _Mock:
              def start(self):
                  return "vroom"
          Vehicle(_Mock()).drive()
        expect: "vehicle: vroom"
      - call: |
          class _Mock:
              def start(self):
                  return "whirr"
          Vehicle(_Mock()).drive()
        expect: "vehicle: whirr"
      - call: |
          class _Mock:
              def start(self):
                  return "click"
          Vehicle(_Mock()).drive()
        expect: "vehicle: click"
    solution: |
      class Vehicle:
          def __init__(self, propulsion):
              self.propulsion = propulsion

          def drive(self):
              return f"vehicle: {self.propulsion.start()}"
    variants:
      - prompt: |
          Implement a class `Vehicle` composed with a `propulsion` part (it has a
          `start()` method). `drive()` returns `"engine: <start>"`.
        starter: |
          class Vehicle:
              def __init__(self, propulsion):
                  ...

              def drive(self):
                  ...
        cases:
          - call: |
              class _Mock:
                  def start(self):
                      return "vroom"
              Vehicle(_Mock()).drive()
            expect: "engine: vroom"
          - call: |
              class _Mock:
                  def start(self):
                      return "whirr"
              Vehicle(_Mock()).drive()
            expect: "engine: whirr"
          - call: |
              class _Mock:
                  def start(self):
                      return "click"
              Vehicle(_Mock()).drive()
            expect: "engine: click"
        solution: |
          class Vehicle:
              def __init__(self, propulsion):
                  self.propulsion = propulsion

              def drive(self):
                  return f"engine: {self.propulsion.start()}"
      - prompt: |
          Implement a class `Vehicle` composed with a `propulsion` part (it has a
          `start()` method). `drive()` returns the result of `start()` in square
          brackets, e.g. `"[vroom]"`.
        starter: |
          class Vehicle:
              def __init__(self, propulsion):
                  ...

              def drive(self):
                  ...
        cases:
          - call: |
              class _Mock:
                  def start(self):
                      return "vroom"
              Vehicle(_Mock()).drive()
            expect: "[vroom]"
          - call: |
              class _Mock:
                  def start(self):
                      return "whirr"
              Vehicle(_Mock()).drive()
            expect: "[whirr]"
          - call: |
              class _Mock:
                  def start(self):
                      return "click"
              Vehicle(_Mock()).drive()
            expect: "[click]"
        solution: |
          class Vehicle:
              def __init__(self, propulsion):
                  self.propulsion = propulsion

              def drive(self):
                  return f"[{self.propulsion.start()}]"

  - id: composition-stack
    concept: composition
    type: python-function
    difficulty: 3
    prompt: |
      Implement a class `Stack` on top of a list via composition (the stack
      *has* a list but *is not* one). Provide `push(x)`, `pop()` and `size()`.
      Keep the list in a hidden attribute - nothing extra should leak out.
    hints:
      - "A stack has-a list: store it in self._items instead of inheriting from list."
      - "push appends, pop removes from the end, size returns the length - delegate to the list's methods."
    starter: |
      class Stack:
          def __init__(self):
              ...

          def push(self, x):
              ...

          def pop(self):
              ...

          def size(self):
              ...
    cases:
      - call: |
          s = Stack()
          s.push(1)
          s.push(2)
          s.pop()
        expect: 2
      - call: |
          s = Stack()
          s.push("a")
          s.size()
        expect: 1
      - call: |
          s = Stack()
          s.push(1)
          s.push(2)
          s.push(3)
          s.pop()
          s.size()
        expect: 2
    solution: |
      class Stack:
          def __init__(self):
              self._items = []

          def push(self, x):
              self._items.append(x)

          def pop(self):
              return self._items.pop()

          def size(self):
              return len(self._items)

  - id: composition-pipeline
    concept: composition
    type: python-function
    difficulty: 4
    prompt: |
      Implement a class `Pipeline` that takes a list of steps (each has an
      `apply(text) -> text` method) and, via `run(text)`, pipes the text through
      all steps in order and returns the result. An empty step list returns the text unchanged.
    hints:
      - "This is a pipeline of parts: each step is a separate object that transforms the string."
      - "Store the step list in the constructor; loop over it in run."
      - "Use a variable, start it from the input text, and reassign it with apply's result on each step."
    starter: |
      class Pipeline:
          def __init__(self, steps):
              ...

          def run(self, text):
              ...
    cases:
      - call: |
          class AddX:
              def apply(self, t):
                  return t + "x"
          class Dup:
              def apply(self, t):
                  return t * 2
          Pipeline([AddX(), Dup()]).run("a")
        expect: "axax"
      - call: |
          class AddX:
              def apply(self, t):
                  return t + "x"
          class Dup:
              def apply(self, t):
                  return t * 2
          Pipeline([Dup(), AddX()]).run("a")
        expect: "aax"
      - call: |
          Pipeline([]).run("hello")
        expect: "hello"
    solution: |
      class Pipeline:
          def __init__(self, steps):
              self.steps = steps

          def run(self, text):
              for step in self.steps:
                  text = step.apply(text)
              return text
