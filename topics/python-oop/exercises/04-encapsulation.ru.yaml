exercises:
  - id: encapsulation-convention-quiz
    concept: encapsulation
    type: theory-quiz
    difficulty: 1
    prompt: |
      Какое утверждение о конвенциях инкапсуляции в Python верно?
    choices:
      - id: a
        text: Одно ведущее подчёркивание делает атрибут недоступным извне класса.
      - id: b
        text: Одно ведущее подчёркивание - конвенция со смыслом «внутреннее, не полагайтесь на меня».
      - id: c
        text: Двойное ведущее подчёркивание включает name mangling, который переписывает имя атрибута.
      - id: d
        text: Python принудительно ограничивает доступ как `private` во время выполнения, если атрибут начинается с двух подчёркиваний.
    correct: [b, c]
    explanation: |
      `_attr` - социальная конвенция; `__attr` переписывается в
      `_ClassName__attr`, чтобы подклассы случайно не создали коллизию.
      Ни то, ни другое не делает атрибут по-настоящему приватным.

  - id: encapsulation-property-validation
    concept: encapsulation
    type: python-function
    difficulty: 2
    prompt: |
      Реализуйте класс `Temperature` со свойством `celsius`, сеттер которого
      отклоняет значения ниже абсолютного нуля (-273.15). Добавьте метод
      `to_fahrenheit()`, возвращающий текущую температуру в Фаренгейтах.
    hints:
      - Используйте @property для геттера celsius и @celsius.setter для записи.
      - В сеттере поднимайте ValueError, когда value < -273.15.
      - Фаренгейты = celsius * 9 / 5 + 32.
    starter: |
      class Temperature:
          def __init__(self, celsius):
              ...

          # @property celsius getter

          # @celsius.setter that rejects values below -273.15

          def to_fahrenheit(self):
              ...
    cases:
      - call: "Temperature(0).celsius"
        expect: 0
      - call: "Temperature(100).to_fahrenheit()"
        expect: 212
      - call: "Temperature(-40).to_fahrenheit()"
        expect: -40
      - call: "Temperature(25).to_fahrenheit()"
        expect: 77
    solution: |
      class Temperature:
          def __init__(self, celsius):
              self._celsius = 0
              self.celsius = celsius

          @property
          def celsius(self):
              return self._celsius

          @celsius.setter
          def celsius(self, value):
              if value < -273.15:
                  raise ValueError("below absolute zero")
              self._celsius = value

          def to_fahrenheit(self):
              return self._celsius * 9 / 5 + 32

  - id: encapsulation-name-mangling-predict
    concept: encapsulation
    type: predict-output
    difficulty: 2
    prompt: |
      Что будет выведено?
    snippet: |
      class Box:
          def __init__(self):
              self.__token = "alpha"

      b = Box()
      print(hasattr(b, "__token"), hasattr(b, "_Box__token"))
    expected:
      kind: stdout
      value: |
        False True
