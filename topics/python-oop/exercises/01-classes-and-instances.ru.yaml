exercises:
  - id: self-meaning-001
    concept: classes-and-instances
    type: theory-quiz
    difficulty: 1
    prompt: "Какова роль `self` в определении метода вроде `def tick(self):`?"
    choices:
      - id: a
        text: "Ключевое слово Python, отключающее инкапсуляцию."
      - id: b
        text: "Экземпляр, на котором вызван метод; передаётся автоматически."
      - id: c
        text: "Объект класса - то же самое, что имя класса."
      - id: d
        text: "Необязательный отладочный параметр, который можно опустить."
    correct: [b]
    explanation: "`self` - неявный первый аргумент, указывающий на экземпляр. Вызов `c.tick()` эквивалентен `Counter.tick(c)` - Python подставляет `c` как `self`."

  - id: counter-output-001
    concept: classes-and-instances
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      class Counter:
          def __init__(self, start=0):
              self.value = start

          def tick(self):
              self.value += 1

      a = Counter(5)
      b = Counter()
      a.tick()
      a.tick()
      b.tick()
      print(a.value, b.value)
    expected:
      kind: stdout
      value: "7 1"
    hints:
      - "Два отдельных экземпляра имеют отдельные атрибуты `value`."
      - "Проследите каждый вызов `tick`: он увеличивает только тот экземпляр, на котором вызван."

  - id: pet-blanks-001
    concept: classes-and-instances
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните класс так, чтобы `Pet('Rex').name == 'Rex'` и `Pet.species == 'dog'`."
    template: |
      class Pet:
          {{class_attr}} = "dog"

          def {{ctor}}(self, name):
              self.{{instance_attr}} = name
    blanks:
      class_attr:
        accept: ["species"]
      ctor:
        accept: ["__init__"]
      instance_attr:
        accept: ["name"]
    hints:
      - "Атрибуты класса пишутся на уровне класса, а не внутри `__init__`."
      - "Метод-конструктор называется `__init__`."

  - id: rectangle-area-001
    concept: classes-and-instances
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `Rectangle` с `__init__(self, width, height)` и методом `area(self)`, который возвращает `width * height`."
    starter: |
      class Rectangle:
          def __init__(self, width, height):
              pass

          def area(self):
              pass
    cases:
      - call: "Rectangle(3, 4).area()"
        expect: 12
      - call: "Rectangle(5, 5).area()"
        expect: 25
      - call: "Rectangle(0, 7).area()"
        expect: 0
    solution: |
      class Rectangle:
          def __init__(self, width, height):
              self.width = width
              self.height = height

          def area(self):
              return self.width * self.height
    hints:
      - "Сохраните размеры на `self` внутри `__init__`."
      - "`area` должен прочитать эти атрибуты и вернуть произведение."
