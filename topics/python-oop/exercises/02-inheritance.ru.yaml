exercises:
  - id: super-purpose-001
    concept: inheritance
    type: theory-quiz
    difficulty: 1
    prompt: "Зачем вызывать `super().__init__(...)` внутри конструктора подкласса?"
    choices:
      - id: a
        text: "Без этого программа не скомпилируется."
      - id: b
        text: "Он выполняет инициализацию родительского класса, чтобы унаследованные атрибуты были"
      - id: c
        text: "Он удаляет атрибуты родительского класса, чтобы начать с чистого листа."
      - id: d
        text: "Это чисто документационный приём; во время выполнения он ничего не делает."
    correct: [b]
    explanation: "Когда подкласс переопределяет `__init__`, родительский `__init__` больше не вызывается автоматически. `super().__init__(...)` передаёт аргументы родителю, чтобы атрибуты, задаваемые там (например `self.name`), действительно были созданы."
    variants:
      - prompt: "Класс `Dog` наследуется от `Animal`. Что происходит при вызове `d.speak()` на экземпляре `Dog`?"
        choices:
          - id: a
            text: "Python скопировал методы `Animal` в `Dog` при создании класса и вызывает копию."
          - id: b
            text: "Python ищет `speak` сначала в `Dog`, затем в `Animal`, затем в `object` и вызывает первое совпадение."
          - id: c
            text: "Python всегда вызывает версию из `Animal`, потому что базовый класс главнее."
          - id: d
            text: "Python вызывает обе версии подряд: сначала из `Dog`, потом из `Animal`."
        correct: [b]
        explanation: "Методы при наследовании не копируются. Каждый вызов - поиск по цепочке классов от класса экземпляра вверх до `object`; выполняется первое найденное определение."
      - prompt: "Класс `Dog` наследуется от `Animal`. Что вернёт `isinstance(Dog(\"Rex\"), Animal)`?"
        choices:
          - id: a
            text: "`True` - экземпляр подкласса считается и экземпляром базового класса."
          - id: b
            text: "`False` - `isinstance` сравнивает только точный класс объекта."
          - id: c
            text: "`TypeError` - `isinstance` не принимает базовые классы."
          - id: d
            text: "`True`, но только если `Dog` не переопределяет ни одного метода."
        correct: [a]
        explanation: "`isinstance` учитывает всю цепочку наследования: раз `Dog` - это `Animal`, экземпляр `Dog` является экземпляром `Animal` независимо от переопределений."

  - id: subclass-blanks-001
    concept: inheritance
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните `Cat` так, чтобы он наследовался от `Animal` и переиспользовал родительский конструктор."
    template: |
      class Animal:
          def __init__(self, name):
              self.name = name

      class Cat({{base}}):
          def __init__(self, name, indoor=True):
              {{super_call}}.__init__(name)
              self.indoor = indoor
    blanks:
      base:
        accept: ["Animal"]
      super_call:
        accept: ["super()"]
        accept_regex: "^super\\(\\)$"
    hints:
      - "Цепочку поиска создаёт сама строка `class`: родитель указывается в скобках после имени подкласса."
      - "`super()` возвращает прокси к следующему классу цепочки - через него вызывают родительскую версию метода, включая `__init__`."
    variants:
      - prompt: "Дополните `LoudDog` так, чтобы он расширял родительский `speak()`, а не заменял его."
        template: |
          class Dog:
              def speak(self):
                  return "woof"

          class LoudDog({{base}}):
              def speak(self):
                  return {{parent_proxy}}.speak().upper()
        blanks:
          base:
            accept: ["Dog"]
          parent_proxy:
            accept: ["super()"]
            accept_regex: "^super\\(\\)$"
      - prompt: "Дополните `Bird`: родительский конструктор должен отработать, а собственный атрибут - появиться."
        template: |
          class Animal:
              def __init__(self, name):
                  self.name = name

          class Bird(Animal):
              def __init__(self, name, can_fly=True):
                  super().{{init_method}}(name)
                  self.{{attr_name}} = can_fly
        blanks:
          init_method:
            accept: ["__init__"]
          attr_name:
            accept: ["can_fly"]

  - id: missing-super-attrs-001
    concept: inheritance
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      class Animal:
          def __init__(self, name):
              self.name = name

      class Robot(Animal):
          def __init__(self, serial):
              self.serial = serial

      r = Robot("R2")
      print(hasattr(r, "serial"), hasattr(r, "name"))
    expected:
      kind: stdout
      value: "True False"
    hints:
      - "`__init__` - обычный метод: Python ищет его по цепочке от класса экземпляра вверх и выполняет только первое совпадение. Чей `__init__` выполнится здесь?"
      - "Выпишите присваивания `self.x = ...`, которые реально выполнились к моменту `print` - атрибут существует только после такого присваивания."
    variants:
      - snippet: |
          class Animal:
              def __init__(self, name):
                  self.name = name

          class Robot(Animal):
              def __init__(self, name, serial):
                  super().__init__(name)
                  self.serial = serial

          r = Robot("Bender", "B1")
          print(r.name, r.serial)
        expected:
          kind: stdout
          value: "Bender B1"
      - snippet: |
          class Animal:
              def __init__(self, name):
                  self.name = name

          class Dog(Animal):
              pass

          d = Dog("Rex")
          print(hasattr(d, "name"), d.name)
        expected:
          kind: stdout
          value: "True Rex"

  - id: loud-dog-output-001
    concept: inheritance
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      class Animal:
          def __init__(self, name):
              self.name = name

          def speak(self):
              return f"{self.name} makes a sound"

      class Dog(Animal):
          def speak(self):
              return f"{self.name} barks"

      class LoudDog(Dog):
          def speak(self):
              return super().speak().upper()

      print(LoudDog("Rex").speak())
    expected:
      kind: stdout
      value: "REX BARKS"
    hints:
      - "`super().speak()` начинает поиск не с `LoudDog`, а со следующего класса цепочки. Кто первым на пути вверх определяет `speak`?"
      - "Сначала получите строку, которую вернёт найденный `speak`, и только потом примените к ней `.upper()`."
    variants:
      - snippet: |
          class Animal:
              def __init__(self, name):
                  self.name = name

              def speak(self):
                  return f"{self.name} makes a sound"

          class Dog(Animal):
              pass

          class LoudDog(Dog):
              def speak(self):
                  return super().speak().upper()

          print(LoudDog("Rex").speak())
        expected:
          kind: stdout
          value: "REX MAKES A SOUND"

  - id: dated-report-001
    concept: inheritance
    type: python-function
    difficulty: 4
    prompt: "Допишите `DatedReport`: конструктор принимает `title` и `date`, а `header()` возвращает родительский заголовок, затем ` / ` и дату. Метод `render()` не переопределяйте - он должен подхватить ваш `header()` сам."
    starter: |
      class Report:
          def __init__(self, title):
              self.title = title

          def header(self):
              return self.title

          def render(self):
              return f"[{self.header()}]"

      class DatedReport(Report):
          def __init__(self, title, date):
              ...

          def header(self):
              ...
    cases:
      - call: 'Report("Sales").render()'
        expect: "[Sales]"
      - call: 'DatedReport("Sales", "2026-01").render()'
        expect: "[Sales / 2026-01]"
      - call: 'DatedReport("Q1", "2026-03-31").header()'
        expect: "Q1 / 2026-03-31"
      - call: 'isinstance(DatedReport("A", "B"), Report)'
        expect: true
    hints:
      - "`render()` уже умеет всё нужное: внутри него стоит `self.header()`, а поиск `self.header()` всегда начинается с класса экземпляра. Для `DatedReport` он сам найдёт вашу версию."
      - "В `__init__` сначала отдайте `title` родителю, потом сохраните `date`. В `header()` возьмите родительскую часть строки через `super()` и допишите дату."
      - "`super()` работает не только в `__init__` - им же вызывается родительский `header()`."
    solution: |
      class Report:
          def __init__(self, title):
              self.title = title

          def header(self):
              return self.title

          def render(self):
              return f"[{self.header()}]"

      class DatedReport(Report):
          def __init__(self, title, date):
              super().__init__(title)
              self.date = date

          def header(self):
              return f"{super().header()} / {self.date}"
