exercises:
  - id: self-meaning-001
    concept: classes-and-instances
    type: theory-quiz
    difficulty: 1
    prompt: "What is the role of `self` in a method definition like `def tick(self):`?"
    choices:
      - id: a
        text: "Python keyword that disables encapsulation."
      - id: b
        text: "The instance the method is being called on, passed automatically."
      - id: c
        text: "The class object — same as the class name."
      - id: d
        text: "An optional debug parameter you can omit."
    correct: [b]
    explanation: "`self` is the implicit first argument that refers to the instance. Calling `c.tick()` is equivalent to `Counter.tick(c)` — Python supplies `c` as `self`."

  - id: counter-output-001
    concept: classes-and-instances
    type: predict-output
    difficulty: 2
    prompt: "What does this program print?"
    snippet: |
      class Counter:
          def __init__(self, start=0):
              self.value = start

          def tick(self):
              self.value += 1

      a = Counter(5)
      b = Counter()
      a.tick()
      a.tick()
      b.tick()
      print(a.value, b.value)
    expected:
      kind: stdout
      value: "7 1"
    hints:
      - "Two separate instances have separate `value` attributes."
      - "Trace each `tick` call: it increments only the instance it's called on."

  - id: pet-blanks-001
    concept: classes-and-instances
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the class so that `Pet('Rex').name == 'Rex'` and `Pet.species == 'dog'`."
    template: |
      class Pet:
          {{class_attr}} = "dog"

          def {{ctor}}(self, name):
              self.{{instance_attr}} = name
    blanks:
      class_attr:
        accept: ["species"]
      ctor:
        accept: ["__init__"]
      instance_attr:
        accept: ["name"]
    hints:
      - "Class attributes are written at class scope, not inside `__init__`."
      - "The constructor method is named `__init__`."
