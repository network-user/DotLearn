exercises:
  - id: repr-vs-str-001
    concept: dunder-methods
    type: theory-quiz
    difficulty: 2
    prompt: "Which statements are correct? Choose all that apply."
    choices:
      - id: a
        text: "`print(x)` calls `x.__str__()` if defined, otherwise falls back to `__repr__`."
      - id: b
        text: "`__repr__` is intended to be human-friendly; `__str__` is for developers."
      - id: c
        text: "Defining only `__str__` leaves the REPL showing `<... object at 0x...>`."
      - id: d
        text: "`__eq__` automatically gives you a working `__hash__`."
    correct: [a, c]
    explanation: "`__str__` is for end-users, `__repr__` is for debugging: option b reverses them. Overriding `__eq__` silently sets `__hash__ = None` unless you also define `__hash__` (option d is wrong)."

  - id: point-eq-output-001
    concept: dunder-methods
    type: predict-output
    difficulty: 3
    prompt: "What does this program print?"
    snippet: |
      class Point:
          def __init__(self, x, y):
              self.x, self.y = x, y

          def __eq__(self, other):
              if not isinstance(other, Point):
                  return NotImplemented
              return self.x == other.x and self.y == other.y

      a = Point(1, 2)
      b = Point(1, 2)
      c = Point(1, 3)
      print(a == b, a == c, a == "x")
    expected:
      kind: stdout
      value: "True False False"
    hints:
      - "`__eq__` compares coordinates for two `Point` instances."
      - "When the other side isn't a `Point`, `__eq__` returns `NotImplemented`; Python then asks the string, which says False."

  - id: bag-blanks-001
    concept: dunder-methods
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete `Bag` so that `len(Bag([1, 2, 3]))` returns `3` and iterating yields each item."
    template: |
      class Bag:
          def __init__(self, items):
              self._items = list(items)

          def {{len_method}}(self):
              return len(self._items)

          def {{iter_method}}(self):
              return iter(self._items)
    blanks:
      len_method:
        accept: ["__len__"]
      iter_method:
        accept: ["__iter__"]
    hints:
      - "`len(x)` looks up `__len__` on the type."
      - "`for item in x:` looks up `__iter__` on the type."
