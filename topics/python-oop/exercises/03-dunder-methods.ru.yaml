exercises:
  - id: repr-vs-str-001
    concept: dunder-methods
    type: theory-quiz
    difficulty: 2
    prompt: "Какие утверждения верны? Выберите все подходящие."
    choices:
      - id: a
        text: "`print(x)` вызывает `x.__str__()`, если он определён, иначе использует `__repr__`."
      - id: b
        text: "`__repr__` предназначен для людей; `__str__` - для разработчиков."
      - id: c
        text: "Если определить только `__str__`, REPL продолжит показывать `<... object at 0x...>`."
      - id: d
        text: "`__eq__` автоматически даёт работающий `__hash__`."
    correct: [a, c]
    explanation: "`__str__` - для конечных пользователей, `__repr__` - для отладки; вариант b меняет их местами. Переопределение `__eq__` молча выставляет `__hash__ = None`, если не определить `__hash__` явно (вариант d неверен)."

  - id: point-eq-output-001
    concept: dunder-methods
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      class Point:
          def __init__(self, x, y):
              self.x, self.y = x, y

          def __eq__(self, other):
              if not isinstance(other, Point):
                  return NotImplemented
              return self.x == other.x and self.y == other.y

      a = Point(1, 2)
      b = Point(1, 2)
      c = Point(1, 3)
      print(a == b, a == c, a == "x")
    expected:
      kind: stdout
      value: "True False False"
    hints:
      - "`__eq__` сравнивает координаты двух экземпляров `Point`."
      - "Когда другая сторона - не `Point`, `__eq__` возвращает `NotImplemented`; тогда Python спрашивает строку, и она отвечает False."

  - id: bag-blanks-001
    concept: dunder-methods
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните `Bag` так, чтобы `len(Bag([1, 2, 3]))` возвращал `3`, а итерация выдавала каждый элемент."
    template: |
      class Bag:
          def __init__(self, items):
              self._items = list(items)

          def {{len_method}}(self):
              return len(self._items)

          def {{iter_method}}(self):
              return iter(self._items)
    blanks:
      len_method:
        accept: ["__len__"]
      iter_method:
        accept: ["__iter__"]
    hints:
      - "`len(x)` ищет `__len__` на типе."
      - "`for item in x:` ищет `__iter__` на типе."
