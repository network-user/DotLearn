exercises:
  - id: composition-smell-quiz
    concept: composition
    type: theory-quiz
    difficulty: 2
    prompt: |
      Что из перечисленного - сильный сигнал, что наследование выбрано неверно?
    choices:
      - id: a
        text: Подкласс поднимает NotImplementedError, чтобы отключить метод родителя.
      - id: b
        text: Иерархия глубже трёх уровней.
      - id: c
        text: Подклассы время от времени переопределяют метод, чтобы настроить поведение.
      - id: d
        text: Базовый класс абстрактный.
    correct: [a, b]
    explanation: |
      Подклассы, отключающие возможности родителя, и очень глубокие иерархии -
      классические запахи. Переопределение ради настройки поведения нормально,
      а абстрактные базовые классы - допустимый паттерн.

  - id: composition-swap-engine
    concept: composition
    type: python-function
    difficulty: 2
    prompt: |
      Реализуйте класс `Vehicle`, скомпонованный с любой частью `propulsion`,
      у которой есть метод `start()`. `Vehicle.drive()` должен возвращать строку
      `"vehicle: <то, что вернул start>"`.
    hints:
      - "Принимайте `propulsion` как аргумент конструктора и сохраняйте его на self."
      - "drive() возвращает f-строку вида 'vehicle: ' плюс self.propulsion.start()."
    starter: |
      class Vehicle:
          def __init__(self, propulsion):
              ...

          def drive(self):
              ...
    cases:
      - call: |
          class _Mock:
              def start(self):
                  return "vroom"
          Vehicle(_Mock()).drive()
        expect: "vehicle: vroom"
      - call: |
          class _Mock:
              def start(self):
                  return "whirr"
          Vehicle(_Mock()).drive()
        expect: "vehicle: whirr"
      - call: |
          class _Mock:
              def start(self):
                  return "click"
          Vehicle(_Mock()).drive()
        expect: "vehicle: click"
    solution: |
      class Vehicle:
          def __init__(self, propulsion):
              self.propulsion = propulsion

          def drive(self):
              return f"vehicle: {self.propulsion.start()}"
