exercises:
  - id: composition-has-a-quiz
    concept: composition
    type: theory-quiz
    difficulty: 1
    prompt: |
      Какое из отношений естественнее всего выразить композицией (has-a)?
    choices:
      - id: a
        text: У автомобиля есть двигатель.
      - id: b
        text: Собака - это животное.
      - id: c
        text: Менеджер - это сотрудник.
      - id: d
        text: Квадрат - это фигура.
    correct: [a]
    explanation: |
      «У X есть Y» - это has-a, то есть композиция. Остальные три - отношения
      «является» (is-a), которые обычно моделируют наследованием.
    variants:
      - prompt: |
          Какое из отношений естественнее всего выразить наследованием (is-a)?
        choices:
          - id: a
            text: У плеера есть очередь воспроизведения.
          - id: b
            text: Кошка - это животное.
          - id: c
            text: У дома есть дверь.
          - id: d
            text: У заказа есть список товаров.
        correct: [b]
        explanation: |
          «Кошка - это животное» - честное is-a. Остальные варианты - has-a.
      - prompt: |
          Что из перечисленного лучше собрать композицией, а не наследованием?
        choices:
          - id: a
            text: Отчёт, у которого есть сменный форматтер
          - id: b
            text: Студент, который является человеком.
          - id: c
            text: Пингвин, который является птицей.
          - id: d
            text: Круг, который является фигурой.
        correct: [a]
        explanation: |
          Сменный форматтер - это деталь (has-a): её удобно подменять. Остальные
          три - is-a.

  - id: composition-smell-quiz
    concept: composition
    type: theory-quiz
    difficulty: 2
    prompt: |
      Что из перечисленного - сильный сигнал, что наследование выбрано неверно?
    choices:
      - id: a
        text: Подкласс поднимает NotImplementedError, чтобы отключить метод родителя.
      - id: b
        text: Иерархия глубже трёх уровней.
      - id: c
        text: Подклассы время от времени переопределяют метод, чтобы настроить поведение.
      - id: d
        text: Базовый класс абстрактный.
    correct: [a, b]
    explanation: |
      Подклассы, отключающие возможности родителя, и очень глубокие иерархии -
      классические запахи. Переопределение ради настройки поведения нормально,
      а абстрактные базовые классы - допустимый паттерн.
    variants:
      - prompt: |
          Когда наследование уместнее композиции?
        choices:
          - id: a
            text: Когда отношение - честное is-a и интерфейс родителя подходит потомку
          - id: b
            text: Когда нужен ровно один метод чужого класса.
          - id: c
            text: Когда подкласс вынужден отключать часть методов родителя.
          - id: d
            text: Когда иерархия становится глубже трёх уровней.
        correct: [a]
        explanation: |
          Наследование коротко и ясно именно тогда, когда is-a выполняется и весь
          интерфейс родителя подходит потомку. Остальные случаи - повод для композиции.
      - prompt: |
          Что такое внедрение зависимости в контексте композиции?
        choices:
          - id: a
            text: Хост получает готовую деталь снаружи, а не создаёт её
          - id: b
            text: Подкласс переопределяет метод родителя.
          - id: c
            text: Класс наследуется сразу от двух родителей.
          - id: d
            text: Метод поднимает NotImplementedError.
        correct: [a]
        explanation: |
          Деталь передаётся хосту извне, поэтому её легко подменить и протестировать
          отдельно. Это и есть внедрение зависимости.

  - id: composition-swap-engine
    concept: composition
    type: python-function
    difficulty: 2
    prompt: |
      Реализуйте класс `Vehicle`, скомпонованный с любой частью `propulsion`,
      у которой есть метод `start()`. `Vehicle.drive()` должен возвращать строку
      `"vehicle: <то, что вернул start>"`.
    hints:
      - "Хост не должен знать конкретный тип детали - только то, что у неё есть start()."
      - "Принимайте propulsion в конструкторе, сохраняйте на self, а в drive() возвращайте f-строку."
    starter: |
      class Vehicle:
          def __init__(self, propulsion):
              ...

          def drive(self):
              ...
    cases:
      - call: |
          class _Mock:
              def start(self):
                  return "vroom"
          Vehicle(_Mock()).drive()
        expect: "vehicle: vroom"
      - call: |
          class _Mock:
              def start(self):
                  return "whirr"
          Vehicle(_Mock()).drive()
        expect: "vehicle: whirr"
      - call: |
          class _Mock:
              def start(self):
                  return "click"
          Vehicle(_Mock()).drive()
        expect: "vehicle: click"
    solution: |
      class Vehicle:
          def __init__(self, propulsion):
              self.propulsion = propulsion

          def drive(self):
              return f"vehicle: {self.propulsion.start()}"
    variants:
      - prompt: |
          Реализуйте класс `Vehicle`, скомпонованный с частью `propulsion`
          (у неё есть метод `start()`). `drive()` возвращает `"engine: <start>"`.
        starter: |
          class Vehicle:
              def __init__(self, propulsion):
                  ...

              def drive(self):
                  ...
        cases:
          - call: |
              class _Mock:
                  def start(self):
                      return "vroom"
              Vehicle(_Mock()).drive()
            expect: "engine: vroom"
          - call: |
              class _Mock:
                  def start(self):
                      return "whirr"
              Vehicle(_Mock()).drive()
            expect: "engine: whirr"
          - call: |
              class _Mock:
                  def start(self):
                      return "click"
              Vehicle(_Mock()).drive()
            expect: "engine: click"
        solution: |
          class Vehicle:
              def __init__(self, propulsion):
                  self.propulsion = propulsion

              def drive(self):
                  return f"engine: {self.propulsion.start()}"
      - prompt: |
          Реализуйте класс `Vehicle`, скомпонованный с частью `propulsion`
          (у неё есть метод `start()`). `drive()` возвращает результат `start()`
          в квадратных скобках, например `"[vroom]"`.
        starter: |
          class Vehicle:
              def __init__(self, propulsion):
                  ...

              def drive(self):
                  ...
        cases:
          - call: |
              class _Mock:
                  def start(self):
                      return "vroom"
              Vehicle(_Mock()).drive()
            expect: "[vroom]"
          - call: |
              class _Mock:
                  def start(self):
                      return "whirr"
              Vehicle(_Mock()).drive()
            expect: "[whirr]"
          - call: |
              class _Mock:
                  def start(self):
                      return "click"
              Vehicle(_Mock()).drive()
            expect: "[click]"
        solution: |
          class Vehicle:
              def __init__(self, propulsion):
                  self.propulsion = propulsion

              def drive(self):
                  return f"[{self.propulsion.start()}]"

  - id: composition-stack
    concept: composition
    type: python-function
    difficulty: 3
    prompt: |
      Реализуйте класс `Stack` на основе списка через композицию (стек *содержит*
      список, но не *является* им). Нужны методы `push(x)`, `pop()` и `size()`.
      Список держите в скрытом атрибуте - наружу не должно торчать ничего лишнего.
    hints:
      - "Стек has-a список: храните его в self._items, а не наследуйтесь от list."
      - "push добавляет в конец, pop снимает с конца, size возвращает длину - делегируйте методам списка."
    starter: |
      class Stack:
          def __init__(self):
              ...

          def push(self, x):
              ...

          def pop(self):
              ...

          def size(self):
              ...
    cases:
      - call: |
          s = Stack()
          s.push(1)
          s.push(2)
          s.pop()
        expect: 2
      - call: |
          s = Stack()
          s.push("a")
          s.size()
        expect: 1
      - call: |
          s = Stack()
          s.push(1)
          s.push(2)
          s.push(3)
          s.pop()
          s.size()
        expect: 2
    solution: |
      class Stack:
          def __init__(self):
              self._items = []

          def push(self, x):
              self._items.append(x)

          def pop(self):
              return self._items.pop()

          def size(self):
              return len(self._items)

  - id: composition-pipeline
    concept: composition
    type: python-function
    difficulty: 4
    prompt: |
      Реализуйте класс `Pipeline`, который принимает список шагов (у каждого есть
      метод `apply(text) -> text`) и методом `run(text)` пропускает текст через все
      шаги по порядку, возвращая итог. Пустой список шагов возвращает текст без изменений.
    hints:
      - "Это конвейер деталей: каждый шаг - отдельный объект, который преобразует строку."
      - "Сохраните список шагов в конструкторе; в run пройдитесь по нему циклом."
      - "Заведите переменную, начните её со входного текста и на каждом шаге переназначайте результатом apply."
    starter: |
      class Pipeline:
          def __init__(self, steps):
              ...

          def run(self, text):
              ...
    cases:
      - call: |
          class AddX:
              def apply(self, t):
                  return t + "x"
          class Dup:
              def apply(self, t):
                  return t * 2
          Pipeline([AddX(), Dup()]).run("a")
        expect: "axax"
      - call: |
          class AddX:
              def apply(self, t):
                  return t + "x"
          class Dup:
              def apply(self, t):
                  return t * 2
          Pipeline([Dup(), AddX()]).run("a")
        expect: "aax"
      - call: |
          Pipeline([]).run("hello")
        expect: "hello"
    solution: |
      class Pipeline:
          def __init__(self, steps):
              self.steps = steps

          def run(self, text):
              for step in self.steps:
                  text = step.apply(text)
              return text
