exercises:
  - id: encapsulation-convention-quiz
    concept: encapsulation
    type: theory-quiz
    difficulty: 1
    prompt: |
      Which statement about Python encapsulation conventions is true?
    choices:
      - id: a
        text: A single leading underscore makes the attribute unreachable from outside the class.
      - id: b
        text: A single leading underscore is a convention meaning "internal, don't rely on me."
      - id: c
        text: Double leading underscore triggers name mangling that rewrites the attribute name.
      - id: d
        text: Python enforces `private` access at runtime when the attribute starts with two underscores.
    correct: [b, c]
    explanation: |
      `_attr` is a social convention; `__attr` is rewritten to
      `_ClassName__attr` so subclasses don't accidentally collide.
      Neither makes the attribute truly private.

  - id: encapsulation-property-validation
    concept: encapsulation
    type: python-function
    difficulty: 2
    prompt: |
      Implement a `Temperature` class with a `celsius` property whose setter
      rejects values below absolute zero (-273.15). Expose `to_fahrenheit()`
      that returns the current temperature in Fahrenheit.
    hints:
      - Use @property for the celsius getter and @celsius.setter for write access.
      - In the setter raise ValueError when value < -273.15.
      - Fahrenheit = celsius * 9 / 5 + 32.
    starter: |
      class Temperature:
          def __init__(self, celsius):
              ...

          # @property celsius getter

          # @celsius.setter that rejects values below -273.15

          def to_fahrenheit(self):
              ...
    cases:
      - call: "Temperature(0).celsius"
        expect: 0
      - call: "Temperature(100).to_fahrenheit()"
        expect: 212
      - call: "Temperature(-40).to_fahrenheit()"
        expect: -40
      - call: "Temperature(25).to_fahrenheit()"
        expect: 77
    solution: |
      class Temperature:
          def __init__(self, celsius):
              self._celsius = 0
              self.celsius = celsius

          @property
          def celsius(self):
              return self._celsius

          @celsius.setter
          def celsius(self, value):
              if value < -273.15:
                  raise ValueError("below absolute zero")
              self._celsius = value

          def to_fahrenheit(self):
              return self._celsius * 9 / 5 + 32

  - id: encapsulation-name-mangling-predict
    concept: encapsulation
    type: predict-output
    difficulty: 2
    prompt: |
      What is printed?
    snippet: |
      class Box:
          def __init__(self):
              self.__token = "alpha"

      b = Box()
      print(hasattr(b, "__token"), hasattr(b, "_Box__token"))
    expected:
      kind: stdout
      value: |
        False True
