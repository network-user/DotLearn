exercises:
  - id: abc-instantiation-quiz
    concept: abc-interfaces
    type: theory-quiz
    difficulty: 1
    prompt: "Что произойдёт, если создать экземпляр класса с нереализованным `@abstractmethod`?"
    choices:
      - id: a
        text: "Python поднимет `TypeError` прямо при инстанцировании."
      - id: b
        text: "Экземпляр создастся, ошибка будет при первом вызове метода."
      - id: c
        text: "Класс вообще не определится."
      - id: d
        text: "Метод молча станет пустой заглушкой."
    correct: [a]
    explanation: "Пока хоть одна абстрактная обязанность не закрыта, класс нельзя инстанцировать: `TypeError` выскакивает в момент создания объекта, а не при вызове метода."
    variants:
      - prompt: "Чем ABC отличается от `typing.Protocol`?"
        choices:
          - id: a
            text: "ABC это номинальная типизация, Protocol это"
          - id: b
            text: "Protocol требует явного наследования, а ABC нет."
          - id: c
            text: "Они полностью эквивалентны."
          - id: d
            text: "Protocol нельзя проверить статически."
        correct: [a]
        explanation: "ABC задаёт родство по имени (наследование или `register`), Protocol проверяет форму типа статическим анализатором, без наследования."
      - prompt: "Что делает `ABC.register(Klass)`?"
        choices:
          - id: a
            text: "Делает `Klass` виртуальным подклассом"
          - id: b
            text: "Копирует абстрактные методы в `Klass`."
          - id: c
            text: "Заставляет `Klass` реализовать все абстрактные методы."
          - id: d
            text: "Запрещает создавать экземпляры `Klass`."
        correct: [a]
        explanation: "`register` лишь заносит тип в список виртуальных подклассов. Проверки типа проходят, но ни миксинов, ни контроля наличия методов вы не получаете."

  - id: abc-instantiation-predict
    concept: abc-interfaces
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Учтите, что абстрактный базовый класс нельзя создать напрямую."
    snippet: |
      from abc import ABC, abstractmethod

      class Notifier(ABC):
          @abstractmethod
          def send(self, msg):
              ...

      class Email(Notifier):
          def send(self, msg):
              return "sent:" + msg

      try:
          Notifier()
          made = "made"
      except TypeError:
          made = "abstract"
      print(made, Email().send("hi"))
    expected:
      kind: stdout
      value: "abstract sent:hi"
    hints:
      - "`Notifier` держит незакрытую абстрактную обязанность `send`, поэтому его инстанцирование падает с `TypeError`."
      - "`Email` реализует `send`, значит создаётся и работает нормально."
    variants:
      - snippet: |
          from abc import ABC, abstractmethod

          class Notifier(ABC):
              @abstractmethod
              def send(self, msg):
                  ...

          class Broken(Notifier):
              pass

          try:
              Broken()
              print("made")
          except TypeError:
              print("abstract")
        expected:
          kind: stdout
          value: "abstract"
      - snippet: |
          from abc import ABC, abstractmethod

          class Notifier(ABC):
              @abstractmethod
              def send(self, msg):
                  ...

          class Sms:
              def send(self, msg):
                  return msg

          Notifier.register(Sms)
          print(isinstance(Sms(), Notifier), issubclass(Sms, Notifier))
        expected:
          kind: stdout
          value: "True True"

  - id: abc-concrete-repo
    concept: abc-interfaces
    type: python-function
    difficulty: 3
    prompt: |
      Опишите абстрактный базовый класс `Repo` с абстрактным методом `get(self, key)`
      и конкретный `DictRepo`, который принимает словарь в конструкторе и в `get`
      возвращает значение по ключу. Голый `Repo` создать должно быть нельзя.
    hints:
      - "`Repo` описывает контракт - унаследуйте его от `ABC` и пометьте `get` как `@abstractmethod`, тогда сам `Repo` создать не получится."
      - "`DictRepo` наследует `Repo` и реализует `get`; сохраните переданный словарь на `self` и возвращайте значение по ключу."
    starter: |
      from abc import ABC, abstractmethod

      class Repo(ABC):
          ...

      class DictRepo(Repo):
          ...
    cases:
      - call: |
          DictRepo({"a": 1}).get("a")
        expect: 1
      - call: |
          try:
              Repo()
              outcome = "made"
          except TypeError:
              outcome = "abstract"
          outcome
        expect: "abstract"
      - call: |
          DictRepo({"x": 10, "y": 20}).get("y")
        expect: 20
    solution: |
      from abc import ABC, abstractmethod

      class Repo(ABC):
          @abstractmethod
          def get(self, key):
              ...

      class DictRepo(Repo):
          def __init__(self, data):
              self._data = data

          def get(self, key):
              return self._data[key]

  - id: abc-free-mixins-mapping
    concept: abc-interfaces
    type: python-function
    difficulty: 4
    prompt: |
      Реализуйте `FrozenDict`, унаследованный от `collections.abc.Mapping`. Задайте
      только три абстрактных метода: `__getitem__`, `__iter__`, `__len__` (данные
      храните в обычном словаре). Методы `get`, `keys`, `__contains__` должны
      прийти готовыми миксинами от `Mapping`, дописывать их нельзя.
    hints:
      - "Наследуйтесь от `collections.abc.Mapping` и реализуйте три абстрактных метода: `__getitem__`, `__iter__`, `__len__`. Остальное (`get`, `keys`, `items`, `__contains__`) придёт миксинами."
      - "Держите обычный `dict` на `self`: `__getitem__` читает по ключу, `__iter__` возвращает `iter(self._data)`, `__len__` его длину."
    starter: |
      from collections.abc import Mapping

      class FrozenDict(Mapping):
          def __init__(self, data):
              ...

          def __getitem__(self, key):
              ...

          def __iter__(self):
              ...

          def __len__(self):
              ...
    cases:
      - call: |
          FrozenDict({"a": 1, "b": 2}).get("z", -1)
        expect: -1
      - call: |
          FrozenDict({"a": 1, "b": 2}).get("a")
        expect: 1
      - call: |
          len(FrozenDict({"a": 1, "b": 2, "c": 3}))
        expect: 3
      - call: |
          sorted(FrozenDict({"a": 1, "b": 2}).keys())
        expect: ["a", "b"]
    solution: |
      from collections.abc import Mapping

      class FrozenDict(Mapping):
          def __init__(self, data):
              self._data = dict(data)

          def __getitem__(self, key):
              return self._data[key]

          def __iter__(self):
              return iter(self._data)

          def __len__(self):
              return len(self._data)
