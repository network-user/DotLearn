exercises:
  - id: iface-implicit-quiz-001
    concept: interfaces
    type: theory-quiz
    difficulty: 1
    prompt: "Как тип в Go начинает удовлетворять интерфейсу?"
    choices:
      - id: a
        text: "Автоматически - если у него есть все методы интерфейса"
      - id: b
        text: "Через ключевое слово implements в объявлении типа."
      - id: c
        text: "Через наследование от интерфейса."
      - id: d
        text: "Нужно вызвать функцию register(тип, интерфейс)."
    correct: [a]
    explanation: "Реализация в Go неявна: тип подходит под интерфейс просто потому, что имеет нужные методы. Никакого implements или регистрации не требуется."
    variants:
      - prompt: "Что описывает интерфейс в Go?"
        choices:
          - id: a
            text: "Набор методов - требуемое поведение, а не данные."
          - id: b
            text: "Набор полей, которые обязан иметь тип."
          - id: c
            text: "Готовую реализацию, которую типы наследуют."
          - id: d
            text: "Список разрешённых значений переменной."
        correct: [a]
        explanation: "Интерфейс - это список сигнатур методов. Он задаёт поведение; поля и данные описывают структурами."
      - prompt: "Какой тип удовлетворяет пустому интерфейсу interface{} (any)?"
        choices:
          - id: a
            text: "Любой - требований в нём ноль."
          - id: b
            text: "Только структуры."
          - id: c
            text: "Только типы с методом String()."
          - id: d
            text: "Никакой - пустой интерфейс нельзя удовлетворить."
        correct: [a]
        explanation: "У пустого интерфейса нет требований, поэтому ему удовлетворяет значение любого типа. Цена - потеря статической проверки типов."

  - id: iface-decl-blanks-001
    concept: interfaces
    type: fill-in-blanks
    difficulty: 2
    prompt: "Объявите интерфейс с одним методом. Впишите ключевое слово."
    template: |
      type Shape {{kw}} {
          Area() float64
      }
    blanks:
      kw:
        accept: ["interface"]
    explanation: "Интерфейс объявляют ключевым словом interface, перечисляя внутри требуемые методы. Любой тип с методом Area() float64 станет Shape."
    hints:
      - "Каким словом в Go описывают набор требуемых методов?"
    variants:
      - prompt: "Допишите метод, чтобы Square удовлетворял интерфейсу Shape. Впишите имя метода."
        template: |
          func (s Square) {{m}}() float64 {
              return s.side * s.side
          }
        blanks:
          m:
            accept: ["Area"]
      - prompt: "Достаньте строку из пустого интерфейса. Впишите тип в type assertion."
        template: |
          var x any = "привет"
          s := x.({{t}})
          fmt.Println(s)
        blanks:
          t:
            accept: ["string"]

  - id: iface-dispatch-predict-001
    concept: interfaces
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает программа? Значение хранится в переменной интерфейсного типа."
    snippet: |
      package main

      import "fmt"

      type Shape interface {
          Area() float64
      }

      type Square struct{ side float64 }

      func (s Square) Area() float64 { return s.side * s.side }

      func main() {
          var sh Shape = Square{side: 2.5}
          fmt.Println(sh.Area())
      }
    expected:
      kind: stdout
      value: |-
        6.25
    explanation: "Через интерфейс sh вызывается метод Area конкретного типа Square: 2.5 * 2.5 = 6.25."
    hints:
      - "Какой конкретный тип лежит в интерфейсе и какой Area() он посчитает для side = 2.5?"
    variants:
      - prompt: "Что напечатает программа?"
        snippet: |
          package main

          import "fmt"

          func main() {
              var x any = "привет"
              s, ok := x.(string)
              fmt.Println(s, ok)
          }
        expected:
          kind: stdout
          value: |-
            привет true
      - prompt: "Что напечатает программа?"
        snippet: |
          package main

          import "fmt"

          func main() {
              var x any = 42
              n := x.(int)
              fmt.Println(n)
          }
        expected:
          kind: stdout
          value: |-
            42

  - id: iface-typeswitch-predict-001
    concept: interfaces
    type: predict-output
    difficulty: 4
    prompt: "Что напечатает программа? Функция ветвится по настоящему типу значения."
    snippet: |
      package main

      import "fmt"

      func describe(x any) string {
          switch x.(type) {
          case int:
              return "число"
          case string:
              return "строка"
          default:
              return "другое"
          }
      }

      func main() {
          fmt.Println(describe(10))
          fmt.Println(describe("hi"))
          fmt.Println(describe(3.14))
      }
    expected:
      kind: stdout
      value: |-
        число
        строка
        другое
    explanation: "type switch выбирает ветку по конкретному типу. Для 10 это int - «число», для «hi» это string - «строка», а float64 не совпал ни с одним case и попал в default - «другое»."
    hints:
      - "Определите настоящий тип каждого аргумента: 10, «hi» и 3.14."
      - "Тип 3.14 - это float64, а среди case есть только int и string. Куда он попадёт?"
