exercises:
  - id: whygo-binary-quiz-001
    concept: why-go
    type: theory-quiz
    difficulty: 1
    prompt: "Что вы получаете, когда собираете программу на Go командой go build?"
    choices:
      - id: a
        text: "Один самодостаточный бинарь, которому на целевой машине не нужны интерпретатор и внешние библиотеки."
      - id: b
        text: "Набор .class-файлов, которым для запуска нужна установленная JVM."
      - id: c
        text: "Скрипт, который построчно исполняет интерпретатор во время запуска."
      - id: d
        text: "Архив с исходниками, который нужно распаковать и собрать на сервере."
    correct: [a]
    explanation: "Go компилируется заранее в машинный код и линкует всё внутрь одного бинаря. Его копируют на сервер и запускают без установки чего-либо ещё."
    variants:
      - prompt: "В какой пакет обязана быть помещена исполняемая программа на Go?"
        choices:
          - id: a
            text: "В пакет main."
          - id: b
            text: "В пакет exec."
          - id: c
            text: "В пакет с именем проекта."
          - id: d
            text: "В любой пакет - это не важно."
        correct: [a]
        explanation: "Запускаемая программа живёт в пакете main и стартует с функции main. Пакеты с другими именами - это библиотеки, их нельзя запустить напрямую."
      - prompt: "Зачем в Go нужна команда go fmt?"
        choices:
          - id: a
            text: "Она приводит код к единому каноническому формату, одинаковому для всех проектов."
          - id: b
            text: "Она проверяет код на ошибки типов."
          - id: c
            text: "Она собирает бинарь для продакшна."
          - id: d
            text: "Она запускает тесты."
        correct: [a]
        explanation: "go fmt форматирует код по одному общему стилю, поэтому споры о пробелах и отступах в Go-проектах не возникают, а чужой код читается без привыкания."

  - id: whygo-hello-blanks-001
    concept: why-go
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите минимальную программу «Привет»: пакет и точку входа."
    template: |
      package {{pkg}}

      import "fmt"

      func {{entry}}() {
          fmt.Println("Привет")
      }
    blanks:
      pkg:
        accept: ["main"]
      entry:
        accept: ["main"]
    explanation: "Исполняемая программа объявляется как package main и стартует с функции main - обе части обязательны, иначе бинарь не собрать."
    hints:
      - "Запускаемая программа и её точка входа носят одно и то же зарезервированное имя."
    variants:
      - prompt: "Допишите программу: как подключить пакет стандартной библиотеки и вызвать печать."
        template: |
          package main

          {{kw}} "fmt"

          func main() {
              fmt.{{fn}}("Привет")
          }
        blanks:
          kw:
            accept: ["import"]
          fn:
            accept: ["Println"]
      - prompt: "Допишите: имя подключаемого пакета и имя, через которое к нему обращаются."
        template: |
          package main

          import "{{lib}}"

          func main() {
              {{ns}}.Println("Привет")
          }
        blanks:
          lib:
            accept: ["fmt"]
          ns:
            accept: ["fmt"]

  - id: whygo-visibility-quiz-001
    concept: why-go
    type: theory-quiz
    difficulty: 3
    prompt: "В пакете есть функция area и функция Volume. Что из соседнего пакета будет видно?"
    choices:
      - id: a
        text: "Только Volume - имя с заглавной буквы экспортируется, со строчной остаётся внутренним."
      - id: b
        text: "Обе функции: регистр на видимость не влияет."
      - id: c
        text: "Только area - в Go экспортируются имена со строчной буквы."
      - id: d
        text: "Ни одна: чтобы экспортировать имя, нужно ключевое слово public."
    correct: [a]
    explanation: "В Go нет public и private. Видимость задаёт регистр первой буквы: Volume с заглавной виден снаружи, area со строчной - только внутри своего пакета."
    hints:
      - "В Go нет ключевых слов public и private. Что-то другое решает, кто увидит имя."
      - "Посмотрите на первую букву каждого имени - именно её регистр играет роль."

  - id: whygo-println-predict-001
    concept: why-go
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает эта программа? fmt.Println разделяет аргументы пробелом."
    snippet: |
      package main

      import "fmt"

      func main() {
          fmt.Println("Go", 1, true)
      }
    expected:
      kind: stdout
      value: |-
        Go 1 true
    explanation: "fmt.Println печатает аргументы через один пробел и добавляет перевод строки. Получается «Go 1 true»."
    hints:
      - "Println ставит по одному пробелу между соседними аргументами."
    variants:
      - prompt: "Что напечатает программа? Аргументы разделяются пробелом."
        snippet: |
          package main

          import "fmt"

          func main() {
              fmt.Println("сумма:", 2+3)
          }
        expected:
          kind: stdout
          value: |-
            сумма: 5
      - prompt: "Что напечатает программа?"
        snippet: |
          package main

          import "fmt"

          func main() {
              fmt.Println(10, 20, 30)
          }
        expected:
          kind: stdout
          value: |-
            10 20 30
