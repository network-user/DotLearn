exercises:
  - id: slicemap-missingkey-quiz-001
    concept: slices-and-maps
    type: theory-quiz
    difficulty: 1
    prompt: "Что вернёт обращение к мапе по ключу, которого в ней нет?"
    choices:
      - id: a
        text: "Нулевое значение типа значений"
      - id: b
        text: "nil, независимо от типа значений."
      - id: c
        text: "Панику - программа аварийно завершится."
      - id: d
        text: "Последнее добавленное значение."
    correct: [a]
    explanation: "Обращение к несуществующему ключу не падает, а возвращает нулевое значение типа. Отличить «ключа нет» от «значение равно нулю» помогает форма value, ok := m[key]."
    variants:
      - prompt: "Почему результат append почти всегда присваивают обратно: nums = append(nums, x)?"
        choices:
          - id: a
            text: "append может выделить новый массив и вернуть слайс на него; без присваивания"
          - id: b
            text: "Так требует go fmt, иначе код не отформатируется."
          - id: c
            text: "append изменяет длину исходной переменной сам, присваивание лишь для красоты."
          - id: d
            text: "Иначе append удалит все элементы слайса."
        correct: [a]
        explanation: "Когда ёмкости не хватает, append копирует данные в новый массив и возвращает слайс на него. Старая переменная указывает на прежний массив, поэтому результат нужно присвоить обратно."
      - prompt: "В каком порядке for range обходит ключи мапы?"
        choices:
          - id: a
            text: "В случайном - порядок намеренно"
          - id: b
            text: "В порядке добавления ключей."
          - id: c
            text: "В алфавитном порядке ключей."
          - id: d
            text: "В порядке возрастания значений."
        correct: [a]
        explanation: "Go специально перемешивает порядок обхода мапы, чтобы код не полагался на него. Нужен стабильный порядок - соберите ключи в слайс и отсортируйте."

  - id: slicemap-ops-blanks-001
    concept: slices-and-maps
    type: fill-in-blanks
    difficulty: 2
    prompt: "Добавьте элемент в слайс. Впишите нужную встроенную функцию."
    template: |
      nums := []int{1, 2, 3}
      nums = {{fn}}(nums, 4)
      fmt.Println(len(nums))
    blanks:
      fn:
        accept: ["append"]
    explanation: "Элементы в слайс добавляет встроенная функция append, а её результат присваивают обратно в nums, потому что может произойти переаллокация."
    hints:
      - "Какая встроенная функция дописывает элемент в конец слайса?"
    variants:
      - prompt: "Объявите мапу со строковыми ключами и числовыми значениями. Впишите тип мапы."
        template: |
          ages := {{t}}{"Анна": 30}
          ages["Вера"] = 29
          fmt.Println(ages["Анна"])
        blanks:
          t:
            accept: ["map[string]int"]
      - prompt: "Проверьте наличие ключа. Впишите второй результат обращения к мапе."
        template: |
          value, {{ok}} := ages["Вера"]
          if ok {
              fmt.Println(value)
          }
        blanks:
          ok:
            accept: ["ok"]

  - id: slicemap-append-predict-001
    concept: slices-and-maps
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает программа?"
    snippet: |
      package main

      import "fmt"

      func main() {
          nums := []int{1, 2, 3}
          nums = append(nums, 4)
          fmt.Println(len(nums), nums[3])
      }
    expected:
      kind: stdout
      value: |-
        4 4
    explanation: "После append слайс содержит четыре элемента, значит len равен 4. Последний элемент nums[3] - только что добавленная четвёрка."
    hints:
      - "Сколько элементов в слайсе после добавления и что лежит по индексу 3?"
    variants:
      - prompt: "Что напечатает программа? Println печатает слайс в квадратных скобках через пробел."
        snippet: |
          package main

          import "fmt"

          func main() {
              nums := []int{10, 20, 30, 40}
              part := nums[1:3]
              fmt.Println(part)
          }
        expected:
          kind: stdout
          value: |-
            [20 30]
      - prompt: "Что напечатает программа? Ключа «c» в мапе нет."
        snippet: |
          package main

          import "fmt"

          func main() {
              m := map[string]int{"a": 1, "b": 2}
              fmt.Println(m["c"])
          }
        expected:
          kind: stdout
          value: |-
            0

  - id: slicemap-aliasing-predict-001
    concept: slices-and-maps
    type: predict-output
    difficulty: 4
    prompt: "Что напечатает программа? Слайс b - это срез слайса a."
    snippet: |
      package main

      import "fmt"

      func main() {
          a := []int{1, 2, 3}
          b := a[:2]
          b[0] = 99
          fmt.Println(a[0])
      }
    expected:
      kind: stdout
      value: |-
        99
    explanation: "Срез b смотрит в тот же нижележащий массив, что и a. Запись b[0] = 99 меняет тот же элемент, что и a[0], поэтому a[0] становится 99."
    hints:
      - "Срез не копирует данные. Куда на самом деле смотрят a и b?"
      - "b[0] и a[0] - это один и тот же элемент массива, увиденный через два окна."
