exercises:
  - id: conc-goroutine-quiz-001
    concept: concurrency
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает ключевое слово go перед вызовом функции?"
    choices:
      - id: a
        text: "Запускает функцию как горутину - параллельно, не дожидаясь её завершения."
      - id: b
        text: "Откладывает вызов до выхода из текущей функции."
      - id: c
        text: "Запускает функцию и блокирует программу до её конца."
      - id: d
        text: "Компилирует функцию в отдельный бинарь."
    correct: [a]
    explanation: "go перед вызовом запускает функцию как горутину: она работает параллельно, а текущий код идёт дальше, не дожидаясь её."
    variants:
      - prompt: "Как отправить значение в канал ch и как принять из него?"
        choices:
          - id: a
            text: "Отправка ch <- v, приём v := <-ch."
          - id: b
            text: "Отправка ch.send(v), приём ch.recv()."
          - id: c
            text: "Отправка v -> ch, приём ch -> v."
          - id: d
            text: "Отправка push(ch, v), приём pop(ch)."
        correct: [a]
        explanation: "Канал использует оператор стрелки: ch <- v кладёт значение, а <-ch достаёт. Направление стрелки показывает, куда движется значение."
      - prompt: "Что происходит при отправке в небуферизованный канал, если читателя пока нет?"
        choices:
          - id: a
            text: "Отправка блокируется, пока кто-нибудь не начнёт читать из канала."
          - id: b
            text: "Значение теряется без следа."
          - id: c
            text: "Отправка завершается сразу, значение уходит в буфер."
          - id: d
            text: "Программа падает с ошибкой немедленно."
        correct: [a]
        explanation: "Небуферизованный канал синхронный: отправка ждёт читателя, а чтение ждёт отправителя. Так канал согласует момент передачи, а не только сами данные."

  - id: conc-channel-blanks-001
    concept: concurrency
    type: fill-in-blanks
    difficulty: 2
    prompt: "Запустите функцию как горутину. Впишите нужное ключевое слово."
    template: |
      ch := make(chan int)
      {{kw}} func() {
          ch <- 5
      }()
      fmt.Println(<-ch)
    blanks:
      kw:
        accept: ["go"]
    explanation: "Слово go запускает анонимную функцию как горутину. Она отправляет 5 в канал, а main достаёт значение оператором <-ch."
    hints:
      - "Каким одним словом в Go запускают параллельное выполнение функции?"
    variants:
      - prompt: "Создайте буферизованный канал целых чисел. Впишите тип канала."
        template: |
          ch := make({{t}}, 1)
          ch <- 42
          fmt.Println(<-ch)
        blanks:
          t:
            accept: ["chan int"]
      - prompt: "Отправьте строку в канал. Впишите оператор отправки."
        template: |
          ch := make(chan string, 1)
          ch {{op}} "привет"
          msg := <-ch
          fmt.Println(msg)
        blanks:
          op:
            accept: ["<-"]

  - id: conc-receive-predict-001
    concept: concurrency
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает программа? main ждёт значение из канала."
    snippet: |
      package main

      import "fmt"

      func main() {
          ch := make(chan int)
          go func() {
              ch <- 2 + 3
          }()
          fmt.Println(<-ch)
      }
    expected:
      kind: stdout
      value: |-
        5
    explanation: "Горутина вычисляет 2 + 3 и отправляет 5 в канал. main блокируется на <-ch, дожидается значения и печатает 5."
    hints:
      - "Что вычислит горутина и отправит в канал, прежде чем main получит значение?"
    variants:
      - prompt: "Что напечатает программа? Канал буферизованный."
        snippet: |
          package main

          import "fmt"

          func main() {
              ch := make(chan string, 1)
              ch <- "готово"
              fmt.Println(<-ch)
          }
        expected:
          kind: stdout
          value: |-
            готово
      - prompt: "Что напечатает программа? Горутина складывает числа и шлёт сумму."
        snippet: |
          package main

          import "fmt"

          func main() {
              ch := make(chan int)
              go func() {
                  sum := 0
                  for i := 1; i <= 4; i++ {
                      sum += i
                  }
                  ch <- sum
              }()
              fmt.Println(<-ch)
          }
        expected:
          kind: stdout
          value: |-
            10

  - id: conc-select-predict-001
    concept: concurrency
    type: predict-output
    difficulty: 3
    prompt: "Что напечатает программа? select выбирает готовую ветку."
    snippet: |
      package main

      import "fmt"

      func main() {
          ch := make(chan string, 1)
          ch <- "данные"
          select {
          case msg := <-ch:
              fmt.Println(msg)
          default:
              fmt.Println("нет данных")
          }
      }
    expected:
      kind: stdout
      value: |-
        данные
    explanation: "В буферизованный канал заранее положили «данные», поэтому ветка приёма готова. select выбирает её, а не default, и печатает «данные»."
    hints:
      - "В канале уже лежит значение. Какая ветка select готова - приём или default?"
      - "default срабатывает, только когда не готов ни один канал. Здесь канал готов."

  - id: conc-two-goroutines-predict-001
    concept: concurrency
    type: predict-output
    difficulty: 4
    prompt: "Что напечатает программа? Две горутины шлют по числу, main принимает оба и складывает."
    snippet: |
      package main

      import "fmt"

      func main() {
          ch := make(chan int)
          go func() { ch <- 10 }()
          go func() { ch <- 20 }()
          a := <-ch
          b := <-ch
          fmt.Println(a + b)
      }
    expected:
      kind: stdout
      value: |-
        30
    explanation: "Порядок получения 10 и 20 не определён - горутины шлют независимо. Но main принимает оба значения и складывает их, а сумма 10 + 20 = 30 не зависит от порядка."
    hints:
      - "Порядок, в котором придут значения, заранее не известен. Влияет ли это на сумму?"
      - "main получает оба числа - 10 и 20 - в каком-то порядке и складывает. Результат один и тот же."
