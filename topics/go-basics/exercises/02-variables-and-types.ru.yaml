exercises:
  - id: vars-zero-quiz-001
    concept: variables-and-types
    type: theory-quiz
    difficulty: 1
    prompt: "Переменную объявили как var count int, не задав значение. Чему она равна?"
    choices:
      - id: a
        text: "0 - нулевому значению типа int."
      - id: b
        text: "nil - переменная не инициализирована."
      - id: c
        text: "Случайному числу из памяти."
      - id: d
        text: "Это ошибка компиляции: значение обязательно."
    correct: [a]
    explanation: "Переменная без явного значения получает нулевое значение своего типа. Для int это 0, а не мусор и не nil."
    variants:
      - prompt: "Чему равна var name string, объявленная без значения?"
        choices:
          - id: a
            text: "Пустой строке \"\"."
          - id: b
            text: "Значение nil., выбранное как полный ответ"
          - id: c
            text: "Строке \"null\"."
          - id: d
            text: "Значение Пробелу., выбранное как полный ответ"
        correct: [a]
        explanation: "Нулевое значение строки - это пустая строка \"\". Строка в Go никогда не бывает nil."
      - prompt: "Чему равна var active bool, объявленная без значения?"
        choices:
          - id: a
            text: "false."
          - id: b
            text: "true."
          - id: c
            text: "Значение nil., выбранное как полный ответ"
          - id: d
            text: "Значение 0., выбранное как полный ответ"
        correct: [a]
        explanation: "Нулевое значение булева типа - false. Это удобно: флаг по умолчанию выключен."

  - id: vars-declare-blanks-001
    concept: variables-and-types
    type: fill-in-blanks
    difficulty: 2
    prompt: "Объявите переменную коротким оператором, затем присвойте ей новое значение. Впишите два оператора."
    template: |
      func main() {
          age {{decl}} 30
          age {{assign}} age + 1
          fmt.Println(age)
      }
    blanks:
      decl:
        accept: [":="]
      assign:
        accept: ["="]
    explanation: "Первое присваивание объявляет новую переменную оператором :=. Второе меняет уже существующую, поэтому используется обычное =, а не := (иначе была бы повторная декларация)."
    hints:
      - "Первая строка создаёт переменную, вторая - меняет уже существующую. Это два разных оператора."
    variants:
      - prompt: "Смешивать int и float64 напрямую нельзя. Впишите нужное преобразование."
        template: |
          func main() {
              count := 3
              ratio := 2.5
              total := {{conv}}(count) * ratio
              fmt.Println(total)
          }
        blanks:
          conv:
            accept: ["float64"]
      - prompt: "Объявите неизменяемое значение нужным ключевым словом."
        template: |
          func main() {
              {{kw}} maxTries = 3
              var count int
              fmt.Println(count, maxTries)
          }
        blanks:
          kw:
            accept: ["const"]

  - id: vars-zero-predict-001
    concept: variables-and-types
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает программа? Обе переменные объявлены без значения."
    snippet: |
      package main

      import "fmt"

      func main() {
          var count int
          var active bool
          fmt.Println(count, active)
      }
    expected:
      kind: stdout
      value: |-
        0 false
    explanation: "Нулевое значение int - это 0, а bool - false. Println печатает их через пробел: «0 false»."
    hints:
      - "Ни одной переменной не присвоили значение. Вспомните, чем Go заполняет такие переменные."
    variants:
      - prompt: "Что напечатает программа?"
        snippet: |
          package main

          import "fmt"

          func main() {
              n := 3
              n = n + 5
              fmt.Println(n)
          }
        expected:
          kind: stdout
          value: |-
            8
      - prompt: "Что напечатает программа?"
        snippet: |
          package main

          import "fmt"

          func main() {
              count := 3
              ratio := 2.5
              total := float64(count) * ratio
              fmt.Println(total)
          }
        expected:
          kind: stdout
          value: |-
            7.5

  - id: vars-conversion-quiz-001
    concept: variables-and-types
    type: theory-quiz
    difficulty: 3
    prompt: "У вас count типа int и ratio типа float64. Выражение count * ratio не компилируется. Почему и как это исправить?"
    choices:
      - id: a
        text: "В Go нет неявных числовых преобразований; нужно привести явно"
      - id: b
        text: "Умножать в Go вообще нельзя, только складывать."
      - id: c
        text: "Нужно сначала присвоить обе переменные в var, тогда типы совпадут сами."
      - id: d
        text: "float64 нельзя умножать на переменную, только на литерал."
    correct: [a]
    explanation: "Go не приводит числовые типы неявно, чтобы не потерять точность незаметно. Смешанную арифметику пишут через явное преобразование, например float64(count) * ratio."
    hints:
      - "Подумайте, что отличает Go от JavaScript, где число и строка складываются молча."
      - "Типы операндов должны совпадать. Что нужно сделать с count, чтобы он стал float64?"
