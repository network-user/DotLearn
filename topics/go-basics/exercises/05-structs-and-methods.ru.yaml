exercises:
  - id: struct-basics-quiz-001
    concept: structs-and-methods
    type: theory-quiz
    difficulty: 1
    prompt: "Что такое struct в Go?"
    choices:
      - id: a
        text: "Тип, группирующий несколько именованных полей в одно значение."
      - id: b
        text: "Класс с конструктором и наследованием."
      - id: c
        text: "Функция, возвращающая несколько значений."
      - id: d
        text: "Специальный вид цикла для перебора полей."
    correct: [a]
    explanation: "Структура собирает поля под одним именем типа. Классов и наследования в Go нет; struct отвечает за данные, а методы - за поведение."
    variants:
      - prompt: "Чем метод отличается от обычной функции в Go?"
        choices:
          - id: a
            text: "У метода есть приёмник в скобках перед именем, привязывающий его к типу."
          - id: b
            text: "Метод не может возвращать значение."
          - id: c
            text: "Метод всегда объявляется внутри фигурных скобок struct."
          - id: d
            text: "Ничем: это два названия одного и того же."
        correct: [a]
        explanation: "Метод - это функция с приёмником: func (u User) Greet() string. Приёмник указывает, к какому типу привязан метод."
      - prompt: "Метод объявлен с приёмником по значению: func (c Counter) Inc() { c.n++ }. Изменится ли оригинал после вызова?"
        choices:
          - id: a
            text: "Нет - приёмник по значению получает копию, оригинал не тронут."
          - id: b
            text: "Да - поля структуры всегда меняются по ссылке."
          - id: c
            text: "Да, но только первое поле."
          - id: d
            text: "Это ошибка компиляции."
        correct: [a]
        explanation: "Приёмник по значению - это копия структуры. Чтобы метод менял оригинал, приёмник должен быть указателем (*Counter)."

  - id: struct-literal-blanks-001
    concept: structs-and-methods
    type: fill-in-blanks
    difficulty: 2
    prompt: "Объявите структуру и создайте значение по именам полей. Впишите ключевое слово и имя поля."
    template: |
      type User {{kw}} {
          Name string
          Age  int
      }

      func main() {
          u := User{Name: "Анна", {{field}}: 30}
          fmt.Println(u.Age)
      }
    blanks:
      kw:
        accept: ["struct"]
      field:
        accept: ["Age"]
    explanation: "Тип с полями объявляют как struct. Значение удобнее собирать по именам полей: User{Name: ..., Age: ...} - такой литерал не сломается при добавлении новых полей."
    hints:
      - "Какое ключевое слово превращает набор полей в один тип? И как называется поле со значением 30?"
    variants:
      - prompt: "Допишите метод: укажите тип приёмника, чтобы Greet принадлежал User."
        template: |
          func (u {{recv}}) Greet() string {
              return "Привет, " + u.Name
          }
        blanks:
          recv:
            accept: ["User"]
      - prompt: "Метод должен менять структуру. Впишите приёмник-указатель."
        template: |
          func (c {{recv}}) Inc() {
              c.n++
          }
        blanks:
          recv:
            accept: ["*Counter"]

  - id: struct-fields-predict-001
    concept: structs-and-methods
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает программа?"
    snippet: |
      package main

      import "fmt"

      type User struct {
          Name string
          Age  int
      }

      func main() {
          u := User{Name: "Анна", Age: 30}
          u.Age = 31
          fmt.Println(u.Name, u.Age)
      }
    expected:
      kind: stdout
      value: |-
        Анна 31
    explanation: "Поле Name осталось «Анна», а строка u.Age = 31 изменила возраст. Println печатает оба поля через пробел."
    hints:
      - "Пройдите строки по порядку: сначала создание, затем присваивание одному полю."
    variants:
      - prompt: "Что напечатает программа?"
        snippet: |
          package main

          import "fmt"

          type User struct {
              Name string
          }

          func (u User) Greet() string {
              return "Привет, " + u.Name
          }

          func main() {
              u := User{Name: "Борис"}
              fmt.Println(u.Greet())
          }
        expected:
          kind: stdout
          value: |-
            Привет, Борис
      - prompt: "Что напечатает программа? Структуру создали без значений."
        snippet: |
          package main

          import "fmt"

          type Point struct {
              X int
              Y int
          }

          func main() {
              var p Point
              fmt.Println(p.X, p.Y)
          }
        expected:
          kind: stdout
          value: |-
            0 0

  - id: struct-receiver-predict-001
    concept: structs-and-methods
    type: predict-output
    difficulty: 4
    prompt: "Что напечатает программа? Обратите внимание на тип приёмника у каждого метода."
    snippet: |
      package main

      import "fmt"

      type Counter struct {
          n int
      }

      func (c Counter) IncValue() { c.n++ }
      func (c *Counter) IncPtr()  { c.n++ }

      func main() {
          c := Counter{}
          c.IncValue()
          fmt.Println(c.n)
          c.IncPtr()
          fmt.Println(c.n)
      }
    expected:
      kind: stdout
      value: |-
        0
        1
    explanation: "IncValue работает с копией структуры, поэтому оригинал остаётся с n = 0. IncPtr имеет приёмник-указатель и меняет тот же объект, поэтому после него n = 1."
    hints:
      - "Один метод получает копию структуры, другой - её адрес. Какой из них способен изменить оригинал?"
      - "После IncValue оригинал не меняется. Изменение приносит только метод с приёмником *Counter."
