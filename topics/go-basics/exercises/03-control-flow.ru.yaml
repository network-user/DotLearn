exercises:
  - id: flow-loops-quiz-001
    concept: control-flow
    type: theory-quiz
    difficulty: 1
    prompt: "Сколько ключевых слов для циклов есть в Go?"
    choices:
      - id: a
        text: "Одно - for; оно же заменяет while и"
      - id: b
        text: "Три - for, while и do-while."
      - id: c
        text: "Два - for и while."
      - id: d
        text: "Ни одного - циклы делают через рекурсию."
    correct: [a]
    explanation: "В Go единственный цикл - for. Убирая инициализатор и пост-выражение, его превращают в аналог while, а убирая и условие - в бесконечный цикл."
    variants:
      - prompt: "Как в Go записать цикл, который работает как while (крутится, пока условие истинно)?"
        choices:
          - id: a
            text: "for условие { ... }"
          - id: b
            text: "while условие { ... }."
          - id: c
            text: "loop условие { ... }."
          - id: d
            text: "repeat { ... } until условие."
        correct: [a]
        explanation: "Форму while даёт for с единственным условием: for n > 1 { ... }. Отдельного ключевого слова while в Go нет."
      - prompt: "Что произойдёт в switch, если ветка case завершилась, а break не написан?"
        choices:
          - id: a
            text: "Ветка завершится сама, провала в следующий case не"
          - id: b
            text: "Выполнение провалится в следующий case, как в C."
          - id: c
            text: "Это ошибка компиляции: break обязателен."
          - id: d
            text: "switch зациклится."
        correct: [a]
        explanation: "В Go каждая ветка switch замкнута: break не нужен, случайного провала нет. Провалиться можно только явным ключевым словом fallthrough."

  - id: flow-loop-blanks-001
    concept: control-flow
    type: fill-in-blanks
    difficulty: 2
    prompt: "Соберите цикл, который суммирует числа. Впишите ключевое слово цикла и оператор накопления."
    template: |
      sum := 0
      {{kw}} i := 1; i <= 3; i++ {
          sum {{op}} i
      }
    blanks:
      kw:
        accept: ["for"]
      op:
        accept: ["+="]
    explanation: "Цикл со счётчиком начинается с for, а sum += i - краткая запись для sum = sum + i, накапливающая сумму."
    hints:
      - "Вспомните, каким одним словом в Go начинается любой цикл."
    variants:
      - prompt: "Соберите switch: перечислите два значения в одной ветке и добавьте ветку по умолчанию."
        template: |
          switch day {
          {{kw}} "сб", "вс":
              fmt.Println("выходной")
          {{def}}:
              fmt.Println("будни")
          }
        blanks:
          kw:
            accept: ["case"]
          def:
            accept: ["default"]
      - prompt: "Соберите if с инициализатором: объявите n прямо в условии."
        template: |
          {{kw}} n := len(name); n > 5 {
              fmt.Println("длинное имя")
          }
        blanks:
          kw:
            accept: ["if"]

  - id: flow-sum-predict-001
    concept: control-flow
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает программа?"
    snippet: |
      package main

      import "fmt"

      func main() {
          sum := 0
          for i := 1; i <= 4; i++ {
              sum += i
          }
          fmt.Println(sum)
      }
    expected:
      kind: stdout
      value: |-
        10
    explanation: "Цикл идёт по i от 1 до 4 включительно и складывает их: 1 + 2 + 3 + 4 = 10."
    hints:
      - "Условие i <= 4 включает саму четвёрку. Сложите все значения i по порядку."
    variants:
      - prompt: "Что напечатает программа? Считается, сколько раз число делится на 2 до единицы."
        snippet: |
          package main

          import "fmt"

          func main() {
              n := 16
              count := 0
              for n > 1 {
                  n = n / 2
                  count++
              }
              fmt.Println(count)
          }
        expected:
          kind: stdout
          value: |-
            4
      - prompt: "Что напечатает программа?"
        snippet: |
          package main

          import "fmt"

          func main() {
              p := 1
              for i := 1; i <= 4; i++ {
                  p *= i
              }
              fmt.Println(p)
          }
        expected:
          kind: stdout
          value: |-
            24

  - id: flow-switch-predict-001
    concept: control-flow
    type: predict-output
    difficulty: 3
    prompt: "Что напечатает программа? Ветки switch проверяются сверху вниз."
    snippet: |
      package main

      import "fmt"

      func main() {
          score := 82
          grade := ""
          switch {
          case score >= 90:
              grade = "A"
          case score >= 75:
              grade = "B"
          default:
              grade = "C"
          }
          fmt.Println(grade)
      }
    expected:
      kind: stdout
      value: |-
        B
    explanation: "switch без выражения проверяет условия по порядку. 82 >= 90 ложно, 82 >= 75 истинно - срабатывает вторая ветка, grade становится «B», и switch завершается."
    hints:
      - "switch без выражения - это лестница условий. Какое из них первым окажется истинным для 82?"
      - "Ветки идут сверху вниз, срабатывает первая подходящая. Проверьте 82 >= 90, затем 82 >= 75."
