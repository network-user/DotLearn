exercises:
  - id: func-defer-quiz-001
    concept: functions
    type: theory-quiz
    difficulty: 1
    prompt: "Когда выполнится вызов, помеченный defer?"
    choices:
      - id: a
        text: "При выходе из окружающей функции - обычным return или из-за паники."
      - id: b
        text: "Сразу же, как только встретится строка с defer."
      - id: c
        text: "Никогда: defer только помечает код, но не запускает его."
      - id: d
        text: "В конце ближайшего блока { }, где он написан."
    correct: [a]
    explanation: "defer откладывает вызов до момента выхода из функции. Это гарантирует уборку ресурса в любой ветке выхода, включая панику."
    variants:
      - prompt: "Три вызова defer A, defer B, defer C запланированы по порядку. В каком порядке они выполнятся?"
        choices:
          - id: a
            text: "C, B, A - в обратном порядке (LIFO)."
          - id: b
            text: "A, B, C - в порядке объявления."
          - id: c
            text: "В случайном порядке."
          - id: d
            text: "Только последний - C."
        correct: [a]
        explanation: "Отложенные вызовы снимаются со стопки: запланированный последним срабатывает первым. Порядок C, B, A."
      - prompt: "Зачем в Go функции часто возвращают два значения, например (string, bool)?"
        choices:
          - id: a
            text: "Чтобы вместе с результатом отдать признак успеха или ошибки без исключений."
          - id: b
            text: "Потому что одно значение вернуть нельзя."
          - id: c
            text: "Чтобы ускорить выполнение функции."
          - id: d
            text: "Это требование команды go fmt."
        correct: [a]
        explanation: "Множественный возврат - основа стиля Go. Пара «значение и признак» (или «значение и ошибка») заменяет исключения и заставляет вызвавшего осознанно обработать оба результата."

  - id: func-multiret-blanks-001
    concept: functions
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите функцию, которая возвращает частное и остаток. Впишите типы двух результатов."
    template: |
      func divmod(a, b int) ({{t1}}, {{t2}}) {
          return a / b, a % b
      }
    blanks:
      t1:
        accept: ["int"]
      t2:
        accept: ["int"]
    explanation: "Типы возвращаемых значений перечисляют в скобках после параметров. Оба результата целые, поэтому оба типа - int."
    hints:
      - "Частное и остаток от деления целых чисел - какого они типа?"
    variants:
      - prompt: "Запланируйте закрытие ресурса сразу после его открытия. Впишите ключевое слово."
        template: |
          func readConfig(path string) {
              f := open(path)
              {{kw}} f.Close()
              parse(f)
          }
        blanks:
          kw:
            accept: ["defer"]
      - prompt: "Вам нужен только остаток. Отправьте частное в пустой идентификатор."
        template: |
          func main() {
              {{ignore}}, remainder := divmod(17, 5)
              fmt.Println(remainder)
          }
        blanks:
          ignore:
            accept: ["_"]

  - id: func-defer-predict-001
    concept: functions
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает программа? Обратите внимание на порядок вызовов defer."
    snippet: |
      package main

      import "fmt"

      func main() {
          defer fmt.Println("A")
          defer fmt.Println("B")
          fmt.Println("C")
      }
    expected:
      kind: stdout
      value: |-
        C
        B
        A
    explanation: "Обычная строка печатает «C» первой. Затем при выходе из функции срабатывают отложенные вызовы в обратном порядке: сначала «B», потом «A»."
    hints:
      - "Сначала выполняется код без defer. Отложенные вызовы ждут выхода из функции."
    variants:
      - prompt: "Что напечатает программа?"
        snippet: |
          package main

          import "fmt"

          func main() {
              defer fmt.Println("конец")
              fmt.Println("старт")
          }
        expected:
          kind: stdout
          value: |-
            старт
            конец
      - prompt: "Что напечатает программа?"
        snippet: |
          package main

          import "fmt"

          func minmax(a, b int) (int, int) {
              if a < b {
                  return a, b
              }
              return b, a
          }

          func main() {
              lo, hi := minmax(7, 3)
              fmt.Println(lo, hi)
          }
        expected:
          kind: stdout
          value: |-
            3 7

  - id: func-defer-args-predict-001
    concept: functions
    type: predict-output
    difficulty: 4
    prompt: "Что напечатает программа? Внимательно: когда вычисляется аргумент отложенного вызова?"
    snippet: |
      package main

      import "fmt"

      func main() {
          i := 0
          defer fmt.Println(i)
          i = 10
          fmt.Println(i)
      }
    expected:
      kind: stdout
      value: |-
        10
        0
    explanation: "Аргумент отложенного вызова fmt.Println(i) вычисляется в момент строки defer, когда i равно 0, - это значение фиксируется. Сначала печатается текущее i = 10, а при выходе срабатывает defer с зафиксированным нулём."
    hints:
      - "Аргумент defer вычисляется не когда вызов срабатывает, а когда встречается строка defer. Каким было i в тот момент?"
      - "Сначала выполнится обычный fmt.Println(i) с i = 10, а отложенный вызов держит копию i, снятую раньше."
