exercises:
  - id: errors-idiom-quiz-001
    concept: errors
    type: theory-quiz
    difficulty: 1
    prompt: "Как функция в Go по соглашению сообщает вызвавшему об ошибке?"
    choices:
      - id: a
        text: "Возвращает значение типа error последним; nil в этом месте означает успех."
      - id: b
        text: "Бросает исключение, которое ловят через try/catch."
      - id: c
        text: "Записывает ошибку в глобальную переменную errno."
      - id: d
        text: "Завершает программу вызовом panic при любой проблеме."
    correct: [a]
    explanation: "В Go ошибка - обычное значение, возвращаемое последним. Вызвавший проверяет его идиомой if err != nil, а nil означает, что всё прошло успешно."
    variants:
      - prompt: "Что означает error, равный nil, среди возвращённых значений функции?"
        choices:
          - id: a
            text: "Ошибки не было - функция отработала успешно."
          - id: b
            text: "Функцию ещё не вызвали."
          - id: c
            text: "Произошла неизвестная ошибка."
          - id: d
            text: "Результат нужно проигнорировать."
        correct: [a]
        explanation: "По соглашению nil на месте ошибки значит «всё хорошо». Именно поэтому проверка выглядит как if err != nil: реагируем, только когда ошибка не-nil."
      - prompt: "Чем обработка ошибок в Go отличается от исключений?"
        choices:
          - id: a
            text: "Ошибка - обычное возвращаемое значение, и проверка стоит прямо на месте вызова, а не в далёком catch."
          - id: b
            text: "Ошибки в Go нельзя обработать вообще."
          - id: c
            text: "Ошибки автоматически летят вверх по стеку, как исключения."
          - id: d
            text: "Различий нет, только синтаксис другой."
        correct: [a]
        explanation: "Go возвращает ошибку значением, поэтому путь ошибки виден прямо в коде. Плата - многословные проверки, зато нет невидимого потока управления."

  - id: errors-return-blanks-001
    concept: errors
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите функцию: тип второго результата и значение при успехе."
    template: |
      func divide(a, b int) (int, {{errtype}}) {
          if b == 0 {
              return 0, errors.New("деление на ноль")
          }
          return a / b, {{nilval}}
      }
    blanks:
      errtype:
        accept: ["error"]
      nilval:
        accept: ["nil"]
    explanation: "Функция возвращает результат и ошибку типа error. При успехе на месте ошибки ставят nil - признак того, что всё прошло хорошо."
    hints:
      - "Каким типом Go выражает ошибку и какое значение этого типа означает «успех»?"
    variants:
      - prompt: "Проверьте ошибку сразу после вызова. Впишите оператор сравнения."
        template: |
          result, err := divide(10, 2)
          if err {{op}} nil {
              return
          }
          fmt.Println(result)
        blanks:
          op:
            accept: ["!="]
      - prompt: "Оберните ошибку, сохранив исходную внутри. Впишите нужный глагол форматирования."
        template: |
          if err != nil {
              return fmt.Errorf("загрузка конфига: {{verb}}", err)
          }
        blanks:
          verb:
            accept: ["%w"]

  - id: errors-flow-predict-001
    concept: errors
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает программа?"
    snippet: |
      package main

      import (
          "errors"
          "fmt"
      )

      func divide(a, b int) (int, error) {
          if b == 0 {
              return 0, errors.New("деление на ноль")
          }
          return a / b, nil
      }

      func main() {
          result, err := divide(10, 2)
          if err != nil {
              fmt.Println("ошибка")
              return
          }
          fmt.Println(result)
      }
    expected:
      kind: stdout
      value: |-
        5
    explanation: "divide(10, 2): делитель не ноль, поэтому возвращается 5 и nil. Проверка err != nil ложна, и печатается результат - 5."
    hints:
      - "Делитель равен 2. По какой ветке пойдёт divide и что окажется в err?"
    variants:
      - prompt: "Что напечатает программа? Println печатает ошибку её текстом."
        snippet: |
          package main

          import (
              "errors"
              "fmt"
          )

          func divide(a, b int) (int, error) {
              if b == 0 {
                  return 0, errors.New("деление на ноль")
              }
              return a / b, nil
          }

          func main() {
              result, err := divide(8, 0)
              if err != nil {
                  fmt.Println(err)
                  return
              }
              fmt.Println(result)
          }
        expected:
          kind: stdout
          value: |-
            деление на ноль
      - prompt: "Что напечатает программа? %w встраивает исходную ошибку в новую."
        snippet: |
          package main

          import (
              "errors"
              "fmt"
          )

          func main() {
              err := fmt.Errorf("контекст: %w", errors.New("сбой"))
              fmt.Println(err)
          }
        expected:
          kind: stdout
          value: |-
            контекст: сбой

  - id: errors-recover-predict-001
    concept: errors
    type: predict-output
    difficulty: 5
    prompt: "Что напечатает программа? Отложенная функция вызывает recover после panic."
    snippet: |
      package main

      import "fmt"

      func safe() {
          defer func() {
              if r := recover(); r != nil {
                  fmt.Println("восстановились:", r)
              }
          }()
          panic("сбой")
      }

      func main() {
          safe()
          fmt.Println("продолжаем")
      }
    expected:
      kind: stdout
      value: |-
        восстановились: сбой
        продолжаем
    explanation: "panic разворачивает стек и выполняет отложенную функцию. Внутри неё recover перехватывает панику и возвращает её значение «сбой», поэтому печатается «восстановились: сбой». Паника погашена, safe завершается нормально, и main продолжает работу - «продолжаем»."
    hints:
      - "panic запускает отложенные вызовы при разворачивании стека. Что делает recover внутри такого вызова?"
      - "Если recover перехватил панику, функция safe завершается штатно. Что тогда выполнится в main после неё?"
