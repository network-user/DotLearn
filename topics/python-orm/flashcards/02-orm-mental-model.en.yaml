conceptId: orm-mental-model
cards:
  - id: orm-mental-model-01
    front: What is ORM and what work does it take on?
    back: ORM (Object-Relational Mapping) is a translator between Python objects and table rows. You describe which class maps to which table, and the ORM generates SQL and turns result rows into instances, saving you from manual translation back and forth.
    tags: [basics]
  - id: orm-mental-model-02
    front: On what three levels does ORM mapping work?
    back: Class ↔ table (User ↔ users), instance ↔ row (a User object corresponds to one row), attribute ↔ column (user.name ↔ column name). The library handles translation in both directions.
    tags: [basics]
  - id: orm-mental-model-03
    front: How do you declare a model in modern SQLAlchemy 2.x style?
    back: Inherit the base class from DeclarativeBase, declare columns with typed annotations Mapped[...] and mapped_column(...). Table name is set by __tablename__, primary key by mapped_column(primary_key=True).
    tags: [models]
  - id: orm-mental-model-04
    front: How does Mapped[str] differ from Mapped[str | None] in a model?
    back: Mapped[str] with no options is a required (NOT NULL) column; Mapped[str | None] makes it optional. The type annotation sets both the Python type and the column type and whether the field is required.
    tags: [models]
  - id: orm-mental-model-05
    front: What is the identity map and what follows from it?
    back: Within one session each row (by primary key) maps to exactly one Python object. So a repeat session.get(User, 1) returns the same object (u1 is u2), and a change through u1 is immediately visible through u2.
    tags: [internals]
  - id: orm-mental-model-06
    front: What is unit of work in a SQLAlchemy session?
    back: "A mechanism where the session does not send SQL on every assignment but tracks changes: which objects are new (add), dirty (attribute changed), deleted. Accumulated changes become SQL in a batch on flush and are committed on commit."
    tags: [internals]
  - id: orm-mental-model-07
    front: What happens to the database between session.add(user) and session.commit()?
    back: "Until flush/commit the database is untouched: add only marks the object as new, assignments update fields in memory. On commit the session generates one INSERT with the final field values."
    tags: [internals]
  - id: orm-mental-model-08
    front: A common beginner mistake about assigning to an ORM object attribute.
    back: "Thinking assignment writes to the database immediately. It does not: unit of work accumulates changes and sends SQL on flush/commit. If you forget commit, changes are not saved. Same as with raw SQL."
    tags: [pitfalls]
  - id: orm-mental-model-09
    front: Why is ORM called a leaky abstraction?
    back: "ORM hides SQL but does not eliminate it: every operation eventually becomes a query. Not knowing which SQL your code produced is the source of tricky performance problems (the classic is N+1). So keep echo=True and watch generated SQL."
    tags: [pitfalls]
  - id: orm-mental-model-10
    front: Between old Column(...) style and new Mapped[...], which should you choose?
    back: Both work, but Column(Integer, primary_key=True) without annotations is SQLAlchemy 1.x. Write new models with Mapped[...] / mapped_column(...) for type checking and readability.
    tags: [models]
