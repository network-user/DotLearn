conceptId: raw-sql-in-python
cards:
  - id: raw-sql-in-python-01
    front: Из каких трёх звеньев состоит конвейер работы с базой в Python DB-API?
    back: Connection - канал к файлу или серверу базы; Cursor - объект, через который шлют SQL и читают ответы; результат - строки, которые забирают методами fetchone/fetchall или перебором курсора.
    tags: [basics]
  - id: raw-sql-in-python-02
    front: Чем отличаются fetchone, fetchall и перебор курсора в цикле?
    back: fetchone возвращает следующую одну строку или None, когда строки кончились; fetchall - сразу все оставшиеся в список; перебор курсора в цикле читает строки по одной, не загружая весь результат в память.
    tags: [basics]
  - id: raw-sql-in-python-03
    front: Почему склейка запроса f-строкой - это дыра в безопасности?
    back: "Это открывает SQL-инъекцию: враждебное значение вроде \"'; DROP TABLE users; --\" вклеивается в текст и становится кодом, который база послушно выполнит. Данные, которые должны были стать значением, прорываются и меняют структуру запроса."
    tags: [security, pitfalls]
  - id: raw-sql-in-python-04
    front: Как безопасно подставить пользовательские данные в запрос sqlite3?
    back: Оставить в SQL плейсхолдер (знак вопроса ? или именованный :name) и передать значение отдельным аргументом execute. Драйвер шлёт текст и значение разными каналами, поэтому кавычки и точки с запятой внутри значения остаются просто символами.
    tags: [security]
  - id: raw-sql-in-python-05
    front: Какую вторую проблему, кроме инъекций, решает параметризация?
    back: Экранирование. Имя вроде O'Brien с апострофом сломало бы f-строку, потому что апостроф закрыл бы строковый литерал SQL. Через параметр оно передаётся без единой заботы об экранировании - спецсимволы остаются данными.
    tags: [security]
  - id: raw-sql-in-python-06
    front: Что такое транзакция и зачем нужны commit и rollback?
    back: "Транзакция - незавершённый набор правок, которые ещё не зафиксированы. commit объявляет «всё прошло, фиксируй», rollback отменяет всё с прошлого commit. Это даёт атомарность: связанные изменения применяются вместе или не применяются вовсе."
    tags: [transactions]
  - id: raw-sql-in-python-07
    front: Чем управляет блок with sqlite3.connect(...) - и чем не управляет?
    back: "Он управляет транзакцией: при выходе без исключения делает commit, при исключении - rollback. Само соединение этим блоком не закрывается; чтобы гарантированно его закрыть, нужен contextlib.closing или пул соединений."
    tags: [transactions, pitfalls]
  - id: raw-sql-in-python-08
    front: Почему INSERT «отработал», но данных в файле базы нет?
    back: Изменения без commit (и вне with-блока) живут только внутри транзакции и откатываются при закрытии соединения. Лекарство - явный conn.commit() перед закрытием либо with-блок, который зафиксирует за Вас.
    tags: [transactions, pitfalls]
  - id: raw-sql-in-python-09
    front: Почему execute("... = ?", name) падает для одного значения?
    back: Второй аргумент execute должен быть последовательностью. Для одного значения пишут (name,) - именно с запятой, иначе это не кортеж, а просто скобки вокруг строки.
    tags: [pitfalls]
  - id: raw-sql-in-python-10
    front: Почему параметризованный запрос называют подготовленным (prepared)?
    back: На многих базах запрос с плейсхолдерами отправляется один раз как шаблон с «дыркой» на месте параметра, а значения едут отдельным сообщением. Сервер компилирует план по шаблону, значение физически не может повлиять на структуру, а шаблон переиспользуется ради скорости.
    tags: [internals]
