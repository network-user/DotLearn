conceptId: orm-mental-model
cards:
  - id: orm-mental-model-01
    front: Что такое ORM и какую работу он берёт на себя?
    back: ORM (Object-Relational Mapping) - переводчик между объектами Python и строками таблиц. Вы описываете, какой класс соответствует какой таблице, а ORM сам генерирует SQL и превращает строки результата в экземпляры, избавляя от ручного перевода туда и обратно.
    tags: [basics]
  - id: orm-mental-model-02
    front: На каких трёх уровнях работает отображение ORM?
    back: Класс ↔ таблица (User ↔ users), экземпляр ↔ строка (объект User соответствует одной строке), атрибут ↔ столбец (user.name ↔ столбец name). Перевод в обе стороны берёт на себя библиотека.
    tags: [basics]
  - id: orm-mental-model-03
    front: Как объявляют модель в современном стиле SQLAlchemy 2.x?
    back: Базовый класс наследуют от DeclarativeBase, столбцы объявляют через типизированные аннотации Mapped[...] и mapped_column(...). Имя таблицы задаёт __tablename__, первичный ключ - mapped_column(primary_key=True).
    tags: [models]
  - id: orm-mental-model-04
    front: Чем Mapped[str] отличается от Mapped[str | None] в модели?
    back: Mapped[str] без опций - обязательный (NOT NULL) столбец, Mapped[str | None] делает его необязательным. Аннотация типа задаёт и тип Python, и тип столбца, и обязательность поля.
    tags: [models]
  - id: orm-mental-model-05
    front: Что такое identity map и какое следствие из него вытекает?
    back: В пределах одной сессии каждой строке (по первичному ключу) соответствует ровно один объект Python. Поэтому повторный session.get(User, 1) вернёт тот же объект (u1 is u2), и изменение через u1 сразу видно через u2.
    tags: [internals]
  - id: orm-mental-model-06
    front: Что такое unit of work в сессии SQLAlchemy?
    back: Механизм, при котором сессия не шлёт SQL на каждое присваивание, а отслеживает изменения - какие объекты new (add), dirty (атрибут поменялся), deleted. Накопленное превращается в SQL разом на flush и фиксируется на commit.
    tags: [internals]
  - id: orm-mental-model-07
    front: Что происходит с базой между session.add(user) и session.commit()?
    back: "До flush/commit база не трогается: add лишь помечает объект как new, присваивания обновляют поля в памяти. На commit сессия сгенерирует один INSERT уже с финальными значениями полей."
    tags: [internals]
  - id: orm-mental-model-08
    front: Частая ошибка новичка про присваивание атрибута ORM-объекта.
    back: "Думать, что присваивание сразу пишет в базу. Это не так: unit of work копит изменения и шлёт SQL на flush/commit. Если забыть commit, изменения не сохранятся - как и с raw SQL."
    tags: [pitfalls]
  - id: orm-mental-model-09
    front: Почему ORM называют «дырявой абстракцией»?
    back: "ORM скрывает SQL, но не отменяет его: любая операция в итоге становится запросом. Непонимание, какой именно SQL породил Ваш код, - источник коварных проблем с производительностью (классика - N+1). Поэтому держат echo=True и смотрят генерируемый SQL."
    tags: [pitfalls]
  - id: orm-mental-model-10
    front: Старый стиль Column(...) против нового Mapped[...] - что выбирать?
    back: Оба работают, но Column(Integer, primary_key=True) без аннотаций - это SQLAlchemy 1.x. Новые модели пишут на Mapped[...] / mapped_column(...) ради проверки типов и читаемости.
    tags: [models]
