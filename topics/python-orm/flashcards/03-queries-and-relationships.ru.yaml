conceptId: queries-and-relationships
cards:
  - id: queries-and-relationships-01
    front: Как строят запрос на выборку в SQLAlchemy 2.x?
    back: Запрос начинают с select(Модель) и уточняют методами .where(), .order_by() и другими. Результат - объект-описание запроса; чтобы выполнить его и получить объекты, его передают в session.scalars() или session.execute().
    tags: [queries]
  - id: queries-and-relationships-02
    front: Почему условие пишут как User.age >= 18, а не строкой "age >= 18"?
    back: Атрибут User.age - не число, а объект-столбец с переопределённым оператором >=, порождающим кусок SQL. Поэтому редактор подсказывает имена полей, а опечатка в имени столбца становится ошибкой Python, а не загадочным ответом базы.
    tags: [queries]
  - id: queries-and-relationships-03
    front: Что делает relationship() и чем он отличается от ForeignKey?
    back: ForeignKey объявляет связь на уровне столбца (orders.user_id → users.id), а relationship() - на уровне навигации, превращая связь в атрибут. После этого order.user вернёт объект User, а user.orders - список заказов без ручного JOIN.
    tags: [relationships]
  - id: queries-and-relationships-04
    front: Зачем нужен параметр back_populates в relationship()?
    back: "Он связывает две стороны отношения: добавили заказ в user.orders - и order.user автоматически указывает на этого пользователя. Связь становится двунаправленной и согласованной. Забыть его на одной стороне - связь станет односторонней или рассогласованной."
    tags: [relationships]
  - id: queries-and-relationships-05
    front: Что такое ленивая (lazy) загрузка связи и в чём её опасность?
    back: "Это поведение по умолчанию: связанные объекты не грузятся, пока к ним не обратятся, а первое обращение к user.orders выполняет отдельный SELECT. Удобно для одного объекта, но в цикле по многим превращается в лавину запросов (N+1)."
    tags: [loading]
  - id: queries-and-relationships-06
    front: Что такое жадная (eager) загрузка и через что её просят?
    back: Вы заранее говорите «подгрузи связь вместе с объектами», и SQLAlchemy достаёт всё за один-два запроса. Просят через .options(selectinload(...)) или joinedload(...), например select(User).options(selectinload(User.orders)).
    tags: [loading]
  - id: queries-and-relationships-07
    front: В чём по числу запросов разница между ленивой и жадной загрузкой?
    back: Это разница между «1 + N запросов» (ленивая в цикле) и «2 запроса» (жадная через selectinload). На ней спотыкается большинство новичков в ORM, и она - ключевой фактор производительности.
    tags: [loading]
  - id: queries-and-relationships-08
    front: Почему объявить только ForeignKey без relationship() недостаточно?
    back: "Тогда order.user работать не будет: навигация по связи требует relationship(), а не только внешнего ключа. ForeignKey задаёт связь в базе, relationship() даёт атрибут для хождения по ней."
    tags: [pitfalls]
  - id: queries-and-relationships-09
    front: select() против устаревшего session.query() - что использовать?
    back: "session.query(User).filter(...).all() - легаси-API из SQLAlchemy 1.x, оно ещё работает. В 2.x официально рекомендован конструкторный стиль select(User).where(...) через session.scalars()/execute(): единообразен для ORM и Core, лучше типизируется."
    tags: [queries]
  - id: queries-and-relationships-10
    front: Что стоит за «магией» атрибута user.orders на уровне SQL?
    back: Обычный SQL с соединением или отдельной выборкой по внешнему ключу - тот же JOIN orders ON o.user_id = u.id. ORM генерирует этот SQL за Вас, но какой именно и сколько запросов, зависит от стратегии загрузки.
    tags: [relationships]
