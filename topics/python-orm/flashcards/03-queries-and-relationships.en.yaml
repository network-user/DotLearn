conceptId: queries-and-relationships
cards:
  - id: queries-and-relationships-01
    front: How do you build a selection query in SQLAlchemy 2.x?
    back: Start with select(Model) and refine with .where(), .order_by(), and others. The result is a query description object; to execute it and get objects, pass it to session.scalars() or session.execute().
    tags: [queries]
  - id: queries-and-relationships-02
    front: Why write the condition as User.age >= 18, not the string "age >= 18"?
    back: Attribute User.age is not a number but a column object with overridden >= that produces a piece of SQL. So the editor suggests field names, and a typo in a column name becomes a Python error, not a mysterious database response.
    tags: [queries]
  - id: queries-and-relationships-03
    front: What does relationship() do and how does it differ from ForeignKey?
    back: ForeignKey declares the link at the column level (orders.user_id → users.id); relationship() declares it at the navigation level, turning the link into an attribute. Then order.user returns a User object and user.orders returns orders without a manual JOIN.
    tags: [relationships]
  - id: queries-and-relationships-04
    front: Why is back_populates needed in relationship()?
    back: "It links both sides of the relationship: add an order to user.orders and order.user automatically points to that user. The link becomes bidirectional and consistent. Forgetting it on one side makes the relationship one-sided or inconsistent."
    tags: [relationships]
  - id: queries-and-relationships-05
    front: What is lazy relationship loading and what is its danger?
    back: "Default behavior: related objects are not loaded until accessed, and the first access to user.orders runs a separate SELECT. Fine for one object, but in a loop over many it becomes a flood of queries (N+1)."
    tags: [loading]
  - id: queries-and-relationships-06
    front: What is eager loading and how do you request it?
    back: You say upfront 'load the relationship with the objects', and SQLAlchemy fetches everything in one or two queries. Request via .options(selectinload(...)) or joinedload(...), e.g. select(User).options(selectinload(User.orders)).
    tags: [loading]
  - id: queries-and-relationships-07
    front: How do lazy and eager loading differ in query count?
    back: The difference between '1 + N queries' (lazy in a loop) and '2 queries' (eager via selectinload). Most ORM beginners stumble on this, and it is a key performance factor.
    tags: [loading]
  - id: queries-and-relationships-08
    front: Why is declaring only ForeignKey without relationship() not enough?
    back: "Then order.user will not work: navigating a relationship requires relationship(), not just a foreign key. ForeignKey sets the link in the database; relationship() gives an attribute to walk it."
    tags: [pitfalls]
  - id: queries-and-relationships-09
    front: select() vs legacy session.query() — which to use?
    back: "session.query(User).filter(...).all() is legacy API from SQLAlchemy 1.x; it still works. In 2.x the recommended style is select(User).where(...) via session.scalars()/execute(): uniform for ORM and Core, better typed."
    tags: [queries]
  - id: queries-and-relationships-10
    front: What SQL stands behind the 'magic' of user.orders?
    back: Ordinary SQL with a join or separate selection by foreign key — the same JOIN orders ON o.user_id = u.id. The ORM generates this SQL for you, but which SQL and how many queries depends on the loading strategy.
    tags: [relationships]
