conceptId: n-plus-one-and-pitfalls
cards:
  - id: n-plus-one-and-pitfalls-01
    front: What is the N+1 problem and where does the name come from?
    back: "1 query for a list of objects plus one per each of N elements from lazy relationship access in a loop. For example, SELECT all users plus a separate SELECT for orders on each. Hence 'N+1': 1 + N queries."
    tags: [n-plus-one]
  - id: n-plus-one-and-pitfalls-02
    front: Why is N+1 easy to miss during development?
    back: "On small data tables are tiny: 1 + 5 queries finish in milliseconds. The problem wakes up in production where N is thousands of rows and the database is across the network with latency per query: 1 + 5000 turns an instant page into a multi-second load."
    tags: [n-plus-one, pitfalls]
  - id: n-plus-one-and-pitfalls-03
    front: How do you recognize N+1 in practice?
    back: "From SQL logs: enable echo=True on the engine and watch whether the same query shape repeats dozens of times, differing only in the parameter. N+1 is invisible in Python code — visible only at the query level."
    tags: [n-plus-one, diagnostics]
  - id: n-plus-one-and-pitfalls-04
    front: How do you fix N+1?
    back: "Eager loading: tell the ORM upfront that you will need the relationship via .options(selectinload(User.orders)) or joinedload. Then there are only two queries instead of 1+N — one for users, a second for all their orders at once."
    tags: [n-plus-one]
  - id: n-plus-one-and-pitfalls-05
    front: When to use selectinload vs joinedload?
    back: "selectinload — separate query with WHERE id IN (...), ideal for one-to-many collections: no duplicate rows. joinedload — one query with JOIN, ideal for many-to-one (order.user); on collections it multiplies parent rows by child count."
    tags: [n-plus-one, loading]
  - id: n-plus-one-and-pitfalls-06
    front: What is DetachedInstanceError and when does it occur?
    back: An ORM object is bound to a session; when the session is closed (or did commit with expire), the object becomes detached. Accessing an unloaded lazy relationship on such an object fails with DetachedInstanceError — the relationship tries to hit the database through a dead connection.
    tags: [session, pitfalls]
  - id: n-plus-one-and-pitfalls-07
    front: How do you avoid DetachedInstanceError?
    back: Either access relationships inside with while the session is alive; or preload what you need eagerly via selectinload; or set expire_on_commit=False. Main point — an object's lifetime is bounded by the session's lifetime.
    tags: [session]
  - id: n-plus-one-and-pitfalls-08
    front: Why should you not return 'live' ORM objects outside a session?
    back: Lazy reading of their relationships after the session closes gives DetachedInstanceError. Either load everything needed inside the session, or return simple structures (dicts, dataclass) instead of session-bound models.
    tags: [session]
  - id: n-plus-one-and-pitfalls-09
    front: In which tasks is raw SQL more appropriate than ORM?
    back: Heavy analytics and reports (aggregations, window functions, tricky GROUP BY); bulk operations (UPDATE/DELETE on a million rows in one query is cheaper than loading objects); fine-grained performance tuning for a specific plan or database construct.
    tags: [raw-sql]
  - id: n-plus-one-and-pitfalls-10
    front: Can you run raw SQL inside a SQLAlchemy transaction?
    back: "Yes: session.execute(text(\"...\")) runs raw SQL inside the same transaction. A mature approach is not 'ORM vs SQL' but ORM for object work and raw SQL where it fits better."
    tags: [raw-sql]
