conceptId: raw-sql-in-python
cards:
  - id: raw-sql-in-python-01
    front: What are the three links in the Python DB-API database pipeline?
    back: Connection — channel to a database file or server; Cursor — object through which SQL is sent and answers read; result — rows fetched with fetchone/fetchall or by iterating the cursor.
    tags: [basics]
  - id: raw-sql-in-python-02
    front: How do fetchone, fetchall, and iterating the cursor in a loop differ?
    back: fetchone returns the next single row or None when rows are exhausted; fetchall returns all remaining rows at once as a list; iterating the cursor reads rows one by one without loading the entire result into memory.
    tags: [basics]
  - id: raw-sql-in-python-03
    front: Why is building a query with an f-string a security hole?
    back: "It opens SQL injection: a hostile value like \"'; DROP TABLE users; --\" gets embedded in the text and becomes code the database executes. Data that should have been a value breaks through and changes the query structure."
    tags: [security, pitfalls]
  - id: raw-sql-in-python-04
    front: How do you safely substitute user data in a sqlite3 query?
    back: Leave a placeholder in SQL (question mark ? or named :name) and pass the value as a separate execute argument. The driver sends text and value on separate channels, so quotes and semicolons inside the value stay just characters.
    tags: [security]
  - id: raw-sql-in-python-05
    front: What second problem besides injection does parameterization solve?
    back: Escaping. A name like O'Brien with an apostrophe would break an f-string because the apostrophe closes the SQL string literal. Through a parameter it passes with no escaping worries — special characters stay data.
    tags: [security]
  - id: raw-sql-in-python-06
    front: What is a transaction and why are commit and rollback needed?
    back: "A transaction is an unfinished set of changes not yet committed. commit says 'all good, persist'; rollback cancels everything since the last commit. That gives atomicity: related changes apply together or not at all."
    tags: [transactions]
  - id: raw-sql-in-python-07
    front: What does a with sqlite3.connect(...) block manage — and what does it not?
    back: "It manages the transaction: on exit without exception it commits, on exception it rollbacks. The connection itself is not closed by this block; use contextlib.closing or a connection pool to guarantee closure."
    tags: [transactions, pitfalls]
  - id: raw-sql-in-python-08
    front: Why did INSERT 'work' but there is no data in the database file?
    back: Changes without commit (and outside a with block) live only inside a transaction and roll back when the connection closes. Fix — explicit conn.commit() before closing, or a with block that commits for you.
    tags: [transactions, pitfalls]
  - id: raw-sql-in-python-09
    front: Why does execute("... = ?", name) fail for a single value?
    back: The second argument to execute must be a sequence. For one value write (name,) — with a comma — otherwise it is not a tuple but just parentheses around a string.
    tags: [pitfalls]
  - id: raw-sql-in-python-10
    front: Why is a parameterized query called prepared?
    back: On many databases a query with placeholders is sent once as a template with a 'hole' for the parameter, and values travel in a separate message. The server compiles a plan from the template, the value physically cannot affect structure, and the template is reused for speed.
    tags: [internals]
