conceptId: n-plus-one-and-pitfalls
cards:
  - id: n-plus-one-and-pitfalls-01
    front: Что такое проблема N+1 и откуда берётся её имя?
    back: "Это 1 запрос на список объектов плюс по одному на каждый из N элементов из-за ленивого обращения к связи в цикле. Например, SELECT всех пользователей плюс отдельный SELECT заказов на каждого. Отсюда «N+1»: 1 + N запросов."
    tags: [n-plus-one]
  - id: n-plus-one-and-pitfalls-02
    front: Почему N+1 так легко не заметить на этапе разработки?
    back: "На малых данных таблицы крошечные: 1 + 5 запросов отрабатывают за миллисекунды. Проблема просыпается на проде, где N - тысячи строк, а база за сетью с задержкой на запрос: 1 + 5000 превращает мгновенную страницу в многосекундную."
    tags: [n-plus-one, pitfalls]
  - id: n-plus-one-and-pitfalls-03
    front: Как распознать N+1 на практике?
    back: "По логам SQL: включить echo=True у движка и смотреть, не повторяется ли один и тот же по форме запрос десятки раз, отличаясь только значением параметра. В Python-коде N+1 не виден - он виден только на уровне запросов."
    tags: [n-plus-one, diagnostics]
  - id: n-plus-one-and-pitfalls-04
    front: Чем чинят N+1?
    back: "Жадной загрузкой: заранее сказать ORM, что связь понадобится, через .options(selectinload(User.orders)) или joinedload. Тогда запросов всего два вместо 1+N - один за пользователями, второй за всеми их заказами разом."
    tags: [n-plus-one]
  - id: n-plus-one-and-pitfalls-05
    front: Когда брать selectinload, а когда joinedload?
    back: "selectinload - отдельный запрос с WHERE id IN (...), идеален для коллекций «один-ко-многим»: без дублей строк. joinedload - один запрос с JOIN, идеален для связи «к одному» (order.user); на коллекциях размножает строки родителя по числу детей."
    tags: [n-plus-one, loading]
  - id: n-plus-one-and-pitfalls-06
    front: Что такое DetachedInstanceError и когда он возникает?
    back: Объект ORM привязан к сессии; когда сессия закрыта (или сделала commit с expire), объект становится detached. Обращение к незагруженной ленивой связи у такого объекта падает с DetachedInstanceError - связь пытается сходить в базу через мёртвое соединение.
    tags: [session, pitfalls]
  - id: n-plus-one-and-pitfalls-07
    front: Как избежать DetachedInstanceError?
    back: Либо обращаться к связям внутри with, пока сессия жива; либо заранее загрузить нужное жадно через selectinload; либо настроить expire_on_commit=False. Главное - время жизни объекта ограничено временем жизни сессии.
    tags: [session]
  - id: n-plus-one-and-pitfalls-08
    front: Почему не стоит возвращать «живые» ORM-объекты за пределы сессии?
    back: Ленивое дочитывание их связей после закрытия сессии даёт DetachedInstanceError. Либо загрузите всё нужное внутри сессии, либо отдавайте наружу простые структуры (словари, dataclass), а не привязанные к сессии модели.
    tags: [session]
  - id: n-plus-one-and-pitfalls-09
    front: В каких задачах сырой SQL уместнее ORM?
    back: Тяжёлая аналитика и отчёты (агрегации, оконные функции, хитрые GROUP BY); массовые операции (UPDATE/DELETE по миллиону строк одним запросом дешевле загрузки объектов); тонкая настройка производительности под конкретный план или конструкцию СУБД.
    tags: [raw-sql]
  - id: n-plus-one-and-pitfalls-10
    front: Можно ли выполнить сырой SQL внутри транзакции SQLAlchemy?
    back: "Да: session.execute(text(\"...\")) выполнит сырой SQL внутри той же транзакции. Зрелый подход - не «ORM против SQL», а ORM для объектной работы и сырой SQL там, где он уместнее."
    tags: [raw-sql]
