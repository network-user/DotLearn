exercises:
  - id: nplus1-what-001
    concept: n-plus-one-and-pitfalls
    type: theory-quiz
    difficulty: 1
    prompt: "What is the N+1 problem in ORM?"
    choices:
      - id: a
        text: "1 query for a list of objects plus one query per lazy relationship on each of N elements: 1+N queries total."
      - id: b
        text: "A query that returns one more row than needed."
      - id: c
        text: "An overflow error with N+1 objects in a session."
      - id: d
        text: "A situation where a table has one more column than the schema."
    correct: [a]
    explanation: "One query fetches N objects, then accessing a lazy relationship on each triggers another query: 1+N total. Each query is fast, but their count grows with data, and at large N performance collapses."
    variants:
      - prompt: "Where is the N+1 problem visible if it is invisible in Python code?"
        choices:
          - id: a
            text: "In SQL logs (echo=True): the same query shape repeats dozens of times, only the parameter changes."
          - id: b
            text: "In an error message at startup."
          - id: c
            text: "In compiler output."
          - id: d
            text: "N+1 cannot be detected, only guessed."
        correct: [a]
        explanation: "N+1 is invisible in Python code, but visible in the query stream. With echo=True, a repeating SELECT ... WHERE user_id = ? with different parameters exposes the problem immediately."
      - prompt: "Why is N+1 often missed during development?"
        choices:
          - id: a
            text: "On small test data, 1+N queries finish instantly; the problem shows up in production where N is thousands of rows."
          - id: b
            text: "Because tests deliberately hide it."
          - id: c
            text: "Because ORM disables N+1 in development mode."
          - id: d
            text: "N+1 only appears on an empty database."
        correct: [a]
        explanation: "With tiny tables the difference between 2 and 6 queries is unnoticeable. In production with thousands of rows and network latency, 1+N becomes seconds, so queries are profiled early."

  - id: nplus1-count-predict-001
    concept: n-plus-one-and-pitfalls
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? The counter simulates database queries on lazy access."
    snippet: |
      class FakeDB:
          def __init__(self):
              self.queries = 0
          def all_users(self):
              self.queries += 1
              return [1, 2, 3]
          def orders_of(self, user_id):
              self.queries += 1
              return [user_id * 10]

      db = FakeDB()
      for uid in db.all_users():
          db.orders_of(uid)
      print(db.queries)
    expected:
      kind: stdout
      value: "4"
    hints:
      - "all_users is one query. How many times is orders_of called in the loop for three users?"
      - "1 (list) + 3 (one per user) = N+1 with N=3."
    variants:
      - snippet: |
          class FakeDB:
              def __init__(self):
                  self.queries = 0
              def all_users(self):
                  self.queries += 1
                  return [1, 2, 3, 4, 5]
              def orders_of(self, user_id):
                  self.queries += 1
                  return [user_id * 10]

          db = FakeDB()
          for uid in db.all_users():
              db.orders_of(uid)
          print(db.queries)
        expected:
          kind: stdout
          value: "6"
      - snippet: |
          class FakeDB:
              def __init__(self):
                  self.queries = 0
              def all_users(self):
                  self.queries += 1
                  return [1, 2, 3, 4, 5]
              def orders_of_many(self, ids):
                  self.queries += 1
                  return {i: [i * 10] for i in ids}

          db = FakeDB()
          users = db.all_users()
          db.orders_of_many(users)
          print(db.queries)
        expected:
          kind: stdout
          value: "2"

  - id: eager-strategy-quiz-001
    concept: n-plus-one-and-pitfalls
    type: theory-quiz
    difficulty: 2
    prompt: "You need to eagerly load collection `user.orders` (one-to-many) for many users. Which strategy do you choose?"
    choices:
      - id: a
        text: "selectinload: a separate query with WHERE id IN (...), without duplicating parent rows."
      - id: b
        text: "joinedload: it is always better for any relationship."
      - id: c
        text: "None: collections cannot be loaded eagerly."
      - id: d
        text: "Lazy loading: it is already optimal for collections."
    correct: [a]
    explanation: "For one-to-many collections, selectinload fits: it runs a separate query with an IN condition and does not multiply rows. joinedload via JOIN duplicates parent rows by the number of children, so use it for many-to-one links."
    variants:
      - prompt: "For a many-to-one link (order.user), which eager loading strategy fits?"
        choices:
          - id: a
            text: "joinedload: pulls the related object in the same query via JOIN, without duplication (many-to-one link)."
          - id: b
            text: "selectinload: the only possible option."
          - id: c
            text: "Eager loading to one object is impossible."
          - id: d
            text: "Any lazy strategy."
        correct: [a]
        explanation: "For many-to-one, joinedload is convenient: one query with JOIN adds the related object, and row duplication does not occur because there is one child per parent."

  - id: detached-quiz-001
    concept: n-plus-one-and-pitfalls
    type: theory-quiz
    difficulty: 3
    prompt: "Code reads an object inside `with Session(...)`, but accesses `user.orders` after the block. This often fails with `DetachedInstanceError`. Why?"
    choices:
      - id: a
        text: "After exiting with the session is closed; lazy relationship orders tries to hit the database through a dead connection, but the object is already detached from the session."
      - id: b
        text: "Because orders is always an empty list outside a session."
      - id: c
        text: "Because an object cannot be used twice."
      - id: d
        text: "Because with always deletes the object from memory."
    correct: [a]
    explanation: "An ORM object lives inside a session. After the session closes it becomes detached, and lazy access to an unloaded relationship cannot run SQL. Fixes: access relationships inside the session, preload them eagerly (selectinload), or set expire_on_commit=False."
    variants:
      - prompt: "How do you safely pass data outside a session to avoid DetachedInstanceError?"
        choices:
          - id: a
            text: "Load everything needed inside the session (including relationships eagerly) or return simple structures such as dicts/dataclass, not session-bound models."
          - id: b
            text: "Just ignore the exception with try/except."
          - id: c
            text: "Open a global session for the whole app and never close it."
          - id: d
            text: "Store objects in a global variable."
        correct: [a]
        explanation: "An object's lifetime is bounded by the session. Either read relationships while it is alive (eager loading is safer than lazy), or extract needed fields into simple structures: they do not depend on a connection."

  - id: raw-vs-orm-quiz-001
    concept: n-plus-one-and-pitfalls
    type: theory-quiz
    difficulty: 3
    prompt: "You need to increase price by 10% for a million products. What is reasonable?"
    choices:
      - id: a
        text: "One UPDATE ... SET price = price * 1.1: raw SQL (or Core); loading a million objects in ORM and saving one by one is prohibitively expensive."
      - id: b
        text: "Load all objects into a session, change each in a loop, and commit."
      - id: c
        text: "Drop the table and recreate it with new prices."
      - id: d
        text: "Run UPDATE per product via relationship."
    correct: [a]
    explanation: "Bulk operations are where the ORM load-change-save approach loses by orders of magnitude. One UPDATE ... WHERE changes a million rows in the database without pulling them into memory. ORM is good for object work, but for bulk UPDATE/DELETE and heavy analytics raw SQL fits: runnable via session.execute(text(...)) in the same transaction."
    variants:
      - prompt: "For which task is raw SQL usually more appropriate than ORM?"
        choices:
          - id: a
            text: "Heavy analytics with multi-level aggregations and window functions."
          - id: b
            text: "Reading one object by primary key."
          - id: c
            text: "Creating one new record."
          - id: d
            text: "Changing a couple of fields on a loaded object."
        correct: [a]
        explanation: "Complex analytics (window functions, multi-level GROUP BY) is expressed directly in SQL; through ORM it becomes a fight with the abstraction. For ordinary object work (read, create, targeted edits), ORM is more convenient."
