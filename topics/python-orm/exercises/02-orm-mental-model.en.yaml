exercises:
  - id: orm-maps-what-001
    concept: orm-mental-model
    type: theory-quiz
    difficulty: 1
    prompt: "What does ORM map at the level of a single model class instance?"
    choices:
      - id: a
        text: "An instance corresponds to one table row."
      - id: b
        text: "An instance corresponds to the entire table."
      - id: c
        text: "An instance corresponds to one column."
      - id: d
        text: "An instance corresponds to a database connection."
    correct: [a]
    explanation: "Mapping is three-level: class ↔ table, instance ↔ row, attribute ↔ column. Object User(name='Анна') is one row in table users, and its fields are column values in that row."
    variants:
      - prompt: "What does a model object attribute correspond to?"
        choices:
          - id: a
            text: "A table column."
          - id: b
            text: "An entire row."
          - id: c
            text: "A table name."
          - id: d
            text: "Always the primary key."
        correct: [a]
        explanation: "A model attribute maps to a column: user.name is the value of column name in the row the object represents."
      - prompt: "What does the model class itself correspond to?"
        choices:
          - id: a
            text: "A database table."
          - id: b
            text: "A single row."
          - id: c
            text: "A single query."
          - id: d
            text: "A connection."
        correct: [a]
        explanation: "The class maps to a table (via __tablename__); its instances map to rows in that table."

  - id: orm-model-blanks-001
    concept: orm-mental-model
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the blanks in a SQLAlchemy 2.x model declaration: table users, integer primary key id, and required text name."
    template: |
      from sqlalchemy.orm import DeclarativeBase, Mapped, mapped_column

      class Base(DeclarativeBase):
          pass

      class User(Base):
          {{tablename}} = "users"
          id: Mapped[int] = mapped_column({{pk}})
          name: Mapped[{{type}}]
    blanks:
      tablename:
        accept: ["__tablename__"]
      pk:
        accept: ["primary_key=True"]
        accept_regex: '^primary_key\s*=\s*True$'
      type:
        accept: ["str"]
    hints:
      - "The table name is set by a special class attribute; the primary key is marked with an option inside mapped_column."
      - "The column type is set by the Mapped[...] annotation: for a required text field that is Python's string type."
    variants:
      - prompt: "Fill in the blanks: make field age an optional integer column."
        template: |
          class User(Base):
              __tablename__ = "users"
              id: Mapped[int] = mapped_column(primary_key=True)
              age: Mapped[{{opt_type}}]
        blanks:
          opt_type:
            accept: ["int | None", "Optional[int]"]
            accept_regex: '^(int\s*\|\s*None|Optional\[int\])$'

  - id: identity-map-quiz-001
    concept: orm-mental-model
    type: theory-quiz
    difficulty: 2
    prompt: "In one session you called `session.get(User, 1)` twice. What is returned?"
    choices:
      - id: a
        text: "The same object both times — thanks to the identity map, a row with a given key maps to a single object in the session."
      - id: b
        text: "Two different objects with the same data — the database is queried twice."
      - id: c
        text: "The second call returns None because the object is already loaded."
      - id: d
        text: "An error about duplicate loading occurs."
    correct: [a]
    explanation: "The identity map guarantees that within a session each row (by primary key) maps to exactly one Python object. A repeat query returns the already loaded object, so u1 is u2 is true, and a change through one is visible through the other."
    variants:
      - prompt: "Why is the identity map needed?"
        choices:
          - id: a
            text: "So one row is represented by one object: otherwise copies would diverge and it would be unclear whose changes reach the database."
          - id: b
            text: "To speed up sorting results."
          - id: c
            text: "To forbid changing objects."
          - id: d
            text: "To store passwords separately."
        correct: [a]
        explanation: "One object per row eliminates copy desync and saves repeat loads. A change to the object is immediately visible everywhere it is referenced in the session."

  - id: unit-of-work-quiz-001
    concept: orm-mental-model
    type: theory-quiz
    difficulty: 3
    prompt: "Code: `user = User(name='Вера'); session.add(user); user.age = 30; session.commit()`. When and what SQL hits the database?"
    choices:
      - id: a
        text: "One INSERT with age=30 on flush/commit, because unit of work accumulates changes and turns them into SQL in a batch."
      - id: b
        text: "INSERT on add, then a separate UPDATE on the age assignment."
      - id: c
        text: "Three queries: on constructor, on add, and on assignment."
      - id: d
        text: "Nothing: in-memory objects never reach the database without explicit execute."
    correct: [a]
    explanation: "Unit of work does not send SQL on every action. add marks the object as new, assignment changes the field in memory. On flush (usually before a query) or commit the session generates one INSERT with the final value age=30. You describe the desired state; the session decides which queries achieve it."
    variants:
      - prompt: "Why does `user.age = 30` by itself not touch the database?"
        choices:
          - id: a
            text: "The session only marks the object as changed (dirty); real SQL is formed later on flush/commit."
          - id: b
            text: "Because age is an optional field."
          - id: c
            text: "Because the object is not saved yet and assignments are ignored."
          - id: d
            text: "Assignment always sends UPDATE immediately."
        correct: [a]
        explanation: "Change tracking defers SQL: the object is marked dirty and the query goes out in a batch on flush/commit. That reduces database round trips and lets changes be combined."
