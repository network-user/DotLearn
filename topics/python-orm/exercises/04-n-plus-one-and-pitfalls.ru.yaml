exercises:
  - id: nplus1-what-001
    concept: n-plus-one-and-pitfalls
    type: theory-quiz
    difficulty: 1
    prompt: "Что такое проблема N+1 в ORM?"
    choices:
      - id: a
        text: "1 запрос за списком объектов плюс по одному запросу на ленивую связь каждого из N элементов - итого 1+N запросов."
      - id: b
        text: "Запрос, возвращающий на одну строку больше, чем нужно."
      - id: c
        text: "Ошибка переполнения при N+1 объектах в сессии."
      - id: d
        text: "Ситуация, когда таблица содержит на один столбец больше схемы."
    correct: [a]
    explanation: "Один запрос достаёт N объектов, а затем обращение к ленивой связи у каждого порождает ещё по запросу - всего 1+N. Каждый запрос быстрый, но их количество растёт с данными, и на больших N это убивает производительность."
    variants:
      - prompt: "Где видно проблему N+1, если в Python-коде она незаметна?"
        choices:
          - id: a
            text: "В логах SQL (echo=True): один и тот же по форме запрос повторяется десятки раз, меняется лишь параметр."
          - id: b
            text: "В сообщении об ошибке при запуске."
          - id: c
            text: "В выводе компилятора."
          - id: d
            text: "N+1 нельзя обнаружить, можно только угадать."
        correct: [a]
        explanation: "N+1 не виден в Python-коде - он виден в потоке запросов. С echo=True повторяющийся SELECT ... WHERE user_id = ? с разными параметрами выдаёт проблему сразу."
      - prompt: "Почему N+1 часто не замечают при разработке?"
        choices:
          - id: a
            text: "На малых тестовых данных 1+N запросов отрабатывают мгновенно; проблема просыпается на проде, где N - тысячи строк."
          - id: b
            text: "Потому что тесты его специально скрывают."
          - id: c
            text: "Потому что ORM отключает N+1 в режиме разработки."
          - id: d
            text: "N+1 проявляется только на пустой базе."
        correct: [a]
        explanation: "При крошечных таблицах разница между 2 и 6 запросами незаметна. На проде с тысячами строк и сетевой задержкой 1+N превращается в секунды - поэтому запросы профилируют заранее."

  - id: nplus1-count-predict-001
    concept: n-plus-one-and-pitfalls
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Счётчик имитирует число запросов к базе при ленивом доступе."
    snippet: |
      class FakeDB:
          def __init__(self):
              self.queries = 0
          def all_users(self):
              self.queries += 1
              return [1, 2, 3]
          def orders_of(self, user_id):
              self.queries += 1
              return [user_id * 10]

      db = FakeDB()
      for uid in db.all_users():
          db.orders_of(uid)
      print(db.queries)
    expected:
      kind: stdout
      value: "4"
    hints:
      - "all_users - это один запрос. Сколько раз в цикле вызывается orders_of для трёх пользователей?"
      - "1 (список) + 3 (по одному на пользователя) = N+1 при N=3."
    variants:
      - snippet: |
          class FakeDB:
              def __init__(self):
                  self.queries = 0
              def all_users(self):
                  self.queries += 1
                  return [1, 2, 3, 4, 5]
              def orders_of(self, user_id):
                  self.queries += 1
                  return [user_id * 10]

          db = FakeDB()
          for uid in db.all_users():
              db.orders_of(uid)
          print(db.queries)
        expected:
          kind: stdout
          value: "6"
      - snippet: |
          class FakeDB:
              def __init__(self):
                  self.queries = 0
              def all_users(self):
                  self.queries += 1
                  return [1, 2, 3, 4, 5]
              def orders_of_many(self, ids):
                  self.queries += 1
                  return {i: [i * 10] for i in ids}

          db = FakeDB()
          users = db.all_users()
          db.orders_of_many(users)
          print(db.queries)
        expected:
          kind: stdout
          value: "2"

  - id: eager-strategy-quiz-001
    concept: n-plus-one-and-pitfalls
    type: theory-quiz
    difficulty: 2
    prompt: "Нужно жадно загрузить коллекцию `user.orders` (один-ко-многим) у множества пользователей. Какую стратегию выбрать?"
    choices:
      - id: a
        text: "selectinload - отдельный запрос с WHERE id IN (...), не дублирующий строки родителя."
      - id: b
        text: "joinedload - он всегда лучше для любых связей."
      - id: c
        text: "Никакую: коллекции нельзя загружать жадно."
      - id: d
        text: "Ленивую загрузку - она и так оптимальна для коллекций."
    correct: [a]
    explanation: "Для коллекций «один-ко-многим» подходит selectinload: он выполняет отдельный запрос с условием IN и не размножает строки. joinedload через JOIN на коллекциях дублирует строки родителя по числу детей, поэтому его берут для связей «к одному»."
    variants:
      - prompt: "Для связи «к одному» (order.user) какая стратегия жадной загрузки уместнее?"
        choices:
          - id: a
            text: "joinedload - подтягивает связанный объект тем же запросом через JOIN, без дублирования (связь к одному)."
          - id: b
            text: "selectinload - единственно возможный вариант."
          - id: c
            text: "Жадная загрузка к одному объекту невозможна."
          - id: d
            text: "Любая ленивая стратегия."
        correct: [a]
        explanation: "Для связи «к одному» joinedload удобен: один запрос с JOIN добавляет связанный объект, и дублирования строк не возникает, потому что на родителя приходится один ребёнок."

  - id: detached-quiz-001
    concept: n-plus-one-and-pitfalls
    type: theory-quiz
    difficulty: 3
    prompt: "Код читает объект внутри `with Session(...)`, а к `user.orders` обращается уже после блока. Часто это падает с `DetachedInstanceError`. Почему?"
    choices:
      - id: a
        text: "После выхода из with сессия закрыта; ленивая связь orders пытается сходить в базу через мёртвое соединение, но объект уже оторван от сессии."
      - id: b
        text: "Потому что orders - это всегда пустой список вне сессии."
      - id: c
        text: "Потому что объект нельзя использовать дважды."
      - id: d
        text: "Потому что with всегда удаляет объект из памяти."
    correct: [a]
    explanation: "Объект ORM живёт внутри сессии. После закрытия сессии он становится detached, и ленивое обращение к незагруженной связи не может выполнить SQL. Лекарства: обращаться к связям внутри сессии, заранее загрузить их жадно (selectinload), либо настроить expire_on_commit=False."
    variants:
      - prompt: "Как безопасно отдать данные за пределы сессии, чтобы избежать DetachedInstanceError?"
        choices:
          - id: a
            text: "Загрузить всё нужное внутри сессии (в т.ч. связи жадно) или вернуть наружу простые структуры - словари/dataclass, а не привязанные к сессии модели."
          - id: b
            text: "Просто игнорировать исключение через try/except."
          - id: c
            text: "Открыть глобальную сессию на всё приложение и никогда не закрывать."
          - id: d
            text: "Хранить объекты в глобальной переменной."
        correct: [a]
        explanation: "Время жизни объекта ограничено сессией. Либо дочитайте связи, пока она жива (жадная загрузка надёжнее ленивой), либо извлеките нужные поля в простые структуры и отдайте их - они не зависят от соединения."

  - id: raw-vs-orm-quiz-001
    concept: n-plus-one-and-pitfalls
    type: theory-quiz
    difficulty: 3
    prompt: "Нужно увеличить цену на 10% у миллиона товаров. Что разумнее?"
    choices:
      - id: a
        text: "Один UPDATE ... SET price = price * 1.1 - сырой SQL (или Core); загружать миллион объектов в ORM и сохранять по одному недопустимо дорого."
      - id: b
        text: "Загрузить все объекты в сессию, изменить каждый в цикле и сделать commit."
      - id: c
        text: "Удалить таблицу и создать заново с новыми ценами."
      - id: d
        text: "Сделать по UPDATE на каждый товар через relationship."
    correct: [a]
    explanation: "Массовые операции - случай, где ORM-подход «загрузи-измени-сохрани» проигрывает на порядки. Один UPDATE ... WHERE меняет миллион строк в базе, не таща их в память. ORM хорош для объектной работы, но для массовых UPDATE/DELETE и тяжёлой аналитики уместнее сырой SQL - его можно выполнить и через session.execute(text(...)) в той же транзакции."
    variants:
      - prompt: "Для какой задачи сырой SQL обычно уместнее ORM?"
        choices:
          - id: a
            text: "Тяжёлая аналитика с многоуровневыми агрегациями и оконными функциями."
          - id: b
            text: "Чтение одного объекта по первичному ключу."
          - id: c
            text: "Создание одной новой записи."
          - id: d
            text: "Изменение пары полей у загруженного объекта."
        correct: [a]
        explanation: "Сложная аналитика (оконные функции, многоуровневые GROUP BY) выражается на SQL прямо, а через ORM превращается в борьбу с абстракцией. Для обычной объектной работы - чтения, создания, точечных правок - удобнее ORM."
