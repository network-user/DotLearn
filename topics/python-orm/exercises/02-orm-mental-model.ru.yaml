exercises:
  - id: orm-maps-what-001
    concept: orm-mental-model
    type: theory-quiz
    difficulty: 1
    prompt: "Что отображает ORM на уровне одного экземпляра класса-модели?"
    choices:
      - id: a
        text: "Экземпляр соответствует одной строке таблицы."
      - id: b
        text: "Экземпляр соответствует всей таблице целиком."
      - id: c
        text: "Экземпляр соответствует одному столбцу."
      - id: d
        text: "Экземпляр соответствует соединению с базой."
    correct: [a]
    explanation: "Отображение трёхуровневое: класс ↔ таблица, экземпляр ↔ строка, атрибут ↔ столбец. Объект User(name='Анна') - это одна строка таблицы users, а его поля - значения столбцов этой строки."
    variants:
      - prompt: "Чему соответствует атрибут объекта-модели?"
        choices:
          - id: a
            text: "Столбцу таблицы."
          - id: b
            text: "Целой строке."
          - id: c
            text: "Имени таблицы."
          - id: d
            text: "Первичному ключу всегда."
        correct: [a]
        explanation: "Атрибут модели отображается на столбец: user.name - это значение столбца name в строке, которую представляет объект."
      - prompt: "Чему соответствует сам класс-модель?"
        choices:
          - id: a
            text: "Таблице в базе данных."
          - id: b
            text: "Одной строке."
          - id: c
            text: "Одному запросу."
          - id: d
            text: "Соединению."
        correct: [a]
        explanation: "Класс отображается на таблицу (через __tablename__), его экземпляры - на строки этой таблицы."

  - id: orm-model-blanks-001
    concept: orm-mental-model
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски в объявлении модели SQLAlchemy 2.x: таблица users, целочисленный первичный ключ id и обязательное текстовое имя."
    template: |
      from sqlalchemy.orm import DeclarativeBase, Mapped, mapped_column

      class Base(DeclarativeBase):
          pass

      class User(Base):
          {{tablename}} = "users"
          id: Mapped[int] = mapped_column({{pk}})
          name: Mapped[{{type}}]
    blanks:
      tablename:
        accept: ["__tablename__"]
      pk:
        accept: ["primary_key=True"]
        accept_regex: '^primary_key\s*=\s*True$'
      type:
        accept: ["str"]
    hints:
      - "Имя таблицы задаётся специальным атрибутом класса; первичный ключ помечается опцией внутри mapped_column."
      - "Тип столбца задаётся аннотацией Mapped[...]: для обязательного текстового поля это строковый тип Python."
    variants:
      - prompt: "Заполните пропуски: сделайте поле age необязательным целым столбцом."
        template: |
          class User(Base):
              __tablename__ = "users"
              id: Mapped[int] = mapped_column(primary_key=True)
              age: Mapped[{{opt_type}}]
        blanks:
          opt_type:
            accept: ["int | None", "Optional[int]"]
            accept_regex: '^(int\s*\|\s*None|Optional\[int\])$'

  - id: identity-map-quiz-001
    concept: orm-mental-model
    type: theory-quiz
    difficulty: 2
    prompt: "В одной сессии Вы дважды вызвали `session.get(User, 1)`. Что вернётся?"
    choices:
      - id: a
        text: "Один и тот же объект оба раза - благодаря identity map строке с данным ключом соответствует единственный объект в сессии."
      - id: b
        text: "Два разных объекта с одинаковыми данными - база опрашивается дважды."
      - id: c
        text: "Второй вызов вернёт None, потому что объект уже загружен."
      - id: d
        text: "Возникнет ошибка о повторной загрузке."
    correct: [a]
    explanation: "Identity map гарантирует, что в пределах сессии каждой строке (по первичному ключу) соответствует ровно один объект Python. Повторный запрос вернёт уже загруженный объект, поэтому u1 is u2 истинно, а изменение через один виден через другой."
    variants:
      - prompt: "Зачем нужен identity map?"
        choices:
          - id: a
            text: "Чтобы одна строка была представлена одним объектом: иначе копии разошлись бы и было бы неясно, чьи изменения попадут в базу."
          - id: b
            text: "Чтобы ускорить сортировку результатов."
          - id: c
            text: "Чтобы запретить изменение объектов."
          - id: d
            text: "Чтобы хранить пароли отдельно."
        correct: [a]
        explanation: "Единственный объект на строку устраняет рассинхронизацию копий и экономит повторные загрузки. Изменение объекта сразу видно везде, где на него ссылаются в сессии."

  - id: unit-of-work-quiz-001
    concept: orm-mental-model
    type: theory-quiz
    difficulty: 3
    prompt: "Код: `user = User(name='Вера'); session.add(user); user.age = 30; session.commit()`. Когда и какой SQL уйдёт в базу?"
    choices:
      - id: a
        text: "Один INSERT уже с age=30 - на flush/commit, потому что unit of work копит изменения и переводит их в SQL разом."
      - id: b
        text: "INSERT на add, затем отдельный UPDATE на присваивании age."
      - id: c
        text: "Три запроса: на конструктор, на add и на присваивание."
      - id: d
        text: "Ничего: объекты в памяти никогда не попадают в базу без явного execute."
    correct: [a]
    explanation: "Unit of work не шлёт SQL на каждое действие. add помечает объект новым, присваивание меняет поле в памяти. На flush (обычно перед запросом) или commit сессия генерирует один INSERT с финальным значением age=30. Вы описываете желаемое состояние, а сессия решает, какими запросами его достичь."
    variants:
      - prompt: "Почему присваивание `user.age = 30` само по себе не обращается к базе?"
        choices:
          - id: a
            text: "Сессия лишь помечает объект как изменённый (dirty); реальный SQL формируется позже, на flush/commit."
          - id: b
            text: "Потому что age - необязательное поле."
          - id: c
            text: "Потому что объект ещё не сохранён, и присваивания игнорируются."
          - id: d
            text: "Присваивание всегда шлёт UPDATE немедленно."
        correct: [a]
        explanation: "Отслеживание изменений откладывает SQL: объект помечается dirty, а запрос уходит пачкой на flush/commit. Это снижает число обращений к базе и позволяет объединять изменения."
