exercises:
  - id: select-what-001
    concept: queries-and-relationships
    type: theory-quiz
    difficulty: 1
    prompt: "What is `select(User).where(User.age >= 18)` in SQLAlchemy 2.x?"
    choices:
      - id: a
        text: "A query description object, executed separately via session.scalars()/execute()."
      - id: b
        text: "An already executed query with a list of rows inside."
      - id: c
        text: "An SQL string ready to send."
      - id: d
        text: "A database connection."
    correct: [a]
    explanation: "select() assembles a query description object piece by piece (.where, .order_by). By itself it executes nothing; the query hits the database only when passed to session.scalars() or session.execute()."
    variants:
      - prompt: "How does condition `User.age >= 18` differ from string `\"age >= 18\"`?"
        choices:
          - id: a
            text: "It is an expression from a column attribute: operator >= produces SQL, the editor suggests names, and a typo is caught as a Python error."
          - id: b
            text: "Nothing: they are two ways to write the same thing."
          - id: c
            text: "The string executes faster."
          - id: d
            text: "The expression works only with numeric columns."
        correct: [a]
        explanation: "User.age is a column object with overridden >= that produces a piece of SQL. So autocomplete and name checking work: a typo in a field name is a Python error, not a silently wrong database answer."
      - prompt: "How do you execute a built select() in SQLAlchemy 2.x to get model objects?"
        choices:
          - id: a
            text: "session.scalars(stmt) (or session.execute(stmt))."
          - id: b
            text: "select.run()."
          - id: c
            text: "stmt.fetchall() directly."
          - id: d
            text: "print(stmt)."
        correct: [a]
        explanation: "Pass the query object to the session: session.scalars(stmt) returns model objects, session.execute(stmt) returns result rows. select() only describes the query."

  - id: join-count-predict-001
    concept: queries-and-relationships
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? This is the SQL behind the user.orders relationship."
    snippet: |
      import sqlite3

      conn = sqlite3.connect(":memory:")
      cur = conn.cursor()
      cur.execute("CREATE TABLE users (id INTEGER, name TEXT)")
      cur.execute("CREATE TABLE orders (id INTEGER, user_id INTEGER, amount INTEGER)")
      cur.execute("INSERT INTO users VALUES (1, 'Анна'), (2, 'Борис')")
      cur.execute("INSERT INTO orders VALUES (10, 1, 500), (11, 1, 300), (12, 2, 200)")

      rows = cur.execute(
          "SELECT u.name, COUNT(o.id) FROM users u "
          "JOIN orders o ON o.user_id = u.id "
          "GROUP BY u.name ORDER BY u.name"
      ).fetchall()
      print(rows)
    expected:
      kind: stdout
      value: "[('Анна', 2), ('Борис', 1)]"
    hints:
      - "JOIN pairs each orders row with its user by user_id, then GROUP BY collects orders by user name."
      - "Анна (id=1) has two orders, Борис (id=2) has one. ORDER BY u.name sorts alphabetically."
    variants:
      - snippet: |
          import sqlite3

          conn = sqlite3.connect(":memory:")
          cur = conn.cursor()
          cur.execute("CREATE TABLE users (id INTEGER, name TEXT)")
          cur.execute("CREATE TABLE orders (id INTEGER, user_id INTEGER, amount INTEGER)")
          cur.execute("INSERT INTO users VALUES (1, 'Анна'), (2, 'Борис')")
          cur.execute("INSERT INTO orders VALUES (10, 1, 500), (11, 1, 300), (12, 2, 200)")

          rows = cur.execute(
              "SELECT u.name, SUM(o.amount) FROM users u "
              "JOIN orders o ON o.user_id = u.id "
              "GROUP BY u.name ORDER BY u.name"
          ).fetchall()
          print(rows)
        expected:
          kind: stdout
          value: "[('Анна', 800), ('Борис', 200)]"

  - id: select-blanks-001
    concept: queries-and-relationships
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the blanks: select users older than 18, sorted by name."
    template: |
      from sqlalchemy import select

      stmt = (
          select(User)
          .{{filter}}(User.age >= 18)
          .{{sort}}(User.name)
      )
      adults = session.scalars(stmt).all()
    blanks:
      filter:
        accept: ["where"]
      sort:
        accept: ["order_by"]
    hints:
      - "In 2.x style, filter and sort are added with methods on the select builder, not SQL keywords."
      - "The filter method is named like the corresponding SQL clause in English; sorting uses ORDER BY as one identifier with an underscore."
    variants:
      - prompt: "Fill in the blank: declare the relationship on User so its reverse side on Order is named user."
        template: |
          class User(Base):
              __tablename__ = "users"
              id: Mapped[int] = mapped_column(primary_key=True)
              orders: Mapped[list["Order"]] = relationship({{back}}="user")
        blanks:
          back:
            accept: ["back_populates"]

  - id: lazy-eager-quiz-001
    concept: queries-and-relationships
    type: theory-quiz
    difficulty: 3
    prompt: "By default you iterate over a list of 100 users and read `user.orders` for each. How many database queries does this cause and why?"
    choices:
      - id: a
        text: "1 for fetching users plus one per user on first access to orders, for 101 total (N+1 problem) due to lazy loading."
      - id: b
        text: "Exactly 1 query: ORM always loads relationships with objects."
      - id: c
        text: "Exactly 2 queries regardless of user count."
      - id: d
        text: "100 queries: one per user; fetching the list is free."
    correct: [a]
    explanation: "Relationships are lazy by default: orders are not loaded until accessed. One query fetches 100 users, then the first access to user.orders for each runs a separate SELECT, totaling 1 + 100 = 101 queries. That is N+1; fix it with eager loading via selectinload/joinedload."
    variants:
      - prompt: "What does `select(User).options(selectinload(User.orders))` do?"
        choices:
          - id: a
            text: "Eagerly preloads orders for all selected users in an extra query, instead of a separate SELECT per user."
          - id: b
            text: "Disables the orders relationship on users."
          - id: c
            text: "Sorts users by order count."
          - id: d
            text: "Deletes orders on fetch."
        correct: [a]
        explanation: "selectinload requests eager loading: SQLAlchemy fetches users, then loads orders for all of them in one query. That is 2 queries instead of 1+N (a direct cure for N+1)."
