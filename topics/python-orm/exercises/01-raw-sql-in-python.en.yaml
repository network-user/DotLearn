exercises:
  - id: why-params-001
    concept: raw-sql-in-python
    type: theory-quiz
    difficulty: 1
    prompt: "Why pass user data through a `?` placeholder instead of embedding it in the query text with an f-string?"
    choices:
      - id: a
        text: "The query is shorter and faster to type that way."
      - id: b
        text: "So data cannot become part of the query code — that protects against SQL injection."
      - id: c
        text: "f-strings are forbidden by Python syntax inside `execute`."
      - id: d
        text: "The `?` placeholder automatically sorts the result."
    correct: [b]
    explanation: "With a parameter, SQL text and value reach the database separately: the value cannot change the query structure, no matter what quotes or semicolons it contains. An f-string embeds data directly in the text, and a hostile value becomes code."
    variants:
      - prompt: "What happens with `cur.execute(f\"SELECT * FROM users WHERE name = '{name}'\")` when `name` is `\"'; DROP TABLE users; --\"`?"
        choices:
          - id: a
            text: "The database returns an empty result; the table is intact."
          - id: b
            text: "Python raises SyntaxError before the query runs."
          - id: c
            text: "The text assembles two queries and the users table may be dropped — that is SQL injection."
          - id: d
            text: "The query runs as a search for a user with that name."
        correct: [c]
        explanation: "The f-string embeds the quote and semicolon in the text, turning data into an extra command. The database runs both SELECT and DROP TABLE. With a parameter, that string would stay a harmless search value."
      - prompt: "A user's name is `O'Brien` (with an apostrophe). Which way to pass it to the query is correct?"
        choices:
          - id: a
            text: "f-string: `f\"... name = '{name}'\"` — the apostrophe inside is safe."
          - id: b
            text: "Parameter: `execute(\"... name = ?\", (name,))` — the driver sends the value separately."
          - id: c
            text: "No way: names with apostrophes cannot be stored in an SQL database."
          - id: d
            text: "Only by manually doubling the apostrophe in Python code."
        correct: [b]
        explanation: "With a parameter, an apostrophe inside the value does not break syntax: query text and value are separate. An f-string would close the string literal on the apostrophe and break the query."

  - id: select-fetch-output-001
    concept: raw-sql-in-python
    type: predict-output
    difficulty: 2
    prompt: "What does this program print?"
    snippet: |
      import sqlite3

      conn = sqlite3.connect(":memory:")
      cur = conn.cursor()
      cur.execute("CREATE TABLE t (id INTEGER, name TEXT)")
      cur.execute("INSERT INTO t (id, name) VALUES (1, 'a'), (2, 'b'), (3, 'c')")
      rows = cur.execute("SELECT name FROM t WHERE id >= 2 ORDER BY id").fetchall()
      print(rows)
    expected:
      kind: stdout
      value: "[('b',), ('c',)]"
    hints:
      - "fetchall collects result rows into a list; each row is a tuple, even with a single column."
      - "Trace which rows pass id >= 2, and remember a single-column row still prints as a tuple with a trailing comma."
    variants:
      - snippet: |
          import sqlite3

          conn = sqlite3.connect(":memory:")
          cur = conn.cursor()
          cur.execute("CREATE TABLE t (id INTEGER, name TEXT)")
          cur.execute("INSERT INTO t (id, name) VALUES (1, 'a'), (2, 'b'), (3, 'c')")
          row = cur.execute("SELECT id, name FROM t WHERE name = 'b'").fetchone()
          print(row)
        expected:
          kind: stdout
          value: "(2, 'b')"
      - snippet: |
          import sqlite3

          conn = sqlite3.connect(":memory:")
          cur = conn.cursor()
          cur.execute("CREATE TABLE t (id INTEGER, name TEXT)")
          cur.execute("INSERT INTO t (id, name) VALUES (1, 'a'), (2, 'b')")
          row = cur.execute("SELECT name FROM t WHERE id = 99").fetchone()
          print(row)
        expected:
          kind: stdout
          value: "None"

  - id: param-blanks-001
    concept: raw-sql-in-python
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the call so `name` is passed as a safe parameter, not embedded in the text."
    template: |
      name = "Анна"
      rows = cur.execute(
          "SELECT * FROM users WHERE name = {{placeholder}}",
          {{args}},
      ).fetchall()
    blanks:
      placeholder:
        accept: ["?"]
      args:
        accept: ["(name,)"]
        accept_regex: '^\(name,\)$'
    hints:
      - "Query text must not depend on the contents of name: leave a placeholder where the value goes and pass the value as a separate argument."
      - "In sqlite3 the placeholder is a question mark, and a single value is passed as a one-element tuple (do not forget the comma)."
    variants:
      - prompt: "Complete the call with named placeholder `:age`, passing the value as a dict."
        template: |
          age = 18
          rows = cur.execute(
              "SELECT * FROM users WHERE age > {{placeholder}}",
              {{args}},
          ).fetchall()
        blanks:
          placeholder:
            accept: [":age"]
          args:
            accept: ['{"age": age}']
            accept_regex: '^\{\s*"age"\s*:\s*age\s*\}$'
      - prompt: "Complete the INSERT so both values are passed as parameters."
        template: |
          cur.execute(
              "INSERT INTO users (name, age) VALUES ({{p1}}, {{p2}})",
              ("Вера", 29),
          )
        blanks:
          p1:
            accept: ["?"]
          p2:
            accept: ["?"]

  - id: transaction-output-001
    concept: raw-sql-in-python
    type: predict-output
    difficulty: 3
    prompt: "What does this program print? Pay attention to rollback."
    snippet: |
      import sqlite3

      conn = sqlite3.connect(":memory:")
      cur = conn.cursor()
      cur.execute("CREATE TABLE acc (id INTEGER, balance INTEGER)")
      cur.execute("INSERT INTO acc VALUES (1, 100)")
      conn.commit()

      cur.execute("UPDATE acc SET balance = balance - 50 WHERE id = 1")
      conn.rollback()

      print(cur.execute("SELECT balance FROM acc WHERE id = 1").fetchone()[0])
    expected:
      kind: stdout
      value: "100"
    hints:
      - "commit fixes state; everything after it lives in an open transaction until committed."
      - "rollback cancels all changes since the last commit. What balance was fixed by the last commit?"
    variants:
      - snippet: |
          import sqlite3

          conn = sqlite3.connect(":memory:")
          cur = conn.cursor()
          cur.execute("CREATE TABLE acc (id INTEGER, balance INTEGER)")
          cur.execute("INSERT INTO acc VALUES (1, 100)")
          conn.commit()

          cur.execute("UPDATE acc SET balance = balance - 50 WHERE id = 1")
          conn.commit()
          cur.execute("UPDATE acc SET balance = balance - 30 WHERE id = 1")
          conn.rollback()

          print(cur.execute("SELECT balance FROM acc WHERE id = 1").fetchone()[0])
        expected:
          kind: stdout
          value: "50"

  - id: safe-find-user-001
    concept: raw-sql-in-python
    type: python-function
    difficulty: 4
    prompt: "Implement `find_user(conn, name)`: return the age of the user with the given `name` from table `users(name, age)`, or `-1` if not found. The query must be parameterized."
    starter: |
      def find_user(conn, name):
          ...

      def make_conn():
          import sqlite3
          conn = sqlite3.connect(":memory:")
          conn.execute("CREATE TABLE users (name TEXT, age INTEGER)")
          conn.execute("INSERT INTO users VALUES ('Анна', 30), ('Борис', 17)")
          conn.commit()
          return conn
    cases:
      - call: "find_user(make_conn(), 'Анна')"
        expect: 30
      - call: "find_user(make_conn(), 'Борис')"
        expect: 17
      - call: "find_user(make_conn(), 'Глеб')"
        expect: -1
      - call: "find_user(make_conn(), \"'; DROP TABLE users; --\")"
        expect: -1
    hints:
      - "Think about what to return when there is no row: fetchone returns None in that case, and you cannot index it blindly."
      - "Get a cursor, run SELECT with placeholder ? and tuple (name,), call fetchone and handle None carefully."
      - "fetchone returns either a one-element tuple or None — check for None before indexing with [0]."
    solution: |
      def find_user(conn, name):
          cur = conn.cursor()
          row = cur.execute(
              "SELECT age FROM users WHERE name = ?",
              (name,),
          ).fetchone()
          return row[0] if row is not None else -1

      def make_conn():
          import sqlite3
          conn = sqlite3.connect(":memory:")
          conn.execute("CREATE TABLE users (name TEXT, age INTEGER)")
          conn.execute("INSERT INTO users VALUES ('Анна', 30), ('Борис', 17)")
          conn.commit()
          return conn
