exercises:
  - id: jsx-attr-blanks-001
    concept: jsx
    type: fill-in-blanks
    difficulty: 1
    prompt: "JSX похож на HTML, но имена некоторых атрибутов другие. Впишите правильное имя атрибута класса."
    template: |
      function Card() {
        return <div {{attr}}="card">Карточка</div>;
      }
    blanks:
      attr:
        accept: ['className']
    explanation: "В JSX слово class занято под ключевое слово JavaScript, поэтому атрибут класса пишут как className."
    hints:
      - "JSX - это JavaScript. Какое слово там уже зарезервировано и потому не годится для имени атрибута класса?"
    variants:
      - prompt: "Впишите правильное имя атрибута, связывающего подпись с полем (в HTML это for)."
        template: |
          function Field() {
            return <label {{attr}}="email">Почта</label>;
          }
        blanks:
          attr:
            accept: ['htmlFor']
      - prompt: "Атрибут alt в JSX не переименовывается. Впишите имя атрибута с описанием картинки."
        template: |
          function Avatar({ photo }) {
            return <img src={photo} {{attr}}="Аватар" />;
          }
        blanks:
          attr:
            accept: ['alt']

  - id: jsx-braces-blanks-001
    concept: jsx
    type: fill-in-blanks
    difficulty: 2
    prompt: "Чтобы подставить значение переменной в разметку, его обрамляют фигурными скобками. Допишите открывающую и закрывающую скобки вокруг name."
    template: |
      const name = 'Анна';
      const el = <p>Привет, {{open}}name{{close}}!</p>;
    blanks:
      open:
        accept: ['{']
      close:
        accept: ['}']
    explanation: "Без скобок <p>Привет, name!</p> вывел бы буквально слово name. Фигурные скобки впускают в разметку выражение JavaScript, и React подставит значение переменной."
    hints:
      - "Как отличить «подставь значение переменной» от «выведи это слово буквально»? Какой символ открывает вставку выражения в JSX?"
    variants:
      - prompt: "Подставьте в разметку результат выражения qty * price. Допишите скобки."
        template: |
          const qty = 3;
          const price = 250;
          const el = <p>Итого: {{open}}qty * price{{close}} ₽</p>;
        blanks:
          open:
            accept: ['{']
          close:
            accept: ['}']
      - prompt: "Подставьте в разметку поле user.city. Допишите скобки."
        template: |
          const user = { city: 'Казань' };
          const el = <p>Город: {{open}}user.city{{close}}</p>;
        blanks:
          open:
            accept: ['{']
          close:
            accept: ['}']

  - id: jsx-render-predict-001
    concept: jsx
    type: predict-output
    difficulty: 2
    prompt: "Данные: name = 'Анна', qty = 3, price = 250. Какой текст окажется на экране?"
    snippet: |
      const name = 'Анна';
      const qty = 3;
      const price = 250;
      const el = <p>{name}: {qty} × {price} = {qty * price} ₽</p>;
    expected:
      kind: stdout
      value: "Анна: 3 × 250 = 750 ₽"
    explanation: "Каждая пара фигурных скобок вычисляется и подставляется: name даёт «Анна», qty * price даёт 750. Текст между скобками остаётся как есть."
    hints:
      - "Пройдите по строке слева направо: сохраняйте буквальный текст, а каждое выражение в скобках заменяйте его значением."
    variants:
      - prompt: "Что окажется на экране? Помните: false и null не рисуют ничего."
        snippet: |
          const liked = false;
          const el = <p>Лайков: {liked}{5}</p>;
        expected:
          kind: stdout
          value: "Лайков: 5"
      - prompt: "Массив cart пуст. Что появится на экране?"
        snippet: |
          const cart = [];
          const el = <div>Товаров: {cart.length}</div>;
        expected:
          kind: stdout
          value: "Товаров: 0"

  - id: jsx-rules-001
    concept: jsx
    type: theory-quiz
    difficulty: 3
    prompt: "Какое утверждение о JSX верно?"
    choices:
      - id: a
        text: "В фигурные скобки идёт выражение, а не инструкция: if и for туда поставить нельзя."
      - id: b
        text: "JSX - это строка HTML, которую React вставляет через innerHTML."
      - id: c
        text: "Атрибут класса в JSX пишут словом class, как в HTML."
      - id: d
        text: "Из компонента можно вернуть два соседних тега без общей обёртки."
    correct: [a]
    explanation: "В скобки идёт то, что возвращает значение. class пишут как className, а соседние теги оборачивают во фрагмент - у возврата должен быть один корень."
    hints:
      - "Вспомните, что фигурные скобки в JSX впускают именно значение. Что из перечисленного (if, for) значение не возвращает?"
      - "Проверьте каждый вариант на знакомую ловушку: имя атрибута класса, число корней в возврате, природа JSX."

  - id: jsx-compiles-001
    concept: jsx
    type: theory-quiz
    difficulty: 3
    prompt: "Во что сборщик превращает JSX-тег перед запуском в браузере?"
    choices:
      - id: a
        text: "В вызов React.createElement."
      - id: b
        text: "В строку HTML, которую браузер парсит напрямую."
      - id: c
        text: "В CSS-правило для соответствующего элемента."
      - id: d
        text: "Ни во что: современные браузеры понимают JSX сами."
    correct: [a]
    explanation: "Браузер JSX не понимает. Сборщик переводит каждый тег в React.createElement(type, props, ...children), а тот возвращает лёгкий объект, с которым дальше работает React."
    hints:
      - "JSX - синтаксический сахар. Сахар над чем: над строкой, над стилем или над вызовом функции?"
      - "Вспомните, что React в итоге сравнивает не строки HTML, а лёгкие описания узлов. Откуда берётся такое описание?"
