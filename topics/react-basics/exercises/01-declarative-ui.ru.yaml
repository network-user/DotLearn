exercises:
  - id: decl-meaning-001
    concept: declarative-ui
    type: theory-quiz
    difficulty: 1
    prompt: "Что точнее всего описывает декларативный подход к интерфейсу?"
    choices:
      - id: a
        text: "Вы описываете, как экран выглядит при данном состоянии, а как его получить - забота React."
      - id: b
        text: "Вы перечисляете шаги изменения DOM: найти элемент, поправить текст, переключить класс."
      - id: c
        text: "Вы пишете стили, а разметку React придумывает сам."
      - id: d
        text: "Вы вручную решаете, какие узлы DOM пересоздать при каждом клике."
    correct: [a]
    explanation: "Декларативно значит описать результат для состояния. Перечисление шагов правки DOM - это как раз императивный подход, от которого React уводит."
    variants:
      - prompt: "Как читается формула, в которую умещается модель React?"
        choices:
          - id: a
            text: "UI = f(состояние): экран выводится из состояния функцией-компонентом."
          - id: b
            text: "состояние = f(UI): данные вычисляются из разметки."
          - id: c
            text: "UI = DOM + стили, а состояние ни при чём."
          - id: d
            text: "UI = случайная функция, результат которой заранее неизвестен."
        correct: [a]
        explanation: "Компонент - это функция от состояния к разметке. Один и тот же вход всегда даёт один и тот же экран."
      - prompt: "В React вам нужно изменить то, что видит пользователь. Что вы меняете?"
        choices:
          - id: a
            text: "Состояние - экран пересчитается из него сам."
          - id: b
            text: "Напрямую textContent нужного узла DOM."
          - id: c
            text: "HTML-файл на сервере."
          - id: d
            text: "Ничего: разметка в React неизменна после первого показа."
        correct: [a]
        explanation: "Главное правило: меняем состояние, а не DOM. React заново выведет разметку из нового состояния."

  - id: decl-describe-blanks-001
    concept: declarative-ui
    type: fill-in-blanks
    difficulty: 2
    prompt: "Компонент описывает результат: при active кнопка получает класс on, иначе off. Допишите тернарный выбор класса."
    template: |
      function Badge({ active }) {
        return <span className={active {{q}} 'on' {{c}} 'off'}>метка</span>;
      }
    blanks:
      q:
        accept: ['?']
      c:
        accept: [':']
    explanation: "Тернарный оператор describe-стиля: условие ? значение-если-истина : значение-если-ложь. Так разметка описывает свой вид для каждого состояния, не трогая DOM."
    hints:
      - "Разметка должна описать оба случая сразу: и когда active истинно, и когда ложно. Какой оператор выбирает одно из двух значений прямо в выражении?"
    variants:
      - prompt: "При loading текст кнопки - «Загрузка», иначе «Отправить». Допишите тернарный выбор текста."
        template: |
          function SubmitButton({ loading }) {
            return <button>{loading {{q}} 'Загрузка' {{c}} 'Отправить'}</button>;
          }
        blanks:
          q:
            accept: ['?']
          c:
            accept: [':']
      - prompt: "При empty показываем «Пусто», иначе число count. Допишите тернарный выбор."
        template: |
          function Counter({ empty, count }) {
            return <span>{empty {{q}} 'Пусто' {{c}} count}</span>;
          }
        blanks:
          q:
            accept: ['?']
          c:
            accept: [':']

  - id: decl-why-reliable-001
    concept: declarative-ui
    type: theory-quiz
    difficulty: 3
    prompt: "Почему при декларативном подходе исчезает целый класс багов вида «данные обновились, а угол экрана показывает старое»?"
    choices:
      - id: a
        text: "Экран целиком выводится из состояния на каждое изменение, поэтому забыть"
      - id: b
        text: "React запрещает создавать больше одного состояния на страницу."
      - id: c
        text: "Браузер сам следит за тем, чтобы DOM совпадал с данными."
      - id: d
        text: "Декларативные интерфейсы вообще не хранят состояние."
    correct: [a]
    explanation: "Раз вся разметка пересчитывается из состояния, нет отдельных ручных правок, которые можно забыть. Рассинхрон между данными и экраном пропадает по построению."
    hints:
      - "Вспомните, чем императивный код рискует: каждую видимую деталь правят отдельной командой. Что меняется, если деталей не правят по одной, а выводят все сразу?"
      - "Подумайте, откуда берётся разметка на каждом рендере и сколько ручных шагов правки DOM остаётся в декларативной модели."

  - id: decl-vs-imperative-001
    concept: declarative-ui
    type: theory-quiz
    difficulty: 3
    prompt: "Что React делает, когда состояние изменилось, вместо того чтобы стереть и вставить всю разметку заново?"
    choices:
      - id: a
        text: "Сравнивает новое описание экрана со старым и правит в реальном DOM только различия."
      - id: b
        text: "Полностью пересобирает DOM страницы с нуля при каждом изменении."
      - id: c
        text: "Перезагружает страницу, чтобы гарантировать свежесть."
      - id: d
        text: "Ничего не делает: разметка обновляется только при перезагрузке."
    correct: [a]
    explanation: "Это согласование (reconciliation): React берёт новое описание, сравнивает со старым и вносит минимальные точечные правки. Поэтому фокус и прокрутка не сбрасываются."
    hints:
      - "Полная пересборка DOM была бы медленной и сбрасывала бы фокус в полях. React так не делает - что же он делает с новым и старым описанием?"
      - "Ключевое слово - сравнение. React ищет разницу между двумя описаниями экрана и применяет только её."
