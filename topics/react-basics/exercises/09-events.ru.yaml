exercises:
  - id: events-onclick-blanks-001
    concept: events
    type: fill-in-blanks
    difficulty: 1
    prompt: "Обработчик клика вешают камелкейс-пропом. Впишите имя пропа для обработки клика."
    template: |
      <button {{ev}}={handleClick}>Купить</button>
    blanks:
      ev:
        accept: ['onClick']
    explanation: "Событие клика подключают пропом onClick, в который кладут функцию-обработчик. Имена событий в React пишут камелкейсом."
    hints:
      - "Как называется проп для клика? Он начинается с on и дальше идёт название события с заглавной буквы."
    variants:
      - prompt: "Поле ввода обновляет состояние на каждый ввод. Впишите имя пропа, реагирующего на изменение поля."
        template: |
          <input {{ev}}={(e) => setText(e.target.value)} />
        blanks:
          ev:
            accept: ['onChange']
      - prompt: "Чтобы отправка формы не перезагружала страницу, в обработчике вызывают метод события. Впишите его имя."
        template: |
          function handleSubmit(e) {
            e.{{method}}();
            save();
          }
        blanks:
          method:
            accept: ['preventDefault']

  - id: events-call-vs-ref-001
    concept: events
    type: theory-quiz
    difficulty: 3
    prompt: "Чем отличается onClick={handleClick} от onClick={handleClick()}?"
    choices:
      - id: a
        text: "Первое передаёт функцию, и React вызовет её по клику; второе вызывает функцию сразу при рендере и кладёт в onClick её результат."
      - id: b
        text: "Разницы нет, обе записи работают одинаково."
      - id: c
        text: "Первое сработает по клику, второе - по наведению мыши."
      - id: d
        text: "Второе просто безопаснее записывает то же самое."
    correct: [a]
    explanation: "onClick ждёт функцию, чтобы вызвать её позже. Скобки () вызывают функцию немедленно - при рендере, - и в onClick попадёт её результат (обычно undefined). По клику тогда не произойдёт ничего."
    hints:
      - "Что делают скобки () сразу после имени функции - откладывают вызов или выполняют его прямо сейчас?"
      - "Кому нужно отдать функцию - React, чтобы он вызвал её по клику, или её уже выполненный результат?"
    variants:
      - prompt: "В обработчик клика нужно передать id товара: remove(id). Как правильно?"
        choices:
          - id: a
            text: "Обернуть вызов в стрелку: onClick={() => remove(id)}."
          - id: b
            text: "Написать onClick={remove(id)} - так аргумент передастся сам."
          - id: c
            text: "Написать onClick={remove} и передать id отдельным пропом."
          - id: d
            text: "Передать аргумент нельзя: обработчики не принимают параметров."
        correct: [a]
        explanation: "onClick={remove(id)} вызовет remove сразу при рендере. Чтобы вызов с аргументом произошёл по клику, его оборачивают в стрелочную функцию: onClick={() => remove(id)}."

  - id: events-call-on-render-001
    concept: events
    type: predict-output
    difficulty: 3
    prompt: "Кнопку ещё ни разу не нажимали. Что напечатается в консоль сразу при первом рендере?"
    snippet: |
      function greet() {
        console.log('привет');
      }
      const el = <button onClick={greet()}>Клик</button>;
    expected:
      kind: stdout
      value: "привет"
    explanation: "Скобки в onClick={greet()} вызывают greet прямо во время рендера, поэтому «привет» печатается сразу, ещё до всякого клика. В onClick при этом попадает результат greet (undefined). Чтобы функция вызывалась по клику, передают ссылку: onClick={greet}."
    hints:
      - "Обратите внимание на скобки после greet. Когда именно они запускают функцию - по клику или в момент вычисления разметки?"
      - "Если greet() выполняется при рендере, сколько раз и когда сработает его console.log до первого клика?"

  - id: events-prevent-default-001
    concept: events
    type: theory-quiz
    difficulty: 3
    prompt: "Форма при отправке перезагружает страницу, и введённое состояние теряется. Как это остановить?"
    choices:
      - id: a
        text: "В обработчике onSubmit первым делом вызвать e.preventDefault()."
      - id: b
        text: "Убрать из формы кнопку отправки."
      - id: c
        text: "Заменить onSubmit на onClick у кнопки."
      - id: d
        text: "Никак: перезагрузку при отправке формы отменить нельзя."
    correct: [a]
    explanation: "Перезагрузка - поведение браузера по умолчанию при отправке формы. Его отменяет e.preventDefault() в обработчике onSubmit; после этого форму обрабатывает ваш код на React, ничего не теряя."
    hints:
      - "У объекта события есть метод, отменяющий стандартное поведение браузера. Как он называется?"
      - "Перезагрузка - это действие по умолчанию. Что нужно сделать с этим действием по умолчанию в обработчике отправки?"
