exercises:
  - id: lift-callback-blanks-001
    concept: lifting-state
    type: fill-in-blanks
    difficulty: 1
    prompt: "Ребёнок не меняет состояние сам, а зовёт функцию, переданную родителем. Впишите имя пропа-коллбэка, который вызывает кнопка."
    template: |
      function Child({ onChange }) {
        return <button onClick={() => {{cb}}('привет')}>Сказать</button>;
      }
    blanks:
      cb:
        accept: ['onChange']
    explanation: "Родитель передал вниз функцию onChange. Ребёнок вызывает её, сообщая наверх новое значение; менять состояние будет уже родитель-владелец."
    hints:
      - "Какую из переданных родителем функций ребёнок должен вызвать, чтобы попросить об изменении? Её имя есть в списке пропсов."
    variants:
      - prompt: "Родитель отдаёт полю поиска текущий текст. Впишите имя пропа, через который значение спускается вниз."
        template: |
          <SearchInput {{prop}}={query} onChange={setQuery} />
        blanks:
          prop:
            accept: ['value']
      - prompt: "Родитель отдаёт полю поиска функцию для смены текста. Впишите имя пропа-коллбэка."
        template: |
          <SearchInput value={query} {{prop}}={setQuery} />
        blanks:
          prop:
            accept: ['onChange']

  - id: lift-where-state-001
    concept: lifting-state
    type: theory-quiz
    difficulty: 3
    prompt: "Двум соседним компонентам нужно одно и то же изменяемое значение. Где его хранить?"
    choices:
      - id: a
        text: "В их ближайшем общем родителе - он становится единственным источником истины и спускает значение вниз пропами."
      - id: b
        text: "Завести отдельную копию состояния в каждом из двух компонентов."
      - id: c
        text: "В глобальной переменной вне React, чтобы дотягивались оба."
      - id: d
        text: "В одном из двух компонентов, а второй прочитает у него напрямую."
    correct: [a]
    explanation: "Пропсы едут только вниз, поэтому положить общее состояние в одного из соседей нельзя - второй не дотянется. Его поднимают в общего родителя, и оба ребёнка смотрят на одно значение."
    hints:
      - "Пропсы текут только вниз. Из какого места дерева значение сможет спуститься сразу к обоим компонентам?"
      - "Что случится, если завести по копии состояния в каждом компоненте, и как этого избежать одним владельцем?"

  - id: lift-child-requests-001
    concept: lifting-state
    type: theory-quiz
    difficulty: 3
    prompt: "Состояние лежит у родителя, а изменить его хочет ребёнок. Как правильно?"
    choices:
      - id: a
        text: "Ребёнок вызывает функцию-коллбэк, переданную родителем через проп; родитель меняет состояние у себя сеттером."
      - id: b
        text: "Ребёнок присваивает своему пропу новое значение."
      - id: c
        text: "Ребёнок импортирует сеттер родителя и вызывает его напрямую."
      - id: d
        text: "Никак: значение, поднятое к родителю, ребёнок изменить не может вообще."
    correct: [a]
    explanation: "Данные текут вниз, события - вверх. Ребёнок не переписывает проп (он только для чтения), а зовёт переданный коллбэк, и владелец обновляет состояние. Так сохраняется однонаправленный поток."
    hints:
      - "Проп у ребёнка только для чтения. Каким тогда способом он может сообщить родителю о желаемом изменении?"
      - "Что, кроме значения, обычно передаёт родитель вниз, чтобы ребёнок мог попросить об изменении?"

  - id: lift-lca-challenge-001
    concept: lifting-state
    type: theory-quiz
    difficulty: 5
    prompt: "Дерево: App содержит Toolbar (внутри него SearchInput) и Sidebar (внутри него ResultsList). SearchInput и ResultsList должны видеть один и тот же текст запроса. Где разместить состояние запроса?"
    choices:
      - id: a
        text: "В App: это ближайший общий предок SearchInput и ResultsList. Оттуда текст идёт вниз пропами, а SearchInput сообщает об изменении коллбэком."
      - id: b
        text: "В Toolbar: он ближе всего к полю поиска."
      - id: c
        text: "Продублировать состояние и в SearchInput, и в ResultsList."
      - id: d
        text: "В SearchInput, а ResultsList прочитает значение у него напрямую."
    correct: [a]
    explanation: "Наименьший общий предок SearchInput и ResultsList - это App: Toolbar содержит только поле, Sidebar - только список. Состояние в Toolbar не дотянется до ResultsList, дублирование разъедется, а прямого чтения между ветками в React нет. Значит, состояние поднимают в App."
    hints:
      - "Пройдите вверх от SearchInput и вверх от ResultsList. В каком узле их пути впервые сходятся?"
      - "Проверьте Toolbar: под ним лежит ResultsList или нет? Если нет, дотянется ли оттуда значение до списка?"
