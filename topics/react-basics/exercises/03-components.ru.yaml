exercises:
  - id: comp-define-blanks-001
    concept: components
    type: fill-in-blanks
    difficulty: 1
    prompt: "Компонент - это функция, которая возвращает JSX. Впишите пропущенное ключевое слово, которое отдаёт разметку наружу."
    template: |
      function Footer() {
        {{ret}} <footer>© 2026 Ozon</footer>;
      }
    blanks:
      ret:
        accept: ['return']
    explanation: "Без return функция ничего не отдаст и покажет пустое место. Компонент возвращает свою разметку через return."
    hints:
      - "Функция становится компонентом, когда отдаёт JSX наружу. Каким словом функция возвращает значение?"
    variants:
      - prompt: "Впишите ключевое слово, с которого начинается объявление функции-компонента."
        template: |
          {{kw}} Header() {
            return <header>Каталог</header>;
          }
        blanks:
          kw:
            accept: ['function']
      - prompt: "Компонент Header используют как самозакрывающийся тег. Впишите недостающий символ перед закрывающей скобкой."
        template: |
          function App() {
            return <Header {{slash}}>;
          }
        blanks:
          slash:
            accept: ['/']

  - id: comp-compose-predict-001
    concept: components
    type: predict-output
    difficulty: 2
    prompt: "Показывают <App />. Какой текст окажется на экране?"
    snippet: |
      function Hello() {
        return <span>Привет</span>;
      }
      function App() {
        return <div><Hello /> и <Hello /></div>;
      }
    expected:
      kind: stdout
      value: "Привет и Привет"
    explanation: "React встречает каждый <Hello />, вызывает функцию Hello и подставляет её разметку. Один компонент переиспользован дважды, между ними - буквальный текст « и »."
    hints:
      - "Замените каждый тег компонента на то, что возвращает его функция, и оставьте буквальный текст между ними как есть."
    variants:
      - prompt: "Показывают <Rating />. Что окажется на экране?"
        snippet: |
          function Star() {
            return <span>★</span>;
          }
          function Rating() {
            return <div><Star /><Star /><Star /></div>;
          }
        expected:
          kind: stdout
          value: "★★★"
      - prompt: "Показывают <Price />. Что окажется на экране?"
        snippet: |
          function Label() {
            return <b>Цена:</b>;
          }
          function Price() {
            return <p><Label /> 250 ₽</p>;
          }
        expected:
          kind: stdout
          value: "Цена: 250 ₽"

  - id: comp-capitalization-001
    concept: components
    type: theory-quiz
    difficulty: 3
    prompt: "Ваш компонент назван productCard, со строчной буквы. Что произойдёт при <productCard />?"
    choices:
      - id: a
        text: "React примет это за неизвестный HTML-тег productCard и ваш компонент не нарисует."
      - id: b
        text: "React нарисует компонент как обычно: регистр имени не важен."
      - id: c
        text: "Сборка упадёт с ошибкой ещё до запуска."
      - id: d
        text: "React сам исправит первую букву на заглавную."
    correct: [a]
    explanation: "React различает компонент и HTML-тег по первой букве. Строчная буква - значит встроенный тег браузера; такого тега нет, поэтому на экране пусто, а в консоли предупреждение."
    hints:
      - "По какому единственному признаку React решает, вызывать вашу функцию или вставить встроенный тег браузера?"
      - "Подумайте, что React увидит в имени со строчной буквы и есть ли такой тег в браузере."

  - id: comp-nested-define-001
    concept: components
    type: theory-quiz
    difficulty: 3
    prompt: "Почему компонент не стоит объявлять внутри тела другого компонента?"
    choices:
      - id: a
        text: "При каждом рендере внешнего компонента вложенный создаётся заново как новая функция, React считает его новым типом узла и сбрасывает его состояние."
      - id: b
        text: "React запрещает вложенные функции на уровне синтаксиса."
      - id: c
        text: "Вложенный компонент нельзя будет назвать с заглавной буквы."
      - id: d
        text: "Это удваивает размер сборки при каждом рендере."
    correct: [a]
    explanation: "Функция, объявленная в теле другого компонента, пересоздаётся на каждом рендере. Для React это каждый раз новый тип узла, поэтому его поддерево размонтируется и состояние теряется. Компоненты объявляют на верхнем уровне."
    hints:
      - "Что происходит с функцией, объявленной внутри другой функции, каждый раз, когда внешняя функция вызывается заново?"
      - "React узнаёт узел по его типу-функции. Что будет, если этот тип на каждом рендере оказывается новым объектом?"
