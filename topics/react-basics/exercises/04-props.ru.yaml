exercises:
  - id: props-destructure-blanks-001
    concept: props
    type: fill-in-blanks
    difficulty: 1
    prompt: "Пропсы удобно разбирать деструктуризацией в списке параметров. Впишите имя поля, которое компонент затем выводит."
    template: |
      function Hello({ {{prop}} }) {
        return <p>Привет, {name}!</p>;
      }
    blanks:
      prop:
        accept: ['name']
    explanation: "Деструктуризация { name } достаёт поле name из объекта пропсов, и дальше к нему обращаются просто по имени, без props. перед ним."
    hints:
      - "Компонент выводит {name}. Какое поле нужно достать из пропсов, чтобы это имя стало доступным?"
    variants:
      - prompt: "Впишите имя поля, которое компонент достаёт из пропсов и выводит."
        template: |
          function Age({ {{prop}} }) {
            return <p>{age} лет</p>;
          }
        blanks:
          prop:
            accept: ['age']
      - prompt: "Задайте пропу text значение по умолчанию «новинка» на случай, если родитель его не передал."
        template: |
          function Badge({ text = {{def}} }) {
            return <span>{text}</span>;
          }
        blanks:
          def:
            accept: ["'новинка'", '"новинка"']

  - id: props-render-predict-001
    concept: props
    type: predict-output
    difficulty: 2
    prompt: "Показывают <Price value={250} unit=\"₽\" />. Что окажется на экране?"
    snippet: |
      function Price({ value, unit }) {
        return <span>{value} {unit}</span>;
      }
      const el = <Price value={250} unit="₽" />;
    expected:
      kind: stdout
      value: "250 ₽"
    explanation: "Атрибуты тега пришли пропсами: value = 250, unit = '₽'. Компонент выводит их через пробел."
    hints:
      - "Соберите объект пропсов из атрибутов тега, затем подставьте его поля туда, где компонент их выводит."
    variants:
      - prompt: "Показывают <Badge />, проп не передан. Что окажется на экране?"
        snippet: |
          function Badge({ text = 'новинка' }) {
            return <span>{text}</span>;
          }
          const el = <Badge />;
        expected:
          kind: stdout
          value: "новинка"
      - prompt: "Показывают <Panel>Доставка</Panel>. Что окажется на экране?"
        snippet: |
          function Panel({ children }) {
            return <div>[{children}]</div>;
          }
          const el = <Panel>Доставка</Panel>;
        expected:
          kind: stdout
          value: "[Доставка]"

  - id: props-readonly-001
    concept: props
    type: theory-quiz
    difficulty: 3
    prompt: "Компонент получил проп name и хочет показать другое имя. Как правильно?"
    choices:
      - id: a
        text: "Проп менять нельзя; чтобы имя изменилось, об этом просят родителя-владельца через переданную им функцию-коллбэк."
      - id: b
        text: "Компонент присваивает props.name новое значение прямо у себя."
      - id: c
        text: "Компонент удаляет проп и создаёт свой с тем же именем."
      - id: d
        text: "Никак: показанное имя вообще нельзя изменить после первого рендера."
    correct: [a]
    explanation: "Пропсы доступны только для чтения и принадлежат родителю. Ребёнок не переписывает проп, а сигналит наверх коллбэком, и родитель меняет данные у себя. Поток данных идёт в одну сторону, сверху вниз."
    hints:
      - "Кому принадлежат пропсы - тому, кто их получил, или тому, кто их задал?"
      - "Данные в React текут сверху вниз. Как тогда ребёнок может добиться изменения, не нарушая это направление?"

  - id: props-string-number-001
    concept: props
    type: predict-output
    difficulty: 3
    prompt: "Родитель передал возраст строкой: <UserCard age=\"30\" />. Что окажется на экране?"
    snippet: |
      function UserCard({ age }) {
        return <p>Через год: {age + 1}</p>;
      }
      const el = <UserCard age="30" />;
    expected:
      kind: stdout
      value: "Через год: 301"
    explanation: "age задан в кавычках, значит это строка «30», а не число. Оператор + со строкой склеивает: «30» + 1 даёт «301». Чтобы пришло число, нужны фигурные скобки: age={30}."
    hints:
      - "Обратите внимание на кавычки вокруг 30. Строка это или число? Что делает оператор + со строкой слева?"
      - "Со строкой слева оператор + не складывает, а приклеивает. Чему тогда равно «30» + 1?"
