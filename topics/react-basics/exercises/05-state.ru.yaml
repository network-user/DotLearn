exercises:
  - id: state-usestate-blanks-001
    concept: state
    type: fill-in-blanks
    difficulty: 1
    prompt: "Состояние заводят хуком. Впишите имя хука, который возвращает пару «значение и сеттер»."
    template: |
      const [count, setCount] = {{hook}}(0);
    blanks:
      hook:
        accept: ['useState']
    explanation: "useState принимает начальное значение и возвращает массив из двух элементов: текущее значение и функцию для его смены."
    hints:
      - "Как называется хук, дающий компоненту память между рендерами? Его имя начинается с use."
    variants:
      - prompt: "Впишите начальное значение состояния так, чтобы имя по умолчанию было «гость»."
        template: |
          const [name, setName] = useState({{init}});
        blanks:
          init:
            accept: ["'гость'", '"гость"']
      - prompt: "По традиции сеттер называют set + имя переменной. Впишите имя сеттера для состояния dark."
        template: |
          const [dark, {{setter}}] = useState(false);
        blanks:
          setter:
            accept: ['setDark']

  - id: state-pair-predict-001
    concept: state
    type: predict-output
    difficulty: 2
    prompt: "useState возвращает пару. Смоделируем её обычным массивом. Что напечатает код?"
    snippet: |
      const pair = [0, function increment() {}];
      const [count, setCount] = pair;
      console.log(count);
      console.log(typeof setCount);
    expected:
      kind: stdout
      value: |-
        0
        function
    explanation: "Первый элемент пары - текущее значение (0), второй - функция-сеттер. Деструктуризация массива раскладывает их по count и setCount, поэтому typeof setCount даёт «function»."
    hints:
      - "Деструктуризация массива берёт элементы по порядку: первый в count, второй в setCount. Что лежит на каждой позиции?"
    variants:
      - prompt: "Что напечатает код?"
        snippet: |
          const state = ['гость', function () {}];
          const [name] = state;
          console.log(name);
        expected:
          kind: stdout
          value: "гость"
      - prompt: "Два состояния смоделированы двумя массивами. Что напечатает код?"
        snippet: |
          const a = [3, null];
          const b = ['₽', null];
          const [count] = a;
          const [unit] = b;
          console.log(count + ' ' + unit);
        expected:
          kind: stdout
          value: "3 ₽"

  - id: state-setter-required-001
    concept: state
    type: theory-quiz
    difficulty: 3
    prompt: "Вместо setCount(count + 1) вы написали count = count + 1. Что произойдёт на экране?"
    choices:
      - id: a
        text: "Локальная переменная изменится, но React об этом не узнает и"
      - id: b
        text: "Экран обновится так же, как при вызове сеттера."
      - id: c
        text: "React выбросит ошибку и остановит приложение."
      - id: d
        text: "Число обновится, но только после перезагрузки страницы."
    correct: [a]
    explanation: "Обычное присваивание меняет лишь локальную переменную текущего рендера. Сообщить React об изменении и запустить перерисовку может только сеттер."
    hints:
      - "Что именно, кроме сохранения значения, делает сеттер, а обычное присваивание - нет?"
      - "Вспомните: экран пересчитывается только при рендере. Кто запускает новый рендер - присваивание или setCount?"

  - id: state-initial-once-001
    concept: state
    type: theory-quiz
    difficulty: 3
    prompt: "В useState(props.value) передан проп. Родитель обновил проп. Подхватит ли состояние новое значение?"
    choices:
      - id: a
        text: "Нет: начальное значение читается только на первом рендере, дальше React"
      - id: b
        text: "Да, состояние всегда следует за начальным аргументом на каждом рендере."
      - id: c
        text: "Да, но только если проп - число."
      - id: d
        text: "Состояние обнулится, потому что аргумент изменился."
    correct: [a]
    explanation: "Аргумент useState - это именно начальное значение. React использует его один раз, при первом рендере, а затем хранит собственное состояние и аргумент игнорирует."
    hints:
      - "Слово «начальное» здесь ключевое. Сколько раз имеет смысл читать начальное значение?"
      - "Если бы состояние следовало за аргументом на каждом рендере, чем бы оно отличалось от обычного пропа?"
