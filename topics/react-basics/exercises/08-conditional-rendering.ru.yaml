exercises:
  - id: cond-ternary-blanks-001
    concept: conditional-rendering
    type: fill-in-blanks
    difficulty: 1
    prompt: "Тернарный оператор выбирает одну из двух надписей. Допишите его знаки."
    template: |
      <p>{user {{q}} 'Профиль' {{c}} 'Войти'}</p>
    blanks:
      q:
        accept: ['?']
      c:
        accept: [':']
    explanation: "Тернарный оператор условие ? если-истина : если-ложь выбирает одну из двух веток прямо в разметке. Здесь: есть user - «Профиль», иначе «Войти»."
    hints:
      - "Какой оператор выбирает одно из двух значений в одном выражении? Из каких двух знаков он состоит?"
    variants:
      - prompt: "Кнопка должна появляться, только когда в корзине что-то есть. Впишите оператор, показывающий правую часть или ничего."
        template: |
          <div>{items.length > 0 {{op}} <button>Оформить</button>}</div>
        blanks:
          op:
            accept: ['&&']
      - prompt: "Компонент не должен ничего рисовать, когда show ложно. Впишите значение раннего возврата."
        template: |
          if (!show) {
            return {{val}};
          }
        blanks:
          val:
            accept: ['null']

  - id: cond-zero-predict-001
    concept: conditional-rendering
    type: predict-output
    difficulty: 2
    prompt: "count равен 0. Что окажется на экране?"
    snippet: |
      const count = 0;
      const el = <div>{count && <span>Есть новые</span>}</div>;
    expected:
      kind: stdout
      value: "0"
    explanation: "0 && X в JavaScript возвращает 0, а число 0 - в отличие от false и null - React честно рисует. Появляется одинокий «0». Лечится приведением к булеву: count > 0 && ..."
    hints:
      - "Чему равно выражение 0 && что-угодно в JavaScript? И рисует ли React получившееся значение?"
    variants:
      - prompt: "count равен 3. Что окажется на экране?"
        snippet: |
          const count = 3;
          const el = <div>{count > 0 && <span>Есть: {count}</span>}</div>;
        expected:
          kind: stdout
          value: "Есть: 3"
      - prompt: "user равен null. Что окажется на экране?"
        snippet: |
          const user = null;
          const el = <p>{user ? 'Профиль' : 'Войти'}</p>;
        expected:
          kind: stdout
          value: "Войти"

  - id: cond-amp-pitfall-001
    concept: conditional-rendering
    type: theory-quiz
    difficulty: 3
    prompt: "Почему {count && <Badge />} при count равном 0 выводит на экран «0»?"
    choices:
      - id: a
        text: "0 && X возвращает 0, а число 0 React рисует; условие нужно приводить к булеву, например count > 0 && ..."
      - id: b
        text: "React всегда печатает значение, стоящее слева от &&."
      - id: c
        text: "Это ошибка самого React, обойти её нельзя."
      - id: d
        text: "0 считается истинным, поэтому Badge всё равно показывается."
    correct: [a]
    explanation: "Оператор && с ложным левым значением возвращает это самое значение. Ноль ложен, но, в отличие от false и null, выводится на экран. Отсюда «0». Слева от && ставьте булево: count > 0."
    hints:
      - "Вспомните, что возвращает выражение ложь && X. Какое именно значение окажется в разметке, когда count равен 0?"
      - "React не рисует false и null, но что он делает с числом 0?"

  - id: cond-if-in-jsx-001
    concept: conditional-rendering
    type: theory-quiz
    difficulty: 3
    prompt: "Внутри фигурных скобок JSX понадобилось ветвление. Что верно?"
    choices:
      - id: a
        text: "Инструкцию if туда поставить нельзя - в скобки идёт выражение; ветвят тернарником, а развесистую логику уводят в переменную до return."
      - id: b
        text: "if внутри фигурных скобок JSX - обычный и рекомендуемый приём."
      - id: c
        text: "Ветвление в JSX вообще невозможно, разметка всегда статична."
      - id: d
        text: "Для ветвления в JSX нужен специальный компонент If из React."
    correct: [a]
    explanation: "В фигурные скобки идёт выражение, а if - это инструкция, она значения не возвращает. Внутри JSX ветвят тернарником или &&; сложную логику пишут до return и подставляют готовую переменную."
    hints:
      - "Что впускают фигурные скобки JSX - выражение или инструкцию? К какой из этих категорий относится if?"
      - "Если if не помещается в скобки, где ещё в компоненте можно написать любую логику до возврата разметки?"
