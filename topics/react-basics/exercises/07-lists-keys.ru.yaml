exercises:
  - id: lists-map-blanks-001
    concept: lists-keys
    type: fill-in-blanks
    difficulty: 1
    prompt: "Список выводят, превратив массив данных в массив элементов. Впишите метод массива, который для каждого товара возвращает кусочек JSX."
    template: |
      <ul>
        {products.{{method}}((p) => (
          <li key={p.id}>{p.name}</li>
        ))}
      </ul>
    blanks:
      method:
        accept: ['map']
    explanation: "map проходит по массиву и возвращает для каждого элемента новое значение - здесь кусочек JSX. Получается массив элементов, который React выводит подряд."
    hints:
      - "Какой метод массива из JavaScript возвращает новый массив, применив функцию к каждому элементу?"
    variants:
      - prompt: "Впишите имя атрибута, который React требует у каждого элемента списка."
        template: |
          <ul>
            {products.map((p) => (
              <li {{attr}}={p.id}>{p.name}</li>
            ))}
          </ul>
        blanks:
          attr:
            accept: ['key']
      - prompt: "Впишите поле данных, из которого берут устойчивый ключ элемента."
        template: |
          <ul>
            {products.map((p) => (
              <li key={p.{{field}}}>{p.name}</li>
            ))}
          </ul>
        blanks:
          field:
            accept: ['id']

  - id: lists-render-predict-001
    concept: lists-keys
    type: predict-output
    difficulty: 2
    prompt: "Что окажется на экране? Элементы массива React выводит подряд, без разделителей."
    snippet: |
      const nums = [1, 2, 3];
      const el = <p>{nums.map((n) => n * 2)}</p>;
    expected:
      kind: stdout
      value: "246"
    explanation: "map вернёт массив [2, 4, 6]. React выведет его элементы подряд, склеив в «246» без пробелов и запятых."
    hints:
      - "Сначала посчитайте, что вернёт map, затем выведите элементы получившегося массива один за другим без разделителей."
    variants:
      - prompt: "Что окажется на экране?"
        snippet: |
          const names = ['Анна', 'Борис'];
          const el = <p>{names.map((n) => n[0])}</p>;
        expected:
          kind: stdout
          value: "АБ"
      - prompt: "Что окажется на экране?"
        snippet: |
          const items = ['хлеб', 'молоко'];
          const el = <ul>{items.map((x) => <li>{x}</li>)}</ul>;
        expected:
          kind: stdout
          value: "хлебмолоко"

  - id: lists-why-keys-001
    concept: lists-keys
    type: theory-quiz
    difficulty: 3
    prompt: "Зачем React нужен key у каждого элемента списка?"
    choices:
      - id: a
        text: "Чтобы понять, какой элемент нового списка соответствует какому из"
      - id: b
        text: "Чтобы автоматически отсортировать список по возрастанию."
      - id: c
        text: "Чтобы задать элементам списка стили CSS."
      - id: d
        text: "Чтобы список быстрее загрузился с сервера."
    correct: [a]
    explanation: "Ключ сопоставляет элементы между рендерами. Зная, что «строка с ключом 7» - та же, что была, React лишь двигает её, а не создаёт заново, и сохраняет её внутреннее состояние."
    hints:
      - "При обновлении списка React сравнивает старый набор элементов с новым. Что помогает ему сказать, что это тот же самый элемент, а не новый?"
      - "Подумайте, что происходит с элементом, который сдвинулся в списке: нужно ли его пересоздавать или достаточно опознать по устойчивому признаку?"

  - id: lists-index-key-bug-001
    concept: lists-keys
    type: theory-quiz
    difficulty: 4
    prompt: "Список задач с чекбоксами использует key={index}. Вы отметили вторую задачу галочкой, а потом удалили первую. Что произойдёт?"
    choices:
      - id: a
        text: "Галочка «прилипнет» к позиции"
      - id: b
        text: "Ничего необычного: галочка останется на правильной задаче."
      - id: c
        text: "React снимет все галочки и очистит список."
      - id: d
        text: "Приложение упадёт с ошибкой при удалении."
    correct: [a]
    explanation: "Индексный ключ привязывает внутреннее состояние (галочку) к позиции, а не к задаче. После удаления первой строки индексы сместились: бывшая третья стала второй и «унаследовала» галочку. Данные верны, но состояние строк съехало. Ключ нужно брать из id задачи."
    hints:
      - "К чему привязан ключ-индекс: к конкретной задаче или к её месту в списке? Что происходит с местами после удаления первого элемента?"
      - "Галочка - это внутреннее состояние строки, которое React сопоставляет по ключу. Что случится с этим сопоставлением, когда индексы сдвинутся?"
