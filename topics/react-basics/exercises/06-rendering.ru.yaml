exercises:
  - id: render-trigger-001
    concept: rendering
    type: theory-quiz
    difficulty: 1
    prompt: "Что запускает повторный рендер компонента?"
    choices:
      - id: a
        text: "Изменение его состояния или приход новых"
      - id: b
        text: "Любое движение мыши над страницей."
      - id: c
        text: "Ручной вызов document.querySelector."
      - id: d
        text: "Только полная перезагрузка страницы."
    correct: [a]
    explanation: "React сам запускает рендер, когда меняется состояние компонента или ему приходят новые пропсы. Ничего вручную звать не нужно."
    variants:
      - prompt: "Что означает «отрендерить компонент»?"
        choices:
          - id: a
            text: "Вызвать его функцию и получить JSX"
          - id: b
            text: "Стереть и заново построить весь DOM страницы."
          - id: c
            text: "Загрузить свежую версию страницы с сервера."
          - id: d
            text: "Применить к компоненту CSS-стили."
        correct: [a]
        explanation: "Рендер - это вычисление описания экрана вызовом вашей функции, а не рисование пикселей и не пересборка DOM."
      - prompt: "Повторный рендер пересобирает весь DOM страницы заново?"
        choices:
          - id: a
            text: "Нет: React сравнивает новое описание со старым и"
          - id: b
            text: "Да, каждый рендер строит DOM с нуля."
          - id: c
            text: "Да, но только для компонентов с состоянием."
          - id: d
            text: "DOM вообще не меняется при рендере."
        correct: [a]
        explanation: "Полная пересборка была бы медленной и сбрасывала бы фокус. React вносит в реальный DOM лишь найденные различия (reconciliation)."

  - id: render-updater-blanks-001
    concept: rendering
    type: fill-in-blanks
    difficulty: 2
    prompt: "Когда новое состояние зависит от старого, сеттеру передают функцию-апдейтер. Допишите операцию, увеличивающую счётчик на единицу."
    template: |
      setCount((c) => c {{op}} 1);
    blanks:
      op:
        accept: ['+']
    explanation: "Функция-апдейтер получает последнее актуальное значение c и возвращает следующее. Для увеличения на единицу это c + 1."
    hints:
      - "Апдейтер получает предыдущее значение и должен вернуть следующее. Какая операция увеличивает число на единицу?"
    variants:
      - prompt: "Допишите операцию, уменьшающую счётчик на единицу."
        template: |
          setCount((c) => c {{op}} 1);
        blanks:
          op:
            accept: ['-']
      - prompt: "Допишите значение, которое апдейтер добавляет в конец массива, пересобирая его через спред."
        template: |
          setItems((prev) => [...prev, {{val}}]);
        blanks:
          val:
            accept: ["'молоко'", '"молоко"']

  - id: render-updater-why-001
    concept: rendering
    type: theory-quiz
    difficulty: 3
    prompt: "Три вызова setCount(count + 1) в одном обработчике дали +1. Как получить +3 за один клик?"
    choices:
      - id: a
        text: "Передавать функцию-апдейтер"
      - id: b
        text: "Вызвать сеттер вне обработчика события."
      - id: c
        text: "Обернуть все три вызова в setTimeout."
      - id: d
        text: "Никак: React не умеет прибавлять больше единицы за клик."
    correct: [a]
    explanation: "Форма со значением читает замороженный count (0) во всех трёх вызовах. Форма с функцией получает последнее актуальное значение, поэтому вызовы складываются: 0 в 1, 1 в 2, 2 в 3."
    hints:
      - "Проблема была в том, что все три вызова видели один и тот же старый count. Какая форма сеттера видит не старое значение, а последнее актуальное?"
      - "Вспомните две формы вызова сеттера: со значением и с функцией. Какая из них годится, когда новое состояние зависит от предыдущего?"

  - id: render-batching-predict-001
    concept: rendering
    type: predict-output
    difficulty: 4
    prompt: "count равен 0. В одном обработчике клика три раза подряд вызвали setCount(count + 1). Чему будет равен count после перерисовки?"
    snippet: |
      const [count, setCount] = useState(0);
      function handleClick() {
        setCount(count + 1);
        setCount(count + 1);
        setCount(count + 1);
      }
    expected:
      kind: scalar
      value: 1
    explanation: "Пока идёт текущий рендер, count заморожен на 0. Все три вызова читают этот ноль и просят установить 0 + 1 = 1. React объединяет их в один рендер, поэтому итог - 1, а не 3."
    hints:
      - "Какое значение имеет count внутри этого обработчика: меняется ли оно между тремя вызовами или остаётся замороженным?"
      - "Если каждый из трёх вызовов вычисляет 0 + 1, какое единственное значение они все просят установить?"
    variants:
      - prompt: "А если те же три вызова используют форму с функцией-апдейтером? Чему будет равен count после перерисовки?"
        snippet: |
          const [count, setCount] = useState(0);
          function handleClick() {
            setCount((c) => c + 1);
            setCount((c) => c + 1);
            setCount((c) => c + 1);
          }
        expected:
          kind: scalar
          value: 3
