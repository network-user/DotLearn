exercises:
  - id: func-arrow-blanks-001
    concept: functions
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Допишите стрелочную функцию, которая удваивает число.'
    template: |
      const double = (x) {{arrow}} x {{op}} 2;
    blanks:
      arrow:
        accept: ['=>']
      op:
        accept: ['*']
    explanation: 'Стрелка => отделяет параметры от тела. Краткое тело из одного выражения возвращает результат само, без слова return: чтобы удвоить x, его умножают на 2.'
    hints:
      - 'Какой символ в стрелочной записи стоит между списком параметров и телом функции?'
    variants:
      - prompt: 'Допишите стрелочную функцию, которая делит число пополам.'
        template: |
          const halve = (x) {{arrow}} x {{op}} 2;
        blanks:
          arrow:
            accept: ['=>']
          op:
            accept: ['/']
      - prompt: 'Допишите стрелочную функцию, которая собирает приветствие из слова «Привет» и имени.'
        template: |
          const greet = (name) {{arrow}} 'Привет, ' {{op}} name;
        blanks:
          arrow:
            accept: ['=>']
          op:
            accept: ['+']

  - id: func-discount-001
    concept: functions
    type: javascript-function
    difficulty: 2
    prompt: 'Реализуйте функцию `priceWithDiscount(price, percent)`, которая возвращает цену после скидки в percent процентов.'
    starter: |
      const priceWithDiscount = (price, percent) => {

      };
    cases:
      - call: 'priceWithDiscount(1000, 10)'
        expect: 900
      - call: 'priceWithDiscount(500, 0)'
        expect: 500
      - call: 'priceWithDiscount(200, 50)'
        expect: 100
    hints:
      - 'Сначала выразите размер скидки в рублях: какая доля от price соответствует percent процентам?'
      - 'Результат нужно вернуть через return: тело в фигурных скобках само ничего не возвращает.'
    solution: |
      const priceWithDiscount = (price, percent) => {
        return price - (price * percent) / 100;
      };
    variants:
      - prompt: 'Реализуйте функцию `deliveryPrice(total)`: от 1000 ₽ доставка бесплатна, иначе стоит 300.'
        starter: |
          const deliveryPrice = (total) => {

          };
        cases:
          - call: 'deliveryPrice(1500)'
            expect: 0
          - call: 'deliveryPrice(999)'
            expect: 300
          - call: 'deliveryPrice(1000)'
            expect: 0
        solution: |
          const deliveryPrice = (total) => {
            if (total >= 1000) {
              return 0;
            }
            return 300;
          };
      - prompt: 'Реализуйте функцию `rectangleArea(width, height)`, которая возвращает площадь прямоугольника.'
        starter: |
          const rectangleArea = (width, height) => {

          };
        cases:
          - call: 'rectangleArea(4, 5)'
            expect: 20
          - call: 'rectangleArea(7, 1)'
            expect: 7
          - call: 'rectangleArea(0, 10)'
            expect: 0
        solution: |
          const rectangleArea = (width, height) => {
            return width * height;
          };

  - id: func-default-predict-001
    concept: functions
    type: predict-output
    difficulty: 2
    prompt: 'Что напечатает этот код?'
    snippet: |
      function greet(name = 'гость') {
        return 'Привет, ' + name;
      }
      function announce(price) {
        'Цена: ' + price;
      }
      console.log(greet('Анна'));
      console.log(greet());
      console.log(announce(500));
    expected:
      kind: stdout
      value: |-
        Привет, Анна
        Привет, гость
        undefined
    explanation: 'Вызов greet() идёт без аргумента, поэтому name получает значение по умолчанию. Функция announce склеивает строку, но не возвращает её: без return наружу уходит undefined, и console.log печатает именно его.'
    hints:
      - 'Проверьте каждую функцию: есть ли в ней return? Что вернёт вызов, если return нет?'
    variants:
      - snippet: |
          function firstWord(text) {
            return text.split(' ')[0];
            console.log('после return');
          }
          console.log(firstWord('Москва слезам не верит'));
          console.log('готово');
        expected:
          kind: stdout
          value: |-
            Москва
            готово
      - snippet: |
          const twice = (x) => x * 2;
          const thrice = (x) => {
            x * 3;
          };
          console.log(twice(5));
          console.log(thrice(5));
        expected:
          kind: stdout
          value: |-
            10
            undefined

  - id: func-clamp-001
    concept: functions
    type: javascript-function
    difficulty: 3
    prompt: 'Реализуйте функцию `clamp(value, min, max)`: верните value, зажатое в границы от min до max включительно.'
    starter: |
      const clamp = (value, min, max) => {

      };
    cases:
      - call: 'clamp(5, 0, 10)'
        expect: 5
      - call: 'clamp(-3, 0, 10)'
        expect: 0
      - call: 'clamp(99, 0, 10)'
        expect: 10
      - call: 'clamp(0, 0, 10)'
        expect: 0
    hints:
      - 'У value всего три судьбы: оно ниже нижней границы, выше верхней или уже внутри диапазона. Какой ответ соответствует каждому случаю?'
      - 'Проверяйте границы ранними return: если value вышло за границу, ответ известен сразу, и дальше можно не проверять.'
      - 'Ту же логику можно собрать из Math.min и Math.max, но два if с ранними return читаются не хуже.'
    solution: |
      const clamp = (value, min, max) => {
        if (value < min) {
          return min;
        }
        if (value > max) {
          return max;
        }
        return value;
      };
