exercises:
  - id: values-let-const-quiz-001
    concept: values-and-variables
    type: theory-quiz
    difficulty: 1
    prompt: 'Какое объявление позволяет позже присвоить переменной новое значение?'
    choices:
      - id: a
        text: 'let'
      - id: b
        text: 'const'
      - id: c
        text: 'И let, и const запрещают переприсвоение.'
      - id: d
        text: 'Любое: в JavaScript переприсвоение разрешено всегда.'
    correct: [a]
    explanation: 'let оставляет стрелку от имени к значению подвижной, поэтому имя можно перенаправить на новое значение. const фиксирует стрелку одним присваиванием при объявлении.'
    hints:
      - 'Вспомните модель со стрелками: одно ключевое слово оставляет стрелку подвижной, другое фиксирует её навсегда.'
      - 'Подумайте, каким словом вы объявили бы счётчик заказов, который растёт в течение дня.'
    variants:
      - prompt: "Какой тип у значения 'привет'?"
        choices:
          - id: a
            text: 'string'
          - id: b
            text: 'number'
          - id: c
            text: 'boolean'
          - id: d
            text: 'object'
        correct: [a]
        explanation: "Текст в кавычках имеет тип string. Убедиться можно, выполнив typeof 'привет' в консоли браузера."
      - prompt: 'Объект объявлен через const. Можно ли добавить в него новое свойство?'
        choices:
          - id: a
            text: 'Можно: const фиксирует ссылку на объект, а содержимое объекта остаётся изменяемым.'
          - id: b
            text: 'Нельзя: const полностью замораживает объект вместе с содержимым.'
          - id: c
            text: 'Нельзя: сначала объект нужно переобъявить через let.'
        correct: [a]
        explanation: 'const запрещает перенаправить имя на другой объект, но сам объект остаётся обычным изменяемым значением: свойства можно добавлять и менять.'

  - id: values-declare-blanks-001
    concept: values-and-variables
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Магазин пересчитывает итог заказа. Впишите ключевые слова объявления: ставка скидки не меняется, а итог пересчитывается.'
    template: |
      {{kw1}} discount = 0.1;
      {{kw2}} total = 2999;
      total = total - total * discount;
      console.log(total);
    blanks:
      kw1:
        accept: ['const']
      kw2:
        accept: ['let']
    explanation: 'total получает новое значение после объявления, поэтому его объявляют через let. discount ни разу не переприсваивается, и const защищает его от случайной записи.'
    hints:
      - 'Найдите имена, которым после объявления присваивают новое значение: таким нужна подвижная стрелка.'
      - 'Имя, которое после объявления ни разу не меняется, стоит защитить от случайной перезаписи.'
    variants:
      - prompt: 'Склад интернет-магазина: вместимость фиксированная, остаток меняется при отгрузке. Впишите ключевые слова объявления.'
        template: |
          {{kw1}} capacity = 500;
          {{kw2}} stock = 120;
          stock = stock - 20;
          console.log(stock);
        blanks:
          kw1:
            accept: ['const']
          kw2:
            accept: ['let']
        explanation: 'stock переприсваивается при отгрузке, поэтому ему нужен let. capacity не меняется, её фиксирует const.'
      - prompt: 'Кофейня Бориса: название заведения не меняется, счётчик заказов растёт. Впишите ключевые слова объявления.'
        template: |
          {{kw1}} cafeName = 'Бодрое утро';
          {{kw2}} ordersToday = 41;
          ordersToday = ordersToday + 1;
          console.log(ordersToday);
        blanks:
          kw1:
            accept: ['const']
          kw2:
            accept: ['let']
        explanation: 'ordersToday получает новое значение с каждым заказом, поэтому let. cafeName не меняется, его защищает const.'

  - id: values-coercion-predict-001
    concept: values-and-variables
    type: predict-output
    difficulty: 2
    prompt: 'Что напечатают эти две строки?'
    snippet: |
      console.log('2' + 2);
      console.log(2 + 2);
    expected:
      kind: stdout
      value: |-
        22
        4
    explanation: 'Когда хотя бы один операнд у плюса строка, число приводится к строке и происходит склейка: получается 22. Во второй строке оба операнда числа, обычное сложение даёт 4.'
    hints:
      - 'Сначала определите тип каждого операнда и только потом решайте, что сделает оператор.'
      - 'У плюса два режима работы, и выбор режима зависит от типов операндов, а не от ваших намерений.'
    variants:
      - prompt: 'Что напечатает эта строка?'
        snippet: |
          console.log('5' * 2);
        expected:
          kind: stdout
          value: |-
            10
        explanation: 'У умножения нет строкового режима, поэтому строка приводится к числу: пять умножается на два, печатается 10.'
      - prompt: 'Что напечатают эти две строки?'
        snippet: |
          console.log(typeof 42);
          console.log(typeof 'привет');
        expected:
          kind: stdout
          value: |-
            number
            string
        explanation: 'typeof возвращает строку с названием типа: для 42 это number, для текста в кавычках string.'

  - id: values-typeof-null-quiz-001
    concept: values-and-variables
    type: theory-quiz
    difficulty: 3
    prompt: 'Что вернёт выражение typeof null?'
    choices:
      - id: a
        text: "'null'"
      - id: b
        text: "'object'"
      - id: c
        text: "'undefined'"
      - id: d
        text: 'Выражение выбросит TypeError.'
    correct: [b]
    explanation: "typeof null возвращает 'object'. В первой реализации JavaScript 1995 года тип значения кодировался внутренним тегом: у объектов тег был нулевым, а null был представлен нулевым указателем и попал в ту же категорию. Комитет по стандартизации обсуждал исправление и отклонил его: слишком много существующего кода полагается на это поведение. Проверяйте на null строгим сравнением value === null."
    hints:
      - 'Интуитивный ответ здесь не совпадает с реальным: вспомните раздел про историческую ошибку первой реализации языка.'
      - 'Подумайте, как первая реализация кодировала тип значения внутренним тегом и что случилось с нулевым указателем.'
