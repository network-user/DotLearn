exercises:
  - id: am-pick-method-blanks-001
    concept: array-methods
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Магазин обрабатывает массив цен prices. Подставьте имена методов: первая строка удваивает каждую цену, вторая оставляет только цены выше 100, третья считает сумму всех цен.'
    template: |
      prices.{{m1}}(p => p * 2)
      prices.{{m2}}(p => p > 100)
      prices.{{m3}}((sum, p) => sum + p, 0)
    blanks:
      m1:
        accept: ['map']
      m2:
        accept: ['filter']
      m3:
        accept: ['reduce']
    explanation: 'map преобразует каждый элемент и сохраняет длину, filter отбирает элементы по предикату, reduce сворачивает массив в одно значение через аккумулятор с начальным значением.'
    variants:
      - prompt: 'Сервис обрабатывает массив имён names. Подставьте имена методов: первая строка оставляет имена с буквой «а», вторая считает суммарную длину всех имён, третья переводит каждое имя в верхний регистр.'
        template: |
          names.{{m1}}(n => n.includes('а'))
          names.{{m2}}((len, n) => len + n.length, 0)
          names.{{m3}}(n => n.toUpperCase())
        blanks:
          m1:
            accept: ['filter']
          m2:
            accept: ['reduce']
          m3:
            accept: ['map']
      - prompt: 'Функция обрабатывает массив чисел nums. Подставьте имена методов: первая строка считает произведение всех чисел, вторая увеличивает каждое число на единицу, третья оставляет только чётные.'
        template: |
          nums.{{m1}}((acc, x) => acc * x, 1)
          nums.{{m2}}(x => x + 1)
          nums.{{m3}}(x => x % 2 === 0)
        blanks:
          m1:
            accept: ['reduce']
          m2:
            accept: ['map']
          m3:
            accept: ['filter']

  - id: am-double-prices-001
    concept: array-methods
    type: javascript-function
    difficulty: 2
    prompt: 'Реализуйте doubledPrices(prices): верните новый массив, где каждая цена умножена на 2. Исходный массив меняться не должен.'
    starter: |
      const doubledPrices = (prices) => {

      };
    cases:
      - call: 'doubledPrices([100, 250, 400])'
        expect: [200, 500, 800]
      - call: 'doubledPrices([])'
        expect: []
      - call: 'doubledPrices([7])'
        expect: [14]
    solution: |
      const doubledPrices = (prices) => prices.map(p => p * 2);
    hints:
      - 'Каждой цене на входе соответствует ровно одна цена на выходе, длина не меняется. Вспомните, у какого метода именно такой контракт.'
      - 'Стрелка с телом-выражением вернёт результат сама; если возьмёте фигурные скобки, не забудьте явный return.'
    variants:
      - prompt: 'Реализуйте namesUpper(names): верните новый массив, где каждое имя переведено в верхний регистр.'
        starter: |
          const namesUpper = (names) => {

          };
        cases:
          - call: "namesUpper(['анна', 'борис'])"
            expect: ['АННА', 'БОРИС']
          - call: 'namesUpper([])'
            expect: []
          - call: "namesUpper(['вера'])"
            expect: ['ВЕРА']
        solution: |
          const namesUpper = (names) => names.map(n => n.toUpperCase());
      - prompt: 'Реализуйте onlyPositive(nums): верните новый массив только из чисел больше нуля, сохранив исходный порядок.'
        starter: |
          const onlyPositive = (nums) => {

          };
        cases:
          - call: 'onlyPositive([3, -1, 0, 5])'
            expect: [3, 5]
          - call: 'onlyPositive([-2, -7])'
            expect: []
          - call: 'onlyPositive([1, 2, 3])'
            expect: [1, 2, 3]
        solution: |
          const onlyPositive = (nums) => nums.filter(x => x > 0);

  - id: am-cheap-names-001
    concept: array-methods
    type: javascript-function
    difficulty: 3
    prompt: "Реализуйте affordableNames(products, limit): из массива объектов вида { name, price } верните массив названий товаров с ценой не выше limit, сохранив исходный порядок."
    starter: |
      const affordableNames = (products, limit) => {

      };
    cases:
      - call: "affordableNames([{ name: 'Чайник', price: 1990 }, { name: 'Кружка', price: 350 }, { name: 'Ложка', price: 90 }], 500)"
        expect: ['Кружка', 'Ложка']
      - call: "affordableNames([{ name: 'Ноутбук', price: 55000 }], 1000)"
        expect: []
      - call: "affordableNames([{ name: 'Блокнот', price: 120 }, { name: 'Ручка', price: 60 }], 500)"
        expect: ['Блокнот', 'Ручка']
    solution: |
      const affordableNames = (products, limit) =>
        products.filter(p => p.price <= limit).map(p => p.name);
    hints:
      - 'Задача из двух шагов: сначала решить, какие товары выживают после отбора по цене, потом превратить каждый выживший объект в строку с названием.'
      - 'Каждый из двух шагов возвращает новый массив, поэтому второй метод можно вызвать прямо на результате первого, цепочкой.'
      - 'Проверьте порядок станций конвейера: сначала отбор, затем преобразование, иначе предикату не с чем будет сравнивать цену.'

  - id: am-cart-total-001
    concept: array-methods
    type: javascript-function
    difficulty: 4
    prompt: "Реализуйте cartTotal(cart): по массиву позиций вида { title, price, qty } верните общую стоимость корзины, где каждая позиция стоит price * qty."
    starter: |
      const cartTotal = (cart) => {

      };
    cases:
      - call: "cartTotal([{ title: 'Чайник', price: 1990, qty: 1 }, { title: 'Кружка', price: 350, qty: 2 }])"
        expect: 2690
      - call: 'cartTotal([])'
        expect: 0
      - call: "cartTotal([{ title: 'Чай', price: 250, qty: 2 }, { title: 'Сахар', price: 90, qty: 0 }])"
        expect: 500
      - call: "cartTotal([{ title: 'Вода', price: 45, qty: 3 }])"
        expect: 135
    solution: |
      const cartTotal = (cart) =>
        cart.reduce((sum, item) => sum + item.price * item.qty, 0);
    hints:
      - 'Из целого списка позиций нужно получить одно число. Это не преобразование и не отбор, а свёртка списка в итог.'
      - 'Заведите аккумулятор-копилку с начальным значением 0 и на каждой позиции прибавляйте её стоимость; тогда пустая корзина даст 0 сама собой.'
