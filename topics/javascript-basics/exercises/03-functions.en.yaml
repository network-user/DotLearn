exercises:
  - id: func-arrow-blanks-001
    concept: functions
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Complete the arrow function that doubles a number.'
    template: |
      const double = (x) {{arrow}} x {{op}} 2;
    blanks:
      arrow:
        accept: ['=>']
      op:
        accept: ['*']
    explanation: 'The arrow => separates parameters from the body. A concise body made of a single expression returns the result on its own, without the word return: to double x, multiply it by 2.'
    hints:
      - 'Which symbol in arrow notation sits between the parameter list and the function body?'
    variants:
      - prompt: 'Complete the arrow function that halves a number.'
        template: |
          const halve = (x) {{arrow}} x {{op}} 2;
        blanks:
          arrow:
            accept: ['=>']
          op:
            accept: ['/']
      - prompt: 'Complete the arrow function that builds a greeting from the word "Hello" and a name.'
        template: |
          const greet = (name) {{arrow}} 'Hello, ' {{op}} name;
        blanks:
          arrow:
            accept: ['=>']
          op:
            accept: ['+']

  - id: func-discount-001
    concept: functions
    type: javascript-function
    difficulty: 2
    prompt: 'Implement the function `priceWithDiscount(price, percent)` that returns the price after a discount of percent percent.'
    starter: |
      const priceWithDiscount = (price, percent) => {

      };
    cases:
      - call: 'priceWithDiscount(1000, 10)'
        expect: 900
      - call: 'priceWithDiscount(500, 0)'
        expect: 500
      - call: 'priceWithDiscount(200, 50)'
        expect: 100
    hints:
      - 'First work out the discount amount: what share of price corresponds to percent percent?'
      - 'Return the result with return: a body in curly braces does not return anything on its own.'
    solution: |
      const priceWithDiscount = (price, percent) => {
        return price - (price * percent) / 100;
      };
    variants:
      - prompt: 'Implement the function `deliveryPrice(total)`: delivery is free from 1000 ₽, otherwise it costs 300.'
        starter: |
          const deliveryPrice = (total) => {

          };
        cases:
          - call: 'deliveryPrice(1500)'
            expect: 0
          - call: 'deliveryPrice(999)'
            expect: 300
          - call: 'deliveryPrice(1000)'
            expect: 0
        solution: |
          const deliveryPrice = (total) => {
            if (total >= 1000) {
              return 0;
            }
            return 300;
          };
      - prompt: 'Implement the function `rectangleArea(width, height)` that returns the area of a rectangle.'
        starter: |
          const rectangleArea = (width, height) => {

          };
        cases:
          - call: 'rectangleArea(4, 5)'
            expect: 20
          - call: 'rectangleArea(7, 1)'
            expect: 7
          - call: 'rectangleArea(0, 10)'
            expect: 0
        solution: |
          const rectangleArea = (width, height) => {
            return width * height;
          };

  - id: func-default-predict-001
    concept: functions
    type: predict-output
    difficulty: 2
    prompt: 'What does this code print?'
    snippet: |
      function greet(name = 'guest') {
        return 'Hello, ' + name;
      }
      function announce(price) {
        'Price: ' + price;
      }
      console.log(greet('Anna'));
      console.log(greet());
      console.log(announce(500));
    expected:
      kind: stdout
      value: |-
        Hello, Anna
        Hello, guest
        undefined
    explanation: 'The call greet() has no argument, so name gets its default value. The function announce concatenates a string but does not return it: without return, undefined comes out, and console.log prints exactly that.'
    hints:
      - 'Check each function: does it have a return? What does the call return if there is none?'
    variants:
      - snippet: |
          function firstWord(text) {
            return text.split(' ')[0];
            console.log('after return');
          }
          console.log(firstWord('Actions speak louder than words'));
          console.log('done');
        expected:
          kind: stdout
          value: |-
            Actions
            done
      - snippet: |
          const twice = (x) => x * 2;
          const thrice = (x) => {
            x * 3;
          };
          console.log(twice(5));
          console.log(thrice(5));
        expected:
          kind: stdout
          value: |-
            10
            undefined

  - id: func-clamp-001
    concept: functions
    type: javascript-function
    difficulty: 3
    prompt: 'Implement the function `clamp(value, min, max)`: return value clamped to the range from min to max inclusive.'
    starter: |
      const clamp = (value, min, max) => {

      };
    cases:
      - call: 'clamp(5, 0, 10)'
        expect: 5
      - call: 'clamp(-3, 0, 10)'
        expect: 0
      - call: 'clamp(99, 0, 10)'
        expect: 10
      - call: 'clamp(0, 0, 10)'
        expect: 0
    hints:
      - 'value only has three fates: it is below the lower bound, above the upper bound, or already inside the range. Which answer fits each case?'
      - 'Check the bounds with early returns: if value is out of range, the answer is known right away, and the rest can be skipped.'
      - 'The same logic can be built from Math.min and Math.max, but two ifs with early returns read just as well.'
    solution: |
      const clamp = (value, min, max) => {
        if (value < min) {
          return min;
        }
        if (value > max) {
          return max;
        }
        return value;
      };
