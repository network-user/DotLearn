exercises:
  - id: values-let-const-quiz-001
    concept: values-and-variables
    type: theory-quiz
    difficulty: 1
    prompt: 'Which declaration lets you assign the variable a new value later?'
    choices:
      - id: a
        text: 'let'
      - id: b
        text: 'const'
      - id: c
        text: 'Both let and const forbid reassignment.'
      - id: d
        text: 'Either: JavaScript always allows reassignment.'
    correct: [a]
    explanation: 'let keeps the arrow from name to value movable, so the name can be repointed to a new value. const fixes the arrow with a single assignment at declaration.'
    hints:
      - 'Recall the arrow model: one keyword leaves the arrow movable, the other locks it forever.'
      - 'Think about which keyword you would use for an order counter that grows through the day.'
    variants:
      - prompt: "What type is the value 'hello'?"
        choices:
          - id: a
            text: 'string'
          - id: b
            text: 'number'
          - id: c
            text: 'boolean'
          - id: d
            text: 'object'
        correct: [a]
        explanation: "Quoted text has type string. Confirm it by running typeof 'hello' in the browser console."
      - prompt: 'An object is declared with const. Can you add a new property to it?'
        choices:
          - id: a
            text: 'Yes: const fixes the reference to the object, but the object contents stay'
          - id: b
            text: 'No: const fully freezes the object along with its contents.'
          - id: c
            text: 'No: you must first redeclare the object with let.'
        correct: [a]
        explanation: 'const forbids repointing the name to another object, but the object itself stays an ordinary mutable value: properties can be added and changed.'

  - id: values-declare-blanks-001
    concept: values-and-variables
    type: fill-in-blanks
    difficulty: 1
    prompt: 'A shop recalculates the order total. Fill in the declaration keywords: the discount rate never changes, while the total gets recalculated.'
    template: |
      {{kw1}} discount = 0.1;
      {{kw2}} total = 2999;
      total = total - total * discount;
      console.log(total);
    blanks:
      kw1:
        accept: ['const']
      kw2:
        accept: ['let']
    explanation: 'total gets a new value after declaration, so it is declared with let. discount is never reassigned, and const protects it from an accidental write.'
    hints:
      - 'Find the names that get a new value after declaration: those need a movable arrow.'
      - 'A name that never changes after declaration is worth protecting from accidental overwrite.'
    variants:
      - prompt: 'An online store warehouse: capacity is fixed, stock changes on shipment. Fill in the declaration keywords.'
        template: |
          {{kw1}} capacity = 500;
          {{kw2}} stock = 120;
          stock = stock - 20;
          console.log(stock);
        blanks:
          kw1:
            accept: ['const']
          kw2:
            accept: ['let']
        explanation: 'stock is reassigned on shipment, so it needs let. capacity never changes, so const fixes it.'
      - prompt: "Boris's coffee shop: the shop name never changes, the order counter grows. Fill in the declaration keywords."
        template: |
          {{kw1}} cafeName = 'Bright Morning';
          {{kw2}} ordersToday = 41;
          ordersToday = ordersToday + 1;
          console.log(ordersToday);
        blanks:
          kw1:
            accept: ['const']
          kw2:
            accept: ['let']
        explanation: 'ordersToday gets a new value with every order, so it needs let. cafeName never changes, so const protects it.'

  - id: values-coercion-predict-001
    concept: values-and-variables
    type: predict-output
    difficulty: 2
    prompt: 'What do these two lines print?'
    snippet: |
      console.log('2' + 2);
      console.log(2 + 2);
    expected:
      kind: stdout
      value: |-
        22
        4
    explanation: 'When at least one operand of plus is a string, the number is converted to a string and concatenation happens: you get 22. In the second line both operands are numbers, so ordinary addition gives 4.'
    hints:
      - 'First determine the type of each operand, and only then decide what the operator does.'
      - 'Plus has two modes, and the mode depends on operand types, not on your intent.'
    variants:
      - prompt: 'What does this line print?'
        snippet: |
          console.log('5' * 2);
        expected:
          kind: stdout
          value: |-
            10
        explanation: 'Multiplication has no string mode, so the string is converted to a number: five times two prints 10.'
      - prompt: 'What do these two lines print?'
        snippet: |
          console.log(typeof 42);
          console.log(typeof 'hello');
        expected:
          kind: stdout
          value: |-
            number
            string
        explanation: 'typeof returns a string naming the type: number for 42, string for quoted text.'

  - id: values-typeof-null-quiz-001
    concept: values-and-variables
    type: theory-quiz
    difficulty: 3
    prompt: 'What does the expression typeof null return?'
    choices:
      - id: a
        text: "'null'"
      - id: b
        text: "'object'"
      - id: c
        text: "'undefined'"
      - id: d
        text: 'The expression throws a TypeError.'
    correct: [b]
    explanation: "typeof null returns 'object'. In the first JavaScript implementation from 1995, a value's type was encoded with an internal tag: objects had a tag of zero, and null was represented by a zero pointer, landing in the same category. The standards committee discussed fixing it and rejected the fix: too much existing code relies on this behavior. Check for null with the strict comparison value === null."
    hints:
      - 'The intuitive answer does not match reality here: recall the section about the historical bug in the first implementation of the language.'
      - 'Think about how the first implementation encoded a value type with an internal tag, and what happened with the zero pointer.'
