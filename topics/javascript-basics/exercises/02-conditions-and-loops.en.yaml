exercises:
  - id: cond-falsy-quiz-001
    concept: conditions-and-loops
    type: theory-quiz
    difficulty: 1
    prompt: 'Which of these values are falsy, meaning they turn into false inside if? Select all that apply.'
    choices:
      - id: a
        text: 'the number 0'
      - id: b
        text: "the string '0'"
      - id: c
        text: "the empty string ''"
      - id: d
        text: 'undefined'
      - id: e
        text: "the string 'false'"
    correct: [a, c, d]
    explanation: "There are exactly six falsy values: false, 0, the empty string, null, undefined, and NaN. The strings '0' and 'false' are not empty, so both are truthy, no matter what text they hold."
    hints:
      - "Don't judge a value by its meaning, check it against the exact falsy list: it's closed, with exactly six entries."
      - 'For strings one rule applies: only a zero-length string is falsy, its content does not matter.'
    variants:
      - prompt: "What does the expression 5 === '5' return?"
        choices:
          - id: a
            text: 'true, because the values look the same'
          - id: b
            text: 'false, because the number and the string'
          - id: c
            text: 'an error: you cannot compare different types'
          - id: d
            text: "the string '5'"
        correct: [b]
        explanation: 'Strict comparison === first looks at types. The number 5 and a string already differ at this step, so the result is false, with no coercion and no error.'
      - prompt: 'Which operator compares two values without type coercion?'
        choices:
          - id: a
            text: '== (loose equality with type coercion)'
          - id: b
            text: '=== (strict equality, no type coercion)'
          - id: c
            text: '= (assignment, does not compare values)'
          - id: d
            text: '=> (arrow function, not a comparison)'
        correct: [b]
        explanation: 'The === operator checks both type and value without coercing anything. Loose == first tries to coerce the operands to the same type, a single = assigns, and => creates an arrow function.'

  - id: cond-loop-predict-001
    concept: conditions-and-loops
    type: predict-output
    difficulty: 2
    prompt: 'What does this code print?'
    snippet: |
      let sum = 0;
      for (let i = 1; i <= 4; i += 1) {
        sum = sum + i;
      }
      console.log(sum);
    expected:
      kind: stdout
      value: |-
        10
    explanation: 'Counter i takes the values 1, 2, 3, and 4: the condition i <= 4 is non-strict and includes the boundary. The sum accumulates as 1 + 2 + 3 + 4 and equals 10 by print time.'
    hints:
      - 'Walk the loop turn by turn and write down the value of sum after each: counter start, condition check, body, step.'
      - 'Look closely at the operator in the condition: it is non-strict, so the turn where i sits right on the boundary happens too.'
    variants:
      - snippet: |
          let sum = 0;
          for (let i = 1; i <= 5; i += 1) {
            if (i % 2 === 0) {
              continue;
            }
            sum = sum + i;
          }
          console.log(sum);
        expected:
          kind: stdout
          value: |-
            9
        explanation: 'continue cuts the current turn short: for even i the accumulation line never runs. Only 1, 3, and 5 make it into the sum, totaling 9.'
      - snippet: |
          const numbers = [3, 7, 5];
          for (const n of numbers) {
            console.log(n);
          }
        expected:
          kind: stdout
          value: |-
            3
            7
            5
        explanation: 'for...of feeds the list values into n in order, and each turn prints one number on its own line: first 3, then 7, then 5.'

  - id: cond-forof-blanks-001
    concept: conditions-and-loops
    type: fill-in-blanks
    difficulty: 2
    prompt: 'Complete the code: the loop iterates over prices and adds to total only the ones that are at least 500.'
    template: |
      const prices = [450, 1200, 80, 990];
      let total = 0;
      for (const price {{kw}} prices) {
        if (price {{op}} 500) {
          total = total + price;
        }
      }
      console.log(total);
    blanks:
      kw:
        accept: ['of']
      op:
        accept: ['>=']
    explanation: 'for...of places each list value into price in turn, and the condition price >= 500 lets only 1200 and 990 through to accumulation: total ends up 2190.'
    hints:
      - 'The first blank is about iterating list values, not its keys: recall which word goes in the header of such a loop.'
      - 'The phrase "at least 500" includes the boundary itself: a strict comparison would drop a price of exactly 500.'
    variants:
      - prompt: 'Complete the code: the loop counts how many times the string "Kazan" appears in the list (strict comparison).'
        template: |
          const cities = ['Kazan', 'Tver', 'Kazan'];
          let count = 0;
          for (const city {{kw}} cities) {
            if (city {{eq}} 'Kazan') {
              count = count + 1;
            }
          }
          console.log(count);
        blanks:
          kw:
            accept: ['of']
          eq:
            accept: ['===']
        explanation: 'for...of iterates the list values, and strict === checks for a match without coercion: the condition is true twice, so count equals 2.'
      - prompt: 'Complete the loop header so it sums the numbers from 1 to 3 inclusive.'
        template: |
          let sum = 0;
          for (let i = 1; i {{cmp}} 3; i {{step}}) {
            sum = sum + i;
          }
          console.log(sum);
        blanks:
          cmp:
            accept: ['<=']
          step:
            accept: ['+= 1', '+=1', '++']
        explanation: 'The word "inclusive" requires the non-strict condition i <= 3, otherwise the last turn is lost. The step i += 1 advances the counter; without it the loop never ends. The sum 1 + 2 + 3 equals 6.'

  - id: cond-truthy-predict-001
    concept: conditions-and-loops
    type: predict-output
    difficulty: 3
    prompt: 'What does this program print?'
    snippet: |
      const items = ['0', '', 'milk'];
      let count = 0;
      for (const item of items) {
        if (item) {
          count = count + 1;
        }
      }
      console.log(count);
    expected:
      kind: stdout
      value: |-
        2
    explanation: "The expression if (item) converts the string to a boolean by length. The string '0' is not empty and thus truthy, even though the number 0 is falsy. The empty string fails the check, 'milk' passes it: the counter equals 2."
    hints:
      - 'if does not look at the meaning of the string but at its place on the falsy list: convert each element to "yes" or "no" strictly by that list.'
      - 'Among strings only the zero-length one is falsy. Count the characters in each element before deciding for if.'
