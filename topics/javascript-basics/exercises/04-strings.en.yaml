exercises:
  - id: str-plus-quiz-001
    concept: strings
    type: theory-quiz
    difficulty: 1
    prompt: "What does console.log('Total: ' + 10 + 5) print?"
    choices:
      - id: a
        text: "'Total: 15'"
      - id: b
        text: "'Total: 105'"
      - id: c
        text: '15'
      - id: d
        text: 'The program throws a type error.'
    correct: [b]
    explanation: "'Total: ' + 10 immediately gives the string 'Total: 10', and the next + 5 only appends the text '5' on the right: you get 'Total: 105'. To make the numbers add before concatenation, wrap them in parentheses: 'Total: ' + (10 + 5)."
    hints:
      - 'Plus runs left to right. Determine the type of the result after the first plus, and only then decide what the second one will do.'
      - 'Once a string appears even once, every following + involving it concatenates text instead of summing.'
    variants:
      - prompt: "What does 'JavaScript'.slice(0, 4) return?"
        choices:
          - id: a
            text: "'Java'"
          - id: b
            text: "'JavaS'"
          - id: c
            text: "'Script'"
          - id: d
            text: 'undefined'
        correct: [a]
        explanation: "The second argument of slice is the boundary up to which it cuts; the character at that index does not make it into the result. Characters 0-3 are 'Java', the character at index 4 ('S') is already dropped."
      - prompt: "Strings are compared like this: 'cat' === 'cat' and 'cat' === 'Cat'. What do the two comparisons return, in order?"
        choices:
          - id: a
            text: 'true, false'
          - id: b
            text: 'true, true'
          - id: c
            text: 'false, false'
          - id: d
            text: 'false, true'
        correct: [a]
        explanation: "String comparison is case-sensitive, character by character. 'cat' and 'cat' match completely, so true. 'cat' and 'Cat' differ in the case of the first letter, so false."

  - id: str-slice-blanks-001
    concept: strings
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete the call that extracts the first 4 characters of the string 'JavaScript'."
    template: |
      const word = 'JavaScript';
      const short = word.{{method}}(0, {{end}});
      console.log(short);
    blanks:
      method:
        accept: ['slice']
      end:
        accept: ['4']
    explanation: 'slice(0, 4) extracts characters from index 0 through index 3 inclusive: the end of the range is excluded in slice, so the chunk length equals the difference between the bounds.'
    hints:
      - 'The method that extracts part of a string by index bounds was covered in this chapter next to trim and split.'
      - 'To get the first n characters, pass exactly n as the second argument to slice: counting inside the range also starts at zero.'
    variants:
      - prompt: "Complete the call that extracts the first 7 characters of the string 'Programming'."
        template: |
          const word = 'Programming';
          const short = word.{{method}}(0, {{end}});
          console.log(short);
        blanks:
          method:
            accept: ['slice']
          end:
            accept: ['7']
      - prompt: "Complete the call that extracts the first 5 characters of the string 'Development'."
        template: |
          const word = 'Development';
          const short = word.{{method}}(0, {{end}});
          console.log(short);
        blanks:
          method:
            accept: ['slice']
          end:
            accept: ['5']

  - id: str-immutable-predict-001
    concept: strings
    type: predict-output
    difficulty: 2
    prompt: 'What does this code print?'
    snippet: |
      let word = 'cat';
      word[0] = 'C';
      console.log(word);
      console.log(word.length);
    expected:
      kind: stdout
      value: |-
        cat
        3
    explanation: 'Strings in JavaScript are immutable: in the sandbox and console the assignment word[0] = "C" is silently ignored, while in strict mode it would throw a TypeError; there is no way to change an existing character. word stays the same, so its length does not change either.'
    hints:
      - 'A string resembles an array by index, but not by the ability to change them. What happens to an assignment that uses a write right strings do not have?'
      - "If the assignment did not take effect, the variable's value stayed the same as before it."
    variants:
      - snippet: |
          const raw = '  Anna  ';
          console.log(raw.length);
          console.log(raw.trim().length);
        expected:
          kind: stdout
          value: |-
            8
            4
      - snippet: |
          const word = 'Programming';
          console.log(word.slice(0, 4));
          console.log(word.slice(4));
        expected:
          kind: stdout
          value: |-
            Prog
            ramming

  - id: str-capitalize-001
    concept: strings
    type: javascript-function
    difficulty: 1
    prompt: 'Implement the function capitalize(word) that makes the first letter of a word uppercase and leaves the rest unchanged.'
    starter: |
      const capitalize = (word) => {

      };
    cases:
      - call: "capitalize('hello')"
        expect: 'Hello'
      - call: "capitalize('code')"
        expect: 'Code'
      - call: "capitalize('julia')"
        expect: 'Julia'
    hints:
      - 'Split the word into two pieces: the first character and everything else. Strings have an index for the first piece and a method for the second.'
      - 'Convert the first character to uppercase separately, take the rest as-is via slice(1), and join both pieces.'
    solution: |
      const capitalize = (word) => {
        return word[0].toUpperCase() + word.slice(1);
      };
    variants:
      - prompt: 'Implement the function shout(word) that converts a word to uppercase and appends "!!!" at the end.'
        starter: |
          const shout = (word) => {

          };
        cases:
          - call: "shout('hello')"
            expect: 'HELLO!!!'
          - call: "shout('code')"
            expect: 'CODE!!!'
          - call: "shout('yes')"
            expect: 'YES!!!'
        solution: |
          const shout = (word) => {
            return word.toUpperCase() + '!!!';
          };
      - prompt: 'Implement the function whisper(word) that converts a word to lowercase.'
        starter: |
          const whisper = (word) => {

          };
        cases:
          - call: "whisper('HELLO')"
            expect: 'hello'
          - call: "whisper('Code')"
            expect: 'code'
          - call: "whisper('YES')"
            expect: 'yes'
        solution: |
          const whisper = (word) => {
            return word.toLowerCase();
          };

  - id: str-format-price-001
    concept: strings
    type: javascript-function
    difficulty: 2
    prompt: 'Implement the function formatPrice(price) that uses a template literal to return a string like "100 ₽".'
    starter: |
      const formatPrice = (price) => {

      };
    cases:
      - call: 'formatPrice(100)'
        expect: '100 ₽'
      - call: 'formatPrice(0)'
        expect: '0 ₽'
      - call: 'formatPrice(2500)'
        expect: '2500 ₽'
    hints:
      - 'You do not need plus here: just drop the number into the text at the right spot.'
      - 'Use backticks and ${price} inside them: the engine converts the number to text right at the insertion point.'
    solution: |
      const formatPrice = (price) => {
        return `${price} ₽`;
      };
    variants:
      - prompt: 'Implement the function greetUser(name) that uses a template literal to return a string like "Hello, Anna!".'
        starter: |
          const greetUser = (name) => {

          };
        cases:
          - call: "greetUser('Anna')"
            expect: 'Hello, Anna!'
          - call: "greetUser('Boris')"
            expect: 'Hello, Boris!'
          - call: "greetUser('Vera')"
            expect: 'Hello, Vera!'
        solution: |
          const greetUser = (name) => {
            return `Hello, ${name}!`;
          };
      - prompt: 'Implement the function orderLabel(id, total) that uses a template literal to return a string like "Order #42: 1500 ₽".'
        starter: |
          const orderLabel = (id, total) => {

          };
        cases:
          - call: 'orderLabel(42, 1500)'
            expect: 'Order #42: 1500 ₽'
          - call: 'orderLabel(7, 300)'
            expect: 'Order #7: 300 ₽'
          - call: 'orderLabel(100, 0)'
            expect: 'Order #100: 0 ₽'
        solution: |
          const orderLabel = (id, total) => {
            return `Order #${id}: ${total} ₽`;
          };

  - id: str-initials-001
    concept: strings
    type: javascript-function
    difficulty: 3
    prompt: 'Implement the function initials(fullName): given a full name like "Anna Smith", return initials like "A.S." made of the first letter of each word in uppercase, separated by dots.'
    starter: |
      const initials = (fullName) => {

      };
    cases:
      - call: "initials('Anna Smith')"
        expect: 'A.S.'
      - call: "initials('Boris Coderov')"
        expect: 'B.C.'
      - call: "initials('Ivan Sergeyevich Petrov')"
        expect: 'I.S.P.'
    hints:
      - 'Two-step task: first get the individual words, then take only the first letter from each.'
      - "split(' ') gives an array of words. Iterate it with a for...of loop and on each step append the word's first letter and a dot to the result."
      - "A word's first letter is word[0]; don't forget .toUpperCase(), even if the name is already capitalized."
    solution: |
      const initials = (fullName) => {
        const parts = fullName.split(' ');
        let result = '';
        for (const part of parts) {
          result += part[0].toUpperCase() + '.';
        }
        return result;
      };
    variants:
      - prompt: 'Implement the function acronym(phrase): given a multi-word phrase, return an acronym of the first letter of each word in uppercase, with no dots or spaces.'
        starter: |
          const acronym = (phrase) => {

          };
        cases:
          - call: "acronym('model view controller')"
            expect: 'MVC'
          - call: "acronym('quick response')"
            expect: 'QR'
          - call: "acronym('single')"
            expect: 'S'
        solution: |
          const acronym = (phrase) => {
            const parts = phrase.split(' ');
            let result = '';
            for (const part of parts) {
              result += part[0].toUpperCase();
            }
            return result;
          };
