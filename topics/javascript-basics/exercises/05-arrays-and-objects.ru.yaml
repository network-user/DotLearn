exercises:
  - id: arr-access-quiz-001
    concept: arrays-and-objects
    type: theory-quiz
    difficulty: 1
    prompt: "В коде объявлен массив const list = ['хлеб', 'молоко', 'сыр']. Каким выражением достать значение «молоко»?"
    choices:
      - id: a
        text: 'list[1]'
      - id: b
        text: 'list[2]'
      - id: c
        text: 'list[0]'
      - id: d
        text: "list['молоко']"
    correct: [a]
    explanation: "Нумерация ячеек начинается с нуля: «хлеб» лежит в list[0], «молоко» в list[1], «сыр» в list[2]. Запись list['молоко'] ищет ключ с таким именем, а не значение, и вернёт undefined."
    variants:
      - prompt: "В коде объявлен объект const item = { name: 'чай', price: 250 }. Каким выражением достать цену?"
        choices:
          - id: a
            text: 'item.price'
          - id: b
            text: 'item[price]'
          - id: c
            text: "item.get('price')"
          - id: d
            text: 'price.item'
        correct: [a]
        explanation: "Точка читает свойство по буквальному имени: item.price вернёт 250. Запись item[price] без кавычек искала бы переменную price, а метода get у обычных объектов нет."
      - prompt: 'Массив состоит из трёх элементов. Что вернёт свойство length и какой индекс у последнего элемента?'
        choices:
          - id: a
            text: 'length равен 3, индекс последнего элемента 2'
          - id: b
            text: 'length равен 3, индекс последнего элемента 3'
          - id: c
            text: 'length равен 2, индекс последнего элемента 2'
          - id: d
            text: 'length равен 4, индекс последнего элемента 3'
        correct: [a]
        explanation: 'length считает элементы, их три. Нумерация идёт с нуля, поэтому последний элемент лежит под индексом length - 1, то есть 2.'

  - id: arr-last-item-001
    concept: arrays-and-objects
    type: javascript-function
    difficulty: 2
    prompt: 'Напишите функцию lastItem(list), которая возвращает последний элемент массива. Для пустого массива она должна вернуть undefined.'
    starter: |
      function lastItem(list) {

      }
    cases:
      - call: "lastItem(['хлеб', 'молоко', 'сыр'])"
        expect: 'сыр'
      - call: 'lastItem([42])'
        expect: 42
      - call: 'lastItem([])'
        expect: null
    solution: |
      function lastItem(list) {
        return list[list.length - 1];
      }
    hints:
      - 'Вспомните, как связаны длина массива и номер последнего элемента: нумерация начинается с нуля.'
      - 'Чтение несуществующей ячейки или отсутствующего поля само возвращает undefined, отдельная проверка на пустоту не нужна.'
    variants:
      - prompt: 'Напишите функцию firstWord(words), которая возвращает первый элемент массива строк. Для пустого массива она должна вернуть undefined.'
        starter: |
          function firstWord(words) {

          }
        cases:
          - call: "firstWord(['привет', 'мир'])"
            expect: 'привет'
          - call: "firstWord(['один'])"
            expect: 'один'
          - call: 'firstWord([])'
            expect: null
        solution: |
          function firstWord(words) {
            return words[0];
          }
      - prompt: 'Напишите функцию priceOf(item), которая возвращает поле price объекта товара. Если такого поля нет, она должна вернуть undefined.'
        starter: |
          function priceOf(item) {

          }
        cases:
          - call: "priceOf({ name: 'чай', price: 250 })"
            expect: 250
          - call: "priceOf({ name: 'кофе', price: 560 })"
            expect: 560
          - call: "priceOf({ name: 'вода' })"
            expect: null
        solution: |
          function priceOf(item) {
            return item.price;
          }

  - id: arr-reference-predict-001
    concept: arrays-and-objects
    type: predict-output
    difficulty: 3
    prompt: 'Что напечатает этот код?'
    snippet: |
      const a = [1, 2];
      const b = a;
      b.push(3);
      console.log(a.length);
      console.log(a === b);
    expected:
      kind: stdout
      value: |-
        3
        true
    explanation: 'Присваивание const b = a копирует ссылку, а не массив: обе переменные указывают на один и тот же объект. Поэтому push через b добавляет элемент в этот единственный массив, a.length становится 3, а сравнение === возвращает true, ведь ссылки совпадают.'
    hints:
      - 'const b = a не создаёт второй массив. Подумайте, сколько массивов существует в памяти после второй строки.'
      - 'Оператор === для массивов спрашивает, один ли это объект в памяти, а не совпадает ли содержимое.'

  - id: arr-count-001
    concept: arrays-and-objects
    type: javascript-function
    difficulty: 3
    prompt: 'Напишите функцию countCheap(products, limit): она получает массив товаров вида { name, price } и возвращает количество товаров, у которых price не превышает limit.'
    starter: |
      function countCheap(products, limit) {

      }
    cases:
      - call: "countCheap([{ name: 'хлеб', price: 45 }, { name: 'молоко', price: 89 }, { name: 'сыр', price: 320 }], 100)"
        expect: 2
      - call: "countCheap([{ name: 'икра', price: 4200 }], 1000)"
        expect: 0
      - call: 'countCheap([], 500)'
        expect: 0
    solution: |
      function countCheap(products, limit) {
        let count = 0;
        for (const product of products) {
          if (product.price <= limit) {
            count = count + 1;
          }
        }
        return count;
      }
    hints:
      - 'Ответ на вопрос «сколько» всегда число: нужно пройти по товарам и считать подходящие, а не собирать новый массив.'
      - 'Заведите счётчик до перебора и увеличивайте его каждый раз, когда цена очередного товара проходит проверку.'
      - 'Цикл for...of выдаёт объекты по одному: у каждого есть поле price, сравните его с limit.'
