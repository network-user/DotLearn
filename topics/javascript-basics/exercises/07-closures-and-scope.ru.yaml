exercises:
  - id: clo-block-scope-quiz-001
    concept: closures-and-scope
    type: theory-quiz
    difficulty: 1
    prompt: 'Переменная объявлена через let внутри блока if. Где её можно прочитать?'
    choices:
      - id: a
        text: 'Только внутри этого блока if.'
      - id: b
        text: 'В любом месте файла после строки с объявлением.'
      - id: c
        text: 'Внутри блока и во всей функции, которая его содержит.'
    correct: [a]
    explanation: 'let и const живут внутри ближайшего блока в фигурных скобках. Снаружи блока такой переменной не существует, обращение к ней даёт ReferenceError.'
    hints:
      - 'Представьте блок как закрытую коробку: то, что объявлено внутри через let, наружу не выглядывает.'
    variants:
      - prompt: 'Переменная объявлена через let в теле функции. Видна ли она снаружи функции?'
        choices:
          - id: a
            text: 'Да, если функция уже была вызвана хотя бы один раз.'
          - id: b
            text: 'Нет, она доступна только внутри самой функции.'
          - id: c
            text: 'Да, но только для чтения, изменить её снаружи нельзя.'
        correct: [b]
        explanation: 'Тело функции создаёт собственную область видимости. Её локальные переменные снаружи не существуют, сколько бы раз функцию ни вызывали.'
      - prompt: 'Две разные функции объявляют каждая у себя const с одинаковым именем total. Конфликтуют ли эти переменные?'
        choices:
          - id: a
            text: 'Да, вторая функция перезапишет значение переменной первой.'
          - id: b
            text: 'Да, интерпретатор сообщит об ошибке повторного объявления.'
          - id: c
            text: 'Нет, у каждой функции своя область видимости, переменные не пересекаются.'
        correct: [c]
        explanation: 'Каждая функция создаёт отдельную область видимости. Одноимённые переменные в разных областях никак не связаны между собой.'

  - id: clo-counter-predict-001
    concept: closures-and-scope
    type: predict-output
    difficulty: 3
    prompt: 'Что напечатает этот код?'
    snippet: |
      function makeCounter() {
        let count = 0;
        return function () {
          count += 1;
          return count;
        };
      }

      const a = makeCounter();
      const b = makeCounter();
      console.log(a());
      console.log(a());
      console.log(b());
    expected:
      kind: stdout
      value: |-
        1
        2
        1
    explanation: 'Каждый вызов makeCounter создаёт новое окружение с собственной переменной count. Счётчик a дважды увеличивает свою переменную, а b работает с другой, поэтому его первый вызов возвращает 1.'
    hints:
      - 'Каждый вызов makeCounter создаёт свежее окружение с собственной переменной count, рюкзаки функций не пересекаются.'
      - 'Проследите вызовы a отдельно от вызовов b: общего счётчика у них нет, каждый начинает с нуля.'

  - id: clo-multiplier-001
    concept: closures-and-scope
    type: javascript-function
    difficulty: 3
    prompt: 'Реализуйте makeMultiplier(factor): она возвращает функцию, которая умножает свой аргумент на factor.'
    starter: |
      function makeMultiplier(factor) {

      }
    cases:
      - call: 'makeMultiplier(3)(4)'
        expect: 12
      - call: 'makeMultiplier(0)(100)'
        expect: 0
      - call: '(() => { const double = makeMultiplier(2); return double(7) + double(10); })()'
        expect: 34
    solution: |
      function makeMultiplier(factor) {
        return function (x) {
          return x * factor;
        };
      }
    hints:
      - 'makeMultiplier сама ничего не умножает: её работа состоит в том, чтобы собрать и вернуть новую функцию.'
      - 'Вложенная функция видит параметр внешней, поэтому factor уедет в её рюкзаке и будет доступен при каждом вызове.'

  - id: clo-piggy-bank-001
    concept: closures-and-scope
    type: javascript-function
    difficulty: 4
    prompt: 'Реализуйте makePiggyBank(start = 0): она возвращает объект копилки с методами add(amount), который добавляет сумму к балансу, и total(), который возвращает накопленное. Переменная с балансом снаружи объекта недостижима.'
    starter: |
      function makePiggyBank(start = 0) {

      }
    cases:
      - call: '(() => { const p = makePiggyBank(); p.add(100); p.add(50); return p.total(); })()'
        expect: 150
      - call: '(() => { const p = makePiggyBank(500); return p.total(); })()'
        expect: 500
      - call: '(() => { const a = makePiggyBank(); const b = makePiggyBank(); a.add(70); return b.total(); })()'
        expect: 0
    solution: |
      function makePiggyBank(start = 0) {
        let balance = start;
        return {
          add(amount) {
            balance += amount;
          },
          total() {
            return balance;
          },
        };
      }
    hints:
      - 'Заведите переменную с балансом внутри фабрики: она уедет в рюкзаке возвращённых функций и снаружи будет недоступна.'
      - 'Верните объект с двумя функциями над одной и той же переменной: add изменяет баланс, total его читает.'
