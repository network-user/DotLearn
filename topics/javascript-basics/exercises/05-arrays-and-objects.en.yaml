exercises:
  - id: arr-access-quiz-001
    concept: arrays-and-objects
    type: theory-quiz
    difficulty: 1
    prompt: "The code declares an array const list = ['bread', 'milk', 'cheese']. Which expression gets the value 'milk'?"
    choices:
      - id: a
        text: 'list[1]'
      - id: b
        text: 'list[2]'
      - id: c
        text: 'list[0]'
      - id: d
        text: "list['milk']"
    correct: [a]
    explanation: "Cell numbering starts at zero: 'bread' sits at list[0], 'milk' at list[1], 'cheese' at list[2]. The expression list['milk'] looks for a key with that name, not a value, and returns undefined."
    variants:
      - prompt: "The code declares an object const item = { name: 'tea', price: 250 }. Which expression gets the price?"
        choices:
          - id: a
            text: 'item.price'
          - id: b
            text: 'item[price]'
          - id: c
            text: "item.get('price')"
          - id: d
            text: 'price.item'
        correct: [a]
        explanation: 'Dot notation reads a property by its literal name: item.price returns 250. The expression item[price] without quotes would look for a variable named price, and plain objects have no get method.'
      - prompt: 'An array has three elements. What does the length property return, and what is the index of the last element?'
        choices:
          - id: a
            text: 'length is 3, the last element index is 2'
          - id: b
            text: 'length is 3, the last element index is 3'
          - id: c
            text: 'length is 2, the last element index is 2'
          - id: d
            text: 'length is 4, the last element index is 3'
        correct: [a]
        explanation: 'length counts elements, and there are three. Numbering starts at zero, so the last element sits at index length - 1, which is 2.'

  - id: arr-last-item-001
    concept: arrays-and-objects
    type: javascript-function
    difficulty: 2
    prompt: 'Write the function lastItem(list) that returns the last element of an array. For an empty array it should return undefined.'
    starter: |
      function lastItem(list) {

      }
    cases:
      - call: "lastItem(['bread', 'milk', 'cheese'])"
        expect: 'cheese'
      - call: 'lastItem([42])'
        expect: 42
      - call: 'lastItem([])'
        expect: null
    solution: |
      function lastItem(list) {
        return list[list.length - 1];
      }
    hints:
      - 'Recall how array length relates to the index of the last element: numbering starts at zero.'
      - 'Reading a non-existent cell or a missing field returns undefined on its own; a separate empty check is not needed.'
    variants:
      - prompt: 'Write the function firstWord(words) that returns the first element of an array of strings. For an empty array it should return undefined.'
        starter: |
          function firstWord(words) {

          }
        cases:
          - call: "firstWord(['hello', 'world'])"
            expect: 'hello'
          - call: "firstWord(['one'])"
            expect: 'one'
          - call: 'firstWord([])'
            expect: null
        solution: |
          function firstWord(words) {
            return words[0];
          }
      - prompt: 'Write the function priceOf(item) that returns the price field of a product object. If there is no such field, it should return undefined.'
        starter: |
          function priceOf(item) {

          }
        cases:
          - call: "priceOf({ name: 'tea', price: 250 })"
            expect: 250
          - call: "priceOf({ name: 'coffee', price: 560 })"
            expect: 560
          - call: "priceOf({ name: 'water' })"
            expect: null
        solution: |
          function priceOf(item) {
            return item.price;
          }

  - id: arr-reference-predict-001
    concept: arrays-and-objects
    type: predict-output
    difficulty: 3
    prompt: 'What does this code print?'
    snippet: |
      const a = [1, 2];
      const b = a;
      b.push(3);
      console.log(a.length);
      console.log(a === b);
    expected:
      kind: stdout
      value: |-
        3
        true
    explanation: 'The assignment const b = a copies the reference, not the array: both variables point to the same object. So pushing through b adds an element to that single array, a.length becomes 3, and the === comparison returns true, since the references match.'
    hints:
      - 'const b = a does not create a second array. Think about how many arrays exist in memory after the second line.'
      - 'For arrays, === asks whether it is the same object in memory, not whether the contents match.'

  - id: arr-count-001
    concept: arrays-and-objects
    type: javascript-function
    difficulty: 3
    prompt: 'Write the function countCheap(products, limit): it receives an array of products shaped { name, price } and returns the count of products whose price does not exceed limit.'
    starter: |
      function countCheap(products, limit) {

      }
    cases:
      - call: "countCheap([{ name: 'bread', price: 45 }, { name: 'milk', price: 89 }, { name: 'cheese', price: 320 }], 100)"
        expect: 2
      - call: "countCheap([{ name: 'caviar', price: 4200 }], 1000)"
        expect: 0
      - call: 'countCheap([], 500)'
        expect: 0
    solution: |
      function countCheap(products, limit) {
        let count = 0;
        for (const product of products) {
          if (product.price <= limit) {
            count = count + 1;
          }
        }
        return count;
      }
    hints:
      - 'The answer to "how many" is always a number: iterate the products and count the matching ones instead of building a new array.'
      - 'Set up a counter before the loop and increment it each time a product price passes the check.'
      - 'The for...of loop yields objects one at a time: each has a price field, compare it to limit.'
