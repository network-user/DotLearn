exercises:
  - id: cond-falsy-quiz-001
    concept: conditions-and-loops
    type: theory-quiz
    difficulty: 1
    prompt: 'Какие из этих значений falsy, то есть превращаются в false внутри if? Выберите все подходящие.'
    choices:
      - id: a
        text: 'число 0'
      - id: b
        text: "строка '0'"
      - id: c
        text: "пустая строка ''"
      - id: d
        text: 'undefined'
      - id: e
        text: "строка 'false'"
    correct: [a, c, d]
    explanation: "Falsy значений ровно шесть: false, 0, пустая строка, null, undefined и NaN. Строки '0' и 'false' не пустые, поэтому обе truthy, какой бы текст внутри ни лежал."
    hints:
      - 'Не оценивайте смысл значения, а сверьте его с точным списком falsy: список закрытый, в нём ровно шесть пунктов.'
      - 'Для строк действует одно правило: falsy только строка нулевой длины, её содержимое роли не играет.'
    variants:
      - prompt: "Что вернёт выражение 5 === '5'?"
        choices:
          - id: a
            text: 'true, потому что значения выглядят одинаково'
          - id: b
            text: 'false, потому что число и строка'
          - id: c
            text: 'ошибку: сравнивать разные типы нельзя'
          - id: d
            text: "строку '5'"
        correct: [b]
        explanation: 'Строгое сравнение === первым делом смотрит на типы. Число 5 и строка отличаются уже на этом шаге, поэтому результат false, без приведения и без ошибок.'
      - prompt: 'Какой оператор сравнивает два значения без приведения типов?'
        choices:
          - id: a
            text: 'Значение ==, выбранное как полный ответ'
          - id: b
            text: '=== (строгое сравнение без приведения типов)'
          - id: c
            text: 'Значение =, выбранное как полный ответ'
          - id: d
            text: 'Значение =>, выбранное как полный ответ'
        correct: [b]
        explanation: 'Оператор === проверяет и тип, и значение, ничего не приводя. Нестрогое == сначала пытается привести операнды к одному типу, одиночное = присваивает, а => создаёт стрелочную функцию.'

  - id: cond-loop-predict-001
    concept: conditions-and-loops
    type: predict-output
    difficulty: 2
    prompt: 'Что выведет этот код?'
    snippet: |
      let sum = 0;
      for (let i = 1; i <= 4; i += 1) {
        sum = sum + i;
      }
      console.log(sum);
    expected:
      kind: stdout
      value: |-
        10
    explanation: 'Счётчик i принимает значения 1, 2, 3 и 4: условие i <= 4 нестрогое и включает границу. Сумма накапливается как 1 + 2 + 3 + 4 и к моменту печати равна 10.'
    hints:
      - 'Пройдите цикл по виткам и выписывайте значение sum после каждого: старт счётчика, проверка условия, тело, шаг.'
      - 'Присмотритесь к оператору в условии: он нестрогий, поэтому виток с i на самой границе тоже состоится.'
    variants:
      - snippet: |
          let sum = 0;
          for (let i = 1; i <= 5; i += 1) {
            if (i % 2 === 0) {
              continue;
            }
            sum = sum + i;
          }
          console.log(sum);
        expected:
          kind: stdout
          value: |-
            9
        explanation: 'continue обрывает текущий виток: для чётных i строка с накоплением не выполняется. В сумму попадают только 1, 3 и 5, итого 9.'
      - snippet: |
          const numbers = [3, 7, 5];
          for (const n of numbers) {
            console.log(n);
          }
        expected:
          kind: stdout
          value: |-
            3
            7
            5
        explanation: 'for...of подставляет в n значения списка по порядку, и каждый виток печатает одно число на своей строке: сначала 3, затем 7, затем 5.'

  - id: cond-forof-blanks-001
    concept: conditions-and-loops
    type: fill-in-blanks
    difficulty: 2
    prompt: 'Дополните код: цикл перебирает цены и складывает в total только те, что не меньше 500.'
    template: |
      const prices = [450, 1200, 80, 990];
      let total = 0;
      for (const price {{kw}} prices) {
        if (price {{op}} 500) {
          total = total + price;
        }
      }
      console.log(total);
    blanks:
      kw:
        accept: ['of']
      op:
        accept: ['>=']
    explanation: 'for...of по очереди кладёт в price каждое значение списка, а условие price >= 500 пропускает к накоплению только 1200 и 990: в конце total равен 2190.'
    hints:
      - 'Первый пропуск отвечает за перебор значений списка, а не его ключей: вспомните, какое слово стоит в заголовке такого цикла.'
      - 'Формулировка «не меньше 500» включает саму границу: строгое сравнение потеряло бы цену ровно в 500 рублей.'
    variants:
      - prompt: 'Дополните код: цикл считает, сколько раз в списке встречается строка «Казань» (сравнение строгое).'
        template: |
          const cities = ['Казань', 'Тверь', 'Казань'];
          let count = 0;
          for (const city {{kw}} cities) {
            if (city {{eq}} 'Казань') {
              count = count + 1;
            }
          }
          console.log(count);
        blanks:
          kw:
            accept: ['of']
          eq:
            accept: ['===']
        explanation: 'for...of перебирает значения списка, а строгое === проверяет совпадение без приведения типов: условие истинно дважды, и count равен 2.'
      - prompt: 'Дополните заголовок цикла так, чтобы он сложил числа от 1 до 3 включительно.'
        template: |
          let sum = 0;
          for (let i = 1; i {{cmp}} 3; i {{step}}) {
            sum = sum + i;
          }
          console.log(sum);
        blanks:
          cmp:
            accept: ['<=']
          step:
            accept: ['+= 1', '+=1', '++']
        explanation: 'Слово «включительно» требует нестрогого условия i <= 3, иначе последний виток пропадёт. Шаг i += 1 двигает счётчик, без него цикл не закончится. Сумма 1 + 2 + 3 равна 6.'

  - id: cond-truthy-predict-001
    concept: conditions-and-loops
    type: predict-output
    difficulty: 3
    prompt: 'Что напечатает эта программа?'
    snippet: |
      const items = ['0', '', 'молоко'];
      let count = 0;
      for (const item of items) {
        if (item) {
          count = count + 1;
        }
      }
      console.log(count);
    expected:
      kind: stdout
      value: |-
        2
    explanation: "Запись if (item) приводит строку к логическому значению по длине. Строка '0' не пустая и потому truthy, хотя число 0 falsy. Пустая строка проверку не проходит, 'молоко' проходит: счётчик равен 2."
    hints:
      - 'if смотрит не на смысл строки, а на её место в списке falsy значений: переведите каждый элемент в «да» или «нет» строго по этому списку.'
      - 'Среди строк falsy только строка нулевой длины. Посчитайте символы в каждом элементе, прежде чем решать за if.'
