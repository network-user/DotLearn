exercises:
  - id: am-pick-method-blanks-001
    concept: array-methods
    type: fill-in-blanks
    difficulty: 1
    prompt: 'A shop processes the prices array. Fill in the method names: the first line doubles each price, the second keeps only prices above 100, the third sums all prices.'
    template: |
      prices.{{m1}}(p => p * 2)
      prices.{{m2}}(p => p > 100)
      prices.{{m3}}((sum, p) => sum + p, 0)
    blanks:
      m1:
        accept: ['map']
      m2:
        accept: ['filter']
      m3:
        accept: ['reduce']
    explanation: 'map transforms each element and preserves length, filter selects elements by a predicate, reduce folds the array into a single value through an accumulator with an initial value.'
    variants:
      - prompt: 'A service processes the names array. Fill in the method names: the first line keeps names containing the letter "a", the second sums the total length of all names, the third converts each name to uppercase.'
        template: |
          names.{{m1}}(n => n.includes('a'))
          names.{{m2}}((len, n) => len + n.length, 0)
          names.{{m3}}(n => n.toUpperCase())
        blanks:
          m1:
            accept: ['filter']
          m2:
            accept: ['reduce']
          m3:
            accept: ['map']
      - prompt: 'A function processes the nums array. Fill in the method names: the first line computes the product of all numbers, the second increases each number by one, the third keeps only even numbers.'
        template: |
          nums.{{m1}}((acc, x) => acc * x, 1)
          nums.{{m2}}(x => x + 1)
          nums.{{m3}}(x => x % 2 === 0)
        blanks:
          m1:
            accept: ['reduce']
          m2:
            accept: ['map']
          m3:
            accept: ['filter']

  - id: am-double-prices-001
    concept: array-methods
    type: javascript-function
    difficulty: 2
    prompt: 'Implement doubledPrices(prices): return a new array where each price is multiplied by 2. The original array must not change.'
    starter: |
      const doubledPrices = (prices) => {

      };
    cases:
      - call: 'doubledPrices([100, 250, 400])'
        expect: [200, 500, 800]
      - call: 'doubledPrices([])'
        expect: []
      - call: 'doubledPrices([7])'
        expect: [14]
    solution: |
      const doubledPrices = (prices) => prices.map(p => p * 2);
    hints:
      - 'Each input price maps to exactly one output price, so the length stays the same. Recall which method has exactly this contract.'
      - "An arrow with an expression body returns the result on its own; if you use curly braces, don't forget an explicit return."
    variants:
      - prompt: 'Implement namesUpper(names): return a new array where each name is converted to uppercase.'
        starter: |
          const namesUpper = (names) => {

          };
        cases:
          - call: "namesUpper(['anna', 'boris'])"
            expect: ['ANNA', 'BORIS']
          - call: 'namesUpper([])'
            expect: []
          - call: "namesUpper(['vera'])"
            expect: ['VERA']
        solution: |
          const namesUpper = (names) => names.map(n => n.toUpperCase());
      - prompt: 'Implement onlyPositive(nums): return a new array with only the numbers greater than zero, keeping the original order.'
        starter: |
          const onlyPositive = (nums) => {

          };
        cases:
          - call: 'onlyPositive([3, -1, 0, 5])'
            expect: [3, 5]
          - call: 'onlyPositive([-2, -7])'
            expect: []
          - call: 'onlyPositive([1, 2, 3])'
            expect: [1, 2, 3]
        solution: |
          const onlyPositive = (nums) => nums.filter(x => x > 0);

  - id: am-cheap-names-001
    concept: array-methods
    type: javascript-function
    difficulty: 3
    prompt: "Implement affordableNames(products, limit): from an array of objects shaped { name, price }, return an array of product names with a price no higher than limit, keeping the original order."
    starter: |
      const affordableNames = (products, limit) => {

      };
    cases:
      - call: "affordableNames([{ name: 'Kettle', price: 1990 }, { name: 'Mug', price: 350 }, { name: 'Spoon', price: 90 }], 500)"
        expect: ['Mug', 'Spoon']
      - call: "affordableNames([{ name: 'Laptop', price: 55000 }], 1000)"
        expect: []
      - call: "affordableNames([{ name: 'Notebook', price: 120 }, { name: 'Pen', price: 60 }], 500)"
        expect: ['Notebook', 'Pen']
    solution: |
      const affordableNames = (products, limit) =>
        products.filter(p => p.price <= limit).map(p => p.name);
    hints:
      - 'Two-step task: first decide which products survive the price filter, then turn each surviving object into its name string.'
      - 'Each of the two steps returns a new array, so you can call the second method directly on the result of the first, chained.'
      - 'Check the order of the pipeline stages: filter first, then transform, otherwise the predicate has no price to compare.'

  - id: am-cart-total-001
    concept: array-methods
    type: javascript-function
    difficulty: 4
    prompt: "Implement cartTotal(cart): given an array of items shaped { title, price, qty }, return the total cart cost, where each item costs price * qty."
    starter: |
      const cartTotal = (cart) => {

      };
    cases:
      - call: "cartTotal([{ title: 'Kettle', price: 1990, qty: 1 }, { title: 'Mug', price: 350, qty: 2 }])"
        expect: 2690
      - call: 'cartTotal([])'
        expect: 0
      - call: "cartTotal([{ title: 'Tea', price: 250, qty: 2 }, { title: 'Sugar', price: 90, qty: 0 }])"
        expect: 500
      - call: "cartTotal([{ title: 'Water', price: 45, qty: 3 }])"
        expect: 135
    solution: |
      const cartTotal = (cart) =>
        cart.reduce((sum, item) => sum + item.price * item.qty, 0);
    hints:
      - 'From a whole list of items you need one number. This is not a transform or a filter, but folding the list into a total.'
      - 'Set up an accumulator starting at 0 and add each item cost to it; then an empty cart naturally gives 0.'
