exercises:
  - id: clo-block-scope-quiz-001
    concept: closures-and-scope
    type: theory-quiz
    difficulty: 1
    prompt: 'A variable is declared with let inside an if block. Where can you read it?'
    choices:
      - id: a
        text: 'Only inside that if block.'
      - id: b
        text: 'Anywhere in the file after the declaration line.'
      - id: c
        text: 'Inside the block and throughout the function that contains it.'
    correct: [a]
    explanation: 'let and const live inside the nearest block in curly braces. Outside the block, that variable does not exist; referencing it gives a ReferenceError.'
    hints:
      - 'Picture the block as a closed box: whatever is declared inside with let does not peek outside.'
    variants:
      - prompt: 'A variable is declared with let inside a function body. Is it visible outside the function?'
        choices:
          - id: a
            text: 'Yes, if the function has already been called at least once.'
          - id: b
            text: 'No, it is only accessible inside the function itself.'
          - id: c
            text: 'Yes, but only for reading; it cannot be changed from outside.'
        correct: [b]
        explanation: 'A function body creates its own scope. Its local variables do not exist outside it, no matter how many times the function is called.'
      - prompt: 'Two different functions each declare a const named total. Do these variables conflict?'
        choices:
          - id: a
            text: "Yes, the second function overwrites the first function's variable value."
          - id: b
            text: 'Yes, the interpreter reports a redeclaration error.'
          - id: c
            text: 'No, each function has its own scope; the variables never intersect.'
        correct: [c]
        explanation: 'Each function creates a separate scope. Same-named variables in different scopes are unrelated to each other.'

  - id: clo-counter-predict-001
    concept: closures-and-scope
    type: predict-output
    difficulty: 3
    prompt: 'What does this code print?'
    snippet: |
      function makeCounter() {
        let count = 0;
        return function () {
          count += 1;
          return count;
        };
      }

      const a = makeCounter();
      const b = makeCounter();
      console.log(a());
      console.log(a());
      console.log(b());
    expected:
      kind: stdout
      value: |-
        1
        2
        1
    explanation: 'Each call to makeCounter creates a new environment with its own count variable. Counter a increments its own variable twice, while b works with a different one, so its first call returns 1.'
    hints:
      - "Each call to makeCounter creates a fresh environment with its own count variable; the functions' backpacks never overlap."
      - 'Trace the calls to a separately from the calls to b: they share no counter, each starts at zero.'

  - id: clo-multiplier-001
    concept: closures-and-scope
    type: javascript-function
    difficulty: 3
    prompt: 'Implement makeMultiplier(factor): it returns a function that multiplies its argument by factor.'
    starter: |
      function makeMultiplier(factor) {

      }
    cases:
      - call: 'makeMultiplier(3)(4)'
        expect: 12
      - call: 'makeMultiplier(0)(100)'
        expect: 0
      - call: '(() => { const double = makeMultiplier(2); return double(7) + double(10); })()'
        expect: 34
    solution: |
      function makeMultiplier(factor) {
        return function (x) {
          return x * factor;
        };
      }
    hints:
      - 'makeMultiplier itself multiplies nothing: its job is to build and return a new function.'
      - 'The nested function sees the outer parameter, so factor travels along in its backpack and stays available on every call.'

  - id: clo-piggy-bank-001
    concept: closures-and-scope
    type: javascript-function
    difficulty: 4
    prompt: 'Implement makePiggyBank(start = 0): it returns a piggy bank object with methods add(amount), which adds an amount to the balance, and total(), which returns the accumulated amount. The balance variable is unreachable from outside the object.'
    starter: |
      function makePiggyBank(start = 0) {

      }
    cases:
      - call: '(() => { const p = makePiggyBank(); p.add(100); p.add(50); return p.total(); })()'
        expect: 150
      - call: '(() => { const p = makePiggyBank(500); return p.total(); })()'
        expect: 500
      - call: '(() => { const a = makePiggyBank(); const b = makePiggyBank(); a.add(70); return b.total(); })()'
        expect: 0
    solution: |
      function makePiggyBank(start = 0) {
        let balance = start;
        return {
          add(amount) {
            balance += amount;
          },
          total() {
            return balance;
          },
        };
      }
    hints:
      - 'Set up the balance variable inside the factory: it travels in the backpack of the returned functions and stays inaccessible from outside.'
      - 'Return an object with two functions over the same variable: add changes the balance, total reads it.'
