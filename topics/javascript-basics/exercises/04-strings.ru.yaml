exercises:
  - id: str-plus-quiz-001
    concept: strings
    type: theory-quiz
    difficulty: 1
    prompt: "Что напечатает console.log('Итого: ' + 10 + 5)?"
    choices:
      - id: a
        text: "'Итого: 15'"
      - id: b
        text: "'Итого: 105'"
      - id: c
        text: '15'
      - id: d
        text: 'Программа выбросит ошибку типов.'
    correct: [b]
    explanation: "'Итого: ' + 10 сразу даёт строку 'Итого: 10', и следующий + 5 только приклеивает текст «5» справа: получается 'Итого: 105'. Чтобы числа сложились раньше склейки, их нужно взять в скобки: 'Итого: ' + (10 + 5)."
    hints:
      - 'Плюс выполняется слева направо. Определите тип результата после первого плюса и только потом решайте, что сделает второй.'
      - 'Как только строка появилась хотя бы раз, каждый следующий + с её участием склеивает текст, а не считает сумму.'
    variants:
      - prompt: "Что вернёт 'JavaScript'.slice(0, 4)?"
        choices:
          - id: a
            text: "'Java'"
          - id: b
            text: "'JavaS'"
          - id: c
            text: "'Script'"
          - id: d
            text: 'undefined'
        correct: [a]
        explanation: "Второй аргумент slice это граница, до которой режут, символ под этим номером в результат не попадает. Символы с номерами 0-3 это 'Java', символ под номером 4 ('S') уже отброшен."
      - prompt: "Строки сравнивают так: 'кот' === 'кот' и 'кот' === 'Кот'. Что вернут два сравнения по порядку?"
        choices:
          - id: a
            text: 'true, false'
          - id: b
            text: 'true, true'
          - id: c
            text: 'false, false'
          - id: d
            text: 'false, true'
        correct: [a]
        explanation: "Сравнение строк учитывает регистр посимвольно. 'кот' и 'кот' совпадают полностью, поэтому true. 'кот' и 'Кот' отличаются первой буквой регистром, поэтому false."

  - id: str-slice-blanks-001
    concept: strings
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите вызов, который вырезает первые 4 символа строки 'JavaScript'."
    template: |
      const word = 'JavaScript';
      const short = word.{{method}}(0, {{end}});
      console.log(short);
    blanks:
      method:
        accept: ['slice']
      end:
        accept: ['4']
    explanation: 'slice(0, 4) вырезает символы с номера 0 по номер 3 включительно: конец диапазона в slice не входит, поэтому длина куска равна разности границ.'
    hints:
      - 'Метод, который вырезает часть строки по границам индексов, был разобран в этой главе рядом с trim и split.'
      - 'Чтобы получить первые n символов, вторым аргументом slice ставят ровно n: счёт внутри диапазона тоже начинается с нуля.'
    variants:
      - prompt: "Допишите вызов, который вырезает первые 7 символов строки 'Programming'."
        template: |
          const word = 'Programming';
          const short = word.{{method}}(0, {{end}});
          console.log(short);
        blanks:
          method:
            accept: ['slice']
          end:
            accept: ['7']
      - prompt: "Допишите вызов, который вырезает первые 5 символов строки 'Разработка'."
        template: |
          const word = 'Разработка';
          const short = word.{{method}}(0, {{end}});
          console.log(short);
        blanks:
          method:
            accept: ['slice']
          end:
            accept: ['5']

  - id: str-immutable-predict-001
    concept: strings
    type: predict-output
    difficulty: 2
    prompt: 'Что напечатает этот код?'
    snippet: |
      let word = 'кот';
      word[0] = 'Р';
      console.log(word);
      console.log(word.length);
    expected:
      kind: stdout
      value: |-
        кот
        3
    explanation: 'Строки в JavaScript неизменяемы: присваивание по индексу word[0] = "Р" молча ничего не делает, ни один существующий символ поменять нельзя. word остаётся прежним, поэтому и длина не меняется.'
    hints:
      - 'Строка похожа на массив по индексам, но не по возможности их менять. Что случится с присваиванием по несуществующему для строк праву записи?'
      - 'Если присваивание не сработало, значение переменной осталось тем же, что было до него.'
    variants:
      - snippet: |
          const raw = '  Anna  ';
          console.log(raw.length);
          console.log(raw.trim().length);
        expected:
          kind: stdout
          value: |-
            8
            4
      - snippet: |
          const word = 'Programming';
          console.log(word.slice(0, 4));
          console.log(word.slice(4));
        expected:
          kind: stdout
          value: |-
            Prog
            ramming

  - id: str-capitalize-001
    concept: strings
    type: javascript-function
    difficulty: 1
    prompt: 'Реализуйте функцию capitalize(word), которая делает первую букву слова заглавной, а остальные оставляет без изменений.'
    starter: |
      const capitalize = (word) => {

      };
    cases:
      - call: "capitalize('привет')"
        expect: 'Привет'
      - call: "capitalize('код')"
        expect: 'Код'
      - call: "capitalize('юля')"
        expect: 'Юля'
    hints:
      - 'Слово нужно разделить на два куска: первый символ и всё остальное. У строк есть индекс для первого куска и метод для второго.'
      - 'Первый символ переведите в верхний регистр отдельно, а второй кусок возьмите как есть через slice(1), и склейте оба куска.'
    solution: |
      const capitalize = (word) => {
        return word[0].toUpperCase() + word.slice(1);
      };
    variants:
      - prompt: 'Реализуйте функцию shout(word), которая переводит слово в верхний регистр и добавляет в конце «!!!».'
        starter: |
          const shout = (word) => {

          };
        cases:
          - call: "shout('привет')"
            expect: 'ПРИВЕТ!!!'
          - call: "shout('код')"
            expect: 'КОД!!!'
          - call: "shout('да')"
            expect: 'ДА!!!'
        solution: |
          const shout = (word) => {
            return word.toUpperCase() + '!!!';
          };
      - prompt: 'Реализуйте функцию whisper(word), которая переводит слово в нижний регистр.'
        starter: |
          const whisper = (word) => {

          };
        cases:
          - call: "whisper('ПРИВЕТ')"
            expect: 'привет'
          - call: "whisper('Код')"
            expect: 'код'
          - call: "whisper('ДА')"
            expect: 'да'
        solution: |
          const whisper = (word) => {
            return word.toLowerCase();
          };

  - id: str-format-price-001
    concept: strings
    type: javascript-function
    difficulty: 2
    prompt: 'Реализуйте функцию formatPrice(price), которая через шаблонный литерал возвращает строку вида "100 ₽".'
    starter: |
      const formatPrice = (price) => {

      };
    cases:
      - call: 'formatPrice(100)'
        expect: '100 ₽'
      - call: 'formatPrice(0)'
        expect: '0 ₽'
      - call: 'formatPrice(2500)'
        expect: '2500 ₽'
    hints:
      - 'Здесь не нужен плюс: число нужно просто подставить в текст в нужном месте.'
      - 'Используйте обратные кавычки и ${price} внутри них: движок сам превратит число в текст на месте подстановки.'
    solution: |
      const formatPrice = (price) => {
        return `${price} ₽`;
      };
    variants:
      - prompt: 'Реализуйте функцию greetUser(name), которая через шаблонный литерал возвращает строку вида "Привет, Анна!".'
        starter: |
          const greetUser = (name) => {

          };
        cases:
          - call: "greetUser('Анна')"
            expect: 'Привет, Анна!'
          - call: "greetUser('Борис')"
            expect: 'Привет, Борис!'
          - call: "greetUser('Вера')"
            expect: 'Привет, Вера!'
        solution: |
          const greetUser = (name) => {
            return `Привет, ${name}!`;
          };
      - prompt: 'Реализуйте функцию orderLabel(id, total), которая через шаблонный литерал возвращает строку вида "Заказ №42: 1500 ₽".'
        starter: |
          const orderLabel = (id, total) => {

          };
        cases:
          - call: 'orderLabel(42, 1500)'
            expect: 'Заказ №42: 1500 ₽'
          - call: 'orderLabel(7, 300)'
            expect: 'Заказ №7: 300 ₽'
          - call: 'orderLabel(100, 0)'
            expect: 'Заказ №100: 0 ₽'
        solution: |
          const orderLabel = (id, total) => {
            return `Заказ №${id}: ${total} ₽`;
          };

  - id: str-initials-001
    concept: strings
    type: javascript-function
    difficulty: 3
    prompt: 'Реализуйте функцию initials(fullName): по полному имени вида "Анна Смирнова" верните инициалы вида "А.С." из первых букв каждого слова в верхнем регистре, разделённых точками.'
    starter: |
      const initials = (fullName) => {

      };
    cases:
      - call: "initials('Анна Смирнова')"
        expect: 'А.С.'
      - call: "initials('Борис Разработкин')"
        expect: 'Б.Р.'
      - call: "initials('Иван Сергеевич Петров')"
        expect: 'И.С.П.'
    hints:
      - 'Задача из двух шагов: сначала получить отдельные слова, потом взять из каждого только первую букву.'
      - "split(' ') даст массив слов. Переберите его циклом for...of и на каждом шаге добавляйте к результату первую букву слова и точку."
      - 'Первая буква слова это word[0]; не забудьте .toUpperCase(), даже если имя уже написано с заглавной буквы.'
    solution: |
      const initials = (fullName) => {
        const parts = fullName.split(' ');
        let result = '';
        for (const part of parts) {
          result += part[0].toUpperCase() + '.';
        }
        return result;
      };
    variants:
      - prompt: 'Реализуйте функцию acronym(phrase): по фразе из нескольких слов верните акроним из первых букв каждого слова в верхнем регистре, без точек и пробелов.'
        starter: |
          const acronym = (phrase) => {

          };
        cases:
          - call: "acronym('модель объект компонент')"
            expect: 'МОК'
          - call: "acronym('быстрый ответ')"
            expect: 'БО'
          - call: "acronym('единственный')"
            expect: 'Е'
        solution: |
          const acronym = (phrase) => {
            const parts = phrase.split(' ');
            let result = '';
            for (const part of parts) {
              result += part[0].toUpperCase();
            }
            return result;
          };
