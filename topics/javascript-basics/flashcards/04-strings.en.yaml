conceptId: strings
cards:
  - id: strings-01
    front: "How do you get the last character of the string word?"
    back: "word[word.length - 1]. A string is indexed like an array, starting at zero, so the last character's index is one less than the length."
    tags: [indexing, length]
  - id: strings-02
    front: "Why doesn't word[0] = 'A' change the string word?"
    back: "Strings in JavaScript are immutable. An index assignment silently does nothing: to get different text, you must build a new string and store it in the variable again."
    tags: [immutability]
  - id: strings-03
    front: "What does ${...} do inside a template literal?"
    back: "It evaluates the expression inside as ordinary JavaScript code and inserts the result into the text at that spot, before the value becomes part of the string."
    tags: [template-literals]
  - id: strings-04
    front: "What does 'Total: ' + 10 + 5 print?"
    back: "'Total: 105'. Plus runs left to right: 'Total: ' + 10 immediately gives a string, and the next + 5 only appends text instead of adding numbers."
    tags: [coercion, plus]
  - id: strings-05
    front: "Which characters are in the result of 'JavaScript'.slice(0, 4)?"
    back: "Characters from index 0 through index 3 inclusive: 'Java'. The second argument of slice is the boundary up to which it cuts; the character at that index is excluded from the result."
    tags: [slice]
  - id: strings-06
    front: "How does includes differ from indexOf?"
    back: "includes only answers true or false: is the substring there or not. indexOf additionally names the index where the first match starts, or -1 if there is no match."
    tags: [methods]
