conceptId: functions
cards:
  - id: functions-01
    front: "What does a function with no return return?"
    back: "undefined. JavaScript does not treat this as an error: the function runs, and the calling code gets undefined instead of a result."
    tags: [return]
  - id: functions-02
    front: "How does a function declaration differ from a function expression?"
    back: "A declaration is its own statement with the word function and a name; you can call it even above where it is declared. An expression creates a function as a value and stores it in a variable; you can only call it after the assignment."
    tags: [declaration, expression]
  - id: functions-03
    front: "When does an arrow function return a result without the word return?"
    back: "When the body is a single expression without curly braces: (x) => x * 2. If the body is in curly braces, you need an explicit return, otherwise it returns undefined."
    tags: [arrow, return]
  - id: functions-04
    front: "How do you give a parameter a default value?"
    back: "Set it right in the declaration parentheses: function greet(name = 'guest'). It is used when the argument is omitted or passed as undefined; null and an empty string do not trigger the default."
    tags: [defaults]
  - id: functions-05
    front: "How does a parameter differ from an argument?"
    back: "A parameter is written in the function declaration and serves as a local name, a placeholder for a future value. An argument is passed at call time: the concrete value that fills the parameter's slot."
    tags: [terms]
  - id: functions-06
    front: "What do you get if you reference a function without parentheses?"
    back: "The function itself as a value, not the result of calling it. You can store that value in a variable or pass it to another function as a callback, for example to map."
    tags: [values]
