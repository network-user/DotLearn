conceptId: arrays-and-objects
cards:
  - id: arrays-and-objects-01
    front: 'В массиве из пяти элементов какой индекс у первого и у последнего элемента?'
    back: 'Первый лежит под индексом 0, последний под индексом 4: нумерация идёт с нуля, поэтому последний элемент достают выражением list[list.length - 1].'
    tags: [arrays, indexing]
  - id: arrays-and-objects-02
    front: 'Что делают методы push и pop?'
    back: 'push добавляет элемент в конец массива и увеличивает length. pop снимает последний элемент, возвращает его и уменьшает length. Оба меняют сам массив, а не создают новый.'
    tags: [arrays, methods]
  - id: arrays-and-objects-03
    front: 'После const b = a, где a хранит массив, сколько массивов существует в памяти?'
    back: 'Один. Присваивание копирует ссылку, а не содержимое: обе переменные указывают на тот же массив, и изменения через b видны через a. Настоящую поверхностную копию создаёт спред [...a].'
    tags: [references]
  - id: arrays-and-objects-04
    front: 'Что вернёт сравнение [1] === [1] и почему?'
    back: 'false. Оператор === сравнивает массивы и объекты по ссылке: здесь созданы два разных массива. true получится, только если обе стороны указывают на один и тот же объект.'
    tags: [references, comparison]
  - id: arrays-and-objects-05
    front: 'Когда свойство объекта читают через квадратные скобки, а не через точку?'
    back: 'Когда имя ключа лежит в переменной: item[key] заглянет в переменную key, а item.key ищет свойство с буквальным именем key и вернёт undefined, если его нет.'
    tags: [objects]
  - id: arrays-and-objects-06
    front: 'Что произойдёт при чтении несуществующего индекса массива или ключа объекта?'
    back: 'Ошибки не будет: JavaScript вернёт undefined. Это опасно тем, что опечатка в ключе всплывает не в месте чтения, а позже, когда undefined попадает в вычисления и даёт NaN.'
    tags: [objects, pitfalls]
