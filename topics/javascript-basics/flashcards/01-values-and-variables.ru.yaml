conceptId: values-and-variables
cards:
  - id: values-and-variables-01
    front: 'Какие примитивные типы значений есть в JavaScript?'
    back: 'number, string, boolean, null, undefined, а также редкие bigint и symbol. Всё остальное относится к объектам.'
    tags: [types]
  - id: values-and-variables-02
    front: 'Чем let отличается от const?'
    back: 'let разрешает перенаправить имя на новое значение, const фиксирует стрелку одним присваиванием при объявлении.'
    tags: [variables]
  - id: values-and-variables-03
    front: 'Можно ли изменить содержимое объекта, объявленного через const?'
    back: 'Да. const запрещает переприсвоить имя целиком, а свойства объекта менять и добавлять можно.'
    tags: [variables, objects]
  - id: values-and-variables-04
    front: 'Что вернёт typeof null?'
    back: "Строку 'object'. Это историческая ошибка первой реализации 1995 года, её сохранили ради совместимости."
    tags: [typeof]
  - id: values-and-variables-05
    front: 'В чём разница между undefined и null?'
    back: 'undefined ставит сам язык, когда значения ещё нет; null ставит программист, чтобы явно обозначить пустоту.'
    tags: [types]
  - id: values-and-variables-06
    front: "Что напечатает console.log('2' + 2)?"
    back: "Строку '22': когда хотя бы один операнд у плюса строка, второй приводится к строке и происходит склейка."
    tags: [coercion]
