conceptId: closures-and-scope
cards:
  - id: closures-and-scope-01
    front: "Which variables can a nested function see?"
    back: "Its own locals, its own parameters, and all variables of the enclosing functions up to the top level of the file. The set is determined by where the function is declared, not where it is called."
    tags: [scope]
  - id: closures-and-scope-02
    front: "What is a closure?"
    back: "A function together with the environment it was declared in. It remembers outer variables and keeps using them even after the outer function has finished, like a backpack on its back."
    tags: [closures]
  - id: closures-and-scope-03
    front: "Does a closure store a copy of a value or a reference to the variable?"
    back: "A live reference to the variable itself. If you change the variable after the function is declared, the next call sees the new value, not a 'snapshot' of the old one."
    tags: [closures]
  - id: closures-and-scope-04
    front: "Two counters are created by two calls to the same factory. Are they linked?"
    back: "No. Each factory call creates a new environment with its own variables, so the counters accumulate values independently of each other."
    tags: [closures, factory]
  - id: closures-and-scope-05
    front: "Where does a variable declared with let or const live?"
    back: "Inside the nearest block in curly braces: an if body, a loop, or a function. Outside the block it does not exist; referencing it gives a ReferenceError."
    tags: [scope]
  - id: closures-and-scope-06
    front: "How do you get private state without classes?"
    back: "With a factory: declare a variable inside a function and only return the functions that operate on it. The variable cannot be read or overwritten from outside."
    tags: [closures, patterns]
