conceptId: array-methods
cards:
  - id: array-methods-01
    front: "What does map return, and what length is the result?"
    back: "A new array where each element is replaced by the callback's result. The length always matches the original, and the order is preserved."
    tags: [map]
  - id: array-methods-02
    front: "What does filter return?"
    back: "A new array of the elements for which the predicate returned true. The elements themselves are not transformed; the result's length is less than or equal to the original."
    tags: [filter]
  - id: array-methods-03
    front: "How does the accumulator work in reduce, and why specify an initial value?"
    back: "The accumulator carries over step to step: whatever the callback returns for this element arrives at the next call. The initial value sets the starting accumulator; without it, reduce on an empty array throws a TypeError."
    tags: [reduce]
  - id: array-methods-04
    front: "Does map mutate the original array?"
    back: "No, map always builds a new array. But objects arrive in the callback by reference: mutating their fields corrupts the original too. Return a new object instead."
    tags: [map, immutability]
  - id: array-methods-05
    front: "When do you need a filter + map chain?"
    back: "When you first need to select a subset of elements, then transform each of the rest: for example, get the names of in-stock products. Putting filter first in the chain reduces the work for the following methods."
    tags: [chaining]
  - id: array-methods-06
    front: "What does prices.map(p => { p * 2 }) return?"
    back: "An array of undefined values with the same length: curly braces turn the arrow body into a block, and a block without an explicit return yields undefined."
    tags: [pitfalls]
