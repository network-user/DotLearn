conceptId: closures-and-scope
cards:
  - id: closures-and-scope-01
    front: "Какие переменные видит вложенная функция?"
    back: "Свои локальные, свои параметры и все переменные внешних функций вплоть до верхнего уровня файла. Набор определяется местом объявления функции, а не местом вызова."
    tags: [scope]
  - id: closures-and-scope-02
    front: "Что такое замыкание (closure)?"
    back: "Функция вместе с окружением, в котором она была объявлена. Она помнит внешние переменные и пользуется ими даже после завершения внешней функции, как рюкзак за плечами."
    tags: [closures]
  - id: closures-and-scope-03
    front: "Замыкание хранит копию значения или ссылку на переменную?"
    back: "Живую ссылку на саму переменную. Если переменную изменить после объявления функции, при следующем вызове функция увидит новое значение, а не «снимок» старого."
    tags: [closures]
  - id: closures-and-scope-04
    front: "Два счётчика созданы двумя вызовами одной фабрики. Связаны ли они?"
    back: "Нет. Каждый вызов фабрики создаёт новое окружение с собственными переменными, поэтому счётчики накапливают значения независимо друг от друга."
    tags: [closures, factory]
  - id: closures-and-scope-05
    front: "Где живёт переменная, объявленная через let или const?"
    back: "Внутри ближайшего блока в фигурных скобках: тела if, цикла или функции. Снаружи блока её не существует, обращение к ней даёт ReferenceError."
    tags: [scope]
  - id: closures-and-scope-06
    front: "Как получить приватное состояние без классов?"
    back: "Фабрикой: объявить переменную внутри функции и вернуть наружу только функции, которые с ней работают. Прочитать или перезаписать переменную извне невозможно."
    tags: [closures, patterns]
