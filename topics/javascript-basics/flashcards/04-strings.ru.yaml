conceptId: strings
cards:
  - id: strings-01
    front: "Как получить последний символ строки word?"
    back: "word[word.length - 1]. Строка индексируется как массив, с нуля, поэтому номер последнего символа на единицу меньше длины."
    tags: [indexing, length]
  - id: strings-02
    front: "Почему word[0] = 'Р' не меняет строку word?"
    back: "Строки в JavaScript неизменяемы. Присваивание по индексу молча ничего не делает: чтобы получить другой текст, нужно собрать новую строку и положить её в переменную заново."
    tags: [immutability]
  - id: strings-03
    front: "Что делает ${...} внутри шаблонного литерала?"
    back: "Вычисляет выражение внутри как обычный JavaScript-код и подставляет результат в текст на этом месте, ещё до того как значение станет частью строки."
    tags: [template-literals]
  - id: strings-04
    front: "Что напечатает 'Итого: ' + 10 + 5?"
    back: "'Итого: 105'. Плюс выполняется слева направо: 'Итого: ' + 10 сразу даёт строку, и следующий + 5 только приклеивает текст, а не складывает числа."
    tags: [coercion, plus]
  - id: strings-05
    front: "Какие символы входят в результат 'JavaScript'.slice(0, 4)?"
    back: "Символы с номера 0 по номер 3 включительно: 'Java'. Второй аргумент slice это граница, до которой режут, символ под этим номером в результат не попадает."
    tags: [slice]
  - id: strings-06
    front: "Чем includes отличается от indexOf?"
    back: "includes отвечает только true или false: есть подстрока или нет. indexOf дополнительно называет номер символа, с которого начинается первое совпадение, или -1, если совпадения нет."
    tags: [methods]
