conceptId: conditions-and-loops
cards:
  - id: conditions-and-loops-01
    front: "Перечислите все falsy значения JavaScript."
    back: "Их ровно шесть: false, 0, пустая строка '', null, undefined и NaN. Любое другое значение truthy, включая строки '0' и 'false'."
    tags: [truthy-falsy]
  - id: conditions-and-loops-02
    front: "Чем === отличается от ==?"
    back: "=== сравнивает без приведения типов: разные типы сразу дают false. == сначала приводит операнды к одному типу, отсюда сюрпризы вроде '' == 0 со значением true. В своём коде используйте === и !==."
    tags: [comparison]
  - id: conditions-and-loops-03
    front: "Для чего нужен цикл for...of?"
    back: "Он перебирает значения списка по порядку, без счётчика и индексов: на каждом витке переменная получает очередной элемент."
    tags: [loops]
  - id: conditions-and-loops-04
    front: "В чём разница между break и continue?"
    back: "break немедленно завершает весь цикл. continue обрывает только текущий виток и передаёт управление следующей итерации."
    tags: [loops]
  - id: conditions-and-loops-05
    front: "Почему строка '0' truthy, а число 0 falsy?"
    back: "Для строк правило одно: falsy только пустая строка, содержимое роли не играет. В '0' есть один символ, поэтому она truthy. Число 0 входит в список шести falsy значений."
    tags: [truthy-falsy]
  - id: conditions-and-loops-06
    front: "Когда вместо for стоит взять while?"
    back: "Когда число повторов заранее неизвестно и цикл крутится, пока условие истинно. Тело обязано приближать условие к false, иначе цикл станет бесконечным."
    tags: [loops]
