conceptId: array-methods
cards:
  - id: array-methods-01
    front: "Что возвращает map и какой длины результат?"
    back: "Новый массив, где каждый элемент заменён результатом callback. Длина всегда совпадает с исходной, порядок сохраняется."
    tags: [map]
  - id: array-methods-02
    front: "Что возвращает filter?"
    back: "Новый массив из тех элементов, для которых предикат вернул true. Сами элементы не преобразуются; длина результата меньше исходной или равна ей."
    tags: [filter]
  - id: array-methods-03
    front: "Как работает аккумулятор в reduce и зачем указывать начальное значение?"
    back: "Аккумулятор передаётся от шага к шагу: что callback вернул на этом элементе, то придёт на следующем вызове. Начальное значение задаёт стартовый аккумулятор; без него reduce на пустом массиве бросает TypeError."
    tags: [reduce]
  - id: array-methods-04
    front: "Меняет ли map исходный массив?"
    back: "Нет, map всегда строит новый массив. Но объекты приходят в callback по ссылке: если менять их поля, испортится и оригинал. Возвращайте новый объект."
    tags: [map, immutability]
  - id: array-methods-05
    front: "Когда нужна цепочка filter + map?"
    back: "Когда надо сначала отобрать часть элементов, а затем преобразовать каждый из оставшихся: например, из товаров в наличии получить их названия. filter в начале цепочки сокращает работу следующим методам."
    tags: [chaining]
  - id: array-methods-06
    front: "Что вернёт prices.map(p => { p * 2 })?"
    back: "Массив из undefined той же длины: фигурные скобки превращают тело стрелки в блок, а блок без явного return возвращает undefined."
    tags: [pitfalls]
