conceptId: conditions-and-loops
cards:
  - id: conditions-and-loops-01
    front: "List all the falsy values in JavaScript."
    back: "There are exactly six: false, 0, the empty string '', null, undefined, and NaN. Every other value is truthy, including the strings '0' and 'false'."
    tags: [truthy-falsy]
  - id: conditions-and-loops-02
    front: "How does === differ from ==?"
    back: "=== compares without type coercion: different types immediately give false. == first coerces the operands to the same type, hence surprises like '' == 0 being true. Use === and !== in your own code."
    tags: [comparison]
  - id: conditions-and-loops-03
    front: "What is the for...of loop for?"
    back: "It iterates a list's values in order, with no counter or indices: on each turn the variable gets the next element."
    tags: [loops]
  - id: conditions-and-loops-04
    front: "What is the difference between break and continue?"
    back: "break immediately ends the whole loop. continue only cuts short the current turn and hands control to the next iteration."
    tags: [loops]
  - id: conditions-and-loops-05
    front: "Why is the string '0' truthy while the number 0 is falsy?"
    back: "For strings there's one rule: only the empty string is falsy, content does not matter. '0' has one character, so it's truthy. The number 0 is on the list of six falsy values."
    tags: [truthy-falsy]
  - id: conditions-and-loops-06
    front: "When should you use while instead of for?"
    back: "When the number of iterations is not known in advance and the loop runs while a condition holds. The body must push the condition toward false, or the loop becomes infinite."
    tags: [loops]
