conceptId: values-and-variables
cards:
  - id: values-and-variables-01
    front: 'What primitive value types exist in JavaScript?'
    back: 'number, string, boolean, null, undefined, plus the rarer bigint and symbol. Everything else is an object.'
    tags: [types]
  - id: values-and-variables-02
    front: 'How does let differ from const?'
    back: 'let lets you repoint the name to a new value; const fixes the arrow with a single assignment at declaration.'
    tags: [variables]
  - id: values-and-variables-03
    front: 'Can you change the contents of an object declared with const?'
    back: 'Yes. const forbids reassigning the name entirely, but you can change and add object properties.'
    tags: [variables, objects]
  - id: values-and-variables-04
    front: 'What does typeof null return?'
    back: "The string 'object'. It's a historical bug from the first 1995 implementation, kept for compatibility."
    tags: [typeof]
  - id: values-and-variables-05
    front: 'What is the difference between undefined and null?'
    back: 'undefined is set by the language itself when a value is not yet there; null is set by the programmer to explicitly mark emptiness.'
    tags: [types]
  - id: values-and-variables-06
    front: "What does console.log('2' + 2) print?"
    back: "The string '22': when at least one operand of plus is a string, the other is converted to a string and concatenation happens."
    tags: [coercion]
