conceptId: functions
cards:
  - id: functions-01
    front: "Что вернёт функция, в которой нет return?"
    back: "undefined. JavaScript не считает это ошибкой: функция выполнится, а вызывающий код получит undefined вместо результата."
    tags: [return]
  - id: functions-02
    front: "Чем function declaration отличается от function expression?"
    back: "Declaration объявляется отдельной инструкцией со словом function и именем, его можно вызвать даже выше места объявления. Expression создаёт функцию как значение и кладёт её в переменную; вызывать можно только после присваивания."
    tags: [declaration, expression]
  - id: functions-03
    front: "Когда стрелочная функция возвращает результат без слова return?"
    back: "Когда тело записано одним выражением без фигурных скобок: (x) => x * 2. Если тело в фигурных скобках, нужен явный return, иначе вернётся undefined."
    tags: [arrow, return]
  - id: functions-04
    front: "Как задать параметру значение по умолчанию?"
    back: "Указать его прямо в скобках объявления: function greet(name = 'гость'). Оно подставится, когда аргумент не передан или передан undefined; null и пустая строка умолчание не включают."
    tags: [defaults]
  - id: functions-05
    front: "Чем параметр отличается от аргумента?"
    back: "Параметр записан в объявлении функции и служит локальным именем, заглушкой под будущее значение. Аргумент передаётся при вызове: конкретное значение, которое встаёт на место параметра."
    tags: [terms]
  - id: functions-06
    front: "Что получится, если обратиться к функции без круглых скобок?"
    back: "Сама функция как значение, а не результат вызова. Такое значение можно положить в переменную или передать в другую функцию как callback, например в map."
    tags: [values]
