conceptId: arrays-and-objects
cards:
  - id: arrays-and-objects-01
    front: 'In an array of five elements, what is the index of the first and the last element?'
    back: 'The first sits at index 0, the last at index 4: numbering starts at zero, so you get the last element with list[list.length - 1].'
    tags: [arrays, indexing]
  - id: arrays-and-objects-02
    front: 'What do the push and pop methods do?'
    back: 'push adds an element to the end of the array and increases length. pop removes the last element, returns it, and decreases length. Both mutate the array itself instead of creating a new one.'
    tags: [arrays, methods]
  - id: arrays-and-objects-03
    front: 'After const b = a, where a holds an array, how many arrays exist in memory?'
    back: 'One. The assignment copies the reference, not the contents: both variables point to the same array, and changes through b are visible through a. A true shallow copy comes from the spread [...a].'
    tags: [references]
  - id: arrays-and-objects-04
    front: 'What does the comparison [1] === [1] return, and why?'
    back: 'false. The === operator compares arrays and objects by reference: here two different arrays are created. You get true only if both sides point to the same object.'
    tags: [references, comparison]
  - id: arrays-and-objects-05
    front: 'When do you read an object property with square brackets instead of a dot?'
    back: 'When the key name lives in a variable: item[key] looks inside the key variable, while item.key looks for a property literally named key and returns undefined if there is none.'
    tags: [objects]
  - id: arrays-and-objects-06
    front: 'What happens when you read a non-existent array index or object key?'
    back: "There is no error: JavaScript returns undefined. This is dangerous because a typo in a key does not surface where you read it, but later, when undefined slips into a calculation and produces NaN."
    tags: [objects, pitfalls]
