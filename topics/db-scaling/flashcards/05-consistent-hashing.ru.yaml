conceptId: consistent-hashing
cards:
  - id: consistent-hashing-01
    front: "Почему hash(ключ) % N больно переносит смену числа узлов?"
    back: "Номер узла привязан к самому N. Меняется N, меняется остаток почти у каждого ключа, поэтому добавление одного узла заставляет переехать почти всю базу."
    tags: [consistent-hashing, mod-n]
  - id: consistent-hashing-02
    front: "В чём идея консистентного хеширования (кольцо)?"
    back: "Пространство хеша сворачивают в кольцо и хешируют на него и ключи, и узлы. Ключ принадлежит первому узлу по часовой стрелке от своей позиции. Местоположение задаёт соседство на кольце, а не число узлов."
    tags: [consistent-hashing, ring]
  - id: consistent-hashing-03
    front: "Что переезжает при добавлении узла на кольцо?"
    back: "Только ключи с дуги между новым узлом и предыдущим против часовой стрелки. У всех остальных ключей сосед по часовой стрелке прежний, поэтому они не двигаются."
    tags: [consistent-hashing, add-node]
  - id: consistent-hashing-04
    front: "Кому достаются ключи узла, ушедшего с кольца?"
    back: "Следующему узлу по часовой стрелке: теперь именно он первый на их пути. Прочие ключи кольца не трогаются."
    tags: [consistent-hashing, remove-node]
  - id: consistent-hashing-05
    front: "Какие две беды голого кольца лечат виртуальные узлы?"
    back: "Неравные дуги (перекос нагрузки) и обвал соседа: при отказе узла все его ключи валятся на одного соседа по часовой стрелке, и тот может лечь следом."
    tags: [consistent-hashing, vnodes]
  - id: consistent-hashing-06
    front: "Как работают виртуальные узлы (vnodes)?"
    back: "Каждый физический узел представляют сотней-другой точек, разбросанных по всему кольцу. Дуги мельчают и в среднем ровные, а ключи ушедшего узла расходятся по многим соседям, а не на одного."
    tags: [consistent-hashing, vnodes]
  - id: consistent-hashing-07
    front: "Как виртуальные узлы учитывают разную мощность серверов?"
    back: "Узлу вдвое мощнее выдают вдвое больше виртуальных точек, и он честно берёт вдвое больше данных."
    tags: [consistent-hashing, capacity]
  - id: consistent-hashing-08
    front: "Сколько ключей переезжает при добавлении узла в кольцо с виртуальными узлами?"
    back: "Примерно 1/N от всех данных: ровно та доля, которую новый узел и должен взять на себя. Не больше и не меньше."
    tags: [consistent-hashing, remap]
  - id: consistent-hashing-09
    front: "Где применяется консистентное хеширование?"
    back: "Партиционирование в Cassandra, DynamoDB, Riak; клиенты распределённых кешей (ketama в memcached); CDN и часть балансировщиков. Везде, где узлы приходят и уходят, а цена изменения должна оставаться локальной."
    tags: [consistent-hashing, usage]
  - id: consistent-hashing-10
    front: "Воскрешает ли кольцо диапазонные запросы?"
    back: "Нет. Как любой хеш-шардинг, оно разносит соседние ключи по разным узлам. Нужны диапазоны, шардируйте по диапазону, а не по кольцу."
    tags: [consistent-hashing, range]
