conceptId: scaling-basics
cards:
  - id: scaling-basics-01
    front: "Чем вертикальное масштабирование отличается от горизонтального?"
    back: "Вертикальное (scale-up) усиливает один узел: больше ядер, памяти, быстрее диски. Горизонтальное (scale-out) добавляет узлы и распределяет работу между ними."
    tags: [scaling, basics]
  - id: scaling-basics-02
    front: "В какие четыре потолка упирается вертикальное масштабирование?"
    back: "Цена растёт нелинейно; физический предел ядер и памяти в одной машине; простой при апгрейде (узел надо погасить); единая точка отказа."
    tags: [scaling, scale-up]
  - id: scaling-basics-03
    front: "Почему чтение масштабируется легко, а запись тяжело?"
    back: "Чтение не меняет данные, поэтому его раздают на много копий. Записи нужен единственный хозяин на каждый кусок ради корректности: две копии, независимо принявшие запись в одну строку, разойдутся."
    tags: [scaling, read-write]
  - id: scaling-basics-04
    front: "Помогают ли read-реплики, когда в потолок упёрлась запись?"
    back: "Нет. Каждая реплика повторяет весь поток записи лидера, поэтому не снимает нагрузку записи. Запись за пределы одного узла масштабирует только шардинг."
    tags: [replication, write]
  - id: scaling-basics-05
    front: "Три стратегии масштабирования и ради чего каждая?"
    back: "Репликация копирует данные на узлы ради чтения и отказоустойчивости. Партиционирование режет таблицу внутри узла ради управляемости. Шардирование раскладывает данные по узлам ради записи и объёма."
    tags: [scaling, strategy]
  - id: scaling-basics-06
    front: "В каком порядке вводят три стратегии?"
    back: "Сначала выжимают вертикальный рост и реплики. Потом партиционируют распухшие таблицы. И только когда упёрлись в запись или объём одного узла, идут в шардинг."
    tags: [scaling, order]
  - id: scaling-basics-07
    front: "Сколько тянет один узел современной СУБД?"
    back: "Тысячи транзакций в секунду и таблицы в сотни гигабайт, а с индексами и кешем часто больше. Для большинства сервисов это годы работы без всякой распределённости."
    tags: [scaling, capacity]
  - id: scaling-basics-08
    front: "Какие дешёвые ходы пробуют до шардинга?"
    back: "Добавить недостающие индексы, вынести отчёты на реплику, закешировать горячие ключи, поднять память под буферный кеш, убрать из основной СУБД лишнее (сессии, очереди)."
    tags: [scaling, optimization]
  - id: scaling-basics-09
    front: "Чем на самом деле дорога распределённая система?"
    back: "Не деньгами, а сложностью: cross-node запросы, отложенная согласованность, операционная нагрузка и целый класс новых отказов. Поэтому scale-out делают по нужде, а не превентивно."
    tags: [scaling, complexity]
  - id: scaling-basics-10
    front: "Почему пара средних узлов часто надёжнее одного топового?"
    back: "Одиночный узел это единая точка отказа. Схема «лидер плюс реплика с failover» падает, только когда отказали оба сразу, а вероятность одновременного отказа кратно ниже, и часто это ещё и дешевле."
    tags: [availability, failover]
