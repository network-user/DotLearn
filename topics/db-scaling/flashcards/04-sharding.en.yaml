conceptId: sharding
cards:
  - id: sharding-01
    front: "What is sharding, and what does it give you that replicas don't?"
    back: "Spreading different data across different nodes, where each shard owns its own writes. It's the only way to scale writes and volume beyond a single node; replicas only scale reads."
    tags: [sharding, basics]
  - id: sharding-02
    front: "Three properties of a good sharding key."
    back: "High cardinality (many values, slices finely), evenness (lands on shards evenly), presence in most queries (the router lands on one shard). Often user_id or tenant_id."
    tags: [sharding, key]
  - id: sharding-03
    front: "Hash sharding: pro and con."
    back: "Pro: spreads keys evenly, load is balanced. Con: kills range queries (neighboring keys land on different shards), and a naive hash % N reshuffles almost everything when the shard count changes."
    tags: [sharding, hash]
  - id: sharding-04
    front: "Range sharding: pro and con."
    back: "Pro: keeps contiguous intervals together, range queries work. Con: a monotonic key (time, auto-increment) creates a hot last range, where all the fresh traffic pours in."
    tags: [sharding, range]
  - id: sharding-05
    front: "What is a hot key (the celebrity problem)?"
    back: "One key (a giant customer, a viral user) generates disproportionate traffic and overheats its shard even with a perfect hash. Hash spreads different keys evenly, but all traffic for one key still goes to one shard."
    tags: [sharding, hot-key]
  - id: sharding-06
    front: "How is a hot key handled?"
    back: "Move the whale to its own dedicated shard; split its data with an extra key (tenant_id plus a date range); mix artificial randomness into the hottest key values."
    tags: [sharding, hot-key]
  - id: sharding-07
    front: "Why are cross-shard queries and transactions expensive?"
    back: "A query spanning many shards runs as scatter-gather (fan out and merge), which is slow, and a join across shards is painful. A transaction across several shards needs two-phase commit, which is slow and fragile (hangs if a participant fails)."
    tags: [sharding, cross-shard]
  - id: sharding-08
    front: "How is a schema designed to avoid cross-shard operations?"
    back: "Co-location: related data is kept under one key on one shard, so most operations stay inside a shard. If a routine query goes cross-shard, the key was chosen wrong."
    tags: [sharding, co-location]
  - id: sharding-09
    front: "Why is resharding an operational nightmare?"
    back: "Adding a shard means moving data. A naive hash % N going from N to N+1 changes the remainder for almost every key, so almost the whole database moves. It's done online: dual writes, background backfill, verification, then a read cutover."
    tags: [sharding, resharding]
  - id: sharding-10
    front: "Three places where shard(key) routing can live."
    back: "In the application (the client computes the shard itself: simple, but the logic lives in every client); through a proxy (Vitess, ProxySQL: hides the topology at the cost of a hop); in the database itself (mongos in MongoDB, any Cassandra node: built in, but tied to that system)."
    tags: [sharding, routing]
