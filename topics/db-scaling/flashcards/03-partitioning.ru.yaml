conceptId: partitioning
cards:
  - id: partitioning-01
    front: "Что такое партиционирование и чем оно отличается от шардирования?"
    back: "Разбиение одной логической таблицы на физические партиции по ключу. В отличие от шардирования, все партиции живут на одном узле: это про управляемость, а не про добавление мощности."
    tags: [partitioning, basics]
  - id: partitioning-02
    front: "Три способа резать таблицу на партиции."
    back: "Range (непрерывный интервал ключа, чаще по времени), list (явный набор значений, например регион), hash (hash(ключ) % N для равномерной нарезки без естественного диапазона)."
    tags: [partitioning, kinds]
  - id: partitioning-03
    front: "Что такое partition pruning?"
    back: "Отсечение партиций: если в запросе есть условие по ключу партиционирования, планировщик открывает только подходящие партиции, а остальные не трогает. Отсюда ускорение."
    tags: [partitioning, pruning]
  - id: partitioning-04
    front: "Когда partition pruning НЕ срабатывает?"
    back: "Когда в запросе нет фильтра по ключу партиционирования. Таблица нарезана по дате, а фильтр по user_id: нужный пользователь мог быть в любом месяце, планировщик пройдёт все партиции."
    tags: [partitioning, pruning]
  - id: partitioning-05
    front: "Партиции против индексов: в чём разница?"
    back: "Индекс ускоряет селективный точечный поиск во всей таблице. Партиция даёт отсечение по ключу партиционирования и дешёвую ротацию. Они не заменяют друг друга: внутри партиций индексы всё равно нужны."
    tags: [partitioning, indexes]
  - id: partitioning-06
    front: "Почему партиции по времени незаменимы для ротации данных?"
    back: "Удаление старого месяца это отсоединение или drop целой партиции, почти мгновенная операция над метаданными. В обычной таблице тот же DELETE читает миллионы строк, держит блокировки и плодит мусор."
    tags: [partitioning, lifecycle]
  - id: partitioning-07
    front: "Как выглядит декларативное партиционирование в PostgreSQL?"
    back: "Родительскую таблицу объявляют партиционированной по ключу (например, RANGE по created_at), под каждый интервал создают дочернюю партицию. Приложение работает с родительской, СУБД маршрутизирует и отсекает сама."
    tags: [partitioning, postgres]
  - id: partitioning-08
    front: "Чем грозит слишком мелкая гранулярность партиций?"
    back: "Тысячи мелких партиций раздувают время планирования и память планировщика, который учитывает их все. Разумная гранулярность обычно месяц или неделя, а не час."
    tags: [partitioning, pitfall]
  - id: partitioning-09
    front: "Почему глобальная уникальность в партиционированной таблице тяжела?"
    back: "Уникальность, не включающую ключ партиционирования, СУБД проверяет отдельно в каждой партиции. Поэтому уникальный ключ удобно строить так, чтобы он содержал ключ партиционирования."
    tags: [partitioning, uniqueness]
  - id: partitioning-10
    front: "Как выбирают ключ партиционирования?"
    back: "Под форму частых запросов. Если запросы фильтруют по дате, режут по дате (сработает отсечение). Если по user_id, а нарезано по дате, отсечения не будет и выигрыша тоже."
    tags: [partitioning, key]
