conceptId: partitioning
cards:
  - id: partitioning-01
    front: "What is partitioning, and how does it differ from sharding?"
    back: "Splitting one logical table into physical partitions by key. Unlike sharding, all partitions live on one node: it's about manageability, not adding capacity."
    tags: [partitioning, basics]
  - id: partitioning-02
    front: "Three ways to cut a table into partitions."
    back: "Range (a contiguous key interval, usually by time), list (an explicit set of values, e.g. region), hash (hash(key) % N for even slicing when there's no natural range)."
    tags: [partitioning, kinds]
  - id: partitioning-03
    front: "What is partition pruning?"
    back: "Skipping partitions: if the query has a condition on the partitioning key, the planner opens only the matching partitions and leaves the rest untouched. That's where the speedup comes from."
    tags: [partitioning, pruning]
  - id: partitioning-04
    front: "When does partition pruning NOT kick in?"
    back: "When the query has no filter on the partitioning key. A table sliced by date with a filter on user_id: the target user could be in any month, so the planner scans every partition."
    tags: [partitioning, pruning]
  - id: partitioning-05
    front: "Partitions vs. indexes: what's the difference?"
    back: "An index speeds up a selective point lookup across the whole table. A partition gives pruning by the partitioning key and cheap rotation. They don't replace each other: indexes are still needed inside partitions."
    tags: [partitioning, indexes]
  - id: partitioning-06
    front: "Why are time partitions indispensable for data rotation?"
    back: "Deleting an old month is detaching or dropping an entire partition, an almost instant metadata operation. In a regular table, the same DELETE reads millions of rows, holds locks, and creates bloat."
    tags: [partitioning, lifecycle]
  - id: partitioning-07
    front: "What does declarative partitioning look like in PostgreSQL?"
    back: "The parent table is declared partitioned by a key (e.g. RANGE on created_at), and a child partition is created for each interval. The application works with the parent as usual, and the database routes and prunes for itself."
    tags: [partitioning, postgres]
  - id: partitioning-08
    front: "What's the risk of too fine a partition granularity?"
    back: "Thousands of tiny partitions bloat planning time and the planner's memory, since it has to consider all of them. A sensible granularity is usually a month or a week, not an hour."
    tags: [partitioning, pitfall]
  - id: partitioning-09
    front: "Why is global uniqueness hard in a partitioned table?"
    back: "A uniqueness constraint that doesn't include the partitioning key gets checked separately inside each partition. So it's convenient to build the unique key to include the partitioning key."
    tags: [partitioning, uniqueness]
  - id: partitioning-10
    front: "How is a partitioning key chosen?"
    back: "To match the shape of frequent queries. If queries filter by date, slice by date (pruning kicks in). If they filter by user_id but the table is sliced by date, there's no pruning and no benefit."
    tags: [partitioning, key]
