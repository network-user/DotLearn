conceptId: consistent-hashing
cards:
  - id: consistent-hashing-01
    front: "Why does hash(key) % N handle a change in node count so badly?"
    back: "A node's number is tied to N itself. Change N, and the remainder changes for almost every key, so adding one node forces almost the whole database to move."
    tags: [consistent-hashing, mod-n]
  - id: consistent-hashing-02
    front: "What's the idea behind consistent hashing (the ring)?"
    back: "The hash space is wrapped into a ring, and both keys and nodes are hashed onto it. A key belongs to the first node clockwise from its position. Location determines neighborhood on the ring, not the number of nodes."
    tags: [consistent-hashing, ring]
  - id: consistent-hashing-03
    front: "What moves when a node is added to the ring?"
    back: "Only the keys on the arc between the new node and the previous node counter-clockwise. Every other key's clockwise neighbor stays the same, so they don't move."
    tags: [consistent-hashing, add-node]
  - id: consistent-hashing-04
    front: "Who gets the keys of a node that left the ring?"
    back: "The next node clockwise: it's now the first one on their path. The rest of the ring's keys aren't touched."
    tags: [consistent-hashing, remove-node]
  - id: consistent-hashing-05
    front: "What two problems of a bare ring do virtual nodes fix?"
    back: "Unequal arcs (skewed load), and a cascading neighbor failure: when a node fails, all its keys dump onto one clockwise neighbor, which may then fall over too."
    tags: [consistent-hashing, vnodes]
  - id: consistent-hashing-06
    front: "How do virtual nodes (vnodes) work?"
    back: "Each physical node is represented by a hundred or so points scattered across the whole ring. The arcs become small and roughly even, and a departed node's keys spread across many neighbors instead of one."
    tags: [consistent-hashing, vnodes]
  - id: consistent-hashing-07
    front: "How do virtual nodes account for different server capacities?"
    back: "A node twice as powerful gets twice as many virtual points, and it fairly takes on twice as much data."
    tags: [consistent-hashing, capacity]
  - id: consistent-hashing-08
    front: "How many keys move when a node is added to a ring with virtual nodes?"
    back: "Roughly 1/N of all data: exactly the share the new node should take on. Not more, not less."
    tags: [consistent-hashing, remap]
  - id: consistent-hashing-09
    front: "Where is consistent hashing used?"
    back: "Partitioning in Cassandra, DynamoDB, Riak; clients of distributed caches (ketama in memcached); CDNs and some load balancers. Anywhere nodes come and go and the cost of change needs to stay local."
    tags: [consistent-hashing, usage]
  - id: consistent-hashing-10
    front: "Does the ring bring back range queries?"
    back: "No. Like any hash sharding, it scatters neighboring keys across different nodes. If you need ranges, shard by range, not by ring."
    tags: [consistent-hashing, range]
