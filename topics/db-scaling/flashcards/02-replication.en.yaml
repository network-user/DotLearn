conceptId: replication
cards:
  - id: replication-01
    front: "How does the \"leader and replicas\" setup work?"
    back: "One node (the leader) accepts all writes and sends a change stream to replicas. Replicas apply it in the same order and serve reads. Only the leader can be written to."
    tags: [replication, leader]
  - id: replication-02
    front: "Why is the effect replicated instead of the SQL commands themselves?"
    back: "Non-deterministic functions (now(), random()) would give a different result on replicas. So the effect is sent instead: PostgreSQL streams the WAL, MySQL streams a row-based binlog, and the replica arrives at the same state."
    tags: [replication, wal]
  - id: replication-03
    front: "Asynchronous replication: pro and con."
    back: "Pro: the leader confirms writes immediately, fast and independent of slow replicas. Con: if the leader dies before replicating, changes that hadn't arrived yet are lost."
    tags: [replication, async]
  - id: replication-04
    front: "Synchronous replication: pro and con."
    back: "Pro: a confirmed change is guaranteed to exist on at least two nodes, no loss if the leader dies. Con: writes go at the speed of the slowest replica, and a stuck synchronous replica blocks writes."
    tags: [replication, sync]
  - id: replication-05
    front: "What does semi-synchronous replication give you?"
    back: "A compromise: the leader waits for an ack from at least one replica, the rest catch up asynchronously. A confirmed change lives on at least two nodes, but one slow replica doesn't halt writes."
    tags: [replication, semisync]
  - id: replication-06
    front: "What is read-your-writes, and how is it fixed?"
    back: "A user doesn't see a write they just made, having read it from a lagging replica. Fixed by reading your own fresh data from the leader, and everything else from replicas."
    tags: [replication, read-your-writes]
  - id: replication-07
    front: "What is monotonic reads?"
    back: "A guarantee that a repeated read doesn't \"roll back\" into the past. Breaks when a second request lands on a replica with more lag. Fixed by pinning a user to a single replica."
    tags: [replication, monotonic-reads]
  - id: replication-08
    front: "What two traps does automatic failover hide?"
    back: "Losing the old leader's last unreplicated asynchronous changes, and split-brain, where a returning old leader keeps considering itself in charge and the data diverges."
    tags: [replication, failover]
  - id: replication-09
    front: "How is split-brain prevented?"
    back: "Quorum and fencing: a new leader is elected only by a majority of nodes, and the old one, if it returns, is blocked from writing (for example, its access to shared storage is revoked)."
    tags: [replication, split-brain]
  - id: replication-10
    front: "When is multi-leader used, and what does it cost?"
    back: "When geography or offline clients require local writes (multiple data centers). The cost is conflicts: one key gets changed on two leaders at once and has to be resolved (last-write-wins, merge, CRDT)."
    tags: [replication, multi-leader]
