conceptId: sharding
cards:
  - id: sharding-01
    front: "Что такое шардирование и что оно даёт, чего не дают реплики?"
    back: "Раскладка разных данных по разным узлам, где каждый шард сам хозяин своей записи. Это единственный способ масштабировать запись и объём за пределы одного узла; реплики масштабируют только чтение."
    tags: [sharding, basics]
  - id: sharding-02
    front: "Три свойства хорошего ключа шардирования."
    back: "Высокая кардинальность (много значений, дробится мелко), равномерность (ложится на шарды ровно), присутствие в большинстве запросов (роутер попадает в один шард). Часто это user_id или tenant_id."
    tags: [sharding, key]
  - id: sharding-03
    front: "Hash-шардинг: плюс и минус."
    back: "Плюс: раскидывает ключи ровно, нагрузка сбалансирована. Минус: убивает диапазонные запросы (соседние ключи на разных шардах), а наивный hash % N перетасовывает почти всё при смене числа шардов."
    tags: [sharding, hash]
  - id: sharding-04
    front: "Range-шардинг: плюс и минус."
    back: "Плюс: хранит непрерывные интервалы, диапазонные запросы работают. Минус: монотонный ключ (время, автоинкремент) создаёт горячий последний диапазон, куда льётся весь свежий трафик."
    tags: [sharding, range]
  - id: sharding-05
    front: "Что такое горячий ключ (проблема знаменитости)?"
    back: "Один ключ (клиент-гигант, вирусный пользователь) генерирует непропорционально много трафика и раскаляет свой шард даже при идеальном хеше. Хеш ровно раскладывает разные ключи, но весь трафик одного ключа летит в один шард."
    tags: [sharding, hot-key]
  - id: sharding-06
    front: "Как лечат горячий ключ?"
    back: "Вынести кита на отдельный выделенный шард; раздробить его данные дополнительным ключом (tenant_id плюс диапазон дат); подмешать искусственную случайность в самые горячие значения ключа."
    tags: [sharding, hot-key]
  - id: sharding-07
    front: "Почему cross-shard запросы и транзакции дороги?"
    back: "Запрос по многим шардам идёт как scatter-gather (разослать и слить), это медленно, а join между шардами болезнен. Транзакция на несколько шардов требует two-phase commit, который медленный и хрупкий (зависает при сбое участника)."
    tags: [sharding, cross-shard]
  - id: sharding-08
    front: "Как проектируют схему, чтобы избегать cross-shard операций?"
    back: "Co-location: связанные данные держат под одним ключом на одном шарде, чтобы большинство операций оставалось внутри шарда. Если рядовой запрос идёт cross-shard, ключ выбран неверно."
    tags: [sharding, co-location]
  - id: sharding-09
    front: "Почему решардинг это операционный кошмар?"
    back: "Добавить шард значит перевезти данные. Наивный hash % N при N→N+1 меняет остаток почти у всех ключей, переезжает почти вся база. Делают онлайн: двойная запись, фоновый backfill, сверка, переключение чтения."
    tags: [sharding, resharding]
  - id: sharding-10
    front: "Три места, где может жить маршрутизация shard(key)."
    back: "В приложении (клиент сам считает шард: просто, но логика во всех клиентах); через прокси (Vitess, ProxySQL: скрывает топологию ценой хопа); в самой СУБД (mongos в MongoDB, любой узел Cassandra: встроено, но привязка к системе)."
    tags: [sharding, routing]
