conceptId: choosing-strategy
cards:
  - id: choosing-strategy-01
    front: "Что определяет выбор стратегии масштабирования?"
    back: "Профиль нагрузки: чего больше (чтение или запись), какой формы запросы (точечные по ключу или диапазоны и агрегаты) и по какой оси растут данные (пользователи, время, объём одного клиента)."
    tags: [choosing, profile]
  - id: choosing-strategy-02
    front: "Read-heavy сервис: какие ходы и в каком порядке?"
    back: "Сначала кеш горячих чтений, затем read-реплики, запись остаётся на лидере. Часто в духе CQRS: денормализованные витрины для чтения. До шардинга дело обычно не доходит."
    tags: [choosing, read-heavy]
  - id: choosing-strategy-03
    front: "Write-heavy данные по времени: какие ходы и в каком порядке?"
    back: "Сначала партиции по времени с TTL или архивацией (дешёвая ротация и отсечение по свежему). Шардинг подключают позже, когда узел перестанет вмещать запись, обычно поверх партиций."
    tags: [choosing, write-heavy]
  - id: choosing-strategy-04
    front: "Почему read-реплики плохо помогают write-heavy потоку?"
    back: "Каждая реплика повторяет весь поток записи лидера, поэтому нагрузку записи не снимает. Запись лечат делением: по времени (партиции) и по узлам (шардинг)."
    tags: [choosing, replicas]
  - id: choosing-strategy-05
    front: "По какому ключу шардируют мультитенантный SaaS и почему?"
    back: "По tenant_id: почти все запросы знают тенанта и попадают в один шард, данные клиента лежат вместе (co-location), а изоляция получается почти бесплатно."
    tags: [choosing, multitenant]
  - id: choosing-strategy-06
    front: "Кит в мультитенантном SaaS: проблема и лечение."
    back: "Один крупный тенант даёт непропорционально много нагрузки и топит свой шард (горячий ключ). Лечат выносом кита на выделенный шард или дроблением его данных вторичным ключом."
    tags: [choosing, whale]
  - id: choosing-strategy-07
    front: "Куда девают межтенантную аналитику по всем клиентам?"
    back: "В отдельное OLAP-хранилище. Отчёт по всем клиентам не привязан к одному tenant_id и потому идёт scatter-gather по всем шардам, а это медленно; такое выносят из оперативной базы."
    tags: [choosing, analytics]
  - id: choosing-strategy-08
    front: "Что проверяют по чеклисту перед масштабированием?"
    back: "Какой ресурс кончился (CPU, IOPS, память, блокировки); исчерпаны ли дешёвые ходы (индексы, кеш, вынос отчётов и сессий); болит чтение или запись; есть ли ключ, который знают почти все запросы; как будете добавлять узлы."
    tags: [choosing, checklist]
  - id: choosing-strategy-09
    front: "Что такое CQRS и куда он хорошо ложится?"
    back: "Разделение модели записи (нормализованная, на лидере) и модели чтения (денормализованные представления, на репликах или отдельном хранилище). Отлично ложится на read-heavy. Цена та же отложенная согласованность."
    tags: [choosing, cqrs]
  - id: choosing-strategy-10
    front: "Типичный боевой слой для метрик по времени под большой нагрузкой?"
    back: "Хеш-шардинг по источнику (device_id, service) ради ровной записи, внутри каждого шарда range-партиции по времени с TTL, а рядом с каждым шардом свои реплики на чтение. Слои складываются."
    tags: [choosing, layering]
