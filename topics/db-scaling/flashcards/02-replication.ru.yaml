conceptId: replication
cards:
  - id: replication-01
    front: "Как устроена схема «лидер и реплики»?"
    back: "Один узел (лидер) принимает всю запись и шлёт поток изменений репликам. Реплики применяют его в том же порядке и обслуживают чтение. Писать можно только на лидера."
    tags: [replication, leader]
  - id: replication-02
    front: "Почему реплицируют не SQL-команды, а их эффект?"
    back: "Недетерминированные функции (now(), random()) дали бы на репликах другой результат. Поэтому шлют эффект: PostgreSQL поток WAL, MySQL построчный бинлог, и реплика приходит в то же состояние."
    tags: [replication, wal]
  - id: replication-03
    front: "Асинхронная репликация: плюс и минус."
    back: "Плюс: лидер подтверждает запись сразу, быстро и не зависит от медленных реплик. Минус: если лидер умрёт до репликации, недоехавшие изменения теряются."
    tags: [replication, async]
  - id: replication-04
    front: "Синхронная репликация: плюс и минус."
    back: "Плюс: подтверждённое изменение точно есть минимум на двух узлах, потери при падении лидера нет. Минус: запись идёт со скоростью самой медленной реплики, а зависшая синхронная реплика блокирует запись."
    tags: [replication, sync]
  - id: replication-05
    front: "Что даёт полусинхронная репликация?"
    back: "Компромисс: лидер ждёт ack хотя бы от одной реплики, остальные догоняют асинхронно. Подтверждённое изменение живёт минимум на двух узлах, но одна медленная реплика не останавливает запись."
    tags: [replication, semisync]
  - id: replication-06
    front: "Что такое read-your-writes и как лечить?"
    back: "Пользователь не видит только что сделанную запись, прочитав её с отставшей реплики. Лечится чтением собственных свежих данных с лидера, а всего остального с реплик."
    tags: [replication, read-your-writes]
  - id: replication-07
    front: "Что такое monotonic reads?"
    back: "Гарантия, что повторное чтение не «откатится» в прошлое. Ломается, когда второй запрос попадает на реплику с бо́льшим лагом. Лечится привязкой пользователя к одной реплике."
    tags: [replication, monotonic-reads]
  - id: replication-08
    front: "Какие две ловушки прячет автоматический failover?"
    back: "Потеря последних асинхронных изменений старого лидера и split-brain, когда вернувшийся старый лидер продолжает считать себя главным и данные расходятся."
    tags: [replication, failover]
  - id: replication-09
    front: "Как защищаются от split-brain?"
    back: "Кворумом и fencing: нового лидера избирают только большинством узлов, а старому, если он вернулся, запрещают писать (например, отзывают доступ к общему хранилищу)."
    tags: [replication, split-brain]
  - id: replication-10
    front: "Когда берут multi-leader и какова его цена?"
    back: "Когда география или офлайн-клиенты требуют локальной записи (несколько дата-центров). Цена это конфликты: один ключ меняют на двух лидерах, и их надо разрешать (last-write-wins, слияние, CRDT)."
    tags: [replication, multi-leader]
