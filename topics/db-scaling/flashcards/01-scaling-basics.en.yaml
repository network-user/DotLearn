conceptId: scaling-basics
cards:
  - id: scaling-basics-01
    front: "How does vertical scaling differ from horizontal scaling?"
    back: "Vertical (scale-up) strengthens one node: more cores, memory, faster disks. Horizontal (scale-out) adds nodes and distributes work between them."
    tags: [scaling, basics]
  - id: scaling-basics-02
    front: "What four ceilings does vertical scaling run into?"
    back: "Price grows nonlinearly; the physical limit of cores and memory in one machine; downtime during upgrades (the node has to go offline); a single point of failure."
    tags: [scaling, scale-up]
  - id: scaling-basics-03
    front: "Why is reading easy to scale and writing hard?"
    back: "Reading doesn't change data, so it can be spread across many copies. Writing needs a single owner per piece of data for correctness: two copies that independently accept a write to the same row will diverge."
    tags: [scaling, read-write]
  - id: scaling-basics-04
    front: "Do read replicas help once writes have hit a ceiling?"
    back: "No. Every replica replays the leader's entire write stream, so it doesn't relieve write load. Only sharding scales writes beyond a single node."
    tags: [replication, write]
  - id: scaling-basics-05
    front: "Three scaling strategies, and what each is for?"
    back: "Replication copies data to nodes for reads and fault tolerance. Partitioning cuts a table within a node for manageability. Sharding spreads data across nodes for write scale and volume."
    tags: [scaling, strategy]
  - id: scaling-basics-06
    front: "In what order are the three strategies introduced?"
    back: "First squeeze out vertical growth and replicas. Then partition bloated tables. Only once a single node's writes or volume hit a ceiling do you move to sharding."
    tags: [scaling, order]
  - id: scaling-basics-07
    front: "How much can one node of a modern database handle?"
    back: "Thousands of transactions per second and tables in the hundreds of gigabytes, often more with indexes and caching. For most services that's years of runway without any distribution."
    tags: [scaling, capacity]
  - id: scaling-basics-08
    front: "What cheap moves are tried before sharding?"
    back: "Add missing indexes, move reports to a replica, cache hot keys, increase memory for the buffer cache, remove things that don't belong in the primary database (sessions, queues)."
    tags: [scaling, optimization]
  - id: scaling-basics-09
    front: "What actually makes a distributed system expensive?"
    back: "Not money, but complexity: cross-node queries, lagging consistency, operational load, and a whole new class of failures. So scale-out is done out of necessity, not preemptively."
    tags: [scaling, complexity]
  - id: scaling-basics-10
    front: "Why are a couple of mid-tier nodes often more reliable than one top-tier node?"
    back: "A single node is a single point of failure. A \"leader plus replica with failover\" setup only goes down when both fail at once, and the chance of a simultaneous failure is far lower, often at a lower cost too."
    tags: [availability, failover]
