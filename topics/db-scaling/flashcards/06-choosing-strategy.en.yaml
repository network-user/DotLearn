conceptId: choosing-strategy
cards:
  - id: choosing-strategy-01
    front: "What determines the choice of scaling strategy?"
    back: "The load profile: what dominates (reads or writes), the shape of the queries (point lookups by key, or ranges and aggregates), and the axis data grows along (users, time, one customer's volume)."
    tags: [choosing, profile]
  - id: choosing-strategy-02
    front: "A read-heavy service: what moves, and in what order?"
    back: "First a cache for hot reads, then read replicas, writes stay on the leader. Often in the spirit of CQRS: denormalized read views. Sharding usually never comes into it."
    tags: [choosing, read-heavy]
  - id: choosing-strategy-03
    front: "Write-heavy time-series data: what moves, and in what order?"
    back: "First time partitions with TTL or archiving (cheap rotation and pruning on recent data). Sharding is added later, once a node can no longer hold the writes, usually on top of partitions."
    tags: [choosing, write-heavy]
  - id: choosing-strategy-04
    front: "Why do read replicas barely help a write-heavy stream?"
    back: "Every replica replays the leader's entire write stream, so it doesn't relieve write load. Writes are addressed by splitting: by time (partitions) and by node (sharding)."
    tags: [choosing, replicas]
  - id: choosing-strategy-05
    front: "What key is a multi-tenant SaaS sharded by, and why?"
    back: "By tenant_id: almost every query already knows the tenant and lands on one shard, a customer's data stays together (co-location), and isolation comes almost for free."
    tags: [choosing, multitenant]
  - id: choosing-strategy-06
    front: "The whale in a multi-tenant SaaS: problem and fix."
    back: "One large tenant generates disproportionate load and drowns its shard (a hot key). Fixed by moving the whale to a dedicated shard or splitting its data with a secondary key."
    tags: [choosing, whale]
  - id: choosing-strategy-07
    front: "Where does cross-tenant analytics across all customers go?"
    back: "Into a separate OLAP store. A report across all customers isn't tied to one tenant_id, so it runs as scatter-gather across every shard, which is slow; that kind of workload gets moved out of the live database."
    tags: [choosing, analytics]
  - id: choosing-strategy-08
    front: "What's checked on the checklist before scaling?"
    back: "Which resource ran out (CPU, IOPS, memory, locks); whether the cheap moves are exhausted (indexes, cache, offloading reports and sessions); whether it's reads or writes that hurt; whether there's a key almost every query knows; how you'll add nodes."
    tags: [choosing, checklist]
  - id: choosing-strategy-09
    front: "What is CQRS, and where does it fit well?"
    back: "Separating the write model (normalized, on the leader) from the read model (denormalized views, on replicas or a separate store). Fits read-heavy workloads perfectly. The cost is the same lagging consistency."
    tags: [choosing, cqrs]
  - id: choosing-strategy-10
    front: "What's a typical production layering for time-series metrics under heavy load?"
    back: "Hash sharding by source (device_id, service) for even writes, range partitions by time with TTL inside each shard, and each shard has its own read replicas alongside it. The layers stack."
    tags: [choosing, layering]
