exercises:
  - id: partitioning-what-001
    concept: partitioning
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает партиционирование таблицы?"
    choices:
      - id: a
        text: "Режет одну логическую таблицу на физические куски по ключу внутри одного узла."
      - id: b
        text: "Раскладывает данные по разным серверам."
      - id: c
        text: "Создаёт копии таблицы на других узлах ради отказоустойчивости."
      - id: d
        text: "Шифрует таблицу на диске."
    correct: [a]
    explanation: "Партиционирование разбивает одну таблицу на партиции по значению ключа, и все они живут на одном узле. Раскладка по серверам это шардирование, а копии на других узлах это репликация."
    variants:
      - prompt: "Добавляет ли партиционирование мощности железа?"
        choices:
          - id: a
            text: "Нет: все партиции на одном узле, оно наводит порядок внутри сервера, а не добавляет узлов."
          - id: b
            text: "Да, каждая партиция получает свой сервер."
          - id: c
            text: "Да, оно удваивает память узла."
          - id: d
            text: "Да, но только для чтения."
        correct: [a]
        explanation: "Партиции физически лежат на том же узле. Мощности это не прибавляет: партиционирование про управляемость и отсечение, а прибавляет узлы только шардирование."
      - prompt: "Как партиционированная таблица выглядит для приложения?"
        choices:
          - id: a
            text: "Как одна обычная таблица: те же INSERT и SELECT, а СУБД сама направляет строки в нужную партицию."
          - id: b
            text: "Как набор отдельных таблиц, к каждой нужен свой запрос."
          - id: c
            text: "Как несколько баз данных."
          - id: d
            text: "Как очередь сообщений."
        correct: [a]
        explanation: "В этом удобство декларативного партиционирования: приложение работает с родительской таблицей как с обычной, а маршрутизацию строк по партициям и отсечение при чтении берёт на себя СУБД."

  - id: partitioning-pruning-when-001
    concept: partitioning
    type: theory-quiz
    difficulty: 2
    prompt: "Когда partition pruning реально ускоряет запрос?"
    choices:
      - id: a
        text: "Когда в запросе есть условие по ключу партиционирования: планировщик открывает только подходящие партиции."
      - id: b
        text: "Всегда, независимо от условий запроса."
      - id: c
        text: "Только для запросов вообще без WHERE."
      - id: d
        text: "Только когда партиций ровно две."
    correct: [a]
    explanation: "Отсечение опирается на ключ партиционирования: если планировщик видит фильтр по нему, он заранее понимает, какие партиции могут содержать строки, и остальные не открывает. Без такого фильтра отсекать нечего."
    variants:
      - prompt: "Таблица нарезана по дате, а запрос фильтрует только по user_id. Что сделает планировщик?"
        choices:
          - id: a
            text: "Пройдёт все партиции: отсекать нечего, нужный пользователь мог наследить в любом месяце."
          - id: b
            text: "Прочитает только последнюю партицию."
          - id: c
            text: "Откажется выполнять запрос."
          - id: d
            text: "Автоматически перепартиционирует таблицу по user_id."
        correct: [a]
        explanation: "Ключ партиционирования это дата, а фильтра по дате в запросе нет. Значит подходящей может оказаться любая партиция, и планировщик пройдёт все. Партиционирование по дате не ускоряет запросы по user_id."
      - prompt: "Почему тысячи мелких партиций могут навредить?"
        choices:
          - id: a
            text: "Они раздувают время планирования и память планировщика; гранулярность берут разумную, обычно месяц или неделю."
          - id: b
            text: "СУБД запрещает больше сотни партиций."
          - id: c
            text: "Мелкие партиции нельзя индексировать."
          - id: d
            text: "Они автоматически превращаются в шарды."
        correct: [a]
        explanation: "Планировщик учитывает все партиции при построении плана, поэтому десятки тысяч мелких кусков замедляют планирование и едят память. Разумная гранулярность (месяц, неделя) держит число партиций управляемым."

  - id: partitioning-kinds-blanks-001
    concept: partitioning
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски о видах партиционирования, отсечении и жизненном цикле."
    template: |
      Партиционирование по {{range}} кладёт в партицию непрерывный интервал ключа и удобно для данных с временем.
      Партиционирование по {{hash}} раскидывает строки равномерно по N партициям, когда естественного диапазона нет.
      Отсечение лишних партиций работает, только когда в запросе есть фильтр по {{key}}.
      Удалить старый месяц дешевле всего, {{drop}} партицию целиком.
    blanks:
      range:
        accept: ["диапазону", "range", "диапазону (range)"]
      hash:
        accept: ["хешу", "hash", "хэшу"]
      key:
        accept: ["ключу партиционирования", "ключу", "ключ партиционирования"]
      drop:
        accept: ["отсоединив", "удалив", "дропнув", "отсоединив или удалив"]
    variants:
      - template: |
          Все партиции одной таблицы живут на {{node}} узле, поэтому партиционирование не добавляет мощности железа.
          Индекс ускоряет точечный поиск, а партиция даёт отсечение и дешёвую {{lifecycle}} данных.
        blanks:
          node:
            accept: ["одном", "том же"]
          lifecycle:
            accept: ["ротацию", "архивацию", "очистку", "ротацию (архивацию)"]
      - template: |
          Если таблица нарезана по дате, а частый запрос фильтрует по user_id, отсекать {{nothing}}, и планировщик пройдёт {{all}} партиции.
        blanks:
          nothing:
            accept: ["нечего", "ничего"]
          all:
            accept: ["все", "всё"]

  - id: partitioning-pruning-predict-001
    concept: partitioning
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она раскладывает строки по месячным партициям и печатает, сколько строк в июньской партиции (её и прочитает запрос по июню после отсечения)."
    snippet: |
      partitions = {"2026-04": 0, "2026-05": 0, "2026-06": 0, "2026-07": 0}

      def month_of(day):
          return day[:7]

      rows = ["2026-04-11", "2026-06-02", "2026-06-30", "2026-07-05", "2026-06-15"]
      for r in rows:
          partitions[month_of(r)] += 1

      print(partitions["2026-06"])
    expected:
      kind: stdout
      value: "3"
    hints:
      - "Сначала разложите строки по партициям: month_of берёт первые 7 символов даты (год и месяц). Сколько дат попадает в 2026-06?"
      - "В июнь (2026-06) попадают 2026-06-02, 2026-06-30 и 2026-06-15. Запрос по июню после отсечения читает только эту партицию."
    variants:
      - prompt: "Что выведет программа? Она печатает, сколько строк в июльской партиции."
        snippet: |
          partitions = {"2026-04": 0, "2026-05": 0, "2026-06": 0, "2026-07": 0}

          def month_of(day):
              return day[:7]

          rows = ["2026-04-11", "2026-06-02", "2026-06-30", "2026-07-05", "2026-06-15"]
          for r in rows:
              partitions[month_of(r)] += 1

          print(partitions["2026-07"])
        expected:
          kind: stdout
          value: "1"
      - prompt: "Что выведет программа? Запрос без фильтра по ключу партиционирования вынужден пройти все партиции. Сколько их?"
        snippet: |
          partitions = ["2026-04", "2026-05", "2026-06", "2026-07"]

          scanned = len(partitions)
          print(scanned)
        expected:
          kind: stdout
          value: "4"

  - id: partitioning-vs-index-001
    concept: partitioning
    type: theory-quiz
    difficulty: 3
    prompt: "Таблицу нарезали по месяцам ради дешёвой ротации, но частые запросы ищут по email одного пользователя и стали медленнее. Причина и решение?"
    choices:
      - id: a
        text: "Партиции не ускоряют точечный поиск по email: нужен индекс по email внутри партиций. Партиции хороши для отсечения по дате и ротации, а не для селективного поиска."
      - id: b
        text: "Партиционирование всегда замедляет поиск, его надо убрать."
      - id: c
        text: "Нужно добавить ещё партиций, теперь по email."
      - id: d
        text: "Партиции заменяют индексы, поэтому индекс здесь не нужен."
    correct: [a]
    explanation: "Партиции и индексы решают разные задачи. Нарезка по дате даёт отсечение по дате и дешёвую ротацию, но точечный поиск по email она не ускоряет: нужный пользователь может быть в любой партиции. Ускорит его индекс по email, который строят внутри партиций. Партиции не отменяют индексы, а дополняют их."
    hints:
      - "Что именно фильтрует медленный запрос и совпадает ли это с ключом партиционирования? Если нет, отсекать по дате нечего."
      - "Разделите две задачи: дешёвая ротация старых данных и быстрый селективный поиск. Первую решают партиции, вторую внутри партиций решает индекс."
