exercises:
  - id: scaling-vertical-ceiling-001
    concept: scaling-basics
    type: theory-quiz
    difficulty: 1
    prompt: "What is vertical scaling (scale-up)?"
    choices:
      - id: a
        text: "Strengthening a single node: adding more cores, memory, and faster disks."
      - id: b
        text: "Adding new nodes alongside it and spreading the load between them."
      - id: c
        text: "Copying the database to several servers for fault tolerance."
      - id: d
        text: "Cutting a table into pieces across different servers."
    correct: [a]
    explanation: "Vertical scaling grows the capacity of one node. Adding nodes alongside it is horizontal scaling (scale-out); copying and splitting data is already replication and sharding."
    variants:
      - prompt: "Which ceiling does vertical scaling NOT run into?"
        choices:
          - id: a
            text: "Price: at the top end of the price list, each extra percent of capacity gets nonlinearly more expensive."
          - id: b
            text: "The physical limit of cores and memory in a single machine."
          - id: c
            text: "Downtime during upgrades: the node usually has to be taken offline."
          - id: d
            text: "Lagging consistency between copies of the data."
        correct: [d]
        explanation: "Lagging consistency is a pain of horizontal scaling, where data lives in several copies. A single node has no copies, but it does have its own ceilings: price, physical limits, and upgrade downtime."
      - prompt: "Why does even the most powerful single server remain risky?"
        choices:
          - id: a
            text: "It stays a single point of failure: a disk dies, and the service is gone."
          - id: b
            text: "Powerful servers are always slower than two weak ones."
          - id: c
            text: "A powerful server cannot hold indexes."
          - id: d
            text: "Transactions only work on weak hardware."
        correct: [a]
        explanation: "No matter how much you pay for one node, it remains a single point of failure. Without a replica and a failover plan, its death means the whole service goes down."

  - id: scaling-read-vs-write-001
    concept: scaling-basics
    type: theory-quiz
    difficulty: 2
    prompt: "Why is reading easier to scale than writing?"
    choices:
      - id: a
        text: "Reading does not change data, so it can be spread across many copies; writing needs a single owner per piece of data for correctness."
      - id: b
        text: "Reading always comes from cache, and writing always comes from disk."
      - id: c
        text: "Writing is physically slower than reading on any hardware, and that cannot be fixed."
      - id: d
        text: "Reading can be turned off, but writing cannot."
    correct: [a]
    explanation: "The asymmetry is about correctness, not speed. You can keep as many read copies as you want. But two nodes independently accepting a write to the same row will diverge, so every piece of data needs a single write owner."
    variants:
      - prompt: "A service reads 20 times more often than it writes and has hit a read ceiling. What is the cheapest first step?"
        choices:
          - id: a
            text: "Add read replicas and move read traffic to them."
          - id: b
            text: "Immediately shard the data across ten nodes."
          - id: c
            text: "Rewrite the service in another language."
          - id: d
            text: "Disable part of the users."
        correct: [a]
        explanation: "Since the bottleneck is specifically reading, and reading does not change data, it gets spread across replicas. Sharding here is premature and expensive: it's needed when writes or data volume hit a ceiling."
      - prompt: "Why can't writes simply be spread across several equal copies?"
        choices:
          - id: a
            text: "Two copies that independently accept a write to the same row will diverge, and you'll have to pick a winning version."
          - id: b
            text: "Copies technically cannot accept writes."
          - id: c
            text: "A write to a copy is always lost."
          - id: d
            text: "This is forbidden by the database license."
        correct: [a]
        explanation: "The problem is conflicts. Without a single owner per piece of data, parallel writes to the same row create a divergence that nobody can resolve. So writes are scaled by splitting data, not by copying it."

  - id: scaling-terms-blanks-001
    concept: scaling-basics
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the blanks about the two kinds of scaling and the read and write paths."
    template: |
      Strengthening a single node is called {{up}} scaling, adding nodes is called {{out}} scaling.
      Reads are spread across {{copies}}, because they don't change data.
      Writes can only be scaled by {{shard}}, because every piece of data needs a single owner.
    blanks:
      up:
        accept: ["vertical"]
      out:
        accept: ["horizontal"]
      copies:
        accept: ["replicas", "copies"]
      shard:
        accept: ["sharding", "splitting", "partitioning the data across nodes"]
    variants:
      - template: |
          Before moving to a distributed system, it's usually cheaper to add {{index}}, offload reports to a {{replica}}, and cache hot keys.
          A distributed system is expensive not in money but in {{cost}}: cross-node queries, lagging consistency, and new failure modes.
        blanks:
          index:
            accept: ["indexes", "an index", "indices"]
          replica:
            accept: ["replica"]
          cost:
            accept: ["complexity"]
      - template: |
          Read replicas only relieve {{load}}, they don't help if it's {{write}} that hit the ceiling.
          Every replica still replays the whole write stream from the {{leader}}.
        blanks:
          load:
            accept: ["reads", "read load"]
          write:
            accept: ["writes", "writing"]
          leader:
            accept: ["leader", "the leader", "the primary node"]

  - id: scaling-capacity-predict-001
    concept: scaling-basics
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It computes total read and write throughput once read replicas are added to the leader."
    snippet: |
      def total_read_tps(node_read, replicas):
          return node_read * (1 + replicas)

      def total_write_tps(leader_write, replicas):
          return leader_write

      node_read = 1000
      leader_write = 500
      replicas = 3

      print(total_read_tps(node_read, replicas), total_write_tps(leader_write, replicas))
    expected:
      kind: stdout
      value: "4000 500"
    hints:
      - "Replicas only accept reads. How is that reflected in the two functions: which one even looks at the number of replicas?"
      - "Reads are spread across the leader plus replicas: node_read is multiplied by (1 + replicas). Writes stay on the single leader regardless of the number of replicas."
    variants:
      - snippet: |
          def total_read_tps(node_read, replicas):
              return node_read * (1 + replicas)

          def total_write_tps(leader_write, replicas):
              return leader_write

          node_read = 800
          leader_write = 500
          replicas = 5

          print(total_read_tps(node_read, replicas), total_write_tps(leader_write, replicas))
        expected:
          kind: stdout
          value: "4800 500"
      - snippet: |
          import math

          node_read = 1000
          target_read = 5000

          replicas_needed = math.ceil(target_read / node_read) - 1
          print(replicas_needed)
        expected:
          kind: stdout
          value: "4"

  - id: scaling-write-bottleneck-001
    concept: scaling-basics
    type: theory-quiz
    difficulty: 3
    prompt: "The leader sits at 100% CPU from a stream of INSERT and UPDATE statements, while replicas are nearly idle. What will actually raise the write ceiling?"
    choices:
      - id: a
        text: "Split the data across nodes (sharding), so writes go to several independent owners."
      - id: b
        text: "Add more read replicas: they'll take load off the leader."
      - id: c
        text: "Increase the read cache size."
      - id: d
        text: "Add more indexes to the hot tables."
    correct: [a]
    explanation: "Read replicas replay the leader's entire write stream, so they don't help with writes at all; on the contrary, each replica also applies those same changes. A read cache doesn't touch writes, and extra indexes usually slow them down. Only sharding can scale writes beyond a single node."
    hints:
      - "Split the question apart: which of these touches the write path specifically, and which only touches reads? Replicas and read caches live on the read side."
      - "Replicas don't reduce the write stream, they replay it. To let writes be spread across multiple owners, the data itself needs to be split."
