exercises:
  - id: choosing-read-heavy-001
    concept: choosing-strategy
    type: theory-quiz
    difficulty: 1
    prompt: "Каталог товаров читают в сотни раз чаще, чем пишут, и он упёрся в чтение. Самый дешёвый первый ход?"
    choices:
      - id: a
        text: "Закешировать горячие чтения и добавить read-реплики, оставив запись на лидере."
      - id: b
        text: "Зашардировать данные по десяти узлам сразу, без промежуточного состояния."
      - id: c
        text: "Перейти на multi-leader репликацию между дата-центрами сразу, без промежуточного состояния."
      - id: d
        text: "Партиционировать таблицу по хешу ключа сразу, без промежуточного состояния."
    correct: [a]
    explanation: "Упёрлись в чтение, а оно масштабируется дёшево: кеш забирает горячие запросы, реплики разбирают остальное чтение, запись остаётся на лидере. Шардинг и multi-leader дороги и решают проблему записи или географии, а не чтения; хеш-партиции не снимают нагрузку чтения."
    variants:
      - prompt: "Что из перечисленного НЕ помогает снять именно нагрузку чтения в read-heavy сервисе?"
        choices:
          - id: a
            text: "Шардирование по ключу записи ради масштаба записи и объёма."
          - id: b
            text: "Кеш горячих ключей перед базой сразу, без промежуточного состояния."
          - id: c
            text: "Read-реплики, на которые уводят чтение сразу, без промежуточного состояния."
          - id: d
            text: "Денормализованные витрины для чтения в духе CQRS."
        correct: [a]
        explanation: "Кеш, реплики и денормализованные витрины все работают на пути чтения. Шардирование масштабирует запись и объём за пределы одного узла и к проблеме чтения отношения не имеет, поэтому здесь оно лишнее и дорогое."
      - prompt: "Где в read-heavy сценарии естественно применяется идея CQRS?"
        choices:
          - id: a
            text: "Ленты и витрины строят как отдельные денормализованные представления для чтения и читают их с реплик, не мешая нормализованной записи на лидере."
          - id: b
            text: "Всю запись переводят на реплики, а чтение на лидера сразу, без промежуточного состояния и без дополнительных проверок."
          - id: c
            text: "Отключают запись на время пиковых чтений сразу, без промежуточного состояния и без дополнительных проверок."
          - id: d
            text: "Хранят чтение и запись в одной таблице без индексов сразу, без промежуточного состояния и без дополнительных проверок."
        correct: [a]
        explanation: "CQRS разводит модель записи и модель чтения. В read-heavy это ложится идеально: денормализованные представления собирают один раз при записи и дёшево раздают на чтение с реплик. Цена та же отложенная согласованность (лаг между записью и обновлением представления)."

  - id: choosing-write-heavy-001
    concept: choosing-strategy
    type: theory-quiz
    difficulty: 2
    prompt: "Поток метрик пишется непрерывно и растёт по времени, а запросы почти всегда про свежий диапазон. С чего разумно начать масштабирование?"
    choices:
      - id: a
        text: "Партиционировать по времени с TTL или архивацией; шардировать лишь когда один узел перестанет вмещать поток записи."
      - id: b
        text: "Сразу добавить побольше read-реплик сразу, без промежуточного состояния и без дополнительных проверок."
      - id: c
        text: "Зашардировать по хешу и не заводить партиции сразу, без промежуточного состояния и без дополнительных проверок."
      - id: d
        text: "Перейти на синхронную репликацию на все узлы сразу, без промежуточного состояния и без дополнительных проверок."
    correct: [a]
    explanation: "Болит запись и объём, а не чтение, поэтому реплики почти не помогают. Партиции по времени дают отсечение по свежему диапазону и дешёвую ротацию старого через TTL, и один узел на такой схеме живёт долго. Шардинг подключают позже, когда запись перерастает узел, и обычно поверх партиций."
    variants:
      - prompt: "В каком порядке для write-heavy данных по времени вводят партиции и шардинг?"
        choices:
          - id: a
            text: "Сначала партиции по времени (дёшево, ротация и отсечение), потом шардинг, когда узла перестанет хватать; внутри шарда снова партиции."
          - id: b
            text: "Сначала шардинг, а партиции не нужны вовсе сразу, без промежуточного состояния и без дополнительных проверок."
          - id: c
            text: "Одновременно и только вместе, иначе не работает сразу, без промежуточного состояния и без дополнительных проверок."
          - id: d
            text: "Ни то ни другое: хватит вертикального роста навсегда сразу, без промежуточного состояния и без дополнительных проверок."
        correct: [a]
        explanation: "Партиции дешевле и решают ротацию и отсечение внутри одного узла, поэтому идут первыми. Шардинг дорогой и нужен, лишь когда поток записи или объём перерастают узел; типичный боевой слой это хеш-шардинг по источнику плюс range-партиции по времени внутри каждого шарда."
      - prompt: "Почему read-реплики плохо помогают write-heavy потоку метрик?"
        choices:
          - id: a
            text: "Каждая реплика всё равно повторяет весь поток записи лидера, поэтому нагрузку записи они не снимают."
          - id: b
            text: "Реплики не умеют хранить числовые метрики ещё до любых других проверок на этом пути."
          - id: c
            text: "Реплики замедляют чтение свежих диапазонов ещё до любых других проверок на этом пути."
          - id: d
            text: "Реплики запрещены для таблиц с TTL не входит в сравнение и не влияет на результат."
        correct: [a]
        explanation: "Реплики масштабируют чтение, а у метрик болит запись. Каждая реплика проигрывает тот же поток изменений, что и лидер, поэтому поток записи от них не уменьшается. Запись лечат делением: по времени (партиции) и по узлам (шардинг)."

  - id: choosing-checklist-blanks-001
    concept: choosing-strategy
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски о сопоставлении профиля нагрузки и стратегии."
    template: |
      Если болит чтение, его уводят на {{read}} и кеш, а запись оставляют на лидере.
      Если болит запись по времени, данные сначала {{part}} по времени с TTL, а к шардингу идут лишь когда узла перестанет хватать.
      Мультитенантный SaaS естественно шардируют по {{tenant}}, потому что почти все запросы знают тенанта.
      Перед любым усложнением сначала измеряют, какой именно {{resource}} кончился, и исчерпывают дешёвые ходы.
    blanks:
      read:
        accept: ["реплики", "read-реплики", "копии"]
      part:
        accept: ["партиционируют", "режут", "нарезают"]
      tenant:
        accept: ["tenant_id", "тенанту", "ключу тенанта"]
      resource:
        accept: ["ресурс", "ресурс кончился"]
    variants:
      - template: |
          Кандидат в ключ шардирования это поле, которое знают {{most}} запросов: тогда запрос попадёт в один шард.
          Если системе нужны диапазоны и агрегаты, с {{hash}}-раскладкой осторожнее: она разносит соседние ключи по всем узлам.
        blanks:
          most:
            accept: ["почти все", "большинство"]
          hash:
            accept: ["хеш", "hash"]
      - template: |
          Крупный тенант, съедающий непропорционально много нагрузки, называют {{whale}} и выносят на выделенный шард или дробят.
          Межтенантную аналитику по всем клиентам держат в отдельном {{olap}} хранилище, чтобы не гонять scatter-gather по шардам на каждый отчёт.
        blanks:
          whale:
            accept: ["китом", "кит", "китом (whale)"]
          olap:
            accept: ["OLAP", "аналитическом", "олап"]

  - id: choosing-plan-predict-001
    concept: choosing-strategy
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Это упрощённая модель первого хода: реплики добавляют, если чтение превысило ёмкость узла на чтение; шардинг, если запись превысила ёмкость узла на запись."
    snippet: |
      def plan(read_qps, write_qps, cap_read, cap_write):
          steps = []
          if read_qps > cap_read:
              steps.append("replicas")
          if write_qps > cap_write:
              steps.append("shard")
          if not steps:
              steps.append("single")
          return ",".join(steps)

      print(plan(9000, 400, 3000, 1000))
    expected:
      kind: stdout
      value: "replicas"
    hints:
      - "Проверьте каждое условие по очереди: превысило ли чтение ёмкость на чтение, превысила ли запись ёмкость на запись? В список попадает шаг только за сработавшее условие."
      - "Чтение 9000 больше 3000, значит добавляется replicas. Запись 400 не больше 1000, значит shard не добавляется. В списке один шаг, и join выводит его как есть."
    variants:
      - prompt: "Что выведет программа? Теперь профиль write-heavy."
        snippet: |
          def plan(read_qps, write_qps, cap_read, cap_write):
              steps = []
              if read_qps > cap_read:
                  steps.append("replicas")
              if write_qps > cap_write:
                  steps.append("shard")
              if not steps:
                  steps.append("single")
              return ",".join(steps)

          print(plan(2000, 5000, 3000, 1000))
        expected:
          kind: stdout
          value: "shard"
      - prompt: "Что выведет программа? Теперь и чтение, и запись превышают ёмкость узла."
        snippet: |
          def plan(read_qps, write_qps, cap_read, cap_write):
              steps = []
              if read_qps > cap_read:
                  steps.append("replicas")
              if write_qps > cap_write:
                  steps.append("shard")
              if not steps:
                  steps.append("single")
              return ",".join(steps)

          print(plan(9000, 5000, 3000, 1000))
        expected:
          kind: stdout
          value: "replicas,shard"

  - id: choosing-multitenant-whale-001
    concept: choosing-strategy
    type: theory-quiz
    difficulty: 3
    prompt: "SaaS шардирован по tenant_id. Один крупный клиент даёт 40% всей нагрузки, и его шард перегружен, пока соседние скучают. Что это за проблема и как её решают?"
    choices:
      - id: a
        text: "Это горячий ключ (кит): весь трафик одного tenant_id летит в один шард."
      - id: b
        text: "Это лаг репликации, лечится синхронной репликацией."
      - id: c
        text: "Это split-brain, лечится кворумом и fencing."
      - id: d
        text: "Ключ tenant_id выбран неверно, надо срочно перешардировать всё по времени."
    correct: [a]
    explanation: "Шардирование по tenant_id держит данные клиента вместе, но не спасает, когда сам клиент огромен: весь его трафик идёт в один шард, и это ровно проблема горячего ключа. Лечат выносом кита на отдельный шард или дроблением его данных дополнительным ключом. Репликация и split-brain тут ни при чём, а перешардирование по времени сломает быстрые запросы в пределах тенанта."
    hints:
      - "Куда попадает весь трафик одного значения ключа шардирования, даже если хеш идеальный? На какую ранее разобранную проблему это похоже?"
      - "Отделите обычных тенантов от одного гиганта. Что можно сделать именно с гигантом, чтобы он не делил ресурсы с сотнями мелких соседей?"

  - id: choosing-layered-capstone-001
    concept: choosing-strategy
    type: theory-quiz
    difficulty: 4
    prompt: "Мультитенантный SaaS: дашборды читают в 30 раз чаще, чем пишут, биллинг-события пишутся часто и растут по времени, а один клиент даёт 40% нагрузки. Как разложить стратегии, а не выбрать одну?"
    choices:
      - id: a
        text: "Чтение дашбордов на кеш и реплики; шард по tenant_id с выделенным шардом для кита."
      - id: b
        text: "Достаточно зашардировать по tenant_id, остальное решится само."
      - id: c
        text: "Достаточно добавить read-реплик: они снимут и чтение дашбордов, и рост биллинг-событий."
      - id: d
        text: "Хватит одного большого сервера с быстрыми дисками, распределённость не нужна."
    correct: [a]
    explanation: "Здесь три разные проблемы разом, и каждая просит свой слой. Частое чтение дашбордов снимают кеш и реплики (путь чтения). Разделение клиентов и масштаб записи дают шард по tenant_id, но кит в 40% требует выделенного шарда, иначе он топит соседей. Растущие по времени биллинг-события просят партиций по времени с TTL внутри шарда. Одни реплики не спасут от роста записи, один шардинг не снимет нагрузку чтения и не решит кита, а один большой сервер не переживёт ни рост записи, ни отказ."
    hints:
      - "Разложите условие на отдельные проблемы: частое чтение, растущая по времени запись и один клиент-гигант. Одна стратегия закрывает все три или у каждой свой инструмент?"
      - "Вспомните лестницу и порядок слоёв: что делают с чтением, что с ростом по времени, что с горячим тенантом. Соберите ответ из нескольких слоёв, а не из одного."
