exercises:
  - id: scaling-vertical-ceiling-001
    concept: scaling-basics
    type: theory-quiz
    difficulty: 1
    prompt: "Что такое вертикальное масштабирование (scale-up)?"
    choices:
      - id: a
        text: "Усилить один узел: добавить ему ядер, памяти и более быстрые диски."
      - id: b
        text: "Добавить рядом новые узлы и распределить нагрузку между ними."
      - id: c
        text: "Скопировать базу на несколько серверов ради отказоустойчивости."
      - id: d
        text: "Разрезать таблицу на куски по разным серверам."
    correct: [a]
    explanation: "Вертикальное масштабирование наращивает мощность одного узла. Добавление узлов рядом это горизонтальное масштабирование (scale-out); копирование и разрезание данных это уже репликация и шардирование."
    variants:
      - prompt: "В какой из потолков НЕ упирается вертикальное масштабирование?"
        choices:
          - id: a
            text: "В цену: на верхнем крае прайса каждый процент мощности дорожает нелинейно."
          - id: b
            text: "В физический предел ядер и памяти в одной машине."
          - id: c
            text: "В простой при апгрейде: узел обычно надо погасить."
          - id: d
            text: "В отложенную согласованность между копиями данных."
        correct: [d]
        explanation: "Отложенная согласованность это боль горизонтального масштабирования, где данные живут в нескольких копиях. У одного узла копий нет, зато есть свои потолки: цена, физический предел и простой при апгрейде."
      - prompt: "Почему даже самый мощный одиночный сервер остаётся рискованным?"
        choices:
          - id: a
            text: "Он остаётся единой точкой отказа: умер диск, и сервиса нет."
          - id: b
            text: "Мощные серверы всегда медленнее двух слабых."
          - id: c
            text: "На мощном сервере нельзя держать индексы."
          - id: d
            text: "Транзакции работают только на слабом железе."
        correct: [a]
        explanation: "Сколько ни плати за один узел, он остаётся единой точкой отказа. Без реплики и плана failover его смерть означает простой всего сервиса."

  - id: scaling-read-vs-write-001
    concept: scaling-basics
    type: theory-quiz
    difficulty: 2
    prompt: "Почему чтение масштабируется проще, чем запись?"
    choices:
      - id: a
        text: "Чтение не меняет данные, поэтому его можно раздать многим копиям; записи нужен единственный хозяин на каждый кусок ради корректности."
      - id: b
        text: "Чтение всегда идёт из кеша, а запись всегда с диска."
      - id: c
        text: "Запись физически медленнее чтения на любом железе, и это неисправимо."
      - id: d
        text: "Чтение можно отключить, а запись нет."
    correct: [a]
    explanation: "Асимметрия в корректности, а не в скорости. Копий для чтения можно держать сколько угодно. А два узла, независимо принимающих запись в одну строку, разойдутся, поэтому у каждого куска данных должен быть один хозяин записи."
    variants:
      - prompt: "Сервис читает в 20 раз чаще, чем пишет, и упёрся в чтение. Самый дешёвый первый шаг?"
        choices:
          - id: a
            text: "Добавить read-реплики и увести запросы на чтение на них."
          - id: b
            text: "Сразу шардировать данные по десяти узлам."
          - id: c
            text: "Переписать сервис на другой язык."
          - id: d
            text: "Отключить часть пользователей."
        correct: [a]
        explanation: "Раз упёрлись именно в чтение, а оно не меняет данные, его раздают на реплики. Шардинг здесь преждевременная и дорогая мера: он нужен, когда в потолок упирается запись или объём."
      - prompt: "Почему запись нельзя просто раздать нескольким равноправным копиям?"
        choices:
          - id: a
            text: "Две копии, независимо принявшие запись в одну строку, разойдутся, и придётся выбирать победившую версию."
          - id: b
            text: "Копии не умеют принимать запись технически."
          - id: c
            text: "Запись в копию всегда теряется."
          - id: d
            text: "Это запрещено лицензией СУБД."
        correct: [a]
        explanation: "Проблема в конфликтах. Без единственного хозяина на кусок данных параллельные записи в одну строку создают расхождение, которое некому разрешить. Поэтому запись масштабируют делением данных, а не копированием."

  - id: scaling-terms-blanks-001
    concept: scaling-basics
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски о двух видах масштабирования и путях чтения и записи."
    template: |
      Усиление одного узла называют {{up}} масштабированием, добавление узлов называют {{out}} масштабированием.
      Чтение раздают на {{copies}}, потому что оно не меняет данные.
      Запись масштабируют только {{shard}}, потому что у каждого куска данных должен быть единственный хозяин.
    blanks:
      up:
        accept: ["вертикальным", "вертикальное"]
      out:
        accept: ["горизонтальным", "горизонтальное"]
      copies:
        accept: ["реплики", "копии", "реплик"]
      shard:
        accept: ["шардированием", "шардингом", "делением", "разделением"]
    variants:
      - template: |
          До перехода к распределённости обычно дешевле добавить {{index}}, вынести отчёты на {{replica}} и закешировать горячие ключи.
          Распределённая система стоит дорого не деньгами, а {{cost}}: cross-node запросы, отложенная согласованность и новые режимы отказа.
        blanks:
          index:
            accept: ["индексы", "индекс", "индексов"]
          replica:
            accept: ["реплику", "реплики", "реплика"]
          cost:
            accept: ["сложностью", "сложность"]
      - template: |
          Read-реплики снимают только {{load}}, но не помогают, если в потолок упёрлась {{write}}.
          Каждая реплика всё равно повторяет весь поток записи {{leader}}.
        blanks:
          load:
            accept: ["чтение", "чтения", "нагрузку на чтение"]
          write:
            accept: ["запись", "записи"]
          leader:
            accept: ["лидера", "лидер", "основного узла"]

  - id: scaling-capacity-predict-001
    concept: scaling-basics
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она считает суммарную пропускную способность на чтение и на запись, когда к лидеру добавили read-реплики."
    snippet: |
      def total_read_tps(node_read, replicas):
          return node_read * (1 + replicas)

      def total_write_tps(leader_write, replicas):
          return leader_write

      node_read = 1000
      leader_write = 500
      replicas = 3

      print(total_read_tps(node_read, replicas), total_write_tps(leader_write, replicas))
    expected:
      kind: stdout
      value: "4000 500"
    hints:
      - "Реплики принимают только чтение. Как это отражено в двух функциях: какая из них вообще смотрит на число реплик?"
      - "Чтение раздаётся на лидера плюс реплики: node_read умножается на (1 + replicas). Запись остаётся на одном лидере независимо от числа реплик."
    variants:
      - snippet: |
          def total_read_tps(node_read, replicas):
              return node_read * (1 + replicas)

          def total_write_tps(leader_write, replicas):
              return leader_write

          node_read = 800
          leader_write = 500
          replicas = 5

          print(total_read_tps(node_read, replicas), total_write_tps(leader_write, replicas))
        expected:
          kind: stdout
          value: "4800 500"
      - snippet: |
          import math

          node_read = 1000
          target_read = 5000

          replicas_needed = math.ceil(target_read / node_read) - 1
          print(replicas_needed)
        expected:
          kind: stdout
          value: "4"

  - id: scaling-write-bottleneck-001
    concept: scaling-basics
    type: theory-quiz
    difficulty: 3
    prompt: "Лидер на 100% CPU от потока INSERT и UPDATE, реплики почти простаивают. Что реально снимет потолок записи?"
    choices:
      - id: a
        text: "Разделить данные по узлам (шардинг), чтобы запись шла на несколько независимых хозяев."
      - id: b
        text: "Добавить ещё read-реплик: они разгрузят лидера."
      - id: c
        text: "Поднять размер кеша на чтение."
      - id: d
        text: "Навесить побольше индексов на горячие таблицы."
    correct: [a]
    explanation: "Read-реплики повторяют весь поток записи лидера, поэтому от записи они не спасают, наоборот, каждая реплика тоже применяет эти изменения. Кеш на чтение не трогает запись, а лишние индексы обычно замедляют её. Масштабировать запись за пределы одного узла умеет только шардинг."
    hints:
      - "Разделите вопрос: что из перечисленного трогает именно путь записи, а что только чтение? Реплики и read-кеш живут на стороне чтения."
      - "Реплики не уменьшают поток записи, они его повторяют. Чтобы запись стало можно раздать нескольким хозяевам, данные нужно поделить."
