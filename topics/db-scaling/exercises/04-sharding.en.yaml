exercises:
  - id: sharding-what-001
    concept: sharding
    type: theory-quiz
    difficulty: 1
    prompt: "What does sharding do?"
    choices:
      - id: a
        text: "Spreads different data across different nodes, where each shard owns its own writes."
      - id: b
        text: "Keeps identical copies of data on many nodes."
      - id: c
        text: "Cuts a table into pieces within a single node."
      - id: d
        text: "Caches hot queries in memory."
    correct: [a]
    explanation: "Sharding splits data between nodes so each shard owns its portion and accepts writes for it. Copies on many nodes are replication, and pieces within one node are partitioning."
    variants:
      - prompt: "What can sharding do that read replicas can't?"
        choices:
          - id: a
            text: "Scale writes and data volume beyond a single node, by splitting data between owners."
          - id: b
            text: "Only speed up reads."
          - id: c
            text: "Reduce replication lag."
          - id: d
            text: "Make backups."
        correct: [a]
        explanation: "Replicas replay the leader's whole write stream and so don't scale writes. Sharding gives each piece of data its own write owner, and that's the only way writes and volume grow beyond a single node."
      - prompt: "Does sharding eliminate the need for replication and partitioning?"
        choices:
          - id: a
            text: "No: each shard is usually replicated and partitioned on its own; sharding sits on top of them."
          - id: b
            text: "Yes, a shard replaces replicas and partitions."
          - id: c
            text: "Yes, replicas are forbidden after sharding."
          - id: d
            text: "Yes, partitions automatically turn into shards."
        correct: [a]
        explanation: "The layers stack: a production shard is an independent database that has its own partitions inside and its own replicas alongside it. Sharding doesn't replace earlier techniques, it builds on top of them."

  - id: sharding-hash-vs-range-001
    concept: sharding
    type: theory-quiz
    difficulty: 2
    prompt: "How do hash sharding and range sharding differ in consequences?"
    choices:
      - id: a
        text: "Hash spreads keys evenly but kills range queries; range keeps ranges together but risks a hot last range with a monotonic key."
      - id: b
        text: "Hash is always faster than range at everything."
      - id: c
        text: "Range spreads keys more evenly than hash."
      - id: d
        text: "There's no difference in consequences between them."
    correct: [a]
    explanation: "Hash deliberately spreads neighboring keys apart for even load, so a range query has to touch every shard. Range keeps neighboring keys together (ranges work), but a monotonic key creates a hot last range."
    variants:
      - prompt: "Why can't you efficiently run \"orders from today\" on a hash-sharded database?"
        choices:
          - id: a
            text: "Keys that are neighbors in time are deliberately spread across different shards, so the range turns into a poll of every shard."
          - id: b
            text: "A hash shard doesn't store dates at all."
          - id: c
            text: "Queries with dates are forbidden under hash sharding."
          - id: d
            text: "Dates in a hash are rounded to the month."
        correct: [a]
        explanation: "Hashing deliberately spreads nearby values across different shards for evenness. Because of that, a contiguous range like \"today\" ends up scattered across all shards, and the query has to poll each one."
      - prompt: "When does range sharding produce a hot shard?"
        choices:
          - id: a
            text: "When the key grows monotonically (time, auto-increment): all fresh traffic pours into the last range while other shards sit idle."
          - id: b
            text: "When the key is evenly distributed."
          - id: c
            text: "When there are too many shards."
          - id: d
            text: "Range sharding never produces hot shards."
        correct: [a]
        explanation: "With range sharding, neighboring keys sit together. If the key is monotonic, every new record lands in the same last range, and that shard overheats while the others sit idle."

  - id: sharding-key-blanks-001
    concept: sharding
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the blanks about the sharding key, hot keys, and cross-shard operations."
    template: |
      A good sharding key has {{card}} cardinality, lands on shards evenly, and appears in most queries.
      One giant customer overheats their shard even with a perfect hash: this is a hot {{hot}}.
      A query that needs data from many shards runs as a {{sg}} and is therefore slow.
      A naive hash modulo N moves {{almost}} all the data when the number of shards changes.
    blanks:
      card:
        accept: ["high"]
      hot:
        accept: ["key"]
      sg:
        accept: ["scatter-gather", "scatter gather"]
      almost:
        accept: ["almost", "nearly"]
    variants:
      - template: |
          Routing in the {{app}} is simple with no extra network hop, but the logic has to be rolled out to every client.
          Routing through a {{proxy}} hides the topology from clients at the cost of an extra hop.
        blanks:
          app:
            accept: ["application", "client"]
          proxy:
            accept: ["proxy"]
      - template: |
          To keep a transaction from stretching across several nodes, related data is kept under {{one}} key on the {{shard}} shard.
        blanks:
          one:
            accept: ["one", "a shared"]
          shard:
            accept: ["same"]

  - id: sharding-routing-predict-001
    concept: sharding
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It spreads user events across three shards via user_id % 3 and prints the load on shards 0, 1, and 2."
    snippet: |
      def shard(user_id, n):
          return user_id % n

      events = [10, 21, 4, 33, 10, 7, 21, 21]
      counts = {0: 0, 1: 0, 2: 0}
      for uid in events:
          counts[shard(uid, 3)] += 1

      print(counts[0], counts[1], counts[2])
    expected:
      kind: stdout
      value: "4 4 0"
    hints:
      - "Compute shard = user_id % 3 for each event and drop it into one of three buckets. Note that user 21 appears three times: where do all its events go?"
      - "Shard 0 gets 21, 33, 21, 21 (four), shard 1 gets 10, 4, 10, 7 (four), shard 2 gets nothing. The hot key 21 skewed the load."
    variants:
      - prompt: "What does the program print? Now there are four shards (user_id % 4), and shard 1's load is printed."
        snippet: |
          def shard(user_id, n):
              return user_id % n

          events = [10, 21, 4, 33, 10, 7, 21, 21]
          counts = {0: 0, 1: 0, 2: 0, 3: 0}
          for uid in events:
              counts[shard(uid, 4)] += 1

          print(counts[1])
        expected:
          kind: stdout
          value: "4"
      - prompt: "What does the program print? An aggregate over all users has to poll every shard. How many are there?"
        snippet: |
          n = 3
          print(n)
        expected:
          kind: stdout
          value: "3"

  - id: sharding-cross-shard-txn-001
    concept: sharding
    type: theory-quiz
    difficulty: 4
    prompt: "A database is sharded by user_id. A new report appears: \"top 10 most active users this month across the whole system.\" Why is it expensive, and what's the usual approach?"
    choices:
      - id: a
        text: "It's a cross-shard aggregate: it requires a scatter-gather across every shard and merging the results; such operations are made rare or moved to a separate analytical store."
      - id: b
        text: "It's cheap: the router already knows which shard holds the ready-made top 10."
      - id: c
        text: "Every such query gets wrapped in a distributed transaction with two-phase commit."
      - id: d
        text: "The database urgently needs to be re-sharded by time instead of user_id."
    correct: [a]
    explanation: "A system-wide report isn't tied to a single user_id, so the router can't land on one shard: it needs a poll of every shard and a merge (scatter-gather), which is slow. A distributed transaction is irrelevant here (this is only a read), and re-sharding would break fast per-user queries for the sake of a rare report. The right move is running such analytics rarely, or in a separate OLAP store."
    hints:
      - "Is the report tied to a single value of the sharding key? If not, how many shards will the router need to visit?"
      - "Separate the frequent operations (within one user_id) from the rare system-wide analytics. Where's it cheaper to keep the latter, so it doesn't get in the way of the former?"

  - id: sharding-resharding-predict-001
    concept: sharding
    type: predict-output
    difficulty: 4
    prompt: "What does the program print? It counts how many keys change shard when moving from 3 to 4 shards under the hash-modulo-N rule."
    snippet: |
      def shard(key, n):
          return key % n

      keys = list(range(12))
      before = {k: shard(k, 3) for k in keys}
      after = {k: shard(k, 4) for k in keys}

      moved = sum(1 for k in keys if before[k] != after[k])
      print(moved)
    expected:
      kind: stdout
      value: "9"
    hints:
      - "A key moves if key % 3 is not equal to key % 4. Walk k from 0 to 11 and compare the two remainders."
      - "The remainders only match for 0, 1, and 2. So three keys stayed put, and the other nine out of twelve (75%) moved."
      - "This is exactly why the next section exists: hash modulo N shuffles almost everything when the node count changes, while consistent hashing moves only a small share."
    variants:
      - prompt: "What does the program print? Moving from 4 to 5 shards, 20 keys."
        snippet: |
          def shard(key, n):
              return key % n

          keys = list(range(20))
          before = {k: shard(k, 4) for k in keys}
          after = {k: shard(k, 5) for k in keys}

          moved = sum(1 for k in keys if before[k] != after[k])
          print(moved)
        expected:
          kind: stdout
          value: "16"
      - prompt: "What does the program print? Now it counts how many keys STAYED in place when moving from 3 to 4 shards, 12 keys."
        snippet: |
          keys = list(range(12))
          stayed = sum(1 for k in keys if k % 3 == k % 4)
          print(stayed)
        expected:
          kind: stdout
          value: "3"
