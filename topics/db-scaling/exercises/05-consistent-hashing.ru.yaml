exercises:
  - id: consistent-hashing-why-modn-001
    concept: consistent-hashing
    type: theory-quiz
    difficulty: 1
    prompt: "Почему правило hash(ключ) % N плохо переносит изменение числа узлов?"
    choices:
      - id: a
        text: "Местоположение ключа привязано к самому N: меняется N, меняется остаток почти у каждого ключа, и переезжает почти вся база."
      - id: b
        text: "Оно вообще не умеет распределять ключи по узлам."
      - id: c
        text: "Оно медленно вычисляет хеш."
      - id: d
        text: "Оно требует, чтобы N было простым числом."
    correct: [a]
    explanation: "В hash % N номер узла зависит от N. Стоит изменить число узлов, и остаток меняется почти у всех ключей, поэтому добавление одного узла заставляет переехать почти все данные. Скорость самого хеша тут ни при чём."
    variants:
      - prompt: "Переход с 3 узлов на 4 по правилу hash % N. Какая примерно доля ключей остаётся на месте?"
        choices:
          - id: a
            text: "Примерно четверть: на месте остаётся около 1/(N+1) ключей, остальные переезжают."
          - id: b
            text: "Все: hash % N не двигает ключи при смене N."
          - id: c
            text: "Ровно половина независимо от N."
          - id: d
            text: "Ничего не остаётся, переезжают абсолютно все ключи."
        correct: [a]
        explanation: "При переходе с N на N+1 на месте остаётся около 1/(N+1) ключей. Для тройки, ставшей четвёркой, это примерно четверть, а три четверти снимаются с места из-за одного нового узла."
      - prompt: "Что на самом деле хотели сделать, добавляя четвёртый узел, и что вместо этого делает hash % N?"
        choices:
          - id: a
            text: "Хотели, чтобы новый узел взял свою долю (около четверти), а hash % N переразложил почти всё, включая то, что трогать было незачем."
          - id: b
            text: "Хотели переразложить все данные, и hash % N именно это и делает эффективно."
          - id: c
            text: "Хотели удалить старые данные, а hash % N их архивирует."
          - id: d
            text: "Хотели ускорить чтение, а hash % N ускоряет только запись."
        correct: [a]
        explanation: "Задача локальная: новый узел должен забрать свою долю, около 1/N. Но модульное правило пересчитывает остаток у всех ключей сразу, поэтому двигается почти вся база, а не только нужная доля."

  - id: consistent-hashing-ring-001
    concept: consistent-hashing
    type: theory-quiz
    difficulty: 2
    prompt: "На кольце консистентного хеширования какому узлу принадлежит ключ?"
    choices:
      - id: a
        text: "Первому узлу по часовой стрелке от позиции ключа."
      - id: b
        text: "Узлу с наименьшим id независимо от позиции."
      - id: c
        text: "Случайному узлу, выбранному заново на каждый запрос."
      - id: d
        text: "Сразу всем узлам поровну."
    correct: [a]
    explanation: "И ключи, и узлы хешируются на одно кольцо. Ключ принадлежит первому узлу, встреченному при движении по часовой стрелке от позиции ключа. Местоположение задаёт соседство на кольце, а не число узлов."
    variants:
      - prompt: "Что происходит с ключами, когда на кольцо добавляют новый узел?"
        choices:
          - id: a
            text: "Переезжают только ключи с дуги между новым узлом и предыдущим против часовой стрелки; остальные не двигаются."
          - id: b
            text: "Переезжают все ключи кольца."
          - id: c
            text: "Не двигается ни один ключ, новый узел остаётся пустым."
          - id: d
            text: "Все ключи копируются на новый узел, старые узлы очищаются."
        correct: [a]
        explanation: "Новый узел встаёт в свою точку и забирает ключи только с одной дуги (между собой и предыдущим узлом против часовой стрелки). У всех прочих ключей сосед по часовой стрелке остался прежним, поэтому они не двигаются."
      - prompt: "Узел ушёл с кольца. Кому достаются его ключи?"
        choices:
          - id: a
            text: "Следующему узлу по часовой стрелке; остальные ключи кольца не трогаются."
          - id: b
            text: "Они теряются безвозвратно."
          - id: c
            text: "Равномерно всем оставшимся узлам поровну по одному."
          - id: d
            text: "Предыдущему узлу против часовой стрелки."
        correct: [a]
        explanation: "Ключи ушедшего узла подхватывает следующий по часовой стрелке сосед, ведь теперь именно он первый на их пути. Прочие ключи не двигаются, потому что их владелец не менялся."

  - id: consistent-hashing-terms-blanks-001
    concept: consistent-hashing
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски о кольце, виртуальных узлах и доле переезда."
    template: |
      В консистентном хешировании узлы и ключи кладут на общее {{ring}}, и ключ принадлежит первому узлу по {{cw}} стрелке.
      Чтобы дуги были ровными, каждый физический узел представляют сотней-другой {{vnodes}} узлов.
      При добавлении узла в такое кольцо переезжает примерно {{share}} всех ключей: ровно та доля, которую новый узел и должен взять.
    blanks:
      ring:
        accept: ["кольцо", "круг"]
      cw:
        accept: ["часовой", "ходу часовой"]
      vnodes:
        accept: ["виртуальных", "virtual", "виртуальных (vnodes)"]
      share:
        accept: ["1/N", "1 / N", "одну N-ю"]
    variants:
      - template: |
          Наивный hash по модулю {{n}} привязывает местоположение ключа к числу узлов, поэтому смена числа узлов перетасовывает {{almost}} все ключи.
          Виртуальные узлы заодно учитывают разную мощность серверов: чем мощнее узел, тем {{more}} виртуальных точек ему выдают.
        blanks:
          n:
            accept: ["N", "n"]
          almost:
            accept: ["почти", "практически"]
          more:
            accept: ["больше", "более"]
      - template: |
          Без виртуальных узлов уход узла сваливает все его ключи на одного {{neighbor}} по часовой стрелке, и тот может лечь следом.
          Отказоустойчивость поверх кольца добавляют, размещая копии ключа на следующих {{r}} узлах по часовой стрелке.
        blanks:
          neighbor:
            accept: ["соседа", "сосед", "соседа по часовой стрелке"]
          r:
            accept: ["R", "r", "нескольких"]

  - id: consistent-hashing-owner-predict-001
    concept: consistent-hashing
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она кладёт три узла на кольцо позиций 0..99 и для каждого ключа находит первый узел по часовой стрелке, затем печатает нагрузку узлов A, B и C."
    snippet: |
      ring = [(10, "A"), (40, "B"), (70, "C")]

      def owner(pos):
          for point, node in ring:
              if pos <= point:
                  return node
          return ring[0][1]

      keys = [5, 25, 45, 60, 80]
      counts = {"A": 0, "B": 0, "C": 0}
      for k in keys:
          counts[owner(k)] += 1

      print(counts["A"], counts["B"], counts["C"])
    expected:
      kind: stdout
      value: "2 1 2"
    hints:
      - "owner идёт по кольцу по возрастанию позиций и отдаёт ключ первому узлу с позицией не меньше позиции ключа. Что делает ключ 80, если все три позиции меньше 80?"
      - "Ключ 80 не находит узла впереди и оборачивается на первый узел кольца (A). Разложите остальные: 5 к A, 25 к B, 45 и 60 к C, и сложите нагрузку каждого узла."
    variants:
      - prompt: "Что выведет программа? Узел B ушёл с кольца, ключи те же. Печатается нагрузка узлов A и C."
        snippet: |
          ring = [(10, "A"), (70, "C")]

          def owner(pos):
              for point, node in ring:
                  if pos <= point:
                      return node
              return ring[0][1]

          keys = [5, 25, 45, 60, 80]
          counts = {"A": 0, "C": 0}
          for k in keys:
              counts[owner(k)] += 1

          print(counts["A"], counts["C"])
        expected:
          kind: stdout
          value: "2 3"
      - prompt: "Что выведет программа? На кольцо добавили узел D в позицию 55. Считается, сколько ключей сменили владельца по сравнению с кольцом без D."
        snippet: |
          def owner(ring, pos):
              for point, node in ring:
                  if pos <= point:
                      return node
              return ring[0][1]

          before = [(10, "A"), (40, "B"), (70, "C")]
          after = [(10, "A"), (40, "B"), (55, "D"), (70, "C")]
          keys = [5, 25, 45, 60, 80]

          moved = sum(1 for k in keys if owner(before, k) != owner(after, k))
          print(moved)
        expected:
          kind: stdout
          value: "1"

  - id: consistent-hashing-vnodes-001
    concept: consistent-hashing
    type: theory-quiz
    difficulty: 3
    prompt: "Три физических узла легли на голое кольцо, и один из них внезапно отказал. Какие две беды это показывает и что их лечит?"
    choices:
      - id: a
        text: "Дуги неравны (перекос нагрузки), а все ключи упавшего узла целиком валятся на одного соседа (риск цепного обвала). Лечат виртуальными узлами: сотни точек на узел выравнивают дуги и рассеивают ключи по многим соседям."
      - id: b
        text: "Кольцо само выровняет нагрузку и распределит ключи, никаких мер не нужно."
      - id: c
        text: "Единственное решение это вернуться к hash по модулю N."
      - id: d
        text: "Обе беды лечит увеличение числа реплик на чтение."
    correct: [a]
    explanation: "На голом кольце с малым числом узлов дуги получаются неравными (перекос), а уход узла сваливает все его ключи на одного соседа по часовой стрелке, который может лечь следом. Виртуальные узлы (сотня-другая точек на физический узел) делают дуги мелкими и ровными и рассеивают ключи ушедшего узла по многим соседям, а не на одного."
    hints:
      - "Что определяет, ровно ли лежит нагрузка, если узлов на кольце всего три? И куда физически уходят ключи, когда узел исчезает, к скольким соседям сразу?"
      - "Обе беды от того, что точек на кольце мало. Что изменится, если каждый физический узел представить не одной точкой, а сотней разбросанных по всему кольцу?"

  - id: consistent-hashing-remap-predict-001
    concept: consistent-hashing
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она сравнивает hash по модулю N с кольцом: считает, сколько из 12 ключей переезжает при добавлении узла (3 в 4) в каждом подходе. Для кольца переезжает только своя доля нового узла."
    snippet: |
      keys = list(range(12))

      moved_modn = sum(1 for k in keys if k % 3 != k % 4)

      moved_ring = round(len(keys) / 4)

      print(moved_modn, moved_ring)
    expected:
      kind: stdout
      value: "9 3"
    hints:
      - "Для hash % N ключ переезжает, когда k % 3 не равно k % 4: сравните два остатка для k от 0 до 11. Для кольца новый узел забирает лишь свою долю, около 1/4 от всех ключей."
      - "Совпадают остатки только у 0, 1 и 2, значит по модулю переехали девять ключей. Кольцо двигает round(12 / 4) = 3, ровно долю четвёртого узла."
    variants:
      - prompt: "Что выведет программа? Тот же расчёт, но переход с 4 узлов на 5 и 20 ключей."
        snippet: |
          keys = list(range(20))

          moved_modn = sum(1 for k in keys if k % 4 != k % 5)

          moved_ring = round(len(keys) / 5)

          print(moved_modn, moved_ring)
        expected:
          kind: stdout
          value: "16 4"
      - prompt: "Что выведет программа? Считается, сколько из 12 ключей ОСТАЛОСЬ на месте при hash % N на переходе 3 в 4."
        snippet: |
          keys = list(range(12))
          stayed = sum(1 for k in keys if k % 3 == k % 4)
          print(stayed)
        expected:
          kind: stdout
          value: "3"
