exercises:
  - id: consistent-hashing-why-modn-001
    concept: consistent-hashing
    type: theory-quiz
    difficulty: 1
    prompt: "Why does the rule hash(key) % N handle changes in the number of nodes so badly?"
    choices:
      - id: a
        text: "A key's location is tied to N itself: change N, and the remainder changes for almost every key, so almost the whole database moves."
      - id: b
        text: "It simply can't distribute keys across nodes."
      - id: c
        text: "It computes the hash slowly."
      - id: d
        text: "It requires N to be a prime number."
    correct: [a]
    explanation: "With hash % N, a node's number depends on N. Change the number of nodes, and the remainder changes for almost every key, so adding a single node forces almost all the data to move. Hash speed has nothing to do with it."
    variants:
      - prompt: "Moving from 3 nodes to 4 under the hash % N rule. Roughly what share of keys stays in place?"
        choices:
          - id: a
            text: "About a quarter: roughly 1/(N+1) of keys stay in place, the rest move."
          - id: b
            text: "All of them: hash % N doesn't move keys when N changes."
          - id: c
            text: "Exactly half, regardless of N."
          - id: d
            text: "None stay, absolutely every key moves."
        correct: [a]
        explanation: "Moving from N to N+1, roughly 1/(N+1) of keys stay in place. For three becoming four, that's about a quarter, while three quarters get uprooted because of one new node."
      - prompt: "What were you actually trying to achieve by adding a fourth node, and what does hash % N do instead?"
        choices:
          - id: a
            text: "You wanted the new node to take its fair share (about a quarter), but hash % N reshuffles nearly everything, including data that had no reason to move."
          - id: b
            text: "You wanted to reshuffle all the data, and hash % N does exactly that, efficiently."
          - id: c
            text: "You wanted to delete old data, and hash % N archives it."
          - id: d
            text: "You wanted to speed up reads, and hash % N only speeds up writes."
        correct: [a]
        explanation: "The task is local: the new node should pick up its share, about 1/N. But the modulo rule recomputes the remainder for every key at once, so almost the whole database moves, not just the needed share."

  - id: consistent-hashing-ring-001
    concept: consistent-hashing
    type: theory-quiz
    difficulty: 2
    prompt: "On the consistent hashing ring, which node owns a key?"
    choices:
      - id: a
        text: "The first node clockwise from the key's position."
      - id: b
        text: "The node with the smallest id, regardless of position."
      - id: c
        text: "A random node, chosen anew on every request."
      - id: d
        text: "All nodes equally, at once."
    correct: [a]
    explanation: "Both keys and nodes are hashed onto one ring. A key belongs to the first node encountered moving clockwise from the key's position. Location determines neighborhood on the ring, not the number of nodes."
    variants:
      - prompt: "What happens to keys when a new node is added to the ring?"
        choices:
          - id: a
            text: "Only keys on the arc between the new node and the previous node counter-clockwise move; the rest don't."
          - id: b
            text: "Every key on the ring moves."
          - id: c
            text: "No key moves at all, the new node stays empty."
          - id: d
            text: "All keys are copied to the new node, and old nodes are cleared."
        correct: [a]
        explanation: "The new node takes its position and picks up keys only from one arc (between itself and the previous node counter-clockwise). Every other key's clockwise neighbor stays the same, so they don't move."
      - prompt: "A node leaves the ring. Who gets its keys?"
        choices:
          - id: a
            text: "The next node clockwise; the rest of the ring's keys aren't touched."
          - id: b
            text: "They're lost for good."
          - id: c
            text: "They're spread evenly, one by one, across the remaining nodes."
          - id: d
            text: "The previous node counter-clockwise."
        correct: [a]
        explanation: "The departed node's keys are picked up by its clockwise neighbor, since that's now the first node on their path. Other keys don't move, because their owner didn't change."

  - id: consistent-hashing-terms-blanks-001
    concept: consistent-hashing
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the blanks about the ring, virtual nodes, and the share that moves."
    template: |
      In consistent hashing, nodes and keys are placed on a shared {{ring}}, and a key belongs to the first node {{cw}}.
      To keep the arcs even, each physical node is represented by a hundred or so {{vnodes}} nodes.
      Adding a node to such a ring moves roughly {{share}} of all keys: exactly the share the new node should take.
    blanks:
      ring:
        accept: ["ring", "circle"]
      cw:
        accept: ["clockwise", "clockwise from it"]
      vnodes:
        accept: ["virtual"]
      share:
        accept: ["1/N", "1 / N", "one Nth"]
    variants:
      - template: |
          A naive hash modulo {{n}} ties a key's location to the number of nodes, so changing that number shuffles {{almost}} every key.
          Virtual nodes also account for different server capacities: the more powerful a node, the {{more}} virtual points it gets.
        blanks:
          n:
            accept: ["N", "n"]
          almost:
            accept: ["almost", "nearly"]
          more:
            accept: ["more"]
      - template: |
          Without virtual nodes, a departing node dumps all its keys onto a single {{neighbor}}, which may then fall over too.
          Fault tolerance is added on top of the ring by placing key copies on the next {{r}} nodes clockwise.
        blanks:
          neighbor:
            accept: ["neighbor", "clockwise neighbor"]
          r:
            accept: ["R", "r", "several"]

  - id: consistent-hashing-owner-predict-001
    concept: consistent-hashing
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It places three nodes on a ring of positions 0..99 and, for each key, finds the first node clockwise, then prints the load on nodes A, B, and C."
    snippet: |
      ring = [(10, "A"), (40, "B"), (70, "C")]

      def owner(pos):
          for point, node in ring:
              if pos <= point:
                  return node
          return ring[0][1]

      keys = [5, 25, 45, 60, 80]
      counts = {"A": 0, "B": 0, "C": 0}
      for k in keys:
          counts[owner(k)] += 1

      print(counts["A"], counts["B"], counts["C"])
    expected:
      kind: stdout
      value: "2 1 2"
    hints:
      - "owner walks the ring in increasing order of position and returns the first node whose position is not less than the key's position. What happens for key 80 if all three positions are less than 80?"
      - "Key 80 finds no node ahead and wraps around to the first node on the ring (A). Work through the rest: 5 goes to A, 25 to B, 45 and 60 to C, then sum each node's load."
    variants:
      - prompt: "What does the program print? Node B has left the ring, the keys are the same. The load on nodes A and C is printed."
        snippet: |
          ring = [(10, "A"), (70, "C")]

          def owner(pos):
              for point, node in ring:
                  if pos <= point:
                      return node
              return ring[0][1]

          keys = [5, 25, 45, 60, 80]
          counts = {"A": 0, "C": 0}
          for k in keys:
              counts[owner(k)] += 1

          print(counts["A"], counts["C"])
        expected:
          kind: stdout
          value: "2 3"
      - prompt: "What does the program print? Node D was added to the ring at position 55. It counts how many keys changed owner compared to the ring without D."
        snippet: |
          def owner(ring, pos):
              for point, node in ring:
                  if pos <= point:
                      return node
              return ring[0][1]

          before = [(10, "A"), (40, "B"), (70, "C")]
          after = [(10, "A"), (40, "B"), (55, "D"), (70, "C")]
          keys = [5, 25, 45, 60, 80]

          moved = sum(1 for k in keys if owner(before, k) != owner(after, k))
          print(moved)
        expected:
          kind: stdout
          value: "1"

  - id: consistent-hashing-vnodes-001
    concept: consistent-hashing
    type: theory-quiz
    difficulty: 3
    prompt: "Three physical nodes were placed on a bare ring, and one of them suddenly failed. What two problems does this reveal, and what fixes them?"
    choices:
      - id: a
        text: "Uneven arcs (skewed load), and all of the failed node's keys landing entirely on one neighbor (risk of a cascading failure). Both are fixed by virtual nodes: hundreds of points per node even out the arcs and scatter the keys across many neighbors."
      - id: b
        text: "The ring will balance the load and distribute the keys on its own, no action needed."
      - id: c
        text: "The only fix is going back to hash modulo N."
      - id: d
        text: "Both problems are fixed by adding more read replicas."
    correct: [a]
    explanation: "On a bare ring with few nodes, the arcs come out uneven (skew), and a node leaving dumps all its keys onto a single clockwise neighbor, which might then fall over too. Virtual nodes (a hundred or so points per physical node) make the arcs small and even, and scatter a departed node's keys across many neighbors instead of just one."
    hints:
      - "What determines how evenly the load sits when there are only three nodes on the ring? And where do keys physically go when a node disappears, to how many neighbors at once?"
      - "Both problems stem from too few points on the ring. What changes if each physical node is represented not by one point but by a hundred scattered across the whole ring?"

  - id: consistent-hashing-remap-predict-001
    concept: consistent-hashing
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It compares hash modulo N against a ring: it counts how many of 12 keys move when a node is added (3 to 4) under each approach. For the ring, only the new node's own share moves."
    snippet: |
      keys = list(range(12))

      moved_modn = sum(1 for k in keys if k % 3 != k % 4)

      moved_ring = round(len(keys) / 4)

      print(moved_modn, moved_ring)
    expected:
      kind: stdout
      value: "9 3"
    hints:
      - "For hash % N, a key moves when k % 3 is not equal to k % 4: compare the two remainders for k from 0 to 11. For the ring, the new node only takes its own share, about 1/4 of all keys."
      - "The remainders match only for 0, 1, and 2, so nine keys moved under modulo. The ring moves round(12 / 4) = 3, exactly the fourth node's share."
    variants:
      - prompt: "What does the program print? Same calculation, but moving from 4 to 5 nodes with 20 keys."
        snippet: |
          keys = list(range(20))

          moved_modn = sum(1 for k in keys if k % 4 != k % 5)

          moved_ring = round(len(keys) / 5)

          print(moved_modn, moved_ring)
        expected:
          kind: stdout
          value: "16 4"
      - prompt: "What does the program print? It counts how many of 12 keys STAYED in place under hash % N when moving from 3 to 4."
        snippet: |
          keys = list(range(12))
          stayed = sum(1 for k in keys if k % 3 == k % 4)
          print(stayed)
        expected:
          kind: stdout
          value: "3"
