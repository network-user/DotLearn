exercises:
  - id: sharding-what-001
    concept: sharding
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает шардирование?"
    choices:
      - id: a
        text: "Раскладывает разные данные по разным узлам, где каждый шард сам хозяин своей записи."
      - id: b
        text: "Держит одинаковые копии данных на многих узлах сразу, без промежуточного состояния."
      - id: c
        text: "Режет таблицу на куски внутри одного узла сразу, без промежуточного состояния."
      - id: d
        text: "Кеширует горячие запросы в памяти сразу, без промежуточного состояния."
    correct: [a]
    explanation: "Шардирование делит данные между узлами так, что каждый шард владеет своей частью и сам принимает по ней запись. Копии на многих узлах это репликация, куски внутри узла это партиционирование."
    variants:
      - prompt: "Что шардирование умеет, чего не умеют read-реплики?"
        choices:
          - id: a
            text: "Масштабировать запись и объём за пределы одного узла, разделив данные между хозяевами."
          - id: b
            text: "Ускорять только чтение сразу, без промежуточного состояния и без дополнительных проверок."
          - id: c
            text: "Уменьшать лаг репликации не входит в сравнение и не влияет на результат."
          - id: d
            text: "Делать резервные копии сразу, без промежуточного состояния и без дополнительных проверок."
        correct: [a]
        explanation: "Реплики повторяют весь поток записи лидера и потому запись не масштабируют. Шардирование даёт каждому куску данных своего хозяина записи, и только так запись и объём растут за пределы одного узла."
      - prompt: "Отменяет ли шардирование репликацию и партиционирование?"
        choices:
          - id: a
            text: "Нет: каждый шард обычно сам реплицируется и партиционируется, шардирование надстраивается над ними."
          - id: b
            text: "Да, шард заменяет реплики и партиции сразу, без промежуточного состояния и без дополнительных проверок."
          - id: c
            text: "Да, после шардирования реплики запрещены ещё до любых других проверок на этом пути."
          - id: d
            text: "Да, партиции превращаются в шарды автоматически сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Слои складываются: боевой шард это независимая база, у которой внутри свои партиции и рядом свои реплики. Шардирование не отменяет прошлые приёмы, а стоит поверх них."

  - id: sharding-hash-vs-range-001
    concept: sharding
    type: theory-quiz
    difficulty: 2
    prompt: "Чем хеш-шардинг отличается от range-шардинга по последствиям?"
    choices:
      - id: a
        text: "Хеш раскидывает ключи ровно, но убивает диапазонные запросы."
      - id: b
        text: "Хеш всегда быстрее range во всём сразу, без промежуточного состояния."
      - id: c
        text: "Range раскидывает ключи ровнее, чем хеш сразу, без промежуточного состояния."
      - id: d
        text: "Разницы в последствиях между ними нет сразу, без промежуточного состояния."
    correct: [a]
    explanation: "Хеш специально разносит соседние ключи ради ровной нагрузки, поэтому диапазонный запрос идёт по всем шардам. Range держит соседние ключи рядом (диапазоны работают), но монотонный ключ создаёт горячий последний диапазон."
    variants:
      - prompt: "Почему по хеш-шарду нельзя эффективно выполнить «заказы за сегодня»?"
        choices:
          - id: a
            text: "Соседние по времени ключи специально раскиданы по разным шардам, поэтому диапазон превращается в опрос всех шардов."
          - id: b
            text: "Хеш-шард вообще не хранит даты сразу, без промежуточного состояния и без дополнительных проверок."
          - id: c
            text: "Запросы с датами в хеш-шардинге запрещены сразу, без промежуточного состояния и без дополнительных проверок."
          - id: d
            text: "Даты в хеше округляются до месяца сразу, без промежуточного состояния и без дополнительных проверок."
        correct: [a]
        explanation: "Хеширование намеренно разносит близкие значения по разным шардам ради равномерности. Из-за этого непрерывный диапазон «за сегодня» рассыпан по всем шардам, и запрос вынужден опросить каждый."
      - prompt: "Когда range-шардинг даёт горячий шард?"
        choices:
          - id: a
            text: "Когда ключ монотонно растёт (время, автоинкремент): весь свежий трафик льётся в последний диапазон, а прочие шарды простаивают."
          - id: b
            text: "Когда ключ распределён равномерно сразу, без промежуточного состояния и без дополнительных проверок."
          - id: c
            text: "Когда шардов слишком много сразу, без промежуточного состояния и без дополнительных проверок."
          - id: d
            text: "Range-шардинг никогда не даёт горячих шардов сразу, без промежуточного состояния и без дополнительных проверок."
        correct: [a]
        explanation: "При range соседние ключи лежат вместе. Если ключ монотонный, все новые записи попадают в один последний диапазон, и его шард раскаляется, пока остальные бездействуют."

  - id: sharding-key-blanks-001
    concept: sharding
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски о ключе шардирования, горячих ключах и cross-shard операциях."
    template: |
      Хороший ключ шардирования {{card}}, ложится на шарды равномерно и присутствует в большинстве запросов.
      Один клиент-гигант раскаляет свой шард даже при идеальном хеше: это горячий {{hot}}.
      Запрос, которому нужны данные с многих шардов, выполняется как {{sg}} и потому медленный.
      Наивный hash по модулю N при смене числа шардов перевозит {{almost}} все данные.
    blanks:
      card:
        accept: ["высококардинальный", "высококардинален", "высокой кардинальности"]
      hot:
        accept: ["ключ", "key"]
      sg:
        accept: ["scatter-gather", "scatter gather", "скаттер-газер"]
      almost:
        accept: ["почти", "практически"]
    variants:
      - template: |
          Маршрутизация в {{app}} проста и без лишнего сетевого хопа, но логику приходится катить во все клиенты.
          Маршрутизация через {{proxy}} прячет топологию от клиентов ценой лишнего хопа.
        blanks:
          app:
            accept: ["приложении", "приложение", "клиенте"]
          proxy:
            accept: ["прокси", "proxy"]
      - template: |
          Чтобы транзакция не растягивалась на несколько узлов, связанные данные держат под {{one}} ключом на {{shard}} шарде.
        blanks:
          one:
            accept: ["одним", "общим"]
          shard:
            accept: ["одном", "том же"]

  - id: sharding-routing-predict-001
    concept: sharding
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она раскидывает события пользователей по трём шардам через user_id % 3 и печатает нагрузку шардов 0, 1 и 2."
    snippet: |
      def shard(user_id, n):
          return user_id % n

      events = [10, 21, 4, 33, 10, 7, 21, 21]
      counts = {0: 0, 1: 0, 2: 0}
      for uid in events:
          counts[shard(uid, 3)] += 1

      print(counts[0], counts[1], counts[2])
    expected:
      kind: stdout
      value: "4 4 0"
    hints:
      - "Посчитайте shard = user_id % 3 для каждого события и раскидайте по трём корзинам. Обратите внимание, что user 21 встречается трижды: куда летят все его события?"
      - "На шард 0 попадают 21, 33, 21, 21 (четыре), на шард 1 попадают 10, 4, 10, 7 (четыре), на шард 2 не попадает ничего. Горячий ключ 21 перекосил нагрузку."
    variants:
      - prompt: "Что выведет программа? Теперь шардов четыре (user_id % 4), печатается нагрузка шарда 1."
        snippet: |
          def shard(user_id, n):
              return user_id % n

          events = [10, 21, 4, 33, 10, 7, 21, 21]
          counts = {0: 0, 1: 0, 2: 0, 3: 0}
          for uid in events:
              counts[shard(uid, 4)] += 1

          print(counts[1])
        expected:
          kind: stdout
          value: "4"
      - prompt: "Что выведет программа? Агрегат по всем пользователям обязан опросить каждый шард. Сколько их?"
        snippet: |
          n = 3
          print(n)
        expected:
          kind: stdout
          value: "3"

  - id: sharding-cross-shard-txn-001
    concept: sharding
    type: theory-quiz
    difficulty: 4
    prompt: "База шардирована по user_id. Появился отчёт «топ-10 самых активных пользователей за месяц по всей системе». Почему он дорогой и как обычно поступают?"
    choices:
      - id: a
        text: "Это cross-shard агрегат: приходится scatter-gather по всем шардам и сливать результат."
      - id: b
        text: "Он дешёвый: роутер сразу знает, на каком шарде лежит готовый топ-10."
      - id: c
        text: "На каждый такой запрос заводят распределённую транзакцию с two-phase commit."
      - id: d
        text: "Базу надо срочно перешардировать по времени вместо user_id."
    correct: [a]
    explanation: "Отчёт по всей системе не привязан к одному user_id, поэтому роутер не может попасть в один шард: нужен опрос всех шардов и слияние (scatter-gather), а это медленно. Распределённая транзакция тут ни при чём (данные только читаются), а перешардирование ломает быстрые пользовательские запросы ради редкого отчёта. Правильный ход это делать такую аналитику редко или в отдельном OLAP-хранилище."
    hints:
      - "Привязан ли отчёт к одному значению ключа шардирования? Если нет, на сколько шардов придётся сходить роутеру?"
      - "Отделите частые операции (в пределах одного user_id) от редкой общесистемной аналитики. Где дешевле держать вторую, чтобы не мешать первой?"

  - id: sharding-resharding-predict-001
    concept: sharding
    type: predict-output
    difficulty: 4
    prompt: "Что выведет программа? Она считает, сколько ключей меняют шард при переходе с 3 на 4 шарда по правилу hash по модулю N."
    snippet: |
      def shard(key, n):
          return key % n

      keys = list(range(12))
      before = {k: shard(k, 3) for k in keys}
      after = {k: shard(k, 4) for k in keys}

      moved = sum(1 for k in keys if before[k] != after[k])
      print(moved)
    expected:
      kind: stdout
      value: "9"
    hints:
      - "Ключ переезжает, если key % 3 не равно key % 4. Пройдите k от 0 до 11 и сравните два остатка."
      - "Совпадают остатки только у 0, 1 и 2. Значит на месте остались три ключа, а переехали остальные девять из двенадцати (75%)."
      - "Отсюда и вырастает следующий раздел: hash по модулю N при смене числа узлов перетасовывает почти всё, а консистентное хеширование двигает лишь малую долю."
    variants:
      - prompt: "Что выведет программа? Переход с 4 на 5 шардов, 20 ключей."
        snippet: |
          def shard(key, n):
              return key % n

          keys = list(range(20))
          before = {k: shard(k, 4) for k in keys}
          after = {k: shard(k, 5) for k in keys}

          moved = sum(1 for k in keys if before[k] != after[k])
          print(moved)
        expected:
          kind: stdout
          value: "16"
      - prompt: "Что выведет программа? Теперь считаем, сколько ключей ОСТАЛОСЬ на месте при переходе с 3 на 4 шарда, 12 ключей."
        snippet: |
          keys = list(range(12))
          stayed = sum(1 for k in keys if k % 3 == k % 4)
          print(stayed)
        expected:
          kind: stdout
          value: "3"
