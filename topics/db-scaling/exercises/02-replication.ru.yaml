exercises:
  - id: replication-leader-role-001
    concept: replication
    type: theory-quiz
    difficulty: 1
    prompt: "Что в схеме «лидер и реплики» умеет делать только лидер?"
    choices:
      - id: a
        text: "Принимать запись."
      - id: b
        text: "Обслуживать чтение."
      - id: c
        text: "Хранить данные на диске."
      - id: d
        text: "Отвечать на сетевые запросы."
    correct: [a]
    explanation: "Запись принимает только лидер: он сериализует изменения и кладёт их в поток изменений. Читать при этом можно и с реплик. Хранение и сеть есть у всех узлов."
    variants:
      - prompt: "Откуда реплика берёт изменения?"
        choices:
          - id: a
            text: "Из потока изменений лидера (WAL, бинлог), применяя его в том же порядке."
          - id: b
            text: "Сама генерирует их из пользовательских запросов на чтение сразу, без промежуточного состояния."
          - id: c
            text: "Копирует весь файл базы целиком при каждом запросе сразу, без промежуточного состояния."
          - id: d
            text: "Придумывает их случайно сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Реплика читает поток изменений лидера и применяет ровно те изменения, что случились на лидере, приходя в то же состояние. Читать с реплики можно, но менять данные она сама не вправе."
      - prompt: "Можно ли читать с реплики?"
        choices:
          - id: a
            text: "Да, чтение раздают на реплики; писать при этом можно только на лидера."
          - id: b
            text: "Нет, реплика существует только как холодный бэкап сразу, без промежуточного состояния."
          - id: c
            text: "Только если отключить лидера сразу, без промежуточного состояния."
          - id: d
            text: "Только запись, но не чтение сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Смысл реплик как раз в том, чтобы раздать на них чтение и снять его с лидера. Запись остаётся на лидере, потому что у каждого куска данных нужен один хозяин."

  - id: replication-async-tradeoff-001
    concept: replication
    type: theory-quiz
    difficulty: 2
    prompt: "Чем жертвует асинхронная репликация ради скорости?"
    choices:
      - id: a
        text: "Возможной потерей недоехавших изменений, если лидер умрёт до их репликации."
      - id: b
        text: "Ничем: это лучший режим во всех случаях сразу, без промежуточного состояния."
      - id: c
        text: "Скоростью чтения с реплик сразу, без промежуточного состояния."
      - id: d
        text: "Возможностью держать больше одной реплики сразу, без промежуточного состояния."
    correct: [a]
    explanation: "Асинхронный лидер подтверждает запись клиенту сразу, не дожидаясь реплик. Если он умрёт, пока часть изменений ещё в пути, эти изменения потеряны: клиенту сказали «сохранено», а данных нет."
    variants:
      - prompt: "Чем платят за синхронную репликацию?"
        choices:
          - id: a
            text: "Скоростью: запись идёт со скоростью самой медленной реплики, а зависшая синхронная реплика блокирует запись целиком."
          - id: b
            text: "Надёжностью: синхронная репликация теряет данные чаще асинхронной сразу, без промежуточного состояния."
          - id: c
            text: "Возможностью читать с реплик сразу, без промежуточного состояния и без дополнительных проверок."
          - id: d
            text: "Ничем, у неё нет недостатков сразу, без промежуточного состояния и без дополнительных проверок."
        correct: [a]
        explanation: "Синхронная репликация ждёт ack реплики перед ответом клиенту, поэтому потери нет, но запись замедляется до самой медленной реплики, а зависшая синхронная реплика останавливает запись вовсе."
      - prompt: "Что даёт полусинхронная репликация?"
        choices:
          - id: a
            text: "Гарантию, что подтверждённое изменение есть хотя бы на двух узлах, без остановки записи из-за одной медленной реплики."
          - id: b
            text: "Полное отсутствие лага на всех репликах сразу, без промежуточного состояния и без дополнительных проверок."
          - id: c
            text: "Запись на нескольких лидерах сразу сразу, без промежуточного состояния и без дополнительных проверок."
          - id: d
            text: "Чтение строго с лидера сразу, без промежуточного состояния и без дополнительных проверок."
        correct: [a]
        explanation: "Полусинхронная репликация ждёт подтверждения хотя бы от одной реплики, а остальные догоняют асинхронно. Так подтверждённое изменение живёт минимум на двух узлах, но одна медленная реплика не блокирует запись."

  - id: replication-lag-blanks-001
    concept: replication
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски об эффектах лага репликации."
    template: |
      Пользователь не видит только что оставленный комментарий, прочитав его с отставшей реплики. Это эффект {{ryw}}, и лечится чтением свежего с {{leader}}.
      Когда второй запрос попадает на реплику с бо́льшим лагом и данные будто откатываются, это эффект {{mono}}.
      При {{async}} репликации падение лидера теряет ещё не доехавшие изменения.
    blanks:
      ryw:
        accept: ["read-your-writes", "read your writes", "чтения своих записей"]
      leader:
        accept: ["лидера", "лидер", "основного узла"]
      mono:
        accept: ["monotonic reads", "monotonic-reads", "немонотонного чтения"]
      async:
        accept: ["асинхронной", "async", "асинхронной репликации"]
    variants:
      - template: |
          Чтобы вернувшийся старый лидер не устроил {{split}}, нового лидера избирают {{quorum}}, а старому запрещают писать через {{fence}}.
        blanks:
          split:
            accept: ["split-brain", "split brain", "раскол", "двух лидеров"]
          quorum:
            accept: ["кворумом", "большинством", "кворум"]
          fence:
            accept: ["fencing", "фенсинг", "изоляцию"]
      - template: |
          Синхронная репликация не теряет данные, но запись идёт со скоростью самой {{slow}} реплики.
          Полусинхронная ждёт подтверждения хотя бы от {{one}} реплики.
        blanks:
          slow:
            accept: ["медленной", "медленной реплики"]
          one:
            accept: ["одной", "одной реплики", "1"]

  - id: replication-lag-predict-001
    concept: replication
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она моделирует отставание реплики: лидер применяет запись сразу, реплика проигрывает поток изменений с задержкой."
    snippet: |
      leader = {}
      replica = {}
      log = []

      def write(key, value):
          leader[key] = value
          log.append((key, value))

      def replicate(n):
          for _ in range(n):
              if log:
                  key, value = log.pop(0)
                  replica[key] = value

      write("balance", 100)
      write("balance", 150)
      replicate(1)

      print(leader["balance"], replica["balance"])
    expected:
      kind: stdout
      value: "150 100"
    hints:
      - "Лидер меняется на каждой записи сразу. Реплика догоняет только на столько шагов, сколько ей дали в replicate. Сколько изменений в очереди и сколько из них проиграно?"
      - "В логе две записи в порядке 100, потом 150. replicate(1) применяет только первую (100), поэтому реплика показывает 100, а лидер уже 150."
    variants:
      - snippet: |
          leader = {}
          replica = {}
          log = []

          def write(key, value):
              leader[key] = value
              log.append((key, value))

          def replicate(n):
              for _ in range(n):
                  if log:
                      key, value = log.pop(0)
                      replica[key] = value

          write("x", 100)
          write("x", 150)
          write("x", 175)
          replicate(2)

          print(leader["x"], replica["x"])
        expected:
          kind: stdout
          value: "175 150"
      - snippet: |
          log = []

          def write(key, value):
              log.append((key, value))

          def replicate(n):
              for _ in range(n):
                  if log:
                      log.pop(0)

          write("a", 1)
          write("b", 2)
          write("c", 3)
          write("d", 4)
          replicate(1)

          print(len(log))
        expected:
          kind: stdout
          value: "3"

  - id: replication-split-brain-001
    concept: replication
    type: theory-quiz
    difficulty: 3
    prompt: "Лидер на минуту пропал из сети, система повысила реплику до лидера, затем старый лидер вернулся и снова начал принимать запись. Что произошло и что это предотвращает?"
    choices:
      - id: a
        text: "Split-brain: два узла принимают запись и данные расходятся."
      - id: b
        text: "Ничего страшного: два лидера просто удвоили пропускную способность записи."
      - id: c
        text: "Новая реплика автоматически откатит изменения к версии старого лидера."
      - id: d
        text: "Данные сольются сами собой по времени последнего изменения без потерь."
    correct: [a]
    explanation: "Это классический split-brain: старый лидер не умер, а лишь потерял сеть, и после возврата считает себя главным. Пока оба принимают запись, данные расходятся, а слить их обратно это ручная боль. Защита это выбор нового лидера большинством (кворум) и запрет записи вернувшемуся старому (fencing)."
    hints:
      - "Сколько узлов сейчас считают себя вправе принимать запись? Что происходит с одним и тем же ключом, если его меняют на обоих независимо?"
      - "Проблема не в скорости, а в том, что двух хозяев записи некому согласовать. Что должно решать, кто настоящий лидер, и что делать со старым, когда он вернулся?"
