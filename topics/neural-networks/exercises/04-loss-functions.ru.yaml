exercises:
  - id: loss-which-for-regression-001
    concept: loss-functions
    type: theory-quiz
    difficulty: 1
    prompt: "Сеть предсказывает цену квартиры (любое число). Какую функцию потерь брать?"
    choices:
      - id: a
        text: "Кросс-энтропию - типичную loss для классификации, не регрессии."
      - id: b
        text: "MSE (средний квадрат ошибки)."
      - id: c
        text: "softmax - активация, дающая распределение, а не функция потерь."
      - id: d
        text: "ReLU - нелинейная активация, а не loss для обучения."
    correct: [b]
    explanation: "Предсказание числа - это регрессия, и естественная мера ошибки - насколько предсказание далеко от истины. MSE усредняет квадраты разностей. Кросс-энтропия нужна для классификации, а softmax и ReLU - активации, а не потери."
    variants:
      - prompt: "Чему равна потеря, если предсказание точно совпало с истинным значением?"
        choices:
          - id: a
            text: "Нулю."
          - id: b
            text: "Единице."
          - id: c
            text: "Бесконечности."
          - id: d
            text: "Зависит от числа примеров."
        correct: [a]
        explanation: "Функция потерь измеряет расхождение между предсказанием и истиной. Идеальное попадание даёт расхождение ноль - и у MSE, и у кросс-энтропии (-log(1) = 0)."
      - prompt: "Зачем в MSE разность возводят в квадрат?"
        choices:
          - id: a
            text: "Чтобы убрать знак."
          - id: b
            text: "чтобы потеря всегда была целым числом"
          - id: c
            text: "Чтобы ускорить вычисление"
          - id: d
            text: "чтобы потеря попадала в диапазон 0.1"
        correct: [a]
        explanation: "Квадрат делает промах вверх и вниз одинаково плохими (убирает знак) и непропорционально штрафует большие ошибки: промах на 10 даёт вклад 100, на 1 - всего 1. Поэтому MSE чувствительна к выбросам."

  - id: loss-mse-001
    concept: loss-functions
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `mse(predictions, targets)`: верните среднее квадратов разностей соответствующих элементов (mean squared error)."
    starter: |
      def mse(predictions, targets):
          ...
    cases:
      - call: "mse([2.0, 3.0], [2.0, 5.0])"
        expect: 2.0
      - call: "mse([1, 2, 3], [1, 2, 3])"
        expect: 0.0
      - call: "mse([0, 0], [1, 3])"
        expect: 5.0
    solution: |
      def mse(predictions, targets):
          total = 0.0
          for p, t in zip(predictions, targets):
              total += (p - t) ** 2
          return total / len(predictions)
    hints:
      - "MSE - это среднее, а не сумма: посчитайте квадрат разности для каждой пары, а в конце поделите на количество пар."
      - "Идите по парам (предсказание, цель) через zip, накапливайте (p - t) в квадрате, затем разделите на len(predictions)."
    variants:
      - cases:
          - call: "mse([5.0], [2.0])"
            expect: 9.0
          - call: "mse([1, 1], [3, 3])"
            expect: 4.0
          - call: "mse([2, 4], [0, 0])"
            expect: 10.0
        solution: |
          def mse(predictions, targets):
              total = 0.0
              for p, t in zip(predictions, targets):
                  total += (p - t) ** 2
              return total / len(predictions)
      - cases:
          - call: "mse([10.0, 10.0], [10.0, 8.0])"
            expect: 2.0
          - call: "mse([0.0], [0.0])"
            expect: 0.0
          - call: "mse([1, 2], [4, 6])"
            expect: 12.5
        solution: |
          def mse(predictions, targets):
              total = 0.0
              for p, t in zip(predictions, targets):
                  total += (p - t) ** 2
              return total / len(predictions)

  - id: loss-ce-predict-001
    concept: loss-functions
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа?"
    snippet: |
      preds = [4.0, 4.0]
      targets = [1.0, 4.0]

      total = 0.0
      for p, t in zip(preds, targets):
          total += (p - t) ** 2
      print(total / len(preds))
    expected:
      kind: stdout
      value: "4.5"
    hints:
      - "Это MSE: квадрат разности для каждой пары, потом среднее. Какая пара промахнулась и на сколько?"
      - "Первая пара: разность 3, квадрат 9. Вторая пара точна: квадрат 0. Среднее от 9 и 0 равно 4.5."

  - id: loss-cross-entropy-001
    concept: loss-functions
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `cross_entropy(prob_true_class)`: верните `-log(p)`, где `p` - вероятность правильного класса. Модуль `math` уже импортирован как `math`."
    starter: |
      import math

      def cross_entropy(prob_true_class):
          ...
    cases:
      - call: "cross_entropy(1.0)"
        expect_approx: 0.0
      - call: "cross_entropy(0.5)"
        expect_approx: 0.6931472
      - call: "cross_entropy(0.1)"
        expect_approx: 2.3025851
    solution: |
      import math

      def cross_entropy(prob_true_class):
          return -math.log(prob_true_class)
    hints:
      - "Кросс-энтропия штрафует за неуверенность в правильном классе: уверенное попадание (p близко к 1) даёт почти ноль, уверенная ошибка (p близко к 0) - большую потерю."
      - "Возьмите натуральный логарифм вероятности и поставьте перед ним минус. Проверка: при p = 1 потеря равна log(1) = 0."
      - "Логарифм - это math.log; знак минус обязателен, иначе потеря для p < 1 окажется отрицательной."

  - id: loss-ce-vs-mse-001
    concept: loss-functions
    type: theory-quiz
    difficulty: 3
    prompt: "Почему для классификации с softmax на выходе берут кросс-энтропию, а не MSE?"
    choices:
      - id: a
        text: "MSE невозможно посчитать для вероятностей."
      - id: b
        text: "Кросс-энтропия резко штрафует уверенную ошибку."
      - id: c
        text: "MSE всегда возвращает бесконечность для вероятностей."
      - id: d
        text: "Кросс-энтропия не требует правильных ответов для обучения."
    correct: [b]
    explanation: "Кросс-энтропия = -log(p правильного класса): при уверенной ошибке (p близко к 0) потеря и градиент велики, обучение идёт быстро. MSE по вероятностям штрафует уверенные ошибки слабо и даёт «плоский» градиент, поэтому классификатор учится медленнее. Посчитать MSE технически можно, но это не лучший выбор."
    hints:
      - "Сравните, как две меры наказывают уверенную ошибку (правильному классу присвоена вероятность близко к нулю): у какой потеря и сигнал обучения резче?"
      - "Вспомните форму -log(p) у нуля - она уходит круто вверх; подумайте, как это влияет на скорость обучения по сравнению с квадратом разности."
