exercises:
  - id: gd-step-direction-001
    concept: backprop-gradient-descent
    type: theory-quiz
    difficulty: 1
    prompt: "Which direction does gradient descent move a weight?"
    choices:
      - id: a
        text: "Along the gradient (toward increasing loss)."
      - id: b
        text: "Against the gradient (toward decreasing loss)."
      - id: c
        text: "In a random direction each step."
      - id: d
        text: "Always toward increasing the weight."
    correct: [b]
    explanation: "Gradient points toward steepest increase in loss. To decrease loss, move weights the opposite way: w = w - learning_rate * gradient. The minus means against the gradient."
    variants:
      - prompt: "What does learning rate control?"
        choices:
          - id: a
            text: "Step length: the multiplier in front of the gradient when updating a weight."
          - id: b
            text: "The number of layers in the network - mixing the forward pass with the weight-update step"
          - id: c
            text: "The minimum loss value - mixing the forward pass with the weight-update step"
          - id: d
            text: "The number of examples in the dataset - ignoring cost under a bad hash distribution"
        correct: [a]
        explanation: "learning rate is the multiplier before the gradient in w = w - lr * gradient. Too small makes descent slow; too large makes steps overshoot the minimum."
      - prompt: "What does the loss gradient with respect to a weight show?"
        choices:
          - id: a
            text: "The weight's current value."
          - id: b
            text: "The direction in which loss increases fastest."
          - id: c
            text: "The layer number where the weight lives."
          - id: d
            text: "The probability of the correct class."
        correct: [b]
        explanation: "Gradient is the slope of the loss landscape at current weights: it points toward fastest increase in loss. Descent steps against it to reduce loss."

  - id: gd-step-001
    concept: backprop-gradient-descent
    type: python-function
    difficulty: 2
    prompt: "Implement one gradient descent step `step(w, learning_rate, gradient)`: return the updated weight using `w - learning_rate * gradient`."
    starter: |
      def step(w, learning_rate, gradient):
          ...
    cases:
      - call: "step(0.5, 0.1, 2.0)"
        expect_approx: 0.3
      - call: "step(1.0, 0.5, 2.0)"
        expect_approx: 0.0
      - call: "step(0.0, 0.1, -3.0)"
        expect_approx: 0.3
    solution: |
      def step(w, learning_rate, gradient):
          return w - learning_rate * gradient
    hints:
      - "The step always goes against the gradient: positive gradient pulls weight down, negative pulls up. What sign goes before the product?"
      - "Multiply learning_rate by gradient and subtract from the current weight. Check: negative gradient should increase the weight."
    variants:
      - cases:
          - call: "step(2.0, 0.5, 4.0)"
            expect_approx: 0.0
          - call: "step(10.0, 0.1, 10.0)"
            expect_approx: 9.0
          - call: "step(1.0, 0.25, 4.0)"
            expect_approx: 0.0
        solution: |
          def step(w, learning_rate, gradient):
              return w - learning_rate * gradient
      - cases:
          - call: "step(5.0, 1.0, 2.0)"
            expect_approx: 3.0
          - call: "step(0.0, 0.5, 2.0)"
            expect_approx: -1.0
          - call: "step(3.0, 0.1, 10.0)"
            expect_approx: 2.0
        solution: |
          def step(w, learning_rate, gradient):
              return w - learning_rate * gradient

  - id: gd-loop-predict-001
    concept: backprop-gradient-descent
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? Here loss equals w**2, so the gradient equals 2*w."
    snippet: |
      w = 0.5
      for _ in range(2):
          gradient = 2 * w
          w = w - 0.1 * gradient
          print(round(w, 4))
    expected:
      kind: stdout
      value: |-
        0.4
        0.32
    hints:
      - "Each step computes gradient from the current weight, then shifts weight against it. Weight and gradient are recomputed every iteration."
      - "First step: gradient 2*0.5=1.0, weight 0.5-0.1*1.0=0.4. Second step uses gradient from 0.4."
    variants:
      - snippet: |
          w = 1.0
          for _ in range(2):
              gradient = 2 * w
              w = w - 0.1 * gradient
              print(round(w, 4))
        expected:
          kind: stdout
          value: |-
            0.8
            0.64
      - snippet: |
          w = 2.0
          for _ in range(2):
              gradient = 2 * w
              w = w - 0.25 * gradient
              print(round(w, 4))
        expected:
          kind: stdout
          value: |-
            1.0
            0.5

  - id: gd-numeric-gradient-001
    concept: backprop-gradient-descent
    type: python-function
    difficulty: 3
    prompt: "Implement `numeric_gradient(f, x, h=1e-5)`: estimate the derivative of `f` at `x` with central difference `(f(x + h) - f(x - h)) / (2 * h)`."
    starter: |
      def numeric_gradient(f, x, h=1e-5):
          ...
    cases:
      - call: "numeric_gradient(lambda x: x ** 2, 3.0)"
        expect_approx: 6.0
      - call: "numeric_gradient(lambda x: x ** 3, 2.0)"
        expect_approx: 12.0
      - call: "numeric_gradient(lambda x: 2 * x, 5.0)"
        expect_approx: 2.0
    solution: |
      def numeric_gradient(f, x, h=1e-5):
          return (f(x + h) - f(x - h)) / (2 * h)
    hints:
      - "Gradient is sensitivity of output to input: how much f changes if you nudge x slightly. Here compare f just right and just left of the point."
      - "Evaluate f at x + h and x - h, take their difference, divide by 2 * h. That is central difference."
      - "For f(x) = x**2 at 3 the answer should be near 6: the known derivative 2x."

  - id: gd-backprop-role-001
    concept: backprop-gradient-descent
    type: theory-quiz
    difficulty: 4
    prompt: "A team trains a network; loss rises each step instead of falling and becomes NaN after a few steps. What is the most likely cause, and what is backprop's role in training?"
    choices:
      - id: a
        text: "Learning rate too large: steps overshoot the minimum and diverge. Backprop only computes gradients."
      - id: b
        text: "Backprop updates weights the wrong way and must be replaced with another training algorithm."
      - id: c
        text: "The network found the global minimum, so loss increased."
      - id: d
        text: "Forward pass trains weights too aggressively; activations should be disabled."
    correct: [a]
    explanation: "Loss rising to NaN is a classic sign of learning rate too large: each step overshoots further and descent diverges. Backprop applies the chain rule to compute all weight gradients in one backward pass; gradient descent takes steps along those gradients. Forward pass does not train at all."
    hints:
      - "Separate two roles: what computes descent direction, and what takes the step. Recall how step size affects convergence."
      - "When loss explodes instead of falling, the issue is usually step length, not how gradients are computed."
