exercises:
  - id: forward-matrix-shape-001
    concept: forward-pass
    type: theory-quiz
    difficulty: 1
    prompt: "A layer receives a vector of 3 numbers and has 4 neurons. What is the shape of weight matrix W in z = W @ x + b?"
    choices:
      - id: a
        text: "3 x 4"
      - id: b
        text: "4 x 3"
      - id: c
        text: "4 x 4"
      - id: d
        text: "3 x 3"
    correct: [b]
    explanation: "Matrix W has one row per neuron and each row length equals input length. 4 neurons and input length 3 give shape 4 x 3, producing 4 output numbers."
    variants:
      - prompt: "A layer input is a vector of 5 numbers and the layer has 2 neurons. What is the output length?"
        choices:
          - id: a
            text: "5"
          - id: b
            text: "2"
          - id: c
            text: "10"
          - id: d
            text: "7"
        correct: [b]
        explanation: "Output length is set by the number of neurons in the layer. Two neurons give two numbers on output, regardless of input length."
      - prompt: "What becomes the input of the second layer in an MLP?"
        choices:
          - id: a
            text: "The network's original input unchanged."
          - id: b
            text: "The first layer's output after activation."
          - id: c
            text: "The mean of all weights in the first layer."
          - id: d
            text: "The first layer's bias vector."
        correct: [b]
        explanation: "In forward pass one layer's output (after activation) becomes the next layer's input. Signal chains from network input to output layer."

  - id: forward-layer-001
    concept: forward-pass
    type: python-function
    difficulty: 2
    prompt: "Implement `layer(x, weights, biases)`: for each neuron compute the dot product of `x` with its weights plus bias and return the list of those sums (vector z, no activation). `weights` is a list of weight vectors, `biases` a list of biases."
    starter: |
      def layer(x, weights, biases):
          ...
    cases:
      - call: "layer([1, 2], [[1, 1], [1, -1]], [0, 0])"
        expect: [3, -1]
      - call: "layer([1, 1, 1], [[2, 0, 1]], [3])"
        expect: [6]
      - call: "layer([2, 3], [[1, 0], [0, 1], [1, 1]], [0, 0, 0])"
        expect: [2, 3, 5]
    solution: |
      def layer(x, weights, biases):
          z = []
          for neuron_weights, b in zip(weights, biases):
              s = sum(xi * wi for xi, wi in zip(x, neuron_weights))
              z.append(s + b)
          return z
    hints:
      - "Each neuron in the layer is a separate weighted sum of the input with its own weights and bias. As many neurons as numbers in the output list."
      - "Walk pairs (neuron weights, its bias) with zip. For each pair compute z like one neuron and append to the list."
    variants:
      - cases:
          - call: "layer([5, 5], [[1, -1]], [2])"
            expect: [2]
          - call: "layer([1, 0], [[3, 3], [4, 4]], [1, 1])"
            expect: [4, 5]
          - call: "layer([2, 2, 2], [[1, 1, 1]], [0])"
            expect: [6]
        solution: |
          def layer(x, weights, biases):
              z = []
              for neuron_weights, b in zip(weights, biases):
                  s = sum(xi * wi for xi, wi in zip(x, neuron_weights))
                  z.append(s + b)
              return z
      - cases:
          - call: "layer([3, 1], [[2, 2], [0, 5]], [1, 0])"
            expect: [9, 5]
          - call: "layer([1], [[7]], [0])"
            expect: [7]
          - call: "layer([1, 2, 3], [[1, 1, 1], [2, 0, 0]], [0, 1])"
            expect: [6, 3]
        solution: |
          def layer(x, weights, biases):
              z = []
              for neuron_weights, b in zip(weights, biases):
                  s = sum(xi * wi for xi, wi in zip(x, neuron_weights))
                  z.append(s + b)
              return z

  - id: forward-predict-001
    concept: forward-pass
    type: predict-output
    difficulty: 2
    prompt: "What does the program print?"
    snippet: |
      def layer(x, weights, biases):
          z = []
          for nw, b in zip(weights, biases):
              z.append(sum(xi * wi for xi, wi in zip(x, nw)) + b)
          return z

      def relu(vec):
          return [max(0.0, v) for v in vec]

      x = [3, 1]
      hidden = relu(layer(x, [[1, -1], [2, 0]], [0, 0]))
      out = layer(hidden, [[1, 1]], [0])
      print(out)
    expected:
      kind: stdout
      value: "[8]"
    hints:
      - "Compute the hidden layer first: two neurons give two numbers, then ReLU clips negatives to zero."
      - "Hidden layer gives [2, 6], both positive, ReLU unchanged. Output neuron sums 2 and 6."

  - id: forward-mlp-001
    concept: forward-pass
    type: python-function
    difficulty: 3
    prompt: "Implement `forward(x)` for a network: hidden layer with weights `[[0.5, -0.5], [1.0, 0.0]]` and bias `[0.0, 1.0]`, ReLU, then output neuron with weights `[[1.0, 1.0]]` and bias `[0.0]`. Return the output vector (a list of one number)."
    starter: |
      def forward(x):
          ...
    cases:
      - call: "forward([1.0, 2.0])"
        expect: [2.0]
      - call: "forward([2.0, 2.0])"
        expect: [3.0]
      - call: "forward([0.0, 0.0])"
        expect: [1.0]
    solution: |
      def forward(x):
          def layer(vec, weights, biases):
              out = []
              for neuron_weights, b in zip(weights, biases):
                  s = sum(xi * wi for xi, wi in zip(vec, neuron_weights))
                  out.append(s + b)
              return out

          def relu(vec):
              return [max(0.0, v) for v in vec]

          hidden = relu(layer(x, [[0.5, -0.5], [1.0, 0.0]], [0.0, 1.0]))
          return layer(hidden, [[1.0, 1.0]], [0.0])
    hints:
      - "Forward pass is a chain: hidden output (after ReLU) feeds the output neuron. Do not skip activation between layers."
      - "Compute two hidden neurons and pass through ReLU. Feed that vector into the output neuron with its weights and bias."
      - "There is one output neuron, so the returned list has exactly one number — the sum of hidden outputs with those weights."

  - id: forward-linearity-001
    concept: forward-pass
    type: theory-quiz
    difficulty: 3
    prompt: "What happens if you remove all activations between layers in an MLP?"
    choices:
      - id: a
        text: "The network runs faster but accuracy stays the same."
      - id: b
        text: "The whole network becomes equivalent to one linear layer."
      - id: c
        text: "The network stops computing forward pass and crashes."
      - id: d
        text: "The output always equals the input."
    correct: [b]
    explanation: "Each layer without activation is a linear transform, and the composition of linear transforms is linear again. Such a stack can be folded into one matrix upfront, so depth without nonlinearity adds nothing beyond one layer."
    hints:
      - "Recall what one layer without activation really is — matrix multiply plus bias, a linear map."
      - "Think what happens when you apply two linear maps in a row: can you replace them with one?"
