exercises:
  - id: perceptron-bias-role-001
    concept: perceptron
    type: theory-quiz
    difficulty: 1
    prompt: "What does bias do in a neuron?"
    choices:
      - id: a
        text: "Multiplies each input by a constant factor."
      - id: b
        text: "Is added to the weighted sum and shifts it regardless of the inputs."
      - id: c
        text: "Restricts the output to the range 0 to 1."
      - id: d
        text: "Chooses which activation function to apply."
    correct: [b]
    explanation: "bias is the separate term b in z = w·x + b. It shifts the sum up or down even when inputs are zero and moves the decision boundary. Activation restricts the output, not bias."
    variants:
      - prompt: "What does weight wi do for input xi?"
        choices:
          - id: a
            text: "The strength and sign of the input's influence on the weighted sum."
          - id: b
            text: "The range the neuron's output will fall into."
          - id: c
            text: "The shift of the sum when inputs are zero."
          - id: d
            text: "The layer number the input belongs to."
        correct: [a]
        explanation: "The weight multiplies its input: positive pulls the sum up as the input grows, negative pulls down, near zero makes the input almost irrelevant. Shift at zero inputs is bias's job."
      - prompt: "What two steps make up one neuron's computation?"
        choices:
          - id: a
            text: "Activation first, then the weighted sum."
          - id: b
            text: "Weighted sum of inputs with bias, then activation of that sum."
          - id: c
            text: "Normalize inputs, then multiply them together."
          - id: d
            text: "Compare inputs to each other, then pick the maximum."
        correct: [b]
        explanation: "The neuron first computes z = w·x + b (weighted sum plus bias), then passes z through activation. The order is fixed: activation works on the sum already computed."

  - id: perceptron-weighted-sum-001
    concept: perceptron
    type: python-function
    difficulty: 2
    prompt: "Implement `weighted_sum(inputs, weights, bias)`: return the dot product of `inputs` and `weights` plus `bias` (the number z)."
    starter: |
      def weighted_sum(inputs, weights, bias):
          ...
    cases:
      - call: "weighted_sum([1, 2, 3], [1, 1, 1], 0)"
        expect: 6
      - call: "weighted_sum([2, 3], [1, -1], 1)"
        expect: 0
      - call: "weighted_sum([1], [5], 2)"
        expect: 7
    solution: |
      def weighted_sum(inputs, weights, bias):
          total = 0
          for x, w in zip(inputs, weights):
              total += x * w
          return total + bias
    hints:
      - "z is the sum of each input times its weight, plus bias. Which pairs get multiplied?"
      - "Walk paired (input, weight) with zip. Accumulate products, then add bias once at the end."
    variants:
      - cases:
          - call: "weighted_sum([4, 5], [2, 1], 0)"
            expect: 13
          - call: "weighted_sum([1, 1, 1], [3, -1, 2], 0)"
            expect: 4
          - call: "weighted_sum([10, 2], [1, 1], -5)"
            expect: 7
        solution: |
          def weighted_sum(inputs, weights, bias):
              total = 0
              for x, w in zip(inputs, weights):
                  total += x * w
              return total + bias
      - cases:
          - call: "weighted_sum([2, 2], [3, 3], 1)"
            expect: 13
          - call: "weighted_sum([5], [-2], 0)"
            expect: -10
          - call: "weighted_sum([1, 0, 1], [7, 7, 7], -3)"
            expect: 11
        solution: |
          def weighted_sum(inputs, weights, bias):
              total = 0
              for x, w in zip(inputs, weights):
                  total += x * w
              return total + bias

  - id: perceptron-predict-z-001
    concept: perceptron
    type: predict-output
    difficulty: 2
    prompt: "What does the program print?"
    snippet: |
      inputs = [2, 1]
      weights = [0.5, -1.0]
      bias = 0.5

      z = sum(x * w for x, w in zip(inputs, weights)) + bias
      print(round(z, 1))
    expected:
      kind: stdout
      value: "0.5"
    hints:
      - "Compute z as w·x + b: multiply inputs by weights position-wise, sum, then add bias."
      - "0.5*2 gives 1.0 and -1.0*1 gives -1.0; they cancel to zero, leaving only bias."

  - id: perceptron-neuron-sigmoid-001
    concept: perceptron
    type: python-function
    difficulty: 3
    prompt: "Implement `neuron(inputs, weights, bias)`: compute z = w·x + b and return `sigmoid(z) = 1 / (1 + exp(-z))`. The `math` module is already imported as `math`."
    starter: |
      import math

      def neuron(inputs, weights, bias):
          ...
    cases:
      - call: "neuron([1, 0.5, -1], [0.8, -0.4, 0.3], 0.1)"
        expect_approx: 0.5986877
      - call: "neuron([1, 1], [0.5, 0.5], 0.0)"
        expect_approx: 0.7310586
      - call: "neuron([0, 0], [1, 1], 0.0)"
        expect_approx: 0.5
    solution: |
      import math

      def neuron(inputs, weights, bias):
          z = sum(x * w for x, w in zip(inputs, weights)) + bias
          return 1 / (1 + math.exp(-z))
    hints:
      - "A neuron runs two steps in order: raw weighted sum z, then activation of z. Do not skip activation: without it you return an unbounded number."
      - "Get z the same way as in weighted_sum. Then plug into sigmoid; exp is taken of -z, not z."
      - "exp is math.exp. Check the sign: at z = 0 sigmoid equals exactly 0.5."

  - id: perceptron-xor-limit-001
    concept: perceptron
    type: theory-quiz
    difficulty: 3
    prompt: "Why can one perceptron (with no hidden layers) not solve XOR?"
    choices:
      - id: a
        text: "XOR has too many inputs for one neuron."
      - id: b
        text: "One neuron draws only a straight boundary, and XOR classes cannot be separated by a line."
      - id: c
        text: "Sigmoid has no derivative, so the neuron cannot be trained."
      - id: d
        text: "XOR requires negative weights, which a perceptron cannot have."
    correct: [b]
    explanation: "One neuron's output is activation of a linear sum w·x + b, so the boundary between yes and no is always a straight line. XOR classes sit diagonally and no line separates them: you need at least two layers. Weights can be any sign, and sigmoid does have a derivative."
    hints:
      - "Think what shape of boundary one neuron can draw: its output depends on inputs linearly (through w·x + b)."
      - "Plot the four XOR points and try to separate 1 answers from 0 answers with a single straight line."
