exercises:
  - id: arch-image-001
    concept: architectures
    type: theory-quiz
    difficulty: 1
    prompt: "Какую архитектуру традиционно берут для изображений?"
    choices:
      - id: a
        text: "MLP"
      - id: b
        text: "CNN (свёрточную сеть)"
      - id: c
        text: "RNN"
      - id: d
        text: "Простую линейную регрессию"
    correct: [b]
    explanation: "CNN созданы для данных с пространственной структурой: скользящий фильтр ищет локальные паттерны (края, текстуры) с разделяемыми весами, что даёт меньше параметров и трансляционную инвариантность. MLP теряет соседство пикселей."
    variants:
      - prompt: "Какую архитектуру берут для текста с длинными зависимостями в 2026 году?"
        choices:
          - id: a
            text: "Transformer"
          - id: b
            text: "CNN"
          - id: c
            text: "MLP"
          - id: d
            text: "Простую RNN без ворот"
        correct: [a]
        explanation: "Трансформер через механизм внимания видит длинные зависимости сразу и обрабатывает последовательность параллельно. На нём построены все большие языковые модели - это доминирующая архитектура для текста."
      - prompt: "Какую архитектуру берут для табличных признаков (доход, возраст, число покупок)?"
        choices:
          - id: a
            text: "MLP"
          - id: b
            text: "CNN"
          - id: c
            text: "LSTM"
          - id: d
            text: "Transformer"
        correct: [a]
        explanation: "Для табличных данных, где признаки независимы и порядок столбцов не несёт смысла, подходит полносвязный MLP. Специальная структура CNN или рекуррентность здесь не нужны."

  - id: arch-attention-001
    concept: architectures
    type: theory-quiz
    difficulty: 2
    prompt: "Что заменил механизм внимания (attention) в трансформере по сравнению с RNN?"
    choices:
      - id: a
        text: "Пошаговую рекуррентность: каждый элемент напрямую смотрит на все остальные."
      - id: b
        text: "Функцию активации: вместо ReLU используется внимание."
      - id: c
        text: "Функцию потерь: вместо кросс-энтропии используется внимание."
      - id: d
        text: "Градиентный спуск: внимание обучает сеть без градиентов."
    correct: [a]
    explanation: "Трансформер отказался от передачи скрытого состояния по шагам (рекуррентности). Внимание позволяет каждому элементу напрямую смотреть на все остальные: длинные зависимости видны сразу, а вся последовательность обрабатывается параллельно. Активации, потери и градиентный спуск остаются на месте."
    variants:
      - prompt: "В чём преимущество разделяемых весов фильтра в CNN?"
        choices:
          - id: a
            text: "Один фильтр переиспользуется по всей картинке, поэтому параметров намного меньше."
          - id: b
            text: "Каждый пиксель получает собственный независимый вес."
          - id: c
            text: "Веса вообще не нужно обучать."
          - id: d
            text: "Сеть перестаёт зависеть от learning rate."
        correct: [a]
        explanation: "Один и тот же фильтр скользит по всему изображению, ища паттерн в каждом месте одинаково. Поэтому параметров на порядки меньше, чем у полносвязного MLP, и возникает трансляционная инвариантность."
      - prompt: "Почему у простой RNN короткая память на длинных последовательностях?"
        choices:
          - id: a
            text: "Градиент затухает по мере прохода, и начало забывается к концу."
          - id: b
            text: "RNN не использует веса."
          - id: c
            text: "RNN обрабатывает всю последовательность сразу."
          - id: d
            text: "У RNN нет скрытого состояния."
        correct: [a]
        explanation: "RNN переносит скрытое состояние по шагам, но на длинных последовательностях градиент затухает, и информация из начала теряется к концу. LSTM с управляемыми воротами удерживает контекст дольше."

  - id: arch-recommend-blanks-001
    concept: architectures
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните таблицу соответствия «тип данных -> семейство сети» (значения - названия архитектур)."
    template: |
      recommend = {
          "изображения": "{{images}}",
          "табличные признаки": "{{table}}",
          "текст с длинными зависимостями": "{{text}}",
      }
    blanks:
      images:
        accept: ["CNN"]
      table:
        accept: ["MLP"]
      text:
        accept: ["Transformer"]
    hints:
      - "Каждая архитектура заточена под структуру своих данных: пространственная сетка, независимые признаки, длинная последовательность."
      - "Изображения - свёртки, табличные признаки - полносвязная сеть, длинный текст - внимание."

  - id: arch-recommend-predict-001
    concept: architectures
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа?"
    snippet: |
      def recommend(data_kind):
          table = {
              "таблица": "MLP",
              "картинка": "CNN",
              "текст": "Transformer",
          }
          return table.get(data_kind, "уточните тип данных")

      print(recommend("картинка"))
    expected:
      kind: stdout
      value: "CNN"
    hints:
      - "dict.get возвращает значение по ключу, а если ключа нет - значение по умолчанию. Есть ли ключ «картинка» в словаре?"
      - "Ключ «картинка» в словаре есть, поэтому вернётся его значение, а не текст по умолчанию."
    variants:
      - snippet: |
          def recommend(data_kind):
              table = {
                  "таблица": "MLP",
                  "картинка": "CNN",
                  "текст": "Transformer",
              }
              return table.get(data_kind, "уточните тип данных")

          print(recommend("текст"))
        expected:
          kind: stdout
          value: "Transformer"
      - snippet: |
          def recommend(data_kind):
              table = {
                  "таблица": "MLP",
                  "картинка": "CNN",
                  "текст": "Transformer",
              }
              return table.get(data_kind, "уточните тип данных")

          print(recommend("звук"))
        expected:
          kind: stdout
          value: "уточните тип данных"

  - id: arch-mlp-image-pitfall-001
    concept: architectures
    type: theory-quiz
    difficulty: 3
    prompt: "Почему развернуть изображение в длинный вектор и подать в MLP - плохая идея?"
    choices:
      - id: a
        text: "MLP не умеет обрабатывать числа больше 255."
      - id: b
        text: "Теряется пространственное соседство пикселей, а параметров требуется непомерно много."
      - id: c
        text: "MLP работает только с текстом."
      - id: d
        text: "Изображение нельзя представить числами."
    correct: [b]
    explanation: "В развёрнутом векторе для MLP все пиксели - независимые входы, поэтому пространственная структура (соседние пиксели связаны) теряется, и её приходится учить с нуля для каждого положения. Плюс полносвязность даёт огромное число весов. CNN решает обе проблемы скользящим фильтром с разделяемыми весами."
    hints:
      - "Подумайте, что происходит с информацией о том, какие пиксели рядом, когда картинку «вытягивают» в одну строку."
      - "Сравните число весов у полносвязного слоя над всеми пикселями с числом весов у маленького фильтра."
