exercises:
  - id: embeddings-cosine-range-001
    concept: embeddings
    type: theory-quiz
    difficulty: 1
    prompt: "What is the cosine similarity of two vectors pointing the same direction?"
    choices:
      - id: a
        text: "1"
      - id: b
        text: "0"
      - id: c
        text: "-1"
      - id: d
        text: "Depends on vector length."
    correct: [a]
    explanation: "Cosine of the angle between collinear vectors is 1 — maximum similarity. Dividing by lengths removes scale, so length does not matter: only direction counts. 0 is perpendicular, -1 is opposite."
    variants:
      - prompt: "What is the cosine similarity of two perpendicular vectors?"
        choices:
          - id: a
            text: "0"
          - id: b
            text: "1"
          - id: c
            text: "-1"
          - id: d
            text: "0.5"
        correct: [a]
        explanation: "Cosine of a right angle is 0 — vectors are unrelated by direction. 1 means same direction, -1 means opposite."
      - prompt: "What range does cosine similarity lie in?"
        choices:
          - id: a
            text: "From -1 to 1."
          - id: b
            text: "From 0 to 1."
          - id: c
            text: "From 0 to infinity."
          - id: d
            text: "From negative infinity to infinity."
        correct: [a]
        explanation: "Cosine of an angle always lies in -1..1: 1 same direction, 0 perpendicular, -1 opposite. Negative is not an error — it means opposite direction."

  - id: embeddings-dot-001
    concept: embeddings
    type: python-function
    difficulty: 2
    prompt: "Implement `dot(a, b)`: return the dot product of the vectors — sum of products of corresponding elements."
    starter: |
      def dot(a, b):
          ...
    cases:
      - call: "dot([1, 2, 3], [4, 5, 6])"
        expect: 32
      - call: "dot([1, 0], [0, 1])"
        expect: 0
      - call: "dot([2, 2], [3, 3])"
        expect: 12
    solution: |
      def dot(a, b):
          total = 0
          for x, y in zip(a, b):
              total += x * y
          return total
    hints:
      - "Dot product pairs vectors by position: first with first, second with second, and so on. What do you do with each pair?"
      - "Multiply elements in pairs with zip and sum all products into one number."
    variants:
      - cases:
          - call: "dot([1, 1, 1], [2, 2, 2])"
            expect: 6
          - call: "dot([5], [5])"
            expect: 25
          - call: "dot([1, -1], [1, 1])"
            expect: 0
        solution: |
          def dot(a, b):
              total = 0
              for x, y in zip(a, b):
                  total += x * y
              return total
      - cases:
          - call: "dot([0, 0], [1, 1])"
            expect: 0
          - call: "dot([3, 4], [3, 4])"
            expect: 25
          - call: "dot([1, 2], [2, 1])"
            expect: 4
        solution: |
          def dot(a, b):
              total = 0
              for x, y in zip(a, b):
                  total += x * y
              return total

  - id: embeddings-cosine-predict-001
    concept: embeddings
    type: predict-output
    difficulty: 2
    prompt: "What does the program print?"
    snippet: |
      from math import sqrt

      a = [1, 1]
      b = [1, 1]

      dot = sum(x * y for x, y in zip(a, b))
      norm_a = sqrt(sum(x * x for x in a))
      norm_b = sqrt(sum(x * x for x in b))
      print(round(dot / (norm_a * norm_b), 4))
    expected:
      kind: stdout
      value: "1.0"
    hints:
      - "This is cosine between vectors. How do two identical vectors point relative to each other?"
      - "Vectors match, so the angle is zero and cosine of zero is 1."

  - id: embeddings-cosine-001
    concept: embeddings
    type: python-function
    difficulty: 3
    prompt: "Implement `cosine(a, b)`: cosine similarity `(a · b) / (|a| * |b|)` where |v| is vector length (square root of sum of squares). The `math` module is already imported as `math`."
    starter: |
      import math

      def cosine(a, b):
          ...
    cases:
      - call: "cosine([1, 0], [1, 0])"
        expect_approx: 1.0
      - call: "cosine([1, 0], [0, 1])"
        expect_approx: 0.0
      - call: "cosine([1, 0], [-1, 0])"
        expect_approx: -1.0
    solution: |
      import math

      def cosine(a, b):
          dot = sum(x * y for x, y in zip(a, b))
          norm_a = math.sqrt(sum(x * x for x in a))
          norm_b = math.sqrt(sum(x * x for x in b))
          return dot / (norm_a * norm_b)
    hints:
      - "Cosine measures angle, not length. Gather three quantities: dot product and each vector's length, then divide the first by the product of lengths."
      - "Vector length is the square root of the sum of squared elements. Denominator is the product of the two lengths."
      - "Anchor checks: identical vectors give 1, perpendicular 0, opposite -1."
    variants:
      - cases:
          - call: "cosine([1, 1], [2, 2])"
            expect_approx: 1.0
          - call: "cosine([3, 4], [3, 4])"
            expect_approx: 1.0
          - call: "cosine([1, 0], [0, 1])"
            expect_approx: 0.0
        solution: |
          import math

          def cosine(a, b):
              dot = sum(x * y for x, y in zip(a, b))
              norm_a = math.sqrt(sum(x * x for x in a))
              norm_b = math.sqrt(sum(x * x for x in b))
              return dot / (norm_a * norm_b)
      - cases:
          - call: "cosine([2, 1], [3, 1])"
            expect_approx: 0.9899495
          - call: "cosine([1, 0], [1, 0])"
            expect_approx: 1.0
          - call: "cosine([0, 1], [0, -1])"
            expect_approx: -1.0
        solution: |
          import math

          def cosine(a, b):
              dot = sum(x * y for x, y in zip(a, b))
              norm_a = math.sqrt(sum(x * x for x in a))
              norm_b = math.sqrt(sum(x * x for x in b))
              return dot / (norm_a * norm_b)

  - id: embeddings-why-normalize-001
    concept: embeddings
    type: theory-quiz
    difficulty: 3
    prompt: "Why does cosine similarity divide the dot product by vector lengths?"
    choices:
      - id: a
        text: "To speed up computation."
      - id: b
        text: "To remove scale and measure only direction (angle)."
      - id: c
        text: "So the result is always an integer."
      - id: d
        text: "So the result falls in the range 0 to 1."
    correct: [b]
    explanation: "Raw dot product grows with vector length, so alone it is not a similarity measure. Dividing by lengths removes scale: collinear vectors of any length give cosine 1. The measure is angle. Range is -1..1, not 0..1."
    hints:
      - "Think what happens to dot product if you double both vectors without changing direction."
      - "Cosine should depend only on the angle between vectors, not on how long they are."
