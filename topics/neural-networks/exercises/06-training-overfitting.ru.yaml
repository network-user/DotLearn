exercises:
  - id: overfit-definition-001
    concept: training-overfitting
    type: theory-quiz
    difficulty: 1
    prompt: "Как проявляется переобучение (overfitting) по кривым потерь?"
    choices:
      - id: a
        text: "Train-потеря низкая, а validation-потеря высокая (большой разрыв)."
      - id: b
        text: "И train-, и validation-потеря высокие."
      - id: c
        text: "Train-потеря выше validation-потери."
      - id: d
        text: "Обе потери равны нулю."
    correct: [a]
    explanation: "Переобучение - это когда сеть зазубрила train: train-потеря падает почти до нуля, а validation-потеря остаётся высокой или растёт. Большой разрыв между ними и есть симптом. Высокие обе потери - это недообучение."
    variants:
      - prompt: "На каком наборе данных сеть подбирает веса?"
        choices:
          - id: a
            text: "На train."
          - id: b
            text: "На validation."
          - id: c
            text: "На test."
          - id: d
            text: "На всех трёх одновременно."
        correct: [a]
        explanation: "Веса подбираются только на train. Validation служит для контроля качества и настройки гиперпараметров, а test трогают один раз в конце для честной финальной оценки."
      - prompt: "Для чего нужен test-набор?"
        choices:
          - id: a
            text: "Для подбора весов на каждом шаге."
          - id: b
            text: "Для финальной непредвзятой оценки, его трогают один раз в конце."
          - id: c
            text: "Для настройки числа слоёв и learning rate."
          - id: d
            text: "Для аугментации train-данных."
        correct: [b]
        explanation: "Test - финальный набор для честного замера обобщения; его смотрят один раз в самом конце. Подбор весов идёт на train, настройка гиперпараметров - на validation."

  - id: overfit-early-stopping-predict-001
    concept: training-overfitting
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Она ищет эпоху с наименьшей validation-потерей - именно там сработала бы ранняя остановка."
    snippet: |
      val_losses = [1.0, 0.65, 0.5, 0.45, 0.5, 0.62, 0.78]

      best_epoch = 0
      best_loss = val_losses[0]
      for epoch, loss in enumerate(val_losses):
          if loss < best_loss:
              best_loss = loss
              best_epoch = epoch

      print(best_epoch, best_loss)
    expected:
      kind: stdout
      value: "3 0.45"
    hints:
      - "Ранняя остановка останавливает обучение в точке минимума validation-потери. Найдите наименьшее значение в списке и его позицию (нумерация с нуля)."
      - "Минимум списка - это 0.45; посчитайте, на какой по счёту эпохе оно стоит, помня, что enumerate начинает с 0."
    variants:
      - snippet: |
          val_losses = [0.9, 0.6, 0.55, 0.5, 0.48, 0.52, 0.6]

          best_epoch = 0
          best_loss = val_losses[0]
          for epoch, loss in enumerate(val_losses):
              if loss < best_loss:
                  best_loss = loss
                  best_epoch = epoch

          print(best_epoch, best_loss)
        expected:
          kind: stdout
          value: "4 0.48"
      - snippet: |
          val_losses = [1.0, 0.8, 0.7, 0.65, 0.7]

          best_epoch = 0
          best_loss = val_losses[0]
          for epoch, loss in enumerate(val_losses):
              if loss < best_loss:
                  best_loss = loss
                  best_epoch = epoch

          print(best_epoch, best_loss)
        expected:
          kind: stdout
          value: "3 0.65"

  - id: overfit-gap-blanks-001
    concept: training-overfitting
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните функцию, которая возвращает разрыв между validation- и train-потерей (индикатор переобучения): большой разрыв означает overfitting."
    template: |
      def overfit_gap(train_loss, val_loss):
          return {{larger}} - {{smaller}}
    blanks:
      larger:
        accept: ["val_loss"]
      smaller:
        accept: ["train_loss"]
    hints:
      - "Разрыв положителен при переобучении, когда validation-потеря выше train-потери. Из какой величины вычитают какую, чтобы получить положительное число?"
      - "Вычитают train-потерю из validation-потери: val_loss - train_loss."

  - id: overfit-dropout-predict-001
    concept: training-overfitting
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Она имитирует dropout, зануляя выходы по маске."
    snippet: |
      outputs = [2.0, 3.0, 1.0, 4.0]
      mask = [1, 0, 1, 0]

      dropped = [o * m for o, m in zip(outputs, mask)]
      print(dropped)
    expected:
      kind: stdout
      value: "[2.0, 0.0, 1.0, 0.0]"
    hints:
      - "Dropout случайно выключает часть нейронов, обнуляя их выход. Здесь маска задаёт, кто остаётся (1), а кто выключен (0)."
      - "Перемножьте каждый выход со своим элементом маски: где 0, выход обнуляется; где 1, проходит без изменений."

  - id: overfit-vs-underfit-001
    concept: training-overfitting
    type: theory-quiz
    difficulty: 3
    prompt: "У сети высоки и train-, и validation-потеря. Что это и что делать?"
    choices:
      - id: a
        text: "Переобучение: добавить dropout и L2-регуляризацию."
      - id: b
        text: "Недообучение: увеличить ёмкость сети или дольше обучать, регуляризацию убрать."
      - id: c
        text: "Утечка данных: перемешать train и validation."
      - id: d
        text: "Идеальное обучение: остановиться немедленно."
    correct: [b]
    explanation: "Высокие обе потери - признак недообучения: сеть слишком слаба или мало обучалась. Нужно больше параметров, дольше обучать, меньше dropout. Регуляризация (dropout, L2) лечит переобучение - низкий train при высоком validation - и здесь только навредит."
    hints:
      - "Сначала поставьте диагноз по паре кривых: что значат именно высокие ОБЕ потери, а не разрыв между ними?"
      - "Регуляризация уменьшает переобучение. Если проблема в нехватке ёмкости, она движет в неверную сторону."
