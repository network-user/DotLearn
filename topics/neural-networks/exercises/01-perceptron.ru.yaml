exercises:
  - id: perceptron-bias-role-001
    concept: perceptron
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает bias (смещение) в нейроне?"
    choices:
      - id: a
        text: "Умножает каждый вход на постоянный множитель."
      - id: b
        text: "Добавляется к взвешенной сумме и сдвигает её независимо от входов."
      - id: c
        text: "Ограничивает выход диапазоном от 0 до 1."
      - id: d
        text: "Выбирает, какую функцию активации применить."
    correct: [b]
    explanation: "bias - это отдельное слагаемое b в z = w·x + b. Оно сдвигает сумму вверх или вниз даже при нулевых входах и двигает границу решения. Ограничивает выход активация, а не bias."
    variants:
      - prompt: "Что задаёт вес wi при входе xi?"
        choices:
          - id: a
            text: "Силу и знак влияния входа на взвешенную сумму."
          - id: b
            text: "Диапазон, в который попадёт выход нейрона."
          - id: c
            text: "Сдвиг суммы при нулевых входах."
          - id: d
            text: "Номер слоя, к которому относится вход."
        correct: [a]
        explanation: "Вес умножается на свой вход: положительный тянет сумму вверх вместе с ростом входа, отрицательный - вниз, близкий к нулю делает вход неважным. Сдвиг при нулевых входах задаёт bias."
      - prompt: "Из каких двух шагов состоит работа одного нейрона?"
        choices:
          - id: a
            text: "Сначала активация, затем взвешенная сумма."
          - id: b
            text: "Взвешенная сумма входов с bias, затем активация этой суммы."
          - id: c
            text: "Нормировка входов, затем их перемножение."
          - id: d
            text: "Сравнение входов между собой, затем выбор максимума."
        correct: [b]
        explanation: "Нейрон сначала считает z = w·x + b (взвешенная сумма плюс bias), а потом пропускает z через активацию. Порядок именно такой: активация работает с уже посчитанной суммой."

  - id: perceptron-weighted-sum-001
    concept: perceptron
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `weighted_sum(inputs, weights, bias)`: верните скалярное произведение `inputs` и `weights` плюс `bias` (то самое число z)."
    starter: |
      def weighted_sum(inputs, weights, bias):
          ...
    cases:
      - call: "weighted_sum([1, 2, 3], [1, 1, 1], 0)"
        expect: 6
      - call: "weighted_sum([2, 3], [1, -1], 1)"
        expect: 0
      - call: "weighted_sum([1], [5], 2)"
        expect: 7
    solution: |
      def weighted_sum(inputs, weights, bias):
          total = 0
          for x, w in zip(inputs, weights):
              total += x * w
          return total + bias
    hints:
      - "z - это сумма произведений «вход на свой вес», к которой добавлено смещение. Какие пары перемножаются?"
      - "Пройдите по парам (вход, вес) одновременно: zip соединяет их по позициям. Накапливайте сумму произведений, а bias добавьте один раз в конце."
    variants:
      - cases:
          - call: "weighted_sum([4, 5], [2, 1], 0)"
            expect: 13
          - call: "weighted_sum([1, 1, 1], [3, -1, 2], 0)"
            expect: 4
          - call: "weighted_sum([10, 2], [1, 1], -5)"
            expect: 7
        solution: |
          def weighted_sum(inputs, weights, bias):
              total = 0
              for x, w in zip(inputs, weights):
                  total += x * w
              return total + bias
      - cases:
          - call: "weighted_sum([2, 2], [3, 3], 1)"
            expect: 13
          - call: "weighted_sum([5], [-2], 0)"
            expect: -10
          - call: "weighted_sum([1, 0, 1], [7, 7, 7], -3)"
            expect: 11
        solution: |
          def weighted_sum(inputs, weights, bias):
              total = 0
              for x, w in zip(inputs, weights):
                  total += x * w
              return total + bias

  - id: perceptron-predict-z-001
    concept: perceptron
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа?"
    snippet: |
      inputs = [2, 1]
      weights = [0.5, -1.0]
      bias = 0.5

      z = sum(x * w for x, w in zip(inputs, weights)) + bias
      print(round(z, 1))
    expected:
      kind: stdout
      value: "0.5"
    hints:
      - "Считайте z по формуле w·x + b: перемножьте входы с весами по позициям и сложите, потом добавьте bias."
      - "0.5*2 даёт 1.0, а -1.0*1 даёт -1.0; их сумма гасится в ноль, и остаётся только bias."

  - id: perceptron-neuron-sigmoid-001
    concept: perceptron
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `neuron(inputs, weights, bias)`: посчитайте z = w·x + b и верните `sigmoid(z) = 1 / (1 + exp(-z))`. Модуль `math` уже импортирован как `math`."
    starter: |
      import math

      def neuron(inputs, weights, bias):
          ...
    cases:
      - call: "neuron([1, 0.5, -1], [0.8, -0.4, 0.3], 0.1)"
        expect_approx: 0.5986877
      - call: "neuron([1, 1], [0.5, 0.5], 0.0)"
        expect_approx: 0.7310586
      - call: "neuron([0, 0], [1, 1], 0.0)"
        expect_approx: 0.5
    solution: |
      import math

      def neuron(inputs, weights, bias):
          z = sum(x * w for x, w in zip(inputs, weights)) + bias
          return 1 / (1 + math.exp(-z))
    hints:
      - "Нейрон делает два шага по очереди: сначала сырая взвешенная сумма z, затем активация этого z. Не пропускайте активацию - без неё вернётся неограниченное число."
      - "Сначала получите z ровно как в weighted_sum. Затем подставьте его в формулу sigmoid; exp берётся от -z, а не от z."
      - "exp - это math.exp. Проверьте знак: при z = 0 сигмоида равна ровно 0.5."

  - id: perceptron-xor-limit-001
    concept: perceptron
    type: theory-quiz
    difficulty: 3
    prompt: "Почему один перцептрон (без скрытых слоёв) не может решить задачу XOR?"
    choices:
      - id: a
        text: "У XOR слишком много входов для одного нейрона."
      - id: b
        text: "Один нейрон проводит только прямую границу, а классы XOR прямой не разделить."
      - id: c
        text: "У sigmoid нет производной, поэтому нейрон нельзя обучить."
      - id: d
        text: "XOR требует отрицательных весов, которых у перцептрона нет."
    correct: [b]
    explanation: "Выход одного нейрона - это активация от линейной суммы w·x + b, поэтому граница между «да» и «нет» всегда прямая (линейная). Классы XOR расположены по диагонали и прямой не разделяются - нужны хотя бы два слоя. Веса бывают любого знака, а у sigmoid производная как раз есть."
    hints:
      - "Подумайте, какой формы границу между классами способен провести один нейрон: его выход зависит от входов линейно (через w·x + b)."
      - "Нарисуйте четыре точки XOR на плоскости и попробуйте отделить ответы «1» от ответов «0» одной прямой."
