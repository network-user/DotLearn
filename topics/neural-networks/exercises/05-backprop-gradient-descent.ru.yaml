exercises:
  - id: gd-step-direction-001
    concept: backprop-gradient-descent
    type: theory-quiz
    difficulty: 1
    prompt: "В какую сторону градиентный спуск двигает вес?"
    choices:
      - id: a
        text: "По направлению градиента (в сторону роста потери)."
      - id: b
        text: "Против градиента (в сторону убывания потери)."
      - id: c
        text: "В случайную сторону на каждом шаге."
      - id: d
        text: "Всегда в сторону увеличения веса."
    correct: [b]
    explanation: "Градиент показывает направление наискорейшего роста потери. Чтобы потеря убывала, веса двигают в противоположную сторону: w = w - learning_rate * градиент. Минус и означает «против градиента»."
    variants:
      - prompt: "Что задаёт learning rate (скорость обучения)?"
        choices:
          - id: a
            text: "Длину шага: множитель перед градиентом при обновлении веса."
          - id: b
            text: "Число слоёв в сети."
          - id: c
            text: "Минимальное значение потери."
          - id: d
            text: "Количество примеров в датасете."
        correct: [a]
        explanation: "learning rate - множитель перед градиентом в шаге w = w - lr * градиент. Слишком маленький делает спуск медленным, слишком большой заставляет шаги перелетать минимум."
      - prompt: "Что показывает градиент потери по весу?"
        choices:
          - id: a
            text: "Текущее значение веса."
          - id: b
            text: "Направление, в котором потеря растёт быстрее всего."
          - id: c
            text: "Номер слоя, где находится вес."
          - id: d
            text: "Вероятность правильного класса."
        correct: [b]
        explanation: "Градиент - это наклон ландшафта потерь в точке текущих весов: он указывает направление наискорейшего роста потери. Спуск шагает против него, чтобы потерю уменьшать."

  - id: gd-step-001
    concept: backprop-gradient-descent
    type: python-function
    difficulty: 2
    prompt: "Реализуйте один шаг градиентного спуска `step(w, learning_rate, gradient)`: верните обновлённый вес по правилу `w - learning_rate * gradient`."
    starter: |
      def step(w, learning_rate, gradient):
          ...
    cases:
      - call: "step(0.5, 0.1, 2.0)"
        expect_approx: 0.3
      - call: "step(1.0, 0.5, 2.0)"
        expect_approx: 0.0
      - call: "step(0.0, 0.1, -3.0)"
        expect_approx: 0.3
    solution: |
      def step(w, learning_rate, gradient):
          return w - learning_rate * gradient
    hints:
      - "Шаг всегда идёт против градиента: положительный градиент тянет вес вниз, отрицательный - вверх. Какой знак стоит перед произведением?"
      - "Умножьте learning_rate на gradient и вычтите результат из текущего веса. Проверка: при отрицательном градиенте вес должен вырасти."
    variants:
      - cases:
          - call: "step(2.0, 0.5, 4.0)"
            expect_approx: 0.0
          - call: "step(10.0, 0.1, 10.0)"
            expect_approx: 9.0
          - call: "step(1.0, 0.25, 4.0)"
            expect_approx: 0.0
        solution: |
          def step(w, learning_rate, gradient):
              return w - learning_rate * gradient
      - cases:
          - call: "step(5.0, 1.0, 2.0)"
            expect_approx: 3.0
          - call: "step(0.0, 0.5, 2.0)"
            expect_approx: -1.0
          - call: "step(3.0, 0.1, 10.0)"
            expect_approx: 2.0
        solution: |
          def step(w, learning_rate, gradient):
              return w - learning_rate * gradient

  - id: gd-loop-predict-001
    concept: backprop-gradient-descent
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Здесь потеря равна w**2, поэтому градиент равен 2*w."
    snippet: |
      w = 0.5
      for _ in range(2):
          gradient = 2 * w
          w = w - 0.1 * gradient
          print(round(w, 4))
    expected:
      kind: stdout
      value: |-
        0.4
        0.32
    hints:
      - "На каждом шаге сначала считается градиент по текущему весу, затем вес сдвигается против него. Вес и градиент пересчитываются заново на каждой итерации."
      - "Первый шаг: градиент 2*0.5=1.0, вес 0.5-0.1*1.0=0.4. Второй шаг считает градиент уже от 0.4."
    variants:
      - snippet: |
          w = 1.0
          for _ in range(2):
              gradient = 2 * w
              w = w - 0.1 * gradient
              print(round(w, 4))
        expected:
          kind: stdout
          value: |-
            0.8
            0.64
      - snippet: |
          w = 2.0
          for _ in range(2):
              gradient = 2 * w
              w = w - 0.25 * gradient
              print(round(w, 4))
        expected:
          kind: stdout
          value: |-
            1.0
            0.5

  - id: gd-numeric-gradient-001
    concept: backprop-gradient-descent
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `numeric_gradient(f, x, h=1e-5)`: оцените производную `f` в точке `x` двусторонней разностью `(f(x + h) - f(x - h)) / (2 * h)`."
    starter: |
      def numeric_gradient(f, x, h=1e-5):
          ...
    cases:
      - call: "numeric_gradient(lambda x: x ** 2, 3.0)"
        expect_approx: 6.0
      - call: "numeric_gradient(lambda x: x ** 3, 2.0)"
        expect_approx: 12.0
      - call: "numeric_gradient(lambda x: 2 * x, 5.0)"
        expect_approx: 2.0
    solution: |
      def numeric_gradient(f, x, h=1e-5):
          return (f(x + h) - f(x - h)) / (2 * h)
    hints:
      - "Градиент - это чувствительность выхода к входу: насколько меняется f, если чуть тронуть x. Здесь оценку даёт сравнение f чуть правее и чуть левее точки."
      - "Посчитайте f в точках x + h и x - h, возьмите их разность и поделите на 2 * h. Это и есть двусторонняя разность."
      - "Для f(x) = x**2 в точке 3 ответ должен быть близок к 6 - это известная производная 2x."

  - id: gd-backprop-role-001
    concept: backprop-gradient-descent
    type: theory-quiz
    difficulty: 4
    prompt: "Команда обучает сеть, потеря после каждого шага не падает, а растёт и через несколько шагов становится NaN. Какая причина наиболее вероятна и какова роль backprop в обучении?"
    choices:
      - id: a
        text: "Слишком большой learning rate: шаги перелетают минимум и расходятся. Backprop при этом лишь считает градиенты, а шаг по ним делает градиентный спуск."
      - id: b
        text: "Backprop сам обновляет веса в неверную сторону, и его нужно заменить другим алгоритмом обучения."
      - id: c
        text: "Сеть нашла глобальный минимум, поэтому потеря выросла."
      - id: d
        text: "Прямой проход обучает веса слишком агрессивно, надо отключить активации."
    correct: [a]
    explanation: "Растущая до NaN потеря - классический признак слишком большого learning rate: каждый шаг перелетает минимум всё дальше, и спуск расходится. Backprop по цепному правилу только вычисляет градиенты всех весов за проход назад; сам шаг по градиентам делает градиентный спуск. Прямой проход вообще не обучает."
    hints:
      - "Разделите две роли: что вычисляет направление спуска, а что делает шаг. И вспомните, как размер шага влияет на сходимость."
      - "Если потеря не убывает, а взрывается, дело обычно в длине шага, а не в способе подсчёта градиента."
