exercises:
  - id: overfit-definition-001
    concept: training-overfitting
    type: theory-quiz
    difficulty: 1
    prompt: "How does overfitting show up on loss curves?"
    choices:
      - id: a
        text: "Train loss is low and validation loss is high."
      - id: b
        text: "Both train and validation loss are high."
      - id: c
        text: "Train loss is higher than validation loss."
      - id: d
        text: "Both losses are zero."
    correct: [a]
    explanation: "Overfitting means the network memorized train: train loss falls nearly to zero while validation loss stays high or rises. A large gap between them is the symptom. High both losses is underfitting."
    variants:
      - prompt: "On which dataset does the network fit weights?"
        choices:
          - id: a
            text: "Train."
          - id: b
            text: "Validation."
          - id: c
            text: "Test."
          - id: d
            text: "All three at once."
        correct: [a]
        explanation: "Weights are fit only on train. Validation monitors quality and tunes hyperparameters; test is touched once at the end for a final honest score."
      - prompt: "What is the test set for?"
        choices:
          - id: a
            text: "Fitting weights at every step"
          - id: b
            text: "A final unbiased evaluation."
          - id: c
            text: "tuning layer count and learning rate"
          - id: d
            text: "Augmenting train data"
        correct: [b]
        explanation: "Test is the final set for an honest generalization measure, viewed once at the very end. Weights are fit on train; hyperparameters are tuned on validation."

  - id: overfit-early-stopping-predict-001
    concept: training-overfitting
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? It finds the epoch with lowest validation loss, where early stopping would halt."
    snippet: |
      val_losses = [1.0, 0.65, 0.5, 0.45, 0.5, 0.62, 0.78]

      best_epoch = 0
      best_loss = val_losses[0]
      for epoch, loss in enumerate(val_losses):
          if loss < best_loss:
              best_loss = loss
              best_epoch = epoch

      print(best_epoch, best_loss)
    expected:
      kind: stdout
      value: "3 0.45"
    hints:
      - "Early stopping halts at the minimum validation loss. Find the smallest value in the list and its position (zero-based indexing)."
      - "Minimum is 0.45; count which epoch it sits on, remembering enumerate starts at 0."
    variants:
      - snippet: |
          val_losses = [0.9, 0.6, 0.55, 0.5, 0.48, 0.52, 0.6]

          best_epoch = 0
          best_loss = val_losses[0]
          for epoch, loss in enumerate(val_losses):
              if loss < best_loss:
                  best_loss = loss
                  best_epoch = epoch

          print(best_epoch, best_loss)
        expected:
          kind: stdout
          value: "4 0.48"
      - snippet: |
          val_losses = [1.0, 0.8, 0.7, 0.65, 0.7]

          best_epoch = 0
          best_loss = val_losses[0]
          for epoch, loss in enumerate(val_losses):
              if loss < best_loss:
                  best_loss = loss
                  best_epoch = epoch

          print(best_epoch, best_loss)
        expected:
          kind: stdout
          value: "3 0.65"

  - id: overfit-gap-blanks-001
    concept: training-overfitting
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the function that returns the gap between validation and train loss (an overfitting indicator): a large gap means overfitting."
    template: |
      def overfit_gap(train_loss, val_loss):
          return {{larger}} - {{smaller}}
    blanks:
      larger:
        accept: ["val_loss"]
      smaller:
        accept: ["train_loss"]
    hints:
      - "The gap is positive under overfitting when validation loss exceeds train loss. Which value minus which gives a positive number?"
      - "Subtract train loss from validation loss: val_loss - train_loss."

  - id: overfit-dropout-predict-001
    concept: training-overfitting
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? It simulates dropout by zeroing outputs according to a mask."
    snippet: |
      outputs = [2.0, 3.0, 1.0, 4.0]
      mask = [1, 0, 1, 0]

      dropped = [o * m for o, m in zip(outputs, mask)]
      print(dropped)
    expected:
      kind: stdout
      value: "[2.0, 0.0, 1.0, 0.0]"
    hints:
      - "Dropout randomly disables some neurons by zeroing their output. Here the mask marks who stays (1) and who is off (0)."
      - "Multiply each output by its mask element: where 0, output zeroes; where 1, it passes through."

  - id: overfit-vs-underfit-001
    concept: training-overfitting
    type: theory-quiz
    difficulty: 3
    prompt: "A network has high train and validation loss. What is this and what should you do?"
    choices:
      - id: a
        text: "Overfitting: add dropout and L2 regularization; mixing the analyst scope with development work"
      - id: b
        text: "Underfitting: increase network capacity or train longer, remove regularization."
      - id: c
        text: "Data leak: shuffle train and validation together"
      - id: d
        text: "Perfect training: stop immediately"
    correct: [b]
    explanation: "High both losses signal underfitting: the network is too weak or under-trained. Add parameters, train longer, use less dropout. Regularization (dropout, L2) treats overfitting (low train, high validation) and hurts here."
    hints:
      - "Diagnose from the pair of curves first: what do high BOTH losses mean, not a gap between them?"
      - "Regularization reduces overfitting. If the problem is lack of capacity, it pushes the wrong way."
