exercises:
  - id: forward-matrix-shape-001
    concept: forward-pass
    type: theory-quiz
    difficulty: 1
    prompt: "На вход слою подаётся вектор из 3 чисел, в слое 4 нейрона. Какой формы матрица весов W в записи z = W @ x + b?"
    choices:
      - id: a
        text: "3 x 4"
      - id: b
        text: "4 x 3"
      - id: c
        text: "4 x 4"
      - id: d
        text: "3 x 3"
    correct: [b]
    explanation: "В матрице W одна строка на каждый нейрон, а длина строки равна длине входа. 4 нейрона и вход длины 3 дают форму 4 x 3, и на выходе получается 4 числа."
    variants:
      - prompt: "Вход слою - вектор из 5 чисел, в слое 2 нейрона. Какой длины выход слоя?"
        choices:
          - id: a
            text: "5"
          - id: b
            text: "2"
          - id: c
            text: "10"
          - id: d
            text: "7"
        correct: [b]
        explanation: "Длину выхода задаёт число нейронов в слое. Два нейрона дают два числа на выходе, независимо от длины входа."
      - prompt: "Что становится входом второго слоя MLP?"
        choices:
          - id: a
            text: "Исходный вход сети без изменений."
          - id: b
            text: "Выход первого слоя после активации."
          - id: c
            text: "Среднее всех весов первого слоя."
          - id: d
            text: "Вектор смещений первого слоя."
        correct: [b]
        explanation: "В прямом проходе выход одного слоя (после активации) становится входом следующего. Так сигнал идёт по цепочке от входа сети к выходному слою."

  - id: forward-layer-001
    concept: forward-pass
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `layer(x, weights, biases)`: для каждого нейрона посчитайте скалярное произведение `x` на его веса плюс bias и верните список этих сумм (вектор z, без активации). `weights` - список векторов весов, `biases` - список смещений."
    starter: |
      def layer(x, weights, biases):
          ...
    cases:
      - call: "layer([1, 2], [[1, 1], [1, -1]], [0, 0])"
        expect: [3, -1]
      - call: "layer([1, 1, 1], [[2, 0, 1]], [3])"
        expect: [6]
      - call: "layer([2, 3], [[1, 0], [0, 1], [1, 1]], [0, 0, 0])"
        expect: [2, 3, 5]
    solution: |
      def layer(x, weights, biases):
          z = []
          for neuron_weights, b in zip(weights, biases):
              s = sum(xi * wi for xi, wi in zip(x, neuron_weights))
              z.append(s + b)
          return z
    hints:
      - "Каждый нейрон слоя - это отдельная взвешенная сумма входа со своими весами и своим bias. Сколько нейронов, столько чисел в выходном списке."
      - "Идите по парам (веса нейрона, его bias) через zip. Для каждой пары посчитайте z как в одном нейроне и добавьте результат в список."
    variants:
      - cases:
          - call: "layer([5, 5], [[1, -1]], [2])"
            expect: [2]
          - call: "layer([1, 0], [[3, 3], [4, 4]], [1, 1])"
            expect: [4, 5]
          - call: "layer([2, 2, 2], [[1, 1, 1]], [0])"
            expect: [6]
        solution: |
          def layer(x, weights, biases):
              z = []
              for neuron_weights, b in zip(weights, biases):
                  s = sum(xi * wi for xi, wi in zip(x, neuron_weights))
                  z.append(s + b)
              return z
      - cases:
          - call: "layer([3, 1], [[2, 2], [0, 5]], [1, 0])"
            expect: [9, 5]
          - call: "layer([1], [[7]], [0])"
            expect: [7]
          - call: "layer([1, 2, 3], [[1, 1, 1], [2, 0, 0]], [0, 1])"
            expect: [6, 3]
        solution: |
          def layer(x, weights, biases):
              z = []
              for neuron_weights, b in zip(weights, biases):
                  s = sum(xi * wi for xi, wi in zip(x, neuron_weights))
                  z.append(s + b)
              return z

  - id: forward-predict-001
    concept: forward-pass
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа?"
    snippet: |
      def layer(x, weights, biases):
          z = []
          for nw, b in zip(weights, biases):
              z.append(sum(xi * wi for xi, wi in zip(x, nw)) + b)
          return z

      def relu(vec):
          return [max(0.0, v) for v in vec]

      x = [3, 1]
      hidden = relu(layer(x, [[1, -1], [2, 0]], [0, 0]))
      out = layer(hidden, [[1, 1]], [0])
      print(out)
    expected:
      kind: stdout
      value: "[8]"
    hints:
      - "Сначала посчитайте скрытый слой: два нейрона дают два числа, потом ReLU срезает отрицательные до нуля."
      - "Скрытый слой даёт [2, 6], оба положительны, ReLU их не меняет. Выходной нейрон складывает 2 и 6."

  - id: forward-mlp-001
    concept: forward-pass
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `forward(x)` для сети: скрытый слой с весами `[[0.5, -0.5], [1.0, 0.0]]` и bias `[0.0, 1.0]`, ReLU, затем выходной нейрон с весами `[[1.0, 1.0]]` и bias `[0.0]`. Верните выходной вектор (список из одного числа)."
    starter: |
      def forward(x):
          ...
    cases:
      - call: "forward([1.0, 2.0])"
        expect: [2.0]
      - call: "forward([2.0, 2.0])"
        expect: [3.0]
      - call: "forward([0.0, 0.0])"
        expect: [1.0]
    solution: |
      def forward(x):
          def layer(vec, weights, biases):
              out = []
              for neuron_weights, b in zip(weights, biases):
                  s = sum(xi * wi for xi, wi in zip(vec, neuron_weights))
                  out.append(s + b)
              return out

          def relu(vec):
              return [max(0.0, v) for v in vec]

          hidden = relu(layer(x, [[0.5, -0.5], [1.0, 0.0]], [0.0, 1.0]))
          return layer(hidden, [[1.0, 1.0]], [0.0])
    hints:
      - "Прямой проход - это цепочка: выход скрытого слоя (после ReLU) становится входом выходного нейрона. Не пропустите активацию между слоями."
      - "Сначала посчитайте два скрытых нейрона и пропустите их через ReLU. Полученный вектор подайте в выходной нейрон с его весами и bias."
      - "Выходной нейрон один, поэтому возвращаемый список содержит ровно одно число - сумму выходов скрытого слоя с этими весами."

  - id: forward-linearity-001
    concept: forward-pass
    type: theory-quiz
    difficulty: 3
    prompt: "Что произойдёт, если в MLP убрать все активации между слоями?"
    choices:
      - id: a
        text: "Сеть станет считать быстрее, но точность не изменится."
      - id: b
        text: "Вся сеть станет эквивалентна одному линейному слою."
      - id: c
        text: "Сеть перестанет считать прямой проход и упадёт с ошибкой."
      - id: d
        text: "Выход всегда будет равен входу."
    correct: [b]
    explanation: "Каждый слой без активации - линейное преобразование, а композиция линейных преобразований снова линейна. Стопку таких слоёв можно перемножить заранее в одну матрицу, поэтому глубина без нелинейности не даёт ничего сверх одного слоя."
    hints:
      - "Вспомните, чем по сути является один слой без активации - это умножение на матрицу плюс bias, то есть линейное преобразование."
      - "Подумайте, что получится, если два линейных преобразования применить подряд: можно ли заменить их одним?"
