exercises:
  - id: loss-which-for-regression-001
    concept: loss-functions
    type: theory-quiz
    difficulty: 1
    prompt: "A network predicts apartment price (any real number). Which loss function should you use?"
    choices:
      - id: a
        text: "Cross-entropy."
      - id: b
        text: "MSE (mean squared error)."
      - id: c
        text: "softmax."
      - id: d
        text: "ReLU."
    correct: [b]
    explanation: "Predicting a number is regression, and the natural error measure is how far the prediction is from truth. MSE averages squared differences. Cross-entropy is for classification; softmax and ReLU are activations, not losses."
    variants:
      - prompt: "What is the loss when the prediction exactly matches the true value?"
        choices:
          - id: a
            text: "Zero."
          - id: b
            text: "One."
          - id: c
            text: "Infinity."
          - id: d
            text: "Depends on the number of examples."
        correct: [a]
        explanation: "Loss measures gap between prediction and truth. A perfect hit gives zero gap — for both MSE and cross-entropy (-log(1) = 0)."
      - prompt: "Why is the difference squared in MSE?"
        choices:
          - id: a
            text: "To remove the sign and punish large errors more strongly."
          - id: b
            text: "So loss is always an integer."
          - id: c
            text: "To speed up computation."
          - id: d
            text: "So loss falls in the range 0..1."
        correct: [a]
        explanation: "Squaring makes misses high and low equally bad (removes sign) and disproportionately punishes big errors: a miss of 10 contributes 100, of 1 only 1. MSE is sensitive to outliers."

  - id: loss-mse-001
    concept: loss-functions
    type: python-function
    difficulty: 2
    prompt: "Implement `mse(predictions, targets)`: return the mean of squared differences of corresponding elements (mean squared error)."
    starter: |
      def mse(predictions, targets):
          ...
    cases:
      - call: "mse([2.0, 3.0], [2.0, 5.0])"
        expect: 2.0
      - call: "mse([1, 2, 3], [1, 2, 3])"
        expect: 0.0
      - call: "mse([0, 0], [1, 3])"
        expect: 5.0
    solution: |
      def mse(predictions, targets):
          total = 0.0
          for p, t in zip(predictions, targets):
              total += (p - t) ** 2
          return total / len(predictions)
    hints:
      - "MSE is a mean, not a sum: square each pair's difference, then divide by the number of pairs."
      - "Walk (prediction, target) pairs with zip, accumulate (p - t) squared, then divide by len(predictions)."
    variants:
      - cases:
          - call: "mse([5.0], [2.0])"
            expect: 9.0
          - call: "mse([1, 1], [3, 3])"
            expect: 4.0
          - call: "mse([2, 4], [0, 0])"
            expect: 10.0
        solution: |
          def mse(predictions, targets):
              total = 0.0
              for p, t in zip(predictions, targets):
                  total += (p - t) ** 2
              return total / len(predictions)
      - cases:
          - call: "mse([10.0, 10.0], [10.0, 8.0])"
            expect: 2.0
          - call: "mse([0.0], [0.0])"
            expect: 0.0
          - call: "mse([1, 2], [4, 6])"
            expect: 12.5
        solution: |
          def mse(predictions, targets):
              total = 0.0
              for p, t in zip(predictions, targets):
                  total += (p - t) ** 2
              return total / len(predictions)

  - id: loss-ce-predict-001
    concept: loss-functions
    type: predict-output
    difficulty: 2
    prompt: "What does the program print?"
    snippet: |
      preds = [4.0, 4.0]
      targets = [1.0, 4.0]

      total = 0.0
      for p, t in zip(preds, targets):
          total += (p - t) ** 2
      print(total / len(preds))
    expected:
      kind: stdout
      value: "4.5"
    hints:
      - "This is MSE: square each pair's difference, then average. Which pair missed and by how much?"
      - "First pair: difference 3, square 9. Second pair exact: square 0. Mean of 9 and 0 is 4.5."

  - id: loss-cross-entropy-001
    concept: loss-functions
    type: python-function
    difficulty: 3
    prompt: "Implement `cross_entropy(prob_true_class)`: return `-log(p)` where `p` is the probability of the correct class. The `math` module is already imported as `math`."
    starter: |
      import math

      def cross_entropy(prob_true_class):
          ...
    cases:
      - call: "cross_entropy(1.0)"
        expect_approx: 0.0
      - call: "cross_entropy(0.5)"
        expect_approx: 0.6931472
      - call: "cross_entropy(0.1)"
        expect_approx: 2.3025851
    solution: |
      import math

      def cross_entropy(prob_true_class):
          return -math.log(prob_true_class)
    hints:
      - "Cross-entropy punishes lack of confidence in the correct class: confident hit (p near 1) gives almost zero, confident mistake (p near 0) gives large loss."
      - "Take the natural log of the probability and negate it. Check: at p = 1 loss is log(1) = 0."
      - "Logarithm is math.log; the minus sign is required or loss for p < 1 becomes negative."

  - id: loss-ce-vs-mse-001
    concept: loss-functions
    type: theory-quiz
    difficulty: 3
    prompt: "Why use cross-entropy instead of MSE for classification with softmax on the output?"
    choices:
      - id: a
        text: "MSE cannot be computed for probabilities."
      - id: b
        text: "Cross-entropy sharply punishes confident mistakes and gives a strong training signal; MSE punishes weakly in this task."
      - id: c
        text: "MSE always returns infinity for probabilities."
      - id: d
        text: "Cross-entropy does not need correct labels to train."
    correct: [b]
    explanation: "Cross-entropy = -log(p of correct class): on confident mistakes (p near 0) loss and gradient are large, training moves fast. MSE on probabilities weakly punishes confident errors and gives a flat gradient, so the classifier learns slowly. MSE can be computed, but it is the wrong tool."
    hints:
      - "Compare how the two measures punish confident mistakes (correct class probability near zero): which loss and gradient are sharper?"
      - "Recall the shape of -log(p) near zero — it shoots up; think how that compares to squared difference for training speed."
