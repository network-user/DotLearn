exercises:
  - id: activations-why-nonlinearity-001
    concept: activations
    type: theory-quiz
    difficulty: 1
    prompt: "Зачем между слоями сети нужна нелинейная функция активации?"
    choices:
      - id: a
        text: "Чтобы ускорить умножение матриц."
      - id: b
        text: "Без неё стопка линейных слоёв эквивалентна одному слою и не выучит ничего сложнее прямой."
      - id: c
        text: "Чтобы выход всегда был положительным."
      - id: d
        text: "Чтобы уменьшить число весов в сети."
    correct: [b]
    explanation: "Композиция линейных преобразований снова линейна: два слоя без активации можно заменить одним. Нелинейная активация вставляет изгиб, и только тогда добавление слоёв расширяет, что сеть способна выучить."
    variants:
      - prompt: "Что вернёт sigmoid при больших положительных значениях z?"
        choices:
          - id: a
            text: "Значение, близкое к 1."
          - id: b
            text: "Значение, близкое к -1."
          - id: c
            text: "Значение, близкое к 0."
          - id: d
            text: "Само число z без изменений."
        correct: [a]
        explanation: "sigmoid(z) = 1/(1+exp(-z)) зажимает выход в диапазон 0..1: при больших положительных z знаменатель близок к 1, и выход стремится к 1. В нуле выход равен 0.5."
      - prompt: "Чему равен выход ReLU для отрицательного входа?"
        choices:
          - id: a
            text: "Самому входу."
          - id: b
            text: "Нулю."
          - id: c
            text: "Единице."
          - id: d
            text: "Модулю входа."
        correct: [b]
        explanation: "ReLU(z) = max(0, z): отрицательные значения становятся нулём, положительные проходят как есть. Стабильно отрицательный вход обнуляет и выход, и градиент - это эффект «мёртвого нейрона»."

  - id: activations-relu-001
    concept: activations
    type: python-function
    difficulty: 1
    prompt: "Реализуйте `relu(z)`: верните `z`, если оно положительно, иначе `0.0`."
    starter: |
      def relu(z):
          ...
    cases:
      - call: "relu(3.0)"
        expect: 3.0
      - call: "relu(-2.0)"
        expect: 0.0
      - call: "relu(0.0)"
        expect: 0.0
    solution: |
      def relu(z):
          return max(0.0, z)
    hints:
      - "ReLU пропускает положительные значения и срезает отрицательные до нуля. Какое из двух чисел - z или 0 - больше?"
      - "Возьмите максимум из 0.0 и z: для положительного z это сам z, для отрицательного - ноль."
    variants:
      - cases:
          - call: "relu(5.5)"
            expect: 5.5
          - call: "relu(-0.1)"
            expect: 0.0
          - call: "relu(10.0)"
            expect: 10.0
        solution: |
          def relu(z):
              return max(0.0, z)
      - cases:
          - call: "relu(0.5)"
            expect: 0.5
          - call: "relu(-7.0)"
            expect: 0.0
          - call: "relu(2.0)"
            expect: 2.0
        solution: |
          def relu(z):
              return max(0.0, z)

  - id: activations-sigmoid-001
    concept: activations
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `sigmoid(z) = 1 / (1 + exp(-z))`. Модуль `math` уже импортирован как `math`."
    starter: |
      import math

      def sigmoid(z):
          ...
    cases:
      - call: "sigmoid(0.0)"
        expect_approx: 0.5
      - call: "sigmoid(2.0)"
        expect_approx: 0.8807971
      - call: "sigmoid(-1.0)"
        expect_approx: 0.2689414
    solution: |
      import math

      def sigmoid(z):
          return 1 / (1 + math.exp(-z))
    hints:
      - "Сигмоида зажимает любое число в диапазон 0..1. В нуле она обязана давать ровно 0.5 - используйте это как проверку."
      - "Соберите знаменатель 1 + exp(-z), затем поделите единицу на него. Экспонента берётся от -z, а не от z."

  - id: activations-relu-predict-001
    concept: activations
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа?"
    snippet: |
      def relu(z):
          return max(0.0, z)

      zs = [-1.0, 0.0, 2.5, -3.0]
      print([relu(z) for z in zs])
    expected:
      kind: stdout
      value: "[0.0, 0.0, 2.5, 0.0]"
    hints:
      - "Применяйте ReLU к каждому элементу по очереди: отрицательные срезаются до нуля, неотрицательные остаются."
      - "Из четырёх чисел проходит без изменений только 2.5; остальные три становятся 0.0."

  - id: activations-argmax-001
    concept: activations
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `predict_class(logits)`: верните индекс наибольшего логита (предсказанный класс). Так как softmax сохраняет порядок, можно работать прямо с логитами. При равенстве верните наименьший индекс."
    starter: |
      def predict_class(logits):
          ...
    cases:
      - call: "predict_class([2.0, 1.0, 0.1])"
        expect: 0
      - call: "predict_class([0.5, 3.0, 1.0])"
        expect: 1
      - call: "predict_class([-1.0, -2.0, -0.5])"
        expect: 2
    solution: |
      def predict_class(logits):
          best = 0
          for index in range(len(logits)):
              if logits[index] > logits[best]:
                  best = index
          return best
    hints:
      - "softmax не меняет порядок значений: самый большой логит получает самую большую вероятность. Значит, искать максимум вероятности - то же, что искать максимум логита."
      - "Заведите индекс текущего лидера и пройдите по списку: меняйте лидера только при строгом превосходстве, тогда при равенстве останется меньший индекс."
      - "Сравнивайте logits[index] с logits[best]; строгое «больше» гарантирует, что первый из равных максимумов и победит."
    variants:
      - cases:
          - call: "predict_class([0.1, 0.2, 5.0])"
            expect: 2
          - call: "predict_class([9.0, 1.0, 1.0])"
            expect: 0
          - call: "predict_class([1.0, 1.0, 2.0])"
            expect: 2
        solution: |
          def predict_class(logits):
              best = 0
              for index in range(len(logits)):
                  if logits[index] > logits[best]:
                      best = index
              return best
      - cases:
          - call: "predict_class([3.0, 3.0, 1.0])"
            expect: 0
          - call: "predict_class([0.0, 4.0, 4.0])"
            expect: 1
          - call: "predict_class([7.0])"
            expect: 0
        solution: |
          def predict_class(logits):
              best = 0
              for index in range(len(logits)):
                  if logits[index] > logits[best]:
                      best = index
              return best

  - id: activations-softmax-vs-sigmoid-001
    concept: activations
    type: theory-quiz
    difficulty: 3
    prompt: "Сеть классифицирует изображение в один из 10 взаимоисключающих классов. Какую активацию ставить на выходном слое?"
    choices:
      - id: a
        text: "ReLU на каждый выход."
      - id: b
        text: "softmax по всему вектору из 10 значений."
      - id: c
        text: "Отдельную sigmoid на каждый из 10 выходов."
      - id: d
        text: "Никакой активации - вернуть сырые логиты."
    correct: [b]
    explanation: "Классы взаимоисключающие (ровно один верный), поэтому нужны конкурирующие вероятности с суммой 1 - это softmax по всему вектору. Отдельные sigmoid дали бы независимые вероятности и подошли бы для нескольких меток сразу, а не для выбора одного класса."
    hints:
      - "Ключевое слово - «взаимоисключающие»: ровно один класс верный. Какая активация даёт вероятности, которые конкурируют между собой и в сумме дают 1?"
      - "Сравните: softmax связывает выходы в одно распределение, а отдельные sigmoid дают независимые вероятности для каждого выхода."
