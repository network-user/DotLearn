exercises:
  - id: activations-why-nonlinearity-001
    concept: activations
    type: theory-quiz
    difficulty: 1
    prompt: "Why is a nonlinear activation needed between network layers?"
    choices:
      - id: a
        text: "To speed up matrix multiplication."
      - id: b
        text: "Without it a stack of linear layers equals one layer."
      - id: c
        text: "To keep the output always positive."
      - id: d
        text: "To reduce the number of weights in the network."
    correct: [b]
    explanation: "The composition of linear transforms is linear again: two layers without activation can be replaced by one. Nonlinear activation inserts a bend, and only then does adding depth expand what the network can learn."
    variants:
      - prompt: "What does sigmoid return for large positive values of z?"
        choices:
          - id: a
            text: "A value close to 1."
          - id: b
            text: "A value close to -1."
          - id: c
            text: "A value close to 0."
          - id: d
            text: "The number z unchanged."
        correct: [a]
        explanation: "sigmoid(z) = 1/(1+exp(-z)) squeezes output into 0..1: for large positive z the denominator nears 1 and output approaches 1. At zero output is 0.5."
      - prompt: "What is ReLU's output for a negative input?"
        choices:
          - id: a
            text: "The input itself."
          - id: b
            text: "Zero."
          - id: c
            text: "One."
          - id: d
            text: "The absolute value of the input."
        correct: [b]
        explanation: "ReLU(z) = max(0, z): negatives become zero, positives pass through. A consistently negative input zeros both output and gradient: the dead neuron effect."

  - id: activations-relu-001
    concept: activations
    type: python-function
    difficulty: 1
    prompt: "Implement `relu(z)`: return `z` if positive, otherwise `0.0`."
    starter: |
      def relu(z):
          ...
    cases:
      - call: "relu(3.0)"
        expect: 3.0
      - call: "relu(-2.0)"
        expect: 0.0
      - call: "relu(0.0)"
        expect: 0.0
    solution: |
      def relu(z):
          return max(0.0, z)
    hints:
      - "ReLU passes positive values and clips negatives to zero. Which of z and 0 is larger?"
      - "Take the maximum of 0.0 and z: for positive z that is z itself, for negative it is zero."
    variants:
      - cases:
          - call: "relu(5.5)"
            expect: 5.5
          - call: "relu(-0.1)"
            expect: 0.0
          - call: "relu(10.0)"
            expect: 10.0
        solution: |
          def relu(z):
              return max(0.0, z)
      - cases:
          - call: "relu(0.5)"
            expect: 0.5
          - call: "relu(-7.0)"
            expect: 0.0
          - call: "relu(2.0)"
            expect: 2.0
        solution: |
          def relu(z):
              return max(0.0, z)

  - id: activations-sigmoid-001
    concept: activations
    type: python-function
    difficulty: 2
    prompt: "Implement `sigmoid(z) = 1 / (1 + exp(-z))`. The `math` module is already imported as `math`."
    starter: |
      import math

      def sigmoid(z):
          ...
    cases:
      - call: "sigmoid(0.0)"
        expect_approx: 0.5
      - call: "sigmoid(2.0)"
        expect_approx: 0.8807971
      - call: "sigmoid(-1.0)"
        expect_approx: 0.2689414
    solution: |
      import math

      def sigmoid(z):
          return 1 / (1 + math.exp(-z))
    hints:
      - "Sigmoid squeezes any number into 0..1. At zero it must give exactly 0.5; use that as a check."
      - "Build denominator 1 + exp(-z), then divide 1 by it. The exponential is of -z, not z."

  - id: activations-relu-predict-001
    concept: activations
    type: predict-output
    difficulty: 2
    prompt: "What does the program print?"
    snippet: |
      def relu(z):
          return max(0.0, z)

      zs = [-1.0, 0.0, 2.5, -3.0]
      print([relu(z) for z in zs])
    expected:
      kind: stdout
      value: "[0.0, 0.0, 2.5, 0.0]"
    hints:
      - "Apply ReLU to each element in turn: negatives clip to zero, non-negatives stay."
      - "Of the four numbers only 2.5 passes unchanged; the other three become 0.0."

  - id: activations-argmax-001
    concept: activations
    type: python-function
    difficulty: 3
    prompt: "Implement `predict_class(logits)`: return the index of the largest logit (predicted class). Because softmax preserves order, you can work directly with logits. On ties return the smallest index."
    starter: |
      def predict_class(logits):
          ...
    cases:
      - call: "predict_class([2.0, 1.0, 0.1])"
        expect: 0
      - call: "predict_class([0.5, 3.0, 1.0])"
        expect: 1
      - call: "predict_class([-1.0, -2.0, -0.5])"
        expect: 2
    solution: |
      def predict_class(logits):
          best = 0
          for index in range(len(logits)):
              if logits[index] > logits[best]:
                  best = index
          return best
    hints:
      - "softmax does not change value order: the largest logit gets the largest probability. Finding max probability is the same as finding max logit."
      - "Track the current leader index and scan the list: update only on strict improvement so ties keep the smaller index."
      - "Compare logits[index] with logits[best]; strict greater-than ensures the first of equal maxima wins."
    variants:
      - cases:
          - call: "predict_class([0.1, 0.2, 5.0])"
            expect: 2
          - call: "predict_class([9.0, 1.0, 1.0])"
            expect: 0
          - call: "predict_class([1.0, 1.0, 2.0])"
            expect: 2
        solution: |
          def predict_class(logits):
              best = 0
              for index in range(len(logits)):
                  if logits[index] > logits[best]:
                      best = index
              return best
      - cases:
          - call: "predict_class([3.0, 3.0, 1.0])"
            expect: 0
          - call: "predict_class([0.0, 4.0, 4.0])"
            expect: 1
          - call: "predict_class([7.0])"
            expect: 0
        solution: |
          def predict_class(logits):
              best = 0
              for index in range(len(logits)):
                  if logits[index] > logits[best]:
                      best = index
              return best

  - id: activations-softmax-vs-sigmoid-001
    concept: activations
    type: theory-quiz
    difficulty: 3
    prompt: "A network classifies an image into one of 10 mutually exclusive classes. Which activation goes on the output layer?"
    choices:
      - id: a
        text: "ReLU on each output."
      - id: b
        text: "softmax over the full vector of 10 values."
      - id: c
        text: "A separate sigmoid on each of the 10 outputs."
      - id: d
        text: "No activation: return raw logits."
    correct: [b]
    explanation: "Classes are mutually exclusive (exactly one correct), so you need competing probabilities that sum to 1: softmax over the whole vector. Separate sigmoids give independent probabilities and suit multiple labels at once, not picking one class."
    hints:
      - "The key phrase is mutually exclusive: exactly one class is correct. Which activation yields probabilities that compete and sum to 1?"
      - "Compare: softmax ties outputs into one distribution; separate sigmoids give independent probabilities per output."
