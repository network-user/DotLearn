exercises:
  - id: arch-image-001
    concept: architectures
    type: theory-quiz
    difficulty: 1
    prompt: "Which architecture is traditionally used for images?"
    choices:
      - id: a
        text: "MLP - fully connected layers without spatial weight sharing"
      - id: b
        text: "CNN (convolutional network)"
      - id: c
        text: "RNN - sequential model for ordered tokens, not spatial grids"
      - id: d
        text: "Simple linear regression"
    correct: [b]
    explanation: "CNNs are built for spatial data: a sliding filter finds local patterns (edges, textures) with shared weights, giving fewer parameters and translation invariance. An MLP loses pixel neighborhood."
    variants:
      - prompt: "Which architecture is used for text with long dependencies in 2026?"
        choices:
          - id: a
            text: "Transformer"
          - id: b
            text: "CNN"
          - id: c
            text: "MLP"
          - id: d
            text: "Plain RNN without gates"
        correct: [a]
        explanation: "Transformers see long dependencies at once through attention and process sequences in parallel. All large language models are built on them: the dominant architecture for text."
      - prompt: "Which architecture suits tabular features (income, age, purchase count)?"
        choices:
          - id: a
            text: "MLP"
          - id: b
            text: "CNN"
          - id: c
            text: "LSTM"
          - id: d
            text: "Transformer"
        correct: [a]
        explanation: "For tabular data where features are independent and column order carries no meaning, a fully connected MLP fits. CNN or recurrence adds no useful structure here."

  - id: arch-attention-001
    concept: architectures
    type: theory-quiz
    difficulty: 2
    prompt: "What did the attention mechanism replace in the transformer compared to RNNs?"
    choices:
      - id: a
        text: "Step-by-step recurrence: each element looks directly at all others."
      - id: b
        text: "The activation function: attention replaces ReLU."
      - id: c
        text: "The loss function: attention replaces cross-entropy."
      - id: d
        text: "Gradient descent: attention trains without gradients."
    correct: [a]
    explanation: "The transformer dropped passing hidden state step by step (recurrence). Attention lets each element look directly at all others: long dependencies are visible at once and the whole sequence is processed in parallel. Activations, losses, and gradient descent stay."
    variants:
      - prompt: "What is the advantage of shared filter weights in a CNN?"
        choices:
          - id: a
            text: "One filter is reused across the image, so there are far fewer parameters."
          - id: b
            text: "Each pixel gets its own independent weight - mixing the forward pass with the weight-update step"
          - id: c
            text: "Weights no longer need training - mixing the forward pass with the weight-update step"
          - id: d
            text: "The network no longer depends on learning rate"
        correct: [a]
        explanation: "The same filter slides over the whole image seeking a pattern everywhere the same way. Parameters are orders of magnitude fewer than in a fully connected MLP, and translation invariance follows."
      - prompt: "Why does plain RNN have short memory on long sequences?"
        choices:
          - id: a
            text: "Gradient vanishes along the sequence."
          - id: b
            text: "RNN does not use weights."
          - id: c
            text: "RNN processes the whole sequence at once."
          - id: d
            text: "RNN has no hidden state."
        correct: [a]
        explanation: "RNN carries hidden state step by step, but on long sequences gradient vanishes and information from the start is lost by the end. LSTM with controlled gates holds context longer."

  - id: arch-recommend-blanks-001
    concept: architectures
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the data-type to network-family mapping table (values are architecture names)."
    template: |
      recommend = {
          "изображения": "{{images}}",
          "табличные признаки": "{{table}}",
          "текст с длинными зависимостями": "{{text}}",
      }
    blanks:
      images:
        accept: ["CNN"]
      table:
        accept: ["MLP"]
      text:
        accept: ["Transformer"]
    hints:
      - "Each architecture matches its data structure: spatial grid, independent features, long sequence."
      - "Images: convolutions, tabular features: fully connected network, long text: attention."

  - id: arch-recommend-predict-001
    concept: architectures
    type: predict-output
    difficulty: 2
    prompt: "What does the program print?"
    snippet: |
      def recommend(data_kind):
          table = {
              "таблица": "MLP",
              "картинка": "CNN",
              "текст": "Transformer",
          }
          return table.get(data_kind, "уточните тип данных")

      print(recommend("картинка"))
    expected:
      kind: stdout
      value: "CNN"
    hints:
      - "dict.get returns the value for a key, or the default if the key is missing. Is key «картинка» in the dict?"
      - "Key «картинка» exists, so its value is returned, not the default text."
    variants:
      - snippet: |
          def recommend(data_kind):
              table = {
                  "таблица": "MLP",
                  "картинка": "CNN",
                  "текст": "Transformer",
              }
              return table.get(data_kind, "уточните тип данных")

          print(recommend("текст"))
        expected:
          kind: stdout
          value: "Transformer"
      - snippet: |
          def recommend(data_kind):
              table = {
                  "таблица": "MLP",
                  "картинка": "CNN",
                  "текст": "Transformer",
              }
              return table.get(data_kind, "уточните тип данных")

          print(recommend("звук"))
        expected:
          kind: stdout
          value: "уточните тип данных"

  - id: arch-mlp-image-pitfall-001
    concept: architectures
    type: theory-quiz
    difficulty: 3
    prompt: "Why is flattening an image to a long vector and feeding it to an MLP a bad idea?"
    choices:
      - id: a
        text: "MLP cannot process numbers larger than 255."
      - id: b
        text: "Spatial neighborhood of pixels is lost."
      - id: c
        text: "MLP only works on text."
      - id: d
        text: "An image cannot be represented as numbers."
    correct: [b]
    explanation: "In a flattened vector every pixel is an independent input for MLP, so spatial structure (neighbors are related) is lost and must be relearned at every position. Full connectivity also needs a huge weight count. CNN fixes both with a sliding filter and shared weights."
    hints:
      - "Think what happens to information about which pixels are neighbors when you stretch an image into one row."
      - "Compare weight count for a fully connected layer over all pixels versus a small filter."
