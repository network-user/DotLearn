exercises:
  - id: embeddings-cosine-range-001
    concept: embeddings
    type: theory-quiz
    difficulty: 1
    prompt: "Чему равна косинусная близость двух векторов, направленных в одну сторону?"
    choices:
      - id: a
        text: "1"
      - id: b
        text: "0"
      - id: c
        text: "-1"
      - id: d
        text: "Зависит от длины векторов."
    correct: [a]
    explanation: "Косинус угла между сонаправленными векторами равен 1 - максимальная близость. Деление на длины убирает влияние масштаба, поэтому длина роли не играет: важно только направление. 0 - перпендикуляр, -1 - противоположное направление."
    variants:
      - prompt: "Чему равна косинусная близость двух перпендикулярных векторов?"
        choices:
          - id: a
            text: "0"
          - id: b
            text: "1"
          - id: c
            text: "-1"
          - id: d
            text: "0.5"
        correct: [a]
        explanation: "Косинус прямого угла равен 0 - векторы не связаны по направлению. 1 означает одинаковое направление, -1 - противоположное."
      - prompt: "В каком диапазоне лежит косинусная близость?"
        choices:
          - id: a
            text: "От -1 до 1."
          - id: b
            text: "От 0 до 1."
          - id: c
            text: "От 0 до бесконечности."
          - id: d
            text: "От -бесконечности до бесконечности."
        correct: [a]
        explanation: "Косинус угла всегда лежит в диапазоне -1..1: 1 - одинаковое направление, 0 - перпендикуляр, -1 - противоположное. Отрицательное значение не ошибка, а противоположное направление."

  - id: embeddings-dot-001
    concept: embeddings
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `dot(a, b)`: верните скалярное произведение векторов - сумму произведений соответствующих элементов."
    starter: |
      def dot(a, b):
          ...
    cases:
      - call: "dot([1, 2, 3], [4, 5, 6])"
        expect: 32
      - call: "dot([1, 0], [0, 1])"
        expect: 0
      - call: "dot([2, 2], [3, 3])"
        expect: 12
    solution: |
      def dot(a, b):
          total = 0
          for x, y in zip(a, b):
              total += x * y
          return total
    hints:
      - "Скалярное произведение соединяет векторы по позициям: первый элемент с первым, второй со вторым, и так далее. Что делают с этими парами?"
      - "Перемножьте элементы по парам через zip и сложите все произведения в одно число."
    variants:
      - cases:
          - call: "dot([1, 1, 1], [2, 2, 2])"
            expect: 6
          - call: "dot([5], [5])"
            expect: 25
          - call: "dot([1, -1], [1, 1])"
            expect: 0
        solution: |
          def dot(a, b):
              total = 0
              for x, y in zip(a, b):
                  total += x * y
              return total
      - cases:
          - call: "dot([0, 0], [1, 1])"
            expect: 0
          - call: "dot([3, 4], [3, 4])"
            expect: 25
          - call: "dot([1, 2], [2, 1])"
            expect: 4
        solution: |
          def dot(a, b):
              total = 0
              for x, y in zip(a, b):
                  total += x * y
              return total

  - id: embeddings-cosine-predict-001
    concept: embeddings
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа?"
    snippet: |
      from math import sqrt

      a = [1, 1]
      b = [1, 1]

      dot = sum(x * y for x, y in zip(a, b))
      norm_a = sqrt(sum(x * x for x in a))
      norm_b = sqrt(sum(x * x for x in b))
      print(round(dot / (norm_a * norm_b), 4))
    expected:
      kind: stdout
      value: "1.0"
    hints:
      - "Это косинус угла между векторами. Куда направлены два одинаковых вектора друг относительно друга?"
      - "Векторы совпадают, значит угол между ними нулевой, а косинус нуля равен 1."

  - id: embeddings-cosine-001
    concept: embeddings
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `cosine(a, b)`: косинусную близость `(a · b) / (|a| * |b|)`, где |v| - длина вектора (корень из суммы квадратов). Модуль `math` уже импортирован как `math`."
    starter: |
      import math

      def cosine(a, b):
          ...
    cases:
      - call: "cosine([1, 0], [1, 0])"
        expect_approx: 1.0
      - call: "cosine([1, 0], [0, 1])"
        expect_approx: 0.0
      - call: "cosine([1, 0], [-1, 0])"
        expect_approx: -1.0
    solution: |
      import math

      def cosine(a, b):
          dot = sum(x * y for x, y in zip(a, b))
          norm_a = math.sqrt(sum(x * x for x in a))
          norm_b = math.sqrt(sum(x * x for x in b))
          return dot / (norm_a * norm_b)
    hints:
      - "Косинус измеряет угол, а не длину. Соберите три величины: скалярное произведение и длину каждого вектора, затем поделите первое на произведение длин."
      - "Длина вектора - это корень из суммы квадратов его элементов. Знаменатель - произведение двух длин."
      - "Проверка по опорным точкам: одинаковые векторы дают 1, перпендикулярные 0, противоположные -1."
    variants:
      - cases:
          - call: "cosine([1, 1], [2, 2])"
            expect_approx: 1.0
          - call: "cosine([3, 4], [3, 4])"
            expect_approx: 1.0
          - call: "cosine([1, 0], [0, 1])"
            expect_approx: 0.0
        solution: |
          import math

          def cosine(a, b):
              dot = sum(x * y for x, y in zip(a, b))
              norm_a = math.sqrt(sum(x * x for x in a))
              norm_b = math.sqrt(sum(x * x for x in b))
              return dot / (norm_a * norm_b)
      - cases:
          - call: "cosine([2, 1], [3, 1])"
            expect_approx: 0.9899495
          - call: "cosine([1, 0], [1, 0])"
            expect_approx: 1.0
          - call: "cosine([0, 1], [0, -1])"
            expect_approx: -1.0
        solution: |
          import math

          def cosine(a, b):
              dot = sum(x * y for x, y in zip(a, b))
              norm_a = math.sqrt(sum(x * x for x in a))
              norm_b = math.sqrt(sum(x * x for x in b))
              return dot / (norm_a * norm_b)

  - id: embeddings-why-normalize-001
    concept: embeddings
    type: theory-quiz
    difficulty: 3
    prompt: "Зачем в косинусной близости делят скалярное произведение на длины векторов?"
    choices:
      - id: a
        text: "Чтобы ускорить вычисление."
      - id: b
        text: "Чтобы убрать влияние масштаба."
      - id: c
        text: "Чтобы результат всегда был целым числом."
      - id: d
        text: "Чтобы результат попал в диапазон от 0 до 1."
    correct: [b]
    explanation: "Голое скалярное произведение растёт с длиной векторов, поэтому само по себе не мера близости. Деление на длины убирает масштаб: сонаправленные векторы любой длины дают косинус 1. Так измеряется именно угол. Диапазон при этом -1..1, а не 0..1."
    hints:
      - "Подумайте, что станет со скалярным произведением, если оба вектора удлинить вдвое, не меняя направления."
      - "Косинус должен зависеть только от угла между векторами, а не от того, какой они длины."
