conceptId: activations
cards:
  - id: activations-01
    front: "Почему без нелинейной активации глубокая сеть бесполезна?"
    back: "Композиция линейных слоёв снова линейна: стопку из любого числа линейных слоёв можно заменить одним. Только нелинейная активация между слоями даёт сети выразительность сильнее прямой линии."
    tags: [nonlinearity]
  - id: activations-02
    front: "Что делает sigmoid и каков её диапазон?"
    back: "sigmoid(z) = 1/(1+exp(-z)) зажимает любое число в диапазон 0..1, поэтому выход читается как вероятность. В нуле даёт 0.5, на краях насыщается (производная близка к нулю)."
    tags: [sigmoid]
  - id: activations-03
    front: "Чем tanh отличается от sigmoid?"
    back: "Та же S-образная форма, но диапазон -1..1 и центр в нуле. Центрированность обычно делает tanh удобнее sigmoid для скрытых слоёв, но насыщение на краях остаётся."
    tags: [tanh]
  - id: activations-04
    front: "Как устроена ReLU и почему она популярна?"
    back: "ReLU(z) = max(0, z): отрицательные значения обнуляются, положительные проходят. Дёшево считается, не насыщается на положительной стороне, пропускает градиент - стандарт для скрытых слоёв."
    tags: [relu]
  - id: activations-05
    front: "Что такое «мёртвый нейрон» у ReLU?"
    back: "Если вход нейрона стабильно отрицателен, ReLU всегда даёт 0, градиент тоже 0, и нейрон перестаёт учиться. С этим борются вариантами вроде Leaky ReLU с ненулевой отрицательной стороной."
    tags: [relu, pitfalls]
  - id: activations-06
    front: "Что делает softmax?"
    back: "Превращает вектор логитов в вероятности: каждое значение положительно, а вся сумма равна 1. Нужна на выходе классификатора для выбора одного класса из нескольких."
    tags: [softmax]
  - id: activations-07
    front: "Почему наивный softmax переполняется и как это лечат?"
    back: "exp от большого логита уходит в бесконечность. Перед экспонентой из всех логитов вычитают их максимум: доли не меняются, а числа остаются конечными. Это «стабильный softmax»."
    tags: [softmax, pitfalls]
  - id: activations-08
    front: "softmax или sigmoid: один класс из многих против нескольких независимых меток?"
    back: "Для выбора одного класса из нескольких (классы конкурируют, сумма 1) берут softmax. Для нескольких независимых меток (каждая может быть истинна сама по себе) берут отдельную sigmoid на каждый выход."
    tags: [softmax, sigmoid]
  - id: activations-09
    front: "Нужна ли активация на выходном слое регрессии?"
    back: "Нет. Если сеть предсказывает любое число (цену, температуру), на последнем слое активация не ставится: sigmoid там зажала бы ответ в 0..1 и сломала предсказание."
    tags: [pitfalls]
  - id: activations-10
    front: "Какую активацию брать по умолчанию для скрытых слоёв глубокой сети и почему не sigmoid?"
    back: "ReLU. У sigmoid и tanh производная на краях близка к нулю; при углублении градиент затухает (vanishing gradient), и нижние слои почти не учатся. У ReLU производная на положительной стороне равна 1."
    tags: [relu, pitfalls]
