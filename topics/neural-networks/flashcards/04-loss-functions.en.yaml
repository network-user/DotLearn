conceptId: loss-functions
cards:
  - id: loss-functions-01
    front: "What is a loss function?"
    back: "A measure of gap between network prediction and correct answer, compressed to one number. Zero is perfect, larger is worse. Training seeks weights that minimize it."
    tags: [basics]
  - id: loss-functions-02
    front: "Why does training need a single scalar loss?"
    back: "The optimizer needs a quantity to decrease. Gradient descent rolls weights where loss falls; without a scalar error measure there is no direction for training."
    tags: [basics]
  - id: loss-functions-03
    front: "How is MSE computed?"
    back: "MSE = mean of squared differences: for each (prediction, target) take (p - t)^2, sum, divide by number of pairs."
    tags: [mse]
  - id: loss-functions-04
    front: "Why square the difference in MSE?"
    back: "Squaring removes sign (miss high and low equally bad) and punishes large errors harder: miss of 10 contributes 100. MSE is sensitive to outliers."
    tags: [mse]
  - id: loss-functions-05
    front: "How is cross-entropy computed for one example?"
    back: "loss = -log(probability of correct class). With one-hot labels the full formula reduces to -log(p of correct class)."
    tags: [cross-entropy]
  - id: loss-functions-06
    front: "What is cross-entropy when the network assigns probability 1.0 to the correct class?"
    back: "Zero: -log(1) = 0. Confident correct hits are not penalized. Lower probability on the correct class means higher loss."
    tags: [cross-entropy]
  - id: loss-functions-07
    front: "What happens to cross-entropy on confident mistakes (p near 0)?"
    back: "-log(p) becomes large — harsh penalty. That sharpness teaches the classifier to be confident in the right answer."
    tags: [cross-entropy]
  - id: loss-functions-08
    front: "Which loss for regression versus classification?"
    back: "Regression (predict a number) — MSE. Classification (class probabilities via softmax) — cross-entropy. Swapping measures slows or breaks training."
    tags: [choice]
  - id: loss-functions-09
    front: "Why can cross-entropy explode and how is it fixed?"
    back: "Undefined at probability exactly 0: log(0) is negative infinity. Practice clamps probability (e.g. not below 1e-7) so the log stays finite."
    tags: [pitfalls]
  - id: loss-functions-10
    front: "Where does the minus-logarithm in cross-entropy come from?"
    back: "Information theory: -log(p) is surprise at event probability p. Minimizing cross-entropy teaches the network not to be surprised by correct answers — assign them high probability."
    tags: [theory]
