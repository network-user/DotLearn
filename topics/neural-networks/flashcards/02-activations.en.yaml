conceptId: activations
cards:
  - id: activations-01
    front: "Why is a deep network useless without nonlinear activation?"
    back: "Composition of linear layers is linear again: any stack of linear layers equals one. Only nonlinear activation between layers gives expressive power beyond a straight line."
    tags: [nonlinearity]
  - id: activations-02
    front: "What does sigmoid do and what is its range?"
    back: "sigmoid(z) = 1/(1+exp(-z)) squeezes any number into 0..1, so output reads as probability. At zero it gives 0.5; at the edges it saturates (derivative near zero)."
    tags: [sigmoid]
  - id: activations-03
    front: "How does tanh differ from sigmoid?"
    back: "Same S-shape but range -1..1 and center at zero. Centering usually makes tanh more convenient than sigmoid for hidden layers, but edge saturation remains."
    tags: [tanh]
  - id: activations-04
    front: "How does ReLU work and why is it popular?"
    back: "ReLU(z) = max(0, z): negatives zero out, positives pass. Cheap to compute, no saturation on the positive side, passes gradient — default for hidden layers."
    tags: [relu]
  - id: activations-05
    front: "What is a dead neuron with ReLU?"
    back: "If input stays negative, ReLU always outputs 0, gradient is 0, and the neuron stops learning. Variants like Leaky ReLU use a non-zero negative side."
    tags: [relu, pitfalls]
  - id: activations-06
    front: "What does softmax do?"
    back: "Turns a logit vector into probabilities: each value positive and the sum equals 1. Used on classifier output to pick one class from several."
    tags: [softmax]
  - id: activations-07
    front: "Why does naive softmax overflow and how is it fixed?"
    back: "exp of a large logit blows up. Subtract the max logit from all logits before exp: proportions unchanged, numbers stay finite. That is stable softmax."
    tags: [softmax, pitfalls]
  - id: activations-08
    front: "softmax or sigmoid: one class from many versus several independent labels?"
    back: "One class from several (competing, sum 1) — softmax. Several independent labels (each may be true alone) — separate sigmoid per output."
    tags: [softmax, sigmoid]
  - id: activations-09
    front: "Is activation needed on a regression output layer?"
    back: "No. If the network predicts any real number (price, temperature), the last layer has no activation: sigmoid there would squeeze into 0..1 and break prediction."
    tags: [pitfalls]
  - id: activations-10
    front: "Default activation for hidden layers of a deep network, and why not sigmoid?"
    back: "ReLU. Sigmoid and tanh derivatives at edges are near zero; deeper layers suffer vanishing gradient and barely learn. ReLU's derivative on the positive side is 1."
    tags: [relu, pitfalls]
