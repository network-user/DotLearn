conceptId: forward-pass
cards:
  - id: forward-pass-01
    front: "What is a forward pass?"
    back: "The path of data from input to answer: input enters the first layer, its output feeds the second, and so on to the output layer. Computation only — no learning."
    tags: [basics]
  - id: forward-pass-02
    front: "How does one layer compute its output?"
    back: "z = W @ x + b, then a = activation(z). Matrix W has one weight row per neuron, b is the bias vector; all computed in one matrix multiply."
    tags: [layer]
  - id: forward-pass-03
    front: "What shape is weight matrix W for input length n and m neurons?"
    back: "m x n: one row per neuron, row length equals input length. Output is a vector of length m."
    tags: [shapes]
  - id: forward-pass-04
    front: "What sets a layer's output length?"
    back: "The number of neurons in the layer. As many neurons as numbers on output — regardless of input length."
    tags: [shapes]
  - id: forward-pass-05
    front: "What is an MLP (multi-layer perceptron)?"
    back: "Several fully connected layers in a row: every neuron connects to all outputs of the previous layer, with nonlinear activation between layers."
    tags: [mlp]
  - id: forward-pass-06
    front: "What becomes the next layer's input?"
    back: "The previous layer's output after activation. Signal chains: one layer's output is the next layer's input."
    tags: [mlp]
  - id: forward-pass-07
    front: "Does anything get trained during forward pass?"
    back: "No. Forward pass only computes an answer with current weights. Weights change via backward pass and gradient descent. A random init network honestly outputs nonsense."
    tags: [training]
  - id: forward-pass-08
    front: "How does hidden-layer activation differ from output-layer activation?"
    back: "Hidden layers usually use ReLU. Output activation is chosen for the task: softmax for classification, none for regression."
    tags: [activation]
  - id: forward-pass-09
    front: "Most common reason a forward pass crashes?"
    back: "Dimension mismatch: input length must match each neuron's weight count, and W must be m x n. A transposed matrix errors or silently gives wrong results."
    tags: [pitfalls]
  - id: forward-pass-10
    front: "Why process data in batches?"
    back: "A batch is one large matrix multiply X @ W.T + b — faster than looping examples and needed for training: gradient is averaged over the batch."
    tags: [batch]
