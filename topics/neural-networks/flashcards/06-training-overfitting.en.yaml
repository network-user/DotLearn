conceptId: training-overfitting
cards:
  - id: training-overfitting-01
    front: "What is overfitting?"
    back: "The network memorized the training set instead of generalizing: train loss falls nearly to zero but quality on new data (validation) is poor. Training aims at generalization, not memorization."
    tags: [overfitting]
  - id: training-overfitting-02
    front: "Why split data into train, validation, and test?"
    back: "Train — fit weights. Validation — monitor and tune hyperparameters (weights not fit on it). Test — one final unbiased measure. Sets must not overlap."
    tags: [splits]
  - id: training-overfitting-03
    front: "How do loss curves show the start of overfitting?"
    back: "Train loss keeps falling while validation loss turns up. The inflection is when the network started fitting train at the expense of the general rule."
    tags: [overfitting]
  - id: training-overfitting-04
    front: "What does dropout do?"
    back: "During training randomly disables some neurons (zeros outputs) each step so the network cannot rely on one neuron and learns robust features. Off at inference."
    tags: [dropout]
  - id: training-overfitting-05
    front: "What is early stopping?"
    back: "Stop training where validation loss stopped improving. Training further only improves train — that is overfitting."
    tags: [early-stopping]
  - id: training-overfitting-06
    front: "What does L2 regularization do?"
    back: "Adds a penalty for large weights to the loss, pushing them toward zero. Smaller weights give a smoother, simpler function that is harder to overfit."
    tags: [regularization]
  - id: training-overfitting-07
    front: "How does underfitting differ from overfitting?"
    back: "Underfitting: BOTH train and validation loss high — insufficient capacity or training. Overfitting: train loss low, validation high (large gap)."
    tags: [underfitting]
  - id: training-overfitting-08
    front: "Why does regularization hurt underfitting?"
    back: "Underfitting is lack of capacity or training; dropout and L2 restrict the network further. Fix: more parameters, longer training, less regularization."
    tags: [underfitting]
  - id: training-overfitting-09
    front: "Why must dropout be off at inference?"
    back: "During training it randomly disables neurons. Left on at inference, predictions vary run to run. Frameworks switch modes (model.train() vs model.eval())."
    tags: [dropout, pitfalls]
  - id: training-overfitting-10
    front: "Most reliable fix for overfitting?"
    back: "More data: diverse train is harder to memorize. When you cannot add data, use augmentation — artificially enlarge the set (rotations, noise)."
    tags: [data]
