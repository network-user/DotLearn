conceptId: training-overfitting
cards:
  - id: training-overfitting-01
    front: "Что такое переобучение (overfitting)?"
    back: "Сеть зазубрила обучающую выборку вместо того, чтобы обобщать: train-потеря падает почти до нуля, а на новых данных (validation) качество плохое. Цель обучения - обобщение, а не запоминание."
    tags: [overfitting]
  - id: training-overfitting-02
    front: "Зачем данные делят на train, validation и test?"
    back: "Train - подбор весов. Validation - контроль качества и настройка гиперпараметров (веса по нему не подбирают). Test - один финальный непредвзятый замер. Наборы не должны пересекаться."
    tags: [splits]
  - id: training-overfitting-03
    front: "Как по кривым потерь увидеть начало переобучения?"
    back: "Train-потеря продолжает падать, а validation-потеря разворачивается и начинает расти. Точка разворота - момент, когда сеть начала подгоняться под train в ущерб обобщению."
    tags: [overfitting]
  - id: training-overfitting-04
    front: "Что делает dropout?"
    back: "Во время обучения случайно выключает часть нейронов (зануляет их выходы) на каждом шаге, чтобы сеть не полагалась на отдельный нейрон и училась устойчивым признакам. На инференсе dropout выключают."
    tags: [dropout]
  - id: training-overfitting-05
    front: "Что такое ранняя остановка (early stopping)?"
    back: "Прекращение обучения в точке, где validation-потеря перестала падать. Дальше учить - значит переобучать, потому что улучшается только train."
    tags: [early-stopping]
  - id: training-overfitting-06
    front: "Что делает L2-регуляризация?"
    back: "Добавляет к потере штраф за большие веса, подталкивая их к нулю. Меньшие веса дают более гладкую, простую функцию, которую труднее переобучить."
    tags: [regularization]
  - id: training-overfitting-07
    front: "Чем недообучение (underfitting) отличается от переобучения?"
    back: "При недообучении высоки ОБЕ потери (train и validation) - сети не хватает ёмкости или обучения. При переобучении train-потеря низкая, а validation высокая (большой разрыв)."
    tags: [underfitting]
  - id: training-overfitting-08
    front: "Почему регуляризация вредит при недообучении?"
    back: "Недообучение - нехватка ёмкости или обучения, а dropout и L2 ещё сильнее ограничивают сеть. Нужно наоборот: больше параметров, дольше обучать, меньше регуляризации."
    tags: [underfitting]
  - id: training-overfitting-09
    front: "Почему dropout должен быть выключен на инференсе?"
    back: "При обучении он выключает случайные нейроны. Если оставить его на инференсе, предсказания станут случайными от запуска к запуску. Фреймворки переключают режим (model.train() против model.eval())."
    tags: [dropout, pitfalls]
  - id: training-overfitting-10
    front: "Какое лекарство от переобучения самое надёжное?"
    back: "Больше данных: чем разнообразнее train, тем труднее его зазубрить. Когда данных не добавить, применяют аугментацию - искусственно расширяют выборку (повороты, шум)."
    tags: [data]
