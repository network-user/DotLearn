conceptId: embeddings
cards:
  - id: embeddings-01
    front: "Что такое эмбеддинг (embedding)?"
    back: "Представление объекта (слова, товара, картинки) вектором чисел так, чтобы близость векторов отражала близость смысла: похожие объекты получают близкие векторы."
    tags: [basics]
  - id: embeddings-02
    front: "Откуда берутся координаты эмбеддингов?"
    back: "Их не задают вручную - сеть выучивает их при обучении так, чтобы объекты из похожих контекстов оказались рядом. Эмбеддинги обычно обучаемые параметры, которые двигает градиентный спуск."
    tags: [learning]
  - id: embeddings-03
    front: "Что значит «король - мужчина + женщина ≈ королева»?"
    back: "В хороших эмбеддингах направления в пространстве несут смысл: разность векторов кодирует отношение (например, «пол»). Арифметика над векторами даёт осмысленные результаты."
    tags: [structure]
  - id: embeddings-04
    front: "Как считается косинусная близость двух векторов?"
    back: "cos(a, b) = (a · b) / (|a| * |b|): скалярное произведение, делённое на произведение длин. Это косинус угла между векторами."
    tags: [cosine]
  - id: embeddings-05
    front: "В каком диапазоне лежит косинусная близость и что значат края?"
    back: "От -1 до 1. 1 - одинаковое направление (максимально похожи), 0 - перпендикулярны (не связаны), -1 - противоположны."
    tags: [cosine]
  - id: embeddings-06
    front: "Почему косинус делит на длины векторов?"
    back: "Чтобы убрать влияние масштаба и измерять только направление (угол). Голое скалярное произведение растёт с длиной, поэтому само по себе не мера близости."
    tags: [cosine]
  - id: embeddings-07
    front: "Чему равна косинусная близость [1,1] и [100,100]?"
    back: "Ровно 1.0: векторы сонаправлены, а косинус игнорирует длину. По обычному расстоянию они далеки, но по направлению идентичны - в этом и суть меры."
    tags: [cosine]
  - id: embeddings-08
    front: "Почему косинус не определён для нулевого вектора?"
    back: "У нулевого вектора длина равна нулю, и деление на длину ломается. Перед расчётом проверяют, что оба вектора ненулевые; нулевой эмбеддинг обычно признак необработанного объекта."
    tags: [pitfalls]
  - id: embeddings-09
    front: "Можно ли сравнивать эмбеддинги из разных моделей?"
    back: "Нет. Координаты осмысленны только внутри одного пространства. Вектор из одной модели и вектор из другой несопоставимы - близость между ними бессмысленна."
    tags: [pitfalls]
  - id: embeddings-10
    front: "Что такое контекстные эмбеддинги в больших языковых моделях?"
    back: "Входной эмбеддинг слова уточняется контекстом на каждом слое внимания, поэтому одно и то же слово в разных предложениях получает разные итоговые векторы - представление зависит от контекста."
    tags: [llm]
