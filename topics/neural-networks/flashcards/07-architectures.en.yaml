conceptId: architectures
cards:
  - id: architectures-01
    front: "Main principle for choosing a network architecture?"
    back: "Network structure should mirror data structure: tabular features go to MLP, images to CNN, sequences to RNN/LSTM or Transformer."
    tags: [overview]
  - id: architectures-02
    front: "What data suits an MLP and what is its weakness?"
    back: "Tabular features where column order carries no meaning. Weakness: no data structure, so for an image every pixel becomes an independent input and neighborhood is lost."
    tags: [mlp]
  - id: architectures-03
    front: "How does a CNN work and what two wins does it give?"
    back: "A small filter slides over the image seeking a local pattern everywhere. Wins: shared weights (far fewer parameters) and translation invariance (object recognized anywhere)."
    tags: [cnn]
  - id: architectures-04
    front: "What does an RNN carry from step to step?"
    back: "Hidden state: memory of earlier sequence elements. The network can use context: current element depends on previous ones."
    tags: [rnn]
  - id: architectures-05
    front: "How is LSTM better than plain RNN?"
    back: "Plain RNN has short memory: gradient vanishes on long sequences and the start is forgotten. LSTM adds controlled gates (remember, forget, output) and holds context longer."
    tags: [lstm]
  - id: architectures-06
    front: "What did the transformer replace compared to RNN?"
    back: "Step-by-step recurrence with attention: each element looks directly at all others. Long dependencies visible at once, sequence processed in parallel."
    tags: [transformer]
  - id: architectures-07
    front: "Why did transformers become the basis of large language models?"
    back: "Attention removes RNN's bottleneck (long dependencies) and enables parallel processing of the whole sequence, critical at huge data scale. Dominant for text by 2026."
    tags: [transformer]
  - id: architectures-08
    front: "Why does attention scale better than recurrence, and what is the cost?"
    back: "RNN is strictly sequential (not parallelizable); attention does all-pairs links in one matrix multiply, in parallel. Cost: attention is quadratic in sequence length."
    tags: [transformer]
  - id: architectures-09
    front: "Why is training a large network from scratch rare in practice?"
    back: "Modern transformers have billions of parameters; training from scratch is expensive. Take a pretrained model and fine-tune it, which is cheaper and usually better on small data."
    tags: [practice]
  - id: architectures-10
    front: "Have boundaries between architecture families blurred?"
    back: "Yes: transformers on images (vision transformers), CNN on audio (spectrogram as image). Data-to-architecture is a starting point, not dogma."
    tags: [overview]
