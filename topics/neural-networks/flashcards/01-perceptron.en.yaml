conceptId: perceptron
cards:
  - id: perceptron-01
    front: "What two steps make up one neuron's computation?"
    back: "Step 1, weighted sum: inputs times weights are summed and bias is added, producing z. Step 2, activation: z passes through a function that yields output in the needed range."
    tags: [basics]
  - id: perceptron-02
    front: "How is weighted sum z written for inputs x and weights w?"
    back: "z = w1*x1 + w2*x2 + ... + wn*xn + b. This is the dot product of input and weight vectors plus bias b."
    tags: [basics]
  - id: perceptron-03
    front: "What does weight wi control?"
    back: "The strength and sign of input xi's influence on the sum. Positive pulls z up as input grows, negative pulls down, near zero makes the input almost irrelevant."
    tags: [weights]
  - id: perceptron-04
    front: "Why is bias needed?"
    back: "A separate learnable term b. It shifts the sum up or down regardless of inputs: even at zero inputs z equals b. Bias moves the decision boundary off the origin."
    tags: [bias]
  - id: perceptron-05
    front: "How does z differ from a neuron's output?"
    back: "z is the raw weighted sum, unbounded. Output is activation(z), for example sigmoid(z) in range 0..1."
    tags: [basics]
  - id: perceptron-06
    front: "What is sigmoid(0)?"
    back: "Exactly 0.5, because 1 / (1 + exp(0)) = 1 / 2. At z = 0 a sigmoid neuron leans neither yes nor no."
    tags: [sigmoid]
  - id: perceptron-07
    front: "Why can't one perceptron solve XOR?"
    back: "Its output is activation of a linear sum, so the class boundary is always a straight line. XOR classes sit diagonally and no line separates them: you need at least two layers."
    tags: [limits]
  - id: perceptron-08
    front: "Why can't the original step-activation perceptron be trained with gradient descent?"
    back: "A step has no useful derivative: it is almost everywhere zero and does not say which way to move weights. Smooth activations like sigmoid replaced it."
    tags: [history]
  - id: perceptron-09
    front: "Why normalize inputs before feeding a network?"
    back: "Features at different scales distort the sum: an input in thousands dominates one in ones at equal weights. Normalization equalizes feature contribution."
    tags: [pitfalls]
  - id: perceptron-10
    front: "Who proposed the perceptron and when, and where does the name come from?"
    back: "Frank Rosenblatt in 1958, by analogy to the biological neuron: dendrites collect signals, the cell body sums, and when a threshold is exceeded the axon fires."
    tags: [history]
