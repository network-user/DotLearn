conceptId: perceptron
cards:
  - id: perceptron-01
    front: "Из каких двух шагов состоит работа одного нейрона?"
    back: "Шаг 1 - взвешенная сумма: входы умножаются на веса, складываются и к ним добавляется bias, получается число z. Шаг 2 - активация: z пропускается через функцию, дающую выход в нужном диапазоне."
    tags: [basics]
  - id: perceptron-02
    front: "Как записывается взвешенная сумма z для входов x и весов w?"
    back: "z = w1*x1 + w2*x2 + ... + wn*xn + b. Это скалярное произведение векторов входа и весов плюс смещение b."
    tags: [basics]
  - id: perceptron-03
    front: "Что задаёт вес wi?"
    back: "Силу и знак влияния входа xi на сумму. Положительный вес тянет z вверх с ростом входа, отрицательный - вниз, вес около нуля делает вход почти неважным."
    tags: [weights]
  - id: perceptron-04
    front: "Зачем нужен bias (смещение)?"
    back: "Это отдельное обучаемое слагаемое b. Оно сдвигает сумму вверх или вниз независимо от входов: даже при нулевых входах z равно b. Bias двигает границу решения, освобождая её от начала координат."
    tags: [bias]
  - id: perceptron-05
    front: "Чем отличается z от выхода нейрона?"
    back: "z - сырая взвешенная сумма, она не ограничена и может улетать в любую сторону. Выход - это активация(z), например sigmoid(z) в диапазоне 0..1."
    tags: [basics]
  - id: perceptron-06
    front: "Чему равна sigmoid(0)?"
    back: "Ровно 0.5, потому что 1 / (1 + exp(0)) = 1 / 2. При z = 0 нейрон с сигмоидой не склоняется ни к «да», ни к «нет»."
    tags: [sigmoid]
  - id: perceptron-07
    front: "Почему один перцептрон не решает XOR?"
    back: "Его выход - активация от линейной суммы, поэтому граница между классами всегда прямая. Классы XOR расположены по диагонали и прямой не разделяются - нужны хотя бы два слоя."
    tags: [limits]
  - id: perceptron-08
    front: "Почему исходный перцептрон со ступенчатой активацией нельзя обучать градиентным спуском?"
    back: "У ступеньки нет полезной производной: она почти везде равна нулю и не подсказывает, куда двигать веса. Поэтому перешли к гладким активациям вроде sigmoid."
    tags: [history]
  - id: perceptron-09
    front: "Почему входы перед подачей в сеть нормируют?"
    back: "Признаки разного масштаба искажают сумму: вход в тысячах при тех же весах задавит вход в единицах просто из-за величины. Нормировка уравнивает вклад признаков."
    tags: [pitfalls]
  - id: perceptron-10
    front: "Кто и когда предложил перцептрон и откуда название?"
    back: "Фрэнк Розенблатт в 1958 году, по аналогии с биологическим нейроном: дендриты собирают сигналы, тело клетки суммирует, при превышении порога аксон выдаёт импульс."
    tags: [history]
