conceptId: architectures
cards:
  - id: architectures-01
    front: "Главный принцип выбора архитектуры сети?"
    back: "Структура сети должна повторять структуру данных: табличные признаки - MLP, изображения - CNN, последовательности - RNN/LSTM или Transformer."
    tags: [overview]
  - id: architectures-02
    front: "Для каких данных подходит MLP и в чём его слабость?"
    back: "Для табличных признаков, где порядок столбцов не несёт смысла. Слабость: он не знает о структуре данных - для картинки все пиксели становятся независимыми входами, и соседство теряется."
    tags: [mlp]
  - id: architectures-03
    front: "Как устроена CNN и какие два выигрыша она даёт?"
    back: "Небольшой фильтр (ядро) скользит по картинке, ища локальный паттерн в каждом месте. Выигрыши: разделяемые веса (намного меньше параметров) и трансляционная инвариантность (объект узнаётся в любом месте кадра)."
    tags: [cnn]
  - id: architectures-04
    front: "Что переносит RNN от шага к шагу?"
    back: "Скрытое состояние - память о том, что было раньше в последовательности. Так сеть может учитывать контекст: текущий элемент зависит от предыдущих."
    tags: [rnn]
  - id: architectures-05
    front: "Чем LSTM лучше простой RNN?"
    back: "У простой RNN короткая память: на длинных последовательностях градиент затухает и начало забывается. LSTM добавляет управляемые ворота (что запомнить, забыть, выдать) и удерживает контекст дольше."
    tags: [lstm]
  - id: architectures-06
    front: "Что заменил трансформер по сравнению с RNN?"
    back: "Пошаговую рекуррентность - механизмом внимания: каждый элемент напрямую смотрит на все остальные. Длинные зависимости видны сразу, последовательность обрабатывается параллельно."
    tags: [transformer]
  - id: architectures-07
    front: "Почему трансформеры стали основой больших языковых моделей?"
    back: "Внимание снимает узкое место RNN (длинные зависимости) и позволяет обрабатывать всю последовательность параллельно, что критично для обучения на огромных данных. К 2026 году это доминирующая архитектура для текста."
    tags: [transformer]
  - id: architectures-08
    front: "Почему внимание масштабируется лучше рекуррентности, и какова плата?"
    back: "RNN считает элементы строго по шагам (не распараллелить), внимание считает все связи за одно матричное умножение - параллельно. Плата: стоимость внимания квадратична по длине последовательности."
    tags: [transformer]
  - id: architectures-09
    front: "Почему на практике редко обучают большую сеть с нуля?"
    back: "У современных трансформеров миллиарды параметров; обучать их с нуля дорого. Берут предобученную модель и дообучают (fine-tuning) под свою задачу - дешевле и обычно точнее на небольших данных."
    tags: [practice]
  - id: architectures-10
    front: "Размылась ли граница между семействами архитектур?"
    back: "Да: трансформеры применяют к изображениям (vision transformers), CNN - к звуку (спектрограмма как картинка). Связка «данные -> архитектура» - хорошая отправная точка, но не догма."
    tags: [overview]
