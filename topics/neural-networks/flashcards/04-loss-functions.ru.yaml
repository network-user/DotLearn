conceptId: loss-functions
cards:
  - id: loss-functions-01
    front: "Что такое функция потерь (loss)?"
    back: "Мера расхождения между предсказанием сети и правильным ответом, сжатая в одно число. Ноль - идеальное попадание, больше - хуже. Обучение ищет веса, минимизирующие это число."
    tags: [basics]
  - id: loss-functions-02
    front: "Зачем обучению нужна именно одна числовая потеря?"
    back: "Оптимизатору нужна величина, которую можно уменьшать. Градиентный спуск катит веса в сторону, где потеря падает; без скалярной меры ошибки направлять обучение нечем."
    tags: [basics]
  - id: loss-functions-03
    front: "Как считается MSE?"
    back: "MSE = среднее квадратов разностей: для каждой пары (предсказание, цель) берут (p - t)^2, складывают и делят на число пар."
    tags: [mse]
  - id: loss-functions-04
    front: "Зачем в MSE возводят разность в квадрат?"
    back: "Квадрат убирает знак (промах вверх и вниз одинаково плохи) и непропорционально штрафует крупные ошибки: промах на 10 даёт вклад 100. Из-за этого MSE чувствительна к выбросам."
    tags: [mse]
  - id: loss-functions-05
    front: "Как считается кросс-энтропия для одного примера?"
    back: "loss = -log(вероятность правильного класса). При one-hot разметке от полной формулы остаётся именно -log(p правильного класса)."
    tags: [cross-entropy]
  - id: loss-functions-06
    front: "Чему равна кросс-энтропия, если сеть дала правильному классу вероятность 1.0?"
    back: "Нулю: -log(1) = 0. Уверенное попадание не штрафуется. Чем меньше вероятность правильного класса, тем больше потеря."
    tags: [cross-entropy]
  - id: loss-functions-07
    front: "Что происходит с кросс-энтропией при уверенной ошибке (p близко к 0)?"
    back: "-log(p) уходит в большую величину - жёсткий штраф. Именно эта резкость учит классификатор быть уверенным в верном ответе."
    tags: [cross-entropy]
  - id: loss-functions-08
    front: "Какую потерю брать для регрессии, а какую для классификации?"
    back: "Регрессия (предсказание числа) - MSE. Классификация (вероятности классов через softmax) - кросс-энтропия. Подмена меры замедляет или ломает обучение."
    tags: [choice]
  - id: loss-functions-09
    front: "Почему кросс-энтропия может «взорваться» и как это лечат?"
    back: "Она не определена при вероятности ровно 0: log(0) - минус бесконечность. На практике вероятность зажимают в коридор (например, не ниже 1e-7), чтобы логарифм оставался конечным."
    tags: [pitfalls]
  - id: loss-functions-10
    front: "Откуда в кросс-энтропии минус-логарифм?"
    back: "Из теории информации: -log(p) - «удивление» от события вероятности p. Минимизируя кросс-энтропию, сеть учится не удивляться правильным ответам, то есть присваивать им высокую вероятность."
    tags: [theory]
