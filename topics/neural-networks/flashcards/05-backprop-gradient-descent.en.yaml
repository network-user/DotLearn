conceptId: backprop-gradient-descent
cards:
  - id: backprop-gradient-descent-01
    front: "What does the loss gradient with respect to a weight show?"
    back: "Direction of steepest increase in loss at current weights — slope of the loss landscape. To reduce loss, move weights the opposite way."
    tags: [gradient]
  - id: backprop-gradient-descent-02
    front: "What is the gradient descent update formula?"
    back: "w = w - learning_rate * gradient. The minus is essential: gradient points uphill, the step goes downhill toward lower loss."
    tags: [step]
  - id: backprop-gradient-descent-03
    front: "What does learning rate control?"
    back: "Step length — multiplier before the gradient. Too small makes descent slow; too large overshoots the minimum and can diverge."
    tags: [learning-rate]
  - id: backprop-gradient-descent-04
    front: "What if you use w = w + lr * gradient instead?"
    back: "Weight moves uphill and loss grows. The step is always against the gradient: w = w - lr * gradient."
    tags: [step, pitfalls]
  - id: backprop-gradient-descent-05
    front: "What does backpropagation do?"
    back: "Efficiently computes gradients for all weights in one backward pass via the chain rule, reusing forward-pass values. Gradient descent then takes steps along those gradients."
    tags: [backprop]
  - id: backprop-gradient-descent-06
    front: "Why does backprop need the chain rule?"
    back: "Loss depends on weights through a chain: weight → sum → activation → next layer → loss. Chain rule multiplies local derivatives along that chain."
    tags: [backprop, chain-rule]
  - id: backprop-gradient-descent-07
    front: "How do you estimate a gradient numerically?"
    back: "Central difference: (f(x + h) - f(x - h)) / (2 * h) for small h. Shows what gradient means (sensitivity) but practice uses backprop — faster and exact."
    tags: [numeric]
  - id: backprop-gradient-descent-08
    front: "Sign that learning rate is too large?"
    back: "Loss rises step by step and may go to infinity or NaN: each step overshoots further and descent diverges."
    tags: [learning-rate, pitfalls]
  - id: backprop-gradient-descent-09
    front: "Does gradient descent find the global minimum?"
    back: "Not necessarily: it converges to a local minimum near the start. Good local minima in large networks usually suffice; noise in data helps escape bad ones."
    tags: [optimization]
  - id: backprop-gradient-descent-10
    front: "How does stochastic gradient descent (SGD) differ from full-batch descent?"
    back: "SGD estimates gradient from a small random batch, not the full dataset: noisy but correct on average, far more steps per second. Noise can escape bad narrow minima."
    tags: [sgd]
