conceptId: embeddings
cards:
  - id: embeddings-01
    front: "What is an embedding?"
    back: "Representing an object (word, product, image) as a vector of numbers so vector closeness reflects semantic closeness: similar objects get similar vectors."
    tags: [basics]
  - id: embeddings-02
    front: "Where do embedding coordinates come from?"
    back: "Not hand-set: learned during training so objects from similar contexts land near each other. Embeddings are usually trainable parameters moved by gradient descent."
    tags: [learning]
  - id: embeddings-03
    front: "What does king - man + woman ≈ queen mean?"
    back: "In good embeddings directions carry meaning: vector differences encode relations (e.g. gender). Arithmetic over vectors yields meaningful results."
    tags: [structure]
  - id: embeddings-04
    front: "How is cosine similarity of two vectors computed?"
    back: "cos(a, b) = (a · b) / (|a| * |b|): dot product divided by product of lengths. Cosine of the angle between vectors."
    tags: [cosine]
  - id: embeddings-05
    front: "What range does cosine similarity lie in and what do the extremes mean?"
    back: "-1 to 1. 1: same direction (maximally similar), 0: perpendicular (unrelated), -1: opposite."
    tags: [cosine]
  - id: embeddings-06
    front: "Why does cosine divide by vector lengths?"
    back: "To remove scale and measure only direction (angle). Raw dot product grows with length and is not a similarity measure alone."
    tags: [cosine]
  - id: embeddings-07
    front: "What is cosine similarity of [1,1] and [100,100]?"
    back: "Exactly 1.0: vectors are collinear and cosine ignores length. Euclidean distance is large but direction is identical: that is the point of the measure."
    tags: [cosine]
  - id: embeddings-08
    front: "Why is cosine undefined for a zero vector?"
    back: "Zero vector has length zero and division breaks. Check both vectors are nonzero before computing; zero embedding usually means a missing or unprocessed object."
    tags: [pitfalls]
  - id: embeddings-09
    front: "Can you compare embeddings from different models?"
    back: "No. Coordinates are meaningful only inside one space. Vectors from different models are incomparable: similarity between them is meaningless."
    tags: [pitfalls]
  - id: embeddings-10
    front: "What are contextual embeddings in large language models?"
    back: "Input word embedding is refined by context at each attention layer, so the same word in different sentences gets different final vectors: representation depends on context."
    tags: [llm]
