conceptId: forward-pass
cards:
  - id: forward-pass-01
    front: "Что такое прямой проход (forward pass)?"
    back: "Путь данных от входа к ответу: вход подаётся в первый слой, его выход - во второй, и так до выходного слоя. Это только вычисление ответа, без обучения."
    tags: [basics]
  - id: forward-pass-02
    front: "Как один слой считает свой выход?"
    back: "z = W @ x + b, затем a = activation(z). Матрица W содержит строку весов на каждый нейрон, b - вектор смещений; всё считается одним матричным умножением."
    tags: [layer]
  - id: forward-pass-03
    front: "Какой формы матрица весов W для входа длины n и слоя из m нейронов?"
    back: "m x n: строка на каждый нейрон, длина строки равна длине входа. На выходе получается вектор длины m."
    tags: [shapes]
  - id: forward-pass-04
    front: "Что задаёт длину выхода слоя?"
    back: "Число нейронов в слое. Сколько нейронов, столько чисел на выходе - независимо от длины входа."
    tags: [shapes]
  - id: forward-pass-05
    front: "Что такое MLP (многослойный персептрон)?"
    back: "Несколько полносвязных слоёв подряд: каждый нейрон соединён со всеми выходами предыдущего слоя, между слоями стоит нелинейная активация."
    tags: [mlp]
  - id: forward-pass-06
    front: "Что становится входом следующего слоя?"
    back: "Выход предыдущего слоя после активации. Сигнал идёт по цепочке: выход одного слоя - вход следующего."
    tags: [mlp]
  - id: forward-pass-07
    front: "Обучается ли что-нибудь во время прямого прохода?"
    back: "Нет. Прямой проход только вычисляет ответ с текущими весами. Веса меняет обратный проход и градиентный спуск. Случайно инициализированная сеть честно посчитает forward и выдаст чепуху."
    tags: [training]
  - id: forward-pass-08
    front: "Чем отличается активация скрытых слоёв от активации выходного?"
    back: "Скрытые слои обычно используют ReLU. Активацию выходного слоя выбирают под задачу: softmax для классификации, без активации для регрессии."
    tags: [activation]
  - id: forward-pass-09
    front: "Самая частая причина падения прямого прохода?"
    back: "Несовпадение размерностей: длина входа должна равняться числу весов у каждого нейрона, а форма матрицы W - быть m x n. Транспонированная матрица даёт ошибку или тихо неверный результат."
    tags: [pitfalls]
  - id: forward-pass-10
    front: "Зачем сеть обрабатывает данные батчами?"
    back: "Батч (пачка примеров) считается одним крупным матричным умножением X @ W.T + b - это быстрее цикла по примерам и нужно для обучения: градиент усредняют по батчу."
    tags: [batch]
