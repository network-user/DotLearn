conceptId: backprop-gradient-descent
cards:
  - id: backprop-gradient-descent-01
    front: "Что показывает градиент потери по весу?"
    back: "Направление наискорейшего роста потери в точке текущих весов - наклон ландшафта потерь. Чтобы потерю уменьшить, веса двигают в противоположную сторону."
    tags: [gradient]
  - id: backprop-gradient-descent-02
    front: "Как выглядит формула одного шага градиентного спуска?"
    back: "w = w - learning_rate * градиент. Минус принципиален: градиент смотрит вверх по склону, а шаг идёт вниз, в сторону убывания потери."
    tags: [step]
  - id: backprop-gradient-descent-03
    front: "Что задаёт learning rate?"
    back: "Длину шага - множитель перед градиентом. Слишком маленький делает спуск медленным, слишком большой заставляет шаги перелетать минимум и может расходить обучение."
    tags: [learning-rate]
  - id: backprop-gradient-descent-04
    front: "Что произойдёт, если перепутать знак в шаге на w = w + lr * градиент?"
    back: "Вес поедет вверх по склону, и потеря будет расти, а не падать. Шаг всегда против градиента: w = w - lr * градиент."
    tags: [step, pitfalls]
  - id: backprop-gradient-descent-05
    front: "Что делает обратное распространение (backpropagation)?"
    back: "По цепному правилу эффективно считает градиенты сразу всех весов за один проход назад по сети, переиспользуя значения прямого прохода. Сам шаг по этим градиентам делает градиентный спуск."
    tags: [backprop]
  - id: backprop-gradient-descent-06
    front: "Зачем в backprop нужно цепное правило?"
    back: "Потеря зависит от весов не напрямую, а через цепочку: вес -> сумма -> активация -> следующий слой -> потеря. Цепное правило перемножает локальные производные вдоль этой цепочки."
    tags: [backprop, chain-rule]
  - id: backprop-gradient-descent-07
    front: "Как численно оценить градиент функции в точке?"
    back: "Двусторонней разностью: (f(x + h) - f(x - h)) / (2 * h) при малом h. Это показывает смысл градиента (чувствительность выхода к входу), но на практике градиенты считает backprop - быстрее и точнее."
    tags: [numeric]
  - id: backprop-gradient-descent-08
    front: "Признак того, что learning rate слишком велик?"
    back: "Потеря не падает, а растёт от шага к шагу и может уйти в бесконечность или стать NaN: каждый шаг перелетает минимум всё дальше, и спуск расходится."
    tags: [learning-rate, pitfalls]
  - id: backprop-gradient-descent-09
    front: "Находит ли градиентный спуск глобальный минимум?"
    back: "Не обязательно: он сходится к локальному минимуму, ближайшему к старту. У больших сетей хорошие локальные минимумы обычно дают достойное качество, а шум в данных помогает не застрять в плохом."
    tags: [optimization]
  - id: backprop-gradient-descent-10
    front: "Чем стохастический градиентный спуск (SGD) отличается от обычного?"
    back: "SGD оценивает градиент по небольшому случайному батчу, а не по всему датасету: оценка шумная, но шагов в секунду на порядки больше. Шум даже полезен - помогает выскакивать из плохих узких минимумов."
    tags: [sgd]
