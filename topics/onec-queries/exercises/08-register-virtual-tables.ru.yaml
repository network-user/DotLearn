exercises:
  - id: register-virtual-tables-choose-001
    concept: register-virtual-tables
    type: theory-quiz
    difficulty: 1
    prompt: "Какая виртуальная таблица регистра отвечает на вопрос «сколько товара на складе на заданную дату»?"
    choices:
      - id: a
        text: "Остатки"
      - id: b
        text: "Обороты"
      - id: c
        text: "ОстаткиИОбороты"
      - id: d
        text: "Движения"
    correct: [a]
    explanation: "Остатки дают состояние на момент времени. Обороты - изменения за период, ОстаткиИОбороты - и то, и другое вместе."
    variants:
      - prompt: "Какая виртуальная таблица отвечает на вопрос «сколько пришло и ушло за период»?"
        choices:
          - id: a
            text: "Обороты"
          - id: b
            text: "Остатки"
          - id: c
            text: "Срез последних"
          - id: d
            text: "Движения"
        correct: [a]
        explanation: "Обороты считают приход и расход между двумя датами. Остатки дают состояние на момент, а не изменение за интервал."
      - prompt: "Как называется поле-ресурс количества в виртуальной таблице Остатки регистра ТоварыНаСкладах?"
        choices:
          - id: a
            text: "КоличествоОстаток"
          - id: b
            text: "Количество"
          - id: c
            text: "ОстатокКоличество"
          - id: d
            text: "СуммаОстаток"
        correct: [a]
        explanation: "Ресурс в виртуальной таблице называется имя ресурса плюс суффикс таблицы: Количество + Остаток = КоличествоОстаток."

  - id: register-virtual-tables-blanks-001
    concept: register-virtual-tables
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите пропущенное, чтобы получить остатки на дату по нужному складу через параметр виртуальной таблицы."
    template: |
      ВЫБРАТЬ
          Остатки.Номенклатура КАК Товар,
          Остатки.{{res}} КАК Остаток
      ИЗ
          РегистрНакопления.ТоварыНаСкладах.{{table}}(&НаДату, Склад = &Склад) КАК Остатки
    blanks:
      res:
        accept: ["КоличествоОстаток", "количествоостаток"]
        accept_regex: '^\s*[Кк]оличествоОстаток\s*$'
      table:
        accept: ["Остатки", "остатки"]
        accept_regex: '^\s*[Оо]статки\s*$'
    explanation: "Виртуальная таблица Остатки принимает момент и отбор в параметрах; ресурс количества называется КоличествоОстаток."
    variants:
      - prompt: "Впишите пропущенное: виртуальную таблицу оборотов и её ресурс «приход минус расход»."
        template: |
          ВЫБРАТЬ
              Обороты.Номенклатура КАК Товар,
              Обороты.{{res}} КАК Оборот
          ИЗ
              РегистрНакопления.ТоварыНаСкладах.{{table}}(&Начало, &Конец) КАК Обороты
        blanks:
          res:
            accept: ["КоличествоОборот", "количествооборот"]
            accept_regex: '^\s*[Кк]оличествоОборот\s*$'
          table:
            accept: ["Обороты", "обороты"]
            accept_regex: '^\s*[Оо]бороты\s*$'
      - prompt: "Впишите пропущенное: полную ведомость с остатком на конец периода."
        template: |
          ВЫБРАТЬ
              ВедомостьРегистра.{{res}} КАК КонечныйОстаток
          ИЗ
              РегистрНакопления.ТоварыНаСкладах.{{table}}(&Начало, &Конец) КАК ВедомостьРегистра
        blanks:
          res:
            accept: ["КоличествоКонечныйОстаток", "количествоконечныйостаток"]
            accept_regex: '^\s*[Кк]оличествоКонечныйОстаток\s*$'
          table:
            accept: ["ОстаткиИОбороты", "остаткииобороты"]
            accept_regex: '^\s*[Оо]статкиИОбороты\s*$'

  - id: register-virtual-tables-ledger-001
    concept: register-virtual-tables
    type: predict-output
    difficulty: 5
    prompt: "Отбор в виртуальной таблице: Склад = Основной, период - май. Чему равен КоличествоКонечныйОстаток по номенклатуре Гвозди на складе Основной? Введите число."
    fixture: |
      Движения регистра ТоварыНаСкладах (Номенклатура = Гвозди):
      Дата     Склад       Вид      Количество
      28.04    Основной    Приход   20
      05.05    Основной    Приход   100
      12.05    Резервный   Приход   500
      18.05    Основной    Расход   30
      26.05    Основной    Расход   40
    snippet: |
      ВЫБРАТЬ
          Ведомость.Номенклатура КАК Товар,
          Ведомость.КоличествоКонечныйОстаток КАК КонечныйОстаток
      ИЗ
          РегистрНакопления.ТоварыНаСкладах.ОстаткиИОбороты(&Начало, &Конец, , , Склад = &Склад) КАК Ведомость
    expected:
      kind: scalar
      value: 50
    hints:
      - "Отбор по параметру оставляет только движения склада Основной: строка Резервного склада в расчёт не входит вовсе."
      - "Приход 20 от 28 апреля - это движение до периода, значит оно формирует начальный остаток на начало мая, а не приход внутри мая."
      - "Тождество ведомости: конечный остаток = начальный остаток + приход за период − расход за период. Подставьте уцелевшие числа склада Основной."
