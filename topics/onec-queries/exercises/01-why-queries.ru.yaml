exercises:
  - id: why-queries-doors-001
    concept: why-queries
    type: theory-quiz
    difficulty: 1
    prompt: "Нужно построить отчёт «продажи по складам за месяц» по трём тысячам документов. Какой способ доступа к данным для этого предназначен?"
    choices:
      - id: a
        text: "Язык запросов: читает нужные поля прямо из СУБД одним"
      - id: b
        text: "Обход документов объектами в цикле с чтением всех реквизитов."
      - id: c
        text: "Проведение каждого документа заново."
      - id: d
        text: "Запись набора записей регистра."
    correct: [a]
    explanation: "Массовое чтение со сверткой - это работа для запроса. Он забирает нужные строки одним обращением и группирует их силами СУБД, тогда как цикл открывает каждый объект отдельно."
    variants:
      - prompt: "Почему выборка запросом обычно быстрее обхода тех же документов объектами в цикле?"
        choices:
          - id: a
            text: "Запрос читает нужные поля одним обращением к базе, а цикл поднимает каждый"
          - id: b
            text: "Запрос кэширует результат навсегда и больше не обращается к базе."
          - id: c
            text: "Цикл всегда работает на клиенте, а запрос на сервере."
          - id: d
            text: "Запрос пропускает половину строк ради скорости."
        correct: [a]
        explanation: "Обход объектов - это множество отдельных обращений к базе и десериализация всего объекта. Запрос обращается к таблицам один раз и отдаёт готовую таблицу значений."
      - prompt: "Что означает, что язык запросов 1С декларативный?"
        choices:
          - id: a
            text: "Вы описываете, какой результат нужен, а СУБД сама выбирает, как его"
          - id: b
            text: "Вы по шагам командуете движку, какой индекс читать и в каком порядке."
          - id: c
            text: "Запрос обязательно меняет данные в базе."
          - id: d
            text: "Запрос выполняется только в файловой базе."
        correct: [a]
        explanation: "Декларативность - это описание результата, а не шагов. План выполнения (индексы, порядок соединений) выбирает оптимизатор СУБД."

  - id: why-queries-blanks-001
    concept: why-queries
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите ключевые слова, чтобы получился корректный запрос сводки продаж по номенклатуре."
    template: |
      {{select}}
          Продажи.Номенклатура,
          СУММА(Продажи.Количество) КАК Количество
      ИЗ
          Документ.РеализацияТоваровУслуг.Товары КАК Продажи
      {{group}}
          Продажи.Номенклатура
    blanks:
      select:
        accept: ["ВЫБРАТЬ", "выбрать"]
        accept_regex: '^\s*(ВЫБРАТЬ|выбрать)\s*$'
      group:
        accept: ["СГРУППИРОВАТЬ ПО", "сгруппировать по"]
        accept_regex: '^\s*[Сс]группировать\s+[Пп]о\s*$'
    explanation: "Список выводимых полей открывает слово ВЫБРАТЬ. Свёртка по номенклатуре с агрегатом СУММА требует раздела СГРУППИРОВАТЬ ПО с той же неагрегированной колонкой."
    variants:
      - prompt: "Впишите пропущенные ключевые слова: раздел источника и раздел отбора строк."
        template: |
          ВЫБРАТЬ
              Товары.Наименование,
              Товары.Код
          {{from}}
              Справочник.Номенклатура КАК Товары
          {{where}}
              Товары.ПометкаУдаления = ЛОЖЬ
        blanks:
          from:
            accept: ["ИЗ", "из"]
            accept_regex: '^\s*(ИЗ|из)\s*$'
          where:
            accept: ["ГДЕ", "где"]
            accept_regex: '^\s*(ГДЕ|где)\s*$'
      - prompt: "Впишите пропущенные ключевые слова: начало запроса и псевдоним источника."
        template: |
          {{select}}
              Склады.Наименование КАК Склад
          ИЗ
              Справочник.Склады {{as}} Склады
        blanks:
          select:
            accept: ["ВЫБРАТЬ", "выбрать"]
            accept_regex: '^\s*(ВЫБРАТЬ|выбрать)\s*$'
          as:
            accept: ["КАК", "как"]
            accept_regex: '^\s*(КАК|как)\s*$'

  - id: why-queries-limits-001
    concept: why-queries
    type: theory-quiz
    difficulty: 3
    prompt: "Разработчик хочет «списать товар со склада одним запросом». В чём принципиальная ошибка этого плана?"
    choices:
      - id: a
        text: "Запрос только читает данные; изменение регистров и проведение"
      - id: b
        text: "Запрос спишет товар, но слишком медленно."
      - id: c
        text: "Запрос спишет товар только в файловой базе."
      - id: d
        text: "Списать можно, но лишь если добавить УПОРЯДОЧИТЬ ПО."
    correct: [a]
    explanation: "Язык запросов не пишет в базу. Он отвечает на вопрос «что есть», но не выполняет действие «сделай так». Списание меняет регистр и требует набора записей или проведения документа."
    hints:
      - "Разделите два вопроса: «что хранится в базе» и «измени то, что хранится». К какому из них относится запрос?"
      - "Вспомните границу применимости: одна дверь к данным только читает, другая - записывает и проводит."
