exercises:
  - id: query-structure-clauses-001
    concept: query-structure
    type: theory-quiz
    difficulty: 1
    prompt: "Какой раздел запроса отбирает строки источника по условию?"
    choices:
      - id: a
        text: "ГДЕ"
      - id: b
        text: "ВЫБРАТЬ"
      - id: c
        text: "ИЗ"
      - id: d
        text: "УПОРЯДОЧИТЬ ПО"
    correct: [a]
    explanation: "ГДЕ проверяет условие для каждой строки источника и пропускает дальше только те, для которых оно истинно. ВЫБРАТЬ задаёт поля, ИЗ - источник, УПОРЯДОЧИТЬ ПО - порядок."
    variants:
      - prompt: "Какой раздел запроса называет таблицу-источник, из которой берутся данные?"
        choices:
          - id: a
            text: "ИЗ"
          - id: b
            text: "ГДЕ"
          - id: c
            text: "ВЫБРАТЬ"
          - id: d
            text: "СГРУППИРОВАТЬ ПО"
        correct: [a]
        explanation: "Источник данных указывается в разделе ИЗ, обычно с псевдонимом через КАК."
      - prompt: "Каким словом задают псевдоним поля или таблицы в запросе 1С?"
        choices:
          - id: a
            text: "КАК"
          - id: b
            text: "AS"
          - id: c
            text: "ПСЕВДОНИМ"
          - id: d
            text: "ИМЯ"
        correct: [a]
        explanation: "Псевдоним и полю, и таблице задаётся русским словом КАК: Номенклатура.Наименование КАК Товар."

  - id: query-structure-blanks-001
    concept: query-structure
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите ключевые слова, чтобы собрать корректный запрос к справочнику номенклатуры."
    template: |
      ВЫБРАТЬ
          Номенклатура.Наименование {{as}} Товар
      {{from}}
          Справочник.Номенклатура КАК Номенклатура
      {{where}}
          Номенклатура.ПометкаУдаления = ЛОЖЬ
    blanks:
      as:
        accept: ["КАК", "как"]
        accept_regex: '^\s*(КАК|как)\s*$'
      from:
        accept: ["ИЗ", "из"]
        accept_regex: '^\s*(ИЗ|из)\s*$'
      where:
        accept: ["ГДЕ", "где"]
        accept_regex: '^\s*(ГДЕ|где)\s*$'
    explanation: "КАК задаёт псевдоним поля Товар, ИЗ вводит источник, ГДЕ отбирает строки по условию пометки удаления."
    variants:
      - prompt: "Впишите ключевые слова: начало запроса, отбор уникальных значений и раздел источника."
        template: |
          ВЫБРАТЬ {{distinct}}
              Продажи.Склад КАК Склад
          {{from}}
              Документ.РеализацияТоваровУслуг.Товары КАК Продажи
        blanks:
          distinct:
            accept: ["РАЗЛИЧНЫЕ", "различные"]
            accept_regex: '^\s*(РАЗЛИЧНЫЕ|различные)\s*$'
          from:
            accept: ["ИЗ", "из"]
            accept_regex: '^\s*(ИЗ|из)\s*$'
      - prompt: "Впишите пропущенные ключевые слова запроса, соединяющего два условия отбора."
        template: |
          ВЫБРАТЬ
              Номенклатура.Наименование
          ИЗ
              Справочник.Номенклатура КАК Номенклатура
          {{where}}
              Номенклатура.ПометкаУдаления = ЛОЖЬ
              {{and}} Номенклатура.ЭтоГруппа = ЛОЖЬ
        blanks:
          where:
            accept: ["ГДЕ", "где"]
            accept_regex: '^\s*(ГДЕ|где)\s*$'
          and:
            accept: ["И", "и"]
            accept_regex: '^\s*(И|и)\s*$'

  - id: query-structure-where-count-001
    concept: query-structure
    type: predict-output
    difficulty: 3
    prompt: "В справочнике Номенклатура пять элементов, из них два помечены на удаление. Сколько строк вернёт запрос? Введите число."
    fixture: |
      Справочник.Номенклатура:
      Наименование    ПометкаУдаления
      Гвозди 3мм       Ложь
      Шурупы 40мм      Ложь
      Старый артикул   Истина
      Болты М6         Ложь
      Снятый с продаж  Истина
    snippet: |
      ВЫБРАТЬ
          Номенклатура.Наименование
      ИЗ
          Справочник.Номенклатура КАК Номенклатура
      ГДЕ
          Номенклатура.ПометкаУдаления = ЛОЖЬ
    expected:
      kind: scalar
      value: 3
    hints:
      - "Пройдите по конвейеру: ГДЕ отбрасывает строки ещё до того, как формируется список полей ВЫБРАТЬ."
      - "Оставьте только те строки, где ПометкаУдаления равна ЛОЖЬ, и пересчитайте их."
