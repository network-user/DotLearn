exercises:
  - id: aggregation-grouping-having-001
    concept: aggregation-grouping
    type: theory-quiz
    difficulty: 1
    prompt: "В каком разделе запроса ставят условие на агрегат, например «сумма по складу больше 100»?"
    choices:
      - id: a
        text: "ИМЕЮЩИЕ"
      - id: b
        text: "ГДЕ"
      - id: c
        text: "ВЫБРАТЬ"
      - id: d
        text: "УПОРЯДОЧИТЬ ПО"
    correct: [a]
    explanation: "Условие на агрегат фильтрует уже готовые группы, поэтому его место в ИМЕЮЩИЕ. ГДЕ выполняется до группировки и агрегатов ещё не видит."
    variants:
      - prompt: "Чем отличается КОЛИЧЕСТВО(*) от КОЛИЧЕСТВО(РАЗЛИЧНЫЕ Продажи.Номенклатура)?"
        choices:
          - id: a
            text: "Первое считает строки, второе - число уникальных значений номенклатуры."
          - id: b
            text: "Это два одинаковых способа посчитать строки."
          - id: c
            text: "Первое считает уникальные значения, второе - строки."
          - id: d
            text: "Второе всегда больше первого."
        correct: [a]
        explanation: "КОЛИЧЕСТВО(*) считает строки, КОЛИЧЕСТВО(РАЗЛИЧНЫЕ поле) - сколько разных значений поля встретилось. «Сколько строк продаж» и «сколько разных товаров» - разные вопросы."
      - prompt: "Что обязано выполняться для каждой колонки в ВЫБРАТЬ при использовании СГРУППИРОВАТЬ ПО?"
        choices:
          - id: a
            text: "Колонка либо входит в СГРУППИРОВАТЬ ПО, либо обёрнута в агрегатную функцию."
          - id: b
            text: "Все колонки обязаны быть обёрнуты в агрегат."
          - id: c
            text: "Все колонки обязаны входить в СГРУППИРОВАТЬ ПО."
          - id: d
            text: "Колонок в ВЫБРАТЬ должно быть ровно столько же, сколько в СГРУППИРОВАТЬ ПО."
        correct: [a]
        explanation: "Правило одной колонки: каждое поле вывода либо перечислено в группировке, либо свёрнуто агрегатом. Иначе для группы «тот самый» товар не определить."

  - id: aggregation-grouping-sum-001
    concept: aggregation-grouping
    type: predict-output
    difficulty: 2
    prompt: "Что вернёт запрос? Заполните строки результата (по одной на склад)."
    fixture: |
      Продажи:
      Склад        Количество
      Основной     100
      Основной     50
      Резервный    40
    snippet: |
      ВЫБРАТЬ
          Продажи.Склад КАК Склад,
          СУММА(Продажи.Количество) КАК Продано
      ИЗ
          Документ.РеализацияТоваровУслуг.Товары КАК Продажи
      СГРУППИРОВАТЬ ПО
          Продажи.Склад
    expected:
      kind: result-set
      ordered: false
      rows:
        - { Склад: "Основной", Продано: 150 }
        - { Склад: "Резервный", Продано: 40 }
    variants:
      - prompt: "Что вернёт этот запрос? Заполните строки результата (по одной на склад)."
        snippet: |
          ВЫБРАТЬ
              Продажи.Склад КАК Склад,
              КОЛИЧЕСТВО(*) КАК Строк
          ИЗ
              Документ.РеализацияТоваровУслуг.Товары КАК Продажи
          СГРУППИРОВАТЬ ПО
              Продажи.Склад
        expected:
          kind: result-set
          ordered: false
          rows:
            - { Склад: "Основной", Строк: 2 }
            - { Склад: "Резервный", Строк: 1 }
      - prompt: "Что вернёт этот запрос? Заполните строки результата (по одной на склад)."
        snippet: |
          ВЫБРАТЬ
              Продажи.Склад КАК Склад,
              МАКСИМУМ(Продажи.Количество) КАК Максимум
          ИЗ
              Документ.РеализацияТоваровУслуг.Товары КАК Продажи
          СГРУППИРОВАТЬ ПО
              Продажи.Склад
        expected:
          kind: result-set
          ordered: false
          rows:
            - { Склад: "Основной", Максимум: 100 }
            - { Склад: "Резервный", Максимум: 40 }

  - id: aggregation-grouping-pipeline-001
    concept: aggregation-grouping
    type: predict-output
    difficulty: 4
    prompt: "Сколько складов останется в результате после отбора строк, группировки и ИМЕЮЩИЕ? Введите число."
    fixture: |
      Продажи:
      Склад        Количество   Проведён
      Основной     100          Истина
      Основной     50           Истина
      Резервный    40           Истина
      Транзитный   200          Ложь
      Транзитный   30           Истина
    snippet: |
      ВЫБРАТЬ
          Продажи.Склад КАК Склад,
          СУММА(Продажи.Количество) КАК Продано
      ИЗ
          Документ.РеализацияТоваровУслуг.Товары КАК Продажи
      ГДЕ
          Продажи.Ссылка.Проведён = ИСТИНА
      СГРУППИРОВАТЬ ПО
          Продажи.Склад
      ИМЕЮЩИЕ
          СУММА(Продажи.Количество) > 100
    expected:
      kind: scalar
      value: 1
    hints:
      - "Идите строго по конвейеру: сначала ГДЕ выбрасывает строки непроведённых документов, и только потом считаются суммы по складам."
      - "После ГДЕ у Транзитного остаётся лишь строка на 30: его непроведённая строка на 200 в свёртку не попадёт."
      - "Посчитайте сумму по каждому складу из уцелевших строк и оставьте только те, где сумма строго больше 100."
