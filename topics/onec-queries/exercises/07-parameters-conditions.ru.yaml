exercises:
  - id: parameters-conditions-param-001
    concept: parameters-conditions
    type: theory-quiz
    difficulty: 1
    prompt: "Как в тексте запроса записывают параметр, значение которого подставят при выполнении?"
    choices:
      - id: a
        text: "С амперсандом перед именем: &Начало"
      - id: b
        text: "В двойных кавычках: \"Начало\""
      - id: c
        text: "В квадратных скобках: [Начало]"
      - id: d
        text: "Со знаком доллара: $Начало"
    correct: [a]
    explanation: "Параметр записывается как &Имя, а значение передаётся отдельно методом УстановитьПараметр. Это безопаснее и быстрее склейки значения в текст запроса."
    variants:
      - prompt: "Почему значения из формы отчёта передают в запрос параметром, а не склеивают в текст запроса строкой?"
        choices:
          - id: a
            text: "Склейка ломается на кавычках и локали и небезопасна; параметр подставляется отдельно и позволяет переиспользовать план."
          - id: b
            text: "Склейка запрещена синтаксисом языка запросов."
          - id: c
            text: "Параметр работает быстрее, потому что кэширует результат навсегда."
          - id: d
            text: "Разницы нет, это дело вкуса."
        correct: [a]
        explanation: "Текст запроса с параметром неизменен независимо от значения, поэтому безопаснее и позволяет СУБД переиспользовать построенный план. Склейка ненадёжна и уязвима."
      - prompt: "Как в условии проверить, что поле равно NULL?"
        choices:
          - id: a
            text: "Поле ЕСТЬ NULL"
          - id: b
            text: "Поле = NULL"
          - id: c
            text: "Поле <> 0"
          - id: d
            text: "NULL(Поле)"
        correct: [a]
        explanation: "NULL нельзя проверить равенством: NULL ничему не равен, даже NULL. Для проверки есть конструкция ЕСТЬ NULL (и ЕСТЬ НЕ NULL)."

  - id: parameters-conditions-blanks-001
    concept: parameters-conditions
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите пропущенное, чтобы отобрать продажи за период по параметрам."
    template: |
      ГДЕ
          Продажи.Ссылка.Дата {{between}} &Начало {{and}} &Конец
    blanks:
      between:
        accept: ["МЕЖДУ", "между"]
        accept_regex: '^\s*[Мм]ежду\s*$'
      and:
        accept: ["И", "и"]
        accept_regex: '^\s*(И|и)\s*$'
    explanation: "Диапазон задаётся конструкцией МЕЖДУ &Начало И &Конец; обе границы включаются."
    variants:
      - prompt: "Впишите пропущенное, чтобы заменить NULL нулём и отобрать товары внутри группы с учётом её подгрупп."
        template: |
          ВЫБРАТЬ
              {{isnull}}(Цены.Цена, 0) КАК Цена
          ИЗ
              Справочник.Номенклатура КАК Товары
              ЛЕВОЕ СОЕДИНЕНИЕ РегистрСведений.ЦеныНоменклатуры КАК Цены
              ПО Цены.Номенклатура = Товары.Ссылка
          ГДЕ
              Товары.Ссылка В {{hier}} (&Группа)
        blanks:
          isnull:
            accept: ["ЕСТЬNULL", "естьnull", "ЕстьNULL"]
            accept_regex: '^\s*[Ее]сть?NULL\s*$'
          hier:
            accept: ["ИЕРАРХИИ", "иерархии"]
            accept_regex: '^\s*[Ии]ерархии\s*$'
      - prompt: "Впишите пропущенное: оператор шаблонного поиска и оператор вхождения в список."
        template: |
          ГДЕ
              Товары.Наименование {{like}} "%насос%"
              И Товары.Склад {{in}} (&Склады)
        blanks:
          like:
            accept: ["ПОДОБНО", "подобно"]
            accept_regex: '^\s*[Пп]одобно\s*$'
          in:
            accept: ["В", "в"]
            accept_regex: '^\s*(В|в)\s*$'

  - id: parameters-conditions-choose-001
    concept: parameters-conditions
    type: predict-output
    difficulty: 3
    prompt: "Какую категорию присвоит оператор ВЫБОР каждой строке? Заполните результат (по строке на товар)."
    fixture: |
      Продажи:
      Товар   Сумма
      А       150000
      Б       50000
      В       5000
    snippet: |
      ВЫБРАТЬ
          Продажи.Товар КАК Товар,
          ВЫБОР
              КОГДА Продажи.Сумма >= 100000 ТОГДА "Крупная"
              КОГДА Продажи.Сумма >= 10000 ТОГДА "Средняя"
              ИНАЧЕ "Мелкая"
          КОНЕЦ КАК Категория
      ИЗ
          Документ.РеализацияТоваровУслуг.Товары КАК Продажи
    expected:
      kind: result-set
      ordered: false
      rows:
        - { Товар: "А", Категория: "Крупная" }
        - { Товар: "Б", Категория: "Средняя" }
        - { Товар: "В", Категория: "Мелкая" }
    hints:
      - "Ветки КОГДА проверяются сверху вниз; срабатывает первая истинная, остальные уже не рассматриваются."
      - "Для суммы 50000 первое условие (>= 100000) ложно, а второе (>= 10000) истинно - значит «Средняя»."
