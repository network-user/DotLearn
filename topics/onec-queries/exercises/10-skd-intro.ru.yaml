exercises:
  - id: skd-intro-concepts-001
    concept: skd-intro
    type: theory-quiz
    difficulty: 1
    prompt: "Что в СКД называют ресурсом?"
    choices:
      - id: a
        text: "Поле, которое система суммирует по группировкам (например, Количество или Сумма)."
      - id: b
        text: "Поле, по которому строится структура строк отчёта."
      - id: c
        text: "Параметр периода отчёта."
      - id: d
        text: "Внешний файл с данными."
    correct: [a]
    explanation: "Ресурс - это поле, которое СКД складывает в итогах каждой группировки. По складу и номенклатуре группируют, а количество и сумму суммируют - это ресурсы."
    variants:
      - prompt: "Какой тип набора данных СКД используют чаще всего для отчёта?"
        choices:
          - id: a
            text: "Запрос"
          - id: b
            text: "Объединение"
          - id: c
            text: "Общий"
          - id: d
            text: "Внешний источник"
        correct: [a]
        explanation: "Обычно начинают с одного набора данных типа «Запрос»: пишут запрос на языке запросов, и его результат становится основой отчёта."
      - prompt: "Что задаёт группировка в схеме компоновки данных?"
        choices:
          - id: a
            text: "Структуру строк отчёта: в каком разрезе разложить данные (по складу, по товару)."
          - id: b
            text: "Какое поле суммировать в итогах."
          - id: c
            text: "Способ подключения к базе данных."
          - id: d
            text: "Список пользователей отчёта."
        correct: [a]
        explanation: "Группировка отвечает на вопрос «в каком разрезе смотрим». Что именно суммировать в итогах - это ресурс, а не группировка."

  - id: skd-intro-blanks-001
    concept: skd-intro
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите пропущенное, чтобы задать выражение ресурса и общие итоги в запросе набора данных."
    template: |
      ВЫБРАТЬ
          Продажи.Склад КАК Склад,
          Продажи.Сумма КАК Сумма
      ИЗ
          Документ.РеализацияТоваровУслуг.Товары КАК Продажи
      {{totals}}
          СУММА(Сумма)
      {{by}}
          Склад
    blanks:
      totals:
        accept: ["ИТОГИ", "итоги"]
        accept_regex: '^\s*[Ии]тоги\s*$'
      by:
        accept: ["ПО", "по"]
        accept_regex: '^\s*(ПО|по)\s*$'
    explanation: "Раздел ИТОГИ ... ПО задаёт агрегат по группировке прямо в запросе; в СКД ту же роль играют ресурсы и группировки схемы."
    variants:
      - prompt: "Впишите пропущенное: агрегатную функцию выражения ресурса, суммирующую поле Сумма."
        template: |
          {{fn}}(Сумма)
        blanks:
          fn:
            accept: ["Сумма", "СУММА", "сумма"]
            accept_regex: '^\s*[Сс][Уу]?[Мм][Мм][Аа]\s*$'
      - prompt: "Впишите пропущенное, чтобы запрос набора данных отдавал детальные строки продаж."
        template: |
          {{select}}
              Продажи.Склад КАК Склад,
              Продажи.Номенклатура КАК Номенклатура,
              Продажи.Сумма КАК Сумма
          {{from}}
              Документ.РеализацияТоваровУслуг.Товары КАК Продажи
        blanks:
          select:
            accept: ["ВЫБРАТЬ", "выбрать"]
            accept_regex: '^\s*(ВЫБРАТЬ|выбрать)\s*$'
          from:
            accept: ["ИЗ", "из"]
            accept_regex: '^\s*(ИЗ|из)\s*$'

  - id: skd-intro-design-001
    concept: skd-intro
    type: theory-quiz
    difficulty: 3
    prompt: "Почему запрос набора данных для СКД обычно пишут плоским, без СГРУППИРОВАТЬ ПО, отдавая детальные строки?"
    choices:
      - id: a
        text: "Свёртку по группам СКД делает сама по настройкам, которые пользователь может менять; группировка в запросе лишила бы его этой гибкости."
      - id: b
        text: "СГРУППИРОВАТЬ ПО запрещено в запросах наборов данных синтаксически."
      - id: c
        text: "Плоский запрос всегда возвращает меньше строк."
      - id: d
        text: "Группировка в запросе портит подключение к базе."
    correct: [a]
    explanation: "Сила СКД в том, что структуру и итоги задаёт схема, а не код. Пользователь переставляет и меняет группировки, а система пересчитывает итоги ресурсов. Жёсткая группировка в запросе отобрала бы эту гибкость и конфликтовала бы с ресурсами."
    hints:
      - "Подумайте, кто в СКД решает, по каким полям и в каком порядке группировать данные - разработчик намертво в запросе или пользователь в настройках?"
      - "Свяжите это с ролями: запрос отвечает «какие данные», схема - «как их свернуть и показать»."
