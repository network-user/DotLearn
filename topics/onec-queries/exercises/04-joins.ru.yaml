exercises:
  - id: joins-types-001
    concept: joins
    type: theory-quiz
    difficulty: 1
    prompt: "Какой тип соединения сохраняет все строки левой таблицы, подставляя NULL там, где пары справа не нашлось?"
    choices:
      - id: a
        text: "ЛЕВОЕ СОЕДИНЕНИЕ"
      - id: b
        text: "ВНУТРЕННЕЕ СОЕДИНЕНИЕ"
      - id: c
        text: "ПРАВОЕ СОЕДИНЕНИЕ"
      - id: d
        text: "ПОЛНОЕ СОЕДИНЕНИЕ"
    correct: [a]
    explanation: "Левое соединение держит главную таблицу слева и не теряет её строки: для непарной строки поля правой таблицы становятся NULL. Внутреннее выбросило бы такую строку."
    variants:
      - prompt: "Что означает NULL, появившийся в колонке из правой таблицы после ЛЕВОГО СОЕДИНЕНИЯ?"
        choices:
          - id: a
            text: "Для этой строки левой таблицы пары справа не нашлось."
          - id: b
            text: "В правой таблице ошибка данных."
          - id: c
            text: "Строку нужно удалить из результата."
          - id: d
            text: "Соединение выполнено неверно и запрос упадёт."
        correct: [a]
        explanation: "NULL в результате внешнего соединения - сигнал «соответствия не было». Это не ошибка и не пустая ссылка, а именно отсутствие пары."
      - prompt: "Какой тип соединения оставит в результате только строки, у которых есть пара в обеих таблицах?"
        choices:
          - id: a
            text: "ВНУТРЕННЕЕ СОЕДИНЕНИЕ"
          - id: b
            text: "ЛЕВОЕ СОЕДИНЕНИЕ"
          - id: c
            text: "ПОЛНОЕ СОЕДИНЕНИЕ"
          - id: d
            text: "ПРАВОЕ СОЕДИНЕНИЕ"
        correct: [a]
        explanation: "Внутреннее соединение оставляет только парные строки; всё без пары выпадает из результата с обеих сторон."

  - id: joins-blanks-001
    concept: joins
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите пропущенное, чтобы соединить продажи с ценами и сохранить все строки продаж."
    template: |
      ИЗ
          Документ.РеализацияТоваровУслуг.Товары КАК Продажи
          ЛЕВОЕ {{join}} РегистрСведений.ЦеныНоменклатуры КАК Цены
          {{on}} Цены.Номенклатура = Продажи.Номенклатура
    blanks:
      join:
        accept: ["СОЕДИНЕНИЕ", "соединение"]
        accept_regex: '^\s*[Сс]оединение\s*$'
      on:
        accept: ["ПО", "по"]
        accept_regex: '^\s*(ПО|по)\s*$'
    explanation: "Тип соединения записывается как ЛЕВОЕ СОЕДИНЕНИЕ, а условие связи вводится словом ПО."
    variants:
      - prompt: "Впишите пропущенное: тип соединения, оставляющий только парные строки, и слово условия связи."
        template: |
          ИЗ
              Справочник.Номенклатура КАК Товары
              {{inner}} СОЕДИНЕНИЕ РегистрСведений.ЦеныНоменклатуры КАК Цены
              {{on}} Цены.Номенклатура = Товары.Ссылка
        blanks:
          inner:
            accept: ["ВНУТРЕННЕЕ", "внутреннее"]
            accept_regex: '^\s*[Вв]нутреннее\s*$'
          on:
            accept: ["ПО", "по"]
            accept_regex: '^\s*(ПО|по)\s*$'
      - prompt: "Впишите пропущенное: функцию, гасящую NULL непарной строки нулём, и её аргумент по умолчанию."
        template: |
          ВЫБРАТЬ
              Продажи.Номенклатура КАК Товар,
              {{fn}}(Цены.Цена, {{default}}) КАК Цена
          ИЗ
              Документ.РеализацияТоваровУслуг.Товары КАК Продажи
              ЛЕВОЕ СОЕДИНЕНИЕ РегистрСведений.ЦеныНоменклатуры КАК Цены
              ПО Цены.Номенклатура = Продажи.Номенклатура
        blanks:
          fn:
            accept: ["ЕСТЬNULL", "естьnull", "ЕстьNULL"]
            accept_regex: '^\s*[Ее]сть?NULL\s*$'
          default:
            accept: ["0"]
            accept_regex: '^\s*0\s*$'

  - id: joins-left-count-001
    concept: joins
    type: predict-output
    difficulty: 3
    prompt: "В таблице продаж три строки (Гвозди, Шурупы, Ролик X), в регистре цен - две (Гвозди, Шурупы). Сколько строк вернёт запрос с ЛЕВЫМ СОЕДИНЕНИЕМ? Введите число."
    fixture: |
      Продажи (левая):        Цены (правая):
      Гвозди                  Гвозди   25
      Шурупы                  Шурупы   12
      Ролик X
    snippet: |
      ВЫБРАТЬ
          Продажи.Номенклатура КАК Товар,
          Цены.Цена КАК Цена
      ИЗ
          Документ.РеализацияТоваровУслуг.Товары КАК Продажи
          ЛЕВОЕ СОЕДИНЕНИЕ РегистрСведений.ЦеныНоменклатуры КАК Цены
          ПО Цены.Номенклатура = Продажи.Номенклатура
    expected:
      kind: scalar
      value: 3
    hints:
      - "Левое соединение по определению сохраняет все строки левой таблицы. Сколько строк слева?"
      - "Строка «Ролик X» без пары не выпадает - она остаётся, просто с NULL в колонке Цена."
