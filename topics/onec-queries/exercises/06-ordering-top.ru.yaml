exercises:
  - id: ordering-top-basics-001
    concept: ordering-top
    type: theory-quiz
    difficulty: 1
    prompt: "Как в УПОРЯДОЧИТЬ ПО задать сортировку по убыванию?"
    choices:
      - id: a
        text: "Указать УБЫВ после поля"
      - id: b
        text: "Указать ВОЗР после поля"
      - id: c
        text: "Поставить знак минус перед полем"
      - id: d
        text: "По убыванию сортировать нельзя"
    correct: [a]
    explanation: "УБЫВ сортирует по убыванию, ВОЗР - по возрастанию. Без явного указания подразумевается ВОЗР."
    variants:
      - prompt: "Что вернёт ПЕРВЫЕ 3 без раздела УПОРЯДОЧИТЬ ПО?"
        choices:
          - id: a
            text: "Три первые попавшиеся строки в неопределённом порядке, а не три «лучшие»."
          - id: b
            text: "Три строки с наибольшим значением любого поля."
          - id: c
            text: "Синтаксическую ошибку."
          - id: d
            text: "Все строки, потому что без сортировки ПЕРВЫЕ игнорируется."
        correct: [a]
        explanation: "ПЕРВЫЕ отвечает «сколько строк взять», но без УПОРЯДОЧИТЬ ПО не отвечает «какие именно». Порядок не определён, значит и верхушка случайна."
      - prompt: "Какой порядок сортировки подразумевается, если после поля в УПОРЯДОЧИТЬ ПО не указано ни ВОЗР, ни УБЫВ?"
        choices:
          - id: a
            text: "По возрастанию (ВОЗР)"
          - id: b
            text: "По убыванию (УБЫВ)"
          - id: c
            text: "Случайный"
          - id: d
            text: "Такой запрос недопустим"
        correct: [a]
        explanation: "По умолчанию сортировка идёт по возрастанию. УБЫВ нужно указывать явно."

  - id: ordering-top-blanks-001
    concept: ordering-top
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите пропущенное, чтобы получить трёх клиентов с наибольшей выручкой."
    template: |
      ВЫБРАТЬ {{first}} 3
          Клиенты.Наименование КАК Клиент,
          Клиенты.Выручка КАК Выручка
      ИЗ
          РегистрНакопления.ПродажиОбороты КАК Клиенты
      {{order}}
          Выручка {{dir}}
    blanks:
      first:
        accept: ["ПЕРВЫЕ", "первые"]
        accept_regex: '^\s*[Пп]ервые\s*$'
      order:
        accept: ["УПОРЯДОЧИТЬ ПО", "упорядочить по"]
        accept_regex: '^\s*[Уу]порядочить\s+[Пп]о\s*$'
      dir:
        accept: ["УБЫВ", "убыв"]
        accept_regex: '^\s*[Уу]быв\s*$'
    explanation: "ПЕРВЫЕ 3 отрезает верхушку, а УПОРЯДОЧИТЬ ПО Выручка УБЫВ выстраивает клиентов от самого крупного к мелкому - вместе это даёт топ-3."
    variants:
      - prompt: "Впишите пропущенное для сортировки по двум полям: город по алфавиту, внутри города - по убыванию выручки."
        template: |
          УПОРЯДОЧИТЬ ПО
              Клиенты.Город {{dir1}},
              Клиенты.Выручка {{dir2}}
        blanks:
          dir1:
            accept: ["ВОЗР", "возр"]
            accept_regex: '^\s*[Вв]озр\s*$'
          dir2:
            accept: ["УБЫВ", "убыв"]
            accept_regex: '^\s*[Уу]быв\s*$'
      - prompt: "Впишите пропущенное, чтобы упорядочить номенклатуру по алфавиту наименования, а не по внутренней ссылке."
        template: |
          УПОРЯДОЧИТЬ ПО
              Продажи.Номенклатура.{{attr}} {{dir}}
        blanks:
          attr:
            accept: ["Наименование", "наименование"]
            accept_regex: '^\s*[Нн]аименование\s*$'
          dir:
            accept: ["ВОЗР", "возр"]
            accept_regex: '^\s*[Вв]озр\s*$'

  - id: ordering-top-predict-001
    concept: ordering-top
    type: predict-output
    difficulty: 3
    prompt: "Что вернёт запрос? Заполните строки результата в том порядке, в каком их вернёт запрос."
    fixture: |
      Клиенты:
      Клиент          Выручка
      Ромашка         640
      ТоргДом Волга   980
      Мелкий заказ    120
    snippet: |
      ВЫБРАТЬ ПЕРВЫЕ 2
          Клиенты.Наименование КАК Клиент,
          Клиенты.Выручка КАК Выручка
      ИЗ
          РегистрНакопления.ПродажиОбороты КАК Клиенты
      УПОРЯДОЧИТЬ ПО
          Выручка УБЫВ
    expected:
      kind: result-set
      ordered: true
      rows:
        - { Клиент: "ТоргДом Волга", Выручка: 980 }
        - { Клиент: "Ромашка", Выручка: 640 }
    hints:
      - "Порядок действий фиксирован: сначала строки выстраиваются по убыванию выручки, и только потом ПЕРВЫЕ 2 отрезает верхушку."
      - "Отсортируйте трёх клиентов по убыванию и возьмите двух верхних - именно в этом порядке."
