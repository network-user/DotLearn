exercises:
  - id: catalogs-documents-source-001
    concept: catalogs-documents
    type: theory-quiz
    difficulty: 1
    prompt: "Какой источник даёт строки табличной части «Товары» документа реализации?"
    choices:
      - id: a
        text: "Документ.РеализацияТоваровУслуг.Товары"
      - id: b
        text: "Документ.РеализацияТоваровУслуг"
      - id: c
        text: "Справочник.Номенклатура - типовой источник остатков"
      - id: d
        text: "РегистрНакопления.Товары - неверный объект для этого запроса"
    correct: [a]
    explanation: "Табличная часть читается как отдельная таблица через точку от документа: Документ.РеализацияТоваровУслуг.Товары. Без .Товары источником был бы сам документ с реквизитами шапки."
    variants:
      - prompt: "Какое стандартное поле есть у любого элемента справочника и служит его уникальным идентификатором?"
        choices:
          - id: a
            text: "Ссылка"
          - id: b
            text: "Идентификатор"
          - id: c
            text: "Индекс"
          - id: d
            text: "Первичный ключ"
        correct: [a]
        explanation: "Уникальный идентификатор элемента справочника - стандартное поле Ссылка. По нему на элемент ссылаются другие объекты."
      - prompt: "Какое условие в запросе по иерархическому справочнику отсекает папки-группы и оставляет только конечные элементы?"
        choices:
          - id: a
            text: "ГДЕ Номенклатура.ЭтоГруппа = ЛОЖЬ"
          - id: b
            text: "ГДЕ Номенклатура.Родитель = ЛОЖЬ"
          - id: c
            text: "ГДЕ Номенклатура.ПометкаУдаления = ИСТИНА"
          - id: d
            text: "ГДЕ Номенклатура.Код > 0"
        correct: [a]
        explanation: "Группы в иерархическом справочнике помечены признаком ЭтоГруппа. Условие ЭтоГруппа = ЛОЖЬ оставляет только сами элементы."

  - id: catalogs-documents-blanks-001
    concept: catalogs-documents
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите пропущенное, чтобы запрос выбирал строки табличной части и наименование товара через разыменование ссылки."
    template: |
      ВЫБРАТЬ
          Продажи.Номенклатура.{{attr}} КАК Товар,
          Продажи.Количество КАК Количество
      ИЗ
          Документ.РеализацияТоваровУслуг.{{part}} КАК Продажи
    blanks:
      attr:
        accept: ["Наименование", "наименование"]
        accept_regex: '^\s*[Нн]аименование\s*$'
      part:
        accept: ["Товары", "товары"]
        accept_regex: '^\s*[Тт]овары\s*$'
    explanation: "Табличная часть Товары даёт строки, а разыменование Номенклатура.Наименование через точку читает наименование справочного элемента, на который ссылается строка."
    variants:
      - prompt: "Впишите пропущенное: источник строк документа и стандартное поле-ссылку на документ-владелец."
        template: |
          ВЫБРАТЬ
              Продажи.{{ref}} КАК Документ,
              Продажи.Сумма КАК Сумма
          ИЗ
              Документ.РеализацияТоваровУслуг.Товары {{as}} Продажи
        blanks:
          ref:
            accept: ["Ссылка", "ссылка"]
            accept_regex: '^\s*[Сс]сылка\s*$'
          as:
            accept: ["КАК", "как"]
            accept_regex: '^\s*(КАК|как)\s*$'
      - prompt: "Впишите пропущенное: раздел источника для реквизитов шапки документа и раздел отбора проведённых документов."
        template: |
          ВЫБРАТЬ
              Реализация.Номер КАК Номер,
              Реализация.Дата КАК Дата
          {{from}}
              Документ.РеализацияТоваровУслуг КАК Реализация
          {{where}}
              Реализация.Проведён = ИСТИНА
        blanks:
          from:
            accept: ["ИЗ", "из"]
            accept_regex: '^\s*(ИЗ|из)\s*$'
          where:
            accept: ["ГДЕ", "где"]
            accept_regex: '^\s*(ГДЕ|где)\s*$'

  - id: catalogs-documents-dot-join-001
    concept: catalogs-documents
    type: theory-quiz
    difficulty: 3
    prompt: "Почему длинную цепочку разыменования вида Продажи.Ссылка.Контрагент.Родитель.Наименование стоит применять осторожно на больших отчётах?"
    choices:
      - id: a
        text: "Каждая точка превращается платформой в левое соединение с таблицей ссылки, и на"
      - id: b
        text: "Точка запрещена в языке запросов и вызовет синтаксическую ошибку."
      - id: c
        text: "Разыменование через точку меняет данные в справочнике."
      - id: d
        text: "Каждая точка создаёт новую табличную часть в документе."
    correct: [a]
    explanation: "Разыменование удобно и наглядно, но под капотом каждая точка - это левое соединение. Много точек плюс много строк дают цепочку соединений, которую на массовых отчётах выгоднее заменить явным управляемым СОЕДИНЕНИЕМ."
    hints:
      - "Спросите себя, что физически делает платформа, когда идёт по ссылке к реквизиту другой таблицы."
      - "Свяжите стоимость точки с числом таблиц, которые приходится соединять, и умножьте на число строк отчёта."
