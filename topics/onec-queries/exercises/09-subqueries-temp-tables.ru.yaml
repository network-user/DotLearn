exercises:
  - id: subqueries-temp-tables-basics-001
    concept: subqueries-temp-tables
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает ключевое слово ПОМЕСТИТЬ в пакетном запросе?"
    choices:
      - id: a
        text: "Сохраняет результат запроса во временную таблицу для использования следующими запросами пакета."
      - id: b
        text: "Записывает результат в справочник."
      - id: c
        text: "Проводит документ."
      - id: d
        text: "Удаляет строки из источника."
    correct: [a]
    explanation: "ПОМЕСТИТЬ ВТ_Имя материализует результат запроса во временную таблицу; следующие запросы пакета читают её по имени, как обычную таблицу."
    variants:
      - prompt: "Сколько колонок должен возвращать подзапрос, стоящий в операторе В (...)?"
        choices:
          - id: a
            text: "Ровно одну - список значений для проверки вхождения."
          - id: b
            text: "Ровно две."
          - id: c
            text: "Любое число колонок."
          - id: d
            text: "Ни одной."
        correct: [a]
        explanation: "Оператор В сравнивает значение со списком, поэтому подзапрос в нём должен вернуть одну колонку. Две колонки - логическая ошибка."
      - prompt: "Что обязательно нужно вложенному запросу, стоящему в разделе ИЗ?"
        choices:
          - id: a
            text: "Псевдоним через КАК, иначе к его полям не обратиться."
          - id: b
            text: "Раздел ИТОГИ."
          - id: c
            text: "Параметр периода."
          - id: d
            text: "Ключевое слово ПОМЕСТИТЬ."
        correct: [a]
        explanation: "Вложенный запрос в ИЗ выступает таблицей-источником, и ему обязательно задают псевдоним через КАК."

  - id: subqueries-temp-tables-blanks-001
    concept: subqueries-temp-tables
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите пропущенное, чтобы первый запрос пакета сложил склады во временную таблицу с индексом."
    template: |
      ВЫБРАТЬ
          Склады.Ссылка КАК Склад
      {{into}} ВТ_Склады
      ИЗ
          Справочник.Склады КАК Склады
      ГДЕ
          Склады.Город = &Город
      {{index}} Склад
    blanks:
      into:
        accept: ["ПОМЕСТИТЬ", "поместить"]
        accept_regex: '^\s*[Пп]оместить\s*$'
      index:
        accept: ["ИНДЕКСИРОВАТЬ ПО", "индексировать по"]
        accept_regex: '^\s*[Ии]ндексировать\s+[Пп]о\s*$'
    explanation: "ПОМЕСТИТЬ сохраняет результат во временную таблицу, а ИНДЕКСИРОВАТЬ ПО создаёт индекс по полю Склад для ускорения последующих соединений."
    variants:
      - prompt: "Впишите пропущенное, чтобы отобрать продажи по складам заданного города через подзапрос в операторе В."
        template: |
          ГДЕ
              Продажи.Склад {{in}}
                  ({{select}} Склады.Ссылка ИЗ Справочник.Склады КАК Склады
                   ГДЕ Склады.Город = &Город)
        blanks:
          in:
            accept: ["В", "в"]
            accept_regex: '^\s*(В|в)\s*$'
          select:
            accept: ["ВЫБРАТЬ", "выбрать"]
            accept_regex: '^\s*(ВЫБРАТЬ|выбрать)\s*$'
      - prompt: "Впишите пропущенное, чтобы явно освободить временную таблицу, которая больше не нужна."
        template: |
          {{drop}} ВТ_Склады
        blanks:
          drop:
            accept: ["УНИЧТОЖИТЬ", "уничтожить"]
            accept_regex: '^\s*[Уу]ничтожить\s*$'

  - id: subqueries-temp-tables-predict-001
    concept: subqueries-temp-tables
    type: predict-output
    difficulty: 3
    prompt: "Сколько строк продаж вернёт запрос с подзапросом в операторе В? Введите число."
    fixture: |
      Справочник.Склады:
      Склад        Город
      Основной     Москва
      Резервный    Москва
      Транзитный   Казань

      Продажи (по строке на позицию):
      Склад
      Основной
      Транзитный
      Резервный
      Основной
    snippet: |
      ВЫБРАТЬ
          Продажи.Склад КАК Склад
      ИЗ
          Документ.РеализацияТоваровУслуг.Товары КАК Продажи
      ГДЕ
          Продажи.Склад В
              (ВЫБРАТЬ Склады.Ссылка ИЗ Справочник.Склады КАК Склады
               ГДЕ Склады.Город = "Москва")
    expected:
      kind: scalar
      value: 3
    hints:
      - "Сначала вычислите внутренний запрос: какие склады относятся к городу Москва?"
      - "Оставьте только строки продаж, чей склад попал в этот список, и пересчитайте их. Транзитный склад из Казани в список не входит."
