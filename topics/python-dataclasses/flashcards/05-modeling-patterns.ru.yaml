conceptId: modeling-patterns
cards:
  - id: modeling-patterns-01
    front: "В чём разница между сырым словарём и моделью данных?"
    back: "У словаря форма неявная: какие ключи и типы ожидаются, разработчик выясняет, читая наполняющий код. У модели форма записана объявлением: поля, типы и умолчания видны сразу, а опечатка в имени поля ловится сразу при создании или доступе, а не всплывает через три слоя."
    tags: [modeling]
  - id: modeling-patterns-02
    front: "Чем config-объект лучше словаря настроек?"
    back: "Набор полей, типы и умолчания зафиксированы явно и собраны в одном месте, автодополнение знает все поля, а неизвестный ключ вызывает TypeError сразу при создании. Словарь {'port': 443} не даёт ничего из этого: форма живёт только в голове."
    tags: [config]
  - id: modeling-patterns-03
    front: "Что такое value object и как его моделируют в Python?"
    back: "Сущность, которая определяется значением, а не идентичностью: сто рублей это сто рублей независимо от объекта в памяти. В Python это frozen dataclass: у него бесплатно есть и сравнение по значению, и хэшируемость, поэтому его можно класть в set и использовать ключом dict."
    tags: [value-object]
  - id: modeling-patterns-04
    front: "Что такое DTO и почему его собирают вручную, а не через asdict?"
    back: "DTO (объект передачи данных) это узкая форма между слоями с только нужными полями. Его собирают явно, потому что asdict(user) развернул бы весь объект и протащил наружу лишнее, например password_hash. Явный DTO это граница, где вы решаете, что уходит в другой слой."
    tags: [dto]
  - id: modeling-patterns-05
    front: "Чем опасен антипаттерн «сырой dict через всё приложение»?"
    back: "Форма данных неявная: какие ключи и типы ожидаются, нигде не записано, поэтому опечатка в ключе даёт None или KeyError далеко от места ошибки. Как только словарь переживает больше одной функции, форме стоит дать имя: dataclass, NamedTuple или, на границе, pydantic."
    tags: [antipattern]
  - id: modeling-patterns-06
    front: "Когда обычный класс уместнее dataclass?"
    back: "Когда класс это в первую очередь поведение (много методов, а полей-данных почти нет); когда в конструкторе тяжёлая сборка или инварианты, не выражаемые полями и __post_init__; когда нужен полный контроль над __init__ или объект изменяемый и сравнивать его по значению нельзя."
    tags: [design]
  - id: modeling-patterns-07
    front: "Когда моделировать данные через dataclass избыточно?"
    back: "Для одноразовой пары значений внутри одной функции, которая никуда не передаётся: ей хватит кортежа, а класс это лишний код. Класс окупается, когда форма переживает границу функции: передаётся дальше, сериализуется или живёт в коллекции."
    tags: [design]
  - id: modeling-patterns-08
    front: "Где всплывает опечатка при обращении config['prot'] против config.prot?"
    back: "У словаря config['prot'] молча даёт None (или KeyError) в глубине, и ошибку ищут далеко от причины. У типизированной модели config.prot бросает AttributeError сразу, в точке обращения. Явная форма превращает поздний скрытый сбой в раннюю громкую ошибку."
    tags: [modeling]
  - id: modeling-patterns-09
    front: "Чем DTO отличается от доменного объекта?"
    back: "Доменный объект живёт внутри приложения и несёт бизнес-смысл со всеми полями и инвариантами. DTO существует ради передачи и подстроен под конкретную границу (ответ API, сообщение в очередь). Их разделение стоит одной функции-конвертера, зато развязывает домен и внешний контракт."
    tags: [dto]
  - id: modeling-patterns-10
    front: "Почему value object обязан быть неизменяемым?"
    back: "Он сравнивается и хэшируется по значению. Если такой объект изменяем, после мутации его хэш разъедется с корзиной, в которую он попал в множестве или словаре, и объект «потеряется». Поэтому value object делают frozen: поля неизменны, хэш стабилен."
    tags: [value-object]
