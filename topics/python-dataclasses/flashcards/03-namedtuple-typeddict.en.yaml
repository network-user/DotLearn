conceptId: namedtuple-typeddict
cards:
  - id: namedtuple-typeddict-01
    front: "What is typing.NamedTuple at runtime?"
    back: "A real tuple whose fields have gotten names: a subclass of tuple. It's immutable, iterable, unpacks, is indexable, and compares like a plain tuple; the only difference is that elements can also be accessed by name."
    tags: [namedtuple]
  - id: namedtuple-typeddict-02
    front: "What is TypedDict at runtime?"
    back: "A shape annotation for a plain dict. No new type appears at runtime: what you have is still the same dict, and the description of keys and types exists only for the type checker. Zero overhead."
    tags: [typeddict]
  - id: namedtuple-typeddict-03
    front: "Why is Point(1, 2) == (1, 2) true, if Point is a NamedTuple?"
    back: "NamedTuple inherits __eq__ from tuple, which compares by values regardless of type. So a named tuple equals a plain tuple with the same numbers. For a dataclass this would be False, because its __eq__ checks the class first."
    tags: [equality]
  - id: namedtuple-typeddict-04
    front: "What do NamedTuple's helper attributes _fields, _replace, _asdict give you?"
    back: "_fields returns a tuple of field names; _replace gives a copy with one field changed (the object itself stays immutable); _asdict turns the tuple into a dict. Names start with an underscore to avoid clashing with fields."
    tags: [namedtuple]
  - id: namedtuple-typeddict-05
    front: "How do you control which keys are required in a TypedDict?"
    back: "By default all keys are required. total=False makes every key optional at once. NotRequired marks a single key as optional, and its counterpart Required restores requiredness for one key, leaving the rest as-is."
    tags: [typeddict]
  - id: namedtuple-typeddict-06
    front: "Do NamedTuple and TypedDict validate data at runtime?"
    back: "No. NamedTuple happily accepts Point('a', 'b'), and TypedDict is just a dict you can put anything into. Type checking is done by a static analyzer (mypy, pyright), not by Python at runtime. For validating external data you need pydantic."
    tags: [validation]
  - id: namedtuple-typeddict-07
    front: "Why can't you do isinstance(film, Movie) if Movie is a TypedDict?"
    back: "TypedDict doesn't create a class at runtime, so checking against it is disallowed. At runtime film is a dict: isinstance(film, dict) is true, and the Movie shape is only visible to the type checker."
    tags: [typeddict]
  - id: namedtuple-typeddict-08
    front: "How does typing.NamedTuple differ from collections.namedtuple?"
    back: "collections.namedtuple defines fields with a string of names and knows nothing about type annotations. typing.NamedTuple gives you the same tuple, but with class syntax, annotations, and defaults that an analyzer can read. Both produce a tuple subclass; for new code, use typing.NamedTuple."
    tags: [namedtuple]
  - id: namedtuple-typeddict-09
    front: "How do you choose between NamedTuple, TypedDict, and dataclass?"
    back: "NamedTuple for a lightweight immutable set of values, often a function's return. TypedDict to type the shape of someone else's dict at the JSON boundary, with no wrapper. dataclass when you need methods, __post_init__, frozen, mutability, or other rich behavior."
    tags: [choice]
  - id: namedtuple-typeddict-10
    front: "How do you 'change' a NamedTuple if it's immutable?"
    back: "Assigning to a field is forbidden, so you use _replace: it returns a new tuple with the field changed, leaving the original untouched. Same trick as with any immutable value: don't mutate, build a copy."
    tags: [namedtuple]
