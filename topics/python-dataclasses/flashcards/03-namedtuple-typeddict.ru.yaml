conceptId: namedtuple-typeddict
cards:
  - id: namedtuple-typeddict-01
    front: "Что такое typing.NamedTuple в рантайме?"
    back: "Настоящий кортеж, у полей которого появились имена: подкласс tuple. Он неизменяем, итерируем, распаковывается, индексируется и сравнивается как обычный кортеж; разница лишь в том, что к элементам можно обратиться и по имени."
    tags: [namedtuple]
  - id: namedtuple-typeddict-02
    front: "Что такое TypedDict в рантайме?"
    back: "Аннотация формы для обычного словаря. Нового типа во время выполнения не появляется: перед вами остаётся тот же dict, а описание ключей и типов существует только для проверяющего типы. Накладных расходов ноль."
    tags: [typeddict]
  - id: namedtuple-typeddict-03
    front: "Почему Point(1, 2) == (1, 2) истинно, если Point это NamedTuple?"
    back: "NamedTuple наследует __eq__ от tuple, а тот сравнивает по значениям без учёта типа. Поэтому именованный кортеж равен обычному кортежу с теми же числами. Для dataclass было бы False, потому что его __eq__ сначала проверяет класс."
    tags: [equality]
  - id: namedtuple-typeddict-04
    front: "Что дают служебные атрибуты NamedTuple: _fields, _replace, _asdict?"
    back: "_fields возвращает кортеж имён полей; _replace отдаёт копию с изменённым полем (сам объект неизменяем); _asdict превращает кортеж в словарь. Имена начинаются с подчёркивания, чтобы не конфликтовать с полями."
    tags: [namedtuple]
  - id: namedtuple-typeddict-05
    front: "Как управлять обязательностью ключей в TypedDict?"
    back: "По умолчанию все ключи обязательны. total=False делает необязательными сразу все ключи. NotRequired помечает отдельный ключ как необязательный, а парный Required возвращает обязательность точечно, оставляя остальные ключи как есть."
    tags: [typeddict]
  - id: namedtuple-typeddict-06
    front: "Валидируют ли NamedTuple и TypedDict данные в рантайме?"
    back: "Нет. NamedTuple спокойно примет Point('a', 'b'), а TypedDict это просто словарь, куда можно положить что угодно. Проверку типов делает статический анализатор (mypy, pyright), но не Python при запуске. Для проверки внешних данных нужен pydantic."
    tags: [validation]
  - id: namedtuple-typeddict-07
    front: "Почему isinstance(film, Movie) нельзя, если Movie это TypedDict?"
    back: "TypedDict не создаёт класс в рантайме, поэтому проверка на него запрещена. В рантайме film это dict: isinstance(film, dict) истинно, а форма Movie видна только анализатору типов."
    tags: [typeddict]
  - id: namedtuple-typeddict-08
    front: "Чем typing.NamedTuple отличается от collections.namedtuple?"
    back: "collections.namedtuple задаёт поля строкой имён и не знает про аннотации типов. typing.NamedTuple даёт тот же кортеж, но с классовым синтаксисом, аннотациями и значениями по умолчанию, читаемыми анализатором. Оба порождают подкласс tuple; для нового кода берут typing.NamedTuple."
    tags: [namedtuple]
  - id: namedtuple-typeddict-09
    front: "Как выбрать между NamedTuple, TypedDict и dataclass?"
    back: "NamedTuple для лёгкого неизменяемого набора значений, часто возврата из функции. TypedDict чтобы типизировать форму чужого словаря на границе с JSON, без обёртки. dataclass когда нужны методы, __post_init__, frozen, изменяемость или иное богатое поведение."
    tags: [choice]
  - id: namedtuple-typeddict-10
    front: "Как «изменить» NamedTuple, если он неизменяем?"
    back: "Присваивание полю запрещено, поэтому берут _replace: он возвращает новый кортеж с изменённым полем, не трогая исходный. Это тот же приём, что и с любым неизменяемым значением: не мутировать, а строить копию."
    tags: [namedtuple]
