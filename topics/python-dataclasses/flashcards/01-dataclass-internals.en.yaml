conceptId: dataclass-internals
cards:
  - id: dataclass-internals-01
    front: "When exactly does the @dataclass decorator run?"
    back: "Once, at class creation time. It walks the annotated fields, collects them into __dataclass_fields__, and synthesizes methods as regular code. It doesn't intervene in later calls: after it runs, you're left with a plain class with honest methods."
    tags: [internals]
  - id: dataclass-internals-02
    front: "What turns a class variable into a dataclass field?"
    back: "A type annotation. x: int creates a field, while count = 0 without an annotation stays a plain class variable: it won't appear in __init__, __repr__, or fields(). The annotation is the only signal the decorator uses to recognize a field."
    tags: [fields]
  - id: dataclass-internals-03
    front: "How does fields() differ from __dataclass_fields__?"
    back: "fields() is the public API: it returns a tuple of Field objects in declaration order and filters out internal entries. __dataclass_fields__ is an internal dict keyed by name. For iteration, use fields()."
    tags: [introspection]
  - id: dataclass-internals-04
    front: "How do you give a field a mutable default (list, dict)?"
    back: "Only via field(default_factory=list). The factory is called fresh for each instance, so objects don't share one list. A bare items: list = [] is forbidden by the decorator and raises ValueError right at class definition."
    tags: [factory]
  - id: dataclass-internals-05
    front: "What do field(repr=False) and field(compare=False) do?"
    back: "repr=False removes the field from __repr__ (handy for long or secret values like a token). compare=False excludes the field from __eq__ and comparison, so objects differing only in that field's value are still considered equal (a cache, a timestamp)."
    tags: [field]
  - id: dataclass-internals-06
    front: "What is the metadata parameter of field() for, and can you change it?"
    back: "metadata carries an arbitrary dict for third-party tools (serializers, ORMs); the dataclass itself never reads it. Via fields() it comes back as a read-only MappingProxyType: you must set values up front in field(metadata=...)."
    tags: [metadata]
  - id: dataclass-internals-07
    front: "What levers do the @dataclass(...) decorator flags control?"
    back: "init, repr, eq turn on generation of the corresponding methods; order adds <, <=, >, >= comparisons; frozen forbids assignment; slots generates __slots__; kw_only makes fields keyword-only; unsafe_hash forces synthesizing __hash__; match_args builds __match_args__ for match."
    tags: [flags]
  - id: dataclass-internals-08
    front: "How does a field marked typing.ClassVar behave?"
    back: "The decorator recognizes ClassVar and excludes it from fields entirely: that name is absent from __init__, fields(), and __eq__. It's a way to keep a constant shared by all instances alongside the fields without turning it into one."
    tags: [classvar]
  - id: dataclass-internals-09
    front: "What is InitVar and how does its value reach __post_init__?"
    back: "InitVar describes a pseudo-field: the value arrives via __init__ and is passed to __post_init__ as the first positional arguments after self, in declaration order, but it's never stored as an attribute and never appears in fields(). The number and order of InitVars must match __post_init__'s parameters, or you get a TypeError."
    tags: [initvar]
  - id: dataclass-internals-10
    front: "How do you check something is a dataclass, and what does a Field object look like?"
    back: "The check is dataclasses.is_dataclass(obj). Each Field from fields() has .name, .type, .default, .default_factory, .repr, .compare, and .metadata, so you can see how the field participates in the generated methods."
    tags: [introspection]
  - id: dataclass-internals-11
    front: "How does the decorator actually synthesize __init__?"
    back: "It assembles the function's text as a string (e.g. def __init__(self, x, y=0): self.x = x; self.y = y) and compiles it via exec into a real function bound to the class. That's why field order is strict, and defaults must follow required fields: the usual rules of a function signature."
    tags: [internals]
