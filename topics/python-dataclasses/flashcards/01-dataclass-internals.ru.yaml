conceptId: dataclass-internals
cards:
  - id: dataclass-internals-01
    front: "Когда именно работает декоратор @dataclass?"
    back: "Один раз, в момент создания класса. Он проходит по аннотированным полям, собирает их в __dataclass_fields__ и синтезирует методы как обычный код. В дальнейшие вызовы он не вмешивается: после него остаётся простой класс с честными методами."
    tags: [internals]
  - id: dataclass-internals-02
    front: "Что превращает переменную класса в поле dataclass?"
    back: "Аннотация типа. x: int создаёт поле, а count = 0 без аннотации остаётся обычной переменной класса: в __init__, __repr__ и fields() она не попадёт. Аннотация это единственный сигнал, по которому декоратор распознаёт поле."
    tags: [fields]
  - id: dataclass-internals-03
    front: "Чем fields() отличается от __dataclass_fields__?"
    back: "fields() это публичный API: возвращает кортеж объектов Field в порядке объявления и отсеивает служебные записи. __dataclass_fields__ это внутренний словарь по именам. Для перебора берут fields()."
    tags: [introspection]
  - id: dataclass-internals-04
    front: "Как задать полю изменяемое умолчание (список, словарь)?"
    back: "Только через field(default_factory=list). Фабрика вызывается заново при создании каждого экземпляра, поэтому объекты не делят один список. Голое items: list = [] декоратор запретит и бросит ValueError уже при определении класса."
    tags: [factory]
  - id: dataclass-internals-05
    front: "Что делают field(repr=False) и field(compare=False)?"
    back: "repr=False убирает поле из __repr__ (удобно для длинных или секретных значений вроде токена). compare=False исключает поле из __eq__ и сравнения, поэтому объекты с разным значением такого поля всё равно считаются равными (кэш, временная метка)."
    tags: [field]
  - id: dataclass-internals-06
    front: "Для чего нужен параметр metadata у field() и можно ли его менять?"
    back: "metadata несёт произвольный словарь для сторонних инструментов (сериализаторы, ORM); сам dataclass его не читает. Через fields() он отдаётся как MappingProxyType, доступный только для чтения: задавать значения нужно сразу в field(metadata=...)."
    tags: [metadata]
  - id: dataclass-internals-07
    front: "Какие рычаги включают флаги декоратора @dataclass(...)?"
    back: "init, repr, eq включают генерацию соответствующих методов; order добавляет сравнение <, <=, >, >=; frozen запрещает присваивание; slots генерирует __slots__; kw_only делает поля только-именованными; unsafe_hash принудительно синтезирует __hash__; match_args строит __match_args__ для match."
    tags: [flags]
  - id: dataclass-internals-08
    front: "Как ведёт себя поле, помеченное typing.ClassVar?"
    back: "Декоратор распознаёт ClassVar и полностью исключает его из полей: такого имени нет ни в __init__, ни в fields(), ни в __eq__. Это способ держать общую для всех экземпляров константу рядом с полями, не превращая её в поле."
    tags: [classvar]
  - id: dataclass-internals-09
    front: "Что такое InitVar и как значение доходит до __post_init__?"
    back: "InitVar описывает псевдополе: значение приходит в __init__ и передаётся в __post_init__ первыми аргументами после self в порядке объявления, но атрибутом не сохраняется и в fields() не попадает. Число и порядок InitVar должны совпадать с параметрами __post_init__, иначе TypeError."
    tags: [initvar]
  - id: dataclass-internals-10
    front: "Как проверить, что перед вами dataclass, и как выглядит объект Field?"
    back: "Проверка это dataclasses.is_dataclass(obj). У каждого Field из fields() есть .name, .type, .default, .default_factory, .repr, .compare и .metadata, поэтому по нему видно, как поле участвует в сгенерированных методах."
    tags: [introspection]
  - id: dataclass-internals-11
    front: "Как декоратор на самом деле синтезирует __init__?"
    back: "Он собирает текст функции строкой (например def __init__(self, x, y=0): self.x = x; self.y = y) и компилирует её через exec в настоящую функцию, привязанную к классу. Отсюда строгий порядок полей и правило, что умолчания идут после обязательных полей: это правила обычной сигнатуры."
    tags: [internals]
