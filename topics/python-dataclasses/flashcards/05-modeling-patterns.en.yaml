conceptId: modeling-patterns
cards:
  - id: modeling-patterns-01
    front: "What's the difference between a raw dict and a data model?"
    back: "A dict's shape is implicit: a developer figures out what keys and types are expected by reading the code that populates it. A model's shape is declared: fields, types, and defaults are visible immediately, and a typo in a field name is caught right at creation or access, not three layers later."
    tags: [modeling]
  - id: modeling-patterns-02
    front: "Why is a config object better than a settings dict?"
    back: "The set of fields, types, and defaults is fixed explicitly and gathered in one place, autocomplete knows every field, and an unknown key raises TypeError right at creation. A dict like {'port': 443} gives you none of that: the shape only lives in your head."
    tags: [config]
  - id: modeling-patterns-03
    front: "What is a value object, and how is it modeled in Python?"
    back: "An entity defined by its value rather than identity: a hundred dollars is a hundred dollars regardless of which object in memory holds it. In Python that's a frozen dataclass: it gets value comparison and hashability for free, so it can go into a set or be used as a dict key."
    tags: [value-object]
  - id: modeling-patterns-04
    front: "What is a DTO, and why is it built by hand instead of via asdict?"
    back: "A DTO (data transfer object) is a narrow shape between layers with only the fields that are needed. It's built explicitly, because asdict(user) would unfold the entire object and leak things like password_hash. An explicit DTO is the boundary where you decide what crosses into another layer."
    tags: [dto]
  - id: modeling-patterns-05
    front: "Why is the 'raw dict everywhere in the app' anti-pattern dangerous?"
    back: "The data's shape is implicit: what keys and types are expected is recorded nowhere, so a typo in a key yields None or KeyError far from where the mistake happened. Once a dict outlives a single function, its shape deserves a name: dataclass, NamedTuple, or, at the boundary, pydantic."
    tags: [antipattern]
  - id: modeling-patterns-06
    front: "When is a plain class more fitting than a dataclass?"
    back: "When the class is primarily behavior (many methods, almost no data fields); when the constructor does heavy assembly or has invariants that fields and __post_init__ can't express; when you need full control over __init__, or the object is mutable and shouldn't be compared by value."
    tags: [design]
  - id: modeling-patterns-07
    front: "When is modeling data via a dataclass overkill?"
    back: "For a one-off pair of values inside a single function that never leaves it: a tuple is enough there, and a class is just extra code. A class pays off once the shape outlives a function boundary: passed onward, serialized, or stored in a collection."
    tags: [design]
  - id: modeling-patterns-08
    front: "Where does a typo surface with config['prot'] versus config.prot?"
    back: "With a dict, config['prot'] silently gives None (or KeyError) deep in the code, and you hunt for the bug far from its cause. With a typed model, config.prot raises AttributeError immediately, right at the point of access. An explicit shape turns a late silent failure into an early loud one."
    tags: [modeling]
  - id: modeling-patterns-09
    front: "How does a DTO differ from a domain object?"
    back: "A domain object lives inside the application and carries business meaning with all its fields and invariants. A DTO exists purely for transfer and is shaped for a specific boundary (an API response, a queue message). Splitting them costs one converter function but decouples the domain from the external contract."
    tags: [dto]
  - id: modeling-patterns-10
    front: "Why must a value object be immutable?"
    back: "It's compared and hashed by value. If such an object were mutable, mutating it would desync its hash from the bucket it landed in inside a set or dict, and the object would 'get lost'. That's why value objects are made frozen: fields are immutable, hash is stable."
    tags: [value-object]
