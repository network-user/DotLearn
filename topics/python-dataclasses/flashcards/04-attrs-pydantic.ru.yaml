conceptId: attrs-pydantic
cards:
  - id: attrs-pydantic-01
    front: "Что обычный dataclass делает с типами при создании объекта?"
    back: "Ничего не проверяет и не приводит. Аннотация типа для него это подсказка человеку и анализатору, а не проверка в рантайме: Box('5') для поля size: int создаст объект, в котором size останется строкой, и '5' + '5' даст «55», а не 10."
    tags: [dataclass]
  - id: attrs-pydantic-02
    front: "Что делает converter у поля в attrs?"
    back: "Преобразует переданное значение перед сохранением: например converter=int превратит строку «5» в число 5 при создании объекта. Это про нормализацию и приведение типа, а не про проверку."
    tags: [attrs]
  - id: attrs-pydantic-03
    front: "Что делает validator у поля в attrs?"
    back: "Проверяет уже присвоенное значение и бросает ошибку, если оно недопустимо, ничего не меняя. Например validator=ge(0) не даст завести отрицательный баланс. Преобразованием занимается отдельный рычаг, converter."
    tags: [attrs]
  - id: attrs-pydantic-04
    front: "Для чего создан pydantic BaseModel?"
    back: "Чтобы на границе принять данные из внешнего мира и либо превратить их в проверенный объект, либо внятно отказать через ValidationError. Он валидирует форму и типы и при необходимости приводит их (коэрция), чего обычный dataclass не делает."
    tags: [pydantic]
  - id: attrs-pydantic-05
    front: "Что делают model_validate и model_dump в pydantic v2?"
    back: "model_validate разбирает вход: User.model_validate({'id': '1'}) проверит данные и приведёт «1» к числу 1. model_dump отдаёт словарь для сериализации на выходе. Это две границы одной модели: валидация на входе, выгрузка на выходе."
    tags: [pydantic]
  - id: attrs-pydantic-06
    front: "Как звучит правило размещения dataclass и pydantic?"
    back: "dataclass доверяет, pydantic проверяет. На границе ввода-вывода с недоверенными данными ставят pydantic: он проверит форму и типы один раз, при входе. Внутри домена, где данные уже проверены, достаточно dataclass, чтобы не платить за повторную валидацию на каждом шаге."
    tags: [boundary]
  - id: attrs-pydantic-07
    front: "Чем отличается API pydantic v2 от v1?"
    back: "В v2 методы называются model_validate и model_dump. Старые parse_obj и dict из v1 в новом коде не используют. Путаница между версиями это частая ошибка при чтении примеров из интернета."
    tags: [pydantic]
  - id: attrs-pydantic-08
    front: "Что делает strict-режим в pydantic?"
    back: "Отключает молчаливую коэрцию: когда типы должны совпадать точно, «1» в поле int станет ошибкой, а не будет приведено к числу. По умолчанию pydantic приводит совместимые типы; strict нужен, когда приведение нежелательно."
    tags: [pydantic]
  - id: attrs-pydantic-09
    front: "Как связка dataclass и pydantic выглядит во FastAPI?"
    back: "Модели запроса и ответа это pydantic BaseModel: фреймворк сам валидирует тело запроса на входе и сериализует ответ на выходе. Доменные объекты между обработчиком и базой спокойно остаются обычными dataclass, потому что до них доходят уже проверенные данные."
    tags: [fastapi]
  - id: attrs-pydantic-10
    front: "Почему dataclass так похож на attrs?"
    back: "dataclass вырос из attrs: идею «сгенерируй __init__ и __repr__ по полям» перенесли в стандартную библиотеку как PEP 557, взяв только базовую часть. Валидаторы, конвертеры и прочую гибкость оставили снаружи, поэтому attrs жив и покрывает то, что dataclass принципиально не делает."
    tags: [history]
