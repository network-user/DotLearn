conceptId: dataclass-advanced
cards:
  - id: dataclass-advanced-01
    front: "Что на самом деле делает frozen=True и что он не замораживает?"
    back: "Он заменяет __setattr__ и __delattr__ на версии, бросающие FrozenInstanceError при любом присваивании или удалении атрибута. Заморожена ссылка, а не то, на что она указывает: если поле хранит список, этот список по-прежнему можно пополнять."
    tags: [frozen]
  - id: dataclass-advanced-02
    front: "Как задать поле внутри __post_init__ у frozen-класса?"
    back: "Через object.__setattr__(self, 'value', new). Прямое self.value = new бросит FrozenInstanceError, потому что класс подменил свой __setattr__. Именно object.__setattr__ использует и сгенерированный __init__ замороженного класса."
    tags: [frozen]
  - id: dataclass-advanced-03
    front: "Как флаги eq и frozen влияют на хэшируемость (три расклада)?"
    back: "eq=True, frozen=False (по умолчанию): __hash__ = None, объект нехэшируемый. eq=True, frozen=True: Python синтезирует __hash__, объект хэшируемый. eq=False: остаётся __hash__ от object по идентичности, хэшируемый, но равенство по id, а не по значению."
    tags: [hash]
  - id: dataclass-advanced-04
    front: "Почему обычный dataclass по умолчанию нехэшируемый?"
    back: "Он изменяем и сравнивается по значению. Если положить такой объект в set и поменять поле, изменится и хэш, и объект «потеряется» в своей корзине. Чтобы не допустить этого, Python выставляет __hash__ = None. frozen=True снимает противоречие: поля неизменны, хэш стабилен."
    tags: [hash]
  - id: dataclass-advanced-05
    front: "Что даёт slots=True и какова цена?"
    back: "Он генерирует __slots__ из имён полей и убирает __dict__: меньше памяти на больших количествах объектов и чуть быстрее доступ. Цена: нельзя завести атрибут вне полей (AttributeError), weakref требует __weakref__, конфликтует множественное наследование slotted-классов, а сам класс пересоздаётся."
    tags: [slots]
  - id: dataclass-advanced-06
    front: "В каком порядке собираются поля при наследовании dataclass?"
    back: "Сначала идут поля базовых классов в порядке объявления, затем поля потомка. Это делает сигнатуру __init__ предсказуемой: база впереди, наследник следом."
    tags: [inheritance]
  - id: dataclass-advanced-07
    front: "Почему обязательное поле в потомке после дефолтного поля базы ломает класс?"
    back: "Получается «обязательный аргумент после аргумента с умолчанием», чего сигнатура функции не допускает, поэтому Python бросает TypeError уже при определении класса. Спасает kw_only: только-именованное поле выпадает из позиционного порядка и конфликт исчезает."
    tags: [inheritance]
  - id: dataclass-advanced-08
    front: "Что делает kw_only и где он полезен?"
    back: "Он делает поле (или весь класс) только-именованным: в конструктор его передают лишь как name=value. Поле выходит из позиционного порядка, поэтому его можно объявить после дефолтных полей базы без ошибки «non-default argument follows default argument»."
    tags: [kwonly]
  - id: dataclass-advanced-09
    front: "Как работает dataclasses.replace и почему он снова запускает __post_init__?"
    back: "replace не мутирует объект, а собирает аргументы из текущих полей, накладывает изменения и вызывает __init__ заново, поэтому __post_init__ отрабатывает снова и копия проходит ту же валидацию. Поля с init=False передавать в replace нельзя (ValueError), они пересчитываются внутри."
    tags: [replace]
  - id: dataclass-advanced-10
    front: "Что важно помнить про asdict и astuple?"
    back: "Они разворачивают dataclass в словарь и кортеж рекурсивно: вложенные dataclass, списки, словари и кортежи копируются вглубь. Это глубокая копия, а не дешёвое представление, поэтому на большом дереве в горячем цикле asdict стоит полного обхода."
    tags: [asdict]
  - id: dataclass-advanced-11
    front: "Как сделать frozen dataclass по-настоящему неизменяемым вглубь?"
    back: "frozen неглубокий: obj.items.append(x) сработает, если items это список. Чтобы вложенные данные тоже нельзя было менять, храните неизменяемые типы, например кортежи вместо списков, тогда мутировать содержимое будет нечем."
    tags: [frozen]
