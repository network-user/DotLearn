conceptId: dataclass-advanced
cards:
  - id: dataclass-advanced-01
    front: "What does frozen=True actually do, and what does it not freeze?"
    back: "It replaces __setattr__ and __delattr__ with versions that raise FrozenInstanceError on any attribute assignment or deletion. It freezes the reference, not what it points to: if a field holds a list, that list can still be appended to."
    tags: [frozen]
  - id: dataclass-advanced-02
    front: "How do you set a field inside __post_init__ on a frozen class?"
    back: "Via object.__setattr__(self, 'value', new). A direct self.value = new raises FrozenInstanceError, because the class replaced its own __setattr__. The generated __init__ of a frozen class uses exactly this object.__setattr__ too."
    tags: [frozen]
  - id: dataclass-advanced-03
    front: "How do the eq and frozen flags affect hashability (three cases)?"
    back: "eq=True, frozen=False (default): __hash__ = None, unhashable. eq=True, frozen=True: Python synthesizes __hash__, hashable. eq=False: object's identity-based __hash__ remains, hashable, but equality is by id, not value."
    tags: [hash]
  - id: dataclass-advanced-04
    front: "Why is a plain dataclass unhashable by default?"
    back: "It's mutable and compared by value. If you put such an object in a set and then change a field, both its hash and the object change, and it 'gets lost' in its bucket. To prevent that, Python sets __hash__ = None. frozen=True resolves the contradiction: fields are immutable, hash is stable."
    tags: [hash]
  - id: dataclass-advanced-05
    front: "What does slots=True give you, and at what cost?"
    back: "It generates __slots__ from the field names and removes __dict__: less memory at scale and slightly faster attribute access. Cost: you can't add an attribute outside the fields (AttributeError), weakref requires __weakref__, multiple inheritance of slotted classes conflicts, and the class itself gets recreated."
    tags: [slots]
  - id: dataclass-advanced-06
    front: "In what order are fields assembled under dataclass inheritance?"
    back: "Base class fields come first, in declaration order, then the subclass's own fields. This keeps the __init__ signature predictable: base first, subclass after."
    tags: [inheritance]
  - id: dataclass-advanced-07
    front: "Why does a required field in a subclass after a defaulted base field break the class?"
    back: "You get a 'required argument after a defaulted argument', which a function signature disallows, so Python raises TypeError right at class definition. kw_only saves you: a keyword-only field drops out of positional order and the conflict disappears."
    tags: [inheritance]
  - id: dataclass-advanced-08
    front: "What does kw_only do, and where is it useful?"
    back: "It makes a field (or the whole class) keyword-only: it can only be passed to the constructor as name=value. The field leaves positional order, so it can be declared after the base class's defaulted fields without a 'non-default argument follows default argument' error."
    tags: [kwonly]
  - id: dataclass-advanced-09
    front: "How does dataclasses.replace work, and why does it re-run __post_init__?"
    back: "replace doesn't mutate the object; it gathers arguments from the current fields, applies your changes, and calls __init__ again, so __post_init__ runs again and the copy goes through the same validation. Fields with init=False can't be passed to replace (ValueError); they're recomputed internally."
    tags: [replace]
  - id: dataclass-advanced-10
    front: "What's important to remember about asdict and astuple?"
    back: "They unfold a dataclass into a dict and tuple recursively: nested dataclasses, lists, dicts, and tuples are copied deeply. It's a deep copy, not a cheap view, so on a large tree in a hot loop asdict costs a full traversal."
    tags: [asdict]
  - id: dataclass-advanced-11
    front: "How do you make a frozen dataclass truly immutable, deep down?"
    back: "frozen is shallow: obj.items.append(x) works if items is a list. To keep nested data unchangeable too, store immutable types, e.g. tuples instead of lists, so there's nothing left to mutate."
    tags: [frozen]
