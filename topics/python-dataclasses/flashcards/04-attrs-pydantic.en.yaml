conceptId: attrs-pydantic
cards:
  - id: attrs-pydantic-01
    front: "What does a plain dataclass do with types when constructing an object?"
    back: "Nothing gets checked or coerced. A type annotation is a hint for humans and analyzers, not a runtime check: Box('5') for a field size: int creates an object where size stays a string, and '5' + '5' gives '55', not 10."
    tags: [dataclass]
  - id: attrs-pydantic-02
    front: "What does a field's converter do in attrs?"
    back: "It transforms the passed value before storing it: e.g. converter=int turns the string '5' into the number 5 at object creation. It's about normalization and type coercion, not validation."
    tags: [attrs]
  - id: attrs-pydantic-03
    front: "What does a field's validator do in attrs?"
    back: "It checks the already-assigned value and raises an error if it's invalid, without changing anything. E.g. validator=ge(0) won't let you set a negative balance. Transformation is a separate lever, converter."
    tags: [attrs]
  - id: attrs-pydantic-04
    front: "What is pydantic's BaseModel built for?"
    back: "To accept data from the outside world at the boundary and either turn it into a validated object or clearly reject it via ValidationError. It validates shape and types and coerces them when needed, which a plain dataclass doesn't do."
    tags: [pydantic]
  - id: attrs-pydantic-05
    front: "What do model_validate and model_dump do in pydantic v2?"
    back: "model_validate parses input: User.model_validate({'id': '1'}) validates the data and coerces '1' to the number 1. model_dump returns a dict for output serialization. Two boundaries of one model: validation on input, dumping on output."
    tags: [pydantic]
  - id: attrs-pydantic-06
    front: "How does the rule for placing dataclass and pydantic go?"
    back: "dataclass trusts, pydantic checks. At the input/output boundary with untrusted data, use pydantic: it checks shape and types once, on the way in. Inside the domain, where data is already validated, a dataclass is enough, so you don't pay for revalidation at every step."
    tags: [boundary]
  - id: attrs-pydantic-07
    front: "How does pydantic v2's API differ from v1?"
    back: "In v2 the methods are called model_validate and model_dump. The old parse_obj and dict from v1 aren't used in new code. Mixing up the versions is a common mistake when reading examples online."
    tags: [pydantic]
  - id: attrs-pydantic-08
    front: "What does strict mode do in pydantic?"
    back: "It disables silent coercion: when types must match exactly, '1' in an int field becomes an error instead of being coerced to a number. By default pydantic coerces compatible types; strict is for when coercion is unwanted."
    tags: [pydantic]
  - id: attrs-pydantic-09
    front: "How does the dataclass/pydantic combo look in FastAPI?"
    back: "Request and response models are pydantic BaseModel: the framework validates the request body on input and serializes the response on output. Domain objects between the handler and the database can stay plain dataclasses, since by the time they reach there the data is already validated."
    tags: [fastapi]
  - id: attrs-pydantic-10
    front: "Why is dataclass so similar to attrs?"
    back: "dataclass grew out of attrs: the idea of 'generate __init__ and __repr__ from fields' was ported into the standard library as PEP 557, taking only the basic part. Validators, converters, and the rest of the flexibility were left out, which is why attrs is still alive and covers what dataclass fundamentally doesn't do."
    tags: [history]
