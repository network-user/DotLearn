exercises:
  - id: modeling-value-object-quiz
    concept: modeling-patterns
    type: theory-quiz
    difficulty: 1
    prompt: "Что такое value object в моделировании данных?"
    choices:
      - id: a
        text: "Объект, равенство которого определяется значениями полей."
      - id: b
        text: "Объект с уникальным id, который сравнивается по идентичности"
      - id: c
        text: "Словарь с произвольным набором ключей"
      - id: d
        text: "Класс без полей, только с методами"
    correct: [a]
    explanation: "Value object определяется значением: два объекта с одинаковыми полями равны и взаимозаменяемы. В Python это frozen dataclass, у которого есть и сравнение по значению, и хэшируемость."
    variants:
      - prompt: "Зачем нужен DTO (объект передачи данных) между слоями приложения?"
        choices:
          - id: a
            text: "Переносит между слоями только нужные поля в явной форме."
          - id: b
            text: "Ускоряет доступ к базе данных"
          - id: c
            text: "Заменяет собой бизнес-логику"
          - id: d
            text: "Валидирует внешний ввод вместо pydantic - путает валидацию полей с их простым хранением"
        correct: [a]
        explanation: "DTO это узкая форма для конкретной границы: в неё кладут ровно те поля, которые другой слой должен видеть, развязывая домен и транспорт."
      - prompt: "Чем опасен антипаттерн «сырой dict через всё приложение»?"
        choices:
          - id: a
            text: "Форма данных неявная: опечатка в ключе всплывает поздно, а поля и типы нигде не зафиксированы."
          - id: b
            text: "Словари работают медленнее любых классов"
          - id: c
            text: "dict нельзя сериализовать в JSON - игнорируя стоимость при плохом распределении хешей"
          - id: d
            text: "dict нельзя передавать между функциями - игнорируя стоимость при плохом распределении хешей"
        correct: [a]
        explanation: "Главная беда не в скорости, а в неявности контракта: какие ключи и типы ожидаются, нигде не записано, поэтому опечатки и пропуски всплывают далеко от места ошибки."

  - id: modeling-value-object-predict
    concept: modeling-patterns
    type: predict-output
    difficulty: 2
    prompt: "Что выведет print? Money это frozen dataclass, то есть value object."
    snippet: |
      from dataclasses import dataclass

      @dataclass(frozen=True)
      class Money:
          amount: int
          currency: str

      wallet = {Money(100, "RUB"), Money(100, "RUB"), Money(100, "USD")}
      print(len(wallet))
    expected:
      kind: stdout
      value: "2"
    hints:
      - "frozen dataclass сравнивается по значению и хэшируется по значению, поэтому одинаковые Money в множестве схлопываются в один."
    variants:
      - snippet: |
          from dataclasses import dataclass

          @dataclass(frozen=True)
          class Money:
              amount: int
              currency: str

          print(Money(50, "RUB") == Money(50, "RUB"))
        expected:
          kind: stdout
          value: "True"
      - snippet: |
          from dataclasses import dataclass

          @dataclass(frozen=True)
          class Coord:
              lat: float
              lon: float

          seen = {Coord(55.7, 37.6), Coord(55.7, 37.6)}
          print(len(seen))
        expected:
          kind: stdout
          value: "1"

  - id: modeling-public-dto
    concept: modeling-patterns
    type: python-function
    difficulty: 3
    prompt: "Есть доменный dataclass User(id, name, password_hash). Реализуйте to_public_dto(user): вернуть словарь только с безопасными полями id и name, без password_hash."
    starter: |
      from dataclasses import dataclass

      @dataclass
      class User:
          id: int
          name: str
          password_hash: str

      def to_public_dto(user):
          ...
    cases:
      - call: "to_public_dto(User(1, 'Анна', 'secret'))['id']"
        expect: 1
      - call: "to_public_dto(User(1, 'Анна', 'secret'))['name']"
        expect: "Анна"
      - call: "'password_hash' in to_public_dto(User(1, 'Анна', 'secret'))"
        expect: false
      - call: "len(to_public_dto(User(1, 'Анна', 'secret')))"
        expect: 2
    solution: |
      from dataclasses import dataclass

      @dataclass
      class User:
          id: int
          name: str
          password_hash: str

      def to_public_dto(user):
          return {"id": user.id, "name": user.name}
    hints:
      - "DTO это узкий контракт для внешнего слоя: в него кладут только поля, которые слой должен видеть. Какое поле показывать нельзя?"
      - "Стройте словарь вручную, а не через asdict: он вытащил бы вообще все поля объекта, включая password_hash. В новый словарь войдут только те ключи, что вы сами объявили публичным контрактом, а значения для них берите из атрибутов user."

  - id: modeling-plain-class-quiz
    concept: modeling-patterns
    type: theory-quiz
    difficulty: 2
    prompt: "Когда обычный класс уместнее dataclass?"
    choices:
      - id: a
        text: "Когда класс - в первую очередь поведение: много методов, мало полей-данных."
      - id: b
        text: "Когда нужно сравнение экземпляров по значению полей, а не по id."
      - id: c
        text: "Когда у класса больше трёх полей данных и хочется меньше boilerplate."
      - id: d
        text: "Когда нужен аккуратный __repr__ только для логов, без другой логики."
    correct: [a]
    explanation: "dataclass силён, пока класс это данные. Если преобладает поведение или нужны сложные инварианты и полный контроль над __init__, @dataclass только мешает, и обычный класс честнее."
    variants:
      - prompt: "Чем config-объект (dataclass) лучше словаря настроек?"
        choices:
          - id: a
            text: "Поля и типы явны, опечатка ловится сразу, умолчания в одном месте."
          - id: b
            text: "Он всегда работает быстрее словаря на любых данных."
          - id: c
            text: "Его поля невозможно случайно изменить после создания."
          - id: d
            text: "Он не требует импортов и доступен из стандартной библиотеки."
        correct: [a]
        explanation: "Config-объект делает контракт настроек явным: известен набор полей, их типы и умолчания, а неизвестный ключ падает сразу при создании, а не молчит, как у словаря."
      - prompt: "Когда моделировать данные через dataclass избыточно?"
        choices:
          - id: a
            text: "Для одноразовой пары значений в пределах одной функции, которая никуда не передаётся."
          - id: b
            text: "Для конфигурации приложения - смешивая зону аналитика с зоной разработки"
          - id: c
            text: "Для доменной сущности с инвариантами - смешивая оценку по времени с оценкой по памяти"
          - id: d
            text: "Для значения, которое кладут в множество"
        correct: [a]
        explanation: "Локальной паре значений хватает кортежа. Класс окупается, когда форма переживает границу функции: передаётся дальше, сериализуется или живёт в коллекции."
