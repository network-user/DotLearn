exercises:
  - id: dc-advanced-frozen-quiz
    concept: dataclass-advanced
    type: theory-quiz
    difficulty: 1
    prompt: "Что @dataclass(frozen=True) делает с хэшируемостью экземпляра?"
    choices:
      - id: a
        text: "Делает экземпляр хэшируемым."
      - id: b
        text: "Оставляет __hash__ = None, как у обычного dataclass."
      - id: c
        text: "Запрещает сравнение по значению через __eq__."
      - id: d
        text: "Делает неизменяемыми вложенные списки внутри полей."
    correct: [a]
    explanation: "Обычный dataclass изменяем и сравнивается по значению, поэтому получает __hash__ = None. frozen=True делает поля неизменными, хэш становится стабильным, и Python синтезирует __hash__."
    variants:
      - prompt: "Что перестаёт работать после @dataclass(slots=True)?"
        choices:
          - id: a
            text: "Присваивание атрибута."
          - id: b
            text: "Сравнение экземпляров по значению"
          - id: c
            text: "Генерация __init__ по полям"
          - id: d
            text: "Чтение объявленных полей"
        correct: [a]
        explanation: "slots убирает __dict__ у экземпляра, поэтому новых атрибутов вне объявленных полей завести нельзя. Это плата за экономию памяти."
      - prompt: "Поле items frozen-dataclass хранит список. Что с ним можно сделать?"
        choices:
          - id: a
            text: "items.append(x) сработает."
          - id: b
            text: "Ничего: frozen делает вложенный список неизменяемым."
          - id: c
            text: "Только прочитать длину, менять нельзя."
          - id: d
            text: "append бросит FrozenInstanceError."
        correct: [a]
        explanation: "frozen неглубокий: он запрещает присваивание самому полю (obj.items = ...), но список, на который поле ссылается, остаётся обычным изменяемым списком."

  - id: dc-advanced-replace-predict
    concept: dataclass-advanced
    type: predict-output
    difficulty: 2
    prompt: "Что выведет print? replace не мутирует объект, а строит новый."
    snippet: |
      from dataclasses import dataclass, replace

      @dataclass(frozen=True)
      class Point:
          x: int
          y: int

      p = Point(1, 2)
      q = replace(p, y=9)
      print(p, q)
    expected:
      kind: stdout
      value: "Point(x=1, y=2) Point(x=1, y=9)"
    hints:
      - "replace возвращает копию с правкой; исходный объект остаётся прежним."
    variants:
      - snippet: |
          from dataclasses import dataclass, astuple

          @dataclass
          class Point:
              x: int
              y: int

          print(astuple(Point(3, 4)))
        expected:
          kind: stdout
          value: "(3, 4)"
      - snippet: |
          from dataclasses import dataclass, replace

          @dataclass
          class Config:
              host: str
              port: int

          c = replace(Config("localhost", 80), port=443)
          print(c)
        expected:
          kind: stdout
          value: "Config(host='localhost', port=443)"

  - id: dc-advanced-kwonly-inherit
    concept: dataclass-advanced
    type: python-function
    difficulty: 3
    prompt: "База Base задаёт created_at со значением по умолчанию. Допишите dataclass Event(Base) так, чтобы у него было обязательное поле kind, и вызов Event(kind='click') не падал. Подумайте, что мешает обычному обязательному полю после дефолтного."
    starter: |
      from dataclasses import dataclass, field

      @dataclass
      class Base:
          created_at: str = "2024"

      @dataclass
      class Event(Base):
          ...
    cases:
      - call: "Event(kind='click').kind"
        expect: "click"
      - call: "Event(kind='click').created_at"
        expect: "2024"
    solution: |
      from dataclasses import dataclass, field

      @dataclass
      class Base:
          created_at: str = "2024"

      @dataclass
      class Event(Base):
          kind: str = field(kw_only=True)
    hints:
      - "Обязательное позиционное поле не может идти после поля с умолчанием: сигнатура __init__ так не собирается. Значит, обычным позиционным полем kind не сделать."
      - "Поле, объявленное только-именованным, выпадает из позиционного порядка. Посмотрите на параметр kw_only у field()."

  - id: dc-advanced-percent-frozen
    concept: dataclass-advanced
    type: python-function
    difficulty: 4
    prompt: "Реализуйте неизменяемый (frozen) dataclass Percent с полем value: float. В __post_init__ обрежьте value в диапазон [0.0, 100.0] и округлите до одного знака после запятой. Класс frozen, поэтому прямое присваивание self.value запрещено."
    starter: |
      from dataclasses import dataclass

      @dataclass(frozen=True)
      class Percent:
          value: float

          def __post_init__(self):
              ...
    cases:
      - call: "Percent(37.849).value"
        expect_approx: 37.8
      - call: "Percent(150).value"
        expect_approx: 100.0
      - call: "Percent(-5).value"
        expect_approx: 0.0
      - call: "hash(Percent(50.0)) == hash(Percent(50.0))"
        expect: true
    solution: |
      from dataclasses import dataclass

      @dataclass(frozen=True)
      class Percent:
          value: float

          def __post_init__(self):
              clamped = min(100.0, max(0.0, self.value))
              object.__setattr__(self, "value", round(clamped, 1))
    hints:
      - "Обрезать значение в диапазон помогает связка min и max: min(100.0, max(0.0, x)). Округление это round(x, 1)."
      - "Внутри frozen-класса обычное присвоение self.value = ... запрещено, потому что frozen переопределяет __setattr__ экземпляра. У базового object есть его исходная версия __setattr__, и её можно вызвать напрямую в __post_init__, передав объект, имя поля и новое значение."
