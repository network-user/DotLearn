exercises:
  - id: dc-internals-fields-quiz
    concept: dataclass-internals
    type: theory-quiz
    difficulty: 1
    prompt: "What does calling dataclasses.fields(SomeDataclass) return?"
    choices:
      - id: a
        text: "A tuple of Field objects in declaration order, without ClassVar and InitVar."
      - id: b
        text: "A {name: value} dict with the instance's current attribute values."
      - id: c
        text: "A list of all class attribute names, including methods."
      - id: d
        text: "Only the fields that have a default value set."
    correct: [a]
    explanation: "fields() returns a tuple of Field descriptors in declaration order. ClassVar and InitVar are excluded because they are not fields. Each Field has .name, .default, .repr, .compare, .metadata."
    variants:
      - prompt: "How does a field annotated with typing.ClassVar behave in a dataclass?"
        choices:
          - id: a
            text: "It is excluded from fields entirely."
          - id: b
            text: "It becomes a required first argument of __init__."
          - id: c
            text: "It appears in __repr__ but not in __eq__."
          - id: d
            text: "It requires a mandatory default_factory."
        correct: [a]
        explanation: "ClassVar marks an attribute as belonging to the class, not the instance. The decorator recognizes it and excludes it entirely from fields: it is absent from both the constructor and fields()."
      - prompt: "What happens to a value declared via dataclasses.InitVar?"
        choices:
          - id: a
            text: "It arrives in __init__."
          - id: b
            text: "It is stored as a regular attribute and appears in fields()."
          - id: c
            text: "It is only accessible as a class variable."
          - id: d
            text: "It is fully ignored by the decorator."
        correct: [a]
        explanation: "InitVar is a pseudo-field: the value flows through __init__ into __post_init__ (in declaration order), but it never becomes an attribute and never shows up in fields()."

  - id: dc-internals-field-blanks
    concept: dataclass-internals
    type: fill-in-blanks
    difficulty: 1
    prompt: "Fill in the field() calls: a mutable default via a factory, and hiding a field from __repr__."
    template: |
      from dataclasses import dataclass, field

      @dataclass
      class Config:
          tags: list = field(default_factory={{factory}})
          secret: str = field(repr={{repr_value}})
    blanks:
      factory:
        accept: ["list"]
      repr_value:
        accept: ["False"]
    variants:
      - template: |
          from dataclasses import dataclass, field

          @dataclass
          class Cart:
              items: dict = field(default_factory={{factory}})
              created_at: float = field(default=0.0, compare={{compare_value}})
        blanks:
          factory:
            accept: ["dict"]
          compare_value:
            accept: ["False"]
      - template: |
          from dataclasses import dataclass, field

          @dataclass
          class Event:
              handlers: list = field(default_factory={{factory}})
              name: str = field(kw_only={{kw_value}})
        blanks:
          factory:
            accept: ["list"]
          kw_value:
            accept: ["True"]

  - id: dc-internals-repr-predict
    concept: dataclass-internals
    type: predict-output
    difficulty: 2
    prompt: "What does print output? Pay attention to field(repr=False)."
    snippet: |
      from dataclasses import dataclass, field

      @dataclass
      class User:
          name: str
          token: str = field(repr=False)

      print(User("Anna", "xyz"))
    expected:
      kind: stdout
      value: "User(name='Anna')"
    hints:
      - "repr=False removes the field from the __repr__ string, but not from the object: the token attribute is still there."
    variants:
      - snippet: |
          from dataclasses import dataclass, field

          @dataclass
          class Session:
              user_id: int
              created_at: float = field(default=0.0, repr=False)

          print(Session(7))
        expected:
          kind: stdout
          value: "Session(user_id=7)"
      - snippet: |
          from dataclasses import dataclass, field

          @dataclass
          class Product:
              title: str
              price: int = field(repr=False)
              qty: int = 1

          print(Product("Book", 500))
        expected:
          kind: stdout
          value: "Product(title='Book', qty=1)"

  - id: dc-internals-comparable-fields
    concept: dataclass-internals
    type: python-function
    difficulty: 3
    prompt: "Implement comparable_fields(): return a list of field names of class Product that participate in comparison (__eq__), in declaration order. Fields with compare=False and the ClassVar declaration must not appear in the list. Use fields()."
    starter: |
      from dataclasses import dataclass, field, fields
      from typing import ClassVar

      @dataclass
      class Product:
          name: str
          price: float
          currency: ClassVar[str] = "RUB"
          _cache: dict = field(default_factory=dict, compare=False, repr=False)

      def comparable_fields():
          ...
    cases:
      - call: "comparable_fields()"
        expect: ["name", "price"]
      - call: "[f.name for f in fields(Product)]"
        expect: ["name", "price", "_cache"]
    solution: |
      from dataclasses import dataclass, field, fields
      from typing import ClassVar

      @dataclass
      class Product:
          name: str
          price: float
          currency: ClassVar[str] = "RUB"
          _cache: dict = field(default_factory=dict, compare=False, repr=False)

      def comparable_fields():
          return [f.name for f in fields(Product) if f.compare]
    hints:
      - "fields(Product) already returns fields in declaration order and excludes currency, because it's a ClassVar. What's left is picking the ones that participate in comparison."
      - "Field objects returned by fields() have a boolean compare attribute and a string name attribute. Build the list using compare as the filter condition and name as what ends up in the result."
