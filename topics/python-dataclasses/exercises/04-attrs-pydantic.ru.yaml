exercises:
  - id: attrs-pydantic-boundary-quiz
    concept: attrs-pydantic
    type: theory-quiz
    difficulty: 1
    prompt: "Что pydantic BaseModel делает при создании из внешних данных, чего не делает обычный dataclass?"
    choices:
      - id: a
        text: "Валидирует и приводит типы."
      - id: b
        text: "Генерирует __init__ и __repr__, которых у dataclass нет."
      - id: c
        text: "Делает объект неизменяемым по умолчанию."
      - id: d
        text: "Ускоряет доступ к атрибутам через слоты."
    correct: [a]
    explanation: "pydantic создан для границы: он проверяет форму и типы и при необходимости приводит их (коэрция). Обычный dataclass ничего не проверяет и молча примет строку в поле int."
    variants:
      - prompt: "Где по правилу «dataclass внутри, pydantic на границе» уместен pydantic?"
        choices:
          - id: a
            text: "На границе ввода-вывода."
          - id: b
            text: "В горячем внутреннем цикле, где данные уже проверены"
          - id: c
            text: "Везде подряд, чтобы всё было единообразно"
          - id: d
            text: "Только в тестах"
        correct: [a]
        explanation: "Недоверенные данные приходят на границу, там их и проверяют один раз. Внутри домена они уже проверены, повторная валидация только тратит такты."
      - prompt: "Что произойдёт при Box('5'), если Box это обычный @dataclass с полем size: int?"
        choices:
          - id: a
            text: "Объект создастся, size останется строкой '5'."
          - id: b
            text: "Будет брошено ValidationError."
          - id: c
            text: "size автоматически станет числом 5."
          - id: d
            text: "Аннотация int запретит передать строку."
        correct: [a]
        explanation: "Аннотация типа для dataclass это подсказка, а не проверка. Значение сохраняется как есть, поэтому в size окажется строка."

  - id: attrs-pydantic-model-blanks
    concept: attrs-pydantic
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните модель pydantic: базовый класс и метод разбора внешних данных."
    template: |
      from pydantic import BaseModel

      class User({{base}}):
          id: int
          name: str

      user = User.{{method}}({"id": "1", "name": "Анна"})
    blanks:
      base:
        accept: ["BaseModel"]
      method:
        accept: ["model_validate"]
    variants:
      - template: |
          from pydantic import BaseModel

          class User(BaseModel):
              id: int
              name: str

          payload = User(id=1, name="Анна").{{method}}()
        blanks:
          method:
            accept: ["model_dump"]
      - template: |
          from attrs import define, field

          @{{decorator}}
          class Point:
              x: int
              y: int = field(default=0)
        blanks:
          decorator:
            accept: ["define"]

  - id: attrs-pydantic-noncoerce-predict
    concept: attrs-pydantic
    type: predict-output
    difficulty: 3
    prompt: "Что выведет print? Поле объявлено как int, но dataclass типы не проверяет."
    snippet: |
      from dataclasses import dataclass

      @dataclass
      class Box:
          size: int

      b = Box("5")
      print(b)
      print(b.size + b.size)
    expected:
      kind: stdout
      value: |
        Box(size='5')
        55
    hints:
      - "dataclass не приводит и не проверяет типы: аннотация int это подсказка, а не проверка. Подумайте, что реально лежит в size."
      - "Раз size хранит именно то, что передали в конструктор, посмотрите, как __repr__ dataclass записывает строковое поле: с кавычками или без них. И вспомните, чем оператор + для двух строк отличается от сложения чисел."
    variants:
      - snippet: |
          from dataclasses import dataclass

          @dataclass
          class Item:
              qty: int

          print(Item("3"))
        expected:
          kind: stdout
          value: "Item(qty='3')"
      - snippet: |
          from dataclasses import dataclass

          @dataclass
          class Temp:
              c: int

          t = Temp("20")
          print(t.c * 3)
        expected:
          kind: stdout
          value: "202020"

  - id: attrs-pydantic-tools-quiz
    concept: attrs-pydantic
    type: theory-quiz
    difficulty: 2
    prompt: "Что делает converter у поля в attrs?"
    choices:
      - id: a
        text: "Преобразует переданное значение перед сохранением."
      - id: b
        text: "Проверяет значение и бросает ошибку, ничего не меняя"
      - id: c
        text: "Задаёт значение по умолчанию"
      - id: d
        text: "Делает поле только-именованным"
    correct: [a]
    explanation: "converter меняет значение при создании объекта (приводит тип, нормализует). Проверку без изменения делает отдельный механизм, validator."
    variants:
      - prompt: "Что делает validator у поля в attrs?"
        choices:
          - id: a
            text: "Проверяет значение и бросает ошибку, если оно недопустимо, не меняя его."
          - id: b
            text: "Молча приводит значение к нужному типу"
          - id: c
            text: "Кэширует значение между экземплярами - считая главной целью экономию байт"
          - id: d
            text: "Убирает поле из __repr__"
        correct: [a]
        explanation: "validator проверяет уже присвоенное значение и при нарушении условия бросает ошибку. Преобразованием занимается converter, это разные рычаги."
      - prompt: "Что возвращает model_dump() у экземпляра pydantic BaseModel?"
        choices:
          - id: a
            text: "Словарь с данными модели."
          - id: b
            text: "jSON-строку с отступами"
          - id: c
            text: "новый экземпляр модели"
          - id: d
            text: "кортеж значений полей"
        correct: [a]
        explanation: "model_dump отдаёт dict. JSON-строку возвращает отдельный метод model_dump_json; model_dump это шаг сериализации в словарь."
