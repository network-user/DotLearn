exercises:
  - id: nt-td-choice-quiz
    concept: namedtuple-typeddict
    type: theory-quiz
    difficulty: 1
    prompt: "What is a TypedDict at runtime?"
    choices:
      - id: a
        text: "A plain dict: the shape description only exists for type checking."
      - id: b
        text: "An immutable subclass of tuple."
      - id: c
        text: "A new class with _replace and _fields methods."
      - id: d
        text: "An object that validates types on every assignment."
    correct: [a]
    explanation: "TypedDict doesn't create an object. At runtime it's a plain dict, and only a static analyzer (mypy, pyright) sees the key annotations. There's no runtime checking at all."
    variants:
      - prompt: "Why is Point(1, 2) == (1, 2) true, if Point is a typing.NamedTuple?"
        choices:
          - id: a
            text: "NamedTuple is a tuple subclass and compares structurally, like a tuple, ignoring type."
          - id: b
            text: "Python casts the tuple to NamedTuple before comparing."
          - id: c
            text: "It's an undocumented interpreter bug."
          - id: d
            text: "Because their field names match."
        correct: [a]
        explanation: "NamedTuple inherits __eq__ from tuple, which compares by values, not by type. For a dataclass this would be False, because its __eq__ checks the class first."
      - prompt: "Which form should you pick to return a lightweight immutable pair of values from a function, with name access and unpacking?"
        choices:
          - id: a
            text: "NamedTuple."
          - id: b
            text: "TypedDict."
          - id: c
            text: "A plain dict."
          - id: d
            text: "A plain tuple (1, 2) with no names."
        correct: [a]
        explanation: "NamedTuple gives you immutability and tuple unpacking plus name access. TypedDict is mutable and has no named attributes, a plain tuple has no names, and dict is heavier and mutable."

  - id: nt-td-declare-blanks
    concept: namedtuple-typeddict
    type: fill-in-blanks
    difficulty: 1
    prompt: "Declare a NamedTuple with a default field."
    template: |
      from typing import NamedTuple

      class Point({{base}}):
          x: int
          y: int = {{default}}
    blanks:
      base:
        accept: ["NamedTuple"]
      default:
        accept: ["0"]
    variants:
      - template: |
          from typing import TypedDict

          class Movie({{base}}):
              title: str
              year: {{type}}
        blanks:
          base:
            accept: ["TypedDict"]
          type:
            accept: ["int"]
      - template: |
          from typing import TypedDict

          class Config(TypedDict, {{option}}):
              host: str
              port: int
        blanks:
          option:
            accept: ["total=False", "total = False"]

  - id: nt-td-namedtuple-predict
    concept: namedtuple-typeddict
    type: predict-output
    difficulty: 2
    prompt: "What does print output? Remember that NamedTuple is immutable."
    snippet: |
      from typing import NamedTuple

      class Point(NamedTuple):
          x: int
          y: int

      p = Point(1, 2)
      q = p._replace(y=9)
      print(p.x + q.y)
    expected:
      kind: stdout
      value: "10"
    hints:
      - "_replace doesn't change p, it returns a new tuple q. p.x stays the same."
    variants:
      - snippet: |
          from typing import NamedTuple

          class Point(NamedTuple):
              x: int
              y: int

          a, b = Point(3, 4)
          print(a * b)
        expected:
          kind: stdout
          value: "12"
      - snippet: |
          from typing import NamedTuple

          class Rgb(NamedTuple):
              r: int
              g: int
              b: int

          print(sum(Rgb(10, 20, 30)))
        expected:
          kind: stdout
          value: "60"

  - id: nt-td-top-player
    concept: namedtuple-typeddict
    type: python-function
    difficulty: 3
    prompt: "You're given a list of named tuples Player(name, score). Implement top(players): return the name of the player with the highest score. The list is non-empty."
    starter: |
      from typing import NamedTuple

      class Player(NamedTuple):
          name: str
          score: int

      def top(players):
          ...
    cases:
      - call: "top([Player('Anna', 10), Player('Boris', 25), Player('Vera', 18)])"
        expect: "Boris"
      - call: "top([Player('Anna', 5)])"
        expect: "Anna"
    solution: |
      from typing import NamedTuple

      class Player(NamedTuple):
          name: str
          score: int

      def top(players):
          return max(players, key=lambda p: p.score).name
    hints:
      - "You need the max over one field, not the whole tuple. The max function has a key parameter that sets what to compare."
      - "Pass key=lambda p: p.score so max compares players by score, then take the .name attribute of the winner."
