exercises:
  - id: dc-advanced-frozen-quiz
    concept: dataclass-advanced
    type: theory-quiz
    difficulty: 1
    prompt: "What does @dataclass(frozen=True) do to an instance's hashability?"
    choices:
      - id: a
        text: "It makes the instance hashable."
      - id: b
        text: "It leaves __hash__ = None, same as a plain dataclass."
      - id: c
        text: "It forbids value comparison via __eq__."
      - id: d
        text: "It makes nested lists inside fields immutable."
    correct: [a]
    explanation: "A plain dataclass is mutable and compared by value, so it gets __hash__ = None. frozen=True makes fields immutable, the hash becomes stable, and Python synthesizes __hash__."
    variants:
      - prompt: "What stops working after @dataclass(slots=True)?"
        choices:
          - id: a
            text: "Assigning an attribute."
          - id: b
            text: "Comparing instances by value."
          - id: c
            text: "Generating __init__ from fields."
          - id: d
            text: "Reading declared fields."
        correct: [a]
        explanation: "slots removes the instance's __dict__, so you can't add attributes beyond the declared fields. That's the price for saving memory."
      - prompt: "Field items of a frozen dataclass holds a list. What can you do with it?"
        choices:
          - id: a
            text: "items.append(x) works: frozen blocks assignment to the field, not mutation of the list itself."
          - id: b
            text: "Nothing: frozen makes the nested list immutable too; confusing field validation with plain storage"
          - id: c
            text: "Only read its length, not change it"
          - id: d
            text: "append raises FrozenInstanceError - confusing field validation with plain storage"
        correct: [a]
        explanation: "frozen is shallow: it forbids assigning to the field itself (obj.items = ...), but the list the field points to remains an ordinary mutable list."

  - id: dc-advanced-replace-predict
    concept: dataclass-advanced
    type: predict-output
    difficulty: 2
    prompt: "What does print output? replace does not mutate the object, it builds a new one."
    snippet: |
      from dataclasses import dataclass, replace

      @dataclass(frozen=True)
      class Point:
          x: int
          y: int

      p = Point(1, 2)
      q = replace(p, y=9)
      print(p, q)
    expected:
      kind: stdout
      value: "Point(x=1, y=2) Point(x=1, y=9)"
    hints:
      - "replace returns a modified copy; the original object stays the same."
    variants:
      - snippet: |
          from dataclasses import dataclass, astuple

          @dataclass
          class Point:
              x: int
              y: int

          print(astuple(Point(3, 4)))
        expected:
          kind: stdout
          value: "(3, 4)"
      - snippet: |
          from dataclasses import dataclass, replace

          @dataclass
          class Config:
              host: str
              port: int

          c = replace(Config("localhost", 80), port=443)
          print(c)
        expected:
          kind: stdout
          value: "Config(host='localhost', port=443)"

  - id: dc-advanced-kwonly-inherit
    concept: dataclass-advanced
    type: python-function
    difficulty: 3
    prompt: "Base Base declares created_at with a default value. Extend dataclass Event(Base) so it has a required field kind, and the call Event(kind='click') does not fail. Think about what blocks an ordinary required field after a defaulted one."
    starter: |
      from dataclasses import dataclass, field

      @dataclass
      class Base:
          created_at: str = "2024"

      @dataclass
      class Event(Base):
          ...
    cases:
      - call: "Event(kind='click').kind"
        expect: "click"
      - call: "Event(kind='click').created_at"
        expect: "2024"
    solution: |
      from dataclasses import dataclass, field

      @dataclass
      class Base:
          created_at: str = "2024"

      @dataclass
      class Event(Base):
          kind: str = field(kw_only=True)
    hints:
      - "A required positional field can't come after a field with a default: the __init__ signature can't be built that way. So kind can't be a plain positional field."
      - "A field declared keyword-only drops out of positional order. Look at the kw_only parameter of field()."

  - id: dc-advanced-percent-frozen
    concept: dataclass-advanced
    type: python-function
    difficulty: 4
    prompt: "Implement an immutable (frozen) dataclass Percent with field value: float. In __post_init__ clamp value to the range [0.0, 100.0] and round to one decimal place. The class is frozen, so direct assignment to self.value is forbidden."
    starter: |
      from dataclasses import dataclass

      @dataclass(frozen=True)
      class Percent:
          value: float

          def __post_init__(self):
              ...
    cases:
      - call: "Percent(37.849).value"
        expect_approx: 37.8
      - call: "Percent(150).value"
        expect_approx: 100.0
      - call: "Percent(-5).value"
        expect_approx: 0.0
      - call: "hash(Percent(50.0)) == hash(Percent(50.0))"
        expect: true
    solution: |
      from dataclasses import dataclass

      @dataclass(frozen=True)
      class Percent:
          value: float

          def __post_init__(self):
              clamped = min(100.0, max(0.0, self.value))
              object.__setattr__(self, "value", round(clamped, 1))
    hints:
      - "Clamping to a range is min combined with max: min(100.0, max(0.0, x)). Rounding is round(x, 1)."
      - "Inside a frozen class, plain assignment self.value = ... is forbidden because frozen overrides the instance's __setattr__. The base object still has its original __setattr__, and you can call it directly in __post_init__, passing the object, the field name, and the new value."
