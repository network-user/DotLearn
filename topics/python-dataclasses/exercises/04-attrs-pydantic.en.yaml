exercises:
  - id: attrs-pydantic-boundary-quiz
    concept: attrs-pydantic
    type: theory-quiz
    difficulty: 1
    prompt: "What does pydantic's BaseModel do when constructed from external data that a plain dataclass does not do?"
    choices:
      - id: a
        text: "It validates and coerces types: '5' in an int field becomes 5, or a ValidationError is raised."
      - id: b
        text: "It generates __init__ and __repr__, which a dataclass lacks."
      - id: c
        text: "It makes the object immutable by default."
      - id: d
        text: "It speeds up attribute access via slots."
    correct: [a]
    explanation: "pydantic is built for the boundary: it checks shape and types and coerces them when needed. A plain dataclass checks nothing and silently accepts a string in an int field."
    variants:
      - prompt: "Under the rule 'dataclass inside, pydantic at the boundary', where does pydantic belong?"
        choices:
          - id: a
            text: "At the input/output boundary: an HTTP request body, config, a message from a queue."
          - id: b
            text: "In a hot internal loop where data is already validated."
          - id: c
            text: "Everywhere, for uniformity."
          - id: d
            text: "Only in tests."
        correct: [a]
        explanation: "Untrusted data arrives at the boundary, so it's checked once there. Inside the domain it's already validated, and revalidating just burns cycles."
      - prompt: "What happens with Box('5') if Box is a plain @dataclass with field size: int?"
        choices:
          - id: a
            text: "The object is created and size stays the string '5': dataclass doesn't check or coerce types."
          - id: b
            text: "A ValidationError is raised."
          - id: c
            text: "size automatically becomes the number 5."
          - id: d
            text: "The int annotation forbids passing a string."
        correct: [a]
        explanation: "A type annotation on a dataclass is a hint, not a check. The value is stored as-is, so size ends up holding a string."

  - id: attrs-pydantic-model-blanks
    concept: attrs-pydantic
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in a pydantic model: the base class and the method for parsing external data."
    template: |
      from pydantic import BaseModel

      class User({{base}}):
          id: int
          name: str

      user = User.{{method}}({"id": "1", "name": "Anna"})
    blanks:
      base:
        accept: ["BaseModel"]
      method:
        accept: ["model_validate"]
    variants:
      - template: |
          from pydantic import BaseModel

          class User(BaseModel):
              id: int
              name: str

          payload = User(id=1, name="Anna").{{method}}()
        blanks:
          method:
            accept: ["model_dump"]
      - template: |
          from attrs import define, field

          @{{decorator}}
          class Point:
              x: int
              y: int = field(default=0)
        blanks:
          decorator:
            accept: ["define"]

  - id: attrs-pydantic-noncoerce-predict
    concept: attrs-pydantic
    type: predict-output
    difficulty: 3
    prompt: "What does print output? The field is declared as int, but dataclass doesn't check types."
    snippet: |
      from dataclasses import dataclass

      @dataclass
      class Box:
          size: int

      b = Box("5")
      print(b)
      print(b.size + b.size)
    expected:
      kind: stdout
      value: |
        Box(size='5')
        55
    hints:
      - "dataclass doesn't coerce or check types: the int annotation is a hint, not a check. Think about what's actually stored in size."
      - "Since size holds exactly what was passed to the constructor, look at how dataclass's __repr__ writes a string field: with quotes or without? And recall how the + operator differs for two strings versus adding numbers."
    variants:
      - snippet: |
          from dataclasses import dataclass

          @dataclass
          class Item:
              qty: int

          print(Item("3"))
        expected:
          kind: stdout
          value: "Item(qty='3')"
      - snippet: |
          from dataclasses import dataclass

          @dataclass
          class Temp:
              c: int

          t = Temp("20")
          print(t.c * 3)
        expected:
          kind: stdout
          value: "202020"

  - id: attrs-pydantic-tools-quiz
    concept: attrs-pydantic
    type: theory-quiz
    difficulty: 2
    prompt: "What does a field's converter do in attrs?"
    choices:
      - id: a
        text: "Transforms the passed value before storing it, e.g. a str input into an int."
      - id: b
        text: "Validates the value and raises an error without changing anything."
      - id: c
        text: "Sets a default value."
      - id: d
        text: "Makes the field keyword-only."
    correct: [a]
    explanation: "converter changes the value at object creation (type coercion, normalization). Checking without changing is a separate mechanism, validator."
    variants:
      - prompt: "What does a field's validator do in attrs?"
        choices:
          - id: a
            text: "Checks the value and raises an error if it's invalid, without changing it."
          - id: b
            text: "Silently coerces the value to the needed type."
          - id: c
            text: "Caches the value between instances."
          - id: d
            text: "Removes the field from __repr__."
        correct: [a]
        explanation: "validator checks the already-assigned value and raises an error if the condition is violated. Transformation is handled by a different lever, converter."
      - prompt: "What does model_dump() return on a pydantic BaseModel instance?"
        choices:
          - id: a
            text: "A dict with the model's data, ready for serialization."
          - id: b
            text: "An indented JSON string."
          - id: c
            text: "A new model instance."
          - id: d
            text: "A tuple of field values."
        correct: [a]
        explanation: "model_dump returns a dict. A separate method, model_dump_json, returns a JSON string; model_dump is the serialize-to-dict step."
