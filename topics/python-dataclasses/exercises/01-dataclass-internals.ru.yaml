exercises:
  - id: dc-internals-fields-quiz
    concept: dataclass-internals
    type: theory-quiz
    difficulty: 1
    prompt: "Что возвращает вызов dataclasses.fields(SomeDataclass)?"
    choices:
      - id: a
        text: "Кортеж объектов Field в порядке объявления, без ClassVar и InitVar."
      - id: b
        text: "Словарь {имя: значение} с текущими значениями атрибутов экземпляра."
      - id: c
        text: "Список имён всех атрибутов класса, включая методы."
      - id: d
        text: "Только те поля, у которых задано значение по умолчанию."
    correct: [a]
    explanation: "fields() отдаёт кортеж дескрипторов Field в порядке объявления. ClassVar и InitVar в него не входят, потому что они не поля. У каждого Field есть .name, .default, .repr, .compare, .metadata."
    variants:
      - prompt: "Как ведёт себя поле, помеченное typing.ClassVar, в dataclass?"
        choices:
          - id: a
            text: "Оно исключается из полей: его нет ни в __init__, ни в fields()."
          - id: b
            text: "Оно становится обязательным первым аргументом __init__."
          - id: c
            text: "Оно попадает в __repr__, но не в __eq__."
          - id: d
            text: "Оно требует обязательного default_factory."
        correct: [a]
        explanation: "ClassVar помечает атрибут как принадлежащий классу, а не экземпляру. Декоратор его распознаёт и полностью исключает из полей: в конструкторе и в fields() его нет."
      - prompt: "Что происходит со значением, объявленным через dataclasses.InitVar?"
        choices:
          - id: a
            text: "Оно приходит в __init__."
          - id: b
            text: "Оно сохраняется как обычный атрибут и попадает в fields()."
          - id: c
            text: "Оно доступно только как переменная класса."
          - id: d
            text: "Оно игнорируется декоратором полностью."
        correct: [a]
        explanation: "InitVar это псевдополе: значение проходит через __init__ в __post_init__ (в порядке объявления), но атрибутом не становится и в fields() не появляется."

  - id: dc-internals-field-blanks
    concept: dataclass-internals
    type: fill-in-blanks
    difficulty: 1
    prompt: "Заполните вызовы field(): изменяемое умолчание через фабрику и скрытие поля из __repr__."
    template: |
      from dataclasses import dataclass, field

      @dataclass
      class Config:
          tags: list = field(default_factory={{factory}})
          secret: str = field(repr={{repr_value}})
    blanks:
      factory:
        accept: ["list"]
      repr_value:
        accept: ["False"]
    variants:
      - template: |
          from dataclasses import dataclass, field

          @dataclass
          class Cart:
              items: dict = field(default_factory={{factory}})
              created_at: float = field(default=0.0, compare={{compare_value}})
        blanks:
          factory:
            accept: ["dict"]
          compare_value:
            accept: ["False"]
      - template: |
          from dataclasses import dataclass, field

          @dataclass
          class Event:
              handlers: list = field(default_factory={{factory}})
              name: str = field(kw_only={{kw_value}})
        blanks:
          factory:
            accept: ["list"]
          kw_value:
            accept: ["True"]

  - id: dc-internals-repr-predict
    concept: dataclass-internals
    type: predict-output
    difficulty: 2
    prompt: "Что выведет print? Обратите внимание на field(repr=False)."
    snippet: |
      from dataclasses import dataclass, field

      @dataclass
      class User:
          name: str
          token: str = field(repr=False)

      print(User("Анна", "xyz"))
    expected:
      kind: stdout
      value: "User(name='Анна')"
    hints:
      - "repr=False убирает поле из строки __repr__, но не из объекта: атрибут token по-прежнему есть."
    variants:
      - snippet: |
          from dataclasses import dataclass, field

          @dataclass
          class Session:
              user_id: int
              created_at: float = field(default=0.0, repr=False)

          print(Session(7))
        expected:
          kind: stdout
          value: "Session(user_id=7)"
      - snippet: |
          from dataclasses import dataclass, field

          @dataclass
          class Product:
              title: str
              price: int = field(repr=False)
              qty: int = 1

          print(Product("Книга", 500))
        expected:
          kind: stdout
          value: "Product(title='Книга', qty=1)"

  - id: dc-internals-comparable-fields
    concept: dataclass-internals
    type: python-function
    difficulty: 3
    prompt: "Реализуйте comparable_fields(): вернуть список имён полей класса Product, участвующих в сравнении (__eq__), в порядке объявления. Поля с compare=False и объявление ClassVar в список попадать не должны. Используйте fields()."
    starter: |
      from dataclasses import dataclass, field, fields
      from typing import ClassVar

      @dataclass
      class Product:
          name: str
          price: float
          currency: ClassVar[str] = "RUB"
          _cache: dict = field(default_factory=dict, compare=False, repr=False)

      def comparable_fields():
          ...
    cases:
      - call: "comparable_fields()"
        expect: ["name", "price"]
      - call: "[f.name for f in fields(Product)]"
        expect: ["name", "price", "_cache"]
    solution: |
      from dataclasses import dataclass, field, fields
      from typing import ClassVar

      @dataclass
      class Product:
          name: str
          price: float
          currency: ClassVar[str] = "RUB"
          _cache: dict = field(default_factory=dict, compare=False, repr=False)

      def comparable_fields():
          return [f.name for f in fields(Product) if f.compare]
    hints:
      - "fields(Product) уже отдаёт поля в порядке объявления и не включает currency, потому что это ClassVar. Остаётся выбрать те, что участвуют в сравнении."
      - "У объектов Field, которые возвращает fields(), есть булев атрибут compare и строковый атрибут name. Соберите список, используя compare как условие отбора, а name как то, что в итоге попадает в результат."
