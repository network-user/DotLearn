exercises:
  - id: nt-td-choice-quiz
    concept: namedtuple-typeddict
    type: theory-quiz
    difficulty: 1
    prompt: "Что представляет собой TypedDict во время выполнения программы?"
    choices:
      - id: a
        text: "Обычный dict: описание формы существует только для проверки типов."
      - id: b
        text: "Неизменяемый подкласс tuple - будто типы живут в рантайме и заменяют валидацию"
      - id: c
        text: "Новый класс с методами _replace и _fields"
      - id: d
        text: "Объект, валидирующий типы при каждом присваивании"
    correct: [a]
    explanation: "TypedDict не создаёт объект. В рантайме это обычный словарь, а аннотации ключей видит только статический анализатор (mypy, pyright). Никакой проверки при запуске нет."
    variants:
      - prompt: "Почему Point(1, 2) == (1, 2) истинно, если Point это typing.NamedTuple?"
        choices:
          - id: a
            text: "NamedTuple это подкласс tuple."
          - id: b
            text: "Python приводит кортеж к NamedTuple перед сравнением."
          - id: c
            text: "Это недокументированная ошибка интерпретатора."
          - id: d
            text: "Потому что у них совпадают имена полей."
        correct: [a]
        explanation: "NamedTuple наследует __eq__ от tuple, а тот сравнивает по значениям, а не по типу. Для dataclass было бы False, потому что его __eq__ сперва проверяет класс."
      - prompt: "Какую форму выбрать, чтобы вернуть из функции лёгкую неизменяемую пару значений с доступом по имени и распаковкой?"
        choices:
          - id: a
            text: "NamedTuple."
          - id: b
            text: "TypedDict."
          - id: c
            text: "Обычный dict."
          - id: d
            text: "Обычный кортеж (1, 2) без имён."
        correct: [a]
        explanation: "NamedTuple даёт неизменяемость и распаковку кортежа плюс доступ по имени. TypedDict изменяем и без имён-атрибутов, обычный кортеж без имён, а dict тяжелее и изменяем."

  - id: nt-td-declare-blanks
    concept: namedtuple-typeddict
    type: fill-in-blanks
    difficulty: 1
    prompt: "Объявите NamedTuple с полем по умолчанию."
    template: |
      from typing import NamedTuple

      class Point({{base}}):
          x: int
          y: int = {{default}}
    blanks:
      base:
        accept: ["NamedTuple"]
      default:
        accept: ["0"]
    variants:
      - template: |
          from typing import TypedDict

          class Movie({{base}}):
              title: str
              year: {{type}}
        blanks:
          base:
            accept: ["TypedDict"]
          type:
            accept: ["int"]
      - template: |
          from typing import TypedDict

          class Config(TypedDict, {{option}}):
              host: str
              port: int
        blanks:
          option:
            accept: ["total=False", "total = False"]

  - id: nt-td-namedtuple-predict
    concept: namedtuple-typeddict
    type: predict-output
    difficulty: 2
    prompt: "Что выведет print? Помните, что NamedTuple неизменяем."
    snippet: |
      from typing import NamedTuple

      class Point(NamedTuple):
          x: int
          y: int

      p = Point(1, 2)
      q = p._replace(y=9)
      print(p.x + q.y)
    expected:
      kind: stdout
      value: "10"
    hints:
      - "_replace не меняет p, а возвращает новый кортеж q. p.x остаётся прежним."
    variants:
      - snippet: |
          from typing import NamedTuple

          class Point(NamedTuple):
              x: int
              y: int

          a, b = Point(3, 4)
          print(a * b)
        expected:
          kind: stdout
          value: "12"
      - snippet: |
          from typing import NamedTuple

          class Rgb(NamedTuple):
              r: int
              g: int
              b: int

          print(sum(Rgb(10, 20, 30)))
        expected:
          kind: stdout
          value: "60"

  - id: nt-td-top-player
    concept: namedtuple-typeddict
    type: python-function
    difficulty: 3
    prompt: "Дан список именованных кортежей Player(name, score). Реализуйте top(players): вернуть имя игрока с наибольшим score. Список непустой."
    starter: |
      from typing import NamedTuple

      class Player(NamedTuple):
          name: str
          score: int

      def top(players):
          ...
    cases:
      - call: "top([Player('Анна', 10), Player('Борис', 25), Player('Вера', 18)])"
        expect: "Борис"
      - call: "top([Player('Анна', 5)])"
        expect: "Анна"
    solution: |
      from typing import NamedTuple

      class Player(NamedTuple):
          name: str
          score: int

      def top(players):
          return max(players, key=lambda p: p.score).name
    hints:
      - "Нужен максимум не по всему кортежу, а по одному полю. У функции max есть параметр key, который задаёт, что именно сравнивать."
      - "Передайте key=lambda p: p.score, чтобы max сравнивал игроков по очкам, затем возьмите атрибут .name у победителя."
