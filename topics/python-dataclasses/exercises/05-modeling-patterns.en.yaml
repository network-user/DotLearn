exercises:
  - id: modeling-value-object-quiz
    concept: modeling-patterns
    type: theory-quiz
    difficulty: 1
    prompt: "What is a value object in data modeling?"
    choices:
      - id: a
        text: "An object whose equality is defined by its field values, not identity; usually a frozen dataclass."
      - id: b
        text: "An object with a unique id, compared by identity."
      - id: c
        text: "A dict with an arbitrary set of keys."
      - id: d
        text: "A class with no fields, only methods."
    correct: [a]
    explanation: "A value object is defined by its value: two objects with the same fields are equal and interchangeable. In Python that's a frozen dataclass, which gets both value comparison and hashability."
    variants:
      - prompt: "Why do you need a DTO (data transfer object) between application layers?"
        choices:
          - id: a
            text: "It carries only the needed fields between layers explicitly, hiding things like password_hash."
          - id: b
            text: "It speeds up database access."
          - id: c
            text: "It replaces business logic."
          - id: d
            text: "It validates external input instead of pydantic."
        correct: [a]
        explanation: "A DTO is a narrow shape for a specific boundary: it holds exactly the fields the other layer should see, decoupling the domain from the transport."
      - prompt: "Why is the 'raw dict everywhere in the app' anti-pattern dangerous?"
        choices:
          - id: a
            text: "The shape of the data is implicit: a typo in a key surfaces late, and fields and types are recorded nowhere."
          - id: b
            text: "Dicts are always slower than any class."
          - id: c
            text: "A dict can't be serialized to JSON."
          - id: d
            text: "A dict can't be passed between functions."
        correct: [a]
        explanation: "The real problem isn't speed, it's an implicit contract: what keys and types are expected is recorded nowhere, so typos and missing fields surface far from where the mistake was made."

  - id: modeling-value-object-predict
    concept: modeling-patterns
    type: predict-output
    difficulty: 2
    prompt: "What does print output? Money is a frozen dataclass, i.e. a value object."
    snippet: |
      from dataclasses import dataclass

      @dataclass(frozen=True)
      class Money:
          amount: int
          currency: str

      wallet = {Money(100, "RUB"), Money(100, "RUB"), Money(100, "USD")}
      print(len(wallet))
    expected:
      kind: stdout
      value: "2"
    hints:
      - "A frozen dataclass is compared and hashed by value, so identical Money instances collapse into one in a set."
    variants:
      - snippet: |
          from dataclasses import dataclass

          @dataclass(frozen=True)
          class Money:
              amount: int
              currency: str

          print(Money(50, "RUB") == Money(50, "RUB"))
        expected:
          kind: stdout
          value: "True"
      - snippet: |
          from dataclasses import dataclass

          @dataclass(frozen=True)
          class Coord:
              lat: float
              lon: float

          seen = {Coord(55.7, 37.6), Coord(55.7, 37.6)}
          print(len(seen))
        expected:
          kind: stdout
          value: "1"

  - id: modeling-public-dto
    concept: modeling-patterns
    type: python-function
    difficulty: 3
    prompt: "There's a domain dataclass User(id, name, password_hash). Implement to_public_dto(user): return a dict with only the safe fields id and name, without password_hash."
    starter: |
      from dataclasses import dataclass

      @dataclass
      class User:
          id: int
          name: str
          password_hash: str

      def to_public_dto(user):
          ...
    cases:
      - call: "to_public_dto(User(1, 'Anna', 'secret'))['id']"
        expect: 1
      - call: "to_public_dto(User(1, 'Anna', 'secret'))['name']"
        expect: "Anna"
      - call: "'password_hash' in to_public_dto(User(1, 'Anna', 'secret'))"
        expect: false
      - call: "len(to_public_dto(User(1, 'Anna', 'secret')))"
        expect: 2
    solution: |
      from dataclasses import dataclass

      @dataclass
      class User:
          id: int
          name: str
          password_hash: str

      def to_public_dto(user):
          return {"id": user.id, "name": user.name}
    hints:
      - "A DTO is a narrow contract for an external layer: it holds only the fields that layer should see. Which field must not be shown?"
      - "Build the dict by hand rather than via asdict: that would pull out every field of the object, including password_hash. The new dict should only contain the keys you declared as the public contract, with values taken from the user's attributes."

  - id: modeling-plain-class-quiz
    concept: modeling-patterns
    type: theory-quiz
    difficulty: 2
    prompt: "When is a plain class more fitting than a dataclass?"
    choices:
      - id: a
        text: "When the class is primarily behavior: lots of methods and logic, and almost no data fields."
      - id: b
        text: "When you need value comparison."
      - id: c
        text: "When there are more than three fields."
      - id: d
        text: "When you need a __repr__ for logs."
    correct: [a]
    explanation: "dataclass is strong as long as the class is data. If behavior dominates, or you need complex invariants and full control over __init__, @dataclass just gets in the way, and a plain class is more honest."
    variants:
      - prompt: "Why is a config object (dataclass) better than a settings dict?"
        choices:
          - id: a
            text: "Fields and types are explicitly fixed, a typo in a name is caught immediately, defaults live in one place."
          - id: b
            text: "It always runs faster than a dict."
          - id: c
            text: "It's impossible to change it by accident."
          - id: d
            text: "It requires no imports."
        correct: [a]
        explanation: "A config object makes the settings contract explicit: the set of fields, their types, and defaults are known, and an unknown key fails immediately at creation instead of silently, as with a dict."
      - prompt: "When is modeling data via a dataclass overkill?"
        choices:
          - id: a
            text: "For a one-off pair of values within a single function that never leaves it."
          - id: b
            text: "For application configuration."
          - id: c
            text: "For a domain entity with invariants."
          - id: d
            text: "For a value you put in a set."
        correct: [a]
        explanation: "A local pair of values is fine as a tuple. A class pays off once the shape outlives a function boundary: passed onward, serialized, or stored in a collection."
