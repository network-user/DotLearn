exercises:
  - id: litestar-overview-what-is-001
    concept: litestar-overview
    type: theory-quiz
    difficulty: 1
    prompt: "Что общего у Litestar и FastAPI на уровне развёртывания?"
    choices:
      - id: a
        text: "Оба - ASGI-приложения, поэтому запускаются одним и тем же сервером, например"
      - id: b
        text: "Оба используют msgspec по умолчанию для сериализации тел запросов."
      - id: c
        text: "Оба требуют классы-контроллеры для регистрации любого маршрута."
      - id: d
        text: "Оба работают только синхронно и не поддерживают async-хендлеры."
    correct: [a]
    explanation: "И Litestar, и FastAPI реализуют контракт ASGI, поэтому их запускают одним и тем же ASGI-сервером. Различаются они тем, как превращают ASGI-вызов в вызов вашей функции, а не способом запуска."
    variants:
      - prompt: "Какая библиотека сериализации стоит в Litestar по умолчанию?"
        choices:
          - id: a
            text: "msgspec - библиотека сериализации и валидации с упором на скорость."
          - id: b
            text: "Pydantic, как и в FastAPI; альтернатив у Litestar нет."
          - id: c
            text: "Стандартный модуль json без какой-либо валидации."
          - id: d
            text: "marshmallow - Litestar построен вокруг неё."
        correct: [a]
        explanation: "По умолчанию Litestar использует msgspec. При этом он умеет работать и с Pydantic, и с dataclasses, и с TypedDict - msgspec лишь стоит по умолчанию."
      - prompt: "Как Litestar относится к sync (`def`) хендлерам?"
        choices:
          - id: a
            text: "Поддерживает их и выносит блокирующий код в пул потоков, как и FastAPI."
          - id: b
            text: "Запрещает: в Litestar допустимы только `async def`-хендлеры."
          - id: c
            text: "Выполняет их прямо в потоке event loop, блокируя весь сервер."
          - id: d
            text: "Игнорирует и возвращает 404 для таких маршрутов."
        correct: [a]
        explanation: "Litestar спроектирован асинхронным, но обычные `def`-хендлеры поддерживает и выносит в пул потоков, чтобы их блокирующий код не заморозил event loop - так же, как это делает FastAPI."

  - id: litestar-overview-register-001
    concept: litestar-overview
    type: theory-quiz
    difficulty: 2
    prompt: "Хендлер помечен `@get(\"/items\")`, но не передан ни в `route_handlers`, ни в router/controller. Что вернёт запрос `GET /items`?"
    choices:
      - id: a
        text: "404: декоратор `@get` сам по себе не регистрирует хендлер в приложении"
      - id: b
        text: "200: декоратор `@get` автоматически привязывает хендлер к ближайшему приложению."
      - id: c
        text: "500: Litestar упадёт при старте из-за незарегистрированного хендлера."
      - id: d
        text: "Хендлер вызовется, но без валидации параметров."
    correct: [a]
    explanation: "В отличие от `@app.get` в FastAPI, декоратор `@get` в Litestar возвращает самостоятельный объект-хендлер и ничего не сообщает приложению. Без явной регистрации через `route_handlers` (напрямую или через router/controller) путь не существует - отсюда 404."
    hints:
      - "Вспомните, чем регистрация хендлера в Litestar отличается от `@app.get` в FastAPI. Кто кого «видит»?"
      - "Декоратор `@get` создаёт объект-хендлер, но связь с приложением появляется только в одном месте."

  - id: litestar-overview-fill-app-001
    concept: litestar-overview
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите минимальное Litestar-приложение с одним хендлером на корне."
    template: |
      from litestar import Litestar, get

      @{{decorator}}("/")
      async def index() -> dict:
          return {"hello": "world"}

      app = Litestar({{param}}=[index])
    blanks:
      decorator:
        accept: ["get"]
      param:
        accept: ["route_handlers"]
    variants:
      - prompt: "Допишите регистрацию хендлера `create` через декоратор для создания ресурса."
        template: |
          from litestar import Litestar, post

          @{{decorator}}("/items")
          async def create() -> dict:
              return {"created": True}

          app = Litestar(route_handlers=[{{handler}}])
        blanks:
          decorator:
            accept: ["post"]
          handler:
            accept: ["create"]
      - prompt: "Допишите импорт декоратора и приложение для хендлера чтения списка."
        template: |
          from litestar import Litestar, {{decorator}}

          @get("/items")
          async def list_items() -> list:
              return []

          app = {{cls}}(route_handlers=[list_items])
        blanks:
          decorator:
            accept: ["get"]
          cls:
            accept: ["Litestar"]

  - id: litestar-overview-predict-register-001
    concept: litestar-overview
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Она моделирует регистрацию хендлеров: путь существует, только если его хендлер попал в `route_handlers`."
    snippet: |
      route_handlers = ["index", "create"]
      requested = ["/", "/items", "/missing"]
      routes = {"index": "/", "create": "/items"}

      registered_paths = {routes[h] for h in route_handlers}
      for path in requested:
          print(path, 200 if path in registered_paths else 404)
    expected:
      kind: stdout
      value: "/ 200\n/items 200\n/missing 404"
    hints:
      - "Зарегистрированы только те пути, чьи хендлеры перечислены в `route_handlers`. Какие пути попадут в `registered_paths`?"
      - "Соберите множество путей по двум зарегистрированным хендлерам, затем для каждого запрошенного пути проверьте принадлежность множеству."
    variants:
      - snippet: |
          route_handlers = ["health"]
          requested = ["/health", "/"]
          routes = {"health": "/health", "index": "/"}

          registered_paths = {routes[h] for h in route_handlers}
          for path in requested:
              print(path, 200 if path in registered_paths else 404)
        expected:
          kind: stdout
          value: "/health 200\n/ 404"
      - snippet: |
          route_handlers = ["a", "b", "c"]
          routes = {"a": "/a", "b": "/b", "c": "/c"}
          requested = ["/b", "/x"]

          registered_paths = {routes[h] for h in route_handlers}
          for path in requested:
              print(path, 200 if path in registered_paths else 404)
        expected:
          kind: stdout
          value: "/b 200\n/x 404"

  - id: litestar-overview-predict-classify-001
    concept: litestar-overview
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она формализует, когда `async def` реально полезен: только если внутри есть await на I/O."
    snippet: |
      def benefit(is_async, has_await_io):
          if is_async and has_await_io:
              return "польза от async"
          if is_async and not has_await_io:
              return "async без пользы"
          return "обычный def"

      print(benefit(True, True))
      print(benefit(True, False))
      print(benefit(False, False))
    expected:
      kind: stdout
      value: "польза от async\nasync без пользы\nобычный def"
    hints:
      - "Async выигрывает только при ожидании ввода-вывода. Что произойдёт с `async def`, в котором нет ни одного await?"
      - "Применяйте условия в порядке записи: сначала async с await на I/O, затем async без него, затем всё остальное."
    variants:
      - snippet: |
          def benefit(is_async, has_await_io):
              if is_async and has_await_io:
                  return "польза от async"
              if is_async and not has_await_io:
                  return "async без пользы"
              return "обычный def"

          print(benefit(False, True))
          print(benefit(True, True))
        expected:
          kind: stdout
          value: "обычный def\nпольза от async"
      - snippet: |
          def serializer(use_pydantic):
              return "pydantic" if use_pydantic else "msgspec"

          print(serializer(False), serializer(True))
        expected:
          kind: stdout
          value: "msgspec pydantic"

  - id: litestar-overview-differences-001
    concept: litestar-overview
    type: theory-quiz
    difficulty: 4
    prompt: "Коллега утверждает: «Переходим на Litestar, потому что он всегда быстрее FastAPI». Какое возражение по существу честно?"
    choices:
      - id: a
        text: "Преимущество msgspec реально на сериализации JSON, но на типичном сервисе, который ходит в БД и по сети, оно теряется в общем времени ответа"
      - id: b
        text: "Возражений нет: Litestar в любом сценарии обрабатывает запросы быстрее за счёт async."
      - id: c
        text: "Litestar медленнее FastAPI во всём, потому что слоистая архитектура добавляет накладные расходы на каждый запрос."
      - id: d
        text: "Скорость зависит только от версии Python, а не от фреймворка, так что разницы между ними вообще нет."
    correct: [a]
    explanation: "«Litestar быстрее» - утверждение про умолчания (msgspec) и микробенчмарки сериализатора. На реальной I/O-bound нагрузке узким местом обычно оказывается база или сеть, и выигрыш сериализатора растворяется. Выбирать фреймворк только по бенчмаркам сериализации - оптимизировать не то; смотреть стоит на модель организации кода, экосистему и удобство для команды."
    hints:
      - "Спросите, на чём именно Litestar быстрее и какую долю времени ответа занимает эта часть на реальном сервисе."
      - "Что обычно дольше: разобрать JSON или дождаться ответа базы данных по сети?"
