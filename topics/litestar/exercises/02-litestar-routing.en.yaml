exercises:
  - id: litestar-routing-decorators-001
    concept: litestar-routing
    type: theory-quiz
    difficulty: 1
    prompt: "Which decorator marks a handler that responds to the HTTP DELETE method in Litestar?"
    choices:
      - id: a
        text: "`@delete(...)`, imported from `litestar` - each method gets its own decorator."
      - id: b
        text: "`@app.delete(...)`, as a method of the app object."
      - id: c
        text: "`@route(..., method=\"DELETE\")` - the only way to set the method."
      - id: d
        text: "`@get(..., delete=True)` - DELETE is set as a flag on `@get`."
    correct: [a]
    explanation: "In Litestar each HTTP method has its own decorator: `@get`, `@post`, `@put`, `@delete`, `@patch`. They're imported from `litestar` and attached to a function without any link to the app."
    variants:
      - prompt: "Which decorator marks a handler for a partial update (HTTP PATCH)?"
        choices:
          - id: a
            text: "`@patch(...)` from `litestar`."
          - id: b
            text: "`@put(...)` - Litestar has no separate decorator for PATCH."
          - id: c
            text: "`@update(...)`."
          - id: d
            text: "`@post(..., partial=True)`."
        correct: [a]
        explanation: "PATCH is marked with the `@patch` decorator. Each of the five main methods (`get`, `post`, `put`, `delete`, `patch`) has its own like-named decorator."
      - prompt: "Which decorator marks a handler that creates a resource (HTTP POST)?"
        choices:
          - id: a
            text: "`@post(...)` from `litestar`."
          - id: b
            text: "`@get(..., create=True)`."
          - id: c
            text: "`@create(...)`."
          - id: d
            text: "`@app.post(...)`, bound to the app."
        correct: [a]
        explanation: "Creating a resource is served by a handler with the `@post` decorator. The decorator exists on its own and is registered explicitly via `route_handlers`."

  - id: litestar-routing-path-type-001
    concept: litestar-routing
    type: theory-quiz
    difficulty: 2
    prompt: "How does the template `@get(\"/items/{item_id:int}\")` differ from `@get(\"/items/{item_id}\")` with an `item_id: int` annotation?"
    choices:
      - id: a
        text: "With `:int` the router won't match the route for a non-numeric segment (the request falls through to 404); without it, the segment matches any string, and the cast to int happens via the annotation."
      - id: b
        text: "No difference: `:int` in the template is pure cosmetics, behavior is identical."
      - id: c
        text: "With `:int` the parameter becomes a query parameter; without it, it's a path parameter."
      - id: d
        text: "Without `:int` the route won't register at all and will always return 404."
    correct: [a]
    explanation: "The type in the template `{item_id:int}` affects the route match itself: a non-numeric segment won't match and yields 404. A bare `{item_id}` matches any string, and then the cast to `int` happens later, via the function annotation's validation. These are different outcomes for the client."
    hints:
      - "Think about what the router does first: match the route, or cast the value to a type? Where does `:int` sit in that chain?"
      - "One option filters out a non-numeric segment right at route matching; the other only at validation."

  - id: litestar-routing-fill-controller-001
    concept: litestar-routing
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete a controller class with the `/users` prefix and a list-reading method."
    template: |
      from litestar import Controller, get

      class UserController({{base}}):
          path = "/users"

          @{{decorator}}("/")
          async def list_users(self) -> list:
              return []
    blanks:
      base:
        accept: ["Controller"]
      decorator:
        accept: ["get"]
    variants:
      - prompt: "Complete a controller with an integer path parameter in a method reading a single user."
        template: |
          from litestar import Controller, get

          class UserController(Controller):
              path = "/users"

              @get("/{user_id:{{type}}}")
              async def get_user(self, user_id: {{ann}}) -> dict:
                  return {"id": user_id}
        blanks:
          type:
            accept: ["int"]
          ann:
            accept: ["int"]
      - prompt: "Complete grouping the `list_users` handler under a common prefix via Router."
        template: |
          from litestar import Litestar, Router, get

          @get("/")
          async def list_users() -> list:
              return []

          users_router = Router(path="/users", {{param}}=[list_users])
          app = Litestar(route_handlers=[{{arg}}])
        blanks:
          param:
            accept: ["route_handlers"]
          arg:
            accept: ["users_router"]

  - id: litestar-routing-predict-join-001
    concept: litestar-routing
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? It models joining a path across layers: the final path is a concatenation of pieces top to bottom."
    snippet: |
      def join_path(*parts):
          return "/" + "/".join(p.strip("/") for p in parts if p.strip("/"))

      router = "/api"
      controller = "/users"
      handler = "/{user_id:int}"
      print(join_path(router, controller, handler))
    expected:
      kind: stdout
      value: "/api/users/{user_id:int}"
    hints:
      - "A handler's final path is the pieces from every layer above it, joined in order. Which three pieces are involved here?"
      - "Strip the leading/trailing slashes from each piece, join them with `/`, and add a leading slash."
    variants:
      - snippet: |
          def join_path(*parts):
              return "/" + "/".join(p.strip("/") for p in parts if p.strip("/"))

          print(join_path("/api/v1", "/orders", "/{order_id:int}"))
        expected:
          kind: stdout
          value: "/api/v1/orders/{order_id:int}"
      - snippet: |
          def join_path(*parts):
              return "/" + "/".join(p.strip("/") for p in parts if p.strip("/"))

          print(join_path("/users", "", "/"))
        expected:
          kind: stdout
          value: "/users"

  - id: litestar-routing-predict-match-001
    concept: litestar-routing
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It models the role of `:int` in the template: a non-numeric segment doesn't match the route."
    snippet: |
      def matches_int_segment(segment):
          return segment.isdigit()

      for seg in ["42", "abc", "7"]:
          print(seg, "match" if matches_int_segment(seg) else "404")
    expected:
      kind: stdout
      value: "42 match\nabc 404\n7 match"
    hints:
      - "The template `{item_id:int}` only matches a segment that's an integer. Which segments are numbers?"
      - "Check each segment for \"all digits\" and pair the outcome: match or 404."
    variants:
      - snippet: |
          def matches_int_segment(segment):
              return segment.isdigit()

          for seg in ["100", "x9", "0"]:
              print(seg, "match" if matches_int_segment(seg) else "404")
        expected:
          kind: stdout
          value: "100 match\nx9 404\n0 match"
      - snippet: |
          def resolve(path, routes):
              return routes.get(path, 404)

          routes = {"/users": "list", "/users/new": "create"}
          for p in ["/users", "/users/new", "/users/42"]:
              print(p, resolve(p, routes))
        expected:
          kind: stdout
          value: "/users list\n/users/new create\n/users/42 404"

  - id: litestar-routing-predict-prefix-shift-001
    concept: litestar-routing
    type: predict-output
    difficulty: 4
    prompt: "What does the program print? It shows why a prefix on a layer shifts every nested address at once - handy for versioning."
    snippet: |
      def with_prefix(prefix, paths):
          return [prefix + p for p in paths]

      handlers = ["/users", "/users/{id:int}", "/orders"]
      v1 = with_prefix("/api/v1", handlers)
      v2 = with_prefix("/api/v2", handlers)
      print(v1[0])
      print(v2[0])
      print(len(v1) == len(v2))
    expected:
      kind: stdout
      value: "/api/v1/users\n/api/v2/users\nTrue"
    hints:
      - "A prefix on a layer applies to every nested path at once. What changes when you swap one prefix, and what stays the same?"
      - "Compare the first element of the list for two prefixes and the handler count: only the base piece changes, the handler set stays the same."
