exercises:
  - id: litestar-routing-decorators-001
    concept: litestar-routing
    type: theory-quiz
    difficulty: 1
    prompt: "Каким декоратором в Litestar помечают хендлер, отвечающий на HTTP-метод DELETE?"
    choices:
      - id: a
        text: "`@delete(...)`, импортированным из `litestar` - для каждого метода свой декоратор."
      - id: b
        text: "`@app.delete(...)`, как методом объекта приложения."
      - id: c
        text: "`@route(..., method=\"DELETE\")` - единственный способ задать метод."
      - id: d
        text: "`@get(..., delete=True)` - DELETE задаётся флагом у `@get`."
    correct: [a]
    explanation: "В Litestar для каждого HTTP-метода свой декоратор: `@get`, `@post`, `@put`, `@delete`, `@patch`. Они импортируются из `litestar` и навешиваются на функцию без привязки к приложению."
    variants:
      - prompt: "Каким декоратором помечают хендлер для частичного обновления (HTTP PATCH)?"
        choices:
          - id: a
            text: "`@patch(...)` из `litestar`."
          - id: b
            text: "`@put(...)` - PATCH в Litestar отдельного декоратора не имеет."
          - id: c
            text: "`@update(...)`."
          - id: d
            text: "`@post(..., partial=True)`."
        correct: [a]
        explanation: "PATCH помечают декоратором `@patch`. У каждого из пяти основных методов (`get`, `post`, `put`, `delete`, `patch`) свой одноимённый декоратор."
      - prompt: "Каким декоратором помечают хендлер для создания ресурса (HTTP POST)?"
        choices:
          - id: a
            text: "`@post(...)` из `litestar`."
          - id: b
            text: "`@get(..., create=True)`."
          - id: c
            text: "`@create(...)`."
          - id: d
            text: "`@app.post(...)`, привязанным к приложению."
        correct: [a]
        explanation: "Создание ресурса обслуживает хендлер с декоратором `@post`. Декоратор существует сам по себе и регистрируется явно через `route_handlers`."

  - id: litestar-routing-path-type-001
    concept: litestar-routing
    type: theory-quiz
    difficulty: 2
    prompt: "Чем шаблон `@get(\"/items/{item_id:int}\")` отличается от `@get(\"/items/{item_id}\")` с аннотацией `item_id: int`?"
    choices:
      - id: a
        text: "С `:int` роутер не сопоставит маршрут для нечислового сегмента (запрос уйдёт в 404); без `:int` сегмент совпадёт с любой строкой, а приведение к int произойдёт по аннотации."
      - id: b
        text: "Ничем: `:int` в шаблоне - чистая косметика, поведение совпадает."
      - id: c
        text: "С `:int` параметр становится query-параметром, без него - path."
      - id: d
        text: "Без `:int` маршрут вообще не зарегистрируется и всегда вернёт 404."
    correct: [a]
    explanation: "Тип в шаблоне `{item_id:int}` влияет на само совпадение маршрута: нечисловой сегмент не сопоставится и даст 404. Голое `{item_id}` совпадёт с любой строкой, и тогда приведение к `int` сделает уже валидация по аннотации функции. Это разные исходы для клиента."
    hints:
      - "Подумайте, что роутер делает раньше: сопоставляет маршрут или приводит значение к типу? Где в этой цепочке стоит `:int`?"
      - "Один из вариантов отсеивает нечисловой сегмент ещё на этапе сопоставления маршрута, другой - уже на валидации."

  - id: litestar-routing-fill-controller-001
    concept: litestar-routing
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите класс-контроллер с префиксом `/users` и методом чтения списка."
    template: |
      from litestar import Controller, get

      class UserController({{base}}):
          path = "/users"

          @{{decorator}}("/")
          async def list_users(self) -> list:
              return []
    blanks:
      base:
        accept: ["Controller"]
      decorator:
        accept: ["get"]
    variants:
      - prompt: "Допишите контроллер с path-параметром-числом в методе чтения одного пользователя."
        template: |
          from litestar import Controller, get

          class UserController(Controller):
              path = "/users"

              @get("/{user_id:{{type}}}")
              async def get_user(self, user_id: {{ann}}) -> dict:
                  return {"id": user_id}
        blanks:
          type:
            accept: ["int"]
          ann:
            accept: ["int"]
      - prompt: "Допишите группировку хендлера `list_users` под общим префиксом через Router."
        template: |
          from litestar import Litestar, Router, get

          @get("/")
          async def list_users() -> list:
              return []

          users_router = Router(path="/users", {{param}}=[list_users])
          app = Litestar(route_handlers=[{{arg}}])
        blanks:
          param:
            accept: ["route_handlers"]
          arg:
            accept: ["users_router"]

  - id: litestar-routing-predict-join-001
    concept: litestar-routing
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Она моделирует склейку пути по слоям: итоговый путь - конкатенация кусков сверху вниз."
    snippet: |
      def join_path(*parts):
          return "/" + "/".join(p.strip("/") for p in parts if p.strip("/"))

      router = "/api"
      controller = "/users"
      handler = "/{user_id:int}"
      print(join_path(router, controller, handler))
    expected:
      kind: stdout
      value: "/api/users/{user_id:int}"
    hints:
      - "Итоговый путь хендлера - это куски всех слоёв над ним, склеенные по порядку. Какие три куски здесь участвуют?"
      - "Снимите крайние слэши с каждого куска, соедините через `/` и добавьте ведущий слэш."
    variants:
      - snippet: |
          def join_path(*parts):
              return "/" + "/".join(p.strip("/") for p in parts if p.strip("/"))

          print(join_path("/api/v1", "/orders", "/{order_id:int}"))
        expected:
          kind: stdout
          value: "/api/v1/orders/{order_id:int}"
      - snippet: |
          def join_path(*parts):
              return "/" + "/".join(p.strip("/") for p in parts if p.strip("/"))

          print(join_path("/users", "", "/"))
        expected:
          kind: stdout
          value: "/users"

  - id: litestar-routing-predict-match-001
    concept: litestar-routing
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она моделирует роль `:int` в шаблоне: нечисловой сегмент не совпадает с маршрутом."
    snippet: |
      def matches_int_segment(segment):
          return segment.isdigit()

      for seg in ["42", "abc", "7"]:
          print(seg, "match" if matches_int_segment(seg) else "404")
    expected:
      kind: stdout
      value: "42 match\nabc 404\n7 match"
    hints:
      - "Шаблон `{item_id:int}` сопоставится только с сегментом, который является целым числом. Какие из сегментов это число?"
      - "Проверьте каждый сегмент на «состоит из цифр» и сопоставьте исход: совпадение или 404."
    variants:
      - snippet: |
          def matches_int_segment(segment):
              return segment.isdigit()

          for seg in ["100", "x9", "0"]:
              print(seg, "match" if matches_int_segment(seg) else "404")
        expected:
          kind: stdout
          value: "100 match\nx9 404\n0 match"
      - snippet: |
          def resolve(path, routes):
              return routes.get(path, 404)

          routes = {"/users": "list", "/users/new": "create"}
          for p in ["/users", "/users/new", "/users/42"]:
              print(p, resolve(p, routes))
        expected:
          kind: stdout
          value: "/users list\n/users/new create\n/users/42 404"

  - id: litestar-routing-predict-prefix-shift-001
    concept: litestar-routing
    type: predict-output
    difficulty: 4
    prompt: "Что выведет программа? Она показывает, почему префикс на слое сдвигает все вложенные адреса разом - удобство версионирования."
    snippet: |
      def with_prefix(prefix, paths):
          return [prefix + p for p in paths]

      handlers = ["/users", "/users/{id:int}", "/orders"]
      v1 = with_prefix("/api/v1", handlers)
      v2 = with_prefix("/api/v2", handlers)
      print(v1[0])
      print(v2[0])
      print(len(v1) == len(v2))
    expected:
      kind: stdout
      value: "/api/v1/users\n/api/v2/users\nTrue"
    hints:
      - "Префикс на слое применяется ко всем вложенным путям сразу. Что меняется при смене одного префикса, а что остаётся прежним?"
      - "Сравните первый элемент списка для двух префиксов и число хендлеров: меняется только базовый кусок, набор хендлеров тот же."
