exercises:
  - id: litestar-di-binding-001
    concept: litestar-di
    type: theory-quiz
    difficulty: 1
    prompt: "По какому признаку Litestar связывает зарегистрированную через `Provide` зависимость с конкретным параметром хендлера?"
    choices:
      - id: a
        text: "По совпадению имени: ключ в словаре `dependencies` должен совпадать с именем параметра хендлера."
      - id: b
        text: "По совпадению типа: тип значения фабрики должен совпасть с аннотацией параметра."
      - id: c
        text: "По порядку: первая зависимость уходит в первый параметр, вторая - во второй."
      - id: d
        text: "По декоратору на параметре: каждый параметр помечают `@inject`."
    correct: [a]
    explanation: "Связывание в Litestar идёт по имени. Зависимость регистрируется в словаре `dependencies` под ключом, и параметр хендлера ловит её по совпадению этого ключа со своим именем - не по типу и не по порядку."
    variants:
      - prompt: "Что оборачивает фабрику зависимости при её регистрации в Litestar?"
        choices:
          - id: a
            text: "`Provide(fabric)` из `litestar.di`."
          - id: b
            text: "`Depends(fabric)` - как и в FastAPI, другого способа нет."
          - id: c
            text: "`Inject(fabric)` - встроенный декоратор Litestar."
          - id: d
            text: "Ничего: фабрику кладут в словарь напрямую, без обёртки."
        correct: [a]
        explanation: "Фабрику оборачивают в `Provide(...)` из `litestar.di`. Именно `Provide` несёт настройки зависимости, например `use_cache`. FastAPI использует `Depends`, но это другой фреймворк."
      - prompt: "Какой может быть фабрика зависимости в Litestar?"
        choices:
          - id: a
            text: "Как `async def`, так и обычной `def`; блокирующую sync-фабрику"
          - id: b
            text: "Только `async def` - sync-фабрики Litestar не поддерживает."
          - id: c
            text: "Только обычной `def` - async-фабрики не разрешены."
          - id: d
            text: "Только лямбдой без аргументов."
        correct: [a]
        explanation: "Фабрика может быть и async, и sync. Async-фабрику фреймворк дожидается, sync выполняет напрямую, а блокирующую выносит в пул потоков - как и хендлеры. Async выбирают, когда внутри есть настоящий await."

  - id: litestar-di-cache-danger-001
    concept: litestar-di
    type: theory-quiz
    difficulty: 2
    prompt: "Для какой зависимости включать `use_cache=True` опасно?"
    choices:
      - id: a
        text: "Для «текущего пользователя запроса»: кэш живёт на всё приложение, и все запросы увидят пользователя из первого"
      - id: b
        text: "Для разобранного при старте конфига приложения - его кэшировать нельзя ни в коем случае."
      - id: c
        text: "Для справочника статусов, одинакового между запросами - именно его кэш и ломает."
      - id: d
        text: "`use_cache=True` безопасен всегда: кэш сбрасывается после каждого запроса."
    correct: [a]
    explanation: "`use_cache=True` кэширует результат фабрики на всё приложение, а не на запрос. Для значений, одинаковых между запросами (конфиг, справочник), это уместно. Но для запросозависимого - текущий пользователь, открытая транзакция - кэш отдаст всем запросам значение из первого вызова, и один пользователь увидит данные другого."
    hints:
      - "Кэш зависимости живёт дольше одного запроса. Какие значения нельзя переиспользовать между разными запросами разных пользователей?"
      - "Разделите значения на «одинаковые для всех запросов» и «свои у каждого запроса». Какие из них ломаются при переиспользовании?"

  - id: litestar-di-fill-provide-001
    concept: litestar-di
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите регистрацию зависимости `db` на уровне приложения и её приём в хендлере."
    template: |
      from litestar import Litestar, get
      from litestar.di import Provide

      async def get_db() -> str:
          return "соединение"

      @get("/orders")
      async def list_orders({{param}}: str) -> dict:
          return {"db": {{param}}}

      app = Litestar(
          route_handlers=[list_orders],
          dependencies={"{{key}}": Provide(get_db)},
      )
    blanks:
      param:
        accept: ["db"]
      key:
        accept: ["db"]
    variants:
      - prompt: "Допишите кэширование дорогой неизменной зависимости (разбор конфига)."
        template: |
          from litestar.di import Provide

          def load_config() -> dict:
              return {"page_size": 20}

          provider = Provide(load_config, {{flag}}=True)
        blanks:
          flag:
            accept: ["use_cache"]
      - prompt: "Допишите переопределение зависимости `repo` на уровне контроллера."
        template: |
          from litestar import Controller, get
          from litestar.di import Provide

          async def special_repo() -> str:
              return "специальный"

          class AdminController(Controller):
              path = "/admin"
              {{attr}} = {"repo": Provide(special_repo)}

              @get("/")
              async def index(self, repo: str) -> dict:
                  return {"repo": repo}
        blanks:
          attr:
            accept: ["dependencies"]

  - id: litestar-di-predict-nested-001
    concept: litestar-di
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она моделирует вложенные зависимости: repo зависит от session, session - от engine, и фреймворк разрешает цепочку снизу вверх."
    snippet: |
      def get_engine():
          return "engine"

      def get_session(engine):
          return f"session({engine})"

      def get_repo(session):
          return f"repo[{session}]"

      engine = get_engine()
      session = get_session(engine)
      repo = get_repo(session)
      print(repo)
    expected:
      kind: stdout
      value: "repo[session(engine)]"
    hints:
      - "Каждая фабрика зависит от той, чьё имя стоит в её параметре. С какой зависимости приходится начинать, чтобы было что подставить дальше?"
      - "Разрешайте цепочку снизу вверх: сначала engine, его результат - в session, результат session - в repo."
    variants:
      - snippet: |
          def get_engine():
              return "pg"

          def get_session(engine):
              return f"sess<{engine}>"

          def get_repo(session):
              return f"users:{session}"

          print(get_repo(get_session(get_engine())))
        expected:
          kind: stdout
          value: "users:sess<pg>"
      - snippet: |
          def base():
              return "A"

          def mid(base):
              return base + "B"

          def top(mid):
              return mid + "C"

          print(top(mid(base())))
        expected:
          kind: stdout
          value: "ABC"

  - id: litestar-di-predict-override-001
    concept: litestar-di
    type: predict-output
    difficulty: 4
    prompt: "Что выведет программа? Она моделирует разрешение зависимости по слоям: для каждого хендлера побеждает ближайший слой, на котором объявлено имя (нижний переопределяет верхний)."
    snippet: |
      app_deps = {"repo": "default", "db": "pool"}
      controller_deps = {"repo": "special"}
      handler_deps = {}

      def resolve(name, layers):
          for layer in reversed(layers):
              if name in layer:
                  return layer[name]
          return None

      layers = [app_deps, controller_deps, handler_deps]
      print(resolve("repo", layers))
      print(resolve("db", layers))
      print(resolve("missing", layers))
    expected:
      kind: stdout
      value: "special\npool\nNone"
    hints:
      - "Слои перечислены сверху вниз (app, controller, handler), а побеждает ближайший к хендлеру. С какого конца списка нужно искать?"
      - "Идите по слоям от нижнего к верхнему и берите первое найденное значение имени; если нигде нет - None."
      - "`repo` объявлен и на app, и на controller - какой из них ближе к хендлеру? `db` только на app, `missing` нигде."

  - id: litestar-di-predict-layer-challenge-001
    concept: litestar-di
    type: predict-output
    difficulty: 5
    prompt: "Что выведет программа? Это разбор нетривиального случая: переопределение работает только при ТОЧНОМ совпадении имени ключа, и нижний слой полностью заменяет, а не дополняет верхний. Здесь контроллер объявляет зависимость под чуть другим именем."
    snippet: |
      app_deps = {"repo": "app_repo"}
      controller_deps = {"repository": "ctrl_repo"}

      def resolve(name, layers):
          for layer in reversed(layers):
              if name in layer:
                  return layer[name]
          return None

      layers = [app_deps, controller_deps]
      handler_a = resolve("repo", layers)
      handler_b = resolve("repository", layers)
      print(handler_a)
      print(handler_b)
      print(handler_a == handler_b)
    expected:
      kind: stdout
      value: "app_repo\nctrl_repo\nFalse"
    hints:
      - "Переопределение срабатывает, только если ключи на слоях совпадают буквально. Совпадают ли `repo` и `repository`?"
      - "Разреши каждое имя отдельно по тем же слоям: параметр `repo` ловит только ключ `repo`, параметр `repository` - только `repository`."
      - "Раз имена разные, контроллер НЕ переопределил `repo`, а добавил вторую независимую зависимость - поэтому значения разные."

  - id: litestar-di-why-001
    concept: litestar-di
    type: theory-quiz
    difficulty: 3
    prompt: "Главная практическая выгода получения соединения с БД через `Provide`, а не создания его прямо внутри хендлера, - это:"
    choices:
      - id: a
        text: "Тестируемость: в тесте можно зарегистрировать под тем же ключом фабрику с фейком, и хендлер, ничего не зная, будет"
      - id: b
        text: "Скорость: `Provide` создаёт соединение быстрее, чем прямой вызов внутри хендлера."
      - id: c
        text: "Безопасность типов: только `Provide` умеет проверять тип соединения на этапе компиляции."
      - id: d
        text: "Ничего не меняется по сути - это просто другой синтаксис того же создания ресурса в хендлере."
    correct: [a]
    explanation: "Когда хендлер сам создаёт соединение, его нельзя протестировать в изоляции - тест поднимет настоящую базу. Когда соединение приходит через `Provide`, тест собирает мини-приложение и под тем же ключом регистрирует фабрику, возвращающую фейк. Хендлер декларирует потребность, а не добывает ресурс, - и его легко собрать в любой конфигурации, включая тестовую."
    hints:
      - "Представьте, что нужно протестировать хендлер, не поднимая реальную базу. Что мешает, если соединение создаётся прямо в его теле?"
      - "DI разворачивает ответственность: кто создаёт ресурс - хендлер или тот, кто его вызывает? Где тогда удобно подменить ресурс?"
