exercises:
  - id: litestar-dto-validation-body-001
    concept: litestar-dto-validation
    type: theory-quiz
    difficulty: 1
    prompt: "Под каким именем параметра хендлера Litestar по соглашению ожидает тело запроса для автоматического разбора?"
    choices:
      - id: a
        text: "`data` - параметр `data: Model` связывается с телом запроса и получает разобранный объект."
      - id: b
        text: "`body` - именно это имя зарезервировано в Litestar под тело запроса."
      - id: c
        text: "`request` - тело всегда приходит в параметре `request` и разбирается вручную."
      - id: d
        text: "Любое имя подойдёт - Litestar определяет тело только по типу, имя роли не играет."
    correct: [a]
    explanation: "Имя `data` - соглашение Litestar для тела запроса. Параметр `data: Model` в сигнатуре заставляет фреймворк разобрать тело как `Model`, провалидировать и положить готовый объект. Другое имя фреймворк истолкует иначе (например как query- или path-параметр в зависимости от типа)."
    variants:
      - prompt: "Как по умолчанию объявляют модель данных в Litestar для максимальной скорости сериализации?"
        choices:
          - id: a
            text: "Наследованием от `msgspec.Struct` - быстрый аналог датакласса с валидацией."
          - id: b
            text: "Наследованием от `pydantic.BaseModel` - других вариантов Litestar не поддерживает."
          - id: c
            text: "Обычным `dict` без объявления полей."
          - id: d
            text: "Наследованием от `litestar.Model` - встроенного базового класса фреймворка."
        correct: [a]
        explanation: "По умолчанию модель - это `msgspec.Struct`. Litestar поддерживает также Pydantic, dataclasses и TypedDict, но msgspec стоит по умолчанию ради скорости разбора и кодирования JSON."
      - prompt: "Что произойдёт, если тело запроса не пройдёт валидацию модели (отсутствует обязательное поле или неверный тип)?"
        choices:
          - id: a
            text: "Хендлер не вызовется, а клиент получит структурированную ошибку (например 422) с указанием проблемного поля."
          - id: b
            text: "Хендлер вызовется, но в `data` придёт `None`, и проверять валидность должен сам хендлер."
          - id: c
            text: "Сервер упадёт с 500, потому что Litestar не обрабатывает ошибки валидации сам."
          - id: d
            text: "Невалидные поля молча заменятся значениями по умолчанию, и хендлер вызовется как обычно."
        correct: [a]
        explanation: "При невалидном теле Litestar не вызывает хендлер и сам возвращает ответ об ошибке клиента (422 для семантически некорректного тела) с описанием проблемного поля. До хендлера доходит только валидный объект."

  - id: litestar-dto-validation-purpose-001
    concept: litestar-dto-validation
    type: theory-quiz
    difficulty: 2
    prompt: "Зачем нужен отдельный DTO поверх модели, если нужно скрыть `password_hash` из ответа - почему не убрать это поле из самой модели?"
    choices:
      - id: a
        text: "С полем `password_hash` работает бизнес-логика; убрав его из модели, мы потеряем его везде. DTO прячет поле только на"
      - id: b
        text: "Убрать поле из модели - правильное решение; DTO для этого не нужен и лишь усложняет код."
      - id: c
        text: "Поле нельзя убрать из модели только потому, что msgspec это запрещает технически."
      - id: d
        text: "DTO нужен исключительно для переименования полей, к скрытию `password_hash` он отношения не имеет."
    correct: [a]
    explanation: "Модель описывает полную форму объекта, с которой работает вся логика приложения, включая проверку пароля по хэшу. Если вырезать `password_hash` из модели, его не станет и для бизнес-логики. DTO решает задачу иначе: поле остаётся в модели, а `return_dto` с `exclude={\"password_hash\"}` убирает его только на выходе, на границе приложения."
    hints:
      - "Подумайте, кому внутри приложения нужен `password_hash` помимо ответа клиенту. Что сломается, если поля не станет совсем?"
      - "Разделите два вопроса: «какие поля есть у объекта» (это модель) и «какие поля показывать наружу» (это DTO)."

  - id: litestar-dto-validation-fill-body-001
    concept: litestar-dto-validation
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите хендлер, который принимает тело запроса как модель `CreateUser`."
    template: |
      from msgspec import Struct
      from litestar import post

      class CreateUser(Struct):
          name: str
          email: str

      @post("/users")
      async def create_user({{param}}: CreateUser) -> CreateUser:
          return {{param}}
    blanks:
      param:
        accept: ["data"]
    variants:
      - prompt: "Допишите модель: поле `in_stock` должно быть необязательным со значением по умолчанию `True`."
        template: |
          from msgspec import Struct

          class Product({{base}}):
              title: str
              price: float
              in_stock: bool = {{default}}
        blanks:
          base:
            accept: ["Struct"]
          default:
            accept: ["True"]
      - prompt: "Допишите хендлер чтения, который скрывает поле через DTO на выходе."
        template: |
          from dataclasses import dataclass
          from litestar import get
          from litestar.dto import DataclassDTO, DTOConfig

          @dataclass
          class User:
              id: int
              name: str
              password_hash: str

          class UserReadDTO(DataclassDTO[User]):
              config = DTOConfig(exclude={"{{field}}"})

          @get("/users/{user_id:int}", {{kwarg}}=UserReadDTO)
          async def get_user(user_id: int) -> User:
              return User(id=user_id, name="Анна", password_hash="x")
        blanks:
          field:
            accept: ["password_hash"]
          kwarg:
            accept: ["return_dto"]

  - id: litestar-dto-validation-predict-exclude-001
    concept: litestar-dto-validation
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Она моделирует DTO с `exclude`: из полной записи убираются исключённые поля, остальные идут в JSON ответа."
    snippet: |
      record = {
          "id": 7,
          "name": "Анна",
          "email": "anna@example.ru",
          "password_hash": "secret",
      }
      exclude = {"password_hash"}

      response = {k: v for k, v in record.items() if k not in exclude}
      print(list(response.keys()))
    expected:
      kind: stdout
      value: "['id', 'name', 'email']"
    hints:
      - "DTO с `exclude` пропускает все поля, кроме перечисленных. Какие поля записи не входят в множество исключённых?"
      - "Пройдите по полям записи в их порядке и оставьте те, чьё имя не лежит в `exclude`."
    variants:
      - snippet: |
          record = {
              "id": 1,
              "name": "Борис",
              "password_hash": "h",
              "created_at": "2026-01-10",
          }
          exclude = {"password_hash", "created_at"}

          response = {k: v for k, v in record.items() if k not in exclude}
          print(list(response.keys()))
        expected:
          kind: stdout
          value: "['id', 'name']"
      - snippet: |
          record = {"id": 3, "name": "Вера", "email": "v@example.ru"}
          exclude = set()

          response = {k: v for k, v in record.items() if k not in exclude}
          print(list(response.keys()))
        expected:
          kind: stdout
          value: "['id', 'name', 'email']"

  - id: litestar-dto-validation-predict-include-001
    concept: litestar-dto-validation
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она моделирует DTO с `include` и `rename_fields`: наружу выходят только включённые поля, причём с переименованием."
    snippet: |
      record = {"id": 7, "name": "Анна", "email": "anna@example.ru"}
      include = {"id", "name"}
      rename = {"id": "userId"}

      out = {}
      for key in record:
          if key in include:
              out[rename.get(key, key)] = record[key]
      print(out)
    expected:
      kind: stdout
      value: "{'userId': 7, 'name': 'Анна'}"
    hints:
      - "`include` оставляет только перечисленные поля, всё остальное отбрасывает. Какие два поля переживут фильтр?"
      - "Идите по полям в порядке записи; для уцелевших возьмите новое имя из `rename`, если оно там есть, иначе старое."
    variants:
      - snippet: |
          record = {"id": 1, "name": "Борис", "role": "admin"}
          include = {"name", "role"}
          rename = {"role": "accessLevel"}

          out = {}
          for key in record:
              if key in include:
                  out[rename.get(key, key)] = record[key]
          print(out)
        expected:
          kind: stdout
          value: "{'name': 'Борис', 'accessLevel': 'admin'}"
      - snippet: |
          record = {"id": 5, "title": "Книга", "price": 300}
          include = {"id", "title", "price"}
          rename = {"id": "productId", "price": "cost"}

          out = {}
          for key in record:
              if key in include:
                  out[rename.get(key, key)] = record[key]
          print(out)
        expected:
          kind: stdout
          value: "{'productId': 5, 'title': 'Книга', 'cost': 300}"

  - id: litestar-dto-validation-predict-partial-001
    concept: litestar-dto-validation
    type: predict-output
    difficulty: 4
    prompt: "Что выведет программа? Она моделирует частичное обновление (PATCH) через DTOData с partial: серверные поля игнорируются на входе, а применяются только присланные клиентом поля, которые разрешены."
    snippet: |
      current = {"id": 7, "name": "Анна", "email": "a@example.ru", "password_hash": "h"}
      server_only = {"id", "password_hash"}
      sent = {"email": "new@example.ru", "id": 999, "name": "Аня"}

      changes = {k: v for k, v in sent.items() if k not in server_only}
      updated = dict(current)
      updated.update(changes)

      print(sorted(changes.keys()))
      print(updated["id"])
      print(updated["email"])
    expected:
      kind: stdout
      value: "['email', 'name']\n7\nnew@example.ru"
    hints:
      - "Входной DTO исключает серверные поля: что бы клиент ни прислал в `id`, оно не должно дойти до изменений. Какие из присланных полей переживут фильтр?"
      - "Сначала отфильтруйте присланные поля по `server_only`, затем наложите оставшиеся на текущую запись и посмотрите на итоговые `id` и `email`."
      - "Обратите внимание: `id: 999` попадает в `server_only` и отбрасывается, поэтому `id` в записи остаётся прежним."

  - id: litestar-dto-validation-direction-001
    concept: litestar-dto-validation
    type: theory-quiz
    difficulty: 3
    prompt: "Разработчик хочет, чтобы клиент при создании пользователя не мог задать `id` (его ставит сервер), но при этом сам сервер возвращал `id` в ответе. Как настроить DTO?"
    choices:
      - id: a
        text: "Исключить `id` во входном DTO, но не исключать его в выходном"
      - id: b
        text: "Исключить `id` и во входном, и в выходном DTO - так надёжнее всего."
      - id: c
        text: "Исключить `id` только в выходном DTO (`return_dto=`): этого достаточно, чтобы клиент не мог его прислать."
      - id: d
        text: "Убрать `id` из модели целиком - тогда ни прислать, ни вернуть его уже нельзя."
    correct: [a]
    explanation: "`dto` фильтрует вход (разбор тела), `return_dto` - выход (ответ). Чтобы клиент не задавал `id`, исключаем его во входном DTO. Чтобы сервер всё же возвращал проставленный `id`, в выходном DTO его НЕ исключаем. Это и есть смысл двух независимых фильтров на одну модель: разные правила для входа и выхода."
    hints:
      - "Вход и выход - два разных направления, и у Litestar для них два разных параметра. Какое поле где должно быть отфильтровано?"
      - "Спросите себя по каждому направлению отдельно: должен ли клиент мочь ПРИСЛАТЬ id? должен ли сервер ВЕРНУТЬ id?"
