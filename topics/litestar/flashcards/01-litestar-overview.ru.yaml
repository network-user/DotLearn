conceptId: litestar-overview
cards:
  - id: litestar-overview-01
    front: "Что общего у Litestar и FastAPI на уровне развёртывания?"
    back: "Оба - ASGI-фреймворки: запускаются одним и тем же сервером (uvicorn module:app), ставятся за один прокси и решают одни задачи. На маленьком сервисе код почти не отличается."
    tags: [litestar]
  - id: litestar-overview-02
    front: "Как объявляют и регистрируют хендлер в Litestar?"
    back: "Хендлер помечают отдельным декоратором (@get, @post) без привязки к app, а затем явно передают в Litestar(route_handlers=[...]). Сам декоратор приложение ни о чём не уведомляет."
    tags: [litestar]
  - id: litestar-overview-03
    front: "Какова слоистая архитектура Litestar-приложения?"
    back: "Четыре слоя сверху вниз: app (Litestar) → router (Router) → controller (Controller) → handler. Каждый слой может добавлять префикс пути, зависимости, guards и настройки, а нижние слои их наследуют."
    tags: [litestar]
  - id: litestar-overview-04
    front: "Три реальные ставки Litestar, отличающие его от FastAPI"
    back: "Сериализация на msgspec вместо Pydantic по умолчанию; DI через Provide на любом слое; встроенные DTO и система плагинов. Это разные модели, а не «лучше/хуже»."
    tags: [litestar]
  - id: litestar-overview-05
    front: "В чём смысл msgspec по сравнению с Pydantic в Litestar?"
    back: "msgspec - библиотека сериализации и валидации с упором на скорость; модель объявляют как msgspec.Struct. Она заметно быстрее на разборе и кодировании JSON, но стоит лишь по умолчанию - Pydantic, dataclasses и TypedDict тоже поддержаны."
    tags: [litestar]
  - id: litestar-overview-06
    front: "Почему «Litestar быстрее FastAPI» - утверждение с оговоркой?"
    back: "Преимущество msgspec реально на сериализации и в микробенчмарках, но на типичном I/O-bound сервисе узким местом оказывается база или сеть, а не сериализатор. Выбирать фреймворк только по этому не стоит."
    tags: [litestar]
  - id: litestar-overview-07
    front: "Делает ли async def без await хендлер быстрее?"
    back: "Нет. Хендлер async def без единого await внутри выполнится в потоке event loop без переключений, как обычная функция. Польза от async появляется только при настоящем ожидании I/O - как и в FastAPI."
    tags: [litestar]
  - id: litestar-overview-08
    front: "Чем msgspec строже Pydantic к приведению типов?"
    back: "msgspec по умолчанию не превращает молча строку «42» в число 42 для поля int так охотно, как Pydantic в lax-режиме. Это сознательный выбор в пользу строгости, который удивляет переходящих с Pydantic v1."
    tags: [litestar]
  - id: litestar-overview-09
    front: "Откуда взялось имя Litestar и при чём тут Starlite?"
    back: "Проект раньше назывался Starlite и был переименован в Litestar в 2023 году. Старые статьи и пакеты под именем starlite - это он же до переименования; при поиске документации держитесь свежих материалов под именем Litestar."
    tags: [litestar]
  - id: litestar-overview-10
    front: "Что произойдёт с хендлером @get, который не передан в route_handlers?"
    back: "Он просто не зарегистрируется (напрямую или через router/controller), и его путь вернёт 404. В отличие от @app.get у FastAPI, декоратор сам приложение ни о чём не уведомляет."
    tags: [litestar]
  - id: litestar-overview-11
    front: "В чём Litestar и FastAPI практически одинаковы?"
    back: "Оба строят OpenAPI-документацию из аннотаций, определяют источник параметра (path/query/тело) по сигнатуре, поддерживают sync- и async-хендлеры и отдают понятные ошибки валидации с указанием поля."
    tags: [litestar]
  - id: litestar-overview-12
    front: "Что такое ASGI и почему он общий знаменатель для этих фреймворков?"
    back: "ASGI (Asynchronous Server Gateway Interface) - контракт между асинхронным веб-сервером и Python-приложением: приложение принимает scope, receive, send. FastAPI, Litestar и Starlette его реализуют, поэтому взаимозаменяемы на уровне запуска и развёртывания."
    tags: [litestar]
