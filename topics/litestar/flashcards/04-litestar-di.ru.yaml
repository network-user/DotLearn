conceptId: litestar-di
cards:
  - id: litestar-di-01
    front: "Какую проблему решает внедрение зависимостей (DI)?"
    back: "Хендлер не добывает ресурс сам (соединение, репозиторий), а объявляет в сигнатуре, что ему нужен параметр; фреймворк сам его создаёт и передаёт. Это убирает дублирование инициализации и делает ресурс подменяемым в тестах."
    tags: [litestar]
  - id: litestar-di-02
    front: "Как DI связывает зависимость с хендлером в Litestar?"
    back: "По совпадению имени: ключ в словаре dependencies должен совпадать с именем параметра хендлера. Provide(fabric) оборачивает фабрику. Связь идёт по имени, а не по типу."
    tags: [litestar]
  - id: litestar-di-03
    front: "Чем регистрация зависимости в Litestar отличается от FastAPI?"
    back: "В FastAPI зависимость подставляется через Depends(get_db) в значении параметра по умолчанию. В Litestar фабрику регистрируют в словаре dependencies под ключом, а параметр хендлера ловит её по совпадению этого ключа со своим именем."
    tags: [litestar]
  - id: litestar-di-04
    front: "На каких слоях объявляют зависимости и кому они видны?"
    back: "На любом из четырёх слоёв (app/router/controller/handler) - как и префиксы пути. Зависимость, объявленная на слое, видна этому слою и всем вложенным; соседний контроллер без неё её не увидит."
    tags: [litestar]
  - id: litestar-di-05
    front: "Что происходит при одинаковом имени зависимости на разных слоях?"
    back: "Нижний слой (ближайший к хендлеру) полностью переопределяет верхний - не дополняет, а целиком вытесняет его фабрику для своего поддерева. Это позволяет задать дефолт на app и подменить его на контроллере или хендлере."
    tags: [litestar]
  - id: litestar-di-06
    front: "Почему переопределение зависимости может «не сработать»?"
    back: "Переопределение работает только при точном совпадении имени ключа. Если объявить зависимость под чуть другим именем (repository вместо repo), это будет вторая независимая зависимость, а параметр repo получит версию с верхнего слоя."
    tags: [litestar]
  - id: litestar-di-07
    front: "Когда фабрику зависимости делают async, а когда sync?"
    back: "async - для настоящего I/O (поход в базу, HTTP-запрос), где внутри есть await. sync - для готового значения или чистого вычисления. Объявлять async «для единообразия» без единого await смысла не имеет - как и с хендлерами."
    tags: [litestar]
  - id: litestar-di-08
    front: "Что делает use_cache=True у Provide?"
    back: "Кэширует результат фабрики на всё приложение и переиспользует его вместо вызова заново на каждый запрос. Уместно для дорогих, но неизменных значений: разобранный конфиг, справочник, подключение к пулу."
    tags: [litestar]
  - id: litestar-di-09
    front: "Почему use_cache опасен для запросозависимых значений?"
    back: "Кэш живёт на всё приложение, а не на запрос. Закэшировав «текущего пользователя» или «открытую транзакцию», вы покажете значение из первого вызова всем запросам - один пользователь получит данные другого, транзакции перепутаются."
    tags: [litestar]
  - id: litestar-di-10
    front: "Как одна зависимость может зависеть от другой?"
    back: "Её фабрика объявляет в своей сигнатуре параметр с именем другой зависимости, и фреймворк разрешает цепочку снизу вверх. Например get_repo(session) зависит от get_session(engine): фреймворк создаёт engine, потом session, потом repo."
    tags: [litestar]
  - id: litestar-di-11
    front: "Как DI связан с тестируемостью хендлера?"
    back: "Когда ресурс приходит через Provide, тест собирает мини-приложение и регистрирует под тем же ключом фабрику, возвращающую фейк - хендлер работает с подделкой, не зная об этом. Если же хендлер создаёт соединение сам, изолировать его нельзя."
    tags: [litestar]
  - id: litestar-di-12
    front: "Почему переименование параметра хендлера может тихо сломать DI?"
    back: "Связывание идёт по имени, а не по типу. Переименование параметра (db → database) разрывает связь с зависимостью db: фреймворк больше не находит ключ под новым именем, и никакой тип это не спасёт."
    tags: [litestar]
