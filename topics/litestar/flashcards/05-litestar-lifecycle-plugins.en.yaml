conceptId: litestar-lifecycle-plugins
cards:
  - id: litestar-lifecycle-plugins-01
    front: "In what order do the layers around a handler fire on the way in?"
    back: "middleware (ASGI wrapper) -> guard (permissions) -> before_request (rewrite) -> handler -> after_request -> after_response. On the way out the order reverses: a request passes through concentric layers, like customs."
    tags: [litestar]
  - id: litestar-lifecycle-plugins-02
    front: "What is middleware in Litestar, and at what level does it work?"
    back: "The outermost layer, wrapping the whole ASGI call. It receives the scope, receive, send triple and must call self.app(...) - the nested layer. It works with raw ASGI events without knowing about a specific handler: logging, timing, CORS, compression."
    tags: [litestar]
  - id: litestar-lifecycle-plugins-03
    front: "What's the guard contract in Litestar?"
    back: "A guard is a callable(connection, handler) that returns nothing on approval and raises an exception on rejection: NotAuthorizedException (no authentication) or PermissionDeniedException (insufficient permissions). It fires BEFORE the handler."
    tags: [litestar]
  - id: litestar-lifecycle-plugins-04
    front: "Why won't a guard that returns False on rejection deny anything?"
    back: "The guard contract is \"stay silent on success, raise on rejection,\" not \"return True/False.\" No exception is treated as approval, so with return False the handler still runs. Rejection is expressed only through an exception."
    tags: [litestar]
  - id: litestar-lifecycle-plugins-05
    front: "Why put authorization in a guard instead of the handler's first line?"
    back: "It separates \"is this allowed at all\" (guard) from \"what to do here\" (handler), and removes duplication and the risk of forgetting the check. Guards, like dependencies and paths, attach to any layer - app, controller, or a single handler."
    tags: [litestar]
  - id: litestar-lifecycle-plugins-06
    front: "How do before_request, after_request, and after_response differ?"
    back: "before_request runs after the request is parsed but before the handler, and if it returns something, that becomes the response (the handler never runs). after_request edits the handler's response before it's sent. after_response fires after the response has already reached the client."
    tags: [litestar]
  - id: litestar-lifecycle-plugins-07
    front: "Where do you put heavy optional work - after_request or after_response?"
    back: "In after_response: it runs after the response has left for the client and doesn't stretch response time (background logging, metrics, an analytics event). after_request can still affect the response, so it holds up the client."
    tags: [litestar]
  - id: litestar-lifecycle-plugins-08
    front: "Why is lifespan needed, and how is it built?"
    back: "lifespan is an async context manager for resources with an open/close lifecycle (a connection pool). Code before yield runs once at app startup, code after yield runs on shutdown. That way the pool lives for the app's whole run instead of being recreated per request."
    tags: [litestar]
  - id: litestar-lifecycle-plugins-09
    front: "When do you use lifespan, and when a use_cache dependency?"
    back: "lifespan - for resources with explicit open and close (a pool, a connection) that need proper teardown. use_cache - for pure values with nothing to release (parsed config). A resource that needs closing belongs in lifespan, not in a cache."
    tags: [litestar]
  - id: litestar-lifecycle-plugins-10
    front: "What do plugins do in Litestar?"
    back: "A plugin is a ready-made piece of the lifecycle you wire in with one line. For example, the SQLAlchemy plugin opens the engine and session at startup itself, hands out the session via DI, and closes everything on shutdown, sparing you a manual lifespan for the database."
    tags: [litestar]
  - id: litestar-lifecycle-plugins-11
    front: "What do exception handlers do?"
    back: "They centrally turn an exception into an HTTP response: you map an exception type (or status code) to a function that builds the response. The handler just raises a domain exception (OrderNotFound), and the exception handler decides what it looks like to the client (404)."
    tags: [litestar]
  - id: litestar-lifecycle-plugins-12
    front: "How does a guard differ from before_request in its ability to return a response?"
    back: "before_request can return a ready response and replace the handler. A guard can't: its outcome is either silence (let it through) or an exception (reject). For \"return a special response instead of the handler\" logic, you need before_request, not a guard."
    tags: [litestar]
  - id: litestar-lifecycle-plugins-13
    front: "Why is editing a header in after_response doomed?"
    back: "after_response fires after the response has already reached the client, and it can't be changed anymore. For editing the response there's after_request (runs before sending). Mixing them up means writing code that does nothing."
    tags: [litestar]
