conceptId: litestar-dto-validation
cards:
  - id: litestar-dto-validation-01
    front: "What's the difference between a model and a DTO in Litestar?"
    back: "A model (msgspec.Struct by default) describes the object's full shape - all its fields and types. A DTO is a filter on top of the model, deciding which fields cross the app's boundary in a given direction. A DTO doesn't create a new structure."
    tags: [litestar]
  - id: litestar-dto-validation-02
    front: "How does Litestar parse a request body into an object?"
    back: "Via a parameter named data with a model type: data: Model in the signature gives you a ready validated object, no manual request.json(). The name data is Litestar's convention for the body, like self for a method."
    tags: [litestar]
  - id: litestar-dto-validation-03
    front: "What happens if you put the body in a parameter with an arbitrary name (payload instead of data)?"
    back: "It won't bind to the request body the way data does. The name data is Litestar's fixed convention for the body; any other name gets interpreted differently by the framework (as path/query)."
    tags: [litestar]
  - id: litestar-dto-validation-04
    front: "How do you declare a model via msgspec.Struct?"
    back: "By subclassing msgspec.Struct; fields are annotated class attributes, and a default value makes a field optional. It looks like a dataclass, but msgspec also validates types while parsing JSON and encodes back quickly."
    tags: [litestar]
  - id: litestar-dto-validation-05
    front: "What do exclude, include, and rename_fields do in DTOConfig?"
    back: "exclude drops the listed fields; include keeps only the listed ones (dropping everything else); rename_fields changes a field's external name without touching the internal one. include and exclude are mutually exclusive - use one or the other."
    tags: [litestar]
  - id: litestar-dto-validation-06
    front: "When do you pick include, and when exclude?"
    back: "include - when only a small slice of a large model goes out (listing what's allowed is shorter and safer: a new model field won't leak on its own). exclude - when you only need to hide one or two fields out of many."
    tags: [litestar]
  - id: litestar-dto-validation-07
    front: "How does dto differ from return_dto on a handler decorator?"
    back: "dto filters the input (parsing the request body), return_dto filters the output (serializing the response). To hide password_hash in the response you need return_dto; hanging that filter on dto only protects the input, and the password still reaches the client."
    tags: [litestar]
  - id: litestar-dto-validation-08
    front: "Why can't you hide password_hash by removing it from the model itself?"
    back: "Removing the field from the model would break business logic that needs it (password checks). The field has to live on the model; hiding it on the way out is return_dto's job, not trimming the model."
    tags: [litestar]
  - id: litestar-dto-validation-09
    front: "Why exclude server-owned fields (id, created_at) in the input DTO?"
    back: "Without an input DTO that excludes id/created_at, a client could send those fields and overwrite what the server is supposed to set (e.g. the registration timestamp). Server-owned fields are excluded specifically in the input dto."
    tags: [litestar]
  - id: litestar-dto-validation-10
    front: "What does the framework return for an invalid request body?"
    back: "It never calls the handler and returns a response itself (400 Bad Request for most client errors, 422 Unprocessable Entity for a semantically incorrect body) naming the offending field. Only a valid object ever reaches the handler."
    tags: [litestar]
  - id: litestar-dto-validation-11
    front: "Why do you need DTOData[Model] and partial=True?"
    back: "DTOData gives you the client-sent fields as-is, without requiring every mandatory model field; partial=True makes every field optional. That's exactly what a partial update (PATCH) needs; as_builtins() returns the fields as a dict."
    tags: [litestar]
  - id: litestar-dto-validation-12
    front: "Why is a typo in exclude={\"pasword_hash\"} dangerous?"
    back: "include/exclude work by field name, not by presence: a typo won't raise a \"no such field\" error, the filter just excludes nothing, and the hash leaks into the response. Names in a DTO config are \"magic strings\" that easily drift out of sync with the model."
    tags: [litestar]
  - id: litestar-dto-validation-13
    front: "Why is a DTO better than manually filtering fields (del data[...]) in the handler?"
    back: "A DTO defines a filter once and applies it to every handler; Litestar generates an OpenAPI schema from it (docs never see a manual del); DTOs also work on input. It's a declarative, documented, bidirectional boundary contract."
    tags: [litestar]
