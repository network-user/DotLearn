conceptId: litestar-routing
cards:
  - id: litestar-routing-01
    front: "Как вычислить итоговый путь хендлера в Litestar?"
    back: "Это конкатенация кусков пути всех слоёв над ним (app → router → controller → handler) сверху вниз в порядке вложенности. Кусок одного слоя сам по себе ничего не значит; адрес возникает из всей цепочки."
    tags: [litestar]
  - id: litestar-routing-02
    front: "Router с path=\"/api\", контроллер с path=\"/users\", метод @get(\"/{user_id:int}\") - какой адрес?"
    back: "/api/users/{user_id}. Слои склеиваются сверху вниз: префикс роутера, затем контроллера, затем путь самого метода."
    tags: [litestar]
  - id: litestar-routing-03
    front: "Чем декораторы методов в Litestar отличаются от FastAPI?"
    back: "В Litestar для каждого HTTP-метода свой импортируемый декоратор: @get, @post, @put, @delete, @patch. В FastAPI метод - это имя метода у объекта приложения (@app.get, @app.post)."
    tags: [litestar]
  - id: litestar-routing-04
    front: "Где в Litestar указывают тип path-параметра?"
    back: "В самом шаблоне пути: @get(\"/items/{item_id:int}\"), а не только в аннотации функции. В FastAPI тип живёт лишь в аннотации, а в шаблоне стоит голое {item_id}."
    tags: [litestar]
  - id: litestar-routing-05
    front: "Какую двойную роль играет :int в шаблоне пути?"
    back: "Роутер использует его, чтобы маршрут вообще совпал (на /items/abc он не сработает - сегмент не число), а затем приводит значение к типу int. Поддерживаются также str, float, uuid, path и другие."
    tags: [litestar]
  - id: litestar-routing-06
    front: "Как Litestar определяет query-параметр?"
    back: "Если параметр функции не упомянут в пути и имеет примитивный тип, он берётся из query string - как и в FastAPI. Значение по умолчанию делает его необязательным."
    tags: [litestar]
  - id: litestar-routing-07
    front: "Как тонко настроить query-параметр (границы, имя, описание)?"
    back: "Через Annotated[int, Parameter(...)] из litestar.params. Например Parameter(ge=1, le=100) ограничивает диапазон, и запрос за пределами получит ошибку валидации. Идея как у Query(...) в FastAPI."
    tags: [litestar]
  - id: litestar-routing-08
    front: "Чем Router отличается от Controller для группировки хендлеров?"
    back: "Router - контейнер с path и списком хендлеров-функций (они остаются отдельными функциями). Controller - класс с атрибутом path, чьи методы (@get/@post с self) объединены в один класс с общими настройками."
    tags: [litestar]
  - id: litestar-routing-09
    front: "Когда выбирать Controller, а когда Router?"
    back: "Для CRUD над одним ресурсом контроллер обычно читается лучше: связывает операции и общие зависимости/guards в одном классе. Для разнородного набора путей хватает роутера. В FastAPI прямого аналога контроллера нет."
    tags: [litestar]
  - id: litestar-routing-10
    front: "Как :int в шаблоне меняет исход для нечислового сегмента?"
    back: "С :int роутер вообще не сопоставит маршрут для нечислового сегмента - запрос уйдёт в 404. Без :int сегмент совпадёт с любой строкой, и приведение к int произойдёт уже по аннотации (давая ошибку валидации). Это разные исходы для клиента."
    tags: [litestar]
  - id: litestar-routing-11
    front: "Частая ошибка: чтение пути только по декоратору хендлера"
    back: "Метод @get(\"/orders\") внутри контроллера с path=\"/users/{user_id:int}\" реально отвечает на /users/{user_id}/orders, а не на /orders. Всегда склеивайте слои сверху вниз, прежде чем делать вывод об URL."
    tags: [litestar]
  - id: litestar-routing-12
    front: "Зачем разрезать путь по слоям, а не писать его целиком?"
    back: "Это принцип «не повторяйся» для адресов: версионирование (/api/v1 → /api/v2) и перенос группы меняют одну строку на слое, а не каждый хендлер. Общие настройки группы тоже живут на слое. Цена - надо держать иерархию в голове при чтении."
    tags: [litestar]
