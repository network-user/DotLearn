conceptId: litestar-dto-validation
cards:
  - id: litestar-dto-validation-01
    front: "В чём разница между моделью и DTO в Litestar?"
    back: "Модель (по умолчанию msgspec.Struct) описывает полную форму объекта - все его поля и типы. DTO - это фильтр поверх модели, решающий, какие поля пропустить через границу приложения в конкретном направлении. DTO не создаёт новую структуру."
    tags: [litestar]
  - id: litestar-dto-validation-02
    front: "Как Litestar разбирает тело запроса в объект?"
    back: "Через параметр с именем data и типом-моделью: data: Model в сигнатуре даёт готовый провалидированный объект, без ручного request.json(). Имя data - соглашение Litestar для тела, как self для метода."
    tags: [litestar]
  - id: litestar-dto-validation-03
    front: "Что произойдёт, если положить тело в параметр с произвольным именем (payload вместо data)?"
    back: "Он не будет связан с телом запроса так, как data. Имя data - фиксированное соглашение Litestar для тела; другое имя фреймворк истолкует иначе (как path/query)."
    tags: [litestar]
  - id: litestar-dto-validation-04
    front: "Как объявляют модель через msgspec.Struct?"
    back: "Наследованием от msgspec.Struct; поля - аннотированные атрибуты класса, а значение по умолчанию делает поле необязательным. По форме похоже на датакласс, но msgspec ещё валидирует типы при разборе JSON и быстро кодирует обратно."
    tags: [litestar]
  - id: litestar-dto-validation-05
    front: "Что делают exclude, include и rename_fields в DTOConfig?"
    back: "exclude убирает перечисленные поля; include оставляет только перечисленные (всё остальное убирает); rename_fields меняет внешнее имя поля, не трогая внутреннее. include и exclude взаимоисключающи - используйте один из них."
    tags: [litestar]
  - id: litestar-dto-validation-06
    front: "Когда выбирать include, а когда exclude?"
    back: "include - когда наружу идёт малая часть большой модели (перечислить разрешённое короче и безопаснее: новое поле модели не утечёт само). exclude - когда скрыть нужно одно-два поля из многих."
    tags: [litestar]
  - id: litestar-dto-validation-07
    front: "Чем dto отличается от return_dto в декораторе хендлера?"
    back: "dto фильтрует вход (разбор тела запроса), return_dto - выход (сериализацию ответа). Чтобы скрыть password_hash в ответе, нужен return_dto; повесив этот фильтр на dto, вы защитите вход, но пароль всё равно уйдёт клиенту."
    tags: [litestar]
  - id: litestar-dto-validation-08
    front: "Почему нельзя прятать password_hash, убрав его из самой модели?"
    back: "Если убрать поле из модели, с ним не сможет работать бизнес-логика (проверка пароля). Поле должно жить в модели, а прятать его на выходе - задача return_dto, а не урезание модели."
    tags: [litestar]
  - id: litestar-dto-validation-09
    front: "Зачем исключать серверные поля (id, created_at) во входном DTO?"
    back: "Без входного DTO, исключающего id/created_at, клиент может прислать эти поля и переписать то, что должен ставить сервер (например момент регистрации). Серверные поля исключают именно во входном dto."
    tags: [litestar]
  - id: litestar-dto-validation-10
    front: "Что отдаёт фреймворк при невалидном теле запроса?"
    back: "Он не вызывает хендлер и сам возвращает ответ (400 Bad Request для большинства ошибок клиента, 422 Unprocessable Entity для семантически некорректного тела) с указанием проблемного поля. До хендлера доходит только валидный объект."
    tags: [litestar]
  - id: litestar-dto-validation-11
    front: "Зачем нужен DTOData[Model] и partial=True?"
    back: "DTOData даёт присланные клиентом поля как есть, не требуя все обязательные поля модели; partial=True делает все поля необязательными. Это именно то, что нужно для частичного обновления (PATCH); as_builtins() вернёт поля словарём."
    tags: [litestar]
  - id: litestar-dto-validation-12
    front: "Почему опечатка в exclude={\"pasword_hash\"} опасна?"
    back: "include/exclude работают по именам полей, а не по их наличию: опечатка не вызовет ошибку «такого поля нет», фильтр просто ничего не исключит, и хэш утечёт в ответ. Имена в DTO-конфиге - «магические строки», легко рассинхронизируемые с моделью."
    tags: [litestar]
  - id: litestar-dto-validation-13
    front: "Почему DTO лучше ручной фильтрации полей (del data[...]) в хендлере?"
    back: "DTO задаёт фильтр один раз и применяет ко всем хендлерам; Litestar генерирует из него OpenAPI-схему (ручной del документация не видит); DTO работают и на входе. Это декларативный, документируемый и двунаправленный контракт границы."
    tags: [litestar]
