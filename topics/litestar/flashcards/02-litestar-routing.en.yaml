conceptId: litestar-routing
cards:
  - id: litestar-routing-01
    front: "How do you compute a handler's final path in Litestar?"
    back: "It's the concatenation of the path pieces from every layer above it (app -> router -> controller -> handler), top to bottom in nesting order. One layer's piece means nothing on its own; the address emerges from the whole chain."
    tags: [litestar]
  - id: litestar-routing-02
    front: "Router with path=\"/api\", a controller with path=\"/users\", a method @get(\"/{user_id:int}\") - what's the address?"
    back: "/api/users/{user_id}. Layers concatenate top to bottom: the router's prefix, then the controller's, then the method's own path."
    tags: [litestar]
  - id: litestar-routing-03
    front: "How do method decorators in Litestar differ from FastAPI?"
    back: "In Litestar each HTTP method has its own importable decorator: @get, @post, @put, @delete, @patch. In FastAPI the method is a method name on the app object (@app.get, @app.post)."
    tags: [litestar]
  - id: litestar-routing-04
    front: "Where do you specify a path parameter's type in Litestar?"
    back: "Right in the path template: @get(\"/items/{item_id:int}\"), not only in the function annotation. In FastAPI the type lives only in the annotation, and the template holds a bare {item_id}."
    tags: [litestar]
  - id: litestar-routing-05
    front: "What dual role does :int play in a path template?"
    back: "The router uses it so the route matches at all (on /items/abc it won't fire - the segment isn't a number), and then it casts the value to int. str, float, uuid, path, and others are also supported."
    tags: [litestar]
  - id: litestar-routing-06
    front: "How does Litestar identify a query parameter?"
    back: "If a function parameter isn't mentioned in the path and has a primitive type, it's pulled from the query string - just like FastAPI. A default value makes it optional."
    tags: [litestar]
  - id: litestar-routing-07
    front: "How do you fine-tune a query parameter (bounds, name, description)?"
    back: "Via Annotated[int, Parameter(...)] from litestar.params. For example, Parameter(ge=1, le=100) bounds the range, and a request outside it gets a validation error. Same idea as Query(...) in FastAPI."
    tags: [litestar]
  - id: litestar-routing-08
    front: "How does Router differ from Controller for grouping handlers?"
    back: "Router is a container with a path and a list of function handlers (they stay separate functions). Controller is a class with a path attribute, whose methods (@get/@post with self) are combined into one class with shared settings."
    tags: [litestar]
  - id: litestar-routing-09
    front: "When do you pick Controller, and when Router?"
    back: "For CRUD over a single resource, a controller usually reads better: it ties operations and shared dependencies/guards together in one class. For a mixed bag of paths, a router is enough. FastAPI has no direct equivalent to a controller."
    tags: [litestar]
  - id: litestar-routing-10
    front: "How does :int in the template change the outcome for a non-numeric segment?"
    back: "With :int the router won't match the route at all for a non-numeric segment - the request falls through to 404. Without :int the segment matches any string, and the cast to int happens via the annotation (yielding a validation error). These are different outcomes for the client."
    tags: [litestar]
  - id: litestar-routing-11
    front: "A common mistake: reading the path from just the handler's decorator"
    back: "A method @get(\"/orders\") inside a controller with path=\"/users/{user_id:int}\" actually answers to /users/{user_id}/orders, not /orders. Always concatenate the layers top to bottom before drawing conclusions about the URL."
    tags: [litestar]
  - id: litestar-routing-12
    front: "Why split a path across layers instead of writing it out in full?"
    back: "It's a \"don't repeat yourself\" principle for addresses: versioning (/api/v1 -> /api/v2) and moving a group change one string on a layer instead of every handler. A group's shared settings also live on the layer. The cost: you have to keep the hierarchy in mind when reading."
    tags: [litestar]
