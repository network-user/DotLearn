conceptId: litestar-lifecycle-plugins
cards:
  - id: litestar-lifecycle-plugins-01
    front: "В каком порядке срабатывают слои вокруг хендлера на входе запроса?"
    back: "middleware (обёртка ASGI) → guard (права) → before_request (правка) → handler → after_request → after_response. На выходе порядок обратный: запрос проходит сквозь концентрические слои, как через таможню."
    tags: [litestar]
  - id: litestar-lifecycle-plugins-02
    front: "Что такое middleware в Litestar и на каком уровне оно работает?"
    back: "Самый внешний слой, оборачивающий весь ASGI-вызов. Получает тройку scope, receive, send и обязан позвать self.app(...) - вложенный слой. Работает с сырыми ASGI-событиями, не зная про конкретный хендлер: логирование, замер времени, CORS, сжатие."
    tags: [litestar]
  - id: litestar-lifecycle-plugins-03
    front: "Каков контракт guard в Litestar?"
    back: "Guard - это callable(connection, handler), который ничего не возвращает при разрешении и бросает исключение при отказе: NotAuthorizedException (нет аутентификации) или PermissionDeniedException (прав не хватает). Он срабатывает ДО хендлера."
    tags: [litestar]
  - id: litestar-lifecycle-plugins-04
    front: "Почему guard, возвращающий False при отказе, ничего не запретит?"
    back: "Контракт guard - «молчит при успехе, бросает при отказе», а не «возвращает True/False». Отсутствие исключения трактуется как разрешение, поэтому при return False хендлер всё равно выполнится. Отказ выражается только исключением."
    tags: [litestar]
  - id: litestar-lifecycle-plugins-05
    front: "Почему авторизацию выносят в guard, а не пишут первой строкой хендлера?"
    back: "Это разделяет «можно ли сюда» (guard) и «что здесь делать» (хендлер) и убирает дублирование и риск забыть проверку. Guards, как зависимости и пути, вешают на любой слой - на app, контроллер или один хендлер."
    tags: [litestar]
  - id: litestar-lifecycle-plugins-06
    front: "Чем отличаются before_request, after_request и after_response?"
    back: "before_request вызывается после разбора запроса до хендлера и, если что-то вернёт, станет ответом (хендлер не вызовется). after_request правит ответ хендлера до отправки. after_response срабатывает уже после отправки ответа клиенту."
    tags: [litestar]
  - id: litestar-lifecycle-plugins-07
    front: "Куда класть тяжёлую необязательную работу - в after_request или after_response?"
    back: "В after_response: он выполняется после того, как ответ ушёл клиенту, и не растягивает время ответа (фоновое логирование, метрики, событие в аналитику). after_request ещё может повлиять на ответ, поэтому держит клиента."
    tags: [litestar]
  - id: litestar-lifecycle-plugins-08
    front: "Зачем нужен lifespan и как он устроен?"
    back: "lifespan - асинхронный контекст-менеджер для ресурсов с открытием/закрытием (пул соединений). Код до yield выполняется один раз на старте приложения, код после yield - на остановке. Так пул живёт всё время работы, а не пересоздаётся на запрос."
    tags: [litestar]
  - id: litestar-lifecycle-plugins-09
    front: "Когда использовать lifespan, а когда use_cache зависимости?"
    back: "lifespan - для ресурсов с явным открытием и закрытием (пул, соединение), которые надо корректно завершить. use_cache - для чистых значений без освобождения (разобранный конфиг). Ресурс, который нужно закрывать, живёт в lifespan, а не в кэше."
    tags: [litestar]
  - id: litestar-lifecycle-plugins-10
    front: "Что делают плагины в Litestar?"
    back: "Плагин - готовый кусок жизненного цикла, который подключают одной строкой. Например плагин SQLAlchemy сам открывает движок и сессию на старте, отдаёт сессию через DI и закрывает всё на остановке, избавляя от ручного lifespan для базы."
    tags: [litestar]
  - id: litestar-lifecycle-plugins-11
    front: "Что делают exception handlers?"
    back: "Они централизованно превращают исключение в HTTP-ответ: вы сопоставляете тип исключения (или код статуса) с функцией, строящей ответ. Хендлер просто бросает доменное исключение (OrderNotFound), а как оно выглядит для клиента (404), решает обработчик."
    tags: [litestar]
  - id: litestar-lifecycle-plugins-12
    front: "Чем guard отличается от before_request по возможности вернуть ответ?"
    back: "before_request может вернуть готовый ответ и подменить хендлер. Guard так не делает: его исход - либо тишина (пускаем), либо исключение (отказ). Для логики «вернуть особый ответ вместо хендлера» нужен before_request, а не guard."
    tags: [litestar]
  - id: litestar-lifecycle-plugins-13
    front: "Почему правка заголовка в after_response обречена?"
    back: "after_response срабатывает уже после того, как ответ ушёл клиенту, и изменить его нельзя. Для правки ответа есть after_request (выполняется до отправки). Перепутать их - значит написать код, который ничего не делает."
    tags: [litestar]
