conceptId: litestar-overview
cards:
  - id: litestar-overview-01
    front: "What do Litestar and FastAPI share at the deployment level?"
    back: "Both are ASGI frameworks: they run under the same server (uvicorn module:app), sit behind the same kind of proxy, and solve the same problems. On a small service the code barely differs."
    tags: [litestar]
  - id: litestar-overview-02
    front: "How is a handler declared and registered in Litestar?"
    back: "A handler is marked with a standalone decorator (@get, @post) with no link to app, then explicitly passed into Litestar(route_handlers=[...]). The decorator itself tells the app nothing."
    tags: [litestar]
  - id: litestar-overview-03
    front: "What's the layered architecture of a Litestar app?"
    back: "Four layers top to bottom: app (Litestar) -> router (Router) -> controller (Controller) -> handler. Each layer can add a path prefix, dependencies, guards, and settings, and lower layers inherit them."
    tags: [litestar]
  - id: litestar-overview-04
    front: "Three real bets Litestar makes that set it apart from FastAPI"
    back: "Serialization on msgspec instead of Pydantic by default; DI via Provide at any layer; built-in DTOs and a plugin system. These are different models, not \"better/worse.\""
    tags: [litestar]
  - id: litestar-overview-05
    front: "What's the point of msgspec compared to Pydantic in Litestar?"
    back: "msgspec is a serialization and validation library built for speed; you declare a model as a msgspec.Struct. It's noticeably faster at parsing and encoding JSON, but it's only the default - Pydantic, dataclasses, and TypedDict are supported too."
    tags: [litestar]
  - id: litestar-overview-06
    front: "Why is \"Litestar is faster than FastAPI\" a claim with a caveat?"
    back: "msgspec's edge is real on serialization and in microbenchmarks, but on a typical I/O-bound service the bottleneck is the database or the network, not the serializer. Picking a framework on that basis alone isn't sound."
    tags: [litestar]
  - id: litestar-overview-07
    front: "Does an async def handler with no await make it faster?"
    back: "No. An async def handler with not a single await inside runs on the event loop thread with no switching, just like a regular function. Async only pays off when there's real I/O to wait on - same as in FastAPI."
    tags: [litestar]
  - id: litestar-overview-08
    front: "How is msgspec stricter than Pydantic about type coercion?"
    back: "By default msgspec won't silently turn the string \"42\" into the integer 42 for an int field as readily as Pydantic does in lax mode. It's a deliberate choice favoring strictness, which surprises people coming from Pydantic v1."
    tags: [litestar]
  - id: litestar-overview-09
    front: "Where does the name Litestar come from, and what's Starlite got to do with it?"
    back: "The project used to be called Starlite and was renamed Litestar in 2023. Older articles and packages under the name starlite are the same project pre-rename; when searching docs, stick to recent material under the Litestar name."
    tags: [litestar]
  - id: litestar-overview-10
    front: "What happens to a @get handler that's never passed to route_handlers?"
    back: "It simply never registers (directly or via a router/controller), and its path returns 404. Unlike FastAPI's @app.get, the decorator itself tells the app nothing."
    tags: [litestar]
  - id: litestar-overview-11
    front: "Where are Litestar and FastAPI practically the same?"
    back: "Both build OpenAPI docs from annotations, determine a parameter's source (path/query/body) from the signature, support sync and async handlers, and return clear validation errors naming the field."
    tags: [litestar]
  - id: litestar-overview-12
    front: "What is ASGI, and why is it the common denominator for these frameworks?"
    back: "ASGI (Asynchronous Server Gateway Interface) is a contract between an async web server and a Python app: the app accepts scope, receive, send. FastAPI, Litestar, and Starlette all implement it, so they're interchangeable at the run/deploy level."
    tags: [litestar]
