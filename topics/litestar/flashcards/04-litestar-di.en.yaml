conceptId: litestar-di
cards:
  - id: litestar-di-01
    front: "What problem does dependency injection (DI) solve?"
    back: "A handler doesn't acquire a resource itself (connection, repository) - it declares in its signature that it needs a parameter, and the framework creates and passes it in. This removes duplicated initialization and makes the resource swappable in tests."
    tags: [litestar]
  - id: litestar-di-02
    front: "How does DI bind a dependency to a handler in Litestar?"
    back: "By name match: the key in the dependencies dict must match the handler parameter's name. Provide(factory) wraps the factory. The link is by name, not by type."
    tags: [litestar]
  - id: litestar-di-03
    front: "How does registering a dependency in Litestar differ from FastAPI?"
    back: "In FastAPI a dependency is injected via Depends(get_db) as a parameter's default value. In Litestar the factory is registered in the dependencies dict under a key, and the handler parameter picks it up by matching that key against its own name."
    tags: [litestar]
  - id: litestar-di-04
    front: "At which layers do you declare dependencies, and who can see them?"
    back: "At any of the four layers (app/router/controller/handler) - just like path prefixes. A dependency declared on a layer is visible to that layer and everything nested in it; a sibling controller without it won't see it."
    tags: [litestar]
  - id: litestar-di-05
    front: "What happens with the same dependency name on different layers?"
    back: "The lower layer (closest to the handler) fully overrides the higher one - it doesn't extend it, it entirely replaces its factory for its subtree. This lets you set a default at app level and swap it at the controller or handler."
    tags: [litestar]
  - id: litestar-di-06
    front: "Why might overriding a dependency \"not work\"?"
    back: "Overriding only kicks in on an exact key-name match. Declare a dependency under a slightly different name (repository instead of repo) and it becomes a second, independent dependency, while the repo parameter still gets the version from the layer above."
    tags: [litestar]
  - id: litestar-di-07
    front: "When is a dependency factory made async, and when sync?"
    back: "async - for real I/O (hitting a database, an HTTP call) where there's an await inside. sync - for a ready value or a pure computation. Declaring async \"for consistency\" with no await inside is pointless - same as with handlers."
    tags: [litestar]
  - id: litestar-di-08
    front: "What does use_cache=True on Provide do?"
    back: "It caches the factory's result for the whole application and reuses it instead of calling the factory again per request. That's fitting for expensive but unchanging values: parsed config, a lookup table, a pool connection."
    tags: [litestar]
  - id: litestar-di-09
    front: "Why is use_cache dangerous for request-dependent values?"
    back: "The cache lives for the whole app, not per request. Cache the \"current user\" or an \"open transaction\" and you'll show every request the value from the first call - one user gets another's data, transactions get mixed up."
    tags: [litestar]
  - id: litestar-di-10
    front: "How can one dependency depend on another?"
    back: "Its factory declares, in its own signature, a parameter named after another dependency, and the framework resolves the chain bottom-up. E.g. get_repo(session) depends on get_session(engine): the framework builds engine, then session, then repo."
    tags: [litestar]
  - id: litestar-di-11
    front: "How is DI tied to a handler's testability?"
    back: "When a resource arrives through Provide, a test assembles a mini app and registers, under the same key, a factory that returns a fake - the handler works with the fake without knowing it. If the handler creates the connection itself, you can't isolate it."
    tags: [litestar]
  - id: litestar-di-12
    front: "Why can renaming a handler parameter quietly break DI?"
    back: "Binding is by name, not by type. Renaming a parameter (db -> database) breaks the link to the db dependency: the framework no longer finds the key under the new name, and no type annotation saves it."
    tags: [litestar]
