exercises:
  - id: comp-leftmost-quiz
    concept: composite-covering
    type: theory-quiz
    difficulty: 1
    prompt: "There is a composite index orders(user_id, status). For which query is it useless under the leftmost prefix rule?"
    choices:
      - id: a
        text: "WHERE status = 'paid'."
      - id: b
        text: "WHERE user_id = 10 AND status = 'paid'."
      - id: c
        text: "WHERE user_id = 10."
      - id: d
        text: "WHERE user_id = 10 AND status = 'cancelled'."
    correct: [a]
    explanation: "The index is sorted first by user_id, then by status. Without a condition on user_id, status values are scattered across the whole index, so there is no contiguous range. An index only works via a leftmost prefix of its columns."
    variants:
      - prompt: "Index orders(user_id, created_at). Which filter will the index NOT speed up?"
        choices:
          - id: a
            text: "WHERE created_at >= '2024-03-01'."
          - id: b
            text: "WHERE user_id = 12."
          - id: c
            text: "WHERE user_id = 12 AND created_at >= '2024-03-01'."
          - id: d
            text: "WHERE user_id = 12 AND created_at < '2024-02-01'."
        correct: [a]
        explanation: "The index's leading column is user_id. A query with no condition on user_id does not land on the prefix, so the (user_id, created_at) index does not help it."
      - prompt: "Index orders(a, b, c) has three columns. Which queries does it serve under the leftmost prefix rule?"
        choices:
          - id: a
            text: "By a; by a and b; by a, b and c. Not by a lone b or c without a."
          - id: b
            text: "Any query on any of the columns a, b, c individually."
          - id: c
            text: "Only a query on all three columns a, b, c at once."
          - id: d
            text: "By c; by b and c; by a, b and c."
        correct: [a]
        explanation: "The index is a sort over the tuple (a, b, c). You can use any leftmost prefix: a, then b, then c. A column without its predecessors does not give a contiguous range."

  - id: comp-index-order-blanks
    concept: composite-covering
    type: fill-in-blanks
    difficulty: 2
    prompt: "A query filters WHERE user_id = ? AND created_at > ?. Fill in the composite index columns in the right order: equality on the left, range on the right."
    template: |
      CREATE INDEX idx_orders ON orders({{first}}, {{second}});
    blanks:
      first:
        accept: ['user_id']
      second:
        accept: ['created_at']
    variants:
      - prompt: "Query: WHERE status = ? AND amount > ?. Arrange the composite index columns: equality on the left, range on the right."
        template: |
          CREATE INDEX idx_orders ON orders({{first}}, {{second}});
        blanks:
          first:
            accept: ['status']
          second:
            accept: ['amount']
      - prompt: "Query: WHERE user_id = ? ORDER BY created_at. A composite index so both the filter on user_id and the order by created_at land on the index."
        template: |
          CREATE INDEX idx_orders ON orders({{first}}, {{second}});
        blanks:
          first:
            accept: ['user_id']
          second:
            accept: ['created_at']

  - id: comp-two-col-filter
    concept: composite-covering
    type: sql-query
    difficulty: 2
    prompt: "Return id and amount for paid orders (status = 'paid') of user user_id = 10, sorted by id ascending."
    fixture: |
      CREATE TABLE orders (id INTEGER PRIMARY KEY, user_id INTEGER, status TEXT, amount INTEGER, created_at TEXT);
      INSERT INTO orders VALUES
        (1, 10, 'paid', 1200, '2024-01-05'),
        (2, 10, 'paid', 800, '2024-01-20'),
        (3, 10, 'cancelled', 500, '2024-02-02'),
        (4, 11, 'paid', 2000, '2024-02-15'),
        (5, 11, 'pending', 300, '2024-02-28'),
        (6, 12, 'paid', 1500, '2024-03-04'),
        (7, 12, 'paid', 450, '2024-03-18'),
        (8, 12, 'cancelled', 900, '2024-03-25'),
        (9, 13, 'pending', 700, '2024-04-01'),
        (10, 13, 'paid', 1100, '2024-04-12');
    expected:
      kind: result-set
      ordered: true
      rows:
        - { id: 1, amount: 1200 }
        - { id: 2, amount: 800 }
    solution: |
      SELECT id, amount FROM orders
      WHERE user_id = 10 AND status = 'paid'
      ORDER BY id;
    variants:
      - prompt: "Return id and amount for paid orders (status = 'paid') of user user_id = 12, sorted by id ascending."
        expected:
          kind: result-set
          ordered: true
          rows:
            - { id: 6, amount: 1500 }
            - { id: 7, amount: 450 }
        solution: |
          SELECT id, amount FROM orders
          WHERE user_id = 12 AND status = 'paid'
          ORDER BY id;
      - prompt: "Return id and amount for paid orders (status = 'paid') of user user_id = 11, sorted by id ascending."
        expected:
          kind: result-set
          ordered: true
          rows:
            - { id: 4, amount: 2000 }
        solution: |
          SELECT id, amount FROM orders
          WHERE user_id = 11 AND status = 'paid'
          ORDER BY id;

  - id: comp-status-breakdown
    concept: composite-covering
    type: sql-query
    difficulty: 3
    prompt: "For user user_id = 10, return each of their order statuses and the count of orders with that status. Columns: status and cnt. Sort by status ascending."
    fixture: |
      CREATE TABLE orders (id INTEGER PRIMARY KEY, user_id INTEGER, status TEXT, amount INTEGER, created_at TEXT);
      INSERT INTO orders VALUES
        (1, 10, 'paid', 1200, '2024-01-05'),
        (2, 10, 'paid', 800, '2024-01-20'),
        (3, 10, 'cancelled', 500, '2024-02-02'),
        (4, 11, 'paid', 2000, '2024-02-15'),
        (5, 11, 'pending', 300, '2024-02-28'),
        (6, 12, 'paid', 1500, '2024-03-04'),
        (7, 12, 'paid', 450, '2024-03-18'),
        (8, 12, 'cancelled', 900, '2024-03-25'),
        (9, 13, 'pending', 700, '2024-04-01'),
        (10, 13, 'paid', 1100, '2024-04-12');
    expected:
      kind: result-set
      ordered: true
      rows:
        - { status: 'cancelled', cnt: 1 }
        - { status: 'paid', cnt: 2 }
    hints:
      - "This query is entirely closed by the (user_id, status) index: user_id jumps you to that user's block, and inside it statuses are already grouped in order. How many distinct statuses does user_id = 10 have?"
      - "Filter by user_id, group by status, count rows in each group with COUNT(*), and sort by status."
    solution: |
      SELECT status, COUNT(*) AS cnt FROM orders
      WHERE user_id = 10
      GROUP BY status
      ORDER BY status;

  - id: comp-covering-challenge
    concept: composite-covering
    type: sql-query
    difficulty: 4
    prompt: "Return users whose total revenue from paid orders (status = 'paid') is at least 2000. Columns: user_id and total. Sort by total descending, ties by user_id ascending."
    fixture: |
      CREATE TABLE orders (id INTEGER PRIMARY KEY, user_id INTEGER, status TEXT, amount INTEGER, created_at TEXT);
      INSERT INTO orders VALUES
        (1, 10, 'paid', 1200, '2024-01-05'),
        (2, 10, 'paid', 800, '2024-01-20'),
        (3, 10, 'cancelled', 500, '2024-02-02'),
        (4, 11, 'paid', 2000, '2024-02-15'),
        (5, 11, 'pending', 300, '2024-02-28'),
        (6, 12, 'paid', 1500, '2024-03-04'),
        (7, 12, 'paid', 450, '2024-03-18'),
        (8, 12, 'cancelled', 900, '2024-03-25'),
        (9, 13, 'pending', 700, '2024-04-01'),
        (10, 13, 'paid', 1100, '2024-04-12');
    expected:
      kind: result-set
      ordered: true
      rows:
        - { user_id: 10, total: 2000 }
        - { user_id: 11, total: 2000 }
    hints:
      - "First keep only paid rows, then collapse them per user. The threshold 2000 is a condition on the already-computed group sum, not on an individual row: where in the query does such a condition live?"
      - "You need all four clauses in sequence: a status filter before grouping, the grouping itself by user, a check of the threshold on the group's sum, and a sort on that sum with user as a tiebreaker. A composite index whose leading column matches the filter column, followed by the grouping column and the summed column, lets the engine walk it once and barely touch the table itself."
    solution: |
      SELECT user_id, SUM(amount) AS total FROM orders
      WHERE status = 'paid'
      GROUP BY user_id
      HAVING SUM(amount) >= 2000
      ORDER BY total DESC, user_id;
