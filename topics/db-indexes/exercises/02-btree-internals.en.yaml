exercises:
  - id: btree-height-quiz
    concept: btree-internals
    type: theory-quiz
    difficulty: 1
    prompt: "An index on a column in a 2-million-row table has a height of only 3 pages, not ~21 like binary search on an array. Why?"
    choices:
      - id: a
        text: "Each index page stores hundreds of keys, so descending one level narrows the search"
      - id: b
        text: "SQLite keeps the whole index in RAM, and search there is instant."
      - id: c
        text: "A B-tree's height is always three regardless of row count."
      - id: d
        text: "Table rows are physically stored sorted, so no tree is needed."
    correct: [a]
    explanation: "Height is the logarithm of the row count with a base equal to the number of keys per page (the fan-out). Fan-out in the hundreds turns millions of rows into 3-4 levels."
    variants:
      - prompt: "What happens to the B-tree's height when the table grows from 1 million to 1 billion rows (a thousandfold increase)?"
        choices:
          - id: a
            text: "Height grows by only one or two levels: it grows as a logarithm."
          - id: b
            text: "Height grows linearly, roughly a thousandfold."
          - id: c
            text: "Height doubles for every order of magnitude of row count."
          - id: d
            text: "The tree degenerates into a list, and search slows down to a full scan."
        correct: [a]
        explanation: "The logarithm of a thousandfold increase with hundreds of fan-out is about one extra level. So a search in a billion rows costs only slightly more than a search in a million."
      - prompt: "Why is a B-tree search O(log n) rather than O(1), like indexing into an array by position?"
        choices:
          - id: a
            text: "To find a row, the engine descends from the root to a leaf, comparing keys at"
          - id: b
            text: "Because a B-tree stores rows in random order."
          - id: c
            text: "Because every search scans all the tree's leaves left to right."
          - id: d
            text: "Because the index has to be rebuilt before every query."
        correct: [a]
        explanation: "A B-tree does not address a row directly by position. It walks from the root down, and the cost is the number of levels, i.e. the logarithm."

  - id: btree-range-query
    concept: btree-internals
    type: sql-query
    difficulty: 2
    prompt: "Return id and amount for orders with an amount from 500 to 1200 inclusive, sorted by amount ascending."
    fixture: |
      CREATE TABLE orders (id INTEGER PRIMARY KEY, user_id INTEGER, amount INTEGER, created_at TEXT);
      INSERT INTO orders VALUES
        (1, 10, 1200, '2024-01-05'),
        (2, 10, 800,  '2024-01-20'),
        (3, 11, 500,  '2024-02-02'),
        (4, 12, 2000, '2024-02-15'),
        (5, 12, 300,  '2024-02-28'),
        (6, 13, 1500, '2024-03-04'),
        (7, 13, 450,  '2024-03-18'),
        (8, 13, 900,  '2024-03-25'),
        (9, 14, 700,  '2024-04-01'),
        (10, 15, 1100, '2024-04-12');
    expected:
      kind: result-set
      ordered: true
      rows:
        - { id: 3, amount: 500 }
        - { id: 9, amount: 700 }
        - { id: 2, amount: 800 }
        - { id: 8, amount: 900 }
        - { id: 10, amount: 1100 }
        - { id: 1, amount: 1200 }
    solution: |
      SELECT id, amount FROM orders
      WHERE amount BETWEEN 500 AND 1200
      ORDER BY amount;
    variants:
      - prompt: "Return id and amount for orders with an amount from 900 to 2000 inclusive, sorted by amount ascending."
        expected:
          kind: result-set
          ordered: true
          rows:
            - { id: 8, amount: 900 }
            - { id: 10, amount: 1100 }
            - { id: 1, amount: 1200 }
            - { id: 6, amount: 1500 }
            - { id: 4, amount: 2000 }
        solution: |
          SELECT id, amount FROM orders
          WHERE amount BETWEEN 900 AND 2000
          ORDER BY amount;
      - prompt: "Return id and amount for orders with an amount from 300 to 700 inclusive, sorted by amount ascending."
        expected:
          kind: result-set
          ordered: true
          rows:
            - { id: 5, amount: 300 }
            - { id: 7, amount: 450 }
            - { id: 3, amount: 500 }
            - { id: 9, amount: 700 }
        solution: |
          SELECT id, amount FROM orders
          WHERE amount BETWEEN 300 AND 700
          ORDER BY amount;

  - id: btree-count-range
    concept: btree-internals
    type: predict-output
    difficulty: 2
    prompt: "A range scan over an index is also handy for counting. How many orders have an amount strictly greater than 1000?"
    fixture: |
      CREATE TABLE orders (id INTEGER PRIMARY KEY, user_id INTEGER, amount INTEGER, created_at TEXT);
      INSERT INTO orders VALUES
        (1, 10, 1200, '2024-01-05'),
        (2, 10, 800,  '2024-01-20'),
        (3, 11, 500,  '2024-02-02'),
        (4, 12, 2000, '2024-02-15'),
        (5, 12, 300,  '2024-02-28'),
        (6, 13, 1500, '2024-03-04'),
        (7, 13, 450,  '2024-03-18'),
        (8, 13, 900,  '2024-03-25'),
        (9, 14, 700,  '2024-04-01'),
        (10, 15, 1100, '2024-04-12');
    snippet: |
      SELECT COUNT(*) FROM orders WHERE amount > 1000;
    expected:
      kind: scalar
      value: 4
    variants:
      - prompt: "How many orders have an amount strictly less than 500?"
        snippet: |
          SELECT COUNT(*) FROM orders WHERE amount < 500;
        expected:
          kind: scalar
          value: 2
      - prompt: "How many orders have an amount from 700 to 1200 inclusive?"
        snippet: |
          SELECT COUNT(*) FROM orders WHERE amount BETWEEN 700 AND 1200;
        expected:
          kind: scalar
          value: 5

  - id: btree-topn-in-range
    concept: btree-internals
    type: sql-query
    difficulty: 3
    prompt: "Return the three most expensive orders placed in February-March 2024 (created_at from '2024-02-01' to '2024-03-31'). Return id and amount, sorted by amount descending."
    fixture: |
      CREATE TABLE orders (id INTEGER PRIMARY KEY, user_id INTEGER, amount INTEGER, created_at TEXT);
      INSERT INTO orders VALUES
        (1, 10, 1200, '2024-01-05'),
        (2, 10, 800,  '2024-01-20'),
        (3, 11, 500,  '2024-02-02'),
        (4, 12, 2000, '2024-02-15'),
        (5, 12, 300,  '2024-02-28'),
        (6, 13, 1500, '2024-03-04'),
        (7, 13, 450,  '2024-03-18'),
        (8, 13, 900,  '2024-03-25'),
        (9, 14, 700,  '2024-04-01'),
        (10, 15, 1100, '2024-04-12');
    expected:
      kind: result-set
      ordered: true
      rows:
        - { id: 4, amount: 2000 }
        - { id: 6, amount: 1500 }
        - { id: 8, amount: 900 }
    hints:
      - "An index on created_at lays the February and March rows out consecutively, as one continuous chunk of leaves. From that chunk you only need the largest amounts: how many rows actually make the answer?"
      - "Filter by the date range, sort by amount descending, and limit the output with LIMIT 3."
    solution: |
      SELECT id, amount FROM orders
      WHERE created_at BETWEEN '2024-02-01' AND '2024-03-31'
      ORDER BY amount DESC
      LIMIT 3;
