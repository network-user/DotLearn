exercises:
  - id: why-scan-vs-index
    concept: why-indexes
    type: theory-quiz
    difficulty: 1
    prompt: "Table orders has two million rows and no suitable index. What does the DBMS do for the query WHERE user_id = 4821?"
    choices:
      - id: a
        text: "It reads and checks every row of the table (a full scan)."
      - id: b
        text: "It jumps straight to the matching rows, skipping the rest."
      - id: c
        text: "It refuses to run the query until an index is created."
      - id: d
        text: "It returns only the first matching row."
    correct: [a]
    explanation: "Without an index there is only one path: a full scan (SCAN). The engine checks the condition against each of the two million rows, and time grows linearly with row count."
    variants:
      - prompt: "Why does a table need an index on a column that is filtered on often?"
        choices:
          - id: a
            text: "To find the needed rows without reading the whole table."
          - id: b
            text: "To make the table take less space on disk."
          - id: c
            text: "To speed up inserting new rows."
          - id: d
            text: "To automatically forbid duplicates in the column."
        correct: [a]
        explanation: "An index stores the column's values in order, so the database finds the row without scanning. It actually adds space and slows down inserts."
      - prompt: "A column is declared as id INTEGER PRIMARY KEY. Do you need a separate index for WHERE id = 5?"
        choices:
          - id: a
            text: "No: INTEGER PRIMARY KEY in SQLite already acts as an index (rowid)."
          - id: b
            text: "Yes: without CREATE INDEX, lookup by id is a full scan."
          - id: c
            text: "Yes: the primary key is stored separately and is not indexed by itself."
          - id: d
            text: "No, because numeric columns never get indexes."
        correct: [a]
        explanation: "An INTEGER PRIMARY KEY column coincides with rowid, the row's built-in key. Lookup by it goes through rowid without a separate CREATE INDEX."

  - id: why-create-index
    concept: why-indexes
    type: sql-query
    difficulty: 2
    prompt: "Create an index named idx_orders_user on column user_id of table orders, then return the name of the created index from sqlite_master."
    fixture: |
      CREATE TABLE orders (id INTEGER PRIMARY KEY, user_id INTEGER, status TEXT, amount INTEGER);
      INSERT INTO orders VALUES
        (1,1,'paid',1200), (2,1,'paid',800), (3,2,'cancelled',500),
        (4,3,'paid',2000), (5,3,'pending',300), (6,5,'paid',1500),
        (7,5,'paid',450), (8,5,'cancelled',900), (9,6,'pending',700), (10,7,'paid',1100);
    expected:
      kind: result-set
      ordered: false
      rows:
        - { name: 'idx_orders_user' }
    hints:
      - "An index is created with CREATE INDEX <name> ON <table>(<column>)."
      - "The list of all database indexes lives in the service table sqlite_master, where type equals the string index."
    solution: |
      CREATE INDEX idx_orders_user ON orders(user_id);
      SELECT name FROM sqlite_master WHERE type = 'index' AND name = 'idx_orders_user';
    variants:
      - prompt: "Create an index idx_orders_status on column status of table orders, then return its name from sqlite_master."
        expected:
          kind: result-set
          ordered: false
          rows:
            - { name: 'idx_orders_status' }
        solution: |
          CREATE INDEX idx_orders_status ON orders(status);
          SELECT name FROM sqlite_master WHERE type = 'index' AND name = 'idx_orders_status';
      - prompt: "Create an index idx_orders_amount on column amount of table orders, then return its name from sqlite_master."
        expected:
          kind: result-set
          ordered: false
          rows:
            - { name: 'idx_orders_amount' }
        solution: |
          CREATE INDEX idx_orders_amount ON orders(amount);
          SELECT name FROM sqlite_master WHERE type = 'index' AND name = 'idx_orders_amount';

  - id: why-index-keeps-results
    concept: why-indexes
    type: predict-output
    difficulty: 2
    prompt: "An index speeds up search but does not change the result. How many orders does the user with user_id = 5 have?"
    fixture: |
      CREATE TABLE orders (id INTEGER PRIMARY KEY, user_id INTEGER, status TEXT, amount INTEGER);
      INSERT INTO orders VALUES
        (1,1,'paid',1200), (2,1,'paid',800), (3,2,'cancelled',500),
        (4,3,'paid',2000), (5,3,'pending',300), (6,5,'paid',1500),
        (7,5,'paid',450), (8,5,'cancelled',900), (9,6,'pending',700), (10,7,'paid',1100);
    snippet: |
      SELECT COUNT(*) FROM orders WHERE user_id = 5;
    expected:
      kind: scalar
      value: 3
    variants:
      - prompt: "Same question for the user with user_id = 1. How many orders do they have?"
        snippet: |
          SELECT COUNT(*) FROM orders WHERE user_id = 1;
        expected:
          kind: scalar
          value: 2
      - prompt: "And how many orders in total have status paid?"
        snippet: |
          SELECT COUNT(*) FROM orders WHERE status = 'paid';
        expected:
          kind: scalar
          value: 6

  - id: why-users-without-orders
    concept: why-indexes
    type: sql-query
    difficulty: 3
    prompt: "Return the email of users who have no orders at all. Sort by email ascending."
    fixture: |
      CREATE TABLE users (id INTEGER PRIMARY KEY, email TEXT, city TEXT, created_at TEXT);
      INSERT INTO users VALUES
        (1,'anna@mail.ru','Moscow','2024-01-05'),
        (2,'boris@mail.ru','Kazan','2024-01-06'),
        (3,'vera@mail.ru','Moscow','2024-02-10'),
        (4,'grigori@mail.ru','Perm','2024-02-11'),
        (5,'dmitry@mail.ru','Moscow','2024-03-01'),
        (6,'elena@mail.ru','Kazan','2024-03-02'),
        (7,'fedor@mail.ru','Sochi','2024-03-15'),
        (8,'olga@mail.ru','Perm','2024-04-01');
      CREATE TABLE orders (id INTEGER PRIMARY KEY, user_id INTEGER, status TEXT, amount INTEGER);
      INSERT INTO orders VALUES
        (1,1,'paid',1200), (2,1,'paid',800), (3,2,'cancelled',500),
        (4,3,'paid',2000), (5,3,'pending',300), (6,5,'paid',1500),
        (7,5,'paid',450), (8,5,'cancelled',900), (9,6,'pending',700), (10,7,'paid',1100);
    expected:
      kind: result-set
      ordered: true
      rows:
        - { email: 'grigori@mail.ru' }
        - { email: 'olga@mail.ru' }
    hints:
      - "\"No orders\" means that on the join, those users found no counterpart in orders. Which JOIN keeps rows without a match?"
      - "Make users the left table and join orders to it. For users without orders, the orders columns come back NULL: that is exactly what you catch."
    solution: |
      SELECT u.email
      FROM users u
      LEFT JOIN orders o ON o.user_id = u.id
      WHERE o.id IS NULL
      ORDER BY u.email;
