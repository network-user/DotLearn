exercises:
  - id: btree-height-quiz
    concept: btree-internals
    type: theory-quiz
    difficulty: 1
    prompt: "Индекс по колонке в таблице на 2 млн строк имеет высоту всего 3 страницы, а не ~21, как у двоичного поиска. Почему?"
    choices:
      - id: a
        text: "Каждая страница индекса хранит сотни ключей, поэтому спуск на один уровень сужает поиск в сотни раз, а не вдвое."
      - id: b
        text: "SQLite целиком держит индекс в оперативной памяти, а в ней поиск мгновенный."
      - id: c
        text: "Высота B-tree всегда равна трём и не зависит от числа строк."
      - id: d
        text: "Строки таблицы физически хранятся отсортированными, поэтому дерево не нужно."
    correct: [a]
    explanation: "Высота это логарифм числа строк по основанию, равному числу ключей на странице (ветвлению). Ветвление в сотни превращает миллионы строк в 3-4 уровня."
    variants:
      - prompt: "Что происходит с высотой B-tree, когда таблица растёт с 1 млн до 1 млрд строк (в тысячу раз)?"
        choices:
          - id: a
            text: "Высота увеличивается всего на один-два уровня: она растёт как логарифм."
          - id: b
            text: "Высота растёт линейно, примерно в тысячу раз."
          - id: c
            text: "Высота удваивается на каждый порядок числа строк."
          - id: d
            text: "Дерево вырождается в список, и поиск замедляется до перебора."
        correct: [a]
        explanation: "Логарифм от роста в тысячу раз при ветвлении в сотни это примерно плюс один уровень. Поэтому поиск в миллиарде строк лишь немногим дороже поиска в миллионе."
      - prompt: "Почему поиск по B-tree это O(log n), а не O(1), как обращение к элементу массива по позиции?"
        choices:
          - id: a
            text: "Чтобы найти строку, движок спускается от корня к листу, сравнивая ключи на каждом уровне; число уровней растёт как логарифм от числа строк."
          - id: b
            text: "Потому что B-tree хранит строки в случайном порядке."
          - id: c
            text: "Потому что каждый поиск перебирает все листья дерева слева направо."
          - id: d
            text: "Потому что индекс приходится перестраивать перед каждым запросом."
        correct: [a]
        explanation: "B-tree не адресует строку напрямую по позиции. Он ведёт от корня вниз, и стоимость это число уровней, то есть логарифм."

  - id: btree-range-query
    concept: btree-internals
    type: sql-query
    difficulty: 2
    prompt: "Верните id и amount заказов с суммой от 500 до 1200 включительно, отсортированные по amount по возрастанию."
    fixture: |
      CREATE TABLE orders (id INTEGER PRIMARY KEY, user_id INTEGER, amount INTEGER, created_at TEXT);
      INSERT INTO orders VALUES
        (1, 10, 1200, '2024-01-05'),
        (2, 10, 800,  '2024-01-20'),
        (3, 11, 500,  '2024-02-02'),
        (4, 12, 2000, '2024-02-15'),
        (5, 12, 300,  '2024-02-28'),
        (6, 13, 1500, '2024-03-04'),
        (7, 13, 450,  '2024-03-18'),
        (8, 13, 900,  '2024-03-25'),
        (9, 14, 700,  '2024-04-01'),
        (10, 15, 1100, '2024-04-12');
    expected:
      kind: result-set
      ordered: true
      rows:
        - { id: 3, amount: 500 }
        - { id: 9, amount: 700 }
        - { id: 2, amount: 800 }
        - { id: 8, amount: 900 }
        - { id: 10, amount: 1100 }
        - { id: 1, amount: 1200 }
    solution: |
      SELECT id, amount FROM orders
      WHERE amount BETWEEN 500 AND 1200
      ORDER BY amount;
    variants:
      - prompt: "Верните id и amount заказов с суммой от 900 до 2000 включительно, по возрастанию amount."
        expected:
          kind: result-set
          ordered: true
          rows:
            - { id: 8, amount: 900 }
            - { id: 10, amount: 1100 }
            - { id: 1, amount: 1200 }
            - { id: 6, amount: 1500 }
            - { id: 4, amount: 2000 }
        solution: |
          SELECT id, amount FROM orders
          WHERE amount BETWEEN 900 AND 2000
          ORDER BY amount;
      - prompt: "Верните id и amount заказов с суммой от 300 до 700 включительно, по возрастанию amount."
        expected:
          kind: result-set
          ordered: true
          rows:
            - { id: 5, amount: 300 }
            - { id: 7, amount: 450 }
            - { id: 3, amount: 500 }
            - { id: 9, amount: 700 }
        solution: |
          SELECT id, amount FROM orders
          WHERE amount BETWEEN 300 AND 700
          ORDER BY amount;

  - id: btree-count-range
    concept: btree-internals
    type: predict-output
    difficulty: 2
    prompt: "Диапазонный поиск по индексу удобен и для подсчётов. Сколько заказов с суммой строго больше 1000?"
    fixture: |
      CREATE TABLE orders (id INTEGER PRIMARY KEY, user_id INTEGER, amount INTEGER, created_at TEXT);
      INSERT INTO orders VALUES
        (1, 10, 1200, '2024-01-05'),
        (2, 10, 800,  '2024-01-20'),
        (3, 11, 500,  '2024-02-02'),
        (4, 12, 2000, '2024-02-15'),
        (5, 12, 300,  '2024-02-28'),
        (6, 13, 1500, '2024-03-04'),
        (7, 13, 450,  '2024-03-18'),
        (8, 13, 900,  '2024-03-25'),
        (9, 14, 700,  '2024-04-01'),
        (10, 15, 1100, '2024-04-12');
    snippet: |
      SELECT COUNT(*) FROM orders WHERE amount > 1000;
    expected:
      kind: scalar
      value: 4
    variants:
      - prompt: "Сколько заказов с суммой строго меньше 500?"
        snippet: |
          SELECT COUNT(*) FROM orders WHERE amount < 500;
        expected:
          kind: scalar
          value: 2
      - prompt: "Сколько заказов с суммой от 700 до 1200 включительно?"
        snippet: |
          SELECT COUNT(*) FROM orders WHERE amount BETWEEN 700 AND 1200;
        expected:
          kind: scalar
          value: 5

  - id: btree-topn-in-range
    concept: btree-internals
    type: sql-query
    difficulty: 3
    prompt: "Верните три самых дорогих заказа, совершённых в феврале-марте 2024 (created_at в диапазоне с '2024-02-01' по '2024-03-31'). Верните id и amount, сортировка по amount по убыванию."
    fixture: |
      CREATE TABLE orders (id INTEGER PRIMARY KEY, user_id INTEGER, amount INTEGER, created_at TEXT);
      INSERT INTO orders VALUES
        (1, 10, 1200, '2024-01-05'),
        (2, 10, 800,  '2024-01-20'),
        (3, 11, 500,  '2024-02-02'),
        (4, 12, 2000, '2024-02-15'),
        (5, 12, 300,  '2024-02-28'),
        (6, 13, 1500, '2024-03-04'),
        (7, 13, 450,  '2024-03-18'),
        (8, 13, 900,  '2024-03-25'),
        (9, 14, 700,  '2024-04-01'),
        (10, 15, 1100, '2024-04-12');
    expected:
      kind: result-set
      ordered: true
      rows:
        - { id: 4, amount: 2000 }
        - { id: 6, amount: 1500 }
        - { id: 8, amount: 900 }
    hints:
      - "Индекс по created_at выкладывает февральские и мартовские строки подряд, одним непрерывным куском листьев. Из этого куска нужно взять только самые крупные суммы: сколько строк реально попадёт в ответ?"
      - "Отфильтруйте по диапазону дат, отсортируйте по amount по убыванию и ограничьте выдачу через LIMIT 3."
    solution: |
      SELECT id, amount FROM orders
      WHERE created_at BETWEEN '2024-02-01' AND '2024-03-31'
      ORDER BY amount DESC
      LIMIT 3;
