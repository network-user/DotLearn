conceptId: composite-covering
cards:
  - id: composite-covering-01
    front: "What is a composite index?"
    back: "An index on several columns at once. Its keys are sorted lexicographically: first by the first column, then by the second where the first is equal, and so on."
    tags: [composite]
  - id: composite-covering-02
    front: "State the leftmost prefix rule."
    back: "A composite index (a, b, c) serves queries on any leftmost prefix of its columns: a; a and b; a, b and c. It does not work for a lone b, for c, or for the pair (b, c) without a."
    tags: [leftmost-prefix]
  - id: composite-covering-03
    front: "Why doesn't index (user_id, status) help the query WHERE status = 'paid'?"
    back: "The index is sorted first by user_id. Without a condition on user_id, status values are scattered across the whole index, so there is no contiguous range."
    tags: [leftmost-prefix]
  - id: composite-covering-04
    front: "In what order should you place composite index columns: equality vs range?"
    back: "Equality columns on the left, a range or sort column on the right. Then equality fixes a position, and the range reads as one contiguous chunk."
    tags: [column-order]
  - id: composite-covering-05
    front: "What is a covering index?"
    back: "An index that contains every column a query needs (both in WHERE and in SELECT). The engine answers straight from the index without touching the table."
    tags: [covering]
  - id: composite-covering-06
    front: "How does a covering index show up in the SQLite plan?"
    back: "As the line SEARCH ... USING COVERING INDEX. The word COVERING means there was no table access, this is an index-only scan."
    tags: [covering]
  - id: composite-covering-07
    front: "Can a composite index serve an ORDER BY?"
    back: "Yes. Index (a, b) serves WHERE a = ? ORDER BY b without a separate sort: within the block with a fixed a, rows are already ordered by b."
    tags: [order-by]
  - id: composite-covering-08
    front: "Do you need a separate index (a) if (a, b) already exists?"
    back: "No. Index (a, b) already serves queries on the prefix a. A separate (a) would duplicate that work and only slow down writes."
    tags: [redundant]
  - id: composite-covering-09
    front: "Do you need a separate index for column b if (a, b) exists?"
    back: "Yes, if you filter on a lone b. Composite (a, b) does not give a prefix on b, so a query WHERE b = ? needs its own index with b first."
    tags: [redundant]
  - id: composite-covering-10
    front: "Why does column order in a composite index matter so much?"
    back: "It determines which queries the index can serve. (a, b) and (b, a) are different indexes: the first helps a filter on a, the second on b."
    tags: [column-order]
