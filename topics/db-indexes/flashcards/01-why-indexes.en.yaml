conceptId: why-indexes
cards:
  - id: why-indexes-01
    front: "What does the DBMS do with a conditional query if there is no suitable index?"
    back: "It performs a full table scan (SCAN): reads and checks every row. The time such a query takes grows linearly with the number of rows."
    tags: [full-scan]
  - id: why-indexes-02
    front: "What does CREATE INDEX physically create?"
    back: "A separate sorted structure alongside the table: the column's values in order plus references to the rows (in SQLite, to the rowid). The database searches through it without scanning."
    tags: [basics]
  - id: why-indexes-03
    front: "What does an index cost you in exchange for faster reads?"
    back: "Writes and space. Every INSERT, UPDATE of the column, and DELETE also updates every index, and the index itself takes up disk space."
    tags: [index-cost]
  - id: why-indexes-04
    front: "Why doesn't INTEGER PRIMARY KEY need a separate index in SQLite?"
    back: "Such a column coincides with rowid, the row's built-in key. A lookup WHERE id = ? already goes through it without CREATE INDEX."
    tags: [rowid]
  - id: why-indexes-05
    front: "How do you see whether a query reads the whole table?"
    back: "Put EXPLAIN QUERY PLAN before the query. SCAN means a full scan, and SEARCH ... USING INDEX means point access via an index."
    tags: [explain]
  - id: why-indexes-06
    front: "Why is an index on a status column with three values usually useless?"
    back: "Low selectivity. The condition status = 'paid' selects a large share of rows, and reading it through an index is not faster than a full scan."
    tags: [selectivity]
  - id: why-indexes-07
    front: "Why not just index every column?"
    back: "Every index slows down writes and takes up space. Five indexes turn one row insert into six writes."
    tags: [write-amplification]
  - id: why-indexes-08
    front: "On which columns does an index pay off?"
    back: "On columns you frequently filter on in WHERE, join on in JOIN, or sort by, where the condition cuts out a small share of a large table."
    tags: [basics]
  - id: why-indexes-09
    front: "Does an index change a query's result?"
    back: "No. An index only affects the speed of finding rows. The same query with and without an index returns the same rows."
    tags: [basics]
  - id: why-indexes-10
    front: "Why does the planner choose SCAN on a small table even when an index exists?"
    back: "Scanning a dozen rows is cheaper than hitting the index and jumping around row references. An index only pays off at volume."
    tags: [full-scan]
