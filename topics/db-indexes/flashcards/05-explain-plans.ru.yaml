conceptId: explain-plans
cards:
  - id: explain-plans-01
    front: "Зачем нужен EXPLAIN QUERY PLAN?"
    back: "Он показывает, как СУБД собирается выполнить запрос: какие таблицы читает, в каком порядке и через какие индексы. Возвращает не данные, а план."
    tags: [explain]
  - id: explain-plans-02
    front: "Как отличить полный перебор от доступа по индексу в плане SQLite?"
    back: "SCAN это чтение всей таблицы. SEARCH это доступ по индексу к нужным строкам. Строку SEARCH с именем индекса вы и хотите видеть на горячем запросе."
    tags: [explain]
  - id: explain-plans-03
    front: "Что означает USING COVERING INDEX в плане?"
    back: "Index-only scan: все нужные колонки лежат в индексе, к самой таблице движок не обращается. Самый дешёвый вид доступа."
    tags: [covering]
  - id: explain-plans-04
    front: "Что означает строка USE TEMP B-TREE FOR ORDER BY?"
    back: "Индекс не обеспечил нужный порядок, и движку пришлось отсортировать результат отдельно, во временной структуре. Подходящий индекс убрал бы этот шаг."
    tags: [order-by]
  - id: explain-plans-05
    front: "Как в плане выглядит соединение (JOIN)?"
    back: "Как вложенный цикл: одна строка плана SCAN или SEARCH на внешнюю таблицу и вложенная строка SEARCH на внутреннюю. По внутренней хочется видеть SEARCH по индексу."
    tags: [join]
  - id: explain-plans-06
    front: "Что такое проблема N+1?"
    back: "Один запрос достаёт список из N родителей, затем на каждого делается ещё один запрос за связанными данными. Итого N+1 запросов вместо одного соединения."
    tags: [n-plus-one]
  - id: explain-plans-07
    front: "Как связаны N+1 и план вложенного цикла?"
    back: "Это одна и та же форма: точечный поиск на каждого родителя. В базе с индексом он дёшев, но в ORM каждый такой поиск это отдельный round-trip по сети, и накладные расходы взрываются."
    tags: [n-plus-one]
  - id: explain-plans-08
    front: "Как убрать N+1?"
    back: "Заменить цикл запросов одним соединением (JOIN) или одним запросом с IN по списку ключей. В ORM это eager-загрузка: select_related, joinedload."
    tags: [n-plus-one]
  - id: explain-plans-09
    front: "Чем EXPLAIN ANALYZE в Postgres отличается от EXPLAIN QUERY PLAN в SQLite?"
    back: "SQLite печатает короткий структурный план без реального прогона. Postgres EXPLAIN даёт оценку стоимости, а EXPLAIN ANALYZE реально выполняет запрос и показывает фактическое время и число строк."
    tags: [postgres]
  - id: explain-plans-10
    front: "Почему нельзя читать оценки строк в плане SQLite как реальные?"
    back: "EXPLAIN QUERY PLAN в SQLite показывает структуру доступа, а не измеренные числа. Реальные строки и время дают Postgres EXPLAIN ANALYZE или профилирование."
    tags: [explain]
