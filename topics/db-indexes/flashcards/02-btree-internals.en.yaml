conceptId: btree-internals
cards:
  - id: btree-internals-01
    front: "How is a B-tree index organized at the node level?"
    back: "It is a balanced tree of pages. A node is not a single value but a page holding hundreds of sorted keys with references to the next level down or to table rows."
    tags: [b-tree]
  - id: btree-internals-02
    front: "Why is a B-tree's height so small (3-4 levels for millions of rows)?"
    back: "Height is the logarithm of the row count with a base equal to the fan-out (keys per page). Fan-out in the hundreds gives 3-4 levels for millions of rows."
    tags: [height]
  - id: btree-internals-03
    front: "How many disk reads does finding a row via an index take?"
    back: "About as many as the tree's height: 3-4 accesses. Not twenty, like binary search over an array, because one page read lets the engine compare against hundreds of keys at once."
    tags: [height]
  - id: btree-internals-04
    front: "How does a B-tree search for a single value (point search)?"
    back: "It descends from the root to a leaf, choosing a branch at each level by the range of separator keys. The cost is the number of levels, i.e. O(log n)."
    tags: [point-search]
  - id: btree-internals-05
    front: "How does a B-tree serve a range query (BETWEEN, greater than, less than)?"
    back: "It descends to the first matching leaf, then walks the leaves in order until values fall outside the range. Neighboring leaves are chained together, so the walk is cheap."
    tags: [range]
  - id: btree-internals-06
    front: "Why doesn't ORDER BY on an indexed column need a separate sort?"
    back: "The B-tree's leaves already lie in key order. Reading them along the chain directly gives a sorted result, with no separate sort step."
    tags: [order-by]
  - id: btree-internals-07
    front: "How do you see in the plan that a sort happened anyway?"
    back: "The line USE TEMP B-TREE FOR ORDER BY appears in EXPLAIN QUERY PLAN. It means the index did not provide the order, and the engine sorted the result separately."
    tags: [order-by]
  - id: btree-internals-08
    front: "Why doesn't a hash index replace a B-tree?"
    back: "A hash spreads keys across buckets and loses order. It only answers strict equality: ranges, sorting, and prefix search are unavailable to it."
    tags: [hash]
  - id: btree-internals-09
    front: "What is a hash index's advantage, and where does it exist?"
    back: "Point lookup by equality in one step on average, O(1). SQLite has no hash indexes, only B-tree; Postgres has them, but they are rarely used."
    tags: [hash]
  - id: btree-internals-10
    front: "Why is an index search O(log n) rather than O(1)?"
    back: "The engine does not address a row by position, it descends from the root to a leaf through the tree's levels. The number of levels grows as the logarithm of the row count."
    tags: [point-search]
