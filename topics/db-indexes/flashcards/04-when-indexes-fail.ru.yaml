conceptId: when-indexes-fail
cards:
  - id: when-indexes-fail-01
    front: "Что значит саргируемое (sargable) условие?"
    back: "Условие, которое СУБД может обслужить через индекс. Оно сравнивает голую колонку со значением. Как только над колонкой появляется функция или арифметика, условие перестаёт быть саргируемым."
    tags: [sargable]
  - id: when-indexes-fail-02
    front: "Почему WHERE lower(email) = ... не использует индекс по email?"
    back: "Индекс хранит email как есть. lower(email) вычисляет новое значение для каждой строки, которого в индексе нет, поэтому отсортированный поиск невозможен."
    tags: [function]
  - id: when-indexes-fail-03
    front: "Как починить фильтр с функцией над колонкой?"
    back: "Либо переписать через голую колонку (например, диапазон дат вместо date()), либо создать выражение-индекс ровно на это выражение: CREATE INDEX ON t(lower(email))."
    tags: [function]
  - id: when-indexes-fail-04
    front: "Какой LIKE может использовать индекс, а какой нет?"
    back: "LIKE 'префикс%' с известным началом использует индекс (непрерывный диапазон). LIKE '%хвост' с ведущим процентом не может: начало строки неизвестно."
    tags: [like]
  - id: when-indexes-fail-05
    front: "Почему WHERE created_at >= X AND created_at < Y лучше для индекса, чем WHERE date(created_at) = X?"
    back: "Диапазон сравнивает голую колонку и ложится на индекс. date(created_at) оборачивает колонку функцией и вынуждает полный перебор."
    tags: [function]
  - id: when-indexes-fail-06
    front: "Почему OR по разным колонкам мешает индексам?"
    back: "Один индекс покрывает одну колонку и не может за один проход проверить два разных условия. Часто это заканчивается полным перебором."
    tags: [or]
  - id: when-indexes-fail-07
    front: "Как переписать OR по разным колонкам под индексы?"
    back: "Разбить на две ветки через UNION: каждый SELECT со своим условием использует свой индекс, а UNION объединит строки и уберёт дубликаты."
    tags: [or]
  - id: when-indexes-fail-08
    front: "Что такое неявное приведение типов и чем оно опасно для индекса?"
    back: "Сравнение колонки одного типа со значением другого (текстовая колонка с числом). СУБД вставляет преобразование, и оно может отменить использование индекса. Сравнивайте колонку со значением её типа."
    tags: [coercion]
  - id: when-indexes-fail-09
    front: "Почему индекс на низкоселективную колонку не помогает?"
    back: "Если условие отбирает большую долю строк, читать их через индекс с прыжками по ссылкам дороже, чем перебором. Планировщик такой индекс просто игнорирует."
    tags: [selectivity]
  - id: when-indexes-fail-10
    front: "Зачем нужен ANALYZE?"
    back: "ANALYZE обновляет статистику о распределении значений. По ней планировщик решает, использовать индекс или нет. С устаревшей статистикой он может выбрать неудачный план."
    tags: [analyze]
