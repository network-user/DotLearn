conceptId: explain-plans
cards:
  - id: explain-plans-01
    front: "What is EXPLAIN QUERY PLAN for?"
    back: "It shows how the DBMS is going to run the query: which tables it reads, in what order, and through which indexes. It returns a plan, not data."
    tags: [explain]
  - id: explain-plans-02
    front: "How do you tell a full scan from index access in a SQLite plan?"
    back: "SCAN reads the whole table. SEARCH is access to specific rows via an index. A SEARCH line naming an index is what you want to see on a hot query."
    tags: [explain]
  - id: explain-plans-03
    front: "What does USING COVERING INDEX mean in a plan?"
    back: "An index-only scan: every needed column lives in the index, so the engine never touches the table. The cheapest kind of access."
    tags: [covering]
  - id: explain-plans-04
    front: "What does the line USE TEMP B-TREE FOR ORDER BY mean?"
    back: "The index did not provide the needed order, so the engine had to sort the result separately, in a temporary structure. A suitable index would remove this step."
    tags: [order-by]
  - id: explain-plans-05
    front: "How does a JOIN look in a plan?"
    back: "As a nested loop: one plan line SCAN or SEARCH for the outer table, and a nested SEARCH line for the inner one. You want to see SEARCH via an index for the inner table."
    tags: [join]
  - id: explain-plans-06
    front: "What is the N+1 problem?"
    back: "One query fetches a list of N parents, then one more query runs for each of them to fetch related data. That is N+1 queries instead of a single join."
    tags: [n-plus-one]
  - id: explain-plans-07
    front: "How are N+1 and the nested-loop plan related?"
    back: "It is the same shape: a point lookup for every parent. In the database with an index it is cheap, but in an ORM every such lookup is a separate network round trip, and the overhead explodes."
    tags: [n-plus-one]
  - id: explain-plans-08
    front: "How do you remove N+1?"
    back: "Replace the loop of queries with a single JOIN, or one query with IN over a list of keys. In an ORM, that is eager loading: select_related, joinedload."
    tags: [n-plus-one]
  - id: explain-plans-09
    front: "How does EXPLAIN ANALYZE in Postgres differ from EXPLAIN QUERY PLAN in SQLite?"
    back: "SQLite prints a short structural plan without actually running the query. Postgres EXPLAIN gives a cost estimate, while EXPLAIN ANALYZE actually runs the query and shows real time and row counts."
    tags: [postgres]
  - id: explain-plans-10
    front: "Why can't you read row estimates in a SQLite plan as real numbers?"
    back: "EXPLAIN QUERY PLAN in SQLite shows the access structure, not measured numbers. Real row counts and timing come from Postgres EXPLAIN ANALYZE or profiling."
    tags: [explain]
