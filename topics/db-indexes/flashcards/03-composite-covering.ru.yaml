conceptId: composite-covering
cards:
  - id: composite-covering-01
    front: "Что такое составной (композитный) индекс?"
    back: "Индекс по нескольким колонкам сразу. Ключи в нём отсортированы лексикографически: сначала по первой колонке, при равенстве по второй, и так далее."
    tags: [composite]
  - id: composite-covering-02
    front: "Сформулируйте правило leftmost prefix."
    back: "Составной индекс (a, b, c) обслуживает запросы по любому левому префиксу колонок: a; a и b; a, b и c. По одному b, по c или по паре (b, c) без a он не работает."
    tags: [leftmost-prefix]
  - id: composite-covering-03
    front: "Почему индекс (user_id, status) не помогает запросу WHERE status = 'paid'?"
    back: "Индекс отсортирован сначала по user_id. Без условия на user_id значения status разбросаны по всему индексу, непрерывного диапазона нет."
    tags: [leftmost-prefix]
  - id: composite-covering-04
    front: "В каком порядке ставить колонки составного индекса: равенство и диапазон?"
    back: "Колонки под равенство слева, колонку под диапазон или сортировку справа. Тогда равенство фиксирует позицию, а диапазон читается одним непрерывным куском."
    tags: [column-order]
  - id: composite-covering-05
    front: "Что такое покрывающий индекс (covering index)?"
    back: "Индекс, который содержит все колонки, нужные запросу (и в WHERE, и в SELECT). Движок отвечает из индекса, не обращаясь к самой таблице."
    tags: [covering]
  - id: composite-covering-06
    front: "Как покрывающий индекс виден в плане SQLite?"
    back: "Строкой SEARCH ... USING COVERING INDEX. Слово COVERING означает, что обращений к таблице не было, это index-only scan."
    tags: [covering]
  - id: composite-covering-07
    front: "Может ли составной индекс обслужить ORDER BY?"
    back: "Да. Индекс (a, b) обслуживает WHERE a = ? ORDER BY b без отдельной сортировки: внутри блока с фиксированным a строки уже упорядочены по b."
    tags: [order-by]
  - id: composite-covering-08
    front: "Нужен ли отдельный индекс (a), если уже есть (a, b)?"
    back: "Нет. Индекс (a, b) уже обслуживает запросы по префиксу a. Отдельный (a) будет дублировать работу и только замедлять запись."
    tags: [redundant]
  - id: composite-covering-09
    front: "Нужен ли отдельный индекс для колонки b, если есть (a, b)?"
    back: "Да, если вы фильтруете по одному b. Составной (a, b) префикса b не даёт, поэтому запросу WHERE b = ? нужен свой индекс, где b стоит первым."
    tags: [redundant]
  - id: composite-covering-10
    front: "Почему порядок колонок в составном индексе критичен?"
    back: "От него зависит, какие запросы индекс обслужит. (a, b) и (b, a) это разные индексы: первый помогает фильтру по a, второй по b."
    tags: [column-order]
