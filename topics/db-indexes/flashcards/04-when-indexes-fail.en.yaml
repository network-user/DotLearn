conceptId: when-indexes-fail
cards:
  - id: when-indexes-fail-01
    front: "What does a sargable condition mean?"
    back: "A condition the DBMS can serve via an index. It compares a bare column to a value. As soon as a function or arithmetic wraps the column, the condition stops being sargable."
    tags: [sargable]
  - id: when-indexes-fail-02
    front: "Why doesn't WHERE lower(email) = ... use an index on email?"
    back: "The index stores email as-is. lower(email) computes a new value for every row, one that is not in the index, so a sorted lookup is impossible."
    tags: [function]
  - id: when-indexes-fail-03
    front: "How do you fix a filter with a function over a column?"
    back: "Either rewrite it via the bare column (for example, a date range instead of date()), or create an expression index exactly on that expression: CREATE INDEX ON t(lower(email))."
    tags: [function]
  - id: when-indexes-fail-04
    front: "Which LIKE can use an index, and which can't?"
    back: "LIKE 'prefix%' with a known start uses the index (a contiguous range). LIKE '%suffix' with a leading percent cannot: the string's start is unknown."
    tags: [like]
  - id: when-indexes-fail-05
    front: "Why is WHERE created_at >= X AND created_at < Y better for an index than WHERE date(created_at) = X?"
    back: "A range compares the bare column and lands on the index. date(created_at) wraps the column in a function and forces a full scan."
    tags: [function]
  - id: when-indexes-fail-06
    front: "Why does OR across different columns hurt indexes?"
    back: "One index covers one column and cannot check two different conditions in a single pass. This often ends up as a full scan."
    tags: [or]
  - id: when-indexes-fail-07
    front: "How do you rewrite an OR across different columns for indexes?"
    back: "Split it into two branches with UNION: each SELECT with its own condition uses its own index, and UNION merges the rows and removes duplicates."
    tags: [or]
  - id: when-indexes-fail-08
    front: "What is implicit type coercion and why is it dangerous for an index?"
    back: "Comparing a column of one type to a value of another type (a text column with a number). The DBMS inserts a conversion, which can cancel index use. Compare a column to a value of its own type."
    tags: [coercion]
  - id: when-indexes-fail-09
    front: "Why doesn't an index on a low-selectivity column help?"
    back: "If a condition selects a large share of rows, reading them through an index with jumps between row references is more expensive than a full scan. The planner simply ignores such an index."
    tags: [selectivity]
  - id: when-indexes-fail-10
    front: "Why is ANALYZE needed?"
    back: "ANALYZE refreshes statistics about the distribution of values. The planner uses them to decide whether to use an index. With stale statistics it can pick a bad plan."
    tags: [analyze]
