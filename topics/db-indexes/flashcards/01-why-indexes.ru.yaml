conceptId: why-indexes
cards:
  - id: why-indexes-01
    front: "Что делает СУБД с запросом по условию, если подходящего индекса нет?"
    back: "Выполняет полный перебор таблицы (SCAN): читает и проверяет каждую строку. Время такого запроса растёт линейно с числом строк."
    tags: [full-scan]
  - id: why-indexes-02
    front: "Что физически создаёт CREATE INDEX?"
    back: "Отдельную отсортированную структуру рядом с таблицей: значения колонки по порядку плюс ссылки на строки (в SQLite на rowid). По ней база ищет без перебора."
    tags: [basics]
  - id: why-indexes-03
    front: "Чем индекс расплачивается за ускорение чтения?"
    back: "Записью и местом. Каждый INSERT, UPDATE колонки и DELETE обновляет ещё и все индексы, а сам индекс занимает место на диске."
    tags: [index-cost]
  - id: why-indexes-04
    front: "Почему на INTEGER PRIMARY KEY в SQLite не нужен отдельный индекс?"
    back: "Такая колонка совпадает с rowid, встроенным ключом строки. Поиск WHERE id = ? уже идёт через него без CREATE INDEX."
    tags: [rowid]
  - id: why-indexes-05
    front: "Как увидеть, читает ли запрос всю таблицу?"
    back: "Поставить перед запросом EXPLAIN QUERY PLAN. SCAN означает полный перебор, а SEARCH ... USING INDEX означает точечный доступ по индексу."
    tags: [explain]
  - id: why-indexes-06
    front: "Почему индекс на колонку status с тремя значениями обычно бесполезен?"
    back: "Низкая селективность. Условие status = 'paid' отбирает большую долю строк, и читать её через индекс не быстрее полного перебора."
    tags: [selectivity]
  - id: why-indexes-07
    front: "Почему нельзя просто проиндексировать все колонки?"
    back: "Каждый индекс замедляет запись и занимает место. Пять индексов превращают одну вставку строки в шесть записей."
    tags: [write-amplification]
  - id: why-indexes-08
    front: "На каких колонках индекс окупается?"
    back: "На тех, по которым часто фильтруют в WHERE, соединяют в JOIN или сортируют, и где условие отсекает малую долю большой таблицы."
    tags: [basics]
  - id: why-indexes-09
    front: "Меняет ли индекс результат запроса?"
    back: "Нет. Индекс влияет только на скорость поиска строк. Один и тот же запрос с индексом и без него вернёт одинаковые строки."
    tags: [basics]
  - id: why-indexes-10
    front: "Почему на маленькой таблице планировщик выбирает SCAN даже при наличии индекса?"
    back: "Перебрать десяток строк дешевле, чем обращаться к индексу и прыгать по ссылкам на строки. Индекс окупается только на объёме."
    tags: [full-scan]
