conceptId: btree-internals
cards:
  - id: btree-internals-01
    front: "Как устроен индекс-B-tree на уровне узлов?"
    back: "Это сбалансированное дерево страниц. Узел это не одно значение, а страница с сотнями отсортированных ключей и ссылками на нижний уровень или на строки таблицы."
    tags: [b-tree]
  - id: btree-internals-02
    front: "Почему высота B-tree такая маленькая (3-4 уровня на миллионы строк)?"
    back: "Высота это логарифм числа строк по основанию, равному ветвлению (числу ключей на странице). Ветвление в сотни даёт 3-4 уровня на миллионы строк."
    tags: [height]
  - id: btree-internals-03
    front: "Сколько чтений с диска нужно, чтобы найти строку по индексу?"
    back: "Примерно столько, какова высота дерева: 3-4 обращения. Не двадцать, как у двоичного поиска по массиву, потому что за одно чтение страницы движок сравнивает сразу с сотнями ключей."
    tags: [height]
  - id: btree-internals-04
    front: "Как B-tree ищет одно значение (точечный поиск)?"
    back: "Спускается от корня к листу, на каждом уровне выбирая ветку по диапазону разделителей. Стоимость это число уровней, то есть O(log n)."
    tags: [point-search]
  - id: btree-internals-05
    front: "Как B-tree обслуживает диапазонный запрос (BETWEEN, больше, меньше)?"
    back: "Спускается к первому подходящему листу, затем идёт по листьям по порядку, пока значения не выйдут из диапазона. Соседние листья связаны в цепочку, поэтому обход дешёвый."
    tags: [range]
  - id: btree-internals-06
    front: "Почему ORDER BY по проиндексированной колонке не требует отдельной сортировки?"
    back: "Листья B-tree уже лежат в порядке ключа. Чтение их по цепочке сразу даёт отсортированный результат, без шага сортировки."
    tags: [order-by]
  - id: btree-internals-07
    front: "Как в плане увидеть, что сортировка всё же произошла?"
    back: "В EXPLAIN QUERY PLAN появляется строка USE TEMP B-TREE FOR ORDER BY. Она означает, что индекс порядок не обеспечил и движок отсортировал результат отдельно."
    tags: [order-by]
  - id: btree-internals-08
    front: "Почему hash-индекс не заменяет B-tree?"
    back: "Хеш раскладывает ключи по бакетам и теряет порядок. Он отвечает только на строгое равенство: диапазоны, сортировка и поиск по префиксу для него недоступны."
    tags: [hash]
  - id: btree-internals-09
    front: "В чём преимущество hash-индекса и где он есть?"
    back: "Точечный поиск по равенству в среднем за один шаг, O(1). В SQLite hash-индексов нет, только B-tree; в Postgres есть, но применяют редко."
    tags: [hash]
  - id: btree-internals-10
    front: "Почему поиск по индексу это O(log n), а не O(1)?"
    back: "Движок не адресует строку по позиции, а спускается от корня к листу через уровни дерева. Число уровней растёт как логарифм от числа строк."
    tags: [point-search]
