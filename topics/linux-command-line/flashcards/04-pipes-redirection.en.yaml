conceptId: pipes-redirection
cards:
  - id: pipes-redirection-01
    front: "What three streams does every command have, and under which numbers?"
    back: "stdin (0) for input, stdout (1) for regular output, stderr (2) for error messages. By default all three are connected to the terminal."
    tags: [streams]
  - id: pipes-redirection-02
    front: "How does > differ from >> when redirecting into a file?"
    back: "> fully replaces the file's contents, truncating it to zero bytes before writing. >> appends the output to the end, keeping what is already there."
    tags: [redirection]
  - id: pipes-redirection-03
    front: "Why does sort file.txt > file.txt destroy the original data?"
    back: "The shell opens file.txt for writing and truncates it to zero bytes before sort even gets to read its contents. sort reads an already-empty file and writes nothing back."
    tags: [gotcha]
  - id: pipes-redirection-04
    front: "What does the notation 2>&1 do, and why does its position relative to > matter?"
    back: "2>&1 points stderr to wherever stdout currently points. If it is placed before >file, stderr copies the old target, usually the terminal, and never reaches the file."
    tags: [redirection]
  - id: pipes-redirection-05
    front: "What does the | operator connect between two commands?"
    back: "The left command's stdout to the right command's stdin. The commands run as separate processes, and data flows between them as a stream."
    tags: [pipes]
  - id: pipes-redirection-06
    front: "Does a pipe pass error messages on to the next command in the pipeline?"
    back: "No: | only connects stdout to stdin, while stderr keeps printing to the screen, bypassing the pipeline. To include errors in the pipeline, they must first be merged with 2>&1."
    tags: [pipes, gotcha]
