conceptId: files
cards:
  - id: files-01
    front: "How does mv differ from cp in terms of the file's existence after the command?"
    back: "cp creates an independent copy: the file exists in two places. mv changes the node's address in the tree: the file remains a single instance, just under a new path."
    tags: [commands]
  - id: files-02
    front: "Why does mkdir arhiv/2026/iyul fail without the -p flag?"
    back: "mkdir does not build intermediate directories on its own. If 2026 does not exist yet, there is nowhere to put iyul. -p creates the whole chain in one call."
    tags: [mkdir]
  - id: files-03
    front: "What happens with cp docs backup if docs is a directory, without the -r flag?"
    back: "cp refuses to copy and prints 'omitting directory'. A directory is an entire subtree, and recursive copying requires the explicit -r flag."
    tags: [cp]
  - id: files-04
    front: "Where does a file go after rm, and can it be recovered with standard tools?"
    back: "Nowhere: there is no trash in the terminal. rm removes the file's entry permanently, and there is no command to undo it."
    tags: [rm]
  - id: files-05
    front: "What happens if you run mv a.txt b.txt and b.txt already exists?"
    back: "b.txt is silently replaced with the contents of a.txt, with no warning at all. cp does the same. Only the -i flag makes it ask for confirmation."
    tags: [mv, gotcha]
  - id: files-06
    front: "Why use head, tail, and less instead of cat on large files?"
    back: "cat prints the whole file at once and floods the terminal with thousands of lines. head shows the beginning, tail the end, and less opens the file in a pager you exit with the q key."
    tags: [viewing]
