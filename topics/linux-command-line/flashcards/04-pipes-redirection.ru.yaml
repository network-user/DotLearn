conceptId: pipes-redirection
cards:
  - id: pipes-redirection-01
    front: "Какие три потока есть у каждой команды и под какими номерами?"
    back: "stdin (0) для ввода, stdout (1) для обычного вывода, stderr (2) для сообщений об ошибках. По умолчанию все три подключены к терминалу."
    tags: [streams]
  - id: pipes-redirection-02
    front: "Чем > отличается от >> при перенаправлении в файл?"
    back: "> полностью заменяет содержимое файла, обрезая его до нуля байт перед записью. >> дописывает вывод в конец, сохраняя то, что уже есть."
    tags: [redirection]
  - id: pipes-redirection-03
    front: "Почему sort file.txt > file.txt портит исходные данные?"
    back: "Шелл открывает file.txt на запись и обрезает его до нуля байт ещё до того, как sort успевает прочитать содержимое. sort читает уже пустой файл и ничего не пишет обратно."
    tags: [gotcha]
  - id: pipes-redirection-04
    front: "Что делает запись 2>&1 и почему важен её порядок относительно >?"
    back: "2>&1 направляет stderr туда же, куда сейчас смотрит stdout. Если поставить её раньше, чем >file, stderr скопирует старую цель, обычно терминал, и в файл не попадёт."
    tags: [redirection]
  - id: pipes-redirection-05
    front: "Что соединяет оператор | между двумя командами?"
    back: "stdout левой команды со stdin правой. Команды выполняются как отдельные процессы, а данные текут между ними потоком."
    tags: [pipes]
  - id: pipes-redirection-06
    front: "Пропускает ли пайп сообщения об ошибках в следующую команду конвейера?"
    back: "Нет: | соединяет только stdout со stdin, а stderr продолжает печататься на экран мимо конвейера. Чтобы включить ошибки в конвейер, их сначала объединяют записью 2>&1."
    tags: [pipes, gotcha]
