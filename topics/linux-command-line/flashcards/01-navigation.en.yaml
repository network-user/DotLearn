conceptId: navigation
cards:
  - id: navigation-01
    front: "Which command prints the absolute path of the current directory?"
    back: "pwd. It changes nothing, so it is safe in any situation and instantly answers the question 'where am I'."
    tags: [commands]
  - id: navigation-02
    front: "How does an absolute path differ from a relative one?"
    back: "An absolute path starts with / and is read from the root, working from anywhere. A relative path does not start with /, and is resolved from the current directory."
    tags: [paths]
  - id: navigation-03
    front: "What do the special names . and .. mean in any directory?"
    back: ". means the current directory itself, .. means its parent directory. Both entries exist in every directory of the tree."
    tags: [paths]
  - id: navigation-04
    front: "Where does cd with no arguments go, and what does cd - do?"
    back: "cd with no arguments goes to the home directory. cd - returns to wherever you were before the last move, and prints that path."
    tags: [commands]
  - id: navigation-05
    front: "Why does ls not show the .bashrc file by default?"
    back: "Names starting with a dot are considered hidden and do not appear in ls's normal output. The -a flag reveals them, including . and .. in every directory."
    tags: [ls]
  - id: navigation-06
    front: "Why press Tab while typing a directory name?"
    back: "Tab completes the name automatically and, in doing so, checks that it exists: if nothing gets completed, that name likely does not exist in the current directory."
    tags: [productivity]
