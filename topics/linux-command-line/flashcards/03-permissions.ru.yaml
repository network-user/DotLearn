conceptId: permissions
cards:
  - id: permissions-01
    front: "Из каких частей состоит строка прав вроде -rwxr-xr--?"
    back: "Первый символ это тип файла, дальше три триады по три бита: права владельца, группы и остальных пользователей."
    tags: [structure]
  - id: permissions-02
    front: "Что означает бит x на каталоге, в отличие от бита r?"
    back: "x разрешает войти в каталог и обратиться к файлу внутри по имени. r разрешает лишь увидеть список имён через ls. Это два независимых права."
    tags: [directories]
  - id: permissions-03
    front: "Как символьная запись chmod u+x отличается от восьмеричной вроде chmod 755?"
    back: "Символьная запись меняет только названные права, остальные биты не трогает. Восьмеричная запись всегда задаёт все три триады целиком, выключая всё, что не было упомянуто в сумме."
    tags: [chmod]
  - id: permissions-04
    front: "Как переводится триада прав в одну восьмеричную цифру?"
    back: "r весит 4, w весит 2, x весит 1. Сумма весов даёт цифру от 0 до 7, например rwx это 7, а r-- это 4."
    tags: [chmod, octal]
  - id: permissions-05
    front: "Какие права обычно ставят на приватный SSH-ключ и почему?"
    back: "600, rw-------: читать и писать может только владелец. Более широкий доступ к секретам считается небезопасным и многие программы сами откажутся работать с слишком открытым ключом."
    tags: [conventions]
  - id: permissions-06
    front: "Кто может поменять права файла командой chmod?"
    back: "Только владелец файла или суперпользователь. Попытка изменить чужой файл ответит Operation not permitted."
    tags: [chmod]
