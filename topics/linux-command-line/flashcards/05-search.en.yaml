conceptId: search
cards:
  - id: search-01
    front: "What is the difference between what grep and find search for?"
    back: "grep searches for text inside files and answers with lines. find searches for the files themselves, by name, type, or size, and answers with paths."
    tags: [model]
  - id: search-02
    front: "What does the -r flag do for the grep command?"
    back: "It runs the search recursively through a directory: grep walks every file in every subdirectory itself and adds a path to each matched line."
    tags: [grep]
  - id: search-03
    front: "How does grep -c differ from plain grep with no flags?"
    back: "grep -c prints not the matching lines themselves, but a single number: how many lines contain a match. That is a count of lines, not of matches within lines."
    tags: [grep]
  - id: search-04
    front: "Why should a find -name pattern always be written in quotes?"
    back: "Without quotes, the asterisk is expanded by the shell before find even runs. If there are several matching files in the current directory, find gets extra arguments and fails with an error; if there is exactly one file, find silently searches only for that file instead of the whole pattern."
    tags: [find, gotcha]
  - id: search-05
    front: "What does the first line '.' mean in the output of find . -maxdepth 1 -type d?"
    back: "find checks the condition against the starting directory too. The dot satisfies the 'is a directory' condition and makes it into the result just like any other matched path."
    tags: [find, gotcha]
  - id: search-06
    front: "What happens with grep anna petrova spisok.txt if the two words are not quoted?"
    back: "The shell parses this as the pattern anna and two separate files to search, petrova and spisok.txt. Since there is no file named petrova, grep reports an error for it and separately returns the results for spisok.txt."
    tags: [grep, gotcha]
