conceptId: permissions
cards:
  - id: permissions-01
    front: "What parts make up a permission string like -rwxr-xr--?"
    back: "The first character is the file type, followed by three triplets of three bits each: owner permissions, group permissions, and others' permissions."
    tags: [structure]
  - id: permissions-02
    front: "What does the x bit mean on a directory, as opposed to the r bit?"
    back: "x allows entering the directory and accessing a file inside it by name. r only allows seeing the list of names via ls. These are two independent permissions."
    tags: [directories]
  - id: permissions-03
    front: "How does symbolic notation like chmod u+x differ from octal notation like chmod 755?"
    back: "Symbolic notation only changes the named permissions, leaving the other bits untouched. Octal notation always sets all three triplets at once, turning off anything not included in the sum."
    tags: [chmod]
  - id: permissions-04
    front: "How does a permission triplet translate into a single octal digit?"
    back: "r is worth 4, w is worth 2, x is worth 1. The sum of the weights gives a digit from 0 to 7, for example rwx is 7, and r-- is 4."
    tags: [chmod, octal]
  - id: permissions-05
    front: "What permissions are usually set on a private SSH key, and why?"
    back: "600, rw-------: only the owner can read and write. Broader access to secrets is considered unsafe, and many programs will refuse to work with a key that is too open."
    tags: [conventions]
  - id: permissions-06
    front: "Who can change a file's permissions with chmod?"
    back: "Only the file's owner or the superuser. Trying to change someone else's file returns 'Operation not permitted'."
    tags: [chmod]
