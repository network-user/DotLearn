conceptId: environment
cards:
  - id: environment-01
    front: "Что хранит переменная PATH и как ей пользуется шелл?"
    back: "Упорядоченный список каталогов через двоеточие. При запуске команды по имени шелл просматривает эти каталоги слева направо и запускает первый найденный исполняемый файл."
    tags: [path]
  - id: environment-02
    front: "Что показывает команда which?"
    back: "Полный путь к файлу, который шелл на самом деле запустит по данному имени команды. Главный инструмент диагностики, когда запускается «не та» программа."
    tags: [path]
  - id: environment-03
    front: "Чем переменная шелла отличается от переменной окружения?"
    back: "Присваивание вроде CITY=Kazan создаёт переменную только внутри текущего шелла: дочерние процессы её не видят. export CITY переносит переменную в окружение, и только тогда потомки получают её в своей копии."
    tags: [export]
  - id: environment-04
    front: "Видит ли уже работающий процесс переменные, экспортированные родителем позже?"
    back: "Нет. Копия окружения делается один раз, в момент запуска процесса. Всё, что экспортировано после этого, достаётся только новым потомкам."
    tags: [inheritance]
  - id: environment-05
    front: "Почему export PATH=/opt/tools/bin без части $PATH: ломает почти все команды?"
    back: "Такая запись заменяет весь список каталогов одним, а не дополняет его. Система перестаёт находить ls, cat и другие команды, потому что их прежние каталоги пропали из PATH."
    tags: [path, gotcha]
  - id: environment-06
    front: "Где хранят настройки PATH и переменных, которые должны переживать перезапуск терминала?"
    back: "В файле ~/.bashrc: bash читает его при старте каждого интерактивного шелла. После правки нужно выполнить source ~/.bashrc или открыть новый терминал, иначе изменения не подействуют."
    tags: [bashrc]
