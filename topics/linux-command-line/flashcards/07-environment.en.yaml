conceptId: environment
cards:
  - id: environment-01
    front: "What does the PATH variable hold, and how does the shell use it?"
    back: "An ordered list of directories separated by colons. When a command is run by name, the shell scans these directories left to right and runs the first executable it finds."
    tags: [path]
  - id: environment-02
    front: "What does the which command show?"
    back: "The full path to the file the shell will actually run for a given command name. The main diagnostic tool when a command name runs 'the wrong' program."
    tags: [path]
  - id: environment-03
    front: "How does a shell variable differ from an environment variable?"
    back: "An assignment like CITY=Kazan creates a variable only inside the current shell: child processes cannot see it. export CITY moves the variable into the environment, and only then do children receive it in their copy."
    tags: [export]
  - id: environment-04
    front: "Does an already-running process see variables its parent exports later?"
    back: "No. The environment is copied exactly once, the moment the process starts. Anything exported after that only reaches new children."
    tags: [inheritance]
  - id: environment-05
    front: "Why does export PATH=/opt/tools/bin, without the $PATH: part, break almost every command?"
    back: "This kind of assignment replaces the whole list of directories with a single one instead of extending it. The system stops finding ls, cat, and other commands, because their former directories have dropped out of PATH."
    tags: [path, gotcha]
  - id: environment-06
    front: "Where do you store PATH and variable settings that should survive a terminal restart?"
    back: "In the ~/.bashrc file: bash reads it at the start of every interactive shell. After editing it, you need to run source ~/.bashrc or open a new terminal, otherwise the changes will not take effect."
    tags: [bashrc]
