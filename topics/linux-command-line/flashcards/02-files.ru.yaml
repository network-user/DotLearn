conceptId: files
cards:
  - id: files-01
    front: "Чем mv отличается от cp по факту существования файла после команды?"
    back: "cp создаёт независимую копию: файл существует в двух местах. mv меняет адрес узла в дереве: файл остаётся в единственном экземпляре, просто по новому пути."
    tags: [commands]
  - id: files-02
    front: "Почему mkdir arhiv/2026/iyul падает с ошибкой без ключа -p?"
    back: "mkdir не достраивает промежуточные каталоги сам. Если 2026 ещё не существует, положить в него iyul некуда. -p создаёт всю цепочку за один вызов."
    tags: [mkdir]
  - id: files-03
    front: "Что произойдёт при cp docs backup, если docs это каталог, без ключа -r?"
    back: "cp откажется копировать и напечатает omitting directory. Каталог это целое поддерево, и рекурсивное копирование требует явного ключа -r."
    tags: [cp]
  - id: files-04
    front: "Куда попадает файл после rm и можно ли его вернуть штатными средствами?"
    back: "Никуда: в терминале нет корзины. rm удаляет запись о файле безвозвратно, отменить командой это нельзя."
    tags: [rm]
  - id: files-05
    front: "Что произойдёт, если выполнить mv a.txt b.txt, а b.txt уже существует?"
    back: "b.txt будет молча заменён содержимым a.txt, без единого предупреждения. То же самое сделает и cp. Спрашивать подтверждение заставляет только ключ -i."
    tags: [mv, gotcha]
  - id: files-06
    front: "Для чего используют head, tail и less вместо cat на больших файлах?"
    back: "cat печатает файл целиком и захлёбывает терминал тысячами строк. head покажет начало, tail конец, а less откроет файл в листалке, из которой выходят клавишей q."
    tags: [viewing]
