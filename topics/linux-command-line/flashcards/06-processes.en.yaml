conceptId: processes
cards:
  - id: processes-01
    front: "What is a PID, and what is it for?"
    back: "A unique numeric identifier for a running process. The system uses it to tell apart even two windows of the same open program."
    tags: [model]
  - id: processes-02
    front: "How does top differ from ps aux in how it displays data?"
    back: "ps aux prints a one-time snapshot of processes and exits. top stays on screen and refreshes the table every few seconds, sorted by processor load."
    tags: [tools]
  - id: processes-03
    front: "What signal does kill send with no flags, and what does it mean?"
    back: "Signal number 15, SIGTERM: a polite request to terminate. A process can intercept it, clean up, and exit on its own, or it can ignore it entirely if it is hung."
    tags: [signals]
  - id: processes-04
    front: "How does kill -9 differ from plain kill in how the process behaves?"
    back: "kill -9 sends SIGKILL: the signal is handled directly by the system kernel, the process is not involved and has no time to save anything. It cannot be intercepted or ignored, unlike SIGTERM."
    tags: [signals]
  - id: processes-05
    front: "Why does ps aux | grep firefox sometimes show an extra line for grep itself?"
    back: "grep itself has time to become a process by the moment of the ps snapshot, and its own command-line arguments contain the searched word firefox, so it matches its own pattern."
    tags: [gotcha]
  - id: processes-06
    front: "What does the & character do at the end of a command, and how do you see a list of such jobs?"
    back: "& sends the command to the background: the terminal immediately returns a prompt, without waiting for it to finish. The jobs command shows the current terminal's background and suspended jobs, and fg brings one of them back to the foreground."
    tags: [jobs]
