conceptId: search
cards:
  - id: search-01
    front: "В чём разница между тем, что ищут grep и find?"
    back: "grep ищет текст внутри файлов и отвечает строками. find ищет сами файлы по имени, типу или размеру и отвечает путями."
    tags: [model]
  - id: search-02
    front: "Что делает ключ -r у команды grep?"
    back: "Запускает поиск рекурсивно по каталогу: grep сам обходит все файлы во всех подкаталогах и добавляет путь к каждой найденной строке."
    tags: [grep]
  - id: search-03
    front: "Чем grep -c отличается от обычного grep без ключей?"
    back: "grep -c печатает не сами строки, а одно число: сколько строк содержат совпадение. Это число строк, а не число вхождений внутри строк."
    tags: [grep]
  - id: search-04
    front: "Почему шаблон find -name всегда стоит писать в кавычках?"
    back: "Без кавычек звёздочку раскрывает шелл ещё до запуска find. Если подходящих файлов в текущем каталоге несколько, find получает лишние аргументы и падает с ошибкой; если файл один, find тихо ищет только его вместо всего шаблона."
    tags: [find, gotcha]
  - id: search-05
    front: "Что означает первая строка «.» в выводе find . -maxdepth 1 -type d?"
    back: "find проверяет условие и на самом стартовом каталоге. Точка подходит под условие «каталог» и попадает в результат так же честно, как и любой другой найденный путь."
    tags: [find, gotcha]
  - id: search-06
    front: "Что произойдёт при grep anna petrova spisok.txt без кавычек вокруг двух слов?"
    back: "Шелл разберёт это как шаблон anna и два отдельных файла для поиска, petrova и spisok.txt. Так как файла petrova нет, grep выдаст ошибку про него и отдельно результат поиска по spisok.txt."
    tags: [grep, gotcha]
