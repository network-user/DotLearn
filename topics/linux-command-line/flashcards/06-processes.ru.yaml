conceptId: processes
cards:
  - id: processes-01
    front: "Что такое PID и зачем он нужен?"
    back: "Уникальный числовой идентификатор запущенного процесса. По нему система различает даже два одновременно открытых окна одной и той же программы."
    tags: [model]
  - id: processes-02
    front: "Чем top отличается от ps aux по способу показа данных?"
    back: "ps aux печатает разовый снимок процессов и завершает работу. top остаётся на экране и обновляет таблицу каждые несколько секунд, отсортированную по загрузке процессора."
    tags: [tools]
  - id: processes-03
    front: "Какой сигнал отправляет kill без ключей и что он означает?"
    back: "Сигнал номер 15, SIGTERM: вежливая просьба завершиться. Процесс может её перехватить, прибраться и выйти сам, а может и проигнорировать, если завис."
    tags: [signals]
  - id: processes-04
    front: "Чем kill -9 отличается от обычного kill по поведению процесса?"
    back: "kill -9 отправляет SIGKILL: сигнал обрабатывает ядро системы напрямую, процесс не участвует и не успевает ничего сохранить. Его нельзя перехватить или проигнорировать, в отличие от SIGTERM."
    tags: [signals]
  - id: processes-05
    front: "Почему в результате ps aux | grep firefox иногда видна лишняя строка про сам grep?"
    back: "Сам grep успевает стать процессом на момент снимка ps, а среди его аргументов командной строки есть искомое слово firefox, поэтому он совпадает с собственным шаблоном поиска."
    tags: [gotcha]
  - id: processes-06
    front: "Что делает символ & в конце команды и как посмотреть список таких задач?"
    back: "& отправляет команду в фон: терминал сразу возвращает приглашение, не дожидаясь завершения. Список фоновых и приостановленных задач текущего терминала показывает команда jobs, а вернуть одну из них на передний план можно командой fg."
    tags: [jobs]
