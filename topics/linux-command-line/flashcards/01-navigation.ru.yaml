conceptId: navigation
cards:
  - id: navigation-01
    front: "Какая команда печатает абсолютный путь текущего каталога?"
    back: "pwd. Она ничего не меняет, поэтому безопасна в любой ситуации и мгновенно снимает вопрос «где я»."
    tags: [commands]
  - id: navigation-02
    front: "Чем абсолютный путь отличается от относительного?"
    back: "Абсолютный начинается с / и читается от корня, работает из любого места. Относительный не начинается с /, отсчитывается от текущего каталога."
    tags: [paths]
  - id: navigation-03
    front: "Что означают служебные имена . и .. в любом каталоге?"
    back: ". означает сам текущий каталог, .. означает его родительский каталог. Обе записи есть в каждом каталоге дерева."
    tags: [paths]
  - id: navigation-04
    front: "Куда ведёт cd без аргументов и что делает cd -?"
    back: "cd без аргументов ведёт в домашний каталог. cd - возвращает туда, где вы были до последнего перехода, и печатает этот путь."
    tags: [commands]
  - id: navigation-05
    front: "Почему ls по умолчанию не показывает файл .bashrc?"
    back: "Имена, начинающиеся с точки, считаются скрытыми и не попадают в обычный вывод ls. Ключ -a раскрывает их, включая . и .. в каждом каталоге."
    tags: [ls]
  - id: navigation-06
    front: "Зачем нажимать Tab при наборе имени каталога?"
    back: "Tab дописывает имя автоматически и заодно проверяет, что оно существует: если дополнения не произошло, скорее всего, такого имени в текущем каталоге нет."
    tags: [productivity]
