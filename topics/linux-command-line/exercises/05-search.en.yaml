exercises:
  - id: search-quiz-001
    concept: search
    type: theory-quiz
    difficulty: 1
    prompt: 'A colleague asks you to find which file in the proekty directory contains the phrase "skidka 15%". Which command solves this?'
    choices:
      - id: a
        text: 'grep -r "skidka 15%" proekty'
      - id: b
        text: 'find proekty -name "skidka 15%"'
      - id: c
        text: 'ls -r proekty | grep skidka'
      - id: d
        text: 'cd proekty && cat *'
    correct: [a]
    explanation: "The task is about file contents, not file names, so grep is what you need. The -r flag makes it walk all of proekty's subdirectories. find -name would compare the phrase against file names, not text inside them."
    hints:
      - "Ask yourself what the answer should contain: lines of text or file paths."
    variants:
      - prompt: "You are sure you saved zakazy_2024.csv somewhere inside the arhiv directory, but forgot the exact subdirectory. Which command solves this?"
        choices:
          - id: a
            text: 'find arhiv -name "zakazy_2024.csv"'
          - id: b
            text: 'grep -r "zakazy_2024.csv" arhiv'
          - id: c
            text: 'cat arhiv/zakazy_2024.csv - prints a file, does not search by name'
          - id: d
            text: 'ls -la arhiv - lists one directory only, no recursive name search'
        correct: [a]
        explanation: "The question is not about contents, but about a file with a known name in an unknown location: that is find -name's job. grep would search for that name as text inside files, which almost certainly finds nothing."
      - prompt: "You need to know how many .log files are in the var directory, including all its subdirectories. Which command works best?"
        choices:
          - id: a
            text: 'find var -name "*.log" | wc -l'
          - id: b
            text: 'grep -rc "*.log" var - greps content, not filenames by pattern'
          - id: c
            text: 'ls var/*.log | wc -l - one level only, misses nested logs'
          - id: d
            text: 'cat var/*.log | wc -l - counts content lines, not files'
        correct: [a]
        explanation: "The task is again about the files themselves, not their contents, and requires walking subdirectories: find with a name pattern and a count via wc -l. ls without -R does not walk subdirectories, and grep would search for the literal text '*.log' inside files."

  - id: search-quiz-002
    concept: search
    type: theory-quiz
    difficulty: 2
    prompt: "The current directory has two files, otchet_yanvar.csv and otchet_fevral.csv. The command find . -name *.csv, without quotes, fails with 'paths must precede expression'. Why?"
    choices:
      - id: a
        text: "The shell expands *.csv into a list of files before find even starts, and find gets an extra argument"
      - id: b
        text: "find does not support the asterisk character at all - mixing transport and application protocol"
      - id: c
        text: "The -name flag must always come last in the command - confusing the shell with kernel syscalls"
      - id: d
        text: "The error means the. directory does not exist"
    correct: [a]
    explanation: "The shell is the first to see the asterisk: it expands *.csv into the names of matching files in the current directory before find even starts. With two such files, find gets two extra words instead of one pattern and refuses to accept them."
    hints:
      - "Before find ever sees the pattern, someone else has already processed it."
      - "Compare the number of csv files in the directory to the number of words find is complaining about."
    variants:
      - prompt: "The current directory has exactly one file, archiv.tar.gz. The command find . -name *.tar.gz, without quotes, runs without a single error. Does that mean the command is written correctly?"
        choices:
          - id: a
            text: "No: the shell substituted the name of the single file for the pattern."
          - id: b
            text: "Yes: since there is no error, the command works just as reliably as with quotes"
          - id: c
            text: "No: without quotes, find does not run at all"
          - id: d
            text: "Yes, because with a single file the shell does not expand the pattern"
        correct: [a]
        explanation: "The shell always expands *.tar.gz whenever it finds matching files, regardless of how many there are. With exactly one file, no error occurs, but find receives an already-resolved name instead of a pattern and actually searches the whole tree for that specific file, not any tar.gz. The result would be incomplete if other such archives exist somewhere in subdirectories."

  - id: search-blanks-001
    concept: search
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the command so find finds every .csv file in the tree starting from the current directory, and does not break on a machine with several matching files."
    template: |
      $ find . -name {{pattern}}
    blanks:
      pattern:
        accept: ['"*.csv"']
        accept_regex: '^"\*\.csv"$'
    explanation: "Quotes around *.csv keep the shell from expanding the pattern too early: find receives the literal string *.csv and compares it itself against every file name in the tree."
    hints:
      - "Without quotes, the problem is that the pattern gets expanded not by find, but by whoever reads the command first."
    variants:
      - prompt: "Complete the command so find prints only first-level directories, without going deeper and without counting regular files."
        template: |
          $ find . -maxdepth {{depth}} -type {{kind}}
        blanks:
          depth:
            accept: ['1']
            accept_regex: '^1$'
          kind:
            accept: ['d']
            accept_regex: '^d$'
        explanation: "-maxdepth 1 stops find from descending past the first level, and -type d selects only directories, discarding regular files."

  - id: search-blanks-002
    concept: search
    type: fill-in-blanks
    difficulty: 3
    prompt: "Complete the command so grep walks the entire src directory and adds both the file path and the line number to every matched line containing TODO."
    template: |
      $ grep {{flags}} "TODO" src
    blanks:
      flags:
        accept: ['-rn', '-nr']
        accept_regex: '^-(rn|nr)$'
    explanation: "The -r flag enables walking subdirectories and adds a path to every matched line, and -n adds a line number. Together they produce output in the form path:number:line."
    hints:
      - "Two different effects are needed at once: walking subdirectories and line numbers. Each is provided by a separate flag."
      - "grep flags can be written together after a single dash, and the order of letters inside the value does not matter."
    variants:
      - prompt: "Complete the command so it prints a single number: how many lines of app.log do NOT contain the word error."
        template: |
          $ grep {{flags}} "error" app.log
        blanks:
          flags:
            accept: ['-vc', '-cv']
            accept_regex: '^-(vc|cv)$'
        explanation: "-v inverts the match and keeps lines without a match, and -c prints the count of lines rather than the lines themselves. Together they count the lines that do not contain the word error."

  - id: search-predict-001
    concept: search
    type: predict-output
    difficulty: 2
    prompt: "The contents of otchet.txt are shown in the fixture. What does the command print?"
    fixture: |
      file otchet.txt:
      skidka dlya klienta: 15%
      itogo za kvartal: 480
      oplata do 30 iyunya
    snippet: |
      grep -n "itogo" otchet.txt
    expected:
      kind: stdout
      value: "2:itogo za kvartal: 480"
    explanation: "The word itogo only appears on the second line of the file. The -n flag changes the output format to number:line, so it prints 2:itogo za kvartal: 480."
    hints:
      - "First find the single matching line in the fixture, then work out its line number by position."
      - "The -n flag adds the line number followed by a colon; the line's text itself does not change."
    variants:
      - prompt: "The contents of spisok.txt are shown in the fixture. What does the command print?"
        fixture: |
          file spisok.txt:
          Anna Petrova
          boris ivanov
          pochta: anna@firma.ru
        snippet: |
          grep -i "anna" spisok.txt
        expected:
          kind: stdout
          value: "Anna Petrova\npochta: anna@firma.ru"
        explanation: "The -i flag removes case sensitivity, so both Anna with a capital letter and anna inside the email address match. The boris ivanov line has no match and does not appear in the output."

  - id: search-predict-002
    concept: search
    type: predict-output
    difficulty: 3
    prompt: "The directory tree and find's traversal order are shown in the fixture. What does the command print?"
    fixture: |
      find walks the entries in the order listed below.
      .:
        otchet.csv
        notes.md
        arhiv/
      arhiv/:
        zakazy_2024.csv
        zakazy_2023.csv
    snippet: |
      find . -name "*.csv"
    expected:
      kind: stdout
      value: "./otchet.csv\n./arhiv/zakazy_2024.csv\n./arhiv/zakazy_2023.csv"
    explanation: "find compares the pattern *.csv against the name of every file and directory in the tree and prints the full path of each match. notes.md and the arhiv directory itself do not match the pattern and are not included in the output."
    hints:
      - "Walk through the fixture in order and mark only the entries whose name ends in .csv."
      - "find prints the path from the starting point, that is, with a leading dot, not the bare file name."
    variants:
      - prompt: "The directory tree and find's traversal order are shown in the fixture. What does the command print?"
        fixture: |
          find walks the entries in the order listed below.
          .:
            otchet.csv
            notes.md
            arhiv/
          arhiv/:
            zakazy_2024.csv
            zakazy_2023.csv
        snippet: |
          find . -maxdepth 1 -type d
        expected:
          kind: stdout
          value: ".\n./arhiv"
        explanation: "-maxdepth 1 limits the walk to the first level, and -type d selects only directories. The starting point . is itself a directory and passes its own check, so it appears first in the result, followed by the single subdirectory arhiv."
