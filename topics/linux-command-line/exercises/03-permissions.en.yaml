exercises:
  - id: perm-quiz-001
    concept: permissions
    type: theory-quiz
    difficulty: 1
    prompt: "The command ls -l prints the permission string -rwxr-xr--. What is the owning group allowed to do?"
    choices:
      - id: a
        text: "Read and execute, but not modify the file"
      - id: b
        text: "Read, modify, and execute the file without restriction"
      - id: c
        text: "Only read the file"
      - id: d
        text: "Only modify the file, with no read permission"
    correct: [a]
    explanation: "The second triplet of characters, r-x, belongs to the group: r allows reading, x allows executing, and the dash where w would be means the group has no write permission."
    hints:
      - "The string after the file type splits into three equal parts of three characters: owner, group, others."
      - "A dash in place of a letter means that specific permission is missing, not that access is denied entirely."
    variants:
      - prompt: "The command ls -l prints the permission string -rw-r--r--. Can the file's owner execute it as a program?"
        choices:
          - id: a
            text: "No: the owner has no x bit"
          - id: b
            text: "Yes, the owner can execute any of their own files"
          - id: c
            text: "Yes, but only if the file is in the home directory"
          - id: d
            text: "This cannot be determined from a single ls -l line"
        correct: [a]
        explanation: "The first triplet, rw-, belongs to the owner: read and write are present, but there is no x bit, so the file cannot be run as a program, even though it belongs to that owner."
      - prompt: "The permission string is -rwxrwxr-x. What is allowed for users who are neither the owner nor in the file's group?"
        choices:
          - id: a
            text: "Read and execute, but not modify"
          - id: b
            text: "Read, write, and execute without restriction"
          - id: c
            text: "No permissions at all"
          - id: d
            text: "Only write, with no read permission"
        correct: [a]
        explanation: "The third triplet, r-x, applies to other users on the system: reading and executing are allowed, but there is no w bit, so they cannot modify the file."

  - id: perm-quiz-002
    concept: permissions
    type: theory-quiz
    difficulty: 2
    prompt: "The reports directory has permissions dr--r--r--, and nobody has the x bit. The owner tries to run cd reports. What happens?"
    choices:
      - id: a
        text: "Access denied: without the x bit you cannot enter the directory, even with read permission"
      - id: b
        text: "cd succeeds: read permission already allows moving into the directory"
      - id: c
        text: "cd succeeds, but ls inside shows an empty list"
      - id: d
        text: "The error only happens for other users, not for the owner"
    correct: [a]
    explanation: "On a directory, the x bit governs the right to enter it and access files by name; the r bit alone is not enough. Without x, cd fails with an access error even for the owner."
    hints:
      - "On a file and on a directory, the letters rwx mean different things: recall what each one governs specifically on a directory."
      - "Read permission on a directory only lets you list the names inside, not enter it."
    variants:
      - prompt: "The arhiv directory has permissions d--x--x--x. The owner knows the exact name of the file otchet.txt inside it and runs cat arhiv/otchet.txt. Will the file be readable?"
        choices:
          - id: a
            text: "Yes, if the otchet.txt file itself has read permission"
          - id: b
            text: "No: without the r bit on the directory, no file inside can be opened"
          - id: c
            text: "No: the x bit on a directory gives no access to its contents at all"
          - id: d
            text: "Yes, the r bit on the directory does not matter here"
        correct: [a]
        explanation: "The x bit on a directory allows accessing files inside it by exact name, even without the r bit on the directory itself, which is only needed for the ls command. From there, the permissions of otchet.txt itself decide the outcome."
      - prompt: "The docs directory has permissions dr-xr-xr-x. A user tries to create a new file in it with touch docs/note.txt. Will it work?"
        choices:
          - id: a
            text: "No: creating a file requires write permission w on the directory, and nobody has it"
          - id: b
            text: "Yes, r and x on the directory are enough to create a file"
          - id: c
            text: "Yes, if the user has write permission on the note.txt file itself"
          - id: d
            text: "The outcome depends only on the permissions of note.txt, not the directory"
        correct: [a]
        explanation: "Creating and removing entries inside a directory requires write permission on the directory itself, not on the file: it is a change to the list of names. Without w on docs, touch fails with an access error."

  - id: perm-blanks-001
    concept: permissions
    type: fill-in-blanks
    difficulty: 2
    prompt: "The file deploy.sh has permissions -rw-r--r--. Complete the command with symbolic notation so that the owner gains execute permission, while the other permissions stay unchanged."
    template: |
      $ chmod {{flag}} deploy.sh
    blanks:
      flag:
        accept: ['u+x']
        accept_regex: '^u\+x$'
    explanation: "The symbolic notation u+x adds execute permission only for the owner, without touching the group's or others' permissions, unlike octal notation, which would rewrite all the bits at once."
    hints:
      - "You need to change exactly one target and add exactly one permission, without rewriting the other bits."
      - "Target letters: u for owner, g for group, o for others, a for all at once; the + sign adds a permission."
    variants:
      - prompt: "The file secret.key has permissions -rw-r--r--. Complete the command with symbolic notation to remove read permission from the group and from others, leaving the owner's permissions unchanged."
        template: |
          $ chmod {{flag}} secret.key
        blanks:
          flag:
            accept: ['go-r']
            accept_regex: '^go-r$'
        explanation: "The target go refers to the group and others together, and the - sign removes their read permission; symbolic notation does not touch the owner's permissions because they are not named in the target."
      - prompt: "The file notes.txt has permissions -rw-------. Complete the command to grant read permission to everyone at once: owner, group, and others."
        template: |
          $ chmod {{flag}} notes.txt
        blanks:
          flag:
            accept: ['a+r']
            accept_regex: '^a\+r$'
        explanation: "The letter a means 'all targets at once': owner, group, and others all gain read permission in a single command, while the existing write and execute permissions do not change."

  - id: perm-blanks-002
    concept: permissions
    type: fill-in-blanks
    difficulty: 3
    prompt: "Complete the command with octal notation so that after it the permissions of script.sh become exactly -rwxr-xr-x."
    template: |
      $ chmod {{mode}} script.sh
    blanks:
      mode:
        accept: ['755']
        accept_regex: '^755$'
    explanation: "rwx for the owner is 4+2+1=7, and r-x for the group and for others is 4+1=5 for each triplet: together that gives 755, the standard permission set for executable scripts."
    hints:
      - "Break down each triplet of the target string into letters and sum their weights: r=4, w=2, x=1."
      - "The three resulting digits are written in a row in the order owner, group, others."
    variants:
      - prompt: "Complete the command with octal notation so that the permissions of config.yaml become exactly -rw-r--r--, the standard set for regular, non-executable files."
        template: |
          $ chmod {{mode}} config.yaml
        blanks:
          mode:
            accept: ['644']
            accept_regex: '^644$'
        explanation: "rw- for the owner is 4+2=6, r-- for the group and for others is 4 for each triplet: that gives 644, the default permissions for most text files."
      - prompt: "Complete the command with octal notation so that the permissions of id_rsa become exactly -rw-------: only the owner can read and write, and the group and others have no permissions at all."
        template: |
          $ chmod {{mode}} id_rsa
        blanks:
          mode:
            accept: ['600']
            accept_regex: '^600$'
        explanation: "rw- for the owner is 4+2=6, and for the group and others all bits are off, that is, 0: that gives 600, the familiar permission set for private keys and secrets."

  - id: perm-predict-001
    concept: permissions
    type: predict-output
    difficulty: 2
    prompt: "The file report.sh currently has permissions -rw-r--r--. The command chmod u+x report.sh runs, followed by ls -l report.sh. What will the permission string in the output be? Enter only the permission string, for example -rwxr--r--."
    fixture: |
      file report.sh, permissions before the command: -rw-r--r--
    snippet: |
      chmod u+x report.sh
    expected:
      kind: scalar
      value: "-rwxr--r--"
    explanation: "u+x adds the execute bit only for the owner: the first triplet rw- becomes rwx, while the group's and others' triplets stay unchanged, r--."
    hints:
      - "Symbolic notation only changes the named target; the other triplets of the permission string stay as in the fixture."
      - "Exactly one bit is added in the first triplet; work out what rw- becomes with x added."
    variants:
      - prompt: "The file backup.sh currently has permissions -rwxrwxr--. The command chmod go-w backup.sh runs, followed by ls -l backup.sh. What will the permission string be? Enter only the permission string."
        snippet: |
          chmod go-w backup.sh
        fixture: |
          file backup.sh, permissions before the command: -rwxrwxr--
        expected:
          kind: scalar
          value: "-rwxr-xr--"
        explanation: "go-w removes write permission from both the group and others at once. For the group, rwx loses w and becomes r-x. Others never had w, so r-- stays unchanged. The owner's triplet is not named in the command and stays rwx."

  - id: perm-predict-002
    concept: permissions
    type: predict-output
    difficulty: 4
    prompt: "The file notes.txt currently has permissions -rw-r--r--. Two commands run one after another. What will the final permission string be? Enter only the permission string."
    fixture: |
      file notes.txt, permissions before the commands: -rw-r--r--
    snippet: |
      chmod 664 notes.txt
      chmod o-r notes.txt
    expected:
      kind: scalar
      value: "-rw-rw----"
    explanation: "The first command fully rewrites the permissions using octal notation: 664 is rw- rw- r--. The second command uses symbolic notation to remove read permission only from others: the last triplet r-- becomes ---, while the owner's and group's triplets stay rw- and rw-."
    hints:
      - "The octal command fully rewrites the permissions; the symbolic command after it only changes the named target, and the other triplets carry over from the first step."
      - "First break down 664 into its three triplets, then apply the second command to the result of the first step, not to the original permissions from the fixture."

  - id: perm-predict-003
    concept: permissions
    type: predict-output
    difficulty: 3
    prompt: "The reports directory has permissions dr--r--r--, and nobody has the x bit. The command cd reports runs. What does bash print? Enter the message exactly."
    fixture: |
      the current directory contains a subdirectory reports with permissions dr--r--r--
    snippet: |
      cd reports
    expected:
      kind: stdout
      value: "bash: cd: reports: Permission denied"
    explanation: "On a directory, the x bit allows entering it; without it, cd fails with an access error regardless of whether read permission r is present. Bash reports this with its standard Permission denied message."
    hints:
      - "Read permission on a directory only lets you see the list of names, not enter it: a different bit governs entry."
      - "Recall the standard text bash uses to report an access denial when trying to change directory."
