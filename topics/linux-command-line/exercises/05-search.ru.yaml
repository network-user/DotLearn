exercises:
  - id: search-quiz-001
    concept: search
    type: theory-quiz
    difficulty: 1
    prompt: "Коллега просит найти, в каком файле каталога proekty зафиксирована фраза «skidka 15%». Какая команда решает эту задачу?"
    choices:
      - id: a
        text: 'grep -r "skidka 15%" proekty'
      - id: b
        text: 'find proekty -name "skidka 15%"'
      - id: c
        text: 'ls -r proekty | grep skidka'
      - id: d
        text: 'cd proekty && cat *'
    correct: [a]
    explanation: "Задача про содержимое файлов, а не про их имена, значит нужен grep. Ключ -r заставляет его обойти все подкаталоги proekty. find -name сравнивал бы фразу с именами файлов, а не с текстом внутри."
    hints:
      - "Спросите себя, что должно оказаться в ответе: строки текста или пути к файлам."
    variants:
      - prompt: "Вы точно помните, что сохраняли файл zakazy_2024.csv где-то в каталоге arhiv, но забыли точный подкаталог. Какая команда решает эту задачу?"
        choices:
          - id: a
            text: 'find arhiv -name "zakazy_2024.csv"'
          - id: b
            text: 'grep -r "zakazy_2024.csv" arhiv'
          - id: c
            text: 'cat arhiv/zakazy_2024.csv'
          - id: d
            text: 'ls -la arhiv'
        correct: [a]
        explanation: "Здесь вопрос не про содержимое, а про сам файл с известным именем в неизвестном месте: это работа find -name. grep искал бы это имя как текст внутри файлов, что почти наверняка ничего не найдёт."
      - prompt: "Нужно узнать, сколько файлов с расширением .log лежит в каталоге var, включая все его подкаталоги. Какая команда подходит лучше всего?"
        choices:
          - id: a
            text: 'find var -name "*.log" | wc -l'
          - id: b
            text: 'grep -rc "*.log" var'
          - id: c
            text: 'ls var/*.log | wc -l'
          - id: d
            text: 'cat var/*.log | wc -l'
        correct: [a]
        explanation: "Задача снова про сами файлы, а не про их содержимое, и требует обхода подкаталогов: find с шаблоном по имени и подсчётом строк через wc -l. ls без -R подкаталоги не обходит, а grep искал бы текст «*.log» внутри файлов."

  - id: search-quiz-002
    concept: search
    type: theory-quiz
    difficulty: 2
    prompt: "В текущем каталоге лежат два файла, otchet_yanvar.csv и otchet_fevral.csv. Команда find . -name *.csv без кавычек падает с ошибкой paths must precede expression. В чём причина?"
    choices:
      - id: a
        text: "Шелл раскрывает *.csv в список файлов ещё до запуска find, и find получает лишний аргумент"
      - id: b
        text: "find не поддерживает символ звёздочки в принципе"
      - id: c
        text: "Ключ -name обязательно должен идти последним в команде"
      - id: d
        text: "Ошибка означает, что каталог . не существует"
    correct: [a]
    explanation: "Звёздочку первым видит шелл: он раскрывает *.csv в имена подходящих файлов текущего каталога ещё до старта find. Если таких файлов два, find получает вместо одного шаблона два лишних слова и отказывается их принимать."
    hints:
      - "Прежде чем шаблон увидит find, его успевает обработать кое-кто другой."
      - "Сравните число csv-файлов в каталоге с числом слов, на которые жалуется find."
    variants:
      - prompt: "В текущем каталоге лежит ровно один файл archiv.tar.gz. Команда find . -name *.tar.gz без кавычек отрабатывает без единой ошибки. Значит ли это, что команда написана правильно?"
        choices:
          - id: a
            text: "Нет: шелл подставил имя единственного файла вместо шаблона, и find по случайности искал только это имя, а не маску *.tar.gz по всему дереву"
          - id: b
            text: "Да: раз ошибки нет, команда работает так же надёжно, как и с кавычками"
          - id: c
            text: "Нет: без кавычек find вообще не запускается"
          - id: d
            text: "Да, потому что для одного файла раскрытие шаблона шеллом не происходит"
        correct: [a]
        explanation: "Шелл всегда раскрывает *.tar.gz, если находит подходящие файлы, независимо от их числа. Когда файл ровно один, ошибки не возникает, но find получает уже готовое имя вместо шаблона и на самом деле ищет по всему дереву именно этот файл, а не любой tar.gz. Результат окажется неполным, если где-то в подкаталогах есть другие такие архивы."

  - id: search-blanks-001
    concept: search
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните команду так, чтобы find нашёл все файлы с расширением .csv в дереве, начиная с текущего каталога, и не сломался на машине с несколькими подходящими файлами."
    template: |
      $ find . -name {{pattern}}
    blanks:
      pattern:
        accept: ['"*.csv"']
        accept_regex: '^"\*\.csv"$'
    explanation: "Кавычки вокруг *.csv не дают шеллу раскрыть шаблон раньше времени: find получает строку *.csv как есть и сам сравнивает её с каждым именем файла в дереве."
    hints:
      - "Проблема без кавычек в том, что шаблон раскрывает не find, а тот, кто читает команду первым."
    variants:
      - prompt: "Дополните команду так, чтобы find вывел только каталоги первого уровня вложенности, не спускаясь глубже и не считая обычные файлы."
        template: |
          $ find . -maxdepth {{depth}} -type {{kind}}
        blanks:
          depth:
            accept: ['1']
            accept_regex: '^1$'
          kind:
            accept: ['d']
            accept_regex: '^d$'
        explanation: "-maxdepth 1 запрещает find спускаться глубже первого уровня, а -type d отбирает только каталоги, отбрасывая обычные файлы."

  - id: search-blanks-002
    concept: search
    type: fill-in-blanks
    difficulty: 3
    prompt: "Дополните команду так, чтобы grep обошёл каталог src целиком и к каждой найденной строке с TODO добавил и путь к файлу, и номер строки."
    template: |
      $ grep {{flags}} "TODO" src
    blanks:
      flags:
        accept: ['-rn', '-nr']
        accept_regex: '^-(rn|nr)$'
    explanation: "Ключ -r включает обход подкаталогов и добавляет путь к каждой найденной строке, а -n добавляет номер строки. Вместе они дают форму вывода путь:номер:строка."
    hints:
      - "Нужны два разных эффекта сразу: обход подкаталогов и номера строк. Каждый обеспечивает отдельный ключ."
      - "Ключи grep можно писать слитно после одного дефиса, порядок букв внутри значения не важен."
    variants:
      - prompt: "Дополните команду так, чтобы она вывела одно число: сколько строк файла app.log НЕ содержат слово error."
        template: |
          $ grep {{flags}} "error" app.log
        blanks:
          flags:
            accept: ['-vc', '-cv']
            accept_regex: '^-(vc|cv)$'
        explanation: "-v инвертирует условие и оставляет строки без совпадения, а -c печатает не сами строки, а их количество. Вместе они считают строки, где слова error нет."

  - id: search-predict-001
    concept: search
    type: predict-output
    difficulty: 2
    prompt: "Содержимое otchet.txt показано в fixture. Что напечатает команда?"
    fixture: |
      файл otchet.txt:
      skidka dlya klienta: 15%
      itogo za kvartal: 480
      oplata do 30 iyunya
    snippet: |
      grep -n "itogo" otchet.txt
    expected:
      kind: stdout
      value: "2:itogo za kvartal: 480"
    explanation: "Слово itogo встречается только во второй строке файла. Ключ -n меняет форму вывода на номер:строка, поэтому печатается 2:itogo za kvartal: 480."
    hints:
      - "Сначала найдите в fixture единственную строку с совпадением, потом определите её номер по порядку."
      - "Ключ -n добавляет к строке номер через двоеточие, сам текст строки при этом не меняется."
    variants:
      - prompt: "Содержимое spisok.txt показано в fixture. Что напечатает команда?"
        fixture: |
          файл spisok.txt:
          Anna Petrova
          boris ivanov
          pochta: anna@firma.ru
        snippet: |
          grep -i "anna" spisok.txt
        expected:
          kind: stdout
          value: "Anna Petrova\npochta: anna@firma.ru"
        explanation: "Ключ -i убирает чувствительность к регистру, поэтому совпадают и Anna с большой буквы, и anna внутри адреса почты. Строка про boris ivanov совпадения не содержит и в вывод не попадает."

  - id: search-predict-002
    concept: search
    type: predict-output
    difficulty: 3
    prompt: "Дерево каталогов и порядок обхода find показаны в fixture. Что напечатает команда?"
    fixture: |
      find обходит записи в порядке, перечисленном ниже.
      .:
        otchet.csv
        notes.md
        arhiv/
      arhiv/:
        zakazy_2024.csv
        zakazy_2023.csv
    snippet: |
      find . -name "*.csv"
    expected:
      kind: stdout
      value: "./otchet.csv\n./arhiv/zakazy_2024.csv\n./arhiv/zakazy_2023.csv"
    explanation: "find сравнивает шаблон *.csv с именем каждого файла и каталога в дереве и печатает полный путь совпавших. notes.md и сам каталог arhiv под шаблон не подходят и в вывод не попадают."
    hints:
      - "Пройдите fixture по порядку и отметьте только те записи, чьё имя оканчивается на .csv."
      - "find печатает путь от стартовой точки, то есть с точки в начале, а не голое имя файла."
    variants:
      - prompt: "Дерево каталогов и порядок обхода find показаны в fixture. Что напечатает команда?"
        fixture: |
          find обходит записи в порядке, перечисленном ниже.
          .:
            otchet.csv
            notes.md
            arhiv/
          arhiv/:
            zakazy_2024.csv
            zakazy_2023.csv
        snippet: |
          find . -maxdepth 1 -type d
        expected:
          kind: stdout
          value: ".\n./arhiv"
        explanation: "-maxdepth 1 ограничивает обход первым уровнем, -type d отбирает только каталоги. Стартовая точка . тоже каталог и проходит собственную проверку, поэтому попадает в результат первой строкой, следом идёт единственный подкаталог arhiv."
