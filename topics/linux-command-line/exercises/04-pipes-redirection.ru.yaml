exercises:
  - id: redir-quiz-001
    concept: pipes-redirection
    type: theory-quiz
    difficulty: 1
    prompt: "Какой оператор перенаправляет стандартный вывод команды в файл, полностью заменяя его прежнее содержимое?"
    choices:
      - id: a
        text: ">"
      - id: b
        text: ">>"
      - id: c
        text: "<"
      - id: d
        text: "|"
    correct: [a]
    explanation: "Одиночный > открывает файл на запись и обрезает его до нуля байт, прежде чем начнёт писать команда. >> дописывает в конец, < подаёт файл на вход команде, а | соединяет две команды между собой."
    hints:
      - "Из четырёх операторов только один работает именно с файлом на диске и именно заменяет его целиком."
    variants:
      - prompt: "Какой оператор дописывает вывод команды в конец файла, не удаляя то, что там уже есть?"
        choices:
          - id: a
            text: ">>"
          - id: b
            text: ">"
          - id: c
            text: "<"
          - id: d
            text: "2>"
        correct: [a]
        explanation: ">> открывает файл на дозапись и добавляет новый текст после существующего содержимого. Одиночный > стирает файл целиком, < читает файл, а 2> относится только к потоку ошибок."
      - prompt: "Какой оператор подаёт содержимое файла на стандартный ввод команды вместо клавиатуры?"
        choices:
          - id: a
            text: "<"
          - id: b
            text: ">"
          - id: c
            text: "|"
          - id: d
            text: ">>"
        correct: [a]
        explanation: "< перенаправляет stdin: команда читает содержимое указанного файла так, как будто его набрали на клавиатуре. Остальные операторы работают с выводом, а не с вводом."

  - id: redir-quiz-002
    concept: pipes-redirection
    type: theory-quiz
    difficulty: 2
    prompt: "Команда find / -name \"*.conf\" > out.txt отработала, но сообщения вида Permission denied всё равно появились на экране, а не в out.txt. Почему?"
    choices:
      - id: a
        text: "Оператор > перенаправляет только stdout."
      - id: b
        text: "find не поддерживает перенаправление вывода вообще"
      - id: c
        text: "Файл out.txt был доступен только для чтения"
      - id: d
        text: "Перенаправление сработало только для первой найденной строки"
    correct: [a]
    explanation: "stdout и stderr это два независимых потока. > меняет цель только для stdout; чтобы сообщения об ошибках тоже попали в файл, нужно отдельно перенаправить stderr, например записью 2>&1."
    hints:
      - "У команды не один канал вывода, а два, и они нумеруются отдельно."
      - "Сообщения об ошибках по умолчанию печатаются не туда же, куда обычный результат работы команды."
    variants:
      - prompt: "Чтобы и обычный вывод, и сообщения об ошибках find оказались в одном файле out.txt, команду записали так: find / -name \"*.conf\" 2>&1 > out.txt. Результат разочаровал: ошибки всё равно видны на экране. В чём дело?"
        choices:
          - id: a
            text: "2>&1 стоит раньше >out.txt, поэтому stderr скопировал старую цель stdout, терминал, а не новую"
          - id: b
            text: "2>&1 работает только в конце команды, вне зависимости от позиции - путает роль оболочки с системными вызовами"
          - id: c
            text: "Оператор 2>&1 в принципе не существует в bash - путает роль оболочки с системными вызовами"
          - id: d
            text: "find игнорирует любое перенаправление стандартных потоков - путает роль оболочки с системными вызовами"
        correct: [a]
        explanation: "Операторы применяются по порядку слева направо. В момент 2>&1 stdout ещё смотрел на терминал, поэтому stderr скопировал именно эту цель. Только после этого стандартный вывод сам переключился на файл, но stderr уже не следует за ним. Правильный порядок: > out.txt 2>&1."
      - prompt: "Скрипт build.sh печатает сообщения об ошибках в stderr. Команда build.sh | grep error не находит ни одной ошибки, хотя они точно были. Почему?"
        choices:
          - id: a
            text: "Пайп соединяет со следующей командой только stdout; stderr в конвейер не попадает"
          - id: b
            text: "grep не умеет искать слово error, только точные коды ошибок"
          - id: c
            text: "build.sh печатает ошибки с задержкой, и grep их не успевает увидеть"
          - id: d
            text: "Пайп сработал бы, но только с ключом -r у grep"
        correct: [a]
        explanation: "| подключает стандартный вывод левой команды к вводу правой, а stderr продолжает печататься на экран мимо конвейера. Чтобы grep увидел и ошибки тоже, потоки нужно сперва объединить: build.sh 2>&1 | grep error."

  - id: redir-blanks-001
    concept: pipes-redirection
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните команду так, чтобы строка добавилась в конец файла log.txt, не стирая уже накопленную историю."
    template: |
      $ echo "деплой завершён" {{op}} log.txt
    blanks:
      op:
        accept: ['>>']
        accept_regex: '^>>$'
    explanation: ">> открывает файл на дозапись и добавляет текст в конец, сохраняя всё, что было записано раньше. Одиночный > стёр бы всю прежнюю историю лога."
    hints:
      - "Задача сохранить старое содержимое и добавить новую строку следом, а не заменить файл целиком."
    variants:
      - prompt: "Дополните команду так, чтобы файл listing.txt полностью обновился текущим списком файлов каталога, а старое содержимое не имело значения."
        template: |
          $ ls -1 {{op}} listing.txt
        blanks:
          op:
            accept: ['>']
            accept_regex: '^>$'
        explanation: "Раз прежнее содержимое listing.txt не нужно, подходит одиночный >: он обрежет файл до нуля байт и запишет туда свежий список."
      - prompt: "Дополните команду так, чтобы sort прочитал имена не с клавиатуры, а из файла names.txt."
        template: |
          $ sort {{op}} names.txt
        blanks:
          op:
            accept: ['<']
            accept_regex: '^<$'
        explanation: "< подаёт содержимое файла на стандартный ввод команды. sort ведёт себя так, будто имена набрали на клавиатуре и нажали Ctrl+D."

  - id: redir-blanks-002
    concept: pipes-redirection
    type: fill-in-blanks
    difficulty: 3
    prompt: "Дополните команду так, чтобы и обычный вывод find, и сообщения об ошибках оказались в одном файле all-output.log."
    template: |
      $ find / -name "*.conf" {{redir1}} all-output.log {{redir2}}
    blanks:
      redir1:
        accept: ['>']
        accept_regex: '^>$'
      redir2:
        accept: ['2>&1']
        accept_regex: '^2>&1$'
    explanation: "Сначала stdout перенаправляется в файл оператором >, и только затем 2>&1 просит stderr следовать за новой целью stdout. Если поменять операторы местами, ошибки останутся на экране."
    hints:
      - "Порядок операторов важен: сначала должна определиться цель для обычного вывода."
      - "Второй пропуск отвечает за то, чтобы поток ошибок последовал за уже переключённым stdout."
    variants:
      - prompt: "Скрипт build.sh печатает ошибки в stderr. Дополните команду так, чтобы grep искал слово error и среди обычного вывода, и среди сообщений об ошибках."
        template: |
          $ build.sh {{combine}} | grep error
        blanks:
          combine:
            accept: ['2>&1']
            accept_regex: '^2>&1$'
        explanation: "2>&1 перед пайпом сливает stderr в stdout, и уже объединённый поток попадает на вход grep. Без этой записи пайп пропустил бы только обычный вывод build.sh."

  - id: redir-predict-001
    concept: pipes-redirection
    type: predict-output
    difficulty: 2
    prompt: "Содержимое access.log показано в fixture. Что напечатает конвейер? Введите одно число."
    fixture: |
      файл access.log:
      GET /home 200
      GET /missing 404
      GET /api 200
      GET /old-page 404
      GET /catalog 200
    snippet: |
      cat access.log | grep 404 | wc -l
    expected:
      kind: scalar
      value: 2
    explanation: "cat печатает все пять строк, grep 404 оставляет только те, где встречается 404, таких строк две, а wc -l считает строки на входе и печатает 2."
    hints:
      - "Пройдите конвейер по шагам: сначала весь файл, потом отфильтрованные строки, потом их подсчёт."
      - "Посчитайте в fixture, сколько строк содержат именно код 404."
    variants:
      - prompt: "Содержимое access.log то же самое. Что напечатает эта команда? Введите одно число."
        snippet: |
          cat access.log | grep 200 | wc -l
        fixture: |
          файл access.log:
          GET /home 200
          GET /missing 404
          GET /api 200
          GET /old-page 404
          GET /catalog 200
        expected:
          kind: scalar
          value: 3
        explanation: "grep 200 оставляет строки с кодом 200, в fixture их три, wc -l подсчитывает эти строки и печатает 3."

  - id: redir-predict-002
    concept: pipes-redirection
    type: predict-output
    difficulty: 4
    prompt: "Файл names.txt перед командой содержит три строки. Выполняется команда sort names.txt > names.txt. Сколько строк окажется в names.txt после её выполнения? Введите одно число."
    fixture: |
      файл names.txt до команды:
      boris
      anna
      irina
    snippet: |
      sort names.txt > names.txt
    expected:
      kind: scalar
      value: 0
    explanation: "Шелл открывает names.txt на запись и обрезает его до нуля байт ещё до того, как sort успевает прочитать содержимое. sort в итоге читает уже пустой файл, ему нечего сортировать, и на выходе он ничего не пишет: файл остаётся пустым."
    hints:
      - "Подумайте, в каком порядке происходят события: открытие файла на запись и чтение этого же файла командой sort."
      - "Перенаправление > готовит файл для записи раньше, чем команда слева от него успевает хоть что-то прочитать."
    variants:
      - prompt: "Файл emails.txt перед командой содержит четыре строки. Выполняется команда uniq emails.txt > emails.txt. Сколько строк окажется в emails.txt после её выполнения? Введите одно число."
        fixture: |
          файл emails.txt до команды:
          anna@firma.ru
          anna@firma.ru
          boris@firma.ru
          irina@firma.ru
        snippet: |
          uniq emails.txt > emails.txt
        expected:
          kind: scalar
          value: 0
        explanation: "Та же ловушка, что и с sort: > обрезает emails.txt до нуля байт раньше, чем uniq успевает его прочитать. uniq получает на входе пустой файл и ничего не записывает обратно."
