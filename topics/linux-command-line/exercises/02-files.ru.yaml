exercises:
  - id: files-quiz-001
    concept: files
    type: theory-quiz
    difficulty: 1
    prompt: "Какой командой переименовать файл staroe.txt в novoe.txt в текущем каталоге?"
    choices:
      - id: a
        text: "mv staroe.txt novoe.txt"
      - id: b
        text: "cp staroe.txt novoe.txt"
      - id: c
        text: "mv novoe.txt staroe.txt"
      - id: d
        text: "cp novoe.txt staroe.txt"
    correct: [a]
    explanation: "mv принимает сначала источник, потом цель, и переименование для него та же операция, что и перенос. cp оставит старый файл на месте, а перепутанный порядок аргументов попытается взять несуществующий novoe.txt."
    hints:
      - "Сопоставьте действие из условия с назначением команды и проверьте порядок аргументов: сначала что, потом куда."
    variants:
      - prompt: "Какой командой создать пустой файл zametki.txt в текущем каталоге?"
        choices:
          - id: a
            text: "touch zametki.txt"
          - id: b
            text: "mkdir zametki.txt"
          - id: c
            text: "cat zametki.txt"
          - id: d
            text: "cp zametki.txt"
        correct: [a]
        explanation: "touch создаёт пустой файл, если его ещё нет. mkdir создаст каталог, cat попытается прочитать несуществующий файл, а cp требует два аргумента."
      - prompt: "Какой командой создать каталог otchety в текущем каталоге?"
        choices:
          - id: a
            text: "mkdir otchety"
          - id: b
            text: "touch otchety"
          - id: c
            text: "cat otchety"
          - id: d
            text: "rm -r otchety"
        correct: [a]
        explanation: "Каталоги создаёт mkdir. touch создаст обычный файл с таким именем, cat попытается его прочитать, а rm -r наоборот удаляет каталог."

  - id: files-quiz-002
    concept: files
    type: theory-quiz
    difficulty: 2
    prompt: "В текущем каталоге уже есть файл b.txt. Что произойдёт после команды `mv a.txt b.txt`?"
    choices:
      - id: a
        text: "b.txt будет молча заменён содержимым a.txt"
      - id: b
        text: "шелл спросит подтверждение перезаписи"
      - id: c
        text: "команда завершится ошибкой: файл уже существует"
      - id: d
        text: "появится файл b.txt.1 с новым содержимым"
    correct: [a]
    explanation: "mv перезаписывает существующую цель без вопросов, то же делает cp. Подтверждение появится только с ключом -i."
    hints:
      - "Терминал не переспрашивает: вспомните, как команды урока обходятся с уже существующей целью."
    variants:
      - prompt: "docs это каталог. Что произойдёт после команды `cp docs backup` без ключей?"
        choices:
          - id: a
            text: "cp откажется и сообщит, что пропускает каталог"
          - id: b
            text: "cp скопирует каталог вместе со всем содержимым"
          - id: c
            text: "cp скопирует только пустой каталог, без файлов"
          - id: d
            text: "cp спросит, копировать ли рекурсивно"
        correct: [a]
        explanation: "Без -r команда cp не копирует каталоги: она печатает omitting directory и пропускает его. Рекурсивное копирование включается явно: cp -r docs backup."
      - prompt: "Вы выполнили `rm otchet.txt`. Как вернуть файл штатными средствами терминала?"
        choices:
          - id: a
            text: "никак: rm удаляет безвозвратно, корзины нет"
          - id: b
            text: "достать из корзины командой restore"
          - id: c
            text: "отменить сочетанием Ctrl+Z"
          - id: d
            text: "выполнить rm -u otchet.txt"
        correct: [a]
        explanation: "rm не перемещает файлы в корзину и не ведёт историю: штатной команды отмены не существует. Спасают только резервные копии."

  - id: files-blanks-001
    concept: files
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните команды: одним вызовом создайте цепочку каталогов arhiv/2026, затем скопируйте каталог docs со всем содержимым внутрь arhiv/2026."
    template: |
      $ mkdir {{pflag}} arhiv/2026
      $ cp {{rflag}} docs arhiv/2026
    blanks:
      pflag:
        accept: ['-p', '--parents']
        accept_regex: '^(-p|--parents)$'
      rflag:
        accept: ['-r', '-R', '--recursive']
        accept_regex: '^(-r|-R|--recursive)$'
    explanation: "Ключ -p разрешает mkdir достроить всю цепочку каталогов за один вызов, а -r включает рекурсивное копирование: без него cp пропускает каталоги."
    hints:
      - "Прочитайте условие дословно: каждая пропущенная часть названа в нём своим действием."
      - "Вспомните, какие команды отказываются работать с каталогами без специального ключа."
    variants:
      - prompt: "Дополните команды: переименуйте otchet.txt в otchet-final.txt, затем перенесите его в существующий каталог arhiv."
        template: |
          $ {{ren}} otchet.txt otchet-final.txt
          $ mv otchet-final.txt {{dest}}
        blanks:
          ren:
            accept: ['mv']
            accept_regex: '^mv$'
          dest:
            accept: ['arhiv/', 'arhiv', './arhiv/', './arhiv']
            accept_regex: '^(\./)?arhiv/?$'
        explanation: "Переименование выполняет тот же mv, что и перенос: сначала источник, потом цель. Завершающий слэш в arhiv/ защищает от тихого переименования, если каталога вдруг нет."
      - prompt: "Дополните команды: удалите каталог staryj-arhiv со всем содержимым, затем скопируйте все файлы с расширением .txt из текущего каталога в arhiv."
        template: |
          $ rm {{rmflag}} staryj-arhiv
          $ cp {{mask}} arhiv/
        blanks:
          rmflag:
            accept: ['-r', '-rf', '-R', '--recursive']
            accept_regex: '^(-r|-rf|-R|--recursive)$'
          mask:
            accept: ['*.txt']
            accept_regex: '^\*\.txt$'
        explanation: "rm без -r не удаляет каталоги. Шаблон *.txt шелл разворачивает в список всех файлов текущего каталога с расширением .txt."

  - id: files-predict-001
    concept: files
    type: predict-output
    difficulty: 2
    prompt: "Содержимое файлов показано в fixture. Что напечатает команда?"
    fixture: |
      файл spisok1.txt:
      hleb
      moloko

      файл spisok2.txt:
      syr
    snippet: |
      cat spisok1.txt spisok2.txt
    expected:
      kind: stdout
      value: "hleb\nmoloko\nsyr"
    explanation: "cat склеивает файлы в порядке перечисления: сначала обе строки spisok1.txt, затем строка spisok2.txt."
    hints:
      - "Сверьтесь с fixture: какие строки лежат в каждом файле и целиком ли команда их читает."
      - "Команда обрабатывает файлы в том порядке, в каком они перечислены в аргументах."
    variants:
      - snippet: |
          cat spisok2.txt spisok1.txt
        expected:
          kind: stdout
          value: "syr\nhleb\nmoloko"
        explanation: "Порядок аргументов определяет порядок вывода: сначала строка spisok2.txt, затем обе строки spisok1.txt."
      - snippet: |
          tail -n 1 spisok1.txt
        expected:
          kind: stdout
          value: "moloko"
        explanation: "tail -n 1 печатает последнюю строку файла; в spisok1.txt это moloko."

  - id: files-predict-002
    concept: files
    type: predict-output
    difficulty: 3
    prompt: "Состояние каталога показано в fixture. Что напечатает ls -1 после выполнения mv?"
    fixture: |
      текущий каталог:
        otchet.txt
        zakazy.csv
      каталога arhiv не существует
    snippet: |
      mv otchet.txt arhiv
      ls -1
    expected:
      kind: stdout
      value: "arhiv\nzakazy.csv"
    explanation: "Каталога arhiv нет, поэтому mv не переносит, а переименовывает: otchet.txt становится файлом arhiv. ls -1 печатает по одному имени в строке в порядке ASCII."
    hints:
      - "mv не отличает перенос от переименования: исход решает то, существует ли цель как каталог."
      - "Проверьте по fixture, есть ли каталог arhiv, и решите, чем станет otchet.txt после команды."
      - "ls -1 выводит имена по одному в строке, отсортированными по кодам ASCII."
