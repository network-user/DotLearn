exercises:
  - id: nav-quiz-001
    concept: navigation
    type: theory-quiz
    difficulty: 1
    prompt: "You open a terminal and have no idea which directory you are in. Which command prints the full path of the current directory?"
    choices:
      - id: a
        text: "pwd"
      - id: b
        text: "ls"
      - id: c
        text: "cd"
      - id: d
        text: "whereami"
    correct: [a]
    explanation: "pwd prints the absolute path of the current directory and changes nothing. ls shows contents, cd moves you around, and there is no whereami command in a standard install."
    hints:
      - "Go through the commands mentally: one reports your location, another shows contents, another moves you."
    variants:
      - prompt: "Which command instantly takes you to your home directory from anywhere in the filesystem?"
        choices:
          - id: a
            text: "cd with no arguments"
          - id: b
            text: "cd .."
          - id: c
            text: "cd /"
          - id: d
            text: "pwd"
        correct: [a]
        explanation: "cd with no arguments always goes to the home directory. cd .. only goes up one level, cd / goes to the root, and pwd just prints the path."
      - prompt: "Which flag makes ls show hidden files whose names start with a dot?"
        choices:
          - id: a
            text: "-a"
          - id: b
            text: "-l"
          - id: c
            text: "-1"
          - id: d
            text: "-h"
        correct: [a]
        explanation: "The -a flag reveals hidden names, including the special . and .. entries in every directory. -l adds detail, -1 prints one name per line, -h makes sizes human-readable."

  - id: nav-quiz-002
    concept: navigation
    type: theory-quiz
    difficulty: 2
    prompt: "You are in /home/anna/docs and run `cd ..`. What path will pwd print afterward?"
    choices:
      - id: a
        text: "/home/anna"
      - id: b
        text: "/home"
      - id: c
        text: "/"
      - id: d
        text: "/home/anna/docs"
    correct: [a]
    explanation: ".. means the parent directory, so from /home/anna/docs you go up exactly one level, to /home/anna."
    hints:
      - "Sketch the tree and move the 'you are here' dot step by step through the scenario."
    variants:
      - prompt: "You are in /var/log and run `cd /tmp`, then `cd -`. What path will pwd print?"
        choices:
          - id: a
            text: "/var/log"
          - id: b
            text: "/tmp"
          - id: c
            text: "/var"
          - id: d
            text: "/"
        correct: [a]
        explanation: "cd - takes you back to where you were before the last move, that is, back to /var/log."
      - prompt: "You are in /home/boris and run `cd docs`. Which directory do you end up in, assuming it exists?"
        choices:
          - id: a
            text: "/home/boris/docs"
          - id: b
            text: "/docs"
          - id: c
            text: "/home/docs"
          - id: d
            text: "/home/boris"
        correct: [a]
        explanation: "A path with no leading slash is relative: it is appended to the current directory, so you end up in /home/boris/docs."

  - id: nav-blanks-001
    concept: navigation
    type: fill-in-blanks
    difficulty: 2
    prompt: "You are standing in /home/boris, and the projects directory sits right inside it. Complete the commands: move into projects with a relative path, then print the full path of the current directory."
    template: |
      $ cd {{dir}}
      $ {{show}}
      /home/boris/projects
    blanks:
      dir:
        accept: ['projects', './projects', 'projects/', './projects/']
        accept_regex: '^(\./)?projects/?$'
      show:
        accept: ['pwd']
        accept_regex: '^pwd$'
    explanation: "The relative path projects is resolved from the current directory /home/boris, and pwd prints the absolute path, confirming the move worked."
    hints:
      - "First figure out from the scenario where you are standing and where the command should take you."
      - "A relative path does not start with a slash: it continues from the current directory."
    variants:
      - prompt: "You are standing in /home/boris/projects. Complete the command that moves to the parent directory, and fill in the path that pwd will print."
        template: |
          $ cd {{up}}
          $ pwd
          {{result}}
        blanks:
          up:
            accept: ['..', '../']
            accept_regex: '^\.\./?$'
          result:
            accept: ['/home/boris']
            accept_regex: '^/home/boris/?$'
        explanation: "The special name .. means the parent directory: from /home/boris/projects, one level up leads to /home/boris."
      - prompt: "You are standing in /home/boris and want to reach the log directory /var/log. Complete the command so it works from anywhere."
        template: |
          $ cd {{path}}
          $ pwd
          /var/log
        blanks:
          path:
            accept: ['/var/log', '/var/log/']
            accept_regex: '^/var/log/?$'
        explanation: "The target lies outside the current directory, so you need an absolute path from the root: it starts with / and works from anywhere."

  - id: nav-predict-001
    concept: navigation
    type: predict-output
    difficulty: 2
    prompt: "The commands run in order in the same terminal. What does pwd print on the last line?"
    fixture: |
      home directory of user anna: /home/anna
      /home/anna/
        docs/
        music/
    snippet: |
      cd /home/anna
      cd docs
      pwd
    expected:
      kind: stdout
      value: "/home/anna/docs"
    explanation: "The first cd uses an absolute path and places you in /home/anna, the second is relative and descends into docs. pwd prints the result: /home/anna/docs."
    hints:
      - "Track the 'you are here' dot: each cd moves it through the tree from the fixture."
      - "A path with no leading slash is appended to the current directory."
    variants:
      - snippet: |
          cd /home/anna/docs
          cd ..
          pwd
        expected:
          kind: stdout
          value: "/home/anna"
        explanation: "The special name .. goes up one level from /home/anna/docs, to /home/anna."
      - snippet: |
          cd /home/anna/music
          cd ~
          pwd
        expected:
          kind: stdout
          value: "/home/anna"
        explanation: "The ~ symbol expands to the user's home directory; per the fixture that is /home/anna."

  - id: nav-predict-002
    concept: navigation
    type: predict-output
    difficulty: 3
    prompt: "You are standing in /home/boris/work, whose contents are shown in the fixture. What does ls -1 print?"
    fixture: |
      current directory /home/boris/work:
        .config/
        report.txt
        data/
        notes.txt
    snippet: |
      ls -1
    expected:
      kind: stdout
      value: "data\nnotes.txt\nreport.txt"
    explanation: "Without the -a flag, the hidden .config entry is not shown. ls prints the remaining names in alphabetical order: data, notes.txt, report.txt."
    hints:
      - "One of the four directory entries is special: look closely at the first character of each name."
      - "Names starting with a dot are considered hidden: without -a, ls does not show them."
      - "ls -1 prints one name per line in alphabetical order; directories look like ordinary names, with no trailing slash."
