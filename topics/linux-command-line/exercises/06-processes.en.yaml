exercises:
  - id: proc-quiz-001
    concept: processes
    type: theory-quiz
    difficulty: 1
    prompt: "What is a process's PID?"
    choices:
      - id: a
        text: "A unique number the system assigns to every running process"
      - id: b
        text: "The name of the program that started the process"
      - id: c
        text: "The amount of RAM used by the process"
      - id: d
        text: "The number of seconds the process has been running"
    correct: [a]
    explanation: "PID, Process ID, is a numeric identifier unique among the processes currently running. It is by this, not by program name, that the system tells apart two windows of the same open application."
    hints:
      - "Recall the column in ps aux output used to target a specific process with the kill command."
    variants:
      - prompt: "In ps aux output, the firefox process shows 97.4 in the %CPU column. What does this number mean?"
        choices:
          - id: a
            text: "The share of processor time the process is consuming right now"
          - id: b
            text: "The percentage of free RAM in the system"
          - id: c
            text: "The percentage of task completion after which the process will exit"
          - id: d
            text: "The process's priority in the scheduler queue"
        correct: [a]
        explanation: "%CPU reflects this process's current processor load. A value close to 100% is usually the signal of a hung or overloaded program worth investigating further."
      - prompt: "How does top fundamentally differ from ps aux?"
        choices:
          - id: a
            text: "top shows data in real time with continuous updates, ps aux prints a one-time snapshot"
          - id: b
            text: "top only shows the current user's processes, ps aux always shows every process on the system"
          - id: c
            text: "top cannot show process PIDs"
          - id: d
            text: "There is no difference, they are two names for the same program"
        correct: [a]
        explanation: "ps aux prints a list once and exits, while top stays on screen and refreshes the table every few seconds, sorting the most loaded processes to the top."

  - id: proc-quiz-002
    concept: processes
    type: theory-quiz
    difficulty: 2
    prompt: "You ran kill 2087 on a hung process, but a second later it is still visible in ps aux. Is that expected?"
    choices:
      - id: a
        text: "Yes: kill without flags only sends a request to terminate, SIGTERM, and the process may not have time or ability to react instantly"
      - id: b
        text: "No: kill without flags must stop a process instantly, so the PID must be wrong"
      - id: c
        text: "Yes, but only if the process is running under a different user"
      - id: d
        text: "No: if the process is still visible, kill did not work at all and must be run again with the same PID"
    correct: [a]
    explanation: "Plain kill sends the SIGTERM signal, a polite request, not an order. A well-written program has time to clean up before exiting, while a hung one may not respond at all; that is when a harsher kill -9 is needed."
    hints:
      - "The name kill is misleading: think about what it actually does, send a request or guarantee execution."
    variants:
      - prompt: "After running ps aux | grep firefox, the output has one more line than expected: besides firefox, there is a line about grep itself. Why?"
        choices:
          - id: a
            text: "grep itself became a process at the moment of the ps snapshot, and its arguments happen to contain the searched word firefox"
          - id: b
            text: "firefox launches grep as one of its child processes"
          - id: c
            text: "ps aux always appends a service line at the end of its output"
          - id: d
            text: "This is a terminal bug, that line should not be there"
        correct: [a]
        explanation: "grep firefox itself makes it into the process list because it too is running at the moment of the snapshot, and its command-line argument, the word firefox, matches its own search pattern."
      - prompt: "How does kill -9 fundamentally differ from plain kill in terms of the process's ability to react to the signal?"
        choices:
          - id: a
            text: "kill -9 sends SIGKILL, which a process cannot intercept, delay, or ignore, unlike SIGTERM"
          - id: b
            text: "kill -9 works physically faster, but sends essentially the same signal as plain kill"
          - id: c
            text: "kill -9 requires superuser rights, while plain kill is available to any user"
          - id: d
            text: "There is no difference: -9 just raises the command's priority in the queue"
        correct: [a]
        explanation: "SIGKILL is handled directly by the system kernel, bypassing the process entirely: it takes no part in the decision and has no time to save anything. That is exactly why kill -9 is considered a last resort."

  - id: proc-blanks-001
    concept: processes
    type: fill-in-blanks
    difficulty: 2
    prompt: "Plain kill 2087 did not stop the hung process. Complete the command to send the SIGKILL signal, which the process cannot intercept or ignore."
    template: |
      $ kill {{flag}} 2087
    blanks:
      flag:
        accept: ['-9', '-KILL', '-SIGKILL']
        accept_regex: '^-(9|KILL|SIGKILL)$'
    explanation: "The -9 flag sends the SIGKILL signal. Unlike plain SIGTERM, it cannot be intercepted or delayed: the kernel stops the process without its involvement."
    hints:
      - "Plain kill was already tried with no result; a harsher signal is needed, one the process cannot ignore."
    variants:
      - prompt: "Complete the command to find and stop the firefox process by name, without manually looking up the PID via ps and grep."
        template: |
          $ {{cmd}} firefox
        blanks:
          cmd:
            accept: ['pkill']
            accept_regex: '^pkill$'
        explanation: "pkill takes a program name directly and finds matching processes itself, avoiding the manual ps aux | grep | kill chain."
      - prompt: "Complete the command so the long-running task long_task.sh starts in the background, and the terminal immediately returns a prompt for new commands."
        template: |
          $ long_task.sh {{bg}}
        blanks:
          bg:
            accept: ['&']
            accept_regex: '^&$'
        explanation: "The & character at the end of a line sends the command to the background: the shell starts it and immediately returns control, without waiting for it to finish."

  - id: proc-blanks-002
    concept: processes
    type: fill-in-blanks
    difficulty: 3
    prompt: "Complete the command with an explicit signal number so the result is equivalent to plain kill 2087 without flags."
    template: |
      $ kill {{sig}} 2087
    blanks:
      sig:
        accept: ['-15', '-TERM', '-SIGTERM']
        accept_regex: '^-(15|TERM|SIGTERM)$'
    explanation: "kill without flags sends signal number 15, SIGTERM, by default. The explicit form -15, -TERM, or -SIGTERM does the same thing, just without relying on the default."
    hints:
      - "Every signal has both a numeric code and a symbolic name; kill without flags uses one specific default signal."
    variants:
      - prompt: "Complete the command so the result is equivalent to kill -9 2087, but written with the signal's symbolic name instead of a number."
        template: |
          $ kill {{sig}} 2087
        blanks:
          sig:
            accept: ['-KILL', '-SIGKILL']
            accept_regex: '^-(KILL|SIGKILL)$'
        explanation: "The number 9 and the name KILL refer to the same signal, SIGKILL. kill -9 2087 and kill -KILL 2087 are fully equivalent."

  - id: proc-predict-001
    concept: processes
    type: predict-output
    difficulty: 2
    prompt: "The ps aux snapshot at the time the pipeline runs is shown in the fixture. What does the command print?"
    fixture: |
      ps aux prints this table at the time of execution:
      USER   PID  %CPU  %MEM  COMMAND
      anna   1042  0.1   0.3  bash
      anna   2087 97.4   4.1  firefox
      anna   2201  0.0   0.1  grep firefox
    snippet: |
      ps aux | grep firefox
    expected:
      kind: stdout
      value: "anna   2087 97.4   4.1  firefox\nanna   2201  0.0   0.1  grep firefox"
    explanation: "grep compares the pattern firefox against every line of the table. Both lines match, where the word firefox appears in the COMMAND column: the firefox process itself, and the line for the just-started grep firefox, whose own command-line argument also contains that word."
    hints:
      - "grep does not know you are looking for the 'real' process: it compares the pattern against the text of every line, without exceptions."
      - "grep itself has time to become a process and appear in the ps aux snapshot before it prints its result."
    variants:
      - prompt: "Same ps aux snapshot as in the fixture. How many lines does this command print? Enter a single number."
        fixture: |
          ps aux prints this table at the time of execution:
          USER   PID  %CPU  %MEM  COMMAND
          anna   1042  0.1   0.3  bash
          anna   2087 97.4   4.1  firefox
          anna   2201  0.0   0.1  grep firefox
        snippet: |
          ps aux | grep firefox | wc -l
        expected:
          kind: scalar
          value: 2
        explanation: "There are two matches for the word firefox in the COMMAND column: the firefox process itself and the line for the running grep firefox. wc -l counts the input lines and prints 2."

  - id: proc-predict-002
    concept: processes
    type: predict-output
    difficulty: 4
    prompt: "The app process, PID 3311, is written to intercept the SIGTERM signal and ignore it completely. What does the second command print after both lines run?"
    fixture: |
      The app process, PID 3311, intercepts SIGTERM and ignores it.
      ps aux snapshot before the commands run:
      USER   PID  %CPU  %MEM  COMMAND
      anna   3311  12.0   1.0  app
    snippet: |
      kill 3311
      ps aux | grep app | grep -v grep
    expected:
      kind: stdout
      value: "anna   3311  12.0   1.0  app"
    explanation: "kill without flags sends SIGTERM, and per the scenario app intercepts and ignores this request, so the process keeps running. The line for app still shows up in the second grep, and the first grep -v grep removes any line for the search itself from the result."
    hints:
      - "Recall which signal kill without flags sends, and whether a process can ignore it."
      - "grep -v grep at the end of the pipeline removes the search's own line from the result, if it would have shown up; focus on whether the app process is still alive."
    variants:
      - prompt: "The same app process, PID 3311, intercepts and ignores SIGTERM. This time kill -9 runs instead of plain kill. What does the second command print? If there is no output, leave the answer empty."
        snippet: |
          kill -9 3311
          ps aux | grep app | grep -v grep
        expected:
          kind: stdout
          value: ""
        explanation: "SIGKILL cannot be intercepted or ignored, so this time the app process is stopped immediately by the kernel. In the next ps aux snapshot, the app line is gone, and grep finds nothing."
