exercises:
  - id: env-quiz-001
    concept: environment
    type: theory-quiz
    difficulty: 1
    prompt: "Что хранит переменная PATH и зачем она шеллу?"
    choices:
      - id: a
        text: "Упорядоченный список каталогов, в которых шелл ищет исполняемый файл."
      - id: b
        text: "Путь к текущему каталогу, тот самый, который печатает pwd."
      - id: c
        text: "Историю всех команд, введённых в текущей сессии."
      - id: d
        text: "Путь к домашнему каталогу текущего пользователя."
    correct: [a]
    explanation: "PATH перечисляет каталоги через двоеточие, и шелл просматривает их слева направо в поисках файла с именем команды. Текущий каталог хранится в PWD, домашний в HOME, а история команд лежит в отдельном файле."
    hints:
      - "Вспомните, как шелл находит ls, хотя вы не писали /usr/bin/ls: где он подсматривает возможные места?"
      - "Эта переменная отвечает не за «где я», а за «где искать программы»."
    variants:
      - prompt: "PATH равен /usr/local/bin:/usr/bin:/bin, и исполняемый файл app лежит одновременно в /usr/bin и /bin. Что запустится по команде app?"
        choices:
          - id: a
            text: "/bin/app, потому что шелл берёт последнее совпадение."
          - id: b
            text: "/usr/bin/app, потому что шелл идёт слева направо."
          - id: c
            text: "Оба файла по очереди."
          - id: d
            text: "Шелл откажется запускать команду из-за неоднозначности."
        correct: [b]
        explanation: "Поиск по PATH идёт строго по порядку каталогов. В /usr/local/bin файла нет, в /usr/bin есть, на этом поиск заканчивается, и /bin даже не проверяется."
      - prompt: "Что печатает команда `which cp`?"
        choices:
          - id: a
            text: "Справку по использованию cp."
          - id: b
            text: "Список процессов, запущенных командой cp."
          - id: c
            text: "Полный путь к файлу."
          - id: d
            text: "Содержимое исполняемого файла cp."
        correct: [c]
        explanation: "which повторяет поиск по PATH и показывает первый найденный исполняемый файл. Это главный инструмент диагностики, когда по имени запускается «не та» команда."

  - id: env-quiz-002
    concept: environment
    type: theory-quiz
    difficulty: 2
    prompt: "Утром вы запустили редактор кода. Днём в том же сеансе выполнили в терминале `export API_URL=https://api.example.com`. Увидит ли уже работающий редактор эту переменную?"
    choices:
      - id: a
        text: "Да: окружение общее для всех процессов пользователя, изменения видны сразу."
      - id: b
        text: "Нет: редактор получил копию окружения при своём старте, и новые export родителя в неё не попадают."
      - id: c
        text: "Да, но только после того, как редактор сохранит все открытые файлы."
      - id: d
        text: "Нет, но система синхронизирует окружение в течение нескольких минут, и переменная появится."
    correct: [b]
    explanation: "Копия окружения делается один раз, в момент запуска процесса. Всё, что экспортировано позже, достаётся только новым потомкам; в уже работающие процессы изменения не проникают."
    hints:
      - "Ключевой вопрос: в какой момент процесс получает своё окружение и обновляется ли оно потом?"
      - "Представьте, что при старте процессу выдали фотокопию документа. Что будет с фотокопией, если оригинал исправить?"
    variants:
      - prompt: "Скрипт, запущенный из терминала, выполнил `export DEBUG=1` и завершился. Что напечатает `echo [$DEBUG]` в родительском шелле сразу после этого?"
        choices:
          - id: a
            text: "Пустые скобки []: изменения окружения потомка не поднимаются к родителю."
          - id: b
            text: "[1], потому что export делает переменную глобальной для всех процессов."
          - id: c
            text: "[1], но только если скрипт завершился без ошибок."
          - id: d
            text: "Сообщение об ошибке: переменная DEBUG уже удалена вместе со скриптом."
        correct: [a]
        explanation: "Скрипт менял собственную копию окружения, и она исчезла вместе с процессом. Родительский шелл свою копию не менял, поэтому подстановка пуста и остаются только скобки."
      - prompt: "Вы выполнили `export LANG=ru_RU.UTF-8` в терминале, а затем из этого же терминала запустили программу. Увидит ли она переменную?"
        choices:
          - id: a
            text: "Нет: export действует только на сам шелл и никому не передаётся."
          - id: b
            text: "Только если программа тоже написана на bash."
          - id: c
            text: "Да: программа стартовала после export и получила копию окружения."
          - id: d
            text: "Только после перезагрузки системы."
        correct: [c]
        explanation: "Наследование работает вниз и вперёд во времени: потомок, запущенный после export, получает копию окружения с этой переменной. Не видят её только процессы, стартовавшие раньше."

  - id: env-blanks-001
    concept: environment
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните команду, которая добавляет каталог /opt/tools/bin в конец списка поиска команд, не ломая уже настроенные каталоги."
    template: |
      {{cmd}} PATH="{{old}}:/opt/tools/bin"
    blanks:
      cmd:
        accept: ['export']
      old:
        accept: ['$PATH', '${PATH}']
    explanation: "export кладёт переменную в окружение, чтобы её унаследовали дочерние процессы, а подстановка $PATH сохраняет старый список каталогов. Без неё PATH стал бы одним-единственным каталогом, и шелл перестал бы находить даже ls."
    hints:
      - "Новый каталог должен дописаться к существующему списку, а не заменить его: как сослаться на текущее значение списка?"
      - "Первая часть команды отвечает за то, чтобы настройку унаследовали дочерние процессы."
    variants:
      - prompt: "Дополните команду добавления каталога в конец PATH: пропущены имя переменной и разделитель каталогов."
        template: |
          export {{var}}="$PATH{{sep}}/opt/tools/bin"
        blanks:
          var:
            accept: ['PATH']
          sep:
            accept: [':']
        explanation: "Список каталогов для поиска команд живёт в переменной PATH, а каталоги внутри неё разделяются двоеточием. Точка с запятой или пробел сломали бы список."
      - prompt: "Дополните команду, которая добавляет каталог /home/anna/scripts в конец PATH."
        template: |
          export PATH="$PATH:{{dir}}"
        blanks:
          dir:
            accept: ['/home/anna/scripts']
        explanation: "После двоеточия дописывается новый каталог. Он встаёт в конец списка, поэтому системные команды продолжают находиться первыми, а /home/anna/scripts используется как запасной вариант."

  - id: env-blanks-002
    concept: environment
    type: fill-in-blanks
    difficulty: 3
    prompt: "Заполните пропуски: первая строка создаёт переменную шелла CITY со значением Kazan, вторая делает её видимой для дочерних процессов, третья печатает Kazan."
    template: |
      {{assign}}
      {{make_env}} CITY
      bash -c 'echo $CITY'
    blanks:
      assign:
        accept: ['CITY=Kazan', 'CITY="Kazan"', "CITY='Kazan'"]
      make_env:
        accept: ['export']
    explanation: "Присваивание пишется слитно, CITY=Kazan: пробелы вокруг знака равенства превратили бы строку в вызов команды CITY. Одного присваивания мало, переменная остаётся внутри шелла, и только export переносит её в окружение, которое копией достаётся дочернему bash."
    hints:
      - "Переменная шелла и переменная окружения не одно и то же: дочерний процесс получает копию только второго набора."
      - "Первая строка задаёт значение, вторая отдаёт переменную потомкам. Какая команда отвечает за передачу?"
      - "Пробелы вокруг знака равенства заставят шелл искать команду с именем переменной."

  - id: env-predict-001
    concept: environment
    type: predict-output
    difficulty: 3
    prompt: "PATH и содержимое каталогов заданы ниже, все перечисленные файлы исполняемые. Что напечатает `which app`? Введите полный путь одной строкой."
    fixture: |
      PATH=/home/anna/bin:/usr/local/bin:/usr/bin

      /home/anna/bin: backup.sh
      /usr/local/bin: app
      /usr/bin: app env which
    snippet: |
      which app
    expected:
      kind: scalar
      value: "/usr/local/bin/app"
    explanation: "Шелл просматривает каталоги PATH слева направо. В /home/anna/bin файла app нет, в /usr/local/bin есть, поиск на этом заканчивается, и копия в /usr/bin остаётся невостребованной."
    hints:
      - "which повторяет тот же маршрут, что и шелл при запуске команды: каталоги проверяются в порядке записи в PATH."
      - "Найдите первый по порядку каталог, где файл app вообще есть, остальные не имеют значения."
    variants:
      - prompt: "PATH и содержимое каталогов заданы ниже, все перечисленные файлы исполняемые. Что напечатает `which app`? Введите полный путь одной строкой."
        fixture: |
          PATH=/home/anna/bin:/usr/local/bin:/usr/bin

          /home/anna/bin: app backup.sh
          /usr/local/bin: app
          /usr/bin: env which
        snippet: |
          which app
        expected:
          kind: scalar
          value: "/home/anna/bin/app"
        explanation: "Первый каталог в PATH уже содержит app, поэтому поиск останавливается сразу: побеждает /home/anna/bin/app, а копия в /usr/local/bin молча проигрывает."

  - id: env-predict-002
    concept: environment
    type: predict-output
    difficulty: 4
    prompt: "Терминал открыт в пустом каталоге, переменная CITY раньше не существовала. Что напечатают эти четыре строки? Введите вывод в точности, включая скобки и пустые строки внутри них."
    snippet: |
      CITY=Kazan
      bash -c 'echo [$CITY]'
      export CITY
      bash -c 'echo [$CITY]'
    expected:
      kind: stdout
      value: "[]\n[Kazan]"
    explanation: "Первая строка создаёт переменную шелла, но не переменную окружения: первый дочерний bash получает копию окружения без CITY, подстановка пуста, и остаются голые скобки. export переносит переменную в окружение, поэтому второй потомок печатает её значение внутри скобок."
    hints:
      - "Одиночное присваивание оставляет переменную внутри текущего шелла. Кто из участников примера её видит, а кто нет?"
      - "Каждый bash -c запускает новый процесс, и тот получает копию окружения родителя на момент своего старта. Что лежит в этой копии при первом запуске и что при втором?"
      - "Скобки печатаются в любом случае, вопрос только в том, что окажется между ними в каждой из двух строк вывода."
