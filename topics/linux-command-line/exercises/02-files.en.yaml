exercises:
  - id: files-quiz-001
    concept: files
    type: theory-quiz
    difficulty: 1
    prompt: "Which command renames the file staroe.txt to novoe.txt in the current directory?"
    choices:
      - id: a
        text: "mv staroe.txt novoe.txt"
      - id: b
        text: "cp staroe.txt novoe.txt"
      - id: c
        text: "mv novoe.txt staroe.txt"
      - id: d
        text: "cp novoe.txt staroe.txt"
    correct: [a]
    explanation: "mv takes the source first, then the destination, and renaming is the same operation for it as moving. cp would leave the old file in place, and swapped argument order would try to use a nonexistent novoe.txt."
    hints:
      - "Match the action in the scenario to what the command does, and check the argument order: source first, then destination."
    variants:
      - prompt: "Which command creates an empty file named zametki.txt in the current directory?"
        choices:
          - id: a
            text: "touch zametki.txt"
          - id: b
            text: "mkdir zametki.txt"
          - id: c
            text: "cat zametki.txt"
          - id: d
            text: "cp zametki.txt"
        correct: [a]
        explanation: "touch creates an empty file if it does not exist yet. mkdir would create a directory, cat would try to read a nonexistent file, and cp needs two arguments."
      - prompt: "Which command creates a directory named otchety in the current directory?"
        choices:
          - id: a
            text: "mkdir otchety"
          - id: b
            text: "touch otchety"
          - id: c
            text: "cat otchety"
          - id: d
            text: "rm -r otchety"
        correct: [a]
        explanation: "mkdir creates directories. touch would create a regular file with that name, cat would try to read it, and rm -r would instead delete a directory."

  - id: files-quiz-002
    concept: files
    type: theory-quiz
    difficulty: 2
    prompt: "The current directory already has a file b.txt. What happens after running `mv a.txt b.txt`?"
    choices:
      - id: a
        text: "b.txt is silently replaced with the contents of a.txt"
      - id: b
        text: "the shell asks for confirmation before overwriting"
      - id: c
        text: "the command fails: the file already exists"
      - id: d
        text: "a file b.txt.1 appears with the new contents"
    correct: [a]
    explanation: "mv overwrites an existing target without asking, and cp does the same. Confirmation only appears with the -i flag."
    hints:
      - "The terminal does not double-check: recall how the lesson's commands handle an already-existing target."
    variants:
      - prompt: "docs is a directory. What happens after running `cp docs backup` with no flags?"
        choices:
          - id: a
            text: "cp refuses and reports that it is skipping the directory"
          - id: b
            text: "cp copies the directory along with all its contents"
          - id: c
            text: "cp copies only an empty directory, without files"
          - id: d
            text: "cp asks whether to copy recursively"
        correct: [a]
        explanation: "Without -r, cp does not copy directories: it prints 'omitting directory' and skips it. Recursive copying must be enabled explicitly: cp -r docs backup."
      - prompt: "You ran `rm otchet.txt`. How can you get the file back using standard terminal tools?"
        choices:
          - id: a
            text: "you cannot: rm deletes permanently, there is no trash"
          - id: b
            text: "recover it from the trash with the restore command"
          - id: c
            text: "undo it with Ctrl+Z"
          - id: d
            text: "run rm -u otchet.txt"
        correct: [a]
        explanation: "rm does not move files to a trash and keeps no history: there is no built-in undo command. Only backups can save you."

  - id: files-blanks-001
    concept: files
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the commands: in one call create the directory chain arhiv/2026, then copy the docs directory along with all its contents into arhiv/2026."
    template: |
      $ mkdir {{pflag}} arhiv/2026
      $ cp {{rflag}} docs arhiv/2026
    blanks:
      pflag:
        accept: ['-p', '--parents']
        accept_regex: '^(-p|--parents)$'
      rflag:
        accept: ['-r', '-R', '--recursive']
        accept_regex: '^(-r|-R|--recursive)$'
    explanation: "The -p flag lets mkdir build the whole directory chain in one call, and -r enables recursive copying: without it cp skips directories."
    hints:
      - "Read the scenario literally: each missing part is named by its action."
      - "Recall which commands refuse to work with directories without a special flag."
    variants:
      - prompt: "Complete the commands: rename otchet.txt to otchet-final.txt, then move it into the existing arhiv directory."
        template: |
          $ {{ren}} otchet.txt otchet-final.txt
          $ mv otchet-final.txt {{dest}}
        blanks:
          ren:
            accept: ['mv']
            accept_regex: '^mv$'
          dest:
            accept: ['arhiv/', 'arhiv', './arhiv/', './arhiv']
            accept_regex: '^(\./)?arhiv/?$'
        explanation: "The same mv performs the rename as well as the move: source first, then destination. A trailing slash on arhiv/ guards against a silent rename if the directory turns out not to exist."
      - prompt: "Complete the commands: delete the staryj-arhiv directory along with all its contents, then copy all .txt files from the current directory into arhiv."
        template: |
          $ rm {{rmflag}} staryj-arhiv
          $ cp {{mask}} arhiv/
        blanks:
          rmflag:
            accept: ['-r', '-rf', '-R', '--recursive']
            accept_regex: '^(-r|-rf|-R|--recursive)$'
          mask:
            accept: ['*.txt']
            accept_regex: '^\*\.txt$'
        explanation: "rm without -r does not delete directories. The pattern *.txt is expanded by the shell into the list of all .txt files in the current directory."

  - id: files-predict-001
    concept: files
    type: predict-output
    difficulty: 2
    prompt: "The contents of the files are shown in the fixture. What does the command print?"
    fixture: |
      file spisok1.txt:
      hleb
      moloko

      file spisok2.txt:
      syr
    snippet: |
      cat spisok1.txt spisok2.txt
    expected:
      kind: stdout
      value: "hleb\nmoloko\nsyr"
    explanation: "cat concatenates the files in the order listed: first both lines of spisok1.txt, then the line from spisok2.txt."
    hints:
      - "Check the fixture: which lines are in each file, and does the command read them in full?"
      - "The command processes files in the order they are listed as arguments."
    variants:
      - snippet: |
          cat spisok2.txt spisok1.txt
        expected:
          kind: stdout
          value: "syr\nhleb\nmoloko"
        explanation: "Argument order determines output order: first the line from spisok2.txt, then both lines from spisok1.txt."
      - snippet: |
          tail -n 1 spisok1.txt
        expected:
          kind: stdout
          value: "moloko"
        explanation: "tail -n 1 prints the last line of a file; in spisok1.txt that is moloko."

  - id: files-predict-002
    concept: files
    type: predict-output
    difficulty: 3
    prompt: "The state of the directory is shown in the fixture. What does ls -1 print after mv runs?"
    fixture: |
      current directory:
        otchet.txt
        zakazy.csv
      the arhiv directory does not exist
    snippet: |
      mv otchet.txt arhiv
      ls -1
    expected:
      kind: stdout
      value: "arhiv\nzakazy.csv"
    explanation: "The arhiv directory does not exist, so mv does not move the file but renames it: otchet.txt becomes a file named arhiv. ls -1 prints one name per line in ASCII order."
    hints:
      - "mv does not distinguish moving from renaming: the outcome depends on whether the target exists as a directory."
      - "Check the fixture for whether the arhiv directory exists, and decide what otchet.txt becomes after the command."
      - "ls -1 prints names one per line, sorted by ASCII code."
