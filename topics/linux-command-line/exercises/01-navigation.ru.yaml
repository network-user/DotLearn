exercises:
  - id: nav-quiz-001
    concept: navigation
    type: theory-quiz
    difficulty: 1
    prompt: "Вы открыли терминал и не понимаете, в каком каталоге находитесь. Какая команда напечатает полный путь до текущего каталога?"
    choices:
      - id: a
        text: "pwd"
      - id: b
        text: "ls"
      - id: c
        text: "cd"
      - id: d
        text: "whereami"
    correct: [a]
    explanation: "pwd печатает абсолютный путь текущего каталога и ничего не меняет. ls показывает содержимое, cd перемещает, а команды whereami в стандартной поставке нет."
    hints:
      - "Переберите команды мысленно: одна сообщает место, другая показывает содержимое, третья перемещает."
    variants:
      - prompt: "Какая команда мгновенно вернёт вас в домашний каталог из любого места файловой системы?"
        choices:
          - id: a
            text: "cd без аргументов"
          - id: b
            text: "cd .."
          - id: c
            text: "cd /"
          - id: d
            text: "pwd"
        correct: [a]
        explanation: "cd без аргументов всегда ведёт в домашний каталог. cd .. поднимает лишь на один уровень вверх, cd / ведёт в корень, а pwd только печатает путь."
      - prompt: "Каким ключом ls показывает скрытые файлы, чьи имена начинаются с точки?"
        choices:
          - id: a
            text: "-a"
          - id: b
            text: "-l"
          - id: c
            text: "-1"
          - id: d
            text: "-h"
        correct: [a]
        explanation: "Ключ -a раскрывает скрытые имена, включая служебные . и .. в каждом каталоге. Ключ -l добавляет подробности, -1 печатает по одному имени в строке, -h делает размеры человекочитаемыми."

  - id: nav-quiz-002
    concept: navigation
    type: theory-quiz
    difficulty: 2
    prompt: "Вы находитесь в /home/anna/docs и выполняете `cd ..`. Какой путь напечатает pwd после этого?"
    choices:
      - id: a
        text: "/home/anna"
      - id: b
        text: "/home"
      - id: c
        text: "/"
      - id: d
        text: "/home/anna/docs"
    correct: [a]
    explanation: "Запись .. означает родительский каталог, поэтому из /home/anna/docs вы поднимаетесь ровно на один уровень, в /home/anna."
    hints:
      - "Нарисуйте дерево и двигайте точку «вы здесь» по шагам из условия."
    variants:
      - prompt: "Вы находитесь в /var/log и выполняете `cd /tmp`, а затем `cd -`. Какой путь напечатает pwd?"
        choices:
          - id: a
            text: "/var/log"
          - id: b
            text: "/tmp"
          - id: c
            text: "/var"
          - id: d
            text: "/"
        correct: [a]
        explanation: "cd - возвращает в каталог, где вы были до последнего перехода, то есть обратно в /var/log."
      - prompt: "Вы находитесь в /home/boris и выполняете `cd docs`. В какой каталог вы попадёте, если он существует?"
        choices:
          - id: a
            text: "/home/boris/docs"
          - id: b
            text: "/docs"
          - id: c
            text: "/home/docs"
          - id: d
            text: "/home/boris"
        correct: [a]
        explanation: "Путь без ведущего слэша относительный: он приклеивается к текущему каталогу, поэтому вы окажетесь в /home/boris/docs."

  - id: nav-blanks-001
    concept: navigation
    type: fill-in-blanks
    difficulty: 2
    prompt: "Вы стоите в /home/boris, каталог projects лежит прямо в нём. Дополните команды: перейдите в projects относительным путём и напечатайте полный путь текущего каталога."
    template: |
      $ cd {{dir}}
      $ {{show}}
      /home/boris/projects
    blanks:
      dir:
        accept: ['projects', './projects', 'projects/', './projects/']
        accept_regex: '^(\./)?projects/?$'
      show:
        accept: ['pwd']
        accept_regex: '^pwd$'
    explanation: "Относительный путь projects отсчитывается от текущего каталога /home/boris, а pwd печатает абсолютный путь и подтверждает, что переход удался."
    hints:
      - "Сначала определите по условию, где вы стоите и куда должна привести команда."
      - "Относительный путь не начинается с косой черты: он продолжает текущий каталог."
    variants:
      - prompt: "Вы стоите в /home/boris/projects. Дополните команду перехода в родительский каталог и впишите путь, который напечатает pwd."
        template: |
          $ cd {{up}}
          $ pwd
          {{result}}
        blanks:
          up:
            accept: ['..', '../']
            accept_regex: '^\.\./?$'
          result:
            accept: ['/home/boris']
            accept_regex: '^/home/boris/?$'
        explanation: "Служебное имя .. означает родительский каталог: из /home/boris/projects один уровень вверх ведёт в /home/boris."
      - prompt: "Вы стоите в /home/boris и хотите попасть в каталог логов /var/log. Дополните команду так, чтобы она сработала из любого места."
        template: |
          $ cd {{path}}
          $ pwd
          /var/log
        blanks:
          path:
            accept: ['/var/log', '/var/log/']
            accept_regex: '^/var/log/?$'
        explanation: "Цель лежит вне текущего каталога, поэтому нужен абсолютный путь от корня: он начинается с / и работает откуда угодно."

  - id: nav-predict-001
    concept: navigation
    type: predict-output
    difficulty: 2
    prompt: "Команды выполняются по очереди в одном терминале. Что напечатает pwd в последней строке?"
    fixture: |
      домашний каталог пользователя anna: /home/anna
      /home/anna/
        docs/
        music/
    snippet: |
      cd /home/anna
      cd docs
      pwd
    expected:
      kind: stdout
      value: "/home/anna/docs"
    explanation: "Первый cd использует абсолютный путь и ставит вас в /home/anna, второй относительный и спускается в docs. pwd печатает итог: /home/anna/docs."
    hints:
      - "Следите за точкой «вы здесь»: каждый cd передвигает её по дереву из fixture."
      - "Путь без ведущей косой черты приклеивается к текущему каталогу."
    variants:
      - snippet: |
          cd /home/anna/docs
          cd ..
          pwd
        expected:
          kind: stdout
          value: "/home/anna"
        explanation: "Служебное имя .. поднимает из /home/anna/docs на один уровень вверх, в /home/anna."
      - snippet: |
          cd /home/anna/music
          cd ~
          pwd
        expected:
          kind: stdout
          value: "/home/anna"
        explanation: "Символ ~ разворачивается в домашний каталог пользователя; по fixture это /home/anna."

  - id: nav-predict-002
    concept: navigation
    type: predict-output
    difficulty: 3
    prompt: "Вы стоите в /home/boris/work, его содержимое показано в fixture. Что напечатает ls -1?"
    fixture: |
      текущий каталог /home/boris/work:
        .config/
        Report.txt
        data/
        notes.txt
    snippet: |
      ls -1
    expected:
      kind: stdout
      value: "Report.txt\ndata\nnotes.txt"
    explanation: "Без ключа -a скрытый .config не показывается. Оставшиеся имена ls сортирует по кодам ASCII, где заглавные буквы идут раньше строчных: Report.txt, data, notes.txt."
    hints:
      - "Один из четырёх элементов каталога особенный: присмотритесь к первым символам имён."
      - "Сортировка идёт по кодам символов ASCII: весь верхний регистр стоит раньше всего нижнего."
      - "ls -1 печатает по одному имени в строке; каталоги выглядят как обычные имена, без слэша на конце."
