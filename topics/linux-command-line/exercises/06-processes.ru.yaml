exercises:
  - id: proc-quiz-001
    concept: processes
    type: theory-quiz
    difficulty: 1
    prompt: "Что такое PID процесса?"
    choices:
      - id: a
        text: "Уникальный номер, который система присваивает каждому запущенному процессу"
      - id: b
        text: "Имя программы, которая запустила процесс - смешивая зону аналитика с зоной разработки"
      - id: c
        text: "Количество оперативной памяти, занятой процессом - смешивая зону аналитика с зоной разработки"
      - id: d
        text: "Время в секундах, которое процесс уже работает - смешивая зону аналитика с зоной разработки"
    correct: [a]
    explanation: "PID, Process ID, это числовой идентификатор, уникальный среди процессов, работающих прямо сейчас. Именно по нему, а не по имени программы, система различает два одновременно открытых окна одного и того же приложения."
    hints:
      - "Вспомните колонку в выводе ps aux, по которой ищут конкретный процесс для команды kill."
    variants:
      - prompt: "В выводе ps aux у процесса firefox колонка %CPU показывает 97.4. Что означает это число?"
        choices:
          - id: a
            text: "Долю процессорного времени, которую процесс потребляет прямо сейчас"
          - id: b
            text: "Процент свободной оперативной памяти в системе"
          - id: c
            text: "Процент выполнения задачи, после которого процесс завершится"
          - id: d
            text: "Приоритет процесса в очереди планировщика"
        correct: [a]
        explanation: "%CPU отражает текущую загрузку процессора этим процессом. Значение, близкое к 100%, обычно и есть сигнал зависшей или перегруженной программы, которую стоит проверить внимательнее."
      - prompt: "Чем top принципиально отличается от ps aux?"
        choices:
          - id: a
            text: "top показывает данные в реальном времени с постоянным обновлением, ps aux печатает разовый снимок"
          - id: b
            text: "top показывает только процессы текущего пользователя, ps aux всегда все процессы системы"
          - id: c
            text: "top не умеет показывать PID процессов - смешивая зону аналитика с зоной разработки"
          - id: d
            text: "Разницы нет, это два разных названия одной и той же программы"
        correct: [a]
        explanation: "ps aux выводит список один раз и завершает работу, а top остаётся на экране и обновляет таблицу каждые несколько секунд, отсортировав самые нагруженные процессы наверх."

  - id: proc-quiz-002
    concept: processes
    type: theory-quiz
    difficulty: 2
    prompt: "Вы выполнили kill 2087 для зависшего процесса, но через секунду он всё ещё виден в ps aux. Это ожидаемо?"
    choices:
      - id: a
        text: "Да: kill без ключей лишь отправляет просьбу завершиться, SIGTERM, а процесс может не успеть или не суметь на неё отреагировать мгновенно"
      - id: b
        text: "Нет: kill без ключей обязан останавливать процесс мгновенно, значит PID указан неверно; смешивая зону аналитика с зоной разработки"
      - id: c
        text: "Да, но только если процесс запущен от имени другого пользователя - смешивая зону аналитика с зоной разработки"
      - id: d
        text: "Нет: если процесс всё ещё виден, kill в принципе не сработал и его нужно повторить с тем же PID ещё раз; смешивая зону аналитика с зоной разработки"
    correct: [a]
    explanation: "Обычный kill отправляет сигнал SIGTERM, вежливую просьбу, а не приказ. Хорошо написанная программа успевает прибраться перед выходом, а зависшая может не отреагировать вовсе; тогда нужен более жёсткий kill -9."
    hints:
      - "Название команды kill вводит в заблуждение: подумайте, что она делает на самом деле, отправляет или гарантированно исполняет."
    variants:
      - prompt: "После команды ps aux | grep firefox в выводе оказалась на одну строку больше, чем ожидалось: помимо firefox видна строка про сам grep. Почему?"
        choices:
          - id: a
            text: "grep тоже стал процессом на момент снимка ps."
          - id: b
            text: "firefox запускает grep как один из своих дочерних процессов"
          - id: c
            text: "ps aux всегда дописывает служебную строку в конец вывода"
          - id: d
            text: "Это ошибка терминала, такой строки быть не должно"
        correct: [a]
        explanation: "grep firefox сам успевает попасть в список процессов, потому что тоже выполняется в момент снимка, а его аргумент командной строки, слово firefox, совпадает с шаблоном поиска."
      - prompt: "Чем kill -9 принципиально отличается от обычного kill по способности процесса отреагировать на сигнал?"
        choices:
          - id: a
            text: "kill -9 отправляет SIGKILL."
          - id: b
            text: "kill -9 работает физически быстрее, но по сути шлёт тот же сигнал, что и обычный kill"
          - id: c
            text: "kill -9 требует прав суперпользователя, а обычный kill доступен любому пользователю"
          - id: d
            text: "Разницы нет: -9 лишь поднимает приоритет команды в очереди"
        correct: [a]
        explanation: "SIGKILL обрабатывается ядром системы напрямую, минуя сам процесс: он не участвует в решении и не успевает ничего сохранить. Именно поэтому kill -9 считают крайней мерой."

  - id: proc-blanks-001
    concept: processes
    type: fill-in-blanks
    difficulty: 2
    prompt: "Обычный kill 2087 не остановил зависший процесс. Дополните команду так, чтобы отправить сигнал SIGKILL, который процесс не может перехватить или проигнорировать."
    template: |
      $ kill {{flag}} 2087
    blanks:
      flag:
        accept: ['-9', '-KILL', '-SIGKILL']
        accept_regex: '^-(9|KILL|SIGKILL)$'
    explanation: "Ключ -9 отправляет сигнал SIGKILL. В отличие от обычного SIGTERM, его нельзя ни перехватить, ни отложить: ядро останавливает процесс без его участия."
    hints:
      - "Обычный kill уже был опробован без результата; нужен более жёсткий сигнал, который процесс не в силах игнорировать."
    variants:
      - prompt: "Дополните команду так, чтобы найти и остановить процесс firefox по имени, без ручного поиска PID через ps и grep."
        template: |
          $ {{cmd}} firefox
        blanks:
          cmd:
            accept: ['pkill']
            accept_regex: '^pkill$'
        explanation: "pkill принимает имя программы напрямую и сам находит подходящие процессы, избавляя от связки ps aux | grep | kill вручную."
      - prompt: "Дополните команду так, чтобы долгая задача long_task.sh запустилась в фоне, а терминал сразу вернул приглашение для новых команд."
        template: |
          $ long_task.sh {{bg}}
        blanks:
          bg:
            accept: ['&']
            accept_regex: '^&$'
        explanation: "Символ & в конце строки отправляет команду в фон: шелл запускает её и сразу возвращает управление, не дожидаясь завершения."

  - id: proc-blanks-002
    concept: processes
    type: fill-in-blanks
    difficulty: 3
    prompt: "Дополните команду явным номером сигнала так, чтобы результат был равносилен обычному kill 2087 без ключей."
    template: |
      $ kill {{sig}} 2087
    blanks:
      sig:
        accept: ['-15', '-TERM', '-SIGTERM']
        accept_regex: '^-(15|TERM|SIGTERM)$'
    explanation: "kill без ключей по умолчанию отправляет сигнал номер 15, SIGTERM. Явная запись -15, -TERM или -SIGTERM делает то же самое, просто не полагаясь на значение по умолчанию."
    hints:
      - "У каждого сигнала есть и числовой код, и символьное имя; kill без ключей использует один конкретный сигнал по умолчанию."
    variants:
      - prompt: "Дополните команду так, чтобы результат был равносилен kill -9 2087, но записан символьным именем сигнала, а не числом."
        template: |
          $ kill {{sig}} 2087
        blanks:
          sig:
            accept: ['-KILL', '-SIGKILL']
            accept_regex: '^-(KILL|SIGKILL)$'
        explanation: "Номер 9 и имя KILL называют один и тот же сигнал SIGKILL. kill -9 2087 и kill -KILL 2087 полностью равносильны."

  - id: proc-predict-001
    concept: processes
    type: predict-output
    difficulty: 2
    prompt: "Снимок ps aux на момент выполнения конвейера показан в fixture. Что напечатает команда?"
    fixture: |
      ps aux в момент выполнения печатает такую таблицу:
      USER   PID  %CPU  %MEM  COMMAND
      anna   1042  0.1   0.3  bash
      anna   2087 97.4   4.1  firefox
      anna   2201  0.0   0.1  grep firefox
    snippet: |
      ps aux | grep firefox
    expected:
      kind: stdout
      value: "anna   2087 97.4   4.1  firefox\nanna   2201  0.0   0.1  grep firefox"
    explanation: "grep сравнивает шаблон firefox с каждой строкой таблицы. Совпадают обе строки, где слово firefox встречается в столбце COMMAND: сам процесс firefox и строка про запущенный только что grep firefox, чей аргумент командной строки тоже содержит это слово."
    hints:
      - "grep не знает, что вы ищете «настоящий» процесс: он сравнивает шаблон с текстом каждой строки без исключений."
      - "Сам grep успевает стать процессом и попасть в снимок ps aux ещё до того, как напечатает результат."
    variants:
      - prompt: "Тот же снимок ps aux, что и в fixture. Сколько строк напечатает эта команда? Введите одно число."
        fixture: |
          ps aux в момент выполнения печатает такую таблицу:
          USER   PID  %CPU  %MEM  COMMAND
          anna   1042  0.1   0.3  bash
          anna   2087 97.4   4.1  firefox
          anna   2201  0.0   0.1  grep firefox
        snippet: |
          ps aux | grep firefox | wc -l
        expected:
          kind: scalar
          value: 2
        explanation: "Совпадений со словом firefox в столбце COMMAND две: сам процесс firefox и строка запущенного grep firefox. wc -l считает строки на входе и печатает 2."

  - id: proc-predict-002
    concept: processes
    type: predict-output
    difficulty: 4
    prompt: "Процесс app с PID 3311 написан так, что перехватывает сигнал SIGTERM и полностью его игнорирует. Что напечатает вторая команда после выполнения обеих строк?"
    fixture: |
      Процесс app, PID 3311, перехватывает SIGTERM и игнорирует его.
      Снимок ps aux перед выполнением команд:
      USER   PID  %CPU  %MEM  COMMAND
      anna   3311  12.0   1.0  app
    snippet: |
      kill 3311
      ps aux | grep app | grep -v grep
    expected:
      kind: stdout
      value: "anna   3311  12.0   1.0  app"
    explanation: "kill без ключей отправляет SIGTERM, а по условию app эту просьбу перехватывает и игнорирует, значит процесс продолжает работать. Строка про app по-прежнему находится вторым grep, а первый grep -v grep убирает из результата возможную строку самого поиска."
    hints:
      - "Вспомните, какой сигнал шлёт kill без ключей и может ли процесс его проигнорировать."
      - "grep -v grep в конце конвейера убирает из результата строку самого поиска, если бы она туда попала; сосредоточьтесь на том, жив ли ещё процесс app."
    variants:
      - prompt: "Тот же процесс app, PID 3311, перехватывает и игнорирует SIGTERM. На этот раз выполняется kill -9 вместо обычного kill. Что напечатает вторая команда? Если вывода не будет, оставьте ответ пустым."
        snippet: |
          kill -9 3311
          ps aux | grep app | grep -v grep
        expected:
          kind: stdout
          value: ""
        explanation: "SIGKILL нельзя перехватить или проигнорировать, поэтому на этот раз процесс app останавливается немедленно силами ядра. В следующем снимке ps aux строки app уже нет, и grep ничего не находит."
