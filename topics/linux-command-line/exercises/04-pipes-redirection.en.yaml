exercises:
  - id: redir-quiz-001
    concept: pipes-redirection
    type: theory-quiz
    difficulty: 1
    prompt: "Which operator redirects a command's standard output into a file, completely replacing its previous contents?"
    choices:
      - id: a
        text: ">"
      - id: b
        text: ">>"
      - id: c
        text: "<"
      - id: d
        text: "|"
    correct: [a]
    explanation: "A single > opens the file for writing and truncates it to zero bytes before the command starts writing. >> appends to the end, < feeds a file into a command's input, and | connects two commands together."
    hints:
      - "Of the four operators, only one works with a file on disk and specifically replaces it entirely."
    variants:
      - prompt: "Which operator appends a command's output to the end of a file without deleting what is already there?"
        choices:
          - id: a
            text: ">>"
          - id: b
            text: ">"
          - id: c
            text: "<"
          - id: d
            text: "2>"
        correct: [a]
        explanation: ">> opens the file for appending and adds new text after the existing contents. A single > erases the whole file, < reads a file, and 2> only concerns the error stream."
      - prompt: "Which operator feeds a file's contents into a command's standard input instead of the keyboard?"
        choices:
          - id: a
            text: "<"
          - id: b
            text: ">"
          - id: c
            text: "|"
          - id: d
            text: ">>"
        correct: [a]
        explanation: "< redirects stdin: the command reads the given file's contents as if they had been typed at the keyboard. The other operators work with output, not input."

  - id: redir-quiz-002
    concept: pipes-redirection
    type: theory-quiz
    difficulty: 2
    prompt: "The command find / -name \"*.conf\" > out.txt ran, but Permission denied messages still showed up on screen instead of in out.txt. Why?"
    choices:
      - id: a
        text: "The > operator only redirects stdout; error messages go to a separate stderr stream"
      - id: b
        text: "find does not support output redirection at all"
      - id: c
        text: "The out.txt file was read-only"
      - id: d
        text: "The redirection only worked for the first matching line"
    correct: [a]
    explanation: "stdout and stderr are two independent streams. > only changes the destination for stdout; to send error messages to the file too, stderr must be redirected separately, for example with 2>&1."
    hints:
      - "A command does not have one output channel, it has two, and they are numbered separately."
      - "Error messages are printed to a different place than a command's regular output by default."
    variants:
      - prompt: "To get both find's regular output and its error messages into a single file out.txt, someone wrote the command like this: find / -name \"*.conf\" 2>&1 > out.txt. The result was disappointing: errors are still visible on screen. What is going on?"
        choices:
          - id: a
            text: "2>&1 comes before >out.txt, so stderr copied stdout's old target, the terminal, instead of the new one"
          - id: b
            text: "2>&1 only works at the end of a command, regardless of position"
          - id: c
            text: "The 2>&1 operator does not actually exist in bash"
          - id: d
            text: "find ignores any redirection of the standard streams"
        correct: [a]
        explanation: "Operators are applied in order, left to right. At the moment 2>&1 ran, stdout was still pointed at the terminal, so stderr copied that exact target. Only after that did stdout itself switch to the file, but stderr no longer follows it. The correct order is > out.txt 2>&1."
      - prompt: "The build.sh script prints error messages to stderr. The command build.sh | grep error finds no errors, even though they definitely occurred. Why?"
        choices:
          - id: a
            text: "A pipe only connects the next command to stdout; stderr does not enter the pipeline"
          - id: b
            text: "grep cannot search for the word error, only exact error codes"
          - id: c
            text: "build.sh prints errors with a delay, and grep does not catch them in time"
          - id: d
            text: "The pipe would work, but only with grep's -r flag"
        correct: [a]
        explanation: "| connects the left command's standard output to the right command's input, while stderr keeps printing to the screen, bypassing the pipeline. For grep to see the errors too, the streams must first be merged: build.sh 2>&1 | grep error."

  - id: redir-blanks-001
    concept: pipes-redirection
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the command so the line is appended to the end of log.txt without erasing the history already accumulated there."
    template: |
      $ echo "deploy finished" {{op}} log.txt
    blanks:
      op:
        accept: ['>>']
        accept_regex: '^>>$'
    explanation: ">> opens the file for appending and adds text to the end, keeping everything written earlier. A single > would erase the entire log history."
    hints:
      - "The goal is to keep the old contents and add a new line after them, not replace the file entirely."
    variants:
      - prompt: "Complete the command so listing.txt is fully refreshed with the directory's current file list, and the old contents do not matter."
        template: |
          $ ls -1 {{op}} listing.txt
        blanks:
          op:
            accept: ['>']
            accept_regex: '^>$'
        explanation: "Since the previous contents of listing.txt do not matter, a single > fits: it truncates the file to zero bytes and writes the fresh list there."
      - prompt: "Complete the command so sort reads names not from the keyboard, but from the file names.txt."
        template: |
          $ sort {{op}} names.txt
        blanks:
          op:
            accept: ['<']
            accept_regex: '^<$'
        explanation: "< feeds a file's contents into a command's standard input. sort behaves as if the names had been typed at the keyboard, followed by Ctrl+D."

  - id: redir-blanks-002
    concept: pipes-redirection
    type: fill-in-blanks
    difficulty: 3
    prompt: "Complete the command so both find's regular output and its error messages end up in a single file all-output.log."
    template: |
      $ find / -name "*.conf" {{redir1}} all-output.log {{redir2}}
    blanks:
      redir1:
        accept: ['>']
        accept_regex: '^>$'
      redir2:
        accept: ['2>&1']
        accept_regex: '^2>&1$'
    explanation: "stdout is redirected to the file first with >, and only then does 2>&1 tell stderr to follow the new stdout target. If the operators were swapped, the errors would stay on screen."
    hints:
      - "Operator order matters: the destination for regular output must be set first."
      - "The second blank makes the error stream follow the already-redirected stdout."
    variants:
      - prompt: "The build.sh script prints errors to stderr. Complete the command so grep searches for the word error in both the regular output and the error messages."
        template: |
          $ build.sh {{combine}} | grep error
        blanks:
          combine:
            accept: ['2>&1']
            accept_regex: '^2>&1$'
        explanation: "2>&1 before the pipe merges stderr into stdout, and the combined stream then reaches grep's input. Without it, the pipe would only pass build.sh's regular output."

  - id: redir-predict-001
    concept: pipes-redirection
    type: predict-output
    difficulty: 2
    prompt: "The contents of access.log are shown in the fixture. What does the pipeline print? Enter a single number."
    fixture: |
      file access.log:
      GET /home 200
      GET /missing 404
      GET /api 200
      GET /old-page 404
      GET /catalog 200
    snippet: |
      cat access.log | grep 404 | wc -l
    expected:
      kind: scalar
      value: 2
    explanation: "cat prints all five lines, grep 404 keeps only the ones containing 404, of which there are two, and wc -l counts the input lines and prints 2."
    hints:
      - "Walk through the pipeline step by step: first the whole file, then the filtered lines, then their count."
      - "Count in the fixture how many lines contain the code 404."
    variants:
      - prompt: "Same access.log contents. What does this command print? Enter a single number."
        snippet: |
          cat access.log | grep 200 | wc -l
        fixture: |
          file access.log:
          GET /home 200
          GET /missing 404
          GET /api 200
          GET /old-page 404
          GET /catalog 200
        expected:
          kind: scalar
          value: 3
        explanation: "grep 200 keeps lines with code 200, of which there are three in the fixture, and wc -l counts those lines and prints 3."

  - id: redir-predict-002
    concept: pipes-redirection
    type: predict-output
    difficulty: 4
    prompt: "Before the command, names.txt contains three lines. The command sort names.txt > names.txt runs. How many lines will names.txt have afterward? Enter a single number."
    fixture: |
      names.txt before the command:
      boris
      anna
      irina
    snippet: |
      sort names.txt > names.txt
    expected:
      kind: scalar
      value: 0
    explanation: "The shell opens names.txt for writing and truncates it to zero bytes before sort even gets to read its contents. sort ends up reading an already-empty file, has nothing to sort, and writes nothing out: the file stays empty."
    hints:
      - "Think about the order of events: opening the file for writing versus reading that same file with sort."
      - "The > redirection prepares the file for writing before the command on its left gets to read anything from it."
    variants:
      - prompt: "Before the command, emails.txt contains four lines. The command uniq emails.txt > emails.txt runs. How many lines will emails.txt have afterward? Enter a single number."
        fixture: |
          emails.txt before the command:
          anna@firma.ru
          anna@firma.ru
          boris@firma.ru
          irina@firma.ru
        snippet: |
          uniq emails.txt > emails.txt
        expected:
          kind: scalar
          value: 0
        explanation: "The same trap as with sort: > truncates emails.txt to zero bytes before uniq manages to read it. uniq receives an empty file as input and writes nothing back."
