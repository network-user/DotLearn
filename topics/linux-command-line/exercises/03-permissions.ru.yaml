exercises:
  - id: perm-quiz-001
    concept: permissions
    type: theory-quiz
    difficulty: 1
    prompt: "Команда ls -l печатает строку прав -rwxr-xr--. Что разрешено группе, владеющей файлом?"
    choices:
      - id: a
        text: "Читать и выполнять, но не изменять файл"
      - id: b
        text: "Читать, изменять и выполнять файл без ограничений"
      - id: c
        text: "Только читать файл"
      - id: d
        text: "Только изменять файл, без права чтения"
    correct: [a]
    explanation: "Вторая тройка символов r-x относится к группе: r разрешает чтение, x выполнение, а прочерк на месте w означает, что права на запись у группы нет."
    hints:
      - "Строка после типа файла делится на три равные части по три символа: владелец, группа, остальные."
      - "Прочерк на месте буквы означает отсутствие именно этого права, а не отсутствие доступа вообще."
    variants:
      - prompt: "Команда ls -l печатает строку прав -rw-r--r--. Может ли владелец файла его выполнить как программу?"
        choices:
          - id: a
            text: "Нет: у владельца нет бита x"
          - id: b
            text: "Да, владелец может выполнять любой свой файл"
          - id: c
            text: "Да, но только если файл лежит в домашнем каталоге"
          - id: d
            text: "Нельзя определить по одной строке ls -l"
        correct: [a]
        explanation: "Первая тройка rw- принадлежит владельцу: есть чтение и запись, но бита x нет, значит запустить файл как программу нельзя, даже если это его собственный файл."
      - prompt: "Строка прав -rwxrwxr-x. Что разрешено пользователям, не входящим ни во владельца, ни в группу файла?"
        choices:
          - id: a
            text: "Читать и выполнять, но не изменять"
          - id: b
            text: "Читать, писать и выполнять без ограничений"
          - id: c
            text: "Никаких прав вообще"
          - id: d
            text: "Только запись, без чтения"
        correct: [a]
        explanation: "Третья тройка r-x относится к остальным пользователям системы: чтение и выполнение разрешены, а бита w нет, значит изменять файл они не могут."

  - id: perm-quiz-002
    concept: permissions
    type: theory-quiz
    difficulty: 2
    prompt: "У каталога reports права dr--r--r--, бита x нет ни у кого. Владелец пытается выполнить cd reports. Что произойдёт?"
    choices:
      - id: a
        text: "Ошибка доступа: без бита x войти в каталог нельзя, даже с правом на чтение"
      - id: b
        text: "cd сработает: право r уже разрешает переход в каталог"
      - id: c
        text: "cd сработает, но ls внутри покажет пустой список"
      - id: d
        text: "Ошибка произойдёт только у остальных пользователей, владельца она не коснётся"
    correct: [a]
    explanation: "На каталоге бит x отвечает за право войти в него и обратиться к файлам по имени; бита r для этого недостаточно. Без x команда cd завершится ошибкой доступа даже для владельца."
    hints:
      - "На файле и на каталоге буквы rwx означают разное: вспомните, за что каждая отвечает именно на каталоге."
      - "Право r на каталоге разрешает лишь узнать список имён внутри, а не войти в него."
    variants:
      - prompt: "У каталога arhiv права d--x--x--x. Владелец знает точное имя файла otchet.txt внутри и выполняет cat arhiv/otchet.txt. Получится ли прочитать файл?"
        choices:
          - id: a
            text: "Да, если у самого файла otchet.txt есть право на чтение"
          - id: b
            text: "Нет: без бита r на каталоге открыть ни один файл внутри нельзя"
          - id: c
            text: "Нет: bit x на каталоге вообще не даёт доступа к содержимому"
          - id: d
            text: "Да, право r на каталоге здесь не имеет значения"
        correct: [a]
        explanation: "Бит x на каталоге разрешает обращаться к файлам внутри по точному имени, даже без права r на сам каталог, которое нужно лишь для команды ls. Дальше решает право самого файла otchet.txt."
      - prompt: "У каталога docs права dr-xr-xr-x. Пользователь пытается создать в нём новый файл touch docs/note.txt. Получится ли?"
        choices:
          - id: a
            text: "Нет: создание файла требует права записи w на каталог, а его нет ни у кого"
          - id: b
            text: "Да, права r и x на каталоге для создания файла достаточно"
          - id: c
            text: "Да, если у пользователя есть право записи на сам файл note.txt"
          - id: d
            text: "Результат зависит только от прав файла note.txt, а не каталога"
        correct: [a]
        explanation: "Создание и удаление записей внутри каталога требует права записи на сам каталог, а не на файл: это изменение списка имён. Без w на docs команда touch завершится ошибкой доступа."

  - id: perm-blanks-001
    concept: permissions
    type: fill-in-blanks
    difficulty: 2
    prompt: "Файл deploy.sh имеет права -rw-r--r--. Дополните команду символьной записью так, чтобы владелец получил право на выполнение, а остальные права не изменились."
    template: |
      $ chmod {{flag}} deploy.sh
    blanks:
      flag:
        accept: ['u+x']
        accept_regex: '^u\+x$'
    explanation: "Символьная запись u+x добавляет право выполнения только владельцу, не трогая права группы и остальных, в отличие от восьмеричной записи, которая переписала бы все биты разом."
    hints:
      - "Нужно изменить ровно одну цель и добавить ровно одно право, не переписывая остальные биты."
      - "Буква цели: u владелец, g группа, o остальные, a все сразу; знак + добавляет право."
    variants:
      - prompt: "Файл secret.key имеет права -rw-r--r--. Дополните команду символьной записью так, чтобы отобрать право чтения у группы и у остальных, оставив права владельца без изменений."
        template: |
          $ chmod {{flag}} secret.key
        blanks:
          flag:
            accept: ['go-r']
            accept_regex: '^go-r$'
        explanation: "Цель go указывает сразу на группу и остальных, а знак - убирает у них право чтения; права владельца символьная запись не трогает, потому что он не назван в цели."
      - prompt: "Файл notes.txt имеет права -rw-------. Дополните команду так, чтобы выдать право чтения сразу всем: владельцу, группе и остальным."
        template: |
          $ chmod {{flag}} notes.txt
        blanks:
          flag:
            accept: ['a+r']
            accept_regex: '^a\+r$'
        explanation: "Буква a означает «все цели сразу»: владелец, группа и остальные получают право чтения одной командой, а существующие права записи и выполнения не меняются."

  - id: perm-blanks-002
    concept: permissions
    type: fill-in-blanks
    difficulty: 3
    prompt: "Дополните команду восьмеричной записью так, чтобы после неё права файла script.sh стали ровно -rwxr-xr-x."
    template: |
      $ chmod {{mode}} script.sh
    blanks:
      mode:
        accept: ['755']
        accept_regex: '^755$'
    explanation: "rwx у владельца это 4+2+1=7, r-x у группы и у остальных это 4+1=5 для каждой тройки: вместе получается 755, стандартный набор прав для исполняемых скриптов."
    hints:
      - "Разложите каждую тройку целевой строки на буквы и сложите их веса: r=4, w=2, x=1."
      - "Три получившиеся цифры пишутся подряд в порядке владелец, группа, остальные."
    variants:
      - prompt: "Дополните команду восьмеричной записью так, чтобы права файла config.yaml стали ровно -rw-r--r--, стандартный набор для обычных, не исполняемых файлов."
        template: |
          $ chmod {{mode}} config.yaml
        blanks:
          mode:
            accept: ['644']
            accept_regex: '^644$'
        explanation: "rw- у владельца это 4+2=6, r-- у группы и у остальных это 4 для каждой тройки: получается 644, права по умолчанию для большинства текстовых файлов."
      - prompt: "Дополните команду восьмеричной записью так, чтобы права файла id_rsa стали ровно -rw-------: читать и писать может только владелец, у группы и у остальных нет никаких прав."
        template: |
          $ chmod {{mode}} id_rsa
        blanks:
          mode:
            accept: ['600']
            accept_regex: '^600$'
        explanation: "rw- у владельца это 4+2=6, а у группы и у остальных все биты выключены, то есть 0: получается 600, привычный набор прав для приватных ключей и секретов."

  - id: perm-predict-001
    concept: permissions
    type: predict-output
    difficulty: 2
    prompt: "Файл report.sh сейчас имеет права -rw-r--r--. Выполняется команда chmod u+x report.sh, затем ls -l report.sh. Какой окажется строка прав в выводе? Введите только строку прав, например -rwxr--r--."
    fixture: |
      файл report.sh, права до команды: -rw-r--r--
    snippet: |
      chmod u+x report.sh
    expected:
      kind: scalar
      value: "-rwxr--r--"
    explanation: "u+x добавляет бит выполнения только владельцу: первая тройка rw- становится rwx, а тройки группы и остальных остаются без изменений, r--."
    hints:
      - "Символьная запись меняет только названную цель, остальные тройки строки прав остаются как в fixture."
      - "Добавляется ровно один бит в первой тройке; посчитайте, во что превращается rw- с добавленным x."
    variants:
      - prompt: "Файл backup.sh сейчас имеет права -rwxrwxr--. Выполняется команда chmod go-w backup.sh, затем ls -l backup.sh. Какой окажется строка прав? Введите только строку прав."
        snippet: |
          chmod go-w backup.sh
        fixture: |
          файл backup.sh, права до команды: -rwxrwxr--
        expected:
          kind: scalar
          value: "-rwxr-xr--"
        explanation: "go-w убирает право записи сразу у группы и у остальных. У группы rwx теряет w и превращается в r-x. У остальных бита w и так не было, r-- остаётся без изменений. Тройка владельца не названа в команде и остаётся rwx."

  - id: perm-predict-002
    concept: permissions
    type: predict-output
    difficulty: 4
    prompt: "Файл notes.txt сейчас имеет права -rw-r--r--. Выполняются подряд две команды. Какой окажется итоговая строка прав? Введите только строку прав."
    fixture: |
      файл notes.txt, права до команд: -rw-r--r--
    snippet: |
      chmod 664 notes.txt
      chmod o-r notes.txt
    expected:
      kind: scalar
      value: "-rw-rw----"
    explanation: "Первая команда переписывает права целиком в восьмеричной форме: 664 это rw- rw- r--. Вторая команда символьной записью убирает право чтения только у остальных: последняя тройка r-- становится ---, а тройки владельца и группы остаются rw- и rw-."
    hints:
      - "Восьмеричная команда полностью переписывает права; символьная после неё меняет только названную цель, остальные тройки наследуются от первого шага."
      - "Сначала разложите 664 на три тройки по буквам, потом примените вторую команду к результату первого шага, а не к исходным правам из fixture."

  - id: perm-predict-003
    concept: permissions
    type: predict-output
    difficulty: 3
    prompt: "Каталог reports имеет права dr--r--r--, бита x нет ни у кого. Выполняется команда cd reports. Что напечатает bash? Введите сообщение в точности."
    fixture: |
      текущий каталог содержит подкаталог reports с правами dr--r--r--
    snippet: |
      cd reports
    expected:
      kind: stdout
      value: "bash: cd: reports: Permission denied"
    explanation: "На каталоге бит x разрешает войти внутрь; без него cd завершается ошибкой доступа независимо от того, есть ли право чтения r. Bash сообщает об этом стандартной строкой Permission denied."
    hints:
      - "Право чтения на каталоге позволяет только увидеть список имён, а не войти внутрь: за вход отвечает другой бит."
      - "Вспомните стандартный текст, которым bash отвечает на отказ в доступе при попытке сменить каталог."
