exercises:
  - id: env-quiz-001
    concept: environment
    type: theory-quiz
    difficulty: 1
    prompt: "What does the PATH variable hold, and why does the shell need it?"
    choices:
      - id: a
        text: "An ordered list of directories where the shell looks for an executable when a command is typed without a path."
      - id: b
        text: "The path to the current directory, the same one pwd prints."
      - id: c
        text: "The history of every command entered in the current session."
      - id: d
        text: "The path to the current user's home directory."
    correct: [a]
    explanation: "PATH lists directories separated by colons, and the shell scans them left to right looking for a file matching the command name. The current directory lives in PWD, the home directory in HOME, and command history lives in a separate file."
    hints:
      - "Recall how the shell finds ls even though you did not type /usr/bin/ls: where does it look for candidates?"
      - "This variable is not about 'where am I', it is about 'where to look for programs'."
    variants:
      - prompt: "PATH is set to /usr/local/bin:/usr/bin:/bin, and an executable named app exists in both /usr/bin and /bin. What runs when you type app?"
        choices:
          - id: a
            text: "/bin/app, because the shell takes the last match."
          - id: b
            text: "/usr/bin/app, because the shell goes left to right and stops at the first match."
          - id: c
            text: "Both files, one after another."
          - id: d
            text: "The shell refuses to run the command because it is ambiguous."
        correct: [b]
        explanation: "PATH lookup strictly follows the order of directories. There is no file in /usr/local/bin, there is one in /usr/bin, the search stops there, and /bin is never even checked."
      - prompt: "What does the command `which cp` print?"
        choices:
          - id: a
            text: "The usage help for cp."
          - id: b
            text: "The list of processes started by the cp command."
          - id: c
            text: "The full path to the file the shell would run for the name cp."
          - id: d
            text: "The contents of the cp executable."
        correct: [c]
        explanation: "which repeats the PATH lookup and shows the first executable found. It is the main diagnostic tool when a command name runs 'the wrong' program."

  - id: env-quiz-002
    concept: environment
    type: theory-quiz
    difficulty: 2
    prompt: "In the morning you launched a code editor. In the afternoon, in the same session, you ran `export API_URL=https://api.example.com` in the terminal. Will the already-running editor see this variable?"
    choices:
      - id: a
        text: "Yes: the environment is shared across all of the user's processes, changes are visible immediately."
      - id: b
        text: "No: the editor received a copy of the environment when it started, and new exports from its parent do not reach it."
      - id: c
        text: "Yes, but only after the editor saves all open files."
      - id: d
        text: "No, but the system syncs the environment within a few minutes, and the variable will appear."
    correct: [b]
    explanation: "The environment is copied exactly once, the moment a process starts. Anything exported later only reaches new children; it never reaches processes that are already running."
    hints:
      - "The key question: at what moment does a process get its environment, and does it get updated afterward?"
      - "Imagine a process is handed a photocopy of a document at startup. What happens to the photocopy if the original is edited?"
    variants:
      - prompt: "A script launched from the terminal ran `export DEBUG=1` and then exited. What does `echo [$DEBUG]` print in the parent shell right after that?"
        choices:
          - id: a
            text: "Empty brackets []: a child's environment changes never propagate up to the parent."
          - id: b
            text: "[1], because export makes a variable global for every process."
          - id: c
            text: "[1], but only if the script exited without errors."
          - id: d
            text: "An error message: the DEBUG variable was removed along with the script."
        correct: [a]
        explanation: "The script modified its own copy of the environment, and that copy vanished along with the process. The parent shell never changed its own copy, so the substitution is empty and only the brackets remain."
      - prompt: "You ran `export LANG=ru_RU.UTF-8` in the terminal, then launched a program from that same terminal. Will it see the variable?"
        choices:
          - id: a
            text: "No: export only affects the shell itself and is never passed to anyone."
          - id: b
            text: "Only if the program is also written in bash."
          - id: c
            text: "Yes: the program started after the export and received a copy of the environment that already had the variable."
          - id: d
            text: "Only after the system is rebooted."
        correct: [c]
        explanation: "Inheritance works downward and forward in time: a child started after export gets a copy of the environment with that variable. Only processes that started earlier miss it."

  - id: env-blanks-001
    concept: environment
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the command that appends the directory /opt/tools/bin to the end of the command search list without breaking the directories already configured."
    template: |
      {{cmd}} PATH="{{old}}:/opt/tools/bin"
    blanks:
      cmd:
        accept: ['export']
      old:
        accept: ['$PATH', '${PATH}']
    explanation: "export puts a variable into the environment so child processes inherit it, and the $PATH substitution preserves the old list of directories. Without it, PATH would become a single directory, and the shell would stop finding even ls."
    hints:
      - "The new directory needs to be appended to the existing list, not replace it: how do you reference the list's current value?"
      - "The first part of the command is responsible for making sure child processes inherit the setting."
    variants:
      - prompt: "Complete the command that appends a directory to the end of PATH: the variable name and the directory separator are both missing."
        template: |
          export {{var}}="$PATH{{sep}}/opt/tools/bin"
        blanks:
          var:
            accept: ['PATH']
          sep:
            accept: [':']
        explanation: "The list of directories used for command lookup lives in the PATH variable, and the directories inside it are separated by a colon. A semicolon or a space would break the list."
      - prompt: "Complete the command that appends the directory /home/anna/scripts to the end of PATH."
        template: |
          export PATH="$PATH:{{dir}}"
        blanks:
          dir:
            accept: ['/home/anna/scripts']
        explanation: "The new directory is appended after the colon. It lands at the end of the list, so system commands keep being found first, while /home/anna/scripts is used as a fallback."

  - id: env-blanks-002
    concept: environment
    type: fill-in-blanks
    difficulty: 3
    prompt: "Fill in the blanks: the first line creates a shell variable CITY with the value Kazan, the second makes it visible to child processes, the third prints Kazan."
    template: |
      {{assign}}
      {{make_env}} CITY
      bash -c 'echo $CITY'
    blanks:
      assign:
        accept: ['CITY=Kazan', 'CITY="Kazan"', "CITY='Kazan'"]
      make_env:
        accept: ['export']
    explanation: "The assignment is written with no spaces, CITY=Kazan: spaces around the equals sign would turn the line into a call to a command named CITY. A plain assignment alone is not enough, the variable stays inside the shell, and only export moves it into the environment, which the child bash then receives a copy of."
    hints:
      - "A shell variable and an environment variable are not the same thing: a child process only gets a copy of the latter."
      - "The first line sets the value, the second hands the variable down to children. Which command is responsible for passing it along?"
      - "Spaces around the equals sign make the shell look for a command with the variable's name."

  - id: env-predict-001
    concept: environment
    type: predict-output
    difficulty: 3
    prompt: "PATH and the contents of the directories are given below, and every listed file is executable. What does `which app` print? Enter the full path on a single line."
    fixture: |
      PATH=/home/anna/bin:/usr/local/bin:/usr/bin

      /home/anna/bin: backup.sh
      /usr/local/bin: app
      /usr/bin: app env which
    snippet: |
      which app
    expected:
      kind: scalar
      value: "/usr/local/bin/app"
    explanation: "The shell scans PATH directories left to right. There is no app file in /home/anna/bin, there is one in /usr/local/bin, the search stops there, and the copy in /usr/bin is never needed."
    hints:
      - "which follows the same route the shell would take when running a command: directories are checked in the order listed in PATH."
      - "Find the first directory, in order, that actually contains the app file; the rest do not matter."
    variants:
      - prompt: "PATH and the contents of the directories are given below, and every listed file is executable. What does `which app` print? Enter the full path on a single line."
        fixture: |
          PATH=/home/anna/bin:/usr/local/bin:/usr/bin

          /home/anna/bin: app backup.sh
          /usr/local/bin: app
          /usr/bin: env which
        snippet: |
          which app
        expected:
          kind: scalar
          value: "/home/anna/bin/app"
        explanation: "The very first directory in PATH already contains app, so the search stops immediately: /home/anna/bin/app wins, and the copy in /usr/local/bin is silently ignored."

  - id: env-predict-002
    concept: environment
    type: predict-output
    difficulty: 4
    prompt: "The terminal is open in an empty directory, and the CITY variable never existed before. What do these four lines print? Enter the output exactly, including the brackets and any empty lines inside them."
    snippet: |
      CITY=Kazan
      bash -c 'echo [$CITY]'
      export CITY
      bash -c 'echo [$CITY]'
    expected:
      kind: stdout
      value: "[]\n[Kazan]"
    explanation: "The first line creates a shell variable, but not an environment variable: the first child bash gets a copy of the environment without CITY, the substitution is empty, and only bare brackets remain. export moves the variable into the environment, so the second child prints its value inside the brackets."
    hints:
      - "A single assignment leaves the variable inside the current shell. Which participant in the example sees it, and which does not?"
      - "Each bash -c starts a new process, which gets a copy of the parent's environment at the moment it starts. What is in that copy the first time, and what is in it the second time?"
      - "The brackets print either way; the only question is what ends up between them on each of the two output lines."
