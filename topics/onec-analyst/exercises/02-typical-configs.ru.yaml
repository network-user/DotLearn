exercises:
  - id: typical-configs-platform-001
    concept: typical-configs
    type: theory-quiz
    difficulty: 1
    prompt: "Что из перечисленного точнее всего описывает конфигурацию в 1С?"
    choices:
      - id: a
        text: "Прикладное решение со своими справочниками, документами и регистрами, которое исполняется платформой."
      - id: b
        text: "Отдельная программа, никак не связанная с платформой «1С:Предприятие»."
      - id: c
        text: "Версия платформы «1С:Предприятие», например 8.3.20."
      - id: d
        text: "Модуль администрирования пользователей и прав доступа."
    correct: [a]
    explanation: "Конфигурация - это прикладное решение поверх платформы: она описывает справочники, документы и регистры под конкретную задачу. Платформа их только исполняет, сама по себе она домена не знает."
    hints:
      - "Вспомните аналогию с движком и игрой: что в этой паре играет роль самой игры, а не движка?"
    variants:
      - prompt: "Что произойдёт, если на платформу «1С:Предприятие» не загрузить ни одной конфигурации?"
        choices:
          - id: a
            text: "Вести учёт будет нечем: без конфигурации нет ни справочников, ни документов, платформа - только движок форм и отчётов."
          - id: b
            text: "Появится базовый учёт «по умолчанию», встроенный прямо в платформу."
          - id: c
            text: "Платформа сама предложит выбрать одну из типовых конфигураций для установки."
          - id: d
            text: "Откроется упрощённая версия 1С:Бухгалтерии, идущая в комплекте с платформой."
        correct: [a]
        explanation: "Платформа не содержит прикладной логики: без конфигурации в ней нет ни одного справочника или документа. Она умеет исполнять только то, что описано в загруженном прикладном решении."
      - prompt: "Компания одновременно работает в 1С:Бухгалтерии и 1С:ERP. Сколько здесь платформ «1С:Предприятие», а сколько конфигураций?"
        choices:
          - id: a
            text: "Платформа одна и та же, движок общий; конфигурации разные - Бухгалтерия и ERP."
          - id: b
            text: "Две разные платформы и одна общая конфигурация на двоих."
          - id: c
            text: "Одна платформа и одна общая конфигурация, а разница только в оформлении интерфейса."
          - id: d
            text: "Платформа и конфигурация - это одно и то же, поэтому корректно говорить о двух одинаковых продуктах."
        correct: [a]
        explanation: "И Бухгалтерия, и ERP исполняются одной и той же платформой 8.3, но это два разных прикладных решения со своими справочниками, документами и логикой."

  - id: typical-configs-mapping-002
    concept: typical-configs
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните описание того, за какой участок отвечает каждая конфигурация."
    template: |
      {{ut}} ведёт склад, закупки, продажи и ценообразование, а {{buh}} формирует проводки и регламентированную отчётность в ФНС.
    blanks:
      ut:
        accept: ['Управление торговлей', 'управление торговлей', 'УТ', 'ут']
      buh:
        accept: ['1С:Бухгалтерия', 'Бухгалтерия', 'бухгалтерия', '1С Бухгалтерия', '1с:бухгалтерия']
    explanation: "Управление торговлей специализируется на оперативном контуре торговли: склад, закупки, продажи, цены. Бухгалтерия занимается только регламентированным учётом и отчётностью, к самой торговле она не притрагивается."
    hints:
      - "Один участок - это оперативная работа со складом и продажами, другой - проводки и отчётность в налоговую."
      - "Вспомните таблицу пяти конфигураций: у какой из них колонка «что решает» звучит как «склад, закупки, продажи»?"
    variants:
      - prompt: "Дополните описание того, за какой участок отвечает каждая конфигурация."
        template: |
          {{zup}} отвечает за кадры и расчёт зарплаты, а {{erp}} добавляет к торговле и финансам производственный контур и бюджетирование.
        blanks:
          zup:
            accept: ['ЗУП', 'зуп', 'Зарплата и управление персоналом', 'зарплата и управление персоналом']
          erp:
            accept: ['1С:ERP', 'ERP', 'эрп', '1с:erp', '1С:ERP Управление предприятием']
        explanation: "ЗУП специализируется на людях: приём, увольнение, расчёт зарплаты, отчётность по сотрудникам. ERP расширяет учёт до производства, многоуровневого бюджетирования и казначейства - контура для крупного бизнеса."
      - prompt: "Дополните описание того, за какой участок отвечает каждая конфигурация."
        template: |
          {{unf}} упрощённо закрывает сразу несколько задач малого бизнеса одним продуктом, а {{buh}} нужна компании любого размера для регламентированного учёта.
        blanks:
          unf:
            accept: ['УНФ', 'унф', 'Управление нашей фирмой', 'управление нашей фирмой']
          buh:
            accept: ['1С:Бухгалтерия', 'Бухгалтерия', 'бухгалтерия', '1с:бухгалтерия']
        explanation: "УНФ рассчитана на малый бизнес и упрощённо закрывает заказы, склад, деньги и зарплату в одном продукте. Бухгалтерия при этом нужна почти любой компании независимо от размера, потому что регламентированный учёт обязателен всегда."

  - id: typical-configs-zoo-003
    concept: typical-configs
    type: theory-quiz
    difficulty: 3
    prompt: "Компания ведёт продажи в УТ, а регламентированный учёт - в отдельной Бухгалтерии; между базами настроен обмен данными. Что аналитику стоит учитывать в этой архитектуре в первую очередь?"
    choices:
      - id: a
        text: "Обмен между базами - отдельная точка отказа: его нужно не только настроить, но и предусмотреть контроль, что данные доходят без потерь."
      - id: b
        text: "Ничего особенного: раз обмен настроен один раз при внедрении, дальше он работает сам и внимания не требует."
      - id: c
        text: "Обмен нужен только на время внедрения, после запуска в эксплуатацию его можно отключить."
      - id: d
        text: "Важно только то, что обе базы физически хранятся на одном сервере."
    correct: [a]
    explanation: "Правило обмена может остановиться из-за сетевой ошибки, конфликта версий или доработки, незаметно поменявшей формат выгружаемых данных. Если это не контролировать, бухгалтерия неделями не увидит свежих продаж, пока кто-то случайно не заметит расхождение."
    hints:
      - "Подумайте не о том, как настроить обмен один раз, а о том, что случится, если он однажды перестанет работать незаметно для всех."
      - "Вспомните пример из теории: обмен может отставать или ломаться. Кто и как должен это замечать в рабочем процессе компании?"

  - id: typical-configs-choose-004
    concept: typical-configs
    type: theory-quiz
    difficulty: 4
    prompt: "Небольшая производственная компания: 15 человек, один цех, простой учёт материалов и зарплаты, отдельного бухгалтера-методиста в штате нет. Какая типовая конфигурация подходит лучше всего на старте?"
    choices:
      - id: a
        text: "Управление нашей фирмой (УНФ) - закрывает заказы, склад, деньги и простую зарплату одним продуктом без долгого и дорогого внедрения."
      - id: b
        text: "1С:ERP Управление предприятием - сразу даёт запас на рост и полноценное производственное планирование."
      - id: c
        text: "Только 1С:Бухгалтерия предприятия - остального компании не требуется вовсе."
      - id: d
        text: "Связка из отдельных УТ, ЗУП и Бухгалтерии с настроенным обменом данными между тремя базами."
    correct: [a]
    explanation: "Для 15 человек без сложного производственного планирования УНФ закрывает нужные задачи одним продуктом, быстро и без лишней сложности. ERP на этом этапе избыточна и создаст издержки, которые компания не окупит, а связка из трёх баз добавит обмен данными там, где в нём нет необходимости - только Бухгалтерии для склада и зарплаты недостаточно."
    hints:
      - "Вернитесь к разделу «Что вас удивит»: типовую не стоит выбирать на вырост вслепую. Что это значит для компании из 15 человек?"
      - "Сравните сложность внедрения ERP или связки из трёх баз с тем, что реально нужно небольшой команде без сложного производства."

  - id: typical-configs-unf-erp-005
    concept: typical-configs
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните правило перехода от простой конфигурации к комплексной."
    template: |
      Пока хватает простого учёта без {{feature}}, {{small}} дешевле и быстрее во внедрении. Как только появляется многоуровневое производство или бюджет по нескольким юрлицам, компания дорастает до {{big}}.
    blanks:
      feature:
        accept: ['производственного планирования', 'производственное планирование']
      small:
        accept: ['УНФ', 'унф', 'Управление нашей фирмой']
      big:
        accept: ['1С:ERP', 'ERP', 'эрп', '1С:ERP Управление предприятием']
    explanation: "Пока производственного планирования и многоуровневого бюджета нет, УНФ решает задачи дешевле и быстрее. Их появление - сигнал, что компания перерастает УНФ и переходит на 1С:ERP."
    hints:
      - "Речь о моменте, когда простого продукта для малого бизнеса перестаёт хватать - что именно у него не получается делать?"
      - "Вспомните сравнение УНФ и ERP: какая система выдерживает многоуровневое производство и бюджет по нескольким юрлицам?"
    variants:
      - prompt: "Дополните правило о стоимости нескольких конфигураций рядом."
        template: |
          Связка из нескольких конфигураций требует настроенного и поддерживаемого {{exchange}}, и эта стоимость редко попадает в изначальную {{budget}} проекта.
        blanks:
          exchange:
            accept: ['обмена данными', 'обмена', 'синхронизации данных']
          budget:
            accept: ['смету', 'смету проекта', 'оценку']
        explanation: "Каждая новая конфигурация в связке добавляет отдельный обмен, который нужно настраивать, тестировать и поддерживать при обновлениях. Эти работы часто забывают заложить в первоначальную смету."
      - prompt: "Дополните правило про ЗУП и Бухгалтерию."
        template: |
          {{zup}} обычно дополняет {{buh}}, а не заменяется ею, потому что расчёт сложных схем начислений быстро выходит за рамки встроенного в бухгалтерию упрощённого расчёта.
        blanks:
          zup:
            accept: ['ЗУП', 'зуп', 'Зарплата и управление персоналом']
          buh:
            accept: ['Бухгалтерию', 'Бухгалтерия', 'бухгалтерию', '1С:Бухгалтерию']
        explanation: "Встроенного в Бухгалтерию упрощённого расчёта зарплаты хватает, только пока кадровых операций мало. Как только схемы начислений усложняются, компания подключает полноценный ЗУП рядом с Бухгалтерией, а не вместо неё."
