exercises:
  - id: writing-specs-hotelka-001
    concept: writing-specs
    type: theory-quiz
    difficulty: 1
    prompt: "Чем спецификация («постановка задачи») принципиально отличается от «хотелки» заказчика?"
    choices:
      - id: a
        text: "Постановка описывает сценарии, правила и критерии приёмки, а хотелка называет только желаемый эффект одной фразой."
      - id: b
        text: "Постановка обязательно длиннее хотелки, размер и есть главное отличие."
      - id: c
        text: "Постановку может писать только руководитель проекта, а хотелку - любой сотрудник."
      - id: d
        text: "Хотелка и постановка - два названия одного и того же документа."
    correct: [a]
    explanation: "Дело не в объёме текста. Постановка фиксирует контекст, объекты, сценарии, правила и критерии приёмки, поэтому разработчику не приходится додумывать бизнес-логику. Хотелка называет только желаемый результат и оставляет остальное на усмотрение разработчика."
    hints:
      - "Подумайте не о длине текста, а о том, что появляется в постановке, но отсутствует в короткой фразе."
    variants:
      - prompt: "Заказчик написал одной фразой: «Сделайте, чтобы система сама блокировала отгрузку, если товара не хватает». Чего не хватает этой формулировке, чтобы стать постановкой задачи?"
        choices:
          - id: a
            text: "Сценариев для особых случаев (виртуальные склады, возвраты), правил расчёта остатка и критериев приёмки."
          - id: b
            text: "Ничего не хватает, разработчик сам правильно решит все детали."
          - id: c
            text: "Не хватает только более благозвучного названия доработки."
          - id: d
            text: "Нужно просто заменить слово «отгрузка» на «реализация»."
        correct: [a]
        explanation: "Фраза называет желаемый эффект, но не описывает ветки (какие склады и документы исключить), правило расчёта остатка и то, по чему проверят результат. Без этого разработчик додумывает бизнес-логику сам."
      - prompt: "Почему постановка вида «хотелось бы, чтобы отчёт был удобнее» не может пойти в разработку напрямую?"
        choices:
          - id: a
            text: "Потому что «удобнее» - не сценарий и не критерий, разработчик не сможет проверить, выполнено ли требование."
          - id: b
            text: "Потому что отчёты в 1С дорабатывать нельзя."
          - id: c
            text: "Потому что такие формулировки может подавать только бухгалтер, а не аналитик."
          - id: d
            text: "Потому что любую хотелку обязаны сначала перевести на английский язык."
        correct: [a]
        explanation: "«Удобнее» не описывает ни конкретное изменение, ни критерий приёмки. Пока формулировка не превращена в сценарий с проверяемым результатом, разработчик не может понять, что именно сделать и когда задача закрыта."

  - id: writing-specs-parts-001
    concept: writing-specs
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните перечень обязательных частей хорошей постановки задачи."
    template: |
      Постановка обязательно включает контекст и {{goal}}, список затронутых {{objects}} метаданных, основной сценарий и {{scenarios}} сценарии, правила и {{rules}} проверки, критерии {{acceptance}} и влияние доработки на {{updatability}}.
    blanks:
      goal:
        accept: ['цель', 'цели']
      objects:
        accept: ['объектов', 'объекты']
      scenarios:
        accept: ['альтернативные', 'альтернативные и исключительные', 'исключительные']
      rules:
        accept: ['алгоритмы', 'алгоритм']
      acceptance:
        accept: ['приёмки', 'приемки']
      updatability:
        accept: ['обновляемость', 'обновляемость конфигурации', 'обновляемость системы']
    explanation: "Семь обязательных частей: контекст и цель (зачем), затронутые объекты метаданных (что трогаем), основной и альтернативные сценарии (что происходит в каждой ветке), правила и алгоритмы (как считать и проверять), критерии приёмки (по чему примут результат) и влияние на обновляемость (расширение или изменение типовой)."
    hints:
      - "Вспомните семь пунктов чек-листа: зачем, что трогаем, какие сценарии, как считать, по чему примут, что будет с обновлениями."
      - "Каждый пропуск легко проверить вопросом «а что если»: если он остаётся без ответа, значит, соответствующая часть постановки не заполнена."
    variants:
      - prompt: "Дополните описание того, когда постановке нужны дополнительные материалы."
        template: |
          Если разработчику важно увидеть, как должна выглядеть форма, или какие данные ожидаются, к постановке прикладывают {{mockups}} форм и примеры {{data}}.
        blanks:
          mockups:
            accept: ['макеты', 'макет']
          data:
            accept: ['данных', 'данные']
        explanation: "Макеты форм и примеры данных нужны не всегда, но там, где важен внешний вид или формулировка сообщения, без них разработчик придумает вариант сам, и он не обязательно совпадёт с ожиданиями заказчика."
      - prompt: "Дополните правило про доработку типовой конфигурации."
        template: |
          Если доработка меняет типовые объекты, в постановке указывают, оформляется ли она {{ext}} или прямым изменением {{typical}} конфигурации, потому что от этого зависит, переживёт ли доработка следующее {{update}}.
        blanks:
          ext:
            accept: ['расширением', 'расширение']
          typical:
            accept: ['типовой', 'типовой конфигурации']
          update:
            accept: ['обновление', 'обновления']
        explanation: "Для сопровождаемой типовой конфигурации способ оформления доработки не техническая деталь, а условие: расширение переживёт обновление, а правка типовых объектов напрямую рискует слететь при следующем обновлении."

  - id: writing-specs-detail-level-003
    concept: writing-specs
    type: theory-quiz
    difficulty: 3
    prompt: "Постановка на доработку отчёта «Продажи» требует: «Добавить колонку Маржа = Выручка минус Себестоимость, использовать функцию ОбщегоНазначения.ПолучитьСебестоимость(), объявить переменную МаржаРезультат типа Число, вставить проверку после строки 45 модуля отчёта». Что не так с уровнем детализации этой постановки?"
    choices:
      - id: a
        text: "Постановка спускается на уровень реализации (имя переменной, номер строки, конкретная функция) - это работа разработчика, а не аналитика."
      - id: b
        text: "Всё верно: чем подробнее описана реализация, тем быстрее и безопаснее сделает разработчик."
      - id: c
        text: "Единственная ошибка в том, что не указана единица измерения маржи."
      - id: d
        text: "Постановка обязана указывать номера строк кода, иначе разработчик не поймёт, куда вставлять правку."
    correct: [a]
    explanation: "Формула расчёта маржи и то, что берётся уже существующая себестоимость, - это бизнес-правило, и его место в постановке. А имя переменной, конкретная внутренняя функция и номер строки модуля - решения по реализации, которые должен принимать разработчик. Если постановка диктует их, разработчик теряет выбор инструмента, а при изменении структуры кода постановка мгновенно устаревает."
    hints:
      - "Отделите то, что описывает бизнес-правило (как считать маржу), от того, что описывает код (где именно писать, как назвать переменную)."
      - "Подумайте, что случится с этой постановкой, если разработчик решит реализовать проверку в другой процедуре или другим способом: перестанет ли она быть верной по сути?"

  - id: writing-specs-case-004
    concept: writing-specs
    type: theory-quiz
    difficulty: 4
    prompt: "Приведена постановка: «Доработать проведение документа Списание товаров: при выборе причины Брак создавать движение по регистру Товары на складах видом Расход и одновременно движение по регистру Себестоимость брака. Использовать типовые механизмы проведения». Постановка не описывает, по чему её примут. Что нужно добавить, чтобы сделать её проверяемой?"
    choices:
      - id: a
        text: "Конкретные тест-случаи с числами: например, при списании 5 единиц себестоимостью 100 рублей за штуку регистр Себестоимость брака должен получить движение на 500 рублей, а остаток по Товары на складах уменьшиться на 5."
      - id: b
        text: "Ничего добавлять не нужно: разработчик поймёт по описанию алгоритма, когда задача выполнена верно."
      - id: c
        text: "Нужно указать номер строки кода, где создаётся движение по регистру."
      - id: d
        text: "Нужно указать имя переменной для суммы себестоимости брака."
    correct: [a]
    explanation: "Постановка описывает алгоритм, но не критерий приёмки: без конкретных чисел «сделано верно» останется вопросом мнения. Тест-случай с точными входными данными и ожидаемым результатом проверяют одинаково и аналитик, и разработчик, и тестировщик. Номер строки и имя переменной - детали реализации, а не критерий приёмки, они ничего не проверяют."
    hints:
      - "Критерий приёмки должен быть проверяемым числом или сценарием, а не рассуждением о том, что «алгоритм должен работать корректно»."
      - "Представьте, что задачу проверяет тестировщик, который не читает код. По какому конкретному числу или сценарию он поймёт, что доработка сделана верно?"
