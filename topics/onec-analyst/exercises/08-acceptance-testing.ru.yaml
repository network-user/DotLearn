exercises:
  - id: acceptance-testing-why-001
    concept: acceptance-testing
    type: theory-quiz
    difficulty: 1
    prompt: "Зачем аналитику нужна приёмка доработки перед вводом в промышленную эксплуатацию?"
    choices:
      - id: a
        text: "Чтобы подтвердить: доработка делает именно то."
      - id: b
        text: "Чтобы найти более красивое архитектурное решение в коде"
      - id: c
        text: "Чтобы сократить срок разработки"
      - id: d
        text: "Чтобы переложить ответственность за баги на пользователей"
    correct: [a]
    explanation: "Приёмка не про красоту кода и не про скорость: она подтверждает, что результат соответствует записанным критериям приёмки требования, а не общему ощущению «работает»."
    hints:
      - "Вспомните разницу между «работает» и «работает так, как записано в требовании»: приёмка проверяет именно второе."
    variants:
      - prompt: "Разработчик сдал доработку со словами «у меня всё работает». Почему этого недостаточно, чтобы считать задачу принятой?"
        choices:
          - id: a
            text: "«Работает у меня» не проверяет соответствие конкретным критериям приёмки."
          - id: b
            text: "Недостаточно, потому что разработчик не имеет права закрывать задачи."
          - id: c
            text: "Недостаточно, пока заказчик не подписал бумажный акт."
          - id: d
            text: "Этого достаточно, дальнейшая проверка не нужна."
        correct: [a]
        explanation: "Среда и сценарий разработчика почти никогда не совпадают с тем, что описано в критериях приёмки и что встретится в реальной работе; нужна отдельная проверка именно по критериям."
      - prompt: "Что аналитик проверяет во время приёмки в первую очередь?"
        choices:
          - id: a
            text: "Совпадение фактического результата с ожидаемым."
          - id: b
            text: "Скорость работы кода доработки"
          - id: c
            text: "Стиль именования переменных в коде"
          - id: d
            text: "Наличие комментариев в коде доработки"
        correct: [a]
        explanation: "Приёмка сравнивает факт с заранее зафиксированным ожидаемым результатом, который выведен из критериев приёмки, а не оценивает качество кода."

  - id: acceptance-testing-structure-002
    concept: acceptance-testing
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните структуру тест-кейса, которую аналитик использует для приёмки доработки."
    template: |
      Тест-кейс состоит из {{pre}} (что должно быть готово до старта), шагов воспроизведения, {{exp}} (что должно произойти, если критерий выполнен) и {{act}} (что аналитик увидел в базе на самом деле).
    blanks:
      pre:
        accept: ['предусловия', 'предусловие']
      exp:
        accept: ['ожидаемого результата', 'ожидаемый результат']
      act:
        accept: ['фактического результата', 'фактический результат']
    explanation: "Тест-кейс держится на четырёх частях: предусловие задаёт стартовое состояние базы, шаги описывают точную последовательность действий, ожидаемый результат фиксирует, что должно произойти по критерию приёмки, а фактический результат появляется только в момент прогона теста."
    hints:
      - "Раньше, чем прогонять тест, аналитик фиксирует, что должно получиться: это одна из четырёх частей теста."
      - "Четыре части идут по порядку: состояние базы до старта, точные действия, теоретический итог и итог на практике."
    variants:
      - prompt: "Дополните конкретный тест-кейс на проведение документа: остаток саморезов и движение в регистре."
        template: |
          {{pre}}: остаток саморезов на складе составляет 300 штук.
          Шаг: проводят документ «Реализация товаров» на 80 штук.
          {{exp}}: остаток становится 220 штук, в регистре появляется движение расход 80.
          {{act}}: то, что аналитик увидел в базе после проведения документа.
        blanks:
          pre:
            accept: ['Предусловие']
          exp:
            accept: ['Ожидаемый результат']
          act:
            accept: ['Фактический результат']
        explanation: "Предусловие фиксирует стартовый остаток, ожидаемый результат считается по правилу «приход прибавили, расход вычли», а фактический результат сравнивают с ним уже после прогона теста."
      - prompt: "Дополните правило о том, что именно должен проверять тест-кейс."
        template: |
          Тест-кейс проверяет ровно те {{what}}, которые записаны в требовании как {{crit}}, не больше и не меньше.
        blanks:
          what:
            accept: ['условия', 'пункты', 'сценарии']
          crit:
            accept: ['критерии приёмки', 'критерии']
        explanation: "Тест-кейс не изобретает свою собственную проверку: он дословно повторяет условие из критерия приёмки требования."

  - id: acceptance-testing-predict-003
    concept: acceptance-testing
    type: predict-output
    difficulty: 2
    prompt: "Тест-кейс проверяет остаток гвоздей после проведения документов. Предусловие: остаток 500 штук. Шаг 1: проводят расходный документ «Реализация» на 120 штук. Шаг 2: проводят приходный документ «Поступление» на 80 штук. Каким числом нужно зафиксировать ожидаемый результат теста?"
    snippet: |
      Предусловие: остаток 500
      Шаг 1: Реализация, расход 120
      Шаг 2: Поступление, приход 80
    expected:
      kind: scalar
      value: 460
    explanation: "500 минус 120 плюс 80 равно 460. Ожидаемый результат тест-кейса считают так же, как система считает остаток: приходы прибавляют, расходы вычитают из предусловия."
    hints:
      - "Ожидаемый результат теста считается так же, как система считает остаток: приходы прибавляются, расходы вычитаются."
      - "Примените к предусловию сначала расходную операцию, затем приходную, по порядку шагов."
    variants:
      - prompt: "Тест-кейс проверяет остаток саморезов после проведения документов. Предусловие: остаток 300 штук. Шаг 1: проводят приходный документ «Поступление» на 150 штук. Шаг 2: проводят расходный документ «Реализация» на 90 штук. Каким числом нужно зафиксировать ожидаемый результат теста?"
        snippet: |
          Предусловие: остаток 300
          Шаг 1: Поступление, приход 150
          Шаг 2: Реализация, расход 90
        expected:
          kind: scalar
          value: 360
      - prompt: "Тест-кейс проверяет остаток краски после проведения документов. Предусловие: остаток 1000 штук. Шаг 1: проводят расходный документ «Реализация» на 400 штук. Шаг 2: проводят расходный документ «Реализация» на 250 штук. Каким числом нужно зафиксировать ожидаемый результат теста?"
        snippet: |
          Предусловие: остаток 1000
          Шаг 1: Реализация, расход 400
          Шаг 2: Реализация, расход 250
        expected:
          kind: scalar
          value: 350

  - id: acceptance-testing-regression-004
    concept: acceptance-testing
    type: theory-quiz
    difficulty: 3
    prompt: "Доработка успешно прошла приёмку полгода назад. Вышло очередное обновление типовой конфигурации, саму доработку никто не менял. Нужно ли заново прогонять по ней тест-кейсы?"
    choices:
      - id: a
        text: "Да: обновление могло изменить типовые процедуры, на которые опирается доработка."
      - id: b
        text: "Нет, раз код доработки не менялся, поведение гарантированно не изменится."
      - id: c
        text: "Достаточно визуально открыть форму и убедиться, что она не выдаёт ошибку при запуске."
      - id: d
        text: "Нужно, но только если пользователи сами пожалуются на проблему."
    correct: [a]
    explanation: "Доработка обычно вызывает типовые процедуры платформы. Обновление меняет их реализацию, и вызов может начать вести себя иначе, хотя код самой доработки остался прежним. Поэтому после каждого обновления конфигурации ключевые тест-кейсы прогоняют заново: это и есть регрессионное тестирование."
    hints:
      - "Подумайте, откуда доработка берёт часть своей логики: только из собственного кода или ещё из типовых процедур платформы."
      - "Если типовая процедура изменилась в новом релизе, а доработка её вызывает, что произойдёт с результатом вызова."

  - id: acceptance-testing-scenario-005
    concept: acceptance-testing
    type: theory-quiz
    difficulty: 4
    prompt: "Критерий приёмки требования гласит: «При попытке провести расходный документ на количество больше остатка система блокирует проведение и показывает сообщение об ошибке». Разработчик прислал: «Готово, у меня всё проводится корректно». Как аналитику правильно спроектировать тест-кейс для приёмки?"
    choices:
      - id: a
        text: "Задать предусловие с остатком меньше запрашиваемого расхода, шагом провести документ на большее количество."
      - id: b
        text: "Поверить сообщению разработчика и закрыть задачу без отдельной проверки."
      - id: c
        text: "Проверить только сценарий, где остатка достаточно и документ проводится без ошибок."
      - id: d
        text: "Составить тест-кейс без предусловия и без ожидаемого результата, раз критерий уже описан в требовании."
    correct: [a]
    explanation: "Слова разработчика «у меня всё проводится корректно» описывают положительный сценарий, а критерий требует именно блокировки при нехватке остатка. Тест-кейс должен воспроизвести условия из критерия дословно: создать нехватку остатка и зафиксировать как ожидаемый результат сообщение об ошибке, а не успешное проведение."
    hints:
      - "Критерий говорит про блокировку при нехватке остатка, а разработчик описал ровно противоположный сценарий."
      - "Хороший тест-кейс копирует условие критерия дословно: если критерий про нехватку остатка, предусловие обязано создавать именно нехватку."
