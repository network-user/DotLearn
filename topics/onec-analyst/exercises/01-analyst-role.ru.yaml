exercises:
  - id: analyst-role-what-001
    concept: analyst-role
    type: theory-quiz
    difficulty: 1
    prompt: "В чём главная задача аналитика 1С на проекте внедрения?"
    choices:
      - id: a
        text: "Переводить потребности бизнеса в формализованные требования и обратно проверять понимание."
      - id: b
        text: "Писать код доработок на встроенном языке 1С."
      - id: c
        text: "Отвечать за сроки и бюджет проекта."
      - id: d
        text: "Устанавливать и обновлять платформу на серверах."
    correct: [a]
    explanation: "Аналитик стоит между заказчиком и разработчиком и переводит в обе стороны: потребность в постановку, а решение обратно на язык бизнеса. Код пишет разработчик, за сроки отвечает руководитель проекта."
    hints:
      - "Вспомните образ переводчика между двумя мирами: кто говорит на языке бизнеса, а кто на языке метаданных."
    variants:
      - prompt: "Заказчик сказал «сделайте, чтобы система сама списывала брак». Что аналитик делает первым делом?"
        choices:
          - id: a
            text: "Задаёт уточняющие вопросы: что считать браком, кто подтверждает, каким документом оформлять."
          - id: b
            text: "Сразу проектирует форму документа и реквизиты."
          - id: c
            text: "Передаёт фразу разработчику дословно."
          - id: d
            text: "Пишет проводку по счёту 94."
        correct: [a]
        explanation: "Пожелание сначала уточняют, а не проектируют и не пересказывают дословно. За смутной фразой прячется десяток решений, которые должен принять бизнес."
      - prompt: "Что означает «переводить в обе стороны» в работе аналитика?"
        choices:
          - id: a
            text: "Отдавать разработчику постановку и возвращать заказчику решение на понятном ему языке, проверяя понимание."
          - id: b
            text: "Переводить документацию с английского на русский."
          - id: c
            text: "Работать и в бухгалтерском, и в управленческом учёте."
          - id: d
            text: "Совмещать роли аналитика и тестировщика."
        correct: [a]
        explanation: "Перевод в обе стороны это диалог: вниз к разработчику идёт формализованная задача, вверх к заказчику возвращается решение и проверка, что поняли друг друга одинаково."

  - id: analyst-role-path-001
    concept: analyst-role
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните путь, который проходит любое требование от смутного пожелания до готового результата."
    template: |
      Пожелание -> {{step2}} -> формализация -> {{step4}} -> приёмка
    blanks:
      step2:
        accept: ['уточнение', 'Уточнение', 'уточнения']
      step4:
        accept: ['постановка', 'Постановка', 'постановка задачи']
    explanation: "После пожелания идёт уточнение (что именно нужно и зачем), затем формализация в термины 1С, затем постановка задачи разработчику и только потом приёмка по критериям."
    hints:
      - "Между сырым пожеланием и формализацией всегда есть шаг, где аналитик задаёт вопросы бизнесу."
      - "Перед приёмкой должно появиться то, что аналитик отдаёт разработчику как задачу."
    variants:
      - prompt: "Дополните разделение ответственности между аналитиком и разработчиком."
        template: |
          Аналитик держит {{analyst}} (что и зачем), разработчик держит {{dev}} (как).
        blanks:
          analyst:
            accept: ['смысл', 'Смысл', 'требования']
          dev:
            accept: ['реализацию', 'реализация', 'код']
        explanation: "Аналитик отвечает за смысл: что и зачем нужно. Разработчик отвечает за реализацию: как это сделать в конфигурации. Смешение зон рождает дыры."
      - prompt: "Дополните правило про решения за бизнес."
        template: |
          Аналитик не {{verb}} за бизнес, а раскладывает {{noun}} с их ценой и оставляет выбор владельцу процесса.
        blanks:
          verb:
            accept: ['решает', 'Решает']
          noun:
            accept: ['варианты', 'альтернативы', 'options']
        explanation: "Решение за заказчика подрывает доверие: ответственность всё равно ляжет на владельца процесса. Задача аналитика показать варианты и их последствия."

  - id: analyst-role-boundaries-003
    concept: analyst-role
    type: theory-quiz
    difficulty: 3
    prompt: "На небольшом внедрении один человек совмещает роли аналитика и разработчика. Почему всё равно важно осознавать, в какой роли он сейчас?"
    choices:
      - id: a
        text: "Чтобы не пропустить зону ответственности: сначала понять что и зачем, только потом решать как."
      - id: b
        text: "Чтобы получать двойную оплату за две роли."
      - id: c
        text: "Роли не важны, если это один человек: он и так всё знает."
      - id: d
        text: "Чтобы заказчик видел в договоре две отдельные должности."
    correct: [a]
    explanation: "Совмещение ролей опасно тем, что аналитическая часть проглатывается: человек сразу кидается кодить, не уточнив потребность. Осознание роли удерживает порядок «сначала смысл, потом реализация» даже внутри одной головы."
    hints:
      - "Опасность не в оплате и не в договоре, а в том, что одна из двух зон работы незаметно выпадает."
      - "Какая часть страдает первой, когда разработчик внутри тебя торопится начать делать?"

  - id: analyst-role-scenario-004
    concept: analyst-role
    type: theory-quiz
    difficulty: 4
    prompt: "Заказчик требует: «Добавьте кнопку, которая выгружает отчёт по продажам в Excel каждое утро». Какой ход аналитика наиболее профессионален?"
    choices:
      - id: a
        text: "Спросить, какую задачу решает выгрузка: возможно, нужна не кнопка, а регламентная рассылка готового отчёта, и это дешевле."
      - id: b
        text: "Сразу поставить разработчику задачу сделать кнопку выгрузки в Excel."
      - id: c
        text: "Отказать: в типовой уже есть отчёт по продажам."
      - id: d
        text: "Решить за заказчика, что Excel не нужен, и предложить дашборд."
    correct: [a]
    explanation: "Заказчик пришёл с готовым решением (кнопка), но за ним прячется потребность (каждое утро видеть продажи). Если спросить «зачем», часто находится более дешёвый ход, например регламентное задание с рассылкой. Слепо ставить задачу, отказывать сходу или решать за бизнес - все три хуже, чем вскрыть настоящую потребность."
    hints:
      - "«Добавьте кнопку» это требование к решению. Что оно маскирует?"
      - "Прежде чем ставить или отклонять задачу, отделите потребность от предложенного способа её закрыть."
