exercises:
  - id: fit-gap-terms-001
    concept: fit-gap
    type: fill-in-blanks
    difficulty: 1
    prompt: "Дополните определения двух вердиктов fit-gap анализа."
    template: |
      Если типовая конфигурация полностью покрывает требование, аналитик отмечает его как {{fit}}. Если типовой не хватает и разрыв нужно закрывать отдельно, требование отмечают как {{gap}}.
    blanks:
      fit:
        accept: ['fit', 'Fit']
      gap:
        accept: ['gap', 'Gap']
    explanation: "Fit значит, что типовая закрывает требование как есть. Gap значит, что типовой не хватает и нужен отдельный путь решения - но сам по себе gap ещё не решение."
    hints:
      - "Вспомните два вердикта, которые ставят напротив каждого требования в таблице сопоставления."
    variants:
      - prompt: "Типовая печатная форма акта устраивает бухгалтерию без единой правки. Как это назвать в терминах fit-gap анализа?"
        template: |
          Это классический пример {{term}}: типовая функция закрывает потребность без всякой доработки.
        blanks:
          term:
            accept: ['fit', 'Fit']
        explanation: "Когда типовая покрывает требование без изменений, это fit."
      - prompt: "Заказчик просит начислять бонусы по формуле, которой нет в типовой. Как это назвать в терминах fit-gap анализа?"
        template: |
          Это {{term}}: типовая конфигурация не покрывает требование, и нужен отдельный путь решения.
        blanks:
          term:
            accept: ['gap', 'Gap']
        explanation: "Когда типовой не хватает функциональности для требования, это gap."

  - id: fit-gap-invasiveness-002
    concept: fit-gap
    type: fill-in-blanks
    difficulty: 2
    prompt: "Восстановите порядок реализации разрыва по возрастанию инвазивности."
    template: |
      Настройка штатными средствами -> {{step2}} -> {{step3}} -> изменение конфигурации
    blanks:
      step2:
        accept: ['внешний отчёт', 'внешняя обработка', 'внешние отчёты и обработки', 'внешние отчёты/обработки', 'внешний отчёт или обработка']
      step3:
        accept: ['расширение', 'расширение конфигурации', 'extension']
    explanation: "По возрастанию инвазивности: настройка штатными средствами, внешний отчёт или обработка, расширение конфигурации, изменение конфигурации. Каждый следующий шаг снимает больше ограничений, но обходится дороже при обновлениях."
    hints:
      - "Между настройкой без кода и изменением самой конфигурации есть ещё два промежуточных способа."
      - "Один способ вообще не трогает конфигурацию (отдельный файл), другой подключается к ней как отдельный слой, не меняя её код."
    variants:
      - prompt: "Восстановите два шага, стоящих между настройкой штатными средствами и изменением конфигурации, в правильном порядке."
        template: |
          {{step1}} -> внешний отчёт или обработка -> расширение конфигурации -> {{step4}}
        blanks:
          step1:
            accept: ['настройка', 'настройка штатными средствами']
          step4:
            accept: ['изменение конфигурации', 'изменение типовой конфигурации']
        explanation: "Полная цепочка по возрастанию инвазивности: настройка штатными средствами, внешний отчёт или обработка, расширение конфигурации, изменение конфигурации."
      - prompt: "Какой способ реализации разрыва наименее инвазивен, а какой наиболее?"
        template: |
          Наименее инвазивный способ - {{least}}, наиболее инвазивный - {{most}}.
        blanks:
          least:
            accept: ['настройка', 'настройка штатными средствами', 'настройка типового функционала']
          most:
            accept: ['изменение конфигурации', 'изменение типовой конфигурации']
        explanation: "Крайние точки шкалы инвазивности: настройка штатными средствами (минимум) и изменение конфигурации (максимум)."

  - id: fit-gap-support-003
    concept: fit-gap
    type: theory-quiz
    difficulty: 2
    prompt: "Чем расширение конфигурации (extension) принципиально отличается от прямого изменения конфигурации при закрытии gap?"
    choices:
      - id: a
        text: "Расширение не трогает основную конфигурацию и не снимает её с поддержки поставщика, поэтому автообновления остаются безопасными."
      - id: b
        text: "Расширение работает быстрее во время выполнения, чем обычный код конфигурации."
      - id: c
        text: "Расширение доступно только в облачной версии 1С."
      - id: d
        text: "Расширение может изменить абсолютно любой объект конфигурации без ограничений."
    correct: [a]
    explanation: "Расширение - отдельный слой, который подключается к заранее подготовленным точкам и не меняет код основной конфигурации, поэтому она остаётся на поддержке. Прямое изменение конфигурации снимает её с поддержки и требует ручного слияния при каждом обновлении."
    hints:
      - "Подумайте, что происходит с обновлениями поставщика в каждом из двух случаев."
    variants:
      - prompt: "Почему изменение самой конфигурации (не через расширение) со временем увеличивает стоимость владения системой?"
        choices:
          - id: a
            text: "Каждое обновление типовой требует ручного сравнения и объединения изменённых объектов, и чем их больше, тем дольше и рискованнее процедура."
          - id: b
            text: "Изменённая конфигурация занимает больше места на диске, и это единственная дополнительная плата."
          - id: c
            text: "Стоимость владения не меняется: доработка оплачивается один раз при внедрении."
          - id: d
            text: "Обновления после изменения конфигурации вообще перестают быть возможны."
        correct: [a]
        explanation: "Изменённая конфигурация снимается с поддержки: обновления больше не накатываются автоматически, каждое требует ручного слияния объект за объектом. Это и есть выросшая стоимость владения."
      - prompt: "Что означает «конфигурация снята с поддержки» в контексте 1С?"
        choices:
          - id: a
            text: "Конфигурация помечена как изменённая разработчиком, и типовые обновления поставщика больше не накатываются автоматически."
          - id: b
            text: "Отключена подписка на линию консультаций 1С:ИТС."
          - id: c
            text: "У организации закончилась лицензия на платформу."
          - id: d
            text: "База данных архивирована и недоступна для работы."
        correct: [a]
        explanation: "Снятие с поддержки - техническое состояние конфигурации: она изменена напрямую, поэтому автоматическое обновление больше не работает, и каждое обновление требует ручного сравнения-объединения."

  - id: fit-gap-criteria-004
    concept: fit-gap
    type: theory-quiz
    difficulty: 3
    prompt: "Разрыв встречается редко (раз в квартал), не критичен для бизнеса, но доработка стоит дорого и требует изменения самой типовой конфигурации. Что предпочтительнее?"
    choices:
      - id: a
        text: "Адаптировать бизнес-процесс под типовую: редкость и низкая критичность не окупают дорогую и рискованную доработку."
      - id: b
        text: "Дорабатывать в любом случае, раз требование поступило от заказчика."
      - id: c
        text: "Промолчать перед заказчиком и не сообщать о принятом решении."
      - id: d
        text: "Сразу менять конфигурацию, не рассматривая расширение или внешнюю обработку."
    correct: [a]
    explanation: "Решение о доработке опирается на частоту, критичность, стоимость доработки, стоимость владения и риск. Здесь частота и критичность низкие, а стоимость и риск высокие - это ровно тот случай, когда дешевле подправить процесс, чем дорабатывать."
    hints:
      - "Вспомните два измерения решения: как часто и насколько критично происходит операция против того, сколько стоит и чем рискует доработка."
      - "Соотнесите этот случай с матрицей решения: низкая частота и критичность, высокая стоимость и риск - какая зона это описывает?"

  - id: fit-gap-case-005
    concept: fit-gap
    type: theory-quiz
    difficulty: 4
    prompt: "Отдел продаж просит: при оформлении каждого заказа система должна автоматически проверять кредитный лимит клиента по сложной формуле с учётом просрочек и сезонных коэффициентов, которой нет в типовой. Операция происходит 200-300 раз в день, ошибка ведёт к отгрузке сверх лимита в долг. Как поступить аналитику?"
    choices:
      - id: a
        text: "Дорабатывать: операция частая и критичная для бизнеса, риск ошибки высок, а вручную считать лимит на таком объёме нереально - стоимость доработки оправдана."
      - id: b
        text: "Адаптировать процесс: пусть менеджеры считают лимит вручную по инструкции."
      - id: c
        text: "Отказать заказчику, так как в типовой конфигурации нет такой проверки."
      - id: d
        text: "Сразу менять ядро конфигурации, не рассматривая расширение как более щадящий вариант."
    correct: [a]
    explanation: "Частота 200-300 операций в день и высокая критичность (риск отгрузки в долг сверх лимита) перевешивают стоимость доработки: адаптация процесса руками менеджеров нереалистична при таком объёме. При этом реализовывать проверку стоит по возрастанию инвазивности - сначала проверить, закрывается ли она расширением, и только если нет, менять саму конфигурацию."
    hints:
      - "Оцените оба критерия: как часто происходит операция и насколько дорого обходится ошибка при отгрузке сверх лимита."
      - "Подумайте, реалистично ли адаптировать процесс (считать лимит вручную) при 200-300 операциях в день."
