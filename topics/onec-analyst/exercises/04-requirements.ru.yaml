exercises:
  - id: requirements-nonfunctional-001
    concept: requirements
    type: theory-quiz
    difficulty: 1
    prompt: "Какая из формулировок относится к нефункциональному требованию?"
    choices:
      - id: a
        text: "Отчёт должен открываться не более чем за две секунды при пятидесяти одновременных пользователях."
      - id: b
        text: "Система должна формировать печатную форму счёта на оплату."
      - id: c
        text: "Кладовщик должен иметь возможность запросить остаток по артикулу."
      - id: d
        text: "Сократить время проведения инвентаризации склада на треть."
    correct: [a]
    explanation: "Нефункциональное требование отвечает на вопрос «насколько хорошо», а не «что именно делает система»: скорость, безопасность, обновляемость. Печать счёта - функциональное требование, запрос остатка - пользовательское, сокращение времени инвентаризации - бизнес-требование."
    hints:
      - "Нефункциональное требование описывает качество работы системы, а не конкретное действие, которое она выполняет."
    variants:
      - prompt: "Какая из формулировок относится к пользовательскому требованию?"
        choices:
          - id: a
            text: "Менеджер по продажам должен иметь возможность увидеть список клиентов без контакта дольше тридцати дней."
          - id: b
            text: "Снизить отток клиентов на десять процентов за квартал."
          - id: c
            text: "Система должна еженедельно рассылать письмо со списком клиентов без контакта."
          - id: d
            text: "Письмо должно доставляться не позднее девяти утра по местному времени получателя."
        correct: [a]
        explanation: "Пользовательское требование описывает, что должен смочь сделать конкретный человек. Снижение оттока - бизнес-требование (зачем это нужно организации), рассылка письма - функциональное требование (что делает система), время доставки - нефункциональное (насколько хорошо)."
      - prompt: "Какая из формулировок относится к бизнес-требованию?"
        choices:
          - id: a
            text: "Сократить число просроченных отгрузок и связанные с этим претензии клиентов."
          - id: b
            text: "Диспетчер должен видеть просроченные отгрузки на одном экране."
          - id: c
            text: "Система должна подсвечивать отгрузку красным, если срок нарушен более чем на сутки."
          - id: d
            text: "Список просроченных отгрузок должен обновляться не реже раза в пять минут."
        correct: [a]
        explanation: "Бизнес-требование объясняет, зачем это вообще нужно организации. Видеть на одном экране - пользовательское требование, подсветка по правилу - функциональное, частота обновления - нефункциональное."

  - id: requirements-chain-blanks-002
    concept: requirements
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните цепочку уровней требований от причины к ограничению качества."
    template: |
      Бизнес-требование -> {{step2}} -> функциональное требование -> {{step4}}
    blanks:
      step2:
        accept: ['пользовательское требование', 'пользовательское', 'Пользовательское требование']
      step4:
        accept: ['нефункциональное требование', 'нефункциональное', 'Нефункциональное требование']
    explanation: "После бизнес-требования (зачем это нужно организации) идёт пользовательское (что сможет сделать человек), затем функциональное (что делает система) и нефункциональное (насколько хорошо: производительность, безопасность, обновляемость)."
    hints:
      - "Между «зачем это нужно организации» и «что делает система» есть уровень про конкретного человека и его действие."
      - "После того, что система делает, остаётся вопрос, насколько хорошо она это делает - скорость, безопасность, обновляемость."
    variants:
      - prompt: "Дополните структуру user story."
        template: |
          Формат user story: «Как роль, я хочу {{action}}, чтобы получить {{value}}».
        blanks:
          action:
            accept: ['действие', 'Действие']
          value:
            accept: ['ценность', 'Ценность', 'пользу', 'выгоду']
        explanation: "User story держится на трёх блоках: роль, действие и ценность. Без ценности формулировка превращается в список функций без причины, без действия - в благое пожелание без сути."
      - prompt: "Дополните порядок приоритетов MoSCoW от обязательного к отложенному."
        template: |
          Must -> {{step2}} -> Could -> {{step4}}
        blanks:
          step2:
            accept: ['Should', 'should']
          step4:
            accept: ["Won't", "won't", 'wont', 'Wont']
        explanation: "После Must (без этого потребность не закрывается) идёт Should (важно, но решение работает и без этого), затем Could (приятное дополнение) и Won't (сознательно отложено в этом релизе)."

  - id: requirements-moscow-priority-003
    concept: requirements
    type: theory-quiz
    difficulty: 3
    prompt: "В реестре по отчёту план-факт четыре требования: подсветка отставания более двадцати процентов, уведомление в мессенджер, экспорт в PDF и мобильное приложение с этим же отчётом. Времени хватает только на одно-два. Как аналитик должен применить MoSCoW, чтобы выбрать, что делать в первую очередь?"
    choices:
      - id: a
        text: "Найти требование, без которого исходная потребность (вовремя заметить отстающего менеджера) не закрывается вообще, и пометить его Must - остальное распределить вокруг него как Should, Could или Won't."
      - id: b
        text: "Сделать сначала то, что технически проще всего реализовать разработчику."
      - id: c
        text: "Отдать приоритет требованию, которое озвучили последним по времени на встрече."
      - id: d
        text: "Пометить все четыре требования как Must, чтобы точно ничего не забыть."
    correct: [a]
    explanation: "MoSCoW расставляет приоритет по важности для закрытия исходной потребности, а не по простоте разработки и не по порядку поступления пожеланий. Must достаётся только тому, без чего решение вообще не работает - в этом случае подсветке отставания; уведомление и экспорт можно отложить как Should и Could, а мобильное приложение - как Won't в этом релизе."
    hints:
      - "MoSCoW сортирует требования по важности для потребности, а не по удобству или порядку разработки."
      - "Спросите: без какого из четырёх пунктов отчёт вообще не решает исходную проблему - не заметить отстающего вовремя?"

  - id: requirements-problem-vs-solution-004
    concept: requirements
    type: theory-quiz
    difficulty: 4
    prompt: "Менеджер по продажам говорит: «Добавьте в CRM кнопку, которая раз в день сама шлёт мне на почту список клиентов, с которыми давно не связывались». Как аналитику правильнее всего сформулировать это как user story?"
    choices:
      - id: a
        text: "Как менеджер по продажам, я хочу получать список клиентов без контакта дольше тридцати дней, чтобы вовремя восстановить связь и не потерять клиента - а способ доставки (кнопка, письмо или регламентное задание) решить отдельно."
      - id: b
        text: "Как менеджер по продажам, я хочу кнопку в CRM, чтобы раз в день получать письмо со списком клиентов."
      - id: c
        text: "Как разработчик, я хочу реализовать почтовую рассылку по клиентам, чтобы менеджер был доволен результатом."
      - id: d
        text: "Передать фразу менеджера разработчику как есть - формулировка и так достаточно понятна для реализации."
    correct: [a]
    explanation: "Кнопка и письмо на почту - это уже предложенное решение, а не потребность. Правильная user story фиксирует ценность для роли (не потерять клиента из-за отсутствия связи), а способ её достичь ещё предстоит выбрать: возможно, дешевле обойтись регламентным заданием без всякой кнопки. Вариант b фиксирует решение вместо потребности, вариант c даже роль перепутал, вариант d - роль испорченного телефона без единого уточняющего вопроса."
    hints:
      - "«Кнопка» и «письмо на почту» - это уже предложенное решение. Какая потребность стоит за ним?"
      - "User story описывает ценность для роли, а не конкретный экранный элемент или канал доставки."
