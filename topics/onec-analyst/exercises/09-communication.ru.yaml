exercises:
  - id: communication-loop-quiz-001
    concept: communication
    type: theory-quiz
    difficulty: 1
    prompt: "Что в первую очередь определяет успешную коммуникацию аналитика с заказчиком?"
    choices:
      - id: a
        text: "Проверка, что обе стороны поняли решение одинаково."
      - id: b
        text: "Скорость ответа на сообщения в переписке."
      - id: c
        text: "Использование профессиональных терминов 1С в разговоре с заказчиком."
      - id: d
        text: "Формальный деловой тон при любом общении."
    correct: [a]
    explanation: "Ядро коммуникации аналитика это проверка понимания: сказал, переформулировал, подтвердил, зафиксировал. Скорость ответа и терминология вторичны и не спасают от расхождения в понимании."
    hints:
      - "Вспомните петлю: сказал, переформулировал, подтвердил, зафиксировал. Какой шаг здесь главный?"
    variants:
      - prompt: "Заказчик на встрече быстро проговорил требование, а аналитик сразу перешёл к следующему вопросу, ничего не переспросив. Какой шаг петли понимания он пропустил?"
        choices:
          - id: a
            text: "Переформулировать услышанное своими словами и получить подтверждение."
          - id: b
            text: "Написать код доработки"
          - id: c
            text: "Сослаться на типовую конфигурацию - смешивая зону аналитика с зоной разработки"
          - id: d
            text: "Назначить дату приёмки"
        correct: [a]
        explanation: "Без переформулировки и подтверждения аналитик продолжает работу с собственным домысливанием вместо проверенного понимания заказчика."
      - prompt: "Почему устная договорённость без письменного следа считается опасной?"
        choices:
          - id: a
            text: "Потому что со временем у сторон расходится память о том, что решили."
          - id: b
            text: "Потому что устное общение запрещено правилами документооборота."
          - id: c
            text: "Потому что разработчик не умеет слушать заказчика."
          - id: d
            text: "Потому что заказчик обычно намеренно искажает договорённости."
        correct: [a]
        explanation: "Дело не в недобросовестности сторон, а в том, что человеческая память ненадёжна. Через две недели оба участника искренне помнят разные версии, и спор нечем разрешить."

  - id: communication-loop-blanks-002
    concept: communication
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните петлю проверки понимания, которую аналитик проходит на каждой встрече."
    template: |
      {{step1}} -> переформулировал -> {{step3}} -> {{step4}}
    blanks:
      step1:
        accept: ['сказал', 'Сказал']
      step3:
        accept: ['подтвердил', 'Подтвердил']
      step4:
        accept: ['зафиксировал', 'Зафиксировал']
    explanation: "Петля повторяется на каждом уточнении: сказал, переформулировал, подтвердил, зафиксировал. Пропуск любого шага создаёт свою типичную ошибку коммуникации."
    hints:
      - "Первый шаг делает заказчик: он формулирует мысль своими словами."
      - "Последний шаг превращает устную договорённость в письменный след."
    variants:
      - prompt: "Дополните рабочее правило аналитика про устные договорённости."
        template: |
          Нет {{artifact}}, не было {{result}}.
        blanks:
          artifact:
            accept: ['письма', 'протокола']
          result:
            accept: ['решения']
        explanation: "Устная договорённость живёт до первого расхождения в памяти участников. Протокол или письмо превращают её в проверяемый факт."
      - prompt: "Дополните правило управления ожиданиями."
        template: |
          Управление ожиданиями значит вслух проговорить {{scope}} задачи и не {{promise}} за разработчика.
        blanks:
          scope:
            accept: ['объём', 'сроки и объём']
          promise:
            accept: ['обещать']
        explanation: "Управление ожиданиями означает заранее вслух проговорить сроки и объём задачи, включая то, что в неё не входит, и не обещать сроки от имени разработчика."

  - id: communication-stakeholders-quiz-003
    concept: communication
    type: theory-quiz
    difficulty: 3
    prompt: "Аналитик согласовал новое правило списания брака только с руководителем отдела продаж, не спросив кладовщиков, которые каждый день будут проводить эти документы. Чем это грозит?"
    choices:
      - id: a
        text: "Конечные пользователи не увидят смысла в новом шаге."
      - id: b
        text: "Ничем: раз согласовано с руководителем, остальные обязаны исполнять без вопросов."
      - id: c
        text: "Кладовщики автоматически поддержат решение, потому что оно от начальства."
      - id: d
        text: "Проект точно ускорится, потому что согласований меньше."
    correct: [a]
    explanation: "Требование редко исходит от одного человека. Те, кто работает с системой каждый день, видят неудобства, которых не видит владелец процесса, и их несогласие часто выливается в сопротивление или обход системы, а не в открытый спор."
    hints:
      - "Чьё согласие получили, а чьё нет? Кто будет каждый день нажимать кнопки в новой форме?"
      - "Сопротивление внедрению почти всегда сигнал о чём-то неучтённом, а не каприз."

  - id: communication-conflict-scenario-004
    concept: communication
    type: theory-quiz
    difficulty: 4
    prompt: "На встрече кладовщик настаивает, что браком нужно считать только физическую порчу, а главный бухгалтер настаивает, что нужно учитывать ещё и пересортицу, и договориться при вас не получается. Как правильно поступить аналитику?"
    choices:
      - id: a
        text: "Зафиксировать оба мнения в протоколе как открытый вопрос и вынести решение на владельца процесса."
      - id: b
        text: "Принять сторону бухгалтера, потому что бухгалтерский учёт важнее складского."
      - id: c
        text: "Принять сторону кладовщика, потому что он ближе к реальной операции."
      - id: d
        text: "Самостоятельно предложить компромиссное определение брака и сразу внести его в постановку."
    correct: [a]
    explanation: "Спор двух стейкхолдеров не повод аналитику решать самому, чья формулировка правильная: это решение за бизнес, а не перевод его потребности. Открытый вопрос фиксируется письменно и передаётся владельцу процесса, который вправе его закрыть."
    hints:
      - "Аналитик не решает за бизнес, даже когда решение кажется очевидным."
      - "Какой артефакт фиксирует спорный момент, пока решение не принято, и кому по-хорошему принадлежит право его принять?"
