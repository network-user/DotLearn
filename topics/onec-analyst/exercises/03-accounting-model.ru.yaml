exercises:
  - id: accounting-where-lives-001
    concept: accounting-model
    type: theory-quiz
    difficulty: 1
    prompt: "Где в 1С хранится текущий остаток товара на складе?"
    choices:
      - id: a
        text: "В регистре накопления как свёртка приходов и расходов."
      - id: b
        text: "В карточке товара в справочнике «Номенклатура» как поле «Остаток»."
      - id: c
        text: "В настройках склада."
      - id: d
        text: "В отчёте, который сохраняется вместе с остатком."
    correct: [a]
    explanation: "Остаток нигде не лежит готовым числом: это свёртка движений регистра накопления на заданную дату. Справочник отвечает на «что это», а не «сколько»."
    hints:
      - "Справочник отвечает на вопрос «что это», а «сколько и когда» это уже другой вид объекта."
    variants:
      - prompt: "Аналитик пишет: «Добавьте в справочник номенклатуры поле остатка». Что не так с этой постановкой?"
        choices:
          - id: a
            text: "Остаток не атрибут товара, а свёртка движений регистра; поле в справочнике разойдётся с реальностью."
          - id: b
            text: "Всё верно, так и надо хранить остаток."
          - id: c
            text: "Ошибка только в том, что поле надо назвать иначе."
          - id: d
            text: "Нужно добавить поле не в номенклатуру, а в справочник складов."
        correct: [a]
        explanation: "Хранить остаток полем нельзя: он производная от движений. Такое поле сразу начнёт врать, потому что документы его не обновляют."
      - prompt: "Какой объект 1С отвечает на вопрос «сколько и когда», а не «что это»?"
        choices:
          - id: a
            text: "Регистр."
          - id: b
            text: "Справочник."
          - id: c
            text: "Константа."
          - id: d
            text: "Перечисление."
        correct: [a]
        explanation: "Справочник хранит относительно статичные сущности (что это), а количество, суммы и их историю (сколько и когда) хранит регистр."

  - id: accounting-balance-predict-002
    concept: accounting-model
    type: predict-output
    difficulty: 2
    prompt: "По регистру «Товары на складах» прошли движения ниже. Какой остаток гвоздей покажет отчёт на конец периода? Ответ числом."
    snippet: |
      Номенклатура: Гвозди
      Поступление №1  приход  500
      Реализация №5   расход  120
      Поступление №2  приход  200
      Реализация №9   расход  100
    expected:
      kind: scalar
      value: 480
    explanation: "Остаток это сумма приходов минус сумма расходов: 500 + 200 − 120 − 100 = 480. Никакого хранимого поля, только свёртка движений."
    hints:
      - "Остаток не берётся из карточки: сложите приходы и вычтите расходы."
      - "Отдельно просуммируйте всё, что пришло, отдельно всё, что ушло, и вычтите второе из первого."
    variants:
      - prompt: "По регистру прошли движения ниже. Какой остаток на конец периода? Ответ числом."
        snippet: |
          Номенклатура: Саморезы
          Поступление №3  приход  300
          Реализация №7   расход  50
          Поступление №4  приход  80
          Реализация №8   расход  130
        expected:
          kind: scalar
          value: 200
      - prompt: "По регистру прошли движения ниже. Какой остаток на конец периода? Ответ числом."
        snippet: |
          Номенклатура: Краска
          Ввод остатков   приход  1000
          Реализация №11  расход  400
          Реализация №12  расход  350
        expected:
          kind: scalar
          value: 250

  - id: accounting-terms-blanks-003
    concept: accounting-model
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните описание того, как документ наполняет регистр."
    template: |
      При {{action}} документ читает свою табличную часть и записывает в регистр строки-{{rows}}. Такой документ называют {{role}} этих строк.
    blanks:
      action:
        accept: ['проведении', 'проведение', 'проводке']
      rows:
        accept: ['движения', 'движений', 'движение']
      role:
        accept: ['регистратором', 'регистратор']
    explanation: "Проведение документа порождает движения в регистрах; документ, породивший движения, называется их регистратором. Отмена проведения движения убирает."
    hints:
      - "Действие, которое превращает документ в источник записей регистра, начинается на «про...»."
      - "Строки, которые документ пишет в регистр, и роль самого документа по отношению к ним - два родственных термина."
    variants:
      - prompt: "Дополните различие между двумя видами регистров."
        template: |
          Количество, которое складывается в остатки и обороты, хранит регистр {{acc}}. Значение, действующее с какого-то момента (цена, курс), хранит регистр {{info}}.
        blanks:
          acc:
            accept: ['накопления', 'накопление']
          info:
            accept: ['сведений', 'сведения']
        explanation: "Складывается количество - регистр накопления. Действует значение на момент времени - регистр сведений."
      - prompt: "Дополните правило о разнице между сохранением и проведением."
        template: |
          Документ можно {{save}} без проведения - тогда движений нет и на остаток он не влияет. Движения появляются только при {{post}}.
        blanks:
          save:
            accept: ['записать', 'сохранить', 'запись']
          post:
            accept: ['проведении', 'проведение', 'проводке']
        explanation: "Записать значит сохранить документ в базе. Пока он не проведён, движений в регистрах нет, поэтому «документ есть, а в отчёте пусто» это почти всегда непроведённый документ."

  - id: accounting-postavka-scenario-004
    concept: accounting-model
    type: theory-quiz
    difficulty: 4
    prompt: "Заказчик просит: «При загрузке из старой системы проставьте в номенклатуре остатки напрямую в поле». Как аналитику корректно переформулировать задачу?"
    choices:
      - id: a
        text: "Ввести начальные остатки документом (например, «Ввод остатков»), который создаст движения в регистре накопления."
      - id: b
        text: "Добавить в справочник номенклатуры поле «Остаток» и записать туда числа из старой системы."
      - id: c
        text: "Записать остатки в регистр сведений «Цены»."
      - id: d
        text: "Отказать: перенести остатки в 1С невозможно."
    correct: [a]
    explanation: "Остаток нельзя проставить полем: он свёртка движений. Начальные остатки вводят специальным документом, который порождает движения в регистре накопления, и тогда данные согласованы. Регистр сведений «Цены» тут ни при чём, а перенос остатков штатно возможен."
    hints:
      - "Остаток производен от движений. Значит, чтобы он появился, нужно не поле, а то, что движения создаёт."
      - "Каким объектом 1С в принципе можно записать движение в регистр накопления?"
