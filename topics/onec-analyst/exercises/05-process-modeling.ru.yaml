exercises:
  - id: process-modeling-elements-001
    concept: process-modeling
    type: theory-quiz
    difficulty: 1
    prompt: "Что в BPMN обозначает шлюз (ромб) на карте процесса?"
    choices:
      - id: a
        text: "Точку ветвления, где путь заявки расходится в зависимости от условия."
      - id: b
        text: "Один конкретный шаг, который выполняет исполнитель."
      - id: c
        text: "Момент, когда процесс запускается или завершается."
      - id: d
        text: "Исполнителя, который отвечает за шаг."
    correct: [a]
    explanation: "Шлюз (ромб) это точка ветвления по условию: из нескольких исходящих стрелок в реальности пойдёт только одна (для эксклюзивного шлюза). Задача выполняет шаг, событие отмечает начало или конец, а исполнителя показывает дорожка."
    hints:
      - "Вспомните фигуру на карте, которая не выполняет шаг сама, а решает, куда пойдёт заявка дальше."
    variants:
      - prompt: "Что в BPMN обозначает прямоугольник на карте процесса?"
        choices:
          - id: a
            text: "Один конкретный шаг, который выполняет исполнитель."
          - id: b
            text: "Точку ветвления по условию."
          - id: c
            text: "Начало или конец процесса."
          - id: d
            text: "Полосу, закреплённую за ролью."
        correct: [a]
        explanation: "Прямоугольник это задача: один шаг, у которого есть конкретный исполнитель («проверить остаток», «согласовать заявку»). Ветвление показывает ромб-шлюз, начало и конец - кружки-события, роль - дорожка."
      - prompt: "Что показывает дорожка (lane), в которой лежит элемент карты процесса?"
        choices:
          - id: a
            text: "Кто исполнитель этого шага."
          - id: b
            text: "По какому условию происходит ветвление."
          - id: c
            text: "Сколько времени занимает шаг."
          - id: d
            text: "Каким документом оформлен шаг в 1С."
        correct: [a]
        explanation: "Дорожка отвечает на вопрос, кто исполнитель: каждый элемент карты лежит в дорожке той роли, которая его выполняет. Условие ветвления показывает подпись на шлюзе, а не дорожка."

  - id: process-modeling-vocab-blanks-002
    concept: process-modeling
    type: fill-in-blanks
    difficulty: 1
    prompt: "Дополните описание базовых элементов карты процесса."
    template: |
      {{ev}} отмечает начало или конец процесса. {{task}} - это один шаг, который выполняет исполнитель. {{gw}} показывает точку ветвления по условию.
    blanks:
      ev:
        accept: ['Событие', 'событие']
      task:
        accept: ['Задача', 'задача']
      gw:
        accept: ['Шлюз', 'шлюз']
    explanation: "Событие (кружок) отмечает начало и конец процесса, задача (прямоугольник) это один шаг конкретного исполнителя, шлюз (ромб) это точка ветвления по условию."
    hints:
      - "Три фигуры BPMN на этой карте: кружок, прямоугольник и ромб. Подставьте название каждой по её роли в тексте."
    variants:
      - prompt: "Дополните описание оставшихся элементов карты процесса."
        template: |
          {{flow}} соединяет элементы карты и показывает порядок выполнения. {{lane}} показывает, какой исполнитель отвечает за шаг.
        blanks:
          flow:
            accept: ['Поток', 'поток', 'Поток управления', 'поток управления']
          lane:
            accept: ['Дорожка', 'дорожка']
        explanation: "Поток управления (стрелка) связывает элементы и задаёт порядок, а дорожка внутри пула закрепляет каждый элемент за конкретной ролью-исполнителем."
      - prompt: "Дополните правило про конечные события процесса."
        template: |
          Процесс может иметь несколько {{end}} событий - например {{outcome1}} и {{outcome2}}, если у заявки разные исходы.
        blanks:
          end:
            accept: ['конечных', 'конечных событий']
          outcome1:
            accept: ['отгружено', 'заказ отгружен', 'заказ выполнен']
          outcome2:
            accept: ['отказ', 'отказ клиенту']
        explanation: "У процесса часто несколько конечных событий: happy path (например «отгружено») и альтернативные исходы (например «отказ»), и оба должны быть нарисованы на карте, а не только успешный путь."

  - id: process-modeling-astobe-003
    concept: process-modeling
    type: theory-quiz
    difficulty: 2
    prompt: "Аналитик пришёл к заказчику и сразу нарисовал схему целевого процесса с автоматической маршрутизацией, не спросив, как заявки обрабатываются сейчас. Что он пропустил?"
    choices:
      - id: a
        text: "As-is: модель текущего процесса, которая показывает реальные узкие места и исключения."
      - id: b
        text: "Согласование бюджета проекта."
      - id: c
        text: "Выбор нотации для схемы."
      - id: d
        text: "Ничего не пропустил, to-be можно проектировать сразу."
    correct: [a]
    explanation: "Без as-is to-be превращается в решение для непроверенной проблемы: аналитик не знает, где сейчас теряется время и кто на самом деле принимает решения, поэтому рискует спроектировать красивую схему, которая не устраняет реальные узкие места."
    hints:
      - "Вспомните пару терминов: одна модель описывает то, что есть сегодня, другая - то, что должно получиться."
      - "Без одной из двух моделей вторая отвечает на вопрос, который никто не проверял."
    variants:
      - prompt: "Какое из двух описаний процесса согласования отпуска - это as-is, а не to-be?"
        choices:
          - id: a
            text: "«Сейчас заявления передают на подпись лично, иногда теряют, и сотрудник узнаёт результат через несколько дней»."
          - id: b
            text: "«В системе заявка будет автоматически уходить руководителю с уведомлением и дедлайном на согласование»."
          - id: c
            text: "«Планируем добавить электронную подпись для ускорения согласования»."
          - id: d
            text: "«Целевой маршрут будет включать эскалацию, если руководитель не ответил за сутки»."
        correct: [a]
        explanation: "As-is описывает текущую реальность («сейчас передают лично, иногда теряют»), а остальные варианты формулируют то, что должно получиться в будущем - это признаки to-be."
      - prompt: "Заказчик описывает: «Заявки на закупку сейчас гуляют по почте без единого правила, согласующие держат письма непрочитанными неделями». Что аналитику стоит сделать дальше, прежде чем проектировать to-be?"
        choices:
          - id: a
            text: "Зафиксировать as-is полностью и найти, на каком именно шаге и почему заявки застревают дольше всего."
          - id: b
            text: "Сразу нарисовать целевую схему с автоматическими уведомлениями."
          - id: c
            text: "Попросить закупить систему электронного документооборота."
          - id: d
            text: "Сообщить, что процесс и так работает, раз заявки в итоге согласуются."
        correct: [a]
        explanation: "Прежде чем проектировать целевой процесс, нужно зафиксировать as-is и найти конкретное узкое место (кто именно и почему держит письма неделями), иначе to-be будет решать не ту проблему."

  - id: process-modeling-scenario-004
    concept: process-modeling
    type: theory-quiz
    difficulty: 4
    prompt: "Менеджер получает заявку на возврат товара. Он проверяет, оформлена ли она в течение 14 дней с момента покупки. Если да, документ уходит кладовщику на приём товара и оформление возврата денег, и процесс заканчивается «возврат оформлен». Если нет, менеджер сам уведомляет клиента об отказе, и процесс заканчивается «отказ по сроку». Что на этой карте является шлюзом?"
    choices:
      - id: a
        text: "Проверка, оформлена ли заявка в течение 14 дней: точка, где путь расходится на два исхода."
      - id: b
        text: "Получение заявки менеджером."
      - id: c
        text: "Приём товара кладовщиком."
      - id: d
        text: "Оба конечных события: «возврат оформлен» и «отказ по сроку»."
    correct: [a]
    explanation: "Шлюз это именно точка ветвления по условию (уложились в 14 дней или нет), а не сам шаг проверки как задача, не событие и не исполнитель. Получение заявки - стартовое событие, приём товара - задача кладовщика, а два исхода - конечные события, а не шлюз."
    hints:
      - "Шлюз это не шаг и не событие, а именно момент, где из одного входа получается два разных выхода."
      - "Ищите в описании слово «если»: оно почти всегда указывает на условие шлюза."

  - id: process-modeling-1c-005
    concept: process-modeling
    type: fill-in-blanks
    difficulty: 3
    prompt: "Дополните соответствие между картой процесса и объектами 1С."
    template: |
      В 1С шаг карты процесса, который выполняет конкретный исполнитель, реализует объект {{task1c}}. Последовательность точек маршрута задаёт объект {{bp1c}}, а ветвление по условию в точке маршрута соответствует {{gw1c}} на BPMN-карте.
    blanks:
      task1c:
        accept: ['Задача', 'задача']
      bp1c:
        accept: ['Бизнес-процесс', 'бизнес-процесс']
      gw1c:
        accept: ['шлюзу', 'шлюзу/условию', 'условию', 'шлюз']
    explanation: "Объект «Бизнес-процесс» в 1С задаёт маршрут из точек, каждая точка маршрута порождает объект «Задача» для конкретного исполнителя, а ветвление в точке маршрута по условию - тот же шлюз, что и на BPMN-карте."
    hints:
      - "Один из объектов 1С назван так же, как процесс целиком; другой назван так же, как один шаг для конкретного исполнителя."
      - "Ветвление по условию в 1С не получает нового названия: на BPMN-карте это тот же элемент, который вы уже знаете."
