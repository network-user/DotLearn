exercises:
  - id: unknown-vs-any-quiz-001
    concept: unknown-any-never
    type: theory-quiz
    difficulty: 1
    prompt: 'И any, и unknown принимают значение любого типа. В чём ключевое различие?'
    choices:
      - id: a
        text: 'unknown требует сузить тип перед использованием, а any отключает проверку и разрешает любые операции сразу.'
      - id: b
        text: 'any безопаснее unknown, потому что проверяет типы строже - будто типы живут в рантайме и заменяют валидацию'
      - id: c
        text: 'unknown нельзя присвоить никакое значение - будто типы живут в рантайме и заменяют валидацию'
      - id: d
        text: 'Различий нет, это синонимы'
    correct: [a]
    explanation: 'Оба принимают что угодно, но unknown не даёт пользоваться значением без проверки типа, а any выключает контроль целиком и разрешает любые операции. Поэтому unknown безопаснее: он заставляет разобрать значение перед использованием.'
    hints:
      - 'Разница не на входе (оба принимают всё), а на выходе: можно ли сразу вызывать методы?'
      - 'Какой из типов заставляет проверить тип перед использованием?'
    variants:
      - prompt: 'Почему any называют «заразным»?'
        choices:
          - id: a
            text: 'Результат операции над any тоже any, поэтому одна дыра расползается по всему коду, который её касается.'
          - id: b
            text: 'any копирует себя в другие файлы автоматически - будто типы живут в рантайме и заменяют валидацию'
          - id: c
            text: 'any нельзя удалить из проекта после добавления - будто типы живут в рантайме и заменяют валидацию'
          - id: d
            text: 'any замедляет выполнение соседних функций - будто типы живут в рантайме и заменяют валидацию'
        correct: [a]
        explanation: 'Любая операция над значением any даёт снова any. Поэтому непроверенное значение отравляет типы всего, к чему прикасается, и проверка тихо отключается по цепочке.'
      - prompt: 'Какой тип правильно выбрать для результата JSON.parse, пришедшего из сети?'
        choices:
          - id: a
            text: 'unknown: принять что угодно, но обязательно разобрать перед использованием.'
          - id: b
            text: 'any: так меньше кода; будто типы живут в рантайме и заменяют валидацию'
          - id: c
            text: 'never: данные же приходят извне; будто типы живут в рантайме и заменяют валидацию'
          - id: d
            text: 'string: сеть всегда возвращает текст'
        correct: [a]
        explanation: 'Внешним данным нельзя доверять форму. unknown принимает любой результат, но требует проверить его тип перед работой - именно то, что нужно на границе с сетью. any здесь просто отложил бы ошибку до рантайма.'

  - id: unknown-narrow-blanks-001
    concept: unknown-any-never
    type: fill-in-blanks
    difficulty: 2
    prompt: 'Функция принимает значение неизвестного типа и, если это строка, возвращает её в верхнем регистре. Впишите тип параметра для «что угодно» и строку в проверке typeof.'
    template: |
      function shout(data: {{t1}}): string {
        if (typeof data === '{{t2}}') {
          return data.toUpperCase();
        }
        return '';
      }
    blanks:
      t1:
        accept: ['unknown']
      t2:
        accept: ['string']
    explanation: 'Для «принять что угодно, но безопасно» подходит unknown. Метод toUpperCase есть только у строки, поэтому нужна проверка typeof data === ''string'', которая сужает data до строки.'
    hints:
      - 'Какой тип принимает любое значение, но требует проверки перед использованием?'
      - 'toUpperCase есть у строки - до какого типа надо сузить data?'
    variants:
      - prompt: 'Функция принимает что угодно и, если это число, удваивает его. Впишите тип параметра и строку в проверке typeof.'
        template: |
          function double(data: {{t1}}): number {
            if (typeof data === '{{t2}}') {
              return data * 2;
            }
            return 0;
          }
        blanks:
          t1:
            accept: ['unknown']
          t2:
            accept: ['number']
        explanation: 'unknown принимает любое значение, а проверка typeof data === ''number'' сужает его до числа, после чего умножение разрешено.'
      - prompt: 'Функция принимает что угодно и возвращает длину, если это строка. Впишите тип параметра и строку в проверке typeof.'
        template: |
          function size(data: {{t1}}): number {
            if (typeof data === '{{t2}}') {
              return data.length;
            }
            return 0;
          }
        blanks:
          t1:
            accept: ['unknown']
          t2:
            accept: ['string']
        explanation: 'unknown безопасно принимает любой вход; после сужения typeof data === ''string'' у data появляется свойство length.'

  - id: unknown-erasure-predict-001
    concept: unknown-any-never
    type: predict-output
    difficulty: 2
    prompt: 'Типы unknown и any стираются, остаётся обычный JavaScript. Что напечатает код?'
    snippet: |
      const raw: unknown = 'казань';
      if (typeof raw === 'string') {
        console.log(raw.toUpperCase());
      }
    expected:
      kind: stdout
      value: |-
        КАЗАНЬ
    explanation: 'После стирания остаётся проверка typeof и вызов toUpperCase. Строка «казань» в верхнем регистре - «КАЗАНЬ».'
    hints:
      - 'Проверка typeof пройдёт: raw это строка. Что делает toUpperCase со строкой?'
      - 'Аннотация unknown на поведение не влияет, она стирается.'
    variants:
      - prompt: 'Что напечатает этот код после стирания типов?'
        snippet: |
          const value: any = 5;
          console.log(value * 2 + 1);
        expected:
          kind: stdout
          value: |-
            11
        explanation: 'any стирается, остаётся арифметика: 5 умножить на 2 это 10, плюс 1 даёт 11.'
      - prompt: 'Что напечатает этот код после стирания типов?'
        snippet: |
          function fail(msg: string): never {
            throw new Error(msg);
          }
          try {
            fail('стоп');
          } catch (e) {
            console.log('поймано');
          }
        expected:
          kind: stdout
          value: |-
            поймано
        explanation: 'Возвращаемый тип never стирается. fail бросает исключение, его ловит catch и печатает «поймано».'

  - id: never-exhaustive-quiz-001
    concept: unknown-any-never
    type: theory-quiz
    difficulty: 3
    prompt: >-
      В разборе union все варианты обработаны, а в ветку-иначе добавлена строка const rest: never = p. Позже в
      union добавили новый вариант, но обработать его забыли. Что произойдёт?
    choices:
      - id: a
        text: 'TypeScript подсветит ошибку.'
      - id: b
        text: 'Ничего: never принимает любое значение.'
      - id: c
        text: 'Ошибка появится только в рантайме при этом варианте.'
      - id: d
        text: 'Переменная rest молча получит тип нового варианта.'
    correct: [a]
    explanation: 'Пока все варианты разобраны, до строки с never доходит пустой тип, и присваивание корректно. Появился необработанный вариант - он «дотекает» до присваивания, но в never (тип без значений) не помещается. TypeScript подсвечивает ошибку, напоминая дописать ветку. Это проверка на полноту discriminated union.'
    hints:
      - 'Какой тип «дотекает» до ветки-иначе, пока разобраны все варианты, и что меняется с появлением нового?'
      - 'Может ли конкретный вариант поместиться в тип never, у которого нет ни одного значения?'
