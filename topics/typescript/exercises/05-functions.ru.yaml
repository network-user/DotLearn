exercises:
  - id: functions-signature-blanks-001
    concept: functions
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Функция считает площадь прямоугольника. Впишите типы двух параметров и возвращаемого значения.'
    template: |
      function area(width: {{t1}}, height: {{t2}}): {{t3}} {
        return width * height;
      }
    blanks:
      t1:
        accept: ['number']
      t2:
        accept: ['number']
      t3:
        accept: ['number']
    explanation: 'Ширина и высота - числа, их произведение тоже число. Поэтому оба параметра и возвращаемый тип - number.'
    hints:
      - 'Из чего считается площадь и какого вида результат умножения?'
      - 'Все три значения одного вида - подберите один базовый тип.'
    variants:
      - prompt: 'Функция собирает приветствие из имени. Впишите тип параметра и возвращаемого значения.'
        template: |
          function hello(name: {{t1}}): {{t2}} {
            return 'Привет, ' + name;
          }
        blanks:
          t1:
            accept: ['string']
          t2:
            accept: ['string']
        explanation: 'Имя - текст, склейка строк даёт строку. Оба типа - string.'
      - prompt: 'Функция проверяет, совершеннолетний ли пользователь. Впишите тип параметра и возвращаемого значения.'
        template: |
          function isAdult(age: {{t1}}): {{t2}} {
            return age >= 18;
          }
        blanks:
          t1:
            accept: ['number']
          t2:
            accept: ['boolean']
        explanation: 'Возраст - число, а сравнение возвращает «истину/ложь», то есть boolean.'

  - id: functions-optional-quiz-001
    concept: functions
    type: theory-quiz
    difficulty: 2
    prompt: 'Чем необязательный параметр title?: string отличается от параметра со значением по умолчанию greeting = ''Привет''?'
    choices:
      - id: a
        text: 'У optional внутри тип string | undefined и нужна проверка; у default уже string.'
      - id: b
        text: 'Разницы нет: оба параметра ведут себя одинаково внутри функции.'
      - id: c
        text: 'Необязательный нельзя пропустить при вызове, а default-параметр можно.'
      - id: d
        text: 'Параметр по умолчанию обязателен при вызове, optional - нет.'
    correct: [a]
    explanation: 'Необязательный параметр может отсутствовать, поэтому его тип включает undefined и требует проверки. У параметра со значением по умолчанию на месте пропущенного аргумента подставляется значение, и внутри тип уже без undefined.'
    hints:
      - 'Подумайте, что окажется внутри функции, если аргумент не передан: пустота или подставленное значение?'
      - 'Как это отражается на типе параметра внутри тела?'
    variants:
      - prompt: 'Почему запись function f(a?: number, b: number) вызывает ошибку?'
        choices:
          - id: a
            text: 'После optional-параметра не может идти обязательный: вызов станет неоднозначным.'
          - id: b
            text: 'Необязательные параметры в TypeScript вообще запрещены синтаксисом.'
          - id: c
            text: 'Числовые параметры нельзя помечать как необязательные через ?.'
          - id: d
            text: 'Ошибки нет: такая сигнатура полностью корректна для компилятора.'
        correct: [a]
        explanation: 'Обязательные параметры должны идти до необязательных. Иначе непонятно, к какому параметру относится единственный переданный аргумент.'
      - prompt: 'Функция объявлена как function greet(name: string, greeting = ''Привет''). Какой тип у greeting внутри функции?'
        choices:
          - id: a
            text: 'string: тип выведен из значения по умолчанию.'
          - id: b
            text: 'string | undefined: будто default нет и нужна проверка.'
          - id: c
            text: 'any: вывод типов якобы всегда падает в any.'
          - id: d
            text: "литеральный тип 'Привет': значение зафиксировано как const."
        correct: [a]
        explanation: 'Тип параметра со значением по умолчанию выводится из этого значения. Строка ''Привет'' даёт тип string, причём без undefined, ведь пустоты на этом месте не будет.'

  - id: functions-default-predict-001
    concept: functions
    type: predict-output
    difficulty: 2
    prompt: 'После стирания типов это обычный JavaScript. Что он напечатает?'
    snippet: |
      function greet(name: string, greeting: string = 'Привет'): string {
        return greeting + ', ' + name;
      }
      console.log(greet('Анна'));
      console.log(greet('Борис', 'Здравствуйте'));
    expected:
      kind: stdout
      value: |-
        Привет, Анна
        Здравствуйте, Борис
    explanation: 'В первом вызове второй аргумент пропущен, подставляется значение по умолчанию «Привет». Во втором передана строка «Здравствуйте», она и используется.'
    hints:
      - 'Что подставляется на месте пропущенного аргумента со значением по умолчанию?'
      - 'Разберите каждый вызов отдельно: какой greeting в нём окажется.'
    variants:
      - prompt: 'Что напечатает этот код после стирания типов?'
        snippet: |
          function sum(...nums: number[]): number {
            return nums.reduce((acc, n) => acc + n, 0);
          }
          console.log(sum(1, 2, 3));
          console.log(sum(10, 20));
        expected:
          kind: stdout
          value: |-
            6
            30
        explanation: 'Rest-параметр собирает аргументы в массив, reduce складывает их: 1+2+3 даёт 6, 10+20 даёт 30.'
      - prompt: 'Что напечатает этот код после стирания типов?'
        snippet: |
          function tax(price: number, rate: number = 20): number {
            return price + (price * rate) / 100;
          }
          console.log(tax(1000));
          console.log(tax(1000, 10));
        expected:
          kind: stdout
          value: |-
            1200
            1100
        explanation: 'Без второго аргумента rate равен 20: 1000 плюс 200 даёт 1200. С rate 10: 1000 плюс 100 даёт 1100.'

  - id: functions-return-infer-001
    concept: functions
    type: theory-quiz
    difficulty: 3
    prompt: 'Зачем писать возвращаемый тип явно, если TypeScript и так его выводит из return?'
    choices:
      - id: a
        text: 'Явный возвращаемый тип проверяет тело сразу.'
      - id: b
        text: 'Без явного типа функция вообще не типизируется.'
      - id: c
        text: 'Явный тип ускоряет выполнение функции.'
      - id: d
        text: 'Это обязательное требование: без аннотации код не скомпилируется.'
    correct: [a]
    explanation: 'Вывод определит тип результата по фактическому return, поэтому ошибка «вернул не то» проявится там, где результат используют. Явная аннотация фиксирует контракт и ловит расхождение в самом теле функции - ближе к причине.'
    hints:
      - 'Где проявится ошибка «обещал строку, вернул число», если тип выведен, а не написан?'
      - 'Что делает явная аннотация возвращаемого типа с проверкой тела функции?'
