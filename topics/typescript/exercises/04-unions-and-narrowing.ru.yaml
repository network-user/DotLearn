exercises:
  - id: unions-literal-quiz-001
    concept: unions-and-narrowing
    type: theory-quiz
    difficulty: 1
    prompt: 'Тип языка объявлен как type Lang = ''ru'' | ''en''. Какое присваивание вызовет ошибку типа?'
    choices:
      - id: a
        text: "lang = 'py'"
      - id: b
        text: "lang = 'ru'"
      - id: c
        text: "lang = 'en'"
      - id: d
        text: 'Ошибок не будет ни в одном из вариантов.'
    correct: [a]
    explanation: "Union из литералов допускает только перечисленные значения. 'ru' и 'en' входят в тип, а 'py' - нет, поэтому именно это присваивание подсветится ошибкой."
    hints:
      - 'Union из литералов - это точный список разрешённых значений. Какое из присваиваний в список не входит?'
      - 'Сравните каждое значение с перечисленными в типе вариантами.'
    variants:
      - prompt: 'Тип статуса объявлен как type Status = ''new'' | ''paid'' | ''shipped''. Какое присваивание вызовет ошибку?'
        choices:
          - id: a
            text: "status = 'done'"
          - id: b
            text: "status = 'new'"
          - id: c
            text: "status = 'paid'"
          - id: d
            text: "status = 'shipped'"
        correct: [a]
        explanation: "'done' не входит в перечисленный набор, поэтому вызовет ошибку. Остальные три значения допустимы."
      - prompt: 'Переменная объявлена как let id: string | number. Какое присваивание вызовет ошибку?'
        choices:
          - id: a
            text: 'id = true'
          - id: b
            text: "id = 'A-14'"
          - id: c
            text: 'id = 2999'
          - id: d
            text: 'Ошибок не будет.'
        correct: [a]
        explanation: 'Union string | number допускает строку и число, но не boolean. Присваивание true не подходит ни под один вариант.'

  - id: unions-narrow-blanks-001
    concept: unions-and-narrowing
    type: fill-in-blanks
    difficulty: 2
    prompt: 'Функция по-разному обрабатывает число и строку. Впишите недостающий член union и тип в проверке typeof, чтобы ветка числа сузилась корректно.'
    template: |
      function label(x: string | {{t1}}): string {
        if (typeof x === '{{t2}}') {
          return 'число ' + x;
        }
        return 'текст ' + x;
      }
    blanks:
      t1:
        accept: ['number']
      t2:
        accept: ['number']
    explanation: 'Второй член union - number. Проверка typeof x === ''number'' сужает x в этой ветке до числа, поэтому ветка обрабатывает именно числовой вариант.'
    hints:
      - 'Функция различает число и строку - значит второй вариант в union это число.'
      - 'typeof для числа возвращает строку ''number''; именно её сравнивают в проверке.'
    variants:
      - prompt: 'Функция различает строку и логическое значение. Впишите недостающий член union и строку в проверке typeof.'
        template: |
          function show(x: string | {{t1}}): string {
            if (typeof x === '{{t2}}') {
              return x ? 'да' : 'нет';
            }
            return x.toUpperCase();
          }
        blanks:
          t1:
            accept: ['boolean']
          t2:
            accept: ['boolean']
        explanation: 'Второй вариант - boolean, а typeof для него даёт ''boolean''. После проверки x в первой ветке сужается до логического значения.'
      - prompt: 'Функция различает число и строку и в ветке строки зовёт метод. Впишите член union и строку проверки, чтобы вызвать toUpperCase корректно.'
        template: |
          function up(x: number | {{t1}}): string {
            if (typeof x === '{{t2}}') {
              return x.toUpperCase();
            }
            return String(x);
          }
        blanks:
          t1:
            accept: ['string']
          t2:
            accept: ['string']
        explanation: 'Метод toUpperCase есть только у строки, поэтому недостающий вариант - string, а проверка typeof x === ''string'' сужает x до строки перед вызовом.'

  - id: unions-narrow-predict-001
    concept: unions-and-narrowing
    type: predict-output
    difficulty: 2
    prompt: 'После стирания типов это обычный JavaScript. Что он напечатает?'
    snippet: |
      function describe(x: string | number): string {
        if (typeof x === 'number') {
          return 'число ' + x;
        }
        return 'строка ' + x;
      }
      console.log(describe(42));
      console.log(describe('Казань'));
    expected:
      kind: stdout
      value: |-
        число 42
        строка Казань
    explanation: 'Аннотации стираются, остаётся проверка typeof. Для 42 срабатывает ветка числа - «число 42»; для «Казань» ветка строки - «строка Казань».'
    hints:
      - 'Для каждого вызова определите, в какую ветку if уводит typeof.'
      - 'Число попадает в первую ветку, всё остальное - во вторую.'
    variants:
      - prompt: 'Что напечатает этот код после стирания типов?'
        snippet: |
          function kindOf(x: string | boolean): string {
            if (typeof x === 'boolean') {
              return x ? 'истина' : 'ложь';
            }
            return 'текст: ' + x;
          }
          console.log(kindOf(true));
          console.log(kindOf('привет'));
        expected:
          kind: stdout
          value: |-
            истина
            текст: привет
        explanation: 'true попадает в ветку boolean и даёт «истина»; «привет» уходит во вторую ветку - «текст: привет».'
      - prompt: 'Что напечатает этот код после стирания типов?'
        snippet: |
          function price(x: number | string): string {
            if (typeof x === 'number') {
              return x + ' руб';
            }
            return 'нет цены';
          }
          console.log(price(500));
          console.log(price('—'));
        expected:
          kind: stdout
          value: |-
            500 руб
            нет цены
        explanation: '500 - число, срабатывает первая ветка: «500 руб». Строка уходит во вторую ветку: «нет цены».'

  - id: unions-discriminated-quiz-001
    concept: unions-and-narrowing
    type: theory-quiz
    difficulty: 4
    prompt: >-
      Дан discriminated union type Payment = { kind: 'card'; last4: string } | { kind: 'cash'; received:
      number }. Внутри ветки if (p.kind === 'card') вы обращаетесь к p.received. Что произойдёт и почему?
    choices:
      - id: a
        text: "Ошибка типа: проверка p.kind === 'card' сузила p до варианта с полем last4, а поля received у него нет."
      - id: b
        text: 'Всё сработает: у объекта union доступны поля всех вариантов сразу.'
      - id: c
        text: 'Ошибка рантайма, но TypeScript её не заметит.'
      - id: d
        text: 'p.received вернёт undefined, и TypeScript промолчит.'
    correct: [a]
    explanation: "Дискриминант kind позволяет TypeScript сузить тип. После p.kind === 'card' переменная p имеет только поля варианта 'card' (kind и last4). Поля received там нет, поэтому обращение к нему - ошибка типа, пойманная до запуска."
    hints:
      - 'Проверка ярлыка kind оставляет в ветке ровно один вариант union. Какие поля у него есть?'
      - "Есть ли поле received у варианта с kind === 'card'?"
