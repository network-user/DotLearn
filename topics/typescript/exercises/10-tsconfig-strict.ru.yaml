exercises:
  - id: strict-flag-quiz-001
    concept: tsconfig-strict
    type: theory-quiz
    difficulty: 1
    prompt: 'Что делает "strict": true в tsconfig.json?'
    choices:
      - id: a
        text: 'Включает сразу целое семейство строгих проверок типов - это правильное значение по умолчанию для нового проекта.'
      - id: b
        text: 'Включает ровно одну проверку и больше ничего.'
      - id: c
        text: 'Ускоряет сборку проекта.'
      - id: d
        text: 'Запрещает использовать TypeScript вместе со старым JavaScript.'
    correct: [a]
    explanation: 'strict - это выключатель целого семейства проверок (noImplicitAny, strictNullChecks и других). Один флаг включает их все. Для нового проекта это правильная настройка по умолчанию.'
    hints:
      - 'strict включает одну проверку или сразу набор?'
      - 'Подумайте, зачем его советуют включать первым же коммитом нового проекта.'
    variants:
      - prompt: 'Что делает флаг noImplicitAny?'
        choices:
          - id: a
            text: 'Запрещает тихий any: параметр без аннотации становится ошибкой, а не молча any.'
          - id: b
            text: 'Автоматически проставляет тип any всем параметрам.'
          - id: c
            text: 'Запрещает использовать тип any даже явно.'
          - id: d
            text: 'Ускоряет проверку типов.'
        correct: [a]
        explanation: 'noImplicitAny превращает неявный any в ошибку. Тип придётся указать явно - либо конкретный, либо намеренный any руками. «Забыл тип» и «поставил any нарочно» становятся различимы.'
      - prompt: 'Меняет ли флаг strict собранный JavaScript?'
        choices:
          - id: a
            text: 'Нет: strict управляет только проверкой типов, рантайм остаётся тем же.'
          - id: b
            text: 'Да: строгий код выполняется быстрее.'
          - id: c
            text: 'Да: strict добавляет проверки типов в собранный код.'
          - id: d
            text: 'Да: strict уменьшает размер сборки.'
        correct: [a]
        explanation: 'strict влияет только на строгость проверки на этапе разработки. Собранный JavaScript от него не зависит: одинаковый код при strict и без даёт одинаковый рантайм.'

  - id: strict-null-blanks-001
    concept: tsconfig-strict
    type: fill-in-blanks
    difficulty: 1
    prompt: 'При strictNullChecks значение, которое бывает пустым, объявляют явно и проверяют. Впишите недостающий член union и значение в проверке, чтобы вернуть «гость» для пустого имени.'
    template: |
      function greet(name: string | {{t1}}): string {
        if (name === {{t2}}) {
          return 'гость';
        }
        return name;
      }
    blanks:
      t1:
        accept: ['null']
      t2:
        accept: ['null']
    explanation: 'При strictNullChecks тип string не включает пустоту. Чтобы имя могло отсутствовать, его объявляют как string | null и проверяют name === null перед обращением к значению.'
    hints:
      - 'Как объявить, что значение бывает пустым, если string больше не включает пустоту?'
      - 'С чем сравнить name в проверке, чтобы отсечь пустое значение?'
    variants:
      - prompt: 'Впишите недостающий член union и значение в проверке, чтобы вернуть 0 при отсутствующем массиве.'
        template: |
          function count(items: number[] | {{t1}}): number {
            if (items === {{t2}}) {
              return 0;
            }
            return items.length;
          }
        blanks:
          t1:
            accept: ['undefined']
          t2:
            accept: ['undefined']
        explanation: 'Массив может отсутствовать, поэтому его тип - number[] | undefined. Проверка items === undefined отсекает пустой случай перед обращением к length.'
      - prompt: 'Впишите недостающий член union и значение в проверке, чтобы вернуть «—» для пустого города.'
        template: |
          function label(city: string | {{t1}}): string {
            if (city === {{t2}}) {
              return '—';
            }
            return city;
          }
        blanks:
          t1:
            accept: ['null']
          t2:
            accept: ['null']
        explanation: 'Город бывает пустым, поэтому тип string | null. Проверка city === null отсекает пустоту, и дальше city гарантированно строка.'

  - id: strict-runtime-predict-001
    concept: tsconfig-strict
    type: predict-output
    difficulty: 2
    prompt: 'Строгость не меняет рантайм. После стирания типов это обычный JavaScript. Что он напечатает?'
    snippet: |
      function greet(name: string | null): string {
        if (name === null) {
          return 'гость';
        }
        return name;
      }
      console.log(greet('Анна'));
      console.log(greet(null));
    expected:
      kind: stdout
      value: |-
        Анна
        гость
    explanation: 'Аннотации стираются, остаётся проверка на null. Для «Анна» условие ложно, возвращается имя; для null - «гость».'
    hints:
      - 'Разберите каждый вызов: срабатывает ли проверка name === null?'
      - 'Строгий режим не добавляет проверок в рантайм - работает только написанный вами if.'
    variants:
      - prompt: 'Что напечатает этот код после стирания типов?'
        snippet: |
          function count(items: number[] | undefined): number {
            if (items === undefined) {
              return 0;
            }
            return items.length;
          }
          console.log(count([1, 2, 3]));
          console.log(count(undefined));
        expected:
          kind: stdout
          value: |-
            3
            0
        explanation: 'Для массива из трёх элементов возвращается его длина 3; для undefined срабатывает первая ветка и возвращается 0.'
      - prompt: 'Что напечатает этот код после стирания типов?'
        snippet: |
          function firstLetter(name: string | null): string {
            if (name === null) {
              return '?';
            }
            return name[0];
          }
          console.log(firstLetter('Казань'));
          console.log(firstLetter(null));
        expected:
          kind: stdout
          value: |-
            К
            ?
        explanation: 'Для «Казань» возвращается первая буква «К»; для null - «?». Проверка на null - обычный if, стирание типов её не трогает.'

  - id: strict-null-meaning-001
    concept: tsconfig-strict
    type: theory-quiz
    difficulty: 3
    prompt: 'При включённом strictNullChecks параметр объявлен как name: string. Можно ли передать в него null?'
    choices:
      - id: a
        text: 'Нет: string больше не включает null. Чтобы разрешить пустоту, тип пишут как string | null, и тогда компилятор требует проверить null перед использованием.'
      - id: b
        text: 'Да: null совместим с любым типом.'
      - id: c
        text: 'Да, но только если значение сразу же используется.'
      - id: d
        text: 'Нет, и обойти это нельзя никак.'
    correct: [a]
    explanation: 'Главное действие strictNullChecks - вывести null и undefined из-под обычных типов. Теперь string означает «точно строка». Если значение бывает пустым, это объявляют явно через union string | null, и тогда TypeScript заставляет проверить его перед обращением - класс падений «Cannot read property of null» превращается в ошибку на этапе типов.'
    hints:
      - 'Что strictNullChecks делает с совместимостью null и обычных типов вроде string?'
      - 'Как объявить, что значение бывает пустым, и что после этого потребует компилятор?'
