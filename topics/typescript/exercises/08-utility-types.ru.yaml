exercises:
  - id: utility-name-blanks-001
    concept: utility-types
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Из типа User выведите два производных: превью из полей id и name, и «заплатку» со всеми необязательными полями. Впишите имена утилити-типов.'
    template: |
      type User = { id: number; name: string; email: string };
      type UserPreview = {{u1}}<User, 'id' | 'name'>;
      type UserPatch = {{u2}}<User>;
    blanks:
      u1:
        accept: ['Pick']
      u2:
        accept: ['Partial']
    explanation: 'Pick<User, ''id'' | ''name''> оставляет только перечисленные поля - это превью. Partial<User> делает все поля необязательными - это форма частичного обновления.'
    hints:
      - 'Один утилити-тип оставляет часть полей по списку, другой снимает обязательность со всех.'
      - 'Для «оставить перечисленные поля» есть тип, чьё имя буквально значит «выбрать».'
    variants:
      - prompt: 'Из типа User выведите тип для создания записи без id и словарь цен со строковыми ключами. Впишите имена утилити-типов.'
        template: |
          type User = { id: number; name: string };
          type NewUser = {{u1}}<User, 'id'>;
          type Prices = {{u2}}<string, number>;
        blanks:
          u1:
            accept: ['Omit']
          u2:
            accept: ['Record']
        explanation: 'Omit<User, ''id''> убирает поле id. Record<string, number> описывает словарь со строковыми ключами и числовыми значениями.'
      - prompt: 'Из типа User выведите превью только с name и «заплатку» со всеми необязательными полями. Впишите имена утилити-типов.'
        template: |
          type User = { name: string; age: number; city: string };
          type NameOnly = {{u1}}<User, 'name'>;
          type UserPatch = {{u2}}<User>;
        blanks:
          u1:
            accept: ['Pick']
          u2:
            accept: ['Partial']
        explanation: 'Pick<User, ''name''> оставляет одно поле name. Partial<User> снимает обязательность со всех полей.'

  - id: utility-meaning-quiz-001
    concept: utility-types
    type: theory-quiz
    difficulty: 2
    prompt: 'Что делает Partial<User>?'
    choices:
      - id: a
        text: 'Возвращает тип User, у которого все поля стали необязательными.'
      - id: b
        text: 'Оставляет только первое объявленное поле типа User.'
      - id: c
        text: 'Убирает из User все поля, оставляя пустой объектный тип.'
      - id: d
        text: 'Создаёт объект User со значениями по умолчанию в рантайме.'
    correct: [a]
    explanation: 'Partial проходит по всем полям типа и делает каждое необязательным. Это удобно для «заплаток» частичного обновления, где указывают только меняющиеся поля. Никакого объекта в рантайме Partial не создаёт - это только тип.'
    hints:
      - 'Слово partial значит «частичный». Что становится с обязательностью полей?'
      - 'Подумайте, для какой задачи нужен тип, где можно указать лишь часть полей.'
    variants:
      - prompt: 'Чем Pick<User, ''id'' | ''name''> отличается от Omit<User, ''id''>?'
        choices:
          - id: a
            text: 'Pick оставляет перечисленные поля; Omit убирает перечисленные, оставляя остальные.'
          - id: b
            text: 'Это одно и то же: Pick и Omit якобы полные синонимы.'
          - id: c
            text: 'Pick убирает перечисленные поля, а Omit наоборот только их оставляет.'
          - id: d
            text: 'Оба утилитарных типа делают все поля типа необязательными.'
        correct: [a]
        explanation: 'Pick перечисляет, что оставить, Omit - что убрать. Pick<User, ''id'' | ''name''> даст объект с id и name; Omit<User, ''id''> даст объект со всеми полями, кроме id.'
      - prompt: 'Что описывает тип Record<''ru'' | ''en'', string>?'
        choices:
          - id: a
            text: 'Объект ровно с ключами ru.'
          - id: b
            text: 'Массив строк ru и en.'
          - id: c
            text: 'Объект с любыми ключами и любыми значениями.'
          - id: d
            text: 'Union из двух строк.'
        correct: [a]
        explanation: 'Record<K, V> строит словарь: ключи из union ''ru'' | ''en'', значения типа string. Пропущенный ключ - ошибка, поэтому объект обязан иметь оба.'

  - id: utility-runtime-predict-001
    concept: utility-types
    type: predict-output
    difficulty: 2
    prompt: 'Утилити-типы стираются, остаётся обычный JavaScript. Что напечатает код?'
    snippet: |
      type User = { name: string; age: number };
      function update(u: User, patch: Partial<User>): User {
        return { ...u, ...patch };
      }
      const result = update({ name: 'Анна', age: 30 }, { age: 31 });
      console.log(result.name + ' ' + result.age);
    expected:
      kind: stdout
      value: |-
        Анна 31
    explanation: 'После стирания типов остаётся слияние объектов через spread: сначала копируются поля u, затем patch перезаписывает age на 31. Имя остаётся «Анна», возраст становится 31.'
    hints:
      - 'Что делает { ...u, ...patch } с полями, которые есть в обоих объектах?'
      - 'patch идёт вторым, поэтому его поля перекрывают одноимённые поля u.'
    variants:
      - prompt: 'Что напечатает этот код после стирания типов?'
        snippet: |
          type Prices = Record<string, number>;
          const prices: Prices = { kettle: 2999, umbrella: 899 };
          console.log(prices.kettle + prices.umbrella);
        expected:
          kind: stdout
          value: |-
            3898
        explanation: 'Record описывает словарь только в типах. В рантайме это обычный объект: сумма значений 2999 и 899 даёт 3898.'
      - prompt: 'Что напечатает этот код после стирания типов?'
        snippet: |
          type User = { id: number; name: string };
          function preview(u: User): Pick<User, 'name'> {
            return { name: u.name };
          }
          console.log(preview({ id: 1, name: 'Борис' }).name);
        expected:
          kind: stdout
          value: |-
            Борис
        explanation: 'Pick влияет только на тип возвращаемого значения. В рантайме функция строит объект { name } и возвращает его, поэтому .name это «Борис».'

  - id: utility-record-quiz-001
    concept: utility-types
    type: theory-quiz
    difficulty: 3
    prompt: 'Тип подписей объявлен как type Labels = Record<''ru'' | ''en'', string>. Объект { ru: ''Привет'' } присваивают переменной этого типа. Что скажет TypeScript?'
    choices:
      - id: a
        text: 'Ошибка: не хватает ключа en.'
      - id: b
        text: 'Всё в порядке: достаточно одного ключа'
      - id: c
        text: 'Ошибка: ключей в Record быть не должно'
      - id: d
        text: 'Всё в порядке, а недостающий ключ en появится в рантайме сам.'
    correct: [a]
    explanation: 'Record<''ru'' | ''en'', string> строит словарь, где обязаны присутствовать оба ключа из union. Объект с одним ru не соответствует типу: en пропущен. Так Record из литерального union работает как проверяемая таблица, где нельзя забыть вариант.'
    hints:
      - 'Сколько ключей перечисляет union ''ru'' | ''en'' и сколько из них Record считает обязательными?'
      - 'Что происходит, если один из требуемых ключей в объекте отсутствует?'
