exercises:
  - id: objects-interface-blanks-001
    concept: objects-and-interfaces
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Опишите форму заказа. Название товара - текст, цена - число, оплачен - логическое значение. Впишите типы полей.'
    template: |
      interface Order {
        item: {{t1}};
        price: {{t2}};
        paid: {{t3}};
      }
    blanks:
      t1:
        accept: ['string']
      t2:
        accept: ['number']
      t3:
        accept: ['boolean']
    explanation: 'Поля интерфейса аннотируются так же, как переменные: item - текст (string), price - число (number), paid - «да/нет» (boolean).'
    hints:
      - 'Каждое поле - это то же самое, что переменная нужного вида. Что за значение хранит каждое?'
      - 'Имена базовых типов строчные: string, number, boolean.'
    variants:
      - prompt: 'Опишите форму пользователя: имя - текст, возраст - число, подписан на рассылку - логическое значение.'
        template: |
          interface User {
            name: {{t1}};
            age: {{t2}};
            subscribed: {{t3}};
          }
        blanks:
          t1:
            accept: ['string']
          t2:
            accept: ['number']
          t3:
            accept: ['boolean']
      - prompt: 'Опишите форму точки на карте: подпись - текст, широта - число, активна - логическое значение.'
        template: |
          interface Marker {
            label: {{t1}};
            lat: {{t2}};
            active: {{t3}};
          }
        blanks:
          t1:
            accept: ['string']
          t2:
            accept: ['number']
          t3:
            accept: ['boolean']

  - id: objects-optional-quiz-001
    concept: objects-and-interfaces
    type: theory-quiz
    difficulty: 2
    prompt: 'В интерфейсе User поле phone объявлено как phone?: string. Что это значит?'
    choices:
      - id: a
        text: 'Поле необязательное, а его тип становится string | undefined: без проверки как гарантированную строку его использовать нельзя.'
      - id: b
        text: 'Поле обязательное, но может быть пустой строкой.'
      - id: c
        text: 'Поле можно записать только один раз.'
      - id: d
        text: 'Поле существует только в рантайме, но не в типе.'
    correct: [a]
    explanation: 'Знак ? делает поле необязательным. Объект без phone корректен, но тип поля теперь включает undefined, поэтому обращаться к phone.length можно лишь после проверки, что значение есть.'
    hints:
      - 'Подумайте, каким становится тип поля, которое разрешено не указывать.'
      - 'Что нужно сделать перед обращением к значению, которого может не быть?'
    variants:
      - prompt: 'Что делает модификатор readonly у поля readonly id: number?'
        choices:
          - id: a
            text: 'Запрещает запись в поле после создания объекта - на этапе проверки типов.'
          - id: b
            text: 'Делает поле необязательным.'
          - id: c
            text: 'Шифрует значение поля в рантайме.'
          - id: d
            text: 'Запрещает читать поле, разрешает только писать.'
        correct: [a]
        explanation: 'readonly останавливает присваивание в поле после создания. Действует только в типах: при сборке модификатор исчезает, и в рантайме поле обычное.'
      - prompt: 'Объект { name: ''Анна'' } присваивают переменной типа User, где phone объявлено как phone?: string. Это корректно?'
        choices:
          - id: a
            text: 'Да: phone необязательное, объект без него подходит под тип.'
          - id: b
            text: 'Нет: все поля интерфейса обязательны.'
          - id: c
            text: 'Нет: phone нужно указать хотя бы как пустую строку.'
          - id: d
            text: 'Да, но только если добавить phone: null.'
        correct: [a]
        explanation: 'Знак ? разрешает пропустить поле целиком. Объект { name: ''Анна'' } удовлетворяет типу User, потому что phone необязательно.'

  - id: objects-erasure-predict-001
    concept: objects-and-interfaces
    type: predict-output
    difficulty: 2
    prompt: 'Уберите типы мысленно и прочитайте как JavaScript. Что напечатает код?'
    snippet: |
      interface Order {
        item: string;
        price: number;
      }
      const o: Order = { item: 'чайник', price: 2999 };
      console.log(o.item + ' стоит ' + o.price);
    expected:
      kind: stdout
      value: |-
        чайник стоит 2999
    explanation: 'Интерфейс и аннотация : Order стираются. Остаётся обычный объект и склейка строки с числом: печатается «чайник стоит 2999».'
    hints:
      - 'Интерфейс не оставляет следа в рантайме. Что останется от кода после стирания типов?'
      - 'Соберите строку: item, затем текст, затем price через плюс.'
    variants:
      - prompt: 'Что напечатает этот код после стирания типов?'
        snippet: |
          type User = { name: string; age: number };
          const u: User = { name: 'Борис', age: 30 };
          console.log(u.name + ', ' + u.age);
        expected:
          kind: stdout
          value: |-
            Борис, 30
        explanation: 'Псевдоним type и аннотация исчезают. Остаётся объект и склейка: печатается «Борис, 30».'
      - prompt: 'Что напечатает этот код после стирания типов?'
        snippet: |
          interface Point {
            x: number;
            y: number;
          }
          const p: Point = { x: 3, y: 4 };
          console.log(p.x + p.y);
        expected:
          kind: stdout
          value: |-
            7
        explanation: 'После стирания остаётся сложение чисел x и y: 3 плюс 4 даёт 7.'

  - id: objects-structural-quiz-001
    concept: objects-and-interfaces
    type: theory-quiz
    difficulty: 3
    prompt: 'Переменная marker создана как { x: 10, y: 20, label: ''старт'' } без упоминания интерфейса Point ({ x: number; y: number }). Затем её присваивают переменной типа Point. Что скажет TypeScript?'
    choices:
      - id: a
        text: 'Всё в порядке: marker имеет x и y нужных типов, а лишнее поле label структурной совместимости не мешает.'
      - id: b
        text: 'Ошибка: marker не был объявлен как Point, а совпадение идёт по имени типа.'
      - id: c
        text: 'Ошибка: у marker есть лишнее поле label.'
      - id: d
        text: 'Ошибка: сначала нужно вызвать marker.implements(Point).'
    correct: [a]
    explanation: 'TypeScript сравнивает типы по форме, а не по имени (структурная типизация). marker имеет все поля, которых требует Point, поэтому подходит. Лишнее поле через промежуточную переменную допустимо; ошибку на лишнее поле TypeScript даёт только для литерала прямо на месте присваивания.'
    hints:
      - 'Вспомните, по чему TypeScript сравнивает типы: по имени или по набору полей?'
      - 'Есть ли у marker всё, что требует Point? Что при этом делает лишнее поле, если присваивать через переменную?'
