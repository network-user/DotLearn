exercises:
  - id: basic-types-annotate-blanks-001
    concept: basic-types
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Впишите базовые типы для параметров функции скидки. Цена - число, промокод - текст, флаг применения - логическое значение.'
    template: |
      function applyDiscount(price: {{t1}}, promo: {{t2}}, applied: {{t3}}) {
        return applied ? price - 100 : price;
      }
    blanks:
      t1:
        accept: ['number']
      t2:
        accept: ['string']
      t3:
        accept: ['boolean']
    explanation: 'price хранит число - number; promo это текст промокода - string; applied отвечает «да/нет» - boolean. Имена базовых типов пишутся строчными буквами.'
    hints:
      - 'Сопоставьте каждое значение с тем, что вернул бы typeof: число, текст, «истина/ложь».'
      - 'Имена базовых типов - строчные: не String, а string.'
    variants:
      - prompt: 'Впишите базовые типы для полей карточки товара: название - текст, цена - число, в наличии - логическое значение.'
        template: |
          function makeCard(name: {{t1}}, price: {{t2}}, inStock: {{t3}}) {
            return { name, price, inStock };
          }
        blanks:
          t1:
            accept: ['string']
          t2:
            accept: ['number']
          t3:
            accept: ['boolean']
      - prompt: 'Впишите базовые типы для данных доставки: город - текст, вес в граммах - число, срочная - логическое значение.'
        template: |
          function shipping(city: {{t1}}, grams: {{t2}}, express: {{t3}}) {
            return express ? grams * 2 : grams;
          }
        blanks:
          t1:
            accept: ['string']
          t2:
            accept: ['number']
          t3:
            accept: ['boolean']

  - id: basic-types-inference-quiz-001
    concept: basic-types
    type: theory-quiz
    difficulty: 2
    prompt: 'Какой тип выведет TypeScript для const city = ''Казань''?'
    choices:
      - id: a
        text: "Литеральный тип 'Казань': const нельзя переприсвоить, значение фиксировано."
      - id: b
        text: 'string: любое строковое значение допустимо.'
      - id: c
        text: 'any: без аннотации тип не определить.'
      - id: d
        text: 'char: тип для отдельной строки.'
    correct: [a]
    explanation: 'const переприсвоить нельзя, поэтому значение навсегда останется ровно «Казань». TypeScript сужает тип до литерала «Казань». У let на том же значении вывелся бы широкий string.'
    hints:
      - 'Спросите себя: может ли значение const измениться после объявления? Если нет, насколько узким может быть тип?'
      - 'Сравните поведение для const и для let: одно фиксирует значение, другое оставляет место под любое.'
    variants:
      - prompt: 'Какой тип выведет TypeScript для let region = ''Татарстан''?'
        choices:
          - id: a
            text: 'string: let разрешает переприсваивание, поэтому тип широкий.'
          - id: b
            text: "Литеральный тип 'Татарстан'."
          - id: c
            text: 'any.'
          - id: d
            text: 'boolean.'
        correct: [a]
        explanation: 'let допускает присвоить другую строку позже, поэтому TypeScript оставляет широкий тип string, а не литерал.'
      - prompt: 'Нужна ли аннотация в строке let total = 0?'
        choices:
          - id: a
            text: 'Нет: тип number выводится из значения 0 автоматически.'
          - id: b
            text: 'Да: без : number переменная станет строкой.'
          - id: c
            text: 'Да: числа всегда требуют явной аннотации.'
          - id: d
            text: 'Нет, но тогда переменная получит тип any.'
        correct: [a]
        explanation: 'Значение присваивается сразу, поэтому вывод определит тип number. Аннотация лишь повторила бы очевидное.'

  - id: basic-types-erasure-predict-001
    concept: basic-types
    type: predict-output
    difficulty: 2
    prompt: 'Уберите типы и прочитайте как JavaScript. Что напечатает код?'
    snippet: |
      let price: number = 2999;
      price = price + 1;
      const label: string = 'итог';
      console.log(label + ': ' + price);
    expected:
      kind: stdout
      value: |-
        итог: 3000
    explanation: 'После стирания типов остаётся обычный код: price становится 3000, затем строка «итог» склеивается с числом через плюс. Число приводится к строке, печатается «итог: 3000».'
    hints:
      - 'Сначала посчитайте значение price после второй строки, потом собирайте строку.'
      - 'Плюс со строкой слева приводит число к строке и склеивает.'
    variants:
      - prompt: 'Что напечатает этот код после стирания типов?'
        snippet: |
          const base: number = 100;
          const rate: number = 3;
          console.log(base * rate);
        expected:
          kind: stdout
          value: |-
            300
        explanation: 'Аннотации стираются, остаётся умножение чисел: 100 на 3 даёт 300.'
      - prompt: 'Что напечатает этот код после стирания типов?'
        snippet: |
          const name: string = 'Борис';
          const orders: number = 5;
          console.log(name + ' сделал ' + orders + ' заказа');
        expected:
          kind: stdout
          value: |-
            Борис сделал 5 заказа
        explanation: 'Число приводится к строке при склейке через плюс: получается «Борис сделал 5 заказа».'

  - id: basic-types-any-hole-001
    concept: basic-types
    type: theory-quiz
    difficulty: 3
    prompt: 'В нестрогом режиме параметр функции написали без типа: function total(price, delivery). Что с ним происходит?'
    choices:
      - id: a
        text: 'Каждый параметр молча получает тип any, и проверка типов по нему фактически отключается.'
      - id: b
        text: 'Оба параметра автоматически становятся number.'
      - id: c
        text: 'Код не скомпилируется: параметры обязаны иметь аннотацию всегда.'
      - id: d
        text: 'Параметры становятся string, потому что так безопаснее.'
    correct: [a]
    explanation: 'У параметра нет значения справа, из которого вывести тип, поэтому в нестрогом режиме он становится any - «любой тип». Любые операции с ним разрешены, и защита пропадает. Строгий режим запрещает такой неявный any и требует аннотацию.'
    hints:
      - 'У параметра нет инициализатора. Из чего тогда выводить тип?'
      - 'Вспомните, во что превращается значение, тип которого TypeScript не смог определить и не был обязан.'
