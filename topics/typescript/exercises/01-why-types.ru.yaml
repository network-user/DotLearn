exercises:
  - id: why-types-relationship-001
    concept: why-types
    type: theory-quiz
    difficulty: 1
    prompt: 'Как TypeScript соотносится с JavaScript?'
    choices:
      - id: a
        text: 'Это JavaScript плюс слой аннотаций о типах; после проверки типы стираются и остаётся обычный JavaScript.'
      - id: b
        text: 'Это отдельный язык, несовместимый с JavaScript, со своим рантаймом в браузере.'
      - id: c
        text: 'Это библиотека, которую подключают в рантайме для проверки типов на лету.'
      - id: d
        text: 'Это ускоритель JavaScript: тот же код, но выполняется быстрее.'
    correct: [a]
    explanation: 'TypeScript надстраивает над JavaScript аннотации типов и проверяет их до запуска. На выходе получается обычный JavaScript без типов, поэтому в браузере от TypeScript не остаётся ничего.'
    hints:
      - 'Вспомните путь кода: проверка типов, затем стирание, затем запуск. Что уезжает в браузер на последнем шаге?'
      - 'Подумайте, меняется ли рантайм от добавления аннотаций.'
    variants:
      - prompt: 'На каком этапе TypeScript находит несоответствие типов?'
        choices:
          - id: a
            text: 'До запуска: в редакторе и при сборке.'
          - id: b
            text: 'Во время выполнения, когда строка кода уже считается.'
          - id: c
            text: 'Только после того, как ошибка дошла до пользователя.'
          - id: d
            text: 'Никогда: TypeScript не проверяет типы, а только подсказывает поля.'
        correct: [a]
        explanation: 'Проверка типов - отдельный этап до запуска. Именно поэтому ошибку видно в редакторе красной волной, а не на живом покупателе.'
      - prompt: 'Что происходит с аннотацией : number при сборке проекта?'
        choices:
          - id: a
            text: 'Она стирается: в готовом JavaScript её нет.'
          - id: b
            text: 'Она превращается в проверку типа во время выполнения.'
          - id: c
            text: 'Она остаётся в коде и замедляет выполнение.'
          - id: d
            text: 'Она копируется в отдельный файл проверок.'
        correct: [a]
        explanation: 'Типы существуют только на этапе разработки. При сборке аннотации удаляются, и на выходе - обычный JavaScript.'

  - id: why-types-erasure-predict-001
    concept: why-types
    type: predict-output
    difficulty: 2
    prompt: 'После стирания типов это обычный JavaScript. Что он напечатает?'
    snippet: |
      const price: number = 2999;
      const delivery: number = 299;
      console.log(price + delivery);
    expected:
      kind: stdout
      value: |-
        3298
    explanation: 'Аннотации : number стираются, остаётся сложение двух чисел. Оба операнда - числа, поэтому плюс складывает: печатается 3298.'
    hints:
      - 'Мысленно удалите все : number и прочитайте то, что осталось, как обычный JavaScript.'
      - 'Определите тип каждого операнда у плюса, а потом решайте, складывает он или склеивает.'
    variants:
      - prompt: 'Что напечатает этот код после стирания типов?'
        snippet: |
          const city: string = 'Казань';
          const region: string = 'Татарстан';
          console.log(city + ', ' + region);
        expected:
          kind: stdout
          value: |-
            Казань, Татарстан
        explanation: 'Строки склеиваются оператором плюс: получается «Казань, Татарстан». Аннотации : string на результат не влияют, они лишь помогли компилятору.'
      - prompt: 'Что напечатает этот код после стирания типов?'
        snippet: |
          const count: number = 3;
          const label: string = 'заказа';
          console.log(count + ' ' + label);
        expected:
          kind: stdout
          value: |-
            3 заказа
        explanation: 'Число приводится к строке при склейке через плюс со строкой: печатается «3 заказа». Типы здесь только описывают значения, но не меняют поведение плюса.'

  - id: why-types-limits-001
    concept: why-types
    type: theory-quiz
    difficulty: 3
    prompt: 'Сервер вернул JSON, и вы записали ответ в переменную с типом { price: number }. Фактически сервер прислал price строкой. Что сделает TypeScript?'
    choices:
      - id: a
        text: 'Ничего: для внешних данных тип - это обещание компилятору, а не проверка в рантайме. Несоответствие всплывёт только при выполнении.'
      - id: b
        text: 'Остановит программу с ошибкой типа в момент получения ответа.'
      - id: c
        text: 'Автоматически преобразует строку в число.'
      - id: d
        text: 'Отправит запрос заново, пока сервер не вернёт число.'
    correct: [a]
    explanation: 'TypeScript не запускает код и не видит настоящий ответ сервера. Он верит объявленному типу. Граница между миром типов и реальными данными проходит по вводу, и проверять внешние данные нужно обычным кодом.'
    hints:
      - 'Вспомните, что проверка типов идёт до запуска и не выполняет код. Может ли она увидеть настоящий ответ сети?'
      - 'Для внешних данных объявленный тип - это ваше обещание, а не установленный факт. Кто отвечает за проверку на границе?'

  - id: why-types-value-001
    concept: why-types
    type: theory-quiz
    difficulty: 3
    prompt: 'Какое утверждение о пользе типов верно?'
    choices:
      - id: a
        text: 'Типы дают автодополнение и безопасный рефакторинг, но не заменяют тесты бизнес-логики.'
      - id: b
        text: 'Типы полностью заменяют тесты, потому что проверяют любую ошибку.'
      - id: c
        text: 'Типы ускоряют собранный JavaScript в браузере.'
      - id: d
        text: 'Типы проверяют корректность данных из сети во время выполнения.'
    correct: [a]
    explanation: 'Типы ловят путаницу видов значений и помогают инструментам, но не проверяют, что логика верна: сложили вы или перемножили - вопрос теста, а не типа. Скорость рантайма и внешние данные - вне зоны типов.'
    hints:
      - 'Разделите два класса ошибок: «перепутал число со строкой» и «перепутал плюс с минусом». Какой из них ловит тип?'
      - 'Вспомните список того, чего типы не делают: скорость, тесты, внешние данные.'
