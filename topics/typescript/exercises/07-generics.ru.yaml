exercises:
  - id: generics-identity-blanks-001
    concept: generics
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Функция возвращает то же значение, что получила, сохраняя его тип. Впишите параметр типа и типы параметра и результата.'
    template: |
      function identity<{{t1}}>(value: {{t2}}): {{t3}} {
        return value;
      }
    blanks:
      t1:
        accept: ['T']
      t2:
        accept: ['T']
      t3:
        accept: ['T']
    explanation: 'Параметр типа объявляют в угловых скобках (T), затем используют для типа аргумента и результата. Так тип входа переносится на выход: что пришло, то и вернулось.'
    hints:
      - 'Сначала объявите переменную типа в скобках, затем используйте это же имя для входа и выхода.'
      - 'По традиции параметр типа называют одной буквой T.'
    variants:
      - prompt: 'Функция возвращает первый элемент массива, сохраняя его тип. Впишите параметр типа, тип массива и тип результата.'
        template: |
          function first<{{t1}}>(arr: {{t2}}[]): {{t3}} {
            return arr[0];
          }
        blanks:
          t1:
            accept: ['T']
          t2:
            accept: ['T']
          t3:
            accept: ['T']
        explanation: 'T - параметр типа. Массив элементов T записывают как T[], а первый элемент имеет тип T. Тип элемента проходит насквозь до результата.'
      - prompt: 'Функция оборачивает значение в объект { value }. Впишите параметр типа и типы поля и аргумента.'
        template: |
          function wrap<{{t1}}>(value: {{t2}}): { value: {{t3}} } {
            return { value };
          }
        blanks:
          t1:
            accept: ['T']
          t2:
            accept: ['T']
          t3:
            accept: ['T']
        explanation: 'Параметр типа T задаётся в скобках и используется для типа аргумента и поля value. Обёртка сохраняет тип вложенного значения.'

  - id: generics-inference-quiz-001
    concept: generics
    type: theory-quiz
    difficulty: 2
    prompt: 'Для функции function first<T>(arr: T[]): T вызывают first([10, 20, 30]). Какой тип у результата?'
    choices:
      - id: a
        text: 'number: T вывелся из массива чисел, поэтому результат тоже number.'
      - id: b
        text: 'any: параметр типа теряет конкретику; будто типы живут в рантайме и заменяют валидацию'
      - id: c
        text: 'T: результат всегда остаётся буквой T'
      - id: d
        text: 'number[]: возвращается весь массив'
    correct: [a]
    explanation: 'TypeScript выводит T из аргумента. Массив [10, 20, 30] это number[], значит T = number, и результат имеет тип number. Именно эту связь any потерял бы, отдав any.'
    hints:
      - 'Из какого аргумента TypeScript выведет T и какой тип у его элементов?'
      - 'Раз возвращается элемент типа T, а T это тип элемента массива, чему он равен здесь?'
    variants:
      - prompt: 'Для function first<T>(arr: T[]): T вызывают first([''Москва'', ''Казань'']). Какой тип у результата?'
        choices:
          - id: a
            text: 'string: T вывелся из массива строк.'
          - id: b
            text: 'number - якобы всегда число, даже для массива строк'
          - id: c
            text: 'string[] - возвращается весь массив, а не один элемент'
          - id: d
            text: 'any - вывод типов якобы всегда падает в any'
        correct: [a]
        explanation: 'Массив строк даёт T = string, поэтому результат - строка. Одна и та же функция возвращает точный тип под каждый вызов.'
      - prompt: 'Для function pair<K, V>(key: K, value: V): [K, V] вызывают pair(''Казань'', 2999). Какой тип у результата?'
        choices:
          - id: a
            text: 'Кортеж [string, number]: K вывелся строкой, V числом.'
          - id: b
            text: '[number, string]'
          - id: c
            text: 'any[] - будто типы живут в рантайме и заменяют валидацию'
          - id: d
            text: '[string, string]'
        correct: [a]
        explanation: 'K выводится из первого аргумента (строка), V из второго (число). Результат - кортеж [string, number] в том же порядке.'

  - id: generics-erasure-predict-001
    concept: generics
    type: predict-output
    difficulty: 2
    prompt: 'После стирания типов дженерики исчезают вместе с параметрами типа. Что напечатает код?'
    snippet: |
      function first<T>(arr: T[]): T {
        return arr[0];
      }
      console.log(first([10, 20, 30]));
      console.log(first(['a', 'b']));
    expected:
      kind: stdout
      value: |-
        10
        a
    explanation: 'Параметр типа T и аннотации стираются, остаётся return arr[0]. Первый элемент [10, 20, 30] это 10, первый элемент [''a'', ''b''] это «a».'
    hints:
      - 'Уберите все угловые скобки и аннотации - что делает функция на чистом JavaScript?'
      - 'Функция возвращает элемент с индексом 0 каждого массива.'
    variants:
      - prompt: 'Что напечатает этот код после стирания типов?'
        snippet: |
          function wrap<T>(value: T): { value: T } {
            return { value };
          }
          console.log(wrap(42).value);
          console.log(wrap('привет').value);
        expected:
          kind: stdout
          value: |-
            42
            привет
        explanation: 'После стирания функция просто оборачивает значение в объект и возвращает его. Обращение к .value достаёт исходное значение: 42 и «привет».'
      - prompt: 'Что напечатает этот код после стирания типов?'
        snippet: |
          function pair<K, V>(key: K, value: V): [K, V] {
            return [key, value];
          }
          const p = pair('город', 'Казань');
          console.log(p[0] + ': ' + p[1]);
        expected:
          kind: stdout
          value: |-
            город: Казань
        explanation: 'Функция возвращает массив из двух элементов. p[0] это «город», p[1] это «Казань», склейка даёт «город: Казань».'

  - id: generics-constraint-quiz-001
    concept: generics
    type: theory-quiz
    difficulty: 4
    prompt: >-
      Функция объявлена как function longest<T extends { length: number }>(a: T, b: T): T и возвращает
      более длинный аргумент. Что вернёт longest('Москва', 'Казань') и почему?
    choices:
      - id: a
        text: 'Строку (тип string): extends требует length, но T остаётся string.'
      - id: b
        text: 'Значение типа { length: number }: результат сужается до ограничения.'
      - id: c
        text: 'any: из-за extends параметр якобы теряет конкретный тип аргумента.'
      - id: d
        text: 'number: возвращается длина более длинной строки, а не сама строка.'
    correct: [a]
    explanation: 'Ограничение T extends { length: number } - это требование к параметру: у него должно быть поле length. Но сам T остаётся конкретным типом переданного аргумента. Обе строки имеют тип string, поэтому T = string, и функция возвращает string, а не тип ограничения и не число.'
    hints:
      - 'Что делает extends: заменяет тип T на { length: number } или лишь требует наличие поля length?'
      - 'Оба аргумента - строки. Каким остаётся T и, значит, результат?'
