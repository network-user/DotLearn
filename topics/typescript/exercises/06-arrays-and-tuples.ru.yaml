exercises:
  - id: arrays-annotate-blanks-001
    concept: arrays-and-tuples
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Впишите типы массивов: список цен - числа, список городов - строки. Используйте короткую запись с квадратными скобками.'
    template: |
      const prices: {{t1}} = [2999, 899, 1499];
      const cities: {{t2}} = ['Москва', 'Казань'];
    blanks:
      t1:
        accept: ['number[]', 'Array<number>']
      t2:
        accept: ['string[]', 'Array<string>']
    explanation: 'Тип массива - это тип элемента со скобками. Список чисел - number[], список строк - string[]. Равнозначны записи Array<number> и Array<string>.'
    hints:
      - 'Какого вида элементы в каждом массиве? Допишите к нему квадратные скобки.'
      - 'Короткая запись массива чисел - number со скобками.'
    variants:
      - prompt: 'Впишите типы массивов: набор тегов - строки, набор оценок - числа.'
        template: |
          const tags: {{t1}} = ['новинка', 'скидка'];
          const scores: {{t2}} = [5, 4, 5];
        blanks:
          t1:
            accept: ['string[]', 'Array<string>']
          t2:
            accept: ['number[]', 'Array<number>']
      - prompt: 'Впишите типы массивов: флаги показа - логические значения, идентификаторы - числа.'
        template: |
          const flags: {{t1}} = [true, false, true];
          const ids: {{t2}} = [1, 2, 3];
        blanks:
          t1:
            accept: ['boolean[]', 'Array<boolean>']
          t2:
            accept: ['number[]', 'Array<number>']

  - id: arrays-vs-tuple-quiz-001
    concept: arrays-and-tuples
    type: theory-quiz
    difficulty: 2
    prompt: 'Координата на карте - это ровно широта и долгота, два числа, и всегда именно два. Какой тип подходит точнее?'
    choices:
      - id: a
        text: 'Кортеж [number, number]: фиксирует длину два и тип каждой позиции.'
      - id: b
        text: 'Массив number[]: он и так хранит числа.'
      - id: c
        text: 'Объект { number }.'
      - id: d
        text: 'Тип number: координата же из чисел.'
    correct: [a]
    explanation: 'number[] разрешил бы и одно число, и пять. Кортеж [number, number] требует ровно два элемента и фиксирует роль каждого - это точное описание координаты.'
    hints:
      - 'Что важнее для координаты: «сколько угодно чисел» или «ровно два числа»?'
      - 'Какой из инструментов фиксирует длину и порядок позиций?'
    variants:
      - prompt: 'Список цен товаров может содержать сколько угодно чисел. Какой тип подходит?'
        choices:
          - id: a
            text: 'Массив number[]: однородные данные произвольной длины.'
          - id: b
            text: 'Кортеж [number, number]: цены всегда парами.'
          - id: c
            text: 'Тип number.'
          - id: d
            text: 'Тип string[].'
        correct: [a]
        explanation: 'Цен может быть любое количество, и все они числа. Это однородная пачка неизвестной длины - массив number[]. Кортеж навязал бы фиксированную длину.'
      - prompt: 'Пара «код валюты и курс» - строка и число в фиксированном порядке. Что подходит точнее?'
        choices:
          - id: a
            text: 'Кортеж [string, number].'
          - id: b
            text: 'Массив string[].'
          - id: c
            text: 'Массив number[].'
          - id: d
            text: 'Тип string | number.'
        correct: [a]
        explanation: 'Позиции разных типов и в фиксированном порядке - это кортеж [string, number]: первый элемент всегда строка кода, второй всегда число курса.'

  - id: arrays-methods-predict-001
    concept: arrays-and-tuples
    type: predict-output
    difficulty: 2
    prompt: 'После стирания типов это обычный JavaScript. Что он напечатает?'
    snippet: |
      const nums: number[] = [1, 2, 3];
      const doubled = nums.map((n) => n * 2);
      console.log(doubled.join(','));
    expected:
      kind: stdout
      value: |-
        2,4,6
    explanation: 'Аннотации стираются. map умножает каждый элемент на два, получая [2, 4, 6], а join склеивает их через запятую: «2,4,6».'
    hints:
      - 'Сначала посчитайте результат map, потом соедините его через join.'
      - 'join(",") ставит запятую между элементами без пробелов.'
    variants:
      - prompt: 'Что напечатает этот код после стирания типов?'
        snippet: |
          const prices: number[] = [100, 200, 300];
          const total = prices.reduce((acc, n) => acc + n, 0);
          console.log(total);
        expected:
          kind: stdout
          value: |-
            600
        explanation: 'reduce складывает элементы, начиная с 0: 0+100+200+300 даёт 600.'
      - prompt: 'Что напечатает этот код после стирания типов?'
        snippet: |
          const cities: string[] = ['Москва', 'Казань', 'Пермь'];
          const long = cities.filter((c) => c.length > 5);
          console.log(long.join(' и '));
        expected:
          kind: stdout
          value: |-
            Москва и Казань
        explanation: 'filter оставляет города длиннее пяти букв: «Москва» (6) и «Казань» (6) проходят, «Пермь» (5) - нет. join склеивает их через « и ».'

  - id: arrays-tuple-destructure-001
    concept: arrays-and-tuples
    type: theory-quiz
    difficulty: 3
    prompt: 'Переменная объявлена как const items = [] без аннотации. Какой у неё тип и в чём опасность?'
    choices:
      - id: a
        text: 'Тип any[]: выводить тип элемента не из чего, поэтому проверка отключается и в массив можно класть что угодно.'
      - id: b
        text: 'Тип never[]: пустой массив не принимает элементов.'
      - id: c
        text: 'Тип number[] по умолчанию.'
      - id: d
        text: 'Код не скомпилируется: пустой массив запрещён.'
    correct: [a]
    explanation: 'Массив пуст, поэтому тип элемента вывести неоткуда - получается any[]. Дальше в него можно добавить и число, и строку, и объект, а TypeScript промолчит. Если массив наполняется позже, укажите тип сразу: const items: string[] = [].'
    hints:
      - 'Из чего TypeScript выводит тип элемента, если массив пустой?'
      - 'Во что превращается тип, который вывести не удалось, и что это значит для проверки?'
