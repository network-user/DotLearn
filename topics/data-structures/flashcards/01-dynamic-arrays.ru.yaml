conceptId: dynamic-arrays
cards:
  - id: dynamic-arrays-01
    front: "Как список Python хранит элементы в памяти?"
    back: "Непрерывным массивом указателей: каждая ячейка хранит адрес объекта, а не сам объект. Отсюда доступ по индексу за O(1): адрес вычисляется арифметикой."
    tags: [basics]
  - id: dynamic-arrays-02
    front: "Почему append амортизированно стоит O(1), если иногда список приходится перевыделять целиком?"
    back: "Ёмкость растёт мультипликативно (удвоение в учебной модели, около 1.125x в CPython), поэтому перевыделения случаются всё реже. Суммарная стоимость n добавлений O(n), в среднем константа на вставку."
    tags: [complexity]
  - id: dynamic-arrays-03
    front: "Почему insert(0, x) и pop(0) стоят O(n)?"
    back: "Массив обязан оставаться непрерывным: вставка или удаление в начале сдвигает все остальные указатели на одну ячейку, независимо от того, что именно вставляется."
    tags: [complexity, pitfalls]
  - id: dynamic-arrays-04
    front: "Что делает b = a со списком a? Как получить настоящую копию?"
    back: "b = a не копирует список, а вешает второе имя на тот же объект: изменения через одно имя видны через другое. Копию дают list(a), a[:] или copy.copy(a); все три поверхностные."
    tags: [aliasing]
  - id: dynamic-arrays-05
    front: "Чем отличаются a += [x] и a = a + [x]?"
    back: "a += [x] меняет существующий список на месте, и все алиасы видят изменение. a = a + [x] создаёт новый список и перевешивает имя a, а старые алиасы остаются со старым содержимым."
    tags: [aliasing, pitfalls]
  - id: dynamic-arrays-06
    front: "Почему [[0] * 3] * 2 создаёт баг при попытке изменить одну строку сетки?"
    back: "Умножение списка копирует указатель на одну и ту же внутреннюю строку n раз, а не создаёт n независимых строк. Правка grid[0][0] меняет все строки сразу. Исправление: [[0] * 3 for _ in range(2)]."
    tags: [pitfalls]
