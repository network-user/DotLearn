conceptId: stacks-and-queues
cards:
  - id: stacks-and-queues-01
    front: "Чем стек отличается от очереди по дисциплине выдачи элементов?"
    back: "Стек это LIFO: последний добавленный элемент уходит первым (стопка тарелок). Очередь это FIFO: первым уходит тот, кто пришёл первым (очередь в магазине)."
    tags: [basics]
  - id: stacks-and-queues-02
    front: "Почему обычный list уже является стеком без дополнительного кода?"
    back: "append и pop() без аргумента работают с хвостом списка, где уже выделен запас ёмкости, поэтому обе операции стоят O(1) амортизированно. Ничего сверх list для стека не нужно."
    tags: [basics]
  - id: stacks-and-queues-03
    front: "Почему list плохо подходит для очереди?"
    back: "append на конец дешёвый, O(1), но pop(0) с начала стоит O(n): каждый вызов сдвигает все оставшиеся указатели влево. На длинной очереди это превращается в скрытый O(n²)."
    tags: [pitfalls]
  - id: stacks-and-queues-04
    front: "Какие операции collections.deque стоят O(1) амортизированно и чем она за это расплачивается?"
    back: "append, appendleft, pop, popleft одинаково дёшевы с обоих концов. Расплата, доступ по индексу dq[i] стоит O(n), потому что deque хранится блоками, а не одним непрерывным массивом."
    tags: [deque]
  - id: stacks-and-queues-05
    front: "Что делает deque(maxlen=n) при переполнении?"
    back: "Автоматически выталкивает элемент с противоположного конца при каждом добавлении сверх лимита n. Это готовый кольцевой буфер для последних N событий или логов, без ручного кода."
    tags: [deque]
  - id: stacks-and-queues-06
    front: "Какие два классических применения стека и очереди стоит знать наизусть?"
    back: "Стек: стек вызовов функций (и его переполнение, RecursionError), undo-редактор, DFS через явный стек. Очередь: BFS через deque и popleft(), обработка задач в порядке поступления."
    tags: [applications]
