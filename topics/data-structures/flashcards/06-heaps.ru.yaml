conceptId: heaps
cards:
  - id: heaps-01
    front: "Какое единственное правило задаёт min-heap и что оно НЕ гарантирует?"
    back: "Родитель не больше значений обоих своих детей. Порядок между двумя детьми одного родителя не определён, и весь массив кучи не является отсортированным."
    tags: [basics]
  - id: heaps-02
    front: "Как куча хранится в памяти и как найти детей и родителя узла с индексом i?"
    back: "Плоским списком без ссылок и объектов-узлов. Дети индекса i: 2*i + 1 и 2*i + 2. Родитель индекса i: (i - 1) // 2."
    tags: [internals]
  - id: heaps-03
    front: "Сколько стоят heapq.heappush, heapq.heappop и чтение heap[0]?"
    back: "heappush и heappop стоят O(log n): новый элемент просеивается вверх (sift up) или вниз (sift down) вдоль одной ветки дерева. heap[0] отдаёт минимум за O(1) без снятия."
    tags: [complexity]
  - id: heaps-04
    front: "Почему heapq.heapify(items) дешевле, чем n последовательных heappush?"
    back: "heapify просеивает вниз, начиная с нижних уровней, где просеивать почти нечего: суммарная работа по всем уровням сходится к O(n), а не к O(n log n), которые дали бы n отдельных heappush."
    tags: [complexity]
  - id: heaps-05
    front: "heapq умеет только min-heap. Как получить поведение max-heap?"
    back: "Хранить в куче отрицательные значения: heapq.heappush(heap, -value), а при чтении возвращать знак обратно, -heap[0] или -heapq.heappop(heap). Минимум отрицательных чисел соответствует максимуму исходных."
    tags: [pitfalls]
  - id: heaps-06
    front: "Почему heapq.heappush(heap, (priority, obj)) иногда падает с TypeError, и как это исправить?"
    back: "При равном priority Python сравнивает вторые элементы кортежа, и если obj несравним (например, произвольный объект), сравнение падает. Исправление: добавить в кортеж уникальный счётчик, (priority, counter, obj), он всегда разный и разрешает ничьи раньше obj."
    tags: [pitfalls]
