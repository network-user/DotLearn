conceptId: trees-and-bst
cards:
  - id: trees-and-bst-01
    front: "Какое правило (инвариант) задаёт двоичное дерево поиска?"
    back: "Для любого узла все значения в его левом поддереве меньше значения узла, а все значения в правом поддереве больше или равны. Правило рекурсивное, верно для каждого узла, а не только для корня."
    tags: [basics]
  - id: trees-and-bst-02
    front: "Какой обход BST всегда возвращает значения по возрастанию и в каком порядке он посещает узлы?"
    back: "Inorder-обход: сначала рекурсивно левое поддерево, затем сам узел, затем рекурсивно правое поддерево. Порядок вставки не влияет на результат, только на форму дерева."
    tags: [traversal]
  - id: trees-and-bst-03
    front: "От чего зависит сложность поиска, вставки и удаления в BST?"
    back: "От высоты дерева h: операции стоят O(h). На сбалансированном дереве h равно O(log n), на вырожденном (например, после вставки уже отсортированных данных) h равно O(n)."
    tags: [complexity]
  - id: trees-and-bst-04
    front: "Что происходит с BST при вставке уже отсортированного списка значений?"
    back: "Дерево вырождается в цепочку: каждое новое значение больше всех предыдущих и уходит в правое поддерево. Поиск последнего вставленного значения превращается в O(n), обычный список получился бы не хуже."
    tags: [pitfalls]
  - id: trees-and-bst-05
    front: "Что гарантируют самобалансирующиеся деревья (AVL, красно-чёрные), чего не гарантирует обычная BST?"
    back: "Высоту O(log n) при любом порядке вставок, за счёт локальных перестроений (поворотов) после каждой операции. Обычная BST не защищена от вырождения в цепочку."
    tags: [advanced]
  - id: trees-and-bst-06
    front: "Когда выбирать BST вместо dict/set, если обе структуры умеют искать по ключу?"
    back: "dict и set быстрее для чистого поиска, O(1) в среднем против O(log n). BST выигрывает, когда нужен порядок: диапазонные запросы, ближайшее меньшее значение, k-е по счёту значение, которые dict/set не дают без полной сортировки."
    tags: [tradeoffs]
