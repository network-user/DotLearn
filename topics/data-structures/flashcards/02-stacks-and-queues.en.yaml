conceptId: stacks-and-queues
cards:
  - id: stacks-and-queues-01
    front: "How does a stack differ from a queue in the discipline of releasing elements?"
    back: "A stack is LIFO: the last element added leaves first (a stack of plates). A queue is FIFO: the first one to arrive leaves first (a line at a store)."
    tags: [basics]
  - id: stacks-and-queues-02
    front: "Why is a plain list already a stack without any extra code?"
    back: "append and pop() without an argument work at the tail of the list, where spare capacity is already allocated, so both operations cost O(1) amortized. Nothing beyond list is needed for a stack."
    tags: [basics]
  - id: stacks-and-queues-03
    front: "Why is list a poor fit for a queue?"
    back: "append at the end is cheap, O(1), but pop(0) at the front costs O(n): every call shifts all remaining pointers left. On a long queue this turns into a hidden O(n²)."
    tags: [pitfalls]
  - id: stacks-and-queues-04
    front: "Which collections.deque operations are O(1) amortized, and what is the tradeoff?"
    back: "append, appendleft, pop, popleft are all equally cheap at both ends. The tradeoff: indexed access dq[i] costs O(n), because a deque is stored as blocks, not one contiguous array."
    tags: [deque]
  - id: stacks-and-queues-05
    front: "What does deque(maxlen=n) do on overflow?"
    back: "It automatically pushes out the element from the opposite end on every insertion beyond the limit n. That is a ready-made ring buffer for the last N events or log lines, with no manual code."
    tags: [deque]
  - id: stacks-and-queues-06
    front: "Which two classic uses of stacks and queues are worth knowing by heart?"
    back: "Stack: the function call stack (and its overflow, RecursionError), undo editors, DFS via an explicit stack. Queue: BFS via deque and popleft(), processing tasks in arrival order."
    tags: [applications]
