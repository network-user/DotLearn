conceptId: hash-tables
cards:
  - id: hash-tables-01
    front: "Какая формула соединяет ключ и корзину в хеш-таблице?"
    back: "индекс = hash(ключ) % m, где m это число корзин. Вставка и поиск считают этот индекс и работают с одной корзиной, а не сканируют всю таблицу."
    tags: [basics]
  - id: hash-tables-02
    front: "Какие два способа разрешения коллизий существуют и какой выбрал CPython для dict?"
    back: "Цепочки (chaining): корзина хранит список пар. Открытая адресация (open addressing): при занятой корзине пробуют другие ячейки по правилу. CPython dict использует открытую адресацию, она компактнее и дружелюбнее к кешу процессора."
    tags: [internals]
  - id: hash-tables-03
    front: "Что происходит с dict, когда коэффициент загрузки превышает порог?"
    back: "Таблица выделяет массив побольше и перекладывает все ключи заново (рехеширование), потому что у нового m другие остатки от деления. Это O(n)-операция, но случается всё реже по мере роста, поэтому средняя вставка остаётся O(1)."
    tags: [complexity]
  - id: hash-tables-04
    front: "Что значит hashable и какие объекты не подходят в качестве ключей?"
    back: "Ключ обязан иметь неизменный на протяжении жизни хеш. list не hashable и вызывает TypeError; tuple hashable, если только внутри него самого нет изменяемых элементов, например list."
    tags: [pitfalls]
  - id: hash-tables-05
    front: "Начиная с какой версии Python dict помнит порядок вставки, и распространяется ли это на set?"
    back: "С Python 3.7 итерация по dict идёт в порядке вставки, это следствие компактной реализации. На set гарантии нет: его порядок зависит от хешей и случайной соли процесса."
    tags: [internals]
  - id: hash-tables-06
    front: "Какие три паттерна на dict/set закрывают половину задач собеседований на структуры данных?"
    back: "Подсчёт частот через counts.get(key, 0) + 1, поиск первого дубликата через set «уже видели», проверка «встречалась ли пара/дополнение» через set или dict. Все три превращают O(n²) перебор в один проход за O(n)."
    tags: [applications]
