conceptId: graphs
cards:
  - id: graphs-01
    front: "Из чего состоит граф и какие его разновидности надо знать?"
    back: "Граф состоит из вершин и рёбер между ними. Ребро может иметь направление (ориентированный граф против неориентированного) и вес (взвешенный граф, например минуты перегона)."
    tags: [basics]
  - id: graphs-02
    front: "Что хранит список смежности и сколько памяти он занимает?"
    back: "Для каждой вершины хранится список её соседей: на Python это dict со списками, defaultdict(list) или список списков. Память O(V + E), перебор соседей дешёвый, а проверка конкретного ребра требует поиска по списку."
    tags: [representation]
  - id: graphs-03
    front: "Когда оправдана матрица смежности?"
    back: "На маленьких либо плотных графах, где рёбер близко к V² и нужен ответ «есть ли ребро между u и v» за O(1). Цена: O(V²) памяти независимо от числа рёбер и O(V) на перебор соседей."
    tags: [representation, tradeoffs]
  - id: graphs-04
    front: "Чем BFS отличается от DFS по механике и структуре данных?"
    back: "BFS раскрывает граф волнами через очередь (deque и popleft), DFS уходит вглубь через стек или рекурсию. В коде их разделяет одна строка: popleft() против pop()."
    tags: [traversal]
  - id: graphs-05
    front: "Почему BFS находит кратчайший путь в невзвешенном графе?"
    back: "Очередь обрабатывает вершины строго по возрастанию расстояния от старта: уровень k заканчивается раньше, чем начнётся k+1. Первое попадание вершины в очередь происходит по пути с минимальным числом рёбер."
    tags: [traversal, bfs]
  - id: graphs-06
    front: "Зачем при обходе графа множество visited и когда отмечать вершину?"
    back: "Без visited любой цикл, а в неориентированном графе цикл создаёт уже одно ребро, зацикливает обход. Отмечайте вершину в момент добавления в очередь: отметка при извлечении плодит дубликаты в очереди."
    tags: [traversal, pitfalls]
