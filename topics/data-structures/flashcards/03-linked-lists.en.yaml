conceptId: linked-lists
cards:
  - id: linked-lists-01
    front: "What is a linked-list node made of, and what holds the structure together from the outside?"
    back: "A node stores a value and a next link to the following node; the last node's next is None. From the outside, a single head variable pointing to the first node holds the structure together."
    tags: [basics]
  - id: linked-lists-02
    front: "Why does a linked list not have O(1) indexed access?"
    back: "Nodes are scattered across the heap rather than laid out in contiguous memory, so the address of the i-th node cannot be computed arithmetically. The only route to it, from the head via i next links, is O(n)."
    tags: [complexity]
  - id: linked-lists-03
    front: "Why does insertion at a known node spot cost O(1)?"
    back: "It only takes two assignments: new.next = spot.next, then spot.next = new. Nothing shifts. O(1) applies only once the node is already in hand; if the spot first has to be found by traversal, the whole operation costs O(n)."
    tags: [complexity]
  - id: linked-lists-04
    front: "How do you reverse a singly linked list in one pass with no extra memory?"
    back: "With three pointers: prev (the already-reversed part), node (current node), nxt (saves the continuation before the link gets redirected). Each step: nxt = node.next, node.next = prev, prev = node, node = nxt. The new head is prev after the loop."
    tags: [algorithms]
  - id: linked-lists-05
    front: "Where are linked lists actually used in the Python standard library?"
    back: "collections.deque is built as a doubly linked list of 64-element blocks. functools.lru_cache keeps a circular doubly linked list for O(1) moving of an entry to the end. Application code rarely hand-writes a linked list."
    tags: [applications]
  - id: linked-lists-06
    front: "How do you detect a cycle in a linked list with no extra memory?"
    back: "Floyd's tortoise-and-hare algorithm: a slow pointer steps one node at a time, a fast one steps two. If there is a cycle, they will eventually meet inside the loop; if there is no cycle, the fast pointer reaches None first."
    tags: [algorithms, edge-cases]
