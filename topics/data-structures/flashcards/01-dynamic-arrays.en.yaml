conceptId: dynamic-arrays
cards:
  - id: dynamic-arrays-01
    front: "How does a Python list store elements in memory?"
    back: "As a contiguous array of pointers: each cell holds an object's address, not the object itself. That gives O(1) indexed access: the address is computed arithmetically."
    tags: [basics]
  - id: dynamic-arrays-02
    front: "Why is append amortized O(1), even though the list sometimes has to be fully reallocated?"
    back: "Capacity grows multiplicatively (doubling in the teaching model, about 1.125x in CPython), so reallocations happen ever more rarely. n appends cost O(n) total, a constant per insertion on average."
    tags: [complexity]
  - id: dynamic-arrays-03
    front: "Why do insert(0, x) and pop(0) cost O(n)?"
    back: "The array must stay contiguous: inserting or removing at the front shifts every other pointer by one cell, no matter what is being inserted."
    tags: [complexity, pitfalls]
  - id: dynamic-arrays-04
    front: "What does b = a do to list a? How do you get a real copy?"
    back: "b = a does not copy the list, it hangs a second name on the same object: changes through one name are visible through the other. list(a), a[:], and copy.copy(a) all give a copy; all three are shallow."
    tags: [aliasing]
  - id: dynamic-arrays-05
    front: "How do a += [x] and a = a + [x] differ?"
    back: "a += [x] mutates the existing list in place, and every alias sees the change. a = a + [x] creates a new list and rebinds the name a, while old aliases keep the old contents."
    tags: [aliasing, pitfalls]
  - id: dynamic-arrays-06
    front: "Why does [[0] * 3] * 2 cause a bug when you try to modify one row of the grid?"
    back: "List multiplication copies the pointer to the same inner row n times instead of creating n independent rows. Editing grid[0][0] changes every row at once. Fix: [[0] * 3 for _ in range(2)]."
    tags: [pitfalls]
