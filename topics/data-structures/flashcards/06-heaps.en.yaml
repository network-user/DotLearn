conceptId: heaps
cards:
  - id: heaps-01
    front: "What single rule defines a min-heap, and what does it NOT guarantee?"
    back: "A parent is not greater than either of its children's values. The order between two children of the same parent is undefined, and the heap's whole array is not sorted."
    tags: [basics]
  - id: heaps-02
    front: "How is a heap stored in memory, and how do you find the children and parent of index i?"
    back: "As a flat list with no links or node objects. Children of index i: 2*i + 1 and 2*i + 2. Parent of index i: (i - 1) // 2."
    tags: [internals]
  - id: heaps-03
    front: "What do heapq.heappush, heapq.heappop, and reading heap[0] cost?"
    back: "heappush and heappop cost O(log n): the new element is sifted up or sifted down along a single branch of the tree. heap[0] gives the minimum in O(1) without removing it."
    tags: [complexity]
  - id: heaps-04
    front: "Why is heapq.heapify(items) cheaper than n sequential heappush calls?"
    back: "heapify sifts down starting from the lower levels, where there is almost nothing to sift: the total work across all levels converges to O(n), rather than the O(n log n) that n separate heappush calls would cost."
    tags: [complexity]
  - id: heaps-05
    front: "heapq only supports a min-heap. How do you get max-heap behavior?"
    back: "Store negated values in the heap: heapq.heappush(heap, -value), and flip the sign back when reading, -heap[0] or -heapq.heappop(heap). The minimum of the negated numbers corresponds to the maximum of the originals."
    tags: [pitfalls]
  - id: heaps-06
    front: "Why does heapq.heappush(heap, (priority, obj)) sometimes fail with TypeError, and how do you fix it?"
    back: "On equal priority, Python compares the tuple's second elements, and if obj is not comparable (e.g. an arbitrary object), the comparison fails. Fix: add a unique counter to the tuple, (priority, counter, obj); it is always different and breaks ties before obj is ever compared."
    tags: [pitfalls]
