conceptId: graphs
cards:
  - id: graphs-01
    front: "What is a graph made of, and which variants should you know?"
    back: "A graph consists of vertices and edges between them. An edge can have direction (directed vs undirected graph) and weight (weighted graph, e.g. minutes for a leg of travel)."
    tags: [basics]
  - id: graphs-02
    front: "What does an adjacency list store, and how much memory does it use?"
    back: "For each vertex it stores a list of its neighbors: in Python that is a dict of lists, defaultdict(list), or a list of lists. Memory O(V + E), iterating neighbors is cheap, but checking a specific edge requires scanning a list."
    tags: [representation]
  - id: graphs-03
    front: "When is an adjacency matrix justified?"
    back: "On small or dense graphs, where the number of edges is close to V² and you need an 'is there an edge between u and v' answer in O(1). Cost: O(V²) memory regardless of the edge count, and O(V) to iterate neighbors."
    tags: [representation, tradeoffs]
  - id: graphs-04
    front: "How do BFS and DFS differ in mechanics and data structure?"
    back: "BFS unfolds the graph in waves via a queue (deque and popleft), DFS goes deep via a stack or recursion. In code, a single line separates them: popleft() versus pop()."
    tags: [traversal]
  - id: graphs-05
    front: "Why does BFS find the shortest path in an unweighted graph?"
    back: "The queue processes vertices strictly in order of increasing distance from the start: level k finishes before level k+1 begins. A vertex's first entry into the queue happens via a path with the minimum number of edges."
    tags: [traversal, bfs]
  - id: graphs-06
    front: "Why does traversing a graph need a visited set, and when should you mark a vertex?"
    back: "Without visited, any cycle, and in an undirected graph a single edge already creates one, loops the traversal forever. Mark a vertex the moment it is added to the queue: marking on removal instead produces duplicates in the queue."
    tags: [traversal, pitfalls]
