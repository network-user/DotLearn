conceptId: linked-lists
cards:
  - id: linked-lists-01
    front: "Из чего состоит узел связного списка и что держит структуру снаружи?"
    back: "Узел хранит значение и ссылку next на следующий узел; у последнего узла next равен None. Снаружи структуру держит одна переменная head, указывающая на первый узел."
    tags: [basics]
  - id: linked-lists-02
    front: "Почему у связного списка нет доступа по индексу за O(1)?"
    back: "Узлы разбросаны по куче, а не лежат в непрерывной памяти, поэтому адрес i-го узла нельзя вычислить арифметикой. Единственный маршрут к нему, от головы по i ссылкам next, O(n)."
    tags: [complexity]
  - id: linked-lists-03
    front: "Почему вставка при известном узле spot стоит O(1)?"
    back: "Достаточно двух присваиваний: new.next = spot.next, затем spot.next = new. Ничего не сдвигается. O(1) действует только когда узел уже в руках; если место сначала ищут обходом, вся операция стоит O(n)."
    tags: [complexity]
  - id: linked-lists-04
    front: "Как развернуть односвязный список за один проход без дополнительной памяти?"
    back: "Тремя указателями: prev (уже развёрнутая часть), node (текущий узел), nxt (спасает продолжение до перекидывания ссылки). На каждом шаге nxt = node.next, node.next = prev, prev = node, node = nxt. Новая голова, это prev после цикла."
    tags: [algorithms]
  - id: linked-lists-05
    front: "Где связные списки реально используются в стандартной библиотеке Python?"
    back: "collections.deque устроена как двусвязный список блоков по 64 элемента. functools.lru_cache держит кольцевой двусвязный список для O(1) переноса записи в конец. В прикладном коде связный список руками почти не пишут."
    tags: [applications]
  - id: linked-lists-06
    front: "Как обнаружить цикл в связном списке без дополнительной памяти?"
    back: "Алгоритм Флойда, черепаха и заяц: медленный указатель шагает на один узел, быстрый на два. Если есть цикл, они рано или поздно встретятся внутри петли; если цикла нет, быстрый первым дойдёт до None."
    tags: [algorithms, edge-cases]
