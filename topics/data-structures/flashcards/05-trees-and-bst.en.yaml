conceptId: trees-and-bst
cards:
  - id: trees-and-bst-01
    front: "What rule (invariant) defines a binary search tree?"
    back: "For any node, every value in its left subtree is smaller than the node's value, and every value in its right subtree is greater than or equal. The rule is recursive, true for every node, not just the root."
    tags: [basics]
  - id: trees-and-bst-02
    front: "Which BST traversal always returns values in increasing order, and in what order does it visit nodes?"
    back: "Inorder traversal: recursively the left subtree first, then the node itself, then recursively the right subtree. Insertion order does not affect the result, only the tree's shape."
    tags: [traversal]
  - id: trees-and-bst-03
    front: "What does the cost of search, insertion, and deletion in a BST depend on?"
    back: "On the tree's height h: operations cost O(h). On a balanced tree h is O(log n); on a degenerate one (for example after inserting already-sorted data) h is O(n)."
    tags: [complexity]
  - id: trees-and-bst-04
    front: "What happens to a BST when you insert an already sorted list of values?"
    back: "The tree degenerates into a chain: each new value is greater than all previous ones and goes into the right subtree. Searching for the last inserted value becomes O(n); a plain list would have done no worse."
    tags: [pitfalls]
  - id: trees-and-bst-05
    front: "What do self-balancing trees (AVL, red-black) guarantee that a plain BST does not?"
    back: "Height O(log n) regardless of insertion order, through local restructuring (rotations) after every operation. A plain BST has no protection against degenerating into a chain."
    tags: [advanced]
  - id: trees-and-bst-06
    front: "When should you choose a BST over dict/set, given both can look up by key?"
    back: "dict and set are faster for pure lookup, O(1) average versus O(log n). A BST wins when order matters: range queries, nearest-smaller value, k-th value by rank, things dict/set cannot give without a full sort."
    tags: [tradeoffs]
