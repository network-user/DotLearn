conceptId: hash-tables
cards:
  - id: hash-tables-01
    front: "What formula connects a key and a bucket in a hash table?"
    back: "index = hash(key) % m, where m is the number of buckets. Insertion and lookup compute this index and work with a single bucket, instead of scanning the whole table."
    tags: [basics]
  - id: hash-tables-02
    front: "What two collision-resolution methods exist, and which one did CPython choose for dict?"
    back: "Chaining: a bucket holds a list of pairs. Open addressing: on a taken bucket, other cells are tried according to a rule. CPython's dict uses open addressing, it is more compact and friendlier to the CPU cache."
    tags: [internals]
  - id: hash-tables-03
    front: "What happens to a dict when the load factor crosses a threshold?"
    back: "The table allocates a bigger array and re-inserts every key (rehashing), because the new m gives different remainders. This is an O(n) operation, but it happens ever more rarely as the table grows, so the average insertion stays O(1)."
    tags: [complexity]
  - id: hash-tables-04
    front: "What does hashable mean, and which objects do not work as keys?"
    back: "A key must have a hash that stays constant over its lifetime. list is not hashable and raises TypeError; tuple is hashable as long as it contains no mutable elements itself, such as a list."
    tags: [pitfalls]
  - id: hash-tables-05
    front: "Since which Python version does dict remember insertion order, and does that extend to set?"
    back: "Since Python 3.7, iterating a dict follows insertion order, a side effect of the compact implementation. set has no such guarantee: its order depends on hashes and the process's random seed."
    tags: [internals]
  - id: hash-tables-06
    front: "Which three dict/set patterns cover half of data-structure interview questions?"
    back: "Frequency counting via counts.get(key, 0) + 1, finding the first duplicate via a 'seen' set, checking whether a pair/complement has appeared via a set or dict. All three turn an O(n²) scan into a single O(n) pass."
    tags: [applications]
