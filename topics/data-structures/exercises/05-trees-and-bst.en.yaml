exercises:
  - id: bst-quiz-001
    concept: trees-and-bst
    type: theory-quiz
    difficulty: 1
    prompt: "Why does an inorder traversal (left subtree, node, right subtree) of a binary search tree always return values in increasing order?"
    choices:
      - id: a
        text: "Because the BST invariant holds at every node"
      - id: b
        text: "Because the tree is always re-sorted from scratch before the traversal."
      - id: c
        text: "Because a BST keeps its values in a separate sorted array next to the tree."
      - id: d
        text: "It only holds for balanced trees; it does not work for degenerate ones."
    correct: [a]
    explanation: "The BST invariant holds at every node, not just at the root: for any subtree, the left part is smaller than the node's value, the right part is not smaller. Recursive inorder first yields everything smaller (left subtree), then the node itself, then everything not smaller (right subtree), at every level of recursion, so the resulting order is always increasing regardless of the tree's shape."
    variants:
      - prompt: "A tree is built by inserting an already sorted list [1, 2, 3, 4, 5] into a BST using the standard rule (smaller to the left, not smaller to the right). How many comparisons does searching for 5 take?"
        choices:
          - id: a
            text: "5: the tree degenerated into a chain where every node has only a right child, so the search"
          - id: b
            text: "About log2(5) ≈ 3: a BST is always balanced regardless of insertion order."
          - id: c
            text: "1: a BST keeps a pointer to the maximum at the root."
          - id: d
            text: "0: the value 5 is already at the root right after the first insertion."
        correct: [a]
        explanation: "Inserting in increasing order goes into the right subtree every time, because each new number is larger than everything already inserted. The tree turns into a chain with no left child at all, and searching for the last inserted number visits every node, O(n), not O(log n)."

  - id: bst-fib-001
    concept: trees-and-bst
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete the recursive insertion into a binary search tree."
    template: |
      class TreeNode:
          def __init__(self, value, left=None, right=None):
              self.value = value
              self.left = left
              self.right = right

      def insert(node, value):
          if node is None:
              return TreeNode(value)
          if value {{op}} node.value:
              node.left = insert(node.left, value)
          else:
              node.right = insert(node.right, value)
          return node
    blanks:
      op:
        accept: ["<"]

  - id: bst-predict-001
    concept: trees-and-bst
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? Values are inserted into the tree one by one, then the inorder traversal is printed."
    snippet: |
      class TreeNode:
          def __init__(self, value, left=None, right=None):
              self.value = value
              self.left = left
              self.right = right

      def insert(node, value):
          if node is None:
              return TreeNode(value)
          if value < node.value:
              node.left = insert(node.left, value)
          else:
              node.right = insert(node.right, value)
          return node

      def inorder(node, out):
          if node is None:
              return
          inorder(node.left, out)
          out.append(node.value)
          inorder(node.right, out)

      root = None
      for v in [5, 3, 8, 1, 4, 7, 9]:
          root = insert(root, v)

      result = []
      inorder(root, result)
      print(result)
    expected:
      kind: stdout
      value: "[1, 3, 4, 5, 7, 8, 9]"
    hints:
      - "The insertion order does not determine the printed order: an inorder traversal of a BST always returns values in increasing order."
      - "Checking the tree's shape is not required: it is enough to sort the original values [5, 3, 8, 1, 4, 7, 9], the result matches the inorder output."
    variants:
      - prompt: "What does the program print? Among the inserted values there is a repeated number 2, which this code's rule sends into the right subtree."
        snippet: |
          class TreeNode:
              def __init__(self, value, left=None, right=None):
                  self.value = value
                  self.left = left
                  self.right = right

          def insert(node, value):
              if node is None:
                  return TreeNode(value)
              if value < node.value:
                  node.left = insert(node.left, value)
              else:
                  node.right = insert(node.right, value)
              return node

          def inorder(node, out):
              if node is None:
                  return
              inorder(node.left, out)
              out.append(node.value)
              inorder(node.right, out)

          root = None
          for v in [4, 2, 6, 2, 8, 1]:
              root = insert(root, v)

          result = []
          inorder(root, result)
          print(result)
        expected:
          kind: stdout
          value: "[1, 2, 2, 4, 6, 8]"

  - id: bst-fn-search-001
    concept: trees-and-bst
    type: python-function
    difficulty: 2
    prompt: "Implement contains(node, target): return True if the value target is present in the binary search tree rooted at node, otherwise False. The solution must use the BST property to avoid traversing the whole tree: at each step descend into only one subtree."
    starter: |
      class TreeNode:
          def __init__(self, value, left=None, right=None):
              self.value = value
              self.left = left
              self.right = right


      def contains(node, target):
          ...
    cases:
      - call: "contains(TreeNode(5, TreeNode(3, TreeNode(1), TreeNode(4)), TreeNode(8)), 4)"
        expect: true
      - call: "contains(TreeNode(5, TreeNode(3), TreeNode(8)), 6)"
        expect: false
      - call: "contains(None, 1)"
        expect: false
      - call: "contains(TreeNode(5), 5)"
        expect: true
    hints:
      - "At each node compare target with the node's value: equal means found; smaller, go left; larger, go right. There is no need to traverse both subtrees at once."
      - "You can solve it with a while node is not None loop instead of recursion: on each iteration either return True, or move into node.left, or into node.right. An empty tree (node is None) immediately gives False."
    solution: |
      class TreeNode:
          def __init__(self, value, left=None, right=None):
              self.value = value
              self.left = left
              self.right = right


      def contains(node, target):
          while node is not None:
              if node.value == target:
                  return True
              node = node.left if target < node.value else node.right
          return False

  - id: bst-fn-height-001
    concept: trees-and-bst
    type: python-function
    difficulty: 4
    prompt: "Implement height(node): return the height of a binary tree, the number of edges on the longest path from root to leaf. An empty tree (node is None) has height -1, a tree with one node has height 0."
    starter: |
      class TreeNode:
          def __init__(self, value, left=None, right=None):
              self.value = value
              self.left = left
              self.right = right


      def height(node):
          ...
    cases:
      - call: "height(None)"
        expect: -1
      - call: "height(TreeNode(1))"
        expect: 0
      - call: "height(TreeNode(1, TreeNode(2), TreeNode(3)))"
        expect: 1
      - call: "height(TreeNode(1, TreeNode(2, TreeNode(3))))"
        expect: 2
    hints:
      - "A node's height is expressed via its subtrees' heights: 1 + the maximum of the left and right subtree heights. The base case, an empty subtree, must return -1, not 0, otherwise a leaf would be counted as having height 1."
      - "Check it on a chain of three nodes with no branching (only left or only right): height should return 2, not 3, because edges are counted, not nodes."
    solution: |
      class TreeNode:
          def __init__(self, value, left=None, right=None):
              self.value = value
              self.left = left
              self.right = right


      def height(node):
          if node is None:
              return -1
          return 1 + max(height(node.left), height(node.right))
