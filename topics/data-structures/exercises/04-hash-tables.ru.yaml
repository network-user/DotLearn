exercises:
  - id: ht-quiz-001
    concept: hash-tables
    type: theory-quiz
    difficulty: 1
    prompt: "В списке миллион строк, в словаре с теми же строками как ключами тоже миллион записей. Почему x in some_dict в среднем быстрее, чем x in some_list?"
    choices:
      - id: a
        text: "Словарь вычисляет индекс корзины по hash(x) % m и проверяет одну-две ячейки, список сравнивает x с"
      - id: b
        text: "Словарь хранит элементы в отсортированном порядке и использует бинарный поиск."
      - id: c
        text: "Списки в Python вообще не умеют оператор in, поэтому сравнение некорректно."
      - id: d
        text: "Разницы нет, обе операции стоят O(n), просто у словаря меньше константа."
    correct: [a]
    explanation: "Проверка x in some_dict не сканирует таблицу: формула индекс = hash(x) % m сразу указывает на корзину, и остаётся проверить её содержимое. Список не хранит адрес по значению, поэтому in идёт по ячейкам подряд, O(n) в худшем случае."
    variants:
      - prompt: "Какой из объектов нельзя использовать как ключ dict или элемент set?"
        choices:
          - id: a
            text: "[1, 2]: список изменяем, поэтому не"
          - id: b
            text: "(1, 2): кортеж из чисел, hashable."
          - id: c
            text: "\"ok\": строка, hashable."
          - id: d
            text: "42: целое число, hashable."
        correct: [a]
        explanation: "Ключ обязан быть hashable: его хеш не должен меняться в течение жизни объекта. Список изменяем, add/append/удаление поменяли бы его хеш, поэтому Python явно запрещает класть list в ключи и бросает TypeError. Кортеж, строка и число неизменяемы и подходят."

  - id: ht-fib-001
    concept: hash-tables
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите подсчёт частот слов через dict.get с значением по умолчанию."
    template: |
      def word_counts(words):
          counts = {}
          for word in words:
              counts[word] = counts.get(word, {{default}}) + 1
          return counts
    blanks:
      default:
        accept: ["0"]

  - id: ht-predict-001
    concept: hash-tables
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Ключом словаря выступает кортеж, а один и тот же ключ вставляется дважды с разными значениями."
    snippet: |
      prices = {}
      prices[(1, 2)] = "a"
      prices[(3, 4)] = "b"
      prices[(1, 2)] = "c"
      print(len(prices))
      print(prices[(1, 2)])
      print(sorted(prices.keys()))
    expected:
      kind: stdout
      value: |-
        2
        c
        [(1, 2), (3, 4)]
    hints:
      - "Кортеж (1, 2) неизменяем и hashable, поэтому годится в качестве ключа. Повторная запись по уже существующему ключу не добавляет новую запись, а заменяет значение старой."
      - "Посчитайте, сколько различных ключей встретилось в коде, прежде чем печатать len(prices)."
    variants:
      - prompt: "Что выведет программа? dict строится из списка пар, где один ключ повторяется."
        snippet: |
          data = [("a", 1), ("b", 2), ("a", 3)]
          d = dict(data)
          print(d)
          print(len(d))
          print(list(d.keys()))
        expected:
          kind: stdout
          value: |-
            {'a': 3, 'b': 2}
            2
            ['a', 'b']

  - id: ht-fn-twosum-001
    concept: hash-tables
    type: python-function
    difficulty: 2
    prompt: "Реализуйте has_pair_with_sum(nums, target): верните True, если в списке nums есть два различных по позиции элемента, сумма которых равна target. Решение обязано работать за один проход, O(n), с помощью множества уже увиденных значений."
    starter: |
      def has_pair_with_sum(nums, target):
          ...
    cases:
      - call: "has_pair_with_sum([2, 7, 11, 15], 9)"
        expect: true
      - call: "has_pair_with_sum([1, 2, 3], 7)"
        expect: false
      - call: "has_pair_with_sum([3, 3], 6)"
        expect: true
      - call: "has_pair_with_sum([], 5)"
        expect: false
    hints:
      - "Не перебирайте все пары вложенным циклом, это O(n²). Для текущего элемента n нужное дополнение равно target - n: проверьте, встречалось ли оно раньше."
      - "Держите множество seen уже пройденных чисел. На каждом шаге сначала проверьте target - n in seen, и только потом добавьте n в seen: так пара не считает один и тот же элемент дважды."
    solution: |
      def has_pair_with_sum(nums, target):
          seen = set()
          for n in nums:
              if target - n in seen:
                  return True
              seen.add(n)
          return False
    variants:
      - prompt: "Реализуйте count_pairs_with_sum(nums, target): верните количество пар (i, j) с i < j, для которых nums[i] + nums[j] == target. Повторяющиеся значения считайте с учётом кратности, за один проход через словарь счётчиков."
        starter: |
          def count_pairs_with_sum(nums, target):
              ...
        cases:
          - call: "count_pairs_with_sum([1, 5, 7, -1, 5], 6)"
            expect: 3
          - call: "count_pairs_with_sum([1, 1, 1], 2)"
            expect: 3
          - call: "count_pairs_with_sum([], 5)"
            expect: 0
          - call: "count_pairs_with_sum([3], 6)"
            expect: 0
        solution: |
          def count_pairs_with_sum(nums, target):
              seen = {}
              count = 0
              for n in nums:
                  complement = target - n
                  count += seen.get(complement, 0)
                  seen[n] = seen.get(n, 0) + 1
              return count

  - id: ht-fn-anagrams-001
    concept: hash-tables
    type: python-function
    difficulty: 4
    prompt: "Реализуйте group_anagrams(words): сгруппируйте слова-анаграммы (слова из одинакового набора букв) вместе. Верните список групп; порядок групп определяется первым появлением слова этой группы, а слова внутри группы идут в порядке появления во входном списке."
    starter: |
      def group_anagrams(words):
          ...
    cases:
      - call: 'group_anagrams(["eat", "tea", "tan", "ate", "nat", "bat"])'
        expect: [["eat", "tea", "ate"], ["tan", "nat"], ["bat"]]
      - call: "group_anagrams([])"
        expect: []
      - call: 'group_anagrams(["a"])'
        expect: [["a"]]
    hints:
      - "Два слова являются анаграммами, если состоят из одинаковых букв в любом порядке. Найдите способ превратить слово в такой ключ, чтобы у всех анаграмм этот ключ совпадал."
      - "Отсортированные буквы слова (\"\".join(sorted(word))) дают ровно такой ключ. Заведите dict от ключа к списку слов и отдельный список для порядка первого появления каждого ключа, чтобы группы шли в правильном порядке."
    solution: |
      def group_anagrams(words):
          groups = {}
          order = []
          for word in words:
              key = "".join(sorted(word))
              if key not in groups:
                  groups[key] = []
                  order.append(key)
              groups[key].append(word)
          return [groups[key] for key in order]
