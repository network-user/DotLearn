exercises:
  - id: hp-quiz-001
    concept: heaps
    type: theory-quiz
    difficulty: 1
    prompt: "В min-heap лежат тысячи чисел. Что можно сказать про heap[1] и heap[2], соседние с корнем heap[0]?"
    choices:
      - id: a
        text: "Оба не меньше heap[0], но между собой их порядок не определён: свойство кучи ничего не говорит про порядок между детьми одного родителя."
      - id: b
        text: "heap[1] всегда меньше heap[2], куча хранит второй по величине элемент строго на этом месте."
      - id: c
        text: "Весь массив heap отсортирован по возрастанию, это и есть определение кучи."
      - id: d
        text: "heap[1] и heap[2] это листья дерева и вообще не связаны с heap[0]."
    correct: [a]
    explanation: "Свойство min-heap требует только одного: родитель не больше своих детей. heap[1] и heap[2] это дети корня heap[0], поэтому оба не меньше него, но правило ничего не говорит о том, кто из них меньше другого. Куча не хранит отсортированный массив, гарантирован только минимум в корне."
    variants:
      - prompt: "Почему heapq.heapify(items) для списка из n элементов быстрее, чем n последовательных вызовов heapq.heappush?"
        choices:
          - id: a
            text: "heapify просеивает вниз, начиная с нижних уровней дерева, где просеивать почти нечего; суммарная работа по всем уровням даёт O(n), тогда как n вызовов heappush дают O(n log n)."
          - id: b
            text: "heapify не строит настоящую кучу, а только притворяется, поэтому работает быстрее."
          - id: c
            text: "Разницы в асимптотике нет, оба способа стоят одинаково O(n log n)."
          - id: d
            text: "heapify использует другой алгоритм сортировки, не связанный с кучей."
        correct: [a]
        explanation: "heapify просеивает вниз каждый не-листовой узел начиная с самого нижнего уровня. Узлов, которым просеивать почти некуда (они уже почти листья), большинство, и суммарная стоимость по всем уровням сходится к O(n). Серия из n вызовов heappush честно платит O(log n) за каждую вставку, суммарно O(n log n)."

  - id: hp-fib-001
    concept: heaps
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите функцию, которая возвращает k наименьших чисел списка через heapq."
    template: |
      import heapq

      def k_smallest(nums, k):
          heap = list(nums)
          heapq.{{heapify_call}}(heap)
          return [heapq.{{pop_call}}(heap) for _ in range(k)]
    blanks:
      heapify_call:
        accept: ["heapify"]
      pop_call:
        accept: ["heappop"]

  - id: hp-predict-001
    concept: heaps
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Пять чисел вставляются в кучу по одному, затем снимаются три минимума."
    snippet: |
      import heapq

      heap = []
      for value in [5, 1, 8, 2, 9]:
          heapq.heappush(heap, value)
      print(heap[0])
      result = [heapq.heappop(heap) for _ in range(3)]
      print(result)
      print(heap)
    expected:
      kind: stdout
      value: |-
        1
        [1, 2, 5]
        [8, 9]
    hints:
      - "heap[0] всегда хранит минимум из уже вставленных чисел, не пересчитывайте его вручную по порядку вставки."
      - "heappop снимает и возвращает минимум из оставшихся чисел, один за другим. После трёх снятий минимума из пяти чисел останется два самых больших."
    variants:
      - prompt: "Что выведет программа? Используются heapq.nsmallest и heapq.nlargest вместо ручных push/pop."
        snippet: |
          import heapq

          nums = [7, 2, 9, 4, 1, 6]
          three_smallest = heapq.nsmallest(3, nums)
          two_largest = heapq.nlargest(2, nums)
          print(three_smallest)
          print(two_largest)
        expected:
          kind: stdout
          value: |-
            [1, 2, 4]
            [9, 7]

  - id: hp-fn-topk-001
    concept: heaps
    type: python-function
    difficulty: 2
    prompt: "Реализуйте top_k_largest(nums, k): верните k наибольших чисел списка nums в порядке убывания. Используйте min-heap размера k: держите в куче только k текущих кандидатов и заменяйте минимум кучи, когда встречаете число больше него."
    starter: |
      import heapq

      def top_k_largest(nums, k):
          ...
    cases:
      - call: "top_k_largest([3, 1, 4, 1, 5, 9, 2, 6], 3)"
        expect: [9, 6, 5]
      - call: "top_k_largest([1, 2, 3], 5)"
        expect: [3, 2, 1]
      - call: "top_k_largest([], 3)"
        expect: []
      - call: "top_k_largest([5, 5, 5], 2)"
        expect: [5, 5]
    hints:
      - "Пока в куче меньше k элементов, просто добавляйте туда каждое новое число через heapq.heappush. Как только куча заполнилась до k, сравнивайте новое число с heap[0]: если оно больше, минимум кучи ему уже не конкурент."
      - "heapq.heapreplace(heap, n) снимает текущий минимум и сразу вставляет n за одну операцию. В конце в куче останутся k наибольших чисел; отсортируйте их по убыванию перед возвратом."
    solution: |
      import heapq

      def top_k_largest(nums, k):
          heap = []
          for n in nums:
              if len(heap) < k:
                  heapq.heappush(heap, n)
              elif n > heap[0]:
                  heapq.heapreplace(heap, n)
          return sorted(heap, reverse=True)
    variants:
      - prompt: "Реализуйте k_smallest_values(nums, k): верните k наименьших чисел списка nums в порядке возрастания. Используйте max-heap размера k через хранение отрицательных значений, чтобы heap[0] всегда давал текущий наибольший из k кандидатов."
        starter: |
          import heapq

          def k_smallest_values(nums, k):
              ...
        cases:
          - call: "k_smallest_values([3, 1, 4, 1, 5, 9, 2, 6], 3)"
            expect: [1, 1, 2]
          - call: "k_smallest_values([1, 2, 3], 5)"
            expect: [1, 2, 3]
          - call: "k_smallest_values([], 3)"
            expect: []
          - call: "k_smallest_values([5, 5, 5], 2)"
            expect: [5, 5]
        solution: |
          import heapq

          def k_smallest_values(nums, k):
              heap = []
              for n in nums:
                  if len(heap) < k:
                      heapq.heappush(heap, -n)
                  elif -n > heap[0]:
                      heapq.heapreplace(heap, -n)
              return sorted(-x for x in heap)

  - id: hp-fn-scheduler-001
    concept: heaps
    type: python-function
    difficulty: 4
    prompt: "Реализуйте process_tasks(tasks): tasks это список пар (priority, name), меньшее число priority означает более срочную задачу. Верните имена задач в порядке обработки: сначала по возрастанию priority, а при равном priority, в порядке появления во входном списке. Решение обязано работать даже если имена задач не поддерживают сравнение между собой."
    starter: |
      import heapq

      def process_tasks(tasks):
          ...
    cases:
      - call: 'process_tasks([(2, "b"), (1, "a"), (2, "c"), (0, "d")])'
        expect: ["d", "a", "b", "c"]
      - call: "process_tasks([])"
        expect: []
      - call: 'process_tasks([(1, "x")])'
        expect: ["x"]
      - call: 'process_tasks([(3, "z"), (3, "y"), (3, "x")])'
        expect: ["z", "y", "x"]
    hints:
      - "Простой heapq.heappush(heap, (priority, name)) упадёт с TypeError, если у двух задач совпал priority: Python попробует сравнить name между собой, а сравнение строк работает, но с произвольными объектами это не гарантировано и не то поведение, которое нужно."
      - "Добавьте в кортеж счётчик, растущий с каждой обработанной задачей: (priority, index, name). Счётчик всегда разный, поэтому heapq никогда не дойдёт до сравнения name, а задачи с равным priority выйдут из кучи в порядке возрастания index, то есть в порядке появления во входном списке."
    solution: |
      import heapq

      def process_tasks(tasks):
          heap = []
          for index, (priority, name) in enumerate(tasks):
              heapq.heappush(heap, (priority, index, name))
          order = []
          while heap:
              priority, index, name = heapq.heappop(heap)
              order.append(name)
          return order
