exercises:
  - id: bst-quiz-001
    concept: trees-and-bst
    type: theory-quiz
    difficulty: 1
    prompt: "Почему inorder-обход (левое поддерево, узел, правое поддерево) двоичного дерева поиска всегда возвращает значения по возрастанию?"
    choices:
      - id: a
        text: "Потому что инвариант BST выполняется на каждом узле: слева от узла лежат меньшие значения, справа не меньшие, и это верно рекурсивно для любого поддерева."
      - id: b
        text: "Потому что перед обходом дерево всегда пересортировывается заново."
      - id: c
        text: "Потому что BST хранит значения в отдельном отсортированном массиве рядом с деревом."
      - id: d
        text: "Это верно только для сбалансированных деревьев, для вырожденных не работает."
    correct: [a]
    explanation: "Инвариант BST держится на каждом узле, а не только на корне: для любого поддерева левая часть меньше значения узла, правая не меньше. Рекурсивный inorder сначала выдаёт всё меньшее (левое поддерево), затем сам узел, затем всё не меньшее (правое поддерево), и так на каждом уровне рекурсии, поэтому итоговый порядок всегда возрастающий, вне зависимости от формы дерева."
    variants:
      - prompt: "Дерево получено вставкой уже отсортированного списка [1, 2, 3, 4, 5] в BST по стандартному правилу (меньше налево, не меньше направо). Сколько сравнений потребует поиск числа 5?"
        choices:
          - id: a
            text: "5: дерево выродилось в цепочку, где у каждого узла есть только правый потомок, поэтому поиск не выигрывает у линейного перебора."
          - id: b
            text: "Около log2(5) ≈ 3: BST всегда сбалансирована независимо от порядка вставки."
          - id: c
            text: "1: BST хранит указатель на максимум в корне."
          - id: d
            text: "0: значение 5 уже находится в корне сразу после первой вставки."
        correct: [a]
        explanation: "Вставка по возрастанию раз за разом уходит в правое поддерево, потому что каждое новое число больше всех уже вставленных. Дерево превращается в цепочку без единого левого потомка, и поиск последнего вставленного числа обходит все узлы, O(n), а не O(log n)."

  - id: bst-fib-001
    concept: trees-and-bst
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите рекурсивную вставку в двоичное дерево поиска."
    template: |
      class TreeNode:
          def __init__(self, value, left=None, right=None):
              self.value = value
              self.left = left
              self.right = right

      def insert(node, value):
          if node is None:
              return TreeNode(value)
          if value {{op}} node.value:
              node.left = insert(node.left, value)
          else:
              node.right = insert(node.right, value)
          return node
    blanks:
      op:
        accept: ["<"]

  - id: bst-predict-001
    concept: trees-and-bst
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Значения вставляются в дерево одно за другим, затем печатается inorder-обход."
    snippet: |
      class TreeNode:
          def __init__(self, value, left=None, right=None):
              self.value = value
              self.left = left
              self.right = right

      def insert(node, value):
          if node is None:
              return TreeNode(value)
          if value < node.value:
              node.left = insert(node.left, value)
          else:
              node.right = insert(node.right, value)
          return node

      def inorder(node, out):
          if node is None:
              return
          inorder(node.left, out)
          out.append(node.value)
          inorder(node.right, out)

      root = None
      for v in [5, 3, 8, 1, 4, 7, 9]:
          root = insert(root, v)

      result = []
      inorder(root, result)
      print(result)
    expected:
      kind: stdout
      value: "[1, 3, 4, 5, 7, 8, 9]"
    hints:
      - "Порядок вставки не определяет итоговый порядок вывода: inorder-обход BST всегда возвращает значения по возрастанию."
      - "Проверять форму дерева не обязательно: достаточно отсортировать исходный список значений [5, 3, 8, 1, 4, 7, 9], результат совпадёт с выводом inorder."
    variants:
      - prompt: "Что выведет программа? Среди вставляемых значений есть повторяющееся число 2, которое по правилу этого кода уходит в правое поддерево."
        snippet: |
          class TreeNode:
              def __init__(self, value, left=None, right=None):
                  self.value = value
                  self.left = left
                  self.right = right

          def insert(node, value):
              if node is None:
                  return TreeNode(value)
              if value < node.value:
                  node.left = insert(node.left, value)
              else:
                  node.right = insert(node.right, value)
              return node

          def inorder(node, out):
              if node is None:
                  return
              inorder(node.left, out)
              out.append(node.value)
              inorder(node.right, out)

          root = None
          for v in [4, 2, 6, 2, 8, 1]:
              root = insert(root, v)

          result = []
          inorder(root, result)
          print(result)
        expected:
          kind: stdout
          value: "[1, 2, 2, 4, 6, 8]"

  - id: bst-fn-search-001
    concept: trees-and-bst
    type: python-function
    difficulty: 2
    prompt: "Реализуйте contains(node, target): верните True, если значение target есть в двоичном дереве поиска с корнем node, иначе False. Решение обязано использовать свойство BST, чтобы не обходить дерево целиком: на каждом шаге спускайтесь только в одно поддерево."
    starter: |
      class TreeNode:
          def __init__(self, value, left=None, right=None):
              self.value = value
              self.left = left
              self.right = right


      def contains(node, target):
          ...
    cases:
      - call: "contains(TreeNode(5, TreeNode(3, TreeNode(1), TreeNode(4)), TreeNode(8)), 4)"
        expect: true
      - call: "contains(TreeNode(5, TreeNode(3), TreeNode(8)), 6)"
        expect: false
      - call: "contains(None, 1)"
        expect: false
      - call: "contains(TreeNode(5), 5)"
        expect: true
    hints:
      - "На каждом узле сравните target со значением узла: совпало, значит найдено; меньше, уходите налево; больше, уходите направо. Обходить оба поддерева одновременно не нужно."
      - "Можно решить циклом while node is not None вместо рекурсии: на каждой итерации либо возвращайте True, либо переходите в node.left, либо в node.right. Пустое дерево (node is None) сразу даёт False."
    solution: |
      class TreeNode:
          def __init__(self, value, left=None, right=None):
              self.value = value
              self.left = left
              self.right = right


      def contains(node, target):
          while node is not None:
              if node.value == target:
                  return True
              node = node.left if target < node.value else node.right
          return False

  - id: bst-fn-height-001
    concept: trees-and-bst
    type: python-function
    difficulty: 4
    prompt: "Реализуйте height(node): верните высоту двоичного дерева, количество рёбер на самом длинном пути от корня до листа. Пустое дерево (node is None) имеет высоту -1, дерево из одного узла имеет высоту 0."
    starter: |
      class TreeNode:
          def __init__(self, value, left=None, right=None):
              self.value = value
              self.left = left
              self.right = right


      def height(node):
          ...
    cases:
      - call: "height(None)"
        expect: -1
      - call: "height(TreeNode(1))"
        expect: 0
      - call: "height(TreeNode(1, TreeNode(2), TreeNode(3)))"
        expect: 1
      - call: "height(TreeNode(1, TreeNode(2, TreeNode(3))))"
        expect: 2
    hints:
      - "Высота узла выражается через высоты его поддеревьев: 1 + максимум из высоты левого и высоты правого поддерева. Базовый случай, пустое поддерево, обязан возвращать -1, а не 0, иначе лист посчитается как имеющий высоту 1."
      - "Проверьте на цепочке из трёх узлов без ветвления (только left или только right): height должен вернуть 2, а не 3, потому что считаются рёбра, а не узлы."
    solution: |
      class TreeNode:
          def __init__(self, value, left=None, right=None):
              self.value = value
              self.left = left
              self.right = right


      def height(node):
          if node is None:
              return -1
          return 1 + max(height(node.left), height(node.right))
