exercises:
  - id: ll-quiz-001
    concept: linked-lists
    type: theory-quiz
    difficulty: 1
    prompt: "Why does a linked list not have O(1) indexed access, unlike list?"
    choices:
      - id: a
        text: "Nodes are not laid out in contiguous memory, so the address of the i-th node cannot be computed"
      - id: b
        text: "Because Python cannot store numbers inside linked-list nodes."
      - id: c
        text: "Because linked-list nodes are stored in a hash table, and hash tables have no indices at all."
      - id: d
        text: "Indexed access does exist, it is just implemented through collections.deque."
    correct: [a]
    explanation: "An array computes an element's address arithmetically because elements sit side by side. Linked-list nodes are scattered across the heap; the only route to the i-th node is from the head, following i next links, hence O(n) for indexed access."
    variants:
      - prompt: "You hold a reference to node spot in the middle of a singly linked list. Why does inserting a new node right after spot cost O(1), not O(n)?"
        choices:
          - id: a
            text: "The operation only rewrites a pair of next links and does not touch the other nodes; there is no need to shift the"
          - id: b
            text: "Because a linked list stores each node's index separately and updates it in one operation."
          - id: c
            text: "The operation is actually O(n): the constant is just small on small lists."
          - id: d
            text: "O(1) only holds for the last node of the list; for the rest it is always O(n)."
        correct: [a]
        explanation: "Insertion at a known node is two link assignments: new.next and spot.next. No other node shifts or gets recomputed, so the cost does not depend on the list's length. O(n) would only appear if the insertion point first had to be found by traversal."

  - id: ll-fib-001
    concept: linked-lists
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete the function that sums the values of all nodes in a singly linked list."
    template: |
      class Node:
          def __init__(self, value, next=None):
              self.value = value
              self.next = next

      def list_sum(head):
          total = 0
          node = head
          while node is not None:
              total += node.{{field}}
              node = node.{{next_field}}
          return total
    blanks:
      field:
        accept: ["value"]
      next_field:
        accept: ["next"]

  - id: ll-predict-001
    concept: linked-lists
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? A list is built from the values [10, 20, 30], then reversed with three pointers."
    snippet: |
      class Node:
          def __init__(self, value, next=None):
              self.value = value
              self.next = next

      def build(values):
          head = None
          for value in reversed(values):
              head = Node(value, head)
          return head

      def show(head):
          parts = []
          node = head
          while node is not None:
              parts.append(str(node.value))
              node = node.next
          return " -> ".join(parts)

      def reverse(head):
          prev = None
          node = head
          while node is not None:
              nxt = node.next
              node.next = prev
              prev = node
              node = nxt
          return prev

      h = build([10, 20, 30])
      print(show(h))
      print(show(reverse(h)))
    expected:
      kind: stdout
      value: |-
        10 -> 20 -> 30
        30 -> 20 -> 10
    hints:
      - "build assembles the list from the head, adding values in reverse iteration order, so the final order matches the order of elements in values."
      - "reverse walks the list once, redirecting each node's next to the previous one; the new head becomes the last node processed, the former tail."
    variants:
      - prompt: "What does the program print? A list of two nodes, [7, 14], is reversed by the same code."
        snippet: |
          class Node:
              def __init__(self, value, next=None):
                  self.value = value
                  self.next = next

          def build(values):
              head = None
              for value in reversed(values):
                  head = Node(value, head)
              return head

          def show(head):
              parts = []
              node = head
              while node is not None:
                  parts.append(str(node.value))
                  node = node.next
              return " -> ".join(parts)

          def reverse(head):
              prev = None
              node = head
              while node is not None:
                  nxt = node.next
                  node.next = prev
                  prev = node
                  node = nxt
              return prev

          h = build([7, 14])
          print(show(h))
          print(show(reverse(h)))
        expected:
          kind: stdout
          value: |-
            7 -> 14
            14 -> 7

  - id: ll-fn-length-001
    concept: linked-lists
    type: python-function
    difficulty: 2
    prompt: "Implement list_length(head): return the number of nodes in a singly linked list starting at head. An empty list (head is None) has 0 nodes."
    starter: |
      class Node:
          def __init__(self, value, next=None):
              self.value = value
              self.next = next


      def list_length(head):
          ...
    cases:
      - call: "list_length(Node(1, Node(2, Node(3))))"
        expect: 3
      - call: "list_length(None)"
        expect: 0
      - call: "list_length(Node(5))"
        expect: 1
      - call: "list_length(Node(1, Node(2, Node(3, Node(4)))))"
        expect: 4
    hints:
      - "Walk the list from the head, as in the theory example: a runner node = head, loop while node is not None, step node = node.next."
      - "Count nodes, not values: on each loop iteration increase a counter by one and return it at the end."
    solution: |
      class Node:
          def __init__(self, value, next=None):
              self.value = value
              self.next = next


      def list_length(head):
          count = 0
          node = head
          while node is not None:
              count += 1
              node = node.next
          return count
    variants:
      - prompt: "Implement contains_value(head, target): return True if at least one node in the list holds the value target, otherwise False."
        starter: |
          class Node:
              def __init__(self, value, next=None):
                  self.value = value
                  self.next = next


          def contains_value(head, target):
              ...
        cases:
          - call: "contains_value(Node(1, Node(2, Node(3))), 2)"
            expect: true
          - call: "contains_value(Node(1, Node(2, Node(3))), 9)"
            expect: false
          - call: "contains_value(None, 1)"
            expect: false
          - call: "contains_value(Node(5), 5)"
            expect: true
        solution: |
          class Node:
              def __init__(self, value, next=None):
                  self.value = value
                  self.next = next


          def contains_value(head, target):
              node = head
              while node is not None:
                  if node.value == target:
                      return True
                  node = node.next
              return False

  - id: ll-fn-middle-001
    concept: linked-lists
    type: python-function
    difficulty: 4
    prompt: "Implement find_middle(head): return the value of the middle node of a singly linked list in a single pass, without counting the length first. Use two pointers: the slow one moves one node per step, the fast one moves two. For even length, return the value of the second of the two middle nodes."
    starter: |
      class Node:
          def __init__(self, value, next=None):
              self.value = value
              self.next = next


      def find_middle(head):
          ...
    cases:
      - call: "find_middle(Node(1, Node(2, Node(3, Node(4, Node(5))))))"
        expect: 3
      - call: "find_middle(Node(1, Node(2, Node(3, Node(4)))))"
        expect: 3
      - call: "find_middle(Node(1))"
        expect: 1
      - call: "find_middle(Node(1, Node(2)))"
        expect: 2
    hints:
      - "Set up slow and fast, both starting at head. On each step slow makes one next jump, fast makes two next jumps. When fast reaches the end, slow is at the middle."
      - "The loop condition must check both fast and fast.next, otherwise fast.next.next raises AttributeError on an even-length list."
    solution: |
      class Node:
          def __init__(self, value, next=None):
              self.value = value
              self.next = next


      def find_middle(head):
          slow = head
          fast = head
          while fast is not None and fast.next is not None:
              slow = slow.next
              fast = fast.next.next
          return slow.value
