exercises:
  - id: ll-quiz-001
    concept: linked-lists
    type: theory-quiz
    difficulty: 1
    prompt: "Почему у связного списка нет доступа по индексу за O(1), в отличие от list?"
    choices:
      - id: a
        text: "Узлы не лежат в непрерывной памяти, поэтому адрес i-го узла нельзя вычислить арифметикой"
      - id: b
        text: "Потому что Python не умеет хранить числа внутри узлов связного списка."
      - id: c
        text: "Потому что узлы связного списка хранятся в хеш-таблице, а там индексов нет в принципе."
      - id: d
        text: "Доступ по индексу есть, просто он реализован через collections.deque."
    correct: [a]
    explanation: "Массив вычисляет адрес элемента арифметикой, потому что элементы лежат подряд. Узлы связного списка разбросаны по куче, единственный маршрут к i-му узлу идёт от головы по i ссылкам next, отсюда O(n) на доступ по индексу."
    variants:
      - prompt: "В руках есть ссылка на узел spot в середине односвязного списка. Почему вставка нового узла сразу после spot стоит O(1), а не O(n)?"
        choices:
          - id: a
            text: "Операция переписывает только пару ссылок next и не трогает остальные узлы; сдвигать хвост списка не нужно."
          - id: b
            text: "Потому что связный список хранит индекс каждого узла отдельно и обновляет его за одну операцию."
          - id: c
            text: "Операция на самом деле O(n): просто константа мала на маленьких списках."
          - id: d
            text: "O(1) получается только для последнего узла списка, для остальных всегда O(n)."
        correct: [a]
        explanation: "Вставка при известном узле, это два присваивания ссылок: new.next и spot.next. Ни один другой узел не сдвигается и не пересчитывается, поэтому цена не зависит от длины списка. O(n) появился бы, только если место вставки сначала искали обходом."

  - id: ll-fib-001
    concept: linked-lists
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите функцию, которая суммирует значения всех узлов односвязного списка."
    template: |
      class Node:
          def __init__(self, value, next=None):
              self.value = value
              self.next = next

      def list_sum(head):
          total = 0
          node = head
          while node is not None:
              total += node.{{field}}
              node = node.{{next_field}}
          return total
    blanks:
      field:
        accept: ["value"]
      next_field:
        accept: ["next"]

  - id: ll-predict-001
    concept: linked-lists
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Список строится из значений [10, 20, 30], затем разворачивается тремя указателями."
    snippet: |
      class Node:
          def __init__(self, value, next=None):
              self.value = value
              self.next = next

      def build(values):
          head = None
          for value in reversed(values):
              head = Node(value, head)
          return head

      def show(head):
          parts = []
          node = head
          while node is not None:
              parts.append(str(node.value))
              node = node.next
          return " -> ".join(parts)

      def reverse(head):
          prev = None
          node = head
          while node is not None:
              nxt = node.next
              node.next = prev
              prev = node
              node = nxt
          return prev

      h = build([10, 20, 30])
      print(show(h))
      print(show(reverse(h)))
    expected:
      kind: stdout
      value: |-
        10 -> 20 -> 30
        30 -> 20 -> 10
    hints:
      - "build собирает список с головы, добавляя значения в обратном порядке перебора, поэтому итоговый порядок совпадает с порядком элементов values."
      - "reverse проходит список один раз, перенаправляя next каждого узла на предыдущий; новой головой становится последний обработанный узел, бывший хвост."
    variants:
      - prompt: "Что выведет программа? Список из двух узлов, [7, 14], разворачивается тем же кодом."
        snippet: |
          class Node:
              def __init__(self, value, next=None):
                  self.value = value
                  self.next = next

          def build(values):
              head = None
              for value in reversed(values):
                  head = Node(value, head)
              return head

          def show(head):
              parts = []
              node = head
              while node is not None:
                  parts.append(str(node.value))
                  node = node.next
              return " -> ".join(parts)

          def reverse(head):
              prev = None
              node = head
              while node is not None:
                  nxt = node.next
                  node.next = prev
                  prev = node
                  node = nxt
              return prev

          h = build([7, 14])
          print(show(h))
          print(show(reverse(h)))
        expected:
          kind: stdout
          value: |-
            7 -> 14
            14 -> 7

  - id: ll-fn-length-001
    concept: linked-lists
    type: python-function
    difficulty: 2
    prompt: "Реализуйте list_length(head): верните число узлов в односвязном списке, начиная с head. Пустой список (head is None) содержит 0 узлов."
    starter: |
      class Node:
          def __init__(self, value, next=None):
              self.value = value
              self.next = next


      def list_length(head):
          ...
    cases:
      - call: "list_length(Node(1, Node(2, Node(3))))"
        expect: 3
      - call: "list_length(None)"
        expect: 0
      - call: "list_length(Node(5))"
        expect: 1
      - call: "list_length(Node(1, Node(2, Node(3, Node(4)))))"
        expect: 4
    hints:
      - "Обойдите список от головы, как в примере из теории: бегунок node = head, цикл while node is not None, шаг node = node.next."
      - "Считайте узлы, а не значения: на каждом шаге цикла увеличивайте счётчик на единицу и в конце верните его."
    solution: |
      class Node:
          def __init__(self, value, next=None):
              self.value = value
              self.next = next


      def list_length(head):
          count = 0
          node = head
          while node is not None:
              count += 1
              node = node.next
          return count
    variants:
      - prompt: "Реализуйте contains_value(head, target): верните True, если хотя бы один узел списка хранит значение target, иначе False."
        starter: |
          class Node:
              def __init__(self, value, next=None):
                  self.value = value
                  self.next = next


          def contains_value(head, target):
              ...
        cases:
          - call: "contains_value(Node(1, Node(2, Node(3))), 2)"
            expect: true
          - call: "contains_value(Node(1, Node(2, Node(3))), 9)"
            expect: false
          - call: "contains_value(None, 1)"
            expect: false
          - call: "contains_value(Node(5), 5)"
            expect: true
        solution: |
          class Node:
              def __init__(self, value, next=None):
                  self.value = value
                  self.next = next


          def contains_value(head, target):
              node = head
              while node is not None:
                  if node.value == target:
                      return True
                  node = node.next
              return False

  - id: ll-fn-middle-001
    concept: linked-lists
    type: python-function
    difficulty: 4
    prompt: "Реализуйте find_middle(head): верните значение среднего узла односвязного списка за один проход, без подсчёта длины заранее. Используйте два указателя: медленный сдвигается на один узел за шаг, быстрый на два. Для чётной длины верните значение второго из двух средних узлов."
    starter: |
      class Node:
          def __init__(self, value, next=None):
              self.value = value
              self.next = next


      def find_middle(head):
          ...
    cases:
      - call: "find_middle(Node(1, Node(2, Node(3, Node(4, Node(5))))))"
        expect: 3
      - call: "find_middle(Node(1, Node(2, Node(3, Node(4)))))"
        expect: 3
      - call: "find_middle(Node(1))"
        expect: 1
      - call: "find_middle(Node(1, Node(2)))"
        expect: 2
    hints:
      - "Заведите slow и fast, оба начинают с head. На каждом шаге slow делает один прыжок next, fast делает два прыжка next. Когда fast упрётся в конец, slow окажется в середине."
      - "Условие продолжения цикла обязано проверять и fast, и fast.next, иначе fast.next.next упадёт с AttributeError на списке чётной длины."
    solution: |
      class Node:
          def __init__(self, value, next=None):
              self.value = value
              self.next = next


      def find_middle(head):
          slow = head
          fast = head
          while fast is not None and fast.next is not None:
              slow = slow.next
              fast = fast.next.next
          return slow.value
