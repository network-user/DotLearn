exercises:
  - id: gr-quiz-001
    concept: graphs
    type: theory-quiz
    difficulty: 1
    prompt: "A social network: a million users, each with 200 friends on average. Why is an adjacency matrix a bad choice here?"
    choices:
      - id: a
        text: "A matrix would need V² cells, on the order of a trillion, while there are only around a hundred million edges. An adjacency list stores O(V + E) and pays only for real connections."
      - id: b
        text: "A matrix cannot represent undirected edges."
      - id: c
        text: "A matrix checks whether a specific edge exists more slowly than an adjacency list."
      - id: d
        text: "A matrix only works with row-vertices, while users are given as numbers."
    correct: [a]
    explanation: "A social graph is sparse: on the order of 10⁸ edges out of 10¹² possible pairs. A matrix spends memory on every pair at once, including nonexistent connections, while an adjacency list stores only real edges. Directionality is no obstacle for a matrix, and checking a single edge is even faster with it, O(1)."
    variants:
      - prompt: "In which case is an adjacency matrix justified?"
        choices:
          - id: a
            text: "A dense graph, where the number of edges is close to V², and you need to answer 'is there an edge between u and v' in O(1)."
          - id: b
            text: "A sparse graph with millions of vertices and dozens of connections each."
          - id: c
            text: "When you most often need to iterate over all neighbors of a single vertex."
          - id: d
            text: "When the graph keeps growing and the number of vertices is not known in advance."
        correct: [a]
        explanation: "A matrix takes O(V²) regardless of the number of edges, so it only pays off when edges are already close to V² and the main operation is an instant edge check. Iterating a matrix's neighbors costs O(V) per row, memory is wasted on a sparse graph, and a growing vertex count forces rebuilding the table."
      - prompt: "How does representing an undirected graph differ from a directed one in an adjacency list?"
        choices:
          - id: a
            text: "Each edge is recorded twice: u goes into v's neighbor list, and v goes into u's neighbor list."
          - id: b
            text: "No difference: an edge is stored exactly once in both cases."
          - id: c
            text: "An undirected graph can only be stored with an adjacency matrix."
          - id: d
            text: "In an undirected graph, neighbor lists must be sorted."
        correct: [a]
        explanation: "An undirected edge is visible from both sides, so building it does two appends: graph[u].append(v) and graph[v].append(u). Recording the connection only one way would let a traversal find a path from u to v but not back. Sorting the lists remains a matter of taste and has nothing to do with directionality."

  - id: gr-predict-001
    concept: graphs
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? Note how defaultdict behaves when accessing a missing key."
    snippet: |
      from collections import defaultdict

      edges = [("a", "b"), ("a", "c"), ("b", "c"), ("c", "d")]
      graph = defaultdict(list)
      for u, v in edges:
          graph[u].append(v)
          graph[v].append(u)

      print(sorted(graph["c"]))
      print(len(graph["e"]))
      print(len(graph))
    expected:
      kind: stdout
      value: |-
        ['a', 'b', 'd']
        0
        5
    hints:
      - "The graph is undirected: each edge adds an entry to both vertices' lists. Write out the dict after all four edges."
      - "Accessing graph['e'] on a defaultdict does not raise KeyError: it creates a new entry with an empty list, and that entry stays in the dict."
    variants:
      - prompt: "What does the program print? Trace the BFS: neighbors are iterated in sorted order."
        snippet: |
          from collections import deque

          graph = {
              "a": ["d", "c"],
              "b": ["c", "d"],
              "c": ["a", "b"],
              "d": ["a", "b"],
          }
          visited = {"a"}
          queue = deque(["a"])
          order = []
          while queue:
              node = queue.popleft()
              order.append(node)
              for n in sorted(graph[node]):
                  if n not in visited:
                      visited.add(n)
                      queue.append(n)
          print(order)
        expected:
          kind: stdout
          value: "['a', 'c', 'd', 'b']"
      - prompt: "What does the program print? The graph is disconnected, and the traversal starts from vertex 1."
        snippet: |
          from collections import deque

          graph = {
              1: [2],
              2: [1, 3],
              3: [2],
              4: [5],
              5: [4],
              6: [],
          }
          visited = {1}
          queue = deque([1])
          while queue:
              node = queue.popleft()
              for n in graph[node]:
                  if n not in visited:
                      visited.add(n)
                      queue.append(n)
          print(len(visited))
          print(4 in visited)
        expected:
          kind: stdout
          value: |-
            3
            False

  - id: gr-adj-001
    concept: graphs
    type: python-function
    difficulty: 2
    prompt: "Implement to_adjacency(n, edges): build the adjacency list of an undirected graph with vertices 0..n-1. Return a list of n lists, each inner list sorted in increasing order; edges contains pairs [u, v]."
    starter: |
      def to_adjacency(n, edges):
          ...
    cases:
      - call: "to_adjacency(3, [[0, 1], [1, 2]])"
        expect: [[1], [0, 2], [1]]
      - call: "to_adjacency(4, [[0, 1]])"
        expect: [[1], [0], [], []]
      - call: "to_adjacency(1, [])"
        expect: [[]]
      - call: "to_adjacency(3, [[2, 0], [1, 0]])"
        expect: [[1, 2], [0], [0]]
    hints:
      - "The outer list's index matches the vertex number: create a list of length n and fill it while iterating over the edges."
      - "Think about how many entries a single edge [u, v] produces and which cells they land in. At the very end, go through the inner lists once more."
    solution: |
      def to_adjacency(n, edges):
          graph = [[] for _ in range(n)]
          for u, v in edges:
              graph[u].append(v)
              graph[v].append(u)
          for neighbors in graph:
              neighbors.sort()
          return graph
    variants:
      - prompt: "Implement to_adjacency_directed(n, edges): the adjacency list of a directed graph with vertices 0..n-1. A pair [u, v] means an arc only from u to v. Return a list of n lists, each sorted in increasing order."
        starter: |
          def to_adjacency_directed(n, edges):
              ...
        cases:
          - call: "to_adjacency_directed(3, [[0, 1], [1, 2]])"
            expect: [[1], [2], []]
          - call: "to_adjacency_directed(3, [[2, 0], [2, 1]])"
            expect: [[], [], [0, 1]]
          - call: "to_adjacency_directed(2, [])"
            expect: [[], []]
          - call: "to_adjacency_directed(3, [[0, 2], [0, 1]])"
            expect: [[1, 2], [], []]
        solution: |
          def to_adjacency_directed(n, edges):
              graph = [[] for _ in range(n)]
              for u, v in edges:
                  graph[u].append(v)
              for neighbors in graph:
                  neighbors.sort()
              return graph
      - prompt: "Implement degrees(n, edges): for an undirected graph with vertices 0..n-1, return a list of n numbers where the i-th element equals the number of edges incident to vertex i; edges contains pairs [u, v]."
        starter: |
          def degrees(n, edges):
              ...
        cases:
          - call: "degrees(3, [[0, 1], [1, 2]])"
            expect: [1, 2, 1]
          - call: "degrees(4, [[0, 1]])"
            expect: [1, 1, 0, 0]
          - call: "degrees(1, [])"
            expect: [0]
          - call: "degrees(3, [[0, 1], [0, 2], [1, 2]])"
            expect: [2, 2, 2]
        solution: |
          def degrees(n, edges):
              result = [0] * n
              for u, v in edges:
                  result[u] += 1
                  result[v] += 1
              return result

  - id: gr-bfs-001
    concept: graphs
    type: python-function
    difficulty: 4
    prompt: "Implement shortest_path_len(n, edges, start, target): the length in edges of the shortest path between start and target in an undirected, unweighted graph with vertices 0..n-1; edges contains pairs [u, v]. Return 0 when start equals target, and -1 when target is unreachable. Use BFS with collections.deque."
    starter: |
      from collections import deque

      def shortest_path_len(n, edges, start, target):
          ...
    cases:
      - call: "shortest_path_len(4, [[0, 1], [1, 2], [2, 3]], 0, 3)"
        expect: 3
      - call: "shortest_path_len(5, [[0, 1], [1, 2], [2, 3], [0, 4], [4, 3]], 0, 3)"
        expect: 2
      - call: "shortest_path_len(4, [[0, 1], [2, 3]], 0, 3)"
        expect: -1
      - call: "shortest_path_len(3, [[0, 1], [1, 2]], 2, 2)"
        expect: 0
    hints:
      - "BFS unfolds the graph in waves: first all vertices at distance 1, then 2, and so on. The wave number where target first appears is the answer."
      - "Combine visiting and distance: keep a dict dist, where the mere presence of a key means 'this vertex has been seen', and the value equals the number of edges from start. A neighbor gets dist[node] + 1 the moment it is added to the queue."
      - "An empty queue without ever meeting target means a different connected component: return -1. Handle the start == target case before the loop."
    solution: |
      from collections import deque

      def shortest_path_len(n, edges, start, target):
          if start == target:
              return 0
          graph = [[] for _ in range(n)]
          for u, v in edges:
              graph[u].append(v)
              graph[v].append(u)
          dist = {start: 0}
          queue = deque([start])
          while queue:
              node = queue.popleft()
              for neighbor in graph[node]:
                  if neighbor not in dist:
                      dist[neighbor] = dist[node] + 1
                      if neighbor == target:
                          return dist[neighbor]
                      queue.append(neighbor)
          return -1
