exercises:
  - id: sq-quiz-001
    concept: stacks-and-queues
    type: theory-quiz
    difficulty: 1
    prompt: "You have a browser's page-visit history, and the Back button must open the most recently visited page. Which discipline is natural here?"
    choices:
      - id: a
        text: "Stack (LIFO): the last page opened is the first one closed."
      - id: b
        text: "Queue (FIFO): pages close in the order they were opened."
      - id: c
        text: "Hash table: fast lookup of a page by URL matters."
      - id: d
        text: "Heap: quickly finding the oldest page matters."
    correct: [a]
    explanation: "The Back button always returns to the most recently visited page, i.e. the last element added leaves first. That is exactly the LIFO discipline a stack implements."
    variants:
      - prompt: "A printer prints documents in the order they arrive and cannot print a document ahead of ones already queued. Which discipline does it need?"
        choices:
          - id: a
            text: "Queue (FIFO): the first document submitted for printing prints first."
          - id: b
            text: "Stack (LIFO): the last document submitted prints first."
          - id: c
            text: "BST: documents must be stored in sorted order."
          - id: d
            text: "Heap: the document with the smallest file size must print first."
        correct: [a]
        explanation: "Printing in arrival order is FIFO: first in, first served. That is how a queue works, not a stack, where the last one added leaves first."

  - id: sq-fib-001
    concept: stacks-and-queues
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete the balanced-parentheses check using a stack built on a plain list."
    template: |
      def is_balanced(text):
          stack = []
          for ch in text:
              if ch == "(":
                  stack.{{push_method}}(ch)
              elif ch == ")":
                  if not stack:
                      return False
                  stack.{{pop_method}}()
          return not stack
    blanks:
      push_method:
        accept: ["append"]
      pop_method:
        accept: ["pop"]

  - id: sq-predict-001
    concept: stacks-and-queues
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? Track how appendleft and append work at opposite ends of a deque."
    snippet: |
      from collections import deque

      dq = deque()
      dq.append(1)
      dq.append(2)
      dq.appendleft(0)
      dq.append(3)
      print(list(dq))
      print(dq.popleft())
      print(dq.pop())
      print(list(dq))
    expected:
      kind: stdout
      value: |-
        [0, 1, 2, 3]
        0
        3
        [1, 2]
    hints:
      - "append adds to the right, appendleft adds to the left. Build the deque step by step, like a list, up to the first print."
      - "popleft() removes and returns the leftmost element; pop() without left removes and returns the rightmost element."
    variants:
      - prompt: "What does the program print? The deque is created with a maxlen limit: overflow pushes out the element from the opposite end."
        snippet: |
          from collections import deque

          dq = deque([1, 2, 3], maxlen=3)
          dq.append(4)
          dq.appendleft(0)
          print(list(dq))
        expected:
          kind: stdout
          value: "[0, 2, 3]"

  - id: sq-fn-valid-001
    concept: stacks-and-queues
    type: python-function
    difficulty: 2
    prompt: "Implement is_valid(s): check that all three kinds of brackets, (), [], {}, in string s are matched and correctly nested. Use a stack built on a plain list."
    starter: |
      def is_valid(s):
          ...
    cases:
      - call: 'is_valid("()[]{}")'
        expect: true
      - call: 'is_valid("(]")'
        expect: false
      - call: 'is_valid("([)]")'
        expect: false
      - call: 'is_valid("{[]}")'
        expect: true
      - call: 'is_valid("")'
        expect: true
    hints:
      - "An opening bracket is a signal to push it onto the stack and remember what it needs to be closed by. A closing bracket must pop exactly the matching opening bracket off the top."
      - "Build a dictionary mapping closing -> opening. On a closing bracket, check two failure cases: the stack is empty, or the popped symbol does not match the expected one from the dictionary."
    solution: |
      def is_valid(s):
          pairs = {")": "(", "]": "[", "}": "{"}
          stack = []
          for ch in s:
              if ch in "([{":
                  stack.append(ch)
              elif ch in ")]}":
                  if not stack or stack.pop() != pairs[ch]:
                      return False
          return not stack
    variants:
      - prompt: "Implement is_valid_parens_only(s): check that only the round brackets in string s are balanced, ignoring all other characters."
        starter: |
          def is_valid_parens_only(s):
              ...
        cases:
          - call: 'is_valid_parens_only("(a(b)c)")'
            expect: true
          - call: 'is_valid_parens_only("(()")'
            expect: false
          - call: 'is_valid_parens_only(")(")'
            expect: false
          - call: 'is_valid_parens_only("abc")'
            expect: true
        solution: |
          def is_valid_parens_only(s):
              balance = 0
              for ch in s:
                  if ch == "(":
                      balance += 1
                  elif ch == ")":
                      balance -= 1
                      if balance < 0:
                          return False
              return balance == 0

  - id: sq-fn-window-001
    concept: stacks-and-queues
    type: python-function
    difficulty: 4
    prompt: "Implement max_sliding_window(nums, k): for each window of length k sliding over nums left to right, return the maximum in that window. The solution must run in O(n): keep candidate-maximum indices in a deque instead of recomputing each window's maximum from scratch."
    starter: |
      from collections import deque

      def max_sliding_window(nums, k):
          ...
    cases:
      - call: "max_sliding_window([1, 3, -1, -3, 5, 3, 6, 7], 3)"
        expect: [3, 3, 5, 5, 6, 7]
      - call: "max_sliding_window([4, 3, 2, 1], 2)"
        expect: [4, 3, 2]
      - call: "max_sliding_window([1], 1)"
        expect: [1]
      - call: "max_sliding_window([9, 8, 7, 6], 4)"
        expect: [9]
    hints:
      - "Do not recompute each window's maximum from scratch, that is O(n*k). Keep candidate-maximum indices in a deque so the value on the left is always at least as large as the values on the right."
      - "Before adding a new index, pop from the tail every index whose value is less than or equal to the new one: they can never become the maximum while the new element is alive. Pop from the head any index that has fallen out of the window (dq[0] <= i - k)."
    solution: |
      from collections import deque

      def max_sliding_window(nums, k):
          dq = deque()
          result = []
          for i, n in enumerate(nums):
              while dq and nums[dq[-1]] <= n:
                  dq.pop()
              dq.append(i)
              if dq[0] <= i - k:
                  dq.popleft()
              if i >= k - 1:
                  result.append(nums[dq[0]])
          return result
