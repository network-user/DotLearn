exercises:
  - id: ht-quiz-001
    concept: hash-tables
    type: theory-quiz
    difficulty: 1
    prompt: "A list has a million strings, and a dict with the same strings as keys also has a million entries. Why is x in some_dict on average faster than x in some_list?"
    choices:
      - id: a
        text: "A dict computes the bucket index from hash(x) % m and checks one or two cells; a list compares x against elements one by one until it finds a match or reaches the end."
      - id: b
        text: "A dict stores elements in sorted order and uses binary search."
      - id: c
        text: "Lists in Python do not support the in operator at all, so the comparison is invalid."
      - id: d
        text: "There is no difference, both operations cost O(n), the dict just has a smaller constant."
    correct: [a]
    explanation: "x in some_dict does not scan the table: the formula index = hash(x) % m points straight to a bucket, and only its contents need checking. A list stores no address by value, so in walks cells in sequence, O(n) worst case."
    variants:
      - prompt: "Which of these objects cannot be used as a dict key or a set element?"
        choices:
          - id: a
            text: "[1, 2]: a list is mutable, so it is not hashable."
          - id: b
            text: "(1, 2): a tuple of numbers, hashable."
          - id: c
            text: "\"ok\": a string, hashable."
          - id: d
            text: "42: an integer, hashable."
        correct: [a]
        explanation: "A key must be hashable: its hash must not change over the object's lifetime. A list is mutable, add/append/remove would change its hash, so Python explicitly forbids putting a list in keys and raises TypeError. Tuple, string, and number are immutable and work fine."

  - id: ht-fib-001
    concept: hash-tables
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete the word-frequency count using dict.get with a default value."
    template: |
      def word_counts(words):
          counts = {}
          for word in words:
              counts[word] = counts.get(word, {{default}}) + 1
          return counts
    blanks:
      default:
        accept: ["0"]

  - id: ht-predict-001
    concept: hash-tables
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? The dict key is a tuple, and the same key is inserted twice with different values."
    snippet: |
      prices = {}
      prices[(1, 2)] = "a"
      prices[(3, 4)] = "b"
      prices[(1, 2)] = "c"
      print(len(prices))
      print(prices[(1, 2)])
      print(sorted(prices.keys()))
    expected:
      kind: stdout
      value: |-
        2
        c
        [(1, 2), (3, 4)]
    hints:
      - "The tuple (1, 2) is immutable and hashable, so it is a valid key. Writing again to an existing key does not add a new entry, it replaces the old value."
      - "Count how many distinct keys appeared in the code before printing len(prices)."
    variants:
      - prompt: "What does the program print? The dict is built from a list of pairs where one key repeats."
        snippet: |
          data = [("a", 1), ("b", 2), ("a", 3)]
          d = dict(data)
          print(d)
          print(len(d))
          print(list(d.keys()))
        expected:
          kind: stdout
          value: |-
            {'a': 3, 'b': 2}
            2
            ['a', 'b']

  - id: ht-fn-twosum-001
    concept: hash-tables
    type: python-function
    difficulty: 2
    prompt: "Implement has_pair_with_sum(nums, target): return True if list nums has two elements at different positions whose sum equals target. The solution must run in a single pass, O(n), using a set of already-seen values."
    starter: |
      def has_pair_with_sum(nums, target):
          ...
    cases:
      - call: "has_pair_with_sum([2, 7, 11, 15], 9)"
        expect: true
      - call: "has_pair_with_sum([1, 2, 3], 7)"
        expect: false
      - call: "has_pair_with_sum([3, 3], 6)"
        expect: true
      - call: "has_pair_with_sum([], 5)"
        expect: false
    hints:
      - "Do not check every pair with a nested loop, that is O(n²). For the current element n, the needed complement is target - n: check whether it was seen before."
      - "Keep a set seen of already-visited numbers. On each step first check target - n in seen, and only then add n to seen: that way a pair never counts the same element twice."
    solution: |
      def has_pair_with_sum(nums, target):
          seen = set()
          for n in nums:
              if target - n in seen:
                  return True
              seen.add(n)
          return False
    variants:
      - prompt: "Implement count_pairs_with_sum(nums, target): return the number of pairs (i, j) with i < j for which nums[i] + nums[j] == target. Count repeated values with multiplicity, in a single pass using a counting dict."
        starter: |
          def count_pairs_with_sum(nums, target):
              ...
        cases:
          - call: "count_pairs_with_sum([1, 5, 7, -1, 5], 6)"
            expect: 3
          - call: "count_pairs_with_sum([1, 1, 1], 2)"
            expect: 3
          - call: "count_pairs_with_sum([], 5)"
            expect: 0
          - call: "count_pairs_with_sum([3], 6)"
            expect: 0
        solution: |
          def count_pairs_with_sum(nums, target):
              seen = {}
              count = 0
              for n in nums:
                  complement = target - n
                  count += seen.get(complement, 0)
                  seen[n] = seen.get(n, 0) + 1
              return count

  - id: ht-fn-anagrams-001
    concept: hash-tables
    type: python-function
    difficulty: 4
    prompt: "Implement group_anagrams(words): group anagram words (words made of the same set of letters) together. Return a list of groups; group order follows the first appearance of a word from that group, and words within a group follow their order in the input list."
    starter: |
      def group_anagrams(words):
          ...
    cases:
      - call: 'group_anagrams(["eat", "tea", "tan", "ate", "nat", "bat"])'
        expect: [["eat", "tea", "ate"], ["tan", "nat"], ["bat"]]
      - call: "group_anagrams([])"
        expect: []
      - call: 'group_anagrams(["a"])'
        expect: [["a"]]
    hints:
      - "Two words are anagrams if they consist of the same letters in any order. Find a way to turn a word into a key so that all anagrams share the same key."
      - "The word's sorted letters (\"\".join(sorted(word))) give exactly such a key. Keep a dict from key to list of words, and a separate list for the order each key first appeared, so the groups come out in the right order."
    solution: |
      def group_anagrams(words):
          groups = {}
          order = []
          for word in words:
              key = "".join(sorted(word))
              if key not in groups:
                  groups[key] = []
                  order.append(key)
              groups[key].append(word)
          return [groups[key] for key in order]
