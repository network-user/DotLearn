exercises:
  - id: hp-quiz-001
    concept: heaps
    type: theory-quiz
    difficulty: 1
    prompt: "A min-heap holds thousands of numbers. What can you say about heap[1] and heap[2], the neighbors of the root heap[0]?"
    choices:
      - id: a
        text: "Both are not smaller than heap[0], but the order between them is undefined"
      - id: b
        text: "heap[1] is always smaller than heap[2]; the heap stores the second-largest element exactly there."
      - id: c
        text: "The whole heap array is sorted in increasing order, that is the definition of a heap."
      - id: d
        text: "heap[1] and heap[2] are leaves of the tree and have no relation to heap[0] at all."
    correct: [a]
    explanation: "The min-heap property requires only one thing: a parent is not greater than its children. heap[1] and heap[2] are children of the root heap[0], so both are not smaller than it, but the rule says nothing about which of the two is smaller than the other. A heap does not store a sorted array; only the minimum at the root is guaranteed."
    variants:
      - prompt: "Why is heapq.heapify(items) on a list of n elements faster than n sequential calls to heapq.heappush?"
        choices:
          - id: a
            text: "heapify sifts down starting from the lower levels of the tree, whereas n heappush calls give O."
          - id: b
            text: "heapify does not build a real heap, it only pretends to, which is why it is faster."
          - id: c
            text: "There is no asymptotic difference, both approaches cost O(n log n)."
          - id: d
            text: "heapify uses a different sorting algorithm unrelated to heaps."
        correct: [a]
        explanation: "heapify sifts down every non-leaf node starting from the lowest level. Most nodes have almost nowhere to sift (they are already nearly leaves), and the total cost across all levels converges to O(n). A series of n heappush calls honestly pays O(log n) per insertion, O(n log n) total."

  - id: hp-fib-001
    concept: heaps
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete the function that returns the k smallest numbers of a list using heapq."
    template: |
      import heapq

      def k_smallest(nums, k):
          heap = list(nums)
          heapq.{{heapify_call}}(heap)
          return [heapq.{{pop_call}}(heap) for _ in range(k)]
    blanks:
      heapify_call:
        accept: ["heapify"]
      pop_call:
        accept: ["heappop"]

  - id: hp-predict-001
    concept: heaps
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? Five numbers are pushed into the heap one at a time, then three minimums are popped."
    snippet: |
      import heapq

      heap = []
      for value in [5, 1, 8, 2, 9]:
          heapq.heappush(heap, value)
      print(heap[0])
      result = [heapq.heappop(heap) for _ in range(3)]
      print(result)
      print(heap)
    expected:
      kind: stdout
      value: |-
        1
        [1, 2, 5]
        [8, 9]
    hints:
      - "heap[0] always holds the minimum of the numbers pushed so far; do not recompute it by hand from insertion order."
      - "heappop removes and returns the minimum of the remaining numbers, one at a time. After three pops out of five numbers, the two largest remain."
    variants:
      - prompt: "What does the program print? heapq.nsmallest and heapq.nlargest are used instead of manual push/pop."
        snippet: |
          import heapq

          nums = [7, 2, 9, 4, 1, 6]
          three_smallest = heapq.nsmallest(3, nums)
          two_largest = heapq.nlargest(2, nums)
          print(three_smallest)
          print(two_largest)
        expected:
          kind: stdout
          value: |-
            [1, 2, 4]
            [9, 7]

  - id: hp-fn-topk-001
    concept: heaps
    type: python-function
    difficulty: 2
    prompt: "Implement top_k_largest(nums, k): return the k largest numbers of list nums in decreasing order. Use a min-heap of size k: keep only the k current candidates in the heap and replace the heap's minimum whenever you encounter a number larger than it."
    starter: |
      import heapq

      def top_k_largest(nums, k):
          ...
    cases:
      - call: "top_k_largest([3, 1, 4, 1, 5, 9, 2, 6], 3)"
        expect: [9, 6, 5]
      - call: "top_k_largest([1, 2, 3], 5)"
        expect: [3, 2, 1]
      - call: "top_k_largest([], 3)"
        expect: []
      - call: "top_k_largest([5, 5, 5], 2)"
        expect: [5, 5]
    hints:
      - "While the heap has fewer than k elements, just push each new number with heapq.heappush. Once the heap is full at k, compare the new number with heap[0]: if it is larger, the heap's minimum is no longer competitive."
      - "heapq.heapreplace(heap, n) pops the current minimum and pushes n in one operation. At the end the heap holds the k largest numbers; sort them in decreasing order before returning."
    solution: |
      import heapq

      def top_k_largest(nums, k):
          heap = []
          for n in nums:
              if len(heap) < k:
                  heapq.heappush(heap, n)
              elif n > heap[0]:
                  heapq.heapreplace(heap, n)
          return sorted(heap, reverse=True)
    variants:
      - prompt: "Implement k_smallest_values(nums, k): return the k smallest numbers of list nums in increasing order. Use a max-heap of size k by storing negated values, so heap[0] always gives the current largest of the k candidates."
        starter: |
          import heapq

          def k_smallest_values(nums, k):
              ...
        cases:
          - call: "k_smallest_values([3, 1, 4, 1, 5, 9, 2, 6], 3)"
            expect: [1, 1, 2]
          - call: "k_smallest_values([1, 2, 3], 5)"
            expect: [1, 2, 3]
          - call: "k_smallest_values([], 3)"
            expect: []
          - call: "k_smallest_values([5, 5, 5], 2)"
            expect: [5, 5]
        solution: |
          import heapq

          def k_smallest_values(nums, k):
              heap = []
              for n in nums:
                  if len(heap) < k:
                      heapq.heappush(heap, -n)
                  elif -n > heap[0]:
                      heapq.heapreplace(heap, -n)
              return sorted(-x for x in heap)

  - id: hp-fn-scheduler-001
    concept: heaps
    type: python-function
    difficulty: 4
    prompt: "Implement process_tasks(tasks): tasks is a list of pairs (priority, name), where a smaller priority number means a more urgent task. Return task names in processing order: first by increasing priority, and for equal priority, in the order they appear in the input list. The solution must work even when task names are not comparable to each other."
    starter: |
      import heapq

      def process_tasks(tasks):
          ...
    cases:
      - call: 'process_tasks([(2, "b"), (1, "a"), (2, "c"), (0, "d")])'
        expect: ["d", "a", "b", "c"]
      - call: "process_tasks([])"
        expect: []
      - call: 'process_tasks([(1, "x")])'
        expect: ["x"]
      - call: 'process_tasks([(3, "z"), (3, "y"), (3, "x")])'
        expect: ["z", "y", "x"]
    hints:
      - "A plain heapq.heappush(heap, (priority, name)) raises TypeError if two tasks share a priority: Python will try to compare name values, and while comparing strings works, it is not guaranteed for arbitrary objects and is not the behavior you want."
      - "Add a counter to the tuple that grows with each processed task: (priority, index, name). The counter is always different, so heapq never has to compare name, and tasks with equal priority come out of the heap in order of increasing index, i.e. in the order they appeared in the input list."
    solution: |
      import heapq

      def process_tasks(tasks):
          heap = []
          for index, (priority, name) in enumerate(tasks):
              heapq.heappush(heap, (priority, index, name))
          order = []
          while heap:
              priority, index, name = heapq.heappop(heap)
              order.append(name)
          return order
