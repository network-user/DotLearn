exercises:
  - id: gr-quiz-001
    concept: graphs
    type: theory-quiz
    difficulty: 1
    prompt: "Соцсеть: миллион пользователей, у каждого в среднем 200 друзей. Почему матрица смежности здесь плохой выбор?"
    choices:
      - id: a
        text: "Матрица заведёт V² клеток, порядка триллиона, хотя рёбер лишь около сотни миллионов. Список смежности хранит O(V + E) и платит только за реальные связи."
      - id: b
        text: "Матрица не умеет представлять неориентированные рёбра."
      - id: c
        text: "Матрица проверяет наличие конкретного ребра медленнее, чем список смежности."
      - id: d
        text: "Матрица работает только с вершинами-строками, а пользователи заданы числами."
    correct: [a]
    explanation: "Граф соцсети разреженный: рёбер порядка 10⁸ при 10¹² возможных пар. Матрица тратит память на все пары сразу, включая несуществующие связи, а список смежности хранит только реальные рёбра. Направленность матрице не мешает, а проверку одного ребра она делает даже быстрее, за O(1)."
    variants:
      - prompt: "В каком случае матрица смежности оправдана?"
        choices:
          - id: a
            text: "Плотный граф, где рёбер близко к V², и требуется за O(1) отвечать на вопрос «есть ли ребро между u и v»."
          - id: b
            text: "Разреженный граф с миллионами вершин и десятками связей у каждой."
          - id: c
            text: "Когда чаще всего нужно перебирать всех соседей одной вершины."
          - id: d
            text: "Когда граф постоянно растёт и число вершин заранее неизвестно."
        correct: [a]
        explanation: "Матрица занимает O(V²) независимо от числа рёбер, поэтому выгодна лишь тогда, когда рёбер и так почти V², а главная операция состоит в мгновенной проверке ребра. Перебор соседей у матрицы стоит O(V) на строку, на разреженном графе память тратится впустую, а рост числа вершин требует перестройки таблицы."
      - prompt: "Чем представление неориентированного графа отличается от ориентированного в списке смежности?"
        choices:
          - id: a
            text: "Каждое ребро записывается дважды: u попадает в список соседей v, а v в список соседей u."
          - id: b
            text: "Ничем: ребро в обоих случаях хранится ровно один раз."
          - id: c
            text: "Неориентированный граф можно хранить только матрицей смежности."
          - id: d
            text: "В неориентированном графе списки соседей обязаны быть отсортированы."
        correct: [a]
        explanation: "Неориентированное ребро видно с обеих сторон, поэтому при построении делают два append: graph[u].append(v) и graph[v].append(u). Если записать связь только в одну сторону, обход найдёт путь из u в v, но не обратно. Сортировка списков остаётся делом вкуса и к направленности не относится."

  - id: gr-predict-001
    concept: graphs
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Учтите, как defaultdict ведёт себя при обращении к отсутствующему ключу."
    snippet: |
      from collections import defaultdict

      edges = [("a", "b"), ("a", "c"), ("b", "c"), ("c", "d")]
      graph = defaultdict(list)
      for u, v in edges:
          graph[u].append(v)
          graph[v].append(u)

      print(sorted(graph["c"]))
      print(len(graph["e"]))
      print(len(graph))
    expected:
      kind: stdout
      value: |-
        ['a', 'b', 'd']
        0
        5
    hints:
      - "Граф неориентированный: каждое ребро добавляет запись в списки обеих вершин. Выпишите словарь после всех четырёх рёбер."
      - "Обращение graph['e'] к defaultdict не бросает KeyError: оно создаёт новую запись с пустым списком, и эта запись остаётся в словаре."
    variants:
      - prompt: "Что выведет программа? Проследите BFS: соседи перебираются в отсортированном порядке."
        snippet: |
          from collections import deque

          graph = {
              "a": ["d", "c"],
              "b": ["c", "d"],
              "c": ["a", "b"],
              "d": ["a", "b"],
          }
          visited = {"a"}
          queue = deque(["a"])
          order = []
          while queue:
              node = queue.popleft()
              order.append(node)
              for n in sorted(graph[node]):
                  if n not in visited:
                      visited.add(n)
                      queue.append(n)
          print(order)
        expected:
          kind: stdout
          value: "['a', 'c', 'd', 'b']"
      - prompt: "Что выведет программа? Граф несвязный, обход стартует из вершины 1."
        snippet: |
          from collections import deque

          graph = {
              1: [2],
              2: [1, 3],
              3: [2],
              4: [5],
              5: [4],
              6: [],
          }
          visited = {1}
          queue = deque([1])
          while queue:
              node = queue.popleft()
              for n in graph[node]:
                  if n not in visited:
                      visited.add(n)
                      queue.append(n)
          print(len(visited))
          print(4 in visited)
        expected:
          kind: stdout
          value: |-
            3
            False

  - id: gr-adj-001
    concept: graphs
    type: python-function
    difficulty: 2
    prompt: "Реализуйте to_adjacency(n, edges): постройте список смежности неориентированного графа с вершинами 0..n-1. Верните список из n списков, каждый внутренний список отсортирован по возрастанию; edges содержит пары [u, v]."
    starter: |
      def to_adjacency(n, edges):
          ...
    cases:
      - call: "to_adjacency(3, [[0, 1], [1, 2]])"
        expect: [[1], [0, 2], [1]]
      - call: "to_adjacency(4, [[0, 1]])"
        expect: [[1], [0], [], []]
      - call: "to_adjacency(1, [])"
        expect: [[]]
      - call: "to_adjacency(3, [[2, 0], [1, 0]])"
        expect: [[1, 2], [0], [0]]
    hints:
      - "Индекс во внешнем списке совпадает с номером вершины: заведите список длины n и заполняйте его, проходя по рёбрам."
      - "Подумайте, сколько записей порождает одно ребро [u, v] и в какие ячейки они попадают. В самом конце пройдитесь по внутренним спискам ещё раз."
    solution: |
      def to_adjacency(n, edges):
          graph = [[] for _ in range(n)]
          for u, v in edges:
              graph[u].append(v)
              graph[v].append(u)
          for neighbors in graph:
              neighbors.sort()
          return graph
    variants:
      - prompt: "Реализуйте to_adjacency_directed(n, edges): список смежности ориентированного графа с вершинами 0..n-1. Пара [u, v] означает дугу только из u в v. Верните список из n отсортированных по возрастанию списков."
        starter: |
          def to_adjacency_directed(n, edges):
              ...
        cases:
          - call: "to_adjacency_directed(3, [[0, 1], [1, 2]])"
            expect: [[1], [2], []]
          - call: "to_adjacency_directed(3, [[2, 0], [2, 1]])"
            expect: [[], [], [0, 1]]
          - call: "to_adjacency_directed(2, [])"
            expect: [[], []]
          - call: "to_adjacency_directed(3, [[0, 2], [0, 1]])"
            expect: [[1, 2], [], []]
        solution: |
          def to_adjacency_directed(n, edges):
              graph = [[] for _ in range(n)]
              for u, v in edges:
                  graph[u].append(v)
              for neighbors in graph:
                  neighbors.sort()
              return graph
      - prompt: "Реализуйте degrees(n, edges): для неориентированного графа с вершинами 0..n-1 верните список из n чисел, где i-й элемент равен количеству рёбер, приходящих в вершину i; edges содержит пары [u, v]."
        starter: |
          def degrees(n, edges):
              ...
        cases:
          - call: "degrees(3, [[0, 1], [1, 2]])"
            expect: [1, 2, 1]
          - call: "degrees(4, [[0, 1]])"
            expect: [1, 1, 0, 0]
          - call: "degrees(1, [])"
            expect: [0]
          - call: "degrees(3, [[0, 1], [0, 2], [1, 2]])"
            expect: [2, 2, 2]
        solution: |
          def degrees(n, edges):
              result = [0] * n
              for u, v in edges:
                  result[u] += 1
                  result[v] += 1
              return result

  - id: gr-bfs-001
    concept: graphs
    type: python-function
    difficulty: 4
    prompt: "Реализуйте shortest_path_len(n, edges, start, target): длину кратчайшего пути в рёбрах между start и target в неориентированном невзвешенном графе с вершинами 0..n-1; edges содержит пары [u, v]. Верните 0, когда start равен target, и -1, когда target недостижим. Используйте BFS через collections.deque."
    starter: |
      from collections import deque

      def shortest_path_len(n, edges, start, target):
          ...
    cases:
      - call: "shortest_path_len(4, [[0, 1], [1, 2], [2, 3]], 0, 3)"
        expect: 3
      - call: "shortest_path_len(5, [[0, 1], [1, 2], [2, 3], [0, 4], [4, 3]], 0, 3)"
        expect: 2
      - call: "shortest_path_len(4, [[0, 1], [2, 3]], 0, 3)"
        expect: -1
      - call: "shortest_path_len(3, [[0, 1], [1, 2]], 2, 2)"
        expect: 0
    hints:
      - "BFS раскрывает граф волнами: сначала все вершины на расстоянии 1, потом 2 и так далее. Номер волны, в которой впервые встретился target, и есть ответ."
      - "Совместите посещение и расстояние: заведите словарь dist, где сам факт наличия ключа означает «вершина уже видена», а значение равно числу рёбер от start. Сосед получает dist[node] + 1 в момент добавления в очередь."
      - "Пустая очередь без встречи с target означает другую компоненту связности: верните -1. Случай start == target обработайте до цикла."
    solution: |
      from collections import deque

      def shortest_path_len(n, edges, start, target):
          if start == target:
              return 0
          graph = [[] for _ in range(n)]
          for u, v in edges:
              graph[u].append(v)
              graph[v].append(u)
          dist = {start: 0}
          queue = deque([start])
          while queue:
              node = queue.popleft()
              for neighbor in graph[node]:
                  if neighbor not in dist:
                      dist[neighbor] = dist[node] + 1
                      if neighbor == target:
                          return dist[neighbor]
                      queue.append(neighbor)
          return -1
