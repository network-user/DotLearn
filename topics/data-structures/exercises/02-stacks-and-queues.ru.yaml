exercises:
  - id: sq-quiz-001
    concept: stacks-and-queues
    type: theory-quiz
    difficulty: 1
    prompt: "У вас есть история посещённых страниц браузера, и кнопка «назад» должна открывать последнюю посещённую страницу. Какая дисциплина для неё естественна?"
    choices:
      - id: a
        text: "Стек (LIFO): последняя открытая страница закрывается первой."
      - id: b
        text: "Очередь (FIFO): страницы закрываются в порядке открытия."
      - id: c
        text: "Хеш-таблица: важен быстрый поиск страницы по URL."
      - id: d
        text: "Куча: важно быстро находить самую старую страницу."
    correct: [a]
    explanation: "Кнопка «назад» всегда возвращает на последнюю посещённую страницу, то есть последний добавленный элемент уходит первым. Это ровно дисциплина LIFO, которую реализует стек."
    variants:
      - prompt: "Принтер печатает документы в порядке поступления и не может напечатать документ раньше тех, что уже стоят в очереди. Какая дисциплина ему нужна?"
        choices:
          - id: a
            text: "Очередь (FIFO): первый поставленный на печать документ печатается первым."
          - id: b
            text: "Стек (LIFO): последний поставленный документ печатается первым."
          - id: c
            text: "BST: документы должны храниться в отсортированном порядке."
          - id: d
            text: "Куча: печатать нужно документ с минимальным размером файла."
        correct: [a]
        explanation: "Печать в порядке поступления, это FIFO: первым пришёл, первым обслужен. Именно так работает очередь, а не стек, где последний добавленный уходит первым."

  - id: sq-fib-001
    concept: stacks-and-queues
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите проверку сбалансированности круглых скобок с помощью стека на обычном списке."
    template: |
      def is_balanced(text):
          stack = []
          for ch in text:
              if ch == "(":
                  stack.{{push_method}}(ch)
              elif ch == ")":
                  if not stack:
                      return False
                  stack.{{pop_method}}()
          return not stack
    blanks:
      push_method:
        accept: ["append"]
      pop_method:
        accept: ["pop"]

  - id: sq-predict-001
    concept: stacks-and-queues
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Проследите, как appendleft и append работают с разных концов deque."
    snippet: |
      from collections import deque

      dq = deque()
      dq.append(1)
      dq.append(2)
      dq.appendleft(0)
      dq.append(3)
      print(list(dq))
      print(dq.popleft())
      print(dq.pop())
      print(list(dq))
    expected:
      kind: stdout
      value: |-
        [0, 1, 2, 3]
        0
        3
        [1, 2]
    hints:
      - "append добавляет справа, appendleft добавляет слева. Соберите deque по шагам, как список, до первого print."
      - "popleft() снимает и возвращает крайний левый элемент, pop() без left снимает и возвращает крайний правый."
    variants:
      - prompt: "Что выведет программа? deque создан с ограничением maxlen: переполнение выталкивает элемент с противоположного конца."
        snippet: |
          from collections import deque

          dq = deque([1, 2, 3], maxlen=3)
          dq.append(4)
          dq.appendleft(0)
          print(list(dq))
        expected:
          kind: stdout
          value: "[0, 2, 3]"

  - id: sq-fn-valid-001
    concept: stacks-and-queues
    type: python-function
    difficulty: 2
    prompt: "Реализуйте is_valid(s): проверьте, что все скобки трёх видов, (), [], {}, в строке s расставлены правильно и вложены корректно. Используйте стек на обычном списке."
    starter: |
      def is_valid(s):
          ...
    cases:
      - call: 'is_valid("()[]{}")'
        expect: true
      - call: 'is_valid("(]")'
        expect: false
      - call: 'is_valid("([)]")'
        expect: false
      - call: 'is_valid("{[]}")'
        expect: true
      - call: 'is_valid("")'
        expect: true
    hints:
      - "Открывающая скобка это сигнал «положить в стек и запомнить, чем закрывать». Закрывающая скобка обязана снять с вершины ровно ту открывающую, что ей парна."
      - "Заведите словарь соответствий закрывающая -> открывающая. На закрывающей скобке проверьте два случая отказа: стек пуст, или снятый со стека символ не совпал с ожидаемым по словарю."
    solution: |
      def is_valid(s):
          pairs = {")": "(", "]": "[", "}": "{"}
          stack = []
          for ch in s:
              if ch in "([{":
                  stack.append(ch)
              elif ch in ")]}":
                  if not stack or stack.pop() != pairs[ch]:
                      return False
          return not stack
    variants:
      - prompt: "Реализуйте is_valid_parens_only(s): проверьте сбалансированность только круглых скобок в строке s, остальные символы игнорируйте."
        starter: |
          def is_valid_parens_only(s):
              ...
        cases:
          - call: 'is_valid_parens_only("(a(b)c)")'
            expect: true
          - call: 'is_valid_parens_only("(()")'
            expect: false
          - call: 'is_valid_parens_only(")(")'
            expect: false
          - call: 'is_valid_parens_only("abc")'
            expect: true
        solution: |
          def is_valid_parens_only(s):
              balance = 0
              for ch in s:
                  if ch == "(":
                      balance += 1
                  elif ch == ")":
                      balance -= 1
                      if balance < 0:
                          return False
              return balance == 0

  - id: sq-fn-window-001
    concept: stacks-and-queues
    type: python-function
    difficulty: 4
    prompt: "Реализуйте max_sliding_window(nums, k): для каждого окна длины k, скользящего по nums слева направо, верните максимум в этом окне. Решение обязано работать за O(n): держите в deque индексы кандидатов на максимум, а не пересчитывайте максимум каждого окна заново."
    starter: |
      from collections import deque

      def max_sliding_window(nums, k):
          ...
    cases:
      - call: "max_sliding_window([1, 3, -1, -3, 5, 3, 6, 7], 3)"
        expect: [3, 3, 5, 5, 6, 7]
      - call: "max_sliding_window([4, 3, 2, 1], 2)"
        expect: [4, 3, 2]
      - call: "max_sliding_window([1], 1)"
        expect: [1]
      - call: "max_sliding_window([9, 8, 7, 6], 4)"
        expect: [9]
    hints:
      - "Не пересчитывайте максимум каждого окна заново, это O(n*k). Держите в deque индексы кандидатов на максимум так, чтобы значение слева всегда было не меньше значений справа."
      - "Перед добавлением нового индекса выкидывайте с хвоста deque все индексы с меньшим или равным значением: они уже никогда не станут максимумом, пока жив новый элемент. С головы выкидывайте индексы, выпавшие из окна (dq[0] <= i - k)."
    solution: |
      from collections import deque

      def max_sliding_window(nums, k):
          dq = deque()
          result = []
          for i, n in enumerate(nums):
              while dq and nums[dq[-1]] <= n:
                  dq.pop()
              dq.append(i)
              if dq[0] <= i - k:
                  dq.popleft()
              if i >= k - 1:
                  result.append(nums[dq[0]])
          return result
