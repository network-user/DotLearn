conceptId: iterator-protocol
cards:
  - id: iterator-protocol-01
    front: "Чем итерируемое отличается от итератора?"
    back: "Итерируемое знает __iter__ и по запросу выдаёт свежий итератор. Итератор знает __next__, отдаёт элементы по одному и хранит позицию внутри себя."
    tags: [protocol]
  - id: iterator-protocol-02
    front: "В какие три такта for обходит объект?"
    back: "iter(obj) один раз получает итератор, затем next(iterator) вызывается в цикле, пока не возбудится StopIteration, которое for молча гасит."
    tags: [protocol]
  - id: iterator-protocol-03
    front: "Что делают функции iter() и next()?"
    back: "iter(x) вызывает x.__iter__(), next(x) вызывает x.__next__(). Это тонкие обёртки над дандер-методами."
    tags: [builtins]
  - id: iterator-protocol-04
    front: "Зачем итератору StopIteration?"
    back: "Это не ошибка, а штатный сигнал «элементы кончились». for перехватывает его и завершает цикл. Без него итератор крутился бы вечно."
    tags: [stopiteration]
  - id: iterator-protocol-05
    front: "Что возвращает __iter__ у самого итератора?"
    back: "self. Поэтому итератор сам себе итерируемое и его можно ставить прямо в for, а iter(it) is it истинно."
    tags: [protocol]
  - id: iterator-protocol-06
    front: "Почему список можно обойти дважды, а zip нет?"
    back: "for берёт у списка новый итератор через __iter__ на каждый проход. zip, map, enumerate, filter сами итераторы: одноразовые, назад не отматываются."
    tags: [one-shot]
  - id: iterator-protocol-07
    front: "Почему next([1, 2, 3]) падает?"
    back: "У списка есть __iter__, но нет __next__: он итерируемое, а не итератор. Сначала возьмите итератор: next(iter([1, 2, 3]))."
    tags: [pitfalls]
  - id: iterator-protocol-08
    front: "Что делает второй аргумент next(it, default)?"
    back: "Вместо StopIteration на исчерпании возвращается default. Удобно, когда конец итератора ожидаем и не должен ронять код."
    tags: [builtins]
  - id: iterator-protocol-09
    front: "Что нужно, чтобы по своему объекту можно было пройтись в for?"
    back: "Дать ему __iter__ (возвращает итератор) и, если он сам итератор, __next__ (отдаёт элемент либо возбуждает StopIteration)."
    tags: [custom]
  - id: iterator-protocol-10
    front: "Как один написанный протокол открывает доступ ко многому сразу?"
    back: "list(), sum(), min(), max(), sorted(), in, распаковка и genexpr внутри зовут iter() и next(). Стоит реализовать протокол, и всё это сразу работает."
    tags: [protocol]
  - id: iterator-protocol-11
    front: "Ловушка: почему после sum(zip(a, b)) повторный проход пуст?"
    back: "zip возвращает одноразовый итератор. Первый проход выбрал все пары, второй увидел пустоту. Нужны повторно, зафиксируйте их: pairs = list(zip(a, b))."
    tags: [one-shot]
