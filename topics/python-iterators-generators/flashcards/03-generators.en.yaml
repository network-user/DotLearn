conceptId: generators
cards:
  - id: generators-01
    front: "What does yield do to a function?"
    back: "At least one yield turns a function into a generator function. Calling it returns a generator object without running the body; work starts only on the first next."
    tags: [basics]
  - id: generators-02
    front: "What does calling a generator function return?"
    back: "A generator object, not the result. countdown is a function, countdown(3) is a generator, which you put into a for or next."
    tags: [basics]
  - id: generators-03
    front: "What does each next call do for a generator?"
    back: "It runs execution up to the next yield, returns its value, and freezes the function's frame along with all local variables. The next next resumes from the same line."
    tags: [mechanics]
  - id: generators-04
    front: "What makes a generator lazy?"
    back: "The body doesn't run until the first element is requested, and then the code runs in one-step chunks. That's why a generator can even produce an infinite sequence."
    tags: [laziness]
  - id: generators-05
    front: "How does a generator save memory compared to a list?"
    back: "A list stores all elements at once, a generator holds only the current frame and produces elements one at a time. On large data that's an order-of-magnitude difference."
    tags: [memory]
  - id: generators-06
    front: "Why can't you iterate over a generator object twice?"
    back: "A generator is an iterator: it holds a position, exhausts after one pass, and can't rewind. For a repeat pass, you recreate it or capture a list."
    tags: [one-shot]
  - id: generators-07
    front: "What does return do inside a generator?"
    back: "It ends the generator rather than yielding a value outward. The returned value hides inside StopIteration.value and doesn't come out through yield."
    tags: [return]
  - id: generators-08
    front: "When does argument validation in a generator's body actually run?"
    back: "Only on the first next, not at call time, because the body sleeps until the first request. For early validation, wrap the generator in a regular function."
    tags: [laziness]
  - id: generators-09
    front: "How does a generator function differ from a generator object?"
    back: "The function is a blueprint with yield. The generator object is the result of calling it, capable of pausing and resuming. It's the object you put in for and next."
    tags: [basics]
  - id: generators-10
    front: "What does it mean to freeze a generator's frame?"
    back: "A regular function destroys its frame after return; a generator saves it in gi_frame along with its local variables and a pointer to the current line. yield saves the position, next restores it."
    tags: [internals]
  - id: generators-11
    front: "What states does a generator pass through?"
    back: "GEN_CREATED (no next yet), GEN_RUNNING (executing), GEN_SUSPENDED (frozen at yield), GEN_CLOSED (finished). inspect.getgeneratorstate reads the state."
    tags: [internals]
