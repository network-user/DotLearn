conceptId: comprehensions
cards:
  - id: comprehensions-01
    front: "What does a comprehension do compared to a loop with append?"
    back: "It folds four lines (empty list, loop, computation, append) into one expression and states the intent at a glance: a new list of transformed elements."
    tags: [basics]
  - id: comprehensions-02
    front: "In what order is a comprehension read by meaning?"
    back: "First for scans the source, then if filters out the unwanted, and only the surviving elements get the expression on the left applied, even though it's written first."
    tags: [basics]
  - id: comprehensions-03
    front: "How do you build a dict via a comprehension?"
    back: "Curly braces with a colon between key and value: {word: len(word) for word in words}. The colon turns a set into a dict."
    tags: [dict-set]
  - id: comprehensions-04
    front: "How do you build a set via a comprehension?"
    back: "Curly braces without a colon: {len(w) for w in words}. Duplicates collapse, order isn't guaranteed. Empty curly braces give a dict, not a set."
    tags: [dict-set]
  - id: comprehensions-05
    front: "How does a filter differ from a ternary expression in a comprehension?"
    back: "if after for filters and shortens the list. The ternary A if cond else B before for replaces elements and keeps the length."
    tags: [filter]
  - id: comprehensions-06
    front: "In what order are nested for clauses read in a comprehension?"
    back: "Left to right: the left for is outer, the right one is inner. [x for row in matrix for x in row] matches the order of two nested for loops."
    tags: [nesting]
  - id: comprehensions-07
    front: "Why isn't the loop variable visible after a comprehension?"
    back: "In Python 3, a comprehension runs inside its own hidden function, so the loop variable stays local to it and doesn't leak outward. A regular for doesn't do this."
    tags: [scope]
  - id: comprehensions-08
    front: "What's an unexpected consequence of the comprehension's hidden function?"
    back: "Inside a comprehension in a class body, names declared at class level aren't visible: the hidden function doesn't capture them."
    tags: [scope]
  - id: comprehensions-09
    front: "How do you capture an intermediate value inside a comprehension?"
    back: "Via the walrus operator :=, for example [y for x in data if (y := f(x)) > 0]. It assigns right inside the expression and lets you reuse the computed value."
    tags: [walrus]
  - id: comprehensions-10
    front: "Why is [print(x) for x in xs] considered a style mistake?"
    back: "It prints the elements, but also builds and discards a list of Nones. For a pure side effect, use a regular for, not a comprehension."
    tags: [pitfalls]
  - id: comprehensions-11
    front: "Why is a comprehension usually faster than a manual loop with append?"
    back: "It compiles into a specialized LIST_APPEND instruction without an attribute lookup for append and without the overhead of a method call on every iteration."
    tags: [performance]
