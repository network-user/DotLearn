conceptId: generators
cards:
  - id: generators-01
    front: "Что делает yield с функцией?"
    back: "Хотя бы один yield превращает функцию в генераторную. Её вызов возвращает объект-генератор и тело не исполняет, а работа начинается только на первом next."
    tags: [basics]
  - id: generators-02
    front: "Что возвращает вызов генераторной функции?"
    back: "Объект-генератор, а не результат. countdown это функция, countdown(3) это генератор, который ставят в for или next."
    tags: [basics]
  - id: generators-03
    front: "Что делает каждый вызов next для генератора?"
    back: "Доводит выполнение до следующего yield, отдаёт его значение и замораживает кадр функции со всеми локальными переменными. Следующий next продолжает с той же строки."
    tags: [mechanics]
  - id: generators-04
    front: "В чём ленивость генератора?"
    back: "Тело не исполняется, пока не запросят первый элемент, а дальше код бежит порциями по одному шагу. Поэтому генератор способен породить и бесконечную последовательность."
    tags: [laziness]
  - id: generators-05
    front: "Чем генератор экономит память по сравнению со списком?"
    back: "Список хранит все элементы сразу, генератор держит только текущий кадр и рождает элементы по одному. На больших данных это разница на порядки."
    tags: [memory]
  - id: generators-06
    front: "Почему по объекту-генератору нельзя пройтись дважды?"
    back: "Генератор это итератор: он хранит позицию, исчерпывается за один проход и назад не отматывается. Для повторного обхода его пересоздают или фиксируют список."
    tags: [one-shot]
  - id: generators-07
    front: "Что делает return внутри генератора?"
    back: "Завершает генератор, а не отдаёт значение наружу. Возвращаемое значение прячется в StopIteration.value и через yield не выходит."
    tags: [return]
  - id: generators-08
    front: "Когда сработает проверка аргументов в теле генератора?"
    back: "Только на первом next, а не в момент вызова, потому что тело до первого запроса спит. Для ранней валидации генератор оборачивают в обычную функцию."
    tags: [laziness]
  - id: generators-09
    front: "Чем генераторная функция отличается от объекта-генератора?"
    back: "Функция это чертёж с yield. Объект-генератор это результат её вызова, который умеет останавливаться и продолжаться. В for и next ставят именно объект."
    tags: [basics]
  - id: generators-10
    front: "Что значит заморозить кадр генератора?"
    back: "Обычная функция после return уничтожает кадр, генератор его сохраняет в gi_frame вместе с локальными переменными и указателем на текущую строку. yield сохраняет позицию, next восстанавливает."
    tags: [internals]
  - id: generators-11
    front: "Какие состояния проходит генератор?"
    back: "GEN_CREATED (ни одного next), GEN_RUNNING (исполняется), GEN_SUSPENDED (замер на yield), GEN_CLOSED (завершён). Прочитать состояние помогает inspect.getgeneratorstate."
    tags: [internals]
