conceptId: comprehensions
cards:
  - id: comprehensions-01
    front: "Что делает comprehension по сравнению с циклом и append?"
    back: "Сворачивает четыре строки (пустой список, цикл, вычисление, append) в одно выражение и сообщает намерение одним взглядом: новый список из преобразованных элементов."
    tags: [basics]
  - id: comprehensions-02
    front: "В каком порядке по смыслу читается comprehension?"
    back: "Сначала for перебирает источник, потом if отсеивает лишнее, и только к выжившим элементам применяется выражение слева, хотя записано оно первым."
    tags: [basics]
  - id: comprehensions-03
    front: "Как построить словарь через comprehension?"
    back: "Фигурные скобки с двоеточием между ключом и значением: {word: len(word) for word in words}. Двоеточие превращает набор в словарь."
    tags: [dict-set]
  - id: comprehensions-04
    front: "Как построить множество через comprehension?"
    back: "Фигурные скобки без двоеточия: {len(w) for w in words}. Дубликаты схлопываются, порядок не гарантируется. Пустые фигурные скобки дают словарь, а не множество."
    tags: [dict-set]
  - id: comprehensions-05
    front: "Чем фильтр отличается от тернарного выражения в comprehension?"
    back: "if после for фильтрует и укорачивает список. Тернарное A if cond else B перед for заменяет элементы и длину сохраняет."
    tags: [filter]
  - id: comprehensions-06
    front: "В каком порядке читаются вложенные for в comprehension?"
    back: "Слева направо: левый for внешний, правый внутренний. [x for row in matrix for x in row] совпадает по порядку с двумя вложенными циклами for."
    tags: [nesting]
  - id: comprehensions-07
    front: "Почему переменная цикла не видна после comprehension?"
    back: "Comprehension в Python 3 исполняется в собственной скрытой функции, поэтому переменная цикла остаётся её локальной и наружу не протекает. Обычный for так не делает."
    tags: [scope]
  - id: comprehensions-08
    front: "Какое неожиданное следствие у скрытой функции comprehension?"
    back: "Внутри comprehension в теле класса не видны имена, объявленные на уровне класса: скрытая функция их не захватывает."
    tags: [scope]
  - id: comprehensions-09
    front: "Как захватить промежуточное значение внутри comprehension?"
    back: "Через walrus-оператор :=, например [y for x in data if (y := f(x)) > 0]. Он присваивает прямо в выражении и позволяет переиспользовать посчитанное."
    tags: [walrus]
  - id: comprehensions-10
    front: "Почему [print(x) for x in xs] считается ошибкой стиля?"
    back: "Он печатает элементы, но заодно строит и выбрасывает список из None. Ради чистого побочного эффекта нужен обычный for, а не comprehension."
    tags: [pitfalls]
  - id: comprehensions-11
    front: "Почему comprehension обычно быстрее ручного цикла с append?"
    back: "Он компилируется в специализированную инструкцию LIST_APPEND без поиска атрибута append и без накладных расходов на вызов метода на каждой итерации."
    tags: [performance]
