conceptId: generator-expressions
cards:
  - id: generator-expressions-01
    front: "Что даёт замена квадратных скобок на круглые в comprehension?"
    back: "Получается генераторное выражение: тот же синтаксис, но ленивый поток по одному элементу вместо списка в памяти. Разница в один символ отделяет список от конвейера."
    tags: [basics]
  - id: generator-expressions-02
    front: "Когда в sum(x for x in nums) не нужны двойные скобки?"
    back: "Когда генераторное выражение единственный аргумент функции: её круглые скобки служат и скобками выражения. Двойные скобки нужны, только если есть другие аргументы."
    tags: [syntax]
  - id: generator-expressions-03
    front: "В чём главная выгода генераторного выражения?"
    back: "Экономия памяти на больших и бесконечных данных и короткое замыкание в any, all, next: обход может остановиться раньше конца, не вычислив остаток."
    tags: [benefits]
  - id: generator-expressions-04
    front: "Что в генераторном выражении вычисляется сразу, а что откладывается?"
    back: "Выражение источника самого внешнего for вычисляется немедленно при создании и захватывает объект. Фильтры и преобразование откладываются до обхода."
    tags: [binding]
  - id: generator-expressions-05
    front: "Почему повторный обход генераторного выражения даёт пустоту?"
    back: "Оно генератор, а значит одноразовое. Первый проход выбрал все элементы, второй увидел пустоту. Для двух проходов создают два выражения или список."
    tags: [one-shot]
  - id: generator-expressions-06
    front: "Есть ли у генераторного выражения длина и индексы?"
    back: "Нет. Это поток, а не последовательность: ни len, ни обращения по индексу. Нужна длина или индексация, значит придётся материализовать список."
    tags: [limits]
  - id: generator-expressions-07
    front: "Почему sum(list(x for x in data)) это ошибка стиля?"
    back: "list() сначала строит весь список, теряя экономию памяти. Если результат сразу сворачивается функцией, обёртка list не нужна."
    tags: [pitfalls]
  - id: generator-expressions-08
    front: "Когда данные начинают течь по конвейеру из генераторных выражений?"
    back: "Только когда финальная свёртка запросит результат. Пока никто не тянет, стадии стоят и ни один промежуточный список не создаётся."
    tags: [pipelines]
  - id: generator-expressions-09
    front: "Когда список по времени быстрее генераторного выражения?"
    back: "На небольших данных, которые надо целиком обойти сразу: заморозка и разморозка кадра на каждый элемент стоит чуть дороже, чем LIST_APPEND. Genexpr выигрывает памятью, а не скоростью на малых данных."
    tags: [performance]
  - id: generator-expressions-10
    front: "Зачем next поверх генераторного выражения?"
    back: "Чтобы найти первый подходящий элемент и остановиться: next(x for x in nums if cond) проверяет элементы лениво и не трогает остаток после первого совпадения."
    tags: [benefits]
