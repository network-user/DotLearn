conceptId: generator-expressions
cards:
  - id: generator-expressions-01
    front: "What do you get by swapping square brackets for parentheses in a comprehension?"
    back: "A generator expression: the same syntax, but a lazy one-element-at-a-time stream instead of a list in memory. A one-character difference separates a list from a pipeline."
    tags: [basics]
  - id: generator-expressions-02
    front: "When don't you need double parentheses in sum(x for x in nums)?"
    back: "When the generator expression is the function's sole argument: its own parentheses double as the expression's parentheses. Double parentheses are only needed when there are other arguments."
    tags: [syntax]
  - id: generator-expressions-03
    front: "What's the main benefit of a generator expression?"
    back: "Memory savings on large and infinite data, plus short-circuiting in any, all, next: the pass can stop early without computing the rest."
    tags: [benefits]
  - id: generator-expressions-04
    front: "What's evaluated immediately in a generator expression, and what's deferred?"
    back: "The outermost for's source expression is evaluated immediately at creation and captures the object. Filters and the transform are deferred until iteration."
    tags: [binding]
  - id: generator-expressions-05
    front: "Why does a repeat pass over a generator expression yield nothing?"
    back: "It's a generator, so it's single-use. The first pass took all the elements, the second saw nothing left. For two passes, create two expressions or a list."
    tags: [one-shot]
  - id: generator-expressions-06
    front: "Does a generator expression have a length or indexing?"
    back: "No. It's a stream, not a sequence: no len, no indexing. If you need a length or indexing, you'll have to materialize a list."
    tags: [limits]
  - id: generator-expressions-07
    front: "Why is sum(list(x for x in data)) a style mistake?"
    back: "list() builds the whole list first, losing the memory savings. If the result is immediately reduced by a function, the list wrapper is unnecessary."
    tags: [pitfalls]
  - id: generator-expressions-08
    front: "When does data start flowing through a pipeline of generator expressions?"
    back: "Only when the final reduction requests a result. While nothing is pulling, the stages sit idle and no intermediate list is created."
    tags: [pipelines]
  - id: generator-expressions-09
    front: "When is a list faster in time than a generator expression?"
    back: "On small data that has to be fully scanned right away: freezing and unfreezing the frame on each element costs a bit more than LIST_APPEND. Genexpr wins on memory, not speed, on small data."
    tags: [performance]
  - id: generator-expressions-10
    front: "Why put next on top of a generator expression?"
    back: "To find the first matching element and stop: next(x for x in nums if cond) checks elements lazily and doesn't touch the rest after the first match."
    tags: [benefits]
