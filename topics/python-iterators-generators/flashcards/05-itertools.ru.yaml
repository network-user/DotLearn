conceptId: itertools
cards:
  - id: itertools-01
    front: "Что общего у всех функций itertools?"
    back: "Каждая принимает итераторы и возвращает итератор. Они ленивы и стыкуются в конвейер, ничего не вычисляя, пока потребитель в конце не потянет результат."
    tags: [basics]
  - id: itertools-02
    front: "Что делает chain?"
    back: "Проходит несколько итераторов подряд, как один поток, без промежуточной копии. chain([1,2],[3,4]) обходит 1,2,3,4."
    tags: [combine]
  - id: itertools-03
    front: "Что делает islice?"
    back: "Режет итератор по правилам range, но без индексации и на любом источнике, включая бесконечный. islice(count(), 3) берёт первые три элемента."
    tags: [slice]
  - id: itertools-04
    front: "Чем опасны count, cycle и repeat?"
    back: "Они бесконечны: count считает вверх, cycle крутит последовательность по кругу, repeat повторяет значение. Их всегда ограничивают через islice или takewhile, иначе обход зависнет."
    tags: [infinite]
  - id: itertools-05
    front: "Что даёт product?"
    back: "Декартово произведение: все сочетания элементов из нескольких наборов, как вложенные циклы одним вызовом. Правый набор прокручивается быстрее левого."
    tags: [combine]
  - id: itertools-06
    front: "Почему groupby ставят после sorted?"
    back: "groupby группирует только подряд идущие одинаковые ключи. Для группировки по всему набору данные сначала сортируют по тому же ключу, иначе один ключ разъедется на несколько групп."
    tags: [groupby]
  - id: itertools-07
    front: "Почему нельзя сохранить группы groupby на потом?"
    back: "Группа это одноразовый подытератор, живой только до следующего шага внешнего цикла. groupby переиспользует буфер, поэтому содержимое оборачивают в list прямо в теле цикла."
    tags: [groupby]
  - id: itertools-08
    front: "Какие две ловушки у tee?"
    back: "Если одна ветка убежала вперёд, tee буферизует весь разрыв и память растёт. И после tee нельзя трогать исходный итератор, иначе ветки потеряют элементы."
    tags: [tee]
  - id: itertools-09
    front: "Зачем zip нужен параметр strict=True?"
    back: "Обычный zip молча останавливается на короткой последовательности и теряет хвост длинной. strict=True (Python 3.10 и новее) превращает рассинхрон длин в ValueError."
    tags: [zip]
  - id: itertools-10
    front: "Почему itertools обычно быстрее самописного цикла?"
    back: "Функции реализованы на C и ленивы: не строят промежуточных списков и крутят внутренний цикл без возврата в байткод Python на каждый элемент."
    tags: [performance]
  - id: itertools-11
    front: "Что такое recipes в документации itertools?"
    back: "Короткие функции вроде take, flatten, unique_everseen, собранные из базовых кирпичей. Это готовый словарь идиом обхода, который стоит прочитать целиком."
    tags: [recipes]
