conceptId: itertools
cards:
  - id: itertools-01
    front: "What do all itertools functions have in common?"
    back: "Each takes iterators and returns an iterator. They're lazy and chain into a pipeline, computing nothing until the consumer at the end pulls a result."
    tags: [basics]
  - id: itertools-02
    front: "What does chain do?"
    back: "Walks several iterators back to back as a single stream, without an intermediate copy. chain([1,2],[3,4]) iterates 1,2,3,4."
    tags: [combine]
  - id: itertools-03
    front: "What does islice do?"
    back: "Slices an iterator using range-like rules, but without indexing and on any source, including an infinite one. islice(count(), 3) takes the first three elements."
    tags: [slice]
  - id: itertools-04
    front: "Why are count, cycle and repeat dangerous?"
    back: "They're infinite: count counts upward, cycle loops a sequence around, repeat repeats a value. They're always bounded via islice or takewhile, otherwise iteration hangs."
    tags: [infinite]
  - id: itertools-05
    front: "What does product give you?"
    back: "The Cartesian product: every combination of elements from several sets, like nested loops in a single call. The rightmost set cycles faster than the left one."
    tags: [combine]
  - id: itertools-06
    front: "Why is groupby placed after sorted?"
    back: "groupby only groups consecutive equal keys. To group across the whole dataset, the data is first sorted by that same key, otherwise one key splits into several groups."
    tags: [groupby]
  - id: itertools-07
    front: "Why can't you save groupby's groups for later?"
    back: "A group is a single-use sub-iterator, alive only until the next step of the outer loop. groupby reuses a buffer, so you have to wrap the content in list right inside the loop body."
    tags: [groupby]
  - id: itertools-08
    front: "What are tee's two traps?"
    back: "If one branch runs ahead, tee buffers the whole gap and memory grows. And after tee you can't touch the original iterator, or the branches lose elements."
    tags: [tee]
  - id: itertools-09
    front: "Why does zip need the strict=True parameter?"
    back: "Plain zip silently stops at the shorter sequence and drops the tail of the longer one. strict=True (Python 3.10+) turns a length mismatch into a ValueError."
    tags: [zip]
  - id: itertools-10
    front: "Why is itertools usually faster than a hand-written loop?"
    back: "The functions are implemented in C and are lazy: they don't build intermediate lists and run their inner loop without returning to Python bytecode on every element."
    tags: [performance]
  - id: itertools-11
    front: "What are the recipes in the itertools docs?"
    back: "Short functions like take, flatten, unique_everseen, assembled from basic building blocks. It's a ready-made dictionary of iteration idioms worth reading in full."
    tags: [recipes]
