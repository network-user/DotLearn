conceptId: iterator-protocol
cards:
  - id: iterator-protocol-01
    front: "How does an iterable differ from an iterator?"
    back: "An iterable knows __iter__ and hands out a fresh iterator on request. An iterator knows __next__, yields elements one at a time, and holds its own position."
    tags: [protocol]
  - id: iterator-protocol-02
    front: "What three steps does for use to walk an object?"
    back: "iter(obj) gets an iterator once, then next(iterator) is called in a loop until StopIteration is raised, which for silently swallows."
    tags: [protocol]
  - id: iterator-protocol-03
    front: "What do the functions iter() and next() do?"
    back: "iter(x) calls x.__iter__(), next(x) calls x.__next__(). They're thin wrappers over the dunder methods."
    tags: [builtins]
  - id: iterator-protocol-04
    front: "Why does an iterator need StopIteration?"
    back: "It's not an error but a standard signal that elements have run out. for catches it and ends the loop. Without it, an iterator would spin forever."
    tags: [stopiteration]
  - id: iterator-protocol-05
    front: "What does __iter__ return on an iterator itself?"
    back: "self. That's why an iterator is its own iterable and can be placed directly in a for, and iter(it) is it is true."
    tags: [protocol]
  - id: iterator-protocol-06
    front: "Why can you iterate a list twice, but not zip?"
    back: "for gets a fresh iterator from a list via __iter__ on every pass. zip, map, enumerate, filter are themselves iterators: single-use, they can't rewind."
    tags: [one-shot]
  - id: iterator-protocol-07
    front: "Why does next([1, 2, 3]) fail?"
    back: "A list has __iter__ but no __next__: it's an iterable, not an iterator. Get an iterator first: next(iter([1, 2, 3]))."
    tags: [pitfalls]
  - id: iterator-protocol-08
    front: "What does the second argument of next(it, default) do?"
    back: "Instead of StopIteration on exhaustion, default is returned. Handy when the end of the iterator is expected and shouldn't crash the code."
    tags: [builtins]
  - id: iterator-protocol-09
    front: "What do you need so your own object can be used in a for?"
    back: "Give it __iter__ (returns an iterator) and, if it's an iterator itself, __next__ (yields an element or raises StopIteration)."
    tags: [custom]
  - id: iterator-protocol-10
    front: "How does one written protocol unlock so much at once?"
    back: "list(), sum(), min(), max(), sorted(), in, unpacking and genexpr all call iter() and next() under the hood. Implement the protocol once and all of it works immediately."
    tags: [protocol]
  - id: iterator-protocol-11
    front: "Trap: why is a repeat pass empty after sum(zip(a, b))?"
    back: "zip returns a single-use iterator. The first pass took all the pairs, the second saw nothing. If you need them twice, capture them: pairs = list(zip(a, b))."
    tags: [one-shot]
