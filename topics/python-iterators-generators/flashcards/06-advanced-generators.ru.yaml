conceptId: advanced-generators
cards:
  - id: advanced-generators-01
    front: "Почему yield называют выражением, а не только инструкцией?"
    back: "Потому что у yield есть результат. Наружу уходит значение справа от yield, а присланное через send значение становится результатом yield внутри генератора."
    tags: [two-way]
  - id: advanced-generators-02
    front: "Что делает send для сопрограммы?"
    back: "Возобновляет её, доставляет своё значение в точку yield, где она замерла, и возвращает следующее отданное значение. Так генератор становится двусторонним каналом."
    tags: [send]
  - id: advanced-generators-03
    front: "Зачем перед первым send разгонять сопрограмму?"
    back: "Свежая сопрограмма стоит до первого yield и принять значение ей некуда. Её доводят до первого yield через next или send(None), иначе send с не-None падает с TypeError."
    tags: [priming]
  - id: advanced-generators-04
    front: "Что yield from делает сверх проброса значений?"
    back: "Переправляет внутрь подгенератора send и throw и ловит значение, которое тот вернул через return. Ручной цикл for item in sub: yield item всё это теряет."
    tags: [yield-from]
  - id: advanced-generators-05
    front: "Как достать значение, возвращённое подгенератором?"
    back: "Через yield from: то, что подгенератор отдал через return, прячется в его StopIteration и становится результатом выражения yield from."
    tags: [yield-from]
  - id: advanced-generators-06
    front: "Что делает throw для генератора?"
    back: "Вбрасывает исключение прямо в точку yield, где генератор заснул, как будто оно там и возникло. Генератор может его поймать и продолжить или дать упасть."
    tags: [throw]
  - id: advanced-generators-07
    front: "Что делает close?"
    back: "Вбрасывает в замерший yield специальное GeneratorExit, прося генератор завершиться. Освобождение ресурсов кладут в finally, чтобы оно сработало и при close, и при обычном исчерпании."
    tags: [close]
  - id: advanced-generators-08
    front: "Почему уборку в сопрограмме кладут в finally?"
    back: "При close генератор прерывается на yield через GeneratorExit. Код после yield, но вне finally, не выполнится, а finally отработает при любом исходе."
    tags: [close]
  - id: advanced-generators-09
    front: "Что будет, если после close генератор проглотит GeneratorExit и снова сделает yield?"
    back: "Python возбудит RuntimeError. На GeneratorExit генератор обязан завершаться, а не продолжать выдавать значения."
    tags: [pitfalls]
  - id: advanced-generators-10
    front: "Как contextlib.contextmanager использует генератор?"
    back: "Один yield делит функцию на две половины: код до yield это вход в with (setup), код после это выход (teardown). Исключение внутри блока проброшено в генератор через throw."
    tags: [contextmanager]
  - id: advanced-generators-11
    front: "Как send и yield from связаны с async и await?"
    back: "PEP 342 дал send, throw, close, PEP 380 дал yield from, на них выросли ранние корутины. PEP 492 закрепил идиому синтаксисом async и await, спрятав send под капот."
    tags: [history]
