conceptId: advanced-generators
cards:
  - id: advanced-generators-01
    front: "Why is yield called an expression, not just a statement?"
    back: "Because yield has a result. The value to the right of yield goes outward, and the value sent via send becomes the result of yield inside the generator."
    tags: [two-way]
  - id: advanced-generators-02
    front: "What does send do for a coroutine?"
    back: "It resumes the coroutine, delivers its value to the yield point where it was frozen, and returns the next yielded value. That's how a generator becomes a two-way channel."
    tags: [send]
  - id: advanced-generators-03
    front: "Why prime a coroutine before the first send?"
    back: "A fresh coroutine is paused before its first yield and has nowhere to receive a value. It's brought to the first yield via next or send(None), otherwise a non-None send fails with TypeError."
    tags: [priming]
  - id: advanced-generators-04
    front: "What does yield from do beyond forwarding values?"
    back: "It forwards send and throw into the subgenerator and captures the value it returned via return. A manual loop for item in sub: yield item loses all of this."
    tags: [yield-from]
  - id: advanced-generators-05
    front: "How do you retrieve a value returned by a subgenerator?"
    back: "Via yield from: what the subgenerator returned via return hides in its StopIteration and becomes the result of the yield from expression."
    tags: [yield-from]
  - id: advanced-generators-06
    front: "What does throw do to a generator?"
    back: "It injects an exception right at the yield point where the generator is asleep, as if it arose there. The generator can catch it and continue, or let it propagate."
    tags: [throw]
  - id: advanced-generators-07
    front: "What does close do?"
    back: "It injects a special GeneratorExit at the frozen yield, asking the generator to finish. Resource cleanup goes in finally, so it runs on both close and normal exhaustion."
    tags: [close]
  - id: advanced-generators-08
    front: "Why is cleanup in a coroutine put in finally?"
    back: "On close, the generator is interrupted at yield via GeneratorExit. Code after yield but outside finally won't run, while finally runs on any outcome."
    tags: [close]
  - id: advanced-generators-09
    front: "What happens if a generator swallows GeneratorExit after close and yields again?"
    back: "Python raises RuntimeError. On GeneratorExit a generator must finish, not keep producing values."
    tags: [pitfalls]
  - id: advanced-generators-10
    front: "How does contextlib.contextmanager use a generator?"
    back: "A single yield splits the function into two halves: the code before yield is the with entry (setup), the code after is the exit (teardown). An exception inside the block is injected into the generator via throw."
    tags: [contextmanager]
  - id: advanced-generators-11
    front: "How are send and yield from related to async and await?"
    back: "PEP 342 gave us send, throw, close; PEP 380 gave us yield from; early coroutines grew from them. PEP 492 cemented the idiom with async and await syntax, hiding send under the hood."
    tags: [history]
