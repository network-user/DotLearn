exercises:
  - id: comprehension-parts-quiz-001
    concept: comprehensions
    type: theory-quiz
    difficulty: 1
    prompt: "Where does the filter sit in the comprehension `[x for x in data if x > 0]`, and what does it do?"
    choices:
      - id: a
        text: "The `if` after `for` drops elements."
      - id: b
        text: "The `if` transforms each element while keeping the list's length."
      - id: c
        text: "The `if` inside a comprehension raises `StopIteration` on a false condition."
      - id: d
        text: "`if` is not allowed in a comprehension; filtering only works with a regular loop."
    correct: [a]
    explanation: "The condition after the source acts as a filter: an element that fails `if` never reaches the expression on the left and never lands in the result. So the result's length can end up smaller than the source's."
    variants:
      - prompt: "What does `print(i)` print right after the line `squares = [i * i for i in range(3)]`?"
        choices:
          - id: a
            text: "`NameError`: the loop variable does not leak out of the comprehension scope."
          - id: b
            text: "`2`, the last value of the loop variable leaked outward after the list."
          - id: c
            text: "`[0, 1, 4]`, the whole list object created by the comprehension."
          - id: d
            text: "`3`, the length of the range used inside the comprehension."
        correct: [a]
        explanation: "In Python 3 a comprehension runs inside a separate hidden function, so `i` stays local to it and doesn't exist outside. Accessing `i` after the comprehension fails with `NameError`."
      - prompt: "How does `{x for x in xs}` differ from `{x: x*x for x in xs}`?"
        choices:
          - id: a
            text: "The first builds a set, the second builds a dict: a colon between key."
          - id: b
            text: "Both build a dict, the only difference is key order."
          - id: c
            text: "The first builds a tuple, the second a list."
          - id: d
            text: "There's no difference, these are two ways to write the same set."
        correct: [a]
        explanation: "Curly braces without a colon give a set, while a colon between key and value turns the same braces into a dict. Empty curly braces, by the way, give a dict, not a set."

  - id: filter-vs-ternary-predict-001
    concept: comprehensions
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? Notice where the condition sits in each comprehension."
    snippet: |
      data = [4, -2, 7, -5]
      print([x for x in data if x > 0])
      print([x if x > 0 else 0 for x in data])
    expected:
      kind: stdout
      value: |-
        [4, 7]
        [4, 0, 7, 0]
    hints:
      - "In the first comprehension the condition sits after the source, in the second before the expression. One of them drops elements, the other replaces them."
      - "The `if ...` filter after `for` shortens the list; the ternary `A if cond else B` before `for` keeps the length and swaps values."
    variants:
      - snippet: |
          matrix = [[1, 2], [3, 4]]
          print([x for row in matrix for x in row])
        expected:
          kind: stdout
          value: "[1, 2, 3, 4]"
      - snippet: |
          pairs = [("a", 1), ("a", 2), ("b", 3)]
          print({k: v for k, v in pairs})
        expected:
          kind: stdout
          value: "{'a': 2, 'b': 3}"

  - id: even-squares-blanks-001
    concept: comprehensions
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the comprehension so it produces the squares of even numbers from 0 to 9 (that is, `[0, 4, 16, 36, 64]`)."
    template: |
      even_squares = [{{expr}} for n in range(10) if {{cond}}]
    blanks:
      expr:
        accept: ["n * n", "n*n", "n ** 2", "n**2"]
      cond:
        accept: ["n % 2 == 0", "n%2==0", "n % 2 < 1"]
    variants:
      - prompt: "Fill in the comprehension so it produces the cubes of numbers divisible by 3, from 0 to 9 (that is, `[0, 27, 216, 729]`)."
        template: |
          cubes_div3 = [{{expr}} for n in range(10) if {{cond}}]
        blanks:
          expr:
            accept: ["n * n * n", "n**3", "n ** 3", "n*n*n"]
          cond:
            accept: ["n % 3 == 0", "n%3==0"]
      - prompt: "Fill in the comprehension so it produces doubled odd numbers from 0 to 9 (that is, `[2, 6, 10, 14, 18]`)."
        template: |
          doubled_odds = [{{expr}} for n in range(10) if {{cond}}]
        blanks:
          expr:
            accept: ["n * 2", "n*2", "2 * n", "2*n"]
          cond:
            accept: ["n % 2 == 1", "n % 2 != 0", "n%2==1"]

  - id: index-by-length-001
    concept: comprehensions
    type: python-function
    difficulty: 2
    prompt: "Implement `index_by_length(words)` via a dict comprehension: return a dict where the key is a word and the value is its length. Key order follows word order."
    starter: |
      def index_by_length(words):
          ...
    cases:
      - call: 'index_by_length(["cat", "lion", "ox"])'
        expect:
          cat: 3
          lion: 4
          ox: 2
      - call: 'index_by_length([])'
        expect: {}
      - call: 'index_by_length(["a"])'
        expect:
          a: 1
    hints:
      - "The key and value are computed from the same element. What becomes the key, and what does `len` compute from it?"
      - "Dict comprehension syntax: `{word: len(word) for word in words}`."
    solution: |
      def index_by_length(words):
          return {word: len(word) for word in words}
    variants:
      - prompt: "Implement `index_by_first(words)` via a dict comprehension: the key is the word, the value is its first letter. Assume no empty words are given as input."
        cases:
          - call: 'index_by_first(["cat", "lion"])'
            expect:
              cat: "c"
              lion: "l"
          - call: 'index_by_first([])'
            expect: {}
        solution: |
          def index_by_first(words):
              return {word: word[0] for word in words}
      - prompt: "Implement `index_upper(words)` via a dict comprehension: the key is the word, the value is that same word in uppercase."
        cases:
          - call: 'index_upper(["cat", "owl"])'
            expect:
              cat: "CAT"
              owl: "OWL"
          - call: 'index_upper([])'
            expect: {}
        solution: |
          def index_upper(words):
              return {word: word.upper() for word in words}

  - id: transpose-matrix-001
    concept: comprehensions
    type: python-function
    difficulty: 3
    prompt: "Implement `transpose(matrix)` via a nested comprehension: return a matrix with rows and columns swapped. The input is a non-empty list of rows of equal length. `[[1, 2, 3], [4, 5, 6]]` becomes `[[1, 4], [2, 5], [3, 6]]`."
    starter: |
      def transpose(matrix):
          ...
    cases:
      - call: "transpose([[1, 2, 3], [4, 5, 6]])"
        expect: [[1, 4], [2, 5], [3, 6]]
      - call: "transpose([[1], [2], [3]])"
        expect: [[1, 2, 3]]
      - call: "transpose([[1, 2], [3, 4]])"
        expect: [[1, 3], [2, 4]]
    hints:
      - "Transposing turns columns into rows. The new row at index `i` collects element `i` from every original row."
      - "The outer comprehension iterates over the column index `i` from `range(len(matrix[0]))`, the inner one collects `row[i]` across all `row` in `matrix`."
      - "The skeleton looks like: `[[row[i] for row in matrix] for i in range(len(matrix[0]))]`."
    solution: |
      def transpose(matrix):
          return [[row[i] for row in matrix] for i in range(len(matrix[0]))]
