exercises:
  - id: iter-vs-iterator-quiz-001
    concept: iterator-protocol
    type: theory-quiz
    difficulty: 1
    prompt: "How does an iterable differ from an iterator?"
    choices:
      - id: a
        text: "An iterable knows `__iter__` and hands out a fresh iterator on request."
      - id: b
        text: "They are two names for the same object."
      - id: c
        text: "An iterable yields elements, while an iterator only stores a length."
      - id: d
        text: "An iterator can be used in `for`, but an iterable cannot."
    correct: [a]
    explanation: "An iterable can hand out a fresh iterator on request via `__iter__`. An iterator holds a position and yields the next element via `__next__`, raising `StopIteration` when exhausted. A list is an iterable, while the result of `iter(a_list)` is already an iterator."
    variants:
      - prompt: "Which object has a `__next__` method?"
        choices:
          - id: a
            text: "An iterator: `__next__` is exactly what yields the next element."
          - id: b
            text: "A list: that's why `next([1, 2])` works"
          - id: c
            text: "Any iterable, without exception - as if types lived at runtime and replaced validation"
          - id: d
            text: "A string, but not a file"
        correct: [a]
        explanation: "`__next__` belongs to an iterator. A list doesn't have it, so `next([1, 2])` fails with `TypeError`: you need `iter(...)` first."
      - prompt: "What does `iter(x)` return if `x` is already an iterator?"
        choices:
          - id: a
            text: "The same object: an iterator's `__iter__` returns itself."
          - id: b
            text: "A new independent iterator starting from position 0."
          - id: c
            text: "A copy at the same position."
          - id: d
            text: "`TypeError`: an iterator cannot be passed to `iter`."
        correct: [a]
        explanation: "An iterator is its own iterable: its `__iter__` returns `self`. So `iter(it) is it`, and you cannot rewind an iterator through `iter`."

  - id: one-shot-predict-001
    concept: iterator-protocol
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? Notice that part of the iterator has already been consumed."
    snippet: |
      nums = [1, 2, 3]
      it = iter(nums)
      print(next(it), next(it))
      print(list(it))
    expected:
      kind: stdout
      value: |-
        1 2
        [3]
    hints:
      - "An iterator stores its position internally. How many elements did the two `next` calls take before `list` reached the iterator?"
      - "`list(it)` collects whatever is left after the `next` calls already made, not the whole original sequence."
    variants:
      - snippet: |
          pairs = zip([1, 2], ['a', 'b'])
          print(list(pairs))
          print(list(pairs))
        expected:
          kind: stdout
          value: |-
            [(1, 'a'), (2, 'b')]
            []
      - snippet: |
          it = iter(range(3))
          print(next(it))
          for x in it:
              print(x)
        expected:
          kind: stdout
          value: |-
            0
            1
            2

  - id: desugar-for-blanks-001
    concept: iterator-protocol
    type: fill-in-blanks
    difficulty: 2
    prompt: "Reconstruct what `for value in data` desugars to under the hood: get an iterator, pull elements, and catch the end-of-sequence signal."
    template: |
      iterator = {{get}}(data)
      while True:
          try:
              value = {{advance}}(iterator)
          except {{stop}}:
              break
          print(value)
    blanks:
      get:
        accept: ["iter"]
      advance:
        accept: ["next"]
      stop:
        accept: ["StopIteration"]
    variants:
      - prompt: "Reconstruct the same breakdown, but the source is a callable read_line, and the stop signal is an empty string (the two-argument form of iter polls the callable until it returns the sentinel value)."
        template: |
          iterator = {{get}}(read_line, "")
          while True:
              try:
                  value = {{advance}}(iterator)
              except {{stop}}:
                  break
              print(value)
        blanks:
          get:
            accept: ["iter"]
          advance:
            accept: ["next"]
          stop:
            accept: ["StopIteration"]
      - prompt: "Reconstruct the same protocol breakdown, but now the `for` lives inside a generator function relay(data): it yields each value through yield instead of print, and finishes through return instead of break."
        template: |
          def relay(data):
              iterator = {{get}}(data)
              while True:
                  try:
                      value = {{advance}}(iterator)
                  except {{stop}}:
                      return
                  yield value
        blanks:
          get:
            accept: ["iter"]
          advance:
            accept: ["next"]
          stop:
            accept: ["StopIteration"]

  - id: manual-collect-001
    concept: iterator-protocol
    type: python-function
    difficulty: 2
    prompt: "Implement `manual_collect(iterable)`, a manual analogue of `list(iterable)`: get an iterator via `iter()` and pull `next()` in a loop until you catch `StopIteration`. Do not use a ready-made `list()`/`[... for ...]` on `iterable` itself."
    starter: |
      def manual_collect(iterable):
          ...
    cases:
      - call: "manual_collect([1, 2, 3])"
        expect: [1, 2, 3]
      - call: 'manual_collect("ab")'
        expect: ["a", "b"]
      - call: "manual_collect(range(3))"
        expect: [0, 1, 2]
      - call: "manual_collect([])"
        expect: []
    hints:
      - "You need to replay what `for` does: get an iterator once, then pull it until the end signal. Which two built-ins do that?"
      - "Start an empty list, in a `while True` loop call `next(iterator)` and append the result; on `except StopIteration` exit with `break`."
    solution: |
      def manual_collect(iterable):
          iterator = iter(iterable)
          result = []
          while True:
              try:
                  result.append(next(iterator))
              except StopIteration:
                  break
          return result
    variants:
      - prompt: "Implement `manual_collect(iterable)` manually via `iter()`/`next()`, but collect not the elements themselves, but their doubled values (`x * 2`). Do not call the built-in `list()` on `iterable` itself."
        cases:
          - call: "manual_collect([1, 2, 3])"
            expect: [2, 4, 6]
          - call: "manual_collect(range(4))"
            expect: [0, 2, 4, 6]
          - call: "manual_collect([])"
            expect: []
        solution: |
          def manual_collect(iterable):
              iterator = iter(iterable)
              result = []
              while True:
                  try:
                      result.append(next(iterator) * 2)
                  except StopIteration:
                      break
              return result
      - prompt: "Implement `manual_collect(iterable)` manually via `iter()`/`next()`, returning a list of indexed pairs `[i, element]` (like `enumerate`, but as a list). Do not call the built-in `list()` on `iterable` itself."
        cases:
          - call: 'manual_collect(["a", "b"])'
            expect: [[0, "a"], [1, "b"]]
          - call: "manual_collect([10])"
            expect: [[0, 10]]
          - call: "manual_collect([])"
            expect: []
        solution: |
          def manual_collect(iterable):
              iterator = iter(iterable)
              result = []
              index = 0
              while True:
                  try:
                      result.append([index, next(iterator)])
                  except StopIteration:
                      break
                  index += 1
              return result

  - id: custom-iterator-001
    concept: iterator-protocol
    type: python-function
    difficulty: 3
    prompt: "Write an iterator class `Squares(n)`: when iterated, it yields the squares `1**2, 2**2, ..., n**2`, then stops. Make the object its own iterator: `__iter__` returns `self`, `__next__` yields the next square or raises `StopIteration`."
    starter: |
      class Squares:
          def __init__(self, n):
              ...
    cases:
      - call: "list(Squares(3))"
        expect: [1, 4, 9]
      - call: "sum(Squares(4))"
        expect: 30
      - call: "list(Squares(0))"
        expect: []
      - call: "(lambda s: iter(s) is s)(Squares(2))"
        expect: true
    hints:
      - "An iterator holds its own state. What needs to survive between `__next__` calls so the object remembers which square it reached?"
      - "In `__init__` store `n` and a step counter. `__iter__` should return `self`, and `__next__` should increment the counter and return its square, until it exceeds `n`."
      - "The stop condition in `__next__`: as soon as the counter exceeds `n`, raise `StopIteration` instead of `return`."
    solution: |
      class Squares:
          def __init__(self, n):
              self.n = n
              self.i = 0

          def __iter__(self):
              return self

          def __next__(self):
              if self.i >= self.n:
                  raise StopIteration
              self.i += 1
              return self.i * self.i
