exercises:
  - id: what-makes-generator-quiz-001
    concept: generators
    type: theory-quiz
    difficulty: 1
    prompt: "What turns a regular function into a generator function?"
    choices:
      - id: a
        text: "Having at least one `yield` in its body: then calling the function returns a generator object, and the body does not run until the first `next`."
      - id: b
        text: "A mandatory `return` at the very end of the function."
      - id: c
        text: "A `@generator` decorator on the function definition."
      - id: d
        text: "Calling the function inside a `for` loop."
    correct: [a]
    explanation: "One `yield` in the body is enough for Python to mark the function as a generator function. Calling it creates a generator object without running the code; execution starts only on the first `next`."
    variants:
      - prompt: "What happens at the moment `gen = countdown(3)` is called, if `countdown` contains `yield`?"
        choices:
          - id: a
            text: "A generator object is returned; the function body has not run yet at all."
          - id: b
            text: "The body runs fully and returns a list."
          - id: c
            text: "The first countdown value prints immediately."
          - id: d
            text: "`StopIteration` is raised."
        correct: [a]
        explanation: "Calling a generator function only creates a generator. The body sleeps until the first `next`, so no printing or computation happens at this point."
      - prompt: "Why can't you iterate over the same generator object twice?"
        choices:
          - id: a
            text: "A generator is an iterator: it holds a position, exhausts after one pass, and cannot rewind."
          - id: b
            text: "A second pass always restarts from the first element."
          - id: c
            text: "This only happens with a generator built from an infinite loop."
          - id: d
            text: "A second pass returns elements in reverse order."
        correct: [a]
        explanation: "A generator object is single-use. After exhaustion, a repeat pass yields nothing. For a second pass you recreate the generator or capture the data as a list."

  - id: lazy-order-predict-001
    concept: generators
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? Trace the order in which lines print inside the generator and outside it."
    snippet: |
      def gen():
          print("A")
          yield 1
          print("B")
          yield 2

      g = gen()
      print("start")
      print(next(g))
      print(next(g))
    expected:
      kind: stdout
      value: |-
        start
        A
        1
        B
        2
    hints:
      - "Calling `gen()` does not run the body. What prints first: `start` outside, or `A` inside the generator?"
      - "Each `next` runs the generator up to the next `yield` and freezes it. The second `next` resumes right after `yield 1`."
    variants:
      - snippet: |
          g = (x for x in range(3))
          print(sum(g))
          print(sum(g))
        expected:
          kind: stdout
          value: |-
            3
            0
      - snippet: |
          def g():
              yield 1
              return 5
              yield 2

          print(list(g()))
        expected:
          kind: stdout
          value: "[1]"

  - id: even-squares-gen-blanks-001
    concept: generators
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the generator `even_squares`, which yields the squares of even numbers less than `limit`."
    template: |
      def even_squares(limit):
          for i in range(limit):
              if {{cond}}:
                  {{kw}} i * i
    blanks:
      cond:
        accept: ["i % 2 == 0", "i%2==0", "i % 2 < 1"]
      kw:
        accept: ["yield"]
    variants:
      - prompt: "Fill in the generator odd_cubes, which yields the cubes of odd numbers less than limit."
        template: |
          def odd_cubes(limit):
              for i in range(limit):
                  if {{cond}}:
                      {{kw}} i ** 3
        blanks:
          cond:
            accept: ["i % 2 == 1", "i % 2 != 0", "i%2==1"]
          kw:
            accept: ["yield"]
      - prompt: "Fill in the generator multiples_of_three, which yields numbers divisible by 3 and less than limit."
        template: |
          def multiples_of_three(limit):
              for i in range(limit):
                  if {{cond}}:
                      {{kw}} i
        blanks:
          cond:
            accept: ["i % 3 == 0", "i%3==0"]
          kw:
            accept: ["yield"]

  - id: transform-gen-001
    concept: generators
    type: python-function
    difficulty: 2
    prompt: "Implement the generator `doubled(iterable)`, which lazily yields each element doubled. Use `yield`, do not build a list inside."
    starter: |
      def doubled(iterable):
          ...
    cases:
      - call: "list(doubled([1, 2, 3]))"
        expect: [2, 4, 6]
      - call: "list(doubled([]))"
        expect: []
      - call: "list(doubled([10]))"
        expect: [20]
    hints:
      - "A generator yields values one at a time via `yield`, not by collecting them into a list. What should be yielded on each loop step?"
      - "Iterate `for x in iterable` and on each step do `yield x * 2`."
    solution: |
      def doubled(iterable):
          for x in iterable:
              yield x * 2
    variants:
      - prompt: "Implement the generator `squared(iterable)`, which lazily yields the square of each element via `yield`."
        cases:
          - call: "list(squared([1, 2, 3]))"
            expect: [1, 4, 9]
          - call: "list(squared([]))"
            expect: []
          - call: "list(squared([5]))"
            expect: [25]
        solution: |
          def squared(iterable):
              for x in iterable:
                  yield x * x
      - prompt: "Implement the generator `negated(iterable)`, which lazily yields each element with the opposite sign via `yield`."
        cases:
          - call: "list(negated([1, -2, 3]))"
            expect: [-1, 2, -3]
          - call: "list(negated([]))"
            expect: []
          - call: "list(negated([0]))"
            expect: [0]
        solution: |
          def negated(iterable):
              for x in iterable:
                  yield -x

  - id: running-sum-gen-001
    concept: generators
    type: python-function
    difficulty: 3
    prompt: "Implement the generator `running_sum(numbers)`, which lazily yields the running total: at step `i` it yields the sum of all elements from the start through `i` inclusive. For `[1, 2, 3, 4]` that's `[1, 3, 6, 10]`."
    starter: |
      def running_sum(numbers):
          ...
    cases:
      - call: "list(running_sum([1, 2, 3, 4]))"
        expect: [1, 3, 6, 10]
      - call: "list(running_sum([]))"
        expect: []
      - call: "list(running_sum([5]))"
        expect: [5]
      - call: "list(running_sum([10, -3, 3]))"
        expect: [10, 7, 10]
    hints:
      - "Each yielded value depends on all the previous ones. You need an accumulator variable that survives the pauses between `yield` calls."
      - "Set up `total = 0` before the loop, add the element on each step, and do `yield total` right after adding."
      - "A generator remembers its local variables between `next` calls, so the accumulator only needs to be created once before the loop."
    solution: |
      def running_sum(numbers):
          total = 0
          for n in numbers:
              total += n
              yield total
