exercises:
  - id: genexpr-vs-listcomp-quiz-001
    concept: generator-expressions
    type: theory-quiz
    difficulty: 1
    prompt: "How does `(x * x for x in nums)` differ from `[x * x for x in nums]`?"
    choices:
      - id: a
        text: "Parentheses give a lazy generator expression."
      - id: b
        text: "There's no difference, both forms build a list"
      - id: c
        text: "Parentheses create a tuple of squares - as if types lived at runtime and replaced validation"
      - id: d
        text: "Parentheses are faster because they compute all elements ahead of time"
    correct: [a]
    explanation: "Square brackets materialize the whole list. Parentheses return a generator that yields elements lazily, one at a time, using almost no memory. In exchange, a generator expression is single-use."
    variants:
      - prompt: "Do you need extra parentheses in `sum(x for x in nums)`?"
        choices:
          - id: a
            text: "No: when the expression is the sole argument of a function, its own parentheses double as the expression's parentheses."
          - id: b
            text: "Yes, double parentheses are always required"
          - id: c
            text: "A generator expression cannot be passed to `sum` at all - as if walk state were not kept between next calls"
          - id: d
            text: "You need square brackets around the expression - mixing different delivery guarantees and ordering"
        correct: [a]
        explanation: "If a generator expression is the sole argument of a call, you don't need to duplicate the parentheses. Double parentheses are only needed when the function has other arguments too."
      - prompt: "What does the second `list(gen)` return for `gen = (x for x in range(3))` right after the first `list(gen)`?"
        choices:
          - id: a
            text: "An empty list: the genexpr is single-use and exhausted after one pass."
          - id: b
            text: "`[0, 1, 2]` again: the generator pass restarts by itself."
          - id: c
            text: "`[2, 1, 0]`: elements come back in reverse order on reuse."
          - id: d
            text: "A `TypeError` because the generator cannot be iterated twice."
        correct: [a]
        explanation: "A generator expression is a generator. The first `list` pulled all the elements, the second saw nothing left. For two passes, you create two expressions or capture a list."

  - id: early-binding-predict-001
    concept: generator-expressions
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? Notice that the name `data` is reassigned after the generator is created."
    snippet: |
      data = [1, 2, 3]
      gen = (x * 10 for x in data)
      data = [7, 8]
      print(list(gen))
    expected:
      kind: stdout
      value: "[10, 20, 30]"
    hints:
      - "The outermost `for`'s source expression is evaluated immediately when the generator is created. What did `gen` capture at that moment?"
      - "Reassigning the name `data` to a new list does not affect the generator: it holds a reference to the original object, not to the name `data`."
    variants:
      - snippet: |
          gen = (x for x in range(3))
          print(list(gen))
          print(list(gen))
        expected:
          kind: stdout
          value: |-
            [0, 1, 2]
            []
      - snippet: |
          nums = [1, 2, 3, 4]
          print(sum(x for x in nums if x % 2 == 0))
        expected:
          kind: stdout
          value: "6"

  - id: sum-genexpr-blanks-001
    concept: generator-expressions
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the generator expression so it sums the squares of the odd numbers in `nums`, without building an intermediate list."
    template: |
      total = sum({{expr}} for x in nums if {{cond}})
    blanks:
      expr:
        accept: ["x * x", "x*x", "x ** 2", "x**2"]
      cond:
        accept: ["x % 2 == 1", "x % 2 != 0", "x%2==1", "x % 2"]
    variants:
      - prompt: "Fill in the generator expression so it sums the cubes of the even numbers in nums, without building an intermediate list."
        template: |
          total = sum({{expr}} for x in nums if {{cond}})
        blanks:
          expr:
            accept: ["x * x * x", "x**3", "x ** 3", "x*x*x"]
          cond:
            accept: ["x % 2 == 0", "x%2==0", "x % 2 < 1"]
      - prompt: "Fill in the generator expression so it sums only the positive numbers in nums, without building an intermediate list."
        template: |
          total = sum({{expr}} for x in nums if {{cond}})
        blanks:
          expr:
            accept: ["x"]
          cond:
            accept: ["x > 0"]

  - id: sum-even-squares-001
    concept: generator-expressions
    type: python-function
    difficulty: 3
    prompt: "Implement `sum_even_squares(nums)`, which returns the sum of the squares of the even numbers using a single generator expression. Do not build an intermediate list."
    starter: |
      def sum_even_squares(nums):
          ...
    cases:
      - call: "sum_even_squares([1, 2, 3, 4])"
        expect: 20
      - call: "sum_even_squares([])"
        expect: 0
      - call: "sum_even_squares([1, 3, 5])"
        expect: 0
      - call: "sum_even_squares([2])"
        expect: 4
    hints:
      - "You need one lazy stream: only the squares of even numbers, summed immediately. No list between the filter and the sum."
      - "Filter even numbers with `if x % 2 == 0`, square with `x * x`, and pass the expression straight into `sum` without square brackets."
    solution: |
      def sum_even_squares(nums):
          return sum(x * x for x in nums if x % 2 == 0)

  - id: pipeline-sum-positive-001
    concept: generator-expressions
    type: python-function
    difficulty: 4
    prompt: "Implement `pipeline_sum(rows)`. Each element of `rows` is a comma-separated string of numbers, e.g. `\"1,2,-3\"`. Build a lazy pipeline: split the rows into cells, skip empty ones, convert to integers, and return the sum of only the positive ones. For `[\"1,2,-3\", \"4,-5\", \"\"]` the answer is `7`."
    starter: |
      def pipeline_sum(rows):
          ...
    cases:
      - call: 'pipeline_sum(["1,2,-3", "4,-5", ""])'
        expect: 7
      - call: "pipeline_sum([])"
        expect: 0
      - call: 'pipeline_sum(["10"])'
        expect: 10
      - call: 'pipeline_sum(["-1,-2"])'
        expect: 0
    hints:
      - "Break the task into lazy stages: flatten the rows into a stream of cells, drop empty ones, turn them into numbers, keep the positive ones, and sum."
      - "A nested generator expression `(cell for row in rows for cell in row.split(\",\") if cell)` gives a stream of non-empty cells. Then `int(...)` and a `> 0` filter."
      - "The final `sum` pulls from the last stage: `sum(n for n in numbers if n > 0)`. No intermediate lists needed."
    solution: |
      def pipeline_sum(rows):
          cells = (cell for row in rows for cell in row.split(",") if cell)
          numbers = (int(cell) for cell in cells)
          return sum(n for n in numbers if n > 0)
