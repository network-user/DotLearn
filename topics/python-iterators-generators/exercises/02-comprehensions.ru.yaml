exercises:
  - id: comprehension-parts-quiz-001
    concept: comprehensions
    type: theory-quiz
    difficulty: 1
    prompt: "Где в comprehension `[x for x in data if x > 0]` стоит фильтр и что он делает?"
    choices:
      - id: a
        text: "`if` после `for` отсеивает элементы, не прошедшие условие, ещё до того, как к ним применится выражение слева."
      - id: b
        text: "`if` меняет каждый элемент, сохраняя длину списка."
      - id: c
        text: "`if` внутри comprehension возбуждает `StopIteration` на ложном условии."
      - id: d
        text: "`if` в comprehension недопустим, фильтровать можно только обычным циклом."
    correct: [a]
    explanation: "Условие после источника работает как фильтр: элемент, не прошедший `if`, до выражения слева не доходит и в результат не попадает. Длина результата поэтому может оказаться меньше длины источника."
    variants:
      - prompt: "Что выведет `print(i)` сразу после строки `squares = [i * i for i in range(3)]`?"
        choices:
          - id: a
            text: "`NameError`: переменная цикла не протекает наружу, comprehension исполняется в своей скрытой функции."
          - id: b
            text: "`2`, последнее значение переменной цикла."
          - id: c
            text: "`[0, 1, 4]`, сам список."
          - id: d
            text: "`3`, длину диапазона."
        correct: [a]
        explanation: "В Python 3 comprehension исполняется в отдельной скрытой функции, поэтому `i` остаётся её локальной переменной и снаружи не существует. Обращение к `i` после comprehension падает с `NameError`."
      - prompt: "Чем `{x for x in xs}` отличается от `{x: x*x for x in xs}`?"
        choices:
          - id: a
            text: "Первое строит множество, второе строит словарь: двоеточие между ключом и значением превращает фигурные скобки в словарь."
          - id: b
            text: "Оба строят словарь, разница только в порядке ключей."
          - id: c
            text: "Первое строит кортеж, второе список."
          - id: d
            text: "Разницы нет, это два способа записать одно множество."
        correct: [a]
        explanation: "Фигурные скобки без двоеточия дают множество, а двоеточие между ключом и значением делает из тех же скобок словарь. Пустые фигурные скобки, к слову, дают именно словарь, а не множество."

  - id: filter-vs-ternary-predict-001
    concept: comprehensions
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Обратите внимание, где стоит условие в каждом comprehension."
    snippet: |
      data = [4, -2, 7, -5]
      print([x for x in data if x > 0])
      print([x if x > 0 else 0 for x in data])
    expected:
      kind: stdout
      value: |-
        [4, 7]
        [4, 0, 7, 0]
    hints:
      - "В первом comprehension условие стоит после источника, во втором перед выражением. Одно из них выкидывает элементы, другое их заменяет."
      - "Фильтр `if ... ` после `for` укорачивает список; тернарное выражение `A if cond else B` перед `for` сохраняет длину и подменяет значения."
    variants:
      - snippet: |
          matrix = [[1, 2], [3, 4]]
          print([x for row in matrix for x in row])
        expected:
          kind: stdout
          value: "[1, 2, 3, 4]"
      - snippet: |
          pairs = [("a", 1), ("a", 2), ("b", 3)]
          print({k: v for k, v in pairs})
        expected:
          kind: stdout
          value: "{'a': 2, 'b': 3}"

  - id: even-squares-blanks-001
    concept: comprehensions
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните comprehension так, чтобы получить квадраты чётных чисел от 0 до 9 (то есть `[0, 4, 16, 36, 64]`)."
    template: |
      even_squares = [{{expr}} for n in range(10) if {{cond}}]
    blanks:
      expr:
        accept: ["n * n", "n*n", "n ** 2", "n**2"]
      cond:
        accept: ["n % 2 == 0", "n%2==0", "n % 2 < 1"]
    variants:
      - prompt: "Заполните comprehension так, чтобы получить кубы чисел, кратных 3, от 0 до 9 (то есть `[0, 27, 216, 729]`)."
        template: |
          cubes_div3 = [{{expr}} for n in range(10) if {{cond}}]
        blanks:
          expr:
            accept: ["n * n * n", "n**3", "n ** 3", "n*n*n"]
          cond:
            accept: ["n % 3 == 0", "n%3==0"]
      - prompt: "Заполните comprehension так, чтобы получить удвоенные нечётные числа от 0 до 9 (то есть `[2, 6, 10, 14, 18]`)."
        template: |
          doubled_odds = [{{expr}} for n in range(10) if {{cond}}]
        blanks:
          expr:
            accept: ["n * 2", "n*2", "2 * n", "2*n"]
          cond:
            accept: ["n % 2 == 1", "n % 2 != 0", "n%2==1"]

  - id: index-by-length-001
    concept: comprehensions
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `index_by_length(words)` через dict comprehension: верните словарь, где ключ это слово, а значение его длина. Порядок ключей повторяет порядок слов."
    starter: |
      def index_by_length(words):
          ...
    cases:
      - call: 'index_by_length(["кот", "слон", "ёж"])'
        expect:
          кот: 3
          слон: 4
          ёж: 2
      - call: 'index_by_length([])'
        expect: {}
      - call: 'index_by_length(["a"])'
        expect:
          a: 1
    hints:
      - "Ключ и значение считаются из одного и того же элемента. Что становится ключом, а что вычисляется из него функцией `len`?"
      - "Синтаксис словарного comprehension: `{word: len(word) for word in words}`."
    solution: |
      def index_by_length(words):
          return {word: len(word) for word in words}
    variants:
      - prompt: "Реализуйте `index_by_first(words)` через dict comprehension: ключ это слово, значение его первая буква. Считайте, что пустых слов на вход не подают."
        cases:
          - call: 'index_by_first(["кот", "слон"])'
            expect:
              кот: "к"
              слон: "с"
          - call: 'index_by_first([])'
            expect: {}
        solution: |
          def index_by_first(words):
              return {word: word[0] for word in words}
      - prompt: "Реализуйте `index_upper(words)` через dict comprehension: ключ это слово, значение это же слово в верхнем регистре."
        cases:
          - call: 'index_upper(["кот", "ёж"])'
            expect:
              кот: "КОТ"
              ёж: "ЁЖ"
          - call: 'index_upper([])'
            expect: {}
        solution: |
          def index_upper(words):
              return {word: word.upper() for word in words}

  - id: transpose-matrix-001
    concept: comprehensions
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `transpose(matrix)` через вложенный comprehension: верните матрицу, где строки и столбцы поменялись местами. Вход это непустой список строк одинаковой длины. `[[1, 2, 3], [4, 5, 6]]` превращается в `[[1, 4], [2, 5], [3, 6]]`."
    starter: |
      def transpose(matrix):
          ...
    cases:
      - call: "transpose([[1, 2, 3], [4, 5, 6]])"
        expect: [[1, 4], [2, 5], [3, 6]]
      - call: "transpose([[1], [2], [3]])"
        expect: [[1, 2, 3]]
      - call: "transpose([[1, 2], [3, 4]])"
        expect: [[1, 3], [2, 4]]
    hints:
      - "Транспонирование делает столбцы строками. Новая строка с номером `i` собирает элемент `i` из каждой исходной строки."
      - "Внешний comprehension идёт по индексу столбца `i` из `range(len(matrix[0]))`, внутренний собирает `row[i]` по всем `row` из `matrix`."
      - "Каркас такой: `[[row[i] for row in matrix] for i in range(len(matrix[0]))]`."
    solution: |
      def transpose(matrix):
          return [[row[i] for row in matrix] for i in range(len(matrix[0]))]
