exercises:
  - id: what-makes-generator-quiz-001
    concept: generators
    type: theory-quiz
    difficulty: 1
    prompt: "Что превращает обычную функцию в генераторную?"
    choices:
      - id: a
        text: "Наличие хотя бы одного `yield` в теле: тогда вызов функции возвращает объект-генератор, а тело не исполняется до первого `next`."
      - id: b
        text: "Обязательный `return` в самом конце функции."
      - id: c
        text: "Декоратор `@generator` над определением функции."
      - id: d
        text: "Вызов функции внутри цикла `for`."
    correct: [a]
    explanation: "Достаточно одного `yield` в теле, чтобы Python пометил функцию как генераторную. Её вызов создаёт объект-генератор и код не запускает, а исполнение начинается только на первом `next`."
    variants:
      - prompt: "Что произойдёт в момент вызова `gen = countdown(3)`, если `countdown` содержит `yield`?"
        choices:
          - id: a
            text: "Вернётся объект-генератор, тело функции ещё ни разу не исполнялось."
          - id: b
            text: "Тело выполнится целиком и вернёт список."
          - id: c
            text: "Сразу напечатается первое значение отсчёта."
          - id: d
            text: "Возбудится `StopIteration`."
        correct: [a]
        explanation: "Вызов генераторной функции только создаёт генератор. Тело спит до первого `next`, поэтому ни печати, ни вычислений в этот момент не происходит."
      - prompt: "Почему по одному и тому же объекту-генератору нельзя пройтись дважды?"
        choices:
          - id: a
            text: "Генератор это итератор: он хранит позицию, исчерпывается за один проход и назад не отматывается."
          - id: b
            text: "Второй проход всегда начинается заново с первого элемента."
          - id: c
            text: "Так работает только генератор из бесконечного цикла."
          - id: d
            text: "Второй проход возвращает элементы в обратном порядке."
        correct: [a]
        explanation: "Объект-генератор одноразовый. После исчерпания повторный обход даёт пустоту. Для второго прохода генератор пересоздают или фиксируют данные списком."

  - id: lazy-order-predict-001
    concept: generators
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Проследите, в каком порядке печатаются строки внутри генератора и снаружи."
    snippet: |
      def gen():
          print("A")
          yield 1
          print("B")
          yield 2

      g = gen()
      print("start")
      print(next(g))
      print(next(g))
    expected:
      kind: stdout
      value: |-
        start
        A
        1
        B
        2
    hints:
      - "Вызов `gen()` не исполняет тело. Что печатается раньше: `start` снаружи или `A` изнутри генератора?"
      - "Каждый `next` доводит генератор до очередного `yield` и замораживает его. Второй `next` продолжает сразу после `yield 1`."
    variants:
      - snippet: |
          g = (x for x in range(3))
          print(sum(g))
          print(sum(g))
        expected:
          kind: stdout
          value: |-
            3
            0
      - snippet: |
          def g():
              yield 1
              return 5
              yield 2

          print(list(g()))
        expected:
          kind: stdout
          value: "[1]"

  - id: even-squares-gen-blanks-001
    concept: generators
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните генератор `even_squares`, который отдаёт квадраты чётных чисел, меньших `limit`."
    template: |
      def even_squares(limit):
          for i in range(limit):
              if {{cond}}:
                  {{kw}} i * i
    blanks:
      cond:
        accept: ["i % 2 == 0", "i%2==0", "i % 2 < 1"]
      kw:
        accept: ["yield"]
    variants:
      - prompt: "Заполните генератор odd_cubes, который отдаёт кубы нечётных чисел, меньших limit."
        template: |
          def odd_cubes(limit):
              for i in range(limit):
                  if {{cond}}:
                      {{kw}} i ** 3
        blanks:
          cond:
            accept: ["i % 2 == 1", "i % 2 != 0", "i%2==1"]
          kw:
            accept: ["yield"]
      - prompt: "Заполните генератор multiples_of_three, который отдаёт числа, кратные 3 и меньшие limit."
        template: |
          def multiples_of_three(limit):
              for i in range(limit):
                  if {{cond}}:
                      {{kw}} i
        blanks:
          cond:
            accept: ["i % 3 == 0", "i%3==0"]
          kw:
            accept: ["yield"]

  - id: transform-gen-001
    concept: generators
    type: python-function
    difficulty: 2
    prompt: "Реализуйте генератор `doubled(iterable)`, который лениво отдаёт каждый элемент, умноженный на два. Используйте `yield`, не собирайте список внутри."
    starter: |
      def doubled(iterable):
          ...
    cases:
      - call: "list(doubled([1, 2, 3]))"
        expect: [2, 4, 6]
      - call: "list(doubled([]))"
        expect: []
      - call: "list(doubled([10]))"
        expect: [20]
    hints:
      - "Генератор отдаёт значения по одному через `yield`, а не копит их в списке. Что нужно отдать на каждом шаге цикла?"
      - "Пройдитесь `for x in iterable` и на каждом шаге сделайте `yield x * 2`."
    solution: |
      def doubled(iterable):
          for x in iterable:
              yield x * 2
    variants:
      - prompt: "Реализуйте генератор `squared(iterable)`, который лениво отдаёт квадрат каждого элемента через `yield`."
        cases:
          - call: "list(squared([1, 2, 3]))"
            expect: [1, 4, 9]
          - call: "list(squared([]))"
            expect: []
          - call: "list(squared([5]))"
            expect: [25]
        solution: |
          def squared(iterable):
              for x in iterable:
                  yield x * x
      - prompt: "Реализуйте генератор `negated(iterable)`, который лениво отдаёт каждый элемент с обратным знаком через `yield`."
        cases:
          - call: "list(negated([1, -2, 3]))"
            expect: [-1, 2, -3]
          - call: "list(negated([]))"
            expect: []
          - call: "list(negated([0]))"
            expect: [0]
        solution: |
          def negated(iterable):
              for x in iterable:
                  yield -x

  - id: running-sum-gen-001
    concept: generators
    type: python-function
    difficulty: 3
    prompt: "Реализуйте генератор `running_sum(numbers)`, который лениво отдаёт нарастающую сумму: на шаге `i` он выдаёт сумму всех элементов с начала по `i` включительно. Для `[1, 2, 3, 4]` это `[1, 3, 6, 10]`."
    starter: |
      def running_sum(numbers):
          ...
    cases:
      - call: "list(running_sum([1, 2, 3, 4]))"
        expect: [1, 3, 6, 10]
      - call: "list(running_sum([]))"
        expect: []
      - call: "list(running_sum([5]))"
        expect: [5]
      - call: "list(running_sum([10, -3, 3]))"
        expect: [10, 7, 10]
    hints:
      - "Каждое отдаваемое значение зависит от всех предыдущих. Нужна переменная-накопитель, которая переживает паузы между `yield`."
      - "Заведите `total = 0` до цикла, на каждом шаге прибавьте элемент и сделайте `yield total` уже после прибавления."
      - "Генератор помнит локальные переменные между вызовами `next`, поэтому накопитель достаточно завести один раз перед циклом."
    solution: |
      def running_sum(numbers):
          total = 0
          for n in numbers:
              total += n
              yield total
