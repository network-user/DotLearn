exercises:
  - id: iter-vs-iterator-quiz-001
    concept: iterator-protocol
    type: theory-quiz
    difficulty: 1
    prompt: "Чем итерируемое (iterable) отличается от итератора (iterator)?"
    choices:
      - id: a
        text: "Итерируемое знает `__iter__` и по запросу выдаёт итератор."
      - id: b
        text: "Это два названия одного и того же объекта."
      - id: c
        text: "Итерируемое отдаёт элементы, а итератор только хранит длину."
      - id: d
        text: "Итератор можно обойти в `for`, а итерируемое нельзя."
    correct: [a]
    explanation: "Итерируемое умеет по запросу отдать свежий итератор через `__iter__`. Итератор держит позицию и отдаёт следующий элемент через `__next__`, а на исчерпании возбуждает `StopIteration`. Список является итерируемым, а результат `iter(список)` это уже итератор."
    variants:
      - prompt: "У какого объекта есть метод `__next__`?"
        choices:
          - id: a
            text: "У итератора: именно `__next__` отдаёт очередной элемент."
          - id: b
            text: "У списка: поэтому якобы `next([1, 2])` сразу отдаёт элементы."
          - id: c
            text: "У любого итерируемого без исключения, включая list и str."
          - id: d
            text: "У строки, но не у файла: у файлов другого протокола нет."
        correct: [a]
        explanation: "`__next__` есть у итератора. У списка его нет, поэтому `next([1, 2])` падает с `TypeError`: сначала нужен `iter(...)`."
      - prompt: "Что вернёт `iter(x)`, если `x` уже итератор?"
        choices:
          - id: a
            text: "Тот же самый объект (`self`)."
          - id: b
            text: "Новый независимый итератор с позиции 0."
          - id: c
            text: "Копию с той же позицией."
          - id: d
            text: "`TypeError`: итератор нельзя передавать в `iter`."
        correct: [a]
        explanation: "Итератор сам себе итерируемое: его `__iter__` возвращает `self`. Поэтому `iter(it) is it`, и «перемотать» итератор через `iter` не выйдет."

  - id: one-shot-predict-001
    concept: iterator-protocol
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Обратите внимание, что часть итератора уже израсходована."
    snippet: |
      nums = [1, 2, 3]
      it = iter(nums)
      print(next(it), next(it))
      print(list(it))
    expected:
      kind: stdout
      value: |-
        1 2
        [3]
    hints:
      - "Итератор хранит позицию внутри себя. Сколько элементов забрали два `next`, прежде чем до итератора добрался `list`?"
      - "`list(it)` собирает всё, что осталось после уже сделанных `next`, а не всю исходную последовательность."
    variants:
      - snippet: |
          pairs = zip([1, 2], ['a', 'b'])
          print(list(pairs))
          print(list(pairs))
        expected:
          kind: stdout
          value: |-
            [(1, 'a'), (2, 'b')]
            []
      - snippet: |
          it = iter(range(3))
          print(next(it))
          for x in it:
              print(x)
        expected:
          kind: stdout
          value: |-
            0
            1
            2

  - id: desugar-for-blanks-001
    concept: iterator-protocol
    type: fill-in-blanks
    difficulty: 2
    prompt: "Восстановите, во что `for value in data` разворачивается под капотом: получить итератор, тянуть элементы и поймать сигнал конца."
    template: |
      iterator = {{get}}(data)
      while True:
          try:
              value = {{advance}}(iterator)
          except {{stop}}:
              break
          print(value)
    blanks:
      get:
        accept: ["iter"]
      advance:
        accept: ["next"]
      stop:
        accept: ["StopIteration"]
    variants:
      - prompt: "Восстановите тот же разбор, но источник это вызываемый объект read_line, а сигнал остановки это пустая строка (двухаргументная форма iter опрашивает callable, пока он не вернёт сигнальное значение)."
        template: |
          iterator = {{get}}(read_line, "")
          while True:
              try:
                  value = {{advance}}(iterator)
              except {{stop}}:
                  break
              print(value)
        blanks:
          get:
            accept: ["iter"]
          advance:
            accept: ["next"]
          stop:
            accept: ["StopIteration"]
      - prompt: "Восстановите тот же разбор протокола, но теперь `for` живёт внутри генераторной функции relay(data): она отдаёт каждое значение через yield вместо print и завершается через return вместо break."
        template: |
          def relay(data):
              iterator = {{get}}(data)
              while True:
                  try:
                      value = {{advance}}(iterator)
                  except {{stop}}:
                      return
                  yield value
        blanks:
          get:
            accept: ["iter"]
          advance:
            accept: ["next"]
          stop:
            accept: ["StopIteration"]

  - id: manual-collect-001
    concept: iterator-protocol
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `manual_collect(iterable)`, ручной аналог `list(iterable)`: возьмите итератор через `iter()` и тяните `next()` в цикле, пока не поймаете `StopIteration`. Готовый `list()`/`[... for ...]` по самому `iterable` не используйте."
    starter: |
      def manual_collect(iterable):
          ...
    cases:
      - call: "manual_collect([1, 2, 3])"
        expect: [1, 2, 3]
      - call: 'manual_collect("ab")'
        expect: ["a", "b"]
      - call: "manual_collect(range(3))"
        expect: [0, 1, 2]
      - call: "manual_collect([])"
        expect: []
    hints:
      - "Нужно повторить работу `for`: один раз получить итератор, потом дёргать его до сигнала конца. Какие две встроенные функции это делают?"
      - "Заведите пустой список, в цикле `while True` зовите `next(iterator)` и добавляйте результат; на `except StopIteration` выходите через `break`."
    solution: |
      def manual_collect(iterable):
          iterator = iter(iterable)
          result = []
          while True:
              try:
                  result.append(next(iterator))
              except StopIteration:
                  break
          return result
    variants:
      - prompt: "Реализуйте `manual_collect(iterable)` вручную через `iter()`/`next()`, но собирайте не сами элементы, а их удвоенные значения (`x * 2`). По самому `iterable` встроенный `list()` не зовите."
        cases:
          - call: "manual_collect([1, 2, 3])"
            expect: [2, 4, 6]
          - call: "manual_collect(range(4))"
            expect: [0, 2, 4, 6]
          - call: "manual_collect([])"
            expect: []
        solution: |
          def manual_collect(iterable):
              iterator = iter(iterable)
              result = []
              while True:
                  try:
                      result.append(next(iterator) * 2)
                  except StopIteration:
                      break
              return result
      - prompt: "Реализуйте `manual_collect(iterable)` вручную через `iter()`/`next()`, возвращая список индексированных пар `[i, элемент]` (как `enumerate`, но списком). По самому `iterable` встроенный `list()` не зовите."
        cases:
          - call: 'manual_collect(["a", "b"])'
            expect: [[0, "a"], [1, "b"]]
          - call: "manual_collect([10])"
            expect: [[0, 10]]
          - call: "manual_collect([])"
            expect: []
        solution: |
          def manual_collect(iterable):
              iterator = iter(iterable)
              result = []
              index = 0
              while True:
                  try:
                      result.append([index, next(iterator)])
                  except StopIteration:
                      break
                  index += 1
              return result

  - id: custom-iterator-001
    concept: iterator-protocol
    type: python-function
    difficulty: 3
    prompt: "Напишите класс-итератор `Squares(n)`: при обходе он отдаёт квадраты `1**2, 2**2, ..., n**2`, а затем останавливается. Сделайте объект сам себе итератором: `__iter__` возвращает `self`, `__next__` отдаёт следующий квадрат или возбуждает `StopIteration`."
    starter: |
      class Squares:
          def __init__(self, n):
              ...
    cases:
      - call: "list(Squares(3))"
        expect: [1, 4, 9]
      - call: "sum(Squares(4))"
        expect: 30
      - call: "list(Squares(0))"
        expect: []
      - call: "(lambda s: iter(s) is s)(Squares(2))"
        expect: true
    hints:
      - "Итератор держит своё состояние сам. Что должно жить между вызовами `__next__`, чтобы объект помнил, до какого квадрата дошёл?"
      - "В `__init__` сохраните `n` и счётчик текущего шага. `__iter__` пусть возвращает `self`, а `__next__` увеличивает счётчик и возвращает его квадрат, пока не выйдет за `n`."
      - "Условие остановки в `__next__`: как только счётчик превысил `n`, поднимите `StopIteration` вместо `return`."
    solution: |
      class Squares:
          def __init__(self, n):
              self.n = n
              self.i = 0

          def __iter__(self):
              return self

          def __next__(self):
              if self.i >= self.n:
                  raise StopIteration
              self.i += 1
              return self.i * self.i
