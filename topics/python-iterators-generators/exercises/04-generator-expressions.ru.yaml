exercises:
  - id: genexpr-vs-listcomp-quiz-001
    concept: generator-expressions
    type: theory-quiz
    difficulty: 1
    prompt: "Чем `(x * x for x in nums)` отличается от `[x * x for x in nums]`?"
    choices:
      - id: a
        text: "Круглые скобки дают ленивое генераторное выражение (поток по одному элементу), квадратные строят весь список в памяти сразу."
      - id: b
        text: "Разницы нет, обе формы строят список."
      - id: c
        text: "Круглые скобки создают кортеж из квадратов."
      - id: d
        text: "Круглые скобки быстрее, потому что вычисляют все элементы заранее."
    correct: [a]
    explanation: "Квадратные скобки материализуют список целиком. Круглые возвращают генератор, который выдаёт элементы лениво, по одному, и обходится почти без памяти. За это генераторное выражение платит одноразовостью."
    variants:
      - prompt: "Нужны ли дополнительные скобки в `sum(x for x in nums)`?"
        choices:
          - id: a
            text: "Нет: когда выражение это единственный аргумент функции, её скобки служат и скобками выражения."
          - id: b
            text: "Да, всегда нужны двойные круглые скобки."
          - id: c
            text: "Генераторное выражение вообще нельзя передавать в `sum`."
          - id: d
            text: "Нужны квадратные скобки вокруг выражения."
        correct: [a]
        explanation: "Если генераторное выражение единственный аргумент вызова, дублировать скобки не нужно. Двойные скобки понадобятся, только когда у функции есть и другие аргументы."
      - prompt: "Что вернёт второй `list(gen)` для `gen = (x for x in range(3))` сразу после первого `list(gen)`?"
        choices:
          - id: a
            text: "Пустой список: генераторное выражение одноразовое и после первого прохода исчерпано."
          - id: b
            text: "`[0, 1, 2]` снова, обход начинается заново."
          - id: c
            text: "`[2, 1, 0]`, элементы в обратном порядке."
          - id: d
            text: "Ошибку `TypeError`."
        correct: [a]
        explanation: "Генераторное выражение это генератор. Первый `list` выбрал все элементы, второй увидел пустоту. Для двух проходов создают два выражения или фиксируют список."

  - id: early-binding-predict-001
    concept: generator-expressions
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Обратите внимание, что имя `data` переприсваивают после создания генератора."
    snippet: |
      data = [1, 2, 3]
      gen = (x * 10 for x in data)
      data = [7, 8]
      print(list(gen))
    expected:
      kind: stdout
      value: "[10, 20, 30]"
    hints:
      - "Выражение источника самого внешнего `for` вычисляется сразу при создании генератора. Что захватил `gen` в этот момент?"
      - "Переприсваивание имени `data` новому списку не трогает генератор: он держит ссылку на исходный объект, а не на имя `data`."
    variants:
      - snippet: |
          gen = (x for x in range(3))
          print(list(gen))
          print(list(gen))
        expected:
          kind: stdout
          value: |-
            [0, 1, 2]
            []
      - snippet: |
          nums = [1, 2, 3, 4]
          print(sum(x for x in nums if x % 2 == 0))
        expected:
          kind: stdout
          value: "6"

  - id: sum-genexpr-blanks-001
    concept: generator-expressions
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните генераторное выражение так, чтобы посчитать сумму квадратов нечётных чисел из `nums`, не строя промежуточный список."
    template: |
      total = sum({{expr}} for x in nums if {{cond}})
    blanks:
      expr:
        accept: ["x * x", "x*x", "x ** 2", "x**2"]
      cond:
        accept: ["x % 2 == 1", "x % 2 != 0", "x%2==1", "x % 2"]
    variants:
      - prompt: "Заполните генераторное выражение так, чтобы посчитать сумму кубов чётных чисел из nums, не строя промежуточный список."
        template: |
          total = sum({{expr}} for x in nums if {{cond}})
        blanks:
          expr:
            accept: ["x * x * x", "x**3", "x ** 3", "x*x*x"]
          cond:
            accept: ["x % 2 == 0", "x%2==0", "x % 2 < 1"]
      - prompt: "Заполните генераторное выражение так, чтобы посчитать сумму только положительных чисел из nums, не строя промежуточный список."
        template: |
          total = sum({{expr}} for x in nums if {{cond}})
        blanks:
          expr:
            accept: ["x"]
          cond:
            accept: ["x > 0"]

  - id: sum-even-squares-001
    concept: generator-expressions
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `sum_even_squares(nums)`, который через одно генераторное выражение возвращает сумму квадратов чётных чисел. Промежуточный список не стройте."
    starter: |
      def sum_even_squares(nums):
          ...
    cases:
      - call: "sum_even_squares([1, 2, 3, 4])"
        expect: 20
      - call: "sum_even_squares([])"
        expect: 0
      - call: "sum_even_squares([1, 3, 5])"
        expect: 0
      - call: "sum_even_squares([2])"
        expect: 4
    hints:
      - "Нужен один ленивый поток: только квадраты чётных чисел, сразу сложенные. Никакого списка между фильтром и суммой."
      - "Отфильтруйте чётные через `if x % 2 == 0`, возведите в квадрат `x * x` и передайте выражение прямо в `sum` без квадратных скобок."
    solution: |
      def sum_even_squares(nums):
          return sum(x * x for x in nums if x % 2 == 0)

  - id: pipeline-sum-positive-001
    concept: generator-expressions
    type: python-function
    difficulty: 4
    prompt: "Реализуйте `pipeline_sum(rows)`. Каждый элемент `rows` это строка чисел через запятую, например `\"1,2,-3\"`. Соберите ленивый конвейер: разбейте строки на ячейки, пропустите пустые, преобразуйте в целые и верните сумму только положительных. Для `[\"1,2,-3\", \"4,-5\", \"\"]` ответ `7`."
    starter: |
      def pipeline_sum(rows):
          ...
    cases:
      - call: 'pipeline_sum(["1,2,-3", "4,-5", ""])'
        expect: 7
      - call: "pipeline_sum([])"
        expect: 0
      - call: 'pipeline_sum(["10"])'
        expect: 10
      - call: 'pipeline_sum(["-1,-2"])'
        expect: 0
    hints:
      - "Разбейте задачу на ленивые стадии: сплющить строки в поток ячеек, отбросить пустые, превратить в числа, оставить положительные и сложить."
      - "Вложенное генераторное выражение `(cell for row in rows for cell in row.split(\",\") if cell)` даёт поток непустых ячеек. Дальше `int(...)` и фильтр `> 0`."
      - "Финальный `sum` тянет из последней стадии: `sum(n for n in numbers if n > 0)`. Промежуточные списки не нужны."
    solution: |
      def pipeline_sum(rows):
          cells = (cell for row in rows for cell in row.split(",") if cell)
          numbers = (int(cell) for cell in cells)
          return sum(n for n in numbers if n > 0)
