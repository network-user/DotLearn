exercises:
  - id: groupby-needs-sort-quiz-001
    concept: itertools
    type: theory-quiz
    difficulty: 1
    prompt: "Почему `groupby` часто ставят после `sorted`?"
    choices:
      - id: a
        text: "`groupby` группирует только подряд идущие одинаковые ключи."
      - id: b
        text: "`groupby` требует, чтобы на вход подали множество"
      - id: c
        text: "`sorted` ускоряет `groupby`, но на результат не влияет"
      - id: d
        text: "Без `sorted` `groupby` возбуждает `ValueError`"
    correct: [a]
    explanation: "`groupby` сравнивает только соседей и начинает новую группу при смене ключа. На неотсортированных данных один ключ разъезжается на несколько групп, поэтому для группировки по всему набору сначала сортируют по тому же ключу."
    variants:
      - prompt: "Что делает `islice(count(), 3)`?"
        choices:
          - id: a
            text: "Берёт первые три элемента бесконечного счётчика `count`."
          - id: b
            text: "Складывает первые три числа."
          - id: c
            text: "Бесконечно печатает числа."
          - id: d
            text: "Возбуждает ошибку, потому что `count` бесконечен и его нельзя резать."
        correct: [a]
        explanation: "`islice` режет любой итератор, включая бесконечный: он тянет ровно три элемента у `count` и завершается. Именно так ограничивают бесконечные источники."
      - prompt: "Чем `zip(a, b, strict=True)` отличается от обычного `zip(a, b)`?"
        choices:
          - id: a
            text: "При разной длине `a`."
          - id: b
            text: "Он идёт по самой длинной последовательности, дополняя короткую нулями."
          - id: c
            text: "Он возвращает список вместо итератора."
          - id: d
            text: "Разницы нет, `strict` влияет только на скорость."
        correct: [a]
        explanation: "Обычный `zip` молча останавливается на короткой последовательности, теряя хвост длинной. `strict=True` (Python 3.10 и новее) превращает рассинхрон длин в явную ошибку."

  - id: groupby-unsorted-predict-001
    concept: itertools
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Данные на вход `groupby` не отсортированы."
    snippet: |
      from itertools import groupby

      data = [1, 1, 2, 1]
      print([(k, len(list(g))) for k, g in groupby(data)])
    expected:
      kind: stdout
      value: "[(1, 2), (2, 1), (1, 1)]"
    hints:
      - "`groupby` начинает новую группу при каждой смене соседнего ключа. Сколько раз ключ меняется при проходе по `[1, 1, 2, 1]`?"
      - "Единица встречается в двух местах, разделённых двойкой, поэтому попадает в две разные группы."
    variants:
      - snippet: |
          from itertools import chain, islice

          print(list(islice(chain([1, 2], [3, 4, 5]), 3)))
        expected:
          kind: stdout
          value: "[1, 2, 3]"
      - snippet: |
          print(list(zip([1, 2, 3], ["a", "b"])))
        expected:
          kind: stdout
          value: "[(1, 'a'), (2, 'b')]"

  - id: islice-count-blanks-001
    concept: itertools
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните так, чтобы получить первые пять чисел бесконечного счётчика, стартующего с нуля, то есть `[0, 1, 2, 3, 4]`."
    template: |
      from itertools import islice, count

      first_five = list(islice({{source}}, {{n}}))
    blanks:
      source:
        accept: ["count()", "count(0)"]
      n:
        accept: ["5"]
    variants:
      - prompt: "Заполните так, чтобы получить первые четыре числа бесконечного счётчика, стартующего с 10, то есть `[10, 11, 12, 13]`."
        template: |
          from itertools import islice, count

          first_four = list(islice({{source}}, {{n}}))
        blanks:
          source:
            accept: ["count(10)"]
          n:
            accept: ["4"]
      - prompt: "Заполните так, чтобы получить первые три числа бесконечного счётчика с шагом 2, стартующего с нуля, то есть `[0, 2, 4]`."
        template: |
          from itertools import islice, count

          first_three = list(islice({{source}}, {{n}}))
        blanks:
          source:
            accept: ["count(0, 2)", "count(0,2)"]
          n:
            accept: ["3"]

  - id: run-length-encode-001
    concept: itertools
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `rle(text)` (run-length encoding) через `groupby`: верните список пар `(символ, длина серии)` для каждого блока подряд идущих одинаковых символов. Для `\"aaabbc\"` ответ `[(\"a\", 3), (\"b\", 2), (\"c\", 1)]`. Сортировать не нужно, серии считаются по соседям."
    starter: |
      def rle(text):
          ...
    cases:
      - call: 'rle("aaabbc")'
        expect: [["a", 3], ["b", 2], ["c", 1]]
      - call: 'rle("")'
        expect: []
      - call: 'rle("abc")'
        expect: [["a", 1], ["b", 1], ["c", 1]]
      - call: 'rle("aa")'
        expect: [["a", 2]]
    hints:
      - "Run-length encoding группирует именно подряд идущие одинаковые символы, а это ровно то, что делает `groupby` без сортировки."
      - "Для каждой пары `(символ, группа)` из `groupby(text)` длина серии это число элементов в группе: `len(list(group))`."
    solution: |
      from itertools import groupby

      def rle(text):
          return [(ch, len(list(group))) for ch, group in groupby(text)]

  - id: chunk-iterable-001
    concept: itertools
    type: python-function
    difficulty: 4
    prompt: "Реализуйте `chunk(iterable, size)`: разбейте вход на списки по `size` элементов подряд, последний кусок может быть короче. Для `([1, 2, 3, 4, 5], 2)` ответ `[[1, 2], [3, 4], [5]]`. Используйте `islice`, а не индексацию (вход может быть любым итератором)."
    starter: |
      def chunk(iterable, size):
          ...
    cases:
      - call: "chunk([1, 2, 3, 4, 5], 2)"
        expect: [[1, 2], [3, 4], [5]]
      - call: "chunk([], 3)"
        expect: []
      - call: "chunk([1, 2, 3], 3)"
        expect: [[1, 2, 3]]
      - call: "chunk([1, 2, 3, 4], 2)"
        expect: [[1, 2], [3, 4]]
    hints:
      - "Возьмите итератор входа один раз через `iter`, чтобы каждый следующий срез продолжался с того места, где кончился прошлый."
      - "В цикле отрезайте по `size` элементов через `list(islice(it, size))`. Пустой срез означает, что источник исчерпан, и пора остановиться."
      - "Каркас такой: завести `it = iter(iterable)`, в `while True` брать кусок, на пустом куске выходить, иначе добавлять его в результат."
    solution: |
      from itertools import islice

      def chunk(iterable, size):
          it = iter(iterable)
          result = []
          while True:
              piece = list(islice(it, size))
              if not piece:
                  return result
              result.append(piece)
