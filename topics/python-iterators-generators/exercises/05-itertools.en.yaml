exercises:
  - id: groupby-needs-sort-quiz-001
    concept: itertools
    type: theory-quiz
    difficulty: 1
    prompt: "Why is `groupby` often placed right after `sorted`?"
    choices:
      - id: a
        text: "`groupby` only groups consecutive equal keys, so to group across the whole dataset the data is first sorted by that same key."
      - id: b
        text: "`groupby` requires the input to be a set."
      - id: c
        text: "`sorted` speeds up `groupby` but doesn't affect the result."
      - id: d
        text: "Without `sorted`, `groupby` raises `ValueError`."
    correct: [a]
    explanation: "`groupby` only compares neighbors and starts a new group whenever the key changes. On unsorted data, one key can split into several groups, so grouping across the whole dataset requires sorting by the same key first."
    variants:
      - prompt: "What does `islice(count(), 3)` do?"
        choices:
          - id: a
            text: "Takes the first three elements of the infinite counter `count` and stops."
          - id: b
            text: "Sums the first three numbers."
          - id: c
            text: "Prints numbers forever."
          - id: d
            text: "Raises an error because `count` is infinite and cannot be sliced."
        correct: [a]
        explanation: "`islice` can slice any iterator, including an infinite one: it pulls exactly three elements from `count` and finishes. That's exactly how you bound infinite sources."
      - prompt: "How does `zip(a, b, strict=True)` differ from plain `zip(a, b)`?"
        choices:
          - id: a
            text: "When `a` and `b` have different lengths it raises `ValueError` instead of silently truncating to the shorter one."
          - id: b
            text: "It iterates over the longer sequence, padding the shorter one with zeros."
          - id: c
            text: "It returns a list instead of an iterator."
          - id: d
            text: "There's no difference; `strict` only affects speed."
        correct: [a]
        explanation: "Plain `zip` silently stops at the shorter sequence, dropping the tail of the longer one. `strict=True` (Python 3.10+) turns a length mismatch into an explicit error."

  - id: groupby-unsorted-predict-001
    concept: itertools
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? The input to `groupby` is not sorted."
    snippet: |
      from itertools import groupby

      data = [1, 1, 2, 1]
      print([(k, len(list(g))) for k, g in groupby(data)])
    expected:
      kind: stdout
      value: "[(1, 2), (2, 1), (1, 1)]"
    hints:
      - "`groupby` starts a new group every time the neighboring key changes. How many times does the key change while scanning `[1, 1, 2, 1]`?"
      - "The value 1 appears in two places separated by a 2, so it lands in two different groups."
    variants:
      - snippet: |
          from itertools import chain, islice

          print(list(islice(chain([1, 2], [3, 4, 5]), 3)))
        expected:
          kind: stdout
          value: "[1, 2, 3]"
      - snippet: |
          print(list(zip([1, 2, 3], ["a", "b"])))
        expected:
          kind: stdout
          value: "[(1, 'a'), (2, 'b')]"

  - id: islice-count-blanks-001
    concept: itertools
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in so that you get the first five numbers of an infinite counter starting from zero, that is `[0, 1, 2, 3, 4]`."
    template: |
      from itertools import islice, count

      first_five = list(islice({{source}}, {{n}}))
    blanks:
      source:
        accept: ["count()", "count(0)"]
      n:
        accept: ["5"]
    variants:
      - prompt: "Fill in so that you get the first four numbers of an infinite counter starting from 10, that is `[10, 11, 12, 13]`."
        template: |
          from itertools import islice, count

          first_four = list(islice({{source}}, {{n}}))
        blanks:
          source:
            accept: ["count(10)"]
          n:
            accept: ["4"]
      - prompt: "Fill in so that you get the first three numbers of an infinite counter with step 2, starting from zero, that is `[0, 2, 4]`."
        template: |
          from itertools import islice, count

          first_three = list(islice({{source}}, {{n}}))
        blanks:
          source:
            accept: ["count(0, 2)", "count(0,2)"]
          n:
            accept: ["3"]

  - id: run-length-encode-001
    concept: itertools
    type: python-function
    difficulty: 3
    prompt: "Implement `rle(text)` (run-length encoding) using `groupby`: return a list of pairs `(character, run length)` for each block of consecutive equal characters. For `\"aaabbc\"` the answer is `[(\"a\", 3), (\"b\", 2), (\"c\", 1)]`. No sorting needed, runs are counted by neighbors."
    starter: |
      def rle(text):
          ...
    cases:
      - call: 'rle("aaabbc")'
        expect: [["a", 3], ["b", 2], ["c", 1]]
      - call: 'rle("")'
        expect: []
      - call: 'rle("abc")'
        expect: [["a", 1], ["b", 1], ["c", 1]]
      - call: 'rle("aa")'
        expect: [["a", 2]]
    hints:
      - "Run-length encoding groups exactly the consecutive equal characters, which is exactly what `groupby` does without sorting."
      - "For each pair `(character, group)` from `groupby(text)`, the run length is the number of elements in the group: `len(list(group))`."
    solution: |
      from itertools import groupby

      def rle(text):
          return [(ch, len(list(group))) for ch, group in groupby(text)]

  - id: chunk-iterable-001
    concept: itertools
    type: python-function
    difficulty: 4
    prompt: "Implement `chunk(iterable, size)`: split the input into lists of `size` consecutive elements, with the last piece possibly shorter. For `([1, 2, 3, 4, 5], 2)` the answer is `[[1, 2], [3, 4], [5]]`. Use `islice`, not indexing (the input can be any iterator)."
    starter: |
      def chunk(iterable, size):
          ...
    cases:
      - call: "chunk([1, 2, 3, 4, 5], 2)"
        expect: [[1, 2], [3, 4], [5]]
      - call: "chunk([], 3)"
        expect: []
      - call: "chunk([1, 2, 3], 3)"
        expect: [[1, 2, 3]]
      - call: "chunk([1, 2, 3, 4], 2)"
        expect: [[1, 2], [3, 4]]
    hints:
      - "Take the input's iterator once via `iter`, so each next slice continues where the previous one left off."
      - "In a loop, cut off `size` elements via `list(islice(it, size))`. An empty slice means the source is exhausted and it's time to stop."
      - "The skeleton looks like: set up `it = iter(iterable)`, in `while True` take a piece, exit on an empty piece, otherwise append it to the result."
    solution: |
      from itertools import islice

      def chunk(iterable, size):
          it = iter(iterable)
          result = []
          while True:
              piece = list(islice(it, size))
              if not piece:
                  return result
              result.append(piece)
