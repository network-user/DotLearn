exercises:
  - id: yield-expression-quiz-001
    concept: advanced-generators
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает `x = yield value` внутри сопрограммы?"
    choices:
      - id: a
        text: "Отдаёт `value` наружу и приостанавливается;."
      - id: b
        text: "Присваивает `value` переменной `x` и продолжает без остановки."
      - id: c
        text: "Возвращает `value` из функции, как обычный `return`."
      - id: d
        text: "Читает значение `x` из стандартного ввода."
    correct: [a]
    explanation: "`yield` это выражение и смотрит в обе стороны: наружу уходит `value`, а присланное через `send` значение становится результатом `yield` и попадает в `x`. Так генератор превращается в двусторонний канал."
    variants:
      - prompt: "Зачем перед первым `send(значение)` вызывать `next` или `send(None)`?"
        choices:
          - id: a
            text: "Чтобы разогнать сопрограмму до первого `yield`."
          - id: b
            text: "Чтобы очистить внутреннее состояние генератора."
          - id: c
            text: "Это не обязательно, `send` работает и на свежей сопрограмме."
          - id: d
            text: "Чтобы закрыть генератор после первого значения."
        correct: [a]
        explanation: "Свежая сопрограмма стоит до первого `yield`, и принять значение ей ещё некуда. `next` или `send(None)` доводят её до первого `yield`, только после этого `send` попадает в готовое выражение."
      - prompt: "Что делает `yield from subgen` сверх простого проброса значений наружу?"
        choices:
          - id: a
            text: "Переправляет внутрь `send` и `throw` и ловит значение."
          - id: b
            text: "Только ускоряет тот же цикл `for item in subgen: yield item`."
          - id: c
            text: "Сортирует значения подгенератора перед выдачей."
          - id: d
            text: "Запускает подгенератор в отдельном потоке."
        correct: [a]
        explanation: "`yield from` это полноценное делегирование: значения идут наружу, `send` и `throw` внутрь, а возвращённое подгенератором значение становится результатом самого выражения `yield from`. Ручной цикл всё это теряет."

  - id: send-sequence-predict-001
    concept: advanced-generators
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Проследите, что печатает разгон и что возвращает каждый `send`."
    snippet: |
      def running_total():
          total = 0
          while True:
              x = yield total
              total += x

      acc = running_total()
      print(next(acc))
      print(acc.send(10))
      print(acc.send(5))
    expected:
      kind: stdout
      value: |-
        0
        10
        15
    hints:
      - "`next(acc)` доводит сопрограмму до первого `yield total` и отдаёт стартовое значение. Каким оно будет до единого `send`?"
      - "Каждый `send(v)` кладёт `v` в `x`, прибавляет его к `total` и снова доходит до `yield total`, отдавая обновлённую сумму."
    variants:
      - snippet: |
          def inner():
              yield 1
              return 99

          def outer():
              r = yield from inner()
              print("вернулось", r)

          print(list(outer()))
        expected:
          kind: stdout
          value: |-
            вернулось 99
            [1]
      - snippet: |
          def worker():
              try:
                  while True:
                      task = yield
                      print("делаю", task)
              finally:
                  print("уборка")

          w = worker()
          next(w)
          w.send("A")
          w.close()
        expected:
          kind: stdout
          value: |-
            делаю A
            уборка

  - id: coroutine-skeleton-blanks-001
    concept: advanced-generators
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните сопрограмму-накопитель: она отдаёт текущую сумму наружу и прибавляет к ней присланное через send значение."
    template: |
      def running_total():
          total = 0
          while True:
              x = {{recv}} total
              total {{op}} x
    blanks:
      recv:
        accept: ["yield"]
      op:
        accept: ["+="]
    variants:
      - prompt: "Заполните сопрограмму-накопитель running_product: она отдаёт текущее произведение наружу и умножает его на присланное через send значение."
        template: |
          def running_product():
              total = 1
              while True:
                  x = {{recv}} total
                  total {{op}} x
        blanks:
          recv:
            accept: ["yield"]
          op:
            accept: ["*="]
      - prompt: "Заполните сопрограмму-накопитель running_balance: она отдаёт текущий остаток наружу и вычитает из него присланное через send списание."
        template: |
          def running_balance():
              total = 0
              while True:
                  x = {{recv}} total
                  total {{op}} x
        blanks:
          recv:
            accept: ["yield"]
          op:
            accept: ["-="]

  - id: run-accumulator-001
    concept: advanced-generators
    type: python-function
    difficulty: 4
    prompt: "Реализуйте `run_accumulator(deltas)`. Внутри создайте сопрограмму, которая хранит сумму и на каждый присланный через `send` `delta` отдаёт обновлённую сумму. Разгоните её, скормите по очереди все `deltas` и верните список обновлённых сумм. Для `[10, 5, 3]` ответ `[10, 15, 18]`."
    starter: |
      def run_accumulator(deltas):
          ...
    cases:
      - call: "run_accumulator([10, 5, 3])"
        expect: [10, 15, 18]
      - call: "run_accumulator([])"
        expect: []
      - call: "run_accumulator([7])"
        expect: [7]
      - call: "run_accumulator([1, -1, 5])"
        expect: [1, 0, 5]
    hints:
      - "Сопрограмме нужен бесконечный цикл с `x = yield total`, чтобы отдавать сумму и принимать очередной delta. Кто её разгонит перед первым send?"
      - "Разгоните сопрограмму одним `next`, затем в цикле по `deltas` добавляйте `co.send(delta)` в список результатов."
      - "Результат каждого `send` это уже обновлённая сумма, её и собираете в список."
    solution: |
      def run_accumulator(deltas):
          def acc():
              total = 0
              while True:
                  x = yield total
                  total += x
          co = acc()
          next(co)
          result = []
          for delta in deltas:
              result.append(co.send(delta))
          return result

  - id: flatten-yield-from-001
    concept: advanced-generators
    type: python-function
    difficulty: 5
    prompt: "Реализуйте генератор `flatten(nested)`, который разворачивает произвольно вложенные списки в один плоский поток, сохраняя порядок. Не-списки отдавайте как есть, вложенные списки делегируйте через `yield from`. `[1, [2, [3, 4]], 5]` превращается в `[1, 2, 3, 4, 5]`."
    starter: |
      def flatten(nested):
          ...
    cases:
      - call: "list(flatten([1, [2, [3, 4]], 5]))"
        expect: [1, 2, 3, 4, 5]
      - call: "list(flatten([]))"
        expect: []
      - call: "list(flatten([[], [1], [[2]]]))"
        expect: [1, 2]
      - call: "list(flatten([1, 2, 3]))"
        expect: [1, 2, 3]
      - call: "list(flatten([[[[5]]]]))"
        expect: [5]
    hints:
      - "Для каждого элемента есть два случая: либо это список, в который надо спуститься, либо готовое значение, которое надо отдать. Рекурсия сама разберётся с любой глубиной."
      - "Пройдитесь по `nested`: если `isinstance(item, list)`, сделайте `yield from flatten(item)`, иначе `yield item`."
      - "Базовый случай выходит сам собой: пустой список ничего не отдаёт, поэтому рекурсия аккуратно упирается в дно."
    solution: |
      def flatten(nested):
          for item in nested:
              if isinstance(item, list):
                  yield from flatten(item)
              else:
                  yield item
