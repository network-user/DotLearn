exercises:
  - id: sio-not-websocket-001
    concept: socketio
    type: theory-quiz
    difficulty: 1
    prompt: "Why won't browser `new WebSocket(\"wss://.../socket.io/\")` connect to a Socket.IO server?"
    choices:
      - id: a
        text: "Socket.IO is a separate protocol with its own packet format above transport; bare WebSocket doesn't speak Engine.IO - you need socket.io-client."
      - id: b
        text: "Socket.IO works only over HTTP long-polling and doesn't support WebSocket at all."
      - id: c
        text: "Socket.IO uses a different port, and bare WebSocket hits standard 443."
      - id: d
        text: "Browser WebSocket doesn't support wss://; you need ws://."
    correct: [a]
    explanation: "Socket.IO is its own protocol with packet format on top of WebSocket frames (lower layer - Engine.IO). Bare `WebSocket` doesn't implement Engine.IO, so you need the paired `socket.io-client` with a compatible server version."
    variants:
      - prompt: "What does Socket.IO's lower layer - Engine.IO - handle?"
        choices:
          - id: a
            text: "Transport: establishes the connection, chooses WebSocket or long-polling, keeps heartbeat, reconnects."
          - id: b
            text: "Application semantics: named events, rooms, and delivery acknowledgements."
          - id: c
            text: "Serializing event payload to JSON."
          - id: d
            text: "User authorization on connect."
        correct: [a]
        explanation: "Engine.IO is the transport layer: pick transport, heartbeat, reconnect. Application semantics (events, rooms, ack) come from the upper Socket.IO layer."
      - prompt: "What replaces manual parsing of the single `message` event from bare WebSocket in Socket.IO?"
        choices:
          - id: a
            text: "Named events: you send with a name via emit and subscribe by name via on."
          - id: b
            text: "Automatic REST routing by URL inside one connection."
          - id: c
            text: "GraphQL subscriptions on top of WebSocket frames."
          - id: d
            text: "A binary protocol where the browser sets the event type as the first byte."
        correct: [a]
        explanation: "Socket.IO flips the model: instead of one `message` and manual parsing, you emit a named event and subscribe with `on` on the same name. The name is your contract; payload serializes automatically."

  - id: sio-ack-meaning-001
    concept: socketio
    type: theory-quiz
    difficulty: 2
    prompt: "What exactly does an acknowledgement (callback) in Socket.IO guarantee?"
    choices:
      - id: a
        text: "The handler on the other side received the event and returned a value (Socket.IO delivers it into the sender's callback) - a 'received and processed' signal, not a distributed transaction."
      - id: b
        text: "The event changed the database and reached all related systems."
      - id: c
        text: "The message was delivered exactly once with no duplicate possible."
      - id: d
        text: "The connection moved to OPEN and is ready for exchange."
    correct: [a]
    explanation: "Ack means 'the handler ran and returned a value,' not 'money was charged.' It's request-response over a persistent connection, not a business guarantee. Exactly-once semantics need application-level idempotency."
    hints:
      - "The server handler returns a value that Socket.IO delivers into the sender's callback. What does that physically confirm - that it ran, or a final effect in someone else's database?"
    variants:
      - prompt: "How is acknowledgement implemented in Socket.IO?"
        choices:
          - id: a
            text: "The browser client passes a callback as the last emit argument; the python-socketio handler returns a value and Socket.IO delivers it into that callback - request-response over a persistent connection."
          - id: b
            text: "Socket.IO sends a separate system ACK packet on every event delivery without application code."
          - id: c
            text: "The sender polls the server with HTTP to check whether the event arrived."
          - id: d
            text: "Confirmation comes as a WebSocket pong frame for every emit."
        correct: [a]
        explanation: "The browser client passes a callback as the last `emit` argument; the python-socketio handler doesn't receive the callback but returns a value, which Socket.IO delivers into that sender's callback. That's a Socket.IO application mechanism, not system pong or HTTP polling."
      - prompt: "What do you add on top of acknowledgement for 'effect applied exactly once'?"
        choices:
          - id: a
            text: "Application-level idempotency - e.g. a unique operation id so a retry doesn't change state twice."
          - id: b
            text: "Nothing: ack alone is exactly-once guarantee."
          - id: c
            text: "Switch transport from long-polling to pure WebSocket."
          - id: d
            text: "Increase the heartbeat timeout so the event won't be lost."
        correct: [a]
        explanation: "Ack only confirms the handler invoked the callback, and the reconnect buffer may redeliver events. Exactly-once comes from application idempotency (e.g. dedupe by operation id), not transport choice or heartbeat tuning."

  - id: sio-rooms-server-only-001
    concept: socketio
    type: theory-quiz
    difficulty: 3
    prompt: "Where do Socket.IO rooms exist, and how do you deliver a message to a group?"
    choices:
      - id: a
        text: "A room is a named set of connections on the server; sio.enter_room(sid, room) adds to it, sio.emit(room=room) delivers to all members. The client doesn't know about rooms."
      - id: b
        text: "A room lives on the client, which decides which messages to accept."
      - id: c
        text: "A room is a separate TCP connection for each user group."
      - id: d
        text: "A room is an alias for one sid; only one connection per room."
    correct: [a]
    explanation: "Rooms live only on the server: `sio.enter_room(sid, room)` adds a connection, `sio.emit(room=room)` broadcasts to all members. The client has no room API, and one sid can be in many rooms."
    hints:
      - "Ask which side maintains the list of 'who is in this group.' Does the client see that list in its code?"
      - "If the client doesn't know about rooms, who decides group delivery - and where must membership be stored?"

  - id: sio-reconnect-socketid-001
    concept: socketio
    type: theory-quiz
    difficulty: 3
    prompt: "What happens to room membership after automatic client reconnect?"
    choices:
      - id: a
        text: "The client gets a new sid and previous room membership doesn't restore itself - the server must re-join in the connect handler."
      - id: b
        text: "sid is preserved and all rooms restore automatically as if nothing broke."
      - id: c
        text: "All rooms are deleted for every client and groups must be recreated."
      - id: d
        text: "The client stores the room list and sends it to the server automatically on reconnect."
    correct: [a]
    explanation: "A reconnected client gets a new `sid`; old room membership was tied to the previous connection and isn't inherited. The server re-joins rooms in the `connect` handler via `sio.enter_room`."
    hints:
      - "A room is tied to a specific server-side connection. What happens to that binding when the old connection dies and a new one appears?"
      - "After reconnect the connection id changes. If rooms were tied to the old id, who and where must restore membership?"

  - id: sio-emit-buffer-predict-001
    concept: socketio
    type: predict-output
    difficulty: 4
    prompt: "Emit buffer model during outage: while disconnected, events pile up and flush after reconnect. If each event increments a counter, what happens on redelivery? What does the program print?"
    snippet: |
      counter = 0
      buffer = []

      def emit_increment(connected):
          global counter
          if connected:
              counter += 1
          else:
              buffer.append("increment")

      emit_increment(True)
      emit_increment(False)
      emit_increment(False)

      for _ in buffer:
          counter += 1

      print(counter)
    expected:
      kind: stdout
      value: "3"
    hints:
      - "Count separately: how many increments ran while connected vs how many went to the buffer during the outage. After reconnect the buffer applies too."
      - "The first emit ran online, the next two buffered with `connected=False`. The buffer loop applies the backlog. Add both contributions to `counter`."
    variants:
      - snippet: |
          counter = 0
          buffer = []

          def emit_increment(connected):
              global counter
              if connected:
                  counter += 1
              else:
                  buffer.append("increment")

          emit_increment(True)
          emit_increment(True)
          emit_increment(False)
          emit_increment(False)
          emit_increment(False)

          for _ in buffer:
              counter += 1

          print(counter)
        expected:
          kind: stdout
          value: "5"
      - snippet: |
          counter = 0
          buffer = []

          def emit_increment(connected):
              global counter
              if connected:
                  counter += 1
              else:
                  buffer.append("increment")

          for connected in [False, False, False, False]:
              emit_increment(connected)

          print(counter, len(buffer))
        expected:
          kind: stdout
          value: "0 4"

  - id: sio-emit-on-blanks-001
    concept: socketio
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the blanks about the python-socketio server API."
    template: |
      From the server you send an event with await sio.{{send}}("chat:message", payload),
      and you attach a handler for an incoming event with the decorator @sio.{{subscribe}}("chat:message").
      To add a connection to a room, call await sio.{{enter}}(sid, "room:general").
    blanks:
      send:
        accept: ["emit"]
      subscribe:
        accept: ["on"]
      enter:
        accept: ["enter_room"]
    hints:
      - "The two main Socket.IO operations are named at the start of the section; the server-side room join is in the rooms section (a method on sio that takes sid, not socket.join)."
    variants:
      - prompt: "Fill in the blanks about python-socketio layers and starting the server."
        template: |
          The lower layer {{engine}} handles transport and chooses between WebSocket
          and {{fallback}} when proxies block upgrade. The server itself is wrapped in ASGI:
          app = socketio.{{asgi}}(sio), then app is handed to uvicorn.
        blanks:
          engine:
            accept: ["Engine.IO", "engine.io", "EngineIO"]
          fallback:
            accept: ["long-polling", "long polling", "longpolling", "HTTP long-polling"]
          asgi:
            accept: ["ASGIApp"]
      - prompt: "Fill in the blanks about addressing events on a python-socketio server."
        template: |
          To deliver an event to all room members on the server, call
          await sio.emit("msg", data, {{roomarg}}="room:general").
          To reach a single client, use their {{sid}} as the room name.
        blanks:
          roomarg:
            accept: ["room", "to"]
            accept_regex: '^(room|to)$'
          sid:
            accept: ["sid"]
