exercises:
  - id: rt-broadcast-targets-001
    concept: realtime-patterns
    type: theory-quiz
    difficulty: 1
    prompt: "Как в python-socketio адресовать событие всем, всем кроме отправителя и только участникам комнаты?"
    choices:
      - id: a
        text: "sio.emit(...) - всем подключённым; sio.emit(..., skip_sid=sid) - всем, кроме отправителя; sio.emit(..., room=room) - только участникам комнаты."
      - id: b
        text: "skip_sid и room - синонимы, оба исключают отправителя из рассылки."
      - id: c
        text: "sio.emit(...) шлёт только отправителю; чтобы охватить остальных, обязателен отдельный broadcast-объект."
      - id: d
        text: "skip_sid выбирает транспорт, а room - протокол; на список получателей они не влияют."
    correct: [a]
    explanation: "В python-socketio адресация задаётся аргументами `sio.emit`: без адресных аргументов - всем подключённым, `skip_sid=sid` исключает самого отправителя (чтобы не слать ему эхо своего же сообщения), `room=room` - только участникам конкретной комнаты. `skip_sid` и `room` можно комбинировать."
    variants:
      - prompt: "Зачем при ретрансляции сообщения в чат добавляют `skip_sid=sid`, а не шлют простой `sio.emit(room=...)`?"
        choices:
          - id: a
            text: "Чтобы не слать эхо самому отправителю - его клиент уже отрисовал сообщение оптимистично."
          - id: b
            text: "Чтобы сообщение дошло только до отправителя для подтверждения."
          - id: c
            text: "Чтобы обойти комнаты и доставить вообще всем серверам кластера."
          - id: d
            text: "Чтобы сжать сообщение перед рассылкой."
        correct: [a]
        explanation: "`skip_sid=sid` исключает самого отправителя из рассылки в комнату. Его клиент уже показал сообщение локально, поэтому эхо привело бы к дублю. На различии «всем в комнате» против «всем в комнате кроме отправителя» как раз и ломаются дубли в чатах."
      - prompt: "Какой способ адресации использовать, чтобы сообщение получили только участники конкретного чата, а не все подключённые?"
        choices:
          - id: a
            text: "sio.emit(..., room=room) - доставка только участникам комнаты."
          - id: b
            text: "sio.emit(...) без room - так проще, а лишние получатели не помешают."
          - id: c
            text: "sio.emit(..., skip_sid=sid) - исключение отправителя само ограничит рассылку чатом."
          - id: d
            text: "sio.emit(..., namespace=room) - комнату задают через namespace."
        correct: [a]
        explanation: "`sio.emit(..., room=room)` адресует только участников комнаты. `sio.emit` без `room` ударил бы по всем подключённым - в многокомнатном приложении это утечка сообщений между чатами и лишний трафик. `skip_sid` лишь исключает одного, а namespace - это не комната."

  - id: rt-presence-counter-001
    concept: realtime-patterns
    type: theory-quiz
    difficulty: 3
    prompt: "Почему надёжный presence считают по счётчику соединений на пользователя, а не по факту `connect`/`disconnect`?"
    choices:
      - id: a
        text: "При обрыве disconnect опаздывает на таймаут heartbeat, а у пользователя может быть несколько вкладок; счётчик корректно переживает и то, и другое - онлайн, пока он больше нуля."
      - id: b
        text: "Счётчик быстрее работает, потому что не требует обработки событий."
      - id: c
        text: "disconnect вообще не приходит при закрытии вкладки, поэтому событиями пользоваться нельзя."
      - id: d
        text: "Socket.IO не даёт события connect, остаётся только считать соединения вручную."
    correct: [a]
    explanation: "После потери сети `disconnect` приходит лишь по таймауту heartbeat - всё это время наивный флаг врёт «онлайн». Несколько вкладок означают несколько соединений: `disconnect` одной не значит, что человек ушёл. Счётчик соединений на пользователя (инкремент при подключении, декремент при отключении, онлайн пока > 0) переживает оба случая, а TTL во внешнем хранилище страхует от «вечно онлайн» при падении сервера."
    hints:
      - "Представьте пользователя с двумя открытыми вкладками. Что говорит наивный флаг, когда он закрыл одну из них?"
      - "После обрыва Wi-Fi disconnect приходит не мгновенно. Что показывает наивный presence в это окно, и как счётчик соединений решает обе проблемы?"

  - id: rt-redis-adapter-001
    concept: realtime-patterns
    type: theory-quiz
    difficulty: 3
    prompt: "Почему наивный `sio.emit(room=...)` не работает на нескольких серверах и что это чинит?"
    choices:
      - id: a
        text: "sio.emit(room=...) видит только сокеты своего процесса; общий менеджер AsyncRedisManager (Redis pub/sub) публикует событие, остальные серверы подписаны и доставляют его своим локальным сокетам в комнате - прикладной код при этом не меняется."
      - id: b
        text: "sio.emit(room=...) ломается из-за лимита открытых дескрипторов; помогает увеличение ulimit."
      - id: c
        text: "Проблема в sticky sessions, и AsyncRedisManager её полностью решает, заменяя их."
      - id: d
        text: "sio.emit(room=...) работает на любом числе серверов без дополнительных настроек."
    correct: [a]
    explanation: "In-memory список соединений виден только своему процессу, поэтому `sio.emit(room=...)` на сервере №1 не достаёт до сокетов сервера №2. `AsyncRedisManager` работает как шина pub/sub: один сервер публикует событие, остальные подписаны и доставляют его своим локальным сокетам в этой комнате. Прикладной код остаётся прежним."
    hints:
      - "Список открытых соединений лежит в памяти одного процесса. Что про комнату знает второй сервер, в памяти которого этих соединений нет?"
      - "Нужен механизм, через который один сервер сообщит остальным «доставьте это вашим сокетам в комнате». Какой инструмент работает как шина publish/subscribe?"

  - id: rt-sticky-vs-adapter-001
    concept: realtime-patterns
    type: theory-quiz
    difficulty: 4
    prompt: "Какие две независимые задачи решают AsyncRedisManager и sticky sessions при горизонтальном масштабировании python-socketio?"
    choices:
      - id: a
        text: "Менеджер AsyncRedisManager доставляет broadcast между серверами кластера; sticky sessions гарантируют, что все запросы одной сессии Engine.IO (polling и апгрейд) попадут на один сервер. Нужны обе настройки."
      - id: b
        text: "Это одно и то же: настроив AsyncRedisManager, sticky sessions можно не включать."
      - id: c
        text: "Менеджер привязывает клиента к одному серверу, а sticky sessions рассылают broadcast по кластеру."
      - id: d
        text: "Обе нужны только при использовании long-polling и не нужны, если транспорт - чистый WebSocket."
    correct: [a]
    explanation: "Это две независимые проблемы. Менеджер AsyncRedisManager (Redis pub/sub) дотягивает broadcast до всех серверов кластера. Sticky sessions нужны, потому что Socket.IO начинает с long-polling и апгрейдит до WebSocket - несколько HTTP-запросов одной сессии Engine.IO обязаны попасть на один сервер, иначе рукопожатие развалится. Менеджер не заменяет sticky sessions."
    hints:
      - "Одна задача - про то, чтобы сообщение из одного процесса дошло до сокетов в другом. Другая - про то, чтобы цепочка запросов одного рукопожатия не размазалась по серверам."
      - "Вспомните, что Engine.IO начинает с polling и затем апгрейдит соединение. Сколько HTTP-запросов в этой цепочке и куда они обязаны попасть?"

  - id: rt-fanout-predict-001
    concept: realtime-patterns
    type: predict-output
    difficulty: 4
    prompt: "Программа оценивает fan-out: сколько исходящих сообщений порождает входящий трафик в комнатах разного размера. Что она выведет?"
    snippet: |
      room_sizes = [10000, 5000, 5000]
      messages_per_second = 100
      total_room_size = sum(room_sizes)
      fan_out = total_room_size * messages_per_second
      print(total_room_size)
      print(fan_out)
    expected:
      kind: stdout
      value: "20000\n2000000"
    hints:
      - "Сначала складывается размер всех комнат, затем результат умножается на частоту сообщений. Каждый print выводит своё число на отдельной строке."
      - "fan-out - это произведение суммарной аудитории на число входящих сообщений в секунду. Сложите размеры комнат, затем умножьте на 100."
    variants:
      - snippet: |
          room_sizes = [1000, 2000, 3000]
          messages_per_second = 50
          total_room_size = sum(room_sizes)
          fan_out = total_room_size * messages_per_second
          print(total_room_size)
          print(fan_out)
        expected:
          kind: stdout
          value: "6000\n300000"
      - snippet: |
          small_rooms = [500] * 8
          messages_per_second = 20
          fan_out = sum(small_rooms) * messages_per_second
          print(len(small_rooms), sum(small_rooms))
          print(fan_out)
        expected:
          kind: stdout
          value: "8 4000\n80000"

  - id: rt-scaling-challenge-001
    concept: realtime-patterns
    type: theory-quiz
    difficulty: 5
    prompt: "Команда масштабирует чат до двух серверов за балансировщиком: подключила AsyncRedisManager, но клиенты время от времени получают ошибку рукопожатия и сообщения иногда не доходят до части комнаты. В чём наиболее вероятная причина и что упущено?"
    choices:
      - id: a
        text: "Не настроены sticky sessions: запросы одной сессии Engine.IO (polling + апгрейд) попадают на разные серверы по round-robin, рукопожатие разваливается. AsyncRedisManager эту задачу не решает - нужна привязка клиента к одному backend."
      - id: b
        text: "AsyncRedisManager настроен неверно, и из-за этого ломается именно рукопожатие; sticky sessions здесь ни при чём."
      - id: c
        text: "Нужно перейти на чистый WebSocket без long-polling, тогда ни sticky sessions, ни adapter не понадобятся."
      - id: d
        text: "Проблема в presence-счётчике: его TTL слишком мал, поэтому соединения считаются мёртвыми и рукопожатие сбрасывается."
    correct: [a]
    explanation: "Симптом «ошибка рукопожатия» указывает на отсутствие sticky sessions: Socket.IO начинает с long-polling и апгрейдит до WebSocket, и несколько HTTP-запросов одной сессии Engine.IO обязаны попасть на один сервер. Без привязки балансировщик раскидывает их по round-robin, и сессия разваливается. AsyncRedisManager решает другую задачу - broadcast между серверами - и sticky sessions не заменяет; для масштабирования нужны обе настройки."
    hints:
      - "Разделите два симптома. Ошибка именно рукопожатия указывает не на доставку сообщений между серверами, а на то, как цепочка запросов одной сессии распределяется балансировщиком."
      - "Вспомните, из скольких HTTP-запросов состоит установка соединения Engine.IO и куда они обязаны попасть. Какая настройка это гарантирует, и решает ли её Redis adapter?"
