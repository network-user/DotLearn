exercises:
  - id: sio-not-websocket-001
    concept: socketio
    type: theory-quiz
    difficulty: 1
    prompt: "Почему браузерный `new WebSocket(\"wss://.../socket.io/\")` не подключится к Socket.IO-серверу?"
    choices:
      - id: a
        text: "Socket.IO - отдельный протокол со своим форматом пакетов поверх транспорта; голый WebSocket не говорит на Engine.IO, нужен клиент socket.io-client."
      - id: b
        text: "Socket.IO работает только поверх HTTP long-polling и WebSocket не поддерживает вовсе."
      - id: c
        text: "У Socket.IO другой порт, а голый WebSocket стучится на стандартный 443."
      - id: d
        text: "Браузерный WebSocket не умеет схему wss://, нужен ws://."
    correct: [a]
    explanation: "Socket.IO - это собственный протокол с форматом пакетов поверх WebSocket-фреймов (нижний слой - Engine.IO). Голый `WebSocket` не реализует Engine.IO, поэтому нужен парный клиент `socket.io-client` совместимой с сервером версии."
    variants:
      - prompt: "За что отвечает нижний слой Socket.IO - Engine.IO?"
        choices:
          - id: a
            text: "За транспорт: устанавливает соединение, выбирает между WebSocket и long-polling, держит heartbeat и переподключается."
          - id: b
            text: "За прикладную семантику: именованные события, комнаты и подтверждения доставки."
          - id: c
            text: "За сериализацию полезной нагрузки события в JSON."
          - id: d
            text: "За авторизацию пользователя при подключении."
        correct: [a]
        explanation: "Engine.IO - транспортный слой: выбор транспорта, heartbeat, реконнект. Прикладную семантику (события, комнаты, ack) даёт верхний слой - сам Socket.IO."
      - prompt: "Что заменяет в Socket.IO ручной разбор единственного события `message` из голого WebSocket?"
        choices:
          - id: a
            text: "Именованные события: вы шлёте событие с именем через emit, а на той стороне подписываетесь по имени через on."
          - id: b
            text: "Автоматический REST-роутинг по URL внутри одного соединения."
          - id: c
            text: "GraphQL-подписки поверх WebSocket-фреймов."
          - id: d
            text: "Бинарный протокол, в котором тип события кодируется первым байтом, и его задаёт сам браузер."
        correct: [a]
        explanation: "Socket.IO переворачивает модель: вместо одного `message` и ручного разбора вы шлёте именованное событие через `emit` и подписываетесь по имени через `on`. Имя - ваш контракт, полезная нагрузка сериализуется автоматически."

  - id: sio-ack-meaning-001
    concept: socketio
    type: theory-quiz
    difficulty: 2
    prompt: "Что именно гарантирует acknowledgement (callback) в Socket.IO?"
    choices:
      - id: a
        text: "Что обработчик на той стороне получил событие и вернул значение (Socket.IO доставит его в callback отправителя) - сигнал «получил и обработал», а не распределённая транзакция."
      - id: b
        text: "Что событие изменило базу данных и доехало до всех связанных систем."
      - id: c
        text: "Что сообщение доставлено ровно один раз без возможности дубликата."
      - id: d
        text: "Что соединение перешло в состояние OPEN и готово к обмену."
    correct: [a]
    explanation: "Ack означает «обработчик отработал и вернул значение», а не «деньги списаны». Это подобие запрос-ответа поверх постоянного соединения, но не гарантия бизнес-результата. Для семантики «ровно один раз» нужна идемпотентность на прикладном уровне."
    hints:
      - "Обработчик на сервере возвращает значение, которое Socket.IO доставит в callback отправителя. Что это физически подтверждает - факт обработки или конечный эффект в чужой базе?"
    variants:
      - prompt: "Как технически устроен acknowledgement в Socket.IO?"
        choices:
          - id: a
            text: "Браузерный клиент передаёт callback последним аргументом emit; обработчик python-socketio возвращает значение, и Socket.IO доставляет его в этот callback - получается запрос-ответ поверх постоянного соединения."
          - id: b
            text: "Socket.IO сам шлёт отдельный системный пакет ACK при доставке каждого события, без участия кода приложения."
          - id: c
            text: "Отправитель опрашивает сервер HTTP-запросом, дошло ли событие."
          - id: d
            text: "Подтверждение приходит на уровне WebSocket-фрейма pong на каждый emit."
        correct: [a]
        explanation: "Браузерный клиент передаёт callback как последний аргумент `emit`; обработчик python-socketio на сервере не получает callback, а возвращает значение, которое Socket.IO доставляет в этот callback отправителя. Это прикладной механизм Socket.IO, а не системный pong или отдельный HTTP-запрос."
      - prompt: "Что нужно добавить поверх acknowledgement, чтобы получить гарантию «эффект применён ровно один раз»?"
        choices:
          - id: a
            text: "Идемпотентность на прикладном уровне - например, по уникальному id операции, чтобы повтор не менял состояние дважды."
          - id: b
            text: "Ничего: ack сам по себе и есть гарантия «ровно один раз»."
          - id: c
            text: "Переключить транспорт с long-polling на чистый WebSocket."
          - id: d
            text: "Увеличить таймаут heartbeat, чтобы событие не потерялось."
        correct: [a]
        explanation: "Ack подтверждает лишь вызов callback обработчиком, а буфер реконнекта может доставить событие повторно. Гарантию «ровно один раз» даёт идемпотентность на прикладном уровне (например, дедупликация по id операции), а не выбор транспорта или настройки heartbeat."

  - id: sio-rooms-server-only-001
    concept: socketio
    type: theory-quiz
    difficulty: 3
    prompt: "Где существуют комнаты Socket.IO и как в них попадает сообщение группе?"
    choices:
      - id: a
        text: "Комната - именованное множество соединений на сервере; sio.enter_room(sid, room) добавляет в неё, sio.emit(room=room) доставляет всем участникам. Клиент о комнатах не знает."
      - id: b
        text: "Комната хранится на клиенте, который сам решает, какие сообщения принимать."
      - id: c
        text: "Комната - это отдельное TCP-соединение для каждой группы пользователей."
      - id: d
        text: "Комната - алиас одного sid; в одной комнате может быть только одно соединение."
    correct: [a]
    explanation: "Комнаты живут только на сервере: `sio.enter_room(sid, room)` добавляет соединение, `sio.emit(room=room)` рассылает событие всем её участникам. Клиент о комнатах ничего не знает, и один sid может состоять сразу во многих комнатах."
    hints:
      - "Спросите, на какой стороне ведётся список «кто в этой группе». Видит ли клиент этот список в своём коде?"
      - "Раз клиент о комнатах не знает, кто принимает решение о доставке события группе - и где для этого должен храниться состав группы?"

  - id: sio-reconnect-socketid-001
    concept: socketio
    type: theory-quiz
    difficulty: 3
    prompt: "Что происходит с членством в комнатах после автоматического переподключения клиента?"
    choices:
      - id: a
        text: "Клиент получает новый sid, и прежнее членство в комнатах не восстанавливается само - его нужно вернуть в обработчике connect на сервере."
      - id: b
        text: "sid сохраняется, и все комнаты автоматически восстанавливаются, как будто обрыва не было."
      - id: c
        text: "Все комнаты на сервере удаляются для всех клиентов, и группы приходится создавать заново."
      - id: d
        text: "Клиент сам хранит список комнат и при реконнекте отправляет его серверу автоматически."
    correct: [a]
    explanation: "Переподключившийся клиент получает новый `sid`, а старое членство в комнатах было привязано к прежнему соединению и не наследуется. Логику «после реконнекта снова войти в нужные комнаты» сервер выполняет в обработчике `connect` через `sio.enter_room`."
    hints:
      - "Комната привязана к конкретному соединению на сервере. Что происходит с этой привязкой, когда старое соединение умерло, а на его месте появилось новое?"
      - "После реконнекта идентификатор соединения меняется. Если комнаты были привязаны к старому id, кто и где должен восстановить членство?"

  - id: sio-emit-buffer-predict-001
    concept: socketio
    type: predict-output
    difficulty: 4
    prompt: "Модель буфера emit при обрыве: пока соединения нет, события копятся, а после реконнекта улетают разом. Если каждое событие инкрементирует счётчик, к чему приведёт повторная доставка? Что выведет программа?"
    snippet: |
      counter = 0
      buffer = []

      def emit_increment(connected):
          global counter
          if connected:
              counter += 1
          else:
              buffer.append("increment")

      emit_increment(True)
      emit_increment(False)
      emit_increment(False)

      for _ in buffer:
          counter += 1

      print(counter)
    expected:
      kind: stdout
      value: "3"
    hints:
      - "Считайте отдельно: сколько инкрементов прошло сразу при живом соединении и сколько легло в буфер на время обрыва. После реконнекта буфер тоже применяется."
      - "Первый emit прошёл онлайн, два следующих ушли в буфер при `connected=False`. Цикл по буферу применяет накопленное. Сложите оба вклада в `counter`."
    variants:
      - snippet: |
          counter = 0
          buffer = []

          def emit_increment(connected):
              global counter
              if connected:
                  counter += 1
              else:
                  buffer.append("increment")

          emit_increment(True)
          emit_increment(True)
          emit_increment(False)
          emit_increment(False)
          emit_increment(False)

          for _ in buffer:
              counter += 1

          print(counter)
        expected:
          kind: stdout
          value: "5"
      - snippet: |
          counter = 0
          buffer = []

          def emit_increment(connected):
              global counter
              if connected:
                  counter += 1
              else:
                  buffer.append("increment")

          for connected in [False, False, False, False]:
              emit_increment(connected)

          print(counter, len(buffer))
        expected:
          kind: stdout
          value: "0 4"

  - id: sio-emit-on-blanks-001
    concept: socketio
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски про серверный API python-socketio."
    template: |
      С сервера событие отправляют вызовом await sio.{{send}}("chat:message", payload),
      а обработчик входящего события вешают декоратором @sio.{{subscribe}}("chat:message").
      Чтобы добавить соединение в комнату, вызывают await sio.{{enter}}(sid, "room:general").
    blanks:
      send:
        accept: ["emit"]
      subscribe:
        accept: ["on"]
      enter:
        accept: ["enter_room"]
    hints:
      - "Две понятные операции Socket.IO названы в самом начале раздела; серверный метод вступления в комнату - в разделе про комнаты (это метод самого sio, принимающий sid, а не socket.join)."
    variants:
      - prompt: "Заполните пропуски про слои и запуск сервера python-socketio."
        template: |
          Нижний слой {{engine}} отвечает за транспорт и выбирает между WebSocket
          и {{fallback}}, когда апгрейд режут proxy. Сам сервер оборачивают в ASGI:
          app = socketio.{{asgi}}(sio), а затем отдают app в uvicorn.
        blanks:
          engine:
            accept: ["Engine.IO", "engine.io", "EngineIO"]
          fallback:
            accept: ["long-polling", "long polling", "longpolling", "HTTP long-polling"]
          asgi:
            accept: ["ASGIApp"]
      - prompt: "Заполните пропуски про адресацию событий на сервере python-socketio."
        template: |
          Чтобы доставить событие всем участникам комнаты, на сервере вызывают
          await sio.emit("msg", data, {{roomarg}}="room:general").
          Чтобы обратиться к одному клиенту, его {{sid}} используют как имя комнаты.
        blanks:
          roomarg:
            accept: ["room", "to"]
            accept_regex: '^(room|to)$'
          sid:
            accept: ["sid"]
