exercises:
  - id: ws-upgrade-status-001
    concept: http-to-websocket
    type: theory-quiz
    difficulty: 1
    prompt: "Which HTTP status does the server return to confirm upgrading to WebSocket?"
    choices:
      - id: a
        text: "200 OK - request handled, connection continues as usual"
      - id: b
        text: "101 Switching Protocols - the same TCP connection switches to the WebSocket protocol."
      - id: c
        text: "301 Moved Permanently - the client moves to a ws:// address; with the sides roles reversed relative to the RFC"
      - id: d
        text: "426 Upgrade Required - the client must reconnect on a new port; mixing transport and application protocol"
    correct: [b]
    explanation: "The server responds with `101 Switching Protocols`, and from that moment the same TCP connection stops speaking HTTP and switches to WebSocket. No new port or reconnect is needed."
    variants:
      - prompt: "Which request header tells the server the client intends to switch to WebSocket?"
        choices:
          - id: a
            text: "`Upgrade: websocket` together with `Connection: Upgrade`."
          - id: b
            text: "`Content-Type: application/websocket`"
          - id: c
            text: "`Accept: text/websocket`; mixing transport and application protocol"
          - id: d
            text: "`X-Protocol: ws` - a non-standard switch header."
        correct: [a]
        explanation: "The pair `Upgrade: websocket` and `Connection: Upgrade` tells the server what the client wants. The other headers don't participate in the handshake."
      - prompt: "What does the `wss://` scheme correspond to?"
        choices:
          - id: a
            text: "WebSocket over TLS - the analog of `https://`."
          - id: b
            text: "WebSocket without encryption - the analog of `http://`."
          - id: c
            text: "WebSocket over UDP instead of TCP."
          - id: d
            text: "A legacy scheme replacing `ws://` for backward compatibility."
        correct: [a]
        explanation: "`wss://` is WebSocket over TLS, the analog of `https://`. Without TLS you use `ws://`, which corresponds to `http://`."

  - id: ws-handshake-key-001
    concept: http-to-websocket
    type: theory-quiz
    difficulty: 2
    prompt: "What are the `Sec-WebSocket-Key` (request) and `Sec-WebSocket-Accept` (response) headers for?"
    choices:
      - id: a
        text: "They encrypt frame payloads, providing confidentiality instead of TLS."
      - id: b
        text: "They confirm a real WebSocket server answered."
      - id: c
        text: "They store the user's authorization token for protected channels."
      - id: d
        text: "They compress handshake headers to reduce overhead."
    correct: [b]
    explanation: "The server appends the fixed magic string to `Sec-WebSocket-Key`, computes SHA-1, base64-encodes it, and puts it in `Sec-WebSocket-Accept`. The client recomputes the same value and compares - filtering out proxies and caches that don't implement the protocol. TLS provides confidentiality, not these headers."
    hints:
      - "Think about what problem a computable server response solves: what does it protect against if a caching proxy sits in the path?"
      - "`Sec-WebSocket-Accept` is deterministically derived from `Sec-WebSocket-Key`. What does that prove to the client about whoever sent the response?"
    variants:
      - prompt: "What is the role of the fixed magic string `258EAFA5-E914-47DA-95CA-C5AB0DC85B11` in the handshake?"
        choices:
          - id: a
            text: "The server appends it to `Sec-WebSocket-Key` before SHA-1 so the response is deterministically computable and verifiable."
          - id: b
            text: "It's the server's secret key that the client must not know - with the sides roles reversed relative to the RFC"
          - id: c
            text: "It's a protocol version identifier unique to each connection"
          - id: d
            text: "It's salt for encrypting frame payloads - as if that replaced a separate TLS layer"
        correct: [a]
        explanation: "The magic string is baked into RFC 6455 and is the same everywhere. Its only role is to make `Sec-WebSocket-Accept` computable from `Sec-WebSocket-Key`, filtering out systems that don't implement the protocol. There's no secret or encryption in it."
      - prompt: "How many random bytes does the client encode in `Sec-WebSocket-Key`, and in what form?"
        choices:
          - id: a
            text: "16 random bytes encoded in base64, new for every connection."
          - id: b
            text: "20 bytes - a SHA-1 hash of the connection URL."
          - id: c
            text: "4 bytes - the same key the client uses to mask frames."
          - id: d
            text: "Nothing random: it's a fixed string from the standard."
        correct: [a]
        explanation: "`Sec-WebSocket-Key` is 16 random bytes in base64, generated fresh for each connection. The server applies SHA-1 when computing `Sec-WebSocket-Accept`; the 4-byte mask key is separate and unrelated to the handshake."

  - id: ws-frame-opcode-001
    concept: http-to-websocket
    type: predict-output
    difficulty: 3
    prompt: "A program maps frame opcodes to types using the RFC 6455 table. What does it print?"
    snippet: |
      opcodes = {0x1: "text", 0x2: "binary", 0x8: "close", 0x9: "ping", 0xA: "pong"}
      frames = [0x1, 0x9, 0x8, 0x2]
      print([opcodes[code] for code in frames])
    expected:
      kind: stdout
      value: "['text', 'ping', 'close', 'binary']"
    hints:
      - "Each opcode in the table maps to exactly one frame type. Walk the `frames` list left to right."
      - "`0x1` is text, `0x2` binary, `0x8` close, `0x9` ping, `0xA` pong. Printing a list of strings puts elements in quotes separated by comma and space."
    variants:
      - snippet: |
          opcodes = {0x1: "text", 0x2: "binary", 0x8: "close", 0x9: "ping", 0xA: "pong"}
          frames = [0xA, 0x1, 0x2]
          print([opcodes[code] for code in frames])
        expected:
          kind: stdout
          value: "['pong', 'text', 'binary']"
      - snippet: |
          opcodes = {0x1: "text", 0x2: "binary", 0x8: "close", 0x9: "ping", 0xA: "pong"}
          control = [code for code in [0x1, 0x8, 0x9, 0x2, 0xA] if opcodes[code] in ("close", "ping", "pong")]
          print([opcodes[c] for c in control])
        expected:
          kind: stdout
          value: "['close', 'ping', 'pong']"

  - id: ws-masking-direction-001
    concept: http-to-websocket
    type: theory-quiz
    difficulty: 3
    prompt: "Who must mask frames per RFC 6455, and why?"
    choices:
      - id: a
        text: "The client must mask every frame, the server must not."
      - id: b
        text: "The server must mask every frame, the client must not; that way the browser is protected from foreign JavaScript."
      - id: c
        text: "Both sides must mask; that is WebSocket channel encryption."
      - id: d
        text: "Masking is optional for both sides and only helps compress data."
    correct: [a]
    explanation: "Per RFC 6455 every client-to-server frame must be masked with a random 4-byte XOR key; the server sends back unmasked. The mask makes bytes on the wire unpredictable so an attacker via the browser can't poison an outdated proxy's cache. It's not encryption - the key is in the same frame."
    hints:
      - "Masking protects infrastructure on the path, not message content. Whose data could harm a proxy if crafted maliciously - what the browser sends, or what the server sends?"
      - "The mask key is sent in the same frame, so any observer removes XOR instantly. So it doesn't solve confidentiality - what problem does it solve instead?"

  - id: ws-frame-fin-blanks-001
    concept: http-to-websocket
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the blanks about frame structure and the handshake."
    template: |
      After the upgrade, the sides exchange {{unit}} - compact binary packets.
      The {{field}} field distinguishes frame kinds: 0x1 is text, 0x8 is close.
      To split a large message into parts, all fragments except the last have
      the {{flag}} bit set to 0.
    blanks:
      unit:
        accept: ["frames", "frame", "Frames", "Frame"]
      field:
        accept: ["opcode", "Opcode"]
        accept_regex: '^[Oo]pcode$'
      flag:
        accept: ["FIN", "fin", "Fin"]
    hints:
      - "The smallest data unit after upgrade is named in the frames section; the flag marking the last fragment is in the same section."
    variants:
      - prompt: "Fill in the blanks about the handshake and URL schemes."
        template: |
          The server computes {{accept}} from the client key by appending
          the magic string and computing SHA-1. The {{secure}} scheme means
          WebSocket over TLS - the analog of https://.
        blanks:
          accept:
            accept: ["Sec-WebSocket-Accept", "sec-websocket-accept"]
          secure:
            accept: ["wss://", "wss"]
