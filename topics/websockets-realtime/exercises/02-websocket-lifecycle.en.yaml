exercises:
  - id: ws-readystate-values-001
    concept: websocket-lifecycle
    type: theory-quiz
    difficulty: 1
    prompt: "How many values does `readyState` take, and how do transitions work?"
    choices:
      - id: a
        text: "Four: CONNECTING, OPEN, CLOSING, CLOSED; transitions go forward only - there's no path from CLOSED back to OPEN."
      - id: b
        text: "Two: OPEN and CLOSED; they alternate freely in either direction."
      - id: c
        text: "Four, but you can return from any state to any other."
      - id: d
        text: "Three: OPEN, CLOSING, CLOSED; there is no CONNECTING stage."
    correct: [a]
    explanation: "`readyState` takes exactly four values - CONNECTING(0), OPEN(1), CLOSING(2), CLOSED(3) - and transitions are one-way. To get an open connection again after CLOSED, create a new `WebSocket` object."
    variants:
      - prompt: "What state is the connection in right after `new WebSocket(url)` while the handshake runs?"
        choices:
          - id: a
            text: "CONNECTING - the handshake isn't finished, the connection isn't ready."
          - id: b
            text: "OPEN - the constructor opens the channel synchronously before returning."
          - id: c
            text: "CLOSED - the channel opens only after the first `send`."
          - id: d
            text: "CLOSING - the browser immediately prepares to close."
        correct: [a]
        explanation: "The constructor starts the handshake, but it's asynchronous: until ready, `readyState` is CONNECTING. The `open` event signals readiness."
      - prompt: "What numeric `readyState` value corresponds to OPEN?"
        choices:
          - id: a
            text: "1 - channel established, you can send and receive."
          - id: b
            text: "0 - first and therefore main state."
          - id: c
            text: "2 - data exchange in progress."
          - id: d
            text: "3 - connection open and ready to close."
        correct: [a]
        explanation: "CONNECTING=0, OPEN=1, CLOSING=2, CLOSED=3. Compare `socket.readyState === WebSocket.OPEN` (i.e. 1) before every send."

  - id: ws-send-too-early-001
    concept: websocket-lifecycle
    type: theory-quiz
    difficulty: 2
    prompt: "Why does `socket.send(...)` on the line right after `new WebSocket(url)` usually throw?"
    choices:
      - id: a
        text: "The constructor starts the handshake asynchronously; the connection is still CONNECTING, and `send` throws InvalidStateError."
      - id: b
        text: "The browser forbids sending until the first incoming message."
      - id: c
        text: "The URL isn't resolved to an IP yet, so `send` waits for DNS."
      - id: d
        text: "`send` can't be called twice in a row because the constructor already sent a control frame."
    correct: [a]
    explanation: "When the constructor returns, the connection is almost certainly still CONNECTING - the handshake isn't done. Sending in that state throws `InvalidStateError`. Send safely from the `open` handler or after checking `readyState === WebSocket.OPEN`."
    hints:
      - "The constructor doesn't wait for the handshake to finish. What state is the connection in on the next line of code?"
    variants:
      - prompt: "Where is the safest place for the first `socket.send(...)` so it won't throw?"
        choices:
          - id: a
            text: "Inside the `open` event handler - there `readyState === OPEN` is guaranteed."
          - id: b
            text: "On the line right after `new WebSocket(url)` - the constructor already opened everything."
          - id: c
            text: "Inside the `close` handler - after that the connection is definitely ready."
          - id: d
            text: "In the `error` handler - it fires when the channel is established."
        correct: [a]
        explanation: "`open` means a finished handshake and `readyState === OPEN`, so sending from its handler is safe. Right after the constructor you're still in CONNECTING; `close` and `error` signal shutdown or failure, not readiness."
      - prompt: "Which exception does the browser throw on `send` in CONNECTING state?"
        choices:
          - id: a
            text: "InvalidStateError - the connection isn't OPEN yet."
          - id: b
            text: "TypeError - the `send` argument has the wrong type."
          - id: c
            text: "NetworkError - the server is unreachable."
          - id: d
            text: "Nothing: `send` silently buffers until the channel opens."
        correct: [a]
        explanation: "Sending before OPEN throws `InvalidStateError`. The browser doesn't buffer for you - track state with `readyState` or the `open` handler."

  - id: ws-error-vs-close-001
    concept: websocket-lifecycle
    type: theory-quiz
    difficulty: 3
    prompt: "Why build WebSocket failure diagnostics around `close`, not `error`?"
    choices:
      - id: a
        text: "The error object in the `error` event is intentionally empty for security; the real reason is `close.code`, which follows."
      - id: b
        text: "The `error` event doesn't exist in the browser WebSocket API."
      - id: c
        text: "`error` only fires for JavaScript syntax errors, not network failures."
      - id: d
        text: "`close` contains the JavaScript call stack and `error` doesn't."
    correct: [a]
    explanation: "The spec deliberately hides details in `error` so a page can't scan foreign networks by probing URLs. After `error`, `close` always follows, and `close.code` carries the real reason (e.g. 1006 - abnormal drop)."
    hints:
      - "Ask why the browser might hide connection error details on purpose. What could an attacker learn if `error` were verbose?"
      - "After `error`, another event always arrives. It has a numeric field that `error` lacks."

  - id: ws-close-codes-001
    concept: websocket-lifecycle
    type: predict-output
    difficulty: 3
    prompt: "A program classifies close codes using the table from the section. What does it print?"
    snippet: |
      meaning = {1000: "ok", 1001: "going-away", 1006: "abnormal", 1011: "server-error"}
      codes = [1006, 1000, 1011]
      print([meaning[c] for c in codes])
    expected:
      kind: stdout
      value: "['abnormal', 'ok', 'server-error']"
    hints:
      - "Each code in the table maps to one label. Walk the `codes` list in order."
      - "1000 is normal, 1006 abnormal drop, 1011 server error. Printing a list of strings uses single quotes with comma and space."
    variants:
      - snippet: |
          meaning = {1000: "ok", 1001: "going-away", 1006: "abnormal", 1011: "server-error"}
          codes = [1001, 1000]
          print([meaning[c] for c in codes])
        expected:
          kind: stdout
          value: "['going-away', 'ok']"
      - snippet: |
          meaning = {1000: "ok", 1001: "going-away", 1006: "abnormal", 1011: "server-error"}
          should_reconnect = [c for c in [1000, 1006, 1011, 1001] if meaning[c] in ("abnormal", "server-error")]
          print(should_reconnect)
        expected:
          kind: stdout
          value: "[1006, 1011]"

  - id: ws-wasclean-blanks-001
    concept: websocket-lifecycle
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the blanks about closing a connection and diagnosing it."
    template: |
      Either side can close with {{method}}().
      The close event has a {{flag}} flag: true means a clean goodbye via
      close-frame exchange, false means a drop. The real close reason is
      {{causefield}}, because the error event is intentionally empty.
    blanks:
      method:
        accept: ["close", "socket.close", ".close"]
      flag:
        accept: ["wasClean", "event.wasClean", "wasclean"]
      causefield:
        accept: ["code", "close.code", "event.code", "close.code (event.code)"]
    hints:
      - "The close method and clean flag are in the closing section; the reason field is in the error event section."
    variants:
      - prompt: "Fill in the blanks about states and safe sending."
        template: |
          Before sending in a long-lived app, compare
          socket.{{state}} === WebSocket.{{openconst}}. Sending before that state,
          right after the constructor, throws {{error}}.
        blanks:
          state:
            accept: ["readyState", "readystate"]
          openconst:
            accept: ["OPEN", "open"]
          error:
            accept: ["InvalidStateError", "invalidstateerror"]

  - id: ws-lifecycle-order-001
    concept: websocket-lifecycle
    type: predict-output
    difficulty: 4
    prompt: "Event order model: in normal operation you get open, message, then close. A program prints events in the order the lifecycle allows. What does it print?"
    snippet: |
      allowed_order = ["open", "message", "close"]
      log = []
      log.append("open")
      log.append("message")
      log.append("message")
      log.append("close")
      ordered = [e for e in allowed_order if e in log]
      print(ordered)
      print(log.count("message"))
    expected:
      kind: stdout
      value: "['open', 'message', 'close']\n2"
    hints:
      - "First filter `allowed_order`: keep only events that appear in `log`, in `allowed_order` sequence. Then count how many times `message` appears."
      - "`ordered` keeps order from `allowed_order`, not `log`, with no duplicates. The second line is `log.count(\"message\")`. Each `print` is its own output line."
