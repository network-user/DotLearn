exercises:
  - id: ws-upgrade-status-001
    concept: http-to-websocket
    type: theory-quiz
    difficulty: 1
    prompt: "Каким HTTP-статусом сервер подтверждает согласие на апгрейд до WebSocket?"
    choices:
      - id: a
        text: "200 OK - запрос обработан, соединение продолжается как обычно."
      - id: b
        text: "101 Switching Protocols - то же TCP-соединение переключается на протокол WebSocket."
      - id: c
        text: "301 Moved Permanently - клиент переходит на адрес ws://."
      - id: d
        text: "426 Upgrade Required - клиент обязан переустановить соединение на новом порту."
    correct: [b]
    explanation: "Сервер отвечает `101 Switching Protocols`, и с этого момента то же самое TCP-соединение перестаёт говорить на HTTP и переходит на WebSocket. Новый порт и переустановка соединения не нужны."
    variants:
      - prompt: "Какой заголовок в запросе клиента сообщает серверу о намерении перейти на WebSocket?"
        choices:
          - id: a
            text: "`Upgrade: websocket` вместе с `Connection: Upgrade`."
          - id: b
            text: "`Content-Type: application/websocket`."
          - id: c
            text: "`Accept: text/websocket`."
          - id: d
            text: "`X-Protocol: ws` - нестандартный заголовок переключения."
        correct: [a]
        explanation: "Пара `Upgrade: websocket` и `Connection: Upgrade` сообщает серверу, чего хочет клиент. Остальные заголовки в рукопожатии не участвуют."
      - prompt: "Чему соответствует схема `wss://`?"
        choices:
          - id: a
            text: "WebSocket поверх TLS - аналог `https://`."
          - id: b
            text: "WebSocket без шифрования - аналог `http://`."
          - id: c
            text: "WebSocket поверх UDP вместо TCP."
          - id: d
            text: "Устаревшая схема, замена `ws://` для обратной совместимости."
        correct: [a]
        explanation: "`wss://` - это WebSocket поверх TLS, аналог `https://`. Без TLS используется `ws://`, который соответствует `http://`."

  - id: ws-handshake-key-001
    concept: http-to-websocket
    type: theory-quiz
    difficulty: 2
    prompt: "Зачем нужны заголовки `Sec-WebSocket-Key` (в запросе) и `Sec-WebSocket-Accept` (в ответе)?"
    choices:
      - id: a
        text: "Они шифруют полезную нагрузку фреймов, обеспечивая конфиденциальность вместо TLS."
      - id: b
        text: "Они подтверждают, что отвечает настоящий WebSocket-сервер."
      - id: c
        text: "Они хранят токен авторизации пользователя для входа в защищённые каналы."
      - id: d
        text: "Они сжимают заголовки рукопожатия, уменьшая накладные расходы."
    correct: [b]
    explanation: "Сервер приклеивает к `Sec-WebSocket-Key` фиксированную магическую строку, считает SHA-1, кодирует в base64 и кладёт в `Sec-WebSocket-Accept`. Клиент пересчитывает то же значение и сверяет - так отсекаются proxy и кеши, не реализующие протокол. Конфиденциальность даёт TLS, а не эти заголовки."
    hints:
      - "Подумайте, какую проблему решает вычислимый ответ сервера: от чего он защищает, если по дороге стоит кеширующий proxy?"
      - "`Sec-WebSocket-Accept` детерминированно выводится из `Sec-WebSocket-Key`. Что это доказывает клиенту про того, кто прислал ответ?"
    variants:
      - prompt: "Какова роль фиксированной магической строки `258EAFA5-E914-47DA-95CA-C5AB0DC85B11` в рукопожатии?"
        choices:
          - id: a
            text: "Сервер приклеивает её к `Sec-WebSocket-Key` перед SHA-1."
          - id: b
            text: "Это секретный ключ сервера, который клиент не должен знать."
          - id: c
            text: "Это идентификатор версии протокола, уникальный для каждого соединения."
          - id: d
            text: "Это соль для шифрования полезной нагрузки фреймов."
        correct: [a]
        explanation: "Магическая строка зашита в RFC 6455 и одинакова для всех. Её единственная роль - сделать `Sec-WebSocket-Accept` вычислимым из `Sec-WebSocket-Key`, отсекая системы, которые не реализуют протокол. Секрета и шифрования в ней нет."
      - prompt: "Сколько байт случайных данных кодирует клиент в `Sec-WebSocket-Key` и в каком виде их передаёт?"
        choices:
          - id: a
            text: "16 случайных байт, закодированных в base64, новые на каждое соединение."
          - id: b
            text: "20 байт SHA-1-хеша от URL соединения."
          - id: c
            text: "4 байта - тот же ключ, которым клиент маскирует фреймы."
          - id: d
            text: "Ничего случайного: это фиксированная строка из стандарта."
        correct: [a]
        explanation: "`Sec-WebSocket-Key` - это 16 случайных байт в base64, генерируемых заново на каждое соединение. SHA-1 применяет сервер при вычислении `Sec-WebSocket-Accept`, а 4-байтовый ключ маски - отдельная и не связанная с рукопожатием величина."

  - id: ws-frame-opcode-001
    concept: http-to-websocket
    type: predict-output
    difficulty: 3
    prompt: "Программа сопоставляет opcode фрейма с его типом по таблице из RFC 6455. Что она выведет?"
    snippet: |
      opcodes = {0x1: "text", 0x2: "binary", 0x8: "close", 0x9: "ping", 0xA: "pong"}
      frames = [0x1, 0x9, 0x8, 0x2]
      print([opcodes[code] for code in frames])
    expected:
      kind: stdout
      value: "['text', 'ping', 'close', 'binary']"
    hints:
      - "Каждый opcode из таблицы соответствует ровно одному типу фрейма. Идите по списку `frames` слева направо."
      - "`0x1` - текст, `0x2` - бинарные, `0x8` - закрытие, `0x9` - ping, `0xA` - pong. Печать списка строк ставит элементы в кавычках через запятую с пробелом."
    variants:
      - snippet: |
          opcodes = {0x1: "text", 0x2: "binary", 0x8: "close", 0x9: "ping", 0xA: "pong"}
          frames = [0xA, 0x1, 0x2]
          print([opcodes[code] for code in frames])
        expected:
          kind: stdout
          value: "['pong', 'text', 'binary']"
      - snippet: |
          opcodes = {0x1: "text", 0x2: "binary", 0x8: "close", 0x9: "ping", 0xA: "pong"}
          control = [code for code in [0x1, 0x8, 0x9, 0x2, 0xA] if opcodes[code] in ("close", "ping", "pong")]
          print([opcodes[c] for c in control])
        expected:
          kind: stdout
          value: "['close', 'ping', 'pong']"

  - id: ws-masking-direction-001
    concept: http-to-websocket
    type: theory-quiz
    difficulty: 3
    prompt: "Кто обязан маскировать фреймы по RFC 6455 и зачем?"
    choices:
      - id: a
        text: "Клиент обязан маскировать каждый фрейм, сервер - нет; маска защищает промежуточные proxy от отравления кеша."
      - id: b
        text: "Сервер обязан маскировать каждый фрейм, клиент - нет; так браузер защищён от чужого JavaScript."
      - id: c
        text: "Обе стороны обязаны маскировать; это и есть шифрование канала WebSocket."
      - id: d
        text: "Маскирование необязательно для обеих сторон и нужно лишь для сжатия данных."
    correct: [a]
    explanation: "По RFC 6455 каждый фрейм от клиента к серверу обязан быть замаскирован случайным 4-байтовым ключом через XOR; сервер в обратную сторону шлёт данные без маски. Маска делает байты на проводе непредсказуемыми и не даёт атакующему через браузер отравить кеш устаревшего proxy. Это не шифрование - ключ передаётся в том же фрейме."
    hints:
      - "Маскирование защищает не содержимое сообщения, а инфраструктуру на пути. Под чьим контролем находятся данные, которые могут навредить proxy - те, что шлёт браузер, или те, что шлёт сервер?"
      - "Ключ маски передаётся прямо в фрейме, поэтому снять XOR может любой наблюдатель. Значит, это решает не задачу конфиденциальности, а какую-то другую."

  - id: ws-frame-fin-blanks-001
    concept: http-to-websocket
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски про структуру фрейма и рукопожатие."
    template: |
      После апгрейда стороны обмениваются {{unit}} - компактными бинарными кадрами.
      Поле {{field}} различает виды фреймов: 0x1 - текст, 0x8 - закрытие.
      Чтобы разбить большое сообщение на части, у всех фрагментов, кроме последнего,
      бит {{flag}} равен 0.
    blanks:
      unit:
        accept: ["фреймами", "фрейм", "фреймы", "frames", "frame"]
      field:
        accept: ["opcode", "опкод", "Opcode"]
        accept_regex: '^[Oo]pcode$'
      flag:
        accept: ["FIN", "fin", "Fin"]
    hints:
      - "Минимальная единица данных после апгрейда упоминается в разделе про фреймы; флаг, отмечающий последний фрагмент, - в том же разделе."
    variants:
      - prompt: "Заполните пропуски про рукопожатие и схемы URL."
        template: |
          Сервер вычисляет {{accept}} из присланного клиентом ключа, приклеивая
          к нему магическую строку и считая SHA-1. Схема {{secure}} означает
          WebSocket поверх TLS - аналог https://.
        blanks:
          accept:
            accept: ["Sec-WebSocket-Accept", "sec-websocket-accept"]
          secure:
            accept: ["wss://", "wss"]
