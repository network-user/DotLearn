exercises:
  - id: ws-readystate-values-001
    concept: websocket-lifecycle
    type: theory-quiz
    difficulty: 1
    prompt: "Сколько значений принимает свойство `readyState` и как идут переходы между ними?"
    choices:
      - id: a
        text: "Четыре: CONNECTING, OPEN, CLOSING, CLOSED; переходы идут только вперёд, обратно из CLOSED в OPEN дороги нет."
      - id: b
        text: "Два: OPEN и CLOSED; они свободно чередуются в любом направлении."
      - id: c
        text: "Четыре, но из любого состояния можно вернуться в любое другое."
      - id: d
        text: "Три: OPEN, CLOSING, CLOSED; стадии CONNECTING не существует."
    correct: [a]
    explanation: "`readyState` принимает ровно четыре значения - CONNECTING(0), OPEN(1), CLOSING(2), CLOSED(3) - и переходы между ними однонаправленны. Чтобы снова получить открытое соединение после CLOSED, нужно создать новый объект `WebSocket`."
    variants:
      - prompt: "В каком состоянии находится соединение сразу после `new WebSocket(url)`, пока идёт рукопожатие?"
        choices:
          - id: a
            text: "CONNECTING - handshake ещё не завершён, соединение не готово."
          - id: b
            text: "OPEN - конструктор открывает канал синхронно к моменту возврата."
          - id: c
            text: "CLOSED - канал откроется только после первого `send`."
          - id: d
            text: "CLOSING - браузер сразу готовит соединение к закрытию."
        correct: [a]
        explanation: "Конструктор запускает handshake, но он асинхронный: пока соединение не готово, `readyState` равен CONNECTING. Готовность сигнализирует событие `open`."
      - prompt: "Какое числовое значение `readyState` соответствует состоянию OPEN?"
        choices:
          - id: a
            text: "1 - канал установлен, можно слать и получать."
          - id: b
            text: "0 - это первое и значит главное состояние."
          - id: c
            text: "2 - идёт обмен данными."
          - id: d
            text: "3 - соединение открыто и готово к закрытию."
        correct: [a]
        explanation: "CONNECTING=0, OPEN=1, CLOSING=2, CLOSED=3. Сравнение `socket.readyState === WebSocket.OPEN` (то есть с 1) делают перед каждой отправкой."

  - id: ws-send-too-early-001
    concept: websocket-lifecycle
    type: theory-quiz
    difficulty: 2
    prompt: "Почему вызов `socket.send(...)` в строке сразу после `new WebSocket(url)` обычно падает?"
    choices:
      - id: a
        text: "Конструктор запускает handshake асинхронно, соединение ещё в CONNECTING, и `send` бросает InvalidStateError."
      - id: b
        text: "Браузер запрещает отправку до первого входящего сообщения."
      - id: c
        text: "URL ещё не разрешён в IP-адрес, поэтому `send` ждёт DNS."
      - id: d
        text: "`send` нельзя вызывать дважды подряд, а конструктор уже отправил служебный фрейм."
    correct: [a]
    explanation: "К моменту возврата из конструктора соединение почти наверняка ещё в CONNECTING - handshake не завершён. Отправка в этом состоянии бросает `InvalidStateError`. Безопасно слать из обработчика `open` или после проверки `readyState === WebSocket.OPEN`."
    hints:
      - "Конструктор не дожидается завершения рукопожатия. В каком состоянии окажется соединение в следующей строке кода?"
    variants:
      - prompt: "Где безопаснее всего вызвать первый `socket.send(...)`, чтобы он гарантированно не упал?"
        choices:
          - id: a
            text: "Внутри обработчика события `open` - там гарантировано `readyState === OPEN`."
          - id: b
            text: "В строке сразу после `new WebSocket(url)` - конструктор уже всё открыл."
          - id: c
            text: "Внутри обработчика `close` - после него соединение точно готово."
          - id: d
            text: "В обработчике `error` - он срабатывает, когда канал установлен."
        correct: [a]
        explanation: "Событие `open` означает завершённый handshake и `readyState === OPEN`, поэтому отправка из его обработчика безопасна. Сразу после конструктора соединение ещё в CONNECTING; `close` и `error` сигнализируют о завершении или сбое, а не о готовности."
      - prompt: "Какое исключение бросает браузер при `send` в состоянии CONNECTING?"
        choices:
          - id: a
            text: "InvalidStateError - соединение ещё не в состоянии OPEN."
          - id: b
            text: "TypeError - аргумент `send` имеет неверный тип."
          - id: c
            text: "NetworkError - сервер недоступен."
          - id: d
            text: "Ничего: `send` молча буферизует данные до открытия канала."
        correct: [a]
        explanation: "Отправка до перехода в OPEN бросает `InvalidStateError`. Браузер не буферизует такие данные сам - за состоянием следит ваш код через `readyState` или обработчик `open`."

  - id: ws-error-vs-close-001
    concept: websocket-lifecycle
    type: theory-quiz
    difficulty: 3
    prompt: "Почему диагностику сбоев WebSocket строят вокруг события `close`, а не `error`?"
    choices:
      - id: a
        text: "Объект ошибки в событии `error` намеренно пустой ради безопасности; реальную причину несёт `close.code`, который приходит следом."
      - id: b
        text: "Событие `error` вообще не существует в браузерном WebSocket API."
      - id: c
        text: "`error` приходит только при синтаксических ошибках в коде, а не при сетевых сбоях."
      - id: d
        text: "`close` содержит стек вызовов JavaScript, а `error` - нет."
    correct: [a]
    explanation: "Спецификация намеренно скрывает детали в `error` - чтобы со страницы нельзя было сканировать чужую сеть по реакции на разные URL. После `error` всегда следует `close`, и именно `close.code` несёт настоящую причину (например, 1006 - аномальный обрыв)."
    hints:
      - "Спросите себя, почему браузер мог бы намеренно прятать детали ошибки соединения. Что злоумышленник мог бы узнать, если бы `error` был подробным?"
      - "После `error` всегда приходит ещё одно событие. У него есть числовое поле, которого нет у `error`."

  - id: ws-close-codes-001
    concept: websocket-lifecycle
    type: predict-output
    difficulty: 3
    prompt: "Программа классифицирует коды закрытия по таблице из раздела. Что она выведет?"
    snippet: |
      meaning = {1000: "ok", 1001: "going-away", 1006: "abnormal", 1011: "server-error"}
      codes = [1006, 1000, 1011]
      print([meaning[c] for c in codes])
    expected:
      kind: stdout
      value: "['abnormal', 'ok', 'server-error']"
    hints:
      - "Каждому коду в таблице соответствует одна метка. Пройдите по списку `codes` по порядку."
      - "1000 - штатно, 1006 - аномальный обрыв, 1011 - ошибка сервера. Печать списка строк ставит элементы в одинарных кавычках через запятую с пробелом."
    variants:
      - snippet: |
          meaning = {1000: "ok", 1001: "going-away", 1006: "abnormal", 1011: "server-error"}
          codes = [1001, 1000]
          print([meaning[c] for c in codes])
        expected:
          kind: stdout
          value: "['going-away', 'ok']"
      - snippet: |
          meaning = {1000: "ok", 1001: "going-away", 1006: "abnormal", 1011: "server-error"}
          should_reconnect = [c for c in [1000, 1006, 1011, 1001] if meaning[c] in ("abnormal", "server-error")]
          print(should_reconnect)
        expected:
          kind: stdout
          value: "[1006, 1011]"

  - id: ws-wasclean-blanks-001
    concept: websocket-lifecycle
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски про закрытие соединения и его диагностику."
    template: |
      Закрыть соединение можно вызовом {{method}}() с любой стороны.
      У события close есть флаг {{flag}}: true означает штатное прощание через
      обмен close-фреймами, false - обрыв. Реальную причину закрытия несёт поле
      {{causefield}}, потому что событие error намеренно пустое.
    blanks:
      method:
        accept: ["close", "socket.close", ".close"]
      flag:
        accept: ["wasClean", "event.wasClean", "wasclean"]
      causefield:
        accept: ["code", "close.code", "event.code", "close.code (event.code)"]
    hints:
      - "Метод закрытия и флаг чистоты разбираются в разделе про закрытие; поле с причиной - в разделе про событие error."

  - id: ws-lifecycle-order-001
    concept: websocket-lifecycle
    type: predict-output
    difficulty: 4
    prompt: "Модель порядка событий: при штатной работе срабатывают open, message, затем close. Программа печатает события в том порядке, в каком их допускает жизненный цикл. Что она выведет?"
    snippet: |
      allowed_order = ["open", "message", "close"]
      log = []
      log.append("open")
      log.append("message")
      log.append("message")
      log.append("close")
      ordered = [e for e in allowed_order if e in log]
      print(ordered)
      print(log.count("message"))
    expected:
      kind: stdout
      value: "['open', 'message', 'close']\n2"
    hints:
      - "Сначала фильтруется список `allowed_order`: остаются только те события, что встретились в `log`, в исходном порядке `allowed_order`. Затем считается, сколько раз пришло `message`."
      - "`ordered` сохраняет порядок из `allowed_order`, а не из `log`, и не содержит дубликатов. Вторая строка - результат `log.count(\"message\")`. Каждый `print` даёт свою строку вывода."
