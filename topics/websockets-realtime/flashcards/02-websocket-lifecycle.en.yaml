conceptId: websocket-lifecycle
cards:
  - id: websocket-lifecycle-01
    front: "What four values does readyState take and what do they mean?"
    back: "CONNECTING(0) - handshake in progress; OPEN(1) - channel ready to send and receive; CLOSING(2) - shutdown started; CLOSED(3) - channel dead."
    tags: [readystate, lifecycle]
  - id: websocket-lifecycle-02
    front: "Can you go from CLOSED back to OPEN?"
    back: "No. Transitions are one-way: CONNECTING forward to OPEN, then through CLOSING to CLOSED. To get an open connection again, create a new WebSocket object."
    tags: [readystate, lifecycle]
  - id: websocket-lifecycle-03
    front: "Why does send right after the constructor throw InvalidStateError?"
    back: "The constructor starts the handshake asynchronously, so on the next line the connection is almost certainly still CONNECTING. Send only in OPEN: from the open handler or after checking readyState."
    tags: [send, errors]
  - id: websocket-lifecycle-04
    front: "How do incoming data arrive and where is the payload?"
    back: "Each incoming data frame fires a message event; payload is in event.data - a string for text frames, Blob or ArrayBuffer for binary (depends on binaryType)."
    tags: [message]
  - id: websocket-lifecycle-05
    front: "Does WebSocket preserve message order and parse meaning?"
    back: "Order is preserved because the protocol runs over TCP. But WebSocket doesn't know meaning: event.data is always raw string or bytes; JSON parsing, routing by type, and schema are your code."
    tags: [message]
  - id: websocket-lifecycle-06
    front: "What does the wasClean flag on the close event mean?"
    back: "wasClean=true - both sides exchanged close frames, a clean shutdown. wasClean=false - the connection dropped (network lost, server crashed). That difference matters for reconnect logic."
    tags: [close, reconnect]
  - id: websocket-lifecycle-07
    front: "Why build failure diagnostics around close, not error?"
    back: "The error event is intentionally empty: no code or message, so a page can't scan foreign networks. The real reason is close.code; use error only as a 'something went wrong' signal."
    tags: [error, close]
  - id: websocket-lifecycle-08
    front: "What do close codes 1000, 1006, and 1011 mean?"
    back: "1000 - normal close; 1006 - abnormal drop without a close frame (browser sets it on silent death); 1011 - server internal error."
    tags: [close, codes]
  - id: websocket-lifecycle-09
    front: "What are ping and pong control frames for?"
    back: "TCP can die quietly while both sides think it's alive. One side sends ping, the other must reply pong; no reply within timeout means dead connection. Browser and server handle them; you can't send ping/pong directly in the browser API."
    tags: [ping-pong, heartbeat]
  - id: websocket-lifecycle-10
    front: "What is bufferedAmount and why check it?"
    back: "If you send faster than the channel allows, data piles in an internal buffer whose size is socket.bufferedAmount. Serious apps check it before large sends and throttle manually for backpressure - the browser won't stop the sender."
    tags: [backpressure, send]
