conceptId: realtime-patterns
cards:
  - id: realtime-patterns-01
    front: "How do sio.emit(...), sio.emit(skip_sid=sid), and sio.emit(room=room) differ?"
    back: "sio.emit(...) sends to everyone connected; sio.emit(..., skip_sid=sid) to everyone except the sender; sio.emit(..., room=room) only to room members. Confusing the arguments causes duplicates and messages leaking between chats."
    tags: [broadcast]
  - id: realtime-patterns-02
    front: "Why exclude the sender when relaying a chat message?"
    back: "The sender's client usually already rendered the message optimistically, so an echo isn't needed. sio.emit(room=room, skip_sid=sid) delivers to everyone in the room except the sender, avoiding duplicate messages."
    tags: [broadcast]
  - id: realtime-patterns-03
    front: "Why is connection-based presence unreliable?"
    back: "After a network drop, disconnect arrives only after a heartbeat timeout, and the user still counts as online until then. With two tabs open, disconnect on one tab doesn't mean the person left."
    tags: [presence]
  - id: realtime-patterns-04
    front: "How do you count presence reliably?"
    back: "Not by \"is there a connection\" but by a connection counter per user: increment when a tab connects, decrement when it disconnects, online while the counter is greater than zero. Store the counter externally with a TTL so a crashed server doesn't leave ghost \"forever online\" users."
    tags: [presence, ttl]
  - id: realtime-patterns-05
    front: "Why does naive sio.emit(room=...) break with multiple servers?"
    back: "sio.emit(room=...) only reaches sockets in its own process and knows nothing about connections on other servers. A room spread across servers is half invisible to each one, so some members never receive the message."
    tags: [scaling, broadcast]
  - id: realtime-patterns-06
    front: "What does the Redis adapter do in a Socket.IO cluster?"
    back: "It acts as a publish/subscribe bus: when one server calls sio.emit(room=...), the AsyncRedisManager publishes the event to Redis, other servers are subscribed and deliver it to their local sockets in that room. Application code stays the same."
    tags: [scaling, redis]
  - id: realtime-patterns-07
    front: "What are sticky sessions and why does Socket.IO need them?"
    back: "Socket.IO starts with long-polling and upgrades to WebSocket - several HTTP requests that must hit the same server. Sticky sessions bind a client to one backend for the whole connection (via cookie or IP hash); otherwise the Engine.IO handshake falls apart."
    tags: [scaling, sticky-sessions]
  - id: realtime-patterns-08
    front: "Does the Redis adapter replace sticky sessions?"
    back: "No - they're independent settings. AsyncRedisManager handles broadcast across cluster servers; sticky sessions ensure all requests in one Engine.IO session reach the same server. Horizontal scaling needs both."
    tags: [scaling, redis, sticky-sessions]
  - id: realtime-patterns-09
    front: "Why does fan-out usually limit scale before connection count does?"
    back: "Fan-out is how many outgoing messages one incoming message creates. In a 10,000-person chat, one message is 10,000 sends; at 1,000 messages per second that's tens of millions outbound, and network and CPU run out before file descriptor limits."
    tags: [scaling, fan-out]
  - id: realtime-patterns-10
    front: "How do you reduce fan-out load?"
    back: "Split audiences into smaller rooms, aggregate events (not every \"typing...\" but once every N seconds), and sometimes deliberately drop non-critical events. Realtime scale is mostly about managing outbound traffic."
    tags: [scaling, fan-out]
  - id: realtime-patterns-11
    front: "How does a client get messages missed during a disconnect?"
    back: "The transport delivers only while the connection is alive, so reliable history is built at the application layer: give each message a monotonically increasing id or timestamp, and after reconnect the client requests everything after the last seen id via a normal HTTP call. The same id enables idempotency against duplicates."
    tags: [history, idempotency]
