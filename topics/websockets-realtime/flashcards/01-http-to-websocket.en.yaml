conceptId: http-to-websocket
cards:
  - id: http-to-websocket-01
    front: "Why is plain HTTP a poor fit for realtime updates?"
    back: "The server only responds to a client request and stays silent otherwise. To get updates the browser must poll constantly, and every request carries a full set of headers while latency is measured in seconds."
    tags: [http, realtime]
  - id: http-to-websocket-02
    front: "What is the WebSocket handshake and how does it start?"
    back: "It's an upgrade of an already-open TCP connection. The client sends a normal HTTP request on port 80/443 with `Upgrade: websocket`, and if the server agrees it responds with `101 Switching Protocols`."
    tags: [handshake, upgrade]
  - id: http-to-websocket-03
    front: "What does the server response `101 Switching Protocols` mean?"
    back: "From that moment the same TCP connection stops speaking HTTP and switches to WebSocket. No data is lost; only the rules for interpreting the stream change."
    tags: [handshake]
  - id: http-to-websocket-04
    front: "What is Sec-WebSocket-Key for and how does the server respond?"
    back: "It's a random 16-byte base64 string, new for each connection. The server appends the magic string, computes SHA-1, base64-encodes it, and returns Sec-WebSocket-Accept. That confirms a real WebSocket server answered, not a cache or proxy."
    tags: [handshake, security]
  - id: http-to-websocket-05
    front: "What does a WebSocket frame header contain?"
    back: "The FIN bit (last fragment or not), opcode (data type), MASK bit (whether masking is on), and length field (payload size). The header is only a few bytes instead of hundreds of HTTP header bytes."
    tags: [frame]
  - id: http-to-websocket-06
    front: "What do the main opcode values encode?"
    back: "0x1 - UTF-8 text, 0x2 - binary data, 0x8 - close, 0x9 - ping, 0xA - pong. Text and binary carry application data; the rest are control frames."
    tags: [frame, opcode]
  - id: http-to-websocket-07
    front: "Why must the client mask every frame but the server doesn't?"
    back: "Masking (XOR with a random 4-byte key) protects infrastructure, not data: without it an attacker via the browser could poison an outdated proxy's cache. Data from server to browser isn't under attacker control, so the server doesn't mask."
    tags: [masking, security]
  - id: http-to-websocket-08
    front: "Does masking provide data confidentiality?"
    back: "No. Masking isn't encryption: XOR with a random but transmitted-in-frame key is removed instantly by any observer. Only wss:// (TLS) provides confidentiality; the mask protects proxies from cache poisoning."
    tags: [masking, security]
  - id: http-to-websocket-09
    front: "How do ws:// and wss:// differ?"
    back: "ws:// corresponds to http:// and travels in plain text; wss:// is WebSocket over TLS, the analog of https://. Use wss:// for private data."
    tags: [security, tls]
  - id: http-to-websocket-10
    front: "Common misconception: WebSocket is 'HTTP that never closes.' Why is that wrong?"
    back: "After 101 it's no longer HTTP: no methods, paths, or status codes per message. There's a stream of frames, and familiar HTTP semantics (caching, REST) don't apply."
    tags: [frame, http]
