conceptId: http-to-websocket
cards:
  - id: http-to-websocket-01
    front: "Почему обычный HTTP плохо подходит для realtime-обновлений?"
    back: "Сервер отвечает только на запрос клиента и молчит в остальное время. Чтобы получать новое, браузеру приходится постоянно опрашивать сервер, и каждый запрос тащит полный набор заголовков, а задержка измеряется секундами."
    tags: [http, realtime]
  - id: http-to-websocket-02
    front: "Что такое WebSocket handshake и как он начинается?"
    back: "Это апгрейд уже открытого TCP-соединения. Клиент шлёт обычный HTTP-запрос на тот же порт 80/443 с заголовком «Upgrade: websocket», а сервер при согласии отвечает «101 Switching Protocols»."
    tags: [handshake, upgrade]
  - id: http-to-websocket-03
    front: "Что означает ответ сервера «101 Switching Protocols»?"
    back: "С этого момента то же самое TCP-соединение перестаёт говорить на HTTP и переходит на протокол WebSocket. Данные не теряются, меняются лишь правила интерпретации потока."
    tags: [handshake]
  - id: http-to-websocket-04
    front: "Зачем нужен заголовок Sec-WebSocket-Key и как сервер на него отвечает?"
    back: "Это случайная 16-байтовая строка в base64, новая на каждое соединение. Сервер приклеивает к ней магическую строку, считает SHA-1, кодирует в base64 и возвращает в Sec-WebSocket-Accept. Это подтверждает, что отвечает настоящий WebSocket-сервер, а не кеш или proxy."
    tags: [handshake, security]
  - id: http-to-websocket-05
    front: "Из чего состоит шапка WebSocket-фрейма?"
    back: "Бит FIN (последний ли это фрагмент), opcode (тип данных), бит MASK (включено ли маскирование) и поле length (размер полезной нагрузки). Шапка занимает всего несколько байт вместо сотен байт HTTP-заголовков."
    tags: [frame]
  - id: http-to-websocket-06
    front: "Что кодируют основные значения opcode?"
    back: "0x1 - текст в UTF-8, 0x2 - бинарные данные, 0x8 - закрытие, 0x9 - ping, 0xA - pong. Текст и бинарные несут данные приложения, остальные - служебные управляющие фреймы."
    tags: [frame, opcode]
  - id: http-to-websocket-07
    front: "Почему клиент обязан маскировать каждый фрейм, а сервер - нет?"
    back: "Маскирование (XOR со случайным 4-байтовым ключом) защищает не данные, а промежуточную инфраструктуру: без него злоумышленник из браузера мог бы отравить кеш устаревшего proxy. Данные от сервера к браузеру атакующий не контролирует, поэтому серверу маскирование не нужно."
    tags: [masking, security]
  - id: http-to-websocket-08
    front: "Даёт ли маскирование конфиденциальность данных?"
    back: "Нет. Маскирование - не шифрование: XOR со случайным, но передаваемым в том же фрейме ключом снимается мгновенно. Конфиденциальность даёт только wss:// (TLS), а маска решает узкую задачу защиты proxy от отравления кеша."
    tags: [masking, security]
  - id: http-to-websocket-09
    front: "Чем отличаются схемы ws:// и wss://?"
    back: "ws:// соответствует http:// и ходит открытым текстом, wss:// - это WebSocket поверх TLS, аналог https://. Для приватных данных нужен именно wss://."
    tags: [security, tls]
  - id: http-to-websocket-10
    front: "Распространённое заблуждение - что WebSocket это «HTTP, который не закрывается». Почему это неверно?"
    back: "После 101 это уже не HTTP: нет ни методов, ни путей, ни статус-кодов на каждое сообщение. Есть поток фреймов, и привычная HTTP-семантика (кеширование, REST) к нему неприменима."
    tags: [frame, http]
