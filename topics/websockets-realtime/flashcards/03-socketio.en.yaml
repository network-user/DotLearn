conceptId: socketio
cards:
  - id: socketio-01
    front: "Is Socket.IO just 'WebSocket with sugar'?"
    back: "No. Socket.IO is its own protocol with emit/on, riding on WebSocket when possible and HTTP long-polling otherwise, switching transparently between them."
    tags: [socketio]
  - id: socketio-02
    front: "What do the Engine.IO and Socket.IO layers handle?"
    back: "Engine.IO (lower) handles transport: connection setup, WebSocket vs long-polling, heartbeat, reconnect. Socket.IO (upper) provides events, rooms, namespaces, and delivery acknowledgements."
    tags: [socketio, engineio]
  - id: socketio-03
    front: "Why can't browser new WebSocket connect to a Socket.IO server?"
    back: "Socket.IO has its own packet format on WebSocket frames, and bare WebSocket doesn't speak Engine.IO. You need socket.io-client with compatible client and server versions."
    tags: [socketio, compatibility]
  - id: socketio-04
    front: "Why are named events emit/on better than bare WebSocket?"
    back: "Instead of one message event and manual parsing, you emit with a name and subscribe by name. Payload serializes automatically (objects, arrays, binary) without manual JSON serialization and parsing."
    tags: [emit, events]
  - id: socketio-05
    front: "What does acknowledgement confirm in Socket.IO?"
    back: "The browser client passes a callback as the last emit argument, and the python-socketio handler returns a value - Socket.IO delivers it into that callback. Ack means 'the handler ran and returned,' not that the event changed the database or reached a third system; not a distributed transaction."
    tags: [acknowledgement]
  - id: socketio-06
    front: "What is a room in Socket.IO and where does it live?"
    back: "A room is a named set of connections on the server. The server adds a connection via sio.enter_room(sid, room); sio.emit(room=room) delivers to all members. Rooms exist only on the server; one sid can be in many rooms."
    tags: [rooms]
  - id: socketio-07
    front: "Why can emit buffering during an outage hurt?"
    back: "While disconnected, emit calls buffer by default and flush after reconnect. If you queued commands like 'increment counter,' they all apply at once and state diverges. Make critical emits idempotent."
    tags: [reconnect, idempotency]
  - id: socketio-08
    front: "What happens to sid and room membership after reconnect?"
    back: "A reconnected client gets a new sid; previous room membership on the server doesn't restore itself - rooms were tied to the old connection. The server must re-join rooms in the connect handler via sio.enter_room."
    tags: [reconnect, rooms]
  - id: socketio-09
    front: "How does Engine.IO fallback transport work?"
    back: "Engine.IO starts with HTTP long-polling and upgrades to WebSocket when the environment allows. Even where Upgrade is blocked, long-polling passes as ordinary HTTP and the app keeps working."
    tags: [engineio, fallback]
  - id: socketio-10
    front: "How does a namespace differ from a room?"
    back: "A namespace splits one physical connection into logical channels by functionality (/chat, /admin), defined in code. A room is a dynamic grouping inside a namespace at runtime. Namespaces share one transport."
    tags: [namespaces, rooms]
