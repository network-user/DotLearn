conceptId: socketio
cards:
  - id: socketio-01
    front: "Является ли Socket.IO просто «WebSocket с сахаром»?"
    back: "Нет. Socket.IO - это собственный протокол с двумя операциями emit/on, который в хорошем случае ездит поверх WebSocket, а в плохом - поверх HTTP long-polling, прозрачно переключаясь между ними."
    tags: [socketio]
  - id: socketio-02
    front: "За что отвечают слои Engine.IO и Socket.IO?"
    back: "Нижний слой Engine.IO отвечает за транспорт: устанавливает соединение, выбирает между WebSocket и long-polling, держит heartbeat, переподключается. Верхний слой Socket.IO даёт прикладную семантику: события, комнаты, namespaces, подтверждения доставки."
    tags: [socketio, engineio]
  - id: socketio-03
    front: "Почему браузерный new WebSocket нельзя подключить к Socket.IO-серверу?"
    back: "У Socket.IO свой формат пакетов поверх WebSocket-фреймов, и голый WebSocket не говорит на протоколе Engine.IO. Нужен именно socket.io-client, причём версии клиента и сервера должны быть совместимы."
    tags: [socketio, compatibility]
  - id: socketio-04
    front: "Чем именованные события emit/on удобнее голого WebSocket?"
    back: "Вместо одного события message с ручным разбором вы шлёте событие с именем, а на той стороне подписываетесь по имени. Полезная нагрузка сериализуется автоматически (объекты, массивы, бинарные данные), без ручных JSON.stringify и JSON.parse."
    tags: [emit, events]
  - id: socketio-05
    front: "Что подтверждает acknowledgement в Socket.IO?"
    back: "Отправитель передаёт callback, получатель его вызывает, и значение возвращается отправителю. Ack означает «обработчик на той стороне вызвал callback», а не что событие изменило базу или дошло до третьей системы - это не распределённая транзакция."
    tags: [acknowledgement]
  - id: socketio-06
    front: "Что такое комната (room) в Socket.IO и где она живёт?"
    back: "Комната - это именованное множество соединений на стороне сервера. Клиент вступает через socket.join, а io.to(room).emit доставляет событие всем участникам. Комнаты живут только на сервере, клиент о них не знает; один сокет может быть сразу в нескольких комнатах."
    tags: [rooms]
  - id: socketio-07
    front: "Почему буферизация emit при обрыве может навредить?"
    back: "Пока соединения нет, emit по умолчанию складываются в буфер и улетают после реконнекта. Если за простой накопились команды вроде «инкрементировать счётчик», после реконнекта они применятся все разом и состояние разъедется. Критичные emit стоит делать идемпотентными."
    tags: [reconnect, idempotency]
  - id: socketio-08
    front: "Что происходит с socket.id и членством в комнатах после переподключения?"
    back: "Переподключившийся клиент получает новый socket.id, и его прежнее членство в комнатах на сервере не восстанавливается само - комнаты были привязаны к старому соединению. Логику «снова войти в нужные комнаты» сервер должен выполнять в обработчике нового connection."
    tags: [reconnect, rooms]
  - id: socketio-09
    front: "Как работает fallback-транспорт Engine.IO?"
    back: "Engine.IO начинает соединение через HTTP long-polling и затем, если среда позволяет, апгрейдит до WebSocket. Даже там, где Upgrade режут proxy или firewall, long-polling проходит как обычный HTTP, и приложение остаётся работоспособным."
    tags: [engineio, fallback]
  - id: socketio-10
    front: "Чем namespace отличается от комнаты?"
    back: "Namespace разделяет одно физическое соединение на логические каналы по типу функциональности (/chat, /admin), задаётся в коде приложения. Комната - динамическая группировка соединений внутри namespace, создаётся и меняется на лету. Транспорт под namespaces один."
    tags: [namespaces, rooms]
