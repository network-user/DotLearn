conceptId: websocket-lifecycle
cards:
  - id: websocket-lifecycle-01
    front: "Какие четыре значения принимает readyState и что они означают?"
    back: "CONNECTING(0) - идёт handshake; OPEN(1) - канал установлен, можно слать и получать; CLOSING(2) - запущено закрытие; CLOSED(3) - канал мёртв."
    tags: [readystate, lifecycle]
  - id: websocket-lifecycle-02
    front: "Можно ли вернуться из состояния CLOSED обратно в OPEN?"
    back: "Нет. Переходы между состояниями однонаправленны: CONNECTING вперёд к OPEN, затем через CLOSING к CLOSED. Чтобы снова получить открытое соединение, нужно создавать новый объект WebSocket."
    tags: [readystate, lifecycle]
  - id: websocket-lifecycle-03
    front: "Почему вызов send сразу после конструктора падает с InvalidStateError?"
    back: "Конструктор запускает handshake асинхронно, поэтому в следующей строке соединение почти наверняка ещё в CONNECTING. Отправлять можно только в состоянии OPEN: из обработчика open либо после проверки readyState."
    tags: [send, errors]
  - id: websocket-lifecycle-04
    front: "Как приходят входящие данные и где лежит полезная нагрузка?"
    back: "Каждый входящий фрейм с данными порождает событие message, а полезная нагрузка лежит в event.data: строка для текстовых фреймов, Blob или ArrayBuffer для бинарных (зависит от binaryType)."
    tags: [message]
  - id: websocket-lifecycle-05
    front: "Сохраняет ли WebSocket порядок сообщений и разбирает ли их смысл?"
    back: "Порядок сохраняется, потому что протокол работает поверх TCP. Но смысл сообщений WebSocket не знает: event.data это всегда сырая строка или байты, а разбор JSON, маршрутизация по типу и схема - ваш код."
    tags: [message]
  - id: websocket-lifecycle-06
    front: "Что означает флаг wasClean в событии close?"
    back: "wasClean=true - обе стороны успели обменяться close-фреймами, это вежливое штатное прощание. wasClean=false - соединение оборвалось (пропала сеть, упал сервер). Разница важна для логики переподключения."
    tags: [close, reconnect]
  - id: websocket-lifecycle-07
    front: "Почему диагностику сбоев строят вокруг close, а не error?"
    back: "Событие error намеренно пустое: объект ошибки не несёт ни кода, ни сообщения - из соображений безопасности, чтобы со страницы нельзя было сканировать чужую сеть. Реальную причину несёт close.code, а error используют лишь как сигнал «что-то пошло не так»."
    tags: [error, close]
  - id: websocket-lifecycle-08
    front: "Что означают коды закрытия 1000, 1006 и 1011?"
    back: "1000 - штатное закрытие; 1006 - аномальный обрыв без close-фрейма (его браузер выставляет сам при молчаливой смерти соединения); 1011 - внутренняя ошибка сервера."
    tags: [close, codes]
  - id: websocket-lifecycle-09
    front: "Зачем нужны управляющие фреймы ping и pong?"
    back: "TCP-соединение может тихо умереть так, что обе стороны не знают. Одна сторона шлёт ping, другая обязана ответить pong; если ответа нет за таймаут, соединение считается мёртвым. В браузерном API ими управляют сам браузер и сервер, напрямую они недоступны."
    tags: [ping-pong, heartbeat]
  - id: websocket-lifecycle-10
    front: "Что такое bufferedAmount и зачем его проверять?"
    back: "Если данные шлют быстрее, чем позволяет канал, они копятся во внутреннем буфере, размер которого виден в socket.bufferedAmount. Серьёзные приложения проверяют его перед отправкой больших объёмов и притормаживают, реализуя обратное давление (backpressure) вручную - браузер сам отправителя не остановит."
    tags: [backpressure, send]
