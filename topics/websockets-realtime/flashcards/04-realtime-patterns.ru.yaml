conceptId: realtime-patterns
cards:
  - id: realtime-patterns-01
    front: "Чем различаются io.emit, socket.broadcast.emit и io.to(room).emit?"
    back: "io.emit шлёт всем подключённым, socket.broadcast.emit - всем кроме самого отправителя, io.to(room).emit - только участникам комнаты. Путаница между ними даёт дубли и утечку сообщений между чатами."
    tags: [broadcast]
  - id: realtime-patterns-02
    front: "Зачем при ретрансляции сообщения чата исключают отправителя?"
    back: "Клиент отправителя обычно уже отрисовал сообщение оптимистично, поэтому эхо ему не нужно. socket.broadcast.to(room) доставляет всем в комнате, кроме отправителя, и это избавляет от дублирующихся сообщений."
    tags: [broadcast]
  - id: realtime-patterns-03
    front: "Почему presence «по факту соединения» врёт?"
    back: "При обрыве сети событие disconnect приходит не сразу, а через таймаут heartbeat, и всё это время пользователь числится онлайн. К тому же при двух вкладках disconnect одной не означает, что человек ушёл."
    tags: [presence]
  - id: realtime-patterns-04
    front: "Как надёжно считать presence?"
    back: "Не по «есть ли соединение», а по счётчику соединений на пользователя: вкладка подключилась - инкремент, отключилась - декремент, онлайн пока счётчик больше нуля. Счётчик держат во внешнем хранилище с TTL, чтобы упавший сервер не оставил «вечно онлайн» призраков."
    tags: [presence, ttl]
  - id: realtime-patterns-05
    front: "Почему наивный io.to(room).emit ломается на нескольких серверах?"
    back: "io.to(room) пробегает только по сокетам своего процесса и ничего не знает про соединения других серверов. Комната, размазанная по нескольким серверам, наполовину невидима каждому из них, и часть участников сообщения не получит."
    tags: [scaling, broadcast]
  - id: realtime-patterns-06
    front: "Что делает Redis adapter в кластере Socket.IO?"
    back: "Он работает как шина publish/subscribe: когда один сервер делает io.to(room).emit, adapter публикует событие в Redis, остальные серверы на него подписаны и доставляют его своим локальным сокетам в этой комнате. Прикладной код при этом не меняется."
    tags: [scaling, redis]
  - id: realtime-patterns-07
    front: "Что такое sticky sessions и зачем они нужны Socket.IO?"
    back: "Socket.IO начинает с long-polling и апгрейдит до WebSocket - это несколько HTTP-запросов, которые обязаны попасть на один сервер. Sticky sessions привязывают клиента к одному backend на всё соединение (по cookie или IP-hash), иначе рукопожатие Engine.IO развалится."
    tags: [scaling, sticky-sessions]
  - id: realtime-patterns-08
    front: "Заменяет ли Redis adapter sticky sessions?"
    back: "Нет, это две независимые настройки. Adapter решает broadcast между серверами кластера, sticky sessions гарантируют, что все запросы одной сессии Engine.IO попадут на один сервер. Для горизонтального масштабирования нужны обе."
    tags: [scaling, redis, sticky-sessions]
  - id: realtime-patterns-09
    front: "Почему предел масштаба обычно задаёт fan-out, а не число соединений?"
    back: "Fan-out - сколько исходящих сообщений порождает одно входящее. В чате на 10 000 человек одно сообщение это 10 000 отправок; при тысяче сообщений в секунду набегают десятки миллионов исходящих, и сеть с CPU кончаются раньше лимита дескрипторов."
    tags: [scaling, fan-out]
  - id: realtime-patterns-10
    front: "Какими приёмами снижают нагрузку от fan-out?"
    back: "Дробят аудиторию на комнаты поменьше, агрегируют события (не каждый «печатает...», а раз в N секунд) и иногда сознательно роняют часть некритичных событий. Масштаб realtime - это в первую очередь управление исходящим трафиком."
    tags: [scaling, fan-out]
  - id: realtime-patterns-11
    front: "Как клиент получает сообщения, пропущенные за время обрыва?"
    back: "Транспорт даёт доставку «пока соединение живо», поэтому надёжную историю строят прикладным слоем: каждому сообщению дают возрастающий id или метку времени, и после реконнекта клиент обычным HTTP-запросом просит всё, что было после последнего виденного id. Тот же id даёт идемпотентность против дублей."
    tags: [history, idempotency]
