exercises:
  - id: dict-lookup-why-001
    concept: dict-and-set-internals
    type: theory-quiz
    difficulty: 1
    prompt: "Почему поиск по ключу в dict почти не зависит от количества элементов?"
    choices:
      - id: a
        text: "Адрес ячейки вычисляется из самого ключа через хеш, поэтому Python попадает в неё напрямую, без перебора."
      - id: b
        text: "Python хранит ключи отсортированными и применяет бинарный поиск."
      - id: c
        text: "Словарь кеширует последний найденный ключ."
      - id: d
        text: "Внутри словарь - это список, и поиск идёт перебором, просто быстрым."
    correct: [a]
    explanation: "dict - хеш-таблица: hash(key) превращается в индекс бакета, и доступ идёт прямо к ячейке. Поэтому время поиска в среднем постоянно и не растёт с размером словаря."
    variants:
      - prompt: "Почему list нельзя использовать как ключ словаря?"
        choices:
          - id: a
            text: "Он изменяемый: после мутации его хеш сменился бы, и таблица потеряла бы ключ. Поэтому list нехешируем."
          - id: b
            text: "Список слишком большой для ячейки."
          - id: c
            text: "Списки запрещены в словарях из соображений стиля."
          - id: d
            text: "Можно, если список не пустой."
        correct: [a]
        explanation: "Ключ должен быть хешируемым и неизменяемым, иначе таблица не нашла бы его после мутации. list изменяем, поэтому нехешируем - нужен tuple."
      - prompt: "Что должно быть истинно для ключа словаря?"
        choices:
          - id: a
            text: "Он хешируемый (обычно - неизменяемый): hash(key) стабилен на всём времени жизни ключа."
          - id: b
            text: "Он обязательно строка."
          - id: c
            text: "Он уникален в пределах программы."
          - id: d
            text: "Его длина не превышает 8 байт."
        correct: [a]
        explanation: "Ключом может быть любой хешируемый объект со стабильным хешем: int, str, tuple из хешируемых, frozenset. Изменяемые объекты со сменным хешем не подходят."

  - id: dict-order-predict-001
    concept: dict-and-set-internals
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Учтите порядок ключей в dict начиная с Python 3.7."
    snippet: |
      d = {}
      d["b"] = 1
      d["a"] = 2
      d["c"] = 3
      print(list(d))
    expected:
      kind: stdout
      value: "['b', 'a', 'c']"
    hints:
      - "С версии 3.7 словарь гарантированно сохраняет порядок, в котором ключи были добавлены, а не сортирует их."
      - "Ключи добавлялись b, a, c - именно в этом порядке list(d) их и перечислит."
    variants:
      - snippet: |
          d = {"x": 1, "y": 2}
          d["x"] = 99
          d["z"] = 3
          print(list(d))
        expected:
          kind: stdout
          value: "['x', 'y', 'z']"
      - snippet: |
          d = {}
          d[3] = "a"
          d[1] = "b"
          d[2] = "c"
          print(list(d.keys()))
        expected:
          kind: stdout
          value: "[3, 1, 2]"

  - id: dict-dup-set-predict-001
    concept: dict-and-set-internals
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Помните: повторное присваивание по существующему ключу обновляет значение, а не добавляет ячейку."
    snippet: |
      d = {"a": 1, "b": 2, "a": 3}
      print(d)
      print(len({1, 2, 2, 3, 3, 3}))
    expected:
      kind: stdout
      value: |-
        {'a': 3, 'b': 2}
        3
    hints:
      - "Ключ хеширует в одну и ту же ячейку, поэтому второе 'a' не создаёт новую запись, а перезаписывает старую."
      - "set отбрасывает дубликаты по тому же принципу хеш-таблицы: остаются только уникальные элементы."
    variants:
      - snippet: |
          d = {"k": 1}
          d["k"] = 2
          d["k"] = 3
          print(d)
          print(len({"a", "a", "b"}))
        expected:
          kind: stdout
          value: |-
            {'k': 3}
            2

  - id: dict-resize-quiz-001
    concept: dict-and-set-internals
    type: theory-quiz
    difficulty: 3
    prompt: "Что происходит, когда хеш-таблица словаря заполняется выше порога нагрузки (load factor)?"
    choices:
      - id: a
        text: "Таблица выделяет массив большего размера и перераскладывает (rehash) все существующие ключи по новым бакетам."
      - id: b
        text: "Словарь начинает хранить лишние ключи в связанном списке без расширения."
      - id: c
        text: "Python бросает исключение о переполнении."
      - id: d
        text: "Старые ключи удаляются, освобождая место."
    correct: [a]
    explanation: "При превышении порога заполнения таблица растёт (обычно кратно), и все ключи перераскладываются по новым ячейкам. Это разовая дорогая операция, из-за которой отдельная вставка иногда заметно медленнее - но в среднем (амортизированно) вставка остаётся O(1)."
    variants:
      - prompt: "Зачем словарю запас свободных бакетов (он не заполняется на 100%)?"
        choices:
          - id: a
            text: "Чем плотнее таблица, тем больше коллизий и длиннее проба; запас держит среднее время поиска близким к O(1)."
          - id: b
            text: "Свободные бакеты ускоряют сортировку ключей."
          - id: c
            text: "Это требование стандарта, без практического смысла."
          - id: d
            text: "Чтобы можно было хранить значения None."
        correct: [a]
        explanation: "Высокий load factor резко увеличивает число коллизий и длину последовательности проб при open addressing. Поэтому таблица расширяется заранее, удерживая поиск быстрым."

  - id: collisions-count-001
    concept: dict-and-set-internals
    type: python-function
    difficulty: 4
    prompt: "Смоделируйте коллизии в хеш-таблице. Реализуйте `collisions(keys, size)`: для целых ключей индекс бакета считается как `key % size`. Верните количество ключей, попавших в уже занятый бакет (то есть число коллизий при последовательной вставке)."
    starter: |
      def collisions(keys, size):
          ...
    cases:
      - call: "collisions([0, 8, 16], 8)"
        expect: 2
      - call: "collisions([1, 2, 3], 8)"
        expect: 0
      - call: "collisions([5, 13, 21, 4], 8)"
        expect: 2
    hints:
      - "Каждый ключ попадает в бакет key % size. Коллизия - это попадание в бакет, который уже кем-то занят."
      - "Заведите множество занятых индексов. Для каждого ключа считайте его бакет; если индекс уже в множестве - это коллизия, иначе добавьте индекс."
    solution: |
      def collisions(keys, size):
          occupied = set()
          count = 0
          for key in keys:
              index = key % size
              if index in occupied:
                  count += 1
              else:
                  occupied.add(index)
          return count
