exercises:
  - id: is-vs-eq-001
    concept: objects-and-references
    type: theory-quiz
    difficulty: 1
    prompt: "Чем оператор `is` отличается от `==`?"
    choices:
      - id: a
        text: "`is` сравнивает значения, а `==` - типы объектов."
      - id: b
        text: "`is` проверяет идентичность, `==` - равенство значений."
      - id: c
        text: "Это синонимы, разницы между ними нет."
      - id: d
        text: "`is` работает только с числами, `==` - только со строками."
    correct: [b]
    explanation: "`is` сравнивает идентичность объектов (их `id()`), а `==` вызывает `__eq__` и сравнивает значения. Два разных списка с одинаковым содержимым равны по `==`, но не тождественны по `is`."
    variants:
      - prompt: "Какой проверкой корректно сравнить переменную с `None`?"
        choices:
          - id: a
            text: "`x == None`, потому что None - это значение; путает идентичность объекта с равенством значений"
          - id: b
            text: "`x is None`, потому что None - единственный объект, и проверяется идентичность."
          - id: c
            text: "`x = None`, присваиванием"
          - id: d
            text: "`x!= False`, это эквивалентно"
        correct: [b]
        explanation: "`None` существует в одном экземпляре, поэтому идиоматично сравнивать через `is None` - это проверка идентичности, не зависящая от чужого `__eq__`."
      - prompt: "Что определяет идентичность объекта, которую проверяет `is`?"
        choices:
          - id: a
            text: "Значение, возвращаемое `id()` - уникальный идентификатор объекта."
          - id: b
            text: "Длина объекта в байтах в текущем представлении CPython."
          - id: c
            text: "Имя переменной, на которую объект сейчас назначен в scope."
          - id: d
            text: "Его тип (str, int, list) как единственный идентификатор."
        correct: [a]
        explanation: "`is` сравнивает `id()` двух объектов. В CPython `id()` - это адрес объекта в памяти, постоянный на время жизни объекта."

  - id: aliasing-predict-001
    concept: objects-and-references
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      x = [1, 2, 3]
      y = x
      y.append(4)
      print(x)
    expected:
      kind: stdout
      value: "[1, 2, 3, 4]"
    hints:
      - "Присваивание `y = x` не копирует список - оно создаёт второе имя для того же объекта."
      - "Раз `x` и `y` указывают на один список, изменение через `y` видно через `x`."
    variants:
      - snippet: |
          a = {"n": 1}
          b = a
          b["n"] = 99
          print(a["n"])
        expected:
          kind: stdout
          value: "99"
      - snippet: |
          p = [10, 20]
          q = p
          q += [30]
          print(p)
        expected:
          kind: stdout
          value: "[10, 20, 30]"

  - id: shallow-deep-predict-001
    concept: objects-and-references
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа? Обратите внимание на вложенный список."
    snippet: |
      original = [[1, 2], [3, 4]]
      shallow = original[:]
      shallow[0].append(99)
      print(original[0])
    expected:
      kind: stdout
      value: "[1, 2, 99]"
    hints:
      - "Срез `original[:]` копирует только внешний список; элементы внутри остаются общими объектами."
      - "`shallow[0]` и `original[0]` - один и тот же вложенный список, поэтому append виден через оба."
      - "Подумайте, чем поверхностная копия отличается от глубокой для вложенных изменяемых объектов."

  - id: default-arg-predict-001
    concept: objects-and-references
    type: predict-output
    difficulty: 4
    prompt: "Что выведет эта программа? Это классическая ловушка изменяемого аргумента по умолчанию."
    snippet: |
      def collect(item, bucket=[]):
          bucket.append(item)
          return bucket

      print(collect("a"))
      print(collect("b"))
    expected:
      kind: stdout
      value: |-
        ['a']
        ['a', 'b']
    hints:
      - "Значение по умолчанию вычисляется один раз - в момент определения функции, а не при каждом вызове."
      - "Тот же список `bucket` живёт между вызовами и накапливает всё, что в него добавляли."
      - "Между двумя вызовами объект списка не пересоздаётся, поэтому второй вызов видит результат первого."

  - id: safe-default-fn-001
    concept: objects-and-references
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `append_to(item, bucket=None)`, которая добавляет `item` в `bucket` и возвращает его, но при отсутствии `bucket` создаёт новый список на каждом вызове (без ловушки изменяемого аргумента по умолчанию)."
    starter: |
      def append_to(item, bucket=None):
          pass
    cases:
      - call: "append_to(1)"
        expect: [1]
      - call: "append_to(2)"
        expect: [2]
      - call: "append_to(3, [10, 20])"
        expect: [10, 20, 3]
    solution: |
      def append_to(item, bucket=None):
          if bucket is None:
              bucket = []
          bucket.append(item)
          return bucket
    hints:
      - "Чтобы новый список рождался на каждом вызове, нельзя использовать `bucket=[]` как значение по умолчанию."
      - "Используйте `bucket=None`, а внутри проверьте `if bucket is None` и создайте свежий список."
