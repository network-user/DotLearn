exercises:
  - id: dict-lookup-why-001
    concept: dict-and-set-internals
    type: theory-quiz
    difficulty: 1
    prompt: "Why does key lookup in a dict barely depend on how many elements it has?"
    choices:
      - id: a
        text: "The slot address is computed from the key via its hash, so Python hits it directly without scanning."
      - id: b
        text: "Python keeps keys sorted and uses binary search."
      - id: c
        text: "The dict caches the last key found."
      - id: d
        text: "Inside a dict is a list and lookup scans it, just quickly."
    correct: [a]
    explanation: "A dict is a hash table: hash(key) becomes a bucket index and access goes straight to the slot. Average lookup time stays constant and does not grow with dict size."
    variants:
      - prompt: "Why can't a list be used as a dict key?"
        choices:
          - id: a
            text: "It is mutable: after mutation its hash would change and the table would lose the key. So list is unhashable."
          - id: b
            text: "A list is too large for a slot."
          - id: c
            text: "Lists are forbidden in dicts for style reasons."
          - id: d
            text: "You can, if the list is not empty."
        correct: [a]
        explanation: "A key must be hashable and immutable or the table could not find it after mutation. list is mutable, so unhashable — use tuple."
      - prompt: "What must be true for a dict key?"
        choices:
          - id: a
            text: "It is hashable (usually immutable): hash(key) is stable for the key's entire lifetime."
          - id: b
            text: "It must be a string."
          - id: c
            text: "It must be unique within the program."
          - id: d
            text: "Its length must not exceed 8 bytes."
        correct: [a]
        explanation: "Any hashable object with a stable hash can be a key: int, str, tuple of hashables, frozenset. Mutable objects with changing hashes do not qualify."

  - id: dict-order-predict-001
    concept: dict-and-set-internals
    type: predict-output
    difficulty: 2
    prompt: "What will the program print? Consider key order in dict starting with Python 3.7."
    snippet: |
      d = {}
      d["b"] = 1
      d["a"] = 2
      d["c"] = 3
      print(list(d))
    expected:
      kind: stdout
      value: "['b', 'a', 'c']"
    hints:
      - "Since 3.7 a dict guaranteed preserves the order keys were added, not sorted order."
      - "Keys were added b, a, c — that is the order list(d) will enumerate them."
    variants:
      - snippet: |
          d = {"x": 1, "y": 2}
          d["x"] = 99
          d["z"] = 3
          print(list(d))
        expected:
          kind: stdout
          value: "['x', 'y', 'z']"
      - snippet: |
          d = {}
          d[3] = "a"
          d[1] = "b"
          d[2] = "c"
          print(list(d.keys()))
        expected:
          kind: stdout
          value: "[3, 1, 2]"

  - id: dict-dup-set-predict-001
    concept: dict-and-set-internals
    type: predict-output
    difficulty: 2
    prompt: "What will the program print? Remember: reassigning an existing key updates the value, it does not add a slot."
    snippet: |
      d = {"a": 1, "b": 2, "a": 3}
      print(d)
      print(len({1, 2, 2, 3, 3, 3}))
    expected:
      kind: stdout
      value: |-
        {'a': 3, 'b': 2}
        3
    hints:
      - "A key hashes to the same slot, so a second 'a' does not create a new entry — it overwrites the old one."
      - "A set drops duplicates by the same hash-table principle: only unique elements remain."
    variants:
      - snippet: |
          d = {"k": 1}
          d["k"] = 2
          d["k"] = 3
          print(d)
          print(len({"a", "a", "b"}))
        expected:
          kind: stdout
          value: |-
            {'k': 3}
            2

  - id: dict-resize-quiz-001
    concept: dict-and-set-internals
    type: theory-quiz
    difficulty: 3
    prompt: "What happens when a dict's hash table fills above the load factor threshold?"
    choices:
      - id: a
        text: "The table allocates a larger array and rehashes all existing keys into new buckets."
      - id: b
        text: "The dict starts storing extra keys in a linked list without growing."
      - id: c
        text: "Python raises an overflow exception."
      - id: d
        text: "Old keys are deleted to free space."
    correct: [a]
    explanation: "When the fill threshold is exceeded the table grows (usually by a multiple) and all keys are rehashed into new slots. That one-time expensive operation is why a single insert is sometimes noticeably slower — but on average (amortized) insert stays O(1)."
    variants:
      - prompt: "Why does a dict keep spare empty buckets (it is not 100% full)?"
        choices:
          - id: a
            text: "The denser the table, the more collisions and longer probing; spare capacity keeps average lookup near O(1)."
          - id: b
            text: "Empty buckets speed up sorting keys."
          - id: c
            text: "It is a standard requirement with no practical meaning."
          - id: d
            text: "So None values can be stored."
        correct: [a]
        explanation: "A high load factor sharply increases collisions and probe length under open addressing. The table grows early to keep lookup fast."

  - id: collisions-count-001
    concept: dict-and-set-internals
    type: python-function
    difficulty: 4
    prompt: "Model collisions in a hash table. Implement `collisions(keys, size)`: for integer keys the bucket index is `key % size`. Return the number of keys that land in an already occupied bucket (i.e. collisions on sequential insert)."
    starter: |
      def collisions(keys, size):
          ...
    cases:
      - call: "collisions([0, 8, 16], 8)"
        expect: 2
      - call: "collisions([1, 2, 3], 8)"
        expect: 0
      - call: "collisions([5, 13, 21, 4], 8)"
        expect: 2
    hints:
      - "Each key lands in bucket key % size. A collision is landing in a bucket already occupied."
      - "Keep a set of occupied indices. For each key compute its bucket; if the index is already in the set it is a collision, otherwise add the index."
    solution: |
      def collisions(keys, size):
          occupied = set()
          count = 0
          for key in keys:
              index = key % size
              if index in occupied:
                  count += 1
              else:
                  occupied.add(index)
          return count
