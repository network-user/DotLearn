exercises:
  - id: refcount-basics-001
    concept: reference-counting-gc
    type: theory-quiz
    difficulty: 1
    prompt: "Когда CPython уничтожает объект при подсчёте ссылок?"
    choices:
      - id: a
        text: "Каждую секунду по таймеру."
      - id: b
        text: "Как только счётчик ссылок на объект достигает нуля."
      - id: c
        text: "Только при ручном вызове `del`."
      - id: d
        text: "Никогда - память освобождается лишь при завершении программы."
    correct: [b]
    explanation: "Счётчик ссылок падает до нуля - объект уничтожается немедленно и детерминированно. Это базовый механизм управления памятью в CPython."
    variants:
      - prompt: "Что из перечисленного увеличивает счётчик ссылок на объект?"
        choices:
          - id: a
            text: "Присваивание объекта новому имени или добавление его в список."
          - id: b
            text: "Вызов `del` на имени объекта."
          - id: c
            text: "Выход имени из области видимости функции."
          - id: d
            text: "Сравнение объекта через `==`."
        correct: [a]
        explanation: "Новое имя и помещение в контейнер добавляют ссылку, увеличивая счётчик. `del`, выход из области видимости и удаление из контейнера - уменьшают его."
      - prompt: "Что делает `del x`?"
        choices:
          - id: a
            text: "Немедленно уничтожает объект, на который смотрел `x`."
          - id: b
            text: "Удаляет имя `x` и уменьшает счётчик ссылок объекта на единицу."
          - id: c
            text: "Обнуляет счётчик ссылок объекта."
          - id: d
            text: "Запускает сборщик мусора."
        correct: [b]
        explanation: "`del x` убирает имя и уменьшает счётчик на единицу. Объект уничтожится, только когда счётчик дойдёт до нуля."

  - id: refcount-delta-predict-001
    concept: reference-counting-gc
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Вычитание единицы убирает временную ссылку-аргумент самой функции."
    snippet: |
      import sys

      x = object()
      a = x
      b = x
      print(sys.getrefcount(x) - 1)
    expected:
      kind: stdout
      value: "3"
    hints:
      - "Посчитайте, сколько имён сейчас указывают на этот объект."
      - "Имена `x`, `a`, `b` дают три ссылки; `- 1` компенсирует временный аргумент `getrefcount`."
    variants:
      - snippet: |
          import sys

          x = object()
          names = [x, x]
          print(sys.getrefcount(x) - 1)
        expected:
          kind: stdout
          value: "3"
      - snippet: |
          import sys

          x = object()
          y = x
          del y
          print(sys.getrefcount(x) - 1)
        expected:
          kind: stdout
          value: "1"

  - id: weakref-predict-001
    concept: reference-counting-gc
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа со слабой ссылкой?"
    snippet: |
      import weakref

      class Node:
          pass

      n = Node()
      ref = weakref.ref(n)
      print(ref() is n)
      del n
      print(ref() is None)
    expected:
      kind: stdout
      value: |-
        True
        True
    hints:
      - "Слабая ссылка не увеличивает счётчик ссылок и не мешает объекту умереть."
      - "Пока `n` жив, `ref()` возвращает сам объект; после `del n` обычных ссылок не осталось."
      - "Когда объект уничтожен, `ref()` начинает возвращать None."

  - id: cycle-quiz-001
    concept: reference-counting-gc
    type: theory-quiz
    difficulty: 3
    prompt: "Два словаря ссылаются друг на друга, и оба внешних имени удалены через `del`. Что произойдёт?"
    choices:
      - id: a
        text: "Подсчёт ссылок немедленно освободит их, ведь внешних имён нет."
      - id: b
        text: "Их счётчики останутся равными 1 (держат друг друга); убрать их сможет только сборщик gc."
      - id: c
        text: "Возникнет ошибка RecursionError."
      - id: d
        text: "Python запретит создавать такие ссылки."
    correct: [b]
    explanation: "Это циклическая ссылка - слепое пятно подсчёта ссылок. Объекты держат друг друга, счётчики не падают до нуля, и убрать недостижимый цикл может только трассирующий сборщик `gc`."

  - id: gc-generations-quiz-001
    concept: reference-counting-gc
    type: theory-quiz
    difficulty: 3
    prompt: "Зачем сборщик мусора CPython делит объекты на поколения (0, 1, 2)?"
    choices:
      - id: a
        text: "Чтобы хранить объекты разных типов отдельно."
      - id: b
        text: "Гипотеза: большинство объектов умирает молодыми, поэтому молодые поколения проверяются чаще, а старые - реже, что снижает накладные расходы."
      - id: c
        text: "Чтобы ограничить максимальное число объектов в программе."
      - id: d
        text: "Поколения определяют размер объекта в памяти."
    correct: [b]
    explanation: "Сборщик опирается на гипотезу о поколениях: недавно созданные объекты чаще оказываются мусором. Молодое поколение 0 проверяется часто, пережившие сборку объекты переходят в старшие поколения, которые проверяются реже."
    variants:
      - prompt: "Что возвращает вызов `gc.collect()`?"
        choices:
          - id: a
            text: "Число найденных и собранных недостижимых объектов (int)."
          - id: b
            text: "Список всех живых объектов."
          - id: c
            text: "True, если память освобождена, иначе False."
          - id: d
            text: "Ничего, функция всегда возвращает None."
        correct: [a]
        explanation: "`gc.collect()` запускает полную сборку и возвращает целое число - количество найденных недостижимых объектов."
      - prompt: "Чем полезна `weakref` для разрыва циклов?"
        choices:
          - id: a
            text: "Если одно звено цикла - слабая ссылка, она не удерживает объект, и подсчёт ссылок соберёт остальное без участия gc."
          - id: b
            text: "Она удваивает счётчик ссылок, ускоряя сборку."
          - id: c
            text: "Она запрещает создавать циклы на уровне интерпретатора."
          - id: d
            text: "Она переносит объект сразу в поколение 2."
        correct: [a]
        explanation: "Слабая ссылка не увеличивает счётчик, поэтому не образует удерживающего звена. Цикл с одним слабым звеном распадается обычным подсчётом ссылок."
