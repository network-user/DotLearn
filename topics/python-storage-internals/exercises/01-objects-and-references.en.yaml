exercises:
  - id: is-vs-eq-001
    concept: objects-and-references
    type: theory-quiz
    difficulty: 1
    prompt: "How does the `is` operator differ from `==`?"
    choices:
      - id: a
        text: "`is` compares values, and `==` compares object types."
      - id: b
        text: "`is` checks identity (whether it is the same object), `==` checks value equality."
      - id: c
        text: "They are synonyms; there is no difference."
      - id: d
        text: "`is` works only with numbers, `==` only with strings."
    correct: [b]
    explanation: "`is` compares object identity (their `id()`), while `==` calls `__eq__` and compares values. Two different lists with the same contents are equal by `==` but not identical by `is`."
    variants:
      - prompt: "Which check correctly compares a variable to `None`?"
        choices:
          - id: a
            text: "`x == None`, because None is a value."
          - id: b
            text: "`x is None`, because None is a single object and identity is checked."
          - id: c
            text: "`x = None`, by assignment."
          - id: d
            text: "`x != False`, that is equivalent."
        correct: [b]
        explanation: "`None` exists in one instance, so the idiomatic comparison is `is None`: an identity check that does not depend on someone else's `__eq__`."
      - prompt: "What defines the object identity that `is` checks?"
        choices:
          - id: a
            text: "The value returned by `id()` (the object's unique identifier)."
          - id: b
            text: "The object's length in bytes."
          - id: c
            text: "The variable name it is bound to."
          - id: d
            text: "Its type."
        correct: [a]
        explanation: "`is` compares the `id()` of two objects. In CPython `id()` is the object's address in memory, constant for the object's lifetime."

  - id: aliasing-predict-001
    concept: objects-and-references
    type: predict-output
    difficulty: 2
    prompt: "What will this program print?"
    snippet: |
      x = [1, 2, 3]
      y = x
      y.append(4)
      print(x)
    expected:
      kind: stdout
      value: "[1, 2, 3, 4]"
    hints:
      - "Assignment `y = x` does not copy the list; it creates a second name for the same object."
      - "Since `x` and `y` point at one list, a change through `y` is visible through `x`."
    variants:
      - snippet: |
          a = {"n": 1}
          b = a
          b["n"] = 99
          print(a["n"])
        expected:
          kind: stdout
          value: "99"
      - snippet: |
          p = [10, 20]
          q = p
          q += [30]
          print(p)
        expected:
          kind: stdout
          value: "[10, 20, 30]"

  - id: shallow-deep-predict-001
    concept: objects-and-references
    type: predict-output
    difficulty: 3
    prompt: "What will this program print? Pay attention to the nested list."
    snippet: |
      original = [[1, 2], [3, 4]]
      shallow = original[:]
      shallow[0].append(99)
      print(original[0])
    expected:
      kind: stdout
      value: "[1, 2, 99]"
    hints:
      - "The slice `original[:]` copies only the outer list; elements inside remain shared objects."
      - "`shallow[0]` and `original[0]` are the same nested list, so append is visible through both."
      - "Think about how a shallow copy differs from a deep one for nested mutable objects."

  - id: default-arg-predict-001
    concept: objects-and-references
    type: predict-output
    difficulty: 4
    prompt: "What will this program print? This is the classic mutable default-argument trap."
    snippet: |
      def collect(item, bucket=[]):
          bucket.append(item)
          return bucket

      print(collect("a"))
      print(collect("b"))
    expected:
      kind: stdout
      value: |-
        ['a']
        ['a', 'b']
    hints:
      - "The default value is computed once, at function definition time, not on every call."
      - "The same list `bucket` lives between calls and accumulates everything added to it."
      - "Between the two calls the list object is not recreated, so the second call sees the first call's result."

  - id: safe-default-fn-001
    concept: objects-and-references
    type: python-function
    difficulty: 3
    prompt: "Implement `append_to(item, bucket=None)` that appends `item` to `bucket` and returns it, but when `bucket` is missing creates a new list on every call (without the mutable default-argument trap)."
    starter: |
      def append_to(item, bucket=None):
          pass
    cases:
      - call: "append_to(1)"
        expect: [1]
      - call: "append_to(2)"
        expect: [2]
      - call: "append_to(3, [10, 20])"
        expect: [10, 20, 3]
    solution: |
      def append_to(item, bucket=None):
          if bucket is None:
              bucket = []
          bucket.append(item)
          return bucket
    hints:
      - "For a new list on every call you cannot use `bucket=[]` as the default value."
      - "Use `bucket=None`, and inside check `if bucket is None` and create a fresh list."
