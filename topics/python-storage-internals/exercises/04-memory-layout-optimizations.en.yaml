exercises:
  - id: slots-what-001
    concept: memory-layout-optimizations
    type: theory-quiz
    difficulty: 1
    prompt: "What does declaring `__slots__` on a class do?"
    choices:
      - id: a
        text: "Removes the instance __dict__ and stores attributes in a fixed compact structure, saving memory."
      - id: b
        text: "Makes all attributes private."
      - id: c
        text: "Speeds up importing the module with the class."
      - id: d
        text: "Automatically creates __init__ from the slot list."
    correct: [a]
    explanation: "A normal instance stores attributes in a personal __dict__, which is flexible but memory-heavy. __slots__ replaces that dict with a fixed set of slots for declared names, saving memory (especially on millions of small objects)."
    variants:
      - prompt: "What happens if you try to assign an instance with __slots__ an attribute not in the slot list?"
        choices:
          - id: a
            text: "AttributeError: there is no __dict__, and there is nowhere to store an undeclared attribute."
          - id: b
            text: "The attribute is silently added to __dict__."
          - id: c
            text: "Python extends __slots__ automatically."
          - id: d
            text: "The value is stored but lost on the next access."
        correct: [a]
        explanation: "With __dict__ removed there is nowhere to put an undeclared attribute, so Python raises AttributeError. That is the price of memory savings: the attribute set is fixed at class definition time."
      - prompt: "When is __slots__ justified?"
        choices:
          - id: a
            text: "When very many small homogeneous objects are created and memory savings matter."
          - id: b
            text: "Always: __slots__ helps every class."
          - id: c
            text: "Only for classes without methods."
          - id: d
            text: "When you need to forbid inheritance."
        correct: [a]
        explanation: "__slots__ pays off on masses of small objects (points, nodes, records). For rare objects or where dynamic attributes are needed, __dict__ flexibility matters more than savings."

  - id: small-int-cache-001
    concept: memory-layout-optimizations
    type: predict-output
    difficulty: 2
    prompt: "What will the program print? CPython caches small integers from -5 to 256 in a single instance."
    snippet: |
      a = 10
      b = 10
      print(a is b)
      print(a == b)
    expected:
      kind: stdout
      value: |-
        True
        True
    hints:
      - "Small integers in the -5..256 range are pre-created and reused by CPython, so both names point at one object."
      - "`is` compares object identity, `==` compares values. For cached 10 both are true."
    variants:
      - snippet: |
          x = 256
          y = 256
          print(x is y)
        expected:
          kind: stdout
          value: "True"
      - snippet: |
          a = None
          b = None
          print(a is b)
        expected:
          kind: stdout
          value: "True"

  - id: slots-no-dict-001
    concept: memory-layout-optimizations
    type: predict-output
    difficulty: 2
    prompt: "What will the program print? Compare whether instances have __dict__."
    snippet: |
      class Slotted:
          __slots__ = ("x",)
          def __init__(self, x):
              self.x = x

      class Plain:
          def __init__(self, x):
              self.x = x

      print(hasattr(Slotted(1), "__dict__"))
      print(hasattr(Plain(1), "__dict__"))
    expected:
      kind: stdout
      value: |-
        False
        True
    hints:
      - "__slots__ removes the instance's personal attribute dict. What will hasattr return for __dict__?"
      - "A normal class without __slots__ stores attributes in __dict__, so its instance has one."

  - id: slots-declare-blanks-001
    concept: memory-layout-optimizations
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the blanks: declare a Point class with two coordinates and no __dict__."
    template: |
      class Point:
          {{slots}} = ("x", "y")
          def __init__(self, x, y):
              self.x = x
              self.{{attr}} = y
    blanks:
      slots:
        accept: ["__slots__"]
      attr:
        accept: ["y"]
    hints:
      - "To remove __dict__ and fix the attribute set, a class declares a special tuple of names."
      - "In __init__ assign only names listed in the slot set, otherwise you get AttributeError."
    variants:
      - prompt: "Fill in the blank: which container is usually used for __slots__ so the name set cannot be accidentally changed?"
        template: |
          class Node:
              __slots__ = ({{name}},)
        blanks:
          name:
            accept: ['"value"', "'value'"]

  - id: list-overalloc-quiz-001
    concept: memory-layout-optimizations
    type: theory-quiz
    difficulty: 3
    prompt: "Why does `list.append` work in O(1) on average even though the list sometimes moves to a new memory block?"
    choices:
      - id: a
        text: "The list allocates memory with headroom (over-allocation), so most appends need no move; rare expansions grow capacity by a multiple and the cost spreads out, giving amortized O(1)."
      - id: b
        text: "The list never moves: memory is allocated once forever."
      - id: c
        text: "append always copies the whole list, but copying is considered free."
      - id: d
        text: "The list stores elements in a linked list, so insert is instant."
    correct: [a]
    explanation: "CPython keeps list capacity larger than length. While spare capacity remains, append just drops an element: O(1). When exhausted, capacity grows by a multiple (not by one), and rare expensive moves divided across many cheap inserts give amortized O(1)."
    variants:
      - prompt: "What happens to a tuple if you need to \"add\" an element?"
        choices:
          - id: a
            text: "A tuple is immutable: a new tuple is created and the original stays unchanged. So a tuple is more compact and needs no spare capacity."
          - id: b
            text: "The tuple grows in place like a list."
          - id: c
            text: "Python raises an exception on any attempt."
          - id: d
            text: "The element is added, but only at runtime."
        correct: [a]
        explanation: "A tuple is immutable and fixed in size, so it needs no spare capacity for growth; it uses exactly what it holds, and any \"add\" creates a new object."
