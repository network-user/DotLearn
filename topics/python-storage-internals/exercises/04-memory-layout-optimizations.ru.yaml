exercises:
  - id: slots-what-001
    concept: memory-layout-optimizations
    type: theory-quiz
    difficulty: 1
    prompt: "Что даёт объявление `__slots__` в классе?"
    choices:
      - id: a
        text: "Убирает у экземпляров словарь __dict__."
      - id: b
        text: "Делает все атрибуты приватными"
      - id: c
        text: "Ускоряет импорт модуля с классом - смешивая транспорт и прикладной протокол"
      - id: d
        text: "Автоматически создаёт __init__ по списку слотов"
    correct: [a]
    explanation: "Обычный экземпляр хранит атрибуты в личном словаре __dict__, что гибко, но затратно по памяти. __slots__ заменяет этот словарь фиксированным набором ячеек под заранее объявленные имена, экономя память - особенно заметно на миллионах мелких объектов."
    variants:
      - prompt: "Что произойдёт при попытке присвоить экземпляру со __slots__ атрибут, которого нет в списке слотов?"
        choices:
          - id: a
            text: "AttributeError: словаря __dict__ нет."
          - id: b
            text: "Атрибут молча добавится в __dict__."
          - id: c
            text: "Python расширит __slots__ автоматически."
          - id: d
            text: "Значение запишется, но потеряется при следующем доступе."
        correct: [a]
        explanation: "Раз __dict__ убран, складывать незаявленный атрибут некуда, и Python бросает AttributeError. Это плата за экономию памяти: набор атрибутов фиксируется на этапе объявления класса."
      - prompt: "Когда __slots__ оправдан?"
        choices:
          - id: a
            text: "Когда создаётся очень много мелких однотипных объектов и важна экономия памяти."
          - id: b
            text: "Всегда: __slots__ полезен любому классу; путает валидацию полей с их простым хранением"
          - id: c
            text: "Только для классов без методов"
          - id: d
            text: "Когда нужно запретить наследование"
        correct: [a]
        explanation: "__slots__ окупается на массовых мелких объектах (точки, узлы, записи). Для редких объектов или там, где нужна динамическая установка атрибутов, гибкость __dict__ важнее экономии."

  - id: small-int-cache-001
    concept: memory-layout-optimizations
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? CPython кеширует маленькие целые от -5 до 256 в единственном экземпляре."
    snippet: |
      a = 10
      b = 10
      print(a is b)
      print(a == b)
    expected:
      kind: stdout
      value: |-
        True
        True
    hints:
      - "Маленькие целые в диапазоне -5..256 CPython создаёт заранее и переиспользует - оба имени указывают на один объект."
      - "is сравнивает идентичность объектов, == сравнивает значения. Для кешированного 10 истинны оба."
    variants:
      - snippet: |
          x = 256
          y = 256
          print(x is y)
        expected:
          kind: stdout
          value: "True"
      - snippet: |
          a = None
          b = None
          print(a is b)
        expected:
          kind: stdout
          value: "True"

  - id: slots-no-dict-001
    concept: memory-layout-optimizations
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Сравните, есть ли у экземпляров __dict__."
    snippet: |
      class Slotted:
          __slots__ = ("x",)
          def __init__(self, x):
              self.x = x

      class Plain:
          def __init__(self, x):
              self.x = x

      print(hasattr(Slotted(1), "__dict__"))
      print(hasattr(Plain(1), "__dict__"))
    expected:
      kind: stdout
      value: |-
        False
        True
    hints:
      - "__slots__ убирает у экземпляра личный словарь атрибутов. Что тогда вернёт hasattr на __dict__?"
      - "Обычный класс без __slots__ хранит атрибуты в __dict__, поэтому он у его экземпляра есть."

  - id: slots-declare-blanks-001
    concept: memory-layout-optimizations
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски: объявите класс Point с двумя координатами и без __dict__."
    template: |
      class Point:
          {{slots}} = ("x", "y")
          def __init__(self, x, y):
              self.x = x
              self.{{attr}} = y
    blanks:
      slots:
        accept: ["__slots__"]
      attr:
        accept: ["y"]
    hints:
      - "Чтобы убрать __dict__ и зафиксировать набор атрибутов, класс объявляет специальный кортеж имён."
      - "В __init__ присваивайте только те имена, что перечислены в наборе слотов, иначе будет AttributeError."
    variants:
      - prompt: "Заполните пропуск: какой контейнер обычно используют для __slots__, чтобы набор имён нельзя было случайно изменить?"
        template: |
          class Node:
              __slots__ = ({{name}},)
        blanks:
          name:
            accept: ['"value"', "'value'"]

  - id: list-overalloc-quiz-001
    concept: memory-layout-optimizations
    type: theory-quiz
    difficulty: 3
    prompt: "Почему `list.append` в среднем работает за O(1), хотя иногда списку приходится переезжать в новый блок памяти?"
    choices:
      - id: a
        text: "Список выделяет память с запасом (over-allocation)."
      - id: b
        text: "Список никогда не переезжает: память выделяется один раз навсегда"
      - id: c
        text: "append всегда копирует весь список, но копирование считается бесплатным"
      - id: d
        text: "Список хранит элементы в связанном списке, поэтому вставка мгновенна"
    correct: [a]
    explanation: "CPython держит у списка ёмкость больше длины. Пока есть запас, append просто кладёт элемент - O(1). Когда запас исчерпан, ёмкость увеличивается кратно (а не на единицу), и редкие дорогие переезды, поделённые на множество дешёвых вставок, дают амортизированный O(1)."
    variants:
      - prompt: "Что произойдёт с tuple, если понадобится «добавить» элемент?"
        choices:
          - id: a
            text: "tuple неизменяем: создаётся новый кортеж, а исходный остаётся прежним."
          - id: b
            text: "tuple расширится на месте, как список - будто типы живут в рантайме и заменяют валидацию"
          - id: c
            text: "Python бросит исключение при любой попытке"
          - id: d
            text: "Элемент добавится, но только во время выполнения"
        correct: [a]
        explanation: "Кортеж неизменяем и фиксирован по размеру, поэтому ему не нужен запас ёмкости под рост - он занимает ровно столько, сколько хранит, и любое «добавление» порождает новый объект."
