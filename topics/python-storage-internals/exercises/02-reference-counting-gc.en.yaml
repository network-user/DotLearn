exercises:
  - id: refcount-basics-001
    concept: reference-counting-gc
    type: theory-quiz
    difficulty: 1
    prompt: "When does CPython destroy an object under reference counting?"
    choices:
      - id: a
        text: "Every second on a timer."
      - id: b
        text: "As soon as the object's reference count reaches zero."
      - id: c
        text: "Only when `del` is called manually."
      - id: d
        text: "Never — memory is freed only when the program exits."
    correct: [b]
    explanation: "When the reference count drops to zero the object is destroyed immediately and deterministically. That is the basic memory management mechanism in CPython."
    variants:
      - prompt: "Which of the following increases an object's reference count?"
        choices:
          - id: a
            text: "Assigning the object to a new name or adding it to a list."
          - id: b
            text: "Calling `del` on the object's name."
          - id: c
            text: "The name leaving a function's scope."
          - id: d
            text: "Comparing the object with `==`."
        correct: [a]
        explanation: "A new name and putting into a container add a reference and increase the counter. `del`, leaving scope, and removing from a container decrease it."
      - prompt: "What does `del x` do?"
        choices:
          - id: a
            text: "Immediately destroys the object that `x` pointed at."
          - id: b
            text: "Removes the name `x` and decreases the object's reference count by one."
          - id: c
            text: "Zeroes the object's reference count."
          - id: d
            text: "Runs the garbage collector."
        correct: [b]
        explanation: "`del x` removes the name and decrements the counter by one. The object is destroyed only when the counter reaches zero."

  - id: refcount-delta-predict-001
    concept: reference-counting-gc
    type: predict-output
    difficulty: 2
    prompt: "What will the program print? Subtracting one removes the function's own temporary argument reference."
    snippet: |
      import sys

      x = object()
      a = x
      b = x
      print(sys.getrefcount(x) - 1)
    expected:
      kind: stdout
      value: "3"
    hints:
      - "Count how many names currently point at this object."
      - "Names `x`, `a`, `b` give three references; `- 1` compensates for `getrefcount`'s temporary argument."
    variants:
      - snippet: |
          import sys

          x = object()
          names = [x, x]
          print(sys.getrefcount(x) - 1)
        expected:
          kind: stdout
          value: "3"
      - snippet: |
          import sys

          x = object()
          y = x
          del y
          print(sys.getrefcount(x) - 1)
        expected:
          kind: stdout
          value: "1"

  - id: weakref-predict-001
    concept: reference-counting-gc
    type: predict-output
    difficulty: 3
    prompt: "What will this program with a weak reference print?"
    snippet: |
      import weakref

      class Node:
          pass

      n = Node()
      ref = weakref.ref(n)
      print(ref() is n)
      del n
      print(ref() is None)
    expected:
      kind: stdout
      value: |-
        True
        True
    hints:
      - "A weak reference does not increase the reference count and does not keep the object alive."
      - "While `n` lives, `ref()` returns the object itself; after `del n` no ordinary references remain."
      - "When the object is destroyed, `ref()` starts returning None."

  - id: cycle-quiz-001
    concept: reference-counting-gc
    type: theory-quiz
    difficulty: 3
    prompt: "Two dicts reference each other and both external names were removed with `del`. What happens?"
    choices:
      - id: a
        text: "Reference counting frees them immediately because there are no external names."
      - id: b
        text: "Their counters stay at 1 (they hold each other); only the gc collector can remove them."
      - id: c
        text: "A RecursionError occurs."
      - id: d
        text: "Python forbids creating such references."
    correct: [b]
    explanation: "This is a reference cycle — reference counting's blind spot. The objects hold each other, counters never hit zero, and only the tracing `gc` collector can remove the unreachable cycle."

  - id: gc-generations-quiz-001
    concept: reference-counting-gc
    type: theory-quiz
    difficulty: 3
    prompt: "Why does CPython's garbage collector split objects into generations (0, 1, 2)?"
    choices:
      - id: a
        text: "To store objects of different types separately."
      - id: b
        text: "Hypothesis: most objects die young, so young generations are checked more often and old ones less often, lowering overhead."
      - id: c
        text: "To limit the maximum number of objects in a program."
      - id: d
        text: "Generations determine object size in memory."
    correct: [b]
    explanation: "The collector relies on the generational hypothesis: recently created objects are more often garbage. Young generation 0 is checked often; survivors move to older generations checked less frequently."
    variants:
      - prompt: "What does `gc.collect()` return?"
        choices:
          - id: a
            text: "The number of unreachable objects found and collected (int)."
          - id: b
            text: "A list of all live objects."
          - id: c
            text: "True if memory was freed, otherwise False."
          - id: d
            text: "Nothing; the function always returns None."
        correct: [a]
        explanation: "`gc.collect()` runs a full collection and returns an integer — the count of unreachable objects found."
      - prompt: "How is `weakref` useful for breaking cycles?"
        choices:
          - id: a
            text: "If one link in a cycle is weak, it does not hold the object and reference counting can collect the rest without gc."
          - id: b
            text: "It doubles the reference count, speeding collection."
          - id: c
            text: "It forbids creating cycles at the interpreter level."
          - id: d
            text: "It moves the object straight to generation 2."
        correct: [a]
        explanation: "A weak reference does not increase the counter, so it does not form a holding link. A cycle with one weak link falls apart under ordinary reference counting."
