conceptId: reference-counting-gc
cards:
  - id: reference-counting-gc-01
    front: "How does CPython manage memory with reference counting?"
    back: "Every object stores a reference count: a reference added — +1, removed — -1. As soon as the counter hits zero the object is destroyed immediately and memory is returned."
    tags: [refcount]
  - id: reference-counting-gc-02
    front: "Which operations increase and which decrease the reference count?"
    back: "Increase: binding a name, adding to a list or dict, passing to a function. Decrease: a name leaving scope, del, rebinding a name, removing from a container."
    tags: [refcount]
  - id: reference-counting-gc-03
    front: "Why does sys.getrefcount show one more than expected?"
    back: "The argument x to getrefcount itself is another temporary reference for the duration of the call. So subtract 1 from the result; rely on the difference in values, not the absolute number."
    tags: [refcount, getrefcount]
  - id: reference-counting-gc-04
    front: "Does del x destroy the object?"
    back: "No. del x removes the name x and decrements the counter by one. The object is destroyed only when the last reference is gone and the counter reaches zero."
    tags: [del, refcount]
  - id: reference-counting-gc-05
    front: "Why can't reference counting handle cycles?"
    back: "If two objects reference each other their counters stay at 1 even after all external names are removed. They keep each other alive though unreachable to the program — a memory leak."
    tags: [cycles, leak]
  - id: reference-counting-gc-06
    front: "Why does CPython need the gc garbage collector if reference counting exists?"
    back: "Reference counting removes most garbage instantly but cannot see cycles. The tracing gc collector periodically finds unreachable cycles (reachable only from within themselves) and destroys them."
    tags: [gc]
  - id: reference-counting-gc-07
    front: "How does generational collection work?"
    back: "Hypothesis: most objects die young. New objects in generation 0 are checked often; survivors move to generations 1 and 2, checked less and less. That lowers overhead."
    tags: [gc, generations]
  - id: reference-counting-gc-08
    front: "What is weakref and why is it useful?"
    back: "A weak reference points at an object without increasing the counter. The object may die despite it; after that ref() returns None. Useful in caches and for breaking cycles."
    tags: [weakref]
  - id: reference-counting-gc-09
    front: "Why must critical resources not be released via __del__?"
    back: "An object in an unreachable cycle is destroyed by gc eventually, not immediately, so __del__ may not run in time. Release files and sockets explicitly via with or close()."
    tags: [del, pitfall]
  - id: reference-counting-gc-10
    front: "How are the GIL and reference counting linked in CPython?"
    back: "The counter changes on every assignment and must be atomic. The GIL guarantees only one thread runs bytecode at a time, so counter operations need no expensive synchronization — one reason the GIL exists."
    tags: [gil]
