conceptId: memory-layout-optimizations
cards:
  - id: memory-layout-optimizations-01
    front: "What does __slots__ do and why is it needed?"
    back: "Replaces an instance's personal __dict__ with a compact set of fixed slots for names listed in advance. Saves memory on masses of small objects (millions of nodes, points, records)."
    tags: [slots]
  - id: memory-layout-optimizations-02
    front: "What is the price of __slots__?"
    back: "Lost flexibility: you cannot assign an undeclared attribute — AttributeError, because there is nowhere to store it. Also conflicts with some multiple-inheritance patterns."
    tags: [slots, pitfall]
  - id: memory-layout-optimizations-03
    front: "When should you not use __slots__?"
    back: "On a handful of objects the gain is near zero while flexibility is lost. It is a tool for masses of small instances, not the default style."
    tags: [slots]
  - id: memory-layout-optimizations-04
    front: "Why does a = 10; b = 10 give a is b == True, but for 1000 — False?"
    back: "CPython pre-caches small integers from -5 to 256, so all 10 are one object. 1000 is outside the cache — two different objects with the same value. That is implementation detail; compare with ==."
    tags: [int-cache, is]
  - id: memory-layout-optimizations-05
    front: "What is string interning?"
    back: "CPython stores short identifier-like strings in a single instance so comparison and use as keys are faster. Like integer caching — an under-the-hood optimization, not a contract."
    tags: [interning]
  - id: memory-layout-optimizations-06
    front: "Why is append amortized O(1) despite list moves?"
    back: "A list allocates memory with headroom: capacity exceeds length. While spare capacity remains, append drops an element in O(1). When exhausted, capacity grows by a multiple and the list moves once — for a long while."
    tags: [list-growth, append]
  - id: memory-layout-optimizations-07
    front: "Why is growing by 1 element worse than multiplicative capacity growth?"
    back: "Growing by 1 would copy the whole list on every append — total 1+2+...+n, i.e. O(n²). Multiplicative growth makes moves rare; n inserts cost O(n) total, i.e. amortized O(1)."
    tags: [list-growth, complexity]
  - id: memory-layout-optimizations-08
    front: "How does tuple differ from list in memory layout?"
    back: "A tuple is fixed and has no spare capacity: it uses exactly what it needs and is therefore more compact than a list. But \"adding\" to it always creates a new object."
    tags: [tuple]
  - id: memory-layout-optimizations-09
    front: "Why use deque and how is it better than a list for a queue?"
    back: "deque is a double-ended queue on linked memory blocks: insert and remove at both ends in O(1). For a list insert(0, x) shifts every element and costs O(n)."
    tags: [deque, collections]
  - id: memory-layout-optimizations-10
    front: "What do Counter and defaultdict from collections provide?"
    back: "Counter is a frequency dict without manual \"is the key there?\" checks. defaultdict is a dict with a default-value factory: accessing a new key creates an empty list or number, avoiding if key not in d."
    tags: [counter, defaultdict, collections]
