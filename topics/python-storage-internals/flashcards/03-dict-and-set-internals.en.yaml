conceptId: dict-and-set-internals
cards:
  - id: dict-and-set-internals-01
    front: "Why does key lookup in a dict barely depend on dict size?"
    back: "A dict is a hash table: the slot index comes from hash(key), so lookup goes straight to the right slot without scanning, in average constant time O(1)."
    tags: [hash-table]
  - id: dict-and-set-internals-02
    front: "How does a hash table turn a key into a slot address?"
    back: "hash(key) is taken, the large hash number becomes a bucket index (roughly remainder modulo table size), and the pair is stored there. Lookup repeats the computation and lands in the slot immediately."
    tags: [hash, bucket]
  - id: dict-and-set-internals-03
    front: "Why can't a list be used as a dict key?"
    back: "A key must be hashable and immutable. A mutable list would change its hash and the table would \"lose\" it — TypeError: unhashable type. For a composite key use tuple."
    tags: [hashable, key]
  - id: dict-and-set-internals-04
    front: "What is a collision and how does Python resolve it?"
    back: "A collision is when two different keys map to the same index (inevitable). Python uses open addressing: if the target slot is occupied, the next free slot is tried by a deterministic rule (probing)."
    tags: [collision, open-addressing]
  - id: dict-and-set-internals-05
    front: "What are load factor and dict resize?"
    back: "Load factor is the ratio occupied / total slots. At about two-thirds full the dict resizes: creates a larger table and rehashes all keys. One insert is costlier, but on average still fast."
    tags: [load-factor, resize]
  - id: dict-and-set-internals-06
    front: "How is the compact dict of Python 3.6+ laid out?"
    back: "Storage is split: a dense entries array holds pairs in insertion order with no gaps, and a sparse index table holds only small indices into entries. Fast lookup, insertion order, and memory savings."
    tags: [compact-dict]
  - id: dict-and-set-internals-07
    front: "Since which version is dict insertion order a language guarantee?"
    back: "From 3.6 CPython moved to a compact dict as an implementation detail; from 3.7 insertion order became a language guarantee. Order is insertion order, not sorted order or hash order."
    tags: [insertion-order]
  - id: dict-and-set-internals-08
    front: "How does set differ from dict in layout?"
    back: "set is the same hash table but stores only keys without values. Fast membership, hashable elements required, duplicates impossible, but no order guarantee."
    tags: [set]
  - id: dict-and-set-internals-09
    front: "Why does {3, 1, 2, 3, 1} keep only three elements?"
    back: "Duplicates lead to slots already occupied by their own values in the hash table, so duplicates collapse. len() will be 3."
    tags: [set, duplicates]
  - id: dict-and-set-internals-10
    front: "Why is repeated hash() on a string cheap and len(d) instant?"
    back: "CPython caches a string's hash inside the object — repeated hash is not recomputed. len(d) is instant because the dict keeps an element count separately and does not walk them."
    tags: [hash-cache, len]
