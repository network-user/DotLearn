conceptId: objects-and-references
cards:
  - id: objects-and-references-01
    front: "Что такое переменная в Python с точки зрения модели объектов?"
    back: "Имя (ссылка), наклеенное на объект, а не контейнер со значением. Присваивание привязывает имя к объекту, ничего не копируя; несколько имён могут указывать на один объект."
    tags: [references, names]
  - id: objects-and-references-02
    front: "Какие три вещи есть у каждого объекта в Python?"
    back: "Тип, значение и идентичность - уникальный «адрес», не меняющийся за жизнь объекта. Функция id() возвращает идентичность; в CPython это адрес объекта в памяти."
    tags: [identity]
  - id: objects-and-references-03
    front: "Чем отличается is от ==?"
    back: "is сравнивает идентичность - один ли это объект (совпадают ли id()). == сравнивает значения через вызов __eq__. Списки [1,2,3] и [1,2,3] равны по ==, но не is."
    tags: [is, equality]
  - id: objects-and-references-04
    front: "Почему None проверяют через is None, а не == None?"
    back: "None существует в единственном экземпляре, и is проверяет идентичность напрямую, без вызова __eq__, который у чужого объекта мог бы солгать."
    tags: [none, is]
  - id: objects-and-references-05
    front: "Что такое алиасинг и чем он опасен?"
    back: "Два имени указывают на один изменяемый объект, поэтому изменение через одно имя видно через другое. После y = x вызов y.append(4) меняет и x - объект один, имён два."
    tags: [aliasing]
  - id: objects-and-references-06
    front: "Чем изменяемые объекты отличаются от неизменяемых?"
    back: "Неизменяемые (int, str, tuple, frozenset) при «модификации» порождают новый объект. Изменяемые (list, dict, set) меняются на месте, сохраняя идентичность (id)."
    tags: [mutability]
  - id: objects-and-references-07
    front: "Почему n += 1 для int меняет id, а nums += [3] для списка - нет?"
    back: "Для int += создаёт новый объект и перевешивает имя - id меняется. Для списка += это extend на месте, объект тот же, id сохраняется. Один оператор ведёт себя по-разному."
    tags: [mutability, augmented-assignment]
  - id: objects-and-references-08
    front: "Чем поверхностная копия отличается от глубокой?"
    back: "Поверхностная (a[:], list(a), a.copy()) дублирует внешний контейнер, но вложенные объекты остаются общими. Глубокая (copy.deepcopy) рекурсивно дублирует всё содержимое."
    tags: [copy, deepcopy]
  - id: objects-and-references-09
    front: "Почему изменяемый аргумент по умолчанию - классическая ловушка?"
    back: "Значение по умолчанию вычисляется один раз при определении функции, а не при каждом вызове. Список bucket=[] живёт между вызовами и накапливает данные. Лекарство - bucket=None и создание списка внутри."
    tags: [pitfall, default-argument]
  - id: objects-and-references-10
    front: "Можно ли полагаться на конкретные значения id()?"
    back: "Нет. Гарантируются лишь уникальность и постоянство id на время жизни объекта. После смерти объекта его id может быть переиспользован. Полагайтесь только на сравнение id(a) == id(b), что делает is."
    tags: [identity, id]
