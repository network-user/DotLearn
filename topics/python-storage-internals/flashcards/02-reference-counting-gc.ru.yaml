conceptId: reference-counting-gc
cards:
  - id: reference-counting-gc-01
    front: "Как CPython управляет памятью с помощью подсчёта ссылок?"
    back: "Каждый объект хранит счётчик ссылок: ссылка добавилась - +1, исчезла - -1. Как только счётчик дойдёт до нуля, объект уничтожается немедленно, а память возвращается."
    tags: [refcount]
  - id: reference-counting-gc-02
    front: "Какие операции увеличивают, а какие уменьшают счётчик ссылок?"
    back: "Увеличивают: присваивание имени, добавление в список или словарь, передача в функцию. Уменьшают: выход имени из области видимости, del, переназначение имени, удаление из контейнера."
    tags: [refcount]
  - id: reference-counting-gc-03
    front: "Почему sys.getrefcount показывает на единицу больше ожидаемого?"
    back: "Сам аргумент x функции getrefcount - это ещё одна временная ссылка на объект на время вызова. Поэтому от результата вычитают 1; полагаться надо на разницу значений, а не на абсолют."
    tags: [refcount, getrefcount]
  - id: reference-counting-gc-04
    front: "Уничтожает ли del x объект?"
    back: "Нет. del x убирает имя x и уменьшает счётчик на единицу. Объект уничтожается, только когда исчезнет последняя ссылка и счётчик дойдёт до нуля."
    tags: [del, refcount]
  - id: reference-counting-gc-05
    front: "Почему подсчёт ссылок не справляется с циклами?"
    back: "Если два объекта ссылаются друг на друга, их счётчики остаются равными 1 даже после удаления всех внешних имён. Они держат друг друга живыми, хотя программе недостижимы - это утечка памяти."
    tags: [cycles, leak]
  - id: reference-counting-gc-06
    front: "Зачем CPython нужен сборщик мусора в модуле gc, если есть подсчёт ссылок?"
    back: "Подсчёт ссылок мгновенно убирает большинство мусора, но не видит циклы. Трассирующий сборщик gc периодически находит недостижимые циклы (достижимые только изнутри себя) и уничтожает их."
    tags: [gc]
  - id: reference-counting-gc-07
    front: "Как работает сборка по поколениям?"
    back: "Гипотеза: большинство объектов умирает молодыми. Новые объекты в поколении 0 проверяются часто; пережившие переходят в поколения 1 и 2, которые проверяются всё реже. Это снижает накладные расходы."
    tags: [gc, generations]
  - id: reference-counting-gc-08
    front: "Что такое weakref и чем он полезен?"
    back: "Слабая ссылка указывает на объект, не увеличивая счётчик. Объект может умереть, несмотря на неё; после этого ref() возвращает None. Полезна в кэшах и для разрыва циклов."
    tags: [weakref]
  - id: reference-counting-gc-09
    front: "Почему критичные ресурсы нельзя освобождать через __del__?"
    back: "Объект в недостижимом цикле уничтожит сборщик gc когда-нибудь, а не сразу, поэтому __del__ может не вызваться вовремя. Файлы и сокеты освобождайте явно через with или close()."
    tags: [del, pitfall]
  - id: reference-counting-gc-10
    front: "Как связаны GIL и подсчёт ссылок в CPython?"
    back: "Счётчик меняется на каждое присваивание и должен быть атомарным. GIL гарантирует, что байткод исполняет только один поток, поэтому операции со счётчиком не требуют дорогой синхронизации - одна из причин существования GIL."
    tags: [gil]
