conceptId: dict-and-set-internals
cards:
  - id: dict-and-set-internals-01
    front: "Почему поиск по ключу в dict почти не зависит от размера словаря?"
    back: "Словарь - это хеш-таблица: индекс ячейки вычисляется из hash() ключа, поэтому поиск идёт прямо в нужную ячейку без перебора, за постоянное в среднем время O(1)."
    tags: [hash-table]
  - id: dict-and-set-internals-02
    front: "Как хеш-таблица превращает ключ в адрес ячейки?"
    back: "Берётся hash() ключа, большое число хеша превращается в индекс бакета (грубо - остаток от деления на размер таблицы), и пара кладётся туда. Поиск повторяет вычисление и сразу попадает в ячейку."
    tags: [hash, bucket]
  - id: dict-and-set-internals-03
    front: "Почему list нельзя использовать как ключ словаря?"
    back: "Ключ должен быть хешируемым и неизменяемым. Изменяемый list сменил бы хеш, и таблица «потеряла» бы его - падает с TypeError: unhashable type. Для составного ключа берут tuple."
    tags: [hashable, key]
  - id: dict-and-set-internals-04
    front: "Что такое коллизия и как Python её разрешает?"
    back: "Коллизия - когда двум разным ключам достаётся один индекс (она неизбежна). Python использует открытую адресацию: при занятой ячейке по детерминированному правилу пробуется следующая свободная (пробирование)."
    tags: [collision, open-addressing]
  - id: dict-and-set-internals-05
    front: "Что такое нагрузочный фактор и ресайз словаря?"
    back: "Нагрузочный фактор - отношение «занято / всего ячеек». При заполнении примерно на две трети словарь делает ресайз: создаёт таблицу больше и перехеширует все ключи. Отдельная вставка дороже, но в среднем быстро."
    tags: [load-factor, resize]
  - id: dict-and-set-internals-06
    front: "Как устроен компактный словарь Python 3.6+?"
    back: "Хранение разделено: плотный массив entries хранит пары в порядке вставки без дыр, а разрежённая таблица индексов держит лишь маленькие индексы в entries. Даёт быстрый поиск, порядок вставки и экономию памяти."
    tags: [compact-dict]
  - id: dict-and-set-internals-07
    front: "С какой версии сохранение порядка вставки в dict - гарантия языка?"
    back: "С 3.6 CPython перешёл на компактный dict как деталь реализации, а с 3.7 сохранение порядка вставки стало гарантией языка. Порядок - это порядок вставки, не сортировка и не порядок хешей."
    tags: [insertion-order]
  - id: dict-and-set-internals-08
    front: "Чем set отличается от dict по устройству?"
    back: "set - та же хеш-таблица, но хранит только ключи без значений. Даёт быструю проверку членства, требует хешируемых элементов и исключает дубликаты, но не гарантирует никакого порядка."
    tags: [set]
  - id: dict-and-set-internals-09
    front: "Почему в множестве {3, 1, 2, 3, 1} остаётся только три элемента?"
    back: "Повторы ведут в уже занятые своими же значениями ячейки хеш-таблицы, поэтому дубликаты схлопываются. len() будет 3."
    tags: [set, duplicates]
  - id: dict-and-set-internals-10
    front: "Почему повторный hash() строки дёшев, а len(d) мгновенен?"
    back: "CPython кеширует хеш строки внутри объекта - повторный hash не пересчитывается. len(d) мгновенен, потому что словарь хранит счётчик элементов отдельно и не обходит их."
    tags: [hash-cache, len]
