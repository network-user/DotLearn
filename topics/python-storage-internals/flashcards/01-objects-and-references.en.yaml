conceptId: objects-and-references
cards:
  - id: objects-and-references-01
    front: "What is a variable in Python from the object model's point of view?"
    back: "A name (reference) stuck on an object, not a container holding a value. Assignment binds a name to an object without copying; several names can point at one object."
    tags: [references, names]
  - id: objects-and-references-02
    front: "What three things does every Python object have?"
    back: "Type, value, and identity: a unique 'address' that does not change for the object's lifetime. id() returns identity; in CPython that is the object's address in memory."
    tags: [identity]
  - id: objects-and-references-03
    front: "How do is and == differ?"
    back: "is compares identity: whether it is the same object (whether id() values match). == compares values by calling __eq__. Lists [1,2,3] and [1,2,3] are equal by == but not by is."
    tags: [is, equality]
  - id: objects-and-references-04
    front: "Why is None checked with is None, not == None?"
    back: "None exists in a single instance, and is checks identity directly without calling __eq__, which a foreign object could lie about."
    tags: [none, is]
  - id: objects-and-references-05
    front: "What is aliasing and why is it dangerous?"
    back: "Two names point at one mutable object, so a change through one name is visible through the other. After y = x, calling y.append(4) changes x too: one object, two names."
    tags: [aliasing]
  - id: objects-and-references-06
    front: "How do mutable objects differ from immutable ones?"
    back: "Immutable ones (int, str, tuple, frozenset) create a new object when 'modified'. Mutable ones (list, dict, set) change in place while keeping identity (id)."
    tags: [mutability]
  - id: objects-and-references-07
    front: "Why does n += 1 for int change id but nums += [3] for a list does not?"
    back: "For int, += creates a new object and rebinds the name: id changes. For a list, += is in-place extend, same object, id preserved. One operator behaves differently."
    tags: [mutability, augmented-assignment]
  - id: objects-and-references-08
    front: "How does a shallow copy differ from a deep copy?"
    back: "A shallow copy (a[:], list(a), a.copy()) duplicates the outer container but nested objects stay shared. A deep copy (copy.deepcopy) recursively duplicates all contents."
    tags: [copy, deepcopy]
  - id: objects-and-references-09
    front: "Why is a mutable default argument a classic trap?"
    back: "The default value is computed once when the function is defined, not on every call. The list bucket=[] lives between calls and accumulates data. Fix: bucket=None and create the list inside."
    tags: [pitfall, default-argument]
  - id: objects-and-references-10
    front: "Can you rely on specific id() values?"
    back: "No. Only uniqueness and constancy for the object's lifetime are guaranteed. After an object dies its id may be reused. Rely only on comparing id(a) == id(b), which is what is does."
    tags: [identity, id]
