conceptId: memory-layout-optimizations
cards:
  - id: memory-layout-optimizations-01
    front: "Что делает __slots__ и зачем он нужен?"
    back: "Заменяет личный словарь __dict__ экземпляра компактным набором фиксированных ячеек под заранее перечисленные имена. Экономит память на массовых мелких объектах (миллионы узлов, точек, записей)."
    tags: [slots]
  - id: memory-layout-optimizations-02
    front: "Чем платят за __slots__?"
    back: "Потерей гибкости: незаявленный атрибут присвоить нельзя, будет AttributeError, потому что складывать его больше некуда. Также конфликтует с некоторыми паттернами множественного наследования."
    tags: [slots, pitfall]
  - id: memory-layout-optimizations-03
    front: "Когда __slots__ применять не стоит?"
    back: "На немногочисленных объектах выигрыш близок к нулю, а гибкость теряется. Это инструмент для массовых мелких экземпляров, а не стиль по умолчанию."
    tags: [slots]
  - id: memory-layout-optimizations-04
    front: "Почему a = 10; b = 10 даёт a is b == True, а для 1000 - False?"
    back: "CPython заранее кеширует мелкие целые от -5 до 256, поэтому все 10 - один объект. Число 1000 вне кеша - два разных объекта с одинаковым значением. Это деталь реализации, сравнивайте через ==."
    tags: [int-cache, is]
  - id: memory-layout-optimizations-05
    front: "Что такое интернирование строк?"
    back: "CPython хранит короткие строки, похожие на идентификаторы, в единственном экземпляре, чтобы сравнение и использование как ключей было быстрее. Как и кеш целых - оптимизация под капотом, не контракт."
    tags: [interning]
  - id: memory-layout-optimizations-06
    front: "Почему append амортизированно O(1), несмотря на переезды списка?"
    back: "Список выделяет память с запасом: ёмкость больше длины. Пока запас есть, append кладёт элемент за O(1). При исчерпании запаса ёмкость растёт кратно и список переезжает один раз - и надолго."
    tags: [list-growth, append]
  - id: memory-layout-optimizations-07
    front: "Чем рост на 1 элемент хуже кратного роста ёмкости?"
    back: "Рост на 1 копировал бы весь список при каждом append - суммарно 1+2+...+n, то есть O(n²). Кратный рост делает переезды редкими, суммарно n вставок стоят O(n), то есть амортизированный O(1)."
    tags: [list-growth, complexity]
  - id: memory-layout-optimizations-08
    front: "Чем tuple отличается от list по раскладке в памяти?"
    back: "tuple фиксирован и не имеет запаса ёмкости: занимает ровно нужное и потому компактнее списка. Но «добавление» к нему всегда создаёт новый объект."
    tags: [tuple]
  - id: memory-layout-optimizations-09
    front: "Зачем нужен deque и чем он лучше списка для очереди?"
    back: "deque - двусторонняя очередь на блоках связанной памяти: вставка и удаление с обоих концов за O(1). У списка insert(0, x) сдвигает все элементы и стоит O(n)."
    tags: [deque, collections]
  - id: memory-layout-optimizations-10
    front: "Что дают Counter и defaultdict из collections?"
    back: "Counter - словарь-счётчик частот без ручной проверки «есть ли ключ». defaultdict - словарь с фабрикой значений по умолчанию: обращение к новому ключу само создаёт пустой список или число, избавляя от if key not in d."
    tags: [counter, defaultdict, collections]
