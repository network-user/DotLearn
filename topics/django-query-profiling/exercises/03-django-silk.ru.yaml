exercises:
  - id: silk-what-is-001
    concept: django-silk
    type: theory-quiz
    difficulty: 1
    prompt: "Как django-silk встраивается в Django и что он перехватывает?"
    choices:
      - id: a
        text: "Это middleware: оно оборачивает обработку HTTP-запроса и перехватывает все SQL за это время, включая запросы из шаблонов и сериализаторов."
      - id: b
        text: "Это менеджер базы, который переписывает запросы перед отправкой - полный набор ролей в этой архитектуре как полное описание этого поведения."
      - id: c
        text: "Это команда manage.py, которая один раз сканирует код на N+1, во всех сценариях без дополнительной настройки."
      - id: d
        text: "Это плагин браузера, читающий SQL из заголовков ответа; другого корректного поведения система не допускает."
    correct: [a]
    explanation: "silk - это middleware. Оно садится в конвейер обработки запроса, засекает время на входе, ловит каждый выполненный SQL и фиксирует результат на выходе - для всего пути сразу."
    variants:
      - prompt: "Почему silk видит даже те запросы, что рождаются в шаблоне и сериализаторе?"
        choices:
          - id: a
            text: "Потому что как middleware он оборачивает всю обработку HTTP-запроса, а шаблон и сериализатор выполняются внутри неё."
          - id: b
            text: "Потому что он патчит сам класс шаблона при импорте, во всех сценариях без дополнительной настройки."
          - id: c
            text: "Потому что шаблоны обязаны регистрировать свои запросы в silk вручную как полное описание этого поведения."
          - id: d
            text: "Потому что он читает запросы из лога базы данных постфактум как полное описание этого поведения."
        correct: [a]
        explanation: "silk - middleware вокруг всей обработки запроса. Шаблон и сериализатор выполняются внутри этого окна, поэтому их SQL попадает в профиль без правок в коде вью."
      - prompt: "Где silk хранит снятые профили запросов?"
        choices:
          - id: a
            text: "В своих таблицах в базе данных - по записи на каждый HTTP-запрос."
          - id: b
            text: "В оперативной памяти процесса, теряя их при перезапуске."
          - id: c
            text: "В заголовках HTTP-ответа как полное описание этого поведения."
          - id: d
            text: "В отдельном лог-файле в формате JSON как полное описание этого поведения."
        correct: [a]
        explanation: "silk пишет профиль в собственные таблицы в базе - поэтому для него нужны миграции, и поэтому в проде он сам становится источником запросов."

  - id: silk-setup-steps-001
    concept: django-silk
    type: theory-quiz
    difficulty: 2
    prompt: "Какие три шага нужны, чтобы подключить silk и открыть его интерфейс?"
    choices:
      - id: a
        text: "Добавить `\"silk\"` в INSTALLED_APPS, вставить SilkyMiddleware в MIDDLEWARE, прогнать миграции и подключить URL `/silk/`."
      - id: b
        text: "Только установить пакет pip - остальное silk настраивает сам при первом запросе как полное описание этого поведения."
      - id: c
        text: "Добавить декоратор @silk на каждую вью, которую хотите профилировать как полное описание этого поведения."
      - id: d
        text: "Прописать silk в DATABASES как отдельное соединение, при буквальном чтении этого вызова."
    correct: [a]
    explanation: "Подключение - три правки в настройках: приложение в INSTALLED_APPS, SilkyMiddleware в MIDDLEWARE, плюс миграции для его таблиц и URL-ы для интерфейса по адресу /silk/."
    hints:
      - "silk - это приложение Django с собственными таблицами и интерфейсом. Что нужно сделать, чтобы Django знал о приложении, пропускал через него запросы и показывал UI?"

  - id: silk-queries-column-001
    concept: django-silk
    type: theory-quiz
    difficulty: 2
    prompt: "В списке запросов silk у одного эндпоинта в колонке Queries стоит 101. О чём это говорит ещё до открытия деталей?"
    choices:
      - id: a
        text: "Это автоматический счётчик запросов на весь путь обработки; большое число - кандидат на N+1 (один запрос за списком и сотня за связью)."
      - id: b
        text: "Эндпоинт вернул 101 строку данных, на любом пути обработки запроса или оговорок. Иной интерпретации не требуется."
      - id: c
        text: "У запроса HTTP-статус 101, на любом пути обработки запроса или оговорок. Иной интерпретации не требуется."
      - id: d
        text: "Эндпоинт вызывали 101 раз, на любом пути обработки запроса или оговорок. Иной интерпретации не требуется."
    correct: [a]
    explanation: "Колонка Queries - число SQL-запросов за этот HTTP-запрос, то есть автоматический счётчик на весь путь. Значение 101 - характерная подпись N+1: 1 запрос за списком и 100 за связанными объектами."
    hints:
      - "Эта колонка считает не строки данных и не вызовы, а нечто, что мы изучали как главный сигнал N+1."

  - id: silk-read-trace-001
    concept: django-silk
    type: theory-quiz
    difficulty: 3
    prompt: "В деталях запроса silk показывает 100 почти одинаковых SELECT по customers, различающихся только id в WHERE, и у всех одинаковый стек-трейс. Что это значит и куда ведёт трейс?"
    choices:
      - id: a
        text: "Это подпись N+1: один и тот же запрос повторён с разными ключами. Одинаковый стек-трейс указывает на единственную строку кода - место ленивого доступа к связи, которое надо чинить."
      - id: b
        text: "Это нормально: silk дублирует один запрос в журнале для надёжности; другого корректного поведения система не допускает. Иной интерпретации не требуется."
      - id: c
        text: "Это один тяжёлый запрос, разбитый silk на части для отображения; другого корректного поведения система не допускает. Иной интерпретации не требуется."
      - id: d
        text: "Стек-трейс случаен и для диагностики бесполезен; другого корректного поведения система не допускает. Иной интерпретации не требуется."
    correct: [a]
    explanation: "Десятки идентичных SELECT с разным id - классический N+1. Одинаковый стек-трейс приводит к той самой строке в шаблоне или сериализаторе, где происходит ленивый доступ к связи, - именно её и нужно исправить предзагрузкой."
    hints:
      - "Много почти одинаковых SELECT, отличающихся только ключом в WHERE, - о каком паттерне это говорит?"
      - "Стек-трейс показывает, откуда в вашем коде ушёл запрос. Если у сотни запросов он один и тот же, к чему это вас приводит?"

  - id: silk-overhead-001
    concept: django-silk
    type: theory-quiz
    difficulty: 3
    prompt: "Инженер оптимизировал эндпоинт по профилю silk, но в проде без silk абсолютные миллисекунды другие. Чему в профиле silk можно доверять, а чему - нет?"
    choices:
      - id: a
        text: "Числу запросов доверять можно (свои SQL silk не приписывает), времени - нет: silk пишет в БД."
      - id: b
        text: "И числу, и времени доверять нельзя - silk искажает обе метрики одинаково сильно."
      - id: c
        text: "Абсолютному времени доверять можно, а число запросов silk всегда округляет вниз."
      - id: d
        text: "Доверять можно всему: silk вообще не влияет на измерения эндпоинта."
    correct: [a]
    explanation: "silk сам пишет профиль в базу на каждый запрос, поэтому абсолютное время завышено. Но число запросов приложения он считает точно - служебные запросы не приписываются вашему вью. Время используйте для сравнения «до и после» в одном окружении, а не как абсолютную истину."
    hints:
      - "Профайлер, который сам пишет в базу, добавляет работу. На какую из метрик - число запросов или абсолютное время - это влияет?"
      - "Что в измерениях остаётся надёжным, если служебные запросы silk не смешиваются с запросами вашего вью?"

  - id: silk-sort-strategy-001
    concept: django-silk
    type: theory-quiz
    difficulty: 3
    prompt: "По какой колонке списка запросов silk удобнее всего искать N+1 и почему именно по ней, а не по времени?"
    choices:
      - id: a
        text: "По Queries (числу запросов) по убыванию: N+1 проявляется как большое число запросов, а суммарное время сотни быстрых запросов может казаться терпимым, пока данных мало."
      - id: b
        text: "По времени по убыванию: N+1 всегда самый медленный эндпоинт; другого корректного поведения система не допускает. Иной интерпретации не требуется."
      - id: c
        text: "По пути (Path) по алфавиту: так быстрее найти нужный URL; другого корректного поведения система не допускает. Иной интерпретации не требуется."
      - id: d
        text: "По HTTP-статусу: N+1 всегда даёт статус 500, на любом пути обработки запроса или оговорок. Иной интерпретации не требуется."
    correct: [a]
    explanation: "Сортировка по числу запросов сразу выводит наверх кандидатов на N+1. Время - менее ранний сигнал: сто быстрых запросов по отдельности кажутся быстрыми, и суммарное время маскирует проблему, пока данных немного."
    hints:
      - "N+1 - это в первую очередь про число запросов, а не про время одного. Какая колонка показывает этот сигнал раньше всего?"
      - "Почему сто быстрых запросов могут не выделиться по колонке времени, но сразу видны по числу?"

  - id: silk-vs-toolbar-001
    concept: django-silk
    type: theory-quiz
    difficulty: 4
    prompt: "Команда профилирует REST-API без HTML-страниц. Почему здесь silk обычно удобнее django-debug-toolbar?"
    choices:
      - id: a
        text: "toolbar прибит к HTML страницы (у API её нет); silk пишет историю в БД и даёт отдельный UI."
      - id: b
        text: "toolbar не умеет считать SQL-запросы вообще, поэтому для API бесполезен."
      - id: c
        text: "silk быстрее toolbar под нагрузкой и его можно держать в проде на 100%."
      - id: d
        text: "toolbar работает только с PostgreSQL, а API обычно на других СУБД."
    correct: [a]
    explanation: "debug-toolbar прибита к HTML-странице и показывает запросы текущей отрисовки - для API, где страницы нет, это неудобно. silk хранит журнал запросов в базе и даёт отдельный интерфейс, который можно листать и сортировать, в том числе для запросов с других машин."
    hints:
      - "Главное различие - к чему привязан вывод инструмента. У debug-toolbar это конкретная HTML-страница. Что есть у REST-API вместо страницы?"
      - "Подумайте, как каждый инструмент показывает результат: один встроен в страницу, другой ведёт отдельный журнал. Какой подходит, когда страницы нет?"
