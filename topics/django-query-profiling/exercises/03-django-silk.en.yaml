exercises:
  - id: silk-what-is-001
    concept: django-silk
    type: theory-quiz
    difficulty: 1
    prompt: "How does django-silk integrate with Django and what does it intercept?"
    choices:
      - id: a
        text: "It is middleware: it wraps HTTP request handling and intercepts all SQL during that time, including queries from templates and serializers."
      - id: b
        text: "It is a database manager that rewrites queries before sending them."
      - id: c
        text: "It is a manage.py command that scans code once for N+1."
      - id: d
        text: "It is a browser plugin that reads SQL from response headers."
    correct: [a]
    explanation: "silk is middleware. It sits in the request pipeline, starts timing on entry, catches every executed SQL statement, and records the result on exit - for the whole path at once."
    variants:
      - prompt: "Why does silk see queries that originate in templates and serializers?"
        choices:
          - id: a
            text: "As middleware it wraps the entire HTTP request; templates and serializers run inside that window."
          - id: b
            text: "Because it patches the template class itself on import."
          - id: c
            text: "Because templates must manually register their queries with silk."
          - id: d
            text: "Because it reads queries from the database log afterward."
        correct: [a]
        explanation: "silk is middleware around the whole request. Templates and serializers run inside that window, so their SQL lands in the profile without view code changes."
      - prompt: "Where does silk store captured request profiles?"
        choices:
          - id: a
            text: "In its own database tables - one record per HTTP request."
          - id: b
            text: "In process memory, lost on restart."
          - id: c
            text: "In HTTP response headers."
          - id: d
            text: "In a separate JSON log file."
        correct: [a]
        explanation: "silk writes profiles to its own database tables - which is why it needs migrations and why in production it becomes a source of queries itself."

  - id: silk-setup-steps-001
    concept: django-silk
    type: theory-quiz
    difficulty: 2
    prompt: "What three steps are needed to connect silk and open its UI?"
    choices:
      - id: a
        text: "Add `\"silk\"` to INSTALLED_APPS, insert SilkyMiddleware in MIDDLEWARE, run migrations, and wire URL `/silk/`."
      - id: b
        text: "Only pip install the package - silk configures itself on first request."
      - id: c
        text: "Add a @silk decorator to every view you want to profile."
      - id: d
        text: "Put silk in DATABASES as a separate connection."
    correct: [a]
    explanation: "Setup is three settings changes: app in INSTALLED_APPS, SilkyMiddleware in MIDDLEWARE, plus migrations for its tables and URLs for the UI at /silk/."
    hints:
      - "silk is a Django app with its own tables and UI. What must you do so Django knows about the app, routes requests through it, and shows the UI?"

  - id: silk-queries-column-001
    concept: django-silk
    type: theory-quiz
    difficulty: 2
    prompt: "In silk's request list one endpoint shows 101 in the Queries column. What does that tell you before opening details?"
    choices:
      - id: a
        text: "It is an automatic query counter for the whole request path; a large number is an N+1 candidate (one query for the list and a hundred for the relation)."
      - id: b
        text: "The endpoint returned 101 data rows."
      - id: c
        text: "The HTTP status is 101."
      - id: d
        text: "The endpoint was called 101 times."
    correct: [a]
    explanation: "The Queries column is the number of SQL statements for that HTTP request - an automatic counter for the whole path. 101 is a classic N+1 signature: 1 for the list and 100 for related objects."
    hints:
      - "This column counts not data rows or call counts but something we studied as the main N+1 signal."

  - id: silk-read-trace-001
    concept: django-silk
    type: theory-quiz
    difficulty: 3
    prompt: "In request details silk shows 100 nearly identical SELECTs on customers differing only by id in WHERE, all with the same stack trace. What does that mean and where does the trace lead?"
    choices:
      - id: a
        text: "This is an N+1 signature: the same query repeated with different keys. The identical stack trace points to the single line of lazy relation access that must be fixed."
      - id: b
        text: "This is normal: silk duplicates one query in the log for reliability."
      - id: c
        text: "This is one heavy query split by silk for display."
      - id: d
        text: "The stack trace is random and useless for diagnosis."
    correct: [a]
    explanation: "Dozens of identical SELECTs with different ids are classic N+1. The identical stack trace leads to the template or serializer line where lazy relation access happens - exactly what prefetching must fix."
    hints:
      - "Many nearly identical SELECTs differing only by key in WHERE - what pattern does that indicate?"
      - "The stack trace shows where in your code the query was issued. If a hundred queries share it, where does that lead you?"

  - id: silk-overhead-001
    concept: django-silk
    type: theory-quiz
    difficulty: 3
    prompt: "An engineer optimized an endpoint from a silk profile, but absolute milliseconds differ in production without silk. What can you trust in a silk profile and what not?"
    choices:
      - id: a
        text: "Application query count is trustworthy - silk counts it accurately and does not attribute its own service queries to your view. Absolute time is not: silk writes to the database on every request and inflates milliseconds."
      - id: b
        text: "Neither count nor time is trustworthy - silk distorts everything."
      - id: c
        text: "Absolute time is trustworthy; silk rounds query count."
      - id: d
        text: "Everything is trustworthy: silk does not affect measurements."
    correct: [a]
    explanation: "silk writes profiles to the database on every request, so absolute time is inflated. But application query count is accurate - service queries are not attributed to your view. Use time for before/after comparison in one environment, not as absolute truth."
    hints:
      - "A profiler that writes to the database adds work. Which metric - query count or absolute time - does that affect?"
      - "What stays reliable if silk service queries are not mixed with your view queries?"

  - id: silk-sort-strategy-001
    concept: django-silk
    type: theory-quiz
    difficulty: 3
    prompt: "Which column in silk's request list is best for finding N+1 and why that one instead of time?"
    choices:
      - id: a
        text: "Queries (query count) descending: N+1 shows up as a large query count, while total time of many fast queries can look tolerable while data is still small."
      - id: b
        text: "Time descending: N+1 is always the slowest endpoint."
      - id: c
        text: "Path alphabetically: fastest way to find a URL."
      - id: d
        text: "HTTP status: N+1 always returns 500."
    correct: [a]
    explanation: "Sorting by query count immediately surfaces N+1 candidates. Time is a weaker early signal: a hundred fast queries each look fast, and total time masks the problem while data is still small."
    hints:
      - "N+1 is primarily about query count, not single-query time. Which column shows that signal earliest?"
      - "Why might a hundred fast queries not stand out in the time column but be obvious in the count column?"

  - id: silk-vs-toolbar-001
    concept: django-silk
    type: theory-quiz
    difficulty: 4
    prompt: "A team profiles a REST API with no HTML pages. Why is silk usually more convenient than django-debug-toolbar here?"
    choices:
      - id: a
        text: "toolbar is a panel attached to an HTML page and shows queries for the current rendered page; an API has no page. silk stores request history in the database and shows it in a separate UI you can browse and sort."
      - id: b
        text: "toolbar cannot count SQL queries at all."
      - id: c
        text: "silk is faster under load than toolbar and can run in production on 100% of requests."
      - id: d
        text: "toolbar works only with PostgreSQL while APIs usually use other databases."
    correct: [a]
    explanation: "debug-toolbar is tied to an HTML page and shows queries for the current render - awkward for an API with no page. silk stores a request journal in the database and provides a separate UI you can browse and sort, including requests from other machines."
    hints:
      - "The main difference is what each tool's output is attached to. For debug-toolbar that is a specific HTML page. What does a REST API have instead of a page?"
      - "Think about how each tool shows results: one embedded in a page, the other keeping a separate journal. Which fits when there is no page?"
