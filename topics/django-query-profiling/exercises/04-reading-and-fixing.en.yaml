exercises:
  - id: fix-method-by-relation-001
    concept: reading-and-fixing
    type: theory-quiz
    difficulty: 1
    prompt: "Which queryset method prefetches a to-one relation (ForeignKey, OneToOne) to collapse N+1 into one query?"
    choices:
      - id: a
        text: "select_related - it folds a to-one relation into a JOIN in the same query."
      - id: b
        text: "prefetch_related - it runs a separate query for the relation and stitches results in Python."
      - id: c
        text: "only - it limits loaded fields."
      - id: d
        text: "annotate - it adds a computed field to each row."
    correct: [a]
    explanation: "For a to-one relation each object has exactly one related row, so a JOIN does not multiply rows and everything fits in one query. That is what select_related does."
    variants:
      - prompt: "Which queryset method prefetches a to-many relation (ManyToMany, reverse ForeignKey)?"
        choices:
          - id: a
            text: "prefetch_related - it runs a separate query for all related objects and stitches them by key in Python."
          - id: b
            text: "select_related - it folds any relation into a JOIN for every request path in the app."
          - id: c
            text: "values_list - it returns the relation as a flat tuple list for any payload and any deploy target."
          - id: d
            text: "distinct - it removes duplicate rows after a JOIN for any payload and any deploy target."
        correct: [a]
        explanation: "For a to-many relation a JOIN would multiply rows as a Cartesian product. So prefetch_related runs a second query for all related rows at once and stitches them in Python."
      - prompt: "Order.customer is a ForeignKey. Which method collapses its prefetch into one query?"
        choices:
          - id: a
            text: "select_related(\"customer\") - the to-one relation is pulled in via JOIN in the same query."
          - id: b
            text: "prefetch_related(\"customer\") - ForeignKeys are always loaded with a second query."
          - id: c
            text: "defer(\"customer\") - delays loading the field until first access."
          - id: d
            text: "None: a ForeignKey cannot be prefetched."
        correct: [a]
        explanation: "Order.customer is a ForeignKey, a to-one relation. Each order has one customer, so a JOIN does not multiply rows and select_related collapses everything into one query."

  - id: fix-read-profile-001
    concept: reading-and-fixing
    type: theory-quiz
    difficulty: 2
    prompt: "In a silk profile an endpoint has 1 query `SELECT .. FROM customers` then 100 identical `SELECT .. FROM orders WHERE customer_id = ?`. The relation is reverse ForeignKey customer.orders. What do you apply?"
    choices:
      - id: a
        text: "prefetch_related(\"orders\"): reverse ForeignKey is to-many; it is loaded with a second query and count becomes 2 instead of 1+100."
      - id: b
        text: "select_related(\"orders\"): fold the reverse relation into a JOIN, without special-case setup for this flow."
      - id: c
        text: "Add an index on customers.id and leave code as is; the system does not allow any other correct behavior."
      - id: d
        text: "Nothing: 101 queries for a customer list is normal; the system does not allow any other correct behavior."
    correct: [a]
    explanation: "customer.orders is the reverse side of a ForeignKey, a to-many relation. A JOIN here would multiply rows, so prefetch_related is needed: one query for customers and one for all their orders via WHERE customer_id IN (..), total 2."
    hints:
      - "First identify relation shape: does one customer have many orders or exactly one? That determines the method."
    variants:
      - prompt: "Profile shows: 1 query `SELECT .. FROM orders` and 100 identical `SELECT .. FROM customers WHERE id = ?`. Relation is Order.customer (ForeignKey). What do you apply?"
        choices:
          - id: a
            text: "select_related(\"customer\"): to-one relation collapses into a JOIN and the whole list fits in one query."
          - id: b
            text: "prefetch_related(\"customer\"): run a second query for customers for every request path in the app."
          - id: c
            text: "Manually cache each customer in a dict by id as a complete account of that behavior."
          - id: d
            text: "Nothing: repeated SELECTs on customers are inevitable as a complete account of that behavior."
        correct: [a]
        explanation: "Order.customer is a ForeignKey, a to-one relation. Each order has one customer; a JOIN does not multiply rows, so select_related removes all 100 extra queries and leaves one."

  - id: fix-join-multiplies-001
    concept: reading-and-fixing
    type: theory-quiz
    difficulty: 3
    prompt: "Why can a to-many relation (reverse ForeignKey, ManyToMany) not use a single JOIN query like select_related?"
    choices:
      - id: a
        text: "A JOIN on a to-many relation multiplies rows: one customer with three orders becomes three result rows - a Cartesian product that pulls extra data and breaks grouping."
      - id: b
        text: "Such a JOIN is syntactically forbidden in SQL; the system does not allow any other correct behavior. No other reading is required."
      - id: c
        text: "select_related works only on tables with fewer than 1000 rows; the system does not allow any other correct behavior."
      - id: d
        text: "To-many relations live in a separate database unreachable for JOIN; the system does not allow any other correct behavior."
    correct: [a]
    explanation: "A customer with three orders yields three rows from a JOIN - a Cartesian product. So to-many relations are loaded with a separate query via prefetch_related and stitched by key in Python, not folded into a JOIN."
    hints:
      - "Imagine JOINing customers with their orders. How many result rows does one customer with five orders produce?"
      - "What happens to row count when each left row has several matches on the right?"

  - id: fix-prefetch-filter-trap-001
    concept: reading-and-fixing
    type: theory-quiz
    difficulty: 4
    prompt: "Code calls `Customer.objects.prefetch_related(\"orders\")`, but the loop accesses `customer.orders.filter(total__gt=100)`. The profiler shows N+1 returned. Why and how to fix?"
    choices:
      - id: a
        text: "filter(.) on a prefetched relation builds a new queryset and runs a separate query bypassing the prefetch cache - again one per customer"
      - id: b
        text: "prefetch_related never caches the relation, so any access always queries as a complete account of that behavior."
      - id: c
        text: "The problem is total__gt: numeric filters are incompatible with prefetch_related - that is how the API contract should be read."
      - id: d
        text: "Replace prefetch_related with select_related(\"orders\"), without special-case setup for this flow."
    correct: [a]
    explanation: "prefetch_related caches the full orders relation. But customer.orders.filter(..) is a new queryset with a different condition and Django runs it separately, bypassing the cache, once per customer. Fix by baking the filter in upfront with Prefetch(\"orders\", queryset=big_orders) so the condition lands in the second prefetch query. Filter upfront with Prefetch(\"orders\", queryset=..) so the condition goes into the second query."
    hints:
      - "prefetch_related caches the whole relation. What happens if inside the loop you ask the relation for a different filtered set?"
      - "Recall Prefetch: it lets you set the queryset for prefetch upfront, before the loop. Where does the filter condition go then?"

  - id: fix-select-related-sim-001
    concept: reading-and-fixing
    type: predict-output
    difficulty: 2
    prompt: "What does this program print? It models query count after select_related: a to-one relation collapses into a JOIN and the whole list fits in one query regardless of order count."
    snippet: |
      def queries_with_select_related(order_count):
          return 1

      print(queries_with_select_related(3))
      print(queries_with_select_related(100))
    expected:
      kind: stdout
      value: "1\n1"
    hints:
      - "select_related pulls the relation in the same query via JOIN. How many queries remain, and does that depend on order count?"
    variants:
      - snippet: |
          def queries_naive(order_count):
              return 1 + order_count

          def queries_select_related(order_count):
              return 1

          print(queries_naive(50))
          print(queries_select_related(50))
        expected:
          kind: stdout
          value: "51\n1"
      - snippet: |
          order_count = 4
          queries = 1
          for _ in range(order_count):
              pass
          print(queries)
        expected:
          kind: stdout
          value: "1"

  - id: fix-prefetch-related-sim-001
    concept: reading-and-fixing
    type: predict-output
    difficulty: 2
    prompt: "What does this program print? It models query count after prefetch_related: one query for the main list and one for all related objects at once - two queries regardless of row count."
    snippet: |
      def queries_with_prefetch(customer_count):
          return 2

      print(queries_with_prefetch(3))
      print(queries_with_prefetch(1000))
    expected:
      kind: stdout
      value: "2\n2"
    hints:
      - "prefetch_related runs a second query for all related objects via WHERE id IN (..). How many queries total and does that change with customer count?"
    variants:
      - snippet: |
          base_query = 1
          prefetch_query = 1
          total = base_query + prefetch_query
          print(total)
        expected:
          kind: stdout
          value: "2"
      - snippet: |
          def queries_naive(customer_count):
              return 1 + customer_count

          def queries_prefetch(customer_count):
              return 2

          print(queries_naive(10) - queries_prefetch(10))
        expected:
          kind: stdout
          value: "9"

  - id: fix-combined-sim-001
    concept: reading-and-fixing
    type: predict-output
    difficulty: 3
    prompt: "What does this program print? It models combining select_related (to-one, +0 queries via JOIN) and prefetch_related (to-many, +1 separate query) on top of one base query for orders."
    snippet: |
      base_query = 1
      select_related_extra = 0
      prefetch_related_extra = 1
      total = base_query + select_related_extra + prefetch_related_extra
      print(total)
    expected:
      kind: stdout
      value: "2"
    hints:
      - "select_related adds no separate query - the relation goes into the main JOIN. prefetch_related adds one. Add to the base query."
      - "One query for orders, customer folded into the same JOIN, line items loaded with a second query. How many total?"

  - id: fix-blanks-methods-001
    concept: reading-and-fixing
    type: fill-in-blanks
    difficulty: 1
    prompt: "Fill in the blanks: choose the prefetch method by relation shape."
    template: |
      An order references a customer via ForeignKey - a to-one relation,
      so it is folded into a JOIN with {{one_method}}.
      A customer has many orders (reverse ForeignKey) - a to-many relation,
      loaded with a separate query via {{many_method}}.
    blanks:
      one_method:
        accept: ["select_related"]
      many_method:
        accept: ["prefetch_related"]
    hints:
      - "To-one fits in a JOIN; to-many needs a separate query. Which method handles which shape?"
    variants:
      - template: |
          For Order.customer (ForeignKey) use {{one_method}},
          which adds a JOIN to customers in the same query.
          For Customer.orders (reverse ForeignKey) use
          {{many_method}}, which runs WHERE customer_id IN (..).
        blanks:
          one_method:
            accept: ["select_related"]
          many_method:
            accept: ["prefetch_related"]

  - id: fix-blanks-verify-001
    concept: reading-and-fixing
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the blanks in a test confirming N+1 is gone and query count stays constant."
    template: |
      def test_list_is_constant_queries(self):
          c = Customer.objects.create(name="Ada")
          Order.objects.create(customer=c, total=10)
          Order.objects.create(customer=c, total=20)
          with self.{{assertion}}({{expected}}):
              for o in Order.objects.{{preload}}("customer"):
                  _ = o.customer.name
    blanks:
      assertion:
        accept: ["assertNumQueries"]
      expected:
        accept: ["1"]
      preload:
        accept: ["select_related"]
    hints:
      - "The context manager locks exact query count. A to-one relation collapses into a JOIN, so one query remains regardless of order count."
      - "Two orders with one customer via JOIN give exactly one query - that is what the test locks."
    variants:
      - template: |
          def test_customers_with_orders_constant(self):
              c1 = Customer.objects.create(name="Ada")
              c2 = Customer.objects.create(name="Bob")
              Order.objects.create(customer=c1, total=10)
              Order.objects.create(customer=c2, total=20)
              with self.{{assertion}}({{expected}}):
                  for cust in Customer.objects.{{preload}}("orders"):
                      _ = list(cust.orders.all())
        blanks:
          assertion:
            accept: ["assertNumQueries"]
          expected:
            accept: ["2"]
          preload:
            accept: ["prefetch_related"]

  - id: fix-overprefetch-challenge-001
    concept: reading-and-fixing
    type: theory-quiz
    difficulty: 4
    prompt: "An engineer added `prefetch_related(\"items\")` to an order queryset to remove N+1. Query count dropped but the page got slower. The template does not render order line items. What went wrong?"
    choices:
      - id: a
        text: "Prefetch is not free: prefetch_related(\"items\") added a second query for data the template never uses"
      - id: b
        text: "prefetch_related always slows pages and should never be used; the system does not allow any other correct behavior. No other reading is required."
      - id: c
        text: "They should have used select_related(\"items\") - it is faster for any relation; the system does not allow any other correct behavior."
      - id: d
        text: "The slowdown is random and unrelated to prefetch; the system does not allow any other correct behavior. No other reading is required."
    correct: [a]
    explanation: "prefetch_related runs a separate query immediately even if the relation is never read. Loading items the template ignores added query and traffic for nothing. Prefetch only what code accesses; the profiler shows whether total query count dropped without growing payload. Prefetch only relations the code actually touches and verify loaded volume with the profiler."
    hints:
      - "prefetch_related runs the second query immediately. What if data loaded that way is never read?"
      - "Good prefetch criterion is not \"as many relations as possible\" but matching what code actually touches. How do you verify that?"
