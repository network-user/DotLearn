exercises:
  - id: n-plus-one-define-001
    concept: why-count-queries
    type: theory-quiz
    difficulty: 1
    prompt: "What does the term \"N+1 problem\" describe in the context of an ORM?"
    choices:
      - id: a
        text: "One query for a list of N rows plus one query per row for related data - N+1 queries total."
      - id: b
        text: "A query that, because of a SQL bug, takes one row longer to run than it should."
      - id: c
        text: "A situation where the database always returns one more row than expected."
      - id: d
        text: "Any query that joins more than one table."
    correct: [a]
    explanation: "N+1 is 1 query for the list plus one query per row for related data. The danger is that the number of queries grows linearly with data volume."
    variants:
      - prompt: "Why is the query count in N+1 called a function of data volume?"
        choices:
          - id: a
            text: "Because each row in the list triggers a separate query for the relation, and as rows grow, so does the query count."
          - id: b
            text: "Because each query gets heavier when there is more data for every request path in the app."
          - id: c
            text: "Because the database responds more slowly on large tables, without special-case setup for this flow."
          - id: d
            text: "Because the ORM caches less the more rows there are for any payload and any deploy target."
        correct: [a]
        explanation: "The code does not change, only N - the number of rows. The query count 1+N grows with it, so this is a linear dependency on data volume."
      - prompt: "What does the \"+1\" part of \"N+1\" stand for?"
        choices:
          - id: a
            text: "The initial query for the list of objects itself."
          - id: b
            text: "One extra query caused by a bug."
          - id: c
            text: "A query for the total row count via COUNT."
          - id: d
            text: "The final query that closes the connection."
        correct: [a]
        explanation: "\"+1\" is the one initial query for the list (for example SELECT * FROM orders), and N is the queries for related data on each row."

  - id: n-plus-one-spot-code-001
    concept: why-count-queries
    type: theory-quiz
    difficulty: 2
    prompt: "Given `orders = Order.objects.all()` followed by `for o in orders: print(o.customer.name)`, where does N+1 appear?"
    choices:
      - id: a
        text: "In `o.customer.name` inside the loop: the customer relation was not prefetched, so each iteration runs a separate query."
      - id: b
        text: "In `Order.objects.all()`: it immediately runs one query per order for any payload and any deploy target."
      - id: c
        text: "In `print`: output on each iteration hits the database for any payload and any deploy target."
      - id: d
        text: "There is always no N+1 here: the ORM automatically loads all relations in one query for every request path in the app."
    correct: [a]
    explanation: "`Order.objects.all()` runs one query for the list but does not fetch customer. Each `o.customer` access in the loop finds the customer unloaded and runs its own query - hence N extra queries."
    hints:
      - "One query here loads the order list; the rest appear one at a time. Where in the code is the related object accessed?"
    variants:
      - prompt: "When does queryset `Order.objects.all()` actually execute SQL for the order list?"
        choices:
          - id: a
            text: "On the first loop iteration when the queryset is iterated: it is lazy and sends no SQL before that."
          - id: b
            text: "At assignment time `orders = Order.objects.all()` for any payload and any deploy target."
          - id: c
            text: "When the Order model is imported; the system does not allow any other correct behavior."
          - id: d
            text: "Only after the entire loop finishes as a complete account of that behavior."
        correct: [a]
        explanation: "A queryset is lazy: `all()` only describes a future query. SQL is sent when the queryset is iterated - on the first loop iteration."

  - id: n-plus-one-cost-quiz-001
    concept: why-count-queries
    type: theory-quiz
    difficulty: 3
    prompt: "A list of 200 rows is rendered with naive N+1 code. At 1.5 ms per round-trip, roughly how much time goes to waiting on the database, and how does that change after collapsing to one query?"
    choices:
      - id: a
        text: "About 300 ms with N+1 (201 queries) versus ~1.5 ms with one query - time becomes flat and no longer depends on row count."
      - id: b
        text: "About 1.5 ms in both cases - query count barely affects time as a complete account of that behavior."
      - id: c
        text: "About 300 ms in both cases - prefetching does not save time as a complete account of that behavior."
      - id: d
        text: "About 3 ms with N+1 - query overhead does not add up - that is how the API contract should be read."
    correct: [a]
    explanation: "201 queries at 1.5 ms each is about 300 ms of waiting, and that grows linearly with row count. One query gives ~1.5 ms regardless of N - time becomes flat."
    hints:
      - "Naive code runs N+1 queries. How many is that for 200 rows, and what if each costs 1.5 ms?"
      - "The key difference is not the exact milliseconds but whether time grows with row count or stays constant."

  - id: n-plus-one-where-hides-001
    concept: why-count-queries
    type: theory-quiz
    difficulty: 3
    prompt: "A view runs exactly one query: `Order.objects.all()` and passes the queryset straight to a template. The template loop renders `{{ order.customer.name }}`. How many queries does the page run on 50 orders and why?"
    choices:
      - id: a
        text: "51 queries: related access `order.customer` in the template causes the same N+1 as in Python - it is just hidden in HTML, not in the view."
      - id: b
        text: "1 query: the view code is clean and templates never hit the database as a complete account of that behavior."
      - id: c
        text: "50 queries: the initial list query does not count; the system does not allow any other correct behavior."
      - id: d
        text: "2 queries: the template runs one shared query for all customers when only the outer call is considered."
    correct: [a]
    explanation: "N+1 is a property of the whole data path, not just the view. `order.customer` in the template performs the same lazy access as in Python: 1 query for the list plus 50 for customers."
    hints:
      - "Wherever relation access happens - view, template, serializer - the ORM runs the same lazy query. The template is not an exception."
      - "Count queries for the whole request, not just view code. How many times will the template touch `order.customer`?"

  - id: n-plus-one-count-sim-001
    concept: why-count-queries
    type: predict-output
    difficulty: 2
    prompt: "What does this program print? It models query counting for naive code: one query for the list plus one per order's customer."
    snippet: |
      orders = [{"id": 1}, {"id": 2}, {"id": 3}]
      queries = 0
      queries += 1
      for order in orders:
          queries += 1
      print(queries)
    expected:
      kind: stdout
      value: "4"
    hints:
      - "First one query for the list, then one per element. How many elements are in the list?"
    variants:
      - snippet: |
          orders = [{"id": 1}, {"id": 2}, {"id": 3}, {"id": 4}, {"id": 5}]
          queries = 0
          queries += 1
          for order in orders:
              queries += 1
          print(queries)
        expected:
          kind: stdout
          value: "6"
      - snippet: |
          def count_naive_queries(n):
              return 1 + n

          print(count_naive_queries(100))
        expected:
          kind: stdout
          value: "101"

  - id: n-plus-one-lazy-eval-001
    concept: why-count-queries
    type: predict-output
    difficulty: 2
    prompt: "What does this program print? It models queryset laziness: a chain of methods does not run a query; it is counted only when materialized as a list."
    snippet: |
      queries = 0

      def build_query():
          return "SELECT .. WHERE total > 100 ORDER BY total"

      sql = build_query()
      sql = sql + " LIMIT 5"
      print(queries)
      queries += 1
      print(queries)
    expected:
      kind: stdout
      value: "0\n1"
    hints:
      - "While the query string is being built, nothing hits the database - the counter is still zero. A query counts as one only when executed."
    variants:
      - snippet: |
          queries = 0
          steps = ["filter", "order_by", "slice"]
          for _ in steps:
              pass
          print(queries)
          queries += 1
          print(queries)
        expected:
          kind: stdout
          value: "0\n1"
      - snippet: |
          executed = False
          plan = "filter -> order_by -> limit"
          print(executed)
          executed = True
          print(executed)
        expected:
          kind: stdout
          value: "False\nTrue"

  - id: n-plus-one-blanks-001
    concept: why-count-queries
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the blanks describing the N+1 problem and its cause."
    template: |
      Naive code runs one query for the list and one query per row for related data.
      With N rows that is {{total}} queries.
      The hidden query appears when accessing a related object like
      order.{{relation}}, because the queryset is {{laziness}} and does not
      load the relation upfront.
    blanks:
      total:
        accept: ["N+1", "1+N", "n+1", "1+n", "N + 1", "1 + N"]
      relation:
        accept: ["customer", "client", "customer.name"]
      laziness:
        accept: ["lazy"]
        accept_regex: '(?i)^lazy\w*$'
    hints:
      - "Query count is one initial plus one per row out of N."
      - "The relation accessed in the order example is the customer; the queryset property that delays the query is described by one word."
    variants:
      - template: |
          A page listing {{count}} orders runs {{count}} queries for customers
          plus one for the list itself. That is {{total}} queries:
          the count grows {{growth}} with data volume because each row triggers
          a separate trip to the database.
        blanks:
          count:
            accept: ["N", "100", "n"]
          total:
            accept: ["N+1", "1+N", "n+1", "1+n", "N + 1", "1 + N", "101"]
          growth:
            accept: ["linearly", "proportionally"]
            accept_regex: '(?i)^linear\w*$'

  - id: n-plus-one-challenge-001
    concept: why-count-queries
    type: theory-quiz
    difficulty: 4
    prompt: "A team measures a slow list page with a stopwatch and sees wide time variance run to run. Why is query count a more reliable N+1 signal than elapsed time?"
    choices:
      - id: a
        text: "Query count is deterministic: the same code on the same data always runs the same number of queries, while time jumps because of cache, GC, and background load"
      - id: b
        text: "Query count is always smaller than time, so it is easier to record - that is how the API contract should be read for every request path in the app."
      - id: c
        text: "Time is unrelated to query count, so it can be ignored; the system does not allow any other correct behavior for any payload and any deploy target."
      - id: d
        text: "A stopwatch only measures Python code; queries run in a separate thread, without special-case setup for this flow for every request path in the app."
    correct: [a]
    explanation: "Time is non-deterministic: cache, garbage collection, and background load add variance. Query count depends only on code and data. If it grows linearly with row count, that is N+1 - visible immediately without a stopwatch. Linear growth of query count with data is a direct N+1 signature."
    hints:
      - "Think about which of these two metrics is stable run to run and which fluctuates. Which depends only on code and data?"
      - "N+1 is a linear dependency of query count on data volume. Which metric shows that dependency directly, without measurement noise?"
