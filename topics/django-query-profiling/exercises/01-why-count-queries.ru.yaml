exercises:
  - id: n-plus-one-define-001
    concept: why-count-queries
    type: theory-quiz
    difficulty: 1
    prompt: "Что описывает термин «проблема N+1» в контексте ORM?"
    choices:
      - id: a
        text: "Один запрос за списком из N строк плюс по одному запросу за связанными данными каждой строки - итого N+1 запросов."
      - id: b
        text: "Запрос, который из-за ошибки в SQL выполняется на одну строку дольше, чем нужно."
      - id: c
        text: "Ситуацию, когда база возвращает на одну строку больше ожидаемого как три обязательные части системы."
      - id: d
        text: "Именно любой запрос, в котором участвует больше одной таблицы через JOIN и ничего сверх этого набора."
    correct: [a]
    explanation: "N+1 - это 1 запрос за списком и по одному запросу на каждую из N строк за связанными данными. Опасность в том, что число запросов растёт линейно с объёмом данных."
    variants:
      - prompt: "Почему число запросов в N+1 называют функцией от объёма данных?"
        choices:
          - id: a
            text: "Потому что на каждую строку списка приходится отдельный запрос за связью, и с ростом числа строк растёт число запросов."
          - id: b
            text: "Потому что каждый запрос становится тяжелее, когда данных больше как три обязательные части системы."
          - id: c
            text: "Потому что база медленнее отвечает на больших таблицах на любом пути обработки запроса."
          - id: d
            text: "Потому что ORM кеширует тем меньше, чем больше строк, во всех сценариях без дополнительной настройки."
        correct: [a]
        explanation: "Код не меняется, меняется только N - число строк. Число запросов 1+N растёт вместе с ним, поэтому это линейная зависимость от объёма данных."
      - prompt: "Что в выражении «N+1» обозначает слагаемое «+1»?"
        choices:
          - id: a
            text: "Начальный запрос за самим списком объектов."
          - id: b
            text: "Один лишний запрос, возникший из-за бага."
          - id: c
            text: "Запрос за общим числом строк через COUNT."
          - id: d
            text: "Финальный запрос, закрывающий соединение."
        correct: [a]
        explanation: "«+1» - это один начальный запрос за списком (например, SELECT * FROM orders), а N - запросы за связанными данными каждой строки."

  - id: n-plus-one-spot-code-001
    concept: why-count-queries
    type: theory-quiz
    difficulty: 2
    prompt: "Дан код: `orders = Order.objects.all()` и затем цикл `for o in orders: print(o.customer.name)`. Где здесь рождается N+1?"
    choices:
      - id: a
        text: "В строке `o.customer.name` внутри цикла: связь customer не была загружена заранее, поэтому каждая итерация делает отдельный запрос."
      - id: b
        text: "В строке `Order.objects.all()`: она сразу делает по запросу на каждый заказ, независимо от входных данных и окружения."
      - id: c
        text: "В вызове `print`: вывод на каждой итерации обращается к базе, независимо от входных данных и окружения."
      - id: d
        text: "N+1 здесь нет: ORM автоматически подгружает все связи одним запросом; другого корректного поведения система не допускает."
    correct: [a]
    explanation: "`Order.objects.all()` делает один запрос за списком, но не тянет customer. Каждое обращение `o.customer` в цикле обнаруживает, что клиент не загружен, и делает свой запрос - отсюда N дополнительных."
    hints:
      - "Один запрос здесь за списком заказов, остальные рождаются по одному. Где в коде происходит обращение к связанному объекту?"
    variants:
      - prompt: "В каком месте queryset `Order.objects.all()` реально выполняет SQL за списком заказов?"
        choices:
          - id: a
            text: "На первой итерации цикла, когда queryset начинают перебирать: он ленив и до этого SQL не отправляет."
          - id: b
            text: "В момент присваивания `orders = Order.objects.all()` как полное описание этого поведения."
          - id: c
            text: "В момент импорта модели Order; другого корректного поведения система не допускает."
          - id: d
            text: "Только после завершения всего цикла как полное описание этого поведения."
        correct: [a]
        explanation: "Queryset ленив: `all()` лишь описывает будущий запрос. SQL уходит, когда queryset начинают перебирать - на первой итерации цикла."

  - id: n-plus-one-cost-quiz-001
    concept: why-count-queries
    type: theory-quiz
    difficulty: 3
    prompt: "Список из 200 строк рендерится наивным кодом с N+1. При 1.5 мс на round-trip - сколько примерно времени уходит только на ожидание базы, и как это меняется после сворачивания в один запрос?"
    choices:
      - id: a
        text: "Около 300 мс при N+1 (201 запрос) против ~1.5 мс при одном запросе - время становится плоским и не зависит от числа строк."
      - id: b
        text: "Около 1.5 мс в обоих случаях - число запросов на время почти не влияет как полное описание этого поведения."
      - id: c
        text: "Около 300 мс в обоих случаях - предзагрузка время не экономит как полное описание этого поведения."
      - id: d
        text: "Около 3 мс при N+1 - издержки запросов не складываются при буквальном чтении этого вызова."
    correct: [a]
    explanation: "201 запрос по 1.5 мс - это примерно 300 мс ожидания, и эта величина растёт линейно с числом строк. Один запрос даёт ~1.5 мс независимо от N - время становится плоским."
    hints:
      - "Наивный код делает N+1 запросов. Сколько это для 200 строк, и что будет, если каждый стоит 1.5 мс?"
      - "Ключевое отличие не в конкретных миллисекундах, а в том, растёт ли время с числом строк или остаётся постоянным."

  - id: n-plus-one-where-hides-001
    concept: why-count-queries
    type: theory-quiz
    difficulty: 3
    prompt: "Вью делает ровно один запрос: `Order.objects.all()` и сразу отдаёт queryset в шаблон. Шаблон в цикле рендерит `{{ order.customer.name }}`. Сколько запросов сделает страница на 50 заказах и почему?"
    choices:
      - id: a
        text: "51 запрос: связанный доступ `order.customer` в шаблоне порождает тот же N+1, что и в Python"
      - id: b
        text: "Набор 1 запрос: код вью чистый, а шаблоны в базу не ходят считают исчерпывающим ответом."
      - id: c
        text: "50 запросов: начальный запрос за списком не считается как полное описание этого поведения."
      - id: d
        text: "2 запроса: шаблон делает один общий запрос за всеми клиентами как полное описание этого поведения."
    correct: [a]
    explanation: "N+1 - свойство всего пути данных, а не только вью. `order.customer` в шаблоне выполняет ровно тот же ленивый доступ, что и в Python: 1 запрос за списком плюс 50 за клиентами. Просто он спрятан в HTML, а не во вью."
    hints:
      - "Где бы ни произошёл доступ к связи - во вью, шаблоне, сериализаторе - ORM выполняет один и тот же ленивый запрос. Шаблон тут не исключение."
      - "Считайте запросы на всю обработку запроса, а не только на код вью. Сколько раз шаблон обратится к `order.customer`?"

  - id: n-plus-one-count-sim-001
    concept: why-count-queries
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа? Она моделирует подсчёт запросов наивного кода: один запрос за списком плюс по одному за клиентом каждого заказа."
    snippet: |
      orders = [{"id": 1}, {"id": 2}, {"id": 3}]
      queries = 0
      queries += 1
      for order in orders:
          queries += 1
      print(queries)
    expected:
      kind: stdout
      value: "4"
    hints:
      - "Сначала один запрос за списком, затем по одному на каждый элемент. Сколько элементов в списке?"
    variants:
      - snippet: |
          orders = [{"id": 1}, {"id": 2}, {"id": 3}, {"id": 4}, {"id": 5}]
          queries = 0
          queries += 1
          for order in orders:
              queries += 1
          print(queries)
        expected:
          kind: stdout
          value: "6"
      - snippet: |
          def count_naive_queries(n):
              return 1 + n

          print(count_naive_queries(100))
        expected:
          kind: stdout
          value: "101"

  - id: n-plus-one-lazy-eval-001
    concept: why-count-queries
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа? Она моделирует ленивость queryset: цепочка методов не выполняет запрос, он считается только при материализации списком."
    snippet: |
      queries = 0

      def build_query():
          return "SELECT .. WHERE total > 100 ORDER BY total"

      sql = build_query()
      sql = sql + " LIMIT 5"
      print(queries)
      queries += 1
      print(queries)
    expected:
      kind: stdout
      value: "0\n1"
    hints:
      - "Пока строится строка запроса, в базу ничего не уходит - счётчик ещё ноль. Запрос считается одним только при выполнении."
    variants:
      - snippet: |
          queries = 0
          steps = ["filter", "order_by", "slice"]
          for _ in steps:
              pass
          print(queries)
          queries += 1
          print(queries)
        expected:
          kind: stdout
          value: "0\n1"
      - snippet: |
          executed = False
          plan = "filter -> order_by -> limit"
          print(executed)
          executed = True
          print(executed)
        expected:
          kind: stdout
          value: "False\nTrue"

  - id: n-plus-one-blanks-001
    concept: why-count-queries
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски в описании проблемы N+1 и её причины."
    template: |
      Наивный код делает один запрос за списком и по одному запросу
      за связанными данными каждой строки. При N строках это {{total}} запросов.
      Скрытый запрос рождается при доступе к связанному объекту вроде
      order.{{relation}}, потому что queryset {{laziness}} и не загружает
      связь заранее.
    blanks:
      total:
        accept: ["N+1", "1+N", "n+1", "1+n", "N + 1", "1 + N"]
      relation:
        accept: ["customer", "клиент", "customer.name"]
      laziness:
        accept: ["ленив", "ленивый", "ленива", "lazy"]
        accept_regex: '(?i)^ленив\w*$'
    hints:
      - "Число запросов складывается из одного начального и по одному на каждую из N строк."
      - "Связь, к которой обращаются в примере с заказами, - это клиент; а свойство queryset, из-за которого запрос откладывается, описывается одним словом."
    variants:
      - template: |
          Страница со списком из {{count}} заказов выполняет {{count}} запросов
          за клиентами плюс один за самим списком. Это {{total}} запросов:
          число растёт {{growth}} с объёмом данных, потому что на каждую строку
          приходится отдельный поход в базу.
        blanks:
          count:
            accept: ["N", "ста", "100", "n"]
          total:
            accept: ["N+1", "1+N", "n+1", "1+n", "N + 1", "1 + N", "101"]
          growth:
            accept: ["линейно", "пропорционально"]
            accept_regex: '(?i)^линейн\w*$'

  - id: n-plus-one-challenge-001
    concept: why-count-queries
    type: theory-quiz
    difficulty: 4
    prompt: "Команда измеряет медленную страницу-список секундомером и видит сильный разброс времени от запуска к запуску. Почему число запросов - более надёжный диагностический сигнал N+1, чем время?"
    choices:
      - id: a
        text: "Число запросов детерминировано, а время прыгает из-за кеша и GC; рост числа - подпись N+1."
      - id: b
        text: "Число запросов всегда меньше времени, поэтому его удобнее записывать в лог."
      - id: c
        text: "Время вообще не связано с числом запросов, поэтому его можно игнорировать."
      - id: d
        text: "Секундомер показывает только Python-код, а SQL идёт в отдельном потоке."
    correct: [a]
    explanation: "Время недетерминировано: кеш, сборщик мусора и фоновая нагрузка дают разброс. Число запросов же зависит только от кода и данных. Если оно растёт линейно с числом строк - это N+1, и видно это сразу, без секундомера."
    hints:
      - "Подумайте, что в этих двух метриках стабильно от запуска к запуску, а что плавает. Какая величина зависит только от кода и данных?"
      - "N+1 - это линейная зависимость числа запросов от объёма данных. Какая из двух метрик показывает эту зависимость напрямую, без шума измерения?"
