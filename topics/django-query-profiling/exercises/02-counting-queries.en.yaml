exercises:
  - id: conn-queries-what-001
    concept: counting-queries
    type: theory-quiz
    difficulty: 1
    prompt: "What does the `connection.queries` attribute store in Django?"
    choices:
      - id: a
        text: "A list of dicts - one per executed SQL statement, with query text (sql) and duration (time)."
      - id: b
        text: "Only the count of executed queries as an integer for every request path in the app."
      - id: c
        text: "The current in-flight query still running for any payload and any deploy target."
      - id: d
        text: "The execution plan of the last query in EXPLAIN format for every request path in the app."
    correct: [a]
    explanation: "`connection.queries` is a growing log: a list of dicts, one per executed SQL statement. Each has sql and time keys. The list length equals the query count."
    variants:
      - prompt: "How do you get the number of executed queries from `connection.queries`?"
        choices:
          - id: a
            text: "Use `len(connection.queries)` - log length equals query count."
          - id: b
            text: "Read field `connection.queries.count` for every request path in the app."
          - id: c
            text: "Call `connection.queries.total()` for every request path in the app."
          - id: d
            text: "Sum all time field values for every request path in the app."
        correct: [a]
        explanation: "The log is an ordinary list with one entry per query. Its length `len(connection.queries)` is the number of executed queries."
      - prompt: "What type is the `time` value in a `connection.queries` entry?"
        choices:
          - id: a
            text: "A string like `\"0.001\"` - you must convert to float before summing durations."
          - id: b
            text: "Exactly a float in seconds, ready to sum and nothing beyond that set."
          - id: c
            text: "A datetime of when the query ran for any payload and any deploy target."
          - id: d
            text: "An int of milliseconds as a complete account of that behavior."
        correct: [a]
        explanation: "The time field is a string, for example \"0.001\". A common surprise: to sum timings you must convert values to float first."

  - id: debug-true-requirement-001
    concept: counting-queries
    type: theory-quiz
    difficulty: 2
    prompt: "A developer reads `len(connection.queries)` on a production server with `DEBUG = False` and always gets 0. Why?"
    choices:
      - id: a
        text: "`connection.queries` is populated only when `DEBUG = True` - to avoid spending memory storing SQL under load. With DEBUG=False the log is not kept."
      - id: b
        text: "On production queries run in another thread that cannot be read; the system does not allow any other correct behavior."
      - id: c
        text: "`reset_queries()` is called automatically after every request in production as a complete account of that behavior."
      - id: d
        text: "In production Django uses another database without a log, without special-case setup for this flow."
    correct: [a]
    explanation: "The `connection.queries` log is kept only when `DEBUG = True`. With DEBUG=False Django does not fill it to save memory under load, so length is always 0. Count queries in dev or in tests."
    hints:
      - "The SQL log uses memory. In which mode does Django keep it enabled and in which does it disable it to save resources?"

  - id: reset-queries-purpose-001
    concept: counting-queries
    type: theory-quiz
    difficulty: 2
    prompt: "Why call `reset_queries()` before a targeted query count measurement?"
    choices:
      - id: a
        text: "The log accumulates queries since connection lifetime began; without clearing, setup queries inflate the count."
      - id: b
        text: "`reset_queries()` speeds up subsequent queries by clearing the database cache for every request path in the app."
      - id: c
        text: "Without it `connection.queries` never starts filling, - that is how the API contract should be read."
      - id: d
        text: "It closes the current connection and opens a faster new one when only the outer call is considered."
    correct: [a]
    explanation: "`connection.queries` accumulates for the whole connection lifetime. To measure a specific code slice you clear the log before measuring - otherwise unrelated setup queries get counted."
    hints:
      - "The log does not clear itself between code sections. What ends up in it if you do not reset before measuring?"

  - id: list-materialize-001
    concept: counting-queries
    type: theory-quiz
    difficulty: 3
    prompt: "In manual measurement a queryset is wrapped in `list(..)`: `list(Order.objects.all())` between `reset_queries()` and reading the counter. Why?"
    choices:
      - id: a
        text: "A queryset is lazy: without materialization SQL would run after measurement."
      - id: b
        text: "`list(.)` speeds up the query by collapsing it into one SQL statement."
      - id: c
        text: "Without `list(.)` you cannot iterate a queryset in a normal for-loop."
      - id: d
        text: "`list(.)` disables laziness for all future querysets in the process."
    correct: [a]
    explanation: "A queryset is lazy: without materialization SQL runs later and misses the measurement window. `list(..)` forces execution between `reset_queries()` and reading the counter, so the count honestly reflects that slice. `list(..)` forces execution here, between reset and count."
    hints:
      - "Recall when a queryset actually sends SQL. If you do not force it, will the query fall inside the window between reset and measurement?"
      - "The goal is to tie the query to a specific code section. What makes a lazy queryset execute right here?"

  - id: assert-num-queries-fixture-001
    concept: counting-queries
    type: theory-quiz
    difficulty: 3
    prompt: "Test `with self.assertNumQueries(1): list(Order.objects.all()); ..` is green, but the endpoint has N+1 in production. What is wrong with the test?"
    choices:
      - id: a
        text: "The fixture is empty or has too few related rows: with no orders the loop never runs, there are no extra queries, and `assertNumQueries(1)` passes even for naive N+1 code."
      - id: b
        text: "`assertNumQueries` does not work with `Order.objects.all()`; the system does not allow any other correct behavior for every request path in the app."
      - id: c
        text: "The number 1 always passes regardless of code - the check is fake; the system does not allow any other correct behavior for any payload and any deploy target."
      - id: d
        text: "The test must run with `DEBUG = True`, otherwise it is always green; the system does not allow any other correct behavior for any payload and any deploy target."
    correct: [a]
    explanation: "On an empty or nearly empty fixture naive code makes no extra queries: no rows means no loop. For N+1 to show up the fixture needs at least two related rows."
    hints:
      - "N+1 appears only when there is something to iterate over. What happens to naive code if the database has no related rows?"
      - "What is the minimum number of related rows in the fixture so naive code makes noticeably more queries than the optimized version?"

  - id: count-queries-sim-001
    concept: counting-queries
    type: predict-output
    difficulty: 2
    prompt: "What does this program print? It models the `connection.queries` log: the list grows one entry per query; length equals query count."
    snippet: |
      queries = []
      queries.append("SELECT * FROM orders")
      for customer_id in [1, 2, 3]:
          queries.append("SELECT * FROM customers WHERE id = " + str(customer_id))
      print(len(queries))
    expected:
      kind: stdout
      value: "4"
    hints:
      - "One query for the list plus one per id in the loop. How many ids are in the list?"
    variants:
      - snippet: |
          queries = []
          queries.append("SELECT * FROM orders")
          for customer_id in [10, 20]:
              queries.append("SELECT * FROM customers WHERE id = " + str(customer_id))
          print(len(queries))
        expected:
          kind: stdout
          value: "3"
      - snippet: |
          queries = []
          queries.append("SELECT .. JOIN customers")
          for _ in range(100):
              pass
          print(len(queries))
        expected:
          kind: stdout
          value: "1"

  - id: reset-queries-sim-001
    concept: counting-queries
    type: predict-output
    difficulty: 2
    prompt: "What does this program print? It models targeted measurement with log reset: old queries are cleared; only new code is counted."
    snippet: |
      queries = ["q1 setup", "q2 setup"]
      queries.clear()
      queries.append("SELECT * FROM orders")
      print(len(queries))
    expected:
      kind: stdout
      value: "1"
    hints:
      - "`clear()` plays the role of reset_queries(): after it the log contains only what was added afterward."
    variants:
      - snippet: |
          queries = ["setup a", "setup b", "setup c"]
          queries.clear()
          for cid in [1, 2]:
              queries.append("SELECT customer " + str(cid))
          print(len(queries))
        expected:
          kind: stdout
          value: "2"
      - snippet: |
          queries = ["old"]
          before = len(queries)
          queries.append("new")
          queries.append("new")
          print(len(queries) - before)
        expected:
          kind: stdout
          value: "2"

  - id: time-is-string-sim-001
    concept: counting-queries
    type: predict-output
    difficulty: 3
    prompt: "What does this program print? It reproduces the surprise: the time field in `connection.queries` is a string; you can sum timings only after converting to float."
    snippet: |
      query_log = [
          {"sql": "SELECT 1", "time": "0.001"},
          {"sql": "SELECT 2", "time": "0.002"},
      ]
      total = sum(float(q["time"]) for q in query_log)
      print(total)
    expected:
      kind: stdout
      value: "0.003"
    hints:
      - "The time field is stored as a string. What must you do to each string before summing?"
      - "Add 0.001 and 0.002 as float numbers. How many decimal places remain in Python float output?"

  - id: count-queries-blanks-001
    concept: counting-queries
    type: fill-in-blanks
    difficulty: 1
    prompt: "Fill in the blanks in manual query counting via the connection log."
    template: |
      from django.db import connection, reset_queries

      {{reset}}()
      orders = {{materialize}}(Order.objects.all())
      for order in orders:
          _ = order.customer.name
      print({{length}}(connection.queries))
    blanks:
      reset:
        accept: ["reset_queries"]
      materialize:
        accept: ["list"]
      length:
        accept: ["len"]
    hints:
      - "First clear the log, then force queryset execution, then take log length."
    variants:
      - template: |
          from django.db import connection, reset_queries

          {{reset}}()
          rows = {{materialize}}(Order.objects.select_related("customer"))
          print({{length}}(connection.queries))
        blanks:
          reset:
            accept: ["reset_queries"]
          materialize:
            accept: ["list"]
          length:
            accept: ["len"]

  - id: assert-num-queries-blanks-001
    concept: counting-queries
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the blanks in a test that locks query count with assertNumQueries."
    template: |
      def test_no_n_plus_one(self):
          c = Customer.objects.create(name="Ada")
          Order.objects.create(customer=c, total=10)
          Order.objects.create(customer=c, total=20)
          with self.{{assertion}}({{expected}}):
              for o in Order.objects.{{preload}}("customer"):
                  _ = o.customer.name
    blanks:
      assertion:
        accept: ["assertNumQueries"]
      expected:
        accept: ["1"]
      preload:
        accept: ["select_related"]
    hints:
      - "The context manager checks exact query count. A to-one relation collapses into a JOIN with one method - then one query remains."
      - "Two orders with one customer loaded via JOIN give exactly one query - that is the number the test locks."
    variants:
      - template: |
          from django.db import connection, reset_queries

          {{reset}}()
          before = len(connection.queries)
          list(Order.objects.{{preload}}("customer"))
          after = {{length}}(connection.queries)
          print(after - before)
        blanks:
          reset:
            accept: ["reset_queries"]
          preload:
            accept: ["select_related"]
          length:
            accept: ["len"]

  - id: counting-challenge-001
    concept: counting-queries
    type: predict-output
    difficulty: 4
    prompt: "What does this program print? It models comparing naive and optimized code on one fixture: first counts N+1 queries, then the prefetched variant."
    snippet: |
      def naive_query_count(orders):
          queries = 1
          for _ in orders:
              queries += 1
          return queries

      def optimized_query_count(orders):
          return 1

      data = [1, 2, 3, 4]
      print(naive_query_count(data))
      print(optimized_query_count(data))
      print(naive_query_count(data) - optimized_query_count(data))
    expected:
      kind: stdout
      value: "5\n1\n4"
    hints:
      - "Naive variant: one for the list plus one per each of four elements. Optimized is always one."
      - "The third line is the difference between the two counters. How many extra queries did prefetch remove on this fixture?"
