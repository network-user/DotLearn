conceptId: django-silk
cards:
  - id: django-silk-01
    front: How does django-silk differ from manual connection.queries?
    back: >-
      silk is middleware that automatically captures all SQL during a full HTTP
      request and shows them with timings and stack traces. Manual counting
      requires wrapping each section yourself.
    tags: [silk, middleware]
  - id: django-silk-02
    front: How does silk fit into request handling?
    back: >-
      As middleware in the pipeline: timestamps on entry, captures every SQL inside
      view and serializer, timestamps on exit, saves a record to its DB tables.
    tags: [middleware, pipeline]
  - id: django-silk-03
    front: What three steps connect silk?
    back: >-
      Add silk to INSTALLED_APPS, insert SilkyMiddleware in MIDDLEWARE, run migrate,
      and wire URLs (silk/). UI lives at /silk/.
    tags: [setup]
  - id: django-silk-04
    front: Why does silk see queries from templates and serializers?
    back: >-
      As middleware it wraps full HTTP handling, so it catches every SQL on the
      path - including template and serializer queries you would wrap manually with
      connection.queries.
    tags: [coverage]
  - id: django-silk-05
    front: What does the Queries column in silk's request list show?
    back: >-
      SQL query count for that HTTP request - automatic counter for the whole path.
      A large value (e.g. 101) is an N+1 candidate before opening details.
    tags: [queries-column]
  - id: django-silk-06
    front: Which column to sort by in silk when hunting N+1?
    back: >-
      Query count (Queries) descending, not time. A hundred fast queries are slower
      in sum than one medium query, but each alone looks fast.
    tags: [sort, n-plus-one]
  - id: django-silk-07
    front: How do stack traces on repeated queries in silk help?
    back: >-
      Traces on nearly identical SELECTs point to the same line - lazy relation
      access in template or serializer. silk leads you to the fix location.
    tags: [stack-trace]
  - id: django-silk-08
    front: Why is absolute time in a silk profile inflated?
    back: >-
      silk writes profiles to the same DB per request, adding queries and time.
      Trust relative before/after; application query count is accurate.
    tags: [overhead, pitfall]
  - id: django-silk-09
    front: Why not leave silk on for 100% of production requests?
    back: >-
      It writes to the DB per request and becomes a load source. Use sampling in
      prod or keep silk in dev/staging only.
    tags: [production]
  - id: django-silk-10
    front: Why is silk more convenient than django-debug-toolbar for REST APIs?
    back: >-
      toolbar is a panel on an HTML page (current page only). silk stores request
      history in the DB with a separate UI - works for APIs without HTML and past
      requests.
    tags: [debug-toolbar, comparison]
