conceptId: counting-queries
cards:
  - id: counting-queries-01
    front: 'Что такое connection.queries?'
    back: 'Атрибут database-соединения Django - список словарей, по одному на каждый выполненный SQL. В каждом лежит текст запроса (sql) и время выполнения (time).'
    tags: [connection-queries]
  - id: counting-queries-02
    front: 'Чему равна длина connection.queries?'
    back: 'Числу выполненных запросов за время жизни соединения в текущем потоке. Каждый новый запрос дописывается в конец журнала.'
    tags: [count]
  - id: counting-queries-03
    front: 'При каком условии заполняется connection.queries?'
    back: 'Только при DEBUG = True. В продакшене с DEBUG = False журнал не ведётся, чтобы не тратить память под нагрузкой, и len(...) всегда вернёт ноль.'
    tags: [debug, pitfall]
  - id: counting-queries-04
    front: 'Зачем нужен reset_queries() перед замером?'
    back: 'Журнал копит запросы с начала жизни соединения. reset_queries() обнуляет его, чтобы в счёт не попали запросы из подготовки данных и можно было мерить точечно.'
    tags: [reset-queries]
  - id: counting-queries-05
    front: 'Зачем оборачивать queryset в list(...) при ручном замере?'
    back: 'Без этого ленивый queryset выполнится позже, мимо окна замера. list(...) заставляет его выполниться здесь и сейчас, между обнулением и подсчётом.'
    tags: [materialize, lazy]
  - id: counting-queries-06
    front: 'Как по текстам в connection.queries опознать N+1?'
    back: 'Десятки почти одинаковых SELECT, различающихся только значением в WHERE id = ?, - характерная подпись N+1: один и тот же запрос с разными ключами.'
    tags: [signature]
  - id: counting-queries-07
    front: 'Что делает assertNumQueries(n)?'
    back: 'Контекстный менеджер Django, который проверяет, что внутри блока выполнилось ровно n запросов. Превращает ожидаемое число в исполняемый тест, ловящий регрессию N+1 на CI.'
    tags: [assert-num-queries, test]
  - id: counting-queries-08
    front: 'Почему фикстура теста должна содержать минимум две связанные строки?'
    back: 'На пустой базе наивный N+1-код не делает цикла и assertNumQueries(1) пройдёт ложно. Две строки заставляют наивный вариант сделать три запроса, и регрессия проявляется.'
    tags: [fixture, pitfall]
  - id: counting-queries-09
    front: 'Какого типа поле time в connection.queries?'
    back: 'Строка вроде "0.001", а не число. Чтобы суммировать тайминги, нужно привести к float.'
    tags: [time, gotcha]
  - id: counting-queries-10
    front: 'Когда применяют CaptureQueriesContext вместо assertNumQueries?'
    back: 'Когда в тесте нужны и счёт, и тексты SQL для разбора. captured_queries собирается только за время блока, без ручного reset_queries(), и позволяет проверить, что внутри JOIN, а не подзапрос на строку.'
    tags: [capture-queries-context]
