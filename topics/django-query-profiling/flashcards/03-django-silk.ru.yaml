conceptId: django-silk
cards:
  - id: django-silk-01
    front: 'Чем django-silk отличается от ручного connection.queries?'
    back: 'silk - это middleware, которое автоматически перехватывает все SQL за время обработки HTTP-запроса целиком и показывает их списком с таймингами и стек-трейсами. Ручной счётчик надо оборачивать вокруг каждого участка самому.'
    tags: [silk, middleware]
  - id: django-silk-02
    front: 'Как silk встраивается в обработку запроса?'
    back: 'Как middleware в конвейере: засекает время на входе, перехватывает каждый SQL внутри вью и сериализатора, фиксирует время на выходе и сохраняет запись в свои таблицы в базе.'
    tags: [middleware, pipeline]
  - id: django-silk-03
    front: 'Какие три шага нужны для подключения silk?'
    back: 'Добавить silk в INSTALLED_APPS, вставить SilkyMiddleware в MIDDLEWARE, прогнать migrate и подключить URL-ы (silk/). Интерфейс живёт по адресу /silk/.'
    tags: [setup]
  - id: django-silk-04
    front: 'Почему silk видит запросы из шаблонов и сериализаторов?'
    back: 'Как middleware он оборачивает всю обработку HTTP-запроса, поэтому ловит каждый SQL на пути - включая те, что рождаются в шаблоне и сериализаторе, где connection.queries пришлось бы оборачивать руками.'
    tags: [coverage]
  - id: django-silk-05
    front: 'Что показывает колонка Queries в списке запросов silk?'
    back: 'Число SQL-запросов за этот HTTP-запрос - автоматический счётчик на весь путь обработки. Большое значение (например 101) - кандидат на N+1 ещё до открытия деталей.'
    tags: [queries-column]
  - id: django-silk-06
    front: 'По какой колонке сортировать список запросов silk для поиска N+1?'
    back: 'По числу запросов (Queries) по убыванию, а не по времени. Сто быстрых запросов суммарно медленнее одного среднего, но каждый по отдельности кажется быстрым.'
    tags: [sort, n-plus-one]
  - id: django-silk-07
    front: 'Чем помогает стек-трейс у повторяющихся запросов в silk?'
    back: 'Трейс у каждого из почти одинаковых SELECT указывает на одну и ту же строку - место в шаблоне или сериализаторе, где происходит ленивый доступ к связи. Так silk приводит к точке, которую надо чинить.'
    tags: [stack-trace]
  - id: django-silk-08
    front: 'Почему абсолютное время в профиле silk завышено?'
    back: 'silk сам пишет профиль в ту же базу на каждый запрос, добавляя запросы и время. Доверяйте относительному «до и после», а число запросов приложения он считает точно.'
    tags: [overhead, pitfall]
  - id: django-silk-09
    front: 'Почему silk нельзя оставлять включённым в проде на 100% запросов?'
    back: 'Он пишет в базу на каждый запрос и сам становится источником нагрузки. В проде используют сэмплирование (профиль для доли запросов) или держат silk только в dev/staging.'
    tags: [production]
  - id: django-silk-10
    front: 'Чем silk удобнее django-debug-toolbar для REST-API?'
    back: 'toolbar - панель, прибитая к HTML-странице («что сейчас на этой странице»). silk хранит историю запросов в базе и показывает отдельным интерфейсом, что годится для API без HTML и для разбора прошлых запросов.'
    tags: [debug-toolbar, comparison]
