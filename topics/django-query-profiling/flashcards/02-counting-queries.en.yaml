conceptId: counting-queries
cards:
  - id: counting-queries-01
    front: What is connection.queries?
    back: >-
      A Django database connection attribute - a list of dicts, one per executed
      SQL. Each holds query text (sql) and execution time (time).
    tags: [connection-queries]
  - id: counting-queries-02
    front: What does len(connection.queries) equal?
    back: >-
      The number of queries executed during the connection lifetime in the current
      thread. Each new query is appended to the log.
    tags: [count]
  - id: counting-queries-03
    front: When does connection.queries get populated?
    back: >-
      Only when DEBUG = True. With DEBUG = False in production the log is off to
      save memory under load, and len(...) always returns zero.
    tags: [debug, pitfall]
  - id: counting-queries-04
    front: Why call reset_queries() before measuring?
    back: >-
      The log accumulates from connection start. reset_queries() clears it so
      setup queries are not counted and you can measure a specific code block.
    tags: [reset-queries]
  - id: counting-queries-05
    front: Why wrap a queryset in list(...) when measuring manually?
    back: >-
      Otherwise the lazy queryset runs later, outside the measurement window.
      list(...) forces execution between reset and count.
    tags: [materialize, lazy]
  - id: counting-queries-06
    front: How do query texts in connection.queries reveal N+1?
    back: >-
      Dozens of nearly identical SELECTs differing only in WHERE id = ? - classic
      N+1: the same query with different keys.
    tags: [signature]
  - id: counting-queries-07
    front: What does assertNumQueries(n) do?
    back: >-
      A Django context manager that checks exactly n queries ran inside the block.
      Turns expected count into an executable test that catches N+1 regression on CI.
    tags: [assert-num-queries, test]
  - id: counting-queries-08
    front: Why should a test fixture have at least two related rows?
    back: >-
      On an empty DB naive N+1 code never loops and assertNumQueries(1) passes
      falsely. Two rows make naive code do three queries and expose regression.
    tags: [fixture, pitfall]
  - id: counting-queries-09
    front: What type is the time field in connection.queries?
    back: >-
      A string like "0.001", not a number. Convert to float before summing timings.
    tags: [time, gotcha]
  - id: counting-queries-10
    front: When use CaptureQueriesContext instead of assertNumQueries?
    back: >-
      When a test needs both count and SQL text. captured_queries is collected only
      for the block, without manual reset_queries(), and lets you verify JOIN vs
      per-row subquery.
    tags: [capture-queries-context]
