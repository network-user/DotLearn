conceptId: reading-and-fixing
cards:
  - id: reading-and-fixing-01
    front: 'В чём суть лекарства от N+1?'
    back: 'Сказать ORM заранее, какие связи понадобятся, чтобы он загрузил их вместе с основным queryset. Вместо «запрос за списком плюс по запросу на строку» получается «запрос за списком вместе со связями».'
    tags: [preload]
  - id: reading-and-fixing-02
    front: 'Для каких связей применяют select_related?'
    back: 'Для связей «к одному»: ForeignKey и OneToOneField. Связь сворачивается в JOIN и тащится тем же запросом - одна строка результата несёт и заказ, и его клиента.'
    tags: [select-related, to-one]
  - id: reading-and-fixing-03
    front: 'Для каких связей применяют prefetch_related?'
    back: 'Для связей «ко многим»: ManyToManyField и обратная сторона ForeignKey (например customer.orders). Делается отдельный запрос за всеми связанными объектами и сшивается по ключу в Python.'
    tags: [prefetch-related, to-many]
  - id: reading-and-fixing-04
    front: 'Сколько запросов делает select_related против prefetch_related?'
    back: 'select_related - один запрос (связь свёрнута в JOIN). prefetch_related - два запроса (список плюс выборка связанных через WHERE ... IN (...)), и оба не зависят от N.'
    tags: [query-count]
  - id: reading-and-fixing-05
    front: 'Почему для связи «ко многим» нельзя использовать JOIN?'
    back: 'JOIN размножил бы строки и притащил декартово произведение. Поэтому prefetch_related делает отдельный запрос за всеми связанными объектами разом, а не JOIN.'
    tags: [join, cartesian]
  - id: reading-and-fixing-06
    front: 'По чему выбирается метод предзагрузки - select_related или prefetch_related?'
    back: 'По форме связи, а не наугад: к одному (ForeignKey, OneToOne) - select_related; ко многим (ManyToMany, обратный ForeignKey) - prefetch_related. Их можно комбинировать в одном queryset.'
    tags: [choice]
  - id: reading-and-fixing-07
    front: 'Почему фильтрация предзагруженной связи в цикле возвращает N+1?'
    back: 'customer.orders.filter(...) внутри цикла выполняет новый запрос мимо предзагруженного кеша. Фильтр нужно задавать заранее через Prefetch(...), а не в цикле.'
    tags: [prefetch-object, pitfall]
  - id: reading-and-fixing-08
    front: 'Как «починить» N+1 и при этом замедлить страницу?'
    back: 'Предзагрузить связь, к которой код не обращается: лишний prefetch_related тратит запрос на неиспользуемые данные. Грузите только то, что реально читаете.'
    tags: [over-fetch, pitfall]
  - id: reading-and-fixing-09
    front: 'Что делает объект Prefetch?'
    back: 'Даёт контроль над тем, что и куда предзагружается: сужает связанный queryset и кладёт результат в отдельный атрибут через to_attr. Так условие к связи «ко многим» уходит во второй запрос, а не повторяется в цикле.'
    tags: [prefetch-object]
  - id: reading-and-fixing-10
    front: 'Как подтвердить, что N+1 устранён по-настоящему?'
    back: 'Тем же assertNumQueries: число запросов должно оставаться константой при росте фикстуры. Если запросов константа, а не функция от N, исправление настоящее, а не замаскировано на малых данных.'
    tags: [verify, assert-num-queries]
