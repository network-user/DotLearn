conceptId: reading-and-fixing
cards:
  - id: reading-and-fixing-01
    front: What is the core fix for N+1?
    back: >-
      Tell the ORM in advance which relations you need so it loads them with the
      main queryset. Instead of list query plus per-row queries, one or two
      constant queries.
    tags: [preload]
  - id: reading-and-fixing-02
    front: Which relations use select_related?
    back: >-
      To-one relations: ForeignKey and OneToOneField. The relation is folded into a
      JOIN in the same query - one result row carries order and customer.
    tags: [select-related, to-one]
  - id: reading-and-fixing-03
    front: Which relations use prefetch_related?
    back: >-
      To-many relations: ManyToManyField and reverse ForeignKey (e.g.
      customer.orders). A separate query loads all related objects and stitches by
      key in Python.
    tags: [prefetch-related, to-many]
  - id: reading-and-fixing-04
    front: How many queries do select_related vs prefetch_related use?
    back: >-
      select_related - one query (JOIN). prefetch_related - two (list plus related
      via WHERE ... IN (...)), both independent of N.
    tags: [query-count]
  - id: reading-and-fixing-05
    front: Why cannot you use JOIN for to-many relations?
    back: >-
      JOIN would multiply rows and create a Cartesian product. prefetch_related
      uses a separate query for all related objects, not JOIN.
    tags: [join, cartesian]
  - id: reading-and-fixing-06
    front: How do you choose select_related vs prefetch_related?
    back: >-
      By relation shape, not guesswork: to-one (ForeignKey, OneToOne) -
      select_related; to-many (ManyToMany, reverse FK) - prefetch_related. Combine
      both on one queryset.
    tags: [choice]
  - id: reading-and-fixing-07
    front: Why does filtering a prefetched relation in a loop bring back N+1?
    back: >-
      customer.orders.filter(...) in a loop runs a new query bypassing prefetch
      cache. Set the filter upfront with Prefetch(...), not in the loop.
    tags: [prefetch-object, pitfall]
  - id: reading-and-fixing-08
    front: How can you fix N+1 and still slow the page?
    back: >-
      Prefetch a relation the code never reads: extra prefetch_related wastes a
      query on unused data. Load only what you actually access.
    tags: [over-fetch, pitfall]
  - id: reading-and-fixing-09
    front: What does the Prefetch object do?
    back: >-
      Controls what and where is prefetched: narrows the related queryset and
      stores result in a separate attribute via to_attr. Filter on to-many goes into
      the second query, not repeated in the loop.
    tags: [prefetch-object]
  - id: reading-and-fixing-10
    front: How do you confirm N+1 is really gone?
    back: >-
      Same assertNumQueries: count must stay constant as fixture grows. Constant
      queries, not a function of N, means a real fix - not masked on small data.
    tags: [verify, assert-num-queries]
