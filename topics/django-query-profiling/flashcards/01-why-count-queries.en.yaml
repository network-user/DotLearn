conceptId: why-count-queries
cards:
  - id: why-count-queries-01
    front: What is the N+1 query problem?
    back: >-
      Instead of one query the app does 1 query for the list plus 1 query per row
      for related data. Total 1+N round-trips to the database.
    tags: [n-plus-one, definition]
  - id: why-count-queries-02
    front: Why does each SQL query cost more than a function call?
    back: >-
      A query is a network round-trip: the app sends SQL, waits for parse and
      execution, gets rows back. Fixed overhead applies per query and adds up.
    tags: [round-trip, cost]
  - id: why-count-queries-03
    front: Why can order.customer.name hide a database query?
    back: >-
      Accessing a related object through ForeignKey looks like reading an
      attribute, but if the customer is not loaded yet the ORM runs a separate
      SELECT for it.
    tags: [foreign-key, lazy]
  - id: why-count-queries-04
    front: Why is the danger of N+1 in how it scales with data volume?
    back: >-
      Code does not change but query count grows linearly with row count. On 10
      orders the difference is invisible; on 1000 the page stalls - only N changed.
    tags: [scaling]
  - id: why-count-queries-05
    front: Why can N+1 hide even in a clean view?
    back: >-
      Related access can live in a template (order.customer.name in a loop), a DRF
      serializer, or @property. Same N queries at render time.
    tags: [template, hidden]
  - id: why-count-queries-06
    front: Why is queryset laziness a mechanism, not a bug?
    back: >-
      A queryset does not run SQL on creation: filter, sort, and slice only build
      future SQL. One query goes out on first iteration, allowing an optimal query.
    tags: [lazy, queryset]
  - id: why-count-queries-07
    front: Why measure query count before time on a slow page?
    back: >-
      Time jumps run to run from cache, GC, and background load. Query count is
      deterministic and immediately shows linear growth with data.
    tags: [measure, deterministic]
  - id: why-count-queries-08
    front: At what boundary should you count queries when hunting N+1?
    back: >-
      Across the full user request handling - request to response - not in one
      function. N+1 is a property of the whole data path from DB to response.
    tags: [boundary]
  - id: why-count-queries-09
    front: Why is the myth the ORM optimizes everything dangerous?
    back: >-
      The ORM does literally what you asked. Without eager loading it fetches
      relations one by one - lazy access executed, not an ORM oversight.
    tags: [misconception]
