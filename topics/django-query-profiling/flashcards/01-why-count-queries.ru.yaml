conceptId: why-count-queries
cards:
  - id: why-count-queries-01
    front: 'Что такое проблема N+1 запросов?'
    back: 'Это когда вместо одного запроса приложение делает 1 запрос за списком и ещё по одному запросу за связанными данными каждой из N строк. Итого 1+N round-trip к базе.'
    tags: [n-plus-one, definition]
  - id: why-count-queries-02
    front: 'Почему каждый SQL-запрос стоит дороже, чем вызов функции?'
    back: 'Запрос - это сетевой round-trip: приложение отправляет SQL, ждёт разбора и выполнения, получает строки обратно. На каждый запрос ложатся фиксированные издержки, и они складываются.'
    tags: [round-trip, cost]
  - id: why-count-queries-03
    front: 'Почему order.customer.name может скрывать запрос к базе?'
    back: 'Доступ к связанному объекту через ForeignKey выглядит как чтение атрибута, но если объект клиента ещё не загружен в память, ORM делает отдельный SELECT за ним.'
    tags: [foreign-key, lazy]
  - id: why-count-queries-04
    front: 'Почему опасность N+1 именно в зависимости от объёма данных?'
    back: 'Код не меняется, но число запросов растёт линейно с числом строк. На 10 заказах разница незаметна, на 1000 страница встаёт - меняется только N.'
    tags: [scaling]
  - id: why-count-queries-05
    front: 'Почему N+1 может прятаться даже в «чистом» вью?'
    back: 'Связанный доступ может жить в шаблоне (order.customer.name в цикле), сериализаторе DRF или @property. Это даёт те же N запросов уже на стадии рендеринга.'
    tags: [template, hidden]
  - id: why-count-queries-06
    front: 'Почему ленивость queryset - это механизм, а не баг?'
    back: 'Queryset не выполняет SQL в момент вызова: фильтр, сортировка и срез лишь достраивают будущий запрос. Запрос уходит один и только на первой итерации, что позволяет собрать оптимальный SQL.'
    tags: [lazy, queryset]
  - id: why-count-queries-07
    front: 'Почему у медленной страницы измеряют сначала число запросов, а не время?'
    back: 'Время прыгает от запуска к запуску из-за кеша, GC и фоновой нагрузки. Число запросов детерминировано и сразу показывает, линейно ли оно растёт с данными.'
    tags: [measure, deterministic]
  - id: why-count-queries-08
    front: 'На какой границе нужно считать запросы при поиске N+1?'
    back: 'На всей обработке запроса пользователя - от запроса до ответа целиком, а не в отдельной функции. N+1 - свойство всего пути данных от базы до ответа.'
    tags: [boundary]
  - id: why-count-queries-09
    front: 'Почему миф «ORM сам всё оптимизирует» опасен?'
    back: 'ORM исполняет буквально то, что вы попросили. Если не сказать загрузить связи заранее, он будет ходить за ними по одной - это исполнение ленивого доступа, а не недосмотр.'
    tags: [misconception]
