exercises:
  - id: keyboard-focus-blanks-tabindex-001
    concept: keyboard-focus
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Проставьте значения tabindex так, чтобы кастомная кнопка попадала в обход по Tab, а служебный диалог можно было сфокусировать только из кода.'
    template: |
      <div role="button" tabindex="{{btn}}">Открыть меню</div>
      <div id="dialog" role="dialog" tabindex="{{dlg}}">…</div>
    blanks:
      btn:
        accept: ['0']
      dlg:
        accept: ['-1']
    explanation: 'tabindex=0 ставит кастомную кнопку в естественный порядок обхода; tabindex=-1 убирает диалог из обхода по Tab, но позволяет перевести на него фокус из кода при открытии.'
    hints:
      - 'Одно значение добавляет элемент в очередь Tab, другое разрешает только программный фокус.'
    variants:
      - prompt: 'Проставьте значения tabindex так, чтобы кастомный чекбокс ловился по Tab, а заголовок раздела принимал фокус только программно после смены контента.'
        template: |
          <span role="checkbox" tabindex="{{cb}}">Согласен</span>
          <h2 tabindex="{{hd}}">Результаты</h2>
        blanks:
          cb:
            accept: ['0']
          hd:
            accept: ['-1']
        explanation: 'Интерактивный кастомный чекбокс нужно вернуть в обход через tabindex=0; заголовок, на который скрипт переводит фокус после обновления списка, получает tabindex=-1, чтобы не мешать обычной навигации.'

  - id: keyboard-focus-quiz-outline-002
    concept: keyboard-focus
    type: theory-quiz
    difficulty: 2
    prompt: 'Дизайнер применил outline: none ко всем кнопкам и не добавил никакой замены. Что это меняет для того, кто ходит по сайту клавиатурой?'
    choices:
      - id: a
        text: 'Он больше не видит, на каком элементе сейчас находится фокус.'
      - id: b
        text: 'Ничего: индикатор фокуса останется видимым сам по себе.'
      - id: c
        text: 'Кнопки перестанут нажиматься с клавиатуры.'
      - id: d
        text: 'Изменится порядок обхода фокуса на странице.'
    correct: [a]
    explanation: 'outline рисует видимый индикатор фокуса, единственный ориентир клавиатурного пользователя. Убрать его без замены значит лишить человека аналога курсора; сам по себе индикатор не вернётся, а кнопки при этом продолжают нажиматься и обход не меняется.'
    hints:
      - 'Подумайте, что заменяет клавиатурному пользователю курсор мыши.'
    variants:
      - prompt: 'Вы хотите показывать кольцо фокуса тем, кто пришёл с клавиатуры, но не рисовать его при клике мышью. Какой псевдокласс для этого предназначен?'
        choices:
          - id: a
            text: ':focus-visible'
          - id: b
            text: 'Значение :focus, выбранное как полный ответ'
          - id: c
            text: 'Значение :hover, выбранное как полный ответ'
          - id: d
            text: 'Значение :active, выбранное как полный ответ'
        correct: [a]
        explanation: ':focus-visible включает стиль только когда браузер по эвристике считает, что фокус пришёл с клавиатуры, поэтому кольцо видят те, кому оно нужно, а клик мышью его не вызывает.'

  - id: keyboard-focus-quiz-trap-003
    concept: keyboard-focus
    type: theory-quiz
    difficulty: 3
    prompt: 'На странице встроен сторонний виджет-редактор. Зайдя в него по Tab, пользователь не может выйти наружу: Tab бесконечно ходит по кнопкам редактора. Как называется этот дефект и почему его легко пропустить?'
    choices:
      - id: a
        text: 'Случайная ловушка фокуса; мышью она незаметна.'
      - id: b
        text: 'Нарушение порядка обхода из-за положительного tabindex.'
      - id: c
        text: 'Отсутствие ссылки перехода к содержимому.'
      - id: d
        text: 'Пропавший индикатор фокуса из-за outline: none.'
    correct: [a]
    explanation: 'Ловушка фокуса нужна и полезна в модальном окне, но тот же механизм, возникший случайно внутри виджета, делает всю остальную страницу недостижимой с клавиатуры. Обнаружить это можно только реальным проходом Tab-ом без мыши.'
    hints:
      - 'Вспомните, где удержание фокуса внутри блока это норма, а где превращается в дефект.'
      - 'Барьер виден, только если убрать руку с мыши: подумайте, какой ручной тест его ловит.'

  - id: keyboard-focus-predict-order-004
    concept: keyboard-focus
    type: predict-output
    difficulty: 3
    prompt: 'Пользователь только что зашёл на страницу и один раз нажал Tab. Ответьте одним словом (подписью поля): какое поле получит фокус первым?'
    snippet: |
      <input aria-label="Город" tabindex="2">
      <input aria-label="Улица" tabindex="1">
      <input aria-label="Индекс">
    expected:
      kind: scalar
      value: 'Улица'
    explanation: 'Положительные значения tabindex обходятся раньше всех и по возрастанию: сначала tabindex=1 (Улица), затем tabindex=2 (Город), и лишь потом элементы без tabindex в порядке разметки (Индекс). Поэтому первым фокус получает «Улица».'
    hints:
      - 'Положительный tabindex не встаёт в порядок разметки, у него собственная очередь. Кто в ней раньше?'
      - 'Сначала обходятся все положительные значения по возрастанию, и только затем поля без tabindex.'
