exercises:
  - id: alt-text-media-blanks-alt-001
    concept: alt-text-media
    type: fill-in-blanks
    difficulty: 1
    prompt: "Заполните alt. Для декоративного разделителя дайте пустой alt (две кавычки без текста), для иконки-ссылки на корзину опишите действие одним словом."
    template: |
      <img src="divider.svg" alt={{dec}}>
      <a href="/cart"><img src="cart.svg" alt="{{fun}}"></a>
    blanks:
      dec:
        accept: ['""']
      fun:
        accept: ['Корзина', 'В корзину', 'Открыть корзину']
        accept_regex: '^\s*(Корзина|В корзину|Открыть корзину)\s*$'
    explanation: "Декоративный разделитель ничего не значит, поэтому получает пустой alt и скринридер его пропускает. Иконка-ссылка функциональна: её alt описывает действие «Корзина», а не рисунок тележки."
    variants:
      - prompt: "Заполните alt. Для декоративного узора дайте пустой alt (две кавычки без текста), для логотипа-ссылки на главную опишите, куда ведёт ссылка."
        template: |
          <img src="ornament.svg" alt={{dec}}>
          <a href="/"><img src="logo.svg" alt="{{fun}}"></a>
        blanks:
          dec:
            accept: ['""']
          fun:
            accept: ['На главную', 'Главная', 'Домой']
            accept_regex: '^\s*(На главную|Главная|Домой)\s*$'
        explanation: "Узор декоративен, поэтому его alt пуст. Логотип обёрнут в ссылку, значит он функционален: alt описывает назначение ссылки, а не картинку логотипа."

  - id: alt-text-media-quiz-empty-001
    concept: alt-text-media
    type: theory-quiz
    difficulty: 2
    prompt: "Как скринридер обработает картинку с пустым alt (значение из двух кавычек без текста)?"
    choices:
      - id: a
        text: "Пропустит её молча, будто картинки нет."
      - id: b
        text: "Зачитает имя файла из src."
      - id: c
        text: "Объявит слово «изображение» и остановится."
      - id: d
        text: "Прочитает alt соседней картинки."
    correct: [a]
    explanation: "Пустой alt помечает картинку как декоративную. Скринридер понимает, что читать нечего, и полностью пропускает элемент, не произнося ни слова."
    variants:
      - prompt: "Что сделает скринридер с картинкой, у которой атрибут alt вовсе отсутствует?"
        choices:
          - id: a
            text: "Зачитает имя файла из src, часто бессмысленный"
          - id: b
            text: "Пропустит её молча."
          - id: c
            text: "Покажет ошибку валидации HTML и остановит страницу."
          - id: d
            text: "Сам подставит пустой alt и промолчит."
        correct: [a]
        explanation: "Без атрибута alt скринридеру нечего сказать о назначении картинки, поэтому он в качестве запасного варианта зачитывает имя файла из src. Именно поэтому декоративной картинке нужен явный пустой alt, а не удалённый атрибут."

  - id: alt-text-media-predict-empty-001
    concept: alt-text-media
    type: predict-output
    difficulty: 2
    prompt: "Ответьте одним словом, да или нет: озвучит ли скринридер это изображение?"
    snippet: |
      <img src="divider.svg" alt="">
    expected:
      kind: scalar
      value: "нет"
    explanation: "Пустой alt помечает картинку как декоративную, и скринридер её пропускает, ничего не произнося. Ответ: нет."
    variants:
      - prompt: "Ответьте одним словом, да или нет: произнесёт ли скринридер хоть что-нибудь для этой картинки?"
        snippet: |
          <img src="IMG_2043.jpg">
        expected:
          kind: scalar
          value: "да"
        explanation: "У картинки нет атрибута alt, поэтому скринридер в качестве запасного варианта зачитывает имя файла из src. Он всё-таки произносит текст, значит ответ: да."

  - id: alt-text-media-quiz-complex-001
    concept: alt-text-media
    type: theory-quiz
    difficulty: 3
    prompt: "На странице отчёта стоит столбчатая диаграмма продаж по кварталам. Как дать ей доступную альтернативу?"
    choices:
      - id: a
        text: "Короткий alt с названием и типом диаграммы плюс сами данные рядом в тексте, таблице или"
      - id: b
        text: "Уместить все числа с диаграммы в атрибут alt одной длинной строкой."
      - id: c
        text: "Поставить пустой alt, ведь это всего лишь картинка."
      - id: d
        text: "Написать alt со значением «график продаж» и больше ничего не добавлять."
    correct: [a]
    explanation: "Незрячему нужны те же данные, что видит зрячий, а они не помещаются в строку alt. Короткий alt называет и типизирует картинку, а подробные значения выносят в доступный текст, таблицу или по ссылке рядом. Так данные доходят и до людей, и до автоматических проверок."
    hints:
      - "Спросите, что именно должен получить незрячий читатель: не картинку, а те же данные, что видит зрячий. Поместится ли всё это в одну строку alt?"
      - "Разделите задачу на две части: как коротко назвать саму картинку и где разместить подробные данные, чтобы их прочитали и люди, и автоматические проверки."
