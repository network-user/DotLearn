exercises:
  - id: semantic-html-blanks-skeleton-001
    concept: semantic-html
    type: fill-in-blanks
    difficulty: 1
    prompt: "Дополните семантический скелет страницы подходящими тегами вместо анонимных div."
    template: |
      <{{top}}>
        <h1>Интернет-магазин</h1>
        <{{menu}}>
          <a href="/catalog">Каталог</a>
        </{{menu}}>
      </{{top}}>
      <{{content}}>
        <p>Основной контент страницы.</p>
      </{{content}}>
    blanks:
      top:
        accept: ['header']
      menu:
        accept: ['nav']
      content:
        accept: ['main']
    explanation: "header открывает страницу и объявляется как баннер, nav помечает блок навигации, main содержит единственную основную область контента. Каждый тег даёт скринридеру ориентир, которого у div нет."
    hints:
      - "Три роли: вводная часть страницы, блок навигационных ссылок и основное содержимое."
    variants:
      - prompt: "Дополните семантический скелет страницы подходящими тегами вместо анонимных div."
        template: |
          <{{main}}>
            <article>Статья блога.</article>
            <{{side}}>Похожие статьи.</{{side}}>
          </{{main}}>
          <{{bottom}}>
            <p>© 2026</p>
          </{{bottom}}>
        blanks:
          main:
            accept: ['main']
          side:
            accept: ['aside']
          bottom:
            accept: ['footer']
        explanation: "main это основной контент, aside помечает необязательное дополнительное содержимое, footer завершает страницу как информация о ней. Все три задают ориентиры верхнего уровня."

  - id: semantic-html-button-vs-div-002
    concept: semantic-html
    type: theory-quiz
    difficulty: 2
    prompt: 'Разработчик сделал кнопку из <div> со слушателем клика вместо <button>. Что теряет пользователь, который работает только с клавиатуры?'
    choices:
      - id: a
        text: "Элемент нельзя сфокусировать по Tab и активировать по Enter или пробелу, а"
      - id: b
        text: "Ничего: div со слушателем клика полностью заменяет button."
      - id: c
        text: "Теряется только цвет фона кнопки, поведение остаётся тем же."
    correct: [a]
    explanation: "Нативный button приносит роль, попадание в порядок обхода фокуса и реакцию на Enter и пробел бесплатно. У div со слушателем клика ничего этого нет, поэтому пользователь клавиатуры до кнопки не доберётся."
    variants:
      - prompt: 'Чем нативный <button> отличается от <div role="button" tabindex="0">, даже если ко второму уже добавили обработчик клика?'
        choices:
          - id: a
            text: "Нативная кнопка сама реагирует на пробел и умеет состояние disabled, а для"
          - id: b
            text: "Ничем: с ролью и tabindex это полностью равнозначные элементы."
          - id: c
            text: "div работает быстрее и потому предпочтительнее."
        correct: [a]
        explanation: "role и tabindex дают div роль и фокус, но не добавляют реакцию на пробел и Enter и не приносят disabled. Их приходится программировать самому, и это легко забыть, поэтому нативный button надёжнее."

  - id: semantic-html-landmarks-count-003
    concept: semantic-html
    type: predict-output
    difficulty: 3
    prompt: "Каждый из этих тегов верхнего уровня объявляет ровно один ориентир (landmark). Сколько ориентиров получит скринридер? Ответьте одним числом."
    snippet: |
      <body>
        <header>Логотип</header>
        <nav>Меню</nav>
        <main>Статья</main>
        <aside>Реклама</aside>
        <footer>Контакты</footer>
      </body>
    expected:
      kind: scalar
      value: 5
    explanation: "header даёт роль banner, nav даёт navigation, main даёт main, aside даёт complementary, footer даёт contentinfo. Пять семантических регионов верхнего уровня дают пять ориентиров; тег body сам ориентиром не является."
    hints:
      - "Ориентир создаёт не любой тег, а тот, у которого есть встроенная роль региона. Пробегитесь по разметке и отметьте, какие теги называют участок страницы."
      - "Каждый семантический регион верхнего уровня добавляет один пункт в список ориентиров, а обёртки вроде div и body в него не попадают."
