exercises:
  - id: why-accessibility-benefits-001
    concept: why-accessibility
    type: theory-quiz
    difficulty: 1
    prompt: "Крупный шрифт и высокий контраст добавили ради слабовидящих. Кто ещё выигрывает от этого в первую очередь?"
    choices:
      - id: a
        text: "Человек на ярком солнце, где экран бликует и бледный текст исчезает."
      - id: b
        text: "Только слабовидящие, для остальных это лишнее."
      - id: c
        text: "Разработчик бэкенда, который вообще не открывает интерфейс."
    correct: [a]
    explanation: "Это эффект бордюрного съезда: решение для одной группы с ограничениями выручает всех, у кого та же потребность возникает ситуативно. Высокий контраст задумывали для слабовидящих, а спасает он и того, кто читает экран на солнце."
    variants:
      - prompt: "Субтитры к видео добавили ради глухих зрителей. Кто ещё выигрывает в первую очередь?"
        choices:
          - id: a
            text: "Пассажир метро без наушников в шумном вагоне."
          - id: b
            text: "Только глухие пользователи."
          - id: c
            text: "Поисковый робот, который не смотрит видео."
        correct: [a]
        explanation: "Субтитры читают в шумном транспорте, в тихом офисе и дома у спящего ребёнка. Функция для одной группы оказывается удобной для многих ситуативно ограниченных."
      - prompt: "Управление только с клавиатуры сделали ради людей, которые не пользуются мышью. Кто ещё выигрывает?"
        choices:
          - id: a
            text: "Опытный пользователь, которому быстрее работать горячими клавишами."
          - id: b
            text: "Никто, кроме людей с моторными ограничениями."
          - id: c
            text: "Дизайнер, который рисует макеты в графическом редакторе."
        correct: [a]
        explanation: "Клавиатурная навигация ускоряет любого, кто освоил горячие клавиши. Это снова эффект бордюрного съезда: доступность для одних оборачивается удобством для всех."

  - id: why-accessibility-blanks-kinds-002
    concept: why-accessibility
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите вид ограничения: постоянное, временное или ситуативное."
    template: |
      Слепота даёт {{perm}} ограничение зрения.
      Воспаление глаза и повязка на неделю дают {{temp}} ограничение.
      Яркое солнце на экране прямо сейчас создаёт {{sit}} ограничение.
    blanks:
      perm:
        accept: ['постоянное']
      temp:
        accept: ['временное']
      sit:
        accept: ['ситуативное', 'ситуационное']
    explanation: "Одна и та же способность (зрение) страдает по-разному: навсегда, на ограниченный срок или только в конкретный момент. Решение для всех трёх одно, поэтому проектируют для крайнего случая."
    hints:
      - "Три оси времени: навсегда, на ограниченный срок или только прямо сейчас."
    variants:
      - prompt: "Впишите вид ограничения: постоянное, временное или ситуативное."
        template: |
          Полная глухота даёт {{perm}} ограничение слуха.
          Ларингит и потеря голоса на неделю дают {{temp}} ограничение.
          Шумный вагон метро прямо сейчас создаёт {{sit}} ограничение.
        blanks:
          perm:
            accept: ['постоянное']
          temp:
            accept: ['временное']
          sit:
            accept: ['ситуативное', 'ситуационное']
        explanation: "Слух, как и зрение, ограничивается на разный срок. Субтитры одинаково выручают и глухого навсегда, и человека в шумном метро на минуту."

  - id: why-accessibility-spectrum-003
    concept: why-accessibility
    type: theory-quiz
    difficulty: 3
    prompt: "Почему доступность правильнее считать спектром, а не свойством «есть или нет»?"
    choices:
      - id: a
        text: "Способности меняются по степени и по ситуации, и почти каждый временно или ситуативно оказывается в роли пользователя с ограничением."
      - id: b
        text: "Сайт либо полностью доступен, либо полностью недоступен, среднего не бывает."
      - id: c
        text: "Доступность измеряют только яркостью цветов на странице."
      - id: d
        text: "Доступность нужна лишь незначительному меньшинству, поэтому её можно не учитывать."
    correct: [a]
    explanation: "Доступность это набор осей (зрение, слух, моторика, внимание), и по каждой оси человек занимает подвижную позицию. За день любой из нас бывает временно или ситуативно ограничен, поэтому граница «здоров или инвалид» ничего не описывает."
    hints:
      - "Вспомните Анну на солнце и Бориса с рукой в гипсе. Попадают ли они в жёсткую категорию «здоров» или «инвалид»?"
      - "Прикиньте, у скольких людей за один день способность видеть, слышать или свободно пользоваться рукой временно снижается."
