exercises:
  - id: screen-readers-role-predict-001
    concept: screen-readers
    type: predict-output
    difficulty: 2
    prompt: "Ответьте одним словом в нижнем регистре: какую роль объявит скринридер для этого элемента?"
    snippet: |
      <a href="/cart">Корзина</a>
    expected:
      kind: scalar
      value: "ссылка"
    explanation: "Тег <a> с адресом несёт встроенную роль «ссылка», а имя «Корзина» скринридер берёт из текста внутри элемента. Прозвучит «ссылка, Корзина»."
    variants:
      - prompt: "Ответьте одним словом в нижнем регистре: какую роль объявит скринридер для этого элемента?"
        snippet: |
          <button>Отправить</button>
        expected:
          kind: scalar
          value: "кнопка"
        explanation: "Тег <button> несёт роль «кнопка». Скринридер объявит «кнопка, Отправить»."
      - prompt: "Ответьте одним словом в нижнем регистре: какую роль объявит скринридер для этого элемента?"
        snippet: |
          <input type="checkbox" checked>
        expected:
          kind: scalar
          value: "флажок"
        explanation: "input с type=\"checkbox\" несёт роль «флажок», а checked даёт состояние «отмечен». Прозвучит «флажок, отмечен»."
      - prompt: "Ответьте одним словом в нижнем регистре: какую роль объявит скринридер для этого элемента?"
        snippet: |
          <h2>Отзывы покупателей</h2>
        expected:
          kind: scalar
          value: "заголовок"
        explanation: "Теги h1..h6 несут роль «заголовок» с номером уровня. Прозвучит «заголовок второго уровня, Отзывы покупателей»."

  - id: screen-readers-navigation-002
    concept: screen-readers
    type: theory-quiz
    difficulty: 1
    prompt: "Незрячий пользователь хочет быстро перескакивать между разделами длинной статьи, не слушая её целиком. По чему он перемещается в первую очередь?"
    choices:
      - id: a
        text: "По заголовкам и ориентирам страницы, вызывая их список клавишей навигации."
      - id: b
        text: "По цвету фона блоков, ощущая его на слух."
      - id: c
        text: "По координатам пикселей каждого блока."
    correct: [a]
    explanation: "Скринридер строит список заголовков и ориентиров и позволяет прыгать по ним виртуальным курсором. Поэтому осмысленные заголовки и семантические ориентиры работают как карта страницы."
    variants:
      - prompt: "Пользователь скринридера хочет попасть сразу к главному меню сайта, минуя всё остальное. Что позволяет сделать это одним действием?"
        choices:
          - id: a
            text: "Ориентир навигации, который задаёт тег nav (landmark navigation)."
          - id: b
            text: "Крупный шрифт в пункте меню."
          - id: c
            text: "Положение меню в верхней части экрана."
        correct: [a]
        explanation: "Семантический тег nav создаёт ориентир, и скринридер добавляет его в список landmarks. Пользователь переходит к навигации одной командой, не завися от того, где меню нарисовано."

  - id: screen-readers-dom-order-003
    concept: screen-readers
    type: theory-quiz
    difficulty: 3
    prompt: "В разметке кнопка «Оформить заказ» стоит последней, после подвала, но стилями её визуально подняли в самый верх экрана. В каком порядке её прочитает скринридер относительно остального контента?"
    choices:
      - id: a
        text: "В самом конце: скринридер и клавиатура идут по порядку DOM, а не по тому, что видно на экране."
      - id: b
        text: "В самом верху, потому что скринридер читает по видимому положению элементов."
      - id: c
        text: "Скринридер вообще пропустит кнопку, если её подвинули стилями."
    correct: [a]
    explanation: "CSS меняет только картинку. Дерево DOM остаётся в исходном порядке, а именно по нему идут и чтение, и порядок обхода фокуса. Кнопку озвучат последней, хотя глаз видит её первой, поэтому логический порядок держат в разметке."
    hints:
      - "Вспомните, что скринридер разворачивает страницу в одну ленту. Откуда он берёт порядок этой ленты: из стилей или из разметки?"
      - "CSS двигает пиксели, но не переписывает дерево DOM. По чему тогда идут чтение и фокус по Tab?"
