exercises:
  - id: aria-blanks-attributes-001
    concept: aria
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Допишите ARIA-атрибуты так, чтобы кнопка-раскрывашка сообщала своё состояние, а кнопка со значком получила доступное имя.'
    template: |
      <button aria-{{state}}="false" aria-controls="menu">Меню</button>
      <button aria-{{name}}="Закрыть">×</button>
    blanks:
      state:
        accept: ['expanded']
      name:
        accept: ['label']
    explanation: 'aria-expanded объявляет, раскрыт список или свёрнут; aria-label даёт кнопке со значком × понятное доступное имя «Закрыть», которого иначе у неё нет.'
    hints:
      - 'Одно состояние отвечает за «раскрыто или свёрнуто», одно свойство задаёт имя там, где нет видимого текста.'
    variants:
      - prompt: 'Допишите разметку вкладок так, чтобы у контейнера была роль списка вкладок, а активная вкладка объявляла свою выбранность.'
        template: |
          <div {{role}}="tablist">
            <button role="tab" aria-{{sel}}="true">Вход</button>
          </div>
        blanks:
          role:
            accept: ['role']
          sel:
            accept: ['selected']
        explanation: 'role=tablist сообщает скринридеру, что перед ним набор вкладок; aria-selected=true помечает активную вкладку среди них.'

  - id: aria-quiz-rule-one-002
    concept: aria
    type: theory-quiz
    difficulty: 2
    prompt: 'Вам нужна обычная кнопка. Что советует первое правило использования ARIA?'
    choices:
      - id: a
        text: 'Взять нативную кнопку button, ARIA здесь не нужна.'
      - id: b
        text: 'Взять div и добавить role=button.'
      - id: c
        text: 'Взять div, добавить role=button и aria-label.'
      - id: d
        text: 'Взять span с role=button и tabindex=0.'
    correct: [a]
    explanation: 'Первое правило: если нужную роль и поведение уже даёт нативный элемент, используйте его. Нативная button бесплатно даёт роль, клавиатуру и фокус; размеченный div приходится доводить вручную и легко ошибиться. Отсюда и «No ARIA is better than Bad ARIA».'
    hints:
      - 'Правило звучит как «No ARIA is better than Bad ARIA». Что оно предпочитает разметке на div?'
    variants:
      - prompt: 'Что на практике означает принцип «No ARIA is better than Bad ARIA»?'
        choices:
          - id: a
            text: 'Лучше нативный элемент без ARIA, чем неверная ARIA поверх div.'
          - id: b
            text: 'ARIA нужно добавлять к каждому элементу страницы.'
          - id: c
            text: 'ARIA полностью отменяет необходимость в семантическом HTML.'
          - id: d
            text: 'Скринридеры игнорируют элементы без ARIA-атрибутов.'
        correct: [a]
        explanation: 'Принцип предупреждает: неправильная ARIA вредит сильнее, чем её отсутствие, ведь она объявляет то, чего на деле нет. Нативная семантика без единого ARIA-атрибута обычно и есть лучшее решение.'

  - id: aria-predict-expanded-003
    concept: aria
    type: predict-output
    difficulty: 2
    prompt: 'Кнопка «Фильтры» раскрывает список. Ответьте одним словом (развёрнуто или свёрнуто): какое состояние объявит скринридер для разметки ниже?'
    snippet: |
      <button aria-expanded="true" aria-controls="filters">Фильтры</button>
    expected:
      kind: scalar
      value: 'развёрнуто'
    explanation: 'aria-expanded=true означает, что связанный список сейчас раскрыт, и скринридер объявляет это как «развёрнуто». При false он объявил бы «свёрнуто».'
    hints:
      - 'Значение true у aria-expanded говорит, что управляемая область сейчас открыта.'
    variants:
      - prompt: 'Тот же виджет в другом состоянии. Ответьте одним словом (развёрнуто или свёрнуто): что объявит скринридер?'
        snippet: |
          <button aria-expanded="false" aria-controls="filters">Фильтры</button>
        expected:
          kind: scalar
          value: 'свёрнуто'
        explanation: 'aria-expanded=false означает, что управляемый список сейчас скрыт, и скринридер объявляет «свёрнуто».'

  - id: aria-quiz-label-overwrite-004
    concept: aria
    type: theory-quiz
    difficulty: 3
    prompt: 'У кнопки видимый текст «Оформить заказ», но задан aria-label="Отправить". Чем это опасно помимо расхождения в озвучке скринридера?'
    choices:
      - id: a
        text: 'Голосовое управление ищет кнопку по доступному имени'
      - id: b
        text: 'aria-label замедляет отрисовку кнопки.'
      - id: c
        text: 'Кнопка выпадает из порядка обхода фокуса.'
      - id: d
        text: 'Видимый текст перестаёт отображаться на экране.'
    correct: [a]
    explanation: 'aria-label заменяет доступное имя целиком, а не дополняет видимый текст. Пользователь распознавания речи произносит то, что видит («Оформить заказ»), но система сопоставляет команду с доступным именем («Отправить») и промахивается. Видимое и объявляемое имя должны совпадать.'
    hints:
      - 'Вспомните, что aria-label делает с доступным именем: дополняет видимый текст или заменяет его?'
      - 'Подумайте о тех, кто управляет браузером голосом и произносит ровно то, что видит на кнопке.'

  - id: aria-quiz-bad-aria-005
    concept: aria
    type: theory-quiz
    difficulty: 4
    prompt: 'Отметьте все фрагменты, которые являются примером плохой или вредной ARIA.'
    choices:
      - id: a
        text: '<div role="button">Купить</div> без tabindex и обработчиков клавиш.'
      - id: b
        text: '<button aria-label="Отправить">Оформить заказ</button> с несовпадающими именем и видимым текстом.'
      - id: c
        text: '<button aria-expanded="false" aria-controls="menu">Меню</button> на кнопке-раскрывашке.'
      - id: d
        text: '<a href="/cart" aria-hidden="true">Корзина</a>, фокусируемая ссылка, спрятанная от скринридера.'
      - id: e
        text: '<button aria-label="Закрыть">×</button> на кнопке с одним значком.'
      - id: f
        text: '<h2 role="button">Раздел</h2> вместо настоящей кнопки.'
    correct: [a, b, d, f]
    explanation: 'Плохая ARIA объявляет то, чего на деле нет, или ломает нативную семантику. a: роль кнопки без клавиатуры недостижима. b: aria-label затирает видимый текст и ломает голосовое управление. d: aria-hidden прячет элемент, который остаётся в порядке обхода, и фокус встаёт на «пустоту». f: role=button поверх заголовка сбивает и семантику, и ожидания. А c и e корректны: aria-expanded на нативной кнопке и aria-label на кнопке-значке это ровно те случаи, ради которых ARIA и существует.'
    hints:
      - 'Хорошая ARIA описывает то, что элемент действительно делает и как им управляют. По каждому фрагменту спросите: совпадает ли объявленное с реальным поведением, клавиатурой и видимым текстом?'
      - 'Ищите признаки беды: роль без клавиатуры; доступное имя вразрез с видимым текстом; фокусируемый элемент, спрятанный от скринридера; подмена семантики нативного тега. А корректная ARIA просто уточняет состояние или даёт имя там, где его нет.'
