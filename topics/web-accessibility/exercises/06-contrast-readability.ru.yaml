exercises:
  - id: contrast-predict-aa-001
    concept: contrast-readability
    type: predict-output
    difficulty: 1
    prompt: 'Ответьте одним словом (да или нет): проходит ли эта пара порог AA для своего типа текста?'
    snippet: |
      Текст на фоне: тёмно-серый на белом.
      Коэффициент контраста: 3.5:1.
      Тип текста: обычный, 16px.
    expected:
      kind: scalar
      value: 'нет'
    explanation: 'Обычному тексту нужен контраст не ниже 4.5:1. Значение 3.5:1 до этого порога не дотягивает, поэтому пара уровень AA не проходит.'
    hints:
      - 'Сравните число с порогом именно для обычного текста.'
    variants:
      - prompt: 'Ответьте одним словом (да или нет): проходит ли эта пара порог AA для своего типа текста?'
        snippet: |
          Текст на фоне: серый на белом.
          Коэффициент контраста: 3.5:1.
          Тип текста: крупный, 20pt обычной насыщенности.
        expected:
          kind: scalar
          value: 'да'
        explanation: 'Крупный текст (от 18pt обычного или 14pt полужирного) проходит по более мягкому порогу 3:1. Значение 3.5:1 его превышает, поэтому уровень AA соблюдён.'
      - prompt: 'Ответьте одним словом (да или нет): проходит ли эта пара порог AA для своего типа текста?'
        snippet: |
          Текст на фоне: тёмно-серый на белом.
          Коэффициент контраста: 5.2:1.
          Тип текста: обычный, 16px.
        expected:
          kind: scalar
          value: 'да'
        explanation: 'Значение 5.2:1 выше порога 4.5:1 для обычного текста, значит уровень AA пройден.'

  - id: contrast-quiz-color-only-002
    concept: contrast-readability
    type: theory-quiz
    difficulty: 2
    prompt: 'Форма помечает поле с ошибкой только красной рамкой и ничем больше. Почему это барьер?'
    choices:
      - id: a
        text: 'Пользователь с дальтонизмом может не отличить красную рамку от обычной и не заметить ошибку.'
      - id: b
        text: 'Красный цвет замедляет загрузку страницы.'
      - id: c
        text: 'Красная рамка перекрывает текст поля.'
      - id: d
        text: 'Рамка меняет порядок обхода фокуса.'
    correct: [a]
    explanation: 'Около восьми процентов мужчин хуже различают цвета, чаще красный и зелёный. Если единственный признак ошибки это цвет рамки, для них он теряется. Ошибку нужно дублировать значком и текстом.'
    hints:
      - 'Подумайте о читателе, который вообще не различает красный и зелёный.'
    variants:
      - prompt: 'Ссылки в тексте статьи отличаются от обычных слов только цветом, без подчёркивания. Кому это создаёт проблему?'
        choices:
          - id: a
            text: 'Тем, кто плохо различает цвета: для них ссылка сливается с обычным текстом.'
          - id: b
            text: 'Только пользователям мобильных телефонов.'
          - id: c
            text: 'Поисковым роботам, которые не видят цвет.'
          - id: d
            text: 'Никому: цвета всегда достаточно, чтобы выделить ссылку.'
        correct: [a]
        explanation: 'Цвет как единственный признак ссылки не работает для людей с дальтонизмом. Подчёркивание возвращает ссылке видимость независимо от восприятия цвета.'

  - id: contrast-blanks-thresholds-003
    concept: contrast-readability
    type: fill-in-blanks
    difficulty: 2
    prompt: 'Впишите пороги контраста WCAG (числа коэффициента) для перечисленных случаев.'
    template: |
      Обычный текст, уровень AA: {{aa_normal}}:1
      Крупный текст, уровень AA: {{aa_large}}:1
      Обычный текст, уровень AAA: {{aaa_normal}}:1
    blanks:
      aa_normal:
        accept: ['4.5']
      aa_large:
        accept: ['3', '3.0']
      aaa_normal:
        accept: ['7', '7.0']
    explanation: 'AA требует 4.5:1 для обычного текста и 3:1 для крупного; AAA поднимает обычный текст до 7:1.'
    hints:
      - 'Крупный текст получает самый мягкий порог, а уровень AAA самый строгий.'
    variants:
      - prompt: 'Впишите пороги контраста WCAG (числа коэффициента) для случаев ниже.'
        template: |
          Крупный текст, уровень AA: {{large}}:1
          Границы поля ввода и значки, уровень AA: {{ui}}:1
          Обычный текст, уровень AA: {{normal}}:1
        blanks:
          large:
            accept: ['3', '3.0']
          ui:
            accept: ['3', '3.0']
          normal:
            accept: ['4.5']
        explanation: 'Крупный текст и нетекстовые элементы интерфейса (границы полей, значки) делят один порог 3:1, а обычный текст требует 4.5:1.'

  - id: contrast-quiz-size-threshold-004
    concept: contrast-readability
    type: theory-quiz
    difficulty: 3
    prompt: 'Заголовок набран шрифтом 15pt обычной насыщенности (не полужирный). Какой порог контраста AA к нему применяется?'
    choices:
      - id: a
        text: '4.5:1, потому что 15pt обычного веса это ещё обычный текст по классификации WCAG.'
      - id: b
        text: '3:1, потому что любой заголовок считается крупным текстом.'
      - id: c
        text: '3:1, потому что 15pt больше 14pt.'
      - id: d
        text: '7:1, для заголовков всегда действует уровень AAA.'
    correct: [a]
    explanation: '«Крупный» в WCAG определяется не ролью тега, а размером: от 18pt обычного или от 14pt полужирного. 15pt обычной насыщенности до этой границы не дотягивает, поэтому это обычный текст с порогом 4.5:1. Порог для 14pt действует только для полужирного, а здесь шрифт обычный.'
    hints:
      - '«Крупный» в WCAG задаётся не тем, что элемент это заголовок, а абсолютным размером и насыщенностью шрифта.'
      - 'Порог 3:1 включается от 18pt обычного или от 14pt полужирного. Обычные 15pt ни до одной из этих границ не дотягивают.'
