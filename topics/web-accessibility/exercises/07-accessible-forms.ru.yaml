exercises:
  - id: accessible-forms-blanks-labelfor-001
    concept: accessible-forms
    type: fill-in-blanks
    difficulty: 1
    prompt: "Свяжите подпись с полем: впишите значения for и id так, чтобы они совпали и скринридер объявил подпись как доступное имя поля."
    template: |
      <label for="{{lf}}">Электронная почта</label>
      <input id="{{iid}}" type="email" autocomplete="email">
    blanks:
      lf:
        accept: ['email']
      iid:
        accept: ['email']
    explanation: "Связь label и input держится на равенстве строк: значение for у подписи и id у поля должны совпадать буква в букву. Расходятся значения, и подпись программно перестаёт относиться к полю."
    variants:
      - prompt: "Свяжите подпись «Телефон» с полем ввода: впишите одинаковые значения for и id."
        template: |
          <label for="{{lf}}">Телефон</label>
          <input id="{{iid}}" type="tel" autocomplete="tel">
        blanks:
          lf:
            accept: ['phone']
          iid:
            accept: ['phone']
        explanation: "for и id снова обязаны совпадать. Само слово не важно, важно равенство: пара phone/phone связывает подпись «Телефон» именно с этим полем."

  - id: accessible-forms-quiz-placeholder-001
    concept: accessible-forms
    type: theory-quiz
    difficulty: 2
    prompt: "Почему placeholder не может заменить подпись label у поля ввода?"
    choices:
      - id: a
        text: "Он исчезает при вводе, часто не проходит по контрасту и не всегда читается как доступное имя."
      - id: b
        text: "Он виден только в мобильных браузерах."
      - id: c
        text: "Он всегда дублирует уже введённое значение поля."
      - id: d
        text: "Он запрещён спецификацией HTML."
    correct: [a]
    explanation: "placeholder это подсказка о формате, а не имя поля. Он пропадает, как только пользователь начинает печатать, его серый текст часто не проходит по контрасту, и часть скринридеров вовсе не считает его доступным именем."
    variants:
      - prompt: "Что произойдёт с подсказкой в placeholder, когда пользователь начнёт вводить данные в поле?"
        choices:
          - id: a
            text: "Она исчезнет, и если подписи label нет, поле останется без доступного имени."
          - id: b
            text: "Она поднимется над полем и станет постоянной подписью."
          - id: c
            text: "Она автоматически скопируется в атрибут aria-label."
          - id: d
            text: "Ничего, placeholder виден всё время ввода."
        correct: [a]
        explanation: "Подсказка placeholder видна только в пустом поле. При первом же символе она пропадает, и без настоящего label поле теряет доступное имя ровно в момент заполнения."

  - id: accessible-forms-predict-name-001
    concept: accessible-forms
    type: predict-output
    difficulty: 2
    prompt: "Ответьте одним словом (ровно так, как написано в подписи): какое доступное имя объявит скринридер для этого поля?"
    snippet: |
      <label for="phone">Телефон</label>
      <input id="phone" type="tel">
    expected:
      kind: scalar
      value: "Телефон"
    explanation: "for и id совпадают (phone), поэтому подпись программно связана с полем. Скринридер берёт текст подписи как доступное имя и объявляет «Телефон, поле ввода»."
    variants:
      - prompt: "Ответьте одним словом (ровно так, как написано в подписи): какое доступное имя объявит скринридер для этого поля?"
        snippet: |
          <label for="lname">Фамилия</label>
          <input id="lname" type="text">
        expected:
          kind: scalar
          value: "Фамилия"
        explanation: "Пара lname/lname связывает подпись с полем, и доступным именем становится текст подписи «Фамилия»."

  - id: accessible-forms-quiz-errors-001
    concept: accessible-forms
    type: theory-quiz
    difficulty: 3
    prompt: "Поле заполнено неверно. Как правильно связать текст ошибки с полем и сообщить об ошибке скринридеру, а не только зрячему пользователю?"
    choices:
      - id: a
        text: "Связать поле с блоком ошибки через aria-describedby и пометить поле атрибутом aria-invalid."
      - id: b
        text: "Достаточно покрасить рамку поля в красный цвет."
      - id: c
        text: "Записать текст ошибки в атрибут placeholder поля."
      - id: d
        text: "Положиться на встроенную подсказку браузера и ничего не связывать в разметке."
    correct: [a]
    explanation: "Скринридер не видит цвет рамки. aria-describedby указывает поле на id блока с текстом ошибки, чтобы описание прозвучало сразу после имени поля, а aria-invalid помечает само поле как заполненное неверно. Цвет остаётся дополнительным сигналом для зрячих, но не единственным."
    hints:
      - "Скринридер не воспринимает цвет рамки. Подумайте, какая связь между полем и текстом ошибки должна существовать в разметке, а не только на экране."
      - "Нужны две вещи: атрибут, который направляет поле к id блока с текстом ошибки, и отдельный атрибут-флаг, помечающий поле как неверно заполненное."
