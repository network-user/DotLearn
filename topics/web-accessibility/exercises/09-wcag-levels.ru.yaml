exercises:
  - id: wcag-levels-pour-blanks-001
    concept: wcag-levels
    type: fill-in-blanks
    difficulty: 1
    prompt: "Впишите названия четырёх принципов WCAG (POUR) напротив короткого описания каждого."
    template: |
      Контент можно воспринять: {{p1}}.
      Интерфейсом можно управлять: {{p2}}.
      Контент и поведение понятны: {{p3}}.
      Разметку читают вспомогательные технологии: {{p4}}.
    blanks:
      p1:
        accept: ['Воспринимаемость', 'воспринимаемость']
        accept_regex: '^\s*[Вв]оспринимаемость\.?\s*$'
      p2:
        accept: ['Управляемость', 'управляемость']
        accept_regex: '^\s*[Уу]правляемость\.?\s*$'
      p3:
        accept: ['Понятность', 'понятность']
        accept_regex: '^\s*[Пп]онятность\.?\s*$'
      p4:
        accept: ['Надёжность', 'Надежность', 'надёжность', 'надежность']
        accept_regex: '^\s*[Нн]ад[ёе]жность\.?\s*$'
    explanation: "POUR это Воспринимаемость, Управляемость, Понятность и Надёжность. Любой критерий WCAG служит одному из этих четырёх принципов."
    variants:
      - prompt: "Впишите обозначения трёх уровней соответствия WCAG напротив описания каждого."
        template: |
          Минимальный уровень, без него частью сайта пользоваться нельзя: {{lv1}}.
          Практическая цель, на которую ссылаются законы: {{lv2}}.
          Усиленный уровень, не для всего сайта сразу: {{lv3}}.
        blanks:
          lv1:
            accept: ['A', 'А']
            accept_regex: '^\s*[AА]\s*$'
          lv2:
            accept: ['AA', 'АА']
            accept_regex: '^\s*[AА]{2}\s*$'
          lv3:
            accept: ['AAA', 'ААА']
            accept_regex: '^\s*[AА]{3}\s*$'

  - id: wcag-levels-principle-quiz-001
    concept: wcag-levels
    type: theory-quiz
    difficulty: 2
    prompt: "Требование «весь функционал доступен с клавиатуры, без мыши» относится к одному из принципов POUR. К какому?"
    choices:
      - id: a
        text: "Управляемость"
      - id: b
        text: "Воспринимаемость"
      - id: c
        text: "Значение Понятность, выбранное как полный ответ"
      - id: d
        text: "Значение Надёжность, выбранное как полный ответ"
    correct: [a]
    explanation: "Управляемость отвечает за то, что интерфейсом можно управлять любым способом ввода, в том числе одной клавиатурой. Доступность с клавиатуры это её ключевое требование."
    hints:
      - "Спросите себя: этот критерий про то, как контент воспринимают, как им управляют, насколько он понятен или как его читают технологии?"
    variants:
      - prompt: "Требование «у каждой информативной картинки есть текстовая альтернатива» относится к какому принципу POUR?"
        choices:
          - id: a
            text: "Воспринимаемость"
          - id: b
            text: "Управляемость"
          - id: c
            text: "Значение Понятность, выбранное как полный ответ"
          - id: d
            text: "Значение Надёжность, выбранное как полный ответ"
        correct: [a]
        explanation: "Текстовая альтернатива нужна, чтобы информация с картинки дошла до того, кто её не видит. Это Воспринимаемость."
      - prompt: "Требование «сообщения об ошибках в форме описаны понятным текстом» относится к какому принципу POUR?"
        choices:
          - id: a
            text: "Значение Понятность, выбранное как полный ответ"
          - id: b
            text: "Воспринимаемость"
          - id: c
            text: "Управляемость"
          - id: d
            text: "Значение Надёжность, выбранное как полный ответ"
        correct: [a]
        explanation: "Понятность отвечает за предсказуемость и ясность: внятные подписи и сообщения об ошибках относятся именно к ней."

  - id: wcag-levels-min-level-predict-001
    concept: wcag-levels
    type: predict-output
    difficulty: 2
    prompt: "Какой минимальный уровень WCAG требует контраст обычного текста не ниже 4.5:1? Ответьте обозначением уровня: A, AA или AAA."
    snippet: |
      Критерий 1.4.3 «Контраст (минимум)»
      Требование: контраст текста и фона не ниже 4.5:1
    expected:
      kind: scalar
      value: "AA"
    explanation: "Контраст 4.5:1 для обычного текста задаёт критерий 1.4.3 уровня AA. Усиленные 7:1 это уже критерий 1.4.6 уровня AAA."
    variants:
      - prompt: "Какой уровень WCAG требует усиленный контраст обычного текста 7:1? Ответьте обозначением уровня: A, AA или AAA."
        snippet: |
          Критерий 1.4.6 «Контраст (усиленный)»
          Требование: контраст текста и фона не ниже 7:1
        expected:
          kind: scalar
          value: "AAA"

  - id: wcag-levels-nesting-quiz-001
    concept: wcag-levels
    type: theory-quiz
    difficulty: 3
    prompt: "Команда выполнила все критерии уровня AA, но осознанно пропустила один критерий уровня A, посчитав его неважным для их аудитории. Можно ли заявлять соответствие уровню AA?"
    choices:
      - id: a
        text: "Нельзя: соответствие AA требует выполнить все критерии уровней A и AA без исключений."
      - id: b
        text: "Можно: важны именно критерии AA, а уровень A необязателен, если целятся выше."
      - id: c
        text: "Можно, если пропущенный критерий A не относится к принципу Воспринимаемость."
      - id: d
        text: "Можно, соответствие засчитывается частично, пропорционально числу выполненных критериев."
    correct: [a]
    explanation: "Уровни вложены: заявка на AA действительна, только когда закрыты все критерии A и все критерии AA. Один проваленный критерий A обнуляет заявку целиком, а частичного зачёта в WCAG нет."
    hints:
      - "Вспомните картинку с пирамидой: уровни это вложенные множества, а не независимые корзины."
      - "Подумайте, бывает ли в WCAG частичный зачёт и что делает один невыполненный критерий более низкого уровня."
