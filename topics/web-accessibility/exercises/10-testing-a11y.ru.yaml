exercises:
  - id: testing-a11y-auto-limits-quiz-001
    concept: testing-a11y
    type: theory-quiz
    difficulty: 1
    prompt: "Что из перечисленного автоматический аудит (axe, Lighthouse) проверить надёжно НЕ может?"
    choices:
      - id: a
        text: "Осмысленность alt: описывает ли он картинку по существу."
      - id: b
        text: "Наличие атрибута alt у картинки."
      - id: c
        text: "Достаточность цветового контраста по формуле."
      - id: d
        text: "Наличие подписи у поля формы."
    correct: [a]
    explanation: "Машина проверяет наличие, а не смысл. Есть ли alt, контраст и подпись, она посчитает; осмысленность текста alt оценить не в состоянии, это делает человек."
    variants:
      - prompt: "Что из перечисленного автоматический аудит вполне способен проверить сам?"
        choices:
          - id: a
            text: "Достаточность цветового контраста по формуле."
          - id: b
            text: "Логичность порядка перехода фокуса по Tab."
          - id: c
            text: "Понятность формулировки подписи для человека."
          - id: d
            text: "Осмысленность текста в alt."
        correct: [a]
        explanation: "Контраст считается по формуле яркостей, и это ровно та проверка, где машина сильна. Логика фокуса и качество формулировок остаются человеку."
      - prompt: "Какую из проблем автоматический аудит в принципе не заметит?"
        choices:
          - id: a
            text: "Порядок перехода по Tab прыгает и нелогичен, хотя все элементы доступны."
          - id: b
            text: "У картинки полностью отсутствует атрибут alt."
          - id: c
            text: "Контраст текста ниже 4.5:1."
          - id: d
            text: "У кнопки нет доступного имени."
        correct: [a]
        explanation: "Отсутствие alt, низкий контраст и кнопку без имени автоматика ловит. А нелогичный порядок фокуса это вопрос смысла, машина его не оценивает."

  - id: testing-a11y-tools-blanks-001
    concept: testing-a11y
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски: три слоя проверки доступности и типичный инструмент для каждого."
    template: |
      Автоматический аудит движком {{tool}} от Deque.
      Клавиатурный тест: пройти страницу клавишей {{key}}.
      Проверка скринридером: на Windows бесплатен {{sr}}.
    blanks:
      tool:
        accept: ['axe', 'axe-core']
        accept_regex: '^\s*axe(-core)?\s*$'
      key:
        accept: ['Tab', 'tab', 'TAB']
        accept_regex: '^\s*[Tt][Aa][Bb]\s*$'
      sr:
        accept: ['NVDA', 'nvda']
        accept_regex: '^\s*[Nn][Vv][Dd][Aa]\s*$'
    explanation: "Движок axe от Deque это стандарт автоматической проверки, клавиша Tab проводит клавиатурный тест, а NVDA бесплатный скринридер для Windows."
    variants:
      - prompt: "Заполните пропуски: три способа автоматической проверки разметки."
        template: |
          Расширение и движок от Deque: {{t1}}.
          Встроенная в Chrome панель аудита: {{t2}}.
          Линтер доступности для JSX в сборке: {{t3}}.
        blanks:
          t1:
            accept: ['axe', 'axe-core']
            accept_regex: '^\s*axe(-core)?\s*$'
          t2:
            accept: ['Lighthouse', 'lighthouse']
            accept_regex: '^\s*[Ll]ighthouse\s*$'
          t3:
            accept: ['eslint-plugin-jsx-a11y', 'jsx-a11y']
            accept_regex: '^\s*(eslint-plugin-)?jsx-a11y\s*$'

  - id: testing-a11y-alt-meaning-predict-001
    concept: testing-a11y
    type: predict-output
    difficulty: 2
    prompt: "Автопроверка подтвердила: атрибут alt присутствует. Гарантирует ли это, что незрячий пользователь поймёт картинку? Ответьте одним словом строчными буквами: да или нет."
    snippet: |
      <img src="chart.png" alt="картинка">
      Автоматический аудит: alt на месте, нарушений нет.
    expected:
      kind: scalar
      value: "нет"
    explanation: "Значение alt со словом «картинка» проходит автопроверку на наличие, но ничего не сообщает о содержании графика. Осмысленность alt автоматика не проверяет."
    variants:
      - prompt: "Для чисто декоративной линии-разделителя разработчик оставил пустой alt, чтобы скринридер её пропускал. Правильно ли это? Ответьте одним словом строчными буквами: да или нет."
        snippet: |
          <img src="divider.png" alt="">
          Декоративная картинка без информации.
        expected:
          kind: scalar
          value: "да"

  - id: testing-a11y-green-but-broken-quiz-001
    concept: testing-a11y
    type: theory-quiz
    difficulty: 3
    prompt: "Аудит axe на странице оформления заказа показывает ноль нарушений. Достаточно ли этого, чтобы утверждать, что страницей удобно пользоваться с клавиатуры?"
    choices:
      - id: a
        text: "Нет: axe не оценивает реальный порядок и логику фокуса, это проверяют вручную проходом по Tab."
      - id: b
        text: "Да: ноль нарушений axe гарантирует полную клавиатурную доступность."
      - id: c
        text: "Да, при условии что дополнительно пройден аудит Lighthouse."
      - id: d
        text: "Нет, но только если на странице есть модальные окна."
    correct: [a]
    explanation: "Автоматика ловит около трети проблем и проверяет наличие, а не логику. Порядок и логичность перехода фокуса видит только ручной клавиатурный тест, поэтому зелёный axe это начало проверки, а не её конец."
    hints:
      - "Вспомните, какую примерно долю проблем доступности автоматика способна поймать в принципе."
      - "Порядок и логичность перехода фокуса относятся к тому слою проверки, который выполняется руками, а не машиной."
