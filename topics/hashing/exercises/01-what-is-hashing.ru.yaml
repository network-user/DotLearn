exercises:
  - id: what-is-hashing-guarantee-001
    concept: what-is-hashing
    type: theory-quiz
    difficulty: 1
    prompt: "Что хеш-функция гарантирует всегда?"
    choices:
      - id: a
        text: "Одинаковый вход всегда даёт одинаковый выход."
      - id: b
        text: "Разные входы всегда дают разные выходы."
      - id: c
        text: "По выходу можно восстановить исходный вход."
      - id: d
        text: "Длина выхода растёт вместе с длиной входа."
    correct: [a]
    explanation: "Детерминизм - обязательное свойство: без него мы клали бы запись в одну ячейку, а искали в другой. А вот уникальность не гарантирована (коллизии неизбежны), обратимости нет, и длина выхода фиксирована."
    variants:
      - prompt: "Почему коллизии (разные входы с одним хешем) принципиально неизбежны?"
        choices:
          - id: a
            text: "Возможных входов больше, чем возможных выходов фиксированного размера."
          - id: b
            text: "Хеш-функции написаны с ошибками."
          - id: c
            text: "Из-за округления чисел с плавающей точкой."
          - id: d
            text: "Коллизии бывают только у плохих функций, у хороших их нет."
        correct: [a]
        explanation: "Принцип Дирихле: бесконечное множество входов отображается в конечное множество выходов, поэтому какие-то входы обязаны совпасть по хешу."
      - prompt: "Чем хеширование отличается от шифрования?"
        choices:
          - id: a
            text: "Хеш необратим и теряет информацию; шифр обратим при наличии ключа."
          - id: b
            text: "Ничем, это синонимы."
          - id: c
            text: "Хеширование медленнее шифрования на порядки."
          - id: d
            text: "Хеш всегда длиннее, чем зашифрованный текст."
        correct: [a]
        explanation: "Шифрование предназначено для восстановления исходного текста с ключом. Хеш специально теряет информацию и обратно не разворачивается."

  - id: what-is-hashing-anagram-001
    concept: what-is-hashing
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Обратите внимание, как наивный хеш относится к порядку символов."
    snippet: |
      def h(key, size):
          total = 0
          for c in key:
              total += ord(c)
          return total % size

      print(h("ab", 100), h("ba", 100))
    expected:
      kind: stdout
      value: "95 95"
    hints:
      - "Сумма кодов символов не зависит от их порядка - что это значит для анаграмм?"
      - "ord('a') = 97, ord('b') = 98. Посчитайте сумму для обоих слов."
    variants:
      - snippet: |
          def h(key, size):
              total = 0
              for c in key:
                  total += ord(c)
              return total % size

          print(h("a", 100), h("aa", 100), h("aaa", 100))
        expected:
          kind: stdout
          value: "97 94 91"
      - snippet: |
          def h(key, size):
              total = 0
              for c in key:
                  total += ord(c)
              return total % size

          print(h("abc", 10), h("xyz", 10))
        expected:
          kind: stdout
          value: "4 3"

  - id: what-is-hashing-implement-001
    concept: what-is-hashing
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `naive_hash(key, size)`: сумма кодов символов (`ord`) по модулю `size`. Для пустой строки результат - 0."
    starter: |
      def naive_hash(key, size):
          ...
    cases:
      - call: 'naive_hash("a", 100)'
        expect: 97
      - call: 'naive_hash("abc", 100)'
        expect: 94
      - call: 'naive_hash("", 100)'
        expect: 0
      - call: 'naive_hash("abc", 10)'
        expect: 4
    solution: |
      def naive_hash(key, size):
          total = 0
          for char in key:
              total += ord(char)
          return total % size
    hints:
      - "Накопите сумму кодов символов в одной переменной, затем возьмите остаток от деления на size."

  - id: what-is-hashing-collisions-001
    concept: what-is-hashing
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `count_collisions(keys, size)`: сколько ключей попадают в корзину, уже занятую более ранним ключом. Корзина ключа - сумма кодов символов по модулю `size`."
    starter: |
      def count_collisions(keys, size):
          ...
    cases:
      - call: 'count_collisions(["a", "b", "c"], 100)'
        expect: 0
      - call: 'count_collisions(["ab", "ba"], 100)'
        expect: 1
      - call: 'count_collisions(["a", "aa", "aaa", "a"], 100)'
        expect: 1
      - call: 'count_collisions([], 100)'
        expect: 0
    solution: |
      def count_collisions(keys, size):
          seen = set()
          collisions = 0
          for key in keys:
              total = 0
              for char in key:
                  total += ord(char)
              bucket = total % size
              if bucket in seen:
                  collisions += 1
              else:
                  seen.add(bucket)
          return collisions
    hints:
      - "Идите по ключам слева направо и запоминайте, какие корзины уже заняты."
      - "Множество (set) занятых корзин даёт проверку «занято?» за один шаг. Коллизия - это попадание в уже занятую корзину."
