exercises:
  - id: hash-tables-index-001
    concept: hash-tables
    type: theory-quiz
    difficulty: 1
    prompt: "По какой формуле хеш-таблица находит корзину для ключа?"
    choices:
      - id: a
        text: "индекс = hash(ключ) % число_корзин"
      - id: b
        text: "индекс = hash(ключ) + число_корзин"
      - id: c
        text: "индекс = длина(ключ) % число_корзин"
      - id: d
        text: "перебрать все корзины и найти свободную"
    correct: [a]
    explanation: "Остаток от деления хеша на число корзин всегда попадает в диапазон 0..число_корзин−1 - это и есть номер ячейки массива. Длину ключа никто не использует, а перебор корзин убил бы O(1)."
    variants:
      - prompt: "Почему доступ к хеш-таблице в среднем стоит O(1)?"
        choices:
          - id: a
            text: "И вставка, и поиск идут к одной заранее вычисленной корзине, а не перебирают таблицу."
          - id: b
            text: "Хеш-таблица всегда отсортирована, поэтому работает бинарный поиск"
          - id: c
            text: "Таблица хранит все элементы в одной корзине"
          - id: d
            text: "Процессор кеширует результаты предыдущих поисков - считая главной целью экономию байт"
        correct: [a]
        explanation: "Формула индекса ведёт прямо к нужной корзине. Пока корзины короткие (мала загрузка), это константа."
      - prompt: "Когда хеш-таблица вырождается в O(n)?"
        choices:
          - id: a
            text: "Когда почти все ключи столкнулись в одной корзине."
          - id: b
            text: "Когда в таблице просто больше 1000 элементов по счётчику."
          - id: c
            text: "Когда число корзин выбрано простым числом в конструкторе."
          - id: d
            text: "Когда ключи - строки, а не числа, независимо от распределения."
        correct: [a]
        explanation: "Если хеш-функция плохая или ключи подобраны злонамеренно, всё валится в одну корзину, и поиск превращается в линейный перебор списка."

  - id: hash-tables-modulo-001
    concept: hash-tables
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Это раскладка номеров заказов по 8 корзинам по формуле индекса."
    snippet: |
      def index(key, capacity):
          return key % capacity

      print([index(k, 8) for k in [10, 18, 26, 7]])
    expected:
      kind: stdout
      value: "[2, 2, 2, 7]"
    hints:
      - "Для целого ключа hash(k) - это сам k, поэтому индекс = k % capacity."
      - "Посчитайте остаток от деления каждого числа на 8. Какие из них дают один остаток?"
    variants:
      - snippet: |
          def index(key, capacity):
              return key % capacity

          print([index(k, 5) for k in [10, 18, 26, 7]])
        expected:
          kind: stdout
          value: "[0, 3, 1, 2]"
      - snippet: |
          def index(key, capacity):
              return key % capacity

          print([index(k, 8) for k in [3, 11, 19]])
        expected:
          kind: stdout
          value: "[3, 3, 3]"

  - id: hash-tables-bucket-index-001
    concept: hash-tables
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `bucket_index(key, capacity)`: номер корзины для строкового ключа как сумма кодов символов по модулю `capacity`."
    starter: |
      def bucket_index(key, capacity):
          ...
    cases:
      - call: 'bucket_index("a", 8)'
        expect: 1
      - call: 'bucket_index("abc", 8)'
        expect: 6
      - call: 'bucket_index("", 8)'
        expect: 0
      - call: 'bucket_index("a", 1)'
        expect: 0
    solution: |
      def bucket_index(key, capacity):
          total = 0
          for char in key:
              total += ord(char)
          return total % capacity
    hints:
      - "Сначала сверните строку в одно число (сумма кодов), затем приведите его к диапазону корзин остатком."

  - id: hash-tables-chained-get-001
    concept: hash-tables
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `hash_get(pairs, query, capacity)`: разложите пары `(ключ, значение)` по корзинам-цепочкам (корзина = сумма кодов символов ключа по модулю `capacity`), затем верните значение для `query`. Если ключа нет - верните `None`. Повторный ключ перезаписывает значение."
    starter: |
      def hash_get(pairs, query, capacity):
          ...
    cases:
      - call: 'hash_get([("a", 1), ("b", 2)], "a", 8)'
        expect: 1
      - call: 'hash_get([("a", 1), ("a", 3)], "a", 8)'
        expect: 3
      - call: 'hash_get([("a", 1)], "z", 8)'
        expect: null
      - call: 'hash_get([], "a", 8)'
        expect: null
    solution: |
      def hash_get(pairs, query, capacity):
          buckets = [[] for _ in range(capacity)]
          for key, value in pairs:
              idx = sum(ord(c) for c in key) % capacity
              bucket = buckets[idx]
              for i, (k, _) in enumerate(bucket):
                  if k == key:
                      bucket[i] = (key, value)
                      break
              else:
                  bucket.append((key, value))
          idx = sum(ord(c) for c in query) % capacity
          for k, v in buckets[idx]:
              if k == query:
                  return v
          return None
    hints:
      - "Заведите список из capacity пустых списков-корзин. Каждый ключ кладётся в корзину по своему индексу."
      - "Чтобы перезаписать существующий ключ, перед добавлением пройдите по корзине; конструкция for/else удобна для случая «не нашли - добавляем»."
