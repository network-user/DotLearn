exercises:
  - id: hashing-in-python-hashable-001
    concept: hashing-in-python
    type: theory-quiz
    difficulty: 1
    prompt: "Почему список нельзя использовать как ключ словаря, а кортеж - можно?"
    choices:
      - id: a
        text: "Список изменяем: при изменении его хеш поменялся бы и ключ «потерялся» бы в таблице."
      - id: b
        text: "Список занимает больше памяти, чем кортеж."
      - id: c
        text: "В списках нельзя хранить строки."
      - id: d
        text: "Это случайное ограничение синтаксиса Python."
    correct: [a]
    explanation: "Ключ кладётся в корзину по хешу. Изменяемый объект мог бы поменять хеш после вставки и оказаться не в той корзине, поэтому изменяемые типы запрещены в ключах. Кортеж неизменяем - и потому хешируем."
    variants:
      - prompt: "Что гарантирует контракт __hash__ и __eq__?"
        choices:
          - id: a
            text: "Если a == b, то hash(a) == hash(b)."
          - id: b
            text: "Если hash(a) == hash(b), то a == b."
          - id: c
            text: "Все объекты имеют уникальный хеш."
          - id: d
            text: "hash(a) всегда равен самому объекту a."
        correct: [a]
        explanation: "Равные объекты обязаны давать равные хеши, иначе словарь не найдёт ключ. Обратное неверно: разные объекты могут случайно совпасть по хешу (коллизия)."
      - prompt: "Что произойдёт, если переопределить __eq__, но не определить __hash__?"
        choices:
          - id: a
            text: "Класс станет нехешируемым - его нельзя будет класть в ключи словаря или в множество."
          - id: b
            text: "Python автоматически сгенерирует корректный __hash__."
          - id: c
            text: "Ничего, хеш по умолчанию продолжит работать."
          - id: d
            text: "Все экземпляры станут равными между собой."
        correct: [a]
        explanation: "Python обнуляет __hash__ (делает его None), чтобы вы не нарушили контракт по неосторожности. Переопределяете равенство - переопределяйте и хеш."

  - id: hashing-in-python-dict-output-001
    concept: hashing-in-python
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Обратите внимание на повторное присваивание по тому же ключу."
    snippet: |
      d = {}
      d["a"] = 1
      d["b"] = 2
      d["a"] = 3
      print(list(d.items()))
    expected:
      kind: stdout
      value: "[('a', 3), ('b', 2)]"
    hints:
      - "Повтор того же ключа не добавляет новую пару, а перезаписывает значение."
      - "Словарь хранит ключи в порядке первой вставки; перезапись не меняет позицию."
    variants:
      - snippet: |
          s = {1, 2, 2, 3, 3, 3}
          print(len(s))
        expected:
          kind: stdout
          value: "3"
      - snippet: |
          d = {}
          d[(1, 2)] = "a"
          d[(1, 2)] = "b"
          print(len(d), d[(1, 2)])
        expected:
          kind: stdout
          value: "1 b"

  - id: hashing-in-python-is-hashable-001
    concept: hashing-in-python
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `is_hashable(value)`: вернуть `True`, если объект можно хешировать, иначе `False`. Подсказка: попробуйте `hash(value)` и поймайте `TypeError`."
    starter: |
      def is_hashable(value):
          ...
    cases:
      - call: "is_hashable(42)"
        expect: true
      - call: 'is_hashable("Москва")'
        expect: true
      - call: "is_hashable((1, 2))"
        expect: true
      - call: "is_hashable([1, 2])"
        expect: false
      - call: "is_hashable({1: 2})"
        expect: false
      - call: "is_hashable(frozenset([1, 2]))"
        expect: true
    solution: |
      def is_hashable(value):
          try:
              hash(value)
              return True
          except TypeError:
              return False
    hints:
      - "Сам факт «хешируется или нет» проверяется попыткой вызвать hash() и перехватом ошибки."

  - id: hashing-in-python-hashable-class-001
    concept: hashing-in-python
    type: python-function
    difficulty: 3
    prompt: "Сделайте класс `Point` пригодным для ключей словаря: два объекта с одинаковыми `x` и `y` должны быть равны и иметь одинаковый хеш. Реализуйте `__eq__` и `__hash__` через кортеж `(x, y)`."
    starter: |
      class Point:
          def __init__(self, x, y):
              self.x = x
              self.y = y
    cases:
      - call: "Point(1, 2) == Point(1, 2)"
        expect: true
      - call: "Point(1, 2) == Point(2, 1)"
        expect: false
      - call: "hash(Point(1, 2)) == hash(Point(1, 2))"
        expect: true
      - call: "len({Point(1, 2): 'a', Point(1, 2): 'b'})"
        expect: 1
    solution: |
      class Point:
          def __init__(self, x, y):
              self.x = x
              self.y = y

          def __eq__(self, other):
              return isinstance(other, Point) and (self.x, self.y) == (other.x, other.y)

          def __hash__(self):
              return hash((self.x, self.y))
    hints:
      - "Равенство сравнивайте по содержимому: соберите поля в кортеж (self.x, self.y) и сравните с таким же кортежем другого объекта."
      - "Хеш проще всего получить от того же кортежа: hash((self.x, self.y)). Тогда равные точки автоматически дадут равные хеши."
