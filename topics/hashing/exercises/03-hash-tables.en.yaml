exercises:
  - id: hash-tables-index-001
    concept: hash-tables
    type: theory-quiz
    difficulty: 1
    prompt: "By what formula does a hash table find a key's bucket?"
    choices:
      - id: a
        text: "index = hash(key) % bucket_count"
      - id: b
        text: "index = hash(key) + bucket_count"
      - id: c
        text: "index = length(key) % bucket_count"
      - id: d
        text: "scan all buckets and find a free one"
    correct: [a]
    explanation: "The remainder of the hash divided by the bucket count always lands in the range 0..bucket_count-1 - that is the array cell number. Key length is not used, and scanning buckets would kill O(1)."
    variants:
      - prompt: "Why does access to a hash table cost O(1) on average?"
        choices:
          - id: a
            text: "Both insert and lookup go to one precomputed bucket instead of scanning the table."
          - id: b
            text: "A hash table is always sorted, so binary search works."
          - id: c
            text: "The table stores all elements in one bucket."
          - id: d
            text: "The processor caches the results of previous lookups."
        correct: [a]
        explanation: "The index formula leads straight to the right bucket. While buckets stay short (low load), that is a constant."
      - prompt: "When does a hash table degenerate to O(n)?"
        choices:
          - id: a
            text: "When almost all keys collide in one bucket."
          - id: b
            text: "When the table has more than 1000 elements."
          - id: c
            text: "When the bucket count is a prime number."
          - id: d
            text: "When the keys are strings rather than numbers."
        correct: [a]
        explanation: "If the hash function is bad or the keys are malicious, everything falls into one bucket and lookup becomes a linear scan of a list."

  - id: hash-tables-modulo-001
    concept: hash-tables
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? It is the layout of order numbers across 8 buckets by the index formula."
    snippet: |
      def index(key, capacity):
          return key % capacity

      print([index(k, 8) for k in [10, 18, 26, 7]])
    expected:
      kind: stdout
      value: "[2, 2, 2, 7]"
    hints:
      - "For an integer key, hash(k) is k itself, so index = k % capacity."
      - "Compute the remainder of each number divided by 8. Which of them give the same remainder?"
    variants:
      - snippet: |
          def index(key, capacity):
              return key % capacity

          print([index(k, 5) for k in [10, 18, 26, 7]])
        expected:
          kind: stdout
          value: "[0, 3, 1, 2]"
      - snippet: |
          def index(key, capacity):
              return key % capacity

          print([index(k, 8) for k in [3, 11, 19]])
        expected:
          kind: stdout
          value: "[3, 3, 3]"

  - id: hash-tables-bucket-index-001
    concept: hash-tables
    type: python-function
    difficulty: 2
    prompt: "Implement `bucket_index(key, capacity)`: the bucket number for a string key as the sum of character codes modulo `capacity`."
    starter: |
      def bucket_index(key, capacity):
          ...
    cases:
      - call: 'bucket_index("a", 8)'
        expect: 1
      - call: 'bucket_index("abc", 8)'
        expect: 6
      - call: 'bucket_index("", 8)'
        expect: 0
      - call: 'bucket_index("a", 1)'
        expect: 0
    solution: |
      def bucket_index(key, capacity):
          total = 0
          for char in key:
              total += ord(char)
          return total % capacity
    hints:
      - "First fold the string into one number (the sum of codes), then bring it into the bucket range with a remainder."

  - id: hash-tables-chained-get-001
    concept: hash-tables
    type: python-function
    difficulty: 3
    prompt: "Implement `hash_get(pairs, query, capacity)`: lay the `(key, value)` pairs into chained buckets (bucket = sum of the key's character codes modulo `capacity`), then return the value for `query`. If the key is absent, return `None`. A repeated key overwrites the value."
    starter: |
      def hash_get(pairs, query, capacity):
          ...
    cases:
      - call: 'hash_get([("a", 1), ("b", 2)], "a", 8)'
        expect: 1
      - call: 'hash_get([("a", 1), ("a", 3)], "a", 8)'
        expect: 3
      - call: 'hash_get([("a", 1)], "z", 8)'
        expect: null
      - call: 'hash_get([], "a", 8)'
        expect: null
    solution: |
      def hash_get(pairs, query, capacity):
          buckets = [[] for _ in range(capacity)]
          for key, value in pairs:
              idx = sum(ord(c) for c in key) % capacity
              bucket = buckets[idx]
              for i, (k, _) in enumerate(bucket):
                  if k == key:
                      bucket[i] = (key, value)
                      break
              else:
                  bucket.append((key, value))
          idx = sum(ord(c) for c in query) % capacity
          for k, v in buckets[idx]:
              if k == query:
                  return v
          return None
    hints:
      - "Make a list of capacity empty bucket-lists. Each key goes into its bucket by index."
      - "To overwrite an existing key, walk the bucket before appending; the for/else construct is handy for 'not found - append'."
