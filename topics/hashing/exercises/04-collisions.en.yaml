exercises:
  - id: collisions-strategies-001
    concept: collisions
    type: theory-quiz
    difficulty: 1
    prompt: "How does collision resolution by chaining differ from open addressing?"
    choices:
      - id: a
        text: "With chaining a bucket holds a list of keys; with open addressing, at most one key per cell."
      - id: b
        text: "Chaining eliminates collisions entirely, open addressing does not."
      - id: c
        text: "Open addressing stores keys in linked lists, chaining stores them in an array."
      - id: d
        text: "They are two names for the same technique."
    correct: [a]
    explanation: "Chaining stacks colliding keys into a list inside the bucket. Open addressing keeps one key per cell and on a collision probes for the next free one. Neither strategy removes collisions - they just live with them differently."
    variants:
      - prompt: "What is primary clustering in linear probing?"
        choices:
          - id: a
            text: "Occupied cells merge into continuous stretches, lengthening probe chains."
          - id: b
            text: "All keys gather in the first bucket of the table."
          - id: c
            text: "The table splits into clusters by the number of CPU cores."
          - id: d
            text: "Keys group by string length."
        correct: [a]
        explanation: "A new key falling into a cluster must traverse it to the end and lengthens it - clusters grow and merge."
      - prompt: "Why can't you just clear a cell on deletion under open addressing?"
        choices:
          - id: a
            text: "A probe that ran through that cell would break, and keys behind it would become invisible."
          - id: b
            text: "Clearing a cell deletes the whole table."
          - id: c
            text: "Python forbids assigning None to list elements."
          - id: d
            text: "It doubles the time to insert new keys."
        correct: [a]
        explanation: "A search stops at the first empty cell. Clearing a cell in the middle of a probe chain makes keys beyond it unfindable. So a tombstone is placed instead."

  - id: collisions-linear-probe-001
    concept: collisions
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? It is the layout of keys in an 8-cell table by linear probing."
    snippet: |
      def place(keys, capacity):
          slots = [None] * capacity
          for key in keys:
              idx = key % capacity
              while slots[idx] is not None:
                  idx = (idx + 1) % capacity
              slots[idx] = key
          return slots

      print(place([10, 18, 26], 8))
    expected:
      kind: stdout
      value: "[None, None, 10, 18, 26, None, None, None]"
    hints:
      - "All three keys share one home cell (10 % 8 = 18 % 8 = 26 % 8). Where do the second and third go?"
      - "Having taken cell 2, the next key slides to 3, then to 4 - that is a cluster."
    variants:
      - snippet: |
          def place(keys, capacity):
              slots = [None] * capacity
              for key in keys:
                  idx = key % capacity
                  while slots[idx] is not None:
                      idx = (idx + 1) % capacity
                  slots[idx] = key
              return slots

          print(place([0, 8, 16], 8))
        expected:
          kind: stdout
          value: "[0, 8, 16, None, None, None, None, None]"
      - snippet: |
          def place(keys, capacity):
              slots = [None] * capacity
              for key in keys:
                  idx = key % capacity
                  while slots[idx] is not None:
                      idx = (idx + 1) % capacity
                  slots[idx] = key
              return slots

          print(place([3, 11, 4], 8))
        expected:
          kind: stdout
          value: "[None, None, None, 3, 11, 4, None, None]"

  - id: collisions-probe-index-001
    concept: collisions
    type: python-function
    difficulty: 3
    prompt: "Implement `probe_index(slots, key)`: where an integer key lands under linear probing. The home cell is `key % len(slots)`; if it is taken (not `None`), move to the next one around the ring until a free one is found. A free cell is guaranteed to exist."
    starter: |
      def probe_index(slots, key):
          ...
    cases:
      - call: 'probe_index([None, None, None, None], 5)'
        expect: 1
      - call: 'probe_index([4, None, None, None], 4)'
        expect: 1
      - call: 'probe_index([4, 9, None, None], 8)'
        expect: 2
      - call: 'probe_index([1, 1, 1, None], 0)'
        expect: 3
    solution: |
      def probe_index(slots, key):
          capacity = len(slots)
          idx = key % capacity
          while slots[idx] is not None:
              idx = (idx + 1) % capacity
          return idx
    hints:
      - "Start at the home cell key % len(slots) and move forward while the cell is taken."
      - "Wrapping around the ring is (idx + 1) % len(slots): reaching the end of the array, the probe returns to the start."

  - id: collisions-build-table-001
    concept: collisions
    type: python-function
    difficulty: 4
    prompt: "Implement `probe_insert_all(keys, capacity)`: insert all integer keys into a table of size `capacity` by linear probing and return the final array of cells (`None` is empty). A key's home cell is `key % capacity`; when taken, the next free one around the ring."
    starter: |
      def probe_insert_all(keys, capacity):
          ...
    cases:
      - call: 'probe_insert_all([10, 18, 26], 8)'
        expect: [null, null, 10, 18, 26, null, null, null]
      - call: 'probe_insert_all([0, 8, 16], 8)'
        expect: [0, 8, 16, null, null, null, null, null]
      - call: 'probe_insert_all([], 4)'
        expect: [null, null, null, null]
      - call: 'probe_insert_all([5], 4)'
        expect: [null, 5, null, null]
    solution: |
      def probe_insert_all(keys, capacity):
          slots = [None] * capacity
          for key in keys:
              idx = key % capacity
              while slots[idx] is not None:
                  idx = (idx + 1) % capacity
              slots[idx] = key
          return slots
    hints:
      - "Make an array of capacity None cells and insert keys one by one, repeating the linear-probe logic for each."
      - "For one key: compute the home cell, walk forward around the ring to the first free one, put the key there."
