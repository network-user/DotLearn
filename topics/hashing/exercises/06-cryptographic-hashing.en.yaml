exercises:
  - id: cryptographic-hashing-props-001
    concept: cryptographic-hashing
    type: theory-quiz
    difficulty: 1
    prompt: "What distinguishes a cryptographic hash from a fast polynomial one?"
    choices:
      - id: a
        text: "You cannot compute the input from the hash."
      - id: b
        text: "A cryptographic hash can be decrypted back with a key."
      - id: c
        text: "It is always shorter than a polynomial hash's output."
      - id: d
        text: "It is not subject to the avalanche effect."
    correct: [a]
    explanation: "Crypto strength is preimage resistance (irreversibility) and collision resistance. A hash cannot be decrypted at all (it is not a cipher), and its avalanche is, on the contrary, maximal."
    variants:
      - prompt: "Why is a salt mixed into a password before hashing?"
        choices:
          - id: a
            text: "So that identical passwords give different hashes."
          - id: b
            text: "So that the hash can be reversed back into the password."
          - id: c
            text: "To speed up the hash computation."
          - id: d
            text: "So that the password can be stored in the clear."
        correct: [a]
        explanation: "A salt is a unique random string per user. It makes rainbow tables useless: the same password is hashed differently for different people."
      - prompt: "Why is bare SHA-256 a poor choice for storing passwords?"
        choices:
          - id: a
            text: "It is too fast: an attacker tries billions of variants per second."
          - id: b
            text: "It is too slow to verify on login - confusing object identity with value equality"
          - id: c
            text: "It is reversible, and the password is easy to recover."
          - id: d
            text: "It gives a different result on every run"
        correct: [a]
        explanation: "Passwords need a deliberately slow function (Argon2, bcrypt, scrypt) so brute force becomes expensive. SHA-256's speed works against the defense here."

  - id: cryptographic-hashing-determinism-001
    concept: cryptographic-hashing
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? It compares the fingerprints of identical and nearly identical strings."
    snippet: |
      import hashlib

      def sha(text):
          return hashlib.sha256(text.encode()).hexdigest()

      a = sha("password")
      b = sha("password")
      c = sha("Password")
      print(a == b, a == c)
    expected:
      kind: stdout
      value: "True False"
    hints:
      - "A cryptographic hash is deterministic: the same input, the same output."
      - "Changing even one letter (the case of P) completely changes the fingerprint because of avalanche."
    variants:
      - snippet: |
          import hashlib
          print(len(hashlib.sha256("any text".encode()).hexdigest()))
        expected:
          kind: stdout
          value: "64"
      - snippet: |
          import hashlib
          print(len(hashlib.md5(b"data").hexdigest()))
        expected:
          kind: stdout
          value: "32"

  - id: cryptographic-hashing-same-001
    concept: cryptographic-hashing
    type: python-function
    difficulty: 2
    prompt: "Implement `same_content(a, b)`: whether the content of two strings matches by their SHA-256 (as content addressing does - it compares fingerprints, not the strings directly). Return `True`/`False`."
    starter: |
      import hashlib

      def same_content(a, b):
          ...
    cases:
      - call: 'same_content("Moscow", "Moscow")'
        expect: true
      - call: 'same_content("Moscow", "Kazan")'
        expect: false
      - call: 'same_content("", "")'
        expect: true
      - call: 'same_content("a", "A")'
        expect: false
    solution: |
      import hashlib

      def same_content(a, b):
          ha = hashlib.sha256(a.encode()).hexdigest()
          hb = hashlib.sha256(b.encode()).hexdigest()
          return ha == hb
    hints:
      - "Compute the fingerprint of each string via hashlib.sha256(...).hexdigest() and compare the fingerprints."

  - id: cryptographic-hashing-dedup-001
    concept: cryptographic-hashing
    type: python-function
    difficulty: 3
    prompt: "Implement `count_unique(blobs)`: how many content-unique strings are in the list. Determine uniqueness by the SHA-256 of the content (this is exactly how content addressing and deduplication count copies)."
    starter: |
      import hashlib

      def count_unique(blobs):
          ...
    cases:
      - call: 'count_unique(["a", "a", "b"])'
        expect: 2
      - call: 'count_unique([])'
        expect: 0
      - call: 'count_unique(["x", "x", "x"])'
        expect: 1
      - call: 'count_unique(["Moscow", "Kazan", "Moscow"])'
        expect: 2
    solution: |
      import hashlib

      def count_unique(blobs):
          seen = set()
          for blob in blobs:
              digest = hashlib.sha256(blob.encode()).hexdigest()
              seen.add(digest)
          return len(seen)
    hints:
      - "Put the fingerprints into a set: identical content gives the same hash and does not duplicate."
      - "The answer is the size of the set of unique fingerprints, not the length of the original list."
