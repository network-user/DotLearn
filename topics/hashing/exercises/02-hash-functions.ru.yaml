exercises:
  - id: hash-functions-properties-001
    concept: hash-functions
    type: theory-quiz
    difficulty: 1
    prompt: "Какое свойство отличает хорошую хеш-функцию для хеш-таблицы?"
    choices:
      - id: a
        text: "Похожие ключи дают непохожие хеши."
      - id: b
        text: "По хешу можно быстро восстановить исходный ключ"
      - id: c
        text: "Близкие по значению ключи дают близкие хеши"
      - id: d
        text: "Функция обязательно вычисляет SHA-256 под капотом"
    correct: [a]
    explanation: "Равномерность и лавинный эффект - вот что нужно таблице. Обратимость не нужна (и вредна), близость выходов для близких входов - это как раз провал (липнущие ключи), а SHA-256 для dict избыточен."
    variants:
      - prompt: "Зачем в полиномиальном хеше базу и модуль берут простыми числами?"
        choices:
          - id: a
            text: "Чтобы разрушить регулярности во входах."
          - id: b
            text: "Простые числа вычисляются быстрее составных."
          - id: c
            text: "Так требует стандарт языка Python."
          - id: d
            text: "Чтобы хеш стало можно обратить."
        correct: [a]
        explanation: "Общий делитель базы/модуля с шагом между ключами делает часть корзин недостижимой. Простые числа не делят нацело типичные шаги, и остатки расходятся равномерно."
      - prompt: "Когда обычного быстрого хеша недостаточно и нужен криптографический?"
        choices:
          - id: a
            text: "Когда вход может быть подобран злоумышленником."
          - id: b
            text: "Всегда - криптографический хеш просто лучше."
          - id: c
            text: "Когда ключи длиннее 64 символов."
          - id: d
            text: "Когда таблица больше тысячи элементов."
        correct: [a]
        explanation: "Криптографический хеш стоек к намеренному подбору входов, но в десятки раз медленнее. Внутри dict он не нужен; для защиты от противника - обязателен."

  - id: hash-functions-order-001
    concept: hash-functions
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Учитывает ли полиномиальный хеш порядок символов?"
    snippet: |
      def poly(s, base=31):
          h = 0
          for c in s:
              h = h * base + ord(c)
          return h

      print(poly("ab"), poly("ba"))
    expected:
      kind: stdout
      value: "3105 3135"
    hints:
      - "На каждом шаге накопленное значение умножается на базу - значит, ранние символы получают больший вес."
      - "ord('a') = 97, ord('b') = 98. Посчитайте h пошагово для «ab» и «ba»."
    variants:
      - snippet: |
          def poly(s, base=31):
              h = 0
              for c in s:
                  h = h * base + ord(c)
              return h

          print(poly("abc"), poly("cba"))
        expected:
          kind: stdout
          value: "96354 98274"
      - snippet: |
          def naive(s):
              return sum(ord(c) for c in s)

          print(naive("ab"), naive("ba"))
        expected:
          kind: stdout
          value: "195 195"

  - id: hash-functions-avalanche-001
    concept: hash-functions
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `avalanche_bits(h1, h2)`: сколько битов различается между двумя целыми хешами (расстояние Хэмминга). Подсказка: XOR оставит единицы там, где биты разные."
    starter: |
      def avalanche_bits(h1, h2):
          ...
    cases:
      - call: "avalanche_bits(0, 0)"
        expect: 0
      - call: "avalanche_bits(0, 1)"
        expect: 1
      - call: "avalanche_bits(5, 6)"
        expect: 2
      - call: "avalanche_bits(255, 0)"
        expect: 8
      - call: "avalanche_bits(0, 4294967295)"
        expect: 32
    solution: |
      def avalanche_bits(h1, h2):
          x = h1 ^ h2
          count = 0
          while x:
              count += x & 1
              x >>= 1
          return count
    hints:
      - "XOR двух чисел даёт единицы ровно в тех позициях, где их биты различались."
      - "Осталось сосчитать единичные биты результата: проверяйте младший бит и сдвигайте вправо."

  - id: hash-functions-polynomial-001
    concept: hash-functions
    type: python-function
    difficulty: 3
    prompt: "Реализуйте полиномиальный хеш `polynomial_hash(s, base=31, mod=2_000_000_011)`: на каждом шаге `h = (h * base + ord(символ)) % mod`, начиная с `h = 0`."
    starter: |
      def polynomial_hash(s, base=31, mod=2_000_000_011):
          ...
    cases:
      - call: 'polynomial_hash("")'
        expect: 0
      - call: 'polynomial_hash("a")'
        expect: 97
      - call: 'polynomial_hash("abc")'
        expect: 96354
      - call: 'polynomial_hash("ba")'
        expect: 3135
    solution: |
      def polynomial_hash(s, base=31, mod=2_000_000_011):
          h = 0
          for char in s:
              h = (h * base + ord(char)) % mod
          return h
    hints:
      - "Ведите одно накопленное число h. Каждый новый символ - это «сдвиг разряда»: умножьте h на базу, потом прибавьте код символа."
      - "Остаток по модулю берите на каждом шаге, а не один раз в конце, - иначе число разрастётся."
