exercises:
  - id: hashing-databases-index-001
    concept: hashing-in-databases-and-systems
    type: theory-quiz
    difficulty: 1
    prompt: "Which query will a hash index speed up, and which not?"
    choices:
      - id: a
        text: "It speeds up lookup by equality (= value), but not a range (>, <) or sorting."
      - id: b
        text: "It speeds up ranges and sorting, but not equality - mixing time asymptotics with memory asymptotics"
      - id: c
        text: "It speeds up any query equally - as if types lived at runtime and replaced validation"
      - id: d
        text: "It speeds up only queries to numeric columns"
    correct: [a]
    explanation: "A hash destroys order: neighbouring values are scattered across the table. So a hash index is strong at point lookups by equality and useless for ranges and ORDER BY - that is where a B-tree works."
    variants:
      - prompt: "Why is consistent hashing needed instead of plain hash % N for sharding?"
        choices:
          - id: a
            text: "So that adding or removing a server moves only a small fraction of keys, not almost all."
          - id: b
            text: "To eliminate collisions entirely - ignoring cost under a bad hash distribution"
          - id: c
            text: "To compute the hash function faster - ignoring cost under a bad hash distribution"
          - id: d
            text: "So that data can be sorted by key - mixing time asymptotics with memory asymptotics"
        correct: [a]
        explanation: "With hash % N a change of N changes the remainder for almost every key. On the ring, adding a node affects only the arc next to it, so only a small part of keys moves."
      - prompt: "What does a hash join do with two tables?"
        choices:
          - id: a
            text: "Builds a hash table over the smaller table."
          - id: b
            text: "Compares every row of one table with every row of the other - O(n·m)."
          - id: c
            text: "Sorts both tables and merges them."
          - id: d
            text: "Stores both tables in one bucket."
        correct: [a]
        explanation: "The build phase makes a hash table over the smaller table; the probe phase finds matches for the larger one's rows in O(1) each. The result is the sum of sizes, not the product."

  - id: hashing-databases-shard-001
    concept: hashing-in-databases-and-systems
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? It is the layout of user ids across 4 shards."
    snippet: |
      def shard(user_id, num_shards):
          return user_id % num_shards

      print([shard(uid, 4) for uid in [100, 101, 102, 103, 104]])
    expected:
      kind: stdout
      value: "[0, 1, 2, 3, 0]"
    hints:
      - "The shard number is the remainder of the id divided by the number of shards."
      - "Compute 100 % 4, 101 % 4, ... Which id came back to shard 0?"
    variants:
      - snippet: |
          def shard(user_id, num_shards):
              return user_id % num_shards

          print([shard(uid, 3) for uid in [100, 101, 102, 103, 104]])
        expected:
          kind: stdout
          value: "[1, 2, 0, 1, 2]"
      - snippet: |
          def shard(user_id, num_shards):
              return user_id % num_shards

          print([shard(uid, 7) for uid in [10, 20, 30]])
        expected:
          kind: stdout
          value: "[3, 6, 2]"

  - id: hashing-databases-join-001
    concept: hashing-in-databases-and-systems
    type: python-function
    difficulty: 3
    prompt: "Implement `join_count(left, right)`: how many matching key pairs there are between two lists (as a hash join counts matches). Build an 'index' over the right list and walk the left one. Each occurrence of a key on the left matches every equal key on the right."
    starter: |
      def join_count(left, right):
          ...
    cases:
      - call: "join_count([1, 2], [1, 1, 3])"
        expect: 2
      - call: "join_count([], [1])"
        expect: 0
      - call: "join_count([5], [5])"
        expect: 1
      - call: "join_count([1, 1], [1])"
        expect: 2
    solution: |
      def join_count(left, right):
          counts = {}
          for key in right:
              counts[key] = counts.get(key, 0) + 1
          total = 0
          for key in left:
              total += counts.get(key, 0)
          return total
    hints:
      - "First count how many times each key appears on the right - that is the hash table for the probe phase."
      - "Then for each key on the left add how many equal keys are on the right. A dict gives that lookup in O(1)."

  - id: hashing-databases-ring-001
    concept: hashing-in-databases-and-systems
    type: python-function
    difficulty: 3
    prompt: "Implement `node_for(positions, key_pos)` for consistent hashing: `positions` are the sorted node positions on the ring, `key_pos` is the key's position. Return the position of the first node clockwise (the first one `>= key_pos`); if there is none, wrap to the start of the ring (the smallest position)."
    starter: |
      def node_for(positions, key_pos):
          ...
    cases:
      - call: "node_for([10, 50, 90], 30)"
        expect: 50
      - call: "node_for([10, 50, 90], 95)"
        expect: 10
      - call: "node_for([10, 50, 90], 10)"
        expect: 10
      - call: "node_for([10, 50, 90], 50)"
        expect: 50
    solution: |
      def node_for(positions, key_pos):
          for position in positions:
              if position >= key_pos:
                  return position
          return positions[0]
    hints:
      - "Walk the sorted positions and return the first one that is not less than the key's position."
      - "If the key is past the last node, the ring wraps around - the key goes to the very first node."
