exercises:
  - id: hash-functions-properties-001
    concept: hash-functions
    type: theory-quiz
    difficulty: 1
    prompt: "Which property distinguishes a good hash function for a hash table?"
    choices:
      - id: a
        text: "Similar keys give dissimilar hashes."
      - id: b
        text: "The original key can be quickly reconstructed from the hash."
      - id: c
        text: "Keys close in value give close hashes."
      - id: d
        text: "The function necessarily computes SHA-256 under the hood."
    correct: [a]
    explanation: "Uniformity and the avalanche effect are what a table needs. Reversibility is not needed (and is harmful), close outputs for close inputs is exactly the failure (sticky keys), and SHA-256 is overkill for dict."
    variants:
      - prompt: "Why are the base and modulus of a polynomial hash chosen to be prime numbers?"
        choices:
          - id: a
            text: "To destroy regularities in the inputs."
          - id: b
            text: "Prime numbers are computed faster than composite ones."
          - id: c
            text: "The Python standard requires it."
          - id: d
            text: "So that the hash can be reversed."
        correct: [a]
        explanation: "A common divisor of base/modulus with the step between keys makes some buckets unreachable. Primes do not divide typical steps evenly, so remainders spread uniformly."
      - prompt: "When is an ordinary fast hash not enough and a cryptographic one needed?"
        choices:
          - id: a
            text: "When the input can be crafted by an attacker."
          - id: b
            text: "Always - a cryptographic hash is simply better."
          - id: c
            text: "When keys are longer than 64 characters."
          - id: d
            text: "When the table has more than a thousand elements."
        correct: [a]
        explanation: "A cryptographic hash resists deliberate guessing of inputs, but is tens of times slower. Inside dict it is needless; against an adversary it is mandatory."

  - id: hash-functions-order-001
    concept: hash-functions
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? Does the polynomial hash account for character order?"
    snippet: |
      def poly(s, base=31):
          h = 0
          for c in s:
              h = h * base + ord(c)
          return h

      print(poly("ab"), poly("ba"))
    expected:
      kind: stdout
      value: "3105 3135"
    hints:
      - "At each step the running value is multiplied by the base - so earlier characters get a larger weight."
      - "ord('a') = 97, ord('b') = 98. Compute h step by step for 'ab' and 'ba'."
    variants:
      - snippet: |
          def poly(s, base=31):
              h = 0
              for c in s:
                  h = h * base + ord(c)
              return h

          print(poly("abc"), poly("cba"))
        expected:
          kind: stdout
          value: "96354 98274"
      - snippet: |
          def naive(s):
              return sum(ord(c) for c in s)

          print(naive("ab"), naive("ba"))
        expected:
          kind: stdout
          value: "195 195"

  - id: hash-functions-avalanche-001
    concept: hash-functions
    type: python-function
    difficulty: 2
    prompt: "Implement `avalanche_bits(h1, h2)`: how many bits differ between two integer hashes (the Hamming distance). Hint: XOR leaves ones where the bits differ."
    starter: |
      def avalanche_bits(h1, h2):
          ...
    cases:
      - call: "avalanche_bits(0, 0)"
        expect: 0
      - call: "avalanche_bits(0, 1)"
        expect: 1
      - call: "avalanche_bits(5, 6)"
        expect: 2
      - call: "avalanche_bits(255, 0)"
        expect: 8
      - call: "avalanche_bits(0, 4294967295)"
        expect: 32
    solution: |
      def avalanche_bits(h1, h2):
          x = h1 ^ h2
          count = 0
          while x:
              count += x & 1
              x >>= 1
          return count
    hints:
      - "XOR of two numbers gives ones exactly where their bits differed."
      - "Now count the set bits of the result: check the low bit and shift right."

  - id: hash-functions-polynomial-001
    concept: hash-functions
    type: python-function
    difficulty: 3
    prompt: "Implement the polynomial hash `polynomial_hash(s, base=31, mod=2_000_000_011)`: at each step `h = (h * base + ord(char)) % mod`, starting from `h = 0`."
    starter: |
      def polynomial_hash(s, base=31, mod=2_000_000_011):
          ...
    cases:
      - call: 'polynomial_hash("")'
        expect: 0
      - call: 'polynomial_hash("a")'
        expect: 97
      - call: 'polynomial_hash("abc")'
        expect: 96354
      - call: 'polynomial_hash("ba")'
        expect: 3135
    solution: |
      def polynomial_hash(s, base=31, mod=2_000_000_011):
          h = 0
          for char in s:
              h = (h * base + ord(char)) % mod
          return h
    hints:
      - "Keep one running number h. Each new character is a 'digit shift': multiply h by the base, then add the character code."
      - "Take the remainder modulo mod at each step, not once at the end - otherwise the number grows out of hand."
