exercises:
  - id: hashing-in-python-hashable-001
    concept: hashing-in-python
    type: theory-quiz
    difficulty: 1
    prompt: "Why can a list not be used as a dict key, while a tuple can?"
    choices:
      - id: a
        text: "A list is mutable: if changed, its hash would shift."
      - id: b
        text: "A list takes more memory than a tuple."
      - id: c
        text: "Lists cannot hold strings."
      - id: d
        text: "It is an arbitrary syntax restriction in Python."
    correct: [a]
    explanation: "A key is placed in a bucket by its hash. A mutable object could change its hash after insertion and end up in the wrong bucket, so mutable types are forbidden as keys. A tuple is immutable - and therefore hashable."
    variants:
      - prompt: "What does the __hash__ and __eq__ contract guarantee?"
        choices:
          - id: a
            text: "If a == b, then hash(a) == hash(b)."
          - id: b
            text: "If hash(a) == hash(b), then a == b."
          - id: c
            text: "All objects have a unique hash."
          - id: d
            text: "hash(a) always equals the object a itself."
        correct: [a]
        explanation: "Equal objects must give equal hashes, otherwise the dict cannot find the key. The converse is false: different objects may coincide by hash (a collision)."
      - prompt: "What happens if you override __eq__ but do not define __hash__?"
        choices:
          - id: a
            text: "The class becomes unhashable - it cannot go into dict keys or a set."
          - id: b
            text: "Python automatically generates a correct __hash__"
          - id: c
            text: "Nothing, the default hash keeps working - ignoring cost under a bad hash distribution"
          - id: d
            text: "All instances become equal to each other"
        correct: [a]
        explanation: "Python sets __hash__ to None so you do not break the contract by carelessness. Override equality - override the hash too."

  - id: hashing-in-python-dict-output-001
    concept: hashing-in-python
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? Watch the repeated assignment to the same key."
    snippet: |
      d = {}
      d["a"] = 1
      d["b"] = 2
      d["a"] = 3
      print(list(d.items()))
    expected:
      kind: stdout
      value: "[('a', 3), ('b', 2)]"
    hints:
      - "Repeating the same key does not add a new pair, it overwrites the value."
      - "A dict keeps keys in first-insertion order; overwriting does not change the position."
    variants:
      - snippet: |
          s = {1, 2, 2, 3, 3, 3}
          print(len(s))
        expected:
          kind: stdout
          value: "3"
      - snippet: |
          d = {}
          d[(1, 2)] = "a"
          d[(1, 2)] = "b"
          print(len(d), d[(1, 2)])
        expected:
          kind: stdout
          value: "1 b"

  - id: hashing-in-python-is-hashable-001
    concept: hashing-in-python
    type: python-function
    difficulty: 2
    prompt: "Implement `is_hashable(value)`: return `True` if the object can be hashed, otherwise `False`. Hint: try `hash(value)` and catch `TypeError`."
    starter: |
      def is_hashable(value):
          ...
    cases:
      - call: "is_hashable(42)"
        expect: true
      - call: 'is_hashable("Moscow")'
        expect: true
      - call: "is_hashable((1, 2))"
        expect: true
      - call: "is_hashable([1, 2])"
        expect: false
      - call: "is_hashable({1: 2})"
        expect: false
      - call: "is_hashable(frozenset([1, 2]))"
        expect: true
    solution: |
      def is_hashable(value):
          try:
              hash(value)
              return True
          except TypeError:
              return False
    hints:
      - "The very fact of 'hashable or not' is checked by trying to call hash() and catching the error."

  - id: hashing-in-python-hashable-class-001
    concept: hashing-in-python
    type: python-function
    difficulty: 3
    prompt: "Make the class `Point` fit for dict keys: two objects with the same `x` and `y` must be equal and have the same hash. Implement `__eq__` and `__hash__` via the tuple `(x, y)`."
    starter: |
      class Point:
          def __init__(self, x, y):
              self.x = x
              self.y = y
    cases:
      - call: "Point(1, 2) == Point(1, 2)"
        expect: true
      - call: "Point(1, 2) == Point(2, 1)"
        expect: false
      - call: "hash(Point(1, 2)) == hash(Point(1, 2))"
        expect: true
      - call: "len({Point(1, 2): 'a', Point(1, 2): 'b'})"
        expect: 1
    solution: |
      class Point:
          def __init__(self, x, y):
              self.x = x
              self.y = y

          def __eq__(self, other):
              return isinstance(other, Point) and (self.x, self.y) == (other.x, other.y)

          def __hash__(self):
              return hash((self.x, self.y))
    hints:
      - "Compare equality by content: collect the fields into a tuple (self.x, self.y) and compare with the other object's tuple."
      - "The hash is easiest from the same tuple: hash((self.x, self.y)). Then equal points automatically give equal hashes."
