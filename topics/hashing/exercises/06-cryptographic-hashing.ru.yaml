exercises:
  - id: cryptographic-hashing-props-001
    concept: cryptographic-hashing
    type: theory-quiz
    difficulty: 1
    prompt: "Что отличает криптографический хеш от быстрого полиномиального?"
    choices:
      - id: a
        text: "По хешу нельзя вычислить вход и нельзя за разумное время найти коллизию."
      - id: b
        text: "Криптографический хеш можно расшифровать обратно с ключом."
      - id: c
        text: "Он всегда короче, чем выход полиномиального хеша."
      - id: d
        text: "Он не подвержен лавинному эффекту."
    correct: [a]
    explanation: "Криптостойкость - это стойкость к прообразу (необратимость) и к коллизиям. Расшифровать хеш нельзя в принципе (это не шифр), а лавинность у него, наоборот, максимальная."
    variants:
      - prompt: "Зачем к паролю перед хешированием подмешивают соль?"
        choices:
          - id: a
            text: "Чтобы одинаковые пароли давали разные хеши и заранее посчитанные таблицы не работали."
          - id: b
            text: "Чтобы хеш стало можно обратить обратно в пароль."
          - id: c
            text: "Чтобы ускорить вычисление хеша."
          - id: d
            text: "Чтобы пароль можно было хранить в открытом виде."
        correct: [a]
        explanation: "Соль - уникальная случайная строка на пользователя. Она делает радужные таблицы бесполезными: один и тот же пароль у разных людей хешируется по-разному."
      - prompt: "Почему голый SHA-256 - плохой выбор для хранения паролей?"
        choices:
          - id: a
            text: "Он слишком быстрый: атакующий перебирает миллиарды вариантов в секунду."
          - id: b
            text: "Он слишком медленный для проверки при входе."
          - id: c
            text: "Он обратим, и пароль легко восстановить."
          - id: d
            text: "Он даёт разный результат при каждом запуске."
        correct: [a]
        explanation: "Для паролей нужна намеренно медленная функция (Argon2, bcrypt, scrypt), чтобы перебор стал дорогим. Скорость SHA-256 здесь играет против защиты."

  - id: cryptographic-hashing-determinism-001
    concept: cryptographic-hashing
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Сравниваются отпечатки одинаковых и почти одинаковых строк."
    snippet: |
      import hashlib

      def sha(text):
          return hashlib.sha256(text.encode()).hexdigest()

      a = sha("password")
      b = sha("password")
      c = sha("Password")
      print(a == b, a == c)
    expected:
      kind: stdout
      value: "True False"
    hints:
      - "Криптографический хеш детерминирован: одинаковый вход - одинаковый выход."
      - "Замена даже одной буквы (регистр P) полностью меняет отпечаток из-за лавинного эффекта."
    variants:
      - snippet: |
          import hashlib
          print(len(hashlib.sha256("любой текст".encode()).hexdigest()))
        expected:
          kind: stdout
          value: "64"
      - snippet: |
          import hashlib
          print(len(hashlib.md5(b"data").hexdigest()))
        expected:
          kind: stdout
          value: "32"

  - id: cryptographic-hashing-same-001
    concept: cryptographic-hashing
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `same_content(a, b)`: совпадает ли содержимое двух строк по их SHA-256 (как это делает контент-адресация - сравнивает отпечатки, а не строки напрямую). Верните `True`/`False`."
    starter: |
      import hashlib

      def same_content(a, b):
          ...
    cases:
      - call: 'same_content("Москва", "Москва")'
        expect: true
      - call: 'same_content("Москва", "Казань")'
        expect: false
      - call: 'same_content("", "")'
        expect: true
      - call: 'same_content("a", "A")'
        expect: false
    solution: |
      import hashlib

      def same_content(a, b):
          ha = hashlib.sha256(a.encode()).hexdigest()
          hb = hashlib.sha256(b.encode()).hexdigest()
          return ha == hb
    hints:
      - "Посчитайте отпечаток каждой строки через hashlib.sha256(...).hexdigest() и сравните отпечатки."

  - id: cryptographic-hashing-dedup-001
    concept: cryptographic-hashing
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `count_unique(blobs)`: сколько уникальных по содержимому строк в списке. Уникальность определяйте по SHA-256 содержимого (контент-адресация и дедупликация именно так и считают копии)."
    starter: |
      import hashlib

      def count_unique(blobs):
          ...
    cases:
      - call: 'count_unique(["a", "a", "b"])'
        expect: 2
      - call: 'count_unique([])'
        expect: 0
      - call: 'count_unique(["x", "x", "x"])'
        expect: 1
      - call: 'count_unique(["Москва", "Казань", "Москва"])'
        expect: 2
    solution: |
      import hashlib

      def count_unique(blobs):
          seen = set()
          for blob in blobs:
              digest = hashlib.sha256(blob.encode()).hexdigest()
              seen.add(digest)
          return len(seen)
    hints:
      - "Сложите отпечатки в множество: одинаковое содержимое даст один и тот же хеш и не задвоится."
      - "Ответ - размер множества уникальных отпечатков, а не длина исходного списка."
