exercises:
  - id: what-is-hashing-guarantee-001
    concept: what-is-hashing
    type: theory-quiz
    difficulty: 1
    prompt: "What does a hash function always guarantee?"
    choices:
      - id: a
        text: "The same input always produces the same output."
      - id: b
        text: "Different inputs always produce different outputs."
      - id: c
        text: "The original input can be reconstructed from the output."
      - id: d
        text: "The output length grows with the input length."
    correct: [a]
    explanation: "Determinism is mandatory: without it we would store a record in one cell and search in another. Uniqueness is not guaranteed (collisions are inevitable), there is no reversibility, and the output length is fixed."
    variants:
      - prompt: "Why are collisions (different inputs with one hash) fundamentally inevitable?"
        choices:
          - id: a
            text: "There are more possible inputs than possible fixed-size outputs."
          - id: b
            text: "Hash functions are written with bugs."
          - id: c
            text: "Because of floating-point rounding."
          - id: d
            text: "Collisions happen only in bad functions; good ones have none."
        correct: [a]
        explanation: "The pigeonhole principle: an infinite set of inputs maps into a finite set of outputs, so some inputs must coincide by hash."
      - prompt: "How does hashing differ from encryption?"
        choices:
          - id: a
            text: "A hash is irreversible and loses information; a cipher is reversible with a key."
          - id: b
            text: "Nothing, they are synonyms."
          - id: c
            text: "Hashing is orders of magnitude slower than encryption."
          - id: d
            text: "A hash is always longer than the ciphertext."
        correct: [a]
        explanation: "Encryption is meant to restore the original text with a key. A hash loses information on purpose and does not unfold back."

  - id: what-is-hashing-anagram-001
    concept: what-is-hashing
    type: predict-output
    difficulty: 2
    prompt: "What does the program print? Notice how the naive hash treats character order."
    snippet: |
      def h(key, size):
          total = 0
          for c in key:
              total += ord(c)
          return total % size

      print(h("ab", 100), h("ba", 100))
    expected:
      kind: stdout
      value: "95 95"
    hints:
      - "The sum of character codes does not depend on their order - what does that mean for anagrams?"
      - "ord('a') = 97, ord('b') = 98. Compute the sum for both words."
    variants:
      - snippet: |
          def h(key, size):
              total = 0
              for c in key:
                  total += ord(c)
              return total % size

          print(h("a", 100), h("aa", 100), h("aaa", 100))
        expected:
          kind: stdout
          value: "97 94 91"
      - snippet: |
          def h(key, size):
              total = 0
              for c in key:
                  total += ord(c)
              return total % size

          print(h("abc", 10), h("xyz", 10))
        expected:
          kind: stdout
          value: "4 3"

  - id: what-is-hashing-implement-001
    concept: what-is-hashing
    type: python-function
    difficulty: 2
    prompt: "Implement `naive_hash(key, size)`: the sum of character codes (`ord`) modulo `size`. For an empty string the result is 0."
    starter: |
      def naive_hash(key, size):
          ...
    cases:
      - call: 'naive_hash("a", 100)'
        expect: 97
      - call: 'naive_hash("abc", 100)'
        expect: 94
      - call: 'naive_hash("", 100)'
        expect: 0
      - call: 'naive_hash("abc", 10)'
        expect: 4
    solution: |
      def naive_hash(key, size):
          total = 0
          for char in key:
              total += ord(char)
          return total % size
    hints:
      - "Accumulate the sum of character codes in one variable, then take the remainder modulo size."

  - id: what-is-hashing-collisions-001
    concept: what-is-hashing
    type: python-function
    difficulty: 3
    prompt: "Implement `count_collisions(keys, size)`: how many keys land in a bucket already taken by an earlier key. A key's bucket is the sum of its character codes modulo `size`."
    starter: |
      def count_collisions(keys, size):
          ...
    cases:
      - call: 'count_collisions(["a", "b", "c"], 100)'
        expect: 0
      - call: 'count_collisions(["ab", "ba"], 100)'
        expect: 1
      - call: 'count_collisions(["a", "aa", "aaa", "a"], 100)'
        expect: 1
      - call: 'count_collisions([], 100)'
        expect: 0
    solution: |
      def count_collisions(keys, size):
          seen = set()
          collisions = 0
          for key in keys:
              total = 0
              for char in key:
                  total += ord(char)
              bucket = total % size
              if bucket in seen:
                  collisions += 1
              else:
                  seen.add(bucket)
          return collisions
    hints:
      - "Walk the keys left to right and remember which buckets are already taken."
      - "A set of taken buckets gives an O(1) 'taken?' check. A collision is landing in an already-taken bucket."
