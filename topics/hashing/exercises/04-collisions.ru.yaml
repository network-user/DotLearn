exercises:
  - id: collisions-strategies-001
    concept: collisions
    type: theory-quiz
    difficulty: 1
    prompt: "Чем разрешение коллизий цепочками отличается от открытой адресации?"
    choices:
      - id: a
        text: "При цепочках корзина хранит список ключей."
      - id: b
        text: "Цепочки полностью устраняют коллизии, а открытая адресация - нет."
      - id: c
        text: "Открытая адресация хранит ключи в связанных списках, а цепочки - в массиве."
      - id: d
        text: "Это два названия одного и того же приёма."
    correct: [a]
    explanation: "Цепочки складывают столкнувшиеся ключи в список внутри корзины. Открытая адресация держит один ключ на ячейку и при коллизии ищет следующую свободную пробированием. Ни одна стратегия не отменяет коллизии - они лишь по-разному с ними живут."
    variants:
      - prompt: "Что такое первичная кластеризация при линейном пробировании?"
        choices:
          - id: a
            text: "Занятые ячейки сливаются в непрерывные отрезки."
          - id: b
            text: "Все ключи собираются в первой корзине таблицы"
          - id: c
            text: "Таблица делится на кластеры по числу процессорных ядер"
          - id: d
            text: "Ключи группируются по длине строки"
        correct: [a]
        explanation: "Новый ключ, попавший в кластер, обязан пройти его до конца и удлиняет его - кластеры растут и склеиваются."
      - prompt: "Почему при открытой адресации нельзя просто очистить ячейку при удалении?"
        choices:
          - id: a
            text: "Проба, шедшая сквозь эту ячейку, оборвётся."
          - id: b
            text: "Очистка ячейки удаляет всю таблицу."
          - id: c
            text: "Python запрещает присваивать None элементам списка."
          - id: d
            text: "Это замедляет вставку новых ключей в два раза."
        correct: [a]
        explanation: "Поиск останавливается на первой пустой ячейке. Если очистить ячейку посреди пробной цепочки, лежащие дальше ключи перестанут находиться. Поэтому ставят надгробие (tombstone)."

  - id: collisions-linear-probe-001
    concept: collisions
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Это раскладка ключей по таблице на 8 ячеек линейным пробированием."
    snippet: |
      def place(keys, capacity):
          slots = [None] * capacity
          for key in keys:
              idx = key % capacity
              while slots[idx] is not None:
                  idx = (idx + 1) % capacity
              slots[idx] = key
          return slots

      print(place([10, 18, 26], 8))
    expected:
      kind: stdout
      value: "[None, None, 10, 18, 26, None, None, None]"
    hints:
      - "У всех трёх ключей одна домашняя ячейка (10 % 8 = 18 % 8 = 26 % 8). Куда уходят второй и третий?"
      - "Заняв ячейку 2, следующий ключ сдвигается к 3, потом к 4 - это и есть кластер."
    variants:
      - snippet: |
          def place(keys, capacity):
              slots = [None] * capacity
              for key in keys:
                  idx = key % capacity
                  while slots[idx] is not None:
                      idx = (idx + 1) % capacity
                  slots[idx] = key
              return slots

          print(place([0, 8, 16], 8))
        expected:
          kind: stdout
          value: "[0, 8, 16, None, None, None, None, None]"
      - snippet: |
          def place(keys, capacity):
              slots = [None] * capacity
              for key in keys:
                  idx = key % capacity
                  while slots[idx] is not None:
                      idx = (idx + 1) % capacity
                  slots[idx] = key
              return slots

          print(place([3, 11, 4], 8))
        expected:
          kind: stdout
          value: "[None, None, None, 3, 11, 4, None, None]"

  - id: collisions-probe-index-001
    concept: collisions
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `probe_index(slots, key)`: куда сядет целый ключ при линейном пробировании. Домашняя ячейка - `key % len(slots)`; если занята (не `None`), идём к следующей по кругу, пока не найдём свободную. Гарантируется, что свободная ячейка есть."
    starter: |
      def probe_index(slots, key):
          ...
    cases:
      - call: 'probe_index([None, None, None, None], 5)'
        expect: 1
      - call: 'probe_index([4, None, None, None], 4)'
        expect: 1
      - call: 'probe_index([4, 9, None, None], 8)'
        expect: 2
      - call: 'probe_index([1, 1, 1, None], 0)'
        expect: 3
    solution: |
      def probe_index(slots, key):
          capacity = len(slots)
          idx = key % capacity
          while slots[idx] is not None:
              idx = (idx + 1) % capacity
          return idx
    hints:
      - "Начните с домашней ячейки key % len(slots) и двигайтесь вперёд, пока ячейка занята."
      - "Сдвиг по кругу - это (idx + 1) % len(slots): дойдя до конца массива, проба возвращается в начало."

  - id: collisions-build-table-001
    concept: collisions
    type: python-function
    difficulty: 4
    prompt: "Реализуйте `probe_insert_all(keys, capacity)`: вставьте все целые ключи в таблицу размера `capacity` линейным пробированием и верните итоговый массив ячеек (`None` - пусто). Домашняя ячейка ключа - `key % capacity`, при занятости - следующая свободная по кругу."
    starter: |
      def probe_insert_all(keys, capacity):
          ...
    cases:
      - call: 'probe_insert_all([10, 18, 26], 8)'
        expect: [null, null, 10, 18, 26, null, null, null]
      - call: 'probe_insert_all([0, 8, 16], 8)'
        expect: [0, 8, 16, null, null, null, null, null]
      - call: 'probe_insert_all([], 4)'
        expect: [null, null, null, null]
      - call: 'probe_insert_all([5], 4)'
        expect: [null, 5, null, null]
    solution: |
      def probe_insert_all(keys, capacity):
          slots = [None] * capacity
          for key in keys:
              idx = key % capacity
              while slots[idx] is not None:
                  idx = (idx + 1) % capacity
              slots[idx] = key
          return slots
    hints:
      - "Заведите массив из capacity ячеек None и вставляйте ключи по одному, повторяя логику линейной пробы для каждого."
      - "Для одного ключа: посчитайте домашнюю ячейку, прокрутите вперёд по кругу до первой свободной, положите ключ туда."
