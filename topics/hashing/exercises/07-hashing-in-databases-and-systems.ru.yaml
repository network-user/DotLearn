exercises:
  - id: hashing-databases-index-001
    concept: hashing-in-databases-and-systems
    type: theory-quiz
    difficulty: 1
    prompt: "Какой запрос хеш-индекс ускорит, а какой - нет?"
    choices:
      - id: a
        text: "Ускорит поиск по равенству (= значение), но не диапазон (>, <) и не сортировку."
      - id: b
        text: "Ускорит диапазоны и сортировку, но не равенство."
      - id: c
        text: "Ускорит любой запрос одинаково."
      - id: d
        text: "Ускорит только запросы к числовым колонкам."
    correct: [a]
    explanation: "Хеш разрушает порядок: соседние значения раскиданы по таблице. Поэтому хеш-индекс силён в точечном поиске по равенству и бесполезен для диапазонов и ORDER BY - там работает B-дерево."
    variants:
      - prompt: "Зачем нужно консистентное хеширование вместо простого hash % N для шардинга?"
        choices:
          - id: a
            text: "Чтобы при добавлении или удалении сервера переезжала лишь малая доля ключей, а не почти все."
          - id: b
            text: "Чтобы полностью исключить коллизии."
          - id: c
            text: "Чтобы хеш-функция считалась быстрее."
          - id: d
            text: "Чтобы данные можно было сортировать по ключу."
        correct: [a]
        explanation: "При hash % N изменение N меняет остаток почти у всех ключей. На кольце добавление узла затрагивает только дугу рядом с ним, поэтому переезжает малая часть ключей."
      - prompt: "Что хеш-соединение (hash join) делает с двумя таблицами?"
        choices:
          - id: a
            text: "Строит хеш-таблицу по меньшей таблице и пробивает её большей за один проход - O(n+m)."
          - id: b
            text: "Сравнивает каждую строку одной таблицы с каждой строкой другой - O(n·m)."
          - id: c
            text: "Сортирует обе таблицы и сливает их."
          - id: d
            text: "Хранит обе таблицы в одной корзине."
        correct: [a]
        explanation: "Фаза build создаёт хеш-таблицу по меньшей таблице, фаза probe ищет совпадения для строк большей за O(1) каждое. Итог - сумма размеров, а не произведение."

  - id: hashing-databases-shard-001
    concept: hashing-in-databases-and-systems
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Это раскладка id пользователей по 4 шардам."
    snippet: |
      def shard(user_id, num_shards):
          return user_id % num_shards

      print([shard(uid, 4) for uid in [100, 101, 102, 103, 104]])
    expected:
      kind: stdout
      value: "[0, 1, 2, 3, 0]"
    hints:
      - "Номер шарда - это остаток от деления id на число шардов."
      - "Посчитайте 100 % 4, 101 % 4, ... Какой id вернулся к шарду 0?"
    variants:
      - snippet: |
          def shard(user_id, num_shards):
              return user_id % num_shards

          print([shard(uid, 3) for uid in [100, 101, 102, 103, 104]])
        expected:
          kind: stdout
          value: "[1, 2, 0, 1, 2]"
      - snippet: |
          def shard(user_id, num_shards):
              return user_id % num_shards

          print([shard(uid, 7) for uid in [10, 20, 30]])
        expected:
          kind: stdout
          value: "[3, 6, 2]"

  - id: hashing-databases-join-001
    concept: hashing-in-databases-and-systems
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `join_count(left, right)`: сколько совпадающих пар ключей между двумя списками (как считает совпадения хеш-соединение). Постройте «индекс» по правому списку и пройдитесь по левому. Каждое вхождение ключа слева совпадает с каждым таким же ключом справа."
    starter: |
      def join_count(left, right):
          ...
    cases:
      - call: "join_count([1, 2], [1, 1, 3])"
        expect: 2
      - call: "join_count([], [1])"
        expect: 0
      - call: "join_count([5], [5])"
        expect: 1
      - call: "join_count([1, 1], [1])"
        expect: 2
    solution: |
      def join_count(left, right):
          counts = {}
          for key in right:
              counts[key] = counts.get(key, 0) + 1
          total = 0
          for key in left:
              total += counts.get(key, 0)
          return total
    hints:
      - "Сначала посчитайте, сколько раз каждый ключ встречается справа, - это и есть хеш-таблица для probe-фазы."
      - "Затем для каждого ключа слева прибавьте, сколько таких же ключей справа. Словарь даёт эту справку за O(1)."

  - id: hashing-databases-ring-001
    concept: hashing-in-databases-and-systems
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `node_for(positions, key_pos)` для консистентного хеширования: `positions` - отсортированные позиции узлов на кольце, `key_pos` - позиция ключа. Верните позицию первого узла по часовой стрелке (первого `>= key_pos`); если таких нет - вернитесь к началу кольца (наименьшая позиция)."
    starter: |
      def node_for(positions, key_pos):
          ...
    cases:
      - call: "node_for([10, 50, 90], 30)"
        expect: 50
      - call: "node_for([10, 50, 90], 95)"
        expect: 10
      - call: "node_for([10, 50, 90], 10)"
        expect: 10
      - call: "node_for([10, 50, 90], 50)"
        expect: 50
    solution: |
      def node_for(positions, key_pos):
          for position in positions:
              if position >= key_pos:
                  return position
          return positions[0]
    hints:
      - "Идите по отсортированным позициям и верните первую, что не меньше позиции ключа."
      - "Если ключ оказался дальше последнего узла, кольцо замыкается - ключ достаётся самому первому узлу."
