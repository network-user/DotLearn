conceptId: hash-tables
cards:
  - id: hash-tables-01
    front: "By what formula does a hash table find a key's bucket?"
    back: "index = hash(key) % bucket_count. The remainder always lands in the range 0..bucket_count-1 - that is the array cell number."
    tags: [index]
  - id: hash-tables-02
    front: "Why is access to a hash table O(1) on average?"
    back: "Both insert and lookup go to one precomputed bucket instead of scanning the table. While buckets stay short (low load), that is a constant."
    tags: [complexity]
  - id: hash-tables-03
    front: "What is the load factor α?"
    back: "The ratio of elements to buckets (n / m). It measures how crowded the table is; the higher it is, the longer the buckets and probes."
    tags: [load-factor]
  - id: hash-tables-04
    front: "What is rehashing?"
    back: "When α reaches the threshold (about 0.7), the table allocates an array twice as large and moves every element into it anew - the new size has a different remainder % m."
    tags: [resize]
  - id: hash-tables-05
    front: "Why is an insert amortized O(1) if a rehash costs O(n)?"
    back: "Doublings happen ever less often. The total rehashing work, about 2n, is spread over n inserts - on average a constant per insert."
    tags: [amortized]
  - id: hash-tables-06
    front: "When does a hash table degenerate to O(n)?"
    back: "When almost all keys collide in one bucket (a bad hash or malicious keys). O(1) holds only for a good distribution."
    tags: [worst-case]
