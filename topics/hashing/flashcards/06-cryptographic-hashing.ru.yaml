conceptId: cryptographic-hashing
cards:
  - id: cryptographic-hashing-01
    front: "Что добавляет криптографический хеш к обычному?"
    back: "Стойкость к прообразу (по хешу нельзя вычислить вход) и стойкость к коллизиям (нельзя за разумное время найти два входа с одним хешем)."
    tags: [properties]
  - id: cryptographic-hashing-02
    front: "Зачем к паролю перед хешированием добавляют соль?"
    back: "Соль - уникальная случайная строка на пользователя. Она делает одинаковые пароли разными по хешу, и заранее посчитанные радужные таблицы становятся бесполезны."
    tags: [passwords]
  - id: cryptographic-hashing-03
    front: "Почему голый SHA-256 - плохой выбор для паролей?"
    back: "Он слишком быстрый: атакующий перебирает миллиарды вариантов в секунду. Пароли хешируют намеренно медленными KDF: Argon2, bcrypt, scrypt."
    tags: [passwords]
  - id: cryptographic-hashing-04
    front: "Что такое контент-адресация?"
    back: "Имя объекта = хеш его содержимого. Одинаковые данные дедуплицируются (один хеш - одна копия), а подмена содержимого меняет адрес. Так устроен Git."
    tags: [content-addressing]
  - id: cryptographic-hashing-05
    front: "Почему MD5 и SHA-1 нельзя использовать для безопасности?"
    back: "Для них найдены коллизии - разные файлы с одним хешем. Для защиты от противника берут SHA-256 или новее; MD5/SHA-1 годны лишь от случайной порчи."
    tags: [broken]
  - id: cryptographic-hashing-06
    front: "Хеш - это разновидность шифрования?"
    back: "Нет. Хеш необратим, у него нет «расшифровки». Если данные нужно потом прочитать - это шифрование, а не хеширование."
    tags: [basics]
