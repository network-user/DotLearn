conceptId: hash-tables
cards:
  - id: hash-tables-01
    front: "По какой формуле хеш-таблица находит корзину ключа?"
    back: "индекс = hash(ключ) % число_корзин. Остаток всегда попадает в диапазон 0..число_корзин−1 - это номер ячейки массива."
    tags: [index]
  - id: hash-tables-02
    front: "Почему доступ к хеш-таблице в среднем O(1)?"
    back: "И вставка, и поиск идут к одной заранее вычисленной корзине, а не перебирают таблицу. Пока корзины короткие (мала загрузка), это константа."
    tags: [complexity]
  - id: hash-tables-03
    front: "Что такое коэффициент загрузки α?"
    back: "Отношение числа элементов к числу корзин (n / m). Он измеряет тесноту таблицы; чем выше, тем длиннее корзины и пробы."
    tags: [load-factor]
  - id: hash-tables-04
    front: "Что такое рехеширование?"
    back: "Когда α достигает порога (≈0.7), таблица заводит массив вдвое больше и перекладывает в него все элементы заново - у нового размера другой остаток % m."
    tags: [resize]
  - id: hash-tables-05
    front: "Почему вставка амортизированно O(1), если рехеш стоит O(n)?"
    back: "Удвоения случаются всё реже. Суммарная работа всех рехеширований ≈ 2n размазывается по n вставкам - в среднем константа на вставку."
    tags: [amortized]
  - id: hash-tables-06
    front: "Когда хеш-таблица вырождается в O(n)?"
    back: "Когда почти все ключи столкнулись в одной корзине (плохой хеш или злонамеренные ключи). O(1) гарантирует только хорошее распределение."
    tags: [worst-case]
