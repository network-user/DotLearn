conceptId: collisions
cards:
  - id: collisions-01
    front: "What does the birthday paradox say about collisions?"
    back: "Collisions come early: 23 keys on 365 buckets already give a 50% chance of a clash, because you count any pair matching, and there are quadratically many pairs."
    tags: [birthday]
  - id: collisions-02
    front: "How does chaining resolve collisions?"
    back: "Each bucket holds a list. All keys that landed in one bucket are stacked into that list. Tolerant of high load and simple to delete from."
    tags: [chaining]
  - id: collisions-03
    front: "How does open addressing work?"
    back: "One key per cell. If the home cell is taken, a probe looks for the next free one (linear probing - cell by cell around the ring). Compact and cache-friendly."
    tags: [open-addressing]
  - id: collisions-04
    front: "What is primary clustering in linear probing?"
    back: "Occupied cells merge into continuous stretches. A new key falling into a cluster traverses it to the end and lengthens it - clusters grow and merge."
    tags: [clustering]
  - id: collisions-05
    front: "Why can't you just clear a cell on deletion under open addressing?"
    back: "A probe that ran through it would break, and keys behind it become invisible. The cell is marked with a tombstone: empty for insertion, passable for a search."
    tags: [deletion]
  - id: collisions-06
    front: "What does double hashing do?"
    back: "The probe step is computed by a second independent hash function: home + i·hash2(key). Different keys take different routes, so clustering almost vanishes."
    tags: [double-hashing]
