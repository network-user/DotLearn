conceptId: hashing-in-python
cards:
  - id: hashing-in-python-01
    front: "Что значит «объект хешируемый» в Python?"
    back: "У него есть метод __hash__, возвращающий целое, и метод __eq__, и они согласованы между собой. Такой объект можно класть в ключи dict и в set."
    tags: [hashable]
  - id: hashing-in-python-02
    front: "В чём состоит контракт __hash__ и __eq__?"
    back: "Если a == b, то hash(a) == hash(b). Обратное не требуется: разные объекты могут случайно совпасть по хешу (это коллизия, таблица с ней справится)."
    tags: [contract]
  - id: hashing-in-python-03
    front: "Почему список нельзя в ключи словаря, а кортеж - можно?"
    back: "Список изменяем: при изменении его хеш поменялся бы, и ключ «потерялся» бы в таблице. Кортеж неизменяем, поэтому хешируем. То же: frozenset вместо set."
    tags: [immutability]
  - id: hashing-in-python-04
    front: "Что будет, если переопределить __eq__, но не __hash__?"
    back: "Python сделает класс нехешируемым (__hash__ станет None), чтобы вы не нарушили контракт. Переопределяете равенство - переопределяйте и хеш."
    tags: [pitfalls]
  - id: hashing-in-python-05
    front: "Почему hash() строки разный при каждом запуске Python?"
    back: "С версии 3.3 в хеш строк подмешивается случайное зерно (PYTHONHASHSEED) для защиты от атаки HashDoS. Поэтому hash() строки нельзя сохранять между запусками."
    tags: [randomization]
  - id: hashing-in-python-06
    front: "Гарантирует ли dict порядок ключей?"
    back: "Да, с версии 3.7 - порядок вставки, а не порядок хешей. Внутри dict компактный: пары лежат плотным массивом, а хеш-таблица хранит индексы в него."
    tags: [internals]
