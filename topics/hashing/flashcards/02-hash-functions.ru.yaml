conceptId: hash-functions
cards:
  - id: hash-functions-01
    front: "Четыре свойства хорошей хеш-функции?"
    back: "Детерминизм, равномерность, лавинный эффект и скорость - одновременно."
    tags: [properties]
  - id: hash-functions-02
    front: "Что такое лавинный эффект?"
    back: "Изменение одного бита входа меняет примерно половину битов выхода. Похожие ключи дают непохожие хеши и разлетаются по таблице."
    tags: [avalanche]
  - id: hash-functions-03
    front: "Почему сумма кодов символов - плохая хеш-функция?"
    back: "Она игнорирует порядок (анаграммы дают один хеш), а суммы коротких слов кучкуются и забивают соседние корзины."
    tags: [pitfalls]
  - id: hash-functions-04
    front: "Что делает полиномиальный (rolling) хеш?"
    back: "На каждом шаге умножает накопленное значение на базу и прибавляет код символа: h = h*base + ord(c). Так учитывается порядок символов."
    tags: [polynomial]
  - id: hash-functions-05
    front: "Зачем в базе и модуле берут простые числа?"
    back: "Чтобы разрушить регулярности во входах. Общий делитель базы/модуля с шагом между ключами сделал бы часть корзин недостижимой."
    tags: [polynomial]
  - id: hash-functions-06
    front: "Чем криптографический хеш отличается от обычного быстрого?"
    back: "Некриптографический быстр, но подбираем. Криптографический стоек к подбору входов, но в десятки раз медленнее. Внутри dict крипто-хеш не нужен."
    tags: [crypto]
