conceptId: collisions
cards:
  - id: collisions-01
    front: "Что парадокс дней рождения говорит о коллизиях?"
    back: "Коллизии приходят рано: 23 ключа на 365 корзин дают уже 50% шанс столкновения, потому что считать надо совпадение любой пары, а пар квадратично много."
    tags: [birthday]
  - id: collisions-02
    front: "Как разрешают коллизии цепочками (chaining)?"
    back: "Каждая корзина хранит список. Все ключи, попавшие в одну корзину, складываются в этот список. Терпимо к высокой загрузке, просто в удалении."
    tags: [chaining]
  - id: collisions-03
    front: "Как работает открытая адресация (open addressing)?"
    back: "Один ключ на ячейку. Если домашняя ячейка занята, проба ищет следующую свободную (линейное пробирование - по соседним по кругу). Компактна и дружелюбна к кешу."
    tags: [open-addressing]
  - id: collisions-04
    front: "Что такое первичная кластеризация при линейном пробировании?"
    back: "Занятые ячейки сливаются в непрерывные отрезки. Новый ключ, попавший в кластер, проходит его до конца и удлиняет - кластеры растут и склеиваются."
    tags: [clustering]
  - id: collisions-05
    front: "Почему при открытой адресации нельзя просто очистить ячейку при удалении?"
    back: "Проба, шедшая сквозь неё, оборвётся, и ключи за ней станут невидимы. Ячейку помечают надгробием (tombstone): пусто для вставки, проходимо для поиска."
    tags: [deletion]
  - id: collisions-06
    front: "Что делает двойное хеширование?"
    back: "Шаг пробы вычисляет вторая независимая хеш-функция: home + i·hash2(key). У разных ключей разные маршруты, поэтому кластеризация почти исчезает."
    tags: [double-hashing]
