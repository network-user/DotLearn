conceptId: hashing-in-databases-and-systems
cards:
  - id: hashing-in-databases-and-systems-01
    front: "Что ускоряет хеш-индекс, а что - нет?"
    back: "Ускоряет поиск по равенству (= значение) до O(1). Не умеет диапазоны (>, <) и сортировку - хеш разрушает порядок. Для них нужен B-дерево-индекс."
    tags: [index]
  - id: hashing-in-databases-and-systems-02
    front: "Как работает хеш-соединение (hash join)?"
    back: "Фаза build строит хеш-таблицу по меньшей таблице, фаза probe пробивает её большей за один проход. Итог - O(n+m) вместо O(n·m)."
    tags: [join]
  - id: hashing-in-databases-and-systems-03
    front: "В чём беда шардинга по формуле hash % N?"
    back: "Стоит изменить N (добавить или убрать сервер), как остаток меняется почти у всех ключей - почти все данные надо переносить между серверами."
    tags: [sharding]
  - id: hashing-in-databases-and-systems-04
    front: "Что решает консистентное хеширование?"
    back: "Узлы и ключи кладут на одно кольцо; ключ принадлежит первому узлу по часовой стрелке. Добавление узла двигает лишь часть ключей одной дуги, а не всё."
    tags: [consistent-hashing]
  - id: hashing-in-databases-and-systems-05
    front: "Где применяют консистентное хеширование?"
    back: "В Cassandra, DynamoDB, распределённых кешах (клиенты memcached) и CDN - там, где узлы приходят и уходят, а перетасовка должна оставаться локальной."
    tags: [systems]
  - id: hashing-in-databases-and-systems-06
    front: "Что такое Bloom-фильтр?"
    back: "Вероятностная проверка членства на битовом массиве и k хеш-функциях. «Точно нет» - всегда честно; «возможно есть» - с редкими ложными срабатываниями. Экономит память и обращения к диску."
    tags: [bloom-filter]
