conceptId: what-is-hashing
cards:
  - id: what-is-hashing-01
    front: "What is a hash function?"
    back: "A deterministic procedure that turns data of any length into a fixed-size number - a fingerprint. The same input always gives the same output."
    tags: [basics]
  - id: what-is-hashing-02
    front: "What is a collision and why is it inevitable?"
    back: "A collision is two different inputs with one hash. It is inevitable by the pigeonhole principle: there are more inputs than possible fixed-size outputs."
    tags: [collisions]
  - id: what-is-hashing-03
    front: "How does hashing differ from encryption?"
    back: "A hash is irreversible and loses information on purpose - the input cannot be restored. A cipher is reversible: with a key the original text comes back."
    tags: [basics]
  - id: what-is-hashing-04
    front: "Why does a hash need a fixed output size?"
    back: "So it can serve as an array cell number, an index key, or a table field, and compare in a single step. Hash tables and indexes rely on this."
    tags: [basics]
  - id: what-is-hashing-05
    front: "What problem does hashing solve?"
    back: "Fast lookup and identification of data by key without scanning. The idea came from IBM in the 1950s (Luhn, Dumey) for speed."
    tags: [history]
  - id: what-is-hashing-06
    front: "Can you reconstruct the original data from a hash?"
    back: "No: the function loses information. 'Decrypting' a hash is really trying inputs and comparing their hashes, not inverting the function."
    tags: [basics]
