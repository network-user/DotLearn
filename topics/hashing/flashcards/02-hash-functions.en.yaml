conceptId: hash-functions
cards:
  - id: hash-functions-01
    front: "Four properties of a good hash function?"
    back: "Determinism, uniformity, avalanche effect, and speed - all at once."
    tags: [properties]
  - id: hash-functions-02
    front: "What is the avalanche effect?"
    back: "Changing one bit of the input changes about half the bits of the output. Similar keys give dissimilar hashes and scatter across the table."
    tags: [avalanche]
  - id: hash-functions-03
    front: "Why is the sum of character codes a bad hash function?"
    back: "It ignores order (anagrams give one hash), and the sums of short words cluster and jam neighbouring buckets."
    tags: [pitfalls]
  - id: hash-functions-04
    front: "What does a polynomial (rolling) hash do?"
    back: "At each step it multiplies the running value by a base and adds the character code: h = h*base + ord(c). This accounts for character order."
    tags: [polynomial]
  - id: hash-functions-05
    front: "Why use prime numbers for the base and modulus?"
    back: "To destroy regularities in the inputs. A common divisor of base/modulus with the step between keys would make some buckets unreachable."
    tags: [polynomial]
  - id: hash-functions-06
    front: "How does a cryptographic hash differ from a fast one?"
    back: "A non-cryptographic hash is fast but guessable. A cryptographic one resists guessing of inputs but is tens of times slower. Inside dict a crypto hash is needless."
    tags: [crypto]
