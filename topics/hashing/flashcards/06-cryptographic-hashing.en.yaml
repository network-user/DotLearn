conceptId: cryptographic-hashing
cards:
  - id: cryptographic-hashing-01
    front: "What does a cryptographic hash add to an ordinary one?"
    back: "Preimage resistance (you cannot compute the input from the hash) and collision resistance (you cannot find two inputs with one hash in reasonable time)."
    tags: [properties]
  - id: cryptographic-hashing-02
    front: "Why add a salt to a password before hashing?"
    back: "A salt is a unique random string per user. It makes identical passwords hash differently, and precomputed rainbow tables become useless."
    tags: [passwords]
  - id: cryptographic-hashing-03
    front: "Why is bare SHA-256 a poor choice for passwords?"
    back: "It is too fast: an attacker tries billions of variants per second. Passwords are hashed with deliberately slow KDFs: Argon2, bcrypt, scrypt."
    tags: [passwords]
  - id: cryptographic-hashing-04
    front: "What is content addressing?"
    back: "An object's name is the hash of its content. Identical data deduplicates (one hash, one copy), and changing the content changes the address. That is how Git works."
    tags: [content-addressing]
  - id: cryptographic-hashing-05
    front: "Why must MD5 and SHA-1 not be used for security?"
    back: "Collisions have been found for them - different files with one hash. For protection against an adversary use SHA-256 or newer; MD5/SHA-1 serve only against random corruption."
    tags: [broken]
  - id: cryptographic-hashing-06
    front: "Is a hash a kind of encryption?"
    back: "No. A hash is irreversible and has no 'decryption'. If data must be read back later, that is encryption, not hashing."
    tags: [basics]
