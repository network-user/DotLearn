conceptId: hashing-in-databases-and-systems
cards:
  - id: hashing-in-databases-and-systems-01
    front: "What does a hash index speed up, and what not?"
    back: "It speeds up lookup by equality (= value) to O(1). It cannot do ranges (>, <) or sorting - a hash destroys order. For those you need a B-tree index."
    tags: [index]
  - id: hashing-in-databases-and-systems-02
    front: "How does a hash join work?"
    back: "The build phase makes a hash table over the smaller table; the probe phase scans the larger one through it in one pass. The result is O(n+m) instead of O(n·m)."
    tags: [join]
  - id: hashing-in-databases-and-systems-03
    front: "What is the trouble with sharding by hash % N?"
    back: "Change N (add or remove a server) and the remainder changes for almost every key - almost all data must move between servers."
    tags: [sharding]
  - id: hashing-in-databases-and-systems-04
    front: "What does consistent hashing solve?"
    back: "Nodes and keys are placed on one ring; a key belongs to the first node clockwise. Adding a node moves only part of one arc's keys, not everything."
    tags: [consistent-hashing]
  - id: hashing-in-databases-and-systems-05
    front: "Where is consistent hashing used?"
    back: "In Cassandra, DynamoDB, distributed caches (memcached clients), and CDNs - where nodes come and go and the reshuffle must stay local."
    tags: [systems]
  - id: hashing-in-databases-and-systems-06
    front: "What is a Bloom filter?"
    back: "A probabilistic membership check on a bit array and k hash functions. 'Definitely no' is always honest; 'maybe yes' has rare false positives. It saves memory and disk reads."
    tags: [bloom-filter]
