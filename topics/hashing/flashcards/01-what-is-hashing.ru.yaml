conceptId: what-is-hashing
cards:
  - id: what-is-hashing-01
    front: "Что такое хеш-функция?"
    back: "Детерминированная процедура, превращающая данные любой длины в число фиксированного размера - отпечаток. Одинаковый вход всегда даёт одинаковый выход."
    tags: [basics]
  - id: what-is-hashing-02
    front: "Что такое коллизия и почему она неизбежна?"
    back: "Коллизия - это два разных входа с одним хешем. Она неизбежна по принципу Дирихле: входов больше, чем возможных выходов фиксированного размера."
    tags: [collisions]
  - id: what-is-hashing-03
    front: "Чем хеширование отличается от шифрования?"
    back: "Хеш необратим и теряет информацию специально - восстановить вход нельзя. Шифр обратим: с ключом исходный текст восстанавливается."
    tags: [basics]
  - id: what-is-hashing-04
    front: "Зачем хешу фиксированная длина выхода?"
    back: "Чтобы использовать его как номер ячейки массива, ключ индекса или поле таблицы и сравнивать за один шаг. На этом стоят хеш-таблицы и индексы."
    tags: [basics]
  - id: what-is-hashing-05
    front: "Какую задачу решает хеширование?"
    back: "Быстрый поиск и идентификацию данных по ключу без перебора. Идею предложили в IBM в 1950-х (Лун, Думей) ради скорости."
    tags: [history]
  - id: what-is-hashing-06
    front: "Можно ли по хешу восстановить исходные данные?"
    back: "Нет: функция теряет информацию. «Расшифровка» хеша - это перебор входов и сравнение их хешей, а не обращение функции."
    tags: [basics]
