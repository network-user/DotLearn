conceptId: hashing-in-python
cards:
  - id: hashing-in-python-01
    front: "What does it mean for an object to be hashable in Python?"
    back: "It has a __hash__ method returning an integer and an __eq__ method, and they are consistent. Such an object can go into dict keys and a set."
    tags: [hashable]
  - id: hashing-in-python-02
    front: "What is the __hash__ and __eq__ contract?"
    back: "If a == b, then hash(a) == hash(b). The converse is not required: different objects may coincide by hash (a collision the table handles)."
    tags: [contract]
  - id: hashing-in-python-03
    front: "Why can't a list be a dict key, but a tuple can?"
    back: "A list is mutable: if changed, its hash would shift and the key would be 'lost' in the table. A tuple is immutable, so hashable. Likewise frozenset instead of set."
    tags: [immutability]
  - id: hashing-in-python-04
    front: "What happens if you override __eq__ but not __hash__?"
    back: "Python makes the class unhashable (__hash__ becomes None) so you do not break the contract. Override equality - override the hash too."
    tags: [pitfalls]
  - id: hashing-in-python-05
    front: "Why is a string's hash() different on each Python run?"
    back: "Since 3.3 a random seed is mixed into string hashes (PYTHONHASHSEED) to defend against the HashDoS attack. So a string's hash() cannot be stored between runs."
    tags: [randomization]
  - id: hashing-in-python-06
    front: "Does dict guarantee key order?"
    back: "Yes, since 3.7 - insertion order, not hash order. Inside, dict is compact: pairs sit in a dense array, and the hash table stores indexes into it."
    tags: [internals]
