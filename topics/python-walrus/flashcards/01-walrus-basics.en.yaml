conceptId: walrus-basics
cards:
  - id: walrus-basics-01
    front: How does assignment expression := differ from ordinary =?
    back: >-
      Ordinary = is a statement with no value, occupying a whole line. Walrus :=
      is an expression that returns the assigned result, so it can be nested
      inside another expression.
    tags: [walrus, basics]
  - id: walrus-basics-02
    front: What does the expression name := expr return?
    back: >-
      It evaluates expr, binds the result to the name name, and returns that same
      result as the value of the whole expression — the result is passed outward
      and can be used further.
    tags: [walrus]
  - id: walrus-basics-03
    front: Into what scope does walrus bind a name?
    back: >-
      Into the ordinary surrounding scope, not a temporary local one. The name
      stays available after the block, for example after the if body where the
      assignment stood.
    tags: [walrus, scope]
  - id: walrus-basics-04
    front: Why is "compute, remember, check" convenient to write with walrus?
    back: >-
      Without it you need two lines repeating the name: first value = compute(),
      then if value > 10. Walrus reduces this to if (value := compute()) > 10 —
      computation and its check sit together, the name is written once.
    tags: [walrus, idioms]
  - id: walrus-basics-05
    front: When are parentheses around := required?
    back: >-
      In most positions, for example in an if condition and in an arithmetic
      expression. Without parentheses Python either parses the line differently or
      does not compile. When in doubt, add parentheses.
    tags: [walrus, syntax]
  - id: walrus-basics-06
    front: What happens with the line x := 5 on its own line?
    back: >-
      You get a syntax error. Walrus cannot be used as a standalone statement —
      for assignment on its own line use ordinary =.
    tags: [walrus, pitfall]
  - id: walrus-basics-07
    front: What is wrong with if value := compute() > 10:?
    back: >-
      Because of operator precedence, comparison applies to the result of
      compute() before assignment, and value gets a boolean, not a number.
      Correct form — if (value := compute()) > 10:.
    tags: [walrus, pitfall]
  - id: walrus-basics-08
    front: Does := bind more weakly or more strongly than other operators?
    back: >-
      More weakly than almost all operators. So (x := a + b) assigns x the
      result of a + b as a whole, not just a. In practice walrus is always
      wrapped in parentheses, and precedence inside them is unambiguous.
    tags: [walrus, precedence]
  - id: walrus-basics-09
    front: In which Python version did walrus appear and which PEP describes it?
    back: >-
      Operator := was added in Python 3.8 (2019). Official name — assignment
      expression, described in PEP 572. Nickname "walrus" because := looks like
      walrus eyes and tusks.
    tags: [walrus, history]
  - id: walrus-basics-10
    front: When should you choose ordinary = instead of walrus?
    back: >-
      When the returned value of assignment is not needed by anyone. Walrus is
      justified only where the result is immediately passed into a condition,
      argument, or while; otherwise use ordinary =.
    tags: [walrus, style]
