conceptId: walrus-readability
cards:
  - id: walrus-readability-01
    front: По какому критерию walrus окупается с точки зрения читаемости?
    back: >-
      Он хорош, когда устраняет дублирование вычисления или повтор имени в
      пределах пары соседних строк. Он плох, когда просто уплотняет и без того
      ясный код. Критерий - убирать повтор, а не сокращать строки.
    tags: [walrus, readability]
  - id: walrus-readability-02
    front: Почему «короче» не означает «понятнее» для walrus?
    back: >-
      Строка, в которую втиснуты вычисление, присваивание, проверка и побочный
      эффект, читается медленнее, чем две простые строки, даже если формально
      компактнее. В одной точке происходит больше событий.
    tags: [walrus, readability]
  - id: walrus-readability-03
    front: В чём анти-паттерн walrus вместо простого присваивания?
    back: >-
      Если значение всё равно присваивается на отдельной строке и тут же не
      проверяется, например print(total := sum(prices)), walrus не убирает ни
      одного повтора - он лишь прячет присваивание в неожиданное место.
    tags: [walrus, antipattern]
  - id: walrus-readability-04
    front: Чем плохо несколько := в одном выражении?
    back: >-
      Строка превращается в ребус: непонятен порядок связывания имён и что
      возвращается. Это почти всегда сигнал разбить выражение на пошаговый расчёт
      обычными присваиваниями.
    tags: [walrus, antipattern]
  - id: walrus-readability-05
    front: Почему опасно прятать walrus глубоко внутри аргумента вызова?
    back: >-
      Присваивание - заметное событие, влияющее на последующий код. Спрятанное в
      середину аргумента, например send(payload, retries=(limit := ...)), оно
      маскируется, и читатель легко пропустит, что переменная вообще появилась.
    tags: [walrus, antipattern]
  - id: walrus-readability-06
    front: Какое простое правило применять в спорной ситуации «walrus или две строки»?
    back: >-
      Сомневаетесь - пишите две строки. Собрать их в walrus позже легко, а
      распутывать плотное выражение тяжелее. По умолчанию выбирайте ясность, а не
      компактность.
    tags: [walrus, readability, style]
  - id: walrus-readability-07
    front: Почему walrus сделали отдельным оператором, а не разрешили = в условиях, как в C?
    back: >-
      Для защиты от опечатки. В языках с допустимым if (x = 5) легко написать
      присваивание вместо сравнения, и условие молча станет истинным. В Python if
      x = 5: - синтаксическая ошибка.
    tags: [walrus, history]
  - id: walrus-readability-08
    front: Полностью ли строгий синтаксис walrus защищает от путаницы присваивания и сравнения?
    back: >-
      Нет. Он отвергает случайную опечатку = вместо ==, но осознанно поставленный
      := в условии всё равно требует внимания: он одновременно присваивает и
      проверяет, и эту двойственность читатель должен заметить.
    tags: [walrus, pitfall]
  - id: walrus-readability-09
    front: Что говорят официальные рекомендации (PEP 8, PEP 572) про walrus?
    back: >-
      PEP 8 не запрещает walrus, но его дух - «читаемость важнее компактности».
      PEP 572 в разделе Style советует не использовать := и обычное = для одной
      цели в одном выражении и избегать сложных конструкций.
    tags: [walrus, style]
  - id: walrus-readability-10
    front: В каких двух случаях walrus уместен по эвристике ревью?
    back: >-
      Когда он устраняет дублирование (двойной вызов в comprehension, повтор
      чтения в цикле) или возвращает условие выхода в заголовок while. Если ни
      того, ни другого нет, обычно выигрывают две строки.
    tags: [walrus, readability]
