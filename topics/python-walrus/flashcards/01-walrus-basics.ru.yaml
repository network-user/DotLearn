conceptId: walrus-basics
cards:
  - id: walrus-basics-01
    front: Чем выражение-присваивание := отличается от обычного =?
    back: >-
      Обычное = - это инструкция (statement) без значения, занимающая целую
      строку. Walrus := - это выражение (expression), которое возвращает
      присвоенный результат, поэтому его можно вложить внутрь другого выражения.
    tags: [walrus, basics]
  - id: walrus-basics-02
    front: Что возвращает выражение name := expr?
    back: >-
      Оно вычисляет expr, связывает результат с именем name и возвращает этот же
      результат как значение всего выражения - то есть результат «прокидывается»
      наружу и может быть использован дальше.
    tags: [walrus]
  - id: walrus-basics-03
    front: В какую область видимости walrus связывает имя?
    back: >-
      В обычную окружающую область видимости, а не во временную локальную. Имя
      остаётся доступным после блока, например после тела if, в котором стояло
      присваивание.
    tags: [walrus, scope]
  - id: walrus-basics-04
    front: Почему «вычислить, запомнить, проверить» удобно записать через walrus?
    back: >-
      Без него нужны две строки с повтором имени: сначала value = compute(),
      потом if value > 10. Walrus сводит это к if (value := compute()) > 10 -
      вычисление и его проверка стоят рядом, имя пишется один раз.
    tags: [walrus, idioms]
  - id: walrus-basics-05
    front: Когда вокруг := обязательны скобки?
    back: >-
      В большинстве позиций, например в условии if и в арифметическом выражении.
      Без скобок Python либо разберёт строку не так, либо не скомпилирует.
      Эвристика - сомневаетесь, ставьте скобки.
    tags: [walrus, syntax]
  - id: walrus-basics-06
    front: Что произойдёт со строкой x := 5 на отдельной строке?
    back: >-
      Будет синтаксическая ошибка. Walrus нельзя использовать как самостоятельную
      инструкцию - для присваивания на отдельной строке есть обычное =.
    tags: [walrus, pitfall]
  - id: walrus-basics-07
    front: Что не так с записью if value := compute() > 10:?
    back: >-
      Из-за приоритета операций сравнение применится к результату compute()
      раньше присваивания, и в value попадёт булево значение, а не число.
      Правильно - if (value := compute()) > 10:.
    tags: [walrus, pitfall]
  - id: walrus-basics-08
    front: Слабее или сильнее := связывает по сравнению с другими операторами?
    back: >-
      Слабее почти всех операторов. Поэтому (x := a + b) присваивает x результат
      a + b целиком, а не только a. На практике walrus всегда оборачивают в
      скобки, и приоритет внутри них вопросов не вызывает.
    tags: [walrus, precedence]
  - id: walrus-basics-09
    front: В какой версии Python появился walrus и в каком PEP он описан?
    back: >-
      Оператор := добавлен в Python 3.8 (2019). Официальное название -
      assignment expression, описан в PEP 572. Прозвище «walrus» из-за сходства
      := с глазами и клыками моржа.
    tags: [walrus, history]
  - id: walrus-basics-10
    front: Когда стоит выбирать обычное = вместо walrus?
    back: >-
      Когда возвращаемое значение присваивания никому не нужно. Walrus оправдан
      только там, где результат тут же передаётся в условие, аргумент или while;
      иначе берите обычное =.
    tags: [walrus, style]
