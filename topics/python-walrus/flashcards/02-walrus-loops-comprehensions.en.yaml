conceptId: walrus-loops-comprehensions
cards:
  - id: walrus-loops-01
    front: What is the least controversial walrus use case?
    back: >-
      Read loop until a sentinel value: while (chunk := read()) != sentinel.
      Reading and the exit condition are pulled into one place (the while header),
      and the duplicate first read before the loop disappears.
    tags: [walrus, loops]
  - id: walrus-loops-02
    front: What problem does the classic read loop have without walrus?
    back: >-
      Reading must be duplicated (once before the loop, again at the end of the
      body), or you build while True with break. Easy to forget to update the
      variable at the end of the body and get an infinite loop.
    tags: [walrus, loops, pitfall]
  - id: walrus-loops-03
    front: What is a sentinel in the context of a read loop?
    back: >-
      A special signal value meaning data is finished: empty string for readline,
      empty bytes for read. The walrus is especially convenient with sentinels:
      checking for them lives right in the while condition.
    tags: [walrus, loops]
  - id: walrus-loops-04
    front: How does walrus help in a comprehension with an expensive function?
    back: >-
      Lets you compute the function once: [y for x in range(6) if (y :=
      transform(x)) > 0]. Without it you would call transform twice: in the if
      condition and in the left-hand result expression.
    tags: [walrus, comprehensions]
  - id: walrus-loops-05
    front: Where should walrus sit in a comprehension, and where the ready variable?
    back: >-
      Walrus goes in the if part, as in if (y := transform(x)) > 0, and the ready y
      is used on the left. If you swap the order, there is no call savings.
    tags: [walrus, comprehensions, pitfall]
  - id: walrus-loops-06
    front: What happens to a walrus name after a comprehension?
    back: >-
      It leaks into the nearest enclosing ordinary scope (function or module) and
      stays available after the comprehension. That is a deliberate PEP 572
      decision.
    tags: [walrus, comprehensions, scope]
  - id: walrus-loops-07
    front: Why is counter name x from a comprehension unavailable outside, but walrus name is?
    back: >-
      A comprehension has an implicit wrapper function, and counter x is local to
      it. Walrus intentionally binds in the enclosing ordinary scope, jumping over
      that wrapper. Hence the asymmetry.
    tags: [walrus, comprehensions, scope]
  - id: walrus-loops-08
    front: Why is it risky to rely on the "last value" of a leaked comprehension variable?
    back: >-
      It is fragile: the value depends on where the loop stopped by condition.
      Leaking a walrus name is not a bug, but if you need a variable after a
      comprehension, it is safer to assign it with an explicit separate line.
    tags: [walrus, comprehensions, pitfall]
  - id: walrus-loops-09
    front: What does [y for x in range(4) if (y := x * 10) < 25] print, and print(y)?
    back: >-
      List [0, 10, 20], then 30. The list stopped at the check 30 < 25 (false),
      but y holds the last assigned value 30, the one where the condition became
      false.
    tags: [walrus, comprehensions]
  - id: walrus-loops-10
    front: When should you replace while True with break by walrus?
    back: >-
      When the exit condition is "while reading has not returned a sentinel." Then
      while (x := ...) expresses exit directly in the loop header and reads better
      than a break split in the middle of the body.
    tags: [walrus, loops, style]
