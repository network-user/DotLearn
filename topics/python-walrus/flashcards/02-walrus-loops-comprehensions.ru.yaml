conceptId: walrus-loops-comprehensions
cards:
  - id: walrus-loops-01
    front: Какой самый бесспорный сценарий применения walrus?
    back: >-
      Цикл чтения до сигнального значения: while (chunk := read()) != sentinel.
      Чтение и условие выхода стягиваются в одну точку - заголовок while, а
      дублирующее «первое чтение» до цикла исчезает.
    tags: [walrus, loops]
  - id: walrus-loops-02
    front: Какая проблема у классического цикла чтения без walrus?
    back: >-
      Чтение приходится дублировать - одно до цикла, второе в конце тела - или
      городить while True с break. Легко забыть обновить переменную в конце тела
      и получить бесконечный цикл.
    tags: [walrus, loops, pitfall]
  - id: walrus-loops-03
    front: Что такое сентинел (sentinel) в контексте цикла чтения?
    back: >-
      Специальное сигнальное значение «данные закончились»: пустая строка для
      readline, пустые байты для read. Walrus особенно удобен с сентинелами -
      проверка на них живёт прямо в условии while.
    tags: [walrus, loops]
  - id: walrus-loops-04
    front: Как walrus помогает в comprehension с дорогой функцией?
    back: >-
      Позволяет вычислить функцию один раз: [y for x in range(6) if (y :=
      transform(x)) > 0]. Без него transform пришлось бы звать дважды - в условии
      if и в выражении-результате слева.
    tags: [walrus, comprehensions]
  - id: walrus-loops-05
    front: Где в comprehension должен стоять walrus, а где - готовая переменная?
    back: >-
      Walrus ставится в части if - if (y := transform(x)) > 0, а в выражении
      слева используется уже готовый y. Если перепутать порядок, экономии вызовов
      не будет.
    tags: [walrus, comprehensions, pitfall]
  - id: walrus-loops-06
    front: Что происходит с walrus-именем после comprehension?
    back: >-
      Оно протекает в ближайшую охватывающую обычную область (функцию или модуль)
      и остаётся доступным после comprehension. Это сознательное решение PEP 572.
    tags: [walrus, comprehensions, scope]
  - id: walrus-loops-07
    front: Почему имя счётчика x из comprehension недоступно снаружи, а walrus-имя - доступно?
    back: >-
      У comprehension есть неявная функция-обёртка, и счётчик x локален для неё.
      Walrus же намеренно связывает имя в охватывающей обычной области,
      перепрыгивая через эту обёртку. Отсюда асимметрия.
    tags: [walrus, comprehensions, scope]
  - id: walrus-loops-08
    front: Почему опасно полагаться на «последнее значение» утёкшей из comprehension переменной?
    back: >-
      Это хрупко: значение зависит от точки, где цикл оборвался по условию.
      Утечка walrus-имени не баг, но если переменная нужна после comprehension,
      надёжнее присвоить её явной отдельной строкой.
    tags: [walrus, comprehensions, pitfall]
  - id: walrus-loops-09
    front: Что напечатает [y for x in range(4) if (y := x * 10) < 25] и print(y)?
    back: >-
      Список [0, 10, 20], затем 30. Список оборвался на проверке 30 < 25
      (ложь), но y хранит последнее присвоенное значение 30 - именно то, на
      котором условие стало ложным.
    tags: [walrus, comprehensions]
  - id: walrus-loops-10
    front: Когда стоит заменить while True с break на walrus?
    back: >-
      Когда условие выхода - это «пока чтение не вернуло сентинел». Тогда while
      (x := ...) выражает выход прямо в заголовке цикла и читается лучше, чем
      разрыв break в середине тела.
    tags: [walrus, loops, style]
