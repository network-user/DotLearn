conceptId: walrus-readability
cards:
  - id: walrus-readability-01
    front: By what readability criterion does walrus pay off?
    back: >-
      It is good when it removes duplicate computation or repeated names within a
      pair of neighboring lines. It is bad when it merely compresses already clear
      code. Criterion — remove repetition, not shorten lines.
    tags: [walrus, readability]
  - id: walrus-readability-02
    front: Why does "shorter" not mean "clearer" for walrus?
    back: >-
      A line squeezing in computation, assignment, checking, and a side effect
      reads slower than two simple lines, even if formally more compact. More
      events happen in one place.
    tags: [walrus, readability]
  - id: walrus-readability-03
    front: What is the walrus anti-pattern instead of simple assignment?
    back: >-
      If the value would be assigned on its own line and is not checked
      immediately, e.g. print(total := sum(prices)), walrus removes no repetition
      — it only hides assignment in an unexpected place.
    tags: [walrus, antipattern]
  - id: walrus-readability-04
    front: What is wrong with several := in one expression?
    back: >-
      The line becomes a puzzle: binding order and what is returned are unclear.
      That is almost always a signal to split into step-by-step calculation with
      ordinary assignments.
    tags: [walrus, antipattern]
  - id: walrus-readability-05
    front: Why is it dangerous to hide walrus deep inside a call argument?
    back: >-
      Assignment is a noticeable event affecting later code. Hidden in the middle
      of an argument, e.g. send(payload, retries=(limit := ...)), it is masked and
      the reader easily misses that a variable appeared at all.
    tags: [walrus, antipattern]
  - id: walrus-readability-06
    front: What simple rule applies in the "walrus or two lines" debate?
    back: >-
      When in doubt, write two lines. Compressing into walrus later is easy;
      unpacking a dense expression is harder. Default to clarity, not compactness.
    tags: [walrus, readability, style]
  - id: walrus-readability-07
    front: Why did walrus become a separate operator instead of allowing = in conditions like C?
    back: >-
      For typo protection. In languages where if (x = 5) is allowed, it is easy to
      write assignment instead of comparison, and the condition silently becomes
      true. In Python if x = 5: is a syntax error.
    tags: [walrus, history]
  - id: walrus-readability-08
    front: Does strict walrus syntax fully protect against confusing assignment and comparison?
    back: >-
      No. It rejects accidental = instead of ==, but a deliberate := in a
      condition still needs attention: it assigns and checks at once, and the
      reader must notice that duality.
    tags: [walrus, pitfall]
  - id: walrus-readability-09
    front: What do official recommendations (PEP 8, PEP 572) say about walrus?
    back: >-
      PEP 8 does not forbid walrus, but its spirit is "readability counts." PEP 572
      in the Style section advises not to use := and ordinary = for the same
      purpose in one expression and to avoid complex constructions.
    tags: [walrus, style]
  - id: walrus-readability-10
    front: In which two cases is walrus appropriate by review heuristic?
    back: >-
      When it removes duplication (double call in a comprehension, repeated read
      in a loop) or returns the exit condition to the while header. If neither
      applies, two lines usually win.
    tags: [walrus, readability]
