exercises:
  - id: walrus-what-returns-001
    concept: walrus-basics
    type: theory-quiz
    difficulty: 1
    prompt: "Чем walrus := отличается от обычного присваивания =?"
    choices:
      - id: a
        text: "= - это инструкция без значения, а := - выражение, которое возвращает присвоенный результат."
      - id: b
        text: "Ничем по смыслу: := просто более короткая запись для =."
      - id: c
        text: ":= присваивает значение, но в отличие от = не связывает имя с переменной."
      - id: d
        text: "= работает только с числами, а := - с любыми типами."
    correct: [a]
    explanation: "`name = expr` связывает имя и на этом останавливается - у строки нет значения. `name := expr` связывает имя и возвращает тот же результат как значение всего выражения, поэтому его можно вложить в `if`, `while` или вызов."
    variants:
      - prompt: "Что возвращает выражение (n := len(\"abc\"))?"
        choices:
          - id: a
            text: "Число 3 - тот же результат, который присвоен имени n."
          - id: b
            text: "Ничего: присваивание не имеет значения."
          - id: c
            text: "Строку \"abc\", из которой считали длину."
          - id: d
            text: "Имя n как объект-переменную."
        correct: [a]
        explanation: "Walrus вычисляет `len(\"abc\")` (это 3), связывает с `n` и возвращает то же число наружу. Именно поэтому выражение можно поставить в условие или арифметику."
      - prompt: "Почему walrus := называют «выражением-присваиванием» (assignment expression)?"
        choices:
          - id: a
            text: "Потому что он одновременно присваивает имя и является выражением со значением."
          - id: b
            text: "Потому что его можно писать только внутри выражений присваивания через =."
          - id: c
            text: "Потому что он присваивает значение сразу нескольким именам."
          - id: d
            text: "Потому что он выражает присваивание словами, а не символом."
        correct: [a]
        explanation: "Название из PEP 572 точно описывает суть: `:=` делает присваивание (связывает имя), но при этом сам является выражением, у которого есть значение - присвоенный результат."

  - id: walrus-statement-error-001
    concept: walrus-basics
    type: theory-quiz
    difficulty: 2
    prompt: "Что произойдёт, если написать walrus отдельной строкой: x := 5?"
    choices:
      - id: a
        text: "Синтаксическая ошибка: walrus нельзя использовать как самостоятельную инструкцию."
      - id: b
        text: "x станет равным 5, как при обычном присваивании."
      - id: c
        text: "x станет равным 5, но значение 5 будет напечатано."
      - id: d
        text: "x останется неопределённым, ошибки не будет."
    correct: [a]
    explanation: "Голая строка `x := 5` - синтаксическая ошибка. Walrus имеет смысл только там, где его возвращаемое значение кому-то нужно (условие, аргумент, `while`). Для присваивания на отдельной строке есть обычное `=`."
    variants:
      - prompt: "Какая из строк корректна, если нужно присвоить y значение 10 и проверить его в условии?"
        choices:
          - id: a
            text: "if (y := 10) > 5: ..."
          - id: b
            text: "if y := 10 > 5: ... без скобок"
          - id: c
            text: "if y = 10 > 5: ..."
          - id: d
            text: "y := 10 if y > 5: ..."
        correct: [a]
        explanation: "Скобки вокруг `(y := 10)` обязательны: они делают walrus заметным и однозначным. Без скобок `y := 10 > 5` разберётся не так, как вы ждёте, а `=` в условии вообще запрещён."

  - id: walrus-predict-parens-001
    concept: walrus-basics
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      total = (subtotal := 100) + (tax := 20)
      print(subtotal, tax, total)
    expected:
      kind: stdout
      value: "100 20 120"
    hints:
      - "Walrus и связывает имя, и возвращает значение. Какие значения получат subtotal и tax, и что тогда окажется в total?"
      - "Вычислите выражение по частям: сначала левая скобка даёт 100, правая даёт 20, затем они складываются."
    variants:
      - snippet: |
          result = (a := 5) * (b := 3)
          print(a, b, result)
        expected:
          kind: stdout
          value: "5 3 15"
      - snippet: |
          x = (y := 7) - (z := 2)
          print(y, z, x)
        expected:
          kind: stdout
          value: "7 2 5"

  - id: walrus-scope-survives-001
    concept: walrus-basics
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      text = "walrus"

      if (n := len(text)) > 3:
          print("длинная:", n)

      print("снаружи:", n)
    expected:
      kind: stdout
      value: |-
        длинная: 6
        снаружи: 6
    hints:
      - "Walrus не создаёт временную область видимости - подумайте, где живёт имя n после того, как условие отработало."
      - "Имя, связанное через :=, остаётся в обычной окружающей области, поэтому n доступна и внутри if, и после него."

  - id: walrus-fstring-001
    concept: walrus-basics
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      print(f"квадрат: {(s := 4 ** 2)}")
      print(s + 1)
    expected:
      kind: stdout
      value: |-
        квадрат: 16
        17
    hints:
      - "Walrus можно поставить даже внутрь f-string: выражение вычислится, имя свяжется, результат подставится. Что попадёт в s?"
      - "Переменная, связанная walrus внутри f-string, переживает строку и доступна на следующей. Чему равно 4 ** 2?"

  - id: walrus-cache-len-001
    concept: walrus-basics
    type: python-function
    difficulty: 2
    prompt: "Допишите функцию describe(items): если в списке больше 3 элементов, верните строку вида \"много: N\" (N - длина), иначе \"мало: N\". Длину вычислите ровно один раз через walrus в условии."
    starter: |
      def describe(items):
          ...
    cases:
      - call: "describe([1, 2, 3, 4, 5])"
        expect: "много: 5"
      - call: "describe([1, 2])"
        expect: "мало: 2"
      - call: "describe([])"
        expect: "мало: 0"
      - call: "describe([10, 20, 30])"
        expect: "мало: 3"
    hints:
      - "Вам нужна длина и в проверке, и в возвращаемой строке. Walrus в условии if позволяет вычислить её один раз и переиспользовать."
      - "Запишите if (n := len(items)) > 3, а дальше используйте уже готовую n в обеих ветках."
    solution: |
      def describe(items):
          if (n := len(items)) > 3:
              return f"много: {n}"
          return f"мало: {n}"
    variants:
      - prompt: "Допишите summarize(prices): если сумма цен больше 100, верните строку вида \"дорого: S\" (S - сумма), иначе \"дёшево: S\". Сумму вычислите ровно один раз через walrus в условии."
        starter: |
          def summarize(prices):
              ...
        cases:
          - call: "summarize([60, 50, 30])"
            expect: "дорого: 140"
          - call: "summarize([10, 20])"
            expect: "дёшево: 30"
          - call: "summarize([])"
            expect: "дёшево: 0"
          - call: "summarize([100])"
            expect: "дёшево: 100"
          - call: "summarize([200])"
            expect: "дорого: 200"
        solution: |
          def summarize(prices):
              if (total := sum(prices)) > 100:
                  return f"дорого: {total}"
              return f"дёшево: {total}"
      - prompt: "Допишите label(word): если длина слова не меньше 5, верните строку вида \"длинное: N\" (N - длина), иначе \"короткое: N\". Длину вычислите ровно один раз через walrus в условии."
        starter: |
          def label(word):
              ...
        cases:
          - call: "label('python')"
            expect: "длинное: 6"
          - call: "label('ok')"
            expect: "короткое: 2"
          - call: "label('')"
            expect: "короткое: 0"
          - call: "label('hello')"
            expect: "длинное: 5"
          - call: "label('hi')"
            expect: "короткое: 2"
        solution: |
          def label(word):
              if (n := len(word)) >= 5:
                  return f"длинное: {n}"
              return f"короткое: {n}"

  - id: walrus-collect-blanks-001
    concept: walrus-basics
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите присваивание со значением: переменная step должна получить результат вычисления и тут же проверяться в условии."
    template: |
      if (step {{op}} compute()) > 0:
          print(step)
    blanks:
      op:
        accept: [":="]
        accept_regex: '^:=$'
    hints:
      - "Нужен оператор, который и присваивает имя step, и возвращает значение в условие. Обычное = здесь запрещено."
    variants:
      - template: |
          while ({{name}} := source.read()):
              process({{name}})
        blanks:
          name:
            accept: ["chunk", "data", "block", "item", "line"]
            accept_regex: '^[a-zA-Z_][a-zA-Z0-9_]*$'
      - template: |
          numbers = [1, 2, 3]
          if ({{var}} := len(numbers)) == 3:
              print({{var}})
        blanks:
          var:
            accept: ["count", "n", "size", "length"]
            accept_regex: '^[a-zA-Z_][a-zA-Z0-9_]*$'

  - id: walrus-two-into-one-001
    concept: walrus-basics
    type: python-function
    difficulty: 4
    prompt: "Перепишите проверку так, чтобы compute() вызывалась ровно один раз. Допишите check(seed): вычислите value = seed * seed - 4 через walrus в условии; если value положительно, верните value, иначе верните 0."
    starter: |
      def check(seed):
          ...
    cases:
      - call: "check(3)"
        expect: 5
      - call: "check(2)"
        expect: 0
      - call: "check(1)"
        expect: 0
      - call: "check(5)"
        expect: 21
      - call: "check(0)"
        expect: 0
    hints:
      - "Вам нужно одно и то же значение и для проверки знака, и для возврата. Walrus в условии связывает его один раз."
      - "Запишите if (value := seed * seed - 4) > 0 и верните готовую value из тела, иначе 0."
      - "Краевой случай: при seed = 2 выражение даёт ровно 0, а 0 не больше 0 - значит возвращается 0."
    solution: |
      def check(seed):
          if (value := seed * seed - 4) > 0:
              return value
          return 0
