exercises:
  - id: walrus-loop-why-001
    concept: walrus-loops-comprehensions
    type: theory-quiz
    difficulty: 1
    prompt: "What problem of the classic read loop does while (chunk := read()) solve?"
    choices:
      - id: a
        text: "Removes the duplicate first read before the loop and returns the exit condition to the"
      - id: b
        text: "Makes the loop faster because walrus compiles to more efficient bytecode."
      - id: c
        text: "Lets you read data into several variables in one iteration."
      - id: d
        text: "Automatically closes the data source after the loop."
    correct: [a]
    explanation: "Without walrus reading must be duplicated (once before the loop, once at the end of the body) or you build `while True` with `break`. The walrus pulls reading and checking into the `while` header, and the body gets a ready `chunk`."
    variants:
      - prompt: "Where is the exit condition in the loop while (line := f.readline()) != \"\"?"
        choices:
          - id: a
            text: "In the while header, where the line is read and checked for emptiness."
          - id: b
            text: "Inside the loop body, via a separate break."
          - id: c
            text: "The exit condition is computed once before the loop."
          - id: d
            text: "Python picks the exit condition automatically from the source type."
        correct: [a]
        explanation: "The whole point of walrus in a read loop is to return the exit condition to the header. On each iteration `line := f.readline()` runs first, then the result is compared to an empty string right in `while`."
      - prompt: "What is a \"sentinel\" in the context of a read loop?"
        choices:
          - id: a
            text: "A special value meaning data is finished, e.g. an empty string for"
          - id: b
            text: "An iteration counter that walrus increments automatically."
          - id: c
            text: "The variable name walrus stores the result in."
          - id: d
            text: "A watcher stream that monitors loop completion."
        correct: [a]
        explanation: "A sentinel is an end-of-data signal: empty string for `readline`, empty bytes for `read`. The walrus is especially convenient with sentinels: `while (x := read()) != sentinel`."

  - id: walrus-comp-order-001
    concept: walrus-loops-comprehensions
    type: theory-quiz
    difficulty: 2
    prompt: "In comprehension [y for x in data if (y := f(x)) > 0], why is walrus here?"
    choices:
      - id: a
        text: "To call f(x) once and use the result in both the if filter and the"
      - id: b
        text: "So the comprehension runs elements of data in parallel."
      - id: c
        text: "So variable x becomes available after the comprehension."
      - id: d
        text: "Walrus is not needed here; it only hurts readability."
    correct: [a]
    explanation: "Without walrus you would call `f(x)` twice: in `if f(x) > 0` and in the left-hand expression. The walrus computes `f(x)` once, stores it in `y`, and `y` is used in both filter and result."
    variants:
      - prompt: "Where should walrus sit in a comprehension to save calls to an expensive function?"
        choices:
          - id: a
            text: "In the if part:) > 0, with ready y in the left-hand value"
          - id: b
            text: "In the left-hand value expression, checking f(x) again in if."
          - id: c
            text: "In the for part, next to x."
          - id: d
            text: "Order does not matter: the result is the same either way."
        correct: [a]
        explanation: "Walrus must sit in `if` to bind `y` before use on the left. If you put `:=` on the left and check bare `f(x)` in `if`, there is no savings: the function is called twice again."

  - id: walrus-read-loop-predict-001
    concept: walrus-loops-comprehensions
    type: predict-output
    difficulty: 2
    prompt: "What does this program print?"
    snippet: |
      data = "abcdef"
      parts = []

      while (chunk := data[:2]):
          parts.append(chunk)
          data = data[2:]

      print(parts)
    expected:
      kind: stdout
      value: "['ab', 'cd', 'ef']"
    hints:
      - "The loop takes two characters at a time until the string is empty. An empty string is falsy, so the walrus stops the loop there."
      - "Trace iterations: first chunk = 'ab', then 'cd', then 'ef', then data is empty and data[:2] gives an empty string."
    variants:
      - snippet: |
          data = "xyz123"
          parts = []

          while (chunk := data[:3]):
              parts.append(chunk)
              data = data[3:]

          print(parts)
        expected:
          kind: stdout
          value: "['xyz', '123']"
      - snippet: |
          data = "ab"
          parts = []

          while (chunk := data[:2]):
              parts.append(chunk)
              data = data[2:]

          print(len(parts))
        expected:
          kind: stdout
          value: "1"

  - id: walrus-comp-cache-predict-001
    concept: walrus-loops-comprehensions
    type: predict-output
    difficulty: 3
    prompt: "What does this program print?"
    snippet: |
      def transform(x):
          return x * x - 1

      result = [y for x in range(6) if (y := transform(x)) > 0]
      print(result)
    expected:
      kind: stdout
      value: "[3, 8, 15, 24]"
    hints:
      - "Walrus in if stores transform(x) in y and immediately checks y > 0. The list gets the same ready y. Which x give a positive result?"
      - "Compute transform for x from 0 to 5: -1, 0, 3, 8, 15, 24. The > 0 condition drops the first two."
    variants:
      - snippet: |
          def transform(x):
              return x * 2 - 4

          result = [y for x in range(5) if (y := transform(x)) >= 0]
          print(result)
        expected:
          kind: stdout
          value: "[0, 2, 4]"
      - snippet: |
          def transform(x):
              return 10 - x * x

          result = [y for x in range(5) if (y := transform(x)) > 0]
          print(result)
        expected:
          kind: stdout
          value: "[10, 9, 6, 1]"

  - id: walrus-comp-leak-001
    concept: walrus-loops-comprehensions
    type: predict-output
    difficulty: 4
    prompt: "What does this program print?"
    snippet: |
      values = [y for x in range(4) if (y := x * 10) < 25]
      print(values)
      print(y)
    expected:
      kind: stdout
      value: |-
        [0, 10, 20]
        30
    hints:
      - "First work out the list: for each x the walrus puts x * 10 in y and checks y < 25. At which x does the condition first become false?"
      - "Counter name x is local to the comprehension, but walrus name y leaks into the surrounding scope. What value was y assigned last?"
      - "The last y assignment is at x = 3 (that is 30); there 30 < 25 is false, the element did not enter the list, but y = 30 remained."

  - id: walrus-running-total-001
    concept: walrus-loops-comprehensions
    type: python-function
    difficulty: 3
    prompt: "Complete running_sums(nums): return a list of running sums. Use walrus in a comprehension to accumulate the sum in the outer variable total."
    starter: |
      def running_sums(nums):
          total = 0
          ...
    cases:
      - call: "running_sums([1, 2, 3, 4])"
        expect: [1, 3, 6, 10]
      - call: "running_sums([10, -5, 5])"
        expect: [10, 5, 10]
      - call: "running_sums([])"
        expect: []
      - call: "running_sums([7])"
        expect: [7]
    hints:
      - "Walrus in a comprehension can update a variable declared outside. On each step add the element to total and put the new value in the list."
      - "The expression (total := total + n) both assigns and returns the new sum: collect exactly that in the list."
    solution: |
      def running_sums(nums):
          total = 0
          return [total := total + n for n in nums]

  - id: walrus-read-blocks-001
    concept: walrus-loops-comprehensions
    type: python-function
    difficulty: 4
    prompt: "Complete chunked(text, size): split the string into chunks of size characters using a while (chunk := ...) loop. Return a list of chunks; the last chunk may be shorter."
    starter: |
      def chunked(text, size):
          parts = []
          ...
          return parts
    cases:
      - call: "chunked('abcdef', 2)"
        expect: ["ab", "cd", "ef"]
      - call: "chunked('abcde', 2)"
        expect: ["ab", "cd", "e"]
      - call: "chunked('', 3)"
        expect: []
      - call: "chunked('xyz', 5)"
        expect: ["xyz"]
    hints:
      - "This is a read-until-empty loop: each iteration takes the first size characters and shifts the remaining text. An empty chunk is the stop signal."
      - "Write while (chunk := text[:size]): an empty string is falsy and ends the loop. In the body append chunk and trim text from the left."
      - "After appending a chunk do not forget text = text[size:], otherwise chunk never changes and the loop runs forever."
    solution: |
      def chunked(text, size):
          parts = []
          while (chunk := text[:size]):
              parts.append(chunk)
              text = text[size:]
          return parts
