exercises:
  - id: walrus-good-criterion-001
    concept: walrus-readability
    type: theory-quiz
    difficulty: 1
    prompt: "По какому критерию walrus оправдан?"
    choices:
      - id: a
        text: "Когда он убирает дублирование вычисления или повтор имени в соседних строках."
      - id: b
        text: "Всегда, когда удаётся уместить логику в одну строку вместо двух."
      - id: c
        text: "Только внутри циклов while, в других местах он запрещён."
      - id: d
        text: "Когда нужно присвоить значение сразу нескольким переменным."
    correct: [a]
    explanation: "Критерий один: walrus хорош, когда устраняет реальную проблему - второй вызов функции, забытое обновление переменной. Он плох, когда просто уплотняет и без того ясный код ценой того, что в одной точке происходит больше событий."
    variants:
      - prompt: "«Короче» и «понятнее» - это одно и то же для walrus?"
        choices:
          - id: a
            text: "Нет: строка, в которую втиснуты вычисление, присваивание и проверка, может читаться"
          - id: b
            text: "Да: чем меньше строк, тем понятнее код, поэтому walrus всегда улучшает читаемость."
          - id: c
            text: "Да, но только если в строке не больше одного walrus."
          - id: d
            text: "Нет: walrus вообще не влияет на длину кода."
        correct: [a]
        explanation: "Компактность и ясность - не синонимы. Зрелое владение walrus во многом сводится к умению не ставить его там, где он уплотняет код в ущерб читаемости."

  - id: walrus-antipattern-quiz-001
    concept: walrus-readability
    type: theory-quiz
    difficulty: 2
    prompt: "Какой из вариантов - анти-паттерн использования walrus?"
    choices:
      - id: a
        text: "print) с последующим использованием total - присваивание спрятано в аргумент."
      - id: b
        text: "while (chunk := read()): - возвращает условие выхода в заголовок while."
      - id: c
        text: "[y for x in data if (y := f(x)) > 0] - убирает второй вызов f."
      - id: d
        text: "if (n := len(items)) > 3: - проверка результата стоит рядом с вычислением."
    correct: [a]
    explanation: "В `print(total := sum(prices))` walrus не убрал ни одного повтора - `total` всё равно нужна отдельно. Присваивание спрятано в аргумент `print`, где взгляд его не ищет. Остальные варианты - уместное применение walrus."
    variants:
      - prompt: "Почему несколько := в одном выражении - сигнал тревоги?"
        choices:
          - id: a
            text: "Непонятно, в каком порядке связываются имена и что в итоге возвращается"
          - id: b
            text: "Python запрещает больше одного walrus в выражении - будет ошибка."
          - id: c
            text: "Несколько walrus замедляют выполнение в несколько раз."
          - id: d
            text: "Walrus-имена из такого выражения не сохраняются после строки."
        correct: [a]
        explanation: "Технически несколько `:=` разрешены, но один читатель ещё отслеживает, а два-три превращают строку в ребус. Если нужно три промежуточных имени - дайте им три обычные строки."

  - id: walrus-multi-predict-001
    concept: walrus-readability
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа? (это пример анти-паттерна - несколько walrus в строке)"
    snippet: |
      result = (a := 2) + (b := a * 3) + (c := b - 1)
      print(a, b, c, result)
    expected:
      kind: stdout
      value: "2 6 5 13"
    hints:
      - "Walrus вычисляются слева направо, и каждое имя сразу доступно следующему. Сначала найдите a, потом b через a, потом c через b."
      - "a = 2, затем b = a * 3 = 6, затем c = b - 1 = 5; result = 2 + 6 + 5."
    variants:
      - snippet: |
          result = (a := 4) + (b := a + 1) + (c := b * 2)
          print(a, b, c, result)
        expected:
          kind: stdout
          value: "4 5 10 19"
      - snippet: |
          result = (x := 10) - (y := x // 2) + (z := y - 3)
          print(x, y, z, result)
        expected:
          kind: stdout
          value: "10 5 2 7"

  - id: walrus-hidden-assign-001
    concept: walrus-readability
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      flag = False
      if (flag := True):
          print("ветка, flag теперь", flag)
      print("после:", flag)
    expected:
      kind: stdout
      value: |-
        ветка, flag теперь True
        после: True
    hints:
      - "Здесь walrus присваивает, а не сравнивает. Что окажется в flag после строки if?"
      - "(flag := True) связывает flag со значением True и возвращает True - условие истинно. Прежнее False затёрто."
    variants:
      - snippet: |
          status = "old"
          if (status := "new"):
              print("вошли, status =", status)
          print("итог:", status)
        expected:
          kind: stdout
          value: |-
            вошли, status = new
            итог: new
      - snippet: |
          count = 0
          if (count := 7):
              print("count внутри:", count)
          print("count снаружи:", count)
        expected:
          kind: stdout
          value: |-
            count внутри: 7
            count снаружи: 7

  - id: walrus-blanks-refactor-001
    concept: walrus-readability
    type: fill-in-blanks
    difficulty: 2
    prompt: "Перепишите анти-паттерн в ясную форму: вместо walrus, спрятанного в аргумент, сделайте явное присваивание отдельной строкой."
    template: |
      {{name}} = sum(prices)
      print({{name}})
    blanks:
      name:
        accept: ["total", "summa", "result", "s"]
        accept_regex: '^[a-zA-Z_][a-zA-Z0-9_]*$'
    hints:
      - "Когда значение всё равно нужно отдельно и рядом не проверяется, обычное = на своей строке яснее walrus в аргументе. Имя ставьте слева."
    variants:
      - template: |
          {{name}} = config.max_retries
          send(payload, retries={{name}})
        blanks:
          name:
            accept: ["limit", "retries", "max_retries", "n"]
            accept_regex: '^[a-zA-Z_][a-zA-Z0-9_]*$'
      - template: |
          {{name}} = len(items)
          print("элементов:", {{name}})
        blanks:
          name:
            accept: ["count", "n", "size", "length"]
            accept_regex: '^[a-zA-Z_][a-zA-Z0-9_]*$'

  - id: walrus-should-use-001
    concept: walrus-readability
    type: theory-quiz
    difficulty: 3
    prompt: "В каком из случаев замена двух строк на walrus улучшит код?"
    choices:
      - id: a
        text: "Когда значение вычисляется и тут же проверяется в условии, а второе вычисление можно убрать."
      - id: b
        text: "Когда значение присваивается и используется только на следующей строке без всякой проверки."
      - id: c
        text: "Когда в выражении уже есть два других walrus и нужно добавить третий."
      - id: d
        text: "Когда присваивание удобнее спрятать в аргумент вызова, чтобы строка стала короче."
    correct: [a]
    explanation: "Walrus окупается, когда вычисление и его проверка стоят рядом и он убирает повтор. Простое присваивание без проверки яснее обычным `=`; нагромождение walrus или спрятанное присваивание - анти-паттерны."
    hints:
      - "Вспомните единственный критерий: walrus должен убирать дубль или повтор имени, а не просто сокращать строки."
      - "Отсейте варианты, где walrus ничего не устраняет: простое присваивание, ещё один := к двум имеющимся, спрятанное в аргумент присваивание."

  - id: walrus-judge-refactor-001
    concept: walrus-readability
    type: python-function
    difficulty: 4
    prompt: "Допишите best_long(words): среди слов длиннее 3 символов верните самое длинное (первое из таких при равной длине); если подходящих нет, верните пустую строку. Walrus используйте уместно - чтобы не считать len дважды."
    starter: |
      def best_long(words):
          ...
    cases:
      - call: "best_long(['a', 'tree', 'house', 'ok'])"
        expect: "house"
      - call: "best_long(['hi', 'no', 'go'])"
        expect: ""
      - call: "best_long(['code', 'data', 'byte'])"
        expect: "code"
      - call: "best_long([])"
        expect: ""
      - call: "best_long(['abcd', 'abcde', 'abc'])"
        expect: "abcde"
    hints:
      - "Сначала отберите слова длиннее 3 символов, затем выберите из них самое длинное. Длина каждого слова нужна и для фильтра, и для выбора максимума."
      - "В comprehension можно отфильтровать через walrus: [w for w in words if (n := len(w)) > 3]. Из отобранных берите max по длине, сохраняя первое при равенстве."
      - "max(candidates, key=len) вернёт первое слово максимальной длины при равных длинах. Не забудьте про пустой список - тогда возвращайте пустую строку."
    solution: |
      def best_long(words):
          candidates = [w for w in words if (n := len(w)) > 3]
          if not candidates:
              return ""
          return max(candidates, key=len)
