exercises:
  - id: walrus-good-criterion-001
    concept: walrus-readability
    type: theory-quiz
    difficulty: 1
    prompt: "By what criterion is walrus justified?"
    choices:
      - id: a
        text: "When it removes duplicate computation or repeated names in neighboring lines."
      - id: b
        text: "Always when you can fit logic in one line instead of two."
      - id: c
        text: "Only inside while loops; elsewhere it is forbidden."
      - id: d
        text: "When you need to assign a value to several variables at once."
    correct: [a]
    explanation: "One criterion: walrus is good when it removes a real problem: a second function call, a forgotten variable update. It is bad when it merely compresses already clear code at the cost of more events in one place."
    variants:
      - prompt: "Are \"shorter\" and \"clearer\" the same thing for walrus?"
        choices:
          - id: a
            text: "No: a line squeezing in computation, assignment, and checking may read slower than two simple lines."
          - id: b
            text: "Yes: fewer lines always means clearer code, so walrus always improves readability."
          - id: c
            text: "Yes, but only if the line has at most one walrus."
          - id: d
            text: "No: walrus does not affect code length at all."
        correct: [a]
        explanation: "Compactness and clarity are not synonyms. Mature walrus use is largely knowing not to put it where it compresses code at the expense of readability."

  - id: walrus-antipattern-quiz-001
    concept: walrus-readability
    type: theory-quiz
    difficulty: 2
    prompt: "Which option is a walrus anti-pattern?"
    choices:
      - id: a
        text: "print(total := sum(prices)) with subsequent use of total: assignment hidden in an argument."
      - id: b
        text: "while (chunk := read()): returns the exit condition to the while header."
      - id: c
        text: "[y for x in data if (y := f(x)) > 0]: removes a second call to f."
      - id: d
        text: "if (n := len(items)) > 3: the result check sits next to the computation."
    correct: [a]
    explanation: "In `print(total := sum(prices))` the walrus removed no repetition: you still need `total` separately. Assignment is hidden in a `print` argument where the eye does not look for it. The other options are appropriate walrus use."
    variants:
      - prompt: "Why are several := in one expression a warning sign?"
        choices:
          - id: a
            text: "Unclear in what order names bind and what is returned: time to split the line."
          - id: b
            text: "Python forbids more than one walrus in an expression: you get an error."
          - id: c
            text: "Several walrus operators slow execution by several times."
          - id: d
            text: "Walrus names from such an expression are not preserved after the line."
        correct: [a]
        explanation: "Technically several `:=` are allowed, but one reader can still track them; two or three turn the line into a puzzle. If you need three intermediate names, give them three ordinary lines."

  - id: walrus-multi-predict-001
    concept: walrus-readability
    type: predict-output
    difficulty: 3
    prompt: "What does this program print? (This is an anti-pattern example: several walrus operators in one line.)"
    snippet: |
      result = (a := 2) + (b := a * 3) + (c := b - 1)
      print(a, b, c, result)
    expected:
      kind: stdout
      value: "2 6 5 13"
    hints:
      - "Walrus operators evaluate left to right, and each name is immediately available to the next. Find a first, then b via a, then c via b."
      - "a = 2, then b = a * 3 = 6, then c = b - 1 = 5; result = 2 + 6 + 5."
    variants:
      - snippet: |
          result = (a := 4) + (b := a + 1) + (c := b * 2)
          print(a, b, c, result)
        expected:
          kind: stdout
          value: "4 5 10 19"
      - snippet: |
          result = (x := 10) - (y := x // 2) + (z := y - 3)
          print(x, y, z, result)
        expected:
          kind: stdout
          value: "10 5 2 7"

  - id: walrus-hidden-assign-001
    concept: walrus-readability
    type: predict-output
    difficulty: 3
    prompt: "What does this program print?"
    snippet: |
      flag = False
      if (flag := True):
          print("branch, flag is now", flag)
      print("after:", flag)
    expected:
      kind: stdout
      value: |-
        branch, flag is now True
        after: True
    hints:
      - "Here walrus assigns, it does not compare. What ends up in flag after the if line?"
      - "(flag := True) binds flag to True and returns True: the condition is true. The previous False is overwritten."
    variants:
      - snippet: |
          status = "old"
          if (status := "new"):
              print("entered, status =", status)
          print("final:", status)
        expected:
          kind: stdout
          value: |-
            entered, status = new
            final: new
      - snippet: |
          count = 0
          if (count := 7):
              print("count inside:", count)
          print("count outside:", count)
        expected:
          kind: stdout
          value: |-
            count inside: 7
            count outside: 7

  - id: walrus-blanks-refactor-001
    concept: walrus-readability
    type: fill-in-blanks
    difficulty: 2
    prompt: "Rewrite the anti-pattern into a clear form: instead of walrus hidden in an argument, use explicit assignment on its own line."
    template: |
      {{name}} = sum(prices)
      print({{name}})
    blanks:
      name:
        accept: ["total", "summa", "result", "s"]
        accept_regex: '^[a-zA-Z_][a-zA-Z0-9_]*$'
    hints:
      - "When the value is needed separately anyway and is not checked nearby, ordinary = on its own line is clearer than walrus in an argument. Put the name on the left."
    variants:
      - template: |
          {{name}} = config.max_retries
          send(payload, retries={{name}})
        blanks:
          name:
            accept: ["limit", "retries", "max_retries", "n"]
            accept_regex: '^[a-zA-Z_][a-zA-Z0-9_]*$'
      - template: |
          {{name}} = len(items)
          print("items:", {{name}})
        blanks:
          name:
            accept: ["count", "n", "size", "length"]
            accept_regex: '^[a-zA-Z_][a-zA-Z0-9_]*$'

  - id: walrus-should-use-001
    concept: walrus-readability
    type: theory-quiz
    difficulty: 3
    prompt: "In which case does replacing two lines with walrus improve the code?"
    choices:
      - id: a
        text: "When a value is computed and immediately checked in a condition, and a second computation can be removed."
      - id: b
        text: "When a value is assigned and used only on the next line with no check."
      - id: c
        text: "When the expression already has two other walrus operators and you need a third."
      - id: d
        text: "When assignment is convenient to hide in a call argument to shorten the line."
    correct: [a]
    explanation: "Walrus pays off when computation and its check sit together and it removes repetition. Simple assignment without a check is clearer with ordinary `=`; stacking walrus or hidden assignment are anti-patterns."
    hints:
      - "Remember the single criterion: walrus should remove a duplicate or repeated name, not just shorten lines."
      - "Rule out cases where walrus removes nothing: simple assignment, another := on top of two existing ones, assignment hidden in an argument."

  - id: walrus-judge-refactor-001
    concept: walrus-readability
    type: python-function
    difficulty: 4
    prompt: "Complete best_long(words): among words longer than 3 characters return the longest (first among ties); if none qualify, return an empty string. Use walrus appropriately, and do not compute len twice."
    starter: |
      def best_long(words):
          ...
    cases:
      - call: "best_long(['a', 'tree', 'house', 'ok'])"
        expect: "house"
      - call: "best_long(['hi', 'no', 'go'])"
        expect: ""
      - call: "best_long(['code', 'data', 'byte'])"
        expect: "code"
      - call: "best_long([])"
        expect: ""
      - call: "best_long(['abcd', 'abcde', 'abc'])"
        expect: "abcde"
    hints:
      - "First filter words longer than 3 characters, then pick the longest among them. Each word's length is needed for both filter and max selection."
      - "In a comprehension you can filter via walrus: [w for w in words if (n := len(w)) > 3]. From the filtered set take max by length, keeping the first on ties."
      - "max(candidates, key=len) returns the first word of maximum length on ties. Do not forget the empty list: then return an empty string."
    solution: |
      def best_long(words):
          candidates = [w for w in words if (n := len(w)) > 3]
          if not candidates:
              return ""
          return max(candidates, key=len)
