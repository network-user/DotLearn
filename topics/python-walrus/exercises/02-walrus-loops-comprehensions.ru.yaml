exercises:
  - id: walrus-loop-why-001
    concept: walrus-loops-comprehensions
    type: theory-quiz
    difficulty: 1
    prompt: "Какую проблему классического цикла чтения решает while (chunk := read())?"
    choices:
      - id: a
        text: "Убирает дублирующее «первое чтение» до цикла и возвращает условие выхода в заголовок while."
      - id: b
        text: "Делает цикл быстрее, потому что walrus компилируется в более эффективный байт-код."
      - id: c
        text: "Позволяет читать данные сразу в несколько переменных за одну итерацию."
      - id: d
        text: "Автоматически закрывает источник данных после цикла."
    correct: [a]
    explanation: "Без walrus чтение приходится дублировать (одно до цикла, одно в конце тела) или городить `while True` с `break`. Walrus стягивает чтение и проверку в заголовок `while`, а тело получает готовый `chunk`."
    variants:
      - prompt: "Где находится условие выхода в цикле while (line := f.readline()) != \"\":?"
        choices:
          - id: a
            text: "В заголовке while - там и читается строка, и проверяется на пустоту."
          - id: b
            text: "Внутри тела цикла, через отдельный break."
          - id: c
            text: "Условие выхода вычисляется один раз до цикла."
          - id: d
            text: "Условие выхода Python подбирает автоматически по типу источника."
        correct: [a]
        explanation: "Весь смысл walrus в цикле чтения - вернуть условие выхода в заголовок. На каждой итерации сначала выполняется `line := f.readline()`, затем результат сравнивается с пустой строкой прямо в `while`."
      - prompt: "Что такое «сентинел» (sentinel) в контексте цикла чтения?"
        choices:
          - id: a
            text: "Специальное значение, означающее «данные закончились», например пустая строка для readline."
          - id: b
            text: "Счётчик итераций, который walrus увеличивает автоматически."
          - id: c
            text: "Имя переменной, в которую walrus складывает результат."
          - id: d
            text: "Поток-наблюдатель, который следит за завершением цикла."
        correct: [a]
        explanation: "Сентинел - это сигнальное значение конца данных: пустая строка для `readline`, пустые байты для `read`. Walrus особенно удобен с сентинелами: `while (x := read()) != sentinel`."

  - id: walrus-comp-order-001
    concept: walrus-loops-comprehensions
    type: theory-quiz
    difficulty: 2
    prompt: "В comprehension [y for x in data if (y := f(x)) > 0] - зачем здесь walrus?"
    choices:
      - id: a
        text: "Чтобы вызвать f(x) один раз и использовать результат и в фильтре if, и в выражении-значении слева."
      - id: b
        text: "Чтобы comprehension выполнялся параллельно по элементам data."
      - id: c
        text: "Чтобы переменная x стала доступна после comprehension."
      - id: d
        text: "Walrus здесь не нужен, он только мешает читаемости."
    correct: [a]
    explanation: "Без walrus пришлось бы звать `f(x)` дважды: в условии `if f(x) > 0` и в выражении слева. Walrus вычисляет `f(x)` один раз, кладёт в `y`, и `y` используется и в фильтре, и в результате."
    variants:
      - prompt: "Где должен стоять walrus в comprehension, чтобы сэкономить вызовы дорогой функции?"
        choices:
          - id: a
            text: "В части if: (y := f(x)) > 0, а готовое y - в выражении-значении слева."
          - id: b
            text: "В выражении-значении слева, а в if проверять f(x) заново."
          - id: c
            text: "В части for, рядом с x."
          - id: d
            text: "Порядок не важен - результат одинаков в любом случае."
        correct: [a]
        explanation: "Walrus должен стоять в `if`, чтобы связать `y` до использования слева. Если поставить `:=` слева, а в `if` проверять голую `f(x)`, экономии не будет - функция снова вызовется дважды."

  - id: walrus-read-loop-predict-001
    concept: walrus-loops-comprehensions
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      data = "abcdef"
      parts = []

      while (chunk := data[:2]):
          parts.append(chunk)
          data = data[2:]

      print(parts)
    expected:
      kind: stdout
      value: "['ab', 'cd', 'ef']"
    hints:
      - "Цикл откусывает по два символа, пока строка не опустеет. Пустая строка - ложна, на ней walrus и остановит цикл."
      - "Проследите итерации: сначала chunk = 'ab', затем 'cd', затем 'ef', потом data пуста и data[:2] даёт пустую строку."
    variants:
      - snippet: |
          data = "xyz123"
          parts = []

          while (chunk := data[:3]):
              parts.append(chunk)
              data = data[3:]

          print(parts)
        expected:
          kind: stdout
          value: "['xyz', '123']"
      - snippet: |
          data = "ab"
          parts = []

          while (chunk := data[:2]):
              parts.append(chunk)
              data = data[2:]

          print(len(parts))
        expected:
          kind: stdout
          value: "1"

  - id: walrus-comp-cache-predict-001
    concept: walrus-loops-comprehensions
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      def transform(x):
          return x * x - 1

      result = [y for x in range(6) if (y := transform(x)) > 0]
      print(result)
    expected:
      kind: stdout
      value: "[3, 8, 15, 24]"
    hints:
      - "Walrus в if кладёт transform(x) в y и сразу проверяет y > 0. В список попадает то же готовое y. Какие x дают положительный результат?"
      - "Посчитайте transform для x от 0 до 5: -1, 0, 3, 8, 15, 24. Условие > 0 отсекает первые два."
    variants:
      - snippet: |
          def transform(x):
              return x * 2 - 4

          result = [y for x in range(5) if (y := transform(x)) >= 0]
          print(result)
        expected:
          kind: stdout
          value: "[0, 2, 4]"
      - snippet: |
          def transform(x):
              return 10 - x * x

          result = [y for x in range(5) if (y := transform(x)) > 0]
          print(result)
        expected:
          kind: stdout
          value: "[10, 9, 6, 1]"

  - id: walrus-comp-leak-001
    concept: walrus-loops-comprehensions
    type: predict-output
    difficulty: 4
    prompt: "Что выведет эта программа?"
    snippet: |
      values = [y for x in range(4) if (y := x * 10) < 25]
      print(values)
      print(y)
    expected:
      kind: stdout
      value: |-
        [0, 10, 20]
        30
    hints:
      - "Сначала разберитесь со списком: для каждого x walrus кладёт x * 10 в y и проверяет y < 25. На каком x условие впервые ложно?"
      - "Имя счётчика x локально для comprehension, а вот walrus-имя y протекает в окружающую область. Какое значение y присвоено последним?"
      - "Последнее присваивание y происходит при x = 3 (это 30), там условие 30 < 25 ложно, элемент не попал в список, но y = 30 остался."

  - id: walrus-running-total-001
    concept: walrus-loops-comprehensions
    type: python-function
    difficulty: 3
    prompt: "Допишите running_sums(nums): верните список нарастающих сумм. Используйте walrus в comprehension, чтобы накапливать сумму во внешней переменной total."
    starter: |
      def running_sums(nums):
          total = 0
          ...
    cases:
      - call: "running_sums([1, 2, 3, 4])"
        expect: [1, 3, 6, 10]
      - call: "running_sums([10, -5, 5])"
        expect: [10, 5, 10]
      - call: "running_sums([])"
        expect: []
      - call: "running_sums([7])"
        expect: [7]
    hints:
      - "Walrus в comprehension может обновлять переменную, объявленную снаружи. На каждом шаге нужно прибавить элемент к total и положить новое значение в список."
      - "Выражение (total := total + n) и присваивает, и возвращает новую сумму - именно её и собирайте в список."
    solution: |
      def running_sums(nums):
          total = 0
          return [total := total + n for n in nums]

  - id: walrus-read-blocks-001
    concept: walrus-loops-comprehensions
    type: python-function
    difficulty: 4
    prompt: "Допишите chunked(text, size): разбейте строку на куски по size символов, читая её циклом while (chunk := ...). Верните список кусков; последний кусок может быть короче."
    starter: |
      def chunked(text, size):
          parts = []
          ...
          return parts
    cases:
      - call: "chunked('abcdef', 2)"
        expect: ["ab", "cd", "ef"]
      - call: "chunked('abcde', 2)"
        expect: ["ab", "cd", "e"]
      - call: "chunked('', 3)"
        expect: []
      - call: "chunked('xyz', 5)"
        expect: ["xyz"]
    hints:
      - "Это цикл чтения до опустошения: на каждой итерации откусываете первые size символов и сдвигаете оставшийся текст. Пустой кусок - сигнал остановиться."
      - "Запишите while (chunk := text[:size]): - пустая строка ложна и завершит цикл. Внутри тела добавьте chunk и обрежьте text слева."
      - "После добавления куска не забудьте text = text[size:], иначе chunk не изменится и цикл станет бесконечным."
    solution: |
      def chunked(text, size):
          parts = []
          while (chunk := text[:size]):
              parts.append(chunk)
              text = text[size:]
          return parts
