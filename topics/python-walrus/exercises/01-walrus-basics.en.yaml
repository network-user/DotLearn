exercises:
  - id: walrus-what-returns-001
    concept: walrus-basics
    type: theory-quiz
    difficulty: 1
    prompt: "How does walrus := differ from ordinary assignment =?"
    choices:
      - id: a
        text: "= is a statement with no value; := is an expression that returns the assigned result."
      - id: b
        text: "They mean the same thing: := is just shorter notation for =."
      - id: c
        text: ":= assigns a value but unlike = does not bind the name to a variable."
      - id: d
        text: "= works only with numbers; := works with any type."
    correct: [a]
    explanation: "`name = expr` binds the name and stops: the line has no value. `name := expr` binds the name and returns the same result as the value of the whole expression, so it can be nested in `if`, `while`, or a call."
    variants:
      - prompt: "What does the expression (n := len(\"abc\")) return?"
        choices:
          - id: a
            text: "The number 3, the same result assigned to the name n."
          - id: b
            text: "Nothing: assignment has no value."
          - id: c
            text: "The string \"abc\" whose length was counted."
          - id: d
            text: "The name n as a variable object."
        correct: [a]
        explanation: "The walrus evaluates `len(\"abc\")` (that is 3), binds `n`, and returns the same number outward. That is why the expression can go in a condition or arithmetic."
      - prompt: "Why is walrus := called an \"assignment expression\"?"
        choices:
          - id: a
            text: "Because it both assigns a name and is an expression with a value."
          - id: b
            text: "Because it can only be written inside assignment expressions using =."
          - id: c
            text: "Because it assigns a value to several names at once."
          - id: d
            text: "Because it expresses assignment in words rather than a symbol."
        correct: [a]
        explanation: "The name from PEP 572 describes it precisely: `:=` performs assignment (binds a name) but is itself an expression with a value (the assigned result)."

  - id: walrus-statement-error-001
    concept: walrus-basics
    type: theory-quiz
    difficulty: 2
    prompt: "What happens if you write walrus on its own line: x := 5?"
    choices:
      - id: a
        text: "Syntax error: walrus cannot be used as a standalone statement."
      - id: b
        text: "x becomes 5, same as ordinary assignment."
      - id: c
        text: "x becomes 5, but the value 5 is printed."
      - id: d
        text: "x stays undefined; there is no error."
    correct: [a]
    explanation: "A bare line `x := 5` is a syntax error. The walrus only makes sense where its returned value is needed (condition, argument, `while`). For assignment on its own line use ordinary `=`."
    variants:
      - prompt: "Which line is correct if you need to assign y the value 10 and check it in a condition?"
        choices:
          - id: a
            text: "if (y := 10) > 5: ..."
          - id: b
            text: "if y := 10 > 5: ... without parentheses"
          - id: c
            text: "if y = 10 > 5: ..."
          - id: d
            text: "y := 10 if y > 5: ..."
        correct: [a]
        explanation: "Parentheses around `(y := 10)` are required: they make the walrus obvious and unambiguous. Without them `y := 10 > 5` parses differently than you expect, and `=` in a condition is forbidden."

  - id: walrus-predict-parens-001
    concept: walrus-basics
    type: predict-output
    difficulty: 2
    prompt: "What does this program print?"
    snippet: |
      total = (subtotal := 100) + (tax := 20)
      print(subtotal, tax, total)
    expected:
      kind: stdout
      value: "100 20 120"
    hints:
      - "The walrus both binds a name and returns a value. What do subtotal and tax get, and what is total then?"
      - "Evaluate step by step: the left parenthesis gives 100, the right gives 20, then they are added."
    variants:
      - snippet: |
          result = (a := 5) * (b := 3)
          print(a, b, result)
        expected:
          kind: stdout
          value: "5 3 15"
      - snippet: |
          x = (y := 7) - (z := 2)
          print(y, z, x)
        expected:
          kind: stdout
          value: "7 2 5"

  - id: walrus-scope-survives-001
    concept: walrus-basics
    type: predict-output
    difficulty: 3
    prompt: "What does this program print?"
    snippet: |
      text = "walrus"

      if (n := len(text)) > 3:
          print("long:", n)

      print("outside:", n)
    expected:
      kind: stdout
      value: |-
        long: 6
        outside: 6
    hints:
      - "The walrus does not create a temporary scope. Think about where the name n lives after the condition runs."
      - "A name bound through := stays in the ordinary surrounding scope, so n is available inside if and after it."

  - id: walrus-fstring-001
    concept: walrus-basics
    type: predict-output
    difficulty: 3
    prompt: "What does this program print?"
    snippet: |
      print(f"square: {(s := 4 ** 2)}")
      print(s + 1)
    expected:
      kind: stdout
      value: |-
        square: 16
        17
    hints:
      - "You can put walrus even inside an f-string: the expression evaluates, the name binds, the result is substituted. What lands in s?"
      - "A variable bound by walrus inside an f-string survives the string and is available on the next line. What is 4 ** 2?"

  - id: walrus-cache-len-001
    concept: walrus-basics
    type: python-function
    difficulty: 2
    prompt: "Complete describe(items): if the list has more than 3 elements, return a string like \"many: N\" (N is the length), otherwise \"few: N\". Compute the length exactly once with walrus in the condition."
    starter: |
      def describe(items):
          ...
    cases:
      - call: "describe([1, 2, 3, 4, 5])"
        expect: "many: 5"
      - call: "describe([1, 2])"
        expect: "few: 2"
      - call: "describe([])"
        expect: "few: 0"
      - call: "describe([10, 20, 30])"
        expect: "few: 3"
    hints:
      - "You need the length in both the check and the returned string. Walrus in an if condition lets you compute it once and reuse it."
      - "Write if (n := len(items)) > 3, then use the ready n in both branches."
    solution: |
      def describe(items):
          if (n := len(items)) > 3:
              return f"many: {n}"
          return f"few: {n}"
    variants:
      - prompt: "Complete summarize(prices): if the sum of prices is greater than 100, return a string like \"expensive: S\" (S is the sum), otherwise \"cheap: S\". Compute the sum exactly once with walrus in the condition."
        starter: |
          def summarize(prices):
              ...
        cases:
          - call: "summarize([60, 50, 30])"
            expect: "expensive: 140"
          - call: "summarize([10, 20])"
            expect: "cheap: 30"
          - call: "summarize([])"
            expect: "cheap: 0"
          - call: "summarize([100])"
            expect: "cheap: 100"
          - call: "summarize([200])"
            expect: "expensive: 200"
        solution: |
          def summarize(prices):
              if (total := sum(prices)) > 100:
                  return f"expensive: {total}"
              return f"cheap: {total}"
      - prompt: "Complete label(word): if the word length is at least 5, return a string like \"long: N\" (N is the length), otherwise \"short: N\". Compute the length exactly once with walrus in the condition."
        starter: |
          def label(word):
              ...
        cases:
          - call: "label('python')"
            expect: "long: 6"
          - call: "label('ok')"
            expect: "short: 2"
          - call: "label('')"
            expect: "short: 0"
          - call: "label('hello')"
            expect: "long: 5"
          - call: "label('hi')"
            expect: "short: 2"
        solution: |
          def label(word):
              if (n := len(word)) >= 5:
                  return f"long: {n}"
              return f"short: {n}"

  - id: walrus-collect-blanks-001
    concept: walrus-basics
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the assignment expression: variable step should get the computed result and be checked immediately in the condition."
    template: |
      if (step {{op}} compute()) > 0:
          print(step)
    blanks:
      op:
        accept: [":="]
        accept_regex: '^:=$'
    hints:
      - "You need an operator that both assigns the name step and returns a value into the condition. Ordinary = is not allowed here."
    variants:
      - template: |
          while ({{name}} := source.read()):
              process({{name}})
        blanks:
          name:
            accept: ["chunk", "data", "block", "item", "line"]
            accept_regex: '^[a-zA-Z_][a-zA-Z0-9_]*$'
      - template: |
          numbers = [1, 2, 3]
          if ({{var}} := len(numbers)) == 3:
              print({{var}})
        blanks:
          var:
            accept: ["count", "n", "size", "length"]
            accept_regex: '^[a-zA-Z_][a-zA-Z0-9_]*$'

  - id: walrus-two-into-one-001
    concept: walrus-basics
    type: python-function
    difficulty: 4
    prompt: "Rewrite the check so compute() is called exactly once. Complete check(seed): compute value = seed * seed - 4 with walrus in the condition; if value is positive, return value, otherwise return 0."
    starter: |
      def check(seed):
          ...
    cases:
      - call: "check(3)"
        expect: 5
      - call: "check(2)"
        expect: 0
      - call: "check(1)"
        expect: 0
      - call: "check(5)"
        expect: 21
      - call: "check(0)"
        expect: 0
    hints:
      - "You need the same value for both the sign check and the return. Walrus in the condition binds it once."
      - "Write if (value := seed * seed - 4) > 0 and return the ready value from the body, else 0."
      - "Edge case: at seed = 2 the expression is exactly 0, and since 0 is not greater than 0, return 0."
    solution: |
      def check(seed):
          if (value := seed * seed - 4) > 0:
              return value
          return 0
