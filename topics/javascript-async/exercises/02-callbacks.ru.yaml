exercises:
  - id: callbacks-what-quiz-001
    concept: callbacks
    type: theory-quiz
    difficulty: 1
    prompt: 'Что такое callback в JavaScript?'
    choices:
      - id: a
        text: 'Функция, которую передают в другую функцию, чтобы её вызвали позже.'
      - id: b
        text: 'Специальный тип объекта для хранения ошибок.'
      - id: c
        text: 'Команда, которая останавливает выполнение программы.'
    correct: [a]
    explanation: 'Колбэк передают как значение, а вызывающая сторона решает, когда его вызвать, например когда завершится асинхронная работа.'
    hints:
      - 'Вспомните, что вы передавали в setTimeout первым аргументом.'
    variants:
      - prompt: 'Что по соглашению error-first означает первый аргумент колбэка вида (err, result)?'
        choices:
          - id: a
            text: 'Ошибку, если она случилась, иначе null.'
          - id: b
            text: 'Всегда текст сообщения.'
          - id: c
            text: 'Результат операции.'
        correct: [a]
        explanation: 'В error-first колбэках первым идёт ошибка, поэтому проверку if (err) делают в самом начале.'
      - prompt: 'Что называют callback hell?'
        choices:
          - id: a
            text: 'Глубокую вложенность колбэков в колбэках, которую трудно читать и поддерживать.'
          - id: b
            text: 'Ошибку, когда колбэк ни разу не вызван.'
          - id: c
            text: 'Ситуацию, когда колбэк выполняется синхронно.'
        correct: [a]
        explanation: 'Каждый следующий асинхронный шаг добавляет уровень вложенности, и код уезжает лесенкой вправо.'

  - id: callbacks-errorfirst-blanks-001
    concept: callbacks
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Допишите error-first колбэк: сначала проверьте ошибку, затем используйте результат.'
    template: |
      function handle(err, result) {
        if ({{cond}}) {
          console.log('ошибка');
          return;
        }
        console.log({{value}});
      }
    blanks:
      cond:
        accept: ['err']
      value:
        accept: ['result']
    explanation: 'В error-first колбэке первым делом проверяют err и выходят при ошибке, а нормальный результат читают только после этой проверки.'
    hints:
      - 'Какой из двух аргументов сигнализирует, что что-то пошло не так?'
    variants:
      - prompt: 'Допишите error-first колбэк загрузки данных.'
        template: |
          function done(error, data) {
            if ({{cond}}) {
              console.log('не удалось');
              return;
            }
            console.log({{value}});
          }
        blanks:
          cond:
            accept: ['error']
          value:
            accept: ['data']
      - prompt: 'Допишите колбэк, который печатает имя пользователя после проверки ошибки.'
        template: |
          function onLoad(err, user) {
            if ({{cond}}) {
              return;
            }
            console.log({{value}}.name);
          }
        blanks:
          cond:
            accept: ['err']
          value:
            accept: ['user']

  - id: callbacks-runall-001
    concept: callbacks
    type: predict-output
    difficulty: 2
    prompt: 'runAll применяет каждую функцию из массива к значению. Что напечатает console.log?'
    snippet: |
      const runAll = (value, callbacks) => {
        return callbacks.map((cb) => cb(value));
      };
      console.log(runAll(5, [(x) => x + 1, (x) => x * 2]).join(','));
    expected:
      kind: stdout
      value: |-
        6,10
    explanation: 'map применяет к значению 5 обе функции по очереди: 5 + 1 = 6 и 5 * 2 = 10. Получается массив [6, 10], а join(",") склеивает его в строку «6,10».'
    hints:
      - 'У вас одно значение и список функций: map применяет каждую функцию к этому значению.'
      - 'Соберите массив результатов в уме, затем склейте его через запятую.'
    variants:
      - prompt: 'Функции превращают строку в её длину и верхний регистр. Что напечатает console.log?'
        snippet: |
          const runAll = (value, callbacks) => {
            return callbacks.map((cb) => cb(value));
          };
          console.log(runAll('Анна', [(s) => s.length, (s) => s.toUpperCase()]).join(','));
        expected:
          kind: stdout
          value: |-
            4,АННА
      - prompt: 'Что напечатает console.log?'
        snippet: |
          const runAll = (value, callbacks) => {
            return callbacks.map((cb) => cb(value));
          };
          console.log(runAll(10, [(x) => x - 5, (x) => x / 2]).join(','));
        expected:
          kind: stdout
          value: |-
            5,5

  - id: callbacks-nested-predict-001
    concept: callbacks
    type: predict-output
    difficulty: 3
    prompt: 'Каждый шаг ставит следующий из своего колбэка. В каком порядке пойдёт вывод?'
    snippet: |
      function step(name, next) {
        setTimeout(() => {
          console.log(name);
          next();
        }, 0);
      }
      console.log('старт');
      step('шаг 1', () => {
        step('шаг 2', () => {
          console.log('готово');
        });
      });
      console.log('конец');
    expected:
      kind: stdout
      value: |-
        старт
        конец
        шаг 1
        шаг 2
        готово
    explanation: 'Синхронные «старт» и «конец» печатаются первыми. Затем срабатывает таймер первого шага и печатает «шаг 1», его колбэк ставит второй таймер, тот печатает «шаг 2» и вызывает последний колбэк с «готово». Каждый шаг ждёт своей макрозадачи.'
    hints:
      - 'setTimeout только откладывает колбэк, поэтому весь синхронный код проходит раньше любого шага.'
      - 'Колбэк следующего шага ставится не сразу, а только когда выполнится предыдущий таймер.'
