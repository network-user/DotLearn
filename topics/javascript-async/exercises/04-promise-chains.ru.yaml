exercises:
  - id: chains-then-quiz-001
    concept: promise-chains
    type: theory-quiz
    difficulty: 1
    prompt: 'Что возвращает вызов then, позволяя ставить then друг за другом?'
    choices:
      - id: a
        text: 'Новый промис.'
      - id: b
        text: 'Исходный промис без изменений.'
      - id: c
        text: 'Значение, переданное в колбэк.'
    correct: [a]
    explanation: 'Каждый then возвращает новый промис, поэтому к нему снова можно применить then, catch или finally.'
    hints:
      - 'Почему за одним then можно поставить ещё один then?'
    variants:
      - prompt: 'Куда попадёт ошибка, если внутри then бросить исключение?'
        choices:
          - id: a
            text: 'В ближайший следующий catch, минуя промежуточные then.'
          - id: b
            text: 'В предыдущий then.'
          - id: c
            text: 'Программа сразу упадёт без возможности обработки.'
        correct: [a]
        explanation: 'Ошибка проскакивает обработчики успеха и ищет ближайший catch дальше по цепочке.'
      - prompt: 'Что произойдёт, если забыть вернуть значение из then?'
        choices:
          - id: a
            text: 'Следующий then получит undefined и не дождётся асинхронной работы.'
          - id: b
            text: 'Цепочка немедленно остановится с ошибкой.'
          - id: c
            text: 'Значение вернётся само, ничего не сломается.'
        correct: [a]
        explanation: 'Без return в следующий then уходит undefined, а если вы забыли вернуть промис, цепочка не станет его ждать.'

  - id: chains-shape-blanks-001
    concept: promise-chains
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Допишите цепочку: удвойте значение, напечатайте его, а ошибки поймайте в конце.'
    template: |
      Promise.resolve(21)
        .{{step}}((x) => x * 2)
        .then((x) => console.log(x))
        .{{handle}}((error) => console.log(error));
    blanks:
      step:
        accept: ['then']
      handle:
        accept: ['catch']
    explanation: 'Шаги преобразования вешают через then, а единый обработчик ошибок ставят в конце через catch.'
    hints:
      - 'Каким методом добавляют шаг преобразования, а каким ловят ошибку всей цепочки?'
    variants:
      - prompt: 'Допишите цепочку из двух шагов, которая ловит ошибку любого из них.'
        template: |
          loadUser()
            .{{step}}((user) => loadOrders(user.id))
            .then((orders) => console.log(orders.length))
            .{{handle}}((error) => console.log('сбой'));
        blanks:
          step:
            accept: ['then']
          handle:
            accept: ['catch']
      - prompt: 'Допишите цепочку с завершающим шагом, который выполняется в любом случае.'
        template: |
          fetchData()
            .{{ok}}((data) => console.log(data))
            .catch((error) => console.log('ошибка'))
            .{{last}}(() => console.log('готово'));
        blanks:
          ok:
            accept: ['then']
          last:
            accept: ['finally']

  - id: chains-flow-predict-001
    concept: promise-chains
    type: predict-output
    difficulty: 2
    prompt: 'Значение проходит через цепочку then. Что напечатается?'
    snippet: |
      Promise.resolve(2)
        .then((x) => x + 3)
        .then((x) => console.log(x));
    expected:
      kind: stdout
      value: |-
        5
    explanation: 'Первый then возвращает 2 + 3 = 5, это значение приходит во второй then, который его печатает.'
    hints:
      - 'То, что вы вернули из then, становится аргументом следующего then.'
    variants:
      - prompt: 'Ошибка проскакивает then и падает в catch. Что напечатается?'
        snippet: |
          Promise.resolve()
            .then(() => {
              throw new Error('плохо');
            })
            .then(() => console.log('этот then пропущен'))
            .catch((e) => console.log('поймали: ' + e.message));
        expected:
          kind: stdout
          value: |-
            поймали: плохо
      - prompt: 'Значение проходит три шага подряд. Что напечатается?'
        snippet: |
          Promise.resolve(10)
            .then((x) => x * 2)
            .then((x) => x - 5)
            .then((x) => console.log(x));
        expected:
          kind: stdout
          value: |-
            15

  - id: chains-divide-001
    concept: promise-chains
    type: predict-output
    difficulty: 4
    prompt: 'Ошибка из then проскакивает в catch, а таймер ждёт своей очереди. В каком порядке пойдёт вывод?'
    snippet: |
      const divideChain = (a, b) => {
        return Promise.resolve()
          .then(() => {
            if (b === 0) {
              throw new Error('деление на ноль');
            }
            return a / b;
          })
          .catch(() => -1);
      };
      console.log('старт');
      setTimeout(() => console.log('таймер'), 0);
      divideChain(9, 0).then((result) => console.log('результат ' + result));
      console.log('конец');
    expected:
      kind: stdout
      value: |-
        старт
        конец
        результат -1
        таймер
    explanation: 'Синхронные «старт» и «конец» идут первыми. Вся цепочка промисов (then бросает ошибку при b === 0, catch ловит её и подставляет -1, затем срабатывает внешний then) состоит из микрозадач, поэтому «результат -1» печатается раньше, чем макрозадача таймера. «таймер» идёт последним.'
    hints:
      - 'Сначала весь синхронный код, потом очередь микрозадач до дна, и лишь потом макрозадача таймера.'
      - 'Брошенная в then ошибка проскакивает в catch: тот возвращает -1, и это значение доходит до внешнего then.'
