exercises:
  - id: pitfalls-forgotawait-quiz-001
    concept: pitfalls
    type: theory-quiz
    difficulty: 1
    prompt: 'Что вы получите, если вызвать async-функцию и забыть await?'
    choices:
      - id: a
        text: 'Промис вместо значения.'
      - id: b
        text: 'Готовое разрешённое значение.'
      - id: c
        text: 'Ошибку компиляции.'
    correct: [a]
    explanation: 'Без await переменная держит сам промис, а не его значение. Дальнейшая логика начинает работать с объектом-промисом, а не с ожидаемым числом или строкой.'
    hints:
      - 'Что именно возвращает async-функция сама по себе, без await?'
    variants:
      - prompt: 'Почему забытый await в условии if часто не даёт явной ошибки?'
        choices:
          - id: a
            text: 'Промис это объект, а любой объект в условии считается истинным.'
          - id: b
            text: 'JavaScript автоматически дожидается промиса в if.'
          - id: c
            text: 'Условие с промисом всегда ложно.'
        correct: [a]
        explanation: 'Промис-объект всегда правдив, поэтому ветка if срабатывает независимо от того, каким значением он в итоге осядет.'
      - prompt: 'Что такое race condition (гонка) в асинхронном коде?'
        choices:
          - id: a
            text: 'Зависимость результата от того, какая из асинхронных операций завершится первой.'
          - id: b
            text: 'Слишком быстрый синхронный цикл.'
          - id: c
            text: 'Синтаксическая ошибка внутри промиса.'
        correct: [a]
        explanation: 'При гонке порядок ответов не гарантирован, и поздний ответ на старый запрос может затереть свежий результат.'

  - id: pitfalls-fix-blanks-001
    concept: pitfalls
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Допишите: не забудьте await, чтобы получить значение, и завершите вызов обработкой ошибки.'
    template: |
      const load = async () => {
        const user = {{kw}} getUser();
        return user.name;
      };

      load().{{handle}}((error) => console.log('сбой'));
    blanks:
      kw:
        accept: ['await']
      handle:
        accept: ['catch']
    explanation: 'await разворачивает значение промиса, а catch в конце не даёт возможной ошибке потеряться.'
    hints:
      - 'Одно слово нужно перед промисом, другой метод завершает цепочку и ловит ошибку.'
    variants:
      - prompt: 'Допишите: дождитесь данных и завершите цепочку обработкой ошибки.'
        template: |
          const run = async () => {
            const data = {{kw}} fetchData();
            console.log(data);
          };

          run().{{handle}}((error) => console.log(error));
        blanks:
          kw:
            accept: ['await']
          handle:
            accept: ['catch']
      - prompt: 'Допишите обработку отклонения, чтобы ошибка промиса не потерялась.'
        template: |
          risky()
            .{{ok}}((value) => console.log(value))
            .{{handle}}((error) => console.log('поймали'));
        blanks:
          ok:
            accept: ['then']
          handle:
            accept: ['catch']

  - id: pitfalls-forgotawait-predict-001
    concept: pitfalls
    type: predict-output
    difficulty: 2
    prompt: 'await забыт, переменная держит промис. Что напечатается?'
    snippet: |
      async function getValue() {
        return 5;
      }
      const result = getValue();
      console.log(typeof result);
      console.log(result instanceof Promise);
    expected:
      kind: stdout
      value: |-
        object
        true
    explanation: 'getValue возвращает промис. Без await result это объект-промис: typeof показывает object, а проверка instanceof Promise даёт true. Значения 5 здесь ещё нет.'
    hints:
      - 'Что окажется в переменной, если async-функцию вызвать без await?'
    variants:
      - prompt: 'Промис в условии всегда истинный. Что напечатается?'
        snippet: |
          async function check() {
            return false;
          }
          const answer = check();
          if (answer) {
            console.log('условие истинно');
          } else {
            console.log('условие ложно');
          }
        expected:
          kind: stdout
          value: |-
            условие истинно
      - prompt: 'Одно значение получено с await, другое забыто. Что напечатается?'
        snippet: |
          async function getPrice() {
            return 100;
          }
          async function main() {
            const price = await getPrice();
            console.log(price + 50);
            const forgot = getPrice();
            console.log(forgot === undefined);
          }
          main();
        expected:
          kind: stdout
          value: |-
            150
            false

  - id: pitfalls-settledvalue-001
    concept: pitfalls
    type: javascript-function
    difficulty: 3
    prompt: 'Реализуйте async-функцию settledValue(promise): верните разрешённое значение промиса, а если промис отклонён, не дайте ошибке утечь и верните строку «ошибка».'
    starter: |
      const settledValue = async (promise) => {

      };
    cases:
      - call: 'settledValue(Promise.resolve(7))'
        expect: 7
      - call: "settledValue(Promise.reject(new Error('x')))"
        expect: 'ошибка'
      - call: "settledValue(Promise.resolve('ok'))"
        expect: 'ok'
    hints:
      - 'Необработанный reject тихо теряется: оберните await в try/catch, чтобы перехватить его.'
      - 'В блоке catch верните строку «ошибка» вместо того, чтобы позволить исключению уйти наружу.'
    solution: |
      const settledValue = async (promise) => {
        try {
          return await promise;
        } catch (error) {
          return 'ошибка';
        }
      };
