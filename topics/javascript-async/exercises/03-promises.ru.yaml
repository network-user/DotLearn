exercises:
  - id: promises-settle-quiz-001
    concept: promises
    type: theory-quiz
    difficulty: 1
    prompt: 'Сколько раз промис может изменить своё состояние (settle)?'
    choices:
      - id: a
        text: 'Ровно один раз: из pending в fulfilled или в rejected.'
      - id: b
        text: 'Сколько угодно раз, туда и обратно.'
      - id: c
        text: 'Два раза: сначала fulfilled, потом rejected.'
    correct: [a]
    explanation: 'Промис оседает однажды и навсегда. После первого resolve или reject состояние и значение больше не меняются.'
    hints:
      - 'Вспомните образ квитанции: заказ либо выдан, либо отменён, но не то и другое.'
    variants:
      - prompt: 'В каком состоянии находится промис сразу после new Promise, пока не вызван resolve или reject?'
        choices:
          - id: a
            text: 'pending.'
          - id: b
            text: 'fulfilled.'
          - id: c
            text: 'rejected.'
        correct: [a]
        explanation: 'Новый промис начинает жизнь в состоянии ожидания и переходит дальше, только когда executor вызовет resolve или reject.'
      - prompt: 'Что делает метод then у промиса?'
        choices:
          - id: a
            text: 'Регистрирует колбэк, который получит значение, когда промис успешно осядет.'
          - id: b
            text: 'Немедленно возвращает значение промиса.'
          - id: c
            text: 'Отменяет промис.'
        correct: [a]
        explanation: 'then не забирает значение сразу: он оставляет колбэк, который вызовут позже, когда значение будет готово.'

  - id: promises-create-blanks-001
    concept: promises
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Допишите промис, который сразу разрешается значением 42.'
    template: |
      const ready = new {{ctor}}((resolve) => {
        {{call}}(42);
      });
    blanks:
      ctor:
        accept: ['Promise']
      call:
        accept: ['resolve']
    explanation: 'Промис создают через new Promise, а перевод в состояние fulfilled со значением выполняет resolve.'
    hints:
      - 'Какая функция переводит промис в успешное состояние и передаёт значение?'
    variants:
      - prompt: 'Допишите промис, который отклоняется с сообщением «сбой».'
        template: |
          const failed = new {{ctor}}((resolve, reject) => {
            {{call}}('сбой');
          });
        blanks:
          ctor:
            accept: ['Promise']
          call:
            accept: ['reject']
      - prompt: 'Допишите потребление промиса: заберите значение и обработайте ошибку.'
        template: |
          ready
            .{{ok}}((value) => console.log(value))
            .{{fail}}((error) => console.log(error));
        blanks:
          ok:
            accept: ['then']
          fail:
            accept: ['catch']

  - id: promises-executor-predict-001
    concept: promises
    type: predict-output
    difficulty: 2
    prompt: 'Executor выполняется синхронно, а колбэк then асинхронно. В каком порядке пойдёт вывод?'
    snippet: |
      console.log('до');
      const p = new Promise((resolve) => {
        console.log('внутри executor');
        resolve('значение');
      });
      console.log('после');
      p.then((v) => console.log(v));
    expected:
      kind: stdout
      value: |-
        до
        внутри executor
        после
        значение
    explanation: 'Тело executor выполняется сразу при создании промиса, поэтому «внутри executor» печатается между «до» и «после». А колбэк then откладывается как микрозадача и печатает «значение» после всего синхронного кода.'
    hints:
      - 'Разделите код на синхронную часть (executor и обычные строки) и отложенную (колбэк then).'
    variants:
      - prompt: 'Executor продолжает работать после resolve. В каком порядке пойдёт вывод?'
        snippet: |
          console.log('старт');
          new Promise((resolve) => {
            resolve(1);
            console.log('executor дальше');
          }).then((v) => console.log('then ' + v));
          console.log('конец');
        expected:
          kind: stdout
          value: |-
            старт
            executor дальше
            конец
            then 1
      - prompt: 'Промис оседает один раз. В каком порядке пойдёт вывод?'
        snippet: |
          const p = new Promise((resolve, reject) => {
            resolve('первый');
            resolve('второй');
            reject('ошибка');
          });
          p.then((v) => console.log(v));
          p.catch((e) => console.log('поймали ' + e));
        expected:
          kind: stdout
          value: |-
            первый

  - id: promises-delayedsum-001
    concept: promises
    type: predict-output
    difficulty: 3
    prompt: 'delayedSum откладывает разрешение промиса через setTimeout. В каком порядке пойдёт вывод?'
    snippet: |
      const delayedSum = (a, b) => {
        return new Promise((resolve) => {
          setTimeout(() => resolve(a + b), 0);
        });
      };
      console.log('старт');
      delayedSum(2, 3).then((sum) => console.log('сумма ' + sum));
      console.log('конец');
    expected:
      kind: stdout
      value: |-
        старт
        конец
        сумма 5
    explanation: 'Синхронные «старт» и «конец» печатаются первыми. resolve вызывается внутри setTimeout, то есть в макрозадаче, поэтому колбэк then со «сумма 5» срабатывает только после всего синхронного кода, когда таймер отдаст значение 5.'
    hints:
      - 'Разделите код на синхронную часть и то, что откладывает setTimeout.'
      - 'resolve спрятан внутри setTimeout: колбэк then не может сработать раньше, чем таймер вызовет resolve.'
