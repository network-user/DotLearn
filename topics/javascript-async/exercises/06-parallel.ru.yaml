exercises:
  - id: parallel-all-quiz-001
    concept: parallel
    type: theory-quiz
    difficulty: 1
    prompt: 'Что делает Promise.all, если один из промисов отклоняется?'
    choices:
      - id: a
        text: 'Немедленно отклоняется с этой ошибкой, не дожидаясь остальных (fail-fast).'
      - id: b
        text: 'Дожидается остальных и возвращает их результаты без упавшего.'
      - id: c
        text: 'Игнорирует ошибку и возвращает undefined на её месте.'
    correct: [a]
    explanation: 'Promise.all падает на первой же ошибке. Остальные промисы при этом не отменяются, но их результаты уже никого не ждут.'
    hints:
      - 'all успешен, только если успешны все: что логично сделать при первой ошибке?'
    variants:
      - prompt: 'Чем Promise.allSettled отличается от Promise.all?'
        choices:
          - id: a
            text: 'Ждёт все промисы и никогда не отклоняется, возвращая статус каждого.'
          - id: b
            text: 'Работает быстрее, потому что не ждёт медленные промисы.'
          - id: c
            text: 'Возвращает только успешные значения, отбрасывая упавшие.'
        correct: [a]
        explanation: 'allSettled собирает исход каждого промиса как fulfilled или rejected и никогда не падает целиком.'
      - prompt: 'Чем Promise.any отличается от Promise.race?'
        choices:
          - id: a
            text: 'any ждёт первый успешный, а race реагирует на первый оседающий, включая ошибку.'
          - id: b
            text: 'Они делают абсолютно одно и то же.'
          - id: c
            text: 'any всегда медленнее race.'
        correct: [a]
        explanation: 'race оседает по первому же промису, даже если тот упал; any ждёт первый успех и падает лишь когда упали все.'

  - id: parallel-methods-blanks-001
    concept: parallel
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Допишите: дождитесь всех промисов сразу и отдельно возьмите первый оседающий.'
    template: |
      const everything = await Promise.{{m1}}([loadA(), loadB()]);
      const first = await Promise.{{m2}}([loadA(), loadB()]);
    blanks:
      m1:
        accept: ['all']
      m2:
        accept: ['race']
    explanation: 'all собирает результаты всех промисов, race оседает по первому же из них.'
    hints:
      - 'Один метод ждёт всех до единого, другой реагирует на самый быстрый.'
    variants:
      - prompt: 'Допишите: соберите исход всех промисов и первый успешный из них.'
        template: |
          const settled = await Promise.{{m1}}([loadA(), loadB()]);
          const firstOk = await Promise.{{m2}}([loadA(), loadB()]);
        blanks:
          m1:
            accept: ['allSettled']
          m2:
            accept: ['any']
      - prompt: 'Допишите: гонку запроса с таймаутом и сбор всех результатов.'
        template: |
          const result = await Promise.{{m1}}([request(), timeout(5000)]);
          const both = await Promise.{{m2}}([request(), backup()]);
        blanks:
          m1:
            accept: ['race']
          m2:
            accept: ['all']

  - id: parallel-all-predict-001
    concept: parallel
    type: predict-output
    difficulty: 2
    prompt: 'Promise.all сохраняет порядок аргументов. Что напечатается?'
    snippet: |
      Promise.all([Promise.resolve('a'), Promise.resolve('b'), Promise.resolve('c')])
        .then((values) => console.log(values.join('-')));
      console.log('запущено');
    expected:
      kind: stdout
      value: |-
        запущено
        a-b-c
    explanation: 'Синхронная строка «запущено» печатается первой. Затем Promise.all собирает результаты в порядке аргументов, поэтому получается «a-b-c», а не порядок завершения.'
    hints:
      - 'Сначала весь синхронный код, потом колбэк then. Порядок в массиве повторяет порядок аргументов all.'
    variants:
      - prompt: 'allSettled сообщает статус каждого промиса. Что напечатается?'
        snippet: |
          Promise.allSettled([Promise.resolve(1), Promise.reject('err')])
            .then((results) => {
              console.log(results[0].status);
              console.log(results[1].status);
            });
        expected:
          kind: stdout
          value: |-
            fulfilled
            rejected
      - prompt: 'Promise.all падает на первой ошибке. Что напечатается?'
        snippet: |
          Promise.all([Promise.resolve(1), Promise.reject('плохо'), Promise.resolve(3)])
            .then((values) => console.log('успех'))
            .catch((error) => console.log('ошибка: ' + error));
        expected:
          kind: stdout
          value: |-
            ошибка: плохо

  - id: parallel-sumall-001
    concept: parallel
    type: javascript-function
    difficulty: 3
    prompt: 'Реализуйте async-функцию sumAll(promises): дождитесь всех промисов из массива одновременно через Promise.all и верните сумму их значений.'
    starter: |
      const sumAll = async (promises) => {

      };
    cases:
      - call: 'sumAll([Promise.resolve(1), Promise.resolve(2), Promise.resolve(3)])'
        expect: 6
      - call: 'sumAll([Promise.resolve(10)])'
        expect: 10
      - call: 'sumAll([])'
        expect: 0
    hints:
      - 'Сначала соберите массив значений через await Promise.all, а суммируйте уже обычный массив.'
      - 'Для пустого массива Promise.all даёт пустой массив, а его сумма равна нулю.'
    solution: |
      const sumAll = async (promises) => {
        const values = await Promise.all(promises);
        return values.reduce((acc, x) => acc + x, 0);
      };

  - id: parallel-firstsuccess-001
    concept: parallel
    type: javascript-function
    difficulty: 5
    prompt: 'Реализуйте async-функцию firstSuccess(promises, fallback): верните значение первого успешно оседающего промиса через Promise.any; если все отклонены, верните fallback.'
    starter: |
      const firstSuccess = async (promises, fallback) => {

      };
    cases:
      - call: "firstSuccess([Promise.reject(1), Promise.resolve('ok'), Promise.reject(2)], 'нет')"
        expect: 'ok'
      - call: "firstSuccess([Promise.reject(1), Promise.reject(2)], 'нет')"
        expect: 'нет'
      - call: "firstSuccess([Promise.resolve('Москва')], 'нет')"
        expect: 'Москва'
    hints:
      - 'Promise.any оседает первым успешным промисом и игнорирует упавшие, пока есть надежда на успех.'
      - 'Когда все промисы отклонены, Promise.any сам отклоняется: перехватите это в try/catch и верните fallback.'
    solution: |
      const firstSuccess = async (promises, fallback) => {
        try {
          return await Promise.any(promises);
        } catch (error) {
          return fallback;
        }
      };
