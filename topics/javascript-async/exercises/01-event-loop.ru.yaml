exercises:
  - id: eventloop-thread-quiz-001
    concept: event-loop
    type: theory-quiz
    difficulty: 1
    prompt: 'Сколько потоков исполнения у обычного JavaScript в браузере, если не считать Web Workers?'
    choices:
      - id: a
        text: 'Один на всю вкладку.'
      - id: b
        text: 'По одному на каждую функцию.'
      - id: c
        text: 'Столько, сколько ядер у процессора.'
    correct: [a]
    explanation: 'У JavaScript один поток исполнения: пока стек занят кодом, ничто другое не выполняется. Дополнительные потоки появляются только через Web Workers.'
    hints:
      - 'Вспомните образ единственной руки, которой движок выполняет код.'
    variants:
      - prompt: 'Что делает setTimeout(fn, 0)?'
        choices:
          - id: a
            text: 'Выполняет fn немедленно, прерывая текущий код.'
          - id: b
            text: 'Ставит fn в очередь и выполняет после текущего синхронного кода.'
          - id: c
            text: 'Создаёт новый поток и выполняет fn параллельно.'
        correct: [b]
        explanation: 'Ноль означает «как можно скорее, но после того как стек опустеет», а не «прямо сейчас».'
      - prompt: 'Почему тяжёлый синхронный цикл подвешивает вкладку?'
        choices:
          - id: a
            text: 'Браузер специально блокирует ввод на время циклов.'
          - id: b
            text: 'Единственный поток занят циклом и не разбирает очередь событий.'
          - id: c
            text: 'setTimeout внутри цикла копит колбэки и переполняет память.'
        correct: [b]
        explanation: 'Пока стек занят циклом, событийный цикл не переносит на него ни клики, ни таймеры из очереди.'

  - id: eventloop-settimeout-blanks-001
    concept: event-loop
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Допишите вызов, который через 1000 мс печатает «звонок».'
    template: |
      {{fn}}(() => {
        console.log('звонок');
      }, {{ms}});
    blanks:
      fn:
        accept: ['setTimeout']
      ms:
        accept: ['1000']
    explanation: 'setTimeout принимает функцию и задержку в миллисекундах. Задержка 1000 означает «не раньше чем через секунду».'
    hints:
      - 'Какая функция откладывает вызов, отдавая его таймеру браузера?'
    variants:
      - prompt: 'Допишите вызов, который сразу после текущего синхронного кода печатает «сразу».'
        template: |
          {{fn}}(() => {
            console.log('сразу');
          }, {{ms}});
        blanks:
          fn:
            accept: ['setTimeout']
          ms:
            accept: ['0']
      - prompt: 'Допишите вызов, который через 3000 мс печатает «напоминание».'
        template: |
          {{fn}}(() => {
            console.log('напоминание');
          }, {{ms}});
        blanks:
          fn:
            accept: ['setTimeout']
          ms:
            accept: ['3000']

  - id: eventloop-order-predict-001
    concept: event-loop
    type: predict-output
    difficulty: 2
    prompt: 'В каком порядке напечатаются строки?'
    snippet: |
      console.log('A');
      setTimeout(() => console.log('B'), 0);
      console.log('C');
    expected:
      kind: stdout
      value: |-
        A
        C
        B
    explanation: 'Синхронные строки A и C печатаются сразу. Колбэк setTimeout проходит через очередь и выполняется только на пустом стеке, поэтому B идёт последним, несмотря на нулевую задержку.'
    hints:
      - 'Сначала выполняется весь синхронный код, и лишь потом событийный цикл забирает колбэки из очереди.'
    variants:
      - prompt: 'В каком порядке напечатаются числа?'
        snippet: |
          console.log(1);
          setTimeout(() => console.log(2), 100);
          console.log(3);
          setTimeout(() => console.log(4), 0);
          console.log(5);
        expected:
          kind: stdout
          value: |-
            1
            3
            5
            4
            2
      - prompt: 'В каком порядке напечатаются строки?'
        snippet: |
          setTimeout(() => console.log('таймер'), 0);
          console.log('синхронно 1');
          console.log('синхронно 2');
        expected:
          kind: stdout
          value: |-
            синхронно 1
            синхронно 2
            таймер

  - id: eventloop-nested-predict-001
    concept: event-loop
    type: predict-output
    difficulty: 3
    prompt: 'Колбэк первого таймера ставит ещё один таймер. В каком порядке пойдёт вывод?'
    snippet: |
      console.log('старт');
      setTimeout(() => {
        console.log('таймер 1');
        setTimeout(() => console.log('вложенный'), 0);
      }, 0);
      setTimeout(() => console.log('таймер 2'), 0);
      console.log('конец');
    expected:
      kind: stdout
      value: |-
        старт
        конец
        таймер 1
        таймер 2
        вложенный
    explanation: 'Сначала синхронные «старт» и «конец». В очереди уже стоят таймер 1 и таймер 2. Пока выполняется таймер 1, «вложенный» только попадает в очередь, поэтому он встаёт за уже ожидающим таймером 2.'
    hints:
      - 'Новый колбэк добавляется в конец очереди, а не в начало: он выполнится после всех, кто уже там ждёт.'
      - 'Выпишите содержимое очереди после синхронного кода, затем разбирайте её по одному колбэку.'
    variants:
      - prompt: 'Три таймера с разной задержкой. В каком порядке пойдёт вывод?'
        snippet: |
          console.log('a');
          setTimeout(() => console.log('b'), 20);
          setTimeout(() => console.log('c'), 0);
          setTimeout(() => console.log('d'), 10);
          console.log('e');
        expected:
          kind: stdout
          value: |-
            a
            e
            c
            d
            b
