exercises:
  - id: asyncawait-returns-quiz-001
    concept: async-await
    type: theory-quiz
    difficulty: 1
    prompt: 'Что всегда возвращает async-функция?'
    choices:
      - id: a
        text: 'Промис.'
      - id: b
        text: 'То значение, что стоит после return, как есть.'
      - id: c
        text: 'undefined.'
    correct: [a]
    explanation: 'async-функция всегда оборачивает результат в промис: return 5 даёт промис, разрешённый значением 5.'
    hints:
      - 'Что нужно сделать снаружи, чтобы получить значение из async-функции?'
    variants:
      - prompt: 'Что делает await перед промисом?'
        choices:
          - id: a
            text: 'Приостанавливает async-функцию до оседания промиса и возвращает его значение.'
          - id: b
            text: 'Создаёт новый промис.'
          - id: c
            text: 'Запускает промис в отдельном потоке.'
        correct: [a]
        explanation: 'await ждёт, пока промис осядет, и разворачивает его значение, чтобы дальше работать с обычным значением, а не с промисом.'
      - prompt: 'Где можно использовать await (не считая top-level await в модулях)?'
        choices:
          - id: a
            text: 'Только внутри async-функции.'
          - id: b
            text: 'В любой функции.'
          - id: c
            text: 'Только внутри цикла.'
        correct: [a]
        explanation: 'Вне async-функции await вызывает синтаксическую ошибку, за исключением верхнего уровня модуля.'

  - id: asyncawait-keywords-blanks-001
    concept: async-await
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Допишите функцию, которая дожидается промиса и возвращает значение.'
    template: |
      const load = {{kw}} () => {
        const data = {{wait}} fetchData();
        return data;
      };
    blanks:
      kw:
        accept: ['async']
      wait:
        accept: ['await']
    explanation: 'Ключевое слово async делает функцию асинхронной, а await внутри неё дожидается промиса и разворачивает значение.'
    hints:
      - 'Одно слово помечает функцию как асинхронную, другое ставится перед промисом.'
    variants:
      - prompt: 'Допишите объявление функции и ожидание результата.'
        template: |
          {{kw}} function main() {
            const user = {{wait}} getUser();
            console.log(user.name);
          }
        blanks:
          kw:
            accept: ['async']
          wait:
            accept: ['await']
      - prompt: 'Допишите обработку ошибки внутри async-функции.'
        template: |
          const run = async () => {
            {{open}} {
              const value = await risky();
            } {{clause}} (error) {
              console.log('ошибка');
            }
          };
        blanks:
          open:
            accept: ['try']
          clause:
            accept: ['catch']

  - id: asyncawait-order-predict-001
    concept: async-await
    type: predict-output
    difficulty: 2
    prompt: 'await приостанавливает функцию. В каком порядке пойдёт вывод?'
    snippet: |
      async function run() {
        console.log('внутри до await');
        await null;
        console.log('внутри после await');
      }
      console.log('старт');
      run();
      console.log('конец');
    expected:
      kind: stdout
      value: |-
        старт
        внутри до await
        конец
        внутри после await
    explanation: 'До await функция выполняется синхронно, поэтому «внутри до await» идёт сразу. На await управление возвращается наружу, печатается «конец», и лишь затем как микрозадача выполняется «внутри после await».'
    hints:
      - 'Всё до первого await выполняется сразу, а строки после await откладываются.'
    variants:
      - prompt: 'async-функция возвращает промис. В каком порядке пойдёт вывод?'
        snippet: |
          async function give() {
            return 5;
          }
          give().then((v) => console.log('получили ' + v));
          console.log('синхронно');
        expected:
          kind: stdout
          value: |-
            синхронно
            получили 5
      - prompt: 'Ошибка отклонённого промиса ловится в try/catch. В каком порядке пойдёт вывод?'
        snippet: |
          async function run() {
            console.log('A');
            try {
              await Promise.reject(new Error('сбой'));
            } catch (e) {
              console.log('поймали');
            }
            console.log('B');
          }
          console.log('старт');
          run();
          console.log('конец');
        expected:
          kind: stdout
          value: |-
            старт
            A
            конец
            поймали
            B

  - id: asyncawait-safevalue-001
    concept: async-await
    type: javascript-function
    difficulty: 3
    prompt: 'Реализуйте async-функцию safeValue(promise, fallback): верните значение промиса через await, а при отклонении промиса верните fallback. Используйте try/catch.'
    starter: |
      const safeValue = async (promise, fallback) => {

      };
    cases:
      - call: 'safeValue(Promise.resolve(7), 0)'
        expect: 7
      - call: "safeValue(Promise.reject(new Error('нет')), -1)"
        expect: -1
      - call: "safeValue(Promise.resolve('Москва'), 'нет')"
        expect: 'Москва'
    hints:
      - 'Оберните await в try: если промис осядет ошибкой, управление уйдёт в catch.'
      - 'В блоке catch верните запасное значение fallback.'
    solution: |
      const safeValue = async (promise, fallback) => {
        try {
          return await promise;
        } catch (error) {
          return fallback;
        }
      };
