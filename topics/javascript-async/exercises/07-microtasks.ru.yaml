exercises:
  - id: microtasks-priority-quiz-001
    concept: microtasks
    type: theory-quiz
    difficulty: 1
    prompt: 'Что выполнится раньше, если оба поставлены в одном синхронном блоке: колбэк уже разрешённого промиса или колбэк setTimeout(fn, 0)?'
    choices:
      - id: a
        text: 'Колбэк промиса.'
      - id: b
        text: 'Колбэк setTimeout.'
      - id: c
        text: 'Тот, что записан выше в коде.'
    correct: [a]
    explanation: 'Колбэк промиса попадает в очередь микрозадач, колбэк таймера в очередь макрозадач. Микрозадачи всегда разбираются раньше, поэтому промис обгоняет таймер.'
    hints:
      - 'Вспомните, какая из двух очередей имеет приоритет.'
    variants:
      - prompt: 'Сколько микрозадач разберёт цикл, прежде чем взять следующую макрозадачу?'
        choices:
          - id: a
            text: 'Ровно одну всегда.'
          - id: b
            text: 'Всю очередь микрозадач'
          - id: c
            text: 'Половину очереди.'
        correct: [b]
        explanation: 'После каждой макрозадачи очередь микрозадач опустошается целиком, а не по одной.'
      - prompt: 'К какой очереди относится продолжение функции после await?'
        choices:
          - id: a
            text: 'К очереди микрозадач.'
          - id: b
            text: 'К очереди макрозадач.'
          - id: c
            text: 'Ни к какой, оно выполняется синхронно.'
        correct: [a]
        explanation: 'Строка после await возобновляется как микрозадача, поэтому ведёт себя так же, как колбэк then.'

  - id: microtasks-basic-predict-001
    concept: microtasks
    type: predict-output
    difficulty: 2
    prompt: 'В каком порядке напечатаются строки?'
    snippet: |
      console.log('1');
      setTimeout(() => console.log('2'), 0);
      Promise.resolve().then(() => console.log('3'));
      console.log('4');
    expected:
      kind: stdout
      value: |-
        1
        4
        3
        2
    explanation: 'Синхронные 1 и 4 печатаются сразу. Затем цикл опустошает микрозадачи и печатает 3, и только потом берёт макрозадачу с таймером, печатая 2.'
    hints:
      - 'Сначала весь синхронный код, потом все микрозадачи, потом одна макрозадача.'
    variants:
      - prompt: 'В каком порядке напечатаются строки?'
        snippet: |
          setTimeout(() => console.log('таймер'), 0);
          Promise.resolve().then(() => console.log('промис 1'));
          Promise.resolve().then(() => console.log('промис 2'));
          console.log('синхронно');
        expected:
          kind: stdout
          value: |-
            синхронно
            промис 1
            промис 2
            таймер
      - prompt: 'В каком порядке напечатаются строки?'
        snippet: |
          Promise.resolve().then(() => console.log('микро'));
          console.log('sync 1');
          setTimeout(() => console.log('макро'), 0);
          console.log('sync 2');
        expected:
          kind: stdout
          value: |-
            sync 1
            sync 2
            микро
            макро

  - id: microtasks-nested-predict-001
    concept: microtasks
    type: predict-output
    difficulty: 3
    prompt: 'Колбэк промиса во время работы планирует ещё одну микрозадачу. В каком порядке пойдёт вывод?'
    snippet: |
      console.log('старт');
      Promise.resolve().then(() => {
        console.log('промис 1');
        Promise.resolve().then(() => console.log('промис 2'));
      });
      setTimeout(() => console.log('таймер'), 0);
      console.log('конец');
    expected:
      kind: stdout
      value: |-
        старт
        конец
        промис 1
        промис 2
        таймер
    explanation: 'Очередь микрозадач опустошается до дна. Колбэк «промис 1» добавляет «промис 2» в ту же очередь, и цикл разбирает его в том же заходе, не выпуская управление к таймеру.'
    hints:
      - 'Микрозадача, добавленная во время опустошения очереди, разбирается в этом же заходе, а не откладывается.'
      - 'Управление уходит к таймеру только когда очередь микрозадач полностью пуста.'
    variants:
      - prompt: 'Цепочка из двух then против таймера. В каком порядке пойдёт вывод?'
        snippet: |
          setTimeout(() => console.log('T'), 0);
          Promise.resolve()
            .then(() => console.log('P1'))
            .then(() => console.log('P2'));
          console.log('S');
        expected:
          kind: stdout
          value: |-
            S
            P1
            P2
            T

  - id: microtasks-await-predict-001
    concept: microtasks
    type: predict-output
    difficulty: 4
    prompt: 'Смешаны await, then и setTimeout. В каком порядке пойдёт вывод?'
    snippet: |
      async function run() {
        console.log('A');
        await null;
        console.log('B');
      }
      console.log('старт');
      setTimeout(() => console.log('T'), 0);
      run();
      Promise.resolve().then(() => console.log('P'));
      console.log('конец');
    expected:
      kind: stdout
      value: |-
        старт
        A
        конец
        B
        P
        T
    explanation: 'До await функция run выполняется синхронно и печатает A. На await её продолжение (печать B) встаёт в очередь микрозадач первым, затем туда же попадает колбэк then с P. После синхронного «конец» цикл разбирает микрозадачи в порядке постановки: B, затем P. Таймер T как макрозадача идёт последним.'
    hints:
      - 'Разделите код на три части: что выполняется синхронно, что становится микрозадачей, что макрозадачей.'
      - 'Продолжение после await встаёт в очередь микрозадач раньше, чем колбэк then со строкой ниже: сравните, когда каждое из них планируется.'
