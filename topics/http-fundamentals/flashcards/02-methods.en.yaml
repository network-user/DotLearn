conceptId: methods
cards:
  - id: methods-01
    front: "The five main HTTP methods and what they do?"
    back: "GET reads, POST creates or triggers processing, PUT replaces entirely, PATCH edits part, DELETE removes."
    tags: [verbs]
  - id: methods-02
    front: "What makes a method 'safe'?"
    back: "A method that doesn't change server state: GET and HEAD. They can be called as many times as needed - crawlers, caches, and prefetching do exactly that."
    tags: [contracts]
  - id: methods-03
    front: "What is an idempotent method?"
    back: "A method whose repeat doesn't change the server's resulting state: GET, HEAD, PUT, DELETE. Safe to repeat on a dropped connection."
    tags: [contracts]
  - id: methods-04
    front: "Why is it dangerous to repeat a POST after losing the response?"
    back: "POST isn't idempotent: every repeat can create a new resource - a second order, a second charge. Protection: disabling the button and an idempotency key."
    tags: [contracts]
  - id: methods-05
    front: "PUT vs PATCH: what's the difference?"
    back: "PUT sends the whole resource and replaces the old version; fields left out disappear. PATCH sends only the changes and applies them to the current state."
    tags: [verbs]
  - id: methods-06
    front: "A repeated DELETE returned 404 instead of 200. Is idempotency broken?"
    back: "No. Idempotency is about server state, not identical responses: the resource was deleted before and stays deleted now."
    tags: [contracts]
  - id: methods-07
    front: "What does the HEAD method do?"
    back: "The same as GET, but the server returns only headers, no body. Handy for checking a file's size or modification date before downloading."
    tags: [verbs]
