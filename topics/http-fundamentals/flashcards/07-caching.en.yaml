conceptId: caching
cards:
  - id: caching-01
    front: "The two questions every HTTP cache lives by?"
    back: "Is the copy fresh (max-age hasn't expired - serve without contacting the server) and is the stale one still correct (validate with a conditional request, response 304 or 200)."
    tags: [model]
  - id: caching-02
    front: "no-cache vs no-store: what's the difference?"
    back: "no-cache: storing is fine, but validate before each use. no-store: don't store anywhere at all - for sensitive data."
    tags: [directives]
  - id: caching-03
    front: "private vs public in Cache-Control?"
    back: "private - store only in the user's own browser (personal pages). public - fine in shared caches too: CDN, proxies."
    tags: [directives]
  - id: caching-04
    front: "How does the ETag and If-None-Match pair work?"
    back: "The server sends a fingerprint of the body in ETag; the client returns it in If-None-Match. A match gives 304 with no body, a change gives 200 with a new body and a new ETag."
    tags: [validation]
  - id: caching-05
    front: "What does a 304 Not Modified response mean?"
    back: "'Your copy is up to date, keep using it.' There's no body in the response - dozens of bytes travel over the network instead of the whole resource."
    tags: [validation]
  - id: caching-06
    front: "The standard frontend caching pattern?"
    back: "HTML - short-lived or no-cache; files with a content hash in the name - a year of max-age plus immutable: a content change changes the filename."
    tags: [patterns]
  - id: caching-07
    front: "Why does a response get cached even when Cache-Control isn't set?"
    back: "Browsers apply a heuristic: typically caching for a fraction of the time since the last modification. No header doesn't mean no caching."
    tags: [pitfalls]
