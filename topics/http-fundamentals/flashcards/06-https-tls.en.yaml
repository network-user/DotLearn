conceptId: https-tls
cards:
  - id: https-tls-01
    front: "What is HTTPS in relation to HTTP?"
    back: "The same HTTP, but inside an encrypted TLS channel. Methods, codes, and headers don't change - the transport does."
    tags: [model]
  - id: https-tls-02
    front: "TLS's three guarantees?"
    back: "Confidentiality (content is encrypted), integrity (tampering in transit is detectable), server authentication (the certificate confirms the domain)."
    tags: [model]
  - id: https-tls-03
    front: "How is the certificate chain of trust structured?"
    back: "The browser trusts root CAs from a built-in list; a CA vouches for a domain with its own signature. A self-signed certificate means 'no one vouches for this', hence the red warning."
    tags: [certificates]
  - id: https-tls-04
    front: "What does the padlock in the address bar confirm, and what doesn't it confirm?"
    back: "It confirms a secured channel with exactly this domain. It doesn't confirm the site's honesty: a phishing domain gets a valid certificate too."
    tags: [certificates]
  - id: https-tls-05
    front: "What does an observer see in HTTPS traffic, and what's hidden?"
    back: "Sees the IP and the domain (SNI during handshake, DNS). Hidden are the path, parameters, headers, and message bodies."
    tags: [privacy]
  - id: https-tls-06
    front: "What is mixed content and why is it dangerous?"
    back: "An HTTPS page loads a resource over HTTP. The unprotected part can be tampered with to reach the whole page; browsers block this."
    tags: [pitfalls]
  - id: https-tls-07
    front: "What is the Strict-Transport-Security (HSTS) header for?"
    back: "It tells the browser to only reach the site over HTTPS for a given period, protecting against interception of the first HTTP request. The very first visit is covered by the browser's preload list."
    tags: [hardening]
