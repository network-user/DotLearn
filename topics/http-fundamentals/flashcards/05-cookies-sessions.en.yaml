conceptId: cookies-sessions
cards:
  - id: cookies-sessions-01
    front: "Which pair of headers implements cookies, and who sends them?"
    back: "The server issues the tag via the Set-Cookie header in the response; the browser automatically returns it via the Cookie header in every request to that domain."
    tags: [mechanism]
  - id: cookies-sessions-02
    front: "What from the Set-Cookie string gets returned to the server?"
    back: "Only the 'name=value' pair. The attributes (Max-Age, Secure, HttpOnly, SameSite) are instructions to the browser; they don't fly back."
    tags: [mechanism]
  - id: cookies-sessions-03
    front: "What do the Secure and HttpOnly attributes do?"
    back: "Secure - send the cookie only over HTTPS. HttpOnly - hide it from JavaScript (document.cookie), so XSS can't steal the session."
    tags: [security]
  - id: cookies-sessions-04
    front: "Which attack does SameSite protect against, and how?"
    back: "CSRF: SameSite=Lax doesn't attach the cookie to cross-site POSTs, Strict doesn't attach it to any cross-site navigation, None requires Secure."
    tags: [security]
  - id: cookies-sessions-05
    front: "Server-side session vs JWT: the main trade-off?"
    back: "Session: an identifier in the cookie, data on the server - easy to revoke, needs storage. JWT: signed data inside the token - no storage needed, but can't be revoked instantly."
    tags: [sessions]
  - id: cookies-sessions-06
    front: "How does the server delete a cookie from the browser?"
    back: "There's no dedicated command: it sends the same cookie with Max-Age=0, and the browser wipes it."
    tags: [mechanism]
  - id: cookies-sessions-07
    front: "Why shouldn't 'admin=true' be put in a cookie as plain text?"
    back: "Cookies are visible and editable by the user via DevTools. The server can only trust a random identifier or signed data."
    tags: [security]
