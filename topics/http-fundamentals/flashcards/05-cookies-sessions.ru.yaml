conceptId: cookies-sessions
cards:
  - id: cookies-sessions-01
    front: "Какая пара заголовков реализует cookies и кто их отправляет?"
    back: "Сервер выдаёт метку заголовком Set-Cookie в ответе; браузер автоматически возвращает её заголовком Cookie в каждом запросе на этот домен."
    tags: [mechanism]
  - id: cookies-sessions-02
    front: "Что из строки Set-Cookie возвращается серверу?"
    back: "Только пара «имя=значение». Атрибуты (Max-Age, Secure, HttpOnly, SameSite) - инструкции браузеру, обратно они не летят."
    tags: [mechanism]
  - id: cookies-sessions-03
    front: "Что делают атрибуты Secure и HttpOnly?"
    back: "Secure - отправлять cookie только по HTTPS. HttpOnly - спрятать от JavaScript (document.cookie), чтобы XSS не украл сессию."
    tags: [security]
  - id: cookies-sessions-04
    front: "От какой атаки защищает SameSite и как?"
    back: "От CSRF: SameSite=Lax не прикладывает cookie к межсайтовым POST, Strict - ни к каким межсайтовым переходам, None требует Secure."
    tags: [security]
  - id: cookies-sessions-05
    front: "Серверная сессия против JWT: главный компромисс?"
    back: "Сессия: идентификатор в cookie, данные на сервере - легко отозвать, нужно хранилище. JWT: данные с подписью в токене - хранилища нет, но мгновенно отозвать нельзя."
    tags: [sessions]
  - id: cookies-sessions-06
    front: "Как сервер удаляет cookie у браузера?"
    back: "Отдельной команды нет: присылает ту же cookie с Max-Age=0, и браузер её стирает."
    tags: [mechanism]
  - id: cookies-sessions-07
    front: "Почему в cookie нельзя класть «admin=true» открытым текстом?"
    back: "Cookies видны и редактируемы пользователем через DevTools. Серверу можно верить только случайному идентификатору или подписанным данным."
    tags: [security]
