conceptId: status-codes
cards:
  - id: status-codes-01
    front: "What do the five classes of status codes mean?"
    back: "1xx informational, 2xx success, 3xx redirect, 4xx client error, 5xx server error. The first digit says the most."
    tags: [classes]
  - id: status-codes-02
    front: "What's the point of the line between 4xx and 5xx?"
    back: "It's a boundary of responsibility: 4xx is fixed by correcting the client's request, 5xx by fixing the server. No amount of fixing the request makes a 5xx go away."
    tags: [classes]
  - id: status-codes-03
    front: "301 vs 302: what's the difference?"
    back: "301 is a permanent move: search engines transfer ranking, browsers cache the redirect for a long time. 302 is temporary: the old address stays home."
    tags: [redirects]
  - id: status-codes-04
    front: "401 vs 403: what's the difference?"
    back: "401 is 'I don't know you': no token or an expired one, authentication is needed. 403 is 'I know you, but no': not enough rights, logging in again won't help."
    tags: [errors]
  - id: status-codes-05
    front: "Where do 500, 502, 503, and 504 come from?"
    back: "500 is an exception in the application code. 502/504 mean the proxy couldn't reach the app or didn't wait long enough. 503 is the server deliberately saying 'temporarily unavailable'."
    tags: [errors]
  - id: status-codes-06
    front: "What does the server put in a 3xx response so the client knows where to go?"
    back: "The Location header with the new address. The browser makes the next request there on its own."
    tags: [redirects]
  - id: status-codes-07
    front: "Which code and header say 'too often, slow down'?"
    back: "429 Too Many Requests, often paired with Retry-After - how many seconds to wait before retrying."
    tags: [errors]
