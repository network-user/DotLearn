conceptId: https-tls
cards:
  - id: https-tls-01
    front: "Что такое HTTPS по отношению к HTTP?"
    back: "Тот же HTTP, но внутри шифрованного канала TLS. Методы, коды и заголовки не меняются - меняется транспорт."
    tags: [model]
  - id: https-tls-02
    front: "Три гарантии TLS?"
    back: "Конфиденциальность (содержимое зашифровано), целостность (подмена по дороге обнаружима), аутентификация сервера (сертификат подтверждает домен)."
    tags: [model]
  - id: https-tls-03
    front: "Как устроена цепочка доверия сертификатов?"
    back: "Браузер доверяет корневым CA из встроенного списка; CA своей подписью поручается за домен. Самоподписанный сертификат - «поручителя нет», отсюда красное предупреждение."
    tags: [certificates]
  - id: https-tls-04
    front: "Что подтверждает замочек в адресной строке, а чего не подтверждает?"
    back: "Подтверждает защищённый канал именно с этим доменом. Не подтверждает честность сайта: фишинговый домен тоже получает валидный сертификат."
    tags: [certificates]
  - id: https-tls-05
    front: "Что наблюдатель видит в HTTPS-трафике, а что скрыто?"
    back: "Видит IP и домен (SNI при рукопожатии, DNS). Скрыты путь, параметры, заголовки и тела сообщений."
    tags: [privacy]
  - id: https-tls-06
    front: "Что такое mixed content и чем он опасен?"
    back: "HTTPS-страница подгружает ресурс по HTTP. Незащищённую часть можно подменить и дотянуться до всей страницы; браузеры такое блокируют."
    tags: [pitfalls]
  - id: https-tls-07
    front: "Зачем нужен заголовок Strict-Transport-Security (HSTS)?"
    back: "Он велит браузеру ходить на сайт только по HTTPS указанный срок, защищая от перехвата первого HTTP-запроса. Самый первый визит закрывает preload-список браузера."
    tags: [hardening]
