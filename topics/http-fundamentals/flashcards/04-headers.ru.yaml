conceptId: headers
cards:
  - id: headers-01
    front: "Accept против Content-Type: кто о чём?"
    back: "Accept - пожелание клиента о формате будущего ответа. Content-Type - факт о теле текущего сообщения. POST с JSON использует оба."
    tags: [negotiation]
  - id: headers-02
    front: "Как клиент расставляет приоритеты форматов в Accept?"
    back: "Весами q от 0 до 1: Accept: application/json, text/html;q=0.8. Без явного q вес равен 1 - такой кандидат главный."
    tags: [negotiation]
  - id: headers-03
    front: "Какие ещё две пары заголовков работают как Accept и Content-Type?"
    back: "Accept-Language и Content-Language - о языке ответа; Accept-Encoding и Content-Encoding - о сжатии (gzip, br)."
    tags: [negotiation]
  - id: headers-04
    front: "Сервер не может дать ни один формат из Accept. Что он сделает?"
    back: "Вправе ответить 406 Not Acceptable, но на практике обычно отдаёт то, что есть: стандарт разрешает проигнорировать пожелание."
    tags: [negotiation]
  - id: headers-05
    front: "Почему JSON-запрос без Content-Type «теряет поля» на сервере?"
    back: "Сервер не знает формат тела и разбирает его как форму или отклоняет с 400. Лечится строкой Content-Type: application/json."
    tags: [pitfalls]
  - id: headers-06
    front: "Можно ли доверять заголовку User-Agent?"
    back: "Нет: клиент пишет его о себе сам, curl может представиться браузером. Годится для статистики, не для безопасности."
    tags: [pitfalls]
  - id: headers-07
    front: "Зачем нужен заголовок Vary?"
    back: "Он сообщает кешам, от каких заголовков запроса зависит ответ: Vary: Accept-Language не даст общему кешу выдать русскую версию англоязычному клиенту."
    tags: [negotiation]
