conceptId: request-response
cards:
  - id: request-response-01
    front: "Из каких четырёх частей состоит любое HTTP-сообщение?"
    back: "Стартовая строка, заголовки, пустая строка, тело. Пустая строка обязательна: она отделяет метаданные от тела, которое может отсутствовать."
    tags: [structure]
  - id: request-response-02
    front: "Что стоит в стартовой строке запроса и что - в стартовой строке ответа?"
    back: "В запросе: метод, путь, версия (GET /catalog HTTP/1.1). В ответе: версия, статус-код, фраза (HTTP/1.1 200 OK)."
    tags: [structure]
  - id: request-response-03
    front: "Где в HTTP-запросе передаётся доменное имя сайта?"
    back: "В заголовке Host, а не в пути. В пути остаётся только часть URL после домена. Так один IP-адрес обслуживает много сайтов."
    tags: [structure]
  - id: request-response-04
    front: "Что означает «HTTP - stateless-протокол»?"
    back: "Сервер не хранит состояние между запросами: обработал, ответил, забыл. Каждый запрос самостоятелен; память добавляется надстройками вроде cookies."
    tags: [model]
  - id: request-response-05
    front: "Может ли сервер написать клиенту первым в чистом HTTP?"
    back: "Нет. Клиент всегда начинает: отправляет запрос, сервер отвечает. Пуш от сервера - это уже другие механизмы: WebSocket, Server-Sent Events."
    tags: [model]
  - id: request-response-06
    front: "Чем HTTP/2 и HTTP/3 отличаются от HTTP/1.1 для разработчика?"
    back: "Семантика та же: методы, заголовки, статус-коды. Меняется транспорт: сообщения упаковываются в бинарные кадры ради скорости."
    tags: [versions]
