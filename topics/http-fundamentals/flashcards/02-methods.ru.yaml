conceptId: methods
cards:
  - id: methods-01
    front: "Пять основных методов HTTP и их действия?"
    back: "GET читает, POST создаёт или запускает обработку, PUT целиком заменяет, PATCH правит часть, DELETE удаляет."
    tags: [verbs]
  - id: methods-02
    front: "Какой метод называется безопасным (safe)?"
    back: "Метод, который не меняет состояние сервера: GET и HEAD. Их можно вызывать сколько угодно - роботы, кеши и предзагрузка так и делают."
    tags: [contracts]
  - id: methods-03
    front: "Что такое идемпотентный метод?"
    back: "Метод, повтор которого не меняет итоговое состояние сервера: GET, HEAD, PUT, DELETE. Повторять их при обрыве сети безопасно."
    tags: [contracts]
  - id: methods-04
    front: "Почему POST опасно повторять при потере ответа?"
    back: "POST не идемпотентен: каждый повтор может создать новый ресурс - второй заказ, второе списание. Защита: блокировка кнопки и ключ идемпотентности."
    tags: [contracts]
  - id: methods-05
    front: "PUT против PATCH: в чём разница?"
    back: "PUT присылает ресурс целиком и заменяет старую версию; непересланные поля пропадают. PATCH присылает только изменения и применяет их к текущему состоянию."
    tags: [verbs]
  - id: methods-06
    front: "Повторный DELETE вернул 404 вместо 200. Нарушена ли идемпотентность?"
    back: "Нет. Идемпотентность - про состояние сервера, а не про одинаковые ответы: ресурс как был удалён, так и остался удалённым."
    tags: [contracts]
  - id: methods-07
    front: "Что делает метод HEAD?"
    back: "То же, что GET, но сервер возвращает только заголовки, без тела. Удобно узнать размер или дату изменения файла до скачивания."
    tags: [verbs]
