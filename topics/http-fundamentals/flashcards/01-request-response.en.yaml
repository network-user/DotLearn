conceptId: request-response
cards:
  - id: request-response-01
    front: "What four parts make up every HTTP message?"
    back: "Start line, headers, empty line, body. The empty line is mandatory: it separates the metadata from the body, which may be absent."
    tags: [structure]
  - id: request-response-02
    front: "What's in a request's start line, and what's in a response's start line?"
    back: "Request: method, path, version (GET /catalog HTTP/1.1). Response: version, status code, phrase (HTTP/1.1 200 OK)."
    tags: [structure]
  - id: request-response-03
    front: "Where does an HTTP request carry the site's domain name?"
    back: "In the Host header, not in the path. Only the part of the URL after the domain stays in the path. That's how one IP address serves many sites."
    tags: [structure]
  - id: request-response-04
    front: "What does 'HTTP is a stateless protocol' mean?"
    back: "The server keeps no state between requests: handle, respond, forget. Every request stands alone; memory is added by add-ons like cookies."
    tags: [model]
  - id: request-response-05
    front: "Can the server write to the client first in plain HTTP?"
    back: "No. The client always starts: it sends a request, the server responds. A server-initiated push is a different mechanism: WebSocket, Server-Sent Events."
    tags: [model]
  - id: request-response-06
    front: "How do HTTP/2 and HTTP/3 differ from HTTP/1.1 for a developer?"
    back: "The semantics stay the same: methods, headers, status codes. What changes is the transport: messages get packed into binary frames for speed."
    tags: [versions]
