conceptId: headers
cards:
  - id: headers-01
    front: "Accept vs Content-Type: who does what?"
    back: "Accept is the client's wish about the future response's format. Content-Type is a fact about the current message's body. A POST with JSON uses both."
    tags: [negotiation]
  - id: headers-02
    front: "How does a client rank format priorities in Accept?"
    back: "With q weights from 0 to 1: Accept: application/json, text/html;q=0.8. Without an explicit q, the weight is 1 - that candidate leads."
    tags: [negotiation]
  - id: headers-03
    front: "Which two other header pairs work like Accept and Content-Type?"
    back: "Accept-Language and Content-Language - about the response's language; Accept-Encoding and Content-Encoding - about compression (gzip, br)."
    tags: [negotiation]
  - id: headers-04
    front: "The server can't provide any format from Accept. What will it do?"
    back: "It's entitled to respond 406 Not Acceptable, but in practice it usually serves what it has: the standard allows ignoring the wish."
    tags: [negotiation]
  - id: headers-05
    front: "Why does a JSON request without Content-Type 'lose fields' on the server?"
    back: "The server doesn't know the body's format and parses it as a form, or rejects it with 400. Fixed by the line Content-Type: application/json."
    tags: [pitfalls]
  - id: headers-06
    front: "Can the User-Agent header be trusted?"
    back: "No: the client writes it about itself, and curl can claim to be a browser. Fine for statistics, not for security."
    tags: [pitfalls]
  - id: headers-07
    front: "What is the Vary header for?"
    back: "It tells caches which request headers the response depends on: Vary: Accept-Language stops a shared cache from serving the Russian version to an English-speaking client."
    tags: [negotiation]
