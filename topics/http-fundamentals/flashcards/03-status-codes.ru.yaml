conceptId: status-codes
cards:
  - id: status-codes-01
    front: "Что означают пять классов статус-кодов?"
    back: "1xx информация, 2xx успех, 3xx редирект, 4xx ошибка клиента, 5xx ошибка сервера. Первая цифра говорит главное."
    tags: [classes]
  - id: status-codes-02
    front: "В чём смысл границы между 4xx и 5xx?"
    back: "Это граница ответственности: 4xx чинится исправлением запроса клиента, 5xx - починкой сервера. Сколько ни правь запрос, 5xx не исчезнет."
    tags: [classes]
  - id: status-codes-03
    front: "301 против 302: в чём разница?"
    back: "301 - переезд навсегда: поисковики переносят рейтинг, браузеры надолго кешируют редирект. 302 - временно: домом остаётся старый адрес."
    tags: [redirects]
  - id: status-codes-04
    front: "401 против 403: в чём разница?"
    back: "401 - «я вас не знаю»: нет или протух токен, нужно аутентифицироваться. 403 - «знаю, но нельзя»: прав не хватает, повторный логин не поможет."
    tags: [errors]
  - id: status-codes-05
    front: "Откуда берутся 500, 502, 503 и 504?"
    back: "500 - исключение в коде приложения. 502/504 - прокси не достучался или не дождался приложения. 503 - сервер осознанно «временно не обслуживаю»."
    tags: [errors]
  - id: status-codes-06
    front: "Что сервер кладёт в ответ 3xx, чтобы клиент знал, куда идти?"
    back: "Заголовок Location с новым адресом. Браузер сам делает следующий запрос по нему."
    tags: [redirects]
  - id: status-codes-07
    front: "Какой код и заголовок сообщают «слишком часто, притормози»?"
    back: "429 Too Many Requests, часто вместе с Retry-After - через сколько секунд можно повторить запрос."
    tags: [errors]
