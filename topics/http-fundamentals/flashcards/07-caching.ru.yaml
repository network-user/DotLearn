conceptId: caching
cards:
  - id: caching-01
    front: "Два вопроса, которыми живёт любой HTTP-кеш?"
    back: "Свежая ли копия (max-age не истёк - отдать без похода к серверу) и верна ли просроченная (валидация условным запросом, ответ 304 или 200)."
    tags: [model]
  - id: caching-02
    front: "no-cache против no-store: в чём разница?"
    back: "no-cache: хранить можно, но валидировать перед каждым использованием. no-store: не сохранять вообще нигде - для чувствительных данных."
    tags: [directives]
  - id: caching-03
    front: "private против public в Cache-Control?"
    back: "private - хранить только в браузере пользователя (персональные страницы). public - можно и в общих кешах: CDN, прокси."
    tags: [directives]
  - id: caching-04
    front: "Как работает пара ETag и If-None-Match?"
    back: "Сервер отдаёт отпечаток тела в ETag; клиент возвращает его в If-None-Match. Совпало - 304 без тела, изменилось - 200 с новым телом и новым ETag."
    tags: [validation]
  - id: caching-05
    front: "Что означает ответ 304 Not Modified?"
    back: "«Твоя копия актуальна, пользуйся дальше». Тела в ответе нет - по сети едут десятки байт вместо целого ресурса."
    tags: [validation]
  - id: caching-06
    front: "Стандартный шаблон кеширования фронтенда?"
    back: "HTML - коротко или no-cache; файлы с хешем содержимого в имени - max-age на год + immutable: изменение содержимого меняет имя файла."
    tags: [patterns]
  - id: caching-07
    front: "Почему ответ кешируется, даже если Cache-Control не задан?"
    back: "Браузеры применяют эвристику: обычно кешируют на долю времени с последнего изменения. Отсутствие заголовка - не отсутствие кеширования."
    tags: [pitfalls]
