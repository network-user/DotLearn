exercises:
  - id: cookies-cycle-001
    concept: cookies-sessions
    type: theory-quiz
    difficulty: 1
    prompt: "Каким заголовком сервер выдаёт браузеру cookie?"
    choices:
      - id: a
        text: "Set-Cookie в ответе."
      - id: b
        text: "Cookie в ответе."
      - id: c
        text: "Set-Cookie в запросе."
      - id: d
        text: "Authorization в ответе."
    correct: [a]
    explanation: "Направления жёсткие: сервер выдаёт метку заголовком Set-Cookie в ответе, а браузер возвращает её заголовком Cookie в каждом следующем запросе."
    hints:
      - "Вспомните метафору бейджа: кто его выдаёт и в каком сообщении - в запросе или в ответе?"
    variants:
      - prompt: "Кто прикладывает заголовок Cookie к последующим запросам на сайт?"
        choices:
          - id: a
            text: "Браузер, автоматически для каждого запроса к домену cookie."
          - id: b
            text: "Разработчик фронтенда, отдельным кодом для каждого запроса."
          - id: c
            text: "Сервер, пересылая cookie сам себе."
          - id: d
            text: "Пользователь, подтверждая отправку кликом."
        correct: [a]
        explanation: "В этом суть механизма: после Set-Cookie браузер сам прикладывает метку ко всем запросам на этот домен, включая запросы за картинками и стилями."
      - prompt: "Что из перечисленного вернётся серверу в заголовке Cookie после такого ответа: Set-Cookie: session=abc123; Max-Age=86400; HttpOnly?"
        choices:
          - id: a
            text: "Только пара session=abc123."
          - id: b
            text: "Вся строка вместе с Max-Age и HttpOnly."
          - id: c
            text: "Только атрибуты Max-Age=86400; HttpOnly."
          - id: d
            text: "Ничего: HttpOnly запрещает возвращать cookie."
        correct: [a]
        explanation: "Атрибуты - инструкции браузеру, они на сервер не возвращаются. Обратно летит только «имя=значение»: Cookie: session=abc123."

  - id: cookies-attrs-001
    concept: cookies-sessions
    type: fill-in-blanks
    difficulty: 2
    prompt: "Сервис входа ставит сессионную cookie по всем правилам: только HTTPS и недоступно для JavaScript. Впишите два атрибута."
    template: |
      Set-Cookie: session=abc123; Max-Age=86400; {{httpsattr}}; {{jsattr}}; SameSite=Lax
    blanks:
      httpsattr:
        accept: ['Secure', 'secure']
      jsattr:
        accept: ['HttpOnly', 'httponly', 'HTTPOnly', 'httpOnly']
    explanation: "Secure запрещает отправку по нешифрованному соединению, HttpOnly прячет cookie от document.cookie. Вместе с SameSite=Lax это стандартный набор для сессии входа."
    hints:
      - "Первый атрибут - про транспорт: метка не должна уходить по открытому HTTP."
      - "Второй атрибут - про доступ из скриптов на странице: XSS не должен дотянуться до сессии."
    variants:
      - prompt: "Сервер стирает cookie у браузера: тот же Set-Cookie, но с нулевым сроком жизни. Впишите атрибут со значением."
        template: |
          Set-Cookie: session=abc123; {{lifeattr}}
        blanks:
          lifeattr:
            accept: ['Max-Age=0', 'max-age=0', 'Max-age=0']
        explanation: "Отдельной команды удаления нет: сервер присылает ту же cookie с Max-Age=0, и браузер немедленно её стирает."
      - prompt: "Cookie не должна прикладываться к запросам, начатым с чужих сайтов, по нынешнему дефолту браузеров. Впишите атрибут со значением."
        template: |
          Set-Cookie: session=abc123; Secure; HttpOnly; {{siteattr}}
        blanks:
          siteattr:
            accept: ['SameSite=Lax', 'samesite=lax', 'SameSite=lax']
        explanation: "SameSite=Lax - нынешний дефолт браузеров: cookie не уходит при межсайтовых POST, что закрывает базовый сценарий CSRF."

  - id: cookies-predict-001
    concept: cookies-sessions
    type: predict-output
    difficulty: 2
    prompt: "Браузер получил этот ответ от www.ozon.ru. Какое значение он отправит в заголовке Cookie при следующем запросе на www.ozon.ru? Введите строку вида имя=значение."
    snippet: |
      HTTP/1.1 200 OK
      Set-Cookie: session=xyz789; Max-Age=86400; Path=/; HttpOnly
    expected:
      kind: scalar
      value: 'session=xyz789'
    explanation: "Обратно к серверу возвращается только пара «имя=значение». Атрибуты Max-Age, Path и HttpOnly - инструкции браузеру, в заголовок Cookie они не попадают."
    hints:
      - "Разделите строку Set-Cookie на саму метку и инструкции по обращению с ней: серверу возвращается только метка."
    variants:
      - prompt: "Скрипт на странице выполняет document.cookie после этого ответа. Увидит ли он cookie session? Ответьте строчными буквами: да или нет."
        snippet: |
          HTTP/1.1 200 OK
          Set-Cookie: session=xyz789; Secure; HttpOnly; SameSite=Lax
        expected:
          kind: scalar
          value: 'нет'
        explanation: "Атрибут HttpOnly прячет cookie от JavaScript: document.cookie её не вернёт. Именно поэтому HttpOnly обязателен для сессионных cookie - XSS не сможет украсть сессию."
      - prompt: "Пользователь закрыл браузер и открыл его назавтра. Переживёт ли эта cookie перезапуск браузера? Ответьте строчными буквами: да или нет."
        snippet: |
          HTTP/1.1 200 OK
          Set-Cookie: cart_preview=3items; Path=/
        expected:
          kind: scalar
          value: 'нет'
        explanation: "У cookie нет ни Max-Age, ни Expires - это сессионная cookie, она живёт до закрытия браузера. Пережить перезапуск может только cookie с явным сроком жизни."

  - id: cookies-sessions-design-001
    concept: cookies-sessions
    type: theory-quiz
    difficulty: 3
    prompt: "Банку нужно мгновенно разлогинивать пользователя по нажатию «выйти со всех устройств». Какая схема сессий подходит лучше и почему?"
    choices:
      - id: a
        text: "Серверные сессии: идентификатор в cookie, данные в Redis - удалил записи, и все бейджи мгновенно недействительны."
      - id: b
        text: "JWT с долгим сроком жизни: сервер ничего не хранит, значит и отзывать нечего."
      - id: c
        text: "Роль и логин в cookie открытым текстом: чтобы выйти, пользователь сам сотрёт cookie."
      - id: d
        text: "Любая схема одинакова: механизм отзыва встроен в сам протокол HTTP."
    correct: [a]
    explanation: "Мгновенный отзыв - сильная сторона серверных сессий: состояние лежит у сервера, удаление записи убивает сессию на всех устройствах сразу. Самодостаточный JWT валиден до истечения срока - сервер, который ничего не хранит, не может его «забыть». HTTP сам по себе никакого механизма сессий не даёт."
    hints:
      - "Ключевой вопрос: где лежит состояние сессии - у сервера или внутри самой метки? Отозвать можно только то, до чего дотягиваешься."
      - "Подписанный токен валиден, пока подпись верна и срок не вышел: что сервер может с этим сделать, если ничего о токене не хранит?"
