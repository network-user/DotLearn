exercises:
  - id: methods-verbs-001
    concept: methods
    type: theory-quiz
    difficulty: 1
    prompt: "The client wants to read a product card without changing anything. Which method fits?"
    choices:
      - id: a
        text: "GET"
      - id: b
        text: "POST"
      - id: c
        text: "PUT"
      - id: d
        text: "DELETE"
    correct: [a]
    explanation: "Reading without changes is GET: a safe method that the server, caches, and crawlers are free to repeat as many times as they like."
    hints:
      - "You need the method that changes nothing on the server: out of the five, only one qualifies, not counting HEAD."
    variants:
      - prompt: "The client submits data for a new form that doesn't have its own address on the server yet. Which method fits?"
        choices:
          - id: a
            text: "POST"
          - id: b
            text: "GET"
          - id: c
            text: "DELETE"
          - id: d
            text: "HEAD"
        correct: [a]
        explanation: "Creating a new resource in a collection is POST: the client sends the body to the collection, and the server assigns the address to the new resource."
      - prompt: "The client sends a user's full profile to replace the old version at a known address. Which method fits?"
        choices:
          - id: a
            text: "PUT"
          - id: b
            text: "PATCH"
          - id: c
            text: "POST"
          - id: d
            text: "GET"
        correct: [a]
        explanation: "Fully replacing a resource at its address is PUT. PATCH would send only the changed fields, and POST creates a new resource."

  - id: methods-idempotency-001
    concept: methods
    type: theory-quiz
    difficulty: 2
    prompt: "Which method is NOT idempotent: repeating it can change the server's state again?"
    choices:
      - id: a
        text: "POST"
      - id: b
        text: "GET"
      - id: c
        text: "PUT"
      - id: d
        text: "DELETE"
    correct: [a]
    explanation: "POST promises nothing: every repeat can create a new resource. GET changes nothing, PUT lays the same state over the same state, and a repeated DELETE doesn't make a resource 'more deleted'."
    hints:
      - "Idempotency means: ten repeats leave the server in the same state as one. Which method creates something new on every repeat?"
    variants:
      - prompt: "The connection dropped and the client got no response. Which request can safely be resent without risking the server's state?"
        choices:
          - id: a
            text: "PUT /orders/1042 with the same body."
          - id: b
            text: "POST /orders with the same body."
          - id: c
            text: "POST /payments with the same body."
          - id: d
            text: "None: any repeated request is risky."
        correct: [a]
        explanation: "PUT is idempotent: repeating it writes the same state over the same state. Repeating POST can create a second order or a second charge."
      - prompt: "Which pair of properties correctly describes the GET method?"
        choices:
          - id: a
            text: "Safe and idempotent."
          - id: b
            text: "Safe but not idempotent."
          - id: c
            text: "Idempotent but changes server state."
          - id: d
            text: "Neither safe nor idempotent."
        correct: [a]
        explanation: "GET only reads, so it's safe. And anything safe is automatically idempotent: zero changes no matter how many times you repeat it - still zero changes."

  - id: methods-blanks-001
    concept: methods
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the request: the client changes only the quantity on order 1042, without sending the whole resource."
    template: |
      {{method}} /orders/1042 HTTP/1.1
      Host: api.wildberries.ru
      Content-Type: application/json

      {"quantity": 5}
    blanks:
      method:
        accept: ['PATCH', 'patch', 'Patch']
    explanation: "The body holds only the changed field, not the whole order - that's a partial update, the PATCH method. PUT would require sending the resource's complete new state."
    hints:
      - "Look at the body: it's one field out of many. The client sends the changes, not the whole resource."
      - "Of the two update methods, one replaces everything, the other edits a part. Here you need the second one."
    variants:
      - prompt: "Complete the request: the client deletes order 1042."
        template: |
          {{method}} /orders/1042 HTTP/1.1
          Host: api.wildberries.ru
        blanks:
          method:
            accept: ['DELETE', 'delete', 'Delete']
        explanation: "Deleting a resource at its address is DELETE. It's idempotent: repeating it doesn't change the outcome, the resource stays deleted."
      - prompt: "Complete the request: the client creates a new order in the collection."
        template: |
          {{method}} /orders HTTP/1.1
          Host: api.wildberries.ru
          Content-Type: application/json

          {"product_id": 77, "quantity": 2}
        blanks:
          method:
            accept: ['POST', 'post', 'Post']
        explanation: "A new resource without a known address is created via POST to the collection: the path names /orders, and the server assigns the order number."

  - id: methods-retry-004
    concept: methods
    type: theory-quiz
    difficulty: 4
    prompt: "A payment service sent POST /payments, and the response was lost to a network drop. The client doesn't know whether the payment went through. Which strategy is correct under HTTP semantics?"
    choices:
      - id: a
        text: "Resend the request with the same idempotency key in a header, so the server recognizes the duplicate."
      - id: b
        text: "Just resend the same POST: the protocol guarantees the server will drop the duplicate."
      - id: c
        text: "Swap POST for GET with the same parameters: GET is idempotent, so resending is safe."
      - id: d
        text: "Do nothing: since no response arrived, the operation surely didn't happen."
    correct: [a]
    explanation: "POST is not idempotent, and the protocol doesn't filter out duplicates - a blind retry risks a second charge. 'No response' doesn't mean 'no operation': the request may have gone through. That's why payment APIs accept an idempotency key: the server recognizes the repeat by it and returns the stored response instead of charging again."
    hints:
      - "Losing the response doesn't mean losing the request: the server may have completed the operation. Assume the client has no way of knowing."
      - "Since the method gives no repeat guarantee, you need to add one on top: recall the mechanism from the deep dive on payment APIs."
