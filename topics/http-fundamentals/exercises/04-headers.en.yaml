exercises:
  - id: headers-accept-ct-001
    concept: headers
    type: theory-quiz
    difficulty: 1
    prompt: "How does Accept differ from Content-Type?"
    choices:
      - id: a
        text: "Accept is the client's wish about the response format, Content-Type is a fact about the current message's body format."
      - id: b
        text: "They're synonyms: both describe the body's format."
      - id: c
        text: "Accept is used only by the server, Content-Type only by the client."
      - id: d
        text: "Accept describes compression, Content-Type the response's language."
    correct: [a]
    explanation: "Accept in a request says 'here's what I'm willing to accept', while Content-Type is set on any message that has a body and says 'here's what's inside'. A POST with JSON uses both at once."
    hints:
      - "One header looks to the future (what response is wanted), the other describes the present (what's in the body)."
    variants:
      - prompt: "Which header does the client use to say which response formats it's willing to accept?"
        choices:
          - id: a
            text: "Accept"
          - id: b
            text: "Content-Type"
          - id: c
            text: "User-Agent"
          - id: d
            text: "Host"
        correct: [a]
        explanation: "Wishes about the response format travel in Accept, optionally with a list of options and q weights. Content-Type describes the body of the message being sent right now."
      - prompt: "A mobile app makes a POST with a JSON body and wants JSON back. Which pair of request headers is correct?"
        choices:
          - id: a
            text: "Content-Type: application/json and Accept: application/json."
          - id: b
            text: "Only Accept: application/json - that's enough for the body too."
          - id: c
            text: "Only Content-Type: application/json - Accept isn't used in requests."
          - id: d
            text: "Accept-Encoding: application/json and Content-Language: application/json."
        correct: [a]
        explanation: "These are two different questions: Content-Type describes the request body, Accept the desired response format. Sending JSON while expecting JSON back needs both."

  - id: headers-negotiation-001
    concept: headers
    type: predict-output
    difficulty: 2
    prompt: "The server offers representations application/json and text/html. Which MIME type will it pick for the response based on the q weights in this request?"
    snippet: |
      GET /films/301 HTTP/1.1
      Host: api.kinopoisk.ru
      Accept: application/json, text/html;q=0.8, */*;q=0.1
    expected:
      kind: scalar
      value: 'application/json'
    explanation: "A weight without an explicit q equals 1, so application/json (q=1) outranks text/html (q=0.8). The server can serve JSON, so it picks it."
    hints:
      - "Compare the candidates' weights: whoever has no q gets the default weight of 1."
    variants:
      - prompt: "The server only has text/html and application/xml. Which MIME type will it pick based on the q weights in this request?"
        snippet: |
          GET /report HTTP/1.1
          Host: api.sber.ru
          Accept: application/json;q=0.4, application/xml;q=0.9, text/html;q=0.5
        expected:
          kind: scalar
          value: 'application/xml'
        explanation: "JSON isn't available on the server, so the available candidates are compared: application/xml at weight 0.9 beats text/html at weight 0.5."
      - prompt: "The server compressed the response body with gzip. What value must it set in the Content-Encoding header?"
        snippet: |
          GET /docs HTTP/1.1
          Host: habr.com
          Accept-Encoding: gzip, br
        expected:
          kind: scalar
          value: 'gzip'
        explanation: "The Accept-Encoding and Content-Encoding pair works like Accept and Content-Type: the client listed acceptable algorithms, the server declares the one actually applied - gzip."

  - id: headers-blanks-001
    concept: headers
    type: fill-in-blanks
    difficulty: 2
    prompt: "A mobile app sends JSON and expects JSON back. Fill in the names of two headers."
    template: |
      POST /orders HTTP/1.1
      Host: api.ozon.ru
      {{bodyheader}}: application/json
      {{wishheader}}: application/json

      {"product_id": 77}
    blanks:
      bodyheader:
        accept: ['Content-Type', 'content-type', 'Content-type']
      wishheader:
        accept: ['Accept', 'accept']
    explanation: "Content-Type describes the request body (the client is sending JSON), Accept expresses the wish for the response format. Without Content-Type the server might fail to parse the body's fields."
    hints:
      - "The first header is a fact about the body leaving for the server right now."
      - "The second header is a wish about the future response, the same 'willing to accept' family."
    variants:
      - prompt: "A client from Kazan wants the response in Russian and is fine with gzip compression. Fill in the names of two headers."
        template: |
          GET /docs HTTP/1.1
          Host: habr.com
          {{langheader}}: ru-RU, ru;q=0.9
          {{encheader}}: gzip
        blanks:
          langheader:
            accept: ['Accept-Language', 'accept-language']
          encheader:
            accept: ['Accept-Encoding', 'accept-encoding']
        explanation: "Language negotiation is handled by Accept-Language, compression by Accept-Encoding. Both pairs work the same way as Accept and Content-Type."
      - prompt: "The server responds with a Russian version of the page and warns caches that the response depends on the client's language. Fill in the names of two response headers."
        template: |
          HTTP/1.1 200 OK
          Content-Type: text/html; charset=utf-8
          {{langheader}}: ru
          {{varyheader}}: Accept-Language
        blanks:
          langheader:
            accept: ['Content-Language', 'content-language']
          varyheader:
            accept: ['Vary', 'vary']
        explanation: "The fact about the body's language is reported by Content-Language, and Vary: Accept-Language tells caches: 'don't serve this response to a client with a different language.'"

  - id: headers-trust-001
    concept: headers
    type: theory-quiz
    difficulty: 3
    prompt: "The client sent Accept: application/xml. The server responded 200 with header Content-Type: application/json. How should this be understood, and what should the client do?"
    choices:
      - id: a
        text: "This is normal: Accept is a wish, the server may serve what it has. The client must check the response's Content-Type before parsing the body."
      - id: b
        text: "This violates the protocol: the server must return 406 if it can't give the requested format."
      - id: c
        text: "This can't happen: the server is physically unable to respond with a format outside the Accept list."
      - id: d
        text: "The client should parse the body as XML: its Accept outranks the actual Content-Type."
    correct: [a]
    explanation: "The standard allows the server to ignore the wish and serve an available representation: 'at least something' is usually more useful than a 406 error. The only reliable source of truth about the body's format is the response's Content-Type."
    hints:
      - "Recall how a wish differs from an order: which of the two headers describes reality?"
      - "A 406 response is the server's right, not its duty. So what remains the source of truth for the client's parser?"
