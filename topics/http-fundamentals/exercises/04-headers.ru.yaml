exercises:
  - id: headers-accept-ct-001
    concept: headers
    type: theory-quiz
    difficulty: 1
    prompt: "Чем Accept отличается от Content-Type?"
    choices:
      - id: a
        text: "Accept - пожелание клиента о формате ответа, Content-Type - факт о формате тела текущего сообщения."
      - id: b
        text: "Это синонимы: оба описывают формат тела."
      - id: c
        text: "Accept используется только сервером, Content-Type - только клиентом."
      - id: d
        text: "Accept описывает сжатие, Content-Type - язык ответа."
    correct: [a]
    explanation: "Accept в запросе говорит «вот что я готов принять», а Content-Type ставится у любого сообщения с телом и говорит «вот что внутри». POST с JSON использует оба сразу."
    hints:
      - "Один заголовок смотрит в будущее (какой ответ хочется), другой описывает настоящее (что лежит в теле)."
    variants:
      - prompt: "Каким заголовком клиент сообщает, какие форматы ответа он готов принять?"
        choices:
          - id: a
            text: "Accept"
          - id: b
            text: "Content-Type"
          - id: c
            text: "User-Agent"
          - id: d
            text: "Host"
        correct: [a]
        explanation: "Пожелания о формате ответа передаёт Accept, при необходимости со списком вариантов и весами q. Content-Type описывает тело уже отправляемого сообщения."
      - prompt: "Мобильное приложение делает POST с JSON-телом и хочет получить JSON в ответ. Какая пара заголовков запроса корректна?"
        choices:
          - id: a
            text: "Content-Type: application/json и Accept: application/json."
          - id: b
            text: "Только Accept: application/json - этого достаточно и для тела."
          - id: c
            text: "Только Content-Type: application/json - Accept в запросах не используется."
          - id: d
            text: "Accept-Encoding: application/json и Content-Language: application/json."
        correct: [a]
        explanation: "Это два разных вопроса: Content-Type описывает тело запроса, Accept - желаемый формат ответа. При отправке JSON с ожиданием JSON нужны оба."

  - id: headers-negotiation-001
    concept: headers
    type: predict-output
    difficulty: 2
    prompt: "У сервера есть представления application/json и text/html. Какой MIME-тип он выберет для ответа по весам q из этого запроса?"
    snippet: |
      GET /films/301 HTTP/1.1
      Host: api.kinopoisk.ru
      Accept: application/json, text/html;q=0.8, */*;q=0.1
    expected:
      kind: scalar
      value: 'application/json'
    explanation: "Вес без явного q равен 1, поэтому application/json (q=1) приоритетнее text/html (q=0.8). Сервер умеет отдавать JSON, значит выберет его."
    hints:
      - "Сравните веса кандидатов: у кого q не указан, тот получает вес 1 по умолчанию."
    variants:
      - prompt: "У сервера есть только text/html и application/xml. Какой MIME-тип он выберет по весам q из этого запроса?"
        snippet: |
          GET /report HTTP/1.1
          Host: api.sber.ru
          Accept: application/json;q=0.4, application/xml;q=0.9, text/html;q=0.5
        expected:
          kind: scalar
          value: 'application/xml'
        explanation: "JSON недоступен на сервере, поэтому сравниваются доступные кандидаты: application/xml с весом 0.9 обгоняет text/html с весом 0.5."
      - prompt: "Сервер сжал тело ответа алгоритмом gzip. Какое значение он обязан поставить в заголовок Content-Encoding?"
        snippet: |
          GET /docs HTTP/1.1
          Host: habr.com
          Accept-Encoding: gzip, br
        expected:
          kind: scalar
          value: 'gzip'
        explanation: "Пара Accept-Encoding и Content-Encoding работает как Accept и Content-Type: клиент перечислил приемлемые алгоритмы, сервер объявляет фактически применённый - gzip."

  - id: headers-blanks-001
    concept: headers
    type: fill-in-blanks
    difficulty: 2
    prompt: "Мобильное приложение отправляет JSON и ждёт JSON в ответ. Впишите имена двух заголовков."
    template: |
      POST /orders HTTP/1.1
      Host: api.ozon.ru
      {{bodyheader}}: application/json
      {{wishheader}}: application/json

      {"product_id": 77}
    blanks:
      bodyheader:
        accept: ['Content-Type', 'content-type', 'Content-type']
      wishheader:
        accept: ['Accept', 'accept']
    explanation: "Content-Type описывает тело запроса (клиент шлёт JSON), Accept выражает пожелание о формате ответа. Без Content-Type сервер может не разобрать поля тела."
    hints:
      - "Первый заголовок - факт о теле, которое уезжает на сервер прямо сейчас."
      - "Второй заголовок - пожелание о будущем ответе, то самое семейство «готов принять»."
    variants:
      - prompt: "Клиент из Казани хочет ответ по-русски и согласен на сжатие gzip. Впишите имена двух заголовков."
        template: |
          GET /docs HTTP/1.1
          Host: habr.com
          {{langheader}}: ru-RU, ru;q=0.9
          {{encheader}}: gzip
        blanks:
          langheader:
            accept: ['Accept-Language', 'accept-language']
          encheader:
            accept: ['Accept-Encoding', 'accept-encoding']
        explanation: "Переговоры о языке ведёт Accept-Language, о сжатии - Accept-Encoding. Обе пары работают по той же схеме, что Accept и Content-Type."
      - prompt: "Сервер отвечает русской версией страницы и предупреждает кеши, что ответ зависит от языка клиента. Впишите имена двух заголовков ответа."
        template: |
          HTTP/1.1 200 OK
          Content-Type: text/html; charset=utf-8
          {{langheader}}: ru
          {{varyheader}}: Accept-Language
        blanks:
          langheader:
            accept: ['Content-Language', 'content-language']
          varyheader:
            accept: ['Vary', 'vary']
        explanation: "Факт о языке тела сообщает Content-Language, а Vary: Accept-Language говорит кешам: «не отдавай этот ответ клиенту с другим языком»."

  - id: headers-trust-001
    concept: headers
    type: theory-quiz
    difficulty: 3
    prompt: "Клиент отправил Accept: application/xml. Сервер ответил 200 с заголовком Content-Type: application/json. Как это понимать и что делать клиенту?"
    choices:
      - id: a
        text: "Так бывает: Accept - пожелание, сервер вправе отдать что есть. Клиент должен смотреть на Content-Type ответа, прежде чем парсить тело."
      - id: b
        text: "Это нарушение протокола: сервер обязан вернуть 406, если не может дать запрошенный формат."
      - id: c
        text: "Такого не бывает: сервер физически не может ответить форматом вне списка Accept."
      - id: d
        text: "Клиент должен парсить тело как XML: его Accept главнее фактического Content-Type."
    correct: [a]
    explanation: "Стандарт разрешает серверу проигнорировать пожелание и отдать доступное представление: «хоть что-то» обычно полезнее ошибки 406. Единственный надёжный источник правды о формате тела - Content-Type ответа."
    hints:
      - "Вспомните, чем пожелание отличается от приказа: какой из двух заголовков описывает реальность?"
      - "Ответ 406 - право сервера, а не обязанность. Что тогда остаётся источником правды для парсера клиента?"
