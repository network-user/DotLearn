exercises:
  - id: cookies-cycle-001
    concept: cookies-sessions
    type: theory-quiz
    difficulty: 1
    prompt: "Which header does the server use to hand a cookie to the browser?"
    choices:
      - id: a
        text: "Set-Cookie in the response."
      - id: b
        text: "Cookie in the response."
      - id: c
        text: "Set-Cookie in the request."
      - id: d
        text: "Authorization in the response."
    correct: [a]
    explanation: "The directions are strict: the server issues the tag via the Set-Cookie header in the response, and the browser returns it via the Cookie header in every following request."
    hints:
      - "Recall the badge metaphor: who issues it, and in which message - request or response?"
    variants:
      - prompt: "Who attaches the Cookie header to subsequent requests to a site?"
        choices:
          - id: a
            text: "The browser, automatically, for every request to the cookie's domain."
          - id: b
            text: "The frontend developer, with separate code for each request."
          - id: c
            text: "The server, forwarding the cookie to itself."
          - id: d
            text: "The user, confirming the send with a click."
        correct: [a]
        explanation: "That's the essence of the mechanism: after Set-Cookie, the browser attaches the tag to all requests to that domain on its own, including requests for images and stylesheets."
      - prompt: "Which of the following will be returned to the server in the Cookie header after this response: Set-Cookie: session=abc123; Max-Age=86400; HttpOnly?"
        choices:
          - id: a
            text: "Only the pair session=abc123."
          - id: b
            text: "The whole string including Max-Age and HttpOnly."
          - id: c
            text: "Only the attributes Max-Age=86400; HttpOnly."
          - id: d
            text: "Nothing: HttpOnly forbids returning the cookie."
        correct: [a]
        explanation: "The attributes are instructions to the browser; they aren't sent back to the server. Only 'name=value' flies back: Cookie: session=abc123."

  - id: cookies-attrs-001
    concept: cookies-sessions
    type: fill-in-blanks
    difficulty: 2
    prompt: "A login service sets a session cookie by the book: HTTPS only and inaccessible to JavaScript. Fill in two attributes."
    template: |
      Set-Cookie: session=abc123; Max-Age=86400; {{httpsattr}}; {{jsattr}}; SameSite=Lax
    blanks:
      httpsattr:
        accept: ['Secure', 'secure']
      jsattr:
        accept: ['HttpOnly', 'httponly', 'HTTPOnly', 'httpOnly']
    explanation: "Secure forbids sending over an unencrypted connection, HttpOnly hides the cookie from document.cookie. Together with SameSite=Lax, this is the standard set for a login session."
    hints:
      - "The first attribute is about transport: the tag mustn't travel over plain HTTP."
      - "The second attribute is about access from scripts on the page: XSS shouldn't be able to reach the session."
    variants:
      - prompt: "The server clears a cookie from the browser: the same Set-Cookie, but with zero lifetime. Fill in the attribute with its value."
        template: |
          Set-Cookie: session=abc123; {{lifeattr}}
        blanks:
          lifeattr:
            accept: ['Max-Age=0', 'max-age=0', 'Max-age=0']
        explanation: "There's no dedicated delete command: the server sends the same cookie with Max-Age=0, and the browser wipes it immediately."
      - prompt: "A cookie must not be attached to requests started from other sites, per the current browser default. Fill in the attribute with its value."
        template: |
          Set-Cookie: session=abc123; Secure; HttpOnly; {{siteattr}}
        blanks:
          siteattr:
            accept: ['SameSite=Lax', 'samesite=lax', 'SameSite=lax']
        explanation: "SameSite=Lax is the current browser default: the cookie doesn't travel with cross-site POSTs, which closes the basic CSRF scenario."

  - id: cookies-predict-001
    concept: cookies-sessions
    type: predict-output
    difficulty: 2
    prompt: "The browser received this response from www.ozon.ru. What value will it send in the Cookie header on the next request to www.ozon.ru? Enter a string of the form name=value."
    snippet: |
      HTTP/1.1 200 OK
      Set-Cookie: session=xyz789; Max-Age=86400; Path=/; HttpOnly
    expected:
      kind: scalar
      value: 'session=xyz789'
    explanation: "Only the 'name=value' pair travels back to the server. The Max-Age, Path, and HttpOnly attributes are instructions to the browser; they don't end up in the Cookie header."
    hints:
      - "Split the Set-Cookie string into the tag itself and the handling instructions: only the tag is returned to the server."
    variants:
      - prompt: "A script on the page runs document.cookie after this response. Will it see the session cookie? Answer in lowercase: yes or no."
        snippet: |
          HTTP/1.1 200 OK
          Set-Cookie: session=xyz789; Secure; HttpOnly; SameSite=Lax
        expected:
          kind: scalar
          value: 'no'
        explanation: "The HttpOnly attribute hides the cookie from JavaScript: document.cookie won't return it. That's exactly why HttpOnly is mandatory for session cookies - XSS can't steal the session."
      - prompt: "The user closed the browser and reopened it the next day. Will this cookie survive the browser restart? Answer in lowercase: yes or no."
        snippet: |
          HTTP/1.1 200 OK
          Set-Cookie: cart_preview=3items; Path=/
        expected:
          kind: scalar
          value: 'no'
        explanation: "The cookie has neither Max-Age nor Expires - it's a session cookie, living only until the browser closes. Only a cookie with an explicit lifetime can survive a restart."

  - id: cookies-sessions-design-001
    concept: cookies-sessions
    type: theory-quiz
    difficulty: 3
    prompt: "A bank needs to instantly log a user out on pressing 'sign out everywhere'. Which session scheme fits better, and why?"
    choices:
      - id: a
        text: "Server-side sessions: an identifier in the cookie, data in Redis - delete the records, and every badge is instantly invalid."
      - id: b
        text: "Long-lived JWT: the server stores nothing, so there's nothing to revoke."
      - id: c
        text: "Role and login in the cookie as plain text: to sign out, the user erases the cookie themselves."
      - id: d
        text: "Any scheme works the same: a revocation mechanism is built into HTTP itself."
    correct: [a]
    explanation: "Instant revocation is the strong side of server-side sessions: the state lives on the server, deleting the record kills the session on every device at once. A self-contained JWT stays valid until it expires - a server that stores nothing can't 'forget' it. HTTP by itself provides no session mechanism at all."
    hints:
      - "The key question: where does the session state live - on the server or inside the tag itself? You can only revoke what you can reach."
      - "A signed token is valid as long as the signature checks out and it hasn't expired: what can the server do about that if it stores nothing about the token?"
