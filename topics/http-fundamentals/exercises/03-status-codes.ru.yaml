exercises:
  - id: status-classes-001
    concept: status-codes
    type: theory-quiz
    difficulty: 1
    prompt: "Ответ пришёл с кодом 503. К какому классу он относится и что это значит?"
    choices:
      - id: a
        text: "5xx: ошибка на стороне сервера."
      - id: b
        text: "4xx: клиент прислал плохой запрос."
      - id: c
        text: "3xx: ресурс переехал на другой адрес."
      - id: d
        text: "2xx: запрос успешно выполнен."
    correct: [a]
    explanation: "Класс задаёт первая цифра: 503 начинается с пятёрки, значит проблема на сервере. Конкретно 503 - «временно не обслуживаю»: перегрузка или деплой."
    hints:
      - "Смотрите только на первую цифру кода: она делит все коды на пять классов."
    variants:
      - prompt: "Ответ пришёл с кодом 404. Кто должен исправлять ситуацию по семантике классов?"
        choices:
          - id: a
            text: "Клиент: 4xx означает проблему в самом запросе, например неверный адрес."
          - id: b
            text: "Сервер: 4xx означает падение приложения."
          - id: c
            text: "Никто: 4xx - информационный класс."
          - id: d
            text: "Прокси: 4xx всегда рождается в nginx."
        correct: [a]
        explanation: "Класс 4xx - ошибка клиента: запрос указывает на ресурс, которого нет. Сервер работает штатно, исправлять нужно запрос или ссылку."
      - prompt: "Какой класс кодов сообщает, что ресурс нужно искать по другому адресу?"
        choices:
          - id: a
            text: "3xx"
          - id: b
            text: "2xx"
          - id: c
            text: "4xx"
          - id: d
            text: "1xx"
        correct: [a]
        explanation: "Редиректы - класс 3xx: сервер отвечает кодом вроде 301 или 302 и кладёт новый адрес в заголовок Location."

  - id: status-predict-001
    concept: status-codes
    type: predict-output
    difficulty: 2
    prompt: "Сервер следует семантике HTTP. Заказа с номером 999999 никогда не существовало. Какой числовой статус-код вернёт сервер?"
    snippet: |
      GET /orders/999999 HTTP/1.1
      Host: api.wildberries.ru
      Authorization: Bearer valid-token
    expected:
      kind: scalar
      value: 404
    explanation: "Запрос корректен, клиент опознан, но ресурса по такому адресу нет - это 404 Not Found: класс 4xx, потому что исправлять нужно адрес в запросе, а не сервер."
    hints:
      - "Сервер жив и запрос разобрал, проблема в том, на что запрос указывает. Это класс ошибок клиента."
    variants:
      - prompt: "Эндпоинт требует аутентификации, а запрос пришёл вовсе без токена. Какой числовой статус-код вернёт сервер, следующий семантике HTTP?"
        snippet: |
          GET /profile HTTP/1.1
          Host: api.gosuslugi.ru
        expected:
          kind: scalar
          value: 401
        explanation: "Клиент не предъявил учётных данных - сервер отвечает 401 Unauthorized: «я вас не знаю, представьтесь». 403 был бы, если бы клиент был опознан, но не имел прав."
      - prompt: "Запрос валиден, но при его обработке в коде приложения выбросилось необработанное исключение. Какой числовой статус-код увидит клиент?"
        snippet: |
          POST /orders HTTP/1.1
          Host: api.wildberries.ru
          Content-Type: application/json

          {"product_id": 77, "quantity": 2}
        expected:
          kind: scalar
          value: 500
        explanation: "Необработанное исключение в приложении - это 500 Internal Server Error: запрос нормальный, не справился сервер. Чинить нужно код, а не запрос."

  - id: status-blanks-001
    concept: status-codes
    type: fill-in-blanks
    difficulty: 2
    prompt: "Страница навсегда переехала на новый адрес. Дополните ответ сервера: код и заголовок с новым адресом."
    template: |
      HTTP/1.1 {{code}} Moved Permanently
      {{locheader}}: https://market.yandex.ru/catalog
    blanks:
      code:
        accept: ['301']
      locheader:
        accept: ['Location', 'location']
    explanation: "Постоянный переезд - 301 Moved Permanently, а новый адрес сервер кладёт в заголовок Location: браузер сам сделает по нему следующий запрос."
    hints:
      - "«Навсегда» - ключевое слово: из двух главных редиректов нужен постоянный."
      - "Заголовок с новым адресом - тот самый, по которому браузер делает следующий запрос."
    variants:
      - prompt: "DELETE выполнен успешно, рассказывать в теле нечего. Дополните стартовую строку ответа: код и фразу."
        template: |
          HTTP/1.1 {{code}} No Content
        blanks:
          code:
            accept: ['204']
        explanation: "Успех без тела - 204 No Content: типичный ответ на удачный DELETE. Класс 2xx, но груза в ответе нет."
      - prompt: "Клиент шлёт запросы слишком часто. Дополните ответ: код и заголовок «когда можно вернуться»."
        template: |
          HTTP/1.1 {{code}} Too Many Requests
          {{retryheader}}: 60
        blanks:
          code:
            accept: ['429']
          retryheader:
            accept: ['Retry-After', 'retry-after']
        explanation: "Ограничение частоты - 429 Too Many Requests, а пауза в секундах передаётся заголовком Retry-After: вежливый клиент ждёт указанное время, а не молотит повторами."

  - id: status-pairs-001
    concept: status-codes
    type: theory-quiz
    difficulty: 3
    prompt: "Залогиненный курьер сервиса доставки открывает страницу администратора и получает отказ. Какой код корректен и почему?"
    choices:
      - id: a
        text: "403: пользователь опознан, но прав на этот ресурс у него нет."
      - id: b
        text: "401: любая проблема с доступом - это 401."
      - id: c
        text: "404: доступ запрещать нельзя, лучше сказать «нет такой страницы»."
      - id: d
        text: "400: запрос к чужой странице - это плохой запрос."
    correct: [a]
    explanation: "Токен валиден, личность известна - аутентификация пройдена. Не хватает прав, а это авторизация: 403 Forbidden. 401 отправил бы пользователя логиниться заново, что бессмысленно. Отдавать 404 ради маскировки - осознанная практика некоторых сервисов, но по умолчанию семантика требует 403."
    hints:
      - "Разделите два вопроса: «знает ли сервер, кто это?» и «можно ли этому кому-то сюда?». Здесь провален только второй."
      - "401 - про аутентификацию, 403 - про авторизацию. Курьер уже залогинен."
