exercises:
  - id: methods-verbs-001
    concept: methods
    type: theory-quiz
    difficulty: 1
    prompt: "Клиент хочет прочитать карточку товара, ничего не меняя. Какой метод подходит?"
    choices:
      - id: a
        text: "GET"
      - id: b
        text: "POST"
      - id: c
        text: "PUT"
      - id: d
        text: "DELETE"
    correct: [a]
    explanation: "Чтение без изменений - это GET: безопасный метод, который сервер, кеши и роботы вправе повторять сколько угодно."
    hints:
      - "Нужен метод, который ничего не меняет на сервере: из пятёрки такой только один, не считая HEAD."
    variants:
      - prompt: "Клиент отправляет данные новой анкеты, у которой ещё нет своего адреса на сервере. Какой метод подходит?"
        choices:
          - id: a
            text: "POST"
          - id: b
            text: "GET"
          - id: c
            text: "DELETE"
          - id: d
            text: "HEAD"
        correct: [a]
        explanation: "Создание нового ресурса в коллекции - это POST: клиент шлёт тело в коллекцию, а адрес новому ресурсу присваивает сервер."
      - prompt: "Клиент присылает профиль пользователя целиком, чтобы заменить старую версию по известному адресу. Какой метод подходит?"
        choices:
          - id: a
            text: "PUT"
          - id: b
            text: "PATCH"
          - id: c
            text: "POST"
          - id: d
            text: "GET"
        correct: [a]
        explanation: "Полная замена ресурса по его адресу - это PUT. PATCH прислал бы только изменённые поля, а POST создаёт новый ресурс."

  - id: methods-idempotency-001
    concept: methods
    type: theory-quiz
    difficulty: 2
    prompt: "Какой из методов НЕ идемпотентен: его повтор может изменить состояние сервера ещё раз?"
    choices:
      - id: a
        text: "POST"
      - id: b
        text: "GET"
      - id: c
        text: "PUT"
      - id: d
        text: "DELETE"
    correct: [a]
    explanation: "POST ничего не обещает: каждый повтор может создать новый ресурс. GET ничего не меняет, PUT кладёт то же состояние поверх того же, повторный DELETE не делает ресурс «ещё удалённее»."
    hints:
      - "Идемпотентность означает: десять повторов оставят сервер в том же состоянии, что и один. Какой метод при каждом повторе создаёт что-то новое?"
    variants:
      - prompt: "Интернет оборвался, и клиент не получил ответ. Какой запрос можно смело отправить повторно, не рискуя состоянием сервера?"
        choices:
          - id: a
            text: "PUT /orders/1042 с тем же телом."
          - id: b
            text: "POST /orders с тем же телом."
          - id: c
            text: "POST /payments с тем же телом."
          - id: d
            text: "Никакой: любой повтор запроса опасен."
        correct: [a]
        explanation: "PUT идемпотентен: повтор запишет то же состояние поверх того же. Повтор POST может создать второй заказ или второе списание."
      - prompt: "Какая пара свойств верно описывает метод GET?"
        choices:
          - id: a
            text: "Безопасный и идемпотентный."
          - id: b
            text: "Безопасный, но не идемпотентный."
          - id: c
            text: "Идемпотентный, но меняет состояние сервера."
          - id: d
            text: "Ни безопасный, ни идемпотентный."
        correct: [a]
        explanation: "GET только читает, значит он безопасный. А всё безопасное автоматически идемпотентно: ноль изменений сколько ни повторяй - всё равно ноль изменений."

  - id: methods-blanks-001
    concept: methods
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните запрос: клиент меняет у заказа 1042 только количество, не присылая ресурс целиком."
    template: |
      {{method}} /orders/1042 HTTP/1.1
      Host: api.wildberries.ru
      Content-Type: application/json

      {"quantity": 5}
    blanks:
      method:
        accept: ['PATCH', 'patch', 'Patch']
    explanation: "В теле только изменяемое поле, а не весь заказ - это частичное обновление, метод PATCH. PUT потребовал бы прислать полное новое состояние ресурса."
    hints:
      - "Смотрите на тело: там одно поле из многих. Клиент присылает изменения, а не ресурс целиком."
      - "Из двух методов обновления один заменяет всё, другой правит часть. Здесь нужен второй."
    variants:
      - prompt: "Дополните запрос: клиент удаляет заказ 1042."
        template: |
          {{method}} /orders/1042 HTTP/1.1
          Host: api.wildberries.ru
        blanks:
          method:
            accept: ['DELETE', 'delete', 'Delete']
        explanation: "Удаление ресурса по адресу - DELETE. Он идемпотентен: повтор не изменит итог, ресурс так и останется удалённым."
      - prompt: "Дополните запрос: клиент создаёт новый заказ в коллекции."
        template: |
          {{method}} /orders HTTP/1.1
          Host: api.wildberries.ru
          Content-Type: application/json

          {"product_id": 77, "quantity": 2}
        blanks:
          method:
            accept: ['POST', 'post', 'Post']
        explanation: "Новый ресурс без известного адреса создаётся через POST в коллекцию: путь называет /orders, а номер заказу присвоит сервер."

  - id: methods-retry-004
    concept: methods
    type: theory-quiz
    difficulty: 4
    prompt: "Платёжный сервис отправил POST /payments, ответ потерялся из-за обрыва сети. Клиент не знает, прошёл ли платёж. Какая стратегия корректна с точки зрения HTTP-семантики?"
    choices:
      - id: a
        text: "Повторить запрос с тем же ключом идемпотентности в заголовке, чтобы сервер распознал дубль."
      - id: b
        text: "Просто повторить тот же POST: протокол гарантирует, что сервер отбросит дубликат."
      - id: c
        text: "Заменить POST на GET с теми же параметрами: GET идемпотентен, значит повтор безопасен."
      - id: d
        text: "Ничего не делать: раз ответ не пришёл, операция точно не выполнилась."
    correct: [a]
    explanation: "POST не идемпотентен, и протокол дублей не отсеивает - слепой повтор рискует вторым списанием. «Ответ не пришёл» не значит «операция не выполнилась»: запрос мог дойти. Поэтому платёжные API принимают ключ идемпотентности: сервер по нему узнаёт повтор и возвращает сохранённый ответ вместо повторного списания."
    hints:
      - "Потеря ответа не означает потерю запроса: сервер мог выполнить операцию. Исходите из того, что клиент этого не знает."
      - "Раз метод не даёт гарантий повтора, гарантию нужно добавить поверх: вспомните механизм из deep dive про платёжные API."
