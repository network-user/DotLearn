exercises:
  - id: https-basics-001
    concept: https-tls
    type: theory-quiz
    difficulty: 1
    prompt: "What is HTTPS in relation to HTTP?"
    choices:
      - id: a
        text: "The same HTTP, but carried inside an encrypted TLS channel."
      - id: b
        text: "A different protocol with its own methods and status codes."
      - id: c
        text: "HTTP where only the user's password is encrypted."
      - id: d
        text: "An accelerated binary version of HTTP."
    correct: [a]
    explanation: "HTTPS doesn't change the semantics: the methods, codes, headers, and cookies stay the same. What changes is the transport - first a TLS channel is established, and then plain HTTP travels inside it."
    hints:
      - "Recall the metaphor from the theory: the same letter, but a different envelope."
    variants:
      - prompt: "What three guarantees does TLS provide?"
        choices:
          - id: a
            text: "Confidentiality, integrity, server authentication."
          - id: b
            text: "Speed, compression, caching."
          - id: c
            text: "Client anonymity, hiding the domain, hiding the IP."
          - id: d
            text: "Availability, fault tolerance, load balancing."
        correct: [a]
        explanation: "TLS encrypts the content (confidentiality), prevents it from being silently altered along the way (integrity), and confirms the server is who it claims to be (authentication via certificate)."
      - prompt: "Before widespread HTTPS, an ISP could inject its own ads into other people's pages. Which TLS guarantee shut this practice down?"
        choices:
          - id: a
            text: "Integrity: changing even one byte breaks the cryptographic check."
          - id: b
            text: "Confidentiality: the ads became encrypted."
          - id: c
            text: "Authentication: the ISP now needs a passport."
          - id: d
            text: "None: an ISP can still modify HTTPS traffic today."
        correct: [a]
        explanation: "Injecting ads is modifying the message in transit. The integrity guarantee makes any tampering detectable, and the connection simply breaks."

  - id: https-cert-001
    concept: https-tls
    type: theory-quiz
    difficulty: 2
    prompt: "Why does the browser trust the certificate of a site it's seeing for the first time?"
    choices:
      - id: a
        text: "The certificate is signed by a certificate authority from the list of roots the browser already trusts."
      - id: b
        text: "The browser sends the certificate to a search engine for verification."
      - id: c
        text: "The certificate is encrypted, and anything encrypted can be trusted."
      - id: d
        text: "The browser trusts any certificate if the site loads fast."
    correct: [a]
    explanation: "Trust travels through a chain of signatures: the browser knows the root CAs, and a CA vouched for the domain with its own signature. That's why a self-signed certificate triggers a red warning - there's no one vouching for it."
    hints:
      - "The browser doesn't know the site, but it knows whoever vouched for it. Recall the three-tier scheme from the theory."
    variants:
      - prompt: "What exactly does a valid certificate on sber-bank-login.ru confirm, shown by the padlock in the browser?"
        choices:
          - id: a
            text: "Only that you're talking to the domain sber-bank-login.ru itself over a secured channel."
          - id: b
            text: "That the site belongs to Sberbank."
          - id: c
            text: "That the site isn't phishing and has been vetted for honesty."
          - id: d
            text: "That the site's content passed CA moderation."
        correct: [a]
        explanation: "A certificate binds a key to a domain, nothing more. A phishing domain can get a valid certificate just as easily: HTTPS guarantees the channel, not the owner's reputation."
      - prompt: "The browser showed a certificate error on a familiar site. Which of TLS's guarantees is at risk?"
        choices:
          - id: a
            text: "Server authentication: there's no assurance you're talking to the real site."
          - id: b
            text: "Only connection speed."
          - id: c
            text: "None: a certificate error is a cosmetic warning."
          - id: d
            text: "Availability: the site is down."
        correct: [a]
        explanation: "A certificate is responsible for authentication. An error means 'no one vouches for this anymore' - an interceptor might be standing between you and the server, and the right reaction is to stop."

  - id: https-blanks-001
    concept: https-tls
    type: fill-in-blanks
    difficulty: 3
    prompt: "Restore the order of establishing an HTTPS connection: fill in the missing stages from the list: handshake, certificate, HTTP."
    template: |
      1. TCP connection established
      2. TLS {{stage1}}: the parties agree on algorithms
      3. The server presents its {{stage2}}, the browser checks the CA signature
      4. A shared session key is derived
      5. Plain {{stage3}} travels inside the encrypted channel
    blanks:
      stage1:
        accept: ['handshake', 'Handshake']
      stage2:
        accept: ['certificate', 'Certificate']
      stage3:
        accept: ['HTTP', 'http']
    explanation: "The order is fixed: first the handshake, choosing algorithms and checking the certificate, then deriving the key, and only after that does plain HTTP begin inside the channel: requests and responses, unchanged in semantics."
    hints:
      - "The encrypted channel is built before the first request: what happens at each stage is shown in the theory's diagram."
      - "At the third stage the server presents its 'passport stamped by a CA'."

  - id: https-visibility-001
    concept: https-tls
    type: theory-quiz
    difficulty: 4
    prompt: "A user on cafe Wi-Fi opens https://ozon.ru/cart?promo=SECRET15. What does the Wi-Fi owner see?"
    choices:
      - id: a
        text: "The domain ozon.ru and the server's IP; the path /cart and the promo parameter are encrypted."
      - id: b
        text: "Nothing at all: HTTPS completely hides the traffic."
      - id: c
        text: "The whole URL, including the promo code, but not the response body."
      - id: d
        text: "Only the server's IP: the domain name is always encrypted too."
    correct: [a]
    explanation: "TLS encrypts the path, parameters, headers, and bodies - but the domain leaks in plain text in the SNI during the handshake and in the DNS request, and the IP is visible by the network's very nature. An observer knows 'who' you talked to, but not 'about what'."
    hints:
      - "Split the URL into parts: which of them does the network need before the encrypted channel is even built?"
      - "Recall what travels at the start of the handshake and in DNS, before any encryption at all."
