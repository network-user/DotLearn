exercises:
  - id: rr-anatomy-001
    concept: request-response
    type: theory-quiz
    difficulty: 1
    prompt: "В каком порядке идут части HTTP-сообщения?"
    choices:
      - id: a
        text: "Стартовая строка, заголовки, пустая строка, тело."
      - id: b
        text: "Заголовки, стартовая строка, тело, пустая строка."
      - id: c
        text: "Тело, заголовки, стартовая строка."
      - id: d
        text: "Стартовая строка, тело, заголовки."
    correct: [a]
    explanation: "Порядок жёсткий: стартовая строка отвечает «что происходит», заголовки несут метаданные, пустая строка ставит границу, после неё идёт тело, если оно есть."
    hints:
      - "Вспомните рис. 1 из теории: сообщение читается сверху вниз, от вопроса «что происходит» к полезному грузу."
    variants:
      - prompt: "Что в HTTP-сообщении отделяет заголовки от тела?"
        choices:
          - id: a
            text: "Пустая строка."
          - id: b
            text: "Символ точки с запятой."
          - id: c
            text: "Заголовок Content-Length."
          - id: d
            text: "Ничего: тело начинается сразу после последнего заголовка."
        correct: [a]
        explanation: "Границей служит именно пустая строка. Без неё парсер продолжит читать тело как заголовки и сообщение окажется некорректным."
      - prompt: "Из чего состоит стартовая строка HTTP-запроса?"
        choices:
          - id: a
            text: "Метод, путь, версия протокола."
          - id: b
            text: "Версия протокола, статус-код, пояснительная фраза."
          - id: c
            text: "Полный URL вместе с доменом и схемой."
          - id: d
            text: "Метод и заголовок Host."
        correct: [a]
        explanation: "У запроса стартовая строка выглядит как «GET /catalog HTTP/1.1»: метод, путь, версия. Версия со статус-кодом и фразой - это стартовая строка ответа."

  - id: rr-blanks-001
    concept: request-response
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните сырой HTTP-запрос: клиент хочет получить страницу каталога."
    template: |
      {{method}} /catalog HTTP/1.1
      {{hostheader}}: market.yandex.ru
      Accept: text/html
    blanks:
      method:
        accept: ['GET', 'get']
      hostheader:
        accept: ['Host', 'host', 'HOST']
    explanation: "Чтение ресурса - это метод GET, а доменное имя сайта передаётся не в пути, а в заголовке Host: так сервер с сотней сайтов на одном IP понимает, к кому обращаются."
    hints:
      - "Первое слово стартовой строки - глагол протокола для «хочу получить, ничего не меняя»."
      - "Домен из адресной строки не остаётся в пути: для него существует отдельный обязательный заголовок."
    variants:
      - prompt: "Дополните сырой ответ сервера: в теле лежит HTML."
        template: |
          HTTP/1.1 200 OK
          {{ctheader}}: text/html; charset=utf-8
          Content-Length: 5120

          <!DOCTYPE html>
        blanks:
          ctheader:
            accept: ['Content-Type', 'content-type', 'Content-type']
        explanation: "Формат тела объявляет заголовок Content-Type. Именно по нему браузер решает, рисовать HTML, парсить JSON или скачивать файл."
      - prompt: "Дополните стартовую строку запроса: клиент предлагает общаться по классической текстовой версии протокола."
        template: |
          GET /cart {{version}}
          Host: ozon.ru
        blanks:
          version:
            accept: ['HTTP/1.1', 'http/1.1']
        explanation: "Третий элемент стартовой строки запроса - версия протокола. Текстовая классика - это HTTP/1.1; HTTP/2 и HTTP/3 передают ту же семантику в бинарном виде."

  - id: rr-predict-host-001
    concept: request-response
    type: predict-output
    difficulty: 2
    prompt: "Сервер получил этот запрос. Какое значение он прочитает из заголовка Host?"
    snippet: |
      GET /api/v1/users HTTP/1.1
      Host: api.sber.ru
      Accept: application/json
    expected:
      kind: scalar
      value: 'api.sber.ru'
    explanation: "Доменное имя не входит в путь запроса: клиент кладёт его в заголовок Host, и сервер читает его оттуда."
    hints:
      - "Смотрите не на стартовую строку, а на заголовки: нужная пара «имя: значение» стоит сразу после неё."
    variants:
      - prompt: "Какой путь вместе со строкой запроса сервер увидит в стартовой строке этого сообщения?"
        snippet: |
          GET /search?q=python HTTP/1.1
          Host: habr.com
        expected:
          kind: scalar
          value: '/search?q=python'
        explanation: "В стартовой строке остаётся только часть URL после домена: путь и строка запроса после знака вопроса. Схема и домен в путь не входят."
      - prompt: "Сколько байт тела объявляет этот ответ? Введите число."
        snippet: |
          HTTP/1.1 200 OK
          Content-Type: application/json
          Content-Length: 348

          {"items": []}
        expected:
          kind: scalar
          value: 348
        explanation: "Размер тела в байтах сервер объявляет заголовком Content-Length: клиент по нему понимает, когда сообщение закончилось."

  - id: rr-stateless-001
    concept: request-response
    type: theory-quiz
    difficulty: 3
    prompt: "Пользователь отправил запрос А, а через секунду с того же устройства запрос Б. Что сервер, говорящий на чистом HTTP без cookies, знает о запросе А, обрабатывая Б?"
    choices:
      - id: a
        text: "Ничего: каждый запрос самостоятелен, протокол не хранит состояние между ними."
      - id: b
        text: "Полную историю: протокол требует хранить журнал запросов клиента."
      - id: c
        text: "Только метод и путь запроса А: они передаются в служебном заголовке запроса Б."
      - id: d
        text: "Что запросы связаны: у них общий идентификатор сессии на уровне протокола."
    correct: [a]
    explanation: "HTTP - stateless-протокол: обработав запрос, сервер забывает о нём. Связать два запроса в «разговор» можно только надстройкой вроде cookies, самому протоколу сессии неизвестны."
    hints:
      - "Вспомните, почему любой запрос можно отдать любому серверу за балансировщиком и ничего не сломается."
      - "Свойство называется stateless. Подумайте, что оно означает для памяти сервера между двумя письмами."
