exercises:
  - id: rr-anatomy-001
    concept: request-response
    type: theory-quiz
    difficulty: 1
    prompt: "In what order do the parts of an HTTP message appear?"
    choices:
      - id: a
        text: "Start line, headers, empty line, body."
      - id: b
        text: "Headers, start line, body, empty line."
      - id: c
        text: "Body, headers, start line."
      - id: d
        text: "Start line, body, headers."
    correct: [a]
    explanation: "The order is fixed: the start line answers 'what is happening', the headers carry metadata, the empty line marks the boundary, and after it comes the body, if there is one."
    hints:
      - "Recall the diagram from the theory: the message reads top to bottom, from 'what is happening' to the payload."
    variants:
      - prompt: "What separates the headers from the body in an HTTP message?"
        choices:
          - id: a
            text: "An empty line."
          - id: b
            text: "A semicolon character."
          - id: c
            text: "The Content-Length header."
          - id: d
            text: "Nothing: the body starts right after the last header."
        correct: [a]
        explanation: "The boundary is exactly the empty line. Without it, the parser would keep reading the body as headers and the message would be malformed."
      - prompt: "What does the start line of an HTTP request consist of?"
        choices:
          - id: a
            text: "Method, path, protocol version."
          - id: b
            text: "Protocol version, status code, reason phrase."
          - id: c
            text: "The full URL including domain and scheme."
          - id: d
            text: "Method and the Host header."
        correct: [a]
        explanation: "A request's start line looks like 'GET /catalog HTTP/1.1': method, path, version. Version with status code and phrase is the response's start line."

  - id: rr-blanks-001
    concept: request-response
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the raw HTTP request: the client wants to fetch the catalog page."
    template: |
      {{method}} /catalog HTTP/1.1
      {{hostheader}}: market.yandex.ru
      Accept: text/html
    blanks:
      method:
        accept: ['GET', 'get']
      hostheader:
        accept: ['Host', 'host', 'HOST']
    explanation: "Reading a resource is the GET method, and the site's domain name travels not in the path but in the Host header: that's how a server hosting a hundred sites on one IP knows who is being addressed."
    hints:
      - "The first word of the start line is the protocol's verb for 'I want to fetch, without changing anything'."
      - "The domain from the address bar doesn't stay in the path: it has its own mandatory header."
    variants:
      - prompt: "Complete the raw server response: the body holds HTML."
        template: |
          HTTP/1.1 200 OK
          {{ctheader}}: text/html; charset=utf-8
          Content-Length: 5120

          <!DOCTYPE html>
        blanks:
          ctheader:
            accept: ['Content-Type', 'content-type', 'Content-type']
        explanation: "The Content-Type header declares the body's format. It's exactly what the browser uses to decide whether to render HTML, parse JSON, or download a file."
      - prompt: "Complete the request's start line: the client offers to talk over the classic text version of the protocol."
        template: |
          GET /cart {{version}}
          Host: ozon.ru
        blanks:
          version:
            accept: ['HTTP/1.1', 'http/1.1']
        explanation: "The third element of a request's start line is the protocol version. The classic text version is HTTP/1.1; HTTP/2 and HTTP/3 carry the same semantics in binary form."

  - id: rr-predict-host-001
    concept: request-response
    type: predict-output
    difficulty: 2
    prompt: "The server receives this request. What value will it read from the Host header?"
    snippet: |
      GET /api/v1/users HTTP/1.1
      Host: api.sber.ru
      Accept: application/json
    expected:
      kind: scalar
      value: 'api.sber.ru'
    explanation: "The domain name isn't part of the request path: the client puts it in the Host header, and the server reads it from there."
    hints:
      - "Look not at the start line but at the headers: the needed 'name: value' pair sits right after it."
    variants:
      - prompt: "What path along with the query string will the server see in this message's start line?"
        snippet: |
          GET /search?q=python HTTP/1.1
          Host: habr.com
        expected:
          kind: scalar
          value: '/search?q=python'
        explanation: "Only the part of the URL after the domain remains in the start line: the path and the query string after the question mark. Scheme and domain don't belong in the path."
      - prompt: "How many bytes of body does this response declare? Enter the number."
        snippet: |
          HTTP/1.1 200 OK
          Content-Type: application/json
          Content-Length: 348

          {"items": []}
        expected:
          kind: scalar
          value: 348
        explanation: "The server declares the body size in bytes via the Content-Length header: it's how the client knows when the message has ended."

  - id: rr-stateless-001
    concept: request-response
    type: theory-quiz
    difficulty: 3
    prompt: "A user sent request A, and a second later, from the same device, request B. What does a server speaking plain HTTP without cookies know about request A while handling B?"
    choices:
      - id: a
        text: "Nothing: every request stands on its own, the protocol keeps no state between them."
      - id: b
        text: "The full history: the protocol requires keeping a log of the client's requests."
      - id: c
        text: "Only the method and path of request A: they travel in a service header of request B."
      - id: d
        text: "That the requests are related: they share a session identifier at the protocol level."
    correct: [a]
    explanation: "HTTP is a stateless protocol: once the server handles a request, it forgets about it. Tying two requests into a 'conversation' can only be done with an add-on like cookies; the protocol itself knows nothing about sessions."
    hints:
      - "Recall why any request can be handed to any server behind a load balancer and nothing breaks."
      - "This property is called stateless. Think about what it means for the server's memory between two messages."
