exercises:
  - id: caching-directives-001
    concept: caching
    type: theory-quiz
    difficulty: 1
    prompt: "Что на самом деле означает директива no-cache?"
    choices:
      - id: a
        text: "Хранить копию можно, но перед каждым использованием"
      - id: b
        text: "Не сохранять ответ ни в одном кеше."
      - id: c
        text: "Кешировать только в CDN, но не в браузере."
      - id: d
        text: "Кешировать ровно на одну минуту."
    correct: [a]
    explanation: "Имя обманывает: no-cache разрешает хранение, но требует валидации перед каждым использованием. Полный запрет на сохранение - это no-store."
    hints:
      - "Есть две похожие директивы: одна запрещает хранить, другая запрещает использовать без проверки. Это которая про проверку."
    variants:
      - prompt: "Банковская выписка не должна сохраняться ни в браузере, ни в CDN, ни в прокси. Какая директива Cache-Control нужна?"
        choices:
          - id: a
            text: "no-store"
          - id: b
            text: "no-cache"
          - id: c
            text: "private"
          - id: d
            text: "max-age=0"
        correct: [a]
        explanation: "«Не сохранять ни байта нигде» - это no-store. no-cache и max-age=0 оставляют копию на диске, private лишь ограничивает круг складов браузером."
      - prompt: "Ответ с персональной страницей пользователя можно кешировать в его браузере, но нельзя в общем CDN. Какая директива это выражает?"
        choices:
          - id: a
            text: "private"
          - id: b
            text: "public"
          - id: c
            text: "immutable"
          - id: d
            text: "no-store"
        correct: [a]
        explanation: "private разрешает хранение только браузеру конкретного пользователя. Персональная страница, осевшая в общем CDN с public, уехала бы в выдачу чужим людям."

  - id: caching-predict-001
    concept: caching
    type: predict-output
    difficulty: 2
    prompt: "Содержимое ресурса на сервере не менялось. Какой числовой статус-код вернёт сервер на этот условный запрос?"
    snippet: |
      GET /api/products/77 HTTP/1.1
      Host: api.ozon.ru
      If-None-Match: "a3f5c9"
    expected:
      kind: scalar
      value: 304
    explanation: "Отпечаток клиента совпал с текущим ETag - содержимое не менялось. Сервер отвечает 304 Not Modified без тела, и кеш продолжает пользоваться своей копией."
    hints:
      - "Клиент прислал отпечаток своей копии. Если он совпадает с текущим, зачем гнать тело по сети ещё раз?"
    variants:
      - prompt: "Товар изменился, его новый ETag - \"b7e2d1\". Какой числовой статус-код вернёт сервер на этот условный запрос?"
        snippet: |
          GET /api/products/77 HTTP/1.1
          Host: api.ozon.ru
          If-None-Match: "a3f5c9"
        expected:
          kind: scalar
          value: 200
        explanation: "Отпечатки не совпали - копия клиента устарела. Сервер отвечает полноценным 200 с новым телом и новым ETag."
      - prompt: "Браузер сохранил этот ответ в 12:00:00. До какого времени включительно копия считается свежей и отдаётся без похода к серверу? Введите время в формате ЧЧ:ММ:СС."
        snippet: |
          HTTP/1.1 200 OK
          Cache-Control: max-age=600
          Content-Type: application/json

          {"stock": 14}
        expected:
          kind: scalar
          value: '12:10:00'
        explanation: "max-age задаётся в секундах: 600 секунд - это 10 минут. С 12:00:00 копия свежа до 12:10:00, после чего кешу придётся валидировать её у сервера."

  - id: caching-blanks-001
    concept: caching
    type: fill-in-blanks
    difficulty: 2
    prompt: "CSS-файл с хешем в имени не изменится никогда. Дополните заголовок ответа: срок на год в секундах и директива «даже не проверяй»."
    template: |
      HTTP/1.1 200 OK
      Content-Type: text/css
      Cache-Control: public, max-age={{seconds}}, {{directive}}
    blanks:
      seconds:
        accept: ['31536000']
      directive:
        accept: ['immutable', 'Immutable']
    explanation: "Год - это 31536000 секунд, а immutable говорит кешу «содержимое не изменится, валидация не нужна». Такой набор безопасен именно потому, что при изменении содержимого поменяется имя файла."
    hints:
      - "Срок задаётся в секундах: перемножьте 365 дней, 24 часа, 60 минут и 60 секунд."
      - "Вторая директива обещает кешу, что ресурс не изменится никогда, и избавляет от условных запросов."
    variants:
      - prompt: "Сервер отдаёт JSON с отпечатком содержимого, чтобы кеш мог валидировать копию. Впишите имя заголовка-отпечатка и имя условного заголовка запроса."
        template: |
          HTTP/1.1 200 OK
          {{tagheader}}: "a3f5c9"
          Cache-Control: max-age=60

          Следующий запрос клиента после истечения срока:
          GET /api/products/77 HTTP/1.1
          {{condheader}}: "a3f5c9"
        blanks:
          tagheader:
            accept: ['ETag', 'Etag', 'etag']
          condheader:
            accept: ['If-None-Match', 'if-none-match']
        explanation: "Пара валидации: сервер выдаёт отпечаток в ETag, клиент возвращает его в If-None-Match. Совпало - 304 без тела, не совпало - 200 с новым содержимым."
      - prompt: "Сервер отдаёт русскую и английскую версии по одному URL и должен предупредить общие кеши. Впишите имя заголовка и его значение."
        template: |
          HTTP/1.1 200 OK
          Content-Type: text/html; charset=utf-8
          Content-Language: ru
          {{varyheader}}: {{varyvalue}}
        blanks:
          varyheader:
            accept: ['Vary', 'vary']
          varyvalue:
            accept: ['Accept-Language', 'accept-language']
        explanation: "Vary: Accept-Language говорит кешу, что ответ зависит от языка клиента: без него общий кеш рано или поздно выдаст русский HTML англоязычному пользователю."

  - id: caching-deploy-001
    concept: caching
    type: theory-quiz
    difficulty: 4
    prompt: "После деплоя часть пользователей неделю видит старую версию сайта. HTML отдавался с Cache-Control: max-age=604800. Что пошло не так и как правильно?"
    choices:
      - id: a
        text: "HTML с недельным max-age отдаётся из кеша без единого запроса к серверу; правильно - короткий срок"
      - id: b
        text: "Нужно было поставить no-store на все ответы сайта: тогда кеш никогда не мешает."
      - id: c
        text: "Проблема в CDN: браузерный кеш не умеет хранить HTML."
      - id: d
        text: "Нужно попросить всех пользователей нажать Ctrl+F5; заголовки тут ни при чём."
    correct: [a]
    explanation: "Пока max-age не истёк, браузер даже не спрашивает сервер - старый HTML продолжает ссылаться на старые ассеты. Рабочий шаблон разделяет судьбы: HTML валидируется часто (короткий срок или no-cache), а файлы с хешем в имени кешируются на год - их обновляет сама смена имени. no-store на всё убило бы производительность, а «просить пользователей» не масштабируется."
    hints:
      - "Пока срок свежести не истёк, кеш не делает даже условных запросов. Что это значит для страницы, которая ссылается на все остальные файлы?"
      - "Разделите ресурсы на два сорта: те, чьё имя меняется при каждом изменении содержимого, и те, чьё имя постоянно. Кому какой срок?"
