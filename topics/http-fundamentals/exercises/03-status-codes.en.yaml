exercises:
  - id: status-classes-001
    concept: status-codes
    type: theory-quiz
    difficulty: 1
    prompt: "A response arrives with code 503. Which class does it belong to and what does that mean?"
    choices:
      - id: a
        text: "5xx: an error on the server's side."
      - id: b
        text: "4xx: the client sent a bad request."
      - id: c
        text: "3xx: the resource moved to another address."
      - id: d
        text: "2xx: the request succeeded."
    correct: [a]
    explanation: "The first digit sets the class: 503 starts with a five, so the problem is on the server. Specifically, 503 means 'temporarily unavailable': overload or a deploy in progress."
    hints:
      - "Look only at the first digit of the code: it splits all codes into five classes."
    variants:
      - prompt: "A response arrives with code 404. Who should fix the situation, by the semantics of the classes?"
        choices:
          - id: a
            text: "The client: 4xx means a problem in the request itself"
          - id: b
            text: "The server: 4xx means the application crashed."
          - id: c
            text: "No one: 4xx is an informational class."
          - id: d
            text: "The proxy: 4xx always originates in nginx."
        correct: [a]
        explanation: "Class 4xx is a client error: the request points to a resource that doesn't exist. The server works fine; what needs fixing is the request or the link."
      - prompt: "Which class of codes signals that the resource should be looked up at a different address?"
        choices:
          - id: a
            text: "3xx"
          - id: b
            text: "2xx"
          - id: c
            text: "4xx"
          - id: d
            text: "1xx"
        correct: [a]
        explanation: "Redirects are class 3xx: the server responds with a code like 301 or 302 and puts the new address in the Location header."

  - id: status-predict-001
    concept: status-codes
    type: predict-output
    difficulty: 2
    prompt: "The server follows HTTP semantics. An order numbered 999999 has never existed. What numeric status code will the server return?"
    snippet: |
      GET /orders/999999 HTTP/1.1
      Host: api.wildberries.ru
      Authorization: Bearer valid-token
    expected:
      kind: scalar
      value: 404
    explanation: "The request is well-formed, the client is recognized, but there's no resource at that address - that's 404 Not Found: class 4xx, because what needs fixing is the address in the request, not the server."
    hints:
      - "The server is alive and parsed the request fine; the problem is what the request points to. That's the client error class."
    variants:
      - prompt: "The endpoint requires authentication, and the request arrived with no token at all. What numeric status code will a server that follows HTTP semantics return?"
        snippet: |
          GET /profile HTTP/1.1
          Host: api.gosuslugi.ru
        expected:
          kind: scalar
          value: 401
        explanation: "The client presented no credentials - the server responds with 401 Unauthorized: 'I don't know you, identify yourself.' 403 would apply if the client were recognized but lacked permissions."
      - prompt: "The request is valid, but while handling it the application code raised an unhandled exception. What numeric status code will the client see?"
        snippet: |
          POST /orders HTTP/1.1
          Host: api.wildberries.ru
          Content-Type: application/json

          {"product_id": 77, "quantity": 2}
        expected:
          kind: scalar
          value: 500
        explanation: "An unhandled exception in the application is 500 Internal Server Error: the request was fine, the server failed to cope. What needs fixing is the code, not the request."

  - id: status-blanks-001
    concept: status-codes
    type: fill-in-blanks
    difficulty: 2
    prompt: "A page permanently moved to a new address. Complete the server response: the code and the header with the new address."
    template: |
      HTTP/1.1 {{code}} Moved Permanently
      {{locheader}}: https://market.yandex.ru/catalog
    blanks:
      code:
        accept: ['301']
      locheader:
        accept: ['Location', 'location']
    explanation: "A permanent move is 301 Moved Permanently, and the server puts the new address in the Location header: the browser makes its next request there on its own."
    hints:
      - "'Permanently' is the key word: of the two main redirects, you need the permanent one."
      - "The header with the new address is the very one the browser uses for the next request."
    variants:
      - prompt: "DELETE succeeded, and there's nothing to say in the body. Complete the response's start line: code and phrase."
        template: |
          HTTP/1.1 {{code}} No Content
        blanks:
          code:
            accept: ['204']
        explanation: "Success with no body is 204 No Content: the typical response to a successful DELETE. Class 2xx, but no payload in the response."
      - prompt: "The client is sending requests too often. Complete the response: the code and the header for 'when you can come back'."
        template: |
          HTTP/1.1 {{code}} Too Many Requests
          {{retryheader}}: 60
        blanks:
          code:
            accept: ['429']
          retryheader:
            accept: ['Retry-After', 'retry-after']
        explanation: "Rate limiting is 429 Too Many Requests, and the pause in seconds travels in the Retry-After header: a polite client waits the given time instead of hammering with retries."

  - id: status-pairs-001
    concept: status-codes
    type: theory-quiz
    difficulty: 3
    prompt: "A logged-in courier for a delivery service opens the admin page and gets refused. Which code is correct and why?"
    choices:
      - id: a
        text: "403: the user is recognized, but has no rights to this resource."
      - id: b
        text: "401: any access problem is 401."
      - id: c
        text: "404: access can't be denied, better to say 'no such page'."
      - id: d
        text: "400: a request for someone else's page is a bad request."
    correct: [a]
    explanation: "The token is valid, the identity is known - authentication passed. What's missing is permissions, and that's authorization: 403 Forbidden. 401 would send the user to log in again, which would be pointless. Returning 404 to obscure the resource is a deliberate practice some services use, but by default the semantics call for 403."
    hints:
      - "Split it into two questions: 'does the server know who this is?' and 'is this someone allowed here?' Here only the second one fails."
      - "401 is about authentication, 403 is about authorization. The courier is already logged in."
