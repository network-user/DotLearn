exercises:
  - id: https-basics-001
    concept: https-tls
    type: theory-quiz
    difficulty: 1
    prompt: "Что такое HTTPS по отношению к HTTP?"
    choices:
      - id: a
        text: "Тот же HTTP, но передаваемый внутри шифрованного канала TLS."
      - id: b
        text: "Другой протокол с собственными методами и статус-кодами."
      - id: c
        text: "HTTP, в котором шифруется только пароль пользователя."
      - id: d
        text: "Ускоренная бинарная версия HTTP."
    correct: [a]
    explanation: "HTTPS не меняет семантику: методы, коды, заголовки и cookies те же. Меняется транспорт - сначала устанавливается TLS-канал, потом внутри него ходит обычный HTTP."
    hints:
      - "Вспомните метафору из теории: тот же текст письма, но конверт другой."
    variants:
      - prompt: "Какие три гарантии даёт TLS?"
        choices:
          - id: a
            text: "Конфиденциальность, целостность, аутентификация сервера."
          - id: b
            text: "Скорость, сжатие, кеширование."
          - id: c
            text: "Анонимность клиента, скрытие домена, скрытие IP."
          - id: d
            text: "Доступность, отказоустойчивость, балансировка."
        correct: [a]
        explanation: "TLS шифрует содержимое (конфиденциальность), не даёт незаметно подменить его по дороге (целостность) и подтверждает, что сервер именно тот (аутентификация через сертификат)."
      - prompt: "Провайдер до эпохи массового HTTPS мог вклеивать свою рекламу в чужие страницы. Какая гарантия TLS закрыла эту практику?"
        choices:
          - id: a
            text: "Целостность: изменение хотя бы байта ломает криптографическую"
          - id: b
            text: "Конфиденциальность: реклама стала зашифрованной."
          - id: c
            text: "Аутентификация: провайдеру теперь нужен паспорт."
          - id: d
            text: "Никакая: провайдер и сейчас может менять HTTPS-трафик."
        correct: [a]
        explanation: "Вклейка рекламы - это модификация сообщения по пути. Гарантия целостности делает любую подмену обнаружимой, и соединение просто рвётся."

  - id: https-cert-001
    concept: https-tls
    type: theory-quiz
    difficulty: 2
    prompt: "Почему браузер доверяет сертификату сайта, который видит впервые?"
    choices:
      - id: a
        text: "Сертификат подписан удостоверяющим центром из списка корней, которым браузер уже"
      - id: b
        text: "Браузер отправляет сертификат в поисковик на проверку."
      - id: c
        text: "Сертификат зашифрован, а всему зашифрованному можно доверять."
      - id: d
        text: "Браузер доверяет любому сертификату, если сайт открывается быстро."
    correct: [a]
    explanation: "Доверие передаётся по цепочке подписей: браузер знает корневые CA, CA поручился за домен своей подписью. Поэтому самоподписанный сертификат вызывает красное предупреждение - поручителя нет."
    hints:
      - "Браузер не знает сайт, но знает того, кто за сайт поручился. Вспомните трёхзвенную схему из теории."
    variants:
      - prompt: "Что именно подтверждает валидный сертификат на sber-bank-login.ru с замочком в браузере?"
        choices:
          - id: a
            text: "Только то, что вы общаетесь именно с доменом"
          - id: b
            text: "Что сайт принадлежит Сберу."
          - id: c
            text: "Что сайт не фишинговый и проверен на честность."
          - id: d
            text: "Что содержимое сайта прошло модерацию CA."
        correct: [a]
        explanation: "Сертификат привязывает ключ к домену, не более. Фишинговый домен спокойно получает валидный сертификат: HTTPS - гарантия канала, а не репутации владельца."
      - prompt: "Браузер показал ошибку сертификата на знакомом сайте. Какая из гарантий TLS под угрозой?"
        choices:
          - id: a
            text: "Аутентификация сервера"
          - id: b
            text: "Только скорость соединения."
          - id: c
            text: "Никакая: ошибка сертификата - косметическое предупреждение."
          - id: d
            text: "Доступность: сайт лежит."
        correct: [a]
        explanation: "Сертификат отвечает за аутентификацию. Его ошибка означает «поручиться некому»: между вами и сервером может стоять перехватчик, и правильная реакция - остановиться."

  - id: https-blanks-001
    concept: https-tls
    type: fill-in-blanks
    difficulty: 3
    prompt: "Восстановите порядок установки HTTPS-соединения: впишите недостающие стадии из списка: рукопожатие, сертификат, HTTP."
    template: |
      1. TCP-соединение установлено
      2. TLS-{{stage1}}: стороны договариваются об алгоритмах
      3. Сервер предъявляет {{stage2}}, браузер проверяет подпись CA
      4. Выработан общий сеансовый ключ
      5. Внутри шифрованного канала ходит обычный {{stage3}}
    blanks:
      stage1:
        accept: ['рукопожатие', 'Рукопожатие', 'handshake']
      stage2:
        accept: ['сертификат', 'Сертификат']
      stage3:
        accept: ['HTTP', 'http']
    explanation: "Порядок жёсткий: сначала рукопожатие с выбором алгоритмов и проверкой сертификата, потом выработка ключа, и только затем внутри канала начинается обычный HTTP: запросы и ответы без изменений семантики."
    hints:
      - "Шифрованный канал строится до первого запроса: что происходит на каждой стадии, показывает рис. 1 из теории."
      - "На третьей стадии сервер предъявляет свой «паспорт с печатью CA»."

  - id: https-visibility-001
    concept: https-tls
    type: theory-quiz
    difficulty: 4
    prompt: "Пользователь через Wi-Fi кафе открывает https://ozon.ru/cart?promo=SECRET15. Что из этого видит владелец Wi-Fi-точки?"
    choices:
      - id: a
        text: "Домен ozon.ru и IP сервера; путь /cart и параметр promo зашифрованы."
      - id: b
        text: "Вообще ничего: HTTPS полностью скрывает трафик."
      - id: c
        text: "Весь URL целиком, включая промокод, но не тело ответа."
      - id: d
        text: "Только IP сервера: доменное имя тоже зашифровано всегда."
    correct: [a]
    explanation: "TLS шифрует путь, параметры, заголовки и тела - но домен утекает открытым текстом в SNI при рукопожатии и в DNS-запросе, а IP виден по самой природе сети. Наблюдатель знает, «с кем» вы говорили, но не «о чём»."
    hints:
      - "Разделите URL на части: какие из них нужны сети до того, как шифрованный канал построен?"
      - "Вспомните, что передаётся в начале рукопожатия и в DNS ещё до всякого шифрования."
