exercises:
  - id: plat-what-001
    concept: platform-and-configs
    type: theory-quiz
    difficulty: 1
    prompt: "Чем платформа 1С:Предприятие отличается от конфигурации?"
    choices:
      - id: a
        text: "Платформа - универсальный движок, конфигурация - прикладное решение поверх него."
      - id: b
        text: "Это два названия одного и того же продукта."
      - id: c
        text: "Платформа - это бухгалтерский учёт, конфигурация - складской."
      - id: d
        text: "Конфигурация - движок, а платформа - готовая программа для пользователя."
    correct: [a]
    explanation: "Платформа - это движок (хранение, язык, формы, СУБД-абстракция), а конфигурация - конкретная бизнес-логика поверх неё: Бухгалтерия, УТ, ЗУП."
    hints:
      - "Вспомните аналогию с браузером и сайтом: что из них движок, а что - конкретное содержимое?"
    variants:
      - prompt: "1С:Бухгалтерия и 1С:Управление торговлей - это..."
        choices:
          - id: a
            text: "Две разные конфигурации, работающие на одной платформе."
          - id: b
            text: "Две разные платформы."
          - id: c
            text: "Одна конфигурация в двух режимах запуска."
          - id: d
            text: "Две несовместимые между собой программы без общей основы."
        correct: [a]
        explanation: "Обе - конфигурации (прикладные решения) на одной и той же платформе 1С:Предприятие 8.3. Разной бизнес-логике соответствуют разные конфигурации."
      - prompt: "Где физически хранятся данные базы 1С?"
        choices:
          - id: a
            text: "В СУБД - в файле базы или на сервере СУБД, а платформа работает над ними."
          - id: b
            text: "Внутри самой платформы, отдельно от какой-либо СУБД."
          - id: c
            text: "В конфигурации - в дереве метаданных."
          - id: d
            text: "Только в оперативной памяти клиента."
        correct: [a]
        explanation: "Данные хранит СУБД: в простом случае файл 1Cv8.1CD, в клиент-серверном - MS SQL или PostgreSQL. 1С - движок над ними, «данные в 1С» - неточная формулировка."

  - id: plat-root-blanks-001
    concept: platform-and-configs
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите то, что предоставляет платформа для доступа к объектам конфигурации на встроенном языке 1С."
    template: |
      Выборка = {{root}}.Номенклатура.Выбрать();
      Пока Выборка.Следующий() Цикл
          Сообщить(Выборка.Наименование);
      {{konec}}
    blanks:
      root:
        accept: ['Справочники', 'справочники']
      konec:
        accept: ['КонецЦикла;', 'КонецЦикла', 'конеццикла;', 'конеццикла']
    explanation: "Платформа даёт обобщённый доступ к справочникам через менеджер Справочники, а конкретный справочник - Номенклатура - берётся из конфигурации. Цикл Пока…Цикл закрывается словом КонецЦикла."
    hints:
      - "Как во встроенном языке 1С называется общий менеджер для всех справочников - тот, к которому обращаются перед именем конкретного справочника?"
    variants:
      - prompt: "Впишите менеджер платформы для доступа к документам."
        template: |
          Док = {{root}}.РеализацияТоваров.НайтиПоНомеру("000000123");
          Сообщить(Док.Контрагент);
        blanks:
          root:
            accept: ['Документы', 'документы']
        explanation: "Для документов платформа предоставляет менеджер Документы, а РеализацияТоваров - конкретный документ из конфигурации."
      - prompt: "Впишите менеджер платформы для доступа к значениям перечисления."
        template: |
          Если ВидОперации = {{root}}.ВидыОпераций.Приход Тогда
              Сообщить("Это приход");
          КонецЕсли;
        blanks:
          root:
            accept: ['Перечисления', 'перечисления']
        explanation: "К значениям перечислений обращаются через менеджер Перечисления: Перечисления.ВидыОпераций.Приход."

  - id: plat-predict-001
    concept: platform-and-configs
    type: predict-output
    difficulty: 2
    prompt: "Что выведет Сообщить? Введите итоговое число."
    snippet: |
      Цена = 250;
      Количество = 3;
      Сообщить(Цена * Количество);
    expected:
      kind: scalar
      value: 750
    explanation: "Встроенный язык 1С считает 250 * 3 = 750 и выводит это число."
    hints:
      - "Перемножьте два присвоенных значения."
    variants:
      - prompt: "Что выведет Сообщить? Введите строку целиком."
        snippet: |
          Товар = "Мышь";
          Остаток = 7;
          Сообщить(Товар + ": " + Строка(Остаток));
        expected:
          kind: scalar
          value: "Мышь: 7"
        explanation: "Строки складываются как есть, а число приводится к строке через Строка(): получается «Мышь: 7»."
      - prompt: "Что выведет Сообщить? Введите итоговое число."
        snippet: |
          Приход = 40;
          Расход = 15;
          Сообщить(Приход - Расход);
        expected:
          kind: scalar
          value: 25
        explanation: "40 - 15 = 25: разность прихода и расхода."

  - id: plat-architecture-001
    concept: platform-and-configs
    type: theory-quiz
    difficulty: 3
    prompt: "Почему одну и ту же конфигурацию можно перенести с файловой базы на PostgreSQL, не переписывая код?"
    choices:
      - id: a
        text: "Платформа абстрагирует СУБД: разработчик работает с объектами и запросами 1С, а трансляцию в SQL берёт на себя движок."
      - id: b
        text: "Потому что PostgreSQL и файловая база используют одинаковый формат файлов."
      - id: c
        text: "Потому что конфигурация хранит все данные внутри себя и от СУБД не зависит."
      - id: d
        text: "Никак нельзя: смена СУБД всегда требует переписывания конфигурации."
    correct: [a]
    explanation: "В трёхуровневой архитектуре нижний слой (СУБД) заменяется независимо. Конфигурация обращается к объектам платформы, а платформа сама превращает это в SQL для конкретной СУБД."
    hints:
      - "Вспомните три слоя: какой из них отвечает за физическое хранение и заменяется отдельно от остальных?"
      - "Разработчик пишет «прочитать справочник», а не SQL. Кто превращает одно в другое?"

  - id: plat-update-001
    concept: platform-and-configs
    type: theory-quiz
    difficulty: 3
    prompt: "Вышла новая версия конфигурации Бухгалтерия из-за изменений в законодательстве. Что верно? Отметьте все."
    choices:
      - id: a
        text: "Обновляется конфигурация, а платформа может остаться прежней."
      - id: b
        text: "Обновление конфигурации и обновление платформы - независимые действия."
      - id: c
        text: "Доработки лучше держать в расширении, чтобы они пережили обновление типовой конфигурации."
      - id: d
        text: "Обновить конфигурацию можно только вместе с полной переустановкой платформы."
    correct: [a, b, c]
    explanation: "a, b, c верны: слои обновляются по отдельности, а расширения переживают обновление поставщика. d неверно: платформу переустанавливать для обновления конфигурации не требуется."
    hints:
      - "Платформа и конфигурация поставляются по отдельности - значит, и обновляются по отдельности."
      - "Как современно дорабатывают типовую конфигурацию, чтобы не мешать её будущим обновлениям?"
