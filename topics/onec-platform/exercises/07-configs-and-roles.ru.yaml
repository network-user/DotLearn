exercises:
  - id: role-config-001
    concept: configs-and-roles
    type: theory-quiz
    difficulty: 1
    prompt: "Какую типовую конфигурацию берут для бухгалтерского и налогового учёта и сдачи регламентированной отчётности?"
    choices:
      - id: a
        text: "1С:Бухгалтерия."
      - id: b
        text: "1С:Управление торговлей."
      - id: c
        text: "1С:Зарплата и управление персоналом."
      - id: d
        text: "1С:Розница."
    correct: [a]
    explanation: "Бухгалтерский и налоговый учёт с отчётностью в госорганы - это 1С:Бухгалтерия. Каждая типовая конфигурация закрывает свою область."
    hints:
      - "Идите от задачи: какое решение названо прямо по своему учёту?"
    variants:
      - prompt: "Какую конфигурацию берут для продаж, закупок и складского учёта?"
        choices:
          - id: a
            text: "1С:Управление торговлей (УТ)."
          - id: b
            text: "1С:Бухгалтерия."
          - id: c
            text: "1С:Зарплата и управление персоналом."
          - id: d
            text: "1С:Документооборот."
        correct: [a]
        explanation: "Оперативный контур - продажи, закупки, склад, взаиморасчёты - ведёт 1С:Управление торговлей."
      - prompt: "Какую конфигурацию берут для кадрового учёта и расчёта зарплаты?"
        choices:
          - id: a
            text: "1С:Зарплата и управление персоналом (ЗУП)."
          - id: b
            text: "1С:Управление торговлей."
          - id: c
            text: "1С:Бухгалтерия."
          - id: d
            text: "1С:Розница."
        correct: [a]
        explanation: "Кадры и расчёт зарплаты с отчётностью в фонды - это 1С:Зарплата и управление персоналом."

  - id: role-what-001
    concept: configs-and-roles
    type: theory-quiz
    difficulty: 2
    prompt: "Что такое роль в 1С?"
    choices:
      - id: a
        text: "Объект метаданных с набором прав на объекты конфигурации; пользователю назначают одну или несколько ролей."
      - id: b
        text: "Конкретный пользователь базы."
      - id: c
        text: "Отдельная конфигурация внутри базы."
      - id: d
        text: "Документ, который проводится при входе пользователя."
    correct: [a]
    explanation: "Роль - это набор разрешений (читать, добавлять, изменять, проводить и т. д.) на объекты конфигурации. Роль не привязана к человеку; её назначают пользователю."
    hints:
      - "Роль отвечает на вопрос «что можно делать», а не «кто это». Что из вариантов описывает набор разрешений?"
    variants:
      - prompt: "Как определяются итоговые права пользователя, которому назначено несколько ролей?"
        choices:
          - id: a
            text: "Как объединение прав всех назначенных ему ролей."
          - id: b
            text: "Как пересечение - остаётся только то, что есть во всех ролях сразу."
          - id: c
            text: "Действует только первая назначенная роль."
          - id: d
            text: "Права нескольких ролей назначать нельзя."
        correct: [a]
        explanation: "Итоговые права - объединение прав всех ролей пользователя: если хотя бы одна роль даёт право, оно есть."
      - prompt: "Что может делать пользователь, которому не назначено ни одной роли?"
        choices:
          - id: a
            text: "Почти ничего: пустой набор прав означает запрет по умолчанию."
          - id: b
            text: "Всё: без ролей ограничений нет."
          - id: c
            text: "Только удалять данные."
          - id: d
            text: "Автоматически получает полные права."
        correct: [a]
        explanation: "Нет ролей - нет прав. Пустой набор прав в 1С означает запрет по умолчанию, пользователь почти ничего не сможет."

  - id: role-rls-001
    concept: configs-and-roles
    type: theory-quiz
    difficulty: 3
    prompt: "Менеджер должен видеть только свои заказы, а не заказы всех коллег. Какой механизм это обеспечивает?"
    choices:
      - id: a
        text: "RLS - ограничение доступа на уровне записей, настроенное в роли."
      - id: b
        text: "Функциональные опции."
      - id: c
        text: "Отдельная конфигурация для каждого менеджера."
      - id: d
        text: "Достаточно обычной роли на чтение документа «Заказ» - она сама ограничит по менеджеру."
    correct: [a]
    explanation: "Ограничение не по типу объекта, а по конкретным записям (свои заказы, своя организация) даёт RLS (Row Level Security). Он настраивается в роли и добавляет к правам условие на данные."
    hints:
      - "Обычное право говорит «можно читать заказы». Здесь нужно «можно читать только свои заказы» - это про строки, а не про тип объекта."
      - "Механизм называется ограничением доступа на уровне записей."

  - id: role-judgment-001
    concept: configs-and-roles
    type: theory-quiz
    difficulty: 5
    prompt: "Торговая фирма из трёх человек хочет сразу внедрить 1С:ERP «как у больших» и всем выдать полные права ради удобства. Что разумнее и почему?"
    choices:
      - id: a
        text: "Взять решение под текущую задачу (например, УТ и Бухгалтерию) и раздать права по минимуму через роли, наращивая систему по мере роста."
      - id: b
        text: "Сразу ставить ERP: раз крупные предприятия так делают, значит, и маленькой фирме нужно то же самое."
      - id: c
        text: "Поставить ERP, но всем выдать полные права - так проще администрировать."
      - id: d
        text: "Взять любую конфигурацию, права не настраивать: без ролей и так всё работает быстрее."
    correct: [a]
    explanation: "Конфигурацию выбирают по задаче, а не по хайпу: ERP на трёх человек - дорого и тяжело во внедрении. Права раздают по минимуму ролями, иначе разграничение доступа теряет смысл. b и c - выбор «как у больших» и удобство в ущерб безопасности; d вообще убирает разграничение."
    hints:
      - "Взвесьте выгоду от масштаба ERP против сложности его внедрения для трёх человек. Перевешивает ли она?"
      - "Полные права всем удобны ровно до первого вопроса «почему рядовой сотрудник видит и меняет всё»."
