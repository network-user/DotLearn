exercises:
  - id: meta-tree-001
    concept: metadata-tree
    type: theory-quiz
    difficulty: 1
    prompt: "Узел «Справочник.Номенклатура» в дереве метаданных - это..."
    choices:
      - id: a
        text: "Описание структуры справочника (реквизиты, формы), а не сами товары."
      - id: b
        text: "Список всех товаров базы."
      - id: c
        text: "Один конкретный товар «Ноутбук»."
      - id: d
        text: "Таблица СУБД, которую разработчик создал вручную запросом CREATE TABLE."
    correct: [a]
    explanation: "Метаданные - это описание. Узел справочника задаёт его структуру; конкретные товары - это данные (элементы), они лежат в СУБД. Таблицу платформа создаёт из метаданных сама."
    hints:
      - "«Метаданные» буквально значит «данные о данных». Что это - чертёж или сам дом?"
    variants:
      - prompt: "Чем прикладные объекты отличаются от общих?"
        choices:
          - id: a
            text: "Прикладные хранят данные предприятия, общие обслуживают конфигурацию."
          - id: b
            text: "Прикладные пишет пользователь, общие - платформа автоматически."
          - id: c
            text: "Прикладные объекты нельзя менять в Конфигураторе."
          - id: d
            text: "Разницы нет, это два названия одного и того же."
        correct: [a]
        explanation: "Прикладные объекты (справочники, документы, регистры) хранят данные; общие (роли, общие модули, подсистемы, константы) обслуживают саму конфигурацию."
      - prompt: "Что из перечисленного - прикладной объект, хранящий данные?"
        choices:
          - id: a
            text: "Справочник."
          - id: b
            text: "Роль."
          - id: c
            text: "Общий модуль."
          - id: d
            text: "Подсистема."
        correct: [a]
        explanation: "Справочник - прикладной объект и хранит данные. Роль, общий модуль и подсистема - общие объекты, они обслуживают конфигурацию."

  - id: meta-query-blanks-001
    concept: metadata-tree
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните запрос на языке запросов 1С: выбрать наименования дорогой номенклатуры."
    template: |
      ВЫБРАТЬ
          Номенклатура.Наименование
      {{izfrom}}
          Справочник.Номенклатура КАК Номенклатура
      {{gde}}
          Номенклатура.Цена > 1000
    blanks:
      izfrom:
        accept: ['ИЗ', 'из']
      gde:
        accept: ['ГДЕ', 'где']
    explanation: "Источник данных в языке запросов 1С задаёт ИЗ, а условие отбора - ГДЕ. Ключевые слова, как и во встроенном языке, русские."
    hints:
      - "Одно ключевое слово указывает, откуда берём данные, другое - какие строки оставить. Их русские аналоги SQL-овских FROM и WHERE."
    variants:
      - prompt: "Дополните запрос ключевым словом группировки: посчитать номенклатуру по видам."
        template: |
          ВЫБРАТЬ
              Номенклатура.ВидТовара,
              КОЛИЧЕСТВО(Номенклатура.Ссылка)
          ИЗ
              Справочник.Номенклатура КАК Номенклатура
          {{group}}
              Номенклатура.ВидТовара
        blanks:
          group:
            accept: ['СГРУППИРОВАТЬ ПО', 'сгруппировать по']
        explanation: "Группировку строк по значению задаёт СГРУППИРОВАТЬ ПО - аналог SQL-овского GROUP BY."
      - prompt: "Дополните запрос ключевым словом сортировки: наименования по алфавиту."
        template: |
          ВЫБРАТЬ
              Товар.Наименование
          ИЗ
              Справочник.Номенклатура КАК Товар
          {{order}}
              Товар.Наименование
        blanks:
          order:
            accept: ['УПОРЯДОЧИТЬ ПО', 'упорядочить по']
        explanation: "Сортировку результата задаёт УПОРЯДОЧИТЬ ПО - аналог SQL-овского ORDER BY."

  - id: meta-predict-001
    concept: metadata-tree
    type: predict-output
    difficulty: 2
    prompt: "Что выведет Сообщить? Введите число."
    snippet: |
      Вид = Перечисления.ВидыОпераций.Расход;
      Если Вид = Перечисления.ВидыОпераций.Приход Тогда
          Знак = 1;
      Иначе
          Знак = -1;
      КонецЕсли;
      Сообщить(Знак);
    expected:
      kind: scalar
      value: -1
    explanation: "Вид равен Расход, поэтому условие сравнения с Приход ложно, выполняется ветка Иначе и Знак становится равным -1."
    hints:
      - "Сравните, чему равен Вид, с тем, что стоит в условии Если. Совпадают ли значения перечисления?"
    variants:
      - prompt: "Что выведет Сообщить? Введите число."
        snippet: |
          Вид = Перечисления.ВидыОпераций.Приход;
          Если Вид = Перечисления.ВидыОпераций.Приход Тогда
              Знак = 1;
          Иначе
              Знак = -1;
          КонецЕсли;
          Сообщить(Знак);
        expected:
          kind: scalar
          value: 1
        explanation: "Здесь Вид равен Приход, условие истинно, поэтому Знак равен 1."
      - prompt: "Что выведет Сообщить? Введите строку целиком."
        snippet: |
          Статус = Перечисления.СтатусыЗаказа.Новый;
          Если Статус = Перечисления.СтатусыЗаказа.Оплачен Тогда
              Текст = "оплачен";
          Иначе
              Текст = "не оплачен";
          КонецЕсли;
          Сообщить(Текст);
        expected:
          kind: scalar
          value: "не оплачен"
        explanation: "Статус равен Новый, а не Оплачен, поэтому выполняется ветка Иначе и выводится «не оплачен»."

  - id: meta-report-vs-processing-001
    concept: metadata-tree
    type: theory-quiz
    difficulty: 3
    prompt: "Какие утверждения об объектах конфигурации верны? Отметьте все."
    choices:
      - id: a
        text: "Отчёт данные только читает и показывает, ничего не записывая."
      - id: b
        text: "Обработка предназначена менять данные или выполнять сервисное действие."
      - id: c
        text: "Значения перечисления задаёт разработчик, и пользователь их не пополняет."
      - id: d
        text: "Пополняемый пользователем список (например, банки) правильно вести перечислением."
    correct: [a, b, c]
    explanation: "a, b, c верны. d - ошибка: пополняемый пользователем список ведут справочником; перечисление подходит для фиксированного, заданного в конфигурации набора."
    hints:
      - "Разделите объекты по намерению: кто читает, кто меняет, кто задаёт фиксированный список, а кто - пополняемый."
      - "Если список со временем растёт и его ведёт пользователь - это справочник, а не перечисление."
