exercises:
  - id: reg-where-001
    concept: registers
    type: theory-quiz
    difficulty: 1
    prompt: "Где в 1С хранится текущий остаток товара на складе?"
    choices:
      - id: a
        text: "В регистре накопления"
      - id: b
        text: "В реквизите элемента справочника «Номенклатура»."
      - id: c
        text: "В самом документе поступления."
      - id: d
        text: "Нигде не хранится - его всегда считают заново из всех накладных."
    correct: [a]
    explanation: "Итоги живут в регистрах. Остаток - это свёртка движений регистра накопления; документы лишь пишут в него движения при проведении. В справочнике или документе остаток не хранят."
    hints:
      - "Итоги учёта живут отдельно от первички - в специальных таблицах. Как они называются?"
    variants:
      - prompt: "Что документ делает с регистром при проведении?"
        choices:
          - id: a
            text: "Формирует движения"
          - id: b
            text: "Полностью пересчитывает все документы с начала времён."
          - id: c
            text: "Ничего: документ и регистр не связаны."
          - id: d
            text: "Удаляет регистр и создаёт его заново."
        correct: [a]
        explanation: "При проведении документ формирует движения по регистрам. Сам остаток он не хранит - лишь толкает регистр в плюс или в минус."
      - prompt: "Что из перечисленного - три сорта полей регистра накопления?"
        choices:
          - id: a
            text: "Измерения, ресурсы и реквизиты."
          - id: b
            text: "Код, наименование и родитель."
          - id: c
            text: "Дата, номер и табличная часть."
          - id: d
            text: "Роли, права и профили."
        correct: [a]
        explanation: "У регистра накопления есть измерения (в разрезе чего считаем), ресурсы (что накапливаем) и реквизиты (доп. информация о движении)."

  - id: reg-predict-001
    concept: registers
    type: predict-output
    difficulty: 2
    prompt: "По движениям регистра остатков посчитайте итоговый остаток товара «Мышь». Введите число."
    snippet: |
      Регистр ОстаткиТоваров, товар «Мышь»:
      Поступление  +10
      Поступление  +5
      Реализация   -8
    expected:
      kind: scalar
      value: 7
    explanation: "Остаток - это сумма движений: 10 + 5 - 8 = 7. Приход прибавляет, расход убавляет."
    hints:
      - "Сложите приходы и вычтите расходы: остаток - это свёртка всех движений."
    variants:
      - prompt: "По движениям посчитайте итоговый остаток товара «Клавиатура». Введите число."
        snippet: |
          Регистр ОстаткиТоваров, товар «Клавиатура»:
          Поступление  +20
          Реализация   -6
          Реализация   -4
        expected:
          kind: scalar
          value: 10
        explanation: "20 - 6 - 4 = 10: один приход и два расхода дают остаток 10."
      - prompt: "По движениям посчитайте сальдо взаиморасчётов с контрагентом. Введите число."
        snippet: |
          Регистр Взаиморасчёты, контрагент «Ромашка»:
          Начисление  +1000
          Оплата       -600
          Начисление   +300
        expected:
          kind: scalar
          value: 700
        explanation: "1000 - 600 + 300 = 700: начисления прибавляют долг, оплаты убавляют."

  - id: reg-kinds-001
    concept: registers
    type: theory-quiz
    difficulty: 2
    prompt: "Что правильно хранить в регистре сведений?"
    choices:
      - id: a
        text: "Курсы валют по датам - значение-характеристику."
      - id: b
        text: "Остаток товара на складе на выбранную дату."
      - id: c
        text: "Сумму продаж за выбранный календарный месяц."
      - id: d
        text: "Сальдо взаиморасчётов с контрагентом."
    correct: [a]
    explanation: "Регистр сведений хранит значения-характеристики в разрезе измерений (курс валюты на дату, цену товара, настройку пользователя). Остатки, обороты и сальдо, которые складывают из движений, - это регистр накопления."
    hints:
      - "Одни регистры складывают числа, другие помнят действующее значение. Курс валюты складывают или помнят?"
    variants:
      - prompt: "Периодический регистр сведений умеет операцию «срез последних». Что она даёт?"
        choices:
          - id: a
            text: "Актуальное на нужную дату значение"
          - id: b
            text: "Сумму всех значений за всю историю."
          - id: c
            text: "Среднее арифметическое значений."
          - id: d
            text: "Полностью очищает регистр от старых записей."
        correct: [a]
        explanation: "Срез последних возвращает самое свежее значение на заданную дату для каждой комбинации измерений: например, действующий курс валюты на дату."
      - prompt: "Чем регистр остатков отличается от регистра оборотов?"
        choices:
          - id: a
            text: "Остатки отвечают «сколько есть сейчас», обороты"
          - id: b
            text: "Остатки хранят строки, обороты - числа."
          - id: c
            text: "Обороты умеют отрицательный остаток, остатки - нет."
          - id: d
            text: "Это два названия одного и того же регистра."
        correct: [a]
        explanation: "Регистр остатков меряет наличие на момент (приход плюс, расход минус), регистр оборотов - поток за период; остатка у оборотов нет."

  - id: reg-virtual-001
    concept: registers
    type: theory-quiz
    difficulty: 4
    prompt: "Нужно получить остатки товаров на конец прошлого квартала для отчёта. Какие утверждения верны? Отметьте все."
    choices:
      - id: a
        text: "Виртуальная таблица .Остатки умеет вернуть остаток не только «сейчас», но и на заданную дату."
      - id: b
        text: "Брать готовую виртуальную таблицу правильнее и быстрее, чем сворачивать движения запросом вручную."
      - id: c
        text: "Остаток на прошлую дату - штатная операция, а не хитрость."
      - id: d
        text: "Проще всего завести в справочнике «Номенклатура» реквизит «ОстатокНаКонецКвартала»."
    correct: [a, b, c]
    explanation: "a, b, c верны: виртуальные таблицы считают остаток на любую дату и делают это оптимально. d - антипаттерн: остаток не хранят реквизитом справочника, это свёртка движений регистра."
    hints:
      - "Итог на дату - это не поле объекта, а результат свёртки движений. Кто умеет считать такую свёртку готовой?"
      - "Платформа предоставляет готовые срезы (Остатки, Обороты, СрезПоследних). Нужно ли считать их руками?"
