exercises:
  - id: mode-doors-001
    concept: work-modes
    type: theory-quiz
    difficulty: 1
    prompt: "В каком режиме меняют структуру данных, код и роли конфигурации?"
    choices:
      - id: a
        text: "В Конфигураторе."
      - id: b
        text: "В режиме 1С:Предприятие."
      - id: c
        text: "В любом из двух - разницы нет."
      - id: d
        text: "Только через прямой доступ к СУБД."
    correct: [a]
    explanation: "Структуру, код, формы и роли меняют в Конфигураторе - режиме разработчика и администратора. В режиме 1С:Предприятие работают с готовым решением."
    hints:
      - "Один режим - для того, кто строит решение, другой - для того, кто в нём работает. Кто меняет структуру?"
    variants:
      - prompt: "В каком режиме бухгалтер вводит и проводит документы?"
        choices:
          - id: a
            text: "В режиме 1С:Предприятие."
          - id: b
            text: "В Конфигураторе."
          - id: c
            text: "Напрямую в СУБД."
          - id: d
            text: "В EDT."
        correct: [a]
        explanation: "Ввод и проведение документов - работа пользователя, она идёт в режиме 1С:Предприятие."
      - prompt: "Где заводят пользователей базы и выполняют «Тестирование и исправление»?"
        choices:
          - id: a
            text: "В Конфигураторе - это администрирование базы."
          - id: b
            text: "В режиме 1С:Предприятие."
          - id: c
            text: "Только в EDT."
          - id: d
            text: "В самой СУБД без участия 1С."
        correct: [a]
        explanation: "Администрирование базы - пользователи, выгрузка и загрузка, тестирование и исправление - выполняется в Конфигураторе."

  - id: mode-directives-blanks-001
    concept: work-modes
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите директивы компиляции, которые говорят платформе, где выполнять процедуры управляемой формы."
    template: |
      {{clientdir}}
      Процедура ПриИзменении()
          ПересчитатьНаСервере();
      КонецПроцедуры

      {{serverdir}}
      Процедура ПересчитатьНаСервере()
          Объект.Сумма = Объект.Цена * Объект.Количество;
      КонецПроцедуры
    blanks:
      clientdir:
        accept: ['&НаКлиенте', '&наклиенте']
      serverdir:
        accept: ['&НаСервере', '&насервере']
    explanation: "Директива &НаКлиенте помечает клиентскую процедуру (реакция на действия пользователя), &НаСервере - серверную (обращение к данным). Это и есть клиент-серверное исполнение управляемой формы."
    hints:
      - "Реакция на ввод пользователя идёт там же, где пользователь; тяжёлая работа с данными - на противоположной стороне. Как называются эти две стороны?"
    variants:
      - prompt: "Впишите директиву для процедуры, которая реагирует на действие пользователя и показывает предупреждение."
        template: |
          {{dir}}
          Процедура ПоказатьГотовность()
              Предупреждение("Готово");
          КонецПроцедуры
        blanks:
          dir:
            accept: ['&НаКлиенте', '&наклиенте']
        explanation: "Предупреждение - это работа с интерфейсом, она исполняется на клиенте: директива &НаКлиенте."
      - prompt: "Впишите директиву для процедуры, которая формирует запрос к данным."
        template: |
          {{dir}}
          Процедура ЗагрузитьОстатки()
              Запрос = Новый Запрос;
          КонецПроцедуры
        blanks:
          dir:
            accept: ['&НаСервере', '&насервере']
        explanation: "Обращение к данным и запросы выполняются на сервере: директива &НаСервере."

  - id: mode-clients-001
    concept: work-modes
    type: theory-quiz
    difficulty: 2
    prompt: "Что верно про управляемую форму?"
    choices:
      - id: a
        text: "Разработчик задаёт её состав, а раскладку под конкретный экран делает платформа."
      - id: b
        text: "Разработчик расставляет элементы по пикселям и координатам вручную."
      - id: c
        text: "Она работает только в толстом клиенте и не открывается в браузере."
      - id: d
        text: "Это форма, которую нельзя изменить в конфигурации."
    correct: [a]
    explanation: "Управляемая форма описывается составом (какие реквизиты, таблицы, команды), а платформа сама раскладывает её под десктоп, планшет или браузер. Ручная расстановка по координатам - это старые обычные формы."
    hints:
      - "Ключевое слово - «управляемая»: кто-то другой управляет тем, как форма ляжет на экран. Кто именно?"
    variants:
      - prompt: "Почему тонкий клиент называют «тонким»?"
        choices:
          - id: a
            text: "Бизнес-логика и работа с данными идут на сервере, а клиент отвечает лишь за интерфейс."
          - id: b
            text: "Он занимает мало места на диске, но тянет всю логику на себе."
          - id: c
            text: "Он умеет открывать только одну форму за раз."
          - id: d
            text: "Он работает без подключения к базе."
        correct: [a]
        explanation: "В управляемом приложении логика и обращения к данным выполняются на сервере, клиент лишь показывает интерфейс. По сравнению со старым толстым клиентом он «тонкий»."
      - prompt: "Чем веб-клиент отличается от тонкого клиента?"
        choices:
          - id: a
            text: "Это тот же тонкий клиент, только исполняемый браузером, без установки приложения."
          - id: b
            text: "Он выполняет всю бизнес-логику в браузере, без сервера."
          - id: c
            text: "Он работает только с файловыми базами."
          - id: d
            text: "Он не поддерживает управляемые формы."
        correct: [a]
        explanation: "Веб-клиент - это тонкий клиент, работающий в браузере. Устанавливать приложение не нужно, логика по-прежнему на сервере."

  - id: mode-update-001
    concept: work-modes
    type: theory-quiz
    difficulty: 3
    prompt: "Разработчик добавил в справочник реквизит и сохранил конфигурацию в Конфигураторе, но пользователи нового поля не видят. В чём причина?"
    choices:
      - id: a
        text: "Изменения лежат в основной конфигурации; чтобы они попали к пользователям, нужно обновить конфигурацию базы данных (F7)."
      - id: b
        text: "Реквизит нельзя добавить без полной переустановки платформы."
      - id: c
        text: "Пользователям нужно переустановить тонкий клиент."
      - id: d
        text: "Справочники вообще не поддерживают добавление реквизитов."
    correct: [a]
    explanation: "Правки живут в основной конфигурации, а пользователи работают по конфигурации базы данных. Пока не выполнено «Обновить конфигурацию базы данных» (F7), действует прежняя структура."
    hints:
      - "В базе не одна конфигурация: та, что редактирует разработчик, и та, по которой реально работают пользователи. Совпадают ли они сразу?"
      - "Есть отдельное действие, которое переносит правки из основной конфигурации в конфигурацию базы данных."
