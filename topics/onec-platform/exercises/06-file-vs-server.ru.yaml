exercises:
  - id: base-what-001
    concept: file-vs-server
    type: theory-quiz
    difficulty: 1
    prompt: "Что такое файловый вариант базы 1С?"
    choices:
      - id: a
        text: "Вся база - один файл, а платформа сама играет роль клиента"
      - id: b
        text: "База, которая обязательно работает на MS SQL Server."
      - id: c
        text: "База, состоящая из кластера серверов 1С."
      - id: d
        text: "База без данных, только с конфигурацией."
    correct: [a]
    explanation: "В файловом варианте вся база лежит в одном файле 1Cv8.1CD, и платформа совмещает все роли. Отдельные сервер 1С и СУБД не нужны."
    hints:
      - "Подумайте, сколько отдельных компонентов нужно установить, чтобы такая база заработала."
    variants:
      - prompt: "Из каких трёх звеньев состоит клиент-серверный вариант?"
        choices:
          - id: a
            text: "Клиенты, сервер 1С и отдельная СУБД."
          - id: b
            text: "Только клиент и один файл базы."
          - id: c
            text: "Два сервера 1С без СУБД."
          - id: d
            text: "Браузер и веб-сервер, больше ничего."
        correct: [a]
        explanation: "Клиент-серверный вариант разносит работу на три звена: клиенты, сервер 1С, который исполняет логику, и внешнюю СУБД, которая хранит данные."
      - prompt: "Что хранит данные в клиент-серверном варианте?"
        choices:
          - id: a
            text: "Отдельная СУБД - например, Microsoft SQL Server или"
          - id: b
            text: "Сам сервер 1С в оперативной памяти."
          - id: c
            text: "Тонкий клиент на компьютере пользователя."
          - id: d
            text: "Файл 1Cv8.1CD, как и в файловом варианте."
        correct: [a]
        explanation: "В клиент-серверном варианте данные хранит внешняя СУБД (MS SQL, PostgreSQL), а сервер 1С исполняет бизнес-логику."

  - id: base-facts-blanks-001
    concept: file-vs-server
    type: fill-in-blanks
    difficulty: 2
    prompt: "Впишите пропущенные факты о вариантах базы."
    template: |
      Вся файловая база хранится в одном файле {{file}}.
      Перенос базы между вариантами делают выгрузкой в файл {{dt}} и обратной загрузкой.
    blanks:
      file:
        accept: ['1Cv8.1CD', '1cv8.1cd']
      dt:
        accept: ['.dt', 'dt', '*.dt']
    explanation: "Файловая база - это файл 1Cv8.1CD. Переносят базу выгрузкой в файл формата .dt и последующей загрузкой; конфигурация при этом не меняется."
    hints:
      - "Первый пропуск - имя файла файловой базы, второй - расширение файла выгрузки всей базы."
    variants:
      - prompt: "Впишите звенья клиент-серверного варианта."
        template: |
          В клиент-серверном варианте бизнес-логику исполняет {{server}}, а данные хранит {{dbms}}.
        blanks:
          server:
            accept: ['сервер 1С', 'кластер серверов', 'сервер 1с', 'сервер']
          dbms:
            accept: ['СУБД', 'субд', 'сервер СУБД', 'сервер субд']
        explanation: "Логику исполняет сервер 1С (кластер серверов), данные хранит отдельная СУБД."
      - prompt: "Впишите, какой вариант уместен под масштаб."
        template: |
          Для одного-двух пользователей ради простоты берут {{small}} вариант, а для сотен пользователей - {{big}}.
        blanks:
          small:
            accept: ['файловый', 'файловая', 'файловую']
          big:
            accept: ['клиент-серверный', 'клиент-серверную', 'клиент-серверная']
        explanation: "Единичным пользователям хватает файлового варианта, многим - клиент-серверного ради масштаба и надёжности."

  - id: base-choose-001
    concept: file-vs-server
    type: theory-quiz
    difficulty: 3
    prompt: "Сеть из 30 бухгалтеров, большой объём данных, нужны надёжные бэкапы. Какой вариант базы уместен и почему?"
    choices:
      - id: a
        text: "Клиент-серверный: он держит много пользователей, а промышленная СУБД даёт производительность"
      - id: b
        text: "Файловый: он проще и дешевле, а число пользователей роли не играет."
      - id: c
        text: "Файловый в общей сетевой папке - этого достаточно для любого числа людей."
      - id: d
        text: "Разницы нет: оба варианта одинаково тянут любую нагрузку."
    correct: [a]
    explanation: "Много пользователей, большие объёмы и требование надёжности - это территория клиент-серверного варианта. Файловая база рассчитана на единичных пользователей и чувствительна к сбоям."
    hints:
      - "Файловый вариант упирается в потолок по числу одновременных пользователей и надёжности. Проходит ли сюда 30 человек?"
      - "Кто отвечает за резервное копирование и производительность в клиент-серверном варианте?"

  - id: base-surprise-001
    concept: file-vs-server
    type: theory-quiz
    difficulty: 3
    prompt: "Какие утверждения о вариантах базы верны? Отметьте все."
    choices:
      - id: a
        text: "Небольшую файловую базу тоже можно опубликовать в браузере через веб-сервер."
      - id: b
        text: "«Кластер серверов 1С» в простом случае - это один сервер с несколькими служебными процессами."
      - id: c
        text: "Данные хранит СУБД в обоих вариантах; меняется лишь исполнитель этого слоя."
      - id: d
        text: "Клиент-серверный вариант означает, что база обязательно размещена в интернете."
    correct: [a, b, c]
    explanation: "a, b, c верны. d - заблуждение: клиент-серверный вариант описывает архитектуру (клиенты, сервер 1С, СУБД), а не размещение в интернете."
    hints:
      - "Разделите два вопроса: как устроена работа с базой и где физически стоит сервер."
      - "Вспомните, что «кластер» здесь про архитектуру процессов, а не про обязательный парк машин."
