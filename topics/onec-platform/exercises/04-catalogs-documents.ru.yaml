exercises:
  - id: docs-catalog-001
    concept: catalogs-documents
    type: theory-quiz
    difficulty: 1
    prompt: "Чем документ принципиально отличается от элемента справочника?"
    choices:
      - id: a
        text: "У документа всегда есть дата и номер - это событие во времени"
      - id: b
        text: "Документ нельзя удалить, а элемент справочника можно."
      - id: c
        text: "Документ хранится в СУБД, а справочник - в конфигурации."
      - id: d
        text: "Между ними нет разницы, это синонимы."
    correct: [a]
    explanation: "Документ фиксирует факт хозяйственной жизни и привязан к моменту времени (дата и номер). Справочник хранит условно-постоянные данные: контрагентов, товары, склады."
    hints:
      - "Справочник отвечает на вопрос «кто или что», документ - на вопрос «что произошло и когда». Что из этого требует даты?"
    variants:
      - prompt: "Что из перечисленного правильно вести справочником?"
        choices:
          - id: a
            text: "Список контрагентов."
          - id: b
            text: "Отгрузку товара 5 марта."
          - id: c
            text: "Поступление оплаты вчера."
          - id: d
            text: "Возврат от покупателя."
        correct: [a]
        explanation: "Список контрагентов - условно-постоянные данные, им место в справочнике. Отгрузка, оплата и возврат - события с датой, это документы."
      - prompt: "Что из перечисленного правильно оформить документом?"
        choices:
          - id: a
            text: "Реализацию товаров покупателю."
          - id: b
            text: "Список складов предприятия без оборотов."
          - id: c
            text: "Перечень единиц измерения."
          - id: d
            text: "Справочник валют всегда."
        correct: [a]
        explanation: "Реализация - событие с датой, это документ. Склады, единицы измерения и валюты - условно-постоянные списки, это справочники."

  - id: docs-tabular-blanks-001
    concept: catalogs-documents
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните обход табличной части документа на встроенном языке 1С: сложить суммы всех строк."
    template: |
      Итог = 0;
      {{forkey}} Строка Из Док.Товары Цикл
          Итог = Итог + Строка.Сумма;
      {{konec}}
      Сообщить(Итог);
    blanks:
      forkey:
        accept: ['Для Каждого', 'для каждого', 'Для каждого']
      konec:
        accept: ['КонецЦикла;', 'КонецЦикла', 'конеццикла;', 'конеццикла']
    explanation: "Табличную часть документа обходят циклом «Для Каждого … Из … Цикл», а закрывают его словом КонецЦикла. Док.Товары - это табличная часть документа."
    hints:
      - "Нужен цикл, который проходит по каждой строке коллекции. Как во встроенном языке 1С открывается такой обход и как он закрывается?"
    variants:
      - prompt: "Дополните поиск элемента справочника по коду."
        template: |
          Контрагент = {{root}}.Контрагенты.НайтиПоКоду("00-0001");
          Сообщить(Контрагент.Наименование);
        blanks:
          root:
            accept: ['Справочники', 'справочники']
        explanation: "К справочникам обращаются через менеджер Справочники, а НайтиПоКоду ищет элемент по его коду."
      - prompt: "Дополните проверку того, что документ проведён."
        template: |
          Если Док.Проведен = Истина Тогда
              Сообщить("Документ отражён в учёте");
          {{konec}}
        blanks:
          konec:
            accept: ['КонецЕсли;', 'КонецЕсли', 'конецесли;', 'конецесли']
        explanation: "Условие Если закрывается словом КонецЕсли. Реквизит Проведен показывает, отражён ли документ в учёте."

  - id: docs-posting-001
    concept: catalogs-documents
    type: theory-quiz
    difficulty: 3
    prompt: "Пользователь сохранил реализацию, но остаток товара на складе не изменился. Что произошло?"
    choices:
      - id: a
        text: "Документ записан, но не проведён: движения по регистрам формируются только при проведении."
      - id: b
        text: "Произошёл сбой платформы - остаток обязан меняться при сохранении."
      - id: c
        text: "Реализация не умеет влиять на остатки товара в принципе."
      - id: d
        text: "Остаток хранится в самом документе и обновится при следующем открытии."
    correct: [a]
    explanation: "«Записать» - сохранить документ как факт, «провести» - отразить его в учёте, сформировав движения по регистрам. Пока документ не проведён, остаток не меняется."
    hints:
      - "С документом можно сделать два разных действия. Какое из них влияет на итоги, а какое лишь сохраняет факт?"
      - "Остаток - это результат движений по регистру. Когда документ формирует эти движения?"

  - id: docs-modeling-001
    concept: catalogs-documents
    type: theory-quiz
    difficulty: 4
    prompt: "Проектируете учёт продаж. Какие решения по моделированию верны? Отметьте все."
    choices:
      - id: a
        text: "Каждую продажу оформлять документом с датой и табличной частью товаров."
      - id: b
        text: "Список контрагентов вести справочником и ссылаться на него из документов."
      - id: c
        text: "Договоры сделать справочником, подчинённым справочнику «Контрагенты» (владелец)."
      - id: d
        text: "Все продажи хранить одним справочником «Продажи» вместо документов."
    correct: [a, b, c]
    explanation: "a, b, c - здоровая модель: событие - документ, условно-постоянные списки - справочники, договор принадлежит контрагенту через подчинение. d ошибочно: продажа - событие, справочник лишит её проведения, движений и корректных итогов."
    hints:
      - "Разложите сущности на «события во времени» и «условно-постоянные списки». Что из них документ, а что справочник?"
      - "Если сущность нужно проводить и получать по ней движения и итоги - справочник для неё не подходит."
