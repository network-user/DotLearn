conceptId: processes-threads
cards:
  - id: processes-threads-01
    front: "Чем процесс отличается от потока по памяти?"
    back: "У процесса своё изолированное адресное пространство: два процесса не видят переменных друг друга. Потоки одного процесса делят общую кучу и все объекты на ней."
    tags: [concurrency]
  - id: processes-threads-02
    front: "Что потоки одного процесса делят между собой?"
    back: "Кучу и всё, что на ней: глобальные переменные, списки, словари, экземпляры классов, состояние модулей. Плюс ресурсы процесса вроде таблицы открытых файлов."
    tags: [concurrency]
  - id: processes-threads-03
    front: "Что у каждого потока своё, личное?"
    back: "Стек с локальными переменными и цепочкой вызовов, собственные регистры процессора и счётчик команд (PC), помнящий текущую инструкцию."
    tags: [concurrency]
  - id: processes-threads-04
    front: "Где живут локальные переменные потока и почему они безопасны?"
    back: "В стеке того потока, который вызвал функцию. Другой поток этот стек не видит, поэтому локальные переменные почти всегда безопасны, в отличие от общего состояния на куче."
    tags: [concurrency]
  - id: processes-threads-05
    front: "Поток Python это настоящий поток ОС или зелёный поток?"
    back: "Настоящий поток ядра (на Linux pthread). threading.Thread оборачивает поток ОС, который планирует ядро. Это не выдумка интерпретатора и не корутина."
    tags: [concurrency]
  - id: processes-threads-06
    front: "Кто планирует потоки Python и может ли поток быть вытеснен посреди операции?"
    back: "Планирует ядро ОС (вытесняющая многозадачность). Оно может остановить поток между любыми двумя инструкциями, не спрашивая разрешения, в том числе посреди на вид неделимой операции."
    tags: [concurrency]
  - id: processes-threads-07
    front: "Что такое переключение контекста и из чего оно состоит?"
    back: "Смена потока на процессоре: ядро останавливает текущий поток, сохраняет его регистры и указатель стека, выбирает следующий и загружает его состояние. Это накладной расход, а не полезная работа."
    tags: [concurrency]
  - id: processes-threads-08
    front: "Почему переключение между процессами дороже, чем между потоками?"
    back: "У процессов меняется целое адресное пространство, и процессору приходится сбрасывать кэши трансляции адресов. У потоков одного процесса адресное пространство общее, поэтому переключение легче."
    tags: [concurrency]
  - id: processes-threads-09
    front: "Как обмениваются данными два отдельных процесса?"
    back: "Только явно: через каналы (pipe), сокеты или разделяемую память. Каждый обмен это осознанное копирование байтов из одного адресного пространства в другое."
    tags: [concurrency]
  - id: processes-threads-10
    front: "Почему общая память потоков это одновременно сила и опасность?"
    back: "Сила: общение бесплатно, копировать ничего не нужно. Опасность: два потока видят один изменяемый объект и могут менять его одновременно, оставив в противоречивом состоянии (гонка)."
    tags: [concurrency]
  - id: processes-threads-11
    front: "Почему потоки называют «лёгкими» по сравнению с процессами?"
    back: "Создать поток внутри процесса дёшево: нужен лишь новый стек и блок управления потоком. Породить процесс дорого: заводятся таблицы страниц, список открытых файлов, права заново."
    tags: [concurrency]
