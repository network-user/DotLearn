conceptId: races-threading
cards:
  - id: races-threading-01
    front: "How do you run a function in a separate thread using threading?"
    back: "t = Thread(target=fn, args=(...)); t.start(). start() creates a real OS thread and runs target inside it, returning immediately."
    tags: [threading]
  - id: races-threading-02
    front: "What does join() do, and why is it needed?"
    back: "Blocks the calling thread until the target finishes. Needed so you can wait for a worker thread's result instead of racing ahead or exiting the program too early."
    tags: [threading]
  - id: races-threading-03
    front: "How does start() differ from calling run() directly?"
    back: "start() spawns a new OS thread and runs target inside it. Calling run() directly executes the body in the current thread, with no concurrency, a common mistake."
    tags: [threading]
  - id: races-threading-04
    front: "What is a daemon thread, and what is its danger?"
    back: "A background thread (daemon=True): once only daemons remain, the interpreter exits and cuts them off mid-way. Dangerous for work that shouldn't be lost (an unfinished file write, an open transaction)."
    tags: [threading]
  - id: races-threading-05
    front: "The three conditions for a data race."
    back: "Shared mutable state, at least one thread writes it, and access is otherwise unordered. Remove any one of the three (local data, read-only, synchronization) and there is no race."
    tags: [threading, race]
  - id: races-threading-06
    front: "Why doesn't a counter incremented a million times each by eight threads reach 8,000,000?"
    back: "counter += 1 is not atomic: the read and the write are separate bytecodes. Two threads read the same value before either writes, both write the same result, one increment is lost. Over millions of iterations the shortfall adds up."
    tags: [threading, race]
  - id: races-threading-07
    front: "Why do tests barely catch races?"
    back: "A race is not reproducible: whether it shows up depends on how threads happen to interleave in a given run. A green test only means \"it didn't line up this time\", not \"there is no race\". Tests cannot prove the absence of a race."
    tags: [threading, race]
  - id: races-threading-08
    front: "What is check-then-act?"
    back: "A thread checks a condition, then acts, assuming nothing changed between the check and the act. Two threads pass the check before either changes state: if not exists: create, if balance >= amount: withdraw."
    tags: [threading, race]
  - id: races-threading-09
    front: "What's dangerous about a cache stampede in lazy initialization?"
    back: "Two threads see an empty cache and both call an expensive compute. The extra call is half the problem; if the action has a side effect (a charge, an email, an order), it happens twice."
    tags: [threading, race]
  - id: races-threading-10
    front: "Why does adding a print sometimes \"fix\" a race?"
    back: "It doesn't fix it, it shifts the timing: print takes an I/O lock and releases the GIL at a predictable point, so the unlucky interleaving happens less often. This is an observer effect (a heisenbug), a sign of the race, not a solution."
    tags: [threading, race]
