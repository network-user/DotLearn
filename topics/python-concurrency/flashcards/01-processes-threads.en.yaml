conceptId: processes-threads
cards:
  - id: processes-threads-01
    front: "How does a process differ from a thread in terms of memory?"
    back: "A process has its own isolated address space: two processes cannot see each other's variables. Threads of the same process share a common heap and all the objects on it."
    tags: [concurrency]
  - id: processes-threads-02
    front: "What do threads of the same process share with each other?"
    back: "The heap and everything on it: global variables, lists, dicts, class instances, module state. Plus process resources like the open-file table."
    tags: [concurrency]
  - id: processes-threads-03
    front: "What does each thread keep private to itself?"
    back: "The stack with local variables and the call chain, its own CPU registers, and the instruction pointer (PC) that remembers the current instruction."
    tags: [concurrency]
  - id: processes-threads-04
    front: "Where do a thread's local variables live, and why are they safe?"
    back: "On the stack of the thread that called the function. No other thread sees that stack, so local variables are almost always safe, unlike shared state on the heap."
    tags: [concurrency]
  - id: processes-threads-05
    front: "Is a Python thread a real OS thread or a green thread?"
    back: "A real kernel thread (a pthread on Linux). threading.Thread wraps an OS thread that the kernel schedules. It is not something the interpreter made up, and it is not a coroutine."
    tags: [concurrency]
  - id: processes-threads-06
    front: "Who schedules Python threads, and can a thread be preempted mid-operation?"
    back: "The OS kernel schedules them (preemptive multitasking). It can stop a thread between any two instructions without asking, including in the middle of an operation that looks atomic."
    tags: [concurrency]
  - id: processes-threads-07
    front: "What is a context switch, and what does it consist of?"
    back: "Swapping which thread runs on the CPU: the kernel stops the current thread, saves its registers and stack pointer, picks the next one, and loads its state. It is overhead, not useful work."
    tags: [concurrency]
  - id: processes-threads-08
    front: "Why is switching between processes more expensive than switching between threads?"
    back: "Processes have a whole address space swap, forcing the CPU to flush address-translation caches. Threads of the same process share the address space, so switching is cheaper."
    tags: [concurrency]
  - id: processes-threads-09
    front: "How do two separate processes exchange data?"
    back: "Only explicitly: through pipes, sockets, or shared memory. Every exchange is a deliberate copy of bytes from one address space to another."
    tags: [concurrency]
  - id: processes-threads-10
    front: "Why is shared thread memory both a strength and a danger?"
    back: "Strength: communication is free, nothing needs copying. Danger: two threads see the same mutable object and can modify it at the same time, leaving it in an inconsistent state (a race)."
    tags: [concurrency]
  - id: processes-threads-11
    front: "Why are threads called \"lightweight\" compared to processes?"
    back: "Creating a thread inside a process is cheap: it only needs a new stack and a thread control block. Spawning a process is expensive: page tables, the open-file list, and permissions are set up from scratch."
    tags: [concurrency]
