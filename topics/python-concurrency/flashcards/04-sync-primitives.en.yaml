conceptId: sync-primitives
cards:
  - id: sync-primitives-01
    front: "What is a critical section, and what does a Lock guarantee?"
    back: "A critical section is the code between acquire and release. A Lock provides mutual exclusion: at most one thread in the section at a time, the rest wait on acquire."
    tags: [synchronization]
  - id: sync-primitives-02
    front: "Why take a lock via `with` instead of acquire/release by hand?"
    back: "with guarantees release on exiting the block in every scenario, including an exception. A manual pair without try/finally leaves the lock held forever on an exception, and everyone waiting hangs."
    tags: [synchronization]
  - id: sync-primitives-03
    front: "How does RLock differ from Lock?"
    back: "RLock is reentrant: it remembers the owner and counts the acquisition depth, so the same thread can acquire it again. A plain Lock hangs a thread forever on a repeated acquire."
    tags: [synchronization]
  - id: sync-primitives-04
    front: "When do you need RLock instead of Lock?"
    back: "When a re-entry under the same lock is possible inside a critical section: a method under the lock calls another method that also takes that lock."
    tags: [synchronization]
  - id: sync-primitives-05
    front: "What is Semaphore(N) for?"
    back: "Capping the number of concurrently running threads at N: it holds a counter of N permits, lets up to N in, and makes the rest wait. Example: no more than N API requests or database connections."
    tags: [synchronization]
  - id: sync-primitives-06
    front: "What is Event for?"
    back: "Sending a signal. A flag that threads wait on via wait(); another thread raises it via set(). While the flag is down, all waiters block; after set() they all continue at once."
    tags: [synchronization]
  - id: sync-primitives-07
    front: "What is a deadlock, and how does it arise?"
    back: "A mutual block: threads wait on resources in a circle. A holds L1 and waits for L2, B holds L2 and waits for L1. Neither releases its own until it gets the other's, so both wait forever."
    tags: [synchronization, deadlock]
  - id: sync-primitives-08
    front: "What is the most reliable way to prevent a lock-based deadlock?"
    back: "A single global lock-acquisition order: every thread always takes locks in the same order. Then a wait cycle can never form. A timeout on acquire also helps, but a fixed order is more reliable."
    tags: [synchronization, deadlock]
  - id: sync-primitives-09
    front: "What's the tradeoff in lock granularity?"
    back: "One coarse shared lock is simple and deadlock-safe, but it strangles concurrency (everyone queues even for unrelated data). Fine-grained locks bring parallelism back, but open the door to deadlocks and add overhead."
    tags: [synchronization]
  - id: sync-primitives-10
    front: "Why do you check the predicate in a `while` with Condition, not an `if`?"
    back: "A woken thread must re-check the condition: between waking up and re-acquiring the lock, another thread might have changed the state again, plus spurious wakeups are possible. `while cond.wait()` re-checks the predicate."
    tags: [synchronization]
