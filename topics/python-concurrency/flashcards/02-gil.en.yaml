conceptId: gil
cards:
  - id: gil-01
    front: "What is the GIL, and what does it guarantee?"
    back: "The Global Interpreter Lock, one lock for the whole CPython interpreter. It guarantees that at any moment only one thread executes Python bytecode; there is no parallel execution across multiple cores."
    tags: [gil]
  - id: gil-02
    front: "Why does CPython have a GIL?"
    back: "For cheap protection of reference counting (refcount). Every object's reference count keeps changing; concurrent updates from two threads would corrupt it. One shared lock is cheaper than a lock per object."
    tags: [gil]
  - id: gil-03
    front: "At what boundary does the GIL get handed off between threads?"
    back: "At the boundary between bytecode instructions, not between lines of code. Modern CPython switches by a timer (about 5ms, sys.getswitchinterval() = 0.005), older versions counted bytecode ticks."
    tags: [gil]
  - id: gil-04
    front: "Why isn't `counter += 1` on a shared counter atomic, even with the GIL?"
    back: "It is several bytecode instructions: read, add, write. The GIL prevents concurrent bytecode execution, but allows a switch in the gap between instructions, so one increment can get lost."
    tags: [gil]
  - id: gil-05
    front: "Why do threads speed up IO-bound code?"
    back: "On blocking I/O (network, disk, time.sleep) CPython releases the GIL. While one thread waits, another runs. Threads overlap the waiting, so many downloads finish almost in parallel."
    tags: [gil]
  - id: gil-06
    front: "Why DON'T threads speed up CPU-bound code in pure Python?"
    back: "A number-crunching loop holds the GIL and only releases it on the timer. Threads take turns on one core and add switching overhead, so there is no speedup, sometimes it is even a bit slower."
    tags: [gil]
  - id: gil-07
    front: "What should you reach for to get real parallelism for CPU-bound work in CPython?"
    back: "multiprocessing or ProcessPoolExecutor: separate processes, each with its own interpreter and its own GIL, so they genuinely run on different cores."
    tags: [gil]
  - id: gil-08
    front: "Do C extensions release the GIL?"
    back: "Heavy C operations (e.g. large numpy computations) release the GIL while doing their internal work. That is why the rule \"threads don't help CPU-bound code\" holds specifically for pure Python code, not for every workload."
    tags: [gil]
  - id: gil-09
    front: "Why is `list.append(x)` thread-safe while `x += 1` isn't?"
    back: "Not because it is \"one instruction\": append is also several bytecodes. The reason is that `list.append` is implemented in C and performs the mutation in one call without releasing the GIL, and that call fits inside a single `CALL` bytecode instruction, which cannot be interrupted mid-way under the GIL. `x += 1` is several Python bytecodes (read, add, write) with a gap between them, so a switch can lose one update. Relying on this in real code is fragile."
    tags: [gil]
  - id: gil-10
    front: "What is free-threading (PEP 703)?"
    back: "An experimental CPython build without the GIL (since 3.13, a binary like python3.13t). It replaces the single lock with per-object locking plus a reworked refcount. It gives real thread parallelism at the cost of slightly slower single-threaded code and C-extension compatibility."
    tags: [gil]
