conceptId: races-threading
cards:
  - id: races-threading-01
    front: "Как запустить функцию в отдельном потоке через threading?"
    back: "t = Thread(target=fn, args=(...)); t.start(). start() создаёт настоящий поток ОС и выполняет target в нём, возвращаясь немедленно."
    tags: [threading]
  - id: races-threading-02
    front: "Что делает join() и зачем он нужен?"
    back: "Блокирует вызывающий поток, пока целевой не завершится. Нужен, чтобы дождаться результата рабочего потока и не улететь дальше или не выйти из программы раньше времени."
    tags: [threading]
  - id: races-threading-03
    front: "Чем start() отличается от прямого вызова run()?"
    back: "start() рождает новый поток ОС и выполняет target в нём. Прямой вызов run() исполнит тело в текущем потоке, без конкурентности, частая ошибка."
    tags: [threading]
  - id: races-threading-04
    front: "Что такое daemon-поток и в чём его опасность?"
    back: "Фоновый поток (daemon=True): когда остаются только демоны, интерпретатор завершается и обрывает их на полуслове. Опасно для работы, которую нельзя терять (недописанный файл, открытая транзакция)."
    tags: [threading]
  - id: races-threading-05
    front: "Три условия гонки данных."
    back: "Общее изменяемое состояние, хотя бы один поток его пишет, доступ ничем не упорядочен. Убрать любое из трёх (локальные данные, только чтение, синхронизация) и гонки нет."
    tags: [threading, race]
  - id: races-threading-06
    front: "Почему счётчик из восьми потоков по миллиону инкрементов не даёт 8 000 000?"
    back: "counter += 1 не атомарен: чтение и запись это разные байткоды. Два потока читают одно значение до записи, оба пишут одинаковый результат, одно увеличение теряется. За миллионы итераций накапливается недобор."
    tags: [threading, race]
  - id: races-threading-07
    front: "Почему тесты почти не ловят гонки?"
    back: "Гонка невоспроизводима: проявится или нет, зависит от переплетения потоков в конкретном запуске. Зелёный тест означает лишь «в этот раз не совпало», а не «гонки нет». Доказать отсутствие гонки тестами нельзя."
    tags: [threading, race]
  - id: races-threading-08
    front: "Что такое проверка-затем-действие (check-then-act)?"
    back: "Поток проверяет условие, потом действует, полагаясь, что между проверкой и действием ничего не изменилось. Два потока проходят проверку до того, как один изменит состояние: if not exists: create, if balance >= amount: withdraw."
    tags: [threading, race]
  - id: races-threading-09
    front: "Чем опасен cache stampede в ленивой инициализации?"
    back: "Два потока видят пустой кэш и оба вызывают дорогой compute. Лишний запрос это полбеды; если у действия есть побочный эффект (списание, письмо, заказ), оно случится дважды."
    tags: [threading, race]
  - id: races-threading-10
    front: "Почему добавление print иногда «чинит» гонку?"
    back: "Не чинит, а сдвигает тайминг: print берёт блокировку ввода-вывода и отпускает GIL в предсказуемой точке, неудачное переплетение складывается реже. Это эффект наблюдателя (гейзенбаг), признак гонки, а не решение."
    tags: [threading, race]
