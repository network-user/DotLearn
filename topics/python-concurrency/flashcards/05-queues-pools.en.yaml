conceptId: queues-pools
cards:
  - id: queues-pools-01
    front: "Why hand state to queue.Queue instead of using manual locks?"
    back: "The queue is thread-safe internally: it has its own lock, and concurrent put/get from different threads are correct without your own synchronization. Higher level of abstraction, fewer ways to get it wrong."
    tags: [queue]
  - id: queues-pools-02
    front: "What does queue.Queue.get() do on an empty queue?"
    back: "By default it blocks the calling thread until another thread puts an item via put(). It does not return None and does not raise."
    tags: [queue]
  - id: queues-pools-03
    front: "What is a sentinel, and why is it needed?"
    back: "A special marker item (often None) that the producer puts in last. Upon pulling it, the consumer knows \"work is over\" and exits its loop. Needed because get() on an empty queue would otherwise hang."
    tags: [queue]
  - id: queues-pools-04
    front: "How many sentinels do you need with several consumers?"
    back: "One per consumer. A single sentinel shared among several will let only one consumer exit, while the rest hang forever on get() from an empty queue."
    tags: [queue]
  - id: queues-pools-05
    front: "What does ThreadPoolExecutor.submit() return?"
    back: "A Future, a promise object for the result. The task goes into the pool, submit returns immediately, and you fetch the value later via future.result(), which waits until it is ready."
    tags: [executor]
  - id: queues-pools-06
    front: "How does an exception raised inside a pool task surface?"
    back: "It does not crash the program and is not printed: the Future catches and stores it. It only surfaces when you call future.result(). If you never check the result, you silently lose the error."
    tags: [executor]
  - id: queues-pools-07
    front: "How do map and as_completed differ in result order?"
    back: "map returns results in the order of the inputs (like the built-in map, only concurrent). as_completed yields Futures as they become ready, in finish order, not submission order."
    tags: [executor]
  - id: queues-pools-08
    front: "How do you cleanly shut down a ThreadPoolExecutor?"
    back: "Use it as a context manager: exiting the with block calls shutdown(wait=True), which waits for every started task to finish. No need to manually count sentinels."
    tags: [executor]
  - id: queues-pools-09
    front: "Why won't ThreadPoolExecutor speed up CPU-bound work?"
    back: "Because of the GIL, threads don't execute Python bytecode in parallel, so the pool just adds overhead. For CPU-bound load use ProcessPoolExecutor, which shares the same interface."
    tags: [executor]
  - id: queues-pools-10
    front: "What do task_done() and join() do on a queue?"
    back: "The consumer calls task_done() after processing an item. Any thread can call q.join(), which blocks until the number of task_done calls matches the number of put calls. join is about \"all the work is done\"; a sentinel is about \"time to exit\"."
    tags: [queue]
