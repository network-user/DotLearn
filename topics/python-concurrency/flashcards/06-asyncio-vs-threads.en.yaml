conceptId: asyncio-vs-threads
cards:
  - id: asyncio-vs-threads-01
    front: "How does asyncio's cooperative multitasking differ from threads' preemptive multitasking?"
    back: "A coroutine yields control only at an explicit await point; between two awaits it runs uninterrupted. A thread is preempted by the kernel forcibly, between any instructions. asyncio's switch points are visible in the code."
    tags: [asyncio]
  - id: asyncio-vs-threads-02
    front: "What does await do inside a coroutine?"
    back: "It yields control to the event loop at that point: the coroutine signals that it is now waiting (on the network, a timer), and the loop runs another ready task. It is not a thread block and not a new thread."
    tags: [asyncio]
  - id: asyncio-vs-threads-03
    front: "What is the event loop, and how many coroutines does it run at once?"
    back: "A single-threaded loop that keeps a list of ready tasks: it takes a coroutine, runs it up to an await, parks it, and moves to the next. Exactly one coroutine runs at a time, no parallelism across cores."
    tags: [asyncio]
  - id: asyncio-vs-threads-04
    front: "Why does asyncio handle thousands of connections more easily than threads?"
    back: "An OS thread needs a stack of several megabytes and a slot in the kernel scheduler; thousands of threads means gigabytes of memory and expensive switching. Thousands of coroutines live in one thread with almost no overhead."
    tags: [asyncio]
  - id: asyncio-vs-threads-05
    front: "Why do you need asyncio.Lock if there is only one thread?"
    back: "An await inside a critical section is a switch point: while the task waits, the loop lets another one run, and it sees the intermediate state. Check-then-act across an await is a race. Guard any invariant that spans an await with async with asyncio.Lock."
    tags: [asyncio, synchronization]
  - id: asyncio-vs-threads-06
    front: "How does asyncio.Lock differ from threading.Lock?"
    back: "threading.Lock blocks the thread when busy. asyncio.Lock does not block the thread, it parks the task and returns control to the loop so it can run others. You take it via async with."
    tags: [asyncio, synchronization]
  - id: asyncio-vs-threads-07
    front: "What happens if you call blocking code (time.sleep, synchronous requests) inside a coroutine?"
    back: "It never reaches an await and never returns control to the loop, and since the loop is single-threaded, all of its tasks freeze at once. One synchronous call stalls the whole server."
    tags: [asyncio]
  - id: asyncio-vs-threads-08
    front: "What does loop.run_in_executor do, and why is it needed?"
    back: "It hands a blocking call off to a pool (a ThreadPoolExecutor by default) and returns an awaitable, so the loop is not stalled. It lets synchronous libraries coexist with asyncio. For CPU-bound work you pass a ProcessPoolExecutor."
    tags: [asyncio]
  - id: asyncio-vs-threads-09
    front: "What does calling an async function without await return?"
    back: "A coroutine object; the body never runs. Python warns \"coroutine was never awaited\". To actually run it, you await it or schedule it as a task via asyncio.create_task."
    tags: [asyncio]
  - id: asyncio-vs-threads-10
    front: "How do you choose between threading, asyncio, and multiprocessing?"
    back: "threading for moderate I/O with synchronous libraries; asyncio for thousands of connections when async libraries are available; multiprocessing for CPU-bound work (its own GIL per process). Neither threads nor asyncio speed up CPU-bound load."
    tags: [asyncio, concurrency]
  - id: asyncio-vs-threads-11
    front: "In what order does asyncio.gather return results?"
    back: "In the order of the arguments passed in, not the order the coroutines finished. Even if the third coroutine finishes first, its result stays third in the gather list."
    tags: [asyncio]
