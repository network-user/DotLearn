conceptId: sync-primitives
cards:
  - id: sync-primitives-01
    front: "Что такое критическая секция и что гарантирует Lock?"
    back: "Критическая секция это код между acquire и release. Lock обеспечивает взаимное исключение: одновременно в секции не более одного потока, остальные ждут на acquire."
    tags: [synchronization]
  - id: sync-primitives-02
    front: "Почему замок берут через `with`, а не acquire/release руками?"
    back: "with гарантирует release на выходе из блока при любом сценарии, включая исключение. Ручная пара без try/finally при исключении оставит замок захваченным навсегда, и все ждущие зависнут."
    tags: [synchronization]
  - id: sync-primitives-03
    front: "Чем RLock отличается от Lock?"
    back: "RLock реентрантный: помнит владельца и считает глубину захватов, тот же поток может захватить повторно. Обычный Lock на повторном acquire тем же потоком вешает его навсегда."
    tags: [synchronization]
  - id: sync-primitives-04
    front: "Когда нужен RLock вместо Lock?"
    back: "Когда внутри критической секции возможен повторный заход под тот же замок: метод под замком вызывает другой метод, который тоже берёт этот замок."
    tags: [synchronization]
  - id: sync-primitives-05
    front: "Для чего Semaphore(N)?"
    back: "Ограничить число одновременно работающих потоков до N: хранит счётчик из N разрешений, пускает внутрь до N, остальных заставляет ждать. Пример: не больше N запросов к API или соединений с базой."
    tags: [synchronization]
  - id: sync-primitives-06
    front: "Для чего Event?"
    back: "Подать сигнал. Флаг, которого потоки ждут через wait(); другой поток поднимает его через set(). Пока флаг не поднят, все ждущие стоят, после set продолжают разом."
    tags: [synchronization]
  - id: sync-primitives-07
    front: "Что такое deadlock и как он возникает?"
    back: "Взаимная блокировка: потоки ждут ресурсы по кругу. A держит L1 и ждёт L2, B держит L2 и ждёт L1. Ни один не отпустит своё, пока не получит чужое, оба стоят вечно."
    tags: [synchronization, deadlock]
  - id: sync-primitives-08
    front: "Как надёжнее всего предотвратить deadlock на замках?"
    back: "Единая глобальная дисциплина порядка захвата: все потоки всегда берут замки в одном и том же порядке. Тогда кольцо ожидания сложиться не может. Тайм-аут на acquire тоже помогает, но порядок надёжнее."
    tags: [synchronization, deadlock]
  - id: sync-primitives-09
    front: "В чём размен гранулярности блокировок?"
    back: "Грубый общий замок прост и безопасен от deadlock, но душит конкурентность (все в очереди даже к несвязанным данным). Мелкие замки возвращают параллелизм, но открывают дорогу deadlock и добавляют накладные расходы."
    tags: [synchronization]
  - id: sync-primitives-10
    front: "Почему в Condition проверяют предикат в `while`, а не `if`?"
    back: "Проснувшийся поток обязан заново проверить условие: между пробуждением и повторным захватом замка другой поток мог снова изменить состояние, плюс возможны ложные пробуждения. while cond.wait() перепроверяет предикат."
    tags: [synchronization]
