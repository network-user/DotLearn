conceptId: queues-pools
cards:
  - id: queues-pools-01
    front: "Зачем отдавать состояние в queue.Queue вместо ручных замков?"
    back: "Очередь потокобезопасна изнутри: у неё свой замок, и одновременные put/get из разных потоков корректны без вашей синхронизации. Уровень абстракции выше, способов ошибиться меньше."
    tags: [queue]
  - id: queues-pools-02
    front: "Что делает queue.Queue.get() на пустой очереди?"
    back: "По умолчанию блокирует вызывающий поток, пока другой поток не положит элемент через put(). Не возвращает None и не падает."
    tags: [queue]
  - id: queues-pools-03
    front: "Что такое sentinel и зачем он нужен?"
    back: "Специальный элемент-маркер (часто None), который producer кладёт последним. Consumer, вынув его, понимает «работа кончилась» и выходит из цикла. Нужен, потому что get на пустой очереди иначе виснет."
    tags: [queue]
  - id: queues-pools-04
    front: "Сколько sentinel нужно при нескольких consumer'ах?"
    back: "По одному на каждого consumer'а. Один sentinel на нескольких приведёт к тому, что выйдет только один, а остальные навсегда зависнут на get пустой очереди."
    tags: [queue]
  - id: queues-pools-05
    front: "Что возвращает ThreadPoolExecutor.submit()?"
    back: "Future, объект-обещание результата. Задача уходит в пул, submit возвращается немедленно, а за значением приходят позже через future.result(), который подождёт готовности."
    tags: [executor]
  - id: queues-pools-06
    front: "Как всплывает исключение, случившееся внутри задачи пула?"
    back: "Оно не роняет программу и не печатается: Future ловит и хранит его. Всплывает только при вызове future.result(). Не заглянув в результат, вы молча потеряете ошибку."
    tags: [executor]
  - id: queues-pools-07
    front: "Чем отличается порядок результатов у map и as_completed?"
    back: "map отдаёт результаты в порядке входных данных (как встроенный map, только конкурентно). as_completed выдаёт Future по мере готовности, в порядке завершения, а не подачи."
    tags: [executor]
  - id: queues-pools-08
    front: "Как аккуратно завершить ThreadPoolExecutor?"
    back: "Использовать его как контекстный менеджер: на выходе из with вызывается shutdown(wait=True), который дожидается всех начатых задач. Ручной пересчёт sentinel не нужен."
    tags: [executor]
  - id: queues-pools-09
    front: "Почему ThreadPoolExecutor не ускорит CPU-bound работу?"
    back: "Из-за GIL потоки не исполняют Python-байткод параллельно, пул лишь добавит накладные расходы. Для нагрузки на процессор берут ProcessPoolExecutor с тем же интерфейсом."
    tags: [executor]
  - id: queues-pools-10
    front: "Что делают task_done() и join() у очереди?"
    back: "Consumer после обработки зовёт task_done(). Любой поток может вызвать q.join(), который блокируется, пока число task_done не сравняется с числом put. join про «вся работа сделана», sentinel про «пора выходить»."
    tags: [queue]
