conceptId: asyncio-vs-threads
cards:
  - id: asyncio-vs-threads-01
    front: "Чем кооперативная многозадачность asyncio отличается от вытесняющей у потоков?"
    back: "Корутина отдаёт управление только в явной точке await; между двумя await она непрерывна. Поток же вытесняется ядром принудительно, между любыми инструкциями. Точки переключения в asyncio видны в коде."
    tags: [asyncio]
  - id: asyncio-vs-threads-02
    front: "Что делает await внутри корутины?"
    back: "Отдаёт управление event loop в этой точке: корутина сообщает, что сейчас ждёт (сеть, таймер), и loop запускает другую готовую задачу. Это не блокировка потока и не новый поток."
    tags: [asyncio]
  - id: asyncio-vs-threads-03
    front: "Что такое event loop и сколько корутин он исполняет одновременно?"
    back: "Цикл в одном потоке, ведущий список готовых задач: берёт корутину, ведёт до await, паркует, переходит к следующей. Реально исполняется ровно одна корутина за раз, параллелизма на ядрах нет."
    tags: [asyncio]
  - id: asyncio-vs-threads-04
    front: "Почему asyncio держит тысячи соединений легче, чем потоки?"
    back: "Потоку ОС нужен стек в несколько мегабайт и место в планировщике ядра; тысячи потоков это гигабайты памяти и дорогие переключения. Тысячи корутин живут в одном потоке почти без накладных расходов."
    tags: [asyncio]
  - id: asyncio-vs-threads-05
    front: "Зачем нужен asyncio.Lock, если поток всего один?"
    back: "await внутри критической секции это точка переключения: пока задача ждёт, loop пускает другую, и та видит промежуточное состояние. Проверка-затем-действие через await это гонка. Инвариант, пересекающий await, защищают async with asyncio.Lock."
    tags: [asyncio, synchronization]
  - id: asyncio-vs-threads-06
    front: "Чем asyncio.Lock отличается от threading.Lock?"
    back: "threading.Lock при занятости блокирует поток. asyncio.Lock не блокирует поток, а паркует задачу и возвращает управление loop, чтобы тот занялся другими. Берут его через async with."
    tags: [asyncio, synchronization]
  - id: asyncio-vs-threads-07
    front: "Что произойдёт, если вызвать блокирующий код (time.sleep, синхронный requests) в корутине?"
    back: "Он не дойдёт до await и не вернёт управление loop, а раз loop в одном потоке, замрут все его задачи разом. Один синхронный вызов подвешивает весь сервер."
    tags: [asyncio]
  - id: asyncio-vs-threads-08
    front: "Что делает loop.run_in_executor и зачем он нужен?"
    back: "Отдаёт блокирующий вызов в пул (по умолчанию ThreadPoolExecutor) и возвращает awaitable, чтобы loop не стоял. Так синхронные библиотеки уживаются с asyncio. Для CPU-bound передают ProcessPoolExecutor."
    tags: [asyncio]
  - id: asyncio-vs-threads-09
    front: "Что вернёт вызов async-функции без await?"
    back: "Объект корутины; тело не исполнится. Python предупредит «coroutine was never awaited». Чтобы запустить, корутину дожидаются через await или заводят задачу через asyncio.create_task."
    tags: [asyncio]
  - id: asyncio-vs-threads-10
    front: "Как выбрать между threading, asyncio и multiprocessing?"
    back: "threading для умеренного IO с синхронными библиотеками; asyncio для тысяч соединений при наличии async-библиотек; multiprocessing для CPU-bound (свой GIL на процесс). CPU-нагрузку ни потоки, ни asyncio не ускоряют."
    tags: [asyncio, concurrency]
  - id: asyncio-vs-threads-11
    front: "В каком порядке asyncio.gather возвращает результаты?"
    back: "В порядке переданных аргументов, а не в порядке завершения корутин. Даже если третья корутина закончила первой, её результат останется третьим в списке gather."
    tags: [asyncio]
