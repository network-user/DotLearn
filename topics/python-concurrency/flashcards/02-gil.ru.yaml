conceptId: gil
cards:
  - id: gil-01
    front: "Что такое GIL и что он гарантирует?"
    back: "Global Interpreter Lock, один замок на весь интерпретатор CPython. Гарантирует, что байткод Python в каждый момент исполняет только один поток; параллельного исполнения на разных ядрах нет."
    tags: [gil]
  - id: gil-02
    front: "Зачем в CPython появился GIL?"
    back: "Ради дешёвой защиты подсчёта ссылок (refcount). Счётчик ссылок каждого объекта постоянно меняется; одновременная правка из двух потоков испортила бы его. Один общий замок дешевле, чем замок на каждый объект."
    tags: [gil]
  - id: gil-03
    front: "На какой границе GIL передаётся между потоками?"
    back: "На границе между байткод-инструкциями, а не между строками кода. Современный CPython переключает по таймеру (около 5 мс, sys.getswitchinterval() = 0.005), старый считал байткод-тики."
    tags: [gil]
  - id: gil-04
    front: "Почему `counter += 1` над общим счётчиком не атомарен даже при GIL?"
    back: "Это несколько байткодов: прочитать, прибавить, записать. GIL не даёт исполнять байткод одновременно, но допускает переключение в щели между инструкциями, поэтому одно увеличение может потеряться."
    tags: [gil]
  - id: gil-05
    front: "Почему потоки ускоряют IO-bound код?"
    back: "На блокирующем вводе-выводе (сеть, диск, time.sleep) CPython отпускает GIL. Пока один поток ждёт, другой бежит. Потоки перекрывают ожидание, поэтому много загрузок идут почти параллельно."
    tags: [gil]
  - id: gil-06
    front: "Почему потоки НЕ ускоряют CPU-bound код на чистом Python?"
    back: "Числодробильный цикл держит GIL и отпускает его лишь по таймеру. Потоки делят одно ядро по очереди и добавляют накладные расходы переключений, поэтому ускорения нет, иногда чуть медленнее."
    tags: [gil]
  - id: gil-07
    front: "Что взять для реального параллелизма CPU-bound вычислений в CPython?"
    back: "multiprocessing или ProcessPoolExecutor: отдельные процессы, у каждого свой интерпретатор и свой GIL, поэтому они работают на разных ядрах по-настоящему."
    tags: [gil]
  - id: gil-08
    front: "Отпускают ли C-расширения GIL?"
    back: "Тяжёлые операции в C (например, крупные вычисления numpy) на время внутренней работы отпускают GIL. Поэтому правило «потоки не помогают CPU-bound» верно именно для чистого Python-кода, а не для любой нагрузки."
    tags: [gil]
  - id: gil-09
    front: "Почему `list.append(x)` потокобезопасен, а `x += 1` нет?"
    back: "Не потому, что «одна инструкция»: `append` это несколько байткодов. Причина в том, что `list.append` реализован на Си и делает мутацию за один вызов, не отпуская GIL, а этот вызов целиком укладывается в одну байткод-инструкцию `CALL`, которую под GIL не прервут на середине. `x += 1` это несколько байткодов Python (прочитать, прибавить, записать) с щелью между ними, поэтому переключение теряет одно обновление. Полагаться на это в коде хрупко."
    tags: [gil]
  - id: gil-10
    front: "Что такое free-threading (PEP 703)?"
    back: "Экспериментальная сборка CPython без GIL (с 3.13, бинарник вроде python3.13t). Заменяет один замок на блокировки уровня объектов плюс переработанный refcount. Даёт параллелизм потоков ценой чуть более медленного однопоточного кода и совместимости C-расширений."
    tags: [gil]
