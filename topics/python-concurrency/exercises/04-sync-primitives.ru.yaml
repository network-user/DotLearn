exercises:
  - id: sync-lock-quiz-001
    concept: sync-primitives
    type: theory-quiz
    difficulty: 1
    prompt: "Что гарантирует блок `with lock:` вокруг критической секции?"
    choices:
      - id: a
        text: "Внутри блока в каждый момент находится не более одного потока; остальные ждут на acquire, а release срабатывает на выходе даже при исключении."
      - id: b
        text: "Код внутри блока выполняется быстрее за счёт приоритета потока."
      - id: c
        text: "Внутри блока полностью отключается переключение потоков во всей программе."
      - id: d
        text: "Блок автоматически повторяет тело, пока не выполнится без ошибок."
    correct: [a]
    explanation: "Замок обеспечивает взаимное исключение: одновременно в секции один поток. `with` вдобавок гарантирует release при любом выходе, включая исключение, поэтому замок не остаётся захваченным."
    variants:
      - prompt: "Чем RLock отличается от обычного Lock?"
        choices:
          - id: a
            text: "RLock реентрантный: тот же поток может захватить его повторно (считается глубина), а обычный Lock на повторном acquire вешает поток на себе."
          - id: b
            text: "RLock быстрее, но не гарантирует взаимного исключения."
          - id: c
            text: "RLock можно захватить сразу нескольким потокам, а Lock только одному."
          - id: d
            text: "Разницы нет, это синонимы."
        correct: [a]
        explanation: "Обычный Lock не реентрантный: повторный acquire тем же потоком блокирует его навсегда. RLock помнит владельца и глубину захватов, поэтому годится для реентрантных сценариев (метод под замком зовёт другой метод под тем же замком)."
      - prompt: "Для чего используют Semaphore(N)?"
        choices:
          - id: a
            text: "Чтобы ограничить число одновременно работающих потоков до N: внутрь пускается до N, остальные ждут."
          - id: b
            text: "Чтобы полностью запретить конкурентный доступ, как Lock."
          - id: c
            text: "Чтобы подать одноразовый сигнал всем потокам."
          - id: d
            text: "Чтобы ускорить захват замка в N раз."
        correct: [a]
        explanation: "Semaphore хранит счётчик из N разрешений и пускает внутрь до N потоков одновременно. Это ограничение нагрузки: не больше N запросов к API, не больше N соединений с базой."

  - id: sync-primitives-blanks-001
    concept: sync-primitives
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски: замок для счётчика и семафор на пять разрешений."
    template: |
      lock = {{ctor}}()
      with lock:
          counter += 1
      sem = {{sem}}(5)
    blanks:
      ctor:
        accept: ["Lock", "threading.Lock"]
      sem:
        accept: ["Semaphore", "BoundedSemaphore", "threading.Semaphore"]
    variants:
      - prompt: "Заполните пропуск: реентрантный замок для вложенного захвата."
        template: |
          lock = {{rctor}}()
          with lock:
              withdraw()
        blanks:
          rctor:
            accept: ["RLock", "threading.RLock"]
      - prompt: "Заполните пропуски: методы Event для ожидания и сигнала."
        template: |
          ready.{{wait}}()
          ready.{{set}}()
        blanks:
          wait:
            accept: ["wait"]
          set:
            accept: ["set"]

  - id: sync-rlock-depth-predict-001
    concept: sync-primitives
    type: predict-output
    difficulty: 3
    prompt: "Снипет моделирует счётчик глубины реентрантного замка: acquire увеличивает глубину, release уменьшает. Метод под замком захватывает тот же замок повторно. Что напечатает программа?"
    snippet: |
      depth = 0

      def acquire():
          global depth
          depth += 1
          return depth

      def release():
          global depth
          depth -= 1

      outer = acquire()
      inner = acquire()
      release()
      release()
      print(outer, inner, depth)
    expected:
      kind: stdout
      value: "1 2 0"
    hints:
      - "RLock считает, сколько раз ТОТ ЖЕ поток его захватил. Каждый повторный acquire увеличивает глубину, каждый release уменьшает."
      - "Первый захват даёт глубину 1 (outer), вложенный даёт 2 (inner), два release возвращают к 0. Обычный Lock тут завис бы на втором захвате."
    variants:
      - prompt: "Три вложенных захвата того же RLock, затем три release. Что напечатает программа?"
        snippet: |
          depth = 0

          def acquire():
              global depth
              depth += 1
              return depth

          def release():
              global depth
              depth -= 1

          a = acquire()
          b = acquire()
          c = acquire()
          release()
          release()
          release()
          print(a, b, c, depth)
        expected:
          kind: stdout
          value: "1 2 3 0"
      - prompt: "Два захвата, но только один release (забыли парный). Что напечатает программа?"
        snippet: |
          depth = 0

          def acquire():
              global depth
              depth += 1
              return depth

          def release():
              global depth
              depth -= 1

          a = acquire()
          b = acquire()
          release()
          print(a, b, depth)
        expected:
          kind: stdout
          value: "1 2 1"

  - id: sync-deadlock-quiz-001
    concept: sync-primitives
    type: theory-quiz
    difficulty: 4
    prompt: "Поток A захватил L1 и ждёт L2; поток B захватил L2 и ждёт L1. Что это и как надёжнее всего предотвратить?"
    choices:
      - id: a
        text: "Это deadlock (кольцо ожидания); надёжнее всего лечится единой глобальной дисциплиной порядка захвата: все берут сначала L1, потом L2."
      - id: b
        text: "Это гонка данных; лечится добавлением ещё одного замка вокруг обоих."
      - id: c
        text: "Это нормальная работа планировщика; ОС сама разрулит через несколько миллисекунд."
      - id: d
        text: "Это livelock; лечится увеличением приоритета обоих потоков."
    correct: [a]
    explanation: "Встречное удержание замков образует цикл ожидания, deadlock: ни один поток не отпустит своё, пока не получит чужое. Если все потоки всегда берут замки в одном глобальном порядке, кольцо сложиться не может. Тайм-аут на acquire тоже помогает, но единый порядок надёжнее."
    hints:
      - "Нарисуйте граф ожидания: кто кого ждёт. Что образуется, если стрелки замыкаются в кольцо?"
      - "Если каждый поток всегда берёт замки в одном и том же глобальном порядке, может ли возникнуть встречное удержание, когда A ждёт то, что держит B, и наоборот?"
