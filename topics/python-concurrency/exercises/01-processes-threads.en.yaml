exercises:
  - id: pt-shared-memory-001
    concept: processes-threads
    type: theory-quiz
    difficulty: 1
    prompt: "What do two threads of the same process share in memory?"
    choices:
      - id: a
        text: "The heap with objects is shared (lists, dicts, global variables are visible to both), but the stack with local variables is private to each thread."
      - id: b
        text: "Each thread has fully isolated memory, like a separate process - the full set of roles in this architecture for every request path in the app."
      - id: c
        text: "Only the stack is shared between them, while the heap is private to each thread, without special-case setup for this flow."
      - id: d
        text: "Threads have no state of their own at all; everything lives in the kernel for any payload and any deploy target."
    correct: [a]
    explanation: "Threads share the process heap, so they see the same objects at the same addresses. What stays private is the stack with local variables, registers, and the instruction pointer."
    variants:
      - prompt: "Can two separate processes started from the same file see each other's variables?"
        choices:
          - id: a
            text: "No: each process has its own address space, and data exchange only happens explicitly through pipes, sockets, or shared memory."
          - id: b
            text: "Yes, processes started from the same file automatically share all global variables under any load volume and data size."
          - id: c
            text: "Yes, but only if the variables are declared global; the system does not allow any other correct behavior."
          - id: d
            text: "Only if the processes run on the same CPU core; the system does not allow any other correct behavior."
        correct: [a]
        explanation: "Memory isolation is the defining property of a process: an address in one process means nothing in another, so exchange is always explicit copying."
      - prompt: "Which of the following is private to each thread?"
        choices:
          - id: a
            text: "The stack with local variables, CPU registers, and the instruction pointer."
          - id: b
            text: "The module's global variables for any payload and any deploy target."
          - id: c
            text: "Class instances created on the heap for every request path in the app."
          - id: d
            text: "The process's table of open files under any load volume and data size."
        correct: [a]
        explanation: "What's private to a thread is tied to its current execution: stack, registers, instruction pointer. Everything on the heap and the process's resources are shared."

  - id: pt-terms-blanks-001
    concept: processes-threads
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the blanks in the description of the memory model."
    template: |
      A {{process}} is a program with its own isolated address space.
      A {{thread}} lives inside it and shares the {{heap}} with its neighbors, but has its own stack.
    blanks:
      process:
        accept: ["Process", "process"]
      thread:
        accept: ["Thread", "thread"]
      heap:
        accept: ["heap"]
    variants:
      - prompt: "Fill in the blanks about thread scheduling."
        template: |
          A Python thread is a real {{os}} thread, not a green thread of the interpreter.
          It is scheduled by the {{kernel}}, which can preempt it between instructions.
        blanks:
          os:
            accept: ["OS", "operating system", "kernel"]
          kernel:
            accept: ["kernel", "OS kernel", "OS scheduler"]
      - prompt: "Fill in the blanks about switching cost."
        template: |
          During a context switch the kernel saves the thread's {{regs}} and its stack pointer,
          then loads the state of another thread. This is {{overhead}}, not useful work.
        blanks:
          regs:
            accept: ["registers"]
          overhead:
            accept: ["overhead"]

  - id: pt-shared-list-predict-001
    concept: processes-threads
    type: predict-output
    difficulty: 2
    prompt: "Three threads take turns appending a tag to one shared list data (the process heap is shared). Execution order is fixed: A, then B, then C. What does the program print?"
    snippet: |
      data = []

      def worker(tag):
          data.append(tag)

      worker("A")
      worker("B")
      worker("C")
      print(len(data), data[0], data[-1])
    expected:
      kind: stdout
      value: "3 A C"
    hints:
      - "The list data is created once on the heap, and every thread sees that same one. Each call appends one element without clearing anything."
      - "After three appends the list has three elements: the first is 'A', the last is 'C'."
    variants:
      - prompt: "Two threads take turns updating one shared counter dict (memory is shared). Order is fixed. What does the program print?"
        snippet: |
          counts = {"hits": 0}

          def bump():
              counts["hits"] += 1

          bump()
          bump()
          print(counts["hits"])
        expected:
          kind: stdout
          value: "2"
      - prompt: "A thread appends to a shared list, then the main thread reads it. What does the program print?"
        snippet: |
          log = []

          def worker():
              log.append("done")

          worker()
          print(len(log), log[0])
        expected:
          kind: stdout
          value: "1 done"

  - id: pt-real-os-thread-001
    concept: processes-threads
    type: theory-quiz
    difficulty: 3
    prompt: "A colleague claims: \"a Python thread isn't real, the interpreter made it up, so it only switches at safe points.\" What's wrong here?"
    choices:
      - id: a
        text: "A Python thread is a real kernel thread; the OS schedules it and can preempt it between any instructions. The GIL only serializes bytecode, it doesn't make the thread cooperative."
      - id: b
        text: "Nothing's wrong: Python threads really are green threads and only switch voluntarily; the system does not allow any other correct behavior."
      - id: c
        text: "The only mistake is the word \"not real\"; otherwise the thread really does switch only at safe points as a complete account of that behavior."
      - id: d
        text: "A Python thread is the same thing as an asyncio coroutine, so switching is cooperative, - that is how the API contract should be read."
    correct: [a]
    explanation: "threading.Thread wraps a real OS thread (a pthread on Linux), and the kernel's preemptive scheduling can stop it at any time. Cooperative switching at explicit points is what asyncio coroutines do, not threads. The GIL only serializes bytecode execution."
    hints:
      - "Think about who schedules the thread: Python itself or the OS kernel? That determines whether switching is voluntary or forced."
      - "Cooperative switching (only at marked points) is what asyncio does. How does a regular thread differ in that sense?"
