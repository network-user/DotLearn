exercises:
  - id: gil-guarantee-quiz-001
    concept: gil
    type: theory-quiz
    difficulty: 1
    prompt: "Что именно гарантирует GIL в CPython?"
    choices:
      - id: a
        text: "В каждый момент времени байткод Python исполняет не более одного потока; параллельного исполнения Python-кода на нескольких ядрах нет."
      - id: b
        text: "Любая операция над общими данными становится атомарной и потокобезопасной на любом пути обработки запроса."
      - id: c
        text: "В программе нельзя создать больше одного потока, во всех сценариях без дополнительной настройки."
      - id: d
        text: "CPU-bound код автоматически ускоряется пропорционально числу ядер, независимо от входных данных и окружения."
    correct: [a]
    explanation: "GIL сериализует исполнение байткода: замок держит один поток, остальные ждут. Он не делает составные операции атомарными и не даёт параллелизма вычислений на нескольких ядрах."
    variants:
      - prompt: "Зачем в CPython вообще появился GIL?"
        choices:
          - id: a
            text: "Чтобы дёшево защитить подсчёт ссылок (refcount) каждого объекта от порчи при одновременном доступе из нескольких потоков."
          - id: b
            text: "Чтобы ускорить многопоточный CPU-bound код, во всех сценариях без дополнительной настройки."
          - id: c
            text: "Чтобы запретить разработчикам пользоваться потоками, независимо от входных данных и окружения."
          - id: d
            text: "Чтобы потоки Python не были настоящими потоками ОС; другого корректного поведения система не допускает."
        correct: [a]
        explanation: "Каждый объект CPython хранит счётчик ссылок, который постоянно меняется. Одновременная правка счётчика без защиты испортила бы его. GIL закрывает это одним общим замком, дешевле, чем замок на каждый объект."
      - prompt: "Делает ли живой GIL операцию `counter += 1` над общим счётчиком атомарной?"
        choices:
          - id: a
            text: "Нет: это несколько байткод-инструкций, и переключение потока возможно между чтением и записью."
          - id: b
            text: "Да: пока есть GIL, любая строка кода выполняется целиком без переключений."
          - id: c
            text: "Да, но только для целых чисел, независимо от входных данных и окружения."
          - id: d
            text: "Нет, потому что GIL вообще не влияет на потоки как полное описание этого поведения."
        correct: [a]
        explanation: "`counter += 1` разворачивается в чтение, сложение и запись. GIL не даёт двум потокам исполнять байткод одновременно, но допускает переключение в щели между инструкциями, поэтому увеличение может потеряться."

  - id: gil-terms-blanks-001
    concept: gil
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски в описании GIL."
    template: |
      GIL это один глобальный замок, и в любой момент байткод исполняет только {{count}} поток.
      Он существует, чтобы безопасно менять {{refcount}} объектов без гонок.
    blanks:
      count:
        accept: ["один", "1"]
      refcount:
        accept: ["счётчик ссылок", "счётчики ссылок", "refcount", "подсчёт ссылок"]
    variants:
      - prompt: "Заполните пропуски про переключение GIL."
        template: |
          Современный CPython переключает потоки не по числу байткодов, а по {{by}}.
          Интервал по умолчанию около {{ms}} миллисекунд.
        blanks:
          by:
            accept: ["времени", "таймеру", "интервалу времени"]
          ms:
            accept: ["5", "пяти"]
      - prompt: "Заполните пропуски про ввод-вывод."
        template: |
          На блокирующем вводе-выводе поток {{release}} GIL, поэтому {{bound}}-bound задачи на потоках всё-таки ускоряются.
        blanks:
          release:
            accept: ["отпускает", "освобождает"]
          bound:
            accept: ["IO", "io", "I/O"]

  - id: gil-lost-update-predict-001
    concept: gil
    type: predict-output
    difficulty: 3
    prompt: "Снипет моделирует переплетение шагов `counter += 1` из двух потоков: обе функции load читают значение ДО того, как хоть одна store запишет результат. Что напечатает программа?"
    snippet: |
      shared = {"counter": 41}

      def load():
          return shared["counter"]

      def store(value):
          shared["counter"] = value

      a = load()
      b = load()
      store(a + 1)
      store(b + 1)
      print(shared["counter"])
    expected:
      kind: stdout
      value: "42"
    hints:
      - "Обе функции load читают counter раньше, чем любая store что-то запишет. С каким числом уйдут a и b?"
      - "a и b оба равны 41. Первая store пишет 42, вторая пишет тем же 41+1=42 поверх. Одно увеличение потеряно: было 41, стало 42, а не 43."
    variants:
      - prompt: "То же переплетение, но счётчик стартует со 100. Что напечатает программа?"
        snippet: |
          shared = {"counter": 100}

          def load():
              return shared["counter"]

          def store(value):
              shared["counter"] = value

          a = load()
          b = load()
          store(a + 1)
          store(b + 1)
          print(shared["counter"])
        expected:
          kind: stdout
          value: "101"
      - prompt: "Уже три потока прочитали значение до записи. Что напечатает программа?"
        snippet: |
          shared = {"counter": 7}

          def load():
              return shared["counter"]

          def store(value):
              shared["counter"] = value

          a = load()
          b = load()
          c = load()
          store(a + 1)
          store(b + 1)
          store(c + 1)
          print(shared["counter"])
        expected:
          kind: stdout
          value: "8"

  - id: gil-cpu-vs-io-quiz-001
    concept: gil
    type: theory-quiz
    difficulty: 2
    prompt: "У вас CPU-bound функция (тяжёлый цикл на чистом Python). Вы раскидали её на 4 потока на 8-ядерной машине. Что будет со временем выполнения?"
    choices:
      - id: a
        text: "Ускорения не будет, скорее чуть медленнее: из-за GIL байткод идёт по одному потоку, 4 потока делят одно ядро и тратятся на переключения. Нужен multiprocessing."
      - id: b
        text: "Ускорится примерно в 4 раза, по числу потоков - полный перечень частей, которыми обычно подменяют ответ. Иной интерпретации не требуется."
      - id: c
        text: "Ускорится в 8 раз, по числу ядер - полный перечень частей, которыми обычно подменяют ответ. Иной интерпретации не требуется."
      - id: d
        text: "Программа зависнет: GIL не даст потокам стартовать; другого корректного поведения система не допускает. Иной интерпретации не требуется."
    correct: [a]
    explanation: "Чистый Python-цикл держит GIL и отпускает его лишь по таймеру. Потоки не бегут параллельно на разных ядрах, а делят одно, добавляя накладные расходы переключений. Параллелизм вычислений даёт multiprocessing со своим GIL на процесс."
    variants:
      - prompt: "Те же 4 потока, но задача IO-bound: качают файлы по сети. Что будет со временем?"
        choices:
          - id: a
            text: "Ускорится: на блокирующем вводе-выводе поток отпускает GIL, и потоки ждут сеть одновременно."
          - id: b
            text: "Не изменится: GIL запрещает любое перекрытие потоков как полное описание этого поведения."
          - id: c
            text: "Замедлится в 4 раза из-за GIL, при буквальном чтении этого вызова."
          - id: d
            text: "Программа упадёт с ошибкой блокировки, если смотреть только на самый верхний слой."
        correct: [a]
        explanation: "Пока поток ждёт сеть, GIL свободен и другой поток бежит. Потоки перекрывают именно ожидание, поэтому сотня загрузок укладывается почти в время одной."
      - prompt: "Какой инструмент даст реальное параллельное исполнение CPU-bound кода на нескольких ядрах в CPython?"
        choices:
          - id: a
            text: "multiprocessing или ProcessPoolExecutor: отдельные процессы, у каждого свой интерпретатор и свой GIL."
          - id: b
            text: "threading с числом потоков по числу ядер, при буквальном чтении этого вызова."
          - id: c
            text: "asyncio с большим числом корутин, если смотреть только на самый верхний слой."
          - id: d
            text: "Ничего не поможет: CPython в принципе не умеет использовать несколько ядер как полное описание этого поведения."
        correct: [a]
        explanation: "Обойти GIL для вычислений можно процессами: у каждого процесса собственный GIL, и они честно работают на разных ядрах. asyncio и threading тут не помогут, они про IO."
