exercises:
  - id: async-cooperative-quiz-001
    concept: asyncio-vs-threads
    type: theory-quiz
    difficulty: 1
    prompt: "How does asyncio's cooperative multitasking differ from threads' preemptive multitasking?"
    choices:
      - id: a
        text: "A coroutine yields control only at an explicit await point; a thread is preempted by the kernel at any moment, between any instructions."
      - id: b
        text: "There is no difference: the OS scheduler switches both threads and coroutines the same way."
      - id: c
        text: "Coroutines switch more often than threads because the kernel interrupts them at every bytecode."
      - id: d
        text: "Cooperative means coroutines run on multiple cores at the same time."
    correct: [a]
    explanation: "asyncio is cooperative: switching happens only at await, and between two awaits a coroutine runs uninterrupted. A thread is forcibly preempted by the kernel at any point. Neither one gives computational parallelism across cores in CPython."
    variants:
      - prompt: "How many coroutines actually execute at any given moment on a standard event loop?"
        choices:
          - id: a
            text: "Exactly one: the event loop runs in a single thread. Concurrency comes from overlapping waits, not from parallel computation."
          - id: b
            text: "As many as the CPU has cores."
          - id: c
            text: "As many coroutines as were passed to gather."
          - id: d
            text: "Zero, until time.sleep is called."
        correct: [a]
        explanation: "The event loop is single-threaded: exactly one coroutine runs at any given moment. While it waits at an await, the loop hands the thread to another ready coroutine, hence concurrency without parallelism."
      - prompt: "What does await do inside a coroutine?"
        choices:
          - id: a
            text: "Yields control to the event loop at that point, letting it run another ready task while the current one waits."
          - id: b
            text: "Stops the whole thread for a fixed number of seconds."
          - id: c
            text: "Creates a new OS thread to wait on."
          - id: d
            text: "Guarantees that the next line runs atomically with no switches."
        correct: [a]
        explanation: "await is a cooperative handoff point: the coroutine tells the loop it is waiting now, and the loop switches to another task. It is not a thread block and not a new thread."

  - id: async-basics-blanks-001
    concept: asyncio-vs-threads
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the blanks: declaring a coroutine, running concurrently via gather, and the entry point."
    template: |
      {{kw}} def main():
          results = {{await}} asyncio.{{gather}}(fetch("a"), fetch("b"))
          return results

      asyncio.{{run}}(main())
    blanks:
      kw:
        accept: ["async"]
      await:
        accept: ["await"]
      gather:
        accept: ["gather"]
      run:
        accept: ["run"]
    variants:
      - prompt: "Fill in the blanks: a non-blocking sleep inside a coroutine that yields to the loop."
        template: |
          async def tick():
              {{await}} asyncio.{{sleep}}(1)
              return "done"
        blanks:
          await:
            accept: ["await"]
          sleep:
            accept: ["sleep"]
      - prompt: "Fill in the blanks: protecting a critical section in asyncio."
        template: |
          lock = asyncio.{{ctor}}()

          async def transfer():
              async {{with}} lock:
                  await move_money()
        blanks:
          ctor:
            accept: ["Lock"]
          with:
            accept: ["with"]

  - id: async-gather-order-predict-001
    concept: asyncio-vs-threads
    type: predict-output
    difficulty: 3
    prompt: "The snippet contrasts two orderings: asyncio.gather returns results in the order of the arguments passed, even if the coroutines finished in a different order. It prints the gather order and the finish-time order. What does the program print?"
    snippet: |
      submitted = ["A", "B", "C"]
      finish_after = {"A": 3, "B": 1, "C": 2}

      gather_result = list(submitted)
      by_finish = sorted(submitted, key=lambda name: finish_after[name])

      print(gather_result, by_finish)
    expected:
      kind: stdout
      value: "['A', 'B', 'C'] ['B', 'C', 'A']"
    hints:
      - "gather preserves the order of the arguments passed in, not the order in which coroutines finished. Does an earlier or later finish change the position in gather_result?"
      - "gather_result is a copy of submitted: ['A', 'B', 'C']. by_finish is sorted by time: B(1), C(2), A(3). gather's order does not depend on finish time."
    variants:
      - prompt: "Same setup, but with different finish times. What does the program print?"
        snippet: |
          submitted = ["A", "B", "C"]
          finish_after = {"A": 1, "B": 3, "C": 2}

          gather_result = list(submitted)
          by_finish = sorted(submitted, key=lambda name: finish_after[name])

          print(gather_result, by_finish)
        expected:
          kind: stdout
          value: "['A', 'B', 'C'] ['A', 'C', 'B']"
      - prompt: "Four coroutines with different finish times. What does the program print?"
        snippet: |
          submitted = ["one", "two", "three", "four"]
          finish_after = {"one": 4, "two": 2, "three": 1, "four": 3}

          gather_result = list(submitted)
          by_finish = sorted(submitted, key=lambda name: finish_after[name])

          print(gather_result, by_finish)
        expected:
          kind: stdout
          value: "['one', 'two', 'three', 'four'] ['three', 'two', 'four', 'one']"

  - id: async-await-overdraft-predict-001
    concept: asyncio-vs-threads
    type: predict-output
    difficulty: 4
    prompt: "The snippet models a race in single-threaded asyncio: two tasks withdraw money, but both passed the balance check BEFORE await handed control off, so both saw the original 100. It prints the final balance and the list of withdrawals. What does the program print?"
    snippet: |
      state = {"balance": 100}
      withdrawn = []

      a_ok = state["balance"] >= 70
      b_ok = state["balance"] >= 60

      if a_ok:
          state["balance"] -= 70
          withdrawn.append(70)
      if b_ok:
          state["balance"] -= 60
          withdrawn.append(60)

      print(state["balance"], withdrawn)
    expected:
      kind: stdout
      value: "-30 [70, 60]"
    hints:
      - "Both checks a_ok and b_ok are computed before any withdrawal, so both look at balance 100. Do both pass, since 100 >= 70 and 100 >= 60?"
      - "Both checks are true, so both withdrawals of 70 and 60 happen. The balance goes from 100 into the negative, down to -30: each amount fit on its own, but together they exceeded what was left. `async with asyncio.Lock` around the check and the withdrawal would have protected it."

  - id: async-block-loop-quiz-001
    concept: asyncio-vs-threads
    type: theory-quiz
    difficulty: 3
    prompt: "Inside a web server coroutine you called plain time.sleep(5) (not asyncio.sleep). What happens to the thousands of other tasks on this event loop?"
    choices:
      - id: a
        text: "They all freeze for 5 seconds: time.sleep blocks the single thread and does not yield to the loop. The blocking call needs to move into run_in_executor or be replaced with await asyncio.sleep."
      - id: b
        text: "Nothing: the loop switches to other tasks, because sleep is an await point."
      - id: c
        text: "Only the current task sleeps, the rest continue, and the kernel preempts the sleeping thread."
      - id: d
        text: "The loop spins up a new thread per task to work around the block."
    correct: [a]
    explanation: "The event loop lives in one thread. A synchronous time.sleep does not give up that thread, so the whole loop and all its tasks stall. The fix is either an async await asyncio.sleep, or moving the blocking call into a pool via loop.run_in_executor."
    hints:
      - "How many threads does a standard event loop have, and what does plain time.sleep do to the thread it is called in?"
      - "time.sleep has no await, so control never returns to the loop. What happens to all the tasks waiting on that same loop?"
