exercises:
  - id: pt-shared-memory-001
    concept: processes-threads
    type: theory-quiz
    difficulty: 1
    prompt: "Что общего в памяти у двух потоков одного процесса?"
    choices:
      - id: a
        text: "Куча с объектами общая (списки, словари, глобальные переменные видны обоим), а стек с локальными переменными у каждого потока свой."
      - id: b
        text: "У каждого потока полностью своя изолированная память, как у отдельного процесса."
      - id: c
        text: "Общий у них только стек, а куча приватная для каждого потока."
      - id: d
        text: "Потоки вообще не имеют собственного состояния, всё хранится в ядре."
    correct: [a]
    explanation: "Потоки делят кучу процесса, поэтому видят одни и те же объекты по одним адресам. Личным остаётся стек с локальными переменными, регистры и счётчик команд."
    variants:
      - prompt: "Могут ли два отдельных процесса, запущенных из одного файла, видеть переменные друг друга?"
        choices:
          - id: a
            text: "Нет: у каждого процесса своё адресное пространство, и обмен данными идёт только явно через каналы, сокеты или разделяемую память."
          - id: b
            text: "Да, процессы одного файла автоматически делят все глобальные переменные."
          - id: c
            text: "Да, но только если переменные объявлены глобальными."
          - id: d
            text: "Только если процессы запущены на одном ядре процессора."
        correct: [a]
        explanation: "Изоляция памяти это определяющее свойство процесса: адрес в одном процессе ничего не значит в другом, поэтому обмен всегда явное копирование."
      - prompt: "Что из перечисленного приватно для каждого потока?"
        choices:
          - id: a
            text: "Стек с локальными переменными, регистры процессора и счётчик команд."
          - id: b
            text: "Глобальные переменные модуля."
          - id: c
            text: "Экземпляры классов, созданные в куче."
          - id: d
            text: "Таблица открытых файлов процесса."
        correct: [a]
        explanation: "Личное у потока это то, что связано с его текущим ходом выполнения: стек, регистры, счётчик команд. Всё на куче и ресурсы процесса общие."

  - id: pt-terms-blanks-001
    concept: processes-threads
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски в описании модели памяти."
    template: |
      {{process}} - это программа со своим изолированным адресным пространством.
      {{thread}} живёт внутри него и делит с соседями {{heap}}, но имеет собственный стек.
    blanks:
      process:
        accept: ["Процесс", "процесс"]
      thread:
        accept: ["Поток", "поток"]
      heap:
        accept: ["кучу", "куча", "heap"]
    variants:
      - prompt: "Заполните пропуски про планирование потоков."
        template: |
          Поток Python это настоящий поток {{os}}, а не зелёный поток интерпретатора.
          Его планирует {{kernel}}, которое может вытеснить поток между инструкциями.
        blanks:
          os:
            accept: ["ОС", "операционной системы", "ядра"]
          kernel:
            accept: ["ядро", "ядро ОС", "планировщик ОС"]
      - prompt: "Заполните пропуски про стоимость переключения."
        template: |
          При переключении контекста ядро сохраняет {{regs}} потока и его указатель стека,
          а затем загружает состояние другого потока. Это {{overhead}}, а не полезная работа.
        blanks:
          regs:
            accept: ["регистры"]
          overhead:
            accept: ["накладной расход", "накладные расходы", "overhead"]

  - id: pt-shared-list-predict-001
    concept: processes-threads
    type: predict-output
    difficulty: 2
    prompt: "Три потока по очереди дописывают тег в один общий список data (куча процесса общая). Порядок выполнения фиксирован: A, затем B, затем C. Что напечатает программа?"
    snippet: |
      data = []

      def worker(tag):
          data.append(tag)

      worker("A")
      worker("B")
      worker("C")
      print(len(data), data[0], data[-1])
    expected:
      kind: stdout
      value: "3 A C"
    hints:
      - "Список data создан один раз на куче, и все потоки видят именно его. Каждый вызов дописывает один элемент, ничего не очищая."
      - "После трёх дозаписей в списке три элемента: первый 'A', последний 'C'."
    variants:
      - prompt: "Два потока по очереди меняют один общий словарь-счётчик (память общая). Порядок фиксирован. Что напечатает программа?"
        snippet: |
          counts = {"hits": 0}

          def bump():
              counts["hits"] += 1

          bump()
          bump()
          print(counts["hits"])
        expected:
          kind: stdout
          value: "2"
      - prompt: "Поток дописывает в общий список, затем главный поток читает его. Что напечатает программа?"
        snippet: |
          log = []

          def worker():
              log.append("готово")

          worker()
          print(len(log), log[0])
        expected:
          kind: stdout
          value: "1 готово"

  - id: pt-real-os-thread-001
    concept: processes-threads
    type: theory-quiz
    difficulty: 3
    prompt: "Коллега утверждает: «поток в Python ненастоящий, его придумал интерпретатор, поэтому он переключается только в безопасных местах». Где ошибка?"
    choices:
      - id: a
        text: "Поток Python это настоящий поток ядра; его планирует ОС и может вытеснить между любыми инструкциями. GIL лишь сериализует байткод, но не делает поток кооперативным."
      - id: b
        text: "Ошибки нет: потоки Python действительно зелёные и переключаются только добровольно."
      - id: c
        text: "Ошибка только в слове «ненастоящий»: в остальном поток и правда переключается лишь в безопасных местах."
      - id: d
        text: "Поток Python это то же самое, что корутина asyncio, поэтому переключение кооперативное."
    correct: [a]
    explanation: "threading.Thread оборачивает настоящий поток ОС (на Linux pthread), и вытесняющее планирование ядра может остановить его когда угодно. Кооперативно, в явных точках, переключаются корутины asyncio, а не потоки. GIL только сериализует исполнение байткода."
    hints:
      - "Вспомните, кто планирует поток: сам Python или ядро операционной системы? От этого зависит, добровольное переключение или принудительное."
      - "Кооперативное переключение (только в отмеченных точках) это про asyncio. Чем в этом смысле отличается обычный поток?"
