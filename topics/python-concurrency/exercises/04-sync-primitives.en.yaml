exercises:
  - id: sync-lock-quiz-001
    concept: sync-primitives
    type: theory-quiz
    difficulty: 1
    prompt: "What does the `with lock:` block around a critical section guarantee?"
    choices:
      - id: a
        text: "At most one thread is inside the block at any moment; the rest wait on acquire, and release fires on exit even if an exception is raised."
      - id: b
        text: "Code inside the block runs faster because of thread priority."
      - id: c
        text: "The block fully disables thread switching for the whole program."
      - id: d
        text: "The block automatically retries its body until it runs without errors."
    correct: [a]
    explanation: "The lock provides mutual exclusion: one thread in the section at a time. `with` also guarantees release on any exit, including an exception, so the lock never stays held."
    variants:
      - prompt: "How does RLock differ from a plain Lock?"
        choices:
          - id: a
            text: "RLock is reentrant: the same thread can acquire it again (depth is tracked), while a plain Lock hangs the thread on a repeated acquire."
          - id: b
            text: "RLock is faster but does not guarantee mutual exclusion."
          - id: c
            text: "RLock can be acquired by several threads at once, Lock only by one."
          - id: d
            text: "There is no difference, they are synonyms."
        correct: [a]
        explanation: "A plain Lock is not reentrant: a repeated acquire by the same thread blocks it forever. RLock remembers the owner and the acquisition depth, so it fits reentrant scenarios (a method under the lock calls another method that takes the same lock)."
      - prompt: "What is Semaphore(N) used for?"
        choices:
          - id: a
            text: "To cap the number of concurrently running threads at N: up to N get in, the rest wait."
          - id: b
            text: "To fully forbid concurrent access, like Lock."
          - id: c
            text: "To send a one-time signal to all threads."
          - id: d
            text: "To speed up acquiring the lock N times over."
        correct: [a]
        explanation: "A Semaphore holds a counter of N permits and lets up to N threads in at once. It is a load limiter: no more than N requests to an API, no more than N database connections."

  - id: sync-primitives-blanks-001
    concept: sync-primitives
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the blanks: a lock for a counter and a semaphore with five permits."
    template: |
      lock = {{ctor}}()
      with lock:
          counter += 1
      sem = {{sem}}(5)
    blanks:
      ctor:
        accept: ["Lock", "threading.Lock"]
      sem:
        accept: ["Semaphore", "BoundedSemaphore", "threading.Semaphore"]
    variants:
      - prompt: "Fill in the blank: a reentrant lock for nested acquisition."
        template: |
          lock = {{rctor}}()
          with lock:
              withdraw()
        blanks:
          rctor:
            accept: ["RLock", "threading.RLock"]
      - prompt: "Fill in the blanks: Event methods for waiting and signaling."
        template: |
          ready.{{wait}}()
          ready.{{set}}()
        blanks:
          wait:
            accept: ["wait"]
          set:
            accept: ["set"]

  - id: sync-rlock-depth-predict-001
    concept: sync-primitives
    type: predict-output
    difficulty: 3
    prompt: "The snippet models a reentrant lock's depth counter: acquire increases the depth, release decreases it. A method under the lock re-acquires the same lock. What does the program print?"
    snippet: |
      depth = 0

      def acquire():
          global depth
          depth += 1
          return depth

      def release():
          global depth
          depth -= 1

      outer = acquire()
      inner = acquire()
      release()
      release()
      print(outer, inner, depth)
    expected:
      kind: stdout
      value: "1 2 0"
    hints:
      - "RLock counts how many times the SAME thread has acquired it. Every repeated acquire raises the depth, every release lowers it."
      - "The first acquire gives depth 1 (outer), the nested one gives 2 (inner), two releases bring it back to 0. A plain Lock would hang here on the second acquire."
    variants:
      - prompt: "Three nested acquisitions of the same RLock, then three releases. What does the program print?"
        snippet: |
          depth = 0

          def acquire():
              global depth
              depth += 1
              return depth

          def release():
              global depth
              depth -= 1

          a = acquire()
          b = acquire()
          c = acquire()
          release()
          release()
          release()
          print(a, b, c, depth)
        expected:
          kind: stdout
          value: "1 2 3 0"
      - prompt: "Two acquisitions, but only one release (the matching one was forgotten). What does the program print?"
        snippet: |
          depth = 0

          def acquire():
              global depth
              depth += 1
              return depth

          def release():
              global depth
              depth -= 1

          a = acquire()
          b = acquire()
          release()
          print(a, b, depth)
        expected:
          kind: stdout
          value: "1 2 1"

  - id: sync-deadlock-quiz-001
    concept: sync-primitives
    type: theory-quiz
    difficulty: 4
    prompt: "Thread A holds L1 and waits for L2; thread B holds L2 and waits for L1. What is this, and what is the most reliable way to prevent it?"
    choices:
      - id: a
        text: "This is a deadlock (a wait cycle); the most reliable fix is a single global lock-acquisition order: everyone takes L1 first, then L2."
      - id: b
        text: "This is a data race; it is fixed by adding one more lock around both."
      - id: c
        text: "This is normal scheduler behavior; the OS will sort it out in a few milliseconds."
      - id: d
        text: "This is a livelock; it is fixed by raising both threads' priority."
    correct: [a]
    explanation: "Mutual holding of locks forms a wait cycle, a deadlock: neither thread releases its own lock until it gets the other one. If every thread always acquires locks in the same global order, the cycle cannot form. A timeout on acquire also helps, but a single order is more reliable."
    hints:
      - "Draw the wait graph: who is waiting on whom. What forms if the arrows close into a cycle?"
      - "If every thread always takes locks in the same global order, can mutual holding arise, where A waits on what B holds and vice versa?"
