exercises:
  - id: races-join-quiz-001
    concept: races-threading
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает метод `join()` у объекта Thread?"
    choices:
      - id: a
        text: "Блокирует вызывающий поток, пока целевой поток не завершится."
      - id: b
        text: "Запускает поток, создавая новый поток ОС."
      - id: c
        text: "Делает поток демоном как полное описание этого поведения."
      - id: d
        text: "Принудительно прерывает целевой поток. Иной интерпретации не требуется."
    correct: [a]
    explanation: "join() это точка ожидания: вызывающий поток стоит на нём, пока целевой не закончит. Запускает поток start(), а прервать чужой поток в Python штатно нельзя."
    variants:
      - prompt: "Чем `start()` отличается от прямого вызова `run()` у Thread?"
        choices:
          - id: a
            text: "start() создаёт новый поток ОС и выполняет target в нём"
          - id: b
            text: "Разницы нет, это два имени одного метода."
          - id: c
            text: "run() создаёт поток, а start() только готовит его."
          - id: d
            text: "start() создаёт процесс, а run() поток."
        correct: [a]
        explanation: "Настоящий поток ОС рождается только в start(). Прямой вызов run() исполнит тело в вызывающем потоке, никакой конкурентности не будет, частая ошибка новичков. Run() просто вызывает target в текущем потоке, без нового потока."
      - prompt: "Что такое daemon-поток?"
        choices:
          - id: a
            text: "Фоновый поток, который не держит процесс: когда остаются только демоны, интерпретатор завершается, не дожидаясь их."
          - id: b
            text: "Поток с наивысшим приоритетом планирования, во всех сценариях без дополнительной настройки."
          - id: c
            text: "Поток, который нельзя остановить методом join(), независимо от входных данных и окружения."
          - id: d
            text: "Системный поток, создаваемый ядром, а не программой; другого корректного поведения система не допускает."
        correct: [a]
        explanation: "daemon=True делает поток фоновым: он не мешает процессу завершиться. Удобно для вечных служебных задач, опасно для работы, которую нельзя обрывать на полуслове."

  - id: races-thread-api-blanks-001
    concept: races-threading
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски: запуск потока и ожидание его завершения."
    template: |
      t = Thread(target=work, args=(3,))
      t.{{start}}()
      t.{{join}}()
    blanks:
      start:
        accept: ["start"]
      join:
        accept: ["join"]
    variants:
      - prompt: "Заполните пропуски: фоновый поток."
        template: |
          t = Thread(target=loop)
          t.{{daemon}} = True
          t.start()
        blanks:
          daemon:
            accept: ["daemon"]
      - prompt: "Заполните пропуски: запуск нескольких потоков в цикле."
        template: |
          threads = []
          for i in range(3):
              t = Thread(target=work, args=({{arg}},))
              t.start()
              threads.{{append}}(t)
        blanks:
          arg:
            accept: ["i"]
          append:
            accept: ["append"]

  - id: races-lost-debit-predict-001
    concept: races-threading
    type: predict-output
    difficulty: 3
    prompt: "Снипет моделирует гонку на балансе: два списания читают баланс ДО того, как хоть одно запишет результат. Что напечатает программа?"
    snippet: |
      balance = 100
      snapshots = []

      def read_balance():
          snapshots.append(balance)

      def write_balance(amount):
          global balance
          balance = amount

      read_balance()
      read_balance()
      write_balance(snapshots[0] - 30)
      write_balance(snapshots[1] - 50)
      print(balance)
    expected:
      kind: stdout
      value: "50"
    hints:
      - "Оба списания сняли снимок баланса раньше, чем любое из них записало новый. С какого числа стартует каждое?"
      - "Оба стартуют со 100. Первое пишет 70, второе пишет 100-50=50 поверх. Списание на 30 потеряно: при честной последовательности вышло бы 20."
    variants:
      - prompt: "То же переплетение, баланс 200, списания 40 и 70. Что напечатает программа?"
        snippet: |
          balance = 200
          snapshots = []

          def read_balance():
              snapshots.append(balance)

          def write_balance(amount):
              global balance
              balance = amount

          read_balance()
          read_balance()
          write_balance(snapshots[0] - 40)
          write_balance(snapshots[1] - 70)
          print(balance)
        expected:
          kind: stdout
          value: "130"
      - prompt: "Теперь два пополнения по +10 и +25, оба прочитали баланс 100 до записи. Что напечатает программа?"
        snippet: |
          balance = 100
          snapshots = []

          def read_balance():
              snapshots.append(balance)

          def write_balance(amount):
              global balance
              balance = amount

          read_balance()
          read_balance()
          write_balance(snapshots[0] + 10)
          write_balance(snapshots[1] + 25)
          print(balance)
        expected:
          kind: stdout
          value: "125"

  - id: races-cache-stampede-predict-001
    concept: races-threading
    type: predict-output
    difficulty: 4
    prompt: "Снипет моделирует гонку проверка-затем-действие в ленивом кэше: оба потока выполняют проверку `not in cache` ДО того, как хоть один запишет значение. Печатается, сколько раз вызвался compute и что осело в кэше."
    snippet: |
      cache = {}
      computed = []

      def check_absent(key):
          return key not in cache

      def compute(key):
          computed.append(key)
          return key.upper()

      def fill(key, value):
          cache[key] = value

      a_absent = check_absent("user")
      b_absent = check_absent("user")
      if a_absent:
          fill("user", compute("user"))
      if b_absent:
          fill("user", compute("user"))
      print(len(computed), cache["user"])
    expected:
      kind: stdout
      value: "2 USER"
    hints:
      - "Обе проверки check_absent выполняются подряд, до любого fill. Что вернёт вторая проверка, если первая ещё ничего не записала?"
      - "Оба потока видят пустой кэш и оба заходят в тело своего if. Сколько раз тогда позовётся compute?"
      - "compute отработает дважды: ни один поток не увидел чужую запись вовремя. Итог: len(computed) = 2, а в кэше корректное 'USER'. Значение верное, но работа сделана дважды, это и есть cache stampede."

  - id: races-condition-checklist-quiz-001
    concept: races-threading
    type: theory-quiz
    difficulty: 3
    prompt: "Три потока только ЧИТАЮТ общий список настроек и никто его не меняет. Есть ли здесь гонка данных?"
    choices:
      - id: a
        text: "Нет: гонке нужен хотя бы один писатель. Если все только читают неизменяемые данные, синхронизация не требуется."
      - id: b
        text: "Да: любой одновременный доступ к общему объекту из нескольких потоков это гонка как полное описание этого поведения."
      - id: c
        text: "Да, потому что чтение из списка тоже меняет его внутреннее состояние как полное описание этого поведения."
      - id: d
        text: "Нельзя сказать без запуска под нагрузкой как полное описание этого поведения."
    correct: [a]
    explanation: "Гонка требует совпадения трёх условий: общее изменяемое состояние, хотя бы один писатель, отсутствие синхронизации. Одновременное чтение без записи безопасно, убран пункт «писатель»."
    hints:
      - "Вспомните чек-лист из трёх условий гонки. Какое из них здесь не выполняется?"
      - "Данные общие, но их никто не пишет. Хватает ли этого для гонки?"
