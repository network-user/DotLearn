exercises:
  - id: async-cooperative-quiz-001
    concept: asyncio-vs-threads
    type: theory-quiz
    difficulty: 1
    prompt: "Чем кооперативная многозадачность asyncio отличается от вытесняющей у потоков?"
    choices:
      - id: a
        text: "Корутина отдаёт управление только в явной точке await; поток же вытесняется ядром в любой момент, между любыми инструкциями."
      - id: b
        text: "Разницы нет: и потоки, и корутины переключает планировщик ОС одинаково - полный набор ролей в этой архитектуре."
      - id: c
        text: "Корутины переключаются чаще потоков, потому что их прерывает ядро на каждом байткоде."
      - id: d
        text: "Кооперативная означает, что корутины исполняются на нескольких ядрах одновременно."
    correct: [a]
    explanation: "asyncio кооперативна: переключение происходит только на await, и между двумя await корутина непрерывна. Поток вытесняется ядром принудительно и в любой точке. Ни то, ни другое не даёт параллелизма вычислений на ядрах в CPython."
    variants:
      - prompt: "Сколько корутин реально исполняется в один момент в стандартном event loop?"
        choices:
          - id: a
            text: "Ровно одна: event loop крутится в одном потоке"
          - id: b
            text: "Столько, сколько ядер у процессора - полный перечень частей, которыми обычно подменяют ответ."
          - id: c
            text: "Столько, сколько корутин передали в gather, во всех сценариях без дополнительной настройки."
          - id: d
            text: "Ноль, пока не вызван time.sleep - полный перечень частей, которыми обычно подменяют ответ."
        correct: [a]
        explanation: "Event loop однопоточный: в каждый момент работает одна корутина. Пока она ждёт на await, loop отдаёт поток другой готовой корутине, отсюда конкурентность без параллелизма. Конкурентность появляется на перекрытии ожидания, а не на параллельном счёте."
      - prompt: "Что делает await внутри корутины?"
        choices:
          - id: a
            text: "Отдаёт управление event loop в этой точке, разрешая ему запустить другую готовую задачу, пока текущая ждёт."
          - id: b
            text: "Останавливает весь поток на заданное число секунд, во всех сценариях без дополнительной настройки."
          - id: c
            text: "Создаёт новый поток ОС для ожидания, независимо от входных данных и окружения."
          - id: d
            text: "Гарантирует, что следующая строка выполнится атомарно и без переключений как полное описание этого поведения."
        correct: [a]
        explanation: "await это точка кооперативной передачи: корутина сообщает loop, что сейчас ждёт, и loop переключается на другую задачу. Это не блокировка потока и не новый поток."

  - id: async-basics-blanks-001
    concept: asyncio-vs-threads
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски: объявление корутины, конкурентный запуск через gather и точка входа."
    template: |
      {{kw}} def main():
          results = {{await}} asyncio.{{gather}}(fetch("a"), fetch("b"))
          return results

      asyncio.{{run}}(main())
    blanks:
      kw:
        accept: ["async"]
      await:
        accept: ["await"]
      gather:
        accept: ["gather"]
      run:
        accept: ["run"]
    variants:
      - prompt: "Заполните пропуски: неблокирующий сон внутри корутины, который отдаёт управление loop."
        template: |
          async def tick():
              {{await}} asyncio.{{sleep}}(1)
              return "готово"
        blanks:
          await:
            accept: ["await"]
          sleep:
            accept: ["sleep"]
      - prompt: "Заполните пропуски: защита критической секции в asyncio."
        template: |
          lock = asyncio.{{ctor}}()

          async def transfer():
              async {{with}} lock:
                  await move_money()
        blanks:
          ctor:
            accept: ["Lock"]
          with:
            accept: ["with"]

  - id: async-gather-order-predict-001
    concept: asyncio-vs-threads
    type: predict-output
    difficulty: 3
    prompt: "Снипет контрастирует два порядка: asyncio.gather возвращает результаты в порядке переданных аргументов, даже если корутины завершились в другом порядке. Печатается порядок результатов gather и порядок по времени завершения. Что выведет программа?"
    snippet: |
      submitted = ["A", "B", "C"]
      finish_after = {"A": 3, "B": 1, "C": 2}

      gather_result = list(submitted)
      by_finish = sorted(submitted, key=lambda name: finish_after[name])

      print(gather_result, by_finish)
    expected:
      kind: stdout
      value: "['A', 'B', 'C'] ['B', 'C', 'A']"
    hints:
      - "gather хранит порядок переданных аргументов, а не порядок, в каком корутины закончили. Меняет ли более раннее или позднее завершение позицию в gather_result?"
      - "gather_result это копия submitted: ['A', 'B', 'C']. by_finish отсортирован по времени: B(1), C(2), A(3). Порядок gather от времени завершения не зависит."
    variants:
      - prompt: "То же, но с другими временами завершения. Что выведет программа?"
        snippet: |
          submitted = ["A", "B", "C"]
          finish_after = {"A": 1, "B": 3, "C": 2}

          gather_result = list(submitted)
          by_finish = sorted(submitted, key=lambda name: finish_after[name])

          print(gather_result, by_finish)
        expected:
          kind: stdout
          value: "['A', 'B', 'C'] ['A', 'C', 'B']"
      - prompt: "Четыре корутины с разным временем завершения. Что выведет программа?"
        snippet: |
          submitted = ["раз", "два", "три", "четыре"]
          finish_after = {"раз": 4, "два": 2, "три": 1, "четыре": 3}

          gather_result = list(submitted)
          by_finish = sorted(submitted, key=lambda name: finish_after[name])

          print(gather_result, by_finish)
        expected:
          kind: stdout
          value: "['раз', 'два', 'три', 'четыре'] ['три', 'два', 'четыре', 'раз']"

  - id: async-await-overdraft-predict-001
    concept: asyncio-vs-threads
    type: predict-output
    difficulty: 4
    prompt: "Снипет моделирует гонку в однопоточном asyncio: две задачи снимают деньги, но обе прошли проверку баланса ДО того, как await переключил управление, поэтому обе увидели исходные 100. Печатается итоговый баланс и список снятий. Что выведет программа?"
    snippet: |
      state = {"balance": 100}
      withdrawn = []

      a_ok = state["balance"] >= 70
      b_ok = state["balance"] >= 60

      if a_ok:
          state["balance"] -= 70
          withdrawn.append(70)
      if b_ok:
          state["balance"] -= 60
          withdrawn.append(60)

      print(state["balance"], withdrawn)
    expected:
      kind: stdout
      value: "-30 [70, 60]"
    hints:
      - "Обе проверки a_ok и b_ok вычислены до любого списания, поэтому обе смотрят на баланс 100. Пройдут ли обе, раз 100 >= 70 и 100 >= 60?"
      - "Обе проверки истинны, значит выполняются оба списания на 70 и 60. Баланс со 100 уходит в минус, до -30: по отдельности каждая сумма помещалась, но вместе превысили остаток. Защитил бы async with asyncio.Lock вокруг проверки и списания."

  - id: async-block-loop-quiz-001
    concept: asyncio-vs-threads
    type: theory-quiz
    difficulty: 3
    prompt: "В корутине веб-сервера вы вызвали обычный time.sleep(5) (не asyncio.sleep). Что произойдёт с остальными тысячами задач на этом event loop?"
    choices:
      - id: a
        text: "Они все замрут на 5 секунд: time.sleep блокирует единственный поток и не отдаёт управление loop"
      - id: b
        text: "Ничего: loop переключится на другие задачи, потому что sleep это точка await; другого корректного поведения система не допускает."
      - id: c
        text: "Уснёт только текущая задача, остальные продолжат, а ядро вытеснит спящий поток; другого корректного поведения система не допускает."
      - id: d
        text: "Loop заведёт по новому потоку на каждую задачу, чтобы обойти блокировку; другого корректного поведения система не допускает."
    correct: [a]
    explanation: "Event loop живёт в одном потоке. Синхронный time.sleep не отдаёт этот поток, поэтому весь loop и все его задачи стоят. Спасают либо асинхронный await asyncio.sleep, либо вынос блокирующего вызова в пул через loop.run_in_executor. Блокирующий вызов нужно унести в run_in_executor или заменить на await asyncio.sleep."
    hints:
      - "Сколько потоков у стандартного event loop и что делает обычный time.sleep с потоком, в котором его вызвали?"
      - "В time.sleep нет await, значит управление loop не возвращается. Что тогда происходит со всеми задачами, ждущими этот же loop?"
