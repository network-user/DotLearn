exercises:
  - id: loss-components-001
    concept: loss-training
    type: theory-quiz
    difficulty: 1
    prompt: "Из каких трёх компонентов складывается лосс детекции YOLO?"
    choices:
      - id: a
        text: "Локализация рамки, objectness."
      - id: b
        text: "Только классификация по всем ячейкам."
      - id: c
        text: "Скорость, точность и память."
      - id: d
        text: "IoU, NMS и mAP."
    correct: [a]
    explanation: "Лосс - взвешенная сумма трёх ошибок: координат рамки, наличия объекта (objectness) и класса."
    variants:
      - prompt: "Что такое positive-слот при обучении детектора?"
        choices:
          - id: a
            text: "Слот «ячейка плюс якорь»."
          - id: b
            text: "Слот, в котором уверенно нет объекта (фон)"
          - id: c
            text: "Слот с наибольшими координатами"
          - id: d
            text: "Слот, выбранный случайно на каждом шаге"
        correct: [a]
        explanation: "Positive-слот - тот, чей якорь лучше всех совпал по форме с объектом, центр которого попал в эту ячейку."
      - prompt: "Какова цель по objectness для negative-слота?"
        choices:
          - id: a
            text: "1 - здесь точно есть объект."
          - id: b
            text: "0 - здесь фон."
          - id: c
            text: "Случайное число."
          - id: d
            text: "Равна IoU с ближайшим объектом."
        correct: [b]
        explanation: "Negative-слоту объект не назначен, поэтому его цель по objectness равна нулю - это фон."

  - id: loss-weighted-sum-001
    concept: loss-training
    type: predict-output
    difficulty: 2
    prompt: "Что выведет вычисление взвешенного лосса детектора?"
    snippet: |
      box_loss = 2.0
      obj_loss = 1.0
      cls_loss = 0.5
      lambda_box, lambda_obj, lambda_cls = 5.0, 1.0, 1.0
      total = lambda_box * box_loss + lambda_obj * obj_loss + lambda_cls * cls_loss
      print(total)
    expected:
      kind: stdout
      value: "11.5"
    hints:
      - "Общий лосс - взвешенная сумма трёх слагаемых, каждое умножено на свой вес."
      - "Перемножьте каждую ошибку на её lambda и сложите три произведения."
    variants:
      - snippet: |
          box_loss = 1.0
          obj_loss = 2.0
          cls_loss = 1.0
          lambda_box, lambda_obj, lambda_cls = 5.0, 1.0, 1.0
          total = lambda_box * box_loss + lambda_obj * obj_loss + lambda_cls * cls_loss
          print(total)
        expected:
          kind: stdout
          value: "8.0"
      - snippet: |
          box_loss = 0.5
          obj_loss = 0.5
          cls_loss = 2.0
          lambda_box, lambda_obj, lambda_cls = 5.0, 1.0, 1.0
          total = lambda_box * box_loss + lambda_obj * obj_loss + lambda_cls * cls_loss
          print(total)
        expected:
          kind: stdout
          value: "5.0"

  - id: loss-component-scope-001
    concept: loss-training
    type: theory-quiz
    difficulty: 3
    prompt: "Какие утверждения о том, где считается каждый компонент лосса, верны? Выберите все подходящие."
    choices:
      - id: a
        text: "Objectness-лосс считается на всех слотах, включая фон."
      - id: b
        text: "Localization-лосс считается только на positive-слотах."
      - id: c
        text: "Classification-лосс считается и на фоне тоже."
      - id: d
        text: "Localization-лосс считается на каждом слоте независимо от наличия объекта."
    correct: [a, b]
    explanation: "Objectness нужен на всех слотах (цель 0 у фона, ~1 у объектов). Localization и classification считаются только на positive-слотах: у фона нет эталонной рамки и нечего классифицировать, поэтому c и d неверны."
    hints:
      - "Спросите про каждый компонент: что у фона есть, а чего нет? У фона нет эталонной рамки и класса."
      - "Objectness нужен везде - различить объект и фон. Координаты и класс осмысленны только там, где объект действительно назначен."

  - id: loss-pos-neg-count-001
    concept: loss-training
    type: predict-output
    difficulty: 3
    prompt: "Что выведет подсчёт positive и negative слотов по их objectness-целям (1 - объект, 0 - фон)?"
    snippet: |
      targets = [0, 0, 1, 0, 0, 1, 0]
      positives = sum(1 for t in targets if t == 1)
      negatives = sum(1 for t in targets if t == 0)
      print(positives, negatives)
    expected:
      kind: stdout
      value: "2 5"
    hints:
      - "Positive-слоты - те, где цель objectness равна 1; negative - где 0."
      - "Посчитайте отдельно единицы и нули в списке целей."
    variants:
      - snippet: |
          targets = [1, 0, 0, 1, 1, 0]
          positives = sum(1 for t in targets if t == 1)
          negatives = sum(1 for t in targets if t == 0)
          print(positives, negatives)
        expected:
          kind: stdout
          value: "3 3"
      - snippet: |
          targets = [0, 0, 0, 0, 1]
          positives = sum(1 for t in targets if t == 1)
          negatives = sum(1 for t in targets if t == 0)
          print(positives, negatives)
        expected:
          kind: stdout
          value: "1 4"
