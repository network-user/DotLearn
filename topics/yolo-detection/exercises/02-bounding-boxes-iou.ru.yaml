exercises:
  - id: iou-meaning-001
    concept: bounding-boxes-iou
    type: theory-quiz
    difficulty: 1
    prompt: "Что вычисляет IoU двух рамок?"
    choices:
      - id: a
        text: "Площадь пересечения, делённую на площадь объединения."
      - id: b
        text: "Площадь объединения, делённую на площадь пересечения."
      - id: c
        text: "Расстояние между центрами рамок."
      - id: d
        text: "Сумму площадей двух рамок."
    correct: [a]
    explanation: "IoU = пересечение / объединение. При совпадении рамок равно 1, при отсутствии касания - 0."
    variants:
      - prompt: "Чему равен IoU двух полностью совпадающих рамок?"
        choices:
          - id: a
            text: "0"
          - id: b
            text: "0.5"
          - id: c
            text: "1"
          - id: d
            text: "Зависит от площади рамок"
        correct: [c]
        explanation: "Когда рамки совпадают, пересечение равно объединению, поэтому отношение равно 1."
      - prompt: "Чему равен IoU двух рамок, которые нигде не касаются?"
        choices:
          - id: a
            text: "1"
          - id: b
            text: "0.5"
          - id: c
            text: "0"
          - id: d
            text: "Отрицательное число"
        correct: [c]
        explanation: "Без перекрытия площадь пересечения равна нулю, поэтому IoU равен нулю; отрицательным он не бывает."

  - id: iou-overlap-axis-001
    concept: bounding-boxes-iou
    type: predict-output
    difficulty: 2
    prompt: "Что выведет вычисление перекрытия по одной оси для двух пар отрезков?"
    snippet: |
      def overlap(a1, a2, b1, b2):
          lo = max(a1, b1)
          hi = min(a2, b2)
          return max(0, hi - lo)

      print(overlap(0, 4, 2, 6), overlap(0, 2, 5, 7))
    expected:
      kind: stdout
      value: "2 0"
    hints:
      - "Перекрытие отрезков начинается у правого из левых краёв и кончается у левого из правых краёв."
      - "max(0, hi - lo) обрезает отрицательную длину до нуля, когда отрезки не пересекаются."
    variants:
      - snippet: |
          def overlap(a1, a2, b1, b2):
              lo = max(a1, b1)
              hi = min(a2, b2)
              return max(0, hi - lo)

          print(overlap(0, 10, 3, 7), overlap(1, 3, 4, 9))
        expected:
          kind: stdout
          value: "4 0"
      - snippet: |
          def overlap(a1, a2, b1, b2):
              lo = max(a1, b1)
              hi = min(a2, b2)
              return max(0, hi - lo)

          print(overlap(2, 8, 5, 12), overlap(0, 5, 5, 10))
        expected:
          kind: stdout
          value: "3 0"

  - id: iou-implement-001
    concept: bounding-boxes-iou
    type: python-function
    difficulty: 4
    prompt: "Реализуйте `iou(box_a, box_b)` для рамок в формате xyxy `(x1, y1, x2, y2)`. Верните отношение площади пересечения к площади объединения; при нулевом объединении верните `0.0`. Обрежьте перекрытие по каждой оси до нуля."
    starter: |
      def iou(box_a, box_b):
          ...
    cases:
      - call: "iou((0, 0, 4, 4), (0, 0, 4, 4))"
        expect: 1.0
      - call: "iou((0, 0, 2, 2), (5, 5, 7, 7))"
        expect: 0.0
      - call: "iou((0, 0, 4, 4), (2, 2, 6, 6))"
        expect_approx: 0.14285714
      - call: "iou((0, 0, 2, 2), (1, 0, 3, 2))"
        expect_approx: 0.33333333
    solution: |
      def iou(box_a, box_b):
          ax1, ay1, ax2, ay2 = box_a
          bx1, by1, bx2, by2 = box_b
          iw = max(0, min(ax2, bx2) - max(ax1, bx1))
          ih = max(0, min(ay2, by2) - max(ay1, by1))
          inter = iw * ih
          area_a = (ax2 - ax1) * (ay2 - ay1)
          area_b = (bx2 - bx1) * (by2 - by1)
          union = area_a + area_b - inter
          if union <= 0:
              return 0.0
          return inter / union
    hints:
      - "IoU - это пересечение, делённое на объединение. Сначала найдите прямоугольник пересечения, потом площади."
      - "Ширина пересечения по оси: минимум правых краёв минус максимум левых, обрезанный до нуля через max(0, ...)."
      - "Объединение = площадь A плюс площадь B минус площадь пересечения, иначе общую часть учтёте дважды."
