exercises:
  - id: grid-responsible-cell-001
    concept: grid-anchors
    type: theory-quiz
    difficulty: 1
    prompt: "Какая ячейка сетки SxS отвечает за объект?"
    choices:
      - id: a
        text: "Та, в которую попал центр объекта."
      - id: b
        text: "Любая ячейка, которую пересекает рамка объекта."
      - id: c
        text: "Ячейка в левом верхнем углу рамки."
      - id: d
        text: "Все ячейки, накрытые объектом, поровну."
    correct: [a]
    explanation: "Ответственность определяется центром: за объект отвечает ровно одна ячейка - та, в которую попал его центр, даже если рамка вылезает в соседние."
    variants:
      - prompt: "Большой объект накрывает девять ячеек сетки. Сколько ячеек отвечают за него?"
        choices:
          - id: a
            text: "Девять - все накрытые."
          - id: b
            text: "Одна - содержащая центр."
          - id: c
            text: "Четыре - угловые."
          - id: d
            text: "Ноль - объект слишком большой для сетки."
        correct: [b]
        explanation: "Сколько бы ячеек ни накрывал объект, отвечает за него ровно одна - та, где находится его центр."
      - prompt: "Что задаёт якорная рамка (anchor box)?"
        choices:
          - id: a
            text: "Положение объекта на изображении."
          - id: b
            text: "Шаблонную форму (ширину и высоту), от которой сеть считает поправку."
          - id: c
            text: "Класс объекта."
          - id: d
            text: "Порог уверенности для отбора рамок."
        correct: [b]
        explanation: "Якорь задаёт только форму. Положение приходит от ячейки, а сеть предсказывает поправку к форме и центру якоря."

  - id: grid-cell-index-001
    concept: grid-anchors
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `responsible_cell(cx, cy, S)`: по нормированному центру `(cx, cy)` из 0..1 и размеру сетки `S` верните список `[col, row]`, где col = floor(cx*S), row = floor(cy*S). Прижмите край: индекс не больше S-1."
    starter: |
      def responsible_cell(cx, cy, S):
          ...
    cases:
      - call: "responsible_cell(0.62, 0.46, 5)"
        expect: [3, 2]
      - call: "responsible_cell(0.1, 0.9, 5)"
        expect: [0, 4]
      - call: "responsible_cell(0.5, 0.5, 4)"
        expect: [2, 2]
      - call: "responsible_cell(1.0, 1.0, 5)"
        expect: [4, 4]
    solution: |
      def responsible_cell(cx, cy, S):
          col = min(int(cx * S), S - 1)
          row = min(int(cy * S), S - 1)
          return [col, row]
    hints:
      - "Номер столбца - это сколько целых шагов сетки умещается до центра по горизонтали."
      - "Умножьте координату на S и возьмите целую часть; то же по вертикали."
      - "Центр ровно на границе (1.0) даёт индекс S - прижмите его к S-1 через min."
    variants:
      - cases:
          - call: "responsible_cell(0.25, 0.75, 4)"
            expect: [1, 3]
          - call: "responsible_cell(0.99, 0.01, 4)"
            expect: [3, 0]
          - call: "responsible_cell(0.5, 0.5, 2)"
            expect: [1, 1]
        solution: |
          def responsible_cell(cx, cy, S):
              col = min(int(cx * S), S - 1)
              row = min(int(cy * S), S - 1)
              return [col, row]
      - cases:
          - call: "responsible_cell(0.34, 0.67, 3)"
            expect: [1, 2]
          - call: "responsible_cell(0.0, 0.0, 6)"
            expect: [0, 0]
          - call: "responsible_cell(0.83, 0.5, 6)"
            expect: [4, 3]
        solution: |
          def responsible_cell(cx, cy, S):
              col = min(int(cx * S), S - 1)
              row = min(int(cy * S), S - 1)
              return [col, row]

  - id: grid-anchor-role-001
    concept: grid-anchors
    type: theory-quiz
    difficulty: 2
    prompt: "Зачем каждой ячейке дают несколько якорей разной формы?"
    choices:
      - id: a
        text: "Чтобы одна ячейка могла обслужить несколько объектов и объекты разных пропорций."
      - id: b
        text: "Чтобы ускорить обучение за счёт меньшего числа предсказаний."
      - id: c
        text: "Чтобы каждый якорь отвечал за свой класс объектов."
      - id: d
        text: "Чтобы случайно выбирать один якорь на каждом проходе."
    correct: [a]
    explanation: "Несколько якорей дают ячейке опорные формы под разные пропорции и позволяют отвечать более чем за один объект - по объекту на якорь."

  - id: grid-best-anchor-001
    concept: grid-anchors
    type: python-function
    difficulty: 4
    prompt: "Реализуйте `best_anchor(target, anchors)`. `target` и каждый якорь - пара (w, h). Совместив центры, вычислите для каждого якоря IoU формы (пересечение центрированных рамок = min(wt, wa) * min(ht, ha)) и верните индекс якоря с максимальным IoU."
    starter: |
      def best_anchor(target, anchors):
          ...
    cases:
      - call: "best_anchor((3, 1), [(2, 2), (4, 2), (2, 4)])"
        expect: 0
      - call: "best_anchor((4, 2), [(2, 2), (4, 2), (2, 4)])"
        expect: 1
      - call: "best_anchor((1, 4), [(2, 2), (4, 2), (2, 4)])"
        expect: 2
      - call: "best_anchor((2, 2), [(2, 2), (4, 2), (2, 4)])"
        expect: 0
    solution: |
      def best_anchor(target, anchors):
          wt, ht = target
          best_index = 0
          best_iou = -1.0
          for index, (wa, ha) in enumerate(anchors):
              inter = min(wt, wa) * min(ht, ha)
              union = wt * ht + wa * ha - inter
              iou = inter / union if union > 0 else 0.0
              if iou > best_iou:
                  best_iou = iou
                  best_index = index
          return best_index
    hints:
      - "Сравнивают форму, а не площадь: совместите центры, тогда IoU зависит только от ширины и высоты."
      - "Пересечение центрированных рамок - это min ширин на min высот; объединение - сумма площадей минус пересечение."
      - "Пройдите по якорям, посчитайте IoU каждого с целью и запомните индекс наибольшего."
