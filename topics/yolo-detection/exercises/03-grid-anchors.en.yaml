exercises:
  - id: grid-responsible-cell-001
    concept: grid-anchors
    type: theory-quiz
    difficulty: 1
    prompt: "Which cell of an SxS grid is responsible for an object?"
    choices:
      - id: a
        text: "The one containing the object's center."
      - id: b
        text: "Any cell the object's box intersects."
      - id: c
        text: "The cell at the box's top-left corner."
      - id: d
        text: "All cells covered by the object, equally."
    correct: [a]
    explanation: "Responsibility is defined by the center: exactly one cell answers for the object - the one containing its center, even if the box spills into neighbors."
    variants:
      - prompt: "A large object covers nine grid cells. How many cells are responsible for it?"
        choices:
          - id: a
            text: "Nine - all covered cells."
          - id: b
            text: "One - containing the center."
          - id: c
            text: "Four - the corner cells."
          - id: d
            text: "Zero - the object is too large for the grid."
        correct: [b]
        explanation: "However many cells the object covers, exactly one answers for it - where its center lies."
      - prompt: "What does an anchor box define?"
        choices:
          - id: a
            text: "Object position on the image."
          - id: b
            text: "A template shape (width and height) the network corrects from."
          - id: c
            text: "Object class."
          - id: d
            text: "Confidence threshold for box filtering."
        correct: [b]
        explanation: "An anchor defines only shape. Position comes from the cell; the network predicts corrections to shape and center relative to the anchor."

  - id: grid-cell-index-001
    concept: grid-anchors
    type: python-function
    difficulty: 2
    prompt: "Implement `responsible_cell(cx, cy, S)`: from normalized center `(cx, cy)` in 0..1 and grid size `S` return list `[col, row]` where col = floor(cx*S), row = floor(cy*S). Clamp the edge: index must not exceed S-1."
    starter: |
      def responsible_cell(cx, cy, S):
          ...
    cases:
      - call: "responsible_cell(0.62, 0.46, 5)"
        expect: [3, 2]
      - call: "responsible_cell(0.1, 0.9, 5)"
        expect: [0, 4]
      - call: "responsible_cell(0.5, 0.5, 4)"
        expect: [2, 2]
      - call: "responsible_cell(1.0, 1.0, 5)"
        expect: [4, 4]
    solution: |
      def responsible_cell(cx, cy, S):
          col = min(int(cx * S), S - 1)
          row = min(int(cy * S), S - 1)
          return [col, row]
    hints:
      - "Column number is how many whole grid steps fit before the center horizontally."
      - "Multiply coordinate by S and take the integer part; same vertically."
      - "Center exactly on the boundary (1.0) gives index S - clamp it to S-1 with min."
    variants:
      - cases:
          - call: "responsible_cell(0.25, 0.75, 4)"
            expect: [1, 3]
          - call: "responsible_cell(0.99, 0.01, 4)"
            expect: [3, 0]
          - call: "responsible_cell(0.5, 0.5, 2)"
            expect: [1, 1]
        solution: |
          def responsible_cell(cx, cy, S):
              col = min(int(cx * S), S - 1)
              row = min(int(cy * S), S - 1)
              return [col, row]
      - cases:
          - call: "responsible_cell(0.34, 0.67, 3)"
            expect: [1, 2]
          - call: "responsible_cell(0.0, 0.0, 6)"
            expect: [0, 0]
          - call: "responsible_cell(0.83, 0.5, 6)"
            expect: [4, 3]
        solution: |
          def responsible_cell(cx, cy, S):
              col = min(int(cx * S), S - 1)
              row = min(int(cy * S), S - 1)
              return [col, row]

  - id: grid-anchor-role-001
    concept: grid-anchors
    type: theory-quiz
    difficulty: 2
    prompt: "Why does each cell get several anchors of different shapes?"
    choices:
      - id: a
        text: "So one cell can serve multiple objects and objects of different aspect ratios."
      - id: b
        text: "To speed up training by reducing the number of predictions."
      - id: c
        text: "So each anchor answers for its own object class."
      - id: d
        text: "To randomly pick one anchor on each pass."
    correct: [a]
    explanation: "Multiple anchors give a cell reference shapes for different proportions and let it answer for more than one object - one object per anchor."

  - id: grid-best-anchor-001
    concept: grid-anchors
    type: python-function
    difficulty: 4
    prompt: "Implement `best_anchor(target, anchors)`. `target` and each anchor are pair (w, h). With centers aligned, compute shape IoU for each anchor (intersection of centered boxes = min(wt, wa) * min(ht, ha)) and return the index of the anchor with maximum IoU."
    starter: |
      def best_anchor(target, anchors):
          ...
    cases:
      - call: "best_anchor((3, 1), [(2, 2), (4, 2), (2, 4)])"
        expect: 0
      - call: "best_anchor((4, 2), [(2, 2), (4, 2), (2, 4)])"
        expect: 1
      - call: "best_anchor((1, 4), [(2, 2), (4, 2), (2, 4)])"
        expect: 2
      - call: "best_anchor((2, 2), [(2, 2), (4, 2), (2, 4)])"
        expect: 0
    solution: |
      def best_anchor(target, anchors):
          wt, ht = target
          best_index = 0
          best_iou = -1.0
          for index, (wa, ha) in enumerate(anchors):
              inter = min(wt, wa) * min(ht, ha)
              union = wt * ht + wa * ha - inter
              iou = inter / union if union > 0 else 0.0
              if iou > best_iou:
                  best_iou = iou
                  best_index = index
          return best_index
    hints:
      - "Compare shape, not area: align centers, then IoU depends only on width and height."
      - "Intersection of centered boxes is min widths times min heights; union is sum of areas minus intersection."
      - "Walk anchors, compute each one's IoU with the target, remember the index of the largest."
