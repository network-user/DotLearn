exercises:
  - id: nms-purpose-001
    concept: nms
    type: theory-quiz
    difficulty: 1
    prompt: "Какую задачу решает Non-Maximum Suppression?"
    choices:
      - id: a
        text: "Из группы пересекающихся рамок оставляет самую уверенную, остальные подавляет."
      - id: b
        text: "Декодирует сырые поправки сети в координаты рамок - путает роль оболочки с системными вызовами"
      - id: c
        text: "Считает метрику качества детектора"
      - id: d
        text: "Назначает каждому объекту ответственную ячейку сетки"
    correct: [a]
    explanation: "NMS убирает дубликаты: один объект порождает много перекрывающихся рамок, и NMS оставляет по одной - максимальную по уверенности."
    variants:
      - prompt: "В каком порядке NMS перебирает рамки-кандидаты?"
        choices:
          - id: a
            text: "По убыванию уверенности - самые уверенные первыми."
          - id: b
            text: "По возрастанию площади рамки, сначала самые мелкие."
          - id: c
            text: "В случайном порядке при каждом запуске NMS."
          - id: d
            text: "По возрастанию координаты x центра каждой рамки."
        correct: [a]
        explanation: "Алгоритм жадный: на каждом шаге берётся рамка с наибольшей оставшейся уверенностью."
      - prompt: "Относительно чего подавляются рамки на каждом шаге NMS?"
        choices:
          - id: a
            text: "Относительно текущего победителя."
          - id: b
            text: "Относительно всех остальных рамок сразу, сравнивая все пары."
          - id: c
            text: "Относительно эталонной разметки из размеченного датасета."
          - id: d
            text: "Относительно центра изображения, а не других кандидатов."
        correct: [a]
        explanation: "Подавляются кандидаты с IoU выше порога относительно текущего победителя, а не все пересекающиеся пары глобально."

  - id: nms-threshold-effect-001
    concept: nms
    type: theory-quiz
    difficulty: 2
    prompt: "Что происходит при слишком низком пороге IoU в NMS?"
    choices:
      - id: a
        text: "Близко стоящие разные объекты склеиваются."
      - id: b
        text: "Остаётся слишком много дубликатов одного объекта."
      - id: c
        text: "Уверенность рамок растёт."
      - id: d
        text: "Координаты рамок переводятся в пиксели."
    correct: [a]
    explanation: "Низкий порог подавляет даже слабо пересекающиеся рамки, поэтому плотно стоящие разные объекты ошибочно считаются дубликатами и теряются."

  - id: nms-iou-decision-001
    concept: nms
    type: predict-output
    difficulty: 2
    prompt: "Что выведет вычисление IoU двух рамок (округление до трёх знаков)?"
    snippet: |
      def iou(a, b):
          ax1, ay1, ax2, ay2 = a
          bx1, by1, bx2, by2 = b
          iw = max(0, min(ax2, bx2) - max(ax1, bx1))
          ih = max(0, min(ay2, by2) - max(ay1, by1))
          inter = iw * ih
          union = (ax2 - ax1) * (ay2 - ay1) + (bx2 - bx1) * (by2 - by1) - inter
          return inter / union if union > 0 else 0.0

      print(round(iou((0, 0, 4, 4), (1, 1, 5, 5)), 3))
    expected:
      kind: stdout
      value: "0.391"
    hints:
      - "Две рамки 4x4, сдвинутые по диагонали на 1; найдите площадь их перекрытия, затем объединение."
      - "Пересечение 3x3 = 9, площади по 16, объединение 16 + 16 - 9; разделите одно на другое."
    variants:
      - snippet: |
