  - id: nms-implement-001
    concept: nms
    type: python-function
    difficulty: 5
    prompt: "Реализуйте `nms(boxes, scores, threshold)`. Рамки в формате xyxy, `scores` - параллельный список уверенностей. Жадно оставляйте самую уверенную рамку и отбрасывайте оставшиеся с IoU выше порога относительно неё. Верните список индексов выживших рамок в порядке убывания уверенности."
    starter: |
      def nms(boxes, scores, threshold):
          ...
    cases:
      - call: "nms([(0, 0, 4, 4), (1, 1, 5, 5), (10, 10, 14, 14), (11, 11, 15, 15)], [0.9, 0.8, 0.7, 0.6], 0.3)"
        expect: [0, 2]
      - call: "nms([(0, 0, 4, 4), (1, 1, 5, 5), (10, 10, 14, 14), (11, 11, 15, 15)], [0.9, 0.8, 0.7, 0.6], 0.5)"
        expect: [0, 1, 2, 3]
      - call: "nms([(0, 0, 2, 2), (0, 0, 2, 2), (5, 5, 7, 7)], [0.5, 0.9, 0.7], 0.5)"
        expect: [1, 2]
    solution: |
      def nms(boxes, scores, threshold):
          def iou(a, b):
              ax1, ay1, ax2, ay2 = a
              bx1, by1, bx2, by2 = b
              iw = max(0, min(ax2, bx2) - max(ax1, bx1))
              ih = max(0, min(ay2, by2) - max(ay1, by1))
              inter = iw * ih
              union = (ax2 - ax1) * (ay2 - ay1) + (bx2 - bx1) * (by2 - by1) - inter
              return inter / union if union > 0 else 0.0

          order = sorted(range(len(boxes)), key=lambda i: scores[i], reverse=True)
          keep = []
          while order:
              best = order.pop(0)
              keep.append(best)
              order = [i for i in order if iou(boxes[best], boxes[i]) <= threshold]
          return keep
    hints:
      - "Это жадный отбор: отсортируйте индексы по убыванию уверенности и обрабатывайте по одному."
      - "Забирайте первый (самый уверенный) в результат, затем выбросьте из оставшихся все с IoU выше порога относительно него."
      - "Подавляйте относительно текущего победителя, а не между всеми парами; выживают рамки с IoU <= threshold."
