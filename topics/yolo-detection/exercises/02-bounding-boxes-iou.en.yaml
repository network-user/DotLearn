exercises:
  - id: iou-meaning-001
    concept: bounding-boxes-iou
    type: theory-quiz
    difficulty: 1
    prompt: "What does IoU of two boxes compute?"
    choices:
      - id: a
        text: "Intersection area divided by union area."
      - id: b
        text: "Union area divided by intersection area."
      - id: c
        text: "Distance between box centers."
      - id: d
        text: "Sum of the two box areas."
    correct: [a]
    explanation: "IoU = intersection / union. When boxes match it's 1, when they don't touch it's 0."
    variants:
      - prompt: "What is IoU of two fully identical boxes?"
        choices:
          - id: a
            text: "0"
          - id: b
            text: "0.5"
          - id: c
            text: "1"
          - id: d
            text: "Depends on box area"
        correct: [c]
        explanation: "When boxes coincide, intersection equals union, so the ratio is 1."
      - prompt: "What is IoU of two boxes that never touch?"
        choices:
          - id: a
            text: "1"
          - id: b
            text: "0.5"
          - id: c
            text: "0"
          - id: d
            text: "A negative number"
        correct: [c]
        explanation: "With no overlap intersection area is zero, so IoU is zero; it never goes negative."

  - id: iou-overlap-axis-001
    concept: bounding-boxes-iou
    type: predict-output
    difficulty: 2
    prompt: "What will this one-axis overlap computation print for two segment pairs?"
    snippet: |
      def overlap(a1, a2, b1, b2):
          lo = max(a1, b1)
          hi = min(a2, b2)
          return max(0, hi - lo)

      print(overlap(0, 4, 2, 6), overlap(0, 2, 5, 7))
    expected:
      kind: stdout
      value: "2 0"
    hints:
      - "Segment overlap starts at the rightmost left edge and ends at the leftmost right edge."
      - "max(0, hi - lo) clips negative length to zero when segments don't intersect."
    variants:
      - snippet: |
          def overlap(a1, a2, b1, b2):
              lo = max(a1, b1)
              hi = min(a2, b2)
              return max(0, hi - lo)

          print(overlap(0, 10, 3, 7), overlap(1, 3, 4, 9))
        expected:
          kind: stdout
          value: "4 0"
      - snippet: |
          def overlap(a1, a2, b1, b2):
              lo = max(a1, b1)
              hi = min(a2, b2)
              return max(0, hi - lo)

          print(overlap(2, 8, 5, 12), overlap(0, 5, 5, 10))
        expected:
          kind: stdout
          value: "3 0"

  - id: iou-implement-001
    concept: bounding-boxes-iou
    type: python-function
    difficulty: 4
    prompt: "Implement `iou(box_a, box_b)` for xyxy boxes `(x1, y1, x2, y2)`. Return intersection area over union area; if union is zero return `0.0`. Clip overlap on each axis to zero."
    starter: |
      def iou(box_a, box_b):
          ...
    cases:
      - call: "iou((0, 0, 4, 4), (0, 0, 4, 4))"
        expect: 1.0
      - call: "iou((0, 0, 2, 2), (5, 5, 7, 7))"
        expect: 0.0
      - call: "iou((0, 0, 4, 4), (2, 2, 6, 6))"
        expect_approx: 0.14285714
      - call: "iou((0, 0, 2, 2), (1, 0, 3, 2))"
        expect_approx: 0.33333333
    solution: |
      def iou(box_a, box_b):
          ax1, ay1, ax2, ay2 = box_a
          bx1, by1, bx2, by2 = box_b
          iw = max(0, min(ax2, bx2) - max(ax1, bx1))
          ih = max(0, min(ay2, by2) - max(ay1, by1))
          inter = iw * ih
          area_a = (ax2 - ax1) * (ay2 - ay1)
          area_b = (bx2 - bx1) * (by2 - by1)
          union = area_a + area_b - inter
          if union <= 0:
              return 0.0
          return inter / union
    hints:
      - "IoU is intersection divided by union. First find the intersection rectangle, then areas."
      - "Intersection width on an axis: minimum of right edges minus maximum of left edges, clipped to zero via max(0, ...)."
      - "Union = area A plus area B minus intersection area, otherwise you count the overlap twice."
