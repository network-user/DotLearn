exercises:
  - id: ultra-predict-args-001
    concept: ultralytics-practice
    type: theory-quiz
    difficulty: 1
    prompt: "What does the conf parameter set in model.predict(source, conf=0.25)?"
    choices:
      - id: a
        text: "The minimum confidence threshold: predictions below it are dropped."
      - id: b
        text: "The side the image is scaled to before inference."
      - id: c
        text: "The number of training epochs."
      - id: d
        text: "The path to the weights file."
    correct: [a]
    explanation: "conf is the confidence threshold: boxes with a score below it never reach predict's output."
    variants:
      - prompt: "What does the imgsz parameter set in model.predict(source, imgsz=640)?"
        choices:
          - id: a
            text: "The side the image is letterbox-scaled to before the network."
          - id: b
            text: "The confidence threshold for dropping boxes."
          - id: c
            text: "The number of classes in the dataset."
          - id: d
            text: "The batch size at inference."
        correct: [a]
        explanation: "imgsz sets the input side: the image is letterboxed to this size before running through the network."
      - prompt: "What does boxes.xyxy hold on a Results object?"
        choices:
          - id: a
            text: "Box coordinates as (x1, y1, x2, y2): top-left and bottom-right corners in pixels."
          - id: b
            text: "Only the prediction confidences."
          - id: c
            text: "The class indices."
          - id: d
            text: "The class names as strings."
        correct: [a]
        explanation: "xyxy holds box corners in original-image pixels; confidences live in conf, class indices in cls."
      - prompt: "What does YOLO('yolov8n.pt') load?"
        choices:
          - id: a
            text: "Pretrained weights of the lightest YOLOv8 model (nano), trained on COCO."
          - id: b
            text: "A dataset file with paths and classes."
          - id: c
            text: "An augmentation configuration."
          - id: d
            text: "An ONNX export script."
        correct: [a]
        explanation: "yolov8n.pt is pretrained nano weights for 80 COCO classes; the file downloads on first call."

  - id: ultra-read-results-001
    concept: ultralytics-practice
    type: predict-output
    difficulty: 2
    prompt: "What does reading the names of detections with confidence at least the threshold print?"
    snippet: |
      names = {0: "person", 2: "car", 5: "bus"}
      cls = [0, 2, 2, 5, 0]
      conf = [0.90, 0.61, 0.42, 0.88, 0.33]
      labels = [names[c] for c, s in zip(cls, conf) if s >= 0.5]
      print(labels)
    expected:
      kind: stdout
      value: "['person', 'car', 'bus']"
    hints:
      - "Walk the class-confidence pairs and keep only those with confidence at least 0.5."
      - "Map each kept index through names; order is preserved as in the input lists."
    variants:
      - snippet: |
          names = {1: "bike", 3: "dog", 4: "cat"}
          cls = [3, 1, 3, 4]
          conf = [0.75, 0.40, 0.55, 0.20]
          labels = [names[c] for c, s in zip(cls, conf) if s >= 0.5]
          print(labels)
        expected:
          kind: stdout
          value: "['dog', 'dog']"
      - snippet: |
          names = {0: "person", 7: "truck"}
          cls = [7, 0, 7, 0]
          conf = [0.95, 0.66, 0.80, 0.40]
          labels = [names[c] for c, s in zip(cls, conf) if s >= 0.7]
          print(labels)
        expected:
          kind: stdout
          value: "['truck', 'truck']"

  - id: ultra-train-call-001
    concept: ultralytics-practice
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in fine-tuning: load nano weights and run train with the dataset, epoch count, and image size."
    template: |
      from ultralytics import YOLO

      model = YOLO("{{weights}}")
      model.train(data="{{data}}", epochs={{epochs}}, imgsz={{imgsz}})
    blanks:
      weights:
        accept: ["yolov8n.pt"]
      data:
        accept_regex: '^[\w./-]+\.yaml$'
      epochs:
        accept_regex: '^[1-9][0-9]*$'
      imgsz:
        accept: ["640", "320", "416", "512", "1280"]
    hints:
      - "Starting weights and the dataset file are quoted strings; epochs and imgsz are integers."
      - "The dataset description file has a .yaml extension, and the standard input side is 640."
    variants:
      - prompt: "Fill in inference: the prediction method and the confidence threshold."
        template: |
          from ultralytics import YOLO

          model = YOLO("yolov8n.pt")
          results = model.{{method}}("bus.jpg", conf={{conf}})
        blanks:
          method:
            accept: ["predict"]
          conf:
            accept_regex: '^0?\.[0-9]+$'
      - prompt: "Fill in evaluation and export: the metrics method and the export format."
        template: |
          from ultralytics import YOLO

          model = YOLO("runs/detect/train/weights/best.pt")
          metrics = model.{{valmethod}}()
          model.export(format="{{fmt}}")
        blanks:
          valmethod:
            accept: ["val"]
          fmt:
            accept: ["onnx"]

  - id: ultra-workflow-meaning-001
    concept: ultralytics-practice
    type: theory-quiz
    difficulty: 3
    prompt: "Which statements about fine-tuning, evaluation, and export in ultralytics are true? Select all that apply."
    choices:
      - id: a
        text: "model.train(data='data.yaml', epochs=100, imgsz=640) fine-tunes the model from current weights."
      - id: b
        text: "data.yaml describes train/val paths and class names."
      - id: c
        text: "model.val() computes metrics, including mAP, on the validation set."
      - id: d
        text: "ONNX export exists to speed up model training."
    correct: [a, b, c]
    explanation: "train fine-tunes from loaded weights (transfer learning), data.yaml sets paths and names, val computes the mAP from concept 07. ONNX export serves inference and deployment, not training, so d is wrong."
    hints:
      - "Break the cycle down by method: train changes weights, val measures quality, export prepares the model for deployment."
      - "Think about which stage ONNX lives at: it is about running a finished model, not training it."

  - id: ultra-kept-labels-001
    concept: ultralytics-practice
    type: python-function
    difficulty: 4
    prompt: "Implement kept_labels(cls_ids, confs, names, conf_threshold). cls_ids holds class indices (like boxes.cls after int), confs holds the parallel confidences, names maps an index to a name. Return the list of names of detections with confidence at least conf_threshold, sorted by descending confidence, and on equal confidence by class name alphabetically."
    starter: |
      def kept_labels(cls_ids, confs, names, conf_threshold):
          ...
    cases:
      - call: 'kept_labels([0, 2, 2, 5, 0], [0.9, 0.8, 0.3, 0.7, 0.95], {0: "person", 2: "car", 5: "bus"}, 0.5)'
        expect: ["person", "person", "car", "bus"]
      - call: 'kept_labels([0, 2, 5], [0.2, 0.1, 0.15], {0: "person", 2: "car", 5: "bus"}, 0.5)'
        expect: []
      - call: 'kept_labels([5, 0, 2], [0.5, 0.5, 0.5], {0: "person", 2: "car", 5: "bus"}, 0.5)'
        expect: ["bus", "car", "person"]
      - call: 'kept_labels([5, 5, 0], [0.6, 0.95, 0.4], {0: "person", 5: "bus"}, 0.5)'
        expect: ["bus", "bus"]
    solution: |
      def kept_labels(cls_ids, confs, names, conf_threshold):
          kept = []
          for cid, score in zip(cls_ids, confs):
              if score >= conf_threshold:
                  kept.append((names[cid], score))
          kept.sort(key=lambda pair: (-pair[1], pair[0]))
          return [name for name, score in kept]
    hints:
      - "First join indices and confidences with zip and drop detections below the threshold, as conf does."
      - "Map each remaining detection to a name through names and remember it together with its confidence."
      - "Sort by the key (minus confidence, name): minus gives descending confidence, and name breaks ties alphabetically."
