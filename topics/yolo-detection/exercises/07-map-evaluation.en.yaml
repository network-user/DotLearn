exercises:
  - id: map-precision-recall-001
    concept: map-evaluation
    type: theory-quiz
    difficulty: 1
    prompt: "What does detector recall measure?"
    choices:
      - id: a
        text: "Fraction of objects found: TP / (TP + FN)."
      - id: b
        text: "Fraction of correct predictions: TP / (TP + FP)."
      - id: c
        text: "Mean box area."
      - id: d
        text: "IoU threshold for NMS."
    correct: [a]
    explanation: "Recall = TP / (TP + FN) - what fraction of real objects were found. It falls when the detector misses objects."
    variants:
      - prompt: "What does detector precision measure?"
        choices:
          - id: a
            text: "Fraction correct among all predictions: TP / (TP + FP)."
          - id: b
            text: "Fraction of objects found: TP / (TP + FN)."
          - id: c
            text: "Number of classes in the dataset."
          - id: d
            text: "Inference speed."
        correct: [a]
        explanation: "Precision = TP / (TP + FP) - what fraction of predictions are correct. It falls when the detector outputs extra false boxes."
      - prompt: "When is a predicted box counted as a true positive?"
        choices:
          - id: a
            text: "If its IoU with same-class ground truth is at least the threshold and that ground truth isn't taken yet."
          - id: b
            text: "If it has the highest confidence in the frame."
          - id: c
            text: "If it is larger than the ground-truth box."
          - id: d
            text: "If it landed in the central grid cell."
        correct: [a]
        explanation: "True positive - prediction with sufficient IoU to an untaken same-class ground truth. Otherwise it's false positive."

  - id: map-prec-rec-output-001
    concept: map-evaluation
    type: predict-output
    difficulty: 2
    prompt: "What will this precision and recall calculation print from TP, FP, FN (rounded to two decimals)?"
    snippet: |
      tp, fp, fn = 4, 1, 2
      precision = tp / (tp + fp)
      recall = tp / (tp + fn)
      print(round(precision, 2), round(recall, 2))
    expected:
      kind: stdout
      value: "0.8 0.67"
    hints:
      - "Precision is correct fraction among predictions; recall is found fraction among objects."
      - "Precision = TP / (TP + FP), recall = TP / (TP + FN); substitute the numbers."
    variants:
      - snippet: |
          tp, fp, fn = 6, 2, 2
          precision = tp / (tp + fp)
          recall = tp / (tp + fn)
          print(round(precision, 2), round(recall, 2))
        expected:
          kind: stdout
          value: "0.75 0.75"
      - snippet: |
          tp, fp, fn = 3, 3, 1
          precision = tp / (tp + fp)
          recall = tp / (tp + fn)
          print(round(precision, 2), round(recall, 2))
        expected:
          kind: stdout
          value: "0.5 0.75"

  - id: map-meaning-001
    concept: map-evaluation
    type: theory-quiz
    difficulty: 3
    prompt: "Which statements about AP and mAP are true? Select all that apply."
    choices:
      - id: a
        text: "AP is area under the PR curve for one class."
      - id: b
        text: "mAP is mean AP over classes."
      - id: c
        text: "mAP@[.5:.95] is always at least mAP@0.5."
      - id: d
        text: "COCO averages mAP over IoU thresholds from 0.5 to 0.95."
    correct: [a, b, d]
    explanation: "AP is area under a class PR curve, mAP is its mean over classes, COCO additionally averages over IoU thresholds 0.5..0.95. Statement c is reversed: stricter thresholds only lower the metric, so mAP@[.5:.95] is not greater than mAP@0.5."
    hints:
      - "Break down the words by level: AP is for one class, mAP averages over classes, COCO adds averaging over IoU thresholds."
      - "Think about inequality direction: stricter IoU threshold counts fewer boxes, so the metric doesn't grow."

  - id: map-average-precision-001
    concept: map-evaluation
    type: python-function
    difficulty: 4
    prompt: "Implement `average_precision(points)` computing area under the PR curve. `points` is a list of (recall, precision) pairs sorted by ascending recall. Area is sum of rectangles: on each recall increment (from the previous value, starting at 0) multiply width by precision."
    starter: |
      def average_precision(points):
          ...
    cases:
      - call: "average_precision([(0.5, 1.0), (1.0, 0.5)])"
        expect: 0.75
      - call: "average_precision([(1.0, 1.0)])"
        expect: 1.0
      - call: "average_precision([(0.5, 0.5), (1.0, 0.25)])"
        expect: 0.375
      - call: "average_precision([(0.25, 1.0), (0.5, 0.75), (1.0, 0.5)])"
        expect: 0.6875
    solution: |
      def average_precision(points):
          ap = 0.0
          prev_recall = 0.0
          for recall, precision in points:
              ap += (recall - prev_recall) * precision
              prev_recall = recall
          return ap
    hints:
      - "AP is area under precision(recall); split the recall axis into segments and sum rectangle areas."
      - "Segment width is recall increment relative to the previous point (for the first, relative to zero)."
      - "Rectangle height is precision at that point; accumulate sum of width times height."
