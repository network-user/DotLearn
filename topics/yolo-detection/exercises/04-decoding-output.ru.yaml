exercises:
  - id: decode-sigmoid-role-001
    concept: decoding-output
    type: theory-quiz
    difficulty: 1
    prompt: "Зачем смещение центра tx пропускают через сигмоиду в формуле bx = cell_x + sigmoid(tx)?"
    choices:
      - id: a
        text: "Чтобы центр гарантированно остался внутри своей ячейки (сдвиг в (0, 1))."
      - id: b
        text: "Чтобы ускорить вычисление центра."
      - id: c
        text: "Чтобы центр мог уйти в любую соседнюю ячейку."
      - id: d
        text: "Чтобы превратить координату в вероятность класса."
    correct: [a]
    explanation: "Сигмоида сжимает tx в (0, 1), поэтому сумма cell_x + sigmoid(tx) не выходит за пределы ответственной ячейки."
    variants:
      - prompt: "Почему размер декодируют через bw = anchor_w * exp(tw), а не anchor_w + tw?"
        choices:
          - id: a
            text: "Экспонента всегда положительна и масштабирует якорь, не давая отрицательной ширины."
          - id: b
            text: "Сложение работает быстрее умножения."
          - id: c
            text: "Экспонента превращает размер в вероятность."
          - id: d
            text: "Чтобы размер не зависел от якоря."
        correct: [a]
        explanation: "exp(tw) положительна при любом tw и масштабирует якорь мультипликативно: tw = 0 даёт множитель 1, размер не уходит в минус."
      - prompt: "Из чего складывается итоговая уверенность детектора по классу?"
        choices:
          - id: a
            text: "Из логита objectness напрямую."
          - id: b
            text: "Из произведения p_obj * p_class двух вероятностей."
          - id: c
            text: "Из суммы p_obj + p_class."
          - id: d
            text: "Только из вероятности класса p_class."
        correct: [b]
        explanation: "Уверенность - произведение вероятности объекта на вероятность класса, поэтому она не больше любого из множителей."

  - id: decode-confidence-output-001
    concept: decoding-output
    type: predict-output
    difficulty: 2
    prompt: "Что выведет вычисление лучшего класса и итоговой уверенности?"
    snippet: |
      objectness = 0.8
      class_probs = [0.1, 0.7, 0.2]
      best_class = class_probs.index(max(class_probs))
      confidence = objectness * max(class_probs)
      print(best_class, round(confidence, 2))
    expected:
      kind: stdout
      value: "1 0.56"
    hints:
      - "Лучший класс - индекс наибольшей вероятности; уверенность - произведение objectness на эту вероятность."
      - "Найдите max(class_probs), его индекс, и умножьте objectness на этот максимум."
    variants:
      - snippet: |
          objectness = 0.9
          class_probs = [0.2, 0.1, 0.6]
          best_class = class_probs.index(max(class_probs))
          confidence = objectness * max(class_probs)
          print(best_class, round(confidence, 2))
        expected:
          kind: stdout
          value: "2 0.54"
      - snippet: |
          objectness = 0.5
          class_probs = [0.8, 0.1, 0.1]
          best_class = class_probs.index(max(class_probs))
          confidence = objectness * max(class_probs)
          print(best_class, round(confidence, 2))
        expected:
          kind: stdout
          value: "0 0.4"

  - id: decode-size-001
    concept: decoding-output
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `decode_size(t, anchor)`, возвращающую размер рамки по формуле `anchor * exp(t)`. Используйте `math.exp`."
    starter: |
      import math

      def decode_size(t, anchor):
          ...
    cases:
      - call: "decode_size(0, 4)"
        expect: 4.0
      - call: "decode_size(1, 2)"
        expect_approx: 5.4365637
      - call: "decode_size(-1, 6)"
        expect_approx: 2.2072766
    solution: |
      import math

      def decode_size(t, anchor):
          return anchor * math.exp(t)
    hints:
      - "Поправка размера мультипликативна: она масштабирует якорь, а не прибавляется к нему."
      - "При t = 0 экспонента равна 1, поэтому размер совпадает с якорем; умножьте якорь на exp(t)."

  - id: decode-center-001
    concept: decoding-output
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `decode_center(t, cell_index)` по формуле `cell_index + sigmoid(t)`, где `sigmoid(t) = 1 / (1 + exp(-t))`. Верните координату центра в единицах сетки."
    starter: |
      import math

      def decode_center(t, cell_index):
          ...
    cases:
      - call: "decode_center(0, 2)"
        expect: 2.5
      - call: "decode_center(2, 0)"
        expect_approx: 0.8807971
      - call: "decode_center(-1, 3)"
        expect_approx: 3.2689414
    solution: |
      import math

      def decode_center(t, cell_index):
          sigmoid = 1 / (1 + math.exp(-t))
          return cell_index + sigmoid
    hints:
      - "Центр - это индекс ячейки плюс смещение внутри неё; смещение должно лежать в (0, 1)."
      - "Сожмите t сигмоидой 1 / (1 + exp(-t)), затем прибавьте индекс ячейки."
      - "При t = 0 сигмоида равна 0.5, поэтому центр садится в середину ячейки."

  - id: decode-box-001
    concept: decoding-output
    type: python-function
    difficulty: 4
    prompt: "Реализуйте `decode_box(tx, ty, tw, th, gx, gy, aw, ah)`. Верните список `[bx, by, bw, bh]`, где bx = gx + sigmoid(tx), by = gy + sigmoid(ty), bw = aw * exp(tw), bh = ah * exp(th). sigmoid(t) = 1 / (1 + exp(-t))."
    starter: |
      import math

      def decode_box(tx, ty, tw, th, gx, gy, aw, ah):
          ...
    cases:
      - call: "decode_box(0, 0, 0, 0, 2, 3, 4, 2)"
        expect: [2.5, 3.5, 4.0, 2.0]
      - call: "decode_box(0, 0, 0, 0, 0, 0, 1, 1)"
        expect: [0.5, 0.5, 1.0, 1.0]
      - call: "decode_box(0, 0, 0, 0, 5, 1, 2, 6)"
        expect: [5.5, 1.5, 2.0, 6.0]
    solution: |
      import math

      def decode_box(tx, ty, tw, th, gx, gy, aw, ah):
          def sigmoid(t):
              return 1 / (1 + math.exp(-t))
          bx = gx + sigmoid(tx)
          by = gy + sigmoid(ty)
          bw = aw * math.exp(tw)
          bh = ah * math.exp(th)
          return [bx, by, bw, bh]
    hints:
      - "Центр и размер декодируются по-разному: центр - сложение с индексом ячейки, размер - умножение на якорь."
      - "Для центра запирайте смещение сигмоидой в (0, 1); для размера масштабируйте якорь экспонентой."
      - "При нулевых поправках sigmoid даёт 0.5, а exp даёт 1: центр в середине ячейки, размер равен якорю."
