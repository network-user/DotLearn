exercises:
  - id: detection-task-001
    concept: detection-vs-classification
    type: theory-quiz
    difficulty: 1
    prompt: "How does an object detector's output differ from an image classifier's output?"
    choices:
      - id: a
        text: "The detector returns one class label for the whole image."
      - id: b
        text: "For each found object the detector returns a box, class, and confidence."
      - id: c
        text: "The detector returns a pixel mask of the object's shape."
      - id: d
        text: "The detector returns only center coordinates, without class."
    correct: [b]
    explanation: "Detection = localization + classification: for each instance one bounding box plus class label plus confidence. A mask is segmentation, a separate task."
    variants:
      - prompt: "What two subtasks does object detection break into?"
        choices:
          - id: a
            text: "Only classification: name classes present in the frame."
          - id: b
            text: "Localization and classification at once."
          - id: c
            text: "Only localization: outline objects without naming them."
          - id: d
            text: "Image compression and text recognition on it."
        correct: [b]
        explanation: "Detection solves two subtasks at once: localization with a box and classification with a label for each object."
      - prompt: "How many results will a detector return for a frame with two dogs and one cat?"
        choices:
          - id: a
            text: "One - label 'animals'."
          - id: b
            text: "Two - one per class (dog, cat)."
          - id: c
            text: "Three - one box with class per instance."
          - id: d
            text: "Zero - detectors don't distinguish instances."
        correct: [c]
        explanation: "A detector returns a box per instance, not per class: two dogs give two separate boxes."

  - id: detection-bbox-format-001
    concept: detection-vs-classification
    type: theory-quiz
    difficulty: 2
    prompt: "What do the four numbers (cx, cy, w, h) of a bounding box describe?"
    choices:
      - id: a
        text: "Box center coordinates and its width and height."
      - id: b
        text: "Top-left and bottom-right corner coordinates."
      - id: c
        text: "Object contour as four points."
      - id: d
        text: "Confidence over four classes."
    correct: [a]
    explanation: "(cx, cy, w, h) is center-size format: center plus dimensions. Corner-corner format (x1, y1, x2, y2) gives two opposite corners."

  - id: detection-window-count-001
    concept: detection-vs-classification
    type: predict-output
    difficulty: 2
    prompt: "What will this sliding-window run count estimate print?"
    snippet: |
      positions_x = 40
      positions_y = 30
      scales = 5
      print(positions_x * positions_y * scales)
    expected:
      kind: stdout
      value: "6000"
    hints:
      - "Sliding-window cost is number of window positions times number of scales checked."
      - "Multiply all three factors: positions on X, positions on Y, and scales."
    variants:
      - snippet: |
          positions_x = 20
          positions_y = 20
          scales = 4
          print(positions_x * positions_y * scales)
        expected:
          kind: stdout
          value: "1600"
      - snippet: |
          positions_x = 50
          positions_y = 50
          scales = 6
          print(positions_x * positions_y * scales)
        expected:
          kind: stdout
          value: "15000"

  - id: detection-xywh-to-xyxy-001
    concept: detection-vs-classification
    type: python-function
    difficulty: 3
    prompt: "Implement `xywh_to_xyxy(cx, cy, w, h)` converting center-size format to corner-corner. Return list `[x1, y1, x2, y2]` where x1 = cx - w/2, y1 = cy - h/2, x2 = cx + w/2, y2 = cy + h/2."
    starter: |
      def xywh_to_xyxy(cx, cy, w, h):
          ...
    cases:
      - call: "xywh_to_xyxy(10, 10, 4, 6)"
        expect: [8.0, 7.0, 12.0, 13.0]
      - call: "xywh_to_xyxy(0, 0, 2, 2)"
        expect: [-1.0, -1.0, 1.0, 1.0]
      - call: "xywh_to_xyxy(5, 8, 10, 4)"
        expect: [0.0, 6.0, 10.0, 10.0]
    solution: |
      def xywh_to_xyxy(cx, cy, w, h):
          half_w = w / 2
          half_h = h / 2
          return [cx - half_w, cy - half_h, cx + half_w, cy + half_h]
    hints:
      - "Center and dimensions define the box; corners come from shifting the center by half width and half height."
      - "Top-left corner is center minus half dimensions; bottom-right is center plus half dimensions."
      - "Divide by 2 with `/` so the result is float, as in expected values."
