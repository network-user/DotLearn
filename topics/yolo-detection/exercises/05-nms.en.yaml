exercises:
  - id: nms-purpose-001
    concept: nms
    type: theory-quiz
    difficulty: 1
    prompt: "What problem does Non-Maximum Suppression solve?"
    choices:
      - id: a
        text: "From a group of overlapping boxes it keeps the most confident and suppresses the rest."
      - id: b
        text: "Decodes raw network corrections into box coordinates."
      - id: c
        text: "Computes detector quality metrics."
      - id: d
        text: "Assigns each object a responsible grid cell."
    correct: [a]
    explanation: "NMS removes duplicates: one object spawns many overlapping boxes, and NMS keeps one per object - the maximum by confidence."
    variants:
      - prompt: "In what order does NMS process candidate boxes?"
        choices:
          - id: a
            text: "By descending confidence - most confident first."
          - id: b
            text: "By ascending area."
          - id: c
            text: "In random order."
          - id: d
            text: "By ascending x coordinate of center."
        correct: [a]
        explanation: "The algorithm is greedy: on each step the box with highest remaining confidence is taken."
      - prompt: "Relative to what are boxes suppressed on each NMS step?"
        choices:
          - id: a
            text: "Relative to the current winner - the box with highest confidence on this step."
          - id: b
            text: "Relative to all other boxes at once, over all pairs."
          - id: c
            text: "Relative to ground-truth annotations."
          - id: d
            text: "Relative to the image center."
        correct: [a]
        explanation: "Candidates with IoU above threshold relative to the current winner are suppressed, not all overlapping pairs globally."

  - id: nms-threshold-effect-001
    concept: nms
    type: theory-quiz
    difficulty: 2
    prompt: "What happens with too low an IoU threshold in NMS?"
    choices:
      - id: a
        text: "Closely spaced different objects merge and some disappear from output."
      - id: b
        text: "Too many duplicates of one object remain."
      - id: c
        text: "Box confidences increase."
      - id: d
        text: "Box coordinates convert to pixels."
    correct: [a]
    explanation: "A low threshold suppresses even lightly overlapping boxes, so densely spaced different objects are wrongly treated as duplicates and lost."

  - id: nms-iou-decision-001
    concept: nms
    type: predict-output
    difficulty: 2
    prompt: "What will this IoU computation print (rounded to three decimals)?"
    snippet: |
      def iou(a, b):
          ax1, ay1, ax2, ay2 = a
          bx1, by1, bx2, by2 = b
          iw = max(0, min(ax2, bx2) - max(ax1, bx1))
          ih = max(0, min(ay2, by2) - max(ay1, by1))
          inter = iw * ih
          union = (ax2 - ax1) * (ay2 - ay1) + (bx2 - bx1) * (by2 - by1) - inter
          return inter / union if union > 0 else 0.0

      print(round(iou((0, 0, 4, 4), (1, 1, 5, 5)), 3))
    expected:
      kind: stdout
      value: "0.391"
    hints:
      - "Two 4x4 boxes shifted diagonally by 1; find overlap area, then union."
      - "Intersection 3x3 = 9, areas 16 each, union 16 + 16 - 9; divide one by the other."
    variants:
      - snippet: |
          def iou(a, b):
              ax1, ay1, ax2, ay2 = a
              bx1, by1, bx2, by2 = b
              iw = max(0, min(ax2, bx2) - max(ax1, bx1))
              ih = max(0, min(ay2, by2) - max(ay1, by1))
              inter = iw * ih
              union = (ax2 - ax1) * (ay2 - ay1) + (bx2 - bx1) * (by2 - by1) - inter
              return inter / union if union > 0 else 0.0

          print(round(iou((0, 0, 4, 4), (2, 2, 6, 6)), 3))
        expected:
          kind: stdout
          value: "0.143"
      - snippet: |
