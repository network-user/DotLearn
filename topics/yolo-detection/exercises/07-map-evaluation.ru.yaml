exercises:
  - id: map-precision-recall-001
    concept: map-evaluation
    type: theory-quiz
    difficulty: 1
    prompt: "Что измеряет recall детектора?"
    choices:
      - id: a
        text: "Долю найденных объектов: TP / (TP + FN)."
      - id: b
        text: "Долю верных предсказаний: TP / (TP + FP)."
      - id: c
        text: "Среднюю площадь рамок."
      - id: d
        text: "Порог IoU для NMS."
    correct: [a]
    explanation: "Recall = TP / (TP + FN) - какая доля реальных объектов найдена. Он падает, когда детектор пропускает объекты."
    variants:
      - prompt: "Что измеряет precision детектора?"
        choices:
          - id: a
            text: "Долю верных среди всех предсказаний: TP / (TP + FP)."
          - id: b
            text: "Долю найденных объектов: TP / (TP + FN)."
          - id: c
            text: "Число классов в датасете."
          - id: d
            text: "Скорость инференса."
        correct: [a]
        explanation: "Precision = TP / (TP + FP) - какая доля предсказаний верна. Он падает, когда детектор выдаёт лишние ложные рамки."
      - prompt: "Когда предсказанная рамка считается верным срабатыванием (true positive)?"
        choices:
          - id: a
            text: "Если её IoU с эталоном того же класса не ниже порога и эталон ещё не занят."
          - id: b
            text: "Если у неё наибольшая уверенность в кадре."
          - id: c
            text: "Если она крупнее эталонной рамки."
          - id: d
            text: "Если она попала в центральную ячейку сетки."
        correct: [a]
        explanation: "True positive - предсказание с достаточным IoU к ещё не занятому эталону того же класса. Иначе это false positive."

  - id: map-prec-rec-output-001
    concept: map-evaluation
    type: predict-output
    difficulty: 2
    prompt: "Что выведет расчёт precision и recall по числам TP, FP, FN (округление до двух знаков)?"
    snippet: |
      tp, fp, fn = 4, 1, 2
      precision = tp / (tp + fp)
      recall = tp / (tp + fn)
      print(round(precision, 2), round(recall, 2))
    expected:
      kind: stdout
      value: "0.8 0.67"
    hints:
      - "Precision - доля верных среди предсказаний; recall - доля найденных среди объектов."
      - "Precision = TP / (TP + FP), recall = TP / (TP + FN); подставьте числа."
    variants:
      - snippet: |
          tp, fp, fn = 6, 2, 2
          precision = tp / (tp + fp)
          recall = tp / (tp + fn)
          print(round(precision, 2), round(recall, 2))
        expected:
          kind: stdout
          value: "0.75 0.75"
      - snippet: |
          tp, fp, fn = 3, 3, 1
          precision = tp / (tp + fp)
          recall = tp / (tp + fn)
          print(round(precision, 2), round(recall, 2))
        expected:
          kind: stdout
          value: "0.5 0.75"

  - id: map-meaning-001
    concept: map-evaluation
    type: theory-quiz
    difficulty: 3
    prompt: "Какие утверждения о AP и mAP верны? Выберите все подходящие."
    choices:
      - id: a
        text: "AP - это площадь под PR-кривой для одного класса."
      - id: b
        text: "mAP - среднее AP по классам."
      - id: c
        text: "mAP@[.5:.95] всегда не меньше mAP@0.5."
      - id: d
        text: "COCO усредняет mAP по порогам IoU от 0.5 до 0.95."
    correct: [a, b, d]
    explanation: "AP - площадь под PR-кривой класса, mAP - её среднее по классам, COCO дополнительно усредняет по порогам IoU 0.5..0.95. Утверждение c перевёрнуто: строгие пороги только снижают метрику, поэтому mAP@[.5:.95] не больше mAP@0.5."
    hints:
      - "Разберите слова по уровням: AP - про один класс, mAP - усреднение по классам, COCO добавляет усреднение по порогам IoU."
      - "Подумайте про направление неравенства: более строгий порог IoU засчитывает меньше рамок, значит метрика не растёт."

  - id: map-average-precision-001
    concept: map-evaluation
    type: python-function
    difficulty: 4
    prompt: "Реализуйте `average_precision(points)`, вычисляющую площадь под PR-кривой. `points` - список пар (recall, precision), отсортированный по возрастанию recall. Площадь - сумма прямоугольников: на каждом приросте recall (от предыдущего значения, начиная с 0) умножьте ширину на precision."
    starter: |
      def average_precision(points):
          ...
    cases:
      - call: "average_precision([(0.5, 1.0), (1.0, 0.5)])"
        expect: 0.75
      - call: "average_precision([(1.0, 1.0)])"
        expect: 1.0
      - call: "average_precision([(0.5, 0.5), (1.0, 0.25)])"
        expect: 0.375
      - call: "average_precision([(0.25, 1.0), (0.5, 0.75), (1.0, 0.5)])"
        expect: 0.6875
    solution: |
      def average_precision(points):
          ap = 0.0
          prev_recall = 0.0
          for recall, precision in points:
              ap += (recall - prev_recall) * precision
              prev_recall = recall
          return ap
    hints:
      - "AP - площадь под кривой precision(recall); разбейте ось recall на участки и сложите площади прямоугольников."
      - "Ширина участка - это прирост recall относительно предыдущей точки (для первой - относительно нуля)."
      - "Высота прямоугольника - precision в этой точке; накапливайте сумму ширина на высоту."
