exercises:
  - id: loss-components-001
    concept: loss-training
    type: theory-quiz
    difficulty: 1
    prompt: "What three components make up YOLO detection loss?"
    choices:
      - id: a
        text: "Box localization, objectness."
      - id: b
        text: "Only classification over all cells."
      - id: c
        text: "Speed, accuracy, and memory."
      - id: d
        text: "IoU, NMS, and mAP."
    correct: [a]
    explanation: "Loss is a weighted sum of three errors: box coordinates, object presence (objectness), and class."
    variants:
      - prompt: "What is a positive slot during detector training?"
        choices:
          - id: a
            text: "A 'cell plus anchor' slot assigned to answer for a real object."
          - id: b
            text: "A slot confidently without an object (background)"
          - id: c
            text: "A slot whose predicted box has the largest absolute coordinates."
          - id: d
            text: "A slot chosen at random on every training step of the batch."
        correct: [a]
        explanation: "A positive slot is one whose anchor best matched the object's shape among anchors in the cell containing the object's center."
      - prompt: "What is the objectness target for a negative slot?"
        choices:
          - id: a
            text: "1 - there is definitely an object here."
          - id: b
            text: "0 - this is background."
          - id: c
            text: "A random number."
          - id: d
            text: "Equal to IoU with the nearest object."
        correct: [b]
        explanation: "No object is assigned to a negative slot, so its objectness target is zero - background."

  - id: loss-weighted-sum-001
    concept: loss-training
    type: predict-output
    difficulty: 2
    prompt: "What will this weighted detector loss computation print?"
    snippet: |
      box_loss = 2.0
      obj_loss = 1.0
      cls_loss = 0.5
      lambda_box, lambda_obj, lambda_cls = 5.0, 1.0, 1.0
      total = lambda_box * box_loss + lambda_obj * obj_loss + lambda_cls * cls_loss
      print(total)
    expected:
      kind: stdout
      value: "11.5"
    hints:
      - "Total loss is a weighted sum of three terms, each multiplied by its weight."
      - "Multiply each error by its lambda and add the three products."
    variants:
      - snippet: |
          box_loss = 1.0
          obj_loss = 2.0
          cls_loss = 1.0
          lambda_box, lambda_obj, lambda_cls = 5.0, 1.0, 1.0
          total = lambda_box * box_loss + lambda_obj * obj_loss + lambda_cls * cls_loss
          print(total)
        expected:
          kind: stdout
          value: "8.0"
      - snippet: |
          box_loss = 0.5
          obj_loss = 0.5
          cls_loss = 2.0
          lambda_box, lambda_obj, lambda_cls = 5.0, 1.0, 1.0
          total = lambda_box * box_loss + lambda_obj * obj_loss + lambda_cls * cls_loss
          print(total)
        expected:
          kind: stdout
          value: "5.0"

  - id: loss-component-scope-001
    concept: loss-training
    type: theory-quiz
    difficulty: 3
    prompt: "Which statements about where each loss component is computed are true? Select all that apply."
    choices:
      - id: a
        text: "Objectness loss is computed on all slots, including background."
      - id: b
        text: "Localization loss is computed only on positive slots."
      - id: c
        text: "Classification loss is computed on background too."
      - id: d
        text: "Localization loss is computed on every slot regardless of object presence."
    correct: [a, b]
    explanation: "Objectness is needed on all slots (target 0 for background, ~1 for objects). Localization and classification are only on positive slots: background has no ground-truth box and nothing to classify, so c and d are wrong."
    hints:
      - "Ask for each component: what does background have and lack? Background has no ground-truth box or class."
      - "Objectness is needed everywhere - to distinguish object from background. Coordinates and class matter only where an object is assigned."

  - id: loss-pos-neg-count-001
    concept: loss-training
    type: predict-output
    difficulty: 3
    prompt: "What will this positive and negative slot count print from objectness targets (1 = object, 0 = background)?"
    snippet: |
      targets = [0, 0, 1, 0, 0, 1, 0]
      positives = sum(1 for t in targets if t == 1)
      negatives = sum(1 for t in targets if t == 0)
      print(positives, negatives)
    expected:
      kind: stdout
      value: "2 5"
    hints:
      - "Positive slots have objectness target 1; negative ones have 0."
      - "Count ones and zeros in the target list separately."
    variants:
      - snippet: |
          targets = [1, 0, 0, 1, 1, 0]
          positives = sum(1 for t in targets if t == 1)
          negatives = sum(1 for t in targets if t == 0)
          print(positives, negatives)
        expected:
          kind: stdout
          value: "3 3"
      - snippet: |
          targets = [0, 0, 0, 0, 1]
          positives = sum(1 for t in targets if t == 1)
          negatives = sum(1 for t in targets if t == 0)
          print(positives, negatives)
        expected:
          kind: stdout
          value: "1 4"
