exercises:
  - id: ultra-predict-args-001
    concept: ultralytics-practice
    type: theory-quiz
    difficulty: 1
    prompt: "Что задаёт параметр conf в вызове model.predict(source, conf=0.25)?"
    choices:
      - id: a
        text: "Минимальный порог уверенности: предсказания ниже него отбрасываются."
      - id: b
        text: "Сторону, к которой масштабируется изображение перед инференсом."
      - id: c
        text: "Число эпох обучения."
      - id: d
        text: "Путь к файлу весов."
    correct: [a]
    explanation: "conf - порог уверенности: рамки со score ниже него не попадают в выдачу predict."
    variants:
      - prompt: "Что задаёт параметр imgsz в вызове model.predict(source, imgsz=640)?"
        choices:
          - id: a
            text: "Сторону, к которой изображение приводится letterbox-масштабированием перед сетью."
          - id: b
            text: "Порог уверенности для отбрасывания рамок."
          - id: c
            text: "Число классов в датасете."
          - id: d
            text: "Размер батча при инференсе."
        correct: [a]
        explanation: "imgsz задаёт входную сторону: изображение приводится к этому размеру letterbox перед прогоном через сеть."
      - prompt: "Что содержит boxes.xyxy у объекта Results?"
        choices:
          - id: a
            text: "Координаты рамок как (x1, y1, x2, y2): левый-верхний и правый-нижний углы в пикселях."
          - id: b
            text: "Только уверенности предсказаний."
          - id: c
            text: "Индексы классов."
          - id: d
            text: "Имена классов строками."
        correct: [a]
        explanation: "xyxy хранит углы рамки в пикселях исходного изображения; уверенности лежат в conf, индексы классов в cls."
      - prompt: "Что загружает вызов YOLO('yolov8n.pt')?"
        choices:
          - id: a
            text: "Предобученные веса самой лёгкой модели YOLOv8 (nano), обученной на COCO."
          - id: b
            text: "Файл датасета с путями и классами."
          - id: c
            text: "Конфигурацию аугментаций."
          - id: d
            text: "Скрипт экспорта в ONNX."
        correct: [a]
        explanation: "yolov8n.pt - предобученные веса nano-модели на 80 классов COCO; файл скачивается при первом вызове."

  - id: ultra-read-results-001
    concept: ultralytics-practice
    type: predict-output
    difficulty: 2
    prompt: "Что выведет чтение имён детекций с уверенностью не ниже порога?"
    snippet: |
      names = {0: "person", 2: "car", 5: "bus"}
      cls = [0, 2, 2, 5, 0]
      conf = [0.90, 0.61, 0.42, 0.88, 0.33]
      labels = [names[c] for c, s in zip(cls, conf) if s >= 0.5]
      print(labels)
    expected:
      kind: stdout
      value: "['person', 'car', 'bus']"
    hints:
      - "Пройдите по парам класс-уверенность и оставьте только те, где уверенность не ниже 0.5."
      - "Каждый оставшийся индекс переведите через names; порядок сохраняется как во входных списках."
    variants:
      - snippet: |
          names = {1: "bike", 3: "dog", 4: "cat"}
          cls = [3, 1, 3, 4]
          conf = [0.75, 0.40, 0.55, 0.20]
          labels = [names[c] for c, s in zip(cls, conf) if s >= 0.5]
          print(labels)
        expected:
          kind: stdout
          value: "['dog', 'dog']"
      - snippet: |
          names = {0: "person", 7: "truck"}
          cls = [7, 0, 7, 0]
          conf = [0.95, 0.66, 0.80, 0.40]
          labels = [names[c] for c, s in zip(cls, conf) if s >= 0.7]
          print(labels)
        expected:
          kind: stdout
          value: "['truck', 'truck']"

  - id: ultra-train-call-001
    concept: ultralytics-practice
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните дообучение: загрузите nano-веса и запустите train с датасетом, числом эпох и размером изображения."
    template: |
      from ultralytics import YOLO

      model = YOLO("{{weights}}")
      model.train(data="{{data}}", epochs={{epochs}}, imgsz={{imgsz}})
    blanks:
      weights:
        accept: ["yolov8n.pt"]
      data:
        accept_regex: '^[\w./-]+\.yaml$'
      epochs:
        accept_regex: '^[1-9][0-9]*$'
      imgsz:
        accept: ["640", "320", "416", "512", "1280"]
    hints:
      - "Стартовые веса и файл датасета - это строки в кавычках; epochs и imgsz - целые числа."
      - "Файл описания датасета имеет расширение .yaml, а стандартная сторона входа - 640."
    variants:
      - prompt: "Заполните инференс: метод предсказания и порог уверенности."
        template: |
          from ultralytics import YOLO

          model = YOLO("yolov8n.pt")
          results = model.{{method}}("bus.jpg", conf={{conf}})
        blanks:
          method:
            accept: ["predict"]
          conf:
            accept_regex: '^0?\.[0-9]+$'
      - prompt: "Заполните оценку и экспорт: метод подсчёта метрик и формат экспорта."
        template: |
          from ultralytics import YOLO

          model = YOLO("runs/detect/train/weights/best.pt")
          metrics = model.{{valmethod}}()
          model.export(format="{{fmt}}")
        blanks:
          valmethod:
            accept: ["val"]
          fmt:
            accept: ["onnx"]

  - id: ultra-workflow-meaning-001
    concept: ultralytics-practice
    type: theory-quiz
    difficulty: 3
    prompt: "Какие утверждения о дообучении, оценке и экспорте в ultralytics верны? Выберите все подходящие."
    choices:
      - id: a
        text: "model.train(data='data.yaml', epochs=100, imgsz=640) дообучает модель от текущих весов."
      - id: b
        text: "data.yaml описывает пути к train/val и имена классов."
      - id: c
        text: "model.val() считает метрики, включая mAP, на валидационном наборе."
      - id: d
        text: "Экспорт в ONNX нужен, чтобы ускорить обучение модели."
    correct: [a, b, c]
    explanation: "train дообучает от загруженных весов (transfer learning), data.yaml задаёт пути и names, val считает mAP из концепта 07. Экспорт в ONNX служит инференсу и деплою, а не обучению, поэтому d неверно."
    hints:
      - "Разложите цикл по методам: train меняет веса, val измеряет качество, export готовит модель к деплою."
      - "Подумайте, на каком этапе живёт ONNX: он про запуск готовой модели, а не про её тренировку."

  - id: ultra-kept-labels-001
    concept: ultralytics-practice
    type: python-function
    difficulty: 4
    prompt: "Реализуйте kept_labels(cls_ids, confs, names, conf_threshold). Список cls_ids содержит индексы классов (как boxes.cls после int), confs содержит параллельные уверенности, names переводит индекс в имя. Верните список имён детекций с уверенностью не ниже conf_threshold, отсортированный по убыванию уверенности, а при равной уверенности по имени класса по алфавиту."
    starter: |
      def kept_labels(cls_ids, confs, names, conf_threshold):
          ...
    cases:
      - call: 'kept_labels([0, 2, 2, 5, 0], [0.9, 0.8, 0.3, 0.7, 0.95], {0: "person", 2: "car", 5: "bus"}, 0.5)'
        expect: ["person", "person", "car", "bus"]
      - call: 'kept_labels([0, 2, 5], [0.2, 0.1, 0.15], {0: "person", 2: "car", 5: "bus"}, 0.5)'
        expect: []
      - call: 'kept_labels([5, 0, 2], [0.5, 0.5, 0.5], {0: "person", 2: "car", 5: "bus"}, 0.5)'
        expect: ["bus", "car", "person"]
      - call: 'kept_labels([5, 5, 0], [0.6, 0.95, 0.4], {0: "person", 5: "bus"}, 0.5)'
        expect: ["bus", "bus"]
    solution: |
      def kept_labels(cls_ids, confs, names, conf_threshold):
          kept = []
          for cid, score in zip(cls_ids, confs):
              if score >= conf_threshold:
                  kept.append((names[cid], score))
          kept.sort(key=lambda pair: (-pair[1], pair[0]))
          return [name for name, score in kept]
    hints:
      - "Сначала соедините индексы и уверенности через zip и отбросьте детекции ниже порога, как это делает conf."
      - "Каждую оставшуюся детекцию переведите в имя через names и запомните вместе с её уверенностью."
      - "Сортируйте по ключу (минус уверенность, имя): минус даёт убывание уверенности, а имя разрывает равенство по алфавиту."
