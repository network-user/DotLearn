exercises:
  - id: detection-task-001
    concept: detection-vs-classification
    type: theory-quiz
    difficulty: 1
    prompt: "Чем выход детектора объектов отличается от выхода классификатора изображений?"
    choices:
      - id: a
        text: "Детектор возвращает одну метку класса на всё изображение."
      - id: b
        text: "Детектор на каждый найденный объект возвращает рамку, класс и уверенность."
      - id: c
        text: "Детектор возвращает пиксельную маску формы объекта."
      - id: d
        text: "Детектор возвращает только координаты центра, без класса."
    correct: [b]
    explanation: "Детекция = локализация + классификация: для каждого экземпляра одна ограничивающая рамка плюс метка класса плюс уверенность. Маска - это сегментация, отдельная задача."
    variants:
      - prompt: "Из чего складывается задача детекции объектов?"
        choices:
          - id: a
            text: "Только из классификации: назвать классы, присутствующие в кадре."
          - id: b
            text: "Из локализации (где объект) и классификации (какой это класс) одновременно."
          - id: c
            text: "Только из локализации: обвести объекты, не называя их."
          - id: d
            text: "Из сжатия изображения и распознавания текста на нём."
        correct: [b]
        explanation: "Детекция решает две подзадачи сразу: локализацию рамкой и классификацию метки для каждого объекта."
      - prompt: "Сколько результатов вернёт детектор для кадра, где две собаки и одна кошка?"
        choices:
          - id: a
            text: "Один - метку «животные»."
          - id: b
            text: "Два - по числу классов (собака, кошка)."
          - id: c
            text: "Три - по одной рамке с классом на каждый экземпляр."
          - id: d
            text: "Ноль - детектор не различает экземпляры."
        correct: [c]
        explanation: "Детектор возвращает рамку на каждый экземпляр, а не на каждый класс: две собаки дают две отдельные рамки."

  - id: detection-bbox-format-001
    concept: detection-vs-classification
    type: theory-quiz
    difficulty: 2
    prompt: "Что описывают четыре числа (cx, cy, w, h) ограничивающей рамки?"
    choices:
      - id: a
        text: "Координаты центра рамки и её ширину с высотой."
      - id: b
        text: "Координаты левого верхнего и правого нижнего углов."
      - id: c
        text: "Контур объекта в виде четырёх точек."
      - id: d
        text: "Уверенность по четырём классам."
    correct: [a]
    explanation: "(cx, cy, w, h) - формат «центр-размер»: центр плюс размеры. Формат «угол-угол» (x1, y1, x2, y2) задаёт два противоположных угла."

  - id: detection-window-count-001
    concept: detection-vs-classification
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта оценка числа запусков скользящего окна?"
    snippet: |
      positions_x = 40
      positions_y = 30
      scales = 5
      print(positions_x * positions_y * scales)
    expected:
      kind: stdout
      value: "6000"
    hints:
      - "Стоимость скользящего окна - это число положений окна, умноженное на число проверяемых масштабов."
      - "Перемножьте все три множителя: положения по X, положения по Y и масштабы."
    variants:
      - snippet: |
          positions_x = 20
          positions_y = 20
          scales = 4
          print(positions_x * positions_y * scales)
        expected:
          kind: stdout
          value: "1600"
      - snippet: |
          positions_x = 50
          positions_y = 50
          scales = 6
          print(positions_x * positions_y * scales)
        expected:
          kind: stdout
          value: "15000"

  - id: detection-xywh-to-xyxy-001
    concept: detection-vs-classification
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `xywh_to_xyxy(cx, cy, w, h)`, переводящую формат «центр-размер» в «угол-угол». Верните список `[x1, y1, x2, y2]`, где x1 = cx - w/2, y1 = cy - h/2, x2 = cx + w/2, y2 = cy + h/2."
    starter: |
      def xywh_to_xyxy(cx, cy, w, h):
          ...
    cases:
      - call: "xywh_to_xyxy(10, 10, 4, 6)"
        expect: [8.0, 7.0, 12.0, 13.0]
      - call: "xywh_to_xyxy(0, 0, 2, 2)"
        expect: [-1.0, -1.0, 1.0, 1.0]
      - call: "xywh_to_xyxy(5, 8, 10, 4)"
        expect: [0.0, 6.0, 10.0, 10.0]
    solution: |
      def xywh_to_xyxy(cx, cy, w, h):
          half_w = w / 2
          half_h = h / 2
          return [cx - half_w, cy - half_h, cx + half_w, cy + half_h]
    hints:
      - "Центр и размеры задают рамку; углы получаются сдвигом от центра на половину ширины и половину высоты."
      - "Левый верхний угол - центр минус половина размеров; правый нижний - центр плюс половина размеров."
      - "Делите на 2 через `/`, чтобы результат был дробным (float), как в ожидаемых значениях."
