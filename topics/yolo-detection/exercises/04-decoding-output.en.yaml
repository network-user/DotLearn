exercises:
  - id: decode-sigmoid-role-001
    concept: decoding-output
    type: theory-quiz
    difficulty: 1
    prompt: "Why is center offset tx passed through sigmoid in bx = cell_x + sigmoid(tx)?"
    choices:
      - id: a
        text: "So the center is guaranteed to stay inside its cell (shift in (0, 1))."
      - id: b
        text: "To speed up center computation."
      - id: c
        text: "So the center can move into any neighboring cell."
      - id: d
        text: "To turn the coordinate into a class probability."
    correct: [a]
    explanation: "Sigmoid squeezes tx into (0, 1), so cell_x + sigmoid(tx) doesn't leave the responsible cell's bounds."
    variants:
      - prompt: "Why is size decoded as bw = anchor_w * exp(tw), not anchor_w + tw?"
        choices:
          - id: a
            text: "Exponent is always positive and scales the anchor, preventing negative width."
          - id: b
            text: "Addition is faster than multiplication."
          - id: c
            text: "Exponent turns size into a probability."
          - id: d
            text: "So size doesn't depend on the anchor."
        correct: [a]
        explanation: "exp(tw) is positive for any tw and scales the anchor multiplicatively: tw = 0 gives multiplier 1, size never goes negative."
      - prompt: "What makes up final detector confidence for a class?"
        choices:
          - id: a
            text: "Objectness logit directly."
          - id: b
            text: "Product p_obj * p_class of two probabilities."
          - id: c
            text: "Sum p_obj + p_class."
          - id: d
            text: "Only class probability p_class."
        correct: [b]
        explanation: "Confidence is object probability times class probability, so it isn't greater than either factor."

  - id: decode-confidence-output-001
    concept: decoding-output
    type: predict-output
    difficulty: 2
    prompt: "What will this best-class and final-confidence computation print?"
    snippet: |
      objectness = 0.8
      class_probs = [0.1, 0.7, 0.2]
      best_class = class_probs.index(max(class_probs))
      confidence = objectness * max(class_probs)
      print(best_class, round(confidence, 2))
    expected:
      kind: stdout
      value: "1 0.56"
    hints:
      - "Best class is index of highest probability; confidence is objectness times that maximum."
      - "Find max(class_probs), its index, and multiply objectness by that maximum."
    variants:
      - snippet: |
          objectness = 0.9
          class_probs = [0.2, 0.1, 0.6]
          best_class = class_probs.index(max(class_probs))
          confidence = objectness * max(class_probs)
          print(best_class, round(confidence, 2))
        expected:
          kind: stdout
          value: "2 0.54"
      - snippet: |
          objectness = 0.5
          class_probs = [0.8, 0.1, 0.1]
          best_class = class_probs.index(max(class_probs))
          confidence = objectness * max(class_probs)
          print(best_class, round(confidence, 2))
        expected:
          kind: stdout
          value: "0 0.4"

  - id: decode-size-001
    concept: decoding-output
    type: python-function
    difficulty: 2
    prompt: "Implement `decode_size(t, anchor)` returning box size by formula `anchor * exp(t)`. Use `math.exp`."
    starter: |
      import math

      def decode_size(t, anchor):
          ...
    cases:
      - call: "decode_size(0, 4)"
        expect: 4.0
      - call: "decode_size(1, 2)"
        expect_approx: 5.4365637
      - call: "decode_size(-1, 6)"
        expect_approx: 2.2072766
    solution: |
      import math

      def decode_size(t, anchor):
          return anchor * math.exp(t)
    hints:
      - "Size correction is multiplicative: it scales the anchor, it isn't added to it."
      - "At t = 0 exponent is 1, so size equals the anchor; multiply anchor by exp(t)."

  - id: decode-center-001
    concept: decoding-output
    type: python-function
    difficulty: 3
    prompt: "Implement `decode_center(t, cell_index)` by formula `cell_index + sigmoid(t)`, where `sigmoid(t) = 1 / (1 + exp(-t))`. Return center coordinate in grid units."
    starter: |
      import math

      def decode_center(t, cell_index):
          ...
    cases:
      - call: "decode_center(0, 2)"
        expect: 2.5
      - call: "decode_center(2, 0)"
        expect_approx: 0.8807971
      - call: "decode_center(-1, 3)"
        expect_approx: 3.2689414
    solution: |
      import math

      def decode_center(t, cell_index):
          sigmoid = 1 / (1 + math.exp(-t))
          return cell_index + sigmoid
    hints:
      - "Center is cell index plus offset inside it; offset must lie in (0, 1)."
      - "Squeeze t with sigmoid 1 / (1 + exp(-t)), then add cell index."
      - "At t = 0 sigmoid is 0.5, so center lands in the cell middle."

  - id: decode-box-001
    concept: decoding-output
    type: python-function
    difficulty: 4
    prompt: "Implement `decode_box(tx, ty, tw, th, gx, gy, aw, ah)`. Return list `[bx, by, bw, bh]` where bx = gx + sigmoid(tx), by = gy + sigmoid(ty), bw = aw * exp(tw), bh = ah * exp(th). sigmoid(t) = 1 / (1 + exp(-t))."
    starter: |
      import math

      def decode_box(tx, ty, tw, th, gx, gy, aw, ah):
          ...
    cases:
      - call: "decode_box(0, 0, 0, 0, 2, 3, 4, 2)"
        expect: [2.5, 3.5, 4.0, 2.0]
      - call: "decode_box(0, 0, 0, 0, 0, 0, 1, 1)"
        expect: [0.5, 0.5, 1.0, 1.0]
      - call: "decode_box(0, 0, 0, 0, 5, 1, 2, 6)"
        expect: [5.5, 1.5, 2.0, 6.0]
    solution: |
      import math

      def decode_box(tx, ty, tw, th, gx, gy, aw, ah):
          def sigmoid(t):
              return 1 / (1 + math.exp(-t))
          bx = gx + sigmoid(tx)
          by = gy + sigmoid(ty)
          bw = aw * math.exp(tw)
          bh = ah * math.exp(th)
          return [bx, by, bw, bh]
    hints:
      - "Center and size decode differently: center adds cell index, size multiplies by anchor."
      - "Lock center offset with sigmoid in (0, 1); scale anchor size with exponent."
      - "At zero corrections sigmoid gives 0.5 and exp gives 1: center in cell middle, size equals anchor."
