conceptId: decoding-output
cards:
  - id: decoding-output-01
    front: "Что на самом деле выдаёт сеть на каждый слот «ячейка плюс якорь»?"
    back: "Не готовую рамку, а поправки: tx, ty (смещение центра), tw, th (поправка размера), логит objectness и логиты классов. Декодирование переводит их в координаты."
    tags: [raw]
  - id: decoding-output-02
    front: "Как декодируется центр рамки?"
    back: "bx = cell_x + sigmoid(tx), by = cell_y + sigmoid(ty). Сигмоида сжимает смещение в (0, 1), поэтому центр остаётся внутри своей ячейки."
    tags: [center]
  - id: decoding-output-03
    front: "Почему центр пропускают через сигмоиду?"
    back: "Сигмоида ограничивает смещение интервалом (0, 1), и центр не может выскочить за ответственную ячейку. Это стабилизирует обучение: предсказания не разлетаются по кадру."
    tags: [center]
  - id: decoding-output-04
    front: "Как декодируется размер рамки?"
    back: "bw = anchor_w * exp(tw), bh = anchor_h * exp(th). Поправка масштабирует якорь мультипликативно: tw = 0 даёт множитель 1."
    tags: [size]
  - id: decoding-output-05
    front: "Почему размер декодируют через экспоненту?"
    back: "exp(tw) всегда положительна, поэтому ширина и высота не уходят в минус при любом tw. Масштабирование симметрично в логарифме: tw = 1 и tw = -1 дают умножение на e и на 1/e."
    tags: [size]
  - id: decoding-output-06
    front: "Из чего складывается итоговая уверенность по классу?"
    back: "Из произведения p_obj * p_class - вероятности объекта на вероятность класса. Произведение не больше любого из множителей, поэтому уверенный класс при низком objectness даёт низкую уверенность."
    tags: [confidence]
  - id: decoding-output-07
    front: "Что делают с логитом objectness перед использованием?"
    back: "Пропускают через сигмоиду, получая вероятность p_obj из (0, 1). Сырой логит может быть отрицательным или большим - это ещё не вероятность."
    tags: [confidence]
  - id: decoding-output-08
    front: "В каких единицах получаются координаты после декодирования?"
    back: "В шагах сетки, а не в пикселях. Центр 2.5 - это два с половиной шага сетки. Перевод в пиксели - умножение на размер шага (размер изображения / S)."
    tags: [units]
  - id: decoding-output-09
    front: "Какая ошибка возникает при сложении размера с якорем вместо умножения?"
    back: "Размер мультипликативен: bw = anchor_w * exp(tw). Сложение anchor_w + tw ломает масштабную природу поправки и легко даёт отрицательную ширину."
    tags: [pitfalls]
  - id: decoding-output-10
    front: "Что даёт нулевая поправка при декодировании рамки?"
    back: "При tx = ty = 0 сигмоида равна 0.5, и центр садится в середину ячейки. При tw = th = 0 экспонента равна 1, и размер совпадает с якорем."
    tags: [defaults]
