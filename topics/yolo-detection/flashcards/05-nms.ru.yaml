conceptId: nms
cards:
  - id: nms-01
    front: "Какую задачу решает Non-Maximum Suppression?"
    back: "Убирает дубликаты: один объект порождает много перекрывающихся рамок, NMS оставляет по одной - самую уверенную - на объект."
    tags: [purpose]
  - id: nms-02
    front: "Опишите алгоритм NMS по шагам."
    back: "1) Взять рамку с наибольшей уверенностью и оставить её. 2) Удалить из кандидатов все рамки с IoU выше порога относительно неё. 3) Повторять, пока есть кандидаты."
    tags: [algorithm]
  - id: nms-03
    front: "Относительно чего подавляются рамки на каждом шаге?"
    back: "Относительно текущего победителя (самой уверенной рамки на этом шаге), а не между всеми парами глобально. Рамка, пережившая победителя, дальше сравнивается со своими кандидатами."
    tags: [algorithm]
  - id: nms-04
    front: "Что означает «не-максимум» в названии алгоритма?"
    back: "Из группы пересекающихся рамок выживает максимум по уверенности, а все остальные (не-максимумы) подавляются."
    tags: [naming]
  - id: nms-05
    front: "Что делает порог IoU в NMS?"
    back: "Решает, что считать дубликатом: рамки с IoU выше порога относительно победителя подавляются. Высокий порог подавляет только сильно совпавшие, низкий - даже слабо задевающие."
    tags: [threshold]
  - id: nms-06
    front: "Чем грозит слишком низкий порог IoU?"
    back: "Близко стоящие разные объекты дают заметный IoU и склеиваются: NMS подавит один из них, и объект исчезнет из выдачи - не из-за детектора, а из-за постобработки."
    tags: [threshold]
  - id: nms-07
    front: "Чем грозит слишком высокий порог IoU?"
    back: "Почти ничего не подавляется, и дубликаты остаются: один объект снова обведён несколькими рамками. Типичный компромисс - порог 0.4..0.5."
    tags: [threshold]
  - id: nms-08
    front: "Почему NMS применяют отдельно для каждого класса?"
    back: "Рамка «кошка» не должна подавлять рамку «собака», даже при сильном пересечении. Общий NMS по всем классам потерял бы один из перекрывающихся объектов разных классов."
    tags: [classes]
  - id: nms-09
    front: "Чем порог IoU в NMS отличается от порога уверенности?"
    back: "Порог IoU сравнивает рамки между собой и убирает дубликаты. Порог уверенности (score < conf_threshold) - отдельный шаг отсева слабых рамок, обычно до NMS."
    tags: [thresholds]
  - id: nms-10
    front: "В чём идея Soft-NMS?"
    back: "Не удалять пересекающуюся рамку, а понижать её уверенность пропорционально IoU. Рамка остаётся кандидатом и может выжить, если её score всё ещё высок. Это поднимает recall в плотных сценах."
    tags: [soft-nms]
