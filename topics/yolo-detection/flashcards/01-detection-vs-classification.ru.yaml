conceptId: detection-vs-classification
cards:
  - id: detection-vs-classification-01
    front: "Чем детекция объектов отличается от классификации изображений?"
    back: "Классификация отвечает «что на изображении» одной меткой. Детекция отвечает «что и где»: на каждый найденный объект она возвращает ограничивающую рамку, метку класса и уверенность."
    tags: [basics]
  - id: detection-vs-classification-02
    front: "На какие две подзадачи раскладывается детекция?"
    back: "На локализацию (указать рамкой, где объект) и классификацию (сказать, какой это класс). Детектор решает их одновременно для каждого экземпляра."
    tags: [basics]
  - id: detection-vs-classification-03
    front: "Из каких чисел состоит ограничивающая рамка?"
    back: "Из четырёх. В формате «центр-размер» это (cx, cy, w, h) - центр и размеры; в формате «угол-угол» это (x1, y1, x2, y2) - левый верхний и правый нижний углы. Это прямоугольник, а не пиксельная маска."
    tags: [bbox]
  - id: detection-vs-classification-04
    front: "Что означает аббревиатура YOLO и какой принцип за ней стоит?"
    back: "You Only Look Once - «смотрит один раз». Сеть прогоняется по всему изображению за один проход и сразу выдаёт все рамки и классы, а не классифицирует тысячи областей по отдельности."
    tags: [yolo]
  - id: detection-vs-classification-05
    front: "Почему скользящее окно дорого для детекции?"
    back: "Объект бывает любого размера и пропорций, поэтому окно прогоняют во множестве положений и масштабов, и для каждого нужен отдельный запуск сети. Число запусков - это положения, умноженные на масштабы; легко набегают тысячи прогонов на кадр."
    tags: [sliding-window]
  - id: detection-vs-classification-06
    front: "Что такое «ответственная» ячейка сетки в YOLO?"
    back: "Ячейка SxS-сетки, в которую попал центр объекта. Именно она отвечает за предсказание рамки и класса этого объекта."
    tags: [grid]
  - id: detection-vs-classification-07
    front: "Почему сырой выход детектора нельзя сразу показывать как ответ?"
    back: "Он избыточен: один объект порождает несколько перекрывающихся рамок от соседних ячеек. Поэтому в конце стоит Non-Maximum Suppression, оставляющий по одной рамке на объект."
    tags: [postprocessing]
  - id: detection-vs-classification-08
    front: "Чем детекция отличается от сегментации?"
    back: "Детекция возвращает прямоугольную рамку (четыре числа) - грубое положение. Сегментация возвращает пиксельную маску - точную форму объекта. Для наклонённого объекта рамка захватывает много фона."
    tags: [segmentation]
  - id: detection-vs-classification-09
    front: "Почему важно фиксировать формат и единицы координат рамки?"
    back: "(cx, cy, w, h) и (x1, y1, x2, y2) выглядят похоже, но перепутать их - частая причина «уехавших» рамок. Координаты бывают в пикселях или в долях кадра (0..1); смешение нормированных и пиксельных значений ломает рамку."
    tags: [bbox]
  - id: detection-vs-classification-10
    front: "Из чего обычно складывается итоговая уверенность детектора?"
    back: "Из произведения objectness (вероятности, что в рамке вообще есть объект) на вероятность конкретного класса. Это не одно число, а два множителя."
    tags: [confidence]
