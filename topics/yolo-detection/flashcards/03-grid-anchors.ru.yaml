conceptId: grid-anchors
cards:
  - id: grid-anchors-01
    front: "Что такое сетка SxS в YOLO?"
    back: "Мысленное разбиение изображения на S на S ячеек. Сеть за один проход выдаёт предсказания для всех ячеек. Чем мельче сетка, тем точнее локализация и больше предсказаний."
    tags: [grid]
  - id: grid-anchors-02
    front: "Какая ячейка отвечает за объект?"
    back: "Та, в которую попал центр объекта - не та, которую пересекает рамка. За объект отвечает ровно одна ячейка, даже если он накрывает много ячеек."
    tags: [grid]
  - id: grid-anchors-03
    front: "Как по нормированному центру найти ответственную ячейку?"
    back: "col = floor(cx * S), row = floor(cy * S), где cx, cy в долях кадра 0..1. Край прижимают: индекс не больше S-1, иначе центр на границе (1.0) даст выход за сетку."
    tags: [cells]
  - id: grid-anchors-04
    front: "Что такое якорная рамка (anchor box)?"
    back: "Шаблонный прямоугольник заданной формы (w, h), прикреплённый к каждой ячейке. Сеть предсказывает не размеры с нуля, а поправку к ближайшему якорю."
    tags: [anchors]
  - id: grid-anchors-05
    front: "Зачем ячейке несколько якорей?"
    back: "Чтобы обслуживать объекты разных пропорций (широкие, узкие, квадратные) и отвечать более чем за один объект - по одному объекту на якорь."
    tags: [anchors]
  - id: grid-anchors-06
    front: "Что задаёт якорь, а что - ячейка?"
    back: "Якорь задаёт форму (ширину и высоту). Ячейка задаёт положение: якорь ставится в центр ответственной ячейки, а сеть двигает и масштабирует его поправками."
    tags: [anchors]
  - id: grid-anchors-07
    front: "Какой якорь отвечает за объект внутри ячейки?"
    back: "Якорь самой близкой формы. Близость меряют IoU при совмещённых центрах - тогда IoU зависит только от w и h, и берут якорь с максимальным значением."
    tags: [matching]
  - id: grid-anchors-08
    front: "Чему равно пересечение двух центрированных рамок?"
    back: "min(wa, wb) * min(ha, hb). При совмещённых центрах IoU формы зависит только от ширин и высот, что и позволяет сравнивать якоря по форме."
    tags: [matching]
  - id: grid-anchors-09
    front: "Почему якорь выбирают по IoU формы, а не по площади?"
    back: "Похожая площадь не значит похожая форма: квадрат и вытянутый прямоугольник могут иметь одинаковую площадь и низкий IoU. Нужна близость пропорций, которую и ловит IoU формы."
    tags: [matching]
  - id: grid-anchors-10
    front: "Что такое anchor-free детекторы?"
    back: "Детекторы (FCOS, CenterNet, YOLOX и позже), которые предсказывают рамку напрямую от точки - например, расстояния до четырёх сторон от центра - без заранее заданных якорей. Идея сетки и ответственной точки сохраняется."
    tags: [anchor-free]
