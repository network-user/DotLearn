conceptId: detection-vs-classification
cards:
  - id: detection-vs-classification-01
    front: "How does object detection differ from image classification?"
    back: "Classification answers 'what is in the image' with one label. Detection answers 'what and where': for each found object it returns a bounding box, class label, and confidence."
    tags: [basics]
  - id: detection-vs-classification-02
    front: "What two subtasks does object detection break into?"
    back: "Localization (point to where the object is with a box) and classification (say which class it is). A detector solves both simultaneously for each instance."
    tags: [basics]
  - id: detection-vs-classification-03
    front: "What four numbers define a bounding box?"
    back: "In center-size format (cx, cy, w, h) - center and dimensions; in corner-corner format (x1, y1, x2, y2) - top-left and bottom-right corners. It's a rectangle, not a pixel mask."
    tags: [bbox]
  - id: detection-vs-classification-04
    front: "What does YOLO stand for and what principle is behind it?"
    back: "You Only Look Once - 'looks once'. The network runs over the whole image in one pass and immediately outputs all boxes and classes, instead of classifying thousands of regions separately."
    tags: [yolo]
  - id: detection-vs-classification-05
    front: "Why is sliding window expensive for detection?"
    back: "Objects come in any size and aspect ratio, so the window is run at many positions and scales, and each needs a separate network run. Run count is positions times scales; thousands per frame add up easily."
    tags: [sliding-window]
  - id: detection-vs-classification-06
    front: "What is the 'responsible' grid cell in YOLO?"
    back: "The SxS grid cell containing the object's center. That cell is responsible for predicting the box and class of that object."
    tags: [grid]
  - id: detection-vs-classification-07
    front: "Why can't you show raw detector output as the final answer?"
    back: "It's redundant: one object spawns several overlapping boxes from neighboring cells. So Non-Maximum Suppression at the end keeps one box per object."
    tags: [postprocessing]
  - id: detection-vs-classification-08
    front: "How does detection differ from segmentation?"
    back: "Detection returns a rectangular box (four numbers) - coarse location. Segmentation returns a pixel mask - exact object shape. For a tilted object the box captures lots of background."
    tags: [segmentation]
  - id: detection-vs-classification-09
    front: "Why is it important to fix box format and coordinate units?"
    back: "(cx, cy, w, h) and (x1, y1, x2, y2) look similar, but swapping them is a common cause of 'drifting' boxes. Coordinates may be pixels or frame fractions (0..1); mixing normalized and pixel values breaks the box."
    tags: [bbox]
  - id: detection-vs-classification-10
    front: "What usually makes up final detector confidence?"
    back: "Product of objectness (probability there's an object in the box) and specific class probability. It's not one number but two factors multiplied."
    tags: [confidence]
