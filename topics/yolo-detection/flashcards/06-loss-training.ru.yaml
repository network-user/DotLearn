conceptId: loss-training
cards:
  - id: loss-training-01
    front: "Из каких трёх компонентов складывается лосс детекции?"
    back: "Localization (ошибка координат рамки), objectness (есть ли в слоте объект) и classification (ошибка класса). Общий лосс - их взвешенная сумма."
    tags: [components]
  - id: loss-training-02
    front: "На каких слотах считается objectness-лосс?"
    back: "На всех слотах. Для positive-слотов цель близка к 1, для negative (фон) - 0. Это единственный компонент, охватывающий фон."
    tags: [scope]
  - id: loss-training-03
    front: "На каких слотах считаются localization и classification лоссы?"
    back: "Только на positive-слотах. У фона нет эталонной рамки и нечего классифицировать, поэтому координатной и классификационной ошибки у него нет."
    tags: [scope]
  - id: loss-training-04
    front: "Что такое positive-слот?"
    back: "Слот «ячейка плюс якорь», назначенный отвечать за реальный объект: его якорь лучше всех совпал по форме с объектом, чей центр попал в эту ячейку."
    tags: [assignment]
  - id: loss-training-05
    front: "Что такое negative-слот и какова его цель?"
    back: "Слот, которому объект не назначен, - фон. Его цель по objectness равна 0; localization и classification для него не считаются."
    tags: [assignment]
  - id: loss-training-06
    front: "Почему дисбаланс фона и объектов опасен при обучении?"
    back: "Фоновых слотов на порядки больше, чем объектов. Если считать их с равным весом, сумма ошибок фона задавит редкие ошибки объектов, и сеть выучит тривиальное «везде фон»."
    tags: [imbalance]
  - id: loss-training-07
    front: "Какими двумя приёмами борются с дисбалансом фона?"
    back: "Взвешиванием (меньший вес ошибкам negative-слотов) и focal loss (динамическое снижение вклада лёгких, очевидно-фоновых примеров)."
    tags: [imbalance]
  - id: loss-training-08
    front: "Как работает focal loss?"
    back: "Домножает кросс-энтропию на (1 - p)^gamma, где p - уверенность в правильном ответе. Для лёгких примеров p близко к 1, множитель ~0, вклад исчезает; трудные примеры сохраняют вклад."
    tags: [focal-loss]
  - id: loss-training-09
    front: "Зачем компонентам лосса нужны веса (lambda)?"
    back: "Компоненты в разных масштабах и встречаются с разной частотой. Веса уравнивают их вклад в сумму - это гиперпараметры, подбираемые под задачу, а не интуитивная «важность»."
    tags: [weights]
  - id: loss-training-10
    front: "Когда слот становится positive - до или после прохода сети?"
    back: "До: назначение целей - часть подготовки батча. Слот становится positive по совпадению формы якоря с объектом на этапе разметки, ещё до того, как сеть что-либо предскажет."
    tags: [assignment]
