conceptId: map-evaluation
cards:
  - id: map-evaluation-01
    front: "What is precision in detection?"
    back: "TP / (TP + FP) - fraction correct among all predictions. Falls when the detector outputs extra false boxes."
    tags: [precision-recall]
  - id: map-evaluation-02
    front: "What is recall in detection?"
    back: "TP / (TP + FN) - fraction of real objects found. Falls when the detector misses objects."
    tags: [precision-recall]
  - id: map-evaluation-03
    front: "When is a prediction a true positive?"
    back: "When its IoU with same-class ground truth is at least the threshold (classically 0.5) and that ground truth isn't taken by another prediction yet. Otherwise false positive."
    tags: [tp-fp]
  - id: map-evaluation-04
    front: "Why do precision and recall pull in opposite directions?"
    back: "Output only the most confident boxes and precision rises but recall falls (find little). Lower the threshold, recall rises but junk adds up and precision falls."
    tags: [tradeoff]
  - id: map-evaluation-05
    front: "What is a PR curve?"
    back: "Plot of precision as a function of recall, built by sweeping all confidence thresholds high to low. Describes detector behavior as a whole, not at one point."
    tags: [pr-curve]
  - id: map-evaluation-06
    front: "What is AP (Average Precision)?"
    back: "Area under the PR curve, a number from 0 to 1. Collapses the whole curve into one 'quality at all thresholds' score."
    tags: [ap]
  - id: map-evaluation-07
    front: "How do you compute AP numerically from PR points?"
    back: "Sum of rectangles: on each recall increment (from previous value, starting at 0) multiply width by precision and add. By standard precision is taken as right maximum."
    tags: [ap]
  - id: map-evaluation-08
    front: "What is mAP?"
    back: "mean Average Precision - mean AP over all classes. Doesn't let a strong class mask a weak one since it averages their AP."
    tags: [map]
  - id: map-evaluation-09
    front: "How do mAP@0.5 and mAP@[.5:.95] differ?"
    back: "mAP@0.5 (Pascal VOC) uses single IoU threshold 0.5. mAP@[.5:.95] (COCO) averages over ten thresholds 0.5..0.95 and demands precise localization, so it's not greater than mAP@0.5."
    tags: [thresholds]
  - id: map-evaluation-10
    front: "Why does skipping NMS hurt precision in evaluation?"
    back: "One ground truth counts for only one prediction: first box is TP, duplicate boxes are FP. Extra duplicates inflate FP and lower precision."
    tags: [nms-link]
