conceptId: decoding-output
cards:
  - id: decoding-output-01
    front: "What does the network actually output per 'cell plus anchor' slot?"
    back: "Not a ready box but corrections: tx, ty (center offset), tw, th (size correction), objectness logit, and class logits. Decoding turns them into coordinates."
    tags: [raw]
  - id: decoding-output-02
    front: "How is box center decoded?"
    back: "bx = cell_x + sigmoid(tx), by = cell_y + sigmoid(ty). Sigmoid squeezes offset into (0, 1), so center stays inside its cell."
    tags: [center]
  - id: decoding-output-03
    front: "Why is center passed through sigmoid?"
    back: "Sigmoid limits offset to (0, 1), so center can't escape the responsible cell. That stabilizes training: predictions don't scatter across the frame."
    tags: [center]
  - id: decoding-output-04
    front: "How is box size decoded?"
    back: "bw = anchor_w * exp(tw), bh = anchor_h * exp(th). Correction scales the anchor multiplicatively: tw = 0 gives multiplier 1."
    tags: [size]
  - id: decoding-output-05
    front: "Why is size decoded with exponent?"
    back: "exp(tw) is always positive, so width and height never go negative for any tw. Scaling is symmetric in log space: tw = 1 and tw = -1 multiply by e and 1/e."
    tags: [size]
  - id: decoding-output-06
    front: "What makes up final confidence for a class?"
    back: "Product p_obj * p_class - object probability times class probability. Product isn't greater than either factor, so confident class with low objectness still gives low confidence."
    tags: [confidence]
  - id: decoding-output-07
    front: "What happens to objectness logit before use?"
    back: "Passed through sigmoid to get probability p_obj in (0, 1). Raw logit can be negative or large - it's not yet a probability."
    tags: [confidence]
  - id: decoding-output-08
    front: "In what units are coordinates after decoding?"
    back: "Grid steps, not pixels. Center 2.5 means two and a half grid steps. Pixels come from multiplying by step size (image size / S)."
    tags: [units]
  - id: decoding-output-09
    front: "What error comes from adding size to anchor instead of multiplying?"
    back: "Size is multiplicative: bw = anchor_w * exp(tw). Addition anchor_w + tw breaks the scale nature of the correction and easily gives negative width."
    tags: [pitfalls]
  - id: decoding-output-10
    front: "What does zero correction give when decoding a box?"
    back: "At tx = ty = 0 sigmoid is 0.5, center sits in cell middle. At tw = th = 0 exponent is 1, size matches the anchor."
    tags: [defaults]
