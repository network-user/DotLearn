conceptId: bounding-boxes-iou
cards:
  - id: bounding-boxes-iou-01
    front: "Чем отличаются форматы рамки xywh и xyxy?"
    back: "xywh = (cx, cy, w, h) - центр и размеры, удобен для предсказания сетью. xyxy = (x1, y1, x2, y2) - левый верхний и правый нижний углы, удобен для пересечений."
    tags: [formats]
  - id: bounding-boxes-iou-02
    front: "Как перевести (cx, cy, w, h) в (x1, y1, x2, y2)?"
    back: "x1 = cx - w/2, y1 = cy - h/2, x2 = cx + w/2, y2 = cy + h/2. Углы получаются сдвигом от центра на половину размеров."
    tags: [formats]
  - id: bounding-boxes-iou-03
    front: "Что такое IoU и как он считается?"
    back: "IoU (Intersection over Union) = площадь пересечения двух рамок, делённая на площадь их объединения. Значение от 0 (нет касания) до 1 (полное совпадение)."
    tags: [iou]
  - id: bounding-boxes-iou-04
    front: "Как найти ширину пересечения двух рамок по одной оси?"
    back: "Минимум правых краёв минус максимум левых краёв, обрезанный до нуля: max(0, min(x2_a, x2_b) - max(x1_a, x1_b)). Обрезка нужна для непересекающихся рамок."
    tags: [intersection]
  - id: bounding-boxes-iou-05
    front: "Почему перекрытие по оси обрезают до нуля через max(0, ...)?"
    back: "Если рамки разошлись, перекрытия по обеим осям отрицательны, а их произведение положительно - получится выдуманная площадь пересечения. Обрезка каждой оси до нуля убирает это до перемножения."
    tags: [pitfalls]
  - id: bounding-boxes-iou-06
    front: "Как вычислить площадь объединения двух рамок?"
    back: "Площадь A плюс площадь B минус площадь их пересечения. Вычитание нужно, чтобы не посчитать общую часть дважды."
    tags: [union]
  - id: bounding-boxes-iou-07
    front: "Почему при половинном перекрытии IoU заметно меньше 0.5?"
    back: "В знаменателе стоит объединение, которое всегда не меньше пересечения. Поэтому отношение строже наивного ожидания: даже при ощутимом перекрытии IoU остаётся небольшим."
    tags: [intuition]
  - id: bounding-boxes-iou-08
    front: "Чему равен IoU маленькой рамки, целиком лежащей внутри большой?"
    back: "Отношению их площадей: пересечение равно площади маленькой, объединение - площади большой. Он может быть далёк от единицы, хотя маленькая попала точно внутрь."
    tags: [edge-cases]
  - id: bounding-boxes-iou-09
    front: "Что вернуть, если объединение двух рамок равно нулю?"
    back: "0.0. При вырожденных рамках (нулевая площадь) объединение нулевое, поэтому деление надо заменить явным возвратом нуля, а не падать с ошибкой."
    tags: [edge-cases]
  - id: bounding-boxes-iou-10
    front: "Зачем нужны варианты GIoU, DIoU, CIoU вместо обычного IoU?"
    back: "Обычный IoU для непересекающихся рамок всегда ровно ноль и не подсказывает, куда двигать рамку при обучении. GIoU/DIoU/CIoU остаются информативными при нулевом перекрытии (охватывающая коробка, расстояние центров, пропорции). Метрика оценки при этом остаётся обычным IoU."
    tags: [training]
