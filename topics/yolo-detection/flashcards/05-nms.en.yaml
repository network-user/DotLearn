conceptId: nms
cards:
  - id: nms-01
    front: "What problem does Non-Maximum Suppression solve?"
    back: "Removes duplicates: one object spawns many overlapping boxes; NMS keeps one per object - the most confident."
    tags: [purpose]
  - id: nms-02
    front: "Describe the NMS algorithm step by step."
    back: "1) Take the box with highest confidence and keep it. 2) Remove from candidates all boxes with IoU above threshold relative to it. 3) Repeat while candidates remain."
    tags: [algorithm]
  - id: nms-03
    front: "Relative to what are boxes suppressed on each step?"
    back: "Relative to the current winner (most confident box on that step), not globally between all pairs. A box that survived a winner is compared with its own candidates next."
    tags: [algorithm]
  - id: nms-04
    front: "What does 'non-maximum' mean in the algorithm name?"
    back: "From a group of overlapping boxes the maximum by confidence survives; all others (non-maxima) are suppressed."
    tags: [naming]
  - id: nms-05
    front: "What does IoU threshold do in NMS?"
    back: "Decides what counts as a duplicate: boxes with IoU above threshold relative to the winner are suppressed. High threshold suppresses only strong overlaps, low - even light touches."
    tags: [threshold]
  - id: nms-06
    front: "What's the risk of too low an IoU threshold?"
    back: "Closely spaced different objects give noticeable IoU and merge: NMS suppresses one and the object vanishes from output - not the detector's fault but post-processing."
    tags: [threshold]
  - id: nms-07
    front: "What's the risk of too high an IoU threshold?"
    back: "Almost nothing is suppressed and duplicates remain: one object outlined several times again. Typical compromise - threshold 0.4..0.5."
    tags: [threshold]
  - id: nms-08
    front: "Why apply NMS separately per class?"
    back: "A 'cat' box shouldn't suppress a 'dog' box even with heavy overlap. Global NMS across classes would lose one of overlapping objects of different classes."
    tags: [classes]
  - id: nms-09
    front: "How does IoU threshold in NMS differ from confidence threshold?"
    back: "IoU threshold compares boxes to each other and removes duplicates. Confidence threshold (score < conf_threshold) is a separate step filtering weak boxes, usually before NMS."
    tags: [thresholds]
  - id: nms-10
    front: "What is the idea behind Soft-NMS?"
    back: "Don't delete an overlapping box - lower its confidence proportional to IoU. Box stays a candidate and can survive if score is still high. Raises recall in dense scenes."
    tags: [soft-nms]
