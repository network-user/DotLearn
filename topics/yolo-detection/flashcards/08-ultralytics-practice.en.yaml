conceptId: ultralytics-practice
cards:
  - id: ultralytics-practice-01
    front: "What does YOLO('yolov8n.pt') load?"
    back: "Pretrained weights of the lightest YOLOv8 model (nano) for 80 COCO classes. The file downloads automatically on first use."
    tags: [ultralytics]
  - id: ultralytics-practice-02
    front: "What does model.predict() return and how do you get one result?"
    back: "A list of Results objects, one per image. For a single picture you take results[0], even if the input was a single image."
    tags: [predict]
  - id: ultralytics-practice-03
    front: "What do conf and imgsz set in model.predict()?"
    back: "conf sets the minimum confidence threshold (default around 0.25): less confident boxes are dropped. imgsz sets the side the image is letterboxed to before the network (typically 640)."
    tags: [predict]
  - id: ultralytics-practice-04
    front: "What do boxes.xyxy, boxes.conf, and boxes.cls hold?"
    back: "xyxy holds box coordinates (x1, y1, x2, y2) in original-frame pixels, conf holds confidences, cls holds class indices as floating-point numbers."
    tags: [results]
  - id: ultralytics-practice-05
    front: "Why do you need the names dictionary and r.plot()?"
    back: "names maps a class index to a name (for example 0 to person). r.plot() draws boxes with labels over the frame and returns a ready image (a numpy array in BGR order)."
    tags: [results]
  - id: ultralytics-practice-06
    front: "Why can't boxes.cls be used directly as a names key?"
    back: "Class indices arrive as float. You need int(box.cls), otherwise names[cls] with a float key won't find the name."
    tags: [results]
  - id: ultralytics-practice-07
    front: "How do you run a video without loading all frames into memory?"
    back: "Call predict with stream=True: it returns a generator yielding Results one frame at a time, instead of a whole-video list at once."
    tags: [video]
  - id: ultralytics-practice-08
    front: "What does model.train(data='data.yaml', epochs, imgsz) do and what is in data.yaml?"
    back: "Fine-tunes the model from current weights (transfer learning). data.yaml sets train/val paths and the names dictionary. Training prints box_loss, cls_loss, dfl_loss and validation mAP; artifacts land in runs/detect/train, including best.pt."
    tags: [training]
  - id: ultralytics-practice-09
    front: "What does model.val() compute and how does it relate to mAP?"
    back: "Metrics on the validation set. metrics.box.map holds the strict mAP@[.5:.95], map50 holds the soft mAP@0.5 (concept 07). The strict map does not exceed map50."
    tags: [metrics]
  - id: ultralytics-practice-10
    front: "Why export the model to ONNX?"
    back: "ONNX gives a portable computation graph: inference without PyTorch or ultralytics, running in ONNX Runtime, TensorRT, or on edge, often faster thanks to graph optimizations. It does not speed up training."
    tags: [onnx]
  - id: ultralytics-practice-11
    front: "How does the conf threshold differ between predict and val?"
    back: "predict keeps conf around 0.25 for a clean output, while val lowers it almost to zero (0.001) to build a full PR curve. The same model yields more boxes at evaluation than at display."
    tags: [metrics]
