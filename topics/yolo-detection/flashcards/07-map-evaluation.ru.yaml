conceptId: map-evaluation
cards:
  - id: map-evaluation-01
    front: "Что такое precision в детекции?"
    back: "TP / (TP + FP) - доля верных среди всех предсказаний. Падает, когда детектор выдаёт лишние ложные рамки."
    tags: [precision-recall]
  - id: map-evaluation-02
    front: "Что такое recall в детекции?"
    back: "TP / (TP + FN) - доля найденных объектов среди всех реальных. Падает, когда детектор пропускает объекты."
    tags: [precision-recall]
  - id: map-evaluation-03
    front: "Когда предсказание считается true positive?"
    back: "Когда его IoU с эталонной рамкой того же класса не ниже порога (классически 0.5) и этот эталон ещё не занят другим предсказанием. Иначе - false positive."
    tags: [tp-fp]
  - id: map-evaluation-04
    front: "Почему precision и recall тянут в разные стороны?"
    back: "Выдавая только самые уверенные рамки, поднимаешь precision, но теряешь recall (находишь мало). Снижая порог, поднимаешь recall, но добавляешь мусор и теряешь precision."
    tags: [tradeoff]
  - id: map-evaluation-05
    front: "Что такое PR-кривая?"
    back: "График precision как функции recall, построенный перебором всех порогов уверенности от высокого к низкому. Описывает поведение детектора целиком, а не в одной точке."
    tags: [pr-curve]
  - id: map-evaluation-06
    front: "Что такое AP (Average Precision)?"
    back: "Площадь под PR-кривой, число от 0 до 1. Сворачивает всю кривую в одно «качество при всех порогах сразу»."
    tags: [ap]
  - id: map-evaluation-07
    front: "Как численно посчитать AP по точкам PR-кривой?"
    back: "Сумма прямоугольников: на каждом приросте recall (от предыдущего значения, начиная с 0) умножить ширину на precision и сложить. По стандарту precision берут как правый максимум."
    tags: [ap]
  - id: map-evaluation-08
    front: "Что такое mAP?"
    back: "mean Average Precision - среднее AP по всем классам. Не даёт сильному классу замаскировать слабый, так как усредняет их AP."
    tags: [map]
  - id: map-evaluation-09
    front: "Чем mAP@0.5 отличается от mAP@[.5:.95]?"
    back: "mAP@0.5 (Pascal VOC) считается при одном пороге IoU 0.5. mAP@[.5:.95] (COCO) усредняет по десяти порогам 0.5..0.95 и требует точной локализации, поэтому он не больше mAP@0.5."
    tags: [thresholds]
  - id: map-evaluation-10
    front: "Почему пропуск NMS бьёт по precision при оценке?"
    back: "Один эталон засчитывается только одному предсказанию: первая рамка - TP, остальные дубликаты - FP. Лишние дубликаты раздувают FP и снижают precision."
    tags: [nms-link]
