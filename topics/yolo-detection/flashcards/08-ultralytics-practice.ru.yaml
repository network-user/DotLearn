conceptId: ultralytics-practice
cards:
  - id: ultralytics-practice-01
    front: "Что загружает YOLO('yolov8n.pt')?"
    back: "Предобученные веса самой лёгкой модели YOLOv8 (nano) на 80 классов COCO. Файл скачивается автоматически при первом обращении."
    tags: [ultralytics]
  - id: ultralytics-practice-02
    front: "Что возвращает model.predict() и как достать один результат?"
    back: "Список объектов Results, по одному на изображение. Для одной картинки берут results[0], даже если на входе была единственная."
    tags: [predict]
  - id: ultralytics-practice-03
    front: "Что задают conf и imgsz в model.predict()?"
    back: "conf задаёт минимальный порог уверенности (по умолчанию около 0.25): менее уверенные рамки отбрасываются. imgsz задаёт сторону, к которой изображение приводится letterbox перед сетью (стандартно 640)."
    tags: [predict]
  - id: ultralytics-practice-04
    front: "Что лежит в boxes.xyxy, boxes.conf и boxes.cls?"
    back: "xyxy содержит координаты рамок (x1, y1, x2, y2) в пикселях исходного кадра, conf содержит уверенности, cls содержит индексы классов как числа с плавающей точкой."
    tags: [results]
  - id: ultralytics-practice-05
    front: "Зачем нужны словарь names и метод r.plot()?"
    back: "names переводит индекс класса в имя (например 0 в person). r.plot() рисует рамки с подписями поверх кадра и возвращает готовое изображение (numpy-массив в порядке BGR)."
    tags: [results]
  - id: ultralytics-practice-06
    front: "Почему boxes.cls нельзя сразу использовать ключом names?"
    back: "Индексы классов приходят как float. Нужен int(box.cls), иначе обращение names[cls] по float-ключу не найдёт имя."
    tags: [results]
  - id: ultralytics-practice-07
    front: "Как прогнать видео, не загружая все кадры в память?"
    back: "Вызвать predict с stream=True: возвращается генератор, отдающий Results по одному кадру, вместо списка сразу на всё видео."
    tags: [video]
  - id: ultralytics-practice-08
    front: "Что делает model.train(data='data.yaml', epochs, imgsz) и что в data.yaml?"
    back: "Дообучает модель от текущих весов (transfer learning). data.yaml задаёт пути train/val и имена классов names. В обучении печатаются box_loss, cls_loss, dfl_loss и валидационные mAP; артефакты в runs/detect/train, включая best.pt."
    tags: [training]
  - id: ultralytics-practice-09
    front: "Что считает model.val() и как это связано с mAP?"
    back: "Метрики на валидационном наборе. Поле metrics.box.map хранит строгую mAP@[.5:.95], map50 хранит мягкую mAP@0.5 (концепт 07). Строгая map не превосходит map50."
    tags: [metrics]
  - id: ultralytics-practice-10
    front: "Зачем экспортировать модель в ONNX?"
    back: "ONNX даёт переносимый граф вычислений: инференс без PyTorch и ultralytics, запуск в ONNX Runtime, TensorRT или на edge, часто быстрее за счёт графовых оптимизаций. Обучение это не ускоряет."
    tags: [onnx]
  - id: ultralytics-practice-11
    front: "Чем отличается порог conf у predict и val?"
    back: "predict держит conf около 0.25 ради чистой выдачи, а val опускает его почти до нуля (0.001), чтобы построить полную PR-кривую. Одна и та же модель выдаёт при оценке больше рамок, чем при показе."
    tags: [metrics]
