conceptId: bounding-boxes-iou
cards:
  - id: bounding-boxes-iou-01
    front: "How do xywh and xyxy box formats differ?"
    back: "xywh = (cx, cy, w, h) - center and size, convenient for network prediction. xyxy = (x1, y1, x2, y2) - top-left and bottom-right corners, convenient for intersections."
    tags: [formats]
  - id: bounding-boxes-iou-02
    front: "How do you convert (cx, cy, w, h) to (x1, y1, x2, y2)?"
    back: "x1 = cx - w/2, y1 = cy - h/2, x2 = cx + w/2, y2 = cy + h/2. Corners come from shifting the center by half the dimensions."
    tags: [formats]
  - id: bounding-boxes-iou-03
    front: "What is IoU and how is it computed?"
    back: "IoU (Intersection over Union) = intersection area of two boxes divided by their union area. Value from 0 (no touch) to 1 (full match)."
    tags: [iou]
  - id: bounding-boxes-iou-04
    front: "How do you find intersection width of two boxes on one axis?"
    back: "Minimum of right edges minus maximum of left edges, clipped to zero: max(0, min(x2_a, x2_b) - max(x1_a, x1_b)). Clipping handles non-overlapping boxes."
    tags: [intersection]
  - id: bounding-boxes-iou-05
    front: "Why clip axis overlap to zero with max(0, ...)?"
    back: "If boxes are apart, overlap on both axes is negative, but their product is positive - you'd get a fake intersection area. Clipping each axis to zero before multiplying removes that."
    tags: [pitfalls]
  - id: bounding-boxes-iou-06
    front: "How do you compute union area of two boxes?"
    back: "Area A plus area B minus their intersection area. Subtraction avoids counting the overlap twice."
    tags: [union]
  - id: bounding-boxes-iou-07
    front: "Why is IoU noticeably below 0.5 at half overlap?"
    back: "The denominator is union, always at least intersection. So the ratio is stricter than naive expectation: even with substantial overlap IoU stays modest."
    tags: [intuition]
  - id: bounding-boxes-iou-08
    front: "What is IoU of a small box fully inside a large one?"
    back: "Ratio of their areas: intersection equals small box area, union equals large box area. It can be far from 1 even though the small box fits exactly inside."
    tags: [edge-cases]
  - id: bounding-boxes-iou-09
    front: "What to return if union of two boxes is zero?"
    back: "0.0. For degenerate boxes (zero area) union is zero, so replace division with an explicit zero return instead of crashing."
    tags: [edge-cases]
  - id: bounding-boxes-iou-10
    front: "Why GIoU, DIoU, CIoU variants instead of plain IoU?"
    back: "Plain IoU for non-overlapping boxes is always exactly zero and doesn't hint where to move the box during training. GIoU/DIoU/CIoU stay informative at zero overlap (enclosing box, center distance, aspect ratio). Evaluation metric remains plain IoU."
    tags: [training]
