conceptId: grid-anchors
cards:
  - id: grid-anchors-01
    front: "What is an SxS grid in YOLO?"
    back: "A mental split of the image into S by S cells. The network outputs predictions for all cells in one pass. Finer grid means finer localization and more predictions."
    tags: [grid]
  - id: grid-anchors-02
    front: "Which cell is responsible for an object?"
    back: "The one containing the object's center - not every cell the box intersects. Exactly one cell answers for the object, even if it covers many cells."
    tags: [grid]
  - id: grid-anchors-03
    front: "How do you find the responsible cell from normalized center?"
    back: "col = floor(cx * S), row = floor(cy * S), where cx, cy are frame fractions 0..1. Clamp the edge: index must not exceed S-1, or center at 1.0 goes off-grid."
    tags: [cells]
  - id: grid-anchors-04
    front: "What is an anchor box?"
    back: "A template rectangle of fixed shape (w, h) attached to each cell. The network predicts not size from scratch but a correction to the nearest anchor."
    tags: [anchors]
  - id: grid-anchors-05
    front: "Why does each cell get several anchors?"
    back: "To serve objects of different aspect ratios (wide, tall, square) and answer for more than one object - one object per anchor."
    tags: [anchors]
  - id: grid-anchors-06
    front: "What does the anchor define vs what does the cell define?"
    back: "Anchor defines shape (width and height). Cell defines position: anchor sits at the responsible cell center, network moves and scales it with corrections."
    tags: [anchors]
  - id: grid-anchors-07
    front: "Which anchor answers for an object inside a cell?"
    back: "The anchor of closest shape. Closeness is measured by IoU with aligned centers - then IoU depends only on w and h, and you take the anchor with maximum value."
    tags: [matching]
  - id: grid-anchors-08
    front: "What is intersection of two centered boxes?"
    back: "min(wa, wb) * min(ha, hb). With aligned centers shape IoU depends only on widths and heights, which lets you compare anchors by shape."
    tags: [matching]
  - id: grid-anchors-09
    front: "Why pick anchor by shape IoU, not by area?"
    back: "Similar area doesn't mean similar shape: a square and a stretched rectangle can have the same area and low IoU. You need proportion closeness, which shape IoU captures."
    tags: [matching]
  - id: grid-anchors-10
    front: "What are anchor-free detectors?"
    back: "Detectors (FCOS, CenterNet, later YOLOX) that predict a box directly from a point - e.g. distances to four sides from center - without preset anchors. Grid and responsible-point idea remains."
    tags: [anchor-free]
