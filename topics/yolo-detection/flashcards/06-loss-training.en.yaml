conceptId: loss-training
cards:
  - id: loss-training-01
    front: "What three components make up detection loss?"
    back: "Localization (box coordinate error), objectness (is there an object in the slot), and classification (class error). Total loss is their weighted sum."
    tags: [components]
  - id: loss-training-02
    front: "On which slots is objectness loss computed?"
    back: "On all slots. Positive slots target near 1, negative (background) 0. It's the only component covering background."
    tags: [scope]
  - id: loss-training-03
    front: "On which slots are localization and classification losses computed?"
    back: "Only on positive slots. Background has no ground-truth box and nothing to classify, so no coordinate or classification error there."
    tags: [scope]
  - id: loss-training-04
    front: "What is a positive slot?"
    back: "A 'cell plus anchor' slot assigned to answer for a real object: its anchor best matched the object's shape among anchors in the cell containing the object's center."
    tags: [assignment]
  - id: loss-training-05
    front: "What is a negative slot and what is its target?"
    back: "A slot with no assigned object - background. Its objectness target is 0; localization and classification aren't computed for it."
    tags: [assignment]
  - id: loss-training-06
    front: "Why is background-object imbalance dangerous during training?"
    back: "Background slots far outnumber objects. With equal weight their error sum drowns rare object errors and the network learns trivial 'background everywhere'."
    tags: [imbalance]
  - id: loss-training-07
    front: "What two approaches handle background imbalance?"
    back: "Weighting (smaller weight on negative-slot errors) and focal loss (dynamically reducing contribution of easy obvious-background examples)."
    tags: [imbalance]
  - id: loss-training-08
    front: "How does focal loss work?"
    back: "Multiplies cross-entropy by (1 - p)^gamma, where p is confidence in the correct answer. For easy examples p is near 1, multiplier ~0, contribution vanishes; hard examples keep contribution."
    tags: [focal-loss]
  - id: loss-training-09
    front: "Why do loss components need weights (lambda)?"
    back: "Components have different scales and frequency. Weights equalize their contribution to the sum - hyperparameters tuned for the task, not intuitive 'importance'."
    tags: [weights]
  - id: loss-training-10
    front: "When does a slot become positive - before or after the network forward pass?"
    back: "Before: target assignment is part of batch prep. A slot becomes positive by anchor shape match with the object at labeling time, before the network predicts anything."
    tags: [assignment]
