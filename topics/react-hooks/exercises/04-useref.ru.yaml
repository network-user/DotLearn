exercises:
  - id: urf-rerender-quiz-001
    concept: useref
    type: theory-quiz
    difficulty: 1
    prompt: 'В обработчике клика выполнили countRef.current += 1. Что произойдёт?'
    choices:
      - id: a
        text: 'Значение current изменится, но перерисовки не будет.'
      - id: b
        text: 'Компонент перерисуется и покажет новое значение.'
      - id: c
        text: 'React бросит ошибку: ref нельзя менять.'
    correct: [a]
    explanation: 'Запись в ref.current не планирует рендер. Значение меняется тихо, и то, что на экране, остаётся прежним до следующей перерисовки по другой причине.'
    hints:
      - 'Что из двух видов памяти компонента вызывает перерисовку при записи, а что нет?'
    variants:
      - prompt: 'Чем чтение ref отличается от чтения состояния?'
        choices:
          - id: a
            text: 'ref.current отдаёт последнее записанное'
          - id: b
            text: 'Оба всегда отдают снимок рендера.'
          - id: c
            text: 'ref нельзя читать, только записывать.'
        correct: [a]
        explanation: 'Состояние внутри рендера заморожено, а ref.current живёт вне модели снимков и всегда возвращает последнее значение.'
      - prompt: 'Что уместнее хранить в useRef, а не в useState?'
        choices:
          - id: a
            text: 'Идентификатор таймера от setInterval.'
          - id: b
            text: 'Текст, который выводится в заголовке страницы.'
          - id: c
            text: 'Счётчик лайков, отображаемый на кнопке.'
        correct: [a]
        explanation: 'Служебное значение, не влияющее на разметку, держат в ref, чтобы не гонять лишние перерисовки. Видимые данные - в состоянии.'

  - id: urf-signature-blanks-001
    concept: useref
    type: fill-in-blanks
    difficulty: 2
    prompt: 'Поле поиска должно получать фокус при монтировании. Впишите вызов хука и обращение к узлу.'
    template: |
      function SearchBox() {
        const inputRef = {{hook}}(null);
        useEffect(() => {
          inputRef.{{prop}}.focus();
        }, []);
        return <input ref={inputRef} />;
      }
    blanks:
      hook:
        accept: ['useRef']
      prop:
        accept: ['current']
    explanation: 'useRef(null) создаёт объект, в поле current которого React после коммита положит узел input. Фокус ставят в эффекте, когда узел уже существует.'
    hints:
      - 'Какой хук создаёт стабильный объект-контейнер, а через какое поле лежит его значение?'
    variants:
      - prompt: 'Идентификатор интервала нужно сохранить между кликами. Впишите вызов хука и поле для записи.'
        template: |
          function Timer() {
            const idRef = {{hook}}(null);
            function start() {
              idRef.{{prop}} = setInterval(tick, 1000);
            }
            return <button onClick={start}>старт</button>;
          }
        blanks:
          hook:
            accept: ['useRef']
          prop:
            accept: ['current']
      - prompt: 'После каждого рендера нужно запомнить предыдущую цену. Впишите вызов хука и поле.'
        template: |
          function Row({ price }) {
            const prevRef = {{hook}}(price);
            useEffect(() => {
              prevRef.{{prop}} = price;
            });
            return null;
          }
        blanks:
          hook:
            accept: ['useRef']
          prop:
            accept: ['current']

  - id: urf-previous-predict-001
    concept: useref
    type: predict-output
    difficulty: 3
    prompt: 'Компонент смонтировали с value = 1, затем value менялся на 4 и на 9. Эффект зависит от value. Что попадёт в консоль по порядку?'
    snippet: |
      function Tracker({ value }) {
        const prevRef = useRef(0);
        useEffect(() => {
          console.log(prevRef.current + ' -> ' + value);
          prevRef.current = value;
        }, [value]);
        return null;
      }
    expected:
      kind: stdout
      value: |-
        0 -> 1
        1 -> 4
        4 -> 9
    explanation: 'prevRef.current начинается с 0. Эффект печатает пару «предыдущее -> текущее», затем записывает текущее значение в ref. На следующем срабатывании там уже прошлое значение, поэтому получается 0->1, 1->4, 4->9.'
    hints:
      - 'ref.current хранит то, что записали при прошлом срабатывании эффекта, и переживает рендеры.'
      - 'Проследите значение prevRef.current до и после каждой строки записи.'
