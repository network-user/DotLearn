exercises:
  - id: umc-caches-quiz-001
    concept: usememo-usecallback
    type: theory-quiz
    difficulty: 1
    prompt: 'Что кэширует useMemo между рендерами?'
    choices:
      - id: a
        text: 'Результат вычисления, переданного в него.'
      - id: b
        text: 'Саму функцию, чтобы её ссылка не менялась.'
      - id: c
        text: 'Ссылку на узел DOM.'
    correct: [a]
    explanation: 'useMemo вызывает функцию-фабрику и запоминает её результат, отдавая кэш, пока зависимости не изменятся.'
    hints:
      - 'Имя memo намекает на «запомнить». Запоминается результат или сама функция?'
    variants:
      - prompt: 'Что кэширует useCallback?'
        choices:
          - id: a
            text: 'Саму функцию - её ссылка'
          - id: b
            text: 'Результат вызова функции.'
          - id: c
            text: 'Массив зависимостей.'
        correct: [a]
        explanation: 'useCallback(fn, deps) равен useMemo(() => fn, deps): в кэше лежит сама функция, а не результат её вызова.'
      - prompt: 'Когда мемоизация через useMemo действительно оправдана?'
        choices:
          - id: a
            text: 'Когда вычисление дорогое либо его результат нужен как'
          - id: b
            text: 'Всегда - каждую переменную стоит мемоизировать.'
          - id: c
            text: 'Никогда - это устаревший приём.'
        correct: [a]
        explanation: 'Мемоизация не бесплатна. Она окупается при дорогом вычислении, мемоизированном дочернем компоненте или когда значение служит зависимостью другого хука.'

  - id: umc-signature-blanks-001
    concept: usememo-usecallback
    type: fill-in-blanks
    difficulty: 2
    prompt: 'Сумма пересчитывается только при смене rows. Впишите нужный хук и зависимость.'
    template: |
      const total = {{hook}}(() => rows.reduce((s, r) => s + r.amount, 0), [{{dep}}]);
    blanks:
      hook:
        accept: ['useMemo']
      dep:
        accept: ['rows']
    explanation: 'useMemo кэширует результат reduce и пересчитывает его только когда меняется rows.'
    hints:
      - 'Нужно закэшировать результат вычисления, а не функцию. Какой из двух хуков это делает?'
    variants:
      - prompt: 'Обработчик должен сохранять стабильную ссылку, пока не изменится userId. Впишите хук и зависимость.'
        template: |
          const handleSave = {{hook}}(() => save(userId), [{{dep}}]);
        blanks:
          hook:
            accept: ['useCallback']
          dep:
            accept: ['userId']
      - prompt: 'Стоимость зависит от цены и количества. Впишите хук и недостающую зависимость.'
        template: |
          const total = {{hook}}(() => price * qty, [price, {{dep}}]);
        blanks:
          hook:
            accept: ['useMemo']
          dep:
            accept: ['qty']

  - id: umc-recompute-predict-001
    concept: usememo-usecallback
    type: predict-output
    difficulty: 3
    prompt: 'Компонент смонтировали с amount = 100, rate = 90, currency = RUB. Затем currency изменился на USD, затем rate - на 95. useMemo зависит от [amount, rate]. Что попадёт в консоль по порядку?'
    snippet: |
      function Price({ amount, rate, currency }) {
        const total = useMemo(() => {
          console.log(amount * rate);
          return amount * rate;
        }, [amount, rate]);
        return <span>{total} {currency}</span>;
      }
    expected:
      kind: stdout
      value: |-
        9000
        9500
    explanation: 'При монтировании вычисление выполняется: 100 * 90 = 9000. Смена currency не трогает зависимости [amount, rate], поэтому пересчёта нет. Смена rate на 95 меняет зависимость, вычисление бежит снова: 100 * 95 = 9500.'
    hints:
      - 'useMemo пересчитывает только когда меняется значение в его массиве зависимостей.'
      - 'currency нет в зависимостях. Вызовет ли его смена повторный расчёт?'
