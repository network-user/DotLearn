exercises:
  - id: ust-snapshot-quiz-001
    concept: usestate
    type: theory-quiz
    difficulty: 1
    prompt: 'В обработчике вызвали setCount(count + 1), а следующей строкой console.log(count). Значение count в этом рендере было 3. Что напечатает console.log?'
    choices:
      - id: a
        text: '3 - в этом рендере count заморожен, сеттер лишь планирует новый рендер.'
      - id: b
        text: '4 - сеттер меняет count сразу же.'
      - id: c
        text: 'undefined - переменная перезаписана.'
    correct: [a]
    explanation: 'Внутри одного рендера значение состояния - константа. Сеттер планирует следующий рендер, но текущее значение count не трогает.'
    hints:
      - 'Значение состояния - снимок на время рендера. Меняет ли его сеттер задним числом?'
    variants:
      - prompt: 'Сколько перерисовок вызовут три подряд идущих setCount в одном обработчике клика?'
        choices:
          - id: a
            text: 'Одну - обновления собираются в очередь и применяются разом (батчинг).'
          - id: b
            text: 'Три - по одной на каждый вызов сеттера.'
          - id: c
            text: 'Ни одной - обновления отменяют друг друга.'
        correct: [a]
        explanation: 'React батчит все сеттеры одного события в одну очередь и делает ровно один рендер.'
      - prompt: 'При likes = 0 в одном клике дважды вызвали setLikes(likes + 1). Каким станет likes?'
        choices:
          - id: a
            text: '1 - оба вызова читают замороженный ноль и планируют поставить единицу.'
          - id: b
            text: '2 - вызовы складываются.'
          - id: c
            text: '0 - обновление не произойдёт.'
        correct: [a]
        explanation: 'Оба setLikes видят один и тот же снимок likes = 0, поэтому оба планируют значение 1. Итог - единица.'

  - id: ust-functional-predict-001
    concept: usestate
    type: predict-output
    difficulty: 2
    prompt: 'Компонент смонтировали и один раз нажали кнопку. Эффект зависит от n. Что попадёт в консоль по порядку?'
    snippet: |
      function Counter() {
        const [n, setN] = useState(0);
        useEffect(() => {
          console.log(n);
        }, [n]);
        function handleClick() {
          setN(n + 1);
          setN(n + 1);
        }
        return <button onClick={handleClick}>{n}</button>;
      }
    expected:
      kind: stdout
      value: |-
        0
        1
    explanation: 'После монтирования эффект печатает 0. Оба setN(n + 1) читают замороженный снимок n = 0 и планируют значение 1, поэтому после клика n становится 1, и эффект печатает 1.'
    hints:
      - 'Оба вызова сеттера в одном клике видят одно и то же значение n. Какое?'
      - 'Эффект с зависимостью [n] срабатывает после монтирования и каждый раз, когда n меняется.'
    variants:
      - prompt: 'Тот же компонент, но сеттер вызывают функциональной формой. Что попадёт в консоль после монтирования и одного клика?'
        snippet: |
          function Counter() {
            const [n, setN] = useState(0);
            useEffect(() => {
              console.log(n);
            }, [n]);
            function handleClick() {
              setN((prev) => prev + 1);
              setN((prev) => prev + 1);
            }
            return <button onClick={handleClick}>{n}</button>;
          }
        expected:
          kind: stdout
          value: |-
            0
            2
        explanation: 'Функциональная форма берёт свежее значение из очереди: первый вызов делает 1, второй - 2. После клика n равно 2.'
      - prompt: 'Начальное значение 10, один клик с двумя функциональными апдейтами. Что попадёт в консоль?'
        snippet: |
          function Counter() {
            const [n, setN] = useState(10);
            useEffect(() => {
              console.log(n);
            }, [n]);
            function handleClick() {
              setN((prev) => prev + 5);
              setN((prev) => prev + 5);
            }
            return <button onClick={handleClick}>{n}</button>;
          }
        expected:
          kind: stdout
          value: |-
            10
            20
        explanation: 'После монтирования печатается 10. Два функциональных апдейта по +5 применяются к очереди по очереди: 15, затем 20.'

  - id: ust-mixed-queue-predict-001
    concept: usestate
    type: predict-output
    difficulty: 4
    prompt: 'Эффект без массива зависимостей срабатывает после каждого рендера. Компонент смонтировали и один раз нажали кнопку. Что попадёт в консоль по порядку?'
    snippet: |
      function Counter() {
        const [n, setN] = useState(0);
        useEffect(() => {
          console.log(n);
        });
        function handleClick() {
          setN(n + 1);
          setN((x) => x + 10);
          setN(n + 1);
        }
        return <button onClick={handleClick}>{n}</button>;
      }
    expected:
      kind: stdout
      value: |-
        0
        1
    explanation: 'После монтирования эффект печатает 0. В очереди клика обновления применяются по порядку от базового 0: setN(n + 1) кладёт 1 (n заморожен на 0); функциональный setN((x) => x + 10) складывает - 11; но последний setN(n + 1) снова читает замороженный ноль и перезаписывает очередь значением 1. Итог - 1.'
    hints:
      - 'Прямой сеттер setN(n + 1) использует снимок n этого рендера, а не значение из очереди.'
      - 'Проследите очередь по шагам: прямой сеттер задаёт значение целиком, функциональный складывает с накопленным. Что делает последний вызов?'
