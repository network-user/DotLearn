exercises:
  - id: roh-violation-quiz-001
    concept: rules-of-hooks
    type: theory-quiz
    difficulty: 1
    prompt: 'Какой из вызовов нарушает правила хуков?'
    choices:
      - id: a
        text: 'useState на верхнем уровне тела компонента.'
      - id: b
        text: 'useState внутри блока if в теле компонента.'
      - id: c
        text: 'useState на верхней строке кастомного хука.'
    correct: [b]
    explanation: 'Хуки вызывают только на верхнем уровне. Вызов внутри if делает число вызовов зависимым от данных, и порядок ячеек между рендерами съезжает.'
    hints:
      - 'React сопоставляет хуки с ячейками по порядку вызова. Что должно оставаться неизменным между рендерами?'
    variants:
      - prompt: 'Где хук вызывать нельзя?'
        choices:
          - id: a
            text: 'Из функционального компонента.'
          - id: b
            text: 'Из другого хука с префиксом use.'
          - id: c
            text: 'Из обычной функции-обработчика onClick.'
        correct: [c]
        explanation: 'Хуки вызывают только из компонентов и других хуков. У обработчика нет контекста рендера, поэтому у React нет списка ячеек для него.'
      - prompt: 'Что из перечисленного тоже ломает порядок хуков, как и if?'
        choices:
          - id: a
            text: 'Ранний return null, стоящий выше вызова useState.'
          - id: b
            text: 'Условие внутри тела useEffect.'
          - id: c
            text: 'Условный рендер поля в JSX через логическое И.'
        correct: [a]
        explanation: 'Ранний return выше хука пропускает часть вызовов на некоторых рендерах, и нумерация ячеек съезжает. Условие внутри тела эффекта или в JSX безопасно.'

  - id: roh-fix-blanks-001
    concept: rules-of-hooks
    type: fill-in-blanks
    difficulty: 2
    prompt: 'Заведите состояние безусловно, а поле спрячьте по условию в разметке. Впишите вызов хука и условие показа.'
    template: |
      function PatronymicField({ showPatronymic }) {
        const [value, setValue] = {{hook}}('');
        return (
          <form>
            {{{cond}} && <input value={value} onChange={(e) => setValue(e.target.value)} />}
          </form>
        );
      }
    blanks:
      hook:
        accept: ['useState']
      cond:
        accept: ['showPatronymic']
    explanation: 'Хук useState вызывается всегда и на верхнем уровне, а условие showPatronymic уезжает в JSX. Порядок вызовов от этого не зависит.'
    hints:
      - 'Условие должно решать, что показать, а не что вызвать. Вызов хука оставьте безусловным.'
    variants:
      - prompt: 'Не оборачивайте useEffect в if. Впишите условие внутрь тела эффекта и в массив зависимостей.'
        template: |
          function Banner({ enabled }) {
            useEffect(() => {
              if ({{cond}}) {
                document.title = 'Активно';
              }
            }, [{{dep}}]);
            return null;
          }
        blanks:
          cond:
            accept: ['enabled']
          dep:
            accept: ['enabled']
      - prompt: 'Состояние нужно всегда, а сообщение показывают только гостям. Впишите вызов хука и условие рендера.'
        template: |
          function Greeting({ isGuest }) {
            const [name, setName] = {{hook}}('');
            return (
              <div>
                {{{cond}} && <p>Войдите, чтобы сохранить прогресс</p>}
              </div>
            );
          }
        blanks:
          hook:
            accept: ['useState']
          cond:
            accept: ['isGuest']

  - id: roh-cell-order-quiz-001
    concept: rules-of-hooks
    type: theory-quiz
    difficulty: 3
    prompt: 'На первом рендере компонент вызвал useState, затем внутри сработавшего if ещё useState, затем useState для возраста. Страна сменилась, if больше не срабатывает. Что произойдёт с ячейкой возраста?'
    choices:
      - id: a
        text: 'Возраст возьмёт ячейку, и React сообщит об ошибке порядка хуков.'
      - id: b
        text: 'Ничего, React найдёт ячейку возраста по имени переменной age.'
      - id: c
        text: 'Возраст молча получит новую пустую ячейку, старые значения сохранятся.'
    correct: [a]
    explanation: 'React раздаёт ячейки по порядку вызова, а не по имени. Пропущенный вызов сдвигает нумерацию: третий вызов становится вторым и претендует на чужую ячейку, поэтому React останавливается с ошибкой.'
    hints:
      - 'Вспомните, по какому признаку React сопоставляет вызов хука с его ячейкой.'
      - 'Если один из вызовов исчезает, что происходит с номерами всех вызовов после него?'
