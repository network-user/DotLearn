exercises:
  - id: urd-reducer-quiz-001
    concept: usereducer
    type: theory-quiz
    difficulty: 1
    prompt: 'Что такое reducer в useReducer?'
    choices:
      - id: a
        text: 'Чистая функция (state, action), возвращающая новое состояние.'
      - id: b
        text: 'Обработчик события браузера.'
      - id: c
        text: 'Компонент React, отображающий состояние.'
    correct: [a]
    explanation: 'Редьюсер получает текущее состояние и действие и возвращает новое состояние. Компонент лишь отправляет действия через dispatch.'
    hints:
      - 'Слово reducer пришло от метода reduce: он сворачивает историю действий в текущее состояние.'
    variants:
      - prompt: 'Когда useReducer удобнее useState?'
        choices:
          - id: a
            text: 'Когда состояние составное и связанное, а переходов много и они нетривиальны.'
          - id: b
            text: 'Когда состояние - одно независимое булево значение.'
          - id: c
            text: 'Всегда, useState использовать не стоит.'
        correct: [a]
        explanation: 'Редьюсер собирает разросшуюся логику обновления в одном месте и упрощает тестирование. Для простого независимого состояния достаточно useState.'
      - prompt: 'Что редьюсер обязан делать с состоянием?'
        choices:
          - id: a
            text: 'Возвращать новое значение, не мутируя старое.'
          - id: b
            text: 'Менять переданный state на месте через push или присваивание.'
          - id: c
            text: 'Вызывать setState внутри себя.'
        correct: [a]
        explanation: 'React сравнивает ссылки, поэтому редьюсер должен вернуть новый объект. Мутация старого состояния может не вызвать перерисовку.'

  - id: urd-signature-blanks-001
    concept: usereducer
    type: fill-in-blanks
    difficulty: 2
    prompt: 'Подключите редьюсер и отправьте действие. Впишите нужный хук и функцию отправки действия.'
    template: |
      const [state, dispatch] = {{hook}}(reducer, { count: 0 });

      function increment() {
        {{trigger}}({ type: 'inc' });
      }
    blanks:
      hook:
        accept: ['useReducer']
      trigger:
        accept: ['dispatch']
    explanation: 'useReducer возвращает состояние и функцию dispatch; действие отправляют вызовом dispatch с объектом-действием.'
    hints:
      - 'Один хук подключает редьюсер, а вторая функция из пары отправляет действия.'
    variants:
      - prompt: 'Допишите редьюсер: прибавьте action.amount и верните состояние для неизвестного действия.'
        template: |
          function reducer(state, action) {
            switch (action.type) {
              case 'add':
                return { total: state.total + action.{{field}} };
              default:
                return {{fallback}};
            }
          }
        blanks:
          field:
            accept: ['amount']
          fallback:
            accept: ['state']
      - prompt: 'Подключите редьюсер списка и отправьте действие добавления. Впишите хук и поле действия.'
        template: |
          const [todos, dispatch] = {{hook}}(todosReducer, []);

          function addTodo(text) {
            dispatch({ type: 'added', {{field}}: text });
          }
        blanks:
          hook:
            accept: ['useReducer']
          field:
            accept: ['text']

  - id: urd-dispatch-queue-predict-001
    concept: usereducer
    type: predict-output
    difficulty: 3
    prompt: 'Компонент смонтировали и один раз нажали кнопку. Эффект зависит от count. Что попадёт в консоль по порядку?'
    snippet: |
      function reducer(count, action) {
        if (action === 'inc') return count + 1;
        if (action === 'dec') return count - 1;
        return count;
      }

      function Counter() {
        const [count, dispatch] = useReducer(reducer, 0);
        useEffect(() => {
          console.log(count);
        }, [count]);
        function handleClick() {
          dispatch('inc');
          dispatch('inc');
          dispatch('dec');
        }
        return <button onClick={handleClick}>{count}</button>;
      }
    expected:
      kind: stdout
      value: |-
        0
        1
    explanation: 'После монтирования эффект печатает 0. Три действия одного клика батчатся, но редьюсер получает свежее состояние очереди: 0 -> 1 -> 2 -> 1. В отличие от setCount(count + 1), dispatch всегда складывается, поэтому итог 1, а эффект печатает 1.'
    hints:
      - 'Редьюсер каждый раз получает не снимок рендера, а текущее состояние очереди.'
      - 'Примените действия по порядку от нуля: inc, inc, dec. Что получится?'
