exercises:
  - id: uch-what-quiz-001
    concept: custom-hooks
    type: theory-quiz
    difficulty: 1
    prompt: 'Что такое кастомный хук?'
    choices:
      - id: a
        text: 'Функция с префиксом use, чтобы переиспользовать логику с'
      - id: b
        text: 'Новый встроенный хук из свежей версии React.'
      - id: c
        text: 'Компонент, который отрисовывает состояние.'
    correct: [a]
    explanation: 'Кастомный хук - обычная функция с префиксом use, которой разрешено вызывать хуки, потому что она сама хук. Это способ вынести повторяющуюся логику.'
    hints:
      - 'Почему обычную функцию нельзя использовать для выноса логики с useState?'
    variants:
      - prompt: 'Два компонента вызывают один и тот же useCounter. Разделяют ли они состояние?'
        choices:
          - id: a
            text: 'Нет, у каждого вызова своё изолированное'
          - id: b
            text: 'Да, состояние общее для обоих.'
          - id: c
            text: 'Да, но только до первого обновления.'
        correct: [a]
        explanation: 'Хук делится логикой, а не данными. Каждый вызов заводит собственную ячейку состояния, как отдельный useState.'
      - prompt: 'Что именно переиспользует кастомный хук между компонентами?'
        choices:
          - id: a
            text: 'Логику работы с состоянием и'
          - id: b
            text: 'Конкретные значения состояния.'
          - id: c
            text: 'Разметку JSX.'
        correct: [a]
        explanation: 'Общий у хука только рецепт. Данные у каждого вызова свои; общее состояние поднимают в контекст или менеджер.'

  - id: uch-define-blanks-001
    concept: custom-hooks
    type: fill-in-blanks
    difficulty: 2
    prompt: 'Допишите хук-переключатель: вызов состояния и возвращаемую функцию.'
    template: |
      function useToggle(initial = false) {
        const [on, setOn] = {{hook}}(initial);
        const toggle = () => setOn((v) => !v);
        return [on, {{ret}}];
      }
    blanks:
      hook:
        accept: ['useState']
      ret:
        accept: ['toggle']
    explanation: 'Хук заводит булево состояние через useState и возвращает пару из значения и функции-переключателя, повторяя форму useState.'
    hints:
      - 'Внутри кастомного хука можно и нужно вызывать встроенные хуки. Какой заведёт состояние?'
    variants:
      - prompt: 'Хук возвращает ширину окна. Впишите корректное имя по правилу префикса хуков.'
        template: |
          function {{name}}() {
            const [width, setWidth] = useState(window.innerWidth);
            return width;
          }
        blanks:
          name:
            accept: ['useWindowWidth']
      - prompt: 'Хук загружает пользователя по id. Впишите вызов состояния и передаваемый сеттер.'
        template: |
          function useUser(id) {
            const [user, setUser] = {{hook}}(null);
            useEffect(() => {
              fetchUser(id).then({{setter}});
            }, [id]);
            return user;
          }
        blanks:
          hook:
            accept: ['useState']
          setter:
            accept: ['setUser']

  - id: uch-isolation-predict-001
    concept: custom-hooks
    type: predict-output
    difficulty: 3
    prompt: 'Компонент смонтировали, затем один раз нажали кнопку, которая увеличивает первый счётчик. Оба счётчика заведены одним хуком. Что попадёт в консоль по порядку?'
    snippet: |
      function useCounter(start) {
        const [n, setN] = useState(start);
        useEffect(() => {
          console.log(n);
        }, [n]);
        return () => setN((x) => x + 1);
      }

      function Panel() {
        const incA = useCounter(0);
        const incB = useCounter(10);
        return <button onClick={incA}>+</button>;
      }
    expected:
      kind: stdout
      value: |-
        0
        10
        1
    explanation: 'На монтировании эффекты двух вызовов печатают начальные значения по порядку: 0 и 10. Клик увеличивает только первый счётчик: его n меняется на 1 и эффект печатает 1, а второй счётчик не тронут, поэтому его эффект не срабатывает.'
    hints:
      - 'Два вызова одного хука дают две независимые ячейки состояния.'
      - 'Увеличивается только первый счётчик. У какого из эффектов изменится зависимость n?'
