exercises:
  - id: dac-stale-quiz-001
    concept: deps-and-closures
    type: theory-quiz
    difficulty: 1
    prompt: 'Эффект с пустым массивом зависимостей [] читает переменную состояния count. Какое значение count он видит после нескольких обновлений?'
    choices:
      - id: a
        text: 'Значение с момента монтирования - оно осталось захваченным навсегда.'
      - id: b
        text: 'Всегда самое свежее значение.'
      - id: c
        text: 'undefined.'
    correct: [a]
    explanation: 'Эффект с [] выполняется один раз при монтировании и замыкает count того рендера. Дальнейшие обновления он не видит - это устаревшее замыкание.'
    hints:
      - 'Сколько раз выполняется эффект с пустым массивом, и в окружении какого рендера он замыкает count?'
    variants:
      - prompt: 'Что такое устаревшее замыкание (stale closure) в React?'
        choices:
          - id: a
            text: 'Функция, захватившая значения того рендера, где родилась, и не видящая новых.'
          - id: b
            text: 'Утечка памяти из-за незакрытого соединения.'
          - id: c
            text: 'Хук, случайно вызванный внутри цикла.'
        correct: [a]
        explanation: 'Функция замыкает переменные своего рендера. Если она переживает рендер и вызывается позже, она видит устаревший снимок.'
      - prompt: 'Почему нельзя ставить [], «чтобы линтер замолчал», если эффект читает состояние?'
        choices:
          - id: a
            text: 'Эффект застынет на начальных значениях и перестанет реагировать на изменения.'
          - id: b
            text: 'React удалит эффект целиком.'
          - id: c
            text: 'Ничего не случится, пустой массив всегда безопаснее.'
        correct: [a]
        explanation: 'Пустой массив - обещание, что эффект не читает реактивных значений. Нарушив его, вы получаете эффект, застрявший на снимке монтирования.'

  - id: dac-deps-blanks-001
    concept: deps-and-closures
    type: fill-in-blanks
    difficulty: 2
    prompt: 'Эффект читает roomId и userId. Впишите честный массив зависимостей в порядке roomId, затем userId.'
    template: |
      useEffect(() => {
        const conn = connect(roomId, userId);
        return () => conn.close();
      }, [{{a}}, {{b}}]);
    blanks:
      a:
        accept: ['roomId']
      b:
        accept: ['userId']
    explanation: 'Все реактивные значения, которые эффект читает, должны быть в массиве зависимостей. Иначе эффект застрянет на устаревших roomId и userId.'
    hints:
      - 'Массив зависимостей перечисляет всё реактивное, что читает эффект. Что он читает здесь?'
    variants:
      - prompt: 'Эффект читает query. Впишите зависимость, чтобы он реагировал на её смену.'
        template: |
          useEffect(() => {
            console.log(query);
          }, [{{dep}}]);
        blanks:
          dep:
            accept: ['query']
      - prompt: 'Эффект подключается по roomId. Впишите зависимость, чтобы подключение пересоздавалось при смене комнаты.'
        template: |
          useEffect(() => {
            const conn = connect(roomId);
            return () => conn.close();
          }, [{{dep}}]);
        blanks:
          dep:
            accept: ['roomId']

  - id: dac-stale-interval-predict-001
    concept: deps-and-closures
    type: predict-output
    difficulty: 4
    prompt: 'Компонент смонтировали, count = 0. Пользователь трижды нажал кнопку, count стал 3. После этого внешний код вызвал сохранённую функцию saved(). Что напечатает saved()?'
    snippet: |
      let saved;

      function Ticker() {
        const [count, setCount] = useState(0);
        useEffect(() => {
          saved = () => console.log(count);
        }, []);
        return <button onClick={() => setCount(count + 1)}>{count}</button>;
      }
    expected:
      kind: stdout
      value: |-
        0
    explanation: 'Эффект с [] выполнился один раз при монтировании и записал в saved функцию, замкнувшую count = 0. Клики создают новые рендеры, но эффект не перезапускается, saved остаётся прежним и по-прежнему замыкает ноль. Поэтому saved() печатает 0, а не 3.'
    hints:
      - 'Сколько раз выполнится эффект с пустым массивом, и какой count он замкнёт?'
      - 'Клики меняют состояние, но перезаписывают ли они saved? Пересоздаётся ли эффект?'
