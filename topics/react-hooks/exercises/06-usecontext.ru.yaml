exercises:
  - id: uctx-purpose-quiz-001
    concept: usecontext
    type: theory-quiz
    difficulty: 1
    prompt: 'Какую задачу решает контекст?'
    choices:
      - id: a
        text: 'Проброс одного значения через много'
      - id: b
        text: 'Ускорение рендеринга больших списков.'
      - id: c
        text: 'Валидацию значений в формах.'
    correct: [a]
    explanation: 'Контекст убирает prop drilling: значение объявляют наверху и читают напрямую там, где оно нужно, минуя промежуточные слои.'
    hints:
      - 'Вспомните пример с темой, которую передавали через каждый уровень до кнопки.'
    variants:
      - prompt: 'Откуда useContext(MyContext) берёт значение?'
        choices:
          - id: a
            text: 'Из ближайшего Provider этого контекста выше'
          - id: b
            text: 'Из глобальной переменной модуля.'
          - id: c
            text: 'Из собственных пропсов компонента.'
        correct: [a]
        explanation: 'useContext поднимается по дереву и берёт значение ближайшего Provider; если провайдера нет, возвращается значение по умолчанию из createContext.'
      - prompt: 'Что происходит с потребителями контекста при смене value у Provider?'
        choices:
          - id: a
            text: 'Все компоненты, читающие этот контекст'
          - id: b
            text: 'Ничего, пока не вызвать перерисовку вручную.'
          - id: c
            text: 'Перерисуется только сам Provider.'
        correct: [a]
        explanation: 'Смена значения провайдера перерисовывает всех потребителей контекста, но не промежуточные компоненты, которые его не читают.'

  - id: uctx-signature-blanks-001
    concept: usecontext
    type: fill-in-blanks
    difficulty: 2
    prompt: 'Создайте контекст темы и прочитайте его в компоненте. Впишите функцию создания и хук чтения.'
    template: |
      const ThemeContext = {{create}}('светлая');

      function Panel() {
        const theme = {{read}}(ThemeContext);
        return <div className={theme} />;
      }
    blanks:
      create:
        accept: ['createContext']
      read:
        accept: ['useContext']
    explanation: 'createContext задаёт контекст и значение по умолчанию, а useContext читает ближайшее значение провайдера.'
    hints:
      - 'Одна функция создаёт объект контекста, другой хук читает его значение внутри компонента.'
    variants:
      - prompt: 'Оберните поддерево в провайдер темы. Впишите имя компонента-провайдера в открывающем теге.'
        template: |
          function App() {
            return (
              <ThemeContext.{{provider}} value="тёмная">
                <Panel />
              </ThemeContext.Provider>
            );
          }
        blanks:
          provider:
            accept: ['Provider']
      - prompt: 'Прочитайте контекст пользователя. Впишите функцию создания и хук чтения.'
        template: |
          const UserContext = {{create}}(null);

          function Profile() {
            const user = {{read}}(UserContext);
            return <span>{user?.name}</span>;
          }
        blanks:
          create:
            accept: ['createContext']
          read:
            accept: ['useContext']

  - id: uctx-nearest-predict-001
    concept: usecontext
    type: predict-output
    difficulty: 3
    prompt: 'Ветку A обернули в провайдер, ветку B оставили без провайдера. Оба компонента смонтированы. Что попадёт в консоль по порядку?'
    snippet: |
      const CityContext = createContext('Москва');

      function Branch({ label }) {
        const city = useContext(CityContext);
        useEffect(() => {
          console.log(label + ': ' + city);
        }, [label, city]);
        return null;
      }

      function App() {
        return (
          <>
            <CityContext.Provider value="Казань">
              <Branch label="A" />
            </CityContext.Provider>
            <Branch label="B" />
          </>
        );
      }
    expected:
      kind: stdout
      value: |-
        A: Казань
        B: Москва
    explanation: 'Ветка A читает ближайший провайдер выше по дереву и получает «Казань». Над веткой B провайдера нет, поэтому useContext возвращает значение по умолчанию «Москва». Эффекты выполняются в порядке монтирования: сначала A, потом B.'
    hints:
      - 'Значение берётся из ближайшего провайдера выше по дереву. А если провайдера над компонентом нет?'
      - 'Компоненты монтируются сверху вниз, и в том же порядке выполняются их эффекты.'
