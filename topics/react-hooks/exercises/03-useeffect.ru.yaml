exercises:
  - id: uef-cleanup-blanks-001
    concept: useeffect
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Эффект заводит интервал и пересоздаётся при смене delay. Впишите аргумент очистки и зависимость.'
    template: |
      useEffect(() => {
        const id = setInterval(tick, delay);
        return () => clearInterval({{clear}});
      }, [{{dep}}]);
    blanks:
      clear:
        accept: ['id']
      dep:
        accept: ['delay']
    explanation: 'Очистка отменяет ровно то, что эффект создал, - интервал id. Зависимость delay заставляет эффект пересоздать интервал при смене задержки.'
    hints:
      - 'Очистка должна отменить именно тот ресурс, который завёл эффект. Как он назван внутри?'
    variants:
      - prompt: 'Эффект подписывается на источник и пересоздаётся при его смене. Впишите метод очистки и зависимость.'
        template: |
          useEffect(() => {
            const sub = source.subscribe(handle);
            return () => sub.{{method}}();
          }, [{{dep}}]);
        blanks:
          method:
            accept: ['unsubscribe']
          dep:
            accept: ['source']
      - prompt: 'Эффект вешает слушатель на window. Впишите метод снятия слушателя и зависимость.'
        template: |
          useEffect(() => {
            window.addEventListener('resize', onResize);
            return () => window.{{method}}('resize', onResize);
          }, [{{dep}}]);
        blanks:
          method:
            accept: ['removeEventListener']
          dep:
            accept: ['onResize']

  - id: uef-order-predict-001
    concept: useeffect
    type: predict-output
    difficulty: 2
    prompt: 'Компонент смонтировали с id = 1, затем id изменился на 2, затем компонент размонтировали. Эффект зависит от id. Что попадёт в консоль по порядку?'
    snippet: |
      function Timer({ id }) {
        useEffect(() => {
          console.log('start ' + id);
          return () => console.log('stop ' + id);
        }, [id]);
        return null;
      }
    expected:
      kind: stdout
      value: |-
        start 1
        stop 1
        start 2
        stop 2
    explanation: 'При монтировании эффект печатает start 1. При смене id очистка старого эффекта (stop 1) идёт до нового эффекта (start 2). При размонтировании выполняется очистка последнего эффекта (stop 2).'
    hints:
      - 'При смене зависимости что выполняется раньше: очистка предыдущего эффекта или новый эффект?'
      - 'Каждое подключение эффект закрывает своей очисткой, в том числе при размонтировании.'
    variants:
      - prompt: 'Компонент смонтировали с id = 10, затем id менялся на 20 и на 30, затем компонент размонтировали. Что попадёт в консоль по порядку?'
        snippet: |
          function Timer({ id }) {
            useEffect(() => {
              console.log('start ' + id);
              return () => console.log('stop ' + id);
            }, [id]);
            return null;
          }
        expected:
          kind: stdout
          value: |-
            start 10
            stop 10
            start 20
            stop 20
            start 30
            stop 30
        explanation: 'Каждая смена id закрывает предыдущее подключение и открывает новое; при размонтировании закрывается последнее.'
      - prompt: 'Компонент смонтировали с id = 7, родитель перерисовался и передал тот же id = 7, затем компонент размонтировали. Что попадёт в консоль по порядку?'
        snippet: |
          function Timer({ id }) {
            useEffect(() => {
              console.log('start ' + id);
              return () => console.log('stop ' + id);
            }, [id]);
            return null;
          }
        expected:
          kind: stdout
          value: |-
            start 7
            stop 7
        explanation: 'Зависимость не изменилась (7 === 7), поэтому на перерисовке эффект не запускается заново. Очистка выполняется только при размонтировании.'

  - id: uef-two-effects-predict-001
    concept: useeffect
    type: predict-output
    difficulty: 3
    prompt: 'Компонент смонтировали с page = 1, затем page изменился на 2. Оба эффекта зависят от page. Что попадёт в консоль по порядку?'
    snippet: |
      function Panel({ page }) {
        useEffect(() => {
          console.log('A ' + page);
          return () => console.log('a ' + page);
        }, [page]);
        useEffect(() => {
          console.log('B ' + page);
          return () => console.log('b ' + page);
        }, [page]);
        return null;
      }
    expected:
      kind: stdout
      value: |-
        A 1
        B 1
        a 1
        b 1
        A 2
        B 2
    explanation: 'При монтировании эффекты запускаются сверху вниз: A 1, B 1. При обновлении React сначала выполняет все очистки в порядке объявления (a 1, b 1), а затем все новые эффекты (A 2, B 2).'
    hints:
      - 'На монтировании эффекты идут в порядке записи в компоненте.'
      - 'При обновлении сначала выполняются очистки всех эффектов, и только потом запускаются все новые эффекты.'
