exercises:
  - id: pf-what-is-preflight-001
    concept: simple-vs-preflight
    type: theory-quiz
    difficulty: 1
    prompt: "What is preflight in the context of CORS?"
    choices:
      - id: a
        text: "A preliminary `OPTIONS` request the browser sends on its own before a non-simple request to ask the server for permission."
      - id: b
        text: "The user's first successful request after login."
      - id: c
        text: "A request you manually write in code before every POST."
      - id: d
        text: "A server SSL certificate check before connecting."
    correct: [a]
    explanation: "Preflight is an automatic `OPTIONS` with no body. The browser sends it before a non-simple request and only sends the real request if the server responded with suitable headers."
    variants:
      - prompt: "How many round-trips does a simple request take versus one with preflight?"
        choices:
          - id: a
            text: "Simple: one round-trip; with preflight: two (OPTIONS question first, then the real request)."
          - id: b
            text: "Both exactly one round-trip."
          - id: c
            text: "Simple: two; with preflight: one."
          - id: d
            text: "Both three: request, check, response."
        correct: [a]
        explanation: "A simple request goes out immediately: one round-trip. Preflight adds a preliminary OPTIONS, so you get two round-trips."
      - prompt: "Who initiates the preflight request?"
        choices:
          - id: a
            text: "The browser, automatically, before sending the real request."
          - id: b
            text: "The developer, by explicitly calling `fetch` with method OPTIONS."
          - id: c
            text: "The server, in response to a suspicious request."
          - id: d
            text: "A proxy between the browser and backend."
        correct: [a]
        explanation: "The browser generates preflight without your code. You write a normal fetch; OPTIONS appears in the network panel on its own."

  - id: pf-simple-conditions-001
    concept: simple-vs-preflight
    type: theory-quiz
    difficulty: 2
    prompt: "Which request counts as simple (sent without preflight)?"
    choices:
      - id: a
        text: "GET with no custom headers."
      - id: b
        text: "PUT with a JSON body."
      - id: c
        text: "POST with header `Content-Type: application/json`."
      - id: d
        text: "GET with custom header `X-Api-Key`."
    correct: [a]
    explanation: "A simple request uses GET/HEAD/POST, headers from a narrow list, and Content-Type from three form-like types. GET with no custom headers satisfies all of that. PUT, JSON, and a custom header push the request into non-simple."
    variants:
      - prompt: "Which of these requests will require preflight?"
        choices:
          - id: a
            text: "DELETE to a foreign origin: DELETE is not in GET/HEAD/POST."
          - id: b
            text: "GET with no headers."
          - id: c
            text: "POST with `Content-Type: text/plain`."
          - id: d
            text: "HEAD with no headers."
        correct: [a]
        explanation: "Only GET, HEAD, and POST can be simple. DELETE is not among them, so it is always non-simple and requires preflight."
      - prompt: "Which `Content-Type` keeps POST simple (no preflight)?"
        choices:
          - id: a
            text: "`application/x-www-form-urlencoded`: one of the three form-like types."
          - id: b
            text: "`application/json`: common for REST."
          - id: c
            text: "`application/xml`."
          - id: d
            text: "`application/octet-stream`."
        correct: [a]
        explanation: "Only three body types are simple: `text/plain`, `application/x-www-form-urlencoded`, and `multipart/form-data`. `application/json` is not among them."

  - id: pf-json-trigger-001
    concept: simple-vs-preflight
    type: theory-quiz
    difficulty: 2
    prompt: "Why does a normal `POST` with a JSON body to a foreign origin almost always trigger preflight?"
    choices:
      - id: a
        text: "Because `Content-Type: application/json` is not among the three simple body types (text/plain, x-www-form-urlencoded, multipart/form-data)."
      - id: b
        text: "Because POST by itself is always non-simple."
      - id: c
        text: "Because a JSON body is too large for one round-trip."
      - id: d
        text: "Because the browser cannot serialize JSON without server permission."
    correct: [a]
    explanation: "POST is simple only with one of three form-like Content-Types. `application/json` is not among them, so such a POST becomes non-simple and requires preflight: the most common surprise OPTIONS cause."
    hints:
      - "POST can be simple by itself. What in this request falls outside the three allowed body types?"
      - "Compare `application/json` to the simple Content-Type list: it is not there."
    variants:
      - prompt: "Which change to a POST makes it non-simple (requires preflight)?"
        choices:
          - id: a
            text: "Add header `Authorization: Bearer ...`: a custom header pushes it out of simple."
          - id: b
            text: "Keep `Content-Type: text/plain` and a string body."
          - id: c
            text: "Switch the body to `application/x-www-form-urlencoded`."
          - id: d
            text: "Remove body and headers entirely."
        correct: [a]
        explanation: "`Authorization` is not on the narrow simple-request header list, so adding it makes POST non-simple. The other options stay within simple."
      - prompt: "Why does GET with header `X-Api-Key` go out with preflight even though GET is simple?"
        choices:
          - id: a
            text: "`X-Api-Key` is custom: not on the allowed simple list (Accept, Accept-Language, Content-Language, Content-Type)."
          - id: b
            text: "GET with any header is always non-simple."
          - id: c
            text: "Preflight is needed because of GET, not the header."
          - id: d
            text: "`X-Api-Key` is too long for a simple request."
        correct: [a]
        explanation: "Simplicity is not only about method: any header outside the narrow allowed list makes the request non-simple. `X-Api-Key` is not on the list, so preflight appears."

  - id: pf-preflight-headers-001
    concept: simple-vs-preflight
    type: theory-quiz
    difficulty: 3
    prompt: "Which two headers does the browser send in preflight (`OPTIONS`) to describe the upcoming real request?"
    choices:
      - id: a
        text: "`Access-Control-Request-Method` (future request method) and `Access-Control-Request-Headers` (its non-standard headers)."
      - id: b
        text: "`Access-Control-Allow-Methods` and `Access-Control-Allow-Headers`."
      - id: c
        text: "`Allow` and `Accept`."
      - id: d
        text: "`Access-Control-Max-Age` and `Access-Control-Allow-Origin`."
    correct: [a]
    explanation: "In preflight the browser asks with `Request-Method` and `Request-Headers`. The server answers with `Allow-Methods` and `Allow-Headers`: do not confuse the question side with the answer side."
    hints:
      - "Separate the browser side (question) from the server side (answer). In OPTIONS the browser lists what it plans to do."
      - "Headers with `Request` come from the browser; with `Allow` from the server. Preflight needs the first pair."

  - id: pf-max-age-001
    concept: simple-vs-preflight
    type: theory-quiz
    difficulty: 3
    prompt: "Why does the server send `Access-Control-Max-Age` in the preflight response?"
    choices:
      - id: a
        text: "So the browser caches the permission for that many seconds and skips OPTIONS before each repeat request of the same shape."
      - id: b
        text: "To limit how long the real request itself may live."
      - id: c
        text: "To set the TCP connection timeout to the server."
      - id: d
        text: "To say when the user session expires."
    correct: [a]
    explanation: "`Max-Age` is how long preflight permission is cached. While the cache is valid, repeat requests of the same shape skip a new OPTIONS. Browsers also cap the value internally."
    hints:
      - "Think what would be wasteful to do before every PUT, and what this header lets you skip."
      - "It is a cache: for how many seconds the browser may remember the server already approved this request shape."

  - id: pf-classify-trace-001
    concept: simple-vs-preflight
    type: predict-output
    difficulty: 2
    prompt: "The program decides simple vs non-simple by CORS rules. What does it print?"
    snippet: |
      SIMPLE_METHODS = {"GET", "HEAD", "POST"}
      SIMPLE_CONTENT_TYPES = {
          "text/plain",
          "application/x-www-form-urlencoded",
          "multipart/form-data",
      }

      def is_simple(method, content_type, custom_headers):
          if method not in SIMPLE_METHODS:
              return False
          if custom_headers:
              return False
          if content_type and content_type not in SIMPLE_CONTENT_TYPES:
              return False
          return True

      print(is_simple("POST", "application/json", []))
    expected:
      kind: stdout
      value: "False"
    hints:
      - "Walk the checks in order. Where does POST with JSON fail?"
      - "POST is allowed, no custom headers, but `application/json` is not in the simple type set."
    variants:
      - snippet: |
          SIMPLE_METHODS = {"GET", "HEAD", "POST"}
          SIMPLE_CONTENT_TYPES = {
              "text/plain",
              "application/x-www-form-urlencoded",
              "multipart/form-data",
          }

          def is_simple(method, content_type, custom_headers):
              if method not in SIMPLE_METHODS:
                  return False
              if custom_headers:
                  return False
              if content_type and content_type not in SIMPLE_CONTENT_TYPES:
                  return False
              return True

          print(is_simple("GET", None, []))
        expected:
          kind: stdout
          value: "True"
      - snippet: |
          SIMPLE_METHODS = {"GET", "HEAD", "POST"}
          SIMPLE_CONTENT_TYPES = {
              "text/plain",
              "application/x-www-form-urlencoded",
              "multipart/form-data",
          }

          def is_simple(method, content_type, custom_headers):
              if method not in SIMPLE_METHODS:
                  return False
              if custom_headers:
                  return False
              if content_type and content_type not in SIMPLE_CONTENT_TYPES:
                  return False
              return True

          print(is_simple("GET", None, ["X-Trace-Id"]))
        expected:
          kind: stdout
          value: "False"

  - id: pf-preflight-decision-trace-001
    concept: simple-vs-preflight
    type: predict-output
    difficulty: 3
    prompt: "The server checks requested method and headers against its lists in preflight. What does the program print?"
    snippet: |
      allow_methods = {"GET", "POST", "OPTIONS"}
      allow_headers = {"content-type"}

      def preflight_ok(req_method, req_headers):
          if req_method not in allow_methods:
              return False
          for h in req_headers:
              if h.lower() not in allow_headers:
                  return False
          return True

      print(preflight_ok("PUT", ["content-type"]))
    expected:
      kind: stdout
      value: "False"
    hints:
      - "The real request goes only if both method and all headers are covered. Is PUT in the allowed methods?"
      - "`PUT` is missing from `allow_methods`, so the check fails on the first condition."
    variants:
      - snippet: |
          allow_methods = {"GET", "POST", "OPTIONS"}
          allow_headers = {"content-type"}

          def preflight_ok(req_method, req_headers):
              if req_method not in allow_methods:
                  return False
              for h in req_headers:
                  if h.lower() not in allow_headers:
                      return False
              return True

          print(preflight_ok("POST", ["Content-Type"]))
        expected:
          kind: stdout
          value: "True"
      - snippet: |
          allow_methods = {"GET", "POST", "OPTIONS"}
          allow_headers = {"content-type"}

          def preflight_ok(req_method, req_headers):
              if req_method not in allow_methods:
                  return False
              for h in req_headers:
                  if h.lower() not in allow_headers:
                      return False
              return True

          print(preflight_ok("POST", ["Content-Type", "X-Api-Key"]))
        expected:
          kind: stdout
          value: "False"

  - id: pf-fill-simple-rules-001
    concept: simple-vs-preflight
    type: fill-in-blanks
    difficulty: 1
    prompt: "Fill in the conditions for a simple request."
    template: |
      A request is simple if the method is one of GET, {{m2}}, POST,
      and Content-Type is one of text/plain, multipart/form-data,
      or application/{{ct}}.
    blanks:
      m2:
        accept: ["HEAD", "head"]
      ct:
        accept: ["x-www-form-urlencoded"]
    hints:
      - "Three simple methods are read, light read without body, and form-like submit. Recall the third form-like Content-Type beside multipart and text/plain."
    variants:
      - template: |
          Before a non-simple request the browser sends a preliminary {{verb}} request
          called {{name}}.
        blanks:
          verb:
            accept: ["OPTIONS", "options"]
          name:
            accept: ["preflight"]
      - template: |
          The most common surprise preflight cause is Content-Type
          application/{{value}}.
        blanks:
          value:
            accept: ["json"]
