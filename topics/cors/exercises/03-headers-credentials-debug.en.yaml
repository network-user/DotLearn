exercises:
  - id: hdr-allow-origin-001
    concept: headers-credentials-debug
    type: theory-quiz
    difficulty: 1
    prompt: "What does the response header `Access-Control-Allow-Origin` do?"
    choices:
      - id: a
        text: "Names which origin the browser may let read the response body."
      - id: b
        text: "Lists methods allowed in preflight."
      - id: c
        text: "Turns on sending cookies with a cross-domain request."
      - id: d
        text: "Sets which response headers JavaScript will see."
    correct: [a]
    explanation: "`Allow-Origin` answers who may receive the response. The browser compares it to request `Origin` and without a match does not give the body to the script. Methods, cookies, and visible headers use other headers."
    variants:
      - prompt: "Which response header lets your JavaScript READ a custom header like `X-Total-Count`?"
        choices:
          - id: a
            text: "`Access-Control-Expose-Headers`."
          - id: b
            text: "`Access-Control-Allow-Headers`."
          - id: c
            text: "`Access-Control-Allow-Origin`."
          - id: d
            text: "`Access-Control-Request-Headers`."
        correct: [a]
        explanation: "`Expose-Headers` names response headers JavaScript may see. `Allow-Headers` is for preflight (which request headers may be sent): a different side."
      - prompt: "Which response header controls whether cookies may be sent with a cross-domain request and the response read with them?"
        choices:
          - id: a
            text: "`Access-Control-Allow-Credentials`."
          - id: b
            text: "`Access-Control-Allow-Origin`."
          - id: c
            text: "`Set-Cookie`."
          - id: d
            text: "`Access-Control-Max-Age`."
        correct: [a]
        explanation: "`Allow-Credentials: true` from the server paired with `credentials: \"include\"` from the client enables cookies. `Set-Cookie` only sets cookies; it does not grant CORS send rights."

  - id: hdr-credentials-star-001
    concept: headers-credentials-debug
    type: theory-quiz
    difficulty: 2
    prompt: "The request uses `credentials: \"include\"`. Why can the server not respond with `Access-Control-Allow-Origin: *`?"
    choices:
      - id: a
        text: "With credentials an asterisk is forbidden: giving a private cookie response to anyone is unsafe, so the server must name a specific origin."
      - id: b
        text: "An asterisk is not supported by modern browsers at all."
      - id: c
        text: "With credentials you must list all origins comma-separated, not use `*`."
      - id: d
        text: "An asterisk works only for GET; credentials exist only on POST."
    correct: [a]
    explanation: "With `credentials: \"include\"` the browser requires a specific origin and `Allow-Credentials: true`. `*` would mean a private cookie response is available to any origin: nonsense from a security standpoint."
    hints:
      - "An asterisk means anyone. Combine that with private cookies now in the response."
      - "Is it safe to give a session-bound response to any origin without discrimination?"

  - id: hdr-fix-side-001
    concept: headers-credentials-debug
    type: theory-quiz
    difficulty: 2
    prompt: "You hit a CORS error in the browser. On which side do you fix it?"
    choices:
      - id: a
        text: "On the server: permission comes in response headers. Request headers (except asking for credentials) open nothing."
      - id: b
        text: "On the client: add the right headers to `fetch`."
      - id: c
        text: "In the browser: disable the check in settings."
      - id: d
        text: "On the proxy between client and server by changing request headers."
    correct: [a]
    explanation: "CORS is how the data-owning server allows reading its response. The browser only enforces. No request header opens CORS: permission physically arrives only in the server response."
    hints:
      - "Who owns the data and therefore decides who gets it: client or server?"
      - "Permission arrives in response headers. What does that imply about which side to fix?"

  - id: hdr-expose-headers-001
    concept: headers-credentials-debug
    type: theory-quiz
    difficulty: 3
    prompt: "Network panel shows response header `X-Total-Count`, but `response.headers.get(\"X-Total-Count\")` returns `null`. Why?"
    choices:
      - id: a
        text: "By default JS sees only a few safe response headers; a custom one becomes available only if the server lists it in `Access-Control-Expose-Headers`."
      - id: b
        text: "It is a fetch bug: read the header via `XMLHttpRequest`."
      - id: c
        text: "The header never arrived: Network shows phantom headers."
      - id: d
        text: "Add it to `Access-Control-Allow-Headers`."
    correct: [a]
    explanation: "The browser got the header (hence Network), but by default only shows scripts a safe list. Custom headers need `Expose-Headers`. `Allow-Headers` is different (request headers in preflight)."
    hints:
      - "The header physically arrived: otherwise Network would not show it. The question is what JS is allowed to see."
      - "There is a separate response header where the server exposes custom headers for JS reading. Do not confuse it with `Allow-Headers`."

  - id: hdr-reflect-whitelist-001
    concept: headers-credentials-debug
    type: theory-quiz
    difficulty: 3
    prompt: "A server must serve several allowed domains. Why does it not list them in `Allow-Origin` but reflect the request `Origin`?"
    choices:
      - id: a
        text: "`Allow-Origin` accepts either one origin or `*`, no comma list; so the server checks `Origin` against an allowlist and returns the match as a single value."
      - id: b
        text: "Reflecting origin is faster than listing on the browser side."
      - id: c
        text: "Browsers ignore `Allow-Origin` with more than one domain and take the first."
      - id: d
        text: "A domain list in `Allow-Origin` is visible to users; reflection hides it."
    correct: [a]
    explanation: "The header carries exactly one origin or `*`. For multiple domains the server keeps an allowlist, checks incoming `Origin`, and if allowed reflects it back as one value. Reflecting without allowlist check is a vulnerability."
    hints:
      - "How many values does `Allow-Origin` physically accept? That dictates why comma lists fail."
      - "If you cannot list them, you dynamically substitute one correct origin. Where does the server get the candidate?"

  - id: hdr-error-to-fix-trace-001
    concept: headers-credentials-debug
    type: predict-output
    difficulty: 3
    prompt: "The program maps CORS error text to the header that needs fixing. What does it print?"
    snippet: |
      fix_for = {
          "no-allow-origin": "Access-Control-Allow-Origin",
          "method-not-allowed": "Access-Control-Allow-Methods",
          "header-not-allowed": "Access-Control-Allow-Headers",
          "wildcard-with-credentials": "Access-Control-Allow-Credentials",
      }

      print(fix_for["method-not-allowed"])
    expected:
      kind: stdout
      value: "Access-Control-Allow-Methods"
    hints:
      - "The error method ... is not allowed names the response header responsible."
      - "Methods are allowed in preflight via `Allow-Methods`: that is what the dict returns."
    variants:
      - snippet: |
          fix_for = {
              "no-allow-origin": "Access-Control-Allow-Origin",
              "method-not-allowed": "Access-Control-Allow-Methods",
              "header-not-allowed": "Access-Control-Allow-Headers",
              "wildcard-with-credentials": "Access-Control-Allow-Credentials",
          }

          print(fix_for["header-not-allowed"])
        expected:
          kind: stdout
          value: "Access-Control-Allow-Headers"
      - snippet: |
          fix_for = {
              "no-allow-origin": "Access-Control-Allow-Origin",
              "method-not-allowed": "Access-Control-Allow-Methods",
              "header-not-allowed": "Access-Control-Allow-Headers",
              "wildcard-with-credentials": "Access-Control-Allow-Credentials",
          }

          print(fix_for["no-allow-origin"])
        expected:
          kind: stdout
          value: "Access-Control-Allow-Origin"

  - id: hdr-origin-match-trace-001
    concept: headers-credentials-debug
    type: predict-output
    difficulty: 2
    prompt: "The browser compares request `Origin` to `Allow-Origin` character by character. What does the program print?"
    snippet: |
      request_origin = "https://app.example.com"
      allow_origin = "http://app.example.com"

      print(request_origin == allow_origin)
    expected:
      kind: stdout
      value: "False"
    hints:
      - "Comparison is strict, character by character. Walk the start of both strings."
      - "Schemes differ: `https` vs `http`. That alone makes them unequal."
    variants:
      - snippet: |
          request_origin = "https://app.example.com"
          allow_origin = "https://app.example.com"

          print(request_origin == allow_origin)
        expected:
          kind: stdout
          value: "True"
      - snippet: |
          request_origin = "https://app.example.com"
          allow_origin = "https://app.example.com/"

          print(request_origin == allow_origin)
        expected:
          kind: stdout
          value: "False"

  - id: hdr-fill-credentials-001
    concept: headers-credentials-debug
    type: fill-in-blanks
    difficulty: 1
    prompt: "Fill in the blanks about cookies in CORS."
    template: |
      For cookies on a cross-domain request, the client sets
      credentials: "{{client}}", and the server responds with
      Access-Control-Allow-Credentials: {{server}}.
    blanks:
      client:
        accept: ["include"]
      server:
        accept: ["true"]
    hints:
      - "Both sides are needed: client asks, server allows. Recall the fetch option value and the boolean header value."
    variants:
      - template: |
          With credentials an asterisk in Allow-Origin is {{verb}}:
          the server must name a {{what}} origin.
        blanks:
          verb:
            accept: ["forbidden", "not allowed", "disallowed"]
          what:
            accept: ["specific", "exact", "named", "concrete"]
      - template: |
          JavaScript will not see custom response headers until the server
          lists them in Access-Control-{{header}}.
        blanks:
          header:
            accept: ["Expose-Headers", "expose-headers"]

  - id: hdr-diagnose-challenge-001
    concept: headers-credentials-debug
    type: theory-quiz
    difficulty: 4
    prompt: "Frontend at `https://app.example.com` sends `fetch` with `credentials: \"include\"`. The server returns `Access-Control-Allow-Origin: *` and `Access-Control-Allow-Credentials: true`. The request fails with a CORS error. What is wrong and how to fix it?"
    choices:
      - id: a
        text: "With credentials `Allow-Origin` cannot be `*`: return specific `https://app.example.com` (e.g. reflect a checked `Origin`), keeping `Allow-Credentials: true`."
      - id: b
        text: "Remove `Allow-Credentials: true`: with an asterisk it is redundant and then cookies work."
      - id: c
        text: "Add `Access-Control-Allow-Origin` on the client request: that resolves the conflict."
      - id: d
        text: "Switch to GET: with GET asterisk and credentials are compatible."
    correct: [a]
    explanation: "Conflict of `*` with credentials. With `credentials: \"include\"` the browser requires a specific origin; fix on the server by setting `https://app.example.com` in `Allow-Origin`. Removing `Allow-Credentials` drops cookies; request headers grant no permission; method is irrelevant."
    hints:
      - "Collect three conditions for credentials and check each: what the client asks, what the server must return for origin, and the credentials flag itself."
      - "Asterisk and credentials are incompatible. Which response header must you rewrite without losing cookie support?"

  - id: hdr-masked-error-challenge-001
    concept: headers-credentials-debug
    type: theory-quiz
    difficulty: 4
    prompt: "A cross-domain `fetch` fails with a CORS error, but CORS on the server seems correct and worked before. What non-obvious cause should you check first?"
    choices:
      - id: a
        text: "The server may be down (502/504): the error response had no CORS headers, so the browser masks the real status as a CORS error; check server availability."
      - id: b
        text: "The browser cached an old preflight permission: wait a day."
      - id: c
        text: "The client forgot to add `Allow-Origin` to request headers."
      - id: d
        text: "The JSON body grew too large and preflight rejected it by size."
    correct: [a]
    explanation: "A dead server (502/504) sends no CORS headers; for a cross-domain request the browser shows not the real status but a rejected promise that looks like CORS. Check that the server responds before editing CORS config."
    hints:
      - "A CORS error is not always a CORS config problem. What happens to response headers if the server never formed a normal response?"
      - "For a cross-domain request, how does a 502 without CORS headers look to the browser: does the script see the real status?"
