exercises:
  - id: py-cors-what-quiz-001
    concept: cors-python
    type: theory-quiz
    difficulty: 1
    prompt: "Чем в FastAPI настраивают CORS?"
    choices:
      - id: a
        text: "Подключают `CORSMiddleware` из Starlette через `app.add_middleware(...)` и задают ему параметры."
      - id: b
        text: "Пишут обработчик метода OPTIONS для каждого маршрута вручную, полностью минуя CORSMiddleware."
      - id: c
        text: "Добавляют заголовки к запросу на стороне клиента в `fetch`, полностью минуя CORSMiddleware."
      - id: d
        text: "Включают отдельный флаг в конфиге браузера сразу, без промежуточного состояния."
    correct: [a]
    explanation: "CORS в FastAPI это middleware. Подключают `CORSMiddleware` из Starlette, а его параметры ложатся на заголовки ответа `Access-Control-*`. Ручной обработчик OPTIONS и правки на клиенте не нужны."
    variants:
      - prompt: "Какому заголовку ответа соответствует параметр `allow_origins` у `CORSMiddleware`?"
        choices:
          - id: a
            text: "`Access-Control-Allow-Origin`."
          - id: b
            text: "`Access-Control-Allow-Methods`."
          - id: c
            text: "`Access-Control-Allow-Headers`."
          - id: d
            text: "`Access-Control-Expose-Headers`."
        correct: [a]
        explanation: "`allow_origins` задаёт список origin для заголовка `Access-Control-Allow-Origin`. Методы и заголовки настраиваются отдельными параметрами."
      - prompt: "Чем настраивают CORS в Django?"
        choices:
          - id: a
            text: "Ставят пакет `django-cors-headers` и настраивают его через `settings.py`."
          - id: b
            text: "CORS встроен в Django и включается одной строкой в `urls.py`."
          - id: c
            text: "Пишут собственный декоратор на каждый view сразу, без промежуточного состояния."
          - id: d
            text: "Меняют заголовки в шаблоне HTML, полностью минуя django-cors-headers."
        correct: [a]
        explanation: "В Django CORS не встроен: используют пакет `django-cors-headers`, который даёт своё middleware и настройки `CORS_*` в `settings.py`."

  - id: py-cors-params-fill-001
    concept: cors-python
    type: fill-in-blanks
    difficulty: 1
    prompt: "Заполните настройку CORSMiddleware в FastAPI."
    template: |
      app.add_middleware(
          CORSMiddleware,
          allow_origins=["https://app.example.com"],
          allow_{{param}}=["GET", "POST"],
          allow_credentials={{cred}},
      )
    blanks:
      param:
        accept: ["methods"]
      cred:
        accept: ["True"]
    hints:
      - "Список HTTP-методов ложится на заголовок Allow-Methods. А чтобы разрешить cookie, ставят булево значение Python (с заглавной буквы)."
    variants:
      - template: |
          Чтобы cookie ездили с кросс-доменным запросом, ставят
          allow_credentials=True, а origin в FastAPI указывают
          {{how}} вместо звёздочки.
        blanks:
          how:
            accept: ["явно", "поимённо", "точно", "конкретно", "списком"]
      - template: |
          В Django пакет django-cors-headers читает список точных origin
          из настройки CORS_ALLOWED_{{name}}.
        blanks:
          name:
            accept: ["ORIGINS", "origins"]

  - id: py-cors-star-cred-001
    concept: cors-python
    type: theory-quiz
    difficulty: 2
    prompt: "Почему `allow_origins=[\"*\"]` вместе с `allow_credentials=True` в FastAPI ломает запросы с credentials?"
    choices:
      - id: a
        text: "Браузер отвергает `Access-Control-Allow-Origin: *` для запроса с credentials: нужен конкретный origin."
      - id: b
        text: "`CORSMiddleware` при таком сочетании не запускается вовсе."
      - id: c
        text: "Звёздочка допустима только для GET, а credentials бывают лишь у POST."
      - id: d
        text: "Ошибка возникает, потому что `allow_credentials` нужно указывать строкой, а не булевым значением."
    correct: [a]
    explanation: "Это та же несовместимость звёздочки и credentials, что и на уровне заголовков. При `credentials: \"include\"` браузер требует конкретный origin; звёздочка запрещена. Чинится явным перечислением origin, а не отключением credentials."
    hints:
      - "Вспомните правило со звёздочкой из прошлого раздела: что браузер требует в `Allow-Origin`, когда в игре cookie?"
      - "Параметр `allow_origins` напрямую задаёт `Allow-Origin`. Что там окажется при `[\"*\"]` и почему это несовместимо с credentials?"
    variants:
      - prompt: "Как в FastAPI правильно разрешить credentials для нескольких известных доменов?"
        choices:
          - id: a
            text: "Перечислить их явным списком в `allow_origins` и оставить `allow_credentials=True`."
          - id: b
            text: "Поставить `allow_origins=[\"*\"]` и `allow_credentials=True`."
          - id: c
            text: "Указать домены через запятую одной строкой: `allow_origins=\"a.com, b.com\"`."
          - id: d
            text: "Включить `allow_credentials=True` и не задавать `allow_origins` вовсе."
        correct: [a]
        explanation: "`allow_origins` принимает список конкретных origin. Middleware само сверит `Origin` запроса со списком и отразит подходящий. Звёздочка с credentials несовместима, а строка через запятую не является списком origin."
      - prompt: "Запрос идёт с credentials. Какой ответ middleware браузер примет?"
        choices:
          - id: a
            text: "`Allow-Origin: https://app.example.com` и `Allow-Credentials: true`."
          - id: b
            text: "`Allow-Origin: *` и `Allow-Credentials: true`, полностью минуя middleware."
          - id: c
            text: "`Allow-Origin: *` без `Allow-Credentials` сразу, без промежуточного состояния."
          - id: d
            text: "Ответ без заголовка `Allow-Origin` вообще сразу, без промежуточного состояния."
        correct: [a]
        explanation: "С credentials браузер требует конкретный origin плюс `Allow-Credentials: true`. Любой вариант со звёздочкой при credentials будет отклонён."

  - id: py-cors-regex-preview-001
    concept: cors-python
    type: theory-quiz
    difficulty: 2
    prompt: "У превью-деплоев домен динамический (`https://pr-42.preview.example.com`). Как разрешить их в FastAPI, не открывая доступ всем?"
    choices:
      - id: a
        text: "Задать `allow_origin_regex` с заякоренным шаблоном под превью-домены: middleware пропустит подошедший origin и отразит его, что совместимо с credentials."
      - id: b
        text: "Поставить `allow_origins=[\"*\"]` - другого способа для динамических доменов нет без какого-либо шага, связанного с allow_origin_regex."
      - id: c
        text: "Перечислить все возможные номера pull request заранее в `allow_origins` без какого-либо шага, связанного с allow_origin_regex."
      - id: d
        text: "Отключить CORS для превью-стенда полностью сразу, без промежуточного состояния и без дополнительных проверок."
    correct: [a]
    explanation: "`allow_origin_regex` создан ровно для этого: динамические поддомены не перечислить списком, а звёздочка небезопасна и несовместима с credentials. Регэксп отражает конкретный origin, поэтому credentials работают."
    variants:
      - prompt: "Что опасно в шаблоне `allow_origin_regex=r\"https://pr-\\d+.preview.example.com\"`?"
        choices:
          - id: a
            text: "Точки не заэкранированы: `.` в регэкспе значит «любой символ», поэтому шаблон пропустит и `pr-1xpreviewYexample.com`."
          - id: b
            text: "`\\d+` слишком медленный и вызовет зависание без какого-либо шага, связанного с pr-1xpreviewYexample.com."
          - id: c
            text: "Ничего опасного, шаблон корректен сразу, без промежуточного состояния и без дополнительных проверок."
          - id: d
            text: "Регэксп нельзя использовать вместе с `allow_credentials`, полностью минуя pr-1xpreviewYexample.com."
        correct: [a]
        explanation: "Незаэкранированная точка совпадает с любым символом. Чтобы шаблон не пропускал чужие домены, точки экранируют (`\\.`) и якорят границы."
      - prompt: "Есть ли в Django аналог `allow_origin_regex` из FastAPI?"
        choices:
          - id: a
            text: "Да, настройка `CORS_ALLOWED_ORIGIN_REGEXES` со списком регэкспов."
          - id: b
            text: "Нет, в Django только точный список `CORS_ALLOWED_ORIGINS`."
          - id: c
            text: "Нет, регэкспы поддерживает только Starlette."
          - id: d
            text: "Да, но она называется `CORS_ORIGIN_WILDCARD`."
        correct: [a]
        explanation: "`django-cors-headers` даёт `CORS_ALLOWED_ORIGIN_REGEXES` - прямой аналог `allow_origin_regex`. Те же правила якорения и экранирования точек в силе."

  - id: py-cors-middleware-order-001
    concept: cors-python
    type: theory-quiz
    difficulty: 3
    prompt: "В FastAPI ответ с редиректом или ошибкой иногда приходит в браузер без заголовков `Access-Control-*`. Как это связано с порядком middleware?"
    choices:
      - id: a
        text: "Заголовок появляется только на ответе, прошедшем через CORS-слой."
      - id: b
        text: "FastAPI намеренно не добавляет CORS-заголовки к ответам со статусом >= 400."
      - id: c
        text: "Порядок middleware ни на что не влияет: заголовки всегда добавляются в самом конце ко всем ответам."
      - id: d
        text: "Нужно вручную писать обработчик OPTIONS, иначе редиректы уходят без CORS."
    correct: [a]
    explanation: "CORS-заголовки штампует слой, и только на проходящих через него ответах. Если ответ сформирован выше по стеку, чем CORS, заголовков на нём нет. В FastAPI самым внешним оказывается последний добавленный `add_middleware`, поэтому порядок подключения решает, кого CORS оборачивает."
    hints:
      - "Заголовок добавляет конкретный слой. Что происходит с ответом, который вообще не прошёл через этот слой?"
      - "Подумайте, где рождается ответ-редирект или 500 относительно вашего CORS-слоя: внутри него или снаружи?"

  - id: py-cors-django-place-001
    concept: cors-python
    type: theory-quiz
    difficulty: 3
    prompt: "Где в списке `MIDDLEWARE` ставят `corsheaders.middleware.CorsMiddleware` и почему?"
    choices:
      - id: a
        text: "Как можно выше, перед `CommonMiddleware`. Django собирает ответ снизу вверх, поэтому верхнее middleware оборачивает нижние."
      - id: b
        text: "В самом конце списка, чтобы CORS применялся последним ко всем ответам, полностью минуя CommonMiddleware."
      - id: c
        text: "Место в списке не важно, важны только `CORS_ALLOWED_ORIGINS` ещё до любых других проверок на этом пути."
      - id: d
        text: "Строго ниже `CommonMiddleware`, чтобы не мешать формированию редиректов сразу, без промежуточного состояния."
    correct: [a]
    explanation: "`CorsMiddleware` ставят высоко, перед `CommonMiddleware`. Порядок в `MIDDLEWARE` определяет вложенность: верхнее оборачивает нижние. Если CORS ниже `CommonMiddleware`, сформированный тем редирект уедет без `Access-Control-*`, и браузер увидит CORS-ошибку."
    hints:
      - "Django обрабатывает запрос сверху вниз, а ответ собирает снизу вверх. Что из этого следует про то, кто кого оборачивает?"
      - "`CommonMiddleware` умеет сам вернуть редирект. Чтобы на этом ответе оказались CORS-заголовки, CORS должен стоять выше или ниже него?"

  - id: py-cors-allowlist-predict-001
    concept: cors-python
    type: predict-output
    difficulty: 2
    prompt: "Функция моделирует, что middleware положит в `Allow-Origin`: отражает origin из белого списка, иначе не ставит заголовок. Что выведет программа?"
    snippet: |
      ALLOWED = {"https://app.example.com", "https://admin.example.com"}

      def allow_origin(origin):
          if origin in ALLOWED:
              return origin
          return None

      print(allow_origin("https://app.example.com"))
    expected:
      kind: stdout
      value: "https://app.example.com"
    hints:
      - "Проверьте, есть ли переданный origin в множестве ALLOWED, символ в символ."
      - "`https://app.example.com` присутствует в ALLOWED, поэтому функция вернёт его же."
    variants:
      - snippet: |
          ALLOWED = {"https://app.example.com", "https://admin.example.com"}

          def allow_origin(origin):
              if origin in ALLOWED:
                  return origin
              return None

          print(allow_origin("http://app.example.com"))
        expected:
          kind: stdout
          value: "None"
      - snippet: |
          ALLOWED = {"https://app.example.com", "https://admin.example.com"}

          def allow_origin(origin):
              if origin in ALLOWED:
                  return origin
              return None

          print(allow_origin("https://evil.example.com"))
        expected:
          kind: stdout
          value: "None"

  - id: py-cors-double-headers-predict-001
    concept: cors-python
    type: predict-output
    difficulty: 3
    prompt: "Прокси и приложение независимо добавили один и тот же заголовок. Функция сливает наборы заголовков, соединяя одноимённые через запятую. Что выведет программа?"
    snippet: |
      proxy_headers = {"Access-Control-Allow-Origin": "https://app.example.com"}
      app_headers = {"Access-Control-Allow-Origin": "https://app.example.com"}

      def combine(a, b):
          merged = dict(a)
          for key, value in b.items():
              if key in merged:
                  merged[key] = merged[key] + ", " + value
              else:
                  merged[key] = value
          return merged

      print(combine(proxy_headers, app_headers)["Access-Control-Allow-Origin"])
    expected:
      kind: stdout
      value: "https://app.example.com, https://app.example.com"
    hints:
      - "Ключ `Access-Control-Allow-Origin` уже есть в merged после `dict(a)`. Что делает ветка `if key in merged` со вторым значением?"
      - "Одноимённый заголовок не заменяется, а склеивается через `, `. Именно такой двойной заголовок браузер и отвергает."

  - id: py-cors-double-outage-001
    concept: cors-python
    type: theory-quiz
    difficulty: 4
    prompt: "После добавления `add_header Access-Control-Allow-Origin ...` на nginx все кросс-доменные запросы в проде сломались с ошибкой про «multiple values», хотя CORS в приложении не трогали. Что произошло и как чинить?"
    choices:
      - id: a
        text: "Теперь CORS выдают оба слоя: и приложение, и прокси."
      - id: b
        text: "nginx закэшировал старый ответ; сбросьте кэш и подождите."
      - id: c
        text: "Нужно добавить второй `Allow-Credentials`, чтобы значения сложились корректно."
      - id: d
        text: "Ошибка на клиенте: добавьте `Allow-Origin` в заголовки запроса `fetch`."
    correct: [a]
    explanation: "Классическая авария двойных заголовков. Приложение уже отдавало `Allow-Origin`, а nginx стал добавлять свой. Браузер видит несколько значений в одном заголовке, что запрещено, и отклоняет все запросы. Каждый слой по отдельности был верен; ломается их сумма. Лечится тем, что CORS владеет ровно один слой."
    hints:
      - "Сколько значений теперь в заголовке `Allow-Origin`, если его добавили и приложение, и прокси? Сколько разрешено спецификацией?"
      - "Каждый слой поодиночке настроен верно. Значит проблема не в значении, а в том, что заголовок присылают дважды. Что нужно сделать с одним из слоёв?"

  - id: py-cors-diagnose-001
    concept: cors-python
    type: theory-quiz
    difficulty: 4
    prompt: "Фронтенд `https://app.example.com` шлёт `fetch` с `credentials: \"include\"` к FastAPI, где стоит `allow_origins=[\"*\"]`, `allow_credentials=True`. Запросы падают с CORS-ошибкой. В чём причина и как чинить в конфиге middleware?"
    choices:
      - id: a
        text: "При credentials браузер отвергает `Allow-Origin: *`. Замените `allow_origins=[\"*\"]` на явный список `[\"https://app.example.com\"]` (или `allow_origin_regex` для превью), оставив `allow_credentials=True`."
      - id: b
        text: "Уберите `allow_credentials=True` - со звёздочкой он лишний, и cookie поедут сами сразу, без промежуточного состояния и без дополнительных проверок сразу, без промежуточного состояния и без дополнительных проверок."
      - id: c
        text: "Смените метод на GET: со звёздочкой credentials работают только для GET сразу, без промежуточного состояния и без дополнительных проверок."
      - id: d
        text: "Добавьте `allow_methods=[\"*\"]` - это снимает конфликт звёздочки с credentials сразу, без промежуточного состояния и без дополнительных проверок."
    correct: [a]
    explanation: "Конфликт звёздочки с credentials на уровне middleware. Браузер при `credentials: \"include\"` требует конкретный origin, поэтому `allow_origins` меняют на явный список (или регэксп для динамических доменов), сохранив `allow_credentials=True`. Убирать credentials нельзя - тогда cookie не поедут; метод и `allow_methods` тут ни при чём."
    hints:
      - "Соберите условия для credentials: что браузер требует в `Allow-Origin`, и что сейчас туда кладёт `allow_origins=[\"*\"]`?"
      - "Чинится заменой одного параметра middleware без потери поддержки cookie. Какого именно и на что?"
