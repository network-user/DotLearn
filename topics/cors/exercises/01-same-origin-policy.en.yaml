exercises:
  - id: sop-origin-triple-001
    concept: same-origin-policy
    type: theory-quiz
    difficulty: 1
    prompt: "From which three parts of a URL does the browser build an origin?"
    choices:
      - id: a
        text: "Scheme, host, and port."
      - id: b
        text: "Host, path, and query parameters."
      - id: c
        text: "Domain, path, and fragment after `#`."
      - id: d
        text: "Scheme, host, and path."
    correct: [a]
    explanation: "Origin is the triple scheme + host + port. Path, query, and fragment are not part of origin: two URLs share an origin when all three parts match."
    variants:
      - prompt: "Which part of a URL does NOT affect what origin it is?"
        choices:
          - id: a
            text: "Path (`/cart`, `/products`) — it is not part of origin."
          - id: b
            text: "Scheme (`http` vs `https`)."
          - id: c
            text: "Host (`shop.example.com`)."
          - id: d
            text: "Port (`443` vs `8443`)."
        correct: [a]
        explanation: "Path, query, and fragment are not in origin. Only scheme, host, and port define it."
      - prompt: "Two URLs belong to the same origin under what condition?"
        choices:
          - id: a
            text: "When all three parts match: scheme, host, and port."
          - id: b
            text: "When at least the host matches."
          - id: c
            text: "When they are owned by the same company."
          - id: d
            text: "When they share a registrable domain (e.g. `example.com`)."
        correct: [a]
        explanation: "The browser does not care about ownership. It compares three fields; any mismatch makes the origins different."

  - id: sop-same-or-not-001
    concept: same-origin-policy
    type: theory-quiz
    difficulty: 2
    prompt: "The reference point is `https://shop.example.com`. Which address does the browser treat as the SAME origin?"
    choices:
      - id: a
        text: "`https://shop.example.com/products` — only the path differs."
      - id: b
        text: "`http://shop.example.com` — different scheme."
      - id: c
        text: "`https://api.example.com` — different subdomain."
      - id: d
        text: "`https://shop.example.com:8443` — different port."
    correct: [a]
    explanation: "Path is not in origin, so `/products` is the same origin. The others differ in scheme, host, or port and are foreign."
    variants:
      - prompt: "The reference point is `https://example.com`. Which address is a FOREIGN origin to the browser?"
        choices:
          - id: a
            text: "`https://www.example.com` — host differs by `www`."
          - id: b
            text: "`https://example.com/login` — different path."
          - id: c
            text: "`https://example.com/?ref=ad` — different query."
          - id: d
            text: "`https://example.com#top` — different fragment."
        correct: [a]
        explanation: "`www.example.com` is a different host, hence a different origin. Path, query, and fragment do not change origin."
      - prompt: "The reference point is `http://localhost:3000`. Which address is the SAME origin to the browser?"
        choices:
          - id: a
            text: "`http://localhost:3000/api/users` — only the path differs."
          - id: b
            text: "`http://localhost:8080` — different port."
          - id: c
            text: "`https://localhost:3000` — different scheme."
          - id: d
            text: "`http://127.0.0.1:3000` — different host (`127.0.0.1` is not `localhost`)."
        correct: [a]
        explanation: "Only the path differs; scheme, host, and port match — same origin. Port 8080, https scheme, and host 127.0.0.1 each alone make the origin foreign."

  - id: sop-blocks-read-001
    concept: same-origin-policy
    type: theory-quiz
    difficulty: 2
    prompt: "What exactly does same-origin policy limit on a cross-domain request?"
    choices:
      - id: a
        text: "Reading the response from JavaScript: the request goes out and runs, but the script cannot get the body without server permission."
      - id: b
        text: "Sending the request: the browser never allows contacting a foreign origin."
      - id: c
        text: "Both sending and reading — a foreign origin is fully unreachable."
      - id: d
        text: "Running the request on the server: the foreign server never receives it."
    correct: [a]
    explanation: "The request goes out and the server handles it. The policy intercepts the response on the way back and does not give it to the script if the origin is foreign and the server did not allow reading."
    hints:
      - "Think of `<img src>` pointing at a foreign host: the request still goes. What is actually forbidden?"
      - "Separate sending the request from reading the response as data — the policy cuts exactly one of those."
    variants:
      - prompt: "A script on `evil.com` runs `fetch(\"https://bank.com/balance\")` while you are logged into the bank. What happens?"
        choices:
          - id: a
            text: "The request goes out, bank cookies are attached, the server responds — but the browser does not give the body to evil.com: origins differ and there is no permission."
          - id: b
            text: "The browser blocks the request; it never reaches bank.com."
          - id: c
            text: "The script reads the balance freely because cookies were attached."
          - id: d
            text: "Bank cookies are not attached, so the server returns an auth error."
        correct: [a]
        explanation: "The request reaches the server and cookies go automatically. Same-origin policy blocks reading the response: request origin (evil.com) does not equal response origin (bank.com)."
      - prompt: "What happens if JavaScript tries to read pixels from a canvas that drew a foreign-origin image?"
        choices:
          - id: a
            text: "Pixel reads are blocked: the canvas becomes tainted because data came from a foreign origin without permission."
          - id: b
            text: "Pixels read freely — the image did render."
          - id: c
            text: "The browser never allows drawing a foreign image on canvas."
          - id: d
            text: "It works, but only in incognito mode."
        correct: [a]
        explanation: "Loading and drawing a foreign image is allowed; reading its bytes is not — the canvas is marked tainted. Same boundary: apply the resource vs read its data."

  - id: sop-not-covered-001
    concept: same-origin-policy
    type: theory-quiz
    difficulty: 3
    prompt: "Why does `<script src=\"https://other.com/lib.js\">` load and run a foreign file even though same-origin policy exists?"
    choices:
      - id: a
        text: "Loading and applying a resource vs reading its contents as data are different permissions; the policy blocks the second while img/link/script loading often stays open."
      - id: b
        text: "`<script>` tags completely ignore same-origin policy in every form."
      - id: c
        text: "The browser treats any `<script src>` as the same origin as the page."
      - id: d
        text: "The script first passes preflight, which allows it."
    correct: [a]
    explanation: "The browser loads and applies images, styles, and scripts from any origin but you cannot read their bytes from JS. JSONP once relied on `<script>` executing in your context."
    hints:
      - "The script runs — but can you read its source from JS? Those are two different rights."
      - "The policy closes reading a foreign response as data. Loading and applying a resource is not under that ban."

  - id: sop-not-csrf-001
    concept: same-origin-policy
    type: theory-quiz
    difficulty: 3
    prompt: "A script on `evil.com` sends POST to `bank.com/transfer` and the transfer executes on the server. Did same-origin policy protect against the transfer itself?"
    choices:
      - id: a
        text: "No: the request reached the server and ran. The policy only hides the response; it does not stop the side effect — CSRF needs separate measures."
      - id: b
        text: "Yes: the policy blocks POST to a foreign origin, so no transfer happens."
      - id: c
        text: "Yes: bank cookies are not attached, so the server rejects the request."
      - id: d
        text: "No, because POST to a foreign origin is impossible from the browser."
    correct: [a]
    explanation: "Same-origin policy protects response confidentiality, not request execution. State-changing operations need CSRF tokens and SameSite cookies."
    hints:
      - "The policy intercepts the response, not the request. If the server already ran it, what did the policy prevent?"
      - "Hiding a balance and preventing a transfer are different guarantees. CSRF is about the second."

  - id: sop-subdomain-trace-001
    concept: same-origin-policy
    type: predict-output
    difficulty: 2
    prompt: "This program models origin as a triple (scheme, host, port) and compares two addresses. What does it print?"
    snippet: |
      def origin(scheme, host, port):
          return (scheme, host, port)

      app = origin("https", "app.example.com", 443)
      api = origin("https", "api.example.com", 443)

      print(app == api)
    expected:
      kind: stdout
      value: "False"
    hints:
      - "Subdomains are different origins. Compare the triples field by field: which field differs?"
      - "Host `app.example.com` is not `api.example.com`, so the triples are not equal."
    variants:
      - snippet: |
          def origin(scheme, host, port):
              return (scheme, host, port)

          base = origin("https", "shop.example.com", 443)
          page = origin("https", "shop.example.com", 443)

          print(base == page)
        expected:
          kind: stdout
          value: "True"
      - snippet: |
          def origin(scheme, host, port):
              return (scheme, host, port)

          secure = origin("https", "example.com", 443)
          plain = origin("http", "example.com", 80)

          print(secure == plain)
        expected:
          kind: stdout
          value: "False"

  - id: sop-classify-trace-001
    concept: same-origin-policy
    type: predict-output
    difficulty: 3
    prompt: "The program counts how many addresses in the list share the same origin as `page`. What does it print?"
    snippet: |
      page = ("https", "example.com", 443)

      candidates = [
          ("https", "example.com", 443),
          ("http", "example.com", 80),
          ("https", "www.example.com", 443),
          ("https", "example.com", 8080),
      ]

      same = sum(1 for c in candidates if c == page)
      print(same)
    expected:
      kind: stdout
      value: "1"
    hints:
      - "Same origin means the full triple matches. Walk the list and note where at least one field differs."
      - "Only the first candidate matches all three fields. The others differ in scheme, host, or port."

  - id: sop-fill-origin-001
    concept: same-origin-policy
    type: fill-in-blanks
    difficulty: 1
    prompt: "Fill in the blanks in the rule: what makes up an origin and what is excluded."
    template: |
      Origin is the triple: {{part1}}, host, and {{part3}}.
      Path and query are {{included}} in origin.
    blanks:
      part1:
        accept: ["scheme"]
      part3:
        accept: ["port"]
      included:
        accept: ["not included", "not part of", "excluded", "not counted"]
        accept_regex: '^(not\s+(included|part of|counted)|excluded)$'
    hints:
      - "List the three fields the browser compares. Two are named at the edges of the blanks."
    variants:
      - template: |
          For `https://shop.example.com:443/cart`: scheme is {{scheme}}, host is {{host}}, port is {{port}}.
        blanks:
          scheme:
            accept: ["https"]
          host:
            accept: ["shop.example.com"]
          port:
            accept: ["443"]
      - template: |
          Subdomains are {{relation}} origins, so a frontend and API on different subdomains {{requirement}} CORS.
        blanks:
          relation:
            accept: ["different", "distinct", "separate", "foreign"]
          requirement:
            accept: ["require", "need"]
            accept_regex: '^(require|need)s?$'
