exercises:
  - id: py-cors-what-quiz-001
    concept: cors-python
    type: theory-quiz
    difficulty: 1
    prompt: "How is CORS configured in FastAPI?"
    choices:
      - id: a
        text: "You add Starlette's `CORSMiddleware` via `app.add_middleware(...)` and give it parameters."
      - id: b
        text: "You write an OPTIONS handler for every route by hand."
      - id: c
        text: "You add headers to the request on the client side in `fetch`."
      - id: d
        text: "You enable a separate flag in the browser config."
    correct: [a]
    explanation: "CORS in FastAPI is middleware. You add Starlette's `CORSMiddleware`, and its parameters map onto the `Access-Control-*` response headers. A manual OPTIONS handler and client-side changes are not needed."
    variants:
      - prompt: "Which response header does the `CORSMiddleware` parameter `allow_origins` map to?"
        choices:
          - id: a
            text: "`Access-Control-Allow-Origin`."
          - id: b
            text: "`Access-Control-Allow-Methods`."
          - id: c
            text: "`Access-Control-Allow-Headers`."
          - id: d
            text: "`Access-Control-Expose-Headers`."
        correct: [a]
        explanation: "`allow_origins` sets the list of origins for the `Access-Control-Allow-Origin` header. Methods and headers are configured by separate parameters."
      - prompt: "How is CORS configured in Django?"
        choices:
          - id: a
            text: "You install the `django-cors-headers` package and configure it via `settings.py`."
          - id: b
            text: "CORS is built into Django and enabled with one line in `urls.py`."
          - id: c
            text: "You write a custom decorator on every view."
          - id: d
            text: "You change headers in the HTML template."
        correct: [a]
        explanation: "CORS is not built into Django: you use the `django-cors-headers` package, which provides its own middleware and `CORS_*` settings in `settings.py`."

  - id: py-cors-params-fill-001
    concept: cors-python
    type: fill-in-blanks
    difficulty: 1
    prompt: "Fill in the FastAPI CORSMiddleware setup."
    template: |
      app.add_middleware(
          CORSMiddleware,
          allow_origins=["https://app.example.com"],
          allow_{{param}}=["GET", "POST"],
          allow_credentials={{cred}},
      )
    blanks:
      param:
        accept: ["methods"]
      cred:
        accept: ["True"]
    hints:
      - "A list of HTTP methods maps to the Allow-Methods header. To allow cookies, you set a Python boolean (capitalized)."
    variants:
      - template: |
          For cookies to travel with a cross-domain request, you set
          allow_credentials=True, and in FastAPI you name the origin
          {{how}} instead of a wildcard.
        blanks:
          how:
            accept: ["explicitly", "specifically", "concretely"]
      - template: |
          In Django the django-cors-headers package reads the list of
          exact origins from the CORS_ALLOWED_{{name}} setting.
        blanks:
          name:
            accept: ["ORIGINS", "origins"]

  - id: py-cors-star-cred-001
    concept: cors-python
    type: theory-quiz
    difficulty: 2
    prompt: "Why does `allow_origins=[\"*\"]` together with `allow_credentials=True` in FastAPI break requests with credentials?"
    choices:
      - id: a
        text: "The browser rejects `Access-Control-Allow-Origin: *` for a request with credentials: it needs a specific origin. The wildcard breaks precisely the requests you enabled credentials for."
      - id: b
        text: "`CORSMiddleware` does not start at all with this combination."
      - id: c
        text: "A wildcard is allowed only for GET, and credentials exist only on POST."
      - id: d
        text: "The error occurs because `allow_credentials` must be given as a string, not a boolean."
    correct: [a]
    explanation: "This is the same wildcard-and-credentials incompatibility as at the header level. With `credentials: \"include\"` the browser requires a specific origin; a wildcard is forbidden. It is fixed by listing origins explicitly, not by dropping credentials."
    hints:
      - "Recall the wildcard rule from the previous section: what does the browser require in `Allow-Origin` when cookies are in play?"
      - "The `allow_origins` parameter directly sets `Allow-Origin`. What ends up there with `[\"*\"]` and why is it incompatible with credentials?"
    variants:
      - prompt: "How do you correctly allow credentials for several known domains in FastAPI?"
        choices:
          - id: a
            text: "List them explicitly in `allow_origins` and keep `allow_credentials=True`."
          - id: b
            text: "Set `allow_origins=[\"*\"]` and `allow_credentials=True`."
          - id: c
            text: "Give the domains comma-separated in one string: `allow_origins=\"a.com, b.com\"`."
          - id: d
            text: "Set `allow_credentials=True` and do not set `allow_origins` at all."
        correct: [a]
        explanation: "`allow_origins` takes a list of specific origins. The middleware itself checks the request `Origin` against the list and reflects the match. A wildcard with credentials is incompatible, and a comma-separated string is not a list of origins."
      - prompt: "A request comes with credentials. Which middleware response will the browser accept?"
        choices:
          - id: a
            text: "`Allow-Origin: https://app.example.com` and `Allow-Credentials: true`."
          - id: b
            text: "`Allow-Origin: *` and `Allow-Credentials: true`."
          - id: c
            text: "`Allow-Origin: *` without `Allow-Credentials`."
          - id: d
            text: "A response with no `Allow-Origin` header at all."
        correct: [a]
        explanation: "With credentials the browser requires a specific origin plus `Allow-Credentials: true`. Any wildcard variant with credentials is rejected."

  - id: py-cors-regex-preview-001
    concept: cors-python
    type: theory-quiz
    difficulty: 2
    prompt: "Preview deploys have a dynamic domain (`https://pr-42.preview.example.com`). How do you allow them in FastAPI without opening access to everyone?"
    choices:
      - id: a
        text: "Set `allow_origin_regex` with an anchored pattern for the preview domains: the middleware lets a matching origin through and reflects it, which is compatible with credentials."
      - id: b
        text: "Set `allow_origins=[\"*\"]` - there is no other way for dynamic domains."
      - id: c
        text: "List all possible pull request numbers ahead of time in `allow_origins`."
      - id: d
        text: "Disable CORS for the preview environment entirely."
    correct: [a]
    explanation: "`allow_origin_regex` exists for exactly this: dynamic subdomains cannot be listed, and a wildcard is unsafe and incompatible with credentials. The regex reflects a specific origin, so credentials work."
    variants:
      - prompt: "What is dangerous in the pattern `allow_origin_regex=r\"https://pr-\\d+.preview.example.com\"`?"
        choices:
          - id: a
            text: "The dots are not escaped: `.` in a regex means any character, so the pattern also lets `pr-1xpreviewYexample.com` through."
          - id: b
            text: "`\\d+` is too slow and will cause a hang."
          - id: c
            text: "Nothing is dangerous, the pattern is correct."
          - id: d
            text: "A regex cannot be used together with `allow_credentials`."
        correct: [a]
        explanation: "An unescaped dot matches any character. To keep the pattern from letting foreign domains through, escape the dots (`\\.`) and anchor the boundaries."
      - prompt: "Does Django have an analogue of FastAPI's `allow_origin_regex`?"
        choices:
          - id: a
            text: "Yes, the `CORS_ALLOWED_ORIGIN_REGEXES` setting with a list of regexes."
          - id: b
            text: "No, Django only has the exact list `CORS_ALLOWED_ORIGINS`."
          - id: c
            text: "No, only Starlette supports regexes."
          - id: d
            text: "Yes, but it is called `CORS_ORIGIN_WILDCARD`."
        correct: [a]
        explanation: "`django-cors-headers` provides `CORS_ALLOWED_ORIGIN_REGEXES`, a direct analogue of `allow_origin_regex`. The same rules of anchoring and escaping dots apply."

  - id: py-cors-middleware-order-001
    concept: cors-python
    type: theory-quiz
    difficulty: 3
    prompt: "In FastAPI a redirect or error response sometimes reaches the browser without `Access-Control-*` headers. How is this related to middleware order?"
    choices:
      - id: a
        text: "The header appears only on a response that passed through the CORS layer. A response born outside that layer (in an outer middleware or an error handler) leaves without CORS headers."
      - id: b
        text: "FastAPI deliberately omits CORS headers on responses with status >= 400."
      - id: c
        text: "Middleware order affects nothing: headers are always added at the very end to all responses."
      - id: d
        text: "You must write an OPTIONS handler by hand, otherwise redirects leave without CORS."
    correct: [a]
    explanation: "CORS headers are stamped by the layer, and only on responses passing through it. If a response is formed higher up the stack than CORS, it carries no headers. In FastAPI the outermost turns out to be the last added `add_middleware`, so the order of registration decides who CORS wraps."
    hints:
      - "A specific layer adds the header. What happens to a response that never passed through that layer at all?"
      - "Think about where a redirect or 500 response is born relative to your CORS layer: inside it or outside it?"

  - id: py-cors-django-place-001
    concept: cors-python
    type: theory-quiz
    difficulty: 3
    prompt: "Where in the `MIDDLEWARE` list do you put `corsheaders.middleware.CorsMiddleware`, and why?"
    choices:
      - id: a
        text: "As high as possible, before `CommonMiddleware`. Django assembles the response bottom to top, so higher middleware wraps lower ones; otherwise a response from `CommonMiddleware` (for example, an `APPEND_SLASH` redirect) leaves without CORS headers."
      - id: b
        text: "At the very end of the list, so CORS applies last to all responses."
      - id: c
        text: "The place in the list does not matter, only `CORS_ALLOWED_ORIGINS` does."
      - id: d
        text: "Strictly below `CommonMiddleware`, so as not to interfere with forming redirects."
    correct: [a]
    explanation: "`CorsMiddleware` goes high, before `CommonMiddleware`. The order in `MIDDLEWARE` sets the nesting: higher wraps lower. If CORS is below `CommonMiddleware`, a redirect it forms leaves without `Access-Control-*`, and the browser sees a CORS error."
    hints:
      - "Django processes the request top to bottom and assembles the response bottom to top. What does that imply about who wraps whom?"
      - "`CommonMiddleware` can return a redirect itself. For CORS headers to land on that response, should CORS sit above or below it?"

  - id: py-cors-allowlist-predict-001
    concept: cors-python
    type: predict-output
    difficulty: 2
    prompt: "The function models what the middleware puts in `Allow-Origin`: it reflects an origin from the allowlist, otherwise it sets no header. What does the program print?"
    snippet: |
      ALLOWED = {"https://app.example.com", "https://admin.example.com"}

      def allow_origin(origin):
          if origin in ALLOWED:
              return origin
          return None

      print(allow_origin("https://app.example.com"))
    expected:
      kind: stdout
      value: "https://app.example.com"
    hints:
      - "Check whether the passed origin is in the ALLOWED set, character for character."
      - "`https://app.example.com` is present in ALLOWED, so the function returns it."
    variants:
      - snippet: |
          ALLOWED = {"https://app.example.com", "https://admin.example.com"}

          def allow_origin(origin):
              if origin in ALLOWED:
                  return origin
              return None

          print(allow_origin("http://app.example.com"))
        expected:
          kind: stdout
          value: "None"
      - snippet: |
          ALLOWED = {"https://app.example.com", "https://admin.example.com"}

          def allow_origin(origin):
              if origin in ALLOWED:
                  return origin
              return None

          print(allow_origin("https://evil.example.com"))
        expected:
          kind: stdout
          value: "None"

  - id: py-cors-double-headers-predict-001
    concept: cors-python
    type: predict-output
    difficulty: 3
    prompt: "The proxy and the app independently added the same header. The function merges header sets, joining same-named ones with a comma. What does the program print?"
    snippet: |
      proxy_headers = {"Access-Control-Allow-Origin": "https://app.example.com"}
      app_headers = {"Access-Control-Allow-Origin": "https://app.example.com"}

      def combine(a, b):
          merged = dict(a)
          for key, value in b.items():
              if key in merged:
                  merged[key] = merged[key] + ", " + value
              else:
                  merged[key] = value
          return merged

      print(combine(proxy_headers, app_headers)["Access-Control-Allow-Origin"])
    expected:
      kind: stdout
      value: "https://app.example.com, https://app.example.com"
    hints:
      - "The key `Access-Control-Allow-Origin` is already in merged after `dict(a)`. What does the `if key in merged` branch do with the second value?"
      - "A same-named header is not replaced but joined with `, `. This is exactly the double header the browser rejects."

  - id: py-cors-double-outage-001
    concept: cors-python
    type: theory-quiz
    difficulty: 4
    prompt: "After adding `add_header Access-Control-Allow-Origin ...` on nginx, all cross-domain requests in production broke with a \"multiple values\" error, even though CORS in the app was untouched. What happened and how do you fix it?"
    choices:
      - id: a
        text: "Now both layers issue CORS: the app and the proxy. `Allow-Origin` arrives with several values, and the browser rejects the response. Keep CORS in exactly one layer: drop it from either nginx or the app."
      - id: b
        text: "nginx cached the old response; clear the cache and wait."
      - id: c
        text: "You need to add a second `Allow-Credentials` so the values combine correctly."
      - id: d
        text: "The error is on the client: add `Allow-Origin` to the `fetch` request headers."
    correct: [a]
    explanation: "The classic double-header outage. The app already returned `Allow-Origin`, and nginx started adding its own. The browser sees several values in one header, which is forbidden, and rejects all requests. Each layer alone was correct; their sum breaks. It is fixed by having exactly one layer own CORS."
    hints:
      - "How many values are now in the `Allow-Origin` header if both the app and the proxy add it? How many does the spec allow?"
      - "Each layer alone is configured correctly. So the problem is not the value but that the header is sent twice. What do you do with one of the layers?"

  - id: py-cors-diagnose-001
    concept: cors-python
    type: theory-quiz
    difficulty: 4
    prompt: "The frontend `https://app.example.com` sends `fetch` with `credentials: \"include\"` to FastAPI, where `allow_origins=[\"*\"]`, `allow_credentials=True`. Requests fail with a CORS error. What is the cause and how do you fix it in the middleware config?"
    choices:
      - id: a
        text: "With credentials the browser rejects `Allow-Origin: *`. Replace `allow_origins=[\"*\"]` with an explicit list `[\"https://app.example.com\"]` (or `allow_origin_regex` for previews), keeping `allow_credentials=True`."
      - id: b
        text: "Remove `allow_credentials=True` - with a wildcard it is redundant, and cookies will travel by themselves."
      - id: c
        text: "Switch the method to GET: with a wildcard, credentials work only for GET."
      - id: d
        text: "Add `allow_methods=[\"*\"]` - that removes the wildcard-credentials conflict."
    correct: [a]
    explanation: "The wildcard-credentials conflict at the middleware level. With `credentials: \"include\"` the browser requires a specific origin, so `allow_origins` becomes an explicit list (or a regex for dynamic domains) while `allow_credentials=True` stays. You cannot drop credentials - then cookies would not travel; the method and `allow_methods` are irrelevant here."
    hints:
      - "Collect the conditions for credentials: what does the browser require in `Allow-Origin`, and what does `allow_origins=[\"*\"]` put there now?"
      - "It is fixed by replacing one middleware parameter without losing cookie support. Which one, and with what?"
