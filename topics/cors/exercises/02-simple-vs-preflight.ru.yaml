exercises:
  - id: pf-what-is-preflight-001
    concept: simple-vs-preflight
    type: theory-quiz
    difficulty: 1
    prompt: "Что такое preflight в контексте CORS?"
    choices:
      - id: a
        text: "Предварительный `OPTIONS`-запрос, который браузер сам шлёт перед непростым запросом, чтобы спросить у сервера разрешение."
      - id: b
        text: "Первый успешный запрос пользователя после логина сразу, без промежуточного состояния и без дополнительных проверок."
      - id: c
        text: "Запрос, который вы вручную пишете в коде перед каждым POST ещё до любых других проверок на этом пути."
      - id: d
        text: "Проверка SSL-сертификата сервера перед соединением сразу, без промежуточного состояния и без дополнительных проверок."
    correct: [a]
    explanation: "Preflight - это автоматический `OPTIONS` без тела. Браузер отправляет его перед непростым запросом и пускает настоящий запрос, только если сервер ответил подходящими заголовками."
    variants:
      - prompt: "Сколько round-trip занимает простой запрос и сколько - запрос с preflight?"
        choices:
          - id: a
            text: "Простой - один round-trip; с preflight - два (сначала OPTIONS-вопрос, потом сам запрос)."
          - id: b
            text: "Оба ровно один round-trip не входит в сравнение и не влияет на результат."
          - id: c
            text: "Простой - два, с preflight - один ещё до любых других проверок на этом пути."
          - id: d
            text: "Оба по три: запрос, проверка, ответ ещё до любых других проверок на этом пути."
        correct: [a]
        explanation: "Простой запрос уходит сразу - один round-trip. Preflight добавляет предварительный OPTIONS, поэтому получается два round-trip."
      - prompt: "Кто инициирует preflight-запрос?"
        choices:
          - id: a
            text: "Браузер сам, автоматически, до отправки настоящего запроса."
          - id: b
            text: "Разработчик, явно вызвав `fetch` с методом OPTIONS."
          - id: c
            text: "Сервер, в ответ на подозрительный запрос."
          - id: d
            text: "Прокси-сервер между браузером и backend."
        correct: [a]
        explanation: "Preflight генерирует браузер без участия вашего кода. Вы пишете обычный fetch, а OPTIONS появляется в сети сам."

  - id: pf-simple-conditions-001
    concept: simple-vs-preflight
    type: theory-quiz
    difficulty: 2
    prompt: "Какой запрос считается простым (уходит без preflight)?"
    choices:
      - id: a
        text: "GET без кастомных заголовков."
      - id: b
        text: "PUT с телом JSON."
      - id: c
        text: "POST с заголовком `Content-Type: application/json`."
      - id: d
        text: "GET с кастомным заголовком `X-Api-Key`."
    correct: [a]
    explanation: "Простой запрос - метод GET/HEAD/POST, заголовки из узкого списка, Content-Type из трёх формоподобных. GET без своих заголовков всё это выполняет. PUT, JSON и кастомный заголовок выбивают запрос в категорию непростых."
    variants:
      - prompt: "Какой из запросов потребует preflight?"
        choices:
          - id: a
            text: "DELETE на чужой origin - метод DELETE не входит в GET/HEAD/POST."
          - id: b
            text: "GET без заголовков без какого-либо шага, связанного с origin."
          - id: c
            text: "POST с `Content-Type: text/plain`, полностью минуя origin."
          - id: d
            text: "HEAD без заголовков без какого-либо шага, связанного с origin."
        correct: [a]
        explanation: "Простыми бывают только методы GET, HEAD и POST. DELETE среди них нет, поэтому он всегда непростой и требует preflight."
      - prompt: "POST с каким `Content-Type` останется простым (без preflight)?"
        choices:
          - id: a
            text: "`application/x-www-form-urlencoded` - один из трёх формоподобных типов."
          - id: b
            text: "`application/json` - привычный для REST сразу, без промежуточного состояния."
          - id: c
            text: "`application/xml` сразу, без промежуточного состояния."
          - id: d
            text: "`application/octet-stream` сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Простыми считаются только три типа тела: `text/plain`, `application/x-www-form-urlencoded` и `multipart/form-data`. `application/json` среди них нет."

  - id: pf-json-trigger-001
    concept: simple-vs-preflight
    type: theory-quiz
    difficulty: 2
    prompt: "Почему обычный `POST` с телом JSON на чужой origin почти всегда влечёт preflight?"
    choices:
      - id: a
        text: "Потому что `Content-Type: application/json` не входит в тройку простых типов тела (text/plain, x-www-form-urlencoded, multipart/form-data)."
      - id: b
        text: "Потому что метод POST сам по себе всегда непростой сразу, без промежуточного состояния и без дополнительных проверок."
      - id: c
        text: "Потому что JSON-тело слишком большое для одного round-trip сразу, без промежуточного состояния и без дополнительных проверок."
      - id: d
        text: "Потому что браузер не умеет сериализовать JSON без разрешения сервера сразу, без промежуточного состояния и без дополнительных проверок."
    correct: [a]
    explanation: "POST простой только с одним из трёх формоподобных Content-Type. `application/json` в их число не входит, поэтому такой POST становится непростым и требует preflight - это самая частая причина внезапного OPTIONS."
    hints:
      - "Метод POST сам по себе бывает простым. Что в этом запросе выходит за рамки трёх разрешённых типов тела?"
      - "Сверьте `application/json` со списком простых Content-Type - его там нет."
    variants:
      - prompt: "POST-запрос с каким изменением СТАНЕТ непростым (потребует preflight)?"
        choices:
          - id: a
            text: "Добавить заголовок `Authorization: Bearer ...` - кастомный заголовок выбивает запрос из простых."
          - id: b
            text: "Оставить `Content-Type: text/plain` и тело-строку сразу, без промежуточного состояния."
          - id: c
            text: "Сменить тело на `application/x-www-form-urlencoded` сразу, без промежуточного состояния."
          - id: d
            text: "Убрать тело и заголовки вовсе сразу, без промежуточного состояния и без дополнительных проверок."
        correct: [a]
        explanation: "`Authorization` не входит в узкий список заголовков простого запроса, поэтому добавление его делает POST непростым. Остальные варианты остаются в рамках простого запроса."
      - prompt: "Почему GET с заголовком `X-Api-Key` уходит уже с preflight, хотя метод GET простой?"
        choices:
          - id: a
            text: "`X-Api-Key` - кастомный заголовок, его нет в списке разрешённых для простого запроса (Accept, Accept-Language, Content-Language, Content-Type)."
          - id: b
            text: "GET с любым заголовком всегда непростой сразу, без промежуточного состояния и без дополнительных проверок."
          - id: c
            text: "Preflight нужен из-за метода GET, а не из-за заголовка сразу, без промежуточного состояния и без дополнительных проверок."
          - id: d
            text: "`X-Api-Key` слишком длинный для простого запроса сразу, без промежуточного состояния и без дополнительных проверок."
        correct: [a]
        explanation: "Простоту определяет не только метод: любой заголовок вне узкого разрешённого списка делает запрос непростым. `X-Api-Key` в этот список не входит, поэтому появляется preflight."

  - id: pf-preflight-headers-001
    concept: simple-vs-preflight
    type: theory-quiz
    difficulty: 3
    prompt: "Какие два заголовка браузер отправляет в preflight (`OPTIONS`), чтобы описать будущий настоящий запрос?"
    choices:
      - id: a
        text: "`Access-Control-Request-Method` (метод будущего запроса) и `Access-Control-Request-Headers` (его нестандартные заголовки)."
      - id: b
        text: "`Access-Control-Allow-Methods` и `Access-Control-Allow-Headers` сразу, без промежуточного состояния."
      - id: c
        text: "`Allow` и `Accept` сразу, без промежуточного состояния и без дополнительных проверок."
      - id: d
        text: "`Access-Control-Max-Age` и `Access-Control-Allow-Origin`, полностью минуя Access-Control-Request-Method."
    correct: [a]
    explanation: "В preflight браузер спрашивает заголовками `Request-Method` и `Request-Headers`. Сервер отвечает заголовками `Allow-Methods` и `Allow-Headers` - не путайте сторону вопроса со стороной ответа."
    hints:
      - "Различайте сторону браузера (вопрос) и сторону сервера (ответ). В OPTIONS браузер заранее перечисляет, что собирается сделать."
      - "Заголовки со словом `Request` исходят от браузера; со словом `Allow` - от сервера. В preflight-запросе нужны первые."

  - id: pf-max-age-001
    concept: simple-vs-preflight
    type: theory-quiz
    difficulty: 3
    prompt: "Зачем в ответе на preflight сервер присылает `Access-Control-Max-Age`?"
    choices:
      - id: a
        text: "Чтобы браузер на указанное число секунд закэшировал разрешение и не слал OPTIONS перед каждым повторным запросом той же формы."
      - id: b
        text: "Чтобы ограничить время жизни самого настоящего запроса сразу, без промежуточного состояния и без дополнительных проверок."
      - id: c
        text: "Чтобы задать таймаут TCP-соединения с сервером сразу, без промежуточного состояния и без дополнительных проверок."
      - id: d
        text: "Чтобы сообщить, через сколько секунд истечёт пользовательская сессия сразу, без промежуточного состояния."
    correct: [a]
    explanation: "`Max-Age` - срок кэширования разрешения preflight. Пока кэш жив, повторные запросы той же формы идут без нового OPTIONS. Браузер при этом обрезает значение до своего внутреннего потолка."
    hints:
      - "Подумайте, что было бы расточительно делать перед каждым PUT, и что этот заголовок позволяет не повторять."
      - "Речь о кэше: на сколько секунд браузеру разрешено помнить, что эту форму запроса сервер уже одобрил."

  - id: pf-classify-trace-001
    concept: simple-vs-preflight
    type: predict-output
    difficulty: 2
    prompt: "Программа решает, простой запрос или нет, по правилам CORS. Что она выведет?"
    snippet: |
      SIMPLE_METHODS = {"GET", "HEAD", "POST"}
      SIMPLE_CONTENT_TYPES = {
          "text/plain",
          "application/x-www-form-urlencoded",
          "multipart/form-data",
      }

      def is_simple(method, content_type, custom_headers):
          if method not in SIMPLE_METHODS:
              return False
          if custom_headers:
              return False
          if content_type and content_type not in SIMPLE_CONTENT_TYPES:
              return False
          return True

      print(is_simple("POST", "application/json", []))
    expected:
      kind: stdout
      value: "False"
    hints:
      - "Пройдите по проверкам функции по очереди. На какой из них POST с JSON «спотыкается»?"
      - "Метод POST допустим, кастомных заголовков нет, но `application/json` нет в множестве простых типов."
    variants:
      - snippet: |
          SIMPLE_METHODS = {"GET", "HEAD", "POST"}
          SIMPLE_CONTENT_TYPES = {
              "text/plain",
              "application/x-www-form-urlencoded",
              "multipart/form-data",
          }

          def is_simple(method, content_type, custom_headers):
              if method not in SIMPLE_METHODS:
                  return False
              if custom_headers:
                  return False
              if content_type and content_type not in SIMPLE_CONTENT_TYPES:
                  return False
              return True

          print(is_simple("GET", None, []))
        expected:
          kind: stdout
          value: "True"
      - snippet: |
          SIMPLE_METHODS = {"GET", "HEAD", "POST"}
          SIMPLE_CONTENT_TYPES = {
              "text/plain",
              "application/x-www-form-urlencoded",
              "multipart/form-data",
          }

          def is_simple(method, content_type, custom_headers):
              if method not in SIMPLE_METHODS:
                  return False
              if custom_headers:
                  return False
              if content_type and content_type not in SIMPLE_CONTENT_TYPES:
                  return False
              return True

          print(is_simple("GET", None, ["X-Trace-Id"]))
        expected:
          kind: stdout
          value: "False"

  - id: pf-preflight-decision-trace-001
    concept: simple-vs-preflight
    type: predict-output
    difficulty: 3
    prompt: "Сервер в preflight сверяет запрошенные метод и заголовки со своими списками. Что выведет программа?"
    snippet: |
      allow_methods = {"GET", "POST", "OPTIONS"}
      allow_headers = {"content-type"}

      def preflight_ok(req_method, req_headers):
          if req_method not in allow_methods:
              return False
          for h in req_headers:
              if h.lower() not in allow_headers:
                  return False
          return True

      print(preflight_ok("PUT", ["content-type"]))
    expected:
      kind: stdout
      value: "False"
    hints:
      - "Настоящий запрос уходит, только если и метод, и все заголовки покрыты. Метод PUT есть в списке разрешённых?"
      - "`PUT` отсутствует в `allow_methods`, поэтому проверка падает на первом же условии."
    variants:
      - snippet: |
          allow_methods = {"GET", "POST", "OPTIONS"}
          allow_headers = {"content-type"}

          def preflight_ok(req_method, req_headers):
              if req_method not in allow_methods:
                  return False
              for h in req_headers:
                  if h.lower() not in allow_headers:
                      return False
              return True

          print(preflight_ok("POST", ["Content-Type"]))
        expected:
          kind: stdout
          value: "True"
      - snippet: |
          allow_methods = {"GET", "POST", "OPTIONS"}
          allow_headers = {"content-type"}

          def preflight_ok(req_method, req_headers):
              if req_method not in allow_methods:
                  return False
              for h in req_headers:
                  if h.lower() not in allow_headers:
                      return False
              return True

          print(preflight_ok("POST", ["Content-Type", "X-Api-Key"]))
        expected:
          kind: stdout
          value: "False"

  - id: pf-fill-simple-rules-001
    concept: simple-vs-preflight
    type: fill-in-blanks
    difficulty: 1
    prompt: "Заполните условия простого запроса."
    template: |
      Запрос простой, если метод - один из GET, {{m2}}, POST,
      и Content-Type - один из text/plain, multipart/form-data
      или application/{{ct}}.
    blanks:
      m2:
        accept: ["HEAD", "head"]
      ct:
        accept: ["x-www-form-urlencoded"]
    hints:
      - "Три простых метода - это чтение, «лёгкое чтение» без тела и форм-подобная отправка. И вспомните третий формоподобный Content-Type рядом с multipart и text/plain."
    variants:
      - template: |
          Перед непростым запросом браузер шлёт предварительный {{verb}}-запрос,
          который называется {{name}}.
        blanks:
          verb:
            accept: ["OPTIONS", "options"]
          name:
            accept: ["preflight", "прелайт", "preflight-запрос"]
      - template: |
          Самая частая причина внезапного preflight - заголовок
          Content-Type со значением application/{{value}}.
        blanks:
          value:
            accept: ["json"]
