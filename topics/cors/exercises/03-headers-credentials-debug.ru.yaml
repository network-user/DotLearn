exercises:
  - id: hdr-allow-origin-001
    concept: headers-credentials-debug
    type: theory-quiz
    difficulty: 1
    prompt: "За что отвечает заголовок ответа `Access-Control-Allow-Origin`?"
    choices:
      - id: a
        text: "Указывает, какому origin браузер разрешит прочитать тело ответа."
      - id: b
        text: "Перечисляет методы, разрешённые в preflight."
      - id: c
        text: "Включает отправку cookie с кросс-доменным запросом."
      - id: d
        text: "Задаёт, какие заголовки ответа увидит JavaScript."
    correct: [a]
    explanation: "`Allow-Origin` отвечает на вопрос «кому отдавать ответ». Браузер сравнивает его с `Origin` запроса и без совпадения не отдаёт тело скрипту. За методы, cookie и видимые заголовки отвечают другие заголовки."
    variants:
      - prompt: "Какой заголовок ответа разрешает вашему JavaScript ПРОЧИТАТЬ кастомный заголовок вроде `X-Total-Count`?"
        choices:
          - id: a
            text: "`Access-Control-Expose-Headers`."
          - id: b
            text: "`Access-Control-Allow-Headers`."
          - id: c
            text: "`Access-Control-Allow-Origin`."
          - id: d
            text: "`Access-Control-Request-Headers`."
        correct: [a]
        explanation: "`Expose-Headers` называет заголовки ответа, которые увидит JS. `Allow-Headers` - про preflight (какие заголовки можно слать в запросе), это другая сторона."
      - prompt: "Какой заголовок ответа решает, разрешено ли слать cookie с кросс-доменным запросом и читать ответ с ними?"
        choices:
          - id: a
            text: "`Access-Control-Allow-Credentials`."
          - id: b
            text: "`Access-Control-Allow-Origin`."
          - id: c
            text: "`Set-Cookie`."
          - id: d
            text: "`Access-Control-Max-Age`."
        correct: [a]
        explanation: "`Allow-Credentials: true` со стороны сервера в паре с `credentials: \"include\"` со стороны клиента включает cookie. `Set-Cookie` лишь устанавливает cookie, но прав на их отправку в CORS не даёт."

  - id: hdr-credentials-star-001
    concept: headers-credentials-debug
    type: theory-quiz
    difficulty: 2
    prompt: "Запрос идёт с `credentials: \"include\"`. Почему сервер не может ответить `Access-Control-Allow-Origin: *`?"
    choices:
      - id: a
        text: "При credentials звёздочка запрещена: отдавать приватный ответ с cookie кому угодно небезопасно, поэтому сервер обязан назвать конкретный origin."
      - id: b
        text: "Звёздочка вообще не поддерживается современными браузерами."
      - id: c
        text: "С credentials нужно перечислить все origin через запятую, а не ставить `*`."
      - id: d
        text: "Звёздочка работает только для GET, а credentials бывают лишь у POST."
    correct: [a]
    explanation: "С `credentials: \"include\"` браузер требует конкретный origin и `Allow-Credentials: true`. `*` означало бы «приватный ответ с cookie доступен любому origin» - это бессмыслица с точки зрения безопасности."
    hints:
      - "Звёздочка значит «кому угодно». Сложите это с тем, что в ответе теперь участвуют приватные cookie."
      - "Безопасно ли отдавать ответ, привязанный к чужой сессии, любому origin без разбора?"

  - id: hdr-fix-side-001
    concept: headers-credentials-debug
    type: theory-quiz
    difficulty: 2
    prompt: "Вы ловите ошибку CORS в браузере. На какой стороне её чинят?"
    choices:
      - id: a
        text: "На сервере: разрешение приходит в заголовках ответа. Заголовки запроса (кроме просьбы о credentials) ничего не открывают."
      - id: b
        text: "На клиенте: достаточно добавить нужные заголовки в `fetch`."
      - id: c
        text: "В самом браузере: нужно отключить проверку в настройках."
      - id: d
        text: "На прокси между клиентом и сервером, меняя заголовки запроса."
    correct: [a]
    explanation: "CORS - это механизм, которым сервер-владелец данных разрешает чтение своего ответа. Браузер лишь исполнитель. Никакой заголовок запроса не «откроет» CORS - разрешение физически приходит только в ответе сервера."
    hints:
      - "Кто владеет данными и потому решает, кому их отдавать - клиент или сервер?"
      - "Разрешение приезжает в заголовках ответа. Что из этого следует про сторону, которую надо править?"

  - id: hdr-expose-headers-001
    concept: headers-credentials-debug
    type: theory-quiz
    difficulty: 3
    prompt: "В панели Network виден заголовок ответа `X-Total-Count`, но `response.headers.get(\"X-Total-Count\")` возвращает `null`. Почему?"
    choices:
      - id: a
        text: "По умолчанию JS видит лишь несколько безопасных заголовков ответа; кастомный станет доступен, только если сервер перечислит его в `Access-Control-Expose-Headers`."
      - id: b
        text: "Это баг fetch: нужно прочитать заголовок через `XMLHttpRequest`."
      - id: c
        text: "Заголовок не пришёл - панель Network показывает несуществующие заголовки."
      - id: d
        text: "Нужно добавить заголовок в `Access-Control-Allow-Headers`."
    correct: [a]
    explanation: "Браузер заголовок получил (потому он и виден в Network), но скрипту по умолчанию показывает лишь безопасный список. Кастомные заголовки открывает `Expose-Headers`. `Allow-Headers` - про другое (заголовки запроса в preflight)."
    hints:
      - "Заголовок физически пришёл - иначе бы его не было в Network. Значит вопрос не в доставке, а в том, что JS разрешено видеть."
      - "Есть отдельный заголовок ответа, которым сервер «раскрывает» кастомные заголовки для чтения из JS. Не путайте его с `Allow-Headers`."

  - id: hdr-reflect-whitelist-001
    concept: headers-credentials-debug
    type: theory-quiz
    difficulty: 3
    prompt: "Серверу нужно обслуживать несколько разрешённых доменов. Почему он не пишет их списком в `Allow-Origin`, а отражает `Origin` запроса?"
    choices:
      - id: a
        text: "`Allow-Origin` принимает либо один origin, либо `*` - список через запятую недопустим; поэтому сервер сверяет `Origin` с белым списком и возвращает подходящий одним значением."
      - id: b
        text: "Отражение origin быстрее, чем перечисление, на стороне браузера."
      - id: c
        text: "Браузеры игнорируют `Allow-Origin`, если в нём больше одного домена, и берут первый."
      - id: d
        text: "Список доменов в `Allow-Origin` виден пользователю, а отражение его скрывает."
    correct: [a]
    explanation: "Заголовок несёт ровно один origin или `*`. Для нескольких доменов сервер держит белый список, проверяет входящий `Origin` и, если он допустим, отражает его обратно одним значением. Отражать без проверки по списку - уязвимость."
    hints:
      - "Сколько значений физически принимает `Allow-Origin`? Это диктует, почему список через запятую не работает."
      - "Раз нельзя перечислить, остаётся динамически подставлять один правильный origin. Откуда сервер берёт его кандидата?"

  - id: hdr-error-to-fix-trace-001
    concept: headers-credentials-debug
    type: predict-output
    difficulty: 3
    prompt: "Программа сопоставляет текст ошибки CORS с заголовком, который надо чинить. Что она выведет?"
    snippet: |
      fix_for = {
          "no-allow-origin": "Access-Control-Allow-Origin",
          "method-not-allowed": "Access-Control-Allow-Methods",
          "header-not-allowed": "Access-Control-Allow-Headers",
          "wildcard-with-credentials": "Access-Control-Allow-Credentials",
      }

      print(fix_for["method-not-allowed"])
    expected:
      kind: stdout
      value: "Access-Control-Allow-Methods"
    hints:
      - "Ошибка «method ... is not allowed» прямо называет, какой заголовок ответа за это отвечает."
      - "Метод разрешают в preflight через `Allow-Methods` - именно его и вернёт словарь."
    variants:
      - snippet: |
          fix_for = {
              "no-allow-origin": "Access-Control-Allow-Origin",
              "method-not-allowed": "Access-Control-Allow-Methods",
              "header-not-allowed": "Access-Control-Allow-Headers",
              "wildcard-with-credentials": "Access-Control-Allow-Credentials",
          }

          print(fix_for["header-not-allowed"])
        expected:
          kind: stdout
          value: "Access-Control-Allow-Headers"
      - snippet: |
          fix_for = {
              "no-allow-origin": "Access-Control-Allow-Origin",
              "method-not-allowed": "Access-Control-Allow-Methods",
              "header-not-allowed": "Access-Control-Allow-Headers",
              "wildcard-with-credentials": "Access-Control-Allow-Credentials",
          }

          print(fix_for["no-allow-origin"])
        expected:
          kind: stdout
          value: "Access-Control-Allow-Origin"

  - id: hdr-origin-match-trace-001
    concept: headers-credentials-debug
    type: predict-output
    difficulty: 2
    prompt: "Браузер сверяет `Origin` запроса с `Allow-Origin` ответа символ в символ. Что выведет программа?"
    snippet: |
      request_origin = "https://app.example.com"
      allow_origin = "http://app.example.com"

      print(request_origin == allow_origin)
    expected:
      kind: stdout
      value: "False"
    hints:
      - "Сравнение строгое, посимвольное. Пройдитесь по началу обеих строк."
      - "Схемы разные: `https` против `http`. Этого достаточно, чтобы значения не совпали."
    variants:
      - snippet: |
          request_origin = "https://app.example.com"
          allow_origin = "https://app.example.com"

          print(request_origin == allow_origin)
        expected:
          kind: stdout
          value: "True"
      - snippet: |
          request_origin = "https://app.example.com"
          allow_origin = "https://app.example.com/"

          print(request_origin == allow_origin)
        expected:
          kind: stdout
          value: "False"

  - id: hdr-fill-credentials-001
    concept: headers-credentials-debug
    type: fill-in-blanks
    difficulty: 1
    prompt: "Заполните пропуски про работу с cookie в CORS."
    template: |
      Чтобы cookie ездили с кросс-доменным запросом, клиент ставит
      credentials: "{{client}}", а сервер отвечает
      Access-Control-Allow-Credentials: {{server}}.
    blanks:
      client:
        accept: ["include"]
      server:
        accept: ["true"]
    hints:
      - "Нужны обе стороны: клиент просит, сервер разрешает. Вспомните значение опции fetch и булево значение заголовка."
    variants:
      - template: |
          С credentials звёздочка в Allow-Origin {{verb}}:
          сервер обязан назвать {{what}} origin.
        blanks:
          verb:
            accept: ["запрещена", "недопустима", "нельзя"]
          what:
            accept: ["конкретный", "точный", "поимённо", "один конкретный"]
      - template: |
          Кастомные заголовки ответа JS не увидит, пока сервер не
          перечислит их в заголовке Access-Control-{{header}}.
        blanks:
          header:
            accept: ["Expose-Headers", "expose-headers"]

  - id: hdr-diagnose-challenge-001
    concept: headers-credentials-debug
    type: theory-quiz
    difficulty: 4
    prompt: "Фронтенд `https://app.example.com` шлёт `fetch` с `credentials: \"include\"`. Сервер возвращает `Access-Control-Allow-Origin: *` и `Access-Control-Allow-Credentials: true`. Запрос падает с ошибкой CORS. Где причина и как чинить?"
    choices:
      - id: a
        text: "При credentials `Allow-Origin` не может быть `*`: верните конкретный `https://app.example.com` (например, отразив проверенный `Origin`), оставив `Allow-Credentials: true`."
      - id: b
        text: "Уберите `Allow-Credentials: true` - со звёздочкой он лишний, и тогда всё заработает с cookie."
      - id: c
        text: "Добавьте на клиенте заголовок `Access-Control-Allow-Origin` к запросу - это снимет конфликт."
      - id: d
        text: "Смените метод на GET: с GET звёздочка и credentials совместимы."
    correct: [a]
    explanation: "Конфликт `*` с credentials. Браузер при `credentials: \"include\"` требует конкретный origin; чинится на сервере подстановкой `https://app.example.com` в `Allow-Origin`. Убирать `Allow-Credentials` нельзя - тогда cookie не поедут; заголовок запроса разрешения не даёт; метод тут ни при чём."
    hints:
      - "Соберите три условия для credentials и проверьте каждое: что просит клиент, что должен вернуть сервер про origin, что про сам флаг credentials."
      - "Звёздочка и credentials несовместимы. Какой именно заголовок ответа из этого следует переписать, не теряя поддержки cookie?"

  - id: hdr-masked-error-challenge-001
    concept: headers-credentials-debug
    type: theory-quiz
    difficulty: 4
    prompt: "Кросс-доменный `fetch` падает с CORS-ошибкой, но CORS на сервере вроде настроен верно и раньше работал. Какую неочевидную причину стоит проверить в первую очередь?"
    choices:
      - id: a
        text: "Сервер мог упасть (502/504): ответ с ошибкой пришёл без CORS-заголовков, поэтому браузер маскирует реальный статус под CORS-ошибку - проверьте доступность сервера."
      - id: b
        text: "Браузер кэшировал старое разрешение preflight - нужно подождать сутки."
      - id: c
        text: "Клиент забыл добавить `Allow-Origin` в заголовки запроса."
      - id: d
        text: "JSON-тело стало слишком большим, и preflight отклонил его по размеру."
    correct: [a]
    explanation: "Упавший сервер (502/504) не присылает CORS-заголовки, и для кросс-доменного запроса браузер показывает не реальный статус, а отклонённый промис, похожий на CORS-ошибку. Поэтому сначала проверяют, что сервер вообще отвечает, а не правят CORS-конфиг."
    hints:
      - "Ошибка «CORS» не всегда про конфиг CORS. Что произойдёт с заголовками ответа, если сам сервер не смог сформировать нормальный ответ?"
      - "Подумайте, как для кросс-доменного запроса выглядит ответ 502 без CORS-заголовков с точки зрения браузера - видит ли скрипт реальный статус?"
