exercises:
  - id: sop-origin-triple-001
    concept: same-origin-policy
    type: theory-quiz
    difficulty: 1
    prompt: "Из каких трёх частей URL браузер составляет origin?"
    choices:
      - id: a
        text: "Схема, хост и порт."
      - id: b
        text: "Хост, путь и query-параметры."
      - id: c
        text: "Домен, путь и фрагмент после `#`."
      - id: d
        text: "Схема, хост и путь."
    correct: [a]
    explanation: "Origin - это тройка «схема + хост + порт». Путь, query и фрагмент в origin не входят: два URL одного origin, если совпадают все три части."
    variants:
      - prompt: "Какая часть URL НЕ влияет на то, какой это origin?"
        choices:
          - id: a
            text: "Путь (`/cart`, `/products`) - он к origin не относится."
          - id: b
            text: "Схема (`http` против `https`)."
          - id: c
            text: "Хост (`shop.example.com`)."
          - id: d
            text: "Порт (`443` против `8443`)."
        correct: [a]
        explanation: "Путь, query и фрагмент не входят в origin. Origin определяют только схема, хост и порт."
      - prompt: "Два URL принадлежат одному origin при каком условии?"
        choices:
          - id: a
            text: "Когда совпадают все три части: схема, хост и порт."
          - id: b
            text: "Когда совпадает хотя бы хост."
          - id: c
            text: "Когда у них один и тот же владелец-компания."
          - id: d
            text: "Когда совпадает registrable domain (например, `example.com`)."
        correct: [a]
        explanation: "Браузеру всё равно, кто владелец. Он сравнивает три поля, и любое расхождение делает источники разными."

  - id: sop-same-or-not-001
    concept: same-origin-policy
    type: theory-quiz
    difficulty: 2
    prompt: "Точка отсчёта - `https://shop.example.com`. Какой из адресов браузер считает ТЕМ ЖЕ origin?"
    choices:
      - id: a
        text: "`https://shop.example.com/products` - отличается только путь."
      - id: b
        text: "`http://shop.example.com` - другая схема."
      - id: c
        text: "`https://api.example.com` - другой поддомен."
      - id: d
        text: "`https://shop.example.com:8443` - другой порт."
    correct: [a]
    explanation: "Путь в origin не входит, поэтому `/products` - тот же origin. Остальные отличаются схемой, хостом или портом, значит они чужие."
    variants:
      - prompt: "Точка отсчёта - `https://example.com`. Какой адрес для браузера ЧУЖОЙ origin?"
        choices:
          - id: a
            text: "`https://www.example.com` - хост отличается на `www`."
          - id: b
            text: "`https://example.com/login` - другой путь."
          - id: c
            text: "`https://example.com/?ref=ad` - другой query."
          - id: d
            text: "`https://example.com#top` - другой фрагмент."
        correct: [a]
        explanation: "`www.example.com` - другой хост, значит другой origin. Путь, query и фрагмент origin не меняют."
      - prompt: "Точка отсчёта - `http://localhost:3000`. Какой адрес для браузера ТОТ ЖЕ origin?"
        choices:
          - id: a
            text: "`http://localhost:3000/api/users` - отличается только путь."
          - id: b
            text: "`http://localhost:8080` - другой порт."
          - id: c
            text: "`https://localhost:3000` - другая схема."
          - id: d
            text: "`http://127.0.0.1:3000` - другой хост (`127.0.0.1` не равен `localhost`)."
        correct: [a]
        explanation: "Только путь отличается, схема, хост и порт совпали - тот же origin. Порт 8080, схема https и хост 127.0.0.1 каждый по отдельности делают origin чужим."

  - id: sop-blocks-read-001
    concept: same-origin-policy
    type: theory-quiz
    difficulty: 2
    prompt: "Что именно ограничивает same-origin policy при кросс-доменном запросе?"
    choices:
      - id: a
        text: "Чтение ответа из JavaScript: запрос уходит и выполняется, но скрипт не получает тело без разрешения сервера."
      - id: b
        text: "Отправку запроса: браузер вообще не даёт обратиться к чужому origin."
      - id: c
        text: "И отправку, и чтение - чужой origin полностью недоступен."
      - id: d
        text: "Выполнение запроса на сервере: чужой сервер не получит запрос."
    correct: [a]
    explanation: "Запрос уходит и сервер его обрабатывает. Политика перехватывает ответ на обратном пути и не отдаёт его скрипту, если origin чужой и сервер не разрешил чтение."
    hints:
      - "Вспомните сценарий с тегом `<img src>` на чужой хост: запрос-то уходит. Что тогда вообще остаётся запрещать?"
      - "Различайте «отправить запрос» и «прочитать ответ как данные» - политика режет ровно одно из двух."
    variants:
      - prompt: "Скрипт на `evil.com` делает `fetch(\"https://bank.com/balance\")`, вы залогинены в банке. Что происходит?"
        choices:
          - id: a
            text: "Запрос уходит, cookie банка прикладываются, сервер отвечает - но браузер не отдаёт тело скрипту evil.com: origin не совпадает и разрешения нет."
          - id: b
            text: "Браузер блокирует сам запрос, до bank.com он не доходит."
          - id: c
            text: "Скрипт читает баланс свободно, ведь cookie приложены."
          - id: d
            text: "Cookie банка не прикладываются, поэтому сервер отвечает ошибкой авторизации."
        correct: [a]
        explanation: "Запрос доходит и выполняется, cookie уезжают автоматически. Same-origin policy обрывает именно чтение ответа: origin запроса (evil.com) не равен origin ответа (bank.com)."
      - prompt: "Что произойдёт, если из JavaScript попытаться прочитать содержимое чужой картинки, отрисованной на `<canvas>`?"
        choices:
          - id: a
            text: "Чтение пикселей заблокируется: canvas становится «tainted», потому что данные пришли с чужого origin без разрешения."
          - id: b
            text: "Пиксели прочитаются свободно - картинка же отрисовалась."
          - id: c
            text: "Браузер вообще не даст отрисовать чужую картинку на canvas."
          - id: d
            text: "Прочитается, но только в режиме инкогнито."
        correct: [a]
        explanation: "Загрузить и отрисовать чужую картинку можно, а прочитать её байты - нет: canvas помечается как tainted. Это та же граница «применить ресурс против прочитать его данные»."

  - id: sop-not-covered-001
    concept: same-origin-policy
    type: theory-quiz
    difficulty: 3
    prompt: "Почему тег `<script src=\"https://other.com/lib.js\">` грузит и исполняет чужой файл, хотя same-origin policy существует?"
    choices:
      - id: a
        text: "«Загрузить и применить ресурс» и «прочитать его содержимое как данные» - разные разрешения; политика режет второе, а первое для img/link/script часто оставляет открытым."
      - id: b
        text: "Теги `<script>` полностью игнорируют same-origin policy во всех её проявлениях."
      - id: c
        text: "Браузер считает любой `<script src>` тем же origin, что и страница."
      - id: d
        text: "Скрипт сначала проходит preflight, который его и разрешает."
    correct: [a]
    explanation: "Картинку, стиль и скрипт браузер загрузит с любого origin и применит, но прочитать их байты из JS нельзя. На том, что `<script>` исполняется в вашем контексте, когда-то держался JSONP."
    hints:
      - "Скрипт исполняется, но попробуйте прочитать его исходник из JS - получится ли? Это два разных права."
      - "Политика закрывает «прочитать чужой ответ как данные». Загрузка и применение ресурса под этот запрет не попадают."

  - id: sop-not-csrf-001
    concept: same-origin-policy
    type: theory-quiz
    difficulty: 3
    prompt: "Скрипт на `evil.com` шлёт POST на `bank.com/transfer`, и перевод проходит на сервере. Защитила ли тут same-origin policy от самой операции перевода?"
    choices:
      - id: a
        text: "Нет: запрос дошёл и выполнился на сервере. Политика лишь скроет ответ, но не помешает побочному эффекту - от CSRF нужны отдельные меры."
      - id: b
        text: "Да: политика блокирует отправку POST на чужой origin, перевод не состоится."
      - id: c
        text: "Да: cookie банка не приложатся к запросу, поэтому сервер его отвергнет."
      - id: d
        text: "Нет, потому что POST на чужой origin вообще невозможен из браузера."
    correct: [a]
    explanation: "Same-origin policy защищает конфиденциальность ответа, а не предотвращает выполнение запроса. Изменяющие состояние операции защищают CSRF-токенами и атрибутом `SameSite` у cookie."
    hints:
      - "Политика перехватывает ответ, а не запрос. Если запрос уже выполнился на сервере, что именно она успела предотвратить?"
      - "Сокрытие баланса и предотвращение перевода - разные гарантии. CSRF - это про второе."

  - id: sop-subdomain-trace-001
    concept: same-origin-policy
    type: predict-output
    difficulty: 2
    prompt: "Эта программа моделирует origin как тройку (схема, хост, порт) и сравнивает два адреса. Что она выведет?"
    snippet: |
      def origin(scheme, host, port):
          return (scheme, host, port)

      app = origin("https", "app.example.com", 443)
      api = origin("https", "api.example.com", 443)

      print(app == api)
    expected:
      kind: stdout
      value: "False"
    hints:
      - "Поддомены - разные origin. Сравните тройки поэлементно: какое поле различается?"
      - "Хост `app.example.com` не равен `api.example.com`, значит тройки не равны."
    variants:
      - snippet: |
          def origin(scheme, host, port):
              return (scheme, host, port)

          base = origin("https", "shop.example.com", 443)
          page = origin("https", "shop.example.com", 443)

          print(base == page)
        expected:
          kind: stdout
          value: "True"
      - snippet: |
          def origin(scheme, host, port):
              return (scheme, host, port)

          secure = origin("https", "example.com", 443)
          plain = origin("http", "example.com", 80)

          print(secure == plain)
        expected:
          kind: stdout
          value: "False"

  - id: sop-classify-trace-001
    concept: same-origin-policy
    type: predict-output
    difficulty: 3
    prompt: "Программа считает, сколько адресов из списка - тот же origin, что и `page`. Что она выведет?"
    snippet: |
      page = ("https", "example.com", 443)

      candidates = [
          ("https", "example.com", 443),
          ("http", "example.com", 80),
          ("https", "www.example.com", 443),
          ("https", "example.com", 8080),
      ]

      same = sum(1 for c in candidates if c == page)
      print(same)
    expected:
      kind: stdout
      value: "1"
    hints:
      - "Тот же origin - это полное совпадение тройки. Пройдите список и отметьте, где различается хотя бы одно поле."
      - "Из четырёх кандидатов только первый совпадает по всем трём полям. Остальные отличаются схемой, хостом или портом."

  - id: sop-fill-origin-001
    concept: same-origin-policy
    type: fill-in-blanks
    difficulty: 1
    prompt: "Заполните пропуски в правиле: из чего состоит origin и что в него не входит."
    template: |
      Origin - это тройка: {{part1}}, хост и {{part3}}.
      Путь и query в origin {{included}}.
    blanks:
      part1:
        accept: ["схема", "scheme", "схему"]
      part3:
        accept: ["порт", "port", "порта"]
      included:
        accept: ["не входят", "не входит", "не считаются", "не учитываются"]
        accept_regex: '^не\s+(вход[а-я]+|счита[а-я]+|учитыва[а-я]+)$'
    hints:
      - "Перечислите три поля, по которым браузер сравнивает источники. Два из них уже названы по краям пропусков."
    variants:
      - template: |
          Адрес `https://shop.example.com:443/cart`: схема - {{scheme}}, хост - {{host}}, порт - {{port}}.
        blanks:
          scheme:
            accept: ["https"]
          host:
            accept: ["shop.example.com"]
          port:
            accept: ["443"]
      - template: |
          Поддомены - это {{relation}} origin, поэтому фронтенд и API на разных поддоменах {{requirement}} CORS.
        blanks:
          relation:
            accept: ["разные", "чужие", "различные"]
          requirement:
            accept: ["требуют", "требует", "нуждаются в"]
            accept_regex: '^(требу[а-я]+|нуждаю[а-я]+ в|нужен)$'
