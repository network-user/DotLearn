conceptId: simple-vs-preflight
cards:
  - id: preflight-01
    front: "What two categories does CORS split cross-domain requests into?"
    back: "Simple requests, which the browser sends immediately in one round-trip, and non-simple requests, which are preceded by a preliminary OPTIONS preflight."
    tags: [preflight, definition]
  - id: preflight-02
    front: "What conditions make a request simple?"
    back: "All at once: method GET, HEAD, or POST; headers only from a narrow list (Accept, Accept-Language, Content-Language, Content-Type); Content-Type one of text/plain, x-www-form-urlencoded, multipart/form-data."
    tags: [simple-request]
  - id: preflight-03
    front: "Why does POST with Content-Type application/json require preflight?"
    back: "application/json is not among the three body types allowed for a simple request. This is the most common cause of a surprise OPTIONS in the network panel."
    tags: [preflight, content-type, pitfall]
  - id: preflight-04
    front: "How many round-trips for a simple request versus preflight?"
    back: "A simple request is one round-trip: request and response. Preflight is two: first an OPTIONS permission check, then the real request only after the server agrees."
    tags: [preflight, round-trip]
  - id: preflight-05
    front: "Which two headers does the browser send in an OPTIONS preflight request?"
    back: "Access-Control-Request-Method (the future request method) and Access-Control-Request-Headers (the list of non-standard headers that will be used). Together with Origin this is the permission question."
    tags: [preflight, headers]
  - id: preflight-06
    front: "Under what conditions does the real request go out after preflight?"
    back: "When the method is in Access-Control-Allow-Methods, requested headers are covered by Allow-Headers, and the origin matches Allow-Origin. If anything fails, the real request never leaves."
    tags: [preflight]
  - id: preflight-07
    front: "What is Access-Control-Max-Age for?"
    back: "It tells the browser how many seconds to remember the preflight permission. While the cache is valid, repeat requests of the same shape skip a new OPTIONS, saving an extra round-trip."
    tags: [preflight, max-age, performance]
  - id: preflight-08
    front: "Do you need to write an OPTIONS handler in your route business logic?"
    back: "No. Preflight is handled by the CORS layer (framework middleware or web server); OPTIONS usually never reaches your handler. If preflight fails, fix CORS configuration, not the router."
    tags: [preflight, pitfall]
  - id: preflight-09
    front: "Does adding a custom header to GET make it a non-simple request?"
    back: "Yes. A header like X-Trace-Id is not on the allowed list for simple requests, so even a plain GET with it triggers preflight. The method stays the same. One header is enough."
    tags: [preflight, headers, pitfall]
