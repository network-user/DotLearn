conceptId: simple-vs-preflight
cards:
  - id: preflight-01
    front: "На какие две категории CORS делит кросс-доменные запросы?"
    back: "На простые (simple requests), которые браузер отправляет сразу одним запросом, и непростые, перед которыми браузер шлёт предварительный OPTIONS - preflight."
    tags: [preflight, definition]
  - id: preflight-02
    front: "Какие условия делают запрос «простым»?"
    back: "Все сразу - метод GET, HEAD или POST; заголовки только из узкого списка (Accept, Accept-Language, Content-Language, Content-Type); Content-Type один из text/plain, x-www-form-urlencoded, multipart/form-data."
    tags: [simple-request]
  - id: preflight-03
    front: "Почему POST с Content-Type application/json требует preflight?"
    back: "application/json не входит в тройку разрешённых для простого запроса типов тела. Это самая частая причина внезапного OPTIONS в сетевой панели."
    tags: [preflight, content-type, pitfall]
  - id: preflight-04
    front: "Сколько round-trip у простого запроса и сколько у preflight?"
    back: "Простой запрос - один round-trip: сразу запрос и ответ. Preflight - два: сначала OPTIONS-вопрос о разрешении, и только после согласия сервера уходит настоящий запрос."
    tags: [preflight, round-trip]
  - id: preflight-05
    front: "Какие два заголовка браузер шлёт в preflight-запросе OPTIONS?"
    back: "Access-Control-Request-Method (метод будущего запроса) и Access-Control-Request-Headers (список нестандартных заголовков, которые в нём будут). Вместе с Origin это вопрос о разрешении."
    tags: [preflight, headers]
  - id: preflight-06
    front: "При каких условиях после preflight уходит настоящий запрос?"
    back: "Когда метод есть в Access-Control-Allow-Methods, запрошенные заголовки покрыты Allow-Headers, а origin совпадает с Allow-Origin. Если хоть что-то не сошлось, настоящий запрос не уходит вовсе."
    tags: [preflight]
  - id: preflight-07
    front: "Зачем нужен заголовок Access-Control-Max-Age?"
    back: "Он указывает, на сколько секунд браузер запоминает разрешение preflight. Пока кэш жив, повторные запросы той же формы идут без нового OPTIONS, экономя лишний round-trip."
    tags: [preflight, max-age, performance]
  - id: preflight-08
    front: "Нужно ли писать обработчик OPTIONS в бизнес-логике маршрута?"
    back: "Нет. Preflight обслуживает CORS-слой (middleware фреймворка или web-сервер), до Вашего обработчика OPTIONS обычно не доходит. Если preflight падает, чините конфигурацию CORS, а не роутер."
    tags: [preflight, pitfall]
  - id: preflight-09
    front: "Превращает ли добавление кастомного заголовка к GET его в непростой запрос?"
    back: "Да. Заголовок вроде X-Trace-Id не входит в список разрешённых для простого запроса, поэтому даже обычный GET с ним повлечёт preflight. Метод не меняется - достаточно одного заголовка."
    tags: [preflight, headers, pitfall]
