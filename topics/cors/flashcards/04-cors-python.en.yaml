conceptId: cors-python
cards:
  - id: cors-python-01
    front: "How do you wire up CORS in FastAPI?"
    back: "Add Starlette's CORSMiddleware via app.add_middleware and give it parameters. It is ordinary middleware: it stamps Access-Control-* headers onto the response on the way out. A manual OPTIONS handler is not needed."
    tags: [fastapi, middleware]
  - id: cors-python-02
    front: "How do CORSMiddleware parameters map to response headers?"
    back: "One to one. allow_origins sets Access-Control-Allow-Origin, allow_methods fills Allow-Methods, allow_headers fills Allow-Headers, and allow_credentials=True adds Allow-Credentials with the value true."
    tags: [fastapi, headers]
  - id: cors-python-03
    front: "Why can you not combine a wildcard in allow_origins with allow_credentials=True?"
    back: "The browser rejects Allow-Origin with a wildcard for a request with credentials. This config breaks precisely the requests you enabled credentials for. List the origins explicitly, not with a wildcard."
    tags: [credentials, pitfall]
  - id: cors-python-04
    front: "How do you allow dynamic preview domains in FastAPI?"
    back: "With allow_origin_regex and an anchored pattern. The middleware lets a matching origin through and reflects it back, which is compatible with credentials. Always escape the dots in the pattern, or it will let a foreign domain through."
    tags: [regex, preview]
  - id: cors-python-05
    front: "How do you configure CORS in Django?"
    back: "With the django-cors-headers package: it provides its own middleware and the CORS_ALLOWED_ORIGINS and CORS_ALLOW_CREDENTIALS settings in settings.py. For preview domains there is CORS_ALLOWED_ORIGIN_REGEXES."
    tags: [django, setup]
  - id: cors-python-06
    front: "Where in the MIDDLEWARE list does CorsMiddleware go in Django, and why?"
    back: "As high as possible, before CommonMiddleware. Django assembles the response bottom to top, so higher middleware wraps lower ones. Otherwise a CommonMiddleware redirect (for example, APPEND_SLASH) leaves without CORS headers."
    tags: [django, middleware-order]
  - id: cors-python-07
    front: "What does the order of add_middleware calls decide in FastAPI?"
    back: "The nesting of layers. Starlette wraps them in reverse order: the last added add_middleware becomes the outermost, closest to the browser. An Access-Control-* header lands only on a response that passed through the CORS layer."
    tags: [fastapi, middleware-order]
  - id: cors-python-08
    front: "Why does a 500 error response in FastAPI arrive without CORS headers?"
    back: "An unhandled exception is caught by the outermost layer, which sits outside your CORS. Such a response is born outside the CORS layer, so it carries no headers, and the browser shows it as a CORS error."
    tags: [fastapi, debug]
  - id: cors-python-09
    front: "How do you debug a CORS config with curl?"
    back: "curl is not a browser and applies no CORS, so it shows the raw response headers. A simple request is imitated with the -H flag and an Origin header. A preflight is imitated with the OPTIONS method and an Access-Control-Request-Method header. In the response you read the Access-Control-Allow-* headers."
    tags: [debug, curl]
  - id: cors-python-10
    front: "Why do you configure CORS in exactly one layer?"
    back: "If both the proxy and the app issue headers, Allow-Origin arrives with several values, and the browser rejects every cross-domain request. Each layer alone is correct; their sum breaks. Exactly one layer must own CORS."
    tags: [production, pitfall]
