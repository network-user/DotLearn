conceptId: headers-credentials-debug
cards:
  - id: headers-debug-01
    front: "За что отвечает заголовок Access-Control-Allow-Origin?"
    back: "Указывает, кому браузер разрешит прочитать ответ. Содержит либо ровно один origin, либо звёздочку. Браузер сравнивает его с Origin запроса и при несовпадении не отдаёт тело скрипту."
    tags: [allow-origin, headers]
  - id: headers-debug-02
    front: "Можно ли перечислить несколько origin через запятую в Allow-Origin?"
    back: "Нет. Заголовок принимает либо один origin, либо звёздочку. Для нескольких доменов сервер проверяет Origin запроса по белому списку и отражает подходящий обратно одним значением."
    tags: [allow-origin, pitfall]
  - id: headers-debug-03
    front: "Что нужно одновременно, чтобы cookie ездили с кросс-доменным запросом?"
    back: "Две вещи сразу: клиент шлёт fetch с credentials include, а сервер возвращает Access-Control-Allow-Credentials true. По умолчанию fetch к чужому origin cookie не отправляет."
    tags: [credentials, cookie]
  - id: headers-debug-04
    front: "Почему Allow-Origin со звёздочкой запрещён вместе с credentials?"
    back: "Отдавать приватный ответ с чужими cookie кому угодно небезопасно. При credentials браузер требует конкретный origin поимённо плюс Allow-Credentials true, звёздочка не допускается."
    tags: [credentials, allow-origin, security]
  - id: headers-debug-05
    front: "Почему response.headers.get кастомного заголовка возвращает null, хотя в Network он виден?"
    back: "По умолчанию JS видит лишь несколько безопасных заголовков ответа. Кастомные читаются только после того, как сервер перечислит их в Access-Control-Expose-Headers."
    tags: [expose-headers, pitfall]
  - id: headers-debug-06
    front: "На какой стороне чинится ошибка CORS - клиента или сервера?"
    back: "На сервере. Разрешение приходит только в заголовках ответа. Менять заголовки запроса или флаги fetch бесполезно: клиент может лишь попросить credentials, остальное решает сервер-владелец данных."
    tags: [debug, pitfall]
  - id: headers-debug-07
    front: "О чём говорит ошибка «No Access-Control-Allow-Origin header is present»?"
    back: "Сервер вообще не прислал Allow-Origin. Проверьте, что CORS включён для этого маршрута. Текст ошибки в консоли всегда называет конкретный недостающий заголовок."
    tags: [debug, allow-origin]
  - id: headers-debug-08
    front: "Почему упавший сервер (502/504) выглядит в консоли как ошибка CORS?"
    back: "Ответ с ошибкой пришёл без CORS-заголовков, поэтому браузер не отдаёт его скрипту и скрывает реальный статус. Сначала проверьте доступность сервера, а не только CORS-конфиг."
    tags: [debug, pitfall]
  - id: headers-debug-09
    front: "Как достучаться из браузера до чужого API, который не отдаёт CORS-заголовки?"
    back: "Напрямую нельзя. Обходят через свой backend-прокси: он ходит к API не из браузера и под same-origin policy не попадает. На локальной разработке ту же роль играет dev-proxy сборщика."
    tags: [debug, proxy]
