conceptId: same-origin-policy
cards:
  - id: sop-01
    front: "What three parts make up an origin?"
    back: "An origin is the triple: scheme (http/https), host (example.com), and port (443/80/8080). Two URLs share the same origin only when all three parts match."
    tags: [origin, definition]
  - id: sop-02
    front: "Do path and query parameters count toward the origin?"
    back: "No. Path, query parameters, and the fragment after # are not part of the origin. URLs with different paths but the same scheme, host, and port are the same origin."
    tags: [origin]
  - id: sop-03
    front: "What does same-origin policy restrict — sending the request or reading the response?"
    back: "Reading the response. The request still goes to a foreign origin and runs on the server. The policy blocks JavaScript from reading the response unless the server explicitly allows it."
    tags: [same-origin-policy]
  - id: sop-04
    front: "Why does the policy block reading the response instead of sending the request?"
    back: "Many legitimate operations (img tags, forms with action) send cross-domain requests without reading the response. Only programmatic reading of a private response with foreign cookies needed to be closed off."
    tags: [same-origin-policy, rationale]
  - id: sop-05
    front: "Can JavaScript read the contents of an image loaded via img from a foreign origin?"
    back: "No. Images, styles, and scripts with src load and apply from any origin, but you cannot read them as data. For images this is the tainted canvas rule."
    tags: [same-origin-policy, pitfall]
  - id: sop-06
    front: "Does same-origin policy protect against CSRF?"
    back: "No. The policy hides the response but does not stop the request from reaching the server and executing. State-changing requests need separate measures — CSRF tokens, SameSite cookies."
    tags: [csrf, pitfall]
  - id: sop-07
    front: "Are app.example.com and api.example.com the same origin?"
    back: "No — different hosts mean different origins. Subdomains are always foreign origins, so a frontend on one subdomain and an API on another requires CORS configuration."
    tags: [origin, subdomain, pitfall]
  - id: sop-08
    front: "How does origin differ from the concept of a site?"
    back: "A site is broader — it ignores port and collapses subdomains to the registrable domain (example.com). The cookie SameSite attribute uses site; same-origin policy works with the origin triple."
    tags: [origin, site]
  - id: sop-09
    front: "What is CORS in relation to same-origin policy?"
    back: "CORS does not disable the policy. It gives the data-owning server a way to explicitly allow a specific origin to read its response. A controlled exception, not a security hole."
    tags: [cors, definition]
