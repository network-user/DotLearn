conceptId: headers-credentials-debug
cards:
  - id: headers-debug-01
    front: "What does the Access-Control-Allow-Origin response header do?"
    back: "It names who the browser may let read the response. It contains either exactly one origin or an asterisk. The browser compares it to the request Origin and on mismatch does not give the body to the script."
    tags: [allow-origin, headers]
  - id: headers-debug-02
    front: "Can you list multiple origins comma-separated in Allow-Origin?"
    back: "No. The header accepts either one origin or an asterisk. For multiple domains the server checks the request Origin against an allowlist and reflects the matching one back as a single value."
    tags: [allow-origin, pitfall]
  - id: headers-debug-03
    front: "What is needed at the same time for cookies to travel with a cross-domain request?"
    back: "Two things: the client sends fetch with credentials include, and the server returns Access-Control-Allow-Credentials true. By default fetch to a foreign origin does not send cookies."
    tags: [credentials, cookie]
  - id: headers-debug-04
    front: "Why is Allow-Origin with an asterisk forbidden together with credentials?"
    back: "Giving a private response with foreign cookies to anyone is unsafe. With credentials the browser requires a specific origin by name plus Allow-Credentials true; an asterisk is not allowed."
    tags: [credentials, allow-origin, security]
  - id: headers-debug-05
    front: "Why does response.headers.get for a custom header return null even though Network shows it?"
    back: "By default JavaScript sees only a few safe response headers. Custom ones become readable only after the server lists them in Access-Control-Expose-Headers."
    tags: [expose-headers, pitfall]
  - id: headers-debug-06
    front: "On which side do you fix a CORS error — client or server?"
    back: "On the server. Permission arrives only in response headers. Changing request headers or fetch flags is useless: the client can only ask for credentials; the data-owning server decides the rest."
    tags: [debug, pitfall]
  - id: headers-debug-07
    front: "What does the error No Access-Control-Allow-Origin header is present mean?"
    back: "The server sent no Allow-Origin at all. Check that CORS is enabled for this route. Console text always names the specific missing header."
    tags: [debug, allow-origin]
  - id: headers-debug-08
    front: "Why does a dead server (502/504) look like a CORS error in the console?"
    back: "The error response lacked CORS headers, so the browser does not give it to the script and hides the real status. Check server health first, not only CORS config."
    tags: [debug, pitfall]
  - id: headers-debug-09
    front: "How do you reach a foreign API from the browser that sends no CORS headers?"
    back: "You cannot directly. Use your own backend proxy: it calls the API outside the browser and is not subject to same-origin policy. On local dev the bundler dev-proxy plays the same role."
    tags: [debug, proxy]
