conceptId: same-origin-policy
cards:
  - id: sop-01
    front: "Из каких трёх частей состоит origin?"
    back: "Origin - это тройка: схема (http/https), хост (example.com) и порт (443/80/8080). Два URL принадлежат одному origin, только если совпадают все три части."
    tags: [origin, definition]
  - id: sop-02
    front: "Входят ли путь и query-параметры в определение origin?"
    back: "Нет. Путь, query-параметры и фрагмент после # к origin не относятся. Адреса с разным путём при той же схеме, хосте и порте - один и тот же origin."
    tags: [origin]
  - id: sop-03
    front: "Что именно ограничивает same-origin policy - отправку запроса или чтение ответа?"
    back: "Чтение ответа. Запрос спокойно уходит на чужой origin и выполняется на сервере. Политика запрещает прочитать ответ из JavaScript, если сервер явно не разрешил."
    tags: [same-origin-policy]
  - id: sop-04
    front: "Почему политика блокирует чтение ответа, а не отправку запроса?"
    back: "Многие легитимные операции (теги img, форма с action) отправляют кросс-доменные запросы и не читают ответ. Закрыть нужно было только программное чтение приватного ответа с чужими cookie."
    tags: [same-origin-policy, rationale]
  - id: sop-05
    front: "Можно ли из JavaScript прочитать содержимое картинки, загруженной тегом img с чужого origin?"
    back: "Нет. Картинка, стиль и script с src загрузятся и применятся с любого origin, но прочитать их как данные нельзя. Для картинок это закрывает понятие tainted canvas."
    tags: [same-origin-policy, pitfall]
  - id: sop-06
    front: "Защищает ли same-origin policy от CSRF?"
    back: "Нет. Политика скрывает ответ, но не мешает запросу дойти до сервера и выполниться. От изменяющих состояние запросов нужны отдельные меры - CSRF-токены, SameSite cookie."
    tags: [csrf, pitfall]
  - id: sop-07
    front: "Являются ли app.example.com и api.example.com одним origin?"
    back: "Нет, это разные origin - хост отличается. Поддомены всегда чужие origin, поэтому связка «фронтенд на одном поддомене, API на другом» требует настройки CORS."
    tags: [origin, subdomain, pitfall]
  - id: sop-08
    front: "Чем origin отличается от понятия site?"
    back: "Site шире - он игнорирует порт и схлопывает поддомены до registrable domain (example.com). На site опирается атрибут cookie SameSite, а same-origin policy работает с origin-тройкой."
    tags: [origin, site]
  - id: sop-09
    front: "Что такое CORS по отношению к same-origin policy?"
    back: "CORS не отключает политику, а даёт серверу-владельцу данных способ явно разрешить конкретному origin читать свой ответ. Это управляемое исключение, а не дыра в безопасности."
    tags: [cors, definition]
