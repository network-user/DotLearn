conceptId: cors-python
cards:
  - id: cors-python-01
    front: "Как в FastAPI подключают CORS?"
    back: "Подключают CORSMiddleware из Starlette через app.add_middleware и передают ему параметры. Это обычное middleware: оно штампует заголовки Access-Control-* на ответ по пути наружу. Ручной обработчик OPTIONS не нужен."
    tags: [fastapi, middleware]
  - id: cors-python-02
    front: "Как параметры CORSMiddleware соотносятся с заголовками ответа?"
    back: "Один в один. allow_origins задаёт Access-Control-Allow-Origin, allow_methods наполняет Allow-Methods, allow_headers наполняет Allow-Headers, а allow_credentials=True добавляет Allow-Credentials со значением true."
    tags: [fastapi, headers]
  - id: cors-python-03
    front: "Почему нельзя совмещать звёздочку в allow_origins с allow_credentials=True?"
    back: "Браузер отвергает Allow-Origin со звёздочкой для запроса с credentials. Такой конфиг ломает именно те запросы, ради которых включили credentials. Origin перечисляют явным списком, а не звёздочкой."
    tags: [credentials, pitfall]
  - id: cors-python-04
    front: "Как разрешить динамические превью-домены в FastAPI?"
    back: "Через allow_origin_regex с заякоренным шаблоном. Middleware пропускает подошедший origin и отражает его обратно, что совместимо с credentials. Точки в шаблоне обязательно экранируют, иначе он пропустит чужой домен."
    tags: [regex, preview]
  - id: cors-python-05
    front: "Чем настраивают CORS в Django?"
    back: "Пакетом django-cors-headers: он даёт своё middleware и настройки CORS_ALLOWED_ORIGINS и CORS_ALLOW_CREDENTIALS в settings.py. Для превью-доменов есть CORS_ALLOWED_ORIGIN_REGEXES."
    tags: [django, setup]
  - id: cors-python-06
    front: "Куда в списке MIDDLEWARE ставят CorsMiddleware в Django и почему?"
    back: "Как можно выше, перед CommonMiddleware. Django собирает ответ снизу вверх, поэтому верхнее middleware оборачивает нижние. Иначе редирект от CommonMiddleware (например, APPEND_SLASH) уедет без CORS-заголовков."
    tags: [django, middleware-order]
  - id: cors-python-07
    front: "Что определяет порядок вызовов add_middleware в FastAPI?"
    back: "Вложенность слоёв. Starlette оборачивает их в обратном порядке: последний добавленный add_middleware становится самым внешним, ближайшим к браузеру. Заголовок Access-Control-* окажется только на ответе, прошедшем через CORS-слой."
    tags: [fastapi, middleware-order]
  - id: cors-python-08
    front: "Почему ответ с ошибкой 500 в FastAPI приходит без CORS-заголовков?"
    back: "Необработанное исключение перехватывает самый внешний слой, стоящий снаружи вашего CORS. Такой ответ рождается вне CORS-слоя, поэтому заголовков на нём нет, и браузер показывает его как CORS-ошибку."
    tags: [fastapi, debug]
  - id: cors-python-09
    front: "Как отладить конфиг CORS через curl?"
    back: "curl не браузер и CORS не применяет, поэтому показывает сырые заголовки ответа. Простой запрос имитируют флагом -H с заголовком Origin. Preflight имитируют методом OPTIONS с заголовком Access-Control-Request-Method. В ответе читают заголовки Access-Control-Allow-*."
    tags: [debug, curl]
  - id: cors-python-10
    front: "Почему CORS настраивают ровно в одном слое?"
    back: "Если заголовки выдают и прокси, и приложение, Allow-Origin приходит с несколькими значениями, и браузер отвергает все кросс-доменные запросы. Каждый слой по отдельности верен, ломается их сумма. Владеть CORS должен ровно один слой."
    tags: [production, pitfall]
