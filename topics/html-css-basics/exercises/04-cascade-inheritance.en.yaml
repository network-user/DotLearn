exercises:
  - id: cas-stages-order-001
    concept: cascade-inheritance
    type: theory-quiz
    difficulty: 1
    prompt: "In what order does the browser check criteria to resolve a conflict between two CSS rules?"
    choices:
      - id: a
        text: "Origin and importance → specificity → code order."
      - id: b
        text: "Code order → specificity → origin and importance."
      - id: c
        text: "Specificity → origin and importance → code order."
      - id: d
        text: "Everything is compared at once, the majority of criteria wins."
    correct: [a]
    explanation: "The cascade is a filter with a shrinking pool of candidates: first origin and importance are compared (including !important), then specificity, and only on a complete tie - code order."
    hints:
      - "Recall: !important beats even the strongest selector - so this stage is checked before specificity."
    variants:
      - prompt: "If two selectors have equal specificity, what decides the conflict?"
        choices:
          - id: a
            text: "The rule that comes later in the source code."
          - id: b
            text: "The rule with the shorter selector."
          - id: c
            text: "The rule written with more whitespace."
          - id: d
            text: "The conflict is unresolved, the property doesn't apply at all."
        correct: [a]
        explanation: "Code order is the cascade's final stage, reached only when origin, importance, and specificity are all fully tied."

  - id: cas-blanks-order-001
    concept: cascade-inheritance
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete: which rule wins if specificity is equal?"
    template: |
      p { color: navy; }
      p { color: {{winner}}; } /* this rule is lower in the file */
    blanks:
      winner:
        accept: ['seagreen', 'green', 'any', 'any value']
    explanation: "With equal specificity and the same origin, the rule that appears later in the browser's parsed styles wins - meaning the lower declaration in the file, whatever its value."
    hints:
      - "The question isn't about a specific color, but about which of the two rules is physically lower."

  - id: cas-inherit-props-002
    concept: cascade-inheritance
    type: theory-quiz
    difficulty: 2
    prompt: "A div has color: darkslategray and border: 1px solid red. What does a <p> nested inside it, with no rules of its own, inherit?"
    choices:
      - id: a
        text: "Only color; border isn't inherited."
      - id: b
        text: "Both color and border."
      - id: c
        text: "Only border; color applies only to the element where it's declared."
      - id: d
        text: "Neither property."
    correct: [a]
    explanation: "Text properties (color, font-*, line-height) are inherited; box properties (border, margin, padding, width) are not - otherwise every nested element would grow borders from all its ancestors."
    hints:
      - "Split properties into two groups: text properties and box-geometry properties - they behave differently."

  - id: cas-blanks-keywords-002
    concept: cascade-inheritance
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the rule: a link inside a colored card needs the parent's text color, not the browser's default blue."
    template: |
      .card a {
        color: {{keyword}};
      }
    blanks:
      keyword:
        accept: ['inherit']
    explanation: "color on links isn't inherited by default - browser styles set their own blue. The inherit keyword explicitly forces the property to take the parent's value, even when that's not the default behavior."
    hints:
      - "You need the keyword that forces a property to inherit the parent's value against its normal behavior."

  - id: cas-predict-collapse-003
    concept: cascade-inheritance
    type: predict-output
    difficulty: 3
    prompt: |
      Between a heading and a paragraph, the heading's margin-bottom is 40px and the paragraph's margin-top is 20px. They're adjacent block elements in normal document flow. What's the actual distance between them, in pixels?
    snippet: |
      .title { margin-bottom: 40px; }
      .lead   { margin-top: 20px; }
    expected:
      kind: scalar
      value: 40
    explanation: "Vertical margins of adjacent block elements collapse into one, equal to the larger of the two values, rather than adding up. 40px is greater than 20px, so the final gap is 40px, not 60px."
    hints:
      - "It's not addition. Recall what happens to vertical margins of adjacent block elements."

  - id: cas-important-battle-004
    concept: cascade-inheritance
    type: theory-quiz
    difficulty: 3
    prompt: "The rule .button { color: blue !important; } competes with #header .button.primary.large { color: red; } (no !important). Which one wins?"
    choices:
      - id: a
        text: "Blue: !important jumps over specificity entirely, regardless of the competing selector."
      - id: b
        text: "Red: it has higher specificity thanks to the id and three classes."
      - id: c
        text: "A tie, the default color applies."
      - id: d
        text: "Red, if the rule is written later in the file."
    correct: [a]
    explanation: "!important skips the specificity stage entirely within its own origin. Even an imposing selector with an id loses to a weaker selector marked !important."
    hints:
      - "Specificity isn't compared at all as long as at least one competitor is marked !important."

  - id: cas-geometry-not-inherited-005
    concept: cascade-inheritance
    type: theory-quiz
    difficulty: 2
    prompt: "A parent block has width: 600px. What width does a div nested inside it, with no width rule of its own, get?"
    choices:
      - id: a
        text: "The width determined by its own default behavior (for a block-level div, the full available width of the parent), not a literally inherited 600px."
      - id: b
        text: "Exactly 600px, because width is inherited from the parent."
      - id: c
        text: "0px, because width isn't inherited and defaults to zero."
      - id: d
        text: "The device's screen width."
    correct: [a]
    explanation: "width is a geometry property, it isn't inherited. A block-level div, by default, simply stretches to the full available width of its parent (in this case it happens to match 600px), but that's a consequence of ordinary block-element behavior, not inheritance of a specific number."
    hints:
      - "Distinguish between \"inheriting a specific value\" and an element's \"default behavior\", which can produce a result that looks similar at first glance."

  - id: cas-blanks-unset-006
    concept: cascade-inheritance
    type: fill-in-blanks
    difficulty: 4
    prompt: "Complete the rule that resets absolutely all of a widget's properties with one declaration: inherited ones become like the parent's, non-inherited ones become the spec's default value."
    template: |
      .widget * {
        {{property}}: {{value}};
      }
    blanks:
      property:
        accept: ['all']
      value:
        accept: ['unset']
    explanation: "The all property applies one value to every CSS property of an element at once. unset behaves like inherit where a property is normally inherited, and like initial where it isn't - a convenient universal reset."
    hints:
      - "There's a special property that refers to all of an element's other properties at once."
      - "The keyword must behave differently for inherited and non-inherited properties - it's neither initial nor inherit alone."
