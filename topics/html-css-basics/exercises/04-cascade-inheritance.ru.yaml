exercises:
  - id: cas-stages-order-001
    concept: cascade-inheritance
    type: theory-quiz
    difficulty: 1
    prompt: "В каком порядке браузер проверяет критерии, разрешая конфликт двух CSS-правил?"
    choices:
      - id: a
        text: "Происхождение и важность → специфичность → порядок в коде."
      - id: b
        text: "Порядок в коде → специфичность → происхождение и важность."
      - id: c
        text: "Специфичность → происхождение и важность → порядок в коде."
      - id: d
        text: "Всё сравнивается одновременно, побеждает большинство критериев."
    correct: [a]
    explanation: "Каскад — это фильтр с убывающим числом кандидатов: сначала сравнивается происхождение и важность (включая !important), затем специфичность, и только при полном равенстве — порядок в коде."
    hints:
      - "Вспомните: !important перебивает даже самый сильный селектор — значит, эта ступень проверяется раньше специфичности."
    variants:
      - prompt: "Если специфичность двух селекторов равна, что решает исход конфликта?"
        choices:
          - id: a
            text: "Правило, стоящее позже в исходном коде."
          - id: b
            text: "Правило с более коротким селектором."
          - id: c
            text: "Правило, написанное с большим количеством пробелов."
          - id: d
            text: "Конфликт не разрешается, свойство не применяется вовсе."
        correct: [a]
        explanation: "Порядок в коде — последняя ступень каскада, до которой доходят только при полном равенстве происхождения, важности и специфичности."

  - id: cas-blanks-order-001
    concept: cascade-inheritance
    type: fill-in-blanks
    difficulty: 1
    prompt: "Дополните: какое правило победит, если специфичность одинакова?"
    template: |
      p { color: navy; }
      p { color: {{winner}}; } /* это правило ниже в файле */
    blanks:
      winner:
        accept: ['seagreen', 'green', 'любой', 'любое значение']
    explanation: "При равной специфичности и одинаковом происхождении побеждает правило, встретившееся позже в разобранных браузером стилях — то есть само нижнее объявление в файле, каким бы ни было его значение."
    hints:
      - "Вопрос не про конкретный цвет, а про то, какое из двух правил физически ниже."

  - id: cas-inherit-props-002
    concept: cascade-inheritance
    type: theory-quiz
    difficulty: 2
    prompt: "У div заданы color: darkslategray и border: 1px solid red. Что унаследует вложенный в него <p> без собственных правил?"
    choices:
      - id: a
        text: "Только color; border не наследуется."
      - id: b
        text: "И color, и border."
      - id: c
        text: "Только border; color применяется лишь к тому элементу, где объявлен."
      - id: d
        text: "Ни одно из свойств."
    correct: [a]
    explanation: "Свойства текста (color, font-*, line-height) наследуются, свойства коробки (border, margin, padding, width) — нет, иначе каждый вложенный элемент обрастал бы рамками всех своих предков."
    hints:
      - "Разделите свойства на две группы: про текст и про геометрию коробки — у них разное поведение."

  - id: cas-blanks-keywords-002
    concept: cascade-inheritance
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните правило: ссылке внутри цветной карточки нужен не стандартный синий цвет браузера, а цвет текста родителя."
    template: |
      .card a {
        color: {{keyword}};
      }
    blanks:
      keyword:
        accept: ['inherit']
    explanation: "color у ссылок по умолчанию не наследуется — браузерные стили задают собственный синий. Ключевое слово inherit явно заставляет свойство взять значение родителя, даже если по умолчанию так не происходит."
    hints:
      - "Нужно ключевое слово, которое заставляет свойство унаследовать значение родителя вопреки обычному поведению."

  - id: cas-predict-collapse-003
    concept: cascade-inheritance
    type: predict-output
    difficulty: 3
    prompt: |
      Между заголовком и абзацем margin-bottom заголовка равен 40px, а margin-top абзаца равен 20px. Это соседние блочные элементы в обычном потоке документа. Чему равно реальное расстояние между ними в пикселях?
    snippet: |
      .title { margin-bottom: 40px; }
      .lead   { margin-top: 20px; }
    expected:
      kind: scalar
      value: 40
    explanation: "Вертикальные margin соседних блочных элементов схлопываются в один, равный большему из двух значений, а не складываются. 40px больше 20px, поэтому итоговый отступ — 40px, а не 60px."
    hints:
      - "Это не сложение. Вспомните, что происходит с вертикальными margin у соседних блочных элементов."

  - id: cas-important-battle-004
    concept: cascade-inheritance
    type: theory-quiz
    difficulty: 3
    prompt: "Правило .button { color: blue !important; } конкурирует с #header .button.primary.large { color: red; } (без !important). Кто победит?"
    choices:
      - id: a
        text: "Синий: !important перепрыгивает специфичность целиком, независимо от селектора конкурента."
      - id: b
        text: "Красный: у него выше специфичность за счёт id и трёх классов."
      - id: c
        text: "Ничья, применится цвет по умолчанию."
      - id: d
        text: "Красный, если правило написано позже в файле."
    correct: [a]
    explanation: "!important перепрыгивает ступень специфичности целиком в пределах своего происхождения. Даже внушительный селектор с id проигрывает более слабому селектору, отмеченному !important."
    hints:
      - "Специфичность вообще не сравнивается, пока хотя бы один из конкурентов отмечен !important."

  - id: cas-geometry-not-inherited-005
    concept: cascade-inheritance
    type: theory-quiz
    difficulty: 2
    prompt: "У родительского блока задано width: 600px. Какую ширину получит вложенный в него div без собственного правила width?"
    choices:
      - id: a
        text: "Ширину, которую определяет его собственное поведение по умолчанию (для блочного div — вся доступная ширина родителя), а не унаследованные 600px буквально."
      - id: b
        text: "Ровно 600px, потому что width наследуется от родителя."
      - id: c
        text: "0px, потому что width не наследуется и по умолчанию равна нулю."
      - id: d
        text: "Ширину экрана устройства."
    correct: [a]
    explanation: "width — свойство геометрии, оно не наследуется. Блочный div по умолчанию просто растягивается на всю доступную ширину своего родителя (в данном случае это фактически совпадёт с 600px), но это следствие обычного поведения блочных элементов, а не наследования конкретного числа."
    hints:
      - "Различайте «наследование конкретного значения» и «поведение элемента по умолчанию», которое может дать похожий на первый взгляд результат."

  - id: cas-blanks-unset-006
    concept: cascade-inheritance
    type: fill-in-blanks
    difficulty: 4
    prompt: "Дополните правило, которое обнуляет вообще все свойства виджета одним объявлением: наследуемые становятся как у родителя, ненаследуемые — как значение по умолчанию из спецификации."
    template: |
      .widget * {
        {{property}}: {{value}};
      }
    blanks:
      property:
        accept: ['all']
      value:
        accept: ['unset']
    explanation: "Свойство all применяет одно значение сразу ко всем CSS-свойствам элемента. unset действует как inherit там, где свойство обычно наследуется, и как initial там, где нет — удобный универсальный сброс."
    hints:
      - "Есть специальное свойство, которое ссылается сразу на все остальные свойства элемента разом."
      - "Ключевое слово должно вести себя по-разному для наследуемых и ненаследуемых свойств — это не initial и не inherit по отдельности."
