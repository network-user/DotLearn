exercises:
  - id: sel-basic-select-001
    concept: selectors-specificity
    type: theory-quiz
    difficulty: 1
    prompt: "Какой селектор найдёт элемент с id=\"menu\"?"
    choices:
      - id: a
        text: "#menu"
      - id: b
        text: ".menu"
      - id: c
        text: "menu"
      - id: d
        text: "[menu]"
    correct: [a]
    explanation: "Решётка обозначает селектор по id: #menu ищет элемент, у которого атрибут id равен menu."
    hints:
      - "Символ перед именем определяет тип селектора: точка — класс, решётка — id."
    variants:
      - prompt: "Какой селектор найдёт все элементы с классом card?"
        choices:
          - id: a
            text: ".card"
          - id: b
            text: "#card"
          - id: c
            text: "card"
          - id: d
            text: "*card"
        correct: [a]
        explanation: "Точка перед именем — селектор класса; он ловит все элементы, у которых это слово есть в атрибуте class, вне зависимости от тега."

  - id: sel-blanks-combinators-001
    concept: selectors-specificity
    type: fill-in-blanks
    difficulty: 1
    prompt: "Дополните селекторы правильными комбинаторами: сначала любой потомок, затем только прямой ребёнок."
    template: |
      nav {{descendant}} a { color: inherit; }
      nav {{child}} a { padding: 8px; }
    blanks:
      descendant:
        accept: [' ', '']
      child:
        accept: ['>']
    explanation: "Пробел — комбинатор потомка, находит ссылку на любой глубине внутри nav. Стрелка > строже: только ссылки, лежащие в nav напрямую, без промежуточных обёрток."
    hints:
      - "Один из двух комбинаторов — это буквально пробел между простыми селекторами."

  - id: sel-specificity-tuple-002
    concept: selectors-specificity
    type: theory-quiz
    difficulty: 2
    prompt: "Селекторы #header .logo и nav a.active.big борются за одно свойство одного элемента. Специфичность первого 1·1·0, второго 0·2·2. Кто победит?"
    choices:
      - id: a
        text: "#header .logo, потому что в столбце id у него единица против нуля."
      - id: b
        text: "nav a.active.big, потому что у него больше простых селекторов суммарно."
      - id: c
        text: "Ничья, решает порядок в коде."
      - id: d
        text: "nav a.active.big, потому что классов у него больше."
    correct: [a]
    explanation: "Сравнение специфичности поразрядное, слева направо: сначала сравнивается столбец id. 1 против 0 — исход уже решён, до столбцов классов и тегов дело не доходит, сколько бы их ни было у соперника."
    hints:
      - "Специфичность — не сумма, а кортеж из трёх независимых разрядов; сравнение останавливается на первом различии."

  - id: sel-blanks-attr-002
    concept: selectors-specificity
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните селектор, который находит ссылки, открывающиеся в новой вкладке, и подсвечивает их при наведении курсора."
    template: |
      a{{attr}}"_blank"]{{pseudo}} { outline: 1px dotted; }
    blanks:
      attr:
        accept: ['[target=']
      pseudo:
        accept: [':hover']
    explanation: "Квадратные скобки с сравнением значения проверяют атрибут target, а псевдокласс :hover описывает состояние наведения курсора — оба вида селектора уже встречались вам по отдельности, здесь они соединены в одну цепочку."
    hints:
      - "Первая часть — проверка атрибута по значению, вторая — псевдокласс состояния под курсором."

  - id: sel-predict-winner-003
    concept: selectors-specificity
    type: predict-output
    difficulty: 3
    prompt: |
      Два правила CSS применяются к одной и той же кнопке. Какой цвет текста победит?
      .button { color: blue; }
      button.button.primary { color: green; }
    snippet: |
      .button { color: blue; }
      button.button.primary { color: green; }
    expected:
      kind: scalar
      value: "green"
    explanation: "Специфичность .button равна 0·1·0. У button.button.primary — тег button (1 в столбце тегов) плюс два класса (2 в столбце классов), итого 0·2·1. Столбец классов 2 против 1 решает исход в пользу зелёного."
    hints:
      - "Посчитайте тройку id·классы·теги для каждого селектора отдельно, прежде чем сравнивать."
      - "У второго селектора два класса и один тег — сравните столбец классов первым, он старше столбца тегов."

  - id: sel-predict-notzero-004
    concept: selectors-specificity
    type: predict-output
    difficulty: 3
    prompt: |
      Чему равна специфичность селектора p:not(.intro) в формате a.b.c (без точек, просто цифрами подряд, например 010)?
    snippet: |
      p:not(.intro) { color: gray; }
    expected:
      kind: stdout
      value: "011"
    explanation: "Сам :not() веса не добавляет, но его аргумент считается как обычный селектор: класс .intro внутри скобок даёт единицу в столбец классов. Плюс тег p даёт единицу в столбец тегов. Итог 0·1·1."
    hints:
      - "Псевдокласс :not() прозрачен по весу, но не его аргумент — посчитайте, что лежит внутри скобок."

  - id: sel-inline-important-005
    concept: selectors-specificity
    type: theory-quiz
    difficulty: 4
    prompt: "Элемент имеет style=\"color: red\" прямо в HTML-атрибуте. В подключённом файле стилей есть правило .card { color: blue !important; }. Какой цвет применится?"
    choices:
      - id: a
        text: "Синий: !important перебивает даже инлайн-стиль."
      - id: b
        text: "Красный: инлайн-стиль всегда сильнее любого селектора из файла."
      - id: c
        text: "Ничья, применится цвет по умолчанию браузера."
      - id: d
        text: "Красный, потому что style объявлен позже в потоке загрузки."
    correct: [a]
    explanation: "Инлайн-стиль формально сильнее любого обычного селектора из файла, но !important перебивает даже его. Единственное, что победило бы !important из файла — свой !important в самом атрибуте style."
    hints:
      - "Инлайн-стиль побеждает специфичность любого обычного селектора, но не флаг важности."
      - "Спросите себя: что вообще способно перебить !important, если не более сильная специфичность?"

  - id: sel-universal-zero-006
    concept: selectors-specificity
    type: theory-quiz
    difficulty: 2
    prompt: "Сколько весит в специфичности селектор * > * (универсальный селектор с комбинатором ребёнка)?"
    choices:
      - id: a
        text: "0·0·0 — универсальный селектор и комбинаторы веса не добавляют."
      - id: b
        text: "0·0·2 — по одному баллу за каждую звёздочку."
      - id: c
        text: "0·1·0 — комбинатор считается как класс."
      - id: d
        text: "Селектор невалиден и не имеет специфичности."
    correct: [a]
    explanation: "Универсальный селектор * весит ноль, и комбинаторы (пробел, >, +, ~) веса тоже не добавляют — они влияют только на то, какие элементы найдены, но не на итоговую специфичность цепочки."
    hints:
      - "Вспомните, что из компонентов селектора весит ровно ноль независимо от количества повторений."
