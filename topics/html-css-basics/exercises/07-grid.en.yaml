exercises:
  - id: grid-activate-001
    concept: grid
    type: theory-quiz
    difficulty: 1
    prompt: "Which property turns on a grid of rows and columns on a parent element?"
    choices:
      - id: a
        text: "display: grid"
      - id: b
        text: "display: flex"
      - id: c
        text: "grid-template: auto"
      - id: d
        text: "position: grid"
    correct: [a]
    explanation: "display: grid turns on a two-dimensional grid on the container; its direct children automatically fill the cells, with no rules needed on the children themselves."
    hints:
      - "Look for a value of the same property that also takes block, inline, and flex."
    variants:
      - prompt: "How is grid fundamentally different from flexbox in terms of layout?"
        choices:
          - id: a
            text: "Grid lays out along two axes at once, flexbox along one."
          - id: b
            text: "Grid only works in a column, flexbox only in a row."
          - id: c
            text: "There's no difference, they're two names for the same mechanism."
          - id: d
            text: "Grid can't be used together with gap."
        correct: [a]
        explanation: "Flexbox lays out items along one axis at a time (row or column, depending on flex-direction). Grid defines rows and columns at once, with a single declaration on the parent."

  - id: grid-blanks-columns-001
    concept: grid
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete a grid of three equal columns with a 12px gap between cells."
    template: |
      .gallery {
        display: grid;
        grid-template-columns: {{cols}};
        gap: {{gap}};
      }
    blanks:
      cols:
        accept: ['repeat(3, 1fr)', '1fr 1fr 1fr']
      gap:
        accept: ['12px']
    explanation: "repeat(3, 1fr) is shorthand for three equal 1fr columns, equivalent to 1fr 1fr 1fr. gap sets the distance between cells in both directions at once."
    hints:
      - "For three equal shares there's both an explicit three-value notation and a short repeat function."

  - id: grid-predict-fr-002
    concept: grid
    type: predict-output
    difficulty: 2
    prompt: |
      A container 900px wide, gap is 0. grid-template-columns: 300px 1fr 1fr. How many pixels will the second column (the first of the two fr columns) take?
    snippet: |
      .layout {
        width: 900px;
        display: grid;
        grid-template-columns: 300px 1fr 1fr;
      }
    expected:
      kind: scalar
      value: 300
    explanation: "First the browser gives the fixed column its 300px. That leaves 900 - 300 = 600px of free space, split evenly between the two equal fr columns: 300px each."
    hints:
      - "First subtract the fixed column from the total width, then divide what's left by the number of equal fr shares."

  - id: grid-blanks-areas-002
    concept: grid
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the layout description using named areas: the sidebar spans all three rows."
    template: |
      .page {
        display: grid;
        grid-template-columns: 200px 1fr;
        grid-template-areas:
          "{{row1}}"
          "sidebar main"
          "{{row3}}";
      }
    blanks:
      row1:
        accept: ['sidebar header']
      row3:
        accept: ['sidebar footer']
    explanation: "Repeating the name sidebar in all three rows of grid-template-areas makes the sidebar span all three grid rows at once, while staying a rectangular area."
    hints:
      - "An area's name must repeat in every row where that area should be present, forming one solid rectangle."

  - id: grid-autofit-003
    concept: grid
    type: theory-quiz
    difficulty: 3
    prompt: "You need a grid of cards that adjusts its column count to screen width on its own, with no @media at all, and keeps every card no narrower than 220px. Which declaration fits?"
    choices:
      - id: a
        text: "grid-template-columns: repeat);"
      - id: b
        text: "grid-template-columns: repeat(3, 220px);"
      - id: c
        text: "grid-template-columns: 220px;"
      - id: d
        text: "grid-template-columns: repeat(auto-fit, 220px);"
    correct: [a]
    explanation: "auto-fit fits as many columns as the container can hold, and minmax(220px, 1fr) sets each one's bounds: no narrower than 220px, no wider than an equal share. Without minmax, the columns would be rigidly fixed and wouldn't stretch into freed-up space."
    hints:
      - "You need two parts of the recipe at once: a function that determines the column count, and a function that sets their width range."
      - "A fixed column count (repeat(3, ...)) doesn't adapt to screen width - that's not what's needed."

  - id: grid-predict-span-004
    concept: grid
    type: predict-output
    difficulty: 3
    prompt: |
      An item is given grid-column: 1 / 3. How many grid columns will it span?
    snippet: |
      .hero {
        grid-column: 1 / 3;
      }
    expected:
      kind: scalar
      value: 2
    explanation: "Grid lines are numbered starting from one. The notation 1 / 3 means \"from the first grid line to the third\", and there are exactly two columns between the first and third lines."
    hints:
      - "Don't count the line numbers themselves - count the gaps between the given lines."

  - id: grid-vs-flex-005
    concept: grid
    type: theory-quiz
    difficulty: 2
    prompt: "You need to build a single toolbar as a row of five identical buttons. What's more appropriate?"
    choices:
      - id: a
        text: "flexbox: the task is one-dimensional, all buttons run along a"
      - id: b
        text: "grid: the task necessarily requires two axes at once."
      - id: c
        text: "Neither fits a row of buttons."
      - id: d
        text: "Both options are equally wrong without position: absolute."
    correct: [a]
    explanation: "One row of items along a single axis is the classic case for flexbox. Grid is justified when the layout needs simultaneous control over rows and columns, which isn't the case here."
    hints:
      - "Ask yourself: does the layout run along one line, or do you need rows and columns at the same time?"

  - id: grid-blanks-minmax-006
    concept: grid
    type: fill-in-blanks
    difficulty: 3
    prompt: "Complete the function that sets a column's width range: at least 150px, at most one equal share of free space."
    template: |
      .cards {
        grid-template-columns: repeat(auto-fit, {{fn}}(150px, 1fr));
      }
    blanks:
      fn:
        accept: ['minmax']
    explanation: "minmax(150px, 1fr) sets a column's lower and upper size bounds at once: no narrower than 150px, no wider than an equal share of free space."
    hints:
      - "The function's name describes exactly what it does: it sets a minimum and maximum in a single call."
