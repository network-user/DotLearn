exercises:
  - id: sem-landmarks-001
    concept: semantic-tags
    type: theory-quiz
    difficulty: 1
    prompt: "Which tag marks the single main content area of a page?"
    choices:
      - id: a
        text: "<main>"
      - id: b
        text: "<section>"
      - id: c
        text: "<div>"
      - id: d
        text: "<article>"
    correct: [a]
    explanation: "main is the only tag on a page for the primary content; screen readers use it to offer a \"skip to content\" command, bypassing the header and menu."
    hints:
      - "Look for the tag that can only appear once per page."
    variants:
      - prompt: "Which tag wraps a block of a site's navigation links, such as the main menu?"
        choices:
          - id: a
            text: "<nav>"
          - id: b
            text: "<header>"
          - id: c
            text: "<a>"
          - id: d
            text: "<aside>"
        correct: [a]
        explanation: "nav marks a significant navigation block; screen readers build a list of page landmarks from such tags for quick navigation."

  - id: sem-blanks-skeleton-001
    concept: semantic-tags
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete the page's semantic skeleton with the right tags."
    template: |
      <{{top}}>
        <h1>Morning Shop</h1>
      </{{top}}>
      <{{content}}>
        <p>Main content of the page.</p>
      </{{content}}>
      <{{bottom}}>
        <p>© 2026</p>
      </{{bottom}}>
    blanks:
      top:
        accept: ['header']
      content:
        accept: ['main']
      bottom:
        accept: ['footer']
    explanation: "header opens the page, main holds the single primary content area, footer closes the page - three standard top-level regions."
    hints:
      - "The three tags map to three roles: introductory part, main content, closing part."

  - id: sem-article-vs-section-002
    concept: semantic-tags
    type: theory-quiz
    difficulty: 2
    prompt: "A product card on a shop site that can be pulled out of the page and published separately (say, in an RSS feed of new arrivals) without losing meaning. Which tag fits it best?"
    choices:
      - id: a
        text: "<article>"
      - id: b
        text: "<section>"
      - id: c
        text: "<aside>"
      - id: d
        text: "<div>"
    correct: [a]
    explanation: "The test for article is simple: if a piece of content stands on its own and works published separately, it's an article. section is for thematic blocks that are meaningless outside the page's context."
    hints:
      - "Ask yourself: does this block make sense on its own, outside the surrounding page?"

  - id: sem-blanks-figure-002
    concept: semantic-tags
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the markup for an image with a caption so the connection between them is explicit for programs."
    template: |
      <{{wrap}}>
        <img src="delta-200.jpg" alt="Delta 200 coffee machine">
        <{{caption}}>Delta 200 coffee machine, front view</{{caption}}>
      </{{wrap}}>
    blanks:
      wrap:
        accept: ['figure']
      caption:
        accept: ['figcaption']
    explanation: "figure bundles media and its figcaption into one connected unit; without this pair, the link between an image and the text under it is only visual, not programmatic."
    hints:
      - "You need a pair of tags: a container for the media and a tag specifically for its caption."

  - id: sem-predict-outline-003
    concept: semantic-tags
    type: predict-output
    difficulty: 3
    prompt: |
      In the markup, headings go h1, then straight to h4 (levels h2 and h3 are skipped for a convenient font size). How many nesting levels does the document outline built by a screen reader see between these two headings?
      Answer with the number of skipped, not explicitly declared levels.
    snippet: |
      <h1>Morning Shop</h1>
      <h4>Customer reviews</h4>
    expected:
      kind: scalar
      value: 2
    explanation: "Levels h2 and h3 are skipped - the document outline can't tell whether h4 is a subsection of some intermediate level, and that's two levels of uncertainty in the structure, even though the page looks fine visually."
    hints:
      - "Count how many heading numbers lie strictly between h1 and h4."

  - id: sem-aria-implicit-004
    concept: semantic-tags
    type: theory-quiz
    difficulty: 3
    prompt: "Do you need to write role=\"navigation\" on a <nav> tag for a screen reader to recognize it as a navigation block?"
    choices:
      - id: a
        text: "No: nav already has an implicit ARIA role of navigation."
      - id: b
        text: "Yes: without an explicit role, screen readers ignore nav."
      - id: c
        text: "Yes, but only in old browsers."
      - id: d
        text: "No, but then you need to add aria-label instead of a role."
    correct: [a]
    explanation: "Every semantic tag assigns its own implicit ARIA role: nav is equivalent to role=\"navigation\", main to role=\"main\", a top-level footer to role=\"contentinfo\". Duplicating the role by hand is redundant and can even backfire if it drifts from the tag's semantics."
    hints:
      - "ARIA rule number one: don't override a role the tag already assigns correctly on its own."
      - "Think about why semantic tags exist at all, if not to assign such roles automatically."

  - id: sem-div-legit-005
    concept: semantic-tags
    type: theory-quiz
    difficulty: 2
    prompt: "You need a wrapper container for a CSS grid of product cards that carries no meaning of its own. Which tag fits better?"
    choices:
      - id: a
        text: "<div>"
      - id: b
        text: "<section> without a heading"
      - id: c
        text: "<article>"
      - id: d
        text: "<main>"
    correct: [a]
    explanation: "div remains a legitimate choice when a wrapper is needed purely for styling or a JS hook, and no semantic tag fits the meaning. A section without a heading usually ends up masking this exact situation."
    hints:
      - "Semantics doesn't eliminate div entirely - the question is whether the block has meaning of its own beyond visual grouping."
