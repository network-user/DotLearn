exercises:
  - id: box-layers-order-001
    concept: box-model
    type: theory-quiz
    difficulty: 1
    prompt: "In what order do an element's box layers go, counting outward from the content?"
    choices:
      - id: a
        text: "content → padding → border → margin"
      - id: b
        text: "content → border → padding → margin"
      - id: c
        text: "margin → border → padding → content"
      - id: d
        text: "padding → content → border → margin"
    correct: [a]
    explanation: "The layers nest inside one another from the center outward: first the content, then the inner padding, then the border itself, and outermost of all, the transparent margin."
    hints:
      - "Padding is always closer to the content than border - the padding sits inside the border, not outside it."
    variants:
      - prompt: "Which of the four box layers always stays transparent and is never painted by the element's background?"
        choices:
          - id: a
            text: "margin"
          - id: b
            text: "padding"
          - id: c
            text: "border"
          - id: d
            text: "content"
        correct: [a]
        explanation: "An element's background-color paints content, padding, and fills the area under border, but margin stays pure empty space between neighboring boxes."

  - id: box-blanks-sizing-001
    concept: box-model
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete the global reset after which width means the box's total width including padding and border."
    template: |
      *, *::before, *::after {
        {{property}}: {{value}};
      }
    blanks:
      property:
        accept: ['box-sizing']
      value:
        accept: ['border-box']
    explanation: "box-sizing: border-box changes the meaning of width and height: they now mean the box's total visible size, and the browser shrinks the content area itself to fit padding and border inside it."
    hints:
      - "The property is named the same as the box model itself; the value indicates that border is included in the given size."

  - id: box-predict-width-002
    concept: box-model
    type: predict-output
    difficulty: 2
    prompt: |
      A block has width: 300px, padding: 20px (on all sides), and border: 1px solid gray, with the default box-sizing (content-box). What is the block's final visible width, in pixels?
    snippet: |
      .card {
        width: 300px;
        padding: 20px;
        border: 1px solid gray;
      }
    expected:
      kind: scalar
      value: 342
    explanation: "In content-box, width sets only the content layer. Padding adds 20px on the left and 20px on the right (40px total), border adds 1px on the left and 1px on the right (2px total). 300 + 40 + 2 = 342px."
    hints:
      - "width in content-box refers only to the innermost layer - content; everything else is added on top."
      - "Count the contribution of padding and border on each of the two sides separately, then add it to the original width."

  - id: box-predict-borderbox-003
    concept: box-model
    type: predict-output
    difficulty: 2
    prompt: |
      The same block as before (width: 300px, padding: 20px, border: 1px solid gray), but with box-sizing: border-box. What is the block's final visible width now, in pixels?
    snippet: |
      .card {
        box-sizing: border-box;
        width: 300px;
        padding: 20px;
        border: 1px solid gray;
      }
    expected:
      kind: scalar
      value: 300
    explanation: "border-box changes the meaning of width to the box's overall final width. Padding and border are now included within those 300px rather than added on top - the browser shrinks the content area itself to fit them."
    hints:
      - "border-box answers the question \"how much space will the whole box take\", not \"how much space will just the content take\"."

  - id: box-collapse-004
    concept: box-model
    type: theory-quiz
    difficulty: 3
    prompt: "Two block paragraphs sit one after the other in normal document flow: the first has margin-bottom: 30px, the second margin-top: 50px. What distance ends up between them?"
    choices:
      - id: a
        text: "50px - vertical margins collapse into one, equal to the"
      - id: b
        text: "80px - margins add up like ordinary numbers."
      - id: c
        text: "30px - the margin of the earlier element wins."
      - id: d
        text: "0px - the margins cancel each other out."
    correct: [a]
    explanation: "Margin collapsing is a quirk specific to vertical margins of adjacent block elements in normal flow: the final gap equals the larger of the two values, not their sum. The rule doesn't apply to padding and doesn't apply inside flex or grid containers."
    hints:
      - "It's not addition - recall the name of the effect that makes vertical margins \"merge\"."
      - "One of the two values is simply absorbed by the other, larger one."

  - id: box-inline-width-005
    concept: box-model
    type: theory-quiz
    difficulty: 2
    prompt: "The rule span { width: 200px; } is applied to <span>Text</span> without changing display. What happens?"
    choices:
      - id: a
        text: "The width won't apply: an inline element ignores the width property."
      - id: b
        text: "The element becomes exactly 200px wide, as specified."
      - id: c
        text: "The browser ignores the whole rule, including span's other properties."
      - id: d
        text: "The width applies, but only on hover."
    correct: [a]
    explanation: "Inline elements (display: inline) ignore width, height, and vertical margin by default - they flow inside a line of text, and those properties physically cannot affect a line. To make width work, span needs to become inline-block or block."
    hints:
      - "Recall which box properties inline elements ignore by default."

  - id: box-blanks-display-006
    concept: box-model
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the display value so the element flows in a line next to text, while still respecting width, height, and margin on all sides."
    template: |
      .badge {
        display: {{value}};
      }
    blanks:
      value:
        accept: ['inline-block']
    explanation: "inline-block is a hybrid: the element stays part of the line, like inline, but accepts width, height, and margin on all sides, like block. It's set by hand on buttons and badges; img itself respects sizing for a different reason: it's a replaced element with display: inline by default."
    hints:
      - "Look for the value that combines the behavior of the other two: flowing in a line while also respecting sizes."
