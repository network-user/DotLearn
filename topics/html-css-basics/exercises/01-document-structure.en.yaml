exercises:
  - id: ds-skeleton-order-001
    concept: document-structure
    type: theory-quiz
    difficulty: 1
    prompt: "What comes right after <!DOCTYPE html> in a correct HTML document?"
    choices:
      - id: a
        text: "The root <html> tag."
      - id: b
        text: "The <head> tag."
      - id: c
        text: "The <meta charset> tag."
      - id: d
        text: "The <body> tag."
    correct: [a]
    explanation: "Doctype is a parsing-mode flag, not part of the document tree. Right after it comes the root html tag, which already contains head and body."
    hints:
      - "Doctype is not an element of the document tree - it only switches the parsing mode."
    variants:
      - prompt: "Which of the following is the root of the DOM tree for a typical HTML page?"
        choices:
          - id: a
            text: "The <html> tag."
          - id: b
            text: "The <body> tag."
          - id: c
            text: "The <head> tag."
          - id: d
            text: "Doctype."
        correct: [a]
        explanation: "html is the only top-level tag, holding head and body inside it; doctype is not part of the tree at all - it's an instruction to the parser."

  - id: ds-blanks-skeleton-001
    concept: document-structure
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete the minimal valid HTML document."
    template: |
      {{doctype}}
      <html lang="en">
        <head>
          <meta {{charset_attr}}="utf-8">
          <title>Shopping list</title>
        </head>
        <body>
          <h1>Shopping list</h1>
        </body>
      </html>
    blanks:
      doctype:
        accept: ['<!DOCTYPE html>', '<!doctype html>']
      charset_attr:
        accept: ['charset']
    explanation: "Doctype is always the first line of the document and turns on standards mode. The charset attribute of the meta tag declares the encoding and must appear in head as early as possible."
    hints:
      - "The first line of any HTML document is a parsing-mode flag, not a tree tag."
      - "meta has several attributes; the one responsible for encoding is the one right before the value utf-8."
    variants:
      - prompt: "Complete the head tag with the correct attributes for a responsive mobile page."
        template: |
          <head>
            <meta charset="utf-8">
            <meta name="{{viewport_name}}" content="width=device-width, initial-scale=1">
            <title>Page</title>
          </head>
        blanks:
          viewport_name:
            accept: ['viewport']
        explanation: "The name attribute value of the second meta tag is viewport. Without it, phones render the page at a virtual width of 980px and shrink it down to fit the screen."

  - id: ds-quirks-002
    concept: document-structure
    type: theory-quiz
    difficulty: 2
    prompt: "A page is opened without a <!DOCTYPE html> declaration at the top of the file. What happens?"
    choices:
      - id: a
        text: "The browser refuses to display the page."
      - id: b
        text: "The page parses in quirks mode, and some CSS calculations follow nineties-era"
      - id: c
        text: "Nothing: doctype affects nothing except the validator."
      - id: d
        text: "The browser inserts doctype automatically and the difference goes unnoticed."
    correct: [b]
    explanation: "Doctype switches the browser between standards mode and quirks mode, which reproduces old browser quirks, including a different box-width formula."
    hints:
      - "Doctype isn't decoration - it's a switch between two different sets of parsing and CSS-calculation rules."

  - id: ds-blanks-defer-002
    concept: document-structure
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the script tag in head so that page parsing doesn't stall while it loads."
    template: |
      <head>
        <script {{attr}} src="app.js"></script>
      </head>
    blanks:
      attr:
        accept: ['defer']
    explanation: "The defer attribute makes the browser download the file in parallel with HTML parsing and run it only after the DOM is built, without blocking rendering."
    hints:
      - "Look for the attribute that changes when the script runs, not how it's linked."

  - id: ds-predict-parser-fix-003
    concept: document-structure
    type: predict-output
    difficulty: 3
    prompt: |
      The browser silently fixes invalid markup. How many <p> tags end up in the resulting DOM tree for this snippet?
      <p>Milk
      <p>Bread
      <p>Cheese
    snippet: |
      <p>Milk
      <p>Bread
      <p>Cheese
    expected:
      kind: scalar
      value: 3
    explanation: "A p tag cannot contain another p. When the parser meets a new <p>, it automatically closes the previous one, so the tree ends up with three separate, fully closed paragraphs, even though the source has no closing tags at all."
    hints:
      - "A paragraph cannot nest inside a paragraph - recall how the parser reacts to a new opening tag before the previous one is closed."
      - "Each new <p> automatically closes the previous one instead of becoming its child."

  - id: ds-predict-lang-004
    concept: document-structure
    type: predict-output
    difficulty: 3
    prompt: |
      A page whose text is in English has <html lang="fr">. What does this mean for a blind user relying on a screen reader?
      Give a short answer: "en" or "fr" - which language will the speech synthesizer try to read the text in?
    snippet: |
      <html lang="fr">
        <body>
          <p>Today's shopping list.</p>
        </body>
      </html>
    expected:
      kind: scalar
      value: "fr"
    explanation: "A screen reader picks its synthesizer voice from the root tag's lang attribute, not from the text's actual language. A mismatched lang makes the program read English text with a French accent."
    hints:
      - "lang does not analyze the page's content - it's an explicit declaration that programs trust literally."

  - id: ds-css-priority-005
    concept: document-structure
    type: theory-quiz
    difficulty: 2
    prompt: "A page links an external styles.css file, and inside the same head there's a <style> tag with a different value of the same property for the same selector, declared later in the markup. Which rule applies?"
    choices:
      - id: a
        text: "Whichever is declared later in the HTML document"
      - id: b
        text: "Always the external file, regardless of order."
      - id: c
        text: "Both apply at once with no conflict."
      - id: d
        text: "The browser refuses to render the page due to the conflict."
    correct: [a]
    explanation: "Both link and style are author styles of the same origin with equal specificity for a matching selector; all else equal, the order in the document's source code decides, not the way the styles are included."
    hints:
      - "The way styles are included (file or tag in head) doesn't by itself grant priority - what matters is order in the document."
