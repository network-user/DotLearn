exercises:
  - id: ds-skeleton-order-001
    concept: document-structure
    type: theory-quiz
    difficulty: 1
    prompt: "Что идёт сразу после <!DOCTYPE html> в правильном HTML-документе?"
    choices:
      - id: a
        text: "Корневой тег <html>."
      - id: b
        text: "Тег <head>."
      - id: c
        text: "Тег <meta charset>."
      - id: d
        text: "Тег <body>."
    correct: [a]
    explanation: "Doctype — это флажок режима разбора, а не часть дерева документа. Сразу за ним идёт корневой тег html, внутри которого уже находятся head и body."
    hints:
      - "Doctype не является элементом дерева документа — он только переключает режим разбора."
    variants:
      - prompt: "Что из перечисленного является корнем дерева DOM у обычной HTML-страницы?"
        choices:
          - id: a
            text: "Тег <html>."
          - id: b
            text: "Тег <body>."
          - id: c
            text: "Тег <head>."
          - id: d
            text: "Doctype."
        correct: [a]
        explanation: "html — единственный тег верхнего уровня, внутри которого лежат head и body; doctype в дерево не входит вовсе, это инструкция режиму разбора."

  - id: ds-blanks-skeleton-001
    concept: document-structure
    type: fill-in-blanks
    difficulty: 1
    prompt: "Дополните минимальный правильный HTML-документ."
    template: |
      {{doctype}}
      <html lang="ru">
        <head>
          <meta {{charset_attr}}="utf-8">
          <title>Список покупок</title>
        </head>
        <body>
          <h1>Список покупок</h1>
        </body>
      </html>
    blanks:
      doctype:
        accept: ['<!DOCTYPE html>', '<!doctype html>']
      charset_attr:
        accept: ['charset']
    explanation: "Doctype всегда первая строка документа и включает стандартный режим разбора. Кодировку объявляет атрибут charset тега meta, обязанный попасть в head как можно раньше."
    hints:
      - "Первая строка любого HTML-документа — это флажок режима разбора, а не тег дерева."
      - "У meta есть несколько атрибутов; за кодировку отвечает тот, что стоит перед значением utf-8."
    variants:
      - prompt: "Дополните тег head правильными атрибутами для мобильной адаптивной страницы."
        template: |
          <head>
            <meta charset="utf-8">
            <meta name="{{viewport_name}}" content="width=device-width, initial-scale=1">
            <title>Страница</title>
          </head>
        blanks:
          viewport_name:
            accept: ['viewport']
        explanation: "Значение атрибута name у второго meta — viewport. Без него телефон рисует страницу в виртуальную ширину 980px и уменьшает картинку до размера экрана."

  - id: ds-quirks-002
    concept: document-structure
    type: theory-quiz
    difficulty: 2
    prompt: "Страница открыта без объявления <!DOCTYPE html> в начале файла. Что произойдёт?"
    choices:
      - id: a
        text: "Браузер откажется показывать страницу."
      - id: b
        text: "Страница разберётся в quirks mode и часть CSS-расчётов (например, ширина блока) сработает по правилам девяностых."
      - id: c
        text: "Ничего: doctype ни на что не влияет, кроме валидатора."
      - id: d
        text: "Браузер подставит doctype автоматически и разница будет незаметна."
    correct: [b]
    explanation: "Doctype переключает браузер между стандартным режимом и режимом совместимости (quirks mode), где воспроизводятся старые причуды браузеров, включая другую формулу ширины блока."
    hints:
      - "Doctype — не украшение, а переключатель между двумя разными наборами правил разбора и расчёта CSS."

  - id: ds-blanks-defer-002
    concept: document-structure
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните подключение скрипта в head так, чтобы разбор страницы не замирал на время его загрузки."
    template: |
      <head>
        <script {{attr}} src="app.js"></script>
      </head>
    blanks:
      attr:
        accept: ['defer']
    explanation: "Атрибут defer заставляет браузер скачивать файл параллельно с разбором HTML и выполнить его только после построения DOM, не блокируя отрисовку."
    hints:
      - "Ищите атрибут, который меняет момент выполнения скрипта, а не способ его подключения."

  - id: ds-predict-parser-fix-003
    concept: document-structure
    type: predict-output
    difficulty: 3
    prompt: |
      Браузер молча чинит невалидную разметку. Сколько тегов <p> окажется в итоговом DOM-дереве для этого фрагмента?
      <p>Молоко
      <p>Хлеб
      <p>Сыр
    snippet: |
      <p>Молоко
      <p>Хлеб
      <p>Сыр
    expected:
      kind: scalar
      value: 3
    explanation: "Тег p не может содержать другой p. Встретив новый <p>, парсер автоматически закрывает предыдущий, поэтому в дереве окажется три отдельных, полностью закрытых абзаца, хотя в исходнике нет ни одного закрывающего тега."
    hints:
      - "Абзац не умеет вкладываться в абзац — вспомните, как парсер реагирует на новый открывающий тег до того, как закрыт предыдущий."
      - "Каждый новый <p> автоматически завершает предыдущий, а не становится его потомком."

  - id: ds-predict-lang-004
    concept: document-structure
    type: predict-output
    difficulty: 3
    prompt: |
      На странице с текстом на русском языке стоит <html lang="en">. Что из этого следует для незрячего пользователя со скринридером?
      Выберите короткий ответ: "en" или "ru" — на каком языке синтезатор речи попытается прочитать текст?
    snippet: |
      <html lang="en">
        <body>
          <p>Список покупок на сегодня.</p>
        </body>
      </html>
    expected:
      kind: scalar
      value: "en"
    explanation: "Скринридер выбирает голос синтезатора по атрибуту lang корневого тега, а не по фактическому языку текста. Несовпадение lang с реальным языком заставляет программу читать русский текст английским произношением."
    hints:
      - "lang не анализирует содержимое страницы — это явное указание, которому программы доверяют буквально."

  - id: ds-css-priority-005
    concept: document-structure
    type: theory-quiz
    difficulty: 2
    prompt: "На странице подключён и внешний файл styles.css, и внутри того же head есть тег <style> с другим значением того же свойства для того же селектора, объявленный позже в разметке. Какое правило применится?"
    choices:
      - id: a
        text: "То, что объявлено позже в HTML-документе — тег style, если он идёт после link."
      - id: b
        text: "Всегда внешний файл, независимо от порядка."
      - id: c
        text: "Оба применятся одновременно без конфликта."
      - id: d
        text: "Браузер откажется рендерить страницу из-за конфликта."
    correct: [a]
    explanation: "И link, и style — это author-стили одного происхождения с одинаковой специфичностью при совпадающем селекторе; при прочих равных решает порядок в исходном коде документа, а не способ подключения."
    hints:
      - "Способ подключения (файл или тег в head) сам по себе не даёт приоритета — важен порядок в документе."
