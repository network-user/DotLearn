exercises:
  - id: sem-landmarks-001
    concept: semantic-tags
    type: theory-quiz
    difficulty: 1
    prompt: "Какой тег отвечает за единственную основную область контента страницы?"
    choices:
      - id: a
        text: "<main>"
      - id: b
        text: "<section>"
      - id: c
        text: "<div>"
      - id: d
        text: "<article>"
    correct: [a]
    explanation: "main — единственный на странице тег для основного контента; скринридеры используют его, чтобы предложить команду «перейти сразу к содержимому», минуя шапку и меню."
    hints:
      - "Ищите тег, которого на странице может быть только один экземпляр."
    variants:
      - prompt: "Какой тег объединяет блок навигационных ссылок сайта, например главное меню?"
        choices:
          - id: a
            text: "<nav>"
          - id: b
            text: "<header>"
          - id: c
            text: "<a>"
          - id: d
            text: "<aside>"
        correct: [a]
        explanation: "nav помечает значимый блок навигации; скринридер строит по таким тегам список ориентиров страницы для быстрого перехода."

  - id: sem-blanks-skeleton-001
    concept: semantic-tags
    type: fill-in-blanks
    difficulty: 1
    prompt: "Дополните семантический скелет страницы подходящими тегами."
    template: |
      <{{top}}>
        <h1>Магазин «Утро»</h1>
      </{{top}}>
      <{{content}}>
        <p>Основной контент страницы.</p>
      </{{content}}>
      <{{bottom}}>
        <p>© 2026</p>
      </{{bottom}}>
    blanks:
      top:
        accept: ['header']
      content:
        accept: ['main']
      bottom:
        accept: ['footer']
    explanation: "header открывает страницу, main содержит единственную основную область контента, footer завершает страницу — три стандартных региона верхнего уровня."
    hints:
      - "Три тега соответствуют трём ролям: вводная часть, основной контент, завершающая часть."

  - id: sem-article-vs-section-002
    concept: semantic-tags
    type: theory-quiz
    difficulty: 2
    prompt: "Карточка товара на сайте магазина, которую можно вырвать со страницы и опубликовать отдельно (например, в RSS-ленте новинок), не потеряв смысла. Какой тег для неё подходит лучше?"
    choices:
      - id: a
        text: "<article>"
      - id: b
        text: "<section>"
      - id: c
        text: "<aside>"
      - id: d
        text: "<div>"
    correct: [a]
    explanation: "Проверка на article простая: если кусок контента самостоятелен и годится для отдельной публикации, это article. section оставляют для тематических блоков, бессмысленных вне контекста страницы."
    hints:
      - "Спросите себя: имеет ли этот блок смысл сам по себе, вне окружающей страницы?"

  - id: sem-blanks-figure-002
    concept: semantic-tags
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните разметку картинки с подписью так, чтобы связь между ними была явной для программ."
    template: |
      <{{wrap}}>
        <img src="delta-200.jpg" alt="Кофемашина Delta 200">
        <{{caption}}>Кофемашина Delta 200, вид спереди</{{caption}}>
      </{{wrap}}>
    blanks:
      wrap:
        accept: ['figure']
      caption:
        accept: ['figcaption']
    explanation: "figure объединяет медиа и его подпись figcaption в одну связанную единицу; без этой пары связь между картинкой и текстом под ней существует только визуально, но не programmatic."
    hints:
      - "Нужна пара тегов: контейнер для медиа и тег специально для его подписи."

  - id: sem-predict-outline-003
    concept: semantic-tags
    type: predict-output
    difficulty: 3
    prompt: |
      В разметке заголовки идут в порядке h1, затем сразу h4 (уровень h2 и h3 пропущены ради подходящего размера шрифта). Сколько уровней вложенности видит контур документа (outline), который строит скринридер, между этими двумя заголовками?
      Ответьте числом пропущенных, не объявленных явно уровней.
    snippet: |
      <h1>Магазин «Утро»</h1>
      <h4>Отзывы покупателей</h4>
    expected:
      kind: scalar
      value: 2
    explanation: "Пропущены уровни h2 и h3 — контур документа не может понять, является ли h4 подразделом какого-то среднего уровня, и это два уровня неопределённости в структуре, хотя визуально страница выглядит нормально."
    hints:
      - "Посчитайте, сколько номеров заголовков лежит строго между h1 и h4."

  - id: sem-aria-implicit-004
    concept: semantic-tags
    type: theory-quiz
    difficulty: 3
    prompt: "Нужно ли писать role=\"navigation\" на теге <nav>, чтобы скринридер распознал его как навигационный блок?"
    choices:
      - id: a
        text: "Нет: nav уже имеет неявную (implicit) ARIA-роль navigation."
      - id: b
        text: "Да: без явной роли скринридеры игнорируют nav."
      - id: c
        text: "Да, но только в старых браузерах."
      - id: d
        text: "Нет, но тогда нужно добавить aria-label вместо роли."
    correct: [a]
    explanation: "Каждый семантический тег назначает неявную ARIA-роль сам: nav эквивалентен role=\"navigation\", main — role=\"main\", footer верхнего уровня — role=\"contentinfo\". Дублировать роль вручную избыточно и способно даже навредить, если она разойдётся с семантикой тега."
    hints:
      - "Правило ARIA номер один: не переопределяйте роль, которую тег и так корректно назначает сам."
      - "Подумайте, зачем вообще существуют семантические теги, если не для того, чтобы такие роли назначались автоматически."

  - id: sem-div-legit-005
    concept: semantic-tags
    type: theory-quiz
    difficulty: 2
    prompt: "Нужен контейнер-обёртка для CSS-сетки карточек товаров, который сам по себе не несёт никакого содержательного смысла. Какой тег уместнее?"
    choices:
      - id: a
        text: "<div>"
      - id: b
        text: "<section> без заголовка"
      - id: c
        text: "<article>"
      - id: d
        text: "<main>"
    correct: [a]
    explanation: "div остаётся законным выбором, когда обёртка нужна исключительно для стилизации или JS-крючка, а подходящего по смыслу семантического тега нет. section без заголовка обычно на самом деле маскирует именно эту ситуацию."
    hints:
      - "Семантика не отменяет div полностью — вопрос в том, есть ли у блока собственный смысл, помимо визуальной группировки."
