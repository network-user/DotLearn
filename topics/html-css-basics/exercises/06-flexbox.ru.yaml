exercises:
  - id: flex-activate-001
    concept: flexbox
    type: theory-quiz
    difficulty: 1
    prompt: "Какое свойство на родительском элементе включает flexbox для его прямых детей?"
    choices:
      - id: a
        text: "display: flex"
      - id: b
        text: "position: flex"
      - id: c
        text: "flex: row"
      - id: d
        text: "float: flex"
    correct: [a]
    explanation: "display: flex на контейнере превращает его прямых детей в flex-элементы, выстраиваемые вдоль главной оси; flex — не значение display и не значение position."
    hints:
      - "Ищите значение того же свойства, которое обычно принимает block или inline."
    variants:
      - prompt: "На каком элементе (родителе или ребёнке) нужно указать display: flex, чтобы включить flex-раскладку?"
        choices:
          - id: a
            text: "На родительском контейнере."
          - id: b
            text: "На каждом дочернем элементе по отдельности."
          - id: c
            text: "На обоих сразу."
          - id: d
            text: "На body страницы, независимо от структуры."
        correct: [a]
        explanation: "display: flex указывается на контейнере; он автоматически меняет поведение всех своих прямых детей, не требуя правил на них самих."

  - id: flex-blanks-axis-001
    concept: flexbox
    type: fill-in-blanks
    difficulty: 1
    prompt: "Дополните правило так, чтобы элементы flex-контейнера выстроились в колонку сверху вниз вместо ряда."
    template: |
      .stack {
        display: flex;
        flex-direction: {{value}};
      }
    blanks:
      value:
        accept: ['column']
    explanation: "flex-direction: column делает главной осью вертикальное направление; элементы выстраиваются сверху вниз вместо ряда слева направо (значение по умолчанию row)."
    hints:
      - "По умолчанию главная ось горизонтальна (row); нужно противоположное значение."

  - id: flex-justify-vs-align-002
    concept: flexbox
    type: theory-quiz
    difficulty: 2
    prompt: "Контейнер: display: flex; flex-direction: row. Какое свойство отвечает за горизонтальное распределение элементов вдоль главной оси?"
    choices:
      - id: a
        text: "justify-content"
      - id: b
        text: "align-items"
      - id: c
        text: "align-content"
      - id: d
        text: "flex-wrap"
    correct: [a]
    explanation: "justify-content всегда работает вдоль главной оси, а align-items — поперёк неё. При flex-direction: row главная ось горизонтальна, значит именно justify-content управляет горизонтальным распределением."
    hints:
      - "Название одного свойства говорит про главную ось, другого — про выравнивание в другом направлении. Определите, какая ось сейчас главная."

  - id: flex-blanks-between-002
    concept: flexbox
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните правило так, чтобы логотип слева и ссылки меню справа оказались прижаты к противоположным краям панели, а остальное место распределилось между ними."
    template: |
      .navbar {
        display: flex;
        justify-content: {{value}};
      }
    blanks:
      value:
        accept: ['space-between']
    explanation: "space-between прижимает первый и последний элемент к краям контейнера, а свободное место распределяет поровну между элементами между ними — типичный рецепт для панели «логотип слева, меню справа»."
    hints:
      - "Нужно значение, где крайние элементы касаются краёв, а не одно из значений с равномерными отступами вокруг каждого элемента."

  - id: flex-predict-grow-003
    concept: flexbox
    type: predict-output
    difficulty: 3
    prompt: |
      Flex-контейнер шириной 900px содержит два элемента: .sidebar с flex: 0 0 300px и .content с flex: 1 1 0. Сколько пикселей ширины займёт .content?
    snippet: |
      .row { display: flex; width: 900px; }
      .sidebar { flex: 0 0 300px; }
      .content { flex: 1 1 0; }
    expected:
      kind: scalar
      value: 600
    explanation: "sidebar не растёт и не сжимается, его базовая ширина фиксирована на 300px. Оставшееся пространство (900 - 300 = 600px) целиком забирает content, единственный элемент с flex-grow больше нуля, стартующий с базовой ширины 0."
    hints:
      - "Сначала вычтите фиксированную ширину элемента, который не растёт, из общей ширины контейнера."
      - "Весь остаток пространства достаётся единственному элементу с ненулевым flex-grow."

  - id: flex-align-self-004
    concept: flexbox
    type: theory-quiz
    difficulty: 3
    prompt: "У flex-контейнера align-items: flex-start. Один из трёх элементов должен, в отличие от соседей, быть выровнен по центру поперечной оси. Как это сделать, не трогая контейнер?"
    choices:
      - id: a
        text: "Задать этому элементу align-self: center."
      - id: b
        text: "Задать этому элементу justify-content: center."
      - id: c
        text: "Обернуть элемент в дополнительный flex-контейнер."
      - id: d
        text: "Это невозможно без изменения align-items на контейнере."
    correct: [a]
    explanation: "align-self переопределяет align-items контейнера только для одного конкретного элемента, не затрагивая остальных. justify-content — свойство контейнера, а не отдельного элемента, и на выравнивание по поперечной оси не влияет."
    hints:
      - "Ищите свойство-«исключение», которое применяется к отдельному ребёнку, а не к контейнеру целиком."

  - id: flex-wrap-gap-005
    concept: flexbox
    type: theory-quiz
    difficulty: 2
    prompt: "Ряд карточек в flex-контейнере на узком экране сжимается до нечитаемой ширины вместо переноса на новую строку. Какого свойства не хватает?"
    choices:
      - id: a
        text: "flex-wrap: wrap"
      - id: b
        text: "flex-direction: column"
      - id: c
        text: "align-items: stretch"
      - id: d
        text: "justify-content: wrap"
    correct: [a]
    explanation: "По умолчанию flex-контейнер пытается втиснуть все элементы в одну строку, сжимая их. flex-wrap: wrap разрешает перенос на новую строку, когда места перестаёт хватать, вместо схлопывания элементов."
    hints:
      - "justify-content не принимает значение wrap — ищите другое свойство, отвечающее именно за перенос строк."

  - id: flex-blanks-gap-006
    concept: flexbox
    type: fill-in-blanks
    difficulty: 1
    prompt: "Дополните правило, задающее расстояние между карточками без margin на каждой из них."
    template: |
      .row {
        display: flex;
        {{property}}: 16px;
      }
    blanks:
      property:
        accept: ['gap']
    explanation: "gap задаёт расстояние между flex-элементами напрямую, без ручного margin на каждом и без побочной проблемы лишнего отступа у последнего элемента в ряду."
    hints:
      - "Свойство работает и во flexbox, и в grid, и называется одним коротким словом про промежуток."
