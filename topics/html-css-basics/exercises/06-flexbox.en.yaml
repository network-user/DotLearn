exercises:
  - id: flex-activate-001
    concept: flexbox
    type: theory-quiz
    difficulty: 1
    prompt: "Which property on a parent element turns on flexbox for its direct children?"
    choices:
      - id: a
        text: "display: flex"
      - id: b
        text: "position: flex"
      - id: c
        text: "flex: row"
      - id: d
        text: "float: flex"
    correct: [a]
    explanation: "display: flex on a container turns its direct children into flex items arranged along the main axis; flex is not a value of display, nor of position."
    hints:
      - "Look for a value of the same property that normally takes block or inline."
    variants:
      - prompt: "On which element (parent or child) do you need to set display: flex to turn on flex layout?"
        choices:
          - id: a
            text: "On the parent container."
          - id: b
            text: "On each child element individually."
          - id: c
            text: "On both at once."
          - id: d
            text: "On the page's body, regardless of structure."
        correct: [a]
        explanation: "display: flex is set on the container; it automatically changes the behavior of all its direct children, with no rules needed on the children themselves."

  - id: flex-blanks-axis-001
    concept: flexbox
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete the rule so the flex container's items line up in a column top-to-bottom instead of a row."
    template: |
      .stack {
        display: flex;
        flex-direction: {{value}};
      }
    blanks:
      value:
        accept: ['column']
    explanation: "flex-direction: column makes the vertical direction the main axis; items line up top-to-bottom instead of left-to-right in a row (the default value is row)."
    hints:
      - "By default the main axis is horizontal (row); you need the opposite value."

  - id: flex-justify-vs-align-002
    concept: flexbox
    type: theory-quiz
    difficulty: 2
    prompt: "Container: display: flex; flex-direction: row. Which property handles the horizontal distribution of items along the main axis?"
    choices:
      - id: a
        text: "justify-content"
      - id: b
        text: "align-items"
      - id: c
        text: "align-content"
      - id: d
        text: "flex-wrap"
    correct: [a]
    explanation: "justify-content always works along the main axis, while align-items works across it. With flex-direction: row, the main axis is horizontal, so justify-content is what controls horizontal distribution."
    hints:
      - "One property's name refers to the main axis, the other to alignment in the other direction. Work out which axis is currently the main one."

  - id: flex-blanks-between-002
    concept: flexbox
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the rule so the logo on the left and the menu links on the right sit pressed against opposite edges of the bar, with the rest of the space distributed between them."
    template: |
      .navbar {
        display: flex;
        justify-content: {{value}};
      }
    blanks:
      value:
        accept: ['space-between']
    explanation: "space-between presses the first and last items against the container's edges, distributing free space evenly between the items in between - the classic recipe for a bar with logo on the left, menu on the right."
    hints:
      - "You need the value where the outer items touch the edges, not one of the values with even spacing around each item."

  - id: flex-predict-grow-003
    concept: flexbox
    type: predict-output
    difficulty: 3
    prompt: |
      A flex container 900px wide holds two items: .sidebar with flex: 0 0 300px and .content with flex: 1 1 0. How many pixels wide will .content be?
    snippet: |
      .row { display: flex; width: 900px; }
      .sidebar { flex: 0 0 300px; }
      .content { flex: 1 1 0; }
    expected:
      kind: scalar
      value: 600
    explanation: "sidebar neither grows nor shrinks, its base width is fixed at 300px. The remaining space (900 - 300 = 600px) is taken entirely by content, the only item with flex-grow above zero, starting from a base width of 0."
    hints:
      - "First subtract the fixed width of the item that doesn't grow from the container's total width."
      - "All the remaining space goes to the single item with nonzero flex-grow."

  - id: flex-align-self-004
    concept: flexbox
    type: theory-quiz
    difficulty: 3
    prompt: "A flex container has align-items: flex-start. One of three items, unlike its siblings, needs to be centered on the cross axis. How do you do that without touching the container?"
    choices:
      - id: a
        text: "Set align-self: center on that item."
      - id: b
        text: "Set justify-content: center on that item."
      - id: c
        text: "Wrap the item in an extra flex container."
      - id: d
        text: "It's impossible without changing align-items on the container."
    correct: [a]
    explanation: "align-self overrides the container's align-items for just one specific item, without affecting the rest. justify-content is a container property, not an item property, and doesn't affect cross-axis alignment."
    hints:
      - "Look for the \"exception\" property that applies to an individual child rather than the whole container."

  - id: flex-wrap-gap-005
    concept: flexbox
    type: theory-quiz
    difficulty: 2
    prompt: "A row of cards in a flex container shrinks to an unreadable width on a narrow screen instead of wrapping onto a new line. Which property is missing?"
    choices:
      - id: a
        text: "flex-wrap: wrap"
      - id: b
        text: "flex-direction: column"
      - id: c
        text: "align-items: stretch"
      - id: d
        text: "justify-content: wrap"
    correct: [a]
    explanation: "By default a flex container tries to squeeze all items into one line, shrinking them. flex-wrap: wrap allows wrapping onto a new line once space runs out, instead of collapsing the items."
    hints:
      - "justify-content doesn't accept a wrap value - look for the other property responsible for line wrapping."

  - id: flex-blanks-gap-006
    concept: flexbox
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete the rule that sets the gap between cards without margin on each one."
    template: |
      .row {
        display: flex;
        {{property}}: 16px;
      }
    blanks:
      property:
        accept: ['gap']
    explanation: "gap sets the spacing between flex items directly, without manual margin on each one and without the side effect of an extra gap after the last item in a row."
    hints:
      - "The property works in both flexbox and grid, and is named with one short word for spacing."
