exercises:
  - id: box-layers-order-001
    concept: box-model
    type: theory-quiz
    difficulty: 1
    prompt: "В каком порядке идут слои коробки элемента, считая от содержимого наружу?"
    choices:
      - id: a
        text: "content → padding → border → margin"
      - id: b
        text: "content → border → padding → margin"
      - id: c
        text: "margin → border → padding → content"
      - id: d
        text: "padding → content → border → margin"
    correct: [a]
    explanation: "Слои вложены друг в друга от центра наружу: сначала содержимое, затем внутренний отступ padding, затем сама рамка border, и снаружи всего — прозрачный внешний отступ margin."
    hints:
      - "Padding всегда ближе к содержимому, чем border — отступ находится внутри рамки, а не снаружи неё."
    variants:
      - prompt: "Какой из четырёх слоёв коробки всегда остаётся прозрачным и не закрашивается фоном элемента?"
        choices:
          - id: a
            text: "margin"
          - id: b
            text: "padding"
          - id: c
            text: "border"
          - id: d
            text: "content"
        correct: [a]
        explanation: "background-color элемента закрашивает content, padding и заливает область под border, но margin остаётся чистым воздухом между соседними коробками."

  - id: box-blanks-sizing-001
    concept: box-model
    type: fill-in-blanks
    difficulty: 1
    prompt: "Дополните глобальный сброс, после которого width будет означать итоговую ширину коробки вместе с padding и border."
    template: |
      *, *::before, *::after {
        {{property}}: {{value}};
      }
    blanks:
      property:
        accept: ['box-sizing']
      value:
        accept: ['border-box']
    explanation: "box-sizing: border-box меняет смысл width и height: теперь они означают итоговый видимый размер коробки, а браузер сам уменьшает область content, чтобы padding и border туда уместились."
    hints:
      - "Свойство называется так же, как модель коробки в целом; значение указывает, что border входит в заданный размер."

  - id: box-predict-width-002
    concept: box-model
    type: predict-output
    difficulty: 2
    prompt: |
      У блока width: 300px, padding: 20px (со всех сторон) и border: 1px solid gray, box-sizing по умолчанию (content-box). Чему равна итоговая видимая ширина блока в пикселях?
    snippet: |
      .card {
        width: 300px;
        padding: 20px;
        border: 1px solid gray;
      }
    expected:
      kind: scalar
      value: 342
    explanation: "В content-box width задаёт только слой content. Padding добавляет 20px слева и 20px справа (40px), border добавляет 1px слева и 1px справа (2px). 300 + 40 + 2 = 342px."
    hints:
      - "width в content-box относится только к самому внутреннему слою — content, остальное добавляется поверх."
      - "Посчитайте отдельно вклад padding и border с каждой из двух сторон, затем сложите с исходной шириной."

  - id: box-predict-borderbox-003
    concept: box-model
    type: predict-output
    difficulty: 2
    prompt: |
      Тот же блок, что и раньше (width: 300px, padding: 20px, border: 1px solid gray), но с box-sizing: border-box. Чему теперь равна итоговая видимая ширина блока в пикселях?
    snippet: |
      .card {
        box-sizing: border-box;
        width: 300px;
        padding: 20px;
        border: 1px solid gray;
      }
    expected:
      kind: scalar
      value: 300
    explanation: "border-box меняет смысл width на итоговую ширину коробки целиком. Padding и border теперь входят в эти 300px, а не добавляются сверху — браузер сам сжимает область content под них."
    hints:
      - "border-box отвечает на вопрос «сколько займёт коробка целиком», а не «сколько займёт только содержимое»."

  - id: box-collapse-004
    concept: box-model
    type: theory-quiz
    difficulty: 3
    prompt: "Два блочных абзаца идут подряд в обычном потоке документа: у первого margin-bottom: 30px, у второго margin-top: 50px. Какое расстояние между ними получится?"
    choices:
      - id: a
        text: "50px — вертикальные margin схлопываются в один, равный большему значению."
      - id: b
        text: "80px — margin складываются как обычные числа."
      - id: c
        text: "30px — побеждает margin более раннего по порядку элемента."
      - id: d
        text: "0px — margin гасят друг друга."
    correct: [a]
    explanation: "Схлопывание margin — особенность именно вертикальных отступов соседних блочных элементов в обычном потоке: итоговое расстояние равно большему из двух значений, а не их сумме. Правило не действует для padding и не действует внутри flex- или grid-контейнеров."
    hints:
      - "Это не сложение, вспомните название эффекта, из-за которого вертикальные отступы «сливаются»."
      - "Одно из двух значений просто поглощается другим — большим."

  - id: box-inline-width-005
    concept: box-model
    type: theory-quiz
    difficulty: 2
    prompt: "К <span>Текст</span> применили правило span { width: 200px; }, не меняя display. Что произойдёт?"
    choices:
      - id: a
        text: "Ширина не применится: строчный элемент (display: inline) игнорирует свойство width."
      - id: b
        text: "Элемент станет ровно 200px шириной, как и было задано."
      - id: c
        text: "Браузер проигнорирует всё правило целиком, включая другие свойства span."
      - id: d
        text: "Ширина применится, но только при наведении курсора."
    correct: [a]
    explanation: "Строчные элементы (display: inline) по умолчанию игнорируют width, height и вертикальные margin — они текут внутри строки текста, и эти свойства физически не могут повлиять на строку. Чтобы width сработала, span нужно перевести в inline-block или block."
    hints:
      - "Вспомните, какие свойства коробки строчные элементы игнорируют по умолчанию."

  - id: box-blanks-display-006
    concept: box-model
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните значение display так, чтобы элемент тёк в строке рядом с текстом, но при этом уважал width, height и все стороны margin."
    template: |
      img {
        display: {{value}};
      }
    blanks:
      value:
        accept: ['inline-block']
    explanation: "inline-block — гибрид: элемент остаётся частью строки, как inline, но принимает width, height и margin со всех сторон, как block. Именно поэтому у img по умолчанию именно такое поведение."
    hints:
      - "Ищите значение, которое совмещает поведение двух других: течь в строке и одновременно уважать размеры."
