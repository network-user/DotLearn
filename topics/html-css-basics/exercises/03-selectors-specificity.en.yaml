exercises:
  - id: sel-basic-select-001
    concept: selectors-specificity
    type: theory-quiz
    difficulty: 1
    prompt: "Which selector finds the element with id=\"menu\"?"
    choices:
      - id: a
        text: "#menu"
      - id: b
        text: ".menu"
      - id: c
        text: "menu"
      - id: d
        text: "[menu]"
    correct: [a]
    explanation: "The hash marks an id selector: #menu looks for the element whose id attribute equals menu."
    hints:
      - "The symbol before the name determines the selector type: dot for class, hash for id."
    variants:
      - prompt: "Which selector finds all elements with the class card?"
        choices:
          - id: a
            text: ".card"
          - id: b
            text: "#card"
          - id: c
            text: "card"
          - id: d
            text: "*card"
        correct: [a]
        explanation: "A dot before the name is a class selector; it matches every element that has this word in its class attribute, regardless of tag."

  - id: sel-blanks-combinators-001
    concept: selectors-specificity
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete the selectors with the right combinators: first any descendant, then only a direct child."
    template: |
      nav {{descendant}} a { color: inherit; }
      nav {{child}} a { padding: 8px; }
    blanks:
      descendant:
        accept: [' ', '']
      child:
        accept: ['>']
    explanation: "A space is the descendant combinator, finding a link at any depth inside nav. The > arrow is stricter: only links that sit directly inside nav, with no wrapper in between."
    hints:
      - "One of the two combinators is literally a space between simple selectors."

  - id: sel-specificity-tuple-002
    concept: selectors-specificity
    type: theory-quiz
    difficulty: 2
    prompt: "Selectors #header .logo and nav a.active.big compete for one property of one element. The first has specificity 1·1·0, the second 0·2·2. Which wins?"
    choices:
      - id: a
        text: "#header .logo, because it has a one in the id column against a zero."
      - id: b
        text: "nav a.active.big, because it has more simple selectors in total."
      - id: c
        text: "A tie, decided by code order."
      - id: d
        text: "nav a.active.big, because it has more classes."
    correct: [a]
    explanation: "Specificity comparison is digit-by-digit, left to right: the id column is compared first. 1 against 0 already settles it - the class and tag columns never get compared, no matter how many the competitor has."
    hints:
      - "Specificity isn't a sum but a tuple of three independent digits; comparison stops at the first difference."

  - id: sel-blanks-attr-002
    concept: selectors-specificity
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the selector that finds links opening in a new tab and highlights them on hover."
    template: |
      a{{attr}}"_blank"]{{pseudo}} { outline: 1px dotted; }
    blanks:
      attr:
        accept: ['[target=']
      pseudo:
        accept: [':hover']
    explanation: "Square brackets with a value comparison check the target attribute, and the :hover pseudo-class describes the cursor-hover state - you've seen both kinds of selector separately before; here they're chained together."
    hints:
      - "The first part checks an attribute by value, the second is the pseudo-class for the hover state."

  - id: sel-predict-winner-003
    concept: selectors-specificity
    type: predict-output
    difficulty: 3
    prompt: |
      Two CSS rules apply to the same button. Which text color wins?
      .button { color: blue; }
      button.button.primary { color: green; }
    snippet: |
      .button { color: blue; }
      button.button.primary { color: green; }
    expected:
      kind: scalar
      value: "green"
    explanation: "The specificity of .button is 0·1·0. button.button.primary has the button tag (1 in the tag column) plus two classes (2 in the class column), totaling 0·2·1. The class column, 2 against 1, decides in favor of green."
    hints:
      - "Count the id·class·tag triple for each selector separately before comparing."
      - "The second selector has two classes and one tag - compare the class column first, it outranks the tag column."

  - id: sel-predict-notzero-004
    concept: selectors-specificity
    type: predict-output
    difficulty: 3
    prompt: |
      What is the specificity of the selector p:not(.intro), in the format a.b.c (no dots, just digits in a row, e.g. 010)?
    snippet: |
      p:not(.intro) { color: gray; }
    expected:
      kind: stdout
      value: "011"
    explanation: ":not() itself adds no weight, but its argument counts as a normal selector: the .intro class inside the parentheses adds one to the class column. Plus the p tag adds one to the tag column. Total: 0·1·1."
    hints:
      - "The :not() pseudo-class is weightless itself, but its argument isn't - count what's inside the parentheses."

  - id: sel-inline-important-005
    concept: selectors-specificity
    type: theory-quiz
    difficulty: 4
    prompt: "An element has style=\"color: red\" right in its HTML attribute. The linked stylesheet has a rule .card { color: blue !important; }. Which color applies?"
    choices:
      - id: a
        text: "Blue: !important overrides even inline style."
      - id: b
        text: "Red: inline style is always stronger than any selector from a file."
      - id: c
        text: "A tie, the browser's default color applies."
      - id: d
        text: "Red, because style is declared later in the load order."
    correct: [a]
    explanation: "Inline style formally beats any regular selector from a file, but !important overrides even that. The only thing that would beat a file's !important is its own !important right inside the style attribute."
    hints:
      - "Inline style beats the specificity of any regular selector, but not the important flag."
      - "Ask yourself: what can ever beat !important, if not stronger specificity?"

  - id: sel-universal-zero-006
    concept: selectors-specificity
    type: theory-quiz
    difficulty: 2
    prompt: "How much does the selector * > * (universal selector with a child combinator) weigh in specificity?"
    choices:
      - id: a
        text: "0·0·0 - the universal selector and combinators add no weight."
      - id: b
        text: "0·0·2 - one point per asterisk."
      - id: c
        text: "0·1·0 - the combinator counts as a class."
      - id: d
        text: "The selector is invalid and has no specificity."
    correct: [a]
    explanation: "The universal selector * weighs zero, and combinators (space, >, +, ~) add no weight either - they only affect which elements are matched, not the chain's final specificity."
    hints:
      - "Recall which selector component weighs exactly zero no matter how many times it's repeated."
