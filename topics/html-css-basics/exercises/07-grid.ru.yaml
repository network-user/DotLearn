exercises:
  - id: grid-activate-001
    concept: grid
    type: theory-quiz
    difficulty: 1
    prompt: "Какое свойство включает сетку из строк и колонок на родительском элементе?"
    choices:
      - id: a
        text: "display: grid"
      - id: b
        text: "display: flex"
      - id: c
        text: "grid-template: auto"
      - id: d
        text: "position: grid"
    correct: [a]
    explanation: "display: grid включает двумерную сетку на контейнере; его прямые дети автоматически занимают её ячейки, без правил на самих детях."
    hints:
      - "Ищите значение того же свойства, которое также принимает block, inline и flex."
    variants:
      - prompt: "Чем grid принципиально отличается от flexbox с точки зрения раскладки?"
        choices:
          - id: a
            text: "Grid раскладывает по двум осям одновременно (строки и колонки), flexbox — по одной."
          - id: b
            text: "Grid работает только в столбец, flexbox — только в ряд."
          - id: c
            text: "Разницы нет, это два названия одного и того же механизма."
          - id: d
            text: "Grid нельзя использовать вместе с gap."
        correct: [a]
        explanation: "Flexbox раскладывает элементы вдоль одной оси за раз (ряд или колонка, в зависимости от flex-direction). Grid определяет строки и колонки сразу, одним объявлением на родителе."

  - id: grid-blanks-columns-001
    concept: grid
    type: fill-in-blanks
    difficulty: 1
    prompt: "Дополните сетку из трёх одинаковых колонок с отступом 12px между ячейками."
    template: |
      .gallery {
        display: grid;
        grid-template-columns: {{cols}};
        gap: {{gap}};
      }
    blanks:
      cols:
        accept: ['repeat(3, 1fr)', '1fr 1fr 1fr']
      gap:
        accept: ['12px']
    explanation: "repeat(3, 1fr) — сокращённая запись для трёх одинаковых по 1fr колонок, эквивалент 1fr 1fr 1fr. gap задаёт расстояние между ячейками сразу в обоих направлениях."
    hints:
      - "Для трёх одинаковых долей есть как явная запись через три значения, так и короткая функция-повторитель."

  - id: grid-predict-fr-002
    concept: grid
    type: predict-output
    difficulty: 2
    prompt: |
      Контейнер шириной 900px, gap равен 0. grid-template-columns: 300px 1fr 1fr. Сколько пикселей займёт вторая колонка (первая из двух fr-колонок)?
    snippet: |
      .layout {
        width: 900px;
        display: grid;
        grid-template-columns: 300px 1fr 1fr;
      }
    expected:
      kind: scalar
      value: 300
    explanation: "Сначала браузер отдаёт фиксированной колонке её 300px. Остаётся 900 - 300 = 600px свободного пространства, которое делится между двумя равными fr-колонками поровну: по 300px каждой."
    hints:
      - "Сначала вычтите фиксированную колонку из общей ширины, оставшееся разделите по числу равных fr-долей."

  - id: grid-blanks-areas-002
    concept: grid
    type: fill-in-blanks
    difficulty: 2
    prompt: "Дополните описание макета через именованные области: боковая панель растянута на все три строки."
    template: |
      .page {
        display: grid;
        grid-template-columns: 200px 1fr;
        grid-template-areas:
          "{{row1}}"
          "sidebar main"
          "{{row3}}";
      }
    blanks:
      row1:
        accept: ['sidebar header']
      row3:
        accept: ['sidebar footer']
    explanation: "Повторяющееся имя sidebar во всех трёх строках grid-template-areas заставляет боковую панель растянуться на все три строки сетки сразу, оставаясь при этом прямоугольной областью."
    hints:
      - "Имя области должно повторяться в каждой строке, где эта область должна присутствовать, формируя цельный прямоугольник."

  - id: grid-autofit-003
    concept: grid
    type: theory-quiz
    difficulty: 3
    prompt: "Нужна сетка карточек, которая сама меняет число колонок под ширину экрана, без единого @media, и держит каждую карточку не уже 220px. Какое объявление подходит?"
    choices:
      - id: a
        text: "grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));"
      - id: b
        text: "grid-template-columns: repeat(3, 220px);"
      - id: c
        text: "grid-template-columns: 220px;"
      - id: d
        text: "grid-template-columns: repeat(auto-fit, 220px);"
    correct: [a]
    explanation: "auto-fit подставляет столько колонок, сколько помещается в контейнер, а minmax(220px, 1fr) задаёт границы каждой: не уже 220px, не шире равной доли. Без minmax колонки были бы жёстко зафиксированы и не растягивались бы на освободившееся место."
    hints:
      - "Нужны сразу два элемента рецепта: функция, определяющая количество колонок, и функция, задающая диапазон их ширины."
      - "Фиксированное число колонок (repeat(3, ...)) не адаптируется к ширине экрана — это не то, что нужно."

  - id: grid-predict-span-004
    concept: grid
    type: predict-output
    difficulty: 3
    prompt: |
      Элементу задано grid-column: 1 / 3. Сколько колонок сетки он займёт?
    snippet: |
      .hero {
        grid-column: 1 / 3;
      }
    expected:
      kind: scalar
      value: 2
    explanation: "Линии сетки нумеруются с единицы. Запись 1 / 3 означает «от первой линии сетки до третьей», а между первой и третьей линией лежат ровно две колонки."
    hints:
      - "Считайте не номера линий как таковые, а промежутки между указанными линиями."

  - id: grid-vs-flex-005
    concept: grid
    type: theory-quiz
    difficulty: 2
    prompt: "Нужно собрать одну панель инструментов в ряд из пяти одинаковых кнопок. Что уместнее?"
    choices:
      - id: a
        text: "flexbox: задача одномерная, все кнопки идут вдоль одной оси."
      - id: b
        text: "grid: задача обязательно требует двух осей сразу."
      - id: c
        text: "Ни то, ни другое не подходит для рядов кнопок."
      - id: d
        text: "Оба варианта одинаково неверны без position: absolute."
    correct: [a]
    explanation: "Один ряд элементов вдоль одной оси — классический случай для flexbox. Grid оправдан, когда раскладка требует одновременного контроля над строками и колонками, чего здесь нет."
    hints:
      - "Спросите себя: раскладка идёт вдоль одной линии или нужны одновременно строки и колонки?"

  - id: grid-blanks-minmax-006
    concept: grid
    type: fill-in-blanks
    difficulty: 3
    prompt: "Дополните функцию, задающую диапазон ширины колонки: не менее 150px, не более одной равной доли свободного места."
    template: |
      .cards {
        grid-template-columns: repeat(auto-fit, {{fn}}(150px, 1fr));
      }
    blanks:
      fn:
        accept: ['minmax']
    explanation: "minmax(150px, 1fr) задаёт нижнюю и верхнюю границы размера колонки одновременно: не уже 150px, не шире равной доли свободного пространства."
    hints:
      - "Название функции описывает ровно то, что она делает: задаёт минимум и максимум одним вызовом."
