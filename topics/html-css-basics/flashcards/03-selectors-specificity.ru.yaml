conceptId: selectors-specificity
cards:
  - id: selectors-specificity-01
    front: "Из каких трёх счётчиков состоит специфичность селектора?"
    back: "id-селекторы, затем классы/атрибуты/псевдоклассы, затем теги/псевдоэлементы. Специфичность — это кортеж a·b·c, а не одна сумма."
    tags: [specificity]
  - id: selectors-specificity-02
    front: "Как сравниваются две специфичности, например 1·0·1 и 0·1·2?"
    back: "Поразрядно, слева направо, как версии ПО. Сравнение останавливается на первом различии: 1 против 0 в столбце id уже решает исход, независимо от того, что во втором селекторе больше частей."
    tags: [specificity]
  - id: selectors-specificity-03
    front: "Чем отличаются комбинаторы nav a и nav > a?"
    back: "nav a (пробел) — комбинатор потомка, находит ссылку на любой глубине вложенности. nav > a (стрелка) — комбинатор ребёнка, только прямые дети nav, без промежуточных обёрток."
    tags: [combinators]
  - id: selectors-specificity-04
    front: "Сколько весит специфичность универсального селектора * и комбинаторов (пробел, >, +, ~)?"
    back: "Ровно ноль. Они влияют на то, какие элементы найдены, но не добавляют веса в специфичность цепочки."
    tags: [specificity]
  - id: selectors-specificity-05
    front: "Как считается вес псевдокласса :not(.intro)?"
    back: "Сам :not() веса не добавляет, но его аргумент считается как обычный селектор: .intro внутри скобок даёт единицу в столбец классов."
    tags: [pseudo]
  - id: selectors-specificity-06
    front: "Можно ли перебить один класс, добавляя всё больше тегов в селектор (например, растягивая цепочку до 11 тегов)?"
    back: "Нет. Разряды специфичности не переполняются друг в друга: сколько бы тегов ни было в младшем разряде, в старший (классы) это не перетечёт. 0·0·11 всё равно проигрывает 0·1·0."
    tags: [specificity]
