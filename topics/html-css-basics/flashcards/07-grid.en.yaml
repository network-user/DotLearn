conceptId: grid
cards:
  - id: grid-01
    front: "How is grid fundamentally different from flexbox?"
    back: "Grid defines rows and columns at once, with a single declaration on the parent - layout along two axes simultaneously. Flexbox lays out along one axis at a time."
    tags: [grid]
  - id: grid-02
    front: "What does the fr unit mean, and how does it differ from percentages?"
    back: "fr divides specifically the free space left over after fixed columns and gap - not the container's full width. In a 200px 1fr grid, the second column gets everything left after 200px, not 100% of the width."
    tags: [fr]
  - id: grid-03
    front: "What does repeat(3, 1fr) do, and what is it equivalent to?"
    back: "Shorthand for three equal 1fr columns, equivalent to 1fr 1fr 1fr. Especially useful for grids with a large number of identical columns."
    tags: [repeat]
  - id: grid-04
    front: "How does grid-template-areas work, and what requirement does it impose?"
    back: "Each quoted string describes one grid row as text, with words as area names. A repeated name stretches an area across several cells. Every row must contain the same number of words, and each area must form a solid rectangle."
    tags: [areas]
  - id: grid-05
    front: "What does the combination repeat(auto-fit, minmax(220px, 1fr)) do, and why is it needed?"
    back: "It builds a responsive grid of cards: auto-fit fits as many columns as the container can hold, and minmax(220px, 1fr) keeps each one no narrower than 220px. The column count adjusts itself, with no media queries needed."
    tags: [auto-fit, minmax]
  - id: grid-06
    front: "How does auto-fit differ from auto-fill?"
    back: "auto-fill reserves space for empty columns when there aren't enough real items to fill the width, which keeps existing cards from stretching. auto-fit gives that space to the real items instead - usually the one you want."
    tags: [auto-fit]
