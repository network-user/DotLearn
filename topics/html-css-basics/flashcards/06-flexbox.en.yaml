conceptId: flexbox
cards:
  - id: flexbox-01
    front: "Which property turns on flexbox, and on which element is it set?"
    back: "display: flex, set on the parent container. It automatically changes the behavior of all its direct children."
    tags: [flexbox]
  - id: flexbox-02
    front: "What does flex-direction switch, and how does that affect the other flexbox properties?"
    back: "It changes which axis is the main one: row is horizontal, column is vertical. Every property tied to the main axis (like justify-content) starts working in the new direction."
    tags: [flex-direction]
  - id: flexbox-03
    front: "What's the difference between justify-content and align-items?"
    back: "justify-content distributes free space along the main axis. align-items aligns items across it, along the other axis."
    tags: [alignment]
  - id: flexbox-04
    front: "What are flex-grow, flex-shrink, and flex-basis responsible for?"
    back: "flex-basis is an item's starting size before space is distributed. flex-grow is how eagerly the item takes extra free space. flex-shrink is how much the item shrinks when space runs short. They're usually written together through the flex shorthand."
    tags: [flex-grow]
  - id: flexbox-05
    front: "How does align-self differ from align-items?"
    back: "align-items sets cross-axis alignment for all of a container's children at once. align-self overrides that rule for just one specific item."
    tags: [alignment]
  - id: flexbox-06
    front: "Why is flex-wrap: wrap needed, and what happens without it on a narrow screen?"
    back: "Without flex-wrap, items shrink trying to stay on one line. flex-wrap: wrap allows wrapping onto a new line once space runs out."
    tags: [flex-wrap]
