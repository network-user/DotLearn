conceptId: cascade-inheritance
cards:
  - id: cascade-inheritance-01
    front: "Из каких ступеней состоит каскад, по порядку?"
    back: "Происхождение и важность (включая !important) → специфичность → порядок в коде. Проверка идёт строго по очереди, до следующей ступени доходят только при равенстве предыдущей."
    tags: [cascade]
  - id: cascade-inheritance-02
    front: "Какие свойства обычно наследуются от родителя к потомку, а какие нет?"
    back: "Наследуются свойства текста: color, font-*, line-height, text-align. Не наследуются свойства коробки и раскладки: margin, padding, border, width, display, background."
    tags: [inheritance]
  - id: cascade-inheritance-03
    front: "Чем отличаются inherit, initial, unset и revert?"
    back: "inherit — взять значение родителя, даже если свойство обычно не наследуется. initial — вернуть значение по умолчанию из спецификации CSS. unset — inherit там, где свойство наследуется, initial — где нет. revert — откатить к стилю предыдущего источника каскада (обычно браузера)."
    tags: [keywords]
  - id: cascade-inheritance-04
    front: "Почему злоупотребление !important опасно, даже если оно чинит проблему мгновенно?"
    back: "Следующему исключению из этого правила понадобится свой !important, и конфликты специфичности превращаются в конфликты важности, где выигрывает порядок кода или случайность."
    tags: [important]
  - id: cascade-inheritance-05
    front: "Что такое схлопывание margin и когда оно происходит?"
    back: "Вертикальные margin двух соседних блочных элементов в обычном потоке документа не складываются, а схлопываются в один, равный большему значению. Padding никогда не схлопывается."
    tags: [margin]
  - id: cascade-inheritance-06
    front: "Что сильнее: инлайн-стиль style=\"...\" в HTML или !important из подключённого файла?"
    back: "!important из файла перебивает даже инлайн-стиль. Единственное, что победило бы его — свой !important внутри самого атрибута style."
    tags: [important, inline]
