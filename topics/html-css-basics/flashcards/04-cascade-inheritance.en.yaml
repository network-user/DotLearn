conceptId: cascade-inheritance
cards:
  - id: cascade-inheritance-01
    front: "What stages make up the cascade, in order?"
    back: "Origin and importance (including !important) → specificity → code order. The check runs strictly in sequence; the next stage is only reached on a tie at the previous one."
    tags: [cascade]
  - id: cascade-inheritance-02
    front: "Which properties usually inherit from parent to child, and which don't?"
    back: "Text properties inherit: color, font-*, line-height, text-align. Box and layout properties don't: margin, padding, border, width, display, background."
    tags: [inheritance]
  - id: cascade-inheritance-03
    front: "How do inherit, initial, unset, and revert differ?"
    back: "inherit takes the parent's value, even if the property normally doesn't inherit. initial resets to the CSS spec's default value. unset behaves like inherit where a property inherits, and like initial where it doesn't. revert rolls back to the style from the previous cascade origin (usually the browser)."
    tags: [keywords]
  - id: cascade-inheritance-04
    front: "Why is overusing !important dangerous, even when it fixes a problem instantly?"
    back: "The next exception to that rule will need its own !important, and specificity conflicts turn into importance conflicts, where code order or plain chance decides the winner."
    tags: [important]
  - id: cascade-inheritance-05
    front: "What is margin collapsing, and when does it happen?"
    back: "Vertical margins of two adjacent block elements in normal document flow don't add up - they collapse into one, equal to the larger value. Padding never collapses."
    tags: [margin]
  - id: cascade-inheritance-06
    front: "Which is stronger: an inline style=\"...\" in HTML, or !important from a linked file?"
    back: "!important from a file overrides even inline style. The only thing that would beat it is its own !important right inside the style attribute."
    tags: [important, inline]
