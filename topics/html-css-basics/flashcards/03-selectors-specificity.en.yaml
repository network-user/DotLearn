conceptId: selectors-specificity
cards:
  - id: selectors-specificity-01
    front: "What three counters make up a selector's specificity?"
    back: "id selectors, then classes/attributes/pseudo-classes, then tags/pseudo-elements. Specificity is a tuple a·b·c, not a single sum."
    tags: [specificity]
  - id: selectors-specificity-02
    front: "How are two specificities compared, say 1·0·1 and 0·1·2?"
    back: "Digit by digit, left to right, like software version numbers. Comparison stops at the first difference: 1 against 0 in the id column already settles it, regardless of the second selector having more parts overall."
    tags: [specificity]
  - id: selectors-specificity-03
    front: "How do the combinators nav a and nav > a differ?"
    back: "nav a (space) is the descendant combinator, finding a link at any nesting depth. nav > a (arrow) is the child combinator, only direct children of nav, with no wrapper in between."
    tags: [combinators]
  - id: selectors-specificity-04
    front: "How much specificity weight do the universal selector * and combinators (space, >, +, ~) carry?"
    back: "Exactly zero. They affect which elements are matched, but add no weight to the chain's specificity."
    tags: [specificity]
  - id: selectors-specificity-05
    front: "How is the weight of the :not(.intro) pseudo-class counted?"
    back: ":not() itself adds no weight, but its argument counts as a normal selector: .intro inside the parentheses adds one to the class column."
    tags: [pseudo]
  - id: selectors-specificity-06
    front: "Can you beat a single class by piling more and more tags into a selector (say, stretching the chain to 11 tags)?"
    back: "No. Specificity digits never overflow into one another: no matter how many tags pile up in the lowest digit, it never carries over into the higher one (classes). 0·0·11 still loses to 0·1·0."
    tags: [specificity]
