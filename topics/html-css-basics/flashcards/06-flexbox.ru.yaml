conceptId: flexbox
cards:
  - id: flexbox-01
    front: "Какое свойство включает flexbox и на каком элементе его указывают?"
    back: "display: flex, указанное на родительском контейнере. Оно автоматически меняет поведение всех его прямых детей."
    tags: [flexbox]
  - id: flexbox-02
    front: "Что переключает flex-direction и как это влияет на остальные свойства flexbox?"
    back: "Меняет, какая ось главная: row — горизонтальная, column — вертикальная. Все свойства, завязанные на главную ось (например justify-content), начинают работать в новом направлении."
    tags: [flex-direction]
  - id: flexbox-03
    front: "В чём разница между justify-content и align-items?"
    back: "justify-content распределяет свободное место вдоль главной оси. align-items выравнивает элементы поперёк неё, по другой оси."
    tags: [alignment]
  - id: flexbox-04
    front: "За что отвечают flex-grow, flex-shrink и flex-basis?"
    back: "flex-basis — стартовый размер элемента до распределения места. flex-grow — насколько охотно элемент заберёт лишнее свободное место. flex-shrink — насколько сильно элемент сожмётся при нехватке места. Обычно пишутся вместе через сокращение flex."
    tags: [flex-grow]
  - id: flexbox-05
    front: "Как align-self отличается от align-items?"
    back: "align-items задаёт выравнивание по поперечной оси для всех детей контейнера сразу. align-self переопределяет это правило только для одного конкретного элемента."
    tags: [alignment]
  - id: flexbox-06
    front: "Зачем нужен flex-wrap: wrap и что произойдёт без него на узком экране?"
    back: "Без flex-wrap элементы сжимаются, пытаясь остаться в одну строку. flex-wrap: wrap разрешает перенос на новую строку, когда места перестаёт хватать."
    tags: [flex-wrap]
