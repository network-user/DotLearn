conceptId: semantic-tags
cards:
  - id: semantic-tags-01
    front: "Чем семантический тег отличается от div визуально?"
    back: "Ничем. header, nav, main, article, section, aside, footer по умолчанию блочные, как div. Разница только в имени роли, которое видят программы: скринридеры и поисковые роботы."
    tags: [structure]
  - id: semantic-tags-02
    front: "В чём разница между article и section?"
    back: "article — самостоятельная единица контента, годная для публикации отдельно (пост, карточка товара). section — тематическая группировка, обычно с заголовком, бессмысленная вне контекста страницы."
    tags: [article, section]
  - id: semantic-tags-03
    front: "Почему нельзя пропускать уровни заголовков (например, сразу после h1 ставить h4) ради нужного размера шрифта?"
    back: "Заголовки строят контур документа (outline), по которому скринридер строит навигацию. Пропуск уровня ломает контур. Размер текста нужно менять через CSS font-size, а не через номер тега."
    tags: [headings]
  - id: semantic-tags-04
    front: "Зачем нужен тег main и почему он должен быть один на странице?"
    back: "main помечает единственную основную область контента. Скринридер предлагает по нему команду «перейти сразу к содержимому», минуя шапку и меню — если main несколько, эта команда теряет смысл."
    tags: [main]
  - id: semantic-tags-05
    front: "Что связывает тег figure и его дочерний figcaption?"
    back: "figure объединяет медиа (картинку, график, код) с его подписью programmatic-образом, а не просто визуальным соседством, как отдельная картинка и абзац под ней."
    tags: [figure]
  - id: semantic-tags-06
    front: "Когда div и span всё ещё уместны, несмотря на набор семантических тегов?"
    back: "Когда обёртка нужна исключительно для стилизации или JS-крючка, а подходящего по смыслу тега нет — например, обёртка-сетка для карточек товаров."
    tags: [div]
