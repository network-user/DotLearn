conceptId: document-structure
cards:
  - id: document-structure-01
    front: "Из каких четырёх частей состоит скелет любого HTML-документа?"
    back: "Doctype, корневой тег html с атрибутом lang, служебный head и видимый body. Порядок фиксирован, менять разделы местами нельзя."
    tags: [structure]
  - id: document-structure-02
    front: "Зачем нужен <!DOCTYPE html> и что случится без него?"
    back: "Doctype включает стандартный режим разбора. Без него страница попадает в quirks mode и воспроизводит ошибки браузеров девяностых, например другую формулу ширины блока."
    tags: [doctype]
  - id: document-structure-03
    front: "Почему <meta charset=\"utf-8\"> должен идти первой строкой head?"
    back: "Декодирование байтов в символы — самый первый шаг конвейера браузера. Пока кодировка не объявлена, символы декодируются наугад, и кириллица рискует превратиться в кракозябры."
    tags: [head]
  - id: document-structure-04
    front: "Что делает meta name=\"viewport\" и что будет без него?"
    back: "Задаёт реальную ширину устройства для расчёта раскладки. Без него мобильный браузер рисует страницу в виртуальные 980px и уменьшает картинку — текст становится нечитаемо мелким."
    tags: [head, mobile]
  - id: document-structure-05
    front: "Чем defer у <script> лучше размещения скрипта в конце body?"
    back: "defer позволяет браузеру узнать о файле и начать его скачивание сразу, в первых строках документа, но выполнить скрипт только после построения DOM — быстрее, чем ждать разбора всей страницы до конца body."
    tags: [scripts]
  - id: document-structure-06
    front: "Почему разметка «работает» в браузере, даже если теги не закрыты?"
    back: "HTML-парсер никогда не падает с ошибкой: правила восстановления прописаны в стандарте. Он молча чинит структуру, например автоматически закрывает предыдущий <p> при встрече нового. Из-за этого DOM может не совпадать с исходником."
    tags: [parsing]
