conceptId: box-model
cards:
  - id: box-model-01
    front: "What four layers make up any element's box, from the center outward?"
    back: "content, padding, border, margin. An element's background paints the first three layers; margin stays transparent."
    tags: [box-model]
  - id: box-model-02
    front: "What does width mean in the default content-box mode?"
    back: "Only the width of the content layer. Padding and border are added on top of it, so the box's final visible width ends up larger than the given width."
    tags: [box-sizing]
  - id: box-model-03
    front: "How does box-sizing: border-box change the meaning of width?"
    back: "width starts meaning the box's total visible width including padding and border; the browser shrinks the content area itself to make everything fit."
    tags: [box-sizing]
  - id: box-model-04
    front: "What is margin collapsing, and does it extend to padding?"
    back: "Vertical margins of adjacent block elements merge into one, equal to the larger value, instead of adding up. Padding never collapses - every pixel of it is counted honestly."
    tags: [margin]
  - id: box-model-05
    front: "Why won't span { width: 200px; } work without changing display?"
    back: "Inline elements (display: inline) ignore width, height, and vertical margin - they flow inside a line of text, and those properties physically can't affect it."
    tags: [display]
  - id: box-model-06
    front: "How does inline-block differ from inline and block?"
    back: "Like inline, it flows in a line next to text and siblings. Like block, it respects width, height, and margin on all sides - a hybrid of the two behaviors."
    tags: [display]
