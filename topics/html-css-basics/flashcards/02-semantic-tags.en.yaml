conceptId: semantic-tags
cards:
  - id: semantic-tags-01
    front: "How does a semantic tag differ from div visually?"
    back: "It doesn't. header, nav, main, article, section, aside, footer are block-level by default, just like div. The difference is only the role name that programs see: screen readers and search crawlers."
    tags: [structure]
  - id: semantic-tags-02
    front: "What's the difference between article and section?"
    back: "article is a self-contained unit of content fit to be published on its own (a post, a product card). section is a thematic grouping, usually with a heading, meaningless outside the page's context."
    tags: [article, section]
  - id: semantic-tags-03
    front: "Why can't you skip heading levels (say, jumping straight from h1 to h4) just to get a convenient font size?"
    back: "Headings build the document's outline, which a screen reader uses to build navigation. Skipping a level breaks the outline. Change text size through CSS font-size, not the tag's number."
    tags: [headings]
  - id: semantic-tags-04
    front: "Why is the main tag needed, and why must there be only one per page?"
    back: "main marks the single primary content area. A screen reader offers a \"skip to content\" command based on it, bypassing the header and menu - if there were several main elements, that command would lose its meaning."
    tags: [main]
  - id: semantic-tags-05
    front: "What connects the figure tag and its child figcaption?"
    back: "figure bundles media (an image, a chart, code) with its caption programmatically, rather than just by visual proximity, like a standalone image and a paragraph underneath it."
    tags: [figure]
  - id: semantic-tags-06
    front: "When are div and span still appropriate, despite the set of semantic tags?"
    back: "When a wrapper is needed purely for styling or a JS hook, and no tag fits the meaning - for example, a grid wrapper for product cards."
    tags: [div]
