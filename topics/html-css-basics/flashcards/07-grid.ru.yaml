conceptId: grid
cards:
  - id: grid-01
    front: "Чем grid принципиально отличается от flexbox?"
    back: "Grid определяет строки и колонки одновременно, одним объявлением на родителе — раскладка по двум осям сразу. Flexbox раскладывает вдоль одной оси за раз."
    tags: [grid]
  - id: grid-02
    front: "Что означает единица fr и чем она отличается от процентов?"
    back: "fr делит именно свободное пространство, оставшееся после фиксированных колонок и gap — не всю ширину контейнера. В сетке 200px 1fr вторая колонка получает всё, что осталось после 200px, а не 100% ширины."
    tags: [fr]
  - id: grid-03
    front: "Что делает repeat(3, 1fr) и чему это эквивалентно?"
    back: "Сокращённая запись для трёх одинаковых колонок по 1fr, эквивалент 1fr 1fr 1fr. Особенно полезна для сеток с большим числом одинаковых колонок."
    tags: [repeat]
  - id: grid-04
    front: "Как работает grid-template-areas и какое требование к нему предъявляется?"
    back: "Каждая строка в кавычках описывает строку сетки текстом, слова — имена областей. Повторяющееся имя растягивает область на несколько ячеек. Каждая строка должна содержать одинаковое число слов, а область — быть цельным прямоугольником."
    tags: [areas]
  - id: grid-05
    front: "Что делает связка repeat(auto-fit, minmax(220px, 1fr)) и зачем она нужна?"
    back: "Строит адаптивную сетку карточек: auto-fit подставляет столько колонок, сколько влезает в контейнер, а minmax(220px, 1fr) держит каждую не уже 220px. Число колонок меняется само, без медиазапросов."
    tags: [auto-fit, minmax]
  - id: grid-06
    front: "Чем auto-fit отличается от auto-fill?"
    back: "auto-fill резервирует место под пустые колонки, если реальных элементов не хватает на всю ширину, из-за чего существующие карточки не растягиваются. auto-fit отдаёт это место реальным элементам — обычно нужен именно он."
    tags: [auto-fit]
