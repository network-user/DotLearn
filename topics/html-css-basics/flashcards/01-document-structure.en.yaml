conceptId: document-structure
cards:
  - id: document-structure-01
    front: "What four parts make up the skeleton of any HTML document?"
    back: "Doctype, the root html tag with a lang attribute, the utility head, and the visible body. The order is fixed - you can't swap sections around."
    tags: [structure]
  - id: document-structure-02
    front: "Why is <!DOCTYPE html> needed, and what happens without it?"
    back: "Doctype turns on standards mode. Without it, the page falls into quirks mode and reproduces nineties-era browser bugs, like a different box-width formula."
    tags: [doctype]
  - id: document-structure-03
    front: "Why must <meta charset=\"utf-8\"> be the first line of head?"
    back: "Decoding bytes into characters is the very first step of the browser's pipeline. Until the encoding is declared, characters are decoded blindly, and non-ASCII text risks turning into garbled symbols."
    tags: [head]
  - id: document-structure-04
    front: "What does meta name=\"viewport\" do, and what happens without it?"
    back: "It sets the device's real width for layout calculations. Without it, a mobile browser renders the page at a virtual 980px and shrinks the picture down - text becomes unreadably small."
    tags: [head, mobile]
  - id: document-structure-05
    front: "How is defer on <script> better than placing the script at the end of body?"
    back: "defer lets the browser learn about the file and start downloading it right away, in the document's first lines, but run the script only after the DOM is built - faster than waiting for the whole page to parse down to the end of body."
    tags: [scripts]
  - id: document-structure-06
    front: "Why does markup \"work\" in the browser even when tags aren't closed?"
    back: "The HTML parser never crashes with an error: recovery rules are written into the spec. It silently fixes the structure, for example automatically closing a previous <p> when it meets a new one. Because of this, the DOM can end up not matching the source."
    tags: [parsing]
