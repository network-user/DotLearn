conceptId: box-model
cards:
  - id: box-model-01
    front: "Из каких четырёх слоёв состоит коробка любого элемента, от центра наружу?"
    back: "content, padding, border, margin. Фон элемента красит первые три слоя; margin остаётся прозрачным."
    tags: [box-model]
  - id: box-model-02
    front: "Что означает width в режиме по умолчанию content-box?"
    back: "Только ширину слоя content. Padding и border добавляются к ней сверху, поэтому итоговая видимая ширина коробки больше заданного width."
    tags: [box-sizing]
  - id: box-model-03
    front: "Как box-sizing: border-box меняет смысл width?"
    back: "width начинает означать итоговую видимую ширину коробки вместе с padding и border; браузер сам уменьшает область content, чтобы всё уместилось."
    tags: [box-sizing]
  - id: box-model-04
    front: "Что такое схлопывание margin и распространяется ли оно на padding?"
    back: "Вертикальные margin соседних блочных элементов сливаются в один, равный большему значению, а не складываются. Padding никогда не схлопывается — каждый его пиксель считается честно."
    tags: [margin]
  - id: box-model-05
    front: "Почему span { width: 200px; } без смены display не сработает?"
    back: "Строчные элементы (display: inline) игнорируют width, height и вертикальные margin — они текут внутри строки текста, и эти свойства физически не могут на неё повлиять."
    tags: [display]
  - id: box-model-06
    front: "Чем inline-block отличается от inline и block?"
    back: "Как inline, он течёт в строке рядом с текстом и соседями. Как block, он уважает width, height и margin со всех сторон — гибрид двух поведений."
    tags: [display]
