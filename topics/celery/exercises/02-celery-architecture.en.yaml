exercises:
  - id: arch-three-parts-001
    concept: celery-architecture
    type: theory-quiz
    difficulty: 1
    prompt: "What three parts make up a working Celery system?"
    choices:
      - id: a
        text: "broker (task queue), worker (executor), result backend (result store)."
      - id: b
        text: "web server, database, cache."
      - id: c
        text: "producer, thread, timer."
      - id: d
        text: "broker, load balancer, frontend."
    correct: [a]
    explanation: "Celery is three linked roles: broker holds waiting tasks, worker runs them, result backend stores results and status. Each can live on its own server and fail independently."
    variants:
      - prompt: "What does the broker do in Celery architecture?"
        choices:
          - id: a
            text: "Queue storage where producer enqueues and worker dequeues."
          - id: b
            text: "Process that executes task code."
          - id: c
            text: "Store of finished results read by task id."
          - id: d
            text: "Web handler that enqueues tasks."
        correct: [a]
        explanation: "Broker is the queue between producer and worker. Worker executes; result backend stores results; producer enqueues."
      - prompt: "What does the result backend do?"
        choices:
          - id: a
            text: "Stores task result and status so producer can read them by task id."
          - id: b
            text: "Pulls tasks from the queue and runs them."
          - id: c
            text: "Holds waiting tasks and delivers to one worker."
          - id: d
            text: "Starts workers via the celery command."
        correct: [a]
        explanation: "Result backend is separate storage for results and status. Broker holds waiting tasks; worker executes."

  - id: arch-backend-optional-001
    concept: celery-architecture
    type: theory-quiz
    difficulty: 2
    prompt: "Which Celery part is always required and which is optional?"
    choices:
      - id: a
        text: "Broker always required; result backend optional and only needed if someone needs result or status."
      - id: b
        text: "Result backend always required; broker optional."
      - id: c
        text: "Both optional - worker can run without them."
      - id: d
        text: "Both required: without backend a task cannot enter the queue."
    correct: [a]
    explanation: "Without broker there is nowhere to put a task. Backend is only for tasks whose result or status will be read; fire-and-forget tasks disable it."
    hints:
      - "Which part has nowhere for a task to go if missing?"

  - id: arch-worker-not-running-001
    concept: celery-architecture
    type: theory-quiz
    difficulty: 2
    prompt: "Producer called `add.delay(2, 3)` but no worker is running. What happens?"
    choices:
      - id: a
        text: "Task enqueues without error and waits in the broker until a worker appears."
      - id: b
        text: "`add.delay(2, 3)` immediately raises no worker error."
      - id: c
        text: "Producer runs `2 + 3` itself and returns 5."
      - id: d
        text: "Task is lost because nobody can take it."
    correct: [a]
    explanation: "`.delay()` only enqueues and does not check for a worker. Task waits in the queue. Task never runs often means worker not started or crashed, not a code bug."
    hints:
      - "Does .delay() enqueue before anyone takes the task, or wait for an executor?"

  - id: arch-get-blocks-001
    concept: celery-architecture
    type: theory-quiz
    difficulty: 3
    prompt: "Why is calling `result.get(timeout=5)` in an HTTP handler usually a bad idea?"
    choices:
      - id: a
        text: "`.get()` blocks the handler waiting for the result - synchronous wait again."
      - id: b
        text: "`.get()` deletes the result from backend so it cannot be read again."
      - id: c
        text: "`.get()` starts a second copy of the task."
      - id: d
        text: "`.get()` only works inside worker and fails in a handler."
    correct: [a]
    explanation: "`.get()` blocks until the worker finishes. In a handler that brings back the slow synchronous wait background was meant to avoid. If the result is needed in the response, maybe do not background the work."
    hints:
      - "What was wrong with waiting on slow work in the handler?"
      - "Does .get() continue or stop until the result is ready?"

  - id: arch-misconfig-001
    concept: celery-architecture
    type: theory-quiz
    difficulty: 3
    prompt: "You added a new task, redeployed producer, but forgot to restart worker. What happens when it runs?"
    choices:
      - id: a
        text: "Worker does not know the task and fails with `unregistered task`."
      - id: b
        text: "Worker auto-pulls new code from broker and runs the task."
      - id: c
        text: "Producer runs the task because worker does not know it."
      - id: d
        text: "Broker executes the task instead of worker."
    correct: [a]
    explanation: "Worker holds task code from startup. Producer enqueues by string name; worker looks up that name locally and fails if missing. Task code must match on both sides."
    hints:
      - "Does worker load task code at startup or on every call?"
      - "Producer enqueues by name - what if worker has no function with that name?"

  - id: arch-ignore-result-001
    concept: celery-architecture
    type: theory-quiz
    difficulty: 4
    prompt: "Why is storing every task result in result backend expensive by default, and what do people do?"
    choices:
      - id: a
        text: "Backend writes status and result for every task into a growing pile; for unneeded results use `ignore_result=True` or disable backend."
      - id: b
        text: "Backend stores results for free; only broker speed matters."
      - id: c
        text: "Results cannot be deleted so backend always overflows - no fix."
      - id: d
        text: "Only RabbitMQ storage costs money; Redis is free."
    correct: [a]
    explanation: "By default Celery writes every task's result and status to backend. At volume that grows without bound. Fire-and-forget tasks disable backend or set `ignore_result=True`."
    hints:
      - "Does Celery write all results to backend by default or only requested ones?"
      - "If nobody reads a task's result, why pay to store it?"

  - id: arch-blanks-app-001
    concept: celery-architecture
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the blanks in minimal Celery app setup."
    template: |
      from celery import Celery

      app = Celery(
          "myapp",
          {{broker}}="redis://localhost:6379/0",
          {{backend}}="redis://localhost:6379/1",
      )

      @app.{{decorator}}
      def add(x, y):
          return x + y
    blanks:
      broker:
        accept: ["broker"]
      backend:
        accept: ["backend"]
      decorator:
        accept: ["task"]
    hints:
      - "One parameter is where tasks go; another is where results are stored."
    variants:
      - template: |
          from celery import Celery

          app = Celery(
              "mailer",
              {{broker}}="amqp://localhost",
              {{backend}}="db+sqlite:///results.db",
          )

          @app.{{decorator}}
          def send_digest(user_id):
              return deliver(user_id)
        blanks:
          broker:
            accept: ["broker"]
          backend:
            accept: ["backend"]
          decorator:
            accept: ["task"]
      - template: |
          app = Celery("billing", {{broker}}="amqp://localhost")

          @app.{{decorator}}
          def charge(amount):
              return amount
        blanks:
          broker:
            accept: ["broker"]
          decorator:
            accept: ["task"]

  - id: arch-blanks-result-001
    concept: celery-architecture
    type: fill-in-blanks
    difficulty: 1
    prompt: "Fill in AsyncResult methods to check and read the result."
    template: |
      result = add.delay(2, 3)
      print(result.{{ready}}())
      print(result.{{get}}(timeout=5))
    blanks:
      ready:
        accept: ["ready"]
      get:
        accept: ["get"]
    hints:
      - "One method non-blocking asks if ready; another blocks for the value."
    variants:
      - template: |
          job = export_csv.delay(report_id)
          print(job.{{ready}}())
          print(job.{{get}}(timeout=30))
        blanks:
          ready:
            accept: ["ready"]
          get:
            accept: ["get"]
      - template: |
          res = process.delay(file_id)
          if res.{{ready}}():
              value = res.{{get}}()
        blanks:
          ready:
            accept: ["ready"]
          get:
            accept: ["get"]

  - id: arch-predict-producer-001
    concept: celery-architecture
    type: predict-output
    difficulty: 3
    prompt: "This program models producer side: delay enqueues but does not run the task. What does it print?"
    snippet: |
      broker = []

      def delay(name, *args):
          broker.append((name, args))
          return "task-id-1"

      def add(x, y):
          return x + y

      task_id = delay("add", 2, 3)
      print(task_id)
      print(len(broker))
      print(broker[0][0])
    expected:
      kind: stdout
      value: "task-id-1\n1\nadd"
    hints:
      - "Producer enqueues and gets id; add is never called here. What landed in broker?"
      - "delay adds one tuple and returns id string; add was never invoked."
