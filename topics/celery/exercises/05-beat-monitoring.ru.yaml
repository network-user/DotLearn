exercises:
  - id: beat-role-001
    concept: beat-monitoring
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает Celery Beat и почему его должно быть ровно один на кластер?"
    choices:
      - id: a
        text: "Beat по расписанию кладёт периодические задачи в broker; два Beat не координируются и поставят каждую задачу дважды."
      - id: b
        text: "Beat сам выполняет периодические задачи, поэтому для параллелизма его запускают на каждой реплике."
      - id: c
        text: "Beat хранит результаты задач, и двум Beat нужен общий backend."
      - id: d
        text: "Beat это веб-дашборд, который показывает состояние очереди."
    correct: [a]
    explanation: "Beat это producer по таймеру: он не выполняет задачи, а по расписанию кладёт их в broker. Два Beat не выбирают лидера и не делят расписание, поэтому каждый отрабатывает всё расписание целиком и каждая периодическая задача уходит в очередь дважды."
    variants:
      - prompt: "Что произойдёт, если запустить Beat на двух репликах приложения «для надёжности»?"
        choices:
          - id: a
            text: "Каждый Beat независимо отработает всё расписание, и каждая периодическая задача уедет в очередь дважды."
          - id: b
            text: "Второй Beat станет горячим резервом и включится, только если первый упадёт."
          - id: c
            text: "Beat'ы поделят расписание пополам и выполнят по половине задач каждый."
          - id: d
            text: "Celery заметит второй Beat и не даст ему стартовать."
        correct: [a]
        explanation: "Beat не координируется с другими Beat: он смотрит только на своё расписание. Обе реплики отработают расписание целиком, и задачи задвоятся. Это не отказоустойчивость, а источник дублей."
      - prompt: "Какая роль у процесса Beat в связке Celery?"
        choices:
          - id: a
            text: "producer по таймеру: он не выполняет задачи, а по расписанию кладёт их в broker."
          - id: b
            text: "consumer: он забирает задачи из broker и выполняет их."
          - id: c
            text: "broker: он хранит очередь сообщений между producer и worker."
          - id: d
            text: "result backend: он хранит статусы и результаты выполненных задач."
        correct: [a]
        explanation: "Beat это producer, которого будит таймер, а не HTTP-запрос. Задачи выполняет worker (consumer), очередь держит broker, а статусы и результаты хранит result backend."

  - id: beat-schedule-blanks-001
    concept: beat-monitoring
    type: fill-in-blanks
    difficulty: 1
    prompt: "Заполните пропуски: запланируйте задачу reports.build_daily на каждый день в 3:00 через crontab."
    template: |
      from celery.schedules import crontab

      app.conf.beat_schedule = {
          "nightly-report": {
              "task": "reports.build_daily",
              "schedule": crontab(minute={{m}}, hour={{h}}),
          },
      }
    blanks:
      m:
        accept: ["0"]
      h:
        accept: ["3"]
    hints:
      - "crontab(minute=, hour=) привязывает запуск к времени суток: минута и час, в которые задача сработает."
    variants:
      - prompt: "Заполните пропуски: запланируйте задачу на каждый день в 6:30 утра."
        template: |
          app.conf.beat_schedule = {
              "morning-sync": {
                  "task": "sync.run",
                  "schedule": crontab(minute={{m}}, hour={{h}}),
              },
          }
        blanks:
          m:
            accept: ["30"]
          h:
            accept: ["6"]
      - prompt: "Заполните пропуски: запланируйте задачу ровно на полдень, 12:00."
        template: |
          app.conf.beat_schedule = {
              "noon-digest": {
                  "task": "digest.send",
                  "schedule": crontab(minute={{m}}, hour={{h}}),
              },
          }
        blanks:
          m:
            accept: ["0"]
          h:
            accept: ["12"]

  - id: beat-schedule-form-001
    concept: beat-monitoring
    type: theory-quiz
    difficulty: 2
    prompt: "В `beat_schedule` поле `schedule` задали числом `30.0`. Что это означает?"
    choices:
      - id: a
        text: "Задача будет ставиться в очередь каждые 30 секунд, считая от старта Beat."
      - id: b
        text: "Задача один раз запустится через 30 секунд после старта и больше не повторится."
      - id: c
        text: "Задача будет срабатывать в 30-ю минуту каждого часа."
      - id: d
        text: "30.0 это максимальное число повторов задачи при ошибке."
    correct: [a]
    explanation: "Число в поле schedule это интервал в секундах: 30.0 значит каждые тридцать секунд от старта. Для привязки к времени суток берут crontab, а не число."
    variants:
      - prompt: 'Что задаёт `crontab(minute=0, hour="*/2")` в расписании Beat?'
        choices:
          - id: a
            text: "Запуск каждые два часа в нулевую минуту: 00:00, 02:00, 04:00 и так далее."
          - id: b
            text: "Запуск каждые две минуты."
          - id: c
            text: "Запуск ровно два раза в час."
          - id: d
            text: "Один запуск в 2:00 раз в сутки."
        correct: [a]
        explanation: 'hour="*/2" это «каждый второй час», minute=0 фиксирует нулевую минуту. Получаются запуски в начале каждого чётного часа.'
      - prompt: "Задачу нужно запускать каждый понедельник в 9:00. Какая форма schedule подходит?"
        choices:
          - id: a
            text: 'crontab(minute=0, hour=9, day_of_week="mon"): привязка к календарю по дню недели и времени.'
          - id: b
            text: "число 9.0, то есть интервал в 9 секунд."
          - id: c
            text: "timedelta(days=7), ровно раз в неделю, считая от старта Beat."
          - id: d
            text: "crontab(minute=9, hour=0) в любой день недели."
        correct: [a]
        explanation: "Только crontab привязывает запуск к дню недели и времени суток. timedelta(days=7) отсчитывает неделю от старта Beat и стабильно на утро понедельника не попадёт."

  - id: beat-inspect-baskets-001
    concept: beat-monitoring
    type: theory-quiz
    difficulty: 2
    prompt: "Что показывает команда `celery inspect active`?"
    choices:
      - id: a
        text: "Задачи, которые worker выполняет прямо сейчас."
      - id: b
        text: "Задачи, которые ещё ждут в очереди брокера."
      - id: c
        text: "Периодическое расписание Beat из beat_schedule."
      - id: d
        text: "Задачи с отложенным eta, ждущие своего времени."
    correct: [a]
    explanation: "active это то, что worker исполняет в данный момент. Ожидающие в брокере задачи в inspect не видны, расписание Beat живёт в конфиге, а отложенные по eta задачи показывает scheduled."
    variants:
      - prompt: "Что показывает `celery inspect reserved`?"
        choices:
          - id: a
            text: "Задачи, которые worker уже забрал из брокера про запас (prefetch), но ещё не начал выполнять."
          - id: b
            text: "Задачи, которые worker выполняет прямо сейчас."
          - id: c
            text: "Периодические задачи из beat_schedule."
          - id: d
            text: "Задачи, которые worker отклонил из-за ошибки."
        correct: [a]
        explanation: "reserved это локальный буфер prefetch: задачи уже сняты с брокера, но ещё ждут своей очереди на этом worker. Из-за этого длина очереди в брокере занижает реальный backlog."
      - prompt: "Что показывает `celery inspect scheduled` и чем это отличается от расписания Beat?"
        choices:
          - id: a
            text: "Задачи с отложенным запуском (eta или countdown), которые worker держит у себя до их времени; это не beat_schedule."
          - id: b
            text: "Периодическое расписание Beat из beat_schedule."
          - id: c
            text: "Задачи, которые worker выполняет прямо сейчас."
          - id: d
            text: "Полный список всех задач, когда-либо поставленных в очередь."
        correct: [a]
        explanation: "scheduled это задачи с eta или countdown в буфере worker, а не периодическое расписание. Расписание Beat лежит в конфиге и его файле состояния, в выводе inspect его нет. Путаница scheduled с beat_schedule частый вопрос на собеседовании."

  - id: beat-reserved-backlog-001
    concept: beat-monitoring
    type: theory-quiz
    difficulty: 3
    prompt: "Длина очереди в брокере почти нулевая, но задачи выполняются с большой задержкой, а `worker_prefetch_multiplier` выставлен большим. Куда делся backlog?"
    choices:
      - id: a
        text: "Задачи разобраны prefetch'ем в локальные буферы занятых worker'ов (reserved) и уже сняты с брокера, поэтому очередь выглядит пустой."
      - id: b
        text: "Брокер потерял задачи, их больше нет в системе."
      - id: c
        text: "Задачи выполнились, а backend просто не записал результат."
      - id: d
        text: "Beat перестал ставить задачи, поэтому очередь опустела."
    correct: [a]
    explanation: "Prefetch снимает задачи с брокера в буфер worker'а ещё до начала выполнения. При большом worker_prefetch_multiplier сотни задач стоят в reserved у занятых worker'ов, а длина очереди в брокере их не считает. Для длинных задач multiplier снижают до 1, чтобы задачи не залипали в буфере."
    hints:
      - "Задачи из reserved уже сняты с брокера. Что это значит для числа, которое показывает длина очереди?"
      - "Куда попадают prefetch'нутые задачи, если worker занят и ещё не дошёл до них?"

  - id: beat-pending-001
    concept: beat-monitoring
    type: theory-quiz
    difficulty: 3
    prompt: "Вы запросили статус задачи по id, в котором опечатались, и такой задачи никогда не существовало. Что вернёт result backend и почему?"
    choices:
      - id: a
        text: "PENDING: backend хранит только результаты, поэтому «нет результата» и «задача не поставлена» для него неотличимы."
      - id: b
        text: "Ошибку «задача не найдена», потому что backend ведёт список всех известных id."
      - id: c
        text: "FAILURE, потому что задача с таким id не может быть выполнена."
      - id: d
        text: "REVOKED, потому что несуществующая задача считается отменённой."
    correct: [a]
    explanation: "PENDING в Celery означает «результата нет», а не «задача принята». Backend не хранит список поставленных задач: нет записи о результате значит PENDING, будь то ещё не выполненная задача или выдуманный id. Полагаться на PENDING как на «точно в очереди» нельзя."
    hints:
      - "PENDING отвечает не на вопрос «принята ли задача». На какой вопрос он тогда отвечает?"
      - "Хранит ли backend список всех поставленных задач или только записи об их результатах?"

  - id: beat-retry-ratio-001
    concept: beat-monitoring
    type: predict-output
    difficulty: 3
    prompt: "Программа считает долю ретраев (retry ratio) по журналу исходов выполнений. Что она выведет?"
    snippet: |
      outcomes = ["SUCCESS", "SUCCESS", "RETRY", "SUCCESS", "RETRY", "FAILURE", "SUCCESS"]

      total = len(outcomes)
      retries = sum(1 for s in outcomes if s == "RETRY")
      ratio = round(retries / total, 2)
      print("retry_ratio", ratio)
    expected:
      kind: stdout
      value: "retry_ratio 0.29"
    hints:
      - "Доля ретраев это число исходов RETRY, делённое на общее число исходов."
      - "Посчитайте два числа: сколько всего элементов в списке и сколько из них равны RETRY, затем поделите и округлите до двух знаков."
    variants:
      - snippet: |
          outcomes = ["SUCCESS", "RETRY", "RETRY", "RETRY", "SUCCESS"]

          total = len(outcomes)
          retries = sum(1 for s in outcomes if s == "RETRY")
          ratio = round(retries / total, 2)
          print("retry_ratio", ratio)
        expected:
          kind: stdout
          value: "retry_ratio 0.6"
      - snippet: |
          outcomes = ["SUCCESS", "SUCCESS", "SUCCESS", "SUCCESS"]

          total = len(outcomes)
          retries = sum(1 for s in outcomes if s == "RETRY")
          ratio = round(retries / total, 2)
          print("retry_ratio", ratio)
        expected:
          kind: stdout
          value: "retry_ratio 0.0"

  - id: beat-health-challenge-001
    concept: beat-monitoring
    type: predict-output
    difficulty: 4
    prompt: "Программа классифицирует здоровье worker'ов по трём сигналам: отвечает ли ping, глубина очереди и число active. Что она выведет?"
    snippet: |
      samples = [
          {"queue_depth": 5, "active": 3, "ping": True},
          {"queue_depth": 40, "active": 0, "ping": False},
          {"queue_depth": 40, "active": 6, "ping": True},
      ]

      def health(s):
          if not s["ping"]:
              return "dead"
          if s["queue_depth"] > 20 and s["active"] > 0:
              return "overloaded"
          return "ok"

      print([health(s) for s in samples])
    expected:
      kind: stdout
      value: "['ok', 'dead', 'overloaded']"
    hints:
      - "Проверки в health идут по порядку: сначала ping, потом сочетание глубины очереди и active. Возвращается ответ первого сработавшего условия."
      - "Мёртвый worker узнают по неотвечающему ping (очередь при этом растёт, а active пустой). Перегруженный это живой worker с длинной очередью и непустым active."
      - "Пройдите три записи по очереди, примените health к каждой и соберите ответы в список."
