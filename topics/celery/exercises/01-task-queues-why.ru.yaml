exercises:
  - id: tq-why-offload-001
    concept: task-queues-why
    type: theory-quiz
    difficulty: 1
    prompt: "Зачем выносить отправку письма из HTTP-обработчика в фоновую задачу?"
    choices:
      - id: a
        text: "Чтобы обработчик ответил пользователю быстро, не дожидаясь медленного SMTP-сервера."
      - id: b
        text: "Чтобы письмо точно дошло мгновенно, в момент ответа пользователю."
      - id: c
        text: "Чтобы база данных не записывала пользователя дважды."
      - id: d
        text: "Чтобы убрать необходимость в веб-сервере."
    correct: [a]
    explanation: "Отправка письма медленная и зависит от чужого сервера. Вынеся её в фон, обработчик отвечает сразу после записи в базу, а письмо отправит worker позже. Фон не делает доставку мгновенной - наоборот, добавляет задержку."
    variants:
      - prompt: "Какая работа - хороший кандидат на вынос в фоновую задачу?"
        choices:
          - id: a
            text: "Генерация PDF-отчёта, который пришлют пользователю письмом через минуту."
          - id: b
            text: "Валидация входных данных запроса перед записью в базу."
          - id: c
            text: "Чтение профиля пользователя, который надо показать прямо в ответе."
          - id: d
            text: "Быстрый расчёт суммы корзины для отображения на странице."
        correct: [a]
        explanation: "Кандидат на фон - медленная работа, от которой не зависит сам HTTP-ответ. PDF, который придёт письмом позже, подходит. Валидация, чтение для ответа и быстрый расчёт нужны прямо сейчас в обработчике."
      - prompt: "Что означает, что producer и consumer «развязаны во времени»?"
        choices:
          - id: a
            text: "Producer кладёт задачу и сразу свободен, а consumer выполнит её позже, в своём темпе."
          - id: b
            text: "Producer и consumer обязаны работать строго одновременно."
          - id: c
            text: "Consumer выполняет задачу до того, как producer её поставил."
          - id: d
            text: "Producer ждёт, пока consumer закончит, и только потом отвечает."
        correct: [a]
        explanation: "Развязка во времени и есть суть очереди: момент постановки задачи и момент её выполнения не совпадают. Producer не ждёт consumer - задача лежит в брокере, пока её не заберут."

  - id: tq-why-delay-returns-001
    concept: task-queues-why
    type: theory-quiz
    difficulty: 2
    prompt: "Обработчик вызвал `send_welcome_email.delay(user.email)` и сразу вернул ответ. Что произошло к моменту ответа?"
    choices:
      - id: a
        text: "Задача сериализована и положена в очередь; письмо ещё не отправлено."
      - id: b
        text: "Письмо уже отправлено, SMTP-сервер подтвердил доставку."
      - id: c
        text: "Письмо отправлено синхронно, поэтому ответ задержался."
      - id: d
        text: "Задача выполнена полностью, включая запись результата."
    correct: [a]
    explanation: "`.delay()` лишь сериализует имя задачи и аргументы в сообщение и кладёт его в очередь, возвращаясь за миллисекунды. Письмо отправит worker позже. Успешный возврат `.delay()` означает «принято в очередь», а не «отправлено»."
    hints:
      - "Вспомните, что именно делает .delay(): он что-то выполняет или что-то кладёт?"

  - id: tq-why-thread-vs-queue-001
    concept: task-queues-why
    type: theory-quiz
    difficulty: 3
    prompt: "Чем постановка задачи в очередь надёжнее запуска работы в фоновом потоке внутри веб-процесса?"
    choices:
      - id: a
        text: "Сообщение в брокере переживает перезапуск процессов, а поток умирает вместе со своим процессом."
      - id: b
        text: "Поток всегда выполняется быстрее, чем worker из очереди."
      - id: c
        text: "Очередь гарантирует выполнение ровно один раз, а поток - хотя бы один."
      - id: d
        text: "Поток не может обратиться к внешнему API, а задача из очереди может."
    correct: [a]
    explanation: "Ключевое отличие - живучесть. Поток живёт внутри процесса: деплой, OOM или перезапуск убивают его вместе с незавершённой работой. Сообщение в брокере лежит в хранилище и дождётся следующего живого worker."
    hints:
      - "Подумайте, что случится с незавершённой работой при деплое приложения в обоих случаях."
      - "Где физически хранится единица работы у потока, а где - у очереди?"

  - id: tq-why-classify-001
    concept: task-queues-why
    type: theory-quiz
    difficulty: 3
    prompt: "Пользователь жмёт «Скачать счёт» и должен сразу увидеть PDF на экране. Можно ли вынести генерацию PDF в фоновую задачу без изменения этого требования?"
    choices:
      - id: a
        text: "Нет: результат нужен прямо в HTTP-ответе, поэтому работа синхронная и фон тут не поможет."
      - id: b
        text: "Да: любую генерацию файлов всегда выносят в фон."
      - id: c
        text: "Да: .delay() сразу вернёт готовый PDF в ответ."
      - id: d
        text: "Нет, потому что PDF нельзя сериализовать в очередь."
    correct: [a]
    explanation: "Граница проходит по вопросу «нужен ли результат в самом ответе?». Раз PDF надо показать сразу, работа синхронная: вынос в фон либо заставит всё равно ждать, либо отдаст неполный ответ. Фон подошёл бы, только если PDF можно прислать позже."
    hints:
      - "Спросите себя: зависит ли HTTP-ответ от результата этой работы?"
      - "Что увидит пользователь, если ответ вернётся раньше, чем PDF готов?"

  - id: tq-why-status-meaning-001
    concept: task-queues-why
    type: theory-quiz
    difficulty: 4
    prompt: "После перехода на очереди какой сдвиг в мышлении обязателен, чтобы не строить на нём баги?"
    choices:
      - id: a
        text: "«200 OK» теперь значит лишь «задача принята», а не «работа выполнена» - статус важных операций надо отслеживать отдельно."
      - id: b
        text: "После `return` вся фоновая работа гарантированно завершена."
      - id: c
        text: "Очередь автоматически уведомит пользователя об ошибке фоновой задачи."
      - id: d
        text: "Фоновая задача не может упасть, поэтому отслеживать её не нужно."
    correct: [a]
    explanation: "Самый частый сдвиг: раньше код после `return` точно отработал, теперь успешный ответ означает только постановку в очередь. Сама задача могла не начаться, упасть или зависнуть, а об ошибке после «200 OK» пользователю никто автоматически не сообщит."
    hints:
      - "Что именно гарантирует успешный возврат .delay() - постановку или выполнение?"
      - "Когда падает фоновая задача относительно момента, когда пользователь уже получил ответ?"

  - id: tq-why-blanks-offload-001
    concept: task-queues-why
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски, чтобы обработчик ставил отправку письма в очередь и отвечал сразу."
    template: |
      def register(request):
          user = create_user(request.data)
          send_welcome_email.{{call}}(user.email)
          return Response({"id": user.id})
    blanks:
      call:
        accept: ["delay", "apply_async"]
    hints:
      - "Нужен метод задачи, который кладёт её в очередь и сразу возвращается, не выполняя работу."
    variants:
      - template: |
          def upload_avatar(request):
              path = save_file(request.file)
              generate_thumbnail.{{call}}(path)
              return Response({"path": path})
        blanks:
          call:
            accept: ["delay", "apply_async"]
      - template: |
          result = send_report.{{call}}(report_id)
          return Response({"queued": True})
        blanks:
          call:
            accept: ["delay", "apply_async"]

  - id: tq-why-roles-blanks-001
    concept: task-queues-why
    type: fill-in-blanks
    difficulty: 1
    prompt: "Заполните роли участников очереди фоновых задач."
    template: |
      Веб-обработчик, который кладёт задачу в очередь, - это {{a}}.
      Процесс, который забирает задачу и выполняет её, - это {{b}}.
    blanks:
      a:
        accept: ["producer", "продюсер"]
      b:
        accept: ["consumer", "worker", "консьюмер", "воркер"]
    variants:
      - template: |
          Тот, кто создаёт работу и кладёт сообщение в очередь, - {{a}}.
          Тот, кто достаёт сообщение и исполняет его код, - {{b}}.
        blanks:
          a:
            accept: ["producer", "продюсер"]
          b:
            accept: ["consumer", "worker", "консьюмер", "воркер"]
      - template: |
          В Celery роль consumer выполняет процесс под названием {{b}}.
          Роль того, кто ставит задачу, называется {{a}}.
        blanks:
          a:
            accept: ["producer", "продюсер"]
          b:
            accept: ["worker", "воркер"]

  - id: tq-why-predict-sync-001
    concept: task-queues-why
    type: predict-output
    difficulty: 2
    prompt: "Эта программа моделирует синхронный обработчик: медленная работа выполняется до ответа. Что она выведет?"
    snippet: |
      def create_user():
          return "user-1"

      def send_email():
          print("sending email")
          return "sent"

      def register():
          user = create_user()
          send_email()
          print("response", user)

      register()
    expected:
      kind: stdout
      value: "sending email\nresponse user-1"
    hints:
      - "В синхронной версии письмо отправляется до ответа. В каком порядке выполнятся print'ы?"
    variants:
      - prompt: "Эта программа моделирует постановку письма в очередь: обработчик отвечает сразу, а отправка лишь кладётся в очередь. Что она выведет?"
        snippet: |
          queue = []

          def send_email_delay(addr):
              queue.append(("send_email", addr))

          def register():
              send_email_delay("a@b.c")
              print("response 200")

          register()
          print("queued", len(queue))
        expected:
          kind: stdout
          value: "response 200\nqueued 1"
      - prompt: "Эта программа моделирует порядок шагов обработчика, ставящего задачу в очередь: создать пользователя, поставить письмо в очередь, ответить. Что она выведет?"
        snippet: |
          log = []

          def handler():
              log.append("create_user")
              log.append("enqueue_email")
              log.append("return")

          handler()
          print(log)
        expected:
          kind: stdout
          value: "['create_user', 'enqueue_email', 'return']"
