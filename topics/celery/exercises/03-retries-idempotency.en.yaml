exercises:
  - id: retry-at-least-once-001
    concept: retries-idempotency
    type: theory-quiz
    difficulty: 1
    prompt: "What delivery guarantee does Celery provide by default?"
    choices:
      - id: a
        text: "At-least-once: the task runs at least once but may repeat."
      - id: b
        text: "Exactly-once: duplicates impossible."
      - id: c
        text: "At-most-once: the task may never run."
      - id: d
        text: "Strict ordering: each task runs exactly after the previous."
    correct: [a]
    explanation: "Celery is at-least-once. If worker dies before ack, broker redelivers. Task runs at least once; duplicates are possible."
    variants:
      - prompt: "Why can a task run twice even when the code has no bug?"
        choices:
          - id: a
            text: "Worker did the effect but crashed before ack - broker redelivers."
          - id: b
            text: "Producer accidentally called .delay() twice."
          - id: c
            text: "Broker always duplicates every message for reliability."
          - id: d
            text: "Worker always runs every task exactly twice."
        correct: [a]
        explanation: "Worker applied side effect but did not ack. Broker redelivers honestly. Not a code bug."
      - prompt: "What is ack (acknowledge) in Celery and the broker?"
        choices:
          - id: a
            text: "Worker signal to broker: this task is done, forget it."
          - id: b
            text: "Broker command to worker: start executing."
          - id: c
            text: "User confirmation that email was delivered."
          - id: d
            text: "Writing task result to result backend."
        correct: [a]
        explanation: "Ack tells broker the task is handled. Until ack, broker may redeliver."

  - id: retry-which-errors-001
    concept: retries-idempotency
    type: theory-quiz
    difficulty: 2
    prompt: "Which error is worth retrying with `self.retry`?"
    choices:
      - id: a
        text: "Temporary: external API 503 or network blip - next attempt may succeed."
      - id: b
        text: "ValueError from bad input - same data next time, retry useless."
      - id: c
        text: "KeyError from a typo in task code for every request path in the app."
      - id: d
        text: "Any error - retry is always useful for every request path in the app."
    correct: [a]
    explanation: "Retry temporary failures that may clear: timeout, 503, network drop. Bad input repeats the same error and clogs the queue."
    hints:
      - "Will anything change on the next attempt, or same error with same inputs?"

  - id: retry-idempotent-def-001
    concept: retries-idempotency
    type: theory-quiz
    difficulty: 2
    prompt: "What does it mean for a task to be idempotent?"
    choices:
      - id: a
        text: "Repeating with the same arguments leaves the system in the same state as one run."
      - id: b
        text: "It never fails and needs no retries for any payload and any deploy target."
      - id: c
        text: "It runs faster on each subsequent run for any payload and any deploy target."
      - id: d
        text: "It has no arguments and never touch the database for every request path in the app."
    correct: [a]
    explanation: "Idempotency is safety on repeat: one run or five, same system state. Required because Celery duplicates are possible."
    hints:
      - "Compare outcome of one run vs five runs - for idempotent tasks they match."

  - id: retry-key-from-producer-001
    concept: retries-idempotency
    type: theory-quiz
    difficulty: 3
    prompt: "Why must the idempotency key come from producer arguments, not be generated inside the task?"
    choices:
      - id: a
        text: "Each repeat would get a new key, deduplication would fail, effect would run again."
      - id: b
        text: "uuid4 cannot be called inside a task due to Celery limits for every request path in the app."
      - id: c
        text: "Producer generates keys faster than worker for every request path in the app."
      - id: d
        text: "Keys generated inside use more broker space for every request path in the app."
    correct: [a]
    explanation: "Key must be stable across repeats of the same task. New uuid4 each run means new key and no deduplication. Producer creates once and passes in arguments."
    hints:
      - "What happens to the key if the task regenerates it on repeat?"
      - "Deduplication works only if repeat brings the same key as the first run."

  - id: retry-partial-001
    concept: retries-idempotency
    type: theory-quiz
    difficulty: 4
    prompt: "Task charges money then delivers goods. Idempotency only on delivery. What is dangerous if it fails between steps?"
    choices:
      - id: a
        text: "Repeat after charge but before delivery charges again - every external effect must be idempotent."
      - id: b
        text: "Nothing: protecting the last step makes the whole task safe for every request path in the app."
      - id: c
        text: "Goods deliver twice; money is untouched as a complete account of that behavior."
      - id: d
        text: "Task cannot repeat after partial execution, - that is how the API contract should be read."
    correct: [a]
    explanation: "Partial execution then repeat: unprotected first step runs again. Every external effect needs idempotency, not only the last."
    hints:
      - "Trace a repeat if failure happened between charge and delivery."
      - "Which step has protection and which runs again unprotected?"

  - id: retry-blanks-retry-001
    concept: retries-idempotency
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in blanks so the task retries a temporary error with delay."
    template: |
      @app.task({{bind}}=True, max_retries=3)
      def fetch_rate(self, currency):
          try:
              return call_external_api(currency)
          except TimeoutError as exc:
              raise self.{{retry}}(exc=exc, countdown=10)
    blanks:
      bind:
        accept: ["bind"]
      retry:
        accept: ["retry"]
    hints:
      - "One decorator arg gives self; one self method re-enqueues with delay."
    variants:
      - template: |
          @app.task({{bind}}=True, max_retries=4)
          def send_sms(self, phone, text):
              try:
                  return sms_gateway.send(phone, text)
              except ConnectionError as exc:
                  raise self.{{retry}}(exc=exc, countdown=15)
        blanks:
          bind:
            accept: ["bind"]
          retry:
            accept: ["retry"]
      - template: |
          @app.task({{bind}}=True, max_retries=5)
          def sync_order(self, order_id):
              try:
                  push_to_warehouse(order_id)
              except ConnectionError as exc:
                  raise self.{{retry}}(exc=exc, countdown=30)
        blanks:
          bind:
            accept: ["bind"]
          retry:
            accept: ["retry"]

  - id: retry-blanks-idempotent-001
    concept: retries-idempotency
    type: fill-in-blanks
    difficulty: 1
    prompt: "Fill in blanks: bonus grant runs only once thanks to idempotency key."
    template: |
      @app.task
      def grant_bonus(user_id, bonus_id):
          _, created = Bonus.objects.{{method}}(
              id=bonus_id, defaults={"user_id": user_id, "amount": 100}
          )
          if {{flag}}:
              User.objects.filter(id=user_id).update(balance=F("balance") + 100)
    blanks:
      method:
        accept: ["get_or_create"]
      flag:
        accept: ["created"]
    hints:
      - "One method creates only on first call; flag tells if record was created now."
    variants:
      - template: |
          @app.task
          def register_payment(order_id, payment_id):
              _, created = Payment.objects.{{method}}(
                  id=payment_id, defaults={"order_id": order_id, "amount": 500}
              )
              if {{flag}}:
                  Order.objects.filter(id=order_id).update(status="paid")
        blanks:
          method:
            accept: ["get_or_create"]
          flag:
            accept: ["created"]
      - template: |
          @app.task
          def ship_order(order_id):
              order = Order.objects.get(id=order_id)
              if order.{{attr}} != "sent":
                  send_to_carrier(order)
                  order.status = "sent"
                  order.save()
        blanks:
          attr:
            accept: ["status"]

  - id: retry-predict-non-idempotent-001
    concept: retries-idempotency
    type: predict-output
    difficulty: 2
    prompt: "This models NON-idempotent grant: task ran twice like a retry. What does it print?"
    snippet: |
      balance = 0

      def grant_bonus():
          global balance
          balance += 100

      grant_bonus()
      grant_bonus()
      print(balance)
    expected:
      kind: stdout
      value: "200"
    hints:
      - "`balance += 100` accumulates. How many calls?"
    variants:
      - prompt: "This models idempotent task with key dedup: called twice with same bonus_id. What does it print?"
        snippet: |
          granted = set()

          def grant_bonus(bonus_id):
              if bonus_id in granted:
                  return
              granted.add(bonus_id)
              print("granted", bonus_id)

          grant_bonus("b1")
          grant_bonus("b1")
          print("total", len(granted))
        expected:
          kind: stdout
          value: "granted b1\ntotal 1"
      - prompt: "This models naturally idempotent overwrite: set value twice. What does it print?"
        snippet: |
          balance = 50

          def set_balance(value):
              global balance
              balance = value

          set_balance(200)
          set_balance(200)
          print(balance)
        expected:
          kind: stdout
          value: "200"

  - id: retry-predict-idempotent-key-001
    concept: retries-idempotency
    type: predict-output
    difficulty: 3
    prompt: "This models idempotent grant with key: three calls with same bonus_id. What does it print?"
    snippet: |
      processed = set()
      balance = 0

      def grant_bonus(bonus_id):
          global balance
          if bonus_id in processed:
              return
          processed.add(bonus_id)
          balance += 100

      grant_bonus("bonus-7")
      grant_bonus("bonus-7")
      grant_bonus("bonus-7")
      print(balance)
    expected:
      kind: stdout
      value: "100"
    hints:
      - "Key bonus-7 is remembered on first call. What do second and third do?"
      - "Only first call adds key and touches balance; others exit on in processed check."
