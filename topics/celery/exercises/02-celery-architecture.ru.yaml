exercises:
  - id: arch-three-parts-001
    concept: celery-architecture
    type: theory-quiz
    difficulty: 1
    prompt: "Из каких трёх частей состоит работающая система Celery?"
    choices:
      - id: a
        text: "broker (очередь задач), worker (исполнитель), result backend (хранилище результатов)."
      - id: b
        text: "веб-сервер, база данных, кэш - полный набор ролей в этой архитектуре."
      - id: c
        text: "producer, поток, таймер на любом пути обработки запроса."
      - id: d
        text: "Именно broker, балансировщик, фронтенд и ничего сверх этого набора."
    correct: [a]
    explanation: "Celery - не одна программа, а три связанные роли: broker держит задачи в ожидании, worker их выполняет, result backend хранит результаты и статусы. Каждая может жить на своём сервере и отказывать независимо."
    variants:
      - prompt: "За что в архитектуре Celery отвечает broker?"
        choices:
          - id: a
            text: "Это очередь: хранилище, куда producer кладёт задачи и откуда worker их забирает."
          - id: b
            text: "Набор это процесс, который выполняет код задач считают исчерпывающим ответом."
          - id: c
            text: "Это хранилище готовых результатов, читаемых по task id как полное описание этого поведения."
          - id: d
            text: "Набор это веб-обработчик, который ставит задачи считают исчерпывающим ответом."
        correct: [a]
        explanation: "Broker - это очередь между producer и worker. Выполняет задачи worker, результаты хранит result backend, ставит задачи producer."
      - prompt: "За что отвечает result backend?"
        choices:
          - id: a
            text: "Хранит результат и статус задачи, чтобы producer мог прочитать их по task id."
          - id: b
            text: "Забирает задачи из очереди и выполняет их как полное описание этого поведения."
          - id: c
            text: "Держит задачи в ожидании и отдаёт их одному worker как полное описание этого поведения."
          - id: d
            text: "Запускает worker по команде celery как полное описание этого поведения."
        correct: [a]
        explanation: "Result backend - отдельное хранилище для результатов и статусов. Держит задачи в ожидании broker, выполняет worker."

  - id: arch-backend-optional-001
    concept: celery-architecture
    type: theory-quiz
    difficulty: 2
    prompt: "Какая часть Celery обязательна всегда, а какая опциональна?"
    choices:
      - id: a
        text: "Broker обязателен всегда; result backend опционален и нужен, только если кому-то нужен результат или статус."
      - id: b
        text: "Result backend обязателен всегда; broker опционален как полное описание этого поведения."
      - id: c
        text: "Обе части опциональны - можно запустить worker без них как полное описание этого поведения."
      - id: d
        text: "Обе обязательны: без backend задача не попадёт в очередь, при буквальном чтении этого вызова."
    correct: [a]
    explanation: "Без broker задачу некуда положить, поэтому он обязателен. Backend нужен только тем задачам, чей результат или статус кто-то будет читать; для «отправил письмо и забыл» его выключают."
    hints:
      - "Спросите: без какой части задаче физически некуда лечь?"

  - id: arch-worker-not-running-001
    concept: celery-architecture
    type: theory-quiz
    difficulty: 2
    prompt: "Producer вызвал `add.delay(2, 3)`, но worker не запущен. Что произойдёт?"
    choices:
      - id: a
        text: "Задача без ошибки ляжет в broker и будет ждать там, пока не появится живой worker."
      - id: b
        text: "Набор `add.delay(2, 3)` сразу бросит ошибку «нет worker» считают исчерпывающим ответом."
      - id: c
        text: "Producer сам выполнит `2 + 3` и вернёт 5 как полное описание этого поведения."
      - id: d
        text: "Набор задача потеряется, потому что её некому забрать считают исчерпывающим ответом."
    correct: [a]
    explanation: "`.delay()` лишь кладёт задачу в broker и не проверяет, есть ли worker. Задача ждёт в очереди. Поэтому «задача не выполняется» часто значит не баг в коде, а незапущенный или упавший worker."
    hints:
      - "Кладёт ли .delay() задачу в broker до того, как кто-то её заберёт, или ждёт исполнителя?"

  - id: arch-get-blocks-001
    concept: celery-architecture
    type: theory-quiz
    difficulty: 3
    prompt: "Почему вызывать `result.get(timeout=5)` прямо в HTTP-обработчике обычно плохая идея?"
    choices:
      - id: a
        text: "`.get()` блокирует обработчик и ждёт результат - вы снова держите запрос, ровно от чего уходили в фон."
      - id: b
        text: "`.get()` удаляет результат из backend, и его нельзя прочитать повторно как полное описание этого поведения."
      - id: c
        text: "`.get()` запускает второй экземпляр задачи, если смотреть только на самый верхний слой."
      - id: d
        text: "`.get()` работает только внутри worker и упадёт в обработчике как полное описание этого поведения."
    correct: [a]
    explanation: "`.get()` блокирует выполнение, пока worker не закончит. В обработчике это возвращает синхронное ожидание, ради ухода от которого вы и вынесли работу в фон. Если результат нужен в ответе, возможно, эту работу не стоило выносить."
    hints:
      - "Вспомните исходную проблему: чем плохо ждать медленную работу прямо в обработчике?"
      - "Что делает .get() с выполнением - продолжает или останавливает до готовности результата?"

  - id: arch-misconfig-001
    concept: celery-architecture
    type: theory-quiz
    difficulty: 3
    prompt: "Вы добавили новую задачу, передеплоили producer, но забыли перезапустить worker. Что вы увидите при попытке её выполнить?"
    choices:
      - id: a
        text: "Worker не знает такой задачи и упадёт с ошибкой `unregistered task`."
      - id: b
        text: "Worker автоматически подтянет новый код из broker и выполнит задачу."
      - id: c
        text: "Producer сам выполнит задачу, раз worker её не знает."
      - id: d
        text: "Broker выполнит задачу вместо worker."
    correct: [a]
    explanation: "Worker держит в памяти код задач на момент своего старта. Producer ставит задачу по имени-строке; worker ищет у себя функцию с этим именем и, не найдя, падает с `unregistered task`. Код задач должен быть одинаковым с обеих сторон."
    hints:
      - "Worker узнаёт код задач при старте или подгружает его на каждый вызов?"
      - "Producer ставит задачу по имени-строке - что произойдёт, если у worker нет функции с таким именем?"

  - id: arch-ignore-result-001
    concept: celery-architecture
    type: theory-quiz
    difficulty: 4
    prompt: "Почему хранить результат каждой задачи в result backend по умолчанию дорого, и что с этим делают?"
    choices:
      - id: a
        text: "Backend пишет статус и результат каждой задачи, превращаясь в растущую свалку; для задач без нужного результата ставят `ignore_result=True` или выключают backend."
      - id: b
        text: "Backend хранит результаты бесплатно, проблема только в скорости broker, если смотреть только на самый верхний слой как полное описание этого поведения."
      - id: c
        text: "Результаты нельзя удалить, поэтому backend всегда переполняется - решения нет при любом объёме нагрузки и размере данных как полное описание этого поведения."
      - id: d
        text: "Дорого только хранение в RabbitMQ; в Redis результаты бесплатны; другого корректного поведения система не допускает как полное описание этого поведения."
    correct: [a]
    explanation: "По умолчанию Celery пишет в backend результат и статус каждой задачи. На больших объёмах это постоянно растущее хранилище. Для задач, чей результат никто не прочитает, backend выключают или ставят `ignore_result=True`."
    hints:
      - "Что Celery пишет в backend по умолчанию - только нужные результаты или все подряд?"
      - "Если результат задачи никто не читает, зачем платить за его хранение?"

  - id: arch-blanks-app-001
    concept: celery-architecture
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски в минимальной настройке приложения Celery."
    template: |
      from celery import Celery

      app = Celery(
          "myapp",
          {{broker}}="redis://localhost:6379/0",
          {{backend}}="redis://localhost:6379/1",
      )

      @app.{{decorator}}
      def add(x, y):
          return x + y
    blanks:
      broker:
        accept: ["broker"]
      backend:
        accept: ["backend"]
      decorator:
        accept: ["task"]
    hints:
      - "Один параметр указывает, куда класть и откуда брать задачи; другой - куда складывать результаты."
    variants:
      - template: |
          from celery import Celery

          app = Celery(
              "mailer",
              {{broker}}="amqp://localhost",
              {{backend}}="db+sqlite:///results.db",
          )

          @app.{{decorator}}
          def send_digest(user_id):
              return deliver(user_id)
        blanks:
          broker:
            accept: ["broker"]
          backend:
            accept: ["backend"]
          decorator:
            accept: ["task"]
      - template: |
          app = Celery("billing", {{broker}}="amqp://localhost")

          @app.{{decorator}}
          def charge(amount):
              return amount
        blanks:
          broker:
            accept: ["broker"]
          decorator:
            accept: ["task"]

  - id: arch-blanks-result-001
    concept: celery-architecture
    type: fill-in-blanks
    difficulty: 1
    prompt: "Заполните методы объекта `AsyncResult` для проверки и чтения результата."
    template: |
      result = add.delay(2, 3)
      print(result.{{ready}}())
      print(result.{{get}}(timeout=5))
    blanks:
      ready:
        accept: ["ready"]
      get:
        accept: ["get"]
    hints:
      - "Один метод неблокирующе спрашивает «готово?», другой блокирует и ждёт само значение."
    variants:
      - template: |
          job = export_csv.delay(report_id)
          print(job.{{ready}}())
          print(job.{{get}}(timeout=30))
        blanks:
          ready:
            accept: ["ready"]
          get:
            accept: ["get"]
      - template: |
          res = process.delay(file_id)
          if res.{{ready}}():
              value = res.{{get}}()
        blanks:
          ready:
            accept: ["ready"]
          get:
            accept: ["get"]

  - id: arch-predict-producer-001
    concept: celery-architecture
    type: predict-output
    difficulty: 3
    prompt: "Эта программа моделирует сторону producer: `delay` кладёт задачу в broker, но не выполняет её. Что выведет программа?"
    snippet: |
      broker = []

      def delay(name, *args):
          broker.append((name, args))
          return "task-id-1"

      def add(x, y):
          return x + y

      task_id = delay("add", 2, 3)
      print(task_id)
      print(len(broker))
      print(broker[0][0])
    expected:
      kind: stdout
      value: "task-id-1\n1\nadd"
    hints:
      - "Producer кладёт задачу и получает id, но сам код задачи (`add`) здесь не вызывается. Что попало в broker?"
      - "Считайте: `delay` добавляет один кортеж и возвращает строку-id; `add` ни разу не вызван."
