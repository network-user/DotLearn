exercises:
  - id: pat-chain-group-001
    concept: patterns-pitfalls
    type: theory-quiz
    difficulty: 1
    prompt: "How does `chain` differ from `group` in Celery canvas?"
    choices:
      - id: a
        text: "Chain runs tasks in order passing results forward; group runs them in parallel and independently."
      - id: b
        text: "Chain runs parallel; group sequential for every request path in the app."
      - id: c
        text: "Chain and group are identical except syntax, without special-case setup for this flow."
      - id: d
        text: "Chain is one task; group is one task repeated for any payload and any deploy target."
    correct: [a]
    explanation: "Chain is sequential: each result feeds the next. Group is parallel fan-out with no coupling between tasks."
    variants:
      - prompt: "What is chord in Celery canvas?"
        choices:
          - id: a
            text: "A group plus final callback over all results when the group finishes."
          - id: b
            text: "A chain of exactly two tasks for every request path in the app."
          - id: c
            text: "A group with no summary step for every request path in the app."
          - id: d
            text: "One task repeated several times in a row for every request path in the app."
        correct: [a]
        explanation: "Chord = group + callback. Parallel tasks converge on one final task with their result list."
      - prompt: "What does `.s()` on a task create, e.g. `add.s(2)`?"
        choices:
          - id: a
            text: "A signature - task with fixed partial args, not executed."
          - id: b
            text: "Immediately always runs add(2) and returns result."
          - id: c
            text: "A string name for logging for every request path in the app."
          - id: d
            text: "A new worker to run the task for every request path in the app."
        correct: [a]
        explanation: "`.s()` builds a canvas signature brick. Chain, group, and chord compose from signatures."

  - id: pat-chord-backend-001
    concept: patterns-pitfalls
    type: theory-quiz
    difficulty: 3
    prompt: "Which canvas pattern requires result backend and why?"
    choices:
      - id: a
        text: "Chord: Celery must track group completion and collect results for the callback."
      - id: b
        text: "Chain: every step must save to backend for every request path in the app."
      - id: c
        text: "Group: parallel tasks cannot start without backend for every request path in the app."
      - id: d
        text: "None: canvas always works without backend for every request path in the app."
    correct: [a]
    explanation: "Chord waits for the whole group and gathers results - needs backend. Chain and group without callback do not."
    hints:
      - "Which pattern must wait for an entire group and collect results?"
      - "Where does Celery store interim group results while waiting?"

  - id: pat-heavy-args-001
    concept: patterns-pitfalls
    type: theory-quiz
    difficulty: 2
    prompt: "Why is `process_image.delay(huge_image_bytes)` bad and `process_image.delay(image_id)` good?"
    choices:
      - id: a
        text: "Arguments serialize whole through the broker; pass a reference, load data inside the task."
      - id: b
        text: "Broker accepts only numbers, not bytes as a complete account of that behavior."
      - id: c
        text: "image_id runs faster because it is shorter to type for every request path in the app."
      - id: d
        text: "No difference in load - and that is the only meaning of this concept."
    correct: [a]
    explanation: "What you pass is queued whole. Image bytes bloat messages; id lets the task load from storage."
    hints:
      - "Where do task arguments go before the worker receives them?"

  - id: pat-on-commit-001
    concept: patterns-pitfalls
    type: theory-quiz
    difficulty: 4
    prompt: "You create a user in a DB transaction and call `send_welcome_email.delay(user.id)`. Sometimes user not found. Why and fix?"
    choices:
      - id: a
        text: "Worker grabs task before commit; enqueue after commit (`transaction.on_commit`)."
      - id: b
        text: "Too few retries; increase max_retries under any load volume and data size."
      - id: c
        text: "Broker loses user.id; pass whole user object for every request path in the app."
      - id: d
        text: "User is in another process and never visible for every request path in the app."
    correct: [a]
    explanation: "Worker can run in milliseconds before commit. Data must be visible before enqueue. Use on_commit in Django."
    hints:
      - "Compare commit time vs when worker takes the task."
      - "What must happen first - visible data or task in queue?"

  - id: pat-queue-backlog-001
    concept: patterns-pitfalls
    type: theory-quiz
    difficulty: 3
    prompt: "Tasks enqueue faster than workers dequeue. No errors but Celery feels slow. What is happening?"
    choices:
      - id: a
        text: "Queue grows, delay increases quietly; add workers, split queues, or limit enqueue rate."
      - id: b
        text: "Broker is losing tasks; switch to RabbitMQ under any load volume and data size."
      - id: c
        text: "Tasks became non-idempotent; add keys under any load volume and data size."
      - id: d
        text: "Wrong execution order; enable chord, without any extra conditions or caveats."
    correct: [a]
    explanation: "Queue overflow: throughput insufficient, tasks pile up, everything runs later with no errors. Scale workers or throttle enqueue."
    hints:
      - "If inbound exceeds outbound, what happens to queue length?"
      - "Slow with no errors usually means capacity, not a bug."

  - id: pat-blanks-chain-001
    concept: patterns-pitfalls
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in blanks: build download → process → store chain."
    template: |
      from celery import chain

      workflow = {{builder}}(
          download.{{sig}}(url),
          process.{{sig}}(),
          store.{{sig}}(),
      )
      workflow.delay()
    blanks:
      builder:
        accept: ["chain"]
      sig:
        accept: ["s"]
    hints:
      - "One call links tasks sequentially; one method makes a signature."
    variants:
      - template: |
          from celery import chain

          pipeline = {{builder}}(
              fetch_invoice.{{sig}}(invoice_id),
              render_pdf.{{sig}}(),
              email_pdf.{{sig}}(customer_email),
          )
          pipeline.delay()
        blanks:
          builder:
            accept: ["chain"]
          sig:
            accept: ["s"]
      - template: |
          from celery import group

          job = {{builder}}(send_email.{{sig}}(uid) for uid in user_ids)
          job.delay()
        blanks:
          builder:
            accept: ["group"]
          sig:
            accept: ["s"]

  - id: pat-blanks-pipe-001
    concept: patterns-pitfalls
    type: fill-in-blanks
    difficulty: 1
    prompt: "Fill in the pipeline operator for chain shorthand."
    template: |
      (download.s(url) {{op}} process.s() {{op}} store.s()).delay()
    blanks:
      op:
        accept: ["|"]
    hints:
      - "Pipeline operator left to right, same as chain(..)."
    variants:
      - template: |
          workflow = download.s(url) {{op}} process.s() {{op}} store.s()
          workflow.delay()
        blanks:
          op:
            accept: ["|"]
      - template: |
          (fetch.s(u) {{op}} parse.s()).delay()
        blanks:
          op:
            accept: ["|"]

  - id: pat-predict-chain-001
    concept: patterns-pitfalls
    type: predict-output
    difficulty: 3
    prompt: "This models chain: each step's result feeds the next. What does it print?"
    snippet: |
      def download(url):
          return len(url)

      def process(n):
          return n * 2

      def store(n):
          return "stored:" + str(n)

      result = store(process(download("https://x.io")))
      print(result)
    expected:
      kind: stdout
      value: "stored:24"
    hints:
      - "Flow inside out: download, then process, then store."
      - "String length, times two, prefix stored:."
    variants:
      - snippet: |
          def download(url):
              return len(url)

          def process(n):
              return n + 10

          def store(n):
              return "saved:" + str(n)

          print(store(process(download("abcd"))))
        expected:
          kind: stdout
          value: "saved:14"
      - snippet: |
          def step_a(x):
              return x + 1

          def step_b(x):
              return x * 3

          def step_c(x):
              return x - 2

          print(step_c(step_b(step_a(2))))
        expected:
          kind: stdout
          value: "7"

  - id: pat-predict-group-chord-001
    concept: patterns-pitfalls
    type: predict-output
    difficulty: 4
    prompt: "This models chord: parallel group then callback over results. What does it print?"
    snippet: |
      user_ids = [1, 2, 3, 4]

      def send_email(uid):
          return uid * 10

      def summarize(results):
          return "sent:" + str(len(results)) + " sum:" + str(sum(results))

      group_results = [send_email(uid) for uid in user_ids]
      print(summarize(group_results))
    expected:
      kind: stdout
      value: "sent:4 sum:100"
    hints:
      - "Group runs send_email per user, then summarize gets the list."
      - "Count results and sum them."
    variants:
      - snippet: |
          user_ids = [5, 5, 5]

          def send_email(uid):
              return uid

          def summarize(results):
              return str(len(results)) + "/" + str(sum(results))

          print(summarize([send_email(u) for u in user_ids]))
        expected:
          kind: stdout
          value: "3/15"
      - snippet: |
          items = [2, 4, 6]

          def work(x):
              return x * x

          def finalize(results):
              return max(results)

          print(finalize([work(i) for i in items]))
        expected:
          kind: stdout
          value: "36"

  - id: pat-challenge-pipeline-001
    concept: patterns-pitfalls
    type: predict-output
    difficulty: 5
    prompt: "This models idempotent handling in a pipeline: group item appears twice (duplicate retry). What does it print?"
    snippet: |
      processed = {}

      def handle(item_id, value):
          if item_id in processed:
              return processed[item_id]
          result = value * value
          processed[item_id] = result
          return result

      tasks = [(1, 2), (2, 3), (1, 2), (3, 4)]
      results = [handle(item_id, value) for item_id, value in tasks]

      def summarize(values):
          unique = sorted(set(processed.values()))
          return "results=" + str(results) + " unique=" + str(unique)

      print(summarize(results))
    expected:
      kind: stdout
      value: "results=[4, 9, 4, 16] unique=[4, 9, 16]"
    hints:
      - "item_id remembers result on first visit; duplicate id returns cached value."
      - "results lists all returns in order; processed.values() is unique keys 1,2,3."
      - "Walk tuples: (1,2)->4, (2,3)->9, (1,2) returns 4, (3,4)->16."
