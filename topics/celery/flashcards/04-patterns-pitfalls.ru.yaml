"conceptId": "patterns-pitfalls"
"cards":
- "id": "patterns-pitfalls-01"
  "front": "Что такое canvas в Celery?"
  "back": "Canvas - встроенный язык для сборки задач в структуры. Из signature собираются chain (последовательно), group (параллельно) и chord (группа плюс финальный callback), вместо ручной каши из вложенных delay()."
  "tags":
  - "canvas"
- "id": "patterns-pitfalls-02"
  "front": "Что такое signature и что делает метод .s()?"
  "back": "Signature - кирпич canvas: задача с уже зафиксированной частью аргументов (add.s(2)). Метод .s() создаёт signature, не выполняя задачу. Из signature собираются chain, group и chord."
  "tags":
  - "canvas"
- "id": "patterns-pitfalls-03"
  "front": "Чем chain отличается от group?"
  "back": "Chain выполняет задачи по очереди, передавая результат каждой в следующую как аргумент. Group запускает набор задач параллельно и независимо, без сбора результата - это просто веер из задач."
  "tags":
  - "canvas"
- "id": "patterns-pitfalls-04"
  "front": "Что произойдёт в chain, если один из шагов упадёт?"
  "back": "По умолчанию дальнейшие шаги не выполнятся - цепочка прервётся. Результат каждой задачи передаётся в следующую, поэтому шаги после первого пишут с .s() без первого аргумента: его даёт предыдущий шаг."
  "tags":
  - "canvas"
- "id": "patterns-pitfalls-05"
  "front": "Что такое chord и чем он отличается от group?"
  "back": "Chord запускает группу задач и, когда вся группа завершилась, выполняет финальную задачу-callback над собранными результатами. Group сама ничего не ждёт и не собирает результаты; chord добавляет к ней итоговый шаг."
  "tags":
  - "canvas"
- "id": "patterns-pitfalls-06"
  "front": "Почему chord требует result backend, а chain и group - нет?"
  "back": "Чтобы понять, что группа завершилась, и собрать её результаты, Celery должен где-то их хранить. Chord отслеживает счётчик завершившихся задач через backend. Chain и group без callback в хранилище результатов не нуждаются."
  "tags":
  - "canvas"
  - "backend"
- "id": "patterns-pitfalls-07"
  "front": "Почему process_image.delay(huge_image_bytes) - плохая идея?"
  "back": "Аргументы сериализуются и едут через брокер целиком. Передача всей картинки раздувает сообщение, тормозит сериализацию и забивает очередь мегабайтами. Передавайте image_id, а саму картинку задача загрузит из хранилища."
  "tags":
  - "pitfalls"
- "id": "patterns-pitfalls-08"
  "front": "Почему задача может выполниться раньше, чем закоммитилась транзакция БД?"
  "back": "Worker свободен и хватает задачу за миллисекунды - до коммита транзакции producer. Задача читает базу, не находит созданную запись и падает. Лечится постановкой после коммита (в Django - transaction.on_commit)."
  "tags":
  - "pitfalls"
- "id": "patterns-pitfalls-09"
  "front": "Почему общее состояние в памяти не разделяется между задачами?"
  "back": "Worker исполняет задачи в пуле процессов. Глобальная переменная или кэш в памяти, заполненный одной задачей, не виден другой, если та попала в другой процесс. Общее состояние держите во внешнем хранилище (база, Redis)."
  "tags":
  - "pitfalls"
- "id": "patterns-pitfalls-10"
  "front": "Как проявляется переполнение очереди?"
  "back": "Если задачи ставятся быстрее, чем worker их разбирает, очередь растёт без ошибок - всё просто выполняется всё позже. Внешне «Celery тормозит». Решается добавлением worker, разделением по очередям и приоритетам или ограничением скорости постановки."
  "tags":
  - "pitfalls"
  - "scaling"
