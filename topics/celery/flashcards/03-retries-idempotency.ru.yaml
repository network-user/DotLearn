"conceptId": "retries-idempotency"
"cards":
- "id": "retries-idempotency-01"
  "front": "Какую гарантию доставки даёт Celery: «ровно один раз» или «хотя бы один раз»?"
  "back": "«Хотя бы один раз» (at-least-once). Задача гарантированно выполнится минимум раз, но может выполниться дважды или трижды. «Ровно один раз» в распределённой системе по умолчанию недостижимо."
  "tags":
  - "delivery"
- "id": "retries-idempotency-02"
  "front": "Почему задача может выполниться повторно, хотя код корректен? И что такое ack?"
  "back": "Ack - сигнал worker брокеру «эту задачу можно забыть, я её обработал». Worker шлёт ack, только закончив. Если он умер до ack (упал или сеть моргнула), брокер считает задачу невыполненной и отдаёт её снова - брокер не видит, что было внутри задачи, только факт ack."
  "tags":
  - "delivery"
  - "ack"
- "id": "retries-idempotency-04"
  "front": "Зачем нужен bind=True и как работает self.retry?"
  "back": "bind=True делает первым аргументом сам объект задачи (self). self.retry(exc=..., countdown=10) не выполняет задачу заново тут же - он ставит её в очередь снова с задержкой и поднимает специальное исключение, прерывая текущий заход. max_retries ограничивает число попыток."
  "tags":
  - "retry"
  - "api"
- "id": "retries-idempotency-05"
  "front": "Какие ошибки стоит повторять через self.retry, а какие нет?"
  "back": "Повторяйте только временные сбои: таймаут, 503, сетевой обрыв. Повторять ValueError из-за плохих данных или «нет такой валюты» бессмысленно - на следующем заходе данные те же, и Вы лишь забьёте очередь обречёнными повторами."
  "tags":
  - "retry"
  - "pitfalls"
- "id": "retries-idempotency-06"
  "front": "Что такое exponential backoff и зачем он при повторах?"
  "back": "Это растущая задержка между повторами (countdown побольше с каждой попыткой). Долбить упавший внешний сервис каждую секунду мешает ему встать на ноги. В Celery включается параметрами retry_backoff=True и retry_jitter=True."
  "tags":
  - "retry"
- "id": "retries-idempotency-07"
  "front": "Что значит «идемпотентная задача»?"
  "back": "Задача идемпотентна, если повторный запуск с теми же аргументами не меняет результат по сравнению с однократным. Запустили один раз или пять - состояние системы одинаковое. Это условие корректности, а не опция."
  "tags":
  - "idempotency"
- "id": "retries-idempotency-08"
  "front": "Почему ключ идемпотентности нельзя генерировать внутри задачи?"
  "back": "Если ключ создаётся в теле задачи (новый uuid4 на каждом заходе), повтор получит новый ключ и дедупликация не сработает. Ключ должен прийти в аргументах от producer и быть стабильным между повторами."
  "tags":
  - "idempotency"
  - "pitfalls"
- "id": "retries-idempotency-09"
  "front": "Какие три приёма делают задачу идемпотентной?"
  "back": "Уникальный ключ операции (уникальное ограничение в БД не даст создать дубль), проверка состояния перед действием (например статус-флаг order.status) и естественно идемпотентная операция-перезапись (установить статус done или PUT по ключу)."
  "tags":
  - "idempotency"
- "id": "retries-idempotency-10"
  "front": "Почему идемпотентным должен быть каждый внешний эффект задачи, а не только последний?"
  "back": "Задача может сделать первый эффект (списать деньги), упасть перед вторым и повториться. Если идемпотентность навешена только на второй шаг, деньги спишутся дважды. Защищать нужно каждый внешний эффект."
  "tags":
  - "idempotency"
  - "pitfalls"
- "id": "retries-idempotency-11"
  "front": "Что делает acks_late=True и почему он ходит в паре с идемпотентностью?"
  "back": "По умолчанию ack шлётся рано, и падение во время выполнения теряет задачу. acks_late=True переносит ack на момент после завершения - задача не потеряется, но упавшая под конец выполнится снова. Late ack даёт «не потеряем», идемпотентность - «переживём дубль»."
  "tags":
  - "ack"
