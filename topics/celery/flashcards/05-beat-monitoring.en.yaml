conceptId: beat-monitoring
cards:
  - id: beat-monitoring-01
    front: "What is Celery Beat and what does it do?"
    back: "Beat is a separate scheduler process: on a schedule it drops periodic tasks into the same broker the workers pull from. It does not execute tasks itself; it is a producer woken by a timer rather than an HTTP request."
    tags: [beat, scheduling]
  - id: beat-monitoring-02
    front: "Why must Beat be exactly one per cluster?"
    back: "Beat elects no leader and splits no schedule with other Beats. Two Beats independently run the whole schedule, so every periodic task goes to the queue twice. For non-idempotent tasks that is direct damage, not fault tolerance."
    tags: [beat, ops]
  - id: beat-monitoring-03
    front: "How do you make Beat fault-tolerant, and why is the -B mode risky?"
    back: "Simple fix: one Beat as a separate process, and scale the workers. For HA use a scheduler with an external lock (RedBeat keeps the schedule and lock in Redis, so only one Beat is on duty). The -B mode (Beat inside the worker) is handy locally but in production most often spawns several schedulers."
    tags: [beat, ops]
  - id: beat-monitoring-04
    front: "What three forms does the schedule field in beat_schedule accept?"
    back: "A number is an interval in seconds (30.0 means every 30 seconds). timedelta does the same more clearly. crontab binds to the calendar: crontab(minute=0, hour=3) every day at 3:00, crontab(minute='*/15') every 15 minutes."
    tags: [scheduling]
  - id: beat-monitoring-05
    front: "What is jitter and why do periodic tasks need it?"
    back: "A spread of start times. If a 3:00 task fans out thousands of sub-tasks, they all fall into the queue at once. countdown=random.uniform(0, 300) smears them across a window. On retries, retry_jitter=True and retry_backoff=True prevent a thundering herd where failed tasks rush back in one volley."
    tags: [scheduling, ops]
  - id: beat-monitoring-06
    front: "What are the task states, and why is STARTED often invisible?"
    back: "PENDING, STARTED, SUCCESS, RETRY, FAILURE, REVOKED. By default Celery does not mark the moment a task is picked up, so STARTED appears only with task_track_started=True; otherwise the task jumps from PENDING straight to SUCCESS or FAILURE."
    tags: [monitoring, states]
  - id: beat-monitoring-07
    front: "What do celery inspect active, reserved, and scheduled show?"
    back: "active is tasks running right now. reserved is the prefetch buffer: tasks taken from the broker ahead of time but not yet started. scheduled is tasks with a deferred eta or countdown, not the Beat schedule. Confusing scheduled with beat_schedule is a common mistake."
    tags: [monitoring, inspect]
  - id: beat-monitoring-08
    front: "Why does reserved (prefetch) hide the queue backlog?"
    back: "Prefetch takes tasks off the broker into the worker's local buffer before execution. The broker queue length undercounts them by exactly the number of prefetched tasks. This is governed by worker_prefetch_multiplier; for long tasks it is lowered to 1."
    tags: [monitoring, inspect]
  - id: beat-monitoring-09
    front: "What does Flower show, and why is it dangerous when exposed?"
    back: "Flower is a dashboard over events and inspect: tasks, workers, queues, charts, plus task arguments and results, plus control (revoke, rate limit, shutting down a worker). By default it has no authentication, so on the internet it leaks task arguments and hands anyone a control panel. Keep it behind auth and in a private network."
    tags: [monitoring, flower]
  - id: beat-monitoring-10
    front: "Which metrics tell you the health of a task queue?"
    back: "Queue depth (steady growth means producers outpace workers), task latency (queue wait plus execution), and retry ratio (a jump is an early signal of a broken dependency or a bad release). Separately, celery inspect ping checks whether the workers themselves are alive."
    tags: [monitoring, metrics]
