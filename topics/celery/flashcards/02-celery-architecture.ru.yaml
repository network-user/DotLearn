"conceptId": "celery-architecture"
"cards":
- "id": "celery-architecture-01"
  "front": "Из каких трёх частей состоит работающая система Celery?"
  "back": "Broker - очередь, где задачи ждут; worker - процесс, который их забирает и выполняет; result backend - хранилище результатов и статусов. Каждая часть может быть на своём сервере и отказать независимо."
  "tags":
  - "architecture"
- "id": "celery-architecture-02"
  "front": "Какая часть Celery обязательна, а какая опциональна?"
  "back": "Broker обязателен всегда - без него задачу некуда положить. Result backend опционален: он нужен, только если кому-то нужен результат или статус задачи."
  "tags":
  - "architecture"
- "id": "celery-architecture-03"
  "front": "Зачем в конфиге broker указан redis на /0, а backend на /1?"
  "back": "Это разные логические базы одного Redis, чтобы очередь задач и хранилище результатов не мешали друг другу. Broker и backend - разные хранилища с разной ролью, даже когда физически это один Redis."
  "tags":
  - "config"
- "id": "celery-architecture-04"
  "front": "Что произойдёт при add.delay(2, 3), если worker не запущен?"
  "back": "Вызов отработает без ошибки: задача ляжет в broker и будет там ждать. Поэтому «задача не выполняется» часто означает не баг в коде, а незапущенный или упавший worker."
  "tags":
  - "worker"
  - "pitfalls"
- "id": "celery-architecture-05"
  "front": "Чем отличаются result.ready() и result.get(timeout=5)?"
  "back": "ready() спрашивает backend, готов ли результат, и возвращает True/False не блокируя. get(timeout=5) блокирует выполнение и ждёт результат до пяти секунд, иначе бросает исключение по таймауту."
  "tags":
  - "api"
- "id": "celery-architecture-06"
  "front": "Почему нельзя звать result.get() прямо в HTTP-обработчике?"
  "back": "Он блокирует запрос на время выполнения задачи и сводит на нет весь смысл фона - Вы снова ждёте, ровно от чего уходили. Если результат нужен в ответе, возможно, эту работу не стоило выносить в фон."
  "tags":
  - "pitfalls"
- "id": "celery-architecture-07"
  "front": "Чем broker отличается от result backend по модели доступа?"
  "back": "Broker оптимизирован под «принять сообщение и быстро отдать одному получателю». Backend - под «сохранить значение по ключу и отдать по task id любому, кто спросит». Это разные модели, поэтому Celery держит их раздельно."
  "tags":
  - "architecture"
- "id": "celery-architecture-08"
  "front": "Почему хранить результат каждой задачи по умолчанию дорого?"
  "back": "Celery по умолчанию пишет в backend статус и результат каждой задачи, и на больших объёмах backend превращается в постоянно растущую свалку. Для задач без нужного результата backend выключают или ставят ignore_result=True."
  "tags":
  - "pitfalls"
- "id": "celery-architecture-09"
  "front": "Откуда берётся ошибка unregistered task?"
  "back": "Producer ставит задачу по имени-строке, worker ищет у себя функцию с этим именем. Если задачу добавили и передеплоили producer, но забыли перезапустить worker, он не знает такой задачи и падает. Код задач должен быть одинаков с обеих сторон."
  "tags":
  - "pitfalls"
  - "worker"
- "id": "celery-architecture-10"
  "front": "Что такое prefork-пул и почему worker - это не один процесс?"
  "back": "Команда worker поднимает главный процесс-координатор и пул дочерних исполнителей (по умолчанию prefork по числу ядер). Координатор общается с брокером и раздаёт задачи; пул из четырёх процессов выполняет до четырёх задач параллельно."
  "tags":
  - "worker"
