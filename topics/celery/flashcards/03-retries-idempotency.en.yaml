conceptId: retries-idempotency
cards:
  - id: retries-idempotency-01
    front: "Does Celery guarantee exactly-once or at-least-once delivery?"
    back: "At-least-once. Task runs at least once but may run twice or more. Exactly-once is not achievable by default in distributed systems."
    tags: [delivery]
  - id: retries-idempotency-02
    front: "Why can a task repeat though code is correct? What is ack?"
    back: "Ack is worker telling broker the task is done. Worker acks only when finished. Crash before ack means broker redelivers - broker sees ack, not what happened inside the task."
    tags: [delivery, ack]
  - id: retries-idempotency-04
    front: "Why bind=True and how does self.retry work?"
    back: "bind=True passes task object as self. self.retry(exc=..., countdown=10) re-enqueues with delay and raises to stop current attempt. max_retries caps attempts."
    tags: [retry, api]
  - id: retries-idempotency-05
    front: "Which errors to retry with self.retry and which not?"
    back: "Retry temporary failures: timeout, 503, network drop. Do not retry ValueError from bad data - same inputs, same failure, queue clog."
    tags: [retry, pitfalls]
  - id: retries-idempotency-06
    front: "What is exponential backoff for retries?"
    back: "Growing delay between retries. Hammering a down server every second keeps it down. Enable with retry_backoff=True and retry_jitter=True."
    tags: [retry]
  - id: retries-idempotency-07
    front: "What is an idempotent task?"
    back: "Repeat with same arguments leaves same system state as one run. One or five executions - same outcome. Correctness requirement, not optional."
    tags: [idempotency]
  - id: retries-idempotency-08
    front: "Why not generate the idempotency key inside the task?"
    back: "New uuid4 each run means repeat gets new key and deduplication fails. Key must come from producer arguments and stay stable across repeats."
    tags: [idempotency, pitfalls]
  - id: retries-idempotency-09
    front: "What three patterns make a task idempotent?"
    back: "Unique operation key (DB unique constraint), state check before acting (order.status flag), natural overwrite (set status done or PUT by key)."
    tags: [idempotency]
  - id: retries-idempotency-10
    front: "Why must every external effect be idempotent, not only the last?"
    back: "Task may do first effect, fail before second, and repeat. Protect only last step and first effect runs twice. Guard every external effect."
    tags: [idempotency, pitfalls]
  - id: retries-idempotency-11
    front: "What does acks_late=True do and why pair with idempotency?"
    back: "Default early ack loses task if worker dies mid-run. acks_late moves ack after completion - no loss but possible duplicate on crash near end. Late ack = do not lose; idempotency = survive duplicate."
    tags: [ack]
