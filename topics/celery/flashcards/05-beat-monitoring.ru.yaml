conceptId: beat-monitoring
cards:
  - id: beat-monitoring-01
    front: "Что такое Celery Beat и что он делает?"
    back: "Beat это отдельный процесс-планировщик: по расписанию он кладёт периодические задачи в тот же broker, откуда их забирают worker'ы. Сам задачи он не выполняет, это producer, которого будит таймер, а не HTTP-запрос."
    tags: [beat, scheduling]
  - id: beat-monitoring-02
    front: "Почему Beat должен быть ровно один на кластер?"
    back: "Beat не выбирает лидера и не делит расписание с другими Beat. Два Beat независимо отработают всё расписание, и каждая периодическая задача уедет в очередь дважды. Для неидемпотентных задач это прямой ущерб, а не отказоустойчивость."
    tags: [beat, ops]
  - id: beat-monitoring-03
    front: "Как сделать Beat отказоустойчивым и чем опасен режим -B?"
    back: "Простое решение: один Beat как отдельный процесс, а масштабировать worker'ов. Для HA берут планировщик с внешней блокировкой (RedBeat: расписание и lock в Redis, дежурит один Beat). Режим -B (Beat внутри worker) удобен локально, но в проде чаще всего и порождает несколько планировщиков."
    tags: [beat, ops]
  - id: beat-monitoring-04
    front: "Какие три формы принимает поле schedule в beat_schedule?"
    back: "Число это интервал в секундах (30.0 значит каждые 30 секунд). timedelta делает то же нагляднее. crontab привязывает к календарю: crontab(minute=0, hour=3) каждый день в 3:00, crontab(minute='*/15') каждые 15 минут."
    tags: [scheduling]
  - id: beat-monitoring-05
    front: "Что такое jitter и зачем он нужен периодическим задачам?"
    back: "Разброс старта во времени. Если задача в 3:00 веером ставит тысячи под-задач, все они падают в очередь разом. countdown=random.uniform(0, 300) размазывает их по окну. На повторах retry_jitter=True и retry_backoff=True спасают от thundering herd, когда упавшие задачи ломятся назад одним залпом."
    tags: [scheduling, ops]
  - id: beat-monitoring-06
    front: "Какие бывают состояния задачи и почему STARTED часто не видно?"
    back: "PENDING, STARTED, SUCCESS, RETRY, FAILURE, REVOKED. По умолчанию Celery не отмечает момент взятия задачи в работу, поэтому STARTED появляется только при task_track_started=True, иначе задача прыгает из PENDING сразу в SUCCESS или FAILURE."
    tags: [monitoring, states]
  - id: beat-monitoring-07
    front: "Что показывают celery inspect active, reserved и scheduled?"
    back: "active это задачи, выполняемые прямо сейчас. reserved это prefetch-буфер: задачи, забранные из брокера про запас, но ещё не начатые. scheduled это задачи с отложенным eta или countdown, а не расписание Beat. Путать scheduled с beat_schedule частая ошибка."
    tags: [monitoring, inspect]
  - id: beat-monitoring-08
    front: "Почему reserved (prefetch) прячет backlog очереди?"
    back: "Prefetch снимает задачи с брокера в локальный буфер worker'а ещё до выполнения. Длина очереди в брокере недосчитывает их ровно на число prefetch'нутых задач. Управляет этим worker_prefetch_multiplier; для длинных задач его снижают до 1."
    tags: [monitoring, inspect]
  - id: beat-monitoring-09
    front: "Что показывает Flower и чем он опасен наружу?"
    back: "Flower это дашборд поверх событий и inspect: задачи, worker'ы, очереди, графики, а также аргументы и результаты задач, плюс управление (revoke, rate limit, выключение worker). По умолчанию у него нет аутентификации, поэтому в интернете он утекает аргументы задач и даёт аноним пульт управления. Держите за auth и в приватной сети."
    tags: [monitoring, flower]
  - id: beat-monitoring-10
    front: "По каким метрикам судят о здоровье очереди задач?"
    back: "Глубина очереди (устойчивый рост значит producer'ы обгоняют worker'ов), латентность задачи (ожидание в очереди плюс выполнение), доля ретраев (скачок это ранний сигнал сбоя зависимости или плохого релиза). Отдельно celery inspect ping проверяет, живы ли сами worker'ы."
    tags: [monitoring, metrics]
