conceptId: patterns-pitfalls
cards:
  - id: patterns-pitfalls-01
    front: "What is canvas in Celery?"
    back: "Built-in language for composing tasks: chain (sequential), group (parallel), chord (group plus callback) instead of nested manual delay() calls."
    tags: [canvas]
  - id: patterns-pitfalls-02
    front: "What is a signature and what does .s() do?"
    back: "Signature is a canvas brick: task with fixed partial args (add.s(2)). .s() creates signature without executing. Chain, group, chord compose from signatures."
    tags: [canvas]
  - id: patterns-pitfalls-03
    front: "How does chain differ from group?"
    back: "Chain runs tasks in order, passing each result to the next. Group runs tasks in parallel, independently, with no result collection - a fan-out."
    tags: [canvas]
  - id: patterns-pitfalls-04
    front: "What happens in chain if a step fails?"
    back: "By default later steps do not run - chain breaks. Each result feeds the next, so later steps use .s() without first arg supplied by previous step."
    tags: [canvas]
  - id: patterns-pitfalls-05
    front: "What is chord and how does it differ from group?"
    back: "Chord runs a group then a final callback over collected results when the whole group finishes. Group alone does not wait or summarize."
    tags: [canvas]
  - id: patterns-pitfalls-06
    front: "Why does chord need result backend but chain and group may not?"
    back: "Chord must know when the group finished and collect results via backend counter. Chain and group without callback need no result store."
    tags: [canvas, backend]
  - id: patterns-pitfalls-07
    front: "Why is process_image.delay(huge_image_bytes) bad?"
    back: "Arguments serialize whole through broker. Entire image bloats messages and clogs queue. Pass image_id; task loads from storage."
    tags: [pitfalls]
  - id: patterns-pitfalls-08
    front: "Why can a task run before the DB transaction commits?"
    back: "Worker grabs task in milliseconds before producer commits. Task reads DB, misses uncommitted row, fails. Fix: enqueue after commit (Django transaction.on_commit)."
    tags: [pitfalls]
  - id: patterns-pitfalls-09
    front: "Why is in-memory state not shared between tasks?"
    back: "Workers use a process pool. Global variable or cache in one process is invisible to another. Shared state belongs in database or Redis."
    tags: [pitfalls]
  - id: patterns-pitfalls-10
    front: "How does queue overflow show up?"
    back: "Tasks enqueue faster than workers dequeue - queue grows with no errors, everything runs later. Looks like Celery is slow. Fix: more workers, split queues, throttle enqueue."
    tags: [pitfalls, scaling]
