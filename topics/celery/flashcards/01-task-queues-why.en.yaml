conceptId: task-queues-why
cards:
  - id: task-queues-why-01
    front: "Why move work out of an HTTP handler into a background task?"
    back: "HTTP must answer quickly; some work is slow or unreliable (email, PDF, external API). A queue decouples whoever creates work from whoever runs it so the response does not wait on slow operations."
    tags: [basics, queues]
  - id: task-queues-why-02
    front: "Who are producer and consumer in a task queue?"
    back: "Producer (web handler) describes work as a message, enqueues it, and responds immediately. Consumer (Celery worker) pulls messages and runs them at its own pace. Roles, not separate programs."
    tags: [basics]
  - id: task-queues-why-03
    front: "What does send_welcome_email.delay(email) actually do?"
    back: "It does not send email. It serializes task name and arguments into a message, enqueues it, and returns in milliseconds. A worker sends email later."
    tags: [api]
  - id: task-queues-why-04
    front: "What work belongs in background vs the handler?"
    back: "Ask whether the result is needed in the HTTP response. If yes, keep it in the handler. If the response does not depend on it (email, file generation, external API), offload to background."
    tags: [design]
  - id: task-queues-why-05
    front: "Why is a broker queue more reliable than threading.Thread in the web process?"
    back: "A thread dies with its process (deploy, restart, OOM). A broker message survives restarts of web server and worker until acknowledged."
    tags: [reliability]
  - id: task-queues-why-06
    front: "Why does a successful response no longer mean work is done?"
    back: "With queues, 200 OK means only task accepted. Work may not have started, may fail, or hang. Track important operations separately."
    tags: [pitfalls]
  - id: task-queues-why-07
    front: "What downsides do queues add vs synchronous code?"
    back: "Delay instead of instant (queue can grow under load), and harder to tell the user about errors - tasks fail after 200 OK, so errors need separate delivery."
    tags: [tradeoffs]
  - id: task-queues-why-08
    front: "Why pass user.id to a task instead of the ORM object?"
    back: "Arguments serialize and travel through the broker. Whole objects or large files are expensive and fragile. Pass an id; the task loads the object itself."
    tags: [pitfalls]
  - id: task-queues-why-09
    front: "Why use dedicated brokers (Redis, RabbitMQ) instead of a tasks table in your DB?"
    back: "A table works at small scale but needs row locks and polling that loads the database. Brokers are built for deliver-to-one-recipient with push delivery and scale to thousands per second."
    tags: [broker]
