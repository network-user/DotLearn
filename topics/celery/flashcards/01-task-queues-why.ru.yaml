"conceptId": "task-queues-why"
"cards":
- "id": "task-queues-why-01"
  "front": "Зачем выносить работу из HTTP-обработчика в фоновую задачу?"
  "back": "HTTP-запрос обязан отвечать быстро, а часть работы медленная или ненадёжная (письмо, PDF, внешний API). Очередь развязывает во времени того, кто создаёт работу, и того, кто её выполняет, чтобы ответ не ждал медленную операцию."
  "tags":
  - "basics"
  - "queues"
- "id": "task-queues-why-02"
  "front": "Кто такие producer и consumer в очереди задач?"
  "back": "Producer (веб-обработчик) описывает работу как сообщение и кладёт его в очередь, сразу отвечая пользователю. Consumer (в Celery - worker) в своём темпе достаёт сообщения и выполняет их. Это роли, а не отдельные программы."
  "tags":
  - "basics"
- "id": "task-queues-why-03"
  "front": "Что на самом деле делает вызов send_welcome_email.delay(email)?"
  "back": "Он не отправляет письмо. Он сериализует имя задачи и аргументы в сообщение, кладёт его в очередь и возвращает управление за миллисекунды. Само письмо отправит worker позже."
  "tags":
  - "api"
- "id": "task-queues-why-04"
  "front": "Какую работу стоит выносить в фон, а какую оставлять в обработчике?"
  "back": "Граница - по вопросу «нужен ли результат прямо в HTTP-ответе». Если результат нужен в ответе, оставляйте в обработчике. Если ответ от работы не зависит (письмо, генерация файла, вызов внешнего API) - выносите в фон."
  "tags":
  - "design"
- "id": "task-queues-why-05"
  "front": "Чем фоновая задача через брокер надёжнее, чем threading.Thread в веб-процессе?"
  "back": "Поток живёт внутри процесса: упал процесс (деплой, перезапуск, OOM) - потерялись все незавершённые задачи. Сообщение в брокере переживает перезапуск и веб-сервера, и worker - оно лежит в хранилище, пока его не заберут и не подтвердят."
  "tags":
  - "reliability"
- "id": "task-queues-why-06"
  "front": "Почему «успешный ответ» больше не значит «работа выполнена»?"
  "back": "При переходе на очереди 200 OK означает лишь «задача принята в очередь». Сама работа могла ещё не начаться, начаться и упасть или зависнуть. Статус важных операций надо отслеживать отдельно."
  "tags":
  - "pitfalls"
- "id": "task-queues-why-07"
  "front": "Какие минусы приносит очередь по сравнению с синхронным кодом?"
  "back": "Появляется задержка вместо мгновенности (при всплеске очередь растёт), и сложнее сообщить пользователю об ошибке - задача падает уже после ответа 200 OK, поэтому ошибку приходится доносить постфактум отдельно."
  "tags":
  - "tradeoffs"
- "id": "task-queues-why-08"
  "front": "Почему в задачу передают user.id, а не сам ORM-объект?"
  "back": "Аргументы задачи сериализуются и едут через брокер. Передавать целый объект или большой файл дорого и хрупко. Передавайте идентификатор, а сам объект задача загрузит сама."
  "tags":
  - "pitfalls"
- "id": "task-queues-why-09"
  "front": "Зачем специализированные брокеры (Redis, RabbitMQ), если можно завести таблицу tasks в своей БД?"
  "back": "Таблица работает на малых нагрузках, но на масштабе нужны блокировки строк, а постоянный опрос грузит базу. Брокеры спроектированы под «отдать сообщение ровно одному получателю»: доставляют по подписке без опроса и масштабируются на тысячи сообщений в секунду."
  "tags":
  - "broker"
