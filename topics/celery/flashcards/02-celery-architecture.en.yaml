conceptId: celery-architecture
cards:
  - id: celery-architecture-01
    front: "What three parts make up a working Celery system?"
    back: "Broker - queue where tasks wait; worker - process that runs them; result backend - store for results and status. Each can be on its own server and fail independently."
    tags: [architecture]
  - id: celery-architecture-02
    front: "Which Celery part is required and which is optional?"
    back: "Broker always required - nowhere to put tasks without it. Result backend optional - only if someone needs result or status."
    tags: [architecture]
  - id: celery-architecture-03
    front: "Why broker redis /0 and backend redis /1 in config?"
    back: "Different logical Redis databases so task queue and result store do not interfere. Broker and backend are different roles even on one Redis."
    tags: [config]
  - id: celery-architecture-04
    front: "What happens on add.delay(2, 3) if no worker is running?"
    back: "Call succeeds without error; task sits in broker and waits. Task not running often means worker not started or crashed, not a code bug."
    tags: [worker, pitfalls]
  - id: celery-architecture-05
    front: "How do result.ready() and result.get(timeout=5) differ?"
    back: "ready() asks backend if result is ready, returns True/False without blocking. get(timeout=5) blocks until result or timeout exception."
    tags: [api]
  - id: celery-architecture-06
    front: "Why not call result.get() in an HTTP handler?"
    back: "It blocks until the worker finishes - synchronous wait again, defeating the purpose of background work. If result is needed in the response, maybe do not background it."
    tags: [pitfalls]
  - id: celery-architecture-07
    front: "How do broker and result backend differ in access model?"
    back: "Broker: accept message, deliver to one worker quickly. Backend: store by key, return by task id to anyone who asks. Different models, kept separate."
    tags: [architecture]
  - id: celery-architecture-08
    front: "Why is storing every task result expensive by default?"
    back: "Celery writes status and result for every task; at volume backend becomes a growing pile. For unneeded results disable backend or set ignore_result=True."
    tags: [pitfalls]
  - id: celery-architecture-09
    front: "Where does unregistered task come from?"
    back: "Producer enqueues by string name; worker looks up that function locally. New task deployed to producer but worker not restarted - worker does not know the name. Code must match both sides."
    tags: [pitfalls, worker]
  - id: celery-architecture-10
    front: "What is prefork pool and why is worker not one process?"
    back: "Worker starts a coordinator plus child executors (default prefork per CPU). Coordinator talks to broker; pool of four runs up to four tasks in parallel."
    tags: [worker]
