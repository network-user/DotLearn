conceptId: abstractions
cards:
  - id: abstractions-01
    front: "What is an abstraction in this concept?"
    back: "A contract without implementation: a set of methods with known names and signatures that high-level code depends on instead of a concrete class."
    tags: [definition]
  - id: abstractions-02
    front: "How does the 'socket and plug' metaphor help understand abstraction?"
    back: "The socket defines the shape of the contact and does not know what gets plugged in. High-level code depends on contract shape, not a specific device, so implementations change without editing the consumer."
    tags: [mental-model]
  - id: abstractions-03
    front: "How does `abc.ABC` define a contract and when does it catch errors?"
    back: "Through explicit inheritance: a subclass must override each `@abstractmethod`. Checking happens at runtime on instance creation: `Cls()` raises TypeError if the contract is not fulfilled."
    tags: [abc]
  - id: abstractions-04
    front: "How does `typing.Protocol` define a contract?"
    back: "Structurally: any class with the required methods fits, no inheritance required. Checking is static (mypy/pyright): duck typing with type checking."
    tags: [protocol]
  - id: abstractions-05
    front: "ABC or Protocol: how to choose?"
    back: "ABC asks 'are you my subclass?': use when you own the hierarchy and want a hard runtime guarantee. Protocol asks 'can you do what I need?': use when fitting foreign or independent classes to a contract."
    tags: [comparison]
  - id: abstractions-06
    front: "Why is `isinstance` against ABC a weak guarantee?"
    back: "`Storage.register(SomeClass)` makes a class a virtual subclass, and `isinstance` returns True without checking for methods. register declares compatibility but does not fulfill the contract: relying on the method call itself is safer."
    tags: [pitfall]
  - id: abstractions-07
    front: "Does `Protocol` check shape at runtime?"
    back: "No, by default it is a static checking tool. `isinstance` fails unless the protocol is marked `@runtime_checkable`, and even then only method presence is checked, not signatures."
    tags: [pitfall]
  - id: abstractions-08
    front: "When does an abstraction pay off, and when is it unnecessary?"
    back: "It pays off with two or more implementations or when one must be swapped in tests. If a contract forever has one implementation, an interface is an extra layer."
    tags: [design]
  - id: abstractions-09
    front: "Can you put business logic in an abstract method?"
    back: "No. `@abstractmethod` declares shape, not behavior. Put shared logic in ordinary base methods; leave only extension points abstract."
    tags: [pitfall]
