conceptId: testing-with-di
cards:
  - id: testing-with-di-01
    front: "Почему DI делает код тестируемым?"
    back: "Зависимость приходит снаружи, поэтому тест подменяет её дублёром без правки самого класса - не нужно ни реально ходить в сеть, ни патчить внутренности."
    tags: [definition]
  - id: testing-with-di-02
    front: "Что меняется между продакшеном и тестом при тестировании через DI?"
    back: "Только реализация за контрактом: в бою `Mailer` - настоящий SMTP-клиент, в тесте - дублёр, записывающий вызовы. Сервис разницы не замечает, он зовёт `mailer.send(...)` как всегда."
    tags: [mental-model]
  - id: testing-with-di-03
    front: "Что такое stub (заглушка)?"
    back: "Дублёр, который возвращает заранее заданный ответ и больше ничего. Его задача - не мешать и не лезть в сеть; он не проверяет, как его вызывали."
    tags: [test-double]
  - id: testing-with-di-04
    front: "Что такое spy (шпион)?"
    back: "Дублёр, который делает то же, что заглушка, но ещё записывает каждый вызов (например в список `sent`). После прогона тест проверяет, что сервис позвал зависимость с нужными аргументами."
    tags: [test-double]
  - id: testing-with-di-05
    front: "Что должен проверять хороший тест?"
    back: "Наблюдаемое поведение на границе контракта («сервис позвал send с этим адресом»), а не приватные внутренности, которые сломают тест при безобидном рефакторинге."
    tags: [best-practice]
  - id: testing-with-di-06
    front: "Как подменяют зависимости в обработчиках FastAPI?"
    back: "Через словарь `app.dependency_overrides[get_db] = fake_db`: каждый обработчик с `Depends(get_db)` получит результат `fake_db` без правки обработчиков."
    tags: [fastapi]
  - id: testing-with-di-07
    front: "Почему важно очищать `dependency_overrides` после теста?"
    back: "Иначе подмена протекает в следующие тесты и даёт ложные результаты, зависящие от порядка запуска. Очищают в teardown через `app.dependency_overrides.clear()`."
    tags: [pitfall]
  - id: testing-with-di-08
    front: "Чем опасен `MagicMock` без `spec`?"
    back: "Он молча проглатывает опечатку в имени метода: вызов `mailer.snd(...)` не падает, а делает вид, что метод есть. Настоящий объект упал бы с AttributeError. Лечится `MagicMock(spec=Mailer)`."
    tags: [pitfall]
  - id: testing-with-di-09
    front: "Когда выбирать mock, а когда ручной fake?"
    back: "Начинайте с простого ручного fake, когда зависимость нужна работающей. Mock берите, когда нужно зафиксировать сам факт и форму взаимодействия (`assert_called_once_with`). В обоих случаях ограничивайте дублёра контрактом."
    tags: [best-practice]
  - id: testing-with-di-10
    front: "Чем плохо мокать слишком глубоко?"
    back: "Чем больше и «умнее» mock-ов, тем меньше тест похож на реальность - в пределе он проверяет ваши же mock-и. Подменяйте зависимость на границе контракта, а не каждый внутренний вызов."
    tags: [pitfall]
