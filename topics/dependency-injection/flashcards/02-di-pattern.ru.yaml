conceptId: di-pattern
cards:
  - id: di-pattern-01
    front: "Что такое dependency injection одним предложением?"
    back: "Передача зависимости снаружи - через конструктор или аргумент - вместо её создания внутри класса."
    tags: [definition]
  - id: di-pattern-02
    front: "Какие две обязанности DI разносит?"
    back: "Создание зависимости и её использование. DI оставляет классу использование, а создание поднимает на уровень сборки приложения, к вызывающей стороне."
    tags: [mental-model]
  - id: di-pattern-03
    front: "Чем плох `self.mailer = SmtpMailer()` внутри конструктора?"
    back: "Класс намертво приклеен к конкретному типу: его нельзя прогнать в тесте без реальной отправки и нельзя сменить канал, не редактируя сам класс. Он берёт лишнюю ответственность - решает, откуда взять зависимость."
    tags: [anti-pattern]
  - id: di-pattern-04
    front: "Что такое инъекция через конструктор?"
    back: "Зависимость принимается параметром `__init__` и сохраняется в поле. Самый частый вид DI: зависимость видна в сигнатуре, а вызывающий решает, какой объект подсунуть."
    tags: [constructor-injection]
  - id: di-pattern-05
    front: "Что такое инверсия управления (IoC)?"
    back: "Принцип «зависимости приносят классу, а не класс идёт за ними». Класс декларирует потребность, а какой объект использовать - решает уровень выше. Голливудский принцип: «не звоните нам, мы позвоним вам»."
    tags: [ioc]
  - id: di-pattern-06
    front: "Как соотносятся DI и инверсия управления?"
    back: "DI - конкретная техника (передать объект через конструктор или аргумент), инверсия управления - принцип, который эта техника реализует."
    tags: [ioc]
  - id: di-pattern-07
    front: "Почему DI раскрывается в паре с абстракцией?"
    back: "Класс зависит не от конкретного типа, а от контракта (Protocol/ABC). Абстракция описывает форму, инъекция доставляет конкретную реализацию - и любая реализация подставляется без правок класса."
    tags: [abstraction]
  - id: di-pattern-08
    front: "Чем плох дефолт `self.mailer = mailer or SmtpMailer()`?"
    back: "Жёсткая связь возвращается через чёрный ход: дефолт снова привязывает класс к конкретному типу. Делайте зависимость обязательным аргументом или собирайте дефолты на уровне сборки приложения."
    tags: [pitfall]
  - id: di-pattern-09
    front: "Является ли получение зависимости из глобального singleton инъекцией?"
    back: "Нет. Связь по-прежнему спрятана внутри и не видна в сигнатуре. Инъекция в том и состоит, что зависимость явно входит снаружи."
    tags: [pitfall]
  - id: di-pattern-10
    front: "О чём говорит конструктор на семь зависимостей?"
    back: "Почти всегда о нарушении single responsibility - класс делает слишком много. Лечится разбиением класса, а не ослаблением DI; раздутый список зависимостей - это диагностика."
    tags: [design]
