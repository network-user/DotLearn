conceptId: abstractions
cards:
  - id: abstractions-01
    front: "Что такое абстракция в смысле этого концепта?"
    back: "Контракт без реализации - набор методов с известными именами и сигнатурами, от которого зависит высокоуровневый код вместо конкретного класса."
    tags: [definition]
  - id: abstractions-02
    front: "Чем «розетка и вилка» помогает понять абстракцию?"
    back: "Розетка задаёт форму контакта и не знает, что в неё включат. Высокоуровневый код зависит от формы контракта, а не от конкретного устройства, поэтому реализации меняются без правок потребителя."
    tags: [mental-model]
  - id: abstractions-03
    front: "Как `abc.ABC` задаёт контракт и когда ловит ошибку?"
    back: "Через явное наследование: подкласс обязан переопределить каждый `@abstractmethod`. Проверка происходит в рантайме при создании экземпляра - `Cls()` падает с TypeError, если контракт не выполнен."
    tags: [abc]
  - id: abstractions-04
    front: "Как `typing.Protocol` задаёт контракт?"
    back: "Структурно: подходит любой класс с нужными методами, наследоваться не требуется. Проверка статическая (mypy/pyright) - утиная типизация с проверкой типов."
    tags: [protocol]
  - id: abstractions-05
    front: "ABC или Protocol - как выбрать?"
    back: "ABC спрашивает «ты мой потомок?» - берут, когда владеете иерархией и хотите жёсткую гарантию в рантайме. Protocol спрашивает «ты умеешь нужное?» - берут, когда подгоняете под контракт чужие или независимые классы."
    tags: [comparison]
  - id: abstractions-06
    front: "Почему `isinstance` против ABC - слабая гарантия?"
    back: "`Storage.register(SomeClass)` делает класс виртуальным наследником, и `isinstance` вернёт True, не проверяя наличие методов. register обещает совместимость, но не выполняет контракт - надёжнее опираться на сам вызов метода."
    tags: [pitfall]
  - id: abstractions-07
    front: "Проверяет ли `Protocol` форму в рантайме?"
    back: "Нет, по умолчанию это инструмент статической проверки. `isinstance` упадёт, пока протокол не помечен `@runtime_checkable`, и даже тогда проверится лишь наличие методов, а не их сигнатуры."
    tags: [pitfall]
  - id: abstractions-08
    front: "Когда абстракция окупается, а когда лишняя?"
    back: "Окупается при двух и более реализациях или когда одну надо подменять в тестах. Если у контракта вечно одна реализация, интерфейс - лишний слой."
    tags: [design]
  - id: abstractions-09
    front: "Можно ли класть бизнес-логику в абстрактный метод?"
    back: "Нет. `@abstractmethod` объявляет форму, а не поведение. Общую логику выносят в обычные методы базового класса, абстрактными оставляют только точки расширения."
    tags: [pitfall]
