conceptId: di-pattern
cards:
  - id: di-pattern-01
    front: "What is dependency injection in one sentence?"
    back: "Passing a dependency from outside — through constructor or argument — instead of creating it inside the class."
    tags: [definition]
  - id: di-pattern-02
    front: "Which two responsibilities does DI separate?"
    back: "Creating a dependency and using it. DI leaves the class with use and moves creation to application assembly, to the caller."
    tags: [mental-model]
  - id: di-pattern-03
    front: "Why is `self.mailer = SmtpMailer()` inside the constructor bad?"
    back: "The class is glued to a concrete type: you cannot run it in a test without real sending or change the channel without editing the class. It takes extra responsibility — deciding where to get the dependency."
    tags: [anti-pattern]
  - id: di-pattern-04
    front: "What is constructor injection?"
    back: "The dependency is accepted as an `__init__` parameter and stored in a field. The most common form of DI: the dependency is visible in the signature, and the caller decides which object to plug in."
    tags: [constructor-injection]
  - id: di-pattern-05
    front: "What is inversion of control (IoC)?"
    back: "The principle 'dependencies are brought to the class, not fetched by it'. The class declares its need; which object to use is decided at a higher level. Hollywood principle: 'don't call us, we'll call you'."
    tags: [ioc]
  - id: di-pattern-06
    front: "How do DI and inversion of control relate?"
    back: "DI is the concrete technique (pass an object through constructor or argument); inversion of control is the principle that technique implements."
    tags: [ioc]
  - id: di-pattern-07
    front: "Why does DI shine together with abstraction?"
    back: "The class depends on a contract (Protocol/ABC), not a concrete type. Abstraction describes shape; injection delivers the concrete implementation — any implementation plugs in without editing the class."
    tags: [abstraction]
  - id: di-pattern-08
    front: "Why is default `self.mailer = mailer or SmtpMailer()` bad?"
    back: "Tight coupling returns through the back door: the default binds the class to a concrete type again. Make the dependency a required argument or assemble defaults at application composition level."
    tags: [pitfall]
  - id: di-pattern-09
    front: "Is getting a dependency from a global singleton injection?"
    back: "No. The link is still hidden inside and not visible in the signature. Injection means the dependency explicitly enters from outside."
    tags: [pitfall]
  - id: di-pattern-10
    front: "What does a seven-dependency constructor signal?"
    back: "Almost always broken single responsibility — the class does too much. Fix by splitting the class, not weakening DI; a bloated dependency list is a diagnosis."
    tags: [design]
