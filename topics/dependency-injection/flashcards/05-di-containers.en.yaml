conceptId: di-containers
cards:
  - id: di-containers-01
    front: "What does `Depends` lack to be a full DI container?"
    back: "Three things: app-scope (its cache lives one request, so a process-wide singleton is bolted on from the side), assembly by type (wiring: the graph is spelled out by hand), and a shared lifecycle (a yield dependency knows only about the request, not app startup/shutdown)."
    tags: [definition]
  - id: di-containers-02
    front: "What is a DI container and what does it take on?"
    back: "An object you register with how each dependency is built and how long it lives. Then you ask for the type you need, and the container unrolls the whole chain of subdependencies itself, creates the objects, and closes them in the right order."
    tags: [definition]
  - id: di-containers-03
    front: "What do `Scope.APP` and `Scope.REQUEST` set?"
    back: "An object's lifetime. Scope.APP creates the object once for the whole application (a singleton shared by all requests). Scope.REQUEST recreates it per request and caches it within that request. Scopes nest: the inner sees the outer."
    tags: [scope]
  - id: di-containers-04
    front: "What is a `Provider` in dishka, and where does the container get the type from?"
    back: "A class with factory methods under the `@provide` decorator. The provided type comes from the method's return annotation (`-> Pool`), and the container resolves the factory's parameters by type, plugging in the other dependencies."
    tags: [dishka]
  - id: di-containers-05
    front: "What does `make_async_container` (and `make_container`) do?"
    back: "Assembles the given providers into a container: `make_async_container` for an async application, `make_container` for a sync one. You ask this assembled container for dependencies by type."
    tags: [dishka]
  - id: di-containers-06
    front: "How do you plug a dishka container into FastAPI handlers?"
    back: "`setup_dishka(container, app)` installs middleware that opens a Scope.REQUEST per request. In a handler you mark a parameter `FromDishka[Service]`, and the `@inject` decorator fills it with an object from the container."
    tags: [fastapi]
  - id: di-containers-07
    front: "How does the dishka-Litestar integration differ from FastAPI?"
    back: "Almost not at all: the same `setup_dishka` and `FromDishka`, only the import line changes (`dishka.integrations.litestar`). Providers and the graph are portable because the container knows nothing about the framework."
    tags: [dishka]
  - id: di-containers-08
    front: "Why can an app-scoped object not depend on a request-scoped one?"
    back: "The app object outlives any request, and the request object is already closed by then: the reference would dangle. The inner scope sees the outer, not the reverse. dishka catches this and will not let you assemble such a graph."
    tags: [pitfall]
  - id: di-containers-09
    front: "How does the container close a resource tied to a scope?"
    back: "The factory is made a generator: code before `yield` runs on entering the scope, code after it runs on closing the scope. An app-scoped resource (pool) is closed on `container.close()`, not at the end of a request."
    tags: [dishka]
  - id: di-containers-10
    front: "What is a composition root?"
    back: "The single place at the application boundary (entry point, `create_app`) where you create providers, assemble the container, and connect it. The rest of the application depends only on contracts and knows nothing about the container: the seam of clean architecture."
    tags: [architecture]
