conceptId: testing-with-di
cards:
  - id: testing-with-di-01
    front: "Why does DI make code testable?"
    back: "The dependency comes from outside, so the test replaces it with a double without editing the class — no need to hit the network or patch internals."
    tags: [definition]
  - id: testing-with-di-02
    front: "What changes between production and test when testing through DI?"
    back: "Only the implementation behind the contract: in production `Mailer` is a real SMTP client; in a test it is a double that records calls. The service notices no difference — it calls `mailer.send(...)` as always."
    tags: [mental-model]
  - id: testing-with-di-03
    front: "What is a stub?"
    back: "A double that returns a preset answer and nothing more. Its job is to stay out of the way and not hit the network; it does not verify how it was called."
    tags: [test-double]
  - id: testing-with-di-04
    front: "What is a spy?"
    back: "A double that does what a stub does but also records every call (for example in list `sent`). After the run the test verifies the service called the dependency with the right arguments."
    tags: [test-double]
  - id: testing-with-di-05
    front: "What should a good test verify?"
    back: "Observable behavior at the contract boundary ('the service called send with this address'), not private internals that break the test on harmless refactoring."
    tags: [best-practice]
  - id: testing-with-di-06
    front: "How do you replace dependencies in FastAPI handlers?"
    back: "Via dict `app.dependency_overrides[get_db] = fake_db`: every handler with `Depends(get_db)` gets the result of `fake_db` without editing handlers."
    tags: [fastapi]
  - id: testing-with-di-07
    front: "Why must you clear `dependency_overrides` after a test?"
    back: "Otherwise the override leaks into later tests and gives false results depending on run order. Clear in teardown via `app.dependency_overrides.clear()`."
    tags: [pitfall]
  - id: testing-with-di-08
    front: "Why is `MagicMock` without `spec` dangerous?"
    back: "It silently swallows method name typos: calling `mailer.snd(...)` does not fail but acts as if the method exists. A real object would raise AttributeError. Fix with `MagicMock(spec=Mailer)`."
    tags: [pitfall]
  - id: testing-with-di-09
    front: "When to choose mock versus hand-written fake?"
    back: "Start with a simple hand-written fake when the dependency must work. Use mock when you need to record the fact and shape of interaction (`assert_called_once_with`). In both cases constrain the double to the contract."
    tags: [best-practice]
  - id: testing-with-di-10
    front: "Why is mocking too deeply bad?"
    back: "The more and 'smarter' the mocks, the less the test resembles reality — in the limit it verifies your mocks, not your code. Replace the dependency at the contract boundary, not every internal call."
    tags: [pitfall]
