conceptId: di-in-fastapi
cards:
  - id: di-in-fastapi-01
    front: "What does `Depends(f)` do in a FastAPI handler signature?"
    back: "Declares the parameter as the result of function `f`: before calling the handler FastAPI executes `f` and passes its result into this parameter."
    tags: [definition]
  - id: di-in-fastapi-02
    front: "How does `Depends(f)` differ from an ordinary handler argument?"
    back: "An ordinary argument comes from the request (path, query, body). `Depends(f)` makes the parameter the result of another function the framework runs for you."
    tags: [mental-model]
  - id: di-in-fastapi-03
    front: "How does FastAPI resolve nested dependencies?"
    back: "A dependency can depend on another through `Depends`. FastAPI orders graph computation automatically — bottom up — without manual `get_user(get_token(...))`."
    tags: [composition]
  - id: di-in-fastapi-04
    front: "How many times is one dependency computed within a request?"
    back: "Once by default: FastAPI caches the result by dependency function and reuses it. Two `Depends(get_db)` references yield the same object."
    tags: [caching]
  - id: di-in-fastapi-05
    front: "How do you disable dependency caching?"
    back: "Via `Depends(get_db, use_cache=False)` — then the dependency is computed anew, needed when two independent objects are required."
    tags: [caching]
  - id: di-in-fastapi-06
    front: "Does dependency cache survive between requests?"
    back: "No, the cache lives exactly one request. The next request starts fresh, so dependencies do not leak between requests from different users."
    tags: [caching]
  - id: di-in-fastapi-07
    front: "How does a dependency with `yield` behave?"
    back: "Like a context manager: code before `yield` runs on entry, code after (in `finally`) runs when the request completes, even if the handler failed. The handler receives the yielded value, not the generator."
    tags: [yield]
  - id: di-in-fastapi-08
    front: "Why must you not write `Depends(get_db())`?"
    back: "Pass the function itself to `Depends`, not the result of calling it. With parentheses `get_db` runs once at app startup and one result is frozen for all requests."
    tags: [pitfall]
  - id: di-in-fastapi-09
    front: "Why is `finally` needed in a yield dependency?"
    back: "So the resource closes even if the handler raises. Without `finally` the connection will not be released when the handler throws."
    tags: [pitfall]
  - id: di-in-fastapi-10
    front: "What does `app.dependency_overrides` do?"
    back: "A dict 'original dependency → replacement': after setting it FastAPI calls the second everywhere instead of the first, without touching handlers. Standard foundation for testing FastAPI."
    tags: [testing]
