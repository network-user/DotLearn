conceptId: di-containers
cards:
  - id: di-containers-01
    front: "Чего не хватает `Depends`, чтобы быть полноценным DI-контейнером?"
    back: "Трёх вещей: app-scope (кэш живёт один запрос, одиночку на процесс приходится городить в обход), сборки по типу (wiring: граф прописывают руками), общего жизненного цикла (yield-зависимость знает только про запрос, не про старт/стоп приложения)."
    tags: [definition]
  - id: di-containers-02
    front: "Что такое DI-контейнер и что он берёт на себя?"
    back: "Объект, которому вы регистрируете, как строится каждая зависимость и как долго она живёт. Дальше вы просите нужный тип, а контейнер сам разворачивает всю цепочку подзависимостей, создаёт объекты и закрывает их в правильном порядке."
    tags: [definition]
  - id: di-containers-03
    front: "Что задаёт `Scope.APP` и `Scope.REQUEST`?"
    back: "Время жизни объекта. Scope.APP создаёт объект один раз на всё приложение (одиночка, общий для всех запросов). Scope.REQUEST создаёт заново на каждый запрос и кэширует в его пределах. Scope вложены: внутренний видит внешний."
    tags: [scope]
  - id: di-containers-04
    front: "Что такое `Provider` в dishka и откуда контейнер берёт тип?"
    back: "Класс с методами-фабриками под декоратором `@provide`. Предоставляемый тип берётся из аннотации возврата метода (`-> Pool`), а параметры фабрики контейнер разрешает по типу, подставляя другие зависимости."
    tags: [dishka]
  - id: di-containers-05
    front: "Что делает `make_async_container` (и `make_container`)?"
    back: "Собирает переданные провайдеры в контейнер: `make_async_container` для async-приложения, `make_container` для синхронного. Именно у собранного контейнера потом просят зависимости по типу."
    tags: [dishka]
  - id: di-containers-06
    front: "Как подключить контейнер dishka к обработчикам FastAPI?"
    back: "`setup_dishka(container, app)` вешает middleware, которое на каждый запрос открывает Scope.REQUEST. В обработчике параметр помечают `FromDishka[Service]`, а декоратор `@inject` подставляет в него объект из контейнера."
    tags: [fastapi]
  - id: di-containers-07
    front: "Чем интеграция dishka с Litestar отличается от FastAPI?"
    back: "Почти ничем: те же `setup_dishka` и `FromDishka`, меняется только строка импорта (`dishka.integrations.litestar`). Провайдеры и граф переносимы, потому что контейнер ничего не знает про фреймворк."
    tags: [dishka]
  - id: di-containers-08
    front: "Почему app-scoped объект не может зависеть от request-scoped?"
    back: "App-объект переживает любой запрос, а request-объект к тому времени уже закрыт: ссылка повисла бы. Внутренний scope видит внешний, но не наоборот. dishka ловит это и не даёт собрать такой граф."
    tags: [pitfall]
  - id: di-containers-09
    front: "Как контейнер закрывает ресурс, привязанный к scope?"
    back: "Фабрику делают генератором: код до `yield` выполняется на входе в scope, код после - на его закрытии. App-scoped ресурс (пул) закрывается при `container.close()`, а не в конце запроса."
    tags: [dishka]
  - id: di-containers-10
    front: "Что такое composition root?"
    back: "Единственное место на границе приложения (точка входа, `create_app`), где создают провайдеры, собирают контейнер и подключают его. Всё остальное приложение зависит только от контрактов и о контейнере не знает - это шов чистой архитектуры."
    tags: [architecture]
