conceptId: di-in-fastapi
cards:
  - id: di-in-fastapi-01
    front: "Что делает `Depends(f)` в сигнатуре обработчика FastAPI?"
    back: "Объявляет параметр как результат функции `f`: перед вызовом обработчика FastAPI сам выполнит `f` и подставит её результат в этот параметр."
    tags: [definition]
  - id: di-in-fastapi-02
    front: "Чем `Depends(f)` отличается от обычного аргумента обработчика?"
    back: "Обычный аргумент FastAPI достаёт из запроса (путь, query, тело). `Depends(f)` делает параметр результатом другой функции, которую фреймворк выполнит за вас."
    tags: [mental-model]
  - id: di-in-fastapi-03
    front: "Как FastAPI разрешает вложенные зависимости?"
    back: "Зависимость сама может зависеть от другой через `Depends`. FastAPI выстраивает порядок вычисления графа автоматически - снизу вверх, не требуя ручного `get_user(get_token(...))`."
    tags: [composition]
  - id: di-in-fastapi-04
    front: "Сколько раз вычисляется одна зависимость в пределах запроса?"
    back: "По умолчанию один раз: FastAPI кэширует результат по функции-зависимости и переиспользует его. Две ссылки `Depends(get_db)` дают один и тот же объект."
    tags: [caching]
  - id: di-in-fastapi-05
    front: "Как отключить кэширование зависимости?"
    back: "Через `Depends(get_db, use_cache=False)` - тогда зависимость вычисляется заново, что нужно, когда требуются два независимых объекта."
    tags: [caching]
  - id: di-in-fastapi-06
    front: "Живёт ли кэш зависимости между запросами?"
    back: "Нет, кэш живёт ровно один запрос. Следующий запрос начинает с чистого листа, поэтому зависимости не протекают между запросами разных пользователей."
    tags: [caching]
  - id: di-in-fastapi-07
    front: "Как ведёт себя зависимость с `yield`?"
    back: "Как контекст: код до `yield` выполняется на входе, код после (в `finally`) - по завершении запроса, даже если обработчик упал. В обработчик попадает yielded-значение, а не генератор."
    tags: [yield]
  - id: di-in-fastapi-08
    front: "Почему нельзя писать `Depends(get_db())`?"
    back: "В `Depends` передают саму функцию, а не результат её вызова. С круглыми скобками `get_db` выполнится один раз при старте приложения и зафиксирует единственный результат на все запросы."
    tags: [pitfall]
  - id: di-in-fastapi-09
    front: "Зачем нужен `finally` в зависимости с `yield`?"
    back: "Чтобы ресурс гарантированно закрылся даже при исключении в обработчике. Без `finally` соединение не освободится, если обработчик бросит ошибку."
    tags: [pitfall]
  - id: di-in-fastapi-10
    front: "Что делает `app.dependency_overrides`?"
    back: "Это словарь «исходная зависимость → подменная»: после записи FastAPI везде вместо первой вызывает вторую, не трогая обработчики. Штатная основа тестирования FastAPI."
    tags: [testing]
