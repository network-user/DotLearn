exercises:
  - id: abc-what-is-001
    concept: abstractions
    type: theory-quiz
    difficulty: 1
    prompt: "Что описывает абстракция (контракт) в смысле этого концепта?"
    choices:
      - id: a
        text: "Набор методов с известными именами и сигнатурами без реализации - форму, под которую подстраиваются конкретные классы."
      - id: b
        text: "Готовый класс с полной реализацией, который сразу можно использовать."
      - id: c
        text: "Способ ускорить вызовы методов за счёт кэширования результатов."
      - id: d
        text: "Глобальную переменную, через которую все классы получают общий объект."
    correct: [a]
    explanation: "Абстракция - это контракт без реализации: форма контакта (методы и сигнатуры), от которой зависит высокоуровневый код вместо конкретного класса."
    variants:
      - prompt: "Зачем высокоуровневому коду зависеть от абстракции, а не от конкретного класса?"
        choices:
          - id: a
            text: "Чтобы любую подходящую под контракт реализацию можно было подставить без правок этого кода."
          - id: b
            text: "Чтобы код работал быстрее за счёт пропуска проверок типов."
          - id: c
            text: "Чтобы запретить создавать больше одной реализации контракта."
          - id: d
            text: "Чтобы конкретные классы не могли иметь собственных методов."
        correct: [a]
        explanation: "Контракт задаёт форму; любая реализация с подходящей формой подключается без правок потребителя - в этом и польза зависимости от абстракции."
      - prompt: "С чем в ментальной модели концепта сравнивается абстракция?"
        choices:
          - id: a
            text: "С розеткой: она задаёт форму контакта, а какое устройство подключат - не её забота."
          - id: b
            text: "С проводом, который жёстко соединяет два конкретных устройства."
          - id: c
            text: "С батарейкой, которая сама является источником поведения."
          - id: d
            text: "С предохранителем, который отключает несовместимые классы."
        correct: [a]
        explanation: "Розетка задаёт форму контакта; любое устройство подходящей формы работает, а код-потребитель написан один раз и не меняется при смене устройства."

  - id: abc-vs-protocol-001
    concept: abstractions
    type: theory-quiz
    difficulty: 2
    prompt: "Чем `typing.Protocol` отличается от `abc.ABC` при описании контракта?"
    choices:
      - id: a
        text: "Protocol проверяет форму (набор методов) структурно, наследоваться не требуется; ABC требует явного наследования и проверяет контракт в рантайме."
      - id: b
        text: "Protocol требует явного наследования, а ABC проверяет только форму."
      - id: c
        text: "Они идентичны, разница лишь в имени импорта."
      - id: d
        text: "Protocol работает только с функциями, ABC - только с классами."
    correct: [a]
    explanation: "ABC спрашивает «ты мой потомок?» и проверяет это при создании экземпляра. Protocol спрашивает «ты умеешь нужные методы?» - совпадение формы, проверяемое статически, без наследования."
    variants:
      - prompt: "В какой ситуации `typing.Protocol` удобнее, чем `abc.ABC`?"
        choices:
          - id: a
            text: "Когда нужно подогнать под контракт чужой или независимый класс, который нельзя заставить наследоваться."
          - id: b
            text: "Когда нужно гарантированно запретить создание экземпляра в рантайме."
          - id: c
            text: "Когда контракт всегда имеет ровно одну реализацию."
          - id: d
            text: "Когда требуется, чтобы реализация явно знала про контракт."
        correct: [a]
        explanation: "Protocol проверяет форму, а не родословную, поэтому подходит для классов из чужих библиотек, которым нельзя дописать наследование от вашего контракта."
      - prompt: "Какое утверждение про `abc.ABC` верно?"
        choices:
          - id: a
            text: "Создать экземпляр класса с нереализованным @abstractmethod нельзя - Python падает с TypeError при вызове конструктора."
          - id: b
            text: "Абстрактный класс можно инстанцировать, ошибка возникнет только при первом вызове метода."
          - id: c
            text: "@abstractmethod обязан содержать готовую бизнес-логику."
          - id: d
            text: "Подкласс не обязан переопределять абстрактные методы."
        correct: [a]
        explanation: "ABCMeta блокирует создание экземпляра, пока остались нереализованные абстрактные методы; ошибка приходит рано, в точке создания объекта."

  - id: abc-instantiate-predict-001
    concept: abstractions
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      from abc import ABC, abstractmethod

      class Storage(ABC):
          @abstractmethod
          def save(self, data): ...

      class FileStorage(Storage):
          def save(self, data):
              self.last = data

      fs = FileStorage()
      fs.save("отчёт")
      print(fs.last)
    expected:
      kind: stdout
      value: "отчёт"
    hints:
      - "FileStorage переопределил единственный абстрактный метод - значит, контракт выполнен. Что произойдёт при создании экземпляра и при вызове save?"
    variants:
      - snippet: |
          from abc import ABC, abstractmethod

          class Storage(ABC):
              @abstractmethod
              def save(self, data): ...

          class MemoryStorage(Storage):
              def __init__(self):
                  self.items = []
              def save(self, data):
                  self.items.append(data)

          m = MemoryStorage()
          m.save("a")
          m.save("b")
          print(m.items)
        expected:
          kind: stdout
          value: "['a', 'b']"
      - snippet: |
          from abc import ABC, abstractmethod

          class Channel(ABC):
              @abstractmethod
              def send(self, text): ...

          class ConsoleChannel(Channel):
              def send(self, text):
                  print("console:", text)

          ConsoleChannel().send("привет")
        expected:
          kind: stdout
          value: "console: привет"

  - id: abc-register-predict-001
    concept: abstractions
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      from abc import ABC, abstractmethod

      class Storage(ABC):
          @abstractmethod
          def save(self, data): ...

      class Sneaky:
          pass

      Storage.register(Sneaky)
      print(isinstance(Sneaky(), Storage))
    expected:
      kind: stdout
      value: "True"
    hints:
      - "register объявляет класс «виртуальным наследником» ABC. Что именно при этом проверяется - наличие метода save или просто факт регистрации?"
      - "isinstance против ABC отвечает на вопрос «класс объявил себя совместимым?», а не «класс реально умеет всё нужное?». Метода save у Sneaky нет, но проверялся ли он?"

  - id: abc-broken-predict-001
    concept: abstractions
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      from abc import ABC, abstractmethod

      class Storage(ABC):
          @abstractmethod
          def save(self, data): ...

      class Broken(Storage):
          pass

      try:
          Broken()
      except TypeError:
          print("нельзя создать")
    expected:
      kind: stdout
      value: "нельзя создать"
    hints:
      - "Broken заявил себя как Storage, но не реализовал save. В какой момент Python это заметит - при объявлении класса, при создании объекта или при первом вызове save?"
      - "ABCMeta блокирует именно создание экземпляра, пока остались нереализованные абстрактные методы. Значит, конструктор бросит TypeError, и его поймает except."

  - id: abc-fill-contract-001
    concept: abstractions
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите объявление абстрактного контракта `Storage` с обязательным методом `save`."
    template: |
      from abc import ABC, {{decorator}}

      class Storage(ABC):
          @{{decorator}}
          def save(self, data) -> None:
              ...
    blanks:
      decorator:
        accept: ["abstractmethod"]
    hints:
      - "Контракт описывает форму, а не поведение: метод объявлен, но обязан быть переопределён в подклассе. Какой декоратор делает метод обязательным?"
    variants:
      - prompt: "Допишите класс `FileStorage`, который реализует контракт `Storage` и наследуется от него явно."
        template: |
          class FileStorage({{base}}):
              def {{method}}(self, data) -> None:
                  self.last = data
        blanks:
          base:
            accept: ["Storage"]
          method:
            accept: ["save"]
      - prompt: "Допишите структурный контракт `Mailer` через typing."
        template: |
          from typing import {{proto}}

          class Mailer({{proto}}):
              def send(self, to: str, text: str) -> None:
                  ...
        blanks:
          proto:
            accept: ["Protocol"]

  - id: abc-implements-protocol-001
    concept: abstractions
    type: python-function
    difficulty: 2
    prompt: "Реализуйте `class MemoryStorage` с методом `save(data)`, который накапливает переданные значения в список `self.items`, и методом `count()`, возвращающим число сохранённых элементов."
    starter: |
      class MemoryStorage:
          def __init__(self):
              ...
          def save(self, data):
              ...
          def count(self):
              ...
    cases:
      - call: "(lambda s: (s.save('a'), s.save('b'), s.count())[-1])(MemoryStorage())"
        expect: 2
      - call: "MemoryStorage().count()"
        expect: 0
      - call: "(lambda s: (s.save('x'), s.items)[-1])(MemoryStorage())"
        expect: ["x"]
    hints:
      - "MemoryStorage - конкретная реализация контракта хранилища. Что нужно завести в __init__, чтобы save было куда складывать данные?"
      - "save добавляет один элемент в список, count возвращает его длину. Состояние храните в self.items."
    solution: |
      class MemoryStorage:
          def __init__(self):
              self.items = []
          def save(self, data):
              self.items.append(data)
          def count(self):
              return len(self.items)
    variants:
      - prompt: "Реализуйте `class CountingStorage` с методом `save(data)`, который ничего не хранит, а лишь увеличивает счётчик `self.saved` на единицу, и методом `count()`, возвращающим текущее значение счётчика."
        cases:
          - call: "(lambda s: (s.save('a'), s.save('b'), s.save('c'), s.count())[-1])(CountingStorage())"
            expect: 3
          - call: "CountingStorage().count()"
            expect: 0
          - call: "(lambda s: (s.save('x'), s.saved)[-1])(CountingStorage())"
            expect: 1
        solution: |
          class CountingStorage:
              def __init__(self):
                  self.saved = 0
              def save(self, data):
                  self.saved += 1
              def count(self):
                  return self.saved
      - prompt: "Реализуйте `class LastStorage` с методом `save(data)`, который запоминает только последнее сохранённое значение в `self.last`, и методом `count()`, возвращающим 1, если хоть что-то сохраняли, иначе 0."
        starter: |
          class LastStorage:
              def __init__(self):
                  ...
              def save(self, data):
                  ...
              def count(self):
                  ...
        cases:
          - call: "(lambda s: (s.save('a'), s.save('b'), s.last)[-1])(LastStorage())"
            expect: "b"
          - call: "LastStorage().count()"
            expect: 0
          - call: "(lambda s: (s.save('x'), s.count())[-1])(LastStorage())"
            expect: 1
        solution: |
          class LastStorage:
              def __init__(self):
                  self.last = None
                  self._has = False
              def save(self, data):
                  self.last = data
                  self._has = True
              def count(self):
                  return 1 if self._has else 0

  - id: abc-duck-consumer-001
    concept: abstractions
    type: python-function
    difficulty: 4
    prompt: "Реализуйте `make_backup(storage, data)`: вызовите у переданного `storage` метод `save(data)` и верните `data`. Функция не должна знать конкретный тип storage - подойдёт любой объект с методом `save`. Это потребитель, зависящий только от формы контракта."
    starter: |
      def make_backup(storage, data):
          ...
    cases:
      - call: "make_backup(type('S', (), {'saved': None, 'save': lambda self, d: setattr(self, 'saved', d)})(), 'отчёт')"
        expect: "отчёт"
      - call: "(lambda box: (make_backup(type('S', (), {'save': lambda self, d: box.append(d)})(), 'x'), box)[-1])([])"
        expect: ["x"]
      - call: "make_backup(type('S', (), {'save': lambda self, d: None})(), 42)"
        expect: 42
    hints:
      - "Потребитель зависит от формы контракта, а не от родословной: тип storage его не интересует, важно лишь наличие нужного метода. Никаких isinstance и проверок типа здесь быть не должно."
      - "У функции две обязанности в строгом порядке: сначала побочный эффект (сохранение через зависимость), потом результат. Что из них должно стать возвращаемым значением?"
    solution: |
      def make_backup(storage, data):
          storage.save(data)
          return data
