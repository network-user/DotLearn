exercises:
  - id: test-why-di-001
    concept: testing-with-di
    type: theory-quiz
    difficulty: 1
    prompt: "Почему DI делает класс легко тестируемым?"
    choices:
      - id: a
        text: "Зависимость приходит снаружи, поэтому тест подставляет дублёра без правки самого класса."
      - id: b
        text: "DI автоматически генерирует тесты для каждого метода класса."
      - id: c
        text: "DI отключает реальную отправку писем во всех окружениях."
      - id: d
        text: "DI ускоряет выполнение тестов за счёт кэширования результатов."
    correct: [a]
    explanation: "Когда зависимость внедряется снаружи, тест передаёт поддельную реализацию через конструктор и проверяет поведение, не трогая код класса и не патча его внутренности."
    variants:
      - prompt: "Что проверяет хороший тест на правильно спроектированном (через DI) коде?"
        choices:
          - id: a
            text: "Наблюдаемое поведение на границе контракта - например, что сервис позвал send с нужным адресом."
          - id: b
            text: "Приватные внутренние атрибуты, например что внутри присвоилось self._flag = True."
          - id: c
            text: "Скорость работы сети при реальной отправке письма."
          - id: d
            text: "Что класс не содержит ни одного приватного метода."
        correct: [a]
        explanation: "Поведение на границе контракта переживает рефакторинг; проверка приватных внутренностей ломает тест при безобидных изменениях, не затрагивающих наблюдаемое поведение."
      - prompt: "Если почтовый клиент создаётся внутри сервиса, какие два плохих выхода остаются у теста?"
        choices:
          - id: a
            text: "Либо реально отправлять письма (медленно и ненадёжно), либо патчить внутренности сервиса."
          - id: b
            text: "Либо удалить метод отправки, либо переписать весь сервис с нуля."
          - id: c
            text: "Либо ждать ответа сервера, либо отключить интернет на машине."
          - id: d
            text: "Либо запускать тест дважды, либо игнорировать его результат."
        correct: [a]
        explanation: "Жёстко вшитая зависимость оставляет только реальную отправку или патчинг кишок - оба варианта сигнализируют, что код не спроектирован для тестирования."

  - id: test-doubles-001
    concept: testing-with-di
    type: theory-quiz
    difficulty: 2
    prompt: "Чем spy отличается от stub среди тестовых дублёров?"
    choices:
      - id: a
        text: "Stub отвечает заранее заданным значением и больше ничего; spy ещё и записывает каждый вызов для последующей проверки."
      - id: b
        text: "Spy возвращает фиксированный ответ, а stub записывает вызовы."
      - id: c
        text: "Они идентичны, разница только в названии."
      - id: d
        text: "Stub работает только в FastAPI, а spy - в обычных классах."
    correct: [a]
    explanation: "Stub просто не мешает, давая правдоподобный ответ. Spy делает то же, но дополнительно копит вызовы (например, в self.sent), чтобы тест проверил, как именно сервис позвал зависимость."
    variants:
      - prompt: "В чём опасность `MagicMock` без параметра `spec`?"
        choices:
          - id: a
            text: "Он молча проглатывает опечатку в имени метода (snd вместо send) и скрывает баг вместо AttributeError."
          - id: b
            text: "Он всегда падает с ошибкой при любом обращении к методу."
          - id: c
            text: "Он автоматически отправляет реальные сетевые запросы."
          - id: d
            text: "Он запрещает проверять, был ли вызван метод."
        correct: [a]
        explanation: "MagicMock на любой вызов возвращает новый mock, поэтому опечатка проходит молча. spec=Mailer ограничивает mock формой реального контракта и ловит такие ошибки."
      - prompt: "Когда стоит предпочесть ручной fake, а не mock?"
        choices:
          - id: a
            text: "Когда зависимость нужна работающей (тест полагается на осмысленные данные от неё) и одна подмена нужна многим тестам."
          - id: b
            text: "Когда нужно зафиксировать только сам факт и форму единичного вызова."
          - id: c
            text: "Когда тест должен ходить в настоящую базу данных."
          - id: d
            text: "Fake предпочтителен всегда, mock использовать нельзя."
        correct: [a]
        explanation: "Fake (например, in-memory репозиторий) хорош, когда нужна работающая зависимость и одна подмена переиспользуется. Mock берут, чтобы зафиксировать именно факт и форму взаимодействия."

  - id: test-predict-spy-001
    concept: testing-with-di
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      class SpyMailer:
          def __init__(self):
              self.sent = []
          def send(self, to, text):
              self.sent.append((to, text))

      class OrderService:
          def __init__(self, mailer):
              self.mailer = mailer
          def place(self, customer):
              self.mailer.send(customer, "Заказ принят")

      spy = SpyMailer()
      OrderService(spy).place("ana@example.com")
      print(spy.sent)
    expected:
      kind: stdout
      value: "[('ana@example.com', 'Заказ принят')]"
    hints:
      - "Spy записывает каждый вызов send как кортеж (to, text). Сколько раз place позвал send и с какими аргументами?"
    variants:
      - snippet: |
          class SpyMailer:
              def __init__(self):
                  self.sent = []
              def send(self, to, text):
                  self.sent.append((to, text))

          class OrderService:
              def __init__(self, mailer):
                  self.mailer = mailer
              def place(self, customer):
                  self.mailer.send(customer, "Заказ принят")

          spy = SpyMailer()
          service = OrderService(spy)
          service.place("ana")
          service.place("boris")
          print(len(spy.sent))
        expected:
          kind: stdout
          value: "2"
      - snippet: |
          class SpyMailer:
              def __init__(self):
                  self.sent = []
              def send(self, to, text):
                  self.sent.append((to, text))

          spy = SpyMailer()
          print(spy.sent)
        expected:
          kind: stdout
          value: "[]"

  - id: test-predict-mock-001
    concept: testing-with-di
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      from unittest.mock import MagicMock

      mailer = MagicMock()
      mailer.snd("ana", "привет")
      print(mailer.snd.called)
      print(mailer.send.called)
    expected:
      kind: stdout
      value: "True\nFalse"
    hints:
      - "MagicMock на любой доступ к атрибуту создаёт новый mock и не падает. Что станет с snd.called после вызова snd, и трогали ли вообще send?"
      - "Это иллюстрация опечатки: вызвали snd вместо send. Mock радостно проглотил несуществующий метод. Какие два флага .called напечатаются?"

  - id: test-fill-spy-001
    concept: testing-with-di
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите spy-дублёр, который записывает каждый вызов send в список."
    template: |
      class SpyMailer:
          def __init__(self):
              self.sent = {{init}}
          def send(self, to, text):
              self.sent.{{op}}((to, text))
    blanks:
      init:
        accept: ["[]", "list()"]
      op:
        accept: ["append"]
    hints:
      - "Spy копит вызовы: ему нужен пустой контейнер в конструкторе и операция добавления при каждом send. Что и куда добавлять?"
    variants:
      - prompt: "Допишите подмену зависимости FastAPI через dependency_overrides."
        template: |
          def get_db():
              return real_db

          def fake_db():
              return {"users": ["test-user"]}

          app.dependency_overrides[{{orig}}] = {{fake}}
        blanks:
          orig:
            accept: ["get_db"]
          fake:
            accept: ["fake_db"]
      - prompt: "Допишите очистку подмен после теста FastAPI, чтобы они не утекли в другие тесты."
        template: |
          app.dependency_overrides.{{method}}()
        blanks:
          method:
            accept: ["clear"]

  - id: test-build-spy-001
    concept: testing-with-di
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `class SpyMailer` с методом `send(to, text)`, который записывает каждый вызов кортежем `(to, text)` в список `self.sent`, и методом `count_to(addr)`, возвращающим, сколько раз отправляли на адрес `addr`."
    starter: |
      class SpyMailer:
          def __init__(self):
              ...
          def send(self, to, text):
              ...
          def count_to(self, addr):
              ...
    cases:
      - call: "SpyMailer().count_to('ana')"
        expect: 0
      - call: "(lambda s: (s.send('ana', 'x'), s.send('ana', 'y'), s.send('bob', 'z'), s.count_to('ana'))[-1])(SpyMailer())"
        expect: 2
      - call: "(lambda s: (s.send('ana', 'x'), [list(t) for t in s.sent])[-1])(SpyMailer())"
        expect: [["ana", "x"]]
    hints:
      - "Spy не просто отвечает - он копит вызовы, чтобы тест потом проверил взаимодействие. Что завести в __init__, чтобы send было куда писать?"
      - "send добавляет кортеж (to, text) в self.sent. count_to считает записи, у которых первый элемент равен addr."
    solution: |
      class SpyMailer:
          def __init__(self):
              self.sent = []
          def send(self, to, text):
              self.sent.append((to, text))
          def count_to(self, addr):
              return sum(1 for to, text in self.sent if to == addr)

  - id: test-override-challenge-001
    concept: testing-with-di
    type: python-function
    difficulty: 5
    prompt: "Реализуйте `with_override(overrides, registry, key)`: верните реализацию для key из словаря overrides, если она там есть, иначе - из registry. Это ядро механизма вроде dependency_overrides: подмена побеждает оригинал, не трогая сам registry. Если ключа нет нигде, верните None."
    starter: |
      def with_override(overrides, registry, key):
          ...
    cases:
      - call: "with_override({}, {'db': 'real'}, 'db')"
        expect: "real"
      - call: "with_override({'db': 'fake'}, {'db': 'real'}, 'db')"
        expect: "fake"
      - call: "with_override({'mailer': 'spy'}, {'db': 'real'}, 'db')"
        expect: "real"
      - call: "with_override({}, {}, 'missing')"
        expect: null
    hints:
      - "Подмена имеет приоритет над оригиналом, как app.dependency_overrides перекрывает исходную зависимость. Где искать значение в первую очередь?"
      - "Сначала смотрите в overrides по key; если там пусто - в registry; если и там нет - верните None. registry при этом не изменяется."
    solution: |
      def with_override(overrides, registry, key):
          if key in overrides:
              return overrides[key]
          return registry.get(key)
