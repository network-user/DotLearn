exercises:
  - id: depends-what-is-001
    concept: di-in-fastapi
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает `Depends(get_db)` в сигнатуре обработчика FastAPI?"
    choices:
      - id: a
        text: "Говорит фреймворку вызвать get_db перед обработчиком и передать её результат в этот параметр."
      - id: b
        text: "Достаёт значение параметра из тела запроса по имени get_db как полное описание этого поведения."
      - id: c
        text: "Кэширует обработчик в базе данных на время работы приложения как полное описание этого поведения."
      - id: d
        text: "Набор запрещает вызывать обработчик, пока база недоступна считают исчерпывающим ответом."
    correct: [a]
    explanation: "Depends(f) объявляет параметр как результат функции f: FastAPI сам вызывает f перед обработчиком и подставляет её результат. Обработчик зависит от результата, а не от устройства зависимости."
    variants:
      - prompt: "Чем зависимость через Depends отличается от обычного аргумента обработчика FastAPI?"
        choices:
          - id: a
            text: "Обычный аргумент берётся из запроса (путь, query, тело), а Depends - это результат другой функции, которую выполнит фреймворк."
          - id: b
            text: "Зависимость через Depends всегда приходит из заголовка Authorization, во всех сценариях без дополнительной настройки."
          - id: c
            text: "Разницы нет: Depends - просто другой способ записать обычный аргумент, независимо от входных данных и окружения."
          - id: d
            text: "Depends-параметр не передаётся в тело функции, а только логируется как полное описание этого поведения."
        correct: [a]
        explanation: "Обычный аргумент FastAPI достаёт из запроса; Depends(f) превращает параметр в результат вызова функции f, которую фреймворк выполнит за вас."
      - prompt: "Кто в FastAPI выступает «инъектором», который собирает зависимости обработчика?"
        choices:
          - id: a
            text: "Сам фреймворк FastAPI: он обходит граф зависимостей и подставляет вычисленные значения."
          - id: b
            text: "Разработчик, вручную вызывая get_db() в начале каждого обработчика."
          - id: c
            text: "Операционная система через системные вызовы как полное описание этого поведения."
          - id: d
            text: "Набор браузер клиента, передавая объекты в теле запроса считают исчерпывающим ответом."
        correct: [a]
        explanation: "Это тот же DI, только инъектор - не вы, а FastAPI: вы декларируете потребность через Depends, фреймворк вычисляет зависимости и подставляет их."

  - id: depends-mistakes-001
    concept: di-in-fastapi
    type: theory-quiz
    difficulty: 2
    prompt: "Почему `Depends(get_db())` (с круглыми скобками) - почти всегда ошибка?"
    choices:
      - id: a
        text: "Так get_db вычислится один раз при старте приложения, и единственный результат зафиксируется на все запросы."
      - id: b
        text: "FastAPI не умеет принимать функции в Depends - только их результаты как полное описание этого поведения."
      - id: c
        text: "Круглые скобки заставят FastAPI вызывать get_db дважды на каждый запрос как полное описание этого поведения."
      - id: d
        text: "Это правильная форма; без скобок Depends не работает, при буквальном чтении этого вызова."
    correct: [a]
    explanation: "В Depends передают саму функцию get_db, а не её вызов. С `get_db()` вы подставляете один заранее вычисленный результат на все запросы вместо вызова на каждый запрос."
    variants:
      - prompt: "Что верно про кэширование зависимостей в FastAPI?"
        choices:
          - id: a
            text: "По умолчанию зависимость вычисляется один раз на запрос и переиспользуется; кэш сбрасывается между запросами."
          - id: b
            text: "Зависимость кэшируется навсегда и переживает все запросы приложения как полное описание этого поведения."
          - id: c
            text: "Кэширование зависимостей в FastAPI отсутствует - каждая ссылка вычисляется заново как полное описание этого поведения."
          - id: d
            text: "Кэш зависимости общий для всех пользователей одновременно, если смотреть только на самый верхний слой."
        correct: [a]
        explanation: "FastAPI кэширует результат зависимости в пределах одного запроса по функции-зависимости; следующий запрос начинает с чистого листа. use_cache=False отключает кэш."
      - prompt: "Как ведёт себя зависимость с `yield` в FastAPI?"
        choices:
          - id: a
            text: "Как контекст: код до yield выполняется на входе, код после (в finally) - по завершении запроса, в обработчик попадает yielded-значение."
          - id: b
            text: "Как обычная функция: возвращает сам генератор, а закрытие происходит сразу после yield как полное описание этого поведения."
          - id: c
            text: "yield в зависимостях FastAPI запрещён и вызывает ошибку, если смотреть только на самый верхний слой."
          - id: d
            text: "Код после yield не выполняется никогда, на любом пути обработки запроса или оговорок."
        correct: [a]
        explanation: "Зависимость с yield - это контекст: до yield - подготовка ресурса, после (в finally) - его освобождение по завершении запроса при любом исходе. В обработчик идёт yielded-значение."

  - id: depends-predict-basic-001
    concept: di-in-fastapi
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа? (мини-движок повторяет суть Depends)"
    snippet: |
      class Depends:
          def __init__(self, func):
              self.func = func

      def solve(func, cache):
          if func in cache:
              return cache[func]
          kwargs = {}
          for name, dep in getattr(func, "deps", {}).items():
              kwargs[name] = solve(dep.func, cache)
          result = func(**kwargs)
          cache[func] = result
          return result

      def get_db():
          return {"users": ["ana", "boris"]}

      def list_users(db=None):
          return db["users"]

      list_users.deps = {"db": Depends(get_db)}
      print(solve(list_users, {}))
    expected:
      kind: stdout
      value: "['ana', 'boris']"
    hints:
      - "solve рекурсивно вычисляет зависимости: сначала get_db, потом подставляет результат в list_users как db. Что вернёт list_users, получив этот словарь?"
    variants:
      - snippet: |
          class Depends:
              def __init__(self, func):
                  self.func = func

          def solve(func, cache):
              if func in cache:
                  return cache[func]
              kwargs = {}
              for name, dep in getattr(func, "deps", {}).items():
                  kwargs[name] = solve(dep.func, cache)
              result = func(**kwargs)
              cache[func] = result
              return result

          def get_token():
              return "abc"

          def get_user(token=None):
              return "user-" + token

          get_user.deps = {"token": Depends(get_token)}
          print(solve(get_user, {}))
        expected:
          kind: stdout
          value: "user-abc"
      - snippet: |
          class Depends:
              def __init__(self, func):
                  self.func = func

          def solve(func, cache):
              if func in cache:
                  return cache[func]
              kwargs = {}
              for name, dep in getattr(func, "deps", {}).items():
                  kwargs[name] = solve(dep.func, cache)
              result = func(**kwargs)
              cache[func] = result
              return result

          def get_settings():
              return {"page_size": 10}

          def get_limit(settings=None):
              return settings["page_size"] * 2

          get_limit.deps = {"settings": Depends(get_settings)}
          print(solve(get_limit, {}))
        expected:
          kind: stdout
          value: "20"

  - id: depends-predict-cache-001
    concept: di-in-fastapi
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа? Зависимость указана дважды, но кэшируется в пределах запроса."
    snippet: |
      class Depends:
          def __init__(self, func):
              self.func = func

      def solve(func, cache):
          if func in cache:
              return cache[func]
          kwargs = {}
          for name, dep in getattr(func, "deps", {}).items():
              kwargs[name] = solve(dep.func, cache)
          result = func(**kwargs)
          cache[func] = result
          return result

      def get_db():
          print("открыли соединение")
          return object()

      def report(a=None, b=None):
          return a is b

      report.deps = {"a": Depends(get_db), "b": Depends(get_db)}
      print(solve(report, {}))
    expected:
      kind: stdout
      value: "открыли соединение\nTrue"
    hints:
      - "get_db указан дважды (a и b), но solve кэширует результат по функции в пределах одного «запроса». Сколько раз реально выполнится тело get_db?"
      - "Раз результат один и тот же объект, a и b ссылаются на него же. Что напечатает print первым, а что - вторым (a is b)?"

  - id: depends-fill-declare-001
    concept: di-in-fastapi
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите объявление зависимости в обработчике FastAPI: db должен приходить как результат функции get_db."
    template: |
      from fastapi import Depends, FastAPI

      app = FastAPI()

      def get_db():
          return {"users": ["ana"]}

      @app.get("/users")
      def list_users(db = {{depends}}({{func}})):
          return db["users"]
    blanks:
      depends:
        accept: ["Depends"]
      func:
        accept: ["get_db"]
    hints:
      - "В Depends передают саму функцию-зависимость, а не результат её вызова - без круглых скобок после имени."
    variants:
      - prompt: "Допишите вложенную зависимость: get_user зависит от результата get_token."
        template: |
          def get_token(authorization: str = ""):
              return authorization.removeprefix("Bearer ")

          def get_user(token: str = Depends({{inner}})):
              return {"id": token}
        blanks:
          inner:
            accept: ["get_token"]
      - prompt: "Допишите зависимость с yield так, чтобы ресурс гарантированно закрылся."
        template: |
          def get_db():
              db = {"conn": "open"}
              try:
                  {{kw}} db
              {{block}}:
                  db["conn"] = "closed"
        blanks:
          kw:
            accept: ["yield"]
          block:
            accept: ["finally"]

  - id: depends-engine-001
    concept: di-in-fastapi
    type: python-function
    difficulty: 4
    prompt: "Реализуйте `solve(func, cache)` - ядро мини-Depends. Если результат func уже в cache, верните его. Иначе рекурсивно вычислите зависимости из `func.deps` (словарь имя -> объект с атрибутом `.func`), вызовите func с этими kwargs, сохраните результат в cache по ключу func и верните его. Зависимости без deps считайте пустым словарём."
    starter: |
      def solve(func, cache):
          ..
    cases:
      - call: "solve((lambda: 7), {})"
        expect: 7
      - call: "(lambda f, g: (setattr(g, 'deps', {'x': type('D', (), {'func': staticmethod(f)})()}), solve(g, {}))[-1])((lambda: 5), (lambda x=None: x + 1))"
        expect: 6
      - call: "(lambda calls: (lambda leaf: (lambda f: (setattr(f, 'deps', {'a': type('D', (), {'func': staticmethod(leaf)})(), 'b': type('D', (), {'func': staticmethod(leaf)})()}), solve(f, {}), len(calls))[-1])((lambda a=None, b=None: a + b)))((lambda: calls.append(1) or 9)))([])"
        expect: 1
    hints:
      - "Кэш на запрос - ключевое свойство: одна и та же зависимость, указанная дважды, должна вычисляться один раз. Что проверить в первую очередь при входе в solve?"
      - "Сначала проверка кэша по func. Затем для каждой пары имя/зависимость в func.deps рекурсивно вызовите solve по dep.func. Используйте getattr(func, 'deps', {}), чтобы листовые функции работали."
      - "После сбора kwargs вызовите func(**kwargs), положите результат в cache[func] и верните. Сохранение в кэш обязательно до возврата, иначе повторный вызов не переиспользуется."
    solution: |
      def solve(func, cache):
          if func in cache:
              return cache[func]
          kwargs = {}
          for name, dep in getattr(func, "deps", {}).items():
              kwargs[name] = solve(dep.func, cache)
          result = func(**kwargs)
          cache[func] = result
          return result
