exercises:
  - id: di-what-is-001
    concept: di-pattern
    type: theory-quiz
    difficulty: 1
    prompt: "Что такое dependency injection (DI)?"
    choices:
      - id: a
        text: "Передача зависимости снаружи (через конструктор или аргумент) вместо её создания внутри класса."
      - id: b
        text: "Создание всех зависимостей внутри класса в его конструкторе как полное описание этого поведения."
      - id: c
        text: "Хранение зависимостей в глобальной переменной, доступной всем классам как полное описание этого поведения."
      - id: d
        text: "Автоматическое удаление неиспользуемых зависимостей сборщиком мусора как полное описание этого поведения."
    correct: [a]
    explanation: "DI - это передача зависимости снаружи. Класс перестаёт сам создавать зависимость и принимает её готовой, через конструктор или аргумент метода."
    variants:
      - prompt: "Что означает «инверсия управления» (inversion of control) применительно к зависимостям?"
        choices:
          - id: a
            text: "Решение о том, какой конкретный объект использовать, отдано наружу, на уровень выше; класс лишь декларирует потребность."
          - id: b
            text: "Класс сам выбирает и создаёт все нужные ему конкретные объекты, во всех сценариях без дополнительной настройки."
          - id: c
            text: "Управление потоком программы передаётся операционной системе, независимо от входных данных и окружения."
          - id: d
            text: "Порядок вызова методов инвертируется на противоположный; другого корректного поведения система не допускает."
        correct: [a]
        explanation: "Раньше класс управлял тем, какие объекты использовать; при инверсии это управление отдано наверх. Голливудский принцип: «не звоните нам, мы позвоним вам»."
      - prompt: "Какую вторую обязанность DI отбирает у класса?"
        choices:
          - id: a
            text: "Решать, откуда взять зависимость (создавать её); остаётся только использование зависимости."
          - id: b
            text: "Использовать зависимость; остаётся только её создание как полное описание этого поведения."
          - id: c
            text: "Логировать каждый свой метод; другого корректного поведения система не допускает."
          - id: d
            text: "Проверять типы аргументов в рантайме как полное описание этого поведения."
        correct: [a]
        explanation: "У зависимости два момента: создание и использование. DI выносит создание наружу, классу оставляет лишь использование - так он перестаёт быть привязан к конкретному способу создания."

  - id: di-spot-coupling-001
    concept: di-pattern
    type: theory-quiz
    difficulty: 2
    prompt: "Почему конструктор `def __init__(self, mailer=None): self.mailer = mailer or SmtpMailer()` - это плохой DI?"
    choices:
      - id: a
        text: "Дефолт возвращает жёсткую связь через чёрный ход: класс снова привязан к конкретному SmtpMailer."
      - id: b
        text: "Аргументы с дефолтами в Python запрещены как полное описание этого поведения."
      - id: c
        text: "Так зависимость становится слишком явной в сигнатуре как полное описание этого поведения."
      - id: d
        text: "Это, наоборот, образцовый DI - дефолт делает класс удобнее как полное описание этого поведения."
    correct: [a]
    explanation: "Дефолт `mailer or SmtpMailer()` втягивает конкретный тип обратно внутрь класса. Делайте зависимость обязательным аргументом или собирайте дефолты на уровне сборки приложения."
    variants:
      - prompt: "Какой признак выдаёт «спрятанную зависимость», которую стоит вынести наружу?"
        choices:
          - id: a
            text: "Внутри класса встречается создание сервиса/клиента/репозитория через SomeClass(.)."
          - id: b
            text: "Внутри метода создаётся объект-значение, например дата или координата."
          - id: c
            text: "Класс принимает зависимость через конструктор как полное описание этого поведения."
          - id: d
            text: "Набор класс зависит от Protocol, а не от конкретного типа считают исчерпывающим ответом."
        correct: [a]
        explanation: "Создание сервиса, клиента, репозитория или соединения внутри класса - кандидат на инъекцию. Объекты-значения создавать внутри нормально."
      - prompt: "Почему брать зависимость из глобального singleton - это не инъекция?"
        choices:
          - id: a
            text: "Связь по-прежнему спрятана внутри и не видна в сигнатуре класса; зависимость не входит снаружи явно."
          - id: b
            text: "Глобальные переменные в Python недопустимы, при буквальном чтении этого вызова."
          - id: c
            text: "Singleton всегда медленнее обычного объекта, если смотреть только на самый верхний слой."
          - id: d
            text: "Это полноценная инъекция, просто другой её вид при любом объёме нагрузки и размере данных."
        correct: [a]
        explanation: "Инъекция в том и состоит, что зависимость явно входит снаружи и видна в сигнатуре. Глобальный singleton прячет связь внутри - это та же жёсткая связь, только замаскированная."

  - id: di-predict-channel-001
    concept: di-pattern
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа?"
    snippet: |
      class ConsoleChannel:
          def send(self, text):
              print("console:", text)

      class Notifier:
          def __init__(self, channel):
              self.channel = channel
          def notify(self, text):
              self.channel.send(text)

      Notifier(ConsoleChannel()).notify("привет")
    expected:
      kind: stdout
      value: "console: привет"
    hints:
      - "Notifier ничего не знает про каналы заранее: он принимает channel и зовёт send. Какой объект внедрён здесь и что напечатает его send?"
    variants:
      - snippet: |
          class SmsChannel:
              def send(self, text):
                  print("sms:", text)

          class Notifier:
              def __init__(self, channel):
                  self.channel = channel
              def notify(self, text):
                  self.channel.send(text)

          Notifier(SmsChannel()).notify("код 123")
        expected:
          kind: stdout
          value: "sms: код 123"
      - snippet: |
          class SmtpMailer:
              def send(self, to, text):
                  print(f"SMTP -> {to}: {text}")

          class OrderService:
              def __init__(self, mailer):
                  self.mailer = mailer
              def place(self, customer):
                  self.mailer.send(customer, "Заказ принят")

          OrderService(SmtpMailer()).place("ana@example.com")
        expected:
          kind: stdout
          value: "SMTP -> ana@example.com: Заказ принят"

  - id: di-predict-swap-001
    concept: di-pattern
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа?"
    snippet: |
      class ConsoleChannel:
          def send(self, text):
              print("console:", text)

      class QueueChannel:
          def send(self, text):
              print("queue <-", text)

      class Notifier:
          def __init__(self, channel):
              self.channel = channel
          def notify(self, text):
              self.channel.send(text)

      for ch in (ConsoleChannel(), QueueChannel()):
          Notifier(ch).notify("ok")
    expected:
      kind: stdout
      value: "console: ok\nqueue <- ok"
    hints:
      - "Notifier не меняется между итерациями - меняется только внедрённый channel. Что напечатает каждый канал при вызове своего send?"
      - "Цикл создаёт два Notifier с разными каналами и зовёт notify('ok') у каждого. Соберите вывод построчно в порядке итерации."

  - id: di-fill-inject-001
    concept: di-pattern
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите конструктор так, чтобы mailer внедрялся снаружи, а не создавался внутри класса."
    template: |
      class OrderService:
          def __init__(self, {{param}}):
              self.mailer = {{param}}

          def place(self, customer):
              self.mailer.send(customer, "Заказ принят")
    blanks:
      param:
        accept: ["mailer"]
    hints:
      - "Зависимость должна войти снаружи через параметр конструктора и просто сохраниться в атрибут. Никакого SomeClass() внутри."
    variants:
      - prompt: "Соберите сервис, передав конкретную реализацию mailer снаружи (инъекция через конструктор)."
        template: |
          service = OrderService({{impl}}())
          service.place("ana@example.com")
        blanks:
          impl:
            accept: ["SmtpMailer", "QueueMailer", "ConsoleMailer"]
      - prompt: "Допишите Notifier, который принимает канал снаружи и делегирует ему отправку."
        template: |
          class Notifier:
              def __init__(self, {{param}}):
                  self.channel = {{param}}
              def notify(self, text):
                  self.channel.{{method}}(text)
        blanks:
          param:
            accept: ["channel"]
          method:
            accept: ["send"]

  - id: di-refactor-001
    concept: di-pattern
    type: python-function
    difficulty: 3
    prompt: "Реализуйте `class OrderService` с инъекцией через конструктор: он принимает `mailer` снаружи и в методе `place(customer)` вызывает `mailer.send(customer, \"Заказ принят\")`, а затем возвращает `customer`. Класс не должен сам создавать mailer."
    starter: |
      class OrderService:
          def __init__(self, mailer):
              ..
          def place(self, customer):
              ..
    cases:
      - call: "(lambda box: OrderService(type('M', (), {'send': lambda self, to, text: box.append((to, text))})()).place('ana'))([])"
        expect: "ana"
      - call: "(lambda box: (OrderService(type('M', (), {'send': lambda self, to, text: box.append([to, text])})()).place('boris'), box)[-1])([])"
        expect: [["boris", "Заказ принят"]]
      - call: "OrderService(type('M', (), {'send': lambda self, to, text: None})()).place('eva')"
        expect: "eva"
    hints:
      - "Создание зависимости уходит наружу: конструктор лишь сохраняет переданный mailer. Что должно лежать в self после __init__?"
      - "place зовёт send с двумя аргументами (адрес и фиксированный текст), затем возвращает customer. Текст письма - ровно «Заказ принят»."
    solution: |
      class OrderService:
          def __init__(self, mailer):
              self.mailer = mailer
          def place(self, customer):
              self.mailer.send(customer, "Заказ принят")
              return customer

  - id: di-build-app-001
    concept: di-pattern
    type: python-function
    difficulty: 4
    prompt: "Реализуйте `build_pipeline(steps)`: соберите конвейер из списка объектов-шагов, каждый с методом `run(value) -> value`. Верните функцию `process(value)`, которая прогоняет value через все шаги по порядку и возвращает итог. Это сборочный уровень: он создаёт композицию из внедрённых снаружи шагов."
    starter: |
      def build_pipeline(steps):
          def process(value):
              ..
          return process
    cases:
      - call: "build_pipeline([type('S', (), {'run': lambda self, v: v + 1})(), type('S', (), {'run': lambda self, v: v * 2})()])(3)"
        expect: 8
      - call: "build_pipeline([])(10)"
        expect: 10
      - call: "build_pipeline([type('S', (), {'run': lambda self, v: v.upper()})(), type('S', (), {'run': lambda self, v: v + '!'})()])('hi')"
        expect: "HI!"
    hints:
      - "Сборочный уровень знает шаги только по контракту run(value). process не создаёт шаги сам - они пришли снаружи списком. Что process должен сделать с каждым по очереди?"
      - "Идите по steps слева направо, на каждом шаге заменяя value результатом step.run(value). Пустой список означает, что value возвращается без изменений."
    solution: |
      def build_pipeline(steps):
          def process(value):
              for step in steps:
                  value = step.run(value)
              return value
          return process
