exercises:
  - id: di-what-is-001
    concept: di-pattern
    type: theory-quiz
    difficulty: 1
    prompt: "What is dependency injection (DI)?"
    choices:
      - id: a
        text: "Passing a dependency from outside (through constructor or argument) instead of creating it inside the class."
      - id: b
        text: "Creating all dependencies inside the class in its constructor for every request path in the app."
      - id: c
        text: "Storing dependencies in a global variable accessible to all classes for every request path in the app."
      - id: d
        text: "Automatically removing unused dependencies by the garbage collector for every request path in the app."
    correct: [a]
    explanation: "DI is passing a dependency from outside. The class stops creating the dependency itself and accepts it ready-made, through constructor or method argument."
    variants:
      - prompt: "What does 'inversion of control' mean with respect to dependencies?"
        choices:
          - id: a
            text: "The decision about which concrete object to use is made outside, at a higher level; the class only declares its need."
          - id: b
            text: "The class itself chooses and creates all concrete objects it needs for any payload and any deploy target."
          - id: c
            text: "Control of program flow is handed to the operating system for any payload and any deploy target."
          - id: d
            text: "The order of method calls is reversed; the system does not allow any other correct behavior."
        correct: [a]
        explanation: "Before, the class controlled which objects to use; with inversion that control moves up. Hollywood principle: 'don't call us, we'll call you'."
      - prompt: "Which second responsibility does DI take away from a class?"
        choices:
          - id: a
            text: "Deciding where to get the dependency (creating it); only using the dependency remains."
          - id: b
            text: "Using the dependency; only creating it remains for every request path in the app."
          - id: c
            text: "Logging every method; the system does not allow any other correct behavior."
          - id: d
            text: "Checking argument types at runtime as a complete account of that behavior."
        correct: [a]
        explanation: "A dependency has two moments: creation and use. DI moves creation outside; the class is left with use only, so it is no longer tied to a specific way of creation."

  - id: di-spot-coupling-001
    concept: di-pattern
    type: theory-quiz
    difficulty: 2
    prompt: "Why is constructor `def __init__(self, mailer=None): self.mailer = mailer or SmtpMailer()` bad DI?"
    choices:
      - id: a
        text: "The default brings tight coupling back through the back door: the class is again bound to concrete SmtpMailer."
      - id: b
        text: "Default arguments are forbidden in Python; the system does not allow any other correct behavior."
      - id: c
        text: "That makes the dependency too explicit in the signature as a complete account of that behavior."
      - id: d
        text: "On the contrary, this is always exemplary DI: the default makes the class more convenient."
    correct: [a]
    explanation: "Default `mailer or SmtpMailer()` pulls the concrete type back inside the class. Make the dependency a required argument or assemble defaults at application composition level."
    variants:
      - prompt: "What signals a 'hidden dependency' that should be moved outside?"
        choices:
          - id: a
            text: "Inside the class you see creation of a service/client/repository via SomeClass(.)."
          - id: b
            text: "Inside a method a value object is created, such as a date or coordinate."
          - id: c
            text: "The class accepts a dependency through the constructor."
          - id: d
            text: "The class depends on Protocol, not a concrete type."
        correct: [a]
        explanation: "Creating a service, client, repository, or connection inside the class is a candidate for injection. Value objects are fine to create inside."
      - prompt: "Why is taking a dependency from a global singleton not injection?"
        choices:
          - id: a
            text: "The link is still hidden inside and not visible in the class signature"
          - id: b
            text: "Global variables are not allowed in Python for every request path in the app."
          - id: c
            text: "A singleton is always slower than an ordinary object."
          - id: d
            text: "The set this is full injection, just a different kind is treated as exhaustive."
        correct: [a]
        explanation: "Injection means the dependency enters explicitly from outside and is visible in the signature. A global singleton hides the link inside: same tight coupling, just masked. The dependency does not enter explicitly from outside."

  - id: di-predict-channel-001
    concept: di-pattern
    type: predict-output
    difficulty: 2
    prompt: "What will this program print?"
    snippet: |
      class ConsoleChannel:
          def send(self, text):
              print("console:", text)

      class Notifier:
          def __init__(self, channel):
              self.channel = channel
          def notify(self, text):
              self.channel.send(text)

      Notifier(ConsoleChannel()).notify("hello")
    expected:
      kind: stdout
      value: "console: hello"
    hints:
      - "Notifier knows nothing about channels upfront: it accepts channel and calls send. Which object is injected here and what will its send print?"
    variants:
      - snippet: |
          class SmsChannel:
              def send(self, text):
                  print("sms:", text)

          class Notifier:
              def __init__(self, channel):
                  self.channel = channel
              def notify(self, text):
                  self.channel.send(text)

          Notifier(SmsChannel()).notify("code 123")
        expected:
          kind: stdout
          value: "sms: code 123"
      - snippet: |
          class SmtpMailer:
              def send(self, to, text):
                  print(f"SMTP -> {to}: {text}")

          class OrderService:
              def __init__(self, mailer):
                  self.mailer = mailer
              def place(self, customer):
                  self.mailer.send(customer, "Order accepted")

          OrderService(SmtpMailer()).place("ana@example.com")
        expected:
          kind: stdout
          value: "SMTP -> ana@example.com: Order accepted"

  - id: di-predict-swap-001
    concept: di-pattern
    type: predict-output
    difficulty: 3
    prompt: "What will this program print?"
    snippet: |
      class ConsoleChannel:
          def send(self, text):
              print("console:", text)

      class QueueChannel:
          def send(self, text):
              print("queue <-", text)

      class Notifier:
          def __init__(self, channel):
              self.channel = channel
          def notify(self, text):
              self.channel.send(text)

      for ch in (ConsoleChannel(), QueueChannel()):
          Notifier(ch).notify("ok")
    expected:
      kind: stdout
      value: "console: ok\nqueue <- ok"
    hints:
      - "Notifier does not change between iterations: only the injected channel changes. What will each channel print when send is called?"
      - "The loop creates two Notifiers with different channels and calls notify('ok') on each. Assemble the output line by line in iteration order."

  - id: di-fill-inject-001
    concept: di-pattern
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete the constructor so mailer is injected from outside instead of created inside the class."
    template: |
      class OrderService:
          def __init__(self, {{param}}):
              self.mailer = {{param}}

          def place(self, customer):
              self.mailer.send(customer, "Order accepted")
    blanks:
      param:
        accept: ["mailer"]
    hints:
      - "The dependency should enter from outside through a constructor parameter and be stored in an attribute. No SomeClass() inside."
    variants:
      - prompt: "Assemble the service by passing a concrete mailer implementation from outside (constructor injection)."
        template: |
          service = OrderService({{impl}}())
          service.place("ana@example.com")
        blanks:
          impl:
            accept: ["SmtpMailer", "QueueMailer", "ConsoleMailer"]
      - prompt: "Complete Notifier so it accepts a channel from outside and delegates sending to it."
        template: |
          class Notifier:
              def __init__(self, {{param}}):
                  self.channel = {{param}}
              def notify(self, text):
                  self.channel.{{method}}(text)
        blanks:
          param:
            accept: ["channel"]
          method:
            accept: ["send"]

  - id: di-refactor-001
    concept: di-pattern
    type: python-function
    difficulty: 3
    prompt: "Implement `class OrderService` with constructor injection: it accepts `mailer` from outside and in method `place(customer)` calls `mailer.send(customer, \"Order accepted\")`, then returns `customer`. The class must not create mailer itself."
    starter: |
      class OrderService:
          def __init__(self, mailer):
              ..
          def place(self, customer):
              ..
    cases:
      - call: "(lambda box: OrderService(type('M', (), {'send': lambda self, to, text: box.append((to, text))})()).place('ana'))([])"
        expect: "ana"
      - call: "(lambda box: (OrderService(type('M', (), {'send': lambda self, to, text: box.append([to, text])})()).place('boris'), box)[-1])([])"
        expect: [["boris", "Order accepted"]]
      - call: "OrderService(type('M', (), {'send': lambda self, to, text: None})()).place('eva')"
        expect: "eva"
    hints:
      - "Dependency creation moves outside: the constructor only stores the passed mailer. What should live in self after __init__?"
      - "place calls send with two arguments (address and fixed text), then returns customer. The email text is exactly 'Order accepted'."
    solution: |
      class OrderService:
          def __init__(self, mailer):
              self.mailer = mailer
          def place(self, customer):
              self.mailer.send(customer, "Order accepted")
              return customer

  - id: di-build-app-001
    concept: di-pattern
    type: python-function
    difficulty: 4
    prompt: "Implement `build_pipeline(steps)`: assemble a pipeline from a list of step objects, each with method `run(value) -> value`. Return function `process(value)` that runs value through all steps in order and returns the result. This is the composition level: it builds composition from steps injected from outside."
    starter: |
      def build_pipeline(steps):
          def process(value):
              ..
          return process
    cases:
      - call: "build_pipeline([type('S', (), {'run': lambda self, v: v + 1})(), type('S', (), {'run': lambda self, v: v * 2})()])(3)"
        expect: 8
      - call: "build_pipeline([])(10)"
        expect: 10
      - call: "build_pipeline([type('S', (), {'run': lambda self, v: v.upper()})(), type('S', (), {'run': lambda self, v: v + '!'})()])('hi')"
        expect: "HI!"
    hints:
      - "The composition level knows steps only by the run(value) contract. process does not create steps: they arrived from outside as a list. What should process do with each in order?"
      - "Walk steps left to right, replacing value with step.run(value) at each step. An empty list means value is returned unchanged."
    solution: |
      def build_pipeline(steps):
          def process(value):
              for step in steps:
                  value = step.run(value)
              return value
          return process
