exercises:
  - id: abc-what-is-001
    concept: abstractions
    type: theory-quiz
    difficulty: 1
    prompt: "What does an abstraction (contract) describe in this concept?"
    choices:
      - id: a
        text: "A set of methods with known names and signatures without implementation: a shape that concrete classes conform to."
      - id: b
        text: "A ready-made class with full implementation that can be used immediately."
      - id: c
        text: "A way to speed up method calls by caching results."
      - id: d
        text: "A global variable through which all classes get a shared object."
    correct: [a]
    explanation: "An abstraction is a contract without implementation: the shape of the contact (methods and signatures) that high-level code depends on instead of a concrete class."
    variants:
      - prompt: "Why should high-level code depend on an abstraction rather than a concrete class?"
        choices:
          - id: a
            text: "So any implementation that fits the contract can be plugged in without changing that code."
          - id: b
            text: "So the code runs faster by skipping type checks."
          - id: c
            text: "To forbid creating more than one implementation of the contract."
          - id: d
            text: "So concrete classes cannot have their own methods."
        correct: [a]
        explanation: "The contract defines the shape; any implementation with a matching shape connects without changing the consumer: that is the benefit of depending on an abstraction."
      - prompt: "What is the abstraction compared to in this concept's mental model?"
        choices:
          - id: a
            text: "A socket: it defines the shape of the contact, and which device gets plugged in is not its concern."
          - id: b
            text: "A wire that rigidly connects two specific devices."
          - id: c
            text: "A battery that is itself the source of behavior."
          - id: d
            text: "A fuse that disconnects incompatible classes."
        correct: [a]
        explanation: "The socket defines the shape of the contact; any device of the right shape works, and consumer code is written once and does not change when you swap devices."

  - id: abc-vs-protocol-001
    concept: abstractions
    type: theory-quiz
    difficulty: 2
    prompt: "How does `typing.Protocol` differ from `abc.ABC` when describing a contract?"
    choices:
      - id: a
        text: "Protocol checks shape (set of methods) structurally, no inheritance required; ABC requires explicit inheritance and checks the contract at runtime."
      - id: b
        text: "Protocol requires explicit inheritance, and ABC checks only shape."
      - id: c
        text: "They are identical; the difference is only the import name."
      - id: d
        text: "Protocol works only with functions; ABC only with classes."
    correct: [a]
    explanation: "ABC asks 'are you my subclass?' and checks that when creating an instance. Protocol asks 'do you have the required methods?': shape match, checked statically, without inheritance."
    variants:
      - prompt: "When is `typing.Protocol` more convenient than `abc.ABC`?"
        choices:
          - id: a
            text: "When you need to fit a foreign or independent class to a contract that you cannot make inherit from your base."
          - id: b
            text: "When you need to guaranteed forbid instance creation at runtime."
          - id: c
            text: "When the contract always has exactly one implementation."
          - id: d
            text: "When the implementation must explicitly know about the contract."
        correct: [a]
        explanation: "Protocol checks shape, not lineage, so it fits classes from third-party libraries that you cannot make inherit from your contract."
      - prompt: "Which statement about `abc.ABC` is true?"
        choices:
          - id: a
            text: "You cannot create an instance of a class with an unimplemented @abstractmethod: Python raises TypeError when calling the constructor."
          - id: b
            text: "An abstract class can be instantiated; the error appears only on the first method call."
          - id: c
            text: "@abstractmethod must contain ready business logic."
          - id: d
            text: "A subclass is not required to override abstract methods."
        correct: [a]
        explanation: "ABCMeta blocks instance creation while unimplemented abstract methods remain; the error comes early, at object creation."

  - id: abc-instantiate-predict-001
    concept: abstractions
    type: predict-output
    difficulty: 2
    prompt: "What will this program print?"
    snippet: |
      from abc import ABC, abstractmethod

      class Storage(ABC):
          @abstractmethod
          def save(self, data): ...

      class FileStorage(Storage):
          def save(self, data):
              self.last = data

      fs = FileStorage()
      fs.save("report")
      print(fs.last)
    expected:
      kind: stdout
      value: "report"
    hints:
      - "FileStorage overrode the only abstract method, so the contract is satisfied. What happens when you create an instance and call save?"
    variants:
      - snippet: |
          from abc import ABC, abstractmethod

          class Storage(ABC):
              @abstractmethod
              def save(self, data): ...

          class MemoryStorage(Storage):
              def __init__(self):
                  self.items = []
              def save(self, data):
                  self.items.append(data)

          m = MemoryStorage()
          m.save("a")
          m.save("b")
          print(m.items)
        expected:
          kind: stdout
          value: "['a', 'b']"
      - snippet: |
          from abc import ABC, abstractmethod

          class Channel(ABC):
              @abstractmethod
              def send(self, text): ...

          class ConsoleChannel(Channel):
              def send(self, text):
                  print("console:", text)

          ConsoleChannel().send("hello")
        expected:
          kind: stdout
          value: "console: hello"

  - id: abc-register-predict-001
    concept: abstractions
    type: predict-output
    difficulty: 3
    prompt: "What will this program print?"
    snippet: |
      from abc import ABC, abstractmethod

      class Storage(ABC):
          @abstractmethod
          def save(self, data): ...

      class Sneaky:
          pass

      Storage.register(Sneaky)
      print(isinstance(Sneaky(), Storage))
    expected:
      kind: stdout
      value: "True"
    hints:
      - "register declares a class a 'virtual subclass' of the ABC. What is actually checked: presence of save or just the fact of registration?"
      - "isinstance against ABC answers 'did the class declare itself compatible?', not 'does the class really implement everything needed?'. Sneaky has no save method: was that checked?"

  - id: abc-broken-predict-001
    concept: abstractions
    type: predict-output
    difficulty: 3
    prompt: "What will this program print?"
    snippet: |
      from abc import ABC, abstractmethod

      class Storage(ABC):
          @abstractmethod
          def save(self, data): ...

      class Broken(Storage):
          pass

      try:
          Broken()
      except TypeError:
          print("cannot create")
    expected:
      kind: stdout
      value: "cannot create"
    hints:
      - "Broken claimed to be Storage but did not implement save. When does Python notice: at class declaration, at object creation, or on the first call to save?"
      - "ABCMeta blocks instance creation while abstract methods remain unimplemented. So the constructor raises TypeError, and except catches it."

  - id: abc-fill-contract-001
    concept: abstractions
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the abstract contract declaration for `Storage` with a required `save` method."
    template: |
      from abc import ABC, {{decorator}}

      class Storage(ABC):
          @{{decorator}}
          def save(self, data) -> None:
              ...
    blanks:
      decorator:
        accept: ["abstractmethod"]
    hints:
      - "A contract describes shape, not behavior: the method is declared but must be overridden in subclasses. Which decorator makes a method mandatory?"
    variants:
      - prompt: "Complete class `FileStorage` that implements contract `Storage` and explicitly inherits from it."
        template: |
          class FileStorage({{base}}):
              def {{method}}(self, data) -> None:
                  self.last = data
        blanks:
          base:
            accept: ["Storage"]
          method:
            accept: ["save"]
      - prompt: "Complete the structural contract `Mailer` using typing."
        template: |
          from typing import {{proto}}

          class Mailer({{proto}}):
              def send(self, to: str, text: str) -> None:
                  ...
        blanks:
          proto:
            accept: ["Protocol"]

  - id: abc-implements-protocol-001
    concept: abstractions
    type: python-function
    difficulty: 2
    prompt: "Implement `class MemoryStorage` with method `save(data)` that accumulates passed values in list `self.items`, and method `count()` returning the number of saved elements."
    starter: |
      class MemoryStorage:
          def __init__(self):
              ...
          def save(self, data):
              ...
          def count(self):
              ...
    cases:
      - call: "(lambda s: (s.save('a'), s.save('b'), s.count())[-1])(MemoryStorage())"
        expect: 2
      - call: "MemoryStorage().count()"
        expect: 0
      - call: "(lambda s: (s.save('x'), s.items)[-1])(MemoryStorage())"
        expect: ["x"]
    hints:
      - "MemoryStorage is a concrete implementation of a storage contract. What do you need in __init__ so save has somewhere to put data?"
      - "save adds one element to the list; count returns its length. Keep state in self.items."
    solution: |
      class MemoryStorage:
          def __init__(self):
              self.items = []
          def save(self, data):
              self.items.append(data)
          def count(self):
              return len(self.items)
    variants:
      - prompt: "Implement `class CountingStorage` with method `save(data)` that stores nothing but increments counter `self.saved` by one, and method `count()` returning the current counter value."
        cases:
          - call: "(lambda s: (s.save('a'), s.save('b'), s.save('c'), s.count())[-1])(CountingStorage())"
            expect: 3
          - call: "CountingStorage().count()"
            expect: 0
          - call: "(lambda s: (s.save('x'), s.saved)[-1])(CountingStorage())"
            expect: 1
        solution: |
          class CountingStorage:
              def __init__(self):
                  self.saved = 0
              def save(self, data):
                  self.saved += 1
              def count(self):
                  return self.saved
      - prompt: "Implement `class LastStorage` with method `save(data)` that remembers only the last saved value in `self.last`, and method `count()` returning 1 if anything was saved, otherwise 0."
        starter: |
          class LastStorage:
              def __init__(self):
                  ...
              def save(self, data):
                  ...
              def count(self):
                  ...
        cases:
          - call: "(lambda s: (s.save('a'), s.save('b'), s.last)[-1])(LastStorage())"
            expect: "b"
          - call: "LastStorage().count()"
            expect: 0
          - call: "(lambda s: (s.save('x'), s.count())[-1])(LastStorage())"
            expect: 1
        solution: |
          class LastStorage:
              def __init__(self):
                  self.last = None
                  self._has = False
              def save(self, data):
                  self.last = data
                  self._has = True
              def count(self):
                  return 1 if self._has else 0

  - id: abc-duck-consumer-001
    concept: abstractions
    type: python-function
    difficulty: 4
    prompt: "Implement `make_backup(storage, data)`: call `save(data)` on the passed `storage` and return `data`. The function must not know the concrete type of storage: any object with a `save` method will do. This is a consumer that depends only on the shape of the contract."
    starter: |
      def make_backup(storage, data):
          ...
    cases:
      - call: "make_backup(type('S', (), {'saved': None, 'save': lambda self, d: setattr(self, 'saved', d)})(), 'report')"
        expect: "report"
      - call: "(lambda box: (make_backup(type('S', (), {'save': lambda self, d: box.append(d)})(), 'x'), box)[-1])([])"
        expect: ["x"]
      - call: "make_backup(type('S', (), {'save': lambda self, d: None})(), 42)"
        expect: 42
    hints:
      - "The consumer depends on contract shape, not lineage: the type of storage does not matter, only that the required method exists. No isinstance or type checks here."
      - "The function has two duties in strict order: side effect first (save through the dependency), then the result. Which should be the return value?"
    solution: |
      def make_backup(storage, data):
          storage.save(data)
          return data
