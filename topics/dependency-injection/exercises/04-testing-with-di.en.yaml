exercises:
  - id: test-why-di-001
    concept: testing-with-di
    type: theory-quiz
    difficulty: 1
    prompt: "Why does DI make a class easy to test?"
    choices:
      - id: a
        text: "The dependency comes from outside, so the test substitutes a double without editing the class itself."
      - id: b
        text: "DI automatically generates tests for every method of the class."
      - id: c
        text: "DI disables real email sending in all environments."
      - id: d
        text: "DI speeds up test execution by caching results."
    correct: [a]
    explanation: "When the dependency is injected from outside, the test passes a fake implementation through the constructor and verifies behavior without touching the class code or patching its internals."
    variants:
      - prompt: "What does a good test verify on properly designed (DI-based) code?"
        choices:
          - id: a
            text: "Observable behavior at the contract boundary — for example, that the service called send with the right address."
          - id: b
            text: "Private internal attributes — for example, that self._flag = True was assigned inside."
          - id: c
            text: "Network speed during real email sending."
          - id: d
            text: "That the class contains no private methods."
        correct: [a]
        explanation: "Behavior at the contract boundary survives refactoring; checking private internals breaks the test on harmless changes that do not affect observable behavior."
      - prompt: "If the mail client is created inside the service, what two bad options remain for the test?"
        choices:
          - id: a
            text: "Either really send mail (slow and unreliable) or patch the service's internals."
          - id: b
            text: "Either delete the send method or rewrite the entire service from scratch."
          - id: c
            text: "Either wait for the server response or disconnect the machine from the internet."
          - id: d
            text: "Either run the test twice or ignore its result."
        correct: [a]
        explanation: "A hard-wired dependency leaves only real sending or patching internals — both signal code not designed for testing."

  - id: test-doubles-001
    concept: testing-with-di
    type: theory-quiz
    difficulty: 2
    prompt: "How does a spy differ from a stub among test doubles?"
    choices:
      - id: a
        text: "A stub returns a preset value and nothing more; a spy also records every call for later verification."
      - id: b
        text: "A spy returns a fixed answer; a stub records calls."
      - id: c
        text: "They are identical; the difference is only the name."
      - id: d
        text: "A stub works only in FastAPI; a spy only in plain classes."
    correct: [a]
    explanation: "A stub simply stays out of the way with a plausible answer. A spy does the same but also accumulates calls (for example in self.sent) so the test can verify how the service called the dependency."
    variants:
      - prompt: "What is the danger of `MagicMock` without the `spec` parameter?"
        choices:
          - id: a
            text: "It silently swallows a typo in a method name (snd instead of send) and hides the bug instead of raising AttributeError."
          - id: b
            text: "It always fails on any method access."
          - id: c
            text: "It automatically sends real network requests."
          - id: d
            text: "It forbids checking whether a method was called."
        correct: [a]
        explanation: "MagicMock returns a new mock on any call, so a typo passes silently. spec=Mailer limits the mock to the real contract's shape and catches such errors."
      - prompt: "When should you prefer a hand-written fake over a mock?"
        choices:
          - id: a
            text: "When the dependency must work (the test relies on meaningful data from it) and one substitute serves many tests."
          - id: b
            text: "When you need to record only the fact and form of a single call."
          - id: c
            text: "When the test must hit a real database."
          - id: d
            text: "Fake is always preferred; mock must never be used."
        correct: [a]
        explanation: "A fake (for example an in-memory repository) is good when you need a working dependency reused across tests. Use mock to record the fact and shape of interaction."

  - id: test-predict-spy-001
    concept: testing-with-di
    type: predict-output
    difficulty: 2
    prompt: "What will this program print?"
    snippet: |
      class SpyMailer:
          def __init__(self):
              self.sent = []
          def send(self, to, text):
              self.sent.append((to, text))

      class OrderService:
          def __init__(self, mailer):
              self.mailer = mailer
          def place(self, customer):
              self.mailer.send(customer, "Order accepted")

      spy = SpyMailer()
      OrderService(spy).place("ana@example.com")
      print(spy.sent)
    expected:
      kind: stdout
      value: "[('ana@example.com', 'Order accepted')]"
    hints:
      - "The spy records each send call as tuple (to, text). How many times did place call send and with what arguments?"
    variants:
      - snippet: |
          class SpyMailer:
              def __init__(self):
                  self.sent = []
              def send(self, to, text):
                  self.sent.append((to, text))

          class OrderService:
              def __init__(self, mailer):
                  self.mailer = mailer
              def place(self, customer):
                  self.mailer.send(customer, "Order accepted")

          spy = SpyMailer()
          service = OrderService(spy)
          service.place("ana")
          service.place("boris")
          print(len(spy.sent))
        expected:
          kind: stdout
          value: "2"
      - snippet: |
          class SpyMailer:
              def __init__(self):
                  self.sent = []
              def send(self, to, text):
                  self.sent.append((to, text))

          spy = SpyMailer()
          print(spy.sent)
        expected:
          kind: stdout
          value: "[]"

  - id: test-predict-mock-001
    concept: testing-with-di
    type: predict-output
    difficulty: 3
    prompt: "What will this program print?"
    snippet: |
      from unittest.mock import MagicMock

      mailer = MagicMock()
      mailer.snd("ana", "hello")
      print(mailer.snd.called)
      print(mailer.send.called)
    expected:
      kind: stdout
      value: "True\nFalse"
    hints:
      - "MagicMock creates a new mock on any attribute access and does not fail. What happens to snd.called after calling snd, and was send touched at all?"
      - "This illustrates a typo: snd was called instead of send. The mock happily swallowed a nonexistent method. Which two .called flags will print?"

  - id: test-fill-spy-001
    concept: testing-with-di
    type: fill-in-blanks
    difficulty: 2
    prompt: "Complete the spy double that records every send call in a list."
    template: |
      class SpyMailer:
          def __init__(self):
              self.sent = {{init}}
          def send(self, to, text):
              self.sent.{{op}}((to, text))
    blanks:
      init:
        accept: ["[]", "list()"]
      op:
        accept: ["append"]
    hints:
      - "A spy accumulates calls: it needs an empty container in the constructor and an add operation on each send. What to add and where?"
    variants:
      - prompt: "Complete FastAPI dependency substitution via dependency_overrides."
        template: |
          def get_db():
              return real_db

          def fake_db():
              return {"users": ["test-user"]}

          app.dependency_overrides[{{orig}}] = {{fake}}
        blanks:
          orig:
            accept: ["get_db"]
          fake:
            accept: ["fake_db"]
      - prompt: "Complete cleanup after a FastAPI test so overrides do not leak into other tests."
        template: |
          app.dependency_overrides.{{method}}()
        blanks:
          method:
            accept: ["clear"]

  - id: test-build-spy-001
    concept: testing-with-di
    type: python-function
    difficulty: 3
    prompt: "Implement `class SpyMailer` with method `send(to, text)` that records each call as tuple `(to, text)` in list `self.sent`, and method `count_to(addr)` returning how many times mail was sent to address `addr`."
    starter: |
      class SpyMailer:
          def __init__(self):
              ...
          def send(self, to, text):
              ...
          def count_to(self, addr):
              ...
    cases:
      - call: "SpyMailer().count_to('ana')"
        expect: 0
      - call: "(lambda s: (s.send('ana', 'x'), s.send('ana', 'y'), s.send('bob', 'z'), s.count_to('ana'))[-1])(SpyMailer())"
        expect: 2
      - call: "(lambda s: (s.send('ana', 'x'), [list(t) for t in s.sent])[-1])(SpyMailer())"
        expect: [["ana", "x"]]
    hints:
      - "A spy does not just answer — it accumulates calls so the test can verify interaction. What do you need in __init__ for send to write to?"
      - "send appends tuple (to, text) to self.sent. count_to counts entries whose first element equals addr."
    solution: |
      class SpyMailer:
          def __init__(self):
              self.sent = []
          def send(self, to, text):
              self.sent.append((to, text))
          def count_to(self, addr):
              return sum(1 for to, text in self.sent if to == addr)

  - id: test-override-challenge-001
    concept: testing-with-di
    type: python-function
    difficulty: 5
    prompt: "Implement `with_override(overrides, registry, key)`: return the implementation for key from dict overrides if present, otherwise from registry. This is the core of a mechanism like dependency_overrides: override wins over original without touching registry itself. If the key is missing everywhere, return None."
    starter: |
      def with_override(overrides, registry, key):
          ...
    cases:
      - call: "with_override({}, {'db': 'real'}, 'db')"
        expect: "real"
      - call: "with_override({'db': 'fake'}, {'db': 'real'}, 'db')"
        expect: "fake"
      - call: "with_override({'mailer': 'spy'}, {'db': 'real'}, 'db')"
        expect: "real"
      - call: "with_override({}, {}, 'missing')"
        expect: null
    hints:
      - "Override has priority over original, like app.dependency_overrides shadowing the source dependency. Where do you look first?"
      - "First check overrides by key; if missing, check registry; if still missing, return None. registry itself is not modified."
    solution: |
      def with_override(overrides, registry, key):
          if key in overrides:
              return overrides[key]
          return registry.get(key)
