conceptId: functions
cards:
  - id: functions-01
    front: "Зачем в программе нужны функции?"
    back: "Функция даёт имя куску логики: шаги описываются один раз, а вызываются по имени сколько угодно раз с разными аргументами. Это избавляет от копирования одинакового кода и упрощает исправление ошибок: править нужно в одном месте."
    tags: [basics]
  - id: functions-02
    front: "Из чего состоит объявление функции в Python?"
    back: "Из заголовка и тела. Заголовок: слово def, имя функции, параметры в круглых скобках и двоеточие. Тело пишется ниже с отступом и выполняется не при объявлении, а только при вызове."
    tags: [syntax]
  - id: functions-03
    front: "Чем параметр отличается от аргумента?"
    back: "Параметр это имя в скобках объявления, например name в def greet(name). Аргумент это конкретное значение, переданное при вызове, например greet(«Анна»). Параметры объявляются один раз, аргументы меняются от вызова к вызову."
    tags: [syntax]
  - id: functions-04
    front: "Чем return отличается от print?"
    back: "print показывает значение человеку в консоли, программе оно не достаётся. return отдаёт значение программе: его можно сохранить в переменную, сравнить или передать в другую функцию. Функция-вычислитель возвращает, а печатает пусть вызывающий код."
    tags: [return]
  - id: functions-05
    front: "Что вернёт вызов функции, в которой нет return?"
    back: "None, специальное значение «здесь пусто». Правило без исключений: даже если внутри функции есть print, печать не заменяет возврат, и вызов всё равно даст None."
    tags: [return, none]
  - id: functions-06
    front: "Что происходит с кодом, стоящим после сработавшего return?"
    back: "Он не выполняется никогда: return немедленно завершает функцию. Поэтому несколько return в разных ветках if это удобный стиль раннего выхода: каждая ветка сама отвечает за свой результат."
    tags: [return, control-flow]
  - id: functions-07
    front: "Как работают параметры по умолчанию и именованные аргументы?"
    back: "Заголовок def greet(name, polite=True) делает polite необязательным: без аргумента подставится умолчание. При вызове аргумент можно передать по имени, greet(«Анна», polite=False), и вызов станет читаемее. В заголовке параметры с умолчаниями идут после обязательных."
    tags: [defaults, arguments]
  - id: functions-08
    front: "Где живут переменные, созданные внутри функции?"
    back: "Только внутри функции и только пока длится один вызов: обращение к ним снаружи даёт NameError. Наружу значение выносит return. Зону, где имя существует, называют областью видимости."
    tags: [scope]
