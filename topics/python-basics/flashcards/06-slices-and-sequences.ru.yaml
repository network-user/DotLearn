conceptId: slices-and-sequences
cards:
  - id: slice-01
    front: "Что означают start и stop в срезе seq[start:stop]?"
    back: "start это первый индекс, который войдёт в результат, stop это граница, которая в результат никогда не входит - ровно то же правило, что у range из урока про циклы."
    tags: [slice, range]
  - id: slice-02
    front: "Что вернут purchases[:3], purchases[3:] и purchases[:]?"
    back: "Пропущенный start значит «с самого начала», пропущенный stop значит «до конца». purchases[:] с обеими границами пропущенными строит настоящую независимую копию списка, а не вторую бирку на тот же объект."
    tags: [slice, copy]
  - id: slice-03
    front: "Как получить последние три элемента списка одним срезом?"
    back: "purchases[-3:]: отрицательный индекс внутри среза отсчитывает позиции с конца, а пустой stop значит «до самого конца»."
    tags: [slice, negative-index]
  - id: slice-04
    front: "Что делает третий параметр среза, seq[start:stop:step]?"
    back: "Задаёт шаг обхода: step, равный 2, берёт каждый второй элемент. seq[::2] проходит весь список с шагом два, начиная с индекса 0."
    tags: [slice, step]
  - id: slice-05
    front: "Как одним срезом развернуть строку или список задом наперёд?"
    back: "seq[::-1]: отрицательный шаг меняет направление обхода на противоположное, а без явных границ это разворачивает всю последовательность целиком."
    tags: [slice, step, reverse]
  - id: slice-06
    front: "Чем кортеж отличается от списка?"
    back: "Кортеж, point = (55, 75), это неизменяемая последовательность: после создания значения внутри поменять нельзя, попытка point[0] = 60 даёт TypeError. Список берут, когда данные должны меняться."
    tags: [tuple, immutability]
  - id: slice-07
    front: "Что произойдёт при purchases[100:200], если в списке всего три элемента?"
    back: "Ничего страшного: срез никогда не бросает IndexError. Границы молча подрезаются до реальных пределов списка, и результатом станет пустой список [], без единой ошибки."
    tags: [slice, errors]
  - id: slice-08
    front: "Что общего у строк, списков и кортежей?"
    back: "Все три - последовательности: индексы с нуля, длина через len(), перебор по порядку и срезы по одинаковым правилам границ. Выучив срез один раз, вы получаете его сразу для всех трёх типов."
    tags: [sequence]
