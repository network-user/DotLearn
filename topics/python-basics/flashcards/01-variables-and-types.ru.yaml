conceptId: variables-and-types
cards:
  - id: variables-and-types-01
    front: "Что делает строка кода price = 450?"
    back: "Создаёт объект 450 и приклеивает к нему имя-наклейку price. Знак = это присваивание, а не проверка равенства: справа значение, слева имя. Само значение живёт в памяти отдельно от имени."
    tags: [variables, assignment]
  - id: variables-and-types-02
    front: "Что происходит при повторном присваивании, например balance = 1000, затем balance = 750?"
    back: "Имя переклеивается на новое значение: balance теперь ведёт к 750, а связь со старым значением исчезает. Python не хранит историю присваиваний, имя всегда указывает на последнее значение."
    tags: [variables, assignment]
  - id: variables-and-types-03
    front: "Какие четыре типа данных нужны для старта в Python?"
    back: "int это целые числа (450, 0), float это дробные с точкой (3.5), str это текст в кавычках (\"Анна\"), bool это логический тип всего с двумя значениями, True и False."
    tags: [types]
  - id: variables-and-types-04
    front: "Как узнать тип значения в Python?"
    back: "Функцией type(): вызов type(450) вернёт int, а type(\"450\") вернёт str, потому что кавычки делают запись текстом, даже если внутри одни цифры."
    tags: [types, introspection]
  - id: variables-and-types-05
    front: "Чем оператор / отличается от //?"
    back: "Деление / всегда возвращает float, даже при делении нацело: 6 / 2 даст 3.0. Оператор // делит с отбрасыванием дробной части и даёт целое: 7 // 2 это 3, а остаток от деления возвращает %."
    tags: [arithmetic]
  - id: variables-and-types-06
    front: "Как превратить строку \"5\" в число, а число 5 в строку?"
    back: "int(\"5\") вернёт целое 5, float(\"3.5\") вернёт дробное 3.5, а str(5) сделает из числа строку \"5\". Преобразование необходимо, когда данные приходят в программу текстом."
    tags: [conversion]
  - id: variables-and-types-07
    front: "Почему выражение \"5\" + 5 вызывает ошибку и какую именно?"
    back: "TypeError: Python отказывается смешивать строку и число, потому что не знает, склеить их в «55» или сложить в 10. Сначала приведите оба значения к одному типу: int(\"5\") + 5 или \"5\" + str(5)."
    tags: [errors, conversion]
  - id: variables-and-types-08
    front: "Каким правилам подчиняются имена переменных в Python?"
    back: "Латинские буквы, цифры и подчёркивание; первым символом цифра быть не может. Принятый стиль snake_case: слова маленькими буквами через подчёркивание, например delivery_price. Регистр значим: Price и price это разные имена."
    tags: [naming, style]
