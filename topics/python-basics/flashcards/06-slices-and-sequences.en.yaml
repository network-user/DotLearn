conceptId: slices-and-sequences
cards:
  - id: slice-01
    front: "What do start and stop mean in the slice seq[start:stop]?"
    back: "start is the first index included in the result, stop is the boundary that is never included in the result - the exact same rule as range from the loops lesson."
    tags: [slice, range]
  - id: slice-02
    front: "What do purchases[:3], purchases[3:], and purchases[:] return?"
    back: 'A missing start means "from the very beginning", a missing stop means "to the end". purchases[:] with both boundaries omitted builds a real independent copy of the list, not a second label on the same object.'
    tags: [slice, copy]
  - id: slice-03
    front: "How do you get a list's last three elements with a single slice?"
    back: 'purchases[-3:]: a negative index inside a slice counts positions from the end, and an empty stop means "all the way to the end".'
    tags: [slice, negative-index]
  - id: slice-04
    front: "What does the third parameter of a slice do, seq[start:stop:step]?"
    back: "It sets the stride: a step of 2 takes every other element. seq[::2] walks the whole list with a stride of two, starting at index 0."
    tags: [slice, step]
  - id: slice-05
    front: "How do you reverse a string or list back to front with a single slice?"
    back: "seq[::-1]: a negative step reverses the direction of the walk, and with no explicit boundaries it reverses the whole sequence."
    tags: [slice, step, reverse]
  - id: slice-06
    front: "How does a tuple differ from a list?"
    back: "A tuple, point = (55, 75), is an immutable sequence: once created, its values cannot change, attempting point[0] = 60 gives TypeError. Use a list when the data needs to change."
    tags: [tuple, immutability]
  - id: slice-07
    front: "What happens with purchases[100:200] if the list only has three elements?"
    back: "Nothing bad: a slice never raises IndexError. The boundaries are silently clamped to the list's real limits, and the result is an empty list [], with no error at all."
    tags: [slice, errors]
  - id: slice-08
    front: "What do strings, lists, and tuples have in common?"
    back: "All three are sequences: zero-based indices, a length via len(), in-order iteration, and slices with the same boundary rules. Learn slicing once, and you get it for all three types at once."
    tags: [sequence]
