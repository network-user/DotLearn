conceptId: conditions
cards:
  - id: conditions-01
    front: "Как Python понимает, какие строки входят в тело if?"
    back: "По отступу: тело сдвинуто вправо ровно на 4 пробела. Отступ в Python это часть синтаксиса, а не оформление: строка без отступа уже не принадлежит блоку и выполняется всегда. Сама строка с if обязательно заканчивается двоеточием."
    tags: [syntax, indentation]
  - id: conditions-02
    front: "Как выполняется цепочка if/elif/else?"
    back: "Сверху вниз до первого истинного условия: выполняется только эта ветка, остальные пропускаются, даже если их условия тоже истинны. else срабатывает, когда все проверки выше дали False."
    tags: [elif, branching]
  - id: conditions-03
    front: "Чем = отличается от ==?"
    back: "Один знак присваивает: age = 18 кладёт число в переменную. Два знака сравнивают: age == 18 возвращает True или False. Одиночное = внутри условия if недопустимо, Python ответит SyntaxError."
    tags: [comparison, syntax]
  - id: conditions-04
    front: "Что делают операторы and, or и not?"
    back: "and даёт истину, только когда истинны оба условия; or, когда истинно хотя бы одно; not переворачивает ответ на противоположный. Ими соединяют несколько сравнений в одно условие."
    tags: [logic, operators]
  - id: conditions-05
    front: "Какие значения Python считает ложью в условии if?"
    back: "Пустую строку '', ноль (0 и 0.0) и пустые коллекции вроде пустого списка []. Всё непустое и ненулевое считается истиной, поэтому if name: читается «если строка name заполнена»."
    tags: [truthiness]
  - id: conditions-06
    front: "Как проверить, что age лежит в диапазоне от 18 до 59 включительно, одним сравнением?"
    back: "Двойным сравнением 18 <= age < 60: Python читает его как в математике. Это то же самое, что age >= 18 and age < 60, только короче; во многих других языках такая запись не работает."
    tags: [comparison, ranges]
  - id: conditions-07
    front: "Что вернёт сравнение '5' == 5 и почему?"
    back: "False, причём без всякой ошибки: строка и число это значения разных типов, и они не равны. Перед сравнением строку с цифрами преобразуют в число: int('5') == 5 даёт True."
    tags: [comparison, types]
  - id: conditions-08
    front: "Откуда берутся значения типа bool?"
    back: "Любое сравнение (==, !=, >, <, >=, <=) возвращает True или False, значения отдельного типа bool. Их можно класть в переменные и подставлять в if как готовые условия, без сравнения с True."
    tags: [bool, types]
