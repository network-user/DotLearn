conceptId: lists-and-dicts
cards:
  - id: listdict-01
    front: "Как устроен список и как узнать число его элементов?"
    back: "Список создаётся квадратными скобками и хранит значения по порядку: доступ по индексу с нуля, cart[0] это первый элемент. Количество элементов даёт len(cart)."
    tags: [list, indexing]
  - id: listdict-02
    front: "Какие три операции меняют список на месте?"
    back: ".append(x) дописывает элемент в конец, присваивание по индексу cart[i] = x заменяет элемент на этом месте, .remove(x) убирает первое вхождение значения x. Все три меняют тот же список, не создавая новый."
    tags: [list, mutation]
  - id: listdict-03
    front: "Почему нельзя писать cart = cart.append(x)?"
    back: "append меняет список на месте и возвращает None. Присваивание результата обратно в cart стирает список, заменяя его на None. Вызывайте cart.append(x) отдельной строкой, без присваивания."
    tags: [list, pitfalls]
  - id: listdict-04
    front: "Как проверить, есть ли значение в списке?"
    back: 'Оператором in: выражение "сыр" in cart вернёт True или False. not in делает обратную проверку - отсутствует ли значение в списке.'
    tags: [list, membership]
  - id: listdict-05
    front: "Как создать словарь и прочитать значение по ключу?"
    back: 'Словарь создаётся фигурными скобками с парами ключ:значение, phones = {"Анна": "111"}. Чтение через квадратные скобки с ключом, phones["Анна"], а если ключа нет - KeyError.'
    tags: [dict]
  - id: listdict-06
    front: "Чем phones.get(key, default) лучше phones[key] для необязательного ключа?"
    back: "get() возвращает запасное значение default, если ключа нет, вместо того чтобы остановить программу ошибкой KeyError. Квадратные скобки удобны, когда ключ точно есть."
    tags: [dict, get]
  - id: listdict-07
    front: "Что проверяет оператор in у словаря?"
    back: 'Только ключи: "Анна" in phones смотрит, есть ли такой ключ, а не такое значение. Даже если номер телефона лежит где-то в словаре, проверка по самому номеру даст False.'
    tags: [dict, membership]
  - id: listdict-08
    front: "Что произойдёт после b = a, если список a изменить через b?"
    back: "Изменение будет видно и через a: b = a не копирует список, а клеит вторую наклейку на тот же объект. Настоящую независимую копию делает b = a.copy()."
    tags: [aliasing, copy]
