conceptId: strings
cards:
  - id: strings-01
    front: "Как получить первый и последний символы строки s?"
    back: "Первый это s[0], нумерация индексов начинается с нуля. Последний удобнее всего брать как s[-1]: отрицательные индексы отсчитывают позиции с конца строки."
    tags: [indexing]
  - id: strings-02
    front: "Что возвращает len(s) и какой индекс у последнего символа?"
    back: "len(s) возвращает число символов в строке, включая пробелы и знаки препинания. Последний символ стоит на позиции len(s) - 1, потому что нумерация идёт с нуля."
    tags: [len]
  - id: strings-03
    front: 'Что делает f-строка f"Привет, {name}!"?'
    back: "Подставляет значение переменной name прямо в текст: буква f перед кавычками включает подстановку, а фигурные скобки помечают место вставки. Внутри скобок можно писать и целые выражения, например произведение цены на количество."
    tags: [f-strings]
  - id: strings-04
    front: "Что делают методы .strip(), .upper() и .lower()?"
    back: "strip() возвращает копию строки без пробелов по краям, upper() поднимает все буквы в верхний регистр, lower() опускает в нижний. Исходная строка при этом не меняется."
    tags: [methods]
  - id: strings-05
    front: "Что делают методы .replace() и .count()?"
    back: 'replace("Тверь", "Казань") возвращает новую строку, где все вхождения первой подстроки заменены второй. count("а") возвращает число вхождений подстроки с учётом регистра.'
    tags: [methods]
  - id: strings-06
    front: "Как проверить, встречается ли подстрока в строке?"
    back: 'Оператором in: выражение "Казань" in address вернёт True или False. Проверка чувствительна к регистру, поэтому строку часто заранее приводят к нижнему регистру через lower().'
    tags: [substring]
  - id: strings-07
    front: 'Почему s[0] = "х" вызывает ошибку и как всё же поменять строку?'
    back: "Строки в Python неизменяемы, присваивание по индексу даёт TypeError. Поменять строку можно только создав новую: вызвать метод вроде replace() или собрать f-строку и присвоить результат переменной."
    tags: [immutability]
  - id: strings-08
    front: "Когда у строки возникает IndexError?"
    back: "При обращении к несуществующей позиции: для строки из шести символов допустимы индексы от 0 до 5, а s[6] уже даёт IndexError. С отрицательной стороны граница это -len(s)."
    tags: [errors]
