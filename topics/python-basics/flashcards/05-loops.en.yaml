conceptId: loops
cards:
  - id: loops-01
    front: "What does a for loop do with a list?"
    back: "It runs the body once for every element: the loop variable takes on the list's elements in turn, from the first to the last. Once the elements run out, the program continues at the line after the body."
    tags: [for]
  - id: loops-02
    front: "Which numbers does range(5) yield, and why is that a surprise?"
    back: "Five numbers, starting at zero: 0, 1, 2, 3, 4. The surprise is that there is no 5: counting starts at zero, and the right boundary is excluded from the range."
    tags: [range]
  - id: loops-03
    front: "How do you get the numbers 3 through 7 inclusive with range?"
    back: "range(3, 8): the loop starts at 3, and since the right boundary is excluded, you write it one more than the last number you need."
    tags: [range]
  - id: loops-04
    front: "What is the accumulator pattern?"
    back: "A variable that is zeroed before the loop, topped up inside it, and read after it: total = 0, then total += x on every iteration. One pattern covers a sum, a count, a product, and string concatenation."
    tags: [accumulator, pattern]
  - id: loops-05
    front: "When do you need while instead of for?"
    back: "When you do not know in advance how many repeats you need, only the condition to keep going. while checks its condition before every iteration and runs while it is true."
    tags: [while]
  - id: loops-06
    front: "How does break differ from continue?"
    back: "break immediately ends the whole loop, execution continues after it. continue skips only the rest of the current iteration and moves to the next element."
    tags: [break, continue]
  - id: loops-07
    front: "How do you get an infinite while, and how do you avoid it?"
    back: "If the body never changes the variable in the condition, the condition stays true forever and the loop never ends. The body must contain a line that pushes the condition toward false: a growing counter, a shrinking remainder, a flipped flag."
    tags: [while, infinite-loop]
  - id: loops-08
    front: "What does a for loop iterate over on a string?"
    back: 'Individual characters, one per iteration: a string is a sequence of characters. The loop for ch in "Anna" runs four iterations.'
    tags: [for, strings]
