conceptId: strings
cards:
  - id: strings-01
    front: "How do you get the first and last characters of a string s?"
    back: "The first one is s[0], indexing starts at zero. The last one is easiest to grab as s[-1]: negative indices count positions from the end of the string."
    tags: [indexing]
  - id: strings-02
    front: "What does len(s) return, and what index does the last character have?"
    back: "len(s) returns the number of characters in the string, including spaces and punctuation. The last character sits at position len(s) - 1, because indexing starts at zero."
    tags: [len]
  - id: strings-03
    front: 'What does the f-string f"Hello, {name}!" do?'
    back: "Substitutes the value of the name variable right into the text: the letter f before the quotes turns on substitution, and curly braces mark the insertion point. You can also write whole expressions inside the braces, e.g. price times quantity."
    tags: [f-strings]
  - id: strings-04
    front: "What do the methods .strip(), .upper(), and .lower() do?"
    back: "strip() returns a copy of the string without the spaces at its edges, upper() raises every letter to uppercase, lower() drops them to lowercase. The original string does not change."
    tags: [methods]
  - id: strings-05
    front: "What do the methods .replace() and .count() do?"
    back: 'replace("Tver", "Kazan") returns a new string where every occurrence of the first substring is swapped for the second. count("a") returns the number of occurrences of the substring, case-sensitively.'
    tags: [methods]
  - id: strings-06
    front: "How do you check whether a substring occurs inside a string?"
    back: 'With the in operator: the expression "Kazan" in address returns True or False. The check is case-sensitive, so a string is often lowercased first with lower().'
    tags: [substring]
  - id: strings-07
    front: 'Why does s[0] = "x" raise an error, and how do you change a string anyway?'
    back: "Strings in Python are immutable, assigning by index gives TypeError. You can only change a string by creating a new one: call a method like replace() or build an f-string, and assign the result to the variable."
    tags: [immutability]
  - id: strings-08
    front: "When does a string raise IndexError?"
    back: "When you access a position that does not exist: for a six-character string, indices 0 through 5 are valid, and s[6] already gives IndexError. On the negative side, the boundary is -len(s)."
    tags: [errors]
