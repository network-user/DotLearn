conceptId: lists-and-dicts
cards:
  - id: listdict-01
    front: "How is a list built, and how do you find its element count?"
    back: "A list is created with square brackets and stores values in order: access by a zero-based index, cart[0] is the first element. len(cart) gives the number of elements."
    tags: [list, indexing]
  - id: listdict-02
    front: "Which three operations change a list in place?"
    back: ".append(x) adds an element to the end, assignment by index cart[i] = x replaces the element at that spot, .remove(x) drops the first occurrence of value x. All three change the same list, without creating a new one."
    tags: [list, mutation]
  - id: listdict-03
    front: "Why can't you write cart = cart.append(x)?"
    back: "append mutates the list in place and returns None. Assigning the result back into cart erases the list, replacing it with None. Call cart.append(x) as its own line, without an assignment."
    tags: [list, pitfalls]
  - id: listdict-04
    front: "How do you check whether a value is in a list?"
    back: 'With the in operator: the expression "cheese" in cart returns True or False. not in does the reverse check, whether a value is missing from the list.'
    tags: [list, membership]
  - id: listdict-05
    front: "How do you create a dictionary and read a value by key?"
    back: 'A dictionary is created with curly braces holding key:value pairs, phones = {"Anna": "111"}. Reading uses square brackets with the key, phones["Anna"], and if the key is missing you get KeyError.'
    tags: [dict]
  - id: listdict-06
    front: "Why is phones.get(key, default) better than phones[key] for an optional key?"
    back: "get() returns the fallback value default when the key is missing, instead of stopping the program with KeyError. Square brackets are convenient when the key is guaranteed to be there."
    tags: [dict, get]
  - id: listdict-07
    front: "What does the in operator check on a dictionary?"
    back: 'Only the keys: "Anna" in phones checks whether such a key exists, not such a value. Even if a phone number sits somewhere inside the dictionary, checking by that number gives False.'
    tags: [dict, membership]
  - id: listdict-08
    front: "What happens after b = a if you change list a through b?"
    back: "The change shows up through a too: b = a does not copy the list, it sticks a second label onto the same object. A real independent copy is made by b = a.copy()."
    tags: [aliasing, copy]
