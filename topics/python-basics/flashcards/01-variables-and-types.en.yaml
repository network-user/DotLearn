conceptId: variables-and-types
cards:
  - id: variables-and-types-01
    front: "What does the line price = 450 do?"
    back: "Creates the object 450 and sticks the name label price onto it. The = sign is assignment, not an equality check: the value is on the right, the name on the left. The value itself lives in memory separately from the name."
    tags: [variables, assignment]
  - id: variables-and-types-02
    front: "What happens on reassignment, e.g. balance = 1000, then balance = 750?"
    back: "The name is re-stuck onto the new value: balance now leads to 750, and the link to the old value is gone. Python does not keep an assignment history, a name always points to the latest value."
    tags: [variables, assignment]
  - id: variables-and-types-03
    front: "Which four data types do you need to get started in Python?"
    back: "int is whole numbers (450, 0), float is decimals with a dot (3.5), str is text in quotes (\"Anna\"), bool is the logical type with only two values, True and False."
    tags: [types]
  - id: variables-and-types-04
    front: "How do you find out a value's type in Python?"
    back: "With the type() function: type(450) returns int, and type(\"450\") returns str, because quotes make the value text, even when it is all digits inside."
    tags: [types, introspection]
  - id: variables-and-types-05
    front: "How does the / operator differ from //?"
    back: "Division / always returns a float, even when it divides evenly: 6 / 2 gives 3.0. The // operator divides and drops the fractional part, giving an integer: 7 // 2 is 3, and % returns the remainder."
    tags: [arithmetic]
  - id: variables-and-types-06
    front: "How do you turn the string \"5\" into a number, and the number 5 into a string?"
    back: "int(\"5\") returns the integer 5, float(\"3.5\") returns the float 3.5, and str(5) turns the number into the string \"5\". Conversion is needed whenever data arrives in the program as text."
    tags: [conversion]
  - id: variables-and-types-07
    front: "Why does the expression \"5\" + 5 raise an error, and which one?"
    back: "TypeError: Python refuses to mix a string and a number, because it does not know whether to glue them into \"55\" or add them into 10. Bring both values to the same type first: int(\"5\") + 5 or \"5\" + str(5)."
    tags: [errors, conversion]
  - id: variables-and-types-08
    front: "What rules govern variable names in Python?"
    back: "Latin letters, digits, and underscores; the first character cannot be a digit. The accepted style is snake_case: lowercase words joined by underscores, e.g. delivery_price. Case matters: Price and price are different names."
    tags: [naming, style]
