conceptId: conditions
cards:
  - id: conditions-01
    front: "How does Python know which lines belong to an if's body?"
    back: "By indentation: the body is shifted right by exactly 4 spaces. Indentation in Python is part of the syntax, not just formatting: a line without indentation no longer belongs to the block and always runs. The if line itself must end with a colon."
    tags: [syntax, indentation]
  - id: conditions-02
    front: "How does an if/elif/else chain run?"
    back: "Top to bottom, until the first true condition: only that branch runs, the rest are skipped, even if their conditions are also true. else fires when every check above gave False."
    tags: [elif, branching]
  - id: conditions-03
    front: "How does = differ from ==?"
    back: "A single sign assigns: age = 18 puts a number into a variable. Two signs compare: age == 18 returns True or False. A single = inside an if condition is invalid, Python raises SyntaxError."
    tags: [comparison, syntax]
  - id: conditions-04
    front: "What do the operators and, or, and not do?"
    back: "and is true only when both conditions are true; or is true when at least one is; not flips the answer to its opposite. They combine several comparisons into one condition."
    tags: [logic, operators]
  - id: conditions-05
    front: "Which values does Python treat as false in an if condition?"
    back: "The empty string '', zero (0 and 0.0), and empty collections like an empty list []. Everything non-empty and non-zero counts as true, so if name: reads as 'if the string name is filled in'."
    tags: [truthiness]
  - id: conditions-06
    front: "How do you check that age falls between 18 and 59 inclusive with one comparison?"
    back: "A chained comparison, 18 <= age < 60: Python reads it the way math does. It is the same as age >= 18 and age < 60, only shorter; this notation does not work in many other languages."
    tags: [comparison, ranges]
  - id: conditions-07
    front: "What does the comparison '5' == 5 return, and why?"
    back: "False, with no error at all: a string and a number are values of different types, and they are not equal. Convert the digit string to a number before comparing: int('5') == 5 gives True."
    tags: [comparison, types]
  - id: conditions-08
    front: "Where do bool values come from?"
    back: "Any comparison (==, !=, >, <, >=, <=) returns True or False, values of their own type bool. You can store them in variables and drop them into an if as ready-made conditions, without comparing to True."
    tags: [bool, types]
