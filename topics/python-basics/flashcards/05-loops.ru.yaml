conceptId: loops
cards:
  - id: loops-01
    front: "Что делает цикл for со списком?"
    back: "Выполняет тело один раз для каждого элемента: переменная цикла по очереди получает элементы списка, от первого до последнего. Когда элементы заканчиваются, программа продолжается со строки после тела."
    tags: [for]
  - id: loops-02
    front: "Какие числа выдаёт range(5) и почему это сюрприз?"
    back: "Пять чисел, начиная с нуля: 0, 1, 2, 3, 4. Сюрприз в том, что пятёрки нет: счёт идёт с нуля, а правая граница в диапазон не входит."
    tags: [range]
  - id: loops-03
    front: "Как через range получить числа от 3 до 7 включительно?"
    back: "range(3, 8): цикл начнёт с 3, а правая граница не входит, поэтому её пишут на единицу больше последнего нужного числа."
    tags: [range]
  - id: loops-04
    front: "Что такое паттерн накопителя?"
    back: "Переменная, которую обнуляют до цикла, пополняют внутри и читают после: total = 0, затем total += x на каждом витке. Один шаблон закрывает сумму, количество, произведение и склейку строк."
    tags: [accumulator, pattern]
  - id: loops-05
    front: "Когда нужен while вместо for?"
    back: "Когда заранее неизвестно, сколько повторений понадобится, а известно только условие продолжения. while проверяет условие перед каждым витком и работает, пока оно истинно."
    tags: [while]
  - id: loops-06
    front: "Чем break отличается от continue?"
    back: "break немедленно завершает весь цикл, выполнение продолжается после него. continue пропускает только остаток текущего витка и переходит к следующему элементу."
    tags: [break, continue]
  - id: loops-07
    front: "Как получается бесконечный while и как его избежать?"
    back: "Если тело не меняет переменную из условия, условие навсегда остаётся истинным и цикл не заканчивается. В теле обязана быть строка, которая приближает условие к ложному: растущий счётчик, уменьшающийся остаток, смена флага."
    tags: [while, infinite-loop]
  - id: loops-08
    front: "Что перебирает for по строке?"
    back: "Отдельные символы, по одному на виток: строка это последовательность символов. Цикл for ch in \"Анна\" сделает четыре витка."
    tags: [for, strings]
