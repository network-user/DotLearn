conceptId: functions
cards:
  - id: functions-01
    front: "Why does a program need functions?"
    back: "A function gives a piece of logic a name: the steps are described once and called by name as many times as needed with different arguments. It saves you from copying the same code and makes fixing bugs easier: you fix it in one place."
    tags: [basics]
  - id: functions-02
    front: "What is a function declaration made of in Python?"
    back: "A header and a body. The header: the word def, the function name, parameters in parentheses, and a colon. The body is written below with indentation and runs not at declaration time, but only on a call."
    tags: [syntax]
  - id: functions-03
    front: "How does a parameter differ from an argument?"
    back: "A parameter is the name in the declaration's parentheses, e.g. name in def greet(name). An argument is the concrete value passed at call time, e.g. greet(\"Anna\"). Parameters are declared once, arguments change from call to call."
    tags: [syntax]
  - id: functions-04
    front: "How does return differ from print?"
    back: "print shows a value to a person in the console, the program never gets it. return hands the value to the program: it can be stored in a variable, compared, or passed to another function. A function that computes should return, and let the calling code print."
    tags: [return]
  - id: functions-05
    front: "What does calling a function without a return statement return?"
    back: "None, the special value for 'nothing here'. There are no exceptions to this rule: even if the function has a print inside, printing does not replace returning, and the call still gives None."
    tags: [return, none]
  - id: functions-06
    front: "What happens to code placed after a return that fires?"
    back: "It never runs: return immediately ends the function. That is why several returns in different if branches is a convenient style for an early exit: each branch owns its own result."
    tags: [return, control-flow]
  - id: functions-07
    front: "How do default parameters and keyword arguments work?"
    back: "The header def greet(name, polite=True) makes polite optional: without an argument, the default is used. At call time, an argument can be passed by name, greet(\"Anna\", polite=False), which makes the call more readable. In the header, parameters with defaults come after the required ones."
    tags: [defaults, arguments]
  - id: functions-08
    front: "Where do variables created inside a function live?"
    back: "Only inside the function, and only for the duration of one call: accessing them from outside gives NameError. return is what carries a value out. The zone where a name exists is called its scope."
    tags: [scope]
