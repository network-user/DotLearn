exercises:
  - id: vars-quiz-001
    concept: variables-and-types
    type: theory-quiz
    difficulty: 1
    prompt: "Борис выполнил три строки: x = 100, затем y = x, затем x = 200. Что напечатает print(y)?"
    choices:
      - id: a
        text: "100"
      - id: b
        text: "200"
      - id: c
        text: "300"
      - id: d
        text: "Программа упадёт с ошибкой."
    correct: [a]
    explanation: "Строка y = x приклеивает имя y к тому же объекту 100, а не копирует переменную. Дальнейшее присваивание x = 200 переклеивает только наклейку x; имя y продолжает указывать на 100."
    variants:
      - prompt: "Что вернёт вызов type(2.0)?"
        choices:
          - id: a
            text: "int"
          - id: b
            text: "float"
          - id: c
            text: "str"
          - id: d
            text: "bool"
        correct: [b]
        explanation: "Точка в записи 2.0 делает число дробным, поэтому его тип float. Целым int было бы значение 2, записанное без точки."
      - prompt: "Вера написала digits = \"100\" (в кавычках). Что вернёт type(digits)?"
        choices:
          - id: a
            text: "int"
          - id: b
            text: "str"
          - id: c
            text: "float"
          - id: d
            text: "bool"
        correct: [b]
        explanation: "Кавычки превращают запись в текст: «100» здесь строка из трёх символов, а не число. Чтобы получить из неё число, понадобится преобразование int(digits)."

  - id: vars-blanks-001
    concept: variables-and-types
    type: fill-in-blanks
    difficulty: 1
    prompt: "Создайте переменную name со строковым значением \"Анна\" и напечатайте её через print."
    template: |
      name = {{value}}
      print({{arg}})
    blanks:
      value:
        accept: ['"Анна"', "'Анна'"]
      arg:
        accept: ["name"]
    variants:
      - prompt: "Создайте переменную city со строковым значением \"Казань\" и напечатайте её через print."
        template: |
          city = {{value}}
          print({{arg}})
        blanks:
          value:
            accept: ['"Казань"', "'Казань'"]
          arg:
            accept: ["city"]
      - prompt: "Создайте переменную price с целым числом 990 (без кавычек) и напечатайте её через print."
        template: |
          price = {{value}}
          print({{arg}})
        blanks:
          value:
            accept: ["990"]
          arg:
            accept: ["price"]

  - id: vars-predict-001
    concept: variables-and-types
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает эта программа? Запишите вывод в точности, каждый print с новой строки."
    snippet: |
      x = 7
      x = x + 1
      print(x // 2)
      print(x / 2)
    expected:
      kind: stdout
      value: "4\n4.0"
    hints:
      - "Сначала проследите перезапись: чему равно x к моменту печати? Затем вспомните, что // и / возвращают значения разных типов, даже когда делится нацело."
    variants:
      - snippet: |
          price = 500
          price = 450
          print(price)
          print(price / 3)
        expected:
          kind: stdout
          value: "450\n150.0"
      - snippet: |
          n = 9
          n = n + 1
          print(n % 4)
          print(n / 4)
        expected:
          kind: stdout
          value: "2\n2.5"

  - id: vars-func-total-001
    concept: variables-and-types
    type: python-function
    difficulty: 2
    prompt: "Допишите тело функции order_total(price, qty): покупатель берёт qty одинаковых товаров по цене price рублей. Верните стоимость всей покупки целым числом, не печатайте её."
    starter: |
      def order_total(price, qty):
          ...
    cases:
      - call: "order_total(120, 3)"
        expect: 360
      - call: "order_total(90, 1)"
        expect: 90
      - call: "order_total(45, 10)"
        expect: 450
    solution: |
      def order_total(price, qty):
          return price * qty
    hints:
      - "Функция должна не печатать ответ, а вернуть его: результат отдают командой return, как описано в подсказке про формат упражнений в теории."
      - "Из двух параметров нужно получить одно число ровно одним арифметическим действием. Выберите оператор, исходя из условия задачи."
    variants:
      - prompt: "Допишите тело функции change(payment, price): покупатель дал payment рублей за товар ценой price рублей. Верните сдачу целым числом."
        starter: |
          def change(payment, price):
              ...
        cases:
          - call: "change(1000, 640)"
            expect: 360
          - call: "change(500, 500)"
            expect: 0
          - call: "change(200, 137)"
            expect: 63
        solution: |
          def change(payment, price):
              return payment - price
      - prompt: "Допишите тело функции rect_area(width, height): комната имеет ширину width и длину height в метрах, обе стороны целые. Верните площадь комнаты целым числом."
        starter: |
          def rect_area(width, height):
              ...
        cases:
          - call: "rect_area(4, 5)"
            expect: 20
          - call: "rect_area(7, 7)"
            expect: 49
          - call: "rect_area(1, 250)"
            expect: 250
        solution: |
          def rect_area(width, height):
              return width * height

  - id: vars-func-convert-001
    concept: variables-and-types
    type: python-function
    difficulty: 3
    prompt: "В price_text приходит цена товара строкой, например \"450\". Покупатель платит одной купюрой в 1000 рублей. Допишите тело функции: верните сдачу целым числом (int)."
    starter: |
      def change_from_1000(price_text):
          ...
    cases:
      - call: 'change_from_1000("450")'
        expect: 550
      - call: 'change_from_1000("1000")'
        expect: 0
      - call: 'change_from_1000("37")'
        expect: 963
    solution: |
      def change_from_1000(price_text):
          return 1000 - int(price_text)
    hints:
      - "Для Python строка «450» это текст, как надпись на ценнике, а не число: вычитать текст из числа нельзя, получится TypeError. Сначала нужно добыть из текста настоящее число."
      - "Разбейте задачу на два шага: превратить строку в целое число, затем вычесть его из 1000 и вернуть разность через return."
      - "Превращение делает встроенная функция int(): она принимает строку из цифр и возвращает целое число."
