exercises:
  - id: loop-quiz-001
    concept: loops
    type: theory-quiz
    difficulty: 1
    prompt: "Сколько раз выполнится тело цикла for i in range(5)?"
    choices:
      - id: a
        text: "4 раза: range останавливается перед последним числом."
      - id: b
        text: "5 раз: range(5) выдаёт числа 0, 1, 2, 3, 4."
      - id: c
        text: "6 раз: числа от 0 до 5 включительно."
      - id: d
        text: "Зависит от того, какие команды написаны в теле цикла."
    correct: [b]
    explanation: "range(5) выдаёт ровно пять чисел, начиная с нуля: 0, 1, 2, 3, 4. Тело выполняется по одному разу на каждое число. Последнее значение i равно 4, но витков всё равно пять."
    variants:
      - prompt: "Что по очереди получает переменная цикла ch в цикле for ch in \"Москва\"?"
        choices:
          - id: a
            text: "Отдельные символы строки, по одному на каждый виток."
          - id: b
            text: "Слова строки, разделённые пробелами."
          - id: c
            text: "Числовые коды букв."
          - id: d
            text: "Всю строку целиком, один раз."
        correct: [a]
        explanation: "Строка это последовательность символов, поэтому for перебирает её посимвольно: здесь будет шесть витков, ch по очереди примет значения М, о, с, к, в, а."
      - prompt: "В какой ситуации нужен цикл while, а не for?"
        choices:
          - id: a
            text: "Когда число повторений заранее неизвестно и повторять нужно, пока условие истинно."
          - id: b
            text: "Когда нужно перебрать все элементы списка по очереди."
          - id: c
            text: "Когда нужно выполнить тело ровно десять раз."
          - id: d
            text: "Когда внутри цикла встречается условие if."
        correct: [a]
        explanation: "for подходит, когда есть что перебирать или известно число повторений. while проверяет условие перед каждым витком и работает, пока оно истинно, поэтому его берут, когда заранее неизвестно, сколько повторений понадобится. if внутри цикла разрешён в обоих случаях."

  - id: loop-blanks-001
    concept: loops
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите цикл, который складывает все цены из списка в накопитель total."
    template: |
      prices = [90, 250, 15000]
      total = 0
      {{kw_for}} price {{kw_in}} prices:
          total {{op}} price
      print(total)
    blanks:
      kw_for:
        accept: ["for"]
      kw_in:
        accept: ["in"]
      op:
        accept: ["+="]
    variants:
      - prompt: "Допишите цикл, который печатает числа от 1 до 10 включительно. Помните: правая граница в диапазон не входит."
        template: |
          for n in {{func}}(1, {{stop}}):
              print(n)
        blanks:
          func:
            accept: ["range"]
          stop:
            accept: ["11"]
      - prompt: "Допишите цикл while, который печатает числа от 0 до 4. Не забудьте строку, которая меняет счётчик, иначе цикл станет бесконечным."
        template: |
          count = 0
          {{kw}} count < 5:
              print(count)
              count {{op}} 1
        blanks:
          kw:
            accept: ["while"]
          op:
            accept: ["+="]

  - id: loop-predict-001
    concept: loops
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает эта программа? Запишите вывод в точности."
    snippet: |
      purchases = [200, 500, 300]
      total = 0
      for amount in purchases:
          total += amount
      print(total)
    expected:
      kind: stdout
      value: "1000"
    hints:
      - "Накопитель total стартует с нуля, и каждый виток прибавляет к нему очередную сумму. print выполняется один раз, уже после цикла."
    variants:
      - prompt: "Что напечатает эта программа? Каждый print даёт отдельную строку вывода."
        snippet: |
          for n in range(2, 5):
              print(n)
        expected:
          kind: stdout
          value: "2\n3\n4"
      - prompt: "Что напечатает эта программа? Каждый print даёт отдельную строку вывода."
        snippet: |
          for n in range(5):
              if n == 2:
                  continue
              print(n)
        expected:
          kind: stdout
          value: "0\n1\n3\n4"

  - id: loop-func-sum-001
    concept: loops
    type: python-function
    difficulty: 2
    prompt: "Допишите тело функции total_spent: она получает список сумм покупок и возвращает их общую сумму как целое число. Используйте цикл for с накопителем, а не встроенную функцию sum; для пустого списка верните 0."
    starter: |
      def total_spent(purchases):
          ...
    cases:
      - call: "total_spent([90, 250, 15000])"
        expect: 15340
      - call: "total_spent([1500])"
        expect: 1500
      - call: "total_spent([])"
        expect: 0
    solution: |
      def total_spent(purchases):
          total = 0
          for amount in purchases:
              total += amount
          return total
    hints:
      - "Это конвейер с накопителем: каждая покупка по очереди проходит через тело цикла и должна оставить свой след в итоговой переменной."
      - "Заведите переменную со значением 0 до цикла, внутри цикла прибавляйте к ней очередной элемент, а после цикла верните её через return. Пустой список даст ноль витков, поэтому стартовое значение и есть ответ."
    variants:
      - prompt: "Допишите тело функции product_of: она получает список чисел и возвращает их произведение. Используйте цикл for с накопителем; для пустого списка верните 1."
        starter: |
          def product_of(numbers):
              ...
        cases:
          - call: "product_of([2, 3, 4])"
            expect: 24
          - call: "product_of([7])"
            expect: 7
          - call: "product_of([])"
            expect: 1
        solution: |
          def product_of(numbers):
              result = 1
              for n in numbers:
                  result *= n
              return result
      - prompt: "Допишите тело функции sum_even: она получает список целых чисел и возвращает сумму только чётных. Используйте цикл for с накопителем и условие внутри цикла; если чётных нет, верните 0."
        starter: |
          def sum_even(numbers):
              ...
        cases:
          - call: "sum_even([1, 2, 3, 4])"
            expect: 6
          - call: "sum_even([1, 3, 5])"
            expect: 0
          - call: "sum_even([])"
            expect: 0
        solution: |
          def sum_even(numbers):
              total = 0
              for n in numbers:
                  if n % 2 == 0:
                      total += n
              return total

  - id: loop-func-count-001
    concept: loops
    type: python-function
    difficulty: 3
    prompt: "Допишите тело функции count_expensive: она получает список цен и порог limit, а возвращает количество покупок строго дороже limit. Покупка с ценой, равной limit, не считается; для пустого списка верните 0. Решите задачу циклом."
    starter: |
      def count_expensive(prices, limit):
          ...
    cases:
      - call: "count_expensive([90, 2500, 900, 5000], 1000)"
        expect: 2
      - call: "count_expensive([300, 300, 300], 300)"
        expect: 0
      - call: "count_expensive([301, 299], 300)"
        expect: 1
      - call: "count_expensive([], 500)"
        expect: 0
    solution: |
      def count_expensive(prices, limit):
          count = 0
          for price in prices:
              if price > limit:
                  count += 1
          return count
    hints:
      - "Это счётчик с условием: вы проходите по всем ценам и ведёте число подходящих. Решите сначала, какие именно покупки должны увеличивать счётчик, а какие нет."
      - "Заведите переменную-счётчик со значением 0 до цикла, внутри цикла проверяйте каждую цену условием if и увеличивайте счётчик на единицу только для подходящих."
      - "Слова «строго дороже» означают сравнение через оператор больше, без «или равно»: цена, совпадающая с limit, счётчик менять не должна."
