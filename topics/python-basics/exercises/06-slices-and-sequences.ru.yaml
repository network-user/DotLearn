exercises:
  - id: slice-quiz-001
    concept: slices-and-sequences
    type: theory-quiz
    difficulty: 1
    prompt: "Список purchases = [90, 250, 15000, 640, 300]. Что вернёт purchases[1:4]?"
    choices:
      - id: a
        text: "[250, 15000, 640, 300] - все элементы от индекса 1 до конца."
      - id: b
        text: "[250, 15000, 640] - элементы с индексами 1, 2 и 3; индекс 4 в результат не"
      - id: c
        text: "[90, 250, 15000, 640] - первые четыре элемента списка."
      - id: d
        text: "Ошибку IndexError, потому что запись выглядит некорректной."
    correct: [b]
    explanation: "Срез [1:4] берёт индексы 1, 2 и 3; правая граница 4 в результат не входит, ровно как у range из урока про циклы. Ошибки при этом не возникает, даже если бы граница вышла за пределы списка."
    variants:
      - prompt: 'Строка city = "Владивосток". Что вернёт city[:4]?'
        choices:
          - id: a
            text: '"Влад" - первые четыре символа, индексы с 0 по 3.'
          - id: b
            text: '"исток" - последние пять символов строки.'
          - id: c
            text: "Ошибку, потому что граница start не указана явно."
          - id: d
            text: '"Владивосток" целиком, без изменений.'
        correct: [a]
        explanation: 'Пропущенный start означает «с самого начала», поэтому срез берёт символы с индексами 0, 1, 2 и 3 - первые четыре буквы слова.'
      - prompt: "Что вернёт purchases[100:200] для списка purchases = [90, 250, 15000]?"
        choices:
          - id: a
            text: "Ошибку IndexError: обе границы далеко за пределами списка."
          - id: b
            text: "Пустой список [], без единой ошибки."
          - id: c
            text: "None."
          - id: d
            text: "Список purchases без изменений."
        correct: [b]
        explanation: "Срез никогда не бросает IndexError: если после подрезки границ до реальных пределов последовательности не остаётся ни одного индекса, результатом становится просто пустая последовательность того же типа."

  - id: slice-blanks-001
    concept: slices-and-sequences
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите код: возьмите первые три покупки в first_three и последние две в last_two."
    template: |
      purchases = [90, 250, 15000, 640, 300]
      first_three = purchases[:{{stop}}]
      last_two = purchases[{{start}}:]
      print(first_three, last_two)
    blanks:
      stop:
        accept: ["3"]
      start:
        accept: ["-2"]
    variants:
      - prompt: "Допишите код: разверните строку word задом наперёд одним срезом с отрицательным шагом."
        template: |
          word = "код"
          reversed_word = word[::{{step}}]
          print(reversed_word)
        blanks:
          step:
            accept: ["-1"]
      - prompt: "Допишите код: получите каждый второй элемент списка numbers, начиная с индекса 0."
        template: |
          numbers = [10, 20, 30, 40, 50, 60]
          evens = numbers[::{{step}}]
          print(evens)
        blanks:
          step:
            accept: ["2"]

  - id: slice-predict-001
    concept: slices-and-sequences
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает эта программа?"
    snippet: |
      purchases = [90, 250, 15000, 640, 300]
      print(purchases[-3:])
    expected:
      kind: stdout
      value: "[15000, 640, 300]"
    hints:
      - 'Отрицательный индекс -3 внутри среза отсчитывает третий элемент с конца, а пустой stop значит «до самого конца».'
    variants:
      - prompt: "Что напечатает эта программа?"
        snippet: |
          name = "Анна"
          print(name[::-1])
        expected:
          kind: stdout
          value: "аннА"
      - prompt: "Что напечатает эта программа?"
        snippet: |
          numbers = [0, 1, 2, 3, 4, 5]
          print(numbers[1:5:2])
        expected:
          kind: stdout
          value: "[1, 3]"

  - id: slice-func-lastn-001
    concept: slices-and-sequences
    type: python-function
    difficulty: 2
    prompt: "Допишите тело функции last_n: она получает список и число n, а возвращает последние n элементов списка одним срезом. Для n, равного 0, верните пустой список."
    starter: |
      def last_n(items, n):
          ...
    cases:
      - call: "last_n([90, 250, 15000, 640, 300], 2)"
        expect: [640, 300]
      - call: "last_n([1, 2, 3], 0)"
        expect: []
      - call: "last_n([1, 2, 3], 3)"
        expect: [1, 2, 3]
    solution: |
      def last_n(items, n):
          if n == 0:
              return []
          return items[-n:]
    hints:
      - "Срез items[-n:] естественно берёт последние n элементов, но проверьте случай n == 0 отдельно: отрицательный индекс -0 равен обычному нулю, и items[0:] вернёт список целиком, а не пустой список."
      - "Поставьте проверку n == 0 в начале функции и верните пустой список сразу; для всех остальных n используйте items[-n:]."
    variants:
      - prompt: "Допишите тело функции first_n: она получает список и число n, а возвращает первые n элементов списка одним срезом."
        starter: |
          def first_n(items, n):
              ...
        cases:
          - call: "first_n([90, 250, 15000, 640, 300], 3)"
            expect: [90, 250, 15000]
          - call: "first_n([1, 2, 3], 0)"
            expect: []
          - call: "first_n([1, 2], 5)"
            expect: [1, 2]
        solution: |
          def first_n(items, n):
              return items[:n]
      - prompt: "Допишите тело функции reversed_copy: она получает список и возвращает его копию в обратном порядке одним срезом, не изменяя исходный список."
        starter: |
          def reversed_copy(items):
              ...
        cases:
          - call: "reversed_copy([1, 2, 3])"
            expect: [3, 2, 1]
          - call: "reversed_copy([])"
            expect: []
          - call: "reversed_copy([5])"
            expect: [5]
        solution: |
          def reversed_copy(items):
              return items[::-1]

  - id: slice-func-trim-001
    concept: slices-and-sequences
    type: python-function
    difficulty: 3
    prompt: "Допишите тело функции trim_edges: она получает список items и число k, а возвращает список без первых k и без последних k элементов. Решите одним срезом с двумя границами. Если k равно 0, верните список без изменений; если после обрезки ничего не остаётся, верните пустой список."
    starter: |
      def trim_edges(items, k):
          ...
    cases:
      - call: "trim_edges([1, 2, 3, 4, 5, 6, 7], 2)"
        expect: [3, 4, 5]
      - call: "trim_edges([1, 2, 3], 1)"
        expect: [2]
      - call: "trim_edges([1, 2, 3], 2)"
        expect: []
      - call: "trim_edges([1, 2, 3, 4], 0)"
        expect: [1, 2, 3, 4]
    solution: |
      def trim_edges(items, k):
          if k == 0:
              return items[:]
          return items[k:-k]
    hints:
      - "Один срез с обеими границами решает всё: start отрезает k элементов слева, а отрицательный stop отрезает k элементов справа, без подсчёта длины списка."
      - "При k == 0 отрицательная граница -0 равна обычному нулю, и items[0:-0] превратится в пустой список вместо исходного - этот пограничный случай стоит обработать отдельной веткой, как n == 0 в функции last_n."
