exercises:
  - id: str-quiz-001
    concept: strings
    type: theory-quiz
    difficulty: 1
    prompt: 'The variable s holds the string "cat". What happens when the line s[0] = "b" runs?'
    choices:
      - id: a
        text: 'The string turns into "bat".'
      - id: b
        text: 'Python creates a new string "bat", and s stays unchanged.'
      - id: c
        text: 'The program crashes with TypeError'
      - id: d
        text: 'The program crashes with IndexError.'
    correct: [c]
    explanation: 'Strings in Python are immutable: you can read a character by index, but you cannot assign to one, so Python raises TypeError. To get "bat", build a new string, e.g. with s.replace("c", "b"), and assign it to the variable.'
    variants:
      - prompt: 'What does the call len("Yandex Go") return?'
        choices:
          - id: a
            text: "8"
          - id: b
            text: "9"
          - id: c
            text: "10"
          - id: d
            text: "The program crashes because the string has a space in it."
        correct: [b]
        explanation: 'len() counts every character in a row, including the space: six letters in "Yandex", a space, and two letters in "Go" add up to 9.'
      - prompt: 'The variable city holds the string "Moscow". What does the expression city[-1] return?'
        choices:
          - id: a
            text: 'The letter "w".'
          - id: b
            text: 'The letter "M".'
          - id: c
            text: "The program crashes with IndexError."
          - id: d
            text: 'The letter "o".'
        correct: [a]
        explanation: 'Negative indices count positions from the end: city[-1] is the last character of the string, the letter "w". There is no error here, negative indices are valid down to -len(city).'

  - id: str-blanks-001
    concept: strings
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Complete the f-string so the code prints "Hello, Anna!": in the first blank put the letter that turns on substitution, in the second put the name variable in curly braces.'
    template: |
      name = "Anna"
      print({{letter}}"Hello, {{expr}}!")
    blanks:
      letter:
        accept: ['f', 'F']
      expr:
        accept: ['{name}']
    variants:
      - prompt: 'Complete the method call so the code prints "KAZAN".'
        template: |
          city = "kazan"
          print(city.{{method}}())
        blanks:
          method:
            accept: ['upper']
      - prompt: 'Complete the method call so the code prints "Delivery to Kazan".'
        template: |
          phrase = "Delivery to Tver"
          print(phrase.{{method}}("Tver", "Kazan"))
        blanks:
          method:
            accept: ['replace']

  - id: str-predict-001
    concept: strings
    type: predict-output
    difficulty: 2
    prompt: 'What does this code print?'
    snippet: |
      name = "  anna  "
      print(name.strip().upper())
    expected:
      kind: stdout
      value: "ANNA"
    hints:
      - 'Methods in a chain apply left to right, each one to the previous result: first the edge spaces go, then the case changes.'
    variants:
      - snippet: |
          word = "banana"
          new_word = word.replace("a", "o")
          print(new_word)
          print(len(new_word))
        expected:
          kind: stdout
          value: "bonono\n6"
      - snippet: |
          city = "kazan"
          city.upper()
          print(city)
        expected:
          kind: stdout
          value: "kazan"

  - id: str-func-greet-001
    concept: strings
    type: python-function
    difficulty: 2
    prompt: 'Complete the body of greeting: return a string like "Hello, Anna!" for the given name. Build it with an f-string.'
    starter: |
      def greeting(name):
          ...
    cases:
      - call: "greeting('Anna')"
        expect: 'Hello, Anna!'
      - call: "greeting('Boris')"
        expect: 'Hello, Boris!'
      - call: "greeting('Vera')"
        expect: 'Hello, Vera!'
    solution: |
      def greeting(name):
          return f"Hello, {name}!"
    hints:
      - 'The function must not print the phrase, it must return it via return: the check compares the returned value.'
      - 'Put the letter f before the quotes and place the name parameter in curly braces right inside the greeting text.'
    variants:
      - prompt: 'Complete the body of delivery_sms: return a string like "Anna, your order has arrived in Kazan" for the given name and city.'
        starter: |
          def delivery_sms(name, city):
              ...
        cases:
          - call: "delivery_sms('Anna', 'Kazan')"
            expect: 'Anna, your order has arrived in Kazan'
          - call: "delivery_sms('Boris', 'Tver')"
            expect: 'Boris, your order has arrived in Tver'
        solution: |
          def delivery_sms(name, city):
              return f"{name}, your order has arrived in {city}"
      - prompt: 'Complete the body of door_sign: return a string like "Doctor: Ivanova" for the given surname.'
        starter: |
          def door_sign(surname):
              ...
        cases:
          - call: "door_sign('Ivanova')"
            expect: 'Doctor: Ivanova'
          - call: "door_sign('Petrov')"
            expect: 'Doctor: Petrov'
        solution: |
          def door_sign(surname):
              return f"Doctor: {surname}"

  - id: str-func-badge-001
    concept: strings
    type: python-function
    difficulty: 3
    prompt: 'Complete the body of badge: the input is a name with extra spaces and random casing, e.g. "  anna  ". Return a clean version for a badge, a string like "Anna".'
    starter: |
      def badge(raw_name):
          ...
    cases:
      - call: "badge('  anna  ')"
        expect: 'Anna'
      - call: "badge('BORIS')"
        expect: 'Boris'
      - call: "badge(' vera')"
        expect: 'Vera'
    solution: |
      def badge(raw_name):
          return raw_name.strip().capitalize()
    hints:
      - "This input has two separate defects: extra spaces at the edges and random letter casing. There is a dedicated string method for each defect."
      - "Methods return a new string, so you can chain them: clean the edges first, then fix the case of the already-cleaned string."
      - "strip() removes edge spaces, and capitalize() makes the first letter uppercase and lowers the rest."
