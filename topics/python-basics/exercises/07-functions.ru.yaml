exercises:
  - id: func-quiz-001
    concept: functions
    type: theory-quiz
    difficulty: 1
    prompt: "Чем return отличается от print внутри функции?"
    choices:
      - id: a
        text: "print показывает значение человеку в консоли, а return отдаёт значение программе"
      - id: b
        text: "return печатает значение на экран, а print сохраняет его в переменную."
      - id: c
        text: "Разницы нет: оба отдают значение в место вызова, просто print ещё и печатает его."
      - id: d
        text: "return работает только с числами, а print только со строками."
    correct: [a]
    explanation: "print для глаз, return для программы. Напечатанное значение программе не достаётся: сохранить, сравнить или передать дальше можно только то, что функция вернула через return."
    variants:
      - prompt: "Функция дошла до конца тела, а строки return в ней нет. Что вернёт её вызов?"
        choices:
          - id: a
            text: "None, специальное значение «здесь пусто»."
          - id: b
            text: "Число 0."
          - id: c
            text: "Пустую строку."
          - id: d
            text: "Ничего: Python откажется запускать функцию без return и выдаст ошибку."
        correct: [a]
        explanation: "Функция без return это не ошибка, но её вызов всегда возвращает None. Даже print внутри ничего не меняет: печать это не возврат."
      - prompt: "В теле функции сработал return, а ниже него остались ещё строки кода. Когда они выполнятся?"
        choices:
          - id: a
            text: "Никогда: return немедленно завершает функцию."
          - id: b
            text: "При следующем вызове этой же функции."
          - id: c
            text: "Сразу после того, как вызывающий код использует возвращённое значение."
          - id: d
            text: "Выполнятся в этом же вызове, но уже после возврата значения."
        correct: [a]
        explanation: "У return две работы: отдать значение и немедленно завершить функцию. Всё, что стоит после сработавшего return, недостижимо; поэтому ранний выход в ветке if так удобен."

  - id: func-blanks-001
    concept: functions
    type: fill-in-blanks
    difficulty: 1
    prompt: "Магазин даёт скидку 200 рублей. Впишите два ключевых слова: одно объявляет функцию, другое отдаёт результат наружу."
    template: |
      {{kw_def}} apply_discount(price):
          result = price - 200
          {{kw_return}} result

      final = apply_discount(1000)
    blanks:
      kw_def:
        accept: ["def"]
      kw_return:
        accept: ["return"]
    variants:
      - prompt: "Сделайте параметр polite необязательным: по умолчанию приветствие должно быть вежливым."
        template: |
          def greet(name, polite={{default_value}}):
              if polite:
                  return "Здравствуйте, " + name
              return "Привет, " + name
        blanks:
          default_value:
            accept: ["True"]
      - prompt: "Вызовите greet так, чтобы Анна получила короткое «Привет»: передайте второй аргумент по имени."
        template: |
          def greet(name, polite=True):
              if polite:
                  return "Здравствуйте, " + name
              return "Привет, " + name

          message = greet("Анна", {{arg_name}}=False)
        blanks:
          arg_name:
            accept: ["polite"]

  - id: func-predict-001
    concept: functions
    type: predict-output
    difficulty: 2
    prompt: "Прочитайте код глазами и запишите вывод точно, строка в строку."
    snippet: |
      def add(a, b):
          print(a + b)

      result = add(2, 3)
      print(result)
    expected:
      kind: stdout
      value: "5\nNone"
    hints:
      - "Вызов функции сам по себе ничего не печатает: на экран попадает только то, что проходит через print. Отследите каждый print по очереди и вспомните, что возвращает функция, в которой нет return."
    variants:
      - snippet: |
          def status(balance):
              if balance < 0:
                  return "долг"
              print("проверка пройдена")
              return "всё в порядке"

          print(status(-100))
          print(status(500))
        expected:
          kind: stdout
          value: "долг\nпроверка пройдена\nвсё в порядке"
      - snippet: |
          def greet(name, polite=True):
              if polite:
                  return "Здравствуйте, " + name
              return "Привет, " + name

          print(greet("Анна"))
          print(greet("Борис", polite=False))
        expected:
          kind: stdout
          value: "Здравствуйте, Анна\nПривет, Борис"

  - id: func-func-taxi-001
    concept: functions
    type: python-function
    difficulty: 3
    prompt: "Напишите функцию целиком: def taxi_price(km, base=100). Поездка стоит base рублей за посадку плюс 25 рублей за каждый километр. Верните стоимость целым числом, а не печатайте её."
    starter: |
      def taxi_price(km, base=100):
          ...
    cases:
      - call: "taxi_price(10)"
        expect: 350
      - call: "taxi_price(0)"
        expect: 100
      - call: "taxi_price(4, base=200)"
        expect: 300
    solution: |
      def taxi_price(km, base=100):
          return base + 25 * km
    hints:
      - "Функция должна отдать число программе, а не показать его человеку. Никакого print внутри: проверка смотрит на возвращённое значение."
      - "Стоимость складывается из двух частей: посадка base и пробег, то есть 25 умножить на km. При km равном 0 остаётся только посадка."

  - id: func-func-receipt-001
    concept: functions
    type: python-function
    difficulty: 4
    prompt: "Финальная задача курса, она собирает вместе циклы, условия, списки и арифметику. Напишите функцию целиком: def receipt_total(items, discount_from, discount), где items это список списков вида [название, цена, количество]. Посчитайте циклом сумму «цена умножить на количество» по всем товарам; если сумма не меньше discount_from, снимите discount процентов; верните итог целым числом рублей через int()."
    starter: |
      def receipt_total(items, discount_from, discount):
          ...
    cases:
      - call: 'receipt_total([["хлеб", 45, 2], ["молоко", 80, 1]], 500, 25)'
        expect: 170
      - call: 'receipt_total([["сыр", 600, 1], ["кофе", 350, 2]], 1000, 25)'
        expect: 975
      - call: 'receipt_total([["книга", 250, 2]], 500, 50)'
        expect: 250
      - call: "receipt_total([], 100, 25)"
        expect: 0
    solution: |
      def receipt_total(items, discount_from, discount):
          total = 0
          for item in items:
              total = total + item[1] * item[2]
          if total >= discount_from:
              total = total * (100 - discount) / 100
          return int(total)
    hints:
      - "Разбейте задачу на два шага: сначала цикл-накопитель складывает стоимость всех позиций чека, потом одно условие решает судьбу скидки. Не пытайтесь уместить всё в одну строку."
      - "Внутри цикла у каждого товара item цена лежит в item[1], а количество в item[2]. Накопитель total стартует с нуля, как в уроке про циклы."
      - "Скидка discount процентов означает, что от суммы остаётся 100 - discount процентов. Скидка срабатывает и тогда, когда сумма ровно равна discount_from. Пустой чек даёт 0 без всяких условий."
