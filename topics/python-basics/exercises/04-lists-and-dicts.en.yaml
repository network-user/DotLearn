exercises:
  - id: listdict-quiz-001
    concept: lists-and-dicts
    type: theory-quiz
    difficulty: 1
    prompt: 'The list cart = ["bread", "milk", "cheese"] runs cart[3]. What happens?'
    choices:
      - id: a
        text: "The program returns None, because there is no element at that index."
      - id: b
        text: "The program crashes with IndexError: index 3 does not exist in a list of three elements."
      - id: c
        text: "Python appends an empty element at the fourth spot and returns it."
      - id: d
        text: "The program returns the list's last element, cart[2]."
    correct: [b]
    explanation: "A list of three elements has indices 0, 1, and 2; there is no spot 3, and Python stops the program with IndexError. Before reading an index, it helps to check len(cart)."
    variants:
      - prompt: 'The assignment was written as cart = cart.append("apples"). What ends up in cart after this line?'
        choices:
          - id: a
            text: "A list of four elements, including apples."
          - id: b
            text: "None: append mutates the list in place and returns nothing, so"
          - id: c
            text: "The program crashes with TypeError."
          - id: d
            text: "The list unchanged, append does not work in this form."
        correct: [b]
        explanation: 'append mutates the list in place and returns None. The assignment cart = cart.append(...) erases the original list, replacing it with None. The correct call is cart.append("apples") as its own line, without an assignment.'
      - prompt: 'A dictionary phones = {"Anna": "111"}. What does phones.get("Boris", "no number") return?'
        choices:
          - id: a
            text: 'A KeyError, because the key "Boris" is not in the dictionary.'
          - id: b
            text: '"no number": get returns the fallback value from its'
          - id: c
            text: "None."
          - id: d
            text: '"111", the value of the dictionary''s first entry.'
        correct: [b]
        explanation: '.get() looks up the key and, if it is missing, returns the second argument instead of raising an error. Accessing it with square brackets, phones["Boris"], would raise KeyError in the same situation.'

  - id: listdict-blanks-001
    concept: lists-and-dicts
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Complete the code: add "apples" to the end of the cart list, then replace the first element with "loaf".'
    template: |
      cart = ["bread", "milk", "cheese"]
      cart.{{method}}("apples")
      cart{{idx}} = "loaf"
      print(cart)
    blanks:
      method:
        accept: ["append"]
      idx:
        accept: ["[0]"]
    variants:
      - prompt: 'Complete the code: add a new entry "Vera" to the phones dictionary, then read Anna''s number with .get and a fallback value "none".'
        template: |
          phones = {"Anna": "111"}
          phones{{idx}} = "222"
          print(phones.{{method}}("Anna", "none"))
        blanks:
          idx:
            accept: ['["Vera"]']
          method:
            accept: ["get"]
      - prompt: 'Complete the check: find out whether "cheese" is missing from the cart list, and if so, print a message.'
        template: |
          cart = ["bread", "milk"]
          if "cheese" {{op}} cart:
              print("need to buy cheese")
        blanks:
          op:
            accept: ["not in"]

  - id: listdict-predict-001
    concept: lists-and-dicts
    type: predict-output
    difficulty: 2
    prompt: "What does this program print?"
    snippet: |
      a = ["bread", "milk"]
      b = a
      b.append("cheese")
      print(a)
    expected:
      kind: stdout
      value: "['bread', 'milk', 'cheese']"
    hints:
      - "b = a does not create a new list: both variables are two names for the same object, so a change through b is visible through a too."
    variants:
      - prompt: "What does this program print?"
        snippet: |
          cart = ["bread", "milk", "cheese"]
          cart.remove("milk")
          print(cart)
        expected:
          kind: stdout
          value: "['bread', 'cheese']"
      - prompt: "What does this program print?"
        snippet: |
          phones = {"Anna": "111"}
          phones["Anna"] = "222"
          phones["Boris"] = "333"
          print(len(phones))
        expected:
          kind: stdout
          value: "2"

  - id: listdict-func-summary-001
    concept: lists-and-dicts
    type: python-function
    difficulty: 2
    prompt: 'Complete the body of cart_summary: it receives a list of prices and returns a string like "Items: 3, total: 380 rub." Count items with len and sum them with sum.'
    starter: |
      def cart_summary(prices):
          ...
    cases:
      - call: "cart_summary([90, 250, 40])"
        expect: "Items: 3, total: 380 rub."
      - call: "cart_summary([100])"
        expect: "Items: 1, total: 100 rub."
      - call: "cart_summary([])"
        expect: "Items: 0, total: 0 rub."
    solution: |
      def cart_summary(prices):
          return f"Items: {len(prices)}, total: {sum(prices)} rub."
    hints:
      - "Both values are already among this lesson's built-in functions: one counts a list's elements, the other adds up the numbers inside it."
      - "Build an f-string with two substitutions, len(prices) for the count and sum(prices) for the total, like the shopping cart example in the theory."
    variants:
      - prompt: 'Complete the body of price_range: it receives a list of prices and returns a string like "from 40 to 250 rub." with the lowest and highest price.'
        starter: |
          def price_range(prices):
              ...
        cases:
          - call: "price_range([90, 250, 40])"
            expect: "from 40 to 250 rub."
          - call: "price_range([100])"
            expect: "from 100 to 100 rub."
        solution: |
          def price_range(prices):
              return f"from {min(prices)} to {max(prices)} rub."
      - prompt: "Complete the body of avg_price: it receives a non-empty list of prices and returns the average price as a number (sum divided by len)."
        starter: |
          def avg_price(prices):
              ...
        cases:
          - call: "avg_price([100, 200])"
            expect: 150.0
          - call: "avg_price([10])"
            expect: 10.0
          - call: "avg_price([90, 250, 40, 20])"
            expect: 100.0
        solution: |
          def avg_price(prices):
              return sum(prices) / len(prices)

  - id: listdict-func-lookup-001
    concept: lists-and-dicts
    type: python-function
    difficulty: 3
    prompt: 'Complete the body of lookup_price: it receives a price dictionary like {"bread": 40, "milk": 90} and an item name, and returns a string "price: 40 rub." or "item not available" if the item is not in the dictionary. Read the dictionary with .get(), not with square brackets.'
    starter: |
      def lookup_price(prices, item):
          ...
    cases:
      - call: 'lookup_price({"bread": 40, "milk": 90}, "bread")'
        expect: "price: 40 rub."
      - call: 'lookup_price({"bread": 40}, "cheese")'
        expect: "item not available"
      - call: 'lookup_price({}, "bread")'
        expect: "item not available"
    solution: |
      def lookup_price(prices, item):
          price = prices.get(item)
          if price is None:
              return "item not available"
          return f"price: {price} rub."
    hints:
      - "The task has two steps: first safely fetch a value by a key that might be missing, then choose one of two answers with if depending on the result."
      - ".get() without a fallback returns None if the key is missing. Check the result with the condition price is None, not by accessing with square brackets: that would crash the program with KeyError."
