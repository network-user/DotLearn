exercises:
  - id: cond-quiz-001
    concept: conditions
    type: theory-quiz
    difficulty: 1
    prompt: "В цепочке if/elif/else условия сразу двух веток оказались истинными. Что сделает Python?"
    choices:
      - id: a
        text: "Выполнит обе ветки по очереди, сверху вниз."
      - id: b
        text: "Выполнит только первую сверху ветку с истинным условием, остальные"
      - id: c
        text: "Выполнит только последнюю ветку с истинным условием."
      - id: d
        text: "Остановит программу с ошибкой: два истинных условия недопустимы."
    correct: [b]
    explanation: "Python проверяет условия сверху вниз и выполняет первую истинную ветку, после чего пропускает всю оставшуюся цепочку, даже если ниже есть другие истинные условия. Поэтому порядок веток имеет значение."
    variants:
      - prompt: "Переменная age равна 18, дальше выполняется код: if age >= 18: print('Взрослый билет') else: print('Детский билет'). Что появится на экране?"
        choices:
          - id: a
            text: "Взрослый билет"
          - id: b
            text: "Детский билет"
          - id: c
            text: "Обе строки, одна за другой."
          - id: d
            text: "Ничего: программа завершится с ошибкой."
        correct: [a]
        explanation: "Оператор >= означает «больше или равно», поэтому при age равном 18 условие истинно и выполняется ветка if. Ветка else в этом случае пропускается целиком."
      - prompt: "Что вернёт выражение '5' == 5?"
        choices:
          - id: a
            text: "True: Python сам преобразует строку в число перед сравнением."
          - id: b
            text: "False: строка и число это значения разных типов"
          - id: c
            text: "Программа упадёт с ошибкой TypeError."
          - id: d
            text: "Число 5."
        correct: [b]
        explanation: "Оператор == не преобразует типы: строка '5' и число 5 это разные значения, поэтому сравнение молча вернёт False. Чтобы сравнить их честно, строку сначала переводят в число: int('5') == 5 даёт True."

  - id: cond-blanks-001
    concept: conditions
    type: fill-in-blanks
    difficulty: 1
    prompt: "Заполните пропуски так, чтобы программа печатала «Мороз» при температуре ниже нуля, «Прохладно» при температуре до 15 градусов (не включая 15) и «Тепло» во всех остальных случаях."
    template: |
      temperature = -5

      if temperature {{op}} 0:
          print("Мороз")
      {{kw1}} temperature < 15:
          print("Прохладно")
      {{kw2}}:
          print("Тепло")
    blanks:
      op:
        accept: ["<"]
      kw1:
        accept: ["elif"]
      kw2:
        accept: ["else"]
    variants:
      - prompt: "Оценка «Отлично» ставится за 90 баллов и выше, «Зачёт» за 60 баллов и выше, во всех остальных случаях «Пересдача». Заполните пропуски."
        template: |
          score = 92

          if score {{op}} 90:
              print("Отлично")
          {{kw1}} score >= 60:
              print("Зачёт")
          {{kw2}}:
              print("Пересдача")
        blanks:
          op:
            accept: [">="]
          kw1:
            accept: ["elif"]
          kw2:
            accept: ["else"]
      - prompt: "Посылка весом до 1 кг включительно считается мелким пакетом, до 10 кг включительно посылкой, тяжелее 10 кг крупногабаритом. Заполните пропуски."
        template: |
          weight = 12

          if weight {{op1}} 1:
              print("Мелкий пакет")
          {{kw}} weight <= 10:
              print("Посылка")
          else:
              print("Крупногабарит")
        blanks:
          op1:
            accept: ["<="]
          kw:
            accept: ["elif"]

  - id: cond-predict-001
    concept: conditions
    type: predict-output
    difficulty: 2
    prompt: "Прочитайте код и запишите вывод программы дословно. Если печатается несколько строк, записывайте каждую с новой строки."
    snippet: |
      age = 12

      if age < 7:
          print("Бесплатно")
      elif age < 18:
          print("Детский билет")
      else:
          print("Взрослый билет")
      print("Хорошего визита")
    expected:
      kind: stdout
      value: "Детский билет\nХорошего визита"
    hints:
      - "Выполняется только первая истинная ветка цепочки, а строки после всей конструкции if печатаются в любом случае: они не имеют отступа и в развилку не входят."
    variants:
      - snippet: |
          total = 2500
          is_premium = True

          if total >= 3000 and is_premium:
              print("Бесплатно и без очереди")
          elif total >= 3000 or is_premium:
              print("Доставка бесплатно")
          else:
              print("Доставка 300 рублей")
        expected:
          kind: stdout
          value: "Доставка бесплатно"
      - snippet: |
          city = ""

          if city:
              print("Город указан")
          else:
              print("Укажите город")
          print("Проверка закончена")
        expected:
          kind: stdout
          value: "Укажите город\nПроверка закончена"

  - id: cond-func-ticket-001
    concept: conditions
    type: python-function
    difficulty: 2
    prompt: "Допишите тело функции ticket_price(age): билет в музей для детей младше 7 лет стоит 0 рублей, для посетителей младше 18 лет 150 рублей, для всех остальных 400 рублей. Верните целое число; в день семилетия билет уже стоит 150, в день восемнадцатилетия уже 400."
    starter: |
      def ticket_price(age):
          ...
    cases:
      - call: "ticket_price(4)"
        expect: 0
      - call: "ticket_price(7)"
        expect: 150
      - call: "ticket_price(17)"
        expect: 150
      - call: "ticket_price(18)"
        expect: 400
      - call: "ticket_price(35)"
        expect: 400
    solution: |
      def ticket_price(age):
          if age < 7:
              return 0
          elif age < 18:
              return 150
          else:
              return 400
    hints:
      - "Три ценовых диапазона это цепочка из трёх веток: две проверки и запасной план для всех остальных. Начните с самого младшего возраста."
      - "Если первая проверка не сработала, во второй ветке уже известно, что возраст не меньше 7: достаточно одного сравнения с 18. Слова «младше 7» означают строгое сравнение, без равенства."
    variants:
      - prompt: "Допишите тело функции parking_cost(hours): парковка у аэропорта стоит 100 рублей, если стоянка заняла час или меньше, 300 рублей при стоянке до 5 часов включительно и 500 рублей, если дольше. Верните целое число."
        starter: |
          def parking_cost(hours):
              ...
        cases:
          - call: "parking_cost(1)"
            expect: 100
          - call: "parking_cost(2)"
            expect: 300
          - call: "parking_cost(5)"
            expect: 300
          - call: "parking_cost(8)"
            expect: 500
        solution: |
          def parking_cost(hours):
              if hours <= 1:
                  return 100
              elif hours <= 5:
                  return 300
              else:
                  return 500
      - prompt: "Допишите тело функции parcel_type(weight): посылка весом до 1 кг включительно считается мелким пакетом, до 10 кг включительно посылкой, тяжелее крупногабаритом. Верните в точности одну из строк: 'мелкий пакет', 'посылка' или 'крупногабарит'."
        starter: |
          def parcel_type(weight):
              ...
        cases:
          - call: "parcel_type(0.3)"
            expect: "мелкий пакет"
          - call: "parcel_type(1)"
            expect: "мелкий пакет"
          - call: "parcel_type(10)"
            expect: "посылка"
          - call: "parcel_type(11.5)"
            expect: "крупногабарит"
        solution: |
          def parcel_type(weight):
              if weight <= 1:
                  return "мелкий пакет"
              elif weight <= 10:
                  return "посылка"
              else:
                  return "крупногабарит"

  - id: cond-func-delivery-001
    concept: conditions
    type: python-function
    difficulty: 3
    prompt: "Допишите тело функции delivery_cost(total, is_premium): доставка бесплатна (0 рублей), если сумма заказа не меньше 3000 рублей или клиент оформил премиум-подписку, во всех остальных случаях доставка стоит 300 рублей. Верните целое число; ровно 3000 это уже бесплатная доставка."
    starter: |
      def delivery_cost(total, is_premium):
          ...
    cases:
      - call: "delivery_cost(4500, False)"
        expect: 0
      - call: "delivery_cost(3000, False)"
        expect: 0
      - call: "delivery_cost(1200, True)"
        expect: 0
      - call: "delivery_cost(1200, False)"
        expect: 300
    solution: |
      def delivery_cost(total, is_premium):
          if total >= 3000 or is_premium:
              return 0
          else:
              return 300
    hints:
      - "Бесплатных случаев два, и достаточно любого из них: большая сумма или премиум. Вспомните оператор, который объединяет условия по принципу «хотя бы одно»."
      - "Проверьте бесплатный случай первым одной веткой if, а платный оставьте ветке else: тогда не придётся отдельно описывать, когда доставка платная."
      - "is_premium уже хранит True или False, его можно ставить в условие как есть, без сравнения с True. Для границы 3000 нужен оператор, включающий равенство."
