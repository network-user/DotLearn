exercises:
  - id: listdict-quiz-001
    concept: lists-and-dicts
    type: theory-quiz
    difficulty: 1
    prompt: 'В списке cart = ["хлеб", "молоко", "сыр"] выполнили cart[3]. Что произойдёт?'
    choices:
      - id: a
        text: "Программа вернёт None, потому что элемента с таким индексом нет."
      - id: b
        text: "Программа упадёт с ошибкой IndexError: индекса 3 в списке из трёх элементов не существует."
      - id: c
        text: "Python сам допишет пустой элемент на четвёртое место и вернёт его."
      - id: d
        text: "Программа вернёт последний элемент списка, cart[2]."
    correct: [b]
    explanation: "У списка из трёх элементов индексы 0, 1 и 2; места 3 нет, и Python останавливает программу ошибкой IndexError. Прежде чем читать индекс, полезно свериться с len(cart)."
    variants:
      - prompt: 'Переменную присвоили так: cart = cart.append("яблоки"). Что окажется в cart после этой строки?'
        choices:
          - id: a
            text: "Список из четырёх элементов, включая яблоки."
          - id: b
            text: "None: append меняет список на месте и ничего не возвращает, поэтому в cart попадает None."
          - id: c
            text: "Программа упадёт с ошибкой TypeError."
          - id: d
            text: "Список без изменений, append в этой записи не сработает."
        correct: [b]
        explanation: 'append изменяет список на месте и возвращает None. Присваивание cart = cart.append(...) стирает исходный список, заменяя его на None. Правильно вызывать cart.append("яблоки") отдельной строкой, без присваивания.'
      - prompt: 'Словарь phones = {"Анна": "111"}. Что вернёт phones.get("Борис", "нет номера")?'
        choices:
          - id: a
            text: 'Ошибку KeyError, потому что ключа "Борис" в словаре нет.'
          - id: b
            text: '"нет номера": get возвращает запасное значение вторым аргументом, если ключа нет.'
          - id: c
            text: "None."
          - id: d
            text: '"111", значение первой записи словаря.'
        correct: [b]
        explanation: ".get() ищет ключ и, если его нет, возвращает второй аргумент вместо ошибки. Обращение через квадратные скобки, phones[\"Борис\"], в этой же ситуации подняло бы KeyError."

  - id: listdict-blanks-001
    concept: lists-and-dicts
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Допишите код: добавьте "яблоки" в конец списка cart, затем замените первый элемент на "батон".'
    template: |
      cart = ["хлеб", "молоко", "сыр"]
      cart.{{method}}("яблоки")
      cart{{idx}} = "батон"
      print(cart)
    blanks:
      method:
        accept: ["append"]
      idx:
        accept: ["[0]"]
    variants:
      - prompt: 'Допишите код: добавьте в словарь phones новую запись "Вера", затем прочитайте номер Анны через .get с запасным значением "нет".'
        template: |
          phones = {"Анна": "111"}
          phones{{idx}} = "222"
          print(phones.{{method}}("Анна", "нет"))
        blanks:
          idx:
            accept: ['["Вера"]']
          method:
            accept: ["get"]
      - prompt: 'Допишите проверку: узнайте, отсутствует ли "сыр" в списке cart, и если да, напечатайте сообщение.'
        template: |
          cart = ["хлеб", "молоко"]
          if "сыр" {{op}} cart:
              print("надо купить сыр")
        blanks:
          op:
            accept: ["not in"]

  - id: listdict-predict-001
    concept: lists-and-dicts
    type: predict-output
    difficulty: 2
    prompt: "Что напечатает эта программа?"
    snippet: |
      a = ["хлеб", "молоко"]
      b = a
      b.append("сыр")
      print(a)
    expected:
      kind: stdout
      value: "['хлеб', 'молоко', 'сыр']"
    hints:
      - "b = a не создаёт новый список: обе переменные это два имени одного и того же объекта, поэтому изменение через b видно и через a."
    variants:
      - prompt: "Что напечатает эта программа?"
        snippet: |
          cart = ["хлеб", "молоко", "сыр"]
          cart.remove("молоко")
          print(cart)
        expected:
          kind: stdout
          value: "['хлеб', 'сыр']"
      - prompt: "Что напечатает эта программа?"
        snippet: |
          phones = {"Анна": "111"}
          phones["Анна"] = "222"
          phones["Борис"] = "333"
          print(len(phones))
        expected:
          kind: stdout
          value: "2"

  - id: listdict-func-summary-001
    concept: lists-and-dicts
    type: python-function
    difficulty: 2
    prompt: 'Допишите тело функции cart_summary: она получает список цен и возвращает строку вида "Товаров: 3, итого: 380 руб." Посчитайте количество через len, а сумму через sum.'
    starter: |
      def cart_summary(prices):
          ...
    cases:
      - call: "cart_summary([90, 250, 40])"
        expect: "Товаров: 3, итого: 380 руб."
      - call: "cart_summary([100])"
        expect: "Товаров: 1, итого: 100 руб."
      - call: "cart_summary([])"
        expect: "Товаров: 0, итого: 0 руб."
    solution: |
      def cart_summary(prices):
          return f"Товаров: {len(prices)}, итого: {sum(prices)} руб."
    hints:
      - "Обе величины уже есть среди встроенных функций этого урока: одна считает элементы списка, другая складывает числа внутри него."
      - "Соберите f-строку с двумя подстановками, len(prices) для количества и sum(prices) для итога, как в примере с корзиной покупок из теории."
    variants:
      - prompt: 'Допишите тело функции price_range: она получает список цен и возвращает строку вида "от 40 до 250 руб." с наименьшей и наибольшей ценой.'
        starter: |
          def price_range(prices):
              ...
        cases:
          - call: "price_range([90, 250, 40])"
            expect: "от 40 до 250 руб."
          - call: "price_range([100])"
            expect: "от 100 до 100 руб."
        solution: |
          def price_range(prices):
              return f"от {min(prices)} до {max(prices)} руб."
      - prompt: "Допишите тело функции avg_price: она получает непустой список цен и возвращает среднюю цену как число (sum, делённая на len)."
        starter: |
          def avg_price(prices):
              ...
        cases:
          - call: "avg_price([100, 200])"
            expect: 150.0
          - call: "avg_price([10])"
            expect: 10.0
          - call: "avg_price([90, 250, 40, 20])"
            expect: 100.0
        solution: |
          def avg_price(prices):
              return sum(prices) / len(prices)

  - id: listdict-func-lookup-001
    concept: lists-and-dicts
    type: python-function
    difficulty: 3
    prompt: 'Допишите тело функции lookup_price: она получает словарь цен вида {"хлеб": 40, "молоко": 90} и название товара, а возвращает строку "цена: 40 руб." либо "товара нет в продаже", если товара в словаре нет. Читайте словарь через .get(), а не через квадратные скобки.'
    starter: |
      def lookup_price(prices, item):
          ...
    cases:
      - call: 'lookup_price({"хлеб": 40, "молоко": 90}, "хлеб")'
        expect: "цена: 40 руб."
      - call: 'lookup_price({"хлеб": 40}, "сыр")'
        expect: "товара нет в продаже"
      - call: 'lookup_price({}, "хлеб")'
        expect: "товара нет в продаже"
    solution: |
      def lookup_price(prices, item):
          price = prices.get(item)
          if price is None:
              return "товара нет в продаже"
          return f"цена: {price} руб."
    hints:
      - "Задача из двух шагов: сначала безопасно достать значение по ключу, который может отсутствовать, затем в зависимости от результата выбрать один из двух ответов через if."
      - "Метод .get() без запасного значения вернёт None, если ключа нет. Проверьте результат условием price is None, а не обращением по ключу через квадратные скобки: оно уронило бы программу с KeyError."
