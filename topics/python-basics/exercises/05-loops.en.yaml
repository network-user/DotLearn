exercises:
  - id: loop-quiz-001
    concept: loops
    type: theory-quiz
    difficulty: 1
    prompt: "How many times does the body of for i in range(5) run?"
    choices:
      - id: a
        text: "4 times: range stops before the last number."
      - id: b
        text: "5 times: range(5) yields the numbers 0, 1, 2, 3, 4."
      - id: c
        text: "6 times: the numbers from 0 to 5 inclusive."
      - id: d
        text: "It depends on the commands written in the loop body."
    correct: [b]
    explanation: "range(5) yields exactly five numbers, starting from zero: 0, 1, 2, 3, 4. The body runs once per number. The last value of i is 4, but there are still five iterations."
    variants:
      - prompt: 'What does the loop variable ch get in turn in the loop for ch in "London"?'
        choices:
          - id: a
            text: "The individual characters of the string, one per"
          - id: b
            text: "The words of the string, split by spaces."
          - id: c
            text: "The numeric codes of the letters."
          - id: d
            text: "The whole string at once, a single time."
        correct: [a]
        explanation: 'A string is a sequence of characters, so for iterates over it character by character: here there are six iterations, ch takes the values L, o, n, d, o, n in turn.'
      - prompt: "In which situation do you need a while loop instead of a for loop?"
        choices:
          - id: a
            text: "When the number of repeats is not known in advance and you need to"
          - id: b
            text: "When you need to go through every element of a list in turn."
          - id: c
            text: "When you need to run the body exactly ten times."
          - id: d
            text: "When there is an if condition inside the loop."
        correct: [a]
        explanation: "for fits when there is something to iterate over or the number of repeats is known. while checks its condition before every iteration and runs while it is true, so it is used when you do not know in advance how many repeats you need. if inside a loop is allowed in both cases."

  - id: loop-blanks-001
    concept: loops
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete the loop that adds up all the prices from the list into the accumulator total."
    template: |
      prices = [90, 250, 15000]
      total = 0
      {{kw_for}} price {{kw_in}} prices:
          total {{op}} price
      print(total)
    blanks:
      kw_for:
        accept: ["for"]
      kw_in:
        accept: ["in"]
      op:
        accept: ["+="]
    variants:
      - prompt: "Complete the loop that prints numbers from 1 to 10 inclusive. Remember: the right boundary is excluded from the range."
        template: |
          for n in {{func}}(1, {{stop}}):
              print(n)
        blanks:
          func:
            accept: ["range"]
          stop:
            accept: ["11"]
      - prompt: "Complete the while loop that prints numbers from 0 to 4. Do not forget the line that changes the counter, or the loop will run forever."
        template: |
          count = 0
          {{kw}} count < 5:
              print(count)
              count {{op}} 1
        blanks:
          kw:
            accept: ["while"]
          op:
            accept: ["+="]

  - id: loop-predict-001
    concept: loops
    type: predict-output
    difficulty: 2
    prompt: "What does this program print? Write the output exactly."
    snippet: |
      purchases = [200, 500, 300]
      total = 0
      for amount in purchases:
          total += amount
      print(total)
    expected:
      kind: stdout
      value: "1000"
    hints:
      - "The accumulator total starts at zero, and every iteration adds the next amount to it. print runs once, after the loop is done."
    variants:
      - prompt: "What does this program print? Each print gives a separate line of output."
        snippet: |
          for n in range(2, 5):
              print(n)
        expected:
          kind: stdout
          value: "2\n3\n4"
      - prompt: "What does this program print? Each print gives a separate line of output."
        snippet: |
          for n in range(5):
              if n == 2:
                  continue
              print(n)
        expected:
          kind: stdout
          value: "0\n1\n3\n4"

  - id: loop-func-sum-001
    concept: loops
    type: python-function
    difficulty: 2
    prompt: "Complete the body of total_spent: it receives a list of purchase amounts and returns their total as a whole number. Use a for loop with an accumulator, not the built-in sum function; for an empty list return 0."
    starter: |
      def total_spent(purchases):
          ...
    cases:
      - call: "total_spent([90, 250, 15000])"
        expect: 15340
      - call: "total_spent([1500])"
        expect: 1500
      - call: "total_spent([])"
        expect: 0
    solution: |
      def total_spent(purchases):
          total = 0
          for amount in purchases:
              total += amount
          return total
    hints:
      - "This is an accumulator pipeline: every purchase passes through the loop body in turn and should leave its mark on the running total."
      - "Set up a variable at 0 before the loop, add the current element to it inside the loop, and return it with return after the loop. An empty list gives zero iterations, so the starting value is the answer."
    variants:
      - prompt: "Complete the body of product_of: it receives a list of numbers and returns their product. Use a for loop with an accumulator; for an empty list return 1."
        starter: |
          def product_of(numbers):
              ...
        cases:
          - call: "product_of([2, 3, 4])"
            expect: 24
          - call: "product_of([7])"
            expect: 7
          - call: "product_of([])"
            expect: 1
        solution: |
          def product_of(numbers):
              result = 1
              for n in numbers:
                  result *= n
              return result
      - prompt: "Complete the body of sum_even: it receives a list of integers and returns the sum of only the even ones. Use a for loop with an accumulator and a condition inside the loop; if there are no even numbers, return 0."
        starter: |
          def sum_even(numbers):
              ...
        cases:
          - call: "sum_even([1, 2, 3, 4])"
            expect: 6
          - call: "sum_even([1, 3, 5])"
            expect: 0
          - call: "sum_even([])"
            expect: 0
        solution: |
          def sum_even(numbers):
              total = 0
              for n in numbers:
                  if n % 2 == 0:
                      total += n
              return total

  - id: loop-func-count-001
    concept: loops
    type: python-function
    difficulty: 3
    prompt: "Complete the body of count_expensive: it receives a list of prices and a threshold limit, and returns the count of purchases strictly more expensive than limit. A purchase priced exactly at limit does not count; for an empty list return 0. Solve it with a loop."
    starter: |
      def count_expensive(prices, limit):
          ...
    cases:
      - call: "count_expensive([90, 2500, 900, 5000], 1000)"
        expect: 2
      - call: "count_expensive([300, 300, 300], 300)"
        expect: 0
      - call: "count_expensive([301, 299], 300)"
        expect: 1
      - call: "count_expensive([], 500)"
        expect: 0
    solution: |
      def count_expensive(prices, limit):
          count = 0
          for price in prices:
              if price > limit:
                  count += 1
          return count
    hints:
      - "This is a counter with a condition: you go through all the prices and keep a count of the matching ones. First decide which purchases should increase the counter and which should not."
      - "Set up a counter variable at 0 before the loop, check each price inside the loop with an if condition, and increase the counter by one only for matches."
      - "The words 'strictly more expensive' mean a greater-than comparison, without 'or equal': a price that matches limit exactly must not change the counter."
