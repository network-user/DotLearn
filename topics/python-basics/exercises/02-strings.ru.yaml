exercises:
  - id: str-quiz-001
    concept: strings
    type: theory-quiz
    difficulty: 1
    prompt: 'Переменная s хранит строку "кот". Что произойдёт при выполнении строки кода s[0] = "р"?'
    choices:
      - id: a
        text: 'Строка превратится в "рот".'
      - id: b
        text: 'Python создаст новую строку "рот", а s останется прежней.'
      - id: c
        text: 'Программа упадёт с ошибкой TypeError'
      - id: d
        text: 'Программа упадёт с ошибкой IndexError.'
    correct: [c]
    explanation: 'Строки в Python неизменяемы: читать символ по индексу можно, а присваивать нельзя, поэтому Python бросает TypeError. Чтобы получить "рот", постройте новую строку, например через s.replace("к", "р"), и присвойте её переменной.'
    variants:
      - prompt: 'Что вернёт вызов len("Яндекс Го")?'
        choices:
          - id: a
            text: '8'
          - id: b
            text: '9'
          - id: c
            text: '10'
          - id: d
            text: 'Программа упадёт с ошибкой, потому что в строке есть пробел.'
        correct: [b]
        explanation: 'len() считает все символы подряд, включая пробел: шесть букв слова "Яндекс", пробел и две буквы слова "Го" дают 9.'
      - prompt: 'Переменная city хранит строку "Москва". Что вернёт выражение city[-1]?'
        choices:
          - id: a
            text: 'Букву "а".'
          - id: b
            text: 'Букву "М".'
          - id: c
            text: 'Программа упадёт с ошибкой IndexError.'
          - id: d
            text: 'Букву "в".'
        correct: [a]
        explanation: 'Отрицательные индексы отсчитывают позиции с конца: city[-1] это последний символ строки, буква "а". Ошибки здесь нет, отрицательные индексы допустимы вплоть до -len(city).'

  - id: str-blanks-001
    concept: strings
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Допишите f-строку, чтобы код напечатал «Привет, Анна!»: в первый пропуск поставьте букву, включающую подстановку, во второй подстановку переменной name в фигурных скобках.'
    template: |
      name = "Анна"
      print({{letter}}"Привет, {{expr}}!")
    blanks:
      letter:
        accept: ['f', 'F']
      expr:
        accept: ['{name}']
    variants:
      - prompt: 'Дополните вызов метода, чтобы код напечатал «КАЗАНЬ».'
        template: |
          city = "казань"
          print(city.{{method}}())
        blanks:
          method:
            accept: ['upper']
      - prompt: 'Дополните вызов метода, чтобы код напечатал «Доставка в Казань».'
        template: |
          phrase = "Доставка в Тверь"
          print(phrase.{{method}}("Тверь", "Казань"))
        blanks:
          method:
            accept: ['replace']

  - id: str-predict-001
    concept: strings
    type: predict-output
    difficulty: 2
    prompt: 'Что напечатает этот код?'
    snippet: |
      name = "  анна  "
      print(name.strip().upper())
    expected:
      kind: stdout
      value: "АННА"
    hints:
      - 'Методы в цепочке применяются слева направо, каждый к результату предыдущего: сначала уходят пробелы по краям, затем меняется регистр.'
    variants:
      - snippet: |
          word = "молоко"
          new_word = word.replace("о", "а")
          print(new_word)
          print(len(new_word))
        expected:
          kind: stdout
          value: "малака\n6"
      - snippet: |
          city = "казань"
          city.upper()
          print(city)
        expected:
          kind: stdout
          value: "казань"

  - id: str-func-greet-001
    concept: strings
    type: python-function
    difficulty: 2
    prompt: 'Допишите тело функции greeting: верните строку вида «Привет, Анна!» для переданного имени. Соберите её через f-строку.'
    starter: |
      def greeting(name):
          ...
    cases:
      - call: "greeting('Анна')"
        expect: 'Привет, Анна!'
      - call: "greeting('Борис')"
        expect: 'Привет, Борис!'
      - call: "greeting('Вера')"
        expect: 'Привет, Вера!'
    solution: |
      def greeting(name):
          return f"Привет, {name}!"
    hints:
      - 'Функция должна не печатать фразу, а вернуть её через return: проверка сравнивает именно возвращаемое значение.'
      - 'Поставьте букву f перед кавычками и впишите параметр name в фигурных скобках прямо внутри текста приветствия.'
    variants:
      - prompt: 'Допишите тело функции delivery_sms: верните строку вида «Анна, ваш заказ прибыл в Казань» для переданных имени и города.'
        starter: |
          def delivery_sms(name, city):
              ...
        cases:
          - call: "delivery_sms('Анна', 'Казань')"
            expect: 'Анна, ваш заказ прибыл в Казань'
          - call: "delivery_sms('Борис', 'Тверь')"
            expect: 'Борис, ваш заказ прибыл в Тверь'
        solution: |
          def delivery_sms(name, city):
              return f"{name}, ваш заказ прибыл в {city}"
      - prompt: 'Допишите тело функции door_sign: верните строку вида «Врач: Иванова» для переданной фамилии.'
        starter: |
          def door_sign(surname):
              ...
        cases:
          - call: "door_sign('Иванова')"
            expect: 'Врач: Иванова'
          - call: "door_sign('Петров')"
            expect: 'Врач: Петров'
        solution: |
          def door_sign(surname):
              return f"Врач: {surname}"

  - id: str-func-badge-001
    concept: strings
    type: python-function
    difficulty: 3
    prompt: 'Допишите тело функции badge: на вход приходит имя с лишними пробелами и произвольным регистром, например "  анна  ". Верните аккуратный вариант для бейджа, строку вида "Анна".'
    starter: |
      def badge(raw_name):
          ...
    cases:
      - call: "badge('  анна  ')"
        expect: 'Анна'
      - call: "badge('БОРИС')"
        expect: 'Борис'
      - call: "badge(' вЕра')"
        expect: 'Вера'
    solution: |
      def badge(raw_name):
          return raw_name.strip().capitalize()
    hints:
      - 'В этом вводе два отдельных дефекта: лишние пробелы по краям и случайный регистр букв. На каждый дефект у строки есть свой метод.'
      - 'Методы возвращают новую строку, поэтому их можно выстроить цепочкой: сначала очистите края, затем приведите регистр уже очищенной строки.'
      - 'Пробелы по краям снимает strip(), а capitalize() делает первую букву заглавной и опускает остальные в строчные.'
