exercises:
  - id: func-quiz-001
    concept: functions
    type: theory-quiz
    difficulty: 1
    prompt: "How does return differ from print inside a function?"
    choices:
      - id: a
        text: "print shows a value to a person in the console, while return hands a value back to the program: it can be stored in a variable and used further."
      - id: b
        text: "return prints a value to the screen, while print stores it in a variable."
      - id: c
        text: "There is no difference: both hand a value back to the call site, print just also prints it."
      - id: d
        text: "return only works with numbers, and print only with strings."
    correct: [a]
    explanation: "print is for the eyes, return is for the program. A printed value never reaches the program: only what the function returns via return can be stored, compared, or passed along."
    variants:
      - prompt: "A function reaches the end of its body, and there is no return line in it. What does calling it return?"
        choices:
          - id: a
            text: "None, the special value for 'nothing here'."
          - id: b
            text: "The number 0."
          - id: c
            text: "An empty string."
          - id: d
            text: "Nothing: Python refuses to run a function without return and raises an error."
        correct: [a]
        explanation: "A function without return is not an error, but calling it always returns None. Even a print inside it changes nothing: printing is not returning."
      - prompt: "A return fires inside a function's body, and there are more lines of code below it. When do they run?"
        choices:
          - id: a
            text: "Never: return ends the function immediately."
          - id: b
            text: "On the function's next call."
          - id: c
            text: "Right after the calling code uses the returned value."
          - id: d
            text: "They run in this same call, but only after the value is returned."
        correct: [a]
        explanation: "return has two jobs: hand back a value and immediately end the function. Anything after a return that fires is unreachable; that is why an early exit inside an if branch is so convenient."

  - id: func-blanks-001
    concept: functions
    type: fill-in-blanks
    difficulty: 1
    prompt: "A store gives a 200 discount. Fill in two keywords: one declares the function, the other hands the result back out."
    template: |
      {{kw_def}} apply_discount(price):
          result = price - 200
          {{kw_return}} result

      final = apply_discount(1000)
    blanks:
      kw_def:
        accept: ["def"]
      kw_return:
        accept: ["return"]
    variants:
      - prompt: "Make the polite parameter optional: by default the greeting should be polite."
        template: |
          def greet(name, polite={{default_value}}):
              if polite:
                  return "Good day, " + name
              return "Hi, " + name
        blanks:
          default_value:
            accept: ["True"]
      - prompt: 'Call greet so Anna gets the short "Hi": pass the second argument by name.'
        template: |
          def greet(name, polite=True):
              if polite:
                  return "Good day, " + name
              return "Hi, " + name

          message = greet("Anna", {{arg_name}}=False)
        blanks:
          arg_name:
            accept: ["polite"]

  - id: func-predict-001
    concept: functions
    type: predict-output
    difficulty: 2
    prompt: "Read the code with your eyes and write down the output exactly, line by line."
    snippet: |
      def add(a, b):
          print(a + b)

      result = add(2, 3)
      print(result)
    expected:
      kind: stdout
      value: "5\nNone"
    hints:
      - "Calling a function does not print anything by itself: only what passes through print reaches the screen. Trace each print in turn, and remember what a function without a return statement returns."
    variants:
      - snippet: |
          def status(balance):
              if balance < 0:
                  return "debt"
              print("check passed")
              return "all good"

          print(status(-100))
          print(status(500))
        expected:
          kind: stdout
          value: "debt\ncheck passed\nall good"
      - snippet: |
          def greet(name, polite=True):
              if polite:
                  return "Good day, " + name
              return "Hi, " + name

          print(greet("Anna"))
          print(greet("Boris", polite=False))
        expected:
          kind: stdout
          value: "Good day, Anna\nHi, Boris"

  - id: func-func-taxi-001
    concept: functions
    type: python-function
    difficulty: 3
    prompt: "Write the whole function: def taxi_price(km, base=100). A ride costs base for pickup plus 25 for every kilometer. Return the cost as a whole number, do not print it."
    starter: |
      def taxi_price(km, base=100):
          ...
    cases:
      - call: "taxi_price(10)"
        expect: 350
      - call: "taxi_price(0)"
        expect: 100
      - call: "taxi_price(4, base=200)"
        expect: 300
    solution: |
      def taxi_price(km, base=100):
          return base + 25 * km
    hints:
      - "The function must hand a number back to the program, not show it to a person. No print inside: the check looks at the returned value."
      - "The cost is made of two parts: pickup base and distance, that is 25 times km. At km equal to 0, only the pickup remains."

  - id: func-func-receipt-001
    concept: functions
    type: python-function
    difficulty: 4
    prompt: "The course's final task, it brings together loops, conditions, lists, and arithmetic. Write the whole function: def receipt_total(items, discount_from, discount), where items is a list of lists like [name, price, quantity]. Use a loop to sum 'price times quantity' over all items; if the sum is at least discount_from, take off discount percent; return the total as whole rubles via int()."
    starter: |
      def receipt_total(items, discount_from, discount):
          ...
    cases:
      - call: 'receipt_total([["bread", 45, 2], ["milk", 80, 1]], 500, 25)'
        expect: 170
      - call: 'receipt_total([["cheese", 600, 1], ["coffee", 350, 2]], 1000, 25)'
        expect: 975
      - call: 'receipt_total([["book", 250, 2]], 500, 50)'
        expect: 250
      - call: "receipt_total([], 100, 25)"
        expect: 0
    solution: |
      def receipt_total(items, discount_from, discount):
          total = 0
          for item in items:
              total = total + item[1] * item[2]
          if total >= discount_from:
              total = total * (100 - discount) / 100
          return int(total)
    hints:
      - "Split the task into two steps: first an accumulator loop adds up the cost of every line item, then a single condition decides the discount's fate. Do not try to squeeze it all into one line."
      - "Inside the loop, each item's price sits at item[1] and quantity at item[2]. The accumulator total starts at zero, like in the loops lesson."
      - "A discount percent means that 100 - discount percent of the sum remains. The discount also fires when the sum exactly equals discount_from. An empty receipt gives 0 with no conditions needed."
