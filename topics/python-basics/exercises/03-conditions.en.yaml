exercises:
  - id: cond-quiz-001
    concept: conditions
    type: theory-quiz
    difficulty: 1
    prompt: "In an if/elif/else chain, the conditions of two branches turn out true at once. What does Python do?"
    choices:
      - id: a
        text: "Runs both branches in turn, top to bottom."
      - id: b
        text: "Runs only the first branch from the top whose condition is true, skips the rest."
      - id: c
        text: "Runs only the last branch whose condition is true."
      - id: d
        text: "Stops the program with an error: two true conditions are not allowed."
    correct: [b]
    explanation: "Python checks conditions top to bottom and runs the first true branch, then skips the rest of the chain, even if other conditions below are also true. So the order of branches matters."
    variants:
      - prompt: "The variable age equals 18, then this code runs: if age >= 18: print('Adult ticket') else: print('Child ticket'). What appears on screen?"
        choices:
          - id: a
            text: "Adult ticket"
          - id: b
            text: "Child ticket"
          - id: c
            text: "Both lines, one after another."
          - id: d
            text: "Nothing: the program ends with an error."
        correct: [a]
        explanation: "The operator >= means greater than or equal, so when age is 18 the condition is true and the if branch runs. The else branch is skipped entirely."
      - prompt: "What does the expression '5' == 5 return?"
        choices:
          - id: a
            text: "True: Python converts the string to a number before comparing."
          - id: b
            text: "False: a string and a number are values of different types, they are not equal."
          - id: c
            text: "The program crashes with TypeError."
          - id: d
            text: "The number 5."
        correct: [b]
        explanation: "The == operator does not convert types: the string '5' and the number 5 are different values, so the comparison quietly returns False. To compare them fairly, convert the string to a number first: int('5') == 5 gives True."

  - id: cond-blanks-001
    concept: conditions
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Fill in the blanks so the program prints "Freezing" below zero, "Cool" up to 15 degrees (not including 15), and "Warm" in every other case.'
    template: |
      temperature = -5

      if temperature {{op}} 0:
          print("Freezing")
      {{kw1}} temperature < 15:
          print("Cool")
      {{kw2}}:
          print("Warm")
    blanks:
      op:
        accept: ["<"]
      kw1:
        accept: ["elif"]
      kw2:
        accept: ["else"]
    variants:
      - prompt: 'A grade of "Excellent" is given for 90 points and above, "Pass" for 60 and above, and "Retake" otherwise. Fill in the blanks.'
        template: |
          score = 92

          if score {{op}} 90:
              print("Excellent")
          {{kw1}} score >= 60:
              print("Pass")
          {{kw2}}:
              print("Retake")
        blanks:
          op:
            accept: [">="]
          kw1:
            accept: ["elif"]
          kw2:
            accept: ["else"]
      - prompt: 'A parcel weighing up to 1 kg inclusive counts as a small package, up to 10 kg inclusive as a parcel, and anything heavier than 10 kg as oversized. Fill in the blanks.'
        template: |
          weight = 12

          if weight {{op1}} 1:
              print("Small package")
          {{kw}} weight <= 10:
              print("Parcel")
          else:
              print("Oversized")
        blanks:
          op1:
            accept: ["<="]
          kw:
            accept: ["elif"]

  - id: cond-predict-001
    concept: conditions
    type: predict-output
    difficulty: 2
    prompt: "Read the code and write down the program's output word for word. If several lines print, write each on its own line."
    snippet: |
      age = 12

      if age < 7:
          print("Free")
      elif age < 18:
          print("Child ticket")
      else:
          print("Adult ticket")
      print("Have a nice visit")
    expected:
      kind: stdout
      value: "Child ticket\nHave a nice visit"
    hints:
      - "Only the first true branch of the chain runs, and the lines after the whole if construct print regardless: they have no indentation and are not part of the branching."
    variants:
      - snippet: |
          total = 2500
          is_premium = True

          if total >= 3000 and is_premium:
              print("Free with no line")
          elif total >= 3000 or is_premium:
              print("Free delivery")
          else:
              print("Delivery costs 300")
        expected:
          kind: stdout
          value: "Free delivery"
      - snippet: |
          city = ""

          if city:
              print("City is set")
          else:
              print("Enter a city")
          print("Check complete")
        expected:
          kind: stdout
          value: "Enter a city\nCheck complete"

  - id: cond-func-ticket-001
    concept: conditions
    type: python-function
    difficulty: 2
    prompt: "Complete the body of ticket_price(age): a museum ticket for children under 7 costs 0, for visitors under 18 it costs 150, for everyone else 400. Return a whole number; on a 7th birthday the ticket already costs 150, and on an 18th birthday it already costs 400."
    starter: |
      def ticket_price(age):
          ...
    cases:
      - call: "ticket_price(4)"
        expect: 0
      - call: "ticket_price(7)"
        expect: 150
      - call: "ticket_price(17)"
        expect: 150
      - call: "ticket_price(18)"
        expect: 400
      - call: "ticket_price(35)"
        expect: 400
    solution: |
      def ticket_price(age):
          if age < 7:
              return 0
          elif age < 18:
              return 150
          else:
              return 400
    hints:
      - "Three price ranges form a chain of three branches: two checks and a fallback for everyone else. Start with the youngest age."
      - "If the first check fails, the second branch already knows age is at least 7: one comparison against 18 is enough. The words 'younger than 7' mean a strict comparison, without equality."
    variants:
      - prompt: "Complete the body of parking_cost(hours): airport parking costs 100 for a stay of an hour or less, 300 for up to 5 hours inclusive, and 500 for longer. Return a whole number."
        starter: |
          def parking_cost(hours):
              ...
        cases:
          - call: "parking_cost(1)"
            expect: 100
          - call: "parking_cost(2)"
            expect: 300
          - call: "parking_cost(5)"
            expect: 300
          - call: "parking_cost(8)"
            expect: 500
        solution: |
          def parking_cost(hours):
              if hours <= 1:
                  return 100
              elif hours <= 5:
                  return 300
              else:
                  return 500
      - prompt: "Complete the body of parcel_type(weight): a parcel weighing up to 1 kg inclusive counts as a small package, up to 10 kg inclusive as a parcel, and heavier as oversized. Return exactly one of these strings: 'small package', 'parcel', or 'oversized'."
        starter: |
          def parcel_type(weight):
              ...
        cases:
          - call: "parcel_type(0.3)"
            expect: "small package"
          - call: "parcel_type(1)"
            expect: "small package"
          - call: "parcel_type(10)"
            expect: "parcel"
          - call: "parcel_type(11.5)"
            expect: "oversized"
        solution: |
          def parcel_type(weight):
              if weight <= 1:
                  return "small package"
              elif weight <= 10:
                  return "parcel"
              else:
                  return "oversized"

  - id: cond-func-delivery-001
    concept: conditions
    type: python-function
    difficulty: 3
    prompt: "Complete the body of delivery_cost(total, is_premium): delivery is free (0) if the order total is at least 3000 or the customer has a premium subscription, otherwise delivery costs 300. Return a whole number; exactly 3000 already means free delivery."
    starter: |
      def delivery_cost(total, is_premium):
          ...
    cases:
      - call: "delivery_cost(4500, False)"
        expect: 0
      - call: "delivery_cost(3000, False)"
        expect: 0
      - call: "delivery_cost(1200, True)"
        expect: 0
      - call: "delivery_cost(1200, False)"
        expect: 300
    solution: |
      def delivery_cost(total, is_premium):
          if total >= 3000 or is_premium:
              return 0
          else:
              return 300
    hints:
      - "There are two free cases, and either one is enough. Recall the operator that combines conditions on an 'at least one' basis."
      - "Check the free case first with a single if branch, and leave the paid case to else: then you do not have to separately describe when delivery is paid."
      - "is_premium already holds True or False, you can use it in the condition as is, without comparing to True. The 3000 boundary needs an operator that includes equality."
