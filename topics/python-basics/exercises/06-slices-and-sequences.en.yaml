exercises:
  - id: slice-quiz-001
    concept: slices-and-sequences
    type: theory-quiz
    difficulty: 1
    prompt: "The list purchases = [90, 250, 15000, 640, 300]. What does purchases[1:4] return?"
    choices:
      - id: a
        text: "[250, 15000, 640, 300] - every element from index 1 to the end."
      - id: b
        text: "[250, 15000, 640] - the elements at indices 1, 2, and 3; index 4 is not included in the result."
      - id: c
        text: "[90, 250, 15000, 640] - the first four elements of the list."
      - id: d
        text: "An IndexError, because the notation looks invalid."
    correct: [b]
    explanation: "The slice [1:4] takes indices 1, 2, and 3; the right boundary 4 is excluded from the result, exactly like range from the loops lesson. There is no error here, even if the boundary went past the end of the list."
    variants:
      - prompt: 'The string city = "Vladivostok". What does city[:4] return?'
        choices:
          - id: a
            text: '"Vlad" - the first four characters, indices 0 through 3.'
          - id: b
            text: '"vostok" - the last six characters of the string.'
          - id: c
            text: "An error, because the start boundary is not given explicitly."
          - id: d
            text: '"Vladivostok" in full, unchanged.'
        correct: [a]
        explanation: 'A missing start means "from the very beginning", so the slice takes the characters at indices 0, 1, 2, and 3 - the first four letters of the word.'
      - prompt: "What does purchases[100:200] return for the list purchases = [90, 250, 15000]?"
        choices:
          - id: a
            text: "An IndexError: both boundaries are far past the end of the list."
          - id: b
            text: "An empty list [], with no error at all."
          - id: c
            text: "None."
          - id: d
            text: "The list purchases unchanged."
        correct: [b]
        explanation: "A slice never raises IndexError: if, after clamping the boundaries to the sequence's real limits, no indices remain, the result is simply an empty sequence of the same type."

  - id: slice-blanks-001
    concept: slices-and-sequences
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete the code: take the first three purchases into first_three and the last two into last_two."
    template: |
      purchases = [90, 250, 15000, 640, 300]
      first_three = purchases[:{{stop}}]
      last_two = purchases[{{start}}:]
      print(first_three, last_two)
    blanks:
      stop:
        accept: ["3"]
      start:
        accept: ["-2"]
    variants:
      - prompt: "Complete the code: reverse the string word back to front with a single slice using a negative step."
        template: |
          word = "code"
          reversed_word = word[::{{step}}]
          print(reversed_word)
        blanks:
          step:
            accept: ["-1"]
      - prompt: "Complete the code: get every other element of the list numbers, starting at index 0."
        template: |
          numbers = [10, 20, 30, 40, 50, 60]
          evens = numbers[::{{step}}]
          print(evens)
        blanks:
          step:
            accept: ["2"]

  - id: slice-predict-001
    concept: slices-and-sequences
    type: predict-output
    difficulty: 2
    prompt: "What does this program print?"
    snippet: |
      purchases = [90, 250, 15000, 640, 300]
      print(purchases[-3:])
    expected:
      kind: stdout
      value: "[15000, 640, 300]"
    hints:
      - 'The negative index -3 inside a slice counts the third element from the end, and an empty stop means "all the way to the end".'
    variants:
      - prompt: "What does this program print?"
        snippet: |
          name = "Anna"
          print(name[::-1])
        expected:
          kind: stdout
          value: "annA"
      - prompt: "What does this program print?"
        snippet: |
          numbers = [0, 1, 2, 3, 4, 5]
          print(numbers[1:5:2])
        expected:
          kind: stdout
          value: "[1, 3]"

  - id: slice-func-lastn-001
    concept: slices-and-sequences
    type: python-function
    difficulty: 2
    prompt: "Complete the body of last_n: it receives a list and a number n, and returns the last n elements of the list with a single slice. For n equal to 0, return an empty list."
    starter: |
      def last_n(items, n):
          ...
    cases:
      - call: "last_n([90, 250, 15000, 640, 300], 2)"
        expect: [640, 300]
      - call: "last_n([1, 2, 3], 0)"
        expect: []
      - call: "last_n([1, 2, 3], 3)"
        expect: [1, 2, 3]
    solution: |
      def last_n(items, n):
          if n == 0:
              return []
          return items[-n:]
    hints:
      - "The slice items[-n:] naturally takes the last n elements, but check the case n == 0 separately: the negative index -0 equals plain zero, and items[0:] returns the whole list instead of an empty one."
      - "Put the n == 0 check at the top of the function and return an empty list right away; for every other n use items[-n:]."
    variants:
      - prompt: "Complete the body of first_n: it receives a list and a number n, and returns the first n elements of the list with a single slice."
        starter: |
          def first_n(items, n):
              ...
        cases:
          - call: "first_n([90, 250, 15000, 640, 300], 3)"
            expect: [90, 250, 15000]
          - call: "first_n([1, 2, 3], 0)"
            expect: []
          - call: "first_n([1, 2], 5)"
            expect: [1, 2]
        solution: |
          def first_n(items, n):
              return items[:n]
      - prompt: "Complete the body of reversed_copy: it receives a list and returns a copy of it in reverse order with a single slice, without changing the original list."
        starter: |
          def reversed_copy(items):
              ...
        cases:
          - call: "reversed_copy([1, 2, 3])"
            expect: [3, 2, 1]
          - call: "reversed_copy([])"
            expect: []
          - call: "reversed_copy([5])"
            expect: [5]
        solution: |
          def reversed_copy(items):
              return items[::-1]

  - id: slice-func-trim-001
    concept: slices-and-sequences
    type: python-function
    difficulty: 3
    prompt: "Complete the body of trim_edges: it receives a list items and a number k, and returns the list without the first k and the last k elements. Solve it with a single slice using two boundaries. If k is 0, return the list unchanged; if nothing is left after trimming, return an empty list."
    starter: |
      def trim_edges(items, k):
          ...
    cases:
      - call: "trim_edges([1, 2, 3, 4, 5, 6, 7], 2)"
        expect: [3, 4, 5]
      - call: "trim_edges([1, 2, 3], 1)"
        expect: [2]
      - call: "trim_edges([1, 2, 3], 2)"
        expect: []
      - call: "trim_edges([1, 2, 3, 4], 0)"
        expect: [1, 2, 3, 4]
    solution: |
      def trim_edges(items, k):
          if k == 0:
              return items[:]
          return items[k:-k]
    hints:
      - "A single slice with both boundaries solves everything: start trims k elements from the left, and a negative stop trims k elements from the right, with no need to count the list's length."
      - "When k == 0, the negative boundary -0 equals plain zero, and items[0:-0] would turn into an empty list instead of the original one - handle this edge case with a separate branch, like n == 0 in the last_n function."
