exercises:
  - id: vars-quiz-001
    concept: variables-and-types
    type: theory-quiz
    difficulty: 1
    prompt: "Boris ran three lines: x = 100, then y = x, then x = 200. What does print(y) print?"
    choices:
      - id: a
        text: "100"
      - id: b
        text: "200"
      - id: c
        text: "300"
      - id: d
        text: "The program crashes with an error."
    correct: [a]
    explanation: "The line y = x sticks the name y onto the same object 100, it does not copy the variable. The later assignment x = 200 only re-sticks the label x; the name y still points to 100."
    variants:
      - prompt: "What does the call type(2.0) return?"
        choices:
          - id: a
            text: "int"
          - id: b
            text: "float"
          - id: c
            text: "str"
          - id: d
            text: "bool"
        correct: [b]
        explanation: "The dot in 2.0 makes the number fractional, so its type is float. A whole number would be int, written as 2 without a dot."
      - prompt: 'Vera wrote digits = "100" (in quotes). What does type(digits) return?'
        choices:
          - id: a
            text: "int"
          - id: b
            text: "str"
          - id: c
            text: "float"
          - id: d
            text: "bool"
        correct: [b]
        explanation: 'Quotes turn the value into text: "100" here is a three-character string, not a number. Getting a number out of it needs a conversion, int(digits).'

  - id: vars-blanks-001
    concept: variables-and-types
    type: fill-in-blanks
    difficulty: 1
    prompt: 'Create a variable name with the string value "Anna" and print it with print.'
    template: |
      name = {{value}}
      print({{arg}})
    blanks:
      value:
        accept: ['"Anna"', "'Anna'"]
      arg:
        accept: ["name"]
    variants:
      - prompt: 'Create a variable city with the string value "Kazan" and print it with print.'
        template: |
          city = {{value}}
          print({{arg}})
        blanks:
          value:
            accept: ['"Kazan"', "'Kazan'"]
          arg:
            accept: ["city"]
      - prompt: "Create a variable price with the whole number 990 (no quotes) and print it with print."
        template: |
          price = {{value}}
          print({{arg}})
        blanks:
          value:
            accept: ["990"]
          arg:
            accept: ["price"]

  - id: vars-predict-001
    concept: variables-and-types
    type: predict-output
    difficulty: 2
    prompt: "What does this program print? Write the output exactly, each print on its own line."
    snippet: |
      x = 7
      x = x + 1
      print(x // 2)
      print(x / 2)
    expected:
      kind: stdout
      value: "4\n4.0"
    hints:
      - "First trace the reassignment: what is x by the time it gets printed? Then remember that // and / return values of different types, even when the division is exact."
    variants:
      - snippet: |
          price = 500
          price = 450
          print(price)
          print(price / 3)
        expected:
          kind: stdout
          value: "450\n150.0"
      - snippet: |
          n = 9
          n = n + 1
          print(n % 4)
          print(n / 4)
        expected:
          kind: stdout
          value: "2\n2.5"

  - id: vars-func-total-001
    concept: variables-and-types
    type: python-function
    difficulty: 2
    prompt: "Complete the body of order_total(price, qty): a customer buys qty identical items priced at price. Return the total cost as a whole number, do not print it."
    starter: |
      def order_total(price, qty):
          ...
    cases:
      - call: "order_total(120, 3)"
        expect: 360
      - call: "order_total(90, 1)"
        expect: 90
      - call: "order_total(45, 10)"
        expect: 450
    solution: |
      def order_total(price, qty):
          return price * qty
    hints:
      - "The function must not print the answer, it must return it: the result goes back via return, as the exercise-format note in the theory explains."
      - "Turn the two parameters into a single number with exactly one arithmetic operation. Pick the operator based on the problem statement."
    variants:
      - prompt: "Complete the body of change(payment, price): a customer paid payment for an item priced at price. Return the change as a whole number."
        starter: |
          def change(payment, price):
              ...
        cases:
          - call: "change(1000, 640)"
            expect: 360
          - call: "change(500, 500)"
            expect: 0
          - call: "change(200, 137)"
            expect: 63
        solution: |
          def change(payment, price):
              return payment - price
      - prompt: "Complete the body of rect_area(width, height): a room has integer width and height in meters. Return the room's area as a whole number."
        starter: |
          def rect_area(width, height):
              ...
        cases:
          - call: "rect_area(4, 5)"
            expect: 20
          - call: "rect_area(7, 7)"
            expect: 49
          - call: "rect_area(1, 250)"
            expect: 250
        solution: |
          def rect_area(width, height):
              return width * height

  - id: vars-func-convert-001
    concept: variables-and-types
    type: python-function
    difficulty: 3
    prompt: 'price_text holds an item price as a string, e.g. "450". The customer pays with a single 1000 bill. Complete the function: return the change as a whole number (int).'
    starter: |
      def change_from_1000(price_text):
          ...
    cases:
      - call: 'change_from_1000("450")'
        expect: 550
      - call: 'change_from_1000("1000")'
        expect: 0
      - call: 'change_from_1000("37")'
        expect: 963
    solution: |
      def change_from_1000(price_text):
          return 1000 - int(price_text)
    hints:
      - 'For Python, the string "450" is text, like a price tag label, not a number: you cannot subtract text from a number, you get a TypeError. First you need a real number out of the text.'
      - "Split the task into two steps: turn the string into an integer, then subtract it from 1000 and return the difference with return."
      - "The built-in function int() does the conversion: it takes a string of digits and returns a whole number."
