exercises:
  - id: name-what-is-001
    concept: modules-and-name
    type: theory-quiz
    difficulty: 1
    prompt: "Что хранится в переменной `__name__`, когда файл запущен командой `python script.py`?"
    choices:
      - id: a
        text: "Строка `\"__main__\"`."
      - id: b
        text: "Имя файла без расширения, то есть `\"script\"`."
      - id: c
        text: "Полный путь к файлу на диске."
      - id: d
        text: "Пустая строка, пока модуль не импортирован."
    correct: [a]
    explanation: "При прямом запуске файла Python кладёт в `__name__` строку `\"__main__\"`. Имя модуля попадает туда только при импорте."
    variants:
      - prompt: "Что хранится в `__name__` модуля `greet`, если его импортировали как `import greet`?"
        choices:
          - id: a
            text: "Строка `\"greet\"` - имя модуля."
          - id: b
            text: "Строка `\"__main__\"`, как и при запуске."
          - id: c
            text: "Полный путь к файлу `greet.py`."
          - id: d
            text: "Ничего: `__name__` появляется только при запуске."
        correct: [a]
        explanation: "При импорте в `__name__` лежит имя модуля, под которым его импортировали - здесь это `\"greet\"`."
      - prompt: "Нужно ли объявлять переменную `__name__` в начале файла, чтобы ей пользоваться?"
        choices:
          - id: a
            text: "Нет, Python создаёт её в каждом модуле"
          - id: b
            text: "Да, иначе при обращении будет `NameError`."
          - id: c
            text: "Только если файл запускают напрямую."
          - id: d
            text: "Только если файл импортируют."
        correct: [a]
        explanation: "`__name__` интерпретатор задаёт каждому модулю сам; объявлять её не нужно ни при запуске, ни при импорте."

  - id: name-import-means-001
    concept: modules-and-name
    type: theory-quiz
    difficulty: 2
    prompt: "Что на самом деле делает строка `import greet`, если в `greet.py` на верхнем уровне есть `print(\"привет\")`?"
    choices:
      - id: a
        text: "Выполняет весь файл `greet.py` сверху вниз, поэтому `print` сработает."
      - id: b
        text: "Достаёт из файла только функции, не исполняя `print`."
      - id: c
        text: "Копирует текст функций, но ничего не выполняет."
      - id: d
        text: "Откладывает выполнение файла до первого вызова функции из него."
    correct: [a]
    explanation: "Импорт исполняет тело модуля целиком. Любая «голая» строка вроде `print` на верхнем уровне выполнится прямо во время импорта."
    variants:
      - prompt: "Файл `tools.py` содержит на верхнем уровне `open(\"data.txt\")`. Когда откроется файл `data.txt`?"
        choices:
          - id: a
            text: "В момент `import tools` - тело модуля исполняется при импорте."
          - id: b
            text: "Только когда вызовут функцию из `tools`."
          - id: c
            text: "Никогда: верхний уровень при импорте не исполняется."
          - id: d
            text: "Только при запуске `python tools.py`, но не при импорте."
        correct: [a]
        explanation: "Импорт исполняет весь верхний уровень модуля, поэтому `open` отработает уже при `import tools` - это сайд-эффект импорта."
      - prompt: "Сколько раз исполнится тело модуля `who`, если в коде подряд стоят три строки `import who`?"
        choices:
          - id: a
            text: "Один раз: результат первого импорта кэшируется в"
          - id: b
            text: "Три раза - по разу на каждый `import`."
          - id: c
            text: "Ни одного: повторные импорты запрещены."
          - id: d
            text: "Зависит от того, есть ли в `who` функция `main`."
        correct: [a]
        explanation: "Тело модуля исполняется при первом импорте, дальше модуль берётся из кэша `sys.modules`, и повторные `import` его не переисполняют."

  - id: name-predict-run-001
    concept: modules-and-name
    type: predict-output
    difficulty: 2
    prompt: "Этот файл запущен напрямую как главная программа. Что он выведет?"
    snippet: |
      def greet(name):
          return f"Привет, {name}"

      if __name__ == "__main__":
          print("режим:", __name__)
      else:
          print("импорт:", __name__)
    expected:
      kind: stdout
      value: "режим: __main__"
    hints:
      - "Файл запущен напрямую, а не импортирован. Какое значение получает `__name__` в этом случае - и какая ветка `if` сработает?"
    variants:
      - snippet: |
          print("__name__ =", repr(__name__))
        expected:
          kind: stdout
          value: "__name__ = '__main__'"
      - snippet: |
          flag = __name__ == "__main__"
          print(flag)
        expected:
          kind: stdout
          value: "True"

  - id: name-import-once-001
    concept: modules-and-name
    type: predict-output
    difficulty: 3
    prompt: "Считайте, что модуль `config` при импорте печатает `загрузка` (одна строка `print` на его верхнем уровне). Что выведет эта главная программа?"
    snippet: |
      modules_log = []

      def load_config():
          modules_log.append("загрузка")
          return {"debug": True}

      cfg = load_config()
      cfg = load_config()
      print(modules_log)
    expected:
      kind: stdout
      value: "['загрузка', 'загрузка']"
    hints:
      - "Здесь нет настоящего импорта: `load_config` - обычная функция. Сколько раз её вызвали явно?"
      - "Кэширование `sys.modules` касается оператора `import`, а не повторного вызова обычной функции. Каждый вызов `load_config()` добавляет элемент в список."
    variants:
      - snippet: |
          calls = []

          def init():
              calls.append("x")

          init()
          init()
          init()
          print(len(calls))
        expected:
          kind: stdout
          value: "3"

  - id: name-guard-blanks-001
    concept: modules-and-name
    type: fill-in-blanks
    difficulty: 1
    prompt: "Дополните код так, чтобы он напечатал имя модуля только при прямом запуске файла."
    template: |
      if {{var}} == {{value}}:
          print("запущен напрямую")
    blanks:
      var:
        accept: ["__name__"]
      value:
        accept: ["\"__main__\"", "'__main__'"]
    hints:
      - "Идиома сравнивает специальную переменную модуля с фиксированной строкой, которую интерпретатор ставит при запуске файла."
    variants:
      - template: |
          import math
          print(math.{{attr}})
        blanks:
          attr:
            accept: ["__name__"]
      - template: |
          if __name__ {{op}} "__main__":
              print("это импорт, а не запуск")
        blanks:
          op:
            accept: ["!="]

  - id: name-detect-mode-001
    concept: modules-and-name
    type: python-function
    difficulty: 3
    prompt: "Допишите `describe_mode(name)`: верните `\"запуск\"`, если строка `name` равна `\"__main__\"`, и `\"импорт\"` в любом другом случае. Это та логика, по которой модуль понимает свой режим."
    starter: |
      def describe_mode(name):
          ...
    cases:
      - call: "describe_mode('__main__')"
        expect: "запуск"
      - call: "describe_mode('greet')"
        expect: "импорт"
      - call: "describe_mode('tools.helpers')"
        expect: "импорт"
    hints:
      - "Режим определяется единственным сравнением строки с фиксированным значением `\"__main__\"`. Всё остальное - это «импорт»."
      - "Достаточно одного `if name == \"__main__\"` с возвратом нужной строки и `return` для всех прочих случаев."
    solution: |
      def describe_mode(name):
          if name == "__main__":
              return "запуск"
          return "импорт"

  - id: name-module-attr-001
    concept: modules-and-name
    type: python-function
    difficulty: 4
    prompt: "Допишите `imported_name(module)`: верните значение атрибута `__name__` переданного модуля (как строку). Используйте, что `__name__` - обычный атрибут любого модуля, доступный снаружи."
    starter: |
      def imported_name(module):
          ...
    cases:
      - call: "import math; imported_name(math)"
        expect: "math"
      - call: "import json; imported_name(json)"
        expect: "json"
      - call: "import collections.abc; imported_name(collections.abc)"
        expect: "collections.abc"
    hints:
      - "`__name__` импортированного модуля - это не внутренняя тайна, а атрибут объекта модуля. Как обращаются к атрибуту объекта по имени?"
      - "У объекта модуля есть атрибут `__name__`; верните `module.__name__`."
    solution: |
      def imported_name(module):
          return module.__name__
