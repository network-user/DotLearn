exercises:
  - id: guard-purpose-001
    concept: the-main-guard
    type: theory-quiz
    difficulty: 1
    prompt: "Why wrap run code in `if __name__ == \"__main__\":`?"
    choices:
      - id: a
        text: "So it runs on direct file run but not on import."
      - id: b
        text: "To speed up module import — the guard skips the whole file body."
      - id: c
        text: "So Python allows importing the file at all."
      - id: d
        text: "To make functions private and inaccessible from outside."
    correct: [a]
    explanation: "The guard shows run code to the first reader (who runs the file) and hides it from the second (who imports the module)."
    variants:
      - prompt: "What happens to line `print(add(2, 3))` if it sits at module level WITHOUT a guard and the module is imported?"
        choices:
          - id: a
            text: "It runs during import and prints the result in someone else's program."
          - id: b
            text: "It is ignored because this is not the main module."
          - id: c
            text: "Python raises an error: printing at module level is forbidden."
          - id: d
            text: "It runs but output is suppressed automatically."
        correct: [a]
        explanation: "Without a guard any top-level call runs on import. That is exactly the «clutter in someone else's program» the guard prevents."
      - prompt: "Which code is conventionally left OUTSIDE the guard?"
        choices:
          - id: a
            text: "Definitions of functions, classes, and constants."
          - id: b
            text: "The `main()` call and reading command-line arguments."
          - id: c
            text: "Printing program results."
          - id: d
            text: "Starting processes and network requests."
        correct: [a]
        explanation: "Definitions live outside the guard — both readers need them. Actions (calls, printing, startup) go inside the guard."

  - id: guard-inside-outside-001
    concept: the-main-guard
    type: theory-quiz
    difficulty: 2
    prompt: "What happens if you move function definition `add` INSIDE the guard and then write `from module import add`?"
    choices:
      - id: a
        text: "Import fails with `ImportError`: on import the guard did not run and `add` was never defined."
      - id: b
        text: "Everything works: the guard does not affect importing `add`."
      - id: c
        text: "`add` imports but equals `None`."
      - id: d
        text: "Python automatically moves `add` outside the guard."
    correct: [a]
    explanation: "On import `__name__` is not `\"__main__\"`, the block under the guard is skipped, and `add` inside it is never created. So `from module import add` cannot find the name. Definitions must live outside the guard."
    variants:
      - prompt: "Where should function `main()` that starts the program stand in the canonical idiom form?"
        choices:
          - id: a
            text: "`main()` is defined outside the guard, and the call `main()` sits under the guard."
          - id: b
            text: "Both `def main()` and the call `main()` sit under the guard."
          - id: c
            text: "`main()` is fully defined inside the guard so it cannot be imported."
          - id: d
            text: "The call `main()` sits outside the guard and the definition inside."
        correct: [a]
        explanation: "Canonical form: `def main()` outside the guard (still available for import and tests), and a single `main()` call under the guard."
      - prompt: "Heavy initialization (e.g. reading a large file) sits at module level outside the guard. What happens to it when this module is imported?"
        choices:
          - id: a
            text: "It runs on import: the guard hides only its own block, not all code outside it."
          - id: b
            text: "It does not run: the guard disables the whole file on import."
          - id: c
            text: "It runs but only the second time the module is imported."
          - id: d
            text: "Python moves it under the guard automatically to speed up import."
        correct: [a]
        explanation: "The guard skips only its block. Any code outside the guard, including expensive initialization, runs on import. To avoid that, hide initialization under the guard or inside a function."

  - id: guard-predict-run-001
    concept: the-main-guard
    type: predict-output
    difficulty: 2
    prompt: "The file is run directly. What does it print?"
    snippet: |
      def main():
          print("working")

      print("module body")

      if __name__ == "__main__":
          main()
    expected:
      kind: stdout
      value: |-
        module body
        working
    hints:
      - "The line outside the guard prints always whenever the module body runs. When does the `main()` call under the guard fire?"
      - "Top level runs top to bottom first: `def main` (prints nothing), then `print(\"module body\")`, then the guard calls `main`."
    variants:
      - snippet: |
          def main():
              print("working")

          print("module body")

          if __name__ == "library":
              main()
        expected:
          kind: stdout
          value: "module body"
      - snippet: |
          print("start")

          if __name__ == "__main__":
              print("main")

          print("finish")
        expected:
          kind: stdout
          value: |-
            start
            main
            finish

  - id: guard-typo-001
    concept: the-main-guard
    type: predict-output
    difficulty: 3
    prompt: "The file is run directly. Note the string in the guard. What does it print?"
    snippet: |
      def run():
          return "started"

      result = "nothing"
      if __name__ == "_main_":
          result = run()

      print(result)
    expected:
      kind: stdout
      value: "nothing"
    hints:
      - "Compare the guard string to the value actually in `__name__` on run. Are they the same string?"
      - "The code has `\"_main_\"` (one underscore each side) but `__name__` is `\"__main__\"` (two each). The condition is false, `result` does not change."
    variants:
      - snippet: |
          def run():
              return "started"

          result = "nothing"
          if __name__ == "__main__ ":
              result = run()

          print(result)
        expected:
          kind: stdout
          value: "nothing"
      - snippet: |
          def run():
              return "started"

          result = "nothing"
          if __name__ == "__main__":
              result = run()

          print(result)
        expected:
          kind: stdout
          value: "started"

  - id: guard-blanks-001
    concept: the-main-guard
    type: fill-in-blanks
    difficulty: 1
    prompt: "Assemble the canonical entry point: move startup into `main()` and call it only on direct file run."
    template: |
      def main():
          print("start")

      if __name__ == {{value}}:
          {{call}}
    blanks:
      value:
        accept: ["\"__main__\"", "'__main__'"]
      call:
        accept: ["main()", "main ()"]
        accept_regex: '^main\s*\(\s*\)$'
    hints:
      - "Under the guard in canonical form there is exactly one line — a call to the startup function. The function itself is defined above."
    variants:
      - template: |
          def add(a, b):
              return a + b

          if {{var}} == "__main__":
              print(add(2, 3))
        blanks:
          var:
            accept: ["__name__"]
      - template: |
          if __name__ {{op}} "__main__":
              run_app()
        blanks:
          op:
            accept: ["=="]

  - id: guard-split-001
    concept: the-main-guard
    type: python-function
    difficulty: 3
    prompt: "Complete `should_run(name)`: return `True` if a module with `__name__` equal to `name` should execute the block under `if __name__ == \"__main__\"`, otherwise `False`. That is the guard condition extracted into a function."
    starter: |
      def should_run(name):
          ...
    cases:
      - call: "should_run('__main__')"
        expect: true
      - call: "should_run('calc')"
        expect: false
      - call: "should_run('pkg.calc')"
        expect: false
      - call: "should_run('_main_')"
        expect: false
    hints:
      - "The block under the guard runs exactly when the guard's own condition holds. What is that condition?"
      - "The string comparison itself yields `True` or `False` — you do not need to wrap it in `if` and return literals."
    solution: |
      def should_run(name):
          return name == "__main__"

  - id: guard-entry-point-001
    concept: the-main-guard
    type: python-function
    difficulty: 4
    prompt: "Complete `entry_point(name, args)`: model the guard. If `name` equals `\"__main__\"`, return the sum of numbers in list `args`; otherwise return string `\"imported\"` (run does not happen). So the module either «works» or only exposes definitions."
    starter: |
      def entry_point(name, args):
          ...
    cases:
      - call: "entry_point('__main__', [2, 3, 5])"
        expect: 10
      - call: "entry_point('__main__', [])"
        expect: 0
      - call: "entry_point('calc', [2, 3, 5])"
        expect: "imported"
      - call: "entry_point('pkg.calc', [1])"
        expect: "imported"
    hints:
      - "First repeat the guard condition, and only in the run branch do useful work. What should the import branch return?"
      - "Check `name == \"__main__\"`: in that branch return `sum(args)`, in the other return string `\"imported\"`."
    solution: |
      def entry_point(name, args):
          if name == "__main__":
              return sum(args)
          return "imported"
