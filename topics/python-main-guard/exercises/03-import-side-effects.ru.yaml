exercises:
  - id: side-what-is-001
    concept: import-side-effects
    type: theory-quiz
    difficulty: 1
    prompt: "Что из перечисленного является сайд-эффектом импорта?"
    choices:
      - id: a
        text: "Печать строки `print(...)` на верхнем уровне модуля."
      - id: b
        text: "Определение функции `def worker(): ...`."
      - id: c
        text: "Определение класса `class Job: ...`."
      - id: d
        text: "Объявление константы `MAX = 100`."
    correct: [a]
    explanation: "Сайд-эффект - это наблюдаемое действие во внешнем мире (печать, запись, запуск процесса). Определения лишь создают объекты и сами по себе ничего «не делают»."
    variants:
      - prompt: "Какое из этих действий НЕ является сайд-эффектом импорта?"
        choices:
          - id: a
            text: "Определение функции `def record(event): ...`."
          - id: b
            text: "Открытие файла `open(\"audit.log\", \"a\")` на верхнем уровне."
          - id: c
            text: "Сетевой запрос на верхнем уровне модуля."
          - id: d
            text: "Запуск процесса через `Process(...).start()` на верхнем уровне."
        correct: [a]
        explanation: "`def` создаёт объект-функцию, но не вызывает её - наблюдаемого действия нет. Остальные три исполняются при импорте и меняют внешний мир."
      - prompt: "Почему `open(\"audit.log\", \"a\")` на верхнем уровне модуля - это сайд-эффект импорта?"
        choices:
          - id: a
            text: "Файл открывается уже в момент `import`, даже если ни одну функцию модуля не"
          - id: b
            text: "Потому что `open` всегда выбрасывает исключение при импорте."
          - id: c
            text: "Потому что Python запрещает `open` вне функций."
          - id: d
            text: "Это не сайд-эффект: `open` исполнится только при запуске файла."
        correct: [a]
        explanation: "Верхний уровень исполняется при импорте, поэтому `open` отработает уже при `import` и оставит открытый дескриптор - наблюдаемое действие."

  - id: side-mp-reimport-001
    concept: import-side-effects
    type: theory-quiz
    difficulty: 2
    prompt: "Почему при методе запуска `spawn` библиотека `multiprocessing` повторно импортирует Ваш главный модуль в дочернем процессе?"
    choices:
      - id: a
        text: "Дочерний процесс стартует с чистого листа и импортирует модуль, чтобы получить код"
      - id: b
        text: "Чтобы заново прочитать аргументы командной строки для каждого процесса."
      - id: c
        text: "Чтобы проверить, не изменился ли файл на диске между запусками."
      - id: d
        text: "Это случайность реализации; обычно импорт не повторяется."
    correct: [a]
    explanation: "`spawn` стартует чистый интерпретатор. Чтобы добраться до функции-воркера, дочерний процесс импортирует главный модуль заново - и снова исполняет его тело сверху вниз."
    variants:
      - prompt: "Почему на старом Linux код с `multiprocessing` часто «работал» и без guard?"
        choices:
          - id: a
            text: "Метод `fork` копировал память родителя и не импортировал главный модуль заново."
          - id: b
            text: "Linux автоматически добавлял guard за программиста."
          - id: c
            text: "На Linux `multiprocessing` вообще не запускает дочерние процессы."
          - id: d
            text: "Потому что guard нужен только в Windows-версии Python."
        correct: [a]
        explanation: "`fork` отдаёт дочернему процессу копию памяти родителя, поэтому повторного импорта главного модуля не происходит. Тот же код на `spawn` ломается - это везение с платформой, а не корректность."
      - prompt: "Что происходит с незащищённой строкой `Process(target=worker).start()` на верхнем уровне модуля, когда `multiprocessing` со `spawn` повторно импортирует этот модуль в дочернем процессе?"
        choices:
          - id: a
            text: "Она исполняется снова и создаёт ещё один процесс - так начинается лавина процессов."
          - id: b
            text: "Она пропускается: при импорте верхний уровень модуля не исполняется."
          - id: c
            text: "Она исполняется, но `multiprocessing` молча запрещает создавать новые процессы."
          - id: d
            text: "Дочерний процесс выполняет только функцию `worker`, не трогая тело модуля."
        correct: [a]
        explanation: "Повторный импорт исполняет тело модуля сверху вниз, поэтому незащищённый `start()` срабатывает в каждом дочернем процессе и порождает новых детей. Guard прячет эту строку и разрывает цепную реакцию."

  - id: side-predict-spawn-001
    concept: import-side-effects
    type: predict-output
    difficulty: 3
    prompt: "Смоделируем повторный импорт. Функция `simulate` повторяет логику guard. Что выведет программа?"
    snippet: |
      def spawn():
          return "создаю процесс"

      def simulate(current_name):
          if current_name == "__main__":
              return spawn()
          return "импорт: пропущено"

      print(simulate("__main__"))
      print(simulate("worker"))
    expected:
      kind: stdout
      value: |-
        создаю процесс
        импорт: пропущено
    hints:
      - "Первый вызов передаёт имя главного модуля, второй - имя как при импорте. В какой из веток `if` окажется каждый?"
      - "При `\"__main__\"` срабатывает ветка запуска и возвращается `\"создаю процесс\"`; при `\"worker\"` - ветка импорта."
    variants:
      - snippet: |
          def simulate(current_name):
              if current_name == "__main__":
                  return "запуск"
              return "пропуск"

          for name in ["__main__", "child", "child"]:
              print(simulate(name))
        expected:
          kind: stdout
          value: |-
            запуск
            пропуск
            пропуск

  - id: side-blanks-mp-001
    concept: import-side-effects
    type: fill-in-blanks
    difficulty: 1
    prompt: "Защитите запуск процесса guard, чтобы он не порождал лавину процессов при повторном импорте."
    template: |
      from multiprocessing import Process

      def worker():
          print("работаю")

      if __name__ == {{value}}:
          Process(target=worker).start()
    blanks:
      value:
        accept: ["\"__main__\"", "'__main__'"]
    hints:
      - "Под guard прячут именно действие - запуск процесса. Сравнивайте с тем же фиксированным значением, что и всегда."
    variants:
      - template: |
          from multiprocessing import Process

          def worker():
              print("работаю")

          if {{var}} == "__main__":
              Process(target=worker).start()
        blanks:
          var:
            accept: ["__name__"]
      - template: |
          import multiprocessing as mp
          print(mp.{{func}}())
        blanks:
          func:
            accept: ["get_start_method"]

  - id: side-move-effect-001
    concept: import-side-effects
    type: python-function
    difficulty: 3
    prompt: "Допишите `run_if_main(name)`: верните `\"процессы запущены\"`, только если `name` равно `\"__main__\"`; для любого другого имени (как у дочернего процесса при импорте) верните `\"пропущено\"`. Так guard разрывает цепную реакцию."
    starter: |
      def run_if_main(name):
          ...
    cases:
      - call: "run_if_main('__main__')"
        expect: "процессы запущены"
      - call: "run_if_main('__mp_main__')"
        expect: "пропущено"
      - call: "run_if_main('worker_module')"
        expect: "пропущено"
    hints:
      - "Запуск должен происходить ровно в одном случае - когда модуль главный. Все прочие имена (включая служебные) означают импорт."
      - "Одно сравнение `name == \"__main__\"` разделяет два исхода: запуск и пропуск."
    solution: |
      def run_if_main(name):
          if name == "__main__":
              return "процессы запущены"
          return "пропущено"

  - id: side-cascade-001
    concept: import-side-effects
    type: python-function
    difficulty: 5
    prompt: "Смоделируйте цепную реакцию без guard. Допишите `count_spawns(depth)`: главный процесс на уровне 0 порождает `2` дочерних; каждый дочерний, повторно «импортируя» незащищённый модуль, снова порождает `2`. Верните общее число СОЗДАННЫХ процессов до глубины `depth` включительно (главный процесс не считается созданным). Для `depth` уровней без guard это лавина."
    starter: |
      def count_spawns(depth):
          ...
    cases:
      - call: "count_spawns(0)"
        expect: 0
      - call: "count_spawns(1)"
        expect: 2
      - call: "count_spawns(2)"
        expect: 6
      - call: "count_spawns(3)"
        expect: 14
    hints:
      - "На каждом следующем уровне процессов вдвое больше, чем на предыдущем. Сосчитайте, сколько новых процессов появляется на каждом уровне от 1 до depth."
      - "На уровне `k` создаётся `2**k` процессов. Сумма по уровням от 1 до depth - это геометрическая прогрессия."
      - "Сумма `2 + 4 + ... + 2**depth` равна `2**(depth+1) - 2`. При depth=0 создаётся ноль процессов."
    solution: |
      def count_spawns(depth):
          total = 0
          for level in range(1, depth + 1):
              total += 2 ** level
          return total
