exercises:
  - id: guard-purpose-001
    concept: the-main-guard
    type: theory-quiz
    difficulty: 1
    prompt: "Зачем код запуска оборачивают в `if __name__ == \"__main__\":`?"
    choices:
      - id: a
        text: "Чтобы он исполнялся при прямом запуске файла, но не при импорте."
      - id: b
        text: "Чтобы ускорить импорт модуля - guard пропускает всё тело файла."
      - id: c
        text: "Чтобы Python вообще разрешил импортировать файл."
      - id: d
        text: "Чтобы функции стали приватными и недоступными снаружи."
    correct: [a]
    explanation: "Guard показывает код запуска первому читателю (тому, кто запускает файл) и прячет его от второго (того, кто импортирует модуль)."
    variants:
      - prompt: "Что произойдёт со строкой `print(add(2, 3))`, если она стоит на верхнем уровне модуля БЕЗ guard, и модуль импортируют?"
        choices:
          - id: a
            text: "Она исполнится во время импорта и напечатает результат в чужой программе."
          - id: b
            text: "Она будет проигнорирована, потому что это не главный модуль."
          - id: c
            text: "Python выбросит ошибку: печать на верхнем уровне запрещена."
          - id: d
            text: "Она исполнится, но вывод будет подавлен автоматически."
        correct: [a]
        explanation: "Без guard любой вызов на верхнем уровне исполнится при импорте. Именно от такого «мусора в чужой программе» и защищает guard."
      - prompt: "Какой код принято оставлять СНАРУЖИ guard?"
        choices:
          - id: a
            text: "Определения функций, классов и констант."
          - id: b
            text: "Вызов `main()` и чтение аргументов командной строки."
          - id: c
            text: "Печать результатов работы программы."
          - id: d
            text: "Запуск процессов и сетевые запросы."
        correct: [a]
        explanation: "Снаружи guard живут определения - они нужны обоим читателям. Действия (вызовы, печать, запуск) убирают внутрь guard."

  - id: guard-inside-outside-001
    concept: the-main-guard
    type: theory-quiz
    difficulty: 2
    prompt: "Что случится, если убрать определение функции `add` ВНУТРЬ guard, а потом написать `from module import add`?"
    choices:
      - id: a
        text: "Импорт упадёт с `ImportError`: при импорте guard не сработал, и `add` не определилась."
      - id: b
        text: "Всё сработает: guard на импорт `add` не влияет."
      - id: c
        text: "`add` импортируется, но будет равна `None`."
      - id: d
        text: "Python автоматически вынесет `add` наружу guard."
    correct: [a]
    explanation: "При импорте `__name__` не равно `\"__main__\"`, блок под guard пропускается, и `add` внутри него вообще не создаётся. Поэтому `from module import add` не найдёт имя. Определения должны жить снаружи guard."
    variants:
      - prompt: "Где должна стоять функция `main()`, которая запускает программу, в каноничной форме идиомы?"
        choices:
          - id: a
            text: "`main()` определена снаружи guard, а её вызов `main()` стоит под guard."
          - id: b
            text: "И определение `def main()`, и вызов `main()` стоят под guard."
          - id: c
            text: "`main()` целиком определена внутри guard, чтобы её нельзя было импортировать."
          - id: d
            text: "Вызов `main()` стоит снаружи guard, а определение - внутри."
        correct: [a]
        explanation: "Каноничная форма: `def main()` снаружи guard (остаётся доступной для импорта и тестов), а единственный вызов `main()` - под guard."
      - prompt: "Тяжёлая инициализация (например, чтение большого файла) стоит на верхнем уровне модуля, вне guard. Что с ней случится при импорте этого модуля?"
        choices:
          - id: a
            text: "Она исполнится при импорте: guard прячет только свой блок, а не весь код вне него."
          - id: b
            text: "Она не исполнится: guard отключает при импорте весь файл целиком."
          - id: c
            text: "Она исполнится, но только во второй раз, когда модуль импортируют повторно."
          - id: d
            text: "Python перенесёт её под guard автоматически, чтобы ускорить импорт."
        correct: [a]
        explanation: "Guard пропускает лишь свой блок. Любой код вне guard, включая дорогую инициализацию, исполняется при импорте. Чтобы этого избежать, инициализацию прячут под guard или внутрь функции."

  - id: guard-predict-run-001
    concept: the-main-guard
    type: predict-output
    difficulty: 2
    prompt: "Файл запущен напрямую. Что он выведет?"
    snippet: |
      def main():
          print("работаю")

      print("тело модуля")

      if __name__ == "__main__":
          main()
    expected:
      kind: stdout
      value: |-
        тело модуля
        работаю
    hints:
      - "Строка вне guard печатается всегда, при любом запуске тела модуля. Когда срабатывает вызов `main()` под guard?"
      - "Сначала исполняется верхний уровень сверху вниз: `def main` (ничего не печатает), затем `print(\"тело модуля\")`, затем guard вызывает `main`."
    variants:
      - snippet: |
          def main():
              print("работаю")

          print("тело модуля")

          if __name__ == "library":
              main()
        expected:
          kind: stdout
          value: "тело модуля"
      - snippet: |
          print("старт")

          if __name__ == "__main__":
              print("главный")

          print("финиш")
        expected:
          kind: stdout
          value: |-
            старт
            главный
            финиш

  - id: guard-typo-001
    concept: the-main-guard
    type: predict-output
    difficulty: 3
    prompt: "Файл запущен напрямую. Обратите внимание на строку в guard. Что он выведет?"
    snippet: |
      def run():
          return "запущено"

      result = "ничего"
      if __name__ == "_main_":
          result = run()

      print(result)
    expected:
      kind: stdout
      value: "ничего"
    hints:
      - "Сравните строку в guard со значением, которое реально лежит в `__name__` при запуске. Это одна и та же строка?"
      - "В коде написано `\"_main_\"` (по одному подчёркиванию), а `__name__` равно `\"__main__\"` (по два). Условие ложно, `result` не меняется."
    variants:
      - snippet: |
          def run():
              return "запущено"

          result = "ничего"
          if __name__ == "__main__ ":
              result = run()

          print(result)
        expected:
          kind: stdout
          value: "ничего"
      - snippet: |
          def run():
              return "запущено"

          result = "ничего"
          if __name__ == "__main__":
              result = run()

          print(result)
        expected:
          kind: stdout
          value: "запущено"

  - id: guard-blanks-001
    concept: the-main-guard
    type: fill-in-blanks
    difficulty: 1
    prompt: "Соберите каноничную точку входа: вынесите запуск в `main()` и вызовите её только при прямом запуске файла."
    template: |
      def main():
          print("старт")

      if __name__ == {{value}}:
          {{call}}
    blanks:
      value:
        accept: ["\"__main__\"", "'__main__'"]
      call:
        accept: ["main()", "main ()"]
        accept_regex: '^main\s*\(\s*\)$'
    hints:
      - "Под guard в каноничной форме стоит ровно одна строка - вызов функции запуска. Сама функция определена выше."
    variants:
      - template: |
          def add(a, b):
              return a + b

          if {{var}} == "__main__":
              print(add(2, 3))
        blanks:
          var:
            accept: ["__name__"]
      - template: |
          if __name__ {{op}} "__main__":
              run_app()
        blanks:
          op:
            accept: ["=="]

  - id: guard-split-001
    concept: the-main-guard
    type: python-function
    difficulty: 3
    prompt: "Допишите `should_run(name)`: верните `True`, если модуль с переменной `__name__`, равной `name`, должен исполнить блок под `if __name__ == \"__main__\"`, иначе `False`. Это и есть условие guard, вынесенное в функцию."
    starter: |
      def should_run(name):
          ...
    cases:
      - call: "should_run('__main__')"
        expect: true
      - call: "should_run('calc')"
        expect: false
      - call: "should_run('pkg.calc')"
        expect: false
      - call: "should_run('_main_')"
        expect: false
    hints:
      - "Блок под guard срабатывает ровно тогда, когда выполняется условие самого guard. Какое это условие?"
      - "Само сравнение строки с фиксированным значением уже даёт `True` или `False` - заворачивать его в `if` и возвращать литералы не нужно."
    solution: |
      def should_run(name):
          return name == "__main__"

  - id: guard-entry-point-001
    concept: the-main-guard
    type: python-function
    difficulty: 4
    prompt: "Допишите `entry_point(name, args)`: смоделируйте guard. Если `name` равно `\"__main__\"`, верните сумму чисел из списка `args`; иначе верните строку `\"импортирован\"` (запуск не происходит). Так модуль либо «работает», либо просто отдаёт определения."
    starter: |
      def entry_point(name, args):
          ...
    cases:
      - call: "entry_point('__main__', [2, 3, 5])"
        expect: 10
      - call: "entry_point('__main__', [])"
        expect: 0
      - call: "entry_point('calc', [2, 3, 5])"
        expect: "импортирован"
      - call: "entry_point('pkg.calc', [1])"
        expect: "импортирован"
    hints:
      - "Сначала повторите само условие guard, и только в ветке запуска делайте полезную работу. Что должно вернуться в ветке импорта?"
      - "Проверьте `name == \"__main__\"`: в этой ветке верните `sum(args)`, в другой - строку `\"импортирован\"`."
    solution: |
      def entry_point(name, args):
          if name == "__main__":
              return sum(args)
          return "импортирован"
