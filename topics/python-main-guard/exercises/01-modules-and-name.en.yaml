exercises:
  - id: name-what-is-001
    concept: modules-and-name
    type: theory-quiz
    difficulty: 1
    prompt: "What does the variable `__name__` hold when a file is run with `python script.py`?"
    choices:
      - id: a
        text: "The string `\"__main__\"`."
      - id: b
        text: "The filename without extension, i.e. `\"script\"`."
      - id: c
        text: "The full path to the file on disk."
      - id: d
        text: "An empty string until the module is imported."
    correct: [a]
    explanation: "When you run a file directly Python puts the string `\"__main__\"` in `__name__`. The module name lands there only on import."
    variants:
      - prompt: "What does `__name__` hold for module `greet` if it was imported as `import greet`?"
        choices:
          - id: a
            text: "The string `\"greet\"` — the module name."
          - id: b
            text: "The string `\"__main__\"`, same as on run."
          - id: c
            text: "The full path to file `greet.py`."
          - id: d
            text: "Nothing: `__name__` appears only on run."
        correct: [a]
        explanation: "On import `__name__` holds the module name under which it was imported — here that is `\"greet\"`."
      - prompt: "Do you need to declare the variable `__name__` at the top of a file to use it?"
        choices:
          - id: a
            text: "No, Python creates it in every module automatically."
          - id: b
            text: "Yes, otherwise you get `NameError` on access."
          - id: c
            text: "Only when the file is run directly."
          - id: d
            text: "Only when the file is imported."
        correct: [a]
        explanation: "The interpreter sets `__name__` for every module; you do not declare it on run or import."

  - id: name-import-means-001
    concept: modules-and-name
    type: theory-quiz
    difficulty: 2
    prompt: "What does `import greet` actually do if `greet.py` has `print(\"hello\")` at module level?"
    choices:
      - id: a
        text: "Executes the entire file `greet.py` top to bottom, so `print` runs."
      - id: b
        text: "Fetches only functions from the file without running `print`."
      - id: c
        text: "Copies function text but executes nothing."
      - id: d
        text: "Defers executing the file until the first function call from it."
    correct: [a]
    explanation: "Import executes the whole module body. Any bare line like `print` at module level runs during import."
    variants:
      - prompt: "File `tools.py` has `open(\"data.txt\")` at module level. When does file `data.txt` open?"
        choices:
          - id: a
            text: "At `import tools` — the module body runs on import."
          - id: b
            text: "Only when a function from `tools` is called."
          - id: c
            text: "Never: module level does not run on import."
          - id: d
            text: "Only when running `python tools.py`, not on import."
        correct: [a]
        explanation: "Import executes all module-level code, so `open` runs already at `import tools` — an import side effect."
      - prompt: "How many times does module `who` body run if the code has three consecutive `import who` lines?"
        choices:
          - id: a
            text: "Once: the first import result is cached in `sys.modules`."
          - id: b
            text: "Three times — once per `import`."
          - id: c
            text: "Zero: repeated imports are forbidden."
          - id: d
            text: "Depends on whether `who` has a `main` function."
        correct: [a]
        explanation: "The module body runs on first import; after that the module comes from the `sys.modules` cache and repeated `import` does not re-execute it."

  - id: name-predict-run-001
    concept: modules-and-name
    type: predict-output
    difficulty: 2
    prompt: "This file is run directly as the main program. What does it print?"
    snippet: |
      def greet(name):
          return f"Hello, {name}"

      if __name__ == "__main__":
          print("mode:", __name__)
      else:
          print("import:", __name__)
    expected:
      kind: stdout
      value: "mode: __main__"
    hints:
      - "The file is run directly, not imported. What value does `__name__` get — and which `if` branch runs?"
    variants:
      - snippet: |
          print("__name__ =", repr(__name__))
        expected:
          kind: stdout
          value: "__name__ = '__main__'"
      - snippet: |
          flag = __name__ == "__main__"
          print(flag)
        expected:
          kind: stdout
          value: "True"

  - id: name-import-once-001
    concept: modules-and-name
    type: predict-output
    difficulty: 3
    prompt: "Assume module `config` prints `loading` on import (one top-level `print`). What does this main program print?"
    snippet: |
      modules_log = []

      def load_config():
          modules_log.append("loading")
          return {"debug": True}

      cfg = load_config()
      cfg = load_config()
      print(modules_log)
    expected:
      kind: stdout
      value: "['loading', 'loading']"
    hints:
      - "There is no real import here: `load_config` is an ordinary function. How many times was it called explicitly?"
      - "`sys.modules` caching applies to the `import` statement, not to calling an ordinary function again. Each `load_config()` call appends to the list."
    variants:
      - snippet: |
          calls = []

          def init():
              calls.append("x")

          init()
          init()
          init()
          print(len(calls))
        expected:
          kind: stdout
          value: "3"

  - id: name-guard-blanks-001
    concept: modules-and-name
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete the code so it prints the module name only when the file is run directly."
    template: |
      if {{var}} == {{value}}:
          print("run directly")
    blanks:
      var:
        accept: ["__name__"]
      value:
        accept: ["\"__main__\"", "'__main__'"]
    hints:
      - "The idiom compares the module's special variable to the fixed string the interpreter sets when you run the file."
    variants:
      - template: |
          import math
          print(math.{{attr}})
        blanks:
          attr:
            accept: ["__name__"]
      - template: |
          if __name__ {{op}} "__main__":
              print("this is import, not run")
        blanks:
          op:
            accept: ["!="]

  - id: name-detect-mode-001
    concept: modules-and-name
    type: python-function
    difficulty: 3
    prompt: "Complete `describe_mode(name)`: return `\"run\"` if string `name` equals `\"__main__\"`, and `\"import\"` in any other case. That is the logic a module uses to know its mode."
    starter: |
      def describe_mode(name):
          ...
    cases:
      - call: "describe_mode('__main__')"
        expect: "run"
      - call: "describe_mode('greet')"
        expect: "import"
      - call: "describe_mode('tools.helpers')"
        expect: "import"
    hints:
      - "Mode is determined by a single string comparison with the fixed value `\"__main__\"`. Everything else is «import»."
      - "A single `if name == \"__main__\"` returning the right string and a `return` for all other cases is enough."
    solution: |
      def describe_mode(name):
          if name == "__main__":
              return "run"
          return "import"

  - id: name-module-attr-001
    concept: modules-and-name
    type: python-function
    difficulty: 4
    prompt: "Complete `imported_name(module)`: return the value of attribute `__name__` of the passed module (as a string). Use that `__name__` is an ordinary attribute of any module, accessible from outside."
    starter: |
      def imported_name(module):
          ...
    cases:
      - call: "import math; imported_name(math)"
        expect: "math"
      - call: "import json; imported_name(json)"
        expect: "json"
      - call: "import collections.abc; imported_name(collections.abc)"
        expect: "collections.abc"
    hints:
      - "An imported module's `__name__` is not a secret — it is an attribute of the module object. How do you access an object attribute by name?"
      - "The module object has attribute `__name__`; return `module.__name__`."
    solution: |
      def imported_name(module):
          return module.__name__
