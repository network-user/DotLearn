conceptId: the-main-guard
cards:
  - id: the-main-guard-01
    front: What problem does the idiom `if __name__ == "__main__"` solve?
    back: >-
      It separates two file modes: run code runs on direct `python file.py`
      invocation and stays hidden on import. So the module does not clutter
      someone else's program with side effects.
    tags: [guard]
  - id: the-main-guard-02
    front: What goes inside the guard and what stays outside?
    back: >-
      Outside are definitions: functions, classes, constants. Inside are
      actions: calls, printing, reading command-line arguments, starting the
      program.
    tags: [guard, structure]
  - id: the-main-guard-03
    front: What is the canonical module entry point form?
    back: >-
      Move run logic into function `main()` and leave a single `main()` call
      under the guard. Then `main()` stays available for import, e.g. from a
      test.
    tags: [guard, structure]
  - id: the-main-guard-04
    front: "Simple rule: under the guard or outside?"
    back: >-
      Ask: should this line run when someone writes `import your_module`? If
      not, it belongs inside the guard.
    tags: [guard]
  - id: the-main-guard-05
    front: Does the guard disable the whole file on import?
    back: >-
      No. On import the entire module body runs; only the block under
      `if __name__ == "__main__"` is skipped because the condition is false.
      Heavy code outside the guard still runs.
    tags: [guard, pitfall]
  - id: the-main-guard-06
    front: What happens if you put a function definition inside the guard?
    back: >-
      On import that function will not exist at all, and `from module import func`
      fails with `ImportError`. Definitions must live outside the guard.
    tags: [guard, pitfall]
  - id: the-main-guard-07
    front: Why is a typo in string `"__main__"` dangerous?
    back: >-
      Comparison is strict: `"_main_"` or `"__main__ "` with a trailing space
      is a different string. The condition is always false and the block under
      the guard never runs.
    tags: [guard, pitfall]
  - id: the-main-guard-08
    front: Where to put expensive initialization so it does not run on import?
    back: >-
      Either under the guard or inside a function called only when needed. At
      module level such code runs on any import.
    tags: [guard, performance]
  - id: the-main-guard-09
    front: Why did the `__name__` idiom become the standard, not a function like `is_main()`?
    back: >-
      It requires no imports and relies on a variable the interpreter already
      sets for every module. Works in any Python without dependencies and is
      recognized by everyone.
    tags: [guard]
