conceptId: import-side-effects
cards:
  - id: import-side-effects-01
    front: What is an import side effect?
    back: >-
      Any observable action that happens simply because the module was imported:
      printing, writing a file, a network request, starting a thread or
      process.
    tags: [side-effects]
  - id: import-side-effects-02
    front: Is defining a function a side effect? What about calling it at module level?
    back: >-
      Defining ‚ÄĒ no, it only creates an object. Calling a function at module
      level ‚ÄĒ yes, that is already an action in the outside world on import.
    tags: [side-effects]
  - id: import-side-effects-03
    front: Why is `open("audit.log", "a")` at module level an import side effect?
    back: >-
      The file opens for writing already at import, even if you never call a
      write function. Any `import` leaves an open file descriptor.
    tags: [side-effects, files]
  - id: import-side-effects-04
    front: Why does `multiprocessing` with `spawn` re-import the main module?
    back: >-
      A child process with method `spawn` starts from scratch and, to reach the
      worker function, imports the main module again ‚ÄĒ executing its body top
      to bottom.
    tags: [multiprocessing, spawn]
  - id: import-side-effects-05
    front: What happens without a guard if `Process(...).start()` sits at module level?
    back: >-
      In a child process on re-import that line runs again, creates another
      process, that imports the module and so on ‚ÄĒ a flood of processes that
      overwhelms the machine.
    tags: [multiprocessing, pitfall]
  - id: import-side-effects-06
    front: Why does the guard break the chain reaction of spawning processes?
    back: >-
      In a child process the main module is imported, so `__name__` equals the
      module name, not `"__main__"`. The run line under the guard is skipped and
      new processes are not spawned.
    tags: [multiprocessing, guard]
  - id: import-side-effects-07
    front: Is a guard for multiprocessing a style question or a correctness question?
    back: >-
      Correctness. The `multiprocessing` documentation calls protecting the main
      module with a guard mandatory for method `spawn`: without it the program
      may fail to start or loop spawning processes.
    tags: [multiprocessing, guard]
  - id: import-side-effects-08
    front: Why does code without a guard ¬ęwork¬Ľ on Linux but break on Windows?
    back: >-
      On Linux the default method was long `fork`: the child copies memory and
      does not re-import the module. On Windows and with `spawn` re-import
      happens and run code fires again.
    tags: [multiprocessing, fork, spawn]
  - id: import-side-effects-09
    front: How do start methods `fork`, `spawn`, and `forkserver` differ?
    back: >-
      `fork` copies the process with memory (fast, unavailable on Windows).
      `spawn` starts a clean interpreter and re-imports modules (portable,
      requires a guard). `forkserver` forks workers from a prepared server
      process.
    tags: [multiprocessing, fork, spawn]
  - id: import-side-effects-10
    front: How do you find the current process start method?
    back: >-
      With `multiprocessing.get_start_method()` ‚ÄĒ it returns `fork`, `spawn`,
      or `forkserver`. That is the first thing to check when debugging strange
      process behavior on someone else's machine.
    tags: [multiprocessing]
