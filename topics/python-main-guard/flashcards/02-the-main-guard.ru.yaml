conceptId: the-main-guard
cards:
  - id: the-main-guard-01
    front: Какую задачу решает идиома `if __name__ == "__main__"`?
    back: >-
      Разводит два режима файла: код запуска она показывает при прямом вызове
      `python file.py` и прячет при импорте. Так модуль не «мусорит» побочными
      действиями в чужой программе.
    tags: [guard]
  - id: the-main-guard-02
    front: Что кладут внутрь guard, а что оставляют снаружи?
    back: >-
      Снаружи - определения: функции, классы, константы. Внутри - действия:
      вызовы, печать, чтение аргументов командной строки, запуск программы.
    tags: [guard, structure]
  - id: the-main-guard-03
    front: Какова каноничная форма точки входа модуля?
    back: >-
      Вынести логику запуска в функцию `main()` и оставить под guard
      единственный вызов `main()`. Тогда `main()` остаётся доступной и для
      импорта, например из теста.
    tags: [guard, structure]
  - id: the-main-guard-04
    front: Простой критерий, куда положить строку - под guard или снаружи?
    back: >-
      Спросить себя: должна ли строка исполниться, когда кто-то напишет `import
      ваш_модуль`? Если нет - ей место внутри guard.
    tags: [guard]
  - id: the-main-guard-05
    front: Отключает ли guard весь файл при импорте?
    back: >-
      Нет. При импорте исполняется всё тело модуля, пропускается только блок
      под `if __name__ == "__main__"`, потому что условие ложно. Тяжёлый код вне
      guard всё равно выполнится.
    tags: [guard, pitfall]
  - id: the-main-guard-06
    front: Что будет, если поместить определение функции внутрь guard?
    back: >-
      При импорте этой функции не будет вовсе, и `from module import func`
      упадёт с `ImportError`. Определения должны жить снаружи guard.
    tags: [guard, pitfall]
  - id: the-main-guard-07
    front: Почему опечатка в строке `"__main__"` опасна?
    back: >-
      Сравнение строгое: `"_main_"` или `"__main__ "` с пробелом - это другая
      строка. Условие станет всегда ложным, и блок под guard не исполнится
      никогда.
    tags: [guard, pitfall]
  - id: the-main-guard-08
    front: Куда деть дорогую инициализацию, чтобы она не выполнялась при импорте?
    back: >-
      Либо под guard, либо внутрь функции, которая вызывается только при
      необходимости. На верхнем уровне модуля такой код исполнится при любом
      импорте.
    tags: [guard, performance]
  - id: the-main-guard-09
    front: Почему стандартом стала именно идиома с `__name__`, а не функция вроде `is_main()`?
    back: >-
      Она не требует ничего импортировать и опирается на переменную, которую
      интерпретатор и так задаёт каждому модулю. Работает в любом Python без
      зависимостей и узнаётся всеми.
    tags: [guard]
