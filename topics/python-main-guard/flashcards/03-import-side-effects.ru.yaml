conceptId: import-side-effects
cards:
  - id: import-side-effects-01
    front: Что такое сайд-эффект импорта?
    back: >-
      Любое наблюдаемое действие, происходящее просто потому, что модуль
      импортировали: печать, запись в файл, сетевой запрос, запуск потока или
      процесса.
    tags: [side-effects]
  - id: import-side-effects-02
    front: Является ли сайд-эффектом определение функции? А её вызов на верхнем уровне?
    back: >-
      Определение - нет, оно лишь создаёт объект. Вызов функции на верхнем
      уровне модуля - да, это уже действие во внешнем мире при импорте.
    tags: [side-effects]
  - id: import-side-effects-03
    front: Почему `open("audit.log", "a")` на верхнем уровне модуля - это сайд-эффект?
    back: >-
      Файл открывается на запись уже в момент импорта, даже если ни разу не
      вызвать функцию записи. Любой `import` оставляет открытый файловый
      дескриптор.
    tags: [side-effects, files]
  - id: import-side-effects-04
    front: Почему `multiprocessing` со `spawn` повторно импортирует главный модуль?
    back: >-
      Дочерний процесс при методе `spawn` стартует с чистого листа и, чтобы
      добраться до функции-воркера, заново импортирует главный модуль -
      исполняя его тело сверху вниз.
    tags: [multiprocessing, spawn]
  - id: import-side-effects-05
    front: Что произойдёт без guard, если `Process(...).start()` стоит на верхнем уровне?
    back: >-
      В дочернем процессе при повторном импорте эта строка исполнится снова,
      создаст ещё процесс, тот импортирует модуль и так по нарастающей - лавина
      процессов, которая кладёт машину.
    tags: [multiprocessing, pitfall]
  - id: import-side-effects-06
    front: Почему guard разрывает цепную реакцию порождения процессов?
    back: >-
      В дочернем процессе главный модуль импортируется, поэтому `__name__` равно
      имени модуля, а не `"__main__"`. Строка запуска под guard пропускается, и
      новые процессы не плодятся.
    tags: [multiprocessing, guard]
  - id: import-side-effects-07
    front: Guard для multiprocessing - это вопрос стиля или корректности?
    back: >-
      Корректности. Документация `multiprocessing` называет защиту главного
      модуля через guard обязательной для метода `spawn`: без неё программа
      может не запуститься или зациклиться на порождении процессов.
    tags: [multiprocessing, guard]
  - id: import-side-effects-08
    front: Почему код без guard «работает» на Linux, но ломается на Windows?
    back: >-
      На Linux метод по умолчанию долго был `fork`: дочерний процесс копирует
      память и не импортирует модуль заново. На Windows и при `spawn` повторный
      импорт происходит, и код запуска выстреливает снова.
    tags: [multiprocessing, fork, spawn]
  - id: import-side-effects-09
    front: Чем различаются методы запуска `fork`, `spawn` и `forkserver`?
    back: >-
      `fork` копирует процесс целиком с памятью (быстро, недоступно на Windows).
      `spawn` стартует чистый интерпретатор и заново импортирует модули
      (переносимо, требует guard). `forkserver` форкает воркеров из заранее
      подготовленного процесса-сервера.
    tags: [multiprocessing, fork, spawn]
  - id: import-side-effects-10
    front: Как узнать текущий метод запуска процессов?
    back: >-
      Через `multiprocessing.get_start_method()` - он печатает `fork`, `spawn`
      или `forkserver`. Это первое, с чего стоит начать при отладке странного
      поведения процессов на чужой машине.
    tags: [multiprocessing]
