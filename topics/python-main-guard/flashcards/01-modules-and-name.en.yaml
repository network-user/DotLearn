conceptId: modules-and-name
cards:
  - id: modules-and-name-01
    front: What does `import greet` actually do?
    back: >-
      Finds file `greet.py`, executes it entirely top to bottom, and gives access
      to what remains in its namespace. It is not «fetch a function» but
      running the whole file body.
    tags: [import, modules]
  - id: modules-and-name-02
    front: What is variable `__name__` when you run a file vs when you import it?
    back: >-
      When you run a file as the main program `__name__` equals the string
      `"__main__"`. On import it holds the module name under which it was
      imported.
    tags: [name]
  - id: modules-and-name-03
    front: Do you need to declare variable `__name__` in a module?
    back: >-
      No. `__name__` appears in every module automatically; the interpreter
      sets it. It is an ordinary string variable, not magic.
    tags: [name]
  - id: modules-and-name-04
    front: Is the filename on disk the same as `__name__` on import?
    back: >-
      Not always. `__name__` gets the module name in the import tree, not the
      file path. For a module inside a package that is the full dotted name,
      e.g. `tools.helpers`.
    tags: [name, packages]
  - id: modules-and-name-05
    front: How many times does a module body run on several `import` of the same line?
    back: >-
      Once, on first import. The result is cached in `sys.modules`, and
      repeated `import` takes the ready module from cache without executing it
      again.
    tags: [import, cache]
  - id: modules-and-name-06
    front: Where is the cache of imported modules and what happens if you remove an entry?
    back: >-
      In dict `sys.modules`. If you remove an entry, the next `import` will
      execute the module body again. «Once» is just a lookup in a dict, not
      magic.
    tags: [import, cache]
  - id: modules-and-name-07
    front: Why is comparing `__name__` to your own module name unreliable?
    back: >-
      Because on import from a package `__name__` becomes the full dotted name
      (`pkg.calc` instead of `calc`). Value `"__main__"`, by contrast, is fixed
      and does not depend on how you import.
    tags: [name, pitfall, packages]
  - id: modules-and-name-08
    front: What is `__name__` in an interactive session or Jupyter cell?
    back: >-
      `"__main__"`. Code there runs in a module named `"__main__"`, as if you
      ran a script. So code under the guard in a notebook behaves like a main
      program.
    tags: [name, repl]
  - id: modules-and-name-09
    front: Does top-level `def` or `class` cause an import side effect?
    back: >-
      No. Definitions create objects but do not call them. A bare line like
      `print(...)` at module level runs immediately on import.
    tags: [import, side-effects]
