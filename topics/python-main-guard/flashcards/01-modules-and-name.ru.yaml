conceptId: modules-and-name
cards:
  - id: modules-and-name-01
    front: Что на самом деле делает `import greet`?
    back: >-
      Находит файл `greet.py`, выполняет его целиком сверху вниз и даёт доступ
      к тому, что осталось в его пространстве имён. Это не «достать функцию», а
      запуск всего тела файла.
    tags: [import, modules]
  - id: modules-and-name-02
    front: Чему равна переменная `__name__` при запуске файла и при импорте?
    back: >-
      При запуске файла как главной программы `__name__` равно строке
      `"__main__"`. При импорте там лежит имя модуля, под которым его
      импортировали.
    tags: [name]
  - id: modules-and-name-03
    front: Нужно ли объявлять переменную `__name__` в модуле?
    back: >-
      Нет. `__name__` появляется в каждом модуле автоматически, её задаёт сам
      интерпретатор. Это обычная строковая переменная, а не магия.
    tags: [name]
  - id: modules-and-name-04
    front: Имя файла на диске и значение `__name__` при импорте - это одно и то же?
    back: >-
      Не всегда. В `__name__` попадает имя модуля в дереве импортов, а не путь
      к файлу. Для модуля внутри пакета это полное имя с точками, например
      `tools.helpers`.
    tags: [name, packages]
  - id: modules-and-name-05
    front: Сколько раз исполняется тело модуля при нескольких `import` одной строки?
    back: >-
      Один раз - при первом импорте. Результат кэшируется в `sys.modules`, и
      повторные `import` берут готовый модуль из кэша, не исполняя его снова.
    tags: [import, cache]
  - id: modules-and-name-06
    front: Где лежит кэш импортированных модулей и что будет, если удалить запись?
    back: >-
      В словаре `sys.modules`. Если удалить оттуда запись, следующий `import`
      снова выполнит тело модуля. «Один раз» - это просто проверка наличия в
      словаре, а не магия.
    tags: [import, cache]
  - id: modules-and-name-07
    front: Почему сравнивать `__name__` с именем своего модуля ненадёжно?
    back: >-
      Потому что при импорте из пакета `__name__` меняется на полное имя с
      точкой (`pkg.calc` вместо `calc`). Значение `"__main__"`, наоборот,
      фиксировано и не зависит от способа импорта.
    tags: [name, pitfall, packages]
  - id: modules-and-name-08
    front: Чему равно `__name__` в интерактивной сессии или ячейке Jupyter?
    back: >-
      `"__main__"`. Код там исполняется в модуле с именем `"__main__"`, как
      будто Вы запустили скрипт. Поэтому код под guard в нотбуке ведёт себя как
      главная программа.
    tags: [name, repl]
  - id: modules-and-name-09
    front: Создаёт ли `def` или `class` на верхнем уровне сайд-эффект при импорте?
    back: >-
      Нет. Определения создают объекты, но не вызывают их. А вот «голая» строка
      вроде `print(...)` на верхнем уровне исполнится немедленно при импорте.
    tags: [import, side-effects]
