conceptId: keycloak-model
cards:
  - id: keycloak-model-01
    front: "Что такое realm в Keycloak?"
    back: "Изолированное пространство со своими пользователями, clients, ролями и ключами подписи. Пользователь одного realm не существует в другом, и token, подписанный ключом одного realm, в другом не примут."
    tags: [realm]
  - id: keycloak-model-02
    front: "Для чего предназначен realm master?"
    back: "Для администрирования самого Keycloak. Прикладных пользователей в master не держат, чтобы случайно не дать им прав на управление сервером - для них заводят отдельный realm."
    tags: [realm, pitfall]
  - id: keycloak-model-03
    front: "Чем confidential client отличается от public client?"
    back: "Confidential client - приложение с backend, способное безопасно хранить client_secret. Public client - SPA или мобильное приложение: его код доступен пользователю, поэтому секрета у него нет вовсе."
    tags: [client]
  - id: keycloak-model-04
    front: "Можно ли сделать SPA confidential client с зашитым секретом?"
    back: "Нет. Секрет в коде, который скачивает пользователь, извлекается тривиально и перестаёт быть секретом. SPA и мобильные клиенты должны быть public и использовать PKCE."
    tags: [client, security, pitfall]
  - id: keycloak-model-05
    front: "Чем realm role отличается от client role?"
    back: "Realm role - роль на уровне всего realm, общая для всех clients (например admin, user). Client role определена внутри конкретного client и осмысленна только для него (например order:refund у shop-backend)."
    tags: [roles]
  - id: keycloak-model-06
    front: "В какие claims token попадают realm roles и client roles?"
    back: "Realm roles - в realm_access.roles, client roles - в resource_access.<client>.roles. За попадание ролей в token отвечает mapper client."
    tags: [roles, tokens]
  - id: keycloak-model-07
    front: "Из какой секции token resource server должен читать роли?"
    back: "Из своей секции resource_access.<свой-client>.roles, а не из чужих client roles. Иначе авторизация протекает между приложениями - доступ откроется тем, кому его не давали в этом контексте."
    tags: [roles, security, pitfall]
  - id: keycloak-model-08
    front: "Что такое group и composite role в Keycloak?"
    back: "Group - набор пользователей с общим набором ролей (группы образуют иерархию с наследованием). Composite role - роль, которая включает другие роли. Composite role легко раздувается сверх ожидаемого."
    tags: [roles, groups]
  - id: keycloak-model-09
    front: "Что такое service account у client?"
    back: "Режим confidential client, при котором сам client становится «пользователем без человека» для машинного доступа. Имеет свой набор ролей и получает token через client credentials; sub в token указывает на client."
    tags: [client, service-account]
  - id: keycloak-model-10
    front: "Могут ли client roles одного пользователя различаться от client к client?"
    back: "Да. Пользователь может быть admin в hr-portal и не иметь ролей в shop-backend. В token попадают роли только тех clients, что относятся к запросу."
    tags: [roles]
