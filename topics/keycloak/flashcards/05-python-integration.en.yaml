conceptId: python-integration
cards:
  - id: python-integration-01
    front: "How do you verify a Keycloak token in Python without calling Keycloak on every request?"
    back: "Offline: PyJWKClient fetches and caches the realm's public keys once, and jwt.decode from PyJWT verifies the signature and claims locally. The network is only needed to refresh keys, not per request."
    tags: [python, pyjwt, validation]
  - id: python-integration-02
    front: "What does PyJWKClient do?"
    back: "It fetches the JWKS set from jwks_uri, caches it (default lifespan=300 seconds), and picks the right key by the kid in the token header. On rotation it picks up a new key on cache refresh. Create one instance for the whole app."
    tags: [python, pyjwt, jwks]
  - id: python-integration-03
    front: "Where do you get jwks_uri instead of hardcoding it?"
    back: "From the realm's discovery document at .well-known/openid-configuration. It holds issuer, jwks_uri, and the token and introspection endpoint addresses, so addresses stay current across rotation and realm relocation."
    tags: [python, discovery, jwks]
  - id: python-integration-04
    front: "Which checks do the jwt.decode arguments close?"
    back: "algorithms=['RS256'] pins the algorithm, audience checks aud, issuer checks iss. PyJWT verifies the signature and exp by default. leeway allows a few seconds of slack for clock drift."
    tags: [python, pyjwt, validation]
  - id: python-integration-05
    front: "Why set algorithms explicitly in jwt.decode?"
    back: "Trusting the token's alg field opens attacks: alg:none (an unsigned token) and the RS256-to-HS256 swap (the public key used as an HMAC secret). An explicit algorithm list closes both, which is why PyJWT requires it."
    tags: [python, security, pitfall]
  - id: python-integration-06
    front: "Why does jwt.decode with audience='my-api' raise InvalidAudienceError on a fresh Keycloak token?"
    back: "By default Keycloak puts 'account' in aud, not your API. The fix is an audience mapper or client scope in the realm so aud contains your service. Do not disable verify_aud: that removes protection against other realm tokens."
    tags: [python, pyjwt, pitfall]
  - id: python-integration-07
    front: "Where are roles in a Keycloak token?"
    back: "Realm roles in realm_access.roles, a client's roles in resource_access.<client>.roles. Read them with plain dict access: claims.get('realm_access', {}).get('roles', [])."
    tags: [python, roles]
  - id: python-integration-08
    front: "How does 401 differ from 403 in token validation?"
    back: "401 says 'I do not know who you are': no token, expired, or bad signature. 403 says 'I know you, but you may not': valid token, missing role. Confusing them hurts: 403 on an invalid token stops the client refreshing; 401 on a missing role sends it to a pointless login."
    tags: [python, fastapi, security]
  - id: python-integration-09
    front: "How is the get_current_user FastAPI dependency built?"
    back: "OAuth2PasswordBearer extracts the token from the Authorization header (and draws the Swagger form); it verifies nothing. get_current_user picks the key via PyJWKClient, calls jwt.decode, and returns 401 on jwt.PyJWTError. Handlers get claims via Depends(get_current_user)."
    tags: [python, fastapi, validation]
  - id: python-integration-10
    front: "How does a service get a token to call another service with no user?"
    back: "The client_credentials grant: the service presents client_id and client_secret and gets an access token for its service account (sub points to it). No refresh_token is issued; on expiry it requests a new one. The receiver verifies it like a user token."
    tags: [python, client-credentials]
  - id: python-integration-11
    front: "When should you use introspection instead of offline verification?"
    back: "Offline verification is fast but does not see revocation until exp. Introspection (RFC 7662) asks the realm about the token's status and sees revocation immediately, at the cost of a network call per check and a Keycloak dependency. Use it selectively on sensitive operations, for example money."
    tags: [python, introspection, security]
