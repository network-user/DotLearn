conceptId: keycloak-model
cards:
  - id: keycloak-model-01
    front: "What is a realm in Keycloak?"
    back: "An isolated space with its own users, clients, roles, and signing keys. A user from one realm does not exist in another; a token signed by one realm is not accepted in another."
    tags: [realm]
  - id: keycloak-model-02
    front: "What is the master realm for?"
    back: "Administering Keycloak itself. Application users are not kept in master so they do not accidentally get server admin rights — create a separate realm for them."
    tags: [realm, pitfall]
  - id: keycloak-model-03
    front: "How does a confidential client differ from a public client?"
    back: "Confidential — backend app that can safely store client_secret. Public — SPA or mobile: code is visible to the user, so it has no secret."
    tags: [client]
  - id: keycloak-model-04
    front: "Can you make a SPA a confidential client with an embedded secret?"
    back: "No. A secret in downloaded code is trivial to extract and stops being a secret. SPAs and mobile clients must be public and use PKCE."
    tags: [client, security, pitfall]
  - id: keycloak-model-05
    front: "How do realm role and client role differ?"
    back: "Realm role is realm-wide, shared by all clients (e.g. admin, user). Client role is defined inside one client and only meaningful there (e.g. order:refund on shop-backend)."
    tags: [roles]
  - id: keycloak-model-06
    front: "Which token claims hold realm roles and client roles?"
    back: "Realm roles in realm_access.roles; client roles in resource_access.<client>.roles. Client mappers put roles into the token."
    tags: [roles, tokens]
  - id: keycloak-model-07
    front: "Which token section must the resource server read roles from?"
    back: "Its own resource_access.<its-client>.roles, not another client's roles. Otherwise authorization leaks across apps."
    tags: [roles, security, pitfall]
  - id: keycloak-model-08
    front: "What are group and composite role in Keycloak?"
    back: "Group — users sharing role assignments (groups can nest and inherit). Composite role — a role that includes other roles; composites easily grow beyond what you expect."
    tags: [roles, groups]
  - id: keycloak-model-09
    front: "What is a client's service account?"
    back: "Confidential client mode where the client becomes a user without a human for machine access. Has its own roles and gets tokens via client credentials; sub in the token points at the client."
    tags: [client, service-account]
  - id: keycloak-model-10
    front: "Can one user's client roles differ per client?"
    back: "Yes. A user may be admin in hr-portal and have no roles in shop-backend. The token includes roles only for clients relevant to the request."
    tags: [roles]
