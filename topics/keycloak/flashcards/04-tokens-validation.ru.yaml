conceptId: tokens-validation
cards:
  - id: tokens-validation-01
    front: "Из каких трёх частей состоит JWT?"
    back: "header.payload.signature, разделённые точками. Header и payload - это JSON в Base64URL, читаемый кем угодно. Signature - подпись первых двух частей приватным ключом Keycloak."
    tags: [jwt]
  - id: tokens-validation-02
    front: "Что лежит в header и payload JWT?"
    back: "Header: алгоритм подписи (например RS256) и kid - идентификатор ключа. Payload: claims - sub (кто), iss (кем выдан), aud (для кого), exp (когда истекает), а также роли."
    tags: [jwt, claims]
  - id: tokens-validation-03
    front: "Payload JWT зашифрован или подписан?"
    back: "Подписан, но не зашифрован. Содержимое (email, роли) читается из перехваченного token. Защищает не секретность, а невозможность изменить: любая правка ломает подпись. Поэтому секреты в claims недопустимы."
    tags: [jwt, security, pitfall]
  - id: tokens-validation-04
    front: "Какой минимальный набор проверок обязан сделать resource server для JWT?"
    back: "Подпись (публичным ключом из jwks_uri), exp (не истёк), iss (выдан ожидаемым realm) и aud (предназначен этому resource server)."
    tags: [validation]
  - id: tokens-validation-05
    front: "Чем опасен пропуск проверки aud?"
    back: "Без проверки aud resource server примет любой валидно подписанный token этого realm, даже выданный другому приложению с другими правами."
    tags: [validation, security, pitfall]
  - id: tokens-validation-06
    front: "Почему нельзя доверять payload без проверки подписи?"
    back: "Header и payload открыто редактируются. Без проверки signature любой меняет \"role\":\"user\" на \"role\":\"admin\", и resource server это съест. Подпись проверяется всегда."
    tags: [validation, security, pitfall]
  - id: tokens-validation-07
    front: "Зачем нужны JWKS и kid?"
    back: "JWKS (по jwks_uri) - набор публичных ключей для проверки подписи. Kid в header token выбирает нужный ключ. Это позволяет ротацию: при незнакомом kid resource server перечитывает JWKS."
    tags: [jwt, keys, jwks]
  - id: tokens-validation-08
    front: "Зачем нужна пара access_token и refresh_token?"
    back: "Access_token проверяется офлайн и неотзывной, поэтому делают короткий (минуты). Чтобы пользователь не логинился постоянно, refresh_token (длинный) служит только для получения нового access_token у token endpoint."
    tags: [tokens, refresh]
  - id: tokens-validation-09
    front: "Можно ли отозвать access_token до его exp?"
    back: "Нет: JWT проверяется офлайн, поэтому действителен до истечения. Отозвать можно refresh_token (при logout или компрометации), но последний выданный access_token доживёт до своего exp."
    tags: [tokens, refresh, revocation]
  - id: tokens-validation-10
    front: "Почему рассинхронизация часов ломает проверку exp?"
    back: "Проверка exp/nbf сравнивает время в token с локальными часами resource server. Если часы разъехались, граничные token то принимаются, то нет. Нужны NTP-синхронизация и небольшой допуск clock skew."
    tags: [validation, clock-skew, pitfall]
