conceptId: oauth2-oidc-basics
cards:
  - id: oauth2-oidc-basics-01
    front: "Какую задачу решает OAuth2, а какую - OIDC?"
    back: "OAuth2 решает авторизацию - что приложению разрешено делать от имени пользователя. OIDC - это надстройка поверх OAuth2, решающая аутентификацию: кто этот пользователь."
    tags: [oauth2, oidc]
  - id: oauth2-oidc-basics-02
    front: "Назовите четыре роли OAuth2."
    back: "Resource owner (владелец данных), client (приложение), authorization server (выдаёт token, в нашем случае Keycloak) и resource server (API с данными)."
    tags: [oauth2, roles]
  - id: oauth2-oidc-basics-03
    front: "Видит ли client пароль владельца ресурса?"
    back: "Нет. Client отправляет владельца на authorization server, где тот логинится и даёт согласие, а назад client получает только access_token. Пароль остаётся между владельцем и authorization server."
    tags: [oauth2, security]
  - id: oauth2-oidc-basics-04
    front: "Чем access_token отличается от id_token по назначению?"
    back: "Access_token - пропуск к API, его проверяет resource server. Id_token - подписанный JWT с личностью пользователя для самого client; до resource server он обычно не доходит."
    tags: [oidc, tokens]
  - id: oauth2-oidc-basics-05
    front: "Что такое scope в OAuth2?"
    back: "Список запрашиваемых разрешений, который client указывает при обращении к authorization server. Это механизм наименьших привилегий - согласие на конкретный объём доступа, а не «всё или ничего»."
    tags: [oauth2, scope]
  - id: oauth2-oidc-basics-06
    front: "Что OIDC добавляет к OAuth2?"
    back: "Специальный scope openid и новый артефакт - id_token в формате JWT, подписанный authorization server, с claims о пользователе: sub, iss, aud, время выдачи и истечения, опционально email и имя."
    tags: [oidc]
  - id: oauth2-oidc-basics-07
    front: "Зачем нужен discovery-документ /.well-known/openid-configuration?"
    back: "Один JSON по фиксированному пути, где authorization server публикует свои адреса (authorization_endpoint, token_endpoint, jwks_uri) и параметры. Библиотеки читают его один раз вместо ручного зашивания URL."
    tags: [oidc, discovery]
  - id: oauth2-oidc-basics-08
    front: "Определён ли спецификацией формат access_token?"
    back: "Нет. Access_token может быть JWT или непрозрачной opaque-строкой. Client не должен его декодировать или принимать решения по содержимому - для него это просто строка для передачи дальше."
    tags: [oauth2, tokens]
  - id: oauth2-oidc-basics-09
    front: "Почему голый OAuth2 без OIDC не годится для входа?"
    back: "Access_token не привязан проверяемо к конкретному client - возможна атака token substitution. OIDC закрывает это: id_token содержит claim aud, подписан, и client обязан проверить подпись, aud и iss."
    tags: [oidc, security, pitfall]
  - id: oauth2-oidc-basics-10
    front: "Можно ли разбирать access_token ради email на фронте?"
    back: "Нет, это ошибка дизайна. Для личности есть id_token. Keycloak по умолчанию отдаёт JWT, но access_token завтра может стать opaque, и код сломается."
    tags: [tokens, pitfall]
