conceptId: tokens-validation
cards:
  - id: tokens-validation-01
    front: "What three parts make up a JWT?"
    back: "header.payload.signature, dot-separated. Header and payload are JSON in Base64URL, readable by anyone. Signature binds the first two with Keycloak's private key."
    tags: [jwt]
  - id: tokens-validation-02
    front: "What is in the JWT header and payload?"
    back: "Header: signing algorithm (e.g. RS256) and kid (key id). Payload: claims such as sub (who), iss (issuer), aud (audience), exp (expiry), plus roles."
    tags: [jwt, claims]
  - id: tokens-validation-03
    front: "Is JWT payload encrypted or signed?"
    back: "Signed, not encrypted. Content (email, roles) is readable from an intercepted token. Protection is integrity, not secrecy: any edit breaks the signature. No secrets in claims."
    tags: [jwt, security, pitfall]
  - id: tokens-validation-04
    front: "What is the minimum validation set for a JWT on the resource server?"
    back: "Signature (public key from jwks_uri), exp (not expired), iss (expected realm), aud (intended for this resource server)."
    tags: [validation]
  - id: tokens-validation-05
    front: "Why is skipping aud dangerous?"
    back: "Without aud the resource server accepts any validly signed token of this realm, even one issued to another application with different rights."
    tags: [validation, security, pitfall]
  - id: tokens-validation-06
    front: "Why must you not trust payload without verifying signature?"
    back: "Header and payload are openly editable. Without signature check anyone can change role from user to admin. Always verify signature."
    tags: [validation, security, pitfall]
  - id: tokens-validation-07
    front: "Why JWKS and kid?"
    back: "JWKS (at jwks_uri) is the public key set for signature verification. kid in the header picks the key. Enables rotation: re-read JWKS on unknown kid."
    tags: [jwt, keys, jwks]
  - id: tokens-validation-08
    front: "Why access_token plus refresh_token?"
    back: "access_token is verified offline and not revocable, so keep it short (minutes). refresh_token is long and only renews access at the token endpoint so users do not log in constantly."
    tags: [tokens, refresh]
  - id: tokens-validation-09
    front: "Can you revoke access_token before exp?"
    back: "No: offline JWT verification means valid until expiry. refresh_token can be revoked (logout/compromise), but the last access_token lives until its exp."
    tags: [tokens, refresh, revocation]
  - id: tokens-validation-10
    front: "Why does clock drift break exp validation?"
    back: "exp/nbf compare token time to the resource server clock. Drift makes borderline tokens flip. Use NTP sync and a small clock skew allowance."
    tags: [validation, clock-skew, pitfall]
