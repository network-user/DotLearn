conceptId: auth-flows
cards:
  - id: auth-flows-01
    front: "Что такое flow (grant type) и почему их несколько?"
    back: "Flow - способ, которым client получает token. Их несколько потому, что разные клиенты в разных условиях безопасности: SPA не хранит секрет но водит по редиректам, фоновый сервис хранит секрет но не имеет человека."
    tags: [flows]
  - id: auth-flows-02
    front: "Почему authorization code flow не отдаёт token сразу в редиректе?"
    back: "Так работал implicit flow, и token летел через адресную строку, попадал в историю, логи прокси и Referer - его легко перехватывали. Вместо этого возвращают одноразовый code."
    tags: [flows, security]
  - id: auth-flows-03
    front: "Как client меняет authorization code на token?"
    back: "Отдельным прямым запросом backend-to-backend (или прямым POST из SPA) к token endpoint, который не проходит через адресную строку браузера. Так token не появляется в браузерной навигации."
    tags: [flows]
  - id: auth-flows-04
    front: "Что такое PKCE и от чего он защищает?"
    back: "Proof Key for Code Exchange - защита от перехвата authorization code. Доказывает, что token меняет тот же client, что запрашивал code, без участия секрета (которого у public client нет)."
    tags: [pkce, security]
  - id: auth-flows-05
    front: "Как устроены code_verifier и code_challenge в PKCE?"
    back: "Client генерирует случайный code_verifier и держит у себя. В /authorize шлёт code_challenge = BASE64URL(SHA256(verifier)). При обмене code присылает verifier, Keycloak хэширует его и сверяет с сохранённым challenge."
    tags: [pkce]
  - id: auth-flows-06
    front: "Почему перехваченный code бесполезен при PKCE?"
    back: "У злоумышленника нет code_verifier, а из challenge его не восстановить - это односторонний SHA-256 хэш. Без verifier обмен code на token не пройдёт."
    tags: [pkce, security]
  - id: auth-flows-07
    front: "Почему нужен code_challenge_method=S256, а не plain?"
    back: "S256 хэширует verifier через SHA-256. Метод plain (challenge равен verifier) спецификация допускает лишь как запасной для платформ без SHA-256 - он не даёт защиты от перехвата."
    tags: [pkce, pitfall]
  - id: auth-flows-08
    front: "Когда применяется client credentials flow?"
    back: "Для машинного доступа без человека: confidential client получает token, предъявляя client_secret напрямую, без браузера и redirect. Token выписан на сам client (service account), id_token не выдаётся."
    tags: [flows, client-credentials]
  - id: auth-flows-09
    front: "Какой вопрос определяет выбор между двумя потоками?"
    back: "Есть ли за запросом человек. Есть - authorization code с PKCE, и вы получаете id_token про человека. Нет - client credentials, и token представляет сам сервис."
    tags: [flows]
  - id: auth-flows-10
    front: "Почему redirect_uri должен совпадать с зарегистрированным точно?"
    back: "Keycloak меняет code на token, только если redirect_uri точно совпадает с зарегистрированным у client (даже лишний слеш = отказ). Это защита от open redirect и кражи code на чужой сервер."
    tags: [security, pitfall]
