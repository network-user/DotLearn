conceptId: python-integration
cards:
  - id: python-integration-01
    front: "Как в Python проверить токен Keycloak, не обращаясь к нему на каждый запрос?"
    back: "Офлайн: PyJWKClient один раз загружает и кэширует публичные ключи realm, а jwt.decode из PyJWT локально проверяет подпись и claims. Сеть нужна только для обновления ключей, не на каждый запрос."
    tags: [python, pyjwt, validation]
  - id: python-integration-02
    front: "Что делает PyJWKClient?"
    back: "Загружает набор JWKS по jwks_uri, кэширует его (по умолчанию lifespan=300 секунд) и по kid из header токена выбирает нужный ключ. При ротации подхватывает новый ключ на обновлении кэша. Создают один экземпляр на всё приложение."
    tags: [python, pyjwt, jwks]
  - id: python-integration-03
    front: "Откуда берут jwks_uri, а не зашивают в код?"
    back: "Из discovery-документа realm по пути .well-known/openid-configuration. В нём лежат issuer, jwks_uri и адреса token и introspection endpoint. Так адреса остаются актуальными при ротации и переносе realm."
    tags: [python, discovery, jwks]
  - id: python-integration-04
    front: "Какие проверки закрывают аргументы jwt.decode?"
    back: "algorithms=['RS256'] фиксирует алгоритм, audience сверяет aud, issuer сверяет iss. Подпись и exp PyJWT проверяет по умолчанию. leeway даёт допуск секунд на разъехавшиеся часы."
    tags: [python, pyjwt, validation]
  - id: python-integration-05
    front: "Почему algorithms в jwt.decode задают явно?"
    back: "Доверие полю alg из токена открывает атаки: alg:none (токен без подписи) и подмену RS256 на HS256 (публичный ключ используется как HMAC-секрет). Явный список алгоритмов закрывает обе, поэтому PyJWT требует его обязательно."
    tags: [python, security, pitfall]
  - id: python-integration-06
    front: "Почему jwt.decode с audience='my-api' бросает InvalidAudienceError на свежем токене Keycloak?"
    back: "Keycloak по умолчанию кладёт в aud значение 'account', а не ваш API. Правильно добавить audience-маппер или client scope в realm, чтобы aud содержал ваш сервис. Отключать verify_aud нельзя: это убирает защиту от чужих токенов realm."
    tags: [python, pyjwt, pitfall]
  - id: python-integration-07
    front: "Где в токене Keycloak лежат роли?"
    back: "Realm-роли в realm_access.roles, роли конкретного клиента в resource_access.<client>.roles. Достаются обычным разбором словаря: claims.get('realm_access', {}).get('roles', [])."
    tags: [python, roles]
  - id: python-integration-08
    front: "Чем 401 отличается от 403 при проверке токена?"
    back: "401 отвечает «не знаю, кто вы»: токена нет, он истёк или подпись не сошлась. 403 отвечает «знаю, но нельзя»: токен валиден, но нужной роли нет. Путать их вредно: 403 на невалидный токен мешает клиенту обновиться, 401 на нехватку роли шлёт на бессмысленный логин."
    tags: [python, fastapi, security]
  - id: python-integration-09
    front: "Как устроена зависимость get_current_user в FastAPI?"
    back: "OAuth2PasswordBearer достаёт токен из заголовка Authorization (и рисует форму в Swagger), сам ничего не проверяет. get_current_user выбирает ключ через PyJWKClient, вызывает jwt.decode и при jwt.PyJWTError отдаёт 401. Обработчики берут claims через Depends(get_current_user)."
    tags: [python, fastapi, validation]
  - id: python-integration-10
    front: "Как сервис получает токен для вызова другого сервиса без пользователя?"
    back: "Grant client_credentials: сервис предъявляет client_id и client_secret и получает access token сервисной учётки (sub указывает на неё). refresh_token не выдаётся, при истечении запрашивают новый. Принимающая сторона проверяет токен так же, как пользовательский."
    tags: [python, client-credentials]
  - id: python-integration-11
    front: "Когда брать introspection вместо офлайн-проверки?"
    back: "Офлайн-проверка быстрая, но не видит отзыва до exp. Introspection (RFC 7662) спрашивает realm про статус токена и видит отзыв немедленно, ценой сетевого вызова на проверку и зависимости от Keycloak. Берут точечно на чувствительных операциях, например с деньгами."
    tags: [python, introspection, security]
