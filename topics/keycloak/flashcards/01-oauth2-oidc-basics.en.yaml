conceptId: oauth2-oidc-basics
cards:
  - id: oauth2-oidc-basics-01
    front: "What problem does OAuth2 solve, and what does OIDC add?"
    back: "OAuth2 solves authorization: what the application may do on the user's behalf. OIDC is a layer on OAuth2 that solves authentication: who the user is."
    tags: [oauth2, oidc]
  - id: oauth2-oidc-basics-02
    front: "Name the four OAuth2 roles."
    back: "Resource owner (data owner), client (application), authorization server (issues tokens; Keycloak here), and resource server (API with data)."
    tags: [oauth2, roles]
  - id: oauth2-oidc-basics-03
    front: "Does the client see the resource owner's password?"
    back: "No. The client sends the owner to the authorization server to log in and consent; the client gets back only an access_token. The password stays between owner and authorization server."
    tags: [oauth2, security]
  - id: oauth2-oidc-basics-04
    front: "How do access_token and id_token differ in purpose?"
    back: "access_token is an API pass checked by the resource server. id_token is a signed JWT with user identity for the client itself; it usually never reaches the resource server."
    tags: [oidc, tokens]
  - id: oauth2-oidc-basics-05
    front: "What is scope in OAuth2?"
    back: "A list of requested permissions the client specifies when calling the authorization server. It is least privilege: consent to a specific access volume, not all-or-nothing."
    tags: [oauth2, scope]
  - id: oauth2-oidc-basics-06
    front: "What does OIDC add to OAuth2?"
    back: "Special scope openid and a new artifact, id_token, as a JWT signed by the authorization server, with user claims: sub, iss, aud, issue/expiry times, optionally email and name."
    tags: [oidc]
  - id: oauth2-oidc-basics-07
    front: "Why is the discovery document /.well-known/openid-configuration needed?"
    back: "One JSON at a fixed path where the authorization server publishes addresses (authorization_endpoint, token_endpoint, jwks_uri) and parameters. Libraries read it once instead of hardcoding URLs."
    tags: [oidc, discovery]
  - id: oauth2-oidc-basics-08
    front: "Is the access_token format defined by the spec?"
    back: "No. access_token may be JWT or an opaque string. The client must not decode it or decide from its contents; for the client it is just a string to pass along."
    tags: [oauth2, tokens]
  - id: oauth2-oidc-basics-09
    front: "Why is bare OAuth2 without OIDC not enough for login?"
    back: "access_token is not verifiably bound to a specific client, so token substitution is possible. OIDC fixes this: id_token has aud, is signed, and the client must verify signature, aud, and iss."
    tags: [oidc, security, pitfall]
  - id: oauth2-oidc-basics-10
    front: "Can you parse access_token on the frontend for email?"
    back: "No, that is a design mistake. Use id_token for identity. Keycloak defaults to JWT access tokens, but access_token may become opaque tomorrow and break your code."
    tags: [tokens, pitfall]
