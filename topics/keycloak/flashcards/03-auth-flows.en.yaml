conceptId: auth-flows
cards:
  - id: auth-flows-01
    front: "What is a flow (grant type) and why are there several?"
    back: "A flow is how the client obtains a token. Different clients live in different security conditions: SPA cannot store a secret but can redirect; a background service can store a secret but has no human."
    tags: [flows]
  - id: auth-flows-02
    front: "Why doesn't authorization code flow return the token immediately in the redirect?"
    back: "Implicit flow did that and the token flew through the address bar into history, proxy logs, and Referer — easy to intercept. Instead a one-time code is returned."
    tags: [flows, security]
  - id: auth-flows-03
    front: "How does the client exchange authorization code for a token?"
    back: "A direct backend-to-backend request (or direct POST from SPA) to the token endpoint that does not go through the browser address bar. The token never appears in browser navigation."
    tags: [flows]
  - id: auth-flows-04
    front: "What is PKCE and what does it protect against?"
    back: "Proof Key for Code Exchange — protection against intercepting authorization code. Proves the same client that requested the code exchanges it, without a secret (which public clients lack)."
    tags: [pkce, security]
  - id: auth-flows-05
    front: "How do code_verifier and code_challenge work in PKCE?"
    back: "Client generates random code_verifier and keeps it. In /authorize it sends code_challenge = BASE64URL(SHA256(verifier)). On exchange it sends verifier; Keycloak hashes it and compares to stored challenge."
    tags: [pkce]
  - id: auth-flows-06
    front: "Why is intercepted code useless with PKCE?"
    back: "Attacker has no code_verifier; challenge cannot be reversed — one-way SHA-256. Without verifier the code-to-token exchange fails."
    tags: [pkce, security]
  - id: auth-flows-07
    front: "Why use code_challenge_method=S256 instead of plain?"
    back: "S256 hashes verifier with SHA-256. plain (challenge equals verifier) is only a fallback for platforms without SHA-256 — it does not protect against interception."
    tags: [pkce, pitfall]
  - id: auth-flows-08
    front: "When is client credentials flow used?"
    back: "Machine access without a human: confidential client gets a token by presenting client_secret directly, no browser or redirect. Token is for the client (service account); no id_token."
    tags: [flows, client-credentials]
  - id: auth-flows-09
    front: "What question picks between the two main flows?"
    back: "Is there a human behind the request. Yes — authorization code with PKCE and id_token about the person. No — client credentials and the token represents the service."
    tags: [flows]
  - id: auth-flows-10
    front: "Why must redirect_uri match the registered value exactly?"
    back: "Keycloak exchanges code only if redirect_uri exactly matches registration (even a trailing slash fails). Open-redirect and code theft protection."
    tags: [security, pitfall]
