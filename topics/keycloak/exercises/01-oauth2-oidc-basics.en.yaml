exercises:
  - id: oauth2-roles-001
    concept: oauth2-oidc-basics
    type: theory-quiz
    difficulty: 1
    prompt: "What problem does OAuth2 solve?"
    choices:
      - id: a
        text: "Authorization: what the application is allowed to do on behalf of the resource owner."
      - id: b
        text: "Encrypting traffic between client and resource server."
      - id: c
        text: "Authentication: reliably establishing user identity."
      - id: d
        text: "Storing user passwords on the client side."
    correct: [a]
    explanation: "OAuth2 is about authorization: it grants limited access to a resource without passing the password. Establishing user identity is OIDC on top of OAuth2."
    variants:
      - prompt: "What does OAuth2 not solve by itself, and why is OIDC needed?"
        choices:
          - id: a
            text: "Authentication (who the user is) — OIDC adds that on top of OAuth2."
          - id: b
            text: "API access authorization — OIDC adds that."
          - id: c
            text: "Limiting access via scope — OIDC adds that."
          - id: d
            text: "Signing access_token — only OIDC does that."
        correct: [a]
        explanation: "OAuth2 handles authorization, not reliable identity. OIDC is a thin layer on OAuth2 that adds authentication via id_token."
      - prompt: "Which of the following is authorization, not authentication?"
        choices:
          - id: a
            text: "Deciding whether the app may read your photos on your behalf."
          - id: b
            text: "Learning the signed-in user's name and email."
          - id: c
            text: "Confirming the person is who they claim to be."
          - id: d
            text: "Issuing a signed proof of identity."
        correct: [a]
        explanation: "Granting limited resource access is authorization (OAuth2). Establishing and attesting identity is authentication (OIDC)."

  - id: oauth2-four-roles-001
    concept: oauth2-oidc-basics
    type: theory-quiz
    difficulty: 1
    prompt: "Who is the resource owner in OAuth2 roles?"
    choices:
      - id: a
        text: "The user — owner of the data who grants consent."
      - id: b
        text: "The application acting on the user's behalf."
      - id: c
        text: "The server that asks for consent and issues tokens."
      - id: d
        text: "The API that holds data and admits requests with a token."
    correct: [a]
    explanation: "Resource owner is the data owner — the user. The app is the client; the token issuer is the authorization server; the data API is the resource server."
    variants:
      - prompt: "Which OAuth2 role asks for consent and issues access_token?"
        choices:
          - id: a
            text: "Authorization server (Keycloak in this topic)."
          - id: b
            text: "Resource server — the data API."
          - id: c
            text: "Client — the user's application."
          - id: d
            text: "Resource owner — the user."
        correct: [a]
        explanation: "The authorization server asks for consent and issues tokens. The resource server only validates an already issued token."
      - prompt: "Which OAuth2 role validates permissions from access_token but does not issue it?"
        choices:
          - id: a
            text: "Resource server — the API that holds data."
          - id: b
            text: "Authorization server — it also issues tokens."
          - id: c
            text: "Client — the app receiving the token."
          - id: d
            text: "Resource owner — the data owner."
        correct: [a]
        explanation: "The resource server accepts requests with access_token and checks permissions. Issuing tokens is the authorization server's job."

  - id: oauth2-no-password-001
    concept: oauth2-oidc-basics
    type: theory-quiz
    difficulty: 2
    prompt: "What does the client get in OAuth2 instead of the resource owner's password?"
    choices:
      - id: a
        text: "access_token — a string with limited rights and a lifetime."
      - id: b
        text: "An encrypted copy of the password from the authorization server."
      - id: c
        text: "Full access to the owner's account forever."
      - id: d
        text: "The owner's login without password to sign in as them."
    correct: [a]
    explanation: "The client never sees the password: the owner logs in at the authorization server and the client gets access_token — limited in scope and time."
    variants:
      - prompt: "Where does the resource owner enter a password in the OAuth2 flow?"
        choices:
          - id: a
            text: "At the authorization server — only it sees the password, not the client."
          - id: b
            text: "In the client's form, which then forwards the password."
          - id: c
            text: "At the resource server on first API call."
          - id: d
            text: "Nowhere — OAuth2 never uses passwords."
        correct: [a]
        explanation: "The password stays between owner and authorization server. The client sends the owner to log in there and gets back only a token."
      - prompt: "How is access_token limited compared to the owner's password?"
        choices:
          - id: a
            text: "By scope and lifetime — a narrow, temporary pass, not full account access."
          - id: b
            text: "It is not — access_token equals password rights forever."
          - id: c
            text: "Only by lifetime; scope equals full account access."
          - id: d
            text: "Only by scope; lifetime is unlimited."
        correct: [a]
        explanation: "access_token carries limited scope and expires. That is the point: a stolen token does less harm than a stolen password."

  - id: oidc-token-purpose-001
    concept: oauth2-oidc-basics
    type: theory-quiz
    difficulty: 2
    prompt: "How do access_token and id_token differ in purpose?"
    choices:
      - id: a
        text: "access_token is an API pass for the resource server; id_token is signed identity proof for the client."
      - id: b
        text: "access_token is for user identity; id_token is for API access."
      - id: c
        text: "They are synonyms — both carry identity and access rights."
      - id: d
        text: "access_token is signed; id_token is always an opaque string."
    correct: [a]
    explanation: "access_token goes to the resource server as an API pass. id_token (OIDC JWT) stays with the client to say who signed in."
    hints:
      - "Ask where each token goes: one to the API, one stays with the app to identify the user."
      - "OIDC adds identity proof; access_token does not guarantee identity by spec."
    variants:
      - prompt: "Which token does the client put in Authorization when calling an API?"
        choices:
          - id: a
            text: "access_token — it is meant for the resource server."
          - id: b
            text: "id_token — the API validates that."
          - id: c
            text: "refresh_token — it proves rights on every request."
          - id: d
            text: "Any of them — the API accepts all three the same way."
        correct: [a]
        explanation: "The API gets access_token. id_token stays with the client; refresh_token is only shown to the token endpoint."
      - prompt: "Which scope must you request to get id_token along with access_token?"
        choices:
          - id: a
            text: "openid — it enables id_token in OIDC."
          - id: b
            text: "profile — without it no id_token."
          - id: c
            text: "any — id_token is always issued."
          - id: d
            text: "id_token — that is the scope name."
        correct: [a]
        explanation: "Scope openid triggers id_token. profile and email add claims but id_token appears because of openid."

  - id: oidc-scope-vs-roles-001
    concept: oauth2-oidc-basics
    type: theory-quiz
    difficulty: 3
    prompt: "Why must scope not be treated as user roles?"
    choices:
      - id: a
        text: "Scope is requested consent for one request, not permanent rights in the system."
      - id: b
        text: "Scope is roles written in another claim."
      - id: c
        text: "Scope is assigned by admin forever; roles are requested per login."
      - id: d
        text: "Scope exists only in id_token; roles only in access_token."
    correct: [a]
    explanation: "Scope is least privilege for a specific request the user consents to. Roles are a separate permanent model — different entities in Keycloak."
    hints:
      - "Who sets scope when, versus who sets roles?"
      - "Scope is consent to an action volume now; roles are stable rights in the system."

  - id: oidc-discovery-001
    concept: oauth2-oidc-basics
    type: theory-quiz
    difficulty: 3
    prompt: "Where does a client library learn authorization_endpoint, token_endpoint, and jwks_uri without hardcoding?"
    choices:
      - id: a
        text: "From the discovery document at /.well-known/openid-configuration."
      - id: b
        text: "From resource server response headers on first 401."
      - id: c
        text: "From access_token payload."
      - id: d
        text: "From environment variables the admin must set."
    correct: [a]
    explanation: "OIDC publishes discovery at /.well-known/openid-configuration with all endpoints, scopes, and algorithms. Libraries read it once."
    hints:
      - "OIDC standardizes one fixed URL so addresses are not hardcoded."
      - "The path starts with /.well-known/ — machine-readable metadata convention."

  - id: oauth2-opaque-token-001
    concept: oauth2-oidc-basics
    type: theory-quiz
    difficulty: 4
    prompt: "On the frontend you decode access_token and read email from it. Why is that a design mistake even if Keycloak currently returns JWT access tokens?"
    choices:
      - id: a
        text: "access_token format is undefined by spec — it may become opaque and break code that reads identity from it; use id_token for identity."
      - id: b
        text: "Decoding JWT on the frontend is impossible without the private key."
      - id: c
        text: "Nobody may read access_token, including the resource server."
      - id: d
        text: "Email never appears in JWT, so decoding is pointless."
    correct: [a]
    explanation: "OAuth2 does not standardize access_token format — JWT today, opaque tomorrow. The client must not decide from its contents; id_token is for identity."
    hints:
      - "The OAuth2 spec promises nothing about access_token innards."
      - "OIDC has a separate artifact the client is meant to read for identity."
