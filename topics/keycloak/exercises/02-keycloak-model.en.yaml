exercises:
  - id: kc-realm-isolation-001
    concept: keycloak-model
    type: theory-quiz
    difficulty: 1
    prompt: "What does a realm isolate in Keycloak?"
    choices:
      - id: a
        text: "Its own users, clients, roles, and signing keys: different realms do not overlap."
      - id: b
        text: "Only users; clients and keys are shared across realms."
      - id: c
        text: "Only signing keys; users are shared across Keycloak."
      - id: d
        text: "Nothing: realm is just an admin label."
    correct: [a]
    explanation: "Realm is an isolated space with its own users, clients, roles, and keys. A user in one realm does not exist in another."
    variants:
      - prompt: "User alice exists in realm corp. Can she sign into client shop-spa in realm customers?"
        choices:
          - id: a
            text: "No: her account does not exist in customers; realm boundaries are impermeable."
          - id: b
            text: "Yes if she knows the password: realms do not restrict other clients."
          - id: c
            text: "Yes: clients are shared across all Keycloak realms."
          - id: d
            text: "Yes but only after an invite from shop-spa admin."
        correct: [a]
        explanation: "alice exists only in corp; she is not in customers, so she cannot sign into a client there."
      - prompt: "Which special realm is created at install and is for administering Keycloak?"
        choices:
          - id: a
            text: "master: application users are not kept there."
          - id: b
            text: "admin: regular users live there too."
          - id: c
            text: "root: it manages keys for all realms."
          - id: d
            text: "default: all clients live there by default."
        correct: [a]
        explanation: "master is for Keycloak administration. Do not put application users there."

  - id: kc-client-type-001
    concept: keycloak-model
    type: theory-quiz
    difficulty: 1
    prompt: "How does a confidential client differ from a public client?"
    choices:
      - id: a
        text: "Confidential has a backend and can store client_secret; public has no secret."
      - id: b
        text: "Confidential runs only in the browser; public only on backend."
      - id: c
        text: "Confidential needs no registration; public does."
      - id: d
        text: "They are synonyms: only the admin tab name differs."
    correct: [a]
    explanation: "Confidential (backend) can store client_secret. Public (SPA/mobile) code is visible: no secret."
    variants:
      - prompt: "What type is a SPA whose JavaScript is downloaded to the browser?"
        choices:
          - id: a
            text: "Public without a secret: you cannot hide a secret in downloaded code."
          - id: b
            text: "Confidential with client_secret in the bundle."
          - id: c
            text: "Confidential because it talks to backend over HTTPS."
          - id: d
            text: "Not a client: SPAs are not registered in Keycloak."
        correct: [a]
        explanation: "SPA code is visible to the user: public client with PKCE, not a secret."
      - prompt: "Which client type can use client credentials for machine access?"
        choices:
          - id: a
            text: "Confidential: it proves itself with a secret."
          - id: b
            text: "Public: no secret needed."
          - id: c
            text: "Any client regardless of type."
          - id: d
            text: "Only master realm clients."
        correct: [a]
        explanation: "Client credentials requires presenting client_secret: only confidential clients can do that safely."

  - id: kc-roles-types-001
    concept: keycloak-model
    type: theory-quiz
    difficulty: 2
    prompt: "How do realm role and client role differ?"
    choices:
      - id: a
        text: "Realm role is realm-wide (e.g. admin); client role is inside one client (e.g. order:refund)."
      - id: b
        text: "Realm role is for one client; client role is realm-wide."
      - id: c
        text: "Realm roles go to groups; client roles only to individual users."
      - id: d
        text: "No difference: both land in the same token claim."
    correct: [a]
    explanation: "Realm role is shared across the realm. Client role belongs to one client and is meaningful only there."
    hints:
      - "Think scope of the permission: whole realm or one application?"
      - "Global admin vs local order:refund live at different levels."
    variants:
      - prompt: "Permission order:refund only makes sense in shop-backend. What role type?"
        choices:
          - id: a
            text: "Client role on shop-backend."
          - id: b
            text: "Realm role so all clients see it."
          - id: c
            text: "A group, not a role."
          - id: d
            text: "A scope, not a role."
        correct: [a]
        explanation: "App-specific permission → client role of that client."
      - prompt: "Permission admin should apply across the whole realm. What role type?"
        choices:
          - id: a
            text: "Realm role: shared across all clients."
          - id: b
            text: "Client role duplicated in every client."
          - id: c
            text: "Composite role: admin must be composite."
          - id: d
            text: "openid scope."
        correct: [a]
        explanation: "Realm-wide permission → realm role."

  - id: kc-roles-claims-001
    concept: keycloak-model
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the claim names where Keycloak puts user roles in the token by default."
    template: |
      realm roles  ->  {{realmClaim}}.roles
      client roles ->  {{clientClaim}}.<client>.roles
    blanks:
      realmClaim:
        accept: ["realm_access", "realm_access.roles", "realm_access "]
        accept_regex: '^\s*realm_access\s*$'
      clientClaim:
        accept: ["resource_access", "resource_access.<client>", "resource_access "]
        accept_regex: '^\s*resource_access\s*$'
    hints:
      - "One claim for realm-wide roles, one for per-client roles."
      - "Names start with realm_ and resource_ respectively."
    variants:
      - prompt: "Backend shop-backend checks order:refund. In which claim section does it look?"
        template: |
          {{rootClaim}}.shop-backend.{{leafKey}}
        blanks:
          rootClaim:
            accept: ["resource_access"]
            accept_regex: '^\s*resource_access\s*$'
          leafKey:
            accept: ["roles"]
            accept_regex: '^\s*roles\s*$'
      - prompt: "Resource server checks global role admin. Where are realm roles?"
        template: |
          {{rootClaim}}.{{leafKey}}
        blanks:
          rootClaim:
            accept: ["realm_access"]
            accept_regex: '^\s*realm_access\s*$'
          leafKey:
            accept: ["roles"]
            accept_regex: '^\s*roles\s*$'

  - id: kc-roles-own-section-001
    concept: keycloak-model
    type: predict-output
    difficulty: 3
    prompt: "Resource server shop-backend reads roles only from its token section. What does this code print?"
    snippet: |
      token = {
          "realm_access": {"roles": ["user"]},
          "resource_access": {
              "hr-portal": {"roles": ["employee:edit"]},
              "shop-backend": {"roles": ["order:read"]},
          },
      }

      my_client = "shop-backend"
      roles = token["resource_access"].get(my_client, {}).get("roles", [])
      print(roles)
    expected:
      kind: stdout
      value: "['order:read']"
    hints:
      - "Resource server must read resource_access.<its-client>, not another client's section."
      - "employee:edit in hr-portal must not appear for shop-backend."
    variants:
      - snippet: |
          token = {
              "realm_access": {"roles": ["user", "admin"]},
              "resource_access": {
                  "hr-portal": {"roles": ["employee:edit"]},
                  "shop-backend": {"roles": ["order:read", "order:refund"]},
              },
          }

          my_client = "hr-portal"
          roles = token["resource_access"].get(my_client, {}).get("roles", [])
          print(roles)
        expected:
          kind: stdout
          value: "['employee:edit']"
      - snippet: |
          token = {
              "realm_access": {"roles": ["user"]},
              "resource_access": {
                  "hr-portal": {"roles": ["employee:edit"]},
              },
          }

          my_client = "shop-backend"
          roles = token["resource_access"].get(my_client, {}).get("roles", [])
          print(roles)
        expected:
          kind: stdout
          value: "[]"

  - id: kc-realm-access-001
    concept: keycloak-model
    type: predict-output
    difficulty: 3
    prompt: "What does this check for global admin in realm_access print?"
    snippet: |
      token = {
          "realm_access": {"roles": ["user", "auditor"]},
          "resource_access": {"shop-backend": {"roles": ["admin"]}},
      }

      realm_roles = token["realm_access"]["roles"]
      print("admin" in realm_roles)
    expected:
      kind: stdout
      value: "False"
    hints:
      - "admin here is a client role inside shop-backend, not a realm role."
      - "realm_access holds only realm roles."

  - id: kc-confidential-secret-001
    concept: keycloak-model
    type: theory-quiz
    difficulty: 4
    prompt: "The team wants a mobile app as confidential client with embedded client_secret to prove authenticity. Why is that bad?"
    choices:
      - id: a
        text: "Secret in user-downloadable code is trivial to extract: mobile apps must be public and use PKCE."
      - id: b
        text: "Confidential clients are forbidden in Keycloak."
      - id: c
        text: "Mobile apps cannot send client_secret to the token endpoint."
      - id: d
        text: "Embedded secret breaks the discovery document."
    correct: [a]
    explanation: "Secret in a JS bundle or mobile binary is not secret. SPAs and mobile apps are public clients using PKCE."
    hints:
      - "Who physically holds the app code and what can they extract?"
      - "Confidential vs public boils down to whether a secret can really be hidden."
