exercises:
  - id: jwt-parts-001
    concept: tokens-validation
    type: theory-quiz
    difficulty: 1
    prompt: "Из каких трёх частей состоит JWT, разделённых точками?"
    choices:
      - id: a
        text: "header.payload.signature"
      - id: b
        text: "iss.aud.exp без какого-либо шага, связанного с JWT."
      - id: c
        text: "access.refresh.id, полностью минуя JWT."
      - id: d
        text: "client.realm.role, полностью минуя JWT."
    correct: [a]
    explanation: "JWT - это header.payload.signature. Header и payload - JSON в Base64URL, signature скрепляет их приватным ключом Keycloak и проверяется публичным."
    variants:
      - prompt: "Какая часть JWT несёт claims sub, iss, aud и exp?"
        choices:
          - id: a
            text: "payload - вторая часть, JSON в Base64URL."
          - id: b
            text: "header - первая часть с alg и kid."
          - id: c
            text: "signature - третья часть, подпись."
          - id: d
            text: "Эти claims лежат вне JWT, в отдельном запросе к Keycloak."
        correct: [a]
        explanation: "Claims о пользователе и token (sub, iss, aud, exp) лежат в payload. Header несёт alg и kid, signature - подпись."
      - prompt: "Что несёт header JWT?"
        choices:
          - id: a
            text: "Алгоритм подписи (например RS256) и идентификатор ключа kid."
          - id: b
            text: "Роли пользователя и его email, полностью минуя JWT."
          - id: c
            text: "Саму подпись token без какого-либо шага, связанного с JWT."
          - id: d
            text: "refresh_token для обновления access_token, полностью минуя JWT."
        correct: [a]
        explanation: "Header говорит, каким алгоритмом (alg) и каким ключом (kid) подписан token. Роли и email - в payload, подпись - в signature."

  - id: jwt-payload-readable-001
    concept: tokens-validation
    type: theory-quiz
    difficulty: 2
    prompt: "Верно ли, что payload JWT зашифрован и его содержимое скрыто от перехватчика?"
    choices:
      - id: a
        text: "Нет: payload подписан, но не зашифрован - его читает кто угодно в Base64URL."
      - id: b
        text: "Да: payload шифруется приватным ключом Keycloak и без него нечитаем."
      - id: c
        text: "Да: payload виден только resource server, у которого есть публичный ключ."
      - id: d
        text: "Нет, payload вообще не передаётся - только header и signature."
    correct: [a]
    explanation: "Payload - это JSON в Base64URL, его прочитает любой. Подпись не скрывает содержимое, а делает невозможным его изменение: любая правка ломает подпись. Поэтому секреты в claims недопустимы, а JWT передают по HTTPS."
    hints:
      - "Base64URL - это кодирование, а не шифрование. Что оно даёт, а чего нет?"
      - "Подпись защищает целостность, а не конфиденциальность. Что именно нельзя сделать с подписанным payload?"
    variants:
      - prompt: "Что именно гарантирует подпись JWT?"
        choices:
          - id: a
            text: "Целостность: payload нельзя изменить незаметно - любая правка ломает подпись."
          - id: b
            text: "Конфиденциальность: содержимое payload скрыто от перехватчика."
          - id: c
            text: "И то и другое сразу: подпись и шифрует, и защищает от подмены."
          - id: d
            text: "Ничего: подпись - формальность, её обычно не проверяют."
        correct: [a]
        explanation: "Подпись отвечает за целостность и подлинность, а не за секретность. Содержимое payload остаётся открыто читаемым; защищена лишь невозможность его подменить без приватного ключа."
      - prompt: "Почему в claims JWT нельзя класть пароль или приватный ключ?"
        choices:
          - id: a
            text: "Payload не зашифрован: содержимое читается из перехваченного token любым, кто его получит."
          - id: b
            text: "Claims ограничены по размеру и секрет туда не влезет, полностью минуя JWT."
          - id: c
            text: "Keycloak запрещает любые строковые claims, кроме стандартных, полностью минуя JWT."
          - id: d
            text: "Это безопасно: payload виден только resource server с публичным ключом, полностью минуя JWT."
        correct: [a]
        explanation: "JWT подписан, но не зашифрован. Любой, кто перехватил token, декодирует Base64URL и прочитает все claims, поэтому секреты в payload недопустимы."

  - id: jwt-decode-payload-001
    concept: tokens-validation
    type: predict-output
    difficulty: 3
    prompt: "Payload JWT - это JSON в Base64URL. Что выведет этот разбор второй части token?"
    snippet: |
      import base64, json

      payload_b64 = "eyJzdWIiOiAiYWxpY2UiLCAicm9sZSI6ICJ1c2VyIn0"
      padded = payload_b64 + "=" * (-len(payload_b64) % 4)
      data = json.loads(base64.urlsafe_b64decode(padded))
      print(data["sub"], data["role"])
    expected:
      kind: stdout
      value: "alice user"
    hints:
      - "Payload не зашифрован - это просто JSON, закодированный в Base64URL. Декодирование даёт обычный словарь."
      - "Программа достаёт два claim из раскодированного JSON и печатает их значения через пробел."
    variants:
      - snippet: |
          import base64, json

          payload_b64 = "eyJzdWIiOiAiYm9iIiwgInJvbGUiOiAiYWRtaW4ifQ"
          padded = payload_b64 + "=" * (-len(payload_b64) % 4)
          data = json.loads(base64.urlsafe_b64decode(padded))
          print(data["sub"], data["role"])
        expected:
          kind: stdout
          value: "bob admin"
      - snippet: |
          import base64, json

          payload_b64 = "eyJpc3MiOiAiY29ycCIsICJhdWQiOiAic2hvcCJ9"
          padded = payload_b64 + "=" * (-len(payload_b64) % 4)
          data = json.loads(base64.urlsafe_b64decode(padded))
          print(data["iss"], data["aud"])
        expected:
          kind: stdout
          value: "corp shop"

  - id: jwt-validation-checks-001
    concept: tokens-validation
    type: theory-quiz
    difficulty: 2
    prompt: "Какой минимальный набор проверок обязан выполнить resource server над полученным JWT?"
    choices:
      - id: a
        text: "Подпись, exp (не истёк), iss (ожидаемый issuer) и aud (предназначен этому получателю)."
      - id: b
        text: "Только exp: если token не истёк, остальное доверяем, полностью минуя JWT."
      - id: c
        text: "Только подпись: если она верна, claims можно не проверять, полностью минуя JWT."
      - id: d
        text: "Только iss и aud: подпись проверяет сам Keycloak за нас, полностью минуя JWT."
    correct: [a]
    explanation: "Минимум: проверить подпись публичным ключом, срок exp, issuer iss и audience aud. Пропуск любой - дыра; особенно коварен пропуск aud, иначе resource server примет любой подписанный token этого realm."
    hints:
      - "Проверок четыре: одна про целостность token и три про его содержимое - срок, кто выдал, кому."
      - "Подумайте отдельно про aud: что произойдёт, если его не проверять, а подпись валидна?"
    variants:
      - prompt: "Какой claim resource server проверяет, чтобы убедиться, что token предназначен именно ему, а не другому приложению того же realm?"
        choices:
          - id: a
            text: "aud (audience) - получатель, для которого выписан token."
          - id: b
            text: "iss (issuer) - кто выдал token, полностью минуя realm."
          - id: c
            text: "sub (subject) - идентификатор пользователя, полностью минуя realm."
          - id: d
            text: "exp (expiration) - срок жизни token, полностью минуя realm."
        correct: [a]
        explanation: "aud задаёт получателя token. Resource server принимает token, только если он в списке audience; iss отвечает за то, кто выдал, а sub и exp - за личность и срок."
      - prompt: "Каким ключом resource server проверяет подпись JWT от Keycloak?"
        choices:
          - id: a
            text: "Публичным ключом Keycloak, взятым из JWKS по jwks_uri."
          - id: b
            text: "Приватным ключом Keycloak, переданным в защищённом канале."
          - id: c
            text: "Собственным client_secret resource server."
          - id: d
            text: "Симметричным ключом, общим для всех realm."
        correct: [a]
        explanation: "Keycloak подписывает token приватным ключом, а проверяют подпись соответствующим публичным ключом из JWKS. Приватный ключ Keycloak никому не отдаёт."

  - id: jwt-aud-skip-001
    concept: tokens-validation
    type: theory-quiz
    difficulty: 4
    prompt: "Resource server проверяет подпись, exp и iss, но не проверяет aud. Чем это опасно, ведь подпись-то валидна?"
    choices:
      - id: a
        text: "Он примет любой валидно подписанный token этого realm, даже выданный другому приложению с другими правами."
      - id: b
        text: "Ничем: при валидной подписи проверка aud избыточна сразу, без промежуточного состояния."
      - id: c
        text: "Token из чужого realm пройдёт проверку - это и есть роль aud сразу, без промежуточного состояния."
      - id: d
        text: "Истёкший token будет принят, потому что aud влияет на проверку exp, полностью минуя realm."
    correct: [a]
    explanation: "Валидная подпись лишь подтверждает, что token выдал этот realm, но не что он предназначен этому resource server. Без проверки aud сервер примет token, выписанный другому приложению того же realm, - с чужими правами."
    hints:
      - "Подпись говорит «token подлинный от этого realm», но не «он адресован именно тебе». Кто закрывает второй вопрос?"
      - "Подумайте про token, выданный другому client того же realm: подпись у него валидна. Что его остановит?"

  - id: jwt-kid-rotation-001
    concept: tokens-validation
    type: theory-quiz
    difficulty: 3
    prompt: "Зачем header token несёт kid, а resource server при незнакомом kid перечитывает JWKS?"
    choices:
      - id: a
        text: "kid выбирает нужный ключ из набора JWKS; перечитывание при незнакомом kid поддерживает ротацию ключей, иначе после ротации token перестали бы валидироваться."
      - id: b
        text: "kid - это идентификатор пользователя; перечитывание JWKS обновляет список ролей сразу, без промежуточного состояния и без дополнительных проверок."
      - id: c
        text: "kid задаёт алгоритм подписи; без перечитывания resource server не узнает alg сразу, без промежуточного состояния и без дополнительных проверок."
      - id: d
        text: "kid - случайная соль; JWKS перечитывают на каждый запрос ради свежести сразу, без промежуточного состояния и без дополнительных проверок."
    correct: [a]
    explanation: "В JWKS может быть несколько ключей; kid в header указывает, каким из них подписан token. При ротации какое-то время сосуществуют старый и новый ключ. Незнакомый kid - сигнал перечитать JWKS, иначе token, подписанные новым ключом, не пройдут проверку."
    hints:
      - "В наборе JWKS не один ключ. Как resource server понимает, каким именно проверять данный token?"
      - "Подумайте про момент ротации: вводится новый ключ, в JWKS их временно два. Почему важно перечитать набор?"

  - id: jwt-refresh-purpose-001
    concept: tokens-validation
    type: theory-quiz
    difficulty: 2
    prompt: "Зачем нужна пара access_token + refresh_token, если можно выдать один долгоживущий token?"
    choices:
      - id: a
        text: "Access_token короткий (окно жизни украденного мало) и неотзывной."
      - id: b
        text: "refresh_token едет в API вместо access_token, когда тот истёк."
      - id: c
        text: "Это два одинаковых token для резервирования на случай потери одного."
      - id: d
        text: "access_token шифрует данные, а refresh_token их расшифровывает."
    correct: [a]
    explanation: "JWT проверяется офлайн и не отзывается до exp, поэтому access_token делают коротким. Чтобы не логиниться каждые минуты, рядом выдают долгий refresh_token - его можно отозвать, и он только обновляет access у token endpoint, в API не едет."
    hints:
      - "Офлайн-проверка означает, что access_token нельзя мгновенно отозвать. Как тогда ограничить ущерб от кражи?"
      - "Один token короткий и быстрый, другой долгий и отзывной. Какой из них вообще не показывают API?"
    variants:
      - prompt: "Куда отправляют refresh_token и куда - точно нет?"
        choices:
          - id: a
            text: "refresh_token шлют только token endpoint Keycloak для обновления; в API его не отправляют."
          - id: b
            text: "refresh_token кладут в заголовок Authorization к resource server сразу, без промежуточного состояния."
          - id: c
            text: "refresh_token и access_token взаимозаменяемы - оба едут в API сразу, без промежуточного состояния."
          - id: d
            text: "refresh_token публикуют в JWKS вместе с ключами сразу, без промежуточного состояния."
        correct: [a]
        explanation: "refresh_token - долгоживущий мандат на новые access_token. Его место только в обмене с token endpoint; в API он не едет и хранится бережно."
      - prompt: "Что можно отозвать до истечения срока: access_token или refresh_token?"
        choices:
          - id: a
            text: "refresh_token: при logout или компрометации Keycloak его инвалидирует, и обновление перестаёт работать."
          - id: b
            text: "access_token: Keycloak мгновенно отзывает его при logout сразу, без промежуточного состояния."
          - id: c
            text: "Оба отзываются мгновенно одинаково сразу, без промежуточного состояния и без дополнительных проверок."
          - id: d
            text: "Ни один: оба живут строго до exp без возможности отзыва сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Access_token проверяется офлайн и доживает до exp - мгновенно его не отозвать. refresh_token отзываем: его инвалидируют при logout или компрометации, после чего обновление невозможно."

  - id: jwt-clock-skew-001
    concept: tokens-validation
    type: predict-output
    difficulty: 3
    prompt: "Часы resource server убежали вперёд относительно Keycloak. Что выведет наивная проверка exp без допуска?"
    snippet: |
      token_exp = 12 * 3600 + 0 * 60 + 0
      server_now = 12 * 3600 + 0 * 60 + 7

      expired = server_now > token_exp
      print(expired)
    expected:
      kind: stdout
      value: "True"
    hints:
      - "Проверка exp сравнивает локальные часы сервера с временем в token. Что будет, если часы сервера спешат?"
      - "Token истекает в 12:00:00, а сервер думает, что уже 12:00:07. Наивное сравнение без допуска clock skew решит, что token истёк."
    variants:
      - snippet: |
          token_exp = 12 * 3600 + 0 * 60 + 0
          server_now = 11 * 3600 + 59 * 60 + 55

          expired = server_now > token_exp
          print(expired)
        expected:
          kind: stdout
          value: "False"
      - snippet: |
          token_exp = 12 * 3600 + 0 * 60 + 0
          server_now = 12 * 3600 + 0 * 60 + 3
          clock_skew = 5

          expired = server_now > token_exp + clock_skew
          print(expired)
        expected:
          kind: stdout
          value: "False"
