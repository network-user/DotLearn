exercises:
  - id: flows-pick-flow-001
    concept: auth-flows
    type: theory-quiz
    difficulty: 1
    prompt: "Какой вопрос определяет выбор между authorization code + PKCE и client credentials?"
    choices:
      - id: a
        text: "Есть ли за запросом человек: есть - authorization code с PKCE, нет - client credentials."
      - id: b
        text: "Какой язык программирования у client."
      - id: c
        text: "Использует ли resource server HTTPS."
      - id: d
        text: "Сколько scope запрашивает client."
    correct: [a]
    explanation: "Authorization code с PKCE - для входа человека через браузер. Client credentials - для машинного доступа без человека. Выбор сводится к одному вопросу: присутствует ли пользователь."
    variants:
      - prompt: "Фоновый сервис раз в минуту ходит в чужое API от своего имени, без пользователя. Какой поток ему подходит?"
        choices:
          - id: a
            text: "Client credentials: confidential client предъявляет секрет, без браузера и без человека."
          - id: b
            text: "Authorization code + PKCE: сервис пройдёт редиректы вместо человека."
          - id: c
            text: "Implicit flow: он быстрее всего для сервисов."
          - id: d
            text: "Любой поток с redirect_uri, указывающим на localhost сервиса."
        correct: [a]
        explanation: "За запросом нет человека, редиректить некого. Машинному доступу подходит client credentials, где confidential client получает token по секрету."
      - prompt: "Пользователь входит в браузерное SPA через Keycloak. Какой поток здесь современный дефолт?"
        choices:
          - id: a
            text: "Authorization code flow с PKCE и методом S256."
          - id: b
            text: "Client credentials: SPA предъявит свой client_secret."
          - id: c
            text: "Implicit flow - он создан специально для SPA."
          - id: d
            text: "Поток без token: SPA читает личность прямо из cookie Keycloak."
        correct: [a]
        explanation: "За входом стоит человек в браузере. Современный дефолт для SPA - authorization code с PKCE; implicit устарел, а client credentials не аутентифицирует человека."

  - id: flows-code-purpose-001
    concept: auth-flows
    type: theory-quiz
    difficulty: 2
    prompt: "Зачем authorization code flow сначала возвращает одноразовый code, а не сразу token?"
    choices:
      - id: a
        text: "Чтобы token не летел через адресную строку браузера: code меняют на token отдельным прямым запросом, минуя навигацию."
      - id: b
        text: "Чтобы пользователь успел подтвердить согласие дважды."
      - id: c
        text: "Чтобы resource server мог закэшировать token заранее."
      - id: d
        text: "Это требование HTTPS: token нельзя передавать по защищённому каналу."
    correct: [a]
    explanation: "Через браузер возвращается только одноразовый code, бесполезный сам по себе. На token его меняют прямым запросом к token endpoint, который не проходит через адресную строку, историю и логи прокси."
    hints:
      - "Вспомните, чем плох был implicit flow - где именно оказывался token и кто мог его там увидеть."
      - "Code виден в браузере, но без второго шага ничего не даёт; второй шаг идёт не через навигацию."
    variants:
      - prompt: "Почему перехваченный authorization code без второго шага бесполезен злоумышленнику?"
        choices:
          - id: a
            text: "Он одноразовый и сам по себе не token: обменять его на token можно только прямым запросом, недоступным злоумышленнику (а при PKCE - ещё и с verifier)."
          - id: b
            text: "Code зашифрован публичным ключом и не читается без приватного."
          - id: c
            text: "Code действует только в той же вкладке браузера, где был выдан."
          - id: d
            text: "Keycloak отзывает любой code сразу после редиректа, ещё до обмена."
        correct: [a]
        explanation: "Code - это лишь одноразовый промежуточный билет. Без второго шага (обмена на token endpoint) он ничего не даёт, а PKCE дополнительно требует verifier, которого у перехватчика нет."
      - prompt: "Где в authorization code flow появляется token, а где - нет?"
        choices:
          - id: a
            text: "Token приходит в ответе на прямой POST к token endpoint и не попадает в адресную строку браузера."
          - id: b
            text: "Token возвращается в редиректе через адресную строку, как и code."
          - id: c
            text: "Token кладётся в cookie браузера на шаге логина."
          - id: d
            text: "Token приходит в заголовке Referer при возврате на redirect_uri."
        correct: [a]
        explanation: "Через браузерную навигацию летит только code. Token client получает отдельным прямым запросом к token endpoint, поэтому он не оседает в истории, логах прокси и Referer."

  - id: flows-pkce-fields-001
    concept: auth-flows
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите, что client отправляет в /authorize и затем в /token при PKCE."
    template: |
      GET  /authorize ... &code_{{authParam}}=...&code_challenge_method=S256
      POST /token     ... &code_{{tokenParam}}=...
    blanks:
      authParam:
        accept: ["challenge"]
        accept_regex: '^\s*challenge\s*$'
      tokenParam:
        accept: ["verifier"]
        accept_regex: '^\s*verifier\s*$'
    hints:
      - "Сначала client шлёт производную (хэш), потом - исходную секретную строку. Что из них уходит первым в /authorize?"
      - "В /authorize едет challenge, в /token - verifier; Keycloak хэширует verifier и сверяет с сохранённым challenge."
    variants:
      - prompt: "Допишите, как из code_verifier получается code_challenge при методе S256."
        template: |
          code_challenge = BASE64URL({{hashFunc}}(code_verifier))
        blanks:
          hashFunc:
            accept: ["SHA256", "SHA-256", "sha256"]
            accept_regex: '^\s*SHA-?256\s*$'
      - prompt: "Допишите имя метода challenge, который нужно использовать вместо небезопасного plain."
        template: |
          code_challenge_method = {{method}}
        blanks:
          method:
            accept: ["S256", "s256"]
            accept_regex: '^\s*[Ss]256\s*$'

  - id: flows-pkce-why-001
    concept: auth-flows
    type: theory-quiz
    difficulty: 3
    prompt: "Злоумышленник перехватил authorization code. Почему при PKCE он не сможет обменять его на token?"
    choices:
      - id: a
        text: "У него нет code_verifier, а из перехваченного code_challenge его не восстановить - это односторонний SHA-256 хэш."
      - id: b
        text: "Code зашифрован публичным ключом resource server и не читается."
      - id: c
        text: "Keycloak отзывает любой code, как только он появился в логах прокси."
      - id: d
        text: "Перехваченный code привязан к IP-адресу и не сработает с другого адреса."
    correct: [a]
    explanation: "PKCE привязывает обмен к тому, кто запросил code. Keycloak хэширует присланный verifier и сверяет с сохранённым challenge. Без verifier обмен не пройдёт, а восстановить его из challenge нельзя - SHA-256 необратим."
    hints:
      - "Что именно client держит у себя и никогда не шлёт в /authorize? Без этого обмен не пройдёт."
      - "Challenge - это хэш verifier. Может ли злоумышленник из хэша вычислить исходную строку?"

  - id: flows-redirect-uri-001
    concept: auth-flows
    type: theory-quiz
    difficulty: 3
    prompt: "Запрос приходит с redirect_uri https://app.example/callback/ (с лишним слешем), а у client зарегистрировано https://app.example/callback. Что сделает Keycloak?"
    choices:
      - id: a
        text: "Откажет: redirect_uri должен совпадать с зарегистрированным точно, не «начинается с» и не «похож»."
      - id: b
        text: "Примет: завершающий слеш игнорируется при сравнении URL."
      - id: c
        text: "Примет, но запишет предупреждение в лог и продолжит."
      - id: d
        text: "Перенаправит на зарегистрированный URL, исправив слеш автоматически."
    correct: [a]
    explanation: "Keycloak меняет code на token только при точном совпадении redirect_uri с зарегистрированным значением. Это защита от open redirect: иначе злоумышленник подставил бы свой redirect_uri и увёл code. Лишний слеш - уже несовпадение."
    hints:
      - "Сравнение строгое, символ в символ. Подумайте, от какой атаки защищает именно строгость."
      - "Если бы допускалось «начинается с» или «похоже», куда мог бы увести code злоумышленник?"

  - id: flows-client-creds-id-001
    concept: auth-flows
    type: theory-quiz
    difficulty: 2
    prompt: "Что НЕ выдаётся в ответе на client credentials flow и почему?"
    choices:
      - id: a
        text: "id_token: за запросом нет человека, удостоверять личность нечего; token выписан на сам сервис."
      - id: b
        text: "access_token: машинному доступу он не нужен."
      - id: c
        text: "client_secret: он остаётся только у Keycloak."
      - id: d
        text: "scope: в client credentials scope не применяется."
    correct: [a]
    explanation: "Client credentials - машинный доступ без человека. Возвращается access_token, выписанный на service account самого client; id_token не выдаётся, потому что нет личности, которую нужно удостоверять."
    hints:
      - "id_token - это удостоверение личности. Чья личность за фоновым сервисом без человека?"
      - "В ответе приходит пропуск к API, но не документ о пользователе."
    variants:
      - prompt: "На кого выписан access_token, полученный в потоке client credentials?"
        choices:
          - id: a
            text: "На сам client (его service account): subject token указывает на сервис, а не на человека."
          - id: b
            text: "На администратора realm, от имени которого создан client."
          - id: c
            text: "На случайного пользователя realm, выбранного Keycloak."
          - id: d
            text: "Ни на кого: у такого token нет subject вовсе."
        correct: [a]
        explanation: "В client credentials человека нет, поэтому token представляет сам client через его service account. Subject (sub) указывает на сервис, и так resource server понимает, что это машинный доступ."
      - prompt: "Какой client может получить token потоком client credentials?"
        choices:
          - id: a
            text: "Только confidential: он предъявляет client_secret, который public client спрятать не может."
          - id: b
            text: "Только public: машинному доступу секрет не нужен."
          - id: c
            text: "Любой client независимо от типа."
          - id: d
            text: "Только client из realm master."
        correct: [a]
        explanation: "Client credentials требует предъявить секрет напрямую. Безопасно хранить его умеет лишь confidential client; public client секрета не имеет, поэтому этот поток ему недоступен."

  - id: flows-implicit-secret-challenge-001
    concept: auth-flows
    type: theory-quiz
    difficulty: 4
    prompt: "Какие два варианта точно ошибочны при настройке потоков? (выберите все верные)"
    choices:
      - id: a
        text: "Использовать implicit flow в новом SPA вместо authorization code + PKCE."
      - id: b
        text: "Слать client_secret из браузерного SPA, чтобы оно «доказало подлинность»."
      - id: c
        text: "Применять authorization code + PKCE с методом S256 для входа человека в SPA."
      - id: d
        text: "Использовать client credentials для фонового сервиса без пользователя."
    correct: [a, b]
    explanation: "Implicit flow устарел и отдаёт token прямо в редиректе - его не берут в новых проектах. Client_secret в браузере скомпрометирован, его место на backend. Варианты про PKCE для входа и client credentials для сервиса - корректные практики."
    hints:
      - "Один ошибочный вариант - про устаревший поток, отдающий token в адресную строку."
      - "Другой - про секрет в коде, который скачивает пользователь. Секрет там перестаёт быть секретом."
