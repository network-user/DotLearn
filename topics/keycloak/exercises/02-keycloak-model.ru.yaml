exercises:
  - id: kc-realm-isolation-001
    concept: keycloak-model
    type: theory-quiz
    difficulty: 1
    prompt: "Что изолирует realm в Keycloak?"
    choices:
      - id: a
        text: "Свои пользователи, clients, роли и ключи подписи; миры разных realm не пересекаются."
      - id: b
        text: "Только пользователей; clients и ключи общие для всех realm сразу, без промежуточного состояния."
      - id: c
        text: "Только ключи подписи; пользователи общие для всего Keycloak, полностью минуя realm."
      - id: d
        text: "Ничего: realm - это просто метка для группировки в админке сразу, без промежуточного состояния."
    correct: [a]
    explanation: "Realm - изолированное пространство со своими пользователями, clients, ролями и ключами. Пользователь одного realm не существует в другом, а token, подписанный ключом одного realm, не примут в другом."
    variants:
      - prompt: "Пользователь alice заведён в realm corp. Может ли она войти в client shop-spa, который живёт в realm customers?"
        choices:
          - id: a
            text: "Нет: её учётной записи в realm customers просто нет, граница realm непроницаема."
          - id: b
            text: "Да, если знает пароль: realm не ограничивает вход в чужие clients."
          - id: c
            text: "Да, потому что clients общие для всех realm одного Keycloak."
          - id: d
            text: "Да, но только после явного приглашения от администратора shop-spa."
        correct: [a]
        explanation: "Realm полностью изолирует свой мир. alice существует только в corp; в customers её нет, поэтому войти в client из customers она не может."
      - prompt: "Какой особый realm создаётся при установке Keycloak и предназначен для администрирования самого сервера?"
        choices:
          - id: a
            text: "Realm master - в нём не держат прикладных пользователей."
          - id: b
            text: "Realm admin - туда же кладут и обычных пользователей."
          - id: c
            text: "Realm root - он управляет ключами всех остальных realm."
          - id: d
            text: "Realm default - в нём по умолчанию живут все clients."
        correct: [a]
        explanation: "Realm master создаётся при установке и служит для администрирования Keycloak. Прикладных пользователей в нём не держат, чтобы случайно не дать им прав на управление сервером."

  - id: kc-client-type-001
    concept: keycloak-model
    type: theory-quiz
    difficulty: 1
    prompt: "Чем confidential client отличается от public client?"
    choices:
      - id: a
        text: "Confidential имеет серверную часть и может безопасно хранить client_secret; у public секрета нет вовсе."
      - id: b
        text: "Confidential работает только в браузере, а public - только на backend, полностью минуя client."
      - id: c
        text: "Confidential не требует регистрации в realm, а public требует, полностью минуя client."
      - id: d
        text: "Это синонимы: разница только в названии вкладки в админке сразу, без промежуточного состояния."
    correct: [a]
    explanation: "Confidential client (приложение с backend) умеет безопасно хранить client_secret. Public client (SPA, мобильное) выдаётся пользователю, спрятать секрет в нём нельзя, поэтому секрета у него нет."
    variants:
      - prompt: "К какому типу client относится SPA, чей JavaScript-код скачивается в браузер пользователя?"
        choices:
          - id: a
            text: "Public client без секрета: спрятать секрет в скачиваемом коде невозможно."
          - id: b
            text: "Confidential client с зашитым в бандл client_secret."
          - id: c
            text: "Confidential client, потому что общается с backend по HTTPS."
          - id: d
            text: "Это не client вовсе - SPA не регистрируют в Keycloak."
        correct: [a]
        explanation: "Код SPA доступен пользователю, поэтому секрет в нём не спрятать. SPA - public client, который полагается на PKCE, а не на секрет."
      - prompt: "Какой тип client может использовать поток client credentials для машинного доступа?"
        choices:
          - id: a
            text: "Confidential client: он доказывает себя секретом."
          - id: b
            text: "Public client: ему секрет не нужен."
          - id: c
            text: "Любой client независимо от типа."
          - id: d
            text: "Только realm master, остальным client credentials недоступен."
        correct: [a]
        explanation: "Client credentials требует предъявить client_secret, а хранить его безопасно может только confidential client. Public client секрет предъявить не может."

  - id: kc-roles-types-001
    concept: keycloak-model
    type: theory-quiz
    difficulty: 2
    prompt: "Чем realm role отличается от client role?"
    choices:
      - id: a
        text: "Realm role общая для всего realm; client role определена внутри конкретного client и значима только для него."
      - id: b
        text: "Realm role значима только для одного client; client role - для всего realm сразу, без промежуточного состояния."
      - id: c
        text: "Realm role назначается группам, а client role - только отдельным пользователям сразу, без промежуточного состояния."
      - id: d
        text: "Разницы нет: обе попадают в один и тот же claim token сразу, без промежуточного состояния."
    correct: [a]
    explanation: "Realm role - право на уровне всего realm, общее для всех clients. Client role определена внутри конкретного client и осмысленна только для него. Выбор - вопрос области видимости права."
    hints:
      - "Подумайте об области видимости права: оно осмысленно во всём realm или только в одном приложении?"
      - "Глобальное право вроде admin против локального вроде order:refund - они живут на разных уровнях."
    variants:
      - prompt: "Право order:refund осмысленно только внутри приложения shop-backend. Каким типом роли его правильно сделать?"
        choices:
          - id: a
            text: "Client role внутри client shop-backend - она значима только для него."
          - id: b
            text: "Realm role - так право будет доступнее всем clients."
          - id: c
            text: "Группой: order:refund - это группа, а не роль."
          - id: d
            text: "Scope - права на уровне приложения задают через scope, а не роли."
        correct: [a]
        explanation: "Право, осмысленное только в одном приложении, делают client role этого client. Realm role раздула бы глобальное пространство имён правом, которое нигде больше не значит ничего."
      - prompt: "Право admin должно действовать во всём realm, для всех приложений. Какой это тип роли?"
        choices:
          - id: a
            text: "Realm role - она общая для всего realm и видна всем clients."
          - id: b
            text: "Client role в каждом client по отдельности."
          - id: c
            text: "Composite role - admin обязан быть составной."
          - id: d
            text: "Scope openid - глобальные права задают через него."
        correct: [a]
        explanation: "Глобальное право уровня всего realm - это realm role. Дублировать admin как client role в каждом client пришлось бы вручную и рассыпалось бы при добавлении нового приложения."

  - id: kc-roles-claims-001
    concept: keycloak-model
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите имена claims, куда Keycloak по умолчанию кладёт роли пользователя в token."
    template: |
      realm roles  ->  {{realmClaim}}.roles
      client roles ->  {{clientClaim}}.<client>.roles
    blanks:
      realmClaim:
        accept: ["realm_access", "realm_access.roles", "realm_access "]
        accept_regex: '^\s*realm_access\s*$'
      clientClaim:
        accept: ["resource_access", "resource_access.<client>", "resource_access "]
        accept_regex: '^\s*resource_access\s*$'
    hints:
      - "Один claim про общие для realm роли, другой - про роли в разрезе конкретных clients."
      - "Имена начинаются с realm_ и resource_ соответственно; внутри второго роли разложены по clients."
    variants:
      - prompt: "Backend shop-backend проверяет роль order:refund. В каком claim своей секции он её ищет?"
        template: |
          {{rootClaim}}.shop-backend.{{leafKey}}
        blanks:
          rootClaim:
            accept: ["resource_access"]
            accept_regex: '^\s*resource_access\s*$'
          leafKey:
            accept: ["roles"]
            accept_regex: '^\s*roles\s*$'
      - prompt: "Resource server проверяет глобальную роль admin. В каком claim лежат realm roles?"
        template: |
          {{rootClaim}}.{{leafKey}}
        blanks:
          rootClaim:
            accept: ["realm_access"]
            accept_regex: '^\s*realm_access\s*$'
          leafKey:
            accept: ["roles"]
            accept_regex: '^\s*roles\s*$'

  - id: kc-roles-own-section-001
    concept: keycloak-model
    type: predict-output
    difficulty: 3
    prompt: "Resource server shop-backend читает роли только из своей секции token. Что выведет этот разбор?"
    snippet: |
      token = {
          "realm_access": {"roles": ["user"]},
          "resource_access": {
              "hr-portal": {"roles": ["employee:edit"]},
              "shop-backend": {"roles": ["order:read"]},
          },
      }

      my_client = "shop-backend"
      roles = token["resource_access"].get(my_client, {}).get("roles", [])
      print(roles)
    expected:
      kind: stdout
      value: "['order:read']"
    hints:
      - "Resource server обязан смотреть в свою секцию resource_access.<свой-client>, а не в чужую. Какой client здесь свой?"
      - "Чужая роль employee:edit лежит в секции hr-portal и для shop-backend не должна быть видна. Берётся только секция shop-backend."
    variants:
      - snippet: |
          token = {
              "realm_access": {"roles": ["user", "admin"]},
              "resource_access": {
                  "hr-portal": {"roles": ["employee:edit"]},
                  "shop-backend": {"roles": ["order:read", "order:refund"]},
              },
          }

          my_client = "hr-portal"
          roles = token["resource_access"].get(my_client, {}).get("roles", [])
          print(roles)
        expected:
          kind: stdout
          value: "['employee:edit']"
      - snippet: |
          token = {
              "realm_access": {"roles": ["user"]},
              "resource_access": {
                  "hr-portal": {"roles": ["employee:edit"]},
              },
          }

          my_client = "shop-backend"
          roles = token["resource_access"].get(my_client, {}).get("roles", [])
          print(roles)
        expected:
          kind: stdout
          value: "[]"

  - id: kc-realm-access-001
    concept: keycloak-model
    type: predict-output
    difficulty: 3
    prompt: "Что выведет проверка наличия глобальной роли admin в realm_access?"
    snippet: |
      token = {
          "realm_access": {"roles": ["user", "auditor"]},
          "resource_access": {"shop-backend": {"roles": ["admin"]}},
      }

      realm_roles = token["realm_access"]["roles"]
      print("admin" in realm_roles)
    expected:
      kind: stdout
      value: "False"
    hints:
      - "Роль admin здесь лежит как client role внутри shop-backend, а не как realm role. Где именно ищет код?"
      - "realm_access несёт только realm roles; admin в resource_access - это другая роль с тем же именем в другой области."

  - id: kc-confidential-secret-001
    concept: keycloak-model
    type: theory-quiz
    difficulty: 4
    prompt: "Команда хочет сделать мобильное приложение confidential client с client_secret, зашитым в бинарник, чтобы оно могло доказать свою подлинность. Почему это плохо?"
    choices:
      - id: a
        text: "Секрет в скачиваемом пользователем коде извлекается тривиально - это уже не секрет."
      - id: b
        text: "Confidential clients вообще запрещены в Keycloak для любых приложений."
      - id: c
        text: "Мобильные приложения не умеют отправлять client_secret в запросах к token endpoint."
      - id: d
        text: "Зашитый секрет ломает discovery-документ, и client не найдёт token_endpoint."
    correct: [a]
    explanation: "Секрет в JS-бандле или мобильном бинарнике извлекается тривиально, поэтому confidential-модель с зашитым секретом не даёт защиты. SPA и мобильные приложения - public clients, доказывающие себя через PKCE, а не секретом."
    hints:
      - "Подумайте, кто физически держит код приложения и что он может из него достать."
      - "Различие confidential/public упирается в один вопрос: можно ли в этом приложении реально спрятать секрет."
