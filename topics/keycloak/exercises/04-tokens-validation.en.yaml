exercises:
  - id: jwt-parts-001
    concept: tokens-validation
    type: theory-quiz
    difficulty: 1
    prompt: "What three dot-separated parts make up a JWT?"
    choices:
      - id: a
        text: "header.payload.signature"
      - id: b
        text: "iss.aud.exp, completely skipping JWT."
      - id: c
        text: "access.refresh.id, completely skipping JWT."
      - id: d
        text: "client.realm.role, completely skipping JWT."
    correct: [a]
    explanation: "JWT is header.payload.signature. Header and payload are Base64URL JSON; signature binds them with Keycloak's private key."
    variants:
      - prompt: "Which JWT part carries claims sub, iss, aud, and exp?"
        choices:
          - id: a
            text: "payload: second part, Base64URL JSON."
          - id: b
            text: "header: first part with alg and kid."
          - id: c
            text: "signature: third part."
          - id: d
            text: "These claims are outside JWT in a separate Keycloak request."
        correct: [a]
        explanation: "User and token claims live in payload. Header has alg and kid; signature is the signature."
      - prompt: "What does the JWT header carry?"
        choices:
          - id: a
            text: "Signing algorithm (e.g. RS256) and key id kid."
          - id: b
            text: "User roles and email, completely skipping JWT."
          - id: c
            text: "The token signature itself, completely skipping JWT."
          - id: d
            text: "refresh_token to renew access_token, completely skipping JWT."
        correct: [a]
        explanation: "Header states alg and kid. Roles and email are in payload; signature is separate."

  - id: jwt-payload-readable-001
    concept: tokens-validation
    type: theory-quiz
    difficulty: 2
    prompt: "Is JWT payload encrypted so an interceptor cannot read it?"
    choices:
      - id: a
        text: "No: payload is signed, not encrypted; anyone can read Base64URL; protection is against tampering, not hiding."
      - id: b
        text: "Yes: encrypted with Keycloak private key immediately, without an intermediate state and without extra checks."
      - id: c
        text: "Yes: only resource server with public key can read before any other checks run on this path."
      - id: d
        text: "No payload is sent: only header and signature immediately, without an intermediate state and without extra checks."
    correct: [a]
    explanation: "Payload is Base64URL JSON readable by anyone. Signature prevents change, not secrecy. No secrets in claims; use HTTPS."
    hints:
      - "Base64URL is encoding, not encryption."
      - "Signature protects integrity, not confidentiality."
    variants:
      - prompt: "What does JWT signature guarantee?"
        choices:
          - id: a
            text: "Integrity: payload cannot be changed without breaking signature."
          - id: b
            text: "Confidentiality: payload hidden from interceptors, completely skipping JWT."
          - id: c
            text: "Both encryption and tamper protection, completely skipping JWT."
          - id: d
            text: "Nothing: signature is usually ignored, completely skipping JWT."
        correct: [a]
        explanation: "Signature is integrity and authenticity, not secrecy. Payload stays readable."
      - prompt: "Why must passwords not go in JWT claims?"
        choices:
          - id: a
            text: "Payload is not encrypted: anyone with the token reads all claims."
          - id: b
            text: "Claims are size-limited and secrets will not fit."
          - id: c
            text: "Keycloak forbids all string claims except standard ones."
          - id: d
            text: "Safe: only resource server with public key sees payload."
        correct: [a]
        explanation: "JWT is signed, not encrypted. Intercepted token → all claims readable."

  - id: jwt-decode-payload-001
    concept: tokens-validation
    type: predict-output
    difficulty: 3
    prompt: "JWT payload is Base64URL JSON. What does this decode print?"
    snippet: |
      import base64, json

      payload_b64 = "eyJzdWIiOiAiYWxpY2UiLCAicm9sZSI6ICJ1c2VyIn0"
      padded = payload_b64 + "=" * (-len(payload_b64) % 4)
      data = json.loads(base64.urlsafe_b64decode(padded))
      print(data["sub"], data["role"])
    expected:
      kind: stdout
      value: "alice user"
    hints:
      - "Payload is not encrypted: decode gives a normal dict."
      - "Print sub and role values separated by space."
    variants:
      - snippet: |
          import base64, json

          payload_b64 = "eyJzdWIiOiAiYm9iIiwgInJvbGUiOiAiYWRtaW4ifQ"
          padded = payload_b64 + "=" * (-len(payload_b64) % 4)
          data = json.loads(base64.urlsafe_b64decode(padded))
          print(data["sub"], data["role"])
        expected:
          kind: stdout
          value: "bob admin"
      - snippet: |
          import base64, json

          payload_b64 = "eyJpc3MiOiAiY29ycCIsICJhdWQiOiAic2hvcCJ9"
          padded = payload_b64 + "=" * (-len(payload_b64) % 4)
          data = json.loads(base64.urlsafe_b64decode(padded))
          print(data["iss"], data["aud"])
        expected:
          kind: stdout
          value: "corp shop"

  - id: jwt-validation-checks-001
    concept: tokens-validation
    type: theory-quiz
    difficulty: 2
    prompt: "What minimum checks must the resource server perform on a JWT?"
    choices:
      - id: a
        text: "Signature, exp, iss, and aud."
      - id: b
        text: "Only exp: if not expired, trust the rest."
      - id: c
        text: "Only signature: claims need not be checked."
      - id: d
        text: "Only iss and aud: Keycloak verifies signature for us."
    correct: [a]
    explanation: "Verify signature with public key, expiry, issuer, and audience. Skipping any is a hole; aud especially."
    hints:
      - "Four checks: one integrity, three about content, namely time, issuer, audience."
      - "What happens if aud is skipped but signature is valid?"
    variants:
      - prompt: "Which claim ensures the token is for this resource server, not another app in the realm?"
        choices:
          - id: a
            text: "aud (audience)."
          - id: b
            text: "iss (issuer)."
          - id: c
            text: "sub (subject)."
          - id: d
            text: "exp (expiration)."
        correct: [a]
        explanation: "aud names the intended recipient. iss is who issued; sub and exp are identity and lifetime."
      - prompt: "Which key verifies a JWT signature from Keycloak?"
        choices:
          - id: a
            text: "Keycloak public key from JWKS at jwks_uri."
          - id: b
            text: "Keycloak private key over a secure channel."
          - id: c
            text: "Resource server's own client_secret."
          - id: d
            text: "Symmetric key shared by all realms."
        correct: [a]
        explanation: "Signed with private key, verified with public key from JWKS. Private key is never shared."

  - id: jwt-aud-skip-001
    concept: tokens-validation
    type: theory-quiz
    difficulty: 4
    prompt: "Resource server checks signature, exp, and iss but not aud. Why is that dangerous if signature is valid?"
    choices:
      - id: a
        text: "It accepts any valid token of this realm, even one issued to another app with different rights."
      - id: b
        text: "Nothing: valid signature makes aud redundant without any step that involves realm."
      - id: c
        text: "Tokens from other realms pass: that is aud's job before any other checks run on this path."
      - id: d
        text: "Expired tokens are accepted because aud affects exp, completely skipping realm."
    correct: [a]
    explanation: "Signature proves this realm issued the token, not that it is addressed to you. Without aud you accept another app's token."
    hints:
      - "Signature says authentic from realm; aud says addressed to you."
      - "Another client's token in the same realm has valid signature, so what stops it?"

  - id: jwt-kid-rotation-001
    concept: tokens-validation
    type: theory-quiz
    difficulty: 3
    prompt: "Why does the header carry kid and why re-read JWKS on unknown kid?"
    choices:
      - id: a
        text: "kid picks the key from JWKS; re-read supports rotation when a new key appears."
      - id: b
        text: "kid is the user id; JWKS re-read updates roles."
      - id: c
        text: "kid sets signing algorithm; JWKS is needed to learn alg."
      - id: d
        text: "kid is random salt; JWKS is re-read every request for freshness."
    correct: [a]
    explanation: "JWKS may hold several keys; kid selects which signed this token. After rotation, unknown kid means fetch updated JWKS."
    hints:
      - "JWKS has more than one key, so how do you pick?"
      - "During rotation old and new keys coexist, so why re-fetch?"

  - id: jwt-refresh-purpose-001
    concept: tokens-validation
    type: theory-quiz
    difficulty: 2
    prompt: "Why access_token + refresh_token instead of one long-lived token?"
    choices:
      - id: a
        text: "Short non-revocable access_token limits stolen-token window."
      - id: b
        text: "refresh_token goes to the API when access_token expires."
      - id: c
        text: "Two identical tokens for redundancy."
      - id: d
        text: "access_token encrypts; refresh_token decrypts."
    correct: [a]
    explanation: "Offline JWT cannot be revoked until exp → short access. refresh renews without constant login and can be revoked."
    hints:
      - "Offline verification means access cannot be instantly revoked: how limit theft damage?"
      - "One token is short, one long and revocable: which never goes to API?"
    variants:
      - prompt: "Where does refresh_token go and where must it NOT go?"
        choices:
          - id: a
            text: "Only Keycloak token endpoint for renewal: not to API."
          - id: b
            text: "Authorization header to resource server."
          - id: c
            text: "Interchangeable with access_token in API calls."
          - id: d
            text: "Published in JWKS with keys."
        correct: [a]
        explanation: "refresh is a long mandate for new access tokens: token endpoint only."
      - prompt: "Which can be revoked before expiry: access_token or refresh_token?"
        choices:
          - id: a
            text: "refresh_token: invalidated on logout/compromise; last access_token lives until exp."
          - id: b
            text: "access_token: instantly revoked on logout before any other checks run on this path."
          - id: c
            text: "Both revoked instantly the same way, produced in full without further selection."
          - id: d
            text: "Neither: both live strictly until exp before any other checks run on this path."
        correct: [a]
        explanation: "access is offline-valid until exp. refresh can be revoked and stops renewal."

  - id: jwt-clock-skew-001
    concept: tokens-validation
    type: predict-output
    difficulty: 3
    prompt: "Resource server clock is ahead of Keycloak. What does naive exp check without skew print?"
    snippet: |
      token_exp = 12 * 3600 + 0 * 60 + 0
      server_now = 12 * 3600 + 0 * 60 + 7

      expired = server_now > token_exp
      print(expired)
    expected:
      kind: stdout
      value: "True"
    hints:
      - "exp compares server clock to token time. What if server is fast?"
      - "Token expires 12:00:00; server thinks 12:00:07: naive compare says expired."
    variants:
      - snippet: |
          token_exp = 12 * 3600 + 0 * 60 + 0
          server_now = 11 * 3600 + 59 * 60 + 55

          expired = server_now > token_exp
          print(expired)
        expected:
          kind: stdout
          value: "False"
      - snippet: |
          token_exp = 12 * 3600 + 0 * 60 + 0
          server_now = 12 * 3600 + 0 * 60 + 3
          clock_skew = 5

          expired = server_now > token_exp + clock_skew
          print(expired)
        expected:
          kind: stdout
          value: "False"
