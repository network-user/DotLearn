exercises:
  - id: kc-py-jwks-discovery-001
    concept: python-integration
    type: theory-quiz
    difficulty: 1
    prompt: "Откуда Python-сервис берёт публичные ключи, чтобы проверить подпись токена Keycloak?"
    choices:
      - id: a
        text: "Из набора JWKS по адресу jwks_uri, который берут из discovery-документа .well-known/openid-configuration."
      - id: b
        text: "Из client_secret сервиса, сохранённого в переменных окружения сразу, без промежуточного состояния."
      - id: c
        text: "Ключ приходит внутри самого токена, в его payload ещё до любых других проверок на этом пути."
      - id: d
        text: "Сервис генерирует публичный ключ сам из значения kid сразу, без промежуточного состояния."
    correct: [a]
    explanation: "Публичные ключи realm лежат в наборе JWKS. Его адрес jwks_uri берут из discovery-документа .well-known/openid-configuration, а не зашивают в код. client_secret нужен для других задач, а в payload токена ключа нет."
    variants:
      - prompt: "Что лежит в discovery-документе .well-known/openid-configuration realm Keycloak?"
        choices:
          - id: a
            text: "Метаданные realm: issuer, jwks_uri, адреса token и introspection endpoint."
          - id: b
            text: "Список активных пользователей realm сразу, без промежуточного состояния."
          - id: c
            text: "Приватные ключи realm для подписи токенов сразу, без промежуточного состояния."
          - id: d
            text: "Готовый access_token для вашего сервиса, полностью минуя realm."
        correct: [a]
        explanation: "Discovery-документ отдаёт метаданные realm: issuer, jwks_uri и адреса endpoint. Приватные ключи Keycloak не публикует никогда, только публичные в JWKS."
      - prompt: "Зачем читать jwks_uri из discovery, а не зашивать адрес ключей в код?"
        choices:
          - id: a
            text: "Адрес и набор ключей могут меняться при ротации или переносе realm."
          - id: b
            text: "Discovery работает быстрее, чем прямой запрос JWKS."
          - id: c
            text: "Без discovery токен вообще нельзя раскодировать."
          - id: d
            text: "jwks_uri секретен и отдаётся только через discovery."
        correct: [a]
        explanation: "Discovery это единый источник актуальных адресов. Зашитый вручную jwks_uri ломается при переносе realm или смене путей; jwks_uri не секрет, публичные ключи открыты."

  - id: kc-py-client-credentials-001
    concept: python-integration
    type: theory-quiz
    difficulty: 2
    prompt: "Сервис отчётов ночью по расписанию зовёт биллинг без участия пользователя. Как ему получить токен для этого вызова?"
    choices:
      - id: a
        text: "Grant client_credentials: сервис аутентифицируется своими client_id и client_secret и получает access token с sub сервисной учётки."
      - id: b
        text: "Использовать refresh_token пользователя, который заходил последним ещё до любых других проверок на этом пути."
      - id: c
        text: "Скопировать любой действующий пользовательский access_token сразу, без промежуточного состояния и без дополнительных проверок."
      - id: d
        text: "Вызвать биллинг вообще без токена, раз это внутренний вызов сразу, без промежуточного состояния и без дополнительных проверок."
    correct: [a]
    explanation: "Для вызовов сервис-сервис без пользователя существует grant client_credentials. Сервис предъявляет client_id и client_secret и получает access token своей сервисной учётки. Чужие пользовательские токены и вызовы без токена так не заменить."
    variants:
      - prompt: "Что получает сервис по grant client_credentials и чего у этого токена нет?"
        choices:
          - id: a
            text: "Access token сервисной учётки; refresh_token не выдаётся, при истечении просто запрашивают новый."
          - id: b
            text: "И access, и refresh, как при пользовательском входе сразу, без промежуточного состояния."
          - id: c
            text: "Только id_token без access_token не входит в сравнение и не влияет на результат."
          - id: d
            text: "Пару логин и пароль для доступа к биллингу ещё до любых других проверок на этом пути."
        correct: [a]
        explanation: "client_credentials даёт access token без refresh_token: у машинного клиента нет интерактивной сессии, при истечении он просто запрашивает новый токен тем же способом."
      - prompt: "Как принимающий сервис проверяет токен, полученный по client_credentials?"
        choices:
          - id: a
            text: "Так же, как пользовательский: PyJWKClient плюс jwt.decode с проверкой подписи, iss, aud и exp."
          - id: b
            text: "Никак: внутренним сервисным токенам доверяют без проверки, полностью минуя jwt."
          - id: c
            text: "Только по совпадению client_id, без проверки подписи сразу, без промежуточного состояния."
          - id: d
            text: "Отправляет токен обратно в вызывающий сервис для подтверждения, полностью минуя jwt."
        correct: [a]
        explanation: "Сервисный токен это обычный подписанный JWT. Принимающая сторона проверяет его тем же кодом: выбирает ключ по kid и вызывает jwt.decode с обязательными проверками. Доверять без проверки нельзя."

  - id: kc-py-algorithms-pin-001
    concept: python-integration
    type: theory-quiz
    difficulty: 2
    prompt: "Почему в jwt.decode обязательно задавать algorithms=['RS256'] явно, а не доверять полю alg из самого токена?"
    choices:
      - id: a
        text: "Иначе нападающий поставит alg:none или подменит RS256 на HS256, подписав токен публичным ключом как секретом."
      - id: b
        text: "PyJWT работает медленнее без явного списка алгоритмов сразу, без промежуточного состояния."
      - id: c
        text: "Поле alg не входит в JWT, брать его неоткуда сразу, без промежуточного состояния и без дополнительных проверок."
      - id: d
        text: "Это нужно только для симметричных ключей, для RS256 необязательно сразу, без промежуточного состояния."
    correct: [a]
    explanation: "Доверие полю alg из токена открывает две классические атаки: alg:none (токен без подписи) и подмену RS256 на HS256 (публичный ключ используется как HMAC-секрет). Явный список алгоритмов в decode закрывает обе, поэтому PyJWT и требует его обязательно."
    variants:
      - prompt: "В чём суть атаки alg:none на проверку JWT?"
        choices:
          - id: a
            text: "Токен объявляет алгоритм 'none' (без подписи); сервис, доверяющий alg из токена, примет вообще неподписанный токен."
          - id: b
            text: "Payload шифруется так, что сервис не может его прочитать без какого-либо шага, связанного с JWT."
          - id: c
            text: "Keycloak вынужден выдать новый ключ подписи сразу, без промежуточного состояния и без дополнительных проверок."
          - id: d
            text: "Из токена удаляется claim exp, и он перестаёт истекать ещё до любых других проверок на этом пути."
        correct: [a]
        explanation: "alg:none означает «подписи нет». Если код доверяет полю alg, он пропустит проверку подписи и примет подделанный токен. Явный algorithms=['RS256'] отвергает такой токен."
      - prompt: "В чём суть подмены RS256 на HS256 при доверии полю alg?"
        choices:
          - id: a
            text: "Нападающий объявляет HS256 и подписывает токен публичным ключом RSA как HMAC-секретом."
          - id: b
            text: "HS256 быстрее, поэтому Keycloak сам переключается на него сразу, без промежуточного состояния."
          - id: c
            text: "RS256 и HS256 несовместимы, и токен просто не раскодируется сразу, без промежуточного состояния."
          - id: d
            text: "Подмена меняет issuer токена, а не алгоритм подписи сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Публичный ключ RSA известен всем. Если сервис доверяет alg и видит HS256, он берёт публичный ключ как HMAC-секрет и проверяет им, а нападающий этим же публичным ключом подпись и поставил. Явный список RS256 не даёт свести проверку к HS256."

  - id: kc-py-decode-blanks-001
    concept: python-integration
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски: три аргумента jwt.decode, которые закрывают проверки алгоритма подписи, получателя и издателя."
    template: |
      claims = jwt.decode(
          token,
          signing_key.key,
          {{p_alg}}=["RS256"],
          {{p_aud}}="reports-api",
          {{p_iss}}=issuer,
      )
    blanks:
      p_alg:
        accept: ["algorithms"]
      p_aud:
        accept: ["audience"]
      p_iss:
        accept: ["issuer"]
    hints:
      - "Один аргумент фиксирует список допустимых алгоритмов, второй задаёт ожидаемого получателя aud, третий сверяет издателя iss."
    variants:
      - prompt: "Заполните пропуски для другого сервиса: те же три обязательных аргумента jwt.decode."
        template: |
          claims = jwt.decode(
              token,
              signing_key.key,
              {{p_alg}}=["RS256"],
              {{p_aud}}="billing-api",
              {{p_iss}}=issuer,
          )
        blanks:
          p_alg:
            accept: ["algorithms"]
          p_aud:
            accept: ["audience"]
          p_iss:
            accept: ["issuer"]
      - prompt: "Заполните пропуски: те же аргументы плюс допуск на разъехавшиеся часы."
        template: |
          claims = jwt.decode(
              token,
              signing_key.key,
              {{p_alg}}=["RS256"],
              audience="orders-api",
              issuer=issuer,
              {{p_leeway}}=10,
          )
        blanks:
          p_alg:
            accept: ["algorithms"]
          p_leeway:
            accept: ["leeway"]

  - id: kc-py-roles-predict-001
    concept: python-integration
    type: predict-output
    difficulty: 2
    prompt: "Роли Keycloak лежат в realm_access и resource_access. Что выведет этот разбор claims?"
    snippet: |
      claims = {
          "sub": "u-42",
          "realm_access": {"roles": ["default-roles-corp", "manager"]},
          "resource_access": {"reports-api": {"roles": ["report.read"]}},
      }

      realm_roles = claims.get("realm_access", {}).get("roles", [])
      client_roles = claims.get("resource_access", {}).get("reports-api", {}).get("roles", [])
      print("manager" in realm_roles, "report.read" in client_roles)
    expected:
      kind: stdout
      value: "True True"
    hints:
      - "realm_access.roles это realm-роли, resource_access.<client>.roles это роли конкретного клиента. Проверьте, есть ли искомая роль в каждом списке."
    variants:
      - snippet: |
          claims = {
              "sub": "u-7",
              "realm_access": {"roles": ["user"]},
              "resource_access": {"account": {"roles": ["view-profile"]}},
          }

          realm_roles = claims.get("realm_access", {}).get("roles", [])
          client_roles = claims.get("resource_access", {}).get("reports-api", {}).get("roles", [])
          print("admin" in realm_roles, client_roles)
        expected:
          kind: stdout
          value: "False []"
      - snippet: |
          claims = {
              "realm_access": {"roles": ["user", "manager", "auditor"]},
          }

          roles = claims.get("realm_access", {}).get("roles", [])
          print(len(roles), "manager" in roles)
        expected:
          kind: stdout
          value: "3 True"

  - id: kc-py-aud-default-001
    concept: python-integration
    type: theory-quiz
    difficulty: 3
    prompt: "jwt.decode с audience='reports-api' бросает InvalidAudienceError на свежем токене вашего Keycloak. Почему так и как чинить правильно?"
    choices:
      - id: a
        text: "Keycloak по умолчанию кладёт в aud значение 'account', а не идентификатор вашего API."
      - id: b
        text: "Токен повреждён при передаче, его нужно перевыпустить, полностью минуя jwt."
      - id: c
        text: "Проверку aud надо всегда отключать через options={'verify_aud': False}."
      - id: d
        text: "PyJWT не умеет проверять aud, нужен другой пакет сразу, без промежуточного состояния."
    correct: [a]
    explanation: "По умолчанию access token Keycloak несёт aud='account', встроенный клиент realm. Вашего сервиса в aud нет, поэтому audience='reports-api' не совпадает. Правильно настроить realm так, чтобы он клал идентификатор вашего API в aud (audience-маппер или scope). Отключение verify_aud убирает проверку, которая защищает вас от чужих токенов realm."
    hints:
      - "Посмотрите, что реально лежит в aud токена по умолчанию: совпадает ли оно с идентификатором вашего сервиса?"
      - "Есть два пути «починки»: убрать проверку aud или заставить realm класть правильный aud. Один открывает дыру, другой закрывает её."

  - id: kc-py-dependency-blanks-001
    concept: python-integration
    type: fill-in-blanks
    difficulty: 3
    prompt: "Заполните пропуски в зависимости FastAPI: получить токен, проверить его и вернуть 401 при любой ошибке проверки."
    template: |
      oauth2_scheme = OAuth2PasswordBearer(tokenUrl=TOKEN_URL)

      def get_current_user(token: str = {{dep}}(oauth2_scheme)) -> dict:
          try:
              key = jwks_client.get_signing_key_from_jwt(token)
              return jwt.decode(
                  token, key.key, algorithms=["RS256"],
                  audience="reports-api", issuer=issuer,
              )
          except jwt.{{err}}:
              raise HTTPException(status.{{code}}, "invalid token")
    blanks:
      dep:
        accept: ["Depends"]
      err:
        accept: ["PyJWTError"]
      code:
        accept: ["HTTP_401_UNAUTHORIZED"]
    hints:
      - "Первый пропуск это функция FastAPI, объявляющая зависимость на схему безопасности. Она достаёт токен из заголовка."
      - "Второй пропуск это базовый класс исключений PyJWT, покрывающий все причины отказа. Третий это статус «не знаю, кто вы»."
    variants:
      - prompt: "Заполните пропуски в проверке роли: валидный токен, но при нехватке роли вернуть 403."
        template: |
          def require_role(role: str):
              def checker(user: dict = {{dep}}(get_current_user)) -> dict:
                  roles = user.get("realm_access", {}).get("roles", [])
                  if role not in roles:
                      raise HTTPException(status.{{code}}, "forbidden")
                  return user
              return checker
        blanks:
          dep:
            accept: ["Depends"]
          code:
            accept: ["HTTP_403_FORBIDDEN"]

  - id: kc-py-401-403-001
    concept: python-integration
    type: theory-quiz
    difficulty: 3
    prompt: "Токен валиден и подпись сошлась, но у пользователя нет роли report.admin для операции. Какой статус вернуть и почему?"
    choices:
      - id: a
        text: "403 Forbidden: личность установлена, но прав недостаточно."
      - id: b
        text: "401 Unauthorized: раз доступа нет, клиент должен войти заново."
      - id: c
        text: "200 OK с пустым телом: пусть клиент сам решит, что делать."
      - id: d
        text: "500 Internal Server Error: нехватка роли это сбой сервера."
    correct: [a]
    explanation: "401 отвечает на вопрос «кто вы» и уместен, когда токена нет, он истёк или подпись не сошлась. Здесь личность установлена, не хватает лишь прав, это ровно случай 403. Ответить 401 значит толкнуть клиент на повторный логин, который прав не добавит."
    hints:
      - "Разведите два вопроса: «кто вы» и «что вам можно». Какой из них здесь не пройден?"
      - "Подумайте о реакции клиента: обновление токена или повторный логин добавят нужную роль или нет? От этого зависит правильный код."

  - id: kc-py-introspection-when-001
    concept: python-integration
    type: theory-quiz
    difficulty: 4
    prompt: "Для операций списания денег нужно, чтобы отозванный токен переставал работать немедленно. Что выбрать вместо офлайн-проверки и какой ценой?"
    choices:
      - id: a
        text: "Introspection (RFC 7662): спросить realm, активен ли токен."
      - id: b
        text: "Просто укоротить lifespan кэша JWKS до нуля."
      - id: c
        text: "Отключить проверку подписи, чтобы ускорить обработку."
      - id: d
        text: "Хранить список отозванных токенов внутри самого токена."
    correct: [a]
    explanation: "Офлайн-проверка не видит отзыва: токен валиден до exp, даже если сессию завершили. Introspection спрашивает realm про статус токена прямо сейчас и видит отзыв немедленно, но добавляет сетевой вызов на проверку и зависимость от Keycloak. Поэтому её берут точечно, на чувствительных операциях, а не на всём горячем пути. Короткий lifespan JWKS отзыв не решает, ключи и отзыв это разные вещи."
    hints:
      - "Офлайн-проверка не видит отзыва до exp. Какой механизм спрашивает у Keycloak про статус токена прямо сейчас?"
      - "За мгновенный отзыв платят на каждом запросе. Чем именно платят и почему это терпимо только на чувствительных операциях?"
