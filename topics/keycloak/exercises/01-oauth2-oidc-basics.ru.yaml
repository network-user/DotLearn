exercises:
  - id: oauth2-roles-001
    concept: oauth2-oidc-basics
    type: theory-quiz
    difficulty: 1
    prompt: "Какую задачу решает OAuth2?"
    choices:
      - id: a
        text: "Авторизацию: что приложению разрешено делать от имени владельца ресурса."
      - id: b
        text: "Шифрование трафика между client и resource server."
      - id: c
        text: "Аутентификацию: достоверно установить личность пользователя."
      - id: d
        text: "Хранение паролей пользователей на стороне client."
    correct: [a]
    explanation: "OAuth2 - про авторизацию: он выдаёт ограниченный доступ к ресурсу без передачи пароля. Установление личности пользователя - задача OIDC поверх OAuth2."
    variants:
      - prompt: "Какую задачу OAuth2 сам по себе не решает и для чего нужен OIDC?"
        choices:
          - id: a
            text: "Аутентификацию (кто пользователь) - её добавляет OIDC поверх OAuth2."
          - id: b
            text: "Авторизацию доступа к API - её добавляет OIDC."
          - id: c
            text: "Ограничение объёма доступа через scope - его добавляет OIDC."
          - id: d
            text: "Подписание access_token - это делает только OIDC."
        correct: [a]
        explanation: "OAuth2 отвечает за авторизацию, но не за достоверную личность. OIDC - тонкий слой поверх OAuth2, добавляющий аутентификацию через id_token."
      - prompt: "Что из перечисленного - задача авторизации, а не аутентификации?"
        choices:
          - id: a
            text: "Решить, можно ли приложению читать ваши фото от вашего имени."
          - id: b
            text: "Узнать имя и email вошедшего пользователя."
          - id: c
            text: "Подтвердить, что вошёл именно тот человек, за кого себя выдаёт."
          - id: d
            text: "Выдать подписанное удостоверение личности."
        correct: [a]
        explanation: "Выдача ограниченного доступа к ресурсу - авторизация (OAuth2). Установление и удостоверение личности - аутентификация (OIDC)."

  - id: oauth2-four-roles-001
    concept: oauth2-oidc-basics
    type: theory-quiz
    difficulty: 1
    prompt: "Кто в ролях OAuth2 является resource owner?"
    choices:
      - id: a
        text: "Пользователь - владелец данных, дающий согласие на доступ."
      - id: b
        text: "Приложение, которое хочет действовать от имени пользователя."
      - id: c
        text: "Сервер, который спрашивает согласие и выдаёт token."
      - id: d
        text: "API, которое хранит данные и пускает по token."
    correct: [a]
    explanation: "Resource owner - владелец данных, то есть пользователь. Приложение - client, выдающий token сервер - authorization server, хранящее данные API - resource server."
    variants:
      - prompt: "Какая роль в OAuth2 выдаёт access_token и спрашивает согласие владельца?"
        choices:
          - id: a
            text: "Authorization server (в нашей теме - Keycloak)."
          - id: b
            text: "Resource server - API с данными сразу, без промежуточного состояния."
          - id: c
            text: "Client - приложение пользователя сразу, без промежуточного состояния."
          - id: d
            text: "Resource owner - сам пользователь сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Согласие спрашивает и token выдаёт authorization server. Resource server только проверяет уже выданный token."
      - prompt: "Какая роль OAuth2 проверяет права по access_token, но не выдаёт его?"
        choices:
          - id: a
            text: "Resource server - API, которое хранит данные."
          - id: b
            text: "Authorization server - он же и выдаёт token."
          - id: c
            text: "Client - приложение, получающее token."
          - id: d
            text: "Resource owner - владелец данных."
        correct: [a]
        explanation: "Resource server принимает запросы с access_token и проверяет права по нему. Выдача token - дело authorization server."

  - id: oauth2-no-password-001
    concept: oauth2-oidc-basics
    type: theory-quiz
    difficulty: 2
    prompt: "Что получает client в OAuth2 вместо пароля владельца ресурса?"
    choices:
      - id: a
        text: "Access_token - строку с ограниченными правами и сроком жизни."
      - id: b
        text: "Копию пароля, зашифрованную authorization server."
      - id: c
        text: "Полный доступ к учётной записи владельца навсегда."
      - id: d
        text: "Логин владельца без пароля, чтобы войти за него."
    correct: [a]
    explanation: "Client никогда не видит пароль: владелец логинится на authorization server, а client получает обратно access_token - ограниченный по правам и времени пропуск."
    variants:
      - prompt: "Где владелец ресурса вводит пароль в потоке OAuth2?"
        choices:
          - id: a
            text: "На authorization server: только он видит пароль, client - нет."
          - id: b
            text: "В форме самого client, который затем пересылает пароль дальше."
          - id: c
            text: "На resource server при первом обращении к API."
          - id: d
            text: "Нигде: OAuth2 вообще не использует пароли."
        correct: [a]
        explanation: "Пароль остаётся между владельцем и authorization server. Client отправляет владельца логиниться туда и получает обратно только token, пароль он не видит."
      - prompt: "Чем access_token ограничен по сравнению с паролем владельца?"
        choices:
          - id: a
            text: "Набором прав (scope) и сроком жизни: это узкий и временный пропуск, а не полный доступ."
          - id: b
            text: "Ничем: access_token даёт ровно те же права, что и пароль, но навсегда."
          - id: c
            text: "Только сроком жизни; по правам он равен полному доступу к учётной записи."
          - id: d
            text: "Только набором прав; срок жизни у него неограничен."
        correct: [a]
        explanation: "Access_token несёт ограниченный набор прав (запрошенные scope) и истекает по времени. В этом его смысл: украденный или утёкший token наносит меньше вреда, чем украденный пароль."

  - id: oidc-token-purpose-001
    concept: oauth2-oidc-basics
    type: theory-quiz
    difficulty: 2
    prompt: "Чем по назначению различаются access_token и id_token?"
    choices:
      - id: a
        text: "Access_token - пропуск к API для resource server; id_token - подписанное удостоверение личности для самого client."
      - id: b
        text: "Access_token - для личности пользователя; id_token - для доступа к API, полностью минуя client."
      - id: c
        text: "Это синонимы: оба несут и личность, и права доступа без какого-либо шага, связанного с client."
      - id: d
        text: "Access_token подписан, а id_token всегда непрозрачная строка сразу, без промежуточного состояния."
    correct: [a]
    explanation: "Access_token едет к resource server как пропуск к API. Id_token (JWT из OIDC) остаётся у client и сообщает, кто вошёл; до resource server он обычно не доходит."
    hints:
      - "Спросите себя, куда едет каждый token: один - к API, другой остаётся у приложения, чтобы узнать вошедшего."
      - "OIDC добавляет именно удостоверение личности; access_token этого по спецификации не гарантирует."
    variants:
      - prompt: "Какой token client кладёт в заголовок Authorization при запросе к API?"
        choices:
          - id: a
            text: "access_token - именно он предназначен для resource server."
          - id: b
            text: "id_token - его и проверяет API."
          - id: c
            text: "refresh_token - он подтверждает права на каждом запросе."
          - id: d
            text: "Любой из них: API принимает все три одинаково."
        correct: [a]
        explanation: "К API едет access_token: он пропуск к ресурсу. Id_token остаётся у client для определения личности, а refresh_token показывают только token endpoint."
      - prompt: "Какой scope нужно запросить, чтобы вместе с access_token получить id_token?"
        choices:
          - id: a
            text: "openid - именно он включает выдачу id_token в OIDC."
          - id: b
            text: "profile - без него id_token не выдаётся."
          - id: c
            text: "any - подойдёт любой scope, id_token выдаётся всегда."
          - id: d
            text: "id_token - такой scope и запрашивают."
        correct: [a]
        explanation: "Выдачу id_token включает специальный scope openid - это и есть признак OIDC-запроса. Scope profile и email лишь добавляют claims, но сам id_token появляется именно из-за openid."

  - id: oidc-scope-vs-roles-001
    concept: oauth2-oidc-basics
    type: theory-quiz
    difficulty: 3
    prompt: "Почему scope нельзя считать ролями пользователя?"
    choices:
      - id: a
        text: "Scope - это запрошенный объём согласия в рамках конкретного запроса, а не постоянные права пользователя в системе."
      - id: b
        text: "Scope - это и есть роли, просто записанные в другом claim сразу, без промежуточного состояния."
      - id: c
        text: "Scope назначает администратор навсегда, а роли запрашивает client при каждом входе сразу, без промежуточного состояния."
      - id: d
        text: "Scope существует только в id_token, а роли - только в access_token сразу, без промежуточного состояния."
    correct: [a]
    explanation: "Scope - механизм наименьших привилегий: client запрашивает объём доступа на конкретный запрос, и пользователь соглашается. Роли - отдельная постоянная модель прав, в Keycloak это разные сущности."
    hints:
      - "Подумайте, кто и когда задаёт scope, а кто и когда - роли: одно запрашивается на лету, другое назначено заранее."
      - "Scope - про согласие на объём действий здесь и сейчас; роли - про устойчивые права в системе."

  - id: oidc-discovery-001
    concept: oauth2-oidc-basics
    type: theory-quiz
    difficulty: 3
    prompt: "Откуда библиотека client узнаёт authorization_endpoint, token_endpoint и jwks_uri, не зашивая их вручную?"
    choices:
      - id: a
        text: "Из discovery-документа по пути /.well-known/openid-configuration."
      - id: b
        text: "Из заголовков ответа resource server при первом 401."
      - id: c
        text: "Из самого access_token - все адреса лежат в его payload."
      - id: d
        text: "Из переменных окружения, которые обязан задать администратор."
    correct: [a]
    explanation: "OIDC публикует discovery endpoint - один JSON по фиксированному пути /.well-known/openid-configuration, где перечислены все адреса, scope и алгоритмы. Библиотеки читают его один раз."
    hints:
      - "OIDC стандартизует один фиксированный URL, чтобы адреса не приходилось хардкодить."
      - "Путь начинается с /.well-known/ - это соглашение для machine-readable метаданных."

  - id: oauth2-opaque-token-001
    concept: oauth2-oidc-basics
    type: theory-quiz
    difficulty: 4
    prompt: "На фронтенде вы декодируете access_token и достаёте из него email. Почему это ошибка дизайна, даже если сейчас Keycloak отдаёт access_token в формате JWT?"
    choices:
      - id: a
        text: "Формат access_token по спецификации не определён: он может стать opaque-строкой, и код, разбирающий его ради личности, сломается; для личности есть id_token."
      - id: b
        text: "Декодировать JWT на фронтенде технически невозможно без приватного ключа сразу, без промежуточного состояния и без дополнительных проверок."
      - id: c
        text: "Access_token нельзя читать вообще никому, включая resource server сразу, без промежуточного состояния и без дополнительных проверок."
      - id: d
        text: "Email никогда не попадает в JWT, поэтому декодирование бессмысленно по определению сразу, без промежуточного состояния и без дополнительных проверок."
    correct: [a]
    explanation: "По OAuth2 формат access_token не стандартизован - он может быть JWT или opaque. Client не должен принимать решения по его содержимому: для личности предназначен id_token. Иначе при переходе на opaque token код перестанет работать."
    hints:
      - "Спецификация OAuth2 ничего не обещает про внутренности access_token - сегодня JWT, завтра случайная строка."
      - "Для личности пользователя в OIDC есть отдельный артефакт, который client как раз обязан читать."
