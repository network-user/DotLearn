exercises:
  - id: flows-pick-flow-001
    concept: auth-flows
    type: theory-quiz
    difficulty: 1
    prompt: "What question picks between authorization code + PKCE and client credentials?"
    choices:
      - id: a
        text: "Is there a human behind the request: yes, authorization code + PKCE; no, client credentials."
      - id: b
        text: "What programming language the client uses."
      - id: c
        text: "Whether the resource server uses HTTPS."
      - id: d
        text: "How many scopes the client requests."
    correct: [a]
    explanation: "Authorization code + PKCE is for a person in a browser. Client credentials is machine access without a person."
    variants:
      - prompt: "A background service calls an external API every minute in its own name, no user. Which flow?"
        choices:
          - id: a
            text: "Client credentials: confidential client presents secret, no browser."
          - id: b
            text: "Authorization code + PKCE: the service does redirects."
          - id: c
            text: "Implicit flow: fastest for services."
          - id: d
            text: "Any flow with redirect_uri pointing to localhost."
        correct: [a]
        explanation: "No human to redirect. Machine access → client credentials with secret."
      - prompt: "A user signs into a browser SPA via Keycloak. Modern default flow?"
        choices:
          - id: a
            text: "Authorization code flow with PKCE, method S256."
          - id: b
            text: "Client credentials: SPA presents client_secret."
          - id: c
            text: "Implicit flow: made for SPA."
          - id: d
            text: "No token: SPA reads identity from Keycloak cookie."
        correct: [a]
        explanation: "Human in browser → authorization code + PKCE. Implicit is legacy; client credentials does not authenticate a person."

  - id: flows-code-purpose-001
    concept: auth-flows
    type: theory-quiz
    difficulty: 2
    prompt: "Why does authorization code flow return a one-time code first instead of the token?"
    choices:
      - id: a
        text: "So the token does not travel in the browser address bar: code is exchanged via a direct request."
      - id: b
        text: "So the user confirms consent twice."
      - id: c
        text: "So the resource server can cache the token early."
      - id: d
        text: "HTTPS requirement: token cannot use a secure channel."
    correct: [a]
    explanation: "Only a one-time code returns through the browser. Token comes from a direct token endpoint request, not navigation."
    hints:
      - "Recall why implicit flow was bad: where did the token appear?"
      - "Code is visible in the browser but useless without the second step."
    variants:
      - prompt: "Why is intercepted authorization code useless without the second step?"
        choices:
          - id: a
            text: "It is one-time and not a token: exchange needs a direct request (and with PKCE, verifier)."
          - id: b
            text: "Code is encrypted with the resource server's public key."
          - id: c
            text: "Code works only in the same browser tab."
          - id: d
            text: "Keycloak revokes any code immediately after redirect."
        correct: [a]
        explanation: "Code is an intermediate ticket. Without exchange (and PKCE verifier) it grants nothing."
      - prompt: "Where does the token appear in authorization code flow?"
        choices:
          - id: a
            text: "In the response to a direct POST to the token endpoint: not in the address bar."
          - id: b
            text: "In the redirect URL like the code."
          - id: c
            text: "In a cookie set at login."
          - id: d
            text: "In Referer on return to redirect_uri."
        correct: [a]
        explanation: "Browser navigation carries only code. Token arrives from direct token endpoint call."

  - id: flows-pkce-fields-001
    concept: auth-flows
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in what the client sends in /authorize and /token with PKCE."
    template: |
      GET  /authorize ... &code_{{authParam}}=...&code_challenge_method=S256
      POST /token     ... &code_{{tokenParam}}=...
    blanks:
      authParam:
        accept: ["challenge"]
        accept_regex: '^\s*challenge\s*$'
      tokenParam:
        accept: ["verifier"]
        accept_regex: '^\s*verifier\s*$'
    hints:
      - "First send the hash (challenge), then the secret string (verifier)."
      - "/authorize gets challenge; /token gets verifier."
    variants:
      - prompt: "Fill in how code_challenge is derived from code_verifier with S256."
        template: |
          code_challenge = BASE64URL({{hashFunc}}(code_verifier))
        blanks:
          hashFunc:
            accept: ["SHA256", "SHA-256", "sha256"]
            accept_regex: '^\s*SHA-?256\s*$'
      - prompt: "Fill in the challenge method to use instead of insecure plain."
        template: |
          code_challenge_method = {{method}}
        blanks:
          method:
            accept: ["S256", "s256"]
            accept_regex: '^\s*[Ss]256\s*$'

  - id: flows-pkce-why-001
    concept: auth-flows
    type: theory-quiz
    difficulty: 3
    prompt: "An attacker intercepted authorization code. Why can they not exchange it with PKCE?"
    choices:
      - id: a
        text: "They lack code_verifier: it cannot be recovered from challenge (one-way SHA-256)."
      - id: b
        text: "Code is encrypted with the resource server's public key."
      - id: c
        text: "Keycloak revokes any code that appeared in proxy logs."
      - id: d
        text: "Intercepted code is bound to IP address."
    correct: [a]
    explanation: "PKCE binds exchange to whoever requested the code. Without verifier, exchange fails: SHA-256 is one-way."
    hints:
      - "What does the client keep and never send in /authorize?"
      - "Can an attacker reverse a hash to get the verifier?"

  - id: flows-redirect-uri-001
    concept: auth-flows
    type: theory-quiz
    difficulty: 3
    prompt: "Request has redirect_uri https://app.example/callback/ (extra slash); client registered https://app.example/callback. What does Keycloak do?"
    choices:
      - id: a
        text: "Rejects: redirect_uri must match exactly, not approximately."
      - id: b
        text: "Accepts: trailing slash is ignored."
      - id: c
        text: "Accepts with a warning in logs."
      - id: d
        text: "Redirects to the registered URL fixing the slash."
    correct: [a]
    explanation: "Exact match required: open-redirect protection. Extra slash is a mismatch."
    hints:
      - "Comparison is character by character. What attack does strictness prevent?"
      - "If 'starts with' were allowed, where could an attacker steer the code?"

  - id: flows-client-creds-id-001
    concept: auth-flows
    type: theory-quiz
    difficulty: 2
    prompt: "What is NOT issued in client credentials flow and why?"
    choices:
      - id: a
        text: "id_token: no human to attest; token is for the service itself."
      - id: b
        text: "access_token: machine access does not need it."
      - id: c
        text: "client_secret: it stays only at Keycloak."
      - id: d
        text: "scope: not used in client credentials."
    correct: [a]
    explanation: "Client credentials is machine access. access_token is issued to the service account; no id_token without a person."
    hints:
      - "id_token attests identity. Whose identity behind a service with no human?"
      - "You get an API pass, not a user identity document."
    variants:
      - prompt: "Who is access_token issued to in client credentials flow?"
        choices:
          - id: a
            text: "The client itself (service account): sub points at the service."
          - id: b
            text: "The realm admin who created the client."
          - id: c
            text: "A random realm user chosen by Keycloak."
          - id: d
            text: "Nobody: such tokens have no subject."
        correct: [a]
        explanation: "No human → token represents the client via service account."
      - prompt: "Which client can get a token via client credentials?"
        choices:
          - id: a
            text: "Only confidential: must present client_secret."
          - id: b
            text: "Only public: machine access needs no secret."
          - id: c
            text: "Any client regardless of type."
          - id: d
            text: "Only clients in master realm."
        correct: [a]
        explanation: "Requires presenting secret: only confidential clients can do that safely."

  - id: flows-implicit-secret-challenge-001
    concept: auth-flows
    type: theory-quiz
    difficulty: 4
    prompt: "Which two options are definitely wrong for flow setup? (select all that apply)"
    choices:
      - id: a
        text: "Using implicit flow in a new SPA instead of authorization code + PKCE."
      - id: b
        text: "Sending client_secret from a browser SPA to prove authenticity."
      - id: c
        text: "Using authorization code + PKCE with S256 for human login in SPA."
      - id: d
        text: "Using client credentials for a background service without a user."
    correct: [a, b]
    explanation: "Implicit returns token in redirect: legacy. Secret in browser is compromised. PKCE for login and client credentials for services are correct."
    hints:
      - "One wrong option is a legacy flow putting token in the address bar."
      - "Another is secret in code the user downloads."
