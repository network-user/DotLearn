conceptId: fastapi-testing
cards:
  - id: fastapi-testing-01
    front: "Что делает TestClient и нужны ли ему сеть и порт?"
    back: "Он оборачивает само ASGI-приложение и прогоняет запрос через тот же конвейер прямо в процессе теста - без реального сервера, сокета и порта. Приложение вызывается как объект в памяти."
    tags: [fastapi]
  - id: fastapi-testing-02
    front: "TestClient синхронный или асинхронный, и нужен ли await?"
    back: "Синхронный, даже если обработчики async: он на базе Starlette и сам крутит event loop под капотом. Пишут client.get(...) без await. Для именно асинхронного теста берут httpx.AsyncClient."
    tags: [fastapi]
  - id: fastapi-testing-03
    front: "Как из TestClient получить статус и тело ответа?"
    back: "Ответ - объект с response.status_code (числовой статус) и response.json() (распарсенное тело). Тест - обычная pytest-функция с assert. Для POST тело передают как client.post(\"/items\", json={...})."
    tags: [fastapi]
  - id: fastapi-testing-04
    front: "Что такое app.dependency_overrides?"
    back: "Словарь, где ключ - исходная функция-зависимость, а значение - её подмена. На время теста запрос идёт через подмену: например, боевую сессию БД меняют на тестовую in-memory."
    tags: [fastapi]
  - id: fastapi-testing-05
    front: "Меняется ли сам обработчик при подмене зависимости?"
    back: "Нет. Обработчик по-прежнему просит Depends(get_db); подмена живёт снаружи, в словаре приложения. Запись dependency_overrides[get_db] = fake_db перенаправляет все Depends(get_db) на fake_db."
    tags: [fastapi]
  - id: fastapi-testing-06
    front: "Как проверить защищённый эндпоинт без настоящего токена?"
    back: "Подменить get_current_user на функцию, возвращающую фейкового пользователя, через dependency_overrides. Тогда проверка сводится к обычному client.get(...) - тестируется логика эндпоинта, а не процедура логина."
    tags: [fastapi]
  - id: fastapi-testing-07
    front: "Зачем выносить клиент и подмены в pytest-фикстуру?"
    back: "Чтобы не повторять их в каждом тесте. Фикстура ставит подмену, отдаёт готовый TestClient через yield, а после теста прибирает за собой. Тест просто принимает client аргументом - pytest подставит результат фикстуры."
    tags: [fastapi]
  - id: fastapi-testing-08
    front: "Почему после теста обязательно вызывать dependency_overrides.clear()?"
    back: "Иначе подмена останется в словаре и протечёт в следующие тесты, неожиданно изменив их поведение - получите «летающие» падения, зависящие от порядка запуска. Особенно когда app общий для модуля."
    tags: [fastapi]
  - id: fastapi-testing-09
    front: "Чем подменяют зависимость - ключом-функцией или её результатом?"
    back: "Ключ - сам объект функции (get_db), а не её вызов get_db(). Если перепутать, подмена не привяжется ни к одной зависимости и эндпоинт уйдёт в боевую."
    tags: [fastapi]
  - id: fastapi-testing-10
    front: "Почему не стоит тестировать по живой базе или через сеть?"
    back: "Запросы curl-ом к запущенному серверу и обращения к боевой базе делают тесты медленными, хрупкими и опасными. Вызывайте приложение через TestClient и подменяйте базу на тестовую через dependency_overrides."
    tags: [fastapi]
  - id: fastapi-testing-11
    front: "Когда всё же нужен httpx.AsyncClient вместо TestClient?"
    back: "В узких случаях, когда сам тест должен быть async def: дождаться нескольких асинхронных операций параллельно, разделить с приложением один event loop или проверить поведение, завязанное на асинхронный жизненный цикл. Для обычной проверки эндпоинта это лишнее."
    tags: [fastapi]
