conceptId: errors-middleware
cards:
  - id: errors-middleware-01
    front: "Почему HTTP-статус - это часть контракта, а не косметика?"
    back: "По статусу клиент решает, что делать: повторить запрос, показать ошибку или уйти на логин. Возврат 200 на не найденный ресурс делает «успех» и «не найдено» неразличимыми, и клиентский код не сможет правильно отреагировать."
    tags: [fastapi]
  - id: errors-middleware-02
    front: "Модель «запрос в кольцах»"
    back: "Запрос проходит сквозь концентрические кольца к обработчику в центре и обратно. Внешнее кольцо - middleware - видит запрос первым и ответ последним. HTTPException перехватывается и тоже поднимается наружу через кольца."
    tags: [fastapi]
  - id: errors-middleware-03
    front: "Какой статус возвращает успешный обработчик по умолчанию и как его сменить?"
    back: "По умолчанию 200 OK. Для создания ресурса честнее 201 Created, который задают в декораторе через status_code=status.HTTP_201_CREATED. Модуль status даёт читаемые имена вместо магических чисел."
    tags: [fastapi]
  - id: errors-middleware-04
    front: "Как обработчик возвращает ошибку клиенту?"
    back: "Через raise HTTPException(status_code, detail), а не return. FastAPI перехватит исключение и сформирует корректный ответ-ошибку, например 404 с телом, где detail равен «товар не найден»."
    tags: [fastapi]
  - id: errors-middleware-05
    front: "Почему ошибку отдают через raise, а не return?"
    back: "raise прерывает обработчик в точке броска - код после него не выполнится, что и нужно, если ресурса нет. return HTTPException(404) не поднимет исключение: FastAPI сериализует сам объект и клиент получит странный 200."
    tags: [fastapi]
  - id: errors-middleware-06
    front: "Семантика статусов 401, 403, 404, 409, 422"
    back: "401 - не аутентифицирован (нет или невалиден токен). 403 - аутентифицирован, но прав нет. 404 - ресурса нет. 409 - конфликт (дубликат). 422 - тело верно синтаксически, но не прошло валидацию (ставит сам FastAPI)."
    tags: [fastapi]
  - id: errors-middleware-07
    front: "В чём ключевая разница между 401 и 403?"
    back: "401 - «вы не представились» (нет или невалиден токен), клиент ведёт на логин. 403 - «представились, но сюда нельзя», клиент показывает «доступ запрещён». Это разные исходы с разной реакцией клиента."
    tags: [fastapi]
  - id: errors-middleware-08
    front: "Что такое middleware и как устроен вызов call_next?"
    back: "Функция, оборачивающая каждый запрос: она получает запрос, передаёт дальше через await call_next(request) и получает ответ. До call_next виден входящий запрос, после - исходящий ответ."
    tags: [fastapi]
  - id: errors-middleware-09
    front: "Что выносят в middleware и чего туда класть нельзя?"
    back: "Выносят сквозную логику: логирование, метрики, проверку заголовков, добавление CORS - обработчики о ней не знают. Нельзя класть тяжёлый блокирующий код: он на пути каждого запроса и удлинит абсолютно все."
    tags: [fastapi]
  - id: errors-middleware-10
    front: "Видит ли middleware ответы-ошибки?"
    back: "Да. Ответ из HTTPException или из 422-валидации всё равно проходит через middleware на выходе, поэтому логирующий middleware зафиксирует и неуспешные запросы. В response.status_code там будет 4xx/5xx, а не только 200."
    tags: [fastapi]
  - id: errors-middleware-11
    front: "Зачем заводить собственный класс исключения и @app.exception_handler?"
    back: "Для ошибок, повторяющихся по всему приложению, например доменная «не найдено». Из обработчиков вы бросаете доменное исключение, а перевод его в нужный HTTP-статус живёт в одном месте - не нужно тащить None наверх и проверять на каждом уровне."
    tags: [fastapi]
