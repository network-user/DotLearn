conceptId: async-concurrency
cards:
  - id: async-concurrency-01
    front: "Что именно ускоряет асинхронность в FastAPI?"
    back: "Ожидание ввода-вывода, а не вычисления. Пока обработчик ждёт сеть или базу, event loop делает другую полезную работу. На чистом счёте без await async ничего не даёт и даже вредит."
    tags: [fastapi]
  - id: async-concurrency-02
    front: "Что такое event loop и что происходит на await?"
    back: "Цикл, выполняющий одну корутину, пока та не дойдёт до await на операции ожидания. В точке await корутина уступает управление, и loop переключается на следующую готовую задачу, а вернётся, когда ожидаемое завершится."
    tags: [fastapi]
  - id: async-concurrency-03
    front: "Аналогия одного повара для event loop"
    back: "Один повар (один поток) ставит суп на огонь и идёт резать салат для другого заказа, возвращаясь к супу, когда тот готов. «Поставил на огонь и отошёл» - это await: ожидание не держит повара занятым."
    tags: [fastapi]
  - id: async-concurrency-04
    front: "Как FastAPI выполняет обработчики async def и обычный def?"
    back: "async def loop выполняет прямо в основном потоке, уступая на каждом await. Обычный def FastAPI запускает в отдельном пуле потоков, чтобы его блокирующий код не заморозил loop."
    tags: [fastapi]
  - id: async-concurrency-05
    front: "Когда писать async def, а когда обычный def?"
    back: "async def - когда внутри есть await на настоящих асинхронных I/O. Обычный def - для блокирующих библиотек (синхронный драйвер БД, requests, time.sleep): FastAPI вынесет его в пул потоков. Не смешивайте."
    tags: [fastapi]
  - id: async-concurrency-06
    front: "Почему блокирующий вызов внутри async def - худший вариант?"
    back: "async def выполняется в самом потоке loop, поэтому блокирующий вызов (time.sleep, requests, тяжёлый счёт) замораживает loop целиком. Все остальные запросы сериализуются и стоят в очереди."
    tags: [fastapi]
  - id: async-concurrency-07
    front: "Разница между await asyncio.sleep(1) и time.sleep(1) в async def"
    back: "await asyncio.sleep(1) освобождает loop на эту секунду для других запросов. time.sleep(1) блокирует поток loop целиком - сто запросов выполнятся последовательно по секунде каждый вместо одной общей секунды."
    tags: [fastapi]
  - id: async-concurrency-08
    front: "Чем конкурентность отличается от параллелизма в одном event loop?"
    back: "Один loop в одном потоке даёт конкурентность - запросы перекрывают свои ожидания, - но не параллелизм по ядрам. Для нескольких ядер запускают несколько процессов-воркеров (Uvicorn/Gunicorn)."
    tags: [fastapi]
  - id: async-concurrency-09
    front: "Куда девать CPU-bound нагрузку в FastAPI?"
    back: "Не в async def: у тяжёлого счёта нет точек await, поэтому loop на нём застревает. Выносите в синхронный def-обработчик (пул потоков) или в отдельный фоновый исполнитель. CPU-bound масштабируют процессами, а не корутинами."
    tags: [fastapi]
  - id: async-concurrency-10
    front: "Что возвращает вызов корутины без await?"
    back: "Объект корутины, а не результат. Это тихий баг: дальше по коду оперируете «обещанием», а не значением. Симптом - странный объект вместо данных или предупреждение «coroutine was never awaited»."
    tags: [fastapi]
  - id: async-concurrency-11
    front: "Почему один поток с event loop не медленный для I/O-нагрузки?"
    back: "Веб-сервис чаще ждёт, чем считает. В модели «поток на запрос» каждый ждущий запрос держит почти простаивающий поток. Loop разрывает эту связь: ожидание лишь регистрирует «разбуди меня» и освобождает loop, обслуживая тысячи соединений на скромной памяти."
    tags: [fastapi]
