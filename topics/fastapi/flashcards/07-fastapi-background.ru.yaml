conceptId: fastapi-background
cards:
  - id: fastapi-background-01
    front: "Когда выполняется код, добавленный в BackgroundTasks?"
    back: "После того как ответ уже ушёл клиенту по сети. Клиент получает ответ сразу и задачу не ждёт, а сервер доделывает её следом - это «хвост» после обработчика."
    tags: [fastapi]
  - id: fastapi-background-02
    front: "Как добавить фоновую задачу в обработчике?"
    back: "Объявите параметр background_tasks: BackgroundTasks - FastAPI распознает его по типу и внедрит сам. Затем вызовите background_tasks.add_task(функция, аргументы). Запрашивать параметр в URL не нужно."
    tags: [fastapi]
  - id: fastapi-background-03
    front: "Как передают функцию в add_task - со скобками или без?"
    back: "Без скобок: первый аргумент - сама функция (write_log), а не её вызов (write_log(...)); остальные аргументы add_task - её параметры. Со скобками функция исполнится немедленно, а в задачу попадёт её результат."
    tags: [fastapi]
  - id: fastapi-background-04
    front: "Где живёт BackgroundTasks и почему это важно?"
    back: "В том же процессе, что и веб-сервер. Отсюда простота (никакой инфраструктуры) и жёсткие ограничения: нет долговечности, ретраев и распределения по машинам."
    tags: [fastapi]
  - id: fastapi-background-05
    front: "Какая работа подходит для BackgroundTasks?"
    back: "Короткая и не критичная к гарантированной доставке: запись в лог, уведомление, инвалидация кэша. То, что не стоит заставлять клиента ждать и потеря чего не страшна."
    tags: [fastapi]
  - id: fastapi-background-06
    front: "Когда фоновой задачи недостаточно и нужна очередь вроде Celery?"
    back: "Когда работе нужны ретраи при сбое, расписание, распределение по воркерам/машинам или гарантия, что она не пропадёт. Тогда место занимает очередь с брокером (Redis/RabbitMQ) и отдельными воркерами."
    tags: [fastapi]
  - id: fastapi-background-07
    front: "Может ли фоновая задача потеряться?"
    back: "Да. Она нигде не сохранена, поэтому при падении или перезапуске процесса между ответом и выполнением задача просто пропадёт - а клиент уже получил 200. Гарантий нет: критичную работу (списание, обязательное письмо) туда класть нельзя."
    tags: [fastapi]
  - id: fastapi-background-08
    front: "Для чего нужен lifespan и как он делит жизнь процесса?"
    back: "Это асинхронный контекстный менеджер для кода, выполняемого один раз за жизнь процесса. Код до yield - startup (открыть пул, загрузить модель), сам yield - обслуживание запросов, код после yield - shutdown (закрыть ресурсы)."
    tags: [fastapi]
  - id: fastapi-background-09
    front: "Почему lifespan заменил @app.on_event(\"startup\"/\"shutdown\")?"
    back: "On_event объявлены устаревшими. Один контекстный менеджер держит парную логику «открыл - закрыл» рядом, в одной функции: ресурс, открытый до yield, закрывается после него, и это видно в одном месте."
    tags: [fastapi]
  - id: fastapi-background-10
    front: "Почему ресурсы открывают в lifespan, а не в первом запросе?"
    back: "Иначе первый запрос платит за инициализацию, а при нескольких воркерах логика инициализации размазывается и дублируется. Startup-ресурсы открывают один раз, до запросов."
    tags: [fastapi]
  - id: fastapi-background-11
    front: "Значит ли «после ответа», что тяжёлая фоновая задача бесплатна?"
    back: "Нет. Задача исполняется в том же процессе и расходует его ресурсы: длинная задача в BackgroundTasks конкурирует за процессор и память с обработкой свежих запросов. Ещё одна причина выносить долгую работу в отдельные воркеры."
    tags: [fastapi]
