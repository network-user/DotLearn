conceptId: errors-middleware
cards:
- id: errors-middleware-01
  front: Why is HTTP status part of the contract and not cosmetic?
  back: 'Based on the status, the client decides what to do: repeat the request, show an error, or log in. Returning 200 on
    a resource not found makes "success" and "not found" indistinguishable, and client code will not be able to respond correctly.'
  tags:
  - fastapi
- id: errors-middleware-02
  front: Model "request in rings"
  back: The request passes through the concentric rings to the handler in the center and back. The outer ring - middleware
    - sees the request first and the response last. HTTPException is intercepted and also raised outside through the rings.
  tags:
  - fastapi
- id: errors-middleware-03
  front: What status does the default success handler return and how can I change it?
  back: Default is 200 OK. To create a resource more honestly, 201 Created, which is set in the decorator via status_code=status.HTTP_201_CREATED.
    The status module gives readable names instead of magic numbers.
  tags:
  - fastapi
- id: errors-middleware-04
  front: How does the handler return the error to the client?
  back: Via raise HTTPException(status_code, detail), rather than return. FastAPI will intercept the exception and generate
    a correct error response, for example 404 with a body where detail is equal to “product not found”.
  tags:
  - fastapi
- id: errors-middleware-05
  front: Why is the error returned via raise and not return?
  back: 'raise interrupts the handler at the point of the throw - the code after it will not be executed, which is what is
    needed if there is no resource. return HTTPException(404) will not raise an exception: FastAPI will serialize the object
    itself and the client will receive a strange 200.'
  tags:
  - fastapi
- id: errors-middleware-06
  front: Semantics of statuses 401, 403, 404, 409, 422
  back: 401 - not authenticated (no or invalid token). 403 - authenticated, but no rights. 404 - no resource. 409 - conflict
    (duplicate). 422 - the body is syntactically correct, but has not passed validation (set by FastAPI itself).
  tags:
  - fastapi
- id: errors-middleware-07
  front: What is the key difference between 401 and 403?
  back: 401 - “you did not introduce yourself” (the token is missing or invalid), the client is directed to the login. 403
    - “introduced yourself, but you can’t come here”, the client shows “access denied”. These are different outcomes with
    different client reactions.
  tags:
  - fastapi
- id: errors-middleware-08
  front: What is middleware and how does call_next work?
  back: 'A function that wraps each request: it receives the request, passes it on via await call_next(request) and receives
    the response. Before call_next the incoming request is visible, after - the outgoing response.'
  tags:
  - fastapi
- id: errors-middleware-09
  front: What is put in middleware and what should not be put there?
  back: 'They take out end-to-end logic: logging, metrics, header checking, adding CORS - the handlers don’t know about it.
    You can’t put heavy blocking code: it’s in the path of every request and will lengthen absolutely everything.'
  tags:
  - fastapi
- id: errors-middleware-10
  front: Does middleware see error responses?
  back: Yes. The response from an HTTPException or from 422 validation still passes through the middleware on the output,
    so the logging middleware will also record unsuccessful requests. In response.status_code there will be 4xx/5xx, not just
    200.
  tags:
  - fastapi
- id: errors-middleware-11
  front: Why have your own exception class and @app.exception_handler?
  back: For errors that are repeated throughout the application, such as domain "not found". From the handlers, you throw
    a domain exception, and its translation into the desired HTTP status lives in one place - there is no need to drag None
    to the top and check at each level.
  tags:
  - fastapi
