conceptId: fastapi-auth
cards:
  - id: fastapi-auth-01
    front: "Раз HTTP не хранит состояния, как сервер узнаёт, кто прислал запрос?"
    back: "Каждый запрос сам несёт доказательство личности - токен в заголовке Authorization: Bearer. Сервер на каждый запрос достаёт токен, проверяет его и по нему опознаёт пользователя."
    tags: [fastapi]
  - id: fastapi-auth-02
    front: "Как работает поток OAuth2 с Bearer-токеном (аналогия с проходной)?"
    back: "Пароль показывают один раз на эндпоинте /token и получают токен (пропуск). Дальше в каждый запрос кладут заголовок Authorization: Bearer <токен>; по зданию вас водит пропуск, а не паспорт. Пароль участвует ровно один раз."
    tags: [fastapi]
  - id: fastapi-auth-03
    front: "Что делает OAuth2PasswordBearer и что приезжает в параметр эндпоинта?"
    back: "Это вызываемый объект, который достаёт токен из заголовка Authorization: Bearer. В Depends он отдаёт в параметр саму строку токена; при отсутствии заголовка сам бросает HTTPException(401). tokenUrl лишь указывает, где находится эндпоинт логина."
    tags: [fastapi]
  - id: fastapi-auth-04
    front: "Почему пароль хранят как хеш, а не в открытом виде?"
    back: "Утечёт база - утекут все пароли. Хранят результат одностороннего преобразования (bcrypt через passlib): по хешу пароль не восстановить, а при логине сервер хеширует присланный пароль и сравнивает хеши."
    tags: [fastapi]
  - id: fastapi-auth-05
    front: "Что лежит внутри JWT и что именно даёт подпись?"
    back: "Заголовок (alg), payload с claims (sub, exp, иногда права) и подпись секретным ключом. Подпись не прячет содержимое, а гарантирует, что claims не подменили: меняешь хоть байт - подпись не сходится."
    tags: [fastapi]
  - id: fastapi-auth-06
    front: "Что делает зависимость get_current_user?"
    back: "Опирается на oauth2_scheme (достать токен), читает из токена sub, находит пользователя и возвращает его. Любой защищённый эндпоинт добавляет один параметр = Depends(get_current_user) и получает готового пользователя. Нет/неверен/истёк токен - 401."
    tags: [fastapi]
  - id: fastapi-auth-07
    front: "Чем аутентификация отличается от авторизации и при чём тут scopes?"
    back: "Аутентификация отвечает «кто ты», авторизация - «что тебе можно». Scopes - помеченные права (items:read, items:write), их кладут в токен при выдаче. Нет нужного scope - эндпоинт отвечает 403: токен валиден, прав не хватает."
    tags: [fastapi]
  - id: fastapi-auth-08
    front: "В чём разница между 401 и 403?"
    back: "401 Unauthorized - «я не знаю, кто ты»: токена нет, он испорчен или истёк. 403 Forbidden - «я знаю, кто ты, но сюда нельзя»: токен валиден, но прав не хватает. Повторный логин помогает только при 401."
    tags: [fastapi]
  - id: fastapi-auth-09
    front: "Почему права проверяют после аутентификации, а не до?"
    back: "Сначала надо знать, кто перед нами (валиден ли токен - иначе 401), и лишь затем - хватает ли ему прав (иначе 403). Проверять права раньше, чем выяснили личность, бессмысленно."
    tags: [fastapi]
  - id: fastapi-auth-10
    front: "Можно ли класть в payload JWT секреты, например пароль или номер карты?"
    back: "Нет. Подпись защищает от подмены, но не шифрует: claims читаются кем угодно, кто перехватит токен. Внутрь идут только идентификатор и метаданные вроде срока (sub, exp)."
    tags: [fastapi]
  - id: fastapi-auth-11
    front: "Истёкший токен - это 401 или 403?"
    back: "401: просроченный токен сервер не смог принять как доказательство личности, значит отправитель не опознан. 403 уместен только когда личность установлена, но прав не хватает. Самопроверка: «надо ли логиниться заново?» - да - 401."
    tags: [fastapi]
