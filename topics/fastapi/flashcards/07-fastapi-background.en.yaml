conceptId: fastapi-background
cards:
  - id: fastapi-background-01
    front: "When does code added to BackgroundTasks run?"
    back: "After the response has already gone out to the client over the network. The client gets the response immediately and does not wait for the task; the server finishes it afterward - a tail after the handler."
    tags: [fastapi]
  - id: fastapi-background-02
    front: "How do you add a background task in a handler?"
    back: "Declare a parameter background_tasks: BackgroundTasks - FastAPI recognizes it by type and injects it. Then call background_tasks.add_task(function, arguments). You do not request the parameter in the URL."
    tags: [fastapi]
  - id: fastapi-background-03
    front: "Is the function passed to add_task with or without parentheses?"
    back: "Without: the first argument is the function itself (write_log), not a call (write_log(...)); the rest of add_task's arguments are its parameters. With parentheses the function runs immediately and only its result reaches the task."
    tags: [fastapi]
  - id: fastapi-background-04
    front: "Where does BackgroundTasks live, and why does it matter?"
    back: "In the same process as the web server. Hence the simplicity (no infrastructure) and the hard limits: no durability, no retries, no distribution across machines."
    tags: [fastapi]
  - id: fastapi-background-05
    front: "What kind of work fits BackgroundTasks?"
    back: "Short work that is not critical to guaranteed delivery: writing a log line, a notification, cache invalidation. Work the client should not wait for and whose loss is acceptable."
    tags: [fastapi]
  - id: fastapi-background-06
    front: "When is a background task not enough and you need a queue like Celery?"
    back: "When the work needs retries on failure, a schedule, distribution across workers/machines, or a guarantee it will not be lost. Then a queue with a broker (Redis/RabbitMQ) and separate workers takes over."
    tags: [fastapi]
  - id: fastapi-background-07
    front: "Can a background task be lost?"
    back: "Yes. It is stored nowhere, so if the process crashes or restarts between the response and execution, the task simply vanishes - while the client already got 200. There are no guarantees: never put critical work (a charge, a mandatory email) there."
    tags: [fastapi]
  - id: fastapi-background-08
    front: "What is lifespan for, and how does it split the life of the process?"
    back: "An async context manager for code that runs once over the life of the process. Code before yield is startup (open the pool, load the model), the yield itself is serving requests, code after yield is shutdown (close resources)."
    tags: [fastapi]
  - id: fastapi-background-09
    front: "Why did lifespan replace @app.on_event(\"startup\"/\"shutdown\")?"
    back: "on_event is deprecated. A single context manager keeps the paired 'open - close' logic together, in one function: a resource opened before yield is closed after it, and that is visible in one place."
    tags: [fastapi]
  - id: fastapi-background-10
    front: "Why open resources in lifespan rather than in the first request?"
    back: "Otherwise the first request pays for initialization, and with several workers the init logic is smeared and duplicated. Startup resources are opened once, before requests."
    tags: [fastapi]
  - id: fastapi-background-11
    front: "Does 'after the response' mean a heavy background task is free?"
    back: "No. The task runs in the same process and consumes its resources: a long task in BackgroundTasks competes for CPU and memory with handling fresh requests. One more reason to move long work to separate workers."
    tags: [fastapi]
