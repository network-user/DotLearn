conceptId: fastapi-dependencies
cards:
  - id: fastapi-dependencies-01
    front: "How does the line current_user: User = Depends(get_current_user) read literally?"
    back: "'Before calling me, call get_current_user and put whatever it returns into current_user.' A dependency is a callable whose result the framework substitutes into the parameter."
    tags: [fastapi]
  - id: fastapi-dependencies-02
    front: "What is the 'inversion' here: who calls the dependency function?"
    back: "Not the handler; the framework calls the dependency on the handler's behalf and brings back a ready result. The handler only declares the need, without knowing how the value is assembled."
    tags: [fastapi]
  - id: fastapi-dependencies-03
    front: "In what order does FastAPI resolve the dependency graph?"
    back: "Bottom-up: leaves with no dependencies of their own are computed first, their results pass to those that rely on them, and so on up to the handler. The handler body runs only with ready values."
    tags: [fastapi]
  - id: fastapi-dependencies-04
    front: "What happens if a dependency at any level raises HTTPException?"
    back: "The graph walk stops and the handler is not called at all, exactly as with a validation error. This is what makes a dependency a convenient place for checks."
    tags: [fastapi]
  - id: fastapi-dependencies-05
    front: "How many times is the same dependency called within one request?"
    back: "Once: FastAPI caches its result and reuses it everywhere in the graph. This matters for a DB session, otherwise a connection would open per use. Disable it with use_cache=False."
    tags: [fastapi]
  - id: fastapi-dependencies-06
    front: "How does a yield dependency split code into setup and teardown?"
    back: "Code before yield is setup, run before the handler. The value from yield is substituted into the parameter. Code after yield is teardown, run once the response is sent. Canonically: open a session before yield, close it in finally after."
    tags: [fastapi]
  - id: fastapi-dependencies-07
    front: "Why use dependencies=[...] on an endpoint, router, or app?"
    back: "To hang a dependency for a side effect - a permission check. Its result is of no interest to the handler; what matters is that on failure it raises HTTPException and the body is never reached. The list can cover a whole router or app."
    tags: [fastapi]
  - id: fastapi-dependencies-08
    front: "In what order do dependencies in the dependencies=[...] list run?"
    back: "Left to right. So authentication is placed before a permission check: it is pointless to check permissions before establishing who is in front of us."
    tags: [fastapi]
  - id: fastapi-dependencies-09
    front: "Why use a class as a dependency instead of a function?"
    back: "A dependency function is fixed, while a class gives a parameterizable dependency: FastAPI parses __init__ as a signature and the instance becomes the result. One class is a family of configured dependencies (for example, different pagination limits)."
    tags: [fastapi]
  - id: fastapi-dependencies-10
    front: "Why is Depends(get_db()) with parentheses a mistake?"
    back: "The parentheses run get_db once at startup and slip its result to the framework instead of the function. FastAPI expects a callable and will call it itself on every request - pass Depends(get_db) without parentheses."
    tags: [fastapi]
  - id: fastapi-dependencies-11
    front: "Can return close a resource after the response, the way yield can?"
    back: "No. After return the function is dead and teardown is unavailable. To reliably close a session after the response you need yield with finally, otherwise the connection leaks."
    tags: [fastapi]
