conceptId: pydantic-validation
cards:
- id: pydantic-validation-01
  front: What is the Pydantic model and how does it validate data?
  back: 'This is a BaseModel descendant class with typed fields. A field annotation is not a hint for the IDE, but an executable
    rule: Pydantic checks the value, returns the type, and if it fails, generates an error.'
  tags:
  - fastapi
- id: pydantic-validation-02
  front: Why does Pydantic accumulate all validation errors and not crash on the first one?
  back: To return the entire list of problems to the client at once in one response 422. The client sees all invalid fields
    at once, and not the first error that comes across.
  tags:
  - fastapi
- id: pydantic-validation-03
  front: What is guaranteed inside the handler after successful model validation?
  back: The object's fields are already of the required type and have passed all checks - no manual if required. If the data
    did not pass, the handler was not called at all, and the client received 422.
  tags:
  - fastapi
- id: pydantic-validation-04
  front: What is Field used for in the Pydantic model?
  back: 'Type specifies the rough form, and Field specifies the fine boundaries: min_length and max_length for strings, gt/ge/lt/le
    for numbers. For example price: float = Field(gt=0) will reject a negative price with a clear 422.'
  tags:
  - fastapi
- id: pydantic-validation-05
  front: What is the difference between gt and ge in Field?
  back: gt (greater than) - strictly greater, ge (greater or equal) - greater or equal. For price, you usually need gt=0 (zero
    is unacceptable), for the balance in the warehouse - ge=0 (zero is acceptable). Confusion at the border is a common mistake.
  tags:
  - fastapi
- id: pydantic-validation-06
  front: How does Pydantic handle nested models?
  back: Recursively. If the model field is another model, Pydantic will check that too, constructing a full nested object.
    The error specifies the exact path, such as address.city, at any nesting level.
  tags:
  - fastapi
- id: pydantic-validation-07
  front: When is field_validator needed and what does it receive as input?
  back: When the rule is not expressed through a type and Field, for example, “there are no spaces in the name.” The validator
    receives a value already cast to the type, can normalize it, and returns or throws a ValueError.
  tags:
  - fastapi
- id: pydantic-validation-08
  front: What does Pydantic turn ValueError from a validator into?
  back: As a normal validation error, the client will see it in the same 422 response next to the other field errors.
  tags:
  - fastapi
- id: pydantic-validation-09
  front: What does response_model do in a handler decorator?
  back: 'Filters the response according to the output scheme: only the model fields will be included in JSON, the rest will
    be cut off. This is insurance against field leaks - even if the handler returned the password, it will not escape outside.'
  tags:
  - fastapi
- id: pydantic-validation-10
  front: What does Pydantic do by default with extra fields in input JSON?
  back: Silently discards them - an unfamiliar field does not cause an error. To disable unknown fields, you need model_config
    with extra=forbid. The excess is simply lost from the box.
  tags:
  - fastapi
- id: pydantic-validation-11
  front: Why is the changeable default of a field set via default_factory, and not = []?
  back: Default is calculated once, so =[] will split one list among all instances. Need Field(default_factory=list). This
    is the same pitfall as Python's default mutable function arguments.
  tags:
  - fastapi
