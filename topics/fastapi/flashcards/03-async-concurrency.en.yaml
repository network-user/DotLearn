conceptId: async-concurrency
cards:
- id: async-concurrency-01
  front: What exactly speeds up asynchrony in FastAPI?
  back: Waiting for I/O, not computation. While the handler is waiting for the network or base, the event loop does other
    useful work. On a pure account without await, async does nothing and even harms.
  tags:
  - fastapi
- id: async-concurrency-02
  front: What is an event loop and what happens on await?
  back: A loop that executes one coroutine until it reaches await on the wait operation. At the await point, the coroutine
    relinquishes control, and the loop switches to the next ready task, and returns when the expected one completes.
  tags:
  - fastapi
- id: async-concurrency-03
  front: Analogy of one chef for event loop
  back: 'One cook (one thread) puts the soup on the fire and goes to cut the salad for another order, returning to the soup
    when it is ready. “Put it on the fire and walk away” is await: waiting does not keep the cook busy.'
  tags:
  - fastapi
- id: async-concurrency-04
  front: How does FastAPI execute async def and regular def handlers?
  back: async def loop executes directly on the main thread, yielding on each await. A regular def FastAPI runs in a separate
    thread pool so that its blocking code does not freeze the loop.
  tags:
  - fastapi
- id: async-concurrency-05
  front: When to write async def and when to write regular def?
  back: 'async def - when there is await inside for real asynchronous I/O. The usual def is for blocking libraries (synchronous
    database driver, requests, time.sleep): FastAPI will put it in the thread pool. Don''t mix.'
  tags:
  - fastapi
- id: async-concurrency-06
  front: Why is a blocking call inside an async def the worst option?
  back: async def runs in the loop thread itself, so the blocking call (time.sleep, requests, heavy counting) freezes the
    entire loop. All other requests are serialized and queued.
  tags:
  - fastapi
- id: async-concurrency-07
  front: Difference between await asyncio.sleep(1) and time.sleep(1) in async def
  back: await asyncio.sleep(1) frees up the loop for that second for other requests. time.sleep(1) blocks the entire loop
    thread - one hundred requests will be executed sequentially for a second each instead of one total second.
  tags:
  - fastapi
- id: async-concurrency-08
  front: How is concurrency different from parallelism in a single event loop?
  back: One loop in one thread gives concurrency - requests overlap their expectations - but not parallelism across cores.
    For several cores, several worker processes (Uvicorn/Gunicorn) are launched.
  tags:
  - fastapi
- id: async-concurrency-09
  front: What to do with CPU-bound load in FastAPI?
  back: 'Not in async def: the heavy count has no await points, so the loop gets stuck on it. Place it in a synchronous def
    handler (thread pool) or in a separate background executor. CPU-bound scales by processes, not coroutines.'
  tags:
  - fastapi
- id: async-concurrency-10
  front: What does a coroutine call without await return?
  back: 'The coroutine object, not the result. This is a silent bug: further in the code you operate with a “promise”, not
    a value. The symptom is a strange object instead of data or a “coroutine was never awaited” warning.'
  tags:
  - fastapi
- id: async-concurrency-11
  front: Why is one thread with an event loop not slow for I/O load?
  back: 'The web service waits more often than it counts. In the thread-per-request model, each waiting request keeps a nearly
    idle thread. Loop breaks this connection: the wait only registers the “wake me up” and frees the loop, servicing thousands
    of connections on modest memory.'
  tags:
  - fastapi
