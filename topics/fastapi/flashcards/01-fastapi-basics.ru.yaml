conceptId: fastapi-basics
cards:
  - id: fastapi-basics-01
    front: "Откуда FastAPI узнаёт, из какого источника брать каждый параметр обработчика?"
    back: "Из сигнатуры функции - имён и аннотаций параметров. По набору правил фреймворк решает, взять значение из path, query string или тела запроса. Вручную разбирать запрос не нужно."
    tags: [fastapi]
  - id: fastapi-basics-02
    front: "Три правила определения источника параметра в FastAPI"
    back: "Имя совпало с фигурной скобкой пути - это path-параметр. Примитив (int, str, float, bool) вне пути - query. Pydantic-модель или Body - тело запроса. Правила применяются в этом порядке."
    tags: [fastapi]
  - id: fastapi-basics-03
    front: "Как path-параметр связан с сигнатурой обработчика?"
    back: "По имени, а не по позиции. Имя в фигурных скобках пути, например {item_id}, должно совпадать с именем параметра функции item_id."
    tags: [fastapi]
  - id: fastapi-basics-04
    front: "Что делает аннотация типа у path-параметра, например item_id: int?"
    back: "Это инструкция на приведение типа: FastAPI конвертирует кусок URL из строки в int. При неудачной конвертации, например /items/abc, клиент получает 422, а обработчик не вызывается."
    tags: [fastapi]
  - id: fastapi-basics-05
    front: "Что делает query-параметр обязательным или необязательным?"
    back: "Значение по умолчанию. Параметр с дефолтом (skip: int = 0) необязателен и подставляет своё значение. Без дефолта он обязателен, и его отсутствие даёт 422 ещё до вызова обработчика."
    tags: [fastapi]
  - id: fastapi-basics-06
    front: "Когда параметр обработчика читается из JSON-тела запроса?"
    back: "Когда его тип - Pydantic-модель (наследник BaseModel) или он явно объявлен как Body. Тогда FastAPI читает тело как JSON и собирает из него объект модели."
    tags: [fastapi]
  - id: fastapi-basics-07
    front: "Может ли один обработчик одновременно использовать path, query и body?"
    back: "Да. Например update_item(item_id: int, item: Item, q: str = None) берёт item_id из пути, q из query, item из тела. Порядок параметров значения не имеет - источник определяют правила."
    tags: [fastapi]
  - id: fastapi-basics-08
    front: "Почему bool в query-параметре - источник сюрпризов?"
    back: "bool вольно трактует строки: ?flag=1, true, on дают True, а ?flag=2 или ?flag=да дают 422. Для произвольной строки от клиента не объявляйте параметр как bool."
    tags: [fastapi]
  - id: fastapi-basics-09
    front: "Почему слэш в значении path-параметра по умолчанию ломает маршрут?"
    back: "Слэш считается границей сегмента пути, поэтому docs/intro.txt не совпадёт с /files/{file_path}. Чтобы принять путь со слэшами, нужен конвертер {file_path:path} в шаблоне."
    tags: [fastapi]
  - id: fastapi-basics-10
    front: "Что означает код 422 в FastAPI и когда он возвращается?"
    back: "422 Unprocessable Entity - корректный ответ на невалидный ввод, формируемый до вызова обработчика. Это не сбой вашего кода: проверяйте форму запроса (тип path, обязательные query, структуру тела), а не тело функции."
    tags: [fastapi]
