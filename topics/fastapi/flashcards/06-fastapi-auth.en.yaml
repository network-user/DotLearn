conceptId: fastapi-auth
cards:
  - id: fastapi-auth-01
    front: "Since HTTP is stateless, how does the server figure out who sent a request?"
    back: "Each request carries its own proof of identity - a token in the Authorization: Bearer header. For every request the server pulls the token, verifies it, and identifies the user from it."
    tags: [fastapi]
  - id: fastapi-auth-02
    front: "How does the OAuth2 flow with a Bearer token work (the checkpoint analogy)?"
    back: "The password is shown once to the /token endpoint and a token (badge) is received. Afterward every request carries Authorization: Bearer <token>; the badge leads you around the building, not the passport. The password is used exactly once."
    tags: [fastapi]
  - id: fastapi-auth-03
    front: "What does OAuth2PasswordBearer do and what arrives in the endpoint parameter?"
    back: "It is a callable that pulls the token out of the Authorization: Bearer header. In Depends it hands the token string into the parameter; with no header it raises HTTPException(401) itself. tokenUrl only points to where the login endpoint lives."
    tags: [fastapi]
  - id: fastapi-auth-04
    front: "Why is a password stored as a hash rather than in the clear?"
    back: "Leak the database and you leak all passwords. You store the result of a one-way transformation (bcrypt via passlib): the password cannot be recovered from the hash, and at login the server hashes the supplied password and compares hashes."
    tags: [fastapi]
  - id: fastapi-auth-05
    front: "What is inside a JWT and what exactly does the signature provide?"
    back: "A header (alg), a payload with claims (sub, exp, sometimes permissions), and a signature with the secret key. The signature does not hide the contents but guarantees the claims were not tampered with: change one byte and it no longer matches."
    tags: [fastapi]
  - id: fastapi-auth-06
    front: "What does the get_current_user dependency do?"
    back: "It relies on oauth2_scheme (pull the token), reads sub from the token, finds the user, and returns it. Any protected endpoint adds one parameter = Depends(get_current_user) and gets a ready user. A missing/invalid/expired token gives 401."
    tags: [fastapi]
  - id: fastapi-auth-07
    front: "How does authentication differ from authorization, and where do scopes fit?"
    back: "Authentication answers 'who you are', authorization 'what you are allowed to do'. Scopes are tagged permissions (items:read, items:write) placed into the token at issuance. Missing the needed scope gives 403: the token is valid, the permissions are insufficient."
    tags: [fastapi]
  - id: fastapi-auth-08
    front: "What is the difference between 401 and 403?"
    back: "401 Unauthorized is 'I don't know who you are': the token is missing, corrupt, or expired. 403 Forbidden is 'I know who you are, but you're not allowed here': the token is valid but permissions are insufficient. Logging in again helps only for 401."
    tags: [fastapi]
  - id: fastapi-auth-09
    front: "Why are permissions checked after authentication, not before?"
    back: "First you must know who is in front of us (is the token valid - otherwise 401), and only then whether they have enough permissions (otherwise 403). Checking permissions before establishing identity is pointless."
    tags: [fastapi]
  - id: fastapi-auth-10
    front: "Can you put secrets such as a password or card number into a JWT payload?"
    back: "No. The signature protects against tampering but does not encrypt: claims are readable by anyone who intercepts the token. Inside go only an identifier and metadata like an expiry (sub, exp)."
    tags: [fastapi]
  - id: fastapi-auth-11
    front: "Is an expired token a 401 or a 403?"
    back: "401: the server could not accept an expired token as proof of identity, so the sender is not identified. 403 is appropriate only when identity is established but permissions are insufficient. Self-check: 'does the client need to log in again?' - yes - 401."
    tags: [fastapi]
