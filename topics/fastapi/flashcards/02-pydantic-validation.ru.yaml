conceptId: pydantic-validation
cards:
  - id: pydantic-validation-01
    front: "Что такое Pydantic-модель и как она проверяет данные?"
    back: "Это класс-наследник BaseModel с типизированными полями. Аннотация поля - не подсказка для IDE, а исполняемое правило: Pydantic проверяет значение, приводит к типу, а при невозможности копит ошибку."
    tags: [fastapi]
  - id: pydantic-validation-02
    front: "Зачем Pydantic копит все ошибки валидации, а не падает на первой?"
    back: "Чтобы вернуть клиенту весь список проблем разом в одном ответе 422. Клиент видит все невалидные поля сразу, а не первую попавшуюся ошибку."
    tags: [fastapi]
  - id: pydantic-validation-03
    front: "Что гарантировано внутри обработчика после успешной валидации модели?"
    back: "Поля объекта уже нужного типа и прошли все проверки - ручных if не требуется. Если данные не прошли, обработчик не вызвался вовсе, а клиент получил 422."
    tags: [fastapi]
  - id: pydantic-validation-04
    front: "Для чего нужен Field в Pydantic-модели?"
    back: "Тип задаёт грубую форму, а Field - тонкие границы: min_length и max_length для строк, gt/ge/lt/le для чисел. Например price: float = Field(gt=0) отвергнет отрицательную цену с понятным 422."
    tags: [fastapi]
  - id: pydantic-validation-05
    front: "В чём разница между gt и ge в Field?"
    back: "gt (greater than) - строго больше, ge (greater or equal) - больше или равно. Для цены обычно нужен gt=0 (ноль недопустим), для остатка на складе - ge=0 (ноль допустим). Путаница на границе - частая ошибка."
    tags: [fastapi]
  - id: pydantic-validation-06
    front: "Как Pydantic обрабатывает вложенные модели?"
    back: "Рекурсивно. Если поле модели - другая модель, Pydantic проверит и его, собрав полноценный вложенный объект. Ошибка указывает точный путь, например address.city, на любом уровне вложенности."
    tags: [fastapi]
  - id: pydantic-validation-07
    front: "Когда нужен field_validator и что он получает на вход?"
    back: "Когда правило не выражается через тип и Field, например «в имени нет пробелов». Валидатор получает уже приведённое к типу значение, может его нормализовать и возвращает либо бросает ValueError."
    tags: [fastapi]
  - id: pydantic-validation-08
    front: "Во что Pydantic превращает ValueError из валидатора?"
    back: "В обычную ошибку валидации - клиент увидит её в том же ответе 422 рядом с остальными ошибками полей."
    tags: [fastapi]
  - id: pydantic-validation-09
    front: "Что делает response_model в декораторе обработчика?"
    back: "Фильтрует ответ по схеме выхода: в JSON попадут только поля модели, остальное отсечётся. Это страховка от утечки полей - даже если обработчик вернул password, наружу он не уйдёт."
    tags: [fastapi]
  - id: pydantic-validation-10
    front: "Что Pydantic по умолчанию делает с лишними полями во входном JSON?"
    back: "Молча отбрасывает их - незнакомое поле не вызывает ошибку. Чтобы запрещать неизвестные поля, нужен model_config с extra=forbid. Из коробки лишнее просто теряется."
    tags: [fastapi]
  - id: pydantic-validation-11
    front: "Почему изменяемый дефолт поля задают через default_factory, а не = []?"
    back: "Дефолт вычисляется один раз, поэтому = [] разделит один список между всеми экземплярами. Нужен Field(default_factory=list). Это та же ловушка, что и мутабельные аргументы функций по умолчанию в Python."
    tags: [fastapi]
