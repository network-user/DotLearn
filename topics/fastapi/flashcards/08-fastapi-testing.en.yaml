conceptId: fastapi-testing
cards:
  - id: fastapi-testing-01
    front: "What does TestClient do, and does it need a network and a port?"
    back: "It wraps the ASGI application itself and runs the request through the same pipeline directly in the test process - with no real server, socket, or port. The application is called as an object in memory."
    tags: [fastapi]
  - id: fastapi-testing-02
    front: "Is TestClient synchronous or asynchronous, and do you need await?"
    back: "Synchronous, even if handlers are async: it is built on Starlette and spins the event loop under the hood itself. You write client.get(...) with no await. For a specifically async test reach for httpx.AsyncClient."
    tags: [fastapi]
  - id: fastapi-testing-03
    front: "How do you get the status and body of the response from TestClient?"
    back: "The response is an object with response.status_code (numeric status) and response.json() (parsed body). A test is an ordinary pytest function with assert. For POST the body is passed as client.post(\"/items\", json={...})."
    tags: [fastapi]
  - id: fastapi-testing-04
    front: "What is app.dependency_overrides?"
    back: "A dictionary where the key is the original dependency function and the value is its replacement. For the duration of a test the request goes through the replacement: for example, a production DB session is swapped for a test in-memory one."
    tags: [fastapi]
  - id: fastapi-testing-05
    front: "Does the handler itself change when a dependency is swapped?"
    back: "No. The handler still asks for Depends(get_db); the swap lives outside, in the application's dictionary. The line dependency_overrides[get_db] = fake_db redirects every Depends(get_db) to fake_db."
    tags: [fastapi]
  - id: fastapi-testing-06
    front: "How do you check a protected endpoint without a real token?"
    back: "Swap get_current_user for a function that returns a fake user via dependency_overrides. Then the check comes down to an ordinary client.get(...) - you test the endpoint's logic, not the login procedure."
    tags: [fastapi]
  - id: fastapi-testing-07
    front: "Why extract the client and overrides into a pytest fixture?"
    back: "To avoid repeating them in every test. The fixture sets the override, hands a ready TestClient through yield, and cleans up after the test. The test simply takes client as an argument - pytest substitutes the fixture's result."
    tags: [fastapi]
  - id: fastapi-testing-08
    front: "Why must you call dependency_overrides.clear() after the test?"
    back: "Otherwise the override stays in the dictionary and leaks into the following tests, unexpectedly changing their behavior - you get flaky failures that depend on run order. Especially when app is shared across the module."
    tags: [fastapi]
  - id: fastapi-testing-09
    front: "Do you swap a dependency by the function as key or by its result?"
    back: "The key is the function object itself (get_db), not a call get_db(). Mix it up and the override binds to no dependency, and the endpoint goes to production."
    tags: [fastapi]
  - id: fastapi-testing-10
    front: "Why avoid testing against a live database or over the network?"
    back: "curl requests to a running server and calls to a production database make tests slow, fragile, and dangerous. Call the application through TestClient and swap the database for a test one via dependency_overrides."
    tags: [fastapi]
  - id: fastapi-testing-11
    front: "When do you actually need httpx.AsyncClient instead of TestClient?"
    back: "In narrow cases where the test itself must be async def: to await several async operations in parallel, to share a single event loop with the application, or to check behavior tied to the async lifecycle. For an ordinary endpoint check it is needless."
    tags: [fastapi]
