conceptId: fastapi-dependencies
cards:
  - id: fastapi-dependencies-01
    front: "Как дословно читается запись current_user: User = Depends(get_current_user)?"
    back: "«Прежде чем вызвать меня, вызови get_current_user, а то, что она вернёт, положи в current_user». Зависимость - это вызываемый объект, результат которого фреймворк подставляет в параметр."
    tags: [fastapi]
  - id: fastapi-dependencies-02
    front: "В чём здесь «инверсия»: кто вызывает функцию-зависимость?"
    back: "Не обработчик зовёт зависимость, а фреймворк зовёт её за него и приносит готовый результат. Обработчик лишь декларирует потребность, не зная, как именно собирается значение."
    tags: [fastapi]
  - id: fastapi-dependencies-03
    front: "В каком порядке FastAPI разрешает граф зависимостей?"
    back: "Снизу вверх: сначала вычисляются листья без своих зависимостей, их результаты передаются тем, кто на них опирается, и так до самого обработчика. Тело обработчика вызывается только с готовыми значениями."
    tags: [fastapi]
  - id: fastapi-dependencies-04
    front: "Что произойдёт, если зависимость на любом уровне бросит HTTPException?"
    back: "Обход графа прерывается, и обработчик не вызывается вовсе - ровно как при ошибке валидации. Это и делает зависимость удобным местом для проверок."
    tags: [fastapi]
  - id: fastapi-dependencies-05
    front: "Сколько раз вызывается одна и та же зависимость в пределах одного запроса?"
    back: "Один раз: FastAPI кэширует её результат и переиспользует во всех местах графа. Это важно для сессии БД - иначе на каждое использование открывалось бы по соединению. Отключается через use_cache=False."
    tags: [fastapi]
  - id: fastapi-dependencies-06
    front: "Как зависимость с yield делит код на setup и teardown?"
    back: "Код до yield - setup, выполняется до обработчика. Значение из yield подставляется в параметр. Код после yield - teardown, выполняется уже после ответа клиенту. Канонично: открыть сессию до yield, закрыть в finally после."
    tags: [fastapi]
  - id: fastapi-dependencies-07
    front: "Зачем нужен dependencies=[...] на эндпоинте, роутере или приложении?"
    back: "Чтобы повесить зависимость ради побочного эффекта - проверки прав. Её результат обработчику не нужен; важно, что при провале она бросит HTTPException и до тела дело не дойдёт. Список можно навесить на весь роутер или приложение."
    tags: [fastapi]
  - id: fastapi-dependencies-08
    front: "В каком порядке выполняются зависимости в списке dependencies=[...]?"
    back: "Слева направо. Поэтому аутентификацию ставят раньше проверки прав: бессмысленно проверять права раньше, чем выяснили, кто перед нами."
    tags: [fastapi]
  - id: fastapi-dependencies-09
    front: "Зачем использовать класс в роли зависимости вместо функции?"
    back: "Функция-зависимость фиксирована, а класс даёт параметризуемую зависимость: FastAPI разбирает __init__ как сигнатуру, экземпляр становится результатом. Один класс - семейство настроенных зависимостей (например, разные лимиты пагинации)."
    tags: [fastapi]
  - id: fastapi-dependencies-10
    front: "Почему Depends(get_db()) со скобками - ошибка?"
    back: "Скобки исполняют get_db один раз при старте и подсовывают фреймворку её результат вместо самой функции. FastAPI ждёт вызываемый объект и вызовет его сам на каждый запрос - передавайте Depends(get_db) без скобок."
    tags: [fastapi]
  - id: fastapi-dependencies-11
    front: "Можно ли через return закрыть ресурс после ответа, как через yield?"
    back: "Нет. После return функция мертва, teardown ей недоступен. Чтобы гарантированно закрыть сессию после ответа, нужен yield с finally, иначе соединение утечёт."
    tags: [fastapi]
