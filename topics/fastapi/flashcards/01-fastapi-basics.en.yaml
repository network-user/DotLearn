conceptId: fastapi-basics
cards:
- id: fastapi-basics-01
  front: How does FastAPI know which source to take each handler parameter from?
  back: From the function signature - names and annotations of parameters. Based on a set of rules, the framework decides
    whether to take the value from the path, query string, or request body. There is no need to manually parse the request.
  tags:
  - fastapi
- id: fastapi-basics-02
  front: Three rules for determining the source of a parameter in FastAPI
  back: The name matches the curly brace of the path - this is the path parameter. Primitive (int, str, float, bool) outside
    the path - query. Pydantic model or Body - the body of the request. The rules apply in this order.
  tags:
  - fastapi
- id: fastapi-basics-03
  front: How is the path parameter related to the handler signature?
  back: By name, not by position. The name in the curly braces of the path, for example {item_id}, must match the name of
    the function parameter item_id.
  tags:
  - fastapi
- id: fastapi-basics-04
  front: 'What does a type annotation do on a path parameter, for example item_id: int?'
  back: 'This is a type casting instruction: FastAPI converts a piece of URL from a string to an int. If the conversion fails,
    for example /items/abc, the client receives 422 and the handler is not called.'
  tags:
  - fastapi
- id: fastapi-basics-05
  front: What makes a query parameter mandatory or optional?
  back: 'Default value. The default parameter (skip: int = 0) is optional and substitutes its own value. Without a default,
    it is required, and its absence gives 422 even before the handler is called.'
  tags:
  - fastapi
- id: fastapi-basics-06
  front: When is the handler parameter read from the JSON body of the request?
  back: When its type is a Pydantic model (a descendant of BaseModel) or it is explicitly declared as Body. Then FastAPI reads
    the body as JSON and assembles a model object from it.
  tags:
  - fastapi
- id: fastapi-basics-07
  front: Can one handler use path, query and body at the same time?
  back: 'Yes. For example update_item(item_id: int, item: Item, q: str = None) takes item_id from the path, q from query,
    item from the body. The order of the parameters does not matter - the rules determine the source.'
  tags:
  - fastapi
- id: fastapi-basics-08
  front: Why is bool in a query parameter a source of surprises?
  back: 'bool interprets strings freely: ?flag=1, true, on give True, and ?flag=2 or ?flag=yes give 422. For an arbitrary
    string from the client, do not declare the parameter as bool.'
  tags:
  - fastapi
- id: fastapi-basics-09
  front: Why does a slash in the default path parameter break the route?
  back: The slash is considered a path segment boundary, so docs/intro.txt will not match /files/{file_path}. To accept a
    path with slashes, you need a {file_path:path} converter in the template.
  tags:
  - fastapi
- id: fastapi-basics-10
  front: What does code 422 mean in FastAPI and when is it returned?
  back: '422 Unprocessable Entity - a correct response to invalid input, generated before calling the handler. This is not
    a failure of your code: check the request form (path type, required query, body structure), not the function body.'
  tags:
  - fastapi
