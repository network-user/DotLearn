exercises:
- id: errors-status-meaning-001
  concept: errors-middleware
  type: theory-quiz
  difficulty: 1
  prompt: The processor did not find the requested product. Which answer is correct?
  choices:
  - id: a
    text: '404 Not Found via `raise HTTPException(404)`: the client will distinguish “no resource” from success by status.'
  - id: b
    text: '200 OK with an empty body: the request was processed without failure.'
  - id: c
    text: '500 Internal Server Error: since there is no data, this is a server error.'
  - id: d
    text: '422 Unprocessable Entity: The absence of a resource is a validation failure.'
  correct:
  - a
  explanation: HTTP status is part of the contract. 200 for a resource not found is indistinguishable for the client from
    success. The absence of a resource is a 404, and is returned via `raise HTTPException`.
  variants:
  - prompt: The request came with a valid token, but the user does not have rights to this action. What's the status?
    choices:
    - id: a
      text: '403 Forbidden: authenticated, but access is denied.'
    - id: b
      text: '401 Unauthorized: since there is no access, it means you didn’t introduce yourself.'
    - id: c
      text: '404 Not Found: hiding a resource is the same as its absence.'
    - id: d
      text: '200 OK: the request is syntactically correct, the rest is not important.'
    correct:
    - a
    explanation: 401 - “you did not introduce yourself” (the token is missing or invalid). 403 - “we introduced ourselves,
      but we can’t come here.” Here the token is valid, but there are not enough rights - this is 403.
  - prompt: POST successfully created a new resource. Which status is most honest?
    choices:
    - id: a
      text: '201 Created: resource created; it is set via `status_code` in the decorator.'
    - id: b
      text: 200 OK always, creation status cannot be set in FastAPI.
    - id: c
      text: '204 No Content: the body is not returned when created.'
    - id: d
      text: '409 Conflict: resource creation is always a conflict.'
    correct:
    - a
    explanation: To create a resource more honestly than `201 Created`, it is set via `status_code=status.HTTP_201_CREATED`
      in the decorator. 200 is the default success status, but 201 more accurately describes the outcome.
- id: errors-raise-vs-return-001
  concept: errors-middleware
  type: theory-quiz
  difficulty: 2
  prompt: How is `return HTTPException(404, detail="no")` different from `raise HTTPException(404, detail="no")`?
  choices:
  - id: a
    text: '`raise` generates a 404 error response; `return` returns the exception object itself as the body, and the client
      will receive a strange 200.'
  - id: b
    text: 'Nothing: FastAPI treats both options equally.'
  - id: c
    text: '`return` is more correct: exceptions should be returned, not thrown.'
  - id: d
    text: '`raise` always gives 500, because any exception is a server failure.'
  correct:
  - a
  explanation: The error is returned only through `raise`. FastAPI intercepts the thrown `HTTPException` and collects a response
    with the desired status. If it `return`, the framework will try to serialize the exception object itself as a regular
    body - you will get 200 with incomprehensible content.
  hints:
  - Consider how FastAPI knows that the value is an error and not the normal result of the handler.
  - One of these methods interrupts the execution of the handler at the call point, the other does not.
- id: errors-fill-httpexception-001
  concept: errors-middleware
  type: fill-in-blanks
  difficulty: 1
  prompt: 'Add a handler: if there is no product, return 404 with an explanation.'
  template: "from fastapi import FastAPI, HTTPException\n\napp = FastAPI()\nitems = {1: \"hat\"}\n\n@app.get(\"/items/{item_id}\"\
    )\ndef read_item(item_id: int):\n    if item_id not in items:\n        {{keyword}} HTTPException(status_code={{code}},\
    \ detail=\"product not found\")\n    return {\"name\": items[item_id]}\n"
  blanks:
    keyword:
      accept:
      - raise
    code:
      accept:
      - '404'
  variants:
  - prompt: Complete the creation of a resource with status 201.
    template: "from fastapi import FastAPI, status\n\napp = FastAPI()\n\n@app.post(\"/items/\", status_code=status.{{const}})\n\
      def create_item(name: str):\n    return {\"name\": name}\n"
    blanks:
      const:
        accept:
        - HTTP_201_CREATED
  - prompt: 'Complete the rights check: without them, return 403.'
    template: "from fastapi import FastAPI, HTTPException\n\napp = FastAPI()\n\n@app.delete(\"/items/{item_id}\")\ndef delete_item(item_id:\
      \ int, is_admin: bool = False):\n    if not is_admin:\n        raise HTTPException(status_code={{code}}, detail=\"no\
      \ permissions\")\n    return {\"deleted\": item_id}\n"
    blanks:
      code:
        accept:
        - '403'
- id: errors-fill-middleware-001
  concept: errors-middleware
  type: fill-in-blanks
  difficulty: 2
  prompt: Add middleware that measures the request processing time.
  template: "import time\nfrom fastapi import Request\n\n@app.middleware(\"http\")\nasync def add_timing(request: Request,\
    \ call_next):\n    start = time.perf_counter()\n    response = {{await_kw}} call_next(request)\n    elapsed = time.perf_counter()\
    \ - start\n    response.headers[\"X-Process-Time\"] = str(elapsed)\n    return response\n"
  blanks:
    await_kw:
      accept:
      - await
  hints:
  - '`call_next` passes the request further through the rings and returns a coroutine - you need to wait for its result before
    reading the response.'
  - This is the keyword that is passed over to loop while waiting for an asynchronous operation.
- id: errors-predict-status-001
  concept: errors-middleware
  type: predict-output
  difficulty: 2
  prompt: What will the program output? It models the choice of status based on the outcome of the handler.
  snippet: "def status_for(found, authorized):\n    if not authorized:\n        return 403\n    if not found:\n        return\
    \ 404\n    return 200\n\nprint(status_for(True, True), status_for(False, True), status_for(False, False))\n"
  expected:
    kind: stdout
    value: 200 404 403
  hints:
  - 'Apply the checks in the order they are written: rights first, then resource availability, then success.'
  - 'The first challenge: there is a resource and there are rights. Second: there are enough rights, but no resources. Third:
    there are no rights at all.'
  variants:
  - snippet: "def status_for(created, conflict):\n    if conflict:\n        return 409\n    if created:\n        return 201\n\
      \    return 200\n\nprint(status_for(True, False), status_for(False, True))\n"
    expected:
      kind: stdout
      value: 201 409
  - snippet: "def is_success(code):\n    return 200 <= code < 300\n\nprint(is_success(201), is_success(404), is_success(500))\n"
    expected:
      kind: stdout
      value: True False False
- id: errors-predict-middleware-order-001
  concept: errors-middleware
  type: predict-output
  difficulty: 3
  prompt: 'What will the program output? It models middleware rings: input in the order of registration, output in the reverse
    order.'
  snippet: "log = []\n\ndef handler():\n    log.append(\"handler\")\n\ndef wrap(name, inner):\n    def call():\n        log.append(name\
    \ + \"-in\")\n        inner()\n        log.append(name + \"-out\")\n    return call\n\napp = wrap(\"outer\", wrap(\"inner\"\
    , handler))\napp()\nprint(log)\n"
  expected:
    kind: stdout
    value: '[''outer-in'', ''inner-in'', ''handler'', ''inner-out'', ''outer-out'']'
  hints:
  - 'Middleware - nested rings: the outer one sees the request first and the response last. In what order will the code before
    and after `call_next` be executed?'
  - Go from the outside to the inside to the handler (the “before” part), then from the inside to the outside back (the “after”
    part).
  variants:
  - snippet: "log = []\n\ndef handler():\n    log.append(\"core\")\n\ndef wrap(name, inner):\n    def call():\n        log.append(\"\
      enter:\" + name)\n        inner()\n        log.append(\"exit:\" + name)\n    return call\n\napp = wrap(\"auth\", wrap(\"\
      timing\", handler))\napp()\nprint(log)\n"
    expected:
      kind: stdout
      value: '[''enter:auth'', ''enter:timing'', ''core'', ''exit:timing'', ''exit:auth'']'
  - snippet: "steps = []\n\ndef middleware(request, call_next):\n    steps.append(\"before\")\n    call_next(request)\n  \
      \  steps.append(\"after\")\n\ndef call_next(request):\n    steps.append(\"handler:\" + request)\n\nmiddleware(\"GET\
      \ /\", call_next)\nprint(steps)\n"
    expected:
      kind: stdout
      value: '[''before'', ''handler:GET /'', ''after'']'
- id: errors-predict-detail-001
  concept: errors-middleware
  type: predict-output
  difficulty: 3
  prompt: 'What will the program output? It replicates how FastAPI wraps an HTTPException in a `{"detail": ...}` response
    body.'
  snippet: "class HTTPException(Exception):\n    def __init__(self, status_code, detail):\n        self.status_code = status_code\n\
    \        self.detail = detail\n\ndef respond(item_id, store):\n    try:\n        if item_id not in store:\n          \
    \  raise HTTPException(404, \"product not found\")\n        return 200, {\"name\": store[item_id]}\n    except HTTPException\
    \ as exc:\n        return exc.status_code, {\"detail\": exc.detail}\n\nprint(respond(99, {1: \"hat\"}))\n"
  expected:
    kind: stdout
    value: '(404, {''detail'': ''product not found''})'
  hints:
  - '`raise HTTPException` interrupts the handler at the point of the throw: the code after it will not be executed. What
    will the intercept branch return?'
  - 'FastAPI collects the error response body as `{"detail": ...}`, and takes the status from the `status_code` exception.'
  variants:
  - snippet: "class HTTPException(Exception):\n    def __init__(self, status_code, detail):\n        self.status_code = status_code\n\
      \        self.detail = detail\n\ndef respond(is_admin):\n    try:\n        if not is_admin:\n            raise HTTPException(403,\
      \ \"no permissions\")\n        return 200, {\"ok\": True}\n    except HTTPException as exc:\n        return exc.status_code,\
      \ {\"detail\": exc.detail}\n\nprint(respond(False))\n"
    expected:
      kind: stdout
      value: '(403, {''detail'': ''no permissions''})'
  - snippet: "class HTTPException(Exception):\n    def __init__(self, status_code, detail):\n        self.status_code = status_code\n\
      \        self.detail = detail\n\ndef respond(item_id, store):\n    try:\n        if item_id not in store:\n        \
      \    raise HTTPException(404, \"no\")\n        return 200, {\"name\": store[item_id]}\n    except HTTPException as exc:\n\
      \        return exc.status_code, {\"detail\": exc.detail}\n\nprint(respond(1, {1: \"hat\"}))\n"
    expected:
      kind: stdout
      value: '(200, {''name'': ''hat''})'
- id: errors-custom-handler-001
  concept: errors-middleware
  type: theory-quiz
  difficulty: 4
  prompt: The application has a domain exception `ItemNotFound` that is thrown from various places. How can I centrally turn
    it into a 404 response without repeating the `HTTPException` in each handler?
  choices:
  - id: a
    text: 'Register a handler via `@app.exception_handler(ItemNotFound)`: the translation of a domain exception into an HTTP
      status lives in one place.'
  - id: b
    text: Wrap each handler in try/except and manually do `raise HTTPException(404)` - there is no other way.
  - id: c
    text: Place the check in the middleware before `call_next` - only there you can catch the handler exception.
  - id: d
    text: 'No way: FastAPI can only return errors from the built-in `HTTPException`.'
  correct:
  - a
  explanation: For duplicate domain errors, register a handler via `@app.exception_handler(ItemNotFound)`. Then a domain exception
    is thrown from the code, and it is transferred to the desired HTTP status and the body lives in one place - there is no
    need to drag `HTTPException` through all the layers.
  hints:
  - Look for a mechanism that associates the exception type with the function that generates the response - once for the entire
    application.
  - 'This is not middleware or try/except in each handler: FastAPI provides a special decorator for registering an exception
    handler.'
