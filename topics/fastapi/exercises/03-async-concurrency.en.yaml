exercises:
- id: async-when-helps-001
  concept: async-concurrency
  type: theory-quiz
  difficulty: 1
  prompt: What speeds up asynchrony in FastAPI?
  choices:
  - id: a
    text: 'Waiting for I/O: The await event loop switches to another request while this one is waiting.'
  - id: b
    text: 'Pure calculations: loop crunches numbers faster in async def.'
  - id: c
    text: Any code is the same, just due to the async keyword.
  - id: d
    text: Run code on multiple processor cores simultaneously.
  correct:
  - a
  explanation: Async speeds up waiting, not computation. At the await point, the coroutine gives way to loop, which takes
    on another ready task. Number crunching doesn't have await, so it doesn't benefit from async.
  variants:
  - prompt: In the “one cook, many pots” analogy, what does `await` correspond to?
    choices:
    - id: a
      text: '“I put the soup on the fire and went to cut the salad”: the cook does not wait in vain, but does other work.'
    - id: b
      text: '“Hired a second chef”: another execution stream appears.'
    - id: c
      text: '“Stands and looks at the pan”: waits, doing nothing.'
    - id: d
      text: '“Turned off the stove”: stops request processing.'
    correct:
    - a
    explanation: '`await` is “put it on fire and walked away”: while waiting, the loop (cook) is free and serves other tasks.
      There is only one cook - one flow.'
  - prompt: One event loop in one thread gives...
    choices:
    - id: a
      text: 'Concurrency: requests overlap their expectations, but are not executed in parallel across cores.'
    - id: b
      text: 'Parallelism: The code actually runs simultaneously on multiple cores.'
    - id: c
      text: Both concurrency and parallelism at once, without additional processes.
    - id: d
      text: 'Neither one nor the other: one thread processes strictly one request at a time.'
    correct:
    - a
    explanation: One loop in one thread provides concurrency (overlapping expectations), but not parallelism. To use multiple
      cores, multiple worker processes are launched.
- id: async-blocking-trap-001
  concept: async-concurrency
  type: theory-quiz
  difficulty: 2
  prompt: What happens if you put `time.sleep(1)` inside an `async def` handler?
  choices:
  - id: a
    text: 'The Loop will be blocked for a second in the coroutine thread: all other requests will stop - the worst case scenario.'
  - id: b
    text: FastAPI itself will replace it with await asyncio.sleep, the winnings will remain.
  - id: c
    text: 'No big deal: time.sleep is inferior to loop in the same way as await.'
  - id: d
    text: The handler will automatically go into the thread pool and will not interfere with others.
  correct:
  - a
  explanation: '`time.sleep` is a blocking call without await. Inside `async def` it runs on the loop thread itself and freezes
    it for a second: no other request moves. FastAPI puts only synchronous `def` handlers into the thread pool.'
- id: async-fill-handler-001
  concept: async-concurrency
  type: fill-in-blanks
  difficulty: 1
  prompt: Add an asynchronous handler that waits for I/O without blocking loop.
  template: "import asyncio\n\n@app.get(\"/wait\")\n{{kw}} def good():\n    {{await_kw}} asyncio.sleep(1)\n    return {\"\
    ok\": True}\n"
  blanks:
    kw:
      accept:
      - async
    await_kw:
      accept:
      - await
  variants:
  - prompt: Add an asynchronous handler that reads data from the database via await.
    template: "@app.get(\"/items\")\n{{kw}} def read():\n    data = {{await_kw}} fetch_from_db()\n    return data\n"
    blanks:
      kw:
        accept:
        - async
      await_kw:
        accept:
        - await
  - prompt: Add a synchronous handler with a blocking library - FastAPI will move it to the thread pool.
    template: "@app.get(\"/sync\")\n{{kw}} def handler_sync():\n    data = blocking_db_call()\n    return data\n"
    blanks:
      kw:
        accept:
        - def
        accept_regex: ^def$
- id: async-predict-coro-001
  concept: async-concurrency
  type: predict-output
  difficulty: 2
  prompt: What will the program output? Note the type of the object before await.
  snippet: "import asyncio\n\nasync def get_value():\n    return 42\n\nasync def main():\n    coro = get_value()\n    print(type(coro).__name__)\n\
    \    result = await coro\n    print(result)\n\nasyncio.run(main())\n"
  expected:
    kind: stdout
    value: 'coroutine

      42'
  hints:
  - Calling an asynchronous function without await does not run its body - it returns a “promise” object. What is the name
    of this object?
  - Only await causes the coroutine to execute and return the result. Before await, `coro` is the coroutine object itself.
  variants:
  - snippet: "import asyncio\n\nasync def producer():\n    return [1, 2, 3]\n\nasync def main():\n    data = await producer()\n\
      \    print(sum(data), len(data))\n\nasyncio.run(main())\n"
    expected:
      kind: stdout
      value: 6 3
  - snippet: "import asyncio\n\nasync def double(n):\n    await asyncio.sleep(0)\n    return n * 2\n\nasync def main():\n\
      \    print(await asyncio.gather(double(10), double(20)))\n\nasyncio.run(main())\n"
    expected:
      kind: stdout
      value: '[20, 40]'
- id: async-predict-interleave-001
  concept: async-concurrency
  type: predict-output
  difficulty: 3
  prompt: What will the program output? Two coroutines are running simultaneously and each yields a loop to await.
  snippet: "import asyncio\n\nevents = []\n\nasync def request(name):\n    events.append(name + \"-recv\")\n    await asyncio.sleep(0)\n\
    \    events.append(name + \"-done\")\n\nasync def main():\n    await asyncio.gather(request(\"A\"), request(\"B\"))\n\
    \    print(events)\n\nasyncio.run(main())\n"
  expected:
    kind: stdout
    value: '[''A-recv'', ''B-recv'', ''A-done'', ''B-done'']'
  hints:
  - Each coroutine at the await point yields to loop, and it takes the next ready one. Will B have time to start before A
    reaches his “-done”?
  - Both reach await before either continues. Therefore, both "-recvs" come before any "-done", in the order of execution.
  variants:
  - snippet: "import asyncio\n\norder = []\n\nasync def task(name):\n    order.append(name + \"-start\")\n    await asyncio.sleep(0)\n\
      \    order.append(name + \"-end\")\n\nasync def main():\n    await asyncio.gather(task(\"X\"), task(\"Y\"))\n    print(order)\n\
      \nasyncio.run(main())\n"
    expected:
      kind: stdout
      value: '[''X-start'', ''Y-start'', ''X-end'', ''Y-end'']'
  - snippet: "import asyncio\n\nlog = []\n\nasync def step(name):\n    log.append(name)\n\nasync def main():\n    await step(\"\
      one\")\n    await step(\"two\")\n    print(log)\n\nasyncio.run(main())\n"
    expected:
      kind: stdout
      value: '[''one'', ''two'']'
- id: async-choose-form-001
  concept: async-concurrency
  type: predict-output
  difficulty: 3
  prompt: What will the program output? It formalizes the rule for choosing between def and async def.
  snippet: "def choose_handler(uses_await, blocking):\n    if uses_await:\n        return \"async def\"\n    if blocking:\n\
    \        return \"def (thread pool)\"\n    return \"def\"\n\nprint(choose_handler(True, False))\nprint(choose_handler(False,\
    \ True))\n"
  expected:
    kind: stdout
    value: 'async def

      def (thread pool)'
  hints:
  - 'Rule: there is a real await on I/O - async def; a blocking library is used - a regular def, which FastAPI will transfer
    to the thread pool.'
  - 'First call: there is await. Second: there is no await, but there is a blocking call.'
- id: async-cpu-bound-001
  concept: async-concurrency
  type: theory-quiz
  difficulty: 4
  prompt: Heavy purely computational password hashing with a slow algorithm must be called in the FastAPI handler. Where should
    I put it?
  choices:
  - id: a
    text: 'In a synchronous def handler (or a remote executor): without await, the loop will get stuck on the account, and
      the FastAPI def will execute in the thread pool.'
  - id: b
    text: 'In async def no changes: async will automatically parallelize the calculation across cores.'
  - id: c
    text: In async def, wrapping the calculation in await will make the calculation non-blocking.
  - id: d
    text: 'Anywhere: CPU-bound code behaves the same in def and async def.'
  correct:
  - a
  explanation: Pure evaluation has no await points, so in `async def` it will freeze the loop and serialize all requests.
    The place of such a task is a synchronous `def` (thread pool) or a separate executor. Async speeds up I/O, and the CPU-bound
    load is scaled by processes, not coroutines.
  hints:
  - 'Ask yourself: does this calculation contain an await point? If not, what happens to the loop while it''s counting?'
  - 'FastAPI runs def and async def differently: one in the thread pool, the other directly in the loop thread. Which one
    is safe for blocking work?'
