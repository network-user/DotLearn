exercises:
  - id: fastapi-source-rules-001
    concept: fastapi-basics
    type: theory-quiz
    difficulty: 1
    prompt: "Откуда FastAPI берёт значение параметра `q: str | None = None` в обработчике `@app.get(\"/items/{item_id}\")`?"
    choices:
      - id: a
        text: "Из query string: имя `q` не упомянуто в пути, а тип примитивный."
      - id: b
        text: "Из path: любой строковый параметр считается частью адреса."
      - id: c
        text: "Из тела запроса, потому что у `q` есть значение по умолчанию."
      - id: d
        text: "Из заголовков запроса, так как тип `str`."
    correct: [a]
    explanation: "Параметр с примитивным типом, имя которого не совпало с фигурной скобкой пути, FastAPI ищет в query string. `item_id` в пути - path-параметр, а `q` остаётся query."
    variants:
      - prompt: "Откуда FastAPI берёт значение параметра `item: Item`, где `Item` - это Pydantic-модель?"
        choices:
          - id: a
            text: "Из тела запроса: модель в сигнатуре переключает источник на JSON-тело."
          - id: b
            text: "Из query string, по одному query-параметру на каждое поле модели."
          - id: c
            text: "Из пути, если имя `item` встречается в шаблоне маршрута."
          - id: d
            text: "Из значения по умолчанию класса `Item`."
        correct: [a]
        explanation: "Когда тип параметра - Pydantic-модель, FastAPI читает тело запроса как JSON и собирает из него объект модели."
      - prompt: "Откуда FastAPI берёт значение `item_id` в `@app.get(\"/items/{item_id}\")` с сигнатурой `def read(item_id: int)`?"
        choices:
          - id: a
            text: "Из пути: имя параметра совпало с фигурной скобкой в шаблоне маршрута."
          - id: b
            text: "Из query string, потому что тип `int` примитивный."
          - id: c
            text: "Из тела запроса, так как у `int` нет значения по умолчанию."
          - id: d
            text: "Из cookies по имени `item_id`."
        correct: [a]
        explanation: "Совпадение имени параметра с `{item_id}` в пути делает его path-параметром - первое из трёх правил определения источника."

  - id: fastapi-required-query-001
    concept: fastapi-basics
    type: theory-quiz
    difficulty: 2
    prompt: "Чем `skip: int = 0` отличается от `skip: int` для query-параметра?"
    choices:
      - id: a
        text: "С `= 0` параметр необязателен и подставит 0, если его нет; без дефолта он обязателен, и его отсутствие даёт 422."
      - id: b
        text: "Ничем: оба варианта обязательны, дефолт лишь подсказка для документации."
      - id: c
        text: "С `= 0` параметр становится path-параметром, без дефолта - query."
      - id: d
        text: "Без дефолта параметр всегда равен None, если клиент его не прислал."
    correct: [a]
    explanation: "Значение по умолчанию - граница между обязательным и опциональным query-параметром. Без него отсутствие значения в запросе приводит к 422 ещё до вызова обработчика."

  - id: fastapi-fill-decorator-001
    concept: fastapi-basics
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите обработчик, который принимает `item_id` из пути и возвращает его."
    template: |
      from fastapi import FastAPI

      app = FastAPI()

      @app.{{method}}("/items/{item_id}")
      def read_item(item_id: {{annotation}}):
          return {"item_id": item_id}
    blanks:
      method:
        accept: ["get"]
      annotation:
        accept: ["int"]
    variants:
      - prompt: "Допишите обработчик, создающий ресурс из JSON-тела модели `Item`."
        template: |
          from fastapi import FastAPI
          from pydantic import BaseModel

          class Item(BaseModel):
              name: str

          app = FastAPI()

          @app.{{method}}("/items/")
          def create_item(item: {{annotation}}):
              return {"name": item.name}
        blanks:
          method:
            accept: ["post"]
          annotation:
            accept: ["Item"]
      - prompt: "Допишите обработчик списка с необязательным query-параметром `limit`."
        template: |
          from fastapi import FastAPI

          app = FastAPI()

          @app.get("/items/")
          def list_items(limit: int {{default}}):
              return {"limit": limit}
        blanks:
          default:
            accept: ["= 10", "=10"]
            accept_regex: '^=\s*\d+$'

  - id: fastapi-predict-coerce-001
    concept: fastapi-basics
    type: predict-output
    difficulty: 2
    prompt: "Что выведет эта программа? Она повторяет приведение path-параметра к int, которое делает FastAPI."
    snippet: |
      def coerce(item_id):
          return int(item_id)

      print(coerce("42") + 1)
    expected:
      kind: stdout
      value: "43"
    hints:
      - "Аннотация `int` у path-параметра - это инструкция на приведение строки из URL к числу. Что получится из строки `\"42\"` после такого приведения?"
      - "После приведения `item_id` - это число, а не строка. К нему уже можно прибавить 1 как к числу."
    variants:
      - snippet: |
          def parse_bool(raw):
              return raw in ("1", "true", "yes", "on")

          print(parse_bool("1"), parse_bool("2"))
        expected:
          kind: stdout
          value: "True False"
      - snippet: |
          def list_items(skip=0, limit=10):
              return {"skip": skip, "limit": limit}

          print(list_items(limit=5))
        expected:
          kind: stdout
          value: "{'skip': 0, 'limit': 5}"

  - id: fastapi-predict-merge-001
    concept: fastapi-basics
    type: predict-output
    difficulty: 3
    prompt: "Что выведет эта программа? Она моделирует подстановку дефолтов для query-параметров: клиент прислал только `limit`."
    snippet: |
      defaults = {"skip": 0, "limit": 10}
      query = {"limit": "5"}
      result = {**defaults, **{k: int(v) for k, v in query.items()}}
      print(result)
    expected:
      kind: stdout
      value: "{'skip': 0, 'limit': 5}"
    hints:
      - "Параметр с дефолтом подставляет своё значение, когда клиент его не прислал, а присланное значение - перекрывает дефолт. Какие ключи останутся со значениями по умолчанию?"
      - "Сначала берутся все дефолты, затем поверх них ложатся присланные значения, приведённые к int. `skip` клиент не прислал - он остаётся дефолтным."
    variants:
      - snippet: |
          defaults = {"page": 1, "size": 20}
          query = {"page": "3"}
          result = {**defaults, **{k: int(v) for k, v in query.items()}}
          print(result)
        expected:
          kind: stdout
          value: "{'page': 3, 'size': 20}"
      - snippet: |
          defaults = {"sort": "id", "order": "asc"}
          query = {"order": "desc"}
          result = {**defaults, **query}
          print(result)
        expected:
          kind: stdout
          value: "{'sort': 'id', 'order': 'desc'}"

  - id: fastapi-mixed-sources-001
    concept: fastapi-basics
    type: theory-quiz
    difficulty: 3
    prompt: "Для `@app.put(\"/items/{item_id}\")` с сигнатурой `def update(item_id: int, item: Item, q: str = None)`: как распределятся источники?"
    choices:
      - id: a
        text: "`item_id` из пути, `item` из тела запроса, `q` из query string."
      - id: b
        text: "Все три из тела запроса, потому что метод PUT."
      - id: c
        text: "`item_id` и `q` из query, `item` из пути."
      - id: d
        text: "Источник определяется порядком параметров: первый - path, второй - query, третий - body."
    correct: [a]
    explanation: "Источник определяется правилами, а не позицией: `item_id` совпал с путём (path), `item` - модель (тело), `q` - примитив вне пути (query). Один обработчик свободно смешивает все три источника."
    hints:
      - "Применяйте три правила к каждому параметру по отдельности: совпало с путём, примитив вне пути, или модель?"
      - "Порядок параметров в функции на источник не влияет - смотрите на имя и тип каждого."

  - id: fastapi-path-converter-001
    concept: fastapi-basics
    type: theory-quiz
    difficulty: 3
    prompt: "Почему запрос `GET /files/docs/intro.txt` не совпадёт с маршрутом `@app.get(\"/files/{file_path}\")`?"
    choices:
      - id: a
        text: "Слэш считается границей сегмента пути, поэтому `{file_path}` без конвертера не захватит значение со слэшами; нужен `{file_path:path}`."
      - id: b
        text: "FastAPI запрещает точки в path-параметрах, мешает `.txt`."
      - id: c
        text: "Path-параметры обязаны быть числами, а тут строка."
      - id: d
        text: "Совпадёт без проблем: слэши в path-параметрах разрешены по умолчанию."
    correct: [a]
    explanation: "По умолчанию path-параметр захватывает один сегмент - до ближайшего слэша. Чтобы принять путь со слэшами, в шаблоне указывают конвертер `{file_path:path}`."
    hints:
      - "Подумайте, как роутер разбивает URL на части: что для него служит границей между сегментами?"
      - "Существует специальный конвертер, который снимает ограничение «один сегмент» для path-параметра."
