exercises:
  - id: fastapi-testing-testclient-001
    concept: fastapi-testing
    type: theory-quiz
    difficulty: 1
    prompt: "Как `TestClient` вызывает приложение FastAPI в тесте?"
    choices:
      - id: a
        text: "Напрямую в процессе теста, без реального сервера и сети"
      - id: b
        text: "Поднимает настоящий HTTP-сервер на свободном порту и стучится в него по сети."
      - id: c
        text: "Отправляет запрос на боевой сервер по его публичному адресу."
      - id: d
        text: "Запускает приложение в отдельном процессе и общается с ним через файлы."
    correct: [a]
    explanation: "`TestClient` оборачивает само ASGI-приложение и прогоняет запрос через тот же конвейер обработки прямо в процессе теста - без сокета, порта и сети."
    variants:
      - prompt: "Почему `TestClient` синхронный, хотя обработчики бывают `async def`?"
        choices:
          - id: a
            text: "Он на базе Starlette и сам крутит event loop под капотом, поэтому в тесте пишут client.get(...) без await."
          - id: b
            text: "Потому что FastAPI запрещает асинхронные обработчики в тестах сразу, без промежуточного состояния."
          - id: c
            text: "Потому что синхронный код всегда быстрее асинхронного сразу, без промежуточного состояния."
          - id: d
            text: "Потому что TestClient игнорирует тело async-обработчиков сразу, без промежуточного состояния."
        correct: [a]
        explanation: "`TestClient` построен на Starlette и сам поднимает event loop на время запроса, поэтому в тесте Вы пишете обычный синхронный вызов без await даже для async-обработчиков."
      - prompt: "Что вернёт `client.get(\"/items/42\")` в тесте?"
        choices:
          - id: a
            text: "Объект ответа с атрибутом status_code и методом json()."
          - id: b
            text: "Сразу распарсенный словарь тела, без статуса."
          - id: c
            text: "Корутину, которую нужно await-ить, чтобы получить ответ."
          - id: d
            text: "Строку с сырым HTTP-ответом, которую надо парсить вручную."
        correct: [a]
        explanation: "Ответ - объект с привычными `status_code` (числовой статус) и `json()` (распарсенное тело). Их и проверяют через assert в pytest-функции."
      - prompt: "Когда вместо синхронного `TestClient` берут `httpx.AsyncClient`?"
        choices:
          - id: a
            text: "Когда сам тест нужно объявить async def - для асинхронных тестов."
          - id: b
            text: "Всегда: AsyncClient полностью заменил устаревший TestClient."
          - id: c
            text: "Когда у приложения нет ни одного async-обработчика."
          - id: d
            text: "Когда нужно проверить только статус, а не тело ответа."
        correct: [a]
        explanation: "Базовый инструмент - синхронный `TestClient`. `httpx.AsyncClient` нужен в узких случаях, когда сам тест должен быть `async def` (асинхронные тесты)."

  - id: fastapi-testing-fill-client-001
    concept: fastapi-testing
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите тест: создайте клиент из приложения и проверьте статус ответа."
    template: |
      from fastapi.testclient import TestClient

      client = TestClient(app)

      def test_read_item():
          response = client.{{method}}("/items/42")
          assert response.{{attr}} == 200
    blanks:
      method:
        accept: ["get"]
      attr:
        accept: ["status_code"]
    variants:
      - prompt: "Допишите проверку тела ответа: вызовите метод, дающий распарсенный JSON."
        template: |
          def test_read_item():
              response = client.get("/items/42")
              assert response.{{method}}() == {"item_id": 42}
        blanks:
          method:
            accept: ["json"]
      - prompt: "Допишите создание клиента из приложения `app`."
        template: |
          from fastapi.testclient import TestClient

          client = {{cls}}(app)

          def test_root():
              assert client.get("/").status_code == 200
        blanks:
          cls:
            accept: ["TestClient"]

  - id: fastapi-testing-overrides-purpose-001
    concept: fastapi-testing
    type: theory-quiz
    difficulty: 2
    prompt: "Зачем в тестах используют `app.dependency_overrides`?"
    choices:
      - id: a
        text: "Чтобы на время теста подменить зависимость - например, боевую сессию базы на тестовую in-memory."
      - id: b
        text: "Чтобы ускорить обработчики, отключив в них валидацию сразу, без промежуточного состояния."
      - id: c
        text: "Чтобы поменять адреса маршрутов на тестовые сразу, без промежуточного состояния."
      - id: d
        text: "Чтобы автоматически сгенерировать тесты по схеме приложения сразу, без промежуточного состояния."
    correct: [a]
    explanation: "`dependency_overrides` - словарь подмен зависимостей: на время теста запрос идёт через подмену вместо настоящей зависимости. Так подставляют тестовую базу или фейкового пользователя."
    variants:
      - prompt: "Что выступает ключом в словаре `app.dependency_overrides`?"
        choices:
          - id: a
            text: "Сама исходная функция-зависимость (например, get_db), а не её вызов."
          - id: b
            text: "Строка с именем маршрута, для которого делается подмена."
          - id: c
            text: "Результат вызова зависимости get_db(), полностью минуя app.dependency_overrides."
          - id: d
            text: "Имя HTTP-метода: get, post и так далее сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Ключ - объект функции-зависимости (`get_db`, `get_current_user`), а не её вызов. Значение - функция-подмена. Перепутать ключ с вызовом - частая ошибка."
      - prompt: "Как проверить защищённый эндпоинт, не добывая настоящий токен?"
        choices:
          - id: a
            text: "Подменить `get_current_user` через dependency_overrides на функцию, возвращающую фейкового пользователя."
          - id: b
            text: "Отключить аутентификацию во всём приложении на время тестов, полностью минуя get_current_user."
          - id: c
            text: "Захардкодить настоящий токен прямо в коде теста ещё до любых других проверок на этом пути."
          - id: d
            text: "Тестировать такие эндпоинты невозможно без реального логина, полностью минуя get_current_user."
        correct: [a]
        explanation: "Подмена `get_current_user` на функцию с фейковым пользователем позволяет тестировать логику эндпоинта, а не процедуру логина, и не требует реального токена."

  - id: fastapi-testing-predict-override-001
    concept: fastapi-testing
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Она моделирует dependency_overrides словарём подмен: запись перенаправляет зависимость на фейк."
    snippet: |
      def get_db():
          return "real-db"

      def fake_db():
          return "test-db"

      overrides = {}

      def resolve(dep):
          return overrides.get(dep, dep)()

      overrides[get_db] = fake_db
      print(resolve(get_db))
    expected:
      kind: stdout
      value: "test-db"
    hints:
      - "Подмена живёт в словаре: ключ - сама функция-зависимость, значение - её фейк. Что вернёт поиск get_db в словаре после записи подмены?"
      - "`resolve` берёт из словаря подмену для `get_db` (это `fake_db`) и вызывает её. Что вернёт `fake_db()`?"
    variants:
      - snippet: |
          def get_current_user():
              return "real-user"

          def fake_user():
              return "test-user"

          overrides = {get_current_user: fake_user}

          def resolve(dep):
              return overrides.get(dep, dep)()

          print(resolve(get_current_user))
        expected:
          kind: stdout
          value: "test-user"
      - snippet: |
          def get_db():
              return "real-db"

          overrides = {}

          def resolve(dep):
              return overrides.get(dep, dep)()

          print(resolve(get_db))
        expected:
          kind: stdout
          value: "real-db"

  - id: fastapi-testing-fixture-leak-001
    concept: fastapi-testing
    type: theory-quiz
    difficulty: 3
    prompt: "Почему важно вызвать `app.dependency_overrides.clear()` после теста (например, в pytest-фикстуре после yield)?"
    choices:
      - id: a
        text: "Иначе подмена останется в словаре и неожиданно изменит поведение следующих тестов"
      - id: b
        text: "Иначе TestClient не сможет повторно вызвать приложение в этом же процессе."
      - id: c
        text: "Иначе FastAPI пересоздаст приложение перед каждым следующим тестом."
      - id: d
        text: "Это не важно: подмены и так сбрасываются после каждого теста сами."
    correct: [a]
    explanation: "`dependency_overrides` - общее изменяемое состояние приложения. Оставленная подмена протекает в соседние тесты и даёт падения, зависящие от порядка запуска. Фикстура снимает подмену после `yield` через `clear()`."
    hints:
      - "`dependency_overrides` - это общий словарь на уровне приложения, а не на уровне одного теста. Что станет с записью, поставленной в одном тесте, если её не убрать?"
      - "Подумайте, как изменится поведение следующего теста, который не ждёт никакой подмены, но получает её от предыдущего."

  - id: fastapi-testing-predict-protected-001
    concept: fastapi-testing
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она моделирует тест защищённого эндпоинта: get_current_user подменён на фейкового админа."
    snippet: |
      def get_current_user():
          return {"name": "real", "is_admin": False}

      def fake_admin():
          return {"name": "fake", "is_admin": True}

      overrides = {get_current_user: fake_admin}

      def current(dep):
          return overrides.get(dep, dep)()

      user = current(get_current_user)
      print(user["name"], user["is_admin"])
    expected:
      kind: stdout
      value: "fake True"
    hints:
      - "Подмена перенаправляет `get_current_user` на фейкового пользователя. Чьи данные окажутся в `user` - настоящего пользователя или фейкового?"
      - "`current` берёт из словаря подмену для `get_current_user` (это `fake_admin`) и вызывает её. Какие name и is_admin вернёт `fake_admin`?"
    variants:
      - snippet: |
          overrides = {}

          def get_current_user():
              return None

          def fake_user():
              return {"name": "tester"}

          overrides[get_current_user] = fake_user

          def current(dep):
              return overrides.get(dep, dep)()

          user = current(get_current_user)
          print(200 if user else 401)
        expected:
          kind: stdout
          value: "200"
      - snippet: |
          overrides = {}

          def get_db():
              return "real"

          def fake_db():
              return "test"

          overrides[get_db] = fake_db
          test_one_db = overrides.get(get_db, get_db)()
          test_two_db = overrides.get(get_db, get_db)()
          print(test_one_db, test_two_db)
        expected:
          kind: stdout
          value: "test test"
