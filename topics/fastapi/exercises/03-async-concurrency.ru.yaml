exercises:
  - id: async-when-helps-001
    concept: async-concurrency
    type: theory-quiz
    difficulty: 1
    prompt: "Что ускоряет асинхронность в FastAPI?"
    choices:
      - id: a
        text: "Ожидание ввода-вывода: на await event loop переключается на другой запрос, пока этот ждёт."
      - id: b
        text: "Чистые вычисления: цикл перемалывает числа быстрее в async def."
      - id: c
        text: "Любой код одинаково, просто за счёт ключевого слова async."
      - id: d
        text: "Запуск кода на нескольких ядрах процессора одновременно."
    correct: [a]
    explanation: "Async ускоряет ожидание, а не вычисления. В точке await корутина уступает loop, и тот берёт другую готовую задачу. Перемалывание чисел не содержит await, поэтому от async не выигрывает."
    variants:
      - prompt: "В аналогии «один повар, много кастрюль» чему соответствует `await`?"
        choices:
          - id: a
            text: "«Поставил суп на огонь и отошёл резать салат»: повар не ждёт впустую, а делает другую работу."
          - id: b
            text: "«Нанял второго повара»: появляется ещё один поток исполнения."
          - id: c
            text: "«Стоит и смотрит на кастрюлю»: ждёт, ничего не делая."
          - id: d
            text: "«Выключил плиту»: останавливает обработку запроса."
        correct: [a]
        explanation: "`await` - это «поставил на огонь и отошёл»: на время ожидания loop (повар) свободен и обслуживает другие задачи. Повар при этом один - один поток."
      - prompt: "Один event loop в одном потоке даёт..."
        choices:
          - id: a
            text: "Конкурентность: запросы перекрывают свои ожидания, но исполняются не параллельно по ядрам."
          - id: b
            text: "Параллелизм: код реально выполняется одновременно на нескольких ядрах."
          - id: c
            text: "И конкурентность, и параллелизм сразу, без дополнительных процессов."
          - id: d
            text: "Ни того ни другого: один поток обрабатывает строго по одному запросу за раз."
        correct: [a]
        explanation: "Один loop в одном потоке даёт конкурентность (перекрытие ожиданий), но не параллелизм. Чтобы задействовать несколько ядер, запускают несколько процессов-воркеров."

  - id: async-blocking-trap-001
    concept: async-concurrency
    type: theory-quiz
    difficulty: 2
    prompt: "Что произойдёт, если поставить `time.sleep(1)` внутри `async def`-обработчика?"
    choices:
      - id: a
        text: "Loop заблокируется на секунду в потоке корутины: все остальные запросы встанут - худший вариант."
      - id: b
        text: "FastAPI сам заменит его на await asyncio.sleep, выигрыш сохранится."
      - id: c
        text: "Ничего страшного: time.sleep уступает loop так же, как await."
      - id: d
        text: "Обработчик автоматически уйдёт в пул потоков и не помешает другим."
    correct: [a]
    explanation: "`time.sleep` - блокирующий вызов без await. Внутри `async def` он выполняется в самом потоке loop и замораживает его на секунду: ни один другой запрос не двигается. В пул потоков FastAPI выносит только синхронные `def`-обработчики."

  - id: async-fill-handler-001
    concept: async-concurrency
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите асинхронный обработчик, ожидающий ввод-вывод без блокировки loop."
    template: |
      import asyncio

      @app.get("/wait")
      {{kw}} def good():
          {{await_kw}} asyncio.sleep(1)
          return {"ok": True}
    blanks:
      kw:
        accept: ["async"]
      await_kw:
        accept: ["await"]
    variants:
      - prompt: "Допишите асинхронный обработчик, читающий данные из базы через await."
        template: |
          @app.get("/items")
          {{kw}} def read():
              data = {{await_kw}} fetch_from_db()
              return data
        blanks:
          kw:
            accept: ["async"]
          await_kw:
            accept: ["await"]
      - prompt: "Допишите синхронный обработчик с блокирующей библиотекой - FastAPI вынесет его в пул потоков."
        template: |
          @app.get("/sync")
          {{kw}} def handler_sync():
              data = blocking_db_call()
              return data
        blanks:
          kw:
            accept: ["def"]
            accept_regex: '^def$'

  - id: async-predict-coro-001
    concept: async-concurrency
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Обратите внимание на тип объекта до await."
    snippet: |
      import asyncio

      async def get_value():
          return 42

      async def main():
          coro = get_value()
          print(type(coro).__name__)
          result = await coro
          print(result)

      asyncio.run(main())
    expected:
      kind: stdout
      value: "coroutine\n42"
    hints:
      - "Вызов асинхронной функции без await не запускает её тело - он возвращает объект-«обещание». Как называется этот объект?"
      - "Только await заставляет корутину выполниться и отдать результат. До await `coro` - это сам объект корутины."
    variants:
      - snippet: |
          import asyncio

          async def producer():
              return [1, 2, 3]

          async def main():
              data = await producer()
              print(sum(data), len(data))

          asyncio.run(main())
        expected:
          kind: stdout
          value: "6 3"
      - snippet: |
          import asyncio

          async def double(n):
              await asyncio.sleep(0)
              return n * 2

          async def main():
              print(await asyncio.gather(double(10), double(20)))

          asyncio.run(main())
        expected:
          kind: stdout
          value: "[20, 40]"

  - id: async-predict-interleave-001
    concept: async-concurrency
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Две корутины запущены одновременно и каждая уступает loop на await."
    snippet: |
      import asyncio

      events = []

      async def request(name):
          events.append(name + "-recv")
          await asyncio.sleep(0)
          events.append(name + "-done")

      async def main():
          await asyncio.gather(request("A"), request("B"))
          print(events)

      asyncio.run(main())
    expected:
      kind: stdout
      value: "['A-recv', 'B-recv', 'A-done', 'B-done']"
    hints:
      - "Каждая корутина в точке await уступает loop, и тот берёт следующую готовую. Успеет ли B стартовать раньше, чем A дойдёт до своего «-done»?"
      - "Обе доходят до await до того, как любая из них продолжит. Поэтому оба «-recv» идут раньше любого «-done», в порядке запуска."
    variants:
      - snippet: |
          import asyncio

          order = []

          async def task(name):
              order.append(name + "-start")
              await asyncio.sleep(0)
              order.append(name + "-end")

          async def main():
              await asyncio.gather(task("X"), task("Y"))
              print(order)

          asyncio.run(main())
        expected:
          kind: stdout
          value: "['X-start', 'Y-start', 'X-end', 'Y-end']"
      - snippet: |
          import asyncio

          log = []

          async def step(name):
              log.append(name)

          async def main():
              await step("one")
              await step("two")
              print(log)

          asyncio.run(main())
        expected:
          kind: stdout
          value: "['one', 'two']"

  - id: async-choose-form-001
    concept: async-concurrency
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она формализует правило выбора между def и async def."
    snippet: |
      def choose_handler(uses_await, blocking):
          if uses_await:
              return "async def"
          if blocking:
              return "def (пул потоков)"
          return "def"

      print(choose_handler(True, False))
      print(choose_handler(False, True))
    expected:
      kind: stdout
      value: "async def\ndef (пул потоков)"
    hints:
      - "Правило: есть настоящий await на I/O - async def; используется блокирующая библиотека - обычный def, который FastAPI вынесет в пул потоков."
      - "Первый вызов: есть await. Второй: await нет, но есть блокирующий вызов."

  - id: async-cpu-bound-001
    concept: async-concurrency
    type: theory-quiz
    difficulty: 4
    prompt: "Тяжёлое чисто вычислительное хеширование пароля медленным алгоритмом нужно вызвать в обработчике FastAPI. Куда его поместить?"
    choices:
      - id: a
        text: "В синхронный def-обработчик (или вынесенный исполнитель): без await loop застрянет на счёте, а def FastAPI выполнит в пуле потоков."
      - id: b
        text: "В async def без изменений: async автоматически распараллелит вычисление по ядрам."
      - id: c
        text: "В async def, обернув вычисление в await - это сделает счёт неблокирующим."
      - id: d
        text: "Куда угодно: CPU-bound код одинаково ведёт себя в def и async def."
    correct: [a]
    explanation: "У чистого вычисления нет точек await, поэтому в `async def` оно заморозит loop и сериализует все запросы. Место такой задачи - синхронный `def` (пул потоков) либо отдельный исполнитель. Async ускоряет I/O, а CPU-bound нагрузку масштабируют процессами, а не корутинами."
    hints:
      - "Спросите себя: содержит ли это вычисление точки await? Если нет, что станет с loop, пока оно считает?"
      - "FastAPI по-разному запускает def и async def: один - в пуле потоков, другой - прямо в потоке loop. Какой из них безопасен для блокирующей работы?"
