exercises:
  - id: fastapi-source-rules-001
    concept: fastapi-basics
    type: theory-quiz
    difficulty: 1
    prompt: "Where does FastAPI get the value of parameter `q: str | None = None` in a handler decorated with `@app.get(\"/items/{item_id}\")`?"
    choices:
      - id: a
        text: "From the query string: name `q` is not in the path and the type is primitive."
      - id: b
        text: "From the path: any string parameter is treated as part of the address."
      - id: c
        text: "From the request body, because `q` has a default value."
      - id: d
        text: "From request headers, because the type is `str`."
    correct: [a]
    explanation: "A parameter with a primitive type whose name does not match a path brace is looked up in the query string. `item_id` in the path is a path parameter; `q` stays a query parameter."
    variants:
      - prompt: "Where does FastAPI get the value of parameter `item: Item`, where `Item` is a Pydantic model?"
        choices:
          - id: a
            text: "From the request body: a model in the signature switches the source to JSON body."
          - id: b
            text: "From the query string, one query parameter per model field."
          - id: c
            text: "From the path if the name `item` appears in the route template."
          - id: d
            text: "From the class `Item` default value."
        correct: [a]
        explanation: "When the parameter type is a Pydantic model, FastAPI reads the request body as JSON and builds a model instance from it."
      - prompt: "Where does FastAPI get `item_id` in `@app.get(\"/items/{item_id}\")` with signature `def read(item_id: int)`?"
        choices:
          - id: a
            text: "From the path: the parameter name matched a brace in the route template."
          - id: b
            text: "From the query string, because `int` is primitive."
          - id: c
            text: "From the request body, because `int` has no default."
          - id: d
            text: "From cookies named `item_id`."
        correct: [a]
        explanation: "Matching the parameter name to `{item_id}` in the path makes it a path parameter — the first of the three source rules."

  - id: fastapi-required-query-001
    concept: fastapi-basics
    type: theory-quiz
    difficulty: 2
    prompt: "How does `skip: int = 0` differ from `skip: int` for a query parameter?"
    choices:
      - id: a
        text: "With `= 0` the parameter is optional and defaults to 0 if missing; without a default it is required, and absence yields 422."
      - id: b
        text: "No difference: both are required; the default is only documentation."
      - id: c
        text: "With `= 0` it becomes a path parameter; without a default it is query."
      - id: d
        text: "Without a default it is always None if the client does not send it."
    correct: [a]
    explanation: "A default value is the boundary between required and optional query parameters. Without it, a missing value in the request leads to 422 before the handler runs."

  - id: fastapi-fill-decorator-001
    concept: fastapi-basics
    type: fill-in-blanks
    difficulty: 1
    prompt: "Complete the handler that takes `item_id` from the path and returns it."
    template: |
      from fastapi import FastAPI

      app = FastAPI()

      @app.{{method}}("/items/{item_id}")
      def read_item(item_id: {{annotation}}):
          return {"item_id": item_id}
    blanks:
      method:
        accept: ["get"]
      annotation:
        accept: ["int"]
    variants:
      - prompt: "Complete the handler that creates a resource from JSON body model `Item`."
        template: |
          from fastapi import FastAPI
          from pydantic import BaseModel

          class Item(BaseModel):
              name: str

          app = FastAPI()

          @app.{{method}}("/items/")
          def create_item(item: {{annotation}}):
              return {"name": item.name}
        blanks:
          method:
            accept: ["post"]
          annotation:
            accept: ["Item"]
      - prompt: "Complete the list handler with optional query parameter `limit`."
        template: |
          from fastapi import FastAPI

          app = FastAPI()

          @app.get("/items/")
          def list_items(limit: int {{default}}):
              return {"limit": limit}
        blanks:
          default:
            accept: ["= 10", "=10"]
            accept_regex: '^=\s*\d+$'

  - id: fastapi-predict-coerce-001
    concept: fastapi-basics
    type: predict-output
    difficulty: 2
    prompt: "What does this program print? It mirrors path-parameter coercion to int that FastAPI performs."
    snippet: |
      def coerce(item_id):
          return int(item_id)

      print(coerce("42") + 1)
    expected:
      kind: stdout
      value: "43"
    hints:
      - "The `int` annotation on a path parameter is a coercion instruction. What do you get from string `\"42\"` after that?"
      - "After coercion `item_id` is a number, not a string. You can add 1 to it as a number."
    variants:
      - snippet: |
          def parse_bool(raw):
              return raw in ("1", "true", "yes", "on")

          print(parse_bool("1"), parse_bool("2"))
        expected:
          kind: stdout
          value: "True False"
      - snippet: |
          def list_items(skip=0, limit=10):
              return {"skip": skip, "limit": limit}

          print(list_items(limit=5))
        expected:
          kind: stdout
          value: "{'skip': 0, 'limit': 5}"

  - id: fastapi-predict-merge-001
    concept: fastapi-basics
    type: predict-output
    difficulty: 3
    prompt: "What does this program print? It models default substitution for query parameters: the client only sent `limit`."
    snippet: |
      defaults = {"skip": 0, "limit": 10}
      query = {"limit": "5"}
      result = {**defaults, **{k: int(v) for k, v in query.items()}}
      print(result)
    expected:
      kind: stdout
      value: "{'skip': 0, 'limit': 5}"
    hints:
      - "A parameter with a default uses that value when the client omits it; a sent value overrides the default. Which keys keep their defaults?"
      - "Start with all defaults, then overlay sent values coerced to int. The client did not send `skip` — it stays default."
    variants:
      - snippet: |
          defaults = {"page": 1, "size": 20}
          query = {"page": "3"}
          result = {**defaults, **{k: int(v) for k, v in query.items()}}
          print(result)
        expected:
          kind: stdout
          value: "{'page': 3, 'size': 20}"
      - snippet: |
          defaults = {"sort": "id", "order": "asc"}
          query = {"order": "desc"}
          result = {**defaults, **query}
          print(result)
        expected:
          kind: stdout
          value: "{'sort': 'id', 'order': 'desc'}"

  - id: fastapi-mixed-sources-001
    concept: fastapi-basics
    type: theory-quiz
    difficulty: 3
    prompt: "For `@app.put(\"/items/{item_id}\")` with signature `def update(item_id: int, item: Item, q: str = None)`: how are sources distributed?"
    choices:
      - id: a
        text: "`item_id` from path, `item` from request body, `q` from query string."
      - id: b
        text: "All three from request body, because the method is PUT."
      - id: c
        text: "`item_id` and `q` from query, `item` from path."
      - id: d
        text: "Source is determined by parameter order: first path, second query, third body."
    correct: [a]
    explanation: "Source is determined by rules, not position: `item_id` matched the path (path), `item` is a model (body), `q` is a primitive outside the path (query). One handler freely mixes all three sources."
    hints:
      - "Apply the three rules to each parameter separately: path match, primitive outside path, or model?"
      - "Parameter order in the function does not affect source — look at each name and type."

  - id: fastapi-path-converter-001
    concept: fastapi-basics
    type: theory-quiz
    difficulty: 3
    prompt: "Why does request `GET /files/docs/intro.txt` not match route `@app.get(\"/files/{file_path}\")`?"
    choices:
      - id: a
        text: "A slash is a path segment boundary, so `{file_path}` without a converter cannot capture a value with slashes; use `{file_path:path}`."
      - id: b
        text: "FastAPI forbids dots in path parameters; `.txt` blocks the match."
      - id: c
        text: "Path parameters must be numbers; here it is a string."
      - id: d
        text: "It matches fine: slashes in path parameters are allowed by default."
    correct: [a]
    explanation: "By default a path parameter captures one segment — up to the next slash. To accept paths with slashes, use the `{file_path:path}` converter in the template."
    hints:
      - "Think about how the router splits a URL into parts: what marks the boundary between segments?"
      - "There is a special converter that lifts the one-segment limit for a path parameter."
