exercises:
- id: pydantic-what-is-001
  concept: pydantic-validation
  type: theory-quiz
  difficulty: 1
  prompt: What does a type annotation do on a Pydantic model field like `age:int`?
  choices:
  - id: a
    text: 'This is an executable rule: Pydantic checks the value and casts it to its type when creating the model.'
  - id: b
    text: This is an IDE-only hint and does not affect input validation.
  - id: c
    text: This is the default value for the `age` field.
  - id: d
    text: This is the name of the query parameter, where to get `age` from.
  correct:
  - a
  explanation: In Pydantic, an annotation is not a hint, but an executable rule. When creating a model from JSON, each field
    is checked and cast to its declared type, and errors are accumulated into one common response.
  variants:
  - prompt: 'What happens when assembling `User(name: str, age: int)` from JSON `{"name": "Ann", "age": "30"}`?'
    choices:
    - id: a
      text: 'The string `"30"` will be converted to a number: the result will be `age == 30`.'
    - id: b
      text: 'It will return 422: `age` came as a string, but was expected as an int.'
    - id: c
      text: '`age` will remain the string `"30"`, Pydantic does not touch types.'
    - id: d
      text: The `age` field will be set to None due to a type mismatch.
    correct:
    - a
    explanation: 'In default mode, Pydantic converts compatible values: a string with numbers to int. The result will be `User(name=''Ann'',
      age=30)`.'
  - prompt: 'Field `is_active: bool = True`. What is true about him?'
    choices:
    - id: a
      text: 'It is optional: if not present in JSON, the default value True will be substituted.'
    - id: b
      text: 'It is mandatory: the client must always send `is_active`.'
    - id: c
      text: The default value is ignored, the field is always None.
    - id: d
      text: The default makes the field a path parameter.
    correct:
    - a
    explanation: The default value makes the field optional. If it is not in JSON, default will be substituted; there will
      be no error.
- id: pydantic-field-bounds-001
  concept: pydantic-validation
  type: theory-quiz
  difficulty: 2
  prompt: 'For the product price, `price: float = Field(ge=0)` is declared. Will the value `0` pass?'
  choices:
  - id: a
    text: 'Pass: `ge` (greater or equal) allows a value equal to the boundary, that is, zero.'
  - id: b
    text: 'Will not work: `ge` means strictly greater than zero.'
  - id: c
    text: 'Fails: `Field` always disallows zero for float.'
  - id: d
    text: It will pass, but Pydantic will replace the zero with None.
  correct:
  - a
  explanation: '`ge` is "greater than or equal to", so the boundary value passes. To disable zero for the price, you need
    `gt=0` (“strictly greater than”). The `gt`/`ge` border confusion is a common source of bugs.'
- id: pydantic-fill-field-001
  concept: pydantic-validation
  type: fill-in-blanks
  difficulty: 1
  prompt: 'Add the model: name from 1 to 50 characters long and price strictly greater than zero.'
  template: "from pydantic import BaseModel, Field\n\nclass Product(BaseModel):\n    name: str = Field(min_length=1, max_length={{maxlen}})\n\
    \    price: float = Field({{price_rule}}=0)\n"
  blanks:
    maxlen:
      accept:
      - '50'
    price_rule:
      accept:
      - gt
  variants:
  - prompt: 'Complete the model: quantity - an integer from 0 to 1000 inclusive.'
    template: "from pydantic import BaseModel, Field\n\nclass Stock(BaseModel):\n    quantity: int = Field({{low_rule}}=0,\
      \ {{high_rule}}=1000)\n"
    blanks:
      low_rule:
        accept:
        - ge
      high_rule:
        accept:
        - le
  - prompt: 'Add the nested model: address as a separate model inside the client.'
    template: "from pydantic import BaseModel\n\nclass Address(BaseModel):\n    city: str\n    zip_code: str\n\nclass Customer(BaseModel):\n\
      \    name: str\n    address: {{nested}}\n"
    blanks:
      nested:
        accept:
        - Address
- id: pydantic-fill-validator-001
  concept: pydantic-validation
  type: fill-in-blanks
  difficulty: 2
  prompt: 'Add validator: name without spaces, otherwise validation error.'
  template: "from pydantic import BaseModel, field_validator\n\nclass Signup(BaseModel):\n    username:str\n\n    @field_validator(\"\
    username\")\n    @classmethod\n    def no_spaces(cls, v: str) -> str:\n        if \" \" in v:\n            raise {{error}}(\"\
    name must not contain spaces\")\n        return v\n"
  blanks:
    error:
      accept:
      - ValueError
  hints:
  - The validator reports a violation not by returning a flag, but by throwing an exception, which Pydantic will catch and
    turn into a 422.
  - This is a standard Python exception for an invalid argument value.
- id: pydantic-predict-coerce-001
  concept: pydantic-validation
  type: predict-output
  difficulty: 2
  prompt: What will the program output? It models the type casting that Pydantic does.
  snippet: "def coerce_field(value, target):\n    return target(value)\n\nprint(coerce_field(\"30\", int) + 5)\n"
  expected:
    kind: stdout
    value: '35'
  hints:
  - Pydantic casts a compatible value to the declared type of the field. What does the string `"30"` turn into when cast to
    int?
  - After casting, the value is a number, and the addition occurs over numbers, not over strings.
  variants:
  - snippet: "def field_ge(value, ge):\n    return value >= ge\n\nprint(field_ge(0, 0), field_ge(-1, 0))\n"
    expected:
      kind: stdout
      value: True False
  - snippet: "def normalize_username(v):\n    return v.strip().lower()\n\nprint(normalize_username(\"  AnnA  \"))\n"
    expected:
      kind: stdout
      value: anna
- id: pydantic-predict-extra-001
  concept: pydantic-validation
  type: predict-output
  difficulty: 3
  prompt: 'What will the program output? It follows Pydantic''s default behavior: extra JSON fields are silently discarded.'
  snippet: 'incoming = {"name": "Ann", "nickname": "ann99"}

    known = {"name", "age"}

    kept = {k: v for k, v in incoming.items() if k in known}

    print(kept)

    '
  expected:
    kind: stdout
    value: '{''name'': ''Ann''}'
  hints:
  - By default, an unfamiliar field does not raise an error - the model simply passes it by. Which of the sent keys are generally
    described in the model?
  - Only those input JSON keys that are among the model fields remain; everything else is lost without 422.
  variants:
  - snippet: 'incoming = {"id": 7, "name": "Ann", "password": "secret"}

      model_fields = {"id", "name"}

      out = {k: incoming[k] for k in incoming if k in model_fields}

      print(out)

      '
    expected:
      kind: stdout
      value: '{''id'': 7, ''name'': ''Ann''}'
  - snippet: 'incoming = {"city": "Moscow", "zip_code": "101000", "country": "RU"}

      known = {"city", "zip_code"}

      kept = {k: v for k, v in incoming.items() if k in known}

      print(kept)

      '
    expected:
      kind: stdout
      value: '{''city'': ''Moscow'', ''zip_code'': ''101000''}'
- id: pydantic-mutable-default-001
  concept: pydantic-validation
  type: predict-output
  difficulty: 4
  prompt: What will the program output? This is the same mutable default pitfall that causes the need for `default_factory`
    in Pydantic.
  snippet: "class Container:\n    def __init__(self, items=[]):\n        self.items = items\n\na = Container()\na.items.append(1)\n\
    b = Container()\nprint(b.items)\n"
  expected:
    kind: stdout
    value: '[1]'
  hints:
  - The default value is calculated once, when defining the function, and not for each call. What does this mean for the general
    list?
  - Both instances created without an argument refer to the same list object. Change through one is visible through the other.
  - This is why Pydantic uses `Field(default_factory=list)` rather than `= []` for mutable default.
- id: pydantic-response-model-001
  concept: pydantic-validation
  type: theory-quiz
  difficulty: 3
  prompt: 'The handler with `response_model=UserOut` (fields `id`, `name`) returned the dictionary `{"id": 1, "name": "Ann",
    "password": "secret"}`. What will the client get?'
  choices:
  - id: a
    text: 'Only `{"id": 1, "name": "Ann"}`: `response_model` truncates fields that are not in the output model.'
  - id: b
    text: 'The entire dictionary, including `password`: `response_model` affects documentation only.'
  - id: c
    text: The answer is 422 because the dictionary has an extra `password` field.
  - id: d
    text: 'Empty answer: field mismatch cancels serialization.'
  correct:
  - a
  explanation: '`response_model` filters the response according to the output scheme: only the fields of the output model
    will go outside. This is protection against accidental leakage of fields like `password`, even if they were squeezed into
    the returned dictionary.'
  hints:
  - The model describes not only the input, but also the form of the output. What happens to a field that is not in the output
    model?
  - '`response_model` is a response contract, not an input validation: the extra one doesn''t cause an error, it just doesn''t
    end up in the response.'
