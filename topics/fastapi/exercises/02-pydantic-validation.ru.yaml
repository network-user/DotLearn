exercises:
  - id: pydantic-what-is-001
    concept: pydantic-validation
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает аннотация типа в поле Pydantic-модели, например `age: int`?"
    choices:
      - id: a
        text: "Это исполняемое правило: Pydantic проверяет значение и приводит его к типу при создании модели."
      - id: b
        text: "Это подсказка только для IDE, на проверку входных данных она не влияет."
      - id: c
        text: "Это значение по умолчанию для поля `age`."
      - id: d
        text: "Это имя query-параметра, откуда брать `age`."
    correct: [a]
    explanation: "В Pydantic аннотация - не подсказка, а исполняемое правило. При создании модели из JSON каждое поле проверяется и приводится к объявленному типу, а ошибки копятся для одного общего ответа."
    variants:
      - prompt: "Что произойдёт при сборке `User(name: str, age: int)` из JSON `{\"name\": \"Ann\", \"age\": \"30\"}`?"
        choices:
          - id: a
            text: "Строка `\"30\"` будет приведена к числу: получится `age == 30`."
          - id: b
            text: "Вернётся 422: `age` пришёл строкой, а ожидался int."
          - id: c
            text: "`age` останется строкой `\"30\"`, Pydantic типы не трогает."
          - id: d
            text: "Поле `age` получит значение None из-за несовпадения типа."
        correct: [a]
        explanation: "В режиме по умолчанию Pydantic приводит совместимые значения: строку с цифрами - к int. Получится `User(name='Ann', age=30)`."
      - prompt: "Поле `is_active: bool = True`. Что про него верно?"
        choices:
          - id: a
            text: "Оно необязательно: при отсутствии в JSON подставится значение по умолчанию True."
          - id: b
            text: "Оно обязательно: клиент всегда должен прислать `is_active`."
          - id: c
            text: "Значение по умолчанию игнорируется, поле всегда None."
          - id: d
            text: "Дефолт делает поле path-параметром."
        correct: [a]
        explanation: "Значение по умолчанию делает поле необязательным. Если его нет в JSON, подставится дефолт; ошибки не будет."

  - id: pydantic-field-bounds-001
    concept: pydantic-validation
    type: theory-quiz
    difficulty: 2
    prompt: "Для цены товара объявлено `price: float = Field(ge=0)`. Пройдёт ли значение `0`?"
    choices:
      - id: a
        text: "Пройдёт: `ge` (greater or equal) допускает значение, равное границе, то есть ноль."
      - id: b
        text: "Не пройдёт: `ge` означает строго больше нуля."
      - id: c
        text: "Не пройдёт: `Field` всегда запрещает ноль для float."
      - id: d
        text: "Пройдёт, но Pydantic заменит ноль на None."
    correct: [a]
    explanation: "`ge` - «больше или равно», поэтому граничное значение проходит. Чтобы запретить ноль для цены, нужен `gt=0` («строго больше»). Путаница `gt`/`ge` на границе - частый источник багов."

  - id: pydantic-fill-field-001
    concept: pydantic-validation
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите модель: имя длиной от 1 до 50 символов и цена строго больше нуля."
    template: |
      from pydantic import BaseModel, Field

      class Product(BaseModel):
          name: str = Field(min_length=1, max_length={{maxlen}})
          price: float = Field({{price_rule}}=0)
    blanks:
      maxlen:
        accept: ["50"]
      price_rule:
        accept: ["gt"]
    variants:
      - prompt: "Допишите модель: количество - целое от 0 до 1000 включительно."
        template: |
          from pydantic import BaseModel, Field

          class Stock(BaseModel):
              quantity: int = Field({{low_rule}}=0, {{high_rule}}=1000)
        blanks:
          low_rule:
            accept: ["ge"]
          high_rule:
            accept: ["le"]
      - prompt: "Допишите вложенную модель: адрес как отдельная модель внутри клиента."
        template: |
          from pydantic import BaseModel

          class Address(BaseModel):
              city: str
              zip_code: str

          class Customer(BaseModel):
              name: str
              address: {{nested}}
        blanks:
          nested:
            accept: ["Address"]

  - id: pydantic-fill-validator-001
    concept: pydantic-validation
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите валидатор: имя без пробелов, иначе ошибка валидации."
    template: |
      from pydantic import BaseModel, field_validator

      class Signup(BaseModel):
          username: str

          @field_validator("username")
          @classmethod
          def no_spaces(cls, v: str) -> str:
              if " " in v:
                  raise {{error}}("в имени не должно быть пробелов")
              return v
    blanks:
      error:
        accept: ["ValueError"]
    hints:
      - "Валидатор сообщает о нарушении не возвратом флага, а броском исключения, которое Pydantic перехватит и превратит в 422."
      - "Это стандартное исключение Python для недопустимого значения аргумента."

  - id: pydantic-predict-coerce-001
    concept: pydantic-validation
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Она моделирует приведение поля к типу, которое делает Pydantic."
    snippet: |
      def coerce_field(value, target):
          return target(value)

      print(coerce_field("30", int) + 5)
    expected:
      kind: stdout
      value: "35"
    hints:
      - "Pydantic приводит совместимое значение к объявленному типу поля. Во что превратится строка `\"30\"` при приведении к int?"
      - "После приведения значение - число, и сложение идёт по числам, а не по строкам."
    variants:
      - snippet: |
          def field_ge(value, ge):
              return value >= ge

          print(field_ge(0, 0), field_ge(-1, 0))
        expected:
          kind: stdout
          value: "True False"
      - snippet: |
          def normalize_username(v):
              return v.strip().lower()

          print(normalize_username("  AnnA  "))
        expected:
          kind: stdout
          value: "anna"

  - id: pydantic-predict-extra-001
    concept: pydantic-validation
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она повторяет поведение Pydantic по умолчанию: лишние поля JSON молча отбрасываются."
    snippet: |
      incoming = {"name": "Ann", "nickname": "ann99"}
      known = {"name", "age"}
      kept = {k: v for k, v in incoming.items() if k in known}
      print(kept)
    expected:
      kind: stdout
      value: "{'name': 'Ann'}"
    hints:
      - "По умолчанию незнакомое поле не вызывает ошибку - модель просто проходит мимо него. Какие из присланных ключей вообще описаны в модели?"
      - "Остаются только те ключи входного JSON, что есть среди полей модели; всё прочее теряется без 422."
    variants:
      - snippet: |
          incoming = {"id": 7, "name": "Ann", "password": "secret"}
          model_fields = {"id", "name"}
          out = {k: incoming[k] for k in incoming if k in model_fields}
          print(out)
        expected:
          kind: stdout
          value: "{'id': 7, 'name': 'Ann'}"
      - snippet: |
          incoming = {"city": "Москва", "zip_code": "101000", "country": "RU"}
          known = {"city", "zip_code"}
          kept = {k: v for k, v in incoming.items() if k in known}
          print(kept)
        expected:
          kind: stdout
          value: "{'city': 'Москва', 'zip_code': '101000'}"

  - id: pydantic-mutable-default-001
    concept: pydantic-validation
    type: predict-output
    difficulty: 4
    prompt: "Что выведет программа? Это та же ловушка изменяемого значения по умолчанию, из-за которой в Pydantic нужен `default_factory`."
    snippet: |
      class Container:
          def __init__(self, items=[]):
              self.items = items

      a = Container()
      a.items.append(1)
      b = Container()
      print(b.items)
    expected:
      kind: stdout
      value: "[1]"
    hints:
      - "Значение по умолчанию вычисляется один раз, при определении функции, а не на каждый вызов. Что это значит для общего на всех списка?"
      - "Оба экземпляра, созданных без аргумента, ссылаются на один и тот же объект-список. Изменение через один виден через другой."
      - "Именно поэтому для изменяемого дефолта в Pydantic используют `Field(default_factory=list)`, а не `= []`."

  - id: pydantic-response-model-001
    concept: pydantic-validation
    type: theory-quiz
    difficulty: 3
    prompt: "Обработчик с `response_model=UserOut` (поля `id`, `name`) вернул словарь `{\"id\": 1, \"name\": \"Ann\", \"password\": \"secret\"}`. Что уйдёт клиенту?"
    choices:
      - id: a
        text: "Только `{\"id\": 1, \"name\": \"Ann\"}`: `response_model` отсекает поля, которых нет в выходной модели."
      - id: b
        text: "Весь словарь целиком, включая `password`: `response_model` влияет только на документацию."
      - id: c
        text: "Ответ 422, потому что в словаре есть лишнее поле `password`."
      - id: d
        text: "Пустой ответ: несовпадение полей отменяет сериализацию."
    correct: [a]
    explanation: "`response_model` фильтрует ответ по схеме выхода: наружу уйдут только поля выходной модели. Это защита от случайной утечки полей вроде `password`, даже если они затесались в возвращаемый словарь."
    hints:
      - "Модель описывает не только вход, но и форму выхода. Что произойдёт с полем, которого в выходной модели нет?"
      - "`response_model` - это контракт ответа, а не входная валидация: лишнее не вызывает ошибку, оно просто не попадает в ответ."
