exercises:
  - id: fastapi-background-when-001
    concept: fastapi-background
    type: theory-quiz
    difficulty: 1
    prompt: "Какая работа лучше всего подходит для `BackgroundTasks` в FastAPI?"
    choices:
      - id: a
        text: "Короткая и не критичная к доставке: записать строку в лог уже после ответа клиенту."
      - id: b
        text: "Списание денег со счёта, которое нельзя потерять ни при каких сбоях."
      - id: c
        text: "Часовой пересчёт аналитики с обязательными ретраями при падении."
      - id: d
        text: "Любая работа: BackgroundTasks даёт те же гарантии, что и отдельная очередь."
    correct: [a]
    explanation: "`BackgroundTasks` хорош для короткой и не критичной работы, выполняемой после ответа: логирование, уведомление, инвалидация кэша. Критичную или долгую работу с ретраями отдают настоящей очереди."
    variants:
      - prompt: "Когда работу из `BackgroundTasks` стоит перенести в настоящую очередь задач?"
        choices:
          - id: a
            text: "Когда нужны ретраи при сбое, расписание или распределение по нескольким воркерам."
          - id: b
            text: "Когда задача занимает меньше секунды и её потеря не страшна, полностью минуя BackgroundTasks."
          - id: c
            text: "Когда нужно просто записать строку в лог после ответа, полностью минуя BackgroundTasks."
          - id: d
            text: "Никогда: BackgroundTasks справляется с любой нагрузкой сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Как только работе нужны ретраи, расписание, распределение по машинам или гарантия не пропасть - фоновая задача FastAPI не подходит, и её место занимает очередь вроде Celery."
      - prompt: "Что верно про момент выполнения фоновой задачи FastAPI?"
        choices:
          - id: a
            text: "Она выполняется после того, как ответ уже отправлен клиенту."
          - id: b
            text: "Она выполняется до формирования ответа, и клиент ждёт её завершения."
          - id: c
            text: "Она выполняется в отдельном процессе ещё до прихода запроса."
          - id: d
            text: "Она выполняется вместо ответа, заменяя его собой."
        correct: [a]
        explanation: "Фоновая задача - это хвост после ответа: клиент получает ответ сразу, а задача отрабатывает уже после отправки ответа, в том же процессе."
      - prompt: "Почему отправку приветственного письма удобно делать фоновой задачей?"
        choices:
          - id: a
            text: "Клиент не должен ждать медленную отправку: ответ «готово» уходит сразу, письмо отправляется после."
          - id: b
            text: "Письмо обязательно должно дойти, и фоновая задача это гарантирует сразу, без промежуточного состояния."
          - id: c
            text: "Фоновая задача распараллелит отправку по нескольким ядрам автоматически сразу, без промежуточного состояния."
          - id: d
            text: "Только в фоновой задаче можно обращаться к внешнему SMTP-сервису сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Регистрация уже прошла, и письмо не нужно показывать клиенту немедленно. Ответ уходит сразу, а небыструю отправку откладывают на после ответа, чтобы не держать клиента."

  - id: fastapi-background-add-task-001
    concept: fastapi-background
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите обработчик, который регистрирует фоновую запись лога после ответа."
    template: |
      from fastapi import FastAPI, BackgroundTasks

      app = FastAPI()

      def write_log(message: str):
          with open("log.txt", "a") as f:
              f.write(message + "\n")

      @app.post("/register")
      def register(email: str, background_tasks: {{type}}):
          background_tasks.{{method}}(write_log, f"registered {email}")
          return {"status": "ok"}
    blanks:
      type:
        accept: ["BackgroundTasks"]
      method:
        accept: ["add_task"]
    variants:
      - prompt: "Допишите вызов: зарегистрируйте функцию `send_email` с аргументом `email`. Передавайте саму функцию, без скобок."
        template: |
          from fastapi import BackgroundTasks

          def send_email(to: str):
              ...

          def notify(email: str, background_tasks: BackgroundTasks):
              background_tasks.add_task({{fn}}, email)
              return {"queued": True}
        blanks:
          fn:
            accept: ["send_email"]
      - prompt: "Допишите тип параметра, по которому FastAPI внедрит объект для регистрации фоновых задач."
        template: |
          from fastapi import FastAPI, BackgroundTasks

          app = FastAPI()

          @app.post("/items")
          def create(name: str, tasks: {{type}}):
              tasks.add_task(print, name)
              return {"name": name}
        blanks:
          type:
            accept: ["BackgroundTasks"]

  - id: fastapi-background-lifespan-001
    concept: fastapi-background
    type: theory-quiz
    difficulty: 2
    prompt: "Что выполняет код, написанный ДО `yield` в lifespan-контекстном менеджере?"
    choices:
      - id: a
        text: "Startup: один раз перед приёмом запросов - например, открыть пул соединений или загрузить модель."
      - id: b
        text: "Shutdown: освобождение ресурсов при остановке сервиса сразу, без промежуточного состояния."
      - id: c
        text: "Код на каждый входящий запрос, как обычный обработчик сразу, без промежуточного состояния."
      - id: d
        text: "Ничего: до yield код в lifespan не исполняется сразу, без промежуточного состояния."
    correct: [a]
    explanation: "Код до `yield` - это startup: он выполняется один раз перед тем, как сервис начнёт принимать запросы. Здесь открывают пул, грузят модель, прогревают кэш. Код после `yield` - это shutdown."
    variants:
      - prompt: "Что выполняет код, написанный ПОСЛЕ `yield` в lifespan?"
        choices:
          - id: a
            text: "Shutdown: один раз при остановке - аккуратно закрыть пул, освободить ресурсы."
          - id: b
            text: "Startup: открытие ресурсов перед первым запросом, полностью минуя yield."
          - id: c
            text: "Обработку каждого ответа на выходе, как middleware, полностью минуя yield."
          - id: d
            text: "Повторную инициализацию приложения на каждый запрос, полностью минуя yield."
        correct: [a]
        explanation: "Код после `yield` - это shutdown: он выполняется один раз при остановке. Сюда ставят аккуратное освобождение: закрыть пул, попрощаться с внешними сервисами."
      - prompt: "Почему lifespan заменил устаревшие `@app.on_event(\"startup\")` и `@app.on_event(\"shutdown\")`?"
        choices:
          - id: a
            text: "Один контекстный менеджер держит парную логику «открыл - закрыл» рядом, в одной функции."
          - id: b
            text: "Lifespan работает быстрее, потому что не использует yield сразу, без промежуточного состояния."
          - id: c
            text: "@app.on_event никогда не вызывал shutdown-логику сразу, без промежуточного состояния."
          - id: d
            text: "Lifespan позволяет открывать ресурсы прямо в обработчиках запросов сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Lifespan держит «открыл» до `yield` и парное «закрыл» после него в одной функции, а не разносит логику по двум отдельным обработчикам событий."
      - prompt: "Где правильнее открыть пул соединений с базой данных?"
        choices:
          - id: a
            text: "В lifespan на startup - один раз до запросов, а не в первом запросе."
          - id: b
            text: "В каждом обработчике заново, чтобы соединение было свежим."
          - id: c
            text: "В фоновой задаче после первого ответа сразу, без промежуточного состояния."
          - id: d
            text: "В middleware на каждый входящий запрос сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Startup-ресурсы открывают в lifespan один раз до запросов. Открытие в первом запросе заставило бы его платить за инициализацию, а при нескольких воркерах логика размазалась бы."

  - id: fastapi-background-predict-order-001
    concept: fastapi-background
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Она моделирует порядок: ответ отправляется, затем выполняется фоновая задача."
    snippet: |
      events = []

      def send_response():
          events.append("response")

      def background():
          events.append("task")

      send_response()
      background()
      print(events)
    expected:
      kind: stdout
      value: "['response', 'task']"
    hints:
      - "Фоновая задача - это хвост после ответа. Что произойдёт раньше: отправка ответа или выполнение задачи?"
      - "Сначала отрабатывает отправка ответа и кладёт «response», затем фоновая задача кладёт «task»."
    variants:
      - snippet: |
          events = []
          tasks = []

          def schedule(fn):
              tasks.append(fn)

          def log_a():
              events.append("a")

          def log_b():
              events.append("b")

          schedule(log_a)
          schedule(log_b)
          events.append("response")
          for task in tasks:
              task()
          print(events)
        expected:
          kind: stdout
          value: "['response', 'a', 'b']"
      - snippet: |
          log = []

          def add_task(fn):
              log.append("queued")

          def task():
              log.append("ran")

          add_task(task)
          log.append("response sent")
          task()
          print(log)
        expected:
          kind: stdout
          value: "['queued', 'response sent', 'ran']"

  - id: fastapi-background-vs-queue-001
    concept: fastapi-background
    type: theory-quiz
    difficulty: 3
    prompt: "Нужно генерировать большой PDF-отчёт (несколько минут) и гарантированно повторять генерацию при сбое. Куда поместить эту работу?"
    choices:
      - id: a
        text: "В настоящую очередь задач (Celery и подобные): долгая работа с ретраями требует брокера и отдельных воркеров."
      - id: b
        text: "В `BackgroundTasks`: они справятся с любой по длительности задачей сразу, без промежуточного состояния."
      - id: c
        text: "В lifespan на startup, чтобы отчёт сгенерировался один раз при запуске сразу, без промежуточного состояния."
      - id: d
        text: "Прямо в обработчик: клиент подождёт несколько минут с ответом сразу, без промежуточного состояния."
    correct: [a]
    explanation: "Работа долгая и требует гарантий и ретраев - это за пределами `BackgroundTasks`, которые живут в процессе без долговечности. Такому место в очереди задач с брокером и отдельными воркерами, как Celery."
    hints:
      - "Сравните две оси: длительность задачи и важность гарантии, что она не пропадёт. Где на этих осях оказывается генерация отчёта на минуты с обязательными ретраями?"
      - "`BackgroundTasks` живут в процессе веб-сервера и ничего не гарантируют. Что нужно, когда задача долгая и её потеря недопустима?"

  - id: fastapi-background-durability-001
    concept: fastapi-background
    type: predict-output
    difficulty: 4
    prompt: "Что выведет программа? Она моделирует фоновую задачу FastAPI: задача поставлена в очередь в процессе, но процесс падает между отправкой ответа и её выполнением."
    snippet: |
      pending = []

      def add_task(name):
          pending.append(name)

      def send_response():
          return "200 OK"

      def crash_before_running_tasks():
          pending.clear()

      add_task("send_email")
      send_response()
      crash_before_running_tasks()
      executed = list(pending)
      print(executed)
    expected:
      kind: stdout
      value: "[]"
    hints:
      - "Фоновая задача живёт в том же процессе и нигде не сохранена. Что станет с её списком, если процесс упадёт раньше, чем задача отработала?"
      - "Проследите за `pending`: задачу туда добавили, ответ отправили, затем процесс «упал» и очистил список ещё до выполнения. Сколько задач реально выполнилось?"
      - "`pending.clear()` опустошает список до того, как из него что-либо запустят. `executed` копирует уже пустой `pending`."
