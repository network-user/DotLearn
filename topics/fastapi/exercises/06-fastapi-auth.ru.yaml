exercises:
  - id: auth-flow-001
    concept: fastapi-auth
    type: theory-quiz
    difficulty: 1
    prompt: "В потоке OAuth2 с Bearer-токеном: когда клиент отправляет логин и пароль?"
    choices:
      - id: a
        text: "Один раз - на эндпоинт `/token`; в ответ получает токен и дальше шлёт его, а не пароль."
      - id: b
        text: "В каждом запросе к защищённому эндпоинту, вместе с токеном сразу, без промежуточного состояния."
      - id: c
        text: "Никогда: токен генерируется на клиенте без участия сервера сразу, без промежуточного состояния."
      - id: d
        text: "Только при первом запуске сервера, один раз на всех пользователей сразу, без промежуточного состояния."
    correct: [a]
    explanation: "Пароль участвует ровно один раз - при выдаче токена на `/token`. Дальше клиент в каждый запрос кладёт заголовок `Authorization: Bearer <токен>`, а пароль больше не пересылает. Токен - это «пропуск», пароль - «паспорт», который показывают единожды."
    variants:
      - prompt: "Где клиент передаёт полученный токен в защищённых запросах?"
        choices:
          - id: a
            text: "В заголовке `Authorization: Bearer <токен>`."
          - id: b
            text: "В query-параметре `?password=...`."
          - id: c
            text: "В теле каждого запроса в поле `secret`."
          - id: d
            text: "Нигде - сервер сам помнит сессию между запросами."
        correct: [a]
        explanation: "Токен едет в заголовке `Authorization: Bearer <токен>`. Сервер на каждый запрос достаёт его оттуда и по нему опознаёт пользователя. Никакой серверной сессии для этого не требуется - HTTP без состояния."
      - prompt: "Зачем нужен токен, если у клиента уже есть логин и пароль?"
        choices:
          - id: a
            text: "Чтобы не пересылать пароль в каждом запросе: токен предъявляют вместо него, и его проще проверять."
          - id: b
            text: "Токен шифрует тело запроса, а пароль - нет ещё до любых других проверок на этом пути."
          - id: c
            text: "Токен ускоряет соединение за счёт сжатия заголовков сразу, без промежуточного состояния."
          - id: d
            text: "Это формальность: токен и пароль взаимозаменяемы в каждом запросе сразу, без промежуточного состояния."
        correct: [a]
        explanation: "Токен избавляет от пересылки пароля в каждом запросе. Пароль показывают один раз ради токена, а дальше предъявляют токен - его сервер проверяет быстро и не хранит пароль по всему коду."

  - id: auth-401-vs-403-001
    concept: fastapi-auth
    type: theory-quiz
    difficulty: 2
    prompt: "Запрос пришёл вообще без заголовка `Authorization`. Какой статус корректен?"
    choices:
      - id: a
        text: "401 Unauthorized: сервер не смог опознать отправителя - тот не представился."
      - id: b
        text: "403 Forbidden: раз токена нет, значит доступ запрещён."
      - id: c
        text: "404 Not Found: без токена эндпоинт как бы не существует."
      - id: d
        text: "200 OK: отсутствие токена - это просто анонимный, но валидный запрос."
    correct: [a]
    explanation: "Нет токена - отправитель не опознан, это `401` («представься»). `403` уместен, только когда личность установлена, но прав не хватает. Анонимный запрос к защищённому эндпоинту - именно случай `401`."
    hints:
      - "Спросите себя: знает ли сервер, кто перед ним? Если нет, какой из двух статусов про «представься заново»?"
      - "Различайте «не знаю, кто ты» и «знаю, но сюда нельзя». Без токена сервер в первом положении."
    variants:
      - prompt: "Токен валиден, пользователь опознан, но у него нет scope `items:write` для удаления. Какой статус?"
        choices:
          - id: a
            text: "403 Forbidden: опознан, но прав на это действие нет."
          - id: b
            text: "401 Unauthorized: раз действие запрещено, пусть логинится заново."
          - id: c
            text: "422 Unprocessable Entity: не хватает права - это ошибка валидации."
          - id: d
            text: "200 OK: токен ведь валиден, остальное неважно."
        correct: [a]
        explanation: "Личность установлена (токен валиден), не хватает только прав - это `403`. Повторный логин здесь не поможет: проблема не в аутентификации, а в авторизации."
      - prompt: "Клиент прислал просроченный (истёкший) токен. Какой статус честнее всего?"
        choices:
          - id: a
            text: "401 Unauthorized: истёкший токен сервер не принял как доказательство личности."
          - id: b
            text: "403 Forbidden: токен был, значит личность известна, просто нет прав."
          - id: c
            text: "200 OK: токен же присутствует в заголовке."
          - id: d
            text: "500 Internal Server Error: истёкший токен - это сбой сервера."
        correct: [a]
        explanation: "Истёкший токен не годится как доказательство личности, отправитель снова не опознан - это `401`. `403` был бы неверен: он означает «я знаю, кто ты», а здесь как раз не знаем."

  - id: auth-fill-scheme-001
    concept: fastapi-auth
    type: fill-in-blanks
    difficulty: 1
    prompt: "Допишите схему OAuth2 и эндпоинт, который достаёт токен из заголовка через зависимость."
    template: |
      from fastapi import Depends, FastAPI
      from fastapi.security import OAuth2PasswordBearer

      app = FastAPI()
      oauth2_scheme = OAuth2PasswordBearer(tokenUrl="token")

      @app.get("/items/")
      def read_items(token: str = {{call}}(oauth2_scheme)):
          return {"token": token}
    blanks:
      call:
        accept: ["Depends"]
    variants:
      - prompt: "Допишите защиту эндпоинта: получить текущего пользователя через зависимость `get_current_user`."
        template: |
          from fastapi import Depends, FastAPI

          app = FastAPI()

          @app.get("/me")
          def me(user: dict = {{call}}(get_current_user)):
              return user
        blanks:
          call:
            accept: ["Depends"]
      - prompt: "Допишите создание схемы: укажите класс, читающий токен из заголовка Authorization."
        template: |
          from fastapi.security import OAuth2PasswordBearer

          oauth2_scheme = {{cls}}(tokenUrl="token")
        blanks:
          cls:
            accept: ["OAuth2PasswordBearer"]

  - id: auth-fill-getuser-001
    concept: fastapi-auth
    type: fill-in-blanks
    difficulty: 2
    prompt: "Допишите зависимость `get_current_user`: при неверном токене - 401, иначе вернуть пользователя."
    template: |
      from fastapi import Depends, HTTPException

      def get_current_user(token: str = Depends(oauth2_scheme)):
          try:
              username = read(token)
          except Exception:
              raise HTTPException(status_code={{code}}, detail="неверный токен")
          return users[username]
    blanks:
      code:
        accept: ["401"]
    hints:
      - "Токен не удалось прочитать - сервер не понял, кто отправитель. Какой статус говорит «представься заново»?"
      - "Это не «нет прав» (403), а «не опознан». Нужный код - в семействе ошибок аутентификации."

  - id: auth-predict-status-001
    concept: fastapi-auth
    type: predict-output
    difficulty: 2
    prompt: "Что выведет программа? Она моделирует выбор статуса: сначала аутентификация, потом права."
    snippet: |
      def auth_status(has_token, token_valid, has_scope):
          if not has_token or not token_valid:
              return 401
          if not has_scope:
              return 403
          return 200

      print(auth_status(True, True, True), auth_status(True, False, True), auth_status(True, True, False))
    expected:
      kind: stdout
      value: "200 401 403"
    hints:
      - "Сначала проверяют, опознан ли отправитель (есть и валиден ли токен), и лишь потом - хватает ли прав. В каком порядке сработают ветки?"
      - "Первый вызов: токен есть, валиден, права есть. Второй: токен невалиден. Третий: токен валиден, но прав нет."
    variants:
      - snippet: |
          def status(token_present, expired, authorized):
              if not token_present:
                  return 401
              if expired:
                  return 401
              if not authorized:
                  return 403
              return 200

          print(status(False, False, True), status(True, True, True), status(True, False, False))
        expected:
          kind: stdout
          value: "401 401 403"
      - snippet: |
          def needs_relogin(status):
              return status == 401

          print(needs_relogin(401), needs_relogin(403), needs_relogin(200))
        expected:
          kind: stdout
          value: "True False False"

  - id: auth-predict-jwt-001
    concept: fastapi-auth
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она моделирует подпись токена: проверка проходит только для тех claims и секрета, которыми токен был подписан."
    snippet: |
      def sign(payload, secret):
          return sum(ord(c) for c in payload + secret)

      def verify(payload, signature, secret):
          return sign(payload, secret) == signature

      secret = "k"
      sig = sign("anna", secret)
      print(verify("anna", sig, secret), verify("boris", sig, secret))
    expected:
      kind: stdout
      value: "True False"
    hints:
      - "Подпись считается из payload и секрета. Если claims подменить, пересчитанная подпись перестанет совпадать с приложенной. Для каких claims проверка пройдёт?"
      - "`verify` заново считает подпись для переданных claims и сравнивает с `sig`. Та же строка даёт ту же сумму, другая - другую."
    variants:
      - snippet: |
          def sign(payload, secret):
              return sum(ord(c) for c in payload + secret)

          def verify(payload, signature, secret):
              return sign(payload, secret) == signature

          sig = sign("anna", "old")
          print(verify("anna", sig, "new"))
        expected:
          kind: stdout
          value: "False"
      - snippet: |
          def read_claims(token, now):
              sub, exp = token
              if exp < now:
                  raise ValueError("expired")
              return sub

          def current_user(token, now):
              try:
                  return read_claims(token, now)
              except ValueError:
                  return "401"

          print(current_user(("anna", 100), 50), current_user(("anna", 100), 200))
        expected:
          kind: stdout
          value: "anna 401"

  - id: auth-predict-hash-001
    concept: fastapi-auth
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она моделирует проверку пароля по хешу: в хранилище лежит хеш, сравнивают хеши, а не сам пароль."
    snippet: |
      def hash_pw(password):
          return "h:" + password[::-1]

      stored = hash_pw("secret")

      def verify(password):
          return hash_pw(password) == stored

      print(verify("secret"), verify("guess"))
    expected:
      kind: stdout
      value: "True False"
    hints:
      - "Пароль в открытом виде не хранится - хранится его хеш. При проверке присланный пароль хешируют и сравнивают хеши. Для какого ввода хеши совпадут?"
      - "`verify` хеширует аргумент и сравнивает с `stored`. Тот же пароль даёт тот же хеш, другой - другой."
    variants:
      - snippet: |
          def hash_pw(password):
              return "h:" + password[::-1]

          users = {"anna": hash_pw("pw1")}

          def login(username, password):
              stored = users.get(username)
              if stored is None or hash_pw(password) != stored:
                  return "401"
              return "token-for-" + username

          print(login("anna", "pw1"), login("anna", "wrong"))
        expected:
          kind: stdout
          value: "token-for-anna 401"
      - snippet: |
          def hash_pw(password):
              return "h:" + password[::-1]

          stored = hash_pw("hunter2")
          print(stored == "hunter2", stored == hash_pw("hunter2"))
        expected:
          kind: stdout
          value: "False True"

  - id: auth-order-001
    concept: fastapi-auth
    type: theory-quiz
    difficulty: 4
    prompt: "Защищённый эндпоинт удаления требует валидный токен И scope `items:write`. Пришёл запрос с истёкшим токеном, у владельца которого scope `items:write` есть. Что вернёт корректно реализованная защита и почему?"
    choices:
      - id: a
        text: "401: истёкший токен отвергается на шаге аутентификации - до проверки scope дело не доходит, ведь личность не подтверждена."
      - id: b
        text: "403: scope `items:write` у пользователя есть, значит прав достаточно, а истёкший токен можно простить."
      - id: c
        text: "200: раз нужный scope присутствует, удаление выполняется несмотря на срок токена."
      - id: d
        text: "Сначала 403 (нет актуальных прав), затем 401 - двумя отдельными ответами."
    correct: [a]
    explanation: "Порядок проверок жёсткий: сначала аутентификация (валиден ли токен), потом авторизация (хватает ли scope). Истёкший токен проваливает аутентификацию, поэтому ответ - `401`, и до проверки scope управление не доходит. Наличие нужного scope не спасает: пока личность не подтверждена, проверять права бессмысленно. Один ответ, не два."
    hints:
      - "Какую из двух проверок - «кто ты» или «что тебе можно» - выполняют первой? Что произойдёт, если первая уже провалилась?"
      - "Истёкший токен - это провал аутентификации, а не нехватка прав. Если аутентификация не пройдена, очередь авторизации не наступает."
