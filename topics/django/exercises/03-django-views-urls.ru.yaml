exercises:
  - id: django-views-urls-converter-quiz-001
    concept: django-views-urls
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает конвертер в шаблоне path('orders/<int:pk>/', ...)?"
    choices:
      - id: a
        text: "Совпадает только с цифрами и передаёт во view настоящий int под именем pk."
      - id: b
        text: "Совпадает с любой строкой и передаёт её как текст."
      - id: c
        text: "Это комментарий, на маршрутизацию он не влияет."
      - id: d
        text: "Ограничивает количество заказов в ответе до int штук."
    correct: [a]
    explanation: "Конвертер <int:pk> и проверяет форму (только цифры), и приводит тип: во view приходит настоящий int, а не строка. Часть до двоеточия - тип, после - имя аргумента."
    variants:
      - prompt: "Под какой адрес подойдёт шаблон path('articles/<slug:slug>/', ...)?"
        choices:
          - id: a
            text: "/articles/kak-rabotaet-orm/ - slug принимает буквы, цифры, дефисы и подчёркивания."
          - id: b
            text: "/articles/42/ и больше ничего - slug это только число."
          - id: c
            text: "/articles/a/b/c/ - slug разрешает слэши внутри."
          - id: d
            text: "Любой адрес: slug совпадает с чем угодно."
        correct: [a]
        explanation: "Конвертер slug принимает «человекочитаемые» идентификаторы: буквы, цифры, дефисы, подчёркивания - то, из чего состоят адреса вроде kak-rabotaet-orm. Слэши он не разрешает (для остатка пути есть path)."
      - prompt: "Какой конвертер взять для адреса с остатком пути, где разрешены слэши, например /files/docs/2024/report.pdf?"
        choices:
          - id: a
            text: "<path:...> - он единственный разрешает слэши и ловит остаток пути."
          - id: b
            text: "<int:...> - он подходит для путей с разделителями."
          - id: c
            text: "<slug:...> - он специально создан для путей со слэшами."
          - id: d
            text: "<str:...> - он включает слэши по умолчанию."
        correct: [a]
        explanation: "<str:...> - любая непустая строка БЕЗ слэша; slug - только буквы/цифры/дефисы. Слэши разрешает только <path:...>, поэтому он и ловит остаток пути целиком."

  - id: django-views-urls-fbv-cbv-quiz-001
    concept: django-views-urls
    type: theory-quiz
    difficulty: 2
    prompt: "Как class-based view решает, какой свой метод вызвать на пришедший запрос?"
    choices:
      - id: a
        text: "По request.method: GET-запрос идёт в метод get, POST - в метод post; диспетчеризацию делает сам View."
      - id: b
        text: "Всегда вызывает метод с именем handle, остальные игнорирует."
      - id: c
        text: "По порядку объявления методов в классе - вызывается первый."
      - id: d
        text: "Случайно выбирает один из методов при каждом запросе."
    correct: [a]
    explanation: "В CBV вместо ручного ветвления по request.method пишут отдельные методы get, post и т.д. View сам зовёт нужный по методу запроса. В urls.py класс подключают через .as_view()."
    variants:
      - prompt: "Что нужно вызвать у class-based view, чтобы подключить его в urlpatterns?"
        choices:
          - id: a
            text: ".as_view() - он возвращает функцию, которую ждёт urlpatterns."
          - id: b
            text: "Ничего: класс кладут в urlpatterns как есть."
          - id: c
            text: ".render() - он превращает класс в маршрут."
          - id: d
            text: ".objects.all() - так подключают любой обработчик."
        correct: [a]
        explanation: "urlpatterns ждёт что-то вызываемое как функция. CBV подключают через .as_view(): он возвращает функцию, которая на каждый запрос создаёт свежий экземпляр view и зовёт нужный метод."
      - prompt: "Какой дженерик-CBV показывает один объект модели по первичному ключу?"
        choices:
          - id: a
            text: "DetailView - показывает один объект; ListView показывает список."
          - id: b
            text: "ListView - именно он отдаёт один объект."
          - id: c
            text: "CreateView - он только для показа одного объекта."
          - id: d
            text: "View - базовый класс сам по себе рисует деталь объекта."
        correct: [a]
        explanation: "DetailView - дженерик под показ одного объекта по первичному ключу; ListView - под список объектов модели. Вы задаёте модель и шаблон, выборку дженерик делает сам."

  - id: django-views-urls-request-fill-001
    concept: django-views-urls
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски про объект запроса и ответ во view."
    template: |
      Метод запроса (GET или POST) лежит в request.{{method}}.
      Параметры из строки запроса вида ?page=2 лежат в request.{{query}}.
      Данные отправленной формы лежат в request.{{post}}.
      Функция-обработчик обязана вернуть объект {{resp}}.
    blanks:
      method:
        accept: ["method"]
      query:
        accept: ["GET", "get"]
      post:
        accept: ["POST", "post"]
      resp:
        accept: ["HttpResponse", "httpresponse", "response"]
    variants:
      - prompt: "Заполните пропуски про коды статусов ответа."
        template: |
          Успешный ответ по умолчанию имеет код {{ok}}.
          После удачного создания объекта возвращают код {{created}}.
          Если запрашиваемого объекта нет, корректный код - {{notfound}}.
        blanks:
          ok:
            accept: ["200"]
          created:
            accept: ["201"]
          notfound:
            accept: ["404"]
      - prompt: "Заполните пропуски про устройство URLconf."
        template: |
          Список маршрутов называется {{patterns}}.
          Простой маршрут объявляют функцией {{path}}, а маршрут на регулярном выражении - функцией {{repath}}.
        blanks:
          patterns:
            accept: ["urlpatterns"]
          path:
            accept: ["path", "path()"]
          repath:
            accept: ["re_path", "re_path()", "re-path"]

  - id: django-views-urls-order-predict-001
    concept: django-views-urls
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она моделирует resolver: список правил проверяется сверху вниз, побеждает ПЕРВОЕ совпадение. Здесь общий шаблон стоит выше конкретного."
    snippet: |
      routes = [
          ("orders/<str>/", "order_by_str"),
          ("orders/new/", "create_order"),
      ]

      def resolve(path):
          for pattern, view in routes:
              if pattern == "orders/<str>/" and path.startswith("orders/"):
                  return view
              if pattern == path:
                  return view
          return "404"

      print(resolve("orders/new/"))
    expected:
      kind: stdout
      value: "order_by_str"
    hints:
      - "Resolver не ищет «самое точное» правило - он берёт первое подошедшее, обходя список сверху вниз. Какое правило стоит первым?"
      - "Пройдите цикл по шагам: подходит ли путь под первый шаблон (общий) ещё до того, как очередь дойдёт до конкретного?"
      - "Первый шаблон ловит любой путь, начинающийся с 'orders/'. Путь 'orders/new/' под него подходит - и цикл возвращается, не дойдя до точного правила."
    variants:
      - snippet: |
          routes = [
              ("orders/new/", "create_order"),
              ("orders/<str>/", "order_by_str"),
          ]

          def resolve(path):
              for pattern, view in routes:
                  if pattern == path:
                      return view
                  if pattern == "orders/<str>/" and path.startswith("orders/"):
                      return view
              return "404"

          print(resolve("orders/new/"))
        expected:
          kind: stdout
          value: "create_order"
      - snippet: |
          routes = [
              ("orders/new/", "create_order"),
              ("orders/<str>/", "order_by_str"),
          ]

          def resolve(path):
              for pattern, view in routes:
                  if pattern == path:
                      return view
                  if pattern == "orders/<str>/" and path.startswith("orders/"):
                      return view
              return "404"

          print(resolve("articles/42/"))
        expected:
          kind: stdout
          value: "404"

  - id: django-views-urls-method-predict-001
    concept: django-views-urls
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она моделирует диспетчеризацию class-based view: dispatch по имени метода зовёт get или post; на неподдержанный метод возвращает 405."
    snippet: |
      class View:
          def get(self):
              return "show:200"

          def post(self):
              return "created:201"

          def dispatch(self, method):
              handler = getattr(self, method.lower(), None)
              if handler is None:
                  return "405"
              return handler()

      v = View()
      print(v.dispatch("GET"))
      print(v.dispatch("POST"))
      print(v.dispatch("DELETE"))
    expected:
      kind: stdout
      value: |-
        show:200
        created:201
        405
    hints:
      - "CBV не ветвится вручную: dispatch смотрит на метод запроса и зовёт одноимённый метод объекта. А если такого метода у класса нет?"
      - "Для каждого вызова определите: есть ли у View метод с таким именем в нижнем регистре? get и post есть, delete - нет."
      - "getattr ищет атрибут по имени метода в нижнем регистре. 'GET'->get, 'POST'->post, 'DELETE'->нет такого -> ветка с 405."
    variants:
      - snippet: |
          class View:
              def get(self):
                  return "list:200"

              def dispatch(self, method):
                  handler = getattr(self, method.lower(), None)
                  if handler is None:
                      return "405"
                  return handler()

          v = View()
          print(v.dispatch("GET"))
          print(v.dispatch("POST"))
        expected:
          kind: stdout
          value: |-
            list:200
            405
      - snippet: |
          class View:
              def get(self):
                  return "ok"

              def post(self):
                  return "made"

              def dispatch(self, method):
                  handler = getattr(self, method.lower(), None)
                  if handler is None:
                      return "405"
                  return handler()

          v = View()
          results = [v.dispatch(m) for m in ["POST", "PUT", "GET"]]
          print(results)
        expected:
          kind: stdout
          value: "['made', '405', 'ok']"

  - id: django-views-urls-routing-quiz-001
    concept: django-views-urls
    type: theory-quiz
    difficulty: 4
    prompt: "В urlpatterns маршрут path('orders/<str:pk>/', ...) стоит ВЫШE, чем path('orders/new/', ...). По адресу /orders/new/ открывается не страница создания, а показ заказа с pk='new'. Почему и как чинить?"
    choices:
      - id: a
        text: "Resolver берёт первое совпадение, а <str:pk> ловит и 'new'; нужно поднять конкретный orders/new/ выше общего orders/<str:pk>/."
      - id: b
        text: "Django сортирует маршруты по алфавиту, порядок в списке не влияет; переименуйте view."
      - id: c
        text: "Это баг конвертера str; замените его на int, и new заработает."
      - id: d
        text: "Resolver выбирает самый специфичный шаблон автоматически; проблема в имени аргумента pk."
    correct: [a]
    explanation: "urlpatterns проверяется сверху вниз, и побеждает первое совпадение, а не самое специфичное. Шаблон orders/<str:pk>/ совпадает с orders/new/ (pk='new') раньше, чем очередь дойдёт до точного маршрута. Лечится порядком: конкретные пути ставят выше общих."
    hints:
      - "Resolver не ищет «самый подходящий» шаблон - он останавливается на первом, который совпал. Что это значит для общего шаблона, стоящего выше точного?"
      - "Шаблон orders/<str:pk>/ принимает любую непустую строку на месте pk - в том числе слово new. Чей маршрут проверится раньше при таком порядке списка?"
