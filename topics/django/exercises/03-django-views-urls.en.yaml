exercises:
  - id: django-views-urls-converter-quiz-001
    concept: django-views-urls
    type: theory-quiz
    difficulty: 1
    prompt: "What does the converter in the pattern path('orders/<int:pk>/', ..) do?"
    choices:
      - id: a
        text: "It matches digits only and passes a real int to the view under the name pk."
      - id: b
        text: "It matches any string and passes it as text."
      - id: c
        text: "It is always a comment that has no effect on routing."
      - id: d
        text: "It limits the number of orders in the response to int items."
    correct: [a]
    explanation: "The converter <int:pk> both checks the shape (digits only) and converts the type: the view receives a real int, not a string. The part before the colon is the type, after it is the argument name."
    variants:
      - prompt: "Which address matches the pattern path('articles/<slug:slug>/', ..)?"
        choices:
          - id: a
            text: "/articles/how-orm-works/ - slug accepts letters, digits, hyphens, and underscores."
          - id: b
            text: "/articles/42/ and nothing else - slug is always only a number for every request path in the app."
          - id: c
            text: "/articles/a/b/c/ - slug allows slashes inside for every request path in the app."
          - id: d
            text: "Any address at all: slug matches anything under any load volume and data size."
        correct: [a]
        explanation: "The slug converter accepts \"human-readable\" identifiers: letters, digits, hyphens, underscores - what addresses like how-orm-works are made of. It does not allow slashes (there is path for the remainder of a path)."
      - prompt: "Which converter should you use for an address with a path remainder where slashes are allowed, e.g. /files/docs/2024/report.pdf?"
        choices:
          - id: a
            text: "<path:.> - it is the only one that allows slashes and captures the rest of the path."
          - id: b
            text: "<int:.> - it works for paths with separators for every request path in the app."
          - id: c
            text: "<slug:.> - it was made specifically for paths with slashes for every request path in the app."
          - id: d
            text: "<str:.> - it includes slashes by default under any load volume and data size."
        correct: [a]
        explanation: "<str:..> is any non-empty string WITHOUT a slash; slug is letters/digits/hyphens only. Only <path:..> allows slashes, so it is the one that captures the whole remainder of the path."

  - id: django-views-urls-fbv-cbv-quiz-001
    concept: django-views-urls
    type: theory-quiz
    difficulty: 2
    prompt: "How does a class-based view decide which of its methods to call for an incoming request?"
    choices:
      - id: a
        text: "By request.method: a GET request goes to the get method, POST to the post method; View does the dispatching itself."
      - id: b
        text: "It always calls a method named handle, ignoring the rest for any payload and any deploy target."
      - id: c
        text: "By the order methods are always declared in the class - the first one is called for every request path in the app."
      - id: d
        text: "It randomly picks one of the methods on every request as a complete account of that behavior."
    correct: [a]
    explanation: "Instead of manually branching on request.method, in a CBV you write separate methods like get, post, etc. View itself calls the right one based on the request method. In urls.py the class is plugged in via .as_view()."
    variants:
      - prompt: "What do you need to call on a class-based view to plug it into urlpatterns?"
        choices:
          - id: a
            text: ".as_view() - it returns the function urlpatterns expects."
          - id: b
            text: "Nothing: the class is put into urlpatterns as-is."
          - id: c
            text: ".render() - it turns the class into a route."
          - id: d
            text: ".objects.all() - that's how any handler is plugged in."
        correct: [a]
        explanation: "urlpatterns expects something callable like a function. A CBV is plugged in via .as_view(): it returns a function that creates a fresh view instance on every request and calls the right method."
      - prompt: "Which generic CBV shows a single model object by primary key?"
        choices:
          - id: a
            text: "DetailView - shows a single object; ListView shows a list."
          - id: b
            text: "ListView - it's the one that returns a single object."
          - id: c
            text: "CreateView - it's only for showing a single object."
          - id: d
            text: "View - the base class itself renders an object's detail page."
        correct: [a]
        explanation: "DetailView is the generic for showing a single object by primary key; ListView is for a list of model objects. You specify the model and template, and the generic does the lookup itself."

  - id: django-views-urls-request-fill-001
    concept: django-views-urls
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the blanks about the request object and response in a view."
    template: |
      The request method (GET or POST) is in request.{{method}}.
      Parameters from a query string like ?page=2 are in request.{{query}}.
      Submitted form data is in request.{{post}}.
      A handler function must return a {{resp}} object.
    blanks:
      method:
        accept: ["method"]
      query:
        accept: ["GET", "get"]
      post:
        accept: ["POST", "post"]
      resp:
        accept: ["HttpResponse", "httpresponse", "response"]
    variants:
      - prompt: "Fill in the blanks about response status codes."
        template: |
          A successful response defaults to code {{ok}}.
          After successfully creating an object, code {{created}} is returned.
          If the requested object does not exist, the correct code is {{notfound}}.
        blanks:
          ok:
            accept: ["200"]
          created:
            accept: ["201"]
          notfound:
            accept: ["404"]
      - prompt: "Fill in the blanks about how URLconf is structured."
        template: |
          The list of routes is called {{patterns}}.
          A plain route is declared with the {{path}} function, and a regex-based route with the {{repath}} function.
        blanks:
          patterns:
            accept: ["urlpatterns"]
          path:
            accept: ["path", "path()"]
          repath:
            accept: ["re_path", "re_path()", "re-path"]

  - id: django-views-urls-order-predict-001
    concept: django-views-urls
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It models a resolver: the rule list is checked top to bottom, and the FIRST match wins. Here a generic pattern sits above a specific one."
    snippet: |
      routes = [
          ("orders/<str>/", "order_by_str"),
          ("orders/new/", "create_order"),
      ]

      def resolve(path):
          for pattern, view in routes:
              if pattern == "orders/<str>/" and path.startswith("orders/"):
                  return view
              if pattern == path:
                  return view
          return "404"

      print(resolve("orders/new/"))
    expected:
      kind: stdout
      value: "order_by_str"
    hints:
      - "The resolver does not look for the \"most exact\" rule - it takes the first one that matches, going through the list top to bottom. Which rule comes first?"
      - "Walk through the loop step by step: does the path match the first (generic) pattern before the loop even reaches the specific one?"
      - "The first pattern matches any path starting with 'orders/'. The path 'orders/new/' matches it - so the function returns before reaching the exact rule."
    variants:
      - snippet: |
          routes = [
              ("orders/new/", "create_order"),
              ("orders/<str>/", "order_by_str"),
          ]

          def resolve(path):
              for pattern, view in routes:
                  if pattern == path:
                      return view
                  if pattern == "orders/<str>/" and path.startswith("orders/"):
                      return view
              return "404"

          print(resolve("orders/new/"))
        expected:
          kind: stdout
          value: "create_order"
      - snippet: |
          routes = [
              ("orders/new/", "create_order"),
              ("orders/<str>/", "order_by_str"),
          ]

          def resolve(path):
              for pattern, view in routes:
                  if pattern == path:
                      return view
                  if pattern == "orders/<str>/" and path.startswith("orders/"):
                      return view
              return "404"

          print(resolve("articles/42/"))
        expected:
          kind: stdout
          value: "404"

  - id: django-views-urls-method-predict-001
    concept: django-views-urls
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It models class-based view dispatching: dispatch calls get or post by method name; an unsupported method returns 405."
    snippet: |
      class View:
          def get(self):
              return "show:200"

          def post(self):
              return "created:201"

          def dispatch(self, method):
              handler = getattr(self, method.lower(), None)
              if handler is None:
                  return "405"
              return handler()

      v = View()
      print(v.dispatch("GET"))
      print(v.dispatch("POST"))
      print(v.dispatch("DELETE"))
    expected:
      kind: stdout
      value: |-
        show:200
        created:201
        405
    hints:
      - "A CBV does not branch manually: dispatch looks at the request method and calls the object's method of the same name. What if the class has no such method?"
      - "For each call, check: does View have a lowercase method with that name? get and post exist, delete does not."
      - "getattr looks up an attribute by the lowercased method name. 'GET'->get, 'POST'->post, 'DELETE'->no such method -> the 405 branch."
    variants:
      - snippet: |
          class View:
              def get(self):
                  return "list:200"

              def dispatch(self, method):
                  handler = getattr(self, method.lower(), None)
                  if handler is None:
                      return "405"
                  return handler()

          v = View()
          print(v.dispatch("GET"))
          print(v.dispatch("POST"))
        expected:
          kind: stdout
          value: |-
            list:200
            405
      - snippet: |
          class View:
              def get(self):
                  return "ok"

              def post(self):
                  return "made"

              def dispatch(self, method):
                  handler = getattr(self, method.lower(), None)
                  if handler is None:
                      return "405"
                  return handler()

          v = View()
          results = [v.dispatch(m) for m in ["POST", "PUT", "GET"]]
          print(results)
        expected:
          kind: stdout
          value: "['made', '405', 'ok']"

  - id: django-views-urls-routing-quiz-001
    concept: django-views-urls
    type: theory-quiz
    difficulty: 4
    prompt: "In urlpatterns, path('orders/<str:pk>/', ..) is listed ABOVE path('orders/new/', ..). Visiting /orders/new/ opens not the creation page but a display of the order with pk='new'. Why, and how do you fix it?"
    choices:
      - id: a
        text: "The resolver takes the first match, and <str:pk> also matches 'new'; the fix is to move the specific orders/new/ above the generic orders/<str:pk>/."
      - id: b
        text: "Django sorts routes alphabetically, list order has no effect; rename the view; the system does not allow any other correct behavior."
      - id: c
        text: "This is a bug in the str converter; switch it to int and new will work as a complete account of that behavior."
      - id: d
        text: "The resolver automatically picks the most specific pattern; the problem is the pk argument name when only the outer call is considered."
    correct: [a]
    explanation: "urlpatterns is checked top to bottom, and the first match wins, not the most specific one. The pattern orders/<str:pk>/ matches orders/new/ (with pk='new') before the loop ever reaches the exact route. The fix is ordering: put specific paths above generic ones."
    hints:
      - "The resolver does not look for the \"best fitting\" pattern - it stops at the first match. What does that mean for a generic pattern listed above an exact one?"
      - "The pattern orders/<str:pk>/ accepts any non-empty string as pk - including the word new. Whose route gets checked first with this ordering?"
