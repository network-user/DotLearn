exercises:
  - id: django-templates-forms-bound-quiz-001
    concept: django-templates-forms
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает форму в Django связанной (bound)?"
    choices:
      - id: a
        text: "То, что её создали с данными: OrderForm(request.POST); тогда внутри есть присланные значения и её можно проверять."
      - id: b
        text: "То, что запрос пришёл методом POST, независимо от данных."
      - id: c
        text: "Вызов метода .bind() после создания формы."
      - id: d
        text: "Наследование от ModelForm вместо Form."
    correct: [a]
    explanation: "Связанность определяется не методом запроса, а тем, передали ли в форму данные. OrderForm() без данных - несвязанная (рисует пустые поля); OrderForm(request.POST) - связанная, её можно валидировать."
    variants:
      - prompt: "Зачем нужна несвязанная форма OrderForm() без данных?"
        choices:
          - id: a
            text: "Чтобы нарисовать пустые поля на GET-запросе: данных нет, проверять нечего."
          - id: b
            text: "Чтобы сразу проверить присланные значения через is_valid()."
          - id: c
            text: "Чтобы удалить объект из базы данных."
          - id: d
            text: "Несвязанная форма не нужна, её создают по ошибке."
        correct: [a]
        explanation: "Несвязанная форма создана без данных - проверять в ней нечего. Её роль - нарисовать пустые поля, обычно на GET. Валидируют только связанную форму (созданную с данными)."
      - prompt: "Чем удобен ModelForm по сравнению с обычной Form?"
        choices:
          - id: a
            text: "Он строит поля автоматически из модели - остаётся указать модель и список полей."
          - id: b
            text: "Он не требует валидации: данные из ModelForm всегда корректны."
          - id: c
            text: "Он работает без шаблонов и без view."
          - id: d
            text: "Он отключает CSRF-проверку для своих форм."
        correct: [a]
        explanation: "Когда форма повторяет модель почти один в один, ModelForm строит поля сам по модели. Вы указываете в Meta модель и fields, не описывая каждое поле вручную."

  - id: django-templates-forms-syntax-fill-001
    concept: django-templates-forms
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски про синтаксис языка шаблонов Django (укажите только ключевые слова)."
    template: |
      Цикл по элементам открывают тегом {{loop}} и закрывают тегом endfor.
      Условие открывают тегом {{cond}} и закрывают тегом endif.
      Чтобы дочерний шаблон унаследовал каркас базового, используют тег {{inherit}}.
      Сменную область в базовом шаблоне объявляют тегом {{slot}}.
    blanks:
      loop:
        accept: ["for"]
      cond:
        accept: ["if"]
      inherit:
        accept: ["extends"]
      slot:
        accept: ["block"]
    variants:
      - prompt: "Заполните пропуски про этапы валидации формы (укажите имена методов/атрибутов)."
        template: |
          Запускает проверку и возвращает True или False метод {{check}}.
          Проверенные и приведённые к типу значения лежат в словаре {{clean}}.
          Чтобы сообщить о невалидном значении, в clean-методе поднимают исключение {{error}}.
        blanks:
          check:
            accept: ["is_valid", "is_valid()"]
          clean:
            accept: ["cleaned_data"]
          error:
            accept: ["ValidationError", "forms.ValidationError"]
      - prompt: "Заполните пропуски про защиту форм и вывод полей."
        template: |
          Каждая POST-форма должна нести скрытый {{token}}-токен против межсайтовой подделки запроса.
          В шаблоне его вставляют тегом {% {{tag}} %} внутри формы.
          Без него Django отвергнет POST с кодом {{code}}.
        blanks:
          token:
            accept: ["CSRF", "csrf"]
          tag:
            accept: ["csrf_token"]
          code:
            accept: ["403"]

  - id: django-templates-forms-validate-predict-001
    concept: django-templates-forms
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она моделирует валидацию формы: is_valid собирает ошибки полей, и только при пустом списке ошибок наполняет cleaned_data. До успешной проверки cleaned_data пуст."
    snippet: |
      class Form:
          def __init__(self, data):
              self.data = data
              self.errors = []
              self.cleaned_data = {}

          def is_valid(self):
              self.errors = []
              if self.data.get("amount", -1) < 0:
                  self.errors.append("amount")
              if not self.data.get("customer"):
                  self.errors.append("customer")
              if not self.errors:
                  self.cleaned_data = dict(self.data)
              return not self.errors

      f = Form({"amount": 10, "customer": "Анна"})
      print(f.is_valid(), len(f.cleaned_data))

      g = Form({"amount": -5, "customer": "Борис"})
      print(g.is_valid(), len(g.cleaned_data))
    expected:
      kind: stdout
      value: |-
        True 2
        False 0
    hints:
      - "Форма наполняет очищенные данные только когда проверка прошла без ошибок. Что лежит в cleaned_data, пока валидация не удалась?"
      - "Для каждой формы соберите список ошибок: какие условия сработали? И заполнится ли cleaned_data при непустом списке ошибок?"
      - "У первой формы amount=10 и непустой customer - ошибок нет, cleaned_data копирует оба ключа. У второй amount=-5 даёт ошибку, cleaned_data остаётся пустым."
    variants:
      - snippet: |
          class Form:
              def __init__(self, data):
                  self.data = data
                  self.errors = []
                  self.cleaned_data = {}

              def is_valid(self):
                  self.errors = []
                  if self.data.get("amount", -1) < 0:
                      self.errors.append("amount")
                  if not self.data.get("customer"):
                      self.errors.append("customer")
                  if not self.errors:
                      self.cleaned_data = dict(self.data)
                  return not self.errors

          f = Form({"amount": -1, "customer": ""})
          print(f.is_valid(), len(f.errors))
        expected:
          kind: stdout
          value: "False 2"
      - snippet: |
          class Form:
              def __init__(self, data):
                  self.data = data
                  self.errors = []
                  self.cleaned_data = {}

              def is_valid(self):
                  self.errors = []
                  if self.data.get("amount", -1) < 0:
                      self.errors.append("amount")
                  if not self.data.get("customer"):
                      self.errors.append("customer")
                  if not self.errors:
                      self.cleaned_data = dict(self.data)
                  return not self.errors

          f = Form({"amount": 0, "customer": "Вера"})
          print(f.is_valid(), len(f.errors), len(f.cleaned_data))
        expected:
          kind: stdout
          value: "True 0 2"

  - id: django-templates-forms-cleanreturn-predict-001
    concept: django-templates-forms
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она моделирует частую ошибку: clean-метод поля ОБЯЗАН вернуть значение, иначе поле выпадает из cleaned_data (метод вернул None). Здесь clean_b ничего не возвращает."
    snippet: |
      def clean_a(value):
          return value.strip()

      def clean_b(value):
          value.strip()

      raw = {"a": " x ", "b": " y "}
      cleaners = {"a": clean_a, "b": clean_b}

      cleaned = {}
      for field, value in raw.items():
          result = cleaners[field](value)
          if result is not None:
              cleaned[field] = result

      print(sorted(cleaned.keys()), cleaned.get("a"))
    expected:
      kind: stdout
      value: "['a'] x"
    hints:
      - "clean-метод должен вернуть очищенное значение. Что окажется результатом метода, у которого нет инструкции return?"
      - "Пройдите по обоим полям: что вернул clean_a и что вернул clean_b? Какие из них пройдут проверку result is not None?"
      - "clean_b вызывает strip(), но не возвращает результат, поэтому отдаёт None и в cleaned не попадает. Остаётся только 'a' со значением 'x'."
    variants:
      - snippet: |
          def clean_a(value):
              value.upper()

          def clean_b(value):
              return value.upper()

          raw = {"a": "x", "b": "y"}
          cleaners = {"a": clean_a, "b": clean_b}

          cleaned = {}
          for field, value in raw.items():
              result = cleaners[field](value)
              if result is not None:
                  cleaned[field] = result

          print(sorted(cleaned.keys()))
        expected:
          kind: stdout
          value: "['b']"
      - snippet: |
          def clean_a(value):
              return value * 2

          def clean_b(value):
              return value * 3

          raw = {"a": "ab", "b": "c"}
          cleaners = {"a": clean_a, "b": clean_b}

          cleaned = {}
          for field, value in raw.items():
              result = cleaners[field](value)
              if result is not None:
                  cleaned[field] = result

          print(cleaned["a"], cleaned["b"])
        expected:
          kind: stdout
          value: "abab ccc"

  - id: django-templates-forms-csrf-quiz-001
    concept: django-templates-forms
    type: theory-quiz
    difficulty: 3
    prompt: "Зачем POST-форме CSRF-токен и почему чужой сайт не может его подделать?"
    choices:
      - id: a
        text: "Токен секретен и привязан к сессии: чужой сайт может заставить браузер отправить POST с куками, но не знает токен; Django отвергает POST без него с кодом 403."
      - id: b
        text: "Токен шифрует тело запроса, поэтому данные нельзя прочитать в пути."
      - id: c
        text: "Токен ускоряет обработку формы, проверяя её на сервере заранее."
      - id: d
        text: "Токен заменяет аутентификацию: с ним пароль вводить не нужно."
    correct: [a]
    explanation: "CSRF-атака заставляет браузер пользователя отправить POST на Ваш сайт (куки приложатся автоматически). Защита - секретный токен, привязанный к сессии: чужой сайт его не знает. Django проверяет токен и отвергает POST без него с кодом 403."
    hints:
      - "Подумайте, что у атакующего сайта ЕСТЬ (он может инициировать запрос с чужими куками) и чего у него НЕТ (доступа к содержимому Вашей страницы)."
      - "Токен - уникальное секретное значение, привязанное к сессии и встроенное в Вашу форму. Может ли сторонний сайт прочитать его, чтобы подставить в поддельный запрос?"

  - id: django-templates-forms-cleanorder-quiz-001
    concept: django-templates-forms
    type: theory-quiz
    difficulty: 4
    prompt: "Форме нужно проверить, что дата окончания позже даты начала - правило, которому нужны ОБА поля сразу. Куда поместить эту проверку и почему не в clean_end_date?"
    choices:
      - id: a
        text: "В метод clean (без суффикса): он видит все поля одновременно через cleaned_data, тогда как clean_<поле> вызывается для одного поля и второго может ещё не быть в cleaned_data."
      - id: b
        text: "В __init__ формы: только там доступны оба поля до валидации."
      - id: c
        text: "В шаблоне через тег if: межполевые проверки делают при выводе."
      - id: d
        text: "В clean_end_date: оттуда всегда гарантированно виден результат проверки start_date."
    correct: [a]
    explanation: "Каскад валидации идёт так: сначала каждое поле и его clean_<поле>, затем общий clean, который видит уже все поля в cleaned_data. Проверку, зависящую от нескольких полей, кладут в clean: на этапе clean_<поле> другого поля в cleaned_data может ещё не быть."
    hints:
      - "Валидация идёт каскадом: сначала отдельные поля, потом общая проверка. На каком этапе в cleaned_data гарантированно лежат ВСЕ поля сразу?"
      - "clean_<поле> отвечает за одно конкретное поле и вызывается в ходе обработки полей по очереди. А есть отдельный метод, который запускается после всех полей и видит их вместе - какой?"
