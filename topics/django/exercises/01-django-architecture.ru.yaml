exercises:
  - id: django-mtv-mapping-001
    concept: django-architecture
    type: theory-quiz
    difficulty: 1
    prompt: "Чему в классическом MVC соответствует Template из Django MTV?"
    choices:
      - id: a
        text: "Представлению (View из MVC): это HTML с местами под данные."
      - id: b
        text: "Контроллеру (Controller из MVC): он принимает запрос и решает, что делать."
      - id: c
        text: "Модели (Model из MVC): хранит данные и правила."
      - id: d
        text: "Маршрутизатору: сопоставляет URL с обработчиком."
    correct: [a]
    explanation: "Template в Django - это «представление» из MVC: шаблон HTML с дырками под данные. А View в Django играет роль контроллера. Model в обоих мирах означает одно и то же."
    variants:
      - prompt: "Какую роль из классического MVC играет View в Django?"
        choices:
          - id: a
            text: "Контроллера: принимает запрос, дёргает модели и выбирает шаблон."
          - id: b
            text: "Представления: целиком отвечает за HTML, который видит пользователь."
          - id: c
            text: "Модели: описывает таблицу в базе данных."
          - id: d
            text: "Сервера: принимает сетевое соединение."
        correct: [a]
        explanation: "View в Django - это «контроллер» из MVC: функция, которая принимает запрос, обращается к моделям и возвращает ответ, обычно через шаблон. Представление в Django называется Template."
      - prompt: "Что в Django MTV отвечает за данные и правила предметной области?"
        choices:
          - id: a
            text: "Model - класс, отражающий таблицу в базе данных."
          - id: b
            text: "Template - он хранит данные между запросами."
          - id: c
            text: "View - именно он держит состояние приложения."
          - id: d
            text: "settings.py - там перечислены все данные сайта."
        correct: [a]
        explanation: "Model в Django, как и в MVC, отвечает за данные и правила: это класс, отражающий таблицу базы данных. Template - про вывод, View - про обработку запроса."

  - id: django-project-vs-app-001
    concept: django-architecture
    type: theory-quiz
    difficulty: 1
    prompt: "Чем проект в Django отличается от приложения (app)?"
    choices:
      - id: a
        text: "Проект - конфигурация всего сайта (один settings.py), приложение - переиспользуемый модуль одной предметной области внутри проекта."
      - id: b
        text: "Проект и приложение - синонимы: это одно и то же, просто разные команды создания."
      - id: c
        text: "Приложение хранит настройки всего сайта, а проект - только модели."
      - id: d
        text: "Проект может быть только один на сервере, приложение - это отдельный сервер."
    correct: [a]
    explanation: "Проект - это конфигурация целого сайта: один settings.py, корневые маршруты, точка запуска. Приложение - модуль под одну предметную область (orders, accounts), со своими моделями и views; одно приложение можно подключить к разным проектам."
    variants:
      - prompt: "Где в Django-проекте перечислены установленные приложения и параметры базы данных?"
        choices:
          - id: a
            text: "В settings.py проекта - едином реестре настроек всего сайта."
          - id: b
            text: "В manage.py - именно он хранит конфигурацию."
          - id: c
            text: "В отдельном settings.py внутри каждого приложения."
          - id: d
            text: "В файле models.py корневого приложения."
        correct: [a]
        explanation: "settings.py проекта - единый реестр настроек: INSTALLED_APPS, параметры базы, список middleware, пути к шаблонам. Приложение не хранит свою копию настроек сайта, оно лишь регистрируется в INSTALLED_APPS."
      - prompt: "Зачем нужен manage.py?"
        choices:
          - id: a
            text: "Это входная точка для команд: runserver, migrate, createsuperuser; обёртка, подгружающая settings.py."
          - id: b
            text: "Это файл с описанием всех моделей проекта."
          - id: c
            text: "Это боевой веб-сервер, который держит соединения в продакшене."
          - id: d
            text: "Это конфигурация маршрутов URL всего сайта."
        correct: [a]
        explanation: "manage.py - тонкая обёртка, которая подгружает settings.py и передаёт управление Django для выполнения команд: запуск сервера разработки, применение миграций, создание администратора."

  - id: django-request-path-fill-001
    concept: django-architecture
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски в описании пути запроса в Django."
    template: |
      Сервер создаёт объект {{request}} с данными запроса.
      Запрос идёт через цепочку {{middleware}} сверху вниз.
      Затем URL {{resolver}} находит подходящий обработчик по пути.
      Обработчик ({{view}}) выполняет логику и возвращает {{response}}.
    blanks:
      request:
        accept: ["HttpRequest", "request", "httprequest"]
      middleware:
        accept: ["middleware", "миддлвар", "промежуточного слоя"]
      resolver:
        accept: ["resolver", "резолвер", "распознаватель"]
      view:
        accept: ["view", "вью"]
      response:
        accept: ["HttpResponse", "response", "httpresponse"]
    variants:
      - prompt: "Заполните пропуски про слои MTV и их роли."
        template: |
          Слой {{model}} отражает таблицу базы данных как класс Python.
          Слой {{template}} содержит HTML с местами под данные.
          Слой {{view}} принимает запрос, дёргает модели и выбирает шаблон.
        blanks:
          model:
            accept: ["Model", "model", "модель"]
          template:
            accept: ["Template", "template", "шаблон"]
          view:
            accept: ["View", "view", "вью"]
      - prompt: "Заполните пропуски про интерфейсы между сервером и Django."
        template: |
          Синхронный интерфейс «сервер - Django» называется {{sync}}.
          Асинхронный интерфейс, поддерживающий WebSocket, называется {{async}}.
          Команды проекта запускают через файл {{entry}}.
        blanks:
          sync:
            accept: ["WSGI", "wsgi"]
          async:
            accept: ["ASGI", "asgi"]
          entry:
            accept: ["manage.py", "manage"]

  - id: django-middleware-order-001
    concept: django-architecture
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она моделирует цепочку middleware: на пути запроса слои отрабатывают сверху вниз, на пути ответа - в обратном порядке."
    snippet: |
      middleware = ["auth", "session", "csrf"]
      log = []

      for name in middleware:
          log.append("in:" + name)
      log.append("view")
      for name in reversed(middleware):
          log.append("out:" + name)

      print(log[0], log[3], log[-1])
    expected:
      kind: stdout
      value: "in:auth view out:auth"
    hints:
      - "Запрос едет по конвейеру: каждый middleware отрабатывает на входе сверху вниз, потом view, потом те же middleware на выходе - но в обратном порядке."
      - "Соберите список по шагам: сначала три записи in: в порядке списка, затем view, затем три записи out: в обратном порядке. Какие элементы стоят на позициях 0, 3 и последней?"
    variants:
      - snippet: |
          middleware = ["security", "session", "auth"]
          log = []

          for name in middleware:
              log.append("in:" + name)
          log.append("view")
          for name in reversed(middleware):
              log.append("out:" + name)

          print(log[1], log[-1])
        expected:
          kind: stdout
          value: "in:session out:security"
      - snippet: |
          middleware = ["gzip", "common"]
          log = []

          for name in middleware:
              log.append("in:" + name)
          log.append("view")
          for name in reversed(middleware):
              log.append("out:" + name)

          print(len(log), log[-1])
        expected:
          kind: stdout
          value: "5 out:gzip"

  - id: django-middleware-shortcircuit-001
    concept: django-architecture
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она моделирует middleware, который может оборвать запрос до view: если пользователь не авторизован, цепочка возвращает редирект, и view не вызывается."
    snippet: |
      def handle(authenticated):
          trace = []
          trace.append("auth")
          if not authenticated:
              trace.append("redirect")
              return trace
          trace.append("view")
          return trace

      print(handle(False))
      print(handle(True))
    expected:
      kind: stdout
      value: "['auth', 'redirect']\n['auth', 'view']"
    hints:
      - "Middleware на пути внутрь вправе вернуть ответ сам, не пропустив запрос дальше. Что тогда случится со слоем view?"
      - "При authenticated=False функция возвращает trace сразу после добавления 'redirect' - до строки с 'view'. При True доходит до 'view'."
    variants:
      - snippet: |
          def handle(has_session):
              trace = []
              trace.append("session")
              if not has_session:
                  trace.append("login_redirect")
                  return trace
              trace.append("view")
              return trace

          print(handle(True))
        expected:
          kind: stdout
          value: "['session', 'view']"
      - snippet: |
          def handle(allowed):
              trace = ["security"]
              if not allowed:
                  trace.append("403")
                  return trace
              trace.append("view")
              return trace

          print(handle(False))
        expected:
          kind: stdout
          value: "['security', '403']"

  - id: django-installed-apps-order-001
    concept: django-architecture
    type: theory-quiz
    difficulty: 4
    prompt: "Два приложения в INSTALLED_APPS определяют шаблон с одинаковым именем base.html. Django загружает шаблон по имени. Какой из них будет использован и почему?"
    choices:
      - id: a
        text: "Из приложения, которое стоит выше в списке INSTALLED_APPS: загрузчик идёт по списку по порядку и берёт первое совпадение по имени."
      - id: b
        text: "Django выбросит ошибку конфликта имён и откажется запускаться."
      - id: c
        text: "Будут объединены оба шаблона: блоки из обоих файлов склеятся."
      - id: d
        text: "Возьмётся шаблон из приложения с алфавитно меньшим именем, порядок в списке не важен."
    correct: [a]
    explanation: "INSTALLED_APPS - упорядоченный список, а не множество. Стандартный загрузчик шаблонов обходит приложения в порядке списка и возвращает первый найденный шаблон с нужным именем. Поэтому приложение выше в списке «затеняет» одноимённый шаблон из приложения ниже - это используют, чтобы переопределять чужие шаблоны."
    hints:
      - "Подумайте, чем список отличается от множества: у списка есть порядок. Что это значит для поиска первого совпадения по имени?"
      - "Загрузчик не ищет «лучший» шаблон - он берёт первый подходящий, обходя источники в фиксированном порядке. Какой источник он проверит раньше?"
