exercises:
  - id: django-admin-auth-authn-authz-quiz-001
    concept: django-admin-auth
    type: theory-quiz
    difficulty: 1
    prompt: "Which question does authentication answer?"
    choices:
      - id: a
        text: "\"Who are you?\" - establish identity by checking a login and password."
      - id: b
        text: "\"What are you allowed to do?\" - decide whether an action is permitted."
      - id: c
        text: "\"How fast does the server respond?\" - measure latency."
      - id: d
        text: "\"Where is the data stored?\" - pick a database table."
    correct: [a]
    explanation: "Authentication answers \"who are you?\": it establishes identity by checking a login and password. The result is request.user and its is_authenticated flag. \"What are you allowed to do?\" is answered by authorization (permissions and groups)."
    variants:
      - prompt: "Which question does authorization answer?"
        choices:
          - id: a
            text: "\"What are you allowed to do?\" - decide whether an action is permitted for an already-established user."
          - id: b
            text: "\"Who are you?\" - check the login and password for every request path in the app."
          - id: c
            text: "\"Is the account active?\" - and only that, without special-case setup for this flow."
          - id: d
            text: "\"What is the user's password?\" - recover it from the database for every request path in the app."
        correct: [a]
        explanation: "Authorization answers \"what are you allowed to do?\": it decides whether an action is permitted for an already-authenticated user, via permissions and groups. Establishing identity is authentication."
      - prompt: "Which of the following belongs to AUTHENTICATION, not authorization?"
        choices:
          - id: a
            text: "Checking a login-password pair with the authenticate function."
          - id: b
            text: "Checking the shop.delete_order permission for a user."
          - id: c
            text: "Adding a user to the \"managers\" group."
          - id: d
            text: "Deciding whether a user can delete orders."
        correct: [a]
        explanation: "Checking the login and password (authenticate) establishes identity - that is authentication. Checking permissions, groups, and deciding whether an action is allowed is authorization."

  - id: django-admin-auth-isauth-quiz-001
    concept: django-admin-auth
    type: theory-quiz
    difficulty: 2
    prompt: "What is the correct way to check in a view that a user is logged in?"
    choices:
      - id: a
        text: "request.user.is_authenticated - True for a logged-in user and False for a guest (AnonymousUser)."
      - id: b
        text: "Check request.user for truthiness: if it exists, the user is always logged in."
      - id: c
        text: "Compare request.user to None: a guest is None for any payload and any deploy target."
      - id: d
        text: "Call request.user.login() and check the result for any payload and any deploy target."
    correct: [a]
    explanation: "request.user always exists: for a guest it is AnonymousUser, which is truthy as an object and is not None. The sign of being logged in is specifically the request.user.is_authenticated flag."
    variants:
      - prompt: "What is request.user for an anonymous visitor (a guest)?"
        choices:
          - id: a
            text: "A special AnonymousUser object, whose is_authenticated equals False."
          - id: b
            text: "The value None - a guest has no user at all."
          - id: c
            text: "An empty string."
          - id: d
            text: "The same User object as for logged-in users, just without a password."
        correct: [a]
        explanation: "For a guest, request.user is AnonymousUser. It exists as an object (truthy, not None), but its is_authenticated equals False. That's why login is checked specifically via is_authenticated."
      - prompt: "What does authenticate return if the login and password do not match?"
        choices:
          - id: a
            text: "None - a wrong login is a normal outcome, not an exception."
          - id: b
            text: "A User object with empty fields for every request path in the app."
          - id: c
            text: "It raises an AuthenticationError exception."
          - id: d
            text: "False, which is always then passed to login."
        correct: [a]
        explanation: "authenticate returns None for wrong credentials (this is not an error-exception, just an ordinary \"not this one\"). The result is checked against None, and only a found user is passed to login."

  - id: django-admin-auth-modeladmin-fill-001
    concept: django-admin-auth
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the blanks about ModelAdmin configuration (give the attribute names)."
    template: |
      The columns shown in the object list are set by the {{cols}} attribute.
      The fields the search box works on are set by the {{search}} attribute.
      The sidebar of quick filters is set by the {{filter}} attribute.
    blanks:
      cols:
        accept: ["list_display"]
      search:
        accept: ["search_fields"]
      filter:
        accept: ["list_filter"]
    variants:
      - prompt: "Fill in the blanks about signing in and out (give the function/property names)."
        template: |
          The login-password pair is checked by the {{check}} function, returning a User or None.
          The function that saves the user into the session is {{login}}.
          The function that clears the session is {{logout}}.
        blanks:
          check:
            accept: ["authenticate", "authenticate()"]
          login:
            accept: ["login", "login()"]
          logout:
            accept: ["logout", "logout()"]
      - prompt: "Fill in the blanks about protecting pages and permissions."
        template: |
          Letting only logged-in users into a function-based view is done with the {{dec}} decorator.
          Requiring a specific permission on a class-based view is done with the {{mixin}} mixin.
          A named set of permissions granted to users all at once is called a {{group}}.
        blanks:
          dec:
            accept: ["login_required"]
          mixin:
            accept: ["PermissionRequiredMixin"]
          group:
            accept: ["group"]

  - id: django-admin-auth-login-predict-001
    concept: django-admin-auth
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It models signing in: authenticate returns a user or None, and login (writing to the session) is only called when a user was found."
    snippet: |
      USERS = {"anna": "secret", "boris": "pass"}

      def authenticate(username, password):
          if USERS.get(username) == password:
              return username
          return None

      session = {}

      def login(session, user):
          session["user"] = user

      def sign_in(username, password):
          user = authenticate(username, password)
          if user is not None:
              login(session, user)
              return "ok:" + user
          return "denied"

      print(sign_in("anna", "secret"))
      print(sign_in("boris", "wrong"))
      print(session.get("user"))
    expected:
      kind: stdout
      value: |-
        ok:anna
        denied
        anna
    hints:
      - "Signing in is two steps: first checking the login-password pair, then writing to the session. The write only happens if the check found someone."
      - "For each call, work out what authenticate returned (a user or None), and whether control reaches the login branch."
      - "First call: anna's password is correct -> login writes to the session, returns ok:anna. Second call: boris's password is wrong -> authenticate gives None -> denied, session unchanged."
    variants:
      - snippet: |
          USERS = {"anna": "secret", "boris": "pass"}

          def authenticate(username, password):
              if USERS.get(username) == password:
                  return username
              return None

          session = {}

          def login(session, user):
              session["user"] = user

          def sign_in(username, password):
              user = authenticate(username, password)
              if user is not None:
                  login(session, user)
                  return "ok:" + user
              return "denied"

          print(sign_in("boris", "pass"))
          print(session.get("user"))
        expected:
          kind: stdout
          value: |-
            ok:boris
            boris
      - snippet: |
          USERS = {"anna": "secret", "boris": "pass"}

          def authenticate(username, password):
              if USERS.get(username) == password:
                  return username
              return None

          session = {}

          def login(session, user):
              session["user"] = user

          def sign_in(username, password):
              user = authenticate(username, password)
              if user is not None:
                  login(session, user)
                  return "ok:" + user
              return "denied"

          print(sign_in("vera", "secret"))
          print(session.get("user"))
        expected:
          kind: stdout
          value: |-
            denied
            None

  - id: django-admin-auth-perms-predict-001
    concept: django-admin-auth
    type: predict-output
    difficulty: 4
    prompt: "What does the program print? It models the authorization layer: a superuser bypasses the permission check, others get a permission directly or via a group. login_required only requires being logged in, not a specific permission."
    snippet: |
      class User:
          def __init__(self, name, perms, groups, is_super=False):
              self.name = name
              self.perms = set(perms)
              self.groups = groups
              self.is_super = is_super
              self.is_authenticated = True

      GROUP_PERMS = {"managers": {"view_order", "change_order"}}

      def has_perm(user, perm):
          if user.is_super:
              return True
          if perm in user.perms:
              return True
          for g in user.groups:
              if perm in GROUP_PERMS.get(g, set()):
                  return True
          return False

      anna = User("anna", {"view_order"}, [])
      boris = User("boris", set(), ["managers"])
      root = User("root", set(), [], is_super=True)

      print(has_perm(anna, "view_order"), has_perm(anna, "change_order"))
      print(has_perm(boris, "change_order"))
      print(has_perm(root, "delete_order"))
    expected:
      kind: stdout
      value: |-
        True False
        True
        True
    hints:
      - "A permission can come three ways: you are a superuser, the permission was granted directly, or it comes from your group. Being logged in by itself grants no permissions."
      - "For each user, go through the checks in order: superuser? has the permission directly? does some group grant it? If none apply - denied."
      - "anna has view_order directly, but not change_order (and no groups). boris gets change_order from the managers group. root is a superuser, so any permission passes."
    variants:
      - snippet: |
          class User:
              def __init__(self, name, perms, groups, is_super=False):
                  self.name = name
                  self.perms = set(perms)
                  self.groups = groups
                  self.is_super = is_super
                  self.is_authenticated = True

          GROUP_PERMS = {"managers": {"view_order", "change_order"}}

          def has_perm(user, perm):
              if user.is_super:
                  return True
              if perm in user.perms:
                  return True
              for g in user.groups:
                  if perm in GROUP_PERMS.get(g, set()):
                      return True
              return False

          boris = User("boris", set(), ["managers"])
          print(has_perm(boris, "view_order"), has_perm(boris, "delete_order"))
        expected:
          kind: stdout
          value: "True False"
      - snippet: |
          class User:
              def __init__(self, name, perms, groups, is_super=False):
                  self.name = name
                  self.perms = set(perms)
                  self.groups = groups
                  self.is_super = is_super
                  self.is_authenticated = True

          GROUP_PERMS = {"managers": {"view_order", "change_order"}}

          def has_perm(user, perm):
              if user.is_super:
                  return True
              if perm in user.perms:
                  return True
