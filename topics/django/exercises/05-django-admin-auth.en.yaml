                  if perm in GROUP_PERMS.get(g, set()):
                      return True
              return False

          guest = User("guest", set(), [])
          print(guest.is_authenticated, has_perm(guest, "view_order"))
        expected:
          kind: stdout
          value: "True False"

  - id: django-admin-auth-loginrequired-quiz-001
    concept: django-admin-auth
    type: theory-quiz
    difficulty: 3
    prompt: "A logged-in user without the shop.delete_order permission opens a view protected only by the login_required decorator, which deletes an order. What happens, and why?"
    choices:
      - id: a
        text: "Order deleted: login_required checks login only, not a permission."
      - id: b
        text: "Django returns 403: login_required also checks all permissions."
      - id: c
        text: "User is redirected to log in even though already authenticated."
      - id: d
        text: "Order deleted only for superusers; otherwise Django raises an error."
    correct: [a]
    explanation: "login_required checks only request.user.is_authenticated - the fact of being logged in. Any logged-in user passes it, even without the needed permission. To require a specific permission, use PermissionRequiredMixin (for CBVs) or check request.user.has_perm(..). Being logged in does not mean everything is allowed."
    hints:
      - "Separate two questions: \"is the user logged in\" and \"does the user have permission for this action\". Which of the two does login_required actually check?"
      - "login_required looks at is_authenticated and nothing else. If a logged-in user is missing a specific permission, will this decorator stop them?"
