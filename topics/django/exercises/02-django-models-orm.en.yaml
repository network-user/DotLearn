exercises:
  - id: django-models-orm-lazy-quiz-001
    concept: django-models-orm
    type: theory-quiz
    difficulty: 1
    prompt: "At what moment does a QuerySet first go to the database for data?"
    choices:
      - id: a
        text: "When iterated in a for loop, sliced with an index, or passed to list() - when it is actually asked for data."
      - id: b
        text: "Right away when .filter() is called - it immediately runs a SELECT."
      - id: c
        text: "When the model is created via makemigrations."
      - id: d
        text: "Never on its own: data must be explicitly exported with the migrate command."
    correct: [a]
    explanation: "A QuerySet is lazy: filter/exclude/order_by only build up the query recipe. SQL runs when the data is actually needed - on iteration, an index slice, list(), len(), count()."
    variants:
      - prompt: "What does the chain Order.objects.filter(...).exclude(...).order_by(...) do before the result is used?"
        choices:
          - id: a
            text: "It only builds up the query recipe, without touching the database."
          - id: b
            text: "It runs three separate SELECTs - one per call."
          - id: c
            text: "It creates a migration for the orders table."
          - id: d
            text: "It deletes rows that do not match the condition, right in the database."
        correct: [a]
        explanation: "Each call returns a new QuerySet with an extended recipe and does not touch the database. Django assembles all the refinements into a single SQL statement and hits the database exactly once - on iteration or list()."
      - prompt: "Why does Django make QuerySet lazy instead of running the query immediately?"
        choices:
          - id: a
            text: "To combine all refinements into a single SQL statement and hit the database once, instead of running each intermediate filter separately."
          - id: b
            text: "So the data is kept in memory between server restarts."
          - id: c
            text: "So each model field becomes its own table."
          - id: d
            text: "Laziness only matters for migrations, it does not affect fetching data."
        correct: [a]
        explanation: "Laziness is an optimization: by deferring the query, the ORM assembles all filter/exclude/order_by calls into a single SQL statement and hits the database once. A lazy QuerySet can also be passed along, and the receiver decides whether it actually needs the data."

  - id: django-models-orm-get-quiz-001
    concept: django-models-orm
    type: theory-quiz
    difficulty: 2
    prompt: "Order.objects.get(status='paid') runs when there are three paid orders in the database. What happens?"
    choices:
      - id: a
        text: "MultipleObjectsReturned is raised: get requires exactly one object."
      - id: b
        text: "A QuerySet of three orders is returned."
      - id: c
        text: "The first of the three orders is returned, the rest are dropped."
      - id: d
        text: "DoesNotExist is raised because the condition is not unique."
    correct: [a]
    explanation: "get() returns exactly one object. If more than one row matches, it raises MultipleObjectsReturned. For a non-unique field you use filter(), which returns a set."
    variants:
      - prompt: "Order.objects.get(id=999) is called but no order with that id exists. What happens?"
        choices:
          - id: a
            text: "DoesNotExist is raised."
          - id: b
            text: "None is returned."
          - id: c
            text: "An empty QuerySet is returned."
          - id: d
            text: "MultipleObjectsReturned is raised."
        correct: [a]
        explanation: "If no row matches, get() raises DoesNotExist. To get an object or None without an exception, use filter(id=999).first()."
      - prompt: "You need to fetch an order that might not exist in the database, without crashing on an exception. What should you use?"
        choices:
          - id: a
            text: "filter(...).first() - returns the object or None."
          - id: b
            text: "get(...) - it silently returns None when nothing is found."
          - id: c
            text: "exclude(...) - it guarantees exactly one object."
          - id: d
            text: "all() - it returns exactly the object you are looking for."
        correct: [a]
        explanation: "get() raises DoesNotExist for missing data. filter(...).first() returns the first matching object, or None if the set is empty - the safe choice for \"might or might not be there\"."

  - id: django-models-orm-relations-fill-001
    concept: django-models-orm
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the blanks describing Django's relation fields."
    template: |
      A "many to one" relation is defined with an {{fk}} field.
      A "many to many" relation is defined with an {{m2m}} field.
      Reverse access from an object to its related objects is configured with the {{related}} parameter.
    blanks:
      fk:
        accept: ["ForeignKey", "foreignkey", "ForeignKey()"]
      m2m:
        accept: ["ManyToManyField", "manytomanyfield", "ManyToMany"]
      related:
        accept: ["related_name", "related-name"]
    variants:
      - prompt: "Fill in the blanks about the required ForeignKey parameter and the reverse relation."
        template: |
          ForeignKey requires the {{ondelete}} parameter, which says what to do with related rows on delete.
          To forbid deleting the parent, pass it the value {{protect}}.
          Given a customer c with related_name="orders", its orders are fetched with c.{{access}}.all().
        blanks:
          ondelete:
            accept: ["on_delete", "on-delete"]
          protect:
            accept: ["PROTECT", "models.PROTECT", "protect"]
          access:
            accept: ["orders", "order"]
      - prompt: "Fill in the blanks about migrations."
        template: |
          The {{make}} command compares the models against the previous state and writes a change-recipe file.
          The {{apply}} command applies the accumulated migrations to the database.
          It is {{which}}, not the first command, that actually changes the database schema.
        blanks:
          make:
            accept: ["makemigrations", "manage.py makemigrations", "make migrations"]
          apply:
            accept: ["migrate", "manage.py migrate"]
          which:
            accept: ["migrate", "manage.py migrate"]

  - id: django-models-orm-lazy-predict-001
    concept: django-models-orm
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? The LazyQuery class models QuerySet laziness: building the recipe (filter/order_by) does not touch the database, the real trip only happens on iteration (list)."
    snippet: |
      class LazyQuery:
          def __init__(self, log):
              self.log = log
              self.steps = []

          def filter(self, cond):
              self.steps.append(cond)
              return self

          def order_by(self, field):
              self.steps.append("order:" + field)
              return self

          def to_list(self):
              self.log.append("DB:" + ",".join(self.steps))
              return []

      log = []
      qs = LazyQuery(log)
      qs.filter("paid").order_by("created")
      print(len(log))
      qs.to_list()
      print(len(log))
      print(log[0])
    expected:
      kind: stdout
      value: |-
        0
        1
        DB:paid,order:created
    hints:
      - "filter and order_by only grow the recipe and return the same object - the database stays asleep. What actually touches the database?"
      - "Count the entries in log at each step: how many after building the recipe, how many after to_list(), and what is recorded first."
      - "to_list() is the only place that appends a 'DB:...' entry to log. Before it, log is empty."
    variants:
      - snippet: |
          class LazyQuery:
              def __init__(self, log):
                  self.log = log
                  self.steps = []

              def filter(self, cond):
                  self.steps.append(cond)
                  return self

              def to_list(self):
                  self.log.append("DB")
                  return []

          log = []
          qs = LazyQuery(log)
          qs.filter("a").filter("b").filter("c")
          print(len(log), len(qs.steps))
        expected:
          kind: stdout
          value: "0 3"
      - snippet: |
          class LazyQuery:
              def __init__(self, log):
                  self.log = log
                  self.steps = []

              def filter(self, cond):
                  self.steps.append(cond)
                  return self

              def to_list(self):
                  self.log.append("hit")
                  return []

          log = []
          qs = LazyQuery(log)
          qs.filter("x")
          qs.to_list()
          qs.to_list()
          print(len(log))
        expected:
          kind: scalar
          value: 2

  - id: django-models-orm-nplus1-predict-001
    concept: django-models-orm
    type: predict-output
    difficulty: 4
    prompt: "What does the program print? It models N+1: the queries counter grows by 1 for the list of orders, plus 1 for each lazy access to customer. Then the same scenario with preloading (select_related), where the related data is already on the object."
    snippet: |
      class DB:
          def __init__(self):
              self.queries = 0

          def fetch_orders(self, n, preloaded):
              self.queries += 1
              return [Order(i, self, preloaded) for i in range(n)]

      class Order:
          def __init__(self, oid, db, preloaded):
              self.oid = oid
              self.db = db
              self.preloaded = preloaded

          @property
          def customer(self):
              if not self.preloaded:
                  self.db.queries += 1
              return "customer"

      db = DB()
      for o in db.fetch_orders(3, preloaded=False):
          _ = o.customer
      naive = db.queries

      db2 = DB()
      for o in db2.fetch_orders(3, preloaded=True):
          _ = o.customer
      eager = db2.queries

      print(naive, eager)
    expected:
      kind: stdout
      value: "4 1"
    hints:
      - "Without preloading, each access to the related object in the loop is a separate trip to the database. That's one query for the list plus one per item."
      - "Count separately: how many queries for the list of 3 orders, and how many does accessing customer add per order. Then the same with preloaded=True."
      - "With preloaded=False: 1 (list) + 3 (one per order's customer) = naive. With preloaded=True the customer property never touches the database, leaving only the query for the list."
    variants:
      - snippet: |
          class DB:
              def __init__(self):
                  self.queries = 0

              def fetch_orders(self, n, preloaded):
                  self.queries += 1
                  return [Order(self, preloaded) for _ in range(n)]

          class Order:
              def __init__(self, db, preloaded):
                  self.db = db
                  self.preloaded = preloaded

              @property
              def customer(self):
                  if not self.preloaded:
                      self.db.queries += 1
                  return "c"

          db = DB()
          for o in db.fetch_orders(5, preloaded=False):
              _ = o.customer
          print(db.queries)
        expected:
          kind: scalar
          value: 6
      - snippet: |
          class DB:
              def __init__(self):
                  self.queries = 0

              def fetch_orders(self, n, preloaded):
                  self.queries += 1
                  return [Order(self, preloaded) for _ in range(n)]

          class Order:
              def __init__(self, db, preloaded):
                  self.db = db
                  self.preloaded = preloaded

              @property
              def customer(self):
                  if not self.preloaded:
                      self.db.queries += 1
                  return "c"

          db = DB()
          for o in db.fetch_orders(10, preloaded=True):
              _ = o.customer
          print(db.queries)
        expected:
          kind: scalar
          value: 1

  - id: django-models-orm-prefetch-quiz-001
    concept: django-models-orm
    type: theory-quiz
    difficulty: 3
    prompt: "You are listing customers and, for each, all their orders (reverse ForeignKey, a \"many\" relation). How do you avoid N+1?"
    choices:
      - id: a
        text: "prefetch_related('orders'): fetches the orders in a separate query and stitches them to the customers in Python."
      - id: b
        text: "select_related('orders'): does a single JOIN, like for any relation."
      - id: c
        text: "Nothing helps: N+1 on reverse relations is unavoidable."
      - id: d
        text: "get('orders'): it immediately pulls in all related orders."
    correct: [a]
    explanation: "For \"many related\" relations (ManyToMany and reverse ForeignKey), a JOIN would blow up the result, so select_related doesn't fit. prefetch_related runs a separate query for the orders and stitches the data together in memory, turning N+1 into a fixed number of queries."
    hints:
      - "Here one customer has MANY orders. A JOIN that pulls in one related row would blow up the result set here - so a different mechanism is needed."
      - "One of the two tools does a JOIN (good for a single related object), the other runs a separate query and stitches the results in Python (for collections). Which fits \"many\"?"
