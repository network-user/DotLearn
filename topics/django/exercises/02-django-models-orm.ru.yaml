exercises:
  - id: django-models-orm-lazy-quiz-001
    concept: django-models-orm
    type: theory-quiz
    difficulty: 1
    prompt: "В какой момент QuerySet впервые идёт в базу за данными?"
    choices:
      - id: a
        text: "При итерации в цикле for, срезе с индексом или вызове list() - когда у него реально требуют данные."
      - id: b
        text: "Сразу при вызове .filter() - он немедленно выполняет SELECT."
      - id: c
        text: "В момент создания модели через makemigrations."
      - id: d
        text: "Никогда сам: данные нужно явно выгружать командой migrate."
    correct: [a]
    explanation: "QuerySet ленив: filter/exclude/order_by только достраивают рецепт запроса. SQL выполняется, когда данные действительно нужны - на итерации, срезе с индексом, list(), len(), count()."
    variants:
      - prompt: "Что делает цепочка Order.objects.filter(...).exclude(...).order_by(...) до того, как результат используют?"
        choices:
          - id: a
            text: "Только достраивает рецепт запроса, не обращаясь к базе."
          - id: b
            text: "Выполняет три отдельных SELECT - по одному на каждый вызов."
          - id: c
            text: "Создаёт миграцию для таблицы заказов."
          - id: d
            text: "Удаляет строки, не подходящие под условие, прямо в базе."
        correct: [a]
        explanation: "Каждый вызов возвращает новый QuerySet с дополненным рецептом и не трогает базу. Django соберёт из всех уточнений один SQL и сходит за данными ровно раз - на итерации или list()."
      - prompt: "Зачем Django делает QuerySet ленивым, а не выполняет запрос сразу?"
        choices:
          - id: a
            text: "Чтобы собрать все уточнения в один SQL и сходить в базу один раз, а не выполнять промежуточные filter по отдельности."
          - id: b
            text: "Чтобы данные хранились в оперативной памяти между запусками сервера."
          - id: c
            text: "Чтобы каждое поле модели стало отдельной таблицей."
          - id: d
            text: "Ленивость нужна только для миграций, на выборку данных она не влияет."
        correct: [a]
        explanation: "Лень - это оптимизация: отложив запрос, ORM собирает из всех filter/exclude/order_by единый SQL и идёт в базу один раз. Плюс ленивый QuerySet можно передать дальше, и получатель сам решит, нужны ли ему данные."

  - id: django-models-orm-get-quiz-001
    concept: django-models-orm
    type: theory-quiz
    difficulty: 2
    prompt: "Order.objects.get(status='paid') выполняется, когда оплаченных заказов в базе три. Что произойдёт?"
    choices:
      - id: a
        text: "Будет выброшено MultipleObjectsReturned: get требует ровно один объект."
      - id: b
        text: "Вернётся QuerySet из трёх заказов."
      - id: c
        text: "Вернётся первый из трёх заказов, остальные будут отброшены."
      - id: d
        text: "Будет выброшено DoesNotExist, потому что условие неуникально."
    correct: [a]
    explanation: "get() возвращает ровно один объект. Если подходит больше одной строки, он выбрасывает MultipleObjectsReturned. Для неуникального признака берут filter(), который возвращает набор."
    variants:
      - prompt: "Order.objects.get(id=999) вызвали, но заказа с таким id нет. Что произойдёт?"
        choices:
          - id: a
            text: "Будет выброшено DoesNotExist."
          - id: b
            text: "Вернётся None."
          - id: c
            text: "Вернётся пустой QuerySet."
          - id: d
            text: "Будет выброшено MultipleObjectsReturned."
        correct: [a]
        explanation: "Если ни одна строка не подошла, get() выбрасывает DoesNotExist. Чтобы получить объект или None без исключения, используют filter(id=999).first()."
      - prompt: "Нужно получить заказ, которого может и не быть в базе, без падения с исключением. Что выбрать?"
        choices:
          - id: a
            text: "filter(...).first() - вернёт объект или None."
          - id: b
            text: "get(...) - он молча вернёт None, если ничего не нашёл."
          - id: c
            text: "exclude(...) - он гарантирует один объект."
          - id: d
            text: "all() - он вернёт ровно искомый объект."
        correct: [a]
        explanation: "get() для отсутствующих данных падает с DoesNotExist. filter(...).first() возвращает первый подходящий объект или None, если набор пуст - это безопасный способ для «может быть, а может и нет»."

  - id: django-models-orm-relations-fill-001
    concept: django-models-orm
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски в описании полей-связей Django."
    template: |
      Связь «многие к одному» задаёт поле {{fk}}.
      Связь «многие ко многим» задаёт поле {{m2m}}.
      Обратное обращение от объекта к связанным настраивает параметр {{related}}.
    blanks:
      fk:
        accept: ["ForeignKey", "foreignkey", "ForeignKey()"]
      m2m:
        accept: ["ManyToManyField", "manytomanyfield", "ManyToMany"]
      related:
        accept: ["related_name", "related-name"]
    variants:
      - prompt: "Заполните пропуски про обязательные параметры ForeignKey и обратную связь."
        template: |
          У ForeignKey обязателен параметр {{ondelete}}, который говорит, что делать со связанными строками при удалении.
          Чтобы запретить удаление родителя, для него передают значение {{protect}}.
          Имея клиента c с related_name="orders", его заказы достают вызовом c.{{access}}.all().
        blanks:
          ondelete:
            accept: ["on_delete", "on-delete"]
          protect:
            accept: ["PROTECT", "models.PROTECT", "protect"]
          access:
            accept: ["orders", "order"]
      - prompt: "Заполните пропуски про миграции."
        template: |
          Команда {{make}} сравнивает модели с прошлым состоянием и пишет файл-рецепт изменений.
          Команда {{apply}} применяет накопленные миграции к базе данных.
          Меняет схему базы именно {{which}}, а не первая команда.
        blanks:
          make:
            accept: ["makemigrations", "manage.py makemigrations", "make migrations"]
          apply:
            accept: ["migrate", "manage.py migrate"]
          which:
            accept: ["migrate", "manage.py migrate"]

  - id: django-models-orm-lazy-predict-001
    concept: django-models-orm
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Класс LazyQuery моделирует ленивость QuerySet: достраивание рецепта (filter/order_by) не ходит в базу, а реальный поход случается только на итерации (list)."
    snippet: |
      class LazyQuery:
          def __init__(self, log):
              self.log = log
              self.steps = []

          def filter(self, cond):
              self.steps.append(cond)
              return self

          def order_by(self, field):
              self.steps.append("order:" + field)
              return self

          def to_list(self):
              self.log.append("DB:" + ",".join(self.steps))
              return []

      log = []
      qs = LazyQuery(log)
      qs.filter("paid").order_by("created")
      print(len(log))
      qs.to_list()
      print(len(log))
      print(log[0])
    expected:
      kind: stdout
      value: |-
        0
        1
        DB:paid,order:created
    hints:
      - "filter и order_by только наращивают рецепт и возвращают тот же объект - база при этом спит. Что трогает базу?"
      - "Считайте записи в log по шагам: сколько их после построения рецепта, сколько после to_list(), и что записано первым."
      - "to_list() - единственное место, где в log добавляется строка 'DB:...'. До него log пуст."
    variants:
      - snippet: |
          class LazyQuery:
              def __init__(self, log):
                  self.log = log
                  self.steps = []

              def filter(self, cond):
                  self.steps.append(cond)
                  return self

              def to_list(self):
                  self.log.append("DB")
                  return []

          log = []
          qs = LazyQuery(log)
          qs.filter("a").filter("b").filter("c")
          print(len(log), len(qs.steps))
        expected:
          kind: stdout
          value: "0 3"
      - snippet: |
          class LazyQuery:
              def __init__(self, log):
                  self.log = log
                  self.steps = []

              def filter(self, cond):
                  self.steps.append(cond)
                  return self

              def to_list(self):
                  self.log.append("hit")
                  return []

          log = []
          qs = LazyQuery(log)
          qs.filter("x")
          qs.to_list()
          qs.to_list()
          print(len(log))
        expected:
          kind: scalar
          value: 2

  - id: django-models-orm-nplus1-predict-001
    concept: django-models-orm
    type: predict-output
    difficulty: 4
    prompt: "Что выведет программа? Она моделирует N+1: счётчик queries растёт на 1 за список заказов, и ещё на 1 за каждое ленивое обращение к customer. Затем тот же сценарий с предзагрузкой (select_related), где связанные данные уже в объекте."
    snippet: |
      class DB:
          def __init__(self):
              self.queries = 0

          def fetch_orders(self, n, preloaded):
              self.queries += 1
              return [Order(i, self, preloaded) for i in range(n)]

      class Order:
          def __init__(self, oid, db, preloaded):
              self.oid = oid
              self.db = db
              self.preloaded = preloaded

          @property
          def customer(self):
              if not self.preloaded:
                  self.db.queries += 1
              return "customer"

      db = DB()
      for o in db.fetch_orders(3, preloaded=False):
          _ = o.customer
      naive = db.queries

      db2 = DB()
      for o in db2.fetch_orders(3, preloaded=True):
          _ = o.customer
      eager = db2.queries

      print(naive, eager)
    expected:
      kind: stdout
      value: "4 1"
    hints:
      - "Без предзагрузки каждое обращение к связанному объекту в цикле - отдельный поход в базу. Это один запрос за списком плюс по одному на элемент."
      - "Посчитайте отдельно: сколько запросов на сам список из 3 заказов и сколько добавит обращение к customer для каждого. Потом то же при preloaded=True."
      - "При preloaded=False: 1 (список) + 3 (по customer на заказ) = naive. При preloaded=True свойство customer не трогает базу, остаётся только запрос за списком."
    variants:
      - snippet: |
          class DB:
              def __init__(self):
                  self.queries = 0

              def fetch_orders(self, n, preloaded):
                  self.queries += 1
                  return [Order(self, preloaded) for _ in range(n)]

          class Order:
              def __init__(self, db, preloaded):
                  self.db = db
                  self.preloaded = preloaded

              @property
              def customer(self):
                  if not self.preloaded:
                      self.db.queries += 1
                  return "c"

          db = DB()
          for o in db.fetch_orders(5, preloaded=False):
              _ = o.customer
          print(db.queries)
        expected:
          kind: scalar
          value: 6
      - snippet: |
          class DB:
              def __init__(self):
                  self.queries = 0

              def fetch_orders(self, n, preloaded):
                  self.queries += 1
                  return [Order(self, preloaded) for _ in range(n)]

          class Order:
              def __init__(self, db, preloaded):
                  self.db = db
                  self.preloaded = preloaded

              @property
              def customer(self):
                  if not self.preloaded:
                      self.db.queries += 1
                  return "c"

          db = DB()
          for o in db.fetch_orders(10, preloaded=True):
              _ = o.customer
          print(db.queries)
        expected:
          kind: scalar
          value: 1

  - id: django-models-orm-prefetch-quiz-001
    concept: django-models-orm
    type: theory-quiz
    difficulty: 3
    prompt: "Вы выводите список клиентов и для каждого - все его заказы (обратная ForeignKey, отношение «много»). Чем убрать N+1?"
    choices:
      - id: a
        text: "prefetch_related('orders'): возьмёт заказы отдельным запросом и сошьёт их с клиентами в Python."
      - id: b
        text: "select_related('orders'): сделает один JOIN, как для любой связи."
      - id: c
        text: "Ничем: N+1 на обратных связях неизбежен."
      - id: d
        text: "get('orders'): он сразу подтянет все связанные заказы."
    correct: [a]
    explanation: "Для «много связанных» (ManyToMany и обратные ForeignKey) JOIN раздул бы результат, поэтому select_related не подходит. prefetch_related делает отдельный запрос за заказами и склеивает данные в памяти, превращая N+1 в фиксированное число запросов."
    hints:
      - "Здесь у одного клиента МНОГО заказов. JOIN, который тянет одну связанную строку, тут раздул бы выборку - значит, нужен другой механизм."
      - "Один из двух инструментов делает JOIN (хорош для одного связанного объекта), другой - отдельный запрос с последующей сшивкой в Python (для коллекций). Какой подходит для «много»?"
