exercises:
  - id: django-admin-auth-authn-authz-quiz-001
    concept: django-admin-auth
    type: theory-quiz
    difficulty: 1
    prompt: "На какой вопрос отвечает аутентификация?"
    choices:
      - id: a
        text: "«Кто ты?» - установить личность, проверив логин и пароль."
      - id: b
        text: "«Что тебе можно?» - решить, разрешено ли действие."
      - id: c
        text: "«Как быстро отвечает сервер?» - измерить задержку."
      - id: d
        text: "«Где хранятся данные?» - выбрать таблицу базы."
    correct: [a]
    explanation: "Аутентификация отвечает на «кто ты?»: устанавливает личность, проверяя логин и пароль. Результат - request.user и его is_authenticated. На «что тебе можно?» отвечает авторизация (права и группы)."
    variants:
      - prompt: "На какой вопрос отвечает авторизация?"
        choices:
          - id: a
            text: "«Что тебе можно?» - решить, разрешено ли действие установленному пользователю."
          - id: b
            text: "«Кто ты?» - проверить логин и пароль как полное описание этого поведения."
          - id: c
            text: "«Действует ли учётная запись?» - и только это как полное описание этого поведения."
          - id: d
            text: "«Какой у пользователя пароль?» - восстановить его из базы."
        correct: [a]
        explanation: "Авторизация отвечает на «что тебе можно?»: решает, разрешено ли действие уже установленному пользователю, через права и группы. Установление личности - это аутентификация."
      - prompt: "Что из перечисленного относится к АУТЕНТИФИКАЦИИ, а не к авторизации?"
        choices:
          - id: a
            text: "Проверка пары логин-пароль функцией authenticate."
          - id: b
            text: "Проверка права shop.delete_order у пользователя."
          - id: c
            text: "Добавление пользователя в группу «менеджеры»."
          - id: d
            text: "Решение, может ли пользователь удалять заказы."
        correct: [a]
        explanation: "Проверка логина и пароля (authenticate) устанавливает личность - это аутентификация. Проверка прав, групп и решение о допуске к действию - это авторизация."

  - id: django-admin-auth-isauth-quiz-001
    concept: django-admin-auth
    type: theory-quiz
    difficulty: 2
    prompt: "Как правильно проверить во view, что пользователь вошёл в систему?"
    choices:
      - id: a
        text: "request.user.is_authenticated - флаг True у вошедшего и False у гостя (AnonymousUser)."
      - id: b
        text: "Проверить request.user на истинность: если он есть, значит пользователь вошёл."
      - id: c
        text: "Сравнить request.user с None: гость - это None как полное описание этого поведения."
      - id: d
        text: "Вызвать request.user.login() и посмотреть результат как полное описание этого поведения."
    correct: [a]
    explanation: "request.user есть всегда: у гостя это AnonymousUser, который как объект истинен и не равен None. Признак входа - именно свойство-флаг request.user.is_authenticated."
    variants:
      - prompt: "Что представляет собой request.user для анонимного посетителя (гостя)?"
        choices:
          - id: a
            text: "Специальный объект AnonymousUser, у которого is_authenticated равно False."
          - id: b
            text: "Значение None - у гостя пользователя нет вовсе как полное описание этого поведения."
          - id: c
            text: "Пустая строка; другого корректного поведения система не допускает."
          - id: d
            text: "Тот же объект User, что и у вошедших, просто без пароля."
        correct: [a]
        explanation: "У гостя request.user - это AnonymousUser. Он существует как объект (истинен, не None), но его is_authenticated равно False. Поэтому вход проверяют именно по is_authenticated."
      - prompt: "Что возвращает authenticate, если логин и пароль не совпали?"
        choices:
          - id: a
            text: "None - неверные данные это штатный исход, а не исключение."
          - id: b
            text: "Объект User с пустыми полями как полное описание этого поведения."
          - id: c
            text: "Бросает исключение AuthenticationError."
          - id: d
            text: "False, который потом передают в login. Иной интерпретации не требуется."
        correct: [a]
        explanation: "authenticate возвращает None при неверных данных (это не ошибка-исключение, а обычный «не тот»). Результат проверяют на None и только найденного пользователя передают в login."

  - id: django-admin-auth-modeladmin-fill-001
    concept: django-admin-auth
    type: fill-in-blanks
    difficulty: 2
    prompt: "Заполните пропуски про настройку ModelAdmin (укажите имена атрибутов)."
    template: |
      Колонки в списке объектов задаёт атрибут {{cols}}.
      Поля, по которым работает строка поиска, задаёт атрибут {{search}}.
      Боковую панель быстрых фильтров задаёт атрибут {{filter}}.
    blanks:
      cols:
        accept: ["list_display"]
      search:
        accept: ["search_fields"]
      filter:
        accept: ["list_filter"]
    variants:
      - prompt: "Заполните пропуски про вход и выход (укажите имена функций/свойств)."
        template: |
          Пару логин-пароль проверяет функция {{check}}, возвращая User или None.
          Сохраняет пользователя в сессию функция {{login}}.
          Очищает сессию функция {{logout}}.
        blanks:
          check:
            accept: ["authenticate", "authenticate()"]
          login:
            accept: ["login", "login()"]
          logout:
            accept: ["logout", "logout()"]
      - prompt: "Заполните пропуски про защиту страниц и права."
        template: |
          Пустить во function-based view только вошедших позволяет декоратор {{dec}}.
          Требовать у class-based view конкретное право позволяет миксин {{mixin}}.
          Именованный набор прав, который выдают пользователям разом, называется {{group}}.
        blanks:
          dec:
            accept: ["login_required"]
          mixin:
            accept: ["PermissionRequiredMixin"]
          group:
            accept: ["группа", "группой", "group"]

  - id: django-admin-auth-login-predict-001
    concept: django-admin-auth
    type: predict-output
    difficulty: 3
    prompt: "Что выведет программа? Она моделирует вход: authenticate возвращает пользователя или None, и только при найденном пользователе вызывается login (запись в сессию)."
    snippet: |
      USERS = {"anna": "secret", "boris": "pass"}

      def authenticate(username, password):
          if USERS.get(username) == password:
              return username
          return None

      session = {}

      def login(session, user):
          session["user"] = user

      def sign_in(username, password):
          user = authenticate(username, password)
          if user is not None:
              login(session, user)
              return "ok:" + user
          return "denied"

      print(sign_in("anna", "secret"))
      print(sign_in("boris", "wrong"))
      print(session.get("user"))
    expected:
      kind: stdout
      value: |-
        ok:anna
        denied
        anna
    hints:
      - "Вход - два шага: сначала проверка пары логин-пароль, потом запись в сессию. Запись происходит только если проверка кого-то нашла."
      - "Для каждого вызова определите, что вернул authenticate (пользователя или None), и попадёт ли управление в ветку с login."
      - "Первый вызов: пароль anna верный -> login пишет в сессию, возвращается ok:anna. Второй: пароль boris неверный -> authenticate даёт None -> denied, сессия не меняется."
    variants:
      - snippet: |
          USERS = {"anna": "secret", "boris": "pass"}

          def authenticate(username, password):
              if USERS.get(username) == password:
                  return username
              return None

          session = {}

          def login(session, user):
              session["user"] = user

          def sign_in(username, password):
              user = authenticate(username, password)
              if user is not None:
                  login(session, user)
                  return "ok:" + user
              return "denied"

          print(sign_in("boris", "pass"))
          print(session.get("user"))
        expected:
          kind: stdout
          value: |-
            ok:boris
            boris
      - snippet: |
          USERS = {"anna": "secret", "boris": "pass"}

          def authenticate(username, password):
              if USERS.get(username) == password:
                  return username
              return None

          session = {}

          def login(session, user):
              session["user"] = user

          def sign_in(username, password):
              user = authenticate(username, password)
              if user is not None:
                  login(session, user)
                  return "ok:" + user
              return "denied"

          print(sign_in("vera", "secret"))
          print(session.get("user"))
        expected:
          kind: stdout
          value: |-
            denied
            None

  - id: django-admin-auth-perms-predict-001
    concept: django-admin-auth
    type: predict-output
    difficulty: 4
    prompt: "Что выведет программа? Она моделирует слой авторизации: суперпользователь обходит проверку прав, остальным право даётся напрямую или через группу. login_required лишь требует факта входа, а не конкретного права."
    snippet: |
      class User:
          def __init__(self, name, perms, groups, is_super=False):
              self.name = name
              self.perms = set(perms)
              self.groups = groups
              self.is_super = is_super
              self.is_authenticated = True

      GROUP_PERMS = {"managers": {"view_order", "change_order"}}

      def has_perm(user, perm):
          if user.is_super:
              return True
          if perm in user.perms:
              return True
          for g in user.groups:
              if perm in GROUP_PERMS.get(g, set()):
                  return True
          return False

      anna = User("anna", {"view_order"}, [])
      boris = User("boris", set(), ["managers"])
      root = User("root", set(), [], is_super=True)

      print(has_perm(anna, "view_order"), has_perm(anna, "change_order"))
      print(has_perm(boris, "change_order"))
      print(has_perm(root, "delete_order"))
    expected:
      kind: stdout
      value: |-
        True False
        True
        True
    hints:
      - "Право можно иметь тремя путями: ты суперпользователь, право выдано лично, или оно приходит из твоей группы. Вход в систему сам по себе права не даёт."
      - "Для каждого пользователя пройдите проверку по порядку: суперпользователь? есть право лично? даёт ли его какая-то группа? Если нигде - отказ."
      - "anna имеет view_order лично, но не change_order (и без групп). boris получает change_order из группы managers. root - суперпользователь, поэтому любое право."
    variants:
      - snippet: |
          class User:
              def __init__(self, name, perms, groups, is_super=False):
                  self.name = name
                  self.perms = set(perms)
                  self.groups = groups
                  self.is_super = is_super
                  self.is_authenticated = True

          GROUP_PERMS = {"managers": {"view_order", "change_order"}}

          def has_perm(user, perm):
              if user.is_super:
                  return True
              if perm in user.perms:
                  return True
              for g in user.groups:
                  if perm in GROUP_PERMS.get(g, set()):
                      return True
              return False

          boris = User("boris", set(), ["managers"])
          print(has_perm(boris, "view_order"), has_perm(boris, "delete_order"))
        expected:
          kind: stdout
          value: "True False"
      - snippet: |
          class User:
              def __init__(self, name, perms, groups, is_super=False):
                  self.name = name
                  self.perms = set(perms)
                  self.groups = groups
                  self.is_super = is_super
                  self.is_authenticated = True

          GROUP_PERMS = {"managers": {"view_order", "change_order"}}

          def has_perm(user, perm):
              if user.is_super:
                  return True
              if perm in user.perms:
                  return True
              for g in user.groups:
                  if perm in GROUP_PERMS.get(g, set()):
                      return True
              return False

          guest = User("guest", set(), [])
          print(guest.is_authenticated, has_perm(guest, "view_order"))
        expected:
          kind: stdout
          value: "True False"

  - id: django-admin-auth-loginrequired-quiz-001
    concept: django-admin-auth
    type: theory-quiz
    difficulty: 3
    prompt: "Вошедший пользователь без права shop.delete_order открывает view, защищённый только декоратором login_required, который удаляет заказ. Что произойдёт и почему?"
    choices:
      - id: a
        text: "Заказ удалится: login_required проверяет лишь факт входа, а не конкретное право; для проверки права нужен PermissionRequiredMixin или has_perm."
      - id: b
        text: "Django откажет с 403: login_required заодно проверяет все права на действие как полное описание этого поведения."
      - id: c
        text: "Пользователя перенаправит на вход, хотя он уже вошёл - полный перечень частей, которыми обычно подменяют ответ."
      - id: d
        text: "Заказ удалится только если пользователь - суперпользователь; иначе ошибка, если смотреть только на самый верхний слой."
    correct: [a]
    explanation: "login_required проверяет только request.user.is_authenticated - факт входа. Любой вошедший пройдёт его, даже без нужного права. Чтобы требовать конкретное право, используют PermissionRequiredMixin (для CBV) или проверку request.user.has_perm(..). Вход не равно «всё можно»."
    hints:
      - "Разделите два вопроса: «вошёл ли пользователь» и «есть ли у него право на это действие». Что именно из двух проверяет login_required?"
      - "login_required смотрит на is_authenticated и больше ни на что. Если вошедшему не хватает конкретного права, остановит ли его этот декоратор?"
