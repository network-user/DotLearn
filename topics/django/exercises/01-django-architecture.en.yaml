exercises:
  - id: django-mtv-mapping-001
    concept: django-architecture
    type: theory-quiz
    difficulty: 1
    prompt: "In classic MVC, what does Template correspond to in Django's MTV?"
    choices:
      - id: a
        text: "The View from MVC: it is HTML with placeholders for data."
      - id: b
        text: "The Controller from MVC: it receives the request and decides what to do."
      - id: c
        text: "The Model from MVC: it stores data and rules."
      - id: d
        text: "The router: it maps a URL to a handler."
    correct: [a]
    explanation: "Template in Django is the \"view\" from MVC: an HTML template with holes for data. Django's View plays the role of the controller. Model means the same thing in both worlds."
    variants:
      - prompt: "Which classic MVC role does View play in Django?"
        choices:
          - id: a
            text: "The controller: it receives the request, calls the models, and picks a template."
          - id: b
            text: "The view: it is always fully responsible for the HTML the user sees."
          - id: c
            text: "The model: it describes a database table for every request path in the app."
          - id: d
            text: "The server: it accepts the network connection for every request path in the app."
        correct: [a]
        explanation: "View in Django is the \"controller\" from MVC: a function that receives a request, talks to the models, and returns a response, usually via a template. The \"view\" role in MVC is called Template in Django."
      - prompt: "What in Django's MTV is responsible for data and domain rules?"
        choices:
          - id: a
            text: "Model - a class that mirrors a database table."
          - id: b
            text: "Template - it holds data between requests."
          - id: c
            text: "View - it is what holds application state."
          - id: d
            text: "settings.py - it lists all of the site's data."
        correct: [a]
        explanation: "Model in Django, just like in MVC, is responsible for data and rules: it is a class that mirrors a database table. Template is about output, View is about handling the request."

  - id: django-project-vs-app-001
    concept: django-architecture
    type: theory-quiz
    difficulty: 1
    prompt: "How does a Django project differ from an app?"
    choices:
      - id: a
        text: "A project is the whole site's configuration (one settings.py); an app is a reusable module for one domain area inside the project."
      - id: b
        text: "Project and app are always synonyms: they are the same thing, just created with different commands for every request path in the app."
      - id: c
        text: "An app holds the whole site's settings, and a project holds only the models for any payload and any deploy target."
      - id: d
        text: "There can only be one project per server; an app is a separate server as a complete account of that behavior."
    correct: [a]
    explanation: "A project is the configuration of the whole site: one settings.py, the root routes, the entry point. An app is a module for one domain area (orders, accounts) with its own models and views; one app can be plugged into different projects."
    variants:
      - prompt: "Where in a Django project are the installed apps and database settings listed?"
        choices:
          - id: a
            text: "In the project's settings.py - the single registry of settings for the whole site."
          - id: b
            text: "In manage.py - that is always where the configuration lives for every request path in the app."
          - id: c
            text: "In a separate settings.py inside each app under any load volume and data size."
          - id: d
            text: "In the models.py file of the root app when only the outer call is considered."
        correct: [a]
        explanation: "The project's settings.py is the single settings registry: INSTALLED_APPS, database parameters, the middleware list, template paths. An app does not keep its own copy of the site's settings, it only registers itself in INSTALLED_APPS."
      - prompt: "What is manage.py for?"
        choices:
          - id: a
            text: "It is the entry point for commands: runserver, migrate, createsuperuser; a wrapper that loads settings.py."
          - id: b
            text: "It is a file describing all of the project's models as a complete account of that behavior."
          - id: c
            text: "It is always the production web server that holds connections in production for every request path in the app."
          - id: d
            text: "It is the URL routing configuration for the whole site when only the outer call is considered."
        correct: [a]
        explanation: "manage.py is a thin wrapper that loads settings.py and hands control to Django to run commands: starting the dev server, applying migrations, creating an admin user."

  - id: django-request-path-fill-001
    concept: django-architecture
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the blanks describing the path of a request through Django."
    template: |
      The server creates an {{request}} object with the request data.
      The request travels through the {{middleware}} chain top to bottom.
      Then the URL {{resolver}} finds a matching handler for the path.
      The handler ({{view}}) runs the logic and returns a {{response}}.
    blanks:
      request:
        accept: ["HttpRequest", "request", "httprequest"]
      middleware:
        accept: ["middleware"]
      resolver:
        accept: ["resolver"]
      view:
        accept: ["view"]
      response:
        accept: ["HttpResponse", "response", "httpresponse"]
    variants:
      - prompt: "Fill in the blanks about the MTV layers and their roles."
        template: |
          The {{model}} layer mirrors a database table as a Python class.
          The {{template}} layer holds HTML with placeholders for data.
          The {{view}} layer receives the request, calls the models, and picks a template.
        blanks:
          model:
            accept: ["Model", "model"]
          template:
            accept: ["Template", "template"]
          view:
            accept: ["View", "view"]
      - prompt: "Fill in the blanks about the interfaces between the server and Django."
        template: |
          The synchronous "server to Django" interface is called {{sync}}.
          The asynchronous interface that supports WebSocket is called {{async}}.
          Project commands are run through the {{entry}} file.
        blanks:
          sync:
            accept: ["WSGI", "wsgi"]
          async:
            accept: ["ASGI", "asgi"]
          entry:
            accept: ["manage.py", "manage"]

  - id: django-middleware-order-001
    concept: django-architecture
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It models a middleware chain: on the way in, layers run top to bottom; on the way out, in reverse order."
    snippet: |
      middleware = ["auth", "session", "csrf"]
      log = []

      for name in middleware:
          log.append("in:" + name)
      log.append("view")
      for name in reversed(middleware):
          log.append("out:" + name)

      print(log[0], log[3], log[-1])
    expected:
      kind: stdout
      value: "in:auth view out:auth"
    hints:
      - "The request travels through a pipeline: each middleware runs on the way in top to bottom, then the view, then the same middleware on the way out - but in reverse order."
      - "Build the list step by step: first three in: entries in list order, then view, then three out: entries in reverse order. What sits at positions 0, 3, and last?"
    variants:
      - snippet: |
          middleware = ["security", "session", "auth"]
          log = []

          for name in middleware:
              log.append("in:" + name)
          log.append("view")
          for name in reversed(middleware):
              log.append("out:" + name)

          print(log[1], log[-1])
        expected:
          kind: stdout
          value: "in:session out:security"
      - snippet: |
          middleware = ["gzip", "common"]
          log = []

          for name in middleware:
              log.append("in:" + name)
          log.append("view")
          for name in reversed(middleware):
              log.append("out:" + name)

          print(len(log), log[-1])
        expected:
          kind: stdout
          value: "5 out:gzip"

  - id: django-middleware-shortcircuit-001
    concept: django-architecture
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It models a middleware that can short-circuit the request before the view: if the user is not authenticated, the chain returns a redirect and the view is never called."
    snippet: |
      def handle(authenticated):
          trace = []
          trace.append("auth")
          if not authenticated:
              trace.append("redirect")
              return trace
          trace.append("view")
          return trace

      print(handle(False))
      print(handle(True))
    expected:
      kind: stdout
      value: "['auth', 'redirect']\n['auth', 'view']"
    hints:
      - "A middleware on the way in is allowed to return a response itself, without passing the request further. What happens to the view layer then?"
      - "With authenticated=False the function returns trace right after appending 'redirect' - before the line with 'view'. With True it reaches 'view'."
    variants:
      - snippet: |
          def handle(has_session):
              trace = []
              trace.append("session")
              if not has_session:
                  trace.append("login_redirect")
                  return trace
              trace.append("view")
              return trace

          print(handle(True))
        expected:
          kind: stdout
          value: "['session', 'view']"
      - snippet: |
          def handle(allowed):
              trace = ["security"]
              if not allowed:
                  trace.append("403")
                  return trace
              trace.append("view")
              return trace

          print(handle(False))
        expected:
          kind: stdout
          value: "['security', '403']"

  - id: django-installed-apps-order-001
    concept: django-architecture
    type: theory-quiz
    difficulty: 4
    prompt: "Two apps in INSTALLED_APPS both define a template named base.html. Django loads a template by name. Which one is used, and why?"
    choices:
      - id: a
        text: "The one from the app listed higher in INSTALLED_APPS: the loader walks the list in order and takes the first name match."
      - id: b
        text: "Django raises a name conflict error and refuses to start as a complete account of that behavior."
      - id: c
        text: "Both templates are merged: blocks from both files get combined, - that is how the API contract should be read."
      - id: d
        text: "The template from the app with the alphabetically smaller name is used; list order does not matter."
    correct: [a]
    explanation: "INSTALLED_APPS is an ordered list, not a set. The default template loader walks apps in list order and returns the first template found with the requested name. So an app higher in the list \"shadows\" a same-named template from an app lower down - this is used on purpose to override another app's templates."
    hints:
      - "Think about how a list differs from a set: a list has order. What does that mean for finding the first name match?"
      - "The loader does not look for the \"best\" template - it takes the first match, walking sources in a fixed order. Which source does it check first?"
