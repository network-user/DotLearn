exercises:
  - id: django-templates-forms-bound-quiz-001
    concept: django-templates-forms
    type: theory-quiz
    difficulty: 1
    prompt: "What makes a Django form bound?"
    choices:
      - id: a
        text: "That it was created with data: OrderForm(request.POST); then it holds the submitted values and can be validated."
      - id: b
        text: "That the request came in as POST, regardless of data - the full set of roles in this architecture."
      - id: c
        text: "Calling a .bind() method after creating the form for every request path in the app."
      - id: d
        text: "Inheriting from ModelForm instead of Form, without special-case setup for this flow."
    correct: [a]
    explanation: "Boundness is determined not by the request method but by whether data was passed to the form. OrderForm() with no data is unbound (renders empty fields); OrderForm(request.POST) is bound and can be validated."
    variants:
      - prompt: "Why do you need an unbound OrderForm() with no data?"
        choices:
          - id: a
            text: "To render empty fields on a GET request: there is no data, nothing to validate."
          - id: b
            text: "To immediately validate submitted values via is_valid() for every request path in the app."
          - id: c
            text: "To delete an object from the database under any load volume and data size."
          - id: d
            text: "An unbound form is always not needed, it's created by mistake."
        correct: [a]
        explanation: "An unbound form is created with no data - there is nothing to validate in it. Its role is to render empty fields, usually on GET. Only a bound form (created with data) is validated."
      - prompt: "What makes ModelForm more convenient than a plain Form?"
        choices:
          - id: a
            text: "It builds fields automatically from the model - you only need to specify the model and field list."
          - id: b
            text: "It skips validation entirely: data from a ModelForm is always always correct."
          - id: c
            text: "It works without templates and without a view for any payload and any deploy target."
          - id: d
            text: "It disables the CSRF check for its forms as a complete account of that behavior."
        correct: [a]
        explanation: "When a form mirrors a model almost one to one, ModelForm builds the fields itself from the model. You specify the model and fields in Meta instead of describing every field by hand."

  - id: django-templates-forms-syntax-fill-001
    concept: django-templates-forms
    type: fill-in-blanks
    difficulty: 2
    prompt: "Fill in the blanks about Django's template language syntax (give only the keywords)."
    template: |
      A loop over items is opened with the {{loop}} tag and closed with endfor.
      A condition is opened with the {{cond}} tag and closed with endif.
      To make a child template inherit the base template's frame, the {{inherit}} tag is used.
      A replaceable region in the base template is declared with the {{slot}} tag.
    blanks:
      loop:
        accept: ["for"]
      cond:
        accept: ["if"]
      inherit:
        accept: ["extends"]
      slot:
        accept: ["block"]
    variants:
      - prompt: "Fill in the blanks about the stages of form validation (give the method/attribute names)."
        template: |
          The method that runs validation and returns True or False is {{check}}.
          The validated and type-converted values live in the {{clean}} dict.
          To flag an invalid value, a clean method raises the {{error}} exception.
        blanks:
          check:
            accept: ["is_valid", "is_valid()"]
          clean:
            accept: ["cleaned_data"]
          error:
            accept: ["ValidationError", "forms.ValidationError"]
      - prompt: "Fill in the blanks about protecting forms and rendering fields."
        template: |
          Every POST form must carry a hidden {{token}} token against cross-site request forgery.
          In the template it is inserted with the {% {{tag}} %} tag inside the form.
          Without it Django rejects the POST with code {{code}}.
        blanks:
          token:
            accept: ["CSRF", "csrf"]
          tag:
            accept: ["csrf_token"]
          code:
            accept: ["403"]

  - id: django-templates-forms-validate-predict-001
    concept: django-templates-forms
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It models form validation: is_valid collects field errors, and only fills cleaned_data when the error list is empty. Before a successful check, cleaned_data is empty."
    snippet: |
      class Form:
          def __init__(self, data):
              self.data = data
              self.errors = []
              self.cleaned_data = {}

          def is_valid(self):
              self.errors = []
              if self.data.get("amount", -1) < 0:
                  self.errors.append("amount")
              if not self.data.get("customer"):
                  self.errors.append("customer")
              if not self.errors:
                  self.cleaned_data = dict(self.data)
              return not self.errors

      f = Form({"amount": 10, "customer": "Anna"})
      print(f.is_valid(), len(f.cleaned_data))

      g = Form({"amount": -5, "customer": "Boris"})
      print(g.is_valid(), len(g.cleaned_data))
    expected:
      kind: stdout
      value: |-
        True 2
        False 0
    hints:
      - "The form fills cleaned data only when the check passed with no errors. What is in cleaned_data while validation has not succeeded?"
      - "For each form, collect the list of errors: which conditions fired? And does cleaned_data get filled when the error list is non-empty?"
      - "The first form has amount=10 and a non-empty customer - no errors, cleaned_data copies both keys. The second has amount=-5, which triggers an error, so cleaned_data stays empty."
    variants:
      - snippet: |
          class Form:
              def __init__(self, data):
                  self.data = data
                  self.errors = []
                  self.cleaned_data = {}

              def is_valid(self):
                  self.errors = []
                  if self.data.get("amount", -1) < 0:
                      self.errors.append("amount")
                  if not self.data.get("customer"):
                      self.errors.append("customer")
                  if not self.errors:
                      self.cleaned_data = dict(self.data)
                  return not self.errors

          f = Form({"amount": -1, "customer": ""})
          print(f.is_valid(), len(f.errors))
        expected:
          kind: stdout
          value: "False 2"
      - snippet: |
          class Form:
              def __init__(self, data):
                  self.data = data
                  self.errors = []
                  self.cleaned_data = {}

              def is_valid(self):
                  self.errors = []
                  if self.data.get("amount", -1) < 0:
                      self.errors.append("amount")
                  if not self.data.get("customer"):
                      self.errors.append("customer")
                  if not self.errors:
                      self.cleaned_data = dict(self.data)
                  return not self.errors

          f = Form({"amount": 0, "customer": "Vera"})
          print(f.is_valid(), len(f.errors), len(f.cleaned_data))
        expected:
          kind: stdout
          value: "True 0 2"

  - id: django-templates-forms-cleanreturn-predict-001
    concept: django-templates-forms
    type: predict-output
    difficulty: 3
    prompt: "What does the program print? It models a common mistake: a field's clean method MUST return a value, otherwise the field drops out of cleaned_data (the method returned None). Here clean_b returns nothing."
    snippet: |
      def clean_a(value):
          return value.strip()

      def clean_b(value):
          value.strip()

      raw = {"a": " x ", "b": " y "}
      cleaners = {"a": clean_a, "b": clean_b}

      cleaned = {}
      for field, value in raw.items():
          result = cleaners[field](value)
          if result is not None:
              cleaned[field] = result

      print(sorted(cleaned.keys()), cleaned.get("a"))
    expected:
      kind: stdout
      value: "['a'] x"
    hints:
      - "A clean method must return the cleaned value. What ends up as the result of a method with no return statement?"
      - "Go through both fields: what did clean_a return, and what did clean_b return? Which ones pass the result is not None check?"
      - "clean_b calls strip() but does not return the result, so it produces None and is left out of cleaned. Only 'a' with value 'x' remains."
    variants:
      - snippet: |
          def clean_a(value):
              value.upper()

          def clean_b(value):
              return value.upper()

          raw = {"a": "x", "b": "y"}
          cleaners = {"a": clean_a, "b": clean_b}

          cleaned = {}
          for field, value in raw.items():
              result = cleaners[field](value)
              if result is not None:
                  cleaned[field] = result

          print(sorted(cleaned.keys()))
        expected:
          kind: stdout
          value: "['b']"
      - snippet: |
          def clean_a(value):
              return value * 2

          def clean_b(value):
              return value * 3

          raw = {"a": "ab", "b": "c"}
          cleaners = {"a": clean_a, "b": clean_b}

          cleaned = {}
          for field, value in raw.items():
              result = cleaners[field](value)
              if result is not None:
                  cleaned[field] = result

          print(cleaned["a"], cleaned["b"])
        expected:
          kind: stdout
          value: "abab ccc"

  - id: django-templates-forms-csrf-quiz-001
    concept: django-templates-forms
    type: theory-quiz
    difficulty: 3
    prompt: "Why does a POST form need a CSRF token, and why can't another site forge it?"
    choices:
      - id: a
        text: "The token is secret and tied to the session: another site can make the browser send a POST with cookies attached, but it doesn't know the token"
      - id: b
        text: "The token encrypts the request body, so the data cannot be read in transit; the system does not allow any other correct behavior."
      - id: c
        text: "The token speeds up form processing by validating it on the server ahead of time; the system does not allow any other correct behavior."
      - id: d
        text: "The token replaces authentication: with it you don't need to enter a password; the system does not allow any other correct behavior."
    correct: [a]
    explanation: "A CSRF attack tricks the user's browser into sending a POST to your site (cookies get attached automatically). The defense is a secret token tied to the session: another site doesn't know it. Django checks the token and rejects a POST without one with code 403. Django rejects a POST without it with code 403."
    hints:
      - "Think about what the attacking site HAS (it can trigger a request with someone else's cookies) and what it does NOT have (access to the content of your page)."
      - "The token is a unique secret value tied to the session and embedded in your form. Can a third-party site read it to put into a forged request?"

  - id: django-templates-forms-cleanorder-quiz-001
    concept: django-templates-forms
    type: theory-quiz
    difficulty: 4
    prompt: "A form needs to check that the end date is later than the start date - a rule that needs BOTH fields at once. Where should this check live, and why not in clean_end_date?"
    choices:
      - id: a
        text: "In clean (no suffix): it sees all fields via cleaned_data; clean_<field> runs per field and the other may be missing."
      - id: b
        text: "In the form's __init__: only there are both fields available before any validation runs."
      - id: c
        text: "In the template via an if tag: cross-field checks run when the form is rendered."
      - id: d
        text: "In clean_end_date: from there start_date's check result is always guaranteed to be visible."
    correct: [a]
    explanation: "The validation cascade runs like this: first each field and its clean_<field>, then the overall clean, which sees all fields already in cleaned_data. A check that depends on several fields goes in clean: at the clean_<field> stage of one field, another field might not be in cleaned_data yet."
    hints:
      - "Validation runs in a cascade: individual fields first, then an overall check. At which stage are ALL fields guaranteed to be in cleaned_data at once?"
      - "clean_<field> is responsible for one specific field and runs while fields are processed one by one. Is there a separate method that runs after all fields and sees them together? Which one?"
