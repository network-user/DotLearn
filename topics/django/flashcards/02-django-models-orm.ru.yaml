conceptId: django-models-orm
cards:
  - id: django-models-orm-01
    front: "Как класс модели отражается в базу данных в ORM Django?"
    back: "Модель - класс, наследник models.Model: имя класса становится таблицей, поля - столбцами, экземпляр - строкой. ORM переводит в обе стороны."
    tags: [django]
  - id: django-models-orm-02
    front: "Что задаёт вложенный class Meta в модели?"
    back: "Свойства таблицы целиком, а не отдельного поля: порядок сортировки по умолчанию (ordering), человекочитаемое имя (verbose_name), индексы, ограничения уникальности."
    tags: [django]
  - id: django-models-orm-03
    front: "Чем различаются makemigrations и migrate?"
    back: "makemigrations сравнивает модели с прошлым состоянием и пишет файл-рецепт изменений, базу при этом не трогает. migrate применяет накопленные миграции к базе. Миграции коммитят в репозиторий."
    tags: [django]
  - id: django-models-orm-04
    front: "Что значит «QuerySet ленив»?"
    back: "filter/exclude/order_by не идут в базу - каждый вызов лишь возвращает новый QuerySet с дополненным рецептом будущего запроса. База спит, пока у QuerySet реально не потребуют данные."
    tags: [django]
  - id: django-models-orm-05
    front: "В какой момент QuerySet «просыпается» и выполняет SQL?"
    back: "Когда у него требуют данные: итерация в for, срез с индексом, list(), len(), bool() или агрегаты вроде count(). До этого рецепт можно сколько угодно достраивать и передавать."
    tags: [django]
  - id: django-models-orm-06
    front: "Зачем ORM делает QuerySet ленивым?"
    back: "Лень - оптимизация: Django собирает все уточнения в один SQL и ходит в базу ровно раз, а не выполняет промежуточные filter по отдельности. Ленивый QuerySet можно передать дальше, и получатель сам решит, нужны ли данные."
    tags: [django]
  - id: django-models-orm-07
    front: "Чем get() отличается от filter() и exclude()?"
    back: "filter/exclude ленивы и возвращают QuerySet (возможно пустой). get() сразу идёт в базу и требует ровно один объект: DoesNotExist при отсутствии, MultipleObjectsReturned при множестве."
    tags: [django]
  - id: django-models-orm-08
    front: "Когда get() опасен и чем его заменить?"
    back: "get() по неуникальному признаку падает с MultipleObjectsReturned, по отсутствующему - с DoesNotExist. Используйте get только по уникальному полю (pk, unique=True); для «может быть, а может и нет» - filter(...).first()."
    tags: [django]
  - id: django-models-orm-09
    front: "Какие три вида связей выражает Django и для чего related_name и on_delete?"
    back: "ForeignKey (многие-к-одному), OneToOne (один-к-одному), ManyToMany (многие-ко-многим). related_name задаёт обратное обращение (c.orders.all()), on_delete - что делать с дочерними при удалении родителя (CASCADE/PROTECT/SET_NULL)."
    tags: [django]
  - id: django-models-orm-10
    front: "Что такое проблема N+1 в ORM?"
    back: "Один запрос за списком объектов плюс по одному запросу на каждый элемент при ленивом обращении к связи. Цикл по 100 заказам с order.customer.name даёт 101 запрос в базу."
    tags: [django]
  - id: django-models-orm-11
    front: "Чем select_related отличается от prefetch_related?"
    back: "select_related - для ForeignKey и OneToOne: делает JOIN и тянет связанные строки одним запросом. prefetch_related - для ManyToMany и обратных ForeignKey: делает отдельный запрос и сшивает данные в Python."
    tags: [django]
  - id: django-models-orm-12
    front: "Почему повторный for по тому же QuerySet не идёт в базу второй раз?"
    back: "QuerySet кэширует результат после первой итерации или list(). Повторный for по тому же объекту читает кэш. Но qs.filter(...) или qs.count() создаёт/выполняет новый запрос."
    tags: [django]
