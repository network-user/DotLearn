conceptId: django-templates-forms
cards:
  - id: django-templates-forms-01
    front: "Из каких трёх вкраплений состоит шаблон Django и откуда берутся значения?"
    back: "Переменные (двойные фигурные скобки) подставляют значение, теги (со знаками процента) управляют структурой - циклы, условия, наследование, фильтры (через вертикальную черту) преобразуют значение. Значения берутся из контекста, переданного view."
    tags: [django]
  - id: django-templates-forms-02
    front: "Что умеет запись через точку в шаблоне, например order.customer?"
    back: "Django пробует по очереди ключ словаря, атрибут объекта и даже вызов метода без аргументов. Одна и та же запись через точку работает для разных видов доступа к данным."
    tags: [django]
  - id: django-templates-forms-03
    front: "Почему язык шаблонов Django намеренно беден?"
    back: "В нём нельзя присвоить переменную, вызвать функцию с произвольными аргументами или написать сложное выражение. Это граница: вычисления - дело view, шаблон только показывает. «Нехватка» возможностей - сигнал перенести логику во view."
    tags: [django]
  - id: django-templates-forms-04
    front: "Как работает наследование шаблонов?"
    back: "Базовый шаблон задаёт каркас и объявляет блоки - дырки. Потомок через extends наследует каркас и заполняет только нужные блоки; всё вне блоков берёт у родителя. Общая шапка/подвал не дублируются."
    tags: [django]
  - id: django-templates-forms-05
    front: "Какие три вещи умеет класс Form?"
    back: "Нарисовать себя в HTML, принять присланные данные и проверить их. Каждый атрибут формы описывает поле ввода с его типом и правилами."
    tags: [django]
  - id: django-templates-forms-06
    front: "Когда вместо Form берут ModelForm?"
    back: "Когда форма привязана к модели почти один в один. ModelForm строит поля автоматически из модели - остаётся указать в class Meta модель и список полей, а не писать поля вручную."
    tags: [django]
  - id: django-templates-forms-07
    front: "Чем связанная (bound) форма отличается от несвязанной (unbound)?"
    back: "Несвязанная создана без данных (OrderForm()) - проверять нечего, годится нарисовать пустые поля. Связанная создана с данными (OrderForm(request.POST)) - её можно валидировать. Связанность зависит от данных, а не от метода запроса."
    tags: [django]
  - id: django-templates-forms-08
    front: "Что даёт вызов form.is_valid()?"
    back: "Запускает валидацию и возвращает True/False. После него появляются form.cleaned_data (приведённые и проверенные значения, только если валидация прошла) и form.errors с сообщениями по полям."
    tags: [django]
  - id: django-templates-forms-09
    front: "Какой каскад выполняет is_valid() под капотом?"
    back: "Сначала каждое поле приводит ввод к типу и проверяет базовые правила (required, max_length). Затем clean_<имя поля> для отдельного поля. Наконец clean (без суффикса) видит все поля сразу - для проверок, которым нужно несколько полей."
    tags: [django]
  - id: django-templates-forms-10
    front: "Как сообщить о невалидном значении и почему clean_<поле> должен возвращать значение?"
    back: "В clean-методе поднимают raise ValidationError - Django положит текст в form.errors и сделает форму невалидной. Метод clean_<поле> обязан вернуть значение, иначе поле молча пропадёт из cleaned_data."
    tags: [django]
  - id: django-templates-forms-11
    front: "Когда можно читать form.cleaned_data?"
    back: "Только после успешного is_valid(). До проверки очищенных данных просто нет. Сначала всегда if form.is_valid(), и только внутри этой ветки - form.cleaned_data."
    tags: [django]
  - id: django-templates-forms-12
    front: "Зачем в каждой POST-форме нужен CSRF-токен и почему сборка HTML строками во view опасна?"
    back: "CSRF-токен защищает от межсайтовой подделки: чужой сайт пришлёт POST с куками, но не знает секретный токен; без тега {% csrf_token %} Django отвергает POST с кодом 403. Сборка HTML строками обходит автоэкранирование и открывает XSS - шаблон же экранирует подставляемые значения по умолчанию."
    tags: [django]
