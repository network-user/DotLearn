conceptId: django-admin-auth
cards:
  - id: django-admin-auth-01
    front: "Что нужно, чтобы модель появилась в админке Django?"
    back: "Зарегистрировать её - в простейшем виде одной строкой admin.site.register(Order) или декоратором @admin.register(Order). После этого по адресу /admin/ доступны список, добавление, редактирование и удаление."
    tags: [django]
  - id: django-admin-auth-02
    front: "За что отвечают list_display, search_fields и list_filter в ModelAdmin?"
    back: "list_display - какие колонки показать в списке вместо единственной; search_fields - по каким полям работает строка поиска; list_filter - какие поля дают боковую панель быстрых фильтров."
    tags: [django]
  - id: django-admin-auth-03
    front: "Для кого предназначена админка Django?"
    back: "Это инструмент для сотрудников (staff), а не публичная часть сайта. За ней удобно вести данные команде, но показывать её клиентам не стоит - это не замена обычным страницам и формам."
    tags: [django]
  - id: django-admin-auth-04
    front: "Что хранит встроенная модель User и какие три флага важны?"
    back: "Учётную запись: имя пользователя, пароль (всегда хеш, не открытый текст), почту, флаги. is_active - учётка действует, is_staff - пускают в админку, is_superuser - можно всё."
    tags: [django]
  - id: django-admin-auth-05
    front: "Из каких двух шагов состоит вход пользователя?"
    back: "Сначала authenticate проверяет пару логин-пароль и возвращает User, если данные верны, или None. Затем login устанавливает сессию - запоминает, что этот и последующие запросы принадлежат пользователю."
    tags: [django]
  - id: django-admin-auth-06
    front: "Как узнать, вошёл ли пользователь, и что делает logout?"
    back: "После входа в каждом запросе доступен request.user; признак входа - request.user.is_authenticated. logout(request) очищает сессию, и кука перестаёт что-либо значить."
    tags: [django]
  - id: django-admin-auth-07
    front: "Почему проверять request.user на истинность - ошибка?"
    back: "request.user есть всегда: у гостя это специальный AnonymousUser, который истинен как объект. Признак входа - именно request.user.is_authenticated (у анонима он равен False), а не сам факт наличия request.user."
    tags: [django]
  - id: django-admin-auth-08
    front: "Чем аутентификация отличается от авторизации?"
    back: "Аутентификация отвечает на «кто ты?» - установить личность (логин и пароль), результат - request.user. Авторизация на «что тебе можно?» - решить, разрешено ли действие, через права и группы. Сначала первое, потом второе."
    tags: [django]
  - id: django-admin-auth-09
    front: "Чем login_required отличается от PermissionRequiredMixin?"
    back: "login_required (декоратор для FBV) и LoginRequiredMixin пускают любого вошедшего, проверяя is_authenticated. PermissionRequiredMixin идёт дальше - требует конкретного права, а не просто факта входа."
    tags: [django]
  - id: django-admin-auth-10
    front: "Что такое право вида shop.view_order и почему права раздают группами?"
    back: "Это право в формате приложение.действие_модель; Django создаёт по четыре права на модель (add, change, delete, view). Группа - именованный набор прав: пользователя добавляют в группу и он получает все её права разом. Это масштабируется лучше."
    tags: [django]
  - id: django-admin-auth-11
    front: "Как сервер помнит вошедшего пользователя через сессию?"
    back: "При входе Django кладёт в сессию (серверное хранилище) идентификатор пользователя, а в браузер отдаёт куку с ключом сессии. В каждом запросе middleware по ключу находит сессию и наполняет request.user. Сам пароль между запросами не передаётся."
    tags: [django]
  - id: django-admin-auth-12
    front: "Чем is_staff отличается от is_superuser?"
    back: "is_staff лишь пускает в админку, но видеть там пользователь будет только то, на что у него есть права. is_superuser обходит проверки прав целиком. Дать is_staff без прав - значит пустить в админку с пустыми руками."
    tags: [django]
