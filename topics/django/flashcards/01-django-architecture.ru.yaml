conceptId: django-architecture
cards:
  - id: django-architecture-01
    front: "Какую часть работы между сырым HTTP-запросом и ответом берёт на себя Django, а что остаётся Вам?"
    back: "Django делает рутину: приём соединения, разбор HTTP, цепочку middleware, маршрутизацию и рендер. Вам остаётся тонкий слой - view с бизнес-логикой и модели."
    tags: [django]
  - id: django-architecture-02
    front: "Как соотносятся MTV в Django и классический MVC?"
    back: "Это одно и то же под разными именами. Model тот же, Template - это «представление» (View) из MVC, а View в Django - это «контроллер» (Controller) из MVC."
    tags: [django]
  - id: django-architecture-03
    front: "За что в Django отвечают Model, Template и View по отдельности?"
    back: "Model - про данные и правила, Template - про то, как данные выглядят (HTML), View - про то, что произойдёт по запросу. Расползание логики между ними - источник неподдерживаемого кода."
    tags: [django]
  - id: django-architecture-04
    front: "Чем проект отличается от приложения (app) в Django?"
    back: "Проект - конфигурация всего сайта: один settings.py, корневой urls.py, одна точка запуска. Приложение - переиспользуемый модуль одной предметной области (orders, accounts) со своими моделями и views."
    tags: [django]
  - id: django-architecture-05
    front: "Что такое manage.py и settings.py в Django-проекте?"
    back: "manage.py - входная точка для команд (runserver, migrate, createsuperuser), тонкая обёртка, подгружающая настройки. settings.py - единый реестр: INSTALLED_APPS, база, список middleware, пути к шаблонам."
    tags: [django]
  - id: django-architecture-06
    front: "Какой путь проходит запрос в Django от приёма до ответа?"
    back: "HttpRequest -> цепочка middleware (сверху вниз) -> URL resolver -> view -> (по необходимости шаблон) -> HttpResponse -> middleware в обратном порядке -> клиент."
    tags: [django]
  - id: django-architecture-07
    front: "Почему порядок в списке middleware и в INSTALLED_APPS важен?"
    back: "Это упорядоченные списки, а не множества. На пути запроса middleware идут сверху вниз, на пути ответа - в обратном порядке. При совпадении имён шаблонов побеждает приложение, стоящее выше."
    tags: [django]
  - id: django-architecture-08
    front: "Может ли middleware вернуть ответ, не дойдя до view?"
    back: "Да, это штатный механизм. Например, middleware аутентификации видит неавторизованный запрос к закрытой странице и сразу возвращает редирект на вход - view не вызывается. Поэтому при «не той» странице проверяют и middleware."
    tags: [django]
  - id: django-architecture-09
    front: "Чем WSGI отличается от ASGI как интерфейс между сервером и Django?"
    back: "WSGI - синхронный: сервер передаёт запрос и ждёт ответа, каждый запрос по очереди. ASGI - асинхронный: умеет то же плюс long-lived соединения (WebSocket) и параллельную обработку через async."
    tags: [django]
  - id: django-architecture-10
    front: "Что обязан вернуть view и что будет, если он вернёт None?"
    back: "View обязан вернуть объект HttpResponse, даже если это пустая страница со статусом 204. Если функция-обработчик вернула None, Django выбросит ошибку: контракт view - всегда отдавать ответ."
    tags: [django]
  - id: django-architecture-11
    front: "Почему встроенный runserver нельзя использовать как боевой сервер?"
    back: "runserver - инструмент разработки: по умолчанию однопоточный, без оптимизаций, с автоперезагрузкой кода. В продакшене перед Django ставят gunicorn или uvicorn."
    tags: [django]
