conceptId: django-architecture
cards:
  - id: django-architecture-01
    front: "What part of the work between a raw HTTP request and a response does Django handle, and what's left to you?"
    back: "Django handles the routine: accepting the connection, parsing HTTP, the middleware chain, routing, and rendering. What's left to you is a thin layer - the view with business logic and the models."
    tags: [django]
  - id: django-architecture-02
    front: "How does MTV in Django map to classic MVC?"
    back: "It's the same thing under different names. Model is the same, Template is the \"view\" from MVC, and Django's View is the \"controller\" from MVC."
    tags: [django]
  - id: django-architecture-03
    front: "What are Model, Template, and View each responsible for in Django?"
    back: "Model is about data and rules, Template is about how data looks (HTML), View is about what happens for a request. Logic bleeding between them is a source of unmaintainable code."
    tags: [django]
  - id: django-architecture-04
    front: "How does a project differ from an app in Django?"
    back: "A project is the whole site's configuration: one settings.py, a root urls.py, a single entry point. An app is a reusable module for one domain area (orders, accounts) with its own models and views."
    tags: [django]
  - id: django-architecture-05
    front: "What are manage.py and settings.py in a Django project?"
    back: "manage.py is the entry point for commands (runserver, migrate, createsuperuser), a thin wrapper that loads the settings. settings.py is the single registry: INSTALLED_APPS, the database, the middleware list, template paths."
    tags: [django]
  - id: django-architecture-06
    front: "What path does a request take through Django from arrival to response?"
    back: "HttpRequest -> middleware chain (top to bottom) -> URL resolver -> view -> (if needed, a template) -> HttpResponse -> middleware in reverse order -> client."
    tags: [django]
  - id: django-architecture-07
    front: "Why does the order in the middleware list and INSTALLED_APPS matter?"
    back: "These are ordered lists, not sets. On the way in, middleware runs top to bottom; on the way out, in reverse order. When template names collide, the app listed higher wins."
    tags: [django]
  - id: django-architecture-08
    front: "Can middleware return a response without ever reaching the view?"
    back: "Yes, that's a standard mechanism. For example, authentication middleware sees an unauthenticated request to a protected page and returns a redirect to login right away - the view is never called. That's why an unexpected page is also worth checking middleware for."
    tags: [django]
  - id: django-architecture-09
    front: "How does WSGI differ from ASGI as the interface between the server and Django?"
    back: "WSGI is synchronous: the server hands off a request and waits for a response, one request at a time. ASGI is asynchronous: it can do the same plus long-lived connections (WebSocket) and parallel handling via async."
    tags: [django]
  - id: django-architecture-10
    front: "What must a view return, and what happens if it returns None?"
    back: "A view must return an HttpResponse object, even if it's an empty page with status 204. If a handler function returns None, Django raises an error: a view's contract is to always produce a response."
    tags: [django]
  - id: django-architecture-11
    front: "Why can't the built-in runserver be used as a production server?"
    back: "runserver is a development tool: single-threaded by default, unoptimized, with code auto-reload. In production you put gunicorn or uvicorn in front of Django."
    tags: [django]
