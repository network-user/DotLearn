conceptId: django-admin-auth
cards:
  - id: django-admin-auth-01
    front: "What does a model need for it to show up in the Django admin?"
    back: "It needs to be registered - in the simplest form with one line, admin.site.register(Order), or the @admin.register(Order) decorator. After that, /admin/ offers listing, adding, editing, and deleting."
    tags: [django]
  - id: django-admin-auth-02
    front: "What are list_display, search_fields, and list_filter for in ModelAdmin?"
    back: "list_display - which columns to show in the list instead of the single default one; search_fields - which fields the search box works on; list_filter - which fields produce the sidebar of quick filters."
    tags: [django]
  - id: django-admin-auth-03
    front: "Who is the Django admin meant for?"
    back: "It's a tool for staff, not the public-facing part of the site. It's convenient for a team to manage data through, but it's not meant to be shown to customers - it's not a replacement for regular pages and forms."
    tags: [django]
  - id: django-admin-auth-04
    front: "What does the built-in User model store, and which three flags matter?"
    back: "An account: username, password (always a hash, never plain text), email, flags. is_active - the account is enabled, is_staff - allowed into the admin, is_superuser - can do anything."
    tags: [django]
  - id: django-admin-auth-05
    front: "What two steps does a user's login consist of?"
    back: "First, authenticate checks the login-password pair and returns a User if the credentials are right, or None. Then login establishes the session - remembering that this and future requests belong to that user."
    tags: [django]
  - id: django-admin-auth-06
    front: "How do you tell if a user is logged in, and what does logout do?"
    back: "After login, request.user is available on every request; the sign of being logged in is request.user.is_authenticated. logout(request) clears the session, and the cookie stops meaning anything."
    tags: [django]
  - id: django-admin-auth-07
    front: "Why is checking request.user for truthiness a mistake?"
    back: "request.user always exists: for a guest it's a special AnonymousUser, which is truthy as an object. The sign of being logged in is specifically request.user.is_authenticated (False for an anonymous user), not the mere presence of request.user."
    tags: [django]
  - id: django-admin-auth-08
    front: "How does authentication differ from authorization?"
    back: "Authentication answers \"who are you?\" - establishing identity (login and password), the result is request.user. Authorization answers \"what are you allowed to do?\" - deciding whether an action is permitted, via permissions and groups. First one, then the other."
    tags: [django]
  - id: django-admin-auth-09
    front: "How does login_required differ from PermissionRequiredMixin?"
    back: "login_required (the FBV decorator) and LoginRequiredMixin let in anyone who's logged in, checking is_authenticated. PermissionRequiredMixin goes further - it requires a specific permission, not just the fact of being logged in."
    tags: [django]
  - id: django-admin-auth-10
    front: "What is a permission like shop.view_order, and why are permissions granted via groups?"
    back: "It's a permission in the format app.action_model; Django creates four permissions per model (add, change, delete, view). A group is a named set of permissions: a user is added to a group and gets all of its permissions at once. That scales better."
    tags: [django]
  - id: django-admin-auth-11
    front: "How does the server remember a logged-in user through the session?"
    back: "On login, Django stores the user's id in the session (server-side storage) and gives the browser a cookie with the session key. On every request, middleware looks up the session by key and fills request.user. The password itself is never sent between requests."
    tags: [django]
  - id: django-admin-auth-12
    front: "How does is_staff differ from is_superuser?"
    back: "is_staff only lets a user into the admin, but they'll see only what they have permissions for there. is_superuser bypasses permission checks entirely. Giving is_staff without permissions just lets someone into an admin with empty hands."
    tags: [django]
