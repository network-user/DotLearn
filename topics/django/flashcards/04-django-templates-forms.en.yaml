conceptId: django-templates-forms
cards:
  - id: django-templates-forms-01
    front: "What three kinds of pieces make up a Django template, and where do the values come from?"
    back: "Variables (double curly braces) insert a value, tags (with percent signs) control structure - loops, conditions, inheritance, filters (via a pipe) transform a value. Values come from the context passed by the view."
    tags: [django]
  - id: django-templates-forms-02
    front: "What can dot notation in a template do, e.g. order.customer?"
    back: "Django tries, in order, a dict key, an object attribute, and even a no-argument method call. The same dot notation works for different kinds of data access."
    tags: [django]
  - id: django-templates-forms-03
    front: "Why is Django's template language deliberately limited?"
    back: "You can't assign a variable, call a function with arbitrary arguments, or write a complex expression. That's the boundary: computation is the view's job, the template only displays. A \"missing\" feature is a signal to move logic to the view."
    tags: [django]
  - id: django-templates-forms-04
    front: "How does template inheritance work?"
    back: "A base template sets up the frame and declares blocks - holes. A child template inherits the frame via extends and fills in only the blocks it needs; everything outside the blocks comes from the parent. Shared headers/footers aren't duplicated."
    tags: [django]
  - id: django-templates-forms-05
    front: "What three things can a Form class do?"
    back: "Render itself as HTML, accept submitted data, and validate it. Each form attribute describes an input field with its type and rules."
    tags: [django]
  - id: django-templates-forms-06
    front: "When do you use ModelForm instead of Form?"
    back: "When the form mirrors a model almost one to one. ModelForm builds fields automatically from the model - you just specify the model and field list in class Meta instead of writing every field by hand."
    tags: [django]
  - id: django-templates-forms-07
    front: "How does a bound form differ from an unbound one?"
    back: "An unbound form is created with no data (OrderForm()) - there's nothing to validate, good for rendering empty fields. A bound form is created with data (OrderForm(request.POST)) - it can be validated. Boundness depends on data, not the request method."
    tags: [django]
  - id: django-templates-forms-08
    front: "What does calling form.is_valid() give you?"
    back: "It runs validation and returns True/False. After it, form.cleaned_data appears (converted and validated values, only if validation passed) along with form.errors with per-field messages."
    tags: [django]
  - id: django-templates-forms-09
    front: "What cascade does is_valid() run under the hood?"
    back: "First, each field converts its input to the right type and checks basic rules (required, max_length). Then clean_<field name> for the individual field. Finally clean (no suffix) sees all fields at once - for checks that need several fields."
    tags: [django]
  - id: django-templates-forms-10
    front: "How do you flag an invalid value, and why must clean_<field> return a value?"
    back: "In a clean method you raise ValidationError - Django puts the text into form.errors and marks the form invalid. The clean_<field> method must return a value, otherwise the field silently disappears from cleaned_data."
    tags: [django]
  - id: django-templates-forms-11
    front: "When can you read form.cleaned_data?"
    back: "Only after a successful is_valid(). Before the check there simply is no cleaned data. Always if form.is_valid() first, and only inside that branch read form.cleaned_data."
    tags: [django]
  - id: django-templates-forms-12
    front: "Why does every POST form need a CSRF token, and why is building HTML with string concatenation in a view dangerous?"
    back: "The CSRF token protects against cross-site request forgery: another site can send a POST with cookies attached, but it doesn't know the secret token; without the {% csrf_token %} tag Django rejects the POST with code 403. Building HTML with string concatenation bypasses auto-escaping and opens up XSS - a template escapes inserted values by default."
    tags: [django]
