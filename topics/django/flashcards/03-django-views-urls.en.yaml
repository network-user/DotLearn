conceptId: django-views-urls
cards:
  - id: django-views-urls-01
    front: "How is routing structured in Django, and how does the resolver pick a handler?"
    back: "URLconf is a list called urlpatterns of \"path pattern -> handler\" pairs. The resolver walks the list top to bottom and takes the first match; if none match, it's a 404."
    tags: [django]
  - id: django-views-urls-02
    front: "Why does the order of routes in urlpatterns matter so much?"
    back: "The first match wins, not the best one. If a generic pattern sits above a specific one, it intercepts the request first. Rule of thumb: put specific paths above generic ones."
    tags: [django]
  - id: django-views-urls-03
    front: "What does a converter in a pattern like <int:pk> do?"
    back: "Three things: it captures a part of the path under the name pk, checks its shape (digits only), and converts the type - the view receives a real int, not a string. The part before the colon is the type, after it is the argument name."
    tags: [django]
  - id: django-views-urls-04
    front: "What do the slug, str, and path converters accept?"
    back: "slug - letters, digits, hyphens, and underscores (human-readable addresses). str - any non-empty string without a slash. path - allows slashes and so captures the rest of the path."
    tags: [django]
  - id: django-views-urls-05
    front: "When do you use re_path instead of path?"
    back: "When the standard converters aren't enough: you need a fixed length, an enumeration of options, or a complex format. re_path is a regex-based route with capture via named groups. Start with path."
    tags: [django]
  - id: django-views-urls-06
    front: "What is the contract of a function-based view?"
    back: "The function gets HttpRequest as its first argument, then the parts captured from the URL, and it must return an HttpResponse. Branching on the method is done manually via request.method."
    tags: [django]
  - id: django-views-urls-07
    front: "What lives on the request object inside a view?"
    back: "request.method - the method (GET, POST), request.GET - query string parameters (?page=2), request.POST - submitted form data, request.user - the current user."
    tags: [django]
  - id: django-views-urls-08
    front: "How does a class-based view differ from a function-based one, and how is it wired up?"
    back: "A CBV subclasses View and spreads logic across methods like get/post - Django itself calls the right one based on the request method. Generics like ListView/DetailView remove boilerplate. In urls.py it's wired up via .as_view()."
    tags: [django]
  - id: django-views-urls-09
    front: "What does OrderView.as_view() actually return?"
    back: "A function, not a class and not an instance. On every request it creates a fresh view instance, puts the request and arguments on it, then calls dispatch. That's why state from one request never leaks into another."
    tags: [django]
  - id: django-views-urls-10
    front: "What do codes 200, 201, 301/302, 404 mean in a response?"
    back: "200 - success, 201 - created (after a successful POST), 301/302 - permanent/temporary redirect, 404 - not found. For a missing object, 404 is correct, not 200 with an empty body."
    tags: [django]
  - id: django-views-urls-11
    front: "What is get_object_or_404 for?"
    back: "It's a helper that does get(...) and, if the object isn't found, raises a 404 itself instead of DoesNotExist. Handy exactly when get could otherwise fail on a missing row."
    tags: [django]
  - id: django-views-urls-12
    front: "What's the common mistake with request.GET and request.POST?"
    back: "Query string parameters (?q=...) are in request.GET regardless of method; a submitted form's body is in request.POST. Looking for form data in request.GET is a common cause of \"why didn't anything arrive\"."
    tags: [django]
