conceptId: django-views-urls
cards:
  - id: django-views-urls-01
    front: "Как устроена маршрутизация в Django и как resolver выбирает обработчик?"
    back: "URLconf - это список urlpatterns из пар «шаблон пути -> обработчик». Resolver идёт по списку сверху вниз и берёт первое совпадение; если не подошёл ни один - 404."
    tags: [django]
  - id: django-views-urls-02
    front: "Почему порядок маршрутов в urlpatterns решает всё?"
    back: "Выигрывает первое совпадение, а не лучшее. Если общий шаблон стоит выше конкретного, он перехватит запрос раньше. Правило: конкретные пути ставят выше общих."
    tags: [django]
  - id: django-views-urls-03
    front: "Что делает конвертер в шаблоне вроде <int:pk>?"
    back: "Три вещи: захватывает часть пути под именем pk, проверяет её форму (только цифры) и приводит тип - во view придёт настоящий int, а не строка. Часть до двоеточия - тип, после - имя аргумента."
    tags: [django]
  - id: django-views-urls-04
    front: "Что принимают конвертеры slug, str и path?"
    back: "slug - буквы, цифры, дефисы и подчёркивания (человекочитаемые адреса). str - любая непустая строка без слэша. path - разрешает слэши и потому ловит остаток пути."
    tags: [django]
  - id: django-views-urls-05
    front: "Когда вместо path берут re_path?"
    back: "Когда стандартных конвертеров не хватает: нужна фиксированная длина, перечисление вариантов, сложный формат. re_path - маршрут на регулярном выражении с захватом через именованные группы. Начинать стоит с path."
    tags: [django]
  - id: django-views-urls-06
    front: "Каков контракт function-based view?"
    back: "Первым аргументом функция получает HttpRequest, дальше - захваченные из URL части, а вернуть обязана HttpResponse. Ветвление по методу делают вручную через request.method."
    tags: [django]
  - id: django-views-urls-07
    front: "Что лежит в объекте request во view?"
    back: "request.method - метод (GET, POST), request.GET - параметры строки запроса (?page=2), request.POST - данные отправленной формы, request.user - текущий пользователь."
    tags: [django]
  - id: django-views-urls-08
    front: "Чем class-based view отличается от function-based и как его подключают?"
    back: "CBV наследует View и раскладывает логику по методам get/post - Django сам зовёт нужный по методу запроса. Дженерики ListView/DetailView убирают шаблонный код. В urls.py подключают через .as_view()."
    tags: [django]
  - id: django-views-urls-09
    front: "Что на самом деле возвращает OrderView.as_view()?"
    back: "Функцию, а не класс и не экземпляр. При каждом запросе она создаёт свежий экземпляр view, кладёт в него request и аргументы, затем вызывает dispatch. Поэтому состояние одного запроса не протекает в другой."
    tags: [django]
  - id: django-views-urls-10
    front: "Что означают коды 200, 201, 301/302, 404 в ответе?"
    back: "200 - успех, 201 - создано (после удачного POST), 301/302 - редирект постоянный/временный, 404 - не найдено. Для отсутствующего объекта корректен 404, а не 200 с пустым телом."
    tags: [django]
  - id: django-views-urls-11
    front: "Зачем нужен get_object_or_404?"
    back: "Это помощник, который делает get(...) и, если объект не найден, сам поднимает 404 вместо DoesNotExist. Удобно ровно для случая, когда get мог бы упасть на отсутствующей строке."
    tags: [django]
  - id: django-views-urls-12
    front: "В чём частая ошибка с request.GET и request.POST?"
    back: "Параметры адресной строки (?q=...) лежат в request.GET при любом методе; тело отправленной формы - в request.POST. Искать данные формы в request.GET - частая причина «почему ничего не пришло»."
    tags: [django]
