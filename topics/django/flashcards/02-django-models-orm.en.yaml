conceptId: django-models-orm
cards:
  - id: django-models-orm-01
    front: "How does a model class map to the database in Django's ORM?"
    back: "A model is a class subclassing models.Model: the class name becomes the table, fields become columns, an instance becomes a row. The ORM translates in both directions."
    tags: [django]
  - id: django-models-orm-02
    front: "What does the nested class Meta define in a model?"
    back: "Properties of the whole table, not a single field: default ordering, a human-readable name (verbose_name), indexes, uniqueness constraints."
    tags: [django]
  - id: django-models-orm-03
    front: "How do makemigrations and migrate differ?"
    back: "makemigrations compares the models against the previous state and writes a change-recipe file, without touching the database. migrate applies the accumulated migrations to the database. Migrations get committed to the repo."
    tags: [django]
  - id: django-models-orm-04
    front: "What does \"QuerySet is lazy\" mean?"
    back: "filter/exclude/order_by don't hit the database - each call just returns a new QuerySet with an extended recipe for the future query. The database stays asleep until the QuerySet is actually asked for data."
    tags: [django]
  - id: django-models-orm-05
    front: "At what point does a QuerySet \"wake up\" and run SQL?"
    back: "When it's asked for data: a for loop, an index slice, list(), len(), bool(), or aggregates like count(). Before that, the recipe can be extended and passed around freely."
    tags: [django]
  - id: django-models-orm-06
    front: "Why does the ORM make QuerySet lazy?"
    back: "Laziness is an optimization: Django assembles all the refinements into one SQL statement and hits the database exactly once, instead of running each intermediate filter separately. A lazy QuerySet can be passed further along, and the receiver decides whether it needs the data at all."
    tags: [django]
  - id: django-models-orm-07
    front: "How does get() differ from filter() and exclude()?"
    back: "filter/exclude are lazy and return a QuerySet (possibly empty). get() hits the database immediately and requires exactly one object: DoesNotExist if missing, MultipleObjectsReturned if there's more than one."
    tags: [django]
  - id: django-models-orm-08
    front: "When is get() dangerous, and what should replace it?"
    back: "get() on a non-unique field fails with MultipleObjectsReturned, on a missing one with DoesNotExist. Use get only on a unique field (pk, unique=True); for \"might or might not exist\", use filter(...).first()."
    tags: [django]
  - id: django-models-orm-09
    front: "What three kinds of relations does Django express, and what are related_name and on_delete for?"
    back: "ForeignKey (many-to-one), OneToOne (one-to-one), ManyToMany (many-to-many). related_name sets up the reverse access (c.orders.all()), on_delete says what to do with the children when the parent is deleted (CASCADE/PROTECT/SET_NULL)."
    tags: [django]
  - id: django-models-orm-10
    front: "What is the N+1 problem in an ORM?"
    back: "One query for the list of objects plus one query per item on each lazy access to a relation. A loop over 100 orders with order.customer.name produces 101 database queries."
    tags: [django]
  - id: django-models-orm-11
    front: "How does select_related differ from prefetch_related?"
    back: "select_related is for ForeignKey and OneToOne: it does a JOIN and pulls related rows in one query. prefetch_related is for ManyToMany and reverse ForeignKey: it runs a separate query and stitches the data together in Python."
    tags: [django]
  - id: django-models-orm-12
    front: "Why doesn't a second for loop over the same QuerySet hit the database again?"
    back: "A QuerySet caches its result after the first iteration or list(). A second for loop over the same object reads the cache. But qs.filter(...) or qs.count() creates/runs a new query."
    tags: [django]
