exercises:
  - id: branching-pointer-quiz-001
    concept: branching
    type: theory-quiz
    difficulty: 1
    prompt: "Что такое ветка в Git?"
    choices:
      - id: a
        text: "Копия всех файлов проекта в отдельной папке."
      - id: b
        text: "Движущийся указатель на коммит."
      - id: c
        text: "Список изменений, не вошедших в коммит."
      - id: d
        text: "Удалённый сервер с резервной копией."
    correct: [b]
    explanation: "Ветка - это лёгкий указатель на один коммит. Создать ветку значит записать одно имя; при новом коммите указатель сдвигается вперёд."

  - id: branching-head-quiz-001
    concept: branching
    type: theory-quiz
    difficulty: 2
    prompt: "Чем отличается `git branch feature` от `git switch -c feature`?"
    choices:
      - id: a
        text: "Ничем, это синонимы сразу, без промежуточного состояния и без дополнительных проверок."
      - id: b
        text: "git branch создаёт ветку, но оставляет Вас на текущей; git switch -c создаёт и сразу переключает."
      - id: c
        text: "git branch переключает, а git switch -c только создаёт сразу, без промежуточного состояния."
      - id: d
        text: "git branch работает только с удалёнными ветками сразу, без промежуточного состояния."
    correct: [b]
    explanation: "git branch feature ставит указатель, но не двигает HEAD. git switch -c feature создаёт ветку и переводит на неё HEAD одной командой."
    variants:
      - prompt: "Что делает указатель HEAD?"
        choices:
          - id: a
            text: "Хранит сообщение последнего коммита сразу, без промежуточного состояния."
          - id: b
            text: "Указывает на текущую позицию - обычно на ветку, на которой Вы стоите."
          - id: c
            text: "Содержит список всех веток сразу, без промежуточного состояния."
          - id: d
            text: "Указывает на удалённый репозиторий сразу, без промежуточного состояния."
        correct: [b]
        explanation: "HEAD - указатель «где я сейчас». Коммит двигает ту ветку, на которую смотрит HEAD."
      - prompt: "Что произойдёт с рабочим деревом при `git switch other`?"
        choices:
          - id: a
            text: "Оно очистится полностью сразу, без промежуточного состояния."
          - id: b
            text: "Git наведёт его на снимок коммита, на который указывает ветка other."
          - id: c
            text: "Ничего, файлы останутся прежними сразу, без промежуточного состояния."
          - id: d
            text: "Все ветки сольются в одну сразу, без промежуточного состояния."
        correct: [b]
        explanation: "Переключение наводит рабочее дерево на снимок коммита ветки. Поэтому работа на разных ветках изолирована."

  - id: branching-create-switch-001
    concept: branching
    type: git-challenge
    difficulty: 1
    prompt: "Создайте ветку feature и перейдите на неё одной командой. В репозитории уже есть один коммит."
    setup:
      files:
        a.txt: "base\n"
      commands:
        - git init
        - git add a.txt
        - git commit -m "base"
    goal:
      - { kind: branch-exists, name: feature }
      - { kind: head-on-branch, name: feature }
    solution:
      - git switch -c feature
    hints:
      - "Нужно и создать указатель, и навести на него HEAD. Какая одна команда делает оба шага?"
      - "Используйте форму switch с флагом, создающим новую ветку."
    variants:
      - prompt: "Создайте ветку bugfix и перейдите на неё одной командой. В репозитории уже есть один коммит."
        setup:
          files:
            a.txt: "base\n"
          commands:
            - git init
            - git add a.txt
            - git commit -m "base"
        goal:
          - { kind: branch-exists, name: bugfix }
          - { kind: head-on-branch, name: bugfix }
        solution:
          - git switch -c bugfix
      - prompt: "Создайте ветку experiment и перейдите на неё одной командой. В репозитории уже есть один коммит."
        setup:
          files:
            a.txt: "base\n"
          commands:
            - git init
            - git add a.txt
            - git commit -m "base"
        goal:
          - { kind: branch-exists, name: experiment }
          - { kind: head-on-branch, name: experiment }
        solution:
          - git switch -c experiment

  - id: branching-work-on-branch-001
    concept: branching
    type: git-challenge
    difficulty: 3
    prompt: "Создайте ветку feature, перейдите на неё и сделайте на ней один коммит с новым файлом note.txt (сообщение «work»). Итог: Вы на feature, в истории два коммита."
    setup:
      files:
        app.py: "v1\n"
      commands:
        - git init
        - git add app.py
        - git commit -m "base"
    goal:
      - { kind: head-on-branch, name: feature }
      - { kind: commit-count, equals: 2 }
      - { kind: file-tracked, path: note.txt }
      - { kind: clean-tree }
    solution:
      - git switch -c feature
      - echo заметка > note.txt
      - git add note.txt
      - git commit -m "work"
    hints:
      - "Сначала окажитесь на новой ветке, потом коммитьте - коммит уйдёт туда, куда смотрит HEAD."
      - "Создайте и переключитесь на feature, затем создайте note.txt, добавьте в индекс и закоммитьте."

  - id: branching-isolated-001
    concept: branching
    type: git-challenge
    difficulty: 4
    prompt: "На ветке feature сделайте коммит с файлом draft.txt, затем вернитесь на main. Итог: Вы на main, ветка feature существует и опережает main на один коммит, а draft.txt в истории main отсутствует."
    setup:
      files:
        a.txt: "base\n"
      commands:
        - git init
        - git add a.txt
        - git commit -m "base"
    goal:
      - { kind: head-on-branch, name: main }
      - { kind: branch-exists, name: feature }
      - { kind: commit-count, ref: main, equals: 1 }
      - { kind: commit-count, ref: feature, equals: 2 }
      - { kind: file-absent, path: draft.txt, where: worktree }
    solution:
      - git switch -c feature
      - echo черновик > draft.txt
      - git add draft.txt
      - git commit -m "draft"
      - git switch main
    hints:
      - "Коммит на feature не должен попасть в историю main. Где Вы делаете коммит и куда возвращаетесь в конце?"
      - "Создайте feature, закоммитьте там draft.txt, затем переключитесь обратно на main - его история и рабочее дерево останутся без файла."
