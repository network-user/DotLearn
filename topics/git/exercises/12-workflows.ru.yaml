exercises:
  - id: workflows-feature-branch-quiz-001
    concept: workflows
    type: theory-quiz
    difficulty: 1
    prompt: "В чём суть подхода feature branches?"
    choices:
      - id: a
        text: "Коммитить все изменения напрямую в main сразу, без промежуточного состояния."
      - id: b
        text: "Не коммитить в main напрямую: каждую задачу вести в своей ветке и вливать по готовности."
      - id: c
        text: "Держать одну ветку на каждого разработчика навсегда сразу, без промежуточного состояния."
      - id: d
        text: "Никогда не сливать ветки сразу, без промежуточного состояния и без дополнительных проверок."
    correct: [b]
    explanation: "Feature branches - базовый принцип: main остаётся стабильной, каждая задача живёт в отдельной ветке и вливается обратно по готовности. На нём стоят остальные процессы."

  - id: workflows-pr-quiz-001
    concept: workflows
    type: theory-quiz
    difficulty: 2
    prompt: "Что такое pull request?"
    choices:
      - id: a
        text: "Команда Git для слияния веток не входит в сравнение и не влияет на результат."
      - id: b
        text: "Процесс на платформе (GitHub/GitLab): запрос влить ветку в main с ревью кода перед слиянием."
      - id: c
        text: "Способ скачать чужой репозиторий сразу, без промежуточного состояния."
      - id: d
        text: "Тип коммита сразу, без промежуточного состояния и без дополнительных проверок."
    correct: [b]
    explanation: "Pull request - надстройка платформы, а не команда Git. Вы открываете запрос на вливание ветки, коллеги ревьюят изменения, и только после одобрения ветка вливается в main."

  - id: workflows-gitflow-trunk-quiz-001
    concept: workflows
    type: theory-quiz
    difficulty: 3
    prompt: "Чем trunk-based подход отличается от gitflow?"
    choices:
      - id: a
        text: "trunk-based держит несколько долгоживущих веток, gitflow - одну."
      - id: b
        text: "trunk-based держит одну главную ветку с частыми мелкими вливаниями."
      - id: c
        text: "Это одно и то же сразу, без промежуточного состояния."
      - id: d
        text: "gitflow не использует ветки вовсе сразу, без промежуточного состояния."
    correct: [b]
    explanation: "Trunk-based опирается на одну главную ветку и частые мелкие вливания (под непрерывную поставку). Gitflow держит несколько долгоживущих веток - под редкие версионные релизы."
    variants:
      - prompt: "Для какого темпа релизов лучше подходит gitflow?"
        choices:
          - id: a
            text: "Для непрерывной поставки много раз в день сразу, без промежуточного состояния."
          - id: b
            text: "Для редких нумерованных релизов и поддержки нескольких версий."
          - id: c
            text: "Gitflow вообще не про релизы сразу, без промежуточного состояния."
          - id: d
            text: "Для проектов без веток сразу, без промежуточного состояния."
        correct: [b]
        explanation: "Ветки release и hotfix в gitflow ложатся на модель «выпускаем версию 2.3, поддерживаем 2.2». Для частых релизов веб-сервисов эта структура тяжела."
      - prompt: "Что нужно команде, чтобы безопасно практиковать trunk-based?"
        choices:
          - id: a
            text: "Как можно более длинные ветки сразу, без промежуточного состояния."
          - id: b
            text: "Сильная культура автотестов и feature flags, чтобы вливать недоделанное скрытно."
          - id: c
            text: "Полный отказ от ревью сразу, без промежуточного состояния."
          - id: d
            text: "Минимум пять долгоживущих веток сразу, без промежуточного состояния."
        correct: [b]
        explanation: "Частые вливания в одну ветку требуют автотестов (ловить регрессии) и feature flags (скрывать незавершённое от пользователей)."

  - id: workflows-no-silver-bullet-quiz-001
    concept: workflows
    type: theory-quiz
    difficulty: 4
    prompt: "Какое утверждение о выборе workflow верное?"
    choices:
      - id: a
        text: "Существует один универсально правильный workflow для всех команд."
      - id: b
        text: "Выбор - компромисс структуры и скорости под темп релизов и размер команды."
      - id: c
        text: "Gitflow устарел и его нельзя использовать сразу, без промежуточного состояния."
      - id: d
        text: "Trunk-based всегда лучше gitflow сразу, без промежуточного состояния."
    correct: [b]
    explanation: "Единственно правильного процесса нет. Gitflow - под версионные релизы, trunk-based - под непрерывную поставку. Хороший процесс тот, которому команда реально следует, а не самый модный."

  - id: workflows-feature-cycle-001
    concept: workflows
    type: git-challenge
    difficulty: 3
    prompt: "Проиграйте базовый feature-branch цикл: создайте ветку feature/login, добавьте на ней файл login.py («форма входа», коммит «add login»), вернитесь на main и влейте feature/login. Итог: Вы на main, login.py отслеживается, два коммита."
    setup:
      files:
        README.md: "# Проект\n"
      commands:
        - git init
        - git add README.md
        - git commit -m "init"
    goal:
      - { kind: head-on-branch, name: main }
      - { kind: file-tracked, path: login.py }
      - { kind: merged, branch: feature/login }
      - { kind: commit-count, equals: 2 }
    solution:
      - git switch -c feature/login
      - echo форма входа > login.py
      - git add login.py
      - git commit -m "add login"
      - git switch main
      - git merge feature/login
    hints:
      - "Цикл feature branches: ответвиться, поработать в ветке, вернуться на main и влить. В каком порядке идут переключения, коммит и merge?"
      - "Создайте feature/login, закоммитьте на ней login.py, переключитесь на main и слейте ветку - main не двигался, поэтому слияние будет перемоткой."
