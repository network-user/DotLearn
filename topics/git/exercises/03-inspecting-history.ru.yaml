exercises:
  - id: history-diff-quiz-001
    concept: inspecting-history
    type: theory-quiz
    difficulty: 1
    prompt: "Что сравнивает `git diff` без аргументов?"
    choices:
      - id: a
        text: "Рабочее дерево с индексом (несценированные правки)."
      - id: b
        text: "Индекс с последним коммитом сразу, без промежуточного состояния."
      - id: c
        text: "Две последние ветки между собой сразу, без промежуточного состояния."
      - id: d
        text: "Локальный репозиторий с удалённым сразу, без промежуточного состояния."
    correct: [a]
    explanation: "git diff без аргументов показывает разницу между рабочим деревом и индексом, то есть правки, которые ещё не выставлены на сцену. Сценированные смотрят через git diff --staged."
    variants:
      - prompt: "Что сравнивает `git diff --staged`?"
        choices:
          - id: a
            text: "Рабочее дерево с индексом сразу, без промежуточного состояния."
          - id: b
            text: "Индекс с последним коммитом (то, что войдёт в коммит)."
          - id: c
            text: "HEAD с удалённой веткой сразу, без промежуточного состояния."
          - id: d
            text: "Два произвольных файла сразу, без промежуточного состояния."
        correct: [b]
        explanation: "git diff --staged показывает разницу между индексом и последним коммитом - ровно то, что войдёт в следующий коммит."
      - prompt: "На какой вопрос отвечает `git status`?"
        choices:
          - id: a
            text: "В каком состоянии файлы прямо сейчас (на сцене, изменены, не отслеживаются)."
          - id: b
            text: "Какие коммиты были сделаны за неделю сразу, без промежуточного состояния."
          - id: c
            text: "Как построчно изменился файл сразу, без промежуточного состояния."
          - id: d
            text: "Кто автор последнего коммита сразу, без промежуточного состояния."
        correct: [a]
        explanation: "git status - моментальный снимок «здесь и сейчас»: расстановка файлов по трём областям. Историю показывает git log."

  - id: history-log-quiz-001
    concept: inspecting-history
    type: theory-quiz
    difficulty: 2
    prompt: "Вы изменили файл, сделали `git add`, затем выполнили `git diff` - вывод пустой. Почему?"
    choices:
      - id: a
        text: "Git потерял изменения сразу, без промежуточного состояния и без дополнительных проверок."
      - id: b
        text: "Правка уже на сцене, а git diff сравнивает дерево с индексом, которые теперь совпадают."
      - id: c
        text: "git diff работает только после коммита сразу, без промежуточного состояния."
      - id: d
        text: "Файл не отслеживается сразу, без промежуточного состояния и без дополнительных проверок."
    correct: [b]
    explanation: "После git add рабочее дерево и индекс совпали, поэтому git diff (дерево против индекса) пуст. Чтобы увидеть сценированную правку, нужен git diff --staged."

  - id: history-build-log-001
    concept: inspecting-history
    type: git-challenge
    difficulty: 1
    prompt: "Создайте историю из двух коммитов: сначала закоммитьте a.txt с сообщением «first», затем добавьте b.txt и закоммитьте с сообщением «second»."
    setup:
      files:
        a.txt: "первый\n"
        b.txt: "второй\n"
      commands:
        - git init
    goal:
      - { kind: commit-count, equals: 2 }
      - { kind: commit-message, index: 0, contains: "second" }
      - { kind: commit-message, index: 1, contains: "first" }
      - { kind: clean-tree }
    solution:
      - git add a.txt
      - git commit -m "first"
      - git add b.txt
      - git commit -m "second"
    hints:
      - "Два коммита - это два цикла «выложить на сцену → запечатать снимок». Что должно войти в каждый?"
      - "Сначала стадируйте и закоммитьте a.txt, затем b.txt отдельным коммитом."
    variants:
      - prompt: "Создайте историю из двух коммитов: закоммитьте x.txt с сообщением «init», затем добавьте y.txt и закоммитьте с сообщением «more»."
        setup:
          files:
            x.txt: "икс\n"
            y.txt: "игрек\n"
          commands:
            - git init
        goal:
          - { kind: commit-count, equals: 2 }
          - { kind: commit-message, index: 0, contains: "more" }
          - { kind: commit-message, index: 1, contains: "init" }
          - { kind: clean-tree }
        solution:
          - git add x.txt
          - git commit -m "init"
          - git add y.txt
          - git commit -m "more"
      - prompt: "Создайте историю из двух коммитов: закоммитьте one.md с сообщением «one», затем добавьте two.md и закоммитьте с сообщением «two»."
        setup:
          files:
            one.md: "один\n"
            two.md: "два\n"
          commands:
            - git init
        goal:
          - { kind: commit-count, equals: 2 }
          - { kind: commit-message, index: 0, contains: "two" }
          - { kind: commit-message, index: 1, contains: "one" }
          - { kind: clean-tree }
        solution:
          - git add one.md
          - git commit -m "one"
          - git add two.md
          - git commit -m "two"

  - id: history-three-commits-001
    concept: inspecting-history
    type: git-challenge
    difficulty: 3
    prompt: "В репозитории уже есть один коммит «init». Добавьте ещё два коммита так, чтобы всего стало три, а сообщение самого свежего содержало «release»."
    setup:
      files:
        app.py: "v1\n"
      commands:
        - git init
        - git add app.py
        - git commit -m "init"
    goal:
      - { kind: commit-count, equals: 3 }
      - { kind: commit-message, index: 0, contains: "release" }
      - { kind: clean-tree }
    solution:
      - echo v2 > feature.py
      - git add feature.py
      - git commit -m "feature"
      - echo v3 > changelog.txt
      - git add changelog.txt
      - git commit -m "release"
    hints:
      - "Нужно, чтобы HEAD указывал на третий по счёту коммит, а его сообщение содержало нужное слово."
      - "Сделайте два новых коммита поверх init; последний из них пусть несёт сообщение со словом release."

  - id: history-message-position-001
    concept: inspecting-history
    type: git-challenge
    difficulty: 3
    prompt: "Постройте историю из трёх коммитов так, чтобы предыдущий коммит (HEAD~1) нёс сообщение «middle». Начинайте с пустого репозитория."
    setup:
      files:
        base.txt: "base\n"
      commands:
        - git init
    goal:
      - { kind: commit-count, equals: 3 }
      - { kind: commit-message, index: 1, contains: "middle" }
      - { kind: clean-tree }
    solution:
      - git add base.txt
      - git commit -m "start"
      - echo mid > mid.txt
      - git add mid.txt
      - git commit -m "middle"
      - echo last > last.txt
      - git add last.txt
      - git commit -m "last"
    hints:
      - "Сообщение проверяется у коммита HEAD~1 - это предпоследний коммит. Сколько коммитов должно быть после него?"
      - "Сделайте три коммита подряд; средний (второй) пусть несёт сообщение middle, тогда после третьего он окажется на позиции HEAD~1."
