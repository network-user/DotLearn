exercises:
  - id: merging-ff-quiz-001
    concept: merging
    type: theory-quiz
    difficulty: 1
    prompt: "When does a fast-forward merge happen?"
    choices:
      - id: a
        text: "When the target branch did not move since branching — history is linear."
      - id: b
        text: "When both branches got new commits after diverging."
      - id: c
        text: "Always, on any git merge."
      - id: d
        text: "Only when there is a conflict."
    correct: [a]
    explanation: "Fast-forward is possible when the target branch got no commits after branching. Merge is then simply moving its pointer forward, with no new commit."

  - id: merging-3way-quiz-001
    concept: merging
    type: theory-quiz
    difficulty: 2
    prompt: "How does a merge commit differ from an ordinary one?"
    choices:
      - id: a
        text: "It has no message."
      - id: b
        text: "It has two parents — the tips of both merged lines."
      - id: c
        text: "It does not store a tree snapshot."
      - id: d
        text: "It is created only on fast-forward."
    correct: [b]
    explanation: "A merge commit is the only commit with two parents. It appears on three-way merge when branches diverged and marks where they met."
    variants:
      - prompt: "Standing on main, you run `git merge feature`. What happens?"
        choices:
          - id: a
            text: "main merges into feature."
          - id: b
            text: "Work from feature merges into the current branch main."
          - id: c
            text: "Both branches are deleted."
          - id: d
            text: "feature is renamed to main."
        correct: [b]
        explanation: "git merge pours the named branch into the current one. On main you merge feature into main."
      - prompt: "Two branches edited different files and did not overlap. What happens on merge?"
        choices:
          - id: a
            text: "A conflict is guaranteed."
          - id: b
            text: "Git merges them automatically, with no conflict."
          - id: c
            text: "The merge is rejected."
          - id: d
            text: "One of the files is lost."
        correct: [b]
        explanation: "Conflict arises only from incompatible edits to the same lines. Non-overlapping edits Git merges alone."

  - id: merging-ff-001
    concept: merging
    type: git-challenge
    difficulty: 1
    prompt: "Merge branch feature into main. You are on main; feature is one commit ahead (fast-forward)."
    setup:
      files:
        a.txt: "1\n"
      commands:
        - git init
        - git add a.txt
        - git commit -m "base"
        - git switch -c feature
        - echo two > b.txt
        - git add b.txt
        - git commit -m "feature"
        - git switch main
    goal:
      - { kind: merged, branch: feature }
      - { kind: file-tracked, path: b.txt }
      - { kind: head-on-branch, name: main }
      - { kind: commit-count, equals: 2 }
    solution:
      - git merge feature
    hints:
      - "You are already on the target branch. Which command pours feature's work into it?"
      - "One merge command with the branch name. main did not move, so it will fast-forward."
    variants:
      - prompt: "Merge branch topic into main. You are on main; topic is one commit ahead."
        setup:
          files:
            a.txt: "1\n"
          commands:
            - git init
            - git add a.txt
            - git commit -m "base"
            - git switch -c topic
            - echo c > c.txt
            - git add c.txt
            - git commit -m "topic work"
            - git switch main
        goal:
          - { kind: merged, branch: topic }
          - { kind: file-tracked, path: c.txt }
          - { kind: commit-count, equals: 2 }
        solution:
          - git merge topic
      - prompt: "Merge branch dev into main. You are on main; dev is one commit ahead."
        setup:
          files:
            a.txt: "1\n"
          commands:
            - git init
            - git add a.txt
            - git commit -m "base"
            - git switch -c dev
            - echo d > d.txt
            - git add d.txt
            - git commit -m "dev work"
            - git switch main
        goal:
          - { kind: merged, branch: dev }
          - { kind: file-tracked, path: d.txt }
          - { kind: commit-count, equals: 2 }
        solution:
          - git merge dev

  - id: merging-3way-001
    concept: merging
    type: git-challenge
    difficulty: 3
    prompt: "Branches feature and main diverged and edited different files. Standing on main, perform a three-way merge so both files are in history and a merge commit appears."
    setup:
      files:
        base.txt: "base\n"
      commands:
        - git init
        - git add base.txt
        - git commit -m "base"
        - git switch -c feature
        - echo feat > feat.txt
        - git add feat.txt
        - git commit -m "feat"
        - git switch main
        - echo main > main.txt
        - git add main.txt
        - git commit -m "main"
    goal:
      - { kind: merged, branch: feature }
      - { kind: file-tracked, path: feat.txt }
      - { kind: file-tracked, path: main.txt }
      - { kind: commit-message, contains: "Merge branch" }
    solution:
      - git merge feature
    hints:
      - "Branches diverged, so fast-forward is impossible — Git will create a merge commit. Which command do you run on main?"
      - "git merge feature: edits in different files do not conflict; Git merges them and seals a merge commit."

  - id: merging-no-ff-001
    concept: merging
    type: git-challenge
    difficulty: 4
    prompt: "feature is one commit ahead of main; fast-forward is possible. Merge feature into main so history gets an explicit merge commit (three commits total), not fast-forward."
    setup:
      files:
        a.txt: "1\n"
      commands:
        - git init
        - git add a.txt
        - git commit -m "base"
        - git switch -c feature
        - echo two > b.txt
        - git add b.txt
        - git commit -m "feature"
        - git switch main
    goal:
      - { kind: merged, branch: feature }
      - { kind: commit-count, equals: 3 }
      - { kind: head-on-branch, name: main }
      - { kind: commit-message, contains: "Merge branch" }
    solution:
      - git merge --no-ff feature
    hints:
      - "By default this would fast-forward with no new commit. Which flag forces Git to create a merge commit?"
      - "Add to merge the flag that disables fast-forward — then a third merge commit appears."
