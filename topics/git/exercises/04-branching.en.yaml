exercises:
  - id: branching-pointer-quiz-001
    concept: branching
    type: theory-quiz
    difficulty: 1
    prompt: "What is a branch in Git?"
    choices:
      - id: a
        text: "A copy of all project files in a separate folder."
      - id: b
        text: "A moving pointer to a commit."
      - id: c
        text: "A list of changes not yet in a commit."
      - id: d
        text: "A remote server with a backup copy."
    correct: [b]
    explanation: "A branch is a lightweight pointer to one commit. Creating a branch means writing one name; on a new commit the pointer moves forward."

  - id: branching-head-quiz-001
    concept: branching
    type: theory-quiz
    difficulty: 2
    prompt: "How does `git branch feature` differ from `git switch -c feature`?"
    choices:
      - id: a
        text: "They are synonyms."
      - id: b
        text: "git branch creates a branch but leaves you on the current one; git switch -c creates and switches immediately."
      - id: c
        text: "git branch switches; git switch -c only creates."
      - id: d
        text: "git branch works only with remote branches."
    correct: [b]
    explanation: "git branch feature sets a pointer but does not move HEAD. git switch -c feature creates the branch and moves HEAD in one command."
    variants:
      - prompt: "What does the HEAD pointer do?"
        choices:
          - id: a
            text: "Stores the last commit message."
          - id: b
            text: "Points at your current position — usually the branch you are on."
          - id: c
            text: "Contains a list of all branches."
          - id: d
            text: "Points at the remote repository."
        correct: [b]
        explanation: "HEAD is the where am I pointer. Commit moves the branch HEAD looks at."
      - prompt: "What happens to the working tree on `git switch other`?"
        choices:
          - id: a
            text: "It is cleared completely."
          - id: b
            text: "Git aligns it with the snapshot of the commit branch other points to."
          - id: c
            text: "Nothing; files stay the same."
          - id: d
            text: "All branches merge into one."
        correct: [b]
        explanation: "Switching aligns the working tree with the branch commit snapshot. Work on different branches is isolated."

  - id: branching-create-switch-001
    concept: branching
    type: git-challenge
    difficulty: 1
    prompt: "Create branch feature and switch to it in one command. The repository already has one commit."
    setup:
      files:
        a.txt: "base\n"
      commands:
        - git init
        - git add a.txt
        - git commit -m "base"
    goal:
      - { kind: branch-exists, name: feature }
      - { kind: head-on-branch, name: feature }
    solution:
      - git switch -c feature
    hints:
      - "You need both a new pointer and HEAD aimed at it. Which single command does both?"
      - "Use switch with the flag that creates a new branch."
    variants:
      - prompt: "Create branch bugfix and switch to it in one command. The repository already has one commit."
        setup:
          files:
            a.txt: "base\n"
          commands:
            - git init
            - git add a.txt
            - git commit -m "base"
        goal:
          - { kind: branch-exists, name: bugfix }
          - { kind: head-on-branch, name: bugfix }
        solution:
          - git switch -c bugfix
      - prompt: "Create branch experiment and switch to it in one command. The repository already has one commit."
        setup:
          files:
            a.txt: "base\n"
          commands:
            - git init
            - git add a.txt
            - git commit -m "base"
        goal:
          - { kind: branch-exists, name: experiment }
          - { kind: head-on-branch, name: experiment }
        solution:
          - git switch -c experiment

  - id: branching-work-on-branch-001
    concept: branching
    type: git-challenge
    difficulty: 3
    prompt: "Create branch feature, switch to it, and make one commit there with new file note.txt (message «work»). Result: you are on feature, two commits in history."
    setup:
      files:
        app.py: "v1\n"
      commands:
        - git init
        - git add app.py
        - git commit -m "base"
    goal:
      - { kind: head-on-branch, name: feature }
      - { kind: commit-count, equals: 2 }
      - { kind: file-tracked, path: note.txt }
      - { kind: clean-tree }
    solution:
      - git switch -c feature
      - echo заметка > note.txt
      - git add note.txt
      - git commit -m "work"
    hints:
      - "Get on the new branch first, then commit — the commit goes where HEAD points."
      - "Create and switch to feature, create note.txt, add to index and commit."

  - id: branching-isolated-001
    concept: branching
    type: git-challenge
    difficulty: 4
    prompt: "On branch feature commit file draft.txt, then return to main. Result: you are on main, branch feature exists and is one commit ahead of main, and draft.txt is absent from main history."
    setup:
      files:
        a.txt: "base\n"
      commands:
        - git init
        - git add a.txt
        - git commit -m "base"
    goal:
      - { kind: head-on-branch, name: main }
      - { kind: branch-exists, name: feature }
      - { kind: commit-count, ref: main, equals: 1 }
      - { kind: commit-count, ref: feature, equals: 2 }
      - { kind: file-absent, path: draft.txt, where: worktree }
    solution:
      - git switch -c feature
      - echo черновик > draft.txt
      - git add draft.txt
      - git commit -m "draft"
      - git switch main
    hints:
      - "A commit on feature must not enter main history. Where do you commit and where do you return?"
      - "Create feature, commit draft.txt there, then switch back to main — its history and working tree stay without the file."
