exercises:
  - id: first-commit-add-meaning-quiz-001
    concept: first-commit
    type: theory-quiz
    difficulty: 1
    prompt: "What enters the commit after `git commit`?"
    choices:
      - id: a
        text: "All files in the working tree, regardless of the index."
      - id: b
        text: "Only what is on stage (in the index) at the moment of commit."
      - id: c
        text: "The last modified file."
      - id: d
        text: "Nothing until you name a file directly in git commit."
    correct: [b]
    explanation: "A commit seals the contents of the index. What you added with git add is on stage; other edits stay in the working tree."

  - id: first-commit-restore-quiz-001
    concept: first-commit
    type: theory-quiz
    difficulty: 2
    prompt: "A file is already in the index. You want to remove it from stage but keep edits in the working tree. Which command fits?"
    choices:
      - id: a
        text: "git rm file"
      - id: b
        text: "git restore --staged file"
      - id: c
        text: "git commit file"
      - id: d
        text: "git add file"
    correct: [b]
    explanation: "git restore --staged removes a file from stage without touching the working tree. git rm, by contrast, would delete the file from both the index and disk."
    variants:
      - prompt: "Which group in `git status` means a new file Git does not track yet?"
        choices:
          - id: a
            text: "Changes to be committed"
          - id: b
            text: "Changes not staged for commit"
          - id: c
            text: "Untracked files"
          - id: d
            text: "Working tree clean"
        correct: [c]
        explanation: "Untracked files are new files Git does not track until you add them with git add."
      - prompt: "What will `git status` show right after a successful `git commit` if nothing else changed?"
        choices:
          - id: a
            text: "nothing to commit, working tree clean"
          - id: b
            text: "Changes to be committed"
          - id: c
            text: "fatal: not a git repository"
          - id: d
            text: "Untracked files"
        correct: [a]
        explanation: "After commit everything staged went into history; the working tree matches the last snapshot: the tree is clean."

  - id: first-commit-basic-001
    concept: first-commit
    type: git-challenge
    difficulty: 1
    prompt: "Stage file task.txt and commit it with message «add task»."
    setup:
      files:
        task.txt: "купить хлеб\n"
      commands:
        - git init
    goal:
      - { kind: commit-count, equals: 1 }
      - { kind: file-tracked, path: task.txt }
      - { kind: commit-message, contains: "add task" }
      - { kind: clean-tree }
    solution:
      - git add task.txt
      - git commit -m "add task"
    hints:
      - "You need to place the file on stage (in the index) first, then seal the snapshot."
      - "Two steps: stage by file name, then commit with a message via -m."
    variants:
      - prompt: "Stage file report.md and commit it with message «add report»."
        setup:
          files:
            report.md: "# Отчёт\n"
          commands:
            - git init
        goal:
          - { kind: commit-count, equals: 1 }
          - { kind: file-tracked, path: report.md }
          - { kind: commit-message, contains: "add report" }
          - { kind: clean-tree }
        solution:
          - git add report.md
          - git commit -m "add report"
      - prompt: "Stage file data.csv and commit it with message «add data»."
        setup:
          files:
            data.csv: "id,name\n1,Анна\n"
          commands:
            - git init
        goal:
          - { kind: commit-count, equals: 1 }
          - { kind: file-tracked, path: data.csv }
          - { kind: commit-message, contains: "add data" }
          - { kind: clean-tree }
        solution:
          - git add data.csv
          - git commit -m "add data"

  - id: first-commit-partial-001
    concept: first-commit
    type: git-challenge
    difficulty: 3
    prompt: "Two new files are in the working tree: parser.py and README.md. Commit only parser.py with message «parser», leaving README.md untracked."
    setup:
      files:
        parser.py: "def parse(): pass\n"
        README.md: "# Проект\n"
      commands:
        - git init
    goal:
      - { kind: commit-count, equals: 1 }
      - { kind: file-tracked, path: parser.py }
      - { kind: file-absent, path: README.md, where: head }
    solution:
      - git add parser.py
      - git commit -m "parser"
    hints:
      - "The commit includes exactly what is on stage. What should go on stage and what should not?"
      - "Add only parser.py to the index (by name, not with a dot) and commit. README.md stays untracked."

  - id: first-commit-unstage-001
    concept: first-commit
    type: git-challenge
    difficulty: 3
    prompt: "File secret.key was added to the index by mistake. Remove it from stage (keeping it on disk), then commit only app.py with message «app». secret.key must not enter history."
    setup:
      files:
        app.py: "print('app')\n"
        secret.key: "AKIA-PRIVATE\n"
      commands:
        - git init
        - git add app.py
        - git add secret.key
    goal:
      - { kind: commit-count, equals: 1 }
      - { kind: file-tracked, path: app.py }
      - { kind: file-absent, path: secret.key, where: head }
      - { kind: file-content, path: secret.key, where: worktree, equals: "AKIA-PRIVATE\n" }
    solution:
      - git restore --staged secret.key
      - git commit -m "app"
    hints:
      - "You need to remove the file from stage without destroying it. Which command undoes staging without touching the working tree?"
      - "Remove secret.key from stage with restore --staged, then commit: only app.py remains on stage."
