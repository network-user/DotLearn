exercises:
  - id: undo-reset-modes-quiz-001
    concept: undoing-changes
    type: theory-quiz
    difficulty: 1
    prompt: "Which `git reset` mode erases uncommitted edits in the working tree?"
    choices:
      - id: a
        text: "--soft"
      - id: b
        text: "--mixed"
      - id: c
        text: "--hard"
      - id: d
        text: "None; reset does not touch the working tree."
    correct: [c]
    explanation: "--hard moves the branch, resets the index and rewrites the working tree to the target commit. Uncommitted edits are lost permanently."

  - id: undo-revert-quiz-001
    concept: undoing-changes
    type: theory-quiz
    difficulty: 2
    prompt: "How does `git revert` differ from `git reset`?"
    choices:
      - id: a
        text: "revert removes a commit from history; reset does not."
      - id: b
        text: "revert creates a new commit undoing an old one without rewriting history; reset moves the branch pointer."
      - id: c
        text: "They are synonyms."
      - id: d
        text: "revert works only with remote branches."
    correct: [b]
    explanation: "revert is safe for published history: it adds a new commit with reverse changes. reset rewrites history by moving the branch and is dangerous for shared commits."
    variants:
      - prompt: "What does `git restore config.txt` do to a modified but uncommitted file?"
        choices:
          - id: a
            text: "Deletes the file from disk."
          - id: b
            text: "Returns the file to the last commit version, discarding edits."
          - id: c
            text: "Creates a new commit."
          - id: d
            text: "Removes the file from stage without touching contents."
        correct: [b]
        explanation: "git restore <file> overwrites the working tree with the version from index or commit. Uncommitted edits to that file are lost. That is the point."
      - prompt: "Which reset mode leaves changes from the undone commit on stage (in the index)?"
        choices:
          - id: a
            text: "--soft"
          - id: b
            text: "--mixed"
          - id: c
            text: "--hard"
          - id: d
            text: "reset does not work with the index."
        correct: [a]
        explanation: "--soft moves only the branch pointer; contents of the undone commit stay in the index, ready for a new commit."

  - id: undo-restore-001
    concept: undoing-changes
    type: git-challenge
    difficulty: 1
    prompt: "File notes.txt was corrupted in the working tree after commit. Return it to the committed version «важная заметка» and make the tree clean."
    setup:
      files:
        notes.txt: "важная заметка\n"
      commands:
        - git init
        - git add notes.txt
        - git commit -m "save notes"
        - echo испорчено > notes.txt
    goal:
      - { kind: file-content, path: notes.txt, equals: "важная заметка\n" }
      - { kind: clean-tree }
    solution:
      - git restore notes.txt
    hints:
      - "Discard the uncommitted edit and return the file as in the last commit. Which command works at file level?"
      - "The restore command overwrites the working tree with the commit version."
    variants:
      - prompt: "File data.txt was corrupted in the working tree after commit. Return it to the committed version «42» and make the tree clean."
        setup:
          files:
            data.txt: "42\n"
          commands:
            - git init
            - git add data.txt
            - git commit -m "save"
            - echo сломано > data.txt
        goal:
          - { kind: file-content, path: data.txt, equals: "42\n" }
          - { kind: clean-tree }
        solution:
          - git restore data.txt
      - prompt: "File readme.md was corrupted in the working tree after commit. Return it to the committed version «# Проект» and make the tree clean."
        setup:
          files:
            readme.md: "# Проект\n"
          commands:
            - git init
            - git add readme.md
            - git commit -m "save"
            - echo мусор > readme.md
        goal:
          - { kind: file-content, path: readme.md, equals: "# Проект\n" }
          - { kind: clean-tree }
        solution:
          - git restore readme.md

  - id: undo-reset-soft-001
    concept: undoing-changes
    type: git-challenge
    difficulty: 3
    prompt: "The repository has two commits. Undo the last commit so history has one commit and its changes remain staged (in the index)."
    setup:
      files:
        a.txt: "версия 1\n"
      commands:
        - git init
        - git add a.txt
        - git commit -m "first"
        - echo версия 2 > a.txt
        - git add a.txt
        - git commit -m "second"
    goal:
      - { kind: commit-count, equals: 1 }
      - { kind: staged, path: a.txt }
    solution:
      - git reset --soft HEAD~1
    hints:
      - "Move the branch one commit back but keep edits on stage for a new commit. Which reset mode touches only the branch pointer?"
      - "The shallowest reset mode moves the branch and leaves the undone commit's contents in the index."

  - id: undo-reset-hard-001
    concept: undoing-changes
    type: git-challenge
    difficulty: 3
    prompt: "The repository has two commits; the second changed a.txt to «версия 2». Roll back fully to the first commit so history has one commit, a.txt contains «версия 1», and the tree is clean."
    setup:
      files:
        a.txt: "версия 1\n"
      commands:
        - git init
        - git add a.txt
        - git commit -m "first"
        - echo версия 2 > a.txt
        - git add a.txt
        - git commit -m "second"
    goal:
      - { kind: commit-count, equals: 1 }
      - { kind: file-content, path: a.txt, equals: "версия 1\n" }
      - { kind: clean-tree }
    solution:
      - git reset --hard HEAD~1
    hints:
      - "Return history and file content to the first commit, leaving nothing on stage. Which reset mode rewrites all three areas?"
      - "The deepest reset mode moves the branch, resets the index and rewrites the working tree to the target commit."

  - id: undo-revert-001
    concept: undoing-changes
    type: git-challenge
    difficulty: 4
    prompt: "The last commit accidentally added file leak.txt. Without rewriting history, undo it with a new commit so leak.txt disappears from history and commit count becomes three."
    setup:
      files:
        app.py: "v1\n"
      commands:
        - git init
        - git add app.py
        - git commit -m "app"
        - echo секрет > leak.txt
        - git add leak.txt
        - git commit -m "oops add leak"
    goal:
      - { kind: commit-count, equals: 3 }
      - { kind: file-absent, path: leak.txt, where: head }
      - { kind: commit-message, contains: "Revert" }
    solution:
      - git revert HEAD
    hints:
      - "History may already be published, so you cannot rewrite it. Which command undoes a commit by adding a new one instead of moving the branch?"
      - "One command creates a commit with reverse changes to HEAD: leak.txt is removed by that new commit."
