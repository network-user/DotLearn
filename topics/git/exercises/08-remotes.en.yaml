exercises:
  - id: remotes-fetch-vs-pull-quiz-001
    concept: remotes
    type: theory-quiz
    difficulty: 1
    prompt: "How does `git fetch` differ from `git pull`?"
    choices:
      - id: a
        text: "fetch sends commits to the server; pull downloads."
      - id: b
        text: "fetch downloads commits without touching working branches."
      - id: c
        text: "They are synonyms before any other checks run on this path."
      - id: d
        text: "fetch works only locally before any other checks run on this path."
    correct: [b]
    explanation: "git fetch updates remote-tracking branches without changing your work. git pull = fetch + merge: immediately pours into the current branch, so less predictable."

  - id: remotes-origin-quiz-001
    concept: remotes
    type: theory-quiz
    difficulty: 1
    prompt: "What is `origin`?"
    choices:
      - id: a
        text: "A Git keyword for the first commit, completely skipping origin."
      - id: b
        text: "The default name for the main remote repository."
      - id: c
        text: "The name of the main branch, completely skipping origin."
      - id: d
        text: "A command to send changes, completely skipping origin."
    correct: [b]
    explanation: "origin is the conventional name for the main remote, not magic. On clone Git creates remote origin pointing at the source."
    variants:
      - prompt: "What does `git push origin main` do?"
        choices:
          - id: a
            text: "Downloads branch main from origin before any other checks run on this path."
          - id: b
            text: "Sends local commits on branch main to remote origin."
          - id: c
            text: "Creates a new branch main, completely skipping origin."
          - id: d
            text: "Deletes branch main on the server, completely skipping origin."
        correct: [b]
        explanation: "git push <remote> <branch> sends commits of that branch to the remote. First word is remote name, second is branch name."
      - prompt: "Why can git push be rejected with updates were rejected?"
        choices:
          - id: a
            text: "The remote has commits you lack and push would overwrite them."
          - id: b
            text: "You have too many commits before any other checks run on this path."
          - id: c
            text: "Branch main is protected from any push before any other checks run on this path."
          - id: d
            text: "Git requires a restart before any other checks run on this path."
        correct: [a]
        explanation: "If someone pushed commits you lack, Git refuses so others' work is not erased. Fetch them (pull/fetch), reconcile, then push."

  - id: remotes-add-push-001
    concept: remotes
    type: git-challenge
    difficulty: 1
    prompt: "Add remote origin at https://example.com/repo.git, then push branch main."
    setup:
      files:
        a.txt: "1\n"
      commands:
        - git init
        - git add a.txt
        - git commit -m "first"
    goal:
      - { kind: commit-count, equals: 1 }
      - { kind: clean-tree }
    solution:
      - git remote add origin https://example.com/repo.git
      - git push origin main
    hints:
      - "First create a named address for the remote, then send the branch."
      - "Remote add takes name and url; push takes remote name and branch name."
    variants:
      - prompt: "Add remote origin at https://git.example.org/app.git, then push branch main."
        setup:
          files:
            a.txt: "1\n"
          commands:
            - git init
            - git add a.txt
            - git commit -m "first"
        goal:
          - { kind: commit-count, equals: 1 }
          - { kind: clean-tree }
        solution:
          - git remote add origin https://git.example.org/app.git
          - git push origin main
      - prompt: "Add remote origin at https://example.com/site.git, then push branch main."
        setup:
          files:
            a.txt: "1\n"
          commands:
            - git init
            - git add a.txt
            - git commit -m "first"
        goal:
          - { kind: commit-count, equals: 1 }
          - { kind: clean-tree }
        solution:
          - git remote add origin https://example.com/site.git
          - git push origin main

  - id: remotes-fetch-pull-001
    concept: remotes
    type: git-challenge
    difficulty: 3
    prompt: "Remote origin is already configured. Fetch from the server: first with the safe operation, then merge into the current branch without breaking a clean tree. The single commit must remain."
    setup:
      files:
        a.txt: "1\n"
      commands:
        - git init
        - git add a.txt
        - git commit -m "first"
        - git remote add origin https://example.com/repo.git
    goal:
      - { kind: commit-count, equals: 1 }
      - { kind: clean-tree }
    solution:
      - git fetch origin
      - git pull origin main
    hints:
      - "First safely see what is on the server, then merge. Which two commands mean download and download-and-merge?"
      - "fetch downloads without merging; pull downloads and merges into the current branch. Run them in order."

  - id: remotes-push-after-commit-001
    concept: remotes
    type: git-challenge
    difficulty: 3
    prompt: "Configure remote origin (https://example.com/repo.git), make a new commit with feature.txt («готово»), and push branch main. Result: two commits, clean tree."
    setup:
      files:
        a.txt: "1\n"
      commands:
        - git init
        - git add a.txt
        - git commit -m "first"
    goal:
      - { kind: commit-count, equals: 2 }
      - { kind: file-tracked, path: feature.txt }
      - { kind: clean-tree }
    solution:
      - git remote add origin https://example.com/repo.git
      - echo готово > feature.txt
      - git add feature.txt
      - git commit -m "feature"
      - git push origin main
    hints:
      - "Create remote first, then the usual edit → add → commit cycle, then send the branch."
      - "Add origin, create and commit feature.txt, then push sends updated main."
