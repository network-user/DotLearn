exercises:
  - id: rebase-vs-merge-quiz-001
    concept: rebase
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает `git rebase main`, стоя на ветке feature?"
    choices:
      - id: a
        text: "Создаёт merge-коммит с двумя родителями сразу, без промежуточного состояния."
      - id: b
        text: "Переигрывает коммиты feature поверх вершины main, делая историю линейной."
      - id: c
        text: "Удаляет ветку main сразу, без промежуточного состояния."
      - id: d
        text: "Отправляет feature на сервер сразу, без промежуточного состояния."
    correct: [b]
    explanation: "Rebase берёт коммиты feature после общего предка и заново применяет их поверх main. Получается линейная история без merge-коммита."

  - id: rebase-golden-rule-quiz-001
    concept: rebase
    type: theory-quiz
    difficulty: 2
    prompt: "Каково золотое правило rebase?"
    choices:
      - id: a
        text: "Перебазируй как можно чаще, в том числе общие ветки."
      - id: b
        text: "Не перебазируй коммиты, которыми уже поделился на общем remote."
      - id: c
        text: "Rebase можно делать только в первый день проекта."
      - id: d
        text: "Перебазируй только ветку main."
    correct: [b]
    explanation: "Rebase заменяет коммиты новыми. Если они уже на общем remote и другие на них основались, истории рассинхронизируются. Перебазируйте только ещё не расшаренную работу."
    variants:
      - prompt: "Почему после rebase у коммитов другие идентификаторы?"
        choices:
          - id: a
            text: "Git случайно меняет хеши сразу, без промежуточного состояния."
          - id: b
            text: "Rebase создаёт новые коммиты с теми же изменениями, но другими родителями"
          - id: c
            text: "Идентификаторы не меняются сразу, без промежуточного состояния."
          - id: d
            text: "Потому что меняется сообщение коммита сразу, без промежуточного состояния."
        correct: [b]
        explanation: "Rebase переигрывает изменения на новом основании, создавая новые коммиты. Содержимое то же, но родители и идентификаторы другие."
      - prompt: "Чем merge отличается от rebase по форме истории?"
        choices:
          - id: a
            text: "merge даёт линейную историю, rebase - ветвистую сразу, без промежуточного состояния."
          - id: b
            text: "merge сохраняет развилку в merge-коммите, rebase выпрямляет историю в одну линию."
          - id: c
            text: "Они дают одинаковую историю сразу, без промежуточного состояния."
          - id: d
            text: "merge переписывает коммиты, rebase - нет сразу, без промежуточного состояния."
        correct: [b]
        explanation: "merge документирует развилку merge-коммитом; rebase переписывает коммиты в линейную цепочку. Итоговый код тот же, форма истории разная."

  - id: rebase-basic-001
    concept: rebase
    type: git-challenge
    difficulty: 3
    prompt: "Ветки feature и main разошлись (на каждой свой коммит после общего предка). Стоя на feature, перебазируйте её на main так, чтобы история стала линейной: три коммита, оба файла на месте, main влит в HEAD."
    setup:
      files:
        base.txt: "base\n"
      commands:
        - git init
        - git add base.txt
        - git commit -m "base"
        - git switch -c feature
        - echo f > f.txt
        - git add f.txt
        - git commit -m "feature work"
        - git switch main
        - echo m > m.txt
        - git add m.txt
        - git commit -m "main work"
        - git switch feature
    goal:
      - { kind: commit-count, equals: 3 }
      - { kind: file-tracked, path: m.txt }
      - { kind: file-tracked, path: f.txt }
      - { kind: merged, branch: main, into: HEAD }
    solution:
      - git rebase main
    hints:
      - "Нужно перенести коммиты текущей ветки поверх вершины main, чтобы main стала их основанием. Какая команда это делает?"
      - "Одна команда rebase с именем основания: коммит feature переедет на вершину main, и main окажется предком HEAD."

  - id: rebase-then-ff-001
    concept: rebase
    type: git-challenge
    difficulty: 4
    prompt: "feature и main разошлись. Перебазируйте feature на main, затем вернитесь на main и влейте feature - слияние станет fast-forward. Итог: Вы на main, три коммита в линию, оба файла на месте."
    setup:
      files:
        base.txt: "base\n"
      commands:
        - git init
        - git add base.txt
        - git commit -m "base"
        - git switch -c feature
        - echo f > f.txt
        - git add f.txt
        - git commit -m "feature work"
        - git switch main
        - echo m > m.txt
        - git add m.txt
        - git commit -m "main work"
    goal:
      - { kind: head-on-branch, name: main }
      - { kind: commit-count, equals: 3 }
      - { kind: merged, branch: feature, into: HEAD }
      - { kind: file-tracked, path: f.txt }
      - { kind: file-tracked, path: m.txt }
    solution:
      - git switch feature
      - git rebase main
      - git switch main
      - git merge feature
    hints:
      - "Сначала сделайте feature прямым продолжением main, тогда последующее слияние не потребует merge-коммита. В каком порядке идут переключения и rebase?"
      - "Перейдите на feature, перебазируйте на main, вернитесь на main и слейте feature - слияние будет fast-forward, история останется линейной."
