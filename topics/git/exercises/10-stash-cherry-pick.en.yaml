exercises:
  - id: stash-meaning-quiz-001
    concept: stash-cherry-pick
    type: theory-quiz
    difficulty: 1
    prompt: "What does `git stash` do?"
    choices:
      - id: a
        text: "Creates a new commit from current edits before any other checks run on this path."
      - id: b
        text: "Hides uncommitted edits and returns the working tree to the last commit state."
      - id: c
        text: "Sends changes to the server before any other checks run on this path."
      - id: d
        text: "Deletes a branch immediately, without an intermediate state and without extra checks."
    correct: [b]
    explanation: "git stash removes uncommitted changes (from tree and stage) into separate storage and clears the working tree. Retrieve with git stash pop."

  - id: cherry-pick-quiz-001
    concept: stash-cherry-pick
    type: theory-quiz
    difficulty: 2
    prompt: "What does `git cherry-pick <commit>` do?"
    choices:
      - id: a
        text: "Merges the entire branch containing the commit before any other checks run on this path."
      - id: b
        text: "Applies one specified commit's changes as a new commit on the current branch."
      - id: c
        text: "Deletes the specified commit from history before any other checks run on this path."
      - id: d
        text: "Renames the commit, produced in full without further selection."
    correct: [b]
    explanation: "cherry-pick moves one commit's changes to the current branch as a new commit with its own identifier, without touching other commits on the source branch."
    variants:
      - prompt: "What does `git stash pop` do?"
        choices:
          - id: a
            text: "Deletes all stashed entries without restoring them before any other checks run on this path."
          - id: b
            text: "Brings the latest stashed entry back to the working tree and removes it from storage."
          - id: c
            text: "Creates a new branch from stash before any other checks run on this path."
          - id: d
            text: "Sends stash to the server immediately, without an intermediate state and without extra checks."
        correct: [b]
        explanation: "git stash pop applies the latest stashed entry to the current tree and removes it from storage."
      - prompt: "When is merge/rebase more appropriate than cherry-pick?"
        choices:
          - id: a
            text: "When you need to move one commit before any other checks run on this path."
          - id: b
            text: "When you need to move a whole branch of many commits."
          - id: c
            text: "cherry-pick is always better than merge before any other checks run on this path."
          - id: d
            text: "When there are no commits at all before any other checks run on this path."
        correct: [b]
        explanation: "cherry-pick suits one or two commits. Moving a whole branch that way is tedious and creates duplicates, so use merge or rebase."

  - id: cherry-pick-basic-001
    concept: stash-cherry-pick
    type: git-challenge
    difficulty: 3
    prompt: "Branch feature has a bugfix with file fix.txt. On main, move only that commit via cherry-pick. Result: on main, fix.txt tracked, two commits on main."
    setup:
      files:
        base.txt: "base\n"
      commands:
        - git init
        - git add base.txt
        - git commit -m "base"
        - git switch -c feature
        - echo hot > fix.txt
        - git add fix.txt
        - git commit -m "hotfix"
        - git switch main
    goal:
      - { kind: file-tracked, path: fix.txt }
      - { kind: head-on-branch, name: main }
      - { kind: commit-count, equals: 2 }
      - { kind: commit-message, contains: "hotfix" }
    solution:
      - git cherry-pick feature
    hints:
      - "Move changes from one commit (feature's tip) to the current branch without merging all of feature. Which command moves a single commit?"
      - "One cherry-pick command naming the commit (branch name feature works because it is the tip)."

  - id: stash-cycle-001
    concept: stash-cherry-pick
    type: git-challenge
    difficulty: 3
    prompt: "File a.txt is modified but uncommitted (now «черновик»). Stash the edit, then immediately pop it back so a.txt contains «черновик» again."
    setup:
      files:
        a.txt: "сохранено\n"
      commands:
        - git init
        - git add a.txt
        - git commit -m "first"
        - echo черновик > a.txt
    goal:
      - { kind: file-content, path: a.txt, equals: "черновик\n" }
    solution:
      - git stash
      - git stash pop
    hints:
      - "First put the edit in the pocket (tree becomes clean), then bring it back. Which two commands form that cycle?"
      - "git stash hides, git stash pop restores: run in order and the edit returns."

  - id: stash-then-hotfix-001
    concept: stash-cherry-pick
    type: git-challenge
    difficulty: 4
    prompt: "File draft.txt is modified but not ready. Stash the edit, make an urgent commit with hot.txt («срочно», message «hotfix»), then restore the stashed edit. Result: two commits, hot.txt tracked, draft.txt contains «в работе» again."
    setup:
      files:
        base.txt: "base\n"
      commands:
        - git init
        - git add base.txt
        - git commit -m "first"
        - echo в работе > draft.txt
    goal:
      - { kind: commit-count, equals: 2 }
      - { kind: file-tracked, path: hot.txt }
      - { kind: file-content, path: draft.txt, equals: "в работе\n" }
    solution:
      - git stash
      - echo срочно > hot.txt
      - git add hot.txt
      - git commit -m "hotfix"
      - git stash pop
    hints:
      - "Park unfinished work, do urgent on a clean tree, then bring the parked edit back. Order of stash, commit, pop?"
      - "Stash the edit, create and commit hot.txt, then pop draft.txt back via stash pop."
