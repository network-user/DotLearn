exercises:
  - id: undo-reset-modes-quiz-001
    concept: undoing-changes
    type: theory-quiz
    difficulty: 1
    prompt: "Какой режим `git reset` стирает незакоммиченные правки в рабочем дереве?"
    choices:
      - id: a
        text: "--soft"
      - id: b
        text: "--mixed"
      - id: c
        text: "--hard"
      - id: d
        text: "Никакой, reset не трогает рабочее дерево."
    correct: [c]
    explanation: "--hard двигает ветку, сбрасывает индекс и переписывает рабочее дерево под целевой коммит. Незакоммиченные правки при этом теряются безвозвратно."

  - id: undo-revert-quiz-001
    concept: undoing-changes
    type: theory-quiz
    difficulty: 2
    prompt: "Чем `git revert` отличается от `git reset`?"
    choices:
      - id: a
        text: "revert удаляет коммит из истории, reset - нет."
      - id: b
        text: "revert создаёт новый коммит, отменяющий старый, не переписывая историю; reset сдвигает указатель ветки."
      - id: c
        text: "Это синонимы."
      - id: d
        text: "revert работает только с удалёнными ветками."
    correct: [b]
    explanation: "revert безопасен для опубликованной истории: он добавляет новый коммит с обратными изменениями. reset переписывает историю, сдвигая ветку, и опасен для уже расшаренных коммитов."
    variants:
      - prompt: "Что делает `git restore config.txt` для изменённого, но не закоммиченного файла?"
        choices:
          - id: a
            text: "Удаляет файл с диска."
          - id: b
            text: "Возвращает файл к версии последнего коммита, выбрасывая правки."
          - id: c
            text: "Создаёт новый коммит."
          - id: d
            text: "Снимает файл со сцены, не трогая содержимое."
        correct: [b]
        explanation: "git restore <file> перезаписывает рабочее дерево версией из индекса или коммита. Незакоммиченные правки этого файла теряются - в этом смысл команды."
      - prompt: "Какой режим reset оставляет изменения отменённого коммита на сцене (в индексе)?"
        choices:
          - id: a
            text: "--soft"
          - id: b
            text: "--mixed"
          - id: c
            text: "--hard"
          - id: d
            text: "reset не работает с индексом."
        correct: [a]
        explanation: "--soft двигает только указатель ветки; содержимое отменённого коммита остаётся в индексе, готовое к новому коммиту."

  - id: undo-restore-001
    concept: undoing-changes
    type: git-challenge
    difficulty: 1
    prompt: "Файл notes.txt после коммита был испорчен в рабочем дереве. Верните его к закоммиченной версии «важная заметка» и сделайте дерево чистым."
    setup:
      files:
        notes.txt: "важная заметка\n"
      commands:
        - git init
        - git add notes.txt
        - git commit -m "save notes"
        - echo испорчено > notes.txt
    goal:
      - { kind: file-content, path: notes.txt, equals: "важная заметка\n" }
      - { kind: clean-tree }
    solution:
      - git restore notes.txt
    hints:
      - "Нужно выбросить незакоммиченную правку и вернуть файл как в последнем коммите. Какая команда работает на уровне файла?"
      - "Команда восстановления файла перезапишет рабочее дерево версией из коммита."
    variants:
      - prompt: "Файл data.txt после коммита был испорчен в рабочем дереве. Верните его к закоммиченной версии «42» и сделайте дерево чистым."
        setup:
          files:
            data.txt: "42\n"
          commands:
            - git init
            - git add data.txt
            - git commit -m "save"
            - echo сломано > data.txt
        goal:
          - { kind: file-content, path: data.txt, equals: "42\n" }
          - { kind: clean-tree }
        solution:
          - git restore data.txt
      - prompt: "Файл readme.md после коммита был испорчен в рабочем дереве. Верните его к закоммиченной версии «# Проект» и сделайте дерево чистым."
        setup:
          files:
            readme.md: "# Проект\n"
          commands:
            - git init
            - git add readme.md
            - git commit -m "save"
            - echo мусор > readme.md
        goal:
          - { kind: file-content, path: readme.md, equals: "# Проект\n" }
          - { kind: clean-tree }
        solution:
          - git restore readme.md

  - id: undo-reset-soft-001
    concept: undoing-changes
    type: git-challenge
    difficulty: 3
    prompt: "В репозитории два коммита. Отмените последний коммит так, чтобы в истории остался один коммит, а его изменения остались выставленными на сцене (в индексе)."
    setup:
      files:
        a.txt: "версия 1\n"
      commands:
        - git init
        - git add a.txt
        - git commit -m "first"
        - echo версия 2 > a.txt
        - git add a.txt
        - git commit -m "second"
    goal:
      - { kind: commit-count, equals: 1 }
      - { kind: staged, path: a.txt }
    solution:
      - git reset --soft HEAD~1
    hints:
      - "Нужно сдвинуть ветку на один коммит назад, но сохранить правки на сцене для нового коммита. Какой режим reset трогает только указатель ветки?"
      - "Самый «мелкий» режим reset двигает ветку и оставляет содержимое отменённого коммита в индексе."

  - id: undo-reset-hard-001
    concept: undoing-changes
    type: git-challenge
    difficulty: 3
    prompt: "В репозитории два коммита, второй изменил a.txt на «версия 2». Полностью откатитесь на первый коммит так, чтобы в истории остался один коммит, a.txt снова содержал «версия 1», а дерево было чистым."
    setup:
      files:
        a.txt: "версия 1\n"
      commands:
        - git init
        - git add a.txt
        - git commit -m "first"
        - echo версия 2 > a.txt
        - git add a.txt
        - git commit -m "second"
    goal:
      - { kind: commit-count, equals: 1 }
      - { kind: file-content, path: a.txt, equals: "версия 1\n" }
      - { kind: clean-tree }
    solution:
      - git reset --hard HEAD~1
    hints:
      - "Нужно вернуть не только историю, но и содержимое файла к первому коммиту, ничего не оставив на сцене. Какой режим reset переписывает все три области?"
      - "Самый «глубокий» режим reset сдвинет ветку, сбросит индекс и перепишет рабочее дерево под целевой коммит."

  - id: undo-revert-001
    concept: undoing-changes
    type: git-challenge
    difficulty: 4
    prompt: "Последний коммит по ошибке добавил файл leak.txt. Не переписывая историю, отмените его новым коммитом так, чтобы leak.txt исчез из истории, а число коммитов стало три."
    setup:
      files:
        app.py: "v1\n"
      commands:
        - git init
        - git add app.py
        - git commit -m "app"
        - echo секрет > leak.txt
        - git add leak.txt
        - git commit -m "oops add leak"
    goal:
      - { kind: commit-count, equals: 3 }
      - { kind: file-absent, path: leak.txt, where: head }
      - { kind: commit-message, contains: "Revert" }
    solution:
      - git revert HEAD
    hints:
      - "История уже могла быть опубликована, поэтому переписывать её нельзя. Какая команда отменяет коммит, добавляя новый, а не сдвигая ветку?"
      - "Одна команда создаёт коммит с обратными изменениями к HEAD - leak.txt будет удалён этим новым коммитом."
