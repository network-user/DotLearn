exercises:
  - id: rebase-vs-merge-quiz-001
    concept: rebase
    type: theory-quiz
    difficulty: 1
    prompt: "What does `git rebase main` do while on branch feature?"
    choices:
      - id: a
        text: "Creates a merge commit with two parents before any other checks run on this path."
      - id: b
        text: "Replays feature commits on top of main's tip, making history linear."
      - id: c
        text: "Deletes branch main before any other checks run on this path."
      - id: d
        text: "Sends feature to the server before any other checks run on this path."
    correct: [b]
    explanation: "Rebase takes feature commits after the common ancestor and reapplies them on main. You get linear history without a merge commit."

  - id: rebase-golden-rule-quiz-001
    concept: rebase
    type: theory-quiz
    difficulty: 2
    prompt: "What is the golden rule of rebase?"
    choices:
      - id: a
        text: "Rebase as often as possible, including shared branches."
      - id: b
        text: "Do not rebase commits you already shared on a common remote."
      - id: c
        text: "Rebase is allowed only on the first day of a project."
      - id: d
        text: "Rebase only branch main."
    correct: [b]
    explanation: "Rebase replaces commits with new ones. If they are on a shared remote and others built on them, histories desync. Rebase only work not yet shared."
    variants:
      - prompt: "Why do commits have different identifiers after rebase?"
        choices:
          - id: a
            text: "Git randomly changes hashes immediately, without an intermediate state and without extra checks."
          - id: b
            text: "Rebase creates new commits with the same changes but different parents, technically different commits."
          - id: c
            text: "Identifiers do not change immediately, without an intermediate state and without extra checks."
          - id: d
            text: "Because the commit message changes immediately, without an intermediate state and without extra checks."
        correct: [b]
        explanation: "Rebase replays changes on a new base, creating new commits. Same contents, different parents and identifiers."
      - prompt: "How do merge and rebase differ in history shape?"
        choices:
          - id: a
            text: "merge gives linear history; rebase gives a branchy one before any other checks run on this path."
          - id: b
            text: "merge keeps the fork in a merge commit; rebase straightens history into one line."
          - id: c
            text: "They give identical history before any other checks run on this path."
          - id: d
            text: "merge rewrites commits; rebase does not before any other checks run on this path."
        correct: [b]
        explanation: "merge documents the fork with a merge commit; rebase rewrites commits into a linear chain. Same final code, different history shape."

  - id: rebase-basic-001
    concept: rebase
    type: git-challenge
    difficulty: 3
    prompt: "Branches feature and main diverged (each has its own commit after the common ancestor). On feature, rebase onto main so history is linear: three commits, both files present, main merged into HEAD."
    setup:
      files:
        base.txt: "base\n"
      commands:
        - git init
        - git add base.txt
        - git commit -m "base"
        - git switch -c feature
        - echo f > f.txt
        - git add f.txt
        - git commit -m "feature work"
        - git switch main
        - echo m > m.txt
        - git add m.txt
        - git commit -m "main work"
        - git switch feature
    goal:
      - { kind: commit-count, equals: 3 }
      - { kind: file-tracked, path: m.txt }
      - { kind: file-tracked, path: f.txt }
      - { kind: merged, branch: main, into: HEAD }
    solution:
      - git rebase main
    hints:
      - "Move current branch commits onto main's tip so main becomes their base. Which command does that?"
      - "One rebase command with the base name: the feature commit moves to main's tip and main becomes HEAD's ancestor."

  - id: rebase-then-ff-001
    concept: rebase
    type: git-challenge
    difficulty: 4
    prompt: "feature and main diverged. Rebase feature onto main, return to main and merge feature: merge becomes fast-forward. Result: on main, three commits in a line, both files present."
    setup:
      files:
        base.txt: "base\n"
      commands:
        - git init
        - git add base.txt
        - git commit -m "base"
        - git switch -c feature
        - echo f > f.txt
        - git add f.txt
        - git commit -m "feature work"
        - git switch main
        - echo m > m.txt
        - git add m.txt
        - git commit -m "main work"
    goal:
      - { kind: head-on-branch, name: main }
      - { kind: commit-count, equals: 3 }
      - { kind: merged, branch: feature, into: HEAD }
      - { kind: file-tracked, path: f.txt }
      - { kind: file-tracked, path: m.txt }
    solution:
      - git switch feature
      - git rebase main
      - git switch main
      - git merge feature
    hints:
      - "Make feature a direct continuation of main first, then merge needs no merge commit. What order of switch and rebase?"
      - "Switch to feature, rebase on main, return to main and merge feature: fast-forward, linear history."
