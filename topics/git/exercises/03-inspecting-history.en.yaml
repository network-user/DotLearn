exercises:
  - id: history-diff-quiz-001
    concept: inspecting-history
    type: theory-quiz
    difficulty: 1
    prompt: "What does `git diff` with no arguments compare?"
    choices:
      - id: a
        text: "The working tree with the index (unstaged edits)."
      - id: b
        text: "The index with the last commit."
      - id: c
        text: "The two most recent branches with each other."
      - id: d
        text: "The local repository with the remote."
    correct: [a]
    explanation: "git diff with no arguments shows the difference between the working tree and the index — edits not yet on stage. View staged changes with git diff --staged."
    variants:
      - prompt: "What does `git diff --staged` compare?"
        choices:
          - id: a
            text: "The working tree with the index."
          - id: b
            text: "The index with the last commit (what will enter the commit)."
          - id: c
            text: "HEAD with a remote branch."
          - id: d
            text: "Two arbitrary files."
        correct: [b]
        explanation: "git diff --staged shows the difference between the index and the last commit — exactly what will enter the next commit."
      - prompt: "What question does `git status` answer?"
        choices:
          - id: a
            text: "What state files are in right now (on stage, modified, untracked)."
          - id: b
            text: "Which commits were made this week."
          - id: c
            text: "How a file changed line by line."
          - id: d
            text: "Who authored the last commit."
        correct: [a]
        explanation: "git status is an instant snapshot of here and now: placement of files across three areas. History is shown by git log."

  - id: history-log-quiz-001
    concept: inspecting-history
    type: theory-quiz
    difficulty: 2
    prompt: "You changed a file, ran `git add`, then `git diff` — output is empty. Why?"
    choices:
      - id: a
        text: "Git lost the changes."
      - id: b
        text: "The edit is on stage, and git diff compares tree with index, which now match."
      - id: c
        text: "git diff only works after commit."
      - id: d
        text: "The file is untracked."
    correct: [b]
    explanation: "After git add the working tree and index match, so git diff (tree vs index) is empty. To see the staged edit use git diff --staged."

  - id: history-build-log-001
    concept: inspecting-history
    type: git-challenge
    difficulty: 1
    prompt: "Create a history of two commits: first commit a.txt with message «first», then add b.txt and commit with message «second»."
    setup:
      files:
        a.txt: "первый\n"
        b.txt: "второй\n"
      commands:
        - git init
    goal:
      - { kind: commit-count, equals: 2 }
      - { kind: commit-message, index: 0, contains: "second" }
      - { kind: commit-message, index: 1, contains: "first" }
      - { kind: clean-tree }
    solution:
      - git add a.txt
      - git commit -m "first"
      - git add b.txt
      - git commit -m "second"
    hints:
      - "Two commits means two cycles of place on stage then seal snapshot. What goes into each?"
      - "Stage and commit a.txt first, then b.txt as a separate commit."
    variants:
      - prompt: "Create a history of two commits: commit x.txt with message «init», then add y.txt and commit with message «more»."
        setup:
          files:
            x.txt: "икс\n"
            y.txt: "игрек\n"
          commands:
            - git init
        goal:
          - { kind: commit-count, equals: 2 }
          - { kind: commit-message, index: 0, contains: "more" }
          - { kind: commit-message, index: 1, contains: "init" }
          - { kind: clean-tree }
        solution:
          - git add x.txt
          - git commit -m "init"
          - git add y.txt
          - git commit -m "more"
      - prompt: "Create a history of two commits: commit one.md with message «one», then add two.md and commit with message «two»."
        setup:
          files:
            one.md: "один\n"
            two.md: "два\n"
          commands:
            - git init
        goal:
          - { kind: commit-count, equals: 2 }
          - { kind: commit-message, index: 0, contains: "two" }
          - { kind: commit-message, index: 1, contains: "one" }
          - { kind: clean-tree }
        solution:
          - git add one.md
          - git commit -m "one"
          - git add two.md
          - git commit -m "two"

  - id: history-three-commits-001
    concept: inspecting-history
    type: git-challenge
    difficulty: 3
    prompt: "The repository already has one commit «init». Add two more commits so there are three total, and the newest message contains «release»."
    setup:
      files:
        app.py: "v1\n"
      commands:
        - git init
        - git add app.py
        - git commit -m "init"
    goal:
      - { kind: commit-count, equals: 3 }
      - { kind: commit-message, index: 0, contains: "release" }
      - { kind: clean-tree }
    solution:
      - echo v2 > feature.py
      - git add feature.py
      - git commit -m "feature"
      - echo v3 > changelog.txt
      - git add changelog.txt
      - git commit -m "release"
    hints:
      - "HEAD should point at the third commit and its message should contain the required word."
      - "Make two new commits on top of init; the last one should carry a message with release."

  - id: history-message-position-001
    concept: inspecting-history
    type: git-challenge
    difficulty: 3
    prompt: "Build a history of three commits so the previous commit (HEAD~1) has message «middle». Start from an empty repository."
    setup:
      files:
        base.txt: "base\n"
      commands:
        - git init
    goal:
      - { kind: commit-count, equals: 3 }
      - { kind: commit-message, index: 1, contains: "middle" }
      - { kind: clean-tree }
    solution:
      - git add base.txt
      - git commit -m "start"
      - echo mid > mid.txt
      - git add mid.txt
      - git commit -m "middle"
      - echo last > last.txt
      - git add last.txt
      - git commit -m "last"
    hints:
      - "The message is checked on commit HEAD~1 — the second-to-last. How many commits should come after it?"
      - "Make three commits in a row; the middle (second) should have message middle, then after the third it sits at HEAD~1."
