exercises:
  - id: tag-meaning-quiz-001
    concept: tags-reflog
    type: theory-quiz
    difficulty: 1
    prompt: "Чем тег отличается от ветки?"
    choices:
      - id: a
        text: "Тег движется вперёд с каждым новым коммитом, как ветка."
      - id: b
        text: "Тег - неподвижная метка на конкретном коммите; новые коммиты его не двигают."
      - id: c
        text: "Тег нельзя удалить."
      - id: d
        text: "Тег существует только на сервере."
    correct: [b]
    explanation: "Ветка двигается с каждым коммитом, а тег прибит к конкретному коммиту навсегда. Поэтому теги используют для версий релизов - они отмечают зафиксированное состояние."

  - id: reflog-quiz-001
    concept: tags-reflog
    type: theory-quiz
    difficulty: 2
    prompt: "Зачем нужен `git reflog`?"
    choices:
      - id: a
        text: "Чтобы отправить теги на сервер."
      - id: b
        text: "Чтобы увидеть журнал перемещений HEAD и вернуться к «потерянному» после reset коммиту."
      - id: c
        text: "Чтобы создать новую ветку."
      - id: d
        text: "Чтобы посмотреть удалённые ветки."
    correct: [b]
    explanation: "reflog - локальный журнал позиций HEAD. После reset --hard отменённый коммит становится недостижимым для git log, но reflog помнит, где HEAD был, и позволяет вернуться."
    variants:
      - prompt: "Что произойдёт с тегом при обычном `git push`?"
        choices:
          - id: a
            text: "Тег автоматически уйдёт на remote."
          - id: b
            text: "Тег не отправится - обычный push не берёт теги, их шлют явно."
          - id: c
            text: "Push завершится ошибкой из-за тега."
          - id: d
            text: "Тег превратится в ветку."
        correct: [b]
        explanation: "Обычный git push не отправляет теги. Чтобы тег появился на remote, нужен git push origin <тег> или git push --tags."
      - prompt: "Что хранит аннотированный тег (git tag -a), чего нет у лёгкого?"
        choices:
          - id: a
            text: "Только имя."
          - id: b
            text: "Автора, дату и сообщение - полноценный объект с метаданными."
          - id: c
            text: "Копию всех файлов."
          - id: d
            text: "Список веток."
        correct: [b]
        explanation: "Аннотированный тег хранит автора, дату и сообщение, поэтому предпочтителен для публичных релизов. Лёгкий тег - просто закладка-имя на коммите."

  - id: tag-create-001
    concept: tags-reflog
    type: git-challenge
    difficulty: 1
    prompt: "Поставьте лёгкий тег v1.0.0 на текущий коммит."
    setup:
      files:
        a.txt: "1\n"
      commands:
        - git init
        - git add a.txt
        - git commit -m "release"
    goal:
      - { kind: tag-exists, name: v1.0.0 }
      - { kind: head-at, ref: v1.0.0 }
    solution:
      - git tag v1.0.0
    hints:
      - "Нужно прибить именованную метку к текущему коммиту. Какая команда ставит тег?"
      - "Одна команда tag с именем версии - по умолчанию тег садится на HEAD."
    variants:
      - prompt: "Поставьте лёгкий тег v2.0.0 на текущий коммит."
        setup:
          files:
            a.txt: "1\n"
          commands:
            - git init
            - git add a.txt
            - git commit -m "release"
        goal:
          - { kind: tag-exists, name: v2.0.0 }
          - { kind: head-at, ref: v2.0.0 }
        solution:
          - git tag v2.0.0
      - prompt: "Поставьте лёгкий тег release-2024 на текущий коммит."
        setup:
          files:
            a.txt: "1\n"
          commands:
            - git init
            - git add a.txt
            - git commit -m "release"
        goal:
          - { kind: tag-exists, name: release-2024 }
          - { kind: head-at, ref: release-2024 }
        solution:
          - git tag release-2024

  - id: tag-backup-before-reset-001
    concept: tags-reflog
    type: git-challenge
    difficulty: 3
    prompt: "В репозитории два коммита, второй - «важная работа». Поставьте тег backup на текущий коммит как страховку, затем откатите ветку на первый коммит через reset --hard. Тег должен сохранить «важную работу»."
    setup:
      files:
        a.txt: "1\n"
      commands:
        - git init
        - git add a.txt
        - git commit -m "v1"
        - echo 2 > a.txt
        - git add a.txt
        - git commit -m "важная работа"
    goal:
      - { kind: tag-exists, name: backup }
      - { kind: commit-count, equals: 1 }
      - { kind: commit-count, ref: backup, equals: 2 }
      - { kind: commit-message, ref: backup, contains: "важная работа" }
    solution:
      - git tag backup
      - git reset --hard HEAD~1
    hints:
      - "Сначала закрепите текущий коммит именем, чтобы он не потерялся после отката, и только потом двигайте ветку назад."
      - "Поставьте тег backup на HEAD, затем сделайте reset --hard на предыдущий коммит - тег останется указывать на «важную работу»."

  - id: tag-recover-after-reset-001
    concept: tags-reflog
    type: git-challenge
    difficulty: 4
    prompt: "Ветку уже откатили через reset --hard на первый коммит, но на потерянный коммит «важная работа» по-прежнему указывает тег backup. Восстановите ветку: верните HEAD на коммит backup вместе с рабочим деревом. Итог: два коммита, a.txt содержит «2»."
    setup:
      files:
        a.txt: "1\n"
      commands:
        - git init
        - git add a.txt
        - git commit -m "v1"
        - echo 2 > a.txt
        - git add a.txt
        - git commit -m "важная работа"
        - git tag backup
        - git reset --hard HEAD~1
    goal:
      - { kind: commit-count, equals: 2 }
      - { kind: file-content, path: a.txt, equals: "2\n" }
      - { kind: commit-message, contains: "важная работа" }
    solution:
      - git reset --hard backup
    hints:
      - "У Вас есть имя, указывающее на потерянный коммит. Какая команда переносит ветку и рабочее дерево на него?"
      - "reset --hard принимает не только HEAD~1, но и любую метку - используйте имя backup как цель."
