exercises:
  - id: remotes-fetch-vs-pull-quiz-001
    concept: remotes
    type: theory-quiz
    difficulty: 1
    prompt: "Чем `git fetch` отличается от `git pull`?"
    choices:
      - id: a
        text: "fetch отправляет коммиты на сервер, pull скачивает."
      - id: b
        text: "fetch скачивает коммиты, не трогая рабочие ветки; pull скачивает и сразу сливает в текущую ветку."
      - id: c
        text: "Это синонимы."
      - id: d
        text: "fetch работает только локально."
    correct: [b]
    explanation: "git fetch обновляет remote-tracking ветки, не меняя Вашу работу. git pull = fetch + слияние: сразу вливает изменения в текущую ветку, поэтому менее предсказуем."

  - id: remotes-origin-quiz-001
    concept: remotes
    type: theory-quiz
    difficulty: 1
    prompt: "Что такое `origin`?"
    choices:
      - id: a
        text: "Ключевое слово Git, обозначающее первый коммит."
      - id: b
        text: "Имя по умолчанию для основного удалённого репозитория."
      - id: c
        text: "Название главной ветки."
      - id: d
        text: "Команда отправки изменений."
    correct: [b]
    explanation: "origin - привычное имя основного remote, а не магическое слово. При клонировании Git автоматически заводит remote origin, указывающий на источник."
    variants:
      - prompt: "Что делает `git push origin main`?"
        choices:
          - id: a
            text: "Скачивает ветку main с origin."
          - id: b
            text: "Отправляет локальные коммиты ветки main на remote origin."
          - id: c
            text: "Создаёт новую ветку main."
          - id: d
            text: "Удаляет ветку main на сервере."
        correct: [b]
        explanation: "git push <remote> <ветка> отправляет коммиты указанной ветки на remote. Первое слово - имя remote, второе - имя ветки."
      - prompt: "Почему git push может быть отвергнут с «updates were rejected»?"
        choices:
          - id: a
            text: "На remote есть коммиты, которых нет у Вас, и push затёр бы их."
          - id: b
            text: "У Вас слишком много коммитов."
          - id: c
            text: "Ветка main защищена от любых push."
          - id: d
            text: "Git требует перезагрузки."
        correct: [a]
        explanation: "Если кто-то отправил коммиты, которых у Вас нет, Git откажет, чтобы не затереть чужую работу. Нужно сначала забрать их (pull/fetch), свести, потом push."

  - id: remotes-add-push-001
    concept: remotes
    type: git-challenge
    difficulty: 1
    prompt: "Добавьте удалённый репозиторий с именем origin и адресом https://example.com/repo.git, затем отправьте ветку main."
    setup:
      files:
        a.txt: "1\n"
      commands:
        - git init
        - git add a.txt
        - git commit -m "first"
    goal:
      - { kind: commit-count, equals: 1 }
      - { kind: clean-tree }
    solution:
      - git remote add origin https://example.com/repo.git
      - git push origin main
    hints:
      - "Сначала нужно завести именованный адрес удалённого репозитория, потом отправить на него ветку."
      - "Команда добавления remote принимает имя и url; команда отправки - имя remote и имя ветки."
    variants:
      - prompt: "Добавьте удалённый репозиторий с именем origin и адресом https://git.example.org/app.git, затем отправьте ветку main."
        setup:
          files:
            a.txt: "1\n"
          commands:
            - git init
            - git add a.txt
            - git commit -m "first"
        goal:
          - { kind: commit-count, equals: 1 }
          - { kind: clean-tree }
        solution:
          - git remote add origin https://git.example.org/app.git
          - git push origin main
      - prompt: "Добавьте удалённый репозиторий с именем origin и адресом https://example.com/site.git, затем отправьте ветку main."
        setup:
          files:
            a.txt: "1\n"
          commands:
            - git init
            - git add a.txt
            - git commit -m "first"
        goal:
          - { kind: commit-count, equals: 1 }
          - { kind: clean-tree }
        solution:
          - git remote add origin https://example.com/site.git
          - git push origin main

  - id: remotes-fetch-pull-001
    concept: remotes
    type: git-challenge
    difficulty: 3
    prompt: "У репозитория уже настроен remote origin. Заберите изменения с сервера: сначала безопасной операцией, затем влейте их в текущую ветку, не сломав чистоту рабочего дерева. Единственный коммит должен сохраниться."
    setup:
      files:
        a.txt: "1\n"
      commands:
        - git init
        - git add a.txt
        - git commit -m "first"
        - git remote add origin https://example.com/repo.git
    goal:
      - { kind: commit-count, equals: 1 }
      - { kind: clean-tree }
    solution:
      - git fetch origin
      - git pull origin main
    hints:
      - "Сначала безопасно посмотреть, что на сервере, потом влить. Какие две команды отвечают за «скачать» и «скачать и слить»?"
      - "fetch скачивает без слияния, pull скачивает и сливает в текущую ветку - примените их по порядку."

  - id: remotes-push-after-commit-001
    concept: remotes
    type: git-challenge
    difficulty: 3
    prompt: "Настройте remote origin (https://example.com/repo.git), затем сделайте новый коммит с файлом feature.txt («готово») и отправьте ветку main. Итог: два коммита, дерево чистое."
    setup:
      files:
        a.txt: "1\n"
      commands:
        - git init
        - git add a.txt
        - git commit -m "first"
    goal:
      - { kind: commit-count, equals: 2 }
      - { kind: file-tracked, path: feature.txt }
      - { kind: clean-tree }
    solution:
      - git remote add origin https://example.com/repo.git
      - echo готово > feature.txt
      - git add feature.txt
      - git commit -m "feature"
      - git push origin main
    hints:
      - "Сначала завести remote, потом обычный цикл «правка → add → commit», и только затем отправить ветку."
      - "Добавьте origin, создайте и закоммитьте feature.txt, после чего push отправит обновлённую main."
