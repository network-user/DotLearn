exercises:
  - id: conflicts-when-quiz-001
    concept: merge-conflicts
    type: theory-quiz
    difficulty: 1
    prompt: "When does a merge conflict arise?"
    choices:
      - id: a
        text: "Always when merging two branches."
      - id: b
        text: "When both branches changed the same line differently."
      - id: c
        text: "When branches edited different files."
      - id: d
        text: "When branches have no common ancestor."
    correct: [b]
    explanation: "Conflict is overlap of incompatible edits to one line. Different files, different lines, and identical edits from both sides Git merges automatically."

  - id: conflicts-markers-quiz-001
    concept: merge-conflicts
    type: theory-quiz
    difficulty: 2
    prompt: "What sits between markers `<<<<<<< HEAD` and `=======` in a conflicted file?"
    choices:
      - id: a
        text: "The incoming branch version."
      - id: b
        text: "The current branch version (ours)."
      - id: c
        text: "The common ancestor of both branches."
      - id: d
        text: "Random junk to delete entirely."
    correct: [b]
    explanation: "Between <<<<<<< HEAD and ======= is the current branch. Between ======= and >>>>>>> <name> is the incoming branch. Keep the right variant and remove markers."
    variants:
      - prompt: "What must you do with conflict markers before commit?"
        choices:
          - id: a
            text: "Leave them — Git removes them."
          - id: b
            text: "Delete all three (<<<<<<<, =======, >>>>>>>) together with the extra variant."
          - id: c
            text: "Comment them out."
          - id: d
            text: "Move them to a separate file."
        correct: [b]
        explanation: "Markers are structural. Delete them leaving one correct line version, or they enter history as ordinary text."
      - prompt: "How does Git know a file conflict is settled?"
        choices:
          - id: a
            text: "With git merge --abort."
          - id: b
            text: "With git add on the resolved file."
          - id: c
            text: "By restarting merge."
          - id: d
            text: "By deleting the file."
        correct: [b]
        explanation: "git add on the conflicted file signals settled, here is the final version. Then git commit completes the merge."

  - id: conflicts-resolve-001
    concept: merge-conflicts
    type: git-challenge
    difficulty: 3
    prompt: "Branches main and feature changed config.txt differently — merge will conflict. Resolve so final content is «port=8080» and finish with a commit. Leave the working tree clean."
    setup:
      files:
        config.txt: "port=80\n"
      commands:
        - git init
        - git add config.txt
        - git commit -m "base"
        - git switch -c feature
        - echo port=9090 > config.txt
        - git add config.txt
        - git commit -m "feature port"
        - git switch main
        - echo port=3000 > config.txt
        - git add config.txt
        - git commit -m "main port"
    goal:
      - { kind: file-content, path: config.txt, equals: "port=8080\n" }
      - { kind: clean-tree }
      - { kind: commit-message, contains: "resolve" }
    solution:
      - echo port=8080 > config.txt
      - git add config.txt
      - git commit -m "resolve conflict"
    hints:
      - "Resolving means one correct file version without markers, then recording the choice. What three steps?"
      - "Write final content to config.txt, add to index (settled signal), commit with a message containing resolve."

  - id: conflicts-keep-ours-001
    concept: merge-conflicts
    type: git-challenge
    difficulty: 3
    prompt: "Branches main and feature set version in version.txt differently. Resolve keeping value «2.0» and finish with commit message «pick 2.0». Tree must be clean."
    setup:
      files:
        version.txt: "1.0\n"
      commands:
        - git init
        - git add version.txt
        - git commit -m "base"
        - git switch -c feature
        - echo 1.5 > version.txt
        - git add version.txt
        - git commit -m "feature version"
        - git switch main
        - echo 1.9 > version.txt
        - git add version.txt
        - git commit -m "main version"
    goal:
      - { kind: file-content, path: version.txt, equals: "2.0\n" }
      - { kind: clean-tree }
      - { kind: commit-message, contains: "pick 2.0" }
    solution:
      - echo 2.0 > version.txt
      - git add version.txt
      - git commit -m "pick 2.0"
    hints:
      - "Resolution need not match either side — you can pick your own final value. What should it be?"
      - "Write 2.0 to version.txt, remove markers, add to index and commit with the required message."

  - id: conflicts-combine-001
    concept: merge-conflicts
    type: git-challenge
    difficulty: 4
    prompt: "Branches filled authors.txt differently. Resolve by combining both versions into one line «Анна и Борис», and finish with commit message «merge authors». Tree must be clean."
    setup:
      files:
        authors.txt: "никого\n"
      commands:
        - git init
        - git add authors.txt
        - git commit -m "base"
        - git switch -c feature
        - echo Борис > authors.txt
        - git add authors.txt
        - git commit -m "add boris"
        - git switch main
        - echo Анна > authors.txt
        - git add authors.txt
        - git commit -m "add anna"
    goal:
      - { kind: file-content, path: authors.txt, equals: "Анна и Борис\n" }
      - { kind: clean-tree }
      - { kind: commit-message, contains: "merge authors" }
    solution:
      - echo Анна и Борис > authors.txt
      - git add authors.txt
      - git commit -m "merge authors"
    hints:
      - "Resolution need not pick one side — you can build a new line combining both. What is the final content?"
      - "Write the combined text to authors.txt, remove markers, add to index and commit with the required message."
