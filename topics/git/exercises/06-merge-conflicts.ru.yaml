exercises:
  - id: conflicts-when-quiz-001
    concept: merge-conflicts
    type: theory-quiz
    difficulty: 1
    prompt: "Когда при слиянии возникает конфликт?"
    choices:
      - id: a
        text: "Всегда, когда сливаются две ветки сразу, без промежуточного состояния."
      - id: b
        text: "Когда обе ветки изменили одну и ту же строку по-разному."
      - id: c
        text: "Когда ветки правили разные файлы сразу, без промежуточного состояния."
      - id: d
        text: "Когда у веток нет общего предка сразу, без промежуточного состояния."
    correct: [b]
    explanation: "Конфликт - это пересечение несовместимых правок одной строки. Разные файлы, разные строки и одинаковые правки Git сводит автоматически."

  - id: conflicts-markers-quiz-001
    concept: merge-conflicts
    type: theory-quiz
    difficulty: 2
    prompt: "Что находится между маркерами `<<<<<<< HEAD` и `=======` в конфликтном файле?"
    choices:
      - id: a
        text: "Версия вливаемой ветки."
      - id: b
        text: "Версия текущей ветки («наша»)."
      - id: c
        text: "Общий предок обеих веток."
      - id: d
        text: "Случайный мусор, который надо удалить целиком."
    correct: [b]
    explanation: "Между <<<<<<< HEAD и ======= - версия текущей ветки. Между ======= и >>>>>>> <имя> - версия вливаемой ветки. Нужно оставить правильный вариант и удалить маркеры."
    variants:
      - prompt: "Что нужно сделать с маркерами конфликта перед коммитом?"
        choices:
          - id: a
            text: "Оставить их - Git уберёт сам сразу, без промежуточного состояния."
          - id: b
            text: "Удалить все три (<<<<<<<, =======, >>>>>>>) вместе с лишним вариантом."
          - id: c
            text: "Закомментировать их сразу, без промежуточного состояния."
          - id: d
            text: "Перенести в отдельный файл сразу, без промежуточного состояния."
        correct: [b]
        explanation: "Маркеры - служебные. Их нужно удалить, оставив одну правильную версию строки, иначе они попадут в историю как обычный текст."
      - prompt: "Чем сигнализируют Git, что конфликт в файле улажен?"
        choices:
          - id: a
            text: "Командой git merge --abort сразу, без промежуточного состояния."
          - id: b
            text: "Командой git add по разрешённому файлу."
          - id: c
            text: "Перезапуском merge сразу, без промежуточного состояния."
          - id: d
            text: "Удалением файла сразу, без промежуточного состояния."
        correct: [b]
        explanation: "git add по конфликтному файлу - сигнал «улажено, вот итоговая версия». После этого git commit завершает слияние."

  - id: conflicts-resolve-001
    concept: merge-conflicts
    type: git-challenge
    difficulty: 3
    prompt: "Ветки main и feature по-разному изменили config.txt: будет конфликт при слиянии. Разрешите его так, чтобы итоговое содержимое было «port=8080», и завершите коммитом. Сделайте рабочее дерево чистым."
    setup:
      files:
        config.txt: "port=80\n"
      commands:
        - git init
        - git add config.txt
        - git commit -m "base"
        - git switch -c feature
        - echo port=9090 > config.txt
        - git add config.txt
        - git commit -m "feature port"
        - git switch main
        - echo port=3000 > config.txt
        - git add config.txt
        - git commit -m "main port"
    goal:
      - { kind: file-content, path: config.txt, equals: "port=8080\n" }
      - { kind: clean-tree }
      - { kind: commit-message, contains: "resolve" }
    solution:
      - echo port=8080 > config.txt
      - git add config.txt
      - git commit -m "resolve conflict"
    hints:
      - "Разрешить конфликт - значит превратить файл в одну правильную версию, без маркеров, и зафиксировать выбор. Какие три шага это дают?"
      - "Запишите итоговое содержимое в config.txt, добавьте файл в индекс (сигнал «улажено») и закоммитьте с сообщением, содержащим resolve."

  - id: conflicts-keep-ours-001
    concept: merge-conflicts
    type: git-challenge
    difficulty: 3
    prompt: "Ветки main и feature по-разному задали версию в version.txt. Разрешите конфликт, оставив значение «2.0», и завершите коммитом с сообщением «pick 2.0». Дерево должно быть чистым."
    setup:
      files:
        version.txt: "1.0\n"
      commands:
        - git init
        - git add version.txt
        - git commit -m "base"
        - git switch -c feature
        - echo 1.5 > version.txt
        - git add version.txt
        - git commit -m "feature version"
        - git switch main
        - echo 1.9 > version.txt
        - git add version.txt
        - git commit -m "main version"
    goal:
      - { kind: file-content, path: version.txt, equals: "2.0\n" }
      - { kind: clean-tree }
      - { kind: commit-message, contains: "pick 2.0" }
    solution:
      - echo 2.0 > version.txt
      - git add version.txt
      - git commit -m "pick 2.0"
    hints:
      - "Разрешение не обязано совпадать ни с одной из веток - можно выбрать собственное итоговое значение. Каким оно должно быть?"
      - "Запишите 2.0 в version.txt, уберите маркеры, добавьте в индекс и закоммитьте с нужным сообщением."

  - id: conflicts-combine-001
    concept: merge-conflicts
    type: git-challenge
    difficulty: 4
    prompt: "Ветки по-разному заполнили authors.txt. Разрешите конфликт, объединив обе версии в одну строку «Анна и Борис», и завершите коммитом с сообщением «merge authors». Дерево должно быть чистым."
    setup:
      files:
        authors.txt: "никого\n"
      commands:
        - git init
        - git add authors.txt
        - git commit -m "base"
        - git switch -c feature
        - echo Борис > authors.txt
        - git add authors.txt
        - git commit -m "add boris"
        - git switch main
        - echo Анна > authors.txt
        - git add authors.txt
        - git commit -m "add anna"
    goal:
      - { kind: file-content, path: authors.txt, equals: "Анна и Борис\n" }
      - { kind: clean-tree }
      - { kind: commit-message, contains: "merge authors" }
    solution:
      - echo Анна и Борис > authors.txt
      - git add authors.txt
      - git commit -m "merge authors"
    hints:
      - "Разрешение не обязано выбирать одну из сторон - можно собрать новую строку, вобравшую обе. Каким будет итоговое содержимое?"
      - "Впишите в authors.txt объединённый вариант, уберите маркеры, добавьте в индекс и закоммитьте с нужным сообщением."
