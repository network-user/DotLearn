exercises:
  - id: workflows-feature-branch-quiz-001
    concept: workflows
    type: theory-quiz
    difficulty: 1
    prompt: "What is the feature branches approach about?"
    choices:
      - id: a
        text: "Commit all changes directly to main, produced in full without further selection."
      - id: b
        text: "Do not commit to main directly: each task in its own branch, merge when ready."
      - id: c
        text: "Keep one branch per developer forever before any other checks run on this path."
      - id: d
        text: "Never merge branches, produced in full without further selection."
    correct: [b]
    explanation: "Feature branches follow a basic principle: main stays stable, each task in a separate branch merged back when ready. Other processes build on this."

  - id: workflows-pr-quiz-001
    concept: workflows
    type: theory-quiz
    difficulty: 2
    prompt: "What is a pull request?"
    choices:
      - id: a
        text: "A Git command to merge branches immediately, without an intermediate state and without extra checks."
      - id: b
        text: "A platform process (GitHub/GitLab): request to merge a branch into main with code review before merge."
      - id: c
        text: "A way to download someone else's repository before any other checks run on this path."
      - id: d
        text: "A type of commit immediately, without an intermediate state and without extra checks."
    correct: [b]
    explanation: "Pull request is a platform layer, not a Git command. You open a merge request, colleagues review, and the branch merges only after approval."

  - id: workflows-gitflow-trunk-quiz-001
    concept: workflows
    type: theory-quiz
    difficulty: 3
    prompt: "How does trunk-based differ from gitflow?"
    choices:
      - id: a
        text: "trunk-based keeps several long-lived branches; gitflow keeps one."
      - id: b
        text: "trunk-based keeps one main branch with frequent small merges."
      - id: c
        text: "They are the same."
      - id: d
        text: "gitflow does not use branches at all."
    correct: [b]
    explanation: "Trunk-based relies on one main branch and frequent small merges (continuous delivery). Gitflow keeps several long-lived branches, meant for rare versioned releases."
    variants:
      - prompt: "What release cadence suits gitflow best?"
        choices:
          - id: a
            text: "Continuous delivery many times per day, produced in full without further selection."
          - id: b
            text: "Rare numbered releases and supporting multiple versions."
          - id: c
            text: "Gitflow is not about releases before any other checks run on this path."
          - id: d
            text: "Projects without branches, produced in full without further selection."
        correct: [b]
        explanation: "release and hotfix branches in gitflow fit shipping version 2.3 while supporting 2.2. For frequent web deploys the structure is heavy."
      - prompt: "What does a team need to practice trunk-based safely?"
        choices:
          - id: a
            text: "Branches as long as possible, produced in full without further selection."
          - id: b
            text: "Strong automated tests and feature flags to merge unfinished work hidden from users."
          - id: c
            text: "No review at all immediately, without an intermediate state and without extra checks."
          - id: d
            text: "At least five long-lived branches, produced in full without further selection."
        correct: [b]
        explanation: "Frequent merges into one branch need tests (catch regressions) and feature flags (hide incomplete work from users)."

  - id: workflows-no-silver-bullet-quiz-001
    concept: workflows
    type: theory-quiz
    difficulty: 4
    prompt: "Which statement about choosing a workflow is correct?"
    choices:
      - id: a
        text: "One universally correct workflow exists for all teams before any other checks run on this path."
      - id: b
        text: "Choice is a tradeoff of structure and speed for release cadence and team size."
      - id: c
        text: "Gitflow is obsolete and must not be used before any other checks run on this path."
      - id: d
        text: "Trunk-based is always better than gitflow before any other checks run on this path."
    correct: [b]
    explanation: "There is no single correct process. Gitflow fits versioned releases; trunk-based fits continuous delivery. A good process is one the team actually follows."

  - id: workflows-feature-cycle-001
    concept: workflows
    type: git-challenge
    difficulty: 3
    prompt: "Run the basic feature-branch cycle: create branch feature/login, add file login.py on it («форма входа», commit «add login»), return to main and merge feature/login. Result: on main, login.py tracked, two commits."
    setup:
      files:
        README.md: "# Проект\n"
      commands:
        - git init
        - git add README.md
        - git commit -m "init"
    goal:
      - { kind: head-on-branch, name: main }
      - { kind: file-tracked, path: login.py }
      - { kind: merged, branch: feature/login }
      - { kind: commit-count, equals: 2 }
    solution:
      - git switch -c feature/login
      - echo форма входа > login.py
      - git add login.py
      - git commit -m "add login"
      - git switch main
      - git merge feature/login
    hints:
      - "Feature branch cycle: branch off, work in the branch, return to main and merge. Order of switch, commit, merge?"
      - "Create feature/login, commit login.py there, switch to main and merge: main did not move, so merge fast-forwards."
