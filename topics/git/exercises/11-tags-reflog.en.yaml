exercises:
  - id: tag-meaning-quiz-001
    concept: tags-reflog
    type: theory-quiz
    difficulty: 1
    prompt: "How does a tag differ from a branch?"
    choices:
      - id: a
        text: "A tag moves forward with each new commit like a branch."
      - id: b
        text: "A tag is an immovable mark on a specific commit; new commits do not move it."
      - id: c
        text: "A tag cannot be deleted."
      - id: d
        text: "A tag exists only on the server."
    correct: [b]
    explanation: "A branch moves with each commit; a tag is pinned to a specific commit forever. Tags mark release versions, fixed states."

  - id: reflog-quiz-001
    concept: tags-reflog
    type: theory-quiz
    difficulty: 2
    prompt: "What is `git reflog` for?"
    choices:
      - id: a
        text: "To send tags to the server."
      - id: b
        text: "To see a journal of HEAD moves and return to a commit lost after reset."
      - id: c
        text: "To create a new branch."
      - id: d
        text: "To list remote branches."
    correct: [b]
    explanation: "reflog is a local journal of HEAD positions. After reset --hard the undone commit is unreachable for git log, but reflog remembers where HEAD was."
    variants:
      - prompt: "What happens to a tag on ordinary `git push`?"
        choices:
          - id: a
            text: "The tag goes to remote automatically."
          - id: b
            text: "The tag is not sent: ordinary push does not include tags; send them explicitly."
          - id: c
            text: "Push fails because of the tag."
          - id: d
            text: "The tag becomes a branch."
        correct: [b]
        explanation: "Ordinary git push does not send tags. Use git push origin <tag> or git push --tags."
      - prompt: "What does an annotated tag (git tag -a) store that a lightweight tag does not?"
        choices:
          - id: a
            text: "Only the name."
          - id: b
            text: "Author, date, and message: a full object with metadata."
          - id: c
            text: "A copy of all files."
          - id: d
            text: "A list of branches."
        correct: [b]
        explanation: "Annotated tags store author, date, and message, preferred for public releases. Lightweight tags are just names on commits."

  - id: tag-create-001
    concept: tags-reflog
    type: git-challenge
    difficulty: 1
    prompt: "Create lightweight tag v1.0.0 on the current commit."
    setup:
      files:
        a.txt: "1\n"
      commands:
        - git init
        - git add a.txt
        - git commit -m "release"
    goal:
      - { kind: tag-exists, name: v1.0.0 }
      - { kind: head-at, ref: v1.0.0 }
    solution:
      - git tag v1.0.0
    hints:
      - "Pin a named mark to the current commit. Which command creates a tag?"
      - "One tag command with the version name: by default the tag sits on HEAD."
    variants:
      - prompt: "Create lightweight tag v2.0.0 on the current commit."
        setup:
          files:
            a.txt: "1\n"
          commands:
            - git init
            - git add a.txt
            - git commit -m "release"
        goal:
          - { kind: tag-exists, name: v2.0.0 }
          - { kind: head-at, ref: v2.0.0 }
        solution:
          - git tag v2.0.0
      - prompt: "Create lightweight tag release-2024 on the current commit."
        setup:
          files:
            a.txt: "1\n"
          commands:
            - git init
            - git add a.txt
            - git commit -m "release"
        goal:
          - { kind: tag-exists, name: release-2024 }
          - { kind: head-at, ref: release-2024 }
        solution:
          - git tag release-2024

  - id: tag-backup-before-reset-001
    concept: tags-reflog
    type: git-challenge
    difficulty: 3
    prompt: "The repository has two commits; the second is «важная работа». Tag backup on the current commit as insurance, then roll the branch back to the first commit with reset --hard. The tag must preserve «важная работа»."
    setup:
      files:
        a.txt: "1\n"
      commands:
        - git init
        - git add a.txt
        - git commit -m "v1"
        - echo 2 > a.txt
        - git add a.txt
        - git commit -m "важная работа"
    goal:
      - { kind: tag-exists, name: backup }
      - { kind: commit-count, equals: 1 }
      - { kind: commit-count, ref: backup, equals: 2 }
      - { kind: commit-message, ref: backup, contains: "важная работа" }
    solution:
      - git tag backup
      - git reset --hard HEAD~1
    hints:
      - "First mark the current commit with a name so it survives rollback, then move the branch back."
      - "Tag backup on HEAD, then reset --hard to the previous commit: the tag still points at «важная работа»."

  - id: tag-recover-after-reset-001
    concept: tags-reflog
    type: git-challenge
    difficulty: 4
    prompt: "The branch was already rolled back with reset --hard to the first commit, but tag backup still points at lost commit «важная работа». Restore the branch: return HEAD to commit backup with working tree. Result: two commits, a.txt contains «2»."
    setup:
      files:
        a.txt: "1\n"
      commands:
        - git init
        - git add a.txt
        - git commit -m "v1"
        - echo 2 > a.txt
        - git add a.txt
        - git commit -m "важная работа"
        - git tag backup
        - git reset --hard HEAD~1
    goal:
      - { kind: commit-count, equals: 2 }
      - { kind: file-content, path: a.txt, equals: "2\n" }
      - { kind: commit-message, contains: "важная работа" }
    solution:
      - git reset --hard backup
    hints:
      - "You have a name pointing at the lost commit. Which command moves the branch and working tree to it?"
      - "reset --hard accepts not only HEAD~1 but any mark, so use backup as the target."
