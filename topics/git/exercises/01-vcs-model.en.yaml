exercises:
  - id: vcs-snapshot-quiz-001
    concept: vcs-model
    type: theory-quiz
    difficulty: 1
    prompt: "How does Git store each commit?"
    choices:
      - id: a
        text: "As a list of line-by-line patches relative to the previous version."
      - id: b
        text: "As a snapshot of the entire file tree at the moment you save."
      - id: c
        text: "As a full copy of all files with no reuse."
      - id: d
        text: "As a commit message without file contents."
    correct: [b]
    explanation: "A commit is a snapshot of the entire tree. Unchanged files are reused by reference, so snapshots are not full copies; still, you should reason about them as photographs of states."

  - id: vcs-three-areas-quiz-001
    concept: vcs-model
    type: theory-quiz
    difficulty: 1
    prompt: "What does the `git add` command do?"
    choices:
      - id: a
        text: "Creates a new commit in the repository."
      - id: b
        text: "Moves a snapshot of changes from the working tree into the index."
      - id: c
        text: "Downloads changes from a remote repository."
      - id: d
        text: "Deletes a file from the working tree."
    correct: [b]
    explanation: "git add moves file contents at the moment you run it into the index (staging area). The index decides what will enter the next commit."
    variants:
      - prompt: "What does the `git commit` command do?"
        choices:
          - id: a
            text: "Moves files from the working tree into the index."
          - id: b
            text: "Turns the current index contents into a new permanent snapshot."
          - id: c
            text: "Sends commits to a remote server."
          - id: d
            text: "Creates a new branch."
        correct: [b]
        explanation: "git commit seals the index contents into a new snapshot in the repository."
      - prompt: "Where does the draft live — files you are editing right now in the editor?"
        choices:
          - id: a
            text: "In the index."
          - id: b
            text: "In the working tree on disk."
          - id: c
            text: "In the `.git` repository."
          - id: d
            text: "On a remote server."
        correct: [b]
        explanation: "The working tree is ordinary files on disk. They enter the index only after git add, and history only after git commit."

  - id: vcs-init-commit-001
    concept: vcs-model
    type: git-challenge
    difficulty: 1
    prompt: "Initialize a repository and make the first commit of notes.txt with message «init»."
    setup:
      files:
        notes.txt: "идея проекта\n"
    goal:
      - { kind: commit-count, equals: 1 }
      - { kind: file-tracked, path: notes.txt }
      - { kind: commit-message, contains: "init" }
      - { kind: clean-tree }
    solution:
      - git init
      - git add notes.txt
      - git commit -m "init"
    hints:
      - "The file must pass through three areas: working tree, index, repository. Which commands move it between them?"
      - "First create the repository, then move the file into the index, then seal the snapshot with a message."
    variants:
      - prompt: "Initialize a repository and make the first commit of plan.md with message «start»."
        setup:
          files:
            plan.md: "# План\n"
        goal:
          - { kind: commit-count, equals: 1 }
          - { kind: file-tracked, path: plan.md }
          - { kind: commit-message, contains: "start" }
          - { kind: clean-tree }
        solution:
          - git init
          - git add plan.md
          - git commit -m "start"
      - prompt: "Initialize a repository and make the first commit of readme.txt with message «hello»."
        setup:
          files:
            readme.txt: "о проекте\n"
        goal:
          - { kind: commit-count, equals: 1 }
          - { kind: file-tracked, path: readme.txt }
          - { kind: commit-message, contains: "hello" }
          - { kind: clean-tree }
        solution:
          - git init
          - git add readme.txt
          - git commit -m "hello"

  - id: vcs-stage-two-001
    concept: vcs-model
    type: git-challenge
    difficulty: 3
    prompt: "Two files are in the working tree. Make one commit that includes both, with message «add sources»."
    setup:
      files:
        main.py: "print('hi')\n"
        utils.py: "def helper(): pass\n"
      commands:
        - git init
    goal:
      - { kind: commit-count, equals: 1 }
      - { kind: file-tracked, path: main.py }
      - { kind: file-tracked, path: utils.py }
      - { kind: commit-message, contains: "add sources" }
      - { kind: clean-tree }
    solution:
      - git add .
      - git commit -m "add sources"
    hints:
      - "A commit includes exactly what is in the index. How do you add the entire working tree at once?"
      - "You can list files one by one or add everything with a dot. Then one git commit."

  - id: vcs-restage-001
    concept: vcs-model
    type: git-challenge
    difficulty: 3
    prompt: "config.txt is already in the index but was then changed in the working tree. Make sure the commit includes the new version with value «debug=true». Message — «config»."
    setup:
      files:
        config.txt: "debug=false\n"
      commands:
        - git init
        - git add config.txt
        - echo debug=true > config.txt
    goal:
      - { kind: commit-count, equals: 1 }
      - { kind: file-content, path: config.txt, where: head, equals: "debug=true\n" }
      - { kind: clean-tree }
    solution:
      - git add config.txt
      - git commit -m "config"
    hints:
      - "The index holds a snapshot from the previous git add. After editing, the working tree and index diverged — what brings them back in sync?"
      - "Run git add again so the fresh version enters the index, then commit."
