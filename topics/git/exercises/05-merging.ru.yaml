exercises:
  - id: merging-ff-quiz-001
    concept: merging
    type: theory-quiz
    difficulty: 1
    prompt: "Когда происходит fast-forward слияние?"
    choices:
      - id: a
        text: "Когда целевая ветка не двигалась с момента ответвления"
      - id: b
        text: "Когда обе ветки получили новые коммиты после расхождения."
      - id: c
        text: "Всегда, при любом git merge."
      - id: d
        text: "Только при наличии конфликта."
    correct: [a]
    explanation: "Fast-forward возможен, когда целевая ветка не получала коммитов после ответвления. Тогда слияние - это просто перенос её указателя вперёд, без нового коммита."

  - id: merging-3way-quiz-001
    concept: merging
    type: theory-quiz
    difficulty: 2
    prompt: "Чем отличается merge-коммит от обычного?"
    choices:
      - id: a
        text: "У него нет сообщения сразу, без промежуточного состояния."
      - id: b
        text: "У него два родителя - вершины обеих сливаемых линий."
      - id: c
        text: "Он не хранит снимок дерева сразу, без промежуточного состояния."
      - id: d
        text: "Он создаётся только при fast-forward сразу, без промежуточного состояния."
    correct: [b]
    explanation: "Merge-коммит - единственный коммит с двумя родителями. Он появляется при трёхстороннем слиянии, когда ветки разошлись, и отмечает точку их встречи."
    variants:
      - prompt: "Стоя на main, Вы выполнили `git merge feature`. Что произойдёт?"
        choices:
          - id: a
            text: "main вольётся в feature сразу, без промежуточного состояния."
          - id: b
            text: "Работа feature вольётся в текущую ветку main."
          - id: c
            text: "Обе ветки удалятся сразу, без промежуточного состояния."
          - id: d
            text: "feature переименуется в main сразу, без промежуточного состояния."
        correct: [b]
        explanation: "git merge вливает указанную ветку в текущую. Стоя на main, Вы вливаете feature в main."
      - prompt: "Две ветки правили разные файлы и не пересекались. Что будет при слиянии?"
        choices:
          - id: a
            text: "Обязательно возникнет конфликт сразу, без промежуточного состояния."
          - id: b
            text: "Git сольёт их автоматически, без конфликта."
          - id: c
            text: "Слияние будет отклонено сразу, без промежуточного состояния."
          - id: d
            text: "Один из файлов потеряется сразу, без промежуточного состояния."
        correct: [b]
        explanation: "Конфликт возникает только при несовместимых правках одних и тех же строк. Непересекающиеся правки Git сводит сам."

  - id: merging-ff-001
    concept: merging
    type: git-challenge
    difficulty: 1
    prompt: "Влейте ветку feature в main. Сейчас Вы на main, а feature опережает его на один коммит (fast-forward)."
    setup:
      files:
        a.txt: "1\n"
      commands:
        - git init
        - git add a.txt
        - git commit -m "base"
        - git switch -c feature
        - echo two > b.txt
        - git add b.txt
        - git commit -m "feature"
        - git switch main
    goal:
      - { kind: merged, branch: feature }
      - { kind: file-tracked, path: b.txt }
      - { kind: head-on-branch, name: main }
      - { kind: commit-count, equals: 2 }
    solution:
      - git merge feature
    hints:
      - "Вы уже на целевой ветке. Какую команду применить, чтобы влить в неё работу feature?"
      - "Одна команда merge с именем сливаемой ветки. main не двигался, поэтому будет перемотка."
    variants:
      - prompt: "Влейте ветку topic в main. Сейчас Вы на main, а topic опережает его на один коммит."
        setup:
          files:
            a.txt: "1\n"
          commands:
            - git init
            - git add a.txt
            - git commit -m "base"
            - git switch -c topic
            - echo c > c.txt
            - git add c.txt
            - git commit -m "topic work"
            - git switch main
        goal:
          - { kind: merged, branch: topic }
          - { kind: file-tracked, path: c.txt }
          - { kind: commit-count, equals: 2 }
        solution:
          - git merge topic
      - prompt: "Влейте ветку dev в main. Сейчас Вы на main, а dev опережает его на один коммит."
        setup:
          files:
            a.txt: "1\n"
          commands:
            - git init
            - git add a.txt
            - git commit -m "base"
            - git switch -c dev
            - echo d > d.txt
            - git add d.txt
            - git commit -m "dev work"
            - git switch main
        goal:
          - { kind: merged, branch: dev }
          - { kind: file-tracked, path: d.txt }
          - { kind: commit-count, equals: 2 }
        solution:
          - git merge dev

  - id: merging-3way-001
    concept: merging
    type: git-challenge
    difficulty: 3
    prompt: "Ветки feature и main разошлись и правили разные файлы. Стоя на main, выполните трёхстороннее слияние так, чтобы оба файла оказались в истории и появился merge-коммит."
    setup:
      files:
        base.txt: "base\n"
      commands:
        - git init
        - git add base.txt
        - git commit -m "base"
        - git switch -c feature
        - echo feat > feat.txt
        - git add feat.txt
        - git commit -m "feat"
        - git switch main
        - echo main > main.txt
        - git add main.txt
        - git commit -m "main"
    goal:
      - { kind: merged, branch: feature }
      - { kind: file-tracked, path: feat.txt }
      - { kind: file-tracked, path: main.txt }
      - { kind: commit-message, contains: "Merge branch" }
    solution:
      - git merge feature
    hints:
      - "Ветки разошлись, поэтому перемотка невозможна - Git создаст merge-коммит. Какую команду Вы вызываете на main?"
      - "git merge feature: правки в разных файлах не конфликтуют, Git сведёт их сам и запечатает merge-коммит."

  - id: merging-no-ff-001
    concept: merging
    type: git-challenge
    difficulty: 4
    prompt: "feature опережает main на один коммит, перемотка возможна. Влейте feature в main так, чтобы в истории появился явный merge-коммит (всего три коммита), а не fast-forward."
    setup:
      files:
        a.txt: "1\n"
      commands:
        - git init
        - git add a.txt
        - git commit -m "base"
        - git switch -c feature
        - echo two > b.txt
        - git add b.txt
        - git commit -m "feature"
        - git switch main
    goal:
      - { kind: merged, branch: feature }
      - { kind: commit-count, equals: 3 }
      - { kind: head-on-branch, name: main }
      - { kind: commit-message, contains: "Merge branch" }
    solution:
      - git merge --no-ff feature
    hints:
      - "По умолчанию здесь была бы перемотка без нового коммита. Какой флаг заставляет Git создать merge-коммит принудительно?"
      - "Добавьте к merge флаг, отключающий fast-forward, - тогда появится третий, merge-коммит."
