exercises:
  - id: first-commit-add-meaning-quiz-001
    concept: first-commit
    type: theory-quiz
    difficulty: 1
    prompt: "Что попадёт в коммит после `git commit`?"
    choices:
      - id: a
        text: "Все файлы рабочего дерева, независимо от индекса сразу, без промежуточного состояния."
      - id: b
        text: "Только то, что выставлено на сцену (в индексе) на момент коммита."
      - id: c
        text: "Последний изменённый файл сразу, без промежуточного состояния."
      - id: d
        text: "Ничего, пока не указать имя файла прямо в git commit сразу, без промежуточного состояния."
    correct: [b]
    explanation: "Коммит запечатывает содержимое индекса. На сцену попадает то, что Вы добавили через git add; остальные правки остаются в рабочем дереве."

  - id: first-commit-restore-quiz-001
    concept: first-commit
    type: theory-quiz
    difficulty: 2
    prompt: "Файл уже добавлен в индекс. Вы хотите убрать его со сцены, но сохранить правки в рабочем дереве. Какая команда подходит?"
    choices:
      - id: a
        text: "git rm file сразу, без промежуточного состояния."
      - id: b
        text: "git restore --staged file"
      - id: c
        text: "git commit file сразу, без промежуточного состояния."
      - id: d
        text: "git add file сразу, без промежуточного состояния."
    correct: [b]
    explanation: "git restore --staged снимает файл со сцены, не трогая рабочее дерево. git rm, наоборот, удалил бы файл и из индекса, и с диска."
    variants:
      - prompt: "Какая группа в `git status` означает «новый файл, про который Git ещё ничего не знает»?"
        choices:
          - id: a
            text: "Changes to be committed"
          - id: b
            text: "Changes not staged for commit"
          - id: c
            text: "Untracked files"
          - id: d
            text: "Working tree clean"
        correct: [c]
        explanation: "Untracked files - новые файлы, которые Git не отслеживает, пока их не добавить через git add."
      - prompt: "Что покажет `git status` сразу после успешного `git commit`, если больше ничего не менялось?"
        choices:
          - id: a
            text: "nothing to commit, working tree clean"
          - id: b
            text: "Changes to be committed"
          - id: c
            text: "fatal: not a git repository сразу, без промежуточного состояния."
          - id: d
            text: "Untracked files"
        correct: [a]
        explanation: "После коммита всё проиндексированное ушло в историю, рабочее дерево совпадает с последним снимком - дерево чистое."

  - id: first-commit-basic-001
    concept: first-commit
    type: git-challenge
    difficulty: 1
    prompt: "Выставьте файл task.txt на сцену и закоммитьте его с сообщением «add task»."
    setup:
      files:
        task.txt: "купить хлеб\n"
      commands:
        - git init
    goal:
      - { kind: commit-count, equals: 1 }
      - { kind: file-tracked, path: task.txt }
      - { kind: commit-message, contains: "add task" }
      - { kind: clean-tree }
    solution:
      - git add task.txt
      - git commit -m "add task"
    hints:
      - "Файл нужно сначала выложить на сцену (в индекс), а потом запечатать снимок."
      - "Два шага: команда стадирования по имени файла, затем коммит с сообщением через -m."
    variants:
      - prompt: "Выставьте файл report.md на сцену и закоммитьте его с сообщением «add report»."
        setup:
          files:
            report.md: "# Отчёт\n"
          commands:
            - git init
        goal:
          - { kind: commit-count, equals: 1 }
          - { kind: file-tracked, path: report.md }
          - { kind: commit-message, contains: "add report" }
          - { kind: clean-tree }
        solution:
          - git add report.md
          - git commit -m "add report"
      - prompt: "Выставьте файл data.csv на сцену и закоммитьте его с сообщением «add data»."
        setup:
          files:
            data.csv: "id,name\n1,Анна\n"
          commands:
            - git init
        goal:
          - { kind: commit-count, equals: 1 }
          - { kind: file-tracked, path: data.csv }
          - { kind: commit-message, contains: "add data" }
          - { kind: clean-tree }
        solution:
          - git add data.csv
          - git commit -m "add data"

  - id: first-commit-partial-001
    concept: first-commit
    type: git-challenge
    difficulty: 3
    prompt: "В рабочем дереве два новых файла: parser.py и README.md. Закоммитьте только parser.py с сообщением «parser», оставив README.md неотслеживаемым."
    setup:
      files:
        parser.py: "def parse(): pass\n"
        README.md: "# Проект\n"
      commands:
        - git init
    goal:
      - { kind: commit-count, equals: 1 }
      - { kind: file-tracked, path: parser.py }
      - { kind: file-absent, path: README.md, where: head }
    solution:
      - git add parser.py
      - git commit -m "parser"
    hints:
      - "В коммит войдёт ровно то, что стоит на сцене. Что нужно выложить на сцену, а что - нет?"
      - "Добавьте в индекс только parser.py (по имени, не точкой) и закоммитьте. README.md останется untracked."

  - id: first-commit-unstage-001
    concept: first-commit
    type: git-challenge
    difficulty: 3
    prompt: "Файл secret.key по ошибке добавлен в индекс. Снимите его со сцены (сохранив на диске), затем закоммитьте только app.py с сообщением «app». Файл secret.key не должен попасть в историю."
    setup:
      files:
        app.py: "print('app')\n"
        secret.key: "AKIA-PRIVATE\n"
      commands:
        - git init
        - git add app.py
        - git add secret.key
    goal:
      - { kind: commit-count, equals: 1 }
      - { kind: file-tracked, path: app.py }
      - { kind: file-absent, path: secret.key, where: head }
      - { kind: file-content, path: secret.key, where: worktree, equals: "AKIA-PRIVATE\n" }
    solution:
      - git restore --staged secret.key
      - git commit -m "app"
    hints:
      - "Нужно убрать файл со сцены, но не уничтожить его. Какая команда отменяет стадирование, не трогая рабочее дерево?"
      - "Снимите secret.key со сцены через restore --staged, затем закоммитьте - на сцене останется только app.py."
