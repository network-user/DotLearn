exercises:
  - id: stash-meaning-quiz-001
    concept: stash-cherry-pick
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает `git stash`?"
    choices:
      - id: a
        text: "Создаёт новый коммит из текущих правок сразу, без промежуточного состояния."
      - id: b
        text: "Прячет незакоммиченные правки и возвращает рабочее дерево к состоянию последнего коммита."
      - id: c
        text: "Отправляет изменения на сервер сразу, без промежуточного состояния."
      - id: d
        text: "Удаляет ветку сразу, без промежуточного состояния и без дополнительных проверок."
    correct: [b]
    explanation: "git stash убирает незакоммиченные изменения (из дерева и со сцены) в отдельное хранилище и очищает рабочее дерево. Достать обратно - git stash pop."

  - id: cherry-pick-quiz-001
    concept: stash-cherry-pick
    type: theory-quiz
    difficulty: 2
    prompt: "Что делает `git cherry-pick <коммит>`?"
    choices:
      - id: a
        text: "Сливает всю ветку, содержащую коммит сразу, без промежуточного состояния."
      - id: b
        text: "Применяет изменения одного указанного коммита как новый коммит на текущей ветке."
      - id: c
        text: "Удаляет указанный коммит из истории сразу, без промежуточного состояния."
      - id: d
        text: "Переименовывает коммит сразу, без промежуточного состояния."
    correct: [b]
    explanation: "cherry-pick переносит изменения одного коммита на текущую ветку новым коммитом со своим идентификатором, не трогая остальные коммиты исходной ветки."
    variants:
      - prompt: "Что делает `git stash pop`?"
        choices:
          - id: a
            text: "Удаляет все спрятанные записи без восстановления сразу, без промежуточного состояния."
          - id: b
            text: "Достаёт последнюю спрятанную запись обратно в рабочее дерево и удаляет её из хранилища."
          - id: c
            text: "Создаёт новую ветку из stash сразу, без промежуточного состояния."
          - id: d
            text: "Отправляет stash на сервер сразу, без промежуточного состояния."
        correct: [b]
        explanation: "git stash pop извлекает последнюю спрятанную запись, накладывает её на текущее дерево и удаляет из хранилища."
      - prompt: "Когда уместнее merge/rebase, а не cherry-pick?"
        choices:
          - id: a
            text: "Когда нужно перенести один коммит сразу, без промежуточного состояния."
          - id: b
            text: "Когда нужно перенести целую ветку из многих коммитов."
          - id: c
            text: "cherry-pick всегда лучше merge сразу, без промежуточного состояния."
          - id: d
            text: "Когда коммитов нет вовсе сразу, без промежуточного состояния."
        correct: [b]
        explanation: "cherry-pick хорош для одного-двух коммитов. Тащить им целую ветку утомительно и создаёт дубликаты - для ветки используют merge или rebase."

  - id: cherry-pick-basic-001
    concept: stash-cherry-pick
    type: git-challenge
    difficulty: 3
    prompt: "На ветке feature есть багфикс с файлом fix.txt. Стоя на main, перенесите только этот коммит на main через cherry-pick. Итог: Вы на main, fix.txt отслеживается, на main два коммита."
    setup:
      files:
        base.txt: "base\n"
      commands:
        - git init
        - git add base.txt
        - git commit -m "base"
        - git switch -c feature
        - echo hot > fix.txt
        - git add fix.txt
        - git commit -m "hotfix"
        - git switch main
    goal:
      - { kind: file-tracked, path: fix.txt }
      - { kind: head-on-branch, name: main }
      - { kind: commit-count, equals: 2 }
      - { kind: commit-message, contains: "hotfix" }
    solution:
      - git cherry-pick feature
    hints:
      - "Нужно перенести изменения одного коммита (вершины feature) на текущую ветку, не сливая всю feature. Какая команда переносит отдельный коммит?"
      - "Одна команда cherry-pick с указанием коммита (можно по имени ветки feature - это её вершина)."

  - id: stash-cycle-001
    concept: stash-cherry-pick
    type: git-challenge
    difficulty: 3
    prompt: "Файл a.txt изменён, но не закоммичен (теперь «черновик»). Спрячьте правку в stash, затем сразу достаньте её обратно так, чтобы a.txt снова содержал «черновик»."
    setup:
      files:
        a.txt: "сохранено\n"
      commands:
        - git init
        - git add a.txt
        - git commit -m "first"
        - echo черновик > a.txt
    goal:
      - { kind: file-content, path: a.txt, equals: "черновик\n" }
    solution:
      - git stash
      - git stash pop
    hints:
      - "Сначала уберите правку в карман (дерево станет чистым), потом верните её обратно. Какие две команды образуют этот цикл?"
      - "git stash прячет, git stash pop достаёт - примените их по порядку, и правка вернётся."

  - id: stash-then-hotfix-001
    concept: stash-cherry-pick
    type: git-challenge
    difficulty: 4
    prompt: "Файл draft.txt изменён, но не готов. Спрячьте правку, сделайте срочный коммит с файлом hot.txt («срочно», сообщение «hotfix»), затем верните спрятанную правку. Итог: два коммита, hot.txt отслеживается, draft.txt снова содержит «в работе»."
    setup:
      files:
        base.txt: "base\n"
      commands:
        - git init
        - git add base.txt
        - git commit -m "first"
        - echo в работе > draft.txt
    goal:
      - { kind: commit-count, equals: 2 }
      - { kind: file-tracked, path: hot.txt }
      - { kind: file-content, path: draft.txt, equals: "в работе\n" }
    solution:
      - git stash
      - echo срочно > hot.txt
      - git add hot.txt
      - git commit -m "hotfix"
      - git stash pop
    hints:
      - "Незаконченное надо убрать с дороги, сделать срочное на чистом дереве, потом вернуть отложенное. В каком порядке идут stash, коммит и pop?"
      - "Спрячьте правку, создайте и закоммитьте hot.txt, затем достаньте draft.txt обратно через stash pop."
