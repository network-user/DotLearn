exercises:
  - id: vcs-snapshot-quiz-001
    concept: vcs-model
    type: theory-quiz
    difficulty: 1
    prompt: "Как Git хранит каждый коммит?"
    choices:
      - id: a
        text: "Как список правок отдельных строк относительно предыдущей версии."
      - id: b
        text: "Как снимок всего дерева файлов на момент сохранения."
      - id: c
        text: "Как полную копию всех файлов без переиспользования."
      - id: d
        text: "Как сообщение коммита без содержимого файлов."
    correct: [b]
    explanation: "Коммит - это снимок всего дерева. Неизменённые файлы переиспользуются по ссылке, поэтому снимки не равны полным копиям, но рассуждать о них нужно как о фотографиях состояний."

  - id: vcs-three-areas-quiz-001
    concept: vcs-model
    type: theory-quiz
    difficulty: 1
    prompt: "Что делает команда `git add`?"
    choices:
      - id: a
        text: "Создаёт новый коммит в репозитории сразу, без промежуточного состояния."
      - id: b
        text: "Переносит снимок изменений из рабочего дерева в индекс."
      - id: c
        text: "Скачивает изменения с удалённого репозитория сразу, без промежуточного состояния."
      - id: d
        text: "Удаляет файл из рабочего дерева сразу, без промежуточного состояния."
    correct: [b]
    explanation: "git add переносит содержимое файла на момент вызова в индекс (staging area). Что войдёт в следующий коммит, решает именно индекс."
    variants:
      - prompt: "Что делает команда `git commit`?"
        choices:
          - id: a
            text: "Переносит файлы из рабочего дерева в индекс сразу, без промежуточного состояния."
          - id: b
            text: "Превращает текущее содержимое индекса в новый постоянный снимок."
          - id: c
            text: "Отправляет коммиты на удалённый сервер сразу, без промежуточного состояния."
          - id: d
            text: "Создаёт новую ветку сразу, без промежуточного состояния."
        correct: [b]
        explanation: "git commit запечатывает содержимое индекса в новый снимок в репозитории."
      - prompt: "Где живёт черновик - файлы, которые Вы прямо сейчас редактируете в редакторе?"
        choices:
          - id: a
            text: "В индексе сразу, без промежуточного состояния."
          - id: b
            text: "В рабочем дереве (working tree) на диске."
          - id: c
            text: "В репозитории `.git` сразу, без промежуточного состояния."
          - id: d
            text: "На удалённом сервере сразу, без промежуточного состояния."
        correct: [b]
        explanation: "Рабочее дерево - это обычные файлы на диске. В индекс они попадают только после git add, в историю - после git commit."

  - id: vcs-init-commit-001
    concept: vcs-model
    type: git-challenge
    difficulty: 1
    prompt: "Инициализируйте репозиторий и сделайте первый коммит файла notes.txt с сообщением «init»."
    setup:
      files:
        notes.txt: "идея проекта\n"
    goal:
      - { kind: commit-count, equals: 1 }
      - { kind: file-tracked, path: notes.txt }
      - { kind: commit-message, contains: "init" }
      - { kind: clean-tree }
    solution:
      - git init
      - git add notes.txt
      - git commit -m "init"
    hints:
      - "Файл должен пройти три области: рабочее дерево, индекс, репозиторий. Какие команды двигают его между ними?"
      - "Сначала создайте репозиторий, затем переместите файл в индекс, затем запечатайте снимок с сообщением."
    variants:
      - prompt: "Инициализируйте репозиторий и сделайте первый коммит файла plan.md с сообщением «start»."
        setup:
          files:
            plan.md: "# План\n"
        goal:
          - { kind: commit-count, equals: 1 }
          - { kind: file-tracked, path: plan.md }
          - { kind: commit-message, contains: "start" }
          - { kind: clean-tree }
        solution:
          - git init
          - git add plan.md
          - git commit -m "start"
      - prompt: "Инициализируйте репозиторий и сделайте первый коммит файла readme.txt с сообщением «hello»."
        setup:
          files:
            readme.txt: "о проекте\n"
        goal:
          - { kind: commit-count, equals: 1 }
          - { kind: file-tracked, path: readme.txt }
          - { kind: commit-message, contains: "hello" }
          - { kind: clean-tree }
        solution:
          - git init
          - git add readme.txt
          - git commit -m "hello"

  - id: vcs-stage-two-001
    concept: vcs-model
    type: git-challenge
    difficulty: 3
    prompt: "В рабочем дереве два файла. Сделайте один коммит, в который войдут оба, с сообщением «add sources»."
    setup:
      files:
        main.py: "print('hi')\n"
        utils.py: "def helper(): pass\n"
      commands:
        - git init
    goal:
      - { kind: commit-count, equals: 1 }
      - { kind: file-tracked, path: main.py }
      - { kind: file-tracked, path: utils.py }
      - { kind: commit-message, contains: "add sources" }
      - { kind: clean-tree }
    solution:
      - git add .
      - git commit -m "add sources"
    hints:
      - "В коммит войдёт ровно то, что лежит в индексе. Как добавить в индекс сразу всё рабочее дерево?"
      - "Можно перечислить файлы по одному или добавить всё разом точкой. Затем один git commit."

  - id: vcs-restage-001
    concept: vcs-model
    type: git-challenge
    difficulty: 3
    prompt: "Файл config.txt уже добавлен в индекс, но затем изменён в рабочем дереве. Сделайте так, чтобы в коммит вошла именно новая версия со значением «debug=true». Сообщение - «config»."
    setup:
      files:
        config.txt: "debug=false\n"
      commands:
        - git init
        - git add config.txt
        - echo debug=true > config.txt
    goal:
      - { kind: commit-count, equals: 1 }
      - { kind: file-content, path: config.txt, where: head, equals: "debug=true\n" }
      - { kind: clean-tree }
    solution:
      - git add config.txt
      - git commit -m "config"
    hints:
      - "Индекс хранит снимок файла на момент прошлого git add. После правки рабочее дерево и индекс разошлись - что вернёт их в согласие?"
      - "Повторите добавление файла в индекс, чтобы туда попала свежая версия, и только потом коммитьте."
