conceptId: branching
cards:
  - id: branching-01
    front: "What is a branch in Git physically?"
    back: "A moving pointer to one commit, not a copy of files. Creating a branch means writing one name — instant and almost weightless."
    tags: [model]
  - id: branching-02
    front: "What happens to the branch pointer on a new commit?"
    back: "It moves forward to the fresh commit. Git moves the branch HEAD looks at."
    tags: [model]
  - id: branching-03
    front: "What is HEAD?"
    back: "The where am I pointer. Usually it looks at a branch, and the branch looks at a commit. You commit — the branch under HEAD moves."
    tags: [head]
  - id: branching-04
    front: "How does git branch feature differ from git switch -c feature?"
    back: "git branch creates a pointer but leaves you on the current branch. git switch -c creates the branch and switches HEAD immediately."
    tags: [commands]
  - id: branching-05
    front: "How do you create a branch and switch to it at once?"
    back: "git switch -c <name> or git checkout -b <name>. Both create the branch and move HEAD in one command."
    tags: [commands]
  - id: branching-06
    front: "What does the working tree do when you switch branches?"
    back: "Git aligns it with the snapshot of the commit the branch points to. Files on disk change as if you returned to that moment in history."
    tags: [model]
  - id: branching-07
    front: "Why are commits on different branches isolated?"
    back: "Switching aligns the working tree with the branch commit snapshot. Commits on feature are not visible on main until you merge them."
    tags: [model]
  - id: branching-08
    front: "What is detached HEAD?"
    back: "When HEAD points directly at a commit, bypassing a branch (after git checkout <hash>). Commits here belong to no branch and are easily lost."
    tags: [head]
  - id: branching-09
    front: "Why are git switch and git restore better than old git checkout?"
    back: "checkout was overloaded: switched branches, restored files, detached HEAD. switch only moves between branches; restore only restores files. Less chance of wiping edits by accident."
    tags: [commands]
  - id: branching-10
    front: "You ran git branch feature and committed immediately. Where does the commit go?"
    back: "To the old branch (e.g. main), because git branch does not move HEAD. To commit on feature you needed git switch first."
    tags: [pitfalls]
