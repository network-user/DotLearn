conceptId: branching
cards:
  - id: branching-01
    front: "Что такое ветка в Git физически?"
    back: "Движущийся указатель на один коммит, а не копия файлов. Создать ветку значит записать одно имя - это мгновенно и почти ничего не весит."
    tags: [model]
  - id: branching-02
    front: "Что происходит с указателем ветки при новом коммите?"
    back: "Он сдвигается вперёд, на свежий коммит. Git двигает ту ветку, на которую смотрит HEAD."
    tags: [model]
  - id: branching-03
    front: "Что такое HEAD?"
    back: "Указатель «где я сейчас». Обычно он смотрит на ветку, а ветка - на коммит. Коммитите - двигается ветка под HEAD."
    tags: [head]
  - id: branching-04
    front: "Чем git branch feature отличается от git switch -c feature?"
    back: "git branch создаёт указатель, но оставляет Вас на текущей ветке. git switch -c создаёт ветку и сразу переключает на неё HEAD."
    tags: [commands]
  - id: branching-05
    front: "Как создать ветку и сразу на неё перейти?"
    back: "git switch -c <имя> или git checkout -b <имя>. Обе формы создают ветку и переводят HEAD одной командой."
    tags: [commands]
  - id: branching-06
    front: "Что делает рабочее дерево при переключении на ветку?"
    back: "Git наводит его на снимок того коммита, на который указывает ветка. Файлы на диске меняются так, будто Вы вернулись в тот момент истории."
    tags: [model]
  - id: branching-07
    front: "Почему коммиты на разных ветках изолированы?"
    back: "Переключение наводит рабочее дерево на снимок коммита ветки. Коммиты в feature не видны на main, пока их не сольют."
    tags: [model]
  - id: branching-08
    front: "Что такое detached HEAD?"
    back: "Состояние, когда HEAD указывает прямо на коммит, минуя ветку (после git checkout <хеш>). Коммиты здесь не принадлежат ни одной ветке и легко теряются."
    tags: [head]
  - id: branching-09
    front: "Чем git switch и git restore лучше старого git checkout?"
    back: "checkout перегружен: переключает ветки, восстанавливает файлы и детачит HEAD. switch отвечает только за переход между ветками, restore - только за восстановление файлов. Меньше шансов случайно затереть правки."
    tags: [commands]
  - id: branching-10
    front: "Вы сделали git branch feature и сразу закоммитили. Куда уйдёт коммит?"
    back: "В старую ветку (например main), потому что git branch не двигает HEAD. Чтобы коммит ушёл в feature, нужно было сначала перейти на неё через git switch."
    tags: [pitfalls]
