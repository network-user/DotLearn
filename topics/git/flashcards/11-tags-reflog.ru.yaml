conceptId: tags-reflog
cards:
  - id: tags-reflog-01
    front: "Чем тег отличается от ветки?"
    back: "Тег - неподвижная метка на конкретном коммите; новые коммиты его не двигают. Ветка двигается вперёд с каждым коммитом. Теги используют для версий релизов."
    tags: [tags]
  - id: tags-reflog-02
    front: "Как поставить лёгкий тег на текущий коммит?"
    back: "git tag <имя>, например git tag v1.0.0. По умолчанию тег садится на HEAD; можно указать другой коммит: git tag <имя> <ref>."
    tags: [tags]
  - id: tags-reflog-03
    front: "Чем аннотированный тег отличается от лёгкого?"
    back: "Аннотированный (git tag -a) хранит автора, дату и сообщение - полноценный объект. Лёгкий - просто имя-закладка на коммите. Для публичных релизов предпочтителен аннотированный."
    tags: [tags]
  - id: tags-reflog-04
    front: "Что такое git reflog?"
    back: "Локальный журнал перемещений HEAD: помнит каждую позицию - коммиты, переключения веток, reset, merge. Позволяет вернуться к «потерянному» после reset коммиту."
    tags: [reflog]
  - id: tags-reflog-05
    front: "Почему «потерянный» после reset --hard коммит обычно можно вернуть?"
    back: "Git не удаляет коммит сразу - просто на него больше не указывает ни одна ветка. reflog помнит, где был HEAD, и по этой записи на коммит можно вернуться."
    tags: [reflog]
  - id: tags-reflog-06
    front: "Как застраховаться перед опасной операцией (reset --hard, сложный rebase)?"
    back: "Поставить метку - тег или ветку - на текущий коммит заранее. Тогда останется имя, указывающее на нужное состояние, и вернуться можно одной командой."
    tags: [recovery]
  - id: tags-reflog-07
    front: "Как восстановить ветку, если на нужный коммит указывает тег backup?"
    back: "git reset --hard backup: перенесёт ветку и рабочее дерево на коммит, помеченный тегом. reset --hard принимает не только HEAD~n, но и любую метку."
    tags: [recovery]
  - id: tags-reflog-08
    front: "Уходят ли теги на remote при обычном git push?"
    back: "Нет. Обычный push не отправляет теги. Чтобы тег появился на сервере, нужен git push origin <тег> или git push --tags."
    tags: [pitfalls]
  - id: tags-reflog-09
    front: "Почему reflog видит то, чего не видит git log?"
    back: "git log идёт по родительским ссылкам и показывает только достижимые коммиты. reflog хранит историю перемещений HEAD и ловит даже коммиты, выпавшие из достижимой истории."
    tags: [reflog]
  - id: tags-reflog-10
    front: "Reflog - это вечный архив?"
    back: "Нет. Он локальный и временный: записи живут ограниченное время (по умолчанию недели) и отсутствуют на других машинах. Это страховка от свежей ошибки, а не долгий архив."
    tags: [pitfalls]
