conceptId: rebase
cards:
  - id: rebase-01
    front: "What does git rebase do?"
    back: "Replays branch commits onto a new base: takes each commit's changes after the common ancestor and applies them anew, creating new commits. History becomes linear."
    tags: [basics]
  - id: rebase-02
    front: "How do merge and rebase differ in history shape?"
    back: "merge keeps the fork in a merge commit with two parents. rebase straightens history into one line. Same final code, different history shape."
    tags: [vs-merge]
  - id: rebase-03
    front: "Why do commits have different identifiers after rebase?"
    back: "Rebase does not move commits — it replays their changes on a new base, creating new commits. Same contents, different parents and identifiers — technically different commits."
    tags: [basics]
  - id: rebase-04
    front: "How do you rebase branch feature onto main?"
    back: "git switch feature, then git rebase main. Git replays feature commits on top of main's tip."
    tags: [commands]
  - id: rebase-05
    front: "What is the golden rule of rebase?"
    back: "Do not rebase commits already shared on a common remote. Rebase replaces them with new ones and others' repos desync. For published history use merge."
    tags: [rule]
  - id: rebase-06
    front: "How do you resolve conflict during rebase?"
    back: "One commit at a time: edit → git add → git rebase --continue. Rebase stops at each problematic commit. Changed your mind — git rebase --abort restores prior state."
    tags: [conflicts]
  - id: rebase-07
    front: "Why does rebase make subsequent merge fast-forward?"
    back: "After rebase feature is a direct continuation of main — history is already linear. git merge feature simply fast-forwards the pointer, no merge commit."
    tags: [vs-merge]
  - id: rebase-08
    front: "Is rebase safer than merge?"
    back: "No, it is different. merge documents the fork honestly; rebase trades linearity for rewriting commits. Choice is team history style, not right vs wrong."
    tags: [vs-merge]
  - id: rebase-09
    front: "Why do some teams want linear history?"
    back: "It reads as a simple list, git bisect runs easier on it, review is simpler — each commit applies to predictable state. Cost — loss of information about parallel work."
    tags: [rationale]
  - id: rebase-10
    front: "What if you rebase shared branch main?"
    back: "Everyone using it gets desynced histories: their commits built on old ones, yours on new. Rebase is for local, not-yet-shared work."
    tags: [rule]
