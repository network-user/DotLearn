conceptId: stash-cherry-pick
cards:
  - id: stash-cherry-pick-01
    front: "Что делает git stash?"
    back: "Прячет незакоммиченные изменения (из рабочего дерева и со сцены) в отдельное хранилище и возвращает дерево к состоянию последнего коммита - чистым."
    tags: [stash]
  - id: stash-cherry-pick-02
    front: "Что делает git stash pop?"
    back: "Достаёт последнюю спрятанную запись обратно, накладывает её на текущее рабочее дерево и удаляет из хранилища. Черновик снова на месте."
    tags: [stash]
  - id: stash-cherry-pick-03
    front: "Зачем нужен stash на практике?"
    back: "Чтобы освободить рабочее дерево для срочной задачи, не коммитя полуфабрикат: спрятал правку, переключился, починил срочное, вернул отложенное."
    tags: [stash]
  - id: stash-cherry-pick-04
    front: "Что делает git cherry-pick <коммит>?"
    back: "Берёт изменения одного указанного коммита и применяет их как новый коммит на текущей ветке, не трогая остальные коммиты исходной ветки."
    tags: [cherry-pick]
  - id: stash-cherry-pick-05
    front: "Какой типичный случай для cherry-pick?"
    back: "Перенести один нужный коммит (например, готовый багфикс) из одной ветки в другую прямо сейчас, не дожидаясь слияния всей ветки."
    tags: [cherry-pick]
  - id: stash-cherry-pick-06
    front: "Получает ли cherry-pick тот же идентификатор, что исходный коммит?"
    back: "Нет. Это новый коммит с тем же содержимым, но другим родителем и идентификатором - как при rebase."
    tags: [cherry-pick]
  - id: stash-cherry-pick-07
    front: "Когда уместнее merge/rebase вместо cherry-pick?"
    back: "Когда нужно перенести целую ветку из многих коммитов. cherry-pick хорош для одного-двух; для ветки он утомителен и создаёт дубликаты."
    tags: [cherry-pick]
  - id: stash-cherry-pick-08
    front: "Может ли git stash pop конфликтовать?"
    back: "Да. Если спрятанные правки пересекаются с текущим состоянием дерева, pop столкнёт их и попросит разрешить конфликт - как при merge."
    tags: [pitfalls]
  - id: stash-cherry-pick-09
    front: "Stash - это надёжный бэкап?"
    back: "Нет, временный карман. pop может конфликтовать, а забытые записи в стопке легко перепутать. Доставайте отложенное вскоре после того, как спрятали."
    tags: [pitfalls]
  - id: stash-cherry-pick-10
    front: "Как cherry-pick связан с rebase?"
    back: "Rebase - это, по сути, серия cherry-pick подряд: «перенеси все мои коммиты поверх вершины». Cherry-pick - точечная версия для одного коммита. У них общая трёхсторонняя механика и одинаковые конфликты."
    tags: [model]
