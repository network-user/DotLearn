conceptId: workflows
cards:
  - id: workflows-01
    front: "Что такое рабочий процесс (workflow) в Git?"
    back: "Набор договорённостей команды о ветвлении, именовании веток и вливании в main - не отдельные команды, а правила их применения, превращающие хаос параллельной работы в предсказуемый поток."
    tags: [overview]
  - id: workflows-02
    front: "В чём суть подхода feature branches?"
    back: "Не коммитить в main напрямую: каждую задачу вести в отдельной ветке (feature/..., fix/...) и вливать обратно по готовности. main остаётся стабильной."
    tags: [feature-branches]
  - id: workflows-03
    front: "Что такое pull request?"
    back: "Процесс на платформе (GitHub/GitLab), а не команда Git: запрос влить ветку в main. Коллеги ревьюят изменения, и только после одобрения ветка вливается."
    tags: [pull-requests]
  - id: workflows-04
    front: "Зачем нужны pull requests?"
    back: "Они превращают merge в командное событие: код проходит чужой взгляд, обсуждение остаётся в истории, main защищена от прямых пушей. Ревью ловит ошибки до попадания в общую ветку."
    tags: [pull-requests]
  - id: workflows-05
    front: "Какие ветки держит gitflow?"
    back: "Несколько долгоживущих: main (релизы), develop (интеграция), плюс feature, release, hotfix. Строгая структура под редкие версионные релизы и поддержку нескольких версий."
    tags: [gitflow]
  - id: workflows-06
    front: "В чём идея trunk-based development?"
    back: "Одна главная ветка (trunk/main), куда все вливают мелкие изменения очень часто, за короткими ветками. Под непрерывную поставку; опирается на автотесты и feature flags."
    tags: [trunk-based]
  - id: workflows-07
    front: "Под какой темп релизов подходит gitflow, а под какой trunk-based?"
    back: "Gitflow - под редкие нумерованные релизы и несколько поддерживаемых версий. Trunk-based - под непрерывную поставку (релизы по нескольку раз в день)."
    tags: [comparison]
  - id: workflows-08
    front: "Что нужно команде для безопасного trunk-based?"
    back: "Сильная культура автотестов (ловить регрессии при частых вливаниях) и feature flags (вливать недоделанное, но скрывать его от пользователей)."
    tags: [trunk-based]
  - id: workflows-09
    front: "Существует ли единственно правильный workflow?"
    back: "Нет. Выбор - компромисс структуры и скорости под темп релизов и размер команды. Лучший процесс тот, которому команда последовательно следует, а не самый модный."
    tags: [comparison]
  - id: workflows-10
    front: "Почему workflow держится не на самом Git?"
    back: "Git не знает про develop, feature/x или pull request - для него все ветки одинаковы, а PR существует лишь на уровне GitHub/GitLab. Процесс держится на договорённостях, защите веток и CI вокруг Git."
    tags: [overview]
