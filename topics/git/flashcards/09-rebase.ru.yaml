conceptId: rebase
cards:
  - id: rebase-01
    front: "Что делает git rebase?"
    back: "Переигрывает коммиты ветки поверх нового основания: берёт изменения каждого коммита после общего предка и применяет их заново, создавая новые коммиты. Получается линейная история."
    tags: [basics]
  - id: rebase-02
    front: "Чем merge отличается от rebase по форме истории?"
    back: "merge сохраняет развилку в merge-коммите с двумя родителями. rebase выпрямляет историю в одну линию. Итоговый код тот же, форма истории разная."
    tags: [vs-merge]
  - id: rebase-03
    front: "Почему после rebase у коммитов другие идентификаторы?"
    back: "Rebase не двигает коммиты, а переигрывает их изменения на новом основании, создавая новые коммиты. Содержимое то же, но родители и идентификаторы другие - технически это другие коммиты."
    tags: [basics]
  - id: rebase-04
    front: "Как выполнить rebase ветки feature на main?"
    back: "git switch feature, затем git rebase main. Git проиграет коммиты feature поверх вершины main."
    tags: [commands]
  - id: rebase-05
    front: "Каково золотое правило rebase?"
    back: "Не перебазируйте коммиты, которыми уже поделились на общем remote. Rebase заменяет их новыми, и чужие репозитории рассинхронизируются. Для опубликованной истории - merge."
    tags: [rule]
  - id: rebase-06
    front: "Как разрешать конфликт во время rebase?"
    back: "По одному коммиту: правка → git add → git rebase --continue. Rebase останавливается на каждом проблемном коммите. Передумали - git rebase --abort вернёт всё как было."
    tags: [conflicts]
  - id: rebase-07
    front: "Почему rebase делает последующее слияние fast-forward?"
    back: "После rebase feature становится прямым продолжением main - история уже линейна. Поэтому git merge feature просто перематывает указатель, без merge-коммита."
    tags: [vs-merge]
  - id: rebase-08
    front: "Rebase «безопаснее» merge?"
    back: "Нет, он другой. merge честно документирует развилку; rebase даёт линейность ценой переписывания коммитов. Выбор - вопрос принятого стиля истории, а не «правильно/неправильно»."
    tags: [vs-merge]
  - id: rebase-09
    front: "Зачем командам линейная история?"
    back: "Она читается как простой список, по ней удобнее работать git bisect и проще ревьюить - каждый коммит применяется к предсказуемому состоянию. Цена - потеря информации о параллельности работы."
    tags: [rationale]
  - id: rebase-10
    front: "Что будет, если перебазировать общую ветку main?"
    back: "У всех, кто ей пользуется, «разъедутся» истории: их коммиты основаны на старых, Ваши - на новых. Rebase - инструмент для локальной, ещё не расшаренной работы."
    tags: [rule]
