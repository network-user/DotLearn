conceptId: inspecting-history
cards:
  - id: inspecting-history-01
    front: "What question does git status answer?"
    back: "What state files are in right now: what is on stage, what is modified but not on stage, what is untracked. A here-and-now snapshot, not history."
    tags: [status]
  - id: inspecting-history-02
    front: "What does git log show?"
    back: "A list of commits from newest to oldest: author, date, message. Walks from HEAD backward along parent links."
    tags: [log]
  - id: inspecting-history-03
    front: "What does the --oneline flag do on git log?"
    back: "Prints one line per commit: short hash and message. A fast overview of history shape."
    tags: [log]
  - id: inspecting-history-04
    front: "What does git diff with no arguments compare?"
    back: "The working tree with the index. Shows only unstaged edits: what is not yet on stage via git add."
    tags: [diff]
  - id: inspecting-history-05
    front: "What does git diff --staged compare?"
    back: "The index with the last commit. Shows exactly what will enter the next commit."
    tags: [diff]
  - id: inspecting-history-06
    front: "Changed a file, ran git add, but git diff is empty. Why?"
    back: "The edit moved to stage. git diff compares tree with index, and they now match. git diff --staged shows the staged edit."
    tags: [pitfalls]
  - id: inspecting-history-07
    front: "Does git log show the contents of changes?"
    back: "No, only commit messages. To see what changed use diff: git log -p, git show <commit>, or git diff."
    tags: [pitfalls]
  - id: inspecting-history-08
    front: "Where is HEAD when reading git log?"
    back: "HEAD is the first (topmost) commit in the output: the one you are on. Below come its parent and so on to the first commit with no parent."
    tags: [log]
  - id: inspecting-history-09
    front: "What does git log --graph show?"
    back: "An ASCII graph of branches and merges to the left of messages, useful to see where history diverged and merged."
    tags: [log]
  - id: inspecting-history-10
    front: "Which command shows one specific commit with its edits?"
    back: "git show <commit>: unfolds the commit with line-by-line changes, unlike git log which shows only messages."
    tags: [diff]
