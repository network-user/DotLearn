conceptId: remotes
cards:
  - id: remotes-01
    front: "Что такое удалённый репозиторий (remote)?"
    back: "Полноценная копия истории на другой машине (сервере), с которой Ваш локальный репозиторий обменивается коммитами. Git распределённый: у каждого участника полная история, remote - точка синхронизации."
    tags: [model]
  - id: remotes-02
    front: "Что такое origin?"
    back: "Имя по умолчанию для основного remote - привычное соглашение, не ключевое слово. При клонировании Git заводит remote origin, указывающий на источник."
    tags: [model]
  - id: remotes-03
    front: "Как добавить удалённый репозиторий?"
    back: "git remote add <имя> <url>. После этого к remote можно обращаться по короткому имени, а не по длинному URL."
    tags: [commands]
  - id: remotes-04
    front: "Что делает git fetch?"
    back: "Скачивает коммиты с remote, не трогая Ваши рабочие ветки: обновляет remote-tracking ветки (origin/main). Самая безопасная операция - ничего не меняет в рабочем дереве."
    tags: [fetch]
  - id: remotes-05
    front: "Что делает git pull?"
    back: "git pull = git fetch + слияние: скачивает и сразу вливает изменения с remote в текущую ветку. Удобно, но менее предсказуемо, чем fetch."
    tags: [pull]
  - id: remotes-06
    front: "Что делает git push?"
    back: "Отправляет локальные коммиты на remote, обновляя там ветку. Формат: git push <remote> <ветка>, например git push origin main."
    tags: [push]
  - id: remotes-07
    front: "Почему git fetch безопаснее git pull?"
    back: "fetch ничего не сливает - даёт посмотреть, что нового, и решить, вливать ли. pull сливает сразу и может втянуть в конфликт без предупреждения."
    tags: [fetch]
  - id: remotes-08
    front: "Почему push может быть отвергнут с «updates were rejected»?"
    back: "На remote есть коммиты, которых нет у Вас. Принять push значило бы затереть чужую работу. Нужно сначала забрать их (pull/fetch), свести, потом push."
    tags: [push]
  - id: remotes-09
    front: "Что такое remote-tracking ветка origin/main?"
    back: "Локальный слепок состояния ветки main на origin на момент последнего fetch. Вы её напрямую не редактируете - она лишь отражает сервер."
    tags: [tracking]
  - id: remotes-10
    front: "Чем опасен git push --force?"
    back: "Force-push затирает на remote коммиты, которых у Вас нет, то есть чужую работу. К нему прибегают редко и только на личных ветках, понимая последствия."
    tags: [danger]
