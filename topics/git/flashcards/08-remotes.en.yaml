conceptId: remotes
cards:
  - id: remotes-01
    front: "What is a remote repository?"
    back: "A full copy of history on another machine (server) that your local repo exchanges commits with. Git is distributed: everyone has full history; remote is the sync point."
    tags: [model]
  - id: remotes-02
    front: "What is origin?"
    back: "The default name for the main remote, by convention, not a keyword. On clone Git creates remote origin pointing at the source."
    tags: [model]
  - id: remotes-03
    front: "How do you add a remote repository?"
    back: "git remote add <name> <url>. After that you reach the remote by short name instead of a long URL."
    tags: [commands]
  - id: remotes-04
    front: "What does git fetch do?"
    back: "Downloads commits from the remote without touching your working branches: updates remote-tracking branches (origin/main). Safest operation: does not change the working tree."
    tags: [fetch]
  - id: remotes-05
    front: "What does git pull do?"
    back: "git pull = git fetch + merge: downloads and immediately pours remote changes into the current branch. Convenient but less predictable than fetch."
    tags: [pull]
  - id: remotes-06
    front: "What does git push do?"
    back: "Sends local commits to the remote, updating the branch there. Format: git push <remote> <branch>, e.g. git push origin main."
    tags: [push]
  - id: remotes-07
    front: "Why is git fetch safer than git pull?"
    back: "fetch does not merge: it lets you inspect what is new and decide whether to merge. pull merges immediately and can pull you into conflict without warning."
    tags: [fetch]
  - id: remotes-08
    front: "Why can push be rejected with updates were rejected?"
    back: "The remote has commits you lack. Accepting push would erase others' work. Fetch first (pull/fetch), reconcile, then push."
    tags: [push]
  - id: remotes-09
    front: "What is remote-tracking branch origin/main?"
    back: "A local snapshot of branch main on origin at last fetch. You do not edit it directly: it only reflects the server."
    tags: [tracking]
  - id: remotes-10
    front: "Why is git push --force dangerous?"
    back: "Force-push overwrites commits on the remote that you lack, others' work. Use rarely and only on personal branches, knowing the consequences."
    tags: [danger]
