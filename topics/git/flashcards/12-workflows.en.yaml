conceptId: workflows
cards:
  - id: workflows-01
    front: "What is a workflow in Git?"
    back: "Team agreements on branching, branch naming, and merging into main: not separate commands but rules for applying them, turning parallel work chaos into a predictable flow."
    tags: [overview]
  - id: workflows-02
    front: "What is the feature branches approach?"
    back: "Do not commit to main directly: each task in its own branch (feature/..., fix/...) merged back when ready. main stays stable."
    tags: [feature-branches]
  - id: workflows-03
    front: "What is a pull request?"
    back: "A platform process (GitHub/GitLab), not a Git command: request to merge a branch into main. Colleagues review; merge happens only after approval."
    tags: [pull-requests]
  - id: workflows-04
    front: "Why are pull requests used?"
    back: "They turn merge into a team event: code gets review, discussion stays in history, main is protected from direct pushes. Review catches errors before the shared branch."
    tags: [pull-requests]
  - id: workflows-05
    front: "Which branches does gitflow keep?"
    back: "Several long-lived ones: main (releases), develop (integration), plus feature, release, hotfix. Strict structure for rare versioned releases and multiple supported versions."
    tags: [gitflow]
  - id: workflows-06
    front: "What is trunk-based development?"
    back: "One main branch (trunk/main) where everyone merges small changes very often, behind short branches. For continuous delivery; relies on automated tests and feature flags."
    tags: [trunk-based]
  - id: workflows-07
    front: "What release cadence suits gitflow vs trunk-based?"
    back: "Gitflow: rare numbered releases and multiple supported versions. Trunk-based: continuous delivery (releases many times per day)."
    tags: [comparison]
  - id: workflows-08
    front: "What does a team need for safe trunk-based practice?"
    back: "Strong automated test culture (catch regressions on frequent merges) and feature flags (merge unfinished work but hide it from users)."
    tags: [trunk-based]
  - id: workflows-09
    front: "Is there one correct workflow?"
    back: "No. Choice is structure vs speed for release cadence and team size. The best process is one the team follows consistently, not the trendiest."
    tags: [comparison]
  - id: workflows-10
    front: "Why is workflow not enforced by Git itself?"
    back: "Git treats develop, feature/x, and main the same; pull request exists only on GitHub/GitLab. Process rests on agreements, branch protection, and CI around Git."
    tags: [overview]
