conceptId: tags-reflog
cards:
  - id: tags-reflog-01
    front: "How does a tag differ from a branch?"
    back: "A tag is an immovable mark on a specific commit; new commits do not move it. A branch moves forward with each commit. Tags mark release versions."
    tags: [tags]
  - id: tags-reflog-02
    front: "How do you create a lightweight tag on the current commit?"
    back: "git tag <name>, e.g. git tag v1.0.0. By default the tag sits on HEAD; you can name another commit: git tag <name> <ref>."
    tags: [tags]
  - id: tags-reflog-03
    front: "How does an annotated tag differ from a lightweight one?"
    back: "Annotated (git tag -a) stores author, date, and message: a full object. Lightweight is just a name bookmark on a commit. Annotated preferred for public releases."
    tags: [tags]
  - id: tags-reflog-04
    front: "What is git reflog?"
    back: "A local journal of HEAD moves: remembers every position, commits, branch switches, reset, merge. Lets you return to a commit lost after reset."
    tags: [reflog]
  - id: tags-reflog-05
    front: "Why can a commit lost after reset --hard usually be recovered?"
    back: "Git does not delete the commit immediately: no branch points at it. reflog remembers where HEAD was and you can return via that entry."
    tags: [reflog]
  - id: tags-reflog-06
    front: "How do you insure before a dangerous operation (reset --hard, complex rebase)?"
    back: "Mark the current commit (tag or branch) beforehand. A name remains pointing at the state you need; return is one command."
    tags: [recovery]
  - id: tags-reflog-07
    front: "How do you restore a branch when tag backup points at the needed commit?"
    back: "git reset --hard backup: moves the branch and working tree to the tagged commit. reset --hard accepts any mark, not only HEAD~n."
    tags: [recovery]
  - id: tags-reflog-08
    front: "Do tags go to remote on ordinary git push?"
    back: "No. Ordinary push does not send tags. Use git push origin <tag> or git push --tags."
    tags: [pitfalls]
  - id: tags-reflog-09
    front: "Why does reflog see what git log does not?"
    back: "git log walks parent links and shows only reachable commits. reflog stores HEAD move history and catches commits that fell out of reachable history."
    tags: [reflog]
  - id: tags-reflog-10
    front: "Is reflog an eternal archive?"
    back: "No. It is local and temporary: entries expire (weeks by default) and do not exist on other machines. Insurance against a fresh mistake, not long-term archive."
    tags: [pitfalls]
