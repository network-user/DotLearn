conceptId: undoing-changes
cards:
  - id: undoing-changes-01
    front: "What four different operations hide behind undo in Git?"
    back: "restore (roll back file), restore --staged (unstage), reset (move branch), revert (new commit undoing an old one). Different commands for different tasks."
    tags: [overview]
  - id: undoing-changes-02
    front: "What does git restore <file> do?"
    back: "Returns the file to the version from index or last commit, discarding uncommitted edits to that file. Works at single-file level."
    tags: [restore]
  - id: undoing-changes-03
    front: "How does git restore file differ from git restore --staged file?"
    back: "The first rolls back file contents (loses edits). The second only removes from stage without touching contents."
    tags: [restore]
  - id: undoing-changes-04
    front: "What does git reset do?"
    back: "Moves the current branch pointer to another commit. Often used to undo the last commit by moving to HEAD~1. What happens to edits depends on mode."
    tags: [reset]
  - id: undoing-changes-05
    front: "What does git reset --soft HEAD~1 do?"
    back: "Moves only the branch pointer one commit back. Changes from the undone commit stay in the index, ready for a new commit. Good for rebuilding the last commit."
    tags: [reset]
  - id: undoing-changes-06
    front: "What does git reset --mixed (default) do?"
    back: "Moves the branch and resets the index. Changes from the undone commit stay in the working tree but leave the stage — you need git add again."
    tags: [reset]
  - id: undoing-changes-07
    front: "What does git reset --hard do and why is it dangerous?"
    back: "Moves the branch, resets the index and rewrites the working tree to the target commit. Uncommitted edits vanish permanently — the only destructive mode."
    tags: [reset, danger]
  - id: undoing-changes-08
    front: "What does git revert do?"
    back: "Creates a new commit with reverse changes without deleting the original. History grows forward, nothing rewritten — safe for published commits."
    tags: [revert]
  - id: undoing-changes-09
    front: "Why is reset dangerous for published commits?"
    back: "reset rewrites history by moving the branch. Others still reference the undone commit and histories desync. For shared history use revert."
    tags: [revert, danger]
  - id: undoing-changes-10
    front: "Can you recover edits after git reset --hard?"
    back: "Uncommitted edits — no, they are in no commit. Commits undone by --hard can be found for a while via reflog, but not working tree edits."
    tags: [danger]
