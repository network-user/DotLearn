conceptId: first-commit
cards:
  - id: first-commit-01
    front: "Что такое staging area (индекс) в метафоре сцены?"
    back: "Сцена, на которую Вы заранее выставляете ровно те изменения, что должны войти в коммит. git commit поднимает занавес и превращает сцену в снимок."
    tags: [staging]
  - id: first-commit-02
    front: "Почему git add и git commit - это два разных шага?"
    back: "Чтобы между ними можно было передумать: посмотреть, что собрано, добавить ещё или убрать лишнее. add выкладывает на сцену, commit запечатывает её."
    tags: [staging]
  - id: first-commit-03
    front: "Какие три группы файлов показывает git status?"
    back: "Changes to be committed (на сцене, в индексе), Changes not staged for commit (изменено, но не на сцене), Untracked files (новый файл, Git его не отслеживает)."
    tags: [status]
  - id: first-commit-04
    front: "Может ли один файл быть одновременно staged и not staged?"
    back: "Да. Если выставить файл на сцену через git add, а потом снова его изменить, часть изменений будет в индексе, а свежая правка - только в рабочем дереве."
    tags: [status]
  - id: first-commit-05
    front: "Как собрать один коммит из части изменений?"
    back: "Стадировать файлы по отдельности: git add только нужные файлы, затем git commit. На сцену попадёт лишь добавленное, остальное останется в рабочем дереве для следующего коммита."
    tags: [staging]
  - id: first-commit-06
    front: "Чем git restore --staged отличается от git rm?"
    back: "restore --staged снимает файл со сцены, сохраняя правки в рабочем дереве. git rm удаляет файл и из индекса, и с диска. Первое отменяет стадирование, второе уничтожает файл."
    tags: [undo]
  - id: first-commit-07
    front: "Каким должно быть сообщение коммита?"
    back: "Оно объясняет «зачем», а не «что» (что видно из diff). «Исправил падение при пустом вводе» полезнее, чем «fix»."
    tags: [message]
  - id: first-commit-08
    front: "Что делает git commit -am и в чём его граница?"
    back: "Стадирует и сразу коммитит, но берёт только уже отслеживаемые файлы. Новый, ещё не добавленный файл -a проигнорирует - его нужно сначала git add."
    tags: [shortcut]
  - id: first-commit-09
    front: "Почему git commit сразу после создания нового файла даёт «nothing to commit»?"
    back: "Новый файл untracked, на сцене пусто. Сначала нужен git add, чтобы выложить его в индекс."
    tags: [pitfalls]
  - id: first-commit-10
    front: "Что покажет git status после успешного коммита, если больше ничего не менялось?"
    back: "«nothing to commit, working tree clean»: всё проиндексированное ушло в историю, рабочее дерево совпадает с последним снимком."
    tags: [status]
