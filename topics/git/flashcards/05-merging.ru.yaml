conceptId: merging
cards:
  - id: merging-01
    front: "Что делает git merge?"
    back: "Сводит работу одной ветки в другую. Встаёте на целевую ветку и выполняете git merge <источник> - наработки источника вливаются в текущую ветку."
    tags: [basics]
  - id: merging-02
    front: "Когда происходит fast-forward слияние?"
    back: "Когда целевая ветка не двигалась с момента ответвления. История линейна, поэтому слияние - это просто перенос указателя целевой ветки вперёд, без нового коммита."
    tags: [ff]
  - id: merging-03
    front: "Когда нужен трёхсторонний (3-way) merge?"
    back: "Когда обе ветки получили коммиты после расхождения. Перемотать нельзя - Git сводит общего предка с двумя вершинами в merge-коммит."
    tags: [three-way]
  - id: merging-04
    front: "Чем merge-коммит отличается от обычного?"
    back: "У него два родителя - вершины обеих сливаемых линий. Это единственный вид коммита с двумя родителями; по нему видно, где встретились две линии работы."
    tags: [three-way]
  - id: merging-05
    front: "Что такое merge base (общий предок)?"
    back: "Последний коммит, присутствующий в истории обеих веток. От него Git считает, кто и что менял, чтобы свести три снимка при трёхстороннем слиянии."
    tags: [three-way]
  - id: merging-06
    front: "В какую ветку вольётся feature при git merge feature?"
    back: "В текущую ветку - ту, на которой Вы стоите. Поэтому перед merge стоит проверить git status: на той ли Вы ветке."
    tags: [pitfalls]
  - id: merging-07
    front: "Две ветки правили разные файлы. Будет ли конфликт при слиянии?"
    back: "Нет. Конфликт возникает только при несовместимых правках одних и тех же строк. Непересекающиеся правки Git сводит автоматически."
    tags: [conflicts]
  - id: merging-08
    front: "Что делает флаг --no-ff?"
    back: "Заставляет Git создать merge-коммит даже там, где возможна перемотка. Используют ради явной отметки в истории «здесь влилась фича»."
    tags: [ff]
  - id: merging-09
    front: "Что происходит с веткой feature после её слияния в main?"
    back: "Указатель feature остаётся на своём последнем коммите - merge копирует работу, но ветку не переносит и не удаляет. Удалить её можно отдельно: git branch -d feature."
    tags: [basics]
  - id: merging-10
    front: "Создаётся ли отдельный коммит при fast-forward?"
    back: "Нет. При перемотке Git просто сдвигает указатель целевой ветки вперёд; история остаётся линейной. Чтобы получить коммит, нужен --no-ff."
    tags: [ff]
