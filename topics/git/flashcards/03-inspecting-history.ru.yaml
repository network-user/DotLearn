conceptId: inspecting-history
cards:
  - id: inspecting-history-01
    front: "На какой вопрос отвечает git status?"
    back: "«В каком состоянии файлы прямо сейчас»: что на сцене, что изменено, но не на сцене, что не отслеживается. Это снимок «здесь и сейчас», а не история."
    tags: [status]
  - id: inspecting-history-02
    front: "Что показывает git log?"
    back: "Список коммитов от свежего к старому: автор, дата, сообщение. Идёт от HEAD назад по родительским ссылкам."
    tags: [log]
  - id: inspecting-history-03
    front: "Что делает флаг --oneline у git log?"
    back: "Печатает по строке на коммит: короткий хеш и сообщение. Быстрый обзор формы истории."
    tags: [log]
  - id: inspecting-history-04
    front: "Что сравнивает git diff без аргументов?"
    back: "Рабочее дерево с индексом. Показывает только несценированные правки - то, что ещё не выставлено на сцену через git add."
    tags: [diff]
  - id: inspecting-history-05
    front: "Что сравнивает git diff --staged?"
    back: "Индекс с последним коммитом. Показывает ровно то, что войдёт в следующий коммит."
    tags: [diff]
  - id: inspecting-history-06
    front: "Изменил файл, сделал git add, а git diff пустой. Почему?"
    back: "Правка переехала на сцену. git diff сравнивает дерево с индексом, а они теперь совпадают. Сценированную правку покажет git diff --staged."
    tags: [pitfalls]
  - id: inspecting-history-07
    front: "Показывает ли git log содержимое изменений?"
    back: "Нет, только сообщения коммитов. Чтобы увидеть, что менялось, нужен diff: git log -p, git show <commit> или git diff."
    tags: [pitfalls]
  - id: inspecting-history-08
    front: "Где в истории находится HEAD при чтении git log?"
    back: "HEAD - первый (самый верхний) коммит в выводе: тот, на котором Вы стоите. Дальше идут его родитель и так до первого коммита без родителя."
    tags: [log]
  - id: inspecting-history-09
    front: "Что показывает git log --graph?"
    back: "ASCII-граф ветвлений и слияний слева от сообщений - удобно, чтобы увидеть, где история расходилась и сходилась."
    tags: [log]
  - id: inspecting-history-10
    front: "Какой командой посмотреть один конкретный коммит с его правками?"
    back: "git show <commit>: разворачивает коммит вместе с построчными изменениями, в отличие от git log, который показывает только сообщения."
    tags: [diff]
