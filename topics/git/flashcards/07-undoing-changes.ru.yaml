conceptId: undoing-changes
cards:
  - id: undoing-changes-01
    front: "Какие четыре разные операции скрываются за словом «отменить» в Git?"
    back: "restore (откатить файл), restore --staged (снять со сцены), reset (сдвинуть ветку), revert (создать новый коммит, отменяющий старый). Это разные команды для разных задач."
    tags: [overview]
  - id: undoing-changes-02
    front: "Что делает git restore <file>?"
    back: "Возвращает файл к версии из индекса или последнего коммита, выбрасывая незакоммиченные правки этого файла. Работает на уровне одного файла."
    tags: [restore]
  - id: undoing-changes-03
    front: "Чем git restore file отличается от git restore --staged file?"
    back: "Первая откатывает содержимое файла (теряет правки). Вторая лишь снимает файл со сцены, не трогая его содержимое."
    tags: [restore]
  - id: undoing-changes-04
    front: "Что делает git reset?"
    back: "Переносит указатель текущей ветки на другой коммит. Чаще всего им отменяют последний коммит, сдвигая ветку на HEAD~1. Что станет с правками - зависит от режима."
    tags: [reset]
  - id: undoing-changes-05
    front: "Что делает git reset --soft HEAD~1?"
    back: "Двигает только указатель ветки на коммит назад. Изменения отменённого коммита остаются в индексе, готовые к новому коммиту. Удобно, чтобы пересобрать последний коммит."
    tags: [reset]
  - id: undoing-changes-06
    front: "Что делает git reset --mixed (режим по умолчанию)?"
    back: "Двигает ветку и сбрасывает индекс. Изменения отменённого коммита остаются в рабочем дереве, но уже не на сцене - их нужно заново git add."
    tags: [reset]
  - id: undoing-changes-07
    front: "Что делает git reset --hard и чем он опасен?"
    back: "Двигает ветку, сбрасывает индекс и переписывает рабочее дерево под целевой коммит. Незакоммиченные правки исчезают безвозвратно - это единственный разрушительный режим."
    tags: [reset, danger]
  - id: undoing-changes-08
    front: "Что делает git revert?"
    back: "Создаёт новый коммит, вносящий обратные изменения, не удаляя исходный. История растёт вперёд, ничего не переписывается - безопасно для уже опубликованных коммитов."
    tags: [revert]
  - id: undoing-changes-09
    front: "Почему reset опасен для уже опубликованных коммитов?"
    back: "reset переписывает историю, сдвигая ветку. Чужие репозитории всё ещё ссылаются на «отменённый» коммит, и истории рассинхронизируются. Для общей истории отменяйте через revert."
    tags: [revert, danger]
  - id: undoing-changes-10
    front: "Можно ли восстановить правки после git reset --hard?"
    back: "Незакоммиченные правки - нет, их нет ни в одном коммите. Отменённые этой командой коммиты какое-то время можно найти через reflog, но не правки рабочего дерева."
    tags: [danger]
