conceptId: stash-cherry-pick
cards:
  - id: stash-cherry-pick-01
    front: "What does git stash do?"
    back: "Hides uncommitted changes (from working tree and stage) in separate storage and returns the tree to the last commit state — clean."
    tags: [stash]
  - id: stash-cherry-pick-02
    front: "What does git stash pop do?"
    back: "Brings the latest stashed entry back, applies it to the current working tree, and removes it from storage. Your draft is back."
    tags: [stash]
  - id: stash-cherry-pick-03
    front: "Why is stash useful in practice?"
    back: "To free the working tree for urgent work without committing a half-done state: stash, switch, fix urgent, restore parked work."
    tags: [stash]
  - id: stash-cherry-pick-04
    front: "What does git cherry-pick <commit> do?"
    back: "Takes one specified commit's changes and applies them as a new commit on the current branch, without touching other commits on the source branch."
    tags: [cherry-pick]
  - id: stash-cherry-pick-05
    front: "What is a typical cherry-pick use case?"
    back: "Move one needed commit (e.g. a ready bugfix) from one branch to another now, without waiting to merge the whole branch."
    tags: [cherry-pick]
  - id: stash-cherry-pick-06
    front: "Does cherry-pick keep the same identifier as the source commit?"
    back: "No. It is a new commit with the same contents but a different parent and identifier — like rebase."
    tags: [cherry-pick]
  - id: stash-cherry-pick-07
    front: "When is merge/rebase better than cherry-pick?"
    back: "When moving a whole branch of many commits. cherry-pick suits one or two; for a branch it is tedious and creates duplicates."
    tags: [cherry-pick]
  - id: stash-cherry-pick-08
    front: "Can git stash pop conflict?"
    back: "Yes. If stashed edits overlap the current tree, pop collides them and asks you to resolve — like merge."
    tags: [pitfalls]
  - id: stash-cherry-pick-09
    front: "Is stash a reliable backup?"
    back: "No, a temporary pocket. pop can conflict; forgotten stack entries are easy to confuse. Pop soon after stashing."
    tags: [pitfalls]
  - id: stash-cherry-pick-10
    front: "How are cherry-pick and rebase related?"
    back: "Rebase is essentially a series of cherry-picks: move all my commits onto a tip. Cherry-pick is the point version for one commit. Same three-way mechanics and conflicts."
    tags: [model]
