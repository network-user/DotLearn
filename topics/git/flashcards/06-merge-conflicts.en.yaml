conceptId: merge-conflicts
cards:
  - id: merge-conflicts-01
    front: "What is a merge conflict in essence?"
    back: "A question from Git to a human: two branches changed the same line differently — which version to keep? Not a breakdown and not data loss."
    tags: [model]
  - id: merge-conflicts-02
    front: "When does a conflict arise?"
    back: "Only when both branches changed the same line differently relative to the common ancestor. Different files, different lines, and identical edits Git merges alone."
    tags: [model]
  - id: merge-conflicts-03
    front: "What does Git do with a conflicted file on merge?"
    back: "Does not crash: stops the merge and writes both versions into the file separated by markers <<<<<<< HEAD, ======= and >>>>>>> <branch>."
    tags: [markers]
  - id: merge-conflicts-04
    front: "What sits between <<<<<<< HEAD and =======?"
    back: "The current branch version (ours). Between ======= and >>>>>>> <name> is the incoming branch (theirs)."
    tags: [markers]
  - id: merge-conflicts-05
    front: "What three steps resolve a conflict?"
    back: "1) Edit the file, pick the right version, remove markers. 2) git add on the file — settled signal. 3) git commit to finish the merge."
    tags: [resolve]
  - id: merge-conflicts-06
    front: "Must resolution pick one of the two versions?"
    back: "No. You can keep ours, theirs, both, or a new variant — you decide final content. Main thing — remove markers."
    tags: [resolve]
  - id: merge-conflicts-07
    front: "How does Git know a file conflict is settled?"
    back: "git add on the resolved file. Until then the file stays conflicted and git commit will complain."
    tags: [resolve]
  - id: merge-conflicts-08
    front: "What if you commit without removing markers?"
    back: "Lines <<<<<<<, ======= and >>>>>>> enter history as ordinary text. Code may not compile. Always verify markers are gone."
    tags: [pitfalls]
  - id: merge-conflicts-09
    front: "How do you cancel an incomplete merge with conflict?"
    back: "git merge --abort returns the repository to before the merge. No commits are lost — you can try again."
    tags: [resolve]
  - id: merge-conflicts-10
    front: "Why do ours and theirs depend on where you stand?"
    back: "HEAD in markers is always the current branch where merge started. Merge from another branch and sides swap. Ours/theirs means current/incoming, not right/wrong."
    tags: [markers]
