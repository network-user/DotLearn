conceptId: first-commit
cards:
  - id: first-commit-01
    front: "What is the staging area (index) in the stage metaphor?"
    back: "The stage where you place exactly the changes that should enter the commit. git commit raises the curtain and turns the stage into a snapshot."
    tags: [staging]
  - id: first-commit-02
    front: "Why are git add and git commit two separate steps?"
    back: "So you can change your mind between them: review what you assembled, add more, or remove extras. add places on stage, commit seals it."
    tags: [staging]
  - id: first-commit-03
    front: "What three groups of files does git status show?"
    back: "Changes to be committed (on stage, in the index), Changes not staged for commit (modified but not on stage), Untracked files (new file Git does not track)."
    tags: [status]
  - id: first-commit-04
    front: "Can one file be both staged and not staged at once?"
    back: "Yes. If you stage a file with git add and then edit it again, part of the changes is in the index and the fresh edit is only in the working tree."
    tags: [status]
  - id: first-commit-05
    front: "How do you build one commit from part of your changes?"
    back: "Stage files separately: git add only the files you need, then git commit. Only what you added enters; the rest stays in the working tree for the next commit."
    tags: [staging]
  - id: first-commit-06
    front: "How does git restore --staged differ from git rm?"
    back: "restore --staged removes a file from stage while keeping edits in the working tree. git rm deletes the file from both the index and disk. The first undoes staging, the second destroys the file."
    tags: [undo]
  - id: first-commit-07
    front: "What should a commit message be like?"
    back: "It explains why, not what (that is visible in the diff). Fixed crash on empty input is more useful than fix."
    tags: [message]
  - id: first-commit-08
    front: "What does git commit -am do and what is its limit?"
    back: "Stages and commits immediately, but only already tracked files. A new file not yet added is ignored by -a — you still need git add first."
    tags: [shortcut]
  - id: first-commit-09
    front: "Why does git commit right after creating a new file give nothing to commit?"
    back: "The new file is untracked and the stage is empty. You need git add first to place it in the index."
    tags: [pitfalls]
  - id: first-commit-10
    front: "What does git status show after a successful commit if nothing else changed?"
    back: "nothing to commit, working tree clean: everything staged went into history; the working tree matches the last snapshot."
    tags: [status]
