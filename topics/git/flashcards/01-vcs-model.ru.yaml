conceptId: vcs-model
cards:
  - id: vcs-model-01
    front: "Что такое коммит в модели Git?"
    back: "Снимок (snapshot) всего дерева файлов на момент сохранения, а не список правок отдельных строк. Вернуться к коммиту значит восстановить весь снимок."
    tags: [model]
  - id: vcs-model-02
    front: "Почему три снимка не равны трём полным копиям проекта?"
    back: "Если файл с прошлого коммита не менялся, Git не копирует его заново, а ссылается на уже сохранённую версию. Так история не раздувает репозиторий."
    tags: [model]
  - id: vcs-model-03
    front: "Какие три области проходит файл на пути в историю?"
    back: "Рабочее дерево (working tree) - файлы на диске; индекс (staging area) - что войдёт в следующий коммит; репозиторий (.git) - вся история коммитов."
    tags: [areas]
  - id: vcs-model-04
    front: "Что делает git add?"
    back: "Переносит снимок изменений из рабочего дерева в индекс. Фиксирует содержимое файла на момент вызова - решает, что войдёт в следующий коммит."
    tags: [commands]
  - id: vcs-model-05
    front: "Что делает git commit?"
    back: "Превращает текущее содержимое индекса в новый постоянный снимок в репозитории. Требует непустого сообщения через -m."
    tags: [commands]
  - id: vcs-model-06
    front: "Зачем нужен индекс, почему нельзя коммитить прямо с диска?"
    back: "Индекс даёт контроль над тем, что именно попадёт в коммит. Можно добавить файлы одной задачи, закоммитить их с осмысленным сообщением, потом остальные - история получается чистой."
    tags: [areas]
  - id: vcs-model-07
    front: "Вы добавили файл через git add, потом снова его изменили. Какая версия уйдёт в коммит?"
    back: "Старая - та, что была на момент git add. Индекс хранит снимок файла на момент команды, а не подписку на файл. Нужно повторить git add."
    tags: [pitfalls]
  - id: vcs-model-08
    front: "Что делает git init?"
    back: "Создаёт пустой репозиторий: появляется скрытая папка .git и ветка по умолчанию. После этого можно делать add и commit."
    tags: [commands]
  - id: vcs-model-09
    front: "Почему Git не возьмёт новый файл в коммит без git add?"
    back: "Только что созданный файл Git считает «untracked» - он есть в рабочем дереве, но не в индексе. Пока его явно не добавить, в коммит он не войдёт."
    tags: [pitfalls]
  - id: vcs-model-10
    front: "Удалили файл в редакторе - он пропал из истории?"
    back: "Нет. Файл исчез только из рабочего дерева. В прошлых коммитах он по-прежнему есть, и его легко вернуть. История неизменна, пока её намеренно не перепишут."
    tags: [model]
