conceptId: merging
cards:
  - id: merging-01
    front: "What does git merge do?"
    back: "Combines work from one branch into another. Stand on the target branch and run git merge <source> — the source's work pours into the current branch."
    tags: [basics]
  - id: merging-02
    front: "When does a fast-forward merge happen?"
    back: "When the target branch did not move since branching. History is linear, so merge is simply moving the target pointer forward, with no new commit."
    tags: [ff]
  - id: merging-03
    front: "When is a three-way (3-way) merge needed?"
    back: "When both branches got commits after diverging. You cannot fast-forward — Git reconciles the common ancestor with both tips into a merge commit."
    tags: [three-way]
  - id: merging-04
    front: "How does a merge commit differ from an ordinary one?"
    back: "It has two parents — the tips of both merged lines. The only commit kind with two parents; it marks where two lines of work met."
    tags: [three-way]
  - id: merging-05
    front: "What is the merge base (common ancestor)?"
    back: "The last commit present in both branches' history. From it Git computes who changed what to reconcile three snapshots on three-way merge."
    tags: [three-way]
  - id: merging-06
    front: "Which branch does feature merge into on git merge feature?"
    back: "The current branch — the one you are on. Before merge check git status: are you on the right branch?"
    tags: [pitfalls]
  - id: merging-07
    front: "Two branches edited different files. Will merge conflict?"
    back: "No. Conflict arises only from incompatible edits to the same lines. Non-overlapping edits Git merges automatically."
    tags: [conflicts]
  - id: merging-08
    front: "What does the --no-ff flag do?"
    back: "Forces Git to create a merge commit even where fast-forward is possible. Used for an explicit mark in history that a feature landed here."
    tags: [ff]
  - id: merging-09
    front: "What happens to branch feature after merging it into main?"
    back: "Pointer feature stays on its last commit — merge copies work but does not move or delete the branch. Delete separately with git branch -d feature."
    tags: [basics]
  - id: merging-10
    front: "Is a separate commit created on fast-forward?"
    back: "No. On fast-forward Git simply moves the target pointer forward; history stays linear. For a commit use --no-ff."
    tags: [ff]
