conceptId: vcs-model
cards:
  - id: vcs-model-01
    front: "What is a commit in Git's model?"
    back: "A snapshot of the entire file tree at the moment you save — not a list of line-by-line patches. Returning to a commit means restoring the entire snapshot."
    tags: [model]
  - id: vcs-model-02
    front: "Why are three snapshots not three full copies of the project?"
    back: "If a file did not change since the last commit, Git does not copy it again — it references the already stored version. That keeps history from bloating the repository."
    tags: [model]
  - id: vcs-model-03
    front: "What three areas does a file pass through on its way into history?"
    back: "Working tree — files on disk; index (staging area) — what will enter the next commit; repository (.git) — the full commit history."
    tags: [areas]
  - id: vcs-model-04
    front: "What does git add do?"
    back: "Moves a snapshot of changes from the working tree into the index. Records file contents at the moment you run it — it decides what will enter the next commit."
    tags: [commands]
  - id: vcs-model-05
    front: "What does git commit do?"
    back: "Turns the current index contents into a new permanent snapshot in the repository. Requires a non-empty message via -m."
    tags: [commands]
  - id: vcs-model-06
    front: "Why is the index needed — why not commit straight from disk?"
    back: "The index lets you control what exactly enters the commit. You can add files for one task, commit them with a meaningful message, then add the rest — history stays clean."
    tags: [areas]
  - id: vcs-model-07
    front: "You added a file with git add, then changed it again. Which version goes into the commit?"
    back: "The old one — from the moment of git add. The index holds a snapshot at the time of the command, not a subscription to the file. You need to run git add again."
    tags: [pitfalls]
  - id: vcs-model-08
    front: "What does git init do?"
    back: "Creates an empty repository: a hidden .git folder appears and the default branch is set. After that you can add and commit."
    tags: [commands]
  - id: vcs-model-09
    front: "Why won't Git include a new file in a commit without git add?"
    back: "A newly created file is untracked — it is in the working tree but not in the index. Until you add it explicitly, it will not enter a commit."
    tags: [pitfalls]
  - id: vcs-model-10
    front: "You deleted a file in the editor — is it gone from history?"
    back: "No. The file disappeared only from the working tree. In past commits it is still there and easy to restore. History is immutable until you deliberately rewrite it."
    tags: [model]
