conceptId: merge-conflicts
cards:
  - id: merge-conflicts-01
    front: "Что такое конфликт слияния по сути?"
    back: "Вопрос Git к человеку: «две ветки изменили одну и ту же строку по-разному, какую версию оставить?». Это не поломка и не потеря данных."
    tags: [model]
  - id: merge-conflicts-02
    front: "Когда возникает конфликт?"
    back: "Только когда обе ветки изменили одну и ту же строку по-разному относительно общего предка. Разные файлы, разные строки и одинаковые правки Git сводит сам."
    tags: [model]
  - id: merge-conflicts-03
    front: "Что Git делает с конфликтным файлом при merge?"
    back: "Не падает: останавливает слияние и вписывает в файл обе версии, разделив их маркерами <<<<<<< HEAD, ======= и >>>>>>> <ветка>."
    tags: [markers]
  - id: merge-conflicts-04
    front: "Что находится между <<<<<<< HEAD и =======?"
    back: "Версия текущей ветки («наша»). Между ======= и >>>>>>> <имя> - версия вливаемой ветки («их»)."
    tags: [markers]
  - id: merge-conflicts-05
    front: "Из каких трёх шагов состоит разрешение конфликта?"
    back: "1) Отредактировать файл, выбрав правильную версию и удалив маркеры. 2) git add по файлу - сигнал «улажено». 3) git commit, завершающий слияние."
    tags: [resolve]
  - id: merge-conflicts-06
    front: "Обязательно ли при разрешении выбирать одну из двух версий?"
    back: "Нет. Можно оставить нашу, их, обе сразу или совершенно новый вариант - итоговое содержимое решаете Вы. Главное - убрать маркеры."
    tags: [resolve]
  - id: merge-conflicts-07
    front: "Чем сигнализируют Git, что конфликт в файле улажен?"
    back: "Командой git add по разрешённому файлу. Пока этого не сделано, файл считается конфликтным и git commit будет ругаться."
    tags: [resolve]
  - id: merge-conflicts-08
    front: "Что будет, если закоммитить файл, не убрав маркеры?"
    back: "Строки <<<<<<<, ======= и >>>>>>> уйдут в историю как обычный текст. Код перестанет компилироваться. Всегда проверяйте, что маркеров не осталось."
    tags: [pitfalls]
  - id: merge-conflicts-09
    front: "Как отменить незавершённое слияние с конфликтом?"
    back: "git merge --abort возвращает репозиторий в состояние до слияния. Никакие коммиты при этом не теряются - можно попробовать заново."
    tags: [resolve]
  - id: merge-conflicts-10
    front: "Почему «наша» и «их» версии зависят от того, где Вы стоите?"
    back: "HEAD в маркерах - всегда текущая ветка, на которой запущен merge. Сливали бы из другой ветки - стороны поменялись бы. «Наша/их» это «текущая/входящая», а не «правильная/неправильная»."
    tags: [markers]
