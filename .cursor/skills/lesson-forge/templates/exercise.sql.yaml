exercises:
  - id: REPLACE-id
    concept: REPLACE-concept-id
    type: sql-query
    difficulty: 1
    prompt: "Replace with the task in one or two sentences."
    fixture: |
      CREATE TABLE example(id INT, name TEXT);
      INSERT INTO example VALUES (1, 'Alice'), (2, 'Bob');
    expected:
      kind: result-set
      ordered: false
      rows:
        - { id: 1, name: 'Alice' }
    hints:
      - "Mental-model hint: what is the task really asking, no syntax."
      - "Strategy hint: which clauses in which order."
    solution: |
      SELECT id, name FROM example WHERE id = 1;
    variants:
      - prompt: "Replace with a variation that changes the data or the target, not just the wording."
        expected:
          kind: result-set
          ordered: false
          rows:
            - { id: 2, name: 'Bob' }
        solution: |
          SELECT id, name FROM example WHERE id = 2;
