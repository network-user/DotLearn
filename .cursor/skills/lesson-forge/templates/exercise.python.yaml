exercises:
  - id: REPLACE-id
    concept: REPLACE-concept-id
    type: python-function
    difficulty: 2
    prompt: "Implement the function described below."
    starter: |
      def add(a: int, b: int) -> int:
          ...
    cases:
      - call: "add(1, 2)"
        expect: 3
      - call: "add(-1, 1)"
        expect: 0
      - call: "add(0, 0)"
        expect: 0
    hints:
      - "Read the signature carefully."
    solution: |
      def add(a, b):
          return a + b
