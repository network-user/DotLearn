# Prod-overlay для деплоя за общим фронт-Caddy (стек DotSound).
#
# На слабом сервере (3.8GB) vite build не помещается в RAM и уходит в своп -
# сборка занимает десятки минут. Поэтому образы собирает GitHub Actions на своём
# раннере и пушит в ghcr.io, а сервер только ТЯНЕТ готовые (docker compose pull),
# ничего не собирая. Этот overlay подменяет build на готовый image.
#
# GHCR_OWNER задаётся в .env (твой GitHub-логин в нижнем регистре):
#   GHCR_OWNER=octocat
# Образы: ghcr.io/<owner>/dotlearn-web  и  ghcr.io/<owner>/dotlearn-api
#
# Запуск на сервере:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build

services:
  api:
    image: ghcr.io/${GHCR_OWNER}/dotlearn-api:latest
    pull_policy: always
    environment:
      # Behind BOTH the shared front-Caddy and this stack's web-nginx = 2 reverse
      # proxies. Base compose defaults to 1 (nginx only); prod adds the Caddy hop so
      # the rate limiter keys on the real client IP. Override in .env if your edge differs.
      TRUSTED_PROXY_HOPS: ${TRUSTED_PROXY_HOPS:-2}

  web:
    image: ghcr.io/${GHCR_OWNER}/dotlearn-web:latest
    pull_policy: always
