services:
  elasticsearch:
    # Optional: only started with `docker compose --profile search up`.
    # Default deploy uses in-memory fuzzy search (ES_ENABLED=false), no ES.
    profiles: ['search']
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    healthcheck:
      test: ['CMD-SHELL', 'curl -fs http://localhost:9200/_cluster/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 30
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    # Bind to loopback only: the api reaches ES over the compose network via ES_NODE,
    # so the host publish is debug-only and must not be exposed on 0.0.0.0 (the ES
    # container ships with security disabled).
    ports:
      - '127.0.0.1:${ES_PORT:-9200}:9200'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      ES_NODE: ${ES_NODE:-http://elasticsearch:9200}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:8080}
      DATA_DIR: /app/data
      # nginx (web service) is exactly one reverse proxy in front of the API, so the
      # rate limiter must trust 1 hop to bucket per real client IP (mirrors deploy.sh).
      TRUSTED_PROXY_HOPS: ${TRUSTED_PROXY_HOPS:-1}
    # No hard dependency on elasticsearch: search falls back to in-memory
    # unless ES_ENABLED=true and the `search` profile is started.
    volumes:
      - dotlearn-data:/app/data
    # Loopback-only host publish: nginx reaches the API over the compose network
    # (api:3000); the host port is for local debugging and must not be on 0.0.0.0.
    ports:
      - '127.0.0.1:${API_PORT:-3000}:3000'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-}
        VITE_ADMIN_PATH: ${VITE_ADMIN_PATH:-/admin}
        VITE_GITHUB_URL: ${VITE_GITHUB_URL:-}
    container_name: dotlearn-web
    depends_on:
      - api
    # Порт наружу НЕ публикуем: за общим фронт-Caddy (стек DotSound) доступ идёт
    # по docker-сети dotsound на dotlearn-web:8080. Для локальной отладки можно
    # временно вернуть:  ports: ['127.0.0.1:${WEB_PORT:-8080}:8080']
    networks:
      # default - к api:3000 (свой nginx проксирует /api туда);
      # dotsound - чтобы фронт-Caddy DotSound достучался по имени контейнера.
      - default
      - dotsound
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

volumes:
  elasticsearch-data:
  dotlearn-data:

networks:
  # Внешняя сеть общего фронт-Caddy (стек DotSound). Реальное имя проверь:
  #   docker network ls | grep dotsound
  dotsound:
    external: true
    name: ${DOTSOUND_NETWORK:-dotsoundbackend_dotsound}
