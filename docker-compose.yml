services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "${ES_PORT:-9200}:9200"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      ES_NODE: http://elasticsearch:9200
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:8080}
      DATA_DIR: /app/data
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - dotlearn-data:/app/data
    ports:
      - "${API_PORT:-3000}:3000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:3000}
        VITE_ADMIN_PATH: ${VITE_ADMIN_PATH:-/admin}
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  elasticsearch-data:
  dotlearn-data:
