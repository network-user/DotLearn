name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: neither job needs more than read access to the repo contents.
# This drops the default GITHUB_TOKEN scopes (relevant for same-repo and push runs;
# fork PRs already receive a read-only token).
permissions:
  contents: read

env:
  NODE_VERSION: 22

jobs:
  verify:
    name: typecheck · lint · test · validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          run_install: false

      - name: Install Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Skill mirrors are in sync
        run: pnpm check:skills

      - name: Security headers are in sync
        run: pnpm check:headers

      - name: Translations are in sync
        run: pnpm check:i18n

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Validate topics
        run: pnpm validate

      # Requires pnpm 11+ (packageManager): legacy npm audit endpoint returns 410.
      - name: Audit production dependencies (high)
        run: pnpm audit:prod

      # Растущий interview-контент (тысячи MDX -> ~9000 модулей) раздувает vite
      # build; на дефолтном heap Node он падает с OOM (exit 134). Поднимаем лимит,
      # как в apps/web/Dockerfile (на ubuntu-latest 16GB RAM, 8GB heap влезает).
      - name: Build
        run: pnpm build
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Bundle budget
        run: pnpm check:bundle

  topics-only:
    name: topic contract gate
    if: contains(toJson(github.event.pull_request.files.*.path), 'topics/')
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - run: echo "Topic PR detected — verify job already exercised the contract gate."
