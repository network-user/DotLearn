name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20

jobs:
  verify:
    name: typecheck · lint · validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Skill mirrors are in sync
        run: pnpm check:skills

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Validate topics
        run: pnpm validate

      - name: Audit production dependencies (high)
        run: pnpm audit --prod --audit-level high

      - name: Build
        run: pnpm build

  topics-only:
    name: topic contract gate
    if: contains(toJson(github.event.pull_request.files.*.path), 'topics/')
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - run: echo "Topic PR detected — verify job already exercised the contract gate."
