name: Build & Deploy DotLearn

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-dotlearn
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

# Least privilege by default; build-push overrides with packages: write at job level.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Сборка образов на раннере GitHub (там 7+ GB RAM - vite build проходит
  # быстро) и публикация в ghcr.io. Сервер (3.8GB) ничего не собирает.
  # ---------------------------------------------------------------------------
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Owner in lowercase (ghcr требует нижний регистр)
        id: owner
        run: echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # web несёт зашитые при сборке значения (домен и путь админки) - берём из
      # secrets, чтобы не светить их в репозитории. VITE_GITHUB_URL не секрет (просто
      # ссылка на исходники) - берём из repo/org vars; если переменная не задана,
      # подставляем URL этого же репозитория, чтобы кнопка "исходники" не пропадала
      # молча, если её забыли настроить в GitHub.
      - name: Build & push web
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.owner.outputs.lc }}/dotlearn-web:latest
          build-args: |
            VITE_API_BASE=${{ secrets.VITE_API_BASE }}
            VITE_ADMIN_PATH=${{ secrets.VITE_ADMIN_PATH }}
            VITE_GITHUB_URL=${{ vars.VITE_GITHUB_URL || format('{0}/{1}', github.server_url, github.repository) }}
          cache-from: type=gha,scope=dotlearn-web
          cache-to: type=gha,scope=dotlearn-web,mode=max

      # api секретов в образе не несёт - ADMIN_* читаются из .env на сервере.
      - name: Build & push api
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.owner.outputs.lc }}/dotlearn-api:latest
          cache-from: type=gha,scope=dotlearn-api
          cache-to: type=gha,scope=dotlearn-api,mode=max

  # ---------------------------------------------------------------------------
  # Триггерим на сервере deploy/update.sh: git pull (конфиги) + docker compose
  # pull + up --no-build. Сборки на сервере нет - только скачивание образов.
  # ---------------------------------------------------------------------------
  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          test -n "$DEPLOY_HOST" || { echo "::error::Missing secret DEPLOY_HOST"; exit 1; }
          test -n "$DEPLOY_USER" || { echo "::error::Missing secret DEPLOY_USER"; exit 1; }
          test -n "$DEPLOY_SSH_KEY" || { echo "::error::Missing secret DEPLOY_SSH_KEY"; exit 1; }

      - name: Deploy via SSH (pull only, без сборки)
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          # Запас на медленный pull из ghcr.io в РФ-локацию (первый раз тянет
          # все слои; дальше докачиваются только изменённые).
          command_timeout: 40m
          script: |
            set -e
            sudo /bin/bash ${{ secrets.DEPLOY_REPO_PATH }}/deploy/update.sh
