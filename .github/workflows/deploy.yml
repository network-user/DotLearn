name: Deploy DotLearn to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

# Не даём двум деплоям идти параллельно (сборка тяжёлая, сервер 3.8GB).
concurrency:
  group: deploy-dotlearn
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          test -n "$DEPLOY_HOST" || { echo "::error::Missing secret DEPLOY_HOST"; exit 1; }
          test -n "$DEPLOY_USER" || { echo "::error::Missing secret DEPLOY_USER"; exit 1; }
          test -n "$DEPLOY_SSH_KEY" || { echo "::error::Missing secret DEPLOY_SSH_KEY"; exit 1; }

      # Пересборка идёт НА СЕРВЕРЕ в deploy/update.sh (git pull + docker compose
      # up --build). Код проверяется отдельным ci.yml; сюда деплой доходит только
      # для push в main / ручного запуска.
      - name: Deploy via SSH
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -e
            sudo /bin/bash ${{ secrets.DEPLOY_REPO_PATH }}/deploy/update.sh
